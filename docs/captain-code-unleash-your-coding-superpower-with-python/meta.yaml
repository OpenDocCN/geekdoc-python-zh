    around the text on each line. Python will treat the text as if it were one long
    block of text.


    Second, notice the \n in the middle of some of the text. That’s a newline character
    (which we mentioned previously). It forces a line break in the Terminal output.


    If you run the code, the test associated with Welcome will be printed. How? get("Welcome")
    returns the text, and print(), ...well, it prints.


    You can try other ids just to make sure it’s working. And then remove the test
    print() when you are done testing.


    Each time a new block of text is needed in the game, a section can be added to
    this function. Each section has a unique id. Call get() with that id, and the
    right text is returned.


    Oh, notice the return statements. Most functions have a single return statement
    at the end of the function. Here we have a return for each string, and each return
    stops function processing and returns the result. This way, we don’t have to save
    the text to a variable and then return that. But, within the if statements, you
    could indeed save the text to a variable and return that. Either way works.


    # Using Externalized Strings


    So, how do we use this new Strings file and get() function? We import it as a
    library. Yes, our Strings.py file is a Python library.


    Add this to the top of Main.py:


    ```

    # Imports

    import Strings

    ```


    > **Careful with Library Naming**

    We called the file Strings.py, so the library is named Strings. As you will recall,
    Python has a built-in library named String. If we had named the file String.py,
    we’d have overwritten the built-in library, but Strings.py is safe.'
