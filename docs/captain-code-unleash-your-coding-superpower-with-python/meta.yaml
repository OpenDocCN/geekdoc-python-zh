  - '[PAGE 64]


    # CAPTAIN CODE: Unleash Your Coding Superpower with Python


    The reason is because you need quotes to mark a block of text (what coders call
    a *string*). Numbers don''t need quotes around them. Python knows that 1 and 11
    are numbers, and they can''t be anything else. But *lastName*? It could be text,
    or the name of a variable (or even the name of a function), and it''s up to the
    coder to specify what it is. Same for Heads, sure, it could be a string, but it
    also could be something else. Computers don''t like ambiguity. Things need to
    be spelled out clearly. So, when you use text and want it to be treated as plain
    text, then you must surround it with double quotes.


    So, to summarize:


    +   - Variables never have quotes around them.

    - Numbers never have quotes around them.

    - Strings always need quotes around them.


    Ok, so let''s make this interesting. Is "3" a number or a string? And can you
    multiply it by 5?


    Well, to us humans that''s an easy one. Yes, "3" is a number, and if you multiply
    it by 5, you''ll get 15. But Python doesn''t know that "3" is a number; it sees
    the quotes and assumes that it is a string.


    So what would happen if you told Python to multiply "3" by 5? This is going to
    sound crazy, we know, but you''d get "33333"! It would multiply the *string* (essentially
    adding 5 copies of it) instead of the *number in the string*. Seriously!


    > **Strings Need Quotes**

    If you forget to use quotes around a string, Python will assume that you are referring
    to a variable, and it will display an error message, telling you the variable
    doesn''t exist.


    > **Testing "3" Versus 3**

    Want to try this for yourself? In Python, * (asterisk) is the multiplication symbol.
    You can create a file and `print(3 * 5)` and then `print("3" * 5)` to see the
    difference in output. You will see that "3" * 5 concatenates five copies of the
    string "3".'
- md: '## Python Makes Variables Easy


    In most languages, you must tell the computer what data type you want when you
    create a variable. Python is nice that way: It figures it out for you based on
    the values you provide.


    ## You Can Convert Between Data Types


    In future lessons, you''ll learn how to convert data from one data type to another
    so that you can, for example, convert string “3” to number 3.


    And now you have been introduced to *data types*. What is a data type? It is simply
    the type of information that a variable can store. There are lots of data types,
    but the two you''ll use the most are string and numeric. `num=11` creates a variable
    named `num` with a numeric data type. `lastName = "Forta"` creates a variable
    named `lastName` with a string data type.


    So, are “3” and 3 the same? The answer is no. The first is a string, and the second
    is a number, and though they look the same, their data types are different.


    ## Commenting Your Code


    There''s one last important topic we need to cover before we get to our final
    example in this chapter.


    All of the code you''ve written thus far has been pretty simple—just a few lines.
    But as you work through the lessons in this book, you''ll be writing tens, even
    hundreds, of lines of code. To make their code easier to read and understand,
    coders put comments in their code.


    How do you add comments? Like this (an example we saw before, but this time with
    comments added):


    ```

    # Import needed libraries

    import random


    # Define the choices

    choices=["Heads","Tails"]

    ```


    ```

    # Pick a random choice

    coinToss=random.choice(choices)


    # And display it

    print("It''s", coinToss)

    ```


    In Python, comments start with a # symbol. VS Code displays comments in their
    own color, making it super easy to identify them.


    It is important to understand that Python completely ignores comments. When Python
    sees a #, it ignores anything that comes after it. The comments are for you, the
    coder, not for Python.


    Commenting may seem like a waste of time. But take it from us: It is really important,
    and good coders comment all of their code. Why?


    - Comments will help you read your own code.

    - Comments will remind you of what you did and why.

    - Comments help others understand what your code does.

    - Comments make it easier for other coders to understand and work on your code.

    - Comments can explain any assumptions or dependencies, things that are needed
    for your code to work.


    And comments serve another important purpose: They can be used to hide code. For
    example, earlier you made a change to your code, changing choices="HT" to choices=["Heads",
    "Tails"]. That was a pretty simple edit, but imagine if it was a more complicated
    one. You might want to keep the old version while you test the new one. Look at
    this code:


    ```

    # Import needed libraries

    import random


    # Define the choices

    # choices="HT"

    choices=["Heads","Tails"]

    ```


    ```

    # Pick a random choice

    coinToss=random.choice(choices)


    # And display it

    print("It''s", coinToss)

    ```


    Notice that the original line choices="HT" is still in the file. It wasn''t deleted
    or edited, instead it has a # in front of it. That turns the line into a comment
    so that it is ignored by Python. Want to go back to the prior version? Remove
    the # symbol from the line and put it in front of the next line; that way, the
    second choices line becomes a comment instead.


    Coders call this *commenting out* code, and it''s an invaluable technique to use
    when revising or testing code.


    > **NEW TERM**

    > **Commenting Out** Using comments to temporarily hide code, preventing it from
    being executed.


    Ok, so from now on all of our code will be commented.


    ## One Die, Two Dice


    Let''s look at one last example to review everything we learned so far. Actually,
    let''s make it two examples.


    You''ve rolled dice before; lots of games need them. Dice are cool, but computer
    dice are way more fun. So we''ll create two programs: one that rolls a single
    die and another that rolls two.


    Here''s the code for Dice1.py:


    ```

    # Imports

    import random


    # Roll and print

    print("You rolled a", random.randrange(1, 7))

    ```


    This one is pretty simple, and it’s all code you’ve seen before. Save and run
    the code. You’ll see a number between 1 and 6 (remember, the 7 won’t be included
    in the range).


    The only real difference here is that the number returned by `random.randrange()`
    is never saved to a variable. Instead, it is passed directly to `print()` as an
    argument.


    Run this program whenever you need to roll a single die.


    ## Do You Need a Variable?


    What is the difference between this code:


    ```

    import random


    print("You rolled a", random.randrange(1, 7))

    ```


    and this code?


    ```

    import random


    num = random.randrange(1, 7)

    print("You rolled a", num)

    ```


    Functionally, there is no difference between these. Both generate a random number
    and then display it.


    The first version generates the random number right inside of the `print()` statement.
    The return value (the number that `randrange()` generates) is what gets passed
    as an argument to `print()`.


    The second version generates a random number and saves it to a variable named
    `num`. It is the variable that gets passed as an argument to `print()`.


    The final printed result is the same. The difference is the variable. That’s it.


    So which version should you use? In this situation, there is no advantage of one
    version over the other. The difference would only be important if that random
    number were needed for some other purpose, maybe another `print()` or in some
    calculations. Then you’d definitely want to save the generated number to a variable
    so that you could reuse it.


    But what about when you need to roll two dice? You could run the program twice
    and add the numbers yourself. But, nah, that’s not what we coders would do. We’d
    write another program to roll two dice.


    This is the code for Dice2.py:


    ```

    # Imports

    import random


    # Roll both dice

    die1=random.randrange(1, 7)

    die2=random.randrange(1, 7)


    # Display total and individual dies

    print("You rolled", die1, "and", die2, "- that''s", die1+die2)

    ```


    Run the code, and you’ll see the values of both dice displayed, along with their
    sum.


    This code should be self-explanatory to a `print()` and `random` expert like you.
    It creates two variables, and each contains the value for a rolled die. The `print()`
    statement simply displays the values and then does this:


    ```

    die1+die2

    ```


    This is a simple math operation: `die1` and `die2` are added together, and what
    gets printed is their sum. Yes, Python can do math on-the-fly.


    > **The + Operator**

    >

    > What does + do? Well, it depends on the data type. In our dice rolling code,
    `die1` and `die2` are both variables with a numeric data type. As they are numbers,
    when you use `die1+die2`, Python knows that you want to add them.

    >

    > But if the variables were strings and you used the + operator, Python would
    concatenate them (as a mathematical addition on strings would make no sense).

    >

    > Python is smart this way: It tries to figure out what we coders intend to do,
    and it does that for us.


    This seems like a good place to review the math operators you can use in Python:


    | Operator | Description |

    | :--- | :--- |

    | + | The addition operator, so `print(5+5)` will display 10. |

    | - | The subtraction operator. `print(12-7)` will display 5. |

    | * | You saw this one earlier in this chapter: It''s the multiplication operator,
    and `print(10*3)` will display 30. |

    | / | The division operator. `print(10/3)` will display 3.333 (there will be a
    lot more 3''s than this). |

    | // | This is also a division operator, but this one returns just the whole number,
    not the remainder. `print(10//3)` will display 3. |

    | % | The modulus operator, which is used to get the remainder from a division,
    so `print(10%3)` will display 1. |


    Obviously, these operators can be used in all sorts of code and functions. The
    `print()` statements used as examples here are to help you try the operators,
    if you are so inclined.


    So, why did we use variables to store the dice values in Dice2.py but not in Dice1.py?
    Well, truthfully we could have used variables in both. But variables are only
    needed if the value is to be used more than once. In Dice1.py, the value is used
    only once—when it is displayed—so a variable could have been used but isn''t truly
    necessary. In Dice2.py, the dice values are used twice—once when they are displayed
    and once when they are summed to get their total—and so saving the rolls to a
    variable is required.


    ## CHALLENGE 3.2


    Most dice we use have 6 sides, but some games use dice with more sides. And, actually,
    ancient Greeks and Romans used dodecahedron shaped dice, which have 12 sides!
    So, just in case you ever run into an ancient Greek or Roman, write code that
    rolls a 12-sided die.'
  mdcn: '## Python 让变量变得简单


    在大多数语言中，创建变量时必须告诉计算机你想要的数据类型。Python 在这方面很友好：它会根据你提供的值自动推断数据类型。


    ## 你可以在数据类型之间转换


    在未来的课程中，你将学习如何将数据从一种数据类型转换为另一种，例如，将字符串“3”转换为数字3。


    现在你已经接触了*数据类型*。什么是数据类型？它就是变量可以存储的信息类型。数据类型有很多，但最常用的两种是字符串和数字。`num=11` 创建了一个名为
    `num` 的变量，其数据类型为数字。`lastName = "Forta"` 创建了一个名为 `lastName` 的变量，其数据类型为字符串。


    那么，“3”和3是一样的吗？答案是否定的。前者是字符串，后者是数字，尽管它们看起来一样，但数据类型不同。


    ## 为你的代码添加注释


    在进入本章最后一个示例之前，我们还有一个重要主题需要介绍。


    到目前为止，你编写的代码都非常简单——只有几行。但随着你学习本书中的课程，你将编写数十行甚至数百行的代码。为了让代码更易于阅读和理解，程序员会在代码中添加注释。


    如何添加注释？像这样（这是一个我们之前见过的例子，但这次添加了注释）：


    ```

    # Import needed libraries

    import random


    # Define the choices

    choices=["Heads","Tails"]

    ```


    ```

    # Pick a random choice

    coinToss=random.choice(choices)


    # And display it

    print("It''s", coinToss)

    ```


    在Python中，注释以 # 符号开头。VS Code 会用特定的颜色显示注释，使其非常容易识别。


    重要的是要理解，Python 会完全忽略注释。当 Python 看到 # 时，它会忽略其后的所有内容。注释是给你，程序员看的，而不是给 Python 看的。


    注释可能看起来是在浪费时间。但请相信我们：它真的很重要，优秀的程序员会给所有代码添加注释。为什么？


    - 注释将帮助你阅读自己的代码。

    - 注释将提醒你做了什么以及为什么这样做。

    - 注释帮助他人理解你的代码功能。

    - 注释使其他程序员更容易理解和处理你的代码。

    - 注释可以解释任何假设或依赖关系，即你的代码运行所需的东西。


    注释还有另一个重要用途：它们可以用来隐藏代码。例如，之前你对代码进行了修改，将 choices="HT" 改为 choices=["Heads", "Tails"]。这是一个相当简单的编辑，但想象一下如果是一个更复杂的修改。你可能想在测试新版本时保留旧版本。看看这段代码：


    ```

    # Import needed libraries

    import random


    # Define the choices

    # choices="HT"

    choices=["Heads","Tails"]

    ```


    ```

    # Pick a random choice

    coinToss=random.choice(choices)


    # And display it

    print("It''s", coinToss)

    ```


    注意，原始行 choices="HT" 仍然在文件中。它没有被删除或编辑，而是在前面加了一个 #。这将该行变成了注释，因此会被 Python 忽略。想回到之前的版本吗？从该行移除
    # 符号，并将其放在下一行前面；这样，第二个 choices 行就变成了注释。


    程序员将此称为*注释掉*代码，这是在修改或测试代码时非常宝贵的技术。


    > **新术语**

    > **注释掉** 使用注释来临时隐藏代码，防止其被执行。


    好的，从现在开始，我们所有的代码都将添加注释。


    ## 一个骰子，两个骰子


    让我们看最后一个示例，回顾一下我们到目前为止学到的所有内容。实际上，让我们做两个示例。


    你以前掷过骰子；很多游戏都需要它们。骰子很酷，但电脑骰子更有趣。所以我们将创建两个程序：一个掷一个骰子，另一个掷两个。


    这是 Dice1.py 的代码：


    ```

    # Imports

    import random


    # Roll and print

    print("You rolled a", random.randrange(1, 7))

    ```


    这个程序非常简单，而且都是你以前见过的代码。保存并运行代码。你会看到一个1到6之间的数字（记住，7不会包含在范围内）。


    这里唯一真正的区别是，`random.randrange()` 返回的数字没有保存到变量中。相反，它直接作为参数传递给 `print()`。


    当你需要掷一个骰子时，随时运行这个程序。


    ## 你需要一个变量吗？


    这段代码：


    ```

    import random


    print("You rolled a", random.randrange(1, 7))

    ```


    和这段代码有什么区别？


    ```

    import random


    num = random.randrange(1, 7)

    print("You rolled a", num)

    ```


    在功能上，这两者没有区别。两者都生成一个随机数，然后显示它。


    第一个版本直接在 `print()` 语句中生成随机数。返回值（`randrange()` 生成的数字）作为参数传递给 `print()`。


    第二个版本生成一个随机数并将其保存到名为 `num` 的变量中。是这个变量作为参数传递给 `print()`。


    最终打印的结果是相同的。区别在于变量。仅此而已。


    那么应该使用哪个版本呢？在这种情况下，一个版本相对于另一个版本没有优势。只有当这个随机数需要用于其他目的时，比如另一个 `print()` 或某些计算中，这种区别才重要。那时你肯定需要将生成的数字保存到变量中，以便可以重用它。


    但是当你需要掷两个骰子时怎么办？你可以运行程序两次，然后自己把数字加起来。但是，不，那不是我们程序员会做的。我们会编写另一个程序来掷两个骰子。


    这是 Dice2.py 的代码：


    ```

    # Imports

    import random


    # Roll both dice

    die1=random.randrange(1, 7)

    die2=random.randrange(1, 7)


    # Display total and individual dies

    print("You rolled", die1, "and", die2, "- that''s", die1+die2)

    ```


    运行代码，你会看到两个骰子的值以及它们的总和。


    对于像你这样的 `print()` 和 `random` 专家来说，这段代码应该是不言自明的。它创建了两个变量，每个变量包含一个掷出的骰子的值。`print()`
    语句只是显示这些值，然后执行：


    ```

    die1+die2

    ```


    这是一个简单的数学运算：`die1` 和 `die2` 相加，打印出来的是它们的和。是的，Python 可以即时进行数学运算。


    > **+ 运算符**

    >

    > + 是做什么的？嗯，这取决于数据类型。在我们的掷骰子代码中，`die1` 和 `die2` 都是数字数据类型的变量。因为它们是数字，所以当你使用 `die1+die2`
    时，Python 知道你想将它们相加。

    >

    > 但如果变量是字符串，而你使用了 + 运算符，Python 会将它们连接起来（因为对字符串进行数学加法没有意义）。

    >

    > Python 在这方面很聪明：它试图弄清楚我们程序员想要做什么，并为我们做到这一点。


    这似乎是一个回顾 Python 中可用的数学运算符的好地方：


    | 运算符 | 描述 |

    | :--- | :--- |

    | + | 加法运算符，所以 `print(5+5)` 将显示 10。 |

    | - | 减法运算符。`print(12-7)` 将显示 5。 |

    | * | 你在这个章节前面见过这个：它是乘法运算符，`print(10*3)` 将显示 30。 |

    | / | 除法运算符。`print(10/3)` 将显示 3.333（实际上会有更多的3）。 |

    | // | 这也是一个除法运算符，但它只返回整数部分，不返回余数。`print(10//3)` 将显示 3。 |

    | % | 取模运算符，用于获取除法的余数，所以 `print(10%3)` 将显示 1。 |


    显然，这些运算符可以在各种代码和函数中使用。这里用作示例的 `print()` 语句是为了帮助你尝试这些运算符，如果你愿意的话。


    那么，为什么我们在 Dice2.py 中使用变量来存储骰子值，而在 Dice1.py 中没有呢？嗯，说实话，我们本可以在两个程序中都使用变量。但只有当一个值需要被多次使用时，才需要变量。在
    Dice1.py 中，该值只使用了一次——在显示时——所以可以使用变量，但并非真正必要。在 Dice2.py 中，骰子值被使用了两次——一次在显示时，一次在求和得到总数时——因此需要将掷骰子的结果保存到变量中。


