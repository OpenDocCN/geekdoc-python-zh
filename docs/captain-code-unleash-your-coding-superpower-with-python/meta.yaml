    # Some Tips


    As you will recall, you''ll want to import `datetime` if you are going to use
    dates.


    How do you get today''s date? We did that back in Chapter 3:


    ```

    today=datetime.datetime.now()

    ```


    In this example, `today` is now a variable of type `datetime`.


    So how do you create your own `datetime` variable with your own date? You can
    do this:


    ```

    piday=datetime.datetime(2022, 3, 14)

    ```


    You pass year, month, and day as arguments to `datetime`, and it will create the
    variable for you.


    You can use `print(piday)` to verify that it worked.


    We should point out that here we hard-coded the date. If you prompt the user for
    year, month, and day, you''d pass the variables with those values instead, like
    this:


    ```

    birthday=datetime.datetime(yy, mm, dd)

    ```


    As for the math, calculating the difference between dates? Python makes this super
    easy. Assuming you have two variables, `today` (containing today''s date) and
    `birthday` (containing your next birthday), you can calculate the days in between
    by using simple math, like this:


    ```

    daysUntilBirthday = birthday - today

    ```


    > **Initializing Dates**

    When you create a `datetime` variable, you pass it the year, month, and day, as
    you saw here. These values are required. A date obviously isn''t a valid date
    without year, month, and day.


    If you need to work with times, you can also optionally pass hour, minute, and
    second. If you don''t pass time values, then hour, minute, and second will all
    be 0 (meaning midnight).'
- md: '## CHALLENGE 10.1


    Want to make this a bit more interesting? Asking the user for year, month, and
    date (or hard coding those values) makes the math easier. But, in truth, you only
    need month and day, as you can figure out the year yourself: It is either this
    year if the birthday has not occurred yet or next year if it has.


    So update the code to prompt for a month and day and do the math to figure out
    the year.


    ## Tip Calculator


    Good service at your favorite restaurant warrants a tip. Calculating tip amounts
    involves a little math. And because some people hate math (what is wrong with
    them?), some restaurants print tip amounts on their bills. But that’s the easy
    way to do it, and easy is for wimps, not for coders like us.


    So, your next application will calculate tip amounts based on the bill amount
    and tip percentage.


    ## Program Requirements


    As always, we start with the requirements:


    - Obviously, you need the amount of the bill.

    - You also need the tip percentage. Do you want to hard code this to 15% or 18%
    or 20%? Or do you want to ask the user how much they want to tip? Either way works,
    but decide ahead of time.


    That’s really all we need. The rest is simple math.


    ## Program Flow


    As for program flow:


    - The first thing you need is the bill amount. You also want to make sure that
    the user enters a valid number (or else the math will get ugly).

    - If needed, prompt for the tip percentage.

    - Once you have the amounts you can do the math. You can actually do this right
    in the print() statements, but to make sure the numbers are right, you’ll probably
    want to save them to variables.

    - And finally, print all the information.


    ## Some Tips (Pun Intended)


    You’ll want to build this one incrementally. First, test it with values that are
    hard coded in variables, like this:


    ```

    billAmount = 53.76

    tipPercent = 18.5

    ```


    You’ll also want to do your calculations and save the results to variables, something
    like this:


    ```

    tipAmount = billAmount / 100 * tipPercent

    total = billAmount + tipAmount

    ```


    print() those values to make sure the math is correct.


    And then add the print() statements to display the results. You’ll probably want
    to display the bill amount, the tip amount, and the total.


    Once you know it is working, add your input() statements to set the billAmount
    and tipPercent. And make sure that the users actually enter numbers. This will
    involve the use of if statements at a minimum and possible loops (if you want
    to keep prompting until a user enters a valid numeric value).


    ## CHALLENGE 10.2


    Want to make it more interesting? Here are some ideas:


    - Ask the user to rate the service and pick a tip amount for them based on the
    reply. You can use 15% for average service, 20% (or more) for great service, and
    10% (or less—maybe even 0%) for poor service.

    - Another enhancement would be to help the user split the bill. Ask them how many
    diners there were and then tell the user how much each needs to pay.


    ## Password Generator


    You need passwords. Lots of passwords. And, no, password123 is not a safe password.
    Your name is not a safe password, either. Nor are your pet’s name, your birthday,
    or anything with consecutive numbers.


    You are super security conscious, and you always use really safe passwords like
    4E@:3x&12)PLsx. Right? Good! But creating all those unique passwords is a pain.
    So, like any good coder, you are going to write a program that will generate passwords
    for you.


    ## Program Requirements


    Again, let’s start by clearly defining what the program needs to do:


    - The user should be able to specify a length.

    - What types of characters should the password use? All passwords have letters.
    Should the user be able to specify if they want uppercase and lowercase letters?
    Or should you assume that you’ll always use letters of any case? Either option
    is ok, but decide that as part of your planning.

    - You should ask the user if they want digits (numbers) in their password.

    - You should also ask them if they want special characters (things like & and
    ^).


    ## The World’s Worst (and Most Used) Passwords


    Do you know what the most commonly used passwords are? Unfortunately they are:


    - 123456 (this one is used in over 25,000,000!)

    - 123456789

    - qwerty

    - password

    - 1234567


    Ouch!


    ## Program Flow


    Now let’s define the program flow:


    - Start by displaying welcome text and any instructions.

    - Prompt the user with a series of questions to find out exactly what type of
    password they want (length and types of characters).

    - Start with an empty string for the password.

    - Loop as many times as the needed password length, and each time generate a random
    letter (or digit or symbol) and add it to the password string.

    - When done, show the user their newly generated password.


    Simple, huh? This is all stuff you’ve done before.


    ## Some Tips


    You know how to pick a random letter from a string. You’ve done that many times,
    like this:


    ```

    letter=random.choice("ABCDEFGHIJKLMNOPQRSTUVWXYZ")

    ```


    Well, here’s a really useful shortcut. There’s a library that comes with Python
    called string. It contains stuff you’ll find useful when working with strings.
    And it also defines constants (much like variables, but they can’t change; they
    are read-only) that you can use.


    **NEW TERM**


    **Constant** A *constant* is a value that can never be changed by the program
    (unlike variables, which, as you have seen, can be changed as needed). Some constants,
    like the ones used here, come built into Python. And you can create your own constants,
    too, if needed.


    For example, try this code (use a test file):


    ```

    import string

    print(string.ascii_uppercase)

    ```


    This code imports the `string` library (just like we did with `random` and `datetime`).
    And then it prints `string.ascii_uppercase`. What is that? `ascii_uppercase` is
    a constant in the `string` library that contains all the uppercase characters
    from A to Z.


    Another constant is `ascii_letters`, which contains all the letters from A to
    Z in both uppercase and lowercase. To pick and display a random letter, you can
    use this:


    ```

    import string

    import random


    letter=random.choice(string.ascii_letters)


    print(letter)

    ```


    What other constants are there? In VS Code, type `string.` and wait a moment,
    and you’ll see a pop-up that lists them all:


    ![](img/1725feec73e591598339fc549aaff885_179_0.png)


    Some useful ones are:


    | Constant | Description |

    | :--- | :--- |

    | `ascii_letters` | All letters from A to Z, uppercase and lowercase. `ascii_letters`
    is actually a concatenation of `ascii_lowercase` and `ascii_uppercase`. |

    | `ascii_lowercase` | All lowercase letters from a to z. |

    | `ascii_uppercase` | All uppercase letters from A to Z. |

    | `digits` | All digits from 0 to 9. |

    | `punctuation` | All punctuation characters: `!"#$%&''()*+,-./:;<=>?@[\]^_`{|}~`
    |


    You don’t have to use these constants, but Python provides them, so if they can
    help, why not?


    As for incrementally adding letters to a string, you''ve seen that before, but
    just to remind you:


    ```

    myString = "abc"

    myString += "def"

    print(myString)

    ```


    You can add to a string by using +=. In this example, the string starts off as
    abc, and then def gets added.


    What will the print() display? abcdef


    ## CHALLENGE 10.3


    Ok, heads-up, this one is tricky. But, we have faith in you.


    Have you ever seen websites that give you password rules? They''ll say something
    like “Passwords must be at least 8 characters in length and have at least 1 digit
    and 1 special character.”


    So, suppose the user says yep, I want uppercase, lowercase, digits, and special
    characters in my password. Easy, you pick random characters and build a password.
    Right?


    Well, if you pick random characters from all the options, there is no guarantee
    that you''ll get a digit or a special character. Actually, you may not even get
    letters at all. You could end up with just digits or special characters.


    Ideally, if the user says they want digits, you''ll make sure that there is at
    least 1 digit. Same for special characters.


    So, how could you modify the code to do this?'
