- md: 'It’s a simple analogy, and it is exactly how variables work: You name a variable
    and put information in it, and then you can get that information out at any time.


    ## Creating a Variable


    Let’s try this. Create a new file named Hello3.py. (You don’t need to be reminded
    how to do that anymore. You are a pro already.)


    Then enter this code (putting your own name between the quotes, not mine):


    ```

    firstName = "Shmuel"

    ```


    This code creates a variable named firstName and stores the name you specified
    in it.


    ## Using a Variable


    How do you use the variable you just created? You just refer to it by name. Add
    this line to your code after the line that creates the variable:


    ```

    print(firstName)

    ```


    Now save your code and run it. You’ll see your name printed in the Terminal window
    below.


    Now let’s make it a bit more interesting. Update your code so that it looks like
    this (again, use your name, not mine), and then save and run the code:


    ```

    firstName="Shmuel"


    print("Hello, my name is", firstName, "and I''m a coder!")

    ```


    Okay, there are a few important things to note here.


    Look how many arguments you’re passing to print(). There are three of them. The
    first and last arguments contain text you typed. The middle one is the variable
    firstName, but instead of printing firstName, Python prints the information you
    stored in the firstName variable.


    **Using Whitespace**

    You''ll notice that we added an extra line between the line that created the variable
    and the line with the `print()`. This extra space is known as *whitespace*, and
    it can make your code more readable. Actually, the space after each comma in the
    `print()` function is also whitespace. All whitespace is optional and ignored
    by Python, but it makes the code so much easier to read.


    Also, notice the code coloring. As we mentioned in Chapter 1, VS Code automatically
    colors your code for you. Now, the truth is that code is just text, and it doesn''t
    really have colors. But the colored code is really useful. For starters, color
    makes the code much easier to read. But, more importantly, because all functions
    are in one color, text in another color, and variables in yet another color, you''ll
    spot mistakes quickly because the colors will be off.


    ## Some Important Variable Rules


    Before we go further, there are a couple of important rules you need to know about
    variables in Python:


    - A variable name can contain letters and numbers, but it can''t start with a
    number. So `pet1` is ok to use as a variable name, but `1pet` is not.

    - You can''t have spaces in variable names. If you want multiple words in a variable
    name, you can use mixed case (like we did here with `firstName`) or use an underscore
    (`first_name`, for example).

    - And the most important rule to remember is that variable names are case sensitive.
    What does that mean? It means that if you create a variable named `firstName`,
    you can''t refer to it as `firstname`; they are not the same because one has an
    uppercase character and the other does not. You can try this if you''d like; change
    the `print()` statement so that it refers to `firstname` instead of `firstName`.
    VS Code will realize that you''ve made a mistake and will put a squiggly line
    under `firstname`:


    ```

    Hello3.py 1

    Hello3.py > ...

    1 firstName="Shmuel"

    2

    3 print("Hello, my name is", firstname, "and I''m a coder!")

    ```


    If you mouse over firstname, VS Code will tell you "firstname" is not defined,
    meaning you have tried to use a variable that doesn''t exist.


    Aside from these rules, you are free to name your variables any way you wish.
    And, in general, descriptive names are preferred. So firstName is a great variable
    name because the name makes its use really clear. fn? That''s a far less descriptive
    name. It could mean "free nachos", "Fortnite", "friendly neighbors"... very confusing
    indeed. Using clear, descriptive names is one of the hallmarks of a skilled developer
    (and you always want to look skilled, right?).


    ## Variables, More Variables, and Even More Variables


    Take a look at this code? What do you think it does?


    ```

    firstName="Shmuel"

    firstName="Ben"


    print("Hello, my name is", firstName, "and I''m a coder!")

    ```


    > **Variable Names Are Case Sensitive**

    Because variable names are case sensitive, you could actually create multiple
    variables that only differ by case. For example, you could do this:


    FirstName="Shmuel"


    firstname="Ben"


    Word of advice: Don''t. Keep your variable names nice and distinct. Doing so will
    prevent you from spending hours trying to figure out why something isn''t working.


    Actually, why don''t you try it? Modify your Hello3.py code so that firstName
    gets set twice.


    Save your code and run it. What is displayed? Does it do what you expected?


    The first line, firstName="Shmuel", creates a variable named firstName and puts
    the name Shmuel in it. The second line, firstName="Ben", doesn''t create a variable,
    nor does it add "Ben" to the existing variable. Rather, it overwrites the first
    value, replacing "Shmuel" with "Ben".


    Ok, one last example. We''ll call this one Hello4.py (again, use your own name,
    not mine):


    ```

    firstName = "Shmuel"

    lastName = "Forta"

    fullName = firstName + " " + lastName


    print("Hello, my name is", fullName, "and I''m a coder!")

    ```


    Save the code and run it. What''s happening here?


    Python processes the code one line at a time. So the first thing it does is create
    a variable called firstName and store a value in it. The next line tells Python
    to create a variable called lastName, and a value is stored in that variable,
    too.


    > **TIP**

    **Save As Can Save You Time** Here''s a useful tip. File Hello4.py is basically
    Hello3.py with some changes. You can create a new file and type the code as you''ve
    done thus far. Or, when you have Hello3.py open, use the File menu and select
    Save As to make a copy named Hello4.py and then edit that.


    **How Many Values Can a Variable Store?**

    As you can see, variables store one value at a time. Storing a second value? That
    replaces the first one. One value at a time. But, there are actually special types
    of variables that can store multiple values. You''ll use these in future chapters.


    The third line is interesting. It creates a new variable called fullName and stores
    a value in it. What is the value? It is made up of three parts, all joined together
    using + signs. It uses firstName, adds an empty space (that’s what " " is), and
    then adds lastName. So if firstName is "Shmuel" and lastName is "Forta", fullName
    will be "Shmuel Forta". And that’s what is used as the second argument in print().


    > **NEW TERM**

    **Concatenation** Joining variables together like this is called concatenation.
    That’s a good word to use when you want to sound really smart.


    ## Getting User Input


    You’re an expert at using print(), so now let’s introduce a new function. As its
    name suggests, input() is used to ask the user to input something.


    Create a new file named Hello5.py and type the following code:


    ```

    name=input("What is your name? ")

    print("Hello", name, "nice to meet you!")

    ```


    Save the file and run it.


    Your code will run in the Terminal window. It will display **What is your name?**
    and will wait for you to type a response right there in the Terminal window. When
    you respond and press Enter, the print() function will greet you by name.


    As you can see, input() accepts text to be displayed, just like print(). But input()
    does something else, too: it obtains input from the user. Remember that Python
    runs your code line by line. When it gets to an input(), it stops processing,
    waits for the user to type something, and then continues. And whatever the user
    typed at the prompt is provided for you to use. This is called *returning a value*,
    and the value that input() *returns* can be saved to a variable, as we are doing
    here. This way, the variable name contains whatever the user typed in the Terminal
    window.


    ## Where’s the Variable?


    Look at this line of code:


    ```

    input("What is your name? ")

    ```


    What do you think is wrong with it? Well, the code is actually valid. Run it,
    and it’ll prompt for input. But this input() will prompt the user to type something
    but not actually save it anywhere probably not what is intended. That’s why we
    used name=input(), as that tells Python to save whatever input() returns into
    name.


    print(), on the other hand, doesn’t return anything, so there is never a reason
    to assign it to a variable.


    > **TIP**

    **Watch Where You Click** When responding to an input() prompt, make sure to click
    in the Terminal window before typing. Otherwise, your cursor may be in the editor
    window, in which case you may edit your code by mistake.


    ## CHALLENGE 2.1


    The only way to become Captain Code is to write code. The more code you write,
    the better a coder you’ll become. The lessons and examples we’ll study together
    are a good starting point, but you really need to be writing your own code as
    well. So, throughout this book, you are going to see Challenge sections like this
    one. These sections will suggest things for you to try, based on the lessons we’ve
    already studied together, but we’ll not be giving you the solutions; those are
