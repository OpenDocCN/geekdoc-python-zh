  md: "# The update() Method\n\nYou can update dictionary items by just assigning\
    \ new values, like this:\n\n```\npet[\"mealsPerDay\"] = 2\n```\n\nIn addition,\
    \ you can also use the update() function to do this:\n\n```\npet.update({\"mealsPerDay\"\
    : 2})\n```\n\nWhy would you ever want to use update() when a simple assignment\
    \ works? update() can be used to update multiple name:value pairs at once.\n\n\
    Updating dictionary files is easy. This is the code for file Dict2.py:\n\n```\n\
    pet = {\n    \"animal\": \"Iguana\",\n    \"name\": \"Iggy\",\n    \"food\": \"\
    Veggies\",\n    \"mealsPerDay\": 1\n}\n\npet[\"mealsPerDay\"] = 2\n\nprint(pet[\"\
    name\"], \"eats\", pet[\"mealsPerDay\"], \"meals\")\n```\n\nThis code creates\
    \ the same dictionary as before but then updates the mealsPerDay item. Run this\
    \ code, and it'll display: Iggy eats 2 meals.\n\nSome other dictionary functions\
    \ you may find useful are:\n\n| Function | Description |\n| --- | --- |\n| clear()\
    \ | Remove all items from a dictionary. |\n| copy() | Make a copy of a dictionary.\
    \ |\n| keys() | Return a list of all dictionary keys. |\n| values() | Return a\
    \ list of all dictionary values. |"
