    \ of style when computers were given the ability to display graphics and images.\
    \ But they are still lots of fun to play, and even more fun to create.\n\n**We're\
    \ Getting You Started**\nWe should point out that the game we'll create together\
    \ will be very simple; players could complete it in just a few minutes. But, by\
    \ using the techniques you'll learn in this section (and by completing the Challenges),\
    \ you'll have all the tools and skills you need to complete this game—or create\
    \ one of your own. And, actually, we'll wrap up this part of the book with ideas\
    \ about where to go next so you can really take your game to the next level.\n\
    \n**Story Starters**\nIf you are struggling to come up with a good story idea\
    \ for your game, visit the book web page by scanning this QR code. We've created\
    \ a few (deliberately incomplete) story starters that you can use as, well, a\
    \ starting point.\n\n> **TIP**\n**Write Your Own Game** We really want you to\
    \ write your own game, not just copy ours. If it helps, feel free to use ours\
    \ as a starting point. But this will be a whole lot more useful (and fun) if you\
    \ go crazy and invent your own storyline.\n\nA text-based adventure game is usually\
    \ a series of locations. Each location has a description and things the player\
    \ can do.\n\nSo, to start things off, we need a way to display locations, and\
    \ a way to prompt users for what they want to do. And, fortunately, we know how\
    \ to do both. Right?\n\n## Game Structure\n\nWe're not going to start coding just\
