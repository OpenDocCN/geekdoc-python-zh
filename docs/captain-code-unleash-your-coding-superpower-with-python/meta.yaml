    \ if none of the `if` or `elif` tests are `True`. The only way that could happen\
    \ is if the user didn't enter R, P, or S, so the message reflects that.\n\nAnd\
    \ that's the game!\n\n> **Users Never Follow Instructions**\nOur code asked the\
    \ user to enter R, P, or S, and we added an `else` to our `if` that would only\
    \ ever get executed if the user entered something other than R, P, or S.\n\nThis\
    \ is generally a good idea. Users tend to be lousy at following directions. You,\
    \ the coder, should always assume that your users won't follow instructions, expect\
    \ that, and write code that anticipates and handles the situation. That way, your\
    \ code won't break due to user error."
- md: "## One Last Tweak\n\nThe game is done. Each time you play you have equal chances\
    \ of winning, losing, or tying. Well...\n\nLook around, make sure no one is watching\
    \ for this part. Seriously. We’re about to go all super-villain on the code. Ready?\
    \ Ok. As the coder, you have complete control over the app, and, not that we’d\
    \ ever condone such behavior, but you can use that control to give yourself an\
    \ edge.\n\nLet’s start by personalizing the game. Add this code after the `import`\
    \ line, before the computer’s choice:\n\n```python\n# Ask the user for their name\n\
    name=input(\"What is your name?: \")\n```\n\nNow update the line before the input\
    \ to personalize it, like this:\n\n```python\nprint(\"Hello\", name, \"let's play\
    \ Rock, Paper, or Scissors\")\n```\n\nNow when you run the game, it asks the user\
    \ for their name and greets them.\n\nSo nice and friendly to personalize the game.\
    \ Or is it?\n\nNow that the code knows who the user is, it can <ahem> *adjust*\
    \ the computer’s choice based on what the user entered. ;-)\n\nAdd this code after\
    \ the user `input()` lines and before `# Compare choices` (and you’ll want to\
    \ use your name there, not mine):\n\n```python\n# TOP SECRET CODE\nif name ==\
    \ \"Ben\":\n    if uChoice == \"R\":\n        cChoice = \"S\"\n    elif uChoice\
    \ == \"P\":\n        cChoice = \"R\"\n    elif uChoice == \"S\":\n        cChoice\
    \ = \"P\"\n```\n\nSave the code and run it. Now the odds are firmly stacked in\
    \ your favor. If you play (your name is entered) you’ll win every time. Everyone\
    \ else? They get the same one-out-of-three odds.\n\nSo, what does the code we\
    \ added actually do? It starts with an if statement that checks to see who you\
    \ are. If your name was entered (that’s what gets stored in the variable name),\
    \ Python runs the code that is indented. If not, it skips all of the indented\
    \ code.\n\nThe indented code is interesting. It is another if statement, but this\
    \ one is indented so that it is inside of the first one. It’s an if statement\
    \ inside of an if statement, and coders call this a *nested if statement*. The\
    \ if and elif statements look to see what the user entered (uChoice) and then\
    \ ... well, let’s call it a tweak, right? ... it tweaks the computer choice (cChoice)\
    \ so that the computer will always lose, and you’ll always win. The program still\
    \ picks a random choice, we just overwrote it with one that helps you win.\n\n\
    Try this code with family or friends. They’ll be amazed at your luck.\n\n> **NEW\
    \ TERM**\n> **Nested** When an if statement is inside of another if statement,\
    \ we call it *nested* (kind of like Russian Nesting Dolls). In future chapters,\
    \ you’ll see other commands that can be nested.\n\n## CHALLENGE 5.1\n\nYou wouldn’t\
    \ want someone else with the same name getting the same advantage. How could you\
