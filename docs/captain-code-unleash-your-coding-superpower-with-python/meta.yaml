  - '[PAGE 319]


    Next comes a for loop, which checks to see if any events have occurred that we
    need to respond to in our game. What are events? They could be a key pressed or
    a mouse button clicked. If those occurred, your code would need to respond accordingly.
    The only event we need to respond to right now is the QUIT event, which means
    the player closed the game window.


    pygame.event.get() returns a list of events that need to be responded to (if there
    are any), and that gets passed to a for loop, which iterates through those events,
    like this:


    ```

    for event in pygame.event.get():

