  md: '# Functions Revisited


    You know what functions are. You''ve seen and used lots of them: `input()`, `print()`,
    `int()`, `now()`, `upper()`, `choice()`, and many others.


    As a reminder, a function is made up of three parts:


    | Part | Description | Required | Example |

    | :--- | :--- | :--- | :--- |

    | Name | The unique function name | Yes | An example is `print()`. The name is
    how you call the function when you want to use it. The function name must always
    be followed by parentheses. This is required. |

    | Arguments | One or more values passed into the function | No | If you write
    `print("Hello", firstName)`, then `print()` is being passed two arguments: a string
    containing the text Hello and a variable named `firstName`. Not all functions
    accept arguments; `print()` and `input()` do as you have seen, but `upper()` and
    `now()` do not. |

    | Return | Value sent back to whatever called the function | No | One example
    you''ve used many times is `input()`, which prompts the user to type something
    and then returns what the user typed to you. `firstName=input("What is your name?")`
    prompts for a value, which is returned and saved into a variable (here `firstName`).
    Some functions return results; others (like `print()`) don''t. |


    Remember this. We''ll frequently be referring to function names, arguments, and
    return values, so don''t mix them up.


    > **Methods Are Functions**

    As you learned in Chapter 4, functions in a class are called *methods*. So, technically,
    `now()` is not a function but a method within the `datetime` class. But, methods
    are indeed functions, so to keep things simple, we''re just going to refer to
    functions here. Just keep in mind that the rules and best practices for creating
    functions apply to methods, too.'
