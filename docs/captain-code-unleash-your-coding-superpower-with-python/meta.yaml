    # Acknowledgments


    Ben Forta


    It’s hard to believe that I’ve been writing and publishing for 25 years! Pearson
    was the publisher for my very first book back in 1996, and since then we’ve collaborated
    in creating and publishing over 40 titles. Together we have educated and inspired
    developers (and future developers) the world over. Looking back over a quarter
    of a century, I can truly say thank you for all these years of dedication and
    support. This book is the first I’ve written for young people, so extra thanks
    for trusting our vision and giving us authors the freedom and flexibility to create
    this title as we saw fit.


    In particular, thanks to Kim Spencely for shepherding this title from concept
    to fruition, and to Chris Zahn for (once again) providing his development expertise.


    For the past few years I’ve had the pleasure of leading a Robotics class at Farber
    Hebrew Day School in Southfield, MI. When COVID wreaked havoc on teaching, we
    pivoted to online classes and I used the opportunity to improve my students’ coding
    skills by teaching them Python. Those students were my guinea pigs, and those
    lessons were the impetus for this title. So, thank you FHDS for giving me the
    opportunity to inspire your students, and thank you students for helping me learn
    how to best teach you.


    Thanks to our son Eli, a super talented designer and up-and-coming architect,
    for creating the image assets provided with this book.


    And finally, thanks to our son Shmuel, a brilliant engineer, passionate educator,
    and my collaborator on this title. I’ve worked with co-authors on about half of
    my books, and, if I’m being honest, I’d much rather write all by myself. This
    collaboration was an exception. Shmuel’s experience helped shape this volume,
    his insights can be felt on every page, and working with him has been a source
    of joy and pride. Thank you!'
  - '[PAGE 13]


    # Shmuel Forta


    Writing this book was an exciting and humbling experience for me. I am honored
    to have been given the opportunity to share with the world what I have been teaching
    seventh and eighth graders for half a decade.


    I’d like to give a special thank you to Pearson. Their trust in our writing process
    allowed us to create this book without compromising our vision. An extra special
    thanks to Kim Spencely and Chris Zahn, without whom this book would not have been
    written, edited, or published.


    I would also like to thank my wife, Chana Mina, for…well…everything. Thank you
    for putting up with me in general (a feat in and of itself); I know that writing
    this book took up a significant amount of my time, but you were always there for
    me. Without your support (as well as your recommendations for this publication),
    I don’t know where I’d be. Thank you for being you.


    A special thank you to my family: Mom, my siblings, and my in-laws for helping
    me and supporting me through everything, as well as for the encouragement and
    strength you gave me to compose this book.


    Finally, a special (though that word doesn’t even start to express it) thank you
    to my father and co-author. When I was under the age of 10, Dad got me started
    on coding with Visual Basic. Some of my fondest memories are of me and my Dad
    huddled over the old laptop that I was using, while my Dad patiently tried to
    steer me toward finding the bug in my code (an ‘=’ instead of an ‘==’). I remember
    the sheer joy of running downstairs to show Dad my number guessing game, my inefficient
    calculator using drop-down menus, and later my first graphical game (an overhead
    space shooter). The unbridled excitement of child Shmuel from his creations could
    only be matched by my Dad’s pride and love of my work. Dad’s enthusiasm, encouragement,
    and unparalleled support are responsible for my love of coding. I now have met
    many talented programmers with a variety of skills, but few actually love coding
    the way that Dad or I do. And my love for coding was shared with me by my Dad.
    I can’t thank you enough for collaborating on this title with me, but even more
    importantly, for raising me to be who I am today and sharing your love of programming
    with me.'
- md: '## About the Authors


    **Ben Forta** is, first and foremost, an educator who has been teaching in some
    capacity since he was a teenager (many centuries ago). He is Adobe’s Senior Director
    of Education Initiatives, and has over three decades of experience in the technology
    sector in product development, support, training, and product marketing. Ben is
    the award-winning author of more than 40 books, some of which have been translated
    into 16 languages, and many of which have become college textbooks. Through his
    books, lectures, lessons, and videos, Ben has taught coding skills to over a million
    people. Ben lives in Oak Park, MI, with his wife Marcy and their children. He
    welcomes your emails at ben@forta.com and invites you to visit him online at http://forta.com/.


    **Shmuel Forta** is an engineer, coder, maker, tinkerer, and teacher. He is a
    software developer at General Motors and has years of programming experience,
    including both writing and instruction of code. He has been teaching Python coding
    to middle school students for more than five years. Shmuel has a Master’s Degree
    in Biomedical Engineering from the University of Michigan and has published research
    work in IEEE. Shmuel lives in Oak Park, MI, with his wife Chana Mina. He would
    be happy to respond to any questions or comments via email at shmuel@forta.com.


    ## INTRODUCTION


    We need you to talk in a deep voice, the deepest you can manage. Actually, a deep
    loud whisper would work well. And talk slowly. Got it? Ok, read the next paragraph:


    *Legend tells of individuals with astounding powers. Scattered around the globe
    they have been endowed with the ability to bring the inanimate to life. Issuing
    instructions in varied languages, they can bend machines near and far to their
    will, making them do their bidding. These individuals are awesome and powerful,
    for they are...coders!*


    <ahem> Sorry!


    Ok, so we may have gotten a bit carried away there. But, coders are indeed awesome
    and powerful. We should know; we''re coders, and we think that we''re pretty awesome
    and powerful (if we do say so ourselves). The truth is, for most of us, the closest
    we''ll ever get to being Gandalf, Bruce Wayne, Luke Skywalker, Queen Elsa, Tony
    Stark, Wonder Woman, or Deadpool is mastering coding and developing the ability
    to command machines to do our bidding.


    Yep, it''s pretty heady stuff, we know. But, truthfully, that''s what coding is.
    Which means superpowers are quite attainable.


    In this book we''ll help you hone these skills. You''ll learn coding. But, more
    importantly, you''ll learn how to be a coder.


    But first, why? Why learn coding at all? If you ask around or search online you''ll
    find various answers to that question.


    The most common answer is that coding is important because it is a future-ready
    skill. This means that if you can code, you''ll have an easier time finding a
    good job in the future. And while there may be some truth to that assertion, honestly,
    we don''t think that''s the best reason to learn to code. Why?


    ## CAPTAIN CODE: Unleash Your Coding Superpower with Python


    For starters, not everyone needs to work as a coder. That makes about as much
    sense as everyone being a doctor, or everyone being a chef, or everyone being
    a teacher, or everyone being a pilot, or everyone being a plumber running through
    pipes to save a princess...you get the idea. To function properly, society needs
    lots of different people doing lots of different things. Sorry, but humanity just
    does not need 8 billion coders.


    In addition, the tech space (and that includes coding) changes really quickly.
    What coders do now is not the same as what they did 10 years ago, and what they’ll
    do 10 years from now will be even more different. So, what you learn today is
    not what you’ll be doing as a coder in the future. The best coders never stop
    learning, evolving, or developing skills. The basics you’ll learn in this book
    will remain relevant and useful, but the specifics change, and frequently. With
    coding there’s no learn-it-and-done; it’ll be a mistake to invest time and energy
    assuming otherwise.


    But most importantly, if you’re interested in coding primarily from a future career
    perspective, it’ll feel like work rather than fun. If it’s not fun then you won’t
    enjoy it; you’ll be unlikely to stick with it, and you definitely won’t be motivated
    to really give it your all. And that would be a shame, because coding really is
    a lot of fun.


    That’s not to say there aren’t good jobs in coding. There are, and there will
    be for many decades to come. But a future career should not be the only reason
    to become a coder.


    So, why should you learn to code? And should everyone do so? We believe everyone
    should learn to code, even if they have no intentions of pursuing careers in coding.
    We believe this just like we believe that everyone should draw and sketch, and
    everyone should play an instrument, and everyone should cook, and everyone should
    take pictures and shoot videos, and more. All of these are creative endeavors,
    which means that they are ways to actually create stuff, and creating stuff is
    incredibly rewarding and satisfying. Sure, it’s fun to spend hours on your phone
    looking at what other people have created; but that’s nothing compared to the
    joy and satisfaction of creating stuff that other people consume and use.


    And, on top of that, when you learn to code, you develop all sorts of invaluable
    skills and traits beyond just coding. These include planning, problem solving,
    communication, logic, empathy, attention to detail, patience, resilience, persistence,
    and creativity.


    Oh, and back to jobs and careers—it turns out that these skills (especially creativity
    and creative problem solving) are some of the most in demand out there. So, yes,
    coding will indeed help your future career, even if you don’t become a coder.


    Great, so you should learn coding. But where to start? In our experience, too
    many books, videos, and lessons overly focus on the mechanics of coding—things
    like syntax and exact details of how to use specific language elements. They get
    caught up in the minute details of specific projects. It all feels a whole lot
    like being talked to, as opposed to being encouraged to tinker and play. And that’s
    boring. As in really enthusiasm-draining, soul-crushingly, yawn-inducingly boring.
    It’s kinda like spending hours and hours learning dictionary words and grammar
    and then getting to use those by copying someone else’s writing, and not being
    given the chance to find your own words and voice. That’s crazy, right? And yet
    that’s how most people are first introduced to coding.


    We’ve been teaching coding for many years. In fact, we’ve helped over a million
    people become coders, including lots of young people your age. And we know how
    to help you develop these skills—we do it the same way we taught ourselves to
    code. It’s fast, fun, results oriented, and it works.


    And that’s why we wrote this book, to help you learn to code; and, more importantly,
    to discover your coding superpower and turn you into a coder.


    ## What’s in This Book


    In this book we don’t just teach you how to code; lots of books do that. Some
    even do a pretty good job of it, too.


    No, learning to code is not enough. Instead, we’re going to help you learn how
    to think like a coder, analyze problems like a coder, plan like a coder, progressively
    iterate like a coder, craft elegant solutions like a coder ... In fact, when we’re
    done we’ll have morphed you into <drumroll> a coder!


    To that end, this book is quite different from others you may have read. We built
    it to help you become a coder quickly while having fun, too.


    We divided this book into three sections that build upon each other. Here’s how
    it all works.


    ## Part I: It’s All Fun and Games


    In this section, we cover some basics (and some not so basics, too). By the time
    you’re done with the section, you will have learned every major coding concept,
    and you’ll have the knowledge you need to write just about any application.


    This section is made up of 10 chapters:


    - Chapter 1 will help you get up and running, including helping you install needed
    software and getting it ready to use.

    - In Chapters 2 through 7 you’ll create small games and other programs, lots and
    lots of them. Each chapter will introduce new coding concepts that you’ll utilize
    immediately in a new project. And in each chapter you’ll get a chance to tweak,
    tinker, and make the code your own.

    - Then things will get a bit more sophisticated, and you’ll create a more complex
    game starting in Chapter 8 and finishing it in Chapter 9.

    - In Chapter 10 we’ll wrap this section with all sorts of ideas for you to try
    yourself.


    We designed these chapters so that they build upon each other; skills you develop
    in one chapter will help you in subsequent chapters. But we also designed these
    chapters to be short and focused, and so you’ll mostly write small standalone
    programs in each.


    You’ll want to take your time working through this section. Try every lesson and
    example yourself, tinker, tweak, play. Make changes to the code we provide and
    see what happens to the program. You can’t break it because you can always undo
    it! The stuff you’ll learn here is what you’ll use most, be it while working through
    this book or in any future projects.


    ## Part II: On an Adventure


    No more kiddie pool, you’re in the deep end now. In this section you’ll create
    a bigger (and more fun) game. We’ll start slow, and incrementally add functionality.
    What kind of game? A cool retro-style text-based adventure game that will seriously
    impress family and friends, and one that you can make complex enough to make hardcore
    gamers cry.'
  mdcn: '## 关于作者


    **本·福特**首先是一位教育家，从青少年时期（那是很多个世纪前的事了）就开始以各种形式从事教学工作。他是Adobe教育计划高级副总裁，在科技领域拥有超过三十年的产品开发、技术支持、培训和产品营销经验。本是四十多本书的获奖作者，其中一些已被翻译成16种语言，许多已成为大学教科书。通过他的书籍、讲座、课程和视频，本已向超过一百万人教授了编程技能。本与妻子玛西和孩子们居住在密歇根州的奥克帕克。欢迎通过ben@forta.com给他发送电子邮件，并邀请您在线访问http://forta.com/。


    **什穆埃尔·福特**是一位工程师、程序员、创客、修补匠和教师。他是通用汽车的软件开发人员，拥有多年的编程经验，包括编写和教授代码。他教授中学生Python编程已有五年多。什穆埃尔拥有密歇根大学生物医学工程硕士学位，并在IEEE上发表过研究论文。什穆埃尔与妻子查娜·米娜居住在密歇根州的奥克帕克。他很乐意通过电子邮件shmuel@forta.com回复任何问题或评论。


    ## 引言


    我们需要你用低沉的声音说话，尽可能低沉。实际上，低沉而响亮的耳语效果会很好。并且要慢慢说。明白了吗？好的，请阅读下一段：


    *传说中有一些拥有惊人力量的人。他们散布在全球各地，被赋予了赋予无生命之物以生命的能力。他们用各种语言发出指令，能够驾驭远近的机器，让它们服从自己的意愿。这些人既令人敬畏又充满力量，因为他们是……程序员！*


    <ahem> 抱歉！


    好吧，我们可能有点得意忘形了。但是，程序员确实既令人敬畏又充满力量。我们应该知道；我们是程序员，我们认为自己相当令人敬畏和充满力量（如果我们这么说的话）。事实是，对我们大多数人来说，我们最接近成为甘道夫、布鲁斯·韦恩、卢克·天行者、艾莎女王、托尼·斯塔克、神奇女侠或死侍的方式，就是掌握编程并培养指挥机器服从我们意愿的能力。


    是的，我们知道这相当令人兴奋。但说实话，这就是编程的本质。这意味着超能力是相当容易获得的。


    在本书中，我们将帮助你磨练这些技能。你将学习编程。但更重要的是，你将学习如何成为一名程序员。


    但首先，为什么？为什么要学习编程？如果你四处询问或在线搜索，你会发现这个问题的各种答案。


    最常见的答案是编程很重要，因为它是一项面向未来的技能。这意味着如果你会编程，将来找到一份好工作会更容易。虽然这种说法可能有些道理，但老实说，我们认为这不是学习编程的最佳理由。为什么？


    ## 代码队长：用Python释放你的编程超能力


    首先，并非每个人都需要从事程序员的工作。这就像每个人都成为医生，或者每个人都成为厨师，或者每个人都成为教师，或者每个人都成为飞行员，或者每个人都成为在管道中穿梭拯救公主的水管工……你明白我的意思。为了正常运作，社会需要许多不同的人做许多不同的事情。抱歉，人类确实不需要80亿程序员。


    此外，科技领域（包括编程）变化非常快。程序员现在所做的与10年前所做的不同，而10年后他们所做的将更加不同。因此，你今天所学的并不是你将来作为程序员要做的。最优秀的程序员从不停止学习、进化或发展技能。你将在本书中学到的基础知识将保持相关性和实用性，但具体细节会变化，而且变化频繁。在编程领域，没有一劳永逸；投入时间和精力假设如此将是一个错误。


    但最重要的是，如果你主要从未来职业的角度对编程感兴趣，它会感觉像是工作而不是乐趣。如果它不有趣，你就不会享受它；你不太可能坚持下去，你肯定不会有动力真正全力以赴。那将是一种遗憾，因为编程确实非常有趣。


    这并不是说编程领域没有好工作。有，而且未来几十年都会有。但未来的职业不应该成为成为程序员的唯一理由。


    那么，你为什么要学习编程？每个人都应该这样做吗？我们相信每个人都应该学习编程，即使他们没有打算从事编程职业。我们相信这一点，就像我们相信每个人都应该绘画和素描，每个人都应该演奏乐器，每个人都应该烹饪，每个人都应该拍照和拍摄视频等等。所有这些都是创造性努力，这意味着它们是实际创造东西的方式，而创造东西是极其有益和令人满足的。当然，花几个小时在手机上查看别人创造的东西很有趣；但这与创造别人消费和使用的东西所带来的快乐和满足感相比，根本不算什么。


    而且，除此之外，当你学习编程时，你培养的各种宝贵的技能和特质远不止编程本身。这些包括规划、解决问题、沟通、逻辑、同理心、注重细节、耐心、韧性、坚持和创造力。


    哦，回到工作和职业——事实证明，这些技能（尤其是创造力和创造性解决问题的能力）是目前最需要的技能之一。所以，是的，编程确实会帮助你的未来职业，即使你不成为程序员。


    很好，所以你应该学习编程。但从哪里开始呢？根据我们的经验，太多的书籍、视频和课程过于关注编程的机制——比如语法和如何使用特定语言元素的精确细节。它们沉迷于特定项目的微小细节。这一切感觉很像是在被说教，而不是被鼓励去尝试和玩耍。这很无聊。就像真的会耗尽热情、摧毁灵魂、令人打哈欠的无聊。这有点像花几个小时学习字典单词和语法，然后通过复制别人的写作来使用它们，却没有机会找到自己的词汇和声音。这很疯狂，对吧？然而，大多数人最初接触编程就是这样。


    我们教授编程已经很多年了。事实上，我们已经帮助超过一百万人成为程序员，包括很多和你年龄相仿的年轻人。我们知道如何帮助你发展这些技能——我们用教自己编程的同样方式来做这件事。它快速、有趣、以结果为导向，并且有效。


    这就是我们写这本书的原因，帮助你学习编程；更重要的是，发现你的编程超能力，将你变成一名程序员。


    ## 本书内容


    在本书中，我们不仅教你如何编程；很多书都这样做。有些甚至做得相当好。


    不，仅仅学习编程是不够的。相反，我们将帮助你学习如何像程序员一样思考，像程序员一样分析问题，像程序员一样规划，像程序员一样逐步迭代，像程序员一样设计优雅的解决方案……事实上，当我们完成时，我们将把你变成<鼓声>一名程序员！


    为此，本书与你可能读过的其他书有很大不同。我们构建它是为了帮助你快速成为程序员，同时也能享受乐趣。


    我们将本书分为三个相互关联的部分。以下是整个工作原理。


    ## 第一部分：充满乐趣和游戏


    在本节中，我们涵盖了一些基础知识（以及一些不太基础的内容）。当你完成本节时，你将学习每个主要的编程概念，并拥有编写几乎任何应用程序所需的知识。


    本节由10章组成：


    - 第1章将帮助你开始并运行，包括帮助你安装所需的软件并使其准备就绪。

    - 在第2章到第7章中，你将创建小型游戏和其他程序，很多很多。每章将介绍新的编程概念，你将在新项目中立即使用它们。在每一章中，你都有机会调整、修补并使代码成为你自己的。

    - 然后事情会变得更复杂一些，你将从第8章开始创建一个更复杂的游戏，并在第9章完成它。

    - 在第10章中，我们将以各种想法结束本节，供你自己尝试。


    我们设计这些章节是为了让它们相互关联；你在一章中发展的技能将帮助你在后续章节中。但我们也设计这些章节简短而专注，因此你大部分时间将在每章中编写小型独立程序。


    你需要花时间完成本节。尝试每个课程和示例，自己动手，修补、调整、玩耍。对我们提供的代码进行更改，看看程序会发生什么变化。你不会破坏它，因为你总是可以撤销它！你在这里学到的东西是你最常用的，无论是在学习本书的过程中还是在任何未来的项目中。


    ## 第二部分：冒险之旅


    不再是儿童泳池，你现在进入了深水区。在本节中，你将创建一个更大（更有趣）的游戏。我们将从慢速开始，并逐步增加功能。什么样的游戏？一个很酷的复古风格文本冒险游戏，它会给家人和朋友留下深刻印象，而且你可以让它变得足够复杂，让硬核玩家都为之哭泣。'
