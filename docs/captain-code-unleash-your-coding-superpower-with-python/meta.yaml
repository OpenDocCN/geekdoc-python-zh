  md: "# Optimizing Your Code\n\nAs we've previously discussed, before you start coding,\
    \ you plan your application. The planning is critical, and the more you plan,\
    \ the easier it'll be to actually write your code. But, even with the best planning,\
    \ once you start coding, you are inevitably going to discover ways to improve\
    \ your code.\n\nWhat type of improvements? Things like:\n\n+   - Processing that\
    \ can be moved elsewhere to make your code cleaner and simpler\n- Removing duplicated\
    \ code\n- Identifying functionality that can be isolated from your main code so\
    \ that it can be reused\n- Improving specific processing for simplicity or performance\n\
    \nThese are just a few types of improvements, and there are many more.\n\nWith\
