- md: "## Displaying the Inventory\n\nOne last point about inventories: Most games\
    \ give you a way to check what you are holding. This is pretty easy to do. Add\
    \ this function to the end of Inventory.py:\n\n```python\n# Display inventory\n\
    def display():\n    print(\"*** Inventory ***\")\n    print(\"You have\", numCoins(),\
    \ \"coins\")\n    if hasStructureKey():\n        print(\"You have a key that flashes\
    \ blue\")\n    print(\"*****************\")\n```\n\nThis code is pretty simple.\
    \ It defines a function named display(), which prints the current inventory contents.\
    \ Notice that it uses the wrapper functions as opposed to accessing inv dictionary\
    \ items directly. This is the preferred way to do things. Why? Well, imagine that\
    \ you wanted to format coins a specific way or needed to perform any calculations\
    \ (temporary multipliers on food or energy, for example). Always accessing items\
    \ the same way ensures that you'll always execute the code you want.\n\nSo, how\
    \ do we display the inventory? Just call the display() function. For example,\
    \ if you added this to the choices in doStart():\n\n```python\n[\"I\", \"Inventory\"\
    ]\n```\n\nYou could then add this to the processing:\n\n```python\nelif choice\
    \ == \"I\":\n    inv.display()\n    doStart()\n```\n\nThis way, if the user selects\
    \ I, you display the inventory and then redisplay the doStart() options.\n\nYes,\
    \ doStart() is calling doStart(). That's allowed, and it's called recursion.\n\
    \n**NEW TERM**\n**Recursion** *Recursion* is when code calls itself—for example,\
    \ a function named doStart() calling doStart(). Recursion is allowed, and, when\
    \ used properly, is super powerful.\n\n## CHALLENGE 15.1\n\nYou now have everything\
    \ you need to define a complete inventory system. Identify places in your game\
    \ where you'll use additional inventory items. Add them to the inventory and create\
    \ the appropriate wrapper functions.\n\n## Summary\n\nIn this chapter, you've\
    \ learned how to use Python's dictionaries to store related items. You've used\
    \ a dictionary and wrapper functions to create an inventory system. And you've\
    \ seen how to work with the inventory inside of your game.\n\n# CHAPTER 16\n\n\
    ## Keeping It Classy\n\nYou now have a functioning inventory system that allows\
    \ players to obtain, carry, and use items. And your game can adapt based on inventory\
    \ items. The next thing you need is a player management system. To create this,\
    \ we'll introduce you to classes, which are the focus of this chapter.\n\n## The\
    \ Player System\n\nIn Chapter 15, you used a dictionary to create an inventory\
    \ system. We used that to hide a key that the player needed to find in order to\
    \ unlock the door.\n\nBut, let’s be honest, we did a pretty lousy job of hiding\
    \ the key. A player can just go to the boulders, and—ta-da!—there it is. In a\
    \ real game, you’d typically create some sort of puzzle that must be solved before\
    \ the key would be discoverable; you might require another item, like a shovel,\
    \ to be found first, or make the key appear only after a series of steps are performed\
    \ in order, or make it available via an in-game trade.\n\nFor our game, we’ll\
    \ make the key discoverable after multiple visits to the boulders. And to do that,\
    \ we need a way to track visits, and that’s where a player system comes into play\
    \ (pun intended!).\n\nA player system tracks player actions, statuses, and more.\
    \ What type of things? Places visited, lives left, energy used, time played, points\
    \ accumulated, and so on. These are not things you pick up and use, so they don’t\
    \ belong in an inventory system, but they do need to be tracked, and thus, a player\
    \ system.\n\nAnd to create our player system, we are going to introduce you to\
    \ a new type of Python object: the class. The truth is you’ve used classes already.\
    \ For example:\n\n```python\nname=\"Shmuel\"\n```\n\nThat variable name is a class\
    \ of type str (Python’s string class). If you were to display the variable’s type,\
    \ like this:\n\n```python\nprint(type(name))\n```\n\nyou’d see <class 'str'> displayed.\n\
    \nAnd when you use functions like upper():\n\n```python\nname=name.upper()\n```\n\
    \nyou are actually calling a method named upper() in that str class.\n\nSo, yep,\
    \ you’ve used lots and lots of classes. But you’ve not created one of your own.\
    \ Yet.\n\n### Classes or Dictionaries?\n\nWe used a Python dictionary for our\
    \ inventory system and are using a Python class for our player system. Why? Well,\
    \ the truth is, we could have used classes or dictionaries for both systems. But\
    \ we want you to know how to use both dictionaries and classes, so we have you\
    \ use one of each. In your own code, you are free to use whatever you prefer.\n\
    \nOh, and by the way, dictionaries are actually classes, too! Yep, a dictionary\
    \ is a class, of type dict.\n\n## Creating a Player Class\n\nOk, so what actually\
    \ is a class? In programming, a class is an object, much like variables are objects.\
    \ But classes are special because of what they can do. We’ll use lots of classes\
    \ in Part III of this book. For now, the important thing we need you to understand\
    \ about classes is that they can contain both data and functions.\n\nWhat does\
    \ that mean? Well, think about the lists and dictionaries we’ve created. What\
    \ do they contain? Data, just data. They are variables that can contain variables.\
    \ Dictionaries and lists can’t contain functions, just data.\n\nClasses, on the\
    \ other hand, can contain data (called properties) and functions (called methods).\
    \ For example, the str class we just referred to contains data (the text stored\
    \ in the variable) and methods (like the upper() function).\n\nThis is important\
    \ because by storing both data and the functions that access that data, classes\
    \ are perfectly suited for writing highly reusable self-contained code.\n\nThere’s\
    \ a lot more to classes, as we’ll see in Part III (where you’ll be using lots\
    \ of them). But, with this basic introduction, let’s proceed with creating our\
    \ player class.\n\n## Creating the Class\n\nWe’ll create our class in its own\
    \ file. So, create a new file named Player.py in your Adventure folder. Here’s\
    \ the code you need:\n\n```python\n###############################################\n\
    # Player.py\n# player class\n###############################################\n\
    \n# Define player class\nclass player:\n    pass\n```\n\nYou can save and execute\
    \ the code if you'd like, but you won't see any output. This code simply creates\
    \ a class by using the class keyword followed by the name of the class and a colon.\n\
    \nThe class code needs to be indented beneath this class statement (just like\
    \ with if and while and def). We have nothing in your class yet, so we put a pass\
    \ statement in there just so Python wouldn't throw error messages.\n\nNow that\
    \ you have a class, let's make it do something useful.\n\n## Defining Properties\n\
    \nAs we explained earlier, classes can store data, and data in classes are called\
    \ *properties* (or *attributes*).\n\n> **NEW TERM**\n> **Attributes** Data in\
    \ classes are properties. This is true in just about every programming language.\
    \ But Python also uses the term *attributes* to refer to all the data in classes,\
    \ including properties, and also other information about the class. That said,\
    \ in this book, if you see *attributes*, just think properties.\n\nHow do you\
    \ create properties? Properties are variables, so you create them just like you'd\
    \ create any other variables. Here's the updated code:\n\n```python\n#####################################\n\
    # Player.py\n# player class\n#####################################\n\n# Define\
    \ player class\nclass player:\n    # Properties\n    name = \"Adventurer\"\n \
    \   livesLeft = 3\n    boulderVisits = 0\n```\n\nWe removed the pass statement,\
    \ as that is not needed anymore, and we added three properties.\n\nname stores\
    \ the name of the player, so you can personalize messages in the game, and we\
    \ initialized it with the default value \"Adventurer\".\n\nWe also created a property\
    \ to keep track of how many lives the player has left and initialized that to\
    \ 3.\n\nAnd, finally, the property we need to hide the key is boulderVisits, which\
    \ we initialized to 0. (This property will be incremented each time the player\
    \ visits the boulders.)\n\n> **TIP**\n> **Always Initialize Properties** You should\
    \ always initialize properties with default values. This way, code will always\
    \ work, even if you don't set property values explicitly in your code.\n\nSave\
    \ your changes.\n\nIf you'd like to test the class, you can add code like this\
    \ beneath it:\n\n```python\np=player()\nprint(p.livesLeft)\n```\n\nWhat does this\
    \ code do?\n\nThe first line creates a variable named p, which is an instance\
    \ of the player class. Notice that we added parentheses after the class name.\
    \ The truth is that p=player would have worked, too, but you'll usually want to\
    \ include those parentheses so that you have the option of passing arguments to\
    \ the class, if needed."
  mdcn: "## 显示物品清单\n\n关于物品清单还有一点：大多数游戏都提供查看当前持有物品的方式。这很容易实现。将以下函数添加到 `Inventory.py`\
    \ 文件的末尾：\n\n```python\n# Display inventory\ndef display():\n    print(\"*** Inventory\
    \ ***\")\n    print(\"You have\", numCoins(), \"coins\")\n    if hasStructureKey():\n\
    \        print(\"You have a key that flashes blue\")\n    print(\"*****************\"\
    )\n```\n\n这段代码非常简单。它定义了一个名为 `display()` 的函数，用于打印当前物品清单的内容。请注意，它使用的是包装函数，而不是直接访问\
    \ `inv` 字典的条目。这是首选的方式。为什么呢？想象一下，你可能需要以特定格式显示金币，或者需要进行任何计算（例如，食物或能量的临时乘数）。始终以相同的方式访问条目，可以确保你始终执行所需的代码。\n\
    \n那么，我们如何显示物品清单呢？只需调用 `display()` 函数即可。例如，如果你在 `doStart()` 的选项中添加了这一行：\n\n```python\n\
    [\"I\", \"Inventory\"]\n```\n\n然后你可以在处理逻辑中添加以下代码：\n\n```python\nelif choice ==\
    \ \"I\":\n    inv.display()\n    doStart()\n```\n\n这样，如果用户选择 I，你就会显示物品清单，然后重新显示\
    \ `doStart()` 的选项。\n\n是的，`doStart()` 调用了 `doStart()`。这是允许的，这被称为递归。\n\n**新术语**\n\
    **递归** *递归* 是指代码调用自身——例如，一个名为 `doStart()` 的函数调用 `doStart()`。递归是允许的，并且在正确使用时，功能非常强大。\n\
    \n## 挑战 15.1\n\n你现在拥有了定义完整物品清单系统所需的一切。找出你的游戏中将使用额外物品的地方。将它们添加到物品清单中，并创建相应的包装函数。\n\
    \n## 总结\n\n在本章中，你学习了如何使用 Python 的字典来存储相关项目。你使用了一个字典和包装函数来创建了一个物品清单系统。并且你已经了解了如何在你的游戏中使用物品清单。\n\
    \n# 第 16 章\n\n## 保持优雅\n\n你现在有了一个功能正常的物品清单系统，允许玩家获取、携带和使用物品。并且你的游戏可以根据物品清单进行调整。你需要的下一件事是一个玩家管理系统。为了创建这个系统，我们将向你介绍类，这是本章的重点。\n\
    \n## 玩家系统\n\n在第 15 章中，你使用字典创建了一个物品清单系统。我们用它来隐藏玩家需要找到才能开门的钥匙。\n\n但是，说实话，我们隐藏钥匙的方式相当糟糕。玩家可以直接走到巨石那里——看！——钥匙就在那里。在真正的游戏中，你通常会创建某种谜题，必须解决后才能发现钥匙；你可能需要先找到另一件物品，比如铲子，或者让钥匙在按顺序执行一系列步骤后才出现，或者通过游戏内交易获得。\n\
    \n在我们的游戏中，我们将让钥匙在多次访问巨石后才可被发现。为此，我们需要一种方法来跟踪访问次数，这就是玩家系统发挥作用的地方（双关语！）。\n\n玩家系统跟踪玩家的动作、状态等等。哪些类型的东西？访问过的地点、剩余的生命值、消耗的能量、游戏时间、累积的分数等等。这些不是你可以拾取和使用的物品，所以它们不属于物品清单系统，但它们确实需要被跟踪，因此需要一个玩家系统。\n\
    \n为了创建我们的玩家系统，我们将向你介绍一种新的 Python 对象类型：类。事实上，你已经使用过类了。例如：\n\n```python\nname=\"\
    Shmuel\"\n```\n\n变量 `name` 是一个 `str` 类型的类（Python 的字符串类）。如果你要显示变量的类型，像这样：\n\n```python\n\
    print(type(name))\n```\n\n你会看到显示 `<class 'str'>`。\n\n当你使用像 `upper()` 这样的函数时：\n\
    \n```python\nname=name.upper()\n```\n\n你实际上是在调用 `str` 类中一个名为 `upper()` 的方法。\n\n\
    所以，是的，你已经使用了非常多的类。但你还没有创建过自己的类。还没有。\n\n### 类还是字典？\n\n我们使用 Python 字典作为物品清单系统，并使用\
    \ Python 类作为玩家系统。为什么？嗯，事实是，我们本可以对两个系统都使用类或字典。但我们希望你知道如何同时使用字典和类，所以我们让你各使用一种。在你自己的代码中，你可以自由使用任何你喜欢的方式。\n\
    \n哦，顺便说一下，字典实际上也是类！是的，字典是一个类，类型为 `dict`。\n\n## 创建玩家类\n\n那么，类到底是什么？在编程中，类是一个对象，就像变量是对象一样。但类之所以特殊，是因为它们能做的事情。我们将在本书的第三部分使用大量的类。现在，关于类，我们需要你理解的重要一点是，它们可以同时包含数据和函数。\n\
    \n这是什么意思？嗯，想想我们创建的列表和字典。它们包含什么？数据，仅仅是数据。它们是可以包含变量的变量。字典和列表不能包含函数，只能包含数据。\n\n另一方面，类可以包含数据（称为属性）和函数（称为方法）。例如，我们刚才提到的\
    \ `str` 类包含数据（存储在变量中的文本）和方法（如 `upper()` 函数）。\n\n这很重要，因为通过存储数据和访问这些数据的函数，类非常适合编写高度可重用的自包含代码。\n\
    \n类还有很多内容，我们将在第三部分看到（你将大量使用它们）。但是，有了这个基本的介绍，让我们继续创建我们的玩家类。\n\n## 创建类\n\n我们将在自己的文件中创建类。因此，在你的\
    \ `Adventure` 文件夹中创建一个名为 `Player.py` 的新文件。以下是你需要的代码：\n\n```python\n###############################################\n\
    # Player.py\n# player class\n###############################################\n\
    \n# Define player class\nclass player:\n    pass\n```\n\n如果你想，可以保存并执行代码，但你不会看到任何输出。这段代码只是使用\
    \ `class` 关键字，后跟类名和冒号来创建一个类。\n\n类代码需要缩进在这个类语句下面（就像 `if`、`while` 和 `def` 一样）。你的类中目前没有任何内容，所以我们放了一个\
    \ `pass` 语句，这样 Python 就不会抛出错误消息。\n\n现在你有了一个类，让我们让它做一些有用的事情。\n\n## 定义属性\n\n正如我们之前解释的，类可以存储数据，类中的数据称为\
    \ *属性*（或 *特性*）。\n\n> **新术语**\n> **属性** 类中的数据是属性。这在几乎每种编程语言中都是如此。但 Python 也使用术语\
    \ *属性* 来指代类中的所有数据，包括属性，以及关于类的其他信息。也就是说，在本书中，如果你看到 *属性*，就把它想成属性。\n\n如何创建属性？属性是变量，所以你创建它们就像创建任何其他变量一样。以下是更新后的代码：\n\
    \n```python\n#####################################\n# Player.py\n# player class\n\
    #####################################\n\n# Define player class\nclass player:\n\
    \    # Properties\n    name = \"Adventurer\"\n    livesLeft = 3\n    boulderVisits\
    \ = 0\n```\n\n我们移除了 `pass` 语句，因为不再需要它了，并且我们添加了三个属性。\n\n`name` 存储玩家的名称，这样你就可以个性化游戏中的消息，我们用默认值\
    \ \"Adventurer\" 初始化了它。\n\n我们还创建了一个属性来跟踪玩家剩余的生命值，并将其初始化为 3。\n\n最后，我们需要用来隐藏钥匙的属性是\
    \ `boulderVisits`，我们将其初始化为 0。（每次玩家访问巨石时，这个属性都会递增。）\n\n> **提示**\n> **始终初始化属性**\
    \ 你应该始终用默认值初始化属性。这样，即使你没有在代码中显式设置属性值，代码也能始终正常工作。\n\n保存你的更改。\n\n如果你想测试这个类，可以在它下面添加如下代码：\n\
    \n```python\np=player()\nprint(p.livesLeft)\n```\n\n这段代码是做什么的？\n\n第一行创建了一个名为 `p`\
    \ 的变量，它是 `player` 类的一个实例。请注意，我们在类名后面加了括号。事实上，`p=player` 也可以工作，但你通常会希望包含这些括号，以便在需要时可以选择向类传递参数。"
