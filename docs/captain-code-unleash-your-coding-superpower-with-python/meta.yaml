    \ one. This application will be made up of lots of files, and we’ll incrementally\
    \ add functionality chapter by chapter.\n\nSo, what are we going to create? In\
    \ this section you are going to build a basic retro-style text adventure game.\n\
    \n## Game Concept\n\nNow that you know how to create functions and how to accept\
    \ arguments and return values, let’s start working on our game.\n\nMost modern\
    \ games feature stunning graphics and animation, sound effects, video sequences,\
    \ and sophisticated interaction using controllers, touch, and motion. This wasn’t\
    \ always the case. The earliest computer games were all text: You typed what you\
    \ wanted to do in text, and the computer responded in text.\n\nYou’ll work on\
    \ a graphics-based game in Part III of this book. In this section, we’re going\
