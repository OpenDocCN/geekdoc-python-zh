  md: '# Files and Folders


    Our Crazy Driver game right now is made of a single file named Main.py, which
    contains Python code. But that’s about to change. Real games are made up of lots
    of files, and not all of them are code. You’ll have image files at a minimum,
    and possibly video, music, and other files, too. And you’d not want all of those
    files in the same folder. That would get unruly and unmanageable.


    Our game just uses images (and in Chapter 19 we guided you through saving them
    in an Images folder). If you had video files, sound clips, music files, etc.,
    you’ll probably want to save them in their own appropriately named folders, too.
    A more complete game may have a folder structure that looks something like this:


    ![](img/1725feec73e591598339fc549aaff885_324_0.png)


    The challenge, however, is that your code needs to know where to find these files
    when it needs them. And you do not want to hard code file paths. Why? Because
    depending on the operating system used and which folder the app is being run from,
    the exact path to the files and folders could change. What works on your computer
    may not work on someone else’s.


    > **NEW TERM**

    **Path** Files on your computer are stored in folders. And folders can be inside
    of other folders. The exact location of a file, taking into account the folders,
    is called a *path*.'
  merge: -1
  pgno: 324
- img_proc: true
  md: 'The solution? Build paths to the folders dynamically. When the game starts,
    it checks to see where it is running and then creates variables for the paths
    to the necessary folders. Your code uses these variables to access files. It’s
    only a few extra lines of code, and it makes your app safer and more *portable*.


    > **NEW TERM**


    **Portable** When code is written in a way that ensures that it’ll execute safely
    on different computers, devices, or operating systems, it is said to be *portable*.
    Portability is a good thing, and coders always try to write code that is as portable
    as possible.


    How do we get the path to the code that is running? Python makes this really easy.
    Create a test file and type this code:


    ```

    print(__file__)

    ```


    Save and run the code. You’ll see the full path to the file being executed displayed
    in the Terminal window.


    How does this work? `__file__` is a special built-in variable that contains the
    full name of the currently executing code—exactly what we need. Pay attention
    to that variable: It has two underscores before and after the word file.


    Now we have the path to the code. Next, we need to extract just the folder name
    portion, as that will tell us which folder the code file is in. That folder is
    our game root folder. To extract the folder (also called a directory) from a fully
    qualified path, change the code to look like this:


    ```

    import os

    print(__file__)

    print(os.path.dirname(__file__))

    ```


    Save and run the code. This time, you’ll see two lines in the output: first the
    full path to the code and then the code directory.'
