    \n# 第 6 章\n\n## 秘密代码\n\n既然你已经掌握了 if 语句，就只剩下一个主要主题要学习了。因此，在本章中，我们将开始探索循环。\n\n##\
    \ 列表\n\n循环超级重要。不同类型的循环以及如何正确使用它们，是接下来几章的重点。\n\n但是，在我们研究循环之前，让我们花点时间回顾一种特殊的变量类型：列表。我们之前已经简要地向你展示过列表。在第\
    \ 3 章中，你使用了这段代码：\n\n```python\nchoices=[\"Heads\",\"Tails\"]\n```\n\n正如我们当时解释的，变量通常存储单个值。列表是一种特殊类型的变量，可以存储多个值（以及\
    \ 0 个值）。\n\n上面的代码来自第 3 章，它创建了一个名为 choices 的列表，其中包含两个项目：字符串 Heads 和字符串 Tails。\n\
    \n### 创建列表\n\n那么，如何在 Python 中创建列表呢？嗯，正如你已经看到的，你可以简单地创建一个变量来创建列表。是什么让它成为一个列表？如果你存储在变量中的值用\
    \ [ 和 ]（方括号）括起来，那么你就创建了一个列表。\n\n所以这行代码将创建一个空列表：\n\n```python\nanimals=[]\n```\n\
    \nanimals 是一个列表变量，但它是空的。\n\n这行代码创建了一个包含五个项目的列表：\n\n```python\nanimals=[\"ant\"\
    ,\"bat\",\"cat\",\"dog\",\"eel\"]\n```\n\n> **列表可以包含各种东西**\n> 你在第 3 章创建的列表是一个字符串列表。为了简单起见，我们在这里使用的示例都将是字符串列表。但值得注意的是，Python\
    \ 中的列表功能强大且灵活。它们可以存储各种东西——数字、日期，甚至是列表。（是的，你可以创建一个列表的列表，我们将在本书的第二部分这样做。）\n\n列表项必须全部包含在方括号内，并且必须用逗号分隔。\n\
    \n让我们试试看。创建一个名为 List1.py 的文件并输入这段代码：\n\n```python\n# Create a list\nanimals=[]\n\
    # How many items in it?\nprint(len(animals), \"animals in list\")\n```\n\n保存并运行代码。你会在终端窗口中看到文本\
    \ 0 animals in list。\n\n这段代码做了什么？animals=[] 创建了一个空列表。print() 语句显示列表中有多少个项目。为此，它使用了\
    \ len() 函数。len() 返回传递给它的任何项目的长度，比如列表中的项目数量。所以 len(animals) 返回列表 animals 中的项目数量。因为列表是空的，所以它返回\
    \ 0。\n\n更新你的代码，使其看起来像这样（你可以使用你自己的动物列表，不一定是我们的）：\n\n```python\n# Create a list\n\
    animals=[\"ant\", \"bear\", \"cat\", \"dog\", \"elephant\"]\n# How many items\
    \ in it?\nprint(len(animals), \"animals in list\")\n```\n\n保存并运行这个更新后的代码。输出将告诉你列表包含五种动物。\n\
    \n> **len() 函数**\n> 这里我们使用 len() 来找出列表中有多少个项目。但 len() 不仅限于列表。它也可以返回其他东西的长度。len()\
    \ 的一个常见用途是获取字符串的长度。例如，len(\"hello\") 将返回 5。\n\n> **len() 与索引值**\n> 不要将 len() 返回的值与索引值混淆。正如你回忆的，Python\
    \ 从 0 开始计数，所以一个包含五个元素的列表，其项目的索引将从 0 到 4。但 len() 将返回 5。\n\n### 初始化列表\n\n与 Python\
    \ 中的所有数据类型一样，列表实际上是一个名为——你猜对了——list 的类。当你使用这样的代码时：\n\n```python\nanimals=[]\n\
    ```\n\nPython 内部正在创建一个列表并用没有值来初始化它。它通过使用一个名为 init() 的方法来做到这一点。这意味着你自己也可以做同样的事情。创建空列表的那行代码可以这样写：\n\
    \n```python\nanimals=list()\n```\n\n这两行代码做的事情完全一样。\n\n### 访问列表项\n\n列表旨在存储，嗯，列表，比如我们的动物列表。要使列表有用，你需要能够访问存储在其中的项目。为此，你再次使用方括号，指定你想要的项目编号。\n\
    \n让我们试试看。创建文件 List2.py。这是代码：\n\n```python\n# Create a list\nanimals = [\"ant\"\
    ,\"bat\",\"cat\",\"dog\",\"eel\"]\n# Display a list item\nprint(animals[1])\n\
    ```\n\n保存并运行代码。显示的是哪种动物？列表中项目的位置称为索引。在 print() 函数中，我们指定了索引 1，也就是 bat。为什么？因为，如你所知，Python\
    \ 总是从 0 开始计数，所以 ant 在位置 0，bat 在位置 1。\n\n> **新术语**\n> **索引** 项目（例如在列表中）的位置就是它的索引。\n\
    \n### 一些较少使用的索引\n\n如果你想从列表中返回一系列项目，你可以提供一个范围的起始值和结束值，用冒号（: 字符）分隔。看看这个例子：\n\n```python\n\
    print(animals[2:4])\n```\n\n这将打印 cat，它是索引 2（因为 Python 从 0 开始计数），以及 dog，它在索引 3。通常，结束范围数字不包括在内，2:4\
    \ 意味着从 2 开始，在 4 之前停止。\n\n如果你想从列表末尾开始计数，你可以使用 -（减号），像这样：\n\n```python\nprint(animals[-1])\n\
    ```\n\n这将显示什么？-1 表示列表中的最后一项，-2 是倒数第二项，依此类推。因此，这段代码将显示 eel。\n\n尝试使用不同的索引值更新和运行代码。然后尝试使用一个过高的索引（如果你使用相同的示例，比如\
    \ 5）。Python 不会喜欢这样，它会告诉你 list index out of range，这意味着你提供的索引无效。\n\n### 更改列表项\n\n\
    你已经看到可以通过索引引用列表中的特定项目。我们用它来从列表中获取项目，但相同的语法也可以用来更新列表中的项目。\n\n创建一个名为 List3.py 的文件。这是代码：\n\
    \n```python\n# Create a list\nanimals = [\"ant\", \"bat\", \"cat\", \"dog\", \"\
    eel\"]\n# Display the list\nprint(animals)\n# Update item 2\nanimals[2] = \"cow\"\
    \n# Display the list\nprint(animals)\n```"
