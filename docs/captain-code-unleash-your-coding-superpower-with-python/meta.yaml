    # Game Concept


    Now that you know how to create functions and how to accept arguments and return
    values, let’s start working on our game.


    Most modern games feature stunning graphics and animation, sound effects, video
    sequences, and sophisticated interaction using controllers, touch, and motion.
    This wasn’t always the case. The earliest computer games were all text: You typed
    what you wanted to do in text, and the computer responded in text.


    You’ll work on a graphics-based game in Part III of this book. In this section,
    we’re going to go all retro and create a text-based adventure game.


    Our own game takes place somewhere in space. It starts with the player stranded
    and trying to understand where they are. We’re going to start with a very simple
    game structure and will add functionality and complexity in the next chapters.


    > Text-Based Adventure Games

    The very first text-based adventure game was called *Colossal Cave Adventure*,
    and it was created way back in 1976 (at about the same time that the Internet
    was being invented). The game was all text, and started with:


    YOU ARE STANDING AT THE END OF A ROAD BEFORE A SMALL BRICK BUILDING. AROUND YOU
    IS A FOREST. A SMALL STREAM FLOWS OUT OF THE BUILDING AND DOWN A GULLY.


    The player would then type what they wanted to do—for example, `look` or `go east`—and
    the game would respond with more text. Players would need to find items, solve
    puzzles, and more, to win.


    One year later, Zork (which was inspired by Colossal Cave Adventure) was released
    by Infocom. Zork was the first commercial (as in sold) text-based game, and it
    was so popular that it became a series of 10 titles. Yep, sequels are nothing
    new! Infocom went on to create dozens of text-based adventure games, including
    *The Hitchhiker’s Guide to the Galaxy* (which we authors happen to be super fond
    of).


    Text-based adventure games went out of style when computers were given the ability
    to display graphics and images. But they are still lots of fun to play, and even
    more fun to create.'
