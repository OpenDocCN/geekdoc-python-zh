    \n```\ndef get(id):\n```\n\n函数 `get()` 接受一个标识符（一个名为 `id` 的变量）。因此，当调用 `get()` 时，必须向其传递一个\
    \ `id`。\n\n其余代码是一个大的 `if elif else` 语句。它首先检查：\n\n```\nif id == \"Welcome\":\n\
    ```\n\n如果向 `get()` 传递了 `Welcome`，那么该条件将为 `True`，其下方缩进的代码将被执行。那段代码做什么？它只是返回一段文本：\n\
