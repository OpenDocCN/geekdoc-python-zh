    \ of a variable. A variable with local scope can only be seen inside of the function\
    \ to which it is local. And, yes, there are other scopes, as we'll see in future\
    \ chapters.\n\n## CHALLENGE 11.1\n\nSuperheroes often need to travel great distances,\
    \ and depending on where they go they'll need to measure those distances in miles\
