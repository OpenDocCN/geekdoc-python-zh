- img_proc: true
  md: 'As its name suggests, `fill()` fills the screen with a color, and here we are
    passing it the WHITE color we previously defined. Note that WHITE only works because
    we created it. If you tried to use BLUE now, you''d get an error as we have not
    defined BLUE.


    Save and run the code. Well, that didn''t work. The box briefly flashed on the
    screen, but it was still black. What happened to our `fill(WHITE)`?


    Well, here''s the important thing to know about gaming engines—and this is true
    of all gaming engines, not just Pygame: Graphical games typically update the display
    a lot, and they do it very frequently. And often there are lots of changes that
    need to be made all at once. Updating the display takes time, so game engines
    typically remember all the changes that need to be made, but they don''t actually
    make them until you tell them to do so. It''s an extra step for you, but it makes
    for much faster and more responsive games.


    And that''s what happened here. We told Pygame to set the background color using
    `fill(WHITE)`, and Pygame updated its own internal list of changes with that color
    change. But we never told Pygame to update the display, so, well, it didn''t.


    How do we update the display? Add this below the `fill()` method:


    ```

    # Update screen

    pygame.display.update()

    ```


    Save and test the code. This time, the box that flashes on the screen will be
    white.


    `display.update()` does exactly what you''d expect: It updates the display with
    any pending changes.


    # The Game Loop


    Our game (yeah, we know calling it a game right now is a bit of a stretch) starts
    and then quits right away. That''s because, as you will recall, Python executes
    your code line by line, and once it has processed the final line of code, the
    application terminates.'
