- md: "## Add lives\n```python\ndef addLife(self, lives=1):\n    # Increment lives\n\
    \    self.livesLeft += lives\n    # And fill up health\n    self.health = self.maxHealth\n\
    ```\n\nWhen executed, the `addLife()` function does two things. The first line\
    \ increases the value of the `livesLeft` property, effectively giving the player\
    \ another life. Many games also restore player health when a life is added, and\
    \ the second line in the function restores player health back to `maxHealth`.\
    \ If you don’t want this to happen, just remove that second line.\n\nAs this function\
    \ is a method in a class, the first argument is always `self` (as we discussed\
    \ in Chapter 16).\n\nBut look at that second argument. Does it look different\
    \ to you? What does `lives=1` mean? That `=1` provides a default value for argument\
    \ `lives` (which actually makes the `lives` argument optional).\n\nIn our game\
    \ we only need to add a single life at a time, so we could have simply written\
    \ `addLife()` like this:\n\n```python\ndef addLife(self):\n    self.livesLeft\
    \ += 1\n    self.health = self.maxHealth\n```\n\nCall `addLife()`, and it increments\
    \ `livesLeft` by 1 (that’s what `+= 1` does). Simple.\n\nBut what if at some point\
    \ in the future we needed the code to allow users to add multiple lives at once?\
    \ We’d need another function that accepted the number of lives to add as an argument.\
    \ Something like this:\n\n```python\ndef addLives(self, lives):\n    self.livesLeft\
    \ += lives\n    self.health = self.maxHealth\n```\n\nTrue, we may not need this\
    \ functionality now, but at some point we may, and then we’d have two very similar\
    \ functions.\n\n## Write Flexible Methods\n\nThis `addLife()` function is a good\
    \ example of how you should write all your methods. Wherever possible, plan for\
    \ future needs and capabilities and make your code as flexible as possible. This\
    \ will make your code more reusable and future safe. And this can be done with\
    \ any function, not just methods within classes.\n\nAnticipating possible future\
    \ needs, we created a single `addLife()` function that supports both use cases.\
    \ How does it do this? By accepting an optional argument—one that has a default\
