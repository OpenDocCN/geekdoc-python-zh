    # # Introducing Pygame


    Writing graphical games can be complicated. Unlike text-based games, where you
    simply print text, graphical games need to manage images on the screen, movement,
    interactions between objects, keyboard or mouse input, audio, and more—and all
    concurrently (meaning lots of things happening simultaneously). You can’t just
    use an `input()` and wait. Stuff—lots of stuff—happens while you are waiting,
    too. Yeah, it’s a lot (which is why we introduced text-based gaming first).


    The good news is that most game developers don’t start from scratch. Rather, they
    build their games on top of trusted and proven gaming engines. This allows them
    to focus more on their games and less on the low-level details needed for lighting,
    animation, movement, physics, and so on.


    Pygame is a gaming engine written for Python developers. It’s powerful, easy-to-use,
    and free (released as open source). All that makes it perfect for our game.


    > **NEW TERM**


    **Open Source** *Open source* software is code that is designed to be publicly
    available; anyone can see it, modify it, and use it—for free. There’s a bit more
    to it than that; there are different open source licenses that allow different
    uses. But for now, open source means you can use it for free to create your game.


    # # Prepping the Game


    Before we get coding, let’s review the game we’ll be creating and get set up.


    # ## Game Concept


    Crazy Driver is a simple car racing game. You’re driving a car along a busy road.
    But, you are driving the wrong way—right into oncoming traffic! You crazy driver,
    you! (Don’t ever do this in real life, duh!)'
- md: "## More About Pygame\n\nPygame has been around for about 20 years, and it has\
    \ been used to create tens of thousands of games. Pygame is designed for use with\
    \ Python, but, unlike most other Python libraries, it isn't written entirely in\
    \ Python. To improve performance, parts are written in C and Assembler, which\
    \ can run more than 100 times faster than Python.\n\nAs is often the case with\
    \ large projects like Pygame, it was built on top of another popular and powerful\
    \ library, called SDL (for Simple DirectMedia Layer), which provides access to\
    \ audio, keyboard, mouse, joystick, GPU, and more. SDL itself is used by gaming\
    \ luminaries including Valve Software.\n\nThe point of all of this is that Pygame\
    \ is powerful and trusted. While we'll be building a rather simple game, Pygame\
    \ can be used to build really sophisticated games, too. And some not very sophisticated\
    \ ones, actually (including Flappy Bird that was all the rage a few years ago).\n\
    \nIf you want to learn more about Pygame, visit pygame.org, where you'll also\
    \ find lots of great examples that demonstrate what the library can do.\n\nThis\
    \ is a top-down view game (also called an overhead perspective game). This means\
    \ that the game appears as if you were above it looking down, like this:\n\n![](img/1725feec73e591598339fc549aaff885_309_0.png)\n\
    \nThe objective is simple: You are at the bottom of the screen, and you need to\
    \ avoid crashing into the cars coming toward you. You can move left or right,\
    \ and that’s it.\n\nEach time you successfully avoid a car, you’ll get a point.\
    \ Oh, and each time you successfully avoid a car, the game will get a little faster.\n\
    \n## Installing Pygame\n\nPygame is not included with Python, so you’ll need to\
    \ install it. To do so, you’ll do exactly the same thing you did when you installed\
    \ Colorama back in Chapter 17:\n\n- **Windows users:** `pip install pygame`\n\
    - **Mac and Chromebook users:** `pip3 install pygame`\n\n```\nCollecting pygame\n\
    \  Using cached pygame-2.0.1-cp39-cp39-win_amd64.whl (5.2 MB)\nInstalling collected\
    \ packages: pygame\nSuccessfully installed pygame-2.0.1\n```\n\nAs before, don’t\
    \ worry if you see a different version number or even different text. Just focus\
    \ on the last line. So long as it says Successfully installed, you’re good to\
    \ go.\n\n## Creating Work Folders\n\nCreate a new work folder for our game. Move\
    \ your mouse over the VS Code Explorer panel. Hover over the **PYTHON** section\
    \ to display the toolbar. Click the **New Folder** icon, which is second from\
    \ the left. Enter a folder name (CrazyDriver would work) and press **Enter**.\
    \ You now have a new folder that is your main game folder (also called the *application\
    \ root folder*).\n\nGraphical games often need supporting files. At a minimum,\
    \ you’ll need image files, and you may also need audio files, music files, and\
    \ more. In general, these should not all be stored in the same folder as your\
    \ code. Rather, you’d create a separate subfolder for each. Our game uses graphic\
    \ images, so create a folder inside of your new folder named Images. (The folders\
    \ may look odd in VS Code until you have files in them. Don’t worry if that’s\
    \ the case.)\n\nYou now have a main game folder and a subfolder to store game\
    \ image files. When you create new code files, make sure you have clicked on the\
    \ right folder in the Explorer panel first. Your code needs to go in the main\
    \ game folder (not the Images subfolder).\n\n## Obtaining Images\n\nGraphical\
    \ games use graphics. (That is obvious, right?) At a minimum, you’ll need graphics\
    \ for the cars and background—usually PNG files.\n\nImages are not created in\
    \ Pygame. You need to create them using a tool like Photoshop. We’d love for you\
    \ to create your own graphics, but to help you get started, we’ve created some\
    \ graphics you can use. You can download them from the book web page or by scanning\
    \ this QR code.\n\n![](img/1725feec73e591598339fc549aaff885_311_0.png)\n\nWhen\
    \ you download the images ZIP file, you’ll want to extract the images from it.\
    \ You can usually do this by double-clicking on the file in your computer’s file\
    \ browser. Copy the images from the ZIP file into the Images folder that you just\
    \ created. And if you opt to create your own images, they’ll go in the Images\
    \ folder, too.\n\n## Getting Started\n\nWe’re going to build our game incrementally.\
    \ That means that you’ll be able to run it to test code and changes, but it won’t\
    \ be playable for a little while. And we’re going to start by defining the game\
    \ play space.\n\n> **Downloadable Code**\n> You are going to be updating and refining\
    \ the game code file (which you are about to create) in every chapter in this\
    \ part of the book. It’s not a lot of code, so type away if you’d like. Or you\
    \ can download the code from the book web page by scanning this QR code. To make\
    \ things easier for you, we’ve posted the code as it would look at the end of\
    \ each chapter.\n\n## Initializing Pygame\n\nCreate a new file in your game root\
    \ folder. As this is the main game file, name it Main.py (or any name of your\
    \ choice, actually). Here’s the code:\n\n```\n# Imports\nimport pygame\n\n# Game\
    \ colors\nBLACK = (0, 0, 0)\nWHITE = (255, 255, 255)\nRED   = (255, 0, 0)\n\n\
    # Main game starts here\n# Initialize Pygame\npygame.init()\n\n# Initialize frame\
    \ manager\nclock = pygame.time.Clock()\n# Set frame rate\nclock.tick(60)\n\n#\
    \ Set caption bar\npygame.display.set_caption(\"Crazy Driver\")\n```\n\nIf you\
    \ save and run this code, it’ll look like nothing happened. Don’t panic! That’s\
    \ what is supposed to happen, for now.\n\nLet’s review the code. We start by importing\
    \ the Pygame library. Simple enough.\n\nNext, we define variables for a few colors\
    \ that we’ll need in the game. Colors are specified as RGB values separated by\
    \ commas, like this:\n\n```\n# Game colors\nBLACK = (0, 0, 0)\nWHITE = (255, 255,\
    \ 255)\nRED   = (255, 0, 0)\n```\n\n### ALL CAPS\n\nYou'll notice that the color\
    \ variables we defined are capitalized—for example, BLACK instead of black or\
    \ Black. As you know, Python is case sensitive, so if you create a variable named\
    \ BLACK, you must refer to it that way exactly. So why did we create these variables\
    \ in all capitals? Python coders have adopted this convention to denote variables\
    \ that should not be changed. As our colors should never change, we used this\
    \ naming convention.\n\nWe've frequently used mixed case for variable names, for\
    \ example, lightGreen. If the variable is all caps, it will make it hard to separate\
    \ words, as in LIGHTGREEN. For this reason, coders often use an underscore (_)\
    \ to separate words, as in LIGHT_GREEN.\n\n### RGB Values\n\nColors on a computer\
    \ screen are created by mixing different amounts of red, green, and blue light.\
    \ Yep, when your screen displays yellow, it is actually displaying lots of red\
    \ and green and no blue. Seriously!\n\nBecause all colors are created using combinations\
    \ of red, green, and blue, a color value is called an RGB value (R for red, G\
    \ for green, B for blue), and it is made up of three numbers that specify how\
    \ much of each color is present. The amount of each color is a number between\
    \ 0 (for none of that color at all) and 255 (for all of that color).\n\nThis means\
    \ that 255, 0, 0 will display red; the R value is 255 (full intensity), and the\
    \ G and B are 0 (no light at all). Magenta (or purple) will be 255, 0, 255: full\
    \ red and blue and no green. Black is 0, 0, 0: all three with no light at all.\
    \ White is 255, 255, 255: all three at full intensity.\n\nPartial values can be\
    \ used, too. Which means that there are over 16 million (that's 256 to the power\
    \ of 3) color combinations possible.\n\nColors provided to code (including Python)\
    \ as well as graphic and illustration software all use RGB values like this.\n\
    \nNext comes the actual library initialization. Before Pygame can be used, it\
    \ must be initialized (just like the Colorama library that we used in Chapter\
    \ 17). This is done with a single line of code:\n\n```\n# Initialize Pygame\n\
    pygame.init()\n```\n\n### Tuple\n\nLook at the code for the three color variables.\
    \ Do they look different to you? Look again. They look a bit like lists that we've\
    \ used many times already—but not quite. Lists are defined like this:\n\n```\n\
    RED = [255, 0, 0]\n```\n\nwith values separated by commas surrounded by square\
    \ brackets. Right?\n\nHere we used parentheses instead:\n\n```\nRED = (255, 0,\
    \ 0)\n```\n\nRED looks like a list, but it obviously isn't one. So, what is it?\n\
    \nIt's actually a *tuple*, another Python type that is very similar to a list,\
    \ but with one big difference. Unlike lists, tuples can never be changed. You\
    \ can't add items, you can't edit items, you can't make any changes at all.\n\n\
    This makes tuples really useful for variables that should never change, like our\
    \ colors.\n\nGraphical game screens need to be updated constantly—many times a\
    \ second. The rate at which the screen is updated is called the *frame rate*.\n\
    \n> **NEW TERM**\n> **Frame Rate** When we look at a screen, perhaps watching\
    \ a movie or playing a video game, it appears as though images are changing all\
    \ the time. The truth is that they are not. Screens get updated many times a second—faster\
    \ than the human eye can readily notice. That creates the illusion of constant\
    \ changes.\n\nScreens update many times a second. The update speed is measured\
    \ in *frames per second* (or FPS), and that value is called the *frame rate*.\n\
    \nHigher frame rates make the video changes look more fluid and realistic, but\
    \ they also use more processing power."
  mdcn: "## 关于 Pygame 的更多信息\n\nPygame 已经存在了大约 20 年，被用来创建了成千上万的游戏。Pygame 是为与 Python\
    \ 配合使用而设计的，但与大多数其他 Python 库不同，它并非完全用 Python 编写。为了提高性能，部分代码是用 C 和汇编语言编写的，其运行速度可以比\
    \ Python 快 100 倍以上。\n\n与许多大型项目（如 Pygame）一样，它建立在另一个流行且强大的库之上，称为 SDL（Simple DirectMedia\
    \ Layer 的缩写），它提供了对音频、键盘、鼠标、游戏手柄、GPU 等的访问。SDL 本身也被包括 Valve Software 在内的游戏界巨头所使用。\n\
    \n所有这些都说明 Pygame 功能强大且值得信赖。虽然我们将构建一个相当简单的游戏，但 Pygame 也可以用来构建非常复杂的游戏。实际上，一些不太复杂的游戏（包括几年前风靡一时的《Flappy\
    \ Bird》）也是用它制作的。\n\n如果你想了解更多关于 Pygame 的信息，请访问 pygame.org，在那里你还可以找到许多展示该库功能的优秀示例。\n\
    \n这是一个俯视视角游戏（也称为自上而下的视角游戏）。这意味着游戏看起来就像你从上方俯视它一样，就像这样：\n\n![](img/1725feec73e591598339fc549aaff885_309_0.png)\n\
    \n目标很简单：你位于屏幕底部，需要避免撞上向你驶来的汽车。你可以左右移动，仅此而已。\n\n每次成功避开一辆车，你就会得到一分。哦，每次成功避开一辆车，游戏速度也会稍微加快一点。\n\
    \n## 安装 Pygame\n\nPygame 不包含在 Python 中，因此你需要安装它。为此，你需要执行与第 17 章安装 Colorama 时完全相同的操作：\n\
    \n- **Windows 用户：** `pip install pygame`\n- **Mac 和 Chromebook 用户：** `pip3 install\
    \ pygame`\n\n```\nCollecting pygame\n  Using cached pygame-2.0.1-cp39-cp39-win_amd64.whl\
    \ (5.2 MB)\nInstalling collected packages: pygame\nSuccessfully installed pygame-2.0.1\n\
    ```\n\n和之前一样，如果你看到不同的版本号甚至不同的文本，不用担心。只需关注最后一行。只要它显示 Successfully installed，你就可以继续了。\n\
    \n## 创建工作文件夹\n\n为我们的游戏创建一个新的工作文件夹。将鼠标悬停在 VS Code 资源管理器面板上。将鼠标悬停在 **PYTHON** 部分以显示工具栏。单击\
    \ **New Folder** 图标（左起第二个）。输入文件夹名称（CrazyDriver 就可以）并按 **Enter**。你现在有了一个新文件夹，它就是你的主游戏文件夹（也称为\
    \ *应用程序根文件夹*）。\n\n图形游戏通常需要支持文件。至少，你需要图像文件，可能还需要音频文件、音乐文件等。通常，这些文件不应全部存储在与代码相同的文件夹中。相反，你应该为每种类型创建一个单独的子文件夹。我们的游戏使用图形图像，因此请在新文件夹内创建一个名为\
