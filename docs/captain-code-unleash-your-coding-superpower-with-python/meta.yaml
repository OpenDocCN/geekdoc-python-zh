    \n## CHALLENGE 21.2\n\nWe used the left and right keys to move the player sprite.\
    \ You don't have to use those keys; you can pick your own. Many games use A and\
    \ S, for example. Update the code to use those keys. You'll want to check for\
    \ `K_a` and `K_s`.\n\nOr allow both sets of keys, letting players use left arrow\
    \ or A to go left and right arrow or S to go right. Here's a hint: You can do\
    \ this easily with an `or` in your `if` statement. If you do this, be careful\
    \ to group your conditions correctly with parentheses because you'll have an `and`\
    \ and an `or`.\n\n![](img/1725feec73e591598339fc549aaff885_349_1.png)\n\n## Summary\n\
    \nYou now have cars that move. Nice. They can even move until they should crash—but\
    \ then they don't. They kinda pass through each other. As cool as that ghostly\
    \ effect is, we need to actually handle crashes properly. Fortunately, handling\
    \ collisions is the subject of the next chapter.\n\n# CHAPTER 22\n\n## Crash,\
    \ Bang, Boom\n\nYou now have a playable game—well, playable as in a game that\
    \ you can never win or lose. So, yeah, maybe not so playable. In this chapter\
    \ we'll fix that, and we'll also add score tracking and incrementally increasing\
    \ game difficulty.\n\n## You Crashed, Game Over\n\nEnemies drive toward you (or\
    \ is it you driving toward them? Hmmm.). You move left or right to avoid them.\
    \ That's how things work now.\n\nWhat happens if you crash into oncoming traffic?\
    \ Right now nothing, but what should happen is game over. And that means we need\
    \ to be able to *detect collisions* and then respond when a collision occurs.\n\
    \n> **Collision Detection**\n\nIn our game, a crash is literally a collision.\
    \ But that's not what *collision detection* means. In game engines, *collision\
    \ detection* is the process of determining if object boundaries have overlapped.\
    \ And that's important. If your game allows you to drop bombs, then you need to\
    \ know if a bomb hit a target, even if the game engine has no idea what a bomb\
    \ even is. If your player approaches a door, the game engine needs to let you\
    \ do something, even though it doesn't know what doors are. Same for jumping to\
    \ bump into a mushroom or tossing a Poké Ball. From the game engine's perspective,\
    \ the actual action being performed is not important. What is important is that\
    \ items come into contact with each other (bomb and target, character and mushroom,\
    \ etc.). The game engine's collision detection system is responsible for knowing\
    \ when things come into contact with each other, and it does that by checking\
    \ object boundaries to see if they overlap. If, for example, the character's boundary\
    \ overlaps the mushroom's boundary at all, then there has been a *collision*,\
    \ and the game engine will let you know so you can respond as appropriate for\
    \ your game (and that will double your height for some reason).\n\nPygame keeps\
    \ things simple. It uses rectangles for all sprites, and a collision occurs when\
    \ any part of the rectangles overlap. Other game engines support more sophisticated\
    \ collision detection options that can work with irregular shapes, too.\n\nWe\
    \ need to make two changes to our code. Let's start with the code that will get\
    \ executed when a collision occurs. We'll create a user-defined function named\
    \ `GameOver()`. For now it'll just quit the game; we'll add more functionality\
    \ later.\n\nHere's the code, which you can add to your `Main.py` (just remember\
    \ that user-defined functions must be defined before they are used, so a good\
    \ place to put the function would be after the game variables are initialized\
    \ but before the main game code):\n\n```python\n# Game over function\ndef GameOver():\n\
    \    # Quit Pygame\n    pygame.quit()\n    sys.exit()\n```\n\nThis code is really\
    \ simple. In fact, you've seen similar code before. Back in Chapter 19, we added\
    \ code to the main game loop to allow players to quit the game. That code simply\
    \ quit Pygame and exited the operating system environment. That's exactly what\
    \ this code does. Call `GameOver()`, and the game will quit.\n\nSo how do we call\
    \ `GameOver()`? We need to add collision detection. And this is super complicated\
    \ stuff. Not!\n\nAdd this code in your game loop. It can go anywhere in the game\
    \ loop, but ideally it should go after all sprite movement. So a good location\
    \ would be right before or after the code that checks for the `QUIT` event. Here's\
    \ the code:\n\n```python\n# Check for collisions\nif pygame.sprite.collide_rect(player,\
    \ enemy):\n    # Crash! Game over\n    GameOver()\n```\n\nSave and test the game.\
    \ Avoid oncoming cars, and the game will keep playing. But as soon as you collide,\
    \ game over.\n\nThe magic here is the `collide_rect()` function. You simply pass\
    \ it two objects, and it compares the rectangles defined by their boundaries.\
    \ If the rectangles overlap in any way, the function will return `True`. Otherwise,\
    \ it'll return `False`.\n\nHere we are passing our two sprites, `player` and `enemy`,\
    \ to `collide_rect()`. So long as you avoid oncoming cars, the two sprites won't\
    \ overlap, so no collision occurs, and the function returns `False`. But if (or\
    \ should that be when?) you crash, the sprites will overlap, and the function\
    \ will return `True`. When that happens, the `GameOver()` function is called,\
    \ and the game quits.\n\nThat was easier than you expected, right? That's the\
    \ beauty of game engines: Once you have the basics in place, they take care of\
    \ all the hard stuff for you.\n\nWe'll make our `GameOver()` function more interesting\
    \ in the next chapter.\n\n## Tracking Score\n\nRight now in the Crazy Driver game,\
    \ you can avoid oncoming traffic until you crash. To make things more interesting,\
    \ we should add scoring so you earn a point for each enemy you've successfully\
    \ avoided. We need to make three changes to our code:\n\n- We need a way to track\
    \ the score.\n- Scores have to be updated each time a vehicle has been avoided.\n\
    - And we need a way to show the score.\n\nLet's tackle these one at a time.\n\n\
    Tracking scores is easy: We just need a variable that we'll increment as needed.\
    \ We have one game variable already, and now we add a second. Here's the updated\
    \ game variables section:\n\n```python\n# Game variables\nmoveSpeed = 5\nscore\
    \ = 0\n```\n\nSimple enough.\n\nNow how do we increment the score during game\
    \ play? The score needs to go up each time a car is avoided. Or, put differently,\
    \ when an oncoming car reaches the bottom of the screen, then it's been avoided—and\
    \ the score needs to go up.\n\nDoes that sound familiar? We already have code\
    \ that gets executed when a car reaches the bottom of the screen. Our game loop\
