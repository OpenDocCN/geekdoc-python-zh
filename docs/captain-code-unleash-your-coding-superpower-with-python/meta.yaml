    # The World’s Worst (and Most Used) Passwords


    Do you know what the most commonly used passwords are? Unfortunately they are:


    +   - 123456 (this one is used in over 25,000,000!)

    - 123456789

    - qwerty

    - password

    - 1234567


    Ouch!


    # Program Flow


    Now let’s define the program flow:


    +   - Start by displaying welcome text and any instructions.

    - Prompt the user with a series of questions to find out exactly what type of
    password they want (length and types of characters).

    - Start with an empty string for the password.

    - Loop as many times as the needed password length, and each time generate a random
    letter (or digit or symbol) and add it to the password string.

    - When done, show the user their newly generated password.


    Simple, huh? This is all stuff you’ve done before.


    # Some Tips


    You know how to pick a random letter from a string. You’ve done that many times,
    like this:


    ```

    letter=random.choice("ABCDEFGHIJKLMNOPQRSTUVWXYZ")

    ```


    Well, here’s a really useful shortcut. There’s a library that comes with Python
    called string. It contains stuff you’ll find useful when working with strings.
    And it also defines constants (much like variables, but they can’t change; they
    are read-only) that you can use.'
  - '[PAGE 178]


    **NEW TERM**


    **Constant** A *constant* is a value that can never be changed by the program
    (unlike variables, which, as you have seen, can be changed as needed). Some constants,
    like the ones used here, come built into Python. And you can create your own constants,
    too, if needed.


    For example, try this code (use a test file):


    ```

    import string

    print(string.ascii_uppercase)

    ```


    This code imports the `string` library (just like we did with `random` and `datetime`).
    And then it prints `string.ascii_uppercase`. What is that? `ascii_uppercase` is
    a constant in the `string` library that contains all the uppercase characters
    from A to Z.


    Another constant is `ascii_letters`, which contains all the letters from A to
    Z in both uppercase and lowercase. To pick and display a random letter, you can
    use this:


    ```

    import string

    import random


    letter=random.choice(string.ascii_letters)


    print(letter)

    ```'
