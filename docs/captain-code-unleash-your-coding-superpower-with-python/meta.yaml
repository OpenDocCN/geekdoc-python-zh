- img_proc: true
  md: 'Managing frame rates involves keeping track of time, so we create a clock object
    that does exactly that, providing the game with a way to track when frames need
    to be updated:


    ```

    # Initialize frame manager

    clock = pygame.time.Clock()

    ```


    Clock is defined inside of the Pygame time library, so we use the fully qualified
    pygame.time.Clock() to instantiate our clock object.


    Now that we have a clock object, we can use it to set the game frame rate, like
    this:


    ```

    # Set frame rate

    clock.tick(60)

    ```


    clock.tick(60) tells Pygame to update the display no more than 60 times per second
    (or 60 frames per second).


    The last thing the code does is update the caption bar, which is the bar at the
    top of the game play area. (You can see it at the top of the game, earlier in
    this chapter.) Here’s the code:


    ```

    # Set caption bar

    pygame.display.set_caption("Crazy Driver")

    ```


    The Pygame display library is used to manage anything that gets displayed on the
    screen. Here we use the set_caption() method to set the caption text to Crazy
    Driver. Later we’ll add code so that the caption keeps updating to show the current
    game score.


    That’s all the code does, which is why it won’t do very much if you run it.


    The next thing we need to do is to tell Pygame the size of the game window, so
    add this to the bottom of your code:


    ```

    # Initialize game screen

    screen = pygame.display.set_mode((500, 800))

    ```'
