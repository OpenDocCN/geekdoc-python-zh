    \n![](img/1725feec73e591598339fc549aaff885_185_0.png)\n\n# 第11章\n\n## 变得函数化\n\n\
    欢迎来到第二部分。在本节中，你将构建一个复古风格的文字冒险游戏。在此过程中，你将学习许多创建强大应用程序的新技术。但首先，我们需要回顾一下函数，这次你将学习如何编写自己的函数。\n\
    \n## 函数回顾\n\n你知道什么是函数。你已经见过并使用过很多函数：`input()`、`print()`、`int()`、`now()`、`upper()`、`choice()`\
    \ 等等。\n\n提醒一下，一个函数由三部分组成：\n\n| 部分 | 描述 | 是否必需 | 示例 |\n| :--- | :--- | :--- | :---\
    \ |\n| 名称 | 唯一的函数名 | 是 | 例如 `print()`。名称是你在想要使用函数时调用它的方式。函数名后面必须始终跟有括号。这是必需的。\
    \ |\n| 参数 | 传递给函数的一个或多个值 | 否 | 如果你写 `print(\"Hello\", firstName)`，那么 `print()`\
    \ 被传递了两个参数：一个包含文本 Hello 的字符串和一个名为 `firstName` 的变量。并非所有函数都接受参数；正如你所见，`print()`\
    \ 和 `input()` 接受参数，但 `upper()` 和 `now()` 不接受。 |\n| 返回值 | 返回给调用该函数的任何对象的值 | 否 |\
    \ 你多次使用过的一个例子是 `input()`，它提示用户输入内容，然后将用户输入的内容返回给你。`firstName=input(\"What is your\
    \ name?\")` 提示输入一个值，该值被返回并保存到一个变量中（这里是 `firstName`）。有些函数返回结果；其他函数（如 `print()`）则不返回。\
    \ |\n\n记住这一点。我们将经常引用函数名、参数和返回值，所以不要混淆它们。\n\n> **方法就是函数**\n正如你在第4章学到的，类中的函数被称为*方法*。所以，从技术上讲，`now()`\
    \ 不是一个函数，而是 `datetime` 类中的一个方法。但是，方法确实是函数，所以为了简单起见，我们这里只称它们为函数。请记住，创建函数的规则和最佳实践也适用于方法。\n\
    \n**参数和返回值**\n这是另一种看待它的方式。参数进入函数，返回值从函数出来。你作为参数传递的任何内容都会进入函数进行处理。函数在执行完毕后发送回你的代码的内容就是返回值。\n\
    \n参数进入，返回值出来。\n\n**使用 Python 编写 Python**\nPython 附带的大多数库本身也是用 Python 编写的。几乎每个第三方\
    \ Python 库也是用 Python 编写的。\n\n但也有例外，正如你将在本书第三部分看到的那样。\n\n## 编写你自己的函数\n\n到目前为止，我们使用的所有函数都是\
    \ Python 自带的。有些总是可用，有些则需要你导入库，正如你所见。但它们都是 Python 的一部分，随时可供你使用。\n\n就像几乎每一种编程语言一样，Python\
    \ 允许你创建自己的*用户定义函数*。而且你是用 Python 编写的！是的，你使用 Python 函数来创建 Python 函数！\n\n> **新术语**\n\
    **用户定义函数** *用户定义函数*（或 UDF）正是如此：一个由用户（你，程序员）定义的函数。\n\n### 创建函数\n\n那么，你如何创建自己的函数呢？让我们从一个简单（且相当无用）的例子开始。创建一个名为\
    \ Func1.py 的新文件，并输入以下内容：\n\n```\ndef sayHello():\n    print(\"Hello\")\n\nsayHello()\n\
    ```\n\n保存并运行代码。它将显示 Hello。是的，我们告诉过你这是一个相当无用的程序。但等等，它很快就会变得更好——我保证。\n\n那么，这段代码做了什么？让我们从底部开始，从这行代码开始：\n\
    \n```\nsayHello()\n```\n\n这调用了一个名为 sayHello() 的函数。就像调用 print() 或 input() 一样，要调用一个函数，你只需指定其名称，后跟括号。\n\
    \n但 Python 中没有 sayHello() 函数。那么当调用函数 sayHello() 时，执行的是什么代码？答案是，一个名为 sayHello()\
    \ 的新函数正在同一个文件内部被创建，就像这样：\n\n```\ndef sayHello():\n    print(\"Hello\")\n```\n\n\
    在 Python 中，你使用语句 def（代表 *define*）后跟函数名来定义一个函数。这里的名称是 sayHello。\n\n名称后面是括号，函数参数就在那里定义。这里的括号是空的，因为这个函数没有参数。即使你的函数不接受参数，你也必须在名称后指定括号。\n\
    \n就像 if 和 while 语句一样，定义函数的行以冒号（: 字符）结尾。并且就像 if 和 while 一样，构成函数本身的代码在函数定义语句下缩进。\n\
    \n> ### def 不会执行\n需要注意的是，定义函数与执行函数是不同的。如果你的代码看起来像这样：\n\n```python\ndef sayHello():\n\
    \    print(\"Hello\")\n```\n\n那么当你执行它时，什么都不会显示。为什么？因为你只是定义了函数，但从未执行它。如果你想使用你定义的函数（你应该是想的，否则为什么要写它？），那么你必须执行它。\n\
    \n### 函数必须在使用前定义\n\n在我们的简单例子中，我们使用 def 定义了 sayHello() 函数，然后调用了 sayHello()。如果 sayHello()\
    \ 调用在 def 之前会发生什么？如果你愿意，可以修改代码来尝试一下。你会看到一条错误消息：\n\n'sayHello' is not defined\n\
    \n这仅仅意味着 Python 看到了你的 sayHello() 调用，但不知道该如何处理它。为什么？记住，Python 是从顶部开始逐行处理你的代码的。如果在函数\
    \ sayHello() 定义之前调用了 sayHello()，它将完全不知道 sayHello() 是什么。\n\n所以，在 Python 中，函数必须在使用前定义。\n\
    \n顺便说一句，这也是为什么你总是将 import 语句放在代码顶部的原因。当你导入一个库时，Python 会看到其中的所有函数，本质上是在 import\
    \ 语句所在的位置即时定义了它们。import 之后的任何代码都可以使用导入的函数。\n\n## 传递参数\n\n我们的 sayHello() 函数不接受任何参数（也不返回任何值）。这就是它相当无用的原因。\n\
    \n所以让我们创建一个更有趣的例子。看看这段代码：\n\n```\nmultiply(12, 8)\n```\n\n没有名为 multiply() 的 Python\
    \ 函数，所以你还不能运行这段代码。这段代码应该做的是允许你将任意两个数字传递给一个名为 multiply() 的函数。该函数将执行此操作：它将你传递给它的两个数字相乘，并且还会显示乘法和结果。\n\
    \n与不接受任何参数的 sayHello() 不同，multiply() 显然需要接受两个参数——要相乘的两个数字。"
