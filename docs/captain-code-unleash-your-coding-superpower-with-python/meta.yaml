  md: "# Installing Third-Party Libraries\n\nWe mentioned third-party libraries way\
    \ back in Chapter 3. Python comes with all sorts of built-in libraries, and you’ve\
    \ used many of them. third-party libraries are created by Python developers, and\
    \ you can use them just as you would the built-in libraries.\n\nOf course, before\
    \ you can use libraries, you need to install them. To add color to our game’s\
    \ output we’ll be using a popular third-party Python library called Colorama.\
    \ The truth is that you can add color to your output without any libraries by\
    \ adding codes like ESC [ 31 m to your output. (That’s red text, by the way.)\
    \ But, by using Colorama, you can actually use sensible text (like the word RED),\
    \ which is much easier.\n\nSo how do you install libraries in Python? When you\
    \ installed Python back in Chapter 1, a series of tools and utilities were installed,\
    \ too. One of them is called PIP, and its job is to install (and update and remove)\
    \ third-party libraries.\n\nYou use PIP right inside the Terminal window (where\
    \ application output is usually displayed). Yep, when your code isn’t running,\
    \ you can type terminal commands in that window. To install Colorama, the command\
    \ is:\n\n+   - **Windows users:** `pip install colorama`\n- **Mac and Chromebook\
    \ users:** `pip3 install colorama`\n\nAfter issuing the command, you see this:\n\
    \n```\nCollecting colorama\n  Using cached colorama-0.4.4-py2.py3-none-any.whl\
    \ (16 kB)\nInstalling collected packages: colorama\nSuccessfully installed colorama-0.4.4\n\
    ```\n\n> **PIP**\nPIP is an acronym that stands for Pip Installs Packages or Pip\
    \ Installs Python. And, yes, the first word is the acronym PIP! That’s programmer\
    \ humor for you.\nAlternatively, some have suggested that PIP stands for preferred\
    \ installer program. But we like the other acronym."
  merge: -1
  pgno: 280
- img_proc: true
  md: 'Don''t worry if you see a different version number. The version will change
    as the library developer makes changes and updates. The key here is the last line.
    So long as it says Successfully installed, you''re good to go.


    # Using Colorama


    To color text in the Terminal window, you need to embed special codes (called
    *escape sequences*) in the output. Rather than deal with obscure codes, Colorama
    lets you use English color names, which it converts to the necessary codes.


    So, to display text in red, you''d do something like this:


    ```

    print(colorama.Fore.RED+"Hello, this is in red")

    ```


    Easy enough.


    # Importing and Initializing the Library


    Before we can use Colorama, we need to import the library. You know how to do
    that:


    ```

    import colorama

    ```


    colorama is a long name. You can shorten it with an alias, as we did back in Chapter
    15 with the Inventory file:


    ```

    import colorama as col

    ```


    This way, you can shorten the above code to:


    ```

    print(col.Fore.RED+"Hello, this is in red")

    ```


    This is all syntax you''ve seen before.


    But there is another way to use `import` that you''ve not seen yet. Look at this
    import statement:


    ```

    from colorama import Fore

    ```'
