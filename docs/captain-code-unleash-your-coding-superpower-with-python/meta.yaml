    See, IDEs are awesome!


    **Executing Code**

    You may hear programmers talk about *executing* code. That’s not a bad thing;
    no one is going to hurt the code. *Execute* is another word for *run*, so if you
    execute code, you run it. Whew!


    5. Click the green **Run** button, and Python will run your code. So when you
    run your code, where do you see the results? The Terminal window, which is right
    below the editor window. You told Python to print (that means display) some text,
    and it does just that in the Terminal window, like this:


    ```

    Yeah, this works!

    ```


    If this text is displayed in the Terminal window, then it means that Python is
    installed and working properly, VS Code is installed and can talk to your Python
    installation, and you are ready to code. Congratulations!


    ## Summary


    In this chapter, you learned what programming is, what programmers do, and what
    Python is. You installed Python and Visual Studio Code (and got a short tour of
    the latter), and wrote your first brilliant (ok, so maybe a little bit less than
    brilliant) program. We’re now ready to really dive into coding with Python.


    # CHAPTER 2


    ## Mad Libs


    Now that you are all set up, we’re going to dig into some real coding. In this
    chapter, we’re going to start with an important topic, one that you will use in
    every single program you ever write: variables. And to do that, you’ll also learn
    about functions and create a simple game. Ready?


    ## Understanding Functions


    In programming languages, *functions* are bits of code that perform specific tasks.
    You''ve actually seen one function already: the `print()` function you used at
    the end of Chapter 1. And, as you saw, `print()` does just that, it prints (or
    displays) text.


    In Python, like in most other programming languages, functions are used by referring
    to their name followed by parentheses. When programmers use functions, they say
    that they are *calling* the function.


    In Chapter 1, you called the `print()` function, like this:


    ```

    print("Yeah, this works!")

    ```


    That text that you told `print()` to print is called an *argument*, and arguments
    always go in between ( and ). Programmers refer to this as *passing* arguments.


    How many arguments does a function accept? Well, that depends on the function.
    Some functions accept no arguments, and others accept one or more arguments, in
    which case these will be *passed* when calling the function. And whether there
    are arguments or not, you always need the parentheses.


    Let''s take a quick look at passing multiple arguments to a function. Create a
    new file in VS Code. You already have one named `Hello.py`, so name the new one
    `Hello2.py`.


    Now that file `Hello2.py` is open, type this code in it:


    ```

    print("Yeah, this works!", "It really does!")

    ```


    > **Your Own Functions**

    For now we''ll be using functions that come built into Python. In later chapters,
    you''ll learn how to create your own functions.


    > **A Friendly Reminder, Just This Once**

    Need a reminder on how to create a file? In VS Code mouse over the Explorer panel,
    then you can click on the New File icon above the file names. Then you can just
    enter the file name and it’ll be opened ready for you to edit. You can also use
    the File menu and select New File, although if you create a new file this way,
    you’ll need to name it when you save the file. Either way works. Just remember
    these steps as you’ll be creating lots and lots of files. In the future, we’ll
    just tell you “create a file named Hello2.py,” and you’ll know what to do.


    When you are done, save the file (by selecting the File menu and clicking Save),
    and run it (by clicking the green arrow above the code on the right). You’ll see
    the results displayed in the Terminal window below.


    Look at the `print()` statement you just used. It has two arguments this time,
    and `print()` displays them both in the Terminal window. Yes, this is not that
    useful an example. We know, you could have just typed this to get the same results:


    ```

    print("Yeah, this works! It really does!")

    ```


    The reason we had you try it with the quotation marks and comma is to show you
    something important. When you pass more than one argument to a function, you must
    separate each argument with a comma. No comma is needed if there is just one argument,
    but for two or more arguments, make sure there is a comma between each.


    So, to summarize, to use a function, you *call* it, and you *pass arguments* if
    needed; and if you pass multiple arguments, make sure to separate each of them
    with commas.


    ## Using Variables


    Ok, with that out the way, let’s move on to the main event: variables. These are
    really important, so we’ll focus on them all the way until the end of this chapter.


    Imagine that you are sitting at a desk, working on a project. You’re working with
    lots of information, so you have storage containers that are neatly labeled so
    that you can put things you need to remember inside of them. Any time you need
    to get the contents of a container, you just look at the name, and you can access
    whatever is stored inside of it.'
