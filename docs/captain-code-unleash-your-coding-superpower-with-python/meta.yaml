- md: '## CHAPTER 8


    ## Becoming a Coder


    You''ve now learned the three most important programming concepts you''ll ever
    need: variables, conditional processing, and loops. In this chapter (and the next
    two) we''ll review them all, and focus on coding techniques and best practices
    while we plan a more sophisticated application. And in doing so, we''ll help you
    transition from merely writing snippets of code to actually becoming a coder.


    ## How Coders Code


    You now know how to use variables, how to code decisions using if statements,
    and how to create looping code using for and while. You’ve learned a lot. And,
    truthfully, you’ve learned the most important coding concepts. Yes, all of them.
    If you stop here (don’t, please!), you would have learned all you need to be able
    to write any program you want. That’s not a joke. We mean it. It is possible to
    write just about any application you need using what you have already learned.


    So what else is there to learn? Well, lots. In future chapters, we’ll look at
    user-defined functions, variable scope, classes, dictionaries, additional libraries,
    and more. All of those concepts will help you write cleaner, better organized,
    reusable, and more efficient code. So you’ll want to learn it all. But, honestly,
    they are all extras. The fundamentals, what you have learned thus far, that’s
    what powers real coding.


    So we are going to spend this chapter reviewing what we’ve learned so far by building
    a more complex and sophisticated program. This stuff is important, and the more
    you practice, the better.


    As we noted back in Chapter 1, anyone can learn a programming language. What makes
    a really skilled coder is how they use that language. We want to help you start
    to think like a coder, and so we’ll use the application we create here to introduce
    you to *how* coders work. And we’ll start with two concepts specifically.


    ### Have a Plan


    The programs we’ve written thus far are all pretty simple. Even the Guess The
    Number game (which ended up at about 50 lines long) is a pretty simple program.
    Real programs often have thousands, even hundreds of thousands (or many millions)
    of lines of code.


    > ### Real Programs Can Be Huge

    > *Minecraft* has about 150,000 lines of code. The classic game *Doom* has 193,000
    lines of code. Modern games like *Overwatch*, *Fortnite*, and *Call of Duty* typically
    have somewhere between 1,500,000 and 5,000,000 lines of code. The Android operating
    system (which powers most of the world’s smartphones) is about 15,000,000 lines
    of code. Windows (which may be running on your computer) has about 50,000,000
    lines of code. Yep, real programs can be huge!


    **Experience Design**


    There is a relatively new and exciting field called Experience Design. People
    who work as Experience Designers focus on the overall user experience when using
    an application. They think about the user journey (how users move around the app),
    flow between screens, and more. This is an important part of planning, too. After
    all, you’d not want to put time and effort into building an application only to
    find that no one uses it because the user experience is bad.


    When writing smaller apps, it’s tempting to just start: Open VS Code, write some
    code, and figure it out as you go. Right?


    Wrong! You can get away with doing that for now, but it won’t work as your apps
    grow in complexity.


    Think of it this way: If you were building a house, you’d never start without
    a plan. Right? You’d need to know in advance how big the house is, what rooms
    it has, what they are used for, how they are connected, and so on.


    Coding is kinda the same. You need a plan. You need to know what the app does,
    what the user expectations are, what your screens should look like, what the complete
    user experience is—all of that and more.


    There is no right or wrong way to plan. Some developers open a document and write
    notes. Others map things out on a whiteboard. There are all sorts of apps that
    are used for planning features and requirements. Exactly how you plan is not that
    important. What *is* important is actually having a plan.


    ### Think Small


    Back to our house construction analogy. When you start building your dream house,
    you wouldn’t obtain clay and make bricks from scratch. Nor would you obtain pieces
    of wood and start building doors and windows. And you’d definitely not create
    locks and light switches using individual pieces and components. Instead, you’d
    source and bring ready-to-use materials to the construction site and install them
    (perhaps modifying them if needed). Same for tiles, roof shingles, electrical
    wire, piping, appliances,... The final construction of a house is complex and
    hard work, but it is made simpler by using lots of ready-made, ready-to-use, proven,
    and trusted objects.


    Again, coding is much the same. You need to start looking for the bits you can
    create in isolation (meaning outside of your main application).


    Why? There are a few advantages:


    - Testing your code when it is part of a huge app is really hard. Just running
    a program until you get to where your code snippet is can be time-consuming. And
    if there are dependencies (user input, menu selections, and so on), it’s even
    harder. Professional coders try to write whole sections of code independently.
    This way, they can experiment, test, iterate, perfect, and do it all outside of
    the main application.

    - This type of coding is also great for reuse. As you start to build smaller blocks
    of code, you’ll find that they can be used in other programs, too. This saves
    time because you are not always starting from scratch. And it also saves time
    because it’s always better to start with code that you know has already been used
    and tested.

    - But most importantly, it is so much easier to solve lots of small problems and
    challenges than big giant scary ones.


    And so that is where we are going to start: thinking small.


    ### Game Components


    In this chapter and the next, we are going to create a Hangman game. You know
    Hangman, right? It’s usually played with pen and paper. Someone picks a word and
    draws marks indicating how many letters long the word is. Someone else guesses
    letters and tries to figure out the word. Every wrong guess builds part of the
    hangman’s gallows. The game is over when the player correctly guesses the word
    or when there are too many wrong tries.


    Most of the game is inputs and checking letters—stuff we’ve done before.


    But there are a couple of parts of the game that are different and which should
    be carefully planned. Let’s look at a few:


    - Players need to guess one letter at a time. As we’ve seen, `input()` accepts
    text input from a user, but it doesn’t limit text; users can type whatever they
    want. We’ll need a way to handle the inevitable situation where users type too
    much text (more than a single letter).

    - The game needs to remember user guesses so it can figure out what to display
    and whether the player has won or not. Lists (which we looked at in Chapter 6)
    are probably a really good way to handle the guesses. We should work out all of
    the steps we’ll need in the final game.

    - Speaking of lists…as you’ve seen, they don’t display nicely by default. So we’ll
    need to find a way to display user guesses properly.

    - The trickiest challenge is the need to display masked words. What does that
    mean? Let’s say the word is apple, and the guesses so far are a and e. The game
    needs to display something like a___e so that the player knows which letters are
    correct and how many letters are still to be guessed. We obviously need to hide
    the letters that haven’t been guessed yet, and so we mask them. Here the mask
    character is an underscore, but it could be anything (a***e is a useful mask,
    too).


    These are all pieces of functionality that our application needs; the game won’t
    work without them. And they can (and should) be written and tested before they
    are ever introduced into the complete app.


    Again, the idea is to solve these coding challenges in isolation. Experiment,
    try, code, unit test, tweak,…and then use the code later in the complete application.


    > **NEW TERM**

    > **Unit Testing** When professional coders write individual components, they
    usually write code to test these components, too. And if they were to update the
    components in the future they’d also update the test code. This test code is never
    part of any application that eventually uses the components. It is just there
    to test the component in isolation. Coders call this practice *unit testing*.


    ### Restricting User Input


    Let’s start with the user input challenge. You’ve seen code like this before:


    ```python

    currGuess = input("Guess a letter: ")

    ```'
  mdcn: '## 第八章


    ## 成为一名程序员


    你现在已经掌握了三个最重要的编程概念：变量、条件处理和循环。在本章（以及接下来的两章）中，我们将回顾所有这些概念，并在规划一个更复杂的应用程序时，重点关注编码技术和最佳实践。通过这样做，我们将帮助你从仅仅编写代码片段过渡到真正成为一名程序员。


    ## 程序员如何编码


    你现在知道如何使用变量，如何使用 `if` 语句编写决策逻辑，以及如何使用 `for` 和 `while` 创建循环代码。你已经学到了很多。而且，说实话，你已经学到了最重要的编程概念。是的，全部。如果你就此止步（请不要！），你将学到编写任何你想要的程序所需的一切。这不是开玩笑。我们是认真的。利用你已经学到的知识，几乎可以编写任何你需要的应用程序。


    那么还有什么需要学习的呢？嗯，还有很多。在未来的章节中，我们将探讨用户自定义函数、变量作用域、类、字典、额外的库等等。所有这些概念都将帮助你编写更清晰、更有条理、可重用且更高效的代码。所以你会想要学习所有这些。但是，老实说，它们都是额外的。基础，也就是你迄今为止学到的东西，才是驱动真正编码的核心。


    因此，本章我们将通过构建一个更复杂、更精密的程序来回顾我们迄今为止所学的内容。这些东西很重要，你练习得越多，就越好。


    正如我们在第一章中指出的，任何人都可以学习一门编程语言。真正熟练的程序员之所以出色，在于他们如何使用这门语言。我们想帮助你开始像程序员一样思考，因此我们将使用在这里创建的应用程序来向你介绍程序员*如何*工作。我们将从两个特定的概念开始。


    ### 制定计划


    我们到目前为止编写的程序都相当简单。即使是猜数字游戏（最终大约有 50 行代码）也是一个相当简单的程序。真正的程序通常有数千行，甚至数十万行（或数百万行）代码。


    > ### 真正的程序可能非常庞大

    > *Minecraft* 大约有 150,000 行代码。经典游戏 *Doom* 有 193,000 行代码。像 *Overwatch*、*Fortnite*
    和 *Call of Duty* 这样的现代游戏通常有 1,500,000 到 5,000,000 行代码。Android 操作系统（为全球大多数智能手机提供支持）大约有
    15,000,000 行代码。Windows（可能正在你的计算机上运行）大约有 50,000,000 行代码。是的，真正的程序可能非常庞大！


    **体验设计**


    有一个相对较新且令人兴奋的领域叫做体验设计。从事体验设计师工作的人专注于使用应用程序时的整体用户体验。他们思考用户旅程（用户如何在应用中移动）、屏幕之间的流程等等。这也是规划的重要组成部分。毕竟，你不会希望投入时间和精力构建一个应用程序，结果却发现因为用户体验糟糕而没人使用。


    编写较小的应用程序时，很容易直接开始：打开 VS Code，写一些代码，然后边做边弄清楚。对吗？


    错！你现在可以侥幸这样做，但随着你的应用程序变得越来越复杂，这就行不通了。


    这样想：如果你要建造一栋房子，你绝不会在没有计划的情况下开始。对吧？你需要提前知道房子有多大，有哪些房间，它们的用途是什么，它们如何连接等等。


    编码也差不多。你需要一个计划。你需要知道应用程序做什么，用户的期望是什么，你的屏幕应该是什么样子，完整的用户体验是什么——所有这些以及更多。


    规划没有对错之分。有些开发者打开文档写笔记。有些在白板上画出规划图。有各种各样的应用程序用于规划功能和需求。你具体如何规划并不那么重要。*真正*重要的是确实有一个计划。


    ### 从小处着手


    回到我们建造房子的类比。当你开始建造你的梦想之家时，你不会获取粘土从头开始制作砖块。也不会获取木头开始制作门窗。你肯定也不会用单独的零件和组件来制作锁和电灯开关。相反，你会采购并运来现成的材料到建筑工地并安装它们（如果需要，可能会进行修改）。瓷砖、屋顶瓦片、电线、管道、电器等等也是如此。房子的最终建造是复杂而艰苦的工作，但通过使用大量现成的、可用的、经过验证和信赖的物品，它变得简单了。


    同样，编码也大同小异。你需要开始寻找那些可以独立创建的部分（意味着在你的主应用程序之外）。


    为什么？有几个好处：


    - 当你的代码是庞大应用程序的一部分时，测试它真的很难。仅仅运行程序直到到达你的代码片段所在的位置就可能很耗时。如果存在依赖关系（用户输入、菜单选择等），那就更难了。专业的程序员会尝试独立编写整个代码段。这样，他们就可以在主应用程序之外进行实验、测试、迭代、完善。

    - 这种编码方式也非常适合重用。当你开始构建较小的代码块时，你会发现它们也可以在其他程序中使用。这节省了时间，因为你不必总是从头开始。而且这也节省了时间，因为从已知被使用和测试过的代码开始总是更好的。

    - 但最重要的是，解决许多小问题和挑战比解决巨大、可怕的问题要容易得多。


    因此，这就是我们的起点：从小处着手。


    ### 游戏组件


    在本章和下一章中，我们将创建一个猜单词游戏。你知道猜单词游戏，对吧？通常是用纸和笔玩的。一个人选一个单词，并画出标记表示这个单词有多少个字母。另一个人猜字母并试图猜出这个单词。每次猜错都会画出绞刑架的一部分。当玩家正确猜出单词或错误尝试次数过多时，游戏结束。


    游戏的大部分是输入和检查字母——这些我们以前做过。


    但游戏中有几个部分是不同的，应该仔细规划。让我们看几个：


    - 玩家需要一次猜一个字母。正如我们所看到的，`input()` 接受用户的文本输入，但它不限制文本；用户可以输入任何他们想要的内容。我们需要一种方法来处理用户输入过多文本（超过单个字母）的不可避免的情况。

    - 游戏需要记住用户的猜测，以便它可以确定显示什么以及玩家是否获胜。列表（我们在第六章中讨论过）可能是处理猜测的一个非常好的方法。我们应该规划出最终游戏中需要的所有步骤。

    - 说到列表……正如你所看到的，它们默认情况下显示得并不好。所以我们需要找到一种方法来正确显示用户的猜测。

    - 最棘手的挑战是需要显示带掩码的单词。这是什么意思？假设单词是 apple，到目前为止的猜测是 a 和 e。游戏需要显示类似 a___e 的内容，以便玩家知道哪些字母是正确的，以及还有多少字母需要猜测。我们显然需要隐藏尚未猜出的字母，因此我们用掩码字符遮盖它们。这里的掩码字符是下划线，但它可以是任何东西（a***e
    也是一个有用的掩码）。


    这些都是我们的应用程序需要的功能；没有它们，游戏将无法运行。它们可以（并且应该）在引入完整应用程序之前编写和测试。


    再次强调，想法是在隔离环境中解决这些编码挑战。实验、尝试、编码、单元测试、调整……然后在完整应用程序中使用这些代码。


    > **新术语**

    > **单元测试** 当专业的程序员编写单个组件时，他们通常也会编写代码来测试这些组件。如果他们将来更新了组件，他们也会更新测试代码。这个测试代码永远不会成为最终使用该组件的任何应用程序的一部分。它只是为了在隔离环境中测试组件。程序员称这种实践为*单元测试*。


    ### 限制用户输入


    让我们从用户输入挑战开始。你以前见过这样的代码：


    ```python

    currGuess = input("Guess a letter: ")

    ```'
