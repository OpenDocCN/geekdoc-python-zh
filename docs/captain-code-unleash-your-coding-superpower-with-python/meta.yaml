    It starts at the top of a program, and for every line that isn’t a comment, it
    does whatever you have told it to do.


    And that’s rather boring. If every program written were executed line by line,
    then every program would do the exact same thing each time it was run. Imagine
    a website that showed the same content in the same order every single time you
    visited. Or a game that only ever allowed you to do one thing, and then one more
