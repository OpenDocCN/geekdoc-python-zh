  md: '# Flags and Variables


    Our code needs to know if we have an enemy or not. We created a variable named
    eNum (for enemy number) to keep track of this for us: -1 means no enemy, and any
    other value is the index of the enemy we are using.


    So, was this necessary? Couldn''t we instead use a Boolean flag and set it to
    True if we have an enemy and False if not? Wouldn''t the code be simpler that
    way?


    Yes, we could indeed do so, and the code would be simpler. But coders need to
    anticipate what they''ll be doing next. And the next enhancement we''ll add will
    indeed require us to know not just that we have an enemy but what exact enemy
    we have. So, with the future in mind, we opted for a numeric variable over a Boolean
    one.


    That''s all there is to it. In the next game loop, the code will see that eNum
    is -1, and it will generate a new random enemy sprite, using the code we already
    created above.


