  md: '# Part I: It’s All Fun and Games


    In this section, we cover some basics (and some not so basics, too). By the time
    you’re done with the section, you will have learned every major coding concept,
    and you’ll have the knowledge you need to write just about any application.


    This section is made up of 10 chapters:


    +   - Chapter 1 will help you get up and running, including helping you install
    needed software and getting it ready to use.

    - In Chapters 2 through 7 you’ll create small games and other programs, lots and
    lots of them. Each chapter will introduce new coding concepts that you’ll utilize
    immediately in a new project. And in each chapter you’ll get a chance to tweak,
    tinker, and make the code your own.

    - Then things will get a bit more sophisticated, and you’ll create a more complex
    game starting in Chapter 8 and finishing it in Chapter 9.

    - In Chapter 10 we’ll wrap this section with all sorts of ideas for you to try
    yourself.


    We designed these chapters so that they build upon each other; skills you develop
    in one chapter will help you in subsequent chapters. But we also designed these
    chapters to be short and focused, and so you’ll mostly write small standalone
    programs in each.


    You’ll want to take your time working through this section. Try every lesson and
    example yourself, tinker, tweak, play. Make changes to the code we provide and
    see what happens to the program. You can’t break it because you can always undo
    it! The stuff you’ll learn here is what you’ll use most, be it while working through
    this book or in any future projects.


    # Part II: On an Adventure


    No more kiddie pool, you’re in the deep end now. In this section you’ll create
    a bigger (and more fun) game. We’ll start slow, and incrementally add functionality.
    What kind of game? A cool retro-style text-based adventure game that will seriously
    impress family and friends, and one that you can make complex enough to make hardcore
    gamers cry.'
