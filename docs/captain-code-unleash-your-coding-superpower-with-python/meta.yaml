- md: "You get the idea. You don’t have to use these specific settings, and you can\
    \ make any setting fixed or a range, as needed. The key is that all enemy data\
    \ needs to be cleanly defined and organized.\n\nYour code could then get a specific\
    \ enemy by using the id key. Or if you wanted a random enemy, you could do something\
    \ like this:\n\n```\n# Get a random enemy\ndef getRandomEnemy():\n    # Return\
    \ a random enemy\n    return random.choice(enemies)\n```\n\nThat said, that’s\
    \ the easy part. The trickier part is the actual battle mechanics. There are lots\
    \ of ways to do this, and a popular one is turn-based battling, kinda like Pokémon\
    \ battles. To do this:\n\n- One side goes first (you could randomize that if you’d\
    \ like), and then each side takes turns launching an attack.\n- You could allow\
    \ users to pick which weapon to attack with, based on what they have in their\
    \ inventory. Different weapons would inflict different amounts of damage, and\
    \ some may be single-use weapons (use it and then it’s gone from the inventory).\n\
    - You may want to allow the player to use potions or somehow improve their health\
    \ mid-battle.\n- Based on weapons used, range of damage inflicted, and ability\
    \ to dodge, eventually one side will win. If the enemy strength is reduced to\
    \ 0, then the player wins. If the player runs out of health (or lives), then the\
    \ enemy wins.\n- What happens when the battle is over? That’s up to you. Beating\
    \ the enemy may be part of the player’s journey that allows the user to progress\
    \ (basically walking past the enemy). Or the enemy may drop items for the user\
    \ to pick up and put in the inventory. Or, well, you’re the coder, so you decide!\n\
    \nAs we said, this one is tricky. Not all games need battling enemies. If yours\
    \ does, you’ll want to spend time carefully planning.\n\n## Saving and Restoring\n\
    \nSome games let players save their progress and then restore it later. You might\
    \ do this when the game is too long for players to complete all at once. Or players\
    \ may want to save their progress before trying something new (like battling an\
    \ enemy) so that if they die, they can restore back to where they were.\n\nSo\
    \ long as your game data is well organized (in dictionaries and classes, for example,\
    \ as opposed to scattered in variables all over the place), then you'll find that\
    \ Python makes this quite easy. And the magic is a Python library named pickle.\n\
    \nHow does saving and restoring work? To save your game, you need to do the following:\n\
    \n1. Create a single variable that contains all of the data you need to save.\n\
    2. Data gets saved in a file on the computer, so pick a file name to use.\n3.\
    \ Use pickle to serialize the data and save it to the file.\n\nRestoring your\
    \ game is the reverse:\n\n1. Read data from the saved file.\n2. Deserialize it\
    \ with pickle.\n3. Save the data back to the right variables.\n\n> **NEW TERM**\n\
    > **Serializing** In Python, *serializing* data means taking an internal Python\
    \ object (variables, lists, classes, dictionaries, etc.) and turning it into a\
    \ string of bytes that can be stored. *Deserializing* is the opposite: turning\
    \ a string of bytes back into a Python object.\n\n> **Pickle? Really?**\n> Yes,\
    \ the Python library that you use to save and restore data is pickle. The name\
    \ may sound funny, but there is actually a good (or at least sensible) reason\
    \ for this. When you pickle foods like cucumbers or onions, what you are doing\
    \ is preserving them. The Python pickle library is also used to save (and thus\
    \ preserve) data.\n\nOk, so let's see how this works. Look at this code:\n\n```\n\
    # Imports\nfrom os import path\nimport pickle\n\n# Data file\nsaveDataFile = \"\
    savedGame.p\"\n```\n\nThe first import is the library used to access files on\
    \ your computer. You need that to actually save and read the saved file. The second\
    \ line imports the pickle library. Then you create a variable named saveDataFile,\
    \ which contains the name of the file that will actually hold the saved game data.\n\
    \nAs for saving data, look at this code:\n\n```\n# Create a data object to store\
    \ both data sets.\ndb = {\n    \"inv\":inv,\n    \"player\":player\n}\n\n# Save\
    \ it\npickle.dump(db, open(saveDataFile, \"wb\"))\n```\n\nWhen you save game data,\
    \ you want all of the data in one big variable. Here we create a dictionary named\
    \ db (for database), and inside it we save our inv and player variables (assuming\
    \ that these are the names we are using).\n\nThe next line of code actually saves\
    \ the data. pickle.dump() gets passed the data to save (the db variable) and the\
    \ open file to save it to. The \"wb\" argument tells dump() to write binary data\
    \ (as opposed to simple text data). That's all there is to it. Game data saved!\n\
    \nTo restore game data, we just do the opposite:\n\n```\n# Now read back saved\
    \ file\nif path.isfile(saveDataFile):\n    db = pickle.load(open(saveDataFile,\
    \ \"rb\"))\n    inv = db[\"inv\"]\n    player = db[\"player\"]\n```\n\nThis code\
    \ first uses `path.isfile()` to verify that the saved game file exists. If it\
    \ does, it uses `pickle.load()` to read and deserialize the data and then puts\
    \ the restored data back in the original `inv` and `player` variables. Here we\
    \ use an \"rb\" argument which tells `load()` to read binary data.\n\nAs you can\
    \ see, saving and restoring data in Python is really easy. We mean that. We've\
    \ done this in other programming languages, and most can't do this in just a few\
    \ lines of code.\n\nIf you do want to support save and restore, here are some\
    \ things to keep in mind:\n\n- What we did here—copying all objects to be saved\
    \ into a single save variable—is the cleanest and easiest way to save data. You\
    \ don't want to be saving and restoring lots of variables. Trust us on this one.\n\
    - The variable you save should contain everything you need to restore the game\
    \ to a specific state.\n- Decide if you want a single save file or multiple files.\
    \ A single file is simpler to work with but will only let you restore to a specific\
    \ point in game play. Multiple save files will let players restore as they need,\
    \ but you'll need a way to let them pick which to restore.\n- You may want to\
    \ check to see if there are any saved games at game startup. If you detect a saved\
    \ game, ask the user if they want to restore it.\n\n## Summary\n\nIn this chapter,\
    \ we've introduced lots of ideas and techniques that you can use to really take\
    \ your text-based adventure game to the next level. In Part III, we'll use these\
    \ skills as we tackle graphics-based games.\n\n# Part III\n\n# RACING AROUND\n\
    \n- CHAPTER 19 Crazy Driver\n- CHAPTER 20 Image-ine the Possibilities\n- CHAPTER\
    \ 21 We Like to Move It\n- CHAPTER 22 Crash, Bang, Boom\n- CHAPTER 23 Finishing\
    \ Touches\n- CHAPTER 24 Keep Going\n\n![](img/1725feec73e591598339fc549aaff885_305_0.png)\n\
    \nThis page intentionally left blank\n\n![](img/1725feec73e591598339fc549aaff885_307_0.png)\n\
    \n# CHAPTER 19\n\n# Crazy Driver\n\nIn Part II you created a text-based adventure\
    \ game, and, in the process, learned lots of skills and techniques. In this section\
    \ we’re going to kick things up a notch and create a graphical game. And just\
    \ like we did with our text-based adventure, we’ll start with the basics and add\
    \ functionality in each chapter.\n\n## Introducing Pygame\n\nWriting graphical\
    \ games can be complicated. Unlike text-based games, where you simply print text,\
    \ graphical games need to manage images on the screen, movement, interactions\
    \ between objects, keyboard or mouse input, audio, and more—and all concurrently\
    \ (meaning lots of things happening simultaneously). You can’t just use an `input()`\
    \ and wait. Stuff—lots of stuff—happens while you are waiting, too. Yeah, it’s\
    \ a lot (which is why we introduced text-based gaming first).\n\nThe good news\
    \ is that most game developers don’t start from scratch. Rather, they build their\
    \ games on top of trusted and proven gaming engines. This allows them to focus\
    \ more on their games and less on the low-level details needed for lighting, animation,\
    \ movement, physics, and so on.\n\nPygame is a gaming engine written for Python\
    \ developers. It’s powerful, easy-to-use, and free (released as open source).\
    \ All that makes it perfect for our game.\n\n> **NEW TERM**\n> **Open Source**\
    \ *Open source* software is code that is designed to be publicly available; anyone\
    \ can see it, modify it, and use it—for free. There’s a bit more to it than that;\
    \ there are different open source licenses that allow different uses. But for\
    \ now, open source means you can use it for free to create your game.\n\n## Prepping\
    \ the Game\n\nBefore we get coding, let’s review the game we’ll be creating and\
    \ get set up.\n\n### Game Concept\n\nCrazy Driver is a simple car racing game.\
    \ You’re driving a car along a busy road. But, you are driving the wrong way—right\
    \ into oncoming traffic! You crazy driver, you! (Don’t ever do this in real life,\
    \ duh!)"
