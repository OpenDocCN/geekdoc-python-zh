    \ to be typed a specific way (all lowercase maybe), or have a space or two at\
    \ the end. Come up with an option and modify the if statement to check for it.\n\
    \n## Summary\n\nif statements are really important, and you are unlikely to write\
    \ any code ever that does not use them. And so in this chapter we looked at lots\
    \ of examples of using if statements with different tests and conditions. Which\
    \ brings us to our next topic, loops.\n\n# CHAPTER 6\n\n## Secret Codes\n\nNow\
    \ that you have mastered if statements, there is only one major topic left to\
    \ learn. And so in this chapter we're going to start to explore loops.\n\n## Lists\n\
    \nLoops are super important. Different types of loops, and how to properly use\
    \ them, is the focus of the next few chapters.\n\nBut, before we look at loops,\
    \ let's take a few moments to revisit a special type of variable, the list. We\
    \ briefly showed you lists already. Back in Chapter 3 you used this code:\n\n\
    ```python\nchoices=[\"Heads\",\"Tails\"]\n```\n\nAs we explained then, variables\
    \ usually store a single value. Lists are a special type of variable that can\
    \ store lots of values (as well as 0 values).\n\nThe code above is from Chapter\
    \ 3, and it creates a list named choices that has two items in it: the string\
    \ Heads and the string Tails.\n\n### Creating Lists\n\nSo, how do you create a\
    \ list in Python? Well, as you have already seen, you can simply create a variable\
    \ to create a list. What makes it a list? If the values you store in the variable\
    \ are enclosed with [ and ] (square brackets), then you've created a list.\n\n\
    So this line of code will create an empty list:\n\n```python\nanimals=[]\n```\n\
    \nanimals is a variable that is a list, but it is empty.\n\nThis line of code\
    \ creates a list with five items in it:\n\n```python\nanimals=[\"ant\",\"bat\"\
    ,\"cat\",\"dog\",\"eel\"]\n```\n\n> **Lists Can Contain All Sorts of Things**\n\
    > The list you created in Chapter 3 was a list of strings. And to keep things\
    \ simple, the examples we'll use here will all be lists of strings. But it is\
    \ worth noting that lists in Python are powerful and flexible. They can store\
    \ all sorts of things—numbers, dates, even lists. (Yep, you can create a list\
    \ of lists, and we'll do that in Part II of this book.)\n\nList items must all\
    \ be enclosed within the square brackets, and they must be separated by commas.\n\
    \nLet's give this a try. Create a file named List1.py and type this code:\n\n\
    ```python\n# Create a list\nanimals=[]\n# How many items in it?\nprint(len(animals),\
    \ \"animals in list\")\n```\n\nSave and run the code. You'll see the text 0 animals\
    \ in list displayed in the Terminal window.\n\nWhat does the code do? animals=[]\
    \ creates an empty list. The print() statement displays how many items are in\
    \ the list. To do this, it uses the len() function. len() returns the length of\
    \ whatever item is passed to it, like the number of items in a list. So len(animals)\
    \ returns the number of items in the list animals. Because the list is empty,\
    \ it returns 0.\n\nUpdate your code to look like this (you can use your own list\
    \ of animals, it doesn't have to be ours):\n\n```python\n# Create a list\nanimals=[\"\
    ant\", \"bear\", \"cat\", \"dog\", \"elephant\"]\n# How many items in it?\nprint(len(animals),\
    \ \"animals in list\")\n```\n\nSave and run this updated code. The output will\
    \ tell you that the list contains five animals.\n\n> **The len() Function**\n\
    > Here we used len() to find out how many items were in a list. But len() is not\
    \ limited to lists. It can return the lengths of other things, too. One common\
    \ use of len() is to get the lengths of strings. For example, len(\"hello\") will\
    \ return 5.\n\n> **len() Versus Index Values**\n> Don't confuse the value returned\
    \ by len() with an index value. As you will recall, Python starts counting at\
    \ 0, so a list with five elements will have items with indexes from 0 through\
    \ 4. But len() will return 5.\n\n### Initializing Lists\n\nLike all data types\
    \ in Python, lists are actually a class named—you guessed it—list. When you use\
    \ code like this:\n\n```python\nanimals=[]\n```\n\ninternally Python is creating\
    \ a list and initializing it with no values. It does this by using a method named\
    \ init(). This means you can do the same thing yourself. The line of code that\
    \ creates the empty list could be written like this:\n\n```python\nanimals=list()\n\
    ```\n\nBoth of these lines of code do exactly the same thing.\n\n### Accessing\
    \ List Items\n\nLists are designed to store, well, lists, like our list of animals.\
    \ For a list to be useful, you need to be able to access the items stored in it.\
    \ To do this, you once again use square brackets, specifying the item number you\
    \ want.\n\nLet’s try that. Create file List2.py. Here’s the code:\n\n```python\n\
    # Create a list\nanimals = [\"ant\",\"bat\",\"cat\",\"dog\",\"eel\"]\n# Display\
    \ a list item\nprint(animals[1])\n```\n\nSave and run the code. What animal gets\
    \ displayed? The position of an item in a list is called an index. In the print()\
    \ function, we specified the index 1, which is bat. Why? Because, as you know,\
    \ Python always starts counting at 0, so ant is in position 0, and bat is in position\
    \ 1.\n\n> **NEW TERM**\n> **Index** The position of an item (within a list, for\
    \ example) is its index.\n\n### Some Lesser-Used Indexes\n\nIf you want to return\
    \ a series of items from a list, you can provide the start and end values for\
    \ a range, separated by a colon (the : character). Look at this example:\n\n```python\n\
    print(animals[2:4])\n```\n\nThis will print cat, which is index 2 (as Python starts\
    \ counting at 0), and dog, which is at index 3. As usual, the end range number\
    \ is not included, 2:4 means start at 2 and stop before 4.\n\nIf you want to count\
    \ from the end of a list, you can use a - (the minus sign), like this:\n\n```python\n\
    print(animals[-1])\n```\n\nWhat will this display? -1 means the last item in the\
    \ list, -2 is the second-to-last item, and so on. Therefore, this code will display\
    \ eel.\n\nTry updating and running the code with different index values. Then\
    \ try using an index that is too high (like 5 if you are using the same example).\
    \ Python won't like that, it will tell you that list index out of range, which\
    \ means the index you provided isn't valid.\n\n### Changing List Items\n\nYou've\
    \ seen that you can refer to specific items in a list by their index. We used\
    \ this to get an item from the list, but the same syntax can be used to update\
    \ an item in the list.\n\nCreate a file named List3.py. Here is the code:\n\n\
    ```python\n# Create a list\nanimals = [\"ant\", \"bat\", \"cat\", \"dog\", \"\
    eel\"]\n# Display the list\nprint(animals)\n# Update item 2\nanimals[2] = \"cow\"\
    \n# Display the list\nprint(animals)\n```"
  mdcn: "## 最后一招\n\n游戏完成了。每次你玩，都有同等的机会赢、输或平局。嗯……\n\n环顾四周，确保这部分没人看着。说真的。我们即将对代码使出超级反派的手段。准备好了吗？好的。作为程序员，你对应用拥有完全的控制权，而且，虽然我们绝不赞成这种行为，但你可以利用这种控制权给自己一个优势。\n\
