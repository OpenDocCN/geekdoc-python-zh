    \ 的 Python 库。\n\n保存和恢复是如何工作的？要保存你的游戏，你需要做以下几件事：\n\n1. 创建一个包含你需要保存的所有数据的单一变量。\n\
    2. 数据保存在计算机上的文件中，所以选择一个文件名来使用。\n3. 使用 `pickle` 将数据序列化并保存到文件中。\n\n恢复你的游戏是相反的过程：\n\
    \n1. 从保存的文件中读取数据。\n2. 使用 `pickle` 反序列化它。\n3. 将数据保存回正确的变量中。\n\n> **新术语**\n> **序列化**\
