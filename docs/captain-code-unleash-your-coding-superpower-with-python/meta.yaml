    The important thing about refactoring is that it is not about adding features
    or making any functional changes. When you refactor, you are not changing *what*
    your code does, just *how* it does it. Making lots of changes at once is never
    a good idea; it increases the chances of breaking things and makes it hard to
    find exactly what broke. When you refactor your code, your application will do
    exactly what it did beforehand, which means you can easily verify that things
    still work properly.


    Refactoring may sound complicated, but—surprise!—you’ve already started refactoring
    your code. Our string externalization exercise is an example of refactoring. By
    the time we wrapped up Chapter 13, the code was functionally identical to the
    code at the end of Chapter 12. We didn’t change what the code did, we changed
    how it did it by reorganizing and improving it. That’s exactly what refactoring
    is all about.


    So, let’s continue refactoring. And, yes, that means that by the time we’ve finished
    this chapter, the code will still be functionally identical to what it was in
    Chapters 12 and 13. Functionally identical, but reworked—or, rather, refactored.


    We previously discussed identifying and eliminating duplicated code. As we’ve
    noted, duplicating code is never a good idea. As you write code, you will inevitably
    discover that you have pieces of code that are repeated, either identically or
    with minor changes. Eliminating these duplications is an important part of refactoring
    your code.'
