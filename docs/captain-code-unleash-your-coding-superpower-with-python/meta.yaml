  md: "# Inline if Statements\n\nDid you notice anything different about the return\
    \ statement in the isAlive() method? That's an inline if statement—an if statement\
    \ with an else in a single line of code. Technically, this is called a ternary\
    \ conditional operator. (Yeah, that's why we called it an inline if statement.)\n\
    \nThis code:\n\n```\nreturn True if self.livesLeft > 0 else False\n```\n\nis functionally\
    \ equivalent to this code:\n\n```\nif self.livesLeft > 0:\n    return True\nelse:\n\
    \    return False\n```\n\nEither syntax works. We used the inline if because it\
    \ is just so much cleaner, and it looks so much more professional (and we love\
    \ looking very professional).\n\nNice, huh?\n\nOh, one important thing to note:\
    \ The isAlive() method is defined as def isAlive(self):, with the self argument.\
    \ In the if statement we just looked at, we called isAlive() with no arguments.\
    \ So, what about that self? Well, turns out you don't have to worry about it.\
    \ Python deals with that one for you; you just call the method (passing arguments,\
    \ if needed) but ignore the self argument when you are calling class methods.\n\
    \nMethods that simply return properties are great. But where classes become super\
    \ useful is when you create super useful methods that do whatever processing they\
    \ need to return super useful results.\n\nBack to our boulders and the methods\
    \ we'll need to hide the key and eventually make it discoverable. First this method:\n\
    \n```\n# Player visited the boulders\ndef visitBoulder(self):\n    self.boulderVisits\
    \ += 1\n```"
