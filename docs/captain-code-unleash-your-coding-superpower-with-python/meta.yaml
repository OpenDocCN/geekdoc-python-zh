    \n# 第 21 章\n\n## 我们喜欢动起来\n\n我们的游戏开始看起来像，嗯，一个游戏了。唯一的问题是车辆只是坐在那里，完全没有移动。在本章中，我们将改变这一点。\n\
    \n## 移动敌人\n\n现在我们有了一个带有道路背景的游戏屏幕，以及一辆出现在屏幕顶部随机位置的敌方车辆。现在我们将让敌人移动起来。\n\n如你所知，敌人正朝你驶来（方向正确——而你是那个开错方向的人！）。要让敌人移动，我们只需要将精灵沿屏幕向下移动。\n\
    \n敌人移动的速度有多快？这取决于你。如果它一次移动 1 像素，它会移动得非常慢；如果它一次移动 100 像素，它会移动得非常快。我们将从让它一次移动 5\
    \ 像素开始，稍后随着游戏的进行，我们会让它移动得更快。\n\n打开 Main.py 并在文件顶部附近添加这段代码，颜色定义之前或之后都是一个不错的位置：\n\
    \n```python\n# Game variables\nmoveSpeed = 5\n```\n\n这段代码创建了一个名为 `moveSpeed` 的变量，并将其初始化为\
    \ 5（我们将移动的像素数）。我们将在移动精灵时使用这个变量。\n\n哦，这个变量确实是可变的。我们很快会添加代码来改变游戏中的玩法，所以这次我们没有使用大写字母作为名称。\n\
    \n现在进入有趣的部分。转到游戏循环，找到将敌人绘制到屏幕上的代码。在那行代码之后，添加这段代码：\n\n```python\n# Move enemy downwards\n\
    enemy.rect.move_ip(0, moveSpeed)\n```\n\n`move_ip()` 用于移动精灵。它接受两个参数。第一个是水平移动的像素数；我们不想改变水平位置，所以这个值是\
    \ 0。第二个是垂直移动的像素数。我们传递 `moveSpeed`（我们初始化为 5），所以敌人将沿屏幕向下移动 5 像素。\n\n保存并运行代码。你会看到敌人从顶部的随机位置开始，然后沿屏幕向下驶向玩家。然后……哦不！……它直接驶出了屏幕！\n\
    \n## 上、下、左、右\n\n我们正在沿一个方向移动精灵，传递了垂直值但没有传递水平值。我们可以同时传递两个值，这将使精灵沿对角线移动。我们也可以传递负值：第一个值为\
    \ -5 将向左移动 5 像素，第二个值为 -5 将向上移动 5 像素。\n\n为什么会发生这种情况？`move_ip()` 按照代码设定，持续将敌人移动\
    \ 5 像素。它不关心精灵是否可见。敌人持续移动，最终移出了可见区域。\n\n应该发生的是，当敌人到达屏幕底部时，我们将它移回顶部。这样，看起来就像一辆车经过了我们，而一辆新车正朝我们驶来。为此，我们需要在每次移动敌人时检查它的位置，看它是否已经到达屏幕底部。\n\
    \n我们可以用一个简单的 `if` 语句来实现这一点。在 `move_ip()` 行之后添加这段代码：\n\n```python\n# Check didn't\
    \ go off edge of screen\nif (enemy.rect.bottom > IMG_ROAD.get_height()):\n   \
    \ # At bottom, so move back to top\n    enemy.rect.top = 0\n```\n\n保存并运行代码。敌方车辆沿屏幕向下行驶，当它到达底部时，它会移回顶部。\n\
    \n这是如何工作的？你会记得精灵周围有矩形，Pygame 用它们来跟踪精灵的位置。每次我们调用 `move_ip()` 时，Pygame 都会更新矩形，因此\
    \ `enemy.rect` 始终包含敌人精灵的精确位置。`enemy.rect.bottom` 包含敌人精灵底部的精确位置。`if` 语句只是检查敌人的底部是否大于道路的高度。如果是，那么我们已经移出了屏幕，然后代码将\
    \ `enemy.rect.top` 设置为 0，这会将它移回屏幕顶部。\n\n很酷，对吧？"
