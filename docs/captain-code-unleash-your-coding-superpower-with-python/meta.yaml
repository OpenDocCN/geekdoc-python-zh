  md: '# Escape Characters


    If you want to add a tab to your string you can use \t and Python will know that
    you want a tab, like this:


    ```

    # Print with a tab

    print("Hello\tcoders!")

    ```


    This will display text with a tab in it, like this:


    ```

    Hello    coders!

    ```


    Here''s another special character you can use. \n inserts a line break:


    ```

    # Print on two lines

    print("Hello\ncoders!")

    ```


    Here is what the output would look like.


    ```

    Hello

    coders!

    ```


    You can also use this technique to insert quotes (use \'') and double quote (use
    ") characters in your string.


    These are all called *escape characters*, and all start with a backslash.


    Do you see a problem with that? The \ is used to create a Python escape character.
    So, how can you ever display a backslash?


    The answer is to use a special escape character for backslashes, and that is the
    \ that we mentioned previously.


