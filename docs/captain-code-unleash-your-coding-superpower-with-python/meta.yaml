  md: '# Initializing Pygame


    Create a new file in your game root folder. As this is the main game file, name
    it Main.py (or any name of your choice, actually). Here’s the code:


    ```

    # Imports

    import pygame


    # Game colors

    BLACK = (0, 0, 0)

    WHITE = (255, 255, 255)

    RED   = (255, 0, 0)


    # Main game starts here

    # Initialize Pygame

    pygame.init()


    # Initialize frame manager

    clock = pygame.time.Clock()

    # Set frame rate

    clock.tick(60)


    # Set caption bar

    pygame.display.set_caption("Crazy Driver")

    ```


    If you save and run this code, it’ll look like nothing happened. Don’t panic!
    That’s what is supposed to happen, for now.


    Let’s review the code. We start by importing the Pygame library. Simple enough.


    Next, we define variables for a few colors that we’ll need in the game. Colors
    are specified as RGB values separated by commas, like this:


    ```

    # Game colors

    BLACK = (0, 0, 0)

    WHITE = (255, 255, 255)

    RED   = (255, 0, 0)

    ```'
