    # 第 3 章


    # 掷骰子


    既然你知道了如何使用函数和变量，我们将通过引入库和大量的随机性来让事情变得更有趣。


    ## 使用库


    我们在第1章中简要提到了库。你可以将库视为代码的集合——通常是函数（比如你已经使用过的 `print()` 和 `input()` 函数）。库很容易使用。你只需告诉
    Python 你需要哪个库，就可以使用其中的函数。就这么简单。是的，别人做了艰苦的工作，而你只需使用它。不错，对吧？


    Python 自带了许多库。有一个叫做 `datetime` 的库，它提供了各种处理日期的函数。`math` 用于数学运算。还有用于处理计算机文件、访问互联网网站、处理加密等等的库。而且库可以包含不止函数，正如你将看到的。


    如果 Python 没有你需要的库，它们可能在网上存在供你下载和使用。我们将在本书的第三部分探讨如何使用第三方库（即来自其他人的库，而不是 Python 自带的库）。


    ## random 库


    我们要看的第一个库叫做 `random`，顾名思义，它用于为你的代码添加随机性。想在1到100之间随机选一个数字吗？`random` 可以帮忙。创建一个游戏，需要敌人随机出现并具有随机的生命值？你也用
    `random` 来实现。即使是像模拟抛硬币这样简单的事情，也可以通过使用 `random` 来实现。


    好的，那么你如何告诉 Python 你想使用哪个库呢？你使用 `import` 语句。让我们试试看。创建一个名为 `Random1.py` 的新文件，并输入以下内容：


    ```

    import random

    ```


    > **了解 PyPI**

    Python 库的官方仓库叫做 PyPI，它是超过30万库的家园！


    关于随机的真相

    这里是关于计算机和随机性的真相：计算机不能做随机的事情。它们就是不能。人类可以，但计算机喜欢有条不紊地遵循指令，它们不知道如何做没有意义或没有特定顺序的事情。所以，它们实际上不能做任何随机的事情。当计算机似乎在做随机的事情时，它们实际上依赖于复杂的算法和不断变化的因素（如当前日期和时间）来模拟随机性。如果这听起来很复杂，嗯，确实有点。这就是为什么我们喜欢像
    random 这样的库。你只需使用库的函数，让库内部的代码为你完成所有艰苦的工作。


    这段代码告诉 Python 导入 random 库。保存代码并运行它。


    发生了什么？什么也没发生？看起来可能什么也没发生，但确实发生了一件大事。记住，Python 逐行运行你的代码。当它遇到带有 import 语句的那一行时，它会找到
    random 库并将其引入你的代码，准备供你使用。然后你没有使用它。但这没关系。现在你就要用了。


    ## 生成随机数


    更新你的代码，添加两行，如下所示：


    ```

    import random


    num=random.randrange(1, 11)

    print("Random number is", num)

    ```


    保存文件并运行它。然后再运行一次。再运行一次。运行几次。


    发生了什么？每次运行程序时，都会显示一个随机数。


    让我们看看代码，了解它在做什么。你知道第一行是做什么的：`import random` 导入 random 库。你也知道最后一行是做什么的：它打印一些文本和随机数。'
