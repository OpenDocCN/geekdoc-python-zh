  - '[PAGE 384]


    # There’s a Lot More to Python


    You learned a lot of Python in this book. And as you have discovered, Python is
    a fun and intuitive language. Python makes getting started simple, but don’t let
    that simplicity fool you. Python is crazy powerful and capable, which is why it
    is one of the most used languages in the world.


    So we want you to keep at it and dig into Python further:


    +   - We worked with classes a bit, but not enough. If there is one area where
    we’d like you to really double down, that’s what it is: classes. Actually, a great
    project would be to rewrite the Crazy Driver game using classes instead of one
    long block of code. In doing so, you’ll actually find yourself writing more code,
    not less. But when you’re done, you’ll find that you can add functionality and
    complexity with much less effort. And, to get you started, we’ve posted a class-based
    version of the game for you to download from the book page.

    - One topic we didn’t get to is working with data and external data files. These
    types of projects tend to be less fun and games, which is why we didn’t include
    them. But there is a huge demand for data scientists, and Python is one of the
    really popular ways to work with data. You can search online for project ideas.
    Look for data projects that involve XML files, JSON, and any large data sets.
    There are lots of these online, and lots of great examples to look at, too.


    # Web Development


    Websites and web apps are fun projects, but they pose an interesting challenge
    by virtue of how many different languages and technologies you need to use to
    build them. So, what’s involved in building websites?


    +   - Web pages are created using HTML, which is a language; but it is not a programming
    language (so no if statements, no loops, no variables). Rather, it is a markup
    language, and it is used to lay out elements of a web page. HTML is read by your
    web browser (think Chrome, Safari, Edge, Firefox, etc.) which is how they know
    what to display. The good news is that HTML is super easy to learn. The bad news
    is that HTML by itself doesn’t do much.'
  - '[PAGE 385]


    +   - You’ll also need CSS (Cascading Style Sheets) which is the language used
    to design and format web pages and elements.


    +   - Unlike HTML and CSS, JavaScript is indeed a programming language. It has
    been around for almost as long as the web because without it, the web would be
    a really boring place. JavaScript runs inside of the web browser, and it adds
    interactivity to pages. If you mouse over an item on a web page and something
    happens, that’s JavaScript making that happen. JavaScript is a programming language,
    and it is not too hard to learn, especially as you’ll tend to write lots of small
    blocks of code in it as opposed to full-blown applications. The key is that like
    HTML, JavaScript runs in the browser. For your web site or app to do anything
    more sophisticated, part of it needs to run on a server or in the cloud. And so:


    +   - Pretty much every web application has a server backend. This is the glue
    that holds the whole app together, and it tends to be the largest part of any
    web application. What languages are used to write the backend of a web application?
    You’ll be pleased to know that Python is a good and popular choice. Python itself
    doesn’t really have any web-specific libraries or technology, but there are community-created
    third-party libraries that you can use. One very popular one is called Flask,
    which makes it easy to generate web pages and respond to them. In addition to
    Python, you can use Java, PHP, .NET, and more, for your website backend.


    +   - Most websites need to store and access data (logins, items to purchase,
    user profiles, game scores, and so much more). This type of data lives in databases,
    and the language used to work with databases is called SQL. Fortunately, SQL is
    an easy language to learn (although it can take time to master).


    > **TIP**

    **Learn SQL** If you want to learn SQL, we have a book suggestion for you. It’s
    the best-selling SQL book out there, and it’s written by our very own Ben. You
    can find it at https://forta.com/books/0135182794/.'
  - '[PAGE 386]


    # Mobile App Development


    The one thing Python really isn’t well-suited for is mobile app development. For
    those you’ll want to use other languages:


    +   - To write apps for iOS (meaning they’ll run on iPhone and iPad), you’ll want
    to use a language called Swift. This is a pretty new language; it is easy to learn
    and use, and developers really like it. iOS apps are also written in Objective
    C (which is a variation of C, one of the most powerful languages out there, but
    a harder one to learn and master).

    - Android apps are written in Java, one of the most used programming languages.
    Java has lots of other uses, too (often used for server side and backend code)
    and it is the preferred language for Android development.


    Like web apps, your mobile apps will likely need backends, too. The options we
    mentioned for websites all apply to mobile apps, too.


    # Game Development


    We used Pygame to create a graphical game in Part III. Pygame is fun, easy to
    use, and quite powerful. But it is not a full-blown gaming engine. If you really
    want to write games, take a look at Unity, the most widely used gaming engine
    and platform out there. With Unity you can write games for every major operating
    system, mobile device, and gaming platform (including Nintendo Switch, Sony PlayStation,
    and Microsoft Xbox).


    Unity games are written in C#, which is a programming language based on C (and
    C++). Oh, and now that you’re familiar with Visual Studio Code, you’ll be pleased
    to know that Unity development is done with Visual Studio (VS Code’s big brother),
    so the IDE will be familiar.'
