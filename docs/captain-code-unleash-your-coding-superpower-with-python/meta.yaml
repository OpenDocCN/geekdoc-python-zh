  - '[PAGE 31]


    Python and Other Languages

    As we noted earlier, different languages have different uses. Python is great
    for general-purpose use, and it powers all sorts of websites, too. But you’d not
    use it, for example, to build a mobile app, as there are other languages far better
    suited to that task. That said, the techniques you’ll master while learning Python
    will absolutely be relevant and useful if, for example, you decide to use Java
    or Swift to create Android or iOS apps, respectively.


    # Setting Things Up


    Ok, enough talking. Let’s get things set up so you can start coding, and to do
    that you’ll need two things: the Python language and an editor. And, yes, we know
    there are quite a few steps, but you only have to do this once. Promise.


    > TIP

    Watch for the QR Codes All of the links and downloads referred to below can be
    found on the book web page, at https://forta.com/books/0137653573/ (or just scan
    the QR code at right). You’ll find QR codes throughout the book, scan them for
    downloads, tips, and more.


    # Installing Python


    Most computers don’t come with the Python language installed, so the first thing
    you’ll need to do is to install Python (which is free for the download). To do
    this:


    +   1. Open your web browser and go to https://python.org.

    2. Click on the Downloads link at the top of the screen.


    Using a Chromebook?

    If you are using a Chromebook, you can still use Python, but the installation
    steps are a bit more involved. You’ll find details on the books web page by scanning
    this QR code.'
  - '[PAGE 32]


    3. You’ll be presented with an option to download Python. There are different
    installers for Windows and Mac OSX and the download screen should automatically
    show the right one (if not, click to select it manually).


    Download the latest version of Python (3.9 something while this book was being
    written).


    4. When the download has completed, double-click on the downloaded file to run
    the installer. You should be able to just click all the default options and the
    installer will do its thing.


    > **TIP**

    **Using Windows?** During installation, you might see a checkbox that says something
    like Add Python to PATH. If you see this, be sure to check this box; it’ll make
    things easier for you in the future.


    When the installation has completed, you should have Python on your computer ready
    to use. But, before we start coding, there are two more steps needed.


    # Installing and Configuring Visual Studio Code


    If you want to write a document, you need an editor like Google Docs or Microsoft
    Word. If you want to create a video, you need a tool to capture and edit video.
    Right? Coding is much the same—to write code, you need an *editor*, which is an
    application you use to write and edit code.


    There are lots of editors out there, and they let you create and open files, type
    code, and save the files. Not very exciting, and so most coders use special editors
    that do a whole lot more. These special editors are called IDEs (which stands
    for *integrated development environments*). An IDE is an editor in that it lets
    you open and edit and save files, but it also does other really useful things.
    It can highlight errors in your code (not that you’ll ever make any), it colors
    your code making it easier to read, and much more. So, yeah, you want an IDE.


    Python comes with a built-in IDE called IDLE, and it’s ok, kinda. It works, but
    there are much better options. The one we like a lot is called Microsoft Visual
    Studio Code (or VS Code, for short). That’s what we use, and we recommend that
    you do, too.'
  - '[PAGE 33]


    Visual Studio Code

    VS Code is the little brother of Microsoft Visual Studio, which is a paid for
    IDE. If you happen to have access to the full version of Visual Studio, you are
    free to use that instead of VS Code.


    Using a Chromebook?

    If you are using a Chromebook, you can use VS Code only if your Chromebook supports
    Linux. For details on how to check for Linux support and how to install VS Code
    on Chromebook, go to the book''s web page by scanning this QR code.


    ![](img/1725feec73e591598339fc549aaff885_33_0.png)


    Why do we like VS Code? Lots of reasons. It''s fast. It provides lots of built-in
    help and syntax support. It supports all sorts of languages, including Python.
    Oh, and it''s free. Thank you, Microsoft!


    To install VS Code, follow these steps:


    +   1. Open your web browser and go to https://code.visualstudio.com/.

    2. Click on the blue **Download** button. Like before, there are different installers
    for Windows and macOS, and the download screen should automatically show the right
    one. (If not, click the down arrow next to the **Download** button to select it
    manually.)

    3. Download the latest version of VS Code (it''ll probably be called "Stable Build").

    4. When the download has completed, double-click on the downloaded file to run
    the installer.

    5. If you are prompted with a checkbox that says **Edit with Code**, check it.
    Other than that, you should be able to just leave all the default options.

    6. When the installer is finished, make sure **Launch Visual Studio Code** is
    checked and click **Finish**. The installer will close, and VS Code will start.


    We''re almost done. Remember, VS Code supports all sorts of languages. We are
    going to use it with Python, so the last thing we need to do is to let VS Code
    know that. Once VS Code knows that we''ll be using Python, it may install extra
    software so that we''ll have all the Python support we''ll need.'
