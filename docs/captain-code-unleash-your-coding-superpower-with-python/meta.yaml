    # ## Creating Lists


    So, how do you create a list in Python? Well, as you have already seen, you can
    simply create a variable to create a list. What makes it a list? If the values
    you store in the variable are enclosed with [ and ] (square brackets), then you''ve
    created a list.


    So this line of code will create an empty list:


    ```

    animals=[]

    ```


    animals is a variable that is a list, but it is empty.


    This line of code creates a list with five items in it:


    ```

    animals=["ant","bat","cat","dog","eel"]

    ```


    > **Lists Can Contain All Sorts of Things**

    The list you created in Chapter 3 was a list of strings. And to keep things simple,
    the examples we''ll use here will all be lists of strings. But it is worth noting
    that lists in Python are powerful and flexible. They can store all sorts of things—numbers,
    dates, even lists. (Yep, you can create a list of lists, and we''ll do that in
    Part II of this book.)'
