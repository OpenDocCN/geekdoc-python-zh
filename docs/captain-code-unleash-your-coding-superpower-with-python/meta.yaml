    Save and run this code. It’ll print two lines of output, reporting the game root
    and image folder.


    The code is pretty simple. The first path variable is created like this:


    ```

    GAME_ROOT_FOLDER=os.path.dirname(__file__)

    ```


    This simply saves the extracted folder path to the variable GAME_ROOT_FOLDER.


    The next line saves the path to the image folder, which is inside the game root.
    To do this, it uses a function called os.path.join(), like this:


    ```

    IMAGE_FOLDER=os.path.join(GAME_ROOT_FOLDER, "Images")

    ```'
