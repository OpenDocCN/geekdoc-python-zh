- img_proc: true
  md: '# Mobile App Development


    The one thing Python really isn’t well-suited for is mobile app development. For
    those you’ll want to use other languages:


    +   - To write apps for iOS (meaning they’ll run on iPhone and iPad), you’ll want
    to use a language called Swift. This is a pretty new language; it is easy to learn
    and use, and developers really like it. iOS apps are also written in Objective
    C (which is a variation of C, one of the most powerful languages out there, but
    a harder one to learn and master).

    - Android apps are written in Java, one of the most used programming languages.
    Java has lots of other uses, too (often used for server side and backend code)
    and it is the preferred language for Android development.


    Like web apps, your mobile apps will likely need backends, too. The options we
    mentioned for websites all apply to mobile apps, too.


    # Game Development


    We used Pygame to create a graphical game in Part III. Pygame is fun, easy to
    use, and quite powerful. But it is not a full-blown gaming engine. If you really
    want to write games, take a look at Unity, the most widely used gaming engine
    and platform out there. With Unity you can write games for every major operating
    system, mobile device, and gaming platform (including Nintendo Switch, Sony PlayStation,
    and Microsoft Xbox).


    Unity games are written in C#, which is a programming language based on C (and
    C++). Oh, and now that you’re familiar with Visual Studio Code, you’ll be pleased
    to know that Unity development is done with Visual Studio (VS Code’s big brother),
    so the IDE will be familiar.'
