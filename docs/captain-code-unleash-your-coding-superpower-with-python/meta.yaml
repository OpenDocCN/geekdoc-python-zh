    for trouble. If the property is named health, it''s safer to use anything but
    the name health for the argument name.


    # Shopping for Items


    Buying items is a popular and common game feature. Some items may be required
    (meaning the game can''t be finished without having procured them), and some may
    be optional (they improve the game experience but are not required to complete
    the game). Allowing players to buy items is a good way to add variability to a
    game. By buying different items, players can impact game play.


    We added support for coins in our inventory system. But we never added any way
    to do anything with the coins.


    So, how could you support shopping in your code? There are a few things you''ll
    need to do:


    +   - Players need a way to obtain coins. You can perhaps give them coins when
    they solve a puzzle. Or enemies can drop coins when they are beaten. You can hide
    coins in various locations and add them to the player''s inventory when found.
    (If you do this, you need to decide what happens if the player revisits that location.
    Do they get more coins, or is it a one-time deal?)

    - You need to decide if the store is always available as an option or whether
    it''s in specific game locations.

    - You need a way to display a list of things available for purchase.

    - And, finally, when the player purchases an item, you need to remove those coins
    from the inventory and add the item they bought.


    There is no single way to implement these tasks, but we''ll show you one way to
    create a list of items for purchase and how to display them to the player.'
