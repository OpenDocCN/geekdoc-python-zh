    如果向 `get()` 传递了无效的 `id`，函数将返回一个空字符串。\n\n`get()` 不显示文本——其中没有 `print()`——而只是将其返回给你的代码。由你的代码决定如何处理这些文本，如果需要，代码确实可以打印它。\n\
    \n如果使用 `get(\"Welcome\")` 调用该函数，它将返回欢迎消息。任何其他需要的字符串也是如此。想测试它是否工作吗？在 `Strings.py`\
