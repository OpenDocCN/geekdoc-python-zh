  - '[PAGE 348]


    Let’s walk through this together.


    We start by using `key.get_pressed()` to check if left or right arrow key was
    pressed.


    If the left arrow key was pressed and we’re not too far to the left, `move_ip()`
    moves the player sprite 5 pixels to the left. This is the same code that we used
    before. What changed is what comes next. An if statement checks to see if the
    left edge of the player rectangle is less than 0, which would mean we’ve moved
    too far. If that happens, we set `player.rect.left = 0`, which puts the player
    sprite exactly on the left edge.


    The code then does the same thing for the right arrow key. If the right edge of
    the player sprite is greater than the road width, then we’ve gone too far. If
    that happens, we set `player.rect.right = IMG_ROAD.get_width()`, which aligns
    the sprite as far right as it can go.


    Much better. Our cars now all move, and they can’t end up where they shouldn’t
    be.


    Although nothing happens when you crash into oncoming cars. We’ll fix that next.


    > ### Making Lots of Little Changes

    In our code, we move the player sprite and then correct the position if we allow
    it to move too far.


    So, question: Is this really a good option? Won’t it look weird to the player
    if their car moves slightly offscreen and then nudges back?


    And the answer is…nope! Not at all. In fact, the player will have no idea.


    You can make as many changes as you want to the display— change colors, add or
    remove sprites, move items, do whatever you want—and the player will see none
    of those changes while they are happening.


    Why? As explained previously, Pygame doesn’t actually update the display until
    you call `pygame.display.update()`. This means you can move sprites, adjust them,
    do whatever you need, without the player knowing. They’ll see the changes you
    made only when you want them to.


    And that’s why we put `pygame.display.update()` at the very bottom of the game
    loop. Pretty smart, huh?'
