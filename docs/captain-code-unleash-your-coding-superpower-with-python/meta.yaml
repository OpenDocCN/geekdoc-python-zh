    IMG_ROAD = pygame.image.load(os.path.join(IMAGE_FOLDER, "Road.png"))

    ```


    To use an image in Pygame, it needs to be loaded into a variable and placed on
    a surface. Here we want to load the road image; that''s the file Road.png in the
    Images folder. As we did before, we use os.path.join() to safely (and portably)
    create the file path to the file we need. pygame.image.load() then retrieves the
    specified image and draws it on a surface named IMG_ROAD.


    It is important to note that loading an image doesn''t actually display it. To
    display the image, we need to copy this new surface to our main game surface and
    then update the display. We''ll get to that in a moment.


    Next, we initialize the game screen, as we did before. But there''s an important
    change here. Previously we gave set_mode() an exact hard-coded screen size (500
    pixels by 800 pixels). Not anymore. Look at this revised line of code:


    ```

    # Initialize game screen

    screen = pygame.display.set_mode(IMG_ROAD.get_size())

    ```


    We previously loaded Road.png into the IMG_ROAD surface. IMG_ROAD knows all about
    the image, including how big it is. So, rather than hard code the size (hard code
    = bad, right?), we use IMG_ROAD.get_size(). This way, the game window will be
    sized to match the road background image size (which, coincidentally, just happens
    to be 500 pixels by 800 pixels). And if we used a different sized image, the window
    would adjust accordingly.'
  - '[PAGE 331]


    There is one more super-important change. We removed the code that makes the background
    white and added this to the game loop in its place:


    ```

    # Place background

    screen.blit(IMG_ROAD, (0,0))

    ```


    This line of code is what puts the road image onto the game screen. Remember,
    we have two surfaces now: the main game surface (which we called screen) and the
    background image surface (which we called IMG_ROAD). The blit() function copies
    a passed surface and copies it onto another surface. Here it copies IMG_ROAD onto
    screen.


    blit() takes two arguments: the image being copied and where to copy it to. Why
    is that second argument needed? Surfaces are two dimensional. Think of them as
    squares (or rectangles). When you copy an image onto a surface, you need to tell
    the surface where to place the image by using an x,y coordinate—a pair of numbers
    that identifies a location on the target surface. 0, 0 refers to the top-left
    corner of the screen, which is exactly where we want our background placed so
    that it fills the entire screen.


    > **NEW TERM**

    **x,y Coordinate** An x,y coordinate (also called an x,y axis) marks a location
    on a plane. The x number is the horizontal position starting from the left, and
    the y number is the vertical position starting from the top. And, as you''d expect,
    in Python these values start from 0. This means that position 0, 0 is the top-left
    corner, 100, 50 would be 100 pixels from the left and 50 from the top, and so
    on.


    > **NEW TERM**

    **Blit** Blit is a strange word, right? It actually stands for *block transfer*,
    which is what actually happens when you blit: You copy (transfer) a block of information
    from one location to another.'
