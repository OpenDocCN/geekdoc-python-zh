  md: '• For greater impact, you can use background colors, too. If you want to do
    so, you''ll need to add Back to the import line, and then you can do things like
    Back.WHITE+Fore.RED.


    • Remember that colors are sticky. What does that mean? If you don''t set a color
    in a print(), then the last color you set will be used. Setting a color basically
    turns it on, and it remains the active color until you change it. So if something
    isn''t coloring as expected, you probably didn''t exactly provide a color, and
    the previously chosen color is being used. This applies to setting background
    colors, too.


    • You''ll also want to set colors back when your application finishes running.
    If you don''t, the last color used will remain the Terminal text color. So, in
    the gameOver() function, you should probably set the color back to Fore.WHITE
    when you are done.


    > TIP

    **You Can Auto Reset** If you don''t want colors to be remembered, change your
    init() to init(autoreset=True). This way, colors will be applied to the current
    print() only.


