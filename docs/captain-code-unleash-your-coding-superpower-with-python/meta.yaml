    For inventory items that the player can accumulate multiple times (like your coins),
    you’d want a function that gets items (it’ll increment the value) and drops items
    (decrement the value), as well as a way to return how many are in the inventory.


    When your game necessitates additional items, you simply need to add a key:value
    pair to the dictionary and then create the wrapper functions.


    # Plugging In the Inventory System


    Now that you have an inventory system, let’s add it to our code. How? Another
    import. Change your Main.py so that the imports look like this:


    ```

    # Imports

    import Strings

    import Utils

    import Inventory as inv

    ```


    That last import needs explaining.


    As you will recall, when you execute functions in a library, you need to provide
    the fully qualified function name, like this:


    ```

    Inventory.takeStructureKey()

    ```


    Inventory is a good name for the file, but it is a long word to type over and
    over. So what do we do? We give it an alias:


    ```

    import Inventory as inv

    ```


    This tells Python to import the Inventory library but to refer to it by the shorter
    name inv, like this:


    ```

    inv.takeStructureKey()

    ```


    Much better!'
