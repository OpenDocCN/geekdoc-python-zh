  md: '# Splash Screen


    Let’s start with an easy one. Right now, the Crazy Driver game runs and starts.
    It has no introduction, no warning, no click-to-start. It just runs (because that’s
    how we coded it). Most games start with a splash screen that displays the game
    name and maybe instructions (like telling players what keys to use) and the name
    of the creator (that’s you, BTW).


    So, how could you create a splash screen? Well, you could use the GameOver() code
    as a starting point. Copy it to a GameStart() function and call that function
    before your main game loop. You could use the same black background or any other
    color. Or, you could use the road image as the background.


    You’ll need to decide how the splash screen disappears and the game starts. Is
    it a timed pause like the Game Over! screen? Or should the user press a key or
    click a button to start the game? Either option works, and you get to decide which
    to use.


    # Scores and High Scores


    The Game Over! screen just says Game Over! That’s not very interesting. At a minimum,
    it should also display the player’s score, perhaps like this:


    ![](img/1725feec73e591598339fc549aaff885_376_0.png)'
  merge: -1
