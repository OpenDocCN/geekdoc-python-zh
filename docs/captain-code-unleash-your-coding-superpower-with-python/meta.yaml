- md: "## Contents at a Glance\n\n## CHAPTER 16 Keeping It Classy\n\n- The Player\
    \ System\n- Creating a Player Class\n  - Creating the Class\n  - Defining Properties\n\
    \  - Creating Methods\n  - Initializing the Class\n- Using Our New Class\n- Summary\n\
    \n## CHAPTER 17 Color Your World\n\n- Installing Third-Party Libraries\n- Using\
    \ Colorama\n  - Importing and Initializing the Library\n  - Coloring Your Output\n\
    - Summary\n\n## CHAPTER 18 Keep Going\n\n- Health and Lives\n- Shopping for Items\n\
    - Random Events\n- Battling Enemies\n\n## PART III: Racing Around\n\n## CHAPTER\
    \ 19 Crazy Driver\n\n- Introducing Pygame\n- Prepping the Game\n  - Game Concept\n\
    \  - Installing Pygame\n  - Creating Work Folders\n  - Obtaining Images\n- Getting\
    \ Started\n- Initializing Pygame\n- Displaying Stuff\n  - The Game Loop\n- Summary\n\
    \n## CAPTAIN CODE: Unleash Your Coding Superpower with Python\n\n- CHAPTER 20\
    \ Image-ine the Possibilities\n  - Files and Folders\n  - Setting the Background\n\
    \  - Placing the Cars\n  - Summary\n- CHAPTER 21 We Like to Move It\n  - Moving\
    \ the Enemy\n  - Moving the Player\n  - Summary\n- CHAPTER 22 Crash, Bang, Boom\n\
    \  - You Crashed, Game Over\n  - Tracking Score\n  - Increasing Difficulty\n \
    \ - Summary\n- CHAPTER 23 Finishing Touches\n  - Game Over Revisited\n  - Pause\n\
    \  - Varying Enemies\n  - Ice Cubes\n  - Summary\n- CHAPTER 24 Keep Going\n  -\
    \ Splash Screen\n  - Scores and High Scores\n  - Oil Slick\n  - Multiple Enemies\n\
    \  - And Then...\n  - Summary\n- What Next?\n  - There’s a Lot More to Python\n\
    \  - Web Development\n  - Mobile App Development\n  - Game Development\n  - And\
    \ Then...\n- Index\n- CHAPTER 25 Tinkering, Testing, and Debugging Revisited (Online\
    \ Only)\n\n## Register Your Book\n\nRegister your copy of *Captain Code* on the\
    \ InformIT site for convenient access to updates and/or corrections as they become\
    \ available. To start the registration process, go to informit.com/register and\
    \ log in or create an account. Enter the product ISBN **9780137653577** and click\
    \ Submit. Look on the Registered Products tab for an Access Bonus Content link\
    \ next to this product, and follow that link to access any available bonus materials.\
    \ If you would like to be notified of exclusive offers on new editions and updates,\
    \ please check the box to receive email from us.\n\n## Acknowledgments\n\nBen\
    \ Forta\n\nIt’s hard to believe that I’ve been writing and publishing for 25 years!\
    \ Pearson was the publisher for my very first book back in 1996, and since then\
    \ we’ve collaborated in creating and publishing over 40 titles. Together we have\
    \ educated and inspired developers (and future developers) the world over. Looking\
    \ back over a quarter of a century, I can truly say thank you for all these years\
    \ of dedication and support. This book is the first I’ve written for young people,\
    \ so extra thanks for trusting our vision and giving us authors the freedom and\
    \ flexibility to create this title as we saw fit.\n\nIn particular, thanks to\
    \ Kim Spencely for shepherding this title from concept to fruition, and to Chris\
    \ Zahn for (once again) providing his development expertise.\n\nFor the past few\
    \ years I’ve had the pleasure of leading a Robotics class at Farber Hebrew Day\
    \ School in Southfield, MI. When COVID wreaked havoc on teaching, we pivoted to\
    \ online classes and I used the opportunity to improve my students’ coding skills\
    \ by teaching them Python. Those students were my guinea pigs, and those lessons\
    \ were the impetus for this title. So, thank you FHDS for giving me the opportunity\
    \ to inspire your students, and thank you students for helping me learn how to\
    \ best teach you.\n\nThanks to our son Eli, a super talented designer and up-and-coming\
    \ architect, for creating the image assets provided with this book.\n\nAnd finally,\
    \ thanks to our son Shmuel, a brilliant engineer, passionate educator, and my\
    \ collaborator on this title. I’ve worked with co-authors on about half of my\
    \ books, and, if I’m being honest, I’d much rather write all by myself. This collaboration\
    \ was an exception. Shmuel’s experience helped shape this volume, his insights\
    \ can be felt on every page, and working with him has been a source of joy and\
    \ pride. Thank you!\n\n## Shmuel Forta\n\nWriting this book was an exciting and\
    \ humbling experience for me. I am honored to have been given the opportunity\
    \ to share with the world what I have been teaching seventh and eighth graders\
    \ for half a decade.\n\nI’d like to give a special thank you to Pearson. Their\
    \ trust in our writing process allowed us to create this book without compromising\
    \ our vision. An extra special thanks to Kim Spencely and Chris Zahn, without\
    \ whom this book would not have been written, edited, or published.\n\nI would\
    \ also like to thank my wife, Chana Mina, for…well…everything. Thank you for putting\
    \ up with me in general (a feat in and of itself); I know that writing this book\
    \ took up a significant amount of my time, but you were always there for me. Without\
    \ your support (as well as your recommendations for this publication), I don’t\
    \ know where I’d be. Thank you for being you.\n\nA special thank you to my family:\
    \ Mom, my siblings, and my in-laws for helping me and supporting me through everything,\
    \ as well as for the encouragement and strength you gave me to compose this book.\n\
    \nFinally, a special (though that word doesn’t even start to express it) thank\
    \ you to my father and co-author. When I was under the age of 10, Dad got me started\
    \ on coding with Visual Basic. Some of my fondest memories are of me and my Dad\
    \ huddled over the old laptop that I was using, while my Dad patiently tried to\
    \ steer me toward finding the bug in my code (an ‘=’ instead of an ‘==’). I remember\
    \ the sheer joy of running downstairs to show Dad my number guessing game, my\
    \ inefficient calculator using drop-down menus, and later my first graphical game\
    \ (an overhead space shooter). The unbridled excitement of child Shmuel from his\
    \ creations could only be matched by my Dad’s pride and love of my work. Dad’s\
    \ enthusiasm, encouragement, and unparalleled support are responsible for my love\
    \ of coding. I now have met many talented programmers with a variety of skills,\
    \ but few actually love coding the way that Dad or I do. And my love for coding\
    \ was shared with me by my Dad. I can’t thank you enough for collaborating on\
    \ this title with me, but even more importantly, for raising me to be who I am\
    \ today and sharing your love of programming with me."
