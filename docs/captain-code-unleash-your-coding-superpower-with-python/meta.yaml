    注意你的引号和逗号。你需要在文本周围使用引号，但不要在变量名周围使用。并且确保用逗号分隔所有参数。这就是颜色编码非常有用的地方：如果颜色不对，那么你可能搞错了引号或逗号。


    ## 获取用户输入


    既然你的故事使用了变量，将其更改为显示用户提供的文本就很容易了。只需将每个变量更改为使用 `input()`，就像我们在本章前面所做的那样。以下是我们的示例：


