  md: '> **TIP**

    **Work Like a Pro** Libraries, both built-in ones and third-party ones like Pygame,
    tend to have lots of modules with lots of methods. You don’t need to memorize
    them. Type part of a name, and VS Code will help you find what you need. And if
    that doesn’t work, just do what the pros do and Google it. If you search for “Python
    get file path,” you’ll see code much like what we used here, and other solutions,
    too.


    The os library contains functions for working with your operating system, including
    files. os.path.dirname() accepts a path and extracts just the folder portion,
    which is what we need.


    With this, we can easily create variables for our game paths. Here’s the updated
    code:


