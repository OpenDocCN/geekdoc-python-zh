    Save the file and run it. And then run it again. And again. Run it a few times.


    What happens? Each time you run your program, a random number is displayed.


    Let''s look at the code to understand what it is doing. You know what the first
    line does: import random imports the random library. And you know what the last
    line does: It prints some text and the random number.'
