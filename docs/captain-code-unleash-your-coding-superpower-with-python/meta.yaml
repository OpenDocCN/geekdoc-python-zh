    ```


    `len(txt)` returns the length of the passed text. `(len(txt) + 4)` returns the
    length of the passed text plus 4. And as you''ve seen previously, multiplying
    a character by a number returns a string of repeating characters. If the text
    were Shmuel, this `print()` statement would return ********** (10 border characters).


    The next `print()` statement displays the middle line, which is made up of border
    character, space, text, space, and border character, as we just explained.


    The final `print()` statement is the bottom border and is the same as the top
    border.


    > ### Arguments Are Local

    Within the `displayWelcome()` function there is a variable named `txt`. This was
    created by the function, and it contains the argument value—so whatever gets passed
    to the function will be stored in `txt`.


    This variable is special in that it only exists inside the `displayWelcome()`
    function. This type of variable is called a *local* variable, and it is local
    to the function that created it.


    What does this mean? Try adding a `print(txt)` at the very bottom of the code.
    You''ll see an error message saying `txt` is not defined. This is because outside
    `displayWelcome()`, the variable `txt` is indeed not defined; it is created when
    the function starts, and it is destroyed when the function finishes executing.


    If the function were to be called again, a new local `txt` variable would be created
    (possibly with a different value) and would exist until the function finishes
    executing.


    And Python does this all automatically: creating the variable when you need it
    and destroying it when you are done.'
