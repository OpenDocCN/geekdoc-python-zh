    \n## 总结\n\n如果你想成为一名优秀的程序员，你需要不断地编码、编码、再编码。没有捷径可走。你写的代码越多，你就会变得越好。因此，在本章中，我们为你提供了三个可以自己构建的应用程序。这些程序并非设计得超级困难，并且都可以使用你迄今为止所学的知识来编写。\n\
    \n至此，你已经完成了本书的第一部分。恭喜！在第二部分和第三部分，我们将改变我们的做法。不再是编写大量小程序，而是每一节都构建一个完整且更全面的程序。准备好了吗？\n\
    \n# 第二部分\n\n# 冒险之旅\n\n- 第11章 变得函数化\n- 第12章 探索\n- 第13章 清理时间\n- 第14章 减少、重用、回收、重构\n\
