    \ textSize)\n    textGameOver = fontGameOver.render(\"Game Over!\", True, RED)\n\
    \    rectGameOver = textGameOver.get_rect()\n    rectGameOver.center = (IMG_ROAD.get_width()//2,\n\
    \                           IMG_ROAD.get_height()//2)\n    # Black screen with\
    \ game over text\n    screen.fill(BLACK)\n    screen.blit(textGameOver, rectGameOver)\n\
    \    # Update the display\n    pygame.display.update()\n    # Destroy objects\n\
    \    player.kill()\n    enemy.kill()\n    # Pause\n    time.sleep(5)\n    # Quit\
    \ pygame\n    pygame.quit()\n    sys.exit()\n```\n\nYou can save the code and\
    \ try the game. When you crash, you'll see a black screen with a bright red \"\
    Game Over!\" message.\n\nLet's look at the code.\n\nWe start by creating a font\
    \ object (named `fontGameOver`) and passing it the font name and size variables.\n\
    \nThen the `render()` method is used to draw text on a new surface, which we named\
    \ `textGameOver`. `render()` accepts the text to be drawn, an *antialiasing* flag\
    \ that we set to `True` to smooth out font lines, and the text color, which we\
    \ set to `RED` (using the color variables we created way back when). `render()`\
    \ can also accept an optional text background color, but we skipped that as we'll\
    \ be filling the entire window with background color anyway.\n\n> **NEW TERM**\n\
    > **Antialiasing** When lines (including lines that make up text) are drawn using\
    \ pixels, the edges can look jagged. *Antialiasing* is a technique used to smooth\
    \ out those edges.\n\nNext, we get the object's rectangle and set the sizes, just\
    \ like we did with all of the image and sprite objects. We need to do this because\
    \ we're going to blit it, just like the cars and the background.\n\nThe background\
    \ is then painted black with `fill()`, just like we did in Chapter 19, and the\
    \ text object is blitted onto the display. Our friend `display.update()` then\
    \ updates the screen to display our background and text.\n\nNext, we do some cleanup,\
    \ destroying the player and enemy sprites that we created.\n\n### Killing Objects\n\
    \nPython is really good about cleaning up after itself. If you create objects\
    \ and don't remove them, Python will do it for you. But coders generally like\
    \ to control when objects are created and killed, which is why we explicitly cleaned\
    \ up our sprites here.\n\nWe want the \"Game Over!\" text to be displayed for\
    \ 5 seconds, so we pause using the `sleep()` function, like this:\n\n```\n# Pause\n\
    time.sleep(5)\n```\n\nAnd finally, we quit Pygame.\n\n## Pause\n\nSome games allow\
    \ players to pause and catch their breath. How could we do that in our game? If\
    \ we set `moveSpeed` to 0, then nothing will move, effectively pausing the game.\n\
    \nWhat makes this a little tricky is if you are going to set `moveSpeed` to 0,\
    \ you need to remember what the speed was before you paused so you can set it\
