- md: "When creating a list of items that can be purchased you'll want to think about\
    \ how this information will be used. You'll need to check that the player has\
    \ enough money to buy an item, so you'll need to access the cost. You'll want\
    \ a clear description of the item. And so on.\n\nTo this end, you create a list\
    \ of dictionaries. Each item in a dictionary is one item that can be purchased.\
    \ If you need to add more items to the game, you just add items to this dictionary.\
    \ And then you write supporting functions. Here's one example, which gets the\
    \ items that are available for purchase:\n\n```\n# Get available items\n# Return\
    \ in format used by getUserChoice()\ndef getItems():\n    # Variable for result\n\
    \    result = []\n    # Loop through items\n    for item in items:\n        #\
    \ Create empty list\n        i=[]\n        # Add key\n        i.append(item[\"\
    key\"])\n        # Add description + cost\n        i.append(item[\"description\"\
    ]+\" (\"+str(item[\"cost\"])+\")\")\n        # Add this item to the result\n \
    \       result.append(i)\n    # Return it\n    return result\n```\n\ngetItems()\
    \ is an interesting function. As you will recall from Chapter 14, the getUserChoice()\
    \ function expects choices to be passed as a list of lists. Your list of items\
    \ to be purchased is a list of dictionaries. So, getItems() loops through the\
    \ items and creates the list of lists that getUserChoice() expects. How does it\
    \ do this?\n\nThe function starts by creating an empty list to store the result,\
    \ like this:\n\n```\nresult = []\n```\n\nIt then uses a for loop to loop through\
    \ the items. Each time it loops, it creates another temporary list variable to\
    \ store this particular item, like this:\n\n```\n# Create empty list\ni=[]\n```\n\
    \nIt then needs to add two items into this list. The first is the menu letter\
    \ (what the player enters to select a menu option), and the second is the menu\
    \ text. To add the first, we do this:\n\n```\n# Add key\ni.append(item[\"key\"\
    ])\n```\n\nThe append() function adds an item to a list, and here it adds the\
    \ value key for the current item.\n\nThe menu text is comprised of the description\
    \ and the cost, like this:\n\n```\n# Add description + cost\ni.append(item[\"\
    description\"]+\" (\"+str(item[\"cost\"])+\")\")\n```\n\nAgain, append() adds\
    \ this to the temporary list. When done, the list (for the first item) will look\
    \ like ['H', 'Health restoration potion. (100)'], which is exactly what we need.\n\
    \nThis item is then added to the result:\n\n```\n# Add this item to the result\n\
    result.append(i)\n```\n\nThis continues for each item, and then the completed\
    \ result is returned.\n\nNow the list of items can be displayed using the existing\
    \ menu function, perhaps like this:\n\n```\n# Display shopping list menu\nchoice=Utils.getUserChoice(Items.getItems())\n\
    ```\n\nClever, huh?\n\nIf you plan to implement items and shopping, here are some\
    \ things to consider:\n\n- Give players ways to obtain coins. (We'll show you\
    \ one idea next.)\n- Decide how the player displays the store and items.\n- Possibly\
    \ put shopping in a loop so that the player can keep buying things until they\
    \ are done.\n- You may want to limit the shopping to show only items the player\
    \ can afford. You could modify getItems() to accept the number of coins the player\
    \ has, and then, when you loop to build the list of items, have an if statement\
    \ that checks the cost and only append ones the player can afford.\n- Some items\
    \ purchased will need to be added to the inventory. If the player buys health\
    \ or lives, you call the appropriate player() methods instead.\n\n## Random Events\n\
    \nYou may want your game to be linear, meaning that things happen in a specific\
    \ order every time the game is played. Or you may want to introduce variability\
    \ into the game, so that each time it is played, things are a little different.\
    \ There is no right or wrong way to implement game play. You, as the coder, get\
    \ to decide what your game does.\n\nIf you do want to introduce variability, you\
    \ can employ random events. You know how to use the random library; we did that\
    \ together way back in Chapter 3. You can use random anywhere you want to introduce\
    \ a random event. For example, code like this would find 100 coins on the ground\
    \ and would add them to the inventory:\n\n```\n# 100 coins show up 1 in 4 times\n\
    if random.randrange(1, 5) == 1:\n    # Tell player\n    print(\"You see 100 coins\
    \ on the ground.\")\n    print(\"You pick them up.\")\n    # Add to inventory\n\
    \    inv.takeCoins(100)\n```\n\nThis code would find coins about one in four times.\
    \ How? Because the random.randrange(1, 5) returns a random number from 1 to 4\
    \ (the 5 is not included, as you will recall). This means that approximately a\
    \ quarter of the time the code will return 1, a quarter of the time it'll return\
    \ 2, and so on. The if statement checks to see if randrange() returned 1, which\
    \ it does about one in four times, and if yes, the coins are found and picked\
    \ up. So, a quarter of the time that this function runs, the user will get coins.\
    \ Want it to be one in three times? Just change the range to be 1, 4.\n\nIf you\
    \ do this often enough, you might want to write a function to determine if a random\
    \ event should occur or not. Look at this function (which could be added to Utils.py):\n\
    \n```\n# Should a random event occur?\n# Pass it a frequency, 2=1 out 2, 3=1 out\
    \ of 3, etc.)\ndef randomEvent(freq):\n    return True if random.randrange(0,\
    \ freq)==0 else False\n```\n\nrandomEvent() accepts a single argument, which tells\
    \ the function how often the event should occur. Pass it 4, and it'll return True\
    \ one in four times and False the other three times. Pass it 2, and half the time\
    \ it'll return True and half the time it'll return False. The logic is the same\
    \ as in the previous example, but this time it is put into a user-defined function.\n\
    \nBy using this function you don't really have less code than you'd have by using\
    \ randrange() right inside your app. But using a user-defined function like this\
    \ is still a good idea. For starters, it keeps your code cleaner. In addition,\
    \ it allows you to easily change how randomness works; just change one function\
    \ rather than lots of individual pieces of code.\n\nSo how would you use the function?\
    \ Like this:\n\n```\n# 100 coins show up 1 in 4 times\nif Utils.randomEvent(4):\n\
    \    # Tell player\n    print(\"You see 100 coins on the ground.\")\n    print(\"\
    You pick them up.\")\n    # Add to inventory\n    inv.takeCoins(100)\n```\n\n\
    As you can see, the result is the same, but the code is a bit cleaner. Utils.randomEvent(4)\
    \ returns True approximately one in four times, and when that happens, the code\
    \ under if is executed, and the player gets the coins.\n\nAnd you can add even\
    \ more randomness if you'd like. Look at this example:\n\n```\n# 1-100 coins show\
    \ up 1 in 4 times\nif Utils.randomEvent(4):\n    # Pick a random number of coins\n\
    \    coins=random.randrange(1, 101)\n    # Tell player\n    print(\"You see\"\
    , coins, \"coins on the ground.\")\n    print(\"You pick them up.\")\n    # Add\
    \ to inventory\n    inv.takeCoins(coins)\n```\n\nNow there is a one in four chance\
    \ of finding a random number of coins (between 1 and 100). Randomness is a great\
    \ way to make your game more interesting.\n\n## Battling Enemies\n\nBattling enemies\
    \ is another common game feature. Unfortunately, this one is a bit trickier to\
    \ implement. That said, we'll give you some pointers to get you started.\n\nLike\
    \ items, enemies have properties. So you'll want an Enemies.py file, perhaps something\
    \ like this one:\n\n```\n#####################################\n# Enemies\n# Defines\
    \ enemies, supporting functions\n#####################################\n\n# List\
    \ of enemies\n# Each needs a short name, a description,\n# strength (higher number\
    \ = need to do more damage to kill),\n# and defense (lower number = easier to\
    \ hit)\n```\n\n```\nenemies = [\n    {\n        \"id\": \"slug\",\n        \"\
    description\": \"Space slug\",\n        \"strength\": 10,\n        \"damageMin\"\
    : 1,\n        \"damageMax\": 3,\n        \"defense\": 2\n    },\n    {\n     \
    \   \"id\": \"eel\",\n        \"description\": \"Radioactive eel\",\n        \"\
    strength\": 50,\n        \"damageMin\": 10,\n        \"damageMax\": 15,\n    \
    \    \"defense\": 1\n    },\n    {\n        \"id\": \"alien\",\n        \"description\"\
    : \"Green tentacled alien\",\n        \"strength\": 25,\n        \"damageMin\"\
    : 5,\n        \"damageMax\": 10,\n        \"defense\": 3\n    }\n]\n```\n\nThis\
    \ code defines and organizes enemies. Each has an id and a description, and then\
    \ there is data that describes the enemy's abilities and behavior. strength is\
    \ how much damage the player must inflict to kill the enemy. damageMin and damageMax\
    \ are the range of values for the amount of damage the enemy can inflict on the\
    \ player. (We wanted a range so that each time the enemy attacks, the actual damage\
    \ inflicted will be random using that range, but you could easily change it to\
    \ a fixed damage value.) defense is how well the enemy can avoid attacks from\
    \ the player; \"defense\":3 means that there is a one-in-three chance of the enemy\
    \ dodging an attack."
  mdcn: "在创建可购买物品列表时，你需要考虑这些信息将如何使用。你需要检查玩家是否有足够的钱购买物品，因此需要获取物品价格。你需要物品的清晰描述。等等。\n\
    \n为此，你创建了一个字典列表。字典中的每个条目都是一个可购买的物品。如果需要在游戏中添加更多物品，只需向此字典添加条目即可。然后编写支持函数。下面是一个示例，用于获取可购买的物品：\n\
    \n```\n# Get available items\n# Return in format used by getUserChoice()\ndef\
    \ getItems():\n    # Variable for result\n    result = []\n    # Loop through\
    \ items\n    for item in items:\n        # Create empty list\n        i=[]\n \
    \       # Add key\n        i.append(item[\"key\"])\n        # Add description\
    \ + cost\n        i.append(item[\"description\"]+\" (\"+str(item[\"cost\"])+\"\
    )\")\n        # Add this item to the result\n        result.append(i)\n    # Return\
    \ it\n    return result\n```\n\n`getItems()`是一个有趣的函数。正如你在第14章中回忆的那样，`getUserChoice()`函数期望选择以列表的列表形式传递。你的可购买物品列表是一个字典列表。因此，`getItems()`遍历物品并创建`getUserChoice()`期望的列表的列表。它是如何做到的呢？\n\
    \n该函数首先创建一个空列表来存储结果，如下所示：\n\n```\nresult = []\n```\n\n然后使用`for`循环遍历物品。每次循环时，它会创建另一个临时列表变量来存储当前物品，如下所示：\n\
    \n```\n# Create empty list\ni=[]\n```\n\n然后需要向此列表添加两个项目。第一个是菜单字母（玩家输入以选择菜单选项），第二个是菜单文本。添加第一个项目的方法如下：\n\
    \n```\n# Add key\ni.append(item[\"key\"])\n```\n\n`append()`函数向列表添加一个项目，这里它添加当前物品的`key`值。\n\
    \n菜单文本由描述和价格组成，如下所示：\n\n```\n# Add description + cost\ni.append(item[\"description\"\
    ]+\" (\"+str(item[\"cost\"])+\")\")\n```\n\n同样，`append()`将其添加到临时列表中。完成后，列表（对于第一个物品）将如下所示：`['H',\
    \ 'Health restoration potion. (100)']`，这正是我们需要的。\n\n然后将此物品添加到结果中：\n\n```\n# Add\
    \ this item to the result\nresult.append(i)\n```\n\n对每个物品重复此过程，然后返回完整的结果。\n\n\
    现在可以使用现有的菜单函数显示物品列表，可能如下所示：\n\n```\n# Display shopping list menu\nchoice=Utils.getUserChoice(Items.getItems())\n\
    ```\n\n很巧妙，对吧？\n\n如果你计划实现物品和购物功能，以下是一些需要考虑的事项：\n\n-   为玩家提供获取金币的方式。（我们将在接下来的内容中展示一个想法。）\n\
    -   决定玩家如何显示商店和物品。\n-   可能将购物放在循环中，以便玩家可以持续购买物品直到完成。\n-   你可能希望限制购物仅显示玩家负担得起的物品。你可以修改`getItems()`以接受玩家拥有的金币数量，然后在构建物品列表的循环中，使用`if`语句检查价格，仅添加玩家负担得起的物品。\n\
    -   购买的一些物品需要添加到库存中。如果玩家购买生命值或生命次数，你需要调用相应的`player()`方法。\n\n## 随机事件\n\n你可能希望游戏是线性的，这意味着每次玩游戏时事情都按特定顺序发生。或者你可能希望在游戏中引入可变性，使得每次玩游戏时情况略有不同。实现游戏玩法没有绝对的对错之分。作为程序员，你可以决定游戏的功能。\n\
    \n如果你确实想引入可变性，可以使用随机事件。你知道如何使用`random`库；我们在第3章中一起学习过。你可以在任何需要引入随机事件的地方使用`random`。例如，以下代码会在地面上找到100枚金币并将其添加到库存中：\n\
    \n```\n# 100 coins show up 1 in 4 times\nif random.randrange(1, 5) == 1:\n   \
    \ # Tell player\n    print(\"You see 100 coins on the ground.\")\n    print(\"\
    You pick them up.\")\n    # Add to inventory\n    inv.takeCoins(100)\n```\n\n\
    此代码大约每四次运行一次会找到金币。为什么？因为`random.randrange(1, 5)`返回1到4之间的随机数（不包括5，正如你回忆的那样）。这意味着大约四分之一的时间代码会返回1，四分之一的时间返回2，依此类推。`if`语句检查`randrange()`是否返回1，大约每四次运行一次会返回1，如果是，则找到并拾取金币。因此，此函数运行时，用户有四分之一的时间会获得金币。希望是三分之一的时间？只需将范围更改为1到4即可。\n\
    \n如果你经常这样做，可能需要编写一个函数来确定是否应该发生随机事件。查看此函数（可以添加到`Utils.py`中）：\n\n```\n# Should a\
    \ random event occur?\n# Pass it a frequency, 2=1 out 2, 3=1 out of 3, etc.)\n\
    def randomEvent(freq):\n    return True if random.randrange(0, freq)==0 else False\n\
    ```\n\n`randomEvent()`接受一个参数，该参数告诉函数事件发生的频率。传递4，它将四分之一的时间返回`True`，其他三次返回`False`。传递2，它将一半的时间返回`True`，一半的时间返回`False`。逻辑与前面的示例相同，但这次它被放入用户定义的函数中。\n\
    \n通过使用此函数，你实际上并没有比直接在应用程序中使用`randrange()`减少代码量。但使用这样的用户定义函数仍然是一个好主意。首先，它使你的代码更整洁。此外，它允许你轻松更改随机性的工作方式；只需更改一个函数，而不是许多单独的代码片段。\n\
    \n那么如何使用该函数呢？如下所示：\n\n```\n# 100 coins show up 1 in 4 times\nif Utils.randomEvent(4):\n\
    \    # Tell player\n    print(\"You see 100 coins on the ground.\")\n    print(\"\
    You pick them up.\")\n    # Add to inventory\n    inv.takeCoins(100)\n```\n\n\
    如你所见，结果相同，但代码更整洁。`Utils.randomEvent(4)`大约四分之一的时间返回`True`，当这种情况发生时，执行`if`下的代码，玩家获得金币。\n\
    \n如果你愿意，可以添加更多随机性。查看此示例：\n\n```\n# 1-100 coins show up 1 in 4 times\nif Utils.randomEvent(4):\n\
    \    # Pick a random number of coins\n    coins=random.randrange(1, 101)\n   \
    \ # Tell player\n    print(\"You see\", coins, \"coins on the ground.\")\n   \
    \ print(\"You pick them up.\")\n    # Add to inventory\n    inv.takeCoins(coins)\n\
    ```\n\n现在有四分之一的机会找到随机数量的金币（在1到100之间）。随机性是使游戏更有趣的好方法。\n\n## 与敌人战斗\n\n与敌人战斗是另一个常见的游戏功能。不幸的是，这个功能实现起来有点棘手。话虽如此，我们会给你一些指导来帮助你入门。\n\
    \n与物品一样，敌人也有属性。因此你需要一个`Enemies.py`文件，可能如下所示：\n\n```\n#####################################\n\
    # Enemies\n# Defines enemies, supporting functions\n#####################################\n\
    \n# List of enemies\n# Each needs a short name, a description,\n# strength (higher\
    \ number = need to do more damage to kill),\n# and defense (lower number = easier\
    \ to hit)\n```\n\n```\nenemies = [\n    {\n        \"id\": \"slug\",\n       \
    \ \"description\": \"Space slug\",\n        \"strength\": 10,\n        \"damageMin\"\
    : 1,\n        \"damageMax\": 3,\n        \"defense\": 2\n    },\n    {\n     \
    \   \"id\": \"eel\",\n        \"description\": \"Radioactive eel\",\n        \"\
    strength\": 50,\n        \"damageMin\": 10,\n        \"damageMax\": 15,\n    \
    \    \"defense\": 1\n    },\n    {\n        \"id\": \"alien\",\n        \"description\"\
    : \"Green tentacled alien\",\n        \"strength\": 25,\n        \"damageMin\"\
    : 5,\n        \"damageMax\": 10,\n        \"defense\": 3\n    }\n]\n```\n\n此代码定义并组织敌人。每个敌人有一个`id`和一个`description`，然后是描述敌人能力和行为的数据。`strength`是玩家必须造成多少伤害才能杀死敌人。`damageMin`和`damageMax`是敌人可以对玩家造成的伤害值范围。（我们想要一个范围，这样每次敌人攻击时，实际造成的伤害将是该范围内的随机值，但你可以轻松将其更改为固定伤害值。）`defense`是敌人躲避玩家攻击的能力；`\"\
    defense\":3`表示敌人有三分之一的机会躲避攻击。"
