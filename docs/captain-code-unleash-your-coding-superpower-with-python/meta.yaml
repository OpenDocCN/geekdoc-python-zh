    # # The Player System


    In Chapter 15, you used a dictionary to create an inventory system. We used that
    to hide a key that the player needed to find in order to unlock the door.


    But, let’s be honest, we did a pretty lousy job of hiding the key. A player can
    just go to the boulders, and—ta-da!—there it is. In a real game, you’d typically
    create some sort of puzzle that must be solved before the key would be discoverable;
    you might require another item, like a shovel, to be found first, or make the
    key appear only after a series of steps are performed in order, or make it available
    via an in-game trade.


    For our game, we’ll make the key discoverable after multiple visits to the boulders.
    And to do that, we need a way to track visits, and that’s where a player system
    comes into play (pun intended!).


    A player system tracks player actions, statuses, and more. What type of things?
    Places visited, lives left, energy used, time played, points accumulated, and
    so on. These are not things you pick up and use, so they don’t belong in an inventory
    system, but they do need to be tracked, and thus, a player system


    And to create our player system, we are going to introduce you to a new type of
    Python object: the class. The truth is you’ve used classes already. For example:


    ```

    name="Shmuel"

    ```


    That variable name is a class of type str (Python’s string class). If you were
    to display the variable’s type, like this:


    ```

    print(type(name))

    ```


    you’d see <class ''str''> displayed.


    And when you use functions like upper():


    ```

    name=name.upper()

    ```


    you are actually calling a method named upper() in that str class.


    So, yep, you’ve used lots and lots of classes. But you’ve not created one of your
    own. Yet.'
  - '[PAGE 265]


    Classes or Dictionaries?

    We used a Python dictionary for our inventory system and are using a Python class
    for our player system. Why? Well, the truth is, we could have used classes or
    dictionaries for both systems. But we want you to know how to use both dictionaries
    and classes, so we have you use one of each. In your own code, you are free to
    use whatever you prefer.

    Oh, and by the way, dictionaries are actually classes, too! Yep, a dictionary
    is a class, of type dict.


    # Creating a Player Class


    Ok, so what actually is a class? In programming, a class is an object, much like
    variables are objects. But classes are special because of what they can do. We’ll
    use lots of classes in Part III of this book. For now, the important thing we
    need you to understand about classes is that they can contain both data and functions.

    What does that mean? Well, think about the lists and dictionaries we’ve created.
    What do they contain? Data, just data. They are variables that can contain variables.
    Dictionaries and lists can’t contain functions, just data.

    Classes, on the other hand, can contain data (called properties) and functions
    (called methods). For example, the str class we just referred to contains data
    (the text stored in the variable) and methods (like the upper() function).

    This is important because by storing both data and the functions that access that
    data, classes are perfectly suited for writing highly reusable self-contained
    code.

    There’s a lot more to classes, as we’ll see in Part III (where you’ll be using
    lots of them). But, with this basic introduction, let’s proceed with creating
    our player class.


    # Creating the Class


    We’ll create our class in its own file. So, create a new file named Player.py
    in your Adventure folder. Here’s the code you need:


    ```

    ###############################################

    # Player.py

    # player class

    ###############################################

    ```'
