    \ is\", today)\n```\n\n保存并运行程序，它将显示当前日期和时间，包括毫秒（我们知道这非常有用）。\n\n你知道 `import` 和\
    \ `print()` 行的作用，所以让我们专注于中间那行，它看起来确实有点奇怪。\n\n代码 `today=datetime.datetime.now()`\
