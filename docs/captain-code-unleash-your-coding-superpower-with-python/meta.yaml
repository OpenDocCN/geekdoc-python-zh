    - 来个无敌药水怎么样？撞上它，碰撞在几秒钟内不会杀死你。

    - 或者来个临时护盾，可以偏转迎面而来的车辆？当你的护盾开启时，迎面而来的车辆会被推到一边，这样它们就不会撞到你。

    - 增加火力。撞上正确的物体，你就能击退迎面而来的车辆。也许这样做还能获得更多分数。

    - 你可以允许玩家前后移动以获得更大的控制权。你可以将其作为核心游戏的一部分，或者仅在达到特定分数时解锁，或者在击中特定物品时暂时可用。

    - 另一个想法可以是一个跳跃按钮，让你能跳过敌方车辆。你需要决定如何展示这一点，是改变汽车图像还是将其放大以模拟靠近“镜头”。


    这么多想法，都非常可行，而且都会让你的游戏独一无二。


    ## 总结


    在本章中，我们介绍了一些能真正将我们的《疯狂司机》游戏提升到新水平的想法。并且我们为你留下了许多关于下一步方向的想法。


    ## 下一步是什么？


    **恭喜，你是一名程序员了！**


    你已经一路读到了我们书的结尾，并在此过程中掌握了关键的编码技能，这些技能将继续为你服务。我们希望你觉得这段经历引人入胜且充满乐趣。


    但是，正如我们在开始这段旅程时告诉你的那样，程序员永远不会真正完成——总有更多的东西要学（尤其是随着技术的不断发展）。


    所以，在我们说再见之前，我们想分享一些关于接下来学习什么和做什么的想法和建议。


    开始吧。


    ## Python 还有很多东西要学


    你在本书中学到了很多 Python。正如你所发现的，Python 是一门有趣且直观的语言。Python 让入门变得简单，但不要被这种简单所迷惑。Python
    功能极其强大，这就是为什么它是世界上最常用的语言之一。


    所以我们希望你坚持下去，进一步深入 Python：


    - 我们接触了一些类，但还不够。如果有一个领域我们希望你真正加倍努力，那就是：类。实际上，一个很棒的项目是使用类而不是一长段代码来重写《疯狂司机》游戏。这样做，你实际上会发现自己写了更多的代码，而不是更少。但当你完成后，你会发现你可以用更少的努力添加功能和复杂性。为了帮助你入门，我们已经发布了一个基于类的游戏版本供你从书籍页面下载。

    - 我们没有涉及的一个主题是处理数据和外部数据文件。这类项目往往不那么有趣和游戏化，这就是我们没有包含它们的原因。但数据科学家的需求很大，而 Python
    是处理数据的真正流行方式之一。你可以在网上搜索项目创意。寻找涉及 XML 文件、JSON 和任何大型数据集的数据项目。网上有很多这样的项目，也有很多很好的例子可以参考。


    ## Web 开发


    网站和 Web 应用是有趣的项目，但由于构建它们需要使用多种不同的语言和技术，它们也带来了有趣的挑战。那么，构建网站涉及什么？


    - 网页是使用 HTML 创建的，HTML 是一种语言；但它不是编程语言（所以没有 if 语句，没有循环，没有变量）。相反，它是一种标记语言，用于布局网页的元素。HTML
    由你的 Web 浏览器（想想 Chrome、Safari、Edge、Firefox 等）读取，这就是它们知道要显示什么的方式。好消息是 HTML 非常容易学习。坏消息是
    HTML 本身做不了太多事情。

    - 你还需要 CSS（层叠样式表），这是用于设计和格式化网页及元素的语言。

    - 与 HTML 和 CSS 不同，JavaScript 确实是一种编程语言。它几乎和 Web 一样古老，因为没有它，Web 会是一个非常无聊的地方。JavaScript
    在 Web 浏览器中运行，它为页面添加了交互性。如果你在网页上将鼠标悬停在某个项目上并发生了某些事情，那就是 JavaScript 使其实现的。JavaScript
    是一种编程语言，它并不太难学，尤其是你往往会用它编写许多小代码块，而不是完整的应用程序。关键在于，和 HTML 一样，JavaScript 在浏览器中运行。要让你的网站或应用做更复杂的事情，其中一部分需要在服务器或云端运行。因此：

    - 几乎每个 Web 应用都有一个服务器后端。这是将整个应用粘合在一起的胶水，它往往是任何 Web 应用中最大的部分。用什么语言编写 Web 应用的后端？你会很高兴地知道，Python
    是一个不错且流行的选择。Python 本身并没有任何特定于 Web 的库或技术，但有社区创建的第三方库可以使用。一个非常流行的库叫做 Flask，它使得生成网页和响应它们变得容易。除了
    Python，你还可以使用 Java、PHP、.NET 等来编写网站后端。

    - 大多数网站需要存储和访问数据（登录信息、要购买的物品、用户资料、游戏分数等等）。这类数据存储在数据库中，用于处理数据库的语言称为 SQL。幸运的是，SQL
    是一门容易学习的语言（尽管掌握它可能需要时间）。


    > **提示**

    > **学习 SQL** 如果你想学习 SQL，我们有一本推荐给你的书。这是最畅销的 SQL 书籍，由我们自己的 Ben 撰写。你可以在 https://forta.com/books/0135182794/
    找到它。


    ## 移动应用开发


    Python 真正不太适合的一件事是移动应用开发。对于这些，你会想使用其他语言：


    - 要为 iOS 编写应用（意味着它们将在 iPhone 和 iPad 上运行），你会想使用一种叫做 Swift 的语言。这是一门相当新的语言；它易于学习和使用，开发者非常喜欢它。iOS
    应用也可以用 Objective C 编写（它是 C 的一种变体，C 是最强大的语言之一，但更难学习和掌握）。

    - Android 应用是用 Java 编写的，Java 是最常用的编程语言之一。Java 也有许多其他用途（通常用于服务器端和后端代码），它是 Android
    开发的首选语言。


    和 Web 应用一样，你的移动应用可能也需要后端。我们为网站提到的选项同样适用于移动应用。


    ## 游戏开发


    我们在第三部分使用 Pygame 创建了一个图形游戏。Pygame 有趣、易用且功能相当强大。但它不是一个完整的游戏引擎。如果你真的想编写游戏，可以看看 Unity，这是目前使用最广泛的游戏引擎和平台。使用
    Unity，你可以为所有主要操作系统、移动设备和游戏平台（包括 Nintendo Switch、Sony PlayStation 和 Microsoft Xbox）编写游戏。


    Unity 游戏是用 C# 编写的，C# 是一种基于 C（和 C++）的编程语言。哦，既然你已经熟悉了 Visual Studio Code，你会很高兴地知道
    Unity 开发是使用 Visual Studio（VS Code 的大哥）完成的，所以这个 IDE 你会很熟悉。'
