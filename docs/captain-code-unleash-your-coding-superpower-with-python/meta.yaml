    \n如果你运行代码，与 `Welcome` 相关的测试将被打印出来。如何实现？`get(\"Welcome\")` 返回文本，而 `print()`，...嗯，它打印。\n\
    \n你可以尝试其他 `id` 以确保它正常工作。测试完成后，删除测试用的 `print()`。\n\n每次游戏中需要新的文本块时，都可以向此函数添加一个部分。每个部分都有一个唯一的\
    \ `id`。使用该 `id` 调用 `get()`，就会返回正确的文本。\n\n哦，注意 `return` 语句。大多数函数在末尾只有一个 `return`\
    \ 语句。这里我们为每个字符串都有一个 `return`，每个 `return` 都会停止函数处理并返回结果。这样，我们就不必将文本保存到变量中然后再返回它。但是，在\
    \ `if` 语句中，你确实可以将文本保存到变量中并返回它。两种方式都可以。\n\n## 使用外部化字符串\n\n那么，我们如何使用这个新的 `Strings`\
    \ 文件和 `get()` 函数呢？我们将其作为库导入。是的，我们的 `Strings.py` 文件是一个 Python 库。\n\n在 `Main.py`\
    \ 的顶部添加以下内容：\n\n```\n# 导入\nimport Strings\n```\n\n> **注意库命名**\n> 我们将文件命名为 `Strings.py`，因此库名为\
    \ `Strings`。如你所知，Python 有一个名为 `String` 的内置库。如果我们把文件命名为 `String.py`，就会覆盖内置库，但 `Strings.py`\
    \ 是安全的。\n\n**字符串存储**\n这里我们将显示字符串从核心代码移入一个大的 `if` 语句中。这对于几十个甚至几百个字符串都有效。对于更大的应用程序，程序员永远不会这样做。他们会将文本存储在某种数据库中，并根据需要检索字符串。\n\
    \n使用数据库在概念上类似于使用 Python 文件。字符串被外部化并根据需要检索。你可以根据具体需求选择存储选项。\n\n要使用 `get()` 函数，我们用函数调用替换硬编码的文本。让我们从\
    \ `doWelcome()` 开始。删除所有 `print()` 语句，并用以下代码替换它们：\n\n```\n# 欢迎玩家\ndef doWelcome():\n\
    \    # 显示文本\n    print(Strings.get(\"Welcome\"))\n```\n\n`Strings.get()` 是我们 `Strings.py`\
    \ 中的 `get()` 函数。由于这是 `doWelcome()` 函数，我们使用 `Strings.get(\"Welcome\")`，它告诉 `get()`\
    \ 返回 \"Welcome\" 文本，正如你之前看到的。该文本被传递给 `print()`。\n\n`doWelcome()` 现在只有一行代码。如你所见，这更加简洁和紧凑。\n\
    \n**挑战 13.1**\n将应用程序中的所有字符串外部化。至少，外部化显示文本。如果愿意，你甚至可以外部化选项提示和任何其他显示的文本。\n\n## 总结\n\
    \n在本章中，我们介绍了字符串外部化作为清理代码的一种方式。我们的应用程序现在由两个文件组成，在下一章中，我们将添加第三个文件，同时介绍另一个非常重要的优化。"
