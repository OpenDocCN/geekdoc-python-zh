    Now, it is worth noting that if your program needed numeric input, you could have
    stuck all of this code right where you needed it (kind of like what we did previously).
    But creating a function to do this is preferable. Why?


    +   - For starters, it makes your code much cleaner. Replace input() with inputNumeric(),
    and it just works, without any clutter.

    - Functions like this can be cleanly isolated. Any variables inside them are local.
    There is no chance of overwriting variables of the same name because the function
    has its own scope. Code like this is much safer and reduces the chance of accidentally
    breaking things.'
