    # # How Coders Code


    You now know how to use variables, how to code decisions using if statements,
    and how to create looping code using for and while. You’ve learned a lot. And,
    truthfully, you’ve learned the most important coding concepts. Yes, all of them.
    If you stop here (don’t, please!), you would have learned all you need to be able
