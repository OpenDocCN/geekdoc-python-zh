    \n在用户 `input()` 行之后、`# Compare choices` 之前添加这段代码（你需要在那里使用你自己的名字，而不是我的）：\n\n```python\n\
    # TOP SECRET CODE\nif name == \"Ben\":\n    if uChoice == \"R\":\n        cChoice\
    \ = \"S\"\n    elif uChoice == \"P\":\n        cChoice = \"R\"\n    elif uChoice\
    \ == \"S\":\n        cChoice = \"P\"\n```\n\n保存代码并运行它。现在胜算完全掌握在你手中。如果你玩（输入你的名字），你每次都会赢。其他人呢？他们得到的是同样的三分之一概率。\n\
    \n那么，我们添加的代码实际上做了什么？它从一个 if 语句开始，检查你是谁。如果输入了你的名字（这就是存储在变量 name 中的内容），Python 就会运行缩进的代码。如果没有，它就会跳过所有缩进的代码。\n\
    \n缩进的代码很有趣。它是另一个 if 语句，但这个 if 语句是缩进的，所以它位于第一个 if 语句的内部。这是一个 if 语句嵌套在另一个 if 语句里面，程序员称之为*嵌套\
    \ if 语句*。if 和 elif 语句查看用户输入了什么（uChoice），然后……嗯，我们称之为调整，对吧？……它调整了电脑的选择（cChoice），这样电脑总是会输，而你总是会赢。程序仍然会随机选择，我们只是用一个能帮助你赢的选择覆盖了它。\n\
    \n用这段代码和家人或朋友试试。他们会惊讶于你的好运。\n\n> **新术语**\n> **嵌套** 当一个 if 语句位于另一个 if 语句内部时，我们称之为*嵌套*（有点像俄罗斯套娃）。在未来的章节中，你会看到其他可以嵌套的命令。\n\
    \n## 挑战 5.1\n\n你不会希望其他同名的人获得同样的优势。你如何修改这段代码，让它更私密一些？你可以要求名字必须以特定方式输入（比如全部小写），或者在末尾加一两个空格。想出一个选项并修改\
