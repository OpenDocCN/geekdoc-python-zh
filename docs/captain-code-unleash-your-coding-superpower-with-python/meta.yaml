    \ While the spacebar is pressed down, the game will pause. Release it, and the\
    \ game will resume.\n\nCreate a game variable called `paused` and initialize it\
    \ to `False`, which we'll use to track whether the game is paused or not:\n\n\
    ```\npaused = False\n```\n\nNow we need to modify the game loop. We need to respond\
