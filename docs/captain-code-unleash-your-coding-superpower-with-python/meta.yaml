    ```


    Here we use a for loop that loops from 0 to the length of the text. How does the
    loop know how long the text is? Once again, we can use the len() function for
    that. If the text is 10 characters long, len() returns 10, so the range for the
    loop will be range(0, 10), meaning loop from 0 to 9, exactly what we need. Within
    each iteration, the variable index will contain the iteration number: 0 the first
    time, 1 the second, and so on.


    The code indented under the for statement will be executed once per character
    to be encrypted. At the start of each loop, we need to get the ASCII value for
    the letter being processed, like this:


    ```

    char = ord(message[index])

    ```


    message[index] lets us access a single character. index is 0 on the first loop,
    so on the first iteration, message[index] will return the first character. On
    the next iteration, it will return the second. ord() gets the ASCII code for the
    number, and that code is saved to the variable char.


    The next if statement checks to see if the ASCII code for this character is within
    the safe range. If not, we don''t encode it. If yes, this code gets executed:


    ```

    ascNum = char + int(key[index % len(key)])

    ```


    This code does the actual encryption. index is the current character number (set
    by the for loop). index % len(key) divides the index by the length of the key,
    giving us a remainder, which is the key digit to use. That gets added to char
    (the current ASCII code), and the result is saved in ascNum. So if, for example,
    the loop is currently at index 9, and the key has six digits, index % len(key)
    will become 9 % 6, which returns 3 (the remainder), and index 3 of the key will
    be used.


    The encoded character then gets appended to messEncr, like this:


    ```

    messEncr = messEncr + chr(ascNum)

    ```'
