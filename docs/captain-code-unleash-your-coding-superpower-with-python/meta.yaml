  md: "To keep the game running (until the game is over), we need a loop, much like\
    \ the loops we've used so many times in prior chapters. And the entire game goes\
    \ inside of a loop. When the loop ends, the game is done.\n\nSo, what goes in\
    \ the loop? In our game, we'll need code for the player to move left and right,\
    \ oncoming cars will need to appear and move toward the player, we'll need to\
    \ track the score and adjust game speed, and more. All of that goes inside of\
    \ the game loop.\n\nLet's add a simple game loop. You can add this to the bottom\
    \ of Main.py:\n\n```\n# Main game loop\nwhile True:\n    # Check for events\n\
    \    for event in pygame.event.get():\n        # Did the player quit?\n      \
    \  if event.type == pygame.QUIT:\n            # Quit pygame\n            pygame.quit()\n\
    \            sys.exit()\n\n    # Update screen\n    pygame.display.update()\n\
    ```\n\nSave the changes and run the game. This time, the game screen will display\
    \ (with a white background), and the box will remain on the screen until you manually\
    \ close it (by clicking on the Close icon at the top of the screen or clicking\
    \ the X on the game window).\n\nSo what does this code do? It starts with a strange-looking\
    \ loop:\n\n```\n# Main game loop\nwhile True:\n```\n\nThis is a while loop, much\
    \ like the ones we used previously, but this one has a condition of True. On each\
    \ loop iteration, Python will check to see if the condition is True, and it always\
    \ will be. That makes this an endless loop. Usually that's a bad thing, but it\
    \ works for us as it keeps the game running."
