    # Check for collisions\nif pygame.sprite.collide_rect(player, enemy):\n    # Crash!\
    \ Game over\n    GameOver()\n```\n\nSave and test the game. Avoid oncoming cars,\
    \ and the game will keep playing. But as soon as you collide, game over.\n\nThe\
    \ magic here is the collide_rect() function. You simply pass it two objects, and\
    \ it compares the rectangles defined by their boundaries. If the rectangles overlap\
