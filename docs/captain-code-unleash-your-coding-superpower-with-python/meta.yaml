- md: "## Planning the Inventory System\n\nEvery adventure game requires that the\
    \ player obtain and use items. Maybe you need to collect coins to buy an item\
    \ from a story. The coins you collect are items, as is whatever you buy. Or perhaps\
    \ you encounter a door that is locked, and it’ll only open if you have found a\
    \ particular item: a key. Items can be maps, food, potions, weapons, you name\
    \ it.\n\nIn your game, for example, the structure has a door. It won’t open yet.\
    \ Try to open the door, and you see this:\n\n```\nWhat do you want to do? [SDBR]:\
    \ d\nThe door appears to be locked.\nYou see a small circular hole. Is that the\
    \ keyhole?\nYou move your hand towards it, it flashes blue and closes!\nWell,\
    \ that didn’t work as planned.\n```\n\nThe game doesn’t actually tell the player\
    \ to find a key. That’s implied, and they’ll need to do so to continue.\n\nWorking\
    \ with items requires that your code have a way to store and access them during\
    \ game play. And that’s the job of an inventory system.\n\nThe question is how\
    \ to store this information? You could create a bunch of variables:\n\n```\n#\
    \ Inventory\ncoins = 0\nsonicKey = False\njetPack = False\nfood = 100\n```\n\n\
    This way, as players get more coins, you can just add them to the coins variable.\
    \ If they were to find the key or jetpack, you’d set those flags to True. And\
    \ food starts with 100 and gets used over time (so you subtract from the food\
    \ variable) unless the user finds more (in which case you add to the variable).\n\
    \nThat could work, but dealing with lots of individual variables isn’t ideal.\
    \ You couldn’t easily loop through them all, saving and restoring would be onerous,\
    \ and you’d always run the risk of accidentally overwriting variables.\n\nOk,\
    \ so what about using a list?\n\n```\n# Inventory\ninv = [0, False, False, 100]\n\
    ```\n\nThis way, you could refer to `inv[0]` for the coins and `inv[1]` for the\
    \ key.\n\nUm, nope, that won’t work. It’s way too easy to make a mistake by referring\
    \ to the wrong item. Lists are perfect for collections of the same type of thing\
    \ (such as animals, as we saw in Part I of the book). Lists are not well suited\
    \ for collections of related items of different types.\n\nSo, what to do?\n\n\
    ## Creating a Dictionary\n\nTurns out that Python has another data type for just\
    \ this purpose. Dictionaries are similar to lists in that they can store multiple\
    \ values of different types, but unlike lists, they are stored using names.\n\n\
    Let’s look at an example. Create a file named `Dict1.py` (which you’ll probably\
    \ want in your main Python folder, not in your Adventure folder). Here’s the code:\n\
    \n```\npet = {\n    \"animal\":\"Iguana\",\n    \"name\":\"Iggy\",\n    \"food\"\
    :\"Veggies\",\n    \"mealsPerDay\":1\n}\n```\n\nIf you run the code, it won’t\
    \ display anything. So wait a moment before doing so.\n\nThis code creates a variable\
    \ named `pet`. You’ll notice that `pet` contains multiple values within curly\
    \ braces (the `{` and `}` characters). Those curly braces tell Python that this\
    \ is a dictionary.\n\n> **{} or []**\nDon’t confuse square brackets with curly\
    \ braces. `pet = []` creates a list, and `pet = {}` creates a dictionary.\n\n\
    Oh, and `pets = [{}, {}]` creates a list of dictionaries!\n\nEach item in a dictionary\
    \ is defined as a key:value pair. The key is the name of the item, and it is always\
    \ a string enclosed within quotes. The value is any value; it can be strings and\
    \ numbers, as we used here, but can potentially be lists, dictionaries, and more,\
    \ too.\n\nThis pet dictionary contains four items. You can verify this by adding\
    \ this code to Dict1.py:\n\n```\nprint(len(pet))\n```\n\nSave and run the code,\
    \ and it'll print 4, the value returned by len(pet).\n\nIf you want to access\
    \ a specific item in the dictionary, you must refer to it by its key. For example:\n\
    \n```\npet = {\n    \"animal\":\"Iguana\",\n    \"name\":\"Iggy\",\n    \"food\"\
    :\"Veggies\",\n    \"mealsPerDay\":1\n}\n\nprint(pet[\"name\"], \"the\", pet[\"\
    animal\"])\nprint(\"eats\", pet[\"mealsPerDay\"], \"times a day\")\n```\n\nSave\
    \ and run this updated code. What does it display?\n\npet[\"animal\"] means get\
    \ the value for key \"animal\", which is Iguana.\npet[\"name\"] means get the\
    \ value for key \"name\", which is Iggy. And so on.\n\nSo the code will display:\n\
    \n```\nIggy the Iguana\neats 1 times a day\n```\n\n## Working with Dictionaries\n\
    \nAs you can see, dictionaries are perfect for grouping different but related\
    \ information.\n\n## The update() Method\n\nYou can update dictionary items by\
    \ just assigning new values, like this:\n\n```\npet[\"mealsPerDay\"] = 2\n```\n\
    \nIn addition, you can also use the update() function to do this:\n\n```\npet.update({\"\
    mealsPerDay\": 2})\n```\n\nWhy would you ever want to use update() when a simple\
    \ assignment works? update() can be used to update multiple name:value pairs at\
    \ once.\n\nUpdating dictionary files is easy. This is the code for file Dict2.py:\n\
    \n```\npet = {\n    \"animal\": \"Iguana\",\n    \"name\": \"Iggy\",\n    \"food\"\
    : \"Veggies\",\n    \"mealsPerDay\": 1\n}\n\npet[\"mealsPerDay\"] = 2\n\nprint(pet[\"\
    name\"], \"eats\", pet[\"mealsPerDay\"], \"meals\")\n```\n\nThis code creates\
    \ the same dictionary as before but then updates the mealsPerDay item. Run this\
    \ code, and it'll display: Iggy eats 2 meals.\n\nSome other dictionary functions\
    \ you may find useful are:\n\n| Function | Description |\n| --- | --- |\n| clear()\
    \ | Remove all items from a dictionary. |\n| copy() | Make a copy of a dictionary.\
    \ |\n| keys() | Return a list of all dictionary keys. |\n| values() | Return a\
    \ list of all dictionary values. |\n\n## Lists of Dictionaries\n\nCreate a new\
    \ file named Dict3.py. Here’s the code:\n\n```\npets = [\n    {\n        \"animal\"\
    :\"Iguana\",\n        \"name\":\"Iggy\",\n        \"food\":\"Veggies\",\n    \
    \    \"mealsPerDay\":1\n    },\n    {\n        \"animal\":\"Goldfish\",\n    \
    \    \"name\":\"Goldy\",\n        \"food\":\"Flakes\",\n        \"mealsPerDay\"\
    :3\n    }\n]\n\nfor pet in pets:\n    print(pet[\"animal\"], \"-\", pet[\"name\"\
    ])\n```\n\nSave and run the code. It will display:\n\n```\nIguana - Iggy\nGoldfish\
    \ - Goldy\n```\n\nWhat is pets in this code? It’s obviously a list because it\
    \ is defined using square brackets. But what is in the list? Two items, and each\
    \ is a dictionary defined using curly braces.\n\nThe for loop loops through list\
    \ pets, and on each iteration, it creates a dictionary variable named pet whose\
    \ values are then displayed.\n\n## The Inventory System\n\nOk, so now you know\
    \ how to use dictionaries. And, yes, they are ideal for our inventory system.\
    \ We could create an inventory like this:\n\n```\ninv = {\n    \"StructureKey\"\
    : False,\n    \"Coins\": 0\n}\n```\n\nThis way, for example, we could check inv[\"\
    StructureKey\"] to see if the player has the key and respond accordingly. And\
    \ when the user finds the key, we just need to set inv[\"StructureKey\"] = True.\n\
    \nThat works, but we can improve things a little bit by providing *wrapper functions*.\n\
    \n> **NEW TERM**\n**Wrapper Function** A *wrapper function* is a function whose\
    \ purpose is just to call some other code. It wraps the code, and thus the name.\n\
    \nWhat does that mean? Look at this code snippet:\n\n```\ninv = {\n    \"StructureKey\"\
    : False,\n    \"Coins\": 0\n}\n\ndef takeStructureKey():\n    inv[\"StructureKey\"\
