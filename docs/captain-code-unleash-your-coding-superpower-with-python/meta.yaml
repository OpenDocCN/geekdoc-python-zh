    To use an image in Pygame, it needs to be loaded into a variable and placed on
    a surface. Here we want to load the road image; that''s the file Road.png in the
    Images folder. As we did before, we use os.path.join() to safely (and portably)
    create the file path to the file we need. pygame.image.load() then retrieves the
    specified image and draws it on a surface named IMG_ROAD.


    It is important to note that loading an image doesn''t actually display it. To
    display the image, we need to copy this new surface to our main game surface and
    then update the display. We''ll get to that in a moment.


    Next, we initialize the game screen, as we did before. But there''s an important
    change here. Previously we gave set_mode() an exact hard-coded screen size (500
    pixels by 800 pixels). Not anymore. Look at this revised line of code:


    ```

