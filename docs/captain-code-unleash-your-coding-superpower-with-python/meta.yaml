    ` 参数，它告诉 `load()` 读取二进制数据。\n\n正如你所看到的，在 Python 中保存和恢复数据真的很容易。我们是认真的。我们在其他编程语言中也做过这个，大多数语言无法仅用几行代码就完成。\n\
    \n如果你确实想支持保存和恢复，这里有一些需要注意的事项：\n\n- 我们在这里所做的——将所有要保存的对象复制到一个单一的保存变量中——是保存数据最干净、最简单的方法。你不会想保存和恢复大量的变量。相信我们这一点。\n\
