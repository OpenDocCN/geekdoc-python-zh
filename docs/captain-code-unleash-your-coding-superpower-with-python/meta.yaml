    \ (from the # Test it comment to the end) are temporary. They'll let us test our\
    \ code before we go any further. As soon as we know the first few lines work we\
    \ can delete the test code.\n\n> **Do What the Pros Do: Test as You Work**\n>\
    \ Incrementally testing your code as you work is a really good idea. It is much\
    \ easier to find problems when you have less code to work with. And as soon as\
    \ you know that you got one part working properly, then you can move on to the\
    \ next. This is what all professional coders do.\n\nDid you try it out? Did it\
    \ work? The user needs to enter one of three letters, which we'll use in an if\
    \ statement. The code asks for an R, a P, or an S. What if the user types s (lowercase)\
    \ or adds a space after the letter? That would mess up the if statements.\n\n\
