  - '[PAGE 79]


    The magic here is this line:


    ```

    if today.weekday() == 6:

    ```


    if is used to create a condition that goes after the word if and before the closing
    colon (the : symbol). The today.weekday() method returns the day of week, 0 for
    Monday, 1 for Tuesday, and so on. This condition is pretty simple: It tells Python
    to call the weekday() method inside of today and then compare what it returns
    to the number 6 (which means Sunday). So what this is saying is *if today is Sunday*.


    Pay special attention to what is between weekday() and 6. That’s two equal signs,
    not one. == means check to see if two things are equal. It is not the same as
    =, which saves a value to a variable, as we have seen previously.


    The condition passed to an if statement must be one that resolves to True or False.
    Here, if today is indeed Sunday, then the condition is True. If not, then it’s
    False.


    > **Python’s Weird Week**

    The Python week starts on Monday. Yes, Monday is the first day of the week, and
    Sunday is the last.


    And, just like pretty much every programming language out there, Python starts
    counting from 0. If you have a list of items, for example, they are numbered 0,
    1, 2, and so on. The first item is in position 0, not 1.


    Put both of these points together, and this means that 0 is Monday, 1 is Tuesday,
    and so on. This means that 5 is Saturday, and 6 is Sunday.


    > **= Versus ==**

    = and == are not the same, and many programmers have spent hours trying to figure
    out why their code is broken, only to discover that they used = when they meant
    == or vice versa. So, to be super ultra mega clear:


    * = is the assignment operator, and it assigns a value, meaning it saves whatever
    is on the right of = into the variable on the left. The code x = 3 creates a variable
    named x and stores the number 3 in it.

    * == is the equality comparison operator, meaning it is used to compare two things.
    The code x == 3 checks to see if the variable x has a value of 3.


    Don’t confuse them!'
