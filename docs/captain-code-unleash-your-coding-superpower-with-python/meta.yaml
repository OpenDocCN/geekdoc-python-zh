  md: 'The Truth About Random

    Here''s the truth about computers and randomness: Computers can''t do random things.
    They just can''t. Humans can, but computers like to follow instructions methodically,
    and they have no idea how to do things that make no sense or have no specific
    order. So, they can''t really do random, well, anything. When computers appear
    to be doing random things, they are actually relying on complex algorithms and
    factors that constantly change (like the current date and time) to simulate randomness.
    If that sounds complex, well, it kinda is. Which is why we love libraries like
    random. You just use the library''s functions and let the code inside the library
    do all the hard work for you.


    This code tells Python to import the random library. Save the code and run it.


    What happened? Nothing? It may look like nothing, but something big did happen.
    Remember, Python runs your code one line at a time. When it comes to the line
    with the import statement, it goes and finds the random library and pulls it into
    your code, ready for you to use it. And then you didn''t use it. But that''s ok.
    Now you will.


