    # You Crashed, Game Over


    Enemies drive toward you (or is it you driving toward them? Hmmm.). You move left
    or right to avoid them. That’s how things work now.


    What happens if you crash into oncoming traffic? Right now nothing, but what should
    happen is game over. And that means we need to be able to *detect collisions*
    and then respond when a collision occurs.


    > **Collision Detection**


    In our game, a crash is literally a collision. But that’s not what *collision
    detection* means. In game engines, *collision detection* is the process of determining
    if object boundaries have overlapped. And that’s important. If your game allows
    you to drop bombs, then you need to know if a bomb hit a target, even if the game
    engine has no idea what a bomb even is. If your player approaches a door, the
    game engine needs to let you do something, even though it doesn’t know what doors
    are. Same for jumping to bump into a mushroom or tossing a Poké Ball. From the
    game engine’s perspective, the actual action being performed is not important.
    What is important is that items come into contact with each other (bomb and target,
    character and mushroom, etc.). The game engine’s collision detection system is
    responsible for knowing when things come into contact with each other, and it
    does that by checking object boundaries to see if they overlap. If, for example,
    the character’s boundary overlaps the mushroom’s boundary at all, then there has
    been a *collision*, and the game engine will let you know so you can respond as
    appropriate for your game (and that will double your height for some reason).


    Pygame keeps things simple. It uses rectangles for all sprites, and a collision
    occurs when any part of the rectangles overlap. Other game engines support more
    sophisticated collision detection options that can work with irregular shapes,
    too.


    We need to make two changes to our code. Let’s start with the code that will get
    executed when a collision occurs. We’ll create a user-defined function named GameOver().
    For now it’ll just quit the game; we’ll add more functionality later.


    Here’s the code, which you can add to your Main.py (just remember that user-defined
    functions must be defined before they are used, so a good place to put the function
    would be after the game variables are initialized but before the main game code):'
