    # Some Lesser-Used Indexes


    If you want to return a series of items from a list, you can provide the start
    and end values for a range, separated by a colon (the : character). Look at this
    example:


    ```

    print(animals[2:4])

    ```


    This will print cat, which is index 2 (as Python starts counting at 0), and dog,
    which is at index 3. As usual, the end range number is not included, 2:4 means
    start at 2 and stop before 4.


    If you want to count from the end of a list, you can use a - (the minus sign),
    like this:


    ```

    print(animals[-1])

    ```


    What will this display? -1 means the last item in the list, -2 is the second-to-last
    item, and so on. Therefore, this code will display eel.


    Try updating and running the code with different index values. Then try using
    an index that is too high (like 5 if you are using the same example). Python won''t
    like that, it will tell you that list index out of range, which means the index
    you provided isn''t valid.


