    # Loop-de-Loop


    Thus far, you have learned that Python executes code line by line. It starts at
    the top of a file, ignores comments, and processes each line in order. In Chapter
    4 we introduced if statements, which effectively allow lines of code to be included
    or excluded in the processing.


    But what if you want to repeat a block of code over and over? Perhaps you are
    writing a game, and you need to allow movements over and over until an obstacle
    is reached. Or maybe your users can take selfies and send messages over and over
    until a chat session is closed. Or perhaps it''s something as simple as a calculator
    app that lets users enter numbers over and over until they hit the Calculate button.


    All of these examples have one thing in common: They allow the same functionality
    to be used over and over until the process has completed.


    Coding these actions requires the use of loops, and Python supports two types
    of loops:


    +   - You can loop through a defined set of options. This might be looping from
    1 to 10, or looping through a set of uploaded images, or looping through the lines
    of a file you are reading. In this type of loop, the number of iterations (that
    means how many times the loop loops) is finite. You are looping through a set
    of options and the loop ends once the last option has been reached. We''ll focus
    on this type of loop in this chapter.'
- md: "You can also loop until a condition changes. For example, allowing a user to\
    \ move in a game until their character dies, the loop repeats so long as a condition\
    \ (character is still alive) is True, and ends when the condition is not (bye\
    \ bye, character). Or allowing a user to take selfies until they hit Send, the\
    \ loop allows the camera to be used and pictures to be taken so long as the condition\
    \ (user has not clicked Send yet) is True; as soon as they click Send, the condition\
    \ becomes False, and the loop ends. In this type of loop, the number of iterations\
    \ is not known; the loop just keeps going and going and going until the condition\
    \ changes. We'll look at this type of loop in the next chapter.\n\n## Looping\
    \ Through Items\n\nLet's start with the simplest of loops, looping through a list\
    \ of items:\n\n```\nanimals=[\"ant\",\"bat\",\"cat\",\"dog\",\"eel\"]\n```\n\n\
    You know what this is: It's a list called `animals` containing five items in it.\n\
    \nEarlier in this chapter, we saw how to access individual list items. But what\
    \ if you want to loop through the list so as to print each one individually? Tada!\
    \ Loops to the rescue!\n\nCreate a new file named `Loop1.py` and type the following:\n\
    \n```\n# List of animals\nanimals=[\"ant\",\"bat\",\"cat\",\"dog\",\"eel\"]\n\n\
    # Loop through the list\nfor animal in animals:\n    # Display one per loop iteration\n\
    \    print(animal)\n```\n\nSave and run this code. You should see output like\
    \ this:\n\n```\nant\nbat\ncat\ndog\neel\n```\n\nYou know what the first line of\
    \ code does, so let's look at the loop code. This line:\n\n```\nfor animal in\
    \ animals:\n```\n\ntells Python to loop through animals and, in each iteration,\
    \ to put the next item in a variable named animal. Note that there are now two\
    \ variables used here: animal and animals. animals is the list we created, but\
    \ what is animal? We didn't explicitly create the animal variable; the for loop\
    \ code did that for us, and the loop changes the value of animal automatically\
    \ on each iteration. We told the for loop what to name the variable by specifying\
    \ for animal. (We could have named the variable anything, but animal seemed like\
    \ a good choice for a variable that holds one animal from a list of animals.)\n\
    \n> **NEW TERM**\n**Iteration** Each cycle of a loop is called an *iteration*.\
    \ You may also hear coders say *the code iterates*, which means it loops.\n\n\
    Just like if statements, loops end with a colon (the : character), and then whatever\
    \ is indented beneath the loop is what gets called once per iteration.\n\nSo,\
    \ in our example, how many times does the print() statements get called? Five—because\
    \ there are five items in the list animals. Try adding an item or a few, and run\
    \ the code again. The indented code will always be called once per item in the\
    \ list.\n\nAnd just like with if statements, you need to be careful with indentation.\
    \ Mess it up, and the loop won't work as intended. For example, if the loop code\
    \ looked like this:\n\n```\n# Loop through the list\nfor animal in animals:\n\
    \    # Display one per loop iteration\n    print(\"Here is the next animal:\"\
    )\nprint(animal)\n```\n\nthe output would look like this:\n\n```\nHere is the\
    \ next animal:\nHere is the next animal:\nHere is the next animal:\nHere is the\
    \ next animal:\nHere is the next animal:\neel\n```\n\nWhy? The indented `print()`\
    \ statement will be called once per iteration, so five times. But the last `print()`\
    \ statement is not indented (coders will say that it is *outside of the loop*),\
    \ so it isn't processed until loop processing has completed. Therefore, that last\
    \ `print()` gets called only once, and the variable `animal` then will contain\
    \ the last value that was put in it (the final item in the list).\n\n> **Minimum\
    \ List Size**\nWhat is the least number of loop iterations when using a list?\
    \ The answer is 0. If the list is empty, then the indented code will never be\
    \ called at all.\n\nWhy would you ever want an empty list? You’ll see an example\
    \ of this in a future chapter.\n\n## Looping Through Numbers\n\nNext let’s look\
    \ at looping through numbers. This is similar to the list loop we just saw, but\
    \ instead of looping through a list we specify a set of numbers and loop through\
    \ them.\n\nCreate the file `Loop2.py`. Here is the code:\n\n```\n# Loop from 1\
    \ to 10\nfor i in range(1, 11):\n    # Display i in each loop iteration\n    print(i)\n\
    ```\n\nSave and run the code, and you’ll see numbers 1 through 10 displayed, one\
    \ per line, in the Terminal window.\n\nrange() specifies the range of numbers,\
    \ and just like randrange() in Chapter 3, the end number is not included, so range(1,\
    \ 11) means start at 1 and stop before you reach 11.\n\nfor i creates a variable\
    \ named i, and inside the loop, i contains the next item in the range. On the\
    \ first iteration i will be 1, then 2, then 3, and so on.\n\nTry changing the\
    \ range values and then run your code. Try that a few times.\n\n### CHALLENGE\
    \ 6.1\n\nrange() takes an optional third argument—a step. If you specify range(1,\
    \ 11, 2), the loop counter will increase by 2 each time, so the loop will run\
    \ 5 times instead of 10 (for 1, 3, 5, 7, and 9). Try to create a loop that displays\
    \ the numbers 10, 20, 30, all the way to 100.\n\n![](img/1725feec73e591598339fc549aaff885_115_0.png)\n\
    \n## Nested Loops\n\nNow let’s make things more interesting. At the end of Chapter\
    \ 4 we showed you a nested if statement, which is an if statement inside of another\
    \ if statement. You can do the same with loops.\n\nLet’s try an example that will\
    \ bring back fond memories of your earliest years in school. Remember studying\
    \ your multiplication tables? Fun, right? It might have taken you a while to memorize\
    \ all the way to 12 x 12, but Python can do that for you in just three lines of\
    \ code!\n\n> **Nesting and Nesting and...**\nYou can nest loops within loops,\
    \ if statements with if statements, loops within if statements, if statements\
    \ within loops, and you can nest within nests within nests. However, at some point\
    \ nesting too deeply makes the code really hard to read and maintain.\n\n![](img/1725feec73e591598339fc549aaff885_115_1.png)\n\
    \nCreate a file named `Loop3.py` and type this code:\n\n```\n# Loop from 1 to\
    \ 12\nfor i in range(1, 13):\n    # Loop from 1 to 12 within each iteration of\
    \ the outer loop\n    for j in range(1, 13):\n        # Print both loop values\
    \ and multiply them\n        print(i, \"x\", j, \"=\", i*j)\n```\n\nSave and run\
    \ the code. You’ll see 144 lines of output fly by, starting with 1 x 1 = 1 all\
    \ the way to 12 x 12 = 144.\n\nOk, so how does this code work? We have two loops\
    \ here, so to keep things clear, let’s call them *outer loop* and *inner loop*.\n\
    \nThe outer loop uses range(1, 13), so everything indented beneath it gets called\
    \ 12 times, and each time, variable i will contain the current outer loop iteration\
    \ number (first 1, then 2, and so on).\n\nThe inner loop also uses range(1, 13),\
    \ and so everything indented beneath it also gets called 12 times, and each time,\
    \ variable j will contain the current inner loop iteration number.\n\nSo how many\
    \ times does that print() statement get called? The outer loop makes the inner\
    \ loop execute 12 times. And each time the inner loop executes, it executes the\
    \ print() statement 12 times. So print() gets executed 144 (12 times 12) times\
    \ in total.\n\nThe print() statement itself is pretty simple:\n\n```\nprint(i,\
    \ \"x\", j, \"=\", i*j)\n```\n\nThe first time this runs, i will be 1, and j will\
    \ be 1, so this is effectively:\n\n```\nprint(1, \"x\", 1, \"=\", 1*1)\n```\n\n\
    print() does the math on-the-fly and will display 1 x 1 = 1.\n\nThe next time\
    \ around, i will be 1, and j will be 2, so the output will be 1 x 2 = 2. This\
    \ will continue until j is 12 and the displayed text is 1 x 12 = 12.\n\nThen the\
    \ inner loop will have finished, and the outer loop will restart the inner loop\
    \ a second time; this time, i will be 2. So on the next iteration, it will display\
    \ 2 x 1 = 1 and so on, all the way until i is 12 and j is 12 and the output is\
    \ 12 x 12 = 144.\n\nAnd all in just three lines of code. (Yes, we know there are\
    \ six lines above, but three of them are comments. Python ignores them, so we\
    \ can, too!)\n\n## Cracking the Code\n\nNow that you know how to use loops, let's\
    \ create programs to encrypt and decrypt text. Yes, we'll create two programs.\
    \ The first will ask the user for some text and will display an encrypted version\
    \ of that text. The other will ask the user for encrypted text and will decrypt\
    \ it and display the original text. And so long as the same secret key (more on\
    \ that in a moment) is used for encryption and decryption, all will work well.\n\
    \nSo, if you receive this text:\n\n```\nFphjsp#jw!hxrm%\n```\n\nyou could decrypt\
    \ it and it'll say...um, nope, can't tell you, sorry! You'll find out soon....\n\
    \nOk, a warning. The following code may look complicated. But don't panic: It\
    \ is using stuff you've already learned. Ready?\n\n> **Encoding Versus Encryption**\n\
    Technically, what we're doing here isn't really encryption. Real encryption code\
    \ is a bit too complex for what we need here, so we're using a process called\
    \ *encoding*, which replaces characters in text with secret characters. And we're\
    \ going to use a key to make it a little harder to decode.\n\nIf you want to perform\
    \ real encryption with Python, that's very doable, and there are lots of greater\
    \ libraries that can help you do it."
  mdcn: "你也可以循环直到某个条件发生变化。例如，在游戏中允许用户移动直到角色死亡，只要条件（角色仍然存活）为真，循环就会重复；当条件不为真时（再见了，角色），循环结束。或者允许用户自拍直到点击发送按钮，只要条件（用户尚未点击发送）为真，循环就允许使用摄像头并拍照；一旦点击发送，条件变为假，循环结束。在这种类型的循环中，迭代次数是未知的；循环会一直持续，直到条件改变。我们将在下一章探讨这种循环。\n\
    \n## 遍历列表项\n\n让我们从最简单的循环开始，遍历一个列表中的项目：\n\n```\nanimals=[\"ant\",\"bat\",\"cat\"\
    ,\"dog\",\"eel\"]\n```\n\n你知道这是什么：这是一个名为 `animals` 的列表，包含五个项目。\n\n在本章前面，我们看到了如何访问单个列表项。但如果你想遍历列表以逐个打印每个项目呢？瞧！循环来帮忙了！\n\
    \n创建一个名为 `Loop1.py` 的新文件，并输入以下内容：\n\n```\n# 动物列表\nanimals=[\"ant\",\"bat\",\"\
    cat\",\"dog\",\"eel\"]\n\n# 遍历列表\nfor animal in animals:\n    # 每次循环迭代显示一个\n \
    \   print(animal)\n```\n\n保存并运行此代码。你应该会看到如下输出：\n\n```\nant\nbat\ncat\ndog\neel\n\
    ```\n\n你知道第一行代码的作用，所以让我们看看循环代码。这一行：\n\n```\nfor animal in animals:\n```\n\n告诉\
    \ Python 遍历 animals，并在每次迭代中将下一个项目放入名为 animal 的变量中。注意这里现在使用了两个变量：animal 和 animals。animals\
    \ 是我们创建的列表，但 animal 是什么？我们没有显式创建 animal 变量；for 循环代码为我们创建了它，并且循环在每次迭代时自动更改 animal\
    \ 的值。我们通过指定 for animal 告诉 for 循环如何命名该变量。（我们可以将变量命名为任何名称，但 animal 似乎是一个不错的选择，用于保存动物列表中的一个动物。）\n\
    \n> **新术语**\n**迭代** 循环的每个周期称为一次 *迭代*。你可能还会听到程序员说 *代码迭代*，意思是它循环。\n\n就像 if 语句一样，循环以冒号（:\
    \ 字符）结束，然后循环下方缩进的内容就是每次迭代调用的内容。\n\n那么，在我们的示例中，print() 语句被调用了多少次？五次——因为 animals\
    \ 列表中有五个项目。尝试添加一个或几个项目，然后再次运行代码。缩进的代码将始终为列表中的每个项目调用一次。\n\n就像 if 语句一样，你需要注意缩进。搞错了，循环将无法按预期工作。例如，如果循环代码如下所示：\n\
    \n```\n# 遍历列表\nfor animal in animals:\n    # 每次循环迭代显示一个\n    print(\"Here is the\
    \ next animal:\")\nprint(animal)\n```\n\n输出将如下所示：\n\n```\nHere is the next animal:\n\
    Here is the next animal:\nHere is the next animal:\nHere is the next animal:\n\
    Here is the next animal:\neel\n```\n\n为什么？缩进的 `print()` 语句将在每次迭代中调用一次，所以是五次。但最后一个\
    \ `print()` 语句没有缩进（程序员会说它 *在循环之外*），因此它在循环处理完成之前不会被处理。因此，最后一个 `print()` 只被调用一次，而变量\
    \ `animal` 此时将包含最后放入其中的值（列表中的最后一个项目）。\n\n> **最小列表大小**\n使用列表时，最少的循环迭代次数是多少？答案是\
    \ 0。如果列表为空，则缩进的代码将永远不会被调用。\n\n为什么你会想要一个空列表？你将在未来的章节中看到一个例子。\n\n## 遍历数字\n\n接下来让我们看看遍历数字。这与我们刚刚看到的列表循环类似，但我们不是遍历列表，而是指定一组数字并遍历它们。\n\
    \n创建文件 `Loop2.py`。代码如下：\n\n```\n# 从 1 循环到 10\nfor i in range(1, 11):\n    # 在每次循环迭代中显示\
    \ i\n    print(i)\n```\n\n保存并运行代码，你将在终端窗口中看到数字 1 到 10，每行一个。\n\nrange() 指定数字范围，就像第\
    \ 3 章中的 randrange() 一样，结束数字不包含在内，所以 range(1, 11) 表示从 1 开始，在到达 11 之前停止。\n\nfor\
    \ i 创建一个名为 i 的变量，在循环内部，i 包含范围中的下一个项目。在第一次迭代中 i 将是 1，然后是 2，然后是 3，依此类推。\n\n尝试更改范围值，然后运行你的代码。尝试几次。\n\
    \n### 挑战 6.1\n\nrange() 接受一个可选的第三个参数——步长。如果你指定 range(1, 11, 2)，循环计数器每次将增加 2，因此循环将运行\
    \ 5 次而不是 10 次（对于 1、3、5、7 和 9）。尝试创建一个显示数字 10、20、30，一直到 100 的循环。\n\n![](img/1725feec73e591598339fc549aaff885_115_0.png)\n\
    \n## 嵌套循环\n\n现在让事情变得更有趣。在第 4 章末尾，我们向你展示了嵌套 if 语句，即一个 if 语句在另一个 if 语句内部。你也可以对循环做同样的事情。\n\
    \n让我们尝试一个例子，它会唤起你对学校最早岁月的美好回忆。还记得学习乘法表吗？很有趣，对吧？你可能花了一段时间才记住所有 12 x 12 的乘法，但 Python\
    \ 只需三行代码就能为你做到！\n\n> **嵌套再嵌套...**\n你可以在循环内嵌套循环，在 if 语句内嵌套 if 语句，在 if 语句内嵌套循环，在循环内嵌套\
    \ if 语句，并且你可以在嵌套中再嵌套。然而，在某些时候，嵌套太深会使代码非常难以阅读和维护。\n\n![](img/1725feec73e591598339fc549aaff885_115_1.png)\n\
    \n创建一个名为 `Loop3.py` 的文件并输入此代码：\n\n```\n# 从 1 循环到 12\nfor i in range(1, 13):\n\
    \    # 在外部循环的每次迭代中从 1 循环到 12\n    for j in range(1, 13):\n        # 打印两个循环值并相乘\n\
    \        print(i, \"x\", j, \"=\", i*j)\n```\n\n保存并运行代码。你将看到 144 行输出飞速闪过，从 1 x\
    \ 1 = 1 一直到 12 x 12 = 144。\n\n好的，那么这段代码是如何工作的？我们这里有两个循环，为了清晰起见，我们称它们为 *外层循环* 和\
    \ *内层循环*。\n\n外层循环使用 range(1, 13)，因此其下方缩进的所有内容将被调用 12 次，每次变量 i 将包含当前外层循环迭代号（首先是\
    \ 1，然后是 2，依此类推）。\n\n内层循环也使用 range(1, 13)，因此其下方缩进的所有内容也将被调用 12 次，每次变量 j 将包含当前内层循环迭代号。\n\
    \n那么 print() 语句被调用了多少次？外层循环使内层循环执行 12 次。而每次内层循环执行时，它都会执行 print() 语句 12 次。因此 print()\
    \ 总共执行了 144（12 乘以 12）次。\n\nprint() 语句本身非常简单：\n\n```\nprint(i, \"x\", j, \"=\"\
    , i*j)\n```\n\n第一次运行时，i 将是 1，j 将是 1，所以这实际上是：\n\n```\nprint(1, \"x\", 1, \"=\"\
    , 1*1)\n```\n\nprint() 实时进行计算，并将显示 1 x 1 = 1。\n\n下一次，i 将是 1，j 将是 2，因此输出将是 1 x\
    \ 2 = 2。这将持续直到 j 为 12，显示的文本为 1 x 12 = 12。\n\n然后内层循环将完成，外层循环将第二次重新启动内层循环；这次，i 将是\
    \ 2。因此在下一次迭代中，它将显示 2 x 1 = 1，依此类推，直到 i 为 12 且 j 为 12，输出为 12 x 12 = 144。\n\n而所有这些只需三行代码。（是的，我们知道上面有六行，但其中三行是注释。Python\
    \ 忽略它们，所以我们也可以忽略！）\n\n## 破解代码\n\n既然你知道如何使用循环，让我们创建程序来加密和解密文本。是的，我们将创建两个程序。第一个将要求用户提供一些文本，并显示该文本的加密版本。另一个将要求用户提供加密文本，然后解密并显示原始文本。只要加密和解密使用相同的密钥（稍后会详细介绍），一切都会正常工作。\n\
    \n所以，如果你收到这段文本：\n\n```\nFphjsp#jw!hxrm%\n```\n\n你可以解密它，它会说……嗯，不行，不能告诉你，抱歉！你很快就会知道了……\n\
    \n好的，一个警告。以下代码可能看起来很复杂。但不要惊慌：它使用的是你已经学过的东西。准备好了吗？\n\n> **编码与加密**\n从技术上讲，我们在这里所做的并不是真正的加密。真正的加密代码对于我们这里的需求来说有点过于复杂，所以我们使用一种称为\
    \ *编码* 的过程，它用秘密字符替换文本中的字符。我们将使用一个密钥使其更难解码。\n\n如果你想用 Python 执行真正的加密，这是非常可行的，而且有很多优秀的库可以帮助你做到这一点。"
