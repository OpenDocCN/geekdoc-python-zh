  md: '# Health and Lives


    Many games track player lives. When players *die*, they lose a life and continue
    playing. The game is over when no lives are left. Our `player` class has properties
    and methods for using lives, and you can use them in your game.


    Newer games also track player health and often combine doing so with tracking
    lives. How could you do this in your game?


    For starters, you''d need to update the `player` class with a couple of properties.
    Here''s what our updated class looks like:


    ```

    # Properties

    name = "Adventurer"

    livesLeft = 3

    boulderVisits = 0

    maxHealth = 100

    health = maxHealth

    ```


    You''ll see that two properties have been added: `maxHealth` and `health`.


    `maxHealth` stores the maximum amount of health a player can have at any time.
    We''ll need this value for all sorts of calculations, and rather than hard code
    the value all over the place, we do so once, in a property that other code can
    refer to. This way, if we needed to change the value, we''d do so once, in one
    place only. Here `maxHealth` is 100, but you can change it to whatever value your
    game needs.


    `health` stores the current player health level. When the game starts, the player
    needs to be at full health, so the `health` variable is initialized to `maxHealth`.
    Of course, if your game works differently—maybe the player starts at half health
    and has to locate items to increase health—you change the initialization as needed.


    Now we need methods to work with lives and health. We''ll start with methods to
    add and remove lives.


    If your game allows a player to add lives (maybe by finding an item, using a potion,
    buying a heart, etc.), you''ll need a way to update the player system with this
    information. This `addLives()` method gets added to the `player` class:'
  merge: -1
  pgno: 288
- img_proc: true
  md: "```\n# Add lives\ndef addLife(self, lives=1):\n    # Increment lives\n    self.livesLeft\
    \ += lives\n    # And fill up health\n    self.health = self.maxHealth\n```\n\n\
    When executed, the addLife() function does two things. The first line increases\
    \ the value of the livesLeft property, effectively giving the player another life.\
    \ Many games also restore player health when a life is added, and the second line\
    \ in the function restores player health back to maxHealth. If you don’t want\
    \ this to happen, just remove that second line.\n\nAs this function is a method\
    \ in a class, the first argument is always self (as we discussed in Chapter 16).\n\
    \nBut look at that second argument. Does it look different to you? What does lives=1\
    \ mean? That =1 provides a default value for argument lives (which actually makes\
    \ the lives argument optional).\n\nIn our game we only need to add a single life\
    \ at a time, so we could have simply written addLife() like this:\n\n```\ndef\
    \ addLife(self):\n    self.livesLeft += 1\n    self.health = self.maxHealth\n\
    ```\n\nCall addLife(), and it increments livesLeft by 1 (that’s what += 1 does).\
    \ Simple.\n\nBut what if at some point in the future we needed the code to allow\
    \ users to add multiple lives at once? We’d need another function that accepted\
    \ the number of lives to add as an argument. Something like this:\n\n```\ndef\
    \ addLives(self, lives):\n    self.livesLeft += lives\n    self.health = self.maxHealth\n\
    ```\n\nTrue, we may not need this functionality now, but at some point we may,\
    \ and then we’d have two very similar functions."
  merge: -1
  pgno: 289
- img_proc: true
  md: "# Write Flexible Methods\n\nThis addLife() function is a good example of how\
    \ you should write all your methods. Wherever possible, plan for future needs\
    \ and capabilities and make your code as flexible as possible. This will make\
    \ your code more reusable and future safe. And this can be done with any function,\
    \ not just methods within classes.\n\nAnticipating possible future needs, we created\
    \ a single addLife() function that supports both use cases. How does it do this?\
    \ By accepting an optional argument—one that has a default value that is used\
    \ if no explicit argument value is passed. So, if your code called the method\
    \ like this:\n\n```\np.addLife()\n```\n\nwithout passing a value for lives, then\
    \ Python would use the default value of 1 for that argument value. But if the\
    \ code did this:\n\n```\np.addLife(3)\n```\n\nthen the passed value of 3 would\
    \ be used.\n\nWe may never need the ability to add multiple lives. But, with barely\
    \ any extra code, we can support that use case, and we've added no complexity\
    \ to how the function gets called either (p.addLife() works perfectly). So, why\
    \ not?\n\nNow we need a method to remove a life:\n\n```\n# Lose lives\ndef loseLife(self,\
    \ lives=1):\n    # Decrement lives\n    self.livesLeft -= lives\n    # Make sure\
    \ didn't go below 0\n    if self.livesLeft < 0:\n        # It did, so set to 0\n\
    \        self.livesLeft = 0\n    # If no lives\n    if self.livesLeft == 0:\n\
