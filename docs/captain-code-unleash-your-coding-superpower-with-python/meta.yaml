  md: '# More About Pygame


    Pygame has been around for about 20 years, and it has been used to create tens
    of thousands of games. Pygame is designed for use with Python, but, unlike most
    other Python libraries, it isn''t written entirely in Python. To improve performance,
    parts are written in C and Assembler, which can run more than 100 times faster
    than Python.


    As is often the case with large projects like Pygame, it was built on top of another
    popular and powerful library, called SDL (for Simple DirectMedia Layer), which
    provides access to audio, keyboard, mouse, joystick, GPU, and more. SDL itself
    is used by gaming luminaries including Valve Software.


    The point of all of this is that Pygame is powerful and trusted. While we''ll
    be building a rather simple game, Pygame can be used to build really sophisticated
    games, too. And some not very sophisticated ones, actually (including Flappy Bird
    that was all the rage a few years ago).


    If you want to learn more about Pygame, visit pygame.org, where you''ll also find
    lots of great examples that demonstrate what the library can do.


