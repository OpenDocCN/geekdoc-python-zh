  md: '# Moving the Enemy


    We now have a game screen with a road background and an enemy car that appears
    at random locations along the top of the screen. Now we’ll make the enemy move.


    As you will recall, the enemy is driving toward you (going the right way—and you
    are the one driving the wrong way!). To make the enemy move, we simply need to
    move the sprite down the screen.


    How fast will the enemy move? That’s up to you. If it moves 1 pixel at a time,
    it’ll move really slowly; if it moves 100 pixels at a time, it’ll move really
    quickly. We’ll start by making it move 5 pixels at a time, and later we’ll make
    it move faster as the game progresses.


    Open Main.py and add this code near the top of the file, right before or after
    the color definitions would be a great location:


    ```

    # Game variables

    moveSpeed = 5

    ```


    This code creates a variable named `moveSpeed` and initializes it to 5 (the number
    of pixels we’ll move by). We’ll use this variable when we move sprites.


    Oh, this variable truly is variable. We’ll soon add code to change midgame play,
    so we didn’t use capital letters for the name this time.


    Now for the fun part. Go to the game loop and find the code that blits the enemy
    on to the screen. Right after that line, add this code:


    ```

    # Move enemy downwards

    enemy.rect.move_ip(0, moveSpeed)

    ```


    `move_ip()` moves a sprite. It takes two arguments. The first is the number of
    pixels to move horizontally; we don’t want to change horizontal positioning, so
    that value is 0. The second is the number of pixels to move vertically. We pass
    it `moveSpeed` (which we initialized to 5), so enemy will move 5 pixels down the
    screen.


    Save and run the code. You’ll see the enemy start at a random location along the
    top and then drive down the screen toward the player. And then…oh no!…it drives
    right off the screen!'
