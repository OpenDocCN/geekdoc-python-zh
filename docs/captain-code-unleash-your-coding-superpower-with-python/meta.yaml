  md: '# Tuple


    Look at the code for the three color variables. Do they look different to you?
    Look again. They look a bit like lists that we''ve used many times already—but
    not quite. Lists are defined like this:


    ```

    RED = [255, 0, 0]

    ```


    with values separated by commas surrounded by square brackets. Right?


    Here we used parentheses instead:


    ```

    RED = (255, 0, 0)

    ```


    RED looks like a list, but it obviously isn''t one. So, what is it?


    It''s actually a *tuple*, another Python type that is very similar to a list,
    but with one big difference. Unlike lists, tuples can never be changed. You can''t
    add items, you can''t edit items, you can''t make any changes at all.


    This makes tuples really useful for variables that should never change, like our
    colors.


    Graphical game screens need to be updated constantly—many times a second. The
    rate at which the screen is updated is called the *frame rate*.


    > **NEW TERM**

    **Frame Rate** When we look at a screen, perhaps watching a movie or playing a
    video game, it appears as though images are changing all the time. The truth is
    that they are not. Screens get updated many times a second—faster than the human
    eye can readily notice. That creates the illusion of constant changes.


    Screens update many times a second. The update speed is measured in *frames per
    second* (or FPS), and that value is called the *frame rate*.


    Higher frame rates make the video changes look more fluid and realistic, but they
    also use more processing power.'
