    ```\n\nIn this example, name is a variable; specifically, it's a string.\n\nBut,\
    \ now that you've seen classes (such as the datetime class in the last chapter),\
    \ we'll let you in on a secret: That name string is actually a class, too; it's\
    \ a str class. If you run code like this:\n\n```\nname=\"Ben\"\nprint(type(name))\n\
    ```\n\nyou'll see that the variable name is of type str (that's what Python calls\
    \ the string class).\n\nAnd, as you know, classes have methods that you can use.\n\
    \nHere's something fun you can try: Open a new file, let's call this one StringTest.py,\
    \ and type the following (use your own name, not mine...unless your name happens\
    \ to be Ben, in which case, awesome name, use it):\n\n```\nname=\"Ben\"\nname=name\n\
    print(name)\n```\n\nYep, that middle line of code is rather useless: It sets name\
    \ to whatever name currently is.\n\nBut try this. Add a . (a period) after the\
    \ last name and wait a moment. You'll see VS Code pop up a display like this:\n\
    \nname is a string, which is actually a str class, right? When you type the period,\
    \ VS Code helpfully shows you all the methods (remember, methods are functions)\
    \ available to you. And as you select any method, you'll see help to its right\
    \ telling you what it does.\n\nLet's try a couple. Change the middle line so that\
    \ it looks like this:\n\n```\npython\nname=name.upper()\n```\n\nSave and run the\
    \ code. You'll see that the value in name has been converted to uppercase. That's\
    \ what the upper() method does. There's also a lower() method, which converts\
    \ text to lowercase. And there's a really useful method called strip() that removes\
    \ (strips) any extra characters from before and after text.\n\nIf you want to\
    \ convert your text to uppercase and also strip all extraneous empty space, you\
    \ can use both functions:\n\n```\npython\nname=\" Ben \"\nname=name.upper()\n\
    name=name.strip()\nprint(name)\n```\n\nHere, name starts off as Ben (with a space\
    \ before and after the text). The next line turns it into BEN (still with those\
    \ spaces). The next line removes the spaces.\n\n> **TIP**\n> **Stripping Whitespace**\
    \ There are actually three different methods for stripping (removing) extraneous\
    \ text. rstrip() strips extraneous text from the right side of a string (meaning\
    \ at the end of the text). lstrip() strips text from the left of a string (meaning\
    \ at the start of the string). strip() is basically a combination of rstrip()\
    \ and lstrip() that removes spaces from both ends of a string.\n\nAnd, actually,\
    \ Python lets you use these functions stacked on each other. Look at this code,\
    \ which is functionally the same, but both methods are in one line:\n\n```\nname=\"\
    \ Ben \"\nname=name.upper().strip()\nprint(name)\n```\n\nWe'll use these methods\
