    # Encrypting Characters


    Replacing characters with their encrypted version requires doing a little math.
    Math, you say? Letters aren’t numbers, so how can you do math on them?


    Well, as it so happens, inside of your computer letters are indeed numbers. Every
    single letter and character has an internal number. You don’t usually care about
    these; to us, letter A is just A, b is just b, and 3 is just 3. But inside of
    your computer, the letter displayed as A is character number 65, b is 98, and
    the character for number 3 is 51. Every single character has its own number; so
    a and A have different numbers because they are different characters.


    Yep, this sounds odd, but just accept it for now. Every character has a number
    (called an ASCII Character Code) that can be used to refer to it.


    > **TIP**

    **Use Test Files** Every coder has dozens of test files (usually named test42.py,
    or something like that). Sometimes coders have whole test folders (yep, often
    named test). Test files are great places to tinker and try stuff out.


    In Python you can get the ASCII code for any character by using the ord() function.
    Run this code. (You have test Python files, right? They are perfect for this):


    ```

    print(ord(''A''))

    ```


    and it will display 65, the ASCII code for A. Change that A to a B, and it’ll
    display 66. And so on.


    > **ASCII Character Codes**

    ASCII (pronounced “ASS-key”!) stands for American Standard Code for Information
    Interchange. It is a character encoding standard for electronic communication,
    and it predates the Internet and all modern devices.'
