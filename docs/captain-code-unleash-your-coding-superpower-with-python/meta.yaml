    \n![](img/1725feec73e591598339fc549aaff885_185_0.png)\n\n# CHAPTER 11\n\n## Getting\
    \ Func-ky\n\nWelcome to Part II. In this section you are going to build a retro-style\
    \ text adventure game. Along the way, you’ll learn lots of new techniques for\
    \ creating powerful applications. But first we need to revisit functions, and\
    \ this time you’ll learn how to write your own functions.\n\n## Functions Revisited\n\
    \nYou know what functions are. You've seen and used lots of them: `input()`, `print()`,\
    \ `int()`, `now()`, `upper()`, `choice()`, and many others.\n\nAs a reminder,\
    \ a function is made up of three parts:\n\n| Part | Description | Required | Example\
    \ |\n| :--- | :--- | :--- | :--- |\n| Name | The unique function name | Yes |\
    \ An example is `print()`. The name is how you call the function when you want\
    \ to use it. The function name must always be followed by parentheses. This is\
    \ required. |\n| Arguments | One or more values passed into the function | No\
    \ | If you write `print(\"Hello\", firstName)`, then `print()` is being passed\
    \ two arguments: a string containing the text Hello and a variable named `firstName`.\
    \ Not all functions accept arguments; `print()` and `input()` do as you have seen,\
    \ but `upper()` and `now()` do not. |\n| Return | Value sent back to whatever\
    \ called the function | No | One example you've used many times is `input()`,\
    \ which prompts the user to type something and then returns what the user typed\
    \ to you. `firstName=input(\"What is your name?\")` prompts for a value, which\
    \ is returned and saved into a variable (here `firstName`). Some functions return\
    \ results; others (like `print()`) don't. |\n\nRemember this. We'll frequently\
    \ be referring to function names, arguments, and return values, so don't mix them\
    \ up.\n\n> **Methods Are Functions**\nAs you learned in Chapter 4, functions in\
    \ a class are called *methods*. So, technically, `now()` is not a function but\
    \ a method within the `datetime` class. But, methods are indeed functions, so\
    \ to keep things simple, we're just going to refer to functions here. Just keep\
    \ in mind that the rules and best practices for creating functions apply to methods,\
    \ too.\n\n**Arguments and Return Values**\nHere's another way to look at it. Arguments\
    \ go into a function, return values come out of a function. Whatever you pass\
    \ as an argument goes into the function for processing. What the function sends\
    \ back to your code when it has finished executing is the return value.\n\nArguments\
    \ go in, return values come out.\n\n**Using Python to Write Python**\nMost of\
    \ the libraries included with Python are themselves written in Python. And just\
    \ about every third-party Python library is also written in Python.\n\nBut there\
    \ are exceptions, as you'll see in Part III of this book.\n\n## Writing Your Own\
    \ Functions\n\nAll of the functions we've used thus far come included with Python.\
    \ Some are always available, others require you to import libraries as you have\
    \ seen. But all are part of Python and are ready for you to use.\n\nLike just\
    \ about every single programming language out there, Python lets you create your\
    \ own *user-defined functions*. And you write them in Python! Yep, you use Python\
    \ functions to create Python functions!\n\n> **NEW TERM**\n**User-Defined Function**\
    \ A *user-defined function* (or UDF) is just that: a function defined by the user,\
    \ you, the coder.\n\n### Creating a Function\n\nSo, how do you create your own\
    \ function? Let's start with a simple (and rather useless) example. Create a new\
    \ file named Func1.py and type the following:\n\n```\ndef sayHello():\n    print(\"\
    Hello\")\n\nsayHello()\n```\n\nSave and run the code. It'll display Hello. Yes,\
    \ we told you it was a rather useless program. But wait, it gets better quickly—promise.\n\
    \nSo, what does this code do? Let's start at the bottom this time with this line\
    \ of code:\n\n```\nsayHello()\n```\n\nThis calls a function called sayHello().\
    \ Just like calling print() or input(), to call a function, you just specify its\
    \ name followed by parentheses.\n\nBut there is no sayHello() function in Python.\
    \ So what code gets executed when the function sayHello() is called? The answer\
    \ is that a new function called sayHello() is being created right inside the same\
    \ file, like this:\n\n```\ndef sayHello():\n    print(\"Hello\")\n```\n\nIn Python\
    \ you define a function with the statement def (for *define*) followed by the\
    \ name of the function. Here the name is sayHello.\n\nThe name is followed by\
    \ parentheses, which is where function arguments are defined. The parentheses\
    \ are empty here as this function has no arguments. Even if your function accepts\
    \ no arguments, you must still specify the parentheses after the name.\n\nJust\
    \ like if and while statements, the line that defines a function ends with a colon\
    \ (the : character). And just like if and while, the code that makes up the function\
    \ itself is indented under the function definition statement.\n\n> ### def Doesn't\
    \ Execute\nIt is important to note that defining a function is not the same as\
    \ executing a function. If your code looked like this:\n\n```python\ndef sayHello():\n\
    \    print(\"Hello\")\n```\n\nthen when you executed it, nothing would be displayed.\
    \ Why? Because you'd have only defined the function but never executed it. If\
    \ you want to use your defined function (assumedly you do, otherwise why write\
    \ it?), then you must execute it.\n\n### Functions Must Be Defined Before They\
    \ Can Be Used\n\nIn our simple example, we used def to define the sayHello() function\
    \ and then called sayHello(). What would happen if the sayHello() call were before\
    \ the def? You can modify the code to try that if you’d like. You’ll see an error\
    \ message:\n\n'sayHello' is not defined\n\nThis simply means that Python saw your\
    \ sayHello() call and didn’t know what to do with it. Why? Remember, Python processes\
    \ your code line-by-line, starting at the top. If sayHello() is called before\
    \ the function sayHello() is defined, it’ll have no idea what sayHello() is.\n\
    \nSo, in Python functions must always be defined before they are used.\n\nIncidentally,\
    \ this is also why you always put import statements at the top of your code. When\
    \ you import a library, Python sees all the functions in it, essentially defining\
    \ them on-the-fly right where the import statement is. Any code after the import\
    \ can then use the imported functions.\n\n## Passing Arguments\n\nOur sayHello()\
    \ function accepted no arguments (and returned no values). That’s why it was rather\
    \ useless.\n\nSo let’s create a more interesting example. Look at this code:\n\
    \n```\nmultiply(12, 8)\n```\n\nThere is no Python function named multiply(), so\
    \ you can’t run this code yet. What this code should do is allow you to pass any\
    \ two numbers to a function named multiply(). That function will do just that:\
    \ It’ll multiply whatever two numbers you pass to it, and it will also display\
    \ the multiplication and result.\n\nUnlike sayHello(), which accepts no arguments,\
    \ multiply() obviously needs to accept two arguments—the two numbers to be multiplied."
