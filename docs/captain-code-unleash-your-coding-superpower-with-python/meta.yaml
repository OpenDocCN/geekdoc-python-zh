  - '[PAGE 380]


    Look at how we created and killed enemy objects (once we changed the code to support
    multiple image files). You can use the same technique to create enemies on demand.


    You can manipulate individual sprites, but that’s a pain. A better option is to
    use sprite groups. You create a group like this:


    ```

    enemies = pygame.sprite.Group()

    ```


    And then, whenever you generate new enemies, you can add them to the group, like
    this:


    ```

    enemies.add(enemy)

    ```


    You can blit entire groups at once. You can also kill a group to kill all members.


    To move all group members you’d use a for loop and move each member, like this:


    ```

    for enemy in enemies:

    ```


    Sprite groups can also simplify collision detection. Instead of checking each
    sprite individually, you can use the spritecollideany() function, which checks
    if any sprites in a group collided.


    As we noted, this enhancement is definitely more complicated. But with what you’ve
    learned thus far, it is quite doable.


    # And Then...


    You now have the framework for a fun game—one with lots of room for you to be
    creative. So, do that: Create! Think of other features you could add. Here are
    some ideas:


    Put objects (mushroom perhaps?) on the road that temporarily change the player
    car size. A bigger car is more likely to crash an oncoming vehicle; a smaller
    one is less likely to do so.'
  - '[PAGE 381]


    +   - How about an invincibility potion? Hit that, and crashes won’t kill you
    for a few seconds.

    - Or how about temporary shields that deflect oncoming vehicles? When your shield
    is up, oncoming vehicles get nudged to the side so they don’t hit you.

    - Add firepower. Hit the right object, and you will be able to shoot away oncoming
    vehicles. And maybe doing so awards even more points.

    - You could allow the player to move forward and backward for greater control.
    You can make that part of the core game, or available only as an unlock when a
    certain score is reached, or temporarily available when a specific item is hit.

    - Another idea could be a jump button that allows you to leap over enemy cars.
    You’d need to decide how to show this, either changing the car image or growing
    it to simulate getting closer to the “camera.”


    So many ideas, all very doable, and all of which will make the game uniquely yours.


    # Summary


    In this chapter, we’ve presented ideas that will really take our Crazy Driver
    game to the next level. And we’ve left you with lots of ideas about where to go
    next.'
