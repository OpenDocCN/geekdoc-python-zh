    - `km2miles()` does the reverse, accepting a distance in kilometers and returning
    it in miles.


    Each of these functions can be written in just two lines of code. The first is
    the `def` that defines the function and argument, and the second performs the
    calculation and returns it.


    And to save you time, there are 1.6 kilometers in a mile, and .6 miles in a kilometer
    (rounded to keep things simple).'
