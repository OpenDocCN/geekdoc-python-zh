  md: 'The masking code works if `guessedLetters` is empty, but that looping and the
    if statement tests are completely unnecessary. The end result will always be a
    completely masked `displayWord`. Right?


    So, when the game first starts and there are no guessed letters, let''s skip the
    whole for loop and just create a completely masked `displayWord`. That is cleaner
    code (and coders always want the cleanest, tightest code possible).


    We can do this simply. Back in Chapter 3, you learned that 3 * 5 is not the same
    as "3" * 5. The former returns 15 (it multiplies 3 by 5), and the latter returns
    "33333" (it repeats the string "3" five times). Back then we didn''t want to make
    a repeating string, but now we do.


    Here is some test code:


    ```

    maskChar = "_"

    gameWord = "hello"

    displayWord = maskChar * 5


    print(displayWord)

    ```


    Save it and test it. It will display `displayWord`, which contains five underscore
    characters.


    `maskChar` specifies the character to use as the mask; here it is underscore,
    but you can change it to anything you''d like (but best not to use an actual letter,
    duh!).


    The `gameWord` is hello, which is five letters long, so we use `maskChar * 5`
    to create a masked string of that length.


    That works, but not all game words will be five letters long. The masked `displayWord`
    needs to be whatever length the `gameWord` is. Right? No problem, we can just
    use `len()` to get the length of `gameWord`. Here is the updated code:


    ```

    maskChar = "_"

    gameWord = "hello"

    displayWord = maskChar * len(gameWord)


    print(displayWord)

    ```'
