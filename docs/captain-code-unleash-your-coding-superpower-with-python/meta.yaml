    \ 语句调用一个函数，并打印该函数返回的任何内容，而不是使用大量包含硬编码文本的 `print()` 语句。\n\n顺便说一句，当程序员思考想法时，他们经常使用这样的伪代码——开发期间为自己编写的假代码。他们称之为\
