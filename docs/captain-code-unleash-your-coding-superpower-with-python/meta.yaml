- md: "## CHAPTER 5\n\n## Rock Paper Scissors\n\nIn Chapter 4 you learned how to use\
    \ if statements to create conditions. This is a really important topic, so we're\
    \ going to dedicate one more chapter to it, this time creating the game of Rock,\
