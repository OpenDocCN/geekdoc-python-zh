  - '[PAGE 115]


    range() specifies the range of numbers, and just like randrange() in Chapter 3,
    the end number is not included, so range(1, 11) means start at 1 and stop before
    you reach 11.


    for i creates a variable named i, and inside the loop, i contains the next item
    in the range. On the first iteration i will be 1, then 2, then 3, and so on.


    Try changing the range values and then run your code. Try that a few times.


    # CHALLENGE 6.1


    range() takes an optional third argument—a step. If you specify range(1, 11, 2),
    the loop counter will increase by 2 each time, so the loop will run 5 times instead
    of 10 (for 1, 3, 5, 7, and 9). Try to create a loop that displays the numbers
    10, 20, 30, all the way to 100.


    ![](img/1725feec73e591598339fc549aaff885_115_0.png)


    # Nested Loops


    Now let’s make things more interesting. At the end of Chapter 4 we showed you
    a nested if statement, which is an if statement inside of another if statement.
    You can do the same with loops.


    Let’s try an example that will bring back fond memories of your earliest years
    in school. Remember studying your multiplication tables? Fun, right? It might
    have taken you a while to memorize all the way to 12 x 12, but Python can do that
    for you in just three lines of code!


    > **Nesting and Nesting and...**

    You can nest loops within loops, if statements with if statements, loops within
    if statements, if statements within loops, and you can nest within nests within
    nests. However, at some point nesting too deeply makes the code really hard to
    read and maintain.


    ![](img/1725feec73e591598339fc549aaff885_115_1.png)'
  - "[PAGE 116]\n\nCreate a file named Loop3 .py and type this code:\n\n```\n# Loop\
    \ from 1 to 12\nfor i in range(1, 13):\n    # Loop from 1 to 12 within each iteration\
    \ of the outer loop\n    for j in range(1, 13):\n        # Print both loop values\
    \ and multiply them\n        print(i, \"x\", j, \"=\", i*j)\n```\n\nSave and run\
    \ the code. You’ll see 144 lines of output fly by, starting with 1 x 1 = 1 all\
    \ the way to 12 x 12 = 144.\n\nOk, so how does this code work? We have two loops\
    \ here, so to keep things clear, let’s call them *outer loop* and *inner loop*.\n\
    \nThe outer loop uses range(1, 13), so everything indented beneath it gets called\
    \ 12 times, and each time, variable i will contain the current outer loop iteration\
    \ number (first 1, then 2, and so on).\n\nThe inner loop also uses range(1, 13),\
    \ and so everything indented beneath it also gets called 12 times, and each time,\
    \ variable j will contain the current inner loop iteration number.\n\nSo how many\
    \ times does that print() statement get called? The outer loop makes the inner\
    \ loop execute 12 times. And each time the inner loop executes, it executes the\
    \ print() statement 12 times. So print() gets executed 144 (12 times 12) times\
    \ in total.\n\nThe print() statement itself is pretty simple:\n\n```\nprint(i,\
    \ \"x\", j, \"=\", i*j)\n```\n\nThe first time this runs, i will be 1, and j will\
    \ be 1, so this is effectively:\n\n```\nprint(1, \"x\", 1, \"=\", 1*1)\n```\n\n\
    print() does the math on-the-fly and will display 1 x 1 = 1.\n\nThe next time\
    \ around, i will be 1, and j will be 2, so the output will be 1 x 2 = 2. This\
    \ will continue until j is 12 and the displayed text is 1 x 12 = 12."
