- md: '## Playing Mad Libs


    If you’ve never played Mad Libs before, they are stories that change based on
    provided words. You get prompted for words (a verb, a noun, an adjective, and
    so on) which are inserted into the story, changing it in ways that can be funny
    (or not).


    ## Write Your Story


    Let’s give it a try. We’ll start with a simple story displayed using our familiar
    friend the print() function. You can use our story, or you can make up your own.
    Actually, scratch that. You’re creative, so make up your own story.


    Create a new file called Story.py and type your story using print() functions
    like this:


    ```

    print("I have a pet iguana named Spike.")

    print("He is long, green, and lazy.")

    print("Spike eats leaves, flowers, and fruit.")

    print("His favorite toy is a small yellow ball.")

    ```


    Save your file and run it. You’ll see the text displayed in the Terminal window.


    ## Add Variables


    Now let’s make things a bit more interesting. We’ll replace one word in the story
    with a variable, like this:


    ```

    animal="iguana"


    print("I have a pet", animal, "named Spike.")

    print("He is long, green, and lazy.")

    print("Spike eats leaves, flowers, and fruit.")

    print("His favorite toy is a small yellow ball.")

    ```


    > **Mad Libs®**

    This is our take on Mad Libs. The real Mad Libs® is a registered trademark of
    Penguin Random House LLC.


    As you can see, we changed the first print(). Instead of displaying the type of
    animal, it uses a variable and displays that instead.


    Save and run your code. The output should be the same as it was before.


    Yes, we know this isn''t that exciting. Yet. Let''s keep going. We''ll now change
    lots of the text to use variables instead of hard-coded words. In our example
    story, we changed 11 of them, like this:


    ```

    animal="iguana"

    name="Spike"

    adjective1="long"

    color1="green"

    adjective2="lazy"

    noun1="leaves"

    noun2="flowers"

    noun3="fruit"

    adjective3="small"

    color2="yellow"

    noun4="ball"


    print("I have a pet", animal,"named", name, ".")

    print("He is", adjective1, ",", color1, ", and", adjective2, ".")

    print(name, "eats", noun1, ",", noun2, ", and", noun3, ".")

    print("His favorite toy is a", adjective3, color2, noun4, ".")

    ```


    Make your changes and save your code.


    Run the code, and it should look exactly as it did before.


    One interesting thing to note is that the variable name is used twice in the story.
    Once you create a variable, you can use it as many times as you need.


    > **Watch Your Quotes and Commas**

    Be careful with your quotes and commas. You''ll want quotes around text but not
    around variable names. And be sure to separate all arguments with commas. This
    is where color coding is super useful: If things aren''t the right colors, then
    you''ve probably messed up a quote or a comma.


    ## Get User Input


    Now that your story uses variables, changing it to display user-provided text
    is easy. Simply change each variable to use an `input()`, just like we did earlier
    in this chapter. Here is our example:


    ```

    print("Hello, please answer the following prompts.")

    print()

    animal=input("Enter an animal: ")

    name=input("Enter a name: ")

    adjective1=input("Enter an adjective: ")

    color1=input("Enter a color: ")

    adjective2=input("Enter an adjective: ")

    noun1=input("Enter a noun: ")

    noun2=input("Enter a noun: ")

    noun3=input("Enter a noun: ")

    adjective3=input("Enter an adjective: ")

    color2=input("Enter a color: ")

    noun4=input("Enter a noun: ")


    print("Thank you. Here is your story.")

    print()

    print("I have a pet", animal,"named", name, ".")

    print("He is", adjective1, ",", color1, ", and", adjective2, ".")

    print(name, "eats", noun1, ",", noun2, ", and", noun3, ".")

    print("His favorite toy is a", adjective3, color2, noun4, ".")

    ```


    You''ll notice that we added a `print()` at the top to provide some instructions.
    We also used a couple of empty `print()` functions. Those add empty lines so that
    the output is more readable.


    Save the code and run it. You''ll be prompted for all of your inputs, and the
    code will then generate a story. Each time you run the code, a new story will
    be generated based on whatever inputs are provided.


    Once you have tested your code, have a friend or family member give it a try.
    They''ll be impressed with your coding skills.


    ## CHALLENGE 2.2


    Ready for your next Challenge?


    Make your Mad Lib interesting by prompting for at least 15 different words. And
    then personalize it. At the start, when you provide instructions, ask the user
    for their name and then use that in the instructions to create a more personalized
    experience.


    ![](img/1725feec73e591598339fc549aaff885_55_0.png)


    ## Summary


    In this chapter, you learned all about variables and how to use them. You also
    mastered two functions: `print()`, which displays text, and `input()`, which prompts
    for text. And then you put it all together to create a fully functional app. Congratulations,
    you’re now a real coder!


    This page intentionally left blank


    ![](img/1725feec73e591598339fc549aaff885_57_0.png)


    # CHAPTER 3


    # Roll the Dice


    Now that you know how to use functions and variables, we''re going to make things
    more interesting by introducing libraries and a whole lot of randomness.


    ## Using Libraries


    We briefly mentioned libraries back in Chapter 1. You can think of libraries as
    collections of code—usually functions (like the `print()` and `input()` functions
    you’ve already used). Libraries are easy to use. You just tell Python what library
    you need, and you get to use the functions in it. Simple as that. Yes, someone
    else did the hard work, and you get to just use it. Nice, huh?


    Python comes with lots of libraries included. There is one called `datetime` that
    provides all sorts of functions for working with dates. `math` is used for mathematical
    operations. There are libraries for working with files on your computer, accessing
    Internet sites, working with cryptography, and many more. And libraries can contain
    more than just functions, too, as you’ll see.


    And if Python doesn’t have the libraries you need, they may exist online for you
    to download and use. We’ll look at using 3rd party libraries (which means libraries
    that come from someone else, as opposed to ones included with Python) in Part
    III of this book.


    ## The random Library


    The first library we are going to look at is called `random`, and, as its name
    suggests, it is used to add randomness to your code. Want to pick a random number
    between 1 and 100? `random` can help. Creating a game and need enemies to appear
    at random intervals and with random levels of health? You use `random` for that,
    too. Even something as simple as simulating a coin toss can be achieved by using
    `random`.


    Ok, so how do you tell Python what library you want to use? You use the `import`
    statement. Let’s try that. Create a new file named `Random1.py` and type the following:


    ```

    import random

    ```


    > **Get to Know PyPI**

    The official repository for Python libraries is called PyPI, which is home to
    more than 300,000 libraries!


    The Truth About Random

    Here''s the truth about computers and randomness: Computers can''t do random things.
    They just can''t. Humans can, but computers like to follow instructions methodically,
    and they have no idea how to do things that make no sense or have no specific
    order. So, they can''t really do random, well, anything. When computers appear
    to be doing random things, they are actually relying on complex algorithms and
    factors that constantly change (like the current date and time) to simulate randomness.
    If that sounds complex, well, it kinda is. Which is why we love libraries like
    random. You just use the library''s functions and let the code inside the library
    do all the hard work for you.


    This code tells Python to import the random library. Save the code and run it.


    What happened? Nothing? It may look like nothing, but something big did happen.
    Remember, Python runs your code one line at a time. When it comes to the line
    with the import statement, it goes and finds the random library and pulls it into
    your code, ready for you to use it. And then you didn''t use it. But that''s ok.
    Now you will.


    ## Generating Random Numbers


    Update your code, adding two more lines as shown here:


    ```

    import random


    num=random.randrange(1, 11)

    print("Random number is", num)

    ```


    Save the file and run it. And then run it again. And again. Run it a few times.


    What happens? Each time you run your program, a random number is displayed.


    Let''s look at the code to understand what it is doing. You know what the first
    line does: import random imports the random library. And you know what the last
    line does: It prints some text and the random number.'
