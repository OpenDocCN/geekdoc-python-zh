    # Understanding Computer Programming


    Let’s start by taking a few minutes to understand what computer programming actually
    is, and to do that we need to talk about computers.


    # What is a computer?


    You’ve seen computers, and they are all basically the same; they have screens,
    a keyboard, mouse or touchpad, and some fold in half, like a notebook. Right?
    No, wrong! The truth is that most of the computers that you’ve seen and used look
    nothing at all like that. Really.


    For example, your gaming consoles are all computers. So are smartphones, smartwatches,
    and smart TVs. (Actually, anything with “smart” in the name is pretty much guaranteed
    to be a computer.) Those video doorbells that show you who’s at the door? Those
    are computers. Vacuuming robots, fancy touchscreen thermostats, and display consoles
    in cars are all computers, too. Drones are computers with propellers, and Tesla
    cars are computers with seats and wheels. Those cool rovers NASA sent to Mars
    are computers. ATMs at the bank that you can use to withdraw cash from an account?
    Those are computers, as are self-checkout machines at your local grocery store.
    You get the idea. There are lots and lots of computers out there, and most look
    nothing like what we typically call a computer.


    So, what makes all of these devices computers? They are all computers because
    inside of them is a *microprocessor*, a computer chip that functions as the device’s
    brain. The microprocessor controls everything the device does. The display, motors,
    inputs, sensors, speakers, and more are all controlled by one or more microprocessors.


    ![](img/1725feec73e591598339fc549aaff885_26_0.png)'
- md: 'So now that you know what computers are, answer these questions: Are computers
    smart? Is your gaming console actually smart? What about your smartphone or tablet?
    What do you think?


    Well, sorry to be the bearer of bad news, but the answer is no, not at all. Computers
    are not very smart. In fact, quite the opposite, despite the word “smart” in some
    of their names, computers are actually rather dumb and useless.


    Why are computers not smart? Because as powerful as they are, they themselves
    don’t know how to do anything. They can’t display videos on a screen, they can’t
    respond to mouse clicks or joystick controls, they can’t connect to the Internet,
    they can’t understand what you type, they can’t play your favorite games or let
    you video conference. By themselves computers can’t do anything useful at all…
    So, yep, not very smart.


    But computers do indeed do all sorts of wonderful things, so how do they know
    how to do them? They can do those things because someone taught the computers
    how to do them. Someone gave the computers very specific instructions teaching
    them how to do all things we expect our favorite devices to do. And those instructions
    are indeed pretty smart.


    But the real smarts belong to whomever actually created the instructions. So who
    does that? Who gets to teach all of the computers around us how to do fun and
    useful things? That’s the job of computer programmers, and computer programming
    is just that, teaching computers how to do stuff.


    ## How do we talk to computers?


    When you talk to your friends, they understand what you are saying (well, hopefully).
    The reason that they understand you is that you are communicating in the same
    language, one you both understand. This is obviously important. If you spoke to
    someone who only understood another language, you’d not really be communicating.


    > **What’s in a Name?**

    > *Computer programmers* are also called *coders*, *software engineers*, *application
    developers*, and *software developers*. Lots of titles, but they all really mean
    the same thing.


    ## CAPTAIN CODE: Unleash Your Coding Superpower with Python


    Communicating with a computer is much the same. If you are going to give a computer
    instructions, you need to provide those instructions in a language that the computer
    understands. You are going to use a computer programming language, and much like
    spoken languages, programming languages have words and rules for how they are
    used.


    There are lots and lots of different computer languages. Some have very specific
    uses, some are more general purpose. And most programmers learn and use multiple
    languages; that way they can pick the best one for any particular situation. If
    the idea of having to learn lots of languages sounds scary, don’t worry, we have
    some good news for you:


    - Exact language details, the words you use and how you use them (programmers
    call this *syntax*) differ from one language to the next. But unlike spoken languages,
    computer programming languages tend to have very few words and rules, so you’ll
    master them pretty quickly.


    > **NEW TERM**

    > **Syntax** In spoken languages, the word *syntax* means the rules for how words
    and phrases are put together to make well-formed sentences. In programming languages
    the word *syntax* is used similarly: It means the rules for how language elements
    are to be used.


    - In addition, pretty much all programming languages do the same basic things
    (and we’ll cover all of those in this book). This means that once you master one
    programming language, learning the next one is much easier.


    - You never need to memorize a programming language. If you ever need a reminder
    for how to perform a specific task in a specific language, do what professional
    programmers do: Google it.


    - There is one important difference between spoken languages and programming languages,
    and that is the listener. When you message a friend, you can misspell words (don’t),
    omit punctuation (don’t do that, either), even send incomplete sentences (ugh,
    no, please), and your friend will still understand you. Computers are less forgiving
    (not smart, remember?) and if you miss a . or a }, they''ll get upset and not
    know what you want them to do. This is probably the single biggest source of frustration
    for beginning coders. So why did we point this out among this list of good news?
    Because editors (the tools you use to write your code...more on that soon) are
    really good at catching those typos, and that makes things a whole lot less frustrating.


    Now that you know what a programming language is, and why they are similar to
    spoken languages, we are going to let you in on a secret; well, two secrets, actually.
    We are going to tell you exactly what computer programming is and what programmers
    do:


    - Imagine that you knew every word in your spoken language. You studied your dictionary
    backward and forward and mastered every single word, including pronunciations
    and definitions. Would that make you a best-selling author? Would knowing all
    the words mean that you could write the next blockbuster movie script? Of course
    not. Knowing the words is one thing. Knowing how to use those words by creatively
    combining them in any of infinite combinations, well, that''s obviously very different.
    Computer languages are much the same. Knowing the syntax is easy (especially as
    computer languages have far fewer words than spoken languages). What makes an
    experienced and skilled programmer is knowing how to use those language elements
    to artfully solve problems, and that''s exactly what we''re going to help you
    learn. And that is a skill that takes time and practice.


    - Once more, think about spoken languages. Is there a single right way to share
    an idea using words? No, of course not. If that were the case, all movies and
    books would be the same, and that would be horrible! A language is a tool, and
    authors get to use that tool to craft all sorts of wonderful and unique experiences.
    Using a programming language is much the same. There is no single right way to
    write code or solve any specific problem. Rather, there are as many solutions
    as there are coders. We''ll show you lots of techniques and solutions in this
    book, and you are free to use them in your own coding. But, over time, you''ll
    find your own creative ways to solve problems, just like professional coders do,
    because coding is all about creative problem solving.


    ## What is Python?


    All of this brings us to Python, which is <make a drumroll sound here please>
    ... a programming language.


    Yes, Python is a language, and it is used to provide instructions to a computer.
    Python is not a new programming language, it’s actually been around for 30 years
    or so. But it is super popular, and even powers some of your favorite sites and
    apps. Why is Python so popular?


    - Python is really easy to use, no complicated tools or setups, just write a few
    lines of code and off you go. Really! In fact, you’ll have written code that works
    before you finish this chapter!


    - Python’s creators worked really hard to create a language whose syntax is really
    easy to read. Reading Python code is a lot like reading English. Most other programming
    languages are far more complicated to read. (Trust us on that one.)


    - Those syntax rules we mentioned before, the ones that frustrate most beginning
    coders? Python’s syntax is one of the easiest of any programming language, and
    we all like fewer rules, right?


    - Simple to use and having less rigid rules are great, but what really makes Python
    so much fun to work with is all of the libraries it makes available. We’ll discuss
    libraries later in the book, but for now, all you need to know is that libraries
    are sets of code that other programmers have written for you; just download them
    and use them. So, tasks that might be complicated (for example, embedding Google
    maps and directions in an app or detecting when a car hits an obstacle in a game)
    are so much simpler. You don’t have to start from scratch—you get to build on
    top of what other smart coders have kindly shared.


    So we are going to learn Python together. But, as we explained before, what we’ll
    learn are the concepts and techniques that are useful in all languages. Once you’re
    done with this book, you will be able to apply your hard-earned knowledge and
    expertise to whatever language you decide to use next.'
  mdcn: '那么，既然你已经了解了计算机是什么，来回答这些问题：计算机聪明吗？你的游戏主机真的聪明吗？你的智能手机或平板电脑呢？你怎么看？


    嗯，很抱歉带来这个坏消息，但答案是不，一点也不。计算机并不聪明。事实上，恰恰相反，尽管它们中有些名字里带有“智能”这个词，计算机实际上相当笨拙且无用。


    为什么计算机不聪明？因为无论它们多么强大，它们自己并不知道如何做任何事情。它们无法在屏幕上显示视频，无法响应鼠标点击或操纵杆控制，无法连接到互联网，无法理解你输入的内容，无法玩你喜欢的游戏或让你进行视频会议。计算机本身根本做不了任何有用的事情……所以，是的，不太聪明。


    但计算机确实能做各种奇妙的事情，那么它们是怎么知道如何做的呢？它们能做这些事情是因为有人教了计算机如何去做。有人给了计算机非常具体的指令，教它们如何做我们期望我们喜爱的设备能做的所有事情。而这些指令确实相当聪明。


    但真正的智慧属于那些实际创建指令的人。那么是谁呢？谁来教我们周围所有的计算机如何做有趣且有用的事情？这就是计算机程序员的工作，而计算机编程正是如此——教计算机如何做事。


    ## 我们如何与计算机交谈？


    当你和朋友交谈时，他们能理解你在说什么（嗯，希望如此）。他们能理解你的原因是你在使用同一种语言交流，一种你们都理解的语言。这显然很重要。如果你和一个只懂另一种语言的人交谈，你们就无法真正交流。


    > **名字里有什么？**

    > *计算机程序员*也被称为*编码员*、*软件工程师*、*应用开发者*和*软件开发者*。头衔很多，但它们实际上都意味着同一件事。


    ## 代码船长：用Python释放你的编程超能力


    与计算机交流也大同小异。如果你要给计算机指令，你需要用计算机能理解的语言来提供这些指令。你将使用一种计算机编程语言，与口语类似，编程语言也有词汇和使用规则。


    有非常非常多的计算机语言。有些有非常特定的用途，有些则更通用。而且大多数程序员会学习和使用多种语言；这样他们就能为任何特定情况选择最佳语言。如果学习多种语言的想法听起来很可怕，别担心，我们有一些好消息要告诉你：


    - 具体的语言细节，你使用的词汇以及如何使用它们（程序员称之为*语法*）因语言而异。但与口语不同，计算机编程语言往往词汇和规则很少，所以你会很快掌握它们。


    > **新术语**

    > **语法** 在口语中，*语法*一词指的是将单词和短语组合成结构正确的句子的规则。在编程语言中，*语法*一词的用法类似：它指的是语言元素应如何使用的规则。


    - 此外，几乎所有编程语言都做相同的基本事情（我们将在本书中涵盖所有这些内容）。这意味着一旦你掌握了一种编程语言，学习下一种就会容易得多。


    - 你永远不需要记住一种编程语言。如果你需要提醒如何在特定语言中执行特定任务，就做专业程序员做的事：用谷歌搜索。


    - 口语和编程语言之间有一个重要的区别，那就是听众。当你给朋友发消息时，你可以拼错单词（别这样），省略标点符号（也别这样），甚至发送不完整的句子（呃，不，请别这样），你的朋友仍然会理解你。计算机则不那么宽容（不聪明，记得吗？），如果你漏掉了一个
    `.` 或一个 `}`，它们会生气，不知道你想让它们做什么。这可能是初学编码者感到沮丧的最大单一原因。那么为什么我们在这份好消息列表中指出这一点呢？因为编辑器（你用来编写代码的工具……稍后会详细介绍）非常擅长捕捉这些拼写错误，这会让事情变得不那么令人沮丧。


    现在你知道了什么是编程语言，以及它们为什么与口语相似，我们要告诉你一个秘密；嗯，实际上是两个秘密。我们要确切地告诉你什么是计算机编程以及程序员做什么：


    - 想象一下，你懂你口语中的每一个单词。你正着倒着研究你的字典，掌握了每一个单词，包括发音和定义。这会让你成为畅销书作家吗？知道所有单词是否意味着你能写出下一部大片的剧本？当然不是。知道单词是一回事。知道如何通过创造性地将它们组合成无限的组合来使用这些单词，嗯，这显然非常不同。计算机语言也大同小异。知道语法很容易（尤其是计算机语言的词汇比口语少得多）。使一个经验丰富的程序员变得熟练的是知道如何使用这些语言元素巧妙地解决问题，而这正是我们将要帮助你学习的。这是一项需要时间和实践的技能。


    - 再想想口语。用文字分享想法有唯一正确的方式吗？不，当然没有。如果是那样的话，所有的电影和书籍都会是一样的，那太可怕了！语言是一种工具，作者可以用这个工具来打造各种美妙而独特的体验。使用编程语言也大同小异。编写代码或解决任何特定问题没有唯一正确的方式。相反，有多少编码员就有多少种解决方案。我们将在本书中向你展示许多技术和解决方案，你可以自由地在自己的编码中使用它们。但是，随着时间的推移，你会找到自己创造性的解决问题的方法，就像专业编码员一样，因为编码就是关于创造性地解决问题。


    ## 什么是Python？


    所有这些把我们带到了Python，也就是 <请在这里制造鼓声效果> ... 一种编程语言。


    是的，Python是一种语言，它被用来向计算机提供指令。Python不是一种新的编程语言，它实际上已经存在了大约30年。但它非常受欢迎，甚至驱动着你最喜欢的一些网站和应用程序。为什么Python如此受欢迎？


    - Python真的很容易使用，没有复杂的工具或设置，只需写几行代码就可以开始了。真的！事实上，你将在完成本章之前就写出能运行的代码！


    - Python的创建者非常努力地创建了一种语法非常易于阅读的语言。阅读Python代码很像阅读英语。大多数其他编程语言读起来要复杂得多。（相信我们。）


    - 我们之前提到的那些语法规则，那些让大多数初学编码者感到沮丧的规则？Python的语法是所有编程语言中最简单的之一，我们都喜欢更少的规则，对吧？


    - 易于使用和规则不那么严格固然很好，但真正让Python如此有趣的是它提供的所有库。我们将在本书后面讨论库，但现在，你需要知道的是，库是其他程序员为你编写的代码集合；只需下载并使用它们。因此，可能很复杂的任务（例如，在应用程序中嵌入谷歌地图和路线，或在游戏中检测汽车何时撞到障碍物）就变得简单得多。你不必从头开始——你可以站在其他聪明的编码员慷慨分享的基础上。


    所以我们将一起学习Python。但是，正如我们之前解释的，我们将学习的是在所有语言中都有用的概念和技术。当你读完本书后，你将能够将你辛苦获得的知识和专业知识应用到你决定使用的任何语言中。'
