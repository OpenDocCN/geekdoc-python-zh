  - '[PAGE 302]


    # Saving and Restoring


    Some games let players save their progress and then restore it later. You might
    do this when the game is too long for players to complete all at once. Or players
    may want to save their progress before trying something new (like battling an
    enemy) so that if they die, they can restore back to where they were.


    So long as your game data is well organized (in dictionaries and classes, for
    example, as opposed to scattered in variables all over the place), then you''ll
    find that Python makes this quite easy. And the magic is a Python library named
    pickle.


    How does saving and restoring work? To save your game, you need to do the following:


    +   1. Create a single variable that contains all of the data you need to save.

    2. Data gets saved in a file on the computer, so pick a file name to use.

    3. Use pickle to serialize the data and save it to the file.


    Restoring your game is the reverse:


    +   1. Read data from the saved file.

    2. Deserialize it with pickle.

    3. Save the data back to the right variables.


    > **NEW TERM**

    **Serializing** In Python, *serializing* data means taking an internal Python
    object (variables, lists, classes, dictionaries, etc.) and turning it into a string
    of bytes that can be stored. *Deserializing* is the opposite: turning a string
    of bytes back into a Python object.


    > **Pickle? Really?**

    Yes, the Python library that you use to save and restore data is pickle. The name
    may sound funny, but there is actually a good (or at least sensible) reason for
    this. When you pickle foods like cucumbers or onions, what you are doing is preserving
    them. The Python pickle library is also used to save (and thus preserve) data.'
  - "[PAGE 303]\n\nOk, so let's see how this works. Look at this code:\n\n```\n# Imports\n\
    from os import path\nimport pickle\n\n# Data file\nsaveDataFile = \"savedGame.p\"\
    \n```\n\nThe first import is the library used to access files on your computer.\
    \ You need that to actually save and read the saved file. The second line imports\
    \ the pickle library. Then you create a variable named saveDataFile, which contains\
    \ the name of the file that will actually hold the saved game data.\n\nAs for\
    \ saving data, look at this code:\n\n```\n# Create a data object to store both\
    \ data sets.\ndb = {\n    \"inv\":inv,\n    \"player\":player\n}\n\n# Save it\n\
    pickle.dump(db, open(saveDataFile, \"wb\"))\n```\n\nWhen you save game data, you\
    \ want all of the data in one big variable. Here we create a dictionary named\
    \ db (for database), and inside it we save our inv and player variables (assuming\
    \ that these are the names we are using).\n\nThe next line of code actually saves\
    \ the data. pickle.dump() gets passed the data to save (the db variable) and the\
    \ open file to save it to. The \"wb\" argument tells dump() to write binary data\
    \ (as opposed to simple text data). That's all there is to it. Game data saved!\n\
    \nTo restore game data, we just do the opposite:\n\n```\n# Now read back saved\
    \ file\nif path.isfile(saveDataFile):\n    db = pickle.load(open(saveDataFile,\
    \ \"rb\"))\n    inv = db[\"inv\"]\n    player = db[\"player\"]\n```"
  - '[PAGE 304]


    This code first uses `path.isfile()` to verify that the saved game file exists.
    If it does, it uses `pickle.load()` to read and deserialize the data and then
    puts the restored data back in the original `inv` and `player` variables. Here
    we use an "rb" argument which tells `dump()` to read binary data.


    As you can see, saving and restoring data in Python is really easy. We mean that.
    We''ve done this in other programming languages, and most can''t do this in just
    a few lines of code.


    If you do want to support save and restore, here are some things to keep in mind:


    +   - What we did here—copying all objects to be saved into a single save variable—is
    the cleanest and easiest way to save data. You don''t want to be saving and restoring
    lots of variables. Trust us on this one.

    - The variable you save should contain everything you need to restore the game
    to a specific state.

    - Decide if you want a single save file or multiple files. A single file is simpler
    to work with but will only let you restore to a specific point in game play. Multiple
    save files will let players restore as they need, but you''ll need a way to let
    them pick which to restore.

    - You may want to check to see if there are any saved games at game startup. If
    you detect a saved game, ask the user if they want to restore it.


    # Summary


    In this chapter, we''ve introduced lots of ideas and techniques that you can use
    to really take your text-based adventure game to the next level. In Part III,
    we''ll use these skills as we tackle graphics-based games.'
