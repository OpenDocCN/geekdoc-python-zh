    How long are the lists in our example? len(options) will return 4, as there are
    four items in options. Yes, the items are lists; each list is just one item. len(options[0])
    will return 2, as list options[0] (like list options[1] and list options[2]) contains
    two items—the letter and prompt text.


    > **Lists of Lists of Lists of...**

    You''ve seen lists, and you''ve seen lists of lists. And, yes, you can create
    lists of lists of lists. And more!


    In some languages, lists of lists are referred to as *two-dimensional arrays*,
    and lists of lists of lists are called *three-dimensional arrays*. And you can
    even go out of our spatial world into more than three dimensions!


    You know that you use [index] notation to access list items. options[0] returns
    the first item in a list, right? So here it returns the first item in options,
    which is ["P", "Examine boulder pile"]. Similarly, options[1] returns the second
    item, which is the list ["S", "Go to the structure"]. This can be seen in the
    print() statements.


    So, if options[1] refers to the entire second list, how can we access the individual
    items in that list? Like this:


    ```

    print(options[1][0])

    print(options[1][1])

    ```


    The first print() displays S as that is item 0 inside of item 1. options[1] means
    item 1 in options, options[1][0] means item 0 within item 1 in options. The second
    print() displays item 1 within item 1, which is Go to the Structure.


    This is a fun and powerful way to use lists, but the syntax can be tricky at first.
    Play with the code in List7.py, change what is being printed, and try different
    options to get a feel for how to use [index][index] syntax.


    Using lists of lists is a great way to pass options to our getUserChoice() function.
    This format will make it easy to add options (each of which is a list of two items—letter
    and prompt). It can handle as many options as needed. And it''ll make the actual
    UDF code really clean, too.'
