    name=\"Shmuel\"\nname.upper()\n```\n\n这段代码做什么？它创建一个名为 name 的变量，然后创建它的大写版本。对吗？是的，但\
    \ upper() 返回 name 的大写副本，并没有实际更改 name。你可以自己测试一下。尝试上面的代码，然后打印 name，你会发现 name 没有被转换。如果你确实想将\
