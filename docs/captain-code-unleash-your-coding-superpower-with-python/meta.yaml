  - '[PAGE 189]


    Functions Must Be Defined Before They Can Be Used

    In our simple example, we used def to define the sayHello() function and then
    called sayHello(). What would happen if the sayHello() call were before the def?
    You can modify the code to try that if you’d like. You’ll see an error message:


    ''sayHello'' is not defined


    This simply means that Python saw your sayHello() call and didn’t know what to
    do with it. Why? Remember, Python processes your code line-by-line, starting at
    the top. If sayHello() is called before the function sayHello() is defined, it’ll
    have no idea what sayHello() is.


    So, in Python functions must always be defined before they are used.


    Incidentally, this is also why you always put import statements at the top of
    your code. When you import a library, Python sees all the functions in it, essentially
    defining them on-the-fly right where the import statement is. Any code after the
    import can then use the imported functions.


    # Passing Arguments


    Our sayHello() function accepted no arguments (and returned no values). That’s
    why it was rather useless.


    So let’s create a more interesting example. Look at this code:


    ```

    multiply(12, 8)

    ```


    There is no Python function named multiply(), so you can’t run this code yet.
    What this code should do is allow you to pass any two numbers to a function named
    multiply(). That function will do just that: It’ll multiply whatever two numbers
    you pass to it, and it will also display the multiplication and result.


    Unlike sayHello(), which accepts no arguments, multiply() obviously needs to accept
    two arguments—the two numbers to be multiplied.'
