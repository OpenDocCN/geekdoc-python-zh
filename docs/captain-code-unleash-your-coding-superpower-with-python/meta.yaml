- img_proc: true
  md: 'There is one more super-important change. We removed the code that makes the
    background white and added this to the game loop in its place:


    ```

    # Place background

    screen.blit(IMG_ROAD, (0,0))

    ```


    This line of code is what puts the road image onto the game screen. Remember,
    we have two surfaces now: the main game surface (which we called screen) and the
    background image surface (which we called IMG_ROAD). The blit() function copies
    a passed surface and copies it onto another surface. Here it copies IMG_ROAD onto
    screen.


    blit() takes two arguments: the image being copied and where to copy it to. Why
    is that second argument needed? Surfaces are two dimensional. Think of them as
    squares (or rectangles). When you copy an image onto a surface, you need to tell
    the surface where to place the image by using an x,y coordinate—a pair of numbers
    that identifies a location on the target surface. 0, 0 refers to the top-left
    corner of the screen, which is exactly where we want our background placed so
    that it fills the entire screen.


    > **NEW TERM**

    **x,y Coordinate** An x,y coordinate (also called an x,y axis) marks a location
    on a plane. The x number is the horizontal position starting from the left, and
    the y number is the vertical position starting from the top. And, as you''d expect,
    in Python these values start from 0. This means that position 0, 0 is the top-left
    corner, 100, 50 would be 100 pixels from the left and 50 from the top, and so
    on.


    > **NEW TERM**

    **Blit** Blit is a strange word, right? It actually stands for *block transfer*,
    which is what actually happens when you blit: You copy (transfer) a block of information
    from one location to another.'
