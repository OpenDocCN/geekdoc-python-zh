    我们使用的大多数骰子有6面，但有些游戏使用更多面的骰子。实际上，古希腊人和古罗马人使用的是十二面体形状的骰子，有12面！所以，以防你遇到古希腊人或古罗马人，编写一个掷12面骰子的代码。'
