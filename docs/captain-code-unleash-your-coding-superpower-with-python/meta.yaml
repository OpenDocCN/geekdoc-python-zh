  md: "# Moving the Player\n\nThe enemy sprite moved automatically. On each frame\
    \ refresh, it moved 5 pixels down the screen.\n\nThe player sprite can’t move\
    \ automatically. It needs to move only when the player tells it to do so. How\
    \ will players do this? Our game will use the left and right arrow keys on the\
    \ keyboard; press left to go left, right to go right. This obviously requires\
    \ that we check if those keyboard keys have been pressed. And, once again, Pygame\
    \ makes this really easy.\n\nIn your game loop, find the line of code that blits\
    \ the player sprite. Add this right after that line of code:\n\n```\n# Get keys\
    \ pressed\nkeys = pygame.key.get_pressed()\n# Check for LEFT key\nif keys[K_LEFT]:\n\
    \    # Move left\n    player.rect.move_ip(-moveSpeed, 0)\n# Check for RIGHT key\n\
    if keys[K_RIGHT]:\n    # Move right\n    player.rect.move_ip(moveSpeed, 0)\n```\n\
    \nkey.get_pressed() returns a list of all the available keys, and each will be\
    \ True if pressed or False if not. We save the returned list in a viable named\
    \ keys, which we can then check. If keys[K_LEFT] is True, then we know the left\
    \ arrow key has been pressed, and so on.\n\n> **All Sorts of Key Options**\nAs\
    \ you have seen, key.get_pressed() returns a list of all the possible keys that\
    \ could be pressed, with each set to True or False. In our game, we only care\
    \ about the left and right arrow keys. But other games might want to test for\
    \ key combinations (Ctrl+A, or left arrow and up arrow pressed at the same time),\
    \ and this is easily done by checking multiple values from the returned list."
