  md: '# Some Tips


    As you will recall, you''ll want to import `datetime` if you are going to use
    dates.


    How do you get today''s date? We did that back in Chapter 3:


    ```

    today=datetime.datetime.now()

    ```


    In this example, `today` is now a variable of type `datetime`.


    So how do you create your own `datetime` variable with your own date? You can
    do this:


    ```

    piday=datetime.datetime(2022, 3, 14)

    ```


    You pass year, month, and day as arguments to `datetime`, and it will create the
    variable for you.


    You can use `print(piday)` to verify that it worked.


    We should point out that here we hard-coded the date. If you prompt the user for
    year, month, and day, you''d pass the variables with those values instead, like
    this:


    ```

    birthday=datetime.datetime(yy, mm, dd)

    ```


    As for the math, calculating the difference between dates? Python makes this super
    easy. Assuming you have two variables, `today` (containing today''s date) and
    `birthday` (containing your next birthday), you can calculate the days in between
    by using simple math, like this:


    ```

    daysUntilBirthday = birthday - today

    ```


    > **Initializing Dates**

    When you create a `datetime` variable, you pass it the year, month, and day, as
    you saw here. These values are required. A date obviously isn''t a valid date
    without year, month, and day.


    If you need to work with times, you can also optionally pass hour, minute, and
    second. If you don''t pass time values, then hour, minute, and second will all
    be 0 (meaning midnight).'
