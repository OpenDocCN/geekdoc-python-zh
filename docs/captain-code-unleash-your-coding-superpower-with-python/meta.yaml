    ## CHAPTER 20\n\n## Image-ine the Possibilities\n\nNow that you have a basic Pygame\
    \ application set up, it’s time to actually make it look like a game. In this\
    \ chapter, we’ll place images on the game surface and learn how to work with files\
    \ and folders, too.\n\n## Files and Folders\n\nOur Crazy Driver game right now\
    \ is made of a single file named `Main.py`, which contains Python code. But that’s\
    \ about to change. Real games are made up of lots of files, and not all of them\
    \ are code. You’ll have image files at a minimum, and possibly video, music, and\
    \ other files, too. And you’d not want all of those files in the same folder.\
    \ That would get unruly and unmanageable.\n\nOur game just uses images (and in\
    \ Chapter 19 we guided you through saving them in an `Images` folder). If you\
    \ had video files, sound clips, music files, etc., you’ll probably want to save\
    \ them in their own appropriately named folders, too. A more complete game may\
    \ have a folder structure that looks something like this:\n\n![](img/1725feec73e591598339fc549aaff885_324_0.png)\n\
    \nThe challenge, however, is that your code needs to know where to find these\
    \ files when it needs them. And you do not want to hard code file paths. Why?\
    \ Because depending on the operating system used and which folder the app is being\
    \ run from, the exact path to the files and folders could change. What works on\
    \ your computer may not work on someone else’s.\n\n> **NEW TERM**\n> **Path**\
    \ Files on your computer are stored in folders. And folders can be inside of other\
