  mdcn: "## 创建自定义端点\n\nWeb 应用程序中的端点类似于宏伟庄园内的无数扇门，每扇门通向其独特的房间。它们是定义的 URL——每个 URL 与特定功能相关联，允许检索、创建、修改或删除资源。在\
    \ Django 中，这些端点不仅仅是预定义的路径，还可以精确地塑造，为开发者提供自由，以创建符合应用程序独特叙事的定制体验。\n\n想象一下，你正在构建一个用户可以订阅各种感兴趣主题的应用程序。一个用于将用户订阅到主题的自定义端点可以显著提升用户体验，为这一特定操作提供直接路径。\n\
    \n让我们探索如何在 Django 中实现这一点：\n\n```python\nfrom django.urls import path\nfrom . import\
    \ views\n\nurlpatterns = [\n    # 现有路径...\n\n    # 用于订阅主题的自定义端点\n    path('subscribe/<int:topic_id>/',\
    \ views.subscribe_to_topic,\n         name='subscribe-to-topic'),\n]\n```\n\n\
    在此代码片段中，一个新的 URL 模式被添加到应用程序的 `urlpatterns` 中。此模式包含一个动态段 `<int:topic_id>/`，用于捕获用户希望订阅的主题的\
    \ ID。关联的视图 `subscribe_to_topic` 负责处理订阅逻辑。\n\n视图 `subscribe_to_topic` 是自定义端点精髓得以体现的地方。在这里，我们定义了当访问端点时应用程序如何响应：\n\
    \n```python\nfrom django.http import JsonResponse\nfrom .models import Topic,\
    \ Subscription\nfrom django.contrib.auth.models import User\n\ndef subscribe_to_topic(request,\
    \ topic_id):\n    # 确保用户已认证\n    if not request.user.is_authenticated:\n     \
    \   return JsonResponse({'error': 'Authentication required'}, status=401)\n\n\
    \    # 检索主题和用户\n    topic = Topic.objects.get(id=topic_id)\n    user = User.objects.get(id=request.user.id)\n\
    \n    # 创建订阅\n    Subscription.objects.create(user=user, topic=topic)\n\n    #\
    \ 返回成功响应\n    return JsonResponse({'success': 'Subscribed successfully'})\n```\n\
    \n此函数首先检查用户是否已认证，如果未认证则返回错误。然后，它使用 `topic_id` 检索 `Topic` 实例，并从请求中检索 `User` 实例。创建一个新的\
    \ `Subscription` 将用户与主题关联起来，并返回成功响应。\n\n虽然创建自定义端点开启了巨大的可能性，但它也引导开发者需要考虑一系列事项。其中最重要的是安全性——确保端点能够抵御未授权访问和潜在漏洞。此外，端点\
    \ URL 的清晰度和结构在维护直观且可导航的 API 架构方面起着至关重要的作用。\n\n此外，将这些自定义端点集成到应用程序更广泛的生态系统中，需要细致入微的关注，以确保与其他组件和服务的无缝交互。\n\
    \n## Celery 用于异步任务队列\n\nCelery 使 Django 开发者能够异步执行耗时任务，远离执行主线程，从而避免任何对用户与应用程序交互的干扰。这就像在聚会中，你将重活交给一位能干的助手，而你继续与客人交谈，确保整体体验保持流畅和引人入胜。\n\
    \nCelery 通过将任务（本质上是被指定为异步执行的函数）分派给工作者来运作。这些工作者可以与应用程序位于同一台机器上，也可以分布在机器集群中，它们监听任务并在收到时执行它们。\n\
    \n将 Celery 集成到 Django 项目中需要协调几个组件，首先是安装 Celery 本身，然后是在 Django 环境中进行配置。首先，通过 pip\
    \ 将 Celery 添加到项目中：\n\n```bash\npip install celery\n```\n\n安装完成后，下一步是在 Django 项目的主模块目录中创建一个新文件，通常命名为\
    \ `celery.py`。此文件负责设置 Celery 应用程序并将其与 Django 的设置集成：\n\n```python\nfrom __future__\
    \ import absolute_import, unicode_literals\nimport os\nfrom celery import Celery\n\
    \n# 为 'celery' 程序设置默认的 Django 设置模块。\nos.environ.setdefault('DJANGO_SETTINGS_MODULE',\n\
    \    'your_project_name.settings')\n\napp = Celery('your_project_name')\n\n# 在这里使用字符串意味着工作者不必将配置对象序列化到子进程。\n\
    app.config_from_object('django.conf:settings', namespace='CELERY')\n\n# 从所有注册的\
    \ Django 应用配置中加载任务模块。\napp.autodiscover_tasks()\n```\n\n此配置将 Celery 应用程序绑定到 Django，使其能够发现并执行在任何\
    \ Django 应用组件中定义的任务。\n\n配置好 Celery 后，下一步涉及定义 Celery 将执行的任务。Celery 中的任务是一个 Python\
    \ 函数，用 Celery 的 `@task` 装饰器装饰，表示其作为异步任务的角色：\n\n```python\nfrom celery import shared_task\n\
    \n@shared_task\n```"
