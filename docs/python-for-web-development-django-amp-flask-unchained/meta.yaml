- md: "## Underpinning Django's Authorization Framework\n\nDjango’s authorization\
    \ system revolves around two key concepts: permissions and groups. Permissions\
    \ represent the specific actions that users are allowed to perform, while groups\
    \ serve as a mechanism for bundling these permissions and assigning them to users.\
    \ This dual-layered approach facilitates a streamlined and efficient management\
    \ of user authorizations.\n\n- 1. Permissions: Django associates permissions with\
    \ models. By default, Django automatically generates three permissions for each\
    \ model: add, change, and delete. These permissions can be leveraged to control\
    \ user access at a granular level, dictating what actions users can perform on\
    \ specific model instances.\n- 2. Groups: Django’s groups are collections of permissions.\
    \ Assigning a user to a group automatically grants them the permissions associated\
    \ with that group. This model simplifies permission management, especially in\
    \ applications with a large user base or complex permission structures.\n\n##\
    \ Crafting Custom Permissions\n\nWhile Django's default permissions cover many\
    \ use cases, the flexibility to define custom permissions opens a myriad of possibilities\
    \ for developers. Custom permissions can be specified in the Meta class of a model\
    \ and are particularly useful for defining application-specific actions beyond\
    \ CRUD operations (Create, Read, Update, and Delete).\n\n```python\n# models.py\n\
    \nfrom django.db import models\n\nclass Article(models.Model):\n    ...\n\n  \
    \  class Meta:\n        permissions = (\n            (\"publish_article\", \"\
    Can publish articles\"),\n            (\"edit_own_article\", \"Can edit own articles\"\
    ),\n        )\n```\n\n## Implementing Role-Based Access Control\n\nLeveraging\
    \ Django’s permissions and groups, developers can implement role-based access\
    \ control (RBAC) mechanisms. RBAC restricts system access to authorized users\
    \ based on their role within an organization or a project. This is achieved by\
    \ defining roles as groups and assigning the necessary permissions to these groups,\
    \ thereby encapsulating role-specific access rights in a maintainable and scalable\
    \ manner.\n\n## Integrating Permissions into Views\n\nDjango’s versatility shines\
    \ in how it allows permissions to be integrated into views. Developers can utilize\
    \ decorators and mixins to enforce permissions at the view level, ensuring that\
    \ only authorized users can execute certain actions.\n\n```python\n# views.py\n\
    \nfrom django.contrib.auth.decorators import permission_required\n\nfrom django.views.generic\
    \ import ListView\n\nfrom django.contrib.auth.mixins import PermissionRequiredMixin\n\
    \nfrom .models import Article\n\n@permission_required('news.add_article', raise_exception=True)\n\
    def create_article(request):\n    ...\n\nclass ArticleListView(PermissionRequiredMixin,\
    \ ListView):\n    model = Article\n    permission_required = 'news.view_article'\n\
    ```\n\n## Permissions in Practice: A User Story\n\nImagine a blogging platform\
    \ where users can draft articles, but only editors can publish them. Utilizing\
    \ Django's permissions system, developers can create a seamless workflow where\
    \ users can submit articles for review and editors, identified by their group\
    \ membership and associated permissions, have the exclusive ability to publish\
    \ these articles.\n\nPermissions and authorizations form the bedrock of secure\
    \ and efficient web application development. Through Django’s comprehensive system,\
    \ developers are equipped to construct complex yet manageable permission structures\
    \ that cater to the nuanced needs of modern web applications. By understanding\
    \ and implementing these concepts, developers ensure that users interact with\
    \ the application in a manner that is both intended and secure, paving the way\
    \ for robust web applications that stand the test of time and safeguard user interactions.\n\
    \n## CHAPTER 5: CREATING A WEB API WITH FLASK\n\nThe term REST, standing for Representational\
    \ State Transfer, was coined by Roy Fielding in his doctoral dissertation. It\
    \ delineates an architectural style that is resource-oriented, leveraging HTTP\
    \ protocols in a way that is stateless, scalable, and adheres to a client-server\
    \ model. The essence of REST is the manipulation of resources, each uniquely identified\
    \ using URIs and manipulated through standard HTTP methods.\n\n- 1. Statelessness:\
    \ RESTful architecture lies the principle of statelessness, meaning that each\
    \ request from client to server must contain all the information necessary to\
    \ understand and complete the request. No client context is stored on the server\
    \ between requests, which enhances scalability and reliability.\n- 2. Client-Server\
    \ Separation: This principle dictates that the client and the server should act\
    \ independently, allowing each to be developed, replaced, and scaled parallel\
    \ to each other, provided that the interfaces are not altered.\n- 3. Uniform Interface:\
    \ REST APIs are designed to have a uniform interface, simplifying the architecture\
    \ by decoupling the implementation and the services offered. This includes using\
    \ standard HTTP methods in a predictable way, enhancing scalability and performance.\n\
    \n## HTTP Verbs and Their Roles\n\nRESTful APIs leverage standard HTTP methods\
    \ to perform operations on resources. The primary verbs include:\n\n- GET: Fetches\
    \ a representation of the resource at the specified URI. It should have no side\
    \ effects, making it safe to call multiple times.\n- POST: Used to create a new\
    \ resource. It is also used for operations that do not fit into the standard CRUD\
    \ operations.\n- PUT: Updates a resource entirely through the provided representation.\n\
    - DELETE: Removes the resource at the specified URI.\n- PATCH: Applies partial\
    \ modifications to a resource.\n\n## Resource Representation\n\nResources in a\
    \ RESTful system are represented in formats that are easily consumable by clients,\
    \ including JSON (JavaScript Object Notation) and XML (Extensible Markup Language).\
    \ JSON, being lightweight and easily parsed by browsers, is the more commonly\
    \ used format in modern web applications.\n\n```json\n{\n  \"article\": {\n  \
    \  \"id\": \"1\",\n    \"title\": \"Introduction to RESTful APIs\",\n    \"author\"\
    : \"Jane Doe\",\n    \"content\": \"Exploring the principles of RESTful architecture...\"\
    \n  }\n}\n```\n\n## RESTful API in Action: A Practical Example\n\nImagine a scenario\
    \ where a mobile application fetches user profiles from a server. The server exposes\
    \ a RESTful API where each user profile is a resource identified by a unique URI.\
    \ The app retrieves a profile using a GET request to `https://api.example.com/users/janedoe`,\
    \ which responds with a JSON representation of Jane Doe's profile.\n\n## The Impact\
    \ of RESTful APIs\n\nRESTful APIs have revolutionized how systems communicate\
    \ over the web, promoting standards-based interoperability and simplifying the\
    \ development of web services. They enable the development of scalable, flexible,\
    \ and efficient web applications that can evolve over time without breaking existing\
    \ clients.\n\nThe introduction to RESTful APIs marks the beginning of understanding\
    \ how modern web applications communicate and operate. By adhering to the principles\
    \ of REST, developers can design systems that are not only scalable and robust\
    \ but also intuitive and straightforward to use. As we delve further into creating\
    \ and consuming RESTful APIs, it becomes evident how this architectural style\
    \ underpins the seamless operation of countless applications across the internet,\
    \ embodying the principles of simplicity, efficiency, and flexibility in web development.\n\
    \n## Decoupling and the Stateless Protocol"
  mdcn: "## Django 授权框架的基础\n\nDjango 的授权系统围绕两个核心概念展开：权限和组。权限代表用户被允许执行的具体操作，而组则是一种将这些权限打包并分配给用户的机制。这种双层结构简化了用户授权的管理，使其更加高效。\n\
    \n- 1. 权限：Django 将权限与模型关联。默认情况下，Django 会为每个模型自动生成三种权限：添加、修改和删除。这些权限可用于细粒度地控制用户访问，决定用户可以对特定模型实例执行哪些操作。\n\
    - 2. 组：Django 的组是权限的集合。将用户分配到某个组会自动授予其该组关联的权限。这种模型简化了权限管理，尤其适用于用户基数庞大或权限结构复杂的应用程序。\n\
    \n## 创建自定义权限\n\n虽然 Django 的默认权限涵盖了多种用例，但定义自定义权限的灵活性为开发者开启了无限可能。自定义权限可以在模型的 Meta\
    \ 类中指定，对于定义超出 CRUD 操作（创建、读取、更新、删除）的应用特定操作特别有用。\n\n```python\n# models.py\n\nfrom\
    \ django.db import models\n\nclass Article(models.Model):\n    ...\n\n    class\
    \ Meta:\n        permissions = (\n            (\"publish_article\", \"Can publish\
    \ articles\"),\n            (\"edit_own_article\", \"Can edit own articles\"),\n\
    \        )\n```\n\n## 实现基于角色的访问控制\n\n利用 Django 的权限和组，开发者可以实现基于角色的访问控制（RBAC）机制。RBAC\
    \ 根据用户在组织或项目中的角色来限制系统访问权限。这通过将角色定义为组，并为这些组分配必要的权限来实现，从而以可维护和可扩展的方式封装特定角色的访问权限。\n\
    \n## 将权限集成到视图中\n\nDjango 的多功能性体现在它允许将权限集成到视图中。开发者可以使用装饰器和混入类在视图级别强制执行权限，确保只有授权用户才能执行某些操作。\n\
    \n```python\n# views.py\n\nfrom django.contrib.auth.decorators import permission_required\n\
    \nfrom django.views.generic import ListView\n\nfrom django.contrib.auth.mixins\
    \ import PermissionRequiredMixin\n\nfrom .models import Article\n\n@permission_required('news.add_article',\
    \ raise_exception=True)\ndef create_article(request):\n    ...\n\nclass ArticleListView(PermissionRequiredMixin,\
    \ ListView):\n    model = Article\n    permission_required = 'news.view_article'\n\
    ```\n\n## 权限实践：一个用户故事\n\n想象一个博客平台，用户可以起草文章，但只有编辑才能发布它们。利用 Django 的权限系统，开发者可以创建一个无缝的工作流程：用户可以提交文章以供审核，而编辑（通过其组成员身份和关联权限来识别）则拥有发布这些文章的专属权限。\n\
    \n权限和授权构成了安全高效 Web 应用程序开发的基石。通过 Django 的综合系统，开发者能够构建复杂但易于管理的权限结构，以满足现代 Web 应用程序的细微需求。通过理解和实施这些概念，开发者确保用户以预期且安全的方式与应用程序交互，为经得起时间考验并保护用户交互的健壮\
    \ Web 应用程序铺平道路。\n\n## 第五章：使用 Flask 创建 Web API\n\n术语 REST，代表表述性状态转移，由 Roy Fielding\
    \ 在其博士论文中提出。它描述了一种以资源为中心的架构风格，利用 HTTP 协议实现无状态、可扩展且遵循客户端-服务器模型。REST 的核心是操作资源，每个资源使用\
    \ URI 唯一标识，并通过标准 HTTP 方法进行操作。\n\n- 1. 无状态性：RESTful 架构基于无状态原则，这意味着从客户端到服务器的每个请求都必须包含理解和完成该请求所需的所有信息。请求之间服务器不存储任何客户端上下文，这增强了可扩展性和可靠性。\n\
    - 2. 客户端-服务器分离：该原则规定客户端和服务器应独立运作，允许各自独立开发、替换和扩展，前提是接口不发生改变。\n- 3. 统一接口：REST API\
    \ 设计为具有统一接口，通过将实现与提供的服务解耦来简化架构。这包括以可预测的方式使用标准 HTTP 方法，从而提升可扩展性和性能。\n\n## HTTP\
    \ 动词及其作用\n\nRESTful API 利用标准 HTTP 方法对资源执行操作。主要动词包括：\n\n- GET：获取指定 URI 处资源的表述。它不应产生副作用，因此可以安全地多次调用。\n\
    - POST：用于创建新资源。也用于不符合标准 CRUD 操作的操作。\n- PUT：通过提供的表述完全更新资源。\n- DELETE：删除指定 URI 处的资源。\n\
    - PATCH：对资源进行部分修改。\n\n## 资源表述\n\nRESTful 系统中的资源以易于客户端消费的格式表示，包括 JSON（JavaScript\
    \ 对象表示法）和 XML（可扩展标记语言）。JSON 因其轻量级且易于被浏览器解析，是现代 Web 应用程序中更常用的格式。\n\n```json\n{\n\
