    managing, and storing data in an efficient way. Python includes several built-in
    data structures that are very powerful and simple to use.


    # 10. Lists


    Lists are mutable sequences, typically used to store collections of homogeneous
    items. Lists are created by placing all the items (elements) inside square brackets
    [], separated by commas.


    # 11. Tuples


    Tuples are immutable sequences, typically used to store collections of heterogeneous
    data. Tuples are created by placing all the items (elements) inside parentheses
    (), separated by commas.


    # 12. Dictionaries


    Dictionaries are mutable data types that store mappings of unique keys to values.
    Here, keys are used to access values within the dictionary. Dictionaries are created
    by placing a comma-separated list of key:value pairs within curly braces {}, e.g.,
    {''key'': ''value''}.


    # 13. Sets


    Sets are unordered collections of unique elements. They are mutable and are useful
    for performing mathematical operations like union, intersection, difference, and
    symmetric difference. Sets are created by placing all the items (elements) inside
    curly braces {}, separated by commas, or by using the set() function.


