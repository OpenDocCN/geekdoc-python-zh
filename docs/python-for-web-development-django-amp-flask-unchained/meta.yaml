    \ Your Flask Application\n\n1. **Create a Python file** (e.g., `app.py`) and import\
    \ Flask:\n\n```python\nfrom flask import Flask\napp = Flask(__name__)\n```\n\n\
    2. **Define a Route and View:**\n\n```python\n@app.route('/')\ndef home():\n \
    \   return 'Hello, World!'\n```\n\n### Step 3: Run Your Application\n\n1. **Run\
    \ the Flask application:**\n\n```\nflask run\n```\n\nOr:\n\n```\npython app.py\n\
    ```\n\n2. **Access your app** at `http://127.0.0.1:5000/`.\n\n### Step 4: Use\
    \ Templates\n\n1. **Create a `templates` directory** in the same directory as\
    \ your Flask application.\n2. **Add HTML files** to the `templates` directory.\n\
    3. **Modify your view** to render a template:\n\n```python\nfrom flask import\
    \ render_template\n\n@app.route('/')\ndef home():\n    return render_template('home.html')\n\
    ```\n\n### Step 5: Use Static Files\n\n1. **Create a `static` directory** for\
    \ CSS, JavaScript, and images.\n2. **Reference static files** in your templates\
    \ using the URL `/static/`.\n\n### Step 6: Explore Further\n\n- Add forms using\
    \ Flask-WTF.\n- Use Flask-SQLAlchemy for database models.\n- Implement authentication\
    \ with Flask-Login.\n- Deploy your Flask app using services like Heroku, DigitalOcean,\
    \ or AWS.\n\nBoth guides provide a basic roadmap for getting started with Django\
    \ and Flask. As you become more comfortable, you can explore each framework's\
    \ documentation and community resources to add more complexity and functionality\
    \ to your web applications."
  mdcn: "## 使用 Django 创建 Web 应用程序\n\n### 步骤 1：设置开发环境\n\n1.  **安装 Python：** 确保您的系统上已安装\
    \ Python。Django 支持 Python 3。\n2.  **安装 Django：** 使用 pip 安装 Django。\n\n```\npip\
    \ install django\n```\n\n### 步骤 2：启动 Django 项目\n\n1.  **创建项目：**\n\n```\ndjango-admin\
    \ startproject myproject\n```\n\n此命令会在当前目录下创建一个名为 `myproject` 的目录。\n\n2.  **进入项目目录：**\n\
    \n```\ncd myproject\n```\n\n### 步骤 3：启动 Django 应用\n\nDjango 项目由应用程序组成。一个应用就是一个能实现特定功能的\
    \ Web 应用程序，例如博客、公共记录数据库或一个简单的投票应用。\n\n1.  **创建应用：**\n\n```\npython manage.py startapp\
    \ myapp\n```\n\n### 步骤 4：定义模型\n\n1.  **编辑应用目录中的 `models.py` 文件**，以定义您的模型（例如，Post、Comment）。\n\
    2.  **运行迁移**以创建数据库模式：\n\n```\npython manage.py makemigrations\npython manage.py\
    \ migrate\n```\n\n### 步骤 5：创建视图\n\n1.  **编辑应用目录中的 `views.py` 文件**，以定义视图函数。您可以返回\
    \ HTML 文件或使用 Django 的模板系统。\n\n### 步骤 6：配置 URL\n\n1.  **编辑项目目录中的 `urls.py` 文件**，以包含您的应用\
    \ URL。\n2.  如果需要，**在应用目录中创建一个 `urls.py` 文件**，并包含应用特定的 URL 模式。\n\n### 步骤 7：创建模板\n\
    \n1.  **在应用目录内创建一个 `templates` 目录**。\n2.  **添加 HTML 模板文件**。使用 Django 的模板语言动态生成\
    \ HTML 内容。\n\n### 步骤 8：运行开发服务器\n\n1.  **启动服务器：**\n\n```\npython manage.py runserver\n\
    ```\n\n2.  在 Web 浏览器中访问 `http://127.0.0.1:8000/` 以查看您的应用程序。\n\n### 步骤 9：管理界面\n\
    \n1.  **创建管理员用户：**\n\n```\npython manage.py createsuperuser\n```\n\n2.  **登录管理站点**，地址为\
    \ `http://127.0.0.1:8000/admin`。\n\n### 步骤 10：后续步骤\n\n-   为您的应用添加更多功能。\n-   探索\
    \ Django 的身份验证、表单以及更复杂的模型和关系。\n-   使用 Heroku、DigitalOcean 或 AWS 等服务部署您的应用。\n\n\
    ## 使用 Flask 创建 Web 应用程序\n\n### 步骤 1：设置开发环境\n\n1.  **安装 Python**：确保已安装 Python。\n\
    2.  **安装 Flask**：使用 pip 安装 Flask。\n\n```\npip install flask\n```\n\n### 步骤 2：创建\
    \ Flask 应用程序\n\n1.  **创建一个 Python 文件**（例如 `app.py`）并导入 Flask：\n\n```python\nfrom\
    \ flask import Flask\napp = Flask(__name__)\n```\n\n2.  **定义路由和视图：**\n\n```python\n\
    @app.route('/')\ndef home():\n    return 'Hello, World!'\n```\n\n### 步骤 3：运行应用程序\n\
    \n1.  **运行 Flask 应用程序：**\n\n```\nflask run\n```\n\n或者：\n\n```\npython app.py\n\
    ```\n\n2.  **访问您的应用**，地址为 `http://127.0.0.1:5000/`。\n\n### 步骤 4：使用模板\n\n1.  **在\
    \ Flask 应用程序的同一目录下创建一个 `templates` 目录**。\n2.  **将 HTML 文件添加到 `templates` 目录**。\n\
    3.  **修改您的视图**以渲染模板：\n\n```python\nfrom flask import render_template\n\n@app.route('/')\n\
    def home():\n    return render_template('home.html')\n```\n\n### 步骤 5：使用静态文件\n\
    \n1.  **创建一个 `static` 目录**，用于存放 CSS、JavaScript 和图像。\n2.  **在模板中引用静态文件**，使用 URL\
    \ `/static/`。\n\n### 步骤 6：进一步探索\n\n-   使用 Flask-WTF 添加表单。\n-   使用 Flask-SQLAlchemy\
    \ 处理数据库模型。\n-   使用 Flask-Login 实现身份验证。\n-   使用 Heroku、DigitalOcean 或 AWS 等服务部署您的\
    \ Flask 应用。\n\n这两份指南为开始使用 Django 和 Flask 提供了基本的路线图。随着您越来越熟练，您可以探索每个框架的文档和社区资源，为您的\
    \ Web 应用程序添加更多的复杂性和功能。"
