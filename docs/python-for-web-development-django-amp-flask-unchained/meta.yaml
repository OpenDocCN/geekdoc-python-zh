    \n基于令牌的身份验证是一种方法，允许用户输入一次登录凭据，然后收到一个令牌作为回报。此令牌随后用于后续请求以验证用户。此系统的主要优点是它不需要服务器维护会话状态，使其特别适合可能跨多个服务器运行的可扩展应用程序。\n\
    \n要在 Flask 中实现基于令牌的身份验证，我们将使用 `itsdangerous` 库，Flask 本身也使用它来执行各种安全任务。`itsdangerous`\
    \ 擅长安全地签名数据——在我们的例子中，就是用于验证用户会话的令牌。\n\n首先，确保 `itsdangerous` 已安装在你的 Flask 环境中。如果没有，你可以轻松地使用\
    \ pip 添加它：\n\n```bash\npip install itsdangerous\n```\n\n以下代码片段演示了如何使用 `itsdangerous`\
