- md: '## KEY DJANGO PROGRAMMING CONCEPTS


    ### 1. MTV (Model-Template-View) Architecture


    - **Model:** The model is the definitive source of information about your data.
    It contains the essential fields and behaviors of the data you’re storing. Django
    follows the DRY Principle (Don''t Repeat Yourself), so the model defines the data
    structure once and automatically derives things from it.

    - **Template:** Django’s template layer provides a designer-friendly syntax for
    rendering the information to be presented to the user. It allows for a separation
    of presentation and business logic, which is beneficial for both developers and
    designers.

    - **View:** Views are responsible for processing user requests and returning responses.
    Views access the data through models and delegate the formatting of the output
    to the templates. In Django, a view can be a simple function or a class-based
    view.


    ### 2. ORM (Object-Relational Mapping)


    Django''s ORM allows for the definition of data models in Python, which are then
    automatically translated into database tables. This abstraction layer lets you
    interact with your database using high-level Python code instead of SQL, making
    database operations safer and more intuitive.


    ### 3. Migrations


    Migrations are Django''s way of allowing database schema changes (such as adding
    a field, deleting a model, etc.) without requiring SQL. Migrations are Python
    files that describe these changes in code, allowing them to be versioned and shared
    with other developers.


    ### 4. Admin Interface


    Django automatically generates a professional, production-ready admin interface
    for manipulating website data. This interface is dynamically created from the
    model definitions and provides a rapid development workflow for managing content.


    ### 5. URLs and URLconf


    Django lets you design URLs however you want, with no framework limitations. The
    URLconf maps URL patterns (described as regular expressions) to your view functions.
    This modular URL handling system allows for a clean URL scheme and SEO-friendly
    web applications.


    ### 6. Templates and Template Tags


    Templates are HTML files that allow Python-like expressions for inserting dynamic
    content. Template tags are Django’s way of adding functionality to templates,
    such as looping through lists, loading static files, or applying filters to variables.


    ### 7. Forms and ModelForms


    Django’s forms handle the task of rendering HTML forms and processing submitted
    data. ModelForms simplify the process by creating form fields automatically for
    the corresponding model, making it easier to create forms for data entry without
    repetitive code.


    ### 8. Authentication and Authorization


    Django comes with a built-in authentication system that handles user authentication,
    sessions, permissions, and user groups. It provides a way to associate users with
    content and to build permissions and authorization checks into your application.


    ### 9. Middleware


    Middleware are layers of logic that Django executes during request and response
    processing. They''re used for session management, user authentication, cross-site
    request forgery protection, content compression, and more.


    ### 10. Signals


    Signals allow certain pieces of code to be notified when actions occur elsewhere
    in the application. They are especially useful for decoupling apps and making
    them extensible.


    ### 11. Testing


    Django''s built-in test framework allows for writing unit tests that ensure your
    application''s code behaves as expected. It includes a test client for simulating
    requests and responses, allowing for comprehensive testing of views and interaction
    flows.


    ### 12. Security Features


    Django includes numerous security features that are enabled by default, protecting
    against SQL Injection, Cross-site Scripting (XSS), Cross-Site Request Forgery
    (CSRF), and more. Django''s security practices are constantly updated to address
    new vulnerabilities.


    ### 13. RESTful APIs with Django REST Framework


    While Django can handle creating simple APIs using its views and serializers,
    Django REST Framework (DRF) provides a more flexible toolkit for building web
    APIs, offering features like authentication policies, serialization, and customizable
    endpoints.


    ### 14. Asynchronous Support


    Starting with Django 3.1, the framework introduced support for asynchronous views,
    middleware, and tests, allowing developers to write async code for performance
    improvements in I/O-bound and high-latency operations.


    ### 15. Deployment


    Deploying a Django application involves more than just transferring code to a
    server. It includes setting up a web server like Apache or Nginx, configuring
    a WSGI server like Gunicorn, handling static and media files, and setting up a
    database.


    Understanding these concepts in detail can significantly enhance your ability
    to develop, deploy, and maintain web applications with Django, leveraging its
    full potential to create robust, scalable, and secure web solutions.


    ## KEY FLASK PROGRAMMING CONCEPTS


    Flask is a micro web framework written in Python. It is classified as a microframework
    because it does not require particular tools or libraries. It has no database
    abstraction layer, form validation, or any other components where pre-existing
    third-party libraries provide common functions. However, Flask supports extensions
    that can add application features as if they were implemented in Flask itself.
    Here''s a list of key Flask programming concepts essential for developers:


    ### 1. Routes and View Functions


    - **Routes**: In Flask, routes are used to map URLs to specific view functions.
    Each route specifies a URL pattern and the function that should be called when
    a request matches that pattern.

    - **View Functions**: These are Python functions that are associated with one
    or more route URLs. They receive request data, process it, and return responses
    to the client.


    ### 2. Templates


    - Flask uses the Jinja2 template engine to dynamically generate HTML pages. Templates
    allow you to separate the design from the Python code, making it easier to design
    an application''s user interface.


    ### 3. Web Server Gateway Interface (WSGI)


    - Flask applications are WSGI applications. WSGI is a specification for a universal
    interface between the web server and the web applications.


    ### 4. Request and Response Objects


    - Flask uses objects to represent HTTP requests and responses. The request object
    contains data about the current HTTP request, while the response object represents
    the HTTP response that a Flask view function returns.


    ### 5. Flask Extensions


    - Flask is designed to be extended. It allows the use of third-party extensions
    to add features such as database integration, form validation, upload handling,
    various open authentication technologies, etc.


    ### 6. Flask Application and Context Globals


    - **Application Context:** Contains information about the application itself and
    keeps track of the application-level data during a request, response cycle.

    - **Request Context:** Flask creates a context for each request, and cleans it
    up when the request finishes. The request context contains request-specific information,
    such as session and request data.


    ### 7. Sessions


    - Flask supports sessions, which allow for the storage of information specific
    to a user from one request to the next. This is implemented on top of cookies
    for you and signs the cookies cryptographically.


    ### 8. Blueprints


    - Blueprints are a way to organize a group of related views and other code. They
    make it possible to scale applications and reuse code across multiple projects
    by modularizing the application.


    ### 9. Error Handling


    - Flask allows you to handle errors and exceptions gracefully, providing a way
    to register error handlers that can render friendly error pages or return error
    messages when exceptions occur.


    ### 10. Testing


    - Flask provides a test client for your application, allowing you to simulate
    requests to your application and check the responses without running a server.


    ### 11. Environment Configuration


    - Flask allows for the configuration of the application''s environment through
    a configuration object or files. This is useful for setting up variables that
    differ between development, testing, and production environments.


    ### 12. URL Building


    - Flask provides a function, url_for(), which allows for the generation of URLs
    for a specific function, making it easy to change URLs in one place without having
    to go through all your templates and view functions to make changes.


    ### 13. Static Files


    - Flask automatically serves static files, such as images, CSS, and JavaScript,
    from a directory defined in your application. This is essential for adding styles
    and interactivity to your web applications.


    ### 14. Application Factory Pattern'
  mdcn: '## Django 核心编程概念


    ### 1. MTV（模型-模板-视图）架构


    - **模型：** 模型是数据信息的权威来源。它包含了你所存储数据的基本字段和行为。Django 遵循 DRY 原则（不要重复自己），因此模型只需定义一次数据结构，并自动从中派生出其他内容。

    - **模板：** Django 的模板层提供了一种对设计师友好的语法，用于渲染要呈现给用户的信息。它实现了表现层与业务逻辑的分离，这对开发者和设计师都有益处。

    - **视图：** 视图负责处理用户请求并返回响应。视图通过模型访问数据，并将输出的格式化工作委托给模板。在 Django 中，视图可以是一个简单的函数，也可以是基于类的视图。


    ### 2. ORM（对象关系映射）


    Django 的 ORM 允许在 Python 中定义数据模型，然后自动将其转换为数据库表。这个抽象层让你可以使用高级 Python 代码而不是 SQL 来与数据库交互，使数据库操作更安全、更直观。


    ### 3. 迁移


    迁移是 Django 允许在不使用 SQL 的情况下进行数据库模式更改（例如添加字段、删除模型等）的方式。迁移是 Python 文件，它们以代码形式描述这些更改，使其可以进行版本控制并与其他开发者共享。


    ### 4. 管理界面


    Django 自动生成一个专业的、可用于生产环境的管理界面，用于操作网站数据。该界面根据模型定义动态创建，为内容管理提供了快速的开发工作流。


    ### 5. URL 和 URLconf


    Django 允许你按照自己的意愿设计 URL，不受框架限制。URLconf 将 URL 模式（描述为正则表达式）映射到你的视图函数。这种模块化的 URL
    处理系统允许创建清晰的 URL 方案和对 SEO 友好的 Web 应用程序。


    ### 6. 模板和模板标签


    模板是 HTML 文件，允许使用类似 Python 的表达式来插入动态内容。模板标签是 Django 为模板添加功能的方式，例如循环遍历列表、加载静态文件或对变量应用过滤器。


    ### 7. 表单和 ModelForms


    Django 的表单处理渲染 HTML 表单和处理提交数据的任务。ModelForms 通过自动为相应模型创建表单字段来简化此过程，使得创建数据录入表单更加容易，无需编写重复代码。


    ### 8. 认证和授权


    Django 内置了一个认证系统，处理用户认证、会话、权限和用户组。它提供了一种将用户与内容关联起来的方法，并将权限和授权检查构建到你的应用程序中。


    ### 9. 中间件


    中间件是 Django 在请求和响应处理过程中执行的逻辑层。它们用于会话管理、用户认证、跨站请求伪造保护、内容压缩等。


    ### 10. 信号


    信号允许在应用程序其他地方发生操作时通知特定的代码片段。它们对于解耦应用程序并使其可扩展特别有用。


    ### 11. 测试


    Django 的内置测试框架允许编写单元测试，以确保你的应用程序代码按预期运行。它包括一个用于模拟请求和响应的测试客户端，允许对视图和交互流程进行全面测试。


    ### 12. 安全特性


    Django 包含许多默认启用的安全特性，可防止 SQL 注入、跨站脚本攻击（XSS）、跨站请求伪造（CSRF）等。Django 的安全实践会不断更新以应对新的漏洞。


    ### 13. 使用 Django REST Framework 构建 RESTful API


    虽然 Django 可以使用其视图和序列化器来创建简单的 API，但 Django REST Framework（DRF）提供了一个更灵活的工具包来构建 Web
    API，提供了认证策略、序列化和可自定义端点等功能。


    ### 14. 异步支持


    从 Django 3.1 开始，该框架引入了对异步视图、中间件和测试的支持，允许开发者编写异步代码，以提升 I/O 密集型和高延迟操作的性能。


    ### 15. 部署


    部署 Django 应用程序不仅仅是将代码传输到服务器。它包括设置像 Apache 或 Nginx 这样的 Web 服务器，配置像 Gunicorn 这样的
    WSGI 服务器，处理静态和媒体文件，以及设置数据库。


    深入理解这些概念可以显著增强你使用 Django 开发、部署和维护 Web 应用程序的能力，充分利用其全部潜力来创建健壮、可扩展且安全的 Web 解决方案。


    ## Flask 核心编程概念


    Flask 是一个用 Python 编写的微 Web 框架。它被归类为微框架，因为它不需要特定的工具或库。它没有数据库抽象层、表单验证或任何其他由现有第三方库提供通用功能的组件。然而，Flask
    支持扩展，这些扩展可以像在 Flask 内部实现一样为应用程序添加功能。以下是开发者必须掌握的关键 Flask 编程概念列表：


    ### 1. 路由和视图函数


    - **路由：** 在 Flask 中，路由用于将 URL 映射到特定的视图函数。每个路由指定一个 URL 模式以及当请求匹配该模式时应调用的函数。

    - **视图函数：** 这些是与一个或多个路由 URL 相关联的 Python 函数。它们接收请求数据，处理它，并向客户端返回响应。


    ### 2. 模板


    - Flask 使用 Jinja2 模板引擎来动态生成 HTML 页面。模板允许你将设计与 Python 代码分离，使得设计应用程序的用户界面更加容易。


    ### 3. Web 服务器网关接口（WSGI）


    - Flask 应用程序是 WSGI 应用程序。WSGI 是 Web 服务器和 Web 应用程序之间通用接口的规范。


    ### 4. 请求和响应对象


    - Flask 使用对象来表示 HTTP 请求和响应。request 对象包含有关当前 HTTP 请求的数据，而 response 对象表示 Flask 视图函数返回的
    HTTP 响应。


    ### 5. Flask 扩展


    - Flask 设计为可扩展的。它允许使用第三方扩展来添加功能，例如数据库集成、表单验证、上传处理、各种开放认证技术等。


    ### 6. Flask 应用和上下文全局变量


    - **应用上下文：** 包含有关应用程序本身的信息，并在请求-响应周期中跟踪应用程序级别的数据。

    - **请求上下文：** Flask 为每个请求创建一个上下文，并在请求完成时清理它。请求上下文包含特定于请求的信息，例如会话和请求数据。


    ### 7. 会话


    - Flask 支持会话，允许存储特定于用户的信息，从一个请求到下一个请求。这是在 cookie 之上实现的，并对 cookie 进行加密签名。


    ### 8. 蓝图


    - 蓝图是组织一组相关视图和其他代码的方式。它们通过模块化应用程序，使得扩展应用程序和在多个项目中重用代码成为可能。


    ### 9. 错误处理


    - Flask 允许你优雅地处理错误和异常，提供了一种注册错误处理程序的方法，这些处理程序可以在发生异常时呈现友好的错误页面或返回错误消息。


    ### 10. 测试


    - Flask 为你的应用程序提供了一个测试客户端，允许你模拟对应用程序的请求并检查响应，而无需运行服务器。


    ### 11. 环境配置


    - Flask 允许通过配置对象或文件来配置应用程序的环境。这对于设置在开发、测试和生产环境之间不同的变量非常有用。


    ### 12. URL 构建


    - Flask 提供了一个函数 `url_for()`，它允许为特定函数生成 URL，使得在一个地方更改 URL 变得容易，而无需遍历所有模板和视图函数进行更改。


    ### 13. 静态文件


    - Flask 自动从应用程序中定义的目录提供静态文件，例如图像、CSS 和 JavaScript。这对于为 Web 应用程序添加样式和交互性至关重要。


    ### 14. 应用工厂模式'
