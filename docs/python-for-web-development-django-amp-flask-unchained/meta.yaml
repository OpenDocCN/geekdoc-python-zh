    # Setting Up a New Project


    Before the actual project setup begins, a few preparatory steps are necessary.
    These steps ensure that your development environment is primed and ready to go.
    Confirm that Python is installed on your system, and it’s advisable to work within
    a virtual environment. Virtual environments in Python are a fundamental best practice,
    allowing you to manage dependencies for different projects separately. To create
    a virtual environment, navigate to your preferred project directory and execute:


    ```

    shell

    python -m venv myprojectenv

    ```


    Once created, activate the virtual environment:


    +   - On macOS and Linux:


    ```

    shell

    source myprojectenv/bin/activate

    ```


    +   - On Windows:


    ```

    shell

    myprojectenv\Scripts\activate

    ```'
