    \ import TimedJSONWebSignatureSerializer as Serializer\n\ndef generate_auth_token(user_id,\
    \ expiration=600):\n    s = Serializer(app.config['SECRET_KEY'], expires_in=expiration)\n\
    \    return s.dumps({'user_id': user_id}).decode('utf-8')\n\n@app.route('/api/token',\
