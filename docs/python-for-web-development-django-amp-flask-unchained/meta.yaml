  md: 'scalability, and user experience by reducing the load on servers and speeding
    up the response time.


    # Layered System


    REST allows for a layered system architecture where client cannot ordinarily tell
    whether it is connected directly to the end server, or to an intermediary along
    the way. Intermediary servers may improve system scalability by enabling load-balancing
    and by providing shared caches. Layers of the system might also enforce security
    policies.


    # Code on Demand (Optional)


    REST allows client functionality to be extended by downloading and executing code
    in the form of applets or scripts. This simplifies clients by reducing the number
    of features required to be pre-implemented. Serving code from servers to clients
    (where it is executed) can temporarily extend or customize the functionality of
    that client. However, this principle is optional and, when used, should be applied
    judiciously.


    Understanding these principles is crucial for developers aiming to leverage the
