    source myprojectenv/bin/activate\n```\n\n- 在 Windows 上：\n\n```shell\nmyprojectenv\\\
    Scripts\\activate\n```\n\n激活虚拟环境后，您就处于使用 pip（Python 的包安装程序）安装 Django 的理想位置。如果尚未安装，请在虚拟环境中安装\
    \ Django：\n\n```shell\npip install django\n```\n\n## 启动您的项目\n\n安装 Django 后，就为创建新项目做好了准备。此过程使用\
