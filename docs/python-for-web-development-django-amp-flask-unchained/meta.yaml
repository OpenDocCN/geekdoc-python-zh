    \   在 Windows 上：运行 `myvenv\\Scripts\\activate.bat` 来激活虚拟环境。\n    -   在 macOS 和\
    \ Linux 上：使用 `source myvenv/bin/activate` 来激活。\n\n激活后，终端提示符会修改以反映虚拟环境的名称，表明任何\
    \ Python 或 pip 命令现在都将在此隔离环境中运行。\n\n-   **停用虚拟环境：** 要退出虚拟环境，只需运行 `deactivate`。这将使你返回到全局\
    \ Python 上下文，终端提示符也会恢复到原始状态。\n\n虚拟环境激活后，通过 pip 安装的项目特定包将仅限于此环境。例如，执行 `pip install\
    \ Django==3.2` 会在虚拟环境内本地安装此特定版本的 Django，而不会影响全局的 Django 安装（如果存在）。\n\n为了跟踪项目的依赖关系，可以使用\
