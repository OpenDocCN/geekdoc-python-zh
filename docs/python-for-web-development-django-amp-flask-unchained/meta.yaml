    # CHAPTER 5: CREATING A WEB API WITH FLASK


    The term REST, standing for Representational State Transfer, was coined by Roy
    Fielding in his doctoral dissertation. It delineates an architectural style that
    is resource-oriented, leveraging HTTP protocols in a way that is stateless, scalable,
    and adheres to a client-server model. The essence of REST is the manipulation
    of resources, each uniquely identified using URIs and manipulated through standard
    HTTP methods.


    +   1. Statelessness: RESTful architecture lies the principle of statelessness,
    meaning that each request from client to server must contain all the information
    necessary to understand and complete the request. No client context is stored
    on the server between requests, which enhances scalability and reliability.


    2. Client-Server Separation: This principle dictates that the client and the server
    should act independently, allowing each to be developed, replaced, and scaled
    parallel to each other, provided that the interfaces are not altered.


    3. Uniform Interface: REST APIs are designed to have a uniform interface, simplifying
    the architecture by decoupling the implementation and the services offered. This
    includes using standard HTTP methods in a predictable way, enhancing scalability
    and performance.


    # HTTP Verbs and Their Roles'
