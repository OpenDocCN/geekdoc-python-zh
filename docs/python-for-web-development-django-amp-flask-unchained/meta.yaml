    \   return None  # 有效的令牌，但已过期\n    except BadSignature:\n        return None \
    \ # 无效的令牌\n    user_id = data['user_id']\n    return user_id\n```\n\n## 保护路由\n\
    \n设置好令牌生成和验证后，你现在可以通过检查有效令牌来保护你的 Flask 路由：\n\n```python\nfrom flask import g\n\
    \n@app.before_request\ndef before_request():\n    token = request.headers.get('Authorization')\n\
    \    if token:\n        token = token.replace('Bearer ', '', 1)\n        user_id\
    \ = verify_auth_token(token)\n        if user_id:\n            g.user = User.query.get(user_id)\n\
    \        else:\n            return jsonify({'error': 'Invalid or expired token'}),\
    \ 403\n```"
