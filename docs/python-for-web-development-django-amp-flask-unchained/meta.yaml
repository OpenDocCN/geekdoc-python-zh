  - '[PAGE 70]


    With Python ready, the next step involves creating a virtual environment. Virtual
    environments in Python are isolated spaces that allow you to manage dependencies
    for different projects separately. You can create a virtual environment using
    the following command in your terminal or command prompt:


    ```

    python -m venv flask_env

    ```


    Activate the virtual environment with:


    +   - On UNIX-like systems: `source flask_env/bin/activate`

    - On Windows: `.\flask_env\Scripts\activate`


    Now, with the virtual environment activated, install Flask using pip, Python''s
    package installer:


    ```

    pip install Flask

    ```


    # Crafting Your First Flask App


    With Flask installed, you''re now set to create your first application. Begin
    by creating a new file, `app.py`, in your project directory. Open this file in
    your favorite text editor or IDE, and let''s start coding.


    A Flask application is essentially a Python script. it requires the Flask library
    and a few lines of code to run. Here''s a simple example:'
  - "[PAGE 71]\n\n```\npython\nfrom flask import Flask\n\napp = Flask(__name__)\n\n\
    @app.route('/')\ndef home():\n    return 'Hello, World!'\n\nif __name__ == \"\
    __main__\":\n    app.run(debug=True)\n```\n\nThis script does a few things:\n\n\
    +   - It imports the Flask class.\n- An instance of the Flask class is created.\
    \ This instance is the WSGI application.\n- The `@app.route()` decorator is used\
    \ to tell Flask what URL should trigger our function.\n- The `home` function returns\
    \ the message \"Hello, World!\" which is displayed in the web browser.\n- Finally,\
    \ the `if __name__ == \"__main__\":` block ensures the web server starts only\
    \ if the script is executed directly."
