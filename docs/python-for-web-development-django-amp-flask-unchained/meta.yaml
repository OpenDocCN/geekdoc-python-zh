    # Underpinning Django''s Authorization Framework


    Django’s authorization system revolves around two key concepts: permissions and
    groups. Permissions represent the specific actions that users are allowed to perform,
    while groups serve as a mechanism for bundling these permissions and assigning
    them to users. This dual-layered approach facilitates a streamlined and efficient
    management of user authorizations.


    +   1. Permissions: Django associates permissions with models. By default, Django
    automatically generates three permissions for each model: add, change, and delete.
    These permissions can be leveraged to control user access at a granular level,
    dictating what actions users can perform on specific model instances.

    2. Groups: Django’s groups are collections of permissions. Assigning a user to
    a group automatically grants them the permissions associated with that group.
    This model simplifies permission management, especially in applications with a
    large user base or complex permission structures.


    # Crafting Custom Permissions


    While Django''s default permissions cover many use cases, the flexibility to define
    custom permissions opens a myriad of possibilities for developers.'
