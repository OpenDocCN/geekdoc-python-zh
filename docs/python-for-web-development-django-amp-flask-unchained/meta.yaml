    code. Unlike many other languages that use braces {} to indicate a block of code,
    Python''s indentation makes the code visually cleaner and enforces a readable
    style.

    - **Comments:** Comments are parts of the code ignored by the interpreter, used
    to explain the code. Single-line comments start with #, while multi-line comments
    can be enclosed in triple quotes (""" or '''''').

    - **Basic Command Structures:** This includes the way functions are defined, loops
    are initiated, and conditional statements are set up. Python''s simplicity in
    command structure makes it highly readable and understandable.


    # 2. Variables and Data Types


    Variables are used to store information that can be referenced and manipulated
    in a program. Python is dynamically typed, meaning you don''t need to declare
    the type of variable when you create one. Key data types include:


    +   - **Integers:** Whole numbers without a fractional part, e.g., 5.

    - **Floats:** Numbers that contain a decimal point or an exponential (E) to indicate
    a power of 10, e.g., 3.14 or 4.2E2.

    - **Strings:** A sequence of characters, e.g., "Hello, World!".'
