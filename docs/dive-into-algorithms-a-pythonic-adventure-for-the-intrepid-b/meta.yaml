    # # 2


    # ## ALGORITHMS IN HISTORY


    ![](img/b18963668ae80235fc04b8a482308844_35_0.png)


    Most people associate algorithms with computers. This is not unreasonable; computer
    operating systems use many sophisticated algorithms, and programming is well suited
    to implementing all sorts of algorithms precisely. But algorithms are more fundamental
    than the computer architecture we implement them on. As mentioned in Chapter 1,
    the word *algorithm* dates back about a millennium, and algorithms have been described
    in ancient records going back much further than that. Even outside of written
    records, there is abundant evidence for the use of complex algorithms in the ancient
    world—in, for example, their construction methods.


    This chapter presents several algorithms of antique provenance. They show great
    ingenuity and insight, especially considering that they had to be invented and
    verified without the aid of computers. We start by discussing'
  - '[PAGE 36]


    Russian peasant multiplication, a method for arithmetic that, despite the name,
    might be Egyptian and might not actually be associated with peasants. We continue
    by covering Euclid''s algorithm, an important "classic" algorithm for finding
    greatest common divisors. Finally, we cover an algorithm from Japan that generates
    magic squares.


    # Russian Peasant Multiplication


    Many people remember learning the multiplication table as a particularly painful
    part of their education. Young children ask their parents why learning the multiplication
    table is necessary, and parents usually respond that they can''t multiply without
    knowing it. How wrong they are. *Russian peasant multiplication (RPM)* is a method
    that enables people to multiply large numbers without knowing most of the multiplication
    table.


    RPM''s origins are unclear. An ancient Egyptian scroll called the Rhind papyrus
    contains a version of this algorithm, and some historians have proposed (mostly
    unconvincing) conjectures about how the method could have spread from ancient
    Egyptian scholars to the peasants of the vast Russian hinterlands. Regardless
    of the details of its history, RPM is an interesting algorithm.


    # *Doing RPM by Hand*


    Consider the task of multiplying 89 by 18. Russian peasant multiplication proceeds
    as follows. First, create two columns next to each other. The first column is
    called the *halving* column and starts with 89. The second column is the *doubling*
    column and starts with 18 (Table 2-1).


    **Table 2-1:** Halving/Doubling Table, Part 1


    | Halving | Doubling |

    |---------|----------|

    | 89 | 18 |


    We''ll fill out the halving column first. Each row of the halving column takes
    the previous entry and divides it by 2, ignoring the remainder. For example, 89
    divided by 2 is 44 remainder 1, so we write 44 in the second row of the halving
    column (Table 2-2).


    **Table 2-2:** Halving/Doubling Table, Part 2


    | Halving | Doubling |

    |---------|----------|

    | 89 | 18 |

    | 44 | |


    We continue dividing by 2 until we reach 1, dropping the remainder every time
    and writing the result in the next row. As we continue, we find'
  - '[PAGE 37]


    that 44 divided by 2 is 22, then half of that is 11, then half of that (dropping
    the remainder) is 5, then 2, then 1. After writing these in the halving column,
    we have Table 2-3.


    | Halving | Doubling |

    |---------|----------|

    | 89 | 18 |

    | 44 | |

    | 22 | |

    | 11 | |

    | 5 | |

    | 2 | |

    | 1 | |


    We''ve completed the halving column. As the name suggests, each entry in the doubling
    column will be double the previous entry. So since 18 × 2 is 36, 36 is the second
    entry in the doubling column (Table 2-4).


    | Halving | Doubling |

    |---------|----------|

    | 89 | 18 |

    | 44 | 36 |

    | 22 | |

    | 11 | |

    | 5 | |

    | 2 | |

    | 1 | |


    We continue to add entries to the doubling column by following the same rule:
    just double the previous entry. We do this until the doubling column has as many
    entries as the halving column (Table 2-5).


    | Halving | Doubling |

    |---------|----------|

    | 89 | 18 |

    | 44 | 36 |

    | 22 | 72 |

    | 11 | 144 |

    | 5 | 288 |

    | 2 | 576 |

    | 1 | 1,152 |'
  - '[PAGE 38]


    The next step is to cross out or remove every row in which the halving column
    contains an even number. The result is shown in Table 2-6.


    | Halving | Doubling |

    |---------|----------|

    | 89 | 18 |

    | 11 | 144 |

    | 5 | 288 |

    | 1 | 1,152 |


    The final step is to take the sum of the remaining entries in the doubling column.
    The result is 18 + 144 + 288 + 1,152 = 1,602. You can check with a calculator
    that this is correct: 89 × 18 = 1,602. We have accomplished multiplication through
    halving, doubling, and addition, all without needing to memorize most of the tedious
    multiplication table that young children so despise.


    To see why this method works, try rewriting the doubling column in terms of 18,
    the number we are trying to multiply (Table 2-7).


    | Halving | Doubling |

    |---------|----------|

    | 89 | 18 × 1 |

    | 44 | 18 × 2 |

    | 22 | 18 × 4 |

    | 11 | 18 × 8 |

    | 5 | 18 × 16 |

    | 2 | 18 × 32 |

    | 1 | 18 × 64 |


    The doubling column is now written in terms of 1, 2, 4, 8, and so on to 64. These
    are powers of 2, and we can also write them as 2⁰, 2¹, 2², and so on. When we
    take our final sum (adding together the doubling rows with odd entries in the
    halving column), we''re really finding this sum:


    18 × 2⁰ + 18 × 2³ + 18 × 2⁴ + 18 × 2⁶ = 18 × (2⁰ + 2³ + 2⁴ + 2⁶) = 18 × 89


    The fact that RPM works hinges on the fact that


    (2⁰ + 2³ + 2⁴ + 2⁶) = 89


    If you look closely enough at the halving column, you can get a sense for why
    the preceding equation is true. We can also write this column in terms of powers
    of 2 (Table 2-8). When we do so, it''s easier to start at the lowest entry and
    work upward. Remember that 2⁰ is 1 and 2¹ is 2. In every'
  - '[PAGE 39]


    row, we multiply by $2^1$, and in the rows where the halving number is odd, we
    also add $2^0$. You can see the expression start to resemble our equation more
    and more as you rise through the rows. By the time we reach the top of the table,
    we have an expression that simplifies to exactly $2^6 + 2^4 + 2^3 + 2^0$.


    | Halving | Doubling |

    |---------|----------|

    | $(2^5 + 2^3 + 2^2) \times 2^1 + 2^0 = 2^6 + 2^4 + 2^3 + 2^0$ | $18 \times 2^0$
    |

    | $(2^4 + 2^2 + 2^1) \times 2^1 = 2^5 + 2^3 + 2^2$ | $18 \times 2^1$ |

    | $(2^3 + 2^1 + 2^0) \times 2^1 = 2^4 + 2^2 + 2^1$ | $18 \times 2^2$ |

    | $(2^2 + 2^0) \times 2^1 + 2^0 = 2^3 + 2^1 + 2^0$ | $18 \times 2^3$ |

    | $2^1 \times 2^1 + 2^0 = 2^2 + 2^0$ | $18 \times 2^4$ |

    | $2^0 \times 2^1 = 2^1$ | $18 \times 2^5$ |

    | $2^0$ | $18 \times 2^6$ |


    If you number the rows of the halving column starting with the top row as row
    0, then 1, 2, and all the way to the bottom row as row 6, you can see that the
    rows with odd values in the halving column are rows 0, 3, 4, and 6. Now notice
    the crucial pattern: those row numbers are exactly the exponents in the expression
    for 89 that we found: $2^6 + 2^4 + 2^3 + 2^0$. This is not a coincidence; the
    way we constructed the halving column means that the odd entries will always have
    row numbers that are the exponents in a sum of powers of 2 equaling our original
    number. When we take a sum of the doubling entries with those indices, we''re
    summing up 18 multiplied by powers of 2 that sum to exactly 89, so we''ll get
    $89 \times 18$ as our result.


    The reason this works is that really, RPM is an algorithm within an algorithm.
    The halving column itself is an implementation of an algorithm that finds the
    sum of powers of 2 that equals the number at the top of the column. This sum of
    powers of 2 is also called the *binary expansion* of 89. Binary is an alternative
    way to write numbers using only 0s and 1s, and it has become extremely important
    in recent decades because computers store information in binary. We can write
    89 in binary as 1011001, with 1s in the zeroth, third, fourth, and sixth places
    (counting from the right), the same as the odd rows of the halving column, and
    also the same as the exponents in our equation. We can interpret the 1s and 0s
    in a binary representation as coefficients in a sum of powers of 2. For example,
    if we write 100, we interpret it in binary as


    $$1 \times 2^2 + 0 \times 2^1 + 0 \times 2^0$$


    or what we would usually write as 4. If we write 1001, we interpret it in binary
    as


    $$1 \times 2^3 + 0 \times 2^2 + 0 \times 2^1 + 1 \times 2^0$$'
