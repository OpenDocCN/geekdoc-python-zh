    # ## Random Number Generators


    So far we''ve taken chaos and found order within it. Mathematics is good at that,
    but in this section, we''ll consider a quite opposite goal: finding chaos in order.
    In other words, we''re going to look at how to algorithmically create randomness.


    There''s a constant need for random numbers. Video games depend on randomly selected
    numbers to keep gamers surprised by game characters'' positions and movements.
    Several of the most powerful machine learning methods (including random forests
    and neural networks) rely heavily on random selections to function properly. The
    same goes for powerful statistical methods, like bootstrapping, that use randomness
    to make a static dataset better resemble the chaotic world. Corporations and research
    scientists perform A/B tests that rely on randomly assigning subjects to conditions
    so that the conditions'' effects can be properly compared. The list goes on; there''s
    a huge, constant demand for randomness in most technological fields.


    # ### *The Possibility of Randomness*


    The only problem with the huge demand for random numbers is that we''re not quite
    certain that they actually exist. Some people believe that the universe is deterministic:
    that like colliding billiard balls, if something moves, its movement was caused
    by some other completely traceable movement, which was in turn caused by some
    other movement, and so on. If the universe behaved like billiard balls on a table,
    then by knowing the current state of every particle in the universe, we would
    be able to determine the complete past and future of the universe with certainty.
    If so, then any event—winning the lottery, running into a long-lost friend on
    the other side of the world, being hit by a meteor—is not actually random, as
    we might be tempted to think of it, but merely the fully predetermined consequence
    of the way the universe was set up around a dozen billion years ago. This would
    mean that there is no randomness, that we are stuck in a player piano''s melody
    and things appear random only because we don''t know enough about them.'
