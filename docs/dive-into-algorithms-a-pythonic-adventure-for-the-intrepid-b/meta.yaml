  md: 'Suppose that you read the first digitized sentence into Python and find that
    it''s a quote from G. K. Chesterton: "The one perfectly divine thing, the one
    glimpse of God''s paradise given on earth, is to fight a losing battle—and not
    lose it." You take this imperfectly digitized text and store it in a variable
    called text:


    ```

    text = "The oneperfectly divine thing, the oneglimpse of God''s paradisegiven
    on earth, is to fight a losingbattle - and notlose it."

    ```


    You''ll notice that this text is in English, and while the spelling of each word
    is correct, there are missing spaces throughout: oneperfectly should actually
    be one perfectly, paradisegiven should be paradise given, and so on. (Missing
    a space is uncommon for humans, but text recognition technology often makes this
    kind of mistake.) In order to do your job, you''ll have to insert spaces at the
    appropriate spots in this text. For a fluent English speaker, this task may not
    seem difficult to do manually. However, imagine that you need to do it quickly
    for millions of scanned pages—you will obviously need to write an algorithm that
    can do it for you.


    # Defining a Word List and Finding Words


    The first thing we will do is teach our algorithm some English words. This isn''t
    very hard: we can define a list called `word_list` and populate it with words.
    Let''s start with just a few words:


    ```

    word_list = [''The'',''one'',''perfectly'',''divine'']

    ```


    In this chapter, we''ll create and manipulate lists using list comprehensions,
    which you''ll probably like after you get used to them. The following is a very
    simple list comprehension that creates a copy of our `word_list`:


    ```

    word_list_copy = [word for word in word_list]

    ```


    You can see that the syntax for `word` in `word_list` is very similar to the syntax
    for a for loop. But we don''t need a colon or extra lines. In this case, the list
    comprehension is as simple as possible, just specifying that we want each word
    in `word_list` to be in our new list, `word_list_copy`. This may not be so useful,
    but we can concisely add logic to make it more useful. For example, if we want
    to find every word in our word list that contains the letter *n*, all it takes
    is the simple addition of an if statement:


    ```

    has_n = [word for word in word_list if ''n'' in word]

    ```


    We can run `print(has_n)` to see that the result is what we expect:


    ```

    [''one'', ''divine'']

    ```


    Later in the chapter, you''ll see more complex list comprehensions, including
    some that have nested loops. However, all of them follow the same basic pattern:
    a for loop specifying iteration, with optional if statements describing the logic
    of what we want to select for our final list output.'
