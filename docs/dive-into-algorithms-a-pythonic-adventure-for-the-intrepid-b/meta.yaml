    \ findnearest(cities,idx,nnitinerary):\n    point = cities[idx]\n    mindistance\
    \ = float('inf')\n    minidx = - 1\n    for j in range(0,len(cities)):\n     \
    \   distance = math.sqrt((point[0] - cities[j][0])**2 + (point[1] - cities[j][1])**2)\n\
