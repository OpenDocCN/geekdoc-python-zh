    # MAKE SENSE OF ALGORITHMS


    ![](img/b18963668ae80235fc04b8a482308844_248_0.png)


    *Dive Into Algorithms* is a wide-ranging, Python-based introduction to algorithms.
    You''ll explore many of the world''s most interesting algorithms for searching,
    sorting, and optimization; human-based algorithms that help us determine how to
    catch a baseball; advanced algorithms like those used in machine learning and
    artificial intelligence; and even algorithms used by ancient cultures to multiply
    numbers, find greatest common divisors, and generate magic squares.


    Learn how to:


    +   - Generate Voronoi diagrams for use in geometric applications

    - Use algorithms to build a simple chatbot, win at board games, and solve sudoku
    puzzles

    - Write code for gradient ascent and descent algorithms to find the maxima and
    minima of functions

    - Use simulated annealing to perform global optimization


    +   - Build a decision tree to predict happiness based on a person''s characteristics

    - Use algorithms to debug code, maximize revenue, and generate random numbers

    - Measure the efficiency and speed of algorithms


    You''ll also explore algorithms useful in pure mathematics and learn how mathematical
    ideas can improve algorithms.


    By working your way through this book, you''ll learn the nitty-gritty details
    of many of today''s most powerful algorithms, including how to code and implement
    them in Python 3, and how to measure and optimize their performance.


    # ABOUT THE AUTHOR


    Bradford Tuckfield, PhD, is a data scientist, a consultant, and the co-author
    of *Applied Unsupervised Learning with R*. His research has appeared in top academic
    journals in math, business management, and medicine. He has also written essays
    about culture for magazines and policy journals.


    ![](img/b18963668ae80235fc04b8a482308844_248_1.png)


    THE FINEST IN GEEK ENTERTAINMENT™


    www.nostarch.com


    > "I LIE FLAT."


    *This book uses a durable binding that won''t snap shut*


    ![](img/b18963668ae80235fc04b8a482308844_248_2.png)'
