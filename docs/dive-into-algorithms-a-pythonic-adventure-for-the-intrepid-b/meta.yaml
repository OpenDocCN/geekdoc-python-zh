  md: "If you think about a game that's in progress, like the game illustrated in\
    \ Figure 10-2, you'll realize that not every move is always possible. If a player\
    \ has already played a particular move during a game, no player can play that\
    \ same move again for the rest of the game. We'll need a way to remove all moves\
    \ that have already been played from the list of all possible moves, resulting\
    \ in a list of all possible moves remaining for any particular in-progress game.\
    \ This is easy enough:\n\n```\nfor move in allpossible:\n    if move in game:\n\
    \        allpossible.remove(move)\n```\n\nAs you can see, we iterate over every\
    \ move in our list of possible moves, and if it's already been played, we remove\
    \ it from our list. In the end, we have a list of only moves that are possible\
    \ in this particular game. You can run print(allpossible) to see all of these\
    \ moves and check that they're correct.\n\nNow that we have a list of every possible\
    \ move, we can construct the game tree. We'll record a game tree as a nested list\
    \ of moves. Remember that each move can be recorded as a list of ordered pairs,\
    \ like [(4,4),(4,3)], the first move in the left branch of Figure 10-3. If we\
    \ wanted to express a tree that consisted of only the top two moves in Figure\
    \ 10-3, we could write it as follows:\n\n```\nsimple_tree = [[(4,4),(4,3)],[(1,3),(2,3)]]\n\
    ```\n\nThis tree contains only two moves: the ones we're considering playing in\
    \ the current state of the game in Figure 10-3. If we want to include the opponent's\
    \ potential responses, we'll have to add another layer of nesting. We do this\
    \ by putting each move in a list together with its *children*, the moves that\
    \ branch out from the original move. Let's start by adding empty lists representing\
    \ a move's children:\n\n```\nsimple_tree_with_children = [[[(4,4),(4,3)],[]],[[(1,3),(2,3)],[]]]\n\
    ```\n\nTake a moment to make sure you see all the nesting we've done. Each move\
    \ is a list itself, as well as the first element of a list that will also contain\
    \ the list's children. Then, all of those lists together are stored in a master\
    \ list that is our full tree.\n\nWe can express the entire game tree from Figure\
    \ 10-3, including the opponent's responses, with this nested list structure:\n\
    \n```\nfull_tree = [[[[(4,4),(4,3)],[[(1,3),(2,3)],[(3,1),(4,1)]]],[[(1,3),(2,3)],[[(4,4),(4,3)],\\\
    [(3,1),(4,1)]]]]\n```\n\nThe square brackets quickly get unwieldy, but we need\
    \ the nested structure so we can correctly keep track of which moves are which\
    \ moves' children."
