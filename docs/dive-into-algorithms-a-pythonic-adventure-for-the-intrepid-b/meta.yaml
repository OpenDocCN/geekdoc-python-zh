  md: "For Rule 2, we can create an analogous function. Our Rule 2 function will take\
    \ x and n as arguments, just like Rule 1. But Rule 2 is by default finding the\
    \ entry below and to the right of x. So we will add an upleft argument that will\
    \ be True if we want to reverse the rule. The final rule is as follows:\n\n```\n\
    def rule2(x,n,upleft):\n    return((x + ((-1)**upleft))%n**2)\n```\n\nYou can\
    \ test this on the Luo Shu square, though there are only two pairs of entries\
    \ for which this doesn't run into the exception to Rule 2. For this exception,\
    \ we can write the following function:\n\n```\ndef rule3(x,n,upleft):\n    return((x\
    \ + ((-1)**upleft * (-n + 1)))%n**2)\n```\n\nThis rule needs to be followed only\
    \ when we're crossing the magic square's antidiagonal. We'll see later how to\
    \ determine whether or not we are crossing the antidiagonal.\n\nNow that we know\
    \ how to fill the five central squares, and we have a rule to fill out the remaining\
    \ squares based on knowledge of those central squares, we can fill out the rest\
    \ of the square.\n\n# Filling in the Rest of the Square\n\nOne way to fill in\
    \ the rest of the square is to \"walk\" randomly through it, using known entries\
    \ to fill in unknown entries. First, we'll determine the indices of our central\
    \ entry as follows:\n\n```\ncenter_i = math.floor(n/2)\ncenter_j = math.floor(n/2)\n\
    ```\n\nThen, we can randomly select a direction to \"walk,\" as follows:\n\n```\n\
    import random\nentry_i = center_i\nentry_j = center_j\nwhere_we_can_go = ['up_left','up_right','down_left','down_right']\n\
    where_to_go = random.choice(where_we_can_go)\n```\n\nHere, we've used Python's\
    \ random.choice() function, which does random selection from lists. It takes an\
    \ element from the set we specified (where_we_can_go), but it chooses at random\
    \ (or as close to random as it can get).\n\nAfter we've decided a direction to\
    \ travel, we can follow whichever rule corresponds to our direction of travel.\
    \ If we have chosen to go down_left or up_right, we'll follow Rule 1, choosing\
    \ the right arguments and indices as follows:\n\n```\nif(where_to_go == 'up_right'):\n\
    \    new_entry_i = entry_i - 1\n    new_entry_j = entry_j + 1\n    square[new_entry_i][new_entry_j]\
    \ = rule1(square[entry_i][entry_j],n,True)\n```"
