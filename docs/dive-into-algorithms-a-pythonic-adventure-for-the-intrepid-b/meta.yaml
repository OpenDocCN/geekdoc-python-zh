  md: 'In the case of insertion sort, when we look at our expression for the maximum
    number of steps required to perform the algorithm, we find that it''s a sum of
    two terms: one is a multiple of $n^2$, and the other is a multiple of $n$. As
    we just discussed, the term that is a multiple of $n$ will matter less and less
    as $n$ grows, and the $n^2$ term will come to be the only one that we are concerned
    with. So the worst case of insertion sort is that it is a $O(n^2)$ ("big O of
    $n^2$") algorithm.


    The quest for algorithm efficiency consists of seeking algorithms whose runtimes
    are big O of smaller and smaller functions. If we could find a way to alter insertion
    sort so that it is $O(n^{1.5})$ instead of $O(n^2)$, that would be a major breakthrough
    that would make a huge difference in runtimes for large values of $n$. We can
    use big O notation to talk not only about time but also about space. Some algorithms
    can gain speed by storing big datasets in memory. They might be big O of a small
    function for runtime but big O of a larger function for memory requirements. Depending
    on the circumstances, it may be wise to gain speed by eating up memory, or to
    free up memory by sacrificing speed. In this chapter, we''ll focus on gaining
    speed and designing algorithms to have runtimes that are big O of the smallest
    possible functions, without regard to memory requirements.


    After learning insertion sort and seeing that its runtime performance is $O(n^2)$,
    it''s natural to wonder what level of improvement we can reasonably hope for.
    Could we find some holy grail algorithm that could sort any possible list in fewer
    than 10 steps? No. Every sorting algorithm will require at least $n$ steps, because
    it will be necessary to consider each element of the list in turn, for each of
    the $n$ elements. So any sorting algorithm will be at least $O(n)$. We cannot
    do better than $O(n)$, but can we do better than insertion sort''s $O(n^2)$? We
    can. Next, we''ll consider an algorithm that''s known to be $O(n\log(n))$, a significant
    improvement over insertion sort.


    # ## Merge Sort


    *Merge sort* is an algorithm that''s much quicker than insertion sort. Just like
    insertion sort, merge sort contains two parts: a part that merges two lists and
    a part that repeatedly uses merging to accomplish the actual sorting. Let''s consider
    the merging itself before we consider the sorting.


    Suppose we have two filing cabinets that are both sorted individually but have
    never been compared to each other. We want to combine their contents into one
    final filing cabinet that is also completely sorted. We will call this task a
    *merge* of the two sorted filing cabinets. How should we approach this problem?


    Once again, it''s worthwhile to consider how we would do this with real filing
    cabinets before we open Python and start writing code. In this case, we can imagine
    having three filing cabinets in front of us: the two full, sorted filing cabinets
    whose files we want to merge, and a third, empty filing cabinet that we will insert
    files into and that will eventually contain all of the files from the original
    two cabinets. We can call our two original cabinets the "left" and "right" cabinets,
    imagining that they are placed on our left and right.'
