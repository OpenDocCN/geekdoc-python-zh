  md: "The mathematical rules of physics as we understand them are consistent with\
    \ a deterministic universe, but they are also consistent with a nondeterministic\
    \ universe in which randomness really does exist and, as some have put it, God\
    \ \"plays dice.\" They are also consistent with a \"many worlds\" scenario in\
    \ which every possible version of an event occurs, but in different universes\
    \ that are inaccessible from each other. All these interpretations of the laws\
    \ of physics are further complicated if we try to find a place for free will in\
    \ the cosmos. The interpretation of mathematical physics that we accept depends\
    \ not on our mathematical understanding but rather on our philosophical inclinations—any\
    \ position is acceptable mathematically.\n\nWhether or not the universe itself\
    \ contains randomness, your laptop doesn't—or at least it isn't supposed to. Computers\
    \ are meant to be our perfectly obedient servants and do only what we explicitly\
    \ command them to do, exactly when and how we command them to do it. To ask a\
    \ computer to run a video game, perform machine learning via a random forest,\
    \ or administer a randomized experiment is to ask a supposedly deterministic machine\
    \ to generate something nondeterministic: a random number. This is an impossible\
    \ request.\n\nSince a computer cannot deliver true randomness, we've designed\
    \ algorithms that can deliver the next-best thing: *pseudorandomness*. Pseudorandom\
    \ number generation algorithms are important for all the reasons that random numbers\
    \ are important. Since true randomness is impossible on a computer (and may be\
    \ impossible in the universe at large), pseudorandom number generation algorithms\
    \ must be designed with great care so that their outputs resemble true randomness\
    \ as closely as possible. The way we judge whether a pseudorandom number generation\
    \ algorithm truly resembles randomness depends on mathematical definitions and\
    \ theory that we'll explore soon.\n\nLet's start by looking at a simple pseudorandom\
    \ number generation algorithm and examine how much its outputs appear to resemble\
    \ randomness.\n\n# *Linear Congruential Generators*\n\nOne of the simplest examples\
    \ of a *pseudorandom number generator (PRNG)* is the *linear congruential generator\
    \ (LCG)*. To implement this algorithm, you'll have to choose three numbers, which\
    \ we'll call *n₁*, *n₂*, and *n₃*. The LCG starts with some natural number (like\
    \ 1) and then simply applies the following equation to get the next number:\n\n\
    *next* = (*previous* × *n₁* + *n₂*) *mod* *n₃*\n\nThis is the whole algorithm,\
    \ which you could say takes only one step. In Python, we'll write % instead of\
    \ *mod*, and we can write a full LCG function as in Listing 5-8.\n\n```\ndef next_random(previous,n1,n2,n3):\n\
    \    the_next = (previous * n1 + n2) % n3\n    return(the_next)\n```\n\n*Listing\
    \ 5-8: A linear congruential generator*"
