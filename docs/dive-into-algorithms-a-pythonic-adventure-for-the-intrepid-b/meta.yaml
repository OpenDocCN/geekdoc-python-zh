    This move could bring about either of two possible futures: we could be behind
    0-1 at the end of our tree, or we could be behind 0-2. If our opponent is playing
    well, they will want to maximize their own score, which is the same as minimizing
    our score. If our opponent wants to minimize our score, they''ll choose the move
    that will put us behind 0-2. By contrast, consider our other option, the left
    branch of Figure 10-5, whose possible futures we consider in Figure 10-6.


    ![](img/b18963668ae80235fc04b8a482308844_218_1.png)


    *Figure 10-6: No matter what the opponent''s choice, we expect the same outcome.*


    In this case, both of our opponent''s choices lead to a score of 1-1. Again assuming
    that our opponent will be acting to minimize our score, we say that this move
    leads to a future of the game being tied 1-1.


    Now we know what future will be brought about by the two moves. Figure 10-7 notes
    these futures in an updated version of Figure 10-4.


    Because we know exactly what future to expect from each of our two moves, we can
    do a maximization: the move that leads to the maximum, the best score, is the
