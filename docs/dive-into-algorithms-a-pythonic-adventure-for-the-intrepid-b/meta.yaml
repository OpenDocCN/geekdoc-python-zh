    = True)

    training_data = ess_shuffled.loc[0:37000,:]

    test_data = ess_shuffled.loc[37001:,:].reset_index(drop = True)

    ```


    In this snippet, we used the `numpy` module to shuffle the data—in other words,
    keeping all the data but moving the rows randomly. We'
