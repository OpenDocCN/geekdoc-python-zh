    # *Tuning Our Algorithm*


    As mentioned, simulated annealing is a sensitive process. The code we''ve introduced
    shows how to do it in a basic way, but we''ll want to make changes to the details
    in order to do better. This process of changing small details or parameters of
    an algorithm in order to get better performance without changing its main approach
    is often called *tuning*, and it can make big differences in difficult cases like
    this one.


    Our perturb() function makes a small change in the itinerary: it switches the
    place of two cities. But this isn''t the only possible way to perturb an itinerary.
    It''s hard to know in advance which perturbing methods will perform best, but
    we can always try a few.


    Another natural way to perturb an itinerary is to reverse some portion of it:
    take a subset of cities, and visit them in the opposite order. In Python, we can
    implement this reversal in one line. If we choose two cities in the itinerary,
    with indices small and big, the following snippet shows how to reverse the order
    of all the cities between them:


