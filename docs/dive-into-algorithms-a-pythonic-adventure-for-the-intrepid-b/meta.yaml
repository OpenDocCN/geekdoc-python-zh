    # Life of a Salesman


    The *traveling salesman problem* (*TSP*) is an extremely famous problem in computer
    science and combinatorics. Imagine that a traveling salesman wishes to visit a
    collection of many cities to peddle his wares. For any number of reasons—lost
    income opportunities, the cost of gas for his car, his head aching after a long
    journey (Figure 6-1)—it''s costly to travel between cities.


    ![](img/b18963668ae80235fc04b8a482308844_124_0.png)


    *Figure 6-1: A traveling salesman in Naples*'
  merge: -1
