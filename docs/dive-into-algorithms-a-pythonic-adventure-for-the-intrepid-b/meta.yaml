    # **More about Continued Fractions**


    The expressions just shown are called continued fractions. A *continued fraction*
    consists of sums and reciprocals nested in multiple layers. Continued fractions
    can be finite, like the one in Listing 5-1 that terminated after seven layers,
    or infinite, continuing forever without end like the one in'
