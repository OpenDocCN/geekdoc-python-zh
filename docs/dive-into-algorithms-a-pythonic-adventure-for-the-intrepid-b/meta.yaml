    # *Compressing and Communicating Phi*


    Phi''s exact value is surprisingly hard to express. I could say that it''s equal
    to 1.61803399 . . . . The ellipsis here is a way of cheating; it means that more
    numbers follow (an infinite number of numbers, in fact), but I haven''t told you
    what those numbers are, so you still don''t know the exact value of phi.


    For some numbers with infinite decimal expansions, a fraction can represent them
    exactly. For example, the number 0.11111 . . . is equal to 1/9—here, the fraction
    provides an easy way to express the exact value of an infinitely continued decimal.
    Even if you didn''t know the fractional representation, you could see the pattern
    of repeating 1s in 0.1111 . . . and thereby understand its exact value. Unfortunately,
    the golden ratio is what''s called an *irrational number*, meaning that there
    are no two integers *x* and *y* that enable us to say that phi is equal to *x/y*.
    Moreover, no one has yet been able to discern any pattern in its digits.


    We have an infinite decimal expansion with no clear pattern and no fractional
    representation. It may seem impossible to ever clearly express phi''s exact value.
    But if we learn more about phi, we can find a way to express it both exactly and
    concisely. One of the things we know about phi is that it''s the solution to this
    equation:


    $phi^2 - phi - 1 = 0$


    One way we might imagine expressing the exact value of phi would be to write "the
    solution to the equation written above this paragraph." This has the benefit of
    being concise and technically exact, but it means that we have to solve the equation
    somehow. That description also doesn''t tell us the 200th or 500th digit in phi''s
    expansion.


    If we divide our equation by phi, we get the following:


    $phi - 1 - \frac{1}{phi} = 0$


    And if we rearrange that equation, we get this:


