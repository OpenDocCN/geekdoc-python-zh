  md: "We can verify whether this is true more formally by taking the derivative of\
    \ the economists' revenue formula. A *derivative* is a measurement of the slope\
    \ of a tangent line, with large values denoting steepness and negative values\
    \ denoting downward motion. You can see an illustration of a derivative in Figure\
    \ 3-2: it's just a way to measure how quickly a function is growing or shrinking.\n\
    \n![](img/b18963668ae80235fc04b8a482308844_60_0.png)\n\n*Figure 3-2: To calculate\
    \ a derivative, we take a tangent line to a curve at a point and find its slope.*\n\
    \nWe can create a function in Python that specifies this derivative as follows:\n\
    \n```\npython\ndef revenue_derivative(tax):\n    return(100 * (1/(tax + 1) - 2\
    \ * (tax - 0.2)))\n```\n\nWe used four rules of calculus to derive that function.\
    \ First, we used the rule that the derivative of *log(x)* is 1/*x*. That's why\
    \ the derivative of *log(tax + 1)* is 1/(*tax* + 1). Another rule is that the\
    \ derivative of *x*² is 2*x*. That's why the derivative of (*tax* − 0.2)² is 2(*tax*\
    \ − 0.2). Two more rules are that the derivative of a constant number is always\
    \ 0, and the derivative of 100*f(x)* is 100 times the derivative of *f(x)*. If\
    \ you combine all these rules, you'll find that our tax-revenue function, 100(*log(tax\
    \ + 1)* − (*tax* − 0.2)² + 0.04), has a derivative equal to the following, as\
    \ described in the Python function:\n\n$$100\\left(\\left(\\frac{1}{tax + 1}\\\
    right) - 2(tax - 0.2)\\right)$$\n\nWe can check that the derivative is indeed\
    \ negative at the country's current taxation rate:\n\n```\npython\nprint(revenue_derivative(0.7))\n\
    ```\n\nThis gives us the output -41.17647.\n\nA negative derivative means that\
    \ an increase in tax rate leads to a decrease in revenue. By the same token, a\
    \ decrease in tax rate should lead to an increase in revenue. While we are not\
    \ yet sure of the precise tax rate corresponding to the maximum of the curve,\
    \ we can at least be sure that if we take a small step from where are in the direction\
    \ of decreased taxation, revenue should increase."
