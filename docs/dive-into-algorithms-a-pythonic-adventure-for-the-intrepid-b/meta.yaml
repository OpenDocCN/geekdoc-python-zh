    \ numbers can be done in multiple ways and is amenable to creative approaches.\
    \ Just because you've learned one algorithm for something doesn't mean that it's\
    \ the only, or the best, algorithm for the purpose—keep your mind open to new\
    \ and potentially better ways of doing things.\n\nRPM may be slow, but it requires\
    \ less memorization up front because it doesn't require knowledge of most of the\
    \ multiplication table. Sometimes it can be very useful to sacrifice a little\
    \ speed for the sake of low memory requirements, and this speed/memory tradeoff\
    \ is an important consideration in many situations where we're designing and implementing\
    \ algorithms.\n\nLike many of the best algorithms, RPM also brings into focus\
    \ relationships between apparently disparate ideas. Binary expansions may seem\
    \ like just a curiosity, of interest to transistor engineers but not useful to\
    \ a layperson or even a professional programmer. But RPM shows a deep connection\
    \ between the binary expansion of a number and a convenient way to multiply with\
    \ only minimal knowledge of the multiplication table. This is another reason to\
    \ always keep learning: you never know when some apparently useless factoid may\
    \ form the basis for a powerful algorithm.\n\n## Euclid's Algorithm\n\nThe ancient\
    \ Greeks gave many gifts to humanity. One of their greatest was theoretical geometry,\
    \ which was rigorously compiled by the great Euclid in his 13 books called the\
    \ *Elements*. Most of Euclid's mathematical writing is in a theorem/proof style,\
    \ in which a proposition is deduced logically from simpler assumptions. Some of\
    \ his work is also *constructive*, meaning that it provides a method for using\
    \ simple tools to draw or create a useful figure, like a square with a particular\
    \ area or a tangent to a curve. Though the word had not been coined yet, Euclid's\
    \ constructive methods were algorithms, and some of the ideas behind his algorithms\
    \ can still be useful today.\n\n### Doing Euclid's Algorithm by Hand\n\nEuclid's\
    \ most famous algorithm is commonly known as *Euclid's algorithm*, though it is\
    \ only one of many that he wrote about. Euclid's algorithm is a method for finding\
    \ the greatest common divisor of two numbers. It is simple and elegant and takes\
    \ only a few lines to implement in Python.\n\nWe begin with two natural (whole)\
    \ numbers: let's call them *a* and *b*. Let's say that *a* is larger than *b*\
    \ (if it's not, just rename *a* to *b* and rename *b* to *a*, and then *a* will\
    \ be larger). If we divide *a/b*, we'll get an integer quotient and an integer\
    \ remainder. Let's call the quotient *q₁*, and the remainder *c*. We can write\
    \ this as follows:\n\n$$a = q_1 \\times b + c$$\n\nFor example, if we say that\
    \ *a* = 105 and *b* = 33, we find that 105/33 is 3, remainder 6. Notice that the\
    \ remainder *c* will always be smaller than both *a* and *b*—that's how remainders\
    \ work. The next step of the process is to forget about *a*, and focus on *b*\
    \ and *c*. Just like before, we say that *b* is larger than *c*. We then find\
    \ the quotient and remainder when dividing *b/c*. If we say that *b/c* is *q₂*,\
    \ with remainder *d*, we can write our result as follows:\n\n$$b = q_2 \\times\
    \ c + d$$\n\nAgain, *d* will be smaller than both *b* and *c*, since it's a remainder.\
    \ If you look at our two equations here, you can start to see a pattern: we're\
    \ working our way through the alphabet, shifting terms to the left every time.\
    \ We started with *a*, *b*, and *c*, and then we had *b*, *c*, and *d*. You can\
    \ see this pattern continue in our next step, in which we divide *c/d*, and call\
    \ the quotient *q₃* and the remainder *e*.\n\n$$c = q_3 \\times d + e$$\n\nWe\
    \ can continue this process, proceeding as far as we need through the alphabet,\
    \ until the remainder is equal to zero. Remember that remainders are always smaller\
    \ than the numbers that were divided to get them, so *c* is smaller than *a* and\
    \ *b*, *d* is smaller than *b* and *c*, *e* is smaller than *c* and *d*, and so\
    \ on. This means that at every step, we're working with smaller and smaller integers,\
    \ so we must eventually get to zero. When we get a zero remainder, we stop the\
    \ process, and we know that the last nonzero remainder is the greatest common\
    \ divisor. For example, if we find that *e* is zero, then *d* is the greatest\
    \ common divisor of our original two numbers.\n\n## Implementing Euclid's Algorithm\
    \ in Python\n\nWe can implement this algorithm in Python quite easily, as shown\
    \ in Listing 2-1.\n\n```python\ndef gcd(x,y):\n    larger = max(x,y)\n    smaller\
    \ = min(x,y)\n\n    remainder = larger % smaller\n\n    if(remainder == 0):\n\
    \        return(smaller)\n\n    if(remainder != 0):\n        return(gcd(smaller,remainder))\n\
    ```\n\n*Listing 2-1: Implementing Euclid's algorithm using recursion*\n\nThe first\
    \ thing to notice is that we don't need any of the *q₁*, *q₂*, *q₃* · · · quotients.\
    \ We need only the remainders, the successive letters of the alphabet. Remainders\
    \ are easy to get in Python: we can use the % operator from the previous section.\
    \ We can write a function that takes the remainder after division for any two\
    \ numbers. If the remainder is zero, then the greatest common divisor is the smaller\
    \ of the two inputs. If the remainder is not zero, we use the smaller of the two\
    \ inputs and the remainder as inputs into the same function."
