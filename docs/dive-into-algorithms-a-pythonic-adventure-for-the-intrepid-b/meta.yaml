    # ## Decision Trees


    Decision trees are diagrams that have a branching structure resembling a tree.
    We can use decision trees in the same way we use flowcharts—by answering yes/no
    questions, we are guided along a path that leads to a'
  - '[PAGE 188]


    final decision, prediction, or recommendation. The process of creating a decision
    tree that leads to optimal decisions is a paradigmatic example of a machine learning
    algorithm.


    Let''s consider a real-world scenario in which we might use decision trees. In
    emergency rooms, an important decision-maker must perform triage for every newly
    admitted patient. *Triage* simply means assigning priority: someone who is minutes
    from death but can be saved by a timely operation will be admitted to treatment
    immediately, whereas someone who has a paper cut or a mild case of sniffles will
    be asked to wait until more urgent cases can be cleared up.


    Triage is difficult because you have to make a reasonably accurate diagnosis with
    very little information or time. If a 50-year-old woman comes to the emergency
    room and complains of bad chest pain, the person in charge of triage has to decide
    whether her pain is more likely to be heartburn or a heart attack. The thought
    process of a person who makes triage decisions is necessarily complex. They''ll
    take into account a number of factors: the age and sex of the patient, whether
    they are obese or a smoker, the symptoms they report and the way they talk about
    them, the expression on their face, how busy the hospital is and what other patients
    are waiting for treatment, and factors that they may not even be consciously aware
    of. In order to become good at triage, a person has to learn many patterns.


    Understanding the way a triage professional makes a decision is not easy. Figure
    9-1 shows a hypothetical, totally made-up triage decision process (not meant as
    medical advice—don''t try this at home!).


    ![](img/b18963668ae80235fc04b8a482308844_188_0.png)


    *Figure 9-1: A simplified decision tree for heart attack triage*


    You can read this diagram from top to bottom. At the top, we can see that the
    heart-attack diagnosis process begins with a patient reporting chest pain. After
    that, the process branches out depending on the sex of the patient. If the patient
    is a man, the diagnosis process continues in the left branch and we determine
    whether he is obese. If the patient is a woman, the process continues in the right
    branch instead, and we determine whether she is a smoker. At each point in the
    process, we follow the appropriate branch until we reach the bottom of the tree,
    where we find the tree''s classification of whether the patient is at high risk
    or low risk for a heart attack. This binary branching process resembles a tree
    whose'
  - '[PAGE 189]


    trunk branches into smaller offshoots until reaching the ends of the farthest
    branches. Accordingly, the decision process illustrated in Figure 9-1 is called
    a decision tree.


    Every place you see text in Figure 9-1 is a *node* of the decision tree. A node
    like "Not obese" is known as a *branching node* because there''s at least one
    more branch to follow before we''re able to make a prediction. The "Not diabetic
    = Low risk" node is a *terminal node* because if we''ve arrived there, we don''t
    need to branch anymore and we know the decision tree''s final classification ("Low
    risk").


    If we could design a thorough, well-researched decision tree that always led to
    good triage decisions, it''s possible that someone without medical training could
    perform triage of heart attack patients, which would save every emergency room
    in the world plenty of money because they would no longer need to hire and train
    judicious, highly educated triage professionals. A sufficiently good decision
    tree could even make it possible to replace human triage professionals with robots,
    though whether that''s a good goal is debatable. A good decision tree may even
    lead to better decisions than the average human would make, since it could potentially
    eliminate the unconscious biases that we fallible humans possess. (And in fact,
    this has already happened: in 1996 and 2002, separate teams of researchers published
    papers about their success improving triage results for patients complaining of
    chest pain by using decision trees.)


    The branching decision steps described in a decision tree constitute an algorithm.
    Executing such an algorithm is very simple: just decide which of the two branches
    you should be on at every node, and follow the branches to the end. But don''t
    obey the suggestions of every decision tree you encounter. Remember that anyone
    can make a decision tree that prescribes any conceivable decision process, even
    if it leads to wrong decisions. The hard part of decision trees is not executing
    the decision tree algorithm but designing the decision tree so that it leads to
    the best possible decisions. Creating an optimal decision tree is an application
    of machine learning, though merely following a decision tree is not. Let''s discuss
    the algorithm that creates an optimal decision tree—an algorithm to generate an
    algorithm—and proceed through the steps of the process to generate an accurate
    decision tree.


    # ## Building a Decision Tree


    Let''s build a decision tree that uses information about a person to predict how
    happy they are. Finding the secret of happiness has preoccupied millions of people
    for millennia, and social science researchers today spill plenty of ink (and burn
    through plenty of research grants) pursuing the answers. If we had a decision
    tree that could use a few pieces of information and reliably predict how happy
    a person is, it would give us important clues about what determines a person''s
    happiness, and maybe even some ideas about how to achieve it ourselves. By the
    end of this chapter, you''ll know how to build such a decision tree.'
