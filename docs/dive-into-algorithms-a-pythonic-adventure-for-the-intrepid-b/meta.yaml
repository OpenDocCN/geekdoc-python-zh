    \ + *n* − 1，对*n*²取模。\n\n我们可以在 Python 中编写规则 1 的简单实现，定义一个以`x`和`n`为参数并返回`(x+n)%n**2`的函数：\n\
    \n```python\ndef rule1(x,n):\n    return((x + n)%n**2)\n```\n\n我们可以用洛书方阵的中心元素来测试这个函数。记住，洛书方阵是一个\
    \ 3×3 的方阵，因此*n* = 3。洛书方阵的中心元素是 5。该元素左下方的元素是 8，如果我们正确实现了`rule1()`函数，运行以下代码将得到 8：\n\
    \n```python\nprint(rule1(5,3))\n```\n\n你应该会在 Python 控制台中看到 8。我们的`rule1()`函数似乎按预期工作。然而，我们可以通过使其能够\"\
    反向\"运行来改进它——不仅能确定给定元素左下方的元素，还能确定右上方的元素（即除了从 5 到 8，还能从 8 到 5）。我们可以通过为函数添加一个参数来实现这一改进。我们将新参数命名为`upright`，它是一个`True`/`False`指示器，表示我们是否正在寻找`x`右上方的元素。如果不是，默认情况下我们将寻找`x`左下方的元素：\n\
    \n```python\ndef rule1(x,n,upright):\n    return((x + ((-1)**upright) * n)%n**2)\n\
    ```\n\n在数学表达式中，Python 会将`True`解释为 1，将`False`解释为 0。如果`upright`为`False`，由于(−1)⁰\
    \ = 1，我们的函数将返回与之前相同的值。如果`upright`为`True`，那么它将减去`n`而不是加上`n`，从而使我们能够朝另一个方向移动。让我们检查它是否能确定洛书方阵中\
    \ 1 的右上方的元素：\n\n```python\nprint(rule1(1,3,True))\n```\n\n它应该输出 7，这是洛书方阵中的正确值。\n\
    \n对于规则 2，我们可以创建一个类似的函数。我们的规则 2 函数将像规则 1 一样以 x 和 n 为参数。但规则 2 默认是寻找 x 右下方的元素。因此，我们将添加一个\
    \ upleft 参数，如果我们想要反转规则，该参数为 True。最终规则如下：\n\n```python\ndef rule2(x,n,upleft):\n\
    \    return((x + ((-1)**upleft))%n**2)\n```\n\n你可以在洛书方阵上测试这个函数，尽管只有两对元素不会遇到规则\
    \ 2 的例外情况。对于这个例外，我们可以编写以下函数：\n\n```python\ndef rule3(x,n,upleft):\n    return((x\
    \ + ((-1)**upleft * (-n + 1)))%n**2)\n```\n\n只有当我们跨越幻方的反对角线时，才需要遵循此规则。稍后我们将看到如何确定是否正在跨越反对角线。\n\
    \n现在我们知道如何填充五个中心方格，并且我们有一个基于这些中心方格的知识来填充剩余方格的规则，我们可以填充方阵的其余部分。\n\n## 填充方阵的其余部分\n\
    \n填充方阵其余部分的一种方法是随机\"游走\"遍历它，使用已知元素来填充未知元素。首先，我们按如下方式确定中心元素的索引：\n\n```python\n\
    center_i = math.floor(n/2)\ncenter_j = math.floor(n/2)\n```\n\n然后，我们可以随机选择一个方向进行\"\
