    \ If we say that *b/c* is *q₂*, with remainder *d*, we can write our result as\
    \ follows:\n\n$$b = q_2 \\times c + d$$\n\nAgain, *d* will be smaller than both\
    \ *b* and *c*, since it's a remainder. If you look at our two equations here,\
    \ you can start to see a pattern: we're working our way through the alphabet,\
    \ shifting terms to the left every time. We started with *a*, *b*, and *c*, and\
    \ then we had *b*, *c*, and *d*. You can see this pattern continue in our next\
    \ step, in which we divide *c/d*, and call the quotient *q₃* and the remainder\
    \ *e*.\n\n$$c = q_3 \\times d + e$$\n\nWe can continue this process, proceeding\
    \ as far as we need through the alphabet, until the remainder is equal to zero.\
    \ Remember that remainders are always smaller than the numbers that were divided\
    \ to get them, so *c* is smaller than *a* and *b*, *d* is smaller than *b* and\
    \ *c*, *e* is smaller than *c* and *d*, and so on. This means that at every step,\
    \ we're working with smaller and smaller integers, so we must eventually get to\
    \ zero. When we get a zero remainder, we stop the process, and we know that the\
    \ last nonzero remainder is the greatest common divisor. For example, if we find\
    \ that *e* is zero, then *d* is the greatest common divisor of our original two\
    \ numbers.\n\n# **Implementing Euclid's Algorithm in Python**\n\nWe can implement\
    \ this algorithm in Python quite easily, as shown in Listing 2-1.\n\n```\npython\n\
    def gcd(x,y):\n    larger = max(x,y)\n    smaller = min(x,y)\n\n    remainder\
    \ = larger % smaller\n\n    if(remainder == 0):\n        return(smaller)\n\n \
    \   if(remainder != 0):\n        return(gcd(smaller,remainder))\n```\n\n*Listing\
    \ 2-1: Implementing Euclid's algorithm using recursion*\n\nThe first thing to\
