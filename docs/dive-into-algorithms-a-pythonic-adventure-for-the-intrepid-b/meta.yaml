    # Linear Feedback Shift Registers


    LCGs are easy to implement but are not sophisticated enough for many applications
    of PRNGs; a savvy roulette player could crack an LCG in no time at all. Let''s
    look at a more advanced and reliable type of algorithm called *linear feedback
    shift registers* (*LFSRs*), which can serve as a jumping-off point for the advanced
    study of PRNG algorithms.


    LFSRs were designed with computer architecture in mind. At the lowest level, data
    in computers is stored as a series of 0s and 1s called *bits*. We can illustrate
    a potential string of 10 bits as shown in Figure 5-4.


    ![](img/b18963668ae80235fc04b8a482308844_119_0.png)


    *Figure 5-4: A string of 10 bits*


    After starting with these bits, we can proceed through a simple LFSR algorithm.
    We start by calculating a simple sum of a subset of the bits—for example, the
    sum of the 4th bit, 6th bit, 8th bit, and 10th bit (we could also choose other
    subsets). In this case, that sum is 3. Our computer architecture can only store
    0s and 1s, so we take our sum mod 2, and end up with 1 as our final sum. Then
    we remove our rightmost bit and shift every remaining bit one position to the
    right (Figure 5-5).


    ![](img/b18963668ae80235fc04b8a482308844_119_1.png)


    *Figure 5-5: Bits after removal and shifting*


    Since we removed a bit and shifted everything, we have an empty space where we
    should insert a new bit. The bit we insert here is the sum we calculated before.
    After that insertion, we have the new state of our bits (Figure 5-6).


    ![](img/b18963668ae80235fc04b8a482308844_119_2.png)


    *Figure 5-6: Bits after replacement with a sum of selected bits*'
