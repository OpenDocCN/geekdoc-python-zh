  md: "You can understand why the Babylonian algorithm works if you consider these\
    \ two simple cases:\n\n+   - **If y < √x**, then y² < x. So x/y² > 1 so x × x/y²\
    \ > x.\n\n  But notice that x × x/y² = x²/y² = (x/y)² = z². So z² > x. **This\
    \ means that z > √x**.\n\n+   - **If y > √x**, then y² > x. So x/y² < 1, so x\
    \ × x/y² < x.\n\n  But notice that x × x/y² = x²/y² = (x/y)² = z². So z² < x.\
    \ **This means that z < √x**.\n\nWe can write these cases more succinctly by removing\
    \ some text:\n\n+   - If y < √x, then z > √x.\n\n+   - If y > √x, then z < √x.\n\
    \nIf y is an underestimate for the correct value of √x, then z is an overestimate.\
    \ If y is an overestimate for the correct value of √x, then z is an underestimate.\
    \ Step 3 of the Babylonian algorithm asks us to average an overestimate and an\
    \ underestimate of the truth. The average of the underestimate and the overestimate\
    \ will be higher than the underestimate and lower than the overestimate, so it\
    \ will be closer to the truth than whichever of y or z was a worse guess. Eventually,\
    \ after many rounds of gradual improvement of our guesses, we arrive at the true\
    \ value of √x.\n\n# *Square Roots in Python*\n\nThe Babylonian algorithm is not\
    \ hard to implement in Python. We can define a function that takes x, y, and an\
    \ error_tolerance variable as its arguments. We create a while loop that runs\
    \ repeatedly until our error is sufficiently small. At each iteration of the while\
    \ loop, we calculate z, we update the value of y to be the average of y and z\
    \ (just like steps 2 and 3 in the algorithm describe), and we update our error,\
    \ which is y² − x. Listing 5-7 shows this function.\n\n```\npython\ndef square_root(x,y,error_tolerance):\n\
    \    our_error = error_tolerance * 2\n    while(our_error > error_tolerance):\n\
    \        z = x/y\n        y = (y + z)/2\n        our_error = y**2 - x\n    return\
    \ y\n```\n\n*Listing 5-7: A function to calculate square roots using the Babylonian\
    \ algorithm*\n\nYou may notice that the Babylonian algorithm shares some traits\
    \ with gradient ascent and the outfielder algorithm. All consist of taking small,\
    \ iterative steps until getting close enough to a final goal. This is a common\
    \ structure for algorithms.\n\nWe can check our square root function as follows:\n\
    \n```\npython\nprint(square_root(5,1,.00000000000001))\n```"
