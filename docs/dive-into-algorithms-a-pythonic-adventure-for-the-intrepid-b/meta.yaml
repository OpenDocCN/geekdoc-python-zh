    # From Delaunay to Voronoi


    Now that we''ve completed our DT generation algorithm, the Voronoi diagram generation
    algorithm is within our grasp. We can turn a set of points into a Voronoi diagram
    by following this algorithm:


    +   1. Find the DT of a set of points.

    2. Take the circumcenter of every triangle in the DT.

    3. Draw lines connecting the circumcenters of all triangles in the DT that share
    an edge.


    We already know how to do step 1 (we did it in the previous section), and we can
    accomplish step 2 withthe triangle_to_circumcenter() function. So the only thing
    we need is a code snippet that can accomplish step 3.


    The code we write for step 3 will live in our plotting function. Remember that
    we pass a set of triangles and circumcenters to that function as its inputs. Our
    code will need to create a collection of lines connecting circumcenters. But it
    will not connect all of the circumcenters, only those from triangles that share
    an edge.'
