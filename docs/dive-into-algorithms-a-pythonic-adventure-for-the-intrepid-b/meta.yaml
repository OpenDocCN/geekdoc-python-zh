    \ case, minimizing the cost is the same as minimizing the distance traveled.\n\
    \nTo determine the distance required by a particular itinerary, we need to define\
    \ two new functions. First, we need a function that will generate a collection\
    \ of lines that connect all of our points. After that, we need to sum up the distances\
