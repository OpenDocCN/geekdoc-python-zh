    \ record different answers: for Euclid's algorithm, we recorded the final nonzero\
    \ remainder as the final answer, and in the continued fraction generation algorithm,\
    \ we recorded every quotient (every letter of the alphabet) along the way. As\
    \ happens so often in math, we have found an unexpected connection—in this case,\
    \ between the generation of a continued fraction and the discovery of a greatest\
    \ common divisor.\n\nWe can implement this continued fraction generation algorithm\
    \ in Python as follows.\n\nWe'll assume that we're starting with a fraction of\
    \ the form *x/y*. First, we decide which of *x* and *y* is bigger and which is\
    \ smaller:\n\n```\n\nx = 105\ny = 33\nbig = max(x,y)\nsmall = min(x,y)\n```\n\n\
    Next, we'll take the quotient of the bigger divided by the smaller of the two,\
    \ just as we did with 105/33. When we found that the result was 3, remainder 6,\
    \ we concluded that 3 was the first term (*a*) in the continued fraction. We can\
    \ take this quotient and store the result as follows:\n\n```\n\nimport math\n\
    output = []\nquotient = math.floor(big/small)\noutput.append(quotient)\n```\n\n\
    In this case, we are ready to obtain a full alphabet of results (*a, b, c,* and\
    \ so on), so we create an empty list called `output` and append our first result\
    \ to it.\n\nFinally, we have to repeat the process, just as we did for 33/6. Remember\
    \ that 33 was previously the `small` variable, but now it's the `big` one, and\
    \ the remainder of our division process is the new `small` variable. Since the\
    \ remainder is always smaller than the divisor, `big` and `small` will always\
    \ be correctly labeled. We accomplish this switcheroo in Python as follows:\n\n\
    ```\n\nnew_small = big % small\nbig = small\nsmall = new_small\n```\n\nAt this\
    \ point, we have completed one round of the algorithm, and we need to repeat it\
    \ for our next set of numbers (33 and 6). In order to accomplish the process concisely,\
    \ we can put it all in a loop, as in Listing 5-4.\n\n```\n\nimport math\ndef continued_fraction(x,y,length_tolerance):\n\
    \    output = []\n    big = max(x,y)\n    small = min(x,y)\n```"
