  md: 'To take a step toward the revenue maximum, we should first specify a step size.
    We can store a prudently small step size in a variable in Python as follows:


    ```

    step_size = 0.001

    ```


    Next, we can take a step in the direction of the maximum by finding a new rate
    that is proportional to one step size away from our current rate, in the direction
    of the maximum:


    ```

    current_rate = current_rate + step_size * revenue_derivative(current_rate)

    ```


    Our process so far is that we start at our current tax rate and take a step toward
    the maximum whose size is proportional to the step_size we chose and whose direction
    is determined by the derivative of the tax-revenue function at the current rate.


    We can verify that after this step, the new current_rate is 0.6588235 (about a
    66 percent tax rate), and the revenue corresponding to this new rate is 33.55896.
    But while we have taken a step toward the maximum and increased the revenue, but
    we find ourselves in essentially the same situation as before: we are not yet
    at the maximum, but we know the derivative of the function and the general direction
    in which we should travel to get there. So we simply need to take another step,
    exactly as before but with the values representing the new rate. Yet again we
    set:


    ```

    current_rate = current_rate + step_size * revenue_derivative(current_rate)

    ```


    After running this again, we find that the new current_rate is 0.6273425, and
    the revenue corresponding to this new rate is 34.43267. We have taken another
    step in the right direction. But we are still not at the maximum revenue rate,
    and we will have to take another step to get closer.


    # *Turning the Steps into an Algorithm*


    You can see the pattern that is emerging. We''re following these steps repeatedly:


    +   1. Start with a current_rate and a step_size.

    2. Calculate the derivative of the function you are trying to maximize at the
    current_rate.

    3. Add step_size * revenue_derivative(current_rate) to the current rate, to get
    a new current_rate.

    4. Repeat steps 2 and 3.


    The only thing that''s missing is a rule for when to stop, a rule that triggers
    when we have reached the maximum. In practice, it''s quite likely that we''ll
    be *asymptotically* approaching the maximum: getting closer and closer to it but
    always remaining microscopically distant. So although we may never reach the maximum,
    we can get close enough that we match it up'
