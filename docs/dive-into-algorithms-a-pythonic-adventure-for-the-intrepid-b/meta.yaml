    # ## *Brains vs. Brawn*


    It might occur to you to make a list of every possible itinerary that can connect
    our cities and evaluate them one by one to see which is best. If we'
  merge: -1
  pgno: 128
- img_proc: true
  md: 'want to visit three cities, the following is an exhaustive list of every order
    in which they can be visited:


    +   - 1, 2, 3

    - 1, 3, 2

    - 2, 3, 1

    - 2, 1, 3

    - 3, 1, 2

    - 3, 2, 1


    It shouldn''t take long to evaluate which is best by measuring each of the lengths
    one by one and comparing what we find for each of them. This is called a *brute
    force* solution. It refers not to physical force, but to the effort of checking
    an exhaustive list by using the brawn of our CPUs rather than the brains of an
    algorithm designer, who could find a more elegant approach with a quicker runtime.


    Sometimes a brute force solution is exactly the right approach. They tend to be
    easy to write code for, and they work reliably. Their major weakness is their
    runtime, which is never better and usually much worse than algorithmic solutions.


    In the case of the TSP, the required runtime grows far too fast for a brute force
    solution to be practical for any number of cities higher than about 20. To see
    this, consider the following argument about how many possible itineraries there
    are to check if we are working with four cities and trying to find every possible
    order of visiting them:


    +   1. When we choose the first city to visit, we have four choices, since there
    are four cities and we haven''t visited any of them yet. So the total number of
    ways to choose the first city is 4.

    2. When we choose the second city to visit, we have three choices, since there
    are four cities total and we''ve already visited one of them. So the total number
    of ways to choose the first two cities is 4 × 3 = 12.

    3. When we choose the third city to visit, we have two choices, since there are
    four cities total and we''ve already visited two of them. So the total number
    of ways to choose the first three cities is 4 × 3 × 2 = 24.

    4. When we choose the fourth city to visit, we have one choice, since there are
    four cities total and we''ve already visited three of them. So the total number
    of ways to choose all four cities is 4 × 3 × 2 × 1 = 24.


    You should''ve noticed the pattern here: when we have *N* cities to visit, the
    total number of possible itineraries is N × (N–1) × (N–2) × . . . × 3 × 2 × 1,
    otherwise known as *N!* ("*N* factorial"). The factorial function grows incredibly
    fast: while 3! is only 6 (which we can brute force without even using a computer),
    we find that 10! is over 3 million (easy enough to brute force on a modern computer),
    and 18! is over 6 quadrillion, 25! is over 15 septillion,'
