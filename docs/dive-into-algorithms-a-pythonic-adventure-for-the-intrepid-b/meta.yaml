    There are a few workhorse algorithms we use in nearly every kind of program. Sometimes
    these algorithms are so fundamental that we take them for granted or don''t even
    realize our code is relying on them.


    Several methods for sorting and searching are among these fundamental algorithms.
    They''re worth knowing because they''re commonly used and beloved by algorithm
    enthusiasts (and the sadists who give coding interviews). The implementation of
