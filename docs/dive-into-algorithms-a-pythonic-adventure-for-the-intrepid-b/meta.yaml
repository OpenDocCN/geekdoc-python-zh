    \ Suppose that we have written some code that doesn't work, but we aren't sure\
    \ which part is faulty. We can use a binary search strategy to find the problem.\
    \ We split the code in half and run both halves separately. Whichever half doesn't\
    \ run properly is the half where the problem lies. Again, we split the problematic\
    \ part in half, and test each half to further narrow down the possibilities until\
    \ we find the offending line of code. A similar idea is implemented in the popular\
