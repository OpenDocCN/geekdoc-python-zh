  md: "Current game shown in Figure 10-2.\nI'm behind 0–1.\n\nI draw a line from (4,4)\
    \ to (4,3).\nWhat future does this lead to?\n**Answer:** the game will be tied\
    \ 1–1.\n\nI draw a line from (1,3) to (2,3).\nWhat future does this lead to?\n\
    **Answer:** I'll be behind 0–2.\n\n*Figure 10-7: Using Figures 10-5 and 10-6,\
    \ we can reason about the futures that each move will lead to and then compare\
    \ them.*\n\nThe reasoning process we just went through is known as the minimax\
    \ algorithm. Our decision in the present is about maximizing our score. But in\
    \ order to maximize our score, we have to consider all the ways that our opponent\
    \ will try to minimize our score. So the best choice is a maximum of minima.\n\
    \nNote that minimax goes through time in reverse. The game proceeds forward in\
    \ time, from the present to the future. But in a way, the minimax algorithm proceeds\
    \ backward in time, because we consider the scores of possible far futures first\
    \ and then work our way back to the present to find the current choice that will\
    \ lead to the best future. In the context of our game tree, the minimax code starts\
    \ at the top of the tree. It calls itself recursively on each of its child branches.\
    \ The child branches, in turn, call minimax recursively on their own child branches.\
    \ This recursive calling continues all the way to the terminal nodes, where, instead\
    \ of calling minimax again, we calculate the game score for each node. So we're\
    \ calculating the game score for the terminal nodes first; we're starting our\
    \ game score calculations in the far future. These scores are then passed back\
    \ to their parent nodes so that the parent nodes can calculate the best moves\
    \ and corresponding score for their part of the game. These scores and moves are\
    \ passed back up through the game tree until arriving back at the very top, the\
    \ parent node, which represents the present.\n\nListing 10-6 has a function that\
    \ accomplishes minimax.\n\n```\npython\nimport numpy as np\ndef minimax(max_or_min,tree):\n\
    \    allscores = []\n    for move_profile in tree:\n        if move_profile[2]\
    \ == []:\n            allscores.append(move_profile[1][0] - move_profile[1][1])\n\
    \        else:\n            move,score=minimax((-1) * max_or_min,move_profile[2])\n\
    \            allscores.append(score)\n    newlist = [score * max_or_min for score\
    \ in allscores]\n    bestscore = max(newlist)\n    bestmove = np.argmax(newlist)\n\
    \    return(bestmove,max_or_min * bestscore)\n```\n\n*Listing 10-6: A function\
    \ that uses minimax to find the best move in a game tree*"
