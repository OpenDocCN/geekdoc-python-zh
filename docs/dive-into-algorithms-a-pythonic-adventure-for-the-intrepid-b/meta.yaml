  - '[PAGE 5]


    # ## About the Author


    Bradford Tuckfield is a data scientist and writer. He runs a data science consulting
    firm called Kmbara (*https://kmbara.com/*) and a fiction website called Dreamtigers
    (*http://thedreamtigers.com/*).


    # ## About the Technical Reviewer


    Alok Malik is a data scientist based in New Delhi, India. He works on developing
    deep learning models in both natural language processing and computer vision with
    Python. He has developed and deployed solutions such as language models, image
    and text classifiers, language translators, speech-to-text models, named entity
    recognizers, and object detectors. He has also co-authored a book on machine learning.
    In his free time he likes to read about finance, do MOOCs, and play video games
    on his console.'
