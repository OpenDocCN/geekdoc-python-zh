    \ can write a function that will print it in a more readable way:\n\n```\ndef\
    \ printsquare(square):\n    labels = ['['+str(x)+']' for x in range(0,len(square))]\n\
    \    format_row = \"{:>6}\" * (len(labels) + 1)\n    print(format_row.format(\"\
    \", *labels))\n    for label, row in zip(labels, square):\n        print(format_row.format(label,\
    \ *row))\n```\n\nDon't worry about the details of the printsquare() function,\
    \ since it's only for pretty printing and not part of our algorithm. We can fill\
    \ in the central five squares with simple commands. First, we can get the indices\
    \ of the central entry as follows:\n\n```\nimport math\ncenter_i = math.floor(n/2)\n\
    center_j = math.floor(n/2)\n```\n\nThe central five squares can be populated according\
    \ to the expressions in Table 2-10 as follows:\n\n```\nsquare[center_i][center_j]\
    \ = int((n**2 +1)/2)\nsquare[center_i + 1][center_j] = 1\nsquare[center_i - 1][center_j]\
    \ = n**2\nsquare[center_i][center_j + 1] = n**2 + 1 - n\nsquare[center_i][center_j\
    \ - 1] = n\n```\n\n# Specifying the Three Rules\n\nThe purpose of Kurushima's\
    \ algorithm is to fill in the rest of the nan entries according to simple rules.\
    \ We can specify three simple rules that enable us to fill out every other entry,\
    \ no matter how big the magic square is. The first rule is expressed in Figure\
    \ 2-1.\n\n![](img/b18963668ae80235fc04b8a482308844_47_0.png)\n\n*Figure 2-1: Rule\
    \ 1 of Kurushima's algorithm*\n\nSo for any *x* in the magic square, we can determine\
    \ the entry that is situated in this diagonal relationship to *x* by simply adding\
    \ *n* and taking the result mod *n*² (mod refers to the modulo operation). Of\
    \ course, we can also go in the opposite direction by reversing the operation:\
    \ subtracting *n* and taking the result mod *n*²."
