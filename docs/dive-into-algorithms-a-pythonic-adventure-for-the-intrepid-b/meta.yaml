    algorithm speed and the special notation we use to compare algorithms'' efficiencies.


    We start by introducing insertion sort, a simple and intuitive sorting algorithm.
    We discuss the speed and efficiency of insertion sort and how to measure algorithm
    efficiency in general. Next, we look at merge sort, a faster algorithm that is
