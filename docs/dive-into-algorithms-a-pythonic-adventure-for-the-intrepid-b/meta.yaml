    # ## Measuring Time Precisely


    Since the time required for an algorithm to run is so important, we should be
    more precise than saying that insertion sort takes a "long time" or "less than
    a second." How long, exactly, does it take? For a literal answer, we can use the
    timeit module in Python. With timeit, we can create a timer that we start just
    before running our sorting code and end just afterward. When we check the difference
    between the starting time and the ending time, we find how long it took to run
    our code.


    ```

    python

    from timeit import default_timer as timer


    start = timer()

    cabinet = [8,4,6,1,2,5,3,7]

    sortedcabinet = insertion_sort(cabinet)

    end = timer()

    print(end - start)

    ```


    When I ran this code on my consumer-grade laptop, it ran in about 0.0017 seconds.
    This is a reasonable way to express how good insertion sort is—it can fully sort
    a list with eight items in 0.0017 seconds. If we want to compare insertion sort
    with any other sorting algorithm, we can compare the results of this timeit timing
    to see which is faster, and say the faster one is better.


    However, using these timings to compare algorithm performance has some problems.
