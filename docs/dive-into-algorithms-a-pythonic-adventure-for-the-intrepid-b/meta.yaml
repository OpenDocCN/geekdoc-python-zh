  md: "The final output of this code tells us that the number 8 is at position 7 in\
    \ our sorted_cabinet. This is correct (remember that the index of Python lists\
    \ starts at 0). This strategy of guessing in a way that eliminates half of the\
    \ remaining possibilities is useful in many domains. For example, it's the basis\
    \ for the most efficient strategy on average in the formerly popular board game\
    \ *Guess Who*. It's also the best way (in theory) to look words up in a large,\
    \ unfamiliar dictionary.\n\n# ## Applications of Binary Search\n\nBesides guessing\
    \ games and word lookups, binary search is used in a few other domains. For example,\
    \ we can use the idea of binary search when debugging code. Suppose that we have\
    \ written some code that doesn't work, but we aren't sure which part is faulty.\
    \ We can use a binary search strategy to find the problem. We split the code in\
    \ half and run both halves separately. Whichever half doesn't run properly is\
    \ the half where the problem lies. Again, we split the problematic part in half,\
    \ and test each half to further narrow down the possibilities until we find the\
    \ offending line of code. A similar idea is implemented in the popular code version-control\
    \ software Git as `git bisect` (although `git bisect` iterates through temporally\
    \ separated versions of the code rather than through lines in one version).\n\n\
    Another application of binary search is inverting a mathematical function. For\
    \ example, imagine that we have to write a function that can calculate the arcsin,\
    \ or inverse sine, of a given number. In only a few lines, we can write a function\
    \ that will call our `binarysearch()` function to get the right answer. To start,\
    \ we need to define a domain; these are the values that we will search through\
    \ to find a particular arcsin value. The sine function is periodic and takes on\
    \ all of its possible values between -pi/2 and pi/2, so numbers in between those\
    \ extremes will constitute our domain. Next, we calculate sine values for each\
    \ value in the domain. We call `binarysearch()` to find the position of the number\
    \ whose sine is the number we're looking for, and return the domain value with\
    \ the corresponding index, like so:\n\n```\npython\ndef inverse_sin(number):\n\
    \    domain = [x * math.pi/10000 - math.pi/2 for x in list(range(0,10000))]\n\
    \    the_range = [math.sin(x) for x in domain]\n    result = domain[binarysearch(the_range,number)]\n\
    \    return(result)\n```\n\nYou can run `inverse_sin(0.9)` and see that this function\
    \ returns the correct answer: about 1.12.\n\nThis is not the only way to invert\
    \ a function. Some functions can be inverted through algebraic manipulation. However,\
    \ algebraic function inversion can be difficult or even impossible for many functions.\
    \ The binary search method presented here, by contrast, can work for any function,\
    \ and with its *O(log(n))* runtime, it's also lightning fast."
