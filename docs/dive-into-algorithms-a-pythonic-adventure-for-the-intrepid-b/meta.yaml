    \ can iterate over every city in our itinerary, at each step adding a new line\
    \ to our lines collection that connects the current city and the city after it.\n\
    \n```\nfor j in range(0,len(itinerary) - 1):\n    lines.append([cities[itinerary[j]],cities[itinerary[j\
    \ + 1]]])\n```\n\nIf you run `print(lines)`, you can see how we're storing information\
