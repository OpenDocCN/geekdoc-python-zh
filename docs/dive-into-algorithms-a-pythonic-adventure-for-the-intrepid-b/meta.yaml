    *Listing 10-4: A function that creates a game tree of a specified depth*\n\nThis\
    \ function, **generate_tree()**, starts out by defining an empty list called tree.\
    \ Then, it iterates over every possible move. For each move, it creates a move_profile.\
    \ At first, the move_profile consists only of the move itself. But for branches\
