    \ still make improvements before we start using our model in a real scenario.\
    \ In such cases, before our model is ready to be deployed in real life, we'll\
    \ need to make improvements to it so that its error rate *on the test set* is\
    \ minimized.\n\n# **Improvements and Refinements**\n\nYou may find that you've\
    \ created a decision tree that has lower accuracy than you would like. For example,\
    \ you might have worse accuracy than you should because you're guilty of overfitting.\
    \ Many of the strategies for dealing with overfitting issues boil down to some\
    \ kind of simplification, since simple machine learning models are less likely\
    \ to suffer from overfitting than are complex models.\n\nThe first and easiest\
    \ way to simplify our decision tree models is to limit their maximum depth; since\
    \ depth is a variable that we can redefine in one short line, this is easy to\
    \ do. To determine the right depth, we have to check the error rates on out-of-sample\
    \ data for different depths. If the depth is too high, it's likely to cause high\
    \ error because of overfitting. If the depth is too low, it is likely to cause\
    \ high error because of *underfitting*. You can think of underfitting as something\
    \ like the mirror image of overfitting."
  - '[PAGE 204]


    Overfitting consists of attempting to learn from patterns that are arbitrary or
    irrelevant—in other words, learning "too much" from noise in our training data,
    like whether someone is wearing a green shirt. Underfitting consists of failing
    to learn enough—creating models that miss crucial patterns in the data, like whether
    someone is obese or uses tobacco.


    Overfitting tends to result from models that have too many variables or too much
    depth, whereas underfitting tends to result from models that have too few variables
    or too little depth. Just as with many situations in algorithm design, the right
    place to be is a happy medium between too high and too low. Choosing the right
    parameters for a machine learning model, including the depth of a decision tree,
    is often referred to as *tuning*, because fixing the tightness of a string on
    a guitar or violin also relies on finding a happy medium between a pitch that''s
    too high and one that''s too low.


    Another way to simplify our decision tree model is to do what''s called *pruning*.
    For this, we grow a decision tree to its full depth and then find branches that
    we can remove from the tree without increasing our error rate by much.


    Another refinement worth mentioning is using different measures to choose the
    right split point and the right splitting variable. In this chapter, we introduced
    the idea of using the classification error sum to decide where to put the split
    point; the right split point is one that minimizes our error sum. But there are
    other ways to decide on the right split point for a decision tree, including Gini
    impurity, entropy, information gain, and variance reduction. In practice, these
    other measures, especially Gini impurity and information gain, are almost always
    used rather than classification error rate, because some mathematical properties
    make them better in many cases. Experiment with different ways to choose a split
    point and splitting variable to find one that seems to perform the best for your
    data and your decision problem.


    Everything we do in machine learning is meant to enable us to make accurate predictions
    on new data. When you''re trying to improve a machine learning model, you can
    always judge whether an action is worthwhile by checking how much it improves
    your error rate on test data. And feel free to be creative to find improvements—anything
    that improves your error rate on test data is probably worth trying.


    # ## Random Forests


    Decision trees are useful and valuable, but they are not regarded as the best
    machine learning method by professionals. This is in part because of their reputation
    for overfitting and relatively high error rates, and in part because of the invention
    of a method called *random forests*, which has become popular recently and provides
    an unequivocal performance improvement over decision trees.


    As its name suggests, a random forest model consists of a collection of decision
    tree models. Each decision tree in the random forest depends on some randomization.
    Using randomization, we get a diverse forest with'
- md: ''
  mdcn: ''
  merge: -1
  raw:
  - '[PAGE 205]


    many trees instead of a forest that is just one tree repeated over and over. The
    randomization occurs in two places. First, the training dataset is randomized:
    each tree is built considering only a subset of the training set, which is randomly
    selected and will be different for every tree. (The test set is randomly selected
    at the beginning of the process, but it''s not rerandomized or reselected for
    every tree.) Second, the variables used to build the tree are randomized: only
    a subset of the full set of variables is used for each tree, and the subset could
    be different every time as well.


    After building a collection of these different, randomized trees, we have a whole
    random forest. To make a prediction about a particular observation, we have to
    find what each of these different decision trees predicts, and then take the average
    of the prediction for every individual decision tree. Since the decision trees
    are randomized in both their data and their variables, taking an average of all
    of them helps avoid the problem of overfitting and often leads to more accurate
    predictions.


    Our code in this chapter creates decision trees "from scratch," by directly manipulating
    datasets and lists and loops. When you work with decision trees and random forests
    in the future, you can rely on existing Python modules that do much of that heavy
    lifting for you. But don''t let these modules become a crutch: if you understand
    every step of these important algorithms well enough to code them from scratch
    yourself, you can be much more effective in your machine learning efforts.


