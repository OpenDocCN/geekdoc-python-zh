  md: '# # 1


    # PROBLEM-SOLVING WITH ALGORITHMS


    ![](img/b18963668ae80235fc04b8a482308844_23_0.png)


    The act of catching a ball is remarkable. A ball may start so far away that it
    seems only a speck on the horizon. It may be in the air for only a few short seconds
    or less. The ball will meet air resistance, wind, and of course, gravity, moving
    in something like a parabolic arc. And each time a ball is thrown, it is sent
    with a different force, at a different angle, and in a different environment with
    different conditions. So how is it that the moment a batter hits a baseball, an
    outfielder 300 feet away seems to immediately know where to run in order to catch
    it before it hits the ground?


    This question is called *the outfielder problem*, and it''s still being discussed
    in scholarly journals today. We''re starting with the outfielder problem because
    it has two very different solutions: an analytic solution and an algorithmic solution.
    Comparing these solutions will provide a vivid illustration of what an algorithm
    is and how it''s different from other approaches to problem-solving. Additionally,
    the outfielder problem will'
  merge: -1
  pgno: 23
- img_proc: true
  md: 'help us visualize a field that is occasionally abstract—you probably have some
    experience throwing and catching something, and this experience can help you understand
    the theory behind your practice.


    Before we can really understand how a human knows exactly where a ball will land,
    it will help to understand how a machine does it. We''ll start by looking at an
    analytic solution to the outfielder problem. This solution is mathematically precise
    and easy for computers to execute instantaneously, and some version of it is usually
    taught in introductory physics classes. It would enable a sufficiently agile robot
    to play outfield for a baseball team.


    However, humans can''t easily run analytic equations in their heads, and certainly
    not as quickly as computers can. A solution that''s better suited to human brains
    is an algorithmic solution, which we''ll use to explore what an algorithm is and
    what its strengths are compared to other problem-solving solutions. Moreover,
    the algorithmic solution will show us that algorithms are natural to human thought
    processes and don''t need to be intimidating. The outfielder problem is meant
    to introduce a new way to solve problems: the algorithmic approach.


    # ## The Analytic Approach


    To solve this problem analytically, we have to go back a few centuries to an early
    model of motion.


    # ### *The Galilean Model*


    The equations most commonly used to model a ball''s movement date back to Galileo,
    who centuries ago formulated polynomials that capture acceleration, speed, and
    distance. If we ignore wind and air resistance and assume the ball starts at ground
    level, Galileo''s model says that the horizontal position of a thrown ball at
    time *t* will be given by the formula


    $x = v_1 t$


    where *v₁* represents the starting speed of the ball in the *x* (horizontal) direction.
    Moreover, the height of a thrown ball (*y*), according to Galileo, can be calculated
    at time *t* as


    $y = v_2 t + \frac{at^2}{2}$


    where *v₂* represents the starting speed of the ball in the *y* (vertical) direction,
    and *a* represents the constant downward acceleration due to gravity (which will
    be about –9.81 if we are working in metric units). When we'
  merge: -1
  pgno: 24
- img_proc: true
