    *Cats, and Dogs*). The book''s cover shows a dog jumping to catch a Frisbee, with
    arrows tracing the respective trajectory vectors of the Frisbee and the dog, implying
    that the dog is able to perform the intricate calculations that would be required
    to make those vectors meet.


    The manifest ability of dogs to catch Frisbees and humans to catch baseballs seems
    to be a point in favor of the inner physicist theory. The subconscious is a mysterious
    and powerful thing, whose depths we have yet to fully plumb. So why couldn''t
    it solve some high school–level equations now and then? More pressingly, the inner
    physicist theory is difficult to refute because it''s hard to think of alternatives
    to it: if dogs can''t solve partial differential equations to catch Frisbees,
    then how do they catch them anyway? They take great leaps into the air and catch
    erratically moving Frisbees in their jaws like it''s nothing. If they aren''t
    solving some physics problem in their brains, then how else could they (and we)
    possibly know how to precisely intercept a ball?


    As recently as 1967, no one had a good answer. That year, the engineer Vannevar
    Bush wrote a book in which he described the scientific features of baseball as
    he understood them, and he was unable to provide any explanation for how outfielders
    know where to run to catch fly balls. Luckily for us, the physicist Seville Chapman
    read Bush''s book and was inspired to propose a theory of his own the very next
    year.


    # ## The Algorithmic Approach


    Chapman, true scientist that he was, was not satisfied with a mystical and unverified
    trust in the human subconscious, and he wanted a more concrete explanation for
