  md: '# # Becoming Better and Faster


    You can do more with algorithms than you could when you started the book. But
    every serious adventurer will also want to be able to do things better and faster.


    Many things can make you better at designing and implementing algorithms. Think
    about how each algorithm we implemented in this book relied on some understanding
    of a non-algorithmic topic. Our baseball-catching algorithm relies on an understanding
    of physics and even a little psychology. Russian peasant multiplication relies
    on an understanding of exponents and on deep properties of arithmetic, including
    binary notation. Chapter 7''s geometry algorithms rely on insights into how points,
    lines, and triangles relate and fit together. The deeper your understanding of
    the field you''re trying to write algorithms for, the easier it will be for you
    to design and implement algorithms. Thus, the way to get better at algorithms
    is easy: just understand everything perfectly.


    Another natural next step for a budding algorithmic adventurer is to polish and
    repolish your raw programming skills. Remember that Chapter 8 introduced list
    comprehensions as a Pythonic tool that enables us to write language algorithms
    that are concise and perform well. As you learn more programming languages and
    master their features, you''ll be able to write code that''s better organized,
    more compact, and more powerful. Even skilled programmers can benefit from going
    back to the basics and mastering fundamentals until they''re second nature. Many
    talented programmers write disorganized, badly documented, or inefficient code
    and think they can get away with it because it "works." But remember that code
    doesn''t usually succeed on its own—it is almost always part of a broader program,
    some team effort or grand business project that relies on cooperation between
    people and over time. Because of this, even soft skills like planning, oral and
    written communication, negotiation, and team management can improve your chances
    of success in the world of algorithms.


    If you enjoy creating perfectly optimal algorithms and pushing them to their highest
    efficiency, you''re in luck. For a huge number of computer science problems, there
    is no known efficient algorithm that runs much faster than brute force. In the
    next section, we sketch a few of these problems and discuss what''s so hard about
    them. If you, dear adventurer, create an algorithm that solves any of these problems
    quickly, you could have fame, fortune, and worldwide gratitude for the rest of
    your life. What are we waiting for? Let''s look at some of these challenges for
    the most courageous among us.


    # # Algorithms for the Ambitious


