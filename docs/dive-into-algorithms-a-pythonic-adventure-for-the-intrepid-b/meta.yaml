  md: "connect any two adjacent points in the lattice. The true game tree representing\
    \ this moment in our game would have many branches, one for each possible move\
    \ for each player. This is true at every level of the tree: not only do I have\
    \ many moves to choose from, but so does my opponent, and each of those moves\
    \ will have its own branch at every point in the tree where it's playable. Only\
    \ near the end of the game, when nearly all the line segments have already been\
    \ drawn, will the number of possible moves shrink to two and one. We didn't draw\
    \ every branch of the game tree in Figure 10-3, because there's not enough space\
    \ on the page—we only had space to include a couple of moves, just to illustrate\
    \ the idea of the game tree and our thought process.\n\nYou can imagine a game\
    \ tree extending to any possible depth—we should consider not only our move and\
    \ the opponent's response, but also our response to that response, and our opponent's\
    \ response to that response, and so on as far as we care to continue the tree-building.\n\
    \n# *Building Our Tree*\n\nThe game trees we're building here are different in\
    \ important ways from the decision trees of Chapter 9. The most important difference\
    \ is the goal: decision trees enable classifications and predictions based on\
    \ characteristics, while game trees simply describe every possible future. Since\
    \ the goal is different, so will be the way we build it. Remember that in Chapter\
    \ 9 we had to select a variable and a split point to decide every branch in the\
    \ tree. Here, knowing what branches will come next is easy, since there will be\
    \ exactly one branch for every possible move. All we need to do is generate a\
    \ list of every possible move in our game. We can do this with a couple of nested\
    \ loops that consider every possible connection between points in our lattice:\n\
    \n```\nallpossible = []\n\ngamesize = 5\n\nfor i in range(1,gamesize + 1):\n \
    \   for j in range(2,gamesize + 1):\n        allpossible.append([(i,j),(i,j -\
    \ 1)])\n\nfor i in range(1,gamesize):\n    for j in range(1,gamesize + 1):\n \
    \       allpossible.append([(i,j),(i + 1,j)])\n```\n\nThis snippet starts by defining\
    \ an empty list, called `allpossible`, and a `gamesize` variable, which is the\
    \ length of each side of our lattice. Then, we have two loops. The first is meant\
    \ to add vertical moves to our list of possible moves. Notice that for every possible\
    \ value of `i` and `j`, this first loop appends the move represented by `[(i,j),(i,j\
    \ - 1)]` to our list of possible moves. This will always be a vertical line. Our\
    \ second loop is similar, but for every possible combination of `i` and `j`, it\
    \ appends the horizontal move `[(i,j),(i + 1,j)]` to our list of possible moves.\
    \ At the end, our `allpossible` list will be populated with every possible move."
