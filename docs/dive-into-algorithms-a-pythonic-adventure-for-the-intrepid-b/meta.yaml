    \ definitely fails the roulette test.\n\n# The Diehard Tests for Randomness\n\n\
    There is no single silver-bullet test that indicates whether there's an exploitable\
    \ pattern in a PRNG. Researchers have devised many creative tests to evaluate\
    \ the extent to which a collection of random numbers is resistant to pattern detection\
    \ (or in other words can pass the roulette test). One collection of such tests\
    \ is called the *Diehard* tests. There are 12 Diehard tests, each of which evaluates\
    \ a collection of random numbers in a different way. Collections of numbers that\
    \ pass every Diehard test are deemed to have a very strong resemblance to true\
    \ randomness. One of the Diehard tests, called the *overlapping sums test*, takes\
    \ the entire list of random numbers and finds sums of sections of consecutive\
    \ numbers from the list. The collection of all these sums should follow the mathematical\
    \ pattern colloquially called a *bell curve*. We can implement a function that\
    \ generates a list of overlapping sums in Python as follows:\n\n```\ndef overlapping_sums(the_list,sum_length):\n\
    \    length_of_list = len(the_list)\n    the_list.extend(the_list)\n    output\
    \ = []\n    for n in range(0,length_of_list):\n        output.append(sum(the_list[n:(n\
    \ + sum_length)]))\n    return(output)\n```\n\nWe can run this test on a new random\
    \ list like so:\n\n```\nimport matplotlib.pyplot as plt\noverlap = overlapping_sums(list_random(211111,111112,300007),12)\n\
