- img_proc: true
  md: "![](img/b18963668ae80235fc04b8a482308844_49_0.png)\n\n*Figure 2-4: Rule 3 of\
    \ Kurushima's algorithm*\n\nThis rule is followed when we are crossing the antidiagonal.\
    \ If we cross from the bottom right to the top left, we can follow the inverse\
    \ of this rule, in which *x* is transformed to *x* + *n* − 1, mod *n*².\n\nWe\
    \ can write a simple implementation of Rule 1 in Python by defining a function\
    \ that takes `x` and `n` as its arguments and returns `(x+n)%n**2`:\n\n```\npython\n\
    def rule1(x,n):\n    return((x + n)%n**2)\n```\n\nWe can try this out with the\
    \ central entry in the Luo Shu square. Remember, the Luo Shu square is a 3×3 square\
    \ matrix, so *n* = 3. The central entry of the Luo Shu square is 5. The entry\
    \ below and to the left of this entry is 8, and if we have implemented our `rule1()`\
    \ function correctly we'll get an 8 when we run the following line:\n\n```\npython\n\
    print(rule1(5,3))\n```\n\nYou should see an 8 in the Python console. Our `rule1()`\
    \ function seems to work as intended. However, we could improve it by enabling\
    \ it to go \"in reverse,\" determining not only the entry on the bottom left of\
    \ a given entry, but also the entry to the top right (that is, being able to go\
    \ from 8 to 5 in addition to going from 5 to 8). We can make this improvement\
    \ by adding one more argument to the function. We'll call our new argument `upright`,\
    \ and it will be a `True`/`False` indicator of whether we're looking for the entry\
    \ up and to the right of `x`. If not, we will by default look for the entry to\
    \ the bottom left of `x`:\n\n```\npython\ndef rule1(x,n,upright):\n    return((x\
    \ + ((-1)**upright) * n)%n**2)\n```\n\nIn a mathematical expression, Python will\
    \ interpret `True` as 1 and `False` as 0. If `upright` is `False`, our function\
    \ will return the same value as before, since (−1)⁰ = 1. If `upright` is `True`,\
    \ then it will subtract `n` instead of adding `n`, which will enable us to go\
    \ in the other direction. Let's check whether it can determine the entry above\
    \ and to the right of 1 in the Luo Shu square:\n\n```\npython\nprint(rule1(1,3,True))\n\
    ```\n\nIt should print 7, the correct value in the Luo Shu square."
