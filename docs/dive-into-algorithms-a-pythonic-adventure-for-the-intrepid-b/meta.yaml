    necessarily conclude that *butterfly* was written in error, because *butterfly*
    is also a valid word. So we need to check not only for valid words that appear
    together without a space but also for valid words that, when mashed together without
    a space, do not together form another valid word. This means that in our text,
    we need to check whether oneperfectly is a word, whether paradisegiven is a word,
    and so on.


    In order to check this, we need to find all the spaces in our text. We can look
    at all the substrings between two consecutive spaces and call those potential
    words. If a potential word is not in our word list, then we''ll conclude that
    it''s invalid. We can check each invalid word to see whether it''s made up of
    a combination of two smaller words; if it is, we''ll conclude that there''s a
    missing space and add it back in, right between the two valid words that have
    combined to form the invalid word.


    # **Checking Between Existing Spaces for Potential Words**


    We can use `re.finditer()` again to find all the spaces in our text, which we''ll
    store in a variable called spacestarts. We''ll also add two more elements to our
    spacestarts variable: one to represent the location of the beginning of the text
    and one to represent the location of the end. This ensures that we find every
    potential word, since words at the very beginning and end will be the only words
    that are not between spaces. We also add a line that sorts the spacestarts list:


    ```

    python

    spacestarts = [m.start() for m in re.finditer('' '', text)]

    spacestarts.append(-1)

    spacestarts.append(len(text))

    spacestarts.sort()

    ```


    The list spacestarts records the locations of the spaces in our text. We got these
    locations by using a list comprehension and the `re.finditer()` tool. In this
    case, `re.finditer()` finds the location of every space in the text and stores
    it in a list, which refers to each individual element as `m`. For each of those
    `m` elements, which are spaces, we get the location where the space begins by
    using the `start()` function. We are looking for potential words between those
    spaces. It will be useful to have another list that records the locations of characters
    that come just after a space; these will be the locations of the first character
    of each potential word. We''ll call that list spacestarts_affine, since in technical
    terms, this new list is an affine transformation of the spacestarts list. *Affine*
    is often used to refer to linear transformations, such as adding 1 to each location,
    which we''ll do here. We''ll also sort this list:


    ```

