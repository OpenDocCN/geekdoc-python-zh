    have time to correct it. Thus, the last 10 seconds is when we should go directly
    up and not consider going down at all.


    By contrast, consider the first 10 seconds of our two-hour time period. During
    that time, there''s no need to rush directly upward. At the beginning, we can
    learn the most from going a little downward to explore. If we make a mistake in
    the first 10 seconds, there''s plenty of time to correct it later. We''ll have
    plenty of time to take advantage of anything we learn or any mountains we find.
    During the first 10 seconds, it pays to be the most open about going down and
    the least zealous about going directly up.


    You can understand the remainder of the two hours by thinking of the same ideas.
    If we consider the time 10 minutes before the end, we''ll have a more moderate
    version of the mindset we had 10 seconds before the end. Since the end is near,
    we''ll be motivated to go directly upward. However, 10 minutes is longer than
    10 seconds, so we have some small amount of openness to a little bit of downward
    exploration just in case we discover something promising. By the same token, the
    time 10 minutes after the beginning will lead us to a more moderate version of
    the mindset we had 10 seconds after the beginning. The full two-hour time period
    will have a gradient of intention: a willingness to sometimes go down at first,
    followed by a gradually strengthening zeal to go only up.


    In order to model this scenario in Python, we can define a function. We''ll start
    with a hot temperature and a willingness to explore and go downward, and we''ll
    end with a cool temperature and an unwillingness to go downward. Our temperature
    function is relatively simple. It takes t as an argument, where t stands for time:


    ```

    temperature = lambda t: 1/(t + 1)

    ```


    You can see a simple plot of the temperature function by running the following
    code in the Python console. This code starts by importing matplotlib functionality
    and then defines ts, a variable containing a range of t values between 1 and 100.
    Finally, it plots the temperature associated with each t value. Again, we''re
    not worried about units or exact magnitude here because this is a hypothetical
    situation meant to show the general shape of a cooling function. So we use 1 to
    represent our maximum temperature, 0 to represent our minimum temperature, 0 to
    represent our minimum time, and 99 to represent our maximum time, without specifying
    units.


    ```

    import matplotlib.pyplot as plt

    ts = list(range(0,100))

    plt.plot(ts, [temperature(t) for t in ts])

    plt.title(''The Temperature Function'')

    plt.xlabel(''Time'')

    plt.ylabel(''Temperature'')

    plt.show()

    ```'
