    `stop_words`, the words that we want to filter out because they''re not informative.
    In English, stop words include *the, and, of,* and other extremely common words.
    By specifying `stop_words = ''english''`, we''re telling our vectorizer to filter
    out the built-in set of English stop words and vectorize only less common, more
    informative words.'
