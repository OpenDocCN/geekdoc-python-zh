    随着球在飞行中前进，外野手视线的角度持续增大，外野手必须不断向后仰头直到接球。让我们将地面与外野手视线之间的角度称为*theta*。我们假设外野手站在球的最终落点处（*x*
    = 2）。回想高中几何课的内容，直角三角形中一个角的正切是该角对边长度与邻边长度（非斜边）的比值。在这种情况下，theta的正切是球的高度与其距外野手水平距离的比值。我们可以用以下Python代码绘制构成正切的两边：


    ```

    xs5 = [0.3,0.3]

    ys5 = [0,ball_trajectory(0.3)]

    xs6 = [0.3,2]

    ys6 = [0,0]

    plt.title(''The Trajectory of a Thrown Ball - Tangent Calculation'')

    plt.xlabel(''Horizontal Position of Ball'')

