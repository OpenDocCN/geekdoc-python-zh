  md: "You'll notice that the nans occupy alternating entries, like a checkerboard.\
    \ The reason for this is that the rules we have for moving diagonally give us\
    \ access to only about half of the total entries, depending on which entry we\
    \ started with. The valid moves are the same as in checkers: a piece that starts\
    \ on a dark square can move diagonally to other dark squares, but its diagonal\
    \ moving pattern will never allow it to move to any of the light squares. The\
    \ nan entries we see are inaccessible if we start on the central entry. We specified\
    \ `(n**2)/2 - 4` for our `howfull` argument instead of zero because we know that\
    \ we wouldn't be able to fill the matrix completely by calling our function only\
    \ once. But if we start again on one of the central entry's neighbors, we will\
    \ be able to access the rest of the nan entries in our \"checkerboard.\" Let's\
    \ call the `fillsquare()` function again, this time starting on a different entry\
    \ and specifying our fourth argument as zero, indicating that we want to completely\
    \ fill our square:\n\n```\nentry_i = math.floor(n/2) + 1\nentry_j = math.floor(n/2)\n\
    \nsquare = fillsquare(square,entry_i,entry_j,0)\n```\n\nIf we print our square\
    \ now, we can see that it is completely full:\n\n```\n>>> printsquare(square)\n\
    \      [0]  [1]  [2]  [3]  [4]  [5]  [6]\n [0]   22   47   16   41   10   35 \
    \   4\n [1]    5   23   48   17   42   11   29\n [2]   30    6   24    0   18\
    \   36   12\n [3]   13   31    7   25   43   19   37\n [4]   38   14   32    1\
    \   26   44   20\n [5]   21   39    8   33    2   27   45\n [6]   46   15   40\
    \    9   34    3   28\n```\n\nThere is just one final change we need to make.\
    \ Because of the rules of the `%` operator, our square contains consecutive integers\
    \ between 0 and 48, but Kurushima's algorithm is meant to fill our square with\
    \ the integers from 1 to 49. We can add one line that replaces 0 with 49 in our\
    \ square:\n\n```\nsquare=[[n**2 if x == 0 else x for x in row] for row in square]\n\
    ```\n\nNow our square is complete. We can verify that it is indeed a magic square\
    \ by using the `verifysquare()` function we created earlier:\n\n```\nverifysquare(square)\n\
    ```\n\nThis should return `True`, indicating that we've succeeded."
