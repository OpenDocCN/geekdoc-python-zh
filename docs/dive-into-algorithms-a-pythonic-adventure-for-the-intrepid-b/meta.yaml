    The final step is to take the sum of the remaining entries in the doubling column.
    The result is 18 + 144 + 288 + 1,152 = 1,602. You can check with a calculator
    that this is correct: 89 × 18 = 1,602. We have accomplished multiplication through
    halving, doubling, and addition, all without needing to memorize most of the tedious
    multiplication table that young children so despise.


    To see why this method works, try rewriting the doubling column in terms of 18,
    the number we are trying to multiply (Table 2-7).


    | Halving | Doubling |

    |---------|----------|

    | 89 | 18 × 1 |

    | 44 | 18 × 2 |

    | 22 | 18 × 4 |

    | 11 | 18 × 8 |

    | 5 | 18 × 16 |

    | 2 | 18 × 32 |

    | 1 | 18 × 64 |


    The doubling column is now written in terms of 1, 2, 4, 8, and so on to 64. These
    are powers of 2, and we can also write them as 2⁰, 2¹, 2², and so on. When we
    take our final sum (adding together the doubling rows with odd entries in the
    halving column), we''re really finding this sum:


    18 × 2⁰ + 18 × 2³ + 18 × 2⁴ + 18 × 2⁶ = 18 × (2⁰ + 2³ + 2⁴ + 2⁶) = 18 × 89


    The fact that RPM works hinges on the fact that


    (2⁰ + 2³ + 2⁴ + 2⁶) = 89


    If you look closely enough at the halving column, you can get a sense for why
    the preceding equation is true. We can also write this column in terms of powers
    of 2 (Table 2-8). When we do so, it''s easier to start at the lowest entry and
    work upward. Remember that 2⁰ is 1 and 2¹ is 2. In every'
