    # ## *Our Strategy*


    Our strategy for generating search suggestions is simple. When a user types in
    a search, we check how many words are in their search. In other words, a user
    enters an n-gram and we determine what *n* is. When a user searches for an n-gram,
    we are helping them add to their search, so we will want to suggest an *n* + 1-gram.
    We''ll search our corpus and find all *n* + 1-grams whose first *n* elements match
    our n-gram. For example, a user might search for crane, a 1-gram, and our corpus
    might contain the 2-grams crane feather, crane operator, and crane neck. Each
    is a potential search suggestion we could offer.


    We could stop there, providing every *n* + 1-gram whose first *n* elements matched
    the *n* + 1-gram the user had entered. However, not all suggestions are equally
    good. For example, if we are working for a custom engine that searches through
    manuals for industrial construction equipment, it''s likely that crane operator
    will be a more relevant, useful suggestion than crane feather. The simplest way
    to determine which *n* + 1-gram is the best suggestion is to offer the one that
    appears most often in our corpus.


    Thus, our full algorithm: a user searches for an n-gram, we find all *n* + 1-grams
    whose first *n* elements match the user''s n-gram, and we recommend the matching
    *n* + 1-gram that appears most frequently in the corpus.'
