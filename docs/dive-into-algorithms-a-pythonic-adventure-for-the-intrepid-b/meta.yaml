  md: 'complex variety and beauty of the world we observe. This may not be true for
    the universe, but it is certainly true for triangles. Starting with something
    that is extremely simple in hypothesis (the idea of a shape with three sides),
    we enter a world that is extremely rich in phenomena.


    # Finding the Circumcenter


    To begin to see the richness of the phenomena of the world of triangles, consider
    the following simple algorithm, which you can try with any triangle:


    +   1. Find the midpoint of each side of the triangle.

    2. Draw a line from each vertex of the triangle to the midpoint of the vertex''s
    opposite side.


    After you follow this algorithm, you will see something like Figure 7-5.


    ![](img/b18963668ae80235fc04b8a482308844_153_0.png)


    Remarkably, all the lines you drew meet in a single point that looks something
    like the "center" of the triangle. All three lines will meet at a single point
    no matter what triangle you start with. The point where they meet is commonly
    called the *centroid* of the triangle, and it''s always on the inside in a place
    that looks like it could be called the triangle''s center.


    Some shapes, like circles, always have one point that can unambiguously be called
    the shape''s center. But triangles aren''t like this: the centroid is one center-ish
    point, but there are other points that could also be considered centers. Consider
    this new algorithm for any triangle:


    +   1. Bisect each side of the triangle.

    2. Draw a line perpendicular to each side through the side''s midpoint.


    In this case, the lines do not typically go through the vertices like they did
    when we drew a centroid. Compare Figure 7-5 with Figure 7-6.'
