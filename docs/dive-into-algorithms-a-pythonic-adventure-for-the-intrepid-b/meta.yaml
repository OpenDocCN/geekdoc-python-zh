    of your hardware, the current load on your operating system (OS), the version
    of Python you''re running, the OS''s internal task schedulers, the efficiency
    of your code, and probably other chaotic vagaries of randomness and electron motion
    and the phases of the moon. Since we can get very different results in each timing
