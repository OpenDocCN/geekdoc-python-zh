  md: 'Listing 5-2. Continued fractions are especially useful for our purposes because
    they enable us to express the exact value of phi without needing to chop down
    an infinite forest to manufacture enough paper. In fact, mathematicians sometimes
    use an even more concise notation method that enables us to express a continued
    fraction in one simple line. Instead of writing all the fraction bars in a continued
    fraction, we can use square brackets ([ ]) to denote that we''re working with
    a continued fraction, and use a semicolon to separate the digit that''s "alone"
    from the digits that are together in a fraction. With this method, we can write
    the continued fraction for phi as the following:


    *phi* = [1; 1,1,1,1 . . .]


    In this case, the ellipses are no longer losing information, since the continued
    fraction for phi has a clear pattern: it''s all 1s, so we know its exact 100th
    or 1,000th element. This is one of those times when mathematics seems to deliver
    something miraculous to us: a way to concisely write down a number that we had
    thought was infinite, without pattern, and ineffable. But phi isn''t the only
    possible continued fraction. We could write another continued fraction as follows:


    *mysterynumber* = [2; 1,2,1,1,4,1,1,6,1,1,8, . . .]


    In this case, after the first few digits, we find a simple pattern: pairs of 1s
    alternate with increasing even numbers. The next values will be 1, 1, 10, 1, 1,
    12, and so on. We can write the beginning of this continued fraction in a more
    conventional style as


    ![](img/b18963668ae80235fc04b8a482308844_103_0.png)


    In fact, this mystery number is none other than our old friend *e*, the base of
    the natural logarithm! The constant *e*, just like phi and other irrational numbers,
    has an infinite decimal expansion with no apparent pattern and cannot be represented
    by a finite fraction, and it seems like it''s impossible to express its exact
    numeric value concisely. But by using the new concept of continued fractions and
    a new concise notation, we can write these apparently intractable numbers in one
    line. There are also several remarkable ways to use continued fractions to represent
    pi. This is a victory for data compression. It''s also a victory in the perennial
    battle between order and chaos: where we thought there was nothing but encroaching
    chaos dominating the numbers we love, we find that there was always a deep order
    beneath the surface.'
