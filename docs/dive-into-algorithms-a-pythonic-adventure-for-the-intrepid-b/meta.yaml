  md: "We take the bit we removed from the right side as the output of the algorithm,\
    \ the pseudorandom number that this algorithm is supposed to generate. And now\
    \ that we have a new set of 10 ordered bits, we can run a new round of the algorithm\
    \ and get a new pseudorandom bit just as before. We can repeat this process as\
    \ long as we'd like.\n\nIn Python, we can implement a feedback shift register\
    \ relatively simply. Instead of directly overwriting individual bits on the hard\
    \ drive, we will just create a list of bits like the following:\n\n```\nbits =\
    \ [1,1,1]\n```\n\nWe can define the sum of the bits in the specified locations\
    \ with one line. We store it in a variable called `xor_result`, because taking\
    \ a sum mod 2 is also called the *exclusive OR* or *XOR operation*. If you have\
    \ studied formal logic, you may have encountered XOR before—it has a logical definition\
    \ and an equivalent mathematical definition; here we will use the mathematical\
    \ definition. Since we are working with a short bit-string, we don't sum the 4th,\
    \ 6th, 8th, and 10th bits (since those don't exist), but instead sum the 2nd and\
    \ 3rd bits:\n\n```\nxor_result = (bits[1] + bits[2]) % 2\n```\n\nThen, we can\
    \ take out the rightmost element of the bits easily with Python's handy `pop()`\
    \ function, storing the result in a variable called `output`:\n\n```\noutput =\
    \ bits.pop()\n```\n\nWe can then insert our sum with the `insert()` function,\
    \ specifying position 0 since we want it to be on the left side of our list:\n\
    \n```\nbits.insert(0,xor_result)\n```\n\nNow let's put it all together into one\
    \ function that will return two outputs: a pseudorandom bit and a new state for\
    \ the bits series (Listing 5-9).\n\n```\ndef feedback_shift(bits):\n    xor_result\
    \ = (bits[1] + bits[2]) % 2\n    output = bits.pop()\n    bits.insert(0,xor_result)\n\
    \    return(bits,output)\n```\n\n*Listing 5-9: A function that implements an LFSR,\
    \ completing our goal for this section*\n\nJust as we did with the LCG, we can\
    \ create a function that will generate an entire list of our output bits:\n\n\
    ```\ndef feedback_shift_list(bits_this):\n    bits_output = [bits_this.copy()]\n\
    \    random_output = []\n    bits_next = bits_this.copy()\n```"
