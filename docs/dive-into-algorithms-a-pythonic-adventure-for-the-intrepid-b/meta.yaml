    or deviation from true randomness, in the PRNG governing our roulette wheel could
    be exploited by a sufficiently savvy gambler. Even if we are creating a PRNG for
    a purpose that has nothing to do with roulette, we can ask ourselves, "If I use
    this PRNG to govern a roulette application, would I lose all my money?" This intuitive
    "roulette test" is a reasonable criterion for judging how good any PRNG is. Our
    LCG might pass the roulette test if we never do more than 32 spins, but after
    that, a gambler could notice the repeating pattern of outputs and start to place
    bets with perfect accuracy. The short period of our LCG has caused it to fail
    the roulette test.


    Because of this, it helps to ensure that a PRNG has a long period. But in a case
    like a roulette wheel with only 32 slots, no deterministic algorithm can have
    a period longer than 32. That''s why we often judge a PRNG by whether it has a
    *full period* rather than a long period. Consider the PRNG that we get by generating
