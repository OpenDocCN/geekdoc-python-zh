    # *An Algorithm for Generating Continued Fractions*


    To find a continued fraction expansion for any number, we''ll use an algorithm.


    It''s easiest to find continued fraction expansions for numbers that are integer
    fractions already. For example, consider the task of finding a continued fraction
    representation of 105/33. Our goal is to express this number in a form that looks
    like the following:


    ![](img/b18963668ae80235fc04b8a482308844_104_0.png)


    where the ellipses could be referring to a finite rather than an infinite continuation.
    Our algorithm will generate *a* first, then *b*, then *c*, and proceed through
    terms of the alphabet sequentially until it reaches the final term or until we
    require it to stop.


    If we interpret our example 105/33 as a division problem instead of a fraction,
    we find that 105/33 is 3, remainder 6. We can rewrite 105/33 as 3 + 6/33:


    ![](img/b18963668ae80235fc04b8a482308844_104_1.png)


    The left and the right sides of this equation both consist of an integer (3 and
    *a*) and a fraction (6/33 and the rest of the right side). We conclude that the
    integer parts are equal, so *a* = 3. After this, we have to find a suitable *b*,
    *c*, and so on such that the whole fractional part of the expression will evaluate
    to 6/33.'
