    Now that you understand the ideas behind many fundamental algorithms, we can turn
    to more advanced ideas. In this chapter, we explore machine learning. *Machine
    learning* refers to a broad range of methods, but they all share the same goal:
    finding patterns in data and using them to make predictions. We''ll discuss a
