  md: 'The second rule is even simpler, and is expressed in Figure 2-2.


    ![](img/b18963668ae80235fc04b8a482308844_48_0.png)


    *Figure 2-2: Rule 2 of Kurushima''s algorithm*


    For any *x* in the magic square, the entry below and to the right of *x* is 1
    greater than *x*, mod *n*². This is a simple rule, but it has one important exception:
    this rule is not followed when we cross from the upper-left half of the magic
    square to the lower-right half of the square. Another way to say this is that
    we do not follow the second rule if we are crossing the magic square''s *antidiagonal*,
    the bottom-left-to-top-right line shown in Figure 2-3.


    ![](img/b18963668ae80235fc04b8a482308844_48_1.png)


    *Figure 2-3: The antidiagonal of a square matrix*


    You can see the cells that are on the antidiagonal. The antidiagonal line passes
    fully through them. We can follow our normal two rules when we are dealing with
    these cells. We need the exceptional third rule only when starting in a cell that
    is fully above the antidiagonal and crossing to a cell that is fully below it,
    or vice versa. That final rule is expressed in Figure 2-4, which shows an antidiagonal
    and two cells that would need to follow this rule when crossing it.'
