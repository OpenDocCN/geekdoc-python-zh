    # La Pipopipette


    Dots and boxes was invented by the French mathematician Édouard Lucas, who named
    it *la pipopipette*. It starts with a *lattice*, or grid of points, like the one
    shown in Figure 10-1.


    ![](img/b18963668ae80235fc04b8a482308844_208_0.png)


    *Figure 10-1: A lattice, which we can use as a game board for dots and boxes*


    The lattice is usually a rectangle but can be any shape. Two players play against
    each other, taking turns. On each turn, a player is allowed to draw a line segment
    that connects two adjacent points in the lattice. If they use different colors
    to draw their line segments, we can see who has drawn what, though that''s not
    required. As they proceed through the game, line segments fill the lattice until
    every possible segment connecting adjacent points is drawn. You can see an example
    game in progress in Figure 10-2.


    A player''s goal in dots and boxes is to draw line segments that complete squares.
    In Figure 10-2, you can see that in the bottom left of the game board, one square
    has been completed. Whichever player drew the line seg- ment that completed that
    square will have earned one point from doing so.'
