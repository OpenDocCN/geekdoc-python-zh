  md: 'As the ball progresses through its flight, the angle of the outfielder''s line
    of sight continues to increase, and the outfielder has to keep tipping their head
    back until they make the catch. Let''s call the angle between the ground and the
    outfielder''s line of sight with the ball *theta*. We assume that the outfielder
    is standing at the ball''s eventual destination (*x* = 2). Recall from high school
    geometry class that the tangent of an angle in a right triangle is the ratio of
    the length of the side that''s opposite the angle and the length of the side that''s
    adjacent to the angle (and is not the hypotenuse). In this case, the tangent of
    theta is the ratio of the height of the ball to its horizontal distance from the
    outfielder. We can plot the sides whose ratio constitutes the tangent with the
    following Python code:


    ```

    xs5 = [0.3,0.3]

    ys5 = [0,ball_trajectory(0.3)]

    xs6 = [0.3,2]

    ys6 = [0,0]

    plt.title(''The Trajectory of a Thrown Ball - Tangent Calculation'')

    plt.xlabel(''Horizontal Position of Ball'')

    plt.ylabel(''Vertical Position of Ball'')

    plt.plot(xs,ys,xs4,ys4,xs5,ys5,xs6,ys6)

    plt.text(0.31,ball_trajectory(0.3)/2,''A'',fontsize = 16)

    plt.text((0.3 + 2)/2,0.05,''B'',fontsize = 16)

    plt.show()

    ```


    The resulting plot is shown in Figure 1-3.


    ![](img/b18963668ae80235fc04b8a482308844_30_0.png)'
  merge: -1
  pgno: 30
- img_proc: true
  md: 'We calculate the tangent by taking the ratio of the length of the side labeled
    A and the length of the side labeled B. The equation for the height A will be
    $10x - 5x^2$, while the equation for the length of B will be $2 - x$. So the following
    equation implicitly describes the ball''s angle *theta* at each moment of its
    flight:


    $$tan(\theta) = \frac{10x - 5x^2}{2 - x} = 5x$$


    The overall situation is complex: a ball is hit far away and quickly shoots through
    a parabolic curve whose end is hard to immediately estimate. But in this complex
    situation, Chapman has found this simple relationship: that *when the outfielder
    is standing in the right location*, the tangent of theta grows at a simple, constant
    rate. The kernel of Chapman''s breakthrough is that the tangent of theta, the
    ball''s angle with the ground, grows linearly over time. Since Chapman found that
    simple relationship in the weeds of the outfielder problem, he was able to develop
    an elegant algorithmic solution to it.


    His solution depends on the fact that if something—in this case, the tangent of
    theta—grows at a constant rate, it has zero acceleration. So if you are standing
    exactly where a ball is headed, you''ll observe an angle whose tangent experiences
    zero acceleration. By contrast, if you are standing too close to the ball''s initial
    position, you''ll observe positive acceleration. If you are standing too far from
    the ball''s initial position, you''ll observe negative acceleration. (You are
    encouraged to verify the messy calculus behind these truths if you so desire.)
    This means that an outfielder can know where they need to go by feeling how steadily
    they have to tilt back their head as they look at the ball rising—thinking, so
    to speak, with their neck.


    # *Applying Chapman''s Algorithm*


    Robots don''t necessarily have necks, and so a method for "thinking with one''s
    neck" may not be helpful for a robot outfielder. Remember that they can solve
    quadratic equations directly and instantaneously to find where to go to catch
    a ball, without worrying about the acceleration of the tangent of theta. But for
    humans, Chapman''s neck-thinking method could be extremely useful. In order to
    get to the ball''s eventual destination, a human outfielder could follow this
    relatively simple process:


    +   1. Observe the acceleration of the tangent of the angle between the ground
    and your line of sight with the ball.

    2. If the acceleration is positive, step backward.

    3. If the acceleration is negative, step forward.

    4. Repeat steps 1–3 until the ball is directly in front of your face.

    5. Catch it.'
  merge: -1
  pgno: 31
- img_proc: true
  md: 'One serious objection to Chapman''s five-step method is that outfielders following
    this process seem to have to calculate the tangents of angles on the fly, meaning
    we''re replacing an inner physicist theory with an "inner geometer theory" in
    which baseball players can instantaneously, and subconsciously, take tangents.


    One potential resolution to this objection is that for many angles, tan(theta)
    is approximately equal to theta, so rather than observing the acceleration of
    a tangent, outfielders can merely observe the acceleration of an angle. If the
    acceleration of an angle can be estimated by the felt acceleration of the neck
    joints that crick as the neck moves back to observe the ball, and if an angle
    is a reasonable approximation for its tangent, then we don''t need to assume any
    great subconscious mathematical or geometrical powers on the part of outfielders—only
    the physical skill of being accurately attuned to subtle sensory inputs.


    By making an acceleration estimate the only difficult part of the process, we
    have obtained a potential solution to the outfielder problem that has much more
    psychological plausibility than the inner physicist''s theory of subconsciously
    extrapolated parabolas. Of course, the psychological appeal of the solution doesn''t
    mean that it can be used only by humans. A robot outfielder could also be programmed
    to follow Chapman''s five-step process, and it might even perform better at catching
    the ball if it did so, because, for example, Chapman''s process enables those
    who use it to dynamically respond to changes due to wind or bounces.


    Besides psychological plausibility, there''s one more crucial feature that the
    five-step process implied by Chapman''s insight possesses: it doesn''t rely on
    a solve-for-*x* strategy or any explicit equation at all. Instead, it proposes
    successive iterations of easy observations and small, gradual steps to reach a
    well-defined goal. In other words, the process that we have inferred from Chapman''s
    theory is an algorithm.


    # *Solving Problems with Algorithms*


    The word *algorithm* came from the name of the great al-Khwarizmi, mentioned earlier.
    It''s not an easy word to define, not least because its accepted definition has
    changed over time. Stated simply, an algorithm is just a set of instructions that
    produce a well-defined outcome. This is a broad definition; as we saw in the Introduction,
    tax forms and recipes for parfaits could rightly be considered algorithms.


    Chapman''s ball-catching process, or Chapman''s algorithm as we may want to call
    it, is arguably even more algorithm-like than a recipe for a parfait, because
    it contains a looping structure in which small steps are taken repeatedly until
    a definite condition is reached. This is a common algorithmic structure you''ll
    see throughout this book.


    Chapman proposed an algorithmic solution to the outfielder problem because a solve-for-*x*
    solution was not plausible (outfielders often don''t know the relevant equations).
    In general, algorithms are most useful when the solve-for-*x* strategy fails.
    Sometimes we don''t know the right equations'
  merge: -1
  pgno: 32
- img_proc: true
  md: 'to use, but more often there is no equation that could fully describe a situation,
    the equation is impossible to solve, or we face time or space constraints. Algorithms
    exist at the edge of what is possible, and every time an algorithm is created
    or improved, we push the frontier of efficiency and knowledge out a little further.


    Today, there is a common perception that algorithms are difficult, esoteric, mysterious,
    and strictly mathematical and that they require years of study to understand.
    The way our education system is structured today, we begin teaching children the
    solve-for-*x* strategy as early as possible, and we explicitly teach algorithms
    only at the college or graduate school levels, if at all. For many students, it
    takes years to master the solve-for-*x* strategy, and it always feels unnatural
    to them. People who have had this experience may assume that algorithms will feel
    just as unnatural, and will also be more difficult to understand because they
    are more "advanced."


    However, the lesson I take from Chapman''s algorithm is that we have gotten it
    all exactly backward. During recess, students learn and perfect their performance
    of dozens of algorithms, for catching, throwing, kicking, running, and moving.
    There are probably also much more complex algorithms, which have not been fully
    delineated, that govern the operation of the social world of recess: the talking,
    status seeking, gossiping, alliance formation, and friendship cultivation. When
    we end recess time and start math class, we take students out of a world of algorithm
    exploration and push them to learn an unnatural and mechanistic process of solving
    for *x*, a process that is not a natural part of human development and is not
    even the most powerful method for solving analytical problems. Only if students
    progress to advanced math and computer science do they return to the natural world
    of algorithms and the powerful processes that they were unconsciously and joyfully
    mastering at recess.


    This book is meant to be an intellectual recess for the curious—a recess in the
    sense that a young student means it: the beginning of all important activity,
    the end of all drudgery, and the continuation of cheerful exploration with friends.
    If you have any feeling of trepidation about algorithms, remind yourself that
    we humans are naturally algorithmic, and if you can catch a ball or bake a cake,
    you can master an algorithm.


    In the remainder of this book, we explore many different algorithms. Some will
    sort lists or calculate numbers. Others will enable natural language processing
    and artificial intelligence. I encourage you to bear in mind that algorithms don''t
    grow on trees. Each algorithm, before it became mainstream and was packaged for
    general consumption in this book, was discovered or created by someone like Chapman,
    who woke up one day in a world in which his algorithm didn''t exist and went to
    sleep at the end of that day in a world in which it did. I encourage you to try
    to get in the mindset of these heroic discoverers. That is, I encourage you to
