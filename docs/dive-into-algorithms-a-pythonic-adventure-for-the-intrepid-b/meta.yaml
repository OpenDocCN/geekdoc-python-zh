  md: '# **Finding Candidate n + 1-grams**


    In order to find the *n* + 1-grams that will constitute our search suggestions,
    we need to know how long the user''s search term is. Suppose the search term is
    **life is a**, meaning that we''re looking for suggestions for how to complete
    the phrase "life is a . . .". We can use the following simple lines to get the
    length of our search term:


    ```

    python

    from nltk.tokenize import sent_tokenize, word_tokenize

    search_term = ''life is a''

    split_term = tuple(search_term.split('' ''))

    search_term_length = len(search_term.split('' ''))

    ```


    Now that we know the length of the search term, we know *n*—it''s 3. Remember
    that we''ll be returning the most frequent *n* + 1-grams (4-grams) to the user.
    So we need to take into account the different frequencies of different *n* + 1-grams.
    We''ll use a function called **Counter()**, which will count the number of occurrences
    of each *n* + 1-gram in our collection.


    ```

    python

    from collections import Counter

    counted_grams = Counter(grams[search_term_length - 1])

    ```


    This line has selected only the *n* + 1-grams from our **grams** variable. Applying
    the **Counter()** function creates a list of tuples. Each tuple has an *n* + 1-gram
    as its first element and the frequency of that *n* + 1-gram in our corpus as its
    second element. For example, we can print the first element of **counted_grams**:


    ```

    python

    print(list(counted_grams.items())[0])

    ```


    The output shows us the first *n* + 1-gram in our corpus and tells us that it
    appears only once in the entire corpus:


    ```

    python

    ((''From'', ''fairest'', ''creatures'', ''we''), 1)

    ```


