  mdcn: '在高中和大学阶段的硬科学中极为常见。学生被要求求解：一个球的预期落点、理想的经济生产水平、实验中应使用的化学物质比例，或其他无数问题。


    求解*x*的策略极其强大。例如，如果一支军队观察到敌方发射了抛射武器（比如导弹），他们可以迅速将伽利略的方程输入计算器，几乎瞬间就能算出导弹预计落在哪里，并据此规避或拦截。这在一台运行Python的消费级笔记本电脑上就可以免费完成。如果一个机器人在棒球比赛中担任外野手，它也可以做同样的事情来毫不费力地接住球。


    在这种情况下，求解*x*的策略很简单，因为我们已经知道需要求解的方程以及求解方法。正如前面提到的，抛出的球的运动方程归功于伽利略。二次公式则归功于伟大的穆罕默德·伊本·穆萨·花拉子米，他是第一个给出二次方程完全通用解法的人。


    花拉子米是九世纪的一位博学家，除了为我们提供*代数*（algebra）这个词及其所指的数学方法外，他还在天文学、制图学和三角学方面做出了贡献。他是使我们能够踏上本书旅程的重要人物之一。由于我们生活在伽利略和花拉子米这样的巨人之后，我们不需要经受推导他们方程的艰难过程——我们只需要记住它们并恰当地使用即可。


    ## 内在物理学家


    利用伽利略和花拉子米的方程以及求解*x*的策略，一台精密的机器可以接住球或拦截导弹。但似乎有理由认为，大多数棒球运动员在看到球飞向空中时并不会立刻开始写方程。可靠的观察者报告称，职业棒球春季训练项目包含大量跑动和比赛的时间，而围在白板前推导纳维-斯托克斯方程的时间则少得多。解开球将落在哪里的谜团并不能为外野手问题提供一个明确的答案——也就是说，*人类*如何能够凭直觉知道球将落在哪里，而无需将其输入计算机程序。


    或者也许它能。对外野手问题最轻率的解决方案是断言，如果计算机通过求解伽利略二次方程来确定球的落点，那么人类也是如此。我们将这个解决方案称为*内在物理学家理论*。根据这一理论，我们大脑中的"湿件"能够建立并求解二次方程，或者绘制图表并外推其线条，所有这些都远低于我们的意识层面。换句话说，我们每个人大脑深处都有一个"内在物理学家"，能够在几秒钟内计算出困难数学问题的精确解，并将解决方案传递给我们的肌肉，然后肌肉就能找到通往球的路径，带动我们的身体和手套一起。即使我们从未上过物理课或求解过*x*，我们的潜意识也可能做到这一点。


    内在物理学家理论并非没有支持者。值得注意的是，著名数学家基思·德夫林于2006年出版了一本名为*《数学本能：为什么你是数学天才（还有龙虾、鸟类、猫和狗）》*的书。书的封面展示了一只狗跳起来接飞盘，箭头追踪着飞盘和狗各自的轨迹向量，暗示这只狗能够执行使这些向量相交所需的复杂计算。


    狗接飞盘和人类接棒球的明显能力似乎是支持内在物理学家理论的一个论点。潜意识是一种神秘而强大的东西，其深度我们尚未完全探明。那么，为什么它不能偶尔解一些高中水平的方程呢？更紧迫的是，内在物理学家理论难以反驳，因为很难想象它的替代方案：如果狗不能通过求解偏微分方程来接飞盘，那么它们究竟是如何接住的呢？它们高高跃入空中，像没事一样用嘴接住不规则移动的飞盘。如果它们的大脑中没有在解某个物理问题，那么它们（和我们）怎么可能精确地知道如何拦截一个球呢？


    直到1967年，还没有人给出好的答案。那一年，工程师万尼瓦尔·布什写了一本书，描述了他所理解的棒球的科学特征，但他无法解释外野手如何知道该跑到哪里去接飞球。对我们来说幸运的是，物理学家塞维尔·查普曼读了布什的书，并在第二年受到启发提出了自己的理论。


    ## 算法方法


    查普曼，这位真正的科学家，并不满足于对人类潜意识的神秘且未经证实的信任，他希望对外野手的能力有一个更具体的解释。这就是他的发现。


    ### *用脖子思考*


    查普曼通过注意接球者可获得的信息来着手解决外野手问题。虽然人类很难估计精确的速度或抛物线轨迹，但他认为我们观察角度会更容易。如果有人从地面抛出或击出球，且地面平坦均匀，那么外野手会看到球从接近眼睛水平的位置开始。想象一个由两条线形成的角度：地面，以及外野手眼睛与球之间的连线。球被击中的那一刻，这个角度（大致）为0度。球飞行片刻后，它会高于地面，因此地面与外野手视线之间的角度会增大。即使外野手没有学过几何，他们也会对这个角度有一种"感觉"——例如，通过感受他们必须向后仰多少脖子才能看到球。


    如果我们假设外野手站在球最终落点处，即*x* = 2，我们可以通过绘制球轨迹早期的一条视线来感受外野手视线角度增大的方式。以下代码行创建了我们为清单1-2绘制的图中的线段，它应在同一个Python会话中运行。这条线段代表球水平飞行0.1米后，外野手眼睛与球之间的连线。


    ```

    xs2 = [0.1,2]

    ys2 = [ball_trajectory(0.1),0]

    ```


    我们可以将这条视线与其他视线一起绘制，看看角度如何在球的轨迹过程中持续增大。以下代码行向我们为清单1-2绘制的图中添加了更多线段。这些线段代表球旅程中另外两个点处外野手眼睛与球之间的连线：球水平飞行0.1、0.2和0.3米时的点。创建所有这些线段后，我们将它们一起绘制。


    ```

    xs3 = [0.2,2]

    ys3 = [ball_trajectory(0.2),0]

    xs4 = [0.3,2]

    ys4 = [ball_trajectory(0.3),0]

    plt.title(''The Trajectory of a Thrown Ball - with Lines of Sight'')

    plt.xlabel(''Horizontal Position of Ball'')

    plt.ylabel(''Vertical Position of Ball'')

    plt.plot(xs,ys,xs2,ys2,xs3,ys3,xs4,ys4)

    plt.show()

    ```


    得到的图显示了几条视线，它们与地面形成持续增大的角度（图1-2）。


