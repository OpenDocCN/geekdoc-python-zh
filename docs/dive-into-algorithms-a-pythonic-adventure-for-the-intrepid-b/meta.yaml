    \nWe're finally ready to create a function that can play dots and boxes well.\
    \ Before we write the code, let's consider the principles behind it. Specifically,\
    \ how is it that we, as humans, play dots and boxes well? More generally, how\
    \ is it that we go about winning any strategic game (like chess or tic-tac-toe)?\
    \ Every game has unique rules and features, but there's a general way to choose\
    \ a winning strategy based on an analysis of the game tree.\n\nThe algorithm we'll\
    \ use for choosing a winning strategy is called *minimax* (a combination of the\
    \ words *minimum* and *maximum*), so called because while we're trying to maximize\
    \ our score in the game, our opponent is trying to minimize our score. The constant\
    \ fight between our maximization and our opponent's minimization is what we have\
    \ to strategically consider as we're choosing the right move.\n\nLet's look closely\
    \ at the simple game tree in Figure 10-3. In theory, a game tree can grow to be\
    \ enormous, with a huge depth and many branches at each depth. But any game tree,\
    \ big or small, consists of the same components: a lot of little nested branches.\n\
    \nAt the point we're considering in Figure 10-3, we have two choices. Figure 10-4\
    \ shows them.\n\n![](img/b18963668ae80235fc04b8a482308844_217_0.png)"
