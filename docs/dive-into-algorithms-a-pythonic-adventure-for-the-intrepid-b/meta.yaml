    \ guess-and-check strategy, but one that is \"guided\" by moving guesses in the\
    \ direction of the gradient rather than by guessing randomly. Gradient ascent\
    \ is just a more efficient version of guess-and-check.\n\nFinally, consider the\
    \ idea of solving the first-order conditions to find a maximum. This is a method\
    \ that is taught in calculus classes all around the world. It could be called\
    \ an algorithm, and its steps are:\n\n+   1. Find the derivative of the function\
    \ you are trying to maximize.\n2. Set that derivative equal to zero.\n3. Solve\
    \ for the point at which the derivative is equal to zero.\n4. Make sure that point\
    \ is a maximum rather than a minimum.\n\n(In multiple dimensions, we can work\
    \ with a gradient instead of a derivative and perform an analogous process.) This\
    \ optimization algorithm is fine as far as it goes, but it could be difficult\
    \ or impossible to find a closed-form solution for which a derivative is equal\
    \ to zero (step 2), and it could be harder to find that solution than it would\
    \ be to simply perform gradient ascent. Besides that, it could take huge computing\
    \ resources, including space, processing power, or time, and not all software\
    \ has symbolic algebra capabilities. In that sense, gradient ascent is more robust\
    \ than this algorithm.\n\n# ## The Problem of Local Extrema\n\nEvery algorithm\
    \ that tries to find a maximum or minimum faces a very serious potential problem\
    \ with local extrema (local maximums and minimums). We may perform gradient ascent\
    \ perfectly, but realize that the peak we have reached at the end is only a \"\
    local\" peak—it's higher than every point around it, but not higher than some\
    \ faraway global maximum. This could happen in real life as well: you try to climb\
    \ a mountain, you reach a summit where you are higher than all of your immediate\
    \ surroundings, but you realize that you're only on the foothill and the real\
    \ summit is far away and much higher. Paradoxically, you may have to walk down\
    \ a little to eventually get to that higher summit, so the \"naive\" strategy\
    \ that gradient ascent follows, always stepping to a slightly higher point in\
    \ one's immediate neighborhood, fails to get to the global maximum.\n\n# ### *Education\
