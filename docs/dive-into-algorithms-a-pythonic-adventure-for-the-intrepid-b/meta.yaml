  md: '# # Phrase Completion


    Imagine that you are doing algorithm consulting work for a startup that is trying
    to add features to a search engine they are building. They want to add phrase
    completion so that they can provide search suggestions to users. For example,
    when a user types in peanut butter and, a search suggestion feature might suggest
    adding the word jelly. When a user types in squash, the search engine could suggest
    both court and soup.


    Building this feature is simple. We''ll start with a corpus, just like we did
    with our space checker. In this case, we''re interested not only in the individual
    words of our corpus but also in how the words fit together, so we''ll compile
    lists of n-grams from our corpus. An *n-gram* is simply a collection of *n* words
    that appear together. For example, the phrase "Reality is not always probable,
    or likely" is made up of seven words once spoken by the great Jorge Luis Borges.
    A 1-gram is an individual word, so the 1-grams of this phrase are *reality, is,
    not, always, probable, or,* and *likely.* The 2-grams are every string of two
    words that appear together, including *reality is, is not, not always, always
    probable,* and so on. The 3-grams are *reality is not, is not always,* and so
    on.


    # ## *Tokenizing and Getting N-grams*


    We''ll use a Python module called nltk to make n-gram collection easy. We''ll
    first tokenize our text. *Tokenizing* simply means splitting a string into its
    component words, ignoring punctuation. For example:


    ```

    python

    from nltk.tokenize import sent_tokenize, word_tokenize

    text = "Time forks perpetually toward innumerable futures"

    print(word_tokenize(text))

    ```


    The result we see is this:


    ```

    python

    [''Time'', ''forks'', ''perpetually'', ''toward'', ''innumerable'', ''futures'']

    ```


    We can tokenize and get the n-grams from our text as follows:


    ```

    python

    import nltk

    from nltk.util import ngrams

    token = nltk.word_tokenize(text)

    bigrams = ngrams(token,2)

    trigrams = ngrams(token,3)

    fourgrams = ngrams(token,4)

    fivegrams = ngrams(token,5)

    ```


    Alternatively, we can put all the n-grams in a list called grams:


    ```

    python

    grams = [ngrams(token,2),ngrams(token,3),ngrams(token,4),ngrams(token,5)]

    ```


    In this case, we have gotten a tokenization and a list of n-grams for a short
    one-sentence text. However, in order to have an all-purpose phrase'
