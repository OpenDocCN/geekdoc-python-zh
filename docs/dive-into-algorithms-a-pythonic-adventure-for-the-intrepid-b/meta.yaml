    It''s an interesting exercise to think about how to write an algorithm that could
    solve sudoku puzzles. The simplest, slowest possible algorithm would rely on brute
    force: just try every possible combination of numbers and repeatedly check whether
    they constitute a correct solution, repeating until the solution is found. This
    would work, but it lacks elegance, and it could take an extremely long time. It
    doesn''t seem intuitively right that filling in 81 numbers in a grid according
    to rules that anyone could easily follow should stretch the limits of our world''s
    computing resources. More sophisticated solutions could rely on logic to cut down
    the required runtime.


    The *n* queens completion problem and sudoku share another important trait: solutions
    are very easy to check. That is, if I show you a chessboard with queens on it,
    it will probably take you only a few moments to check whether you''re looking
    at a solution to the *n* queens completion problem, and if I show you a grid of
    81 numbers, you can easily tell whether you''re looking at a correct sudoku solution.
    The ease with which we can check solutions is, tragically, not matched by the
    ease of generating solutions—it can take hours to solve a difficult sudoku puzzle
    that then takes only seconds to verify. This generation/verification effort mismatch
    is common in many areas of life: I can tell with very little effort whether a
    meal is delicious, but creating a wonderful meal takes a much greater investment
    of time and resources. Similarly, I can check whether a painting is beautiful
    in much less time than it takes to create a beautiful painting, and I can verify
    whether a plane can fly with much less effort than it takes to build a flying
    plane.


    Problems that are difficult to solve algorithmically but whose solutions are easy
    to verify are extremely important in theoretical computer science,'
