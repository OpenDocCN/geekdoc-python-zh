    # ## Implementing Kurushima''s Algorithm in Python


    In the previous sections, we discussed how to perform our algorithms of interest
    "by hand" before providing details of the implementation of the code. In the case
    of Kurushima''s algorithm, we''ll outline the steps and introduce the code simultaneously.
    The reason for this change is the relative complexity of the algorithm, and especially
    the length of the code required to implement it.


    One of the most elegant algorithms for generating magic squares, *Kurushima''s
    algorithm* is named for Kurushima Yoshita, who lived during the Edo period. Kurushima''s
    algorithm works only for magic squares of *odd dimension*, meaning that it works
    for any *n×n* square if *n* is an odd number. It begins by filling out the center
    of the square in a way that matches the Luo Shu square. In particular, the central
    five squares are given by the following expressions, with *n* here referring to
    the dimension of the square (Table 2-10).


    | | | |

    |:---|:---|:---|

    | | n² | |

    | n | (n² + 1)/2 | n² + 1 − n |

    | | 1 | |


    Kurushima''s algorithm for generating an *n×n* magic square for odd *n* can be
    described simply as follows:


    +   1. Fill in the five central squares according to Table 2-10.

    2. Beginning with any entry whose value is known, determine the value of an unknown
    neighboring entry by following one of the three rules (described next).

    3. Repeat step 2 until every entry in the full magic square is filled in.


    # ### Filling in the Central Squares


    We can begin the process of creating a magic square by creating an empty square
    matrix that we''ll fill up. For example, if we want to create a 7×7 matrix, we
    can define n=7 and then create a matrix with n rows and n columns:


    ```

    python

    n = 7

    square = [[float(''nan'') for i in range(0,n)] for j in range(0,n)]

    ```


    In this case, we don''t know what numbers to put in the square, so we fill it
    entirely with entries equal to `float(''nan'')`. Here, nan stands for *not a number*,
    which we can use as a placeholder in Python when we want to fill up a list before
    we know what numbers to use. If we run `print(square)`, we find that this matrix
    by default is filled with nan entries:


    ```

    python

    [[nan, nan, nan, nan, nan, nan, nan], [nan, nan, nan, nan, nan, nan, nan],

    [nan, nan, nan, nan, nan, nan, nan], [nan, nan, nan, nan, nan, nan, nan],

    [nan, nan, nan, nan, nan, nan, nan], [nan, nan, nan, nan, nan, nan, nan],

    [nan, nan, nan, nan, nan, nan, nan]]

    ```'
