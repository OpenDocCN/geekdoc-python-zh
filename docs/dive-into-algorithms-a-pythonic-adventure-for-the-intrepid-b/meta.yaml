  md: '# INTRODUCTION


    ![](img/b18963668ae80235fc04b8a482308844_15_0.png)


    Algorithms are everywhere. You have probably executed a few already today. In
    this book, you will read about dozens of algorithms: some simple, some complex,
    some famous, some unknown, all interesting, and all worth learning. The first
    algorithm of the book is also the most delicious—it generates a berry granola
    parfait, and it''s shown in its entirety in Figure 1. You may be accustomed to
    calling this type of algorithm a "recipe," but it fits Donald Knuth''s definition
    of an *algorithm*: a finite set of rules that gives a sequence of operations for
    solving a specific type of problem.'
  merge: -1
  pgno: 15
- img_proc: true
  md: '# Berry Granola Parfaits


    # Directions


    +   1. Place one-sixth of one cup of blueberries at the bottom of a large serving
    glass.

    2. Cover the blueberries with a half cup of plain Turkish yogurt.

    3. Place one-third of one cup of granola on top of the yogurt.

    4. Cover the granola with a half cup of plain Turkish yogurt.

    5. Place strawberries on top of everything in the glass so far.

    6. Top it all off with your favorite whipped cream.


    > Figure 1: An algorithm: a finite set of rules that gives a sequence of operations
    for solving a specific type of problem


    Parfait-making is not the only domain of life governed by algorithms. Every year,
    the US government requires each adult citizen to execute an algorithm, and strives
    to imprison those who fail to do so correctly. In 2017, millions of Americans
    fulfilled this duty by completing the algorithm shown in Figure 2, which is taken
    from a form called 1040-EZ.


    | Line | Description | Amount |

    |------|-------------|--------|

    | 1 | Wages, salaries, and tips. This should be shown in box 1 of your Form(s)
    W-2. Attach your Form(s) W-2. | 1 |

    | 2 | Taxable interest. If the total is over $1,500, you cannot use Form 1040EZ.
    | 2 |

    | 3 | Unemployment compensation and Alaska Permanent Fund dividends (see instructions).
    | 3 |

    | 4 | Add lines 1, 2, and 3. This is your **adjusted gross income.** | 4 |

    | 5 | If someone can claim you (or your spouse if a joint return) as a dependent,
    check the applicable box(es) below and enter the amount from the worksheet on
    back. ☐ **You** ☐ **Spouse** If no one can claim you (or your spouse if a joint
    return), enter $10,400 if **single**; $20,800 if **married filing jointly**. See
    back for explanation. | 5 |

    | 6 | Subtract line 5 from line 4. If line 5 is larger than line 4, enter -0-.
    This is your **taxable income.** | 6 |

    | 7 | Federal income tax withheld from Form(s) W-2 and 1099. | 7 |

    | 8a | **Earned income credit (EIC)** (see instructions) | 8a |

    | 8b | Nontaxable combat pay election. | 8b |

    | 9 | Add lines 7 and 8a. These are your **total payments and credits.** | 9 |

    | 10 | **Tax.** Use the amount on **line 6 above** to find your tax in the tax
    table in the instructions. Then, enter the tax from the table on this line. |
    10 |

    | 11 | Health care: individual responsibility (see instructions) Full-year coverage
    ☐ | 11 |

    | 12 | Add lines 10 and 11. This is your **total tax.** | 12 |


    > Figure 2: The instructions for filing taxes fit the definition of an algorithm.


    How is it that taxes and parfaits can have anything in common? Taxes are inevitable,
    numeric, difficult, and universally disliked. Parfaits are infrequent, artistic,
    effortless, and adored without exception. The only trait they share is that people
    prepare both by following algorithms.


    In addition to defining *algorithm*, the great computer scientist Donald Knuth
    noted that it is nearly synonymous with *recipe, procedure*, and *rigmarole*.
    In the case of filing taxes via the pictured 1040-EZ form, we have 12 steps (a
    finite list) that specify operations (like addition in step 4 and'
  merge: -1
  pgno: 16
- img_proc: true
  md: 'subtraction in step 6) to solve a specific type of problem: wanting to avoid
    being imprisoned for tax evasion. In the case of making a parfait, we have six
    finite steps that specify operations (like placing in step 1 and covering in step
    2) to solve a specific type of problem: wanting to have a parfait in your hand
    or mouth.


    As you learn more about algorithms, you will begin to see them everywhere and
    come to appreciate just how powerful they can be. In Chapter 1, we will discuss
    the remarkable human ability to catch a ball, and find out the details of the
    algorithm in the human subconscious that enables us to do so. Later, we will talk
    about algorithms for debugging code, deciding how much to eat at a buffet, maximizing
    revenue, sorting lists, scheduling tasks, proofreading text, delivering mail,
    and winning games like chess and sudoku. Along the way, we will learn to judge
    algorithms according to several attributes that professionals believe are important
    for them to possess. And we will begin to get a sense of the craftsmanship or
    even, dare we say, the *art* of algorithms, which provides scope for creativity
    and personality in an otherwise precise and quantitative endeavor.


    # ## Who Is This Book For?


    This book provides a friendly introduction to algorithms, with accompanying Python
    code. To get the greatest possible benefit from it, you should have some experience
    with the following:


    **Programming/coding.** Every major example in the book is illustrated with Python
    code. We strive to provide walkthroughs and explanations of every code snippet
    to make the book digestible for someone with no Python experience and not much
    programming experience. Nevertheless, someone who has at least some basic understanding
    of the fundamentals of programming—such as variable assignment, for loops, if/then
    statements, and function calls—will be the most prepared to benefit.


    **High school math.** Algorithms are often used to accomplish many of the same
    goals as math, like solving equations, optimizing, and calculating values. Algorithms
    also apply many of the same principles that are associated with mathematical thinking,
    like logic and the need for precise definitions. Some of our discussions veer
    into mathematical territory, including algebra, the Pythagorean theorem, pi, and
    the teensiest bit of very basic calculus. We strive to avoid abstruseness and
    we don''t venture beyond the math taught in American high schools.


    Anyone who feels comfortable with these prerequisites should be able to master
    all the content in this book. It was written with the following groups in mind:


    **Students.** This book is suitable for an introductory class on algorithms, computer
    science, or programming at the high school or undergraduate level.'
  merge: -1
  pgno: 17
- img_proc: true
  md: '**Professionals.** Several types of professionals could gain valuable skills
    from this book, including developers or engineers who want to gain familiarity
    with Python, and developers who want to learn more about the foundations of computer
    science and how to improve code by thinking algorithmically.


    **Interested amateurs.** The true target audience of this book is interested amateurs.
    Algorithms touch nearly every part of life, so everyone should be able to find
    at least something in this book that enhances their appreciation of the world
    around them.


    # ## About This Book


    This book does not cover every aspect of every extant algorithm; it''s meant only
    as an introduction. After reading it, you will have a solid grasp of what an algorithm
    is, know how to write code to implement important algorithms, and understand how
    to judge and optimize algorithms'' performance. You will also be familiar with
    many of the most popular algorithms professionals use today. The chapters are
    organized as follows:


    **Chapter 1: Problem-Solving with Algorithms**, in which we tackle the problem
    of how to catch a ball, find evidence for a subconscious algorithm governing human
    behavior, and discuss what that teaches us about the utility of algorithms and
    how to design them.


    **Chapter 2: Algorithms in History**, in which we travel around the world and
    through history to find out how ancient Egyptians and Russian peasants multiplied
    numbers, how the ancient Greeks found greatest common divisors, and how medieval
    Japanese scholars created magic squares.


    **Chapter 3: Maximizing and Minimizing**, in which we introduce gradient ascent
    and gradient descent. These simple methods for finding the maxima and minima of
    functions are used for optimization, an important goal of many algorithms.


    **Chapter 4: Sorting and Searching**, in which we present fundamental algorithms
    for sorting lists and searching for elements within them. We also introduce how
    to measure the efficiency and speed of algorithms.


    **Chapter 5: Pure Math**, in which we concern ourselves with purely mathematical
    algorithms, including those for generating continued fractions, calculating square
    roots, and generating pseudorandom numbers.


    **Chapter 6: Advanced Optimization**, in which we cover an advanced method for
    finding optimal solutions: simulated annealing. We also introduce the traveling
    salesman problem, a standard problem in advanced computer science.


    **Chapter 7: Geometry**, in which we go over how to generate Voronoi diagrams,
    which can be useful in a variety of geometric applications.'
  merge: -1
  pgno: 18
- img_proc: true
  md: '**Chapter 8: Language**, in which we discuss how to intelligently add spaces
    to a text that''s missing them, and how to intelligently suggest the next words
    in phrases.


    **Chapter 9: Machine Learning**, in which we discuss decision trees, a fundamental
    machine learning method.


    **Chapter 10: Artificial Intelligence**, in which we jump to an ambitious project:
    implementing an algorithm that can play games against us—and maybe even win. We
    start with a simple game, dots and boxes, and discuss how we could improve performance.


    **Chapter 11: Forging Ahead**, in which talk about how to progress to more advanced
    work related to algorithms. We discuss how to build a chatbot, and how to win
    a million dollars by creating a sudoku algorithm.


    # ## Setting Up the Environment


    We''ll implement the algorithms described in this book by using the Python language.
    Python is free and open source, and it runs on every major platform. You can use
    the following steps to install Python on Windows, macOS, and Linux.


    # ### *Install Python on Windows*


    To install Python on Windows, follow these steps:


    +   1. Open the page dedicated to the latest version of Python for Windows (make
    sure you include the final slash): *https://www.python.org/downloads/windows/*.


    +   2. Click the link for the Python release you want to download. To download
    the most recent release, click the link **Latest Python 3 Release - 3.X.Y**, where
    *3.X.Y* is the latest version number, like 3.8.3. The code in this book was tested
    on both Python 3.6 and Python 3.8. If you''re interested in downloading an older
    version, scroll down on this page to the Stable Releases section to find a release
    you prefer.


    +   3. The link you clicked in step 2 takes you to a page dedicated to your chosen
    Python release. In the Files section, click the **Windows x86-64 executable installer**
    link.


    +   4. The link in step 3 downloads a *.exe* file to your computer. This is an
    installer file; double-click it to open it. It will execute the installation process
    automatically. Check the box **Add Python 3.X to PATH** where *X* is the release
    number of the installer you downloaded, like 8. After that, click **Install Now**
    and choose the default options.


    +   5. When you see the "Setup was successful" message, click **Close** to complete
    the installation process.'
