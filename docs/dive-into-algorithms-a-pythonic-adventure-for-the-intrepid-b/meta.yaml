  - '[PAGE 158]


    If you have more than seven points and they are irregularly placed, the number
    of possible triangulations can rise to staggering magnitudes.


    We can accomplish triangulation manually by getting pen and paper and connecting
    dots. Unsurprisingly, we can do it better and faster by using an algorithm.


    There are a several different triangulation algorithms. Some are meant to have
    a quick runtime, others are meant to be simple, and still others are meant to
    yield triangulations that have specific desirable properties. What we''ll cover
    here is called the *Bowyer-Watson algorithm*, and it''s designed to take a set
    of points as its input and output a Delaunay triangulation.


    A *Delaunay triangulation (DT)* aims to avoid narrow, sliver triangles. It tends
    to output triangles that are somewhere close to equilateral. Remember that equilateral
    triangles have relatively small circumcircles and sliver triangles have relatively
    large circumcircles. With that in mind, consider the technical definition of a
    DT: for a set of points, it is the set of triangles connecting all the points
    in which no point is inside the circumcircle of any of the triangles. The large
    circumcircles of sliver triangles would be very likely to encompass one or more
    of the other points in the set, so a rule stating that no point can be inside
    any circumcircle leads to relatively few sliver triangles. If this is unclear,
    don''t fret—you''ll see it visualized in the next section.


