    We''ve completed the halving column. As the name suggests, each entry in the doubling
    column will be double the previous entry. So since 18 × 2 is 36, 36 is the second
    entry in the doubling column (Table 2-4).


    | Halving | Doubling |

    |---------|----------|

    | 89 | 18 |

    | 44 | 36 |

    | 22 | |

    | 11 | |

    | 5 | |

    | 2 | |

    | 1 | |


    We continue to add entries to the doubling column by following the same rule:
    just double the previous entry. We do this until the doubling column has as many
    entries as the halving column (Table 2-5).


    | Halving | Doubling |

    |---------|----------|

    | 89 | 18 |

    | 44 | 36 |

    | 22 | 72 |

    | 11 | 144 |

    | 5 | 288 |

    | 2 | 576 |

    | 1 | 1,152 |'
