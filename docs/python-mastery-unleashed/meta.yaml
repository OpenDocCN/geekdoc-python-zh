    \            self.assertEqual('You earned 250.0', result, 'payslip incorrect')\n\
    ```\n\n## Mock Where You Use It\n\nThe most common error made by people using\
    \ the unittest.mock library is mocking in the wrong place. The rule is that you\
    \ must mock out where you are going to use it; or to put it another way you must\
    \ always mock the real thing where it is imported into, not where it’s imported\
    \ from.\n\n## Patch Order Issues\n\nIt is possible to have multiple patch decorators\
    \ on a test method. However, the order in which you define the patch decorators\
    \ is significant. The key to understanding what the order should be is to work\
    \ backwards so that when the mocks are passed into the test method they are presented\
    \ to the right parameters. For example:\n\n```python\n@patch('mymodule.sys')\n\
    @patch('mymodule.os')\n@patch('mymodule.os.path')\ndef test_something(self, mock_os_path,\
    \ mock_os, mock_sys):\n    # The rest of the test method\n```\n\nNotice that the\
    \ last patch’s mock is passed into the second parameter passed to the test_something()\
    \ method (self is the first parameter to all methods). In turn the first patch’s\
    \ mock is passed into the last parameter. Thus the mocks are passed into the test\
    \ method in the reverse order to that which they are defined in.\n\n## How Many\
    \ Mocks?\n\nAn interesting question to consider is how many mocks should you use\
    \ per test?\n\nThis is the subject of a lot of debate within the software testing\
    \ community. The general rules of thumb around this topic are given below, however\
    \ it should be borne in mind that these are guidelines rather than hard and fast\
    \ rules.\n\n- Avoid more than 2 or 3 mocks per test. You should avoid more than\
    \ 2–3 mocks as the mocks themselves get harder to manage. Many also consider that\
    \ if you need more than 2–3 mocks per test then there are probably some underlying\
    \ design issues that need to be considered. For example, if you are testing a\
    \ Python class then that class may have too many dependencies. Alternatively the\
    \ class may have too many responsibilities and should be broken down into several\
    \ independent classes; each with a distinct responsibility. Another cause might\
    \ be that the class’s behavior may not be encapsulated enough and that you are\
