- md: 'A final point to note is that it is important to log information to the correct
    place. Many applications (and organizations) log general information to one log
    file, errors and exceptions to another and security information to a third. It
    is therefore important to know where your log information is being sent and not
    to send information to the wrong log.


    ## Why Not Just Use Print?


    Assuming that you want to log information in your application then next question
    is how should you do that? Through this book we have been using the Python print()
    function to print out information that indicates results generated by our code
    but also at times what is happening with a function or a method etc.


    Thus we need to consider whether using the print() function the best way to log
    information.


    In actual fact, using print() to log information in a production system is almost
    never the right answer, this is for several reasons:


    - The print() function by default writes strings out to the standard output (stdout)
    or standard error output (stderr) which by default directs output to the console/terminal.
    For example, when you run an application within an IDE, the output is displayed
    in the Console window. If you run an application from the command line then the
    output is directed back to that command/terminal window. Both of these are fine
    during development, but what if the program is not run from a command window,
    perhaps instead it is started up by the operating system automatically (as is
    typical of numerous services such as a print service or a web server). In this
    case there is no terminal/console window to send the data to; instead the data
    is just lost. As it happens the stdout and stderr output streams can be directed
    to a file (or files). However, this is typically done when the program is launched
    and may be easily omitted. In addition there is only the option of sending all
    stdout to a specific file or all error output to the stderr.


    - Another issue with using the print() function is that all calls to print will
    be output. When using most loggers it is possible to specify the log level required.
    These different log levels allow different amounts of information to be generated
    depending upon the scenario. For example, in a well tested reliable production
    system we may only want error related or critical information to be logged. This
    will reduce the amount of information we are collecting and reduce any performance
    impact introduced by logging into the application. However, during testing phases
    we may want a far more detailed level of logging.


    - In other situations we may wish to change the log level being used for a running
    production system without needing to modify the actual code (as this has the potential
    to introduced errors into the code). Instead we would like to have the facility
    to externally change the way in which the logging system behaves, for example
    through a configuration file. This allows system administrators to modify the
    amount and the detail of the information being logged. It typically also allows
    the designation of the log information to be changed.


    - Finally, when using the print() function a developer can use whatever format
    they like, they can include a timestamp on the message or not, they can include
    the module or function/method name or not they can include parameters or not.
    Using a logging system usually standardizes the information generated along with
    the log message. Thus all log messages will have (or not have) a timestamp, or
    all messages will include (or not include) information on the function or method
    in which they were generated etc.


    ## Logging in Python


    ### The Logging Module


    Python has included a builtin logging module since Python 2.3. This module, the
    logging module, defines functions and classes which implement a flexible logging
    framework that can be used in any Python application/script or in Python libraries/modules.


    Although different logging frameworks differ in the specific details of what they
    offer; almost all offer the same core elements (although different names are sometimes
    used). The Python logging module is no different and the core elements that make
    up the logging framework and its processing pipeline are shown below (note that
    a very similar diagram could be drawn for login frameworks in Java, Scala, C++
    etc.).


    The following diagram illustrates a Python program that uses the built-in Python
    logging framework to log messages to a file.


    ![](img/8a661fca3884547aede940b9a6567321_480_0.png)


    The core elements of the logging framework (some of which are optional) are shown
    above and described below:


    - Log Message: This is the message to be logged from the application.

    - Logger: Provides the programmers entry point/interface to the logging system.
    The Logger class provides a variety of methods that can be used to log messages
    at different levels.

    - Handler: Handlers determine where to send a log message, default handlers include
    file handlers that send messages to a file and HTTP handlers that send messages
    to a web server.

    - Filter: This is an optional element in the logging pipeline. They can be used
    to further filter the information to be logged providing fine grained control
    of which log messages are actually output (for example to a log file).

    - Formatter: These are used to format the log message as required. This may involve
    adding timestamps, module and function/method information etc. to the original
    log message.

    - Configuration Information: The logger (and associated handlers, filters and
    formatters) can be configured either programmatically in Python or through configuration
    files. These configuration files can be written using key-value pairs or in a
    YAML file (which is a simple mark up language). YAML stands for Yet Another Markup
    Language!


    It is worth noting that much of the logging framework is hidden from the developer
    who really only sees the logger; the remainder of the logging pipeline is either
    configured by default or via log configuration information typically in the form
    of a log configuration file.


    ### The Logger


    The Logger provides the programmers interface to the logging pipeline. A Logger
    object is obtained from the getLogger() function defined in the logging module.
    The following code snippet illustrates acquiring the default logger and using
    it to log an error message. Note that the logging module must be imported:


    ```python

    import logging

    logger = logging.getLogger()

    logger.error(''This should be used with something unexpected'')

    ```


    The output from this short application is logged to the console as this is the
    default configuration:


    This should be used with something unexpected


    ### Controlling the Amount of Information Logged


    Log messages are actually associated with a log level. These log levels are intended
    to indicate the severity of the message being logged. There are six different
    log levels associated with the Python logging framework, these are:


    - NOTSET: At this level no logging takes place and logging is effectively turned
    off.

    - DEBUG: This level is intended to provide detailed information, typically of
    interest when a developer is diagnosing a bug or issues within an application.

    - INFO: This level is expected to provide less detail than the DEBUG log level
    as it is expected to provide information that can be used to confirm that the
    application is working as expected.

    - WARNING: This is used to provide information on an unexpected event or an indication
    of some likely problem that a developer or system administration might wish to
    investigate further.

    - ERROR: This is used to provide information on some serious issue or problem
    that the application has not been able to deal with and that is likely to mean
    that the application cannot function correctly.

    - CRITICAL: This is the highest level of issue and is reserved for critical situations
    such as ones in which the program can no longer continue executing.


    The log levels are relative to one another and defined in a hierarchy. Each log
    level has a numeric value associated with it as shown below (although you should
    never need to use the numbers). Thus INFO is a higher log level than DEBUG, in
    turn ERROR is a higher log level than WARNING, INFO, DEBUG etc.


    ![](img/8a661fca3884547aede940b9a6567321_483_0.png)'
  mdcn: '最后需要注意的一点是，将信息记录到正确的位置非常重要。许多应用程序（和组织）会将常规信息记录到一个日志文件，将错误和异常记录到另一个，将安全信息记录到第三个。因此，了解你的日志信息被发送到哪里，并避免将信息发送到错误的日志中，这一点至关重要。


    ## 为什么不用打印（Print）？


    假设你想在应用程序中记录信息，那么下一个问题就是：你应该怎么做？在本书中，我们一直使用 Python 的 `print()` 函数来打印出表明代码生成结果的信息，但有时也用于显示函数或方法等的运行情况。


    因此，我们需要考虑使用 `print()` 函数是否是记录信息的最佳方式。


    实际上，在生产系统中使用 `print()` 来记录信息几乎从来都不是正确的答案，这有几个原因：


    - `print()` 函数默认将字符串写入标准输出（stdout）或标准错误输出（stderr），而后者默认将输出定向到控制台/终端。例如，当你在 IDE
    中运行应用程序时，输出会显示在控制台窗口中。如果你从命令行运行应用程序，那么输出会定向回该命令/终端窗口。这两种情况在开发期间都没问题，但如果程序不是从命令窗口运行的呢？也许它是由操作系统自动启动的（就像许多服务，如打印服务或
    Web 服务器那样）。在这种情况下，没有终端/控制台窗口来接收数据；数据就丢失了。实际上，stdout 和 stderr 输出流可以被定向到一个文件（或多个文件）。然而，这通常是在程序启动时完成的，并且很容易被忽略。此外，你只能选择将所有
    stdout 发送到特定文件，或将所有错误输出发送到 stderr。


    - 使用 `print()` 函数的另一个问题是，所有对 `print` 的调用都会被输出。使用大多数日志记录器时，可以指定所需的日志级别。这些不同的日志级别允许根据场景生成不同数量的信息。例如，在一个经过充分测试、可靠的生产系统中，我们可能只希望记录与错误相关或关键的信息。这将减少我们收集的信息量，并降低日志记录对应用程序引入的性能影响。然而，在测试阶段，我们可能希望有更详细的日志级别。


    - 在其他情况下，我们可能希望更改正在运行的生产系统所使用的日志级别，而无需修改实际代码（因为这有可能在代码中引入错误）。相反，我们希望能够从外部更改日志记录系统的行为方式，例如通过配置文件。这允许系统管理员修改正在记录的信息的数量和详细程度。它通常也允许更改日志信息的指定位置。


    - 最后，当使用 `print()` 函数时，开发者可以使用他们喜欢的任何格式，他们可以在消息中包含时间戳，也可以不包含；可以包含模块或函数/方法名称，也可以不包含；可以包含参数，也可以不包含。使用日志系统通常会标准化生成的信息以及日志消息。因此，所有日志消息都会有（或没有）时间戳，或者所有消息都会包含（或不包含）生成它们的函数或方法的信息等。


    ## Python 中的日志记录


    ### 日志模块


    Python 自 2.3 版本起就包含了一个内置的日志模块。这个模块，即 `logging` 模块，定义了实现灵活日志框架的函数和类，该框架可用于任何 Python
    应用程序/脚本或 Python 库/模块中。


    尽管不同的日志框架在提供的具体细节上有所不同；但几乎所有框架都提供相同的核心元素（尽管有时使用不同的名称）。Python 的 `logging` 模块也不例外，构成日志框架及其处理管道的核心元素如下所示（请注意，对于
    Java、Scala、C++ 等语言中的日志框架，也可以绘制非常类似的图表）。


    下图说明了一个使用内置 Python 日志框架将消息记录到文件的 Python 程序。


    ![](img/8a661fca3884547aede940b9a6567321_480_0.png)


    日志框架的核心元素（其中一些是可选的）如上所示，并在下面描述：


    - 日志消息：这是来自应用程序的要记录的消息。

    - 日志记录器（Logger）：为程序员提供进入日志系统的入口点/接口。`Logger` 类提供了多种方法，可用于记录不同级别的消息。

    - 处理器（Handler）：处理器决定将日志消息发送到哪里，默认处理器包括将消息发送到文件的文件处理器和将消息发送到 Web 服务器的 HTTP 处理器。

    - 过滤器（Filter）：这是日志管道中的一个可选元素。它们可用于进一步过滤要记录的信息，提供对哪些日志消息实际输出（例如输出到日志文件）的细粒度控制。

    - 格式器（Formatter）：这些用于根据需要格式化日志消息。这可能涉及向原始日志消息添加时间戳、模块和函数/方法信息等。

    - 配置信息：日志记录器（以及相关的处理器、过滤器和格式器）可以在 Python 中以编程方式配置，也可以通过配置文件配置。这些配置文件可以使用键值对编写，也可以使用
    YAML 文件（一种简单的标记语言）编写。YAML 代表“另一种标记语言”！


    值得注意的是，日志框架的大部分内容对开发者是隐藏的，开发者实际上只看到日志记录器；日志管道的其余部分要么通过默认配置，要么通过日志配置信息（通常以日志配置文件的形式）进行配置。


    ### 日志记录器


    日志记录器为程序员提供了进入日志管道的接口。`Logger` 对象通过 `logging` 模块中定义的 `getLogger()` 函数获取。以下代码片段演示了获取默认日志记录器并使用它记录错误消息。注意必须导入
    `logging` 模块：


    ```python

    import logging

    logger = logging.getLogger()

    logger.error(''This should be used with something unexpected'')

    ```


    这个简短应用程序的输出被记录到控制台，因为这是默认配置：


    This should be used with something unexpected


    ### 控制记录的信息量


    日志消息实际上与一个日志级别相关联。这些日志级别旨在指示被记录消息的严重性。Python 日志框架关联了六个不同的日志级别，它们是：


    - NOTSET：在此级别不进行任何日志记录，日志记录实际上被关闭。

    - DEBUG：此级别旨在提供详细信息，通常在开发者诊断应用程序中的错误或问题时感兴趣。

    - INFO：此级别预期提供的详细程度低于 DEBUG 日志级别，因为它预期提供可用于确认应用程序按预期工作的信息。

    - WARNING：用于提供有关意外事件的信息，或指示开发者或系统管理员可能希望进一步调查的某些可能问题。

    - ERROR：用于提供有关应用程序无法处理的某些严重问题或故障的信息，这可能意味着应用程序无法正常运行。

    - CRITICAL：这是最高级别的问题，保留用于关键情况，例如程序无法继续执行的情况。


    日志级别是相互关联的，并以层次结构定义。每个日志级别都有一个与之关联的数值，如下所示（尽管你永远不需要使用这些数字）。因此，INFO 是比 DEBUG 更高的日志级别，而
    ERROR 又是比 WARNING、INFO、DEBUG 等更高的日志级别。


    ![](img/8a661fca3884547aede940b9a6567321_483_0.png)'
