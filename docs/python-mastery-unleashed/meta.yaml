  md: '# PyMySQL Module


    The PyMySQL Module


    The PyMySQL module provides access to a MySQL database from Python. It implements
    the Python DB-API v 2.0. This module is a pure Python database interface implementation
    meaning that it is portable across different operating systems; this is notable
    because some database interface modules are merely wrappers around other (native)implementations
    that may or may not be available on different operating systems. For example,
    a native Linux based database inter- face module may not be available for the
    Windows operating system. If you are never going to switch between different operating
    systems, then this is not a problem of course.


    To use the PyMySQL module you will need to install it on your computer. This will
    involve using a tool such as Anaconda or adding it to your PyCharm project. You
    can also use pip to install it:


    ```

    > pip install PyMySQL

    ```'
  merge: -1
  pgno: 451
- img_proc: true
  md: '# Working with the PyMySQL Module


    To use the PyMySQL module to access a database you will need to follow these steps.


    +   1. Import the module.

    2. Make a connection to the host machine running the database and to the database
    you are using.

    3. Obtain a cursor object from the connection object.

    4. Execute some SQL using the cursor.execute() method.

    5. Fetch the result(s) of the SQL using the cursor object (e.g. fetchall, fetchmany
    or fetchone).

    6. Close the database connection.


    These steps are essentially boiler plate, code that is you will use them whenever
    you access a database via PyMySQL (or indeed any DB-API compliant module).


    We will take each of these steps in turn.


    # Importing the Module


    As the PyMySQL module is not one of the built-in modules provided by default with
    Python you will need to import the module into your code, for example using


    ```

    import pymysql

    ```'
