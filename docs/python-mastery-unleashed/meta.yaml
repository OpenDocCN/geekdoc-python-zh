    create new tables to be used with an application. This process follows exactly
    the same pattern as those used for INSERT, UPDATE and DELETE. The only difference
    is that the command sent to the database contains a CREATE statement with a description
    of the table to be created. This is illustrated below:


    ```

    import pymysql

    # Open database connection

    connection = pymysql.connect(''localhost'',

    ''user'',

    ''password'',

    ''uni-database'')

    # prepare a cursor object using cursor() method cursor =

    connection.cursor()

    try:

    # Execute CREATE command

    cursor.execute("CREATE TABLE log (message VARCHAR(100) NOT NULL)")

    ```'
  - '[PAGE 466]


    ```

    # Commit the changes to the database connection.commit()

    except:

    # rollback the changes if an exception / error

    connection.rollback()

    # Close the database connection connection.close()

    ```


    This creates a new table log within the uni-database; this can be seen by looking
    at the tables listed for the uni-database within the MySQL Workbench.


    ![](img/8a661fca3884547aede940b9a6567321_466_0.png)


    # Online Resources


    See the following online resources for more information on the Python Database
    API:


    +   - [https://pymysql.readthedocs.io/en/latest/ PyMySQL](https://pymysql.readthedocs.io/en/latest/
    PyMySQL) Documentation site.'
