    # Some Terminology


    The world of concurrent programming is full of terminology that you may not be
    familiar with. Some of those terms and concepts are outlined below:


    +   - Asynchronous versus Synchronous invocations. Most of the method, function
    or procedure invocations you will have seen in programming represent synchronous
    invocations. A synchronous method or function call is one which blocks the calling
    code from executing until it returns. Such calls are typically within a single
    thread of execution. Asynchronous calls are ones where the flow of control immediately
    returns to the caller and the caller is'
  merge: -1
  pgno: 530
- img_proc: true
  md: 'able to execute in its own thread of execution. Allowing both the caller and
    the call to continue processing.


    +   - Non-Blocking versus Blocking code. Blocking code is a term used to describe
    the code running in one thread of execution, waiting for some activity to complete
    which causes one of more separate threads of execution to also be delayed. For
    example, if one thread is the producer of some data and other threads are the
    consumers of that data, then the consumer treads cannot continue until the producer
    generates the data for them to consume. In contrast, non-blocking means that no
    thread is able to indefinitely delay others.


    +   - Concurrent versus Parallel code. Concurrent code and parallel code are similar,
    but different in one significant aspect. Concurrency indicates that two or more
    activities are both making progress even though they might not be executing at
    the same point in time. This is typically achieved by continuously swapping competing
    processes between execution and non-execution. This process is repeated until
    at least one of the threads of execution (Threads) has completed their task. This
    may occur because two threads are sharing the same physical processor with each
    is being given a short time period in which to progress before the other gets
    a short time period to progress. The two threads are said to be sharing the processing
    time using a technique known as time slicing. Parallelism on the other hand implies
    that there'
