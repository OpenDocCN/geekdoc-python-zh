- md: "## Introduction to Databases\n\n## Introduction\n\nThere are several different\
    \ types of database system in common use today including Object databases, NoSQL\
    \ databases and (probably the most common) Relational Databases. This chapter\
    \ focuses on Relational Databases as typified by database systems such as Oracle,\
    \ Microsoft SQL Server and MySQL. The database we will use in this book is MySQL.\n\
    \n## What Is a Database?\n\nA database is essentially a way to store and retrieve\
    \ data. Typically, there is some form of query language used with the database\
    \ to help select the information to retrieve such as SQL or Structured Query Language.\n\
    \nIn most cases there is a structure defined that is used to hold the data (although\
    \ this is not true of the newer NoSQL or non-relational unstructured databases\
    \ such as CouchDB or MongoDB).\n\nIn a Relational Database the data is held in\
    \ tables, where the columns define the properties or attributes of the data and\
    \ each row defines the actual values being held, for example:\n\n![](img/8a661fca3884547aede940b9a6567321_425_0.png)\n\
    \nIn this diagram there is a table called students; it is being used to hold information\
    \ about students attending a meeting. The table has 5 attributes (or columns)\
    \ defined for id, name, surname, subject and email.\n\nIn this case, the id is\
    \ probably what is known as a primary key. The primary key is a property that\
    \ is used to uniquely identify the student row; it cannot be omitted and must\
    \ be unique (within the table). Obviously names and subjects may well be duplicated\
    \ as there may be more than one student studying Animation or Games and students\
    \ may have the same first name or surname. It is probable that the email column\
    \ is also unique as students probably don’t share an email address but again this\
    \ may not necessarily be the case.\n\nYou might at this point wonder why the data\
    \ in a Relational Database is called relational and not tables or tabular? The\
    \ reason is because of a topic known as relational algebra that underpins Relational\
    \ Database theory. Relational Algebra takes its name from the mathematical concept\
    \ known as a relation. However, for the purposes of this chapter you don’t need\
    \ to worry about this and just need to remember that data is held in tables.\n\
    \n## Data Relationships\n\nWhen the data held in one table has a link or relationship\
    \ to data held in another table then an index or key is used to link the values\
    \ in one table to another. This is illustrated below for a table of addresses\
    \ and a table of people who live in that address. This shows for example, that\
    \ ‘Phoebe Gates’ lives at address ‘addr2’ which is 12 Queen Street, Bristol, BS42\
    \ 6YY.\n\n![](img/8a661fca3884547aede940b9a6567321_427_0.png)\n\nThis is an example\
    \ of a many to one (often written as many:1) relationship; that is there are many\
    \ people who can live at one address (in the above Adam Smith also lives at address\
    \ ‘addr2’). In Relational Databases there can be several different types of relationship\
    \ such as:\n\n- one:one where only one row in one table references one and only\
    \ one row in another table. An example of a one to one relationship might be from\
    \ a person to an order for a unique piece of jewellery.\n- one:many this is the\
    \ same as the above address example, however in this case the direction of the\
    \ relationship is reversed (that is to say that one address in the addresses table\
    \ can reference multiple persons in the people table).\n- many:many This is where\
    \ many rows in one table may reference many rows in a second table. For example,\
    \ many students may take a particular class and a student may take many classes.\
    \ This relationship usually involves an intermediate (join) table to hold the\
    \ associations between the rows.\n\n## The Database Schema\n\nThe structure of\
    \ a Relational Database is defined using a Data Definition Language or Data Description\
    \ Language (a DDL).\n\nTypically, the syntax of such a language is limited to\
    \ the semantics (meaning) required to define the structure of the tables. This\
    \ structure is known as the database schema. Typically, the DDL has commands such\
    \ as CREATE TABLE, DROP TABLE (to delete a table) and ALTER TABLE (to modify the\
    \ structure of an existing table).\n\nMany tools provided with a database allow\
    \ you to define the structure of the database without getting too bound up in\
    \ the syntax of the DDL; however, it is useful to be aware of it and to understand\
    \ that the database can be created in this way. For example, we will use the MySQL\
    \ database in this chapter. The MySQL Workbench is a tool that allows you to work\
    \ with MySQL databases to manage and query the data held within a particular database\
    \ instance. For references for MySQL and the MySQL Workbench see the links at\
    \ the end of this chapter.\n\nAs an example, within the MySQL Workbench we can\
    \ create a new table using a menu option on a database:\n\n![](img/8a661fca3884547aede940b9a6567321_429_0.png)\n\
    \nUsing this we can interactively define the columns that will comprise the table:\n\
    \n![](img/8a661fca3884547aede940b9a6567321_430_0.png)\n\nHere each column name,\
    \ its type and whether it is the primary key (PK), not empty (or Not Null NN)\
    \ or unique (UQ) have been specified. When the changes are applied, the tool also\
    \ shows you the DDL that will be used to create the database:\n\n```sql\nCREATE\
    \ TABLE `students`.`students` (\n  `id` INT NOT NULL,\n  `name` VARCHAR(45) NOT\
    \ NULL,\n  `surname` VARCHAR(45) NOT NULL,\n  `subject` VARCHAR(45) NOT NULL,\n\
    \  `email` VARCHAR(45) NOT NULL,\n  PRIMARY KEY (`id`),\n  UNIQUE INDEX `email_UNIQUE`\
    \ (`email` ASC));\n```\n\nWhen this is applied a new table is created in the database\
    \ as shown below:\n\n![](img/8a661fca3884547aede940b9a6567321_431_0.png)\n\nThe\
    \ tool also allows us to populate data into the table; this is done by entering\
    \ data into a grid and hitting apply as shown below:\n\n![](img/8a661fca3884547aede940b9a6567321_432_0.png)\n\
    \n## SQL and Databases\n\nWe can now use query languages to identify and return\
    \ data held in the database often using specific criteria.\n\nFor example, let\
    \ us say we want to return all the people who have the surname Jones from the\
    \ following table:\n\n| id | name | surname | subject | email |\n|---|---|---|---|---|\n\
    | cs_18 | Phoebe | Cooke | Animation | pc@my.com |\n| cs_21 | Gryff | Jones |\
    \ Games | gj@my.com |\n| cs_27 | Adam | Fosh | Music | af@my.com |\n| cs_29 |\
    \ Jasmine | Smith | Games | js@my.com |\n| cs_31 | Tom | Jones | Music | tj@my.com\
    \ |\n\nWe can do this by specifying that data should be returned where the surname\
    \ equals ‘Jones’; in SQL this would look like:\n\n```sql\nSELECT * FROM students\
    \ where surname='Jones';\n```\n\nThe above SELECT statement states that all the\
    \ properties (columns or attributes) in a row in the table students are to be\
    \ returned where the surname equals ‘Jones’. The result is that two rows are returned:\n\
    \n| id | name | surname | subject | email |\n|---|---|---|---|---|\n| 2 | Gryff\
    \ | Jones | Games | gj@my.com |\n| 5 | Tom | Jones | Music | tj@my.com |\n\nNote\
    \ we need to specify the table we are interested in and what data we want to return\
    \ (the ‘*’ after the select indicated we want all the data). If we were only interested\
    \ in their first names then we could use:\n\n```sql\nSELECT name FROM students\
    \ where surname='Jones';\n```\n\nThis would return only the names of the students:\n\
    \n```python\n# True\nprint(\"verify_postcode('SY23 3AA'):\", verify_postcode('SY23\
    \ 3AA'))\n# True\nprint(\"verify_postcode('SY23 4ZZ'):\", verify_postcode('SY23\
    \ 4ZZ'))\n# True\nprint(\"verify_postcode('BB1 3P0'):\", verify_postcode('BB1\
    \ 3P0'))\n# False\nprint(\"verify_postcode('AA111 NN56'):\", verify_postcode('AA111\
    \ NN56'))\n# True\nprint(\"verify_postcode('AA1 56NN'):\", verify_postcode('AA1\
    \ 56NN'))\n# False\nprint(\"verify_postcode('AA156NN'):\", verify_postcode('AA156NN'))\n\
    # False\nprint(\"verify_postcode('AA NN'):\", verify_postcode('AA NN'))\n```\n\
    \nWrite a function that will extract the value held between two strings or characters\
    \ such as ‘<’ and ‘>’. The function should take three parameters, the start character,\
    \ the end character and the string to process. For example, the following code\
    \ snippet:\n\n```python\nprint(extract_values('<', '>', '<John>'))\nprint(extract_values('<',\
    \ '>', '<42>'))\nprint(extract_values('<', '>', '<John 42>'))\nprint(extract_values('<',\
    \ '>', 'The <town> was in the <valley>'))\n```\n\nShould generate output such\
    \ as:\n\n```\n['John']\n['42']\n['John 42']\n['town', 'valley']\n```"
  mdcn: "## 数据库简介\n\n## 引言\n\n当今常用的数据库系统有多种类型，包括对象数据库、NoSQL数据库以及（可能是最常见的）关系型数据库。本章重点介绍关系型数据库，以Oracle、Microsoft\
    \ SQL Server和MySQL等数据库系统为代表。本书中我们将使用的数据库是MySQL。\n\n## 什么是数据库？\n\n数据库本质上是一种存储和检索数据的方式。通常，会使用某种形式的查询语言与数据库配合，以帮助选择要检索的信息，例如SQL或结构化查询语言。\n\
    \n在大多数情况下，会定义一个用于存放数据的结构（尽管对于较新的NoSQL或非关系型非结构化数据库，如CouchDB或MongoDB，情况并非如此）。\n\n\
    在关系型数据库中，数据存储在表中，其中列定义了数据的属性或特征，而每一行定义了实际存储的值，例如：\n\n![](img/8a661fca3884547aede940b9a6567321_425_0.png)\n\
    \n在此图中，有一个名为`students`的表；它用于存储参加会议的学生信息。该表定义了5个属性（或列），分别是`id`、`name`、`surname`、`subject`和`email`。\n\
    \n在这种情况下，`id`可能就是所谓的主键。主键是一种用于唯一标识学生行的属性；它不能被省略，并且必须是唯一的（在表内）。显然，姓名和科目很可能会重复，因为可能有多个学生学习动画或游戏，并且学生可能有相同的名字或姓氏。`email`列也可能是唯一的，因为学生可能不会共享电子邮件地址，但这也未必总是如此。\n\
    \n你可能会在此时疑惑，为什么关系型数据库中的数据被称为“关系型”而不是“表”或“表格”？原因在于一个称为关系代数的主题，它是关系型数据库理论的基础。关系代数的名称源于一个称为“关系”的数学概念。然而，就本章而言，你无需担心这一点，只需记住数据存储在表中即可。\n\
    \n## 数据关系\n\n当一个表中存储的数据与另一个表中存储的数据存在链接或关系时，会使用索引或键将一个表中的值链接到另一个表。下图说明了地址表和居住在该地址的人员表之间的关系。例如，它显示了“Phoebe\
    \ Gates”居住在地址“addr2”，即布里斯托尔皇后街12号，邮编BS42 6YY。\n\n![](img/8a661fca3884547aede940b9a6567321_427_0.png)\n\
    \n这是一个多对一（通常写作many:1）关系的例子；也就是说，许多人可以居住在一个地址（在上例中，Adam Smith也居住在地址“addr2”）。在关系型数据库中，可能存在几种不同类型的关系，例如：\n\
    \n-   一对一：一个表中的一行仅引用另一个表中的一行。一对一关系的一个例子可能是从一个人到一件独特珠宝的订单。\n-   一对多：这与上述地址示例相同，但在此情况下关系的方向相反（也就是说，地址表中的一个地址可以引用人员表中的多个人员）。\n\
    -   多对多：这是一个表中的多行可能引用第二个表中的多行的情况。例如，许多学生可能选修一门特定的课程，而一个学生可能选修多门课程。这种关系通常涉及一个中间（连接）表来存储行之间的关联。\n\
    \n## 数据库模式\n\n关系型数据库的结构使用数据定义语言或数据描述语言（DDL）来定义。\n\n通常，这种语言的语法仅限于定义表结构所需的语义（含义）。这种结构被称为数据库模式。通常，DDL包含诸如`CREATE\
    \ TABLE`、`DROP TABLE`（用于删除表）和`ALTER TABLE`（用于修改现有表的结构）等命令。\n\n许多随数据库提供的工具允许你在不深入纠结DDL语法的情况下定义数据库结构；然而，了解它并理解数据库可以通过这种方式创建是有用的。例如，我们将在本章中使用MySQL数据库。MySQL\
    \ Workbench是一个工具，允许你使用MySQL数据库来管理和查询特定数据库实例中存储的数据。有关MySQL和MySQL Workbench的参考资料，请参阅本章末尾的链接。\n\
    \n例如，在MySQL Workbench中，我们可以使用数据库上的菜单选项创建一个新表：\n\n![](img/8a661fca3884547aede940b9a6567321_429_0.png)\n\
    \n使用此功能，我们可以交互式地定义将构成表的列：\n\n![](img/8a661fca3884547aede940b9a6567321_430_0.png)\n\
    \n这里指定了每个列名、其类型以及它是否是主键（PK）、非空（或Not Null NN）或唯一（UQ）。当应用更改时，该工具还会显示将用于创建数据库的DDL：\n\
    \n```sql\nCREATE TABLE `students`.`students` (\n  `id` INT NOT NULL,\n  `name`\
    \ VARCHAR(45) NOT NULL,\n  `surname` VARCHAR(45) NOT NULL,\n  `subject` VARCHAR(45)\
    \ NOT NULL,\n  `email` VARCHAR(45) NOT NULL,\n  PRIMARY KEY (`id`),\n  UNIQUE\
    \ INDEX `email_UNIQUE` (`email` ASC));\n```\n\n应用此DDL后，将在数据库中创建一个新表，如下所示：\n\n\
    ![](img/8a661fca3884547aede940b9a6567321_431_0.png)\n\n该工具还允许我们将数据填充到表中；这是通过在网格中输入数据并点击应用来完成的，如下所示：\n\
    \n![](img/8a661fca3884547aede940b9a6567321_432_0.png)\n\n## SQL与数据库\n\n我们现在可以使用查询语言来识别和返回数据库中存储的数据，通常使用特定的条件。\n\
    \n例如，假设我们想从下表中返回所有姓氏为Jones的人：\n\n| id | name | surname | subject | email |\n|---|---|---|---|---|\n\
    | cs_18 | Phoebe | Cooke | Animation | pc@my.com |\n| cs_21 | Gryff | Jones |\
    \ Games | gj@my.com |\n| cs_27 | Adam | Fosh | Music | af@my.com |\n| cs_29 |\
    \ Jasmine | Smith | Games | js@my.com |\n| cs_31 | Tom | Jones | Music | tj@my.com\
    \ |\n\n我们可以通过指定在姓氏等于‘Jones’时返回数据来实现；在SQL中，这看起来像：\n\n```sql\nSELECT * FROM students\
    \ where surname='Jones';\n```\n\n上述`SELECT`语句表示，当姓氏等于‘Jones’时，将返回`students`表中一行的所有属性（列或特征）。结果是返回了两行：\n\
    \n| id | name | surname | subject | email |\n|---|---|---|---|---|\n| 2 | Gryff\
    \ | Jones | Games | gj@my.com |\n| 5 | Tom | Jones | Music | tj@my.com |\n\n注意，我们需要指定感兴趣的表以及想要返回的数据（`select`后的`*`表示我们想要所有数据）。如果我们只对他们的名字感兴趣，那么可以使用：\n\
    \n```sql\nSELECT name FROM students where surname='Jones';\n```\n\n这将只返回学生的名字：\n\
    \n```python\n# True\nprint(\"verify_postcode('SY23 3AA'):\", verify_postcode('SY23\
    \ 3AA'))\n# True\nprint(\"verify_postcode('SY23 4ZZ'):\", verify_postcode('SY23\
    \ 4ZZ'))\n# True\nprint(\"verify_postcode('BB1 3P0'):\", verify_postcode('BB1\
    \ 3P0'))\n# False\nprint(\"verify_postcode('AA111 NN56'):\", verify_postcode('AA111\
    \ NN56'))\n# True\nprint(\"verify_postcode('AA1 56NN'):\", verify_postcode('AA1\
    \ 56NN'))\n# False\nprint(\"verify_postcode('AA156NN'):\", verify_postcode('AA156NN'))\n\
    # False\nprint(\"verify_postcode('AA NN'):\", verify_postcode('AA NN'))\n```\n\
    \n编写一个函数，用于提取两个字符串或字符（如‘<’和‘>’）之间持有的值。该函数应接受三个参数：起始字符、结束字符和要处理的字符串。例如，以下代码片段：\n\
    \n```python\nprint(extract_values('<', '>', '<John>'))\nprint(extract_values('<',\
    \ '>', '<42>'))\nprint(extract_values('<', '>', '<John 42>'))\nprint(extract_values('<',\
    \ '>', 'The <town> was in the <valley>'))\n```\n\n应生成如下输出：\n\n```\n['John']\n\
    ['42']\n['John 42']\n['town', 'valley']\n```"
