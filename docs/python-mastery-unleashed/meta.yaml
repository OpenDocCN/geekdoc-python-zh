    The purpose of the pyplot module and the API it presents is to simplify the generation
    and manipulation of Matplotlib plots and charts.As a whole the Matplotlib library
    tries to make simple things easy and complex things possible. The primary way
    in which it achieves the first of these aims is through the pyplot API as this
    API has high level functions such as bar(), plot(), scatter() and pie() that make
    it easy to create bar charts, line plots, scatter graphs and pie charts.


    One point to note about the functions provided by the pyplot API is that they
    can often take very many parameters; however most of these parameters will have
    default values that in many situations will give you a reasonable default'
  merge: -1
