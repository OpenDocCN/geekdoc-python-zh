    unit on it. However, over time, to increase computer performance, hardware manufacturers
    added additional cores or processing units to chips. Thus a dual-core CPU chip
    has two processing units while a quad-core CPU chip has four processing units.
    This means that as far as the operating system of the computer is concerned, it
    has multiple CPUs on which it can run programs.


    Running processing at the same time, on multiple CPUs, can substantially improve
    the overall performance of an application.


    For example, let us assume that we have a program that will call three independent
    functions, these functions are:


    - make a backup of the current data held by the program,

    - print the data currently held by the program,

    - run an animation using the current data.


    Let us assume that these functions run sequentially, with the following timings:


    - the backup function takes 13 s,

    - the print function takes 15 s,

    - the animation function takes 10 s.


    This would result in a total of 38 s to perform all three operations. This is
    illustrated graphically below:


    ![](img/8a661fca3884547aede940b9a6567321_519_0.png)


    However, the three functions are all completely independent of each other. That
    is they do not rely on each other for any results or behavior; they do not need
    one of the other functions to complete before they can complete etc. Thus we can
    run each function concurrently.


    If the underlying operating system and program language being used support multiple
    processes, then we can potentially run each function in a separate process at
    the same time and obtain a significant speed up in overall execution time.


    If the application starts all three functions at the same time, then the maximum
    time before the main process can continue will be 15s, as that is the time taken
    by the longest function to execute. However, the main program may be able to continue
    as soon as all three functions are started as it also does not depend on the results
    from any of the functions; thus the delay may be negligible (although there will
    typically be some small delay as each process is set up). This is shown graphically
    below:


    ![](img/8a661fca3884547aede940b9a6567321_521_0.png)


    ## Parallelism


    A distinction is often made in Computer Science between concurrency and parallelism.
    In concurrency, separate independent tasks are performed potentially at the same
    time. In parallelism, a large complex task is broken down into a set of sub tasks.
    The sub tasks represent part of the overall problem. Each sub task can be executed
    at the same time. Typically it is necessary to combine the results of the sub
    tasks together to generate an overall result. These sub tasks are also very similar
    if not functionally exactly the same (although in general each sub task invocation
    will have been supplied with different data).


    Thus parallelism is when multiple copies of the same functionality are run at
    the same time, but on different data. Some examples of where parallelism can be
    applied include:


    - A web search engine. Such a system may look at many, many web pages. Each time
    it does so it must send a request to the appropriate web site, receive the result
    and process the data obtained. These steps are the same whether it is the BBC
    web site, Microsoft’s web site or the web site of Cambridge University. Thus the
    requests can be run sequentially or in parallel.

    - Image Processing. A large image maybe broken down into slices so that each slice
    can be analyzed in parallel.


    The following diagram illustrates the basic idea behind parallelism; a main program
    fires off three sub tasks each of which runs in parallel. The main program then
    waits for all the sub tasks to complete before combining together the results
    from the sub tasks before it can continue.


    ![](img/8a661fca3884547aede940b9a6567321_523_0.png)


    ## Distribution


    When implementing a concurrent or parallel solution, where the resulting processes
    run is typically an implementation detail. Conceptually these processes could
    run on the same processor, physical machine or on a remote or distributed machine.
    As such distribution, in which problems are solved or processes executed by sharing
    the work across multiple physical machines, is often related to concurrency and
    parallelism.


    However, there is no requirement to distribute work across physical machines,
    indeed in doing so extra work is usually involved.


    To distribute work to a remote machine, data and in many cases code, must be transferred
    and made available to the remote machine. This can result in significant delays
    in running the code remotely and may offset any potential performance advantages
    of using a physically separate computer. As a result many concurrent/ parallel
    technologies default to executing code in a separate process on the same machine.


    ## Grid Computing


    Grid Computing is based on the use of a network of loosely coupled computers,
    in which each computer can have a job submitted to it, which it will run to completion
    before returning a result.


    In many cases the grid is made up of a heterogeneous set of computers (rather
    than all computers being the same) and may be geographically dispersed. These
    computers may be comprised of both physical computers and virtual machines.


    ![](img/8a661fca3884547aede940b9a6567321_525_0.png)


    ## Grid


    A Virtual Machine is a piece of software that emulates a whole computer and runs
    on some underlying hardware that is shared with other virtual machines. Each Virtual
    Machine thinks it is the only computer on the hardware; however the virtual machines
    all share the resources of the physical computer. Multiple virtual machines can
    thus run simultaneously on the same physical computer. Each virtual machine provides
    its own virtual hardware, including CPUs, memory, hard drives, network interfaces
    and other devices. The virtual hardware is then mapped to the real hardware on
    the physical machine which saves costs by reducing the need for physical hardware
    systems along with the associated maintenance costs, as well as reducing the power
    and cooling demands of multiple computers.


    Within a grid, software is used to manage the grid nodes and to submit jobs to
    those nodes. Such software will receive the jobs to perform (programs to run and
    information about the environment such as libraries to use) from clients of the
    grid. These jobs are typically added to a job queue before a job scheduler submits
    them to a node within the grid. When any results are generated by the job they
    are collected from the node and returned to the client. This is illustrated below:


    ![](img/8a661fca3884547aede940b9a6567321_526_0.png)


    The use of grids can make distributing concurrent/parallel processes amongst a
    set of physical and virtual machines much easier.


    ## Concurrency and Synchronization


    Concurrency relates to executing multiple tasks at the same time. In many cases
    these tasks are not related to each other such as printing a document and refreshing
    the User Interface. In these cases, the separate tasks are completely independent
    and can execute at the same time without any interaction.


    In other situations multiple concurrent tasks need to interact; for example, where
    one or more tasks produce data and one or more other tasks consume that data.
    This is often referred to as a producer-consumer relationship. In other situations,
    all parallel processes must have reached the same point before some other behaviour
    is executed.


    Another situation that can occur is where we want to ensure that only one concurrent
    task executes a piece of sensitive code at a time; this code must therefore be
    protected from concurrent access.


    Concurrent and parallel libraries need to provide facilities that allow for such
    synchronization to occur.


