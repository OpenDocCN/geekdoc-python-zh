    # Bar Charts


    A Bar Chart is a type of chart or graph that is used to present different discrete
    categories of data. The data is usually presented vertically although in some
    cases horizontal bar charts may be used. Each category is represented by a bar
    whose height (or length) represents the data for that category.


    Because it is easy to interpret bar charts, and how each category relates to another,
    they are one of the most commonly used types of chart. There are also several
    different common variations such as grouped bar charts and stacked bar charts.


    The following is an example of a typical bar chart. Five categories of programming
    languages are presented along the x axis while the y axis indicates percentage
    usage. Each bar then represents the usage percentage associated with each programming
    language.'
