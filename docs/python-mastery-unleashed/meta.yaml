    The file.close() method is used to close the file once you have finished with
    it.This will flush any unwritten information to the file (this may occur because
    of buffering) and will close the reference from the file object to the actual
    underlying operating system file. This is important to do as leaving a reference
    to a file open can cause problems in larger applications as typically there are
    only a certain number of file references possible at one time and over a long
    period of time these may all be used up resulting in future errors being thrown
    as files can no longer be opened.


