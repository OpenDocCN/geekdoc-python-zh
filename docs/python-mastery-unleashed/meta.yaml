    Data can also be inserted into a table or existing data in a table can be updated.
    This is done using the Data Manipulation Language (DML).


    For example, to insert data into a table we merely need to write an INSERT SQL
    statement providing the values to be added and how they map to the columns in
    the table:


    ```sql

    INSERT INTO ''students''(''id'', ''name'', ''surname'', ''subject'', ''email'')
    VALUES (''6'', ''James'', ''Andrews'', ''Games'', ''ja@my.com'');

