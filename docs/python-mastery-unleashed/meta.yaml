    # Disadvantages of Reactive Programming


    Its easy to over complicate things when you start to chain operators together.
    If you use too many operators, or too complex a set of functions with the operators,it
    can become hard to understand what is going on.


    Many developers think that Reactive programming is inherently multi-threaded;
    this is not necessarily the case; in fact RxPy (the library explored in the next
    two chapters) is single threaded by default. If an application needs the behavior
    to execute asynchronously then it is necessary to explicitly indicate this.


    Another issue for some Reactive programming frameworks is that it can become memory
    intensive to store streams of data so that Observers can processes that data when
    they are ready.


    # TheRxPy Reactive Programming Framework


    The RxPy library is a part of the larger ReactiveX project and provides an implementation
    of ReactiveX for Python. It is built on the concepts of Observables, Observers,
    Subjects and operators. In this book we use RxPy version 3.'
