    \ by Microsoft that allows users to work with spreadsheets. It is a very widely\
    \ used tool and files using the Excel file format are commonly encountered within\
    \ many organizations. It is in effect the industry standard for spreadsheets and\
    \ as such is a very useful tool to have in the developers toolbox.\n\n### Excel\
    \ Files\n\nAlthough CSV files are a convenient and simple way to handle data;\
    \ it is very common to need to be able to read or write Excel files directly.\
    \ To this end there are several libraries available in Python for this purpose.\
    \ One widely used library is the OpenPyXL library. This library was originally\
