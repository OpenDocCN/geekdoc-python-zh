  md: 'appropriate action (such as triggering a change in their own state or performing
    some action).


    In addition the state is typically represented explicitly:


    +   - State. This role may be played by an object that is used to share information
    about the change in state that has occurred within the Observable. This might
    be as simple as a String indicating the new state of the Observable or it might
    be a data oriented object that provides more detailed information.


    These roles are illustrated in the following figure.


    ![](img/8a661fca3884547aede940b9a6567321_642_0.png)


    In the above figure, the Observable object publishes data to a Data Stream.The
