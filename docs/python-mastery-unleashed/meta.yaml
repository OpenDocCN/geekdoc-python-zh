    side limits (such as those imposed by IE or Apple’s Safari (which usually have
    a 2 KBlimit). If the limit is exceeded in either a browser or on the server, then
    most systems will just truncate the characters outside the limit (in some cases
    without any warning).


    Typically such data is therefore sent in the body of the HTTP request as part
    of a HTTP Post request. This limit on the same of a Post requests message body
    is much higher (usually up to 2 GB). This means that it is a much more reliable
    and safer way to transfer data to a web service. However, it should be noted that
    this does not mean that the data is any more secure than if it is part of the
    URL; just that it is sent in a different way. From the point of view of the Python
    functions that are invoked as the result of a HTTP Post method request it means
