    \n在考虑日志级别时，这个层次结构很重要。如果当前日志记录器未设置日志级别，它将查看其父级，以检查该日志记录器是否设置了日志级别。如果设置了，那将就是使用的日志级别。这种在日志记录器层次结构中向上回溯的搜索将持续进行，直到找到显式设置的日志级别或遇到根日志记录器（其默认日志级别为\
