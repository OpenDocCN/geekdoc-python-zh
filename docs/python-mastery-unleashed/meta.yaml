  md: '# Reactive Programming Introduction


    # Introduction


    In this chapter we will introduce the concept of Reactive Programming. Reactive
    programming is a way of write programs that allow the system to reactive to data
    being published to it. We will look at the RxPy library which provides a Python
    implementation of the ReactiveX approach to Reactive Programming.


    # What Is a Reactive Application?


    A Reactive Application is one that must react to data; typically either to the
    presence of new data, or to changes in existing data. The Reactive Manifesto presents
    the key characteristics of Reactive Systems as:


    +   - Responsive. This means that such systems respond in a timely manner. Here
    of course timely will differ depending upon the application and domain; in one
    situation a second may be timely in another it may be far too slow.'
  merge: -1
  pgno: 638
- img_proc: true
  md: '+   - Resilient. Such systems stay responsive in the face of failure. The systems
    must therefore be designed to handle failure gracefully and continue to work appropriately
    following the failure.

    - Elastic. As the workload grows the system should continue to be responsive.

    - Message Driven. Information is exchanged between elements of a reactive system
    using messages. This ensures loose coupling, isolation and location transparency
    between these components.


    As an example, consider an application that lists a set of Equity Stock Trade
    values based on the latest market stick price data. This application might present
    the current value of each trade within a table. When new market stock price data
    is published, then the application must update the value of the trade within the
    table. Such an application can be described as being reactive.


    Reactive Programming is a programming style (typically supported by libraries)
    that allows code to be written that follow the ideas of reactive systems. Of course
    just because part of an application uses a Reactive Programming library does not
    make the whole application reactive; indeed it may only be necessary for part
    of an application to exhibit reactive behavior.'
  merge: -1
