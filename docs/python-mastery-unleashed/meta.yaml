  md: "The Pool class provides a constructor which takes a number of arguments:\n\n\
    ```\nclass multiprocessing.pool.Pool(processes,\n    initializer, initargs, maxtasksperchild,\
    \ context)\n```\n\nThese represent:\n\n+   - processes is the number of worker\
    \ processes to use. If processes is None then the number returned by os.cpu__count()\
    \ is used.\n- initializer If initializer is not None then each worker process\
