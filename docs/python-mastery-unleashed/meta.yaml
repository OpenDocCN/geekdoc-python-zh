  md: '# Using a Barrier


    Using a threading.Barrier (or multiprocessing.Barrier) is one of the simplest
    ways in which the execution of a set of Threads (or Processes) can be synchronized.
    The threads or processes involved in the barrier are known as the parties that
    are taking part in the barrier. Each of the parties in the barrier can work independently
    until it reaches the barrier point in the code.


    The barrier represents an end point that all parties must reach before any further
    behavior can be triggered. At the point that all the parties reach the barrier
    it is possible to optionally trigger a post-phase action (also known as the barrier
    call- back). This post phase action represents some behavior that should be run
    when all parties reach the barrier but before allowing those parties to continue.
    The post-phase action (the callback) executes in a single thread (or process).Once
    it is completed then all the parties are unblocked and may continue.


    This is illustrated in the following diagram. Threads t1, t2 and t3 are all involved
    in the barrier. When thread t1 reaches the barrier it must wait until it is released
    by the barrier. Similarly when t2 reaches the barrier it must wait. When t3 finally
    reaches the barrier the callback is invoked. Once the callback'
  merge: -1
  pgno: 579
- img_proc: true
  md: 'has completed the barrier releases all three threads which are then able to
    continue.


    ![](img/8a661fca3884547aede940b9a6567321_580_0.png)


    An example of using a Barrier object is given below. Note that the function being
    invoked in each Thread must also cooperate in using the barrier as the code will
    run up to the barrier.wait() method and then wait until all other threads have
    also reached this point before being allowed to continue.


    The Barrier is a class that can be used to create a barrier object. When the Barrier
    class is instantiated, it can be provided with three parameters:


    where'
