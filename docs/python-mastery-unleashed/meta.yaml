  - '[PAGE 213]


    This will load the image from the specified file onto a surface. One thing you
    might wonder at is the use of the convert() method on the object returned from
    the pygame.image.load() function. This function returns a Surface that is used
    to display the image contained in the file. We call the method convert() on this
    Surface, not to convert the image from a particular file format (such as PNG,
    or JPEG) instead this method is used to convert the pixel format used by the Surface.
    If the pixel format used by the Surface is not the same as the display format,
    then it will need to be converted on the fly each time the image is displayed
    on the screen; this can be a fairly time consuming (and unnecessary) process.
    We therefore do this once when the image is loaded which means that it should
    not hinder runtime performance and may improve performance significantly on some
    systems.


    Once you have a surface containing an image it can be rendered onto another surface,
    such as the display surface using the Surface.blit() method. For example:


    ```

    display_surface.blit(image_surface, (x, y))

    ```


    Note that the position argument is a tuple specifying the x and y coordinates
    to the image on the display surface. Strictly speaking the blit() method draws
    one surface (the source surface)'
  - '[PAGE 214]


    onto another surface at the destination coordinates. Thus the target surface does
    not need to be the top level display surface.


    Clock. A Clock object is an object that can be used to track time. In particular
    it can be used to define the frame rate for the game. That is the number of frames
    rendered per second.This is done using the Clock.tick() method. This method should
    be called once (and only once) per frame. If you pass the optional frame rate
    argument to the tick() the function, then pygame will ensure that the games refresh
    rate is slower then the the given ticks per second. This can be used to help limit
    the runtime speed of a game. By calling clock.tick (30) once per frame, the program
    will never run at more than 30 frames per second.


    # A More Interactive pygame Application


