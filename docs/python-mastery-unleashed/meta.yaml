- md: "This will load the image from the specified file onto a surface. One thing\
    \ you might wonder at is the use of the convert() method on the object returned\
    \ from the pygame.image.load() function. This function returns a Surface that\
    \ is used to display the image contained in the file. We call the method convert()\
    \ on this Surface, not to convert the image from a particular file format (such\
    \ as PNG, or JPEG) instead this method is used to convert the pixel format used\
    \ by the Surface. If the pixel format used by the Surface is not the same as the\
    \ display format, then it will need to be converted on the fly each time the image\
    \ is displayed on the screen; this can be a fairly time consuming (and unnecessary)\
    \ process. We therefore do this once when the image is loaded which means that\
    \ it should not hinder runtime performance and may improve performance significantly\
    \ on some systems.\n\nOnce you have a surface containing an image it can be rendered\
    \ onto another surface, such as the display surface using the Surface.blit() method.\
    \ For example:\n\n```\ndisplay_surface.blit(image_surface, (x, y))\n```\n\nNote\
    \ that the position argument is a tuple specifying the x and y coordinates to\
    \ the image on the display surface. Strictly speaking the blit() method draws\
    \ one surface (the source surface) onto another surface at the destination coordinates.\
    \ Thus the target surface does not need to be the top level display surface.\n\
    \nClock. A Clock object is an object that can be used to track time. In particular\
    \ it can be used to define the frame rate for the game. That is the number of\
    \ frames rendered per second. This is done using the Clock.tick() method. This\
    \ method should be called once (and only once) per frame. If you pass the optional\
    \ frame rate argument to the tick() the function, then pygame will ensure that\
    \ the games refresh rate is slower than the given ticks per second. This can be\
    \ used to help limit the runtime speed of a game. By calling clock.tick(30) once\
    \ per frame, the program will never run at more than 30 frames per second.\n\n\
    ## A More Interactive pygame Application\n\nThe first pygame application we looked\
    \ at earlier just displayed a window with the caption ‘Hello World’. We can now\
    \ extend this a little by playing with some of the features we have looked at\
    \ above.\n\nThe new application will add some mouse event handling. This will\
    \ allow us to pickup the location of the mouse when the user clicked on the window\
    \ and draw a small blue box at that point.\n\nIf the user clicks the mouse multiple\
    \ times we will get multiple blue boxes being drawn. This is shown below.\n\n\
    ![](img/8a661fca3884547aede940b9a6567321_215_0.png)\n\nThis is still not much\
    \ of a game but does make the pygame application more interactive.\n\nThe program\
    \ used to generate this application is presented below:\n\n```\nimport pygame\n\
    FRAME_REFRESH_RATE = 30\nBLUE = (0, 0, 255)\nBACKGROUND = (255, 255, 255) # White\n\
    WIDTH = 10\nHEIGHT = 10\ndef main():\n    print('Initialising PyGame')\n    pygame.init()\
    \ # Required by every PyGame application\n    print('Initialising Box Game')\n\
    \    display_surface = pygame.display.set_mode((400, 300))\n    pygame.display.set_caption('Box\
    \ Game')\n    print('Update display')\n    pygame.display.update()\n    print('Setup\
    \ the Clock')\n    clock = pygame.time.Clock()\n    # Clear the screen of current\
    \ contents\n    display_surface.fill(BACKGROUND)\n    print('Starting main Game\
    \ Playing Loop')\n    running = True\n    while running:\n        for event in\
    \ pygame.event.get():\n            if event.type == pygame.QUIT:\n           \
    \     print('Received Quit Event:', event)\n                running = False\n\
    \            elif event.type == pygame.MOUSEBUTTONDOWN:\n                print('Received\
    \ Mouse Event', event)\n                x, y = event.pos\n                pygame.draw.rect(display_surface,\
    \ BLUE, [x, y, WIDTH, HEIGHT])\n        # Update the display\n        pygame.display.update()\n\
    \        # Defines the frame rate - the number of frames per second\n        #\
    \ Should be called once per frame (but only once)\n        clock.tick(FRAME_REFRESH_RATE)\n\
    \    print('Game Over')\n    # Now tidy up and quit Python\n    pygame.quit()\n\
    ```\n\n```\nif __name__ == '__main__':\n    main()\n```\n\nNote that we now need\
    \ to record the display surface in a local variable so that we can use it to draw\
    \ the blue rectangles. We also need to call the pygame.display.update() function\
    \ each time round the main while loop so that the new rectangles we have drawn\
    \ as part of the event processing for loop are displayed to the user.\n\nWe also\
    \ set the frame rate each time round the main while loop. This should happen once\
    \ per frame (but only once) and uses the clock object initialized at the start\
    \ of the program.\n\n## Alternative Approach to Processing Input Devices\n\nThere\
    \ are actually two ways in which inputs from a device such as a mouse, joystick\
    \ or the keyboard can be processed. One approach is the Event based model described\
    \ earlier. The other approach is the State based approach.\n\nAlthough the Event\
    \ based approach has many advantages it has two disadvantages:\n\n- Each event\
    \ represents a single action and continuous actions are not explicitly represented.\
    \ Thus if the user presses both the X key and the Z key then this will generate\
    \ two events and it will be up to the program to determine that they have been\
    \ pressed at the same time.\n- It is also up to the program to determine that\
    \ the user is still pressing a key (by noting that no KEYUP event has occurred).\n\
    - Both of these are possible but can be error prone.\n\nAn alternative approach\
    \ is to use the State based approach. In the state based approach the program\
    \ can directly check the state of a input device (such as a key or mouse or keyboard).\
    \ For example, you can use pygame.key.get_pressed() which returns the state of\
    \ all the keys. This can be used to determine if a specific key is being pressed\
    \ at this moment in time. For example, pygame.key.get_pressed()[pygame.K_SPACE]\
    \ can be used to check to see if the space bar is being pressed.\n\nThis can be\
    \ used to determine what action to take. If you keep checking that the key is\
    \ pressed then you can keep performing the associated action. This can be very\
    \ useful for continuous actions in a game such as moving an object etc.\n\nHowever,\
    \ if the user presses a key and then releases it before the program checks the\
    \ state of the keyboard then that input will be missed.\n\n## pygame Modules\n\
    \nThere are numerous modules provided as part of pygame as well as associated\
    \ libraries. Some of the core modules are listed below:\n\n- **pygame.display**\
    \ This module is used to control the display window or screen. It provides facilities\
    \ to initialize and shutdown the display module. It can be used to initialize\
    \ a window or screen. It can also be used to cause a window or screen to refresh\
    \ etc.\n- **pygame.event** This module manages events and the event queue. For\
    \ example pygame.event.get() retrieves events from the event queue, pygame.event.poll()\
    \ gets a single event from the queue and pygame.event.peek() tests to see if there\
    \ are any event types on the queue.\n- **pygame.draw** The draw module is used\
    \ to draw simple shapes onto a Surface. For example, it provides functions for\
    \ drawing a rectangle (pygame.draw.rect), a polygon, a circle, an ellipse, a line\
    \ etc.\n- **pygame.font** The font module is used to create and render TrueType\
    \ fonts into a new Surface object. Most of the features associated with fonts\
    \ are supported by the pygame.font.Font class. Free standing module functions\
    \ allow the module to be initialized and shutdown, plus functions to access fonts\
    \ such as pygame.font.get_fonts() which provides a list of the currently available\
    \ fonts.\n- **pygame.image** This module allows images to be saved and loaded.\
    \ Note that images are loaded into a Surface object (there is no Image class unlike\
    \ many other GUI oriented frameworks).\n- **pygame.joystick** The joystick module\
    \ provides the Joystick object and several supporting functions. These can be\
    \ used for interacting with joysticks, game pads and trackballs.\n- **pygame.key**\
    \ This module provides support for working with inputs from the keyboard. This\
    \ allows the input keys to be obtained and modifier keys (such as Control and\
    \ Shift) to be identified. It also allows the approach to repeating keys to be\
    \ specified.\n- **pygame.mouse** This module provides facilities for working with\
    \ mouse input such as obtaining the current mouse position, the state of mouse\
    \ buttons as well as the image to use for the mouse.\n- **pygame.time** This is\
    \ the pygame module for managing timing within a game. It provides the pygame.time.Clock\
    \ class that can be used to track time."
  mdcn: "这将把指定文件中的图像加载到一个Surface上。你可能会对`pygame.image.load()`函数返回的对象上调用`convert()`方法感到疑惑。该函数返回一个用于显示文件中图像的Surface。我们在这个Surface上调用`convert()`方法，并非为了将图像从特定文件格式（如PNG或JPEG）转换，而是用于转换Surface所使用的像素格式。如果Surface使用的像素格式与显示格式不同，那么每次在屏幕上显示图像时都需要进行实时转换；这可能是一个相当耗时（且不必要）的过程。因此，我们在加载图像时一次性完成此操作，这意味着它不会阻碍运行时性能，并且可能在某些系统上显著提升性能。\n\
    \n一旦你有了一个包含图像的Surface，就可以使用`Surface.blit()`方法将其渲染到另一个Surface上，例如显示Surface。例如：\n\
    \n```\ndisplay_surface.blit(image_surface, (x, y))\n```\n\n请注意，位置参数是一个元组，指定了图像在显示Surface上的x和y坐标。严格来说，`blit()`方法是将一个Surface（源Surface）绘制到另一个Surface的目标坐标上。因此，目标Surface不一定是顶层的显示Surface。\n\
    \nClock。一个Clock对象是一个可用于跟踪时间的对象。具体来说，它可以用于定义游戏的帧率，即每秒渲染的帧数。这是通过`Clock.tick()`方法实现的。该方法应在每帧调用一次（且仅一次）。如果你向`tick()`函数传递可选的帧率参数，那么pygame将确保游戏的刷新率低于给定的每秒tick数。这可用于帮助限制游戏的运行时速度。通过每帧调用`clock.tick(30)`，程序将永远不会以超过每秒30帧的速度运行。\n\
    \n## 一个更具交互性的pygame应用\n\n我们之前看到的第一个pygame应用只是显示了一个标题为“Hello World”的窗口。我们现在可以通过使用上面讨论的一些功能来稍微扩展一下这个应用。\n\
    \n新应用将添加一些鼠标事件处理。这将允许我们在用户点击窗口时获取鼠标位置，并在该点绘制一个小的蓝色方框。\n\n如果用户多次点击鼠标，我们将绘制多个蓝色方框。如下所示。\n\
    \n![](img/8a661fca3884547aede940b9a6567321_215_0.png)\n\n这仍然算不上一个游戏，但确实使pygame应用更具交互性。\n\
    \n用于生成此应用的程序如下所示：\n\n```\nimport pygame\nFRAME_REFRESH_RATE = 30\nBLUE = (0, 0,\
    \ 255)\nBACKGROUND = (255, 255, 255) # White\nWIDTH = 10\nHEIGHT = 10\ndef main():\n\
    \    print('Initialising PyGame')\n    pygame.init() # Required by every PyGame\
    \ application\n    print('Initialising Box Game')\n    display_surface = pygame.display.set_mode((400,\
    \ 300))\n    pygame.display.set_caption('Box Game')\n    print('Update display')\n\
    \    pygame.display.update()\n    print('Setup the Clock')\n    clock = pygame.time.Clock()\n\
    \    # Clear the screen of current contents\n    display_surface.fill(BACKGROUND)\n\
    \    print('Starting main Game Playing Loop')\n    running = True\n    while running:\n\
    \        for event in pygame.event.get():\n            if event.type == pygame.QUIT:\n\
    \                print('Received Quit Event:', event)\n                running\
    \ = False\n            elif event.type == pygame.MOUSEBUTTONDOWN:\n          \
    \      print('Received Mouse Event', event)\n                x, y = event.pos\n\
    \                pygame.draw.rect(display_surface, BLUE, [x, y, WIDTH, HEIGHT])\n\
    \        # Update the display\n        pygame.display.update()\n        # Defines\
    \ the frame rate - the number of frames per second\n        # Should be called\
    \ once per frame (but only once)\n        clock.tick(FRAME_REFRESH_RATE)\n   \
    \ print('Game Over')\n    # Now tidy up and quit Python\n    pygame.quit()\n```\n\
    \n```\nif __name__ == '__main__':\n    main()\n```\n\n请注意，我们现在需要将显示Surface记录在一个局部变量中，以便我们可以用它来绘制蓝色矩形。我们还需要在主while循环的每次迭代中调用`pygame.display.update()`函数，以便将我们在事件处理for循环中绘制的新矩形显示给用户。\n\
    \n我们还在主while循环的每次迭代中设置帧率。这应该每帧发生一次（且仅一次），并使用程序开始时初始化的clock对象。\n\n## 处理输入设备的替代方法\n\
    \n实际上，有两种方法可以处理来自设备（如鼠标、摇杆或键盘）的输入。一种方法是前面描述的基于事件的模型。另一种方法是基于状态的方法。\n\n尽管基于事件的方法有许多优点，但它有两个缺点：\n\
    \n- 每个事件代表一个单一动作，连续动作没有被明确表示。因此，如果用户同时按下X键和Z键，这将生成两个事件，程序需要判断它们是同时被按下的。\n- 程序还需要判断用户是否仍在按住一个键（通过注意没有发生KEYUP事件）。\n\
    - 这两种情况都是可能的，但可能容易出错。\n\n一种替代方法是使用基于状态的方法。在基于状态的方法中，程序可以直接检查输入设备（如按键、鼠标或键盘）的状态。例如，你可以使用`pygame.key.get_pressed()`，它返回所有按键的状态。这可用于确定特定按键在当前时刻是否被按下。例如，`pygame.key.get_pressed()[pygame.K_SPACE]`可用于检查空格键是否被按下。\n\
    \n这可用于决定采取什么动作。如果你持续检查按键是否被按下，你就可以持续执行相关动作。这对于游戏中的连续动作（如移动物体等）非常有用。\n\n然而，如果用户按下一个键然后在程序检查键盘状态之前释放它，那么该输入将被错过。\n\
    \n## pygame模块\n\npygame提供了众多模块以及相关的库。一些核心模块如下所列：\n\n- **pygame.display** 此模块用于控制显示窗口或屏幕。它提供了初始化和关闭显示模块的设施。它可用于初始化窗口或屏幕。它也可用于使窗口或屏幕刷新等。\n\
    - **pygame.event** 此模块管理事件和事件队列。例如，`pygame.event.get()`从事件队列中检索事件，`pygame.event.poll()`从队列中获取单个事件，`pygame.event.peek()`测试队列中是否有任何事件类型。\n\
    - **pygame.draw** draw模块用于在Surface上绘制简单形状。例如，它提供了绘制矩形（`pygame.draw.rect`）、多边形、圆形、椭圆、线条等的函数。\n\
    - **pygame.font** font模块用于创建TrueType字体并将其渲染到新的Surface对象中。与字体相关的大多数功能都由`pygame.font.Font`类支持。独立的模块函数允许模块被初始化和关闭，以及访问字体的函数，如`pygame.font.get_fonts()`，它提供当前可用字体的列表。\n\
    - **pygame.image** 此模块允许保存和加载图像。请注意，图像被加载到Surface对象中（与许多其他面向GUI的框架不同，没有Image类）。\n\
    - **pygame.joystick** joystick模块提供Joystick对象和几个支持函数。这些可用于与摇杆、游戏手柄和轨迹球进行交互。\n-\
    \ **pygame.key** 此模块提供对键盘输入处理的支持。这允许获取输入按键并识别修饰键（如Control和Shift）。它还允许指定按键重复的方法。\n\
    - **pygame.mouse** 此模块提供处理鼠标输入的设施，例如获取当前鼠标位置、鼠标按钮状态以及用于鼠标的图像。\n- **pygame.time**\
    \ 这是pygame中用于管理游戏内计时的模块。它提供了`pygame.time.Clock`类，可用于跟踪时间。"
