- img_proc: true
  md: '4.29 billion possible unique addresses. This seemed a huge amount in 1981 and
    certainly enough for what was imagined at the time for the internet.


    Since 1981 the internet has become the backbone to not only the World Wide Web
    itself, but also to the concept of the Internet of Things (in which every possible
    device might be connected to the internet from your fridge, to your central heating
    system to your toaster). This potential explosion in internet addressable devices/
    hosts lead in the mid 1990 as to concerns about the potential lack of internet
    addresses using IPv4. The IETF therefore designed a new version of the Internet
    Protocol; Internet Protocol version 6 (or IPv6). This was ratified as an Internet
    Standard in July 2017.


    IPv6 uses a 128 bit address for each element in a hosts address. It also uses
    eight number groups (rather than 4) which are separated by a colon. Each number
    group has four hexadecimal digits.


    The following illustrates what an IPv6 address looks like:


    ```

    2001:0DB8:AC10:FE01:EF69:B5ED:DD57:2CLE

    ```


    Uptake of the IPv6 protocol has been slower than was originally expected, this
    is in part because the IPv4 and IPv6 have not been designed to be interoperable
    but also because'
