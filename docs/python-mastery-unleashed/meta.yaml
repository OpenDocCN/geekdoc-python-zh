  - '[PAGE 370]


    Binary IO aka Buffered IO is a filter stream that wraps a lower level RawIOBase
    stream(such as a FileIO stream). The classes implementing buffered IO all extend
    the BufferedIOBase class and are:


    BufferedReader When reading data from this object, a larger amount of data may
    be requested from the underlying raw stream, and kept in an internal buffer. The
    buffered data can then be returned directly on subsequent reads.


    BufferedWriter When writing to this object, data is normally placed into an internal
    buffer. The buffer will be written out to the underlying RawIOBase object under
    various conditions, including:


    +   - when the buffer gets too small for all pending data;

    - when flush() is called;

    - when the BufferedWriter object is closed or destroyed.


    BufferedRandom A buffered interface to random access streams. It supports seek()
    and tell() functionality.


    BufferedRWPair A buffered I/O object combining two unidirectional RawIOBase objects
    – one readable, the other writeable—into a single bidirectional endpoint.


    Each of the above classes wrap a lower level byte oriented stream class such as
    the io.FileIO class, for example:'
