- md: '## Smoke Tests


    A smoke test is a test or suite of tests designed to verify that the fundamentals
    of the system work. Smoke tests may be run against a new deployment or a patched
    deployment in order to verify that the installation performs well enough to justify
    further testing. Failure to pass a smoke test would halt any further testing until
    the smoke tests pass. The name derives from the early days of electronics: If
    a device began to smoke after it was powered on, testers knew that there was no
    point in testing it further. For software technologies, the advantages of performing
    smoke tests include:


    - Smoke tests are often automated and standardized from one build to another.

    - Because smoke tests validate things that are expected to work, when they fail
    it is usually an indication that something fundamental has gone wrong (the wrong
    version of a library has been used) or that a new build has introduced a bug into
    core aspects of the system.

    - If a system is built daily, it should be smoke tested daily.

    - It will be necessary to periodically add to the smoke tests as new functionality
    is added to the system.


    ## Automating Testing


    The actual way in which tests are written and executed needs careful consideration.
    In general, we wish to automate as much of the testing process as is possible
    as this makes it easy to run the tests and also ensures not only that all tests
    are run but that they are run in the same way each time. In addition, once an
    automated test is set up it will typically be quicker to re-run that automated
    test than to manually repeat a series of tests. However, not all of the features
    of a system can be easily tested via an automated test tool and in some cases
    the physical environment may make it hard to automate tests.


    Typically, most unit testing is automated and most acceptance testing is manual.
    You will also need to decide which forms of testing must take place. Most software
    projects should have unit testing, integration testing, system testing and acceptance
    testing as a necessary requirement. Not all projects will implement performance
    or stability testing, but you should be careful about omitting any stage of testing
    and be sure it is not applicable.


    ## Test Driven Development


    Test Driven Development (or TDD) is a development technique whereby developers
    write test cases before they write any implementation code. The tests thus drive
    or dictate the code that is developed. The implementation only provides as much
    functionality as is required to pass the test and thus the tests act as a specification
    of what the code does (and some argue that the tests are thus part of that specification
    and provide documentation of what the system is capable of).


    TDD has the benefit that as tests must be written first, there are always a set
    of tests available to perform unit, integration, regression testing etc. This
    is good as developers can find that writing tests and maintaining tests is boring
    and of less interest than the actual code itself and thus put less emphasis into
    the testing regime than might be desirable. TDD encourages, and indeed requires,
    that developers maintain an exhaustive set of repeatable tests and that those
    tests are developed to the same quality and standards as the main body of code.


    There are three rules of TDD as defined by Robert Martin, these are:


    1. You are not allowed to write any production code unless it is to make a failing
    unit test pass.

    2. You are not allowed to write any more of a unit test than is sufficient to
    fail; and compilation failures are failures.

    3. You are not allowed to write any more production code than is sufficient to
    pass the one failing unit test.


    This leads to the TDD cycle described in the next section.


    ## The TDD Cycle


    There is a cycle to development when working in a TDD manner. The shortest form
    of this cycle is the TDD mantra:


    Red / Green / Refactor


    Which relates to the unit testing suite of tools where it is possible to write
    a unit test. Within tools such as PyCharm, when you run a pyunit or pytest test
    a Test View is shown with Red indicating that a test failed or Green indicating
    that the test passed. Hence Red/Green, in other words write the test and let it
    fail, then implement the code to ensure it passes. The last part of this mantra
    is Refactor which indicates once you have it working make the code cleaner, better,
    fitter by Refactoring it. Refactoring is the process by which the behavior of
    the system is not changed but the implementation is altered to improve it.


    The full TDD cycle is shown by the following diagram which highlights the test
    first approach of TDD:


    ![](img/8a661fca3884547aede940b9a6567321_268_0.png)


    The TDD mantra can be seen in the TDD cycle that is shown above and described
    in more detail below:


    1. Write a single test.

    2. Run the test and see it fail.

    3. Implement just enough code to get the test to pass.

    4. Run the test and see it pass.

    5. Refactor for clarity and deal with any issue of reuse etc.

    6. Repeat for next test.


    ## Test Complexity


    The aim is to strive for simplicity in all that you do within TDD. Thus, you write
    a test that fails, then do just enough to make that test pass (but no more). Then
    you refactor the implementation code (that is change the internals of the unit
    under test) to improve the code base. You continue to do this until all the functionality
    for a unit has been completed. In terms of each test, you should again strive
    for simplicity with each test only testing one thing with only a single assertion
    per test (although this is the subject of a lot of debate within the TDD world).


    ## Refactoring


    The emphasis on refactoring within TDD makes it more than just testing or Test
    First Development. This focus on refactoring is really a focus on (re)design and
    incremental improvement. The tests provide the specification of what is needed
    as well as the verification that existing behavior is maintained, but refactoring
    leads to better design software. Thus, without refactoring TDD is not TDD!


    ## Design for Testability


    Testability has a number of facets:


    - Configurability. Set up the object under test to an appropriate configuration
    for the test.

    - Controllability. Control the input (and internal state).

    - Observability. Observe its output.

    - Verifiability. That we can verify that output in an appropriate manner.


    ## Testability Rules of Thumb


    1. If you cannot test code then change it so that you can!

    2. If your code is difficult to validate then change it so that it isn’t!

    3. Only one concrete class should be tested per Unit test and then Mock the Rest!

    4. If your code is hard to reconfigure to work with Mocks then make it so that
    your code can use Mocks!

    5. Design your code for testability!


    ## Book Resources


    The Art of Software Testing, G.J. Myers, C. Sandler and T. Badgett, John Wiley
    & Sons, 3rd Edition (Dec 2011), 1118031962.


    ## PyTest Testing Framework


    ### Introduction


    There are several testing frameworks available for Python, although only one,
    unit test comes as part of the typical Python installation. Typical libraries
    include Unit test, (which is available within the Python distribution by default)
    and PyTest.


    In this chapter we will look at PyTest and how it can be used to write unit tests
    in Python for both functions and classes.


    ### What Is PyTest?


    PyTest is a testing library for Python; it is currently one of the most popular
    Python testing libraries (others include unit test and doc test). PyTest can be
    used for various levels of testing, although its most common application is as
    a unit testing framework. It is also often used as a testing framework within
    a TDD based development project. In fact, it is used by Mozilla and Dropbox as
    their Python testing framework.'
  mdcn: '## 冒烟测试


    冒烟测试是一种用于验证系统基本功能是否正常的测试或测试套件。冒烟测试可以在新部署或补丁部署后运行，以验证安装是否运行良好，足以进行进一步测试。如果未能通过冒烟测试，则应暂停任何进一步的测试，直到冒烟测试通过为止。该名称源于早期电子学：如果设备在通电后开始冒烟，测试人员就知道没有必要再对其进行测试了。对于软件技术，执行冒烟测试的优势包括：


    -   冒烟测试通常是自动化的，并且在不同构建版本之间是标准化的。

    -   因为冒烟测试验证的是预期应该正常工作的部分，当它们失败时，通常表明某些基础部分出了问题（例如使用了错误版本的库），或者新的构建在系统核心方面引入了错误。

    -   如果系统是每日构建的，那么也应该每日进行冒烟测试。

    -   随着系统新功能的增加，需要定期更新冒烟测试。


    ## 测试自动化


    测试编写和执行的实际方式需要仔细考虑。通常，我们希望尽可能地自动化测试过程，因为这使得运行测试变得容易，并且不仅确保所有测试都被运行，还确保它们每次都以相同的方式运行。此外，一旦设置了自动化测试，重新运行该自动化测试通常比手动重复一系列测试更快。然而，并非系统的所有功能都可以通过自动化测试工具轻松测试，在某些情况下，物理环境可能使自动化测试变得困难。


    通常，大多数单元测试是自动化的，而大多数验收测试是手动的。你还需要决定必须进行哪些形式的测试。大多数软件项目应将单元测试、集成测试、系统测试和验收测试作为必要要求。并非所有项目都会实施性能或稳定性测试，但你应该谨慎对待省略任何测试阶段，并确保它确实不适用。


    ## 测试驱动开发


    测试驱动开发（或 TDD）是一种开发技术，开发人员在编写任何实现代码之前先编写测试用例。因此，测试驱动或决定了开发的代码。实现只提供通过测试所需的功能，因此测试充当了代码功能的规范（有些人认为测试因此成为该规范的一部分，并提供了系统能力的文档）。


    TDD 的好处在于，由于必须先编写测试，因此始终有一组可用的测试来执行单元测试、集成测试、回归测试等。这是好的，因为开发人员可能会发现编写和维护测试很枯燥，不如实际代码本身有趣，因此可能不会像期望的那样重视测试流程。TDD
    鼓励并确实要求开发人员维护一套详尽的可重复测试，并且这些测试的开发质量和标准与主体代码相同。


    Robert Martin 定义了 TDD 的三条规则，它们是：


    1.  除非是为了让失败的单元测试通过，否则不允许编写任何生产代码。

    2.  不允许编写超出足以使测试失败的单元测试代码；编译失败也是失败。

    3.  不允许编写超出足以通过那一个失败单元测试的生产代码。


    这引出了下一节描述的 TDD 循环。


    ## TDD 循环


    以 TDD 方式工作时，开发有一个循环。这个循环的最短形式是 TDD 口诀：


    红 / 绿 / 重构


    这与单元测试工具套件相关，其中可以编写单元测试。在 PyCharm 等工具中，当你运行 pyunit 或 pytest 测试时，会显示一个测试视图，红色表示测试失败，绿色表示测试通过。因此，红/绿，换句话说，编写测试并让它失败，然后实现代码以确保它通过。这个口诀的最后一部分是重构，表示一旦它工作了，就通过重构使代码更清晰、更好、更合适。重构是系统行为不变但实现被改变以改进它的过程。


    完整的 TDD 循环如下图所示，突出了 TDD 的测试优先方法：


    ![](img/8a661fca3884547aede940b9a6567321_268_0.png)


    TDD 口诀可以在上面显示并在下面更详细描述的 TDD 循环中看到：


    1.  编写一个测试。

    2.  运行测试并看到它失败。

    3.  实现刚好足以让测试通过的代码。

    4.  运行测试并看到它通过。

    5.  为清晰起见进行重构，并处理任何重用等问题。

    6.  为下一个测试重复此过程。


    ## 测试复杂性


    目标是在 TDD 中的所有工作中力求简单。因此，你编写一个失败的测试，然后做刚好足以让该测试通过的事情（但不要更多）。然后你重构实现代码（即改变被测单元的内部结构）以改进代码库。你继续这样做，直到单元的所有功能都完成。就每个测试而言，你应该再次力求简单，每个测试只测试一件事，每个测试只有一个断言（尽管这在
    TDD 界是一个备受争议的话题）。


    ## 重构


    TDD 中对重构的强调使其不仅仅是测试或测试优先开发。这种对重构的关注实际上是（重新）设计和增量改进的关注。测试提供了所需内容的规范以及现有行为得以维持的验证，但重构带来了更好的软件设计。因此，没有重构，TDD
    就不是 TDD！


    ## 可测试性设计


    可测试性有几个方面：


    -   可配置性。将被测对象设置为适合测试的配置。

    -   可控制性。控制输入（和内部状态）。

    -   可观察性。观察其输出。

    -   可验证性。我们能够以适当的方式验证该输出。


    ## 可测试性经验法则


    1.  如果你无法测试代码，那就改变它，使其可以测试！

    2.  如果你的代码难以验证，那就改变它，使其不再难以验证！

    3.  每个单元测试只应测试一个具体类，其余的使用模拟对象！

    4.  如果你的代码难以重新配置以与模拟对象一起工作，那就让你的代码可以使用模拟对象！

    5.  为可测试性设计你的代码！


    ## 书籍资源


    《软件测试的艺术》，G.J. Myers、C. Sandler 和 T. Badgett，John Wiley & Sons，第 3 版（2011 年 12
    月），1118031962。


    ## PyTest 测试框架


    ### 简介


    Python 有几种可用的测试框架，尽管只有 unit test 是典型 Python 安装的一部分。典型的库包括 Unit test（默认包含在 Python
    发行版中）和 PyTest。


    在本章中，我们将探讨 PyTest 以及如何使用它在 Python 中为函数和类编写单元测试。


    ### 什么是 PyTest？


    PyTest 是一个 Python 测试库；它目前是最流行的 Python 测试库之一（其他包括 unit test 和 doc test）。PyTest
    可用于各种级别的测试，尽管其最常见的应用是作为单元测试框架。它也经常在基于 TDD 的开发项目中用作测试框架。事实上，Mozilla 和 Dropbox 都将其用作他们的
    Python 测试框架。'
