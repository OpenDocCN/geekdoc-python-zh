    \ Futures\n\n### 简介\n\nFuture 是一个承诺在未来返回值的线程（或进程）；一旦关联的行为完成。因此它是一个未来的值。它提供了一种非常简单的方式来触发那些执行起来耗时或可能因昂贵操作（如输入/输出）而延迟的行为，这些行为可能会减慢程序其他元素的执行。本章讨论\
    \ Python 中的 futures。\n\n### 为什么需要 Future\n\n在正常的方法或函数调用中，方法或函数的执行与调用代码（调用者）同步，调用者必须等待函数或方法（被调用者）返回。只有在此之后，调用者才能继续执行下一行代码。在许多（大多数）情况下，这正是你想要的，因为下一行代码可能依赖于上一行代码返回的结果等。\n\
    \n然而，在某些情况下，下一行代码与上一行代码无关。例如，假设我们正在填充用户界面（UI）。第一行代码可能从某个外部数据源（如数据库）读取用户名，然后将其显示在\
    \ UI 的一个字段中。下一行代码可能将今天的日期添加到 UI 的另一个字段中。这两行代码彼此独立，可以并发/并行运行。\n\n在这种情况下，我们可以使用线程或进程来独立于调用者运行这两行代码，从而实现一定程度的并发性，并允许调用者继续执行第三行代码等。然而，线程或进程默认都不提供从此类独立操作获取结果的简单机制。这可能不是问题，因为操作可能是自包含的；例如，它们可能从数据库或今天的日期获取数据，然后更新\
    \ UI。然而，在许多情况下，计算将返回一个结果，该结果需要由原始调用代码（调用者）处理。这可能涉及执行长时间运行的计算，然后使用返回的结果生成另一个值或更新另一个对象等。\n\
    \nFuture 是一种简化此类并发任务定义和执行的抽象。Futures 在许多不同的语言中可用，包括 Python，以及 Java、Scala、C++ 等。使用\
    \ Future 时；一个可调用对象（如函数）被传递给 Future，Future 将其作为单独的线程或单独的进程执行，然后在生成结果后返回结果。结果可以通过回调函数（在结果可用时调用）处理，也可以通过使用等待结果提供的操作来处理。\n\
    \n### Python 中的 Futures\n\nconcurrent.futures 库在 Python 3.2 版本中引入（也可在 Python 2.5\
    \ 及更高版本中使用）。concurrent.futures 库提供了 Future 类和用于处理 Futures 的高级 API。concurrent.futures.Future\
    \ 类封装了可调用对象（例如函数或方法）的异步执行。Future 类提供了一系列方法，可用于获取有关 future 状态的信息、检索结果或取消 future：\n\
    \n- cancel() 尝试取消 Future。如果 Future 当前正在执行且无法取消，则该方法将返回 False，否则调用将被取消，该方法将返回 True。\n\
    - canceled() 如果 Future 已成功取消，则返回 True。"
