    # Usinga Pool


    Creating Processes is expensive in terms of computer resources. It would therefore
    be useful to be able to reuse processes within an application. The Pool class
    provides such reusable processes.


    The Pool class represents a pool of worker processes that can be used to perform
    a set of concurrent, parallel operations. The Pool provides methods which allow
    tasks to be offloaded to these worker processes.'
