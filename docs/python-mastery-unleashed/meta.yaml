  md: '# Introduction to Concurrency and Parallelism


    # Introduction


    In this chapter we will introduce the concepts of concurrency and parallelism.
    We will also briefly consider the related topic of distribution. After this we
    will consider process synchronization, why object oriented approaches are well
    suited to con- currency and parallelism before finishing with a short discussion
    of threads versus processes.


    # Concurrency


    Concurrency is defined by the dictionary as two or more events or circumstances
    happening or existing at the same time. In Computer Science concurrency refers
    to the ability of different parts or units of a program, algorithm or problem
    to be executed at the same time, potentially on multiple processors or multiple
    cores.


    Here a processor refers to the central processing unit (or CPU) or a computer
    while core refers to the idea that a CPU chip can'
  merge: -1
  pgno: 517
- img_proc: true
  md: 'have multiple cores or processors on it.


    Originally a CPU chip had a single core. That is the CPU chip had a single processing
    unit on it. However, over time, to increase computer performance, hardware manufacturers
    added additional cores or processing units to chips. Thus a dual-core CPU chip
    has two processing units while a quad-core CPU chip has four processing units.
    This means that as far as the operating system of the computer is concerned, it
    has multiple CPUs on which it can run programs.


    Running processing at the same time, on multiple CPUs, can substantially improve
    the overall performance of an application.


    For example, let us assume that we have a program that will call three independent
    functions, these functions are:


    +   - make a backup of the current data held by the program,

    - print the data currently held by the program,

    - run an animation using the current data.


    Let us assume that these functions run sequentially, with the following timings:


    +   - the backup function takes 13 s,

    - the print function takes 15 s,

    - the animation function takes 10 s.'
  merge: -1
  pgno: 518
- img_proc: true
  md: 'This would result in a total of 38 s to perform all three operations. This
    is illustrated graphically below:


    ![](img/8a661fca3884547aede940b9a6567321_519_0.png)'
  merge: -1
  pgno: 519
- img_proc: true
  md: 'However, the three functions are all completely independent of each other.
    That is they do not rely on each other for any results or behavior; they do not
    need one of the other functions to complete before they can complete etc. Thus
    we can run each function concurrently.


    If the underlying operating system and program language being used support multiple
    processes, then we can potentially run each function in a separate process at
    the same time and obtain a significant speed up in overall execution time.


    If the application starts all three functions at the same time, then the maximum
    time before the main process can continue will be 15s, as that is the time taken
    by the longest function to execute. However, the main program may be able to continue
    as soon as all three functions are started as it also does not depend on the results
