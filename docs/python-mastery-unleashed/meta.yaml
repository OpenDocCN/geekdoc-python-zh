    # Implementing Event Handling


    There are four steps involved in implementing event handling for a widget or window,
    these are:


    +   1. Identify the event of interest. Many widgets will generate different events
    in different situations; it may therefore be necessary to determine which event
    you are interested in.

    2. Find the correct Event Binder name, e.g. wx.EVT_CLOSE, wx.EVT_MOVE or wx.EVT_BUTTON
    etc. Again you may find that the widget you are interested in supports numerous
    different event binders which may be used in different situations (even for the
    same event).

    3. Implement an event handler (i.e. a suitable method or function) that will be
    called when the event occurs. The event handler will be supplied with the event
    object.'
