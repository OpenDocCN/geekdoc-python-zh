  md: "```\ndef set(self, value):\n    self.current = value\ndef add(self):\n    self.total\
    \ += self.current\ndef sub(self):\n    self.total -= self.current\ndef total(self):\n\
    \    return self.total\n```\n\nSave this class into a file called calculator.py.\n\
    \n# Writing a Test\n\nWe will now create a very simple PyTest unit test for our\
    \ Calculator class. This test will be defined in a class called test_calculator.py.\
    \ You will need to import the calculator class we wrote above into your test_calculator.py\
    \ file (remember each file is a module in Python).\n\nThe exact import statement\
