  md: 'bookshop. This is starting to look overly complex, easy to forget about and
    probably error prone. Flask itself uses encoders to encode types into JSON. Flask
    provides a way of creating your own encoders that can be used to convert a custom
    type, such as the Book class, into JSON. Such an encoder can automatically be
    used by the jsonify() function.


    To do this we must implement an encoder class; the class will extend the flask.
    json.JSONEncoder super class. The class must define a method default(self, obj).
    This method takes an object and returns the JSON representation of that object.
    We can therefore write an encoder for the Book class as follows:


    ```

    class BookJSONEncoder(JSONEncoder):

    def default(self, obj):

    if isinstance(obj, Book):

    return {

    ''isbn'': obj.isbn,

    ''title'': obj.title,

    ''author'': obj.author,

    ''price'': obj.price

    }

    else:

    return super(BookJSONEncoder, self).default(obj)

    ```


    The default() method in this class checks that the object passed to it is an instance
    of the class Book and if it is then it will create a JSON version of the Book.This
    JSON structure is based on the isbn, title, author and price attributes. If it
