    - turtle.tracer(n = None) This can be used to batch updates to the turtle graphics
    screen. It is very useful when a drawing become large and complex. By setting
    the number (n) to a large number (say 600) then 600 elements will be drawn in
    memory before the actual screen is updated in one go; this can significantly speed
    up the generation of for example, a fractal picture.When called without arguments,
