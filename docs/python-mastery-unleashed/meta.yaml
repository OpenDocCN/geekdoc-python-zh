    Observable. The function is typically used to perform some form of transformation
    to the data supplied to it. This could be adding one to all integer values, converting
    the format of the data from XML to JSON,enriching the data with additional information
    such as the time the data was acquired and who the data was supplied by etc.


    In the example given below we are transforming the set of integer values supplied
    by the original Observable into strings. In the diagram these strings include
    quotes around them to highlight they are in fact a string:


    ![](img/8a661fca3884547aede940b9a6567321_672_0.png)


    This is typical of the use of a transformation operator; that is to change the
    data from one format to another or to add information to the data.'
