    # The split() Function


    The split() function returns a list where the string has been split at each match.
    The syntax of the split() function is


    ```

    re.split(pattern, string, maxsplit=0, flags=0)

    ```


    The result is to split a string by the occurrences of pattern. If capturing parentheses
    are used in the regular expression pattern, then the text of all groups in the
    pattern are also returned as part of the resulting list. If max split is nonzero,
    at most max split splits occur, and the remainder of the string is returned as
    the final element of the list. Flags can again be used to modify the matches.


    ```

    import re

    str = ''It was a hot summer night'' x =re.split(''\s'', str)

    print(x)

    The output is

    [''It'', ''was'', ''a'', ''hot'', ''summer'', ''night'']

    ```


    # The sub() Function


    The sub() function replaces occurrences of the regular expression pattern in the
    string with the repl string.'
  - '[PAGE 416]


    # re.sub(pattern, repl, string, max=0)


    This method replaces all occurrences of the regular expression pattern in string
    with repl, substituting all occurrences unless max is provided. This method returns
    the modified string.


    ```

    import re

    pattern = ''(England|Wales|Scotland)''

    input = ''England for football, Wales for Rugby and Scotland for the Highland
    games''

    print(re.sub(pattern, ''England'', input ))

    ```


    Which generates:


