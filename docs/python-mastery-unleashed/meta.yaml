    \ fontsize=8)\naxes.set_zlabel('z values', fontsize=8)\n# Display the graph\n\
    pyplot.show()\n```\n\nThis program generates the following 3D graph:\n\n![](img/8a661fca3884547aede940b9a6567321_108_0.png)\n\
    \nOne point to note about three dimensional graphs is that they are not universally\
    \ accepted as being a good way to present data. One of the maxims of data visualization\
    \ is keep it simple/keep it clean. Many consider that a three dimensional chart\
    \ does not do this and that it can be difficult to see what is really being shown\
    \ or that it can be hard to interpret the data appropriately. For example, in\
