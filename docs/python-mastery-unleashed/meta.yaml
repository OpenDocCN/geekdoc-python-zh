  md: '# PyTestTesting Framework


    # Introduction


    There are several testing frameworks available for Python, although only one,
    unit test comes as part of the typical Python installation. Typical libraries
    include Unit test, (which is available within the Python distribution by default)
    and PyTest.


    In this chapter we will look at PyTest and how it can be used to write unit tests
    in Python for both functions and classes.


    # What Is PyTest?


    PyTest is a testing library for Python; it is currently one of the most popular
    Python testing libraries (others include unit test and doc test). PyTest can be
    used for various levels of testing, although its most common application is as
    a unit testing framework. It is also often used as a testing framework within
    a TDD based development project. In fact, it is used by Mozilla and Dropbox as
    their Python testing framework.'
  merge: -1
  pgno: 271
- img_proc: true
  md: "PyTest offers a large number of features and great flexibility in how tests\
    \ are written and in how set up behavior is defined. It automatically finds test\
    \ based on naming conventions and can be easily integrated into a range of editors\
    \ and IDEs including PyCharm.\n\n# Setting Up PyTest\n\nYou will probably need\
    \ to set up PyTest so that you can use it from within your environment. If you\
    \ are using the PyCharm editor, then you will need to add the PyTest module to\
    \ the current PyCharm project and tell PyCharm that you want to use PyTest to\
    \ run all tests for you.\n\n# A Simple PyTest Example\n\n# Something to Test\n\
    \nTo be able to explore PyTest we first need something to test; we will therefore\
    \ define a simple Calculator class. The calculator keeps a running total of the\
    \ operations performed; it allows a new value to be set and then this value can\
    \ be added to, or subtracted from, that accumulated total.\n\n```\nclass Calculator:\n\
    \    def init (self): self.current = 0 self.total = 0\n```"
