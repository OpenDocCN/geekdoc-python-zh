  md: '# Introduction to Databases


    # Introduction


    There are several different types of database system in common use today including
    Object databases, NoSQL databases and (probably the most common) Relational Databases.
    This chapter focuses on Relational Databases as typified by database systems such
    as Oracle, Microsoft SQL Server and MySQL. The database we will use in this book
    is MySQL.


    # What Is a Database?


    A database is essentially a way to store and retrieve data. Typically, there is
    some form of query language used with the database to help select the information
    to retrieve such as SQL or Structured Query Language.


    Inmost cases there is a structure defined that is used to hold the data (although
    this is not true of the newer NoSQL or non-relational unstructured databases such
    as CouchDB or MongoDB).'
  merge: -1
  pgno: 424
- img_proc: true
  md: 'In a Relational Database the data is held in tables, where the columns define
    the properties or attributes of the data and each row defines the actual values
    being held, for example:


    ![](img/8a661fca3884547aede940b9a6567321_425_0.png)


    In this diagram there is a table called students; it is being used to hold information
    about students attending a meeting. The table has 5 attributes (or columns) defined
    for id, name, surname, subject and email.


    In this case, the id is probably what is known as a primary key. The primary key
    is a property that is used to uniquely identify the student row; it cannot be
    omitted and must be unique (within the table). Obviously names and subjects may
    well be duplicated as there may be more than one student studying Animation or
    Games and students may have the'
  merge: -1
  pgno: 425
- img_proc: true
  md: 'same first name or surname. It is probable that the email column is also unique
    as students probably don’t share an email address but again this may not necessarily
    be the case.


    You might at this point wonder why the data in a Relational Database is called
    relational and not tables or tabular?The reason is because of a topic known as
    relational algebra that underpins Relational Database theory. Relational Algebra
    takes its name from the mathematical concept known as a relation. However, for
    the purposes of this chapter you don’t need to worry about this and just need
    to remember that data is held in tables.


    # Data Relationships


    When the data held in one table has a link or relationship to data held in another
    table then an index or key is used to link the values in one table to another.
    This is illustrated below for a table of addresses and a table of people who live
