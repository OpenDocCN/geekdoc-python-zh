  md: '# Binding an Event to an Event Handler


    An event is bound to an Event Handler using the Bind() method of an event generating
    object (such as a button, field, menu item etc.) via a named Event Binder.


    For example:


    ```

    button.Bind(wx.EVT_BUTTON, self.event_handler_method)

