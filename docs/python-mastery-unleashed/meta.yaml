  md: '# Graphical User Interfaces


    A Graphical User Interface can capture the essence of an idea or a situation,
    often avoiding the need for a long passage of text. Such interfaces can save a
    user from the need to learn complex commands. They are less likely to intimidate
    computer users and can provide a large amount of information quickly in a form
    which can be easily assimilated by the user.


    The widespread use of high quality graphical interfaces has led many computer
    users to expect such interfaces to any software they use. Most programming languages
    either incorporate a Graphical User Interface (GUI) library or have third party
    libraries available.


    Python is of course a cross platform programming language and this brings in additional
    complexities as the underlying operating system may provide different windowing
    facilities depending upon whether the program is running on Unix, Linux, Mac OS
    or Windows operating systems.'
  merge: -1
  pgno: 110
- img_proc: true
  md: 'In this chapter we will first introduce what we mean by a GUI and by WIMP based
    UIs in particular. We will then consider the range of libraries available for
    Python before selecting one to use. This chapter will then describe how to create
    rich client graphical displays(desktop application)using one of these GUI libraries.
    Thus in this chapter we consider how windows, buttons, text fields and labels
    etc. are created,added to windows, positioned and organized.


    # GUIs and WIMPS


    GUIs (Graphical User Interfaces) and WIMP (Windows, Icons, Mice and Pop-up Menus)
    style interfaces have been available within computer systems for many years but
    they are still one of the most significant developments to have occurred. These
    interfaces were originally developed out of a desire to address many of the perceived
    weaknesses of purely textual interfaces.


    The textual interface to an operating system was typified by a peremptory prompt.
    In Unix/Linux systems for example, the prompt is often merely a single character
    such as %, > or $, which can be intimidating. This is true even for experienced
    computer users if they are not familiar with the Unix/Linux family of operating
    systems.'
  merge: -1
  pgno: 111
- img_proc: true
  md: 'For example, a user wishing to copy a file from one directory to another might
    have to type something like:


    ```

    > cp file.pdf ~otheruser/projdir/srcdir/newfile.pdf

    ```


    This long sequence needs to be entered with no mistakes in order to be accepted.
    Any error in this command will cause the system to generate an error message which
    might or might not be enlightening. Even where systems attempt to be more “user
    friendly” through features like command histories, much typing of arrow keys and
    file names is typically needed.


    The main issue on both input and output is one of bandwidth. For example, in situations
    where the relationships between large amounts of information must be described,
    it is much easier to assimilate this if output is displayed graphically than if
    it is displayed as a tables of figures. On input, combinations of mouse actions
    can be given a meaning that could otherwise only be conveyed by several lines
    of text.


    WIMP stands for Windows (or Window Managers), Icons, Mice and Pop-up menus. WIMP
    interfaces allow the user to overcome at least some of the weaknesses of their
    textual counterparts—it is possible to provide a pictorial image of the operating
    system which can be based on a concept the user'
  merge: -1
  pgno: 112
- img_proc: true
  md: 'can relate to, menus can be used instead of textual commands and information
    in general can be displayed graphically.


    The fundamental concepts presented via a WIMP interface were originally developed
    at XEROX’s Palo Alto Research Center and used on the Xerox Star machine, but gained
    much wider acceptance through first the Apple Macintosh and then IBM PC implementations
    of WIMP interfaces.


    Most WIMP style environments use a desktop analogy (although this is less true
    of mobile devices such as phones and tablets):


    +   - the whole screen represents a working surface (a desktop),

    - graphic windows that can overlap represent sheets of paper on that desktop,

    - graphic objects are used for specific concepts, for example filing cabinets
    for disks or a waste bin for file disposal (these could be regarded as desk accessories),

    - various application programs are displayed on the screen, these stand for tools
    that you might use on your desktop.


    In order to interact with this display, the WIMP user is provided with a mouse
    (or alight pen or a touch sensitive screen), which can be used to select icons
    and menus or to manipulate windows.'
  merge: -1
  pgno: 113
- img_proc: true
  md: 'The software basis of any WIMP style environment is the window manager. It
    controls the multiple, possibly overlapping windows and icons displayed on the
    screen. It also handles the transfer of information about events which occur in
    those windows to the appropriate application and generates the various menus and
    prompts used.


    A window is an area of the graphic screen in which a page or piece of a page of
    information may be displayed; it may display text, graphics or a combination of
    both. These windows may be overlapping,and associated with the same process, or
    they may be associated with separate processes. Windows can generally be created,
    opened, closed, moved and resized.


    An icon is a small graphic object that is usually symbolic of an operation or
    of a larger entity such as an application program or a file. The opening of an
    icon causes either the associated application to execute or the associated window
    to be displayed.


    At the heart of the users ability to interact with such WIMP based programs is
    the event loop. This loop listens for events such as the user clicking a button
    or selecting a menu item or entering a text field. When such an event occurs it
    triggers the'
  merge: -1
  pgno: 114
- img_proc: true
  md: 'associated behavior (such as running a function linked with a button).


    # Windowing Frameworks for Python


    Python is a cross platform programming language. As such Python programs can be
    written on one platform (such as a Linux box) and then run on that platform or
    another operating system platform(such as Windows or Mac OS). This can however
    generate issues for libraries that need to be available across multiple operating
    system platforms. The area of GUIs is particularly an issue as a library written
    to exploit features available in the Microsoft Windows system may not be available
    (or may look different) on Mac OS or Linux systems.


    Each operating system that Python runs on may have one or more windowing systems
    written for it and these systems may or may not be available on other operating
    systems. This makes the job of providing a GUI library for Python that much more
    difficult.


    Developers of Python GUIs have taken one of two approaches to handle this:'
  merge: -1
  pgno: 115
- img_proc: true
  md: '+   - One approach is to write a wrapper that abstracts the underlying GUI
    facilities so that the developer works at a level above a specific windowing system’s
    facilities. The Python library then maps (as best it can) the facilities to the
    underlying system that is currently being used.

    - The other approach is to provide a closer wrapping to a particular set of facilities
    on the underlying GUI system and to only target systems that support those facilities.


    Some of the libraries available for Python are listed below and have been categorized
    into platform-independent libraries and platform specific libraries:


    # Platform-Independent GUI Libraries


    +   - Tkinter. This is the standard built-in Python GUI library.It is built on
    top of the Tcl/Tk widget set that has been around for very many years for many
    different operating systems. Tcl stands for Tool Command Language while Tk is
    the graphical user interface toolkit for Tcl.

    - wxPython. wxWidgets is a free, highly portable GUI library. Its is written in
    C++ and it can provide a native look and feel on operating systems such as Windows,
    Mac OS, Linux etc.wxPython is a set of Python bindings for wxWidgets. This is
    the library that we will be using in this chapter.'
  merge: -1
  pgno: 116
- img_proc: true
  md: '+   - PyQt or PySide both of these libraries wrap the Qt toolkit facilities.
    Qt is a cross platform software development system for the implementation of GUIs
    and applications.


    # Platform-Specific GUI Libraries


    +   - PyObjc is a Mac OS specific library that provides an Objective-C bridge
    too the Apple Mac Cocoa GUI libraries.

    - PythonWin provides a set of wrappings around the Microsoft Windows foundation
    classes and can be used to create Windows based GUIs.'
  merge: -1
