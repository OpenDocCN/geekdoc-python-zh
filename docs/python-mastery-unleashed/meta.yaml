- md: "## Events in wxPython User Interfaces\n\n## Event Handling\n\nEvents are an\
    \ integral part of any GUI; they represent user interactions with the interface\
    \ such as clicking on a button, entering text into a field, selecting a menu option\
    \ etc.\n\nThe main event loop listens for an event; when one occurs it processes\
    \ that event (which usually results in a function or method being called) and\
    \ then waits for the next event to happen. This loop is initiated in wxPython\
    \ via the call to the MainLoop() method on the wx.App object.\n\nThis raises the\
    \ question ‘what is an Event?’. An event object is a piece of information representing\
    \ some interaction that occurred typically with the GUI (although an event can\
    \ be generated by anything). An event is processed by an Event Handler. This is\
    \ a method or function that is called when the event occurs. The event is passed\
    \ to the handler as a parameter. An Event Binder is used to bind an event to an\
    \ event handler.\n\n## Event Definitions\n\nIt is useful to summarize the definitions\
    \ around events as the terminology used can be confusing and is very similar:\n\
    \n- Event represents information from the underlying GUI framework that describes\
    \ something that has happened and any associated data. The specific data available\
    \ will differ depending on what has occurred. For example, if a window has been\
    \ moved then the associated data will relate to the window’s new location. Whereas\
    \ a CommandEvent generated by a selection action from a ListBox provides the item\
    \ index for the selection.\n- Event Loop the main processing loop of the GUI that\
    \ waits for an event to occur. When an event occurs the associated event handler\
    \ is called.\n- Event Handlers these are methods (or functions) that are called\
    \ when an event occurs.\n- Event Binders associate a type of event with an event\
    \ handler. There are different event binders for different types of event. For\
    \ example, the event binder associated with the wx.MoveEvent is named wx.EVT_MOVE.\n\
    \nThe relationship between the Event, the Event Handler via the Event Binder is\
    \ illustrated below:\n\nThe top three boxes illustrate the concepts while the\
    \ lower 3 boxes provide a concrete example of binding a Move_Event to an on_move()\
    \ method via the EVT_MOVE binder.\n\n## Types of Events\n\nThere are numerous\
    \ different types of event including:\n\n- wx.CloseEvent used to indicate that\
    \ a Frame or Dialog has been closed. The event binder for this event is named\
