  md: '# Timers


    The Timer class represents an action (or task) to run after a certain amount of
    time has elapsed. The Timer class is a subclass of Thread and as such also functions
    as an example of creating custom threads.


    Timers are started,as with threads, by calling their start() method. The timer
    canbe stopped (before its action has begun) by calling the cancel() method.The
    interval the timer will wait before executing its action may not be exactly the
    same as the interval specified by the user as another thread may be running when
    the timer wishes to start.


    The signature of the Timer class constructor is:


    ```

    Timer(interval, function, args = None, kwargs =None)

    An example of using the Timer class is given below:

    from threading  import Timer

    def hello():

    print(''hello'')

    print(''Starting'')

    t  =  Timer(5,  hello)

    t.start()

    print(''Done'')

    ```


    In this case the Timer will run the hello function after an initial delay of 5
    s.'
