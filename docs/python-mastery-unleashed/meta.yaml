    ### 简介


    在本章中，我们将探索 Matplotlib pyplot API。这是开发者使用 Matplotlib 生成不同类型图形或图表的最常见方式。


    ### pyplot API


    pyplot 模块及其提供的 API 的目的是简化 Matplotlib 图表和图形的生成与操作。总的来说，Matplotlib 库力求使简单的事情变得容易，使复杂的事情成为可能。它实现第一个目标的主要方式是通过
    pyplot API，因为该 API 具有诸如 `bar()`、`plot()`、`scatter()` 和 `pie()` 等高级函数，使得创建条形图、线图、散点图和饼图变得容易。


    关于 pyplot API 提供的函数，需要注意的一点是它们通常可以接受非常多的参数；然而，这些参数中的大多数都有默认值，在许多情况下会给你一个合理的默认行为/默认视觉表示。因此，你可以忽略大多数可用参数，直到你确实需要做一些不同的事情；那时你应该参考
    Matplotlib 文档，因为它有广泛的材料和大量的示例。


    当然，有必要导入 pyplot 模块；因为它是 Matplotlib（例如 `matplotlib.pyplot`）库中的一个模块。在程序中，它通常被赋予一个别名以便于引用。该模块的常见别名是
    `pyplot` 或 `plt`。


    pyplot 模块的典型导入如下所示：


    ```

    import matplotlib.pyplot as pyplot

    ```


    pyplot API 可用于


    - 构建图表，

    - 配置标签和坐标轴，

    - 管理颜色和线条样式，

    - 处理事件/允许图表交互，

    - 显示（show）图表。


    我们将在以下部分看到使用 pyplot API 的示例。


    ### 折线图


    折线图或线图是一种图表，其中图表上的点（通常称为标记）通过线连接，以显示某个值如何随着一组值（通常是 x 轴）的变化而变化；例如，随着时间间隔序列（也称为时间序列）的变化。时间序列折线图通常按时间顺序绘制；此类图表被称为运行图。


    下图是一个运行图的示例；它在底部（x 轴）绘制时间，与速度（由 y 轴表示）相对应。


    ![](img/8a661fca3884547aede940b9a6567321_77_0.png)


    用于生成此图表的程序如下所示：


    ```python

    import matplotlib.pyplot as pyplot


    # Set up the data

    x = [0, 1, 2, 3, 4, 5, 6]

    y = [0, 2, 6, 14, 30, 43, 75]


    # Set the axes headings

    pyplot.ylabel(''Speed'', fontsize=12)

    pyplot.xlabel(''Time'', fontsize=12)


    # Set the title

    pyplot.title("Speed v Time")


    # Plot and display the graph

    # Using blue circles for markers (''bo'')

    # and a solid line (''-'')

    pyplot.plot(x, y, ''bo-'')

    pyplot.show()

    ```


    该程序首先导入 `matplotlib.pyplot` 模块并为其指定别名 `pyplot`（因为这是一个更短的名称，它使代码更易于阅读）。


    然后为每个标记或绘图点的 x 和 y 坐标创建两个值列表。


    接着，通过为 x 轴和 y 轴提供标签（使用 pyplot 函数 `xlabel()` 和 `ylabel()`）来配置图表本身。然后设置图表的标题（同样使用
    pyplot 函数）。


    之后，x 和 y 值被绘制为图表上的折线图。这是通过 `pyplot.plot()` 函数完成的。该函数可以接受广泛的参数，唯一的强制参数是用于定义绘图点的数据。在上面的示例中，提供了第三个参数；这是一个字符串
    `''bo-''`。这是一个编码的格式字符串，其中字符串的每个元素对 `pyplot.plot()` 函数都有意义。字符串的元素是：


    - `b` — 这表示绘制线条时使用的颜色；在这种情况下，字母 `''b''` 表示蓝色（同样，`''r''` 表示红色，`''g''` 表示绿色）。

    - `o` — 这表示每个标记（每个被绘制的点）应该用一个圆圈表示。标记之间的线则构成了折线图。

    - `''-''` — 这表示要使用的线条样式。单破折号（`''-''`）表示实线，而双破折号（`''--''`）表示虚线。


    最后，程序使用 `show()` 函数在屏幕上渲染图形；或者也可以使用 `savefig()` 将图形保存到文件。


    ### 编码格式字符串


    可以通过格式字符串提供许多选项，下表总结了其中一些：


    格式字符串支持以下颜色缩写：


    | 字符 | 颜色 |

    |---|---|

    | ''b'' | 蓝色 |

    | ''g'' | 绿色 |

    | ''r'' | 红色 |

    | ''c'' | 青色 |

    | ''m'' | 品红色 |

    | ''y'' | 黄色 |

    | ''k'' | 黑色 |

    | ''w'' | 白色 |


    还支持不同的方式来表示由线连接的标记（图表上的点），包括：


    | 字符 | 描述 |

    |---|---|

    | ''.'' | 点标记 |

    | '','' | 像素标记 |

    | ''o'' | 圆圈标记 |

    | ''v'' | 三角形向下标记 |

    | ''^'' | 三角形向上标记 |

    | ''<'' | 三角形向左标记 |

    | ''>'' | 三角形向右标记 |

    | ''s'' | 正方形标记 |

    | ''p'' | 五边形标记 |

    | ''*'' | 星形标记 |

    | ''h'' | 六边形1标记 |

    | ''+'' | 加号标记 |

    | ''x'' | 叉号标记 |

    | ''D'' | 菱形标记 |


    最后，格式字符串支持不同的线条样式：


    | 字符 | 描述 |

    |---|---|

    | ''-'' | 实线样式 |

    | ''--'' | 虚线样式 |

    | ''-.'' | 点划线样式 |

    | '':'' | 点线样式 |


    一些格式字符串的示例：


    - `''r''` 红色线条，使用默认标记和线条样式。

    - `''g-''` 绿色实线。

    - `''--''` 虚线，使用默认颜色和默认标记。

    - `''yo:''` 黄色点线，带圆圈标记。


    ### 散点图


    散点图或散点图是一种图表类型，其中使用笛卡尔（或 x 和 y）坐标来显示各个值。每个值通过图表上的一个标记（如圆圈或三角形）来表示。它们可用于表示从两个不同变量获得的值；一个绘制在
    x 轴上，另一个绘制在 y 轴上。


