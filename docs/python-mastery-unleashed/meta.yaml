  md: '# Threading


    # Introduction


    Threading is one of the ways in which Python allows you to write programs that
    multitask; that is appearing to do more than one thing at a time. This chapter
    presents the threading module and uses a short example to illustrate how these
    features can be used.


    # Threads


    In Python the Thread class from the threading module represents an activity that’s
    run in a separate thread of execution within a single process. These threads of
    execution are lightweight, preemptive execution threads. A thread is lightweight
    because it does not possess its own address space and it is not treated as a separate
    entity by the host operating system; it is not a process. Instead, it exists within
    a single machine process using the same address space as other threads.


    # Thread States'
  merge: -1
  pgno: 533
- img_proc: true
  md: 'When a thread object is first created it exists, but it is not yet runnable;
    it must be started. Once it has been started it is then runnable; that is, it
    is eligible to be scheduled for execution. It may switch back and forth between
    running and being runnable under the control of the scheduler. The scheduler is
    responsible for managing multiple threads that all wish to grab some execution
    time.


    A thread object remains runnable or running until its run() method terminates;


    at which point it has finished its execution and it is now dead. All states between
    unstated and dead are considered to indicate that the Thread is alive (and therefore
    may run at some point). This is shown below:


    ![](img/8a661fca3884547aede940b9a6567321_534_0.png)'
  merge: -1
