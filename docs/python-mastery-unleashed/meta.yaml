    \ previous chapters:\n\n```python\nfrom time import sleep\n# define function to\
    \ be used with future\ndef worker(msg):\n    for i in range(0, 10):\n        print(msg,\
    \ end='', flush=True)\n        sleep(1)\n    return i\n```\n\nThe only difference\
    \ with this version of worker is that it also returns a result which is the number\
    \ of times that the worker printed out the message.\n\nWe can of course invoke\
    \ this method inline as follows:\n\n```python\nres = worker('A')\nprint(res)\n\
    ```\n\nWe can make the invocation of this method into a Future. To do this we\
    \ use a ThreadPoolExecutor imported from the concurrent.futures module. We will\
    \ then submit the worker function to the pool for execution. This returns a reference\
    \ to a Future which we can use to obtain the result:\n\n```python\nfrom time import\
    \ sleep\nfrom concurrent.futures import ThreadPoolExecutor\nprint('Setting up\
    \ the ThreadPoolExecutor')\npool = ThreadPoolExecutor(1)\n# Submit the function\
    \ to the pool to run\n# concurrently - obtain a future from pool\nprint('Submitting\
    \ the worker to the pool')\nfuture = pool.submit(worker, 'A')\nprint('Obtained\
    \ a reference to the future object', future)\n# Obtain the result from the future\
    \ - wait if necessary\nprint('future.result():', future.result())\nprint('Done')\n\
    ```\n\nThe output from this is:\n\n*Setting up the ThreadPoolExecutor*\n*Submitting\
    \ the worker to the pool*\n*Obtained a reference to the future object <Future\
