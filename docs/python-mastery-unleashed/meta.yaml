    # Grid


    A Virtual Machine is a piece of software that emulates a whole computer and runs
    on some underlying hardware that is shared with other virtual machines. Each Virtual
    Machine thinks it is the only computer on the hardware;however the virtual machines
    all share the resources of the physical computer. Multiple virtual machines can
    thus run simultaneously on the same physical computer. Each virtual machine provides
    its own virtual hardware,including CPUs, memory, hard drives, network interfaces
    and other devices.The virtual hardware is then mapped to the real'
  merge: -1
  pgno: 525
- img_proc: true
  md: 'hardware on the physical machine which saves costs by reducing the need for
    physical hardware systems along with the associated maintenance costs, as well
    as reducing the power and cooling demands of multiple computers.


    Within a grid, software is used to manage the grid nodes and to submit jobs to
    those nodes. Such software will receive the jobs to perform (programs to run and
    information about the environment such as libraries to use) from clients of the
    grid. These jobs are typically added to a job queue before a job scheduler submits
    them to a node within the grid. When any results are generated by the job they
    are collected from the node and returned to the client. This is illustrated below:


    ![](img/8a661fca3884547aede940b9a6567321_526_0.png)


    The use of grids can make distributing concurrent/parallel processes amongst a
    set of physical and virtual machines much easier.


