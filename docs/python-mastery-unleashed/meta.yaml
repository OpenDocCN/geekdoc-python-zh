    在许多应用程序的执行过程中，可能需要创建一个临时文件，该文件会在某个时刻创建，并在应用程序结束前被删除。当然，你可以自己管理这些临时文件，但是，`tempfile`
    模块提供了一系列功能来简化这些临时文件的创建和管理。


    在 `tempfile` 模块中，`TemporaryFile`、`NamedTemporaryFile`、`TemporaryDirectory` 和 `SpooledTemporaryFile`
    是高级文件对象，它们提供了对临时文件和目录的自动清理功能。这些对象实现了上下文管理器协议。


    `tempfile` 模块还提供了较低级别的函数 `mkstemp()` 和 `mkdtemp()`，可用于创建需要开发者自行管理并在适当时候删除的临时文件。


    `tempfile` 模块的高级功能包括：


    -   `TemporaryFile(mode=''w+b'')` 返回一个匿名的类文件对象，可用作临时存储区域。在托管上下文完成（通过 `with` 语句）或文件对象被销毁后，临时文件将从文件系统中移除。请注意，默认情况下所有数据都以二进制格式写入临时文件，这通常更高效。

    -   `NamedTemporaryFile(mode=''w+b'')` 此函数的运行方式与 `TemporaryFile()` 完全相同，不同之处在于该文件在文件系统中有一个可见的名称。

    -   `SpooledTemporaryFile(max_size=0, mode=''w+b'')` 此函数的运行方式与 `TemporaryFile()`
    完全相同，不同之处在于数据会先在内存中暂存，直到文件大小超过 `max_size`，或者调用文件的 `fileno()` 方法，此时内容将被写入磁盘，后续操作与
    `TemporaryFile()` 相同。

    -   `TemporaryDirectory(suffix=None, prefix=None, dir=None)` 此函数创建一个临时目录。在上下文完成或临时目录对象被销毁后，新创建的临时目录及其所有内容将从文件系统中移除。


    较低级别的函数包括：


    -   `mkstemp()` 创建一个仅创建用户可读或可写的临时文件。

    -   `mkdtemp()` 创建一个临时目录。该目录仅创建用户 ID 可读、可写和可搜索。

    -   `gettempdir()` 返回用于临时文件的目录名称。这定义了本模块中其他函数使用的默认临时目录的默认值。


    下面是一个使用 `TemporaryFile` 函数的示例。此代码导入 `tempfile` 模块，然后打印出用于临时文件的默认目录。接着，它创建一个 `TemporaryFile`
    对象并打印其名称和模式（默认模式是二进制，但在此示例中我们已将其覆盖为使用纯文本）。然后我们向文件写入了一行内容。使用 `seek`，我们将位置重新定位到文件开头，然后读取刚刚写入的那一行。


    ```python

    import tempfile

    print(''tempfile.gettempdir():'', tempfile.gettempdir())

    temp = tempfile.TemporaryFile(''w+'')

    print(''temp.name:'', temp.name)

    print(''temp.mode:'', temp.mode)

    temp.write(''Hello world!'')

    temp.seek(0)

    line = temp.readline()

    print(''line:'', line)

    ```


