    # Distribution


    When implementing a concurrent or parallel solution, where the resulting processes
    run is typically an implementation detail. Conceptually these processes could
    run on the same processor, physical machine or on a remote or distributed machine.
    As such distribution, in which problems are solved or processes executed by sharing
    the work across multiple physical machines, is often related to concurrency and
    parallelism.


    However, there is no requirement to distribute work across physical machines,
    indeed in doing so extra work is usually'
  merge: -1
  pgno: 523
- img_proc: true
  md: 'involved.


    To distribute work to a remote machine, data and in many cases code, must be transferred
    and made available to the remote machine. This can result in significant delays
    in running the code remotely and may offset any potential performance advantages
    of using a physically separate computer. As a result many concurrent/ parallel
    technologies default to executing code in a separate process on the same machine.


    # Grid Computing


    Grid Computing is based on the use of a network of loosely coupled computers,
    in which each computer can have a job submitted to it, which it will run to completion
    before returning a result.


    In many cases the grid is made up of a heterogeneous set of computers (rather
    than all computers being the same) and may be geographically dispersed. These
    computers may be comprised of both physical computers and virtual machines.'
