- img_proc: true
  md: 'The Process class also provides a similar set of methods to the Thread class


    +   - start() Start the process’s activity. This must be called at most once per
    process object. It arranges for the object’s run() method to be invoked in a separate
    process.

    - join([timeout]) If the optional argument timeout is None (the default), the
    method blocks until the joined process terminates. If timeout is positive number,
    it blocks at most timeout seconds. Note that the method returns None if its process
    terminates or if the method times out.

    - is_alive() Return whether the process is alive.Roughly, a process objectis alive
    from the moment the start() method returns until the child process terminates.


    The process class also has several attributes:


    +   - name The process’s name. The name is a string used for identification purposes
    only. It has no semantics. Multiple processes may be given the same name. It can
    be useful for debugging purposes.

    - daemon The process’s daemon flag, a boolean value. This must be set before start()
    is called. The default value is inherited from the creating process. When a process
    exits, it attempts to terminate all of its daemonic child processes. Note that
    a daemonic process is not allowed to create child processes.'
