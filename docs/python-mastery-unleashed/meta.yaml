  md: '# Regular Expressions in Python


    # Introduction


    Regular Expression are a very powerful way of processing text while looking for
    recurring patterns; they are often used with data held in plain text files (such
    as log files), CSV files as well as Excel files. This chapter introduces regular
    expressions, discusses the syntax used to define a regular expression pattern
    and presents the Python re module and its use.


    # What Are Regular Expressions?


    A Regular Expression (also known as a regex or even just re) is a sequence of
    characters (letters, numbers and special characters) that form a pattern that
    can be used to search text to see if that text contains sequences of characters
    that match the pattern.


    For example, you might have a pattern defined as three characters followed by
    three numbers. This pattern could be used to look for such a pattern in other
    strings. Thus, the'
  merge: -1
  pgno: 401
- img_proc: true
  md: 'following strings either match (or contain) this pattern or they do not:


    | Abc123 | Matches the pattern |

    | :--- | :--- |

    | A123A | Does not match the pattern |

    | 123AAA | Does not match the pattern |


    Regular Expression are very widely used for finding information in files, for
    example


    +   - finding all lines in a log file associated with a specific user or a specific
    operation,

    - for validating input such as checking that a string is a valid email address
    or postcode/ZIP code etc.


    Support for Regular Expressions is wide spread within programming languages such
    as Java, C#, PHP and particularly Perl. Python is no exception and has the built-in
    module re (as well as additional third-party modules) that support Regular Expressions.


    # Regular Expression Patterns


    You can define a regular expression pattern using any ASCII character or number.
    Thus, the string ‘John’ can be used to define a regex pattern that can be used
    to match any other string that contains the characters ‘J’, ‘o’, ‘h’, ‘n’. Thus
    each of the following strings will match this pattern:


    +   - ‘John Hunt’

    - ‘John Jones’'
  merge: -1
  pgno: 402
- img_proc: true
  md: '+   - ‘Andrew John Smith’

    - ‘Mary Helen John’

    - ‘John John John’

    - ‘I am going to visit the John’

    - ‘I once saw a film by John Wayne’


    But the following strings would not match the pattern:


    +   - ‘Jon Davies’ in this case because the spelling of John is different.

    - ‘john Williams’ in this case because the capital J does not match the lowercase
    j.

    - ‘David James’ in this case because the string does not contain the string John!


    Regular expressions (regexs) use special characters to allow more complex patterns
    to be described. For example, we can use the special characters ‘[]’ to define
    a set of characters that can match. For example, if we want to indicate that the
    J may be a capital or a lower-case letter then we can write ‘[Jj]’—this indicates
    that either ‘J’ or ‘j’ can match the first.


    +   - [Jj]ohn—this states that the pattern starts with either a capital J or a
    lowercase j followed by ‘ohn’.


    Now both ‘john Williams’ and ‘John Williams’ will match this regex pattern


    # Pattern Metacharacters'
