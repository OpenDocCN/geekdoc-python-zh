- img_proc: true
  md: 'In wxPython, Frames and Dialogs as well as their contents are instances of
    appropriate classes (such as Frame, Dialog, Panel, Button or Static Text). Thus
    when you create a window, you create an object that knows how to display itself
    on the computer screen. You must tell it what to display and then tell it to show
    its contents to the user.


