    | Time(hour, minute, second) | Represents a time database value |

    | Timestamp(year, month, day, hour, minute, second) | Holds a database time stamp
    value |

    | String | Used to represent string like database data (such as VARCHARs) |


    # Generating Errors


    The standard also specifies a set of Exceptions that can be thrown in different
    situations.


    These are presented below and in the following table:'
  - '[PAGE 446]


    ![](img/8a661fca3884547aede940b9a6567321_446_0.png)


    The above diagram illustrates the inheritance hierarchy for the errors and warning
    associated with the standard. Note that the DB-API Warning and Error both extend
    the Exception class from standard Python; however, depending on the specific implementation
    there may be one or more additional classes in the hierarchy between these classes.
    For example, in the PyMySQL module there is a MySQLError class that extends Exception
    and is then extended by both'
  - '[PAGE 447]


    # Warning and Error.


    Also note that Warning and Error have no relationship with each other. This is
    because Warnings are not considered Errors and thus have a separate class hierarchies.
    However, the Error is the root class for all database Error classes.


    A description of each Warning or Error class is provided below.


    | Warning | Used to warn of issues such as data truncations during inserting,
    etc. |

    | Error | The base class of all other error exceptions |

    | InterfaceError | Exception raised for errors that are related to the database
    interface rather than the database itself |

    | Database Error | Exception raised for errors that are related to the database
    |

    | Data Error | Exception raised for errors that are due to problems with the data
    such as division by zero, numeric value out of range, etc. |

    | Operational Error | Exception raised for errors that are related to the database''s
    operation and not necessarily under the control of the programmer, e.g. an unexpected
    disconnect occurs, etc. |

    | Integrity Error | Exception raised when the relational integrity of the database
    is affected |

    | Internal Error | Exception raised when the database encounters an internal error,
    e.g. the cursor is not valid anymore, the transaction is out of sync, etc. |

    | ProgrammingError | Exception raised for programming errors, e.g. table not found,
    syntax error in the SQL statement, wrong number of parameters specified, etc.
    |

    | NotSupportedError | Exception raised in case a method or database API was used
    which is not supported by the database, e.g. requesting a .rollback() on a connection
    that does not support transactions or has transactions turned off |


    # Row Descriptions'
  - '[PAGE 448]


    The Cursor object has an attribute description that provides a sequence of sequences;
    each sub sequence provides a description of one of the attributes of the data
    returned by a SELECT statement. The sequence describing the attribute is made
    up of up to seven items, these include:


    +   - name representing the name of the attribute,

    - type_code which indicates what Python type this attribute has been mapped to,

    - display_size the size used to display the attribute,

    - internal_size the size used internally to represent the value,

    - precision if a real numeric value the precision supported by the attribute,

    - scale indicates the scale of the attribute,

    - null_ok this indicates whether null values are acceptable for this attribute.


    The first two items (name and type_code) are mandatory, the other five are optional
    and are set to None if no meaningful values can be provided.


    # Transactions in PyMySQL


    Transactions are managed in PyMySQL via the database connection object. This object
    provides the following method:


    +   - connection.commit()this causes the current transaction to commit all the
    changes made permanently to the'
  - '[PAGE 449]


    database. A new transaction is then started.


    +   - connection.rollback() this causes all changes that have been made so far
    (but not permanently stored into the database i.e. Not committed) to be removed.
    A new transaction is then started.


    The standard does not specify how a database interface should manage turning on
    and off transaction (not least because not all databases support transactions).
    However, MySQL does support transactions and can work in two modes; one supports
    the use of transactions as already described; the other uses an auto commit mode.
    In auto commit mode each command sent to the database (whether a SELECT statement
    or an INSERT/UPDATE statement) is treated as an independent transaction and any
    changes are automatically committed at the end of the statement. This auto commit
    mode can be turned on in PyMySQL using:


    +   - connection.autocommit(True) turn on auto commit (False to turn off auto
    commit which is the default).


    Other associated methods include


    +   - connection.get__autocommit() which returns a boolean indicating whether
    auto commit is turned on or not.

    - connection.begin() to explicitly begin a new transaction.


