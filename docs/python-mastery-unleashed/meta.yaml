    \ the X, Y and Z axis. Many consider such 3D charts to be eye candy; pretty to\
    \ look at but not providing much information. As such the use of a 3D chart should\
    \ be minimized and only used when actually necessary.\n\n## Graphical User Interfaces\n\
    \nA Graphical User Interface can capture the essence of an idea or a situation,\
    \ often avoiding the need for a long passage of text. Such interfaces can save\
    \ a user from the need to learn complex commands. They are less likely to intimidate\
    \ computer users and can provide a large amount of information quickly in a form\
    \ which can be easily assimilated by the user.\n\nThe widespread use of high quality\
    \ graphical interfaces has led many computer users to expect such interfaces to\
    \ any software they use. Most programming languages either incorporate a Graphical\
    \ User Interface (GUI) library or have third party libraries available.\n\nPython\
    \ is of course a cross platform programming language and this brings in additional\
    \ complexities as the underlying operating system may provide different windowing\
    \ facilities depending upon whether the program is running on Unix, Linux, Mac\
    \ OS or Windows operating systems.\n\nIn this chapter we will first introduce\
    \ what we mean by a GUI and by WIMP based UIs in particular. We will then consider\
    \ the range of libraries available for Python before selecting one to use. This\
    \ chapter will then describe how to create rich client graphical displays (desktop\
    \ application) using one of these GUI libraries. Thus in this chapter we consider\
    \ how windows, buttons, text fields and labels etc. are created, added to windows,\
    \ positioned and organized.\n\n### GUIs and WIMPS\n\nGUIs (Graphical User Interfaces)\
    \ and WIMP (Windows, Icons, Mice and Pop-up Menus) style interfaces have been\
    \ available within computer systems for many years but they are still one of the\
    \ most significant developments to have occurred. These interfaces were originally\
    \ developed out of a desire to address many of the perceived weaknesses of purely\
    \ textual interfaces.\n\nThe textual interface to an operating system was typified\
    \ by a peremptory prompt. In Unix/Linux systems for example, the prompt is often\
    \ merely a single character such as %, > or $, which can be intimidating. This\
    \ is true even for experienced computer users if they are not familiar with the\
    \ Unix/Linux family of operating systems.\n\nFor example, a user wishing to copy\
    \ a file from one directory to another might have to type something like:\n\n\
    ```\n> cp file.pdf ~otheruser/projdir/srcdir/newfile.pdf\n```\n\nThis long sequence\
    \ needs to be entered with no mistakes in order to be accepted. Any error in this\
    \ command will cause the system to generate an error message which might or might\
    \ not be enlightening. Even where systems attempt to be more “user friendly” through\
    \ features like command histories, much typing of arrow keys and file names is\
    \ typically needed.\n\nThe main issue on both input and output is one of bandwidth.\
    \ For example, in situations where the relationships between large amounts of\
    \ information must be described, it is much easier to assimilate this if output\
    \ is displayed graphically than if it is displayed as a tables of figures. On\
    \ input, combinations of mouse actions can be given a meaning that could otherwise\
    \ only be conveyed by several lines of text.\n\nWIMP stands for Windows (or Window\
    \ Managers), Icons, Mice and Pop-up menus. WIMP interfaces allow the user to overcome\
    \ at least some of the weaknesses of their textual counterparts—it is possible\
    \ to provide a pictorial image of the operating system which can be based on a\
    \ concept the user can relate to, menus can be used instead of textual commands\
    \ and information in general can be displayed graphically.\n\nThe fundamental\
    \ concepts presented via a WIMP interface were originally developed at XEROX’s\
    \ Palo Alto Research Center and used on the Xerox Star machine, but gained much\
    \ wider acceptance through first the Apple Macintosh and then IBM PC implementations\
    \ of WIMP interfaces.\n\nMost WIMP style environments use a desktop analogy (although\
    \ this is less true of mobile devices such as phones and tablets):\n\n- the whole\
    \ screen represents a working surface (a desktop),\n- graphic windows that can\
    \ overlap represent sheets of paper on that desktop,\n- graphic objects are used\
    \ for specific concepts, for example filing cabinets for disks or a waste bin\
    \ for file disposal (these could be regarded as desk accessories),\n- various\
    \ application programs are displayed on the screen, these stand for tools that\
    \ you might use on your desktop.\n\nIn order to interact with this display, the\
    \ WIMP user is provided with a mouse (or a light pen or a touch sensitive screen),\
    \ which can be used to select icons and menus or to manipulate windows."
