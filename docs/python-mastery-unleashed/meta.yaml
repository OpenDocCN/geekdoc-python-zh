    \ finds test based on naming conventions and can be easily integrated into a range\
    \ of editors and IDEs including PyCharm.\n\n# Setting Up PyTest\n\nYou will probably\
    \ need to set up PyTest so that you can use it from within your environment. If\
    \ you are using the PyCharm editor, then you will need to add the PyTest module\
    \ to the current PyCharm project and tell PyCharm that you want to use PyTest\
    \ to run all tests for you.\n\n# A Simple PyTest Example\n\n# Something to Test\n\
    \nTo be able to explore PyTest we first need something to test; we will therefore\
    \ define a simple Calculator class. The calculator keeps a running total of the\
    \ operations performed; it allows a new value to be set and then this value can\
    \ be added to, or subtracted from, that accumulated total.\n\n```\nclass Calculator:\n\
