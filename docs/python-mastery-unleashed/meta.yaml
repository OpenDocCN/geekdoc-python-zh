- img_proc: true
  md: '# Computer Graphics


    # Introduction to Computer Graphics


    Computer Graphics are everywhere; they are on your TV, in cinema adverts,the core
    of many films, on your tablet or mobile phone and certainly on your PC or Mac
    as well as on the dashboard of your car, on your smart watch and in children’s
    electronic toys.


    However what do we mean by the term Computer Graphics? The term goes back to a
    time when many (most) computers were purely textual in terms of their input and
    output and very few computers could generate graphical displays let alone handle
    input via such a display. However, in terms of this book we take the term Computer
    Graphics to include the creation of Graphical User Interfaces (or GUIs), graphs
    and charts such as bar charts or line plots of data, graphics in computer games
    (such as Space Invaders or Flight Simulator) as well as the generation of 2D and
    3D scenes or images.We also use the term to include Computer Generated Art.'
  merge: -1
  pgno: 17
- img_proc: true
  md: 'The availability of Computer Graphics is very important for the huge acceptance
    of computer systems by non computer scientists over the last 40 years. It is in
    part thanks to the accessibility of computer systems via computer graphic interfaces
    that almost everybody now uses some form of computer system (whether that is a
    PC, a tablet, a mobile phone or a smart TV).


    A Graphical User Interface (GUI) can capture the essence of an idea or a situation,
    often avoiding the need for a long passage of text or textual commands. It is
    also because a picture can paint a thousand words; as long as it is the right
    picture.


    In many situations where the relationships between large amounts of information
    must be conveyed, it is much easier for the user to assimilate this graphically
    than textually. Similarly, it is often easier to convey some meaning by manipulating
    some system entities on screen, than by combinations of text commands.


    For example, a well chosen graph can make clear information that is hard to determine
    from a table of the same data. In turn an adventure style game can become engaging
    and immersive with computer graphics which is in marked contrast to the textual
    versions of the 1980s. This highlights the advantages of a visual presentation
    compared to a purely textual one.'
  merge: -1
  pgno: 18
- img_proc: true
  md: '# Background


    Every interactive software system has a Human Computer Interface, whether it be
    a single text line system or an advanced graphic display. It is the vehicle used
    by developers for obtaining information from their user(s), and in turn, every
    user has to face some form of computer interface in order to perform any desired
    computer operation.


    Historically computer systems did not have a Graphical User Interface and rarely
    generated a graphical view. These systems from the 60s, 70s and 80s typically
    focused on numerical or data processing tasks. They were accessed via green or
    grey screens on a text oriented terminal. There was little or no opportunity for
    graphical output.


    However, during this period various researchers at laboratories such as Stanford,
    MIT, Bell Telephone Labs and Xerox were looking at the possibilities that graphic
    systems might offer to computers. Indeed even as far back as 1963 Ivan Sutherland
    showed that interactive computer graphics were feasible with his Ph.D. thesis
    on the Sketchpad system.


    # The Graphical Computer Era'
  merge: -1
  pgno: 19
- img_proc: true
  md: 'Graphical computer displays and interactive graphical interfaces became a common
    means of human–computer interaction during the 1980s. Such interfaces can save
    a user from the need to learn complex commands. They are less likely to intimidate
    computer naives and can provide a large amount of information quickly in a form
    which can be easily assimilated by the user.


    The widespread use of high quality graphical interfaces (such as those provided
    by the Apple Macintosh and the early Windows interface) led many computer users
    to expect such interfaces to any software they use. Indeed these systems paved
    the way for the type of interface that is now omnipresent on PCs, Macs, Linux
    boxes, tablets and smart phones etc. This graphical user interface is based on
    the WIMP paradigm (Windows, Icons, Menus and Pointers) which is now the prevalent
    type of graphical user interface in use today.


    The main advantage of any window-based system, and particularly of a WIMP environment,
    is that it requires only a small amount of user training. There is no need to
    learn complex commands, as most operations are available either as icons, operations
    on icons, user actions (such as swiping) or from menu options, and are easy to
    use. (An icon is a small graphic object that is usually symbolic of an operation
    or of a larger entity such as an application program or a file). In'
  merge: -1
  pgno: 20
- img_proc: true
  md: 'general, WIMP based systems are simple to learn, intuitive to use, easy to
    retain and straightforward to work with.


    These WIMP systems are exemplified by the Apple Macintosh interface (see Goldberg
    and Robson as well as Tesler), which was influenced by the pioneering work done
    at the Palo Alto Research Center on the Xerox Star Machine. It was, however, the
    Macintosh which brought such interfaces to the mass market, and first gained acceptance
    for them as tools for business, home and industry.This interface transformed the
    way in which humans expected to interact with their computers, becoming a defacto
    standard,which forced other manufacturers to provide similar interfaces on their
    own machines, for example Microsoft Windows for the PC.


    This type of interface can be augmented by providing direct manipulation graphics.
    These are graphics which can be grabbed and manipulated by the user, using a mouse,
    to perform some operation or action. Icons are a simple version of this, the “opening”
    of an icon causes either the associated application to execute or the associated
    window to be displayed.


    # Interactive and Non Interactive Graphics


    Computer graphics can be broadly subdivided into two categories:'
  merge: -1
  pgno: 21
- img_proc: true
  md: '+   - Non Interactive Computer Graphics

    - Interactive Computer Graphics.


    In Non Interactive Computer Graphics (aka Passive Computer Graphics) an image
    is generated by a computer typically on a computer screen; this image can be viewed
    by the user (however they cannot interact with the image). Examples of non-interactive
    graphics presented later in this book include Computer Generated Art in which
    an image is generated using the Python Turtle Graphics library.Such an image can
    viewed by the user but not modified. Another example might be a basic bar chart
    generated using MatPlotLib which presents some set of data.


    Interactive Computer Graphics by contrast, involve the user interacting with the
    image displayed in the screen in some way, this might be to modify the data being
    displayed or to change they way in which the image is being rendered etc. It is
    typified by interactive Graphical User Interfaces (GUIs) in which a user interacts
    with menus, buttons, input field, sliders,scroll bars etc. However, other visual
    displays can also be interactive. For example, a slider could be used with a MatplotLib
    chart. This display could present the number of sales made on a particular date;
    as the slider is moved so the data changes and the chart is modified to show different
    data sets.'
  merge: -1
  pgno: 22
- img_proc: true
  md: 'Another example is represented by all computer games which are inherently interactive
    and most, if not all, update their visual display in response to some user inputs.
    For example in the classic flight simulator game, as the user moves the joystick
    or mouse, the simulated plane moves accordingly and the display presented to the
    user updates.


    # Pixels


    A key concept for all computer graphics systems is the pixel. Pixel was originally
    a word formed from combining and shortening the words picture (or pix) and element.A
    pixel is a cell on the computer screen. Each cell represents a dot on the screen.
    The size of this dot or cell and the number of cells available will vary depending
    upon the type, size and resolution of the screen. For example, it was common for
    early Windows PCs to have a 640 by 480 resolution display (using a VGA graphics
    card). This relates to the number of pixels in terms of the width and height.
    This meant that there were 640 pixels across the screen with 480 rows of pixels
    down the screen. By contrast today’s 4K TV displays have 4096 by 2160 pixels.


    The size and number of pixels available affects the quality of the images presented
    to a user. With lower resolution displays (with fewer individual pixels) the image
    may appear blocky or'
  merge: -1
  pgno: 23
- img_proc: true
  md: 'poorly defined; where as with a higher resolution it may appear sharp and clear.


    Each pixel can be referenced by its location in the display grid. By filling a
    pixels on the screen with different colors various images/displays can be created.
    For example, in the following picture a single pixel has been filled at position
    4 by 4:


    ![](img/8a661fca3884547aede940b9a6567321_24_0.png)'
  merge: -1
  pgno: 24
- img_proc: true
  md: 'A sequence of pixels can form a line, a circle or any number of different shapes.
    However, since the grid of pixels is based on individual points, a diagonal line
    or a circle may need to utilize multiple pixels which when zoomed may have jagged
    edges. For example, the following picture shows part of a circle on which we have
    zoomed in:


    ![](img/8a661fca3884547aede940b9a6567321_25_0.png)'
  merge: -1
  pgno: 25
- img_proc: true
  md: 'Each pixel can have a color and a transparency associated with it. The range
    of colors available depends on the display system being used. For example, mono
    chrome displays only allow black and white, where as a grey scale display only
    allows various shades of grey to be displayed. On modern systems it is usually
    possible to represent a wide range of colors using the tradition RGB color codes
    (where R represents Red, G represents Green and B represents Blue). In this encoding
    solid Red is represented by a code such as [255, 0, 0] where as solid Green is
    represented by [0, 255, 0] and solid Blue by [0, 0, 255]. Based on this idea various
    shades can be represented by combination of these codes such as Orange which might
    be represented by [255, 150, 50]. This is illustrated below for a set of RGB colors
    using different red, green and blue values:'
  merge: -1
  pgno: 26
- img_proc: true
  md: '![](img/8a661fca3884547aede940b9a6567321_27_0.png)


    In addition it is possible to apply a transparency to a pixel. This is used to
    indicate how solid the fill color should be. The above grid illustrates the effect
    of applying a 75%, 50% and 25% transparency to colors displayed using the Python
    wxPython GUI library.In this library the transparency is referred to as the alpha
    opaque value. It can have values in the'
  merge: -1
  pgno: 27
- img_proc: true
  md: 'range 0–255 where 0 is completely trans- parent and 255 is completely solid.


    # Bit Map Versus Vector Graphics


    There are two ways of generating an image/display across the pixels on the screen.
    One approach is known as bit mapped (or raster)graphics and the other is known
    as vector graphics. In the bit mapped approach each pixel is mapped to the values
    to be displayed to create the image. In the vector graphics approach geometric
    shapes are described (such as lines and points) and these are then rendered onto
    a display. Raster graphics are simpler but vector graphics provide much more flexibility
    and scalability.


    # Buffering


    One issue for interactive graphical displays is the ability to change the display
    as smoothly and cleanly as possible. If a display is jerky or seems to jump from
    one image to another, then users will find it uncomfortable. It is therefore common
    to drawn the next display on some in memory structure; often referred to as a
    buffer. This buffer can then be rendered on the display once the whole image has
    been created. For example Turtle Graphics allows the user to define how many changes
    should be made to the display before it is rendered'
  merge: -1
  pgno: 28
- img_proc: true
  md: '(or drawn) on to the screen. This can significantly speed up the performance
    of a graphic application.


    In some cases systems will use two buffers; often referred to as double buffering.
    In this approach one buffer is being rendered or drawn onto the screen while the
    other buffer is being updated. This can significantly improve the overall performance
    of the system as modern computers can perform calculations and generate data much
    faster than it can typically be drawn onto a screen.


    # Python and Computer Graphics


    In the remainder of this section of the book we will look at generating computer
    graphics using the Python Turtle Graphics library. We will also discuss using
    this library to create Computer Generated Art. Following this we will explore
    the MatPlotLib library used to generate charts and data plots such as bar charts,
    scatter graphs, line plots and heat maps etc. We will then explore the use of
    Python libraries to create GUIs using menus, fields, tables etc.'
  merge: -1
  pgno: 29
