  md: 'The artist layer is concerned with things such as the lines, shapes, axis,
    and axes, text etc. that comprise a plot.


    The classes used by the Artist Layer can be classified into one of the following
    three groups; primitives, containers and collections:


    +   - Primitives are classes used to represent graphical objects that will be
    drawn on to a figures canvas.

    - Containers are objects that hold primitives. For example, typically a figure
    would be instantiated and used to create one or more Axes etc.

    - Collections are used to efficiently handle large numbers of similar types of
    objects.


    Although it is useful to be aware of these classes; in many cases you will not
    need to work with them directly as the pyplot APIhides much of the detail. However,
    it is possible to work at the level of figures, axes, ticks etc. if required.


