    # File Input/Output


    File Input/Output (often just referred to as File I/O) involves reading and writing
    data to and from files. The data being written can be in different formats.


    For example a common format used in Unix/Linux and Windows systems is the ASCII
    text format. The ASCII format (or American Standard Code for Information Interchange)
    is a set of codes that represent various characters that is widely used by operating
    systems. The following table illustrates some of the ASCII character codes and
    what they represent:


    | Decimal code | Character | Meaning |

    |---|---|---|

    | 42 | * | Asterisk |

    | 43 | + | Plus |

    | 48 | 0 | Zero |

    | 49 | 1 | One |

    | 50 | 2 | Two |

    | 51 | 3 | Three |

    | 65 | A | Uppercase A |

    | 66 | B | Uppercase B |

    | 67 | C | Uppercase C |

    | 68 | D | Uppercase D |


    (continued)


    (continued)


    | Decimal code | Character | Meaning |

    |---|---|---|

    | 97 | a | Lowercase a |

    | 98 | b | Lowercase b |

    | 99 | c | Lowercase c |

    | 100 | d | Lowercase d |'
  - '[PAGE 334]


    ASCII is a very useful format to use for text files as they can be read by a wide
    range of editors and browsers. These editors and browsers make it very easy to
    create human readable files. However, programming languages such as Python often
    use a different set of character encoding such as a Unicode character encoding
    (such as UTF-8). Unicode is another standard for representing characters using
    various codes. Unicode encoding systems offer a wider range of possible character
    encoding than ASCII, for example the latest version of Unicode in May 2019, Unicode
    12.1, contains a repertoire of 137,994 characters covering 150 modern and historic
    scripts, as well as multiple symbol sets and emojis.


    However, this means that it can be necessary to translate ASCII into Unicode (e.g.
    UTF-8) and vice versa when reading and writing ASCII files in Python.


    Another option is to use a binary format for data in a file. The advantage of
    using binary data is that there is little or no translation required from the
    internal representation of the data used in the Python program into the format
    stored in the file. It is also often more concise than an equivalent ASCII format
    and it is quicker for a program to read and write and takes up less disk space
    etc. However, the down side of a binary format is that it is not in an easily
    human readable format. It may also be difficult for other programs,'
- md: "particularly those written in other programming languages such as Java or C#,\
    \ to read the data in the files.\n\n## Sequential Access Versus Random Access\n\
    \nData can be read from (or indeed written to) a file either sequentially or via\
    \ a random access approach.\n\nSequential access to data in a file means that\
    \ the program reads (or writes) data to a file sequentially, starting at the beginning\
    \ of a file and processing the data an item at a time until the end of the file\
    \ is reached. The read process only ever moves forward and only to the next item\
    \ of data to read.\n\nRandom Access to a data file means that the program can\
    \ read (or write) data anywhere into the file at any time. That is the program\
    \ can position itself at a particular point in the file (or rather a pointer can\
    \ be positioned within the file) and it can then start to read (or write) at that\
    \ point. If it is reading then it will read the next data item relative to the\
    \ pointer rather than the start of the file. If it is writing data then it will\
    \ write data from that point rather than at the end of the file. If there is already\
    \ data at that point in the file then it will be over written. This type of access\
    \ is also known as Direct Access as the computer program needs to know where the\
    \ data is stored within the file and thus goes directly to that location for the\
    \ data. In some cases the location of the data is recorded in an index and thus\
    \ is also known as indexed access.\n\nSequential file access has advantages when\
    \ a program needs to access information in the same order each time the data is\
    \ read. It is also is faster to read or write all the data sequentially than via\
    \ direct access as there is no need to move the file pointer around.\n\nRandom\
    \ access files however are more flexible as data does not need to be written or\
    \ read in the order in which it is obtained. It is also possible to jump to just\
    \ the location of the data required and read that data (rather than needing to\
    \ sequentially read through all the data to find the data items of interest).\n\
    \n## Files and I/O in Python\n\nIn the remainder of this section of the book we\
    \ will explore the basic facilities provided for reading and writing files in\
    \ Python. We will also look at the underlying streams model for file I/O. After\
    \ this we will explore the widely used CSV and Excel file formats and libraries\
    \ available to support those. This section concludes by exploring the Regular\
    \ Expression facilities in Python. While this last topic is not strictly part\
    \ of file I/O it is often used to parse data read from files to screen out unwanted\
    \ information.\n\n## Reading and Writing Files\n\n### Introduction\n\nReading\
    \ data from and writing data to a file is very common within many programs. Python\
    \ provides a large amount of support for working with files of various types.\
    \ This chapter introduces you to the core file IO functionality in Python.\n\n\
    ### Obtaining References to Files\n\nReading from, and writing to, text files\
    \ in Python is relatively straightforward. The built in open() function creates\
    \ a file object for you that you can use to read and/ or write data from and/\
    \ or to a file.\n\nThe function requires as a minimum the name of the file you\
    \ want to work with. Optionally you can specify the access mode (e.g. read, write,\
    \ append etc.). If you do not specify a mode then the file is open in read-only\
    \ mode. You can also specify whether you want the interactions with the file to\
    \ be buffered which can improve performance by grouping data reads together.\n\
    \nThe syntax for the open() function is\n\n```\nfile_object = open(file_name,\
    \ access_mode, buffering)\n```\n\nWhere\n\n- file_name indicates the file to be\
    \ accessed.\n- access_mode The access_mode determines the mode in which the file\
    \ is to be opened, i.e. read, write, append, etc. A complete list of possible\
    \ values is given below in the table. This is an optional parameter and the default\
    \ file access mode is read (r).\n- buffering If the buffering value is set to\
    \ 0, no buffering takes place. If the buffering value is 1, line buffering is\
    \ performed while accessing a file.\n\nThe access_mode values are given in the\
    \ following table.\n\n| Mode | Description |\n|---|---|\n| r | Opens a file for\
    \ reading only. The file pointer is placed at the beginning of the file. This\
    \ is the default mode |\n| rb | Opens a file for reading only in binary format.\
    \ The file pointer is placed at the beginning of the file. This is the default\
    \ mode |\n| r+ | Opens a file for both reading and writing. The file pointer placed\
    \ at the beginning of the file |\n| rb+ | Opens a file for both reading and writing\
    \ in binary format. The file pointer placed at the beginning of the file |\n|\
    \ w | Opens a file for writing only. Overwrites the file if the file exists. If\
    \ the file does not exist, creates a new file for writing |\n| wb | Opens a file\
    \ for writing only in binary format. Overwrites the file if the file exists. If\
    \ the file does not exist, creates a new file for writing |\n| w+ | Opens a file\
    \ for both writing and reading. Overwrites the existing file if the file exists.\
    \ If the file does not exist, creates a new file for reading and writing |\n|\
    \ wb+ | Opens a file for both writing and reading in binary format. Overwrites\
    \ the existing file if the file exists. If the file does not exist, creates a\
    \ new file for reading and writing |\n| a | Opens a file for appending. The file\
    \ pointer is at the end of the file if the file exists. That is, the file is in\
    \ the append mode. If the file does not exist, it creates a new file for writing\
    \ |\n| ab | Opens a file for appending in binary format. The file pointer is at\
    \ the end of the file if the file exists. That is, the file is in the append mode.\
    \ If the file does not exist, it creates a new file for writing |\n| a+ | Opens\
    \ a file for both appending and reading. The file pointer is at the end of the\
    \ file if the file exists. The file opens in the append mode. If the file does\
    \ not exist, it creates a new file for reading and writing |\n| ab+ | Opens a\
    \ file for both appending and reading in binary format. The file pointer is at\
    \ the end of the file if the file exists. The file opens in the append mode. If\
    \ the file does not exist, it creates a new file for reading and writing |\n\n\
    The file object itself has several useful attributes such as\n\n- file.closed\
    \ returns True if the file has been closed (can no longer be accessed because\
    \ the close() method has been called on it).\n- file.mode returns the access mode\
    \ with which the file was opened.\n- file.name The name of the file.\n\nThe file.close()\
    \ method is used to close the file once you have finished with it. This will flush\
    \ any unwritten information to the file (this may occur because of buffering)\
    \ and will close the reference from the file object to the actual underlying operating\
    \ system file. This is important to do as leaving a reference to a file open can\
    \ cause problems in larger applications as typically there are only a certain\
    \ number of file references possible at one time and over a long period of time\
    \ these may all be used up resulting in future errors being thrown as files can\
    \ no longer be opened.\n\nThe following short code snippet illustrates the above\
    \ ideas:\n\n```\nfile = open('myfile.txt', 'r+')\nprint('file.name:', file.name)\n\
    print('file.closed:', file.closed)\nprint('file.mode:', file.mode)\nfile.close()\n\
    print('file.closed now:', file.closed)\n```\n\nThe output from this is:\n\n- file.name:\
    \ myfile.txt\n- file.closed: False\n- file.mode: r+\n- file.closed now: True\n\
    \n### Reading Files\n\nOf course, having set up a file object we want to be able\
    \ to either access the contents of the file or write data to that file (or do\
    \ both). Reading data from a text file is supported by the read(), readline()\
    \ and readlines() methods:\n\n- The read() method This method will return the\
    \ entire contents of the file as a single string.\n- The readline() method reads\
    \ the next line of text from a file. It returns all the text on one line up to\
    \ and including the newline character. It can be used to read a file a line at\
    \ a time.\n- The readlines() method returns a list of all the lines in a file,\
    \ where each item of the list represents a single line.\n\nNote that once you\
    \ have read some text from a file using one of the above operations then that\
    \ line is not read again. Thus using readlines() would result in a further readlines()\
    \ returning an empty list whatever the contents of the file.\n\nThe following\
    \ illustrates using the readlines() method to read all the text in a text file\
    \ into a program and then print each line out in turn:\n\n```\nfile = open('myfile.txt',\
    \ 'r')\nlines = file.readlines()\nfor line in lines:\n    print(line, end='')\n\
    file.close()\n```\n\nNotice that within the for loop we have indicated to the\
    \ print function that we want the end character to be '' rather than a"
  mdcn: "特别是那些用其他编程语言（如 Java 或 C#）编写的程序，需要读取文件中的数据。\n\n## 顺序访问与随机访问\n\n数据可以从文件中读取（或写入），既可以采用顺序访问方式，也可以采用随机访问方式。\n\
    \n顺序访问文件中的数据意味着程序按顺序读取（或写入）数据，从文件开头开始，一次处理一个数据项，直到到达文件末尾。读取过程只会向前移动，并且只移动到下一个要读取的数据项。\n\
    \n随机访问数据文件意味着程序可以在任何时候读取（或写入）文件中的任何位置。也就是说，程序可以定位到文件中的特定点（或者更准确地说，一个指针可以定位在文件内），然后从该点开始读取（或写入）。如果是读取，它将相对于指针读取下一个数据项，而不是从文件开头读取。如果是写入数据，它将从该点开始写入数据，而不是在文件末尾写入。如果该点在文件中已有数据，则会被覆盖。这种访问方式也称为直接访问，因为计算机程序需要知道数据在文件中的存储位置，从而直接前往该位置获取数据。在某些情况下，数据的位置记录在索引中，因此也称为索引访问。\n\
    \n当程序每次读取数据时都需要按相同顺序访问信息时，顺序文件访问具有优势。此外，顺序读取或写入所有数据也比通过直接访问更快，因为无需移动文件指针。\n\n\
    然而，随机访问文件更灵活，因为数据无需按获取顺序写入或读取。也可以直接跳转到所需数据的位置并读取该数据（而无需顺序读取所有数据以找到感兴趣的数据项）。\n\n\
    ## Python 中的文件与 I/O\n\n在本书本节的剩余部分，我们将探讨 Python 中为读写文件提供的基本功能。我们还将了解文件 I/O 底层的流模型。之后，我们将探讨广泛使用的\
    \ CSV 和 Excel 文件格式以及支持这些格式的可用库。本节最后将探讨 Python 中的正则表达式功能。虽然最后一个主题严格来说不属于文件 I/O，但它通常用于解析从文件读取的数据，以筛选出不需要的信息。\n\
    \n## 读写文件\n\n### 简介\n\n从文件读取数据和向文件写入数据在许多程序中非常常见。Python 为处理各种类型的文件提供了大量支持。本章将向你介绍\
    \ Python 中核心的文件 I/O 功能。\n\n### 获取文件引用\n\n在 Python 中读取和写入文本文件相对简单。内置的 `open()`\
    \ 函数会为你创建一个文件对象，你可以使用该对象从文件读取和/或向文件写入数据。\n\n该函数至少需要你想要操作的文件名作为参数。你还可以选择指定访问模式（例如，读取、写入、追加等）。如果不指定模式，则文件以只读模式打开。你还可以指定是否希望与文件的交互是缓冲的，这可以通过将数据读取分组来提高性能。\n\
    \n`open()` 函数的语法如下：\n\n```\nfile_object = open(file_name, access_mode, buffering)\n\
    ```\n\n其中\n\n- `file_name` 表示要访问的文件。\n- `access_mode` 访问模式决定了文件的打开方式，即读取、写入、追加等。下表列出了所有可能的值。这是一个可选参数，默认的文件访问模式是读取（`r`）。\n\
    - `buffering` 如果 `buffering` 值设置为 0，则不进行缓冲。如果 `buffering` 值为 1，则在访问文件时执行行缓冲。\n\
    \n访问模式值如下表所示。\n\n| 模式 | 描述 |\n|---|---|\n| `r` | 以只读方式打开文件。文件指针置于文件开头。这是默认模式 |\n\
    | `rb` | 以二进制格式打开文件进行只读。文件指针置于文件开头。这是默认模式 |\n| `r+` | 打开文件进行读写。文件指针置于文件开头 |\n\
    | `rb+` | 以二进制格式打开文件进行读写。文件指针置于文件开头 |\n| `w` | 打开文件进行只写。如果文件存在则覆盖。如果文件不存在，则创建一个新文件用于写入\
    \ |\n| `wb` | 以二进制格式打开文件进行只写。如果文件存在则覆盖。如果文件不存在，则创建一个新文件用于写入 |\n| `w+` | 打开文件进行读写。如果文件存在则覆盖现有文件。如果文件不存在，则创建一个新文件用于读写\
    \ |\n| `wb+` | 以二进制格式打开文件进行读写。如果文件存在则覆盖现有文件。如果文件不存在，则创建一个新文件用于读写 |\n| `a` | 打开文件进行追加。如果文件存在，文件指针位于文件末尾。即文件处于追加模式。如果文件不存在，则创建一个新文件用于写入\
    \ |\n| `ab` | 以二进制格式打开文件进行追加。如果文件存在，文件指针位于文件末尾。即文件处于追加模式。如果文件不存在，则创建一个新文件用于写入\
    \ |\n| `a+` | 打开文件进行追加和读取。如果文件存在，文件指针位于文件末尾。文件以追加模式打开。如果文件不存在，则创建一个新文件用于读写 |\n\
    | `ab+` | 以二进制格式打开文件进行追加和读取。如果文件存在，文件指针位于文件末尾。文件以追加模式打开。如果文件不存在，则创建一个新文件用于读写 |\n\
    \n文件对象本身有几个有用的属性，例如\n\n- `file.closed` 如果文件已关闭（因为已对其调用 `close()` 方法而无法再访问），则返回\
    \ `True`。\n- `file.mode` 返回文件打开时的访问模式。\n- `file.name` 文件的名称。\n\n`file.close()`\
    \ 方法用于在完成文件操作后关闭文件。这将把任何未写入的信息刷新到文件（这可能是由于缓冲造成的），并关闭文件对象到实际底层操作系统文件的引用。这样做很重要，因为保持文件引用打开可能会在较大的应用程序中引起问题，因为通常一次只能有一定数量的文件引用可用，长时间运行后这些引用可能全部用尽，导致未来无法打开文件而抛出错误。\n\
    \n以下简短的代码片段说明了上述概念：\n\n```\nfile = open('myfile.txt', 'r+')\nprint('file.name:',\
    \ file.name)\nprint('file.closed:', file.closed)\nprint('file.mode:', file.mode)\n\
    file.close()\nprint('file.closed now:', file.closed)\n```\n\n输出如下：\n\n- file.name:\
    \ myfile.txt\n- file.closed: False\n- file.mode: r+\n- file.closed now: True\n\
    \n### 读取文件\n\n当然，设置好文件对象后，我们希望能够访问文件内容或向该文件写入数据（或两者兼做）。从文本文件读取数据由 `read()`、`readline()`\
    \ 和 `readlines()` 方法支持：\n\n- `read()` 方法 此方法将返回文件的全部内容作为一个字符串。\n- `readline()`\
    \ 方法从文件中读取下一行文本。它返回一行上的所有文本，直到并包括换行符。可用于一次读取文件的一行。\n- `readlines()` 方法返回文件中所有行的列表，其中列表的每个元素代表一行。\n\
    \n请注意，一旦你使用上述任一操作从文件中读取了某些文本，那么该行就不会再次读取。因此，无论文件内容如何，再次使用 `readlines()` 都会返回一个空列表。\n\
    \n以下示例说明了如何使用 `readlines()` 方法将文本文件中的所有文本读入程序，然后依次打印每一行：\n\n```\nfile = open('myfile.txt',\
    \ 'r')\nlines = file.readlines()\nfor line in lines:\n    print(line, end='')\n\
    file.close()\n```\n\n请注意，在 `for` 循环中，我们向 `print` 函数指示我们希望结束字符是 `''` 而不是"
