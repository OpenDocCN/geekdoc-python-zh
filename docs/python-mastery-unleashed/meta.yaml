- md: "There are two ways in which to initiate a new thread of execution:\n\n- Pass\
    \ a reference to a callable object (such as a function or method) into the Thread\
    \ class constructor. This reference acts as the target for the Thread to execute.\n\
    - Create a subclass of the Thread class and redefine the run() method to perform\
    \ the set of actions that the thread is intended to do.\n\nWe will look at both\
    \ approaches.\n\nAs a thread is an object, it can be treated just like any other\
    \ object: it can be sent messages, it can have instance variables and it can provide\
    \ methods. Thus, the multi-threaded aspects of Python all conform to the object-oriented\
    \ model. This greatly simplifies the creation of multi-threaded systems as well\
    \ as the maintainability and clarity of the resulting software.\n\nOnce a new\
    \ instance of a thread is created, it must be started. Before it is started, it\
    \ cannot run, although it exists.\n\n## Instantiating the Thread Class\n\nThe\
    \ Thread class can be found in the threading module and therefore must be imported\
    \ prior to use. The class Thread defines a single constructor that takes up to\
    \ six optional arguments:\n\n```python\nclass threading.Thread(group=None,\n \
    \   target=None,\n    name=None,\n    args=(),\n    kwargs={},\n    daemon=None)\n\
    ```\n\nThe Thread constructor should always be called using keyword arguments;\
    \ the meaning of these arguments is:\n\n- group should be None; reserved for future\
    \ extension when a ThreadGroup class is implemented.\n- target is the callable\
    \ object to be invoked by the run() method. Defaults to None, meaning nothing\
    \ is called.\n- name is the thread name. By default, a unique name is constructed\
    \ of the form “Thread-N” where N is an integer.\n- args is the argument tuple\
    \ for the target invocation. Defaults to (). If a single argument is provided\
    \ the tuple is not required. If multiple arguments are provided then each argument\
    \ is an element within the tuple.\n- kwargs is a dictionary of keyword arguments\
    \ for the target invocation. Defaults to {}.\n- daemon indicates whether this\
    \ thread runs as a daemon thread or not. If not None, daemon explicitly sets whether\
    \ the thread is daemonic. If None (the default), the daemonic property is inherited\
    \ from the current thread.\n\nOnce a Thread is created it must be started to become\
    \ eligible for execution using the Thread.start() method. The following illustrates\
    \ a very simple program that creates a Thread that will run the simple_worker()\
    \ function:\n\n```python\nfrom threading import Thread\ndef simple_worker():\n\
    \    print('hello')\n# Create a new thread and start it\n# The thread will run\
    \ the function simple_worker\nt1 = Thread(target=simple_worker)\nt1.start()\n\
    ```\n\nIn this example, the thread t1 will execute the function simple_worker.\
    \ The main code will be executed by the main thread that is present when the program\
    \ starts; there are thus two threads used in the above program; main and t1.\n\
    \n## The Thread Class\n\nThe Thread class defines all the facilities required\
    \ to create an object that can execute within its own lightweight process. The\
    \ key methods are:\n\n- start() Start the thread’s activity. It must be called\
    \ at most once per thread object. It arranges for the object’s run() method to\
    \ be invoked in a separate thread of control. This method will raise a RuntimeError\
    \ if called more than once on the same thread object.\n- run() Method representing\
    \ the thread’s activity. You may override this method in a subclass. The standard\
    \ run() method invokes the callable object passed to the object’s constructor\
    \ as the target argument, if any, with positional and keyword arguments taken\
    \ from the args and kwargs arguments, respectively. You should not call this method\
    \ directly.\n- join(timeout=None) Wait until the thread sent this message terminates.\
    \ This blocks the calling thread until the thread whose join() method is called\
    \ terminates. When the timeout argument is present and not None, it should be\
    \ a floating-point number specifying a timeout for the operation in seconds (or\
    \ fractions thereof). A thread can be join()ed many times.\n- name A string used\
    \ for identification purposes only. It has no semantics. Multiple threads may\
    \ be given the same name. The initial name is set by the constructor. Giving a\
    \ thread a name can be useful for debugging purposes.\n- ident The ‘thread identifier’\
    \ of this thread or None if the thread has not been started. This is a nonzero\
    \ integer.\n- is_alive() Return whether the thread is alive. This method returns\
    \ True just before the run() method starts until just after the run() method terminates.\
    \ The module function threading.enumerate() returns a list of all alive threads.\n\
    - daemon A boolean value indicating whether this thread is a daemon thread (True)\
    \ or not (False). This must be set before start() is called, otherwise a RuntimeError\
    \ is raised. Its default value is inherited from the creating thread. The entire\
    \ Python program exits when no alive non-daemon threads are left.\n\nAn example\
    \ illustrating using some of these methods is given below:\n\n```python\nfrom\
    \ threading import Thread\ndef simple_worker():\n    print('hello')\nt1 = Thread(target=simple_worker)\n\
    t1.start()\nprint(t1.getName())\nprint(t1.ident)\nprint(t1.is_alive())\n```\n\n\
    This produces:\n\n```\nhello\nThread-1\n123145441955840\nTrue\n```\n\nThe join()\
    \ method can cause one thread to wait for another to complete. For example, if\
    \ we want the main thread to wait until a thread completes before it prints the\
    \ done message; then we can make it join that thread:\n\n```python\nfrom threading\
    \ import Thread\nfrom time import sleep\ndef worker():\n    for i in range(0,10):\n\
    \        print('.', end='', flush=True)\n        sleep(1)\n    print('Starting')\n\
    # Create thread object with reference to worker function\nt = Thread(target=worker)\n\
    # Start the thread object\nt.start()\n# Wait for the thread to complete\nt.join()\n\
    print('\\nDone')\n```\n\nNow the ‘Done’ message should not be printed out until\
    \ after the worker thread has finished as shown below:\n\n```\nStarting\n........\n\
    Done\n```\n\n## The Threading Module Functions\n\nThere are a set of threading\
