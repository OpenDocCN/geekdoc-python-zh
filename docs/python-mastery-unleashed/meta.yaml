  md: 'Concurrency relates to executing multiple tasks at the same time. In many cases
    these tasks are not related to each other such as printing a document and refreshing
    the User Interface. In these cases, the separate tasks are completely independent
    and can execute at the same time without any interaction.


    In other situations multiple concurrent tasks need to interact; for example, where
    one or more tasks produce data and one or more other tasks consume that data.
    This is often referred to as a producer-consumer relationship. In other situations,
    all parallel processes must have reached the same point before some other behaviour
    is executed.


    Another situation that can occur is where we want to ensure that only one concurrent
    task executes a piece of sensitive code at a time; this code must therefore be
    protected from concurrent access.


    Concurrent and parallel libraries need to provide facilities that allow for such
    synchronization to occur.


    # Object Orientation and Concurrency


    The concepts behind object-oriented programming lend themselves particularly well
    to the concepts associated with concurrency. For example, a system can be described
    as a set'
  merge: -1
  pgno: 527
- img_proc: true
  md: 'of discrete objects communicating with one another when necessary. In Python,
    only one object may execute at any one moment in time within a single interpreter.
    However, conceptually at least, there is no reason why this restriction should
    be enforced. The basic concepts behind object orientation still hold, even if
    each object executes within a separate independent process


    Traditionally a message send is treated like a procedural call, in which the calling
    object’s execution is blocked until a response is returned. However, we can extend
    this model quite simply to view each object as a concurrently executable program,
    with activity starting when the object is created and continuing even when a message
    is sent to another object (unless the response is required for further processing).
    In this model, there may be very many (concurrent) objects executing at the same
    time. Of course, this introduces issues associated with resource allocation, etc.
    but no more so than in any concurrent system.


    One implication of the concurrent object model is that objects are larger than
    in the traditional single execution thread approach, because of the overhead of
    having each object as a separate thread of execution. Overheads such as the need
    for a scheduler to handling these execution threads and resource allocation mechanisms
    means that it is not feasible to have integers, characters, etc. as separate processes.'
