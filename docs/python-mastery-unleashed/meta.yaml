    # PyDraw wxPython Example Application


    # Introduction


    This chapter builds on the GUI library presented in the last two chapters to illustrate
    how a larger application can be built. It presents a case study of a drawing tool
    akin to a tool such as Visio etc.


    # The PyDraw Application


    The PyDraw application allows a user to draw diagrams using squares, circles,
    lines and text. At present there is no select, resize, reposition or delete option
    available (although these could be added if required). PyDraw is implemented using
    the wxPython set of components as defined in version 4.0.6.


    ![](img/8a661fca3884547aede940b9a6567321_158_0.png)'
  - '[PAGE 159]


    When a user starts the PyDraw application, they see the interface shown above
    (for both the Microsoft Windows and Apple Mac operating systems). Depending on
    the operating system it has a menu bar across the top (on a Mac this menu bar
    is at the Top of the Mac display), a tool bar below the menu bar and a scrollable
    drawing area below that.


    The first button on the tool bar clears the drawing area. The second and third
    buttons are only implemented so that they print out a message into the Python
    console, but are intended to allow a user to load and save drawings.


    The tool bar buttons are duplicated on the menus defined for the application,
    along with a drawing tool selection menu, as shown below:


    ![](img/8a661fca3884547aede940b9a6567321_159_0.png)


    # The Structure of the Application'
- md: "The user interface created for the PyDraw application is made up of a number\
    \ of elements (see below): the PyDrawMenuBar, the PyDrawToolbar containing a sequence\
    \ of buttons across the top of the window, the drawing panel, and the window frame\
    \ (implemented by the PyDrawFrame class).\n\n![](img/8a661fca3884547aede940b9a6567321_160_0.png)\n\
    \nThe following diagram shows the same information as that presented above, but\
    \ as a containment hierarchy, this means that the diagram illustrates how one\
    \ object is contained within another. The lower level objects are contained within\
    \ the higher level objects.\n\n![](img/8a661fca3884547aede940b9a6567321_161_0.png)\n\
    \nIt is important to visualize this as the majority of wxPython interfaces are\
    \ built up in this way, using containers and sizers.\n\nThe inheritance structure\
    \ between the classes used in the PyDraw application is illustrated below. This\
    \ class hierarchy is typical of an application which incorporates user interface\
    \ features with graphical elements.\n\n![](img/8a661fca3884547aede940b9a6567321_162_0.png)\n\
    \n## Model, View and Controller Architecture\n\nThe application adopts the well\
    \ established Model-View-Controller (or MVC) design pattern for separating out\
    \ the responsibilities between the view element (e.g. the Frame or Panel), the\
    \ control element (for handling user input) and the model element (which holds\
    \ the data to be displayed).\n\nThis separation of concerns is not a new idea\
    \ and allows the construction of GUI applications that mirror the Model-View-Controller\
    \ architecture. The intention of the MVC architecture is the separation of the\
    \ user display, from the control of user input, from the underlying information\
    \ model as illustrated below.\n\n![](img/8a661fca3884547aede940b9a6567321_163_0.png)\n\
    \nThere are a number of reasons why this separation is useful:\n\n- re-usability\
    \ of application and/or user interface components,\n- ability to develop the application\
    \ and user interface separately,\n- ability to inherit from different parts of\
    \ the class hierarchy,\n- ability to define control style classes which provide\
    \ common features separately from how these features may be displayed.\n\nThis\
    \ means that different interfaces can be used with the same application, without\
    \ the application knowing about it. It also means that any part of the system\
    \ can be changed without affecting the operation of the other. For example, the\
    \ way that the graphical interface (the look) displays the information could be\
    \ changed without modifying the actual application or how input is handled (the\
    \ feel). Indeed the application need not know what type of interface is currently\
    \ connected to it at all.\n\n## PyDraw MVC Architecture\n\nThe MVC structure of\
    \ the PyDraw application has a top level controller class PyDrawController and\
    \ a top level view class the PyDrawFrame (there is no model as the top level MVC\
    \ triad does not hold any explicit data itself). This is shown below:\n\n![](img/8a661fca3884547aede940b9a6567321_164_0.png)\n\
    \nAt the next level down there is another MVC structure; this time for the drawing\
    \ element of the application. There is a DrawingController, with a DrawingModel\
    \ and a DrawingPanel (the view) as illustrated below:\n\n![](img/8a661fca3884547aede940b9a6567321_165_0.png)\n\
    \nThe DrawingModel, DrawingPanel and DrawingController classes exhibit the classic\
    \ MVC structure. The view and the controller classes (DrawingPanel and DrawingController)\
    \ know about each other and the drawing model, whereas the DrawingModel knows\
    \ nothing about the view or the controller. The view is notified of changes in\
    \ the drawing through the paint event.\n\n## Additional Classes\n\nThere are also\
    \ four types of drawing object (of Figure): Circle, Line, Square and Text figures.\
    \ The only difference between these classes is what is drawn on the graphic device\
    \ context within the on_paint() method. The Figure class, from which they all\
    \ inherit, defines the common attributes used by all objects within a Drawing\
    \ (e.g. point representing an x and y location and size).\n\n![](img/8a661fca3884547aede940b9a6567321_166_0.png)\n\
    \nThe PyDrawFrame class also uses a PyDrawMenuBar and a PyDrawToolBar class. The\
    \ first of these extends the wx.MenuBar with menu items for use within the PyDraw\
    \ application. In turn the PyDrawToolBar extends the wx.ToolBar and provides icons\
    \ for use in PyDraw.\n\n![](img/8a661fca3884547aede940b9a6567321_166_1.png)\n\n\
    The final class is the PyDrawApp class that extends the wx.App class.\n\n![](img/8a661fca3884547aede940b9a6567321_167_0.png)\n\
    \n## Object Relationships\n\nHowever, the inheritance hierarchy is only part of\
    \ the story for any object oriented application. The following figure illustrates\
    \ how the objects relate to one another within the working application.\n\n![](img/8a661fca3884547aede940b9a6567321_168_0.png)\n\
    \nThe PyDrawFrame is responsible for setting up the controller and the DrawingPanel.\
    \ The PyDrawController is responsible for handling menu and tool bar user interactions.\
    \ This separates graphical elements from the behavior triggered by the user.\n\
    \nThe DrawingPanel is responsible for displaying any figures held by the DrawingModel.\
    \ The DrawingController manages all user interactions with the DrawingPanel including\
    \ adding figures and clearing all figures from the model. The DrawingModel holds\
    \ list of figures to be displayed.\n\n## The Interactions Between Objects\n\n\
    We have now examined the physical structure of the application but not how the\
    \ objects within that application interact. In many situations this can be extracted\
    \ from the source code of the application (with varying degrees of difficulty).\
    \ However, in the case of an application such as PyDraw, which is made up of a\
    \ number of different interacting components, it is useful to describe the system\
    \ interactions explicitly.\n\nThe diagrams illustrating the interactions between\
    \ the objects use the following conventions:\n\n- a solid arrow indicates a message\
    \ send,\n- a square box indicates a class,\n- a name in brackets indicates the\
    \ type of instance,\n- numbers indicate the sequence of message sends.\n\nThese\
    \ diagrams are based on the collaboration diagrams found in the UML (Unified Modelling\
    \ Language) notation.\n\n## The PyDrawApp\n\nWhen the PyDrawApp is instantiated\
    \ the PyDrawFrame in created and displayed using the OnInit() method. The MainLoop()\
    \ method is then invoked. This is shown below:\n\n```python\nclass PyDrawApp(wx.App):\n\
    \    def OnInit(self):\n        \"\"\" Initialise the GUI display\"\"\"\n    \
    \    frame = PyDrawFrame(title='PyDraw')\n        frame.Show()\n        return\
    \ True\n\n# Run the GUI application\napp = PyDrawApp()\napp.MainLoop()\n```\n\n\
    ## The PyDrawFrame Constructor\n\nThe PyDrawFrame constructor method sets up the\
    \ main display of the UI application and also initializes the controllers and\
    \ drawing elements. This is shown below using a collaboration diagram:\n\n![](img/8a661fca3884547aede940b9a6567321_171_0.png)\n\
    \nThe PyDrawFrame constructor sets up the environment for the application. It\
    \ creates the top level PyDrawController. It creates the DrawingPanel and initializes\
    \ the display layout. It initializes the menu bar and tool bar. It binds the controllers\
    \ menu handler to the menus and centers itself.\n\n## Changing the Application\
    \ Mode\n\nOne interesting thing to note is what happens when the user selects\
    \ an option from the Drawing menu. This allows the mode to be changed to a square,\
    \ circle, line or text. The interactions involved are shown below for the situation\
    \ where a user selects the ‘Circle’ menu item on the Drawing menu (using a collaboration\
    \ diagram):\n\n![](img/8a661fca3884547aede940b9a6567321_172_0.png)\n\nWhen the\
    \ user selects one of the menu items the command_menu_handler() method of the\
    \ PyDrawController is invoked. This method determines which menu item has been\
    \ selected; it then calls an appropriate setter method (such as set_circle_mode()\
    \ or set_line_mode() etc.). These methods set the mode attribute of the controller\
    \ to an appropriate value.\n\n## Adding a Graphic Object"
  mdcn: "为PyDraw应用程序创建的用户界面由多个元素组成（见下文）：PyDrawMenuBar、包含窗口顶部一系列按钮的PyDrawToolbar、绘图面板以及窗口框架（由PyDrawFrame类实现）。\n\
    \n![](img/8a661fca3884547aede940b9a6567321_160_0.png)\n\n下图展示了与上述相同的信息，但以包含层次结构呈现，这意味着该图说明了一个对象如何被包含在另一个对象中。低级对象包含在高级对象内部。\n\
    \n![](img/8a661fca3884547aede940b9a6567321_161_0.png)\n\n可视化这一点很重要，因为大多数wxPython界面都是通过这种方式构建的，使用容器和布局管理器。\n\
    \nPyDraw应用程序中使用的类之间的继承结构如下所示。这种类层次结构是结合了用户界面功能与图形元素的典型应用程序结构。\n\n![](img/8a661fca3884547aede940b9a6567321_162_0.png)\n\
    \n## 模型、视图和控制器架构\n\n该应用程序采用了成熟的模型-视图-控制器（或MVC）设计模式，用于分离视图元素（例如框架或面板）、控制元素（处理用户输入）和模型元素（保存要显示的数据）之间的职责。\n\
    \n这种关注点分离并非新概念，它允许构建反映模型-视图-控制器架构的GUI应用程序。MVC架构的意图是将用户显示、用户输入控制与底层信息模型分离，如下图所示。\n\
    \n![](img/8a661fca3884547aede940b9a6567321_163_0.png)\n\n这种分离之所以有用，有以下几个原因：\n\n\
    -   应用程序和/或用户界面组件的可重用性，\n-   能够独立开发应用程序和用户界面，\n-   能够从类层次结构的不同部分继承，\n-   能够定义控制样式类，这些类提供与这些功能如何显示分开的通用功能。\n\
    \n这意味着不同的界面可以与同一个应用程序一起使用，而应用程序无需知道这一点。这也意味着系统的任何部分都可以更改，而不会影响其他部分的操作。例如，可以更改图形界面（外观）显示信息的方式，而无需修改实际应用程序或输入处理方式（感觉）。实际上，应用程序根本不需要知道当前连接的是哪种类型的界面。\n\
    \n## PyDraw MVC架构\n\nPyDraw应用程序的MVC结构有一个顶层控制器类PyDrawController和一个顶层视图类PyDrawFrame（没有模型，因为顶层MVC三元组本身不保存任何显式数据）。如下所示：\n\
    \n![](img/8a661fca3884547aede940b9a6567321_164_0.png)\n\n在下一层级，还有另一个MVC结构；这次是针对应用程序的绘图元素。有一个DrawingController，以及一个DrawingModel和一个DrawingPanel（视图），如下图所示：\n\
    \n![](img/8a661fca3884547aede940b9a6567321_165_0.png)\n\nDrawingModel、DrawingPanel和DrawingController类展示了经典的MVC结构。视图和控制器类（DrawingPanel和DrawingController）彼此了解，并且了解绘图模型，而DrawingModel对视图或控制器一无所知。视图通过paint事件获知绘图中的更改。\n\
    \n## 附加类\n\n还有四种类型的绘图对象（Figure）：Circle、Line、Square和Text图形。这些类之间的唯一区别在于on_paint()方法中在图形设备上下文上绘制的内容。它们都继承自Figure类，该类定义了Drawing中所有对象使用的通用属性（例如表示x和y位置以及大小的点）。\n\
    \n![](img/8a661fca3884547aede940b9a6567321_166_0.png)\n\nPyDrawFrame类还使用了PyDrawMenuBar和PyDrawToolBar类。前者扩展了wx.MenuBar，添加了PyDraw应用程序中使用的菜单项。后者扩展了wx.ToolBar，并提供了PyDraw中使用的图标。\n\
    \n![](img/8a661fca3884547aede940b9a6567321_166_1.png)\n\n最后一个类是PyDrawApp类，它扩展了wx.App类。\n\
    \n![](img/8a661fca3884547aede940b9a6567321_170_0.png)\n\n## 对象关系\n\n然而，继承层次结构只是任何面向对象应用程序故事的一部分。下图说明了在运行的应用程序中对象之间如何相互关联。\n\
    \n![](img/8a661fca3884547aede940b9a6567321_168_0.png)\n\nPyDrawFrame负责设置控制器和DrawingPanel。PyDrawController负责处理菜单和工具栏的用户交互。这将图形元素与用户触发的行为分离开来。\n\
    \nDrawingPanel负责显示DrawingModel持有的任何图形。DrawingController管理与DrawingPanel的所有用户交互，包括向模型添加图形和清除模型中的所有图形。DrawingModel保存要显示的图形列表。\n\
    \n## 对象之间的交互\n\n我们现在已经检查了应用程序的物理结构，但尚未检查该应用程序中的对象如何交互。在许多情况下，这可以从应用程序的源代码中提取出来（难度不一）。然而，对于像PyDraw这样由多个不同交互组件组成的应用程序，明确描述系统交互是有用的。\n\
    \n说明对象之间交互的图使用以下约定：\n\n-   实线箭头表示消息发送，\n-   方框表示类，\n-   括号中的名称表示实例类型，\n-   数字表示消息发送的顺序。\n\
    \n这些图基于UML（统一建模语言）符号中的协作图。\n\n## PyDrawApp\n\n当PyDrawApp被实例化时，PyDrawFrame被创建并使用OnInit()方法显示。然后调用MainLoop()方法。如下所示：\n\
    \n```python\nclass PyDrawApp(wx.App):\n    def OnInit(self):\n        \"\"\" Initialise\
    \ the GUI display\"\"\"\n        frame = PyDrawFrame(title='PyDraw')\n       \
    \ frame.Show()\n        return True\n\n# Run the GUI application\napp = PyDrawApp()\n\
    app.MainLoop()\n```\n\n## PyDrawFrame构造函数\n\nPyDrawFrame构造函数方法设置UI应用程序的主显示，并初始化控制器和绘图元素。下面使用协作图进行说明：\n\
    \n![](img/8a661fca3884547aede940b9a6567321_171_0.png)\n\nPyDrawFrame构造函数为应用程序设置环境。它创建顶层PyDrawController。它创建DrawingPanel并初始化显示布局。它初始化菜单栏和工具栏。它将控制器的菜单处理程序绑定到菜单，并将自身居中。\n\
    \n## 更改应用程序模式\n\n一个值得注意的有趣之处是当用户从“绘图”菜单中选择一个选项时会发生什么。这允许将模式更改为正方形、圆形、线条或文本。下图展示了当用户在“绘图”菜单上选择“圆形”菜单项时涉及的交互（使用协作图）：\n\
    \n![](img/8a661fca3884547aede940b9a6567321_172_0.png)\n\n当用户选择其中一个菜单项时，PyDrawController的command_menu_handler()方法被调用。此方法确定选择了哪个菜单项；然后调用相应的设置方法（例如set_circle_mode()或set_line_mode()等）。这些方法将控制器的mode属性设置为适当的值。\n\
    \n## 添加图形对象"
