    # The DrawingModel Class


    The DrawingModel class has a contents attribute that is used to hold all the figures
    in the drawing. It also provides some convenience methods to reset the contents
    and to add a figure to the contents.


    ```

    class DrawingModel:

    def init(self):

    self.contents = []

    def clear_figures(self):

    self.contents = []

    def add_figure(self, figure):

    self.contents.append(figure)

    ```


    The DrawingModel is a relatively simple model which merely records a set of graphical
    figures in a List. These can be any type of object and can be displayed in any
    way as long as they implement the on_paint() method. It is the objects themselves
    which determine what they look like when drawn.'
- md: "## The DrawingPanel Class\n\nThe DrawingPanel class is a subclass of the wx.Panel\
    \ class. It provides the view for the drawing data model. This uses the classical\
    \ MVC architecture and has a model (DrawingModel), a view (the DrawingPanel) and\
    \ a controller (the DrawingController).\n\nThe DrawingPanel instantiates its own\
    \ DrawingController to handle mouse events.\n\nIt also registers for paint events\
    \ so that it knows when to refresh the display.\n\n```python\nclass DrawingPanel(wx.Panel):\n\
    \    def __init__(self, parent, get_mode):\n        super().__init__(parent, -1)\n\
    \        self.SetBackgroundColour(wx.Colour(255, 255, 255))\n        self.model\
    \ = DrawingModel()\n        self.controller = DrawingController(self, self.model,\
    \ get_mode)\n        self.Bind(wx.EVT_PAINT, self.on_paint)\n        self.Bind(wx.EVT_LEFT_DOWN,\
    \ self.controller.on_mouse_click)\n\n    def on_paint(self, event):\n        \"\
    \"\"set up the device context (DC) for painting\"\"\"\n        dc = wx.PaintDC(self)\n\
    \        for figure in self.model.contents:\n            figure.on_paint(dc)\n\
    ```\n\n## The DrawingController Class\n\nThe DrawingController class provides\
    \ the control class for the top level MVC architecture used with the DrawingModel\
    \ (model) and DrawingPanel (view) classes. In particular it handles the mouse\
    \ events in the DrawingPanel via the on_mouse_click() method.\n\nIt also defines\
    \ an add method that is used to add a figure to the DrawingModel (the actual figure\
    \ depends on the current mode of the PyDrawController). A final method, the clear()\
    \ method, removes all figures from the drawing model and refreshes the display.\n\
    \n```python\nclass DrawingController:\n    def __init__(self, view, model, get_mode):\n\
    \        self.view = view\n        self.model = model\n        self.get_mode =\
    \ get_mode\n\n    def on_mouse_click(self, mouse_event):\n        point = mouse_event.GetPosition()\n\
    \        self.add(self.get_mode(), point)\n\n    def add(self, mode, point, size=30):\n\
    \        if mode == PyDrawConstants.SQUARE_MODE:\n            fig = Square(self.view,\
    \ point, wx.Size(size, size))\n        elif mode == PyDrawConstants.CIRCLE_MODE:\n\
    \            fig = Circle(self.view, point, size)\n        elif mode == PyDrawConstants.TEXT_MODE:\n\
    \            fig = Text(self.view, point, size)\n        elif mode == PyDrawConstants.LINE_MODE:\n\
    \            fig = Line(self.view, point, size)\n        self.model.add_figure(fig)\n\
    \n    def clear(self):\n        self.model.clear_figures()\n        self.view.Refresh()\n\
    ```\n\n## The Figure Class\n\nThe Figure class (an abstract super class of the\
    \ Figure class hierarchy) captures the elements which are common to graphic objects\
    \ displayed within a drawing. The point defines the position of the figure, while\
    \ the size attribute defines the size of the figure. Note that the Figure is a\
    \ subclass of a wx.Panel and thus the display is constructed from inner panels\
    \ onto which the various figure shapes are drawn.\n\nThe Figure class defines\
    \ a single abstract method on_paint(dc) that must be implemented by all concrete\
    \ sub classes. This method should define how the shape is drawn on the drawing\
    \ panel.\n\n```python\nclass Figure(wx.Panel):\n    def __init__(self, parent,\
    \ id=wx.ID_ANY, pos=None,\n                 size=None, style=wx.TAB_TRAVERSAL):\n\
    \        wx.Panel.__init__(self, parent, id=id, pos=pos,\n                   \
    \       size=size, style=style)\n        self.point = pos\n        self.size =\
    \ size\n\n    @abstractmethod\n    def on_paint(self, dc):\n        pass\n```\n\
    \n## The Square Class\n\nThis is a subclass of Figure that specifies how to draw\
    \ a square shape in a drawing. It implements the on_paint() method inherited from\
    \ Figure.\n\n```python\nclass Square(Figure):\n    def __init__(self, parent,\
    \ pos, size):\n        super().__init__(parent=parent, pos=pos, size=size)\n\n\
    \    def on_paint(self, dc):\n        dc.DrawRectangle(self.point, self.size)\n\
    ```\n\n## The Circle Class\n\nThis is another sub class of Figure. It implements\
    \ the on_paint() method by drawing a circle. Note that the shape will be drawn\
    \ within the panel size defined via the Figure class (using the call to super).\
    \ It is therefore necessary to see the circle to fit within these bounds. This\
    \ means that the size attribute must be used to generate an appropriate radius.\
    \ Also note that the DrawCircle() method of the device context takes a point that\
    \ is the center of the circle so this must also be calculated.\n\n```python\n\
    class Circle(Figure):\n    def __init__(self, parent, pos, size):\n        super().__init__(parent=parent,\
    \ pos=pos, size=wx.Size(size, size))\n        self.radius = (size - 10) / 2\n\
    \        self.circle_center = wx.Point(self.point.x + self.radius, self.point.y\
    \ + self.radius)\n\n    def on_paint(self, dc):\n        dc.DrawCircle(pt=self.circle_center,\
    \ radius=self.radius)\n```\n\n## The Line Class\n\nThis is another subclass of\
    \ Figure. In this very simple example, a default end point for the line is generated.\
    \ Alternatively the program could look for a mouse released event and pick up\
    \ the mouse at this location and use this as the end point of the line.\n\n```python\n\
    class Line(Figure):\n    def __init__(self, parent, pos, size):\n        super().__init__(parent=parent,\
    \ pos=pos,\n                         size=wx.Size(size, size))\n        self.end_point\
    \ = wx.Point(self.point.x + size, self.point.y + size)\n\n    def on_paint(self,\
    \ dc):\n        dc.DrawLine(pt1=self.point, pt2=self.end_point)\n```\n\n## The\
    \ Text Class\n\nThis is also a subclass of Figure. A default value is used for\
    \ the text to display; however a dialog could be presented to the user allowing\
    \ them to input the text they wish to display:\n\n```python\nclass Text(Figure):\n\
    \    def __init__(self, parent, pos, size):\n        super().__init__(parent=parent,\
    \ pos=pos, size=wx.Size(size, size))\n\n    def on_paint(self, dc):\n        dc.DrawText(text='Text',\
    \ pt=self.point)\n```\n\n## References\n\nThe following provides some background\
    \ on the Model-View-Controller architecture in user interfaces.\n\n- G.E. Krasner,\
    \ S.T. Pope, A cookbook for using the model-view controller user interface paradigm\
    \ in small talk-80. JOOP 1(3), 26–49 (1988).\n\n## Try\n\nYou could develop the\
    \ PyDraw application further by adding the following features:\n\n- A delete option\
    \ You can add a button labeled Delete to the window. It should set the mode to\
    \ “delete”. The drawingPanel must be altered so that the mouseReleased method\
    \ sends a delete message to the drawing. The drawing must find and remove the\
    \ appropriate graphic object and send the changed message to itself.\n- A resize\
    \ option This involves identifying which of the shapes has been selected and then\
    \ either using a dialog to enter the new size or providing some option that allows\
    \ the size of the shape to be indicated using the mouse.\n\n## Introduction to\
    \ Games Programming\n\n## Introduction\n\nGames programming is performed by developers/coders\
    \ who implement the logic that drives a game.\n\nHistorically games developers\
    \ did everything; they wrote the code, designed the sprites and icons, handled\
    \ the game play, dealt with sounds and music, generated any animations required\
    \ etc. However, as the game industry has matured games companies have developed\
    \ specific roles including Computer Graphics (CG) animators, artists, games developers\
    \ and games engine and physics engine developers etc.\n\nThose involved with code\
    \ development may develop a physics engine, a games engine, the games themselves,\
    \ etc. Such developers focus on different aspects of a game. For examples a game\
    \ engine developer focuses on creating the framework within which the game will\
    \ run. In turn a physics engine developer will focus on implementing the mathematics\
    \ behind the physics of the simulated games world (such as the effect of gravity\
    \ on characters and components within that world). In many cases there will also\
    \ be developers working on the AI engine for a game. These developers will focus\
    \ on providing facilities that allow the game or characters in the game to operate\
    \ intelligently.\n\nThose developing the actual game play will use these engines\
    \ and frameworks to create the overall end result. It is they who give life to\
    \ the game and make it an enjoyable (and playable) experience.\n\n## Games Frameworks\
    \ and Libraries\n\nThere are many frameworks and libraries available that allow\
    \ you to create anything from simple games to large complex role playing games\
    \ with infinite worlds.\n\nOne example is the Unity framework that can be used\
    \ with the C# programming language. Another such framework is the Unreal engine\
    \ used with the C++ programming language.\n\nPython has also been used for games\
    \ development with several well known games titles depending on it in one way\
    \ or another. For example, Battle field 2 by Digital Illusions CE is a military\
    \ simulator first person shooter game. Battle field Heroes handles portions of\
    \ the game logic involving game modes and scoring using Python."
  mdcn: "## DrawingPanel 类\n\nDrawingPanel 类是 wx.Panel 类的子类。它为绘图数据模型提供视图。这采用了经典的 MVC\
    \ 架构，包含一个模型（DrawingModel）、一个视图（即 DrawingPanel）和一个控制器（DrawingController）。\n\nDrawingPanel\
    \ 会实例化自己的 DrawingController 来处理鼠标事件。\n\n它还注册了绘图事件，以便知道何时刷新显示。\n\n```python\nclass\
    \ DrawingPanel(wx.Panel):\n    def __init__(self, parent, get_mode):\n       \
    \ super().__init__(parent, -1)\n        self.SetBackgroundColour(wx.Colour(255,\
    \ 255, 255))\n        self.model = DrawingModel()\n        self.controller = DrawingController(self,\
    \ self.model, get_mode)\n        self.Bind(wx.EVT_PAINT, self.on_paint)\n    \
    \    self.Bind(wx.EVT_LEFT_DOWN, self.controller.on_mouse_click)\n\n    def on_paint(self,\
    \ event):\n        \"\"\"set up the device context (DC) for painting\"\"\"\n \
    \       dc = wx.PaintDC(self)\n        for figure in self.model.contents:\n  \
    \          figure.on_paint(dc)\n```\n\n## DrawingController 类\n\nDrawingController\
    \ 类为与 DrawingModel（模型）和 DrawingPanel（视图）类一起使用的顶层 MVC 架构提供控制类。特别是，它通过 `on_mouse_click()`\
    \ 方法处理 DrawingPanel 中的鼠标事件。\n\n它还定义了一个 `add` 方法，用于向 DrawingModel 添加图形（具体图形取决于\
    \ PyDrawController 的当前模式）。最后一个方法 `clear()` 会从绘图模型中移除所有图形并刷新显示。\n\n```python\n\
    class DrawingController:\n    def __init__(self, view, model, get_mode):\n   \
    \     self.view = view\n        self.model = model\n        self.get_mode = get_mode\n\
    \n    def on_mouse_click(self, mouse_event):\n        point = mouse_event.GetPosition()\n\
    \        self.add(self.get_mode(), point)\n\n    def add(self, mode, point, size=30):\n\
    \        if mode == PyDrawConstants.SQUARE_MODE:\n            fig = Square(self.view,\
    \ point, wx.Size(size, size))\n        elif mode == PyDrawConstants.CIRCLE_MODE:\n\
    \            fig = Circle(self.view, point, size)\n        elif mode == PyDrawConstants.TEXT_MODE:\n\
    \            fig = Text(self.view, point, size)\n        elif mode == PyDrawConstants.LINE_MODE:\n\
    \            fig = Line(self.view, point, size)\n        self.model.add_figure(fig)\n\
    \n    def clear(self):\n        self.model.clear_figures()\n        self.view.Refresh()\n\
    ```\n\n## Figure 类\n\nFigure 类（Figure 类层次结构中的抽象超类）捕获了绘图中显示的图形对象的共同元素。`point` 定义了图形的位置，而\
    \ `size` 属性定义了图形的大小。请注意，Figure 是 wx.Panel 的子类，因此显示是通过内部面板构建的，各种图形形状绘制在这些面板上。\n\
    \nFigure 类定义了一个抽象方法 `on_paint(dc)`，所有具体子类都必须实现此方法。此方法应定义如何在绘图面板上绘制形状。\n\n```python\n\
    class Figure(wx.Panel):\n    def __init__(self, parent, id=wx.ID_ANY, pos=None,\n\
    \                 size=None, style=wx.TAB_TRAVERSAL):\n        wx.Panel.__init__(self,\
    \ parent, id=id, pos=pos,\n                          size=size, style=style)\n\
    \        self.point = pos\n        self.size = size\n\n    @abstractmethod\n \
    \   def on_paint(self, dc):\n        pass\n```\n\n## Square 类\n\n这是 Figure 的一个子类，指定了如何在绘图中绘制正方形。它实现了从\
    \ Figure 继承的 `on_paint()` 方法。\n\n```python\nclass Square(Figure):\n    def __init__(self,\
    \ parent, pos, size):\n        super().__init__(parent=parent, pos=pos, size=size)\n\
    \n    def on_paint(self, dc):\n        dc.DrawRectangle(self.point, self.size)\n\
    ```\n\n## Circle 类\n\n这是 Figure 的另一个子类。它通过绘制一个圆来实现 `on_paint()` 方法。请注意，形状将在通过\
    \ Figure 类（使用 `super` 调用）定义的面板大小内绘制。因此，需要确保圆适合这些边界。这意味着必须使用 `size` 属性来生成适当的半径。另请注意，设备上下文的\
    \ `DrawCircle()` 方法接受一个作为圆心的点，因此这也必须计算。\n\n```python\nclass Circle(Figure):\n\
    \    def __init__(self, parent, pos, size):\n        super().__init__(parent=parent,\
    \ pos=pos, size=wx.Size(size, size))\n        self.radius = (size - 10) / 2\n\
    \        self.circle_center = wx.Point(self.point.x + self.radius, self.point.y\
    \ + self.radius)\n\n    def on_paint(self, dc):\n        dc.DrawCircle(pt=self.circle_center,\
    \ radius=self.radius)\n```\n\n## Line 类\n\n这是 Figure 的另一个子类。在这个非常简单的例子中，为线条生成了一个默认的终点。或者，程序可以查找鼠标释放事件，获取该位置的鼠标坐标，并将其用作线条的终点。\n\
    \n```python\nclass Line(Figure):\n    def __init__(self, parent, pos, size):\n\
    \        super().__init__(parent=parent, pos=pos,\n                         size=wx.Size(size,\
    \ size))\n        self.end_point = wx.Point(self.point.x + size, self.point.y\
    \ + size)\n\n    def on_paint(self, dc):\n        dc.DrawLine(pt1=self.point,\
    \ pt2=self.end_point)\n```\n\n## Text 类\n\n这也是 Figure 的一个子类。使用默认值作为要显示的文本；但是，可以向用户显示一个对话框，允许他们输入希望显示的文本：\n\
    \n```python\nclass Text(Figure):\n    def __init__(self, parent, pos, size):\n\
    \        super().__init__(parent=parent, pos=pos, size=wx.Size(size, size))\n\n\
    \    def on_paint(self, dc):\n        dc.DrawText(text='Text', pt=self.point)\n\
    ```\n\n## 参考资料\n\n以下提供了一些关于用户界面中模型-视图-控制器架构的背景信息。\n\n- G.E. Krasner, S.T. Pope,\
    \ A cookbook for using the model-view controller user interface paradigm in small\
    \ talk-80. JOOP 1(3), 26–49 (1988).\n\n## 尝试\n\n你可以通过添加以下功能来进一步开发 PyDraw 应用程序：\n\
    \n- **删除选项**：你可以在窗口中添加一个标记为“删除”的按钮。它应将模式设置为“删除”。必须修改 DrawingPanel，以便 `mouseReleased`\
    \ 方法向绘图发送删除消息。绘图必须找到并移除相应的图形对象，并向自身发送更改消息。\n- **调整大小选项**：这涉及识别选择了哪个形状，然后使用对话框输入新大小，或提供某种选项，允许使用鼠标指示形状的大小。\n\
    \n## 游戏编程简介\n\n## 简介\n\n游戏编程由开发人员/编码员执行，他们实现驱动游戏的逻辑。\n\n历史上，游戏开发人员做所有事情；他们编写代码、设计精灵和图标、处理游戏玩法、处理声音和音乐、生成所需的任何动画等。然而，随着游戏行业的成熟，游戏公司已经发展出特定的角色，包括计算机图形（CG）动画师、艺术家、游戏开发人员以及游戏引擎和物理引擎开发人员等。\n\
    \n参与代码开发的人员可能开发物理引擎、游戏引擎、游戏本身等。这些开发人员专注于游戏的不同方面。例如，游戏引擎开发人员专注于创建游戏运行的框架。反过来，物理引擎开发人员将专注于实现模拟游戏世界物理背后的数学（例如重力对该世界中角色和组件的影响）。在许多情况下，还会有开发人员从事游戏\
    \ AI 引擎的工作。这些开发人员将专注于提供允许游戏或游戏中的角色智能运行的设施。\n\n那些开发实际游戏玩法的人将使用这些引擎和框架来创建最终的整体结果。正是他们赋予了游戏生命，并使其成为一种愉快（且可玩）的体验。\n\
    \n## 游戏框架和库\n\n有许多框架和库可用，允许你创建从简单游戏到具有无限世界的大型复杂角色扮演游戏的任何内容。\n\n一个例子是 Unity 框架，可以与\
    \ C# 编程语言一起使用。另一个这样的框架是 Unreal 引擎，与 C++ 编程语言一起使用。\n\nPython 也被用于游戏开发，一些著名的游戏标题以某种方式依赖于它。例如，Digital\
    \ Illusions CE 的《战地 2》是一款军事模拟第一人称射击游戏。《战地英雄》使用 Python 处理涉及游戏模式和得分的部分游戏逻辑。"
