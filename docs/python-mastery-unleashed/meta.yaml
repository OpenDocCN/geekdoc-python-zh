    \ This means that the URL '/hello' will be mapped to the function welcome(). The\
    \ decorator also specifies the HTTP method that is supported; in this case GET\
    \ requests are supported (which is actually the default so it does not need to\
    \ be included here but is useful from a documentation point of view).\n\n- The\
    \ second thing is that we are going to return our data using the JSON format;\
    \ we therefore use the jsonify() function and pass it a Python Dictionary structure\
    \ with a single key/value pair. In this case the key is ‘msg’ and the data associated\
    \ with that key is ‘Hello Flask World’. The jsonify() function will convert this\
    \ Python data structure into an equivalent JSON structure.\n\n## Running the Service\n\
    \nWe are now ready to run our application. To do this we invoke the run() method\
    \ of the Flask application object:\n\n```\napp.run(debug=True)\n```\n\nOptionally\
    \ this method has a keyword parameter debug that can be set to True; if this is\
    \ done then when the application is run some debugging information is generated\
    \ that allows you to see what is happening. This can be useful in development\
    \ but would not typically be used in production.\n\nThe whole program is presented\
    \ below:\n\n```\nfrom flask import Flask, jsonify\napp = Flask(__name__)\n@app.route('/hello',\
    \ methods=['GET'])\ndef welcome():\n    return jsonify({'msg': 'Hello Flask World'})\n\
    app.run(debug=True)\n```\n\nWhen this program is run the initial output generated\
    \ is as shown below:\n\n```\n* Serving Flask app \"hello_flask_world\" (lazy loading)\n\
    * Environment: production\nWARNING: This is a development server. Do not use it\
    \ in a\nproduction deployment.\nUse a production WSGI server instead.\n* Debug\
    \ mode: on\n* Running on http://127.0.0.1:5000/ (Press CTRL+C to quit)\n* Restarting\
    \ with stat\n* Debugger is active!\n* Debugger PIN: 274-630-732\n```\n\nOf course\
    \ we don’t see any output from our own program yet. This is because we have not\
    \ invoked the welcome() function via the /hello URL.\n\n## Invoking the Service\n\
    \nWe will use a web browser to access the web service. To do this we must enter\
    \ the full URL that will route the request to our running application and to the\
    \ welcome() function.\n\nThe URL is actually comprised of two elements, the first\
    \ part is the machine on which the application is running and the port that it\
    \ is using to listen for requests. This is actually listed in the above output—look\
    \ at the line starting ‘Running on’. This means that the URL must start with http://127.0.0.1:5000.\
    \ This indicates that the application is running on the computer with the IP address\
    \ 127.0.0.1 and listening on port 5000. We could of course also use localhost\
    \ instead of 127.0.0.1.\n\nThe remainder of the URL must then provide the information\
    \ that will allow Flask to route from the computer and port to the functions we\
    \ want to run. Thus the full URL is http://127.0.0.1:5000/hello and thus is used\
    \ in the web browser shown below:\n\n![](img/8a661fca3884547aede940b9a6567321_730_0.png)\n\
    \nAs you can see the result returned is the text we supplied to the jsonify()\
    \ function but now in plain JSON format and displayed within the Web Browser.\
    \ You should also be able to see in the console output that a request was received\
    \ by the Flask framework for the GET request mapped to the /hello URL:\n\n```\n\
    127.0.0.1 - - [23/May/2019 11:09:40] \"GET /hello HTTP/1.1\" 200 -\n```\n\nOne\
    \ useful feature of this approach is that if you make a change to your program\
    \ then the Flask framework will notice this change when running in development\
    \ mode and can restart the web service with the code changes deployed. If you\
    \ do this you will see that the output notifies you of the change:\n\n```\n* Detected\
    \ change in 'hello_flask_world.py', reloading\n* Restarting with stat\n```\n\n\
    This allows changes to be made on the fly and their effect can be immediately\
    \ seen.\n\n## The Final Solution\n\nWe can tidy this example up a little by defining\
    \ a function that can be used to create the Flask application object and by ensuring\
    \ that we only run the application if the code is being run as the main module:\n\
    \n```\nfrom flask import Flask, jsonify, url_for\ndef create_service():\n    app\
    \ = Flask(__name__)\n    @app.route('/hello', methods=['GET'])\n    def welcome():\n\
    \        return jsonify({'msg': 'Hello Flask World'})\n    with app.test_request_context():\n\
    \        print(url_for('welcome'))\n        return app\nif __name__ == '__main__':\n\
    \    app = create_service()\n    app.run(debug=True)\n```\n\nOne feature we have\
    \ added to this program is the use of the test_request_context(). The test request\
    \ context object returned implements the context manager protocol and thus can\
    \ be used via a with statement; this is useful for debugging purposes. It can\
    \ be used to verify the URL used for any functions with routing information specified.\
    \ In this case the output from the print statement is ‘/hello’ as this is the\
    \ URL defined by the @app.route decorator.\n\n## Bookshop Web Service\n\n### Building\
    \ a Flask Bookshop Service\n\nThe previous chapter illustrated the basic structure\
    \ of a very simple web service application. We are now in a position to explore\
    \ the creation of a set of web services for something a little more realistic;\
    \ the bookshop web service application.\n\nIn this chapter we will implement the\
    \ set of web services described earlier in the previous chapter for every simple\
    \ bookshop. This means that we will define services to handle not just the GET\
    \ requests but also PUT, POST and DELETE requests for the RESTful bookshop API.\n\
    \n### The Design\n\nBefore we look at the implementation of the Bookshop RESTful\
    \ API we will consider what elements we for the services.\n\nOne question that\
    \ often causes some confusion is how web services relate to traditional design\
    \ approaches such as object oriented design. The approach adopted here is that\
    \ the Web Service API provides a way to implement an interface to appropriate\
    \ functions, objects and methods used to implement the application/domain model.\n\
    \nThis means that we will still have a set of classes that will represent the\
    \ Bookshop and the Books held within the bookshop. In turn the functions implementing\
    \ the web services will access the bookshop to retrieve, modify, update and delete\
    \ the books held by the bookshop.\n\n![](img/8a661fca3884547aede940b9a6567321_734_0.png)\n\
    \nThis shows that a Book object will have an isbn, a title, an author and a price\
    \ attribute.\n\nIn turn the Bookshop object will have a books attribute that will\
    \ hold zero or more Books. The books attribute will actually hold a List as the\
    \ list of books needs to change dynamically as and when new books are added or\
    \ old books deleted. The Bookshop will also define three methods that will\n\n\
    - allow a book to be obtained via its isbn,\n- allow a book to be added to the\
    \ list of books and\n- enable a book to be deleted (based on its isbn).\n\nRouting\
    \ information will be provided for a set of functions that will invoke appropriate\
    \ methods on the Bookshop object. The functions to be decorated with @app.route,\
    \ and the mappings to be used, are listed below:\n\n- get_books() which maps to\
    \ the /book/list URL using the HTTP Get method request.\n- get_book(isbn) which\
    \ maps to the /book/<isbn> URL where isbn is a URL parameter that will be passed\
    \ into the function. This will also use the HTTP GET request.\n- create_book()\
    \ which maps to the /book URL using the HTTP Post request.\n- update_book() which\
    \ maps to the /book URL but using the HTTP Put request.\n- delete_book() which\
    \ maps to the /book/<isbn> URL but using the HTTP Delete request.\n\n### The Domain\
    \ Model\n\nThe domain model comprises the Book and Bookshop classes. These are\
    \ presented below.\n\nThe Book class is a simple Value type class (that is it\
    \ is data oriented with no behavior of its own):"
  mdcn: "我们现在可以为 Flask 应用程序对象定义路由信息。这些信息会将一个 URL 映射到一个函数。例如，当该 URL 被输入到 Web 浏览器的地址栏时，Flask\
    \ 应用程序对象将接收该请求并调用相应的函数。\n\n为了提供路由映射信息，我们在函数或方法上使用 `@app.route` 装饰器。例如，在下面的代码中，`@app.route`\
    \ 装饰器将 URL /hello 映射到用于 HTTP Get 请求的函数 welcome()：\n\n```\n@app.route('/hello',\
    \ methods=['GET'])\ndef welcome():\n    return jsonify({'msg': 'Hello Flask World'})\n\
    ```\n\n关于这个函数定义，有两点需要注意：\n\n- `@app.route` 装饰器用于声明式地指定函数的路由信息。这意味着 URL '/hello'\
    \ 将被映射到函数 welcome()。该装饰器还指定了支持的 HTTP 方法；在本例中支持 GET 请求（这实际上是默认值，因此不需要在此处包含，但从文档角度来看很有用）。\n\
    \n- 第二点是我们将使用 JSON 格式返回数据；因此我们使用 jsonify() 函数，并向其传递一个包含单个键/值对的 Python 字典结构。在本例中，键是\
    \ ‘msg’，与该键关联的数据是 ‘Hello Flask World’。jsonify() 函数会将此 Python 数据结构转换为等效的 JSON 结构。\n\
    \n## 运行服务\n\n我们现在准备运行我们的应用程序。为此，我们调用 Flask 应用程序对象的 run() 方法：\n\n```\napp.run(debug=True)\n\
    ```\n\n此方法有一个可选的关键字参数 debug，可以设置为 True；如果这样做，当应用程序运行时，会生成一些调试信息，允许你查看正在发生的情况。这在开发中很有用，但通常不会在生产环境中使用。\n\
    \n整个程序如下所示：\n\n```\nfrom flask import Flask, jsonify\napp = Flask(__name__)\n\
    @app.route('/hello', methods=['GET'])\ndef welcome():\n    return jsonify({'msg':\
    \ 'Hello Flask World'})\napp.run(debug=True)\n```\n\n运行此程序时，生成的初始输出如下所示：\n\n```\n\
    * Serving Flask app \"hello_flask_world\" (lazy loading)\n* Environment: production\n\
    WARNING: This is a development server. Do not use it in a\nproduction deployment.\n\
    Use a production WSGI server instead.\n* Debug mode: on\n* Running on http://127.0.0.1:5000/\
    \ (Press CTRL+C to quit)\n* Restarting with stat\n* Debugger is active!\n* Debugger\
    \ PIN: 274-630-732\n```\n\n当然，我们还没有看到任何来自我们自己程序的输出。这是因为我们还没有通过 /hello URL 调用 welcome()\
    \ 函数。\n\n## 调用服务\n\n我们将使用 Web 浏览器来访问 Web 服务。为此，我们必须输入完整的 URL，该 URL 将把请求路由到我们正在运行的应用程序以及\
    \ welcome() 函数。\n\n该 URL 实际上由两个元素组成，第一部分是运行应用程序的机器及其用于监听请求的端口。这实际上在上面的输出中列出——查看以\
    \ ‘Running on’ 开头的行。这意味着 URL 必须以 http://127.0.0.1:5000 开头。这表明应用程序正在 IP 地址为 127.0.0.1\
    \ 的计算机上运行，并在端口 5000 上监听。当然，我们也可以使用 localhost 代替 127.0.0.1。\n\nURL 的其余部分必须提供允许\
    \ Flask 从计算机和端口路由到我们要运行的函数的信息。因此完整的 URL 是 http://127.0.0.1:5000/hello，并在下面显示的\
    \ Web 浏览器中使用：\n\n![](img/8a661fca3884547aede940b9a6567321_730_0.png)\n\n如你所见，返回的结果是我们提供给\
    \ jsonify() 函数的文本，但现在以纯 JSON 格式显示在 Web 浏览器中。你还应该能够在控制台输出中看到 Flask 框架接收到了映射到 /hello\
    \ URL 的 GET 请求：\n\n```\n127.0.0.1 - - [23/May/2019 11:09:40] \"GET /hello HTTP/1.1\"\
    \ 200 -\n```\n\n这种方法的一个有用特性是，如果你对程序进行了更改，Flask 框架在开发模式下运行时会注意到此更改，并可以使用部署的代码更改重新启动\
    \ Web 服务。如果你这样做，你会看到输出通知你发生了更改：\n\n```\n* Detected change in 'hello_flask_world.py',\
    \ reloading\n* Restarting with stat\n```\n\n这允许即时进行更改，并且可以立即看到其效果。\n\n## 最终解决方案\n\
    \n我们可以通过定义一个可用于创建 Flask 应用程序对象的函数，并确保仅在代码作为主模块运行时才运行应用程序，来稍微整理一下这个示例：\n\n```\n\
    from flask import Flask, jsonify, url_for\ndef create_service():\n    app = Flask(__name__)\n\
    \    @app.route('/hello', methods=['GET'])\n    def welcome():\n        return\
    \ jsonify({'msg': 'Hello Flask World'})\n    with app.test_request_context():\n\
    \        print(url_for('welcome'))\n        return app\nif __name__ == '__main__':\n\
    \    app = create_service()\n    app.run(debug=True)\n```\n\n我们为此程序添加的一个特性是使用了\
    \ test_request_context()。返回的测试请求上下文对象实现了上下文管理器协议，因此可以通过 with 语句使用；这对于调试目的很有用。它可以用于验证为任何指定了路由信息的函数使用的\
    \ URL。在本例中，print 语句的输出是 ‘/hello’，因为这是 @app.route 装饰器定义的 URL。\n\n## 书店 Web 服务\n\
    \n### 构建 Flask 书店服务\n\n上一章说明了一个非常简单的 Web 服务应用程序的基本结构。我们现在可以探索为更现实的内容创建一组 Web 服务；书店\
    \ Web 服务应用程序。\n\n在本章中，我们将为前面章节中描述的每个简单书店实现一组 Web 服务。这意味着我们将定义服务来处理不仅 GET 请求，还有用于\
    \ RESTful 书店 API 的 PUT、POST 和 DELETE 请求。\n\n### 设计\n\n在查看书店 RESTful API 的实现之前，我们将考虑服务需要哪些元素。\n\
    \n一个经常引起混淆的问题是 Web 服务如何与传统的设计方法（如面向对象设计）相关联。这里采用的方法是，Web 服务 API 提供了一种实现接口的方式，该接口用于实现应用程序/领域模型的适当函数、对象和方法。\n\
    \n这意味着我们仍然会有一组类来表示书店以及书店中持有的书籍。反过来，实现 Web 服务的函数将访问书店以检索、修改、更新和删除书店持有的书籍。\n\n![](img/8a661fca3884547aede940b9a6567321_734_0.png)\n\
    \n这显示了一个 Book 对象将具有 isbn、title、author 和 price 属性。\n\n反过来，Bookshop 对象将具有一个 books\
    \ 属性，该属性将保存零个或多个 Book。books 属性实际上将保存一个列表，因为书籍列表需要在添加新书或删除旧书时动态更改。Bookshop 还将定义三个方法，这些方法将\n\
    \n- 允许通过其 isbn 获取一本书，\n- 允许将一本书添加到书籍列表中，\n- 以及启用删除一本书（基于其 isbn）。\n\n将为一组函数提供路由信息，这些函数将调用\
    \ Bookshop 对象上的适当方法。要用 @app.route 装饰的函数以及要使用的映射如下所列：\n\n- get_books() 映射到 /book/list\
    \ URL，使用 HTTP Get 方法请求。\n- get_book(isbn) 映射到 /book/<isbn> URL，其中 isbn 是将传递给函数的\
    \ URL 参数。这也将使用 HTTP GET 请求。\n- create_book() 映射到 /book URL，使用 HTTP Post 请求。\n\
    - update_book() 映射到 /book URL，但使用 HTTP Put 请求。\n- delete_book() 映射到 /book/<isbn>\
    \ URL，但使用 HTTP Delete 请求。\n\n### 领域模型\n\n领域模型由 Book 和 Bookshop 类组成。它们如下所示。\n\n\
    Book 类是一个简单的值类型类（即它是数据导向的，没有自己的行为）："
