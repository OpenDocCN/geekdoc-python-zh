    # The Interactions Between Objects


    We have now examined the physical structure of the application but not how the
    objects within that application interact. In many situations this can be extracted
    from the source code of the application (with varying degrees of difficulty).
    However, in the case of an application such as PyDraw, which is made up of a number
    of different interacting components, it is useful to describe the system interactions
    explicitly.


    The diagrams illustrating the interactions between the objects use the following
    conventions:


    +   - a solid arrow indicates a message send,

    - a square box indicates a class,

    - a name in brackets indicates the type of instance,

    - numbers indicate the sequence of message sends.


    These diagrams are based on the collaboration diagrams found in the UML (Unified
    Modelling Language) notation.


