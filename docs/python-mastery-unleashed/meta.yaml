    Wales for football,Wales for Rugby and Scotland for the Highland games


    You can also find out how many substitutions were made using the subn() function.
    This function returns the new string and the number of substitutions in a tuple:


    ```

    import re

    pattern = ''(England|Wales|Scotland)''

    input = ''England for football, Wales for Rugby and Scotland for the Highland
    games''

