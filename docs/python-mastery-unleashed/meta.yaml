    \ 放入队列。主应用程序函数设置队列并创建进程。队列作为参数之一传递给进程。然后启动进程。主进程随后通过（阻塞的）get() 方法等待队列中可用的数据。一旦数据可用，主进程在终止前检索并打印出数据。\n\
