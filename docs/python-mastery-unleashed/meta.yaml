    \ library for Python. For simple graphs Matplotlib is very easy to use, for example\
    \ to create a simple line graph for a set of x and y coordinates you can use the\
    \ matplotlib.pyplot.plot function:\n\n```python\nimport matplotlib.pyplot as pyplot\n\
    # Plot a sequence of values\npyplot.plot([1, 0.25, 0.5, 2, 3, 3.75, 3.5])\n# Display\
    \ the chart in a window\npyplot.show()\n```\n\nThis very simple program generates\
    \ the following graph:\n\n![](img/8a661fca3884547aede940b9a6567321_63_0.png)\n\
    \nIn this example, the plot() function takes a sequence of values which will be\
    \ treated as the y axis values; the x axis values are implied by the position\
    \ of the y values within the list. Thus as the list has six elements in it the\
    \ x axis has the range 0–6. In turn as the maximum value contained in the list\
    \ is 3.75, then the y axis ranges from 0 to 4.\n\n## Plot Components\n\nAlthough\
    \ they may seem simple, there are numerous elements that comprise a Matplotlib\
    \ graph or plot. These elements can all be manipulated and modified independently.\
    \ It is therefore useful to be familiar with the Matplotlib terminology associated\
    \ with these elements, such as ticks, legends, labels etc.\n\nThe elements that\
    \ make up a plot are illustrated below:\n\n![](img/8a661fca3884547aede940b9a6567321_64_0.png)\n\
    \nThe diagram illustrates the following elements:\n\n- **Axes**: An Axes is defined\
    \ by the matplotlib.axes.Axes class. It is used to maintain most of the elements\
    \ of a figure namely the X and Y Axis, the Ticks, the Line plots, any text and\
    \ any polygon shapes.\n- **Title**: This is the title of the whole figure.\n-\
    \ **Ticks (Major and Minor)**: The Ticks are represented by the class matplotlib.axis.Tick.\
    \ A Tick is the mark on the Axis indicating a new value. There can be Major ticks\
    \ which are larger and may be labeled. There are also minor ticks which can be\
    \ smaller (and may also be labeled).\n- **Tick Labels (Major and Minor)**: This\
    \ is a label on a Tick.\n- **Axis**: The matplotlib.axis.Axis class defines an\
    \ Axis object (such as an X or Y axis) within a parent Axes instance. It can have\
    \ formatters used to format the labels used for the major and minor ticks. It\
    \ is also possible to set the locations of the major and minor ticks.\n- **Axis\
    \ Labels (X, Y and in some cases Z)**: These are labels used to describe the Axis.\n\
    - **Plot types**: such as line and scatter plots. Various types of plots and graphs\
    \ are supported by Matplotlib including line plots, scatter graphs, bar charts\
    \ and pie charts.\n- **Grid**: This is an optional grid displayed behind a plot,\
    \ graph or chart. The grid can be displayed with a variety of different line styles\
    \ (such as solid or dashed lines), colors and line widths.\n\n## Matplotlib Architecture\n\
    \nThe Matplotlib library has a layered architecture that hides much of the complexity\
    \ associated with different windowing systems and graphic outputs. This architecture\
    \ has three main layers, the Scripting Layer, the Artist Layer and the Back end\
    \ Layer. Each layer has specific responsibilities and components. For example,\
    \ the Back end is responsible for reading and interacting with the graph or plot\
    \ being generated. In turn the Artist Layer is responsible for creating the graph\
    \ objects that will be rendered by the Back end Layer. Finally the Scripting Layer\
    \ is used by the developer to create the graphs.\n\nThis architecture is illustrated\
    \ below:\n\n![](img/8a661fca3884547aede940b9a6567321_67_0.png)\n\n## Back end\
    \ Layer\n\nThe Matplotlib back end layer handles the generation of output to different\
    \ target formats. Matplotlib itself can be used in many different ways to generate\
    \ many different outputs.\n\nMatplotlib can be used interactively, it can be embedded\
    \ in an application (or graphical user interface), it may be used as part of a\
    \ batch application with plots being stored as PNG, SVG, PDF or other images etc.\n\
    \nTo support all of these use cases, Matplotlib can target different outputs,\
    \ and each of these capabilities is called a back end; the “frontend” is the developer\
    \ facing code. The Back end Layer maintains all the different back ends and the\
    \ programmer can either use the default back end or select a different back end\
