    programming is a way of write programs that allow the system to reactive to data
    being published to it. We will look at the RxPy library which provides a Python
    implementation of the ReactiveX approach to Reactive Programming.


    # What Is a Reactive Application?


    A Reactive Application is one that must react to data; typically either to the
    presence of new data, or to changes in existing data. The Reactive Manifesto presents
    the key characteristics of Reactive Systems as:


    +   - Responsive. This means that such systems respond in a timely manner. Here
    of course timely will differ depending upon the application and domain; in one
    situation a second may be timely in another it may be far too slow.'
  - '[PAGE 639]


    +   - Resilient. Such systems stay responsive in the face of failure. The systems
    must therefore be designed to handle failure gracefully and continue to work appropriately
    following the failure.

    - Elastic. As the workload grows the system should continue to be responsive.

    - Message Driven. Information is exchanged between elements of a reactive system
    using messages. This ensures loose coupling, isolation and location transparency
    between these components.


    As an example, consider an application that lists a set of Equity Stock Trade
    values based on the latest market stick price data. This application might present
    the current value of each trade within a table. When new market stock price data
    is published, then the application must update the value of the trade within the
    table. Such an application can be described as being reactive.


    Reactive Programming is a programming style (typically supported by libraries)
    that allows code to be written that follow the ideas of reactive systems. Of course
    just because part of an application uses a Reactive Programming library does not
    make the whole application reactive; indeed it may only be necessary for part
    of an application to exhibit reactive behavior.'
- md: '## The ReactiveX Project


    ReactiveX is the best known implementation of the Reactive Programming paradigm.
    ReactiveX is based on the Observer-Observable design pattern. However it is an
    extension to this design pattern as it extends the pattern such that the approach
    supports sequences of data and/or events and adds operators that allow developers
    to compose sequences together declaratively while abstracting away concerns associated
    with low-level threads, synchronization, concurrent data structures and non-blocking
    I/O.


    The ReactiveX project has implementations for many languages including RxJava,
    RxScala and RxPy; this last is the version we are looking at as it is for the
    Python language.


    RxPy is described as:


    > A library for composing asynchronous and event-based programs using Observable
    collections and query operator functions in Python


    ## The Observer Pattern


    The Observer Pattern is one of the Gang of Four set of Design Patterns. The Gang
    of Four Patterns (as originally described in Gamma et al. 1995) are so called
    because this book on design patterns was written by four very famous authors namely;
    Erich Gamma, Richard Helm, Ralph Johnson and John Vlissides.


    The Observer Pattern provides a way of ensuring that a set of objects is notified
    whenever the state of another object changes. It has been widely used in a number
    of languages (such as Smalltalk and Java) and can also be used with Python.


    The intent of the Observer Pattern is to manage a one to many relationship between
    an object and those objects interested in the state, and in particular state changes,
    of that object. Thus when the objects’ state changes, the interested (dependent)
    objects are notified of that change and can take whatever action is appropriate.


    There are two key roles within the Observer Pattern, these are the Observable
    and the Observer roles.


    - Observable. This is the object that is responsible for notifying other objects
    that a change in its state has occurred.

    - Observer. An Observer is an object that will be notified of the change in state
    of the Observable and can take appropriate action (such as triggering a change
    in their own state or performing some action).


    In addition the state is typically represented explicitly:


    - State. This role may be played by an object that is used to share information
    about the change in state that has occurred within the Observable. This might
    be as simple as a String indicating the new state of the Observable or it might
    be a data oriented object that provides more detailed information.


    These roles are illustrated in the following figure.


    ![](img/8a661fca3884547aede940b9a6567321_642_0.png)


    In the above figure, the Observable object publishes data to a Data Stream. The
    data in the Data Stream is then sent to each of the Observers registered with
    the Observable. In this way data is broadcast to all Observers of an Observable.


    It is common for an Observable to only publish data once there is an Observer
    available to process that data. The process of registering with an Observable
    is referred to as subscribing. Thus an Observable will have zero or more subscribers
    (Observers).


    If the Observable publishes data at a faster rate than can be processed by the
    Observer then the data is queued via the Data Stream. This allows the Observer
    to process the data received one at a time at its own pace; without any concern
    for data loss (as long as sufficient memory is available for the data stream).


    ## Hot and Cold Observables


    Another concept that it is useful to understand is that of Hot and Cold Observables.


    - Cold Observables are lazy Observables. That is, a Cold Observable will only
    publish data if at least one Observer is subscribed to it.

    - Hot Observables, by contrast, publish data whether there is an Observer subscribed
    or not.


    ## Cold Observables


    A Cold Observable will not publish any data unless there is at least one Observer
    subscribed to process that data. In addition a cold Observable only provides data
    to an Observer when that Observer is ready to process the data; this is because
    the Observable-Observer relationship is more of a pull relationship. For example,
    given an Observable that will generate a set of values based on a range, then
    that Observable will generate each result lazily when requested by an Observer.


    If the Observer takes some time to process the data emitted by the Observable,
    then the Observable will wait until the Observer is ready to process the data
    before emitting another value.


    ## Hot Observables


    Hot Observables by contrast publish data whether there is an Observer subscribed
    or not. When an Observer registers with the Observable, it will start to receive
    data at that point, as and when the Observable publishes new data. If the Observable
    has already published previous data items, then these will have been lost and
    the Observer will not receive that data.


    The most common situation in which a Hot Observable is created is when the source
    producer represents data that may be irrelevant if not processed immediately or
    may be superseded by subsequent data. For example, data published by a Stock Market
    Price data feed would fall into this category. When an Observable wraps around
    this data feed it can publish that data whether or not an Observer is subscribed.


    ## Implications of Hot and Cold Observables


    It is important to know whether you have a hot or cold Observable because this
    can impact on what you can assume about the data supplied to the Observers and
    thus how you need to design your application. If it is important that no data
    is lost then care is needed to ensure that the subscribers are in place before
    a Hot Observable starts to publish data (whereas this is not a concern for a cold
    Observable).


    ## Differences Between Event Driven Programming and Reactive Programming


    In Event Driven programming, an event is generated in response to something happening;
    the event then represents this with any associated data. For example, if the user
    clicks the mouse then an associated MouseClickEvent might be generated. This object
    will usually hold information about the x and y coordinates of the mouse along
    with which button was clicked etc. It is then possible to associate some behavior
    (such as a function or a method) with this event so that if the event occurs,
    then the associated operation is invoked and the event object is provided as a
    parameter. This is certainly the approach used in the wxPython library presented
    earlier in this book:


    ![](img/8a661fca3884547aede940b9a6567321_646_0.png)


    From the above diagram, when a MoveEvent is generated the on_move() method is
    called and the event is passed into the method.


    In the Reactive Programming approach, an Observer is associated with an Observable.
    Any data generated by the Observable will be received and handled by the Observer.
    This is true whatever that data is, as the Observer is a handler of data generated
    by the Observable rather than a handler of a specific type of data (as with the
    Event driven approach).


    Both approaches could be used in many situations. For example, we could have a
    scenario in which some data is to be processed whenever a stock price changes.


    This could be implemented using a StockPriceChangeEvent associated with a StockPriceEventHandler.
    It could also be implemented via a StockPriceChangeObservable and a StockPriceChangeObserver.
    In either case one element handles the data generated by another element. However,
    the RxPy library simplifies this process and allows the Observer to run in the
    same thread as, or a separate thread from, the Observable with just a small change
    to the code.


    ## Advantages of Reactive Programming


    There are several advantages to the use of a Reactive Programming library these
    include:


    - It avoids multiple callback methods. The problems associated with the use of
    callbacks are sometimes referred to as callback hell. This can occur when there
    are multiple callbacks, all defined to run in response to some data being generated
    or some operation completing. It can be hard to understand, maintain and debug
    such systems.

    - Simpler asynchronous, multi threaded execution. The approach adopted by RxPy
    makes it very easy to execute operations/behavior within a multi threaded environment
    with independent asynchronous functions.

    - Available Operators. The RxPy library comes pre built with numerous operators
    that make processing the data produced by an Observable much easier.

    - Data Composition. It is straight forward to compose new data streams (Observables)
    from data supplied by two or more existing Observables.'
  mdcn: '## ReactiveX 项目


    ReactiveX 是响应式编程范式中最著名的实现。ReactiveX 基于观察者-可观察者设计模式。然而，它是该设计模式的扩展，因为它扩展了该模式，使得该方法支持数据和/或事件的序列，并添加了允许开发者以声明式方式组合序列的运算符，同时抽象了与低级线程、同步、并发数据结构和非阻塞
    I/O 相关的顾虑。


    ReactiveX 项目为多种语言提供了实现，包括 RxJava、RxScala 和 RxPy；后者是我们正在研究的版本，因为它适用于 Python 语言。


    RxPy 被描述为：


    > 一个使用可观察者集合和查询运算符函数在 Python 中组合异步和基于事件的程序的库


    ## 观察者模式


    观察者模式是四人帮设计模式之一。四人帮模式（最初由 Gamma 等人于 1995 年描述）之所以如此命名，是因为这本关于设计模式的书是由四位非常著名的作者撰写的，即：Erich
    Gamma、Richard Helm、Ralph Johnson 和 John Vlissides。


    观察者模式提供了一种确保当另一个对象的状态发生变化时，一组对象会被通知的方法。它已被广泛用于多种语言（如 Smalltalk 和 Java），也可以与 Python
    一起使用。


    观察者模式的意图是管理一个对象与那些对该对象的状态（特别是状态变化）感兴趣的对象之间的一对多关系。因此，当对象的状态发生变化时，感兴趣的（依赖的）对象会被通知这一变化，并可以采取任何适当的行动。


    观察者模式中有两个关键角色，即观察者角色和可观察者角色。


    - 可观察者。这是负责通知其他对象其状态已发生变化的对象。

    - 观察者。观察者是一个会被通知可观察者状态变化并可以采取适当行动（例如触发其自身状态的变化或执行某些操作）的对象。


    此外，状态通常被显式表示：


    - 状态。此角色可以由一个用于共享可观察者内部已发生状态变化信息的对象来扮演。这可能像一个指示可观察者新状态的字符串一样简单，也可能是一个提供更详细信息的面向数据的对象。


    这些角色在下图中进行了说明。


    ![](img/8a661fca3884547aede940b9a6567321_642_0.png)


    在上图中，可观察者对象将数据发布到数据流。数据流中的数据随后被发送给注册到该可观察者的每个观察者。通过这种方式，数据被广播给可观察者的所有观察者。


    通常，可观察者只有在至少有一个观察者可用以处理该数据时才会发布数据。向可观察者注册的过程被称为订阅。因此，一个可观察者可以有零个或多个订阅者（观察者）。


    如果可观察者发布数据的速度快于观察者可以处理的速度，那么数据将通过数据流排队。这允许观察者以自己的节奏一次处理接收到的数据；而无需担心数据丢失（只要有足够的内存用于数据流）。


    ## 热可观察者与冷可观察者


    另一个需要理解的有用概念是热可观察者和冷可观察者。


    - 冷可观察者是惰性可观察者。也就是说，冷可观察者只有在至少有一个观察者订阅它时才会发布数据。

    - 相比之下，热可观察者无论是否有观察者订阅都会发布数据。


    ## 冷可观察者


    冷可观察者除非至少有一个观察者订阅以处理该数据，否则不会发布任何数据。此外，冷可观察者只在观察者准备好处理数据时才向该观察者提供数据；这是因为可观察者-观察者关系更像是一种拉取关系。例如，给定一个将基于范围生成一组值的可观察者，那么该可观察者将在观察者请求时惰性地生成每个结果。


    如果观察者花费一些时间处理可观察者发出的数据，那么可观察者将等待观察者准备好处理数据后再发出另一个值。


    ## 热可观察者


    相比之下，热可观察者无论是否有观察者订阅都会发布数据。当观察者注册到可观察者时，它将从那时开始接收数据，只要可观察者发布新数据。如果可观察者已经发布了先前的数据项，那么这些数据将会丢失，观察者将不会收到该数据。


    创建热可观察者最常见的场景是当源生产者代表的数据如果未立即处理可能无关紧要，或者可能被后续数据取代时。例如，股票市场价格数据源发布的数据就属于此类。当可观察者包装此数据源时，它可以发布该数据，无论是否有观察者订阅。


    ## 热可观察者与冷可观察者的影响


    了解你拥有的是热可观察者还是冷可观察者很重要，因为这会影响你可以对提供给观察者的数据做出什么假设，从而影响你需要如何设计你的应用程序。如果确保不丢失数据很重要，那么需要注意确保在热可观察者开始发布数据之前订阅者已就位（而对于冷可观察者则无需担心）。


    ## 事件驱动编程与响应式编程的区别


    在事件驱动编程中，事件是为响应某事发生而生成的；然后该事件连同任何关联数据一起表示该事件。例如，如果用户点击鼠标，则可能生成关联的 MouseClickEvent。此对象通常会保存有关鼠标
    x 和 y 坐标以及点击了哪个按钮等信息。然后可以将某些行为（如函数或方法）与此事件关联，以便如果事件发生，则调用关联的操作，并将事件对象作为参数提供。这当然是本书前面介绍的
    wxPython 库中使用的方法：


    ![](img/8a661fca3884547aede940b9a6567321_646_0.png)


    从上图可以看出，当生成 MoveEvent 时，会调用 on_move() 方法，并将事件传递给该方法。


    在响应式编程方法中，观察者与可观察者相关联。可观察者生成的任何数据都将由观察者接收和处理。无论数据是什么，这都是正确的，因为观察者是可观察者生成数据的处理器，而不是特定类型数据的处理器（如事件驱动方法）。


    这两种方法都可以在许多情况下使用。例如，我们可以有一个场景，其中每当股票价格发生变化时，就需要处理一些数据。


    这可以使用与 StockPriceEventHandler 关联的 StockPriceChangeEvent 来实现。也可以通过 StockPriceChangeObservable
    和 StockPriceChangeObserver 来实现。在任何一种情况下，一个元素处理另一个元素生成的数据。然而，RxPy 库简化了这一过程，并允许观察者在与可观察者相同的线程中运行，或者在单独的线程中运行，只需对代码进行微小的更改。


    ## 响应式编程的优势


    使用响应式编程库有几个优势，包括：


    - 它避免了多个回调方法。与使用回调相关的问题有时被称为回调地狱。当有多个回调，所有回调都定义为在生成某些数据或完成某些操作时运行时，就可能发生这种情况。理解、维护和调试此类系统可能很困难。

    - 更简单的异步、多线程执行。RxPy 采用的方法使得在具有独立异步函数的多线程环境中执行操作/行为变得非常容易。

    - 可用的运算符。RxPy 库预置了大量运算符，使得处理可观察者产生的数据变得更加容易。

    - 数据组合。从两个或多个现有可观察者提供的数据组合新的数据流（可观察者）是直接了当的。'
