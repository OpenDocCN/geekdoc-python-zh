    # Logger Hierarchy


    There is in fact a hierarchy of loggers with the root logger at the top of this
    hierarchy. All named loggers are below the root logger. The name of a logger can
    actually be a period-separated hierarchical value such as util, util.lib and util.lib.printer.
    Loggers that are further down the hierarchy are children of loggers further up
    the logger hierarchy.


    For example given a logger called lib, then it will be below the root logger but
    above the logger with the name util.lib. This logger will in turn be above the
    logger called util.lib.printer. This is illustrated in the following diagram:'
  - '[PAGE 493]


    ![](img/8a661fca3884547aede940b9a6567321_493_0.png)


    The logger name hierarchy is analogous to the Python package hierarchy, and identical
    to it if you organize your loggers on a per-module basis using the recommended
    construction logging.getLogger(__name__).


    This hierarchy is important when considering the log level. If a log level has
    not been set for the current logger then it will look to its parent to see if
    that logger has a log level set. If it does that will be the log level used. This
    search back up the logger hierarchy will continue until either an explicit log
    level is found or the root logger is encountered which has a default log level
    of WARNING.'
