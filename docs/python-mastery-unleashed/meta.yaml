    # Common Mocking Framework Concepts


    As has been mentioned there are several mocking frameworks around for not only
    Python but other languages such as Java, C# and Scala etc. All of these frameworks
    have a common core behavior. This behavior allows a mock function, method or object
    to be created based on the interface presented by the real thing. Of course unlike
    languages such as C# and Java Python does not have a formal interface concept;
    however this does not stop the mocking framework from still using the same idea.


    In general once a mock has been created it is possible to define how that mock
    should appear to behave; in general this involves specifying the return result
    to use fora function or method. It is also possible to verify that the mock has
    been invoked as expected with the parameters expected.


    The actual mock can be added to a test or a set of tests either programmatically
    or via some form of decorator. In either case for the duration of the test the
    mock will be used instead of the real thing.'
