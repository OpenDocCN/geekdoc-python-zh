- md: "In some situations it is necessary for two processes to exchange data. However,\
    \ the two process objects do not share memory as they are running in separate\
    \ operating system level processes. To get around this the multiprocessing library\
    \ provides the Pipe() function.\n\nThe Pipe() function returns a pair of connection.Connection\
    \ objects connected by a pipe which by default is duplex (two-way). The two connection\
    \ objects returned by Pipe() represent the two ends of the pipe. Each connection\
    \ object has send() and recv() methods (among others). This allows one process\
    \ to send data via the send() method of one end of the connection object. In turn\
    \ a second process can receive that data via the recv() method of the other connection\
    \ object. This is illustrated below:\n\n![](img/8a661fca3884547aede940b9a6567321_572_0.png)\n\
    \nOnce a program has finished with a connection it should be closed using close().\n\
    \nThe following program illustrates how pipe connections are used:\n\n```python\n\
    from multiprocessing import Process, Pipe\nfrom time import sleep\n\ndef worker(conn):\n\
    \    print('Worker - started now sleeping for 1 second')\n    sleep(1)\n    print('Worker\
    \ - sending data via Pipe')\n    conn.send('hello')\n    print('Worker - closing\
    \ worker end of connection')\n    conn.close()\n\ndef main():\n    print('Main\
    \ - Starting, creating the Pipe')\n    main_connection, worker_connection = Pipe()\n\
    \    print('Main - Setting up the process')\n    p = Process(target=worker, args=[worker_connection])\n\
    \    print('Main - Starting the process')\n    p.start()\n    print('Main - Wait\
    \ for a response from the child process')\n    print(main_connection.recv())\n\
    \    print('Main - closing parent process end of connection')\n    main_connection.close()\n\
    \    print('Main - Done')\n\nif __name__ == '__main__':\n    main()\n```\n\nThe\
    \ output from this Pipe example is:\n\n- Main - Starting, creating the Pipe\n\
    - Main - Setting up the process\n- Main - Starting the process\n- Main - Wait\
    \ for a response from the child process\n- Worker - started now sleeping for 1\
    \ second\n- Worker - sending data via Pipe\n- Worker - closing worker end of connection\
    \ hello\n- Main - closing parent process end of connection\n- Main - Done\n\n\
    Note that data in a pipe may become corrupted if two processes try to read from\
    \ or write to the same end of the pipe at the same time. However, there is no\
    \ risk of corruption from processes using different ends of the pipe at the same\
    \ time.\n\n## Sharing State Between Processes\n\nIn general, if it can be avoided,\
    \ then you should not share state between separate processes. However, if it is\
    \ unavoidable then the multiprocessing library provides two ways in which state\
    \ (data) can be shared, these are Shared Memory (as supported by multiprocessing.Value\
    \ and multiprocessing.Array) and Server Process.\n\n## Process Shared Memory\n\
    \nData can be stored in a shared memory map using a multiprocessing.Value or multiprocessing.Array.\
