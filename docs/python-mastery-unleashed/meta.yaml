- img_proc: true
  md: "We currently have a way to loose the game but we don’t have a way to win the\
    \ game! However, we want the player to be able to win the game by surviving for\
    \ a specified period of time.We could represent this with a timer of some sort.\
    \ However, in our case we will represent it as a specific number of cycles of\
    \ the main game playing loop. If the player survives for this number of cycles\
    \ then they have won. For example:\n\n```\n# See if the player has won\nif cycle_count\
    \ == MAX_NUMBER_OF_CYCLES:\n    print('WINNER!')\n    break\n```\n\nIn this case\
    \ a message is printed out stating that the player won and then the main game\
    \ playing loop is terminated (using the break statement). The MAX_NUMBER_OF_CYCLES\
    \ global value can be set as appropriate, for example:\n\n```\nMAX_NUMBER_OF_CYCLES\
    \ = 1000\n```\n\n# Increasing the Number of Meteors\n\nWe could leave the game\
    \ as it is at this point, as it is now possible to win or loose the game. However,\
    \ there are a few things that can be easily added that will enhance the game playing\
    \ experience. One of these is to increase the number of"
