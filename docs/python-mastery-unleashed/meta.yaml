- md: "## Introduction to Testing\n\n### Introduction to Testing\n\nThis chapter considers\
    \ the different types of tests that you might want to perform with the systems\
    \ you develop in Python. It also introduces Test Driven Development.\n\n### Types\
    \ of Testing\n\nThere are at least two ways of thinking about testing:\n\n1. It\
    \ is the process of executing a program with the intent of finding errors/bugs\
    \ (see Glenford Myers, The Art of Software Testing).\n2. It is a process used\
    \ to establish that software components fulfill the requirements identified for\
    \ them, that is that they do what they are supposed to do.\n\nThese two aspects\
    \ of testing tend to have been emphasized at different points in the software\
    \ life cycle. Error Testing is an intrinsic part of the development process, and\
    \ an increasing emphasis is being placed on making testing a central part of software\
    \ development (see Test Driven Development).\n\nIt should be noted that it is\
    \ extremely difficult—and in many cases impossible—to prove that software works\
    \ and is completely error free. The fact that a set of tests finds no defects\
    \ does not prove that the software is error-free. ‘Absence of evidence is not\
    \ evidence of absence!’. This was discussed in the late 1960s and early 1970s\
    \ by Dijkstra and can be summarized as:\n\n> Testing shows the presence, not the\
    \ absence of bugs\n\nTesting to establish that software components fulfill their\
    \ contract involves checking operations against their requirements. Although this\
    \ does happen at development time, it forms a major part of Quality Assurance\
    \ (QA) and User Acceptance testing. It should be noted that with the advent of\
    \ Test-Driven Development, the emphasis on testing against requirements during\
    \ development has become significantly higher.\n\nThere are of course many other\
    \ aspects to testing, for example, Performance Testing which identifies how a\
    \ system will perform as various factors that affect that system change. For example,\
    \ as the number of concurrent requests increase,\n\n# Try\n\nUsing the example\
    \ presented in this chapter add the following:\n\n- Provide a score counter. This\
    \ could be based on the number of cycles the player survives or the number of\
    \ meteors that restart from the top of the screen etc.\n- Add another type of\
    \ GameObject, this could be a shooting star that moves across the screen horizontally;\
    \ perhaps using a random starting y coordinate.\n- Allow the game difficulty to\
    \ be specified at the start. This could affect the number of initial meteors,\
    \ the maximum speed of a meteor, the number of shooting stars etc.\n\n```python\n\
    import pygame, random, time\n\nFRAME_REFRESH_RATE = 30\nDISPLAY_WIDTH = 600\n\
    DISPLAY_HEIGHT = 400\nWHITE = (255, 255, 255)\nBACKGROUND = (0, 0, 0)\nINITIAL_METEOR_Y_LOCATION\
    \ = 10\nINITIAL_NUMBER_OF_METEORS = 8\nMAX_METEOR_SPEED = 5\nSTARSHIP_SPEED =\
    \ 10\nMAX_NUMBER_OF_CYCLES = 1000\nNEW_METEOR_CYCLE_INTERVAL = 40\n\nclass GameObject:\n\
    \    def load_image(self, filename):\n        self.image = pygame.image.load(filename).convert()\n\
    \        self.width = self.image.get_width()\n        self.height = self.image.get_height()\n\
    \n    def rect(self):\n        \"\"\" Generates a rectangle representing the objects\
    \ location\n        and dimensions \"\"\"\n        return pygame.Rect(self.x,\
    \ self.y, self.width, self.height)\n\n    def draw(self):\n        \"\"\" draw\
    \ the game object at the current x, y coordinates \"\"\"\n        self.game.display_surface.blit(self.image,\
    \ (self.x, self.y))\n\nclass Starship(GameObject):\n    \"\"\" Represents a starship\"\
    \"\"\n    def __init__(self, game):\n        self.game = game\n        self.x\
    \ = DISPLAY_WIDTH / 2\n        self.y = DISPLAY_HEIGHT - 40\n        self.load_image('starship.png')\n\
    \n    def move_right(self):\n        \"\"\" moves the starship right across the\
    \ screen \"\"\"\n        self.x = self.x + STARSHIP_SPEED\n        if self.x +\
    \ self.width > DISPLAY_WIDTH:\n            self.x = DISPLAY_WIDTH - self.width\n\
    \n    def move_left(self):\n        \"\"\" Move the starship left across the screen\
    \ \"\"\"\n        self.x = self.x - STARSHIP_SPEED\n        if self.x < 0:\n \
    \           self.x = 0\n\n    def move_up(self):\n        \"\"\" Move the starship\
    \ up the screen \"\"\"\n        self.y = self.y - STARSHIP_SPEED\n        if self.y\
    \ < 0:\n            self.y = 0\n\n    def move_down(self):\n        \"\"\" Move\
    \ the starship down the screen \"\"\"\n        self.y = self.y + STARSHIP_SPEED\n\
    \        if self.y + self.height > DISPLAY_HEIGHT:\n            self.y = DISPLAY_HEIGHT\
    \ - self.height\n\n    def __str__(self):\n        return 'Starship(' + str(self.x)\
    \ + ', ' + str(self.y) + ')'\n\nclass Meteor(GameObject):\n    \"\"\" represents\
    \ a meteor in the game \"\"\"\n    def __init__(self, game):\n        self.game\
    \ = game\n        self.x = random.randint(0, DISPLAY_WIDTH)\n        self.y =\
    \ INITIAL_METEOR_Y_LOCATION\n        self.speed = random.randint(1, MAX_METEOR_SPEED)\n\
    \        self.load_image('meteor.png')\n\n    def move_down(self):\n        \"\
