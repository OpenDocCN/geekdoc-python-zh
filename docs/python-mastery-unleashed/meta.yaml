    \ status code that it handles. For example:\n\n```\n@app.errorhandler(400)\ndef\
    \ not_found(error):\n    return make_response(jsonify({'book': 'Not found'}),\
    \ 400)\n```\n\nNow when a 400 code is generated via the flask.abort() function,\
    \ the not_found() function will be invoked and a JSON response will be generated\
    \ with the information provided by the flask.make_response()function. For example:\n\
    \n```\ncurl -H \"Content-Type: application/json\" -X POST -d '{\"title\":\"Read\
    \ a book\", \"author\":\"Tom Andrews\", \"price\":\"13.24\"}' http://localhost:5000/book\n\
    ```"
