    We can now look at how to actually draw a shape onto the screen.


    The cursor on the screen has several properties; these include the current drawing
    color of the pen that the cursor moves, but also its current position (in the
    x, y coordinates of the screen) and the direction it is currently facing. We have
    already seen that you can control one of these properties using the pencolor()
    method, other methods are used to control the cursor (or turtle) and are presented
    below.


    The direction in which the cursor is pointing can be altered using several functions
    including:


    +   - right(angle) Turn cursor right by angle units.

    - left(angle) Turn the cursor left by angle units.

    - setheading(to_angle) Set the orientation of the cursor to to_angle.


    Where 0 is east, 90 is north, 180 is west and 270 is south. You can move the cursor
    (and if the pen is down this will draw a line) using:'
  merge: -1
  pgno: 35
- img_proc: true
  md: '+   - forward(distance) move the cursor forward by the specified distance in
    the direction that the cursor is currently pointing. If the pen is down then draw
    a line.

    - backward(distance)move the cursor backward by distance in the opposite direction
    that in which the cursor is pointing.


    And you can also explicitly position the cursor:


    +   - goto(x, y) move the cursor to the x, y location on the screen specified;
    if the pen is down draw a line. You can also usesteps and set position to do the
    same thing.

    - setx(x) sets the cursor’s x coordinate, leaves the y coordinate unchanged.

    - sety(y) sets the cursor’s y coordinate, leaves the x coordinate unchanged.


    It is also possible to move the cursor without drawing by modifying whether the
    pen is up or down:


    +   - penup() move the pen up—moving the cursor will no longer draw a line.

    - pendown() move the pen down—moving the cursor will now draw a line in the current
    pen color.


    The size of the pen can also be controlled:


    +   - pensize(width) set the line thickness to width. The method width() is an
    alias for this method.'
