    follow these principles are termed RESTful services.


    A key aspect of a RESTful service is that all interactions between a client (whether
    some JavaScript running in a browser or a standalone application) are done using
    simple HTTP based operations. HTTP supports four operations these are HTTP Get,
    HTTP Post, HTTP Put and HTTP Delete. These can be used as verbs to indicate the
    type of action being requested. Typically these are used as follows:


    +   - retrieve information (HTTP Get),

    - create information (HTTP Post),

    - update information (HTTP Put),

    - delete information (HTTP Delete).


    It should be noted that REST is not a standard in the way that HTML is a standard.
    Rather it is a design pattern that can be used to create web applications that
    can be invoked over HTTP and that give meaning to the use of Get, Post, Put and'
- md: 'Delete HTTP operations with respect to a specific resource (or type of data).


    The advantage of using RESTful services as a technology, compared to some other
    approaches (such as SOAP based services which can also be invoked over HTTP) is
    that


    - the implementations tend to be simpler,

    - the maintenance easier,

    - they run over standard HTTP and HTTPS protocols and

    - do not require expensive infrastructures and licenses to use.


    This means that there is lower server and server side costs. There is little vendor
    or technology dependency and clients do not need to know anything about the implementation
    details or technologies being used to create the services.


    ## A RESTful API


    1. A RESTful API is one in which you must first determine the key concepts or
    resources being represented or managed.

    2. These might be books, products in a shop, room bookings in hotels etc. For
    example a bookstore related service might provide information on resources such
    as books, CDs, DVDs, etc. Within this service books are just one type of resource.
    We will ignore the other resources such as DVDs and CDs etc.

    3. Based on the idea of a book as a resource we will identify suitable URLs for
    these RESTful services. Note that although URLs are frequently used to describe
    a web page —that is just one type of resource. For example, we might develop a
    resource such as


    /bookservice/book


    from this we could develop a URL based API, such as


    /bookservice/book/<isbn>


    Where ISBN (the International Standard Book Number) indicates a unique number
    to be used to identify a specific book whose details will be returned using this
    URL.


    We also need to design the representation or formats that the service can supply.
    These could include plain text, JSON, XML etc. JSON standards for the JavaScript
    Object Notation and is a concise way to describe data that is to be transferred
    from a service running on a server to a client running in a browser. This is the
    format we will use in the next section. As part of this we might identify a series
    of operations to be provided by our services based on the type of HTTP Method
    used to invoke our service and the contents of the URL provided. For example,
    for a simple Book Service this might be:


    - GET /book/<isbn>—used to retrieve a book for a given ISBN.

    - GET /book/list—used to retrieve all current books in JSON format.

    - POST /book (JSON in body of the message)—which supports creating a new book.

    - PUT /book (JSON in body of message)—used to update the data held on an existing
    Book.

    - DELETE /book/<isbn>—used to indicate that we would like a specific book deleted
    from the list of books held.


    Note that the parameter isbn in the above URLs actually forms part of the URL
    path.


    ## Python Web Frameworks


    There are very many frameworks and libraries available in Python that will allow
    you to create JSON based web services; and the shear number of options available
    to you can be overwhelming. For example, you might consider


    - Flask,

    - Django,

    - Web2py and

    - CherryPy to name just a few.


    These frameworks and libraries offer different sets of facilities and levels of
    sophistication. For example Django is a full-stack web framework; that is it is
    aimed at developing not just web services but full blown web sites. However, for
    our purposes this is probably overkill and the Django Rest interface is only part
    of a much larger infrastructure. That does not mean of course that we could not
    use Django to create our bookshop services; however there are simpler options
    available. The web2py is another full stack web framework which we will also discount
    for the same reason.


    In contrast Flask and CherryPy are considered non full-stack frameworks (although
    you can create a full stack web application using them). This means that they
    are lighter weight and quicker to get started with. CherryPy was original rather
    more focused on providing a remote function call facility that allowed functions
    to be invoked over HTTP; however this has been extended to provide more REST like
    facilities. In this chapter we will focus on Flask as it is one of the most widely
    used frameworks for light weight RESTful services in Python.


    ## Flask


    Flask is a web development framework for Python. It describes itself as a micro
    framework for Python which is somewhat confusing; to the point where there is
    a page dedicated to this on their web site that explains what it means and what
    the implications are of this for Flask. According to Flask, the micro in its description
    relates to its primary aim of keeping the core of Flask simple but extensible.
    Unlike Django it doesn''t include facilities aimed at helping you integrate your
    application with a database for example. Instead Flask focuses on the core functionality
    required of a web service framework and allows extension to be used, as and when
    required, for additional functionality.


    Flask is also a convention over configuration framework; that is if you follow
    the standard conventions then you will not need to deal with much additional configuration
    information (although if you wish to follow a different set of conventions then
    you can provide configuration information to change the defaults). As most people
    will (at least initially) follow these conventions it makes it very easy to get
    something up and running very quickly.


    ## Hello World in Flask


    As is traditional in all programming languages we will start of with a simple
    ‘Hello World’ style application. This application will allow us to create a very
    simple web service that maps a particular URL to a function that will return JSON
    format data. We will use the JSON data format as it is very widely used within
    web-based services.


    ## Using JSON


    JSON standards for JavaScript Object Notation; it is a light weight data-interchange
    format that is also easy for humans to read and write. Although it is derived
    from a subset of the JavaScript programming language; it is in fact completely
    language independent and many languages and frameworks now support automatically
    processing of their own formats into and from JSON. This makes it ideal for RESTful
    web services.


    JSON is actually built on some basic structures:


    - A collection of name/value pairs in which the name and value are separated by
    a colon '':'' and each pair can be separated by a comma '',''.

    - An ordered list of values that are encompassed in square brackets (''[]'').


    This makes it very easy to build up structures that represent any set of data,
    for example a book with an ISBN, a title, author and price could be represented
    by:


    ```

    {

    "author": "Phoebe Cooke", "isbn": 2,

    "price": 12.99, "title": "Java"

    }

    ```


    In turn a list of books can be represented by a comma separated set of books within
    square brackets. For example:


    ```

    [ {"author": "Gryff Smith","isbn": 1, "price": 10.99, "title": "XML"},

    {"author": "Phoebe Cooke", "isbn":2, "price": 12.99, "title": "Java"},

    {"author": "Jason Procter", "isbn": 3, "price": 11.55, "title": "C#"}]

    ```


    ## Implementing a Flask Web Service


    There are several steps involved in creating a Flask web service, these are:


    1. Import flask.

    2. Initialize the Flask application.

    3. Implement one or more functions (or methods) to support the services you wish
    to publish.

    4. Providing routing information to route from the URL to a function (or method).

    5. Start the web service running.


    We will look at these steps in the rest of this chapter.


    ## A Simple Service


    We will now create our hello world web service. To do this we must first import
    the flask module. In this example we will use the Flask class and jsonify() function
    elements of the module.


    We then need to create the main application object which is an instance of the
    Flask class:


    ```

    from flask import Flask, jsonify

    app = Flask(__name__)

    ```


    The argument passed into the Flask() constructor is the name of the application’s
    module or package. As this is a simple example we will use the `__name__` attribute
    of the module which in this case will be ‘__main__’. In larger more complex applications,
    with multiple packages and modules, then you may need to choose an appropriate
    package name.


    The Flask application object implements the WSGI (Web Server Gateway Interface)
    standard for Python. This was originally specified in PEP-333 in 2003 and was
    updated for Python 3 in PEP-3333 published in 2010. It provides a simple convention
    for how web servers should handle requests to applications. The Flask application
    object is the element that can route a request for a URL to a Python function.


