  md: '![](img/8a661fca3884547aede940b9a6567321_61_0.png)


    Matplotlib is a very flexible and powerful graphing library. It can support a
    variety of different Python graphics platforms and operating system windowing
    environments. It can also generate output graphics in a variety of different formats
    including PNG, JPEG, SVG and PDF etc.


    Matplotlib can be used on its own or in conjunction with other libraries to provide
    a wide variety of facilities. One library that is often used in conjunction with
    Matplotlib is NumPy which'
