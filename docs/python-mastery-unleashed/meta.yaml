  md: '# The CSV Writer Class


    A CSV Writer is obtained from the csv.writer()function. The csv writer supports
    two methods used to write data to the CSV file:


    +   - csvwriter.writerow(row) Write the row parameter to the writer’s file object,
    formatted according to the current dialect.

    - csvwriter.writerows(rows) Write all elements in rows (an iterable of row objects
    as described above) to the writer’s file object, formatted according to the current
    dialect.

    - Writer objects also have the following public attribute:

    - csvwriter.dialect A read-only description of the dialect in use by the writer.


    The following program illustrates a simple use of the csv module which creates
    a file called sample.csv.


    As we have not specified a dialect, the default ‘excel’ dialect will be used.
    The writerow() method is used to write each comma separate list of strings to
    the CSV file.


    ```

    print(''Crearting CSV file'')

    with open(''sample.csv'', ''w'', newline='''') as csvfile: writer = csv.writer(csvfile)
    writer.writerow([''She Loves You'', ''Sept 1963''])

