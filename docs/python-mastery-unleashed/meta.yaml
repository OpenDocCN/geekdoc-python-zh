    # AsyncIO Tasks


    Tasks are used to execute functions marked with the async keyword concurrently.
    Tasks are never created directly instead they are created implicitly via the keyword
    await or through functions such as asyncio.run described above or asyncio.create\_task(),
    asyncio.gather() and asyncio.as\_completed(). These additional task creation functions
    are described below:


    +   - asyncio.create\_task() This function takesa function marked with async and
    wraps it inside a Task and schedules it for execution by the Async IO Event Loop.
    This function was added in Python 3.7.

    - asyncio.gather(*aws)This function runs all the async functions passed to it
    as separate Tasks.It gathers the results of each separate task together and returns
    them as a list. The order of the results corresponds to the order of the async
    functions in the aws list.

