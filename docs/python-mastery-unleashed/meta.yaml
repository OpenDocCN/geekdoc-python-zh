  md: '# Concurrency with AsyncIO


    # Introduction


    The Async IO facilities in Python are relatively recent additions originally introduced
    in Python 3.4 and evolving up to and including Python 3.7. They are comprised
    (as of Python 3.7) of two new keywords async and await (introduced in Python 3.7)
    and the Async IO Python package.


    In this chapter we first discuss Asynchronous IO before introducing the async
    and await keywords. We then present Async IO Tasks, how they are created used
    and managed.


    # Asynchronous IO


    Asynchronous IO (or Async IO) is a language agnostic concurrent programming model
    (or paradigm) that has been implemented in several different programming language
    (such as C# and Scala) as well as in Python.


    Asynchronous IO is another way in which you can build concurrent applications
    in Python. It is in many ways an'
  merge: -1
  pgno: 619
- img_proc: true
  md: 'alternative to the facilities provided by the Threading library in Python.
    However, were as the Threading library is more susceptible to issues associated
    with the GIL (The Global Interpreter Lock) which can affect performance, the Async
    IO facilities are better insulated from this issue.


    The way in which Async IO operates is also lighter weight then the facilities
    provide day the multiprocessing library since the asynchronous tasks in Async
    IO run within a single process rather than requiring separate processes to be
    spawned on the underlying hardware.


    Async IO is therefore another alternative way of implementing concurrent solutions
    to problems. It should be noted that it does not build on either Threading or
    Multi Processing; instead Async IO is based on the idea of cooperative multitasking.
    These cooperating tasks operate asynchronously; by this we mean that the tasks:


    +   - are able to operate separately from other tasks,

    - are able to wait for another task to return a result when required,

    - and are thus able to allow other tasks to run while they are waiting.'
  merge: -1
  pgno: 620
- img_proc: true
  md: 'The IO (Input/Output) aspect of the name Async IO is because this form of concurrent
    program is best suited to I/O bound tasks.


    In an I/O bound task a program spends most of its time sending data to, or reading
    data from, some form of external device (for example a database or set of files
    etc.). This communication is time consuming and means that the program spends
    most of its time waiting for a response from the external device.


    One way in which such I/O bound applications can (appear to) speed up is to overlap
    the execution of different tasks; thus, while one task is waiting for a database
    to respond with some data, another task can be writing data to a log file etc.


    # AsyncIO Event Loop


    When you are developing code using the Async IO facilities you do not need to
    worry about how the internals of the Async IO library work; however at least at
    the conceptual level it is useful to understand one key concept; that of the Async
    IO Event Loop; This loop control show and when each task gets run. For the purposes
    of this discussion a task represents some work that can be run independently of
    other pieces of work.'
  merge: -1
  pgno: 621
- img_proc: true
  md: 'The Event Loop knows about each task to be run and what the state of the task
    currently is (for example whether it is waiting for something to happen/complete).
    It selects a task that is ready to run from the list of available tasks and executes
    it. This task has complete control of the CPU until it either completes its work
    or hands back control to the Event Loop (for example, because it must now wait
    for some data to be supplied from a database).


    The Event Loop now checks to see if any of the waiting tasks are ready to continue
    executing and makes a note of their status. The Event Loop then selects another
    task that is ready to run and starts that task off. This loop continues until
    all the tasks have finished. This is illustrated below:


    ![](img/8a661fca3884547aede940b9a6567321_622_0.png)


    An important point to note in the above description is that a task does not give
    up the processor unless it decides to, for example by having to wait for something
    else. They never get interrupted in the middle of an operation; this avoids the'
  merge: -1
  pgno: 622
- img_proc: true
  md: 'problem that two threads might have when being time sliced by a separate scheduler
    as they may both be sharing the same resource.This can greatly simplify your code.


    # The Async and Await Keywords


    The async keyword, introduced in Python 3.7 is used to mark a function as being
    something that uses the await keyword (we will come back to this below as there
    is one other use of the async keyword).A function that uses the await keyword
    can be run as a separate task and can give up control of the processor when it
    calls await against another async function and must wait for that function to
    complete. The invoked async function can then run as a separate task etc.


    To invoke an async function it is necessary to start the Async IO Event Loop and
    for that function to be treated as a task by the Event Loop. This is done by calling
    the asyncio.run() method and passing in the root async function.


    The asyncio.run() function was introduced in Python 3.7 (older versions of Python
    such as Python 3.6 required you to explicitly obtain a reference to the Event
    Loop and to run the root async function via that). One point to note about this
    function is that it has been marked as being provisional in Python 3.7. This means
    that future versions of Python may or may not support the function or may modify
    the function in'
  merge: -1
  pgno: 623
- img_proc: true
  md: 'some way. You should therefore check the documentation for the version of Python
    you are using to see whether the run method has been altered or not.


    # Using Async and Await


    We will examine a very simple Async IO program from the top down. The main() function
    for the program is given below:


    ```

    def main() :

    print(''Main - Starting'')

    asyncio.run(do_something())

    print(''Main - Done'')

    if_name_== ''_main_'':

    main()

    ```


    The main() function is the entry point for the program and calls:


    ```

    asyncio.run(do_something())

    ```


    This starts the Async IO Event Loop running and results in the do_some- thing()
    function being wrapped up in a Task that is managed by the loop. Note that you
    do not explicitly create a Task in Async IO; they are always created by some function
    however it is useful to be aware of Tasks as you can interact with them to check
    their status or to retrieve a result.'
  merge: -1
  pgno: 624
