    \n```\nclass multiprocessing.Process(group=None,\n    target=None,\n    name=None,\n\
    \    args=(),\n    kwargs={}, daemon=None)\n```\n\n+   - group should always be\
    \ None; it exists solely for compatibility with the Threading API.\n- target is\
    \ the callable object to be invoked by the run() method. It defaults to None,\
