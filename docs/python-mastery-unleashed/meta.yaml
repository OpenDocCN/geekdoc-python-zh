    ```

    file = open(''myfile.txt'', ''r+'') print(''file.name:'',  file.name)

    print(''file.closed:'',  file.closed) print(''file.mode:'',

    file.mode) file.close()

    print(''file.closed now:'',  file.closed)

    ```


    The output from this is:


    +   - file.name: myfile.txt

    - file.closed: False

