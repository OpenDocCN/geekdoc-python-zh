    \ pool (typically there would be multiple threads in the pool but one is being\
    \ used here for illustrative purposes). The submit() method is then used to submit\
    \ the function worker with the parameter ‘A’ to the ThreadPoolExecutor for it\
    \ to schedule execution of the function. The submit() method returns a Future\
    \ object.\n\nThe main program then waits for the future object to return a result\
    \ (by calling the result() method on the future). This method can also take a\
    \ timeout.\n\nTo change this example to use Processes rather than Threads all\
