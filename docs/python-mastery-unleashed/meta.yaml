    # The Event Queue


    Events are supplied to a pygame application via the Event Queue. The Event Queue
    is used to collect together events as they happen. For example, let us assume
    that a user clicks on the mouse twice and a key twice before a program has a chance
    to process them; then there will be four events in the Event Queue as shown below:


    ![](img/8a661fca3884547aede940b9a6567321_201_0.png)


    The application can then obtain an iterable from the event queue and process through
    the events in turn. While the program is processing these events further events
    may occur and will be added to the Event Queue. When the program has finished
    processing the initial collection of events it can obtain the next set of events
    to process.


    One significant advantage of this approach is that no events are ever lost; that
    is if the user clicks the mouse twice while the program is processing a previous
    set of events; they will be recorded and added to the event queue. Another advantage'
  - "[PAGE 202]\n\nis that the events will be presented to the program in the order\
    \ that they occurred.\n\nThe pygame.event.get() function will read all the events\
    \ currently on the Event Queue (removing them from the event queue). The method\
    \ returns an Event List which is an iterable list of the events read. Each event\
    \ can then be processed in turn. For example:\n\n```\nfor event in pygame.event.get():\n\
    \    if event.type == pygame.QUIT:\n        print('Received Quit Event:')\n  \
    \  elif event.type == pygame.MOUSEBUTTONDOWN:\n        print('Received Mouse Event')\n\
    \    elif event.type == pygame.KEYDOWN:\n        print('Received KeyDown Event')\n\
    ```\n\nIn the above code snippet an EventList is obtained from the Event Queue\
