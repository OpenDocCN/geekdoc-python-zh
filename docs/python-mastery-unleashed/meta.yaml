  md: '# Python Turtle Graphics


    # Introduction


    Python is very well supported in terms of graphics libraries. One of the most
    widely used graphics libraries is the Turtle Graphics library introduced in this
    chapter. This is partly because it is straight forward to use and partly because
    it is provided by default with the Python environment (and this you do not need
    to install any additional libraries to use it).


    The chapter concludes by briefly considering a number of other graphic libraries
    including PyOpen GL. The PyOpenGL library can be used to create sophisticated
    3D scenes.


    # The Turtle Graphics Library


    # The Turtle Module


    This provides a library of features that allow what are known as vector graphics
    to be created. Vector graphics refers to the lines (or vectors) that can be drawn
    on the screen. The'
  merge: -1
  pgno: 30
- img_proc: true
  md: 'drawing area is often referred to as a drawing plane or drawing board and has
    the idea of x, y coordinates.


    The Turtle Graphics library is intended just as a basic drawing tool; other libraries
    can be used for drawing two and three dimensional graphs (such as MatPlotLib)
    but those tend to focus on specific types of graphical displays.


    The idea behind the Turtle module (and its name) derives from the Logo programming
    language from the 60s and 70s that was designed to introduce programming to children.
    It had an on screen turtle that could be controlled by commands such as forward
    (which would move the turtle forward), right (which would turn the turtle by a
    certain number of degrees), left (which turns the turtle left by a certain number
    of degrees) etc. This idea has continued into the current Python Turtle Graphics
    library where commands such as turtle.forward(10) moves the turtle (or cursor
    as it is now) forward 10 pixels etc. By combining together these apparently simple
    commands, it is possible to create intricate and quiet complex shapes.


    # Basic Turtle Graphics


    Although the turtle module is built into Python 3 it is necessary to import the
    module before you use it:'
