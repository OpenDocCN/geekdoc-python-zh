- img_proc: true
  md: "part of a batch application with plots being stored as PNG, SVG, PDF or other\
    \ images etc.\n\nTo support all of these use cases, Matplotlib can target different\
    \ outputs, and each of these capabilities is called a back end; the “frontend”\
    \ is the developer facing code. The Back end Layer maintains all the different\
    \ back ends and the programmer can either use the default back end or select a\
    \ different back end as required.\n\nThe back end to be used can be set via the\
    \ matplotlib.use() function. For example, to set the back end to render Postscript\
    \ use: matplotlib.use(‘PS’) this is illustrated below:\n\n```\nimport matplotlib\n\
    \nif 'matplotlib.backends' not in sys.modules:\n    matplotlib.use('PS')\n\nimport\
    \ matplotlib.pyplot as pyplot\n```\n\nIt should be noted that if you use the matplotlib.use()\
    \ function, this must be done before importing matplotlib.pyplot. Calling matplotlib.use\
