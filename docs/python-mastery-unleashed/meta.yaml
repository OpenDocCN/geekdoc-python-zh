  md: '# Graphs


    A three dimensional graph is used to plot the relationships between three sets
    of values(instead of the two used in the examples presented so far in this chapter).
    In a three dimensional graph as well as the x and y axis there is also a z axis.


    The following program creates a simple 3D graph using two sets of values generated
    using the numpy range function. These are then converted into a coordinate matrices
    using the numpy meshgrid() function. The z axis values are created using the numpy
    sin() function. The 3D graph surface is plotted using the plot_surface() function
    of the futures axes object. This takes the x, y and z coordinates. The function
    is also given a color map to use when rendering the surface (in this case the
    Matplotlib cool to warm color map is used).


    ```

    import matplotlib.pyplot as pyplot

    # Import matplotlib colour map

    from matplotlib import cm as colourmap

    # Required for £D Projections

    from mpl_toolkits.mplot3d import Axes3D

    # Provide access to numpy functions

    import numpy as np

    # Make the data to be displayed x_values = np.arange(-6, 6, 0.3)

    y_values = np.arange(-6, 6, 0.3)

    # Generate coordinate matrices from coordinate vectors

    ```'
