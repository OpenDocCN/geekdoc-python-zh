    # Event Signaling


    Although the point of using multiple Threads or Processes is to execute separate
    operations concurrently, there are times when it is important to be able to allow
    two or more Threads or Processes to cooperate on the timing of their behavior.
    The Barrier object presented above is a relatively high-level way to do this;
    however, in some cases finer grained control is required. The threading.Event
    or multiprocessing.Event classes can be used for this purpose.


    An Event manages an internal flag that callers can either set()or clear(). Other
    threads can wait() for the flag to be set(), effectively blocking their own progress
    until allowed to continue by the Event. The internal flag is initially set to
    False which ensures that if a task gets to the Event before it is set then it
    must wait.


    You can in fact invoke wait with an optional timeout. If you do not include the
    optional timeout then wait() will wait forever while wait(timeout) will wait up
    to the timeout given in seconds. If the time out is reached,then the wait method
    returns False; otherwise wait returns True.'
