  md: 'superseded by subsequent data. For example, data published by a Stock Market
    Price data feed would fall into this category. When an Observable wraps around
    this data feed it can publish that data whether or not an Observer is subscribed.


    # Implications of Hot and Cold Observables


    It is important to know whether you have a hot or cold Observable because this
    can impact on what you can assume about the data supplied to the Observers and
    thus how you need to design your application.If it is important that no data is
    lost then care is needed to ensure that the subscribers are in place before a
    Hot Observable starts to publish data (where as this is not a concern for a cold
    Observable).


