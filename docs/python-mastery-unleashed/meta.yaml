    - done() returns True if the task has completed, raised an exception or was canceled.

    - result() returns the result of the Task if it is done. If the Tasks result is
    not yet available, then the method raises the InvalidState Error exception.

    - exception() return an exception if one was raised by the Task. If the task was
    canceled then raises the Cancelled Error exception. If the task is not yet done,
    then raises an InvalidStateError exception.


    It is also possible to add a callback function to invoke once the task has completed
    (or to remove such a function if it has been added):


    +   - add_done_callback(callback) Add a callback to be run when the Task is done.

    - remove_done_callback(callback) Remove callback from the call- backs list.


    Note that the method is called ‘add’ rather than ‘set’ implying that there can
    be multiple functions called when the task has completed (if required).


    The following example illustrates some of the above:'
