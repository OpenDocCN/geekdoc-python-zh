    time. Of course, this introduces issues associated with resource allocation, etc.
    but no more so than in any concurrent system.


    One implication of the concurrent object model is that objects are larger than
    in the traditional single execution thread approach, because of the overhead of
    having each object as a separate thread of execution. Overheads such as the need
    for a scheduler to handling these execution threads and resource allocation mechanisms
    means that it is not feasible to have integers, characters, etc. as separate processes.'
