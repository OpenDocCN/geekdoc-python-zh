  mdcn: "## Async 和 Await 关键字\n\n`async` 关键字在 Python 3.7 中引入，用于标记一个函数为使用 `await` 关键字的函数（我们稍后会回到这一点，因为\
    \ `async` 关键字还有另一个用途）。使用 `await` 关键字的函数可以作为单独的任务运行，并且当它对另一个异步函数调用 `await` 并必须等待该函数完成时，可以放弃对处理器的控制。然后，被调用的异步函数可以作为单独的任务运行，依此类推。\n\
    \n要调用一个异步函数，需要启动 Async IO 事件循环，并让该函数被事件循环视为一个任务。这是通过调用 `asyncio.run()` 方法并传入根异步函数来实现的。\n\
    \n`asyncio.run()` 函数在 Python 3.7 中引入（较旧版本的 Python，如 Python 3.6，需要你显式获取事件循环的引用并通过该循环运行根异步函数）。关于此函数需要注意的一点是，它在\
    \ Python 3.7 中被标记为临时性的。这意味着未来版本的 Python 可能支持也可能不支持该函数，或者可能以某种方式修改该函数。因此，你应该检查你所使用的\
    \ Python 版本的文档，以查看 `run` 方法是否已被更改。\n\n## 使用 Async 和 Await\n\n我们将从上到下研究一个非常简单的\
    \ Async IO 程序。该程序的 `main()` 函数如下所示：\n\n```python\ndef main():\n    print('Main\
    \ - Starting')\n    asyncio.run(do_something())\n    print('Main - Done')\n\n\
    if __name__ == '__main__':\n    main()\n```\n\n`main()` 函数是程序的入口点，它调用：\n\n```python\n\
    asyncio.run(do_something())\n```\n\n这将启动 Async IO 事件循环运行，并导致 `do_something()`\
    \ 函数被包装在一个由循环管理的 Task 中。请注意，在 Async IO 中你不会显式创建 Task；它们总是由某个函数创建的，但了解 Task 是有用的，因为你可以与它们交互以检查其状态或检索结果。\n\
    \n`do_something()` 函数用关键字 `async` 标记：\n\n```python\nasync def do_something():\n\
    \    print('do_something - will wait for worker')\n    result = await worker()\n\
    \    print('do_something - result:', result)\n```\n\n如前所述，这表明它可以作为单独的 Task 运行，并且可以使用关键字\
    \ `await` 来等待其他函数或行为完成。在这种情况下，`do_something()` 异步函数必须等待 `worker()` 函数完成。\n\n`await`\
    \ 关键字的作用不仅仅是表明 `do_something()` 函数必须等待 worker 完成。它触发创建另一个将执行 `worker()` 函数的 Task，并释放处理器，允许事件循环选择下一个要执行的任务（该任务可能是也可能不是运行\
    \ `worker()` 函数的任务）。`do_something` 任务的状态现在是等待中，而 `worker()` 任务的状态是就绪（准备运行）。\n\n\
    worker 任务的代码如下所示：\n\n```python\nasync def worker():\n    print('worker - will\
    \ take some time')\n    time.sleep(3)\n    print('worker - Done it')\n    return\
    \ 42\n```\n\n`async` 关键字再次表明此函数可以作为单独的任务运行。然而，这次函数体没有使用 `await` 关键字。这是因为这是一个称为\
    \ Async IO 协程函数的特殊情况。这是一个从 Task 返回值的函数（它与标准 Python 协程的概念相关，后者是一个数据消费者）。\n\n遗憾的是，计算机科学中有很多例子，同一个术语被用于不同的事物，也有不同的术语被用于同一个事物的例子。在这种情况下，为了避免混淆，只需记住\
    \ Async IO 协程是用 `async` 标记的函数，可以作为单独的任务运行，并且可能调用 `await`。\n\n程序的完整清单如下所示：\n\n\
    ```python\nimport asyncio\nimport time\n\nasync def worker():\n    print('worker\
    \ - will take some time')\n    time.sleep(3)\n    print('worker - done it')\n\
    \    return 42\n\nasync def do_something():\n    print('do_something - will wait\
    \ for worker')\n    result = await worker()\n    print('do_something - result:',\
    \ result)\n\ndef main():\n    print('Main - Starting')\n    asyncio.run(do_something())\n\
    \    print('Main - Done')\n\nif __name__ == '__main__':\n    main()\n```\n\n当执行此程序时，输出为：\n\
    \n*Main - Starting*\n*do_something - will wait for worker*\n*worker - will take\
    \ some time*\n*worker - done it*\n*do_something - result: 42*\n*Main - Done*\n\
    \n运行时，在两次 worker 打印之间有一个暂停，因为它在休眠。虽然这里不完全明显，但 `do_something()` 函数作为一个任务运行，该任务在遇到\
    \ `worker()` 函数时等待，而 `worker()` 函数作为另一个 Task 运行。一旦 worker 任务完成，`do_something`\
    \ 任务就可以继续并完成其操作。一旦发生这种情况，Async IO 事件循环就可以终止，因为没有更多可用的任务了。\n\n## AsyncIO 任务\n\n\
    任务用于并发执行用 `async` 关键字标记的函数。任务从不直接创建，而是通过关键字 `await` 或通过上述的 `asyncio.run()` 等函数，以及\
    \ `asyncio.create_task()`、`asyncio.gather()` 和 `asyncio.as_completed()` 隐式创建。这些额外的任务创建函数描述如下：\n\
    \n- `asyncio.create_task()` 此函数接受一个用 `async` 标记的函数，将其包装在一个 Task 中，并安排由 Async IO\
    \ 事件循环执行。此函数在 Python 3.7 中添加。\n- `asyncio.gather(*aws)` 此函数将所有传递给它的异步函数作为单独的 Task\
    \ 运行。它将每个单独任务的结果收集在一起，并以列表形式返回。结果的顺序对应于 `aws` 列表中异步函数的顺序。\n- `asyncio.as_completed(aws)`\
    \ 运行传递给它的每个异步函数。\n\nTask 对象支持几个有用的方法：\n\n- `cancel()` 取消正在运行的任务。调用此方法将导致 Task\
    \ 抛出 `CancelledError` 异常。\n- `cancelled()` 如果 Task 已被取消，则返回 `True`。\n- `done()`\
    \ 如果任务已完成、引发异常或被取消，则返回 `True`。\n- `result()` 如果任务已完成，则返回 Task 的结果。如果 Task 的结果尚不可用，则该方法引发\
    \ `InvalidStateError` 异常。\n- `exception()` 如果 Task 引发了异常，则返回该异常。如果任务被取消，则引发 `CancelledError`\
    \ 异常。如果任务尚未完成，则引发 `InvalidStateError` 异常。\n\n还可以添加一个回调函数，以便在任务完成时调用（或者如果已添加，则移除该函数）：\n\
    \n- `add_done_callback(callback)` 添加一个回调，以便在 Task 完成时运行。\n- `remove_done_callback(callback)`\
    \ 从回调列表中移除回调。\n\n请注意，该方法名为 `add` 而不是 `set`，这意味着当任务完成时可以调用多个函数（如果需要）。\n\n以下示例说明了上述一些内容：\n\
    \n```python\nimport asyncio\n\nasync def worker():\n    print('worker - will take\
    \ some time')\n    await asyncio.sleep(1)\n    print('worker - Done it')\n   \
    \ return 42\n\ndef print_it(task):\n    print('print_it result:', task.result())\n\
    \nasync def do_something():\n    print('do_something - create task for worker')\n\
    \    task = asyncio.create_task(worker())\n    print('do_something - add a callback')\n\
    \    task.add_done_callback(print_it)\n    await task\n    # Information on task\n\
    \    print('do_something - task.cancelled():', task.cancelled())\n    print('do_something\
    \ - task.done():', task.done())\n    print('do_something - task.result():', task.result())\n\
    \    print('do_something - task.exception():', task.exception())\n    print('do_something\
    \ - finished')\n\ndef main():\n    print('Main - Starting')\n    asyncio.run(do_something())\n\
    \    print('Main - Done')\n\nif __name__ == '__main__':\n    main()\n```\n\n在此示例中，`worker()`\
    \ 函数被包装在一个任务对象中，该对象由 `asyncio.create_task(worker())` 调用返回。\n\n一个函数（`print_it()`）使用\
    \ `asyncio.create_task(worker())` 函数注册为任务上的回调。请注意"
