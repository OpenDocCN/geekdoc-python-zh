- md: "## Closing Streams\n\nAll opened streams must be closed. However, you can close\
    \ the top level stream and this will automatically close lower level streams,\
    \ for example:\n\n```python\nf = io.FileIO('data.txt')\nbr = io.BufferedReader(f)\n\
    text_stream = io.TextIOWrapper(br, 'utf-8')\nprint(text_stream.read())\ntext_stream.close()\n\
    ```\n\n## Returning to the open() Function\n\nIf streams are so good then why\
    \ don’t you use them all the time? Well actually in Python 3 you do! The core\
    \ open function (and indeed the io.open() function) both return a stream object.\
    \ The actual type of object returned depends on the file mode specified, whether\
    \ buffering is being used etc. For example:\n\n```python\nimport io\n# Text stream\n\
    f1 = open('myfile.txt', mode='r', encoding='utf-8')\nprint(f1)\n# Binary IO aka\
    \ Buffered IO\nf2 = open('myfile.dat', mode='rb')\nprint(f2)\nf3 = open('myfile.dat',\
    \ mode='wb')\nprint(f3)\n# Raw IO aka Unbuffered IO\nf4 = open('starship.png',\
    \ mode='rb', buffering=0)\nprint(f4)\n```\n\nWhen this short example is run the\
    \ output is:\n\n```\n<__io.TextIOWrapper name='myfile.txt' mode='r' encoding='utf-8'>\n\
    <__io.BufferedReader name='myfile.dat'>\n<__io.BufferedWriter name='myfile.dat'>\n\
    <__io.FileIO name='starship.png' mode='rb' closefd=True>\n```\n\nAs you can see\
    \ from the output, four different types of object have been returned from the\
    \ open() function. The first is a TextIOWrapper, the second a BufferedReader,\
    \ the third a BufferedWriter and the final one is a FileIO object. This reflects\
    \ the differences in the parameters passed into the open() function. For example,\
    \ f1 references a io.TextIOWrapper because it must encode (convert) the input\
    \ text into Unicode using the UTF-8 encoding scheme. While f2 holds a io.BufferedReader\
    \ because the mode indicates that we want to read binary data while f3 holds a\
    \ io.BufferedWriter because the mode used indicates we want to write binary data.\
    \ The final call to open returns a FileIO because we have indicated that we do\
    \ not want to buffer the data and thus we can use the lowest level of stream object.\n\
    \nIn general the following rules are applied to determine the type of object returned\
    \ based on the modes and encoding specified:\n\n| Class | mode | Buffering |\n\
    |---|---|---|\n| FileIO | binary | no |\n| BufferedReader | 'rb' | yes |\n| BufferedWriter\
    \ | 'wb' | yes |\n| BufferedRandom | 'rb+' 'wb+' 'ab+' | yes |\n| TextIOWrapper\
    \ | Any text | yes |\n\nNote that not all mode combinations make sense and thus\
    \ some combinations will generate an error.\n\nIn general you don’t therefore\
    \ need to worry about which stream you are using or what that stream does; not\
    \ least because all the streams extend the IOBase class and thus have a common\
    \ set of methods and attributes.\n\nHowever, it is useful to understand the implications\
    \ of what you are doing so that you can make better informed choices. For example,\
    \ binary streams (that do less processing) are faster than Unicode oriented streams\
    \ that must convert from ASCII into Unicode.\n\nAlso understanding the role of\
    \ streams in Input and Output can also allow you to change the source and destination\
    \ of data without needing to rewrite the whole of your application. You can thus\
    \ use a file or stdin for testing and a socket for reading data in production.\n\
    \n## Try\n\nUse the underlying streams model to create an application that will\
    \ write binary data to a file. You can use the ‘b’ prefix to create a binary literal\
    \ to be written, for example b'Hello World'.\n\nNext create another application\
    \ to reload the binary data from the file and print it out.\n\n## Working with\
    \ CSV Files\n\n### Introduction\n\nThis chapter introduces a module that supports\
    \ the generation of CSV (or Comma Separated Values) files.\n\n### CSV Files\n\n\
    The CSV (Comma Separated Values) format is the most common import and export format\
    \ for spreadsheets and databases. However, CSV is not a precise standard with\
    \ multiple different applications having different conventions and specific standards.\n\
    \nThe Python csv module implements classes to read and write tabular data in CSV\
    \ format. As part of this it supports the concept of a dialect which is a CSV\
    \ format used by a specific application or suite of programs, for example, it\
