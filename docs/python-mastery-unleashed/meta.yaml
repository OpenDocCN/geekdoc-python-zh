    # Parallelism


    A distinction its often made in Computer Science between concurrency and parallelism.
    In concurrency, separate independent tasks are performed potentially at the same
    time. In parallelism, a large complex task is broken down into a set of sub tasks.
    The sub tasks represent part of the overall problem.Each sub task can be executed
    at the same time. Typically it is necessary to combine the results of the sub
    tasks together to generate an overall result.These sub tasks are also very similar
    if not functionally exactly the same (although in general each sub task invocation
    will have been supplied with different data).'
  merge: -1
  pgno: 521
- img_proc: true
  md: 'Thus parallelism is when multiple copies of the same functionality are run
    at the same time, but on different data. Some examples of where parallelism can
    be applied include:


    +   - A web search engine. Such a system may look at many, many web pages. Each
    time it does so it must send a request to the appropriate web site, receive the
    result and process the data obtained. These steps are the same whether it is the
    BBC web site, Microsoft’s web site or the web site of Cambridge University. Thus
    the requests can be run sequentially or in parallel.

    - Image Processing. A large image maybe broken down into slices so that each slice
    can be analyzed in parallel.


    The following diagram illustrates the basic idea behind parallelism; a main program
    fires off three sub tasks each of which runs in parallel. The main program then
    waits for all the sub tasks to complete before combining together the results
    from the sub tasks before it can continue.'
  merge: -1
  pgno: 522
