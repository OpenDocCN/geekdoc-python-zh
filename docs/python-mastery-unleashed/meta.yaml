    # Synchronizing Concurrent Code


    It is not uncommon to need to ensure that critical regions of code are protected
    from concurrent execution by multiple Threads or Processes. These blocks of code
    typically involve the modification of, or access to, shared data. It is therefore
    necessary to ensure that only one Thread or Process is updating a shared object
    at a time and that consumer threads or processes are blocked while this update
    is occurring.


    This situation is most common where one or more Threads or Processes are the producers
    of data and one or more other Threads or Processes are the consumers of that data.
    This is illustrated in the following diagram.


    ![](img/8a661fca3884547aede940b9a6567321_587_0.png)'
  merge: -1
  pgno: 587
- img_proc: true
  md: 'In this diagram the Producer is running in its own Thread (although it could
    also run in a separate Process) and places data onto some common shared data container.
    Subsequently a number of independent Consumers can consume that data when it is
    available and when they are free to process the data. However, there is no point
    in the consumers repeatedly checking the container for data as that would be a
    waste of resources (for example in terms of executing code on a processor and
    of context switching between multiple Threads or Processes).


    We therefore need some form of notification or synchronization between the Producer
    and the Consumer to manage this situation.


    Python provides several classes in the threading (and also in the multi- processing)
    library that can be used to manage critical code blocks. These classes include
    Lock, Condition and Semaphore.


    # Python Locks


    The Lock class defined (both in the threading and the multiprocessing libraries)
    provides a mechanism for synchronizing access to a block of code. The Lock object
    can be in one of two states locked and unlocked (with the initial state being
    unlocked). The Lock grants access to a single'
  merge: -1
  pgno: 588
- img_proc: true
  md: 'thread at a time; other threads must wait for the Lock to become free before
    progressing.


    The Lock class provides two basic methods for acquiring the lock (acquire()) and
    releasing (release()) the lock.


    +   - When the state of the Lock object is unlocked, then acquire() changes the
    state to locked and returns immediately.

    - When the state is locked, acquire() blocks until a call to release() in another
    thread changes it to unlocked, then the acquire() call resets it to locked and
    returns.

    - The release() method should only be called in the locked state; it changes the
    state to unlocked and returns immediately. If an attempt is made to release an
    unlocked lock, a Runtime Error will be raised.


    An example of using a Lock object is shown below:


