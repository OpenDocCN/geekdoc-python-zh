  md: 'is certainly feasible as the examples show, but it does require a code change
    if you wish to alter the logging level for any particular logger, or to change
    where a particular handler is routing the log messages.


    For most production systems a better solution is to use an external configuration
    file which is loaded when the application is run and is used to dynamically configure
    the logging framework. This allows system administrators and others to change
    the log level, the log destination, the log format etc. without needing to change
    the code.


    The logging configuration file can be written using several standard formats from
    JSON (the Java Script ObjectNotation), to YAML (Yet Another Markup Language) format,
    or as a set of key-value pairs in a conf file. For further information on the
    different options available see the Python logging module documentation.


    In this book we will briefly explore the YAML file format used to configure loggers.


    ```

    version: 1 formatters:

    myformatter:

    format: ''%(asctime)s [%(levelname)s] %(name)s.%(funcName)s: %(message)s''

    handlers:

    console:

    ```'
