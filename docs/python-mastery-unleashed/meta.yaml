  md: '# Futures


    # Introduction


    A future is a thread (or process) that promises to return a value in the future;
    once the associated behavior has completed. It is thus a future value. It provides
    a very simple way of firing off behavior that will either be time consuming to
    execute or which may be delayed due to expensive operations such as Input/Output
    and which could slow down the execution of other elements of a program. This chapter
    discusses futures in Python.


    # The Need for a Future


    In a normal method or function invocation, the method or function is executed
    in line with the invoking code (the caller) having to wait until the function
    or method (the caller) returns. Only after this is the caller able to continue
    to the next line of code and execute that. In many (most) situations this is exactly
    what you want as the next line of code may depend on a result returned from the
    previous line of code etc.'
  merge: -1
  pgno: 602
- img_proc: true
  md: 'However, in some situations the next line of code is independent of the previous
    line of code. For example, let us assume that we are populating a User Interface
    (UI). The first line of code may read the name of the user from some external
    data source (such as a database)and then display it within a field in the UI.
    The next line of code may then add today’s data to another field in the UI. These
    two lines of code are independent of each other and could be run concurrently/in
    parallel with each other.


    In this situation we could use either a Thread or a Process to run the two lines
    of code independently of the caller, thus achieving a level of concurrency and
    allowing the caller to carry onto the third line of code etc. However, neither
    the Thread or the Process by default provide a simple mechanism for obtaining
    a result from such an independent operation. This may not be a problem as operations
    may be self-contained; for example they may obtain data from the database or from
    today’s date and then updated a UI. However, in many situations the calculation
    will return a result which needs to be handled by the original invoking code (the
    caller).This could involve performing a long running calculation and then using
    the result returned to generate another value or update another object etc.


    A Future is an abstraction that simplifies the definition and execution of such
    concurrent tasks. Futures are available in'
  merge: -1
  pgno: 603
- img_proc: true
  md: 'many different languages including Python but also Java, Scala, C++ etc. When
    using a Future; a callable object(such as a function) is passed to the Future
    which executes the behavior either as a separate Thread or as a separate Process
    and then can return a result once it is generated. The result can either be handled
    by a call back function(that is invoked when the result is available) or by using
    a operation that will wait for a result to be provided.


    # Futures in Python


    The concurrent.futures library was introduced into Python in version 3.2 (and
    is also available in Python2.5 on wards). The concurrent.futures library provides
    the Future class and a high level API for working with Futures. The concurrent.futures.Future
    class encapsulates the asynchronous execution of a callable object (e.g. a function
    or method). The Future class provides a range of methods that can be used to obtain
    information about the state of the future,retrieve results or cancel the future:


    +   - cancel() Attempt to cancel the Future. If the Future is currently being
    executed and cannot be canceled then the method will return False, otherwise the
    call will be canceled and the method will return True.

    - canceled() Returns True if the Future was successfully canceled.'
  merge: -1
  pgno: 604
- img_proc: true
  md: '+   - running() Returns True if the Future is currently being executed and
    cannot be canceled.

    - done() Returns True if the Future was successfully canceled or finished running.

    - result(timeout=None) Return the value returned by the Future. If the Future
    hasn''t yet completed then this method will wait up to timeout seconds. If the
    call hasn''t completed in timeout seconds, then a Timeout Error will be raised.
    timeout can be an int or float. If timeout is not specified or None, there is
    no limit to the wait time. If the future is canceled before completing then the
    Canceled Error will be raised. If the call raised, this method will raise the
    same exception.


    It should be noted however, that Future instances should not be created directly,
    rather they should be created via the submit method of an appropriate executor.


    # Future Creation


    Futures are created and executed by Executors. An Executor provides two methods
    that can be used to execute a Future (or Futures) and one to shut down the executor.


    At the root of the executor class hierarchy is the concurrent.futures. Executor
    abstract class. It has two sub classes:'
