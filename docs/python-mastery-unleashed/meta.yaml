    in the traditional single execution thread approach, because of the overhead of
    having each object as a separate thread of execution. Overheads such as the need
    for a scheduler to handling these execution threads and resource allocation mechanisms
    means that it is not feasible to have integers, characters, etc. as separate processes.


    ## Threads V Processes


    As part of this discussion it is useful to understand what is meant by a process.
    A process is an instance of a computer program that is being executed by the operating
    system. Any process has three key elements; the program being executed, the data
    used by that program (such as the variables used by the program) and the state
    of the process (also known as the execution context of the program).


    A (Python) Thread is a preemptive lightweight process.

    A Thread is considered to be preemptive because every thread has a chance to run
    as the main thread at some point. When a thread gets to execute then it will execute
    until


    - completion,

    - until it is waiting for some form of I/O (Input/Output),

    - sleeps for a period of time,

    - it has run for 15 ms (the current threshold in Python 3).


    If the thread has not completed when one of the above situations occurs, then
    it will give up being the executing thread and another thread will be run instead.
    This means that one thread can be interrupted in the middle of performing a series
    of related steps.


    A thread is considered a lightweight process because it does not possess its own
    address space and it is not treated as a separate entity by the host operating
    system. Instead, it exists within a single machine process using the same address
    space.


    It is useful to get a clear idea of the difference between a thread (running within
    a single machine process) and a multi process system that uses separate processes
    on the underlying hardware.


    ## Some Terminology


    The world of concurrent programming is full of terminology that you may not be
    familiar with. Some of those terms and concepts are outlined below:


    - Asynchronous versus Synchronous invocations. Most of the method, function or
    procedure invocations you will have seen in programming represent synchronous
    invocations. A synchronous method or function call is one which blocks the calling
    code from executing until it returns. Such calls are typically within a single
    thread of execution. Asynchronous calls are ones where the flow of control immediately
    returns to the caller and the caller is able to execute in its own thread of execution.
    Allowing both the caller and the call to continue processing.


    - Non-Blocking versus Blocking code. Blocking code is a term used to describe
    the code running in one thread of execution, waiting for some activity to complete
    which causes one of more separate threads of execution to also be delayed. For
    example, if one thread is the producer of some data and other threads are the
    consumers of that data, then the consumer threads cannot continue until the producer
    generates the data for them to consume. In contrast, non-blocking means that no
    thread is able to indefinitely delay others.


    - Concurrent versus Parallel code. Concurrent code and parallel code are similar,
    but different in one significant aspect. Concurrency indicates that two or more
    activities are both making progress even though they might not be executing at
    the same point in time. This is typically achieved by continuously swapping competing
    processes between execution and non-execution. This process is repeated until
    at least one of the threads of execution (Threads) has completed their task. This
    may occur because two threads are sharing the same physical processor with each
    is being given a short time period in which to progress before the other gets
    a short time period to progress. The two threads are said to be sharing the processing
    time using a technique known as time slicing. Parallelism on the other hand implies
    that there are multiple processors available allowing each thread to execute on
    their own processor simultaneously.


    ## Online Resources


