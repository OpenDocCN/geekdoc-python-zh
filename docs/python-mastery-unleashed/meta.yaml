    ## Python DB-API


    ## Accessing a Database from Python


    The standard for accessing a database in Python is the Python DB-API. This specifies
    a set of standard interfaces for modules that wish to allow Python to access a
    specific database. The standard is described in PEP 249 ([https://www.python.org/dev/peps/pep-0249](https://www.python.org/dev/peps/pep-0249))—a
    PEP is a Python Enhancement Proposal.


    Almost all Python database access modules adhere to this standard. This means
    that if you are moving from one database to another, or attempting to port a Python
    program from one database to another, then the APIs you encounter should be very
    similar (although the SQL processed by different database can also differ). There
    are modules available for most common databases such as MySQL, Oracle, Microsoft
    SQL Server etc.


    ## The DB-API


    There are several key elements to the DB-API these are:


    - The connect function. The connect() function that is used to connect to a database
    and returns a Connection Object.

    - Connection Objects. Within the DB-API access to a database is achieved through
    connection objects. These connection objects provide access to cursor objects.

    - Cursor objects are used to execute SQL statements on the database.

    - The result of an execution. These are the results that can be fetched as a sequence
    of sequences (such a tuple of tuples). The standard can thus be used to select,
    insert or update information in the database.


