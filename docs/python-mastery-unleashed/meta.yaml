    \ 类\n\n在许多情况下，CSV文件的第一行包含一组名称（或键），用于定义CSV文件其余部分中的字段。也就是说，第一行为列以及CSV文件其余部分中保存的数据赋予了含义。因此，捕获这些信息，并根据第一行中的键来结构化写入CSV文件或从CSV文件加载的数据，是非常有用的。\n\
    \n`csv.DictWriter` 返回一个对象，该对象可用于基于此类命名列的使用，将值写入CSV文件。与 `DictWriter` 一起使用的文件在类实例化时提供。\n\
    \n```python\nimport csv\nwith open('names.csv', 'w', newline='') as csvfile:\n\
    \    fieldnames = ['first_name', 'last_name', 'result']\n    writer = csv.DictWriter(csvfile,\
    \ fieldnames=fieldnames)\n    writer.writeheader()\n    writer.writerow({'first_name':\
    \ 'John',\n                     'last_name': 'Smith',\n                     'result':\
    \ 54})\n    writer.writerow({'first_name': 'Jane',\n                     'last_name':\
    \ 'Lewis',\n                     'result': 63})\n    writer.writerow({'first_name':\
    \ 'Chris',\n                     'last_name': 'Davies',\n                    \
    \ 'result': 72})\n```\n\n请注意，创建 `DictWriter` 时，必须提供一个键列表，这些键用于CSV文件中的列。\n\n然后使用\
    \ `writeheader()` 方法将标题行写入CSV文件。\n\n`writerow()` 方法接受一个字典对象，该对象的键基于为 `DictWriter`\
    \ 定义的键。然后使用这些键将数据写入CSV（请注意，字典中键的顺序并不重要）。\n\n在上面的示例代码中，其结果是创建了一个名为 `names.csv`\
    \ 的新文件，该文件可以在Excel中打开：\n\n当然，由于这是一个CSV文件，它也可以在纯文本编辑器中打开。\n\n![](img/8a661fca3884547aede940b9a6567321_387_0.png)\n\
    \n## CSV DictReader 类\n\n除了 `csv.DictWriter`，还有一个 `csv.DictReader`。与 `DictReader`\
    \ 一起使用的文件在类实例化时提供。与 `DictWriter` 类似，`DictReader` 类接受一个键列表，用于定义CSV文件中的列。如果提供了用于第一行的标题，这是可选的（如果没有提供一组键，则CSV文件第一行中的值将用作字段名）。\n\
    \n`DictReader` 类提供了几个有用的功能，包括 `fieldnames` 属性，该属性包含由文件第一行定义的CSV文件的键/标题列表。\n\n\
    `DictReader` 类还实现了迭代协议，因此可以在 `for` 循环中使用，其中每一行（第一行之后）依次作为字典返回。表示每一行的字典对象随后可用于基于第一行中定义的键访问每个列值。\n\
    \n下面是一个针对前面创建的CSV文件的示例：\n\n```python\nimport csv\nprint('Starting to read dict\
    \ CSV example')\nwith open('names.csv', newline='') as csvfile:\n    reader =\
    \ csv.DictReader(csvfile)\n    for heading in reader.fieldnames:\n        print(heading,\
    \ end=' ')\n    print('\\n-----------------------------------')\n    for row in\
    \ reader:\n        print(row['first_name'], row['last_name'],\n              row['result'])\n\
    print('Done')\n```\n\n这将生成以下输出：\n\n```\nStarting to read dict CSV example first_name\
    \ last_name result\n-----------------------------------\nJohn Smith 54\nJane Lewis\
    \ 63\nChris Davies 72\nDone\n```\n\n## 尝试\n\n在本练习中，你将基于存储在活期账户中的一组交易来创建一个CSV文件。\n\
    \n1.  为此，首先定义一个新的 `Account` 类来表示一种银行账户类型。\n2.  当类实例化时，你应该提供账号、账户持有人姓名、开户余额和账户类型（可以是表示“活期”、“定期”或“投资”等的字符串）。这意味着必须有一个\
    \ `__init__` 方法，并且你需要将数据存储在对象中。\n3.  为 `Account` 提供三个实例方法：`deposit(amount)`、`withdraw(amount)`\
    \ 和 `get_balance()`。这些方法的行为应如预期，`deposit` 将增加余额，`withdraw` 将减少余额，`get_balance()`\
    \ 返回当前余额。\n\n你的 `Account` 类还应保留其参与的交易历史记录。\n\n交易是存款或取款以及金额的记录。请注意，账户中的初始金额可以视为初始存款。\n\
    \n历史记录可以实现为一个列表，包含按顺序排列的交易序列。交易本身可以由一个类定义，该类包含一个操作（存款或取款）和一个金额。每次进行取款或存款时，都应将新的交易记录添加到交易历史列表中。接下来，提供一个函数（可以命名为类似\
    \ `write_account_transactions_to_csv()` 的名称），该函数可以接受一个账户，然后将其持有的每笔交易写入CSV文件，每笔交易的类型和金额用逗号分隔。\n\
    \n以下示例应用程序说明了如何使用此函数：\n\n![](img/8a661fca3884547aede940b9a6567321_390_0.png)\n\
    \n## 处理 Excel 文件\n\n### 简介\n\n本章介绍 `openpyxl` 模块，该模块可用于处理Excel文件。Excel是Microsoft开发的一款软件应用程序，允许用户处理电子表格。它是一个非常广泛使用的工具，使用Excel文件格式的文件在许多组织中很常见。它实际上是电子表格的行业标准，因此是开发者工具箱中一个非常有用的工具。\n\
    \n### Excel 文件\n\n尽管CSV文件是处理数据的一种便捷且简单的方式；但直接读取或写入Excel文件的需求非常普遍。为此，Python中有几个可用的库。一个广泛使用的库是OpenPyXL库。该库最初是为了支持访问Excel\
    \ 2010文件而编写的。它是一个开源项目，并且文档齐全。\n\nOpenPyXL库提供了以下功能：\n\n-   读取和写入Excel工作簿，\n-  \
    \ 创建/访问Excel工作表，\n-   创建Excel公式，\n-   创建图表（需要额外模块的支持）。\n\n由于OpenPyXL不是标准Python发行版的一部分，你需要使用Anaconda或pip等工具自行安装该库（例如\
    \ `pip install openpyxl`）。或者，如果你使用PyCharm，你将能够将OpenPyXL库添加到你的项目中。\n\nOpenPyXL库中的关键元素是\
    \ `Workbook` 类。可以从模块中导入它：\n\n```python\nfrom openpyxl import Workbook\n```\n\n\
    可以使用 `Workbook` 类创建一个新的（内存中的）工作簿实例（请注意，此时它纯粹是Python程序中的一个结构，必须在创建实际的Excel文件之前保存）。\n\
    \n```python\nwb = Workbook()\n```\n\n### Openpyxl 工作表对象\n\n工作簿创建时总是至少包含一个工作表。你可以使用\
    \ `Workbook.active` 属性获取当前活动的工作表：\n\n```python\nws = wb.active\n```\n\n你可以使用工作簿的\
    \ `create_sheet()` 方法创建额外的工作表：\n\n```python\nws = wb.create_sheet('Mysheet')\n\
    ```\n\n你可以使用 `title` 属性访问或更新工作表的标题：\n\n```python\nws.title = 'New Title'\n```\n\
    \n持有此标题的选项卡的背景颜色默认为白色。你可以通过向 `worksheet.sheet_properties.tabColor` 属性提供RRGGBB颜色代码来更改它，例如：\n\
    \n```python\nws.sheet_properties.tabColor = \"1072BA\"\n```\n\n### 处理单元格\n\n可以访问工作表中的单元格。单元格可以直接作为工作表上的键来访问，例如：\n\
    \n```python\nws['A1'] = 42\n```"
