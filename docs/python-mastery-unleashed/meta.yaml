    or procedure invocations you will have seen in programming represent synchronous
    invocations. A synchronous method or function call is one which blocks the calling
    code from executing until it returns. Such calls are typically within a single
    thread of execution. Asynchronous calls are ones where the flow of control immediately
    returns to the caller and the caller is'
