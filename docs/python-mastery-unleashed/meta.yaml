    ## File Attributes


    A file will have a set of attributes associated with it such as the date that
    it was created, the date it was last updated/modified, how large the file is etc.
    It will also typically have an attribute indicating who the owner of the file
    is. This may be the creator of the file; however the ownership of a file can be
    changed either from the command line or through the GUI interface. For example,
    on Linux and Mac OS X the command `chown` can be used to change the file ownership.


    It can also have other attributes which indicate who can read, write or execute
    the file. In Unix style systems (such as Linux and Mac OS X) these access rights
    can be specified for the file owner, for the group that the file is associated
    with and for all other users.


    The file owner can have rights specified for reading, writing and executing a
    file. These are usually represented by the symbols ‘r’, ‘w’ and ‘x’ respectively.
    For example the following uses the symbolic notation associated with Unix files
    and indicates that the file owner is allowed to read, write and execute a file:


    ```

    -rwx------

    ```


    Here the first dash is left blank as it is to do with special files (or directories),
    then the next set of three characters represent the permissions for the owner,
    the following set of three the permissions for all other users. As this example
    has *rwx* in the first group of three characters this indicates that the user
    can read ‘r’, write ‘w’ and execute ‘x’ the file. However the next six characters
    are all dashes indicating that the group and all other users cannot access the
    file at all. The group that a file belongs to is a group that can have any number
    of users as members. A member of the group will have the access rights as indicated
    by the group settings on the file. As for the owner of a file these can be to
    read, write or execute the file. For example, if group members are allowed to
    read and execute a file, then this would be shown using the symbolic notation
    as:


    ```

    ---r-x---

    ```


    Now this example indicates that only members of the group can read and execute
    the file; note that group members cannot write the file (they therefore cannot
    modify the file).


    If a user is not the owner of a file, nor a member of the group that the file
    is part of, then their access rights are in the ‘everyone else’ category. Again
    this category can have read, write or execute permissions. For example, using
    the symbolic notation, if all users can read the file but are not able to do anything
    else, then this would be shown as:


    ```

    -----r--

    ```


    Of course a file can mix the above permissions together, so that an owner may
    be allowed to read, write and execute a file, the group may be able to read and
    execute the file but all other users can only read the file. This would be shown
    as:


    ```

    -rwx-xr--

    ```


    In addition to the symbolic notation there is also a numeric notation that is
    used with Unix style systems. The numeric notation uses three digits to represent
    the permissions. Each of the three rightmost digits represents a different component
    of the permissions: owner, group, and others.


    Each of these digits is the sum of its component bits in the binary numeral system.
    As a result, specific bits add to the sum as it is represented by a numeral:


    - The read bit adds 4 to its total (in binary 100),

    - The write bit adds 2 to its total (in binary 010), and

    - The execute bit adds 1 to its total (in binary 001).


    The following symbolic notations can be represented by an equivalent numeric notation:


    | Symbolic notation | Numeric notation | Meaning |

    | :--- | :--- | :--- |

    | rwx------ | 0700 | Read, write, and execute only for owner |

    | -rwxrwx--- | 0770 | Read, write, and execute for owner and group |

    | -rwxrwxrwx | 0777 | Read, write, and execute for owner, group and others |


    A path is a particular combination of directories that can lead to a specific
    sub directory or file.


    This concept is important as Unix/Linux/Max OS X and Windows file systems represent
    an inverted tree of directories and files. It is thus important to be able to
    uniquely reference locations with the tree.


    For example, in the following diagram the path `/Users/jhunt/workspaces/pycharmprojects/furtherpython/chapter2`
    is highlighted:


    ![](img/8a661fca3884547aede940b9a6567321_330_0.png)


    Path: `/Users/jhunt/workspaces/pycharmprojects/furtherpython/chapter2`


    A path may be absolute or relative. An absolute path is one which provides a complete
    sequence of directories from the root of the file system to a specific sub directory
    or file.


    A relative path provides a sequence from the current working directory to a particular
    sub directory or file.


    The absolute path will work wherever a program or user is currently located within
    the directory tree. However, a relative path may only be relevant in a specific
    location.


    For example, in the following diagram, the relative path `pycharmprojects/furtherpython/chapter2`
    is only meaningful relative to the directory workspace:


    ![](img/8a661fca3884547aede940b9a6567321_332_0.png)


    Relative path: `pycharmprojects/furtherpython/chapter2`


    Note that an absolute path starts from the root directory (represented by ‘/’)
    where as a relative path starts from a particular sub directory (such as `pycharm
    projects`).


    ## File Input/Output


    File Input/Output (often just referred to as File I/O) involves reading and writing
    data to and from files. The data being written can be in different formats.


    For example a common format used in Unix/Linux and Windows systems is the ASCII
    text format. The ASCII format (or American Standard Code for Information Interchange)
    is a set of codes that represent various characters that is widely used by operating
    systems. The following table illustrates some of the ASCII character codes and
    what they represent:


    | Decimal code | Character | Meaning |

    |---|---|---|

    | 42 | * | Asterisk |

    | 43 | + | Plus |

    | 48 | 0 | Zero |

    | 49 | 1 | One |

    | 50 | 2 | Two |

    | 51 | 3 | Three |

    | 65 | A | Uppercase A |

    | 66 | B | Uppercase B |

    | 67 | C | Uppercase C |

    | 68 | D | Uppercase D |

    | 97 | a | Lowercase a |

    | 98 | b | Lowercase b |

    | 99 | c | Lowercase c |

    | 100 | d | Lowercase d |


    ASCII is a very useful format to use for text files as they can be read by a wide
    range of editors and browsers. These editors and browsers make it very easy to
    create human readable files. However, programming languages such as Python often
    use a different set of character encoding such as a Unicode character encoding
    (such as UTF-8). Unicode is another standard for representing characters using
    various codes. Unicode encoding systems offer a wider range of possible character
    encoding than ASCII, for example the latest version of Unicode in May 2019, Unicode
    12.1, contains a repertoire of 137,994 characters covering 150 modern and historic
    scripts, as well as multiple symbol sets and emojis.


    However, this means that it can be necessary to translate ASCII into Unicode (e.g.
    UTF-8) and vice versa when reading and writing ASCII files in Python.


    Another option is to use a binary format for data in a file. The advantage of
    using binary data is that there is little or no translation required from the
    internal representation of the data used in the Python program into the format
    stored in the file. It is also often more concise than an equivalent ASCII format
    and it is quicker for a program to read and write and takes up less disk space
    etc. However, the down side of a binary format is that it is not in an easily
    human readable format. It may also be difficult for other programs,'
