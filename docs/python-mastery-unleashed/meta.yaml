    world). In many cases there will also be developers working on the AI engine for
    a game. These developers will focus on providing facilities that allow the game
    or characters in the game to operate intelligently.


    Those developing the actual game play will use these engines and frameworks to
    create the overall end result. It is they who give life to the game and make it
    an enjoyable (and playable) experience.


    # Games Frameworks and Libraries


