    There are numerous different types of event including:


    +   - wx.CloseEvent used to indicate that a Frame or Dialog has been closed.The
    event binder for this event is named wx.EVT_CLOSE.

    - wx.CommandEvent used with widgets such as buttons,list boxes, menu items, radio
    buttons, scroll bars, sliders etc.Depending upon the type of widget that generated
    the event different information may be provided. For example, for a Button a CommandEvent
    indicates that a button has been clicked where as for a ListBox it indicates that
    an option has been selected,etc. Different event binders are used for different
    event situations. For example, to bind a command event to a event handler for
    a button then the wx.EVT_BUTTON'
  merge: -1
