  md: 'The previous section gave several reasons to use mocks; the next thing to consider
    then is what is a mock?


    Mocks, including mock functions,methods and mock objects are things that:


    +   - Possess the same interface as the real thing, whether they are mock functions,
    methods or whole objects. They thus take the same range and types of parameters
    and return similar information using similar types.

    - Define behavior that in some way represents/mimics real exemplar behavior but
    typically in very controlled ways. This behavior may be hard coed, may really
    on a set of rules or simplified behavior; may be very simplistic or quiet sophisticated
    in its own right.


    They thus emulate the real system and from outside of the mock may actually appear
    to be the real system.


    In many cases the term mock is used to cover a range of different ways in which
    the real thing can be emulated; each type of mock has its own characteristics.
    It is therefore useful to distinguish the different types of mocks as this can
    help deter- mine the style of mock to be adopted in a particular test situation.


    The are different types of Mock including:'
  merge: -1
  pgno: 299
- img_proc: true
  md: '+   - Test Stubs. A test stub is typically a hand coded function, method or
    object used for testing purposes. The behavior implemented by a test stub may
    rep- resent a limited sub set of the functionality of the real thing.

    - Fakes.Fakes typically provide addition functionality compared with a Test Stub.
    Fakes may be considered to be a test specific version of the real thing, such
    as an in memory database used for testing rather than the real database. Such
    Fakes typically still have some limitations on their functionality, for example
    when the tests are terminated all data is purged from the in memory database rather
    than stored permanently on disk.

    - Auto generated Test Mocks. These are typically generated automatically using
    a supporting framework. As part of the set up of the test the expectations associated
    with the test mock. These expectations may specify the results to return for specific
    inputs as well as whether the test mock was called etc.

    - Test Mock Spy. If we are testing a particular unit and it returns the correct
    result


    we might decided that we do not need to consider the internal behavior of the
    unit. However, it is common to want to confirm that the test mock was invoked
