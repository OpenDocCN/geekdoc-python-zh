  md: 'In addition to the symbolic notation there is also a numeric notation that
    is used with Unix style systems. The numeric notation uses three digits to represent
    the permissions. Each of the three rightmost digits represents a different component
    of the permissions: owner, group, and others.


    Each of these digits is the sum of its component bits in the binary numeral system.
    As a result, specific bits add to the sum as it is represented by a numeral:


    +   - The read bit adds 4 to its total (in binary 100),

    - The write bit adds 2 to its total (in binary 010), and

    - The execute bit adds 1 to its total (in binary 001).

    - This the following symbolic notations can be represented by an equivalent numeric
    notation:


    | Symbolic notation | Numeric notation | Meaning |

    | :--- | :--- | :--- |

    | rwx------ | 0700 | Read, write, and execute only for owner |

    | -rwxrwx--- | 0770 | Read, write, and execute for owner and group |

    | -rwxrwxrwx | 0777 | Read, write, and execute for owner, group and others |


