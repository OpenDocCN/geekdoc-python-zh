    \ 标签移动到当前鼠标位置。这意味着我们可以将标签在屏幕上移动。\n\n为此，我们首先需要确定将用于生成事件的控件。在本例中，是包含文本标签的面板。确定后，我们可以查看\
    \ `Panel` 类，看看它支持哪些事件和事件绑定。结果发现，`Panel` 类仅直接定义了对 `NavigationKeyEvents` 的支持。这实际上不是我们想要的；然而，`Panel`\
    \ 类扩展了 `Window` 类。\n\n`Window` 类支持许多事件绑定，从与设置焦点相关的绑定（`wx.EVT_SET_FOCUS` 和 `wx.EVT_KILL_FOCUS`）到按键（`wx.EVT_KEY_DOWN`\
