    # Introduction to Games Programming


    # Introduction


    Games programming is performed by developers/coders who implement the logic that
    drives a game.


    Historically games developers did everything; they wrote the code, designed the
    sprites and icons, handled the game play, dealt with sounds and music, generated
    any animations required etc. However, as the game industry has matured games companies
    have developed specific roles including Computer Graphics (CG) animators, artists,
    games developers and games engine and physics engine developers etc.


    Those involved with code development may develop a physics engine, a games engine,
    the games themselves, etc. Such developers focus on different aspects of a game.
    For examples a game engine developer focuses on creating the framework within
    which the game will run. In turn a physics engine developer will focus on implementing
    the mathematics behind the physics of the simulated games world (such as the effect
    of gravity on characters and components within that'
