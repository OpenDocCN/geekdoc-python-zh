  md: 'If streams are so good then why don’t you use them all the time? Well actually
    in Python 3 you do! The core open function (and indeed the io.open() function)
    both return a stream object. The actual type of object returned depends on the
    file mode specified, whether buffering is being used etc. For example:


    ```

    import io

    # Text stream

    f1 = open(''myfile.txt'', mode=''r'', encoding=''utf-8'')

    print(f1)

    # Binary IO aka Buffered IO

    f2 = open(''myfile.dat'', mode=''rb'')

    print(f2)

    f3 = open(''myfile.dat'', mode=''wb'')

    print(f3)

    # Raw IO aka Unbufferedf IO

    f4 = open(''starship.png'', mode=''rb'', buffering=0)

    print(f4)

    ```


    When this short example is run the output is:


    ```

    <__io.TextIOWrapper name=''myfile.txt'' mode=''r'' encoding=''utf-8''>

    <__io.BufferedReader name=''myfile.dat''>

    <__io.BufferedWriter name=''myfile.dat''>

