    \ we use angle brackets (`<>`). These surround the URL parameter name and allow\
    \ the parameter to be passed into the function (using the same name).\n\nIn the\
    \ above example we have also (optionally) indicated the type of the parameter.\
    \ By default the type will be a string; however we know that the ISBN is in fact\
    \ an integer and so we have indicated that by prefixing the parameter name with\
    \ the type `int` (and separated the type information from the parameter name by\
    \ a colon `:`). There are actually several options available including:\n\n- `string`\
    \ (the default),\n- `int` (as used above),\n- `float` for positive floating point\
    \ values,\n- `uuid` for uuid strings and\n- `path` which is like string but accepts\
    \ slashes.\n\nWe can again use a browser to view the results of calling these\
