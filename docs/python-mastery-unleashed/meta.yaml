  md: '# Introduction to Sockets and Web Services


    # Introduction


    In the following two chapters we will explore socket based and web service approaches
    to inter process communications. These processes may be running on the same computer
    or different computers on the same local area network or may be geographically
    far apart. In all cases information is sent by one program running in one process
    to another program running in a separate process via internet sockets. This chapter
    introduces the core concepts involved in network programming.


    # Sockets


    Sockets, or rather Internet Protocol (IP) sockets provide a programming interface
    to the network protocol stack that is managed by the underlying operating system.
    Using such an API means that the programmer is abstracted away from the low level
    details of how data is exchanged between process on (potentially) different computers
    and can instead focus on the higher level aspects of their solution.'
  merge: -1
  pgno: 686
- img_proc: true
  md: 'There are a number of different types of IP socket available, however the focus
    in this book is on Stream Sockets. A stream socket uses the Transmission Control
    Protocol (TCP) to send messages.Such a socket is often referred to as a TCP/IP
    socket.


    TCP provides for ordered and reliable transmission of data across the connection
    between two devices (or hosts). This can be important as TCP guarantees that for
    every message sent; that every message will not only arrive at the receiving host
    but that the messages will arrive in the correct order.


    A common alternative to the TCP is the User Data gram Protocol (or UDP). UDP does
    not provide any delivery guarantees (that is messages can be lost or may arrive
    out of order). However, UDP is a simpler protocol and can be particularly useful
    for broadcast systems, where multiple clients may need to receive the data published
    by a server host (particularly if data loss is not an issue).


    # Web Services


    A Web Service is a service offered by a host computer that can be invoked by a
    remote client using the Hypertext Transfer Protocol (HTTP). HTTP can be run over
    any reliable stream transport protocol, although it is typically used over TCP/IP.'
  merge: -1
  pgno: 687
- img_proc: true
  md: 'It was originally designed to allow data to be transferred between a HTTP server
    and a web browser so that the data could be presented in a human readable form
    to a user. However, when used with a web service it is used to support program
    to program communication between a client and a server using machine-readable
    data formats. Currently this format is most typically JSON (Java ScriptObject
    Notation) although in the past XML (eXtensible Markup Language) was often used.


    # Addressing Services


    Every device (host) connected to the internet has a unique identity (we are ignoring
    private networks here). This unique identity is represented as an IP address.
    Using an IP address we can connect a socket to a specific host anywhere on the
    internet. It is therefore possible to connect to a whole range of device types
    in this way from printers to cash tills to fridges as well as servers, mainframes
    and PCs etc.


    IP addresses have a common format such as 144.124.16.237. An IP version 4 address
    is always a set of four numbers separated by full stops. Each number can be in
    the range 0–255, so the full range of IP addresses is from 0.0.0.0 to 255.255.255.255.'
  merge: -1
  pgno: 688
- img_proc: true
  md: 'An IP address can be divided up into two parts; the part indicating the network
    on which the host is connected and the host’s ID, for example:


    ![](img/8a661fca3884547aede940b9a6567321_689_0.png)


    Thus:


    +   - The Network ID elements of the IP address identifies the specific network
    on which the host is currently located.

    - The Host ID is the part of the IP address that specifies a specific device on
    the network (such as your computer).


    On any given network there may be multiple hosts, each with their own host ID
    but with a shared network ID. For example, on a private home network there may
    be:


    +   - 192.168.1.1 Jasmine’s laptop.

    - 192.168.1.2 Adam’s PC

    - 192.168.1.3 Home Printer

    - 192.168.1.4 Smart TV'
  merge: -1
  pgno: 689
- img_proc: true
  md: 'In many ways the network id and host id elements of an IP address are like
    the postal address for a house on a street. The street may have a name, for example
    Coleridge Avenue and there may be multiple houses on the street. Each house has
    a unique number; thus 10 Coleridge Avenue is uniquely differentiated from 20 Coleridge
    Avenue by the house number.


    At this point you may be wondering where the URLs you see in your web browser
    come into play (such as [www.bbc.co.uk](http://www.bbc.co.uk)). These are textual
    names that actually map to an IP address. The mapping is performed by something
    called a Domain Name System (or DNS) server. A DNS server acts as a lookup service
    to provide the actual IP address for a particular textual URL name.The presence
    of an English textual version of a host address is because humans are better at
    remembering (a hopefully) meaningful name rather than what might appear to be
    a random sequence of numbers.


    There are several web sites that can be used to see these mappings (and one is
    given at the end of this chapter). Some examples of how the English textual name
    maps to an IP address are given below:


    +   - [www.aber.ac.uk](http://www.aber.ac.uk) maps to 144.124.16.237

    - [www.uwe.ac.uk](http://www.uwe.ac.uk) maps to 164.11.132.96

    - [www.bbc.net.uk](http://www.bbc.net.uk) maps to 212.58.249.213'
