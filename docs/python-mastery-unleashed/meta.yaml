    \ module, then the screen object is initialized as appropriate for your operating\
    \ system. This means that you can just focus on the following functions to configure\
    \ the layout/display such as this screen can have a title, a size, a starting\
    \ location etc.\n\nThe key functions are:\n\n+   - setup(width, height, startx,\
    \ starty) Sets the size and position of the main window/screen. The parameters\
    \ are:\n  - width—if an integer, a size in pixels, if a float, a fraction of the\
    \ screen;\n    default is 50% of screen."
