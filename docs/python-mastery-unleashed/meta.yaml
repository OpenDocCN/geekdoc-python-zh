  md: "It is possible to have multiple patch decorators on a test method. However,\
    \ the order in which you define the patch decorators is significant. The key to\
    \ understanding what the order should be is to work backwards so that when the\
    \ mocks are passed into the test method they are presented to the right parameters.\
    \ For example:\n\n```\n@patch('mymodule.sys')\n@patch('mymodule.os')\n@patch('mymodule.os.path')\n\
    def test_something(self, mock_os_path, mock_os, mock_sys):\n    # The rest of\
    \ the test method\n```\n\nNotice that the last patch’s mock is passed into the\
    \ second parameter passed to the test_something() method (self is the first parameter\
    \ to all methods). In turn the first patch’s mock is passed into the last parameter.\
    \ Thus the mocks are passed into the test method in the reverse order to that\
    \ which they are defined in.\n\n# How Many Mocks?\n\nAn interesting question to\
