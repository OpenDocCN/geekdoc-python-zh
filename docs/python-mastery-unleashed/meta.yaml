    # Observer Concurrency


    By default RxPy uses a single threaded model; that is Observables and Observers
    execute in the same thread of execution. However, this is only the default as
    it is the simplest approach.


    It is possible to indicate that when a Observer subscribes to an Observable that
    it should run in a separate thread using the scheduler keyword parameter on the
    subscribe() method. This keyword is given an appropriate scheduler such as the
    rx.concurrency.NewThreadScheduler. This scheduler will ensure that the Observer
    runs in a separate thread.


    To see the difference look at the following two programs. The main difference
    between the programs is the use of specific schedulers:'
  merge: -1
