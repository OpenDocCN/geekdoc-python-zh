  md: '# Working with Excel Files


    # Introduction


    This chapter introduces the open pyxl module that can be used when working with
    Excel files. Excel is a software application developed by Microsoft that allows
    users to work with spreadsheets. It is a very widely used tool and files using
    the Excel file format are commonly encountered within many organizations. It is
    in effect the industry standard for spreadsheets and as such is a very useful
    tool to have in the developers toolbox.


    # Excel Files


    Although CSV files are a convenient and simple way to handle data;it is very common
    to need to be able to read or write Excel files directly. To this end there are
    several libraries available in Python for this purpose. One widely used library
    is the OpenPyXL library. This library was originally written to support access
    to Excel 2010 files. It is an open source project and is well documented.'
