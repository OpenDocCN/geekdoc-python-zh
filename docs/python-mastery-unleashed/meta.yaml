    # Fractals in Python


    Within the arena of Computer Art fractals are a very well known art form. Fractals
    are recurring patterns that are calculated either using an iterative approach
    (such as a for loop) or a recursive approach (when a function calls itself but
    with modified parameters). One of the really interesting features of fractals
    is that they exhibit the same pattern (or nearly the same pattern)at successive
    levels of granularity. That is, if you magnified a fractal image you would find
    that the same pattern is being repeated at successively smaller and smaller magnifications.
    This is known as expanding'
  merge: -1
  pgno: 52
- img_proc: true
  md: 'symmetry or unfolding symmetry; if this replication is exactly the same at
    every scale, then it is called affine self-similar.


    Fractals have their roots in the world of mathematics starting in the 17th century,
    with the term fractal being coined in the 20th century by mathematical Benoit
    Mandelbrot in 1975. One often cited description that Mandelbrot published to describe
    geometric fractals is a rough or fragmented geometric shape that can be split
    into parts,each of which is (at least approximately) a reduced-size copy of the
    whole.


    Since the later part of the 20th century fractals have been a commonly used way
    of creating computer art. One example of a fractal often used in computer art
    is the Koch snowflake, while another is the Mandelbrot set. Both of these are
    used in this chapter as examples to illustrate how Python and the Turtle graphics
    library can be used to create fractal based art.


    # The Koch Snowflake


    The Koch snowflake is a fractal that begins with equilateral triangle and then
    replaces the middle third of every line segment with a pair of line segments that
    form an equilateral bump. This replacement can be performed to any depth generating
    finer and finer grained (smaller and smaller) triangles until the overall shape
    resembles a snow flake.'
