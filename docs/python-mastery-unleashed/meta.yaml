    # Filters


    Filters can be used by Handlers to provide finer grained control of the log output.
    A filter can be added to a logger using the logger.addFilter() method. A Filter
    can be created by extending the logging.Filter class and implementing the filter()
    method. This method takes a log record. This log record can be validated to determine
    if the record should be output or not. If it should be output then True is returned,
    if the record should be ignored False should be returned.'
