- md: "## Extending the Thread Class\n\nThe second approach to creating a Thread mentioned\
    \ earlier was to subclass the Thread class. To do this you must:\n\n1. Define\
    \ a new subclass of Thread.\n2. Override the run() method.\n3. Define a new `__init__()`\
    \ method that calls the parent class `__init__()` method to pass the required\
    \ parameters up to the Thread class constructor.\n\nThis is illustrated below\
    \ where the WorkerThread class passes the name, target and daemon parameters up\
    \ to the Thread super class constructor.\n\n```python\nfrom threading import Thread\n\
    from time import sleep\n\nclass WorkerThread(Thread):\n    def __init__(self,\
    \ daemon=None, target=None, name=None):\n        super().__init__(daemon=daemon,\
    \ target=target,\n                         name=name)\n    def run(self):\n  \
    \      for i in range(0, 10):\n            print('.', end='', flush=True)\n  \
    \          sleep(1)\n```\n\nOnce you have done this you can create an instance\
    \ of the new WorkerThread class and then start that instance.\n\n```python\nprint('Starting')\n\
    t = WorkerThread()\nt.start()\nprint('\\nDone')\n```\n\nThe output from this is:\n\
    \n```\nStarting\n.........\nDone\n```\n\nNote that it is common to call any sub\
    \ classes of the Thread class, SomethingThread, to make it clear that it is a\
    \ subclass of the Thread class and should be treated as if it was a Thread (which\
    \ of course it is).\n\n## Daemon Threads\n\nA thread can be marked as a daemon\
    \ thread by setting the daemon property to true either in the constructor or later\
    \ via the accessor property.\n\nFor example:\n\n```python\nfrom threading import\
    \ Thread\nfrom time import sleep\n\ndef worker(msg):\n    for i in range(0, 10):\n\
    \        print(msg, end='', flush=True)\n        sleep(1)\n\nprint('Starting')\n\
    # Create a daemon thread\nd = Thread(daemon=True, target=worker, args='C')\nd.start()\n\
    sleep(5)\nprint('Done')\n```\n\nThis creates a background daemon thread that will\
    \ run the function `worker()`. Such threads are often used for house keeping tasks\
    \ (such as background data backups etc.).\n\nAs mentioned above a daemon thread\
    \ is not enough on its own to keep the current program from terminating. This\
    \ means that the daemon thread will keep looping until the main thread finishes.\
    \ As the main thread sleeps for 5 s that allows the daemon thread to print out\
    \ about 5 strings before the main thread terminates. This is illustrated by the\
    \ output below:\n\n```\nStarting\nCCCCCDone\n```\n\n## Naming Threads\n\nThreads\
    \ can be named; which can be very useful when debugging an application with multiple\
    \ threads.\n\nIn the following example, three threads have been created; two have\
    \ been explicitly given a name related to what they are doing while the middle\
    \ one has been left with the default name. We then start all three threads and\
    \ use the `threading.enumerate()` function to loop through all the currently live\
    \ threads printing out their names:\n\n```python\nimport threading\nfrom threading\
    \ import Thread\nfrom time import sleep\n\ndef worker(msg):\n    for i in range(0,\
    \ 10):\n        print(msg, end='', flush=True)\n        sleep(1)\n\nt1 = Thread(name='worker',\
    \ target=worker, args='A')\nt2 = Thread(target=worker, args='B')  # use default\
    \ name e.g. Thread-1\nd = Thread(daemon=True, name='daemon', target=worker, args='C')\n\
    \nt1.start()\nt2.start()\nd.start()\n\nprint()\nfor t in threading.enumerate():\n\
    \    print(t.getName())\n```\n\nThe output from this program is given below:\n\
    \n```\nABC MainThread worker Thread-1 daemon\nABCBACACBCBACBAABCCBACBACBA\n```\n\
    \nAs you can see in addition to the worker thread and the daemon thread there\
    \ is a MainThread (that initiates the whole program) and Thread-1 which is the\
    \ thread referenced by the variable `t2` and uses the default thread name.\n\n\
    ## Thread Local Data\n\nIn some situations each Thread requires its own copy of\
    \ the data it is working with; this means that the shared (heap) memory is difficult\
    \ to use as it is inherently shared between all threads.\n\nTo overcome this Python\
    \ provides a concept known as Thread-Local data. Thread-local data is data whose\
    \ values are associated with a thread rather than with the shared memory. This\
    \ idea is illustrated below:\n\n![](img/8a661fca3884547aede940b9a6567321_550_0.png)\n\
    \nTo create thread-local data it is only necessary to create an instance of `threading.local`\
    \ (or a subclass of this) and store attributes into it. The instances will be\
    \ thread specific; meaning that one thread will not see the values stored by another\
    \ thread.\n\n```python\nfrom threading import Thread, local, currentThread\nfrom\
    \ random import randint\n\ndef show_value(data):\n    try:\n        val = data.value\n\
    \    except AttributeError:\n        print(currentThread().name, ' - No value\
    \ yet')\n    else:\n        print(currentThread().name, ' - value =', val)\n\n\
    def worker(data):\n    show_value(data)\n    data.value = randint(1, 100)\n  \
    \  show_value(data)\n\nprint(currentThread().name, ' - Starting')\nlocal_data\
    \ = local()\nshow_value(local_data)\nfor i in range(2):\n    t = Thread(name='W'\
    \ + str(i),\n               target=worker, args=[local_data])\n    t.start()\n\
    show_value(local_data)\nprint(currentThread().name, ' - Done')\n```\n\nThe output\
    \ from this is:\n\n```\nMainThread - Starting\nMainThread - No value yet\nW0 -\
    \ No value yet\nW0 - value = 20\nW1 - No value yet\nW1 - value = 90\nMainThread\
    \ - No value yet\nMainThread - Done\n```\n\nThe example presented above defines\
    \ two functions:\n\n- The first function attempts to access a value in the thread\
    \ local data object. If the value is not present an exception is raised (`AttributeError`).\
    \ The `show_value()` function catches the exception or successfully processes\
    \ the data.\n- The worker function calls `show_value()` twice, once before it\
    \ sets a value in the local data object and once after. As this function will\
    \ be run by separate threads the current Thread name is printed by the `show_value()`\
    \ function.\n\nThe main function creates a local data object using the `local()`\
    \ function from the threading library. It then calls `show_value()` itself. Next\
    \ it creates two threads to execute the worker function in passing the `local_data`\
    \ object into them; each thread is then started. Finally, it calls `show_value()`\
    \ again.\n\nAs can be seen from the output one thread cannot see the data set\
    \ by another thread in the `local_data` object (even when the attribute name is\
    \ the same).\n\n## Timers\n\nThe Timer class represents an action (or task) to\
    \ run after a certain amount of time has elapsed. The Timer class is a subclass\
    \ of Thread and as such also functions as an example of creating custom threads.\n\
    \nTimers are started, as with threads, by calling their `start()` method. The\
    \ timer can be stopped (before its action has begun) by calling the `cancel()`\
    \ method. The interval the timer will wait before executing its action may not\
    \ be exactly the same as the interval specified by the user as another thread\
    \ may be running when the timer wishes to start.\n\nThe signature of the Timer\
    \ class constructor is:\n\n```\nTimer(interval, function, args=None, kwargs=None)\n\
    ```\n\nAn example of using the Timer class is given below:\n\n```python\nfrom\
    \ threading import Timer\n\ndef hello():\n    print('hello')\n\nprint('Starting')\n\
    t = Timer(5, hello)\nt.start()\nprint('Done')\n```\n\nIn this case the Timer will\
    \ run the `hello` function after an initial delay of 5 s."
  mdcn: "## 扩展 Thread 类\n\n前面提到的创建线程的第二种方法是继承 Thread 类。为此，你需要：\n\n1.  定义一个新的 Thread\
    \ 子类。\n2.  重写 `run()` 方法。\n3.  定义一个新的 `__init__()` 方法，该方法调用父类的 `__init__()` 方法，将所需的参数传递给\
    \ Thread 类的构造函数。\n\n下面的示例展示了 WorkerThread 类如何将 `name`、`target` 和 `daemon` 参数传递给\
    \ Thread 超类的构造函数。\n\n```python\nfrom threading import Thread\nfrom time import\
    \ sleep\n\nclass WorkerThread(Thread):\n    def __init__(self, daemon=None, target=None,\
    \ name=None):\n        super().__init__(daemon=daemon, target=target,\n      \
    \                   name=name)\n    def run(self):\n        for i in range(0,\
    \ 10):\n            print('.', end='', flush=True)\n            sleep(1)\n```\n\
    \n完成上述步骤后，你就可以创建新的 WorkerThread 类的实例，然后启动该实例。\n\n```python\nprint('Starting')\n\
    t = WorkerThread()\nt.start()\nprint('\\nDone')\n```\n\n上述代码的输出为：\n\n```\nStarting\n\
    .........\nDone\n```\n\n请注意，通常会将 Thread 类的任何子类命名为 SomethingThread，以明确表示它是 Thread\
    \ 类的子类，并应将其视为一个线程（它当然是）。\n\n## 守护线程\n\n可以通过在构造函数中设置 `daemon` 属性为 `true`，或在之后通过访问器属性来设置，从而将线程标记为守护线程。\n\
    \n例如：\n\n```python\nfrom threading import Thread\nfrom time import sleep\n\ndef\
    \ worker(msg):\n    for i in range(0, 10):\n        print(msg, end='', flush=True)\n\
    \        sleep(1)\n\nprint('Starting')\n# 创建一个守护线程\nd = Thread(daemon=True, target=worker,\
    \ args='C')\nd.start()\nsleep(5)\nprint('Done')\n```\n\n这将创建一个后台守护线程来运行 `worker()`\
    \ 函数。此类线程通常用于执行后台管理任务（例如后台数据备份等）。\n\n如上所述，仅将线程标记为守护线程并不足以阻止当前程序终止。这意味着守护线程将持续循环，直到主线程结束。由于主线程休眠了\
    \ 5 秒，这使得守护线程在主线程终止前能够打印出大约 5 个字符串。下面的输出说明了这一点：\n\n```\nStarting\nCCCCCDone\n\
    ```\n\n## 命名线程\n\n线程可以被命名；这在调试具有多个线程的应用程序时非常有用。\n\n在下面的示例中，创建了三个线程；其中两个被显式地赋予了与其功能相关的名称，而中间的一个则使用了默认名称。然后我们启动所有三个线程，并使用\
    \ `threading.enumerate()` 函数遍历所有当前活动的线程，打印它们的名称：\n\n```python\nimport threading\n\
    from threading import Thread\nfrom time import sleep\n\ndef worker(msg):\n   \
    \ for i in range(0, 10):\n        print(msg, end='', flush=True)\n        sleep(1)\n\
    \nt1 = Thread(name='worker', target=worker, args='A')\nt2 = Thread(target=worker,\
    \ args='B')  # 使用默认名称，例如 Thread-1\nd = Thread(daemon=True, name='daemon', target=worker,\
    \ args='C')\n\nt1.start()\nt2.start()\nd.start()\n\nprint()\nfor t in threading.enumerate():\n\
    \    print(t.getName())\n```\n\n该程序的输出如下：\n\n```\nABC MainThread worker Thread-1\
    \ daemon\nABCBACACBCBACBAABCCBACBACBA\n```\n\n如你所见，除了 worker 线程和 daemon 线程外，还有一个\
    \ MainThread（它启动整个程序）和一个 Thread-1，后者是变量 `t2` 引用的线程，并使用了默认的线程名称。\n\n## 线程局部数据\n\
    \n在某些情况下，每个线程需要其正在处理的数据的独立副本；这意味着共享（堆）内存难以使用，因为它本质上是在所有线程之间共享的。\n\n为了克服这个问题，Python\
    \ 提供了一个称为线程局部数据的概念。线程局部数据是其值与线程相关联而非与共享内存相关联的数据。这个概念如下图所示：\n\n![](img/8a661fca3884547aede940b9a6567321_550_0.png)\n\
    \n要创建线程局部数据，只需创建一个 `threading.local`（或其子类）的实例，并将属性存储到其中。这些实例将是线程特定的；这意味着一个线程将看不到另一个线程存储的值。\n\
    \n```python\nfrom threading import Thread, local, currentThread\nfrom random import\
    \ randint\n\ndef show_value(data):\n    try:\n        val = data.value\n    except\
    \ AttributeError:\n        print(currentThread().name, ' - No value yet')\n  \
    \  else:\n        print(currentThread().name, ' - value =', val)\n\ndef worker(data):\n\
    \    show_value(data)\n    data.value = randint(1, 100)\n    show_value(data)\n\
    \nprint(currentThread().name, ' - Starting')\nlocal_data = local()\nshow_value(local_data)\n\
    for i in range(2):\n    t = Thread(name='W' + str(i),\n               target=worker,\
    \ args=[local_data])\n    t.start()\nshow_value(local_data)\nprint(currentThread().name,\
    \ ' - Done')\n```\n\n上述代码的输出为：\n\n```\nMainThread - Starting\nMainThread - No\
    \ value yet\nW0 - No value yet\nW0 - value = 20\nW1 - No value yet\nW1 - value\
    \ = 90\nMainThread - No value yet\nMainThread - Done\n```\n\n上面给出的示例定义了两个函数：\n\
    \n-   第一个函数尝试访问线程局部数据对象中的一个值。如果该值不存在，则会引发异常（`AttributeError`）。`show_value()` 函数捕获该异常或成功处理数据。\n\
    -   worker 函数调用两次 `show_value()`，一次是在它在局部数据对象中设置值之前，一次是在之后。由于此函数将由不同的线程运行，因此 `show_value()`\
    \ 函数会打印当前线程的名称。\n\n主函数使用 threading 库中的 `local()` 函数创建一个局部数据对象。然后它自己调用 `show_value()`。接下来，它创建两个线程来执行\
    \ worker 函数，并将 `local_data` 对象传递给它们；然后启动每个线程。最后，它再次调用 `show_value()`。\n\n从输出可以看出，一个线程无法看到另一个线程在\
    \ `local_data` 对象中设置的数据（即使属性名称相同）。\n\n## 定时器\n\nTimer 类表示一个在经过一定时间后执行的操作（或任务）。Timer\
    \ 类是 Thread 的子类，因此也作为创建自定义线程的一个示例。\n\n与线程一样，定时器通过调用其 `start()` 方法来启动。可以在定时器的操作开始之前通过调用\
    \ `cancel()` 方法来停止定时器。定时器在执行其操作之前等待的时间间隔可能与用户指定的间隔不完全相同，因为当定时器希望启动时，可能有另一个线程正在运行。\n\
    \nTimer 类构造函数的签名是：\n\n```\nTimer(interval, function, args=None, kwargs=None)\n\
    ```\n\n下面是一个使用 Timer 类的示例：\n\n```python\nfrom threading import Timer\n\ndef hello():\n\
    \    print('hello')\n\nprint('Starting')\nt = Timer(5, hello)\nt.start()\nprint('Done')\n\
    ```\n\n在这种情况下，Timer 将在初始延迟 5 秒后运行 `hello` 函数。"
