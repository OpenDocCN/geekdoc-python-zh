    \nThe following sample application illustrates how this function might be used:\n\
    \n![](img/8a661fca3884547aede940b9a6567321_390_0.png)\n\n## Working with Excel\
    \ Files\n\n### Introduction\n\nThis chapter introduces the openpyxl module that\
