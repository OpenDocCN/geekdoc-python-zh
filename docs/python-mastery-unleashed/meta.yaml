- img_proc: true
  md: 'efficiency. Finally the TextIOW rapper handles string encoding; that is it
    converts strings from the typical ASCII representation used in a file into the
    internal representation used by Python (which uses Unicode).


    You might ask at this point why have a streams model at all; after all we read
    and wrote data to files without needing to know about streams in the last chapter?
    The answer is that a stream can read or write data to or from a source of data
    rather than just from a file. Of course a file can be a source of data but so
    can a socket, a pipe,a string, a web service etc. It is therefore a more flexible
    data I/O model.


    # Python Streams


    The Python io module provides Python’s main facilities for dealing with data input
    and output. There are three main types of input/output these are text I/O, binary
    I/O and raw I/.O. These categories can be used with various types of data source/sinks.


    Whatever the category, each concrete stream can have a number of properties such
    as being read-only, write-only or read-write. It can also support sequential access
    or random access depending on the nature of the underlying data sink. For example,
    reading data from a socket or pipe is inherently'
