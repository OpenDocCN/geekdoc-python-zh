    # Raw IO/UnBuffered IO Classes


    Raw IO or unbuffered IO is provided by the RawIOBase and FileIO classes. RawIOBase
    This class is a subclass of IOBase and is the base class for raw binary (aka unbuffered)
    I/O. Raw binary I/O typically provides low-level access to an underlying OS device
    or API, and does not try to encapsulate it in high-level primitives (this is the
    responsibility of the Buffered I/O and Text I/O classes that can wrap a raw I/O
    stream). The class adds methods such as:'
  - '[PAGE 369]


    +   - read(size=-1) This method reads up to size bytes from the stream and returns
    them. If size is unspecified or -1 then all available bytes are read.

    - readall() This method reads and returns all available bytes within the stream.

    - readint(b) This method reads the bytes in the stream into a per-allocated, writable
    bytes-like object b (e.g. into a byte array). It returns the number of bytes read.

    - write(b) This method writes the data provided by b (a bytes-like object such
    as a byte array) into the underlying raw stream.


    FileIO The FileIO class represents a raw unbuffered binary IO stream linked to
    an operating system level file. When the FileIO class is instantiated it can be
    given a file name and the mode (such as ‘r’ or ‘w’ etc.). It can also be given
    a flag to indicate whether the file descriptor associated with the underlying
    OS level file should be closed or not.


    This class is used for the low-level reading of binary data and is at the heart
    of all file oriented data access (although it is often wrapped by another stream
    such as a buffered reader or writer).


