    the table:


    ```

    INSERT INTO ''students''(''id'', ''name'', ''surname'', ''subject'', ''email'')
    VALUES (''6'', ''James'', ''Andrews'', ''Games'', ''ja@my.com'');

    ```'
  - '[PAGE 435]


    This would add the row 6 to the table students with the result that the table
    would now have an additional row:


    | id | name | surname | subject | email |

    |---|---|---|---|---|

    | 1 | Phoebe | Cooke | Animation | pc@my.com |

    | 2 | Gryff | Jones | Games | gj@my.com |

    | 3 | Adam | Fosh | Music | af@my.com |

    | 4 | Jasmine | Smith | Games | js@my.com |

    | 5 | Tom | Jones | Music | tj@my.com |

    | 6 | James | Andrews | Games | ja@my.com |


    Updating an existing row is a little more complicated as it is first necessary
    to identify the row to be updated and then the data to modify. Thus an UPDATE
    statement includes a where clause to ensure the correct row is modified:


    ```

    UPDATE ''students'' SET ''email''=''grj@my.com'' WHERE ''id''=''2'';

    ```


    The effect of this code is that the second row in the students table is modified
    with the new email address:


    | id | name | surname | subject | email |

    |---|---|---|---|---|

    | 1 | Phoebe | Cooke | Animation | pc@my.com |

    | 2 | Gryff | Jones | Games | grj@my.com |

    | 3 | Adam | Fosh | Music | af@my.com |

    | 4 | Jasmine | Smith | Games | js@my.com |

