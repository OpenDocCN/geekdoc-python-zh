    # Sharing State Between Processes


    In general, if it can be avoided, then you should not share state between separate
    processes. However, if it is unavoidable then the multiprocessing library provides
    two ways in which state (data) can be shared, these are Shared Memory (as supported
    by multiprocessing.Value and multiprocessing.Array) and Server Process.


    # Process Shared Memory


    Data can be stored in a shared memory map using a multiprocessing.Value or multiprocessing.Array.
    This data can be accessed by multiple processes.


