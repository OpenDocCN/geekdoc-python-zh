- img_proc: true
  md: '![](img/8a661fca3884547aede940b9a6567321_67_0.png)


    # Back end Layer


    The Matplotlib back end layer handles the generation of output to different target
    formats. Matplotlib itself can be used in many different ways to generate many
    different outputs.


    Matplotlib can be used interactively, it can be embedded in an application (or
    graphical user interface), it may be used as'
  merge: -1
