- md: "There are several operators in this category including `rx.operators.filter()`,\
    \ `rx.operators.first()`, `rx.operators.last()` and `rx.operators.distinct()`.\
    \ The `filter()` operator only allows those data items to pass through that pass\
    \ some test expression defined by the function passed into the filter. This function\
    \ must return `True` or `False`. Any data item that causes the function to return\
    \ `True` is allowed to pass through the filter.\n\nFor example, let us assume\
    \ that the function passed into `filter()` is designed to only allow even numbers\
    \ through. If the data stream contains the numbers 2, 3, 5, 7, 4, 9 and 8 then\
    \ the `filter()` will only emit the numbers 2, 4 and 8. This is illustrated below:\n\
    \n![](img/8a661fca3884547aede940b9a6567321_676_0.png)\n\nThe following code implements\
    \ the above scenario:\n\n```python\n# Filter source for even numbers\nimport rx\n\
    from rx import operators as op\n# Set up a source with a filter\nsource = rx.from_list([2,\
    \ 3, 5, 7, 4, 9, 8]).pipe(\n    op.filter(lambda value: value % 2 == 0)\n)\n#\
    \ Subscribe a lambda function\nsource.subscribe(lambda value: print('Lambda Received',\
    \ value))\n```\n\nIn the above code the `rx.operators.filter()` operator takes\
    \ a lambda function that will verify if the current value is even or not (note\
    \ this could have been a named function or a method on an object etc.). It is\
    \ applied to the data stream generated by the Observable using the `pipe()` method.\
    \ The output generated by this example is:\n\n```\nLambda Received 2\nLambda Received\
    \ 4\nLambda Received 8\n```\n\nThe `first()` and `last()` operators emit only\
    \ the first and last data item published by the Observable.\n\nThe `distinct()`\
    \ operator suppresses duplicate items being published by the Observable. For example,\
    \ in the following list used as the data for the Observable, the numbers 2 and\
    \ 3 are duplicated:\n\n```python\n# Use distinct to suppress duplicates\nsource\
    \ = rx.from_list([2, 3, 5, 2, 4, 3, 2]).pipe(\n    op.distinct()\n)\n# Subscribe\
    \ a lambda function\nsource.subscribe(lambda value: print('Received', value))\n\
    ```\n\nHowever, when the output is generated by the program all duplicates have\
    \ been suppressed:\n\n```\nReceived 2\nReceived 3\nReceived 5\nReceived 4\n```\n\
    \n## Mathematical Operators\n\nMathematical and aggregate operators perform calculations\
    \ on the data stream provided by an Observable. For example, the `rx.operators.average()`\
    \ operator can be used to calculate the average of a set of numbers published\
    \ by an Observable. Similarly `rx.operators.max()` can select the maximum value,\
    \ `rx.operators.min()` the minimum value and `rx.operators.sum()` will total all\
    \ the numbers published etc.\n\nAn example using the `rx.operators.sum()` operator\
    \ is given below:\n\n```python\n# Example of summing all the values in a data\
    \ stream\nimport rx\nfrom rx import operators as op\n# Set up a source and apply\
    \ sum\nrx.from_list([2, 3, 5, 7]).pipe(\n    op.sum()\n).subscribe(lambda v: print(v))\n\
    ```\n\nThe output from the `rx.operators.sum()` operator is the total of the data\
    \ items published by the Observable (in this case the total of 2, 3, 5 and 7).\
    \ The Observer function that is subscribed to the `rx.operators.sum()` operators\
    \ Observable will print out this value:\n\n```\n17\n```\n\nHowever, in some cases\
    \ it may be useful to be notified of the intermediate running total as well as\
    \ the final value so that other operators down the chain can react to these subtotals.\
    \ This can be achieved using the `rx.operators.scan()` operator. The `rx.operators.scan()`\
    \ operator is actually a transformational operator but can be used in this case\
    \ to provide a mathematical operation. The `scan()` operator applies a function\
    \ to each data item published by an Observable and generates its own data item\
    \ for each value received. Each generated value is passed to the next invocation\
    \ of the `scan()` function as well as being published to the `scan()` operators\
    \ Observable data stream. The running total can thus be generated from the previous\
    \ sub total and the new value obtained. This is shown below:\n\n```python\nimport\
    \ rx\nfrom rx import operators as op\n# Rolling or incremental sum\nrx.from_([2,\
    \ 3, 5, 7]).pipe(\n    op.scan(lambda subtotal, i: subtotal+i)\n).subscribe(lambda\
    \ v: print(v))\n```\n\nThe output from this example is:\n\n```\n2\n5\n10\n17\n\
    ```\n\nThis means that each subtotal is published as well as the final total.\n\
    \n## Chaining Operators\n\nAn interesting aspect of the RxPy approach to data\
    \ stream processing is that it is possible to apply multiple operators to the\
    \ data stream produced by an Observable.\n\nThe operators discussed earlier actually\
    \ return another Observable. This new Observable can supply its own data stream\
    \ based on the original data stream and the result of applying the operator. This\
    \ allows another operator to be applied in sequence to the data produced by the\
    \ new Observable. This allows the operators to be chained together to provide\
    \ sophisticated processing of the data published by the original Observable.\n\
    \nFor example, we might first start off by filtering the output from an Observable\
    \ such that only certain data items are published. We might then apply a transformation\
    \ in the form of a `map()` operator to that data, as shown below:\n\n![](img/8a661fca3884547aede940b9a6567321_682_0.png)\n\
    \nNote the order in which we have applied the operators; we first filter out data\
    \ that is not of interest and then apply the transformation. This is more efficient\
    \ than applying the operators the other way around as in the above example we\
    \ do not need to transform the odd values. It is therefore common to try and push\
    \ the filter operators as high up the chain as possible.\n\nThe code used to generate\
    \ the chained set of operators is given below. In this case we have used lambda\
    \ functions to define the `filter()` function and the `map()` function. The operators\
    \ are applied to the Observable obtained from the list supplied. The data stream\
    \ generated by the Observable is processed by each of the operators defined in\
    \ the pipe. As there are now two operators the pipe contains both operators and\
    \ acts as a pipe down which the data flows.\n\nThe list used as the initial source\
    \ of the Observables data contains a sequence of even and odd numbers. The `filter()`\
    \ function selects only even numbers and the `map()` function transforms the integer\
    \ values into strings. We then subscribe an Observer function to the Observable\
    \ produced by the transformational `map()` operator.\n\n```python\n# Example of\
    \ chaining operators together\nimport rx\nfrom rx import operators as op\n# Set\
    \ up a source with a filter\nsource = rx.from_list([2, 3, 5, 7, 4, 9, 8])\npipe\
    \ = source.pipe(\n    op.filter(lambda value: value % 2 == 0),\n    op.map(lambda\
    \ value: \"'\"+ str(value) + \"'\")\n)\n# Subscribe a lambda function\npipe.subscribe(lambda\
    \ value: print('Received', value))\n```\n\nThe output from this application is\
    \ given below:\n\n```\nReceived '2'\nReceived '4'\nReceived '8'\n```\n\nThis makes\
    \ it clear that only the three even numbers (2, 4 and 8) are allowed through to\
    \ the `map()` function.\n\n## Online Resources\n\nSee the following online resources\
    \ for information on RxPy:\n\n- [https://rxpy.readthedocs.io/en/latest/](https://rxpy.readthedocs.io/en/latest/)\
    \ Documentation for the RxPy library.\n- [https://rxpy.readthedocs.io/en/latest/operators.html](https://rxpy.readthedocs.io/en/latest/operators.html)\
    \ Lists of the available RxPy operators.\n\n## Try\n\nGiven the following set\
    \ of tuples representing Stock/Equity prices:\n\n```python\nstocks = (('APPL',\
    \ 12.45), ('IBM', 15.55), ('MSFT', 5.66), ('APPL', 13.33))\n```\n\nProvide solutions\
    \ to the following:\n\n- Select all the ‘APPL’ stocks\n- Select all stocks with\
    \ a price over 15.00\n- Find the average price of all ‘APPL’ stocks.\n\nNow use\
    \ the second set of tuples and merge them with the first set of stock prices:\n\
    \n```python\nstocks2 = (('GOOG', 8.95), ('APPL', 7.65), ('APPL', 12.45), ('MSFT',\
    \ 5.66), ('GOOG', 7.56), ('IBM', 12.76))\n```\n\nConvert each tuple into a list\
    \ and calculate how much 25 shares in that stock would be, print this out as the\
    \ result).\n\n- Find the highest value stock.\n- Find the lowest value stock.\n\
    - Only publish unique data items (i.e. Suppress duplicates)."
