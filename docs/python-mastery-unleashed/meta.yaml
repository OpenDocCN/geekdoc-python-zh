    # For matters


    The are two levels at which you can format the messages logged, these are within
    the log message passed to a logging method(such as info() or warn()) and via the
    top level configuration that indicates what additional information may be added
    to the individual log message.


    # Formatting Log Messages


    The log message can have control characters that indicate what values should be
    placed within the message, for example:


    ```

    logger.warning(''%s is set to %d'', ''count'', 42)

    ```


    This indicates that the format string expects to be given a string and a number.
    The parameters to be substituted into the format string follow the format string
    as a comm separated list of values.'
