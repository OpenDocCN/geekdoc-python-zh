    Note that these mappings were correct at the time of writing; they can change
    as new entries can be provided to the DNS servers causing a particular textual
    name to map to a different physical host.


    # Localhost


    There is a special IP address which is usually available on a host computer and
    is very useful for developers and testers. This is the IP address:


    127.0.0.1


    It is also known as localhost which is often easier to remember. Localhost (and
    127.0.0.1) is used to refer to the computer you are currently on when a program
    is run; that is it is your local host computer (hence the name localhost).


    For example, if you start up a socket server on your local computer and want a
    client socket program, running on the same computer, to connect to the server
    program; you can tell it to do so by getting it to connect to localhost.


    This is particularly useful when either you don’t know the IP address of your
    local computer or because the code may be'
  merge: -1
  pgno: 691
- img_proc: true
  md: 'run on multiple different computers each of which will have their own IP address.
    This is particularly common if you are writing test code that will be used by
    developers when running their own tests on different developer (host) machines.


    We will be using localhost in the next two chapters as a way of specifying where
    to look for a server program.


    # Port Numbers


    Each internet device/host can typically support multiple processes. It is therefore
    necessary to ensure that each process has its own channel of communications. To
    do this each host has available to it multiple ports that a program can connect
    too. For example port 80 is often reserved for HTTP web servers, while port 25
    is reserved for SMTP servers. This means that if a client wants to connect to
    a HTTP server on a particular computer then it must specify port 80 not port 25
    on that host.


    A port number is written after the IP address of the host and separated from the
    address by a colon, for example:


    +   - [www.aber.ac.uk:80](http://www.aber.ac.uk:80) indicates port 80 on the host
    machine which will typically be running a HTTP server, in this case for Aberystwyth
    University.'
