    \ decorator.\n\n```python\n@pytest.mark.parametrize('input1,input2,expected',\
    \ [\n    (3, 1, 4),\n    (3, 2, 5),\n])\ndef test_calculator_add_operation(calculator,\
    \ input1, input2, expected):\n    calculator.set(input1)\n    calculator.add()\n\
    \    calculator.set(input2)\n    calculator.add()\n    assert calculator.total\
    \ == expected\n```\n\nThis illustrates setting up a parametrised test for the\
    \ Calculator in which two input values are added together and compared with the\
    \ expected result. Note that the parameters are named in the decorator and then\
    \ a list of tuples is used to define the values to be used for the parameters.\
    \ In this case the test_calculator_add_operation will be run twice, passing in\
    \ 3, 1 and 4 and then passing in 3, 2 and 5 for the parameters input1, input2\
    \ and expected respectively.\n\n## Testing for Exceptions\n\nYou can write tests\
    \ that verify that an exception was raised. This is useful as testing negative\
    \ behavior is as important as testing positive behavior. For example, we might\
    \ want to verify that a particular exception is raised when we attempt to withdraw\
    \ money from a bank account which will take us over our overdraft limit.\n\nTo\
    \ verify the presence of an exception in PyTest use the `with` statement and `pytest.raises`.\
    \ This is a context manager that will verify on exit that the specified exception\
    \ was raised. It is used as follows:\n\n```python\nwith pytest.raises(accounts.BalanceError):\n\
    \    current_account.withdraw(200.0)\n```\n\n## Ignoring Tests\n\nIn some cases\
    \ it is useful to write a test for functionality that has not yet been implemented;\
    \ this may be to ensure that the test is not forgotten or because it helps to\
    \ document what the item under test should do. However, if the test is run then\
    \ the test suite as a whole will fail because the test is running against behavior\
    \ that has yet to be written.\n\nOne way to address this problem is to decorate\
    \ a test with the `@pytest.mark.skip` decorator:\n\n```python\n@pytest.mark.skip(reason='not\
    \ implemented yet')\ndef test_calculator_multiply(calculator):\n    calculator.multiply(2,\
    \ 3)\n    assert calculator.total == 6\n```\n\nThis indicates that PyTest should\
    \ record the presence of the test but should not try to execute it. PyTest will\
    \ then note that the test was skipped, for example in PyCharm this is shown using\
    \ a circle with a line through it.\n\nIt is generally considered best practice\
    \ to provide a reason why the test has been skipped so that it is easier to track.\
    \ This information is also available when PyTest skips the test.\n\n## Try\n\n\
    Create a simple Calculator class that can be used for testing purposes. This simple\
    \ calculator can be used to add, subtract, multiply and divide numbers.\n\nThis\
    \ will be a purely command driven application that will allow the user to specify:\n\
    \n- the operation to perform and\n- the two numbers to use with that operation.\n\
    \nThe Calculator object will then return a result. The same object can be used\
    \ to repeat this sequence of steps. This general behavior of the Calculator is\
    \ illustrated below in flow chart form.\n\nYou should also provide a memory function\
    \ that allows the current result to be added to or subtracted from the current\
    \ memory total. It should also be possible to retrieve the value in memory and\
    \ clear the memory. Next write a PyTest set of tests for the Calculator class.\n\
    \nThink about what tests you need to write; remember you can’t write tests for\
    \ every value that might be used for an operation; but consider the boundaries,\
    \ 0, -1, 1, -10, +10 etc.\n\nOf course you also need to consider the cumulative\
    \ effect of the behavior of the memory feature of the calculator; that is multiple\
    \ memory adds or memory subtractions and combinations of these.\n\nAs you identify\
    \ tests you may find that you have to update your implementation of the Calculator\
    \ class. Have you taken into account all input options, for example dividing by\
    \ zero—what should happen in these situations."
