    \ that different amount of spacing must be given on different platforms. In addition\
    \ the fonts used with text boxes and labels differ between different platforms\
    \ also requiring differences in the layout of widgets.\n\nTo overcome this wxPython\
    \ provides Sizers. Sizers work with a container such as a Frame or a Panel to\
    \ determine how the contained widgets should be laid out. Widgets are added to\
    \ a sizer which is then set onto a container such as a Panel.\n\nA Sizer is thus\
    \ an object which works with a container and the host windowing platform to determine\
    \ the best way to display the objects in the window. The developer does not need\
    \ to worry about what happens if a user resizes a window or if the program is\
    \ executed on a different windowing platform.\n\n- Sizers therefore help to produce\
    \ portable, presentable user interfaces. In fact one Sizer can be placed within\
    \ another Sizer to create complex component layouts.\n\nThere are several sizers\
    \ available including:\n\n- wx.BoxSizer This sizer can be used to place several\
    \ widgets into a row or column organization depending upon the orientation. When\
    \ the BoxSizer is created the orientation can be specified using wx.VERTICAL or\
    \ wx.HORIZONTAL.\n- wx.GridSizer This sizer lays widgets out in a two dimensional\
    \ grid. Each cell within the grid has the same size. When the GridSizer object\
    \ is created it is possible to specify the number of rows and columns the grid\
    \ has. It is also possible to specify the spacing between the cells both horizontally\
    \ and vertically.\n- wx.FlexGridSizer This sizer is a slightly more flexible version\
    \ of the GridSizer. In this version not all columns and rows need to be the same\
    \ size (although all cells in the same column are the same width and all cells\
    \ in the same row are the same height).\n- wx.GridBagSizer is the most flexible\
    \ sizer. It allows widgets to be positioned relative to the grid and also allows\
    \ widgets to span multiple rows and/or columns.\n\nTo use a Sizer it must first\
    \ be instantiated. When widgets are created they should be added to the sizer\
    \ and then the sizer should be set on the container.\n\nFor example, the following\
    \ code uses a GridSizer used with a Panel to layout out four widgets comprised\
    \ of two buttons, a StaticText label and a TextCtrl input field:\n\n```python\n\
    # Create the panel\npanel = wx.Panel(self)\n# Create the sizer to use with 4 rows\
    \ and 1 column\n# And 5 spacing around each cell\ngrid = wx.GridSizer(4, 1, 5,\
    \ 5)\n# Create the widgets\ntext = wx.TextCtrl(panel, size=(150, -1))\nenter_button\
    \ = wx.Button(panel, label='Enter')\nlabel = wx.StaticText(panel, label='Welcome')\n\
    message_button = wx.Button(panel, label='Show Message')\n# Add the widgets to\
    \ the grid sizer\ngrid.AddMany([text, enter_button, label, message_button])\n\
    # Set the sizer on the panel\npanel.SetSizer(grid)\n```\n\nThe resulting display\
    \ is shown below:\n\n![](img/8a661fca3884547aede940b9a6567321_136_0.png)\n\n##\
    \ Drawing Graphics\n\nIn earlier chapters we looked at the Turtle graphics API\
    \ for generating vector and raster graphics in Python. The wxPython library provides\
    \ its own facilities for generating cross platform graphic displays using lines,\
    \ squares, circles, text etc. This is provided via the Device Context.\n\nA Device\
    \ Context (often shortened to just DC) is an object on which graphics and text\
    \ can be drawn. It is intended to allow different output devices to all have a\
    \ common graphics API (also known as the GDI or Graphics Device Interface). Specific\
    \ device contexts can be instantiated depending on whether the program is to use\
    \ a window on a computer screen or some other output medium (such as a printer).\n\
    \nThere are several Device Context types available such as wx.WindowDC, wx.PaintDC\
    \ and wx.ClientDC:\n\n- The wx.WindowDC is used if we want to paint on the whole\
    \ window (Windows only). This includes window decorations.\n- The wx.ClientDC\
    \ is used to draw on the client area of a window. The client area is the area\
    \ of a window without its decorations (title and border).\n- The wx.PaintDC is\
    \ used to draw on the client area as well but is intended to support the window\
    \ refresh paint event handling mechanism.\n\nNote that the wx.PaintDC should be\
    \ used only from a wx.PaintEvent handler while the wx.ClientDC should never be\
    \ used from a wx.PaintEvent handler.\n\nWhichever Device Context is used, they\
    \ all support a similar set of methods that are used to generate graphics, such\
    \ as:\n\n- DrawCircle(x, y, radius) Draws a circle with the given centre and radius.\n\
    - DrawEllipse(x, y, width, height) Draws an ellipse contained in the rectangle\
    \ specified either with the given top left corner and the given size or directly.\n\
    - DrawPoint(x, y) Draws a point using the color of the current pen.\n- DrawRectangle(x,\
    \ y, width, height) Draws a rectangle with the given corner coordinate and size.\n\
    - DrawText(text, x, y) Draws a text string at the specified point, using the current\
    \ text font, and the current text foreground and background colours.\n- DrawLine(pt1,\
    \ pt2) / DrawLine(x1, y1, x2, y2) This method draws a line from the first point\
    \ to the second.\n\nIt is also important to understand when the device context\
    \ is refreshed/redrawn. For example, if you resize a window, maximize it, minimize\
    \ it, move it, or modify its contents the window is redrawn. This generates an\
    \ event, a PaintEvent. You can bind a method to the PaintEvent (using wx.EVT_PAINT)\
    \ that can be called each time the window is refreshed.\n\nThis method can be\
    \ used to draw whatever the contents of the window should be. If you do not redraw\
    \ the contents of the device context in such a method then whatever you previously\
    \ drew will display when the window is refreshed.\n\nThe following simple program\
    \ illustrates the use of some of the Draw methods listed above and how a method\
    \ can be bound to the paint event so that the display is refreshed appropriately\
    \ when using a device context:\n\n```python\nimport wx\n\nclass DrawingFrame(wx.Frame):\n\
    \    def __init__(self, title):\n        super().__init__(None, title=title, size=(300,\
    \ 200))\n        self.Bind(wx.EVT_PAINT, self.on_paint)\n\n    def on_paint(self,\
    \ event):\n        \"\"\"set up the device context (DC) for painting\"\"\"\n \
    \       dc = wx.PaintDC(self)\n        dc.DrawLine(10, 10, 60, 20)\n        dc.DrawRectangle(20,\
    \ 40, 40, 20)\n        dc.DrawText(\"Hello World\", 30, 70)\n        dc.DrawCircle(130,\
    \ 40, radius=15)\n\nclass GraphicApp(wx.App):\n    def OnInit(self):\n       \
    \ \"\"\"Initialise the GUI display\"\"\"\n        frame = DrawingFrame(title='PyDraw')\n\
    \        frame.Show()\n        return True\n\n# Run the GUI application\napp =\
    \ GraphicApp()\napp.MainLoop()\n```\n\nWhen this program is run the following\
    \ display is generated:"
  mdcn: "## 在容器内排列部件\n\n部件可以通过特定坐标（例如向下10像素、向右5像素）定位在窗口中。然而，如果你考虑跨平台应用程序，这可能会成为一个问题，这是因为按钮在Mac上的渲染（绘制）方式与Windows不同，与Linux/Unix等系统的窗口系统也不同。这意味着在不同平台上必须提供不同的间距。此外，文本框和标签使用的字体在不同平台之间也存在差异，这也需要部件布局的相应调整。\n\
    \n为了克服这个问题，wxPython提供了Sizers（布局管理器）。Sizers与容器（如Frame或Panel）协同工作，以确定所包含的部件应如何布局。部件被添加到一个sizer中，然后该sizer被设置到容器（如Panel）上。\n\
    \n因此，Sizer是一个与容器和宿主窗口平台协同工作的对象，用于确定在窗口中显示对象的最佳方式。开发者无需担心用户调整窗口大小或在不同窗口平台上运行程序时会发生什么。\n\
    \n- 因此，Sizers有助于创建可移植、美观的用户界面。实际上，一个Sizer可以放置在另一个Sizer内部，以创建复杂的组件布局。\n\n有几种可用的sizer，包括：\n\
    \n- wx.BoxSizer 此sizer可用于将多个部件组织成一行或一列，具体取决于方向。创建BoxSizer时，可以使用`wx.VERTICAL`或`wx.HORIZONTAL`指定方向。\n\
    - wx.GridSizer 此sizer将部件布局在二维网格中。网格中的每个单元格大小相同。创建GridSizer对象时，可以指定网格的行数和列数。还可以指定单元格之间水平和垂直的间距。\n\
    - wx.FlexGridSizer 此sizer是GridSizer的一个稍微灵活的版本。在此版本中，并非所有列和行都需要相同大小（尽管同一列中的所有单元格宽度相同，同一行中的所有单元格高度相同）。\n\
    - wx.GridBagSizer 是最灵活的sizer。它允许部件相对于网格定位，也允许部件跨越多行和/或多列。\n\n要使用Sizer，必须首先实例化它。创建部件时，应将它们添加到sizer中，然后将sizer设置到容器上。\n\
    \n例如，以下代码使用一个与Panel一起使用的GridSizer来布局四个部件，包括两个按钮、一个StaticText标签和一个TextCtrl输入字段：\n\
    \n```python\n# 创建面板\npanel = wx.Panel(self)\n# 创建用于4行1列的sizer\n# 并且每个单元格周围有5像素的间距\n\
    grid = wx.GridSizer(4, 1, 5, 5)\n# 创建部件\ntext = wx.TextCtrl(panel, size=(150,\
    \ -1))\nenter_button = wx.Button(panel, label='Enter')\nlabel = wx.StaticText(panel,\
    \ label='Welcome')\nmessage_button = wx.Button(panel, label='Show Message')\n\
    # 将部件添加到网格sizer\ngrid.AddMany([text, enter_button, label, message_button])\n#\
    \ 将sizer设置到面板上\npanel.SetSizer(grid)\n```\n\n结果显示如下：\n\n![](img/8a661fca3884547aede940b9a6567321_136_0.png)\n\
    \n## 绘制图形\n\n在前面的章节中，我们了解了用于在Python中生成矢量和光栅图形的Turtle图形API。wxPython库提供了自己的设施，用于使用线条、矩形、圆形、文本等生成跨平台图形显示。这是通过设备上下文（Device\
    \ Context）提供的。\n\n设备上下文（通常简称为DC）是一个可以在其上绘制图形和文本的对象。它旨在允许不同的输出设备都拥有一个通用的图形API（也称为GDI或图形设备接口）。可以根据程序是使用计算机屏幕上的窗口还是其他输出介质（如打印机）来实例化特定的设备上下文。\n\
    \n有几种可用的设备上下文类型，例如`wx.WindowDC`、`wx.PaintDC`和`wx.ClientDC`：\n\n- `wx.WindowDC`\
    \ 用于在窗口的整个区域上绘制（仅限Windows）。这包括窗口装饰。\n- `wx.ClientDC` 用于在窗口的客户区域上绘制。客户区域是窗口中没有装饰（标题和边框）的区域。\n\
    - `wx.PaintDC` 也用于在客户区域上绘制，但旨在支持窗口刷新绘制事件处理机制。\n\n请注意，`wx.PaintDC`应仅在`wx.PaintEvent`处理程序中使用，而`wx.ClientDC`绝不应在`wx.PaintEvent`处理程序中使用。\n\
    \n无论使用哪种设备上下文，它们都支持一组类似的方法来生成图形，例如：\n\n- `DrawCircle(x, y, radius)` 绘制一个具有给定中心和半径的圆。\n\
    - `DrawEllipse(x, y, width, height)` 绘制一个包含在指定矩形内的椭圆，该矩形由给定的左上角和大小或直接指定。\n- `DrawPoint(x,\
    \ y)` 使用当前画笔的颜色绘制一个点。\n- `DrawRectangle(x, y, width, height)` 绘制一个具有给定角坐标和大小的矩形。\n\
    - `DrawText(text, x, y)` 在指定点绘制文本字符串，使用当前文本字体以及当前文本前景色和背景色。\n- `DrawLine(pt1,\
    \ pt2)` / `DrawLine(x1, y1, x2, y2)` 此方法从第一个点绘制一条线到第二个点。\n\n理解设备上下文何时刷新/重绘也很重要。例如，如果你调整窗口大小、最大化、最小化、移动窗口或修改其内容，窗口将被重绘。这会生成一个事件，即PaintEvent。你可以将一个方法绑定到PaintEvent（使用`wx.EVT_PAINT`），该方法在每次窗口刷新时被调用。\n\
    \n此方法可用于绘制窗口应显示的任何内容。如果你在此类方法中不重绘设备上下文的内容，那么窗口刷新时将显示你之前绘制的内容。\n\n以下简单程序说明了使用上述一些Draw方法以及如何将方法绑定到绘制事件，以便在使用设备上下文时适当地刷新显示：\n\
    \n```python\nimport wx\n\nclass DrawingFrame(wx.Frame):\n    def __init__(self,\
    \ title):\n        super().__init__(None, title=title, size=(300, 200))\n    \
    \    self.Bind(wx.EVT_PAINT, self.on_paint)\n\n    def on_paint(self, event):\n\
    \        \"\"\"设置用于绘制的设备上下文（DC）\"\"\"\n        dc = wx.PaintDC(self)\n       \
    \ dc.DrawLine(10, 10, 60, 20)\n        dc.DrawRectangle(20, 40, 40, 20)\n    \
    \    dc.DrawText(\"Hello World\", 30, 70)\n        dc.DrawCircle(130, 40, radius=15)\n\
    \nclass GraphicApp(wx.App):\n    def OnInit(self):\n        \"\"\"初始化GUI显示\"\"\
    \"\n        frame = DrawingFrame(title='PyDraw')\n        frame.Show()\n     \
    \   return True\n\n# 运行GUI应用程序\napp = GraphicApp()\napp.MainLoop()\n```\n\n运行此程序时，将生成以下显示："
