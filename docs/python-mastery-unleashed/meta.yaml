    at the loggers log level or above that level. Thus if a logger has a log level
    of WARNING then it will log all messages logged using the warning, error and critical
    log levels.


    Generally speaking, an application will not use the DEBUG level in a production
    system. This is usually considered inappropriate as it is only intended for debug
    scenarios. The INFO level may be considered appropriate for a production system
    although it is likely to produce large amounts of information as it typically
    traces the execution of functions and methods. If an application has been well
    tested and verified then it is only really warnings and errors which should occur/be
    of concern. It is therefore not uncommon to default to the WARNING level for production
    systems (indeed this is why the default log level is set to WARNING within the
    Python logging system).


