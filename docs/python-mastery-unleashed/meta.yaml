  md: 'The Pool class provides a range of methods that can be used to submit work
    to the worker processes managed by the pool. Note that the methods of the Pool
    object should only be called by the process which created the pool.


    The following diagram illustrates the effect of submitting some work or task to
    the pool. From the list of available processes, one process is selected and the
    task is passed to the process. The process will then execute the task. On completion
    any results are returned and the process is returned to the available list. If
    when a task is submitted to the pool there are no available processes then the
    task will be added to a wait queue until such time as a process is available to
    handle the task.


