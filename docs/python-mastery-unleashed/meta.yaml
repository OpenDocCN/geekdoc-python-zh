    -   `rmdir()` 此函数用于删除/移除目录。它接受要删除的目录的名称作为参数。\n-   `listdir()` 此函数返回一个列表，其中包含作为函数参数指定的目录中的条目名称（如果未给出名称，则使用当前目录）。\n\
