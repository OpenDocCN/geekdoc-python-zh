  md: '# Chaining Operators


    An interesting aspect of the RxPy approach to data stream processing is that it
    is possible to apply multiple operators to the data stream produced by an Observable.


    The operators discussed earlier actually return another Observable. This new Observable
    can supply its own data stream based on the original data stream and the result
    of applying the operator.This allows another operator to be applied in sequence
    to the data produced by the new Observable. This allows the operators to be chained
    together to provide sophisticated processing of the data published by the original
    Observable.


    For example, we might first start off by filtering the output from an Observable
    such that only certain data items are published.We might then apply a transformation
    in the form of a map() operator to that data, as shown below:'
  merge: -1
