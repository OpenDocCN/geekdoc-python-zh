  md: 'A subject is both an Observer and an Observable. This allows a subject to receive
    an item of data and then to republish that data or data derived from it.


    For example, imagine a subject that receives stock market price data published
    by an external(to the organization receiving the data) source. This subject might
    add a timestamp and source location to the data before republishing it to other
    internal Observers. However, there is a subtle difference that should be noted
    between a Subject and a plain Observable. A subscription to an Observable will
    cause an independent execution of the Observable when data is published. Notice
    how in the previous section all the messages were sent to a specific Observer
    before the next Observer was sent any data at all.


    A Subject shares the publication action with all of the subscribers and they will
    therefore all receive the same data item in a chain before the next data item.
    In the class hierarchy the Subject class is a direct subclass of the Observer
    class.


    The following example creates a Subject that enriches the data it receives by
    adding a timestamp to each data item. It then republishes the data item to any
    Observers that have subscribed to it.'
  merge: -1
  pgno: 658
- img_proc: true
  md: "```\npython\nimport rx\nfrom rx.subjects import Subject\nfrom datetime import\
    \ datetime\nsource = rx.from_list([2, 3, 5, 7])\nclass TimeStampSubject(Subject):\n\
    \    def on_next(self, value): print('Subject Received', value)\n    super().on_next((value,\
    \ datetime.now()))\n    def on_completed(self):\n        print('Data Stream Completed')\n\
    \        super().on_completed()\n    def on_error(self, error):\n        print('In\
    \ Subject- Error Occurred', error)\n        super().on_error(error)\ndef prime_number_reporter(value):\n\
    \    print('Function Received', value)\n    print('Set up')\n# Create the Subject\n\
    subject = TimeStampSubject()\n# Set up multiple subscribers for the subject\n\
    subject.subscribe(prime_number_reporter)\nsubject.subscribe(lambda value: print('Lambda\
    \ Received', value))\nsubject.subscribe(\n    on_next = lambda value: print('Received\
    \ on_next', value),\n    on_error = lambda exp: print('Error Occurred', exp),\n\
    \    on_completed = lambda: print('Received completed notification')\n)\n# Subscribe\
    \ the Subject to the Observable source\nsource.subscribe(subject)\n```\n\nprint('Done')"
