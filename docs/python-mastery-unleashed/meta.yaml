- md: "In the above diagram the logger has been configured to send all log messages\
    \ to four different handlers which allow a log message to be written to the console,\
    \ to a web server, to a file and to an email service. Such a behavior may be required\
    \ because:\n\n- The web server will allow developers access to a web interface\
    \ that allows them to see the log files even if they do not have permission to\
    \ access a production server.\n- The log file ensures that all the log data is\
    \ permanently stored in a file within the file store.\n- An email message may\
    \ be sent to a notification system so that someone will be notified that there\
    \ is an issue to be investigated.\n- The console may still be available to the\
    \ system administrators who may wish to look at the log messages generated.\n\n\
    The Python logging framework comes with several different handlers as suggested\
    \ above and listed below:\n\n- logging.StreamHandler sends messages to outputs\
    \ such as stdout, stderr etc.\n- logging.FileHandler sends log messages to files.\
    \ There are several varieties of FileHandler in addition to the basic FileHandler,\
    \ these include the logging.handlers.RotatingFileHandler (which will rotate log\
    \ files based on a maximum file size) and logging.handlers.TimeRotatingFileHandler\
    \ (which rotates the log file at specified time intervals e.g. daily).\n- logging.handlers.SocketHandler\
    \ which sends messages to a TCP/IP socket where it can be received by a TCP Server.\n\
    - logging.handlers.SMTPHandler that sends messages by the SMTP (Simple Mail Transfer\
    \ Protocol) to an email server.\n- logging.handlers.SysLogHandler that sends log\
    \ messages to a Unix syslog program.\n- logging.handlers.NTEventLogHandler that\
    \ sends message to a Windows event log.\n- logging.handlers.HTTPHandler which\
    \ sends messages to an HTTP server.\n- logging.NullHandler that does nothing with\
    \ error messages. This is often used by library developers who want to include\
    \ logging in their applications but expect developers to set up an appropriate\
    \ handler when they use the library.\n- All of these handlers can be configured\
    \ programmatically or via a configuration file.\n\n## Setting the Root Output\
    \ Handler\n\nThe following example, uses the logging.basicConfig() function to\
    \ set up the root logger to use a FileHandler that will write the log messages\
    \ to a file called ‘example.log’:\n\n```python\nimport logging\n# Sets a file\
    \ handler on the root logger to\n# save log messages to the example.log file\n\
    logging.basicConfig(filename='example.log', level=logging.DEBUG)\n# If no handler\
    \ is explicitly set on the named logger\n# it will delegate the messages to the\
    \ parent logger to handle\nlogger = logging.getLogger(__name__)\nlogger.debug('This\
    \ is to help with debugging')\nlogger.info('This is just for information')\nlogger.warning('This\
    \ is a warning!')\nlogger.error('This should be used with something unexpected')\n\
    logger.critical('Something serious')\n```\n\nNote that if no handler is specified\
    \ for a named logger then it delegates output to the parent (in this case the\
    \ root) logger.\n\nThe file generated for the above program is shown below:\n\n\
    As can be seen from this the default formatter is now configured for a FileHandler.\
    \ This FileHandler adds the log message level before the log message itself.\n\
    \n## Programmatically Setting the Handler\n\nIt is also possible to programmatically\
    \ create a handler and set it for the logger. This is done by instantiating one\
    \ of the existing handler classes (or by sub classing an existing handler such\
    \ as the root Handler class or the FileHandler etc.). The instantiated handler\
    \ can then be added as a handler to the logger (remember the logger can have multiple\
    \ handlers this is why the method is called addHandler() rather than something\
    \ such as setHandler).\n\nAn example of explicitly setting the FileHandler for\
    \ a logger is given below:\n\n```python\nimport logging\n# Empty basic config\
    \ turns off default console handler\nlogging.basicConfig()\nlogger = logging.getLogger(__name__)\n\
    logger.setLevel(logging.DEBUG)\n# create file handler which logs to the specified\
    \ file\nfile_handler = logging.FileHandler('detailed.log')\n# Add the handler\
    \ to the Logger\nlogger.addHandler(file_handler)\n# 'application' code\ndef do_something():\n\
    \    logger.debug('debug message')\n    logger.info('info message')\n    logger.warning('warn\
    \ message')\n    logger.error('error message')\n    logger.critical('critical\
    \ message')\nlogger.info('Starting')\ndo_something()\nlogger.info('Done')\n```\n\
    \nThe result of running this code is that a log file is created with the logged\
    \ messages:\n\nGiven that this is a lot more code than using the basicConfig()\
    \ function; the question here might be ‘Why bother?’. The answer is two fold:\n\
    \n- You can have different handlers for different loggers rather than setting\
    \ the handler to be used centrally.\n- Each handler can have its own format set\
    \ so that logging to a file has a different format to logging to the console.\n\
    \nWe can set the format for the handler by instantiating the logging.Formatter\
    \ class with an appropriate format string. The formatter object can then be applied\
    \ to a handler using the setFormatter() method on the handler object.\n\nFor example,\
    \ we can modify the above code to include a formatter that is then set on the\
    \ file handler as shown below.\n\n```python\n# create file handler which logs\
    \ to the specified file\nfile_handler = logging.FileHandler('detailed.log')\n\
    # Create formatter for the file_handler\nformatter = logging.Formatter('%(asctime)s\
    \ - %(funcName)s - %(message)s')\nfile_handler.setFormatter(formatter)\nlogger.addHandler(file_handler)\n\
    ```\n\nThe log file now generated is modified such that each message includes\
    \ a time stamp, the function name (or module if at the module level) as well as\
    \ the log message itself.\n\n## Multiple Handlers\n\nAs suggested in the previous\
    \ section we can create multiple handlers to send log messages to different locations;\
    \ for example from the console, to files and even email servers. The following\
    \ program illustrates setting up both a file handler and a console handler for\
    \ a module level logger.\n\nTo do this we create two handlers the file_handler\
    \ and the console_handler. As a side effect we can also give them different log\
    \ levels and different formatters. In this case the file_handler inherits the\
    \ log level of the logger itself (which is DEBUG) while the console_handler has\
    \ its log level set explicitly at WARNING. This means different amounts of information\
    \ will be logged to the log file than the console output.\n\nWe have also set\
    \ different formatters on each handler; in this case the log file handler’s formatter\
    \ provides more information than the console handler’s formatter.\n\nBoth handlers\
    \ are then added to the logger before it is used.\n\n```python\n# MultipleHandlers\
    \ and formatters\nimport logging\n# Set up the default root logger to do nothing\n\
    logging.basicConfig(handlers=[logging.NullHandler()])\n# Obtain the module level\
    \ logger and set level to DEBUG\nlogger = logging.getLogger(__name__)\nlogger.setLevel(logging.DEBUG)\n\
    # Create file handler\nfile_handler = logging.FileHandler('detailed.log')\n# Create\
    \ console handler with a higher log level\nconsole_handler = logging.StreamHandler()\n\
    console_handler.setLevel(logging.WARNING)\n# Create formatter for the file handler\n\
    fh_formatter = logging.Formatter(\n    '%(name)s.%(funcName)s: %(message)s',\n\
    \    datefmt='%m-%d-%Y %I:%M:%S %p')\nfile_handler.setFormatter(fh_formatter)\n\
    # Create formatter for the console handler\nconsole_formatter = logging.Formatter('%(asctime)s\
    \ %(funcName)s - %(message)s')\nconsole_handler.setFormatter(console_formatter)\n\
    # Add the handlers to logger\nlogger.addHandler(console_handler)\nlogger.addHandler(file_handler)\n\
    # 'application' code\ndef do_something():\n    logger.debug('debug message')\n\
    \    logger.info('info message')\n    logger.warning('warn message')\n```"
  mdcn: "在上图中，日志记录器已被配置为将所有日志消息发送到四个不同的处理器，从而允许将日志消息写入控制台、Web服务器、文件和电子邮件服务。这种行为可能是必需的，因为：\n\
    \n-   Web服务器将允许开发者访问一个Web界面，即使他们没有权限访问生产服务器，也能查看日志文件。\n-   日志文件确保所有日志数据永久存储在文件存储中的一个文件内。\n\
    -   可以向通知系统发送电子邮件消息，以便有人被通知有需要调查的问题。\n-   控制台可能仍然可供系统管理员使用，他们可能希望查看生成的日志消息。\n\n\
    Python日志框架附带了几个不同的处理器，如上所述并列于下方：\n\n-   `logging.StreamHandler` 将消息发送到输出，如 `stdout`、`stderr`\
    \ 等。\n-   `logging.FileHandler` 将日志消息发送到文件。除了基本的 `FileHandler` 外，还有几种 `FileHandler`\
    \ 的变体，包括 `logging.handlers.RotatingFileHandler`（它将基于最大文件大小轮转日志文件）和 `logging.handlers.TimeRotatingFileHandler`（它在指定的时间间隔轮转日志文件，例如每天）。\n\
    -   `logging.handlers.SocketHandler` 将消息发送到TCP/IP套接字，TCP服务器可以接收。\n-   `logging.handlers.SMTPHandler`\
    \ 通过SMTP（简单邮件传输协议）将消息发送到电子邮件服务器。\n-   `logging.handlers.SysLogHandler` 将日志消息发送到Unix\
    \ syslog程序。\n-   `logging.handlers.NTEventLogHandler` 将消息发送到Windows事件日志。\n-  \
    \ `logging.handlers.HTTPHandler` 将消息发送到HTTP服务器。\n-   `logging.NullHandler` 对错误消息不执行任何操作。这通常由库开发者使用，他们希望在应用程序中包含日志记录，但期望开发者在使用库时设置适当的处理器。\n\
    -   所有这些处理器都可以通过编程方式或通过配置文件进行配置。\n\n## 设置根输出处理器\n\n以下示例使用 `logging.basicConfig()`\
    \ 函数来设置根日志记录器，以使用一个 `FileHandler`，该处理器将日志消息写入名为“example.log”的文件：\n\n```python\n\
    import logging\n# 在根日志记录器上设置一个文件处理器，以\n# 将日志消息保存到 example.log 文件\nlogging.basicConfig(filename='example.log',\
    \ level=logging.DEBUG)\n# 如果没有在命名日志记录器上显式设置处理器，\n# 它将把消息委托给父日志记录器处理\nlogger =\
    \ logging.getLogger(__name__)\nlogger.debug('This is to help with debugging')\n\
    logger.info('This is just for information')\nlogger.warning('This is a warning!')\n\
    logger.error('This should be used with something unexpected')\nlogger.critical('Something\
    \ serious')\n```\n\n请注意，如果未为命名日志记录器指定处理器，则它会将输出委托给父级（在此情况下为根）日志记录器。\n\n上述程序生成的文件如下所示：\n\
    \n从图中可以看出，默认格式化器现在已为 `FileHandler` 配置。此 `FileHandler` 在日志消息本身之前添加了日志消息级别。\n\n\
    ## 以编程方式设置处理器\n\n也可以通过编程方式创建处理器并将其设置为日志记录器的处理器。这是通过实例化一个现有的处理器类（或通过子类化现有处理器，如根\
    \ `Handler` 类或 `FileHandler` 等）来完成的。然后可以将实例化的处理器作为处理器添加到日志记录器（请记住，日志记录器可以有多个处理器，这就是为什么该方法称为\
    \ `addHandler()` 而不是类似 `setHandler()` 的名称）。\n\n下面给出了一个为日志记录器显式设置 `FileHandler`\
    \ 的示例：\n\n```python\nimport logging\n# 空的基本配置会关闭默认的控制台处理器\nlogging.basicConfig()\n\
    logger = logging.getLogger(__name__)\nlogger.setLevel(logging.DEBUG)\n# 创建文件处理器，将日志记录到指定文件\n\
    file_handler = logging.FileHandler('detailed.log')\n# 将处理器添加到日志记录器\nlogger.addHandler(file_handler)\n\
    # “应用程序”代码\ndef do_something():\n    logger.debug('debug message')\n    logger.info('info\
    \ message')\n    logger.warning('warn message')\n    logger.error('error message')\n\
    \    logger.critical('critical message')\nlogger.info('Starting')\ndo_something()\n\
    logger.info('Done')\n```\n\n运行此代码的结果是创建了一个包含已记录消息的日志文件：\n\n鉴于这比使用 `basicConfig()`\
    \ 函数需要更多的代码；这里的问题可能是“为什么要这么麻烦？”。答案是双重的：\n\n-   你可以为不同的日志记录器设置不同的处理器，而不是集中设置要使用的处理器。\n\
    -   每个处理器都可以有自己的格式设置，因此记录到文件的日志格式与记录到控制台的格式不同。\n\n我们可以通过使用适当的格式字符串实例化 `logging.Formatter`\
    \ 类来为处理器设置格式。然后可以使用处理器对象上的 `setFormatter()` 方法将格式化器对象应用于处理器。\n\n例如，我们可以修改上面的代码以包含一个格式化器，然后将其设置在文件处理器上，如下所示。\n\
    \n```python\n# 创建文件处理器，将日志记录到指定文件\nfile_handler = logging.FileHandler('detailed.log')\n\
    # 为 file_handler 创建格式化器\nformatter = logging.Formatter('%(asctime)s - %(funcName)s\
    \ - %(message)s')\nfile_handler.setFormatter(formatter)\nlogger.addHandler(file_handler)\n\
    ```\n\n现在生成的日志文件已修改，使得每条消息都包含时间戳、函数名（或在模块级别时为模块名）以及日志消息本身。\n\n## 多个处理器\n\n如上一节所述，我们可以创建多个处理器将日志消息发送到不同的位置；例如，从控制台到文件，甚至电子邮件服务器。以下程序说明了为模块级日志记录器设置文件处理器和控制台处理器。\n\
    \n为此，我们创建两个处理器：`file_handler` 和 `console_handler`。作为附带效果，我们还可以为它们设置不同的日志级别和不同的格式化器。在这种情况下，`file_handler`\
    \ 继承日志记录器本身的日志级别（即 `DEBUG`），而 `console_handler` 的日志级别被显式设置为 `WARNING`。这意味着记录到日志文件的信息量将与控制台输出不同。\n\
    \n我们还为每个处理器设置了不同的格式化器；在这种情况下，日志文件处理器的格式化器比控制台处理器的格式化器提供更多信息。\n\n然后在使用日志记录器之前，将两个处理器都添加到日志记录器。\n\
    \n```python\n# 多个处理器和格式化器\nimport logging\n# 设置默认的根日志记录器不执行任何操作\nlogging.basicConfig(handlers=[logging.NullHandler()])\n\
    # 获取模块级日志记录器并将级别设置为 DEBUG\nlogger = logging.getLogger(__name__)\nlogger.setLevel(logging.DEBUG)\n\
    # 创建文件处理器\nfile_handler = logging.FileHandler('detailed.log')\n# 创建具有更高日志级别的控制台处理器\n\
    console_handler = logging.StreamHandler()\nconsole_handler.setLevel(logging.WARNING)\n\
    # 为文件处理器创建格式化器\nfh_formatter = logging.Formatter(\n    '%(name)s.%(funcName)s:\
    \ %(message)s',\n    datefmt='%m-%d-%Y %I:%M:%S %p')\nfile_handler.setFormatter(fh_formatter)\n\
    # 为控制台处理器创建格式化器\nconsole_formatter = logging.Formatter('%(asctime)s %(funcName)s\
    \ - %(message)s')\nconsole_handler.setFormatter(console_formatter)\n# 将处理器添加到日志记录器\n\
    logger.addHandler(console_handler)\nlogger.addHandler(file_handler)\n# “应用程序”代码\n\
    def do_something():\n    logger.debug('debug message')\n    logger.info('info\
    \ message')\n    logger.warning('warn message')\n```"
