- md: "This is illustrated below, where the spawn start method is specified:\n\n```python\n\
    from multiprocessing import Process\nfrom multiprocessing import set_start_method\n\
    from time import sleep\nimport os\n\ndef worker(msg):\n    print('module name:',\
    \ __name__)\n    print('parent process:', os.getppid())\n    print('process id:',\
    \ os.getpid())\n    for i in range(0, 10):\n        print(msg, end='', flush=True)\n\
    \        sleep(1)\n\ndef main():\n    print('Starting')\n    print('Root application\
    \ process id:', os.getpid())\n    set_start_method('spawn')\n    t = Process(target=worker,\
    \ args='A')\n    t.start()\n    print('Done')\n\nif __name__ == '__main__':\n\
    \    main()\n```\n\nThe output from this is shown below:\n\n```\nStarting\nRoot\
    \ application process id: 6281\nDone\nmodule name: main\nparent process: 6281\
    \ process id: 6283\nAAAAAAAAAA\n```\n\nNote that the parent process and current\
    \ process ids are printed out for the `worker()` function, while the `main()`\
    \ method prints out only its own id. This shows that the main application process\
    \ id is the same as the worker process parents’ id.\n\nAlternatively, it is possible\
    \ to use the `get_context()` method to obtain a context object. Context objects\
    \ have the same API as the multiprocessing module and allow you to use multiple\
    \ start methods in the same program, for example:\n\n```python\nctx = multiprocessing.get_context('spawn')\n\
    q = ctx.Queue()\np = ctx.Process(target=foo, args=(q,))\n```\n\n## Using a Pool\n\
    \nCreating Processes is expensive in terms of computer resources. It would therefore\
    \ be useful to be able to reuse processes within an application. The Pool class\
    \ provides such reusable processes.\n\nThe Pool class represents a pool of worker\
    \ processes that can be used to perform a set of concurrent, parallel operations.\
    \ The Pool provides methods which allow tasks to be offloaded to these worker\
    \ processes.\n\nThe Pool class provides a constructor which takes a number of\
    \ arguments:\n\n```python\nclass multiprocessing.pool.Pool(processes,\n    initializer,\
    \ initargs, maxtasksperchild, context)\n```\n\nThese represent:\n\n- `processes`\
    \ is the number of worker processes to use. If `processes` is `None` then the\
    \ number returned by `os.cpu_count()` is used.\n- `initializer` If `initializer`\
    \ is not `None` then each worker process will call `initializer(*initargs)` when\
    \ it starts.\n- `maxtasksperchild` is the number of tasks a worker process can\
    \ complete before it will exit and be replaced with a fresh worker process, to\
    \ enable unused resources to be freed. The default `maxtasksperchild` is `None`,\
    \ which means worker processes will live as long as the pool.\n- `context` can\
    \ be used to specify the context used for starting the worker processes. Usually\
    \ a pool is created using the function `multiprocessing.Pool()`. Alternatively\
    \ the pool can be created using the `Pool()` method of a context object.\n\nThe\
    \ Pool class provides a range of methods that can be used to submit work to the\
    \ worker processes managed by the pool. Note that the methods of the Pool object\
    \ should only be called by the process which created the pool.\n\nThe following\
    \ diagram illustrates the effect of submitting some work or task to the pool.\
    \ From the list of available processes, one process is selected and the task is\
    \ passed to the process. The process will then execute the task. On completion\
    \ any results are returned and the process is returned to the available list.\
    \ If when a task is submitted to the pool there are no available processes then\
    \ the task will be added to a wait queue until such time as a process is available\
    \ to handle the task.\n\n![](img/8a661fca3884547aede940b9a6567321_566_0.png)\n\
    \n![](img/8a661fca3884547aede940b9a6567321_566_1.png)\n\nThe simplest of the methods\
    \ provided by the Pool for work submission is the `map` method:\n\n```python\n\
    pool.map(func, iterable, chunksize=None)\n```\n\nThis method returns a list of\
    \ the results obtained by executing the function in parallel against each of the\
    \ items in the iterable parameter.\n\n- The `func` parameter is the callable object\
    \ to be executed (such as a function or a method).\n- The `iterable` is used to\
    \ pass in any parameters to the function.\n- This method chops the iterable into\
    \ a number of chunks which it submits to the process pool as separate tasks. The\
    \ (approximate) size of these chunks can be specified by setting `chunksize` to\
    \ a positive integer. The method blocks until the result is ready.\n\nThe following\
    \ sample program illustrates the basic use of the Pool and the `map()` method.\n\
