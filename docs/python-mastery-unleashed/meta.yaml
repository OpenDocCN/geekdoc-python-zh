- md: "main_) and all three loggers have an effective log level of WARNING (which\
    \ is the default).\n\n## Logger Hierarchy\n\nThere is in fact a hierarchy of loggers\
    \ with the root logger at the top of this hierarchy. All named loggers are below\
    \ the root logger. The name of a logger can actually be a period-separated hierarchical\
    \ value such as util, util.lib and util.lib.printer. Loggers that are further\
    \ down the hierarchy are children of loggers further up the logger hierarchy.\n\
    \nFor example given a logger called lib, then it will be below the root logger\
    \ but above the logger with the name util.lib. This logger will in turn be above\
    \ the logger called util.lib.printer. This is illustrated in the following diagram:\n\
    \n![](img/8a661fca3884547aede940b9a6567321_493_0.png)\n\nThe logger name hierarchy\
    \ is analogous to the Python package hierarchy, and identical to it if you organize\
    \ your loggers on a per-module basis using the recommended construction logging.getLogger(__name__).\n\
    \nThis hierarchy is important when considering the log level. If a log level has\
    \ not been set for the current logger then it will look to its parent to see if\
    \ that logger has a log level set. If it does that will be the log level used.\
    \ This search back up the logger hierarchy will continue until either an explicit\
    \ log level is found or the root logger is encountered which has a default log\
    \ level of WARNING.\n\nThis is useful as it is not necessary to explicitly set\
    \ the log level for every logger object used in an application. Instead it is\
    \ only necessary to set the root log level (or for a module hierarchy an appropriate\
    \ point in the module hierarchy). This can then be overridden where specifically\
    \ required.\n\n## Formatting\n\nThere are two levels at which you can format the\
    \ messages logged, these are within the log message passed to a logging method\
    \ (such as info() or warn()) and via the top level configuration that indicates\
    \ what additional information may be added to the individual log message.\n\n\
    ### Formatting Log Messages\n\nThe log message can have control characters that\
    \ indicate what values should be placed within the message, for example:\n\n```\n\
    logger.warning('%s is set to %d', 'count', 42)\n```\n\nThis indicates that the\
    \ format string expects to be given a string and a number. The parameters to be\
    \ substituted into the format string follow the format string as a comma separated\
    \ list of values.\n\n### Formatting Log Output\n\nThe logging pipeline can be\
    \ configured to incorporate standard information with each log message. This can\
    \ be done globally for all handlers. It is also possible to programmatically set\
    \ a specific formatter on an individual handler; this is discussed in the next\
    \ section.\n\nTo globally set the output format for log messages use the logging.basicConfig()\
    \ function using the named parameter format.\n\nThe format parameter takes a string\
    \ that can contain LogRecord attributes organized as you see fit. There is a comprehensive\
    \ list of LogRecord attributes which can be referenced at https://docs.python.org/3/library/logging.html#logrecord-attributes.\
    \ The key ones are:\n\n- args a tuple listing the arguments used to call the associated\
    \ function or method.\n- asctime indicates the time that the log message was created.\n\
    - filename the name of the file containing the log statement.\n- module the module\
    \ name (the name portion of the filename).\n- funcName the name of the function\
    \ or method containing the log statement.\n- levelname the log level of the log\
    \ statement.\n- message the log message itself as provided to the log method.\n\
    \nThe effect of some of these are illustrated below.\n\n```\nimport logging\n\
    logging.basicConfig(format='%(asctime)s %(message)s',\nlevel=logging.DEBUG)\n\
    logger = logging.getLogger(__name__)\ndef do_something():\n    logger.debug('This\
    \ is to help with debugging')\n    logger.info('This is just for information')\n\
    \    logger.warning('This is a warning!')\n    logger.error('This should be used\
    \ with something unexpected')\n    logger.critical('Something serious')\ndo_something()\n\
    ```\n\nThe above program generates the following log statements:\n\n```\n2019-02-20\
    \ 16:50:34,084 This is to help with debugging\n2019-02-20 16:50:34,084 This is\
    \ just for information\n2019-02-20 16:50:34,085 This is a warning!\n2019-02-20\
    \ 16:50:34,085 This should be used with something unexpected\n2019-02-20 16:50:34,085\
    \ Something serious\n```\n\nHowever, it might be useful to know the log level\
    \ associated with the log statements, as well as the function that the log statements\
    \ were called from. It is possible to obtain this information by changing the\
    \ format string passed to the logging.basicConfig() function:\n\n```\nlogging.basicConfig(format='%(asctime)s[%(levelname)s]\
    \ %(funcName)s: %(message)s', level=logging.DEBUG)\n```\n\nWhich will now generate\
    \ the output within log level information and the function involved:\n\n```\n\
    2019-02-20 16:54:16,250[DEBUG] do_something: This is to help with debugging\n\
    2019-02-20 16:54:16,250[INFO] do_something: This is just for information\n2019-02-20\
    \ 16:54:16,250[WARNING] do_something: This is a warning!\n2019-02-20 16:54:16,250[ERROR]\
    \ do_something: This should be used with something unexpected\n2019-02-20 16:54:16,250[CRITICAL]\
    \ do_something: Something serious\n```\n\nWe can even control the format of the\
