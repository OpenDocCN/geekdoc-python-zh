    # Mocking Considerations


    The following provide some rules of thumb to consider when using mocks with your
    tests:


    +   - Don’t over mock—if you do then you can end up just testing the mocks themselves.

    - Decide what to mock, typical examples of what to mock include those elements
    that are not yet available, those elements that are not by default repeatable
    (such as live data feeds) or those elements of the system that are time consuming
    or complex.

    - Decide where to mock such as the interfaces for the unit under test. You want
    to test the unit so any interface it has with another system, function, class
    might be a candidate for a mock.

    - Decide when to mock so that you can determine the boundaries for the test.

    - Decide how you will implement your mocks. For example you need to consider which
    mocking framework(s) you will use or how to mock larger components such as a database


