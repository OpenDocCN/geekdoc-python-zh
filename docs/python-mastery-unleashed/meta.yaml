- md: "## Encoding Books Into JSON\n\nOne issue we have is that although the `jsonify()`\
    \ function knows how to convert builtin types such as strings, integers, lists,\
    \ dictionaries etc. into an appropriate JSON format; it does not know how to do\
    \ this for custom types such as a `Book`. We therefore need to define some way\
    \ of converting a `Book` into an appropriate JSON format.\n\nOne way we could\
    \ do this would be to define a method that can be called to convert an instance\
    \ of the `Book` class into a JSON format. We could call this method `to_json()`.\
    \ For example:\n\n```python\nclass Book:\n    \"\"\"Represents a book in the bookshop\"\
    \"\"\n    def __init__(self, isbn, title, author, price):\n        self.isbn =\
    \ isbn\n        self.title = title\n        self.author = author\n        self.price\
    \ = price\n    def __str__(self):\n        return self.title + ' by ' + self.author\
    \ + ' @ ' + str(self.price)\n    def to_json(self):\n        return {\n      \
    \      'isbn': self.isbn,\n            'title': self.title,\n            'author':\
    \ self.author,\n            'price': self.price\n        }\n```\n\nWe could now\
    \ use this with the `jsonify()` function to convert a book into the JSON format:\n\
    \n```python\njsonify({'book': book.to_json()})\n```\n\nThis approach certainly\
    \ works and provides a very lightweight way to convert a book into JSON.\n\nHowever,\
    \ the approach presented above does mean that every time we want to jsonify a\
    \ book we must remember to call the `to_json()` method. In some cases this means\
    \ that we will also have to write some slightly convoluted code. For example if\
    \ we wish to return a list of books from the `Bookshop` as a JSON list we might\
    \ write:\n\n```python\njsonify({'books': [b.to_json() for b in bookshop.books]})\n\
    ```\n\nHere we have used a list comprehension to generate a list containing the\
    \ JSON versions of the books held in the bookshop. This is starting to look overly\
    \ complex, easy to forget about and probably error prone. Flask itself uses encoders\
    \ to encode types into JSON. Flask provides a way of creating your own encoders\
    \ that can be used to convert a custom type, such as the `Book` class, into JSON.\
    \ Such an encoder can automatically be used by the `jsonify()` function.\n\nTo\
    \ do this we must implement an encoder class; the class will extend the `flask.json.JSONEncoder`\
    \ super class. The class must define a method `default(self, obj)`. This method\
    \ takes an object and returns the JSON representation of that object. We can therefore\
    \ write an encoder for the `Book` class as follows:\n\n```python\nclass BookJSONEncoder(JSONEncoder):\n\
    \    def default(self, obj):\n        if isinstance(obj, Book):\n            return\
    \ {\n                'isbn': obj.isbn,\n                'title': obj.title,\n\
    \                'author': obj.author,\n                'price': obj.price\n \
    \           }\n        else:\n            return super(BookJSONEncoder, self).default(obj)\n\
    ```\n\nThe `default()` method in this class checks that the object passed to it\
    \ is an instance of the class `Book` and if it is then it will create a JSON version\
    \ of the `Book`. This JSON structure is based on the `isbn`, `title`, `author`\
    \ and `price` attributes. If it is not an instance of the `Book` class, then it\
    \ passes the object up to the parent class.\n\nWe can now register this encoder\
    \ with the Flask application object so that it will be used whenever a `Book`\
    \ must be converted into JSON. This is done by assigning the custom encoder to\
    \ the Flask application object via the `app.json_encoder` attribute:\n\n```python\n\
    app = Flask(__name__)\napp.json_encoder = BookJSONEncoder\n```\n\nNow if we wish\
    \ to encode a single book or a list of books the above encoder will be used automatically\
    \ and thus we do not need to do anything else. Thus our earlier examples can be\
    \ written to simply by referencing the book or `bookshop.books` attribute:\n\n\
    ```python\njsonify({'book': book})\njsonify({'books': bookshop.books})\n```\n\n\
    ## Setting Up the GET Services\n\nWe can now set up the two services that will\
    \ support GET requests, these are the `/book/list` and `/book/<isbn>` services.\n\
    \nThe functions that these URLs map to are given below:\n\n```python\n@app.route('/book/list',\
    \ methods=['GET'])\ndef get_books():\n    return jsonify({'books': bookshop.books})\n\
    ```\n\n```python\n@app.route('/book/<int:isbn>', methods=['GET'])\ndef get_book(isbn):\n\
    \    book = bookshop.get(isbn)\n    return jsonify({'book': book})\n```\n\nThe\
    \ first function merely returns the current list of books held by the bookshop\
    \ in a JSON structure using the key `books`. The second function takes an `isbn`\
    \ number as parameter. This is a URL parameter; in other words part of the URL\
    \ used to invoke this function is actually dynamic and will be passed into the\
    \ function. This means that a user can request details of books with different\
    \ ISBNs just by changing the ISBN element of the URL, for example:\n\n- `/book/1`\
    \ will indicate that we want information on the book with the ISBN 1.\n- `/book/2`\
    \ will indicate we want information on the book with ISBN 2.\n\nIn Flask to indicate\
