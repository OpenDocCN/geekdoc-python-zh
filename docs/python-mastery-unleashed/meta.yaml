  md: '# Introduction to Matplotlib


    # Introduction


    Matplotlib is a Python graphing and plotting library that can generate a variety
    of different types of graph or chart in a variety of different formats. It can
    be used to generate line charts, scatter graphs, heat maps, bar charts, pie charts
    and 3D plots. It can even support animations and interactive displays.


    An example of a graph generated using Matplotlib is given below. This shows a
    line chart used to plot a simple sign wave:'
  merge: -1
