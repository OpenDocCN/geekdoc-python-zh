    The pyplot interface simplifies interactions with the internal wrappers by providing
    methods such as plot(), pie(), bar(), title(), savefig(), draw() and figure()
    etc.


    Most of the examples presented in the next chapter will use the functions provided
    by the pyplot module to create the required charts; thereby hiding the lower level
