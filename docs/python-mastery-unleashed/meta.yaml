  mdcn: "## wxPython 用户界面中的事件\n\n## 事件处理\n\n事件是任何图形用户界面（GUI）不可或缺的一部分；它们代表了用户与界面的交互，例如点击按钮、在字段中输入文本、选择菜单选项等。\n\
    \n主事件循环监听事件；当事件发生时，它会处理该事件（通常会导致调用一个函数或方法），然后等待下一个事件的发生。这个循环在 wxPython 中通过调用 `wx.App`\
    \ 对象的 `MainLoop()` 方法来启动。\n\n这就引出了一个问题：“什么是事件？”。事件对象是一段信息，代表了通常与 GUI 发生的某种交互（尽管事件可以由任何东西生成）。事件由事件处理器处理。这是一个在事件发生时被调用的方法或函数。事件作为参数传递给处理器。事件绑定器用于将事件绑定到事件处理器。\n\
    \n## 事件定义\n\n总结事件的定义很有用，因为所使用的术语可能令人困惑且非常相似：\n\n-   **事件** 代表来自底层 GUI 框架的信息，描述了已发生的事情以及任何相关数据。具体可用的数据会因发生的事情而异。例如，如果窗口被移动，那么相关数据将与窗口的新位置有关。而由\
    \ ListBox 的选择操作生成的 `CommandEvent` 则提供所选项目的索引。\n-   **事件循环** 是 GUI 的主处理循环，等待事件发生。当事件发生时，会调用关联的事件处理器。\n\
    -   **事件处理器** 是在事件发生时被调用的方法（或函数）。\n-   **事件绑定器** 将一种事件类型与一个事件处理器关联起来。不同类型的事件有不同的事件绑定器。例如，与\
    \ `wx.MoveEvent` 关联的事件绑定器名为 `wx.EVT_MOVE`。\n\n事件、事件处理器（通过事件绑定器）之间的关系如下图所示：\n\n\
