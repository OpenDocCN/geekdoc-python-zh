    \n## Socket Server模块\n\n在上面的例子中，服务器代码比客户端更复杂；而且这只是一个单线程服务器；如果服务器需要是多线程服务器（即一个可以同时处理来自不同客户端的多个请求的服务器），情况可能会变得复杂得多。\n\
