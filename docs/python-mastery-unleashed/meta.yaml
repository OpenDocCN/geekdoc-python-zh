    # Sequential Access Versus Random Access


    Data can be read from (or indeed written to) a file either sequentially or via
    a random access approach.


    Sequential access to data in a file means that the program reads (or writes) data
    to a file sequentially, starting at the beginning of a file and processing the
    data an item at a time until the end of the file is reached.The read process only
    ever moves forward and only to the next item of data to read.


    Random Access to a data file means that the program can read (or write) data anywhere
    into the file at any time. That is the program can position itself at a particular
    point in the file (or rather a pointer can be positioned within the file) and
    it can then start to read (or write) at that point. If it is reading then it will
    read the next data item relative to the pointer rather than the start of the file.
    If it is writing data then it will write data from that point rather than at the
    end of the file. If there is already data at that point in the file then it will
    be over written. This type of access is also known as Direct Access as the computer
    program needs to know where the data is stored within the file and thus goes directly
    to that location for the'
  - '[PAGE 336]


    data. In some cases the location of the data is recorded in an index and thus
    is also known as indexed access.


    Sequential file access has advantages when a program needs to access information
    in the same order each time the data is read. It is also is faster to read or
    write all the data sequentially than via direct access as there is no need to
    move the file pointer around.


    Random access files however are more flexible as data does not need to be written
    or read in the order in which it is obtained. It is also possible to jump to just
    the location of the data required and read that data (rather than needing to sequentially
    read through all the data to find the data items of interest).


    # Files and I/O in Python


    In the remainder of this section of the book we will explore the basic facilities
    provided for reading and writing files in Python.We will also look at the underlying
    streams model for file I/O. After this we will explore the widely used CSV and
    Excel file formats and libraries available to support those. This section concludes
    by exploring the Regular Expression facilities in Python. While this last topic
    is not strictly part of file I/O it is often used to parse data read from files
    to screen out unwanted information.'
  - '[PAGE 337]


    # Reading and Writing Files


    # Introduction


    Reading data from and writing data to a file is very common within many programs.
    Python provides a large amount of support for working with files of various types.
    This chapter introduces you to the core file IO functionality in Python.


    # Obtaining References to Files


    Reading from, and writing to, text files in Python is relatively straightforward.The
    built in open() function creates a file object for you that you can use to read
    and/ or write data from and/ or to a file.


    The function requires as a minimum the name of the file you want to work with.
    Optionally you can specify the access mode (e.g. read, write, append etc.). If
    you do not specify a mode then the file is open in read-only mode. You can also
    specify whether you want the interactions with the file to be buffered which can
    improve performance by grouping data reads together.'
