    \ In this case the two files are both in the same directory and so we can write:\n\
    \n```\nfrom calculator import Calculator\n```\n\nWe will now define a test,the\
    \ test should be pre-fixed with test_ for PyTest to find them. In fact PyTest\
    \ uses several conventions to find tests, which are:"
  merge: -1
