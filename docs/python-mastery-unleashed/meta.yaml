- md: "## Common Mocking Framework Concepts\n\nAs has been mentioned there are several\
    \ mocking frameworks around for not only Python but other languages such as Java,\
    \ C# and Scala etc. All of these frameworks have a common core behavior. This\
    \ behavior allows a mock function, method or object to be created based on the\
    \ interface presented by the real thing. Of course unlike languages such as C#\
    \ and Java Python does not have a formal interface concept; however this does\
    \ not stop the mocking framework from still using the same idea.\n\nIn general\
    \ once a mock has been created it is possible to define how that mock should appear\
    \ to behave; in general this involves specifying the return result to use for\
    \ a function or method. It is also possible to verify that the mock has been invoked\
    \ as expected with the parameters expected.\n\nThe actual mock can be added to\
    \ a test or a set of tests either programmatically or via some form of decorator.\
    \ In either case for the duration of the test the mock will be used instead of\
    \ the real thing.\n\nAssertions can then be used to verify the results returned\
    \ by the unit under test while mock specific methods are typically used to verify\
    \ (spy on) the methods defined on the mock.\n\n## Mocking Frameworks for Python\n\
    \nDue to Python’s dynamic nature it is well suited to the construction of mock\
    \ functions, methods and objects. In fact there are several widely used mocking\
    \ frameworks available for Python including:\n\n- unittest.mock: The unittest.mock\
    \ (included in the Python distribution from Python 3.3 onwards). This is the default\
    \ mocking library provided with Python for creating mock objects in Python tests.\n\
    - pymox: This is a widely used mocking framework. It is an open source framework\
    \ and has a more complete set of facilities for enforcing the interface of a mocked\
    \ class.\n- Mocktest: This is another popular mocking framework. It has its own\
    \ DSL (Domain Specific Language) to support mocking and a wide set of expectation\
    \ matching behavior for mock objects.\n\nIn the remainder of this chapter we will\
    \ focus on the unittest.mock library as it is provided as part of the standard\
    \ Python distribution.\n\n## The unittest.mock Library\n\nThe standard Python\
    \ mocking library is the unittest.mock library. It has been included in the standard\
    \ Python distribution since Python 3.3 and provides a simple way to define mocks\
    \ for unit tests.\n\nThe key to the unittest.mock library is the Mock class and\
    \ its subclass MagicMock. Mock and MagicMock objects can be used to mock functions,\
    \ methods and even whole classes. These mock objects can have canned responses\
    \ defined so that when they are invoked by the unit under test they will respond\
    \ appropriately. Existing objects can also have attributes or individual methods\
    \ mocked allowing an object to be tested with a known state and specified behavior.\n\
    \nTo make it easy to work with mock objects, the library provides the `@unittest.mock.patch()`\
    \ decorator. This decorator can be used to replace real functions and objects\
    \ with mock instances. The function behind the decorator can also be used as a\
    \ context manager allowing it to be used in with-as statements providing for fine\
    \ grained control over the scope of the mock if required.\n\n## Mock and Magic\
    \ Mock Classes\n\nThe unittest.mock library provides the Mock class and the MagicMock\
    \ class. The Mock class is the base class for mock objects. The MagicMock class\
    \ is a subclass of the Mock class. It is called the MagicMock class as it provides\
    \ default implementations for several magic methods such as `__len__()`, `__str__()`,\
    \ and `__iter__()`.\n\nAs a simple example consider the following class to be\
    \ tested:\n\n```python\nclass SomeClass():\n    def _hidden_method(self):\n  \
    \      return 0\n    def public_method(self, x):\n        return self.hidden_method()\
    \ + x\n```\n\nThis class defines two methods; one is intended as part of the public\
    \ interface of the class (the `public_method()`) and one is intended only for\
    \ internal or private use (the `_hidden_method()`). Notice that the hidden method\
    \ uses the convention of preceding its name by an underbar (`_`).\n\nLet us assume\
    \ that we wish to test the behavior of the `public_method()` and want to mock\
    \ out the `_hidden_method()`.\n\nWe can do this by writing a test that will create\
    \ a mock object and use this in place of the real `_hidden_method()`. We could\
    \ probably use either the Mock class or the MagicMock class for this; however\
    \ due to the additional functionality provided by the MagicMock class it is common\
    \ practice to use that class. We will therefore do the same.\n\nThe test to be\
    \ created will be defined within a method within a test class. The names of the\
    \ test method and the test class are by convention descriptive and thus will describe\
    \ what is being tested, for example:\n\n```python\nfrom unittest.mock import *\n\
    from unittest import TestCase\nfrom unittest import main\n\nclass test_SomeClass_public_interface(TestCase):\n\
    \    def test_public_method(self):\n        test_object = SomeClass()\n      \
    \  # Set up canned response on mock method\n        test_object._hidden_method\
    \ = MagicMock(name='hidden_method')\n        test_object._hidden_method.return_value\
    \ = 10\n        # Test the object\n        result = test_object.public_method(5)\n\
    \        self.assertEqual(15, result, 'return value from public_method incorrect')\n\
    ```\n\nIn this case note that the class being tested is instantiated first. The\
    \ MagicMock is then instantiated and assigned to the name of the method to be\
    \ mocked. This in effect replaces that method for the test_object. The MagicMock\
    \ object is given a name as this helps with treating any issues in the report\
    \ generated by the unittest framework. Following this the canned response from\
    \ the mock version of the `_hidden_method()` is defined; it will always return\
    \ the value 10.\n\nAt this point we have set up the mock to be used for the test\
    \ and are now ready to run the test. This is done in the next line where the `public_method()`\
    \ is called on the test_object with the parameter 5. The result is then stored.\n\
    \nThe test then validates the result to ensure that it is correct; i.e. that the\
    \ returned value is 15.\n\nAlthough this is a very simple example it illustrates\
    \ how a method can be mocked out using the MagicMock class.\n\n## The Patchers\n\
    \nThe `unittest.mock.patch()`, `unittest.mock.patch.object()` and `unittest.mock.patch.dict()`\
    \ decorators can be used to simplify the creation of mock objects.\n\n- The patch\
    \ decorator takes a target for the patch and returns a MagicMock object in its\
    \ place. It can be used as a TestCase method or class decorator. As a class decorator\
    \ it decorates each test method in the class automatically."
  mdcn: "## 常见的模拟框架概念\n\n如前所述，不仅Python，还有Java、C#和Scala等其他语言都存在多种模拟框架。所有这些框架都具有一个共同的核心行为。这种行为允许基于真实对象所呈现的接口来创建模拟函数、方法或对象。当然，与C#和Java等语言不同，Python没有正式的接口概念；然而，这并不妨碍模拟框架仍然使用相同的理念。\n\
    \n通常，一旦创建了模拟对象，就可以定义该模拟对象应如何表现；这通常涉及为函数或方法指定要使用的返回结果。还可以验证模拟对象是否按预期被调用，并使用了预期的参数。\n\
    \n实际的模拟对象可以通过编程方式或通过某种形式的装饰器添加到测试或一组测试中。无论哪种方式，在测试期间，模拟对象都将被用来替代真实对象。\n\n然后可以使用断言来验证被测单元返回的结果，而模拟特定的方法通常用于验证（监视）在模拟对象上定义的方法。\n\
    \n## Python的模拟框架\n\n由于Python的动态特性，它非常适合构建模拟函数、方法和对象。事实上，Python有几种广泛使用的模拟框架，包括：\n\
    \n- unittest.mock：unittest.mock（从Python 3.3开始包含在Python发行版中）。这是Python附带的默认模拟库，用于在Python测试中创建模拟对象。\n\
    - pymox：这是一个广泛使用的模拟框架。它是一个开源框架，具有一套更完整的设施来强制执行模拟类的接口。\n- Mocktest：这是另一个流行的模拟框架。它有自己的DSL（领域特定语言）来支持模拟，并为模拟对象提供了一套广泛的期望匹配行为。\n\
    \n在本章的剩余部分，我们将重点介绍unittest.mock库，因为它作为标准Python发行版的一部分提供。\n\n## unittest.mock库\n\
    \n标准的Python模拟库是unittest.mock库。它自Python 3.3起就包含在标准Python发行版中，并为单元测试定义模拟对象提供了一种简单的方法。\n\
    \nunittest.mock库的关键是Mock类及其子类MagicMock。Mock和MagicMock对象可用于模拟函数、方法甚至整个类。这些模拟对象可以定义预设响应，以便当它们被被测单元调用时，它们会做出适当的响应。现有对象也可以模拟其属性或单个方法，从而允许以已知状态和指定行为来测试对象。\n\
    \n为了方便使用模拟对象，该库提供了`@unittest.mock.patch()`装饰器。此装饰器可用于将真实函数和对象替换为模拟实例。装饰器背后的函数也可以用作上下文管理器，允许在with-as语句中使用，从而在需要时对模拟的作用域进行细粒度控制。\n\
    \n## Mock和MagicMock类\n\nunittest.mock库提供了Mock类和MagicMock类。Mock类是模拟对象的基类。MagicMock类是Mock类的子类。它被称为MagicMock类，因为它为几个魔术方法（如`__len__()`、`__str__()`和`__iter__()`）提供了默认实现。\n\
    \n作为一个简单的例子，考虑以下要测试的类：\n\n```python\nclass SomeClass():\n    def _hidden_method(self):\n\
    \        return 0\n    def public_method(self, x):\n        return self.hidden_method()\
    \ + x\n```\n\n这个类定义了两个方法；一个旨在作为类公共接口的一部分（`public_method()`），另一个仅用于内部或私有使用（`_hidden_method()`）。注意，隐藏方法使用了以下划线（`_`）开头的命名约定。\n\
    \n假设我们希望测试`public_method()`的行为，并希望模拟出`_hidden_method()`。\n\n我们可以通过编写一个测试来实现这一点，该测试将创建一个模拟对象并用它来替代真实的`_hidden_method()`。我们可能可以使用Mock类或MagicMock类来完成此操作；然而，由于MagicMock类提供了额外的功能，通常的做法是使用该类。因此，我们将做同样的事情。\n\
    \n要创建的测试将在测试类的一个方法内定义。测试方法和测试类的名称按照惯例是描述性的，因此将描述正在测试的内容，例如：\n\n```python\nfrom\
    \ unittest.mock import *\nfrom unittest import TestCase\nfrom unittest import\
    \ main\n\nclass test_SomeClass_public_interface(TestCase):\n    def test_public_method(self):\n\
    \        test_object = SomeClass()\n        # Set up canned response on mock method\n\
    \        test_object._hidden_method = MagicMock(name='hidden_method')\n      \
    \  test_object._hidden_method.return_value = 10\n        # Test the object\n \
    \       result = test_object.public_method(5)\n        self.assertEqual(15, result,\
    \ 'return value from public_method incorrect')\n```\n\n在这种情况下，请注意首先实例化被测类。然后实例化MagicMock并将其分配给要模拟的方法的名称。这实际上替换了test_object的该方法。MagicMock对象被赋予一个名称，因为这有助于处理unittest框架生成的报告中的任何问题。接下来，定义了模拟版本的`_hidden_method()`的预设响应；它将始终返回值10。\n\
    \n此时，我们已经设置了用于测试的模拟对象，现在准备运行测试。这在下一行完成，其中在test_object上调用`public_method()`并传入参数5。然后存储结果。\n\
    \n然后测试验证结果以确保其正确；即返回的值是15。\n\n尽管这是一个非常简单的例子，但它说明了如何使用MagicMock类来模拟一个方法。\n\n##\
    \ 补丁工具\n\n`unittest.mock.patch()`、`unittest.mock.patch.object()`和`unittest.mock.patch.dict()`装饰器可用于简化模拟对象的创建。\n\
    \n- patch装饰器接受一个补丁目标，并返回一个MagicMock对象来替代它。它可以用作TestCase方法或类装饰器。作为类装饰器，它会自动装饰类中的每个测试方法。"
