    \ In this case the label shows the string ‘Hello Python’. The StaticText object\
    \ is constructed with reference to its parent container. This is the container\
    \ within which the text will be displayed. In this case the StaticText is being\
    \ displayed directly within the Frame and thus the frame object is its containing\
    \ parent object. In contrast the Frame which is a top level window, does not have\
    \ a parent container.\n\nAlso notice that the frame must be shown (displayed)\
    \ for the user to see it. This is because there might be multiple different windows\
    \ that need to be shown (or hidden) in different situations for an application.\n\
    \nFinally the program starts the applications’ main event loop; within this loop\
    \ the program listens for any user input (such as requesting that the window is\
    \ closed).\n\n## The wx.App Class\n\nThe `wx.App` class represents the application\
    \ and is used to:\n\n- start up the wxPython system and initialize the underlying\
    \ GUI toolkit,\n- set and get application-wide properties,\n- implement the native\
    \ windowing system main message or event loop, and to dispatch events to window\
    \ instances.\n\nEvery wxPython application must have a single `wx.App` instance.\
    \ The creation of all of the UI objects should be delayed until after the `wx.App`\
    \ object has been created in order to ensure that the GUI platform and wxWidgets\
    \ have been fully initialized.\n\nIt is common to subclass the `wx.App` class\
    \ and override methods such as `OnPreInit` and `OnExit` to provide custom behavior.\
    \ This ensures that the required behavior is run at appropriate times. The methods\
    \ that can be overridden for this purpose are:\n\n- `OnPreInit`, This method can\
    \ be overridden to define behaviour that should be run once the application object\
    \ is created, but before the `OnInit` method has been called.\n- `OnInit` This\
    \ is expected to create the applications main window, display that window etc.\n\
    - `OnRun`, This is the method used to start the execution of the main program.\n\
    - `OnExit`, This can be overridden to provide any behavior that should be called\
    \ just before the application exits.\n\nAs an example, if we wish to set up a\
    \ GUI application such that the main frame is initialized and shown after the\
    \ `wx.App` has been instantiated then the safest way is to override the `OnInit()`\
    \ method of the `wx.App` class in a suitable subclass. The method should return\
    \ `True` or `False`; where `True` is used to indicate that processing of the application\
    \ should continue and `False` indicates that the application should terminate\
    \ immediately (usually as the result of some unexpected issue).\n\nAn example\
    \ `wx.App` subclass is shown below:\n\n```python\nclass MainApp(wx.App):\n   \
    \ def OnInit(self):\n        \"\"\"Initialise the main GUI Application\"\"\"\n\
    \        frame = WelcomeFrame()\n        frame.Show()\n        # Indicate whether\
    \ processing should continue or not\n        return True\n```\n\nThis class can\
    \ now be instantiated and the MainLoop started, for example:\n\n```python\n# Run\
    \ the GUI application\napp = MainApp()\napp.MainLoop()\n```\n\nIt is also possible\
    \ to override the `OnExit()` to clean up anything initialized in the `OnInit()`\
    \ method.\n\n## Window Classes\n\nThe window or widget container classes that\
    \ are commonly used within a wxPython application are:\n\n- `wx.Dialog` A Dialog\
    \ is a top level window used for popups where the user has limited ability to\
    \ interact with the window. In many cases the user can only input some data and/or\
    \ accept or decline an option.\n- `wx.Frame` A Frame is a top level window whose\
    \ size and position can be set and can (usually) be controlled by the user.\n\
    - `wx.Panel` Is a container (non top level window) on which controls/widgets can\
    \ be placed. This is often used in conjunction with a Dialog or a Frame to manage\
    \ the positioning of widgets within the GUI.\n\nThe inheritance hierarchy for\
    \ these classes is given below for reference:\n\n![](img/8a661fca3884547aede940b9a6567321_127_0.png)\n\
    \nAs an example of using a Frame and a Panel, the following application creates\
    \ two Panels and displays them within a top level Frame. The background color\
    \ of the Frame is the default grey; while the background color for the first Panel\
    \ is blue and for the second Panel it is red. The resulting display is shown below:\n\
    \n![](img/8a661fca3884547aede940b9a6567321_128_0.png)\n\nThe program that generated\
    \ this GUI is given below:\n\n```python\nimport wx\n\nclass SampleFrame(wx.Frame):\n\
    \    def __init__(self):\n        super().__init__(parent=None, title='Sample\
    \ App', size=(300, 300))\n        # Set up the first Panel to be at position 1,\
    \ 1\n        # (The default) and of size 300 by 100\n        # with a blue background\n\
    \        self.panel1 = wx.Panel(self)\n        self.panel1.SetSize(300, 100)\n\
    \        self.panel1.SetBackgroundColour(wx.Colour(0, 0, 255))\n        # Set\
    \ up the second Panel to be at position 1, 110\n        # and of size 300 by 100\
    \ with a red background\n        self.panel2 = wx.Panel(self)\n        self.panel2.SetSize(1,\
    \ 110, 300, 100)\n        self.panel2.SetBackgroundColour(wx.Colour(255, 0, 0))\n\
    \nclass MainApp(wx.App):\n    def OnInit(self):\n        \"\"\" Initialise the\
    \ main GUI Application\"\"\"\n        frame = SampleFrame()\n        frame.Show()\n\
    \        return True\n\n# Run the GUI application\napp = MainApp()\napp.MainLoop()\n\
    ```\n\nThe `SampleFrame` is a subclass of the `wx.Frame` class; it thus inherits\
    \ all of the functionality of a Top Level Frame (window). Within the `init()`\
    \ method of the `SampleFrame` the super classes `init()` method is called. This\
    \ is used to set the size of the Frame and to give the Frame a title. Note that\
    \ the Frame also indicates that it does not have a parent window.\n\nWhen the\
    \ Panel is created it is necessary to specify the window (or in this case Frame)\
    \ within which it will be displayed. This is a common pattern within wxPython.\n\
    \nAlso note that the `SetSize` method of the Panel class also allows the position\
    \ to be specified and that the Color class is the wxPython Color class.\n\n##\
    \ Widget/Control Classes\n\nAlthough there are very many widgets/controls available\
    \ to the developer, the most commonly used include:\n\n- `wx.Button`/`wx.ToggleButton`/`wx.RadioButton`\
    \ These are widgets that provide button like behavior within a GUI.\n- `wx.TextCtrl`\
    \ This widget allows text to be displayed and edited. It can be a single line\
    \ or multiple line widget depending upon configuration.\n- `wx.StaticText` Used\
    \ to display one or more lines of read-only text. In many libraries this widget\
    \ is known as a label.\n- `wx.StaticLine` A line used in dialogs to separate groups\
    \ of widgets. The line may be vertical or horizontal.\n- `wx.ListBox` This widget\
    \ is used to allow a user to select one option from a list of options.\n- `wx.MenuBar`/`wx.Menu`/`wx.MenuItem`.\
    \ The components that can be used to construct a set of menus for a User Interface.\n\
    - `wx.ToolBar` This widget is used to display a bar of buttons and/or other widgets\
    \ usually placed below the menu bar in a `wx.Frame`.\n\nThe inheritance hierarchy\
    \ of these widgets is given below. Note that they all inherit from the class `Control`\
    \ (hence why they are often referred to as Controls as well as Widgets or GUI\
    \ components).\n\n![](img/8a661fca3884547aede940b9a6567321_131_0.png)\n\nWhenever\
    \ a widget is created it is necessary to provide the container window class that\
    \ will hold it, such as a Frame or a Panel, for example:\n\n```python\nenter_button\
    \ = wx.Button(panel, label='Enter')\n```\n\nIn this code snippet a `wx.Button`\
    \ is being created that will have a label 'Enter' and will be displayed within\
    \ the given Panel.\n\n## Dialogs\n\nThe generic `wx.Dialog` class can be used\
    \ to build any custom dialog you require. It can be used to create modal and modeless\
    \ dialogs:\n\n- A modal dialog blocks program flow and user input on other windows\
    \ until it is dismissed."
  mdcn: "该程序还会创建一个名为 `wx.App()` 的应用程序对象新实例。\n\n每个 wxPython GUI 程序都必须有一个应用程序对象。它相当于许多非\
    \ GUI 应用程序中的 `main()` 函数，因为它会为你运行 GUI 应用程序。它还提供定义启动和关闭操作的默认功能，并且可以被子类化以创建自定义行为。\n\
    \n`wx.StaticText` 类用于创建单行（或多行）标签。在此例中，标签显示字符串 'Hello Python'。StaticText 对象的构造需要引用其父容器。这是将显示文本的容器。在此例中，StaticText\
    \ 直接显示在 Frame 内，因此 frame 对象是其包含的父对象。相比之下，Frame 作为顶级窗口，没有父容器。\n\n还需注意，必须显示（展示）框架，用户才能看到它。这是因为应用程序可能需要在不同情况下显示（或隐藏）多个不同的窗口。\n\
    \n最后，程序启动应用程序的主事件循环；在此循环中，程序监听任何用户输入（例如请求关闭窗口）。\n\n## wx.App 类\n\n`wx.App` 类代表应用程序，用于：\n\
    \n- 启动 wxPython 系统并初始化底层 GUI 工具包，\n- 设置和获取应用程序范围的属性，\n- 实现原生窗口系统主消息或事件循环，并将事件分派到窗口实例。\n\
    \n每个 wxPython 应用程序都必须有一个 `wx.App` 实例。所有 UI 对象的创建都应延迟到 `wx.App` 对象创建之后，以确保 GUI\
    \ 平台和 wxWidgets 已完全初始化。\n\n通常会子类化 `wx.App` 类并重写 `OnPreInit` 和 `OnExit` 等方法以提供自定义行为。这确保了所需行为在适当的时间运行。为此目的可以重写的方法有：\n\
    \n- `OnPreInit`，可以重写此方法以定义在应用程序对象创建后、但在 `OnInit` 方法被调用之前应运行的行为。\n- `OnInit`，预期用于创建应用程序的主窗口、显示该窗口等。\n\
    - `OnRun`，这是用于启动主程序执行的方法。\n- `OnExit`，可以重写此方法以提供在应用程序退出前应调用的任何行为。\n\n例如，如果我们希望设置一个\
    \ GUI 应用程序，使得主框架在 `wx.App` 实例化后初始化并显示，那么最安全的方法是在合适的子类中重写 `wx.App` 类的 `OnInit()`\
    \ 方法。该方法应返回 `True` 或 `False`；其中 `True` 用于指示应继续处理应用程序，`False` 表示应用程序应立即终止（通常是由于某些意外问题）。\n\
    \n下面是一个 `wx.App` 子类的示例：\n\n```python\nclass MainApp(wx.App):\n    def OnInit(self):\n\
    \        \"\"\"Initialise the main GUI Application\"\"\"\n        frame = WelcomeFrame()\n\
    \        frame.Show()\n        # Indicate whether processing should continue or\
    \ not\n        return True\n```\n\n现在可以实例化此类并启动 MainLoop，例如：\n\n```python\n# Run\
    \ the GUI application\napp = MainApp()\napp.MainLoop()\n```\n\n也可以重写 `OnExit()`\
    \ 以清理在 `OnInit()` 方法中初始化的任何内容。\n\n## 窗口类\n\nwxPython 应用程序中常用的窗口或控件容器类有：\n\n- `wx.Dialog`\
    \ 对话框是一个顶级窗口，用于弹出窗口，用户与该窗口的交互能力有限。在许多情况下，用户只能输入一些数据和/或接受或拒绝一个选项。\n- `wx.Frame`\
    \ 框架是一个顶级窗口，其大小和位置可以设置，并且（通常）可以由用户控制。\n- `wx.Panel` 是一个容器（非顶级窗口），可以在其上放置控件/小部件。这通常与对话框或框架结合使用，以管理\
    \ GUI 内小部件的定位。\n\n这些类的继承层次结构如下所示，仅供参考：\n\n![](img/8a661fca3884547aede940b9a6567321_127_0.png)\n\
    \n作为使用 Frame 和 Panel 的示例，以下应用程序创建两个 Panel 并将它们显示在一个顶级 Frame 内。Frame 的背景色是默认的灰色；而第一个\
    \ Panel 的背景色是蓝色，第二个 Panel 的背景色是红色。显示结果如下所示：\n\n![](img/8a661fca3884547aede940b9a6567321_128_0.png)\n\
    \n生成此 GUI 的程序如下：\n\n```python\nimport wx\n\nclass SampleFrame(wx.Frame):\n   \
    \ def __init__(self):\n        super().__init__(parent=None, title='Sample App',\
    \ size=(300, 300))\n        # Set up the first Panel to be at position 1, 1\n\
    \        # (The default) and of size 300 by 100\n        # with a blue background\n\
    \        self.panel1 = wx.Panel(self)\n        self.panel1.SetSize(300, 100)\n\
    \        self.panel1.SetBackgroundColour(wx.Colour(0, 0, 255))\n        # Set\
    \ up the second Panel to be at position 1, 110\n        # and of size 300 by 100\
    \ with a red background\n        self.panel2 = wx.Panel(self)\n        self.panel2.SetSize(1,\
    \ 110, 300, 100)\n        self.panel2.SetBackgroundColour(wx.Colour(255, 0, 0))\n\
    \nclass MainApp(wx.App):\n    def OnInit(self):\n        \"\"\" Initialise the\
