    ## Building Games with pygame


    ### Introduction


    pygame is a cross-platform, free and Open Source Python library designed to make
    building multimedia applications such as games easy. Development of pygame started
    back in October 2000 with pygame version 1.0 being released six months later.
    The version of pygame discussed in this chapter is version 1.9.6. If you have
    a later version check to see what changes have been made to see if they have any
    impact on the examples presented here.


    pygame is built on top of the SDL library. SDL (or Simple Direct media Layer)
    is a cross platform development library designed to provide access to audio, keyboards,
    mouse, joystick and graphics hardware via OpenGL and Direct3D. To promote portability,
    pygame also supports a variety of additional back ends including WinDIB, X11,
    Linux Frame Buffer etc.


    SDL officially supports Windows, Mac OS X, Linux, iOS and Android (although other
    platforms are unofficially supported). SDL itself is written in C and pygame provides
    a wrapper around SDL. However, pygame adds functionality not found in SDL to make
    the creation of graphical or video games easier. These functions include vector
    maths, collision detection, 2D sprite scene graph management, MIDI support, camera,
    pixel array manipulation, transformations, filtering, advanced free type font
    support and drawing.


    The remainder of this chapter introduces pygame, the key concepts; the key modules,
    classes and functions and a very simple first pygame application. The next chapter
    steps through the development of a simple arcade style video game which illustrates
    how a game can be created using pygame.


    ### The Display Surface


    The Display Surface (aka the display) is the most important part of a pygame game.
    It is the main window display of your game and can be of any size, however you
    can only have one Display Surface.


    In many ways the Display Surface is like a blank piece of paper on which you can
    draw. The surface itself is made up of pixels which are numbered from 0,0 in the
    top left hand corner with the pixel locations being indexed in the x axis and
    the y axis. This is shown below:


    ![](img/8a661fca3884547aede940b9a6567321_195_0.png)


    The above diagram illustrates how pixels within a Surface are indexed. Indeed
    a Surface can be used to draw lines, shapes (such as rectangles, squares, circles
    and ellipses), display images, manipulate individual pixels etc. Lines are drawn
    from one pixel location to another (for example from location 0,0 to location
    9,0 which would draw a line across the top of the above display surface). Images
    can be displayed within the display surface given a starting point such as 1,
    1.


    The Display Surface is created by the pygame.display.set_mode() function. This
    function takes a tuple that can be used to specify the size of the Display Surface
    to be returned. For example:


    ```

    display_surface = pygame.display.set_mode((400, 300))

    ```


    This will create a Display Surface (window) of 400 by 300 pixels.


    Once you have the Display Surface you can fill it with an appropriate background
    color (the default is black) however if you want a different background color
    or want to clear everything that has previously been drawn on the surface, then
    you can use the surface''s fill() method:


    ```

    WHITE = (255, 255, 255)

    display_surface.fill(WHITE)

    ```


    The fill method takes a tuple that is used to define a color in terms of Red,
    Green and Blue (or RGB) colors. Although the above examples uses a meaningful
    name for the tuple representing the RGB values used for white; there is of course
    no requirement to do this (although it is considered good practice).


    To aid in performance any changes you make to the Display Surface actually happen
    in the background and will not be rendered onto the actual display that the user
    sees until you call the update() or flip() methods on the surface. For example:


    - pygame.display.update()

    - pygame.display.flip()


    The update() method will redraw the display with all changes made to the display
    in the background. It has an optional parameter that allows you to specify just
    a region of the display to update (this is defined using a Rect which represents
    a rectangular area on the screen). The flip() method always refreshes the whole
    of the display (and as such does exactly the same as the update() method with
    no parameters).


    Another method, which is not specifically a Display Surface method, but which
    is often used when the display surface is created, provides a caption or title
    for the top level window. This is the pygame.display.set_caption() function. For
    example:


    ```

    pygame.display.set_caption(''Hello World'')

    ```


    This will give the top level window the caption (or title) ‘Hello World’.


