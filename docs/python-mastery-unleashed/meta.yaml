    \ Python 模块之周日志页面。\n\n## 高级日志记录\n\n### 简介\n\n在本章中，我们将进一步探讨 Python 日志模块的配置和修改。特别是，我们将研究处理程序（用于确定日志消息的目标）、过滤器（处理程序可以使用过滤器来提供更细粒度的日志输出控制）以及日志记录器配置文件。本章最后我们将考虑与日志记录相关的性能问题。\n\
