    # What is a Stream?


    Streams are objects which serve as sources or sinks of data. At first this concept
    can seem a bit strange. The easiest way to think of a stream is as a conduit of
    data flowing from or into a pool. Some streams read data straight from the “source
    of the data” and some streams read data from other streams. These latter streams
    then do some “useful” processing of the data such as converting the raw data into
    a specific format. The following figure illustrates this idea.


    ![](img/8a661fca3884547aede940b9a6567321_364_0.png)


    In the above figure the initial FileIO stream reads raw data from the actual data
    source (in this case a file). The BufferedReader then buffers the data reading
    process for'
  merge: -1
