  md: 'This can happen for several different reason but a common cause is because
    they return real data. Such real data may be subject to change, for example consider
    a system that uses a data feed for the current exchange rate between funds and
    dollars. If the associated test confirms that a trade when priced in dollars is
    correctly converted to funds using the current exchange rate then that test is
    likely to generate a different result every time it is run. In this situation
    it would lie better to mock out the current exchange rate service so that a fixed/known
