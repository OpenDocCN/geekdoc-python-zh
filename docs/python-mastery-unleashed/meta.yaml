- md: "## Disadvantages of Reactive Programming\n\nIt's easy to overcomplicate things\
    \ when you start to chain operators together. If you use too many operators, or\
    \ too complex a set of functions with the operators, it can become hard to understand\
    \ what is going on.\n\nMany developers think that Reactive programming is inherently\
    \ multi-threaded; this is not necessarily the case; in fact RxPy (the library\
    \ explored in the next two chapters) is single threaded by default. If an application\
    \ needs the behavior to execute asynchronously then it is necessary to explicitly\
    \ indicate this.\n\nAnother issue for some Reactive programming frameworks is\
    \ that it can become memory intensive to store streams of data so that Observers\
    \ can process that data when they are ready.\n\n## The RxPy Reactive Programming\
    \ Framework\n\nThe RxPy library is a part of the larger ReactiveX project and\
    \ provides an implementation of ReactiveX for Python. It is built on the concepts\
    \ of Observables, Observers, Subjects and operators. In this book we use RxPy\
    \ version 3.\n\nIn the next chapter we will discuss Observables, Observers, Subjects\
    \ and subscriptions using the RxPy library. The following chapter will explore\
    \ various RxPy operators.\n\n## Reference\n\nFor more information on the Observer\
    \ Observable design pattern see the \"Patterns\" book by the Gang of Four:\n\n\
    - E. Gamma, R. Helm, R. Johnson, J. Vlissades, Design patterns: elements of reusable\
    \ object-oriented software, Addison-Wesley (1995).\n\n## RxPy Observables, Observers\
    \ and Subjects\n\n### Introduction\n\nIn this chapter we will discuss Observables,\
    \ Observers and Subjects. We also consider how observers may or may not run concurrently.\n\
    \nIn the remainder of this chapter we look at RxPy version 3 which is a major\
    \ update from RxPy version 1 (you will therefore need to be careful if you are\
    \ looking on the web for examples as some aspects have changed; most notably the\
    \ way in which operators are chained).\n\n### Observables in RxPy\n\nAn Observable\
    \ is a Python class that publishes data so that it can be processed by one or\
    \ more Observers (potentially running in separate threads).\n\nAn Observable can\
    \ be created to publish data from static data or from dynamic sources. Observables\
    \ can be chained together to control how and when data is published, to transform\
    \ data before it is published and to restrict what data is actually published.\n\
    \nFor example, to create an Observable from a list of values we can use the `rx.from_list()`\
    \ function. This function (also known as an RxPy operator) is used to create the\
    \ new Observable object:\n\n```python\nimport rx\nObservable = rx.from_list([2,\
    \ 3, 5, 7])\n```\n\n### Observers in RxPy\n\nWe can add an Observer to an Observable\
    \ using the `subscribe()` method. This method can be supplied with a lambda function,\
    \ a named function or an object whose class implements the Observer protocol.\n\
    \nFor example, the simplest way to create an Observer is to use a lambda function:\n\
    \n```python\n# Subscribe a lambda function\nobservable.subscribe(lambda value:\
    \ print('Lambda Received', value))\n```\n\nWhen the Observable publishes data\
    \ the lambda function will be invoked. Each data item published will be supplied\
    \ independently to the function. The output from the above subscription for the\
    \ previous Observable is:\n\n```\nLambda Received 2\nLambda Received 3\nLambda\
    \ Received 5\nLambda Received 7\n```\n\nWe can also have used a standard or named\
    \ function as an Observer:\n\n```python\ndef prime_number_reporter(value):\n \
    \   print('Function Received', value)\n# Subscribe a named function\nobservable.subscribe(prime_number_reporter)\n\
    ```\n\nNote that it is only the name of the function that is used with the `subscribe()`\
    \ method (as this effectively passes a reference to the function into the method).\n\
    \nIf we now run this code using the previous Observable we get:\n\n```\nFunction\
    \ Received 2\nFunction Received 3\nFunction Received 5\nFunction Received 7\n\
    ```\n\nIn actual fact the `subscribe()` method takes four optional parameters.\
    \ These are:\n\n- `on_next`: Action to invoke for each data item generated by\
    \ the Observable.\n- `on_error`: Action to invoke upon exceptional termination\
    \ of the Observable sequence.\n- `on_completed`: Action to invoke upon graceful\
    \ termination of the Observable sequence.\n- `Observer`: The object that is to\
    \ receive notifications. You may subscribe using an Observer or callbacks, not\
    \ both.\n\nEach of the above can be used as positional parameters or as keyword\
    \ arguments, for example:\n\n```python\n# Use lambdas to set up all three functions\n\
    observable.subscribe(\n    on_next = lambda value: print('Received on_next', value),\n\
    \    on_error = lambda exp: print('Error Occurred', exp),\n    on_completed =\
    \ lambda: print('Received completed notification')\n)\n```\n\nThe above code defines\
    \ three lambda functions that will be called depending upon whether data is supplied\
    \ by the Observable, if an error occurs or when the datastream is terminated.\
    \ The output from this is:\n\n```\nReceived on_next 2\nReceived on_next 3\nReceived\
    \ on_next 5\nReceived on_next 7\nReceived completed notification\n```\n\nNote\
    \ that the `on_error` function is not run as no error was generated in this example.\n\
    \nThe final optional parameter to the `subscribe()` method is an Observer object.\
    \ An Observer object can implement the Observer protocol which has the following\
    \ methods `on_next()`, `on_completed()` and `on_error()`, for example:\n\n```python\n\
    class PrimeNumberObserver:\n    def on_next(self, value):\n        print('Object\
    \ Received', value)\n    def on_completed(self):\n        print('Data Stream Completed')\n\
    \    def on_error(self, error):\n        print('Error Occurred', error)\n```\n\
    \nInstances of this class can now be used as an Observer via the `subscribe()`\
    \ method:\n\n```python\n# Subscribe an Observer object\nobservable.subscribe(PrimeNumberObserver())\n\
    ```\n\nThe output from this example using the previous Observable is:\n\n```\n\
    Object Received 2\nObject Received 3\nObject Received 5\nObject Received 7\nData\
    \ Stream Completed\n```\n\nNote that the `on_completed()` method is also called;\
    \ however the `on_error()` method is not called as there were no exceptions generated.\n\
    \nThe Observer class must ensure that the methods implemented adhere to the Observer\
    \ protocol (i.e. That the signatures of the `on_next()`, `on_completed()` and\
    \ `on_error()` methods are correct).\n\n### Multiple Subscribers/Observers\n\n\
    An Observable can have multiple Observers subscribed to it. In this case each\
    \ of the Observers is sent all of the data published by the Observable. Multiple\
    \ Observers can be registered with an Observable by calling the subscribe method\
    \ multiple times. For example, the following program has four subscribers as well\
    \ as `on_error` and `on_completed` function registered:\n\n```python\n# Create\
    \ an observable using data in a list\nobservable = rx.from_list([2, 3, 5, 7])\n\
    \nclass PrimeNumberObserver:\n    \"\"\" An Observer class \"\"\"\n    def on_next(self,\
    \ value):\n        print('Object Received', value)\n    def on_completed(self):\n\
    \        print('Data Stream Completed')\n    def on_error(self, error):\n    \
    \    print('Error Occurred', error)\n\ndef prime_number_reporter(value):\n   \
    \ print('Function Received', value)\n\nprint('Set up Observers / Subscribers')\n\
    # Subscribe a lambda function\nobservable.subscribe(lambda value: print('Lambda\
    \ Received', value))\n# Subscribe a named function\nobservable.subscribe(prime_number_reporter)\n\
    # Subscribe an Observer object\nobservable.subscribe(PrimeNumberObserver())\n\
    # Use lambdas to set up all three functions\nobservable.subscribe(\n    on_next=lambda\
    \ value: print('Received on_next', value),\n    on_error=lambda exp: print('Error\
    \ Occurred', exp),\n    on_completed=lambda: print('Received completed notification')\n\
    )\n```\n\nThe output from this program is:\n\n```\nSet up Observers / Subscribers\n\
    Lambda Received 2\nLambda Received 3\nLambda Received 5\nLambda Received 7\nFunction\
    \ Received 2\nFunction Received 3\nFunction Received 5\nFunction Received 7\n\
    Object Received 2\nObject Received 3\nObject Received 5\nObject Received 7\nData\
    \ Stream Completed\nReceived on_next 2\nReceived on_next 3\nReceived on_next 5\n\
    Received on_next 7\nReceived completed notification\n```\n\nNote how each of the\
    \ subscribers is sent all of the data before the next subscriber is sent their\
    \ data (this is the default single threaded RxPy behavior).\n\n### Subjects in\
    \ RxPy"
  mdcn: "## 响应式编程的缺点\n\n当你开始将操作符链接在一起时，很容易使事情变得过于复杂。如果使用了太多的操作符，或者操作符与过于复杂的函数组合，可能会导致难以理解代码的执行逻辑。\n\
    \n许多开发者认为响应式编程本质上是多线程的；但事实并非如此；实际上，RxPy（接下来两章将探讨的库）默认是单线程的。如果应用程序需要异步执行行为，则必须明确指出这一点。\n\
    \n对于某些响应式编程框架而言，另一个问题是存储数据流可能会消耗大量内存，以便观察者（Observers）能够在准备就绪时处理这些数据。\n\n## RxPy\
    \ 响应式编程框架\n\nRxPy 库是更大的 ReactiveX 项目的一部分，为 Python 提供了 ReactiveX 的实现。它基于可观察对象（Observables）、观察者（Observers）、主题（Subjects）和操作符的概念构建。在本书中，我们使用\
    \ RxPy 版本 3。\n\n在下一章中，我们将使用 RxPy 库讨论可观察对象、观察者、主题和订阅。随后的章节将探讨各种 RxPy 操作符。\n\n##\
    \ 参考资料\n\n有关观察者-可观察对象设计模式的更多信息，请参阅四人组（Gang of Four）的《设计模式》一书：\n\n- E. Gamma, R.\
    \ Helm, R. Johnson, J. Vlissides, Design patterns: elements of reusable object-oriented\
    \ software, Addison-Wesley (1995).\n\n## RxPy 可观察对象、观察者和主题\n\n### 简介\n\n在本章中，我们将讨论可观察对象、观察者和主题。我们还将考虑观察者是否可能并发运行。\n\
    \n在本章的剩余部分，我们将探讨 RxPy 版本 3，这是从 RxPy 版本 1 的重大更新（因此，如果你在网上查找示例，需要小心，因为某些方面已经改变；最显著的是操作符的链接方式）。\n\
    \n### RxPy 中的可观察对象\n\n可观察对象是一个发布数据的 Python 类，以便一个或多个观察者（可能在单独的线程中运行）可以处理这些数据。\n\
    \n可以创建可观察对象来发布来自静态数据或动态源的数据。可观察对象可以链接在一起，以控制数据发布的方式和时间，在发布前转换数据，并限制实际发布的数据。\n\n\
    例如，要从值列表创建可观察对象，我们可以使用 `rx.from_list()` 函数。此函数（也称为 RxPy 操作符）用于创建新的可观察对象：\n\n```python\n\
    import rx\nObservable = rx.from_list([2, 3, 5, 7])\n```\n\n### RxPy 中的观察者\n\n\
    我们可以使用 `subscribe()` 方法将观察者添加到可观察对象。此方法可以提供 lambda 函数、命名函数或其实现了观察者协议的对象。\n\n例如，创建观察者最简单的方法是使用\
    \ lambda 函数：\n\n```python\n# 订阅一个 lambda 函数\nobservable.subscribe(lambda value:\
    \ print('Lambda Received', value))\n```\n\n当可观察对象发布数据时，将调用 lambda 函数。发布的每个数据项将独立提供给该函数。上述订阅对先前可观察对象的输出是：\n\
    \n```\nLambda Received 2\nLambda Received 3\nLambda Received 5\nLambda Received\
    \ 7\n```\n\n我们也可以使用标准或命名函数作为观察者：\n\n```python\ndef prime_number_reporter(value):\n\
    \    print('Function Received', value)\n# 订阅一个命名函数\nobservable.subscribe(prime_number_reporter)\n\
    ```\n\n请注意，`subscribe()` 方法只使用函数的名称（因为这实际上将函数的引用传递给了该方法）。\n\n如果我们现在使用先前的可观察对象运行此代码，将得到：\n\
    \n```\nFunction Received 2\nFunction Received 3\nFunction Received 5\nFunction\
    \ Received 7\n```\n\n实际上，`subscribe()` 方法接受四个可选参数。它们是：\n\n- `on_next`：为可观察对象生成的每个数据项调用的操作。\n\
    - `on_error`：在可观察对象序列异常终止时调用的操作。\n- `on_completed`：在可观察对象序列正常终止时调用的操作。\n- `Observer`：要接收通知的对象。你可以使用观察者或回调进行订阅，但不能同时使用两者。\n\
    \n以上每个参数都可以用作位置参数或关键字参数，例如：\n\n```python\n# 使用 lambda 设置所有三个函数\nobservable.subscribe(\n\
    \    on_next = lambda value: print('Received on_next', value),\n    on_error =\
    \ lambda exp: print('Error Occurred', exp),\n    on_completed = lambda: print('Received\
    \ completed notification')\n)\n```\n\n上面的代码定义了三个 lambda 函数，它们将根据可观察对象是否提供数据、是否发生错误或数据流何时终止而被调用。此代码的输出是：\n\
    \n```\nReceived on_next 2\nReceived on_next 3\nReceived on_next 5\nReceived on_next\
    \ 7\nReceived completed notification\n```\n\n请注意，`on_error` 函数未运行，因为此示例中未发生错误。\n\
    \n`subscribe()` 方法的最后一个可选参数是一个观察者对象。观察者对象可以实现观察者协议，该协议具有以下方法：`on_next()`、`on_completed()`\
    \ 和 `on_error()`，例如：\n\n```python\nclass PrimeNumberObserver:\n    def on_next(self,\
    \ value):\n        print('Object Received', value)\n    def on_completed(self):\n\
    \        print('Data Stream Completed')\n    def on_error(self, error):\n    \
    \    print('Error Occurred', error)\n```\n\n此类的实例现在可以通过 `subscribe()` 方法用作观察者：\n\
    \n```python\n# 订阅一个观察者对象\nobservable.subscribe(PrimeNumberObserver())\n```\n\n\
    使用先前可观察对象的此示例的输出是：\n\n```\nObject Received 2\nObject Received 3\nObject Received\
    \ 5\nObject Received 7\nData Stream Completed\n```\n\n请注意，`on_completed()` 方法也被调用了；但是\
    \ `on_error()` 方法未被调用，因为没有产生异常。\n\n观察者类必须确保实现的方法遵循观察者协议（即 `on_next()`、`on_completed()`\
    \ 和 `on_error()` 方法的签名是正确的）。\n\n### 多个订阅者/观察者\n\n一个可观察对象可以有多个观察者订阅它。在这种情况下，每个观察者都会收到可观察对象发布的所有数据。可以通过多次调用\
    \ subscribe 方法将多个观察者注册到一个可观察对象。例如，以下程序有四个订阅者以及注册的 `on_error` 和 `on_completed`\
    \ 函数：\n\n```python\n# 使用列表中的数据创建一个可观察对象\nobservable = rx.from_list([2, 3, 5, 7])\n\
    \nclass PrimeNumberObserver:\n    \"\"\" 一个观察者类 \"\"\"\n    def on_next(self,\
    \ value):\n        print('Object Received', value)\n    def on_completed(self):\n\
    \        print('Data Stream Completed')\n    def on_error(self, error):\n    \
    \    print('Error Occurred', error)\n\ndef prime_number_reporter(value):\n   \
    \ print('Function Received', value)\n\nprint('Set up Observers / Subscribers')\n\
    # 订阅一个 lambda 函数\nobservable.subscribe(lambda value: print('Lambda Received',\
    \ value))\n# 订阅一个命名函数\nobservable.subscribe(prime_number_reporter)\n# 订阅一个观察者对象\n\
    observable.subscribe(PrimeNumberObserver())\n# 使用 lambda 设置所有三个函数\nobservable.subscribe(\n\
    \    on_next=lambda value: print('Received on_next', value),\n    on_error=lambda\
    \ exp: print('Error Occurred', exp),\n    on_completed=lambda: print('Received\
    \ completed notification')\n)\n```\n\n此程序的输出是：\n\n```\nSet up Observers / Subscribers\n\
    Lambda Received 2\nLambda Received 3\nLambda Received 5\nLambda Received 7\nFunction\
    \ Received 2\nFunction Received 3\nFunction Received 5\nFunction Received 7\n\
    Object Received 2\nObject Received 3\nObject Received 5\nObject Received 7\nData\
    \ Stream Completed\nReceived on_next 2\nReceived on_next 3\nReceived on_next 5\n\
    Received on_next 7\nReceived completed notification\n```\n\n请注意，在下一个订阅者收到数据之前，每个订阅者都收到了所有数据（这是默认的单线程\
    \ RxPy 行为）。\n\n### RxPy 中的主题"
