    Games programming is performed by developers/coders who implement the logic that
    drives a game.


    Historically games developers did everything; they wrote the code, designed the
    sprites and icons, handled the game play, dealt with sounds and music, generated
    any animations required etc. However, as the game industry has matured games companies
    have developed specific roles including Computer Graphics (CG) animators, artists,
    games developers and games engine and physics engine developers etc.


