- md: "Associated with the log level that a message is logged with, a logger also\
    \ has a log level associated with it. The logger will process all messages that\
    \ are at the logger's log level or above that level. Thus if a logger has a log\
    \ level of WARNING then it will log all messages logged using the warning, error\
    \ and critical log levels.\n\nGenerally speaking, an application will not use\
    \ the DEBUG level in a production system. This is usually considered inappropriate\
    \ as it is only intended for debug scenarios. The INFO level may be considered\
    \ appropriate for a production system although it is likely to produce large amounts\
    \ of information as it typically traces the execution of functions and methods.\
    \ If an application has been well tested and verified then it is only really warnings\
    \ and errors which should occur/be of concern. It is therefore not uncommon to\
    \ default to the WARNING level for production systems (indeed this is why the\
    \ default log level is set to WARNING within the Python logging system).\n\nIf\
    \ we now look at the following code that obtains the default logger object and\
    \ then uses several different logger methods, we can see the effect of the log\
    \ levels on the output:\n\n```python\nimport logging\nlogger = logging.getLogger()\n\
    logger.debug('This is to help with debugging')\nlogger.info('This is just for\
    \ information')\nlogger.warning('This is a warning!')\nlogger.error('This should\
    \ be used with something unexpected')\nlogger.critical('Something serious')\n\
    ```\n\nThe default log level is set to warning, and thus only messages logged\
    \ at the warning level or above will be printed out:\n\n```\nThis is a warning!\n\
    This should be used with something unexpected\nSomething serious\n```\n\nAs can\
    \ be seen from this, the messages logged at the debug and info level have been\
    \ ignored.\n\nHowever, the Logger object allows us to change the log level programmatically\
    \ using the setLevel() method, for example `logger.setLevel(logging.DEBUG)` or\
    \ via the `logging.basicConfig(level = logging.DEBUG)` function; both of these\
    \ will set the logging level to DEBUG. Note that the log level must be set before\
    \ the logger is obtained.\n\nIf we add one of the above approaches to setting\
    \ the log level to the previous program we will change the amount of log information\
    \ generated:\n\n```python\nimport logging\nlogging.basicConfig(level=logging.DEBUG)\n\
    logger = logging.getLogger()\nlogger.warning('This is a warning!')\nlogger.info('This\
    \ is just for information')\nlogger.debug('This is to help with debugging')\n\
    logger.error('This should be used with something unexpected')\nlogger.critical('Something\
    \ serious')\n```\n\nThis will now output all the log messages as debug is the\
    \ lowest logging level. We can of course turn off logging by setting the log level\
    \ to NOTSET:\n\n```python\nlogger.setLevel(logging.NOTSET)\n```\n\nAlternatively\
    \ you can set the Logger's disabled attribute to True:\n\n```python\nlogging.Logger.disabled\
    \ = True\n```\n\n## Logger Methods\n\nThe Logger class provides a number of methods\
    \ that can be used to control what is logged including:\n\n- `setLevel(level)`\
    \ Sets this logger's log level.\n- `getEffectiveLevel()` Returns this logger's\
    \ log level.\n- `isEnabledFor(level)` Checks to see if this logger is enabled\
    \ for the log level specified.\n- `debug(message)` logs messages at the debug\
    \ level.\n- `info(message)` logs messages at the info level.\n- `warning(message)`\
    \ logs messages at the warning level.\n- `error(message)` logs messages at the\
    \ error level.\n- `critical(message)` logs messages at the critical level.\n-\
    \ `exception(message)` This method logs a message at the error level. However,\
    \ it can only be used within an exception handler and includes a stack trace of\
    \ any associated exception, for example:\n\n```python\nimport logging\nlogger\
    \ = logging.getLogger()\ntry:\n    print('starting')\n    x = 1 / 0\n    print(x)\n\
    except:\n    logger.exception('an exception message')\nprint('Done')\n```\n\n\
    - `log(level, message)` logs messages at the log level specified as the first\
    \ parameter.\n\nIn addition there are several methods that are used to manage\
    \ handlers and filters:\n\n- `addFilter(filter)` This method adds the specified\
    \ filter to this logger.\n- `removeFilter(filter)` The specified filter is removed\
    \ from this logger object.\n- `addHandler(handler)` The specified handler is added\
    \ to this logger.\n- `removeHandler(handler)` Removes the specified handler from\
    \ this logger.\n\n## Default Logger\n\nA default (or root) logger is always available\
    \ from the logging framework. This logger can be accessed via the functions defined\
    \ in the logging module. These functions allow messages to be logged at different\
    \ levels using methods such as info(), error(), warning() but without the need\
    \ to obtain a reference to a logger object first. For example:\n\n```python\n\
    import logging\n# Set the root logger level\nlogging.basicConfig(level=logging.DEBUG)\n\
    # Use root (default) logger\nlogging.debug('This is to help with debugging')\n\
    logging.info('This is just for information')\nlogging.warning('This is a warning!')\n\
    logging.error('This should be used with something unexpected')\nlogging.critical('Something\
    \ serious')\n```\n\nThis example sets the logging level for the root or default\
    \ logger to DEBUG (the default is WARNING). It then uses the default logger to\
    \ generate a range of log messages at different levels (from DEBUG up to CRITICAL).\
    \ The output from this program is given below:\n\n```\nDEBUG:root:This is to help\
    \ with debugging\nINFO:root:This is just for information\nWARNING:root:This is\
    \ a warning!\nERROR:root:This should be used with something unexpected\nCRITICAL:root:Something\
    \ serious\n```\n\nNote that the format used by default with the root logger prints\
    \ the log level, the name of the logger generating the output and the message.\
    \ From this you can see that it is the root logger that is generating the output.\n\
    \n## Module Level Loggers\n\nMost modules will not use the root logger to log\
    \ information, instead they will use a named or module level logger. Such a logger\
    \ can be configured independently of the root logger. This allows developers to\
    \ turn on logging just for a module rather than for a whole application. This\
    \ can be useful if a developer wishes to investigate an issue that is located\
    \ within a single module.\n\nPrevious code examples in this chapter have used\
    \ the getLogger() function with no parameters to obtain a logger object, for example:\n\
    \n```python\nlogger = logging.getLogger()\n```\n\nThis is really just another\
    \ way of obtaining a reference to the root logger which is used by the stand alone\
    \ logging functions such as logging.info(), logging.debug() function, thus:\n\n\
    ```python\nlogging.warning('my warning')\n```\n\nand\n\n```python\nlogger = logging.getLogger()\n\
    logger.warning('my warning')\n```\n\nHave exactly the same effect; the only difference\
    \ is that the first version involves less code.\n\nHowever, it is also possible\
    \ to create a named logger. This is a separate logger object that has its own\
    \ name and can potentially have its own log level, handlers and formatters etc.\
    \ To obtain a named logger pass a name string into the getLogger() method:\n\n\
    ```python\nlogger1 = logging.getLogger('my logger')\n```\n\nThis returns a logger\
    \ object with the name 'my logger'. Note that this may be a brand new logger object,\
    \ however if any other code within the current system has previously requested\
    \ a logger called 'my logger' then that logger object will be returned to the\
    \ current code. Thus multiple calls to getLogger() with the same name will always\
    \ return a reference to the same Logger object.\n\nIt is common practice to use\
    \ the name of the module as the name of the logger; as only one module with a\
    \ specific name should exist within any specific system. The name of the module\
    \ does not need to be hard coded as it can be obtained using the `__name__` attribute,\
    \ it is thus common to see:\n\n```python\nlogger2 = logging.getLogger(__name__)\n\
    ```\n\nWe can see the effect of each of these statements by printing out each\
    \ logger:\n\n```python\nlogger = logging.getLogger()\nprint('Root logger:', logger)\n\
    logger1 = logging.getLogger('my logger')\nprint('Named logger:', logger1)\nlogger2\
    \ = logging.getLogger(__name__)\nprint('Module logger:', logger2)\n```\n\nWhen\
    \ the above code is run the output is:\n\n```\nRoot logger: <RootLogger root (WARNING)>\n\
    Named logger: <Logger my logger (WARNING)>\nModule logger: <Logger main (WARNING)>\n\
    ```\n\nThis shows that each logger has their own name (the code was run in the\
    \ main module and thus the module name was main)."
  mdcn: "与消息记录的日志级别相关联，日志记录器（Logger）本身也关联着一个日志级别。日志记录器会处理所有处于其日志级别或更高级别的消息。因此，如果一个日志记录器的日志级别设置为\
    \ WARNING，那么它将记录所有使用 warning、error 和 critical 日志级别记录的消息。\n\n一般来说，应用程序在生产系统中不会使用\
    \ DEBUG 级别。这通常被认为是不合适的，因为它仅用于调试场景。INFO 级别可能被认为适用于生产系统，尽管它可能会产生大量信息，因为它通常跟踪函数和方法的执行。如果一个应用程序经过了充分的测试和验证，那么真正应该发生或需要关注的就只有警告和错误。因此，在生产系统中默认使用\
    \ WARNING 级别并不少见（事实上，这就是为什么 Python 日志系统中的默认日志级别设置为 WARNING）。\n\n如果我们现在查看以下代码，该代码获取默认的日志记录器对象，然后使用几种不同的日志记录器方法，我们可以看到日志级别对输出的影响：\n\
    \n```python\nimport logging\nlogger = logging.getLogger()\nlogger.debug('This\
    \ is to help with debugging')\nlogger.info('This is just for information')\nlogger.warning('This\
    \ is a warning!')\nlogger.error('This should be used with something unexpected')\n\
    logger.critical('Something serious')\n```\n\n默认日志级别设置为 warning，因此只有在 warning 级别或更高级别记录的消息才会被打印出来：\n\
    \n```\nThis is a warning!\nThis should be used with something unexpected\nSomething\
    \ serious\n```\n\n由此可见，以 debug 和 info 级别记录的消息已被忽略。\n\n然而，Logger 对象允许我们通过 `setLevel()`\
    \ 方法以编程方式更改日志级别，例如 `logger.setLevel(logging.DEBUG)`，或者通过 `logging.basicConfig(level\
    \ = logging.DEBUG)` 函数；这两种方法都会将日志级别设置为 DEBUG。请注意，必须在获取日志记录器之前设置日志级别。\n\n如果我们在前面的程序中添加上述设置日志级别的方法之一，我们将改变生成的日志信息量：\n\
    \n```python\nimport logging\nlogging.basicConfig(level=logging.DEBUG)\nlogger\
    \ = logging.getLogger()\nlogger.warning('This is a warning!')\nlogger.info('This\
    \ is just for information')\nlogger.debug('This is to help with debugging')\n\
    logger.error('This should be used with something unexpected')\nlogger.critical('Something\
    \ serious')\n```\n\n现在这将输出所有日志消息，因为 debug 是最低的日志级别。当然，我们可以通过将日志级别设置为 NOTSET 来关闭日志记录：\n\
    \n```python\nlogger.setLevel(logging.NOTSET)\n```\n\n或者，你可以将 Logger 的 disabled\
    \ 属性设置为 True：\n\n```python\nlogging.Logger.disabled = True\n```\n\n## 日志记录器方法\n\
    \nLogger 类提供了许多可用于控制记录内容的方法，包括：\n\n- `setLevel(level)` 设置此日志记录器的日志级别。\n- `getEffectiveLevel()`\
    \ 返回此日志记录器的日志级别。\n- `isEnabledFor(level)` 检查此日志记录器是否为指定的日志级别启用。\n- `debug(message)`\
    \ 记录 debug 级别的消息。\n- `info(message)` 记录 info 级别的消息。\n- `warning(message)` 记录 warning\
    \ 级别的消息。\n- `error(message)` 记录 error 级别的消息。\n- `critical(message)` 记录 critical\
    \ 级别的消息。\n- `exception(message)` 此方法在 error 级别记录一条消息。但是，它只能在异常处理程序中使用，并包含任何相关异常的堆栈跟踪，例如：\n\
    \n```python\nimport logging\nlogger = logging.getLogger()\ntry:\n    print('starting')\n\
    \    x = 1 / 0\n    print(x)\nexcept:\n    logger.exception('an exception message')\n\
    print('Done')\n```\n\n- `log(level, message)` 记录第一个参数指定的日志级别的消息。\n\n此外，还有几种用于管理处理器（handlers）和过滤器（filters）的方法：\n\
    \n- `addFilter(filter)` 此方法将指定的过滤器添加到此日志记录器。\n- `removeFilter(filter)` 从此日志记录器对象中移除指定的过滤器。\n\
    - `addHandler(handler)` 将指定的处理器添加到此日志记录器。\n- `removeHandler(handler)` 从此日志记录器中移除指定的处理器。\n\
    \n## 默认日志记录器\n\n日志框架始终提供一个默认（或根）日志记录器。可以通过 logging 模块中定义的函数访问此日志记录器。这些函数允许使用 info()、error()、warning()\
    \ 等方法在不同级别记录消息，而无需首先获取对日志记录器对象的引用。例如：\n\n```python\nimport logging\n# Set the\
    \ root logger level\nlogging.basicConfig(level=logging.DEBUG)\n# Use root (default)\
    \ logger\nlogging.debug('This is to help with debugging')\nlogging.info('This\
    \ is just for information')\nlogging.warning('This is a warning!')\nlogging.error('This\
    \ should be used with something unexpected')\nlogging.critical('Something serious')\n\
    ```\n\n此示例将根或默认日志记录器的日志级别设置为 DEBUG（默认为 WARNING）。然后它使用默认日志记录器生成一系列不同级别（从 DEBUG\
    \ 到 CRITICAL）的日志消息。此程序的输出如下所示：\n\n```\nDEBUG:root:This is to help with debugging\n\
    INFO:root:This is just for information\nWARNING:root:This is a warning!\nERROR:root:This\
    \ should be used with something unexpected\nCRITICAL:root:Something serious\n\
    ```\n\n请注意，根日志记录器默认使用的格式打印日志级别、生成输出的日志记录器名称和消息。由此你可以看出，是根日志记录器在生成输出。\n\n## 模块级日志记录器\n\
    \n大多数模块不会使用根日志记录器来记录信息，而是使用命名的或模块级的日志记录器。这样的日志记录器可以独立于根日志记录器进行配置。这允许开发者仅为某个模块而不是整个应用程序开启日志记录。如果开发者希望调查位于单个模块内的问题，这会很有用。\n\
    \n本章前面的代码示例使用了不带参数的 `getLogger()` 函数来获取日志记录器对象，例如：\n\n```python\nlogger = logging.getLogger()\n\
    ```\n\n这实际上是获取对根日志记录器引用的另一种方式，该根日志记录器被独立的日志记录函数（如 logging.info()、logging.debug()\
    \ 函数）使用，因此：\n\n```python\nlogging.warning('my warning')\n```\n\n和\n\n```python\n\
    logger = logging.getLogger()\nlogger.warning('my warning')\n```\n\n具有完全相同的效果；唯一的区别是第一种版本涉及的代码更少。\n\
    \n然而，也可以创建一个命名的日志记录器。这是一个独立的日志记录器对象，它有自己的名称，并且可能拥有自己的日志级别、处理器和格式化器等。要获取命名的日志记录器，请向\
    \ `getLogger()` 方法传入一个名称字符串：\n\n```python\nlogger1 = logging.getLogger('my logger')\n\
    ```\n\n这将返回一个名为 'my logger' 的日志记录器对象。请注意，这可能是一个全新的日志记录器对象，但是，如果当前系统中的任何其他代码之前请求过名为\
    \ 'my logger' 的日志记录器，那么该日志记录器对象将被返回给当前代码。因此，使用相同名称多次调用 `getLogger()` 将始终返回对同一个\
    \ Logger 对象的引用。\n\n通常的做法是使用模块的名称作为日志记录器的名称；因为在任何特定系统中，应该只存在一个具有特定名称的模块。模块的名称不需要硬编码，因为它可以使用\
    \ `__name__` 属性获取，因此常见写法是：\n\n```python\nlogger2 = logging.getLogger(__name__)\n\
    ```\n\n我们可以通过打印每个日志记录器来查看每条语句的效果：\n\n```python\nlogger = logging.getLogger()\n\
    print('Root logger:', logger)\nlogger1 = logging.getLogger('my logger')\nprint('Named\
    \ logger:', logger1)\nlogger2 = logging.getLogger(__name__)\nprint('Module logger:',\
    \ logger2)\n```\n\n运行上述代码时，输出为：\n\n```\nRoot logger: <RootLogger root (WARNING)>\n\
    Named logger: <Logger my logger (WARNING)>\nModule logger: <Logger main (WARNING)>\n\
    ```\n\n这表明每个日志记录器都有自己的名称（代码在 main 模块中运行，因此模块名称是 main）。"
