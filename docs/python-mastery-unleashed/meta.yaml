    we are looking for zero or more times Python is in a string |

    | + | One or more occurrences of preceding pattern | "info+" indicates that we
    must find info in the string at least once |

    | ? | Indicates zero or 1 occurrences of the preceding pattern | "john?" indicates
    zero or one instances of the ''John'' |

    | {} | Exactly the specified number of occurrences | "John{3}" this indicates
    we expect to see the ''John'' in the string three times. "X{1,2}" indicates that
    there can be one or two Xs next to each other in the string |

    | | | Either or | "True|OK" indicates we are looking for either True or OK |

    | () | Groups together a regular expression; you can then apply another operator
    to the whole group | "(abc|xyz){2}" indicates that we are looking for the string
    abc or xyz repeated twice |


