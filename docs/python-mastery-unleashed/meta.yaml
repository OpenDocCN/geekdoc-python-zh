  md: '# Formatting Log Output


    The logging pipeline can be configured to incorporate standard information with
    each log message. This can be done globally for all handlers. It is also possible
    to programmatically set a specific for matter on a individual handler;this is
    discussed in the next section.


    To globally set the output format for log messages use the logging. basicConfig()
    function using the named parameter format.


    The format parameter takes a string that can contain LogRecord attributes organized
    as you see fit. There is a comprehensive list of LogRecord attributes which can
    be referenced at https://docs.python.org/3/library/logging.html#logrecord-attributes.
    The key ones are:


    +   - args a tuple listing the arguments used to call the associated function
    or method.

    - asctime indicates the time that the log message was created.

    - filename the name of the file containing the log statement.

    - module the module name (the name portion of the filename).'
