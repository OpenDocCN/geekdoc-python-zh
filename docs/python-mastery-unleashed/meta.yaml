  md: '# The unittest.mock Library


    The standard Python mocking library is the unittest.mock library. It has been
    included in the standard Python distribution since Python3.3 and provides a simple
    way to define mocks for unit tests.


    The key to the unittest.mock library is the Mock class and its subclass MagicMock.
    Mock and MagicMock objects can be used to mock functions, methods and even whole
    classes. These mock objects can have canned responses defined so that when they
    are involved by the unit under test they will respond appropriately. Existing
    objects can also have attributes or individual methods mocked allowing an object
    to be tested with a known state and specified behavior.


    To make it easy to work with mock objects, the library provides the [@unittest.mock.patch()](https://docs.python.org/3/library/unittest.mock.html#patch)
    decorator. This decorator can be used to replace real functions and objects with
    mock instances. The function behind the decorator can also be used as a context
    manager allowing it to be used in with-as statements providing for fine grained
    control over the scope of the mock if required.


