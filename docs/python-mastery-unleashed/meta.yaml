    It is useful to consider what data can be/should be presented using a pie chart.
    In general pie charts are useful for displaying data that can be classified into
    nominal or ordinal categories. Nominal data is categorized according to descriptive
    or qualitative information such as program languages, type of car, country of
    birth etc. Ordinal data is similar but the categories can also be ranked,for example
    in a survey people may be asked to say whether they classed something as very
    poor, poor, fair, good, very good.


    Pie charts can also be used to show percentage or proportional data and usually
    the percentage represented by each category is provided next to the corresponding
    slice of pie.


    Pie charts are also typically limited to presenting data for six or less categories.
    When there are more categories it is difficult for the eye to distinguish between
    the relative sizes of the different sectors and so the chart becomes difficult
    to interpret.'
