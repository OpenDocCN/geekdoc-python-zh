  md: '# The Concurrent Queue Class


    As might be expected the model where a producer Thread or Process generates data
    to be processed by one or more Consumer Threads or Processes is so common that
    a higher level abstraction is provided in Python than the use of Locks, Conditions
    or Semaphores; this is the blocking queue model implemented by the threading.Queue
    or multiprocessing.Queue classes.


    Both these Queue classes are Thread and Process safe. That is they work appropriately
    (using internal locks) to manage data access from concurrent Threads or Processes.


    An example of using a Queue to exchange data between a worker process and the
    main process is shown below.


    The worker process executes the worker() function sleeping, for 2 s before putting
    a string ‘Hello World’ on the queue. The main application function sets up the
    queue and creates the process. The queue is passed into the process as one of
    its arguments. The process is then started. The main process then waits until
    data is available on the queue via the (blocking) get() methods. Once the data
    is available it is retrieved and printed out before the main process terminates.'
