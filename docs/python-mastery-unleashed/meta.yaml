- md: "## The Async and Await Keywords\n\nThe async keyword, introduced in Python\
    \ 3.7, is used to mark a function as being something that uses the await keyword\
    \ (we will come back to this below as there is one other use of the async keyword).\
    \ A function that uses the await keyword can be run as a separate task and can\
    \ give up control of the processor when it calls await against another async function\
    \ and must wait for that function to complete. The invoked async function can\
    \ then run as a separate task etc.\n\nTo invoke an async function it is necessary\
    \ to start the Async IO Event Loop and for that function to be treated as a task\
    \ by the Event Loop. This is done by calling the asyncio.run() method and passing\
    \ in the root async function.\n\nThe asyncio.run() function was introduced in\
    \ Python 3.7 (older versions of Python such as Python 3.6 required you to explicitly\
    \ obtain a reference to the Event Loop and to run the root async function via\
    \ that). One point to note about this function is that it has been marked as being\
    \ provisional in Python 3.7. This means that future versions of Python may or\
    \ may not support the function or may modify the function in some way. You should\
    \ therefore check the documentation for the version of Python you are using to\
    \ see whether the run method has been altered or not.\n\n## Using Async and Await\n\
    \nWe will examine a very simple Async IO program from the top down. The main()\
    \ function for the program is given below:\n\n```python\ndef main():\n    print('Main\
    \ - Starting')\n    asyncio.run(do_something())\n    print('Main - Done')\n\n\
    if __name__ == '__main__':\n    main()\n```\n\nThe main() function is the entry\
    \ point for the program and calls:\n\n```python\nasyncio.run(do_something())\n\
    ```\n\nThis starts the Async IO Event Loop running and results in the do_something()\
    \ function being wrapped up in a Task that is managed by the loop. Note that you\
    \ do not explicitly create a Task in Async IO; they are always created by some\
    \ function however it is useful to be aware of Tasks as you can interact with\
    \ them to check their status or to retrieve a result.\n\nThe do_something() function\
    \ is marked with the keyword async:\n\n```python\nasync def do_something():\n\
    \    print('do_something - will wait for worker')\n    result = await worker()\n\
    \    print('do_something - result:', result)\n```\n\nAs previously mentioned this\
    \ indicates that it can be run as a separate Task and that it can use the keyword\
    \ await to wait for some other function or behavior to complete. In this case\
    \ the do_something() asynchronous function must wait for the worker() function\
    \ to complete.\n\nThe await keyword does more than merely indicate that the do_something()\
    \ function must wait for the worker to complete. It triggers another Task to be\
    \ created that will execute the worker() function and releases the processor allowing\
    \ the Event Loop to select the next task to execute (which may or may not be the\
    \ task running the worker() function). The status of the do_something task is\
    \ now waiting while the status of the worker() task is ready (to run).\n\nThe\
    \ code for the worker task is given below:\n\n```python\nasync def worker():\n\
    \    print('worker - will take some time')\n    time.sleep(3)\n    print('worker\
    \ - Done it')\n    return 42\n```\n\nThe async keyword again indicates that this\
    \ function can be run as a separate task. However, this time the body of the function\
