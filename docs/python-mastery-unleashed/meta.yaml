    The modules contain a variety of schedulers including those listed below.


    The following schedulers are available in the rx.concurrency module:


    +   - ImmediateScheduler This schedules an action for immediate execution.

    - CurrentThreadScheduler This schedules activity for the current thread.

    - TimeoutScheduler This scheduler works via a timed callback.

    - NewThreadSchedulercreates a scheduler for each unit of work on a separate thread.

    - ThreadPoolScheduler. This is a scheduler that utilizes a thread pool to execute
    work. This scheduler can act as a way of throttling the amount of work carried
    out concurrently.


    The rx.concurrency.mainloopschduler module also defines the following schedulers:'
  - '[PAGE 666]


    +   - IOLoopScheduler A scheduler that schedules work via the Tornado I/O main
    event loop.

    - PyGameScheduler A scheduler that schedules works for PyGame.

    - WxScheduler A schedulerfor a wxPython event loop.


    # Try


    Given the following set of tuples representing Stock/Equity prices:


    ```

    stocks = ((''APPL'', 12.45), (''IBM'', 15.55), (''MSFT'', 5.66), (''APPL'', 13.33))

    ```


    Write a program that will create an Observable based on the stocks data. Next
    subscribe three different observers to the Observable. The first should print
    out the stock price, the second should print out the name of the stock and the
    third should print out the entire tuple.'
- md: "## RxPy Operators\n\n## Introduction\n\nIn this chapter we will look at the\
    \ types of operator provided by RxPy that can be applied to the data emitted by\
    \ an Observable.\n\n## Reactive Programming Operators\n\nBehind the interaction\
    \ between an Observable and an Observer is a data stream. That is the Observable\
    \ supplies a data stream to an Observer that consumes/ processes that stream.\
    \ It is possible to apply an operator to this data stream that can be used to\
    \ filter, transform and generally refine how and when the data is supplied to\
    \ the Observer.\n\nThe operators are mostly defined in the rx.operators module,\
    \ for example rx.operators.average(). However it is common to use an alias for\
    \ this such that the operators module is called op, such as **from rx import operators\
    \ as op**. This allows for a short hand form to be used when referencing an operator,\
    \ such as op.average().\n\nMany of the RxPy operators execute a function which\
    \ is applied to each of the data items produced by an Observable. Others can be\
    \ used to create an initial Observable (indeed you have already seen these operators\
    \ in the form of the from_list() operator). Another set of operators can be used\
    \ to generate a result based on data produced by the Observable (such as the sum()\
    \ operator).\n\nIn fact RxPy provides a wide variety of operators and these operators\
    \ can be categorized as follows:\n\n- Creational,\n- Transformational,\n- Combinatorial,\n\
    - Filters,\n- Error handlers,\n- Conditional and Boolean operators,\n- Mathematical,\n\
    - Connectable.\n\nExamples of some of these categories are presented in the rest\
    \ of this section.\n\n## Piping Operators\n\nTo apply an operator other than a\
    \ creational operator to an Observable it is necessary to create a pipe. A Pipe\
    \ is essentially a series of one or more operations that can be applied to the\
    \ data stream generated by the Observable. The result of applying the pipe is\
    \ that a new data stream is generated that represents the results produced following\
    \ the application of each operator in turn. This is illustrated below:\n\n![](img/8a661fca3884547aede940b9a6567321_669_0.png)\n\
    \nTo create a pipe the Observable.pipe() method is used. This method takes a comma\
    \ delimited list of one or more operators and returns a data stream. Observers\
    \ can then subscribe to the pipe’s data stream. This can be seen in the examples\
    \ given in the rest of this chapter for transformations, filters, mathematical\
    \ operators etc.\n\n## Creational Operators\n\nYou have already seen an example\
    \ of a creational operator in the examples presented earlier in this chapter.\
    \ This is because the rx.from_list() operator is an example of a creational operator.\
    \ It is used to create a new Observable based on data held in a list like structure.\n\
    \nA more generic version of from_list() is the from_() operator. This operator\
    \ takes an iterable and generates an Observable based on the data provided by\
    \ the iterable. Any object that implements the iterable protocol can be used including\
    \ user defined types. There is also an operator from_iterable(). All three operators\
    \ do the same thing and you can choose which to use based on which provides the\
    \ most semantic meaning in your context.\n\nAll three of the following statements\
    \ have the same effect:\n\n```\nsource = rx.from_([2, 3, 5, 7])\nsource = rx.from_iterable([2,\
    \ 3, 5, 7])\nsource = rx.from_list([2, 3, 5, 7])\n```\n\nThis is illustrated pictorially\
    \ below:\n\n![](img/8a661fca3884547aede940b9a6567321_670_0.png)\n\nAnother creational\
    \ operator is the rx.range() operator. This operator generates an observable for\
    \ a range of integer numbers. The range can be specified with or without a starting\
    \ value and with or without an increment. However the maximum value in the range\
    \ must always be provided, for example:\n\n```\nobs1 = rx.range(10)\nobs2 = rx.range(0,\
    \ 10)\nobs3 = rx.range(0, 10, 1)\n```\n\n## Transformational Operators\n\nThere\
    \ are several transformational operators defined in the rx.operators module including\
    \ rx.operators.map() and rx.operators.flat_map(). The rx.operators.map() operator\
    \ applies a function to each data item generated by an Observable.\n\nThe rx.operators.flat_map()\
    \ operator also applies a function to each data item but then applies a flatten\
    \ operation to the result. For example, if the result is a list of lists then\
    \ flat_map will flatten this into a single list. In this section we will focus\
    \ on the rx.operators.map() operator.\n\nThe rx.operators.map() operator allows\
    \ a function to be applied to all data items generated by an Observable. The result\
    \ of this function is then returned as the result of the map() operators Observable.\
    \ The function is typically used to perform some form of transformation to the\
    \ data supplied to it. This could be adding one to all integer values, converting\
    \ the format of the data from XML to JSON, enriching the data with additional\
    \ information such as the time the data was acquired and who the data was supplied\
    \ by etc.\n\nIn the example given below we are transforming the set of integer\
    \ values supplied by the original Observable into strings. In the diagram these\
    \ strings include quotes around them to highlight they are in fact a string:\n\
    \n![](img/8a661fca3884547aede940b9a6567321_672_0.png)\n\nThis is typical of the\
    \ use of a transformation operator; that is to change the data from one format\
    \ to another or to add information to the data.\n\nThe code used to implement\
    \ this scenario is given below. Note the use of the pipe() method to apply the\
    \ operator to the data stream generated by the Observable:\n\n```\n# Apply a transformation\
    \ to a data source to convert\n# integers into strings\nimport rx\nfrom rx import\
    \ operators as op\n# Set up a source with a map function\nsource = rx.from_list([2,\
    \ 3, 5, 7]).pipe(\n    op.map(lambda value: \"'\" + str(value) + \"'\")\n)\n#\
    \ Subscribe a lambda function\nsource.subscribe(lambda value: print('Lambda Received',\
    \ value,\n    ' is a string ', isinstance(value, str)))\n```\n\nThe output from\
    \ this program is:\n\nLambda Received ‘2’ is a string True\nLambda Received ‘3’\
    \ is a string True\nLambda Received ‘5’ is a string True\nLambda Received ‘7’\
    \ is a string True\n\n## Combinatorial Operators\n\nCombinatorial operators combine\
    \ together multiple data items in some way. One example of a combinatorial operator\
    \ is the rx.merge() operator. This operator merges the data produced by two Observables\
    \ into a single Observable data stream. For example:\n\n![](img/8a661fca3884547aede940b9a6567321_674_0.png)\n\
    \nIn the above diagram two Observables are represented by the sequence 2, 3, 5,\
    \ 7 and the sequence 11, 13, 16, 19. These Observables are supplied to the merge\
    \ operator that generates a single Observable that will supply data generated\
    \ from both of the original Observables. This is an example of an operator that\
    \ does not take a function but instead takes two Observables.\n\nThe code representing\
    \ the above scenario is given below:\n\n```\n# An example illustrating how to\
    \ merge two data sources\nimport rx\n# Set up two sources\nsource1 = rx.from_list([2,\
    \ 3, 5, 7])\nsource2 = rx.from_list([10, 11, 12])\n# Merge two sources into one\n\
    rx.merge(source1, source2).subscribe(lambda v: print(v, end=','))\n```\n\nNotice\
    \ that in this case we have subscribed directly to the Observable returned by\
    \ the merge() operator and have not stored this in an intermediate variable (this\
    \ was a design decision and either approach is acceptable).\n\nThe output from\
    \ this program is presented below:\n\n2,3,5,7,10,11,12,\n\nNotice from the output\
    \ the way in which the data held in the original Observables is intertwined in\
    \ the output of the Observable generated by the merge() operator.\n\n## Filtering\
    \ Operators"
  mdcn: "## RxPy 操作符\n\n## 简介\n\n在本章中，我们将探讨 RxPy 提供的、可应用于 Observable 所发出数据的操作符类型。\n\
    \n## 响应式编程操作符\n\nObservable 与 Observer 之间的交互背后是一条数据流。也就是说，Observable 向一个消费/处理该数据流的\
    \ Observer 提供数据流。可以对这条数据流应用操作符，用于过滤、转换以及总体上优化数据提供给 Observer 的方式和时机。\n\n这些操作符主要定义在\
    \ `rx.operators` 模块中，例如 `rx.operators.average()`。不过，通常会使用一个别名来引用该模块，例如将操作符模块称为\
    \ `op`，如 **from rx import operators as op**。这样在引用操作符时就可以使用简写形式，例如 `op.average()`。\n\
    \n许多 RxPy 操作符会执行一个函数，该函数应用于 Observable 产生的每个数据项。另一些操作符可用于创建一个初始的 Observable（实际上你已经在\
    \ `from_list()` 操作符的形式中见过这些操作符了）。还有一组操作符可用于基于 Observable 产生的数据生成结果（例如 `sum()`\
    \ 操作符）。\n\n事实上，RxPy 提供了种类繁多的操作符，这些操作符可以分类如下：\n\n-   创建型，\n-   转换型，\n-   组合型，\n\
    -   过滤型，\n-   错误处理型，\n-   条件与布尔型操作符，\n-   数学型，\n-   可连接型。\n\n本节的其余部分将介绍其中一些类别的示例。\n\
    \n## 管道操作符\n\n要将创建型操作符以外的操作符应用于 Observable，需要创建一个管道。管道本质上是一系列可以应用于 Observable\
    \ 生成的数据流的一个或多个操作。应用管道的结果是生成一个新的数据流，该数据流代表了依次应用每个操作符后产生的结果。下图对此进行了说明：\n\n![](img/8a661fca3884547aede940b9a6567321_669_0.png)\n\
    \n要创建管道，需使用 `Observable.pipe()` 方法。此方法接受一个以逗号分隔的一个或多个操作符列表，并返回一个数据流。然后，Observer\
    \ 可以订阅该管道的数据流。这可以在本章其余部分关于转换、过滤、数学操作符等的示例中看到。\n\n## 创建型操作符\n\n你已经在本章前面的示例中见过创建型操作符的例子了。这是因为\
    \ `rx.from_list()` 操作符就是一个创建型操作符的例子。它用于基于存储在类似列表结构中的数据创建一个新的 Observable。\n\n`from_list()`\
    \ 的一个更通用的版本是 `from_()` 操作符。此操作符接受一个可迭代对象，并基于该可迭代对象提供的数据生成一个 Observable。任何实现了可迭代协议的对象都可以使用，包括用户定义的类型。还有一个操作符\
    \ `from_iterable()`。这三个操作符的功能相同，你可以根据哪个在你的上下文中最具语义意义来选择使用哪个。\n\n以下三条语句具有相同的效果：\n\
    \n```\nsource = rx.from_([2, 3, 5, 7])\nsource = rx.from_iterable([2, 3, 5, 7])\n\
    source = rx.from_list([2, 3, 5, 7])\n```\n\n下图对此进行了图示说明：\n\n![](img/8a661fca3884547aede940b9a6567321_670_0.png)\n\
    \n另一个创建型操作符是 `rx.range()` 操作符。此操作符为一个整数范围生成一个 Observable。该范围可以指定起始值（或不指定）以及增量（或不指定）。但是，范围中的最大值必须始终提供，例如：\n\
    \n```\nobs1 = rx.range(10)\nobs2 = rx.range(0, 10)\nobs3 = rx.range(0, 10, 1)\n\
    ```\n\n## 转换型操作符\n\n`rx.operators` 模块中定义了几个转换型操作符，包括 `rx.operators.map()` 和 `rx.operators.flat_map()`。`rx.operators.map()`\
    \ 操作符将一个函数应用于 Observable 生成的每个数据项。\n\n`rx.operators.flat_map()` 操作符也将一个函数应用于每个数据项，但随后对结果应用一个扁平化操作。例如，如果结果是一个列表的列表，那么\
    \ `flat_map` 会将其扁平化为一个单一的列表。在本节中，我们将重点关注 `rx.operators.map()` 操作符。\n\n`rx.operators.map()`\
    \ 操作符允许将一个函数应用于 Observable 生成的所有数据项。该函数的结果随后作为 `map()` 操作符的 Observable 的结果返回。该函数通常用于对提供的数据执行某种形式的转换。这可以是为所有整数值加一、将数据格式从\
    \ XML 转换为 JSON、用附加信息（如数据获取时间、数据提供者等）丰富数据。\n\n在下面给出的示例中，我们将原始 Observable 提供的整数值集合转换为字符串。在图中，这些字符串包含引号以突出显示它们实际上是字符串：\n\
    \n![](img/8a661fca3884547aede940b9a6567321_672_0.png)\n\n这是转换型操作符的典型用法；即将数据从一种格式更改为另一种格式，或向数据添加信息。\n\
    \n实现此场景的代码如下所示。请注意使用 `pipe()` 方法将操作符应用于 Observable 生成的数据流：\n\n```\n# Apply a transformation\
    \ to a data source to convert\n# integers into strings\nimport rx\nfrom rx import\
    \ operators as op\n# Set up a source with a map function\nsource = rx.from_list([2,\
    \ 3, 5, 7]).pipe(\n    op.map(lambda value: \"'\" + str(value) + \"'\")\n)\n#\
    \ Subscribe a lambda function\nsource.subscribe(lambda value: print('Lambda Received',\
    \ value,\n    ' is a string ', isinstance(value, str)))\n```\n\n此程序的输出为：\n\nLambda\
    \ Received ‘2’ is a string True\nLambda Received ‘3’ is a string True\nLambda\
    \ Received ‘5’ is a string True\nLambda Received ‘7’ is a string True\n\n## 组合型操作符\n\
    \n组合型操作符以某种方式组合多个数据项。组合型操作符的一个例子是 `rx.merge()` 操作符。此操作符将两个 Observable 产生的数据合并到一个单一的\
    \ Observable 数据流中。例如：\n\n![](img/8a661fca3884547aede940b9a6567321_674_0.png)\n\
    \n在上图中，两个 Observable 由序列 2, 3, 5, 7 和序列 11, 13, 16, 19 表示。这些 Observable 被提供给 merge\
    \ 操作符，该操作符生成一个单一的 Observable，该 Observable 将提供源自两个原始 Observable 的数据。这是一个不接受函数而是接受两个\
    \ Observable 的操作符的例子。\n\n表示上述场景的代码如下：\n\n```\n# An example illustrating how to\
    \ merge two data sources\nimport rx\n# Set up two sources\nsource1 = rx.from_list([2,\
    \ 3, 5, 7])\nsource2 = rx.from_list([10, 11, 12])\n# Merge two sources into one\n\
    rx.merge(source1, source2).subscribe(lambda v: print(v, end=','))\n```\n\n请注意，在这种情况下，我们直接订阅了\
    \ `merge()` 操作符返回的 Observable，而没有将其存储在中间变量中（这是一个设计决策，两种方法都是可以接受的）。\n\n此程序的输出如下：\n\
    \n2,3,5,7,10,11,12,\n\n请注意输出中原始 Observable 中的数据是如何交织在 `merge()` 操作符生成的 Observable\
    \ 的输出中的。\n\n## 过滤型操作符"
