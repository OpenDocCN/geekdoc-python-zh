    # Handlers


    Within the logging pipeline, it is a handlers that send the log message to their
    final destination. By default the handler is set up to direct output to the console/terminal
    associated with the running program. However, this can be changed to send the
    log messages to a file, to an email service, to a web server etc. Or indeed to
