    \ copy back ends are built upon common abstractions referred to as the Back end\
    \ base classes.\n\n## The Artist Layer\n\nThe Artist layer provides the majority\
    \ of the functionality that you might consider to be what Matplotlib actually\
    \ does; that is the generation of the plots and graphs that are rendered/ displayed\
    \ to the user (or output in a particular format).\n\n![](img/8a661fca3884547aede940b9a6567321_70_0.png)"
