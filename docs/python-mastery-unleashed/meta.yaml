  mdcn: "## Python 海龟图形\n\n## 简介\n\nPython 在图形库方面有很好的支持。其中使用最广泛的图形库之一就是本章介绍的海龟图形库。这部分是因为它使用起来非常直接，部分原因是它默认随\
    \ Python 环境提供（因此你无需安装任何额外的库即可使用它）。\n\n本章最后简要介绍了其他一些图形库，包括 PyOpenGL。PyOpenGL 库可用于创建复杂的\
    \ 3D 场景。\n\n## 海龟图形库\n\n## 海龟模块\n\n该模块提供了一系列功能，允许创建所谓的矢量图形。矢量图形指的是可以在屏幕上绘制的线条（或向量）。绘图区域通常被称为绘图平面或绘图板，并具有\
    \ x、y 坐标的概念。\n\n海龟图形库仅被设计为一个基本的绘图工具；其他库可用于绘制二维和三维图形（例如 MatPlotLib），但这些库往往专注于特定类型的图形显示。\n\
    \n海龟模块（及其名称）背后的理念源于 60 和 70 年代的 Logo 编程语言，该语言旨在向儿童介绍编程。它有一个屏幕上的海龟，可以通过诸如 forward（使海龟向前移动）、right（使海龟向右转一定角度）、left（使海龟向左转一定角度）等命令来控制。这个理念延续到了当前的\
    \ Python 海龟图形库中，其中诸如 `turtle.forward(10)` 这样的命令会使海龟（或现在的光标）向前移动 10 像素等。通过组合这些看似简单的命令，可以创建出精细且相当复杂的形状。\n\
    \n## 基本海龟图形\n\n尽管海龟模块内置于 Python 3 中，但在使用前必须导入该模块：\n\n```python\nimport turtle\n\
    ```\n\n实际上有两种使用海龟模块的方式；一种是使用库中提供的类，另一种是使用一组更简单的函数，这些函数隐藏了类和对象。在本章中，我们将重点介绍你可以用来使用海龟图形库创建绘图的函数集。\n\
    \n我们将做的第一件事是设置用于绘图的窗口；`TurtleScreen` 类是所有屏幕实现的父类，无论你运行的是什么操作系统。\n\n如果你使用的是海龟模块提供的函数，那么屏幕对象会根据你的操作系统进行适当的初始化。这意味着你可以专注于以下函数来配置布局/显示，例如这个屏幕可以有标题、大小、起始位置等。\n\
    \n关键函数有：\n\n- `setup(width, height, startx, starty)` 设置主窗口/屏幕的大小和位置。参数如下：\n  -\
    \ `width`——如果是整数，则为像素大小；如果是浮点数，则为屏幕的比例；默认为屏幕的 50%。\n  - `height`——如果是整数，则为像素高度；如果是浮点数，则为屏幕的比例；默认为屏幕的\
    \ 75%。\n  - `startx`——如果是正数，则为从屏幕左边缘开始的像素位置；如果是负数，则为从右边缘开始；如果是 `None`，则水平居中窗口。\n\
    \  - `starty`——如果是正数，则为从屏幕顶边缘开始的像素位置；如果是负数，则为从底边缘开始；如果是 `None`，则垂直居中窗口。\n- `title(title\
    \ string)` 设置屏幕/窗口的标题。\n- `exitonclick()` 当用户点击屏幕时关闭海龟图形屏幕/窗口。\n- `bye()` 关闭海龟图形屏幕/窗口。\n\
    - `done()` 启动主事件循环；这必须是海龟图形程序中的最后一条语句。\n- `speed(speed)` 设置绘图速度，默认为 3。值越高，绘图速度越快，接受\
    \ 0–10 范围内的值。\n- `turtle.tracer(n = None)` 这可用于批量更新海龟图形屏幕。当绘图变得庞大而复杂时，它非常有用。通过将数字\
    \ (`n`) 设置为一个较大的数字（例如 600），那么在实际屏幕一次性更新之前，将在内存中绘制 600 个元素；这可以显著加快例如分形图像的生成速度。不带参数调用时，返回当前存储的\
    \ `n` 值。\n- `turtle.update()` 执行海龟屏幕的更新；当使用了 `tracer()` 时，应在程序结束时调用此函数，因为它将确保所有元素都已绘制，即使尚未达到\
    \ `tracer` 阈值。\n- `pencolor(color)` 用于设置在屏幕上绘制线条的颜色；颜色可以通过多种方式指定，包括使用命名颜色如 `'red'`、`'blue'`、`'green'`，或使用\
    \ RGB 颜色代码，或通过十六进制数字指定颜色。有关要使用的命名颜色和 RGB 颜色代码的更多信息，请参见 https://www.tcl.tk/man/tcl/TkCmd/colors.htm。请注意，所有颜色方法都使用美式拼写，例如此方法是\
    \ `pencolor`（而不是 `pen colour`）。\n- `fillcolor(color)` 用于设置用于填充绘制线条内封闭区域的颜色。同样请注意\
    \ `color` 的拼写！\n\n以下代码片段说明了其中一些函数：\n\n```python\nimport turtle\n\n# 为你的画布窗口设置标题\n\
    turtle.title('My Turtle Animation')\n# 设置屏幕大小（以像素为单位）\n# 设置海龟的起始点 (0, 0)\nturtle.setup(width=200,\
    \ height=200, startx=0, starty=0)\n# 将画笔颜色设置为红色\nturtle.pencolor('red')\n\n# ...\n\
    # 添加此行以便点击时窗口会关闭\nturtle.exitonclick()\n```\n\n我们现在可以看看如何实际在屏幕上绘制形状。\n\n屏幕上的光标有几个属性；这些属性包括光标移动时画笔的当前绘图颜色，以及其当前位置（屏幕的\
    \ x、y 坐标）和当前朝向。我们已经看到你可以使用 `pencolor()` 方法控制其中一个属性，其他方法用于控制光标（或海龟），如下所示。\n\n光标指向的方向可以使用几个函数来改变，包括：\n\
    \n- `right(angle)` 将光标向右转 angle 个单位。\n- `left(angle)` 将光标向左转 angle 个单位。\n- `setheading(to_angle)`\
    \ 将光标的朝向设置为 to_angle。\n\n其中 0 是东，90 是北，180 是西，270 是南。你可以使用以下命令移动光标（如果画笔放下，这将绘制一条线）：\n\
    \n- `forward(distance)` 将光标沿当前指向的方向向前移动指定的距离。如果画笔放下，则绘制一条线。\n- `backward(distance)`\
    \ 将光标沿与当前指向相反的方向向后移动 distance。\n\n你也可以显式地定位光标：\n\n- `goto(x, y)` 将光标移动到屏幕上指定的\
    \ x、y 位置；如果画笔放下，则绘制一条线。你也可以使用 `steps` 和 `set position` 来做同样的事情。\n- `setx(x)` 设置光标的\
    \ x 坐标，y 坐标保持不变。\n- `sety(y)` 设置光标的 y 坐标，x 坐标保持不变。\n\n也可以通过修改画笔是抬起还是放下，在不绘制的情况下移动光标：\n\
    \n- `penup()` 抬起画笔——移动光标将不再绘制线条。\n- `pendown()` 放下画笔——移动光标现在将使用当前画笔颜色绘制线条。\n\n\
    画笔的大小也可以控制：\n\n- `pensize(width)` 将线条粗细设置为 width。方法 `width()` 是此方法的别名。\n\n也可以绘制一个圆或一个点：\n\
    \n- `circle(radius, extent, steps)` 使用给定的半径绘制一个圆。`extent` 决定绘制圆的多少部分；如果未给出 `extent`，则绘制整个圆。`steps`\
    \ 表示用于绘制圆的步数（它可用于绘制正多边形）。\n- `dot(size, color)` 使用指定的颜色绘制一个直径为 size 的实心圆。\n\n\
    你现在可以使用上面的一些方法在屏幕上绘制形状。对于第一个例子，我们将保持非常简单，绘制一个简单的正方形：\n\n```python\n# 绘制一个正方形\n\
    turtle.forward(50)\nturtle.right(90)\nturtle.forward(50)\nturtle.right(90)\nturtle.forward(50)\n\
    turtle.right(90)\nturtle.forward(50)\nturtle.right(90)\n```\n\n以上代码将光标向前移动 50\
    \ 像素，然后旋转 90°，并重复这些步骤三次。最终结果是在屏幕上绘制了一个 50 x 50 像素的正方形。"
