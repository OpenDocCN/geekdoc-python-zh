- md: "## Inserting Data to the Database\n\nAs well as reading data from a database\
    \ many applications also need to add new data to the database. This is done via\
    \ the DML (Data Manipulation Language) INSERT statement. The process for this\
    \ is very similar to running a query against the database using a SELECT statement;\
    \ that is, you need to make a connection, obtain a cursor object and execute the\
    \ statement. The one difference here is that you do not need to fetch the results.\n\
    \n```python\nimport pymysql\n# Open database connection\nconnection = pymysql.connect('localhost',\
    \ 'user', 'password', 'uni-database')\n# prepare a cursor object using cursor()\
    \ method\ncursor = connection.cursor()\ntry:\n    # Execute INSERT command\n \
    \   cursor.execute(\"INSERT INTO students (id, name, surname, subject, email)\
    \ VALUES (7, 'Denise', 'Byrne', 'History', 'db@my.com')\")\n    # Commit the changes\
    \ to the database\n    connection.commit()\nexcept:\n    # Something went wrong\n\
    \    # rollback the changes\n    connection.rollback()\n# Close the database connection\n\
    connection.close()\n```\n\nThe result of running this code is that the database\
    \ is updated with a seventh row for ‘Denise Byrne’. This can be seen in the MySQL\
    \ Workbench if we look at the contents of the students table:\n\n![](img/8a661fca3884547aede940b9a6567321_461_0.png)\n\
    \nThere are a couple of points to note about this code example. The first is that\
    \ we have used the double quotes around the string defining the INSERT command—\
    \ this is because a double quotes string allows us to include single quotes within\
    \ that string. This is necessary as we need to quote any string values passed\
    \ to the database (such as ‘Denise’).\n\nThe second thing to note is that by default\
    \ the PyMySQL database interface requires the programmer to decide when to commit\
    \ or rollback a transaction. A transaction was introduced in the last chapter\
    \ as an atomic unit of work that must either be completed or as a whole or rollback\
    \ so that no changes are made. However, the way in which we indicate that a transaction\
    \ is completed is by calling the commit() method on the database connection. In\
    \ turn we can indicate that we want to rollback the current transaction by calling\
    \ rollback(). In either case, once the method has been invoked a new transaction\
    \ is started for any further database activity.\n\nIn the above code we have used\
    \ a try block to ensure that if everything succeeds, we will commit the changes\
    \ made, but if an exception is thrown (of any kind) we will rollback the transaction—this\
    \ is a common pattern.\n\n## Updating Data in the Database\n\nIf we are able to\
    \ insert new data into the database, we may also want to update the data in a\
    \ database, for example to correct some information. This is done using the UPDATE\
    \ statement which must indicate which existing row is being updated as well as\
    \ what the new data should be.\n\n```python\nimport pymysql\n# Open database connection\n\
    connection = pymysql.connect('localhost',\n    'user',\n    'password',\n    'uni-database')\n\
    # prepare a cursor object using cursor() method\ncursor = connection.cursor()\n\
    try:\n    # Execute UPDATE command\n    cursor.execute(\"UPDATE students SET email\
    \ = 'denise@my.com' WHERE id = 7\")\n    # Commit the changes to the database\n\
    \    connection.commit()\nexcept:\n    # rollback the changes if an exception\
    \ / error\n    connection.rollback()\n# Close the database connection\nconnection.close()\n\
    ```\n\nIn this example we are updating the student with id 7 such that their email\
    \ address will be changed to ‘denise@my.com’. This can be verified by examining\
    \ the contents of the students table in the MySQL Workbench:\n\n![](img/8a661fca3884547aede940b9a6567321_463_0.png)\n\
    \n## Deleting Data in the Database\n\nFinally, it is also possible to delete data\
    \ from a database, for example if a student leaves their course. This follows\
    \ the same format as the previous two examples with the difference that the DELETE\
    \ statement is used instead:\n\n```python\nimport pymysql\n# Open database connection\n\
    connection = pymysql.connect('localhost',\n    'user',\n    'password',\n    'uni-database')\n\
    # prepare a cursor object using cursor() method\ncursor = connection.cursor()\n\
    try:\n    # Execute DELETE command\n    cursor.execute(\"DELETE FROM students\
    \ WHERE id = 7\")\n    # Commit the changes to the database\n    connection.commit()\n\
    except:\n    # rollback the changes if an exception / error\n    connection.rollback()\n\
    # Close the database connection\nconnection.close()\n```\n\nIn this case we have\
    \ deleted the student with id 7. We can see that again in the MySQL Workbench\
    \ by examining the contents of the students table after this code has run:\n\n\
    ![](img/8a661fca3884547aede940b9a6567321_465_0.png)\n\n## Creating Tables\n\n\
    It is not just data that you can add to a database; if you wish you can programmatically\
    \ create new tables to be used with an application. This process follows exactly\
    \ the same pattern as those used for INSERT, UPDATE and DELETE. The only difference\
    \ is that the command sent to the database contains a CREATE statement with a\
    \ description of the table to be created. This is illustrated below:\n\n```python\n\
    import pymysql\n# Open database connection\nconnection = pymysql.connect('localhost',\n\
    \    'user',\n    'password',\n    'uni-database')\n# prepare a cursor object\
    \ using cursor() method\ncursor = connection.cursor()\ntry:\n    # Execute CREATE\
    \ command\n    cursor.execute(\"CREATE TABLE log (message VARCHAR(100) NOT NULL)\"\
    )\n    # Commit the changes to the database\n    connection.commit()\nexcept:\n\
    \    # rollback the changes if an exception / error\n    connection.rollback()\n\
    # Close the database connection\nconnection.close()\n```\n\nThis creates a new\
    \ table log within the uni-database; this can be seen by looking at the tables\
    \ listed for the uni-database within the MySQL Workbench.\n\n![](img/8a661fca3884547aede940b9a6567321_466_0.png)\n\
    \n## Online Resources\n\nSee the following online resources for more information\
    \ on the Python Database API:\n\n- [https://pymysql.readthedocs.io/en/latest/\
    \ PyMySQL](https://pymysql.readthedocs.io/en/latest/ PyMySQL) Documentation site.\n\
    - [https://github.com/PyMySQL/PyMySQL](https://github.com/PyMySQL/PyMySQL) GitHub\
    \ repository for the PyMySQL library.\n\n## Try\n\nIn this exercise you will create\
    \ a database and tables based on a set of transactions stored in a current account.\
    \ You can use the account class you created in the CSV and Excel chapter for this.\n\
    \nYou will need two tables, one for the account information and one for the transaction\
    \ history. The primary key of the account information table can be used as the\
    \ foreign key for the transaction history table. Then write a function that takes\
    \ an Account object and populates the tables with the appropriate data.\n\nTo\
    \ create the account information table you might use the following DDL:\n\n```sql\n\
    CREATE TABLE acc_info (idacc_info INT NOT NULL, name VARCHAR(255) NOT NULL, PRIMARY\
    \ KEY (idacc_info))\n```\n\nWhile for the transactions table you might use:\n\n\
    ```sql\nCREATE TABLE transactions (idtransactions INT NOT NULL, type VARCHAR(45)\
    \ NOT NULL, amount VARCHAR(45) NOT NULL, account INT NOT NULL, PRIMARY KEY (idtransactions))\n\
    ```"
  mdcn: "## 向数据库插入数据\n\n除了从数据库读取数据外，许多应用程序还需要向数据库添加新数据。这通过 DML（数据操作语言）INSERT 语句来完成。此过程与使用\
    \ SELECT 语句对数据库运行查询非常相似；也就是说，你需要建立连接、获取游标对象并执行语句。这里的一个区别是，你不需要获取结果。\n\n```python\n\
    import pymysql\n# Open database connection\nconnection = pymysql.connect('localhost',\
    \ 'user', 'password', 'uni-database')\n# prepare a cursor object using cursor()\
    \ method\ncursor = connection.cursor()\ntry:\n    # Execute INSERT command\n \
    \   cursor.execute(\"INSERT INTO students (id, name, surname, subject, email)\
    \ VALUES (7, 'Denise', 'Byrne', 'History', 'db@my.com')\")\n    # Commit the changes\
    \ to the database\n    connection.commit()\nexcept:\n    # Something went wrong\n\
    \    # rollback the changes\n    connection.rollback()\n# Close the database connection\n\
    connection.close()\n```\n\n运行此代码的结果是数据库被更新，添加了第七行数据，对应‘Denise Byrne’。如果在 MySQL\
    \ Workbench 中查看 students 表的内容，可以看到这一点：\n\n![](img/8a661fca3884547aede940b9a6567321_461_0.png)\n\
    \n关于此代码示例，有几点需要注意。首先，我们在定义 INSERT 命令的字符串周围使用了双引号——这是因为双引号字符串允许我们在该字符串内包含单引号。这是必要的，因为我们需要引用传递给数据库的任何字符串值（例如‘Denise’）。\n\
    \n其次需要注意的是，默认情况下，PyMySQL 数据库接口要求程序员决定何时提交或回滚事务。事务在上一章中被介绍为一个原子工作单元，必须作为一个整体完成或回滚，以确保不进行任何更改。然而，我们表示事务完成的方式是通过调用数据库连接上的\
    \ `commit()` 方法。相应地，我们可以通过调用 `rollback()` 来表示我们希望回滚当前事务。无论哪种情况，一旦调用了该方法，就会为任何进一步的数据库活动开始一个新的事务。\n\
    \n在上面的代码中，我们使用了一个 try 块来确保如果一切成功，我们将提交所做的更改，但如果抛出任何异常，我们将回滚事务——这是一种常见的模式。\n\n\
    ## 更新数据库中的数据\n\n如果我们能够向数据库插入新数据，我们可能还希望更新数据库中的数据，例如更正某些信息。这使用 UPDATE 语句完成，该语句必须指明正在更新的现有行以及新数据应该是什么。\n\
    \n```python\nimport pymysql\n# Open database connection\nconnection = pymysql.connect('localhost',\n\
    \    'user',\n    'password',\n    'uni-database')\n# prepare a cursor object\
    \ using cursor() method\ncursor = connection.cursor()\ntry:\n    # Execute UPDATE\
    \ command\n    cursor.execute(\"UPDATE students SET email = 'denise@my.com' WHERE\
    \ id = 7\")\n    # Commit the changes to the database\n    connection.commit()\n\
    except:\n    # rollback the changes if an exception / error\n    connection.rollback()\n\
    # Close the database connection\nconnection.close()\n```\n\n在此示例中，我们正在更新 id 为\
    \ 7 的学生，使其电子邮件地址更改为‘denise@my.com’。这可以通过在 MySQL Workbench 中检查 students 表的内容来验证：\n\
    \n![](img/8a661fca3884547aede940b9a6567321_463_0.png)\n\n## 删除数据库中的数据\n\n最后，也可以从数据库中删除数据，例如当学生离开课程时。这遵循与前两个示例相同的格式，不同之处在于使用\
    \ DELETE 语句：\n\n```python\nimport pymysql\n# Open database connection\nconnection\
    \ = pymysql.connect('localhost',\n    'user',\n    'password',\n    'uni-database')\n\
    # prepare a cursor object using cursor() method\ncursor = connection.cursor()\n\
    try:\n    # Execute DELETE command\n    cursor.execute(\"DELETE FROM students\
    \ WHERE id = 7\")\n    # Commit the changes to the database\n    connection.commit()\n\
    except:\n    # rollback the changes if an exception / error\n    connection.rollback()\n\
    # Close the database connection\nconnection.close()\n```\n\n在这种情况下，我们删除了 id 为\
    \ 7 的学生。我们可以在 MySQL Workbench 中通过检查运行此代码后 students 表的内容再次看到这一点：\n\n![](img/8a661fca3884547aede940b9a6567321_465_0.png)\n\
    \n## 创建表\n\n你不仅可以向数据库添加数据；如果你愿意，你还可以以编程方式创建新表以供应用程序使用。此过程遵循与用于 INSERT、UPDATE 和\
    \ DELETE 完全相同的模式。唯一的区别是发送到数据库的命令包含一个 CREATE 语句，其中包含要创建的表的描述。下面对此进行了说明：\n\n```python\n\
    import pymysql\n# Open database connection\nconnection = pymysql.connect('localhost',\n\
    \    'user',\n    'password',\n    'uni-database')\n# prepare a cursor object\
    \ using cursor() method\ncursor = connection.cursor()\ntry:\n    # Execute CREATE\
    \ command\n    cursor.execute(\"CREATE TABLE log (message VARCHAR(100) NOT NULL)\"\
    )\n    # Commit the changes to the database\n    connection.commit()\nexcept:\n\
    \    # rollback the changes if an exception / error\n    connection.rollback()\n\
    # Close the database connection\nconnection.close()\n```\n\n这将在 uni-database 中创建一个新表\
    \ log；可以通过查看 MySQL Workbench 中 uni-database 列出的表来看到这一点。\n\n![](img/8a661fca3884547aede940b9a6567321_466_0.png)\n\
    \n## 在线资源\n\n有关 Python 数据库 API 的更多信息，请参阅以下在线资源：\n\n- [https://pymysql.readthedocs.io/en/latest/\
    \ PyMySQL](https://pymysql.readthedocs.io/en/latest/ PyMySQL) 文档站点。\n- [https://github.com/PyMySQL/PyMySQL](https://github.com/PyMySQL/PyMySQL)\
    \ PyMySQL 库的 GitHub 仓库。\n\n## 尝试\n\n在本练习中，你将基于一组存储在活期账户中的事务来创建数据库和表。你可以使用你在 CSV\
    \ 和 Excel 章节中创建的 Account 类来完成此操作。\n\n你需要两个表，一个用于账户信息，一个用于交易历史。账户信息表的主键可以用作交易历史表的外键。然后编写一个函数，该函数接受一个\
    \ Account 对象并用适当的数据填充这些表。\n\n要创建账户信息表，你可以使用以下 DDL：\n\n```sql\nCREATE TABLE acc_info\
    \ (idacc_info INT NOT NULL, name VARCHAR(255) NOT NULL, PRIMARY KEY (idacc_info))\n\
    ```\n\n而对于交易表，你可以使用：\n\n```sql\nCREATE TABLE transactions (idtransactions INT\
    \ NOT NULL, type VARCHAR(45) NOT NULL, amount VARCHAR(45) NOT NULL, account INT\
    \ NOT NULL, PRIMARY KEY (idtransactions))\n```"
