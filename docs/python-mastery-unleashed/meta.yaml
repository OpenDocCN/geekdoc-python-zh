    The Python csv module implements classes to read and write tabular data in CSV
    format. As part of this it supports the concept of a dialect which is a CSV format
    used by a specific application or suite of programs, for example,it supports an
    Excel dialect.


    This allows programmers to say, “write this data in the format preferred by Excel,”
    or “read data from this file which'
