- img_proc: true
  md: "Meteors on the screen making it harder as the game progresses. We can do this\
    \ using a\n\n```\nNEW_METEOR_CYCLE_INTERVAL.\nNEW_METEOR_CYCLE_INTERVAL = 40\n\
    ```\n\nWhen this interval is reached we can add a new Meteor to the list of current\
    \ Meteors; it will then be automatically drawn by the Game class. For example:\n\
    \n```\n# Determineif new meteors should be added\nif cycle_count % NEW_METEOR_CYCLE_INTERVAL\
    \ == 0:\n    self.meteors.append(Meteor(self))\n```\n\nNow every NEW_METEOR_CYCLE_INTERVAL\
    \ another meteor will be added at a random x coordinate to the game.\n\n# Pausing\
    \ the Game\n\nAnother feature that many games have is the ability to pause the\
    \ game. This can be easily added by monitoring for a pause key (this could be\
    \ the letter p represented by the event_key pygame.K_p). When this is pressed\
    \ the game could be paused until the key is pressed again.\n\nThe pause operation\
    \ can be implemented as a method __pause() that will consume all events until\
    \ the appropriate"
  merge: -1
  pgno: 244
- img_proc: true
  md: "key is pressed. For example:\n\n```\ndef _pause(self):\n    paused = True while\
    \ paused:\n        for event in pygame.event.get():\n            if event.type\
    \ == pygame.KEYDOWN:\n                if event.key == pygame.K_p:\n          \
    \          paused = False break\n```\n\nIn this method the outer while loop will\
    \ loop until the paused local variable is set too False. This only happens when\
    \ the ‘p’ key is pressed. The break after the statement setting paused to False\
    \ ensures that the inner for loop is terminated allowing the outer while loop\
    \ to check the value of paused and terminate.\n\nThe__pause() method can be invoked\
    \ during the game playing cycle by monitoring for the ‘p’ key within the event\
    \ for loop and calling the __pause() method from there:\n\n```\nelif event.key\
    \ == pygame.K_p:\n    self._pause()\n```\n\nNote that again we have indicated\
    \ that we don’t expect the __pause() method to be called from outside the game\
