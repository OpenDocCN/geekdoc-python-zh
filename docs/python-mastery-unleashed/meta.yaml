    # The Socket server Module


    In the above example, the server code is more complex than the client; and this
    is for a single threaded server; life can become much more complicated if the
    serveris expected to be a multi-threaded server (that is a server that can handle
    multiple requests from different clients at the same time).


    However, the server socket module provides a more convenient, object-oriented
    approach to creating a server. Much of the boiler plate code needed in such applications
    is defined in classes, with the developer only having to provide their own classes
    or override methods to define the specific functionality required.


    There are five different server classes defined in the socket server module.


    +   - BaseServer is the root of the Server class hierarchy; it is not really intended
    to be instantiated and used directly. Instead it is extended by TCP Server and
    other classes.

    - TCPServer uses TCP/IP sockets to communicate and is probably the most commonly
    used type of socket server.

    - UDPServer provides access to data gram sockets.'
