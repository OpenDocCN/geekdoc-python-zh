- md: "## File Contents Iteration\n\nAs suggested by the previous example, it is very\
    \ common to want to process the contents of a file one line at a time. In fact\
    \ Python makes this extremely easy by making the file object support iteration.\
    \ File iteration accesses each line in the file and makes that line available\
    \ for the for loop. We can therefore write:\n\n```\nfile = open('myfile.txt',\
    \ 'r')\nfor line in file:\n    print(line, end='')\nfile.close()\n```\n\nIt is\
    \ also possible to use the list comprehension to provide a very concise way to\
    \ load and process lines in a file into a list. It is similar to the effect of\
    \ readlines() but we are now able to preprocess the data before creating the list:\n\
    \n```\nfile = open('myfile.txt', 'r')\nlines = [line.upper() for line in file]\n\
    file.close()\nprint(lines)\n```\n\n## Writing Data to Files\n\nWriting a string\
    \ to a file is supported by the write() method. Of course, the file object we\
    \ create must have an access mode that allows writing (such as ‘w’). Note that\
    \ the write method does not add a newline character (represented as ‘\\n’) to\
    \ the end of the string—you must do this manually.\n\nAn example short program\
    \ to write a text file is given below:\n\n```\nprint('Writing file')\nf = open('my-new-file.txt',\
    \ 'w')\nf.write('Hello from Python!\\n')\nf.write('Working with files is easy...\\\
    n')\nf.write('It is cool ...\\n')\nf.close()\n```\n\nThis creates a new file called\
    \ my-new-file.txt. It then writes three strings to the file each with a newline\
    \ character on the end; it then closes the file.\n\nThe effect of this is to create\
    \ a new file called myfile.txt with three lines in it:\n\n![](img/8a661fca3884547aede940b9a6567321_344_0.png)\n\
    \n## Using Files and with Statements\n\nLike several other types where it is important\
    \ to shut down resources, the file object class implements the Context Manager\
    \ Protocol and thus can be used with the with statement. It is therefore common\
    \ to write code that will open a file using the with as structure thus ensuring\
    \ that the file will be closed when the block of code is finished with, for example:\n\
    \n```\nwith open('my-new-file.txt', 'r') as f:\n    lines = f.readlines()\n  \
    \  for line in lines:\n        print(line, end='')\n```\n\n## The File input Module\n\
    \nIn some situations, you may need to read the input from several files in one\
    \ go. You could do this by opening each file independently and then reading the\
    \ contents and appending that contents to a list etc. However, this is a common\
    \ enough requirement that the file input module provides a function fileinput.input()\
    \ that can take a list of files and treat all the files as a single input significantly\
    \ simplifying this process, for example:\n\n```\nwith fileinput.input(files=('spam.txt',\
    \ 'eggs.txt')) as f:\n    for line in f:\n        process(line)\n```\n\nFeatures\
    \ provided by the file input module include:\n\n- Return the name of the file\
    \ currently being read.\n- Return the integer “file descriptor” for the current\
    \ file.\n- Return the cumulative line number of the line that has just been read.\n\
    - Return the line number in the current file. Before the first line has been read\
    \ this returns 0.\n- A boolean function that indicates if the current line just\
    \ read is the first line of its file.\n\nSome of these are illustrated below:\n\
    \n```\nwith fileinput.input(files=('textfile1.txt',\n    'textfile2.txt')) as\
    \ f:\n    line = f.readline()\n    print('f.filename():', f.filename())\n    print('f.isfirstline():',\
    \ f.isfirstline())\n    print('f.lineno():', f.lineno())\n    print('f.filelineno():',\
    \ f.filelineno())\n    for line in f:\n        print(line, end='')\n```\n\n##\
    \ Renaming Files\n\nA file can be renamed using the os.rename() function. This\
    \ function takes two arguments, the current filename and the new filename. It\
    \ is part of the Python os module which provides methods that can be used to perform\
    \ a range of file-processing operations (such as renaming a file). To use the\
    \ module, you will first need to import it. An example of using the rename function\
    \ is given below:\n\n```\nimport os\nos.rename('myfileoriginalname.txt', 'myfilenewname.txt')\n\
    ```\n\n## Deleting Files\n\nA file can be deleted using the os.remove() method.\
    \ This method deletes the file specified by the file name passed to it. Again,\
    \ it is part of the os module and therefore this must be imported first:\n\n```\n\
    import os\nos.remove('somefilename.txt')\n```\n\n## Random Access Files\n\nAll\
    \ the examples presented so far suggest that files are accessed sequentially,\
    \ with the first line read before the second and so on. Although this is (probably)\
    \ the most common approach it is not the only approach supported by Python; it\
    \ is also possible to use a random-access approach to the contents within a file.\n\
    \nTo understand the idea of random file access it is useful to understand that\
    \ we can maintain a pointer into a file to indicate where we are in that file\
    \ in terms of reading or writing data. Before anything is read from a file the\
    \ pointer is before the beginning of the file and reading the first line of text\
    \ would for example, advance the pointer to the start of the second line in the\
    \ file etc. This idea is illustrated below:\n\n![](img/8a661fca3884547aede940b9a6567321_347_0.png)\n\
    \n![](img/8a661fca3884547aede940b9a6567321_347_1.png)\n\nWhen randomly accessing\
    \ the contents of a file the programmer manually moves the pointer to the location\
    \ required and reads or writes text relative to that pointer. This means that\
    \ they can move around in the file reading and writing data.\n\nThe random-access\
    \ aspect of a file is provided by the seek method of the file object:\n\n- file.seek(offset,\
    \ whence) this method determines where the next read or write operation (depending\
    \ on the mode used in the open() call) takes place.\n\nIn the above the offset\
    \ parameter indicates the position of the read/write pointer within the file.\
    \ The move can also be forwards or backwards (represented by a negative offset).\
    \ The optional whence parameter indicates where the offset is relative to. The\
    \ values used for whence are:\n\n- 0 indicates that the offset is relative to\
    \ start of file (the default).\n- 1 means that the offset is relative to the current\
    \ pointer position.\n- 2 indicates the offset is relative to end of file.\n\n\
    Thus, we can move the pointer to a position relative to the start of the file,\
    \ to the end of the file, or to the current position.\n\nFor example, in the following\
    \ sample code we create a new text file and write a set of characters into that\
    \ file. At this point the pointer is positioned after the ‘z’ in the file. However,\
    \ we then use seek() to move the pointer to the 10th character in the file and\
    \ now write ‘Hello’, next we reposition the pointer to the 6th character in the\
    \ file and write out ‘BOO’. We then close the file. Finally, we read all the lines\
    \ from the file using a with as statement and the open() function and from this\
    \ we will see that the text in the file is now abcdefBOOjHELLOpqrstuvwxyz:\n\n\
    ```\nf = open('text.txt', 'w')\nf.write('abcdefghijklmnopqrstuvwxyz\\n')\nf.seek(10,\
    \ 0)\nf.write('HELLO')\nf.seek(6, 0)\nf.write('BOO')\nf.close()\nwith open('text.txt',\
    \ 'r') as f:\n    for line in f:\n        print(line, end='')\n```\n\n## Directories\n\
    \nBoth Unix like systems and Windows operating systems are hierarchical structures\
    \ comprising directories and files. The os module has several functions that can\
    \ help with creating, removing and altering directories. These include:\n\n- mkdir()\
    \ This function is used to create a directory, it takes the name of the directory\
    \ to create as a parameter. If the directory already exists FileExistsError is\
    \ raised.\n- chdir() This function can be used to change the current working directory.\
    \ This is the directory that the application will read from/write to by default.\n\
    - getcwd() This function returns a string representing the name of the current\
    \ working directory.\n- rmdir() This function is used to remove/delete a directory.\
    \ It takes the name of the directory to delete as a parameter.\n- listdir() This\
