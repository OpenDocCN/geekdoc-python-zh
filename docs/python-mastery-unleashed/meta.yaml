  md: 'binder is used; while for a ListBox a wx.EVT_LISTBOXbinder can be used.


    +   - wx.FocusEvent This event is sent when a window’s focus changes (loses or
    gains focus). You can pick up a window gaining focus using the wx. EVT_SET_FOCUS
    event binder. The wx.EVT__KILL__FOCUS is used to bind an event handler that will
    be called when a window loses focus.

    - wx.KeyEvent This event contains information relating to a key press or release.

    - wx.MaximizeEvent This event is generated when a top level window is maximized.

    - wx.MenuEvent This event is used for menu oriented actions such as the menu being
    opened or closed; however it should be noted that this event is not used when
