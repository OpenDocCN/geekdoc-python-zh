  md: '# Events in wxPython User Interfaces


    # Event Handling


    Events are an integral part of any GUI; they represent user interactions with
    the interface such as clicking on a button, entering text into a field, selecting
    a menu option etc.


    The main event loop listens for an event; when one occurs it processes that event
    (which usually results in a function or method being called) and then waits for
    the next event to happen. This loop is initiated in wxPython via the call to the
    MainLoop() method on the wx.App object.


    This raises the question ‘what is an Event?’. An event object is a piece of information
    representing some interaction that occurred typically with the GUI (although an
    event can be generated by anything). An event is processed by an Event Handler.
    This is a method or function that is called when the event occurs. The event is
    passed to the handler as a parameter. An Event Binder is used to bind an event
    to an event handler.'
  merge: -1
  pgno: 141
- img_proc: true
  md: '# Event Definitions


    It is useful to summarize the definitions around events as the terminology used
    can be confusing and is very similar:


    +   - Event represents information from the underlying GUI framework that describes
    something that has happened and any associated data. The specific data available
    will differ depending on what has occurred. For example, if a window has been
    moved then the associated data will relate to the window’s new location. Where
    as a CommandEvent generated by a selection action from a ListBox provides the
    item index for the selection.

    - Event Loop the main processing loop of the GUI that waits for an event to occur.When
    an event occurs the associated event handler is called.

    - Event Handlers these are methods (or functions) that are called when an event
    occurs.

    - EventBinders associate a type of event with an event handler. There are different
    event binders for different types of event.For example, the event binder associated
    with the wx.MoveEvent is named wx.EVT__MOVE.


    The relationship between the Event, the Event Handler via the Event Binder is
    illustrated below:'
