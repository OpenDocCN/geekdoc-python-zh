  md: '# Inter Thread/Process Synchronization


    # Introduction


    In this chapter we will look at several facilities supported by both the threading
    and multiprocessing libraries that allow for synchronization and cooperation between
    Threads or Processes.


    In the remainder of this chapter we will look at some of the ways in which Python
    supports synchronization between multiple Threads and Processes.Note that most
    of the libraries are mirrored between threading and multiprocessing so that the
    same basic ideas hold for both approaches with, in the main, very similar APIs.
    However, you should not mix and match threads and processes. If you are using
    Threads then you should only use facilities from the threading library. In turn
    if you are using Processes than you should only use facilities in the multiprocessing
    library. The examples given in this chapter will use one or other of the technologies
    but are relevant for both approaches.'
  merge: -1
