  md: '# RxPy Operators


    # Introduction


    In this chapter we will look at the types of operator provided by RxPy that can
    be applied to the data emitted by an Observable.


    # Reactive Programming Operators


    Behind the interaction between an Observable and an Observer is a data stream.
    That is the Observable supplies a data stream to an Observer that consumes/ processes
    that stream. It is possible to apply an operator to this data stream that can
    be used to to filter, transform and generally refine how and when the data is
    supplied to the Observer.


    The operators are mostly defined in the rx.operators module, for example rx.operators.average().
    However it is common to use an alias for this such that the operators module is
    called op, such as **from rx import operators as op**. This allows for a short
    hand form to be used when referencing an operator, such as op.average().'
  merge: -1
  pgno: 667
- img_proc: true
  md: 'Many of the RxPy operators execute a function which is applied to each of the
    data items produced by an Observable. Others can be used to create an initial
    Observable (indeed you have already seen these operators in the form of the from_list()
    operator).Another set of operators can be used to generate a result based on data
    produced by the Observable (such as the sum() operator).


    In fact RxPy provides a wide variety of operators and these operators can be categorized
    as follows:


    +   - Creational,

    - Transformational,

    - Combinatorial,

    - Filters,

    - Error handlers,

    - Conditional and Boolean operators,

    - Mathematical,

    - Connectable.


    Examples of some of these categories are presented in the rest of this section.


    # Piping Operators


    To apply an operator other than a creational operator to an Observable it is necessary
    to create a pipe. A Pipe is essentially'
  merge: -1
  pgno: 668
- img_proc: true
  md: 'a series of one or more operations that can be applied to the data stream generated
    by the Observable. The result of applying the pipe is that a new data stream is
    generated that represents the results produced following the application of each
    operator in turn. This is illustrated below:


    ![](img/8a661fca3884547aede940b9a6567321_669_0.png)


    To create a pipe the Observable.pipe() method is used. This method takes a comma
    delimited list of one or more operators and returns a data stream. Observers can
    then subscribe to the pipe’s data stream. This can be seen in the examples given
    in the rest of this chapter for transformations, filters, mathematical operators
    etc.


    # Creational Operators


    You have already seen an example of a creational operator in the examples presented
    earlier in this chapter. This is because the rx.from_list() operator is an example
    of a creational'
  merge: -1
  pgno: 669
- img_proc: true
  md: 'operator. It is used to create a new Observable based on data held in a list
    like structure.


    A more generic version of from_list() is the from_() operator. This operator takes
    an iterable and generates an Observable based on the data provided by the iterable.
    Any object that implements the iterable protocol can be used including user defined
    types. There is also an operator from_iterable(). All three operators do the same
    thing and you can choose which to use based on which provides the most semantic
    meaning in your context.


    All three of the following statements have the same effect:


    ```

    source = rx.from_([2, 3, 5, 7])

    source = rx.from_iterable([2, 3, 5, 7])

    source = rx.from_list([2, 3, 5, 7])

    ```


    This is illustrated pictorially below:


    ![](img/8a661fca3884547aede940b9a6567321_670_0.png)'
