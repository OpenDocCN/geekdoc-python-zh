- md: "## Running Multiple Tasks\n\nIn many cases it is useful to be able to run several\
    \ tasks concurrently. There are two options provided for this: the `asyncio.gather()`\
    \ and the `asyncio.as_completed()` function; we will look at both in this section.\n\
    \n## Collating Results from Multiple Tasks\n\nIt is often useful to collect all\
    \ the results from a set of tasks together and to continue only once all the results\
    \ have been obtained. When using Threads or Processes this can be achieved by\
    \ starting multiple Threads or Processes and then using some other object such\
    \ as a Barrier to wait for all the results to be available before continuing.\
    \ Within the Async IO library all that is required is to use the `asyncio.gather()`\
    \ function with a list of the async functions to run, for example:\n\n```python\n\
    import asyncio\nimport random\n\nasync def worker():\n    print('Worker - will\
    \ take some time')\n    await asyncio.sleep(1)\n    result = random.randint(1,\
    \ 10)\n    print('Worker - Done it')\n    return result\n\nasync def do_something():\n\
    \    print('do_something - will wait for worker')\n    # Run three calls to worker\
    \ concurrently and collect results\n    results = await asyncio.gather(worker(),\
    \ worker(), worker())\n    print('results from calls:', results)\n\ndef main():\n\
    \    print('Main - Starting')\n    asyncio.run(do_something())\n    print('Main\
    \ - Done')\n\nif __name__ == '__main__':\n    main()\n```\n\nIn this program the\
    \ `do_something()` function uses\n\n```python\nresults = await asyncio.gather(worker(),\
    \ worker(), worker())\n```\n\nto run three invocations of the `worker()` function\
    \ in three separate Tasks and to wait for the results of all three to be made\
    \ available before they are returned as a list of values and stored in the `results`\
    \ variable.\n\nThis makes it very easy to work with multiple concurrent tasks\
    \ and to collate their results.\n\nNote that in this code example the `worker`\
    \ async function returns a random number between 1 and 10.\n\nThe output from\
    \ this program is:\n\n```\nMain - Starting\ndo_something - will wait for worker\n\
    Worker - will take some time\nWorker - will take some time\nWorker - will take\
    \ some time\nWorker - Done it\nWorker - Done it\nWorker - Done it\nresults from\
    \ calls: [5, 3, 4]\nMain - Done\n```\n\nAs you can see from this all three of\
    \ the worker invocations are started but then release the processor while they\
    \ sleep. After this the three tasks wake up and complete before the results are\
    \ collected together and printed out.\n\n## Handling Task Results as They Are\
    \ Made Available\n\nAnother option when running multiple Tasks is to handle the\
    \ results as they become available, rather than wait for all the results to be\
    \ provided before continuing. This option is supported by the `asyncio.as_completed()`\
    \ function. This function returns an iterator of async functions which will be\
    \ served up as soon as they have completed their work.\n\nThe for-loop construct\
    \ can be used with the iterator returned by the function; however within the for\
    \ loop the code must call `await` on the async functions returned so that the\
    \ result of the task can be obtained. For example:\n\n```python\nasync def do_something():\n\
    \    print('do_something - will wait for worker')\n    # Run three calls to worker\
    \ concurrently and collect results\n    for async_func in asyncio.as_completed((worker('A'),\
    \ worker('B'), worker('C'))):\n        result = await async_func\n        print('do_something\
    \ - result:', result)\n```\n\nNote that the `asyncio.as_completed()` function\
    \ takes a container such as a tuple of async functions.\n\nWe have also modified\
    \ the `worker` function slightly so that a label is added to the random number\
    \ generated so that it is clear which invocation of the `worker` function return\
    \ which result:\n\n```python\nasync def worker(label):\n    print('Worker - will\
    \ take some time')\n    await asyncio.sleep(1)\n    result = random.randint(1,\
    \ 10)\n    print('Worker - Done it')\n    return label + str(result)\n```\n\n\
    When we run this program\n\n```python\ndef main():\n    print('Main - Starting')\n\
    \    asyncio.run(do_something())\n    print('Main - Done')\n```\n\nThe output\
    \ is\n\n```\nMain - Starting\ndo_something - will wait for worker\nWorker - will\
    \ take some time\nWorker - will take some time\nWorker - will take some time\n\
    Worker - Done it\nWorker - Done it\nWorker - Done it\ndo_something - result: C2\n\
    do_something - result: A1\ndo_something - result: B10\nMain - Done\n```\n\nAs\
    \ you can see from this, the results are not returned in the order that the tasks\
    \ are created, task ‘C’ completes first followed by ‘A’ and ‘B’. This illustrates\
    \ the behavior of the `asyncio.as_completed()` function.\n\n## Try\n\nThis exercise\
    \ will use the facilities in the AsyncIO library to calculate a set of factorial\
    \ numbers.\n\nThe factorial of a positive integer is the product of all positive\
    \ integers less than or equal to n. For example,\n\n5! = 5 x 4 x 3 x 2 x 1 = 120\n\
    \nNote that the value of 0! is 1.\n\nCreate an application that will use the `async`\
    \ and `await` keywords to calculate the factorials of a set of numbers. The factorial\
    \ function should await for 0.1 of a second (using `asyncio.sleep(0.1)`) each\
    \ time round the loop used to calculate the factorial of a number.\n\nYou can\
    \ use with `asyncio.as_completed()` or `asyncio.gather()` to collect the results\
    \ up. You might also use a list comprehension to create the list of calls to the\
    \ factorial function.\n\nThe main function might look like:\n\n```python\ndef\
    \ main():\n    print('Main - Starting')\n    asyncio.run(calculate_factorials([5,\
    \ 7, 3, 6]))\n    print('Main - Done')\n\nif __name__ == '__main__':\n    main()\n\
    ```\n\n## Reactive Programming Introduction\n\n### Introduction\n\nIn this chapter\
    \ we will introduce the concept of Reactive Programming. Reactive programming\
    \ is a way of writing programs that allow the system to react to data being published\
    \ to it. We will look at the RxPy library which provides a Python implementation\
    \ of the ReactiveX approach to Reactive Programming.\n\n### What Is a Reactive\
    \ Application?\n\nA Reactive Application is one that must react to data; typically\
    \ either to the presence of new data, or to changes in existing data. The Reactive\
    \ Manifesto presents the key characteristics of Reactive Systems as:\n\n-   Responsive.\
    \ This means that such systems respond in a timely manner. Here of course timely\
    \ will differ depending upon the application and domain; in one situation a second\
    \ may be timely in another it may be far too slow.\n-   Resilient. Such systems\
    \ stay responsive in the face of failure. The systems must therefore be designed\
    \ to handle failure gracefully and continue to work appropriately following the\
    \ failure.\n-   Elastic. As the workload grows the system should continue to be\
    \ responsive.\n-   Message Driven. Information is exchanged between elements of\
    \ a reactive system using messages. This ensures loose coupling, isolation and\
    \ location transparency between these components.\n\nAs an example, consider an\
    \ application that lists a set of Equity Stock Trade values based on the latest\
    \ market stock price data. This application might present the current value of\
    \ each trade within a table. When new market stock price data is published, then\
    \ the application must update the value of the trade within the table. Such an\
    \ application can be described as being reactive.\n\nReactive Programming is a\
    \ programming style (typically supported by libraries) that allows code to be\
    \ written that follow the ideas of reactive systems. Of course just because part\
    \ of an application uses a Reactive Programming library does not make the whole\
    \ application reactive; indeed it may only be necessary for part of an application\
    \ to exhibit reactive behavior."
  mdcn: "## 运行多个任务\n\n在许多情况下，能够同时运行多个任务非常有用。为此提供了两种选择：`asyncio.gather()` 函数和 `asyncio.as_completed()`\
    \ 函数；我们将在本节中探讨这两种方法。\n\n## 整合多个任务的结果\n\n通常，将一组任务的所有结果收集在一起，并在获得所有结果后才继续执行，这非常有用。当使用线程或进程时，可以通过启动多个线程或进程，然后使用其他对象（如屏障）来等待所有结果就绪后再继续。在异步IO库中，只需使用\
    \ `asyncio.gather()` 函数并传入要运行的异步函数列表即可，例如：\n\n```python\nimport asyncio\nimport\
    \ random\n\nasync def worker():\n    print('Worker - will take some time')\n \
    \   await asyncio.sleep(1)\n    result = random.randint(1, 10)\n    print('Worker\
    \ - Done it')\n    return result\n\nasync def do_something():\n    print('do_something\
    \ - will wait for worker')\n    # Run three calls to worker concurrently and collect\
    \ results\n    results = await asyncio.gather(worker(), worker(), worker())\n\
    \    print('results from calls:', results)\n\ndef main():\n    print('Main - Starting')\n\
    \    asyncio.run(do_something())\n    print('Main - Done')\n\nif __name__ == '__main__':\n\
    \    main()\n```\n\n在这个程序中，`do_something()` 函数使用\n\n```python\nresults = await\
    \ asyncio.gather(worker(), worker(), worker())\n```\n\n在三个独立的任务中运行三个 `worker()`\
    \ 函数调用，并等待所有三个任务的结果就绪，然后将它们作为值列表返回并存储在 `results` 变量中。\n\n这使得处理多个并发任务并整合其结果变得非常容易。\n\
    \n请注意，在此代码示例中，`worker` 异步函数返回一个1到10之间的随机数。\n\n该程序的输出为：\n\n```\nMain - Starting\n\
    do_something - will wait for worker\nWorker - will take some time\nWorker - will\
    \ take some time\nWorker - will take some time\nWorker - Done it\nWorker - Done\
    \ it\nWorker - Done it\nresults from calls: [5, 3, 4]\nMain - Done\n```\n\n如你所见，所有三个worker调用都已启动，但在它们休眠时释放了处理器。之后，三个任务被唤醒并完成，然后结果被收集在一起并打印出来。\n\
    \n## 在任务结果可用时进行处理\n\n运行多个任务的另一个选项是在结果可用时立即处理，而不是等待所有结果都提供后再继续。此选项由 `asyncio.as_completed()`\
    \ 函数支持。该函数返回一个异步函数的迭代器，这些函数将在完成工作后立即被提供。\n\n可以将for循环结构与该函数返回的迭代器一起使用；然而，在for循环内，代码必须对返回的异步函数调用\
    \ `await`，以便获取任务的结果。例如：\n\n```python\nasync def do_something():\n    print('do_something\
    \ - will wait for worker')\n    # Run three calls to worker concurrently and collect\
    \ results\n    for async_func in asyncio.as_completed((worker('A'), worker('B'),\
    \ worker('C'))):\n        result = await async_func\n        print('do_something\
    \ - result:', result)\n```\n\n请注意，`asyncio.as_completed()` 函数接受一个容器，例如异步函数的元组。\n\
    \n我们还稍微修改了 `worker` 函数，以便在生成的随机数上添加标签，从而清楚哪个 `worker` 函数调用返回了哪个结果：\n\n```python\n\
    async def worker(label):\n    print('Worker - will take some time')\n    await\
    \ asyncio.sleep(1)\n    result = random.randint(1, 10)\n    print('Worker - Done\
    \ it')\n    return label + str(result)\n```\n\n当我们运行这个程序\n\n```python\ndef main():\n\
    \    print('Main - Starting')\n    asyncio.run(do_something())\n    print('Main\
    \ - Done')\n```\n\n输出为\n\n```\nMain - Starting\ndo_something - will wait for worker\n\
    Worker - will take some time\nWorker - will take some time\nWorker - will take\
    \ some time\nWorker - Done it\nWorker - Done it\nWorker - Done it\ndo_something\
    \ - result: C2\ndo_something - result: A1\ndo_something - result: B10\nMain -\
    \ Done\n```\n\n如你所见，结果并非按照任务创建的顺序返回，任务'C'最先完成，其次是'A'和'B'。这说明了 `asyncio.as_completed()`\
    \ 函数的行为。\n\n## 尝试\n\n本练习将使用AsyncIO库中的功能来计算一组阶乘数。\n\n正整数n的阶乘是所有小于或等于n的正整数的乘积。例如，\n\
    \n5! = 5 x 4 x 3 x 2 x 1 = 120\n\n请注意，0! 的值为1。\n\n创建一个应用程序，使用 `async` 和 `await`\
    \ 关键字来计算一组数字的阶乘。阶乘函数应在每次用于计算数字阶乘的循环中等待0.1秒（使用 `asyncio.sleep(0.1)`）。\n\n你可以使用\
    \ `asyncio.as_completed()` 或 `asyncio.gather()` 来收集结果。你也可以使用列表推导式来创建对阶乘函数的调用列表。\n\
    \n主函数可能如下所示：\n\n```python\ndef main():\n    print('Main - Starting')\n    asyncio.run(calculate_factorials([5,\
    \ 7, 3, 6]))\n    print('Main - Done')\n\nif __name__ == '__main__':\n    main()\n\
    ```\n\n## 响应式编程简介\n\n### 简介\n\n在本章中，我们将介绍响应式编程的概念。响应式编程是一种编写程序的方式，它允许系统对发布给它的数据做出反应。我们将探讨RxPy库，它提供了ReactiveX响应式编程方法的Python实现。\n\
    \n### 什么是响应式应用程序？\n\n响应式应用程序是必须对数据做出反应的应用程序；通常是对新数据的存在或现有数据的变化做出反应。响应式宣言将响应式系统的关键特征呈现为：\n\
    \n-   响应性。这意味着此类系统能够及时响应。当然，及时性会因应用程序和领域而异；在一种情况下，一秒钟可能是及时的，而在另一种情况下，它可能太慢了。\n\
    -   韧性。此类系统在面临故障时仍能保持响应。因此，系统必须设计为能够优雅地处理故障，并在故障后继续正常工作。\n-   弹性。随着工作负载的增长，系统应继续保持响应。\n\
    -   消息驱动。响应式系统的元素之间使用消息交换信息。这确保了这些组件之间的松耦合、隔离性和位置透明性。\n\n举个例子，考虑一个基于最新市场股票价格数据列出一组股票交易价值的应用程序。该应用程序可能在表格中显示每笔交易的当前价值。当新的市场股票价格数据发布时，应用程序必须更新表格中交易的价值。这样的应用程序可以被描述为响应式的。\n\
    \n响应式编程是一种编程风格（通常由库支持），它允许编写遵循响应式系统思想的代码。当然，仅仅因为应用程序的一部分使用了响应式编程库，并不意味着整个应用程序就是响应式的；实际上，可能只需要应用程序的一部分表现出响应式行为。"
