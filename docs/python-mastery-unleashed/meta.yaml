- img_proc: true
  md: 'mechanisms available depend on the underlying operating system:


    +   - ‘spawn’ The parent process start a fresh Python interpreter process. The
    child process will only inherit those resources necessary to run the process objects
    run() method. In particular, unnecessary file descriptors and handles from the
    parent process will not be inherited. Starting a process using this method is
    rather slow compared to using fork or fork server. Available on Unix and Windows.
    This is the default on Windows.

    - ‘fork’ The parent process uses os.fork() to fork the Python interpreter. The
    child process, when it begins, is effectively identical to the parent process.
    All resources of the parent are inherited by the child process. Available only
    on Unix type operating systems. This is the default on Unix, Linux and Mac OS.

    - ‘fork server’ In this case a server process is started. From then on, whenever
    a new process is needed, the parent process connects to the server and requests
    that it fork a new process.The fork server process is single threaded so it is
    safe for it to use os.fork(). No unnecessary resources are inherited. Available
    on Unix style platforms which support passing file descriptors over Unix pipes.


    The set_start_method() should be used to set the start method (and this should
    only be set once within a program).'
