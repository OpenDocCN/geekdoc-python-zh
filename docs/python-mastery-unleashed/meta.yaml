    ## Further Concepts


    There are very many facilities in pygame that go beyond what we can cover in this
    book, however a few of the more common are discussed below.


    Surfaces are a hierarchy. The top level Display Surface may contain other surfaces
    that may be used to draw images or text. In turn containers such as Panels may
    render surfaces to display images or text etc.


    Other types of surface. The primary Display Surface is not the only surface in
    pygame. For example, when an image, such as a PNG or JPEG image is loaded into
    a game then it is rendered onto a surface. This surface can then be displayed
    within another surface such as the Display Surface. This means that anything you
    can do to the Display Surface you can do with any other surface such as draw on
    it, put text on it, color it, add another icon onto the surface etc.


    Fonts. The pygame.font.Font object is used to create a Font that can be used to
    render text onto a surface. The render method returns a surface with the text
    rendered on it that can be displayed within another surface such as the Display
    Surface. Note that you cannot write text onto an existing surface you must always
    obtain a new surface (using render) and then add that to an existing surface.
    The text can only be displayed in a single line and the surface holding the text
    will be of the dimensions required to render the text. For example:


    ```

    text_font = pygame.font.Font(''freesansbold.ttf'', 18)

    text_surface = text_font.render(''Hello World'',

    antialias=True, color=BLUE)

    ```


    This creates a new Font object using the specified font with the specified font
    size (in this case 18). It will then render the string ‘Hello World’ on to a new
    surface using the specified font and font size in Blue. Specifying that anti alias
    is True indicates that we would like to smooth the edges of the text on the screen.


    Rectangles (or Rects). The pygame.Rect class is an object used to represent rectangular
    coordinates. A Rect can be created from a combination of the top left corner coordinates
    plus a width and height. For flexibility many functions that expect a Rect object
    can also be given a Rect like list; this is a list that contains the data necessary
    to create a Rect object. Rects are very useful in a pygame Game as they can be
    used to define the borders of a game object. This means that they can be used
    within games to detect if two objects have collided. This is made particularly
    easy because the Rect class provides several collision detection methods:


    - pygame.Rect.contains() test if one rectangle is inside another

    - pygame.Rect.collidepoint() test if a point is inside a rectangle

    - pygame.Rect.colliderect() test if two rectangles overlap

    - pygame.Rect.collidelist() test if one rectangle in a list intersects

    - pygame.Rect.collidelistall() test if all rectangles in a list intersect

    - pygame.Rect.collidedict() test if one rectangle in a dictionary intersects

    - pygame.Rect.collidedictall() test if all rectangles in a dictionary intersect


    The class also provides several other utility methods such as move() which moves
    the rectangle and inflate() which can grow or shrink the rectangles size.


    Drawing shapes. The pygame.draw module has numerous functions that can be used
    to draw lines and shapes onto a surface, for example:


    ```

    pygame.draw.rect(display_surface, BLUE, [x, y, WIDTH, HEIGHT])

    ```


    This will draw a filled blue rectangle (the default) onto the display surface.
    The rectangle will be located at the location indicated by x and y (on the surface).
    This indicates the top left hand corner of the rectangle. The width and height
    of the rectangle indicate its size. Note that these dimensions are defined within
    a list which is a structure referred to as being rect like (see below). If you
    do not want a filled rectangle (i.e. You just want the outline) then you can use
    the optional width parameter to indicate the thickness of the outer edge. Other
    methods available include:


    - pygame.draw.polygon() draw a shape with any number of sides

    - pygame.draw.circle() draw a circle around a point

    - pygame.draw.ellipse() draw a round shape inside a rectangle

    - pygame.draw.arc() draw a partial section of an ellipse

    - pygame.draw.line() draw a straight line segment

    - pygame.draw.lines() draw multiple contiguous line segments

    - pygame.draw.aaline() draw fine antialiased lines

    - pygame.draw.aalines() draw a connected sequence of antialiased lines


    Images. The pygame.image module contains functions for loading, saving and transforming
    images. When an image is loaded into pygame, it is represented by a Surface object.
    This means that it is possible to draw, manipulate and process an image in exactly
    the same way as any other surface which provides a great deal of flexibility.


    At a minimum the module only supports loading uncompressed BMP images but usually
    also supports JPEG, PNG, GIF (non-animated), BMP, TIFF as well as other formats.


    However, it only supports a limited set of formats when saving images; these are
    BMP, TGA, PNG and JPEG.


    An image can be loaded from a file using:


    ```

    image_surface = pygame.image.load(filename).convert()

    ```'
