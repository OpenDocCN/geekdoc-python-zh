    # Synchronizing Concurrent Code


    It is not uncommon to need to ensure that critical regions of code are protected
    from concurrent execution by multiple Threads or Processes. These blocks of code
    typically involve the modification of, or access to, shared data. It is therefore
    necessary to ensure that only one Thread or Process is updating a shared object
    at a time and that consumer threads or processes are blocked while this update
    is occurring.


    This situation is most common where one or more Threads or Processes are the producers
    of data and one or more other Threads or Processes are the consumers of that data.
    This is illustrated in the following diagram.


    ![](img/8a661fca3884547aede940b9a6567321_587_0.png)'
