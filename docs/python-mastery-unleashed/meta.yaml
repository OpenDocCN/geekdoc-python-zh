- md: "## Adding a New Book\n\nWe also want to support adding a new book to the Bookshop.\
    \ The details of a new book could just be added to the URL as URL path parameters;\
    \ however as the amount of data to be added grows this would become increasingly\
    \ difficult to maintain and verify. Indeed although historically there was a limit\
    \ of 2083 characters in Microsoft’s Internet Explorer (IE) which has theoretically\
    \ been removed since IE8, in practice there are typically still limits on the\
    \ size of the URL. Most web servers have a limit of 8 KB (or 8192 bytes) although\
    \ this is typically configurable. There may also be client side limits (such as\
    \ those imposed by IE or Apple’s Safari (which usually have a 2 KB limit). If\
    \ the limit is exceeded in either a browser or on the server, then most systems\
    \ will just truncate the characters outside the limit (in some cases without any\
    \ warning).\n\nTypically such data is therefore sent in the body of the HTTP request\
    \ as part of an HTTP Post request. This limit on the size of a Post request's\
    \ message body is much higher (usually up to 2 GB). This means that it is a much\
    \ more reliable and safer way to transfer data to a web service. However, it should\
    \ be noted that this does not mean that the data is any more secure than if it\
    \ is part of the URL; just that it is sent in a different way. From the point\
    \ of view of the Python functions that are invoked as the result of an HTTP Post\
    \ method request it means that the data is not available as a parameter to the\
    \ URL and thus to the function. Instead, within the function it is necessary to\
    \ obtain the request object and then to use that to obtain the information held\
    \ within the body of the request.\n\nA key attribute on the request object, available\
    \ when an HTTP request contains JSON data, is the `request.json` attribute. This\
    \ attribute contains a dictionary like structure holding the values associated\
    \ with the keys in the JSON data structure.\n\nThis is shown below for the `create_book()`\
    \ function.\n\n**from flask import request, abort**\n\n```python\n@app.route('/book',\
    \ methods=['POST'])\ndef create_book():\n    print('create book')\n    if not\
    \ request.json or not 'isbn' in request.json:\n        abort(400)\n    book =\
    \ Book(request.json['isbn'], request.json['title'],\n                request.json.get('author',\
    \ \"\"), float(request.json['price']))\n    bookshop.add_book(book)\n    return\
    \ jsonify({'book': book}), 201\n```\n\nThe above function accesses the `flask.request`\
    \ object that represents the current HTTP request. The function first checks to\
    \ see that it contains JSON data and that the ISBN of the book to add, is part\
    \ of that JSON structure. If the ISBN is not then the `flask.abort()` function\
    \ is called passing in a suitable HTTP response status code. In this case the\
    \ error code indicates that this was a Bad Request (HTTP Error Code 400).\n\n\
    If however the JSON data is present and does contain an ISBN number then the values\
    \ for the keys `isbn`, `title`, `author` and `price` are obtained. Remember that\
    \ JSON is a dictionary like structure of keys and values thus treating it in this\
    \ way makes it easy to extract the data that a JSON structure holds. It also means\
    \ that we can use both method and key oriented access styles. This is shown above\
    \ where we use the `get()` method along with a default value to use, if an author\
    \ is not specified.\n\nFinally, as we want to treat the price as a floating point\
    \ number we must use the `float()` function to convert the string format supplied\
    \ by JSON into a float. Using the data extracted we can instantiate a new `Book`\
    \ instance that can be added to the bookshop. As is common in web services we\
    \ are returning the newly created book object as the result of creating the book\
    \ along with the HTTP response status code 201, which indicates the successful\
    \ creation of a resource.\n\nWe can now test this service using the `curl` command\
    \ line program:\n\n```bash\ncurl -H \"Content-Type: application/json\" -X POST\
    \ -d '{\"title\":\"Read a book\", \"author\":\"Bob\", \"isbn\":\"5\", \"price\"\
    :\"3.44\"}' http://localhost:5000/book\n```\n\nThe options used with this command\
    \ indicate the type of data being sent in the body of the request (`-H`) along\
    \ with the data to include in the body of the request (`-d`). The result of running\
    \ this command is:\n\n```json\n{\n    \"book\": {\n        \"author\": \"Bob\"\
    ,\n        \"isbn\": \"5\",\n        \"price\": 3.44,\n        \"title\": \"Read\
    \ a book\"\n    }\n}\n```\n\nIllustrating that the new book by Bob has been added.\n\
    \n## Updating a Book\n\nUpdating a book that is already held by the bookshop object\
    \ is very similar to adding a book except that the HTTP Put request method is\
    \ used.\n\nAgain the function implementing the required behavior must use the\
    \ `flask.request` object to access the data submitted along with the PUT request.\
    \ However, in this case the ISBN number specified is used to find the book to\
    \ be updated, rather than specifying a completely new book.\n\nThe `update_book()`\
    \ function is given below:\n\n```python\n@app.route('/book', methods=['PUT'])\n\
    def update_book():\n    if not request.json or not 'isbn' in request.json:\n \
    \       abort(400)\n    isbn = request.json['isbn']\n    book = bookshop.get(isbn)\n\
    \    book.title = request.json['title']\n    book.author = request.json['author']\n\
    \    book.price = request.json['price']\n    return jsonify({'book': book}), 201\n\
    ```\n\nThis function resets the title, author and price of the book retrieved\
    \ from the bookshop. It again returns the updated book as the result of running\
    \ the function.\n\nThe `curl` program can again be used to invoke this function,\
    \ although this time the HTTP Put method must be specified:\n\n```bash\ncurl -H\
    \ \"Content-Type: application/json\" -X PUT -d '{\"title\":\"Read a Python Book\"\
    , \"author\":\"Bob Jones\",\"isbn\":\"5\", \"price\":\"3.44\"}' http://localhost:5000/book\n\
    ```\n\nThe output from this command is:\n\n```json\n{\n    \"book\": {\n     \
    \   \"author\": \"Bob Jones\",\n        \"isbn\": \"5\",\n        \"price\": \"\
    3.44\",\n        \"title\": \"Read a Python Book\"\n    }\n}\n```\n\nThis shows\
    \ that book 5 has been updated with the new information.\n\n## What Happens if\
    \ We Get It Wrong?\n\nThe code presented for the bookshop web services is not\
    \ particularly defensive, as it is possible to try to add a new book with the\
    \ same ISBN as an existing one. However, it does check to see that an ISBN number\
    \ has been supplied with both the `create_book()` and `update_book()` functions.\
    \ However, what happens if an ISBN number is not supplied? In both functions we\
    \ call the `flask.abort()` function. By default if this happens an error message\
    \ will be sent back to the client. For example, in the following command we have\
    \ forgotten to include the ISBN number:\n\n```bash\ncurl -H \"Content-Type: application/json\"\
    \ -X POST -d '{\"title\":\"Read a book\", \"author\":\"Tom Andrews\", \"price\"\
    :\"13.24\"}' http://localhost:5000/book\n```\n\nThis generates the following error\
    \ output:\n\n```html\n<!DOCTYPE HTML PUBLIC \"-//W3C//DTD HTML 3.2 Final//EN\"\
    >\n<title>400 Bad Request</title>\n<h1>Bad Request</h1>\n<p>The browser (or proxy)\
    \ sent a request that this server could not understand.</p>\n```\n\nThe odd thing\
    \ here is that the error output is in HTML format, which is not what we might\
    \ have expected since we are creating a web service and working with JSON. The\
    \ problem is that Flask has defaulted to generating an error HTML web page that\
    \ it expects to be rendered in a web browser.\n\nWe can overcome this by defining\
    \ our own custom error handler function. This is a function that is decorated\
    \ with an `@app.errorhandler()` decorator which provides the response status code\
    \ that it handles. For example:\n\n```python\n@app.errorhandler(400)\ndef not_found(error):\n\
    \    return make_response(jsonify({'book': 'Not found'}), 400)\n```\n\nNow when\
    \ a 400 code is generated via the `flask.abort()` function, the `not_found()`\
    \ function will be invoked and a JSON response will be generated with the information\
    \ provided by the `flask.make_response()` function. For example:\n\n```bash\n\
    curl -H \"Content-Type: application/json\" -X POST -d '{\"title\":\"Read a book\"\
    , \"author\":\"Tom Andrews\", \"price\":\"13.24\"}' http://localhost:5000/book\n\
    ```"
