    \n正如预期的那样，生产者线程或进程生成数据供一个或多个消费者线程或进程处理的模型非常常见，以至于 Python 提供了比使用锁、条件或信号量更高层次的抽象；这就是由\
    \ threading.Queue 或 multiprocessing.Queue 类实现的阻塞队列模型。\n\n这两个队列类都是线程和进程安全的。也就是说，它们使用内部锁来适当地管理来自并发线程或进程的数据访问。\n\
