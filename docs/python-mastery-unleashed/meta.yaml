    # Mandelbrot Set


    Probably one of the most famous fractal images is based on the Mandelbrot set.
    The Mandelbrot set is the set of complex numbers c for which the function z *
    z + c does not diverge when iterated from z = 0 for which the sequence of functions'
  merge: -1
  pgno: 56
- img_proc: true
  md: '(func(0), func(func(0)) etc.) remains bounded by an absolute value. The definition
    of the Mandelbrot set and its name is down to the French mathematician Adrien
    Douady, who named it as a tribute to the mathematician Benoit Mandelbrot.


    Mandelbrot set images may be created by sampling the complex numbers and testing,
    for each sample point c, whether the sequence func(0), func(func(0)) etc. ranges
    to infinity (in practice this means that a test is made to see if it leaves some
    predetermined bounded neighborhood of 0 after a predetermined number of iterations).
    Treating the real and imaginary parts of c as image coordinates on the complex
    plane, pixels may then be colored according to how soon the sequence crosses an
    arbitrarily chosen threshold, with a special color (usually black) used for the
    values of c for which the sequence has not crossed the threshold after the predetermined
    number of iterations (this is necessary to clearly distinguish the Mandelbrot
    set image from the image of its complement).


