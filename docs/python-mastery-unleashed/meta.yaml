    The fundamental concepts presented via a WIMP interface were originally developed
    at XEROX’s Palo Alto Research Center and used on the Xerox Star machine, but gained
    much wider acceptance through first the Apple Macintosh and then IBM PC implementations
    of WIMP interfaces.


    Most WIMP style environments use a desktop analogy (although this is less true
    of mobile devices such as phones and tablets):


    +   - the whole screen represents a working surface (a desktop),

    - graphic windows that can overlap represent sheets of paper on that desktop,

    - graphic objects are used for specific concepts, for example filing cabinets
    for disks or a waste bin for file disposal (these could be regarded as desk accessories),

    - various application programs are displayed on the screen, these stand for tools
    that you might use on your desktop.


    In order to interact with this display, the WIMP user is provided with a mouse
    (or alight pen or a touch sensitive screen), which can be used to select icons
    and menus or to manipulate windows.'
- md: 'The software basis of any WIMP style environment is the window manager. It
    controls the multiple, possibly overlapping windows and icons displayed on the
    screen. It also handles the transfer of information about events which occur in
    those windows to the appropriate application and generates the various menus and
    prompts used.


    A window is an area of the graphic screen in which a page or piece of a page of
    information may be displayed; it may display text, graphics or a combination of
    both. These windows may be overlapping, and associated with the same process,
    or they may be associated with separate processes. Windows can generally be created,
    opened, closed, moved and resized.


    An icon is a small graphic object that is usually symbolic of an operation or
    of a larger entity such as an application program or a file. The opening of an
    icon causes either the associated application to execute or the associated window
    to be displayed.


    At the heart of the user''s ability to interact with such WIMP based programs
    is the event loop. This loop listens for events such as the user clicking a button
    or selecting a menu item or entering a text field. When such an event occurs it
    triggers the associated behavior (such as running a function linked with a button).


    ## Windowing Frameworks for Python


    Python is a cross platform programming language. As such Python programs can be
    written on one platform (such as a Linux box) and then run on that platform or
    another operating system platform (such as Windows or Mac OS). This can however
    generate issues for libraries that need to be available across multiple operating
    system platforms. The area of GUIs is particularly an issue as a library written
    to exploit features available in the Microsoft Windows system may not be available
    (or may look different) on Mac OS or Linux systems.


    Each operating system that Python runs on may have one or more windowing systems
    written for it and these systems may or may not be available on other operating
    systems. This makes the job of providing a GUI library for Python that much more
    difficult.


    Developers of Python GUIs have taken one of two approaches to handle this:


    - One approach is to write a wrapper that abstracts the underlying GUI facilities
    so that the developer works at a level above a specific windowing system’s facilities.
    The Python library then maps (as best it can) the facilities to the underlying
    system that is currently being used.

    - The other approach is to provide a closer wrapping to a particular set of facilities
    on the underlying GUI system and to only target systems that support those facilities.


    Some of the libraries available for Python are listed below and have been categorized
    into platform-independent libraries and platform specific libraries:


    ## Platform-Independent GUI Libraries


    - Tkinter. This is the standard built-in Python GUI library. It is built on top
    of the Tcl/Tk widget set that has been around for very many years for many different
    operating systems. Tcl stands for Tool Command Language while Tk is the graphical
    user interface toolkit for Tcl.

    - wxPython. wxWidgets is a free, highly portable GUI library. It is written in
    C++ and it can provide a native look and feel on operating systems such as Windows,
    Mac OS, Linux etc. wxPython is a set of Python bindings for wxWidgets. This is
    the library that we will be using in this chapter.

    - PyQt or PySide both of these libraries wrap the Qt toolkit facilities. Qt is
    a cross platform software development system for the implementation of GUIs and
    applications.


    ## Platform-Specific GUI Libraries


    - PyObjc is a Mac OS specific library that provides an Objective-C bridge to the
    Apple Mac Cocoa GUI libraries.

    - PythonWin provides a set of wrappings around the Microsoft Windows foundation
    classes and can be used to create Windows based GUIs.


    ## The wxPython GUI Library


    **The wxPython Library**


    The wxPython library is a cross platform GUI library (or toolkit) for Python.
    It allows programmers to develop highly graphical user interfaces for their programs
    using common concepts such as menu bars, menus, buttons, fields, panels and frames.


    In wxPython all the elements of a GUI are contained within top level windows such
    as a wx.Frame or a wx.Dialog. These windows contain graphical components known
    as widgets or controls. These widgets/controls may be grouped together into Panels
    (which may or may not have a visible representation).


    Thus in wxPython we might construct a GUI from:


    - Frames which provide the basic structure for a window: borders, a label and
    some basic functionality (e.g. resizing).

    - Dialogs which are like Frames but provide fewer border controls.

    - Widgets/Controls that are graphical objects displayed in a frame. Some other
    languages refer to them as UI components. Examples of widgets are buttons, checkboxes,
    selection lists, labels and text fields.

    - Containers are components that are made up of one or more other components (or
    containers). All the components within a container (such as a panel) can be treated
    as a single entity.


    Thus a GUI is constructed hierarchically from a set of widgets, containers and
    one or more Frames (or in the case of a pop up dialog then Dialogs). This is illustrated
    below for a window containing several panels and widgets:


    ![](img/8a661fca3884547aede940b9a6567321_119_0.png)


    Windows such as Frames and Dialogs have a component hierarchy that is used (amongst
    other things) to determine how and when elements of the window are drawn and redrawn.
    The component hierarchy is rooted with the frame, within which components and
    containers can be added.


    The above figure illustrates a component hierarchy for a frame, with two container
    Panels and a few basic widgets/ui components held within the Panels. Note that
    a panel can contain another sub panel with different widgets in.


    ## wxPython Modules


    The wxPython library is comprised of many different modules. These modules provide
    different features from the core wx module to the html oriented wx.html and wx.html2
    modules. These modules include:


    - wx which holds the core widgets and classes in the wx library.

    - wx.adv that provides less commonly used or more advanced widgets and classes.

    - wx.grid contains widgets and classes supporting the display and editing of tabular
    data.

    - wx.richtext consists of widgets and classes used for displaying multiple text
    styles and images.

    - wx.html comprises widgets and supporting classes for a generic html renderer.

    - wx.html2 provides further widget and supporting classes for a native html renderer,
    with CSS and javascript support.


    ## Windows as Objects


    In wxPython, Frames and Dialogs as well as their contents are instances of appropriate
    classes (such as Frame, Dialog, Panel, Button or Static Text). Thus when you create
    a window, you create an object that knows how to display itself on the computer
    screen. You must tell it what to display and then tell it to show its contents
    to the user.


    You should bear the following points in mind during your reading of this chapter;
    they will help you understand what you are required to do:


    - You create a window by instantiating a Frame or Dialog object.

    - You define what the window displays by creating a widget that has an appropriate
    parent component. This adds the widget to a container, such as a type of panel
    or a frame.

    - You can send messages to the window to change its state, perform an operation,
    and display a graphic object.

    - The window, or components within the window, can send messages to other objects
    in response to user (or program) actions.

    - Everything displayed by a window is an instance of a class and is potentially
    subject to all of the above.

    - wx.App handles the main event loop of the GUI application.


    ## A Simple Example


    An example of creating a very simple window using wxPython is given below. The
    result of running this short program is shown here for both a Mac and a Windows
    PC:


    ![](img/8a661fca3884547aede940b9a6567321_122_0.png)


    This program creates a top level window (the wx.Frame) and gives it a title. It
    also creates a label (a wx.StaticText object) to be displayed within the frame.


    To use the wxPython library it is necessary to import the wx module.


    ```python

    import wx

    # Create the Application Object

    app = wx.App()

    # Now create a Frame (representing the window)

    frame = wx.Frame(parent=None, title=''Simple Hello World'')

    # And add a text label to it

    text = wx.StaticText(parent=frame, label=''Hello Python'')

    # Display the window (frame)

    frame.Show()

    # Start the event loop

    app.MainLoop()

    ```'
  mdcn: '任何WIMP风格环境的软件基础都是窗口管理器。它控制着屏幕上显示的多个、可能重叠的窗口和图标。它还负责将这些窗口中发生的事件信息传递给相应的应用程序，并生成所使用的各种菜单和提示。


    窗口是图形屏幕上的一个区域，可以在其中显示一页或一页信息的一部分；它可以显示文本、图形或两者的组合。这些窗口可以是重叠的，并且与同一进程相关联，或者它们可能与不同的进程相关联。窗口通常可以被创建、打开、关闭、移动和调整大小。


    图标是一个小的图形对象，通常象征着一个操作或一个更大的实体，如应用程序或文件。打开一个图标会导致关联的应用程序执行或关联的窗口显示。


    用户与这种基于WIMP的程序交互能力的核心是事件循环。该循环监听事件，例如用户单击按钮、选择菜单项或进入文本字段。当此类事件发生时，它会触发相关的行为（例如运行与按钮链接的函数）。


    ## Python的窗口框架


    Python是一种跨平台编程语言。因此，Python程序可以在一个平台（如Linux机器）上编写，然后在该平台或另一个操作系统平台（如Windows或Mac
    OS）上运行。然而，这可能会给需要在多个操作系统平台上可用的库带来问题。图形用户界面领域尤其是一个问题，因为为利用Microsoft Windows系统中可用功能而编写的库在Mac
    OS或Linux系统上可能不可用（或可能看起来不同）。


    Python运行的每个操作系统可能有一个或多个为其编写的窗口系统，这些系统可能在其他操作系统上可用，也可能不可用。这使得为Python提供图形用户界面库的工作变得更加困难。


    Python图形用户界面的开发者采取了两种方法之一来处理这个问题：


    - 一种方法是编写一个包装器，抽象底层的图形用户界面设施，使开发者在特定窗口系统设施之上的层次上工作。然后，Python库（尽其所能）将这些设施映射到当前正在使用的底层系统。

    - 另一种方法是更紧密地包装底层图形用户界面系统上的特定设施集，并且只针对支持这些设施的系统。


    下面列出了一些可用于Python的库，并将其分为平台无关库和平台特定库：


    ## 平台无关的图形用户界面库


    - Tkinter。这是标准的内置Python图形用户界面库。它建立在Tcl/Tk小部件集之上，该小部件集已经存在了很多年，适用于许多不同的操作系统。Tcl代表工具命令语言，而Tk是Tcl的图形用户界面工具包。

    - wxPython。wxWidgets是一个免费、高度可移植的图形用户界面库。它是用C++编写的，可以在Windows、Mac OS、Linux等操作系统上提供原生的外观和感觉。wxPython是wxWidgets的一组Python绑定。这是我们在本章中将要使用的库。

    - PyQt或PySide，这两个库都包装了Qt工具包设施。Qt是一个跨平台的软件开发系统，用于实现图形用户界面和应用程序。


    ## 平台特定的图形用户界面库


    - PyObjc是一个Mac OS特定的库，它提供了一个到Apple Mac Cocoa图形用户界面库的Objective-C桥接。

    - PythonWin提供了一组围绕Microsoft Windows基础类的包装，可用于创建基于Windows的图形用户界面。


    ## wxPython图形用户界面库


    **wxPython库**


    wxPython库是一个用于Python的跨平台图形用户界面库（或工具包）。它允许程序员使用常见的概念（如菜单栏、菜单、按钮、字段、面板和框架）为其程序开发高度图形化的用户界面。


    在wxPython中，图形用户界面的所有元素都包含在顶级窗口中，例如wx.Frame或wx.Dialog。这些窗口包含称为小部件或控件的图形组件。这些小部件/控件可以分组到面板中（面板可能有也可能没有可见的表示）。


    因此，在wxPython中，我们可能从以下内容构建图形用户界面：


    - 框架，提供窗口的基本结构：边框、标签和一些基本功能（例如调整大小）。

    - 对话框，类似于框架，但提供较少的边框控制。

    - 小部件/控件，是在框架中显示的图形对象。其他一些语言将它们称为UI组件。小部件的示例包括按钮、复选框、选择列表、标签和文本字段。

    - 容器是由一个或多个其他组件（或容器）组成的组件。容器（如面板）中的所有组件都可以被视为一个单一实体。


    因此，图形用户界面是由一组小部件、容器和一个或多个框架（或在弹出对话框的情况下是对话框）分层构建的。下图说明了一个包含多个面板和小部件的窗口：


    ![](img/8a661fca3884547aede940b9a6567321_119_0.png)


    像框架和对话框这样的窗口有一个组件层次结构，该层次结构（除其他外）用于确定窗口元素如何以及何时被绘制和重绘。组件层次结构以框架为根，可以在其中添加组件和容器。


    上图说明了一个框架的组件层次结构，其中包含两个容器面板和一些基本的小部件/UI组件。请注意，一个面板可以包含另一个具有不同小部件的子面板。


    ## wxPython模块


    wxPython库由许多不同的模块组成。这些模块提供不同的功能，从核心wx模块到面向HTML的wx.html和wx.html2模块。这些模块包括：


    - wx，包含wx库中的核心小部件和类。

    - wx.adv，提供不太常用或更高级的小部件和类。

    - wx.grid，包含支持表格数据显示和编辑的小部件和类。

    - wx.richtext，包含用于显示多种文本样式和图像的小部件和类。

    - wx.html，包含用于通用HTML渲染器的小部件和支持类。

    - wx.html2，为原生HTML渲染器提供进一步的小部件和支持类，支持CSS和JavaScript。


    ## 窗口作为对象


    在wxPython中，框架和对话框及其内容都是相应类（如Frame、Dialog、Panel、Button或Static Text）的实例。因此，当你创建一个窗口时，你创建了一个知道如何在计算机屏幕上显示自己的对象。你必须告诉它要显示什么，然后告诉它向用户显示其内容。


    在阅读本章时，你应该记住以下几点；它们将帮助你理解你需要做什么：


    - 你通过实例化一个Frame或Dialog对象来创建一个窗口。

    - 你通过创建一个具有适当父组件的小部件来定义窗口显示的内容。这会将小部件添加到容器中，例如一种类型的面板或框架。

    - 你可以向窗口发送消息以更改其状态、执行操作和显示图形对象。

    - 窗口或窗口中的组件可以向其他对象发送消息以响应用户（或程序）操作。

    - 窗口显示的所有内容都是一个类的实例，并且可能受到上述所有内容的影响。

    - wx.App处理图形用户界面应用程序的主事件循环。


    ## 一个简单的例子


    下面给出了一个使用wxPython创建非常简单的窗口的示例。运行这个简短程序的结果在Mac和Windows PC上显示如下：


    ![](img/8a661fca3884547aede940b9a6567321_122_0.png)


    这个程序创建了一个顶级窗口（wx.Frame）并给它一个标题。它还创建了一个标签（一个wx.StaticText对象）要在框架内显示。


    要使用wxPython库，需要导入wx模块。


    ```python

    import wx

    # Create the Application Object

    app = wx.App()

    # Now create a Frame (representing the window)

    frame = wx.Frame(parent=None, title=''Simple Hello World'')

    # And add a text label to it

    text = wx.StaticText(parent=frame, label=''Hello Python'')

    # Display the window (frame)

    frame.Show()

    # Start the event loop

    app.MainLoop()

    ```'
