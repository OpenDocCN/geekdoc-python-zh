  md: 'It is common for an Observable to only publish data once there is an Observer
    available to process that data. The process of registering with an Observable
    is referred to as subscribing. Thus an Observable will have zero or more subscribers
    (Observers).


    If the Observable publishes data at a faster rate than can be processed by the
    Observer then the data is queued via the Data Stream.This allows the Observer
    to process the data receive done at a time at its own pace; without any concern
    for data loss (as long as sufficient memory is available for the data stream).


    # Hot and Cold Observables


    Another concept that it is useful to understand is that of Hot and Cold Observables.


    +   - Cold Observables are lazy Observables. That is, a Cold Observable will only
    publish data if at least one Observer is subscribed to it.

    - Hot Observables, by contrast, publish data whether there is an Observer subscribed
    or not.


    # Cold Observables'
  merge: -1
  pgno: 643
- img_proc: true
  md: 'A Cold Observable will not publish any data unless there is at least one Observer
    subscribed to process that data. In addition a cold Observable only provides data
    to an Observer when that Observer is ready to process the data; this is because
    the Observable-Observer relationship is more of a pull relationship. For example,given
    an Observable that will generate a set of values based on a range, then that Observable
    will generate each result lazily when requested by an Observer.


    If the Observer takes some time to process the data emitted by the Observable,
    then the Observable will wait until the Observer is ready to process the data
    before emitting another value.


    # Hot Observables


    Hot Observables by contrast publish data whether there is an Observer subscribed
    or not. When an Observer registers with the Observable, it will start to receive
    data atthat point, as and when the Observable publishes new data. If the Observable
    has already published previous data items, then these will have been lost and
    the Observer will not receive that data.


    The most common situation in which a Hot Observable is created is when the source
    producer represents data that may be irrelevant if not processed immediately or
    may be'
