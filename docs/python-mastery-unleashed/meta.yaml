  mdcn: "最终结果是在屏幕顶部随机位置创建一组流星对象：\n\n![](img/8a661fca3884547aede940b9a6567321_239_0.png)\n\
    \n## 移动流星\n\n我们现在希望能让流星在屏幕上向下移动，以便星际飞船需要避开一些物体。这可以非常容易地实现，因为我们已经在流星类中实现了 `move_down()`\
    \ 方法。因此，我们只需要在主游戏循环中添加一个 for 循环来移动所有流星。例如：\n\n```python\n# 移动流星\nfor meteor in\
    \ self.meteors:\n    meteor.move_down()\n```\n\n这可以添加在事件处理 for 循环之后，屏幕刷新/重绘或更新之前。现在当我们运行游戏时，流星会移动，玩家可以在下落的流星之间操控星际飞船。\n\
    \n![](img/8a661fca3884547aede940b9a6567321_240_0.png)\n\n## 识别碰撞\n\n目前游戏会无限进行下去，因为没有结束状态，也没有尝试识别星际飞船是否与流星相撞。我们可以使用\
    \ PyGame 矩形来添加流星/星际飞船的碰撞检测。如上一章所述，矩形是 PyGame 中用于表示矩形坐标的类。它特别有用，因为 `pygame.Rect`\
    \ 类提供了几种碰撞检测方法，可用于测试一个矩形（或点）是否在另一个矩形内部。因此，我们可以使用其中一种方法来测试星际飞船周围的矩形是否与任何流星周围的矩形相交。\n\
    \nGameObject 类已经提供了一个 `rect()` 方法，该方法将返回一个 Rect 对象，表示对象相对于绘图表面的当前矩形（本质上是代表其在屏幕上位置的对象周围的方框）。\n\
    \n因此，我们可以使用 GameObject 生成的矩形和 Rect 类的 `colliderect()` 方法为 Game 类编写一个碰撞检测方法：\n\n\
    ```python\ndef _check_for_collision(self):\n    \"\"\" 检查是否有流星与星际飞船相撞\"\"\"\n\
    \    result = False\n    for meteor in self.meteors:\n        if self.starship.rect().colliderect(meteor.rect()):\n\
    \            result = True\n            break\n    return result\n```\n\n请注意，我们在这里遵循了在方法名前加下划线的惯例，表示该方法应被视为类的私有方法。因此，它不应被\
    \ Game 类以外的任何东西调用。此惯例在 PEP 8（Python 增强提案）中定义，但语言本身并不强制执行。\n\n我们现在可以在游戏的主 while\
    \ 循环中使用此方法来检查碰撞：\n\n```python\n# 检查是否有流星击中飞船\nif self._check_for_collision():\n\
    \    starship_collided = True\n```\n\n此代码片段还引入了一个新的局部变量 `starship_collided`。我们最初将其设置为\
    \ `False`，这是主游戏循环终止的另一个条件：\n\n```python\nis_running = True\nstarship_collided\
    \ = False\n\n# 主游戏循环\nwhile is_running and not starship_collided:\n```\n\n因此，如果用户选择退出或星际飞船与流星相撞，游戏循环将终止。\n\
    \n## 识别胜利\n\n我们目前有输掉游戏的方法，但没有赢的方法！然而，我们希望玩家能够通过在指定时间内生存下来来赢得游戏。我们可以用某种计时器来表示这一点。然而，在我们的例子中，我们将它表示为主游戏循环的特定循环次数。如果玩家在这个循环次数内存活下来，那么他们就赢了。例如：\n\
    \n```python\n# 检查玩家是否获胜\nif cycle_count == MAX_NUMBER_OF_CYCLES:\n    print('WINNER!')\n\
    \    break\n```\n\n在这种情况下，会打印一条消息说明玩家获胜，然后主游戏循环终止（使用 `break` 语句）。`MAX_NUMBER_OF_CYCLES`\
    \ 全局值可以根据需要设置，例如：\n\n```python\nMAX_NUMBER_OF_CYCLES = 1000\n```\n\n## 增加流星数量\n\
    \n我们可以将游戏保持在当前状态，因为现在可以赢得或输掉游戏。然而，有一些可以轻松添加的功能可以增强游戏体验。其中之一是增加屏幕上的流星数量，使游戏随着进展变得更难。我们可以使用\
    \ `NEW_METEOR_CYCLE_INTERVAL` 来实现这一点。\n\n```python\nNEW_METEOR_CYCLE_INTERVAL\
    \ = 40\n```\n\n当达到此间隔时，我们可以向当前流星列表中添加一个新的流星；然后它将被 Game 类自动绘制。例如：\n\n```python\n\
    # 确定是否应添加新流星\nif cycle_count % NEW_METEOR_CYCLE_INTERVAL == 0:\n    self.meteors.append(Meteor(self))\n\
    ```\n\n现在，每隔 `NEW_METEOR_CYCLE_INTERVAL`，就会在随机 x 坐标处向游戏添加另一个流星。\n\n## 暂停游戏\n\n\
    许多游戏具有的另一个功能是能够暂停游戏。这可以通过监控暂停键（这可以是字母 p，由事件键 `pygame.K_p` 表示）轻松添加。当按下此键时，游戏可以暂停，直到再次按下该键。\n\
    \n暂停操作可以实现为一个 `_pause()` 方法，该方法将消耗所有事件，直到按下相应的键。例如：\n\n```python\ndef _pause(self):\n\
    \    paused = True\n    while paused:\n        for event in pygame.event.get():\n\
    \            if event.type == pygame.KEYDOWN:\n                if event.key ==\
    \ pygame.K_p:\n                    paused = False\n                    break\n\
    ```\n\n在此方法中，外部 while 循环将循环，直到 `paused` 局部变量设置为 `False`。这仅在按下 'p' 键时发生。在将 `paused`\
    \ 设置为 `False` 的语句之后的 `break` 确保内部 for 循环终止，允许外部 while 循环检查 `paused` 的值并终止。\n\n\
    `_pause()` 方法可以在游戏循环期间通过在事件 for 循环中监控 'p' 键并从那里调用 `_pause()` 方法来调用：\n\n```python\n\
    elif event.key == pygame.K_p:\n    self._pause()\n```\n\n请注意，我们再次通过在方法名前加下划线（'_'）来表示我们不希望\
    \ `_pause()` 方法从游戏外部调用。\n\n## 显示游戏结束消息\n\nPyGame 没有提供简单的方法来创建弹出对话框来显示诸如“你赢了”或“你输了”之类的消息，这就是为什么我们到目前为止一直使用\
    \ print 语句。然而，我们可以使用像 wxPython 这样的 GUI 框架来做到这一点，或者我们可以在显示表面上显示一条消息来指示玩家是赢了还是输了。\n\
    \n我们可以使用 `pygame.font.Font` 类在显示表面上显示消息。这可用于创建一个 Font 对象，该对象可以渲染到一个表面上，然后可以显示到主显示表面上。\n\
    \n因此，我们可以向 Game 类添加一个 `_display_message()` 方法，该方法可用于显示适当的消息：\n\n```python\ndef\
    \ _display_message(self, message):\n    \"\"\"在屏幕上向用户显示消息\"\"\"\n    print(message)\n\
    \    text_font = pygame.font.Font('freesansbold.ttf', 48)\n    text_surface =\
    \ text_font.render(message, True, BLUE, WHITE)\n    text_rectangle = text_surface.get_rect()\n\
    \    text_rectangle.center = (DISPLAY_WIDTH / 2, DISPLAY_HEIGHT / 2)\n    self.display_surface.fill(WHITE)\n\
    \    self.display_surface.blit(text_surface, text_rectangle)\n```\n\n同样，方法名中的前导下划线表示它不应从\
    \ Game 类外部调用。\n\n我们现在可以修改主循环，以便向用户显示适当的消息，例如：\n\n```python\n# 检查是否有流星击中飞船\nif\
    \ self._check_for_collision():\n    starship_collided = True\n    self._display_message('Collision:\
    \ Game Over')\n```\n\n当发生碰撞时运行上述代码的结果如下所示：\n\n![](img/8a661fca3884547aede940b9a6567321_247_0.png)\n\
    \n## 星际飞船流星游戏\n\n最终版本的星际飞船流星游戏的完整代码如下："
