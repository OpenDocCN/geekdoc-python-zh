- md: "## Drawing Shapes\n\nOf course you do not need to just use fixed values for\
    \ the shapes you draw, you can use variables or calculate positions based on expressions\
    \ etc.\n\nFor example, the following program creates a sequences of squares rotated\
    \ around a central location to create an engaging image:\n\n```python\nimport\
    \ turtle\n\ndef setup():\n    \"\"\" Provide the config for the screen \"\"\"\n\
    \    turtle.title('Multiple Squares Animation')\n    turtle.setup(100, 100, 0,\
    \ 0)\n    turtle.hideturtle()\n\ndef draw_square(size):\n    \"\"\" Draw a square\
    \ in the current direction \"\"\"\n    turtle.forward(size)\n    turtle.right(90)\n\
    \    turtle.forward(size)\n    turtle.right(90)\n    turtle.forward(size)\n  \
    \  turtle.right(90)\n    turtle.forward(size)\n\nsetup()\nfor _ in range(0, 12):\n\
    \    draw_square(50)\n    # Rotate the starting direction\n    turtle.right(120)\n\
    \n# Add this so that the window will close when clicked on\nturtle.exitonclick()\n\
    ```\n\nIn this program two functions have been defined, one to setup the screen\
    \ or window with a title and a size and to turn off the cursor display. The second\
    \ function takes a size parameter and uses that to draw a square. The main part\
    \ of the program then sets up the window and uses a for loop to draw 12 squares\
    \ of 50 pixels each by continuously rotating 120° between each square. Note that\
    \ as we do not need to reference the loop variable we are using the ‘_’ format\
    \ which is considered an anonymous loop variable in Python.\n\nThe image generated\
    \ by this program is shown below:\n\n![](img/8a661fca3884547aede940b9a6567321_40_0.png)\n\
    \n## Filling Shapes\n\nIt is also possible to fill in the area within a drawn\
    \ shape. For example, you might wish to fill in one of the squares we have drawn\
    \ as shown below:\n\n![](img/8a661fca3884547aede940b9a6567321_41_0.png)\n\nTo\
    \ do this we can use the begin_fill() and end_fill() functions:\n\n- begin_fill()\
    \ indicates that shapes should be filled with the current fill colour, this function\
    \ should be called just before drawing the shape to be filled.\n- end_fill() called\
    \ after the shape to be filled has been finished. This will cause the shape drawn\
    \ since the last call to begin_fill() to be filled using the current fill color.\n\
    - filling() Return the current fill state (True if filling, False if not).\n\n\
    The following program uses this (and the earlier draw_square() function) to draw\
    \ the above filled square:\n\n```python\nturtle.title('Filled Square Example')\n\
    turtle.setup(100, 100, 0, 0)\nturtle.hideturtle()\nturtle.pencolor('red')\nturtle.fillcolor('yellow')\n\
    turtle.begin_fill()\ndraw_square(60)\nturtle.end_fill()\nturtle.done()\n```\n\n\
    ## Other Graphics Libraries\n\nOf course Turtle Graphics is not the only graphics\
    \ option available for Python; however other graphics libraries do not come prepacked\
    \ with Python and must be downloaded using a tool such as Anaconda, PIP or PyCharm.\n\
    \n- PyQtGraph. The PyQtGraph library is pure Python library oriented towards mathematics,\
    \ scientific and engineering graphic applications as well as GUI applications.\
    \ For more information see http://www.pyqtgraph.org.\n- Pillow. Pillow is a Python\
    \ imaging library (based on PIL the Python Imaging library) that provides image\
    \ processing capabilities for use in Python. For more information on Pillow see\
    \ https://pillow.readthedocs.io/en/stable.\n- Pyglet. pyglet is another windowing\
    \ and multimedia library for Python. See https://bitbucket.org/pyglet/pyglet/wiki/Home.\n\
    \n## 3D Graphics\n\nAlthough it is certainly possible for a developer to create\
    \ convincing 3D images using Turtle Graphics; it is not the primary aim of the\
    \ library. This means that there is no direct support for creating 3D images other\
    \ than the basic cursor moving facilities and the programmers skill.\n\nHowever,\
    \ there are 3D graphics libraries available for Python. One such library is Panda3D\
    \ (https://www.panda3d.org) while another is VPython (https://vpython.org) while\
    \ a third is pi3d (https://pypi.org/project/pi3d). However we will briefly look\
    \ at the PyOpenGL library as this builds on the very widely used OpenGL library.\n\
    \n## PyOpenGL\n\nPyOpenGL is an open source project that provides a set of bindings\
    \ (or wrappings around) the OpenGL library. OpenGL is the Open Graphics Library\
    \ which is a cross language, cross platform API for rendering 2D and 3D vector\
    \ graphics. OpenGL is used in a wide range of applications from games, to virtual\
    \ reality, through data and information visualization systems to Computer Aided\
    \ Design (CAD) systems. PyOpenGL provides a set of Python functions that call\
    \ out from Python to the underlying OpenGL libraries. This makes it very easy\
    \ to create 3D vector based images in Python using the industry standard OpenGL\
    \ library. A very simple examples of an image created using PyOpenGL is given\
    \ below:\n\n![](img/8a661fca3884547aede940b9a6567321_45_0.png)\n\n## Computer\
    \ Generated Art\n\n### Creating Computer Art\n\nComputer Art is defined as any\
    \ art that uses a computer. However, in the context of this book we mean it to\
    \ be art that is generated by a computer or more specifically a computer program.\
    \ The following example, illustrates how in a very few lines of Python code, using\
    \ the Turtle graphics library, you can create images that might be considered\
    \ to be computer art.\n\nThe following image is generated by a recursive function\
    \ that draws a circle at a given x, y location of a specified size. This function\
    \ recursively calls itself by modifying the parameters so that smaller and smaller\
    \ circles are drawn at different locations until the size of the circles goes\
    \ below 20 pixels.\n\n![](img/8a661fca3884547aede940b9a6567321_47_0.png)\n\nThe\
    \ program used to generate this picture is given below for reference:\n\n```python\n\
    import turtle\n\nWIDTH = 640\nHEIGHT = 360\n\ndef setup_window():\n    # Set up\
    \ the window\n    turtle.title('Circles in My Mind')\n    turtle.setup(WIDTH,\
    \ HEIGHT, 0, 0)\n    turtle.colormode(255)   # Indicates RGB numbers will be in\
    \ the range 0 to 255\n    turtle.hideturtle()   # Batch drawing to the screen\
    \ for faster rendering\n    turtle.tracer(2000)   # Speed up drawing process\n\
    \    turtle.speed(10)\n    turtle.penup()\n\ndef draw_circle(x, y, radius, red=50,\
    \ green=255, blue=10, width=7):\n    \"\"\" Draw a circle at a specific x, y location.\n\
    \    Then draw four smaller circles recursively\"\"\"\n    colour = (red, green,\
    \ blue)\n    # Recursively drawn smaller circles\n    if radius > 50:\n      \
    \  # Calculate colours and line width for smaller circles\n        if red < 216:\n\
    \            red = red + 33\n            green = green - 42\n            blue\
    \ = blue + 10\n            width -= 1\n        else:\n            red = 0\n  \
    \          green = 255\n        # Calculate the radius for the smaller circles\n\
    \        new_radius = int(radius / 1.3)\n        # Drawn four circles\n      \
    \  draw_circle(int(x + new_radius), y, new_radius, red, green, blue, width)\n\
    \        draw_circle(x - new_radius, y, new_radius, red, green, blue, width)\n\
    \        draw_circle(x, int(y + new_radius), new_radius, red, green, blue, width)\n\
    \        draw_circle(x, int(y - new_radius), new_radius, red, green, blue, width)\n\
    \    # Draw the original circle\n    turtle.goto(x, y)\n    turtle.color(colour)\n\
    \    turtle.width(width)\n    turtle.pendown()\n    turtle.circle(radius)\n  \
    \  turtle.penup()\n\n# Run the program\nprint('Starting')\nsetup_window()\ndraw_circle(25,\
    \ -100, 200)\n# Ensure that all the drawing is rendered\nturtle.update()\nprint('Done')\n\
    turtle.done()\n```\n\nThere are a few points to note about this program. It uses\
    \ recursion to draw the circles with smaller and smaller circles being drawn until\
    \ the radius of the circles falls below a certain threshold (the termination point).\n\
    \nIt also uses the turtle.tracer() function to speed up drawing the picture as\
    \ 2000 changes will be buffered before the screen is updated.\n\nFinally, the\
    \ colors used for the circles are changed at each level of recession; a very simple\
    \ approach is used so that the Red, Green and Blue codes are changed resulting\
    \ in different color circles. Also a line width is used to reduce the size of\
    \ the circle outline to add more interest to the image.\n\n## A Computer Art Generator"
  mdcn: "## 绘制形状\n\n当然，绘制形状时不必只使用固定值，你可以使用变量或根据表达式计算位置等。\n\n例如，以下程序创建了一系列围绕中心位置旋转的正方形，从而生成一幅引人入胜的图像：\n\
    \n```python\nimport turtle\n\ndef setup():\n    \"\"\" Provide the config for\
    \ the screen \"\"\"\n    turtle.title('Multiple Squares Animation')\n    turtle.setup(100,\
    \ 100, 0, 0)\n    turtle.hideturtle()\n\ndef draw_square(size):\n    \"\"\" Draw\
    \ a square in the current direction \"\"\"\n    turtle.forward(size)\n    turtle.right(90)\n\
    \    turtle.forward(size)\n    turtle.right(90)\n    turtle.forward(size)\n  \
    \  turtle.right(90)\n    turtle.forward(size)\n\nsetup()\nfor _ in range(0, 12):\n\
    \    draw_square(50)\n    # Rotate the starting direction\n    turtle.right(120)\n\
    \n# Add this so that the window will close when clicked on\nturtle.exitonclick()\n\
    ```\n\n在这个程序中定义了两个函数：一个用于设置屏幕或窗口，包括标题、大小以及关闭光标显示；另一个函数接受一个尺寸参数，并用它来绘制一个正方形。程序的主体部分随后设置窗口，并使用一个\
    \ `for` 循环，通过在每个正方形之间持续旋转 120°，绘制了 12 个边长为 50 像素的正方形。请注意，由于我们不需要引用循环变量，因此使用了 `_`\
    \ 格式，这在 Python 中被视为一个匿名循环变量。\n\n该程序生成的图像如下所示：\n\n![](img/8a661fca3884547aede940b9a6567321_40_0.png)\n\
    \n## 填充形状\n\n也可以填充已绘制形状内部的区域。例如，你可能希望填充我们绘制的其中一个正方形，如下所示：\n\n![](img/8a661fca3884547aede940b9a6567321_41_0.png)\n\
    \n为此，我们可以使用 `begin_fill()` 和 `end_fill()` 函数：\n\n- `begin_fill()` 表示形状应使用当前填充颜色进行填充，此函数应在绘制要填充的形状之前调用。\n\
    - `end_fill()` 在要填充的形状绘制完成后调用。这将导致自上次调用 `begin_fill()` 以来绘制的形状使用当前填充颜色进行填充。\n\
    - `filling()` 返回当前填充状态（如果正在填充则为 True，否则为 False）。\n\n以下程序使用此功能（以及前面的 `draw_square()`\
    \ 函数）来绘制上述填充的正方形：\n\n```python\nturtle.title('Filled Square Example')\nturtle.setup(100,\
    \ 100, 0, 0)\nturtle.hideturtle()\nturtle.pencolor('red')\nturtle.fillcolor('yellow')\n\
    turtle.begin_fill()\ndraw_square(60)\nturtle.end_fill()\nturtle.done()\n```\n\n\
    ## 其他图形库\n\n当然，Turtle Graphics 并不是 Python 唯一可用的图形选项；然而，其他图形库并非 Python 预装，必须使用\
    \ Anaconda、PIP 或 PyCharm 等工具下载。\n\n- PyQtGraph。PyQtGraph 库是一个纯 Python 库，面向数学、科学和工程图形应用以及\
    \ GUI 应用。更多信息请参见 http://www.pyqtgraph.org。\n- Pillow。Pillow 是一个 Python 图像处理库（基于\
    \ PIL，即 Python Imaging Library），为 Python 提供图像处理功能。有关 Pillow 的更多信息，请参见 https://pillow.readthedocs.io/en/stable。\n\
    - Pyglet。pyglet 是另一个用于 Python 的窗口和多媒体库。请参见 https://bitbucket.org/pyglet/pyglet/wiki/Home。\n\
    \n## 3D 图形\n\n虽然开发者当然可以使用 Turtle Graphics 创建逼真的 3D 图像；但这并非该库的主要目标。这意味着除了基本的光标移动功能和程序员的技巧外，没有直接支持创建\
    \ 3D 图像。\n\n然而，Python 有可用的 3D 图形库。其中一个库是 Panda3D (https://www.panda3d.org)，另一个是\
    \ VPython (https://vpython.org)，第三个是 pi3d (https://pypi.org/project/pi3d)。不过，我们将简要介绍\
    \ PyOpenGL 库，因为它构建在非常广泛使用的 OpenGL 库之上。\n\n## PyOpenGL\n\nPyOpenGL 是一个开源项目，提供了一组对\
    \ OpenGL 库的绑定（或包装）。OpenGL 是开放图形库，它是一个跨语言、跨平台的 API，用于渲染 2D 和 3D 矢量图形。OpenGL 被广泛应用于从游戏、虚拟现实到数据和信息可视化系统以及计算机辅助设计\
    \ (CAD) 系统等众多领域。PyOpenGL 提供了一组 Python 函数，可以从 Python 调用底层的 OpenGL 库。这使得使用行业标准的\
    \ OpenGL 库在 Python 中创建基于 3D 矢量的图像变得非常容易。下面是一个使用 PyOpenGL 创建图像的非常简单的示例：\n\n![](img/8a661fca3884547aede940b9a6567321_45_0.png)\n\
    \n## 计算机生成艺术\n\n### 创建计算机艺术\n\n计算机艺术被定义为任何使用计算机的艺术。然而，在本书的上下文中，我们指的是由计算机或更具体地说是计算机程序生成的艺术。以下示例说明了如何使用\
    \ Turtle 图形库，仅用几行 Python 代码，就能创建可能被视为计算机艺术的图像。\n\n以下图像是由一个递归函数生成的，该函数在给定的 x、y\
    \ 位置绘制指定大小的圆形。该函数通过修改参数递归调用自身，从而在不同位置绘制越来越小的圆形，直到圆形的尺寸小于 20 像素。\n\n![](img/8a661fca3884547aede940b9a6567321_47_0.png)\n\
    \n用于生成此图片的程序如下，仅供参考：\n\n```python\nimport turtle\n\nWIDTH = 640\nHEIGHT = 360\n\
    \ndef setup_window():\n    # Set up the window\n    turtle.title('Circles in My\
    \ Mind')\n    turtle.setup(WIDTH, HEIGHT, 0, 0)\n    turtle.colormode(255)   #\
    \ Indicates RGB numbers will be in the range 0 to 255\n    turtle.hideturtle()\
    \   # Batch drawing to the screen for faster rendering\n    turtle.tracer(2000)\
    \   # Speed up drawing process\n    turtle.speed(10)\n    turtle.penup()\n\ndef\
    \ draw_circle(x, y, radius, red=50, green=255, blue=10, width=7):\n    \"\"\"\
    \ Draw a circle at a specific x, y location.\n    Then draw four smaller circles\
    \ recursively\"\"\"\n    colour = (red, green, blue)\n    # Recursively drawn\
    \ smaller circles\n    if radius > 50:\n        # Calculate colours and line width\
    \ for smaller circles\n        if red < 216:\n            red = red + 33\n   \
    \         green = green - 42\n            blue = blue + 10\n            width\
    \ -= 1\n        else:\n            red = 0\n            green = 255\n        #\
    \ Calculate the radius for the smaller circles\n        new_radius = int(radius\
    \ / 1.3)\n        # Drawn four circles\n        draw_circle(int(x + new_radius),\
    \ y, new_radius, red, green, blue, width)\n        draw_circle(x - new_radius,\
    \ y, new_radius, red, green, blue, width)\n        draw_circle(x, int(y + new_radius),\
    \ new_radius, red, green, blue, width)\n        draw_circle(x, int(y - new_radius),\
    \ new_radius, red, green, blue, width)\n    # Draw the original circle\n    turtle.goto(x,\
    \ y)\n    turtle.color(colour)\n    turtle.width(width)\n    turtle.pendown()\n\
    \    turtle.circle(radius)\n    turtle.penup()\n\n# Run the program\nprint('Starting')\n\
    setup_window()\ndraw_circle(25, -100, 200)\n# Ensure that all the drawing is rendered\n\
    turtle.update()\nprint('Done')\nturtle.done()\n```\n\n关于这个程序有几点需要注意。它使用递归来绘制圆形，绘制越来越小的圆形，直到圆形的半径低于某个阈值（终止点）。\n\
    \n它还使用了 `turtle.tracer()` 函数来加速绘制过程，因为在屏幕更新之前会缓冲 2000 次更改。\n\n最后，用于圆形的颜色在每个递归级别都会改变；这里使用了一种非常简单的方法，即更改红、绿、蓝代码，从而产生不同颜色的圆形。此外，还使用了线宽来减小圆形轮廓的大小，为图像增添更多趣味。\n\
    \n## 计算机艺术生成器"
