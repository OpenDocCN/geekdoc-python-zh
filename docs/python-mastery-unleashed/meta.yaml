    # A Computer Art Generator'
- md: "As another example of how you can use Turtle graphics to create computer art,\
    \ the following program randomly generates RGB colors to use for the lines being\
    \ drawn which gives the pictures more interest. It also allows the user to input\
    \ an angle to use when changing the direction in which the line is drawn. As the\
    \ drawing happens within a loop even this simple change to the angle used to draw\
    \ the lines can generate very different pictures.\n\n```python\n# Lets play with\
    \ some colours\nimport turtle\nfrom random import randint\n\ndef get_input_angle():\n\
    \    \"\"\" Obtain input from user and convert to an int\"\"\"\n    message =\
    \ 'Please provide an angle:'\n    value_as_string = input(message)\n    while\
    \ not value_as_string.isnumeric():\n        print('The input must be an integer!')\n\
    \        value_as_string = input(message)\n    return int(value_as_string)\n\n\
    def generate_random_colour():\n    \"\"\"Generates an R,G,B values randomly in\
    \ range\n    0 to 255 \"\"\"\n    r = randint(0, 255)\n    g = randint(0, 255)\n\
    \    b = randint(0, 255)\n    return r, g, b\n\nprint('Set up Screen')\nturtle.title('Colourful\
    \ pattern')\nturtle.setup(640, 600)\nturtle.hideturtle()\nturtle.bgcolor('black')\
    \  # Set the background colour of the screen\nturtle.colormode(255)    # Indicates\
    \ RGB numbers will be in the\n                         # range 0 to 255\nturtle.speed(10)\n\
    angle = get_input_angle()\nprint('Start the drawing')\nfor i in range(0, 200):\n\
    \    turtle.color(generate_random_colour())\n    turtle.forward(i)\n    turtle.right(angle)\n\
    print('Done')\nturtle.done()\n```\n\nSome sample images generated from this program\
    \ are given below. The left most picture is generated by inputting an angle of\
    \ 38 degrees, the picture on the right uses an angle of 68 degrees and the bottom\
    \ picture an angle of 98 degrees.\n\n![](img/8a661fca3884547aede940b9a6567321_51_0.png)\n\
    \nThe following pictures below use angles of 118, 138 and 168 degrees respectively.\n\
    \n![](img/8a661fca3884547aede940b9a6567321_52_0.png)\n\n![](img/8a661fca3884547aede940b9a6567321_52_1.png)\n\
    \n![](img/8a661fca3884547aede940b9a6567321_52_2.png)\n\nWhat is interesting about\
    \ these images is how different each is; even though they use exactly the same\
    \ program. This illustrates how algorithmic or computer generated art can be as\
    \ subtle and flexible as any other art form. It also illustrates that even with\
    \ such a process it is still up to the human to determine which image (if any)\
    \ is the most aesthetically pleasing.\n\n## Fractals in Python\n\nWithin the arena\
    \ of Computer Art fractals are a very well known art form. Fractals are recurring\
    \ patterns that are calculated either using an iterative approach (such as a for\
    \ loop) or a recursive approach (when a function calls itself but with modified\
    \ parameters). One of the really interesting features of fractals is that they\
    \ exhibit the same pattern (or nearly the same pattern) at successive levels of\
    \ granularity. That is, if you magnified a fractal image you would find that the\
    \ same pattern is being repeated at successively smaller and smaller magnifications.\
    \ This is known as expanding symmetry or unfolding symmetry; if this replication\
    \ is exactly the same at every scale, then it is called affine self-similar.\n\
    \nFractals have their roots in the world of mathematics starting in the 17th century,\
    \ with the term fractal being coined in the 20th century by mathematical Benoit\
    \ Mandelbrot in 1975. One often cited description that Mandelbrot published to\
    \ describe geometric fractals is a rough or fragmented geometric shape that can\
    \ be split into parts, each of which is (at least approximately) a reduced-size\
    \ copy of the whole.\n\nSince the later part of the 20th century fractals have\
    \ been a commonly used way of creating computer art. One example of a fractal\
    \ often used in computer art is the Koch snowflake, while another is the Mandelbrot\
    \ set. Both of these are used in this chapter as examples to illustrate how Python\
