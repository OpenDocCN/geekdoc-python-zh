    - pencolor(color) used to set the color used to draw lines on the screen; the
    color can be specified in numerous ways including using named colors set as ‘red’,
    ‘blue’, ‘green’ or using the RGB color codes or by specifying the color using
    hexadecimal numbers. For more information on the named colors and RGB color codes
    to use see https://www.tcl.tk/man/tcl/TkCmd/colors.htm. Note all color methods
    use American spellings for example this method is pencolor (not pen colour).

    - fillcolor(color) used to set the color to use to fill in closed areas within
    drawn lines. Again note the spelling of color!


    The following code snippet illustrates some of these functions:


