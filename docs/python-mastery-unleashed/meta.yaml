  - "[PAGE 217]\n\n```\nif __name__ == '__main__':\n    main()\n```\n\nNote that we\
    \ now need to record the display surface in a local variable so that we can use\
    \ it to draw the blue rectangles. We also need to call the pygame.display.update()\
    \ function each time round the main while loop so that the new rectangles we have\
    \ drawn as part of the event processing for loop are displayed to the user.\n\n\
    We also set the frame rate each time round the main while loop. This should happen\
    \ once per frame (but only once) and uses the clock object initialized at the\
    \ start of the program.\n\n# Alternative Approach to Processing Input Devices\n\
    \nThere are actually two ways in which inputs from a device such as a mouse, joystick\
    \ or the keyboard can be processed. One approach is the Event based model described\
    \ earlier. The other approach is the State based approach.\n\nAlthough the Event\
    \ based approach has many advantages is has two disadvantages:\n\n+   - Each event\
    \ represents a single action and continuous actions are not explicitly represented.\
    \ Thus if the user presses both the X key and the Z key then this will"
  - '[PAGE 218]


    generate two events and it will be up to the program to determine that they have
    been pressed at the same time.


    +   - It is also up to the program to determine that the user is still pressing
    a key (by noting that no KEYUP event has occurred).

    - Both of these are possible but can be error prone.


    An alternative approach is to use the State based approach. In the state based
    approach the program can directly check the state of a input device (such as a
    key or mouse or keyboard). For example, you can use pygame.key.get_pressed() which
    returns the state of all the keys. This can be used to determine if a specific
    key is being pressed at this moment in time. For example, pygame.key. get_pressed()[pygame.K_SPACE]
    can be used to check to see if the space bar is being pressed.


    This can be used to determine what action to take. If you keep checking that the
    key is pressed then you can keep performing the associated action. This can be
    very useful for continues actions in a game such as moving an object etc.


    However, if the user presses a key and then releases it before the program checks
    the state of the keyboard then that input will be missed.


    # pygame Modules'
  - '[PAGE 219]


    There are numerous modules provided as part of pygame as well as associated libraries.
    Some of the core modules are listed below:


    +   - **pygame.display** This module is used to control the display window or
    screen. It provides facilities to initialize and shutdown the display module.
    It can be used to initialize a window or screen. It can also be used to cause
    a window or screen to refresh etc.

    - **pygame.event** This module manages events and the event queue. For example
    pygame.event.get() retrieves events from the event queue, pygame.event.poll()
    gets a single event from the queue and pygame.event.peek() tests to see if there
    are any event types on the queue.

    - **pygame.draw** The draw module is used to draw simple shapes onto a Surface.
    For example, it provides functions for drawing a rectangle (pygame.draw.rect),
    a polygon, a circle, an ellipse, a line etc.

    - **pygame.font** The font module is used to create and render TrueType fonts
    into a new Surface object. Most of the features associated with fonts are sup-
    ported by the pygame.font.Font class. Free standing module functions allow the
    module to be initialized and shutdown, plus functions to access fonts such as
    pygame.font.get__fonts() which provides a list of the currently available fonts.'
  - '[PAGE 220]


    +   - pygame.image This module allows images to be saved and loaded. Note that
    images are loaded into a Surface object (there is no Image class unlike many other
    GUI oriented frameworks).

    - pygame.joystick The joystick module provides the Joystick object and several
    supporting functions. These can be used for interacting with joysticks, game pads
    and trackballs.

    - pygame.key This module provides support for working with inputs from the keyboard.
    This allows the input keys to be obtained and modifier keys (such as Control and
    Shift)to be identified. It also allows the approach to repeating keys to be specified.

    - pygame.mouse This module provides facilities for working with mouse input such
    as obtaining the current mouse position, the state of mouse buttons as well as
    the image to use for the mouse.

    - pygame.time This is the pygame module for managing timing within a game. It
    provides the pygame.time.Clock class that can be used to track time.'
- md: "## StarshipMeteors pygame\n\n## Creating a Spaceship Game\n\nIn this chapter\
    \ we will create a game in which you pilot a starship through a field of meteors.\
    \ The longer you play the game the larger the number of meteors you will encounter.\
    \ A typical display from the game is shown below for a Apple Mac and a Windows\
    \ PC:\n\n![](img/8a661fca3884547aede940b9a6567321_221_0.png)\n\nWe will implement\
    \ several classes to represent the entities within the game. Using classes is\
    \ not a required way to implement a game and it should be noted that many developers\
    \ avoid the use of classes. However, using a class allows data associated with\
    \ an object within the game to be maintained in one place; it also simplifies\
    \ the creation of multiple instances of the same object (such as the meteors)\
    \ within the game.\n\nThe classes and their relationships are shown below:\n\n\
    ![](img/8a661fca3884547aede940b9a6567321_222_0.png)\n\nThis diagram shows that\
    \ the Starship and Meteor classes will extend a class called GameObject. In turn\
    \ it also shows that the Game has a 1:1 relationship with the Starship class.\
    \ That is the Game holds a reference to one Starship and in turn the starship\
    \ holds a single reference back to the Game.\n\nIn contrast the Game has a 1 to\
    \ many relationship with the Meteor class. That is the Game object holds references\
    \ to many Meteors and each Meteor holds a reference back to the single Game object.\n\
    \n## The Main Game Class\n\nThe first class we will look at will be the Game class\
    \ itself. The Game class will hold the list of meteors and the starship as well\
    \ as the main game playing loop. It will also initialize the main window display\
    \ (for example by setting the size and the caption of the window).\n\nIn this\
    \ case we will store the display surface returned by the `pygame.display.set_mode()`\
    \ function in an attribute of the Game object called `display_surface`. This is\
    \ because we will need to use it later on to display the starship and the meteors.\
    \ We will also hold onto an instance of the `pygame.time.Clock()` class that we\
    \ will use to set the frame rate each time round the main game playing while loop.\n\
    \nThe basic framework of our game is shown below; this listing provides the basic\
    \ Game class and the main method that will launch the game. The game also defines\
    \ three global constants that will be used to define the frame refresh rate and\
    \ the size of the display.\n\n```python\nimport pygame\n\n# Set up Global constants\n\
    FRAME_REFRESH_RATE = 30\nDISPLAY_WIDTH = 600\nDISPLAY_HEIGHT = 400\n\nclass Game:\n\
    \    \"\"\" Represents the game itself and game playing loop \"\"\"\n    def __init__(self):\n\
    \        print('Initialising PyGame')\n        pygame.init()\n        # Set up\
    \ the display\n        self.display_surface = pygame.display.set_mode((DISPLAY_WIDTH,\
    \ DISPLAY_HEIGHT))\n        pygame.display.set_caption('Starship Meteors')\n \
    \       # Used for timing within the program.\n        self.clock = pygame.time.Clock()\n\
    \n    def play(self):\n        is_running = True\n        # Main game playing\
    \ Loop\n        while is_running:\n            # Work out what the user wants\
    \ to do\n            for event in pygame.event.get():\n                if event.type\
    \ == pygame.QUIT:\n                    is_running = False\n                elif\
    \ event.type == pygame.KEYDOWN:\n                    if event.key == pygame.K_q:\n\
    \                        is_running = False\n            # Update the display\n\
    \            pygame.display.update()\n            # Defines the frame rate\n \
    \           self.clock.tick(FRAME_REFRESH_RATE)\n        # Let pygame shutdown\
    \ gracefully\n        pygame.quit()\n\ndef main():\n    print('Starting Game')\n\
    \    game = Game()\n    game.play()\n    print('Game Over')\n\nif __name__ ==\
    \ '__main__':\n    main()\n```\n\nThe main `play()` method of the Game class has\
    \ a loop that will continue until the user selects to quit the game. They can\
    \ do this in one of two ways, either by pressing the ‘q’ key (represented by the\
    \ event.key `K_q`) or by clicking on the window close button. In either case these\
    \ events are picked up in the main event processing for loop within the main while\
    \ loop method.\n\nIf the user does not want to quit the game then the display\
    \ is updated (refreshed) and then the `clock.tick()` (or frame) rate is set. When\
    \ the user selects to quit the game then the main while loop is terminated (the\
    \ `is_running` flag is set to `False`) and the `pygame.quit()` method is called\
    \ to shut down pygame.\n\nAt the moment this not a very interactive game as it\
    \ does not do anything except allow the user to quit. In the next section we will\
    \ add in behavior that will allow us to display the space ship within the display.\n\
    \n## The GameObject Class\n\nThe GameObject class defines three methods:\n\nThe\
    \ `load_image()` method can be used to load an image to be used to visually represent\
    \ the specific type of game object. The method then uses the width and height\
    \ of the image to define the width and height of the game object.\n\nThe `rect()`\
    \ method returns a rectangle representing the current area used by the game object\
    \ on the underlying drawing surface. This differs from the images own `rect()`\
    \ which is not related to the location of the game object on the underlying surface.\
    \ Rects are very useful for comparing the location of one object with another\
    \ (for example when determining if a collision has occurred).\n\nThe `draw()`\
    \ method draws the GameObjects' image onto the display surface held by the game\
    \ using the GameObjects current x and y coordinates. It can be overridden by sub\
    \ classes if they wish to be drawn in a different way.\n\nThe code for the GameObject\
    \ class is presented below:\n\n```python\nclass GameObject:\n    def load_image(self,\
    \ filename):\n        self.image = pygame.image.load(filename).convert()\n   \
    \     self.width = self.image.get_width()\n        self.height = self.image.get_height()\n\
    \n    def rect(self):\n        \"\"\" Generates a rectangle representing the objects\
    \ location\n        and dimensions\"\"\"\n        return pygame.Rect(self.x, self.y,\
    \ self.width, self.height)\n\n    def draw(self):\n        \"\"\" draw the game\
    \ object at the current x, y coordinates \"\"\"\n        self.game.display_surface.blit(self.image,\
    \ (self.x, self.y))\n```\n\nThe GameObject class is directly extended by the Starship\
    \ class and the Meteor class.\n\nCurrently there are only two types of game elements,\
    \ the starship and the meteors; but this could be extended in future to planets,\
    \ comets, shooting stars etc.\n\n## Displaying the Starship\n\nThe human player\
    \ of this game will control a starship that can be moved around the display. The\
    \ Starship will be represented by an instance of the class Starship. This class\
    \ will extend the GameObject class that holds common behaviors for any type of\
    \ element that is represented within the game.\n\nThe Starship class defines its\
    \ own `__init__()` method that takes a reference to the game that the starship\
    \ is part of. This initialization method sets the initial starting location of\
    \ the Starship as half the width of the display for the x coordinate and the display\
    \ height minus 40 for the y coordinate (this gives a bit of a buffer before the\
    \ end of the screen). It then uses the `load_image()` method from the GameObject\
    \ parent class to load the image to be used to represent the Starship. This is\
    \ held in a file called `starship.png`. For the moment we will leave the Starship\
    \ class as it is (however we will return to this class so that we can make it\
    \ into a movable object in the next section).\n\nThe current version of the Starship\
    \ class is given below:\n\n```python\nclass Starship(GameObject):\n    \"\"\"\
    \ Represents a starship\"\"\"\n    def __init__(self, game):\n        self.game\
    \ = game\n        self.x = DISPLAY_WIDTH / 2\n        self.y = DISPLAY_HEIGHT\
    \ - 40\n        self.load_image('starship.png')\n```\n\nIn the Game class we will\
    \ now add a line to the `__init__()` method to initialize the Starship object.\
    \ This line is:\n\n```python\n# Set up the starship\nself.starship = Starship(self)\n\
    ```\n\nWe will also add a line to the main while loop within the `play()` method\
    \ just before we refresh the display. This line will call the `draw()` method\
    \ on the starship object:\n\n```python\n# Draw the starship\nself.starship.draw()\n\
    ```\n\nThis will have the effect of drawing the starship onto the windows drawing\
    \ surface in the background before the display is refreshed. When we now run this\
    \ version of the StarshipMeteor game we now see the Starship in the display:\n\
    \n![](img/8a661fca3884547aede940b9a6567321_229_0.png)\n\nOf course at the moment\
    \ the starship does not move; but we will address that in the next section.\n\n\
    ## Moving the Spaceship\n\nWe want to be able to move the Starship about within\
    \ the bounds of the display screen. To do this we need to change the"
  mdcn: "## StarshipMeteors pygame\n\n## 创建一个飞船游戏\n\n在本章中，我们将创建一个游戏，你将驾驶一艘星际飞船穿越一片陨石区。你玩的时间越长，遇到的陨石数量就越多。下面展示了游戏在\
    \ Apple Mac 和 Windows PC 上的典型显示效果：\n\n![](img/8a661fca3884547aede940b9a6567321_221_0.png)\n\
    \n我们将实现几个类来表示游戏中的实体。使用类并不是实现游戏的必要方式，需要注意的是，许多开发者会避免使用类。然而，使用类可以将与游戏中对象相关的数据集中维护在一个地方；它还简化了在游戏中创建同一对象（例如陨石）的多个实例的过程。\n\
    \n这些类及其关系如下所示：\n\n![](img/8a661fca3884547aede940b9a6567321_222_0.png)\n\n该图显示\
    \ `Starship` 和 `Meteor` 类将扩展一个名为 `GameObject` 的类。它还显示 `Game` 与 `Starship` 类具有一对一的关系。也就是说，`Game`\
    \ 持有一个 `Starship` 的引用，而 `Starship` 又持有一个指向 `Game` 的单一引用。\n\n相比之下，`Game` 与 `Meteor`\
    \ 类具有一对多的关系。也就是说，`Game` 对象持有多个 `Meteor` 的引用，而每个 `Meteor` 都持有一个指向单一 `Game` 对象的引用。\n\
    \n## 主游戏类\n\n我们将要查看的第一个类是 `Game` 类本身。`Game` 类将保存陨石列表和飞船，以及主游戏循环。它还将初始化主窗口显示（例如设置窗口的大小和标题）。\n\
    \n在这种情况下，我们将把 `pygame.display.set_mode()` 函数返回的显示表面存储在 `Game` 对象的一个名为 `display_surface`\
    \ 的属性中。这是因为我们稍后需要使用它来显示飞船和陨石。我们还将保留一个 `pygame.time.Clock()` 类的实例，我们将在每次主游戏 while\
    \ 循环中使用它来设置帧率。\n\n我们游戏的基本框架如下所示；此代码清单提供了基本的 `Game` 类和启动游戏的主方法。游戏还定义了三个全局常量，用于定义帧刷新率和显示尺寸。\n\
    \n```python\nimport pygame\n\n# Set up Global constants\nFRAME_REFRESH_RATE =\
    \ 30\nDISPLAY_WIDTH = 600\nDISPLAY_HEIGHT = 400\n\nclass Game:\n    \"\"\" Represents\
    \ the game itself and game playing loop \"\"\"\n    def __init__(self):\n    \
    \    print('Initialising PyGame')\n        pygame.init()\n        # Set up the\
    \ display\n        self.display_surface = pygame.display.set_mode((DISPLAY_WIDTH,\
    \ DISPLAY_HEIGHT))\n        pygame.display.set_caption('Starship Meteors')\n \
    \       # Used for timing within the program.\n        self.clock = pygame.time.Clock()\n\
    \n    def play(self):\n        is_running = True\n        # Main game playing\
    \ Loop\n        while is_running:\n            # Work out what the user wants\
    \ to do\n            for event in pygame.event.get():\n                if event.type\
    \ == pygame.QUIT:\n                    is_running = False\n                elif\
    \ event.type == pygame.KEYDOWN:\n                    if event.key == pygame.K_q:\n\
    \                        is_running = False\n            # Update the display\n\
    \            pygame.display.update()\n            # Defines the frame rate\n \
    \           self.clock.tick(FRAME_REFRESH_RATE)\n        # Let pygame shutdown\
    \ gracefully\n        pygame.quit()\n\ndef main():\n    print('Starting Game')\n\
    \    game = Game()\n    game.play()\n    print('Game Over')\n\nif __name__ ==\
    \ '__main__':\n    main()\n```\n\n`Game` 类的主要 `play()` 方法包含一个循环，该循环将持续运行，直到用户选择退出游戏。他们可以通过两种方式之一来实现：按下\
    \ 'q' 键（由事件键 `K_q` 表示）或点击窗口关闭按钮。无论哪种情况，这些事件都会在主 while 循环方法内的主事件处理 for 循环中被捕获。\n\
    \n如果用户不想退出游戏，则会更新（刷新）显示，然后设置 `clock.tick()`（或帧）速率。当用户选择退出游戏时，主 while 循环将终止（`is_running`\
