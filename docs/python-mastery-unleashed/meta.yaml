    \    print('Main - Done')\n\nif __name__ == '__main__':\n    main()\n```\n\nWhen\
    \ this program is executed the output is:\n\n*Main - Starting*\n*do_something\
    \ - will wait for worker*\n*worker - will take some time*\n*worker - done it*\n\
