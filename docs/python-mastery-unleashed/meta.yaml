    - [www.uwe.ac.uk:25](http://www.uwe.ac.uk:25) this indicates port 25 on a host
    running at the University of the West of England, Bristol. Port 25 is usually
    reserved for SMTP (Simple Mail Transfer Protocol) servers.


    Port numbers in the IP system are 16 bit numbers in the range 0–65 536. Generally,
    port numbers below 1024 are reserved for predefined services (which means that
    you should avoid using them unless you wish to communicate with one of those services
    such as telnet, SMTP mail, ftp etc.). Therefore it is typically to choose a port
    number above 1024 when setting up your won services.


    # IPv4 Versus IPv6


    What we have described in this chapter in terms of IP addresses is in fact based
    on the Internet Protocol version 4 (aka IPv4). This version of the Internet Protocol
    was developed during the 1970s and published by the IETF (Internet Engineering
    Task Force) in September 1981 (replacing an earlier definition published in January
    1980). This version of the standard uses 32 binary bits for each element of the
    host address (hence the range of 0 to 255 for each of there parts of the address).
    This provides a total of'
