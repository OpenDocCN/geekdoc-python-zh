  md: 'Performance when logging should always be a consideration. In general you should
    aim to avoid performing any unnecessary work when logging is disabled (or disabled
    for the level being used). This may seem obvious but it can occur in several unexpected
    ways.


    One example is string concatenation. If a message to be logged involves string
    concatenation; then that string concatenation will always be performed when a
    log method is being invoked. For example:


    ```

    logger.debug(''Count: '' + count + '', total:'' + total)

