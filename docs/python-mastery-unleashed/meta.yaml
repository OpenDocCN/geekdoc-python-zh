- md: '## Computer Graphics


    ### Introduction to Computer Graphics


    Computer Graphics are everywhere; they are on your TV, in cinema adverts, the
    core of many films, on your tablet or mobile phone and certainly on your PC or
    Mac as well as on the dashboard of your car, on your smart watch and in children’s
    electronic toys.


    However what do we mean by the term Computer Graphics? The term goes back to a
    time when many (most) computers were purely textual in terms of their input and
    output and very few computers could generate graphical displays let alone handle
    input via such a display. However, in terms of this book we take the term Computer
    Graphics to include the creation of Graphical User Interfaces (or GUIs), graphs
    and charts such as bar charts or line plots of data, graphics in computer games
    (such as Space Invaders or Flight Simulator) as well as the generation of 2D and
    3D scenes or images. We also use the term to include Computer Generated Art.


    The availability of Computer Graphics is very important for the huge acceptance
    of computer systems by non computer scientists over the last 40 years. It is in
    part thanks to the accessibility of computer systems via computer graphic interfaces
    that almost everybody now uses some form of computer system (whether that is a
    PC, a tablet, a mobile phone or a smart TV).


    A Graphical User Interface (GUI) can capture the essence of an idea or a situation,
    often avoiding the need for a long passage of text or textual commands. It is
    also because a picture can paint a thousand words; as long as it is the right
    picture.


    In many situations where the relationships between large amounts of information
    must be conveyed, it is much easier for the user to assimilate this graphically
    than textually. Similarly, it is often easier to convey some meaning by manipulating
    some system entities on screen, than by combinations of text commands.


    For example, a well chosen graph can make clear information that is hard to determine
    from a table of the same data. In turn an adventure style game can become engaging
    and immersive with computer graphics which is in marked contrast to the textual
    versions of the 1980s. This highlights the advantages of a visual presentation
    compared to a purely textual one.


    ### Background


    Every interactive software system has a Human Computer Interface, whether it be
    a single text line system or an advanced graphic display. It is the vehicle used
    by developers for obtaining information from their user(s), and in turn, every
    user has to face some form of computer interface in order to perform any desired
    computer operation.


    Historically computer systems did not have a Graphical User Interface and rarely
    generated a graphical view. These systems from the 60s, 70s and 80s typically
    focused on numerical or data processing tasks. They were accessed via green or
    grey screens on a text oriented terminal. There was little or no opportunity for
    graphical output.


    However, during this period various researchers at laboratories such as Stanford,
    MIT, Bell Telephone Labs and Xerox were looking at the possibilities that graphic
    systems might offer to computers. Indeed even as far back as 1963 Ivan Sutherland
    showed that interactive computer graphics were feasible with his Ph.D. thesis
    on the Sketchpad system.


    ### The Graphical Computer Era


    Graphical computer displays and interactive graphical interfaces became a common
    means of human–computer interaction during the 1980s. Such interfaces can save
    a user from the need to learn complex commands. They are less likely to intimidate
    computer naives and can provide a large amount of information quickly in a form
    which can be easily assimilated by the user.


    The widespread use of high quality graphical interfaces (such as those provided
    by the Apple Macintosh and the early Windows interface) led many computer users
    to expect such interfaces to any software they use. Indeed these systems paved
    the way for the type of interface that is now omnipresent on PCs, Macs, Linux
    boxes, tablets and smart phones etc. This graphical user interface is based on
    the WIMP paradigm (Windows, Icons, Menus and Pointers) which is now the prevalent
    type of graphical user interface in use today.


    The main advantage of any window-based system, and particularly of a WIMP environment,
    is that it requires only a small amount of user training. There is no need to
    learn complex commands, as most operations are available either as icons, operations
    on icons, user actions (such as swiping) or from menu options, and are easy to
    use. (An icon is a small graphic object that is usually symbolic of an operation
    or of a larger entity such as an application program or a file).


    The book covers the following topics:


    1.  Computer Graphics. The book covers Computer Graphics and Computer Generated
    Art in Python as well as Graphical User Interfaces and Graphing/Charting via MatPlotLib.

    2.  Games Programming. This topic is covered using the pygame library.

    3.  Testing and Mocking. Testing is an important aspect of any software development;
    this book introduces testing in general and the PyTest module in detail. It also
    considers mocking within testing including what and when to mock.

    4.  File Input/Output. The book covers text file reading and writing as well as
    reading and writing CSV and Excel files. Although not strictly related to file
    input, regular expressions are included in this section as they can be used to
    process textual data held in files.

    5.  Database Access. The book introduces databases and relational database in
    particular. It then presents the Python DB-API database access standard and one
    implementation of this standard, the PyMySQL module used to access a MySQL database.

    6.  Logging. An often missed topic is that of logging. The book therefore introduces
    logging the need for logging, what to log and what not to log as well as the Python
    logging module.

    7.  Concurrency and Parallelism. The book provides extensive coverage of concurrency
    topics including Threads, Processes and inter thread or process synchronization.
    It also presents Futures and AsyncIO.

    8.  Reactive Programming. This section of the book introduces Reactive Programming
    using the PyRx reactive programming library.

    9.  Network Programming. The book concludes by introducing socket and web service
    communications in Python.


    Each section is introduced by a chapter providing the background and key concepts
    of that topic. Subsequent chapters then cover various aspects of the topic.


    For example, the first topic covered is on Computer Graphics. This section has
    an introductory chapter on Computer Graphics in general. It then introduces the
    Turtle Graphics Python library which can be used to generate a graphical display.


    The following chapter considers the subject of Computer Generated Art and uses
    the Turtle Graphics library to illustrate these ideas. Thus several examples are
    presented that might be considered art. The chapter concludes by presenting the
    well known Koch Snowflake and the Mandelbrot Fractal set.


    This is followed by a chapter presenting the MatPlotLib library used for generating
    2D and 3D charts and graphs (such as a line chart, bar chart or scatter graph).
    The section concludes with a chapter on Graphical User Interfaces (or GUIs) using
    the wxpython library. This chapter explores what we mean by a GUI and some of
    the alternatives available in Python for creating a GUI.


    Subsequent topics follow a similar pattern.


    Each programming or library oriented chapter also includes numerous sample programs
    that can be downloaded from the GitHub repository and executed. These chapters
    also include one or more end of chapter exercises (with sample solutions also
    in the GitHub repository).


    The topics within the book can be read mostly independently of each other. This
    allows the reader to dip into subject areas as and when required. For example,
    the File Input/Output section and the Database Access section can be read independently
    of each other (although in this case assessing both technologies may be useful
    in selecting an appropriate approach to adopt for the long term persistent storage
    of data in a particular system).


    Within each section there are usually dependencies, for example it is necessary
    to understand the pygame library from the ‘Building Games with pygame’ introductory
    chapter, before exploring the worked case study presented by the chapter on the
    Star ship Meteors game. Similarly it is necessary to have read the Threading and
    Multiprocessing chapters before reading the Inter Thread/Process Synchronization
    chapter.'
  mdcn: '## 计算机图形学


    ### 计算机图形学导论


    计算机图形学无处不在；它们出现在你的电视上、电影广告中、许多电影的核心部分、你的平板电脑或手机上，当然也存在于你的个人电脑或苹果电脑上，以及汽车仪表盘、智能手表和儿童电子玩具中。


    然而，我们所说的“计算机图形学”这个术语是什么意思呢？这个术语可以追溯到许多（大多数）计算机在输入和输出方面纯粹是文本的时代，当时很少有计算机能够生成图形显示，更不用说通过这种显示进行输入了。但是，就本书而言，我们将“计算机图形学”这个术语理解为包括创建图形用户界面（或GUI）、图表（如条形图或数据折线图）、计算机游戏中的图形（如《太空侵略者》或《飞行模拟器》），以及生成二维和三维场景或图像。我们也将计算机生成艺术包含在这个术语中。


    计算机图形学的可用性对于过去40年来非计算机科学家对计算机系统的广泛接受至关重要。正是部分得益于通过计算机图形界面访问计算机系统，现在几乎每个人都使用某种形式的计算机系统（无论是个人电脑、平板电脑、手机还是智能电视）。


    图形用户界面（GUI）能够捕捉一个想法或情境的本质，通常避免了长篇文本或文本命令的需要。这也是因为一幅画可以胜过千言万语；只要它是正确的图画。


    在许多必须传达大量信息之间关系的情况下，用户通过图形方式吸收这些信息比通过文本方式容易得多。同样，通过操作屏幕上的某些系统实体来传达某些含义，通常也比通过文本命令的组合更容易。


    例如，一个精心选择的图表可以清晰地呈现从同一数据的表格中难以确定的信息。反过来，一个冒险风格的游戏可以通过计算机图形变得引人入胜且身临其境，这与20世纪80年代的文本版本形成鲜明对比。这突显了视觉呈现相对于纯文本呈现的优势。


    ### 背景


    每个交互式软件系统都有一个人机界面，无论是单行文本系统还是先进的图形显示。它是开发者用来从用户那里获取信息的工具，反过来，每个用户也必须面对某种形式的计算机界面才能执行任何所需的计算机操作。


    历史上，计算机系统没有图形用户界面，也很少生成图形视图。这些来自20世纪60年代、70年代和80年代的系统通常专注于数值或数据处理任务。它们通过面向文本的终端上的绿色或灰色屏幕进行访问。几乎没有或根本没有图形输出的机会。


    然而，在这一时期，斯坦福大学、麻省理工学院、贝尔电话实验室和施乐公司等实验室的各种研究人员正在研究图形系统可能为计算机提供的可能性。事实上，早在1963年，伊万·萨瑟兰就通过他关于Sketchpad系统的博士论文展示了交互式计算机图形学的可行性。


    ### 图形计算机时代


    图形计算机显示和交互式图形界面在20世纪80年代成为人机交互的常用手段。这样的界面可以省去用户学习复杂命令的需要。它们不太可能吓到计算机新手，并且可以以用户容易吸收的形式快速提供大量信息。


    高质量图形界面（如苹果麦金塔电脑和早期Windows界面提供的界面）的广泛使用，使得许多计算机用户期望他们使用的任何软件都具有这样的界面。事实上，这些系统为现在在个人电脑、苹果电脑、Linux机器、平板电脑和智能手机等设备上无处不在的那种界面铺平了道路。这种图形用户界面基于WIMP范式（窗口、图标、菜单和指针），这是当今使用的主流图形用户界面类型。


    任何基于窗口的系统，尤其是WIMP环境的主要优势在于，它只需要少量的用户培训。无需学习复杂的命令，因为大多数操作都可以通过图标、对图标的操作、用户操作（如滑动）或菜单选项来获得，并且易于使用。（图标是一个小的图形对象，通常象征着一个操作或一个更大的实体，如应用程序或文件）。


    本书涵盖以下主题：


    1.  计算机图形学。本书涵盖Python中的计算机图形学和计算机生成艺术，以及通过MatPlotLib实现的图形用户界面和图表绘制。

    2.  游戏编程。本主题使用pygame库进行介绍。

    3.  测试与模拟。测试是任何软件开发的重要方面；本书介绍了通用测试和PyTest模块的详细内容。它还考虑了测试中的模拟，包括模拟什么以及何时模拟。

    4.  文件输入/输出。本书涵盖文本文件的读写，以及CSV和Excel文件的读写。虽然与文件输入没有严格关系，但本节也包含了正则表达式，因为它们可用于处理文件中保存的文本数据。

    5.  数据库访问。本书介绍了数据库，特别是关系数据库。然后介绍了Python DB-API数据库访问标准及其一个实现——用于访问MySQL数据库的PyMySQL模块。

    6.  日志记录。一个经常被忽视的主题是日志记录。因此，本书介绍了日志记录的必要性、记录什么和不记录什么，以及Python的日志记录模块。

    7.  并发与并行。本书广泛涵盖了并发主题，包括线程、进程以及线程间或进程间同步。它还介绍了Futures和AsyncIO。

    8.  响应式编程。本书的这一部分介绍了使用PyRx响应式编程库进行响应式编程。

    9.  网络编程。本书最后介绍了Python中的套接字和Web服务通信。


    每个部分都由一个章节引入，提供该主题的背景和关键概念。随后的章节则涵盖该主题的各个方面。


    例如，第一个涵盖的主题是计算机图形学。本节有一个关于计算机图形学的总体介绍章节。然后介绍了Turtle Graphics Python库，该库可用于生成图形显示。


    接下来的章节探讨了计算机生成艺术的主题，并使用Turtle Graphics库来阐释这些思想。因此，展示了几个可能被认为是艺术的例子。本章最后介绍了著名的科赫雪花和曼德博集合。


    随后是一个介绍MatPlotLib库的章节，该库用于生成二维和三维图表（如折线图、条形图或散点图）。本节最后是一个关于使用wxpython库的图形用户界面（或GUI）的章节。本章探讨了GUI的含义以及Python中创建GUI的一些可用替代方案。


    后续主题遵循类似的模式。


    每个面向编程或库的章节也包含大量可以从GitHub仓库下载并执行的示例程序。这些章节还包括一个或多个章节末尾的练习（示例解决方案也在GitHub仓库中）。


    本书中的主题大多可以相互独立阅读。这允许读者根据需要随时深入特定领域。例如，文件输入/输出部分和数据库访问部分可以相互独立阅读（尽管在这种情况下，评估这两种技术可能有助于为特定系统中的数据长期持久存储选择合适的方法）。


    在每个部分内通常存在依赖关系，例如，在探索“星际飞船流星游戏”章节中介绍的案例研究之前，有必要理解“使用pygame构建游戏”介绍章节中的pygame库。同样，在阅读“线程/进程间同步”章节之前，有必要先阅读“线程”和“多进程”章节。'
