- md: "Just as the Graphical User Interface systems described in earlier chapters\
    \ have an event loop that allows the programmer to work out what the user is doing\
    \ (in those cases this is typically selecting a menu item, clicking a button or\
    \ entering data etc.); pygame has an event loop that allows the game to work out\
    \ what the player is doing. For example, the user may press the left or right\
    \ arrow key. This is represented by an event.\n\n## Event Types\n\nEach event\
    \ that occurs has associated information such as the type of that event. For example:\n\
    \n- Pressing a key will result in a KEYDOWN type of event, while releasing a key\
    \ will result in a KEYUP event type.\n- Selecting the window close button will\
    \ generate a QUIT event type etc.\n- Using the mouse can generate MOUSEMOTION\
    \ events as well as MOUSEBUTTONDOWN and MOUSEBUTTONUP event types.\n- Using a\
    \ Joystick can generate several different types of event including JOYAXISMOTION,\
    \ JOYBALLMOTION, JOYBUTTONDOWN and JOYBUTTONUP.\n\nThese event types tell you\
    \ what occurred to generate the event. This means that you can choose which types\
    \ of events you want to deal with and ignore other events.\n\n## Event Information\n\
    \nEach type of event object provides information associated with that event. For\
    \ example a Key oriented event object will provide the actual key pressed while\
    \ a mouse oriented event object will provide information on the position of the\
    \ mouse, which button was pressed etc. If you try an access an attribute on an\
    \ event that does not support that attribute, then an error will be generated.\n\
    \nThe following lists some of the attributes available for different event types:\n\
    \n- KEYDOWN and KEYUP, the event has a key attribute and a mod attribute (indicating\
    \ if any other modifying keys such as Shift are also being pressed).\n- MOUSEBUTTONUP\
    \ and MOUSEBUTTONDOWN has an attribute pos that holds a tuple indicating the mouse\
    \ location in terms of x and y coordinates on the underlying surface. It also\
    \ has a button attribute indicating which mouse was pressed.\n- MOUSEMOTION has\
    \ pos, rel and buttons attributes. The pos is a tuple indicating the x and y location\
    \ of mouse cursor. The rel attribute indicates the amount of mouse movement and\
    \ buttons indicates the state of the mouse buttons.\n\nAs an example if we want\
    \ to check for a keyboard event type and then check that the key pressed was the\
    \ space bar, then we can write:\n\n```\nif event.type == pygame.KEYDOWN:\n   \
    \ # Check to see which key is pressed\n    if event.key == pygame.K_SPACE:\n \
    \       print('space')\n```\n\nThis indicates that if it is a key pressed event\
    \ and that the actual key was the space bar; then print the string ‘space’.\n\n\
    There are many keyboard constants that are used to represent the keys on the keyboard\
    \ and pygame.K_SPACE constant used above is just one of them.\n\nAll the keyboard\
    \ constants are prefixed with ‘K_’ followed by the key or the name of the key,\
    \ for example:\n\n- K_TAB, K_SPACE, K_PLUS, K_o, K_1, K_AT, K_a, K_b, K_z, K_DELETE,\
    \ K_DOWN, K_LEFT, K_RIGHT, K_UP etc.\n\nFurther keyboard constants are provided\
    \ for modifier states that can be combined with the above such as KMOD_SHIFT,\
    \ KMOD_CAPS, KMOD_CTRL and KMOD_ALT.\n\n## The Event Queue\n\nEvents are supplied\
    \ to a pygame application via the Event Queue. The Event Queue is used to collect\
    \ together events as they happen. For example, let us assume that a user clicks\
    \ on the mouse twice and a key twice before a program has a chance to process\
    \ them; then there will be four events in the Event Queue as shown below:\n\n\
    ![](img/8a661fca3884547aede940b9a6567321_201_0.png)\n\nThe application can then\
    \ obtain an iterable from the event queue and process through the events in turn.\
    \ While the program is processing these events further events may occur and will\
    \ be added to the Event Queue. When the program has finished processing the initial\
    \ collection of events it can obtain the next set of events to process.\n\nOne\
    \ significant advantage of this approach is that no events are ever lost; that\
    \ is if the user clicks the mouse twice while the program is processing a previous\
    \ set of events; they will be recorded and added to the event queue. Another advantage\
    \ is that the events will be presented to the program in the order that they occurred.\n\
    \nThe pygame.event.get() function will read all the events currently on the Event\
    \ Queue (removing them from the event queue). The method returns an Event List\
    \ which is an iterable list of the events read. Each event can then be processed\
    \ in turn. For example:\n\n```\nfor event in pygame.event.get():\n    if event.type\
    \ == pygame.QUIT:\n        print('Received Quit Event:')\n    elif event.type\
    \ == pygame.MOUSEBUTTONDOWN:\n        print('Received Mouse Event')\n    elif\
    \ event.type == pygame.KEYDOWN:\n        print('Received KeyDown Event')\n```\n\
    \nIn the above code snippet an EventList is obtained from the Event Queue containing\
    \ the current set of events. The for loop then processes each event in turn checking\
    \ the type and printing an appropriate message.\n\nYou can use this approach to\
    \ trigger appropriate behavior such as moving an image around the screen or calculating\
    \ the players score etc. However, be aware that if this behavior takes too long\
    \ it can make the game difficult to play (although the examples in this chapter\
    \ and the next are simple enough that this is not a problem).\n\n## A First pygame\
    \ Application\n\nWe are now at the point where we can put together what we have\
    \ looked at so far and create a simple pygame application.\n\nIt is common to\
    \ create a hello world style program when using a new programming language or\
    \ using a new application framework etc. The intention is that the core elements\
    \ of the language or framework are explored in order to generate the most basic\
    \ form of an application using the language or framework. We will therefore implement\
    \ the most basic application possible using pygame.\n\nThe application we will\
    \ create will display a pygame window, with a ‘Hello World’ title. We will then\
    \ be able to quit the game. Although technically speaking this isn’t a game, it\
    \ does possess the basic architecture of a pygame application.\n\nThe simple Hello\
    \ World game will initialize pygame and the graphical display. It will then have\
    \ a main game playing loop that will continue until the user selects to quit the\
    \ application. It will then shut down pygame. The display created by the program\
    \ is shown below for both Mac and Windows operating systems:\n\n![](img/8a661fca3884547aede940b9a6567321_204_0.png)\n\
    \nTo quit the program click on the exit button for the windowing system you are\
    \ using.\n\nThe simple Hello World game is given below:\n\n```python\nimport pygame\n\
    \ndef main():\n    print('Starting Game')\n    print('Initialising pygame')\n\
    \    pygame.init()   # Required by every pygame application\n    print('Initialising\
    \ HelloWorldGame')\n    pygame.display.set_mode((200, 100))\n    pygame.display.set_caption('Hello\
    \ World')\n    print('Update display')\n    pygame.display.update()\n    print('Starting\
    \ main Game Playing Loop')\n    running = True\n    while running:\n        for\
    \ event in pygame.event.get():\n            if event.type == pygame.QUIT:\n  \
    \              print('Received Quit Event:', event)\n                running =\
    \ False\n    print('Game Over')\n    pygame.quit()\n\nif __name__ == '__main__':\n\
    \    main()\n```\n\nThere are several key steps highlighted by this example, these\
    \ steps are:\n\n1. Import pygame. pygame is of course not one of the default modules\
    \ available within Python. You must first import pygame into your code. The import\
    \ pygame statement imports the pygame module into your code and makes the functions\
    \ and classes in pygame available to you (note the capitalization – pygame is\
    \ not the same module name as PyGame). It is also common to find that programs\
    \ import from pygame.locals import. This adds several constants and functions\
    \ into the namespace of your program. In this very simple example we have not\
    \ needed to do this.\n2. Initialize pygame. Almost every pygame module needs to\
    \ be initialized in some way and the simplest way to do this is to call pygame.init().\
    \ This will do what is required to set the pygame environment up for use. If you\
    \ forget to call this function you will typically get an error message such as\
    \ pygame.error: video system not initialized (or something similar). If you get\
    \ such a method check to see that you have called pygame.init(). Note that you\
    \ can initialize individual pygame modules (for example the pygame.font module\
    \ can be initialized using pygame.font.init()) if required. However pygame.init()\
    \ is the most commonly used approach to setting up pygame."
  mdcn: "正如前面章节描述的图形用户界面系统拥有一个事件循环，允许程序员了解用户正在做什么（在那些情况下，通常是选择菜单项、点击按钮或输入数据等）；pygame\
    \ 也有一个事件循环，允许游戏了解玩家正在做什么。例如，用户可能按下左或右箭头键。这由一个事件来表示。\n\n## 事件类型\n\n发生的每个事件都有相关信息，例如该事件的类型。例如：\n\
    \n-   按下一个键将产生 `KEYDOWN` 类型的事件，而释放一个键将产生 `KEYUP` 事件类型。\n-   选择窗口关闭按钮将生成 `QUIT`\
    \ 事件类型等。\n-   使用鼠标可以生成 `MOUSEMOTION` 事件以及 `MOUSEBUTTONDOWN` 和 `MOUSEBUTTONUP`\
    \ 事件类型。\n-   使用操纵杆可以生成几种不同类型的事件，包括 `JOYAXISMOTION`、`JOYBALLMOTION`、`JOYBUTTONDOWN`\
    \ 和 `JOYBUTTONUP`。\n\n这些事件类型告诉你发生了什么来生成该事件。这意味着你可以选择要处理哪些类型的事件，并忽略其他事件。\n\n##\
    \ 事件信息\n\n每种类型的事件对象都提供与该事件相关的信息。例如，一个键盘导向的事件对象将提供实际按下的键，而一个鼠标导向的事件对象将提供鼠标位置、按下了哪个按钮等信息。如果你尝试访问一个事件对象上不支持的属性，则会产生错误。\n\
    \n以下列出了不同事件类型可用的一些属性：\n\n-   `KEYDOWN` 和 `KEYUP`，事件有一个 `key` 属性和一个 `mod` 属性（指示是否还按下了其他修饰键，如\
    \ Shift）。\n-   `MOUSEBUTTONUP` 和 `MOUSEBUTTONDOWN` 有一个 `pos` 属性，它包含一个元组，表示鼠标在底层表面上的\
    \ x 和 y 坐标位置。它还有一个 `button` 属性，指示按下了哪个鼠标按钮。\n-   `MOUSEMOTION` 有 `pos`、`rel` 和\
    \ `buttons` 属性。`pos` 是一个元组，表示鼠标光标的 x 和 y 位置。`rel` 属性表示鼠标移动的量，`buttons` 表示鼠标按钮的状态。\n\
    \n例如，如果我们想检查键盘事件类型，然后检查按下的键是否是空格键，那么我们可以这样写：\n\n```\nif event.type == pygame.KEYDOWN:\n\
    \    # Check to see which key is pressed\n    if event.key == pygame.K_SPACE:\n\
    \        print('space')\n```\n\n这表示如果是一个按键事件，并且实际按键是空格键；则打印字符串 'space'。\n\n有许多键盘常量用于表示键盘上的键，上面使用的\
    \ `pygame.K_SPACE` 常量只是其中之一。\n\n所有键盘常量都以 'K_' 为前缀，后跟键或键的名称，例如：\n\n-   `K_TAB`、`K_SPACE`、`K_PLUS`、`K_o`、`K_1`、`K_AT`、`K_a`、`K_b`、`K_z`、`K_DELETE`、`K_DOWN`、`K_LEFT`、`K_RIGHT`、`K_UP`\
    \ 等。\n\n还提供了用于修饰键状态的进一步键盘常量，可以与上述常量组合使用，例如 `KMOD_SHIFT`、`KMOD_CAPS`、`KMOD_CTRL`\
    \ 和 `KMOD_ALT`。\n\n## 事件队列\n\n事件通过事件队列提供给 pygame 应用程序。事件队列用于在事件发生时将它们收集在一起。例如，假设用户在程序有机会处理它们之前点击了两次鼠标并按了两次键；那么事件队列中将有四个事件，如下所示：\n\
    \n![](img/8a661fca3884547aede940b9a6567321_201_0.png)\n\n然后应用程序可以从事件队列获取一个可迭代对象，并依次处理事件。当程序正在处理这些事件时，可能会发生更多事件，并将它们添加到事件队列中。当程序完成处理初始事件集合后，它可以获取下一组要处理的事件。\n\
    \n这种方法的一个显著优点是永远不会丢失任何事件；也就是说，如果用户在程序处理前一组事件时点击了两次鼠标；它们将被记录并添加到事件队列中。另一个优点是事件将按照它们发生的顺序呈现给程序。\n\
    \n`pygame.event.get()` 函数将读取事件队列中当前的所有事件（将它们从事件队列中移除）。该方法返回一个事件列表，这是一个包含已读取事件的可迭代列表。然后可以依次处理每个事件。例如：\n\
    \n```\nfor event in pygame.event.get():\n    if event.type == pygame.QUIT:\n \
    \       print('Received Quit Event:')\n    elif event.type == pygame.MOUSEBUTTONDOWN:\n\
    \        print('Received Mouse Event')\n    elif event.type == pygame.KEYDOWN:\n\
    \        print('Received KeyDown Event')\n```\n\n在上面的代码片段中，从事件队列获取了一个包含当前事件集的事件列表。然后\
    \ `for` 循环依次处理每个事件，检查类型并打印相应的消息。\n\n你可以使用这种方法来触发适当的行为，例如在屏幕上移动图像或计算玩家得分等。但是，请注意，如果此行为耗时过长，可能会使游戏难以进行（尽管本章和下一章的示例足够简单，这不是问题）。\n\
    \n## 第一个 pygame 应用程序\n\n我们现在到了可以将到目前为止所学的内容整合起来，创建一个简单的 pygame 应用程序的时候了。\n\n在使用新的编程语言或新的应用程序框架时，创建一个\
    \ \"hello world\" 风格的程序是很常见的。其目的是探索语言或框架的核心元素，以使用该语言或框架生成最基本形式的应用程序。因此，我们将使用 pygame\
    \ 实现尽可能基本的应用程序。\n\n我们将创建的应用程序将显示一个 pygame 窗口，标题为 'Hello World'。然后我们将能够退出游戏。虽然严格来说这不是一个游戏，但它确实具备了\
    \ pygame 应用程序的基本架构。\n\n简单的 Hello World 游戏将初始化 pygame 和图形显示。然后它将有一个主游戏循环，该循环将持续运行，直到用户选择退出应用程序。然后它将关闭\
    \ pygame。程序创建的显示在 Mac 和 Windows 操作系统下如下所示：\n\n![](img/8a661fca3884547aede940b9a6567321_204_0.png)\n\
