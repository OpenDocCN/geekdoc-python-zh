  md: '# Available Schedulers


    To support different scheduling strategies the RxPy library provides two modules
    that supply different schedulers; the rx.concurrency and rx. currency.mainloopscheduler.
    The modules contain a variety of schedulers including those listed below.


    The following schedulers are available in the rx.concurrency module:


    +   - ImmediateScheduler This schedules an action for immediate execution.

    - CurrentThreadScheduler This schedules activity for the current thread.

    - TimeoutScheduler This scheduler works via a timed callback.

    - NewThreadSchedulercreates a scheduler for each unit of work on a separate thread.

    - ThreadPoolScheduler. This is a scheduler that utilizes a thread pool to execute
    work. This scheduler can act as a way of throttling the amount of work carried
    out concurrently.


    The rx.concurrency.mainloopschduler module also defines the following schedulers:'
  merge: -1
