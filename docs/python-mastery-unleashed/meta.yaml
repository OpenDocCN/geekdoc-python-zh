- md: '## Mocking for Testing


    ## Introduction


    Testing software systems is not an easy thing to do; the functions, objects, methods
    etc. that are involved in any program can be complex things in their own right.
    In many cases they depend on and interact with other functions, methods and objects;
    very few functions and methods operate in isolation. Thus the success or failure
    of a function or method or the overall state of an object is dependent on other
    program elements.


    However, in general it is a lot easier to test a single unit in isolation rather
    than to test it as part of a larger more complex system. For example, let us take
    a Python class as a single unit to be tested. If we can test this class on its
    own we only have to take into account the state of the class''s object and the
    behavior defined for the class when writing our test and determining appropriate
    outcomes.


    However, if that class interacts with external systems such as external services,
    databases, third party software, data sources etc. Then the testing process becomes
    more complex:


    It may now be necessary to verify data updates made to the database, or information
    sent to a remote service etc. to confirm that the operation of a class''s object
    is correct. This makes not only the software being tested more complex but it
    also makes the tests themselves more complex. This means that there is greater
    chance that the test will fail, that the tests will contain bugs or issues themselves
    and that the test will be harder for someone to understand and maintain. Thus
    a common objective when writing unit tests or subsystem tests is to be able to
    test elements/units in isolation.


    The question is how to do this when a function or method relies on other elements?


    The key to decoupling functions, methods and objects from other program or system
    elements is to use mocks. These mocks can be used to decouple one object from
    another, one function from another and one system from another; thereby simplifying
    the testing environment. These mocks are only intended to be used for testing
    purposes, for example the above scenario could be simplified by mocking out each
    of the external systems as shown below:


    Mocking is not a Python specific concept and there are many mocking libraries
    available for many different languages. However, in this chapter we will be focusing
    on the unittest.mock library which has been part of the standard Python distribution
    since Python 3.3.


    ## Why Mock?


    A useful first question to consider with regard to mocking, in software testing,
    is ‘Why mock?’. That is, why bother with the concept of a mock in the first place;
    why not test with the real thing?


    There are several answers to this, some of which are discussed below:


    Testing in isolation is easier. As mentioned in the introduction, testing a unit
    (whether that is a class, a function, a module etc.) is easier in isolation then
    when dependent on external classes, functions, modules etc.


    The real thing is not available. In many cases it is necessary to mock out part
    of a system or an interface to another system because the real thing is just not
    available. This could be for several reasons including that it has not been developed
    yet. In the natural course of software development some parts of a system are
    likely to be developed and ready for testing before other parts. If one part relies
    on another part for some element of its operation then the system that is not
    yet available can be mocked out. In other situations the development team or test
    team may not have access to the real thing. This may because it is only available
    within a production context. For example, if a software development house is developing
    one subsystem it may not have access to another subsystem as it is proprietary
    and only accessible once the software has been deployed within the client organization.


    Real elements can be time consuming. We want our tests to run as quickly as possible
    and certainly within a Continuous Integration (CI) environment we want them to
    run fast enough that we can repeatedly test a system throughout the day. In some
    situations the real thing may take a significant amount of time to process the
    test scenario. As we want to test our own code we may not be worried about whether
    a system outside of our control operates correctly or not (at least at this level
    of testing; it may still be a concern for integration and system testing). We
    can therefore improve the response times of our tests if we mock out the real
    system and replace it with a mock that provides much faster response times (possibly
    because it uses canned responses).


    The real thing takes time to set up. In a Continuous Integration (CI) environment,
    new builds of a system are regularly and repeatedly tested (for example whenever
    a change is made to their code base). In such situations it may be necessary to
    configure and deploy the final system to a suitable environment to perform appropriate
    tests. If an external system is time consuming to configure, deploy and initialize
    it may be more effective to mock that system out.


    Difficult to emulate certain situations. It can be difficult within a test scenario
    to emulate specific situations. These situations are often related to error or
    exceptional circumstances that should never happen within a correctly functioning
    environment. However, it may well be necessary to validate that if such a situation
    does occur, then the software can deal with that scenario. If these scenarios
    are related to how external (the unit under test) systems fail or operate incorrectly
    then it may be necessary to mock out these systems to be able to generate the
    scenarios.


    We want repeatable tests. By their very nature when you run a test you either
    want it to pass or fail each time it is run with the same inputs. You certainly
    do not want tests that pass sometimes and fail other times. This means that there
    is no confidence in the tests and people often start ignoring failed tests. This
    situation can happen if the data provided by systems that a test depends on do
    not supply repeatable data.


    This can happen for several different reasons but a common cause is because they
    return real data. Such real data may be subject to change, for example consider
    a system that uses a data feed for the current exchange rate between funds and
    dollars. If the associated test confirms that a trade when priced in dollars is
    correctly converted to funds using the current exchange rate then that test is
    likely to generate a different result every time it is run. In this situation
    it would be better to mock out the current exchange rate service so that a fixed/known
    exchange rate is used.


    The Real System is not reliable enough. In some cases the real system may not
    be reliable enough itself to allow for repeatable tests. The Real System may not
    allow tests to be repeated. Finally, the real system may not allow tests to be
    easily repeated. For example, a test which involves lodging a trade for a certain
    number of IBM shares with a Trade Order management system may not allow that trade,
    with those shares, for that customer to be run several times (as it would then
    appear to be multiple trades). However, for the purposes of testing we may want
    to test submitting such a trade in multiple different scenarios, multiple times.
    It may therefore be necessary to mock out the real Order Management System so
    that such tests can be written.


    ## What Is Mocking?


    The previous section gave several reasons to use mocks; the next thing to consider
    then is what is a mock?


    Mocks, including mock functions, methods and mock objects are things that:


    - Possess the same interface as the real thing, whether they are mock functions,
    methods or whole objects. They thus take the same range and types of parameters
    and return similar information using similar types.

    - Define behavior that in some way represents/mimics real exemplar behavior but
    typically in very controlled ways. This behavior may be hard coded, may rely on
    a set of rules or simplified behavior; may be very simplistic or quite sophisticated
    in its own right.


    They thus emulate the real system and from outside of the mock may actually appear
    to be the real system.


    In many cases the term mock is used to cover a range of different ways in which
    the real thing can be emulated; each type of mock has its own characteristics.
    It is therefore useful to distinguish the different types of mocks as this can
    help determine the style of mock to be adopted in a particular test situation.


    There are different types of Mock including:'
  mdcn: '## 用于测试的模拟


    ## 引言


    测试软件系统并非易事；任何程序中涉及的函数、对象、方法等本身就可能是复杂的实体。在许多情况下，它们依赖于其他函数、方法和对象并与之交互；很少有函数和方法是孤立运行的。因此，一个函数或方法的成功或失败，或一个对象的整体状态，都取决于其他程序元素。


    然而，一般来说，单独测试一个单元要比将其作为更大、更复杂系统的一部分进行测试容易得多。例如，让我们以一个Python类作为待测试的单个单元。如果我们能单独测试这个类，那么在编写测试和确定预期结果时，我们只需考虑该类对象的状态以及为该类定义的行为。


    但是，如果该类与外部系统（如外部服务、数据库、第三方软件、数据源等）交互，那么测试过程就会变得更加复杂：


    现在可能需要验证对数据库的数据更新，或发送到远程服务的信息等，以确认类对象的操作是否正确。这不仅使被测软件更加复杂，也使测试本身更加复杂。这意味着测试失败的可能性更大，测试本身可能包含缺陷或问题，并且测试将更难被人理解和维护。因此，编写单元测试或子系统测试的一个共同目标是能够隔离地测试元素/单元。


    问题是，当一个函数或方法依赖于其他元素时，如何做到这一点？


    将函数、方法和对象与其他程序或系统元素解耦的关键是使用模拟。这些模拟可用于将一个对象与另一个对象、一个函数与另一个函数、一个系统与另一个系统解耦；从而简化测试环境。这些模拟仅用于测试目的，例如，上述场景可以通过模拟每个外部系统来简化，如下所示：


    模拟并非Python特有的概念，许多不同的语言都有许多可用的模拟库。然而，在本章中，我们将重点介绍`unittest.mock`库，该库自Python 3.3起就已成为Python标准发行版的一部分。


    ## 为什么使用模拟？


    关于软件测试中的模拟，一个值得首先考虑的有用问题是“为什么要模拟？”。也就是说，为什么要一开始就使用模拟的概念；为什么不直接用真实的东西进行测试？


    对此有几个答案，其中一些将在下面讨论：


    隔离测试更容易。如引言所述，隔离测试一个单元（无论是类、函数、模块等）比依赖外部类、函数、模块等进行测试更容易。


    真实的东西不可用。在许多情况下，需要模拟系统的部分或与其他系统的接口，因为真实的东西根本不可用。这可能有几个原因，包括它尚未开发出来。在软件开发的自然过程中，系统的某些部分可能比其他部分更早开发完成并准备好进行测试。如果某个部分依赖于另一部分来执行其操作的某些元素，那么尚未可用的系统就可以被模拟出来。在其他情况下，开发团队或测试团队可能无法访问真实的东西。这可能是因为它只在生产环境中可用。例如，如果一个软件开发机构正在开发一个子系统，它可能无法访问另一个子系统，因为它是专有的，只有在软件部署到客户组织内部后才能访问。


    真实元素可能很耗时。我们希望测试运行得尽可能快，当然在持续集成环境中，我们希望它们运行得足够快，以便我们可以在一天内反复测试系统。在某些情况下，真实的东西可能需要大量时间来处理测试场景。由于我们想测试自己的代码，我们可能不关心我们无法控制的系统是否正确运行（至少在这个测试级别；它可能仍然是集成和系统测试的关注点）。因此，如果我们模拟真实系统并用提供更快响应时间（可能是因为它使用了预设响应）的模拟来替换它，我们就可以提高测试的响应时间。


    真实的东西需要时间来设置。在持续集成环境中，系统的新的构建会定期和重复地进行测试（例如，每当其代码库发生更改时）。在这种情况下，可能需要将最终系统配置和部署到合适的环境以执行适当的测试。如果外部系统的配置、部署和初始化很耗时，那么模拟该系统可能更有效。


    难以模拟某些情况。在测试场景中模拟特定情况可能很困难。这些情况通常与错误或异常情况有关，这些情况在正常运行的环境中绝不应该发生。然而，很可能需要验证如果这种情况确实发生，软件能否处理该场景。如果这些场景与外部（被测单元）系统如何失败或错误运行有关，那么可能需要模拟这些系统以能够生成这些场景。


    我们希望测试可重复。就其本质而言，当你运行一个测试时，你希望它在每次使用相同输入运行时都通过或失败。你当然不希望测试有时通过有时失败。这意味着对测试没有信心，人们常常开始忽略失败的测试。如果测试所依赖的系统提供的数据不是可重复的，就可能发生这种情况。


    这可能由几个不同的原因引起，但一个常见原因是它们返回真实数据。这样的真实数据可能会发生变化，例如，考虑一个使用资金与美元当前汇率数据馈送的系统。如果相关测试确认一笔以美元计价的交易使用当前汇率正确转换为资金，那么该测试每次运行时都可能产生不同的结果。在这种情况下，最好模拟当前汇率服务，以便使用固定/已知的汇率。


    真实系统不够可靠。在某些情况下，真实系统本身可能不够可靠，无法进行可重复的测试。真实系统可能不允许测试被重复。最后，真实系统可能不允许测试被轻松重复。例如，一个涉及向交易订单管理系统提交一定数量IBM股票交易的测试，可能不允许该交易、该股票、该客户被运行多次（因为它看起来会是多笔交易）。然而，出于测试目的，我们可能希望在多个不同场景中多次测试提交这样的交易。因此，可能需要模拟真实的订单管理系统，以便能够编写此类测试。


    ## 什么是模拟？


    上一节给出了使用模拟的几个原因；接下来要考虑的是什么是模拟？


    模拟，包括模拟函数、方法和模拟对象，是这样的东西：


    - 拥有与真实事物相同的接口，无论是模拟函数、方法还是整个对象。因此，它们接受相同范围和类型的参数，并使用相似的类型返回类似的信息。

    - 定义的行为在某种程度上代表/模仿真实示例行为，但通常以非常受控的方式进行。这种行为可能是硬编码的，可能依赖于一组规则或简化的行为；可能非常简单，也可能本身相当复杂。


    因此，它们模拟真实系统，并且从模拟外部看，实际上可能看起来就是真实系统。


    在许多情况下，术语“模拟”用于涵盖模拟真实事物的各种不同方式；每种类型的模拟都有其自身的特征。因此，区分不同类型的模拟是有用的，因为这有助于确定在特定测试场景中要采用的模拟风格。


    有不同类型的模拟，包括：'
