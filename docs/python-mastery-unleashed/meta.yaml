    The Python Semaphore class implements Dijkstra’s counting semaphore model.


    In general, a semaphore is like an integer variable, its value is intended to
    represent a number of available resources of some kind. There are typically two
    operations available on a semaphore;these operations are acquire() and re- lease()
    (although in some libraries Dijkstra’s original names of p()'
- md: "and v() are used, these operation names are based on the original Dutch phrases).\n\
    \n- The acquire() operation subtracts one from the value of the semaphore, unless\
    \ the value is 0, in which case it blocks the calling thread until the semaphore’s\
    \ value increases above 0 again.\n- The signal() operation adds one to the value,\
    \ indicating a new instance of the resource has been added to the pool.\n\nBoth\
    \ the threading.Semaphore and the multiprocessing.Semaphore classes also supports\
    \ the Context Management Protocol. An optional parameter used with the Semaphore\
    \ constructor gives the initial value for the internal counter; it defaults to\
    \ 1. If the value given is less than 0, ValueError is raised.\n\nThe following\
    \ example illustrates 5 different Threads all running the same worker() function.\
    \ The worker() function attempts to acquire a semaphore; if it does then it continues\
    \ into the with statement block; if it doesn’t, it waits until it can acquire\
    \ it. As the semaphore is initialized to 2 there can only be two threads that\
    \ can acquire the Semaphore at a time.\n\nThe sample program however, starts up\
    \ five threads, this therefore means that the first 2 running Threads will acquire\
    \ the semaphore and the remaining three will have to wait to acquire the semaphore.\
    \ Once the first two release the semaphore a further two can acquire it and so\
    \ on.\n\n```python\nfrom threading import Thread, Semaphore, currentThread\nfrom\
    \ time import sleep\n\ndef worker(semaphore):\n    with semaphore:\n        print(currentThread().getName()\
    \ + \" - entered\")\n        sleep(0.5)\n        print(currentThread().getName()\
    \ + \" - exiting\")\n\nprint('MainThread - Starting')\nsemaphore = Semaphore(2)\n\
    for i in range(0, 5):\n    thread = Thread(name='T' + str(i),\n              \
    \      target=worker, args=[semaphore])\n    thread.start()\nprint('MainThread\
    \ - Done')\n```\n\nThe output from a run of this program is given below:\n\n```\n\
    MainThread - Starting\nT0 - entered\nT1 - entered\nMainThread - Done\nT0 - exiting\n\
    T2 - entered\nT1 - exiting\nT3 - entered\nT2 - exiting\nT4 - entered\nT3 - exiting\n\
    T4 - exiting\n```\n\n## The Concurrent Queue Class\n\nAs might be expected the\
    \ model where a producer Thread or Process generates data to be processed by one\
    \ or more Consumer Threads or Processes is so common that a higher level abstraction\
    \ is provided in Python than the use of Locks, Conditions or Semaphores; this\
    \ is the blocking queue model implemented by the threading.Queue or multiprocessing.Queue\
    \ classes.\n\nBoth these Queue classes are Thread and Process safe. That is they\
    \ work appropriately (using internal locks) to manage data access from concurrent\
    \ Threads or Processes.\n\nAn example of using a Queue to exchange data between\
    \ a worker process and the main process is shown below.\n\nThe worker process\
    \ executes the worker() function sleeping, for 2 s before putting a string ‘Hello\
    \ World’ on the queue. The main application function sets up the queue and creates\
    \ the process. The queue is passed into the process as one of its arguments. The\
    \ process is then started. The main process then waits until data is available\
    \ on the queue via the (blocking) get() methods. Once the data is available it\
    \ is retrieved and printed out before the main process terminates.\n\n```python\n\
    from multiprocessing import Process, Queue\nfrom time import sleep\n\ndef worker(queue):\n\
    \    print('Worker - going to sleep')\n    sleep(2)\n    print('Worker - woken\
    \ up and putting data on queue')\n    queue.put('Hello World')\n\ndef main():\n\
    \    print('Main - Starting')\n    queue = Queue()\n    p = Process(target=worker,\
    \ args=[queue])\n    print('Main - Starting the process')\n    p.start()\n   \
    \ print('Main - waiting for data')\n    print(queue.get())\n    print('Main -\
    \ Done')\n\nif __name__ == '__main__':\n    main()\n```\n\nThe output from this\
    \ is shown below:\n\n```\nMain - Starting\nMain - Starting the process\nMain -\
    \ waiting for data\nWorker - going to sleep\nWorker - woken up and putting data\
    \ on queue\nHello World\nMain - Done\n```\n\nHowever, this does not make it that\
    \ clear how the execution of the two processes interweaves. The following diagram\
    \ illustrates this graphically:\n\n![](img/8a661fca3884547aede940b9a6567321_601_0.png)\n\
    \nIn the above diagram the main process waits for a result to be returned from\
    \ the queue following the call to the get() method; as it is waiting it is not\
    \ using any system resources. In turn the worker process sleeps for two seconds\
    \ before putting some data onto the queue (via put(‘Hello World’)). After this\
    \ value is sent to the Queue the value is returned to the main process which is\
    \ woken up (moved out of the waiting state) and can continue to process the rest\
    \ of the main function.\n\n## Futures\n\n### Introduction\n\nA future is a thread\
    \ (or process) that promises to return a value in the future; once the associated\
    \ behavior has completed. It is thus a future value. It provides a very simple\
    \ way of firing off behavior that will either be time consuming to execute or\
    \ which may be delayed due to expensive operations such as Input/Output and which\
    \ could slow down the execution of other elements of a program. This chapter discusses\
    \ futures in Python.\n\n### The Need for a Future\n\nIn a normal method or function\
    \ invocation, the method or function is executed in line with the invoking code\
    \ (the caller) having to wait until the function or method (the caller) returns.\
    \ Only after this is the caller able to continue to the next line of code and\
    \ execute that. In many (most) situations this is exactly what you want as the\
    \ next line of code may depend on a result returned from the previous line of\
    \ code etc.\n\nHowever, in some situations the next line of code is independent\
    \ of the previous line of code. For example, let us assume that we are populating\
    \ a User Interface (UI). The first line of code may read the name of the user\
    \ from some external data source (such as a database) and then display it within\
    \ a field in the UI. The next line of code may then add today’s data to another\
    \ field in the UI. These two lines of code are independent of each other and could\
    \ be run concurrently/in parallel with each other.\n\nIn this situation we could\
    \ use either a Thread or a Process to run the two lines of code independently\
    \ of the caller, thus achieving a level of concurrency and allowing the caller\
    \ to carry onto the third line of code etc. However, neither the Thread or the\
    \ Process by default provide a simple mechanism for obtaining a result from such\
    \ an independent operation. This may not be a problem as operations may be self-contained;\
    \ for example they may obtain data from the database or from today’s date and\
    \ then updated a UI. However, in many situations the calculation will return a\
    \ result which needs to be handled by the original invoking code (the caller).\
    \ This could involve performing a long running calculation and then using the\
    \ result returned to generate another value or update another object etc.\n\n\
    A Future is an abstraction that simplifies the definition and execution of such\
    \ concurrent tasks. Futures are available in many different languages including\
    \ Python but also Java, Scala, C++ etc. When using a Future; a callable object\
    \ (such as a function) is passed to the Future which executes the behavior either\
    \ as a separate Thread or as a separate Process and then can return a result once\
    \ it is generated. The result can either be handled by a call back function (that\
    \ is invoked when the result is available) or by using a operation that will wait\
    \ for a result to be provided.\n\n### Futures in Python\n\nThe concurrent.futures\
    \ library was introduced into Python in version 3.2 (and is also available in\
    \ Python2.5 onwards). The concurrent.futures library provides the Future class\
    \ and a high level API for working with Futures. The concurrent.futures.Future\
    \ class encapsulates the asynchronous execution of a callable object (e.g. a function\
    \ or method). The Future class provides a range of methods that can be used to\
    \ obtain information about the state of the future, retrieve results or cancel\
    \ the future:\n\n- cancel() Attempt to cancel the Future. If the Future is currently\
    \ being executed and cannot be canceled then the method will return False, otherwise\
    \ the call will be canceled and the method will return True.\n- canceled() Returns\
    \ True if the Future was successfully canceled."
