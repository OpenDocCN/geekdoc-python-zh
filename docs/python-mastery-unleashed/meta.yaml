    +   - [https://github.com/PyMySQL/PyMySQL](https://github.com/PyMySQL/PyMySQL)
    GitHub repository for the PyMySQL library.


    Try


    In this exercise you will create a database and tables based on a set of transactions
    stored in a current account. You can use the account class you created in the
    CSV and Excel chapter for this.


    You will need two tables, one for the account information and one for the transaction
    history. The primary key of the account information table can be used as the foreign
    key for the transaction history table. Then write a function that takes an Account
    object and populates the tables with the appropriate data.


    To create the account information table you might use the following DDL:


    ```

    CREATE TABLE acc_info (idacc_info INT NOT NULL, name VARCHAR(255) NOT NULL, PRIMARY
    KEY (idacc_info))

    ```


    While for the transactions table you might use:


    ```

    CREATE TABLE transactions (idtransactions INT NOT NULL, type VARCHAR(45) NOT NULL,
    amount VARCHAR(45) NOT NULL, account INT NOT NULL, PRIMARY KEY (idtransactions))

    ```'
- md: '## Introduction to Logging


    ## Introduction


    Many programming languages have common logging libraries including Java and C#
    and of course Python also has a logging module. Indeed the Python logging module
    has been part of the built in modules since Python 2.3.


    This chapter discusses why you should add logging to your programs, what you should
    (and should not) log and why just using the print() function is not sufficient.


    ## Why Log?


    Logging is typically a key aspect of any production application; this is because
    it is important to provide appropriate information to allow future investigation
    following some event or issue in such applications. These investigations include:


    - Diagnosing failures; that is why did an application fail/crash.

    - Identifying unusual or unexpected behavior; which might not cause the application
    to fail but which may leave it in an unexpected state or where data may be corrupted
    etc.

    - Identifying performance or capacity issues; in such situations the application
    is performing as expected by it is not meeting some non-functional requirements
    associated with the speed at which it is operating or its ability to scale as
    the amount of data or the number of users grows.

    - Dealing with attempted malicious behavior in which some outside agent is attempting
    to affect the behavior of the system or to acquire information which they should
    not have access to etc. This could happen for example, if you are creating a Python
    web application and a user tries to hack into your web server.

    - Regulatory or legal compliance. In some cases records of program execution may
    be required for regulatory or legal reasons. This is particularly true of the
    financial sector where records must be kept for many years in case there is a
    need to investigate the organizations’ or individuals’ behavior.


    ## What Is the Purpose of Logging?


    In general there are therefore two general reason to log what an application is
    doing during it operation:


    - For diagnostic purposes so that recorded events/steps can be used to analyze
    the behavior of the system when something goes wrong.

    - Auditing purposes that allow for later analysis of the behavior of the system
    for business, legal or regulatory purposes. For example, in this case to determine
    who did what with what and when.


    Without such logged information it is impossible after the event to know what
    happened. For example, if all you know is that an application crashed (unexpectedly
    stopped executing) how can you determine what state the application was in, what
    functions, methods etc. were being executed and which statements run?


    Remember that although a developer may have been using an IDE to run their applications
    during development and may possibly been using the debugging facilities available
    that allow you to see what functions or methods, statements and even variable
    values are place; this is not how most production systems are run. In general
    a production Python system will be run either from a command line or possibly
    through a short cut (on a Windows box) to simplify running the program. All the
    user will know is that something failed or that the behavior they expected didn’t
    occur—if in fact they are aware of any issue at all!


    Logs are therefore key to after the event analysis of failures, unexpected behavior
    or for analysis of the operation of the system for business reasons.


    ## What Should You Log?


    One question that you might be considering at this point is ‘what information
    should I log?’. An application should log enough information so that post event
    investigators can understand what was happening, when and where. In general this
    means that you will want to log the time of the log message, the module/filename,
    function name or method name executing, potentially the log level being used (see
    later) and in some cases the parameter values/state of the environment, program
    or class involved.


    In many cases developers log the entry (and to a lesser extent) the exit from
    a function or method. However, it may also be useful to log what happens at branch
    points within a function or method so that the logic of the application can be
    followed.


    All applications should log all errors/exceptions. Although care is needed to
    ensure that this is done appropriately. For example if an exception is caught
    and then re thrown several times it is not necessary to log it every time it is
    caught. Indeed doing this can make the log files much larger, cause confusion
    when the problem is being investigated and result in unnecessary overheads. One
    common approach is to log an exception where it is first raised and caught and
    not to log it after that.


    ## What Not to Log


    The follow on question to consider is ‘what information should I not log?’. One
    general area not to log is any personal or sensitive information including any
    information that can be used to identify an individual. This sort of information
    is known as PII or Personally Identification Information.


    Such information includes


    - user ids and passwords,

    - email addresses,

    - data of birth, birth place,

    - personally identifiable financial information such as bank account details,
    credit card details etc.,

    - bio metric information,

    - medical/health information,

    - government issued personal information such as passport details, drivers license
    number, social security numbers, National Insurance numbers etc.,

    - official organizational information such as professional registrations and membership
    numbers,

    - physical addresses, phone (land-line) numbers, mobile phone numbers,

    - verification related information such as mother’s maiden name, pets’ names,
    high school, first school, favorite film, etc.,

    - it also increasing includes online information relating to social media such
    as **Facebook or LinkedIn accounts.**


    All of the above is sensitive information and much of it can be used to identify
    an individual; none of this information should be logged directly.


    That does not mean that you cannot and shouldn’t log that a user logged in; you
    may well need to do that. However, the information should at least be obfuscated
    and should not include any information not required. For example you may record
    that a user represented by some id attempted to log in at a specific time and
    whether they were successful or not. However, you should not log their password
    and may not log the actual user id instead you may log an id that can be used
    to map to their actual user id.


    You should also be careful about directly logging data input to an application
    directly into a log file. One way in which a malicious agent can attack an application
    (particularly a web application) is by attempting to send very large amounts of
    data to it (as part of a field or as a parameter to an operation). If the application
    blindly logs all data submitted to it, then the log files can fill up very quickly.
    This can result in the file store being used by the application filling up and
    causing potential problems for all software using the same file store. This form
    of attack is known as a log (or log file) injection attack and is well documented
    (see [https://www.owasp.org/index.php/Log_Injection](https://www.owasp.org/index.php/Log_Injection)
    which is part of the well respected Open Web Application Security Project).


    Another point to note is that it is not merely enough to log an error. This is
    not error handling; logging an error does not mean you have handled it; only that
    you have noted it. An application should still decide how it should manage the
    error or exception.


    In general you should also aim for empty logs in a production system; that is
    only information that needs to be logged in a production system should be logged
    (often information about errors, exceptions or other unexpected behavior). However,
    during testing much more detail is required so that the execution of the system
    should be followed. It should therefore be possible to select how much information
    is logged depending on the environment the code is running in (that is within
    a test environment or within a production environment).'
  mdcn: '## 日志简介


    ## 引言


    许多编程语言都有通用的日志库，包括 Java 和 C#，当然 Python 也有一个日志模块。事实上，Python 的日志模块自 Python 2.3 起就一直是内置模块的一部分。


    本章将讨论为什么你应该在程序中添加日志，你应该（以及不应该）记录什么，以及为什么仅仅使用 `print()` 函数是不够的。


    ## 为什么要记录日志？


    日志通常是任何生产应用程序的关键方面；这是因为提供适当的信息非常重要，以便在应用程序发生某些事件或问题后进行后续调查。这些调查包括：


    -   诊断故障；即应用程序为何失败/崩溃。

    -   识别异常或意外行为；这些行为可能不会导致应用程序失败，但可能使其处于意外状态，或者数据可能被损坏等。

    -   识别性能或容量问题；在这种情况下，应用程序按预期运行，但未满足与其运行速度或随着数据量或用户数量增长而扩展能力相关的某些非功能性需求。

    -   处理试图进行的恶意行为，即某些外部代理试图影响系统的行为或获取其不应访问的信息等。例如，如果你正在创建一个 Python Web 应用程序，而用户试图入侵你的
    Web 服务器，就可能发生这种情况。

    -   监管或法律合规性。在某些情况下，出于监管或法律原因，可能需要保留程序执行记录。这在金融行业尤其如此，因为必须保留多年的记录，以防需要调查组织或个人的行为。


    ## 记录日志的目的是什么？


    因此，通常有两个普遍原因来记录应用程序在运行期间所做的事情：


    -   用于诊断目的，以便在出现问题时，记录的事件/步骤可用于分析系统的行为。

    -   用于审计目的，以便后续出于业务、法律或监管目的分析系统的行为。例如，在这种情况下，确定谁在何时对什么做了什么。


    如果没有此类记录的信息，事后就不可能知道发生了什么。例如，如果你只知道应用程序崩溃了（意外停止执行），你如何确定应用程序当时处于什么状态，正在执行哪些函数、方法等，以及运行了哪些语句？


    请记住，尽管开发人员在开发期间可能使用 IDE 运行他们的应用程序，并且可能使用可用的调试设施来查看正在执行哪些函数或方法、语句甚至变量值；但这并不是大多数生产系统的运行方式。通常，生产
    Python 系统将从命令行运行，或者可能通过快捷方式（在 Windows 机器上）来简化程序的运行。用户所知道的只是某些东西失败了，或者他们期望的行为没有发生——如果他们确实意识到了任何问题的话！


    因此，日志是事后分析故障、意外行为或出于业务原因分析系统运行的关键。


    ## 你应该记录什么？


    此时你可能正在考虑的一个问题是“我应该记录什么信息？”。应用程序应记录足够的信息，以便事后调查人员能够了解发生了什么、何时以及何地。通常，这意味着你需要记录日志消息的时间、模块/文件名、正在执行的函数名或方法名、可能使用的日志级别（稍后介绍），以及在某些情况下涉及的参数值/环境、程序或类的状态。


    在许多情况下，开发人员记录函数或方法的入口（在较小程度上也记录出口）。然而，记录函数或方法内分支点发生的情况也可能很有用，以便可以跟踪应用程序的逻辑。


    所有应用程序都应记录所有错误/异常。尽管需要注意确保以适当的方式进行。例如，如果一个异常被捕获然后重新抛出多次，则无需在每次捕获时都记录它。实际上，这样做会使日志文件变得更大，在调查问题时造成混淆，并导致不必要的开销。一种常见的方法是在异常首次引发和捕获时记录它，之后不再记录。


    ## 不应该记录什么


    接下来要考虑的问题是“我不应该记录什么信息？”。一个普遍不应记录的领域是任何个人或敏感信息，包括任何可用于识别个人的信息。这类信息被称为 PII 或个人身份信息。


    此类信息包括：


    -   用户 ID 和密码，

    -   电子邮件地址，

    -   出生日期、出生地，

    -   可识别个人的财务信息，如银行账户详情、信用卡详情等，

    -   生物识别信息，

    -   医疗/健康信息，

    -   政府颁发的个人信息，如护照详情、驾照号码、社会安全号码、国民保险号码等，

    -   官方组织信息，如专业注册和会员号码，

    -   实际地址、电话（固定电话）号码、手机号码，

    -   验证相关信息，如母亲的婚前姓名、宠物名字、高中、小学、最喜欢的电影等，

    -   它也越来越多地包括与社交媒体相关的在线信息，例如 **Facebook 或 LinkedIn 账户。**


    以上所有都是敏感信息，其中大部分可用于识别个人；这些信息都不应直接记录。


    这并不意味着你不能也不应该记录用户登录的事实；你很可能需要这样做。但是，信息应至少经过混淆处理，并且不应包含任何不需要的信息。例如，你可以记录由某个 ID
    代表的用户在特定时间尝试登录以及他们是否成功。但是，你不应记录他们的密码，也不应记录实际的用户 ID，而是可以记录一个可用于映射到其实际用户 ID 的 ID。


    你还应该小心直接将输入到应用程序的数据记录到日志文件中。恶意代理攻击应用程序（特别是 Web 应用程序）的一种方式是尝试向其发送大量数据（作为字段的一部分或作为操作的参数）。如果应用程序盲目地记录所有提交给它的数据，那么日志文件可能会很快填满。这可能导致应用程序使用的文件存储被填满，并给使用相同文件存储的所有软件带来潜在问题。这种攻击形式被称为日志（或日志文件）注入攻击，并且有充分的文档记录（参见
    [https://www.owasp.org/index.php/Log_Injection](https://www.owasp.org/index.php/Log_Injection)，这是备受尊敬的开放式
    Web 应用程序安全项目的一部分）。


    另一点需要注意的是，仅仅记录一个错误是不够的。这不是错误处理；记录错误并不意味着你已经处理了它；只是意味着你已经注意到了它。应用程序仍然应该决定如何管理错误或异常。


    通常，你还应该力求在生产系统中保持日志为空；即只记录生产系统中需要记录的信息（通常是关于错误、异常或其他意外行为的信息）。然而，在测试期间需要更多的细节，以便可以跟踪系统的执行。因此，应该能够根据代码运行的环境（即在测试环境中或在生产环境中）选择记录多少信息。'
