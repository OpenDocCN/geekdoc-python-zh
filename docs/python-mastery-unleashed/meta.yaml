    \ number of tasks a worker process can complete before it will exit and be replaced\
    \ with a fresh worker process, to enable unused resources to be freed. The default\
    \ max tasks per child is None, which means worker processes will live as long\
    \ as the pool.\n- context can be used to specify the context used for starting\
    \ the worker processes. Usually a pool is created using the function multiprocessing.\
