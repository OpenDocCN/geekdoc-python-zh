- md: "## Python Turtle Graphics\n\n## Introduction\n\nPython is very well supported\
    \ in terms of graphics libraries. One of the most widely used graphics libraries\
    \ is the Turtle Graphics library introduced in this chapter. This is partly because\
    \ it is straightforward to use and partly because it is provided by default with\
    \ the Python environment (and this you do not need to install any additional libraries\
    \ to use it).\n\nThe chapter concludes by briefly considering a number of other\
    \ graphic libraries including PyOpenGL. The PyOpenGL library can be used to create\
    \ sophisticated 3D scenes.\n\n## The Turtle Graphics Library\n\n## The Turtle\
    \ Module\n\nThis provides a library of features that allow what are known as vector\
    \ graphics to be created. Vector graphics refers to the lines (or vectors) that\
    \ can be drawn on the screen. The drawing area is often referred to as a drawing\
    \ plane or drawing board and has the idea of x, y coordinates.\n\nThe Turtle Graphics\
    \ library is intended just as a basic drawing tool; other libraries can be used\
    \ for drawing two and three dimensional graphs (such as MatPlotLib) but those\
    \ tend to focus on specific types of graphical displays.\n\nThe idea behind the\
    \ Turtle module (and its name) derives from the Logo programming language from\
    \ the 60s and 70s that was designed to introduce programming to children. It had\
    \ an on screen turtle that could be controlled by commands such as forward (which\
    \ would move the turtle forward), right (which would turn the turtle by a certain\
    \ number of degrees), left (which turns the turtle left by a certain number of\
    \ degrees) etc. This idea has continued into the current Python Turtle Graphics\
    \ library where commands such as turtle.forward(10) moves the turtle (or cursor\
    \ as it is now) forward 10 pixels etc. By combining together these apparently\
    \ simple commands, it is possible to create intricate and quite complex shapes.\n\
    \n## Basic Turtle Graphics\n\nAlthough the turtle module is built into Python\
    \ 3 it is necessary to import the module before you use it:\n\n```python\nimport\
    \ turtle\n```\n\nThere are in fact two ways of working with the turtle module;\
    \ one is to use the classes available with the library and the other is to use\
    \ a simpler set of functions that hide the classes and objects. In this chapter\
    \ we will focus on the set of functions you can use to create drawings with the\
    \ Turtle Graphics library.\n\nThe first thing we will do is to set up the window\
    \ we will use for our drawings; the TurtleScreen class is the parent of all screen\
    \ implementations used for whatever operating system you are running on.\n\nIf\
    \ you are using the functions provided by the turtle module, then the screen object\
    \ is initialized as appropriate for your operating system. This means that you\
    \ can just focus on the following functions to configure the layout/display such\
    \ as this screen can have a title, a size, a starting location etc.\n\nThe key\
    \ functions are:\n\n- setup(width, height, startx, starty) Sets the size and position\
    \ of the main window/screen. The parameters are:\n  - width—if an integer, a size\
    \ in pixels, if a float, a fraction of the screen; default is 50% of screen.\n\
    \  - height—if an integer, the height in pixels, if a float, a fraction of the\
    \ screen; default is 75% of screen.\n  - startx—if positive, starting position\
    \ in pixels from the left edge of the screen, if negative from the right edge,\
    \ if None, center window horizontally.\n  - starty—if positive, starting position\
    \ in pixels from the top edge of the screen, if negative from the bottom edge,\
    \ if None, center window vertically.\n- title(title string) sets the title of\
    \ the screen/window.\n- exitonclick() shuts down the turtle graphics screen/window\
    \ when the user clicks on the screen.\n- bye() shuts down the turtle graphics\
    \ screen/window.\n- done() starts the main event loop; this must be the last statement\
    \ in a turtle graphics program.\n- speed(speed) the drawing speed to use, the\
    \ default is 3. The higher the value the faster the drawing takes place, values\
    \ in the range 0–10 are accepted.\n- turtle.tracer(n = None) This can be used\
    \ to batch updates to the turtle graphics screen. It is very useful when a drawing\
    \ becomes large and complex. By setting the number (n) to a large number (say\
    \ 600) then 600 elements will be drawn in memory before the actual screen is updated\
    \ in one go; this can significantly speed up the generation of for example, a\
    \ fractal picture. When called without arguments, returns the currently stored\
    \ value of n.\n- turtle.update() Perform an update of the turtle screen; this\
    \ should be called at the end of a program when tracer() has been used as it will\
    \ ensure that all elements have been drawn even if the tracer threshold has not\
    \ yet been reached.\n- pencolor(color) used to set the color used to draw lines\
    \ on the screen; the color can be specified in numerous ways including using named\
    \ colors set as ‘red’, ‘blue’, ‘green’ or using the RGB color codes or by specifying\
    \ the color using hexadecimal numbers. For more information on the named colors\
    \ and RGB color codes to use see https://www.tcl.tk/man/tcl/TkCmd/colors.htm.\
    \ Note all color methods use American spellings for example this method is pencolor\
    \ (not pen colour).\n- fillcolor(color) used to set the color to use to fill in\
    \ closed areas within drawn lines. Again note the spelling of color!\n\nThe following\
    \ code snippet illustrates some of these functions:\n\n```python\nimport turtle\n\
    \n# set a title for your canvas window\nturtle.title('My Turtle Animation')\n\
    # set up the screen size (in pixels)\n# set the starting point of the turtle (0,\
    \ 0)\nturtle.setup(width=200, height=200, startx=0, starty=0)\n# sets the pen\
    \ color to red\nturtle.pencolor('red')\n\n# ...\n# Add this so that the window\
    \ will close when clicked on\nturtle.exitonclick()\n```\n\nWe can now look at\
    \ how to actually draw a shape onto the screen.\n\nThe cursor on the screen has\
    \ several properties; these include the current drawing color of the pen that\
    \ the cursor moves, but also its current position (in the x, y coordinates of\
    \ the screen) and the direction it is currently facing. We have already seen that\
    \ you can control one of these properties using the pencolor() method, other methods\
    \ are used to control the cursor (or turtle) and are presented below.\n\nThe direction\
    \ in which the cursor is pointing can be altered using several functions including:\n\
    \n- right(angle) Turn cursor right by angle units.\n- left(angle) Turn the cursor\
    \ left by angle units.\n- setheading(to_angle) Set the orientation of the cursor\
    \ to to_angle.\n\nWhere 0 is east, 90 is north, 180 is west and 270 is south.\
    \ You can move the cursor (and if the pen is down this will draw a line) using:\n\
    \n- forward(distance) move the cursor forward by the specified distance in the\
    \ direction that the cursor is currently pointing. If the pen is down then draw\
    \ a line.\n- backward(distance) move the cursor backward by distance in the opposite\
    \ direction that in which the cursor is pointing.\n\nAnd you can also explicitly\
    \ position the cursor:\n\n- goto(x, y) move the cursor to the x, y location on\
    \ the screen specified; if the pen is down draw a line. You can also use steps\
    \ and set position to do the same thing.\n- setx(x) sets the cursor’s x coordinate,\
    \ leaves the y coordinate unchanged.\n- sety(y) sets the cursor’s y coordinate,\
    \ leaves the x coordinate unchanged.\n\nIt is also possible to move the cursor\
    \ without drawing by modifying whether the pen is up or down:\n\n- penup() move\
    \ the pen up—moving the cursor will no longer draw a line.\n- pendown() move the\
    \ pen down—moving the cursor will now draw a line in the current pen color.\n\n\
    The size of the pen can also be controlled:\n\n- pensize(width) set the line thickness\
    \ to width. The method width() is an alias for this method.\n\nIt is also possible\
    \ to draw a circle or a dot:\n\n- circle(radius, extent, steps) draws a circle\
    \ using the given radius. The extent determines how much of the circle is drawn;\
    \ if the extent is not given then the whole circle is drawn. Steps indicates the\
