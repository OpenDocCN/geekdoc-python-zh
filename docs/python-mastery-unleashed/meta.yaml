    \ the Lock object is unlocked, then acquire() changes the state to locked and\
    \ returns immediately.\n- When the state is locked, acquire() blocks until a call\
    \ to release() in another thread changes it to unlocked, then the acquire() call\
    \ resets it to locked and returns.\n- The release() method should only be called\
    \ in the locked state; it changes the state to unlocked and returns immediately.\
    \ If an attempt is made to release an unlocked lock, a Runtime Error will be raised.\n\
    \nAn example of using a Lock object is shown below:\n\n```python\nfrom threading\
    \ import Thread, Lock\n\nclass SharedData(object):\n    def __init__(self):\n\
    \        self.value = 0\n        self.lock = Lock()\n\n    def read_value(self):\n\
    \        try:\n            print('read_value Acquiring Lock')\n            self.lock.acquire()\n\
    \            return self.value\n        finally:\n            print('read_value\
    \ releasing Lock')\n            self.lock.release()\n\n    def change_value(self):\n\
    \        print('change_value acquiring lock')\n        with self.lock:\n     \
    \       self.value = self.value + 1\n            print('change_value lock released')\n\
