  md: '# Transactions in Databases


    Another important concept within a database is that of a Transaction. A Transaction
    represents a unit of work performed within a database management system (or similar
    system) against a database instance,and is independent of any other transaction.


    Transactions in a database environment have two main purposes


    +   - To provide a unit of work that allows recovery from failures and keeps a
    database consistent even in cases of system failure, when execution stops (completely
    or partially). This is because either all the operations within a transaction
    are performed or none of them are. Thus, if one operation causes an error then
    all the changes being made by the transaction thus far are rolled back and none
    of them will have been made.

    - To provide isolation between programs accessing a database concurrently. This
    means that the work being done by one program will not interact with another programs
    work.


    A database transaction, by definition, must be atomic, consistent, isolated and
    durable:'
  merge: -1
  pgno: 436
- img_proc: true
  md: '+   - Atomic This indicates that a transaction represents an atomic unit of
    work; that is either all the operations in the transaction are performed or none
    of them are performed.

    - Consistent Once completed the transaction must leave the data in a consistent
    state with any data constraints met (such as a row in one table must not reference
    an non-existent row in another table in a one to many relationship etc.).

    - Isolated This relates to the changes being made by concurrent transactions;
    these changes must be isolated from each other. That is, one transaction cannot
    see the changes being made by another transaction until the second transaction
    completes and all changes are permanently saved into the database.

    - Durable This means that once a transaction completes then the changes it has
    made are permanently stored into the database (until some future transaction modifies
    that data).


    Database practitioners often refer to these properties of database transactions
    using the acronym ACID (for Atomic, Consistent, Isolated,Durable).


    Not all databases support transactions although all commercial, production quality
    databases such as Oracle,'
  merge: -1
  pgno: 437
