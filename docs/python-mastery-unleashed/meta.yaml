- md: "A special sequence is a combination of a '\\' (backslash) followed by a character\
    \ combination which then has a special meaning. The following table lists the\
    \ common special sequences used in Regular Expressions:\n\n| Sequence | Description\
    \ | Example |\n| :--- | :--- | :--- |\n| \\A | Returns a match if the following\
    \ characters are at the beginning of the string | \"\\AThe\" must start with 'The'\
    \ |\n| \\b | Returns a match where the specified characters are at the beginning\
    \ or at the end of a word | \"\\bon\" or \"on\\b\" indicates a string must start\
    \ or end with 'on' |\n| \\B | Indicates that the following characters must be\
    \ present in a string but not at the start (or at the end) of a word | r\"\\Bon\"\
    \ or r\"on\\B\" must not start or end with 'on' |\n| \\d | Returns a match where\
    \ the string contains digits (numbers from 0-9) | \"\\d\" |\n| \\D | Returns a\
    \ match where the string DOES NOT contain digits | \"\\D\" |\n| \\s | Returns\
    \ a match where the string contains a white space character | \"\\s\" |\n| \\\
    S | Returns a match where the string DOES NOT contain a white space character\
    \ | \"\\S\" |\n| \\w | Returns a match where the string contains any word characters\
    \ (characters from a to Z, digits from 0-9, and the underscore _ character) |\
    \ \"\\w\" |\n| \\W | Returns a match where the string DOES NOT contain any word\
    \ characters | \"\\W\" |\n| \\Z | Returns a match if the following characters\
    \ are present at the end of the string | \"Hunt\\Z\" |\n\n## Sets\n\nA set is\
    \ a sequence of characters inside a pair of square brackets which have specific\
    \ meanings. The following table provides some examples.\n\n| Set | Description\
    \ |\n| :--- | :--- |\n| [jeh] | Returns a match where one of the specified characters\
    \ (j, e or h) are present |\n| [a-x] | Returns a match for any lower-case character,\
    \ alphabetically between a and x |\n| [^zxc] | Returns a match for any character\
    \ EXCEPT z, x and c |\n| [0123] | Returns a match where any of the specified digits\
    \ (0, 1, 2, or 3) are present |\n| [0-9] | Returns a match for any digit between\
    \ 0 and 9 |\n| [0-9][0-9] | Returns a match for any two-digit numbers from 00\
    \ and 99 |\n| [a-zA-Z] | Returns a match for any character alphabetically between\
    \ a and z or A and Z |\n\n## The Python re Module\n\nThe Python re module is the\
    \ built-in module provided by Python for working with regular Expressions.\n\n\
    You might also like to examine the third party regex module (see [https://pypi.org/project/regex](https://pypi.org/project/regex))\
    \ which is backwards compatible with the default re module but provides additional\
    \ functionality.\n\n## Working with Python Regular Expressions\n\n### Using Raw\
    \ Strings\n\nAn important point to note about many of the strings used to define\
    \ the regular expression patterns is that they are preceded by an ‘r’ for example\
    \ r’/bin/sh$‘.\n\nThe ‘r’ before the string indicates that the string should be\
    \ treated as a raw string.\n\nA raw string is a Python string in which all characters\
    \ are treated as exactly that; individual characters. It means that backslash\
    \ (‘\\’) is treated as a literal character rather than as a special character\
    \ that is used to escape the next character.\n\nFor example, in a standard string\
    \ ‘\\n’ is treated as a special character representing a newline, thus if we wrote\
    \ the following:\n\n```\ns = 'Hello \\n world'\nprint(s)\n```\n\nWe will get as\
    \ output:\n\n```\nHello\nWorld\n```\n\nHowever, if we prefix the string with an\
    \ ‘r’ then we are telling Python to treat it as a raw string. For example:\n\n\
    ```\ns = r'Hello \\n world'\nprint(s)\n```\n\nThe output is now\n\n```\nHello\
    \ \\n world\n```\n\nThis is important for regular expression as characters such\
    \ as backslash('\\') are used within patterns to have a special regular expression\
    \ meaning and thus we do not want Python to process them in the normal way.\n\n\
    ### Simple Example\n\nThe following simple Python program illustrates the basic\
    \ use of the re module. It is necessary to import the re module before you can\
    \ use it.\n\n```\nimport re\ntext1 = 'john williams'\npattern = '[Jj]ohn'\nprint('looking\
    \ in', text1, 'for the pattern', pattern)\nif re.search(pattern, text1):\n   \
    \ print('Match has been found')\n```\n\nWhen this program is run, we get the following\
    \ output:\n\n```\nlooking in john williams for the pattern [Jj]ohn\nMatch has\
    \ been found\n```\n\nIf we look at the code, we can see that the string that we\
    \ are examining contains 'john williams' and that the pattern used with this string\
    \ indicates that we are looking for a sequence of 'J' or 'j' followed by 'ohn'.\
    \ To perform this test we use the re.search() function passing the regex pattern,\
    \ and the text to test, as parameters. This function returns either None (which\
    \ is taken as meaning False by the If statement) or a Match Object (which always\
    \ has a Boolean value of True). As of course ‘john’ at the start of text1 does\
    \ match the pattern, the re.search() function returns a match object and we see\
    \ the ‘Match has been found’ message is printed out.\n\nBoth the Match object\
    \ and search() method will be described in more detail below; however, this short\
    \ program illustrates the basic operation of a Regular Expression.\n\n## The Match\
    \ Object\n\nMatch objects are returned by the search() and match() functions.\
    \ They always have a boolean value of True. The functions match() and search()\
    \ return None when there is no match and a Match object when a match is found.\
    \ It is therefore possible to use a match object with an if statement:\n\n```\n\
    import re\nmatch = re.search(pattern, string)\nif match:\n    process(match)\n\
    ```\n\nMatch objects support a range of methods and attributes including:\n\n\
    - match.re The regular expression object whose match() or search() method produced\
    \ this match instance.\n- match.string The string passed to match() or search().\n\
    - match.start([group])/ match.end([group]) Return the indices of the start and\
    \ end of the sub string matched by group.\n- match.group() returns the part of\
    \ the string where there was a match.\n\n## The search() Function\n\nThe search()\
    \ function searches the string for a match, and returns a Match object if there\
    \ is a match. The signature of the function is:\n\n```\nre.search(pattern, string,\
    \ flags=0)\n```\n\nThe meaning of the parameters are:\n\n- pattern this is the\
    \ regular expression pattern to be used in the matching process.\n- string this\
    \ is the string to be searched.\n- flags these (optional) flags can be used to\
    \ modify the operation of the search.\n\nThe re module defines a set of flags\
    \ (or indicators) that can be used to indicate any optional behaviors associated\
    \ with the pattern. These flags include:\n\n| Flag | Description |\n| --- | ---\
    \ |\n| re.IGNORECASE | Performs case-insensitive matching |\n| re.LOCALE | Interprets\
    \ words according to the current locale. This interpretation affects the alphabetic\
    \ group (\\w and \\W), as well as word boundary behavior(\\b and \\B) |\n| re.MULTILINE\
    \ | Makes $ match the end of a line (not just the end of the string) and makes\
    \ ^ match the start of any line (not just the start of the string) |\n| re.DOTALL\
    \ | Makes a period (dot) match any character, including a newline |\n| re.UNICODE\
    \ | Interprets letters according to the Unicode character set. This flag affects\
    \ the behavior of \\w, \\W, \\b, \\B |\n| re.VERBOSE | Ignores whitespace within\
    \ the pattern (except inside a set [] or when escaped by a backslash) and treats\
    \ unescaped # as a comment marker |\n\nIf there is more than one match, only the\
    \ first occurrence of the match will be returned:\n\n```\nimport re\nline1 = 'The\
    \ price is 23.55'\ncontainsIntegers = r'\\d+'\nif re.search(containsIntegers,\
    \ line1):\n    print('Line 1 contains an integer')\nelse:\n    print('Line 1 does\
    \ not contain an integer')\n```\n\nIn this case the output is\n\n```\nLine 1 contains\
    \ an integer\n```\n\nAnother example of using the search() function is given below.\
    \ In this case the pattern to look for defines three alternative strings (that\
    \ is the string must contain either Beatles, Adele or Gorillaz):\n\n```\nimport\
    \ re\n# Alternative words\nmusic = r'Beatles|Adele|Gorillaz'\nrequest = 'Play\
    \ some Adele'\nif re.search(music, request):\n    print('Set Fire to the Rain')\n\
    else:\n    print('No Adele Available')\n```\n\nIn this case we generate the output:\n\
    \n```\nSet Fire to the Rain\n```\n\n## The match() Function\n\nThis function attempts\
    \ to match a regular expression pattern at the beginning of a string. The signature\
    \ of this function is given below:\n\n```\nre.match(pattern, string, flags=0)\n\
    ```\n\n- pattern this is the regular expression to be matched.\n- string this\
    \ is the string to be searched.\n- flags modifier flags that can be used.\n\n\
    The re.match() function returns a Match object on success, None on failure.\n\n\
    ## The Difference Between Matching and Searching"
