    # File Attributes


    A file will have a set of attributes associated with it such as the date that
    it was created, the date it was last updated/modified, how large the file is etc.
    It will also typically have an attribute indicating who the owner of the file
    is. This may be the creator of the file; however the ownership of a file can be
    changed either from the command line or through the GUI interface. For example,
    on Linux and Mac OS X the command chown can be used to change the file ownership.'
  - '[PAGE 327]


    It can also have other attributes which indicate who can read, write or execute
    the file. In Unix style systems (such as Linux and Mac OS X) these access rights
    can be specified for the file owner, for the group that the file is associated
    with and for all other users.


    The file owner can have rights specified for reading, writing and executing a
    file. These are usually represented by the symbols ‘r’, ‘w’ and ‘x’ respectively.
    For example the following uses the symbolic notation associated with Unix files
    and indicates that the file owner is allowed to read, write and execute a file:


    ```

    -rwx------

    ```


    Here the first dash is left blank as it is to do with special files (or directories),
    then the next set of three characters represent the permissions for the owner,
    the following set of three the permissions for all other users. As this example
    has *rwx* in


    the first group of three characters this indicates that the user can read ‘r’,
    write ‘w’ and execute ‘x’ the file. However the next six characters are all dashes
    indicating that the group and all other users cannot access the file at all. The
    group that a file belongs to is a group that can have any number of users'
  - '[PAGE 328]


    as members. A member of the group will have the access rights as indicated by
    the group settings on the file. As for the owner of a file these can be to read,
    write or execute the file. For example, if group members are allowed to read and
    execute a file, then this would be shown using the symbolic notation as:


    ```

    ---r-x---

    ```


    Now this example indicates that only members of the group can read and execute
    the file; note that group members cannot write the file (they therefore cannot
    modify the file).


    If a user is not the owner of a file, nor a member of the group that the file
    is part of, then their access rights are in the ‘everyone else’ category. Again
    this category can have read, write or execute permissions. For example, using
    the symbolic notation, if all users can read the file but are not able to do anything
    else, then this would be shown as:


    ```

    -----r--

    ```


    Of course a file can mix the above permissions together, so that an owner may
    be allowed to read, write and execute a file, the group may be able to read and
    execute the file but all other users can only read the file. This would be shown
    as:


    ```

    -rwx-xr--

    ```'
  - '[PAGE 329]


    In addition to the symbolic notation there is also a numeric notation that is
    used with Unix style systems. The numeric notation uses three digits to represent
    the permissions. Each of the three rightmost digits represents a different component
    of the permissions: owner, group, and others.


    Each of these digits is the sum of its component bits in the binary numeral system.
    As a result, specific bits add to the sum as it is represented by a numeral:


    +   - The read bit adds 4 to its total (in binary 100),

    - The write bit adds 2 to its total (in binary 010), and

    - The execute bit adds 1 to its total (in binary 001).

    - This the following symbolic notations can be represented by an equivalent numeric
    notation:


    | Symbolic notation | Numeric notation | Meaning |

    | :--- | :--- | :--- |

    | rwx------ | 0700 | Read, write, and execute only for owner |

    | -rwxrwx--- | 0770 | Read, write, and execute for owner and group |

    | -rwxrwxrwx | 0777 | Read, write, and execute for owner, group and others |


