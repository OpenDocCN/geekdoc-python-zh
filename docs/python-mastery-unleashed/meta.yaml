    # Figure sand Subplots


    A Matplotlib figure is the object that contains all the graphical elements displayed
    on a plot. That is the axes, the legend, the title as well as the line plot or
    bar chart itself. It thus represents the overall window or page and is the top,
    out graphical component.'
  - '[PAGE 103]


    In many cases the figure is implicit as the developer interacts with the pyplot
    API; however the figure can be accessed directly if required.


    Them atplotlib.pyplot.figure() function generates a figure object. This function
    returns a matplotlib.figure.Figure object. It is then possible to interact directly
    with the figure object. For example it is possible to add axes to the figure,
    to add sub plots to a graph etc.


    Working directly with the figure is necessary if you want to add multiple sub-
    plots to a figure. This can be useful if what is required is to be able to compare
    different views of the same data side by side. Each subplot has its own axes which
    can coexist within the figure.


    One or more subplots can be added to a figure using the figure.addsubplot() method.
    This method adds an Axes to the figure as one of a set of one or more subplots.
    A subplot can be added using a 3-digit integer(or three separate integers) describing
    the position of the subplot.The digits represent the number of rows, columns and
    the index of the sub plot within the resulting matrix.


    Thus 2, 2, 1 (and 221) all indicate that the subplot will take the 1st index within
    a two by two grid of plots. In turn 2, 2, 3 (223) indicates that the sub plot
    will be at index 3 which will be row'
