- md: "## The Global Interpreter Lock\n\nThe Global Interpreter Lock (or the GIL)\
    \ is a global lock within the underlying CPython interpreter that was designed\
    \ to avoid potential deadlocks between multiple tasks. It is designed to protect\
    \ access to Python objects by preventing multiple threads from executing at the\
    \ same time.\n\nFor the most part you do not need to worry about the GIL as it\
    \ is at a lower level than the programs you will be writing. However, it is worth\
    \ noting that the GIL is controversial because it prevents multi-threaded Python\
    \ programs from taking full advantage of multiprocessor systems in certain situations.\n\
    \nThis is because in order to execute a thread must obtain the GIL and only one\
    \ thread at a time can hold the GIL (that is the lock it represents). This means\
    \ that Python acts like a single CPU machine; only one thing can run at a time.\
    \ A Thread will only give up the GIL if it sleeps, has to wait for something (such\
    \ as some I/O) or it has held the GIL for a certain amount of time. If the maximum\
    \ time that a thread can hold the GIL has been met the scheduler will release\
    \ the GIL from that thread (resulting it stopping execution and now having to\
    \ wait until it has the GIL returned to it) and will select another thread to\
    \ gain the GIL and start to execute.\n\nIt is thus impossible for standard Python\
    \ threads to take advantage of the multiple CPUs typically available on modern\
    \ computer hardware. One solution to this is to use the Python multiprocessing\
    \ library described in the next chapter.\n\n## Multiprocessing\n\n### Introduction\n\
    \nThe multiprocessing library supports the generation of separate (operating system\
    \ level) processes to execute behavior (such as functions or methods) using an\
    \ API that is similar to the Threading API presented in the last chapter.\n\n\
    It can be used to avoid the limitation introduced by the Global Interpreter Lock\
    \ (the GIL) by using separate operating system processes rather than lightweight\
    \ threads (which run within a single process).\n\nThis means that the multiprocessing\
    \ library allows developers to fully exploit the multiple processor environment\
    \ of modern computer hardware which typically has multiple processor cores allowing\
    \ multiple operations/behaviors to run in parallel; this can be very significant\
    \ for data analytics, image processing, animation and games applications.\n\n\
    The multiprocessing library also introduces some new features, most notably the\
    \ Pool object for parallelising execution of a callable object (e.g. functions\
    \ and methods) that has no equivalent within the Threading API.\n\n### The Process\
    \ Class\n\nThe Process class is the multiprocessing library’s equivalent to the\
    \ Thread class in the threading library. It can be used to run a callable object\
    \ such as a function in a separate process. To do this it is necessary to create\
    \ a new instance of the Process class and then call the start() method on it.\
    \ Methods such as join() are also available so that one process can wait for another\
    \ process to complete before continuing etc.\n\nThe main difference is that when\
    \ a new Process is created it runs within a separate process on the underlying\
    \ operating systems (such as Windows, Linux or Mac OS). In contrast a Thread runs\
    \ within the same process as the original program. This means that the process\
    \ is managed and executed directly by the operating system on one of the processors\
    \ that are part of the underlying computer hardware.\n\nThe up side of this is\
    \ that you are able to exploit the underlying parallelism inherent in the physical\
    \ computer hardware. The downside is that a Process takes more work to set up\
    \ than the lighter weight Threads. The constructor for the Process class provides\
    \ the same set of arguments as the Thread class, namely:\n\n```python\nclass multiprocessing.Process(group=None,\n\
    \    target=None,\n    name=None,\n    args=(),\n    kwargs={}, daemon=None)\n\
    ```\n\n- group should always be None; it exists solely for compatibility with\
    \ the Threading API.\n- target is the callable object to be invoked by the run()\
    \ method. It defaults to None, meaning nothing is called.\n- name is the process\
    \ name.\n- args is the argument tuple for the target invocation.\n- kwargs is\
    \ a dictionary of keyword arguments for the target invocation.\n- daemon argument\
    \ sets the process daemon flag to True or False. If None (the default), this flag\
    \ will be inherited from the creating process.\n\nAs with the Thread class, the\
    \ Process constructor should always be called using keyword arguments.\n\nThe\
    \ Process class also provides a similar set of methods to the Thread class:\n\n\
    - start() Start the process’s activity. This must be called at most once per process\
    \ object. It arranges for the object’s run() method to be invoked in a separate\
    \ process.\n- join([timeout]) If the optional argument timeout is None (the default),\
    \ the method blocks until the joined process terminates. If timeout is positive\
    \ number, it blocks at most timeout seconds. Note that the method returns None\
    \ if its process terminates or if the method times out.\n- is_alive() Return whether\
    \ the process is alive. Roughly, a process object is alive from the moment the\
    \ start() method returns until the child process terminates.\n\nThe process class\
    \ also has several attributes:\n\n- name The process’s name. The name is a string\
    \ used for identification purposes only. It has no semantics. Multiple processes\
    \ may be given the same name. It can be useful for debugging purposes.\n- daemon\
    \ The process’s daemon flag, a boolean value. This must be set before start()\
    \ is called. The default value is inherited from the creating process. When a\
    \ process exits, it attempts to terminate all of its daemonic child processes.\
    \ Note that a daemonic process is not allowed to create child processes.\n- pid\
    \ Return the process ID. Before the process is spawned, this will be None.\n-\
    \ exit_code The process exit code. This will be None if the process has not yet\
    \ terminated. A negative value -N indicates that the child was terminated by signal\
    \ N.\n\nIn addition to these methods and attributes, the Process class also defines\
    \ additional process related methods including:\n\n- terminate() Terminate the\
    \ process.\n- kill() Same as terminate() except that on Unix the SIGKILL signal\
    \ is used instead of the SIGTERM signal.\n- close() Close the Process object,\
    \ releasing all resources associated with it. ValueError is raised if the underlying\
    \ process is still running. Once close() returns successfully, most of the other\
    \ methods and attributes of the Process object will raise a ValueError.\n\n###\
    \ Working with the Process Class\n\nThe following simple program creates three\
    \ Process objects; each runs the function worker(), with the string arguments\
    \ A, B and C respectively. These three process objects are then started using\
    \ the start() method.\n\n```python\nfrom multiprocessing import Process\nfrom\
    \ time import sleep\n\ndef worker(msg):\n    for i in range(0, 10):\n        print(msg,\
    \ end='', flush=True)\n        sleep(1)\n\nprint('Starting')\nt2 = Process(target=worker,\
    \ args='A')\nt3 = Process(target=worker, args='B')\nt4 = Process(target=worker,\
    \ args='C')\nt2.start()\nt3.start()\nt4.start()\nprint('Done')\n```\n\nIt is essentially\
    \ the same as the equivalent program for threads but with the Process class being\
    \ used instead of the Thread class.\n\nThe output from this application is given\
    \ below:\nStarting Done ABCABCABCABCABCABCABCACBACBACB\n\nThe main difference\
    \ between the Thread and Process versions is that the Process version runs the\
    \ worker function in separate processes whereas in the Thread version all the\
    \ Threads share the same process.\n\n### Alternative Ways to Start a Process\n\
    \nWhen the start() method is called on a Process, three different approaches to\
    \ starting the underlying process are available. These approaches can be set using\
    \ the multiprocessing.set_start_method() which takes a string indicating the approach\
    \ to use. The actual process initiation mechanisms available depend on the underlying\
    \ operating system:\n\n- ‘spawn’ The parent process start a fresh Python interpreter\
    \ process. The child process will only inherit those resources necessary to run\
    \ the process objects run() method. In particular, unnecessary file descriptors\
    \ and handles from the parent process will not be inherited. Starting a process\
    \ using this method is rather slow compared to using fork or fork server. Available\
    \ on Unix and Windows. This is the default on Windows.\n- ‘fork’ The parent process\
    \ uses os.fork() to fork the Python interpreter. The child process, when it begins,\
    \ is effectively identical to the parent process. All resources of the parent\
    \ are inherited by the child process. Available only on Unix type operating systems.\
    \ This is the default on Unix, Linux and Mac OS.\n- ‘fork server’ In this case\
    \ a server process is started. From then on, whenever a new process is needed,\
    \ the parent process connects to the server and requests that it fork a new process.\
    \ The fork server process is single threaded so it is safe for it to use os.fork().\
    \ No unnecessary resources are inherited. Available on Unix style platforms which\
    \ support passing file descriptors over Unix pipes.\n\nThe set_start_method()\
    \ should be used to set the start method (and this should only be set once within\
    \ a program)."
  mdcn: "## 全局解释器锁\n\n全局解释器锁（或称 GIL）是底层 CPython 解释器中的一个全局锁，旨在避免多任务之间可能出现的死锁。它通过防止多个线程同时执行，来保护对\
    \ Python 对象的访问。\n\n在大多数情况下，您无需担心 GIL，因为它所处的层级低于您将编写的程序。然而，值得注意的是，GIL 存在争议，因为在某些情况下，它阻止了多线程\
    \ Python 程序充分利用多处理器系统的优势。\n\n这是因为，为了执行，一个线程必须获取 GIL，并且同一时间只能有一个线程持有 GIL（即它所代表的锁）。这意味着\
    \ Python 的行为类似于单 CPU 机器；同一时间只能运行一件事。线程只有在休眠、需要等待某些事物（例如某些 I/O）或已持有 GIL 达到一定时间时，才会放弃\
    \ GIL。如果线程持有 GIL 的最长时间已到，调度器将从该线程释放 GIL（导致其停止执行，现在必须等待 GIL 被归还），并选择另一个线程来获取 GIL\
    \ 并开始执行。\n\n因此，标准 Python 线程无法利用现代计算机硬件上通常可用的多个 CPU。解决此问题的一个方案是使用下一章描述的 Python\
    \ 多进程库。\n\n## 多进程\n\n### 简介\n\n多进程库支持生成独立的（操作系统级别的）进程来执行行为（例如函数或方法），其使用的 API 类似于上一章介绍的线程\
    \ API。\n\n它可用于避免全局解释器锁（GIL）引入的限制，方法是使用独立的操作系统进程，而不是轻量级线程（线程在单个进程内运行）。\n\n这意味着多进程库允许开发者充分利用现代计算机硬件的多处理器环境，该环境通常具有多个处理器核心，允许多个操作/行为并行运行；这对于数据分析、图像处理、动画和游戏应用可能非常重要。\n\
    \n多进程库还引入了一些新功能，最显著的是用于并行化可调用对象（例如函数和方法）执行的 Pool 对象，这在线程 API 中没有等效物。\n\n### Process\
    \ 类\n\nProcess 类是多进程库中与线程库中的 Thread 类等效的类。它可用于在单独的进程中运行可调用对象，例如函数。为此，需要创建 Process\
    \ 类的新实例，然后调用其 start() 方法。join() 等方法也可用，以便一个进程可以等待另一个进程完成后再继续等。\n\n主要区别在于，当创建新的\
    \ Process 时，它在底层操作系统（如 Windows、Linux 或 Mac OS）上的单独进程中运行。相比之下，Thread 在与原始程序相同的进程中运行。这意味着进程由底层计算机硬件上的某个处理器直接管理和执行。\n\
    \n这样做的好处是您能够利用物理计算机硬件固有的并行性。缺点是设置 Process 比设置更轻量级的 Thread 需要更多的工作。Process 类的构造函数提供与\
    \ Thread 类相同的参数集，即：\n\n```python\nclass multiprocessing.Process(group=None,\n\
    \    target=None,\n    name=None,\n    args=(),\n    kwargs={}, daemon=None)\n\
    ```\n\n- group 应始终为 None；它仅为了与线程 API 兼容而存在。\n- target 是要被 run() 方法调用的可调用对象。默认为\
    \ None，表示不调用任何内容。\n- name 是进程名称。\n- args 是目标调用的参数元组。\n- kwargs 是目标调用的关键字参数字典。\n\
    - daemon 参数将进程守护标志设置为 True 或 False。如果为 None（默认值），此标志将从创建进程继承。\n\n与 Thread 类一样，Process\
    \ 构造函数应始终使用关键字参数调用。\n\nProcess 类还提供与 Thread 类类似的一组方法：\n\n- start() 启动进程的活动。每个进程对象最多只能调用一次此方法。它安排在单独进程中调用对象的\
    \ run() 方法。\n- join([timeout]) 如果可选参数 timeout 为 None（默认值），该方法将阻塞，直到被连接的进程终止。如果\
    \ timeout 是正数，则最多阻塞 timeout 秒。请注意，如果其进程终止或方法超时，该方法将返回 None。\n- is_alive() 返回进程是否存活。大致来说，从\
    \ start() 方法返回的那一刻起，直到子进程终止，进程对象都是存活的。\n\nProcess 类还有几个属性：\n\n- name 进程的名称。名称是仅用于标识目的的字符串。它没有语义。多个进程可以被赋予相同的名称。它可用于调试目的。\n\
    - daemon 进程的守护标志，一个布尔值。必须在调用 start() 之前设置。默认值从创建进程继承。当进程退出时，它会尝试终止其所有守护子进程。请注意，守护进程不允许创建子进程。\n\
    - pid 返回进程 ID。在进程生成之前，这将是 None。\n- exit_code 进程退出代码。如果进程尚未终止，这将是 None。负值 -N 表示子进程被信号\
    \ N 终止。\n\n除了这些方法和属性外，Process 类还定义了其他与进程相关的方法，包括：\n\n- terminate() 终止进程。\n- kill()\
    \ 与 terminate() 相同，但在 Unix 上使用 SIGKILL 信号而不是 SIGTERM 信号。\n- close() 关闭 Process\
    \ 对象，释放与其关联的所有资源。如果底层进程仍在运行，将引发 ValueError。一旦 close() 成功返回，Process 对象的大多数其他方法和属性将引发\
    \ ValueError。\n\n### 使用 Process 类\n\n以下简单程序创建三个 Process 对象；每个对象分别运行 worker() 函数，字符串参数为\
    \ A、B 和 C。然后使用 start() 方法启动这三个进程对象。\n\n```python\nfrom multiprocessing import\
    \ Process\nfrom time import sleep\n\ndef worker(msg):\n    for i in range(0, 10):\n\
    \        print(msg, end='', flush=True)\n        sleep(1)\n\nprint('Starting')\n\
    t2 = Process(target=worker, args='A')\nt3 = Process(target=worker, args='B')\n\
    t4 = Process(target=worker, args='C')\nt2.start()\nt3.start()\nt4.start()\nprint('Done')\n\
    ```\n\n它本质上与线程的等效程序相同，只是使用了 Process 类而不是 Thread 类。\n\n此应用程序的输出如下：\nStarting Done\
    \ ABCABCABCABCABCABCABCACBACBACB\n\n线程版本和进程版本之间的主要区别在于，进程版本在单独的进程中运行 worker 函数，而在线程版本中，所有线程共享同一个进程。\n\
    \n### 启动进程的替代方法\n\n当在 Process 上调用 start() 方法时，有三种不同的方法可用于启动底层进程。这些方法可以使用 multiprocessing.set_start_method()\
    \ 进行设置，该方法接受一个字符串来指示要使用的方法。实际可用的进程启动机制取决于底层操作系统：\n\n- ‘spawn’ 父进程启动一个新的 Python\
    \ 解释器进程。子进程将仅继承运行进程对象 run() 方法所必需的资源。特别是，不会继承父进程中不必要的文件描述符和句柄。使用此方法启动进程比使用 fork\
    \ 或 fork server 慢。在 Unix 和 Windows 上可用。这是 Windows 上的默认值。\n- ‘fork’ 父进程使用 os.fork()\
    \ 来分叉 Python 解释器。子进程在开始时实际上与父进程相同。父进程的所有资源都由子进程继承。仅在 Unix 类型的操作系统上可用。这是 Unix、Linux\
    \ 和 Mac OS 上的默认值。\n- ‘fork server’ 在这种情况下，会启动一个服务器进程。从那时起，每当需要新进程时，父进程就连接到服务器并请求其分叉一个新进程。fork\
    \ 服务器进程是单线程的，因此使用 os.fork() 是安全的。不会继承不必要的资源。在支持通过 Unix 管道传递文件描述符的 Unix 风格平台上可用。\n\
    \n应使用 set_start_method() 来设置启动方法（并且在程序中应只设置一次）。"
