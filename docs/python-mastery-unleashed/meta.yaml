    \ | \"\\D\" |\n| \\s | 返回匹配，其中字符串包含空白字符 | \"\\s\" |\n| \\S | 返回匹配，其中字符串不包含空白字符\
    \ | \"\\S\" |\n| \\w | 返回匹配，其中字符串包含任何单词字符（a 到 z 的字符、0-9 的数字以及下划线 _ 字符） | \"\\\
    w\" |\n| \\W | 返回匹配，其中字符串不包含任何单词字符 | \"\\W\" |\n| \\Z | 如果后续字符位于字符串末尾，则返回匹配 |\
    \ \"Hunt\\Z\" |\n\n## 集合\n\n集合是位于一对方括号内的字符序列，具有特定含义。下表提供了一些示例。\n\n| 集合 | 描述 |\n\
    | :--- | :--- |\n| [jeh] | 返回匹配，其中存在指定字符（j、e 或 h）之一 |\n| [a-x] | 返回匹配，适用于任何小写字母，按字母顺序在\
    \ a 和 x 之间 |\n| [^zxc] | 返回匹配，适用于除 z、x 和 c 之外的任何字符 |\n| [0123] | 返回匹配，其中存在指定数字（0、1、2\
    \ 或 3）之一 |\n| [0-9] | 返回匹配，适用于 0 到 9 之间的任何数字 |\n| [0-9][0-9] | 返回匹配，适用于从 00 到\
    \ 99 的任何两位数 |\n| [a-zA-Z] | 返回匹配，适用于按字母顺序在 a 和 z 之间或 A 和 Z 之间的任何字符 |\n\n## Python\
    \ re 模块\n\nPython re 模块是 Python 内置的用于处理正则表达式的模块。\n\n您可能还想研究第三方 regex 模块（参见 [https://pypi.org/project/regex](https://pypi.org/project/regex)），它向后兼容默认的\
    \ re 模块，但提供了额外的功能。\n\n## 使用 Python 正则表达式\n\n### 使用原始字符串\n\n关于用于定义正则表达式模式的许多字符串，需要注意的一个重要点是它们前面有一个\
    \ 'r'，例如 r'/bin/sh$'。\n\n字符串前的 'r' 表示该字符串应被视为原始字符串。\n\n原始字符串是 Python 字符串，其中所有字符都被视为其本身；即单个字符。这意味着反斜杠（'\\\
    '）被视为字面字符，而不是用于转义下一个字符的特殊字符。\n\n例如，在标准字符串中，'\\n' 被视为表示换行符的特殊字符，因此如果我们编写以下代码：\n\
    \n```\ns = 'Hello \\n world'\nprint(s)\n```\n\n我们将得到输出：\n\n```\nHello\nWorld\n\
    ```\n\n但是，如果我们在字符串前加上 'r'，那么我们就是在告诉 Python 将其视为原始字符串。例如：\n\n```\ns = r'Hello \\\
    n world'\nprint(s)\n```\n\n现在的输出是\n\n```\nHello \\n world\n```\n\n这对于正则表达式很重要，因为像反斜杠（'\\\
    '）这样的字符在模式中用于具有特殊的正则表达式含义，因此我们不希望 Python 以正常方式处理它们。\n\n### 简单示例\n\n以下简单的 Python\
    \ 程序说明了 re 模块的基本用法。在使用 re 模块之前，必须先导入它。\n\n```\nimport re\ntext1 = 'john williams'\n\
    pattern = '[Jj]ohn'\nprint('looking in', text1, 'for the pattern', pattern)\n\
    if re.search(pattern, text1):\n    print('Match has been found')\n```\n\n运行此程序时，我们得到以下输出：\n\
    \n```\nlooking in john williams for the pattern [Jj]ohn\nMatch has been found\n\
    ```\n\n如果我们查看代码，可以看到我们正在检查的字符串包含 'john williams'，并且与此字符串一起使用的模式表明我们正在寻找一个 'J'\
    \ 或 'j' 后跟 'ohn' 的序列。为了执行此测试，我们使用 re.search() 函数，将正则表达式模式和要测试的文本作为参数传递。此函数返回 None（If\
    \ 语句将其视为 False）或一个 Match 对象（其布尔值始终为 True）。由于 text1 开头的 'john' 确实与模式匹配，re.search()\
    \ 函数返回一个匹配对象，我们看到打印出了 'Match has been found' 消息。\n\nMatch 对象和 search() 方法将在下面更详细地描述；但是，这个简短的程序说明了正则表达式的基本操作。\n\
    \n## Match 对象\n\nMatch 对象由 search() 和 match() 函数返回。它们的布尔值始终为 True。当没有匹配时，match()\
    \ 和 search() 函数返回 None，当找到匹配时返回 Match 对象。因此，可以将 Match 对象与 if 语句一起使用：\n\n```\n\
    import re\nmatch = re.search(pattern, string)\nif match:\n    process(match)\n\
    ```\n\nMatch 对象支持一系列方法和属性，包括：\n\n- match.re 产生此匹配实例的 match() 或 search() 方法所属的正则表达式对象。\n\
    - match.string 传递给 match() 或 search() 的字符串。\n- match.start([group])/ match.end([group])\
    \ 返回由 group 匹配的子字符串的起始和结束索引。\n- match.group() 返回字符串中匹配的部分。\n\n## search() 函数\n\
    \nsearch() 函数在字符串中搜索匹配项，如果找到匹配项则返回一个 Match 对象。该函数的签名是：\n\n```\nre.search(pattern,\
    \ string, flags=0)\n```\n\n参数的含义是：\n\n- pattern 这是要在匹配过程中使用的正则表达式模式。\n- string\
    \ 这是要搜索的字符串。\n- flags 这些（可选）标志可用于修改搜索的操作。\n\nre 模块定义了一组标志（或指示符），可用于指示与模式相关的任何可选行为。这些标志包括：\n\
    \n| 标志 | 描述 |\n| --- | --- |\n| re.IGNORECASE | 执行不区分大小写的匹配 |\n| re.LOCALE | 根据当前区域设置解释单词。此解释影响字母组（\\\
    w 和 \\W）以及单词边界行为（\\b 和 \\B） |\n| re.MULTILINE | 使 $ 匹配行尾（而不仅仅是字符串末尾），并使 ^ 匹配任何行的开头（而不仅仅是字符串开头）\
    \ |\n| re.DOTALL | 使句点（点）匹配任何字符，包括换行符 |\n| re.UNICODE | 根据 Unicode 字符集解释字母。此标志影响\
    \ \\w、\\W、\\b、\\B 的行为 |\n| re.VERBOSE | 忽略模式中的空白字符（集合 [] 内部或由反斜杠转义的情况除外），并将未转义的\
    \ # 视为注释标记 |\n\n如果存在多个匹配项，则只返回第一个匹配项：\n\n```\nimport re\nline1 = 'The price is\
    \ 23.55'\ncontainsIntegers = r'\\d+'\nif re.search(containsIntegers, line1):\n\
    \    print('Line 1 contains an integer')\nelse:\n    print('Line 1 does not contain\
    \ an integer')\n```\n\n在这种情况下，输出是\n\n```\nLine 1 contains an integer\n```\n\n\
    下面给出了使用 search() 函数的另一个示例。在这种情况下，要查找的模式定义了三个备选字符串（即字符串必须包含 Beatles、Adele 或 Gorillaz\
    \ 之一）：\n\n```\nimport re\n# Alternative words\nmusic = r'Beatles|Adele|Gorillaz'\n\
    request = 'Play some Adele'\nif re.search(music, request):\n    print('Set Fire\
    \ to the Rain')\nelse:\n    print('No Adele Available')\n```\n\n在这种情况下，我们生成输出：\n\
    \n```\nSet Fire to the Rain\n```\n\n## match() 函数\n\n此函数尝试在字符串开头匹配正则表达式模式。此函数的签名如下：\n\
    \n```\nre.match(pattern, string, flags=0)\n```\n\n- pattern 这是要匹配的正则表达式。\n- string\
    \ 这是要搜索的字符串。\n- flags 可用的修饰符标志。\n\nre.match() 函数成功时返回 Match 对象，失败时返回 None。\n\n\
    ## 匹配与搜索的区别"
