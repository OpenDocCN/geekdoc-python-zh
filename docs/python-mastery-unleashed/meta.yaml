- img_proc: true
  md: 'As you can see from the output,four different types of object have been returned
    from the open() function. The first is a TextIOWrapper, the second a BufferedReader,
    the third a BufferedWriter and the final one is a FileIO object. This reflects
    the differences in the parameters passed into the open (o function. For example,
    f1 references a io.TextIOWrapper because it must encode (convert) the input text
    into Unicode using the UTF-8 encoding scheme. While f2 holds a io.BufferedReader
    because the mode indicates that we want to read binary data while f3 holds a io.BufferedWriter
    because the mode used indicates we want to write binary data. The final call to
    open returns a FileIO because we have indicated that we do not want to buffer
    the data and thus we can use the lowest level of stream object.


    In general the following rules are applied to determine the type of object returned
    based on the modes and encoding specified:


    | Class | mode | Buffering |

    |---|---|---|

    | FileIO | binary | no |

    | BufferedReader | ''rb'' | yes |

    | BufferedWriter | ''wb'' | yes |

    | BufferedRandom | ''rb+'' ''wb+'' ''ab+'' | yes |

