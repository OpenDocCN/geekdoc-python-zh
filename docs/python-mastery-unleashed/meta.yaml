    \ `map()` 运算符的形式对该数据应用转换，如下所示：\n\n![](img/8a661fca3884547aede940b9a6567321_682_0.png)\n\
    \n注意我们应用运算符的顺序；我们首先过滤掉不感兴趣的数据，然后应用转换。这比以相反顺序应用运算符更有效，因为在上面的示例中我们不需要转换奇数值。因此，通常会尝试将过滤运算符尽可能推到链的上游。\n\
