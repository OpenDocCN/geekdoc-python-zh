- img_proc: true
  md: 'There are several special characters (often referred to as metacharacters)
    that have a specific meaning within a regex pattern,these are listed in the following
    table:


    | Character | Description | Example |

    | :--- | :--- | :--- |

    | [] | A set of characters | [a-d] characters in the sequence "a" to "d" |

    | \ | Indicates a special sequence (can also be used to escape special characters)
    | "\d" indicates the character should be an integer |

    | . | Any character with the exception of the newline character | "J.hn" indicates
    that there can be any character after the ''J'' and before the ''a'' |

    | ^ | Indicates a string must start with the following pattern | "^hello" indicates
    the string must start with ''hello'' |

    | $ | Indicates a string must end with the preceding pattern | "world$" indicates
    the string must end with ''world'' |

    | * | Zero or more occurrences of the preceding pattern | "Python*" indicates
    we are looking for zero or more times Python is in a string |

    | + | One or more occurrences of preceding pattern | "info+" indicates that we
    must find info in the string at least once |

    | ? | Indicates zero or 1 occurrences of the preceding pattern | "john?" indicates
    zero or one instances of the ''John'' |

    | {} | Exactly the specified number of occurrences | "John{3}" this indicates
    we expect to see the ''John'' in the string three times. "X{1,2}" indicates that
    there can be one or two Xs next to each other in the string |

    | | | Either or | "True|OK" indicates we are looking for either True or OK |

    | () | Groups together a regular expression; you can then apply another operator
    to the whole group | "(abc|xyz){2}" indicates that we are looking for the string
    abc or xyz repeated twice |


    # Special Sequences'
  merge: -1
