- img_proc: true
  md: 'The ‘r’ before the string indicates that the string should be treated as a
    raw string.


    A raw string is a Python string in which all characters are treated as exactly
    that; individual characters. It means that backslash (‘\’) is treated as a literal
    character rather than as a special character that is used to escape the next character.


    For example, in a standard string ‘\n’ is treated as a special character representing
    a newline, thus if we wrote the following:


    ```

    s = ''Hello \n world'' print(s)

    We will get as output:

    Hello

    World

    ```


    However, if we prefix the string with an ‘r’ then we are telling Python to treat
    it as a raw string. For example:


    ```

    s = r''Hello \n world''

    print(s)

    ```


    The output is now


    *Hello \n world*'
