- md: '## Temporary Files


    During the execution of many applications it may be necessary to create a temporary
    file that will be created at one point and deleted before the application finishes.
    It is of course possible to manage such temporary files yourself however, the
    tempfile module provides a range of facilities to simplify the creation and management
    of these temporary files.


    Within the tempfile module TemporaryFile, NamedTemporaryFile, TemporaryDirectory,
    and SpooledTemporaryFile are high-level file objects which provide automatic cleanup
    of temporary files and directories. These objects implement the Context Manager
    Protocol.


    The tempfile module also provides the lower-level function mkstemp() and mkdtemp()
    that can be used to create temporary files that require the developer to management
    them and delete them at an appropriate time.


    The high-level feature for the tempfile module are:


    - TemporaryFile(mode=''w+b'') Return an anonymous file-like object that can be
    used as a temporary storage area. On completion of the managed context (via a
    with statement) or destruction of the file object, the temporary file will be
    removed from the file system. Note that by default all data is written to the
    temporary file in binary format which is generally more efficient.

    - NamedTemporaryFile(mode=''w+b'') This function operates exactly as TemporaryFile()
    does, except that the file has a visible name in the file system.

    - SpooledTemporaryFile(max_size=0, mode=''w+b'') This function operates exactly
    as TemporaryFile() does, except that data is spooled in memory until the file
    size exceeds max_size, or until the file''s fileno() method is called, at which
    point the contents are written to disk and operation proceeds as with TemporaryFile().

    - TemporaryDirectory(suffix=None, prefix=None, dir=None) This function creates
    a temporary directory. On completion of the context or destruction of the temporary
    directory object the newly created temporary directory and all its contents are
    removed from the file system.


    The lower level functions include:


    - mkstemp() Creates a temporary file that is only readable or writable by the
    user who created it.

    - mkdtemp() Creates a temporary directory. The directory is readable, writable,
    and searchable only by the creating user ID.

    - gettempdir() Return the name of the directory used for temporary files. This
    defines the default value for the default temporary directory to be used with
    the other functions in this module.


    An example of using the TemporaryFile function is given below. This code imports
    the tempfile module then prints out the default directory used for temporary files.
    It then creates a TemporaryFile object and prints its name and mode (the default
    mode is binary but for this example we have overwritten this so that plain text
    is used). We have then written a line to the file. Using seek we are repositioning
    ourselves at the start of the file and then reading the line we have just written.


    ```python

    import tempfile

    print(''tempfile.gettempdir():'', tempfile.gettempdir())

    temp = tempfile.TemporaryFile(''w+'')

    print(''temp.name:'', temp.name)

    print(''temp.mode:'', temp.mode)

    temp.write(''Hello world!'')

    temp.seek(0)

    line = temp.readline()

    print(''line:'', line)

    ```


    The output from this when run on an Apple Mac is:


    ```

    tempfile.gettempdir():

    /var/folders/6n/8nrnt9f93pn66ypg9s5dq8y80000gn/T

    temp.name: 4

    temp.mode: w+

    line: Hello world!

    ```


    Note that the file name is ''4'' and that the temporary directory is not a meaningful
    name!


    ## Working with Paths


    The pathlib module provides a set of classes representing file system paths; that
    is paths through the hierarchy of directories and files within an operating systems
    file structure. It was introduced in Python 3.4. The core class in this module
    is the Path class.


    A Path object is useful because it provides operations that allow you to manipulate
    and manage the path to a file or directory. The Path class also replicates some
    of the operations available from the os module (such as mkdir, rename and rmdir)
    which means that it is not necessary to work directly with the os module.


    A path object is created using the Path constructor function; this function actually
    returns a specific type of Path depending on the type of operating system being
    used such as a WindowsPath or a PosixPath (for Unix style systems).


    The Path() constructor takes the path to create for example ''D:/mydir'' (on Windows)
    or ''/Users/user1/mydir'' on a Mac or ''/var/temp'' on Linux etc.


    You can then use several different methods on the Path object to obtain information
    about the path such as:


    - exists() returns True or False depending on whether the path points to an existing
    file or directory.

    - is_dir() returns True if the path points to a directory. False if it references
    a file. False is also returned if the path does not exist.

    - is_file() returns True if the path points to a file, it returns False if the
    path does not exist or the path references a directory.

    - absolute() A Path object is considered absolute if it has both a root and (if
    appropriate) a drive.

    - is_absolute() returns a Boolean value indicating whether the Path is absolute
    or not.


    An example of using some of these methods is given below:


    ```python

    from pathlib import Path

    print(''Create Path object for current directory'')

    p = Path(''.'')

    print(''p:'', p)

    print(''p.exists():'', p.exists())

    print(''p.is_dir():'', p.is_dir())

    print(''p.is_file():'', p.is_file())

    print(''p.absolute():'', p.absolute())

    ```


    Sample output produced by this code snippet is:


    ```

    Create Path object for current directory

    p: .

    p.exists(): True

    p.is_dir(): True

