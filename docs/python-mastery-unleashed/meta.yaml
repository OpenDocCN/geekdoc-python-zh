    \ == '__main__':\n    main()\n```\n\nNote that the Pool object must be closed\
    \ once you have finished with it; we are therefore using the ‘with as’ statement\
    \ described earlier in this book to handle the Pool resource cleanly (it will\
    \ ensure the Pool is closed when the block of code within the with as statement\
    \ is completed).\n\nThe output from this program is:\n\n```\nIn worker with: 0\n\
    In worker with: 1\nIn worker with: 2\nIn worker with: 3\nIn worker with: 4\nIn\
