    As OpenPyXL is not part of the standard Python distribution you will need to install
    the library yourself using a tool such as Anaconda or pip (e.g. pip install open
    pyxl). Alternatively, if you are using PyCharm you will be able to add the Open
    PyXL library to your project.


    The key element in the Open PyXL library is the Workbook class. This can be imported
    from the module:


    ```

    from openpyxl import Workbook

    ```


    A new instance of the (in memory) Workbook can be created using the Workbook class
    (note at this point it is purely a structure within the Python program and must
    be saved before an actual Excel file is created).


    ```

