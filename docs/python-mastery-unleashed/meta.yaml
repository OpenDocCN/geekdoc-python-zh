  - '[PAGE 554]


    # The Global Interpreter Lock


    The Global Interpreter Lock(or the GIL) is a global lock within the underlying
    CPython interpreter that was designed to avoid potential deadlocks between multiple
    tasks. It is designed to protect access to Python objects by preventing multiple
    threads from executing at the same time.


    For the most part you do not need to worry about the GIL as it is at a lower level
    than the programs you will be writing. However, it is worth noting that the GIL
    is controversial because it prevents multi threaded Python programs from taking
    full advantage of multiprocessor systems in certain situations.


    This is because in order to execute a thread must obtain the GIL and only one
    thread at a time can hold the GIL (that is the lock it represents). This means
    that Python acts like a single CPU machine; only one thing can run at a time.
    A Thread will only give up the GIL if it sleeps, has to wait for something (such
    as some I/O) or it has held the GIL for a certain amount of time. If the maximum
    time that a thread can hold the GIL has been met the scheduler will release the
    GIL from that thread (resulting it stopping execution and now having to wait until
    it has the GIL returned to it) and will select another thread to gain the GIL
    and start to execute.'
  - '[PAGE 555]


    It is thus impossible for standard Python threads to take advantage of the multiple
    CPUs typically available on modern computer hardware. One solution to this is
    to use the Python multiprocessing library described in the next chapter.'
  - '[PAGE 556]


    # Multiprocessing


    # Introduction


    The multiprocessing library supports the generation of separate (operating system
    level) processes to execute behavior (such as functions or methods) using an API
    that is similar to the Threading API presented in the last chapter.


    It can be used to avoid the limitation introduced by the Global Interpreter Lock
    (the GIL) by using separate operating system processes rather than lightweight
    threads (which run within a single process).


    This means that the multiprocessing library allows developers to fully exploit
    the multiple processor environment of modern computer hardware which typically
    has multiple processor cores allowing multiple operations/behaviors to run in
    parallel; this can be very significant for data analytics, image processing, animation
    and games applications.'
  - '[PAGE 557]


    The multiprocessing library also introduces some new features, most notably the
    Pool object for parallelising execution of a callable object (e.g. functions and
    methods) that has no equivalent within the Threading API.


    # The Process Class


    The Process class is the multiprocessing library’s equivalent to the Thread class
    in the threading library. It can be used to run a callable object such as a function
    in a separate process. To do this it is necessary to create a new instance of
    the Process class and then call the start() method on it. Methods such as join()
    are also available so that one process can wait for another process to complete
    before continuing etc.


    The main difference is that when a new Process is created it runs within a separate
    process on the underlying operating systems (such as Window, Linux or Mac OS).
    In contrast a Thread runs within the same process as the original program. This
    means that the process is managed and executed directly by the operating system
    on one of the processors that are part of the underlying computer hardware.


    The up side of this is that you are able to exploit the underlying parallelism
    inherent in the physical computer hardware. The downside is that a Process takes
    more work to set up than the lighter weight Threads. The constructor for'
