    # The compile() Function


    Most regular expression operations are available as both module-level functions
    (as described above) and as methods on a compiled regular expression object.


    The module level functions are typically simplified or standardized ways to use
    the compiled regular expression. In many cases these functions are sufficient
    but if finer grained control is required then a compiled regular expression may
    be used.'
  - '[PAGE 418]


    ```

    re.compile(pattern, flags=0)

    ```


    The compile() function compiles a regular expression pattern into a regular expression
    object, which can be used for matching using its match(), search() and other methods
    as described below.


    The expression''s behavior can be modified by specifying a flags value. V The
    statements:


    ```

    prog = re.compile(pattern)

    result = prog.match(string)

    are equivalent to

    result = re.match(pattern,string)

    ```


    but using re.compile() and saving the resulting regular expression object for
    reuse is more efficient when the expression will be used several times in a single
    program.


    Compiled regular expression objects support the following methods and attributes:


    +   - Pattern.search(string, pos, end pos) Scan through string looking for the
    first location where this regular expression produces a match and return a corresponding
    Match object. Return None if no position in the string matches the pattern. Starting
    at pos if provided and'
  - '[PAGE 419]


    ending at end pos if this is provided (otherwise process the whole string).


    +   - Pattern.match(string, pos, end pos)If zero or more characters at the beginning
    of string match this regular expression,return a corresponding match object. Return
    None if the string does not match the pattern. The pos and end pos are optional
    and specify the start and end positions within which to search.

    - Pattern.split(string, maxsplit = o)Identical to the split()function, using the
    compiled pattern.

    - Pattern.find all(string[, pos[, end pos]])Similar to the find all () function,
    but also accepts optional pos and end pos parameters that limit the search region
    like for search().

    - Pattern.finditer(string[, pos[, end pos]])Similar to the find- iter() function,
    but also accepts optional pos and end pos parameters that limit the search region
    like for search().

    - Pattern.sub(repl, string, count = o)Identical to the sub()function, using the
    compiled pattern.

    - Pattern.subn(repl,string, count = o)Identical to the subn()function, using the
    compiled pattern.

    - Pattern.pattern the pattern string from which the pattern object was compiled.


    An example of using the compile() function is given below. The pattern to be compiled
    is defined as containing 1 or more'
