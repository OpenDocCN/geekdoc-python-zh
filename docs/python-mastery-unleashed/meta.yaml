- md: "## Setting Up PyTest\n\nYou will probably need to set up PyTest so that you\
    \ can use it from within your environment. If you are using the PyCharm editor,\
    \ then you will need to add the PyTest module to the current PyCharm project and\
    \ tell PyCharm that you want to use PyTest to run all tests for you.\n\n## A Simple\
    \ PyTest Example\n\n### Something to Test\n\nTo be able to explore PyTest we first\
    \ need something to test; we will therefore define a simple Calculator class.\
    \ The calculator keeps a running total of the operations performed; it allows\
    \ a new value to be set and then this value can be added to, or subtracted from,\
    \ that accumulated total.\n\n```python\nclass Calculator:\n    def __init__(self):\n\
    \        self.current = 0\n        self.total = 0\n\n    def set(self, value):\n\
    \        self.current = value\n\n    def add(self):\n        self.total += self.current\n\
    \n    def sub(self):\n        self.total -= self.current\n\n    def total(self):\n\
    \        return self.total\n```\n\nSave this class into a file called calculator.py.\n\
    \n### Writing a Test\n\nWe will now create a very simple PyTest unit test for\
    \ our Calculator class. This test will be defined in a class called test_calculator.py.\
    \ You will need to import the calculator class we wrote above into your test_calculator.py\
    \ file (remember each file is a module in Python).\n\nThe exact import statement\
    \ will depend on where you placed the calculator file relative to the test class.\
    \ In this case the two files are both in the same directory and so we can write:\n\
    \n```python\nfrom calculator import Calculator\n```\n\nWe will now define a test,\
    \ the test should be pre-fixed with test_ for PyTest to find them. In fact PyTest\
    \ uses several conventions to find tests, which are:\n\n- Search for test_*.py\
    \ or *_test.py files.\n- From those files, collect test items:\n    - test_prefixed\
    \ test functions,\n    - test_prefixed test methods inside Test prefixed test\
    \ classes (without an __init__ method).\n\nNote that we keep test files and the\
    \ files containing the code to be tested separate; indeed in many cases they are\
    \ kept in different directory structures. This means that there is not chance\
    \ of developers accidentally using tests in production code etc.\n\nNow we will\
    \ add to the file a function that defines a test. We will call the function test_add_one;\
    \ it needs to start with test_ due to the above convention. However, we have tried\
    \ to make the rest of the function name descriptive, so that its clear what it\
    \ is testing. The function definition is given below:\n\n```python\nfrom calculator\
    \ import Calculator\n\ndef test_add_one():\n    calc = Calculator()\n    calc.set(1)\n\
    \    calc.add()\n    assert calc.total == 1\n```\n\nThe test function creates\
    \ a new instance of the Calculator class and then calls several methods on it;\
    \ to set up the value to add, then the call to the add() method itself etc.\n\n\
    The final part of the test is the assertion. The assert verifies that the behavior\
    \ of the calculator is as expected. The PyTest assert statement works out what\
    \ is being tested and what it should do with the result—including adding information\
    \ to be added to a test run report. It avoids the need to have to learn a load\
    \ of assert Something type methods (unlike some other testing frameworks).\n\n\
    Note that a test without an assertion is not a test; i.e. it does not test anything.\
    \ Many IDEs provide direct support for testing frameworks including PyCharm. For\
    \ example, PyCharm will now detect that you have written a function with an assert\
    \ statement in it and add a Run Test icon to the grey area to the left of the\
    \ editor. This can be seen in the following picture where a green arrow has been\
    \ added at line 4; this is the ‘Run Test’ button:\n\n![](img/8a661fca3884547aede940b9a6567321_275_0.png)\n\
    \nThe developer can click on the green arrow to run the test. They will then be\
    \ presented with the Run menu that is preconfigured to use PyTest for you:\n\n\
    ![](img/8a661fca3884547aede940b9a6567321_276_0.png)\n\nIf the developer now selects\
    \ the Run option; this will use the PyTest runner to execute the test and collect\
    \ information about what happened and present it in a PyTest output view at the\
    \ bottom of the IDE:\n\n![](img/8a661fca3884547aede940b9a6567321_276_1.png)\n\n\
    Here you can see a tree in the left-hand panel that currently holds the one test\
    \ defined in the test_calculator.py file. This tree shows whether tests have passed\
    \ or failed. In this case we have a green tick showing that the test passed.\n\
    \nTo the right of this tree is the main output panel which shows the results of\
    \ running the tests. In this case it shows that PyTest ran only one test and that\
    \ this was the test_add_one test which was defined in test_calculator.py and that\
    \ 1 test passed.\n\nIf you now change the assertion in the test to check to see\
    \ that the result is 0 the test will fail. When run, the IDE display will update\
    \ accordingly.\n\nThe tree in the left-hand pane now shows the test as failed\
    \ while the right-hand pane provides detailed information about the test that\
    \ failed including where in the test the failed assertion was defined. This is\
    \ very helpful when trying to debug test failures.\n\n## Working with PyTest\n\
    \n![](img/8a661fca3884547aede940b9a6567321_278_0.png)\n\n### Testing Functions\n\
    \nWe can test standalone functions as well as classes using PyTest. For example,\
    \ given the function increment below (which merely adds one to any number passed\
    \ into it):\n\n```python\ndef increment(x):\n    return x + 1\n```\n\nWe can write\
    \ a PyTest test for this as follows:\n\n```python\ndef test_increment_integer_3():\n\
    \    assert increment(3) == 4\n```\n\nThe only real difference is that we have\
    \ not had to make an instance of a class:\n\n![](img/8a661fca3884547aede940b9a6567321_279_0.png)\n\
    \n### Organizing Tests\n\nTests can be grouped together into one or more files;\
    \ PyTest will search for all files following the naming convention (file names\
    \ that either start or end with ‘test’) in specified locations:\n\n- If no arguments\
    \ are specified when PyTest is run then the search for suitably named test files\
    \ starts from the test paths environment variable (if configured) or the current\
    \ directory. Alternatively, command line arguments can be used in any combination\
    \ of directories or filenames etc.\n- PyTest will recursively search down into\
    \ sub directories, unless they match no recurs dirs environment variable.\n- In\
    \ those directories, it will search for files that match the naming conventions\
    \ test_*.py or *_test.py files.\n\nTests can also be arranged within test files\
    \ into Test classes. Using test classes can be helpful in grouping tests together\
    \ and managing the setup and tear down behaviors of separate groups of tests.\
    \ However, the same effect can be achieved by separating the tests relating to\
    \ different functions or classes into different files.\n\n### Test Fixtures\n\n\
    It is not uncommon to need to run some behavior before or after each test or indeed\
    \ before or after a group of tests. Such behaviors are defined within what is\
    \ commonly known as test fixtures.\n\nWe can add specific code to run:\n\n- at\
    \ the beginning and end of a test class module of test code (setup__module/teardown__module)\n\
    - at the beginning and end of a test class (setup__class/teardown__class) or using\
    \ the alternate style of the class level fixtures (setup/teardown)\n- before and\
    \ after a test function call (setup__function/teardown__function)\n- before and\
    \ after a test method call (setup__method/teardown__method)\n\nTo illustrate why\
    \ we might use a fixture, let us expand our Calculator test:\n\n```python\ndef\
    \ test_initial_value():\n    calc = Calculator()\n    assert calc.total == 0\n\
    \ndef test_add_one():\n    calc = Calculator()\n    calc.set(1)\n    calc.add()\n\
    \    assert calc.total == 1\n\ndef test_subtract_one():\n    calc = Calculator()\n\
    \    calc.set(1)\n    calc.sub()\n    assert calc.total == -1\n\ndef test_add_one_and_one():\n\
    \    calc = Calculator()\n    calc.set(1)\n    calc.add()\n    calc.set(1)\n \
    \   calc.add()\n    assert calc.total == 2\n```\n\nWe now have four tests to run\
    \ (we could go further but this is enough for now). One of the issues with this\
    \ set of tests is that we have repeated the creation of the Calculator object\
    \ at the start of each test. While this is not a problem in itself it does result\
    \ in duplicated code and the possibility of future issues in terms of maintenance\
    \ if we want to change the way a calculator is created. It may also not be as\
    \ efficient as reusing the Calculator object for each test.\n\nWe can however,\
    \ define a fixture that can be run before each individual test function is executed.\
    \ To do this we will write a new function and use the pytest.fixture decorator\
    \ on that function. This marks the function as being special and that it can be\
    \ used as a fixture on an individual function.\n\nFunctions that require the fixture\
    \ should accept a reference to the fixture as an argument to the individual test\
    \ function. For"
  mdcn: "## 设置 PyTest\n\n你可能需要设置 PyTest，以便在你的环境中使用它。如果你使用的是 PyCharm 编辑器，那么你需要将 PyTest\
    \ 模块添加到当前的 PyCharm 项目中，并告诉 PyCharm 你希望使用 PyTest 来运行所有测试。\n\n## 一个简单的 PyTest 示例\n\
    \n### 需要测试的内容\n\n为了探索 PyTest，我们首先需要一些测试对象；因此，我们将定义一个简单的 Calculator 类。该计算器会持续记录所执行操作的累计总和；它允许设置一个新值，然后可以将该值加到或从累计总和中减去。\n\
    \n```python\nclass Calculator:\n    def __init__(self):\n        self.current\
    \ = 0\n        self.total = 0\n\n    def set(self, value):\n        self.current\
    \ = value\n\n    def add(self):\n        self.total += self.current\n\n    def\
    \ sub(self):\n        self.total -= self.current\n\n    def total(self):\n   \
    \     return self.total\n```\n\n将这个类保存到名为 `calculator.py` 的文件中。\n\n### 编写测试\n\n\
    我们现在将为 Calculator 类创建一个非常简单的 PyTest 单元测试。这个测试将定义在一个名为 `test_calculator.py` 的类中。你需要将我们上面编写的\
    \ calculator 类导入到你的 `test_calculator.py` 文件中（记住在 Python 中每个文件都是一个模块）。\n\n具体的导入语句取决于你将\
    \ calculator 文件相对于测试类放置的位置。在这种情况下，两个文件都在同一个目录中，因此我们可以这样写：\n\n```python\nfrom calculator\
    \ import Calculator\n```\n\n我们现在将定义一个测试，测试函数必须以 `test_` 为前缀，以便 PyTest 能够找到它们。实际上，PyTest\
    \ 使用几种约定来查找测试，这些约定是：\n\n- 搜索 `test_*.py` 或 `*_test.py` 文件。\n- 从这些文件中，收集测试项：\n\
    \    - 以 `test_` 为前缀的测试函数，\n    - 以 `Test` 为前缀的测试类内部以 `test_` 为前缀的测试方法（没有 `__init__`\
    \ 方法）。\n\n请注意，我们将测试文件和包含被测试代码的文件分开；实际上，在许多情况下，它们被保存在不同的目录结构中。这意味着开发者不太可能意外地在生产代码中使用测试等。\n\
    \n现在我们将在文件中添加一个定义测试的函数。我们将这个函数命名为 `test_add_one`；根据上述约定，它必须以 `test_` 开头。然而，我们试图让函数名的其余部分具有描述性，以便清楚它测试的是什么。函数定义如下：\n\
    \n```python\nfrom calculator import Calculator\n\ndef test_add_one():\n    calc\
    \ = Calculator()\n    calc.set(1)\n    calc.add()\n    assert calc.total == 1\n\
    ```\n\n测试函数创建一个新的 Calculator 类实例，然后调用它的几个方法；设置要添加的值，然后调用 `add()` 方法本身等。\n\n测试的最后一部分是断言。断言验证计算器的行为是否符合预期。PyTest\
    \ 的 assert 语句会弄清楚正在测试什么以及应该如何处理结果——包括向测试运行报告添加信息。它避免了必须学习一堆 `assert Something`\
    \ 类型方法的需要（不像一些其他测试框架）。\n\n请注意，没有断言的测试不是测试；也就是说，它没有测试任何东西。许多 IDE 直接支持测试框架，包括 PyCharm。例如，PyCharm\
    \ 现在会检测到你编写了一个包含 assert 语句的函数，并在编辑器左侧的灰色区域添加一个“运行测试”图标。这可以在下图中看到，第 4 行添加了一个绿色箭头；这就是“运行测试”按钮：\n\
    \n![](img/8a661fca3884547aede940b9a6567321_275_0.png)\n\n开发者可以点击绿色箭头来运行测试。然后他们将看到一个预配置为使用\
    \ PyTest 的运行菜单：\n\n![](img/8a661fca3884547aede940b9a6567321_276_0.png)\n\n如果开发者现在选择运行选项；这将使用\
    \ PyTest 运行器来执行测试，收集发生的情况信息，并在 IDE 底部的 PyTest 输出视图中呈现：\n\n![](img/8a661fca3884547aede940b9a6567321_276_1.png)\n\
    \n在这里，你可以看到左侧面板中有一个树状结构，目前包含在 `test_calculator.py` 文件中定义的一个测试。这个树状结构显示测试是通过还是失败。在这种情况下，我们有一个绿色勾号，表示测试通过。\n\
    \n在这个树状结构的右侧是主输出面板，显示运行测试的结果。在这种情况下，它显示 PyTest 只运行了一个测试，即在 `test_calculator.py`\
    \ 中定义的 `test_add_one` 测试，并且 1 个测试通过。\n\n如果你现在将测试中的断言更改为检查结果是否为 0，测试将会失败。运行时，IDE\
    \ 显示将相应更新。\n\n左侧面板中的树状结构现在显示测试失败，而右侧面板提供了有关失败测试的详细信息，包括失败断言在测试中的定义位置。这在尝试调试测试失败时非常有帮助。\n\
    \n## 使用 PyTest\n\n![](img/8a661fca3884547aede940b9a6567321_278_0.png)\n\n### 测试函数\n\
    \n我们可以使用 PyTest 测试独立函数以及类。例如，给定下面的 `increment` 函数（它只是将传入的任何数字加一）：\n\n```python\n\
    def increment(x):\n    return x + 1\n```\n\n我们可以为它编写一个 PyTest 测试，如下所示：\n\n```python\n\
    def test_increment_integer_3():\n    assert increment(3) == 4\n```\n\n唯一的真正区别是我们不必创建类的实例：\n\
    \n![](img/8a661fca3884547aede940b9a6567321_279_0.png)\n\n### 组织测试\n\n测试可以分组到一个或多个文件中；PyTest\
    \ 将在指定位置搜索所有遵循命名约定（文件名以 'test' 开头或结尾）的文件：\n\n- 如果运行 PyTest 时未指定任何参数，则从 `test paths`\
    \ 环境变量（如果已配置）或当前目录开始搜索适当命名的测试文件。或者，可以使用命令行参数的任何组合，如目录或文件名等。\n- PyTest 将递归地搜索子目录，除非它们匹配\
    \ `no recurs dirs` 环境变量。\n- 在这些目录中，它将搜索匹配命名约定 `test_*.py` 或 `*_test.py` 的文件。\n\
    \n测试也可以在测试文件内安排到测试类中。使用测试类有助于将测试分组在一起，并管理不同测试组的设置和拆卸行为。但是，通过将与不同函数或类相关的测试分离到不同的文件中，也可以达到相同的效果。\n\
    \n### 测试夹具\n\n在每个测试之前或之后，或者在一组测试之前或之后运行一些行为是很常见的。这种行为通常在所谓的测试夹具中定义。\n\n我们可以添加特定代码来运行：\n\
    \n- 在测试类模块的测试代码的开头和结尾（`setup__module`/`teardown__module`）\n- 在测试类的开头和结尾（`setup__class`/`teardown__class`）或使用类级别夹具的替代样式（`setup`/`teardown`）\n\
    - 在测试函数调用之前和之后（`setup__function`/`teardown__function`）\n- 在测试方法调用之前和之后（`setup__method`/`teardown__method`）\n\
    \n为了说明我们为什么可能使用夹具，让我们扩展我们的 Calculator 测试：\n\n```python\ndef test_initial_value():\n\
    \    calc = Calculator()\n    assert calc.total == 0\n\ndef test_add_one():\n\
    \    calc = Calculator()\n    calc.set(1)\n    calc.add()\n    assert calc.total\
    \ == 1\n\ndef test_subtract_one():\n    calc = Calculator()\n    calc.set(1)\n\
    \    calc.sub()\n    assert calc.total == -1\n\ndef test_add_one_and_one():\n\
    \    calc = Calculator()\n    calc.set(1)\n    calc.add()\n    calc.set(1)\n \
    \   calc.add()\n    assert calc.total == 2\n```\n\n我们现在有四个测试要运行（我们可以进一步扩展，但这目前足够了）。这组测试的问题之一是我们在每个测试开始时都重复创建\
    \ Calculator 对象。虽然这本身不是一个问题，但它确实导致了代码重复，并且如果我们想更改创建计算器的方式，未来可能会出现维护问题。它也可能不如为每个测试重用\
    \ Calculator 对象高效。\n\n然而，我们可以定义一个夹具，该夹具可以在每个单独的测试函数执行之前运行。为此，我们将编写一个新函数，并在该函数上使用\
    \ `pytest.fixture` 装饰器。这将该函数标记为特殊函数，并且它可以用作单个函数的夹具。\n\n需要夹具的函数应接受对夹具的引用作为单个测试函数的参数。对于"
