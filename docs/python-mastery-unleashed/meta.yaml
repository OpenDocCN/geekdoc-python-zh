- md: "## PyMySQL Module\n\nThe PyMySQL module provides access to a MySQL database\
    \ from Python. It implements the Python DB-API v 2.0. This module is a pure Python\
    \ database interface implementation meaning that it is portable across different\
    \ operating systems; this is notable because some database interface modules are\
    \ merely wrappers around other (native) implementations that may or may not be\
    \ available on different operating systems. For example, a native Linux based\
    \ database interface module may not be available for the Windows operating system.\
    \ If you are never going to switch between different operating systems, then this\
    \ is not a problem of course.\n\nTo use the PyMySQL module you will need to install\
    \ it on your computer. This will involve using a tool such as Anaconda or adding\
    \ it to your PyCharm project. You can also use pip to install it:\n\n```\n> pip\
    \ install PyMySQL\n```\n\n## Working with the PyMySQL Module\n\nTo use the PyMySQL\
    \ module to access a database you will need to follow these steps.\n\n1. Import\
    \ the module.\n2. Make a connection to the host machine running the database and\
    \ to the database you are using.\n3. Obtain a cursor object from the connection\
    \ object.\n4. Execute some SQL using the cursor.execute() method.\n5. Fetch the\
    \ result(s) of the SQL using the cursor object (e.g. fetchall, fetchmany or fetchone).\n\
    6. Close the database connection.\n\nThese steps are essentially boiler plate\
    \ code that you will use whenever you access a database via PyMySQL (or indeed\
    \ any DB-API compliant module).\n\nWe will take each of these steps in turn.\n\
    \n### Importing the Module\n\nAs the PyMySQL module is not one of the built-in\
    \ modules provided by default with Python you will need to import the module into\
    \ your code, for example using\n\n```\nimport pymysql\n```\n\nBe careful with\
    \ the case used here as the module name is pymysql in the code (if you try to\
    \ import PyMySQL Python will not find it!).\n\n### Connect to the Database\n\n\
    Each database module will have their own specifics for connecting to the database\
    \ server; these usually involve specifying the machine that the database is running\
    \ on (as databases can be quite resource intensive, they are often run on a separate\
    \ physical computer), the user to use for the connection and any security information\
    \ required such as a password and the database instance to connect to. In most\
    \ cases a database is looked after by a database management system (a DBMS) that\
    \ can manage multiple database instances and it is therefore necessary to specify\
    \ which database instance you are interested in.\n\nFor MySQL, the MySQL database\
    \ server is a DBMS that can indeed look after multiple database instances. The\
    \ pymysql.connect function thus requires the following information when connecting\
    \ to the database:\n\n- The name of the machine hosting the MySQL database server\
    \ e.g. dbserver.mydomain.com. If you want to connect to the same machine as your\
    \ Python program is running on, then you can use localhost. This is a special\
    \ name reserved for the local machine and avoids you needing to worry about the\
    \ name of your local computer.\n- The user name to use for the connection. Most\
    \ databases limit access to their databases to named users. These are not necessary\
    \ users such as humans that log into a system but rather entities that are allowed\
    \ to connect to the database and perform certain operations. For example, one\
    \ user may only be able to read data in the database where as another user is\
    \ allowed to insert new data into the database. These users are authenticated\
    \ by requiring them to provide a password.\n- The password for the user.\n- The\
    \ database instance to connect to. As mentioned in the previous chapter a Database\
    \ Management System (DBMS) can manage multiple database instances and thus it\
    \ is necessary to say which database instance you are interested in.\n\nFor example:\n\
    \n```\n# Open database connection\nconnection = pymysql.connect('localhost', 'username',\
    \ 'password', 'uni-database')\n```\n\nIn this case the machine we are connecting\
    \ to is 'localhost' (that is the same machine as the Python program itself is\
    \ running on), the user is represented by 'username' and 'password' and the database\
    \ instance of interest is called 'uni-database'.\n\nThis returns a Connection\
    \ object as per the DB-API standard.\n\n### Obtaining the Cursor Object\n\nYou\
    \ can obtain the cursor object from the connection using the cursor() method:\n\
    \n```\n# prepare a cursor object using cursor() method\ncursor = connection.cursor()\n\
    ```\n\n### Using the Cursor Object\n\nOnce you have obtained the cursor object\
    \ you can use it to execute an SQL query or a DML insert, update or delete statement.\
    \ The following example uses a simple select statement to select all the attributes\
    \ in the students table for all rows currently stored in the students table:\n\
    \n```\n# execute SQL query using execute() method.\ncursor.execute('SELECT * FROM\
    \ students')\n```\n\nNote that this method executes the SELECT statement but does\
    \ not return the set of results directly. Instead the execute method returns an\
    \ integer indicating the number of rows either affected by the modification or\
    \ returned as part of the query. In the case of a SELECT statement the number\
    \ returned can be used to determine which type of fetch method to use.\n\n###\
    \ Obtaining Information About the Results\n\nThe Cursor Object can also be used\
    \ to obtain information about the results to be fetched such as how many rows\
    \ there are in the results and what the type is of each attribute in the results:\n\
    \n- cursor.rowcount() this is a read-only property that indicates the number of\
    \ rows returned for a SELECT statement or rows affected for a UPDATE or INSERT\
    \ statement.\n- cursor.description() this is a read-only property that provides\
    \ a description of each attribute in the results set. Each description provides\
    \ the name of the attribute and an indication of the type (via a type_code) as\
    \ well as further information on whether the value can be null or not and for\
    \ numbers scale, precision and size information.\n\nAn example of using these\
    \ two properties is given below:\n\n```\nprint('cursor.rowcount', cursor.rowcount)\n\
    print('cursor.description', cursor.description)\n```\n\nA sample of the output\
    \ generated by these lines is given below:\n\n```\ncursor.rowcount 6\ncursor.description\
    \ (('id', 3, None, 11, 11, 0, False), ('name', 253, None, 180, 180, 0, False),\
    \ ('surname', 253, None, 180, 180, 0, False), ('subject', 253, None, 180, 180,\
    \ 0, False), ('email', 253, None, 180, 180, 0, False))\n```\n\n### Fetching Results\n\
    \nNow that a successful SELECT statement has been run against the database, we\
    \ can fetch the results. The results are returned as a tuple of tuples. As mentioned\
    \ in the last chapter there are several different fetch options available including\
    \ fetchone(), fetchmany(size) and fetchall(). In the following example we use\
    \ the fetchall() option as we know that there are only up to six rows that can\
    \ be returned.\n\n```\n# Fetch all the rows and then iterate over the data\ndata\
    \ = cursor.fetchall()\nfor row in data:\n    print('row:', row)\n```\n\nIn this\
    \ case we loop through each tuple within the data collection and print that row\
    \ out. However, we could just as easily have extracted the information in the\
    \ tuple into individual elements. These elements could then be used to construct\
    \ an object that could then be processed within an application, for example:\n\
    \n```\nfor row in data:\n    id, name, surname, subject, email = row\n    student\
    \ = Student(id, name, surname, subject, email)\n    print(student)\n```\n\n###\
    \ Close the Connection\n\nOnce you have finished with the database connection\
    \ it should be closed.\n\n```\n# disconnect from server\nconnection.close()\n\
    ```\n\n## Complete PyMySQL Query Example\n\nA complete listing illustrating connecting\
    \ up to the database, running a SELECT statement and printing out the results\
    \ using a Student class is given below:\n\n```\nimport pymysql\n\nclass Student:\n\
    \    def __init__(self, id, name, surname, subject, email):\n        self.id =\
    \ id\n        self.name = name\n```\n\nSee the following online resources for\
    \ more information on the Python Database API:\n\n- [https://www.python.org/dev/peps/pep-0249/](https://www.python.org/dev/peps/pep-0249/)\
    \ Python Database API Specification V2.0.\n- [https://wiki.python.org/moin/DatabaseProgramming](https://wiki.python.org/moin/DatabaseProgramming)\
    \ Database Programming in Python.\n- [https://docs.python-guide.org/scenarios/db/](https://docs.python-guide.org/scenarios/db/)\
    \ Databases and Python."
  mdcn: "## PyMySQL 模块\n\nPyMySQL 模块提供了从 Python 访问 MySQL 数据库的功能。它实现了 Python DB-API\
    \ v 2.0。该模块是一个纯 Python 数据库接口实现，这意味着它可以在不同的操作系统之间移植；这一点值得注意，因为一些数据库接口模块仅仅是其他（原生）实现的包装器，这些实现可能在不同操作系统上可用，也可能不可用。例如，一个基于\
    \ Linux 的原生数据库接口模块可能在 Windows 操作系统上不可用。当然，如果你从不打算在不同操作系统之间切换，那么这就不成问题。\n\n要使用\
    \ PyMySQL 模块，你需要在你的计算机上安装它。这将涉及使用诸如 Anaconda 之类的工具或将其添加到你的 PyCharm 项目中。你也可以使用\
    \ pip 来安装它：\n\n```\n> pip install PyMySQL\n```\n\n## 使用 PyMySQL 模块\n\n要使用 PyMySQL\
    \ 模块访问数据库，你需要遵循以下步骤。\n\n1.  导入模块。\n2.  连接到运行数据库的主机以及你正在使用的数据库。\n3.  从连接对象获取游标对象。\n\
    4.  使用 cursor.execute() 方法执行一些 SQL。\n5.  使用游标对象获取 SQL 的结果（例如 fetchall、fetchmany\
    \ 或 fetchone）。\n6.  关闭数据库连接。\n\n这些步骤本质上是样板代码，无论何时通过 PyMySQL（或任何符合 DB-API 的模块）访问数据库，你都会用到它们。\n\
    \n我们将依次介绍这些步骤。\n\n### 导入模块\n\n由于 PyMySQL 模块不是 Python 默认提供的内置模块之一，你需要将模块导入到你的代码中，例如使用\n\
    \n```\nimport pymysql\n```\n\n注意这里使用的大小写，因为代码中的模块名是 pymysql（如果你尝试导入 PyMySQL，Python\
    \ 将找不到它！）。\n\n### 连接到数据库\n\n每个数据库模块都有自己连接到数据库服务器的特定方式；这些通常涉及指定数据库运行所在的机器（因为数据库可能相当耗费资源，它们通常运行在单独的物理计算机上）、用于连接的用户以及所需的安全信息（如密码）和要连接的数据库实例。在大多数情况下，数据库由数据库管理系统（DBMS）管理，该系统可以管理多个数据库实例，因此有必要指定你感兴趣的数据库实例。\n\
    \n对于 MySQL，MySQL 数据库服务器确实是一个可以管理多个数据库实例的 DBMS。因此，pymysql.connect 函数在连接到数据库时需要以下信息：\n\
    \n-   托管 MySQL 数据库服务器的机器名称，例如 dbserver.mydomain.com。如果你想连接到与你的 Python 程序运行在同一台机器上，那么你可以使用\
    \ localhost。这是一个为本地机器保留的特殊名称，可以避免你担心本地计算机的名称。\n-   用于连接的用户名。大多数数据库将其数据库的访问权限限制为命名用户。这些用户不一定是登录系统的人类用户，而是被允许连接到数据库并执行某些操作的实体。例如，一个用户可能只能读取数据库中的数据，而另一个用户则被允许向数据库插入新数据。这些用户通过要求提供密码进行身份验证。\n\
    -   用户的密码。\n-   要连接的数据库实例。如前一章所述，数据库管理系统（DBMS）可以管理多个数据库实例，因此有必要说明你感兴趣的数据库实例。\n\
    \n例如：\n\n```\n# 打开数据库连接\nconnection = pymysql.connect('localhost', 'username',\
    \ 'password', 'uni-database')\n```\n\n在这种情况下，我们连接的机器是 'localhost'（即与 Python 程序本身运行在同一台机器上），用户由\
    \ 'username' 和 'password' 表示，感兴趣的数据库实例名为 'uni-database'。\n\n这将返回一个符合 DB-API 标准的\
    \ Connection 对象。\n\n### 获取游标对象\n\n你可以使用 cursor() 方法从连接中获取游标对象：\n\n```\n# 使用 cursor()\
    \ 方法准备一个游标对象\ncursor = connection.cursor()\n```\n\n### 使用游标对象\n\n一旦你获得了游标对象，你就可以用它来执行\
    \ SQL 查询或 DML 插入、更新或删除语句。以下示例使用一个简单的 select 语句来选择 students 表中当前存储的所有行的所有属性：\n\n\
    ```\n# 使用 execute() 方法执行 SQL 查询。\ncursor.execute('SELECT * FROM students')\n```\n\
    \n请注意，此方法执行 SELECT 语句，但不会直接返回结果集。相反，execute 方法返回一个整数，指示受修改影响的行数或作为查询一部分返回的行数。对于\
    \ SELECT 语句，返回的数字可用于确定使用哪种类型的获取方法。\n\n### 获取有关结果的信息\n\n游标对象也可用于获取有关要获取的结果的信息，例如结果中有多少行以及结果中每个属性的类型：\n\
    \n-   cursor.rowcount() 这是一个只读属性，指示 SELECT 语句返回的行数或 UPDATE 或 INSERT 语句影响的行数。\n\
    -   cursor.description() 这是一个只读属性，提供结果集中每个属性的描述。每个描述提供属性的名称和类型指示（通过 type_code），以及有关值是否可以为\
    \ null 的进一步信息，对于数字，还有比例、精度和大小信息。\n\n下面给出了使用这两个属性的示例：\n\n```\nprint('cursor.rowcount',\
    \ cursor.rowcount)\nprint('cursor.description', cursor.description)\n```\n\n这些行生成的输出示例如下：\n\
    \n```\ncursor.rowcount 6\ncursor.description (('id', 3, None, 11, 11, 0, False),\
    \ ('name', 253, None, 180, 180, 0, False), ('surname', 253, None, 180, 180, 0,\
    \ False), ('subject', 253, None, 180, 180, 0, False), ('email', 253, None, 180,\
    \ 180, 0, False))\n```\n\n### 获取结果\n\n现在，针对数据库成功运行了 SELECT 语句，我们可以获取结果。结果以元组的元组形式返回。如上一章所述，有几种不同的获取选项可用，包括\
    \ fetchone()、fetchmany(size) 和 fetchall()。在下面的示例中，我们使用 fetchall() 选项，因为我们知道最多只能返回六行。\n\
    \n```\n# 获取所有行，然后遍历数据\ndata = cursor.fetchall()\nfor row in data:\n    print('row:',\
    \ row)\n```\n\n在这种情况下，我们遍历数据集合中的每个元组并打印该行。然而，我们同样可以轻松地将元组中的信息提取到各个元素中。然后可以使用这些元素来构造一个对象，该对象随后可以在应用程序中进行处理，例如：\n\
    \n```\nfor row in data:\n    id, name, surname, subject, email = row\n    student\
    \ = Student(id, name, surname, subject, email)\n    print(student)\n```\n\n###\
    \ 关闭连接\n\n一旦你完成了数据库连接，就应该关闭它。\n\n```\n# 从服务器断开连接\nconnection.close()\n```\n\n\
    ## 完整的 PyMySQL 查询示例\n\n下面给出了一个完整的代码清单，演示了连接到数据库、运行 SELECT 语句并使用 Student 类打印结果：\n\
    \n```\nimport pymysql\n\nclass Student:\n    def __init__(self, id, name, surname,\
    \ subject, email):\n        self.id = id\n        self.name = name\n```\n\n有关\
    \ Python 数据库 API 的更多信息，请参阅以下在线资源：\n\n-   [https://www.python.org/dev/peps/pep-0249/](https://www.python.org/dev/peps/pep-0249/)\
    \ Python 数据库 API 规范 V2.0。\n-   [https://wiki.python.org/moin/DatabaseProgramming](https://wiki.python.org/moin/DatabaseProgramming)\
    \ Python 中的数据库编程。\n-   [https://docs.python-guide.org/scenarios/db/](https://docs.python-guide.org/scenarios/db/)\
    \ 数据库与 Python。"
