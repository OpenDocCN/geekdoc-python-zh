  md: 'different line styles (such as solid or dashed lines), colors and line widths.


    # Matplotlib Architecture


    The Matplotlib library has a layered architecture that hides much of the complexity
    associated with different windowing systems and graphic outputs.This architecture
    has three main layers,the Scripting Layer, the Artist Layer and the Back end Layer.
    Each layer has specific responsibilities and components. For example,the Back
    end is responsible for reading and interacting with the graph or plot being generated.
    In turn the Artist Layer is responsible for creating the graph objects that will
    be rendered by the Back end Layer. Finally the Scripting Layer is used by the
    developer to create the graphs.


    This architecture is illustrated below:'
  merge: -1
