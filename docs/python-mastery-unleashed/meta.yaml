    # A First pygame Application


    We are now at the point where we can put together what we have looked at so far
    and create a simple pygame application.


    It is common to create a hello world style program when using a new programming
    language or using a new application framework etc. The intention is that the core
    elements of the language or framework are explored in order to generate the most
    basic form of an application using the language or framework. We will therefore
    implement the most basic application possible using pygame.


    The application we will create will display a pygame window, with a ‘Hello World’
    title. We will then be able to quit the game. Although technically speaking this
    isn’t a game, it does possess the basic architecture of a pygame application.


    The simple Hello World game will initialize pygame and the graphical dis- play.
    It will then have a main game playing loop that will continue until the user selects
    to quit the application. It will then shut down pygame. The display created by
