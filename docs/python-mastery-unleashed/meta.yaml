- img_proc: true
  md: "using PyGame Rects. As mentioned in the last chapter a Rect is a PyGame class\
    \ used to represent rectangular coordinates. It is particularly useful as the\
    \ pygame.Rect class provides several collision detection methods that can be used\
    \ to test if one rectangle (or point) is inside another rectangle. We can therefore\
    \ use one of the methods to test if the rectangle around the Starship intersects\
    \ with any of the rectangles around the Meteors.\n\nThe GameObject class already\
    \ provides a method rect() that will return a Rect object representing the objects’\
    \ current rectangle with respect to the drawing surface (essentially the box around\
    \ the object representing its location on the screen).\n\nThus we can write a\
    \ collision detection method for the Game class using the GameObject generated\
    \ rects and the Rect class colliderect() method:\n\n```\ndef _check_for_collision(self):\n\
    \    \"\"\" Checks to see if any of the meteors have collided with the starship\"\
    \"\"\n    result = False\n    for meteor in self.meteors:\n        if self.starship.rect().colliderect(meteor.rect()):\n\
    \            result = True break\n    return result\n```\n\nNote that we have\
    \ followed the convention here of preceding the method name with an under bar\
    \ indicating that this"
  merge: -1
  pgno: 241
- img_proc: true
  md: "method should be considered private to the class. It should therefore never\
    \ be called by anything outside of the Game class. This convention is defined\
    \ in PEP 8 (Python Enhancement Proposal) but is not enforced by the language.\n\
    \nWe can now use this method in the main while loop of the game to check for a\
    \ collision:\n\n```\n# Check to see if a meteor has hit the ship\nif self._check_for_collision():\n\
    \    starship_collided = True\n```\n\nThis code snippet also introduces a new\
    \ local variable starship_collided. We will initially set this to False and is\
    \ another condition under which the main game playing while loop will terminate:\n\
    \n```\nis_running = True\nstarship_collided = False\n\n# Main game playing Loop\n\
    ```\n\n**while** is_running **and not** starship_collided:\n\nThus the game playing\
    \ loop will terminate if the user selects to quit or if the starship collides\
    \ with a meteor.\n\n# Identifying a Win"
