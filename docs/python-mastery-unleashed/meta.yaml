    # Transformational Operators


    There are several transformational operators defined in the rx.operators module
    including rx.operators.map() and rx.operators.flat_map(). The rx.operators.map()
    operator applies a function to each data item generated by an Observable.


    The rx.operators.flat_map() operator also applies a function to each data item
    but then applies a flatten operation to the result.For example, if the result
    is a list of lists then flat_map will flatten this into a single list. In this
    section we will focus on the rx.operators.map() operator.


    The rx.operators.map() operator allows a function to be applied to all data items
    generated by an Observable.The'
  merge: -1
