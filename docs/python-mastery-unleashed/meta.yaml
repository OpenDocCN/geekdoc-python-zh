  md: '# Sockets in Python


    # Introduction


    A Socket is an end point in a communication link between separate processes. In
    Python sockets are objects which provide a way of exchanging information between
    two processes in a straightforward and platform independent manner.


    In this chapter we will introduce the basic idea of socket communications and
    then presents a simple socket server and client application.


    # Socket to Socket Communication


    When two operating system level processes wish to communicate,they can do so via
    sockets. Each process has a socket which is connected to the others socket. One
    process can then write information out to the socket, while the second process
    can read information in from the socket.'
  merge: -1
  pgno: 697
- img_proc: true
  md: 'Associated with each socket are two streams, one for input and one for output.
    Thus, to pass information from one process to another, you write that information
    outto the output stream of one socket object and read it from the input stream
    of another socket object (assuming the two sockets are connected).


    Several different types of sockets are available, however in this chapter we will
    focus on TCP/IP sockets. Such a socket is a connection-oriented socket that will
    provide a guarantee of delivery of data (or notification of the failure to deliver
    the data). TCP/IP, or the Transmission Control Protocol/Internet Protocol, is
    a suite of communication protocols used to interconnect network devices on the
    internet or in a private intranet.TCP/IP actually specifies how data is exchanged
    between programs over the internet by providing end-to-end communications that
    identify how the data should be broken down into packets, addressed, transmitted,
    routed and received at the destination.


    # Setting Up a Connection


    To set up the connection, one process must be running a program that is waiting
    for a connection while the other must try to connect up to the first program.The
    first is referred to as a server socket while the second just as a socket.'
