    would be instantiated and used to create one or more Axes etc.

    - Collections are used to efficiently handle large numbers of similar types of
    objects.


    Although it is useful to be aware of these classes; in many cases you will not
    need to work with them directly as the pyplot API hides much of the detail. However,
    it is possible to work at the level of figures, axes, ticks etc. if required.


    ## The Scripting Layer


    The scripting layer is the developer facing interface that simplifies the task
    of working with the other layers.


    ![](img/8a661fca3884547aede940b9a6567321_72_0.png)


    Note that from the programmers point of view, the Scripting Layer is represented
    by the pyplot module. Under the covers pyplot uses module-level objects to track
    the state of the data, handle drawing the graphs etc.


    When imported pyplot selects either the default back end for the system or the
    one that has been configured; for example via the matplotlib.use() function.

    It then calls a setup() function that:


    - creates a figure manager factory function, which when called will create a new
    figure manager appropriate for the selected back end,

    - prepares the drawing function that should be used with the selected back end,

    - identifies the callable function that integrates with the back end main loop
    function,

    - provides the module for the selected back end.


    The pyplot interface simplifies interactions with the internal wrappers by providing
    methods such as plot(), pie(), bar(), title(), savefig(), draw() and figure()
    etc.


    Most of the examples presented in the next chapter will use the functions provided
    by the pyplot module to create the required charts; thereby hiding the lower level
    details.


    ## Graphing with Matplotlib pyplot


    ### Introduction


    In this chapter we will explore the Matplotlib pyplot API. This is the most common
    way in which developers generate different types of graphs or plots using Matplotlib.


    ### The pyplot API


    The purpose of the pyplot module and the API it presents is to simplify the generation
    and manipulation of Matplotlib plots and charts. As a whole the Matplotlib library
    tries to make simple things easy and complex things possible. The primary way
    in which it achieves the first of these aims is through the pyplot API as this
    API has high level functions such as bar(), plot(), scatter() and pie() that make
    it easy to create bar charts, line plots, scatter graphs and pie charts.


    One point to note about the functions provided by the pyplot API is that they
    can often take very many parameters; however most of these parameters will have
    default values that in many situations will give you a reasonable default behavior/
    default visual representation. You can therefore ignore most of the parameters
    available until such time as you actually need to do something different; at which
    point you should refer to the Matplotlib documentation as this has extensive material
    as well as numerous examples.


    It is of course necessary to import the pyplot module; as it is a module within
    the Matplotlib (e.g. matplotlib.pyplot) library. It is often given an alias within
    a program to make it easier to reference. Common alias for this module are pyplot
    or plt.


    A typical import for the pyplot module is given below:


    ```

    import matplotlib.pyplot as pyplot

    ```


    The pyplot API can be used to


    - construct the plot,

    - configure labels and axis,

    - manage color and line styles,

    - handles events/allows plots to be interactive,

    - display(show) the plot.


    We will see examples of using the pyplot API in the following sections.


    ### Line Graphs


    A Line Graph or Line Plot is a graph with the points on the graph (often referred
    to as markers) connected by lines to show how something changes in value as some
    set of values (typically the x axis) changes; for example, over a series to time
    intervals (also known as a time series). Time Series line charts are typically
    drawn in chronological order; such charts are known as run charts.


    The following chart is an example of a run chart; it charts time across the bottom
    (x axis) against speed (represented by the y axis).


    ![](img/8a661fca3884547aede940b9a6567321_77_0.png)


    The program used to generate this chart is given below:


    ```python

    import matplotlib.pyplot as pyplot


    # Set up the data

    x = [0, 1, 2, 3, 4, 5, 6]

    y = [0, 2, 6, 14, 30, 43, 75]


    # Set the axes headings

    pyplot.ylabel(''Speed'', fontsize=12)

    pyplot.xlabel(''Time'', fontsize=12)


    # Set the title

    pyplot.title("Speed v Time")


    # Plot and display the graph

    # Using blue circles for markers (''bo'')

    # and a solid line (''-'')

    pyplot.plot(x, y, ''bo-'')

    pyplot.show()

    ```


    The first thing that this program does is to import the matplotlib.pyplot module
    and give it an alias of pyplot (as this is a shorter name it makes the code easier
    to read).


    Two lists of values are then created for the x and y coordinates of each marker
    or plot point.


    The graph itself is then configured with labels being provided for the x and y
    axis (using the pyplot functions xlabel() and ylabel()). The title of the graph
    is then set (again using a pyplot function).


    After this the x and y values are then plotted as a line chart on the graph. This
    is done using the pyplot.plot() function. This function can take a wide range
    of parameters, the only compulsory parameters being the data used to define the
    plot points. In the above example a third parameter is provided; this is a string
    ‘bo-‘. This is a coded format string in that each element of the string is meaningful
    to the pyplot.plot() function. The elements of the string are:


    - b—this indicates the color to use when drawing the line; in this case the letter
    ‘b’ indicates the color blue (in the same way ‘r’ would indicate red and ‘g’ would
    indicate green).

    - o—this indicates that each marker (each point being plotted) should be represented
    by a circle. The lines between the markers then create the line plot.

    - ‘-’—This indicates the line style to use. A single dash (‘-’) indicates a solid
    line, where as a double dash (‘--’) indicates a dashed line.


    Finally the program then uses the show() function to render the figure on the
    screen; alternatively savefig() could have been used to save the figure to a file.


    ### Coded Format Strings


    There are numerous options that can be provided via the format string, the following
    tables summarises some of these:


    The following color abbreviations are supported by the format string:


    | Character | Color |

    |---|---|

    | ''b'' | blue |

    | ''g'' | green |

    | ''r'' | red |

    | ''c'' | cyan |

    | ''m'' | magenta |

    | ''y'' | yellow |

    | ''k'' | black |

    | ''w'' | white |


    Different ways of representing the markers (points on the graph) connected by
    the lines are also supported including:


    | Character | Description |

    |---|---|

    | ''.'' | point marker |

    | '','' | pixel marker |

    | ''o'' | circle marker |

    | ''v'' | triangle_down marker |

    | ''^'' | triangle_up marker |

    | ''<'' | triangle_left marker |

    | ''>'' | triangle_right marker |

    | ''s'' | square marker |

    | ''p'' | pentagon marker |

    | ''*'' | star marker |

    | ''h'' | hexagon1 marker |

    | ''+'' | plus, marker |

    | ''x'' | x marker |

    | ''D'' | diamond marker |


    Finally, the format string supports different line styles:


    | Character | Description |

    |---|---|

    | ''-'' | solid line style |

    | ''--'' | dashed line style |

    | ''-.'' | dash-dot line style |

    | '':'' | dotted line style |


    Some examples of formatting strings:


    - ‘r’ red line with default markers and line style.

    - ‘g-’ green solid line.

    - ‘--’ dashed line with the default color and default markers.

    - ‘yo:’ yellow dotted line with circle markers.


    ### Scatter Graph


    A Scatter Graph or Scatter Plot is type of plot where individual values are indicated
    using cartesian (or x and y) coordinates to display values. Each value is indicated
    via a mark (such as a circle or triangle) on the graph. They can be used to represent
    values obtained for two different variables; one plotted on the x axis and the
    other plotted on the y axis.


