    \ The interface between the class and other elements is not clean/explicit enough).\
    \ The result is that it may be necessary to refactor your class before progressing\
    \ with your development and testing.\n- Only Mock your Nearest Neighbor. You should\
    \ only ever mock your nearest neighbor whether that is a function, method or object.\
    \ You should try to avoid mocking dependencies of dependencies. If you find yourself\
    \ doing this then it will become harder to configure, maintain, understand and\
    \ develop. It is also increasingly likely that you are testing the mocks rather\
    \ than your own function, method or class.\n\n## Mocking Considerations\n\nThe\
    \ following provide some rules of thumb to consider when using mocks with your\
