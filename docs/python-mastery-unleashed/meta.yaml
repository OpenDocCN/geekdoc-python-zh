    # Model, View and Controller Architecture


    The application adopts the well established Model-View-Controller(or MVC) design
    pattern for separating out the responsibilities between the view element (e.g.
    the Frame or Panel), the control element (for handling user input) and the model
    element (which holds the data to be displayed).


    This separation of concerns is not a new idea and allows the construction of GUI
    applications that mirror the Model-View-Controller architecture. The intention
    of the MVC architecture is the separation of the user display, from the control
    of user input, from the underlying information model as illustrated below.'
  merge: -1
  pgno: 162
- img_proc: true
  md: '![](img/8a661fca3884547aede940b9a6567321_163_0.png)


    There are a number of reasons why this separation is useful:


    +   - re-usability of application and/or user interface components,

    - ability to develop the application and user interface separately,

    - ability to inherit from different parts of the class hierarchy.

    - ability to define control style classes which provide common features separately
    from how these features may be displayed.'
  merge: -1
  pgno: 163
- img_proc: true
  md: 'This means that different interfaces can be used with the same application,
    without the application knowing about it. It also means that any part of the system
    can be changed without affecting the operation of the other. For example, the
    way that the graphical interface (the look) displays the information could be
    changed without modifying the actual application or how input is handled (the
    feel). Indeed the application need not know what type of interface is currently
    connected to it at all.


    # PyDraw MVC Architecture


    The MVC structure of the PyDraw application has a top level controller class PyDrawController
    and a top level view class the PyDrawFrame (there is no model as the top level
    MVC triad does not hold any explicit data itself). This is shown below:


    ![](img/8a661fca3884547aede940b9a6567321_164_0.png)


    At the next level down there is another MVC structure; this time for the drawing
    element of the application. There is a DrawingController, with a DrawingModel
    and a DrawingPanel (the view) as illustrated below:'
  merge: -1
  pgno: 164
- img_proc: true
  md: '![](img/8a661fca3884547aede940b9a6567321_165_0.png)


    The DrawingModel, DrawingPanel and DrawingController classes exhibit the classic
    MVC structure. The view and the controller classes (DrawingPanel and DrawingController)
    know about each other and the drawing model, whereas the DrawingModel knows nothing
    about the view or the controller. The view is notified of changes in the drawing
    through the paint event.


