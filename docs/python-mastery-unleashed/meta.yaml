    only available on Unix platforms.


    Responsibility for processing a request is split between a server class and a
    request handler class. The server deals with the communication issues (listening
    on a socket and port, accepting connections, etc.) and the request handler deals
    with the request issues (interpreting incoming data, processing it, sending data
    back to the client).


