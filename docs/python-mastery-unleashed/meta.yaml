    ## StreamIO\n\n### Introduction\n\nIn this chapter we will explore the Stream\
    \ I/O model that underpins the way in which data is read from and written to data\
    \ sources and sinks. One example of a data source or sink is a file but another\
    \ might be a byte array.\n\nThis model is actually what sits underneath the file\
    \ access mechanisms discussed in the previous chapter.\n\nIt is not actually necessary\
    \ to understand this model to be able to read and write data to and from a file,\
    \ however in some situations it is useful to have an understanding of this model\
    \ so that you can modify the default behavior when necessary.\n\nThe remainder\
    \ of this chapter first introduces the Stream model, discusses Python streams\
    \ in general and then presents the classes provided by Python. It then considers\
    \ what is the actual effect of using the `open()` function presented in the last\
    \ chapter.\n\n### What is a Stream?\n\nStreams are objects which serve as sources\
    \ or sinks of data. At first this concept can seem a bit strange. The easiest\
    \ way to think of a stream is as a conduit of data flowing from or into a pool.\
    \ Some streams read data straight from the “source of the data” and some streams\
    \ read data from other streams. These latter streams then do some “useful” processing\
    \ of the data such as converting the raw data into a specific format. The following\
    \ figure illustrates this idea.\n\n![](img/8a661fca3884547aede940b9a6567321_364_0.png)\n\
    \nIn the above figure the initial `FileIO` stream reads raw data from the actual\
    \ data source (in this case a file). The `BufferedReader` then buffers the data\
    \ reading process for efficiency. Finally the `TextIOWrapper` handles string encoding;\
    \ that is it converts strings from the typical ASCII representation used in a\
    \ file into the internal representation used by Python (which uses Unicode).\n\
    \nYou might ask at this point why have a streams model at all; after all we read\
    \ and wrote data to files without needing to know about streams in the last chapter?\
    \ The answer is that a stream can read or write data to or from a source of data\
    \ rather than just from a file. Of course a file can be a source of data but so\
    \ can a socket, a pipe, a string, a web service etc. It is therefore a more flexible\
    \ data I/O model.\n\n### Python Streams\n\nThe Python `io` module provides Python’s\
    \ main facilities for dealing with data input and output. There are three main\
    \ types of input/output these are text I/O, binary I/O and raw I/O. These categories\
    \ can be used with various types of data source/sinks.\n\nWhatever the category,\
    \ each concrete stream can have a number of properties such as being read-only,\
    \ write-only or read-write. It can also support sequential access or random access\
    \ depending on the nature of the underlying data sink. For example, reading data\
    \ from a socket or pipe is inherently sequential where as reading data from a\
    \ file can be performed sequentially or via a random access approach.\n\nWhichever\
    \ stream is used however, they are aware of the type of data they can process.\
    \ For example, attempting to supply a string to a binary write-only stream will\
    \ raise a `TypeError`. As indeed will presenting binary data to a text stream\
    \ etc.\n\nAs suggested by this there are a number of different types of stream\
    \ provided by the Python `io` module and some of these are presented below:\n\n\
    ![](img/8a661fca3884547aede940b9a6567321_366_0.png)\n\nThe abstract `IOBase` class\
    \ is at the root of the stream IO class hierarchy. Below this class are stream\
    \ classes for unbuffered and buffered IO and for text oriented IO.\n\n### IOBase\n\
    \nThis is the abstract base class for all I/O stream classes. The class provides\
    \ many abstract methods that sub classes will need to implement.\n\nThe `IOBase`\
    \ class (and its sub classes) all support the iterator protocol. This means that\
    \ an `IOBase` object (or an object of a subclass) can iterate over the input data\
    \ from the underlying stream.\n\n`IOBase` also implements the Context Manager\
    \ Protocol and therefore it can be used with the `with` and `with-as` statements.\n\
    \nThe `IOBase` class defines a core set of methods and attributes including:\n\
    \n- `close()` flush and close the stream.\n- `closed` an attribute indicating\
