    None.

    - exit code The process exit code. This will be None if the process has not yet
    terminated. A negative value -N indicates that the child was terminated by signal
    N.


    In addition to these methods and attributes, the Process class also defines additional
    process related methods including:


    +   - terminate() Terminate the process.

    - kill() Same as terminate() except that on Unix the SIGKILL signal is used instead
    of the SIGTERM signal.

    - close() Close the Process object, releasing all resources associated with it.ValueError
    is raised if the underlying process is still running. Once close() returns successfully,most
    of the other methods and attributes of the Process object will raise a ValueError.


