  md: "The simplest of the methods provided by the Pool for work submission is the\
    \ map method:\n\n```\npool.map(func, iterable, chunksize=None)\n```\n\nThis method\
    \ returns a list of the results obtained by executing the function in parallel\
    \ against each of the items in the iterable parameter.\n\n+   - The func parameter\
    \ is the callable object to be executed (such as a function or a method).\n- The\
    \ iterable is used to pass in any parameters to the function.\n- This method chops\
    \ the iterable into a number of chunks which it submits to the process pool as\
    \ separate tasks. The (approximate) size of these chunks can be specified by setting\
    \ chunk size to a positive integer. The method blocks until the result is ready.\n\
    \nThe following sample program illustrates the basic use of the Pool and the map()\
    \ method.\n\n```\nfrom multiprocessing import Pool\ndef worker(x):\n    print('In\
    \ worker with: ', x)\n    return x * x\ndef main():\n    with Pool(processes=4)\
    \ as pool:\n        print(pool.map(worker, [0, 1, 2, 3, 4, 5]))\n```"
