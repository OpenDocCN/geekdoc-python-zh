- img_proc: true
  md: 'A special sequence is a combination of a ''\'' (backslash) followed by a character
    combination which then has a special meaning. The following table lists the common
    special sequences used in Regular Expressions:


    | Sequence | Description | Example |

    | :--- | :--- | :--- |

    | \A | Returns a match if the following characters are at the beginning of the
    string | "\AThe" must start with ''The'' |

    | \b | Returns a match where the specified characters are at the beginning or
