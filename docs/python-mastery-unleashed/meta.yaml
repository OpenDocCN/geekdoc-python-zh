  mdcn: "## 将书籍编码为JSON\n\n我们面临的一个问题是，尽管 `jsonify()` 函数知道如何将字符串、整数、列表、字典等内置类型转换为适当的JSON格式；但它不知道如何为\
    \ `Book` 这样的自定义类型执行此操作。因此，我们需要定义某种将 `Book` 转换为适当JSON格式的方法。\n\n一种可行的方法是定义一个可调用的方法，将\
    \ `Book` 类的实例转换为JSON格式。我们可以将此方法命名为 `to_json()`。例如：\n\n```python\nclass Book:\n\
    \    \"\"\"Represents a book in the bookshop\"\"\"\n    def __init__(self, isbn,\
    \ title, author, price):\n        self.isbn = isbn\n        self.title = title\n\
    \        self.author = author\n        self.price = price\n    def __str__(self):\n\
    \        return self.title + ' by ' + self.author + ' @ ' + str(self.price)\n\
    \    def to_json(self):\n        return {\n            'isbn': self.isbn,\n  \
    \          'title': self.title,\n            'author': self.author,\n        \
    \    'price': self.price\n        }\n```\n\n现在我们可以将此方法与 `jsonify()` 函数一起使用，将一本书转换为JSON格式：\n\
    \n```python\njsonify({'book': book.to_json()})\n```\n\n这种方法确实有效，并提供了一种非常轻量级的方式来将书籍转换为JSON。\n\
    \n然而，上述方法确实意味着每次我们想要将一本书转换为JSON时，都必须记得调用 `to_json()` 方法。在某些情况下，这意味着我们还需要编写一些稍微复杂的代码。例如，如果我们希望将\
    \ `Bookshop` 中的书籍列表作为JSON列表返回，我们可能会这样写：\n\n```python\njsonify({'books': [b.to_json()\
    \ for b in bookshop.books]})\n```\n\n这里我们使用了列表推导式来生成一个包含书店中所有书籍JSON版本的列表。这开始显得过于复杂，容易忘记，并且可能容易出错。Flask本身使用编码器将类型编码为JSON。Flask提供了一种创建自定义编码器的方法，这些编码器可用于将自定义类型（如\
    \ `Book` 类）转换为JSON。这样的编码器可以被 `jsonify()` 函数自动使用。\n\n为此，我们必须实现一个编码器类；该类将扩展 `flask.json.JSONEncoder`\
    \ 超类。该类必须定义一个方法 `default(self, obj)`。此方法接受一个对象并返回该对象的JSON表示。因此，我们可以为 `Book` 类编写一个编码器，如下所示：\n\
    \n```python\nclass BookJSONEncoder(JSONEncoder):\n    def default(self, obj):\n\
    \        if isinstance(obj, Book):\n            return {\n                'isbn':\
    \ obj.isbn,\n                'title': obj.title,\n                'author': obj.author,\n\
    \                'price': obj.price\n            }\n        else:\n          \
    \  return super(BookJSONEncoder, self).default(obj)\n```\n\n此类中的 `default()` 方法检查传递给它的对象是否是\
    \ `Book` 类的实例，如果是，则创建 `Book` 的JSON版本。此JSON结构基于 `isbn`、`title`、`author` 和 `price`\
    \ 属性。如果不是 `Book` 类的实例，则将对象传递给父类。\n\n现在我们可以将此编码器注册到Flask应用程序对象，以便在必须将 `Book` 转换为JSON时自动使用它。这是通过将自定义编码器分配给Flask应用程序对象的\
    \ `app.json_encoder` 属性来完成的：\n\n```python\napp = Flask(__name__)\napp.json_encoder\
    \ = BookJSONEncoder\n```\n\n现在，如果我们希望编码单本书或书籍列表，上述编码器将自动使用，因此我们不需要做任何其他事情。因此，我们之前的示例可以简单地通过引用书籍或\
    \ `bookshop.books` 属性来编写：\n\n```python\njsonify({'book': book})\njsonify({'books':\
    \ bookshop.books})\n```\n\n## 设置GET服务\n\n我们现在可以设置两个支持GET请求的服务，即 `/book/list` 和\
    \ `/book/<isbn>` 服务。\n\n这些URL映射到的函数如下：\n\n```python\n@app.route('/book/list',\
    \ methods=['GET'])\ndef get_books():\n    return jsonify({'books': bookshop.books})\n\
    ```\n\n```python\n@app.route('/book/<int:isbn>', methods=['GET'])\ndef get_book(isbn):\n\
    \    book = bookshop.get(isbn)\n    return jsonify({'book': book})\n```\n\n第一个函数仅使用键\
    \ `books` 以JSON结构返回书店当前持有的书籍列表。第二个函数接受一个 `isbn` 号作为参数。这是一个URL参数；换句话说，用于调用此函数的URL的一部分实际上是动态的，并将被传递到函数中。这意味着用户只需更改URL的ISBN部分即可请求不同ISBN的书籍详细信息，例如：\n\
    \n- `/book/1` 表示我们想要ISBN为1的书籍信息。\n- `/book/2` 表示我们想要ISBN为2的书籍信息。\n\n在Flask中，为了表示某物是URL参数而不是URL的硬编码元素，我们使用尖括号（`<>`）。它们包围URL参数名称，并允许将参数传递到函数中（使用相同的名称）。\n\
    \n在上面的示例中，我们还（可选地）指定了参数的类型。默认情况下，类型将是字符串；然而，我们知道ISBN实际上是一个整数，因此我们通过在参数名称前加上类型\
    \ `int`（并用冒号 `:` 将类型信息与参数名称分隔开）来表示这一点。实际上有几种可用的选项，包括：\n\n- `string`（默认），\n- `int`（如上所用），\n\
    - `float` 用于正浮点值，\n- `uuid` 用于uuid字符串，\n- `path` 类似于字符串但接受斜杠。\n\n我们可以再次使用浏览器查看调用这些服务的结果；这次的URL将是：\n\
    \n- `http://127.0.0.1:5000/book/list` 和\n- `http://127.0.0.1:5000/book/1`\n\n\
    例如：\n\n![](img/8a661fca3884547aede940b9a6567321_743_0.png)\n\n从图中可以看出，书籍信息以JSON格式的键/值对集合返回。\n\
    \n## 删除书籍\n\n删除书籍的Web服务与获取书籍服务非常相似，因为它接受 `isbn` 作为URL路径参数。然而，在这种情况下，它仅返回删除成功的确认：\n\
    \n```python\n@app.route('/book/<int:isbn>', methods=['DELETE'])\ndef delete_book(isbn):\n\
    \    bookshop.delete_book(isbn)\n    return jsonify({'result': True})\n```\n\n\
    然而，我们不能再仅通过使用Web浏览器来测试此功能。这是因为Web浏览器对URL字段中输入的所有URL都使用HTTP Get请求方法。但是，删除Web服务与HTTP\
    \ Delete请求方法相关联。\n\n因此，要调用 `delete_book()` 函数，我们需要确保发送的请求使用DELETE请求方法。这可以从能够指示所使用请求方法类型的客户端完成。示例可能包括另一个Python程序、JavaScript网站等。\n\
    \n然而，出于测试目的，我们将使用 `curl` 程序。此程序在大多数Linux和Mac系统上可用，如果尚未可用，可以轻松安装在其他操作系统上。\n\n`curl`\
    \ 是一个命令行工具和库，可用于通过互联网发送和接收数据。它支持广泛的协议和标准，特别是支持HTTP和HTTPS协议，可用于使用不同的请求方法通过HTTP/S发送和接收数据。例如，要使用DELETE请求方法调用\
    \ `delete_book()` 函数，我们可以使用："
