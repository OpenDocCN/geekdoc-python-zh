- md: "A subject is both an Observer and an Observable. This allows a subject to receive\
    \ an item of data and then to republish that data or data derived from it.\n\n\
    For example, imagine a subject that receives stock market price data published\
    \ by an external (to the organization receiving the data) source. This subject\
    \ might add a timestamp and source location to the data before republishing it\
    \ to other internal Observers. However, there is a subtle difference that should\
    \ be noted between a Subject and a plain Observable. A subscription to an Observable\
    \ will cause an independent execution of the Observable when data is published.\
    \ Notice how in the previous section all the messages were sent to a specific\
    \ Observer before the next Observer was sent any data at all.\n\nA Subject shares\
    \ the publication action with all of the subscribers and they will therefore all\
    \ receive the same data item in a chain before the next data item. In the class\
    \ hierarchy the Subject class is a direct subclass of the Observer class.\n\n\
    The following example creates a Subject that enriches the data it receives by\
    \ adding a timestamp to each data item. It then republishes the data item to any\
    \ Observers that have subscribed to it.\n\n```python\nimport rx\nfrom rx.subjects\
    \ import Subject\nfrom datetime import datetime\n\nsource = rx.from_list([2, 3,\
    \ 5, 7])\n\nclass TimeStampSubject(Subject):\n    def on_next(self, value):\n\
    \        print('Subject Received', value)\n        super().on_next((value, datetime.now()))\n\
    \n    def on_completed(self):\n        print('Data Stream Completed')\n      \
    \  super().on_completed()\n\n    def on_error(self, error):\n        print('In\
    \ Subject- Error Occurred', error)\n        super().on_error(error)\n\ndef prime_number_reporter(value):\n\
    \    print('Function Received', value)\n\nprint('Set up')\n\n# Create the Subject\n\
    subject = TimeStampSubject()\n\n# Set up multiple subscribers for the subject\n\
    subject.subscribe(prime_number_reporter)\nsubject.subscribe(lambda value: print('Lambda\
    \ Received', value))\nsubject.subscribe(\n    on_next = lambda value: print('Received\
    \ on_next', value),\n    on_error = lambda exp: print('Error Occurred', exp),\n\
    \    on_completed = lambda: print('Received completed notification')\n)\n\n# Subscribe\
    \ the Subject to the Observable source\nsource.subscribe(subject)\n\nprint('Done')\n\
    ```\n\nNote that in the above program the Observers are added to the Subject before\
    \ the Subject is added to the source Observable. This ensures that the Observers\
    \ are subscribed before the Subject starts to receive data published by the Observable.\
    \ If the Subject was subscribed to the Observable before the Observers were subscribed\
    \ to the Subject, then all the data could have been published before the Observers\
    \ were registered with the Subject.\n\nThe output from this program is:\n\n```\n\
    Set up\nSubject Received 2\nFunction Received (2, datetime.datetime(2019, 5, 21,\
    \ 17, 0, 2, 196372))\nLambda Received (2, datetime.datetime(2019, 5, 21, 17, 0,\
    \ 2, 196372))\nReceived on_next (2, datetime.datetime(2019, 5, 21, 17, 0, 2, 196372))\n\
    Subject Received 3\nFunction Received (3, datetime.datetime(2019, 5, 21, 17, 0,\
    \ 2, 196439))\nLambda Received (3, datetime.datetime(2019, 5, 21, 17, 0, 2, 196439))\n\
    Received on_next (3, datetime.datetime(2019, 5, 21, 17, 0, 2, 196439))\nSubject\
    \ Received 5\nFunction Received (5, datetime.datetime(2019, 5, 21, 17, 0, 2, 196494))\n\
    Lambda Received (5, datetime.datetime(2019, 5, 21, 17, 0, 2, 196494))\nReceived\
    \ on_next (5, datetime.datetime(2019, 5, 21, 17, 0, 2, 196494))\nSubject Received\
    \ 7\nFunction Received (7, datetime.datetime(2019, 5, 21, 17, 0, 2, 196548))\n\
    Lambda Received (7, datetime.datetime(2019, 5, 21, 17, 0, 2, 196548))\nReceived\
    \ on_next (7, datetime.datetime(2019, 5, 21, 17, 0, 2, 196548))\nData Stream Completed\n\
    Received completed notification\nDone\n```\n\nAs can be seen from this output\
    \ the numbers 2, 3, 5 and 7 are received by all of the Observers once the Subject\
    \ has added the timestamp.\n\n## Observer Concurrency\n\nBy default RxPy uses\
    \ a single threaded model; that is Observables and Observers execute in the same\
    \ thread of execution. However, this is only the default as it is the simplest\
    \ approach.\n\nIt is possible to indicate that when a Observer subscribes to an\
    \ Observable that it should run in a separate thread using the scheduler keyword\
    \ parameter on the subscribe() method. This keyword is given an appropriate scheduler\
    \ such as the rx.concurrency.NewThreadScheduler. This scheduler will ensure that\
    \ the Observer runs in a separate thread.\n\nTo see the difference look at the\
    \ following two programs. The main difference between the programs is the use\
    \ of specific schedulers:\n\n```python\nimport rx\n\nObservable = rx.from_list([2,\
    \ 3, 5])\nobservable.subscribe(lambda v: print('Lambda1 Received', v))\nobservable.subscribe(lambda\
    \ v: print('Lambda2 Received', v))\nobservable.subscribe(lambda v: print('Lambda3\
    \ Received', v))\n```\n\nThe output from this first version is given below:\n\n\
    ```\nLambda1 Received 2\nLambda1 Received 3\nLambda1 Received 5\nLambda2 Received\
    \ 2\nLambda2 Received 3\nLambda2 Received 5\nLambda3 Received 2\nLambda3 Received\
    \ 3\nLambda3 Received 5\n```\n\nThe subscribe() method takes an optional keyword\
    \ parameter called scheduler that allows a scheduler object to be provided. Now\
    \ if we specify a few different schedulers we will see that the effect is to run\
    \ the Observers concurrently with the resulting output being interwoven:\n\n```python\n\
    import rx\nfrom rx.concurrency import NewThreadScheduler, ThreadPoolScheduler,\
    \ ImmediateScheduler\n\nObservable = rx.from_list([2, 3, 5])\nobservable.subscribe(lambda\
    \ v: print('Lambda1 Received', v),\n                     scheduler=ThreadPoolScheduler(3))\n\
    observable.subscribe(lambda v: print('Lambda2 Received', v),\n               \
    \      scheduler=ImmediateScheduler())\nobservable.subscribe(lambda v: print('Lambda3\
    \ Received', v),\n                     scheduler=NewThreadScheduler())\n\n# As\
    \ the Observable runs in a separate thread need\n# ensure that the main thread\
    \ does not terminate\ninput('Press enter to finish')\n```\n\nNote that we have\
    \ to ensure that the main thread running the program does not terminate (as all\
    \ the Observables are now running in their own threads) by waiting for user input.\
    \ The output from this version is:\n\n```\nLambda2 Received 2\nLambda1 Received\
    \ 2\nLambda2 Received 3\nLambda2 Received 5\nLambda1 Received 3\nLambda1 Received\
    \ 5\nPress enter to finish\nLambda3 Received 2\nLambda3 Received 3\nLambda3 Received\
    \ 5\n```\n\nBy default the scheduler keyword on the subscribe() method defaults\
    \ to None indicating that the current thread will be used for the subscription\
    \ to the Observable.\n\n## Available Schedulers\n\nTo support different scheduling\
    \ strategies the RxPy library provides two modules that supply different schedulers;\
    \ the rx.concurrency and rx.concurrency.mainloopscheduler. The modules contain\
    \ a variety of schedulers including those listed below.\n\nThe following schedulers\
    \ are available in the rx.concurrency module:\n\n- ImmediateScheduler This schedules\
    \ an action for immediate execution.\n- CurrentThreadScheduler This schedules\
    \ activity for the current thread.\n- TimeoutScheduler This scheduler works via\
    \ a timed callback.\n- NewThreadScheduler creates a scheduler for each unit of\
    \ work on a separate thread.\n- ThreadPoolScheduler This is a scheduler that utilizes\
    \ a thread pool to execute work. This scheduler can act as a way of throttling\
    \ the amount of work carried out concurrently.\n\nThe rx.concurrency.mainloopscheduler\
    \ module also defines the following schedulers:\n\n- IOLoopScheduler A scheduler\
    \ that schedules work via the Tornado I/O main event loop.\n- PyGameScheduler\
    \ A scheduler that schedules works for PyGame.\n- WxScheduler A scheduler for\
    \ a wxPython event loop.\n\n## Try\n\nGiven the following set of tuples representing\
    \ Stock/Equity prices:\n\n```python\nstocks = (('APPL', 12.45), ('IBM', 15.55),\
    \ ('MSFT', 5.66), ('APPL', 13.33))\n```\n\nWrite a program that will create an\
    \ Observable based on the stocks data. Next subscribe three different observers\
    \ to the Observable. The first should print out the stock price, the second should\
    \ print out the name of the stock and the third should print out the entire tuple."
  mdcn: "一个主体（Subject）既是观察者（Observer）也是可观察对象（Observable）。这使得主体能够接收数据项，然后重新发布该数据或由其派生的数据。\n\
    \n例如，想象一个主体接收由外部（相对于接收数据的组织而言）来源发布的股票市场价格数据。该主体可能会在将数据重新发布给其他内部观察者之前，为数据添加时间戳和来源位置。然而，需要注意主体与普通可观察对象之间存在一个微妙的区别。对可观察对象的订阅将在数据发布时触发其独立执行。请注意前一节中，所有消息都是在向下一个观察者发送任何数据之前，先发送给特定观察者的。\n\
    \n主体与所有订阅者共享发布操作，因此它们都将在下一个数据项之前，以链式方式接收相同的数据项。在类层次结构中，主体类是观察者类的直接子类。\n\n以下示例创建了一个主体，它通过为每个数据项添加时间戳来丰富接收到的数据。然后，它将数据项重新发布给任何已订阅它的观察者。\n\
    \n```python\nimport rx\nfrom rx.subjects import Subject\nfrom datetime import\
    \ datetime\n\nsource = rx.from_list([2, 3, 5, 7])\n\nclass TimeStampSubject(Subject):\n\
    \    def on_next(self, value):\n        print('Subject Received', value)\n   \
    \     super().on_next((value, datetime.now()))\n\n    def on_completed(self):\n\
    \        print('Data Stream Completed')\n        super().on_completed()\n\n  \
    \  def on_error(self, error):\n        print('In Subject- Error Occurred', error)\n\
    \        super().on_error(error)\n\ndef prime_number_reporter(value):\n    print('Function\
    \ Received', value)\n\nprint('Set up')\n\n# Create the Subject\nsubject = TimeStampSubject()\n\
    \n# Set up multiple subscribers for the subject\nsubject.subscribe(prime_number_reporter)\n\
    subject.subscribe(lambda value: print('Lambda Received', value))\nsubject.subscribe(\n\
    \    on_next = lambda value: print('Received on_next', value),\n    on_error =\
    \ lambda exp: print('Error Occurred', exp),\n    on_completed = lambda: print('Received\
    \ completed notification')\n)\n\n# Subscribe the Subject to the Observable source\n\
    source.subscribe(subject)\n\nprint('Done')\n```\n\n请注意，在上面的程序中，观察者是在主体被添加到源可观察对象之前添加到主体的。这确保了观察者在主体开始接收可观察对象发布的数据之前就已经订阅。如果主体在观察者订阅主体之前就订阅了可观察对象，那么所有数据可能在观察者注册到主体之前就已经发布了。\n\
    \n该程序的输出如下：\n\n```\nSet up\nSubject Received 2\nFunction Received (2, datetime.datetime(2019,\
    \ 5, 21, 17, 0, 2, 196372))\nLambda Received (2, datetime.datetime(2019, 5, 21,\
    \ 17, 0, 2, 196372))\nReceived on_next (2, datetime.datetime(2019, 5, 21, 17,\
    \ 0, 2, 196372))\nSubject Received 3\nFunction Received (3, datetime.datetime(2019,\
    \ 5, 21, 17, 0, 2, 196439))\nLambda Received (3, datetime.datetime(2019, 5, 21,\
    \ 17, 0, 2, 196439))\nReceived on_next (3, datetime.datetime(2019, 5, 21, 17,\
    \ 0, 2, 196439))\nSubject Received 5\nFunction Received (5, datetime.datetime(2019,\
    \ 5, 21, 17, 0, 2, 196494))\nLambda Received (5, datetime.datetime(2019, 5, 21,\
    \ 17, 0, 2, 196494))\nReceived on_next (5, datetime.datetime(2019, 5, 21, 17,\
    \ 0, 2, 196494))\nSubject Received 7\nFunction Received (7, datetime.datetime(2019,\
    \ 5, 21, 17, 0, 2, 196548))\nLambda Received (7, datetime.datetime(2019, 5, 21,\
    \ 17, 0, 2, 196548))\nReceived on_next (7, datetime.datetime(2019, 5, 21, 17,\
    \ 0, 2, 196548))\nData Stream Completed\nReceived completed notification\nDone\n\
    ```\n\n从这个输出可以看出，一旦主体添加了时间戳，数字2、3、5和7就会被所有观察者接收一次。\n\n## 观察者并发\n\n默认情况下，RxPy使用单线程模型；即观察者和观察者在同一个执行线程中执行。然而，这只是默认设置，因为它是最简单的方法。\n\
    \n可以指定当观察者订阅可观察对象时，它应该在单独的线程中运行，方法是在`subscribe()`方法上使用`scheduler`关键字参数。该关键字被赋予一个合适的调度器，例如`rx.concurrency.NewThreadScheduler`。该调度器将确保观察者在单独的线程中运行。\n\
    \n要查看差异，请看以下两个程序。程序之间的主要区别在于使用了特定的调度器：\n\n```python\nimport rx\n\nObservable =\
    \ rx.from_list([2, 3, 5])\nobservable.subscribe(lambda v: print('Lambda1 Received',\
    \ v))\nobservable.subscribe(lambda v: print('Lambda2 Received', v))\nobservable.subscribe(lambda\
    \ v: print('Lambda3 Received', v))\n```\n\n第一个版本的输出如下：\n\n```\nLambda1 Received\
    \ 2\nLambda1 Received 3\nLambda1 Received 5\nLambda2 Received 2\nLambda2 Received\
    \ 3\nLambda2 Received 5\nLambda3 Received 2\nLambda3 Received 3\nLambda3 Received\
    \ 5\n```\n\n`subscribe()`方法接受一个可选的关键字参数`scheduler`，允许提供一个调度器对象。现在，如果我们指定几个不同的调度器，我们将看到效果是并发运行观察者，导致输出交织在一起：\n\
    \n```python\nimport rx\nfrom rx.concurrency import NewThreadScheduler, ThreadPoolScheduler,\
    \ ImmediateScheduler\n\nObservable = rx.from_list([2, 3, 5])\nobservable.subscribe(lambda\
    \ v: print('Lambda1 Received', v),\n                     scheduler=ThreadPoolScheduler(3))\n\
    observable.subscribe(lambda v: print('Lambda2 Received', v),\n               \
    \      scheduler=ImmediateScheduler())\nobservable.subscribe(lambda v: print('Lambda3\
    \ Received', v),\n                     scheduler=NewThreadScheduler())\n\n# As\
    \ the Observable runs in a separate thread need\n# ensure that the main thread\
    \ does not terminate\ninput('Press enter to finish')\n```\n\n请注意，我们必须确保运行程序的主线程不会终止（因为所有观察者现在都在自己的线程中运行），方法是等待用户输入。此版本的输出是：\n\
    \n```\nLambda2 Received 2\nLambda1 Received 2\nLambda2 Received 3\nLambda2 Received\
    \ 5\nLambda1 Received 3\nLambda1 Received 5\nPress enter to finish\nLambda3 Received\
    \ 2\nLambda3 Received 3\nLambda3 Received 5\n```\n\n默认情况下，`subscribe()`方法上的`scheduler`关键字默认为`None`，表示当前线程将用于订阅可观察对象。\n\
    \n## 可用调度器\n\n为了支持不同的调度策略，RxPy库提供了两个模块，它们提供不同的调度器：`rx.concurrency`和`rx.concurrency.mainloopscheduler`。这些模块包含各种调度器，包括下面列出的那些。\n\
    \n`rx.concurrency`模块中可用的调度器有：\n\n-   `ImmediateScheduler` 此调度器安排一个操作立即执行。\n- \
    \  `CurrentThreadScheduler` 此调度器为当前线程安排活动。\n-   `TimeoutScheduler` 此调度器通过定时回调工作。\n\
    -   `NewThreadScheduler` 为每个工作单元在单独的线程上创建一个调度器。\n-   `ThreadPoolScheduler` 这是一个利用线程池执行工作的调度器。此调度器可以作为限制并发执行工作量的一种方式。\n\
    \n`rx.concurrency.mainloopscheduler`模块还定义了以下调度器：\n\n-   `IOLoopScheduler` 一个通过Tornado\
    \ I/O主事件循环安排工作的调度器。\n-   `PyGameScheduler` 一个为PyGame安排工作的调度器。\n-   `WxScheduler`\
    \ 一个用于wxPython事件循环的调度器。\n\n## 尝试\n\n给定以下表示股票/股权价格的元组集合：\n\n```python\nstocks =\
    \ (('APPL', 12.45), ('IBM', 15.55), ('MSFT', 5.66), ('APPL', 13.33))\n```\n\n\
    编写一个程序，基于股票数据创建一个可观察对象。接下来，订阅三个不同的观察者到该可观察对象。第一个应该打印股票价格，第二个应该打印股票名称，第三个应该打印整个元组。"
