    However, Matplotlib does not come pre built into the Python environment; it is
    an optional module which must be added to your environment or IDE.


    In this chapter we will introduce the Matplotlib library, its architecture, the
    components that comprise a chart and the pyplot API. The pyplot API is the simplest
    and most common way in which a programmer interacts with Matplotlib. We will then
    explore a variety of different types of chart and how they can be created using
    Matplotlib, from simple line charts, through scatter charts, to bar charts and
    pie charts. We will finish by looking at a simple 3D chart.


