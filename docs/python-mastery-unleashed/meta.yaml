- img_proc: true
  md: 'A Thread may also be in the waiting state; for example, when it is waiting
    for another thread to finish its work before continuing (possibly because it needs
    the results produced by that thread to continue). This can be achieved using the
    join() method and is also illustrated above. Once the second thread completes
    the waiting thread will again become runnable.


    The thread which is currently executing is termed the active thread. There are
    a few points to note about thread states:


    +   - A thread is considered to be alive unless its run() method terminates after
    which it can be considered dead.

    - A live thread can be running, runnable, waiting, etc.

    - The runnable state indicates that the thread can be executed by the processor,
    but it is not currently executing. This is because an equal or higher priority
    process is already executing, and the thread must wait until the processor becomes
    free. Thus the diagram shows that the scheduler can move a thread between the
    running and runnable state. In fact,this could happen many times as the thread
    executes for a while, is then removed from the processor by the scheduler and
    added to the waiting queue, before being returned to the processor again at a
    later date.


