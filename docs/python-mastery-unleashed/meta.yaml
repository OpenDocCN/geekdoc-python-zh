  md: '# Advanced Logging


    # Introduction


    In this chapter we go further into the configuration and modification of the Python
    logging module. In particular we will look at Handlers (used to determine the
    destination fo log messages), Filters which can be used by Handlers to provide
    finer grained control of log output and logger configuration files. We conclude
    the chapter by considering performance issues associated with logging.


    # Handlers


    Within the logging pipeline, it is a handlers that send the log message to their
    final destination. By default the handler is set up to direct output to the console/terminal
    associated with the running program. However, this can be changed to send the
    log messages to a file, to an email service, to a web server etc. Or indeed to
    any combination of these as there can be multiple handlers configured for a logger.
    This is shown in the diagram below:'
  merge: -1
  pgno: 500
- img_proc: true
  md: '![](img/8a661fca3884547aede940b9a6567321_501_0.png)


    In the above diagram the logger has been configured to send all log messages to
    four different handlers which allow a log message to be written to the console,to
    a web server to a file and to an email service. Such a behavior may be required
    because:


    +   - The web server will allow developers access to a web interface that allows
    them to seethe log files even if they do not have permission to access a production
    server.

    - The log file ensures that all the log data is permanently stored in a file within
    the file store.

    - An email message may be sent to a notification system so that someone will be
    notified that there is an issue to be investigated.'
  merge: -1
  pgno: 501
- img_proc: true
  md: '+   - The console may still be available to the system administrators who may
    wish to look at the log messages generated.


    The Python logging framework comes with several different handlers as suggested
    above and listed below:


    +   - logging.Stream Handler sends messages to outputs such as stdout, stderr
    etc.

    - logging.FileHandler sends log messages to files. There are several varieties
    of File Handler in addition to the basic FileHandler, these include the logging.handlers.RotatingFileHandler
    (which will rotate log files based on a maximum file size) and logging.handlers.
    TimeRotatingFileHandler (which rotates the log file at specified time intervals
    e.g. daily).

    - logging.handlers.SocketHandler which sends messages to a TCP/IP socket where
    it can be received by a TCP Server.

    - logging.handlers.SMTPHandler that sends messages by the SMTP (Simple Mail Transfer
    Protocol) to a email server.

    - logging.handlers.SysLogHandler that sends log messages to a Unix syslog program.

    - logging.handlers.NTEventLogHandler that sends message to a Windows event log.

    - logging.handlers.HTTPHandler which sends messages to a HTTP server.'
  merge: -1
  pgno: 502
- img_proc: true
  md: '+   - logging.NullHandler that does nothing with error messages. This is often
    used by library developers who want to include logging in their applications but
    expect developers to set up an appropriate handler when they use the library.

    - All of these handlers can be configured programmatically or via a configuration
    file.


    # Setting the Root Output Handler


    The following example, uses the logging.basicConfig() function to set up the root
    logger to use a FileHandler that will write the log messages to a file called
    ‘example.log’:


    ```

    import logging

    # Sets a file handler on the root logger to

    # save log messages to the example.log file

    logging.basicConfig(filename=''example.log'' ,level=logging.DEBUG)

    # If no handler is explicitly set on the name logger

    # it will delegate the messages to the parent logger to handle

    logger = logging.getLogger( name  )

    logger.debug(''This is to help with debugging'' )

    logger.info(''This is just for information'' )

    logger.warning(''This is a warning!'' )

    logger.error(''This shouldbe used with something unexpected''  )

    logger.critical(''Something serious'' )

    ```


    Note that if no handler is specified for a named logger then it delegates output
    to the parent (in this case the root) logger.'
