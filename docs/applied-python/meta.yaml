  md: "# CREATING MUSICAL SCORES WITH PYTHON\n\n# INTRODUCTION\n\nIn this chapter\
    \ of our Python course, we provide a tutorial on music engravings. We use Python\
    \ to create an input file for the music engraving program Lilypond. Our Python\
    \ program will translate an arbitrary text into a musical score. Each character\
    \ of the alphabet is translated by our Python program into a one or more notes\
    \ of a music piece.\n\n# LILYPOND\n\nLilypond Logo Before we can start with the\
    \ code for our Python implementation, we have to give some information about Lilypond.\
    \ What is Lilypond? The makers of Lilypond define it like this on lilypond.org:\n\
    \n> \"LilyPond is a music engraving program, devoted to producing the highest-quality\
    \ sheet music possible. It brings the aesthetics of traditionally engraved music\
    \ to computer printouts.\"\n\nThey describe their goal as following: \"LilyPond\
    \ came about when two musicians wanted to go beyond the soulless look of computer-printed\
    \ sheet music. Musicians prefer reading beautiful music, so why couldn't programmers\
    \ write software to produce elegant printed parts?\n\nThe result is a system which\
    \ frees musicians from the details of layout, allowing them to focus on making\
    \ music. LilyPond works with them to create publication-quality parts, crafted\
    \ in the best traditions of classical music engraving.\"\n\nA simple example to\
    \ get you started with Lilypond:\n\n```\n%%writefile simple.ly\n\\version \"2.12.3\"\
    \n{\n  c' e' g' a'\n}\n```\n\nOverwriting simple.ly\n\n```\n! lilypond simple.ly\n\
    ```"
