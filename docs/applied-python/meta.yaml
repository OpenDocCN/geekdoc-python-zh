  - "[PAGE 29]\n\n# CURRYING\n\n# GENERAL IDEA\n\nIn mathematics and computer science,\
    \ currying is the technique of breaking down the evaluation of a function that\
    \ takes multiple arguments into evaluating a sequence of single-argument functions.\
    \ Currying is also used in theoretical computer science, because it is often easier\
    \ to transform multiple argument models into single argument models.\n\n![](img/0b361ff0232ac001b102b7f7c8d33dc4_29_0.png)\n\
    \n# COMPOSITION OF FUNCTIONS\n\nWe define the composition h of two functions f\
    \ and g\n\n$h(x) = g(f(x))$\n\nin the following Python example.\n\nThe composition\
    \ of two functions is a chaining process in which the output of the inner function\
    \ becomes the input of the outer function.\n\n```\npython\ndef compose(g, f):\n\
    \    def h(x):\n        return g(f(x))\n    return h\n```\n\nWe will use our compose\
    \ function in the next example. Let's assume, we have a thermometer, which is\
    \ not working accurately. The correct temperature can be calculated by applying\
    \ the function readjust to the temperature values. Let us further assume that\
    \ we have to convert our temperature values from Celsius to Fahrenheit. We can\
    \ do this by applying compose to both functions:\n\n```\npython\ndef celsius2fahrenheit(t):\n\
    \    return 1.8 * t + 32\n\ndef readjust(t):\n    return 0.9 * t - 0.5\n\nconvert\
    \ = compose(readjust, celsius2fahrenheit)\n\nprint(convert(10), celsius2fahrenheit(10))\n\
    \n\n44.5 50.0\n```"
