- md: "## WORD CLOUDS\n\n## INTRODUCTION\n\nWord Clouds (WordClouds) are quite often\
    \ called Tag clouds, but I prefer the term word cloud. I think this term is more\
    \ general and easier to be understood by most people. The term tag is used for\
    \ annotating texts and especially websites. This means finding out the most important\
    \ words or terms characterizing or classifying a text. In the early days of web\
    \ development people had to tag their websites so that search engines could easier\
    \ classify them. Spammers used this to manipulate the search engines by giving\
    \ incorrect or even misleading tags so that their websites ranked higher. Google\
    \ changed this by automatically finding out the importance of the text components.\
    \ Google more or less disregarding the tags which the owners of the websites assigned\
    \ to their pages. \"Word clouds\" as we use them also find out automatically what\
    \ are the most important words. Of course, we do it naively by just counting the\
    \ number of occurrences and using stop words. This is not the correct way to find\
    \ out about the \"real\" importance of words, but leads to very interesting results,\
    \ as we will see in the following.\n\n![](img/0b361ff0232ac001b102b7f7c8d33dc4_101_0.png)\n\
    \nWe still haven't defined what a \"word cloud\" is. It is a visual representation\
    \ of text data. Size and colors are used to show the relative importance of words\
    \ or terms in a text. The bigger a term is the greater is its weight. So the size\
    \ reflects the frequency of a words, which may correspond to its importance.\n\
    \nWe will demonstrate in this tutorial how to create you own WordCloud with Python.\
    \ We will use the Python modules Numpy, Matplotlib, Pillow, Pandas, and wordcloud\
    \ in this tutorial.\n\nThe module wordcloud is not part of most of the Python\
    \ distribution. If you use Anaconda, you can easily install it with the shell\
    \ command\n\n```\nconda install -c conda-forge wordcloud\n```\n\nUnfortunately,\
    \ this is not enough for all the things we are doing in this tutorial. So you\
    \ will have to install the latest version from github:\n\n```\ngit clone https://github.com/amueller/word_cloud.git\n\
    cd word_cloud\npip install .\n```\n\n```\n# importing the necessary modules:\n\
    import numpy as np\n```\n\n```\npython\nimport pandas as pd\nfrom wordcloud import\
    \ WordCloud, STOPWORDS, ImageColorGenerator\n\nimport matplotlib.pyplot as plt\n\
    from PIL import Image\n```\n\n```\npython\ntext = open(\"data/peace_and_love.txt\"\
    ).read()\n\nwordcloud = WordCloud().generate(text)\n\n# Display the generated\
    \ image:\nplt.imshow(wordcloud)\nplt.axis(\"off\")\nplt.show()\n```\n\n![](img/0b361ff0232ac001b102b7f7c8d33dc4_102_0.png)\n\
    \nWe will play around with the numerous parameters of WordCloud. We create a square\
    \ picture with a transparent background. We also increase the likelihood of vertically\
    \ oriented words by setting `prefer_horizontal` to 0.5 instead of 0.9 which is\
    \ the default:\n\n```\npython\nwordcloud = WordCloud(width=500,\n            \
    \         height=500,\n                     prefer_horizontal=0.5,\n         \
    \            background_color=\"rgba(255, 255, 255, 0)\",\n                  \
    \   mode=\"RGBA\").generate(text)\n\nplt.imshow(wordcloud)\nplt.axis(\"off\")\n\
    plt.show()\nwordcloud.to_file(\"img_dir/peace_and_love.png\")\n```\n\n![](img/0b361ff0232ac001b102b7f7c8d33dc4_103_0.png)\n\
    \nOutput: <wordcloud.wordcloud.WordCloud at 0x7f59ebbc0670>\n\n```\npython\nwordcloud\
    \ = WordCloud().generate(text)\n\n# Display the generated image:\nplt.imshow(wordcloud)\n\
    plt.axis(\"off\")\nplt.show()\n```\n\n![](img/0b361ff0232ac001b102b7f7c8d33dc4_103_1.png)\n\
    \nWe will show in the following how we can create word clouds with special shapes.\
    \ We will use the shape of the dove from the following picture:\n\n```\npython\n\
    dove_mask = np.array(Image.open(\"img_dir/dove.png\"))\n#dove_mask[230:250, 240:250]\n\
    plt.imshow(dove_mask)\nplt.axis(\"off\")\nplt.show()\n```\n\n![](img/0b361ff0232ac001b102b7f7c8d33dc4_104_0.png)\n\
    \nWe will create in the following example a wordcloud in the shape of the previously\
    \ loaded \"peace dove\". If the parameter `repeat` is set to `True` the words\
    \ and phrases will be repeated until `max_words` (default 200) or `min_font_size`\
    \ (default 4) is reached.\n\n```\npython\nwordcloud = WordCloud(background_color=\"\
    white\",\n                     mask=dove_mask,\n                     contour_width=3,\n\
    \                     repeat=True,\n                     min_font_size=3,\n  \
    \                   contour_color='darkgreen')\n\n# Generate a wordcloud\nwordcloud.generate(text)\n\
    \n# store to file\nwordcloud.to_file(\"img_dir/dove_wordcloud.png\")\n\n# show\n\
    \nplt.imshow(wordcloud)\nplt.axis(\"off\")\nplt.show()\n```\n\n![](img/0b361ff0232ac001b102b7f7c8d33dc4_105_0.png)\n\
    \nWe will use now a colored mask with christmas bubbles to create a word cloud\
    \ with differently colored areas:\n\n[balloons.png](balloons.png)\n\nThe following\
    \ Python code can be used to create the colored wordcloud. We visualize the result\
    \ with Matplotlib:\n\n```\npython\nballoon_mask = np.array(Image.open(\"img_dir/balloons.png\"\
    ))\n\nimage_colors = ImageColorGenerator(balloon_mask)\n\nwc_balloons = WordCloud(stopwords=STOPWORDS,\n\
    \                        background_color=\"white\",\n                       \
    \ mode=\"RGBA\",\n                        max_words=1000,\n                  \
    \      #contour_width=3,\n                        repeat=True,\n             \
    \           mask=balloon_mask)\n\ntext = open(\"data/birthday_text.txt\").read()\n\
    wc_balloons.generate(text)\nwc_balloons.recolor(color_func = image_colors)\n\n\
    plt.imshow(wc_balloons)\nplt.axis(\"off\")\nplt.show()\n```\n\n![](img/0b361ff0232ac001b102b7f7c8d33dc4_106_0.png)\n\
    \nSo that it looks better, we overlay this picture with the original picture of\
    \ the balloons!\n\n```\npython\nballoons_img = Image.fromarray(wc_balloons.to_array())\n\
    balloon_mask_img = Image.fromarray(balloon_mask)\n\nnew_img = Image.blend(balloons_img,\n\
    \                      balloon_mask_img,\n                      0.5)\nnew_img.save(\"\
    balloons_with_text.png\",\"PNG\")\nplt.imshow(new_img)\nplt.axis(\"off\")\nplt.show()\n\
    ```\n\n![](img/0b361ff0232ac001b102b7f7c8d33dc4_106_1.png)\n\n## EXERCISES\n\n\
    When I created the wordcloud tutorial it was the 23rd of December. This explains\
    \ why the exercises are dealing with Christmas. Actually, I used the pictures\
    \ as Christmas cards. So, you will be able to create your customized Christmas\
    \ and birthday card with Python!\n\n## EXERCISE 1\n\nCreate a wordcloud in the\
    \ shape of a christmas tree with Python. You can use the following black-and-white\
    \ christmas tree for this purpose:\n\nxmas_tree.png\n\nWe also provided a text\
    \ filled with words related to Xmas:\n\nChristmas Phrases\n\n## EXERCISE 2\n\n\
    This exercise is Xmas related as well. This time, you may use the pictures\n\n\
    The first one can be used to create the wordcloud:\n\nchristmas_tree_bulbs.jpg\n\
    \nThe second one can be overlayed with the wordcloud:\n\nchristmas_tree_bulbs.jpg\n\
    \n## SOLUTIONS\n\n### SOLUTION TO EXERCISE 1\n\n```\n# load Christmas tree mask\n\
    xmas_tree_mask = np.array(Image.open(\"img_dir/xmas_tree.png\"))\n\ntext = open(\"\
    data/xmas.txt\").read()\n\nwc = WordCloud(background_color=\"white\",\n      \
    \         max_words=1000,\n               mask=xmas_tree_mask,\n             \
    \  repeat=True,\n               stopwords=STOPWORDS,\n               contour_width=7,\n\
    \               contour_color='darkgreen')\n\n# Generate a wordcloud\nwc.generate(text)\n\
    \n# store to file\nwc.to_file(\"images/xmas_tree_wordcloud.png\")\n\n# show\n\
    plt.figure(figsize=[20,10])\nplt.imshow(wc, interpolation='bilinear')\nplt.axis(\"\
    off\")\nplt.show()\n```\n\n![](img/0b361ff0232ac001b102b7f7c8d33dc4_108_0.png)\n\
    \n### SOLUTION TO EXERCISE 2\n\n```\n# read text\ntext = open(\"data/xmas_jackie.txt\"\
    ).read()\n\ntree_bulbs_img = np.array(Image.open(\"img_dir/christmas_tree_bulbs.jpg\"\
    ))\nwordcloud_bulbs = WordCloud(background_color=\"white\",\n                \
    \           mode=\"RGB\",\n                           repeat=True,\n         \
    \                  max_words=1000,\n                           mask=tree_bulbs_img).generate(text)\n\
    \n# create coloring from image\nimage_colors = ImageColorGenerator(tree_bulbs_img)\n\
    ```\n\nWe will overlay the wordcloud image now with the picture including leaves:\n\
    \n```\ntree_bulbs_img = Image.fromarray(wordcloud_bulbs.to_array())\ntree_bulbs_leaves_img\
    \ = np.array(Image.open(\"img_dir/christmas_tree_bulbs_leaves.jpg\"))\ntree_bulbs_leaves_img\
    \ = Image.fromarray(tree_bulbs_leaves_img)\n\nnew_img = Image.blend(tree_bulbs_img,\n\
    \                      tree_bulbs_leaves_img,\n                      0.5)\n\n\
    # to save the newly created image uncomment the following line\nnew_img.save(\"\
    images/christmas_tree_bulbs_wordcloud_jackie.png\",\"PNG\")\n\nplt.figure(figsize=[15,\
    \ 16])\nplt.imshow(new_img)\n\nplt.axis(\"off\")\nplt.show()\n```"
  mdcn: "## 词云\n\n## 简介\n\n词云（Word Clouds）通常也被称为标签云，但我更喜欢“词云”这个术语。我认为这个术语更通用，也更容易被大多数人理解。“标签”一词主要用于标注文本，尤其是网站。这意味着找出描述或分类文本的最重要单词或术语。在网页开发的早期，人们必须为网站添加标签，以便搜索引擎更容易对其进行分类。垃圾信息制造者利用这一点，通过提供不正确甚至误导性的标签来操纵搜索引擎，从而使其网站排名更高。谷歌通过自动识别文本组件的重要性改变了这一状况。谷歌或多或少忽略了网站所有者为其页面分配的标签。我们使用的“词云”同样能自动找出最重要的单词。当然，我们采用的是简单的方法，即只计算出现次数并使用停用词。这不是找出单词“真正”重要性的正确方法，但正如我们将在下文中看到的，它能产生非常有趣的结果。\n\
    \n![](img/0b361ff0232ac001b102b7f7c8d33dc4_101_0.png)\n\n我们还没有定义什么是“词云”。它是文本数据的一种可视化表示。大小和颜色用于显示单词或术语在文本中的相对重要性。一个术语越大，其权重就越大。因此，大小反映了单词的频率，这可能与其重要性相对应。\n\
    \n本教程将演示如何使用 Python 创建你自己的词云。我们将使用 Python 模块 Numpy、Matplotlib、Pillow、Pandas 和\
    \ wordcloud。\n\nwordcloud 模块并非大多数 Python 发行版的一部分。如果你使用 Anaconda，可以通过 shell 命令轻松安装它：\n\
    \n```\nconda install -c conda-forge wordcloud\n```\n\n不幸的是，这对于我们在本教程中要做的所有事情来说还不够。因此，你将需要从\
    \ github 安装最新版本：\n\n```\ngit clone https://github.com/amueller/word_cloud.git\n\
    cd word_cloud\npip install .\n```\n\n```\n# 导入必要的模块：\nimport numpy as np\n```\n\
    \n```\npython\nimport pandas as pd\nfrom wordcloud import WordCloud, STOPWORDS,\
    \ ImageColorGenerator\n\nimport matplotlib.pyplot as plt\nfrom PIL import Image\n\
    ```\n\n```\npython\ntext = open(\"data/peace_and_love.txt\").read()\n\nwordcloud\
    \ = WordCloud().generate(text)\n\n# 显示生成的图像：\nplt.imshow(wordcloud)\nplt.axis(\"\
    off\")\nplt.show()\n```\n\n![](img/0b361ff0232ac001b102b7f7c8d33dc4_102_0.png)\n\
