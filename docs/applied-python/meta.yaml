  md: "# TURKISH DATIVE\n\nThe dative case is formed by adding `e` or `a` as a suffix\
    \ to the end of the word (not necessarily a noun). If the last syllable of the\
    \ word has one of the vowels 'a', 'ı', 'o' or 'u', an 'a' has to be added to the\
    \ end of the word. If the last syllable of the word has one of the vowels 'e',\
    \ 'i', 'ö', or 'ü', an 'e' has to be appended. One more important thing: Turkish\
    \ doesn't like to vowels beside of each other. Therefore, we will add a \"y\"\
    \ in front ot the 'e' or 'a', if the last letter of the word is a vowel.\n\nNow\
    \ we are ready to implement the `dative` function. It will suffix the dative ending\
    \ to a given word. The `dative` function needs a function `last_vowel` which comes\
    \ back with two values:\n\n+   - the vowel in the last syllable\n- `True` or `False`\
    \ to indicate if the word ends with a vowel\n\n```\ndef last_vowel(word):\n  \
    \  vowels = {'ı', 'a', 'e', 'i', 'o', 'u', 'ö', 'ü'}\n    ends_with_vowel = True\n\
    \    for char in word[::-1]:\n        if char in vowels:\n            return char,\
    \ ends_with_vowel\n        ends_with_vowel = False\n\ndef dative(word):\n    lv,\
    \ ends_with_vowel = last_vowel(word)\n    if lv in {'i', 'e', 'ö', 'ü'}:\n   \
    \     ret_vowel = 'e'\n    elif lv in {'a', 'ı', 'o', 'u'}:\n        ret_vowel\
    \ = 'a'\n    if ends_with_vowel:\n        return word + \"y\" + ret_vowel\n  \
    \  else:\n        return word + ret_vowel\n```\n\nWe can check the `dative` function\
    \ by calling it with the numbers in `digits_list`: \n\n```\nfor word in digits_list:\n\
    \    print(word, dative(word))\n```"
