- md: "# Applied Python\n\nby\nBernd Klein\n\n![](img/0b361ff0232ac001b102b7f7c8d33dc4_0_0.png)\n\
    \nbodenseo\n\n© 2021 Bernd Klein\n\nAll rights reserved. No portion of this book\
    \ may be reproduced or used in any manner without written permission from the\
    \ copyright owner.\n\nFor more information, contact address: [bernd.klein@python-course.eu](mailto:bernd.klein@python-course.eu)\n\
    \nwww.python-course.eu\n\n# Python Course Applied Python Programming by Bernd\
    \ Klein\n\n- os Module .............................................................................................................5\n\
    - Finite State Machine (FSM) ....................................................................................34\n\
    - Turing Machine ........................................................................................................39\n\
    - Formal Definition of a Turing machine....................................................................40\n\
    - Implementation of a Turing machine in Python ........................................................41\n\
    - Towers of Hanoi ........................................................................................................58\n\
    - Mastermind / Bulls and Cows ..................................................................................65\n\
    - Python and JSON........................................................................................................73\n\
    \n# PYTHON AND THE SHELL\n\n## SHELL\n\nShell is a term, which is often used and\
    \ often misunderstood. Like the shell of an egg, either hen or Python snake, or\
    \ a mussel, the shell in computer science is generally seen as a piece of software\
    \ that provides an interface for a user to some other software or the operating\
    \ system. So the shell can be an interface between the operating system and the\
    \ services of the kernel of this operating system. But a web browser or a program\
    \ functioning as an email client can be seen as shell as well.\n\n![](img/0b361ff0232ac001b102b7f7c8d33dc4_4_0.png)\n\
    \nUnderstanding this, it's obvious that a shell can be either\n\n- a command-line\
    \ interface (CLI) or\n- a graphical user interface (GUI)\n\nBut in most cases\
    \ the term shell is used as a synonym for a command line interface (CLI). The\
    \ best known and most often used shells under Linux and Unix are the Bourne-Shell,\
    \ C-Shell or Bash shell. The Bourne shell (sh) was modelled after the Multics\
    \ shell, and is the first Unix shell. Most operating system shells can be used\
    \ in both interactive and batch mode.\n\n## SYSTEM PROGRAMMING AND PYTHON\n\n\
    System programming (also known as systems programming) stands for the activity\
    \ of programming system components or system software. System programming provides\
    \ software or services to the computer hardware, while application programming\
    \ produces software which provides tools or services for the user.\n\n\"System\
    \ focused programming\" serves as an abstraction layer between the application,\
    \ i.e. the Python script or program, and the operating system, e.g. Linux or Microsoft\
    \ Windows. By means of such an abstraction layer it is possible to implement platform\
    \ independent applications in Python, even if they access operating specific functionalities.\
    \ Python provides various modules to interact with the operating system, such\
    \ as\n\n- os\n- platform\n- subprocess\n- shutils\n- glob\n- sys\n\nTherefore\
    \ Python is well suited for system programming, or even platform independent system\
    \ programming. This is one of the reasons by the way why Python is wrongly considered\
    \ by many as a scripting language. The proper way to say it: Python is a full-fledged\
    \ programming language which can be easily used as a scripting language. The general\
    \ advantages of Python are valid in system focused programming as well:\n\n- simple\
    \ and clear\n- well structured\n- highly flexible\n\n# OS MODULE\n\nThe os module\
    \ is the most important module for interacting with the operating system. The\
    \ os module allows platform independent programming by providing abstract methods.\
    \ Nevertheless it is also possible by using the system() and the exec() function\
    \ families to include system independent program parts. (Remark: The exec()-Functions\
    \ are introduced in detail in our chapter \"Forks and Forking in Python\" The\
    \ os module provides various methods, e.g. the access to the file system.\n\n\
    Platform independent application often need to know on which platform the program\
    \ or script is running. The `os` module provides with `os.name` the perfect command\
    \ for this purpose:\n\n```python\nimport os\n\nprint(os.name)\n\nposix\n```\n\n\
    The output is of course dependent on the operating system you are running. As\
    \ of Python version 3.8 the following names are registered: `posix`, `nt`, `java`.\n\
    \nThese names define the following operating systems:\n\n- **posix**: Unix-like\
    \ operating systems like Unix, Linux, BSD, Minix and others.\n- **nt**: Windows\
    \ systems like \"Windows 10\", \"Windows 8.1\", \"Windows 8\", \"Windows 7\" and\
    \ so on.\n- **java**: Java operating system.\n\nMost Python scripts dealing with\
    \ the operating system need to know the position in the file system. The function\
    \ `os.getcwd()` returns a unicode string representing the current working directory.\n\
    \n```python\nprint(os.getcwd())\n\n/home/bernd/Dropbox (Bodenseo)/notebooks/advanced_topics\n\
    ```\n\nYou also need the capability to move around in your filesystem. For this\
    \ purpose the module `os` provides the function `chdir`. It has a parameter path,\
    \ which is specified as a string. If called it will change the current working\
    \ directory to the specified path.\n\n```python\nos.chdir(\"/home/bernd/dropbox/websites/python-course.eu/cities\"\
    )\nprint(os.getcwd())\n\n/home/bernd/Dropbox (Bodenseo)/websites/python-course.eu/cities\n\
    ```\n\nAfter you have reached the desired directory, you may want to get its content.\
    \ The function `listdir` returns a list containing the names of the files of this\
    \ directory.\n\n```python\nprint(os.listdir())\n\n['Freiburg.png', 'Stuttgart.png',\
    \ 'Hamburg.png', 'Berlin.png', 'Basel.png', 'Nürnberg.png', 'Erlangen.png', 'index.html',\
    \ 'Ulm.png', 'Singen.png', 'Bremen.png', 'Kassel.png', 'Frankfurt.png', 'Saarbrücken.png',\
    \ 'Zürich.png', 'Konstanz.png', 'Hannover.png']\n```\n\n# EXECUTING SHELL SCRIPTS\
    \ WITH OS.SYSTEM()\n\nIt's not possible in Python to read a character without\
    \ having to type the return key as well. On the other hand this is very easy on\
    \ the Bash shell. The Bash command `read -n 1` waits for a key (any key) to be\
    \ typed. If you import os, it's easy to write a script providing `getch()` by\
    \ using `os.system()` and the Bash shell. `getch()` waits just for one character\
    \ to be typed without a return:\n\n```python\nimport os\ndef getch():\n    os.system(\"\
    bash -c \\\"read -n 1\\\"\")\n\ngetch()\n```\n\nThe script above works only under\
    \ Linux. Under Windows you will have to import the module msvcrt. Principally\
    \ we only have to import getch() from this module. So this is the Windows solution\
    \ of the problem:\n\n```python\nfrom msvcrt import getch\n```\n\nThe following\
    \ script implements a platform independent solution to the problem:\n\n```python\n\
    import os, platform\nif platform.system() == \"Windows\":\n    import msvcrt\n\
    def getch():\n    if platform.system() == \"Linux\":\n        os.system('bash\
    \ -c \"read -n 1\"')\n    else:\n        msvcrt.getch()\n\nprint(\"Type a key!\"\
    )\ngetch()\nprint(\"Okay\")\n```\n\nType a key!\nOkay\n\nThe previous script harbours\
    \ a problem. You can't use the getch() function, if you are interested in the\
    \ key which has been typed, because os.system() doesn't return the result of the\
    \ called shell commands.\n\nWe show in the following script, how we can execute\
    \ shell scripts and return the output of these scripts into python by using os.popen():\n\
    \n```python\nimport os\ndir = os.popen(\"ls\").readlines()\n\nprint(dir)\n\n['Basel.png\\\
    n', 'Berlin.png\\n', 'Bremen.png\\n', 'Erlangen.png\\n', 'Frankfurt.png\\n', 'Freiburg.png\\\
    n', 'Hamburg.png\\n', 'Hannover.png\\n', 'index.html\\n', 'Kassel.png\\n', 'Konstanz.png\\\
    n', 'Nürnberg.png\\n', 'Saarbrücken.png\\n', 'Singen.png\\n', 'Stuttgart.png\\\
    n', 'Ulm.png\\n', 'Zürich.png\\n']\n```\n\nThe output of the shell script can\
    \ be read line by line, as can be seen in the following example:\n\n```python\n\
    import os\n\ncommand = \" \"\nwhile (command != \"exit\"):\n    command = input(\"\
    Command: \")\n    handle = os.popen(command)\n    line = \" \"\n    while line:\n\
    \        line = handle.read()\n        print(line)\n    handle.close()\n\nprint(\"\
    Ciao that's it!\")\n```"
  mdcn: "# 应用Python\n\n作者\nBernd Klein\n\n![](img/0b361ff0232ac001b102b7f7c8d33dc4_0_0.png)\n\
    \nbodenseo\n\n© 2021 Bernd Klein\n\n版权所有。未经版权所有者书面许可，不得以任何方式复制或使用本书的任何部分。\n\n\
    更多信息，请联系：[bernd.klein@python-course.eu](mailto:bernd.klein@python-course.eu)\n\
    \nwww.python-course.eu\n\n# Python课程 应用Python编程 作者：Bernd Klein\n\n- os模块 .............................................................................................................5\n\
    - 有限状态机（FSM） ....................................................................................34\n\
    - 图灵机 ........................................................................................................39\n\
    - 图灵机的形式化定义....................................................................40\n\
    - Python中的图灵机实现 ........................................................41\n-\
    \ 汉诺塔 ........................................................................................................58\n\
    - 猜数字游戏（Mastermind / Bulls and Cows） ..................................................................................65\n\
    - Python与JSON........................................................................................................73\n\
    \n# PYTHON与SHELL\n\n## SHELL\n\nShell是一个经常被使用但也常被误解的术语。就像蛋壳（无论是鸡蛋还是蟒蛇蛋）或贝壳一样，计算机科学中的shell通常被视为一个软件，它为用户提供与其他软件或操作系统交互的接口。因此，shell可以是操作系统与其内核服务之间的接口。但网页浏览器或作为电子邮件客户端的程序也可以被视为shell。\n\
    \n![](img/0b361ff0232ac001b102b7f7c8d33dc4_4_0.png)\n\n理解了这一点，很明显shell可以是：\n\n\
    - 命令行界面（CLI）或\n- 图形用户界面（GUI）\n\n但在大多数情况下，shell一词被用作命令行界面（CLI）的同义词。在Linux和Unix下最著名且最常用的shell是Bourne-Shell、C-Shell或Bash\
    \ shell。Bourne shell（sh）是仿照Multics shell设计的，是第一个Unix shell。大多数操作系统shell都可以在交互模式和批处理模式下使用。\n\
    \n## 系统编程与Python\n\n系统编程（也称为系统软件编程）指的是为系统组件或系统软件进行编程的活动。系统编程为计算机硬件提供软件或服务，而应用程序编程则为用户提供工具或服务的软件。\n\
    \n“以系统为中心的编程”充当应用程序（即Python脚本或程序）与操作系统（例如Linux或Microsoft Windows）之间的抽象层。通过这样的抽象层，即使访问操作系统特定功能，也可以在Python中实现平台无关的应用程序。Python提供了各种与操作系统交互的模块，例如：\n\
    \n- os\n- platform\n- subprocess\n- shutils\n- glob\n- sys\n\n因此，Python非常适合系统编程，甚至是平台无关的系统编程。顺便说一句，这也是为什么Python被许多人错误地认为是脚本语言的原因之一。正确的说法是：Python是一种功能齐全的编程语言，可以轻松用作脚本语言。Python的一般优势在以系统为中心的编程中同样适用：\n\
    \n- 简单清晰\n- 结构良好\n- 高度灵活\n\n# OS模块\n\nos模块是与操作系统交互最重要的模块。os模块通过提供抽象方法，允许进行平台无关的编程。尽管如此，也可以使用`system()`和`exec()`函数族来包含与系统无关的程序部分。（注：`exec()`函数在我们的章节“Python中的Fork与Forking”中有详细介绍。）os模块提供了多种方法，例如访问文件系统。\n\
    \n平台无关的应用程序通常需要知道程序或脚本运行在哪个平台上。`os`模块提供了`os.name`命令，非常适合此目的：\n\n```python\nimport\
    \ os\n\nprint(os.name)\n\nposix\n```\n\n输出当然取决于你运行的操作系统。从Python 3.8版本开始，注册了以下名称：`posix`、`nt`、`java`。\n\
    \n这些名称定义了以下操作系统：\n\n- **posix**：类Unix操作系统，如Unix、Linux、BSD、Minix等。\n- **nt**：Windows系统，如“Windows\
    \ 10”、“Windows 8.1”、“Windows 8”、“Windows 7”等。\n- **java**：Java操作系统。\n\n大多数处理操作系统的Python脚本需要知道在文件系统中的位置。函数`os.getcwd()`返回一个表示当前工作目录的Unicode字符串。\n\
    \n```python\nprint(os.getcwd())\n\n/home/bernd/Dropbox (Bodenseo)/notebooks/advanced_topics\n\
    ```\n\n你还需要在文件系统中移动的能力。为此，`os`模块提供了`chdir`函数。它有一个参数`path`，指定为字符串。调用时，它会将当前工作目录更改为指定的路径。\n\
    \n```python\nos.chdir(\"/home/bernd/dropbox/websites/python-course.eu/cities\"\
    )\nprint(os.getcwd())\n\n/home/bernd/Dropbox (Bodenseo)/websites/python-course.eu/cities\n\
    ```\n\n到达所需目录后，你可能想要获取其内容。函数`listdir`返回一个包含该目录中文件名的列表。\n\n```python\nprint(os.listdir())\n\
    \n['Freiburg.png', 'Stuttgart.png', 'Hamburg.png', 'Berlin.png', 'Basel.png',\
    \ 'Nürnberg.png', 'Erlangen.png', 'index.html', 'Ulm.png', 'Singen.png', 'Bremen.png',\
    \ 'Kassel.png', 'Frankfurt.png', 'Saarbrücken.png', 'Zürich.png', 'Konstanz.png',\
    \ 'Hannover.png']\n```\n\n# 使用OS.SYSTEM()执行Shell脚本\n\n在Python中，无法在不按回车键的情况下读取单个字符。另一方面，在Bash\
    \ shell中这非常容易。Bash命令`read -n 1`等待输入一个键（任意键）。如果你导入os，使用`os.system()`和Bash shell可以轻松编写一个提供`getch()`的脚本。`getch()`只等待输入一个字符，无需回车：\n\
    \n```python\nimport os\ndef getch():\n    os.system(\"bash -c \\\"read -n 1\\\"\
    \")\n\ngetch()\n```\n\n上面的脚本仅在Linux下有效。在Windows下，你需要导入模块`msvcrt`。原则上，我们只需要从该模块导入`getch()`。所以这是该问题的Windows解决方案：\n\
    \n```python\nfrom msvcrt import getch\n```\n\n以下脚本实现了一个平台无关的解决方案：\n\n```python\n\
    import os, platform\nif platform.system() == \"Windows\":\n    import msvcrt\n\
    def getch():\n    if platform.system() == \"Linux\":\n        os.system('bash\
    \ -c \"read -n 1\"')\n    else:\n        msvcrt.getch()\n\nprint(\"Type a key!\"\
    )\ngetch()\nprint(\"Okay\")\n```\n\nType a key!\nOkay\n\n前面的脚本存在一个问题。如果你想知道按下了哪个键，就不能使用`getch()`函数，因为`os.system()`不会返回调用的shell命令的结果。\n\
    \n我们在下面的脚本中展示如何使用`os.popen()`执行shell脚本并将这些脚本的输出返回到Python中：\n\n```python\nimport\
    \ os\ndir = os.popen(\"ls\").readlines()\n\nprint(dir)\n\n['Basel.png\\n', 'Berlin.png\\\
    n', 'Bremen.png\\n', 'Erlangen.png\\n', 'Frankfurt.png\\n', 'Freiburg.png\\n',\
    \ 'Hamburg.png\\n', 'Hannover.png\\n', 'index.html\\n', 'Kassel.png\\n', 'Konstanz.png\\\
    n', 'Nürnberg.png\\n', 'Saarbrücken.png\\n', 'Singen.png\\n', 'Stuttgart.png\\\
    n', 'Ulm.png\\n', 'Zürich.png\\n']\n```\n\nshell脚本的输出可以逐行读取，如下例所示：\n\n```python\n\
    import os\n\ncommand = \" \"\nwhile (command != \"exit\"):\n    command = input(\"\
    Command: \")\n    handle = os.popen(command)\n    line = \" \"\n    while line:\n\
    \        line = handle.read()\n        print(line)\n    handle.close()\n\nprint(\"\
    Ciao that's it!\")\n```"
