  md: '# RULES OF THE GAME


    The rules of the game are very simple, but the solution is not so obvious. The
    game "Towers of Hanoi" uses three rods. A number of disks is stacked in decreasing
    order from the bottom to the top of one rod, i.e. the largest disk at the bottom
    and the smallest one on top. The disks build a conical tower.


    The aim of the game is to move the tower of disks from one rod to another rod.


    The following rules have to be obeyed:


    +   - Only one disk may be moved at a time.

    - Only the most upper disk from one of the rods can be moved in a move

    - It can be put on another rod, if this rod is empty or if the most upper disk
    of this rod is larger than the one which is moved.


    # NUMBER OF MOVES


    The number of moves necessary to move a tower with n disks can be calculated as:
    $2^n - 1$


    # PLAYING AROUND TO FIND A SOLUTION


    From the formula above, we know that we need 7 moves to move a tower of size 3
    from the most left rod (let''s call it SOURCE to the most right tower (TARGET).


    The pole in the middle (we will call it AUX) is needed as an auxiliary stack to
    deposit disks temporarily.'
  merge: -1
  pgno: 60
- img_proc: true
  md: 'Before we examine the case with 3 disks, as it is depicted in the image on
    the right side, we will have a look at towers of size 1 (i.e. just one disk) and
    size 2. The solution for a tower with just one disk is straightforward: We will
    move the one disk on the SOURCE tower to the TARGET tower and we are finished.


    Let''s look now at a tower with size 2, i.e. two disks. There are two possibilities
    to move the first disk, the disk on top of the stack of SOURCE: We can move this
    disk either to TARGET or to AUX.


    +   - So let''s start by moving the smallest disk from SOURCE to TARGET. Now there
    are two choices: We can move this disk again, either back to the SOURCE peg, which
    obviously doesn''t make sense, or we could move it to AUX, which doesn''t make
    sense either, because we could have moved there as our first step. So the only
    move which makes sense is moving the other disk, i.e. the largest disk, to peg
    AUX. Now, we have to move the smallest disk again, because we don''t want to move
    the largest disk back to SOURCE again. We can move the smallest disk to AUX. Now
    we can see that we have moved the tower of size 2 to the peg AUX, but the target
    had been peg TARGET. We have already used the maximal number of moves, i.e. 2^2
    - 1 = 3

    - Moving the smallest disk from peg SOURCE to TARGET as our first step has not
    shown to be successful. So, we will move this disk to peg AUX in our first step.
    After this we move the second disk to TARGET. After this we move the smallest
    disk from AUX to TARGET and we have finished our task!


    </ul> We have seen in the cases n=1 and n=2 that it depends on the first move,
    if we will be able to successfully and with the minimal number of moves solve
    the riddle. We know from our formula that the minimal number of moves necessary
    to move a tower of size 3 from the SOURCE peg to the target peg is 7 (2^3 - 1)
    You can see in the solution, which we present in our image that the first disk
    has to be moved from the peg SOURCE to the peg TARGET. If your first step consists
    of moving the smallest disk to AUX, you will not be capable of finishing the task
    with less than 9 moves.


    ![](img/0b361ff0232ac001b102b7f7c8d33dc4_61_0.png)'
