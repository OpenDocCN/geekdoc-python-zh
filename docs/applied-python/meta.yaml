    # DEGREE AND DEGREE SEQUENCE


    The **degree** of a vertex v in a graph is the number of edges connecting it,
    with loops counted twice. The degree of a vertex v is denoted deg(v). The maximum
    degree of a graph G, denoted by Δ(G), and the minimum degree of a graph, denoted
    by δ(G), are the maximum and minimum degree of its vertices.


    ![](img/0b361ff0232ac001b102b7f7c8d33dc4_26_0.png)


    In the graph on the right side, the maximum degree is 5 at vertex c and the minimum
    degree is 0, i.e the isolated vertex f.


    If all the degrees in a graph are the same, the graph is a regular graph.


    In a regular graph, all degrees are the same, and so we can speak of the degree
    of the graph.


    The degree sum formula (Handshaking lemma):


    Σv ∈ vdeg(v) = 2 |E|


    This means that the sum of degrees of all the vertices is equal to the number
    of edges multiplied by 2. We can conclude that the number of vertices with odd
    degree has to be even. This statement is known as the handshaking lemma. The name
    "handshaking lemma" stems from a popular mathematical problem: In any group of
    people the number of people who have shaken hands with an odd number of other
    people from the group is even.


    The **degree sequence** of an undirected graph is defined as the sequence of its
    vertex degrees in a non-increasing order. The following method returns a tuple
    with the degree sequence of the instance graph:


    We will design a new class `Graph2` now, which inherits from our previously defined
    graph `Graph` and we add the following methods to it:


    +   - `vertex_degree`

    - `find_isolated_vertices`

    - `delta`

    - `degree_sequence`


