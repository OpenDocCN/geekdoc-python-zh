  md: '# OS MODULE


    The os module is the most important module for interacting with the operating
    system. The os module allows platform independent programming by providing abstract
    methods. Nevertheless it is also possible by using the system() and the exec()
    function families to include system independent program parts. (Remark: The exec()-Functions
    are introduced in detail in our chapter "Forks and Forking in Python" The os module
    provides various methods, e.g. the access to the file system.


    Platform independant application often need to know on which platform the program
    or script is running. The `os` module provides with `os.name` the perfect command
    for this purpose:


    ```

    import os


    print(os.name)


    posix

    ```


    The output is of course dependant on the the operating system you are running.
    As of Python version 3.8 the following names are registered: `posix`, `nt`, `java`.


    These names define the following operating systems:


    +   **posix**

    Unix-like operating systems like Unix, Linux, BSD, Minix and others.


    **nt**

    Windows systems like "Windows 10", "Windows 8.1", "Windows 8", "Windows 7" and
    so on.


    **java**

    Java operating system.


    Most Python scripts dealing with the operating system need to know the postion
    in the file system. The function `os.getcwd()` returns a unicode string representing
    the current working directory.


    ```

    print(os.getcwd())


    /home/bernd/Dropbox (Bodenseo)/notebooks/advanced_topics

    ```


    You also need the capability to move around in your filesystem. For this purpose
    the module `os` provides the function `chdir`. It has a parameter path, which
    is specified as a string. If called it will change the current working directory
    to the specified path.


    ```

    os.chdir("/home/bernd/dropbox/websites/python-course.eu/cities")

    print(os.getcwd())

    ```'
