  md: '# MASTERMIND / BULLS AND COWS


    # INTRODUCTION


    In this chapter of our advanced Python topics we present an implementation of
    the game Bulls and Cows. This game, which is also known as "Cows and Bulls" or
    "Pigs and Bulls", is an old code-breaking game played by two players. The game
    goes back to the 19th century and can be played with paper and pencil. Bulls and
    Cows -- also known as Cows and Bulls or Pigs and Bulls or Bulls and Cleots --
    was the inspirational source of Mastermind, a game invented in 1970 by Mordecai
    Meirowitz. The game is played by two players. Mastermind and "Bulls and Cows"
    are very similar and the underlying idea is essentially the same, but Mastermind
    is sold in a box with a decoding board and pegs for the coding and the feedback
    pegs. Mastermind uses colours as the underlying code information, while Bulls
    and Cows uses digits.


    ![](img/0b361ff0232ac001b102b7f7c8d33dc4_66_0.png)'
