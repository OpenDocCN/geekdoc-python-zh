    \ module, which can be saved as combinatorics.py:\n\n```python\nimport random\n\
    \ndef fac(n):\n    if n == 0:\n        return 1\n    else:\n        return (fac(n-1)\
    \ * n)\n\ndef permutations(items):\n    n = len(items)\n    if n==0: yield []\n\
    \    else:\n        for i in range(len(items)):\n            for cc in permutations(items[:i]+items[i+1:]):\n\
