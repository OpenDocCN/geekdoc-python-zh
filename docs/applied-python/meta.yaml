    ```\n\n## 有限状态机（FSM）\n\n“有限状态机”（缩写为 FSM），也称为“状态机”或“有限状态自动机”，是一种抽象机器，它由一组状态（包括初始状态和一个或多个终止状态）、一组输入事件、一组输出事件和一个状态转换函数组成。转换函数以当前状态和一个输入事件作为输入，并返回新的输出事件集和下一个（新的）状态。其中一些状态被用作“终止状态”。\n\
