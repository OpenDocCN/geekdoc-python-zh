    ```\n\n## FINITE STATE MACHINE (FSM)\n\nA \"Finite State Machine\" (abbreviated\
    \ FSM), also called \"State Machine\" or \"Finite State Automaton\" is an abstract\
    \ machine which consists of a set of states (including the initial state and one\
    \ or more end states), a set of input events, a set of output events, and a state\
    \ transition function. A transition function takes the current state and an input\
    \ event as an input and returns the new set of output events and the next (new)\
    \ state. Some of the states are used as \"terminal states\".\n\n![](img/0b361ff0232ac001b102b7f7c8d33dc4_35_0.png)\n\
    \nThe operation of an FSM begins with a special state, called the start state,\
    \ proceeds through transitions depending on input to different states and normally\
    \ ends in terminal or end states. A state which marks a successful flow of operation\
    \ is known as an accept state.\n\n**Mathematical Model:**\nA deterministic finite\
    \ state machine or acceptor deterministic finite state machine is a quintuple\n\
    (Σ,S,s0,δ,F),\nwhere:\nΣ is the input alphabet (a finite, non-empty set of symbols).\n\
    S is a finite, non-empty set of states.\ns0 is an initial state, an element of\
    \ S.\nδ is the state-transition function: δ : S x Σ → S\n(in a nondeterministic\
    \ finite state machine it would be δ : S x Σ → ℘ (S), i.e., δ would return a set\
    \ of states).\n(℘ (S) is the Power set of S)\nF is the set of final states, a\
    \ (possibly empty) subset of S.\n\n## A SIMPLE EXAMPLE\n\nWe want to recognize\
    \ the meaning of very small sentences with an extremely limited vocabulary and\
    \ syntax.\n\nThese sentences should start with \"Python is\" followed by\n\n-\
    \ an adjective or\n- the word \"not\" followed by an adjective. e.g.\n\n  \"Python\
    \ is great\" → positive meaning\n\n  \"Python is stupid\" → negative meaning\n\
    \n  \"Python is not ugly\" → positive meaning\n\n![](img/0b361ff0232ac001b102b7f7c8d33dc4_36_0.png)\n\
    \n## A FINITE STATE MACHINE IN PYTHON\n\nTo implement the previous example, we\
    \ program first a general Finite State Machine in Python.\n\n```python\nclass\
    \ StateMachine:\n\n    def __init__(self):\n        self.handlers = {}\n     \
    \   self.startState = None\n        self.endStates = []\n\n    def add_state(self,\
    \ name, handler, end_state=0):\n        name = name.upper()\n        self.handlers[name]\
    \ = handler\n        if end_state:\n            self.endStates.append(name)\n\n\
    \    def set_start(self, name):\n        self.startState = name.upper()\n\n  \
    \  def run(self, cargo):\n        try:\n            handler = self.handlers[self.startState]\n\
    \        except:\n            raise InitializationError(\"must call .set_start()\
    \ before .run()\")\n        if not self.endStates:\n            raise InitializationError(\"\
    at least one state must be an end_state\")\n\n        while True:\n          \
    \  (newState, cargo) = handler(cargo)\n            if newState.upper() in self.endStates:\n\
    \                print(\"reached \", newState)\n                break\n      \
    \      else:\n                handler = self.handlers[newState.upper()]\n```\n\
    \nThis general FSM is used in the next program:\n\n```python\npositive_adjectives\
    \ = [\"great\",\"super\", \"fun\", \"entertaining\", \"easy\"]\nnegative_adjectives\
    \ = [\"boring\", \"difficult\", \"ugly\", \"bad\"]\n\ndef start_transitions(txt):\n\
    \    splitted_txt = txt.split(None,1)\n    word, txt = splitted_txt if len(splitted_txt)\
    \ > 1 else (txt,\"\")\n    if word == \"Python\":\n        newState = \"Python_state\"\
    \n    else:\n        newState = \"error_state\"\n    return (newState, txt)\n\n\
    def python_state_transitions(txt):\n    splitted_txt = txt.split(None,1)\n   \
    \ word, txt = splitted_txt if len(splitted_txt) > 1 else (txt,\"\")\n    if word\
    \ == \"is\":\n        newState = \"is_state\"\n    else:\n        newState = \"\
    error_state\"\n    return (newState, txt)\n\ndef is_state_transitions(txt):\n\
    \    splitted_txt = txt.split(None,1)\n    word, txt = splitted_txt if len(splitted_txt)\
    \ > 1 else (txt,\"\")\n    if word == \"not\":\n        newState = \"not_state\"\
    \n    elif word in positive_adjectives:\n        newState = \"pos_state\"\n  \
    \  elif word in negative_adjectives:\n        newState = \"neg_state\"\n    else:\n\
    \        newState = \"error_state\"\n    return (newState, txt)\n\ndef not_state_transitions(txt):\n\
    \    splitted_txt = txt.split(None,1)\n    word, txt = splitted_txt if len(splitted_txt)\
    \ > 1 else (txt,\"\")\n    if word in positive_adjectives:\n        newState =\
    \ \"neg_state\"\n    elif word in negative_adjectives:\n        newState = \"\
    pos_state\"\n    else:\n        newState = \"error_state\"\n    return (newState,\
    \ txt)\n\ndef neg_state(txt):\n    print(\"Hallo\")\n    return (\"neg_state\"\
    , \"\")\n\nm = StateMachine()\nm.add_state(\"Start\", start_transitions)\nm.add_state(\"\
    Python_state\", python_state_transitions)\nm.add_state(\"is_state\", is_state_transitions)\n\
    m.add_state(\"not_state\", not_state_transitions)\nm.add_state(\"neg_state\",\
    \ None, end_state=1)\nm.add_state(\"pos_state\", None, end_state=1)\nm.add_state(\"\
    error_state\", None, end_state=1)\nm.set_start(\"Start\")\nm.run(\"Python is great\"\
    )\nm.run(\"Python is difficult\")\nm.run(\"Perl is ugly\")\n```"
  mdcn: "## 具有任意数量参数的柯里化函数\n\n一个有趣的问题仍然存在：如何对一个具有任意且未知数量参数的函数进行柯里化？\n\n我们可以使用嵌套函数来实现参数的“柯里化”（累积）。我们需要一种方式来告诉函数计算并返回值。如果函数被调用时带有参数，这些参数将被柯里化，正如我们之前所说。如果我们调用函数时不带任何参数呢？没错，这是一个绝佳的方式，可以告诉函数我们最终想要得到结果。我们也可以清空累积值的列表：\n\
    \n```python\ndef arimean(*args):\n    return sum(args) / len(args)\n\ndef curry(func):\n\
    \    # to keep the name of the curried function:\n    curry.__curried_func_name__\
    \ = func.__name__\n    f_args, f_kwargs = [], {}\n    def f(*args, **kwargs):\n\
    \        nonlocal f_args, f_kwargs\n        if args or kwargs:\n            f_args\
    \ += args\n            f_kwargs.update(kwargs)\n            return f\n       \
    \ else:\n            result = func(*f_args, *f_kwargs)\n            f_args, f_kwargs\
    \ = [], {}\n            return result\n    return f\n```\n\n```python\ncurried_arimean\
    \ = curry(arimean)\ncurried_arimean(2)(5)(9)(4, 5)\n# it will keep on currying:\n\
