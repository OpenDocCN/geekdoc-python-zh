    ### ORIGINS OF GRAPH THEORY


    Before we start with the actual implementations of graphs in Python and before
    we start with the introduction of Python modules dealing with graphs, we want
    to devote ourselves to the origins of graph theory.


    The origins take us back in time to the Königsberg of the 18th century. Königsberg
    was a city in Prussia that time. The river Pregel flowed through the town, creating
    two islands. The city and the islands were connected by seven bridges as shown.
    The inhabitants of the city were moved by the question, if it was possible to
    take a walk through the town by visiting each area of the town and crossing each
    bridge only once? Every bridge must have been crossed completely, i.e. it is not
    allowed to walk halfway onto a bridge and then turn around and later cross the
    other half from the other side. The walk need not start and end at the same spot.
    Leonhard Euler solved the problem in 1735 by proving that it is not possible.


    He found out that the choice of a route inside each land area is irrelevant and
    that the only thing which mattered is the order (or the sequence) in which the
    bridges are crossed. He had formulated an abstraction of the problem, eliminating
    unnecessary facts and focussing on the land areas and the bridges connecting them.
    This way, he created the foundations of graph theory. If we see a "land area"
    as a vertex and each bridge as an edge, we have "reduced" the problem to a graph.


