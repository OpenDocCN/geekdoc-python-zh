    \n```\nIn[]:\n```\n\n## MUSIC AND FIBONACCI\n\n## FIBONACCI SEQUENCE\n\nThe Fibonacci\
    \ sequence or numbers - named after Leonardo of Pisa, also known as Fibonacci\
    \ - have fascinated not only mathematicians for centuries. Fibonacci formulated\
