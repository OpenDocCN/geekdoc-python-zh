- md: "## MASTERMIND / BULLS AND COWS\n\n## INTRODUCTION\n\nIn this chapter of our\
    \ advanced Python topics we present an implementation of the game Bulls and Cows.\
    \ This game, which is also known as \"Cows and Bulls\" or \"Pigs and Bulls\",\
    \ is an old code-breaking game played by two players. The game goes back to the\
    \ 19th century and can be played with paper and pencil. Bulls and Cows -- also\
    \ known as Cows and Bulls or Pigs and Bulls or Bulls and Cleots -- was the inspirational\
    \ source of Mastermind, a game invented in 1970 by Mordecai Meirowitz. The game\
    \ is played by two players. Mastermind and \"Bulls and Cows\" are very similar\
