    \ and the smallest one on top. The disks build a conical tower.\n\nThe aim of\
    \ the game is to move the tower of disks from one rod to another rod.\n\nThe following\
    \ rules have to be obeyed:\n\n- Only one disk may be moved at a time.\n- Only\
    \ the most upper disk from one of the rods can be moved in a move\n- It can be\
