  mdcn: "在我们研究右侧图像所示的3个圆盘的情况之前，我们先来看看规模为1（即只有一个圆盘）和规模为2的塔。只有一个圆盘的塔的解决方案很简单：我们将SOURCE塔上的那个圆盘移动到TARGET塔上，任务就完成了。\n\
    \n现在让我们看看规模为2的塔，即两个圆盘。移动第一个圆盘（即SOURCE堆栈顶部的圆盘）有两种可能性：我们可以将这个圆盘移动到TARGET或AUX。\n\n\
    - 所以让我们先将最小的圆盘从SOURCE移动到TARGET。现在有两个选择：我们可以再次移动这个圆盘，要么移回SOURCE柱，这显然没有意义；要么移动到AUX，这也没有意义，因为我们本可以第一步就把它移到那里。所以唯一有意义的移动是将另一个圆盘，即最大的圆盘，移动到AUX柱。现在，我们必须再次移动最小的圆盘，因为我们不想再把最大的圆盘移回SOURCE。我们可以将最小的圆盘移动到AUX。现在我们可以看到，我们已经将规模为2的塔移动到了AUX柱，但目标本应是TARGET柱。我们已经使用了最大移动次数，即2^2\
    \ - 1 = 3。\n- 将最小的圆盘从SOURCE柱移动到TARGET作为第一步并未成功。所以，我们第一步将这个圆盘移动到AUX柱。之后，我们将第二个圆盘移动到TARGET。然后，我们将最小的圆盘从AUX移动到TARGET，我们就完成了任务！\n\
    \n我们在n=1和n=2的情况下看到，是否能够成功并以最少的移动次数解决这个谜题，取决于第一步。根据我们的公式，我们知道将一个规模为3的塔从SOURCE柱移动到目标柱所需的最小移动次数是7（2^3\
    \ - 1）。你可以在我们图像中展示的解决方案中看到，第一个圆盘必须从SOURCE柱移动到TARGET柱。如果你的第一步是将最小的圆盘移动到AUX，那么你将无法在少于9步内完成任务。\n\
    \n![](img/0b361ff0232ac001b102b7f7c8d33dc4_61_0.png)\n\n让我们将圆盘编号为D₁（最小）、D₂和D₃（最大），并将柱子命名为S（SOURCE柱）、A（AUX）、T（TARGET）。我们可以看到，我们在三步内将规模为2的塔（圆盘D₁和D₂）移动到A。现在我们可以将D₃移动到T，它最终就位于那里。最后三步将由D₂D₁组成的塔从A柱移动到T，将它们放置在D₃的顶部。\n\
    \n![](img/0b361ff0232ac001b102b7f7c8d33dc4_62_0.png)\n\n将一个规模为n（n > 1）的塔从S柱移动到T柱有一个通用规则：\n\
    \n- 将n - 1个圆盘Dₙ₋₁ ... D₁组成的塔从S移动到A。圆盘Dₙ单独留在S柱上。\n- 将圆盘Dₙ移动到T。\n- 将A柱上n - 1个圆盘Dₙ₋₁\
    \ ... D₁组成的塔移动到T，即这个塔将被放置在圆盘D₃的顶部。\n\n我们刚刚定义的算法是一个递归算法，用于移动一个规模为n的塔。它实际上就是我们将在Python实现中用来解决汉诺塔问题的算法。步骤2是简单的圆盘移动。但为了完成步骤1和3，我们对规模为n-1的塔再次应用相同的算法。计算将在有限的步骤内完成，因为每次递归启动时，塔的规模都比调用函数中的塔小1。所以最终我们将得到一个规模为n\
    \ = 1的塔，即一次简单的移动。\n\n## 递归Python程序\n\n以下Python脚本包含一个递归函数“hanoi”，它实现了汉诺塔的递归解决方案：\n\
    \n```\ndef hanoi(n, source, helper, target):\n    if n > 0:\n        # move tower\
    \ of size n - 1 to helper:\n        hanoi(n - 1, source, target, helper)\n   \
