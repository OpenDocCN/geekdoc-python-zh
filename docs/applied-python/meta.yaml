  - "[PAGE 35]\n\n# FINITE STATE MACHINE (FSM)\n\nA \"Finite State Machine\" (abbreviated\
    \ FSM), also called \"State Machine\" or \"Finite State Automaton\" is an abstract\
    \ machine which consists of a set of states (including the initial state and one\
    \ or more end states), a set of input events, a set of output events, and a state\
    \ transition function. A transition function takes the current state and an input\
    \ event as an input and returns the new set of output events and the next (new)\
    \ state. Some of the states are used as \"terminal states\".\n\n![](img/0b361ff0232ac001b102b7f7c8d33dc4_35_0.png)\n\
    \nThe operation of an FSM begins with a special state, called the start state,\
    \ proceeds through transitions depending on input to different states and normally\
    \ ends in terminal or end states. A state which marks a successful flow of operation\
    \ is known as an accept state.\n\n**Mathematical Model:**\nA deterministic finite\
    \ state machine or acceptor deterministic finite state machine is a quintuple\n\
    (Σ,S,s0,δ,F),\nwhere:\nΣ is the input alphabet (a finite, non-empty set of symbols).\n\
    S is a finite, non-empty set of states.\ns0 is an initial state, an element of\
    \ S.\nδ is the state-transition function: δ : S x Σ → S\n(in a nondeterministic\
    \ finite state machine it would be δ : S x Σ → ℘ (S), i.e., δ would return a set\
    \ of states).\n(℘ (S) is the Power set of S)\nF is the set of final states, a\
    \ (possibly empty) subset of S.\n\n# A SIMPLE EXAMPLE\n\nWe want to recognize\
    \ the meaning of very small sentences with an extremely limited vocabulary and\
    \ syntax.\n\nThese sentences should start with \"Python is\" followed by\n\n+\
    \   - an adjective or\n- the word \"not\" followed by an adjective. e.g.\n\n \
    \ \"Python is great\" → positive meaning\n\n  \"Python is stupid\" → negative\
    \ meaning"
