- img_proc: true
  md: '# RULES OF THE GAME


    Bulls and Cows


    We start with the rules of "Bulls and Cows":

    It''s a pencil and paper game played by two players. The two players write a 4-digit
    number on a sheet of paper. The digits must be all different, but there is a version,
    where digits can be used more than once. Each player has to find out the opponent''s
    secret code. To this purpose, the players - in turn - try to guess the opponent''s
    number. The opponent has to score the guess: A "bull" is a digit which is located
    at the right position. If, for example, the hidden code is "4 3 2 5" and the guess
    is "4 3 1 2", then we have the two bulls "4" and "3" in the guess "4 3 1 2". A
    "Cow" on the other hand is a correct number, which is on the wrong position. The
    "2" of the previous example is a cow.


    ![](img/0b361ff0232ac001b102b7f7c8d33dc4_67_0.png)


    The first player to reveal the other''s secret number is the winner of the game.


    The secret numbers for bulls and cows are usually 4-digit-numbers, but the game
    can be played with 3 to 6 digit numbers.


    There are lots of computer implementations of "Bulls and Cows". The first one
    was a program called moo, written in PL/I.


    Mastermind


    Mastermind obeys essentially the same rules as "Bulls and Cows", but colours are
    used instead of digits. Mastermind is a commercial board game, which is played
    on a decoding board with a shield on one side hiding a row of four large holes
    to put in coloured pegs, i.e. the secret code, which has to be found out by the
    opponent. There are 8 to 12 rows of four holes for the guesses, which are open
    to the view. Beside of each row, there is a set of four small holes for the black
    and white score pegs.


    # THE IMPLEMENTATION


    The following program is a Python implementation (Python3), which is capable of
    breaking a colour code of four positions and six colours, but these numbers are
    scalable. The colour code is not allowed to contain multiple occurrences of colours.
    We need the function all_colours from the following combinatorics module, which
    can be saved as combinatorics.py:'
  merge: -1
  pgno: 67
- img_proc: true
  md: "```\nimport random\n\ndef fac(n):\n    if n == 0:\n        return 1\n    else:\n\
    \        return (fac(n-1) * n)\n\ndef permutations(items):\n    n = len(items)\n\
    \    if n==0: yield []\n    else:\n        for i in range(len(items)):\n     \
    \       for cc in permutations(items[:i]+items[i+1:]):\n                yield\
    \ [items[i]]+cc\n\ndef k_permutations(items, n):\n    if n==0: yield []\n    else:\n\
    \        for i in range(len(items)):\n            for ss in k_permutations(items,\
    \ n-1):\n                if (not items[i] in ss):\n                    yield [items[i]]+ss\n\
    \ndef random_permutation(list):\n    length = len(list);\n    max = fac(length);\n\
    \    index = random.randrange(0, max)\n    i = 0\n    for p in permutations(list):\n\
    \        if i == index:\n            return p\n        i += 1\n\ndef all_colours(colours,\
    \ positions):\n    colours = random_permutation(colours)\n    for s in k_permutations(colours,\
    \ positions):\n        yield(s)\n```\n\nIf you want to know more about permutations,\
    \ you may confer to our chapter about \"generators and iterators\". The function\
    \ all_colours is essentially like k_permutations, but it starts the sequence of\
    \ permutations with a random permutations, because we want to make sure that the\
    \ computer starts each new game with a completely new guess."
  merge: -1
  pgno: 68
- img_proc: true
  md: "The colours, which are used for the guesses, are defined in a list assigned\
    \ to the variable \"colours\". It's possible to put in different elements into\
    \ this list, e.g.\n\n```\ncolours = [\"a\", \"b\", \"c\", \"d\", \"e\", \"f\"\
    ]\n```\n\nor something like the following assignment, which doesn't make a lot\
    \ of sense in terms of colours:\n\n```\ncolours = [\"Paris blue\", \"London green\"\
    , \"Berlin black\", \"Vienna yellow\", \"Frankfurt red\", \"Hamburg brown\"]\n\
    ```\n\nThe list \"guesses\" has to be empty. All the guesses with the scores from\
    \ the human player will be saved in this list. It might look like this in a game:\n\
    \n```\n([['pink', 'green', 'blue', 'orange'], (1, 1)),\n(['pink', 'blue', 'red',\
    \ 'yellow'], (1, 2)),\n(['pink', 'orange', 'yellow', 'red'], (0, 2))]\n```\n\n\
    We can see that guesses is a list of tuples. Each tuple contains a list of colours¹\
