  md: '# PYTHON AND JSON


    # INTRODUCTION


    JSON stands for JavaScript Object Notation. JSON is an open standard file and
    data interchange format. The content of a JSON file or JSON data is human-readable.
    JSON is used for storing and exchanging data. The JSON data objects consist of
    attribute–value pairs. The data format of JSON looke very similar to a Python
    dictionary, but JSON is a language-independent data format. The JSON syntax is
    derived from JavaScript object notation syntax, but the JSON format is text only.
    JSON filenames use the extension .json.


    ![](img/0b361ff0232ac001b102b7f7c8d33dc4_74_0.png)


    # DUMPS AND LOAD


    It is possible to serialize a Python dict object to a JSON formatted string by
    using `dumps` from the `json` module:


    ```

    import json


    d = {"a": 3, "b": 3, "c": 12}


    json.dumps(d)

    Output: ''{"a": 3, "b": 3, "c": 12}''

    ```


    The JSON formatted string looks exactly like a Python dict in a string format.
    In the followoing example, we can see a difference: "True" and "False" are turned
    in "true" and "false":


    ```

    d = {"a": True, "b": False, "c": True}


    d_json = json.dumps(d)

    d_json

    Output: ''{"a": true, "b": false, "c": true}''

    ```


    We can transform the json string back in a Python dictionary:


    ```

    json.loads(d_json)

    ```'
