    ## SUBPROCESS MODULE


    The subprocess module is available since Python 2.4. It''s possible to create
    spawn processes with the module subprocess, connect to their input, output, and
    error pipes, and obtain their return codes. The module subprocess was created
    to replace various other modules:


    - os.system

    - os.spawn*

    - os.popen*

    - popen2.*

    - commands.*


    ## WORKING WITH THE SUBPROCESS MODULE


    Instead of using the system method of the os-Module


    ```

    os.system(''Konstanz.png'')

    ```


    Output: 32256


    we can use the Popen() command of the subprocess Module. By using Popen() we are
    capable to get the output of the script:


    ```

    import subprocess

    x = subprocess.Popen([''touch'', ''xyz''])

    print(x)

    print(x.poll())

    print(x.returncode)

    ```


    Output:


    ```

    <subprocess.Popen object at 0x7f92c5319290>

    None

    None

    ```


    The shell command `cp -r xyz abc` can be send to the shell from Python by using
    the Popen() method of the subprocess-Module in the following way:


    ```

    p = subprocess.Popen([''cp'',''-r'', "Zürich.png", "Zurich.png"])

    ```


    There is no need to escape the Shell metacharacters like $, >, ... and so on.
    If you want to emulate the behaviour of `os.system`, the optional parameter shell
    has to be set to `True` and we have to use a string instead of a list:


    ```

    p = subprocess.Popen("cp -r xyz abc", shell=True)

    ```


    As we have mentioned above, it is also possible to catch the output from the shell
    command or shell script into Python. To do this, we have to set the optional parameter
    `stdout` of `Popen()` to `subprocess.PIPE`:


    ```

    process = subprocess.Popen([''ls'',''-l''], stdout=subprocess.PIPE)

    directory_content = process.stdout.readlines()

    print(directory_content)

    ```


