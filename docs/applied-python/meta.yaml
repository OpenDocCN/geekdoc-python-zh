- md: "## CURRYING FUNCTION WITH AN ARBITRARY NUMBER OF ARGUMENTS\n\nOne interesting\
    \ question remains: How to curry a function across an arbitrary and unknown number\
    \ of parameters?\n\nWe can use a nested function to make it possible to \"curry\"\
    \ (accumulate) the arguments. We will need a way to tell the function calculate\
    \ and return the value. If the function is called with arguments, these will be\
    \ curried, as we have said. What if we call the function without any arguments?\
    \ Right, this is a fantastic way to tell the function that we finally want the\
    \ result. We can also clean the lists with the accumulated values:\n\n```python\n\
    def arimean(*args):\n    return sum(args) / len(args)\n\ndef curry(func):\n  \
    \  # to keep the name of the curried function:\n    curry.__curried_func_name__\
    \ = func.__name__\n    f_args, f_kwargs = [], {}\n    def f(*args, **kwargs):\n\
    \        nonlocal f_args, f_kwargs\n        if args or kwargs:\n            f_args\
    \ += args\n            f_kwargs.update(kwargs)\n            return f\n       \
    \ else:\n            result = func(*f_args, *f_kwargs)\n            f_args, f_kwargs\
    \ = [], {}\n            return result\n    return f\n```\n\n```python\ncurried_arimean\
    \ = curry(arimean)\ncurried_arimean(2)(5)(9)(4, 5)\n# it will keep on currying:\n\
    curried_arimean(5, 9)\nprint(curried_arimean())\n\n# calculating the arithmetic\
    \ mean of 3, 4, and 7\nprint(curried_arimean(3)(4)(7)())\n\n# calculating the\
    \ arithmetic mean of 4, 3, and 7\nprint(curried_arimean(4)(3, 7)())\n```\n\n```\n\
    5.571428571428571\n4.666666666666667\n4.666666666666667\n```\n\nLet's compare\
    \ it with the result of the original arimean function:\n\n```python\nprint(arimean(2,\
    \ 5, 9, 4, 5, 5, 9))\nprint(arimean(3, 4, 7))\nprint(arimean(4, 3, 7))\n```\n\n\
    ```\n5.571428571428571\n4.666666666666667\n4.666666666666667\n```\n\nIncluding\
