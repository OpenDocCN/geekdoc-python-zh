    \nfunc_values_as_strings = [str(func(x)) for x in numbers]\nnotes = \"\".join(\
    \ func_values_as_strings)\npos = 0\nn = len(notes)\nrval = yield n\nwhile True:\n\
    \    new_pos = (pos + k) % n\n    if pos + k < n:\n        rval = yield notes[pos:new_pos]\n\
    \    else:\n        rval = yield notes[pos:] + notes[:new_pos]\n    if rval:\n\
    \        k = rval\n    pos = new_pos\n```\n\n```\nfrom itertools import cycle\n\
