    # WORD CLOUDS


    # INTRODUCTION


    Word Clouds (WordClouds) are quite often called Tag clouds, but I prefer the term
    word cloud. It think this term is more general and easier to be understood by
    most people. The term tag is used for annotating texts and especially websites.
    This means finding out the most important words or terms characterizing or classifying
    a text. In the early days of web development people had to tag their websites
    so that search engines could easier classify them. Spemmer used this to manipulate
    the search engines by giving incorrect or even misleading tags so that their websites
    ranked higher. Google changed this by automatically finding out the importance
    of the text components. Google more or less disregarding the tags which the owners
    of the websites assigned to their pages. "Word clouds" as we use them also find
    out automatically what are the most important words. Of course, we do it naively
    by just counting the number of occurrances and using stop words. This is not the
    correct way to find out about the "real" importance of words, but leads to very
    interesting results, as we will see in the following.


    ![](img/0b361ff0232ac001b102b7f7c8d33dc4_101_0.png)


    We still haven''t defined what a "word cloud" is. It is a visual representation
    of text data. Size and colors are used to show the relative importance of words
    or terms in a text. The bigger a term is the greater is its weight. So the size
    reflects the frequency of a words, which may correspond to its importance.


    We will demonstrate in this tutorial how to create you own WordCloud with Python.
    We will use the Python modules Numpy, Matplotlib, Pillow, Pandas, and wordcloud
    in this tutorial.


    The module wordcloud is not part of most of the Python distribution. If you use
    Anaconda, you can easily install it with the shell command


    ```

    conda install -c conda-forge wordcloud

    ```


    Unfortunately, this is not enough for all the things we are doing in this tutorial.
    So you will have to install the latest version from github:


    ```

    git clone https://github.com/amueller/word_cloud.git

    cd word_cloud

    pip install .

    ```


    ```

    # importing the necessary modules:

    import numpy as np

