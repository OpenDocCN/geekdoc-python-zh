    ## Python 中的图


    ### 图论的起源


    在我们开始 Python 中图的实际实现之前，在我们开始介绍处理图的 Python 模块之前，我们想探讨一下图论的起源。


    起源将我们带回到 18 世纪的柯尼斯堡。柯尼斯堡当时是普鲁士的一座城市。普雷格尔河穿城而过，形成了两个岛屿。城市和岛屿由七座桥连接，如图所示。城市的居民被这样一个问题所困扰：是否可能在城镇中散步，访问城镇的每个区域，并且只穿过每座桥一次？每座桥都必须完全穿过，即不允许走到桥的一半然后转身，稍后从另一边穿过另一半。散步不需要从同一个地方开始和结束。莱昂哈德·欧拉在
    1735 年通过证明这是不可能的解决了这个问题。


    他发现，在每个陆地区域内选择路线是无关紧要的，唯一重要的是穿过桥梁的顺序（或序列）。他提出了问题的抽象，消除了不必要的事实，专注于陆地区域和连接它们的桥梁。这样，他奠定了图论的基础。如果我们把“陆地区域”看作一个顶点，把每座桥看作一条边，我们就把问题“简化”成了一个图。


