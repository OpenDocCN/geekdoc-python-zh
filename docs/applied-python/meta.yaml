    \ δ : S x Σ → ℘(S)，即 δ 将返回一个状态集合）。\n(℘(S) 是 S 的幂集)\nF 是终止状态集合，是 S 的一个（可能为空的）子集。\n\
    \n## 一个简单的例子\n\n我们希望用极其有限的词汇和语法来识别非常小的句子的含义。\n\n这些句子应该以“Python is”开头，后面跟着\n\n\
