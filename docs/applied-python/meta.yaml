  md: "Let's number the disks as D₁ (smallest), D₂ and D₃ (largest) and name the pegs\
    \ as S (SOURCE peg), A (AUX), T (TARGET). We can see that we move in three moves\
    \ the tower of size 2 (the disks D₁ and D₂) to A. Now we can move D₃ to T, where\
    \ it is finally positioned. The last three moves move the tower consisting of\
    \ D₂D₁ from peg A to T to place them on top of D₃.\n\n![](img/0b361ff0232ac001b102b7f7c8d33dc4_62_0.png)\n\
    \nThere is a general rule for moving a tower of size n (n > 1) from the peg S\
    \ to the peg T:\n\n+   - move a tower of n - 1 discs Dₙ₋₁ ... D₁ from S to A.\
    \ Disk Dₙ is left alone on peg S\n- Move disk Dₙ to T\n- move the tower of n -\
    \ 1 discs Dₙ₋₁ ... D₁ on A to T, i.e. this tower will be put on top of Disk Dₙ\n\
    \nThe algorithm, which we have just defined, is a recursive algorithm to move\
    \ a tower of size n. It actually is the one, which we will use in our Python implementation\
    \ to solve the Towers of Hanoi. Step 2 is a simple move of a disk. But to accomplish\
    \ the steps 1 and 3, we apply the same algorithm again on a tower of n-1. The\
    \ calculation will finish with a finite number of steps, because very time the\
    \ recursion will be started with a tower which is 1 smaller than the one in the\
    \ calling function. So finally we will end up with a tower of size n = 1, i.e.\
    \ a simple move.\n\n# RECURSIVE PYTHON PROGRAM\n\nThe following Python script\
    \ contains a recursive function \"hanoi\", which implements a recursive solution\
    \ for Towers of Hanoi:\n\n```\ndef hanoi(n, source, helper, target):\n    if n\
    \ > 0:\n        # move tower of size n - 1 to helper:\n        hanoi(n - 1, source,\
    \ target, helper)\n        # move disk from source peg to target peg\n       \
    \ if source:\n            target.append(source.pop())\n        # move tower of\
    \ size n-1 from helper to target\n        hanoi(n - 1, helper, source, target)\n\
    \nsource = [4,3,2,1]\ntarget = []\n```"
