    # TURING MACHINE


    ![](img/0b361ff0232ac001b102b7f7c8d33dc4_40_0.png)


    Just to let you know straight-away: The Turing machine is not a machine. It is
    a mathematical model, which was formulated by the English mathematician Alan Turing
    in 1936. It''s a very simple model of a computer, yet it has the complete computing
    capability of a general purpose computer. The Turing machine (TM) serves two needs
    in theoretical computer science:


    +   1. The class of languages defined by a TM, i.e. structured or recursively
    enumerable languages

    2. The class of functions a TM is capable to compute, i.e. the partial recursive
    functions


    A Turing machine consists only of a few components: A tape on which data can be
    sequentially stored. The tape consists of fields, which are sequentially arranged.
    Each field can contain a character of a finite alphabet. This tape has no limits,
    it goes on infinitely in both directions. In a real machine, the tape would have
    to be large enough to contain all the data for the algorithm. A TM also contains
    a head moving in both directions over the tape. This head can read and write one
    character from the field over which the head resides. The Turing machine is at
    every moment in a certain state, one of a finite number of states. A Turing program
    is a list of transitions, which determine for a given state and character ("under"
    the head) a new state, a character which has to be written into the field under
    the head and a movement direction for the head, i.e. either left, right or static
    (motionless).'
  - "[PAGE 41]\n\n# FORMAL DEFINITION OF A TURING MACHINE\n\nA deterministic Turing\
    \ machine can be defined as a 7-tuple\n\nM = (Q, Σ, Γ, δ, b, q₀, qf)\n\nwith\n\
    \n+   - Q is a finite, non-empty set of states\n- Γ is a finite, non-empty set\
    \ of the tape alphabet\n- Σ is the set of input symbols with Σ ⊂ Γ\n- δ is a partially\
    \ defined function, the transition function:\n  δ : (Q \\ {qf}) x Γ → Q x Γ x\
    \ {L,N,R}\n- b ∈ Γ \\ Σ is the blank symbol\n- q₀ ∈ Q is the initial state\n-\
    \ qf ∈ Q is the set of accepting or final states\n\n# EXAMPLE: BINARY COMPLEMENT\
    \ FUNCTION\n\nLet's define a Turing machine, which complements a binary input\
    \ on the tape, i.e. an input \"1100111\" e.g. will be turned into \"0011000\"\
    .\nΣ = {0, 1}\nQ = {init, final}\nq₀ = init\nqf = final\n\n| Function Definition\
    \ | Description |\n| :--- | :--- |\n| δ(init,0) = (init, 1, R) | If the machine\
    \ is in state \"init\" and a 0 is read by the head, a 1 will be written, the state\
    \ will change to \"init\" (so actually, it will not change) and the head will\
    \ be moved one field to the right. |\n| δ(init,1) = (init, 0, R) | If the machine\
    \ is in state \"init\" and a 1 is read by the head, a 0 will be written, the state\
    \ will change to \"init\" (so actually, it will not change) and the head will\
    \ be moved one field to the right. |\n| δ(init,b) = (final, b, N) | If a blank\
    \ (\"b\"), defining the end of the input string, is read, the TM reaches the final\
    \ state \"final\" and halts. |"
