- md: "## TURING MACHINE\n\n![](img/0b361ff0232ac001b102b7f7c8d33dc4_40_0.png)\n\n\
    Just to let you know straight-away: The Turing machine is not a machine. It is\
    \ a mathematical model, which was formulated by the English mathematician Alan\
    \ Turing in 1936. It's a very simple model of a computer, yet it has the complete\
    \ computing capability of a general purpose computer. The Turing machine (TM)\
    \ serves two needs in theoretical computer science:\n\n1.  The class of languages\
    \ defined by a TM, i.e. structured or recursively enumerable languages\n2.  The\
    \ class of functions a TM is capable to compute, i.e. the partial recursive functions\n\
    \nA Turing machine consists only of a few components: A tape on which data can\
    \ be sequentially stored. The tape consists of fields, which are sequentially\
    \ arranged. Each field can contain a character of a finite alphabet. This tape\
    \ has no limits, it goes on infinitely in both directions. In a real machine,\
    \ the tape would have to be large enough to contain all the data for the algorithm.\
    \ A TM also contains a head moving in both directions over the tape. This head\
    \ can read and write one character from the field over which the head resides.\
    \ The Turing machine is at every moment in a certain state, one of a finite number\
    \ of states. A Turing program is a list of transitions, which determine for a\
    \ given state and character (\"under\" the head) a new state, a character which\
    \ has to be written into the field under the head and a movement direction for\
    \ the head, i.e. either left, right or static (motionless).\n\n## FORMAL DEFINITION\
    \ OF A TURING MACHINE\n\nA deterministic Turing machine can be defined as a 7-tuple\n\
    \nM = (Q, Σ, Γ, δ, b, q₀, qf)\n\nwith\n\n- Q is a finite, non-empty set of states\n\
    - Γ is a finite, non-empty set of the tape alphabet\n- Σ is the set of input symbols\
    \ with Σ ⊂ Γ\n- δ is a partially defined function, the transition function:\n\
    \  δ : (Q \\ {qf}) x Γ → Q x Γ x {L,N,R}\n- b ∈ Γ \\ Σ is the blank symbol\n-\
    \ q₀ ∈ Q is the initial state\n- qf ∈ Q is the set of accepting or final states\n\
    \n## EXAMPLE: BINARY COMPLEMENT FUNCTION\n\nLet's define a Turing machine, which\
    \ complements a binary input on the tape, i.e. an input \"1100111\" e.g. will\
    \ be turned into \"0011000\".\nΣ = {0, 1}\nQ = {init, final}\nq₀ = init\nqf =\
    \ final\n\n| Function Definition | Description |\n| :--- | :--- |\n| δ(init,0)\
    \ = (init, 1, R) | If the machine is in state \"init\" and a 0 is read by the\
    \ head, a 1 will be written, the state will change to \"init\" (so actually, it\
    \ will not change) and the head will be moved one field to the right. |\n| δ(init,1)\
    \ = (init, 0, R) | If the machine is in state \"init\" and a 1 is read by the\
    \ head, a 0 will be written, the state will change to \"init\" (so actually, it\
    \ will not change) and the head will be moved one field to the right. |\n| δ(init,b)\
    \ = (final, b, N) | If a blank (\"b\"), defining the end of the input string,\
    \ is read, the TM reaches the final state \"final\" and halts. |\n\n```python\n\
    def __setitem__(self, pos, char):\n    self.__tape[pos] = char\n```\n\n```python\n\
    class TuringMachine(object):\n\n    def __init__(self,\n                 tape\
    \ = \"\",\n                 blank_symbol = \" \",\n                 initial_state\
    \ = \"\",\n                 final_states = None,\n                 transition_function\
    \ = None):\n        self.__tape = Tape(tape)\n        self.__head_position = 0\n\
    \        self.__blank_symbol = blank_symbol\n        self.__current_state = initial_state\n\
    \        if transition_function == None:\n            self.__transition_function\
    \ = {}\n        else:\n            self.__transition_function = transition_function\n\
    \        if final_states == None:\n            self.__final_states = set()\n \
    \       else:\n            self.__final_states = set(final_states)\n\n    def\
    \ get_tape(self):\n        return str(self.__tape)\n\n    def step(self):\n  \
    \      char_under_head = self.__tape[self.__head_position]\n        x = (self.__current_state,\
    \ char_under_head)\n        if x in self.__transition_function:\n            y\
    \ = self.__transition_function[x]\n            self.__tape[self.__head_position]\
    \ = y[1]\n            if y[2] == \"R\":\n                self.__head_position\
    \ += 1\n            elif y[2] == \"L\":\n                self.__head_position\
    \ -= 1\n            self.__current_state = y[0]\n\n    def final(self):\n    \
    \    if self.__current_state in self.__final_states:\n            return True\n\
    \        else:\n            return False\n```\n\nUsing the TuringMachine class:\n\
    \n```python\ninitial_state = \"init\",\naccepting_states = [\"final\"],\ntransition_function\
    \ = {(\"init\",\"0\"):(\"init\", \"1\", \"R\"),\n                        (\"init\"\
    ,\"1\"):(\"init\", \"0\", \"R\"),\n                        (\"init\",\" \"):(\"\
    final\",\" \", \"N\"),\n                        }\nfinal_states = {\"final\"}\n\
    \nt = TuringMachine(\"010011001 \",\n                  initial_state = \"init\"\
    ,\n                  final_states = final_states,\n                  transition_function=transition_function)\n\
    \nprint(\"Input on Tape:\\n\" + t.get_tape())\n\nwhile not t.final():\n    t.step()\n\
    \nprint(\"Result of the Turing machine calculation:\")\nprint(t.get_tape())\n\
    ```\n\nInput on Tape:\n010011001\nResult of the Turing machine calculation:\n\
    101100110\n\n## TURKISH TIME AND CLOCK\n\n## INTRODUCTION\n\nThis chapter of our\
