  md: '# TOWERS OF HANOI


    # INTRODUCTION


    Why do we present a Python implementation of the "Towers of Hanoi"? The hello-world
    of recursion is the Factorial. This means, you will hardly find any book or tutorial
    about programming languages which doesn''t deal with the first and introductory
    example about recursive functions. Another one is the calculation of the n-th
    Fibonacci number. Both are well suited for a tutorial because of their simplicity
    but they can be easily written in an iterative way as well.


    If you have problems in understanding recursion, we recommend that you go through
    the chapter "Recursive Functions" of our tutorial.


    That''s different with the "Towers of Hanoi". A recursive solution almost forces
    itself on the programmer, while the iterative solution of the game is hard to
    find and to grasp. So, with the Towers of Hanoi we present a recursive Python
    program, which is hard to program in an iterative way.


    # ORIGIN


    There is an old legend about a temple or monastery, which contains three poles.
    One of them filled with 64 gold disks. The disks are of different sizes, and they
    are put on top of each other, according to their size, i.e. each disk on the pole
    a little smaller than the one beneath it. The priests, if the legend is about
    a temple, or the monks, if it is about a monastery, have to move this stack from
    one of the three poles to another one. But one rule has to be applied: a large
    disk can never be placed on top of a smaller one. When they would have finished
    their work, the legend tells, the temple would crumble into dust, and the world
    would end.


    ![](img/0b361ff0232ac001b102b7f7c8d33dc4_59_0.png)


    But don''t be afraid, it''s not very likely that they will finish their work soon,
    because $2^{64} - 1$ moves are necessary, i.e. 18,446,744,073,709,551,615 to move
    the tower according to the rules.


    But there is - most probably - no ancient legend. The legend and the game "towers
    of Hanoi" had been conceived by the French mathematician Edouard Lucas in 1883.'
