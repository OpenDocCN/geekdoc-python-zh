  md: "# FORMAL DEFINITION OF A TURING MACHINE\n\nA deterministic Turing machine can\
    \ be defined as a 7-tuple\n\nM = (Q, Σ, Γ, δ, b, q₀, qf)\n\nwith\n\n+   - Q is\
    \ a finite, non-empty set of states\n- Γ is a finite, non-empty set of the tape\
    \ alphabet\n- Σ is the set of input symbols with Σ ⊂ Γ\n- δ is a partially defined\
    \ function, the transition function:\n  δ : (Q \\ {qf}) x Γ → Q x Γ x {L,N,R}\n\
    - b ∈ Γ \\ Σ is the blank symbol\n- q₀ ∈ Q is the initial state\n- qf ∈ Q is the\
    \ set of accepting or final states\n\n# EXAMPLE: BINARY COMPLEMENT FUNCTION\n\n\
    Let's define a Turing machine, which complements a binary input on the tape, i.e.\
    \ an input \"1100111\" e.g. will be turned into \"0011000\".\nΣ = {0, 1}\nQ =\
    \ {init, final}\nq₀ = init\nqf = final\n\n| Function Definition | Description\
    \ |\n| :--- | :--- |\n| δ(init,0) = (init, 1, R) | If the machine is in state\
    \ \"init\" and a 0 is read by the head, a 1 will be written, the state will change\
    \ to \"init\" (so actually, it will not change) and the head will be moved one\
    \ field to the right. |\n| δ(init,1) = (init, 0, R) | If the machine is in state\
    \ \"init\" and a 1 is read by the head, a 0 will be written, the state will change\
    \ to \"init\" (so actually, it will not change) and the head will be moved one\
    \ field to the right. |\n| δ(init,b) = (final, b, N) | If a blank (\"b\"), defining\
    \ the end of the input string, is read, the TM reaches the final state \"final\"\
    \ and halts. |"
