    # PATHS IN GRAPHS


    We want to find now the shortest path from one node to another node. Before we
    come to the Python code for this problem, we will have to present some formal
    definitions.


    **Adjacent vertices:**

    Two vertices are adjacent when they are both incident to a common edge.


    **Path in an undirected Graph:**

    A path in an undirected graph is a sequence of vertices P = ( v1, v2, ..., vn
    ) ∈ V x V x ... x V such that vi is adjacent to v_{i+1} for 1 ≤ i < n. Such a
    path P is called a path of length n from v1 to vn.

    **Simple Path:**

    A path with no repeated vertices is called a simple path.


    Example:

    (a, c, e) is a simple path in our graph, as well as (a,c,e,b). (a,c,e,b,c,d) is
    a path but not a simple path, because the node c appears twice.'
