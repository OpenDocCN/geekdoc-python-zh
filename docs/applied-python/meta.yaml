    \ into a string 'notes'\nThe length of the string 'notes' is the first value which\
    \ will be yielded\nby a generator object.\nAfter this it will cycle forever over\
    \ the notes and will each\ntime return the next k digits. The value of k can be\
    \ changed by\ncalling the iterator with send and a new k-value.\n\nExample:\n\
    notesgenerator(fib, 1, 1, 2, 3, 5, 8, k=2)\nThe results of applying fib to the\
    \ numbers are\n1, 1, 1, 2, 5, 21\nThe string concatenations gives us\n1112521\n\
