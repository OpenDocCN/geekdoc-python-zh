  md: '# MUSIC AND FIBONACCI


    # FIBONACCI SEQUENCE


    The Fibonacci sequence or numbers - named after Leonardo of Pisa, also known as
    Fibonacci - have fascinated not only mathematicians for centuries. Fibonacci formulated
    an exercise about the rabbits and their reproduction: In the beginning there is
    one pair of rabbits (male and female), born out of the blue sky. It takes one
    month until they can mate. At the end of the second month the female gives birth
    to a new pair of rabbits. It works the same way with every newly born pair of
    rabbits, i.e. that it takes one month until the female one can mate and after
    another month she gives birth to a new pair of rabbits. Now let''s suppose that
    every female rabbit will bring forth another pair of rabbits every month after
    the end of the first month. Be aware of the fact that these "mathematical" rabbits
    are immortal. So the population for the the generations look like this:


    1, 1, 2, 3, 5, 8, 13, 21, ...


    We can easily see that each new number is the sum of the previous two.


    We get to music very soon, and feel free to skip the mathematics, but one thing
    is also worth mentioning. The Fibonacci numbers are strongly related to the Golden
    Ratio $\varphi$:


    $$\varphi = \frac{1 + \sqrt{5}}{2}$$


    because the quotient of last and the previous to last number in this seqence is
    getting closer and closer to $\varphi$:


    $$\lim_{n \to \infty} \frac{F_n}{F_{n-1}} = \varphi$$


    ($F_n$ stands for the n-th Fibonacci number)


    The Fibonacci numbers, often presented in conjunction with the golden ratio, are
    a popular theme in culture.'
