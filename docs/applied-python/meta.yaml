  - '[PAGE 61]


    Before we examine the case with 3 disks, as it is depicted in the image on the
    right side, we will have a look at towers of size 1 (i.e. just one disk) and size
    2. The solution for a tower with just one disk is straightforward: We will move
    the one disk on the SOURCE tower to the TARGET tower and we are finished.


    Let''s look now at a tower with size 2, i.e. two disks. There are two possibilities
    to move the first disk, the disk on top of the stack of SOURCE: We can move this
    disk either to TARGET or to AUX.


    +   - So let''s start by moving the smallest disk from SOURCE to TARGET. Now there
    are two choices: We can move this disk again, either back to the SOURCE peg, which
    obviously doesn''t make sense, or we could move it to AUX, which doesn''t make
    sense either, because we could have moved there as our first step. So the only
    move which makes sense is moving the other disk, i.e. the largest disk, to peg
    AUX. Now, we have to move the smallest disk again, because we don''t want to move
    the largest disk back to SOURCE again. We can move the smallest disk to AUX. Now
    we can see that we have moved the tower of size 2 to the peg AUX, but the target
    had been peg TARGET. We have already used the maximal number of moves, i.e. 2^2
    - 1 = 3

    - Moving the smallest disk from peg SOURCE to TARGET as our first step has not
    shown to be successful. So, we will move this disk to peg AUX in our first step.
    After this we move the second disk to TARGET. After this we move the smallest
    disk from AUX to TARGET and we have finished our task!


    </ul> We have seen in the cases n=1 and n=2 that it depends on the first move,
    if we will be able to successfully and with the minimal number of moves solve
    the riddle. We know from our formula that the minimal number of moves necessary
    to move a tower of size 3 from the SOURCE peg to the target peg is 7 (2^3 - 1)
    You can see in the solution, which we present in our image that the first disk
    has to be moved from the peg SOURCE to the peg TARGET. If your first step consists
    of moving the smallest disk to AUX, you will not be capable of finishing the task
    with less than 9 moves.


    ![](img/0b361ff0232ac001b102b7f7c8d33dc4_61_0.png)'
  - "[PAGE 62]\n\nLet's number the disks as D₁ (smallest), D₂ and D₃ (largest) and\
    \ name the pegs as S (SOURCE peg), A (AUX), T (TARGET). We can see that we move\
    \ in three moves the tower of size 2 (the disks D₁ and D₂) to A. Now we can move\
    \ D₃ to T, where it is finally positioned. The last three moves move the tower\
    \ consisting of D₂D₁ from peg A to T to place them on top of D₃.\n\n![](img/0b361ff0232ac001b102b7f7c8d33dc4_62_0.png)\n\
    \nThere is a general rule for moving a tower of size n (n > 1) from the peg S\
    \ to the peg T:\n\n+   - move a tower of n - 1 discs Dₙ₋₁ ... D₁ from S to A.\
    \ Disk Dₙ is left alone on peg S\n- Move disk Dₙ to T\n- move the tower of n -\
    \ 1 discs Dₙ₋₁ ... D₁ on A to T, i.e. this tower will be put on top of Disk Dₙ\n\
    \nThe algorithm, which we have just defined, is a recursive algorithm to move\
    \ a tower of size n. It actually is the one, which we will use in our Python implementation\
    \ to solve the Towers of Hanoi. Step 2 is a simple move of a disk. But to accomplish\
    \ the steps 1 and 3, we apply the same algorithm again on a tower of n-1. The\
    \ calculation will finish with a finite number of steps, because very time the\
    \ recursion will be started with a tower which is 1 smaller than the one in the\
    \ calling function. So finally we will end up with a tower of size n = 1, i.e.\
    \ a simple move.\n\n# RECURSIVE PYTHON PROGRAM\n\nThe following Python script\
    \ contains a recursive function \"hanoi\", which implements a recursive solution\
    \ for Towers of Hanoi:\n\n```\ndef hanoi(n, source, helper, target):\n    if n\
    \ > 0:\n        # move tower of size n - 1 to helper:\n        hanoi(n - 1, source,\
