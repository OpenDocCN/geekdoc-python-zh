- md: "## Adding Hearing and Vision to the NPC\n\nIn this section, we will add the\
    \ ability to hear and see the player to the NPC. These features will be based\
    \ on the distance between the player and the NPC, as well as their mutual position.\n\
    \nWhile the next section will deal with moving the NPC towards the player when\
    \ the latter is detected, this section will only write a message in the Command\
    \ Prompt when the player has been detected; the color of the NPC will also be\
    \ changed so that you have a visual cue that indicates that the NPC detection\
    \ works.\n\nPlease add the following method to the class:\n\n```python\ndef hear(self):\n\
    \    npc_position = pygame.Vector2()\n    npc_position.xy = self.x, self.y\n \
    \   distance_between_player_and_npc = get_distance(npc_position, player_rect)\n\
    \    if (distance_between_player_and_npc < 50):\n        print(\"Just Heard the\
    \ Player\")\n```\n\nIn the previous code:\n\n- We define a new method called `hear`\
    \ that takes no parameters (bar the `self` parameter to indicate that this is\
    \ a member method).\n- We store the position of the NPC in the variable.\n- We\
    \ then call the method `get_distance` to compute the distance between the NPC\
    \ and the player.\n\nIf this distance is lesser than 50 pixels, we display a message\
    \ in the Command Prompt.\n\nNow that we have defined this method, we just need\
    \ to call it so that the NPC frequently listens to detect the player.\n\nPlease\
    \ add the following code to the method `window` (new code in bold):\n\n```python\n\
    for npc in npcs:\n    npc.draw()\n    npc.move()\n    npc.hear()\n```\n\nYou can\
    \ now save and compile your code; as the game plays, and as you get closer to\
    \ the NPC you should see a message in the Command Prompt saying \"Heard The Player\"\
    . Again, in the next section, we will change the behaviour of the NPC so that\
    \ it starts chasing the player after it has heard him/her.\n\nNext, we can start\
    \ to implement the NPC vision; this feature will be implemented by checking that\
    \ the NPC and the player are in the same row or column. For this purpose, we will\
    \ create two methods that will specify which column the NPC and the player character\
    \ are; by using these methods and by comparing the column or row number for both\
    \ the player and the NPC, we will be able to determine whether they are on the\
    \ same row, and consequently whether the NPC can see the player.\n\nPlease add\
    \ the following method to the class:\n\n```python\ndef which_horizontal_lane_is_item(self,\
    \ x, y, item_size):\n    if (y > 0 and y < 100 - item_size): return 0\n    elif\
    \ (y > 200 and y < 250 - item_size): return 1\n    elif (y > 350 and y < 400 -\
    \ item_size): return 2\n    elif (y > 500): return 3\n    else: return -1\n```\n\
    \nIn the previous code:\n\n- We define a new method called `which_horizontal_lane_is_item`.\n\
    - This method takes two parameters which correspond to the coordinates of the\
    \ item for which we want to determine the current row.\n- Depending on its y coordinate,\
    \ we can specify the current row for the item being considered.\n- These boundaries\
    \ are defined based on the location of the blocks on each row as illustrated in\
    \ the next figure.\n\n![img](img/c9583cf50ad5be24b6f6664ecc4a5c58_107_0.png)\n\
    \nSimilarly, we will also define a method that will return the current column\
    \ for an item.\n\nPlease add the following method to the class:\n\n```python\n\
    def which_vertical_lane_is_item(self, x, y, item_size):\n    if (x > 0 and x <\
    \ 100 - item_size): return 0\n    elif (x > 200 and x < 250 - item_size): return\
    \ 1\n    elif (x > 350 and x < 400 - item_size): return 2\n    elif (x > 500 and\
    \ x < 550 - item_size): return 3\n    elif (x > 650 and x < 700 - item_size):\
    \ return 4\n    elif (x > 800): return 5\n    else: return -1\n```\n\nIn the previous\
    \ code:\n\n- We define a new method called `which_vertical_lane_is_item`.\n- This\
    \ method takes two parameters which correspond to the coordinates of the item\
    \ for which we want to determine the current column.\n- Depending on the x coordinate,\
    \ we can specify the current column for the item being considered.\n- These boundaries\
    \ are defined based on the location of the blocks on each row as illustrated in\
    \ the next figure.\n\n![img](img/c9583cf50ad5be24b6f6664ecc4a5c58_108_0.png)\n\
    \nNow that the two methods have been created, we can use them to compare the columns\
    \ and rows where the player and the NPC are, and to consequently determine whether\
    \ the NPC can see the player (i.e., whether they are on the same column or row).\n\
    \nPlease add the following method to the class:\n\n```python\ndef see(self):\n\
    \    npc_position = pygame.Vector2()\n    npc_position.xy = self.x, self.y\n \
    \   npc_col = self.which_vertical_lane_is_item(npc_position.x,\n    npc_position.y,\
    \ 25)\n    player_col = self.which_vertical_lane_is_item(player_rect.x,\n    player_rect.y,\
    \ 25)\n    npc_row = self.which_horizontal_lane_is_item(npc_position.x,\n    npc_position.y,\
    \ 25)\n    player_row = self.which_horizontal_lane_is_item(player_rect.x,\n  \
    \  player_rect.y, 25)\n```\n\nIn the previous code:\n\n- We define a method called\
    \ `see`.\n- In that method we record the position of the player and the NPC.\n\
    - We then use the methods that we have defined earlier to record the current column\
    \ and row for both the NPC and the player; these values are stored in the variables\
    \ `npc_col`, `player_col`, `npc_row`, and `player_row`.\n\nNow that we have stored\
    \ the row and column for both the player and the NPC, we can compare them to assess\
    \ whether the NPC can see the player (i.e., same column or row).\n\nPlease add\
    \ the following code to the method:\n\n```python\nsame_vertical_lane = (npc_col\
    \ == player_col) and (npc_col != -1)\nsame_horizontal_lane = (npc_row == player_row)\
    \ and (npc_row != -1)\nif (same_vertical_lane or same_horizontal_lane):\n    print(\"\
    >> just saw the Player\")\n    self.color = \"Red\"\n```\n\nIn the previous code,\
    \ we define two variables `same_vertical_lane` and `same_horizontal_lane`; the\
    \ former will be true if the NPC and the player are on the same column, and the\
    \ latter will be true if the NPC and the player are on the same row. If the NPC\
    \ and the player are on the same row or column, then a message is displayed in\
    \ the Command Prompt; we also, for visual effects, change the color of the NPC.\n\
    \nFinally, as we have done for the hearing sense, we just need to make sure that\
    \ we call the method `see` frequently so that the NPC can detect if the player\
    \ is on the same row or column.\n\nPlease add the following code to the method\
    \ `window` (new code in bold):\n\n```python\nfor npc in npcs:\n    npc.draw()\n\
    \    npc.move()\n    npc.hear()\n    npc.see()\n```\n\nIn the previous code we\
    \ just ensure that each NPC can see the player. You can now save and compile your\
    \ code; as the game plays, and as you get closer to (or along the same row/column\
    \ as) the NPC you should see a message in the Command Prompt saying \"Heard The\
    \ Player\" or \"Just saw the Player\".\n\nIn the next section, we will change\
    \ the behaviour of the NPC so that it starts chasing the player after seeing or\
    \ hearing him/her.\n\n## Level Roundup\n\nIn this chapter, we have managed to\
    \ add several features including collision detection and movement for the NPC.\
