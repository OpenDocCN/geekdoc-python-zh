- md: "# Python Games from Zero to Proficiency (Intermediate)\n\nPatrick Felicia\n\
    \nPublished by Patrick Felicia, 2022.\n\n# Table of Contents\n\n[Title Page](Title\
    \ Page)\n\n[Python Games from Zero to Proficiency (Intermediate)](Python Games\
    \ from Zero to Proficiency (Intermediate))\n\n[Chapter 1: Starting with Our Shooter\
    \ Game](Chapter 1: Starting with Our Shooter Game)\n\n[Chapter 2: Creating an\
    \ Inventory](Chapter 2: Creating an Inventory)\n\n[Chapter 3: Adding Collisions\
    \ and Artificial Intelligence](Chapter 3: Adding Collisions and Artificial Intelligence)\n\
    \n[Chapter 4: Creating a Finite State Machine](Chapter 4: Creating a Finite State\
    \ Machine)\n\n[Chapter 5: Polishing our game](Chapter 5: Polishing our game)\n\
    \n[Chapter 6: Frequently Asked Questions](Chapter 6: Frequently Asked Questions)\n\
    \n[Thank you](Thank you)\n\n[Also By Patrick Felicia](Also By Patrick Felicia)\n\
    \n# Python Games From Zero to Proficiency\n\n(intermediate)\n\n# First Edition\n\
    \nA step-by-step guide to coding your first shooter game with Python and Pygame.\n\
    \n# Patrick Felicia\n\n# Python Games From Zero to Proficiency\n\n(intermediate)\n\
    \nCopyright © 2022 Patrick Felicia\n\nAll rights reserved. No part of this book\
    \ may be reproduced, stored in retrieval systems, or transmitted in any form or\
    \ by any means, without the prior written permission of the publisher (Patrick\
    \ Felicia), except in the case of brief quotations embedded in critical articles\
    \ or reviews.\n\nEvery effort has been made in the preparation of this book to\
    \ ensure the accuracy of the information presented. However, the information contained\
    \ in this book is sold without warranty, either expressed or implied. Neither\
    \ the author and its dealers and distributors will be held liable for any damages\
    \ caused or alleged to be caused directly or indirectly by this book.\n\nFirst\
    \ published: October 2022\n\nPublished by Patrick Felicia\n\n# Credits\n\nAuthor:\
    \ Patrick Felicia\n\n# About the Author\n\nPatrick Felicia is a lecturer and researcher\
    \ at Waterford Institute of Technology, where he teaches and supervises undergraduate\
    \ and postgraduate students. He obtained his MSc in Multimedia Technology in 2003\
    \ and PhD in Computer Science in 2009 from University College Cork, Ireland. He\
    \ has published several books and articles on the use of video games for educational\
    \ purposes, including the Handbook of Research on Improving Learning and Motivation\
    \ through Educational Games: Multidisciplinary Approaches (published by IGI),\
    \ and Digital Games in Schools: A Handbook for Teachers, published by European\
    \ Schoolnet. Patrick is also the Editor-in-chief of the International Journal\
    \ of Game-Based Learning (IJGBL), and the Conference Director of the Irish Symposium\
    \ on Game-Based Learning, a popular conference on games and learning organized\
    \ throughout Ireland.\n\n# Support and Resources for this Book\n\nTo complete\
    \ the activities presented in this book you need to download the startup pack\
    \ on the companion website; it consists of free resources that you will need to\
    \ complete your projects. To download these resources, please do the following:\n\
    \nOpen the page\nClick on your book From Zero to Proficiency\n\n![](img/c9583cf50ad5be24b6f6664ecc4a5c58_7_0.png)\n\
    \nOn the new page, please click the link that says Here Click to Download Your\
    \ Resource\n\n![](img/c9583cf50ad5be24b6f6664ecc4a5c58_7_1.png)\n\nThis book is\
    \ dedicated to Mathis\n\n# Table of Contents\n\n- [Credits](Credits)\n- [About\
    \ the Author](About the Author)\n- [Support and Resources for this Book](Support\
    \ and Resources for this Book)\n- [Table of Contents](Table of Contents)\n- [Preface](Preface)\n\
    - [Content Covered by this Book](Content Covered by this Book)\n- [What you Need\
    \ to Use this Book](What you Need to Use this Book)\n- [Who this book is for](Who\
    \ this book is for)\n- [Who this book is not for](Who this book is not for)\n\
    - [How you will learn from this book](How you will learn from this book)\n- [Format\
    \ of Each Chapter and Writing Conventions](Format of Each Chapter and Writing\
    \ Conventions)\n- [Special Notes](Special Notes)\n- [How Can You Learn Best from\
    \ this Book?](How Can You Learn Best from this Book?)\n- [Feedback](Feedback)\n\
    - [Downloading the Solutions for the Book](Downloading the Solutions for the Book)\n\
    - [Improving the Book](Improving the Book)\n- [Supporting the Author](Supporting\
    \ the Author)\n- [Chapter 1: Starting with our shooter game](Chapter 1: Starting\
    \ with our shooter game)\n    - [Moving the NPC using the arrow keys](Moving the\
    \ NPC using the arrow keys)\n    - [Creating a weapon for the player character](Creating\
    \ a weapon for the player character)\n    - [Creating a class for the target(s)](Creating\
    \ a class for the target(s))\n    - [Level roundup](Level roundup)\n    - [Summary](Summary)\n\
    \    - [Quiz](Quiz)\n    - [Answers to the Quiz.](Answers to the Quiz.)\n\n# Checklist\n\
    \n# Chapter 2: Creating an Inventory\n\n- Creating the inventory\n- Switching\
    \ between weapons\n- Collecting ammunitions\n- Level roundup\n- Summary\n- Quiz\n\
    - Answers to the Quiz\n- Checklist\n- Challenge 1\n\n# Chapter 3: Adding Collisions\
    \ and Artificial Intelligence\n\n- Resources necessary for this chapter\n- Adding\
    \ walls\n- Adding collision detection with the walls\n- Moving the NPC with waypoints\n\
    - Adding Hearing and vision to the NPC\n- Level roundup\n- Checklist\n- Quiz\n\
    - Answers to the quiz\n- Challenge 1\n\n# Chapter 4: Creating a Finite State Machine\n\
    \n- Initializing the game\n- Following the player\n- Triggering transitions between\
    \ states\n- Spawning NPCs\n- Level roundup\n- Checklist\n- Quiz\n- Answers to\
    \ the quiz\n- Challenge 1\n\n# Chapter 5: Polishing our game\n\n- Changing the\
    \ appearance of the enemies\n- Displaying dots\n- Detecting Collision with the\
    \ dots and updating the score\n- Displaying the score\n- Detecting collision with\
    \ the NPCs\n- Level roundup\n- Checklist\n- Quiz\n- Solutions to the Quiz\n- Challenge\
    \ 1\n\n# Chapter 6: Frequently Asked Questions\n\n- Scripts\n- Interaction with\
    \ assets\n- Using a graphical user interface\n- Create and use classes\n- Using\
    \ Lists\n- Pictures and Audio\n- Detecting user inputs\n- Thank you\n\n# Preface\n\
    \nThis book will show you how you can very quickly code in Python and create games.\n\
    \nPython is a powerful programming language used in a wide range of industries\
    \ and that you can use even if you have (or you are teaching with) computers with\
    \ very low technical specifications.\n\nThis book series entitled Python Games\
    \ From Zero to Proficiency allows you to play around with Python’s core features,\
    \ and essentially those that will make it possible to create interesting 2D games\
    \ rapidly. After reading this book series, you should find it easier to code in\
    \ Python and to create simple yet entertaining video games.\n\nThis book series\
    \ assumes no prior knowledge on the part of the reader, and it will get you started\
    \ on Python so that you quickly master all the wonderful features that this programming\
    \ language provides by going through an easy learning curve.\n\nBy completing\
    \ each chapter, and by following step-by-step instructions, you will progressively\
    \ improve your skills, become more proficient in Python, and create several games.\n\
    \nIn addition to becoming proficient with Python, you will also create games that\
    \ include many of the common techniques found in video games such as: level design,\
    \ object creation, textures, collision detection, lights, weapon creation, character\
    \ animations, particles, artificial intelligence, and menus.\n\nYou will learn\
    \ how to create customized menus and simple user interfaces using both Python\
    \ and Pygame and animate and give artificial intelligence to Non-Player Characters\
    \ (NPCs) that will be able to follow the player character using pathfinding.\n\
    \nFinally, you will also get to export your game at the different stages of the\
    \ books, so that you can share it with friends and obtain some feedback as well."
  mdcn: "# 从零到精通的Python游戏（中级）\n\nPatrick Felicia\n\n由 Patrick Felicia 于 2022 年出版。\n\
    \n# 目录\n\n[书名页](Title Page)\n\n[从零到精通的Python游戏（中级）](Python Games from Zero to\
    \ Proficiency (Intermediate))\n\n[第1章：从我们的射击游戏开始](Chapter 1: Starting with Our\
    \ Shooter Game)\n\n[第2章：创建物品栏](Chapter 2: Creating an Inventory)\n\n[第3章：添加碰撞和人工智能](Chapter\
    \ 3: Adding Collisions and Artificial Intelligence)\n\n[第4章：创建有限状态机](Chapter 4:\
    \ Creating a Finite State Machine)\n\n[第5章：打磨我们的游戏](Chapter 5: Polishing our game)\n\
    \n[第6章：常见问题解答](Chapter 6: Frequently Asked Questions)\n\n[致谢](Thank you)\n\n[Patrick\
    \ Felicia 的其他著作](Also By Patrick Felicia)\n\n# 从零到精通的Python游戏\n\n（中级）\n\n# 第一版\n\
    \n使用 Python 和 Pygame 编写你的第一个射击游戏的分步指南。\n\n# Patrick Felicia\n\n# 从零到精通的Python游戏\n\
    \n（中级）\n\n版权所有 © 2022 Patrick Felicia\n\n保留所有权利。未经出版商（Patrick Felicia）事先书面许可，不得以任何形式或任何方式复制、存储在检索系统中或传播本书的任何部分，除非在评论文章或评论中嵌入简短引文的情况。\n\
    \n在编写本书时，已尽一切努力确保所提供信息的准确性。但是，本书所含信息是按“原样”出售的，不附带任何明示或暗示的保证。作者及其经销商和分销商均不对因本书直接或间接造成的任何损害或声称造成的损害负责。\n\
    \n首次出版：2022年10月\n\n由 Patrick Felicia 出版\n\n# 致谢\n\n作者：Patrick Felicia\n\n# 关于作者\n\
    \nPatrick Felicia 是沃特福德理工学院的讲师和研究员，在那里他教授并指导本科生和研究生。他于2003年获得爱尔兰科克大学多媒体技术硕士学位，2009年获得计算机科学博士学位。他出版了多本关于利用电子游戏进行教育目的的书籍和文章，包括《通过教育游戏改进学习和动机的研究手册：多学科方法》（由IGI出版）和《学校中的数字游戏：教师手册》，由欧洲学校网出版。Patrick\
    \ 还是《国际基于游戏的学习期刊》（IJGBL）的主编，以及爱尔兰基于游戏的学习研讨会的会议主任，这是一个在爱尔兰各地举办的关于游戏和学习的热门会议。\n\n\
    # 本书的支持和资源\n\n要完成本书中介绍的活动，您需要从配套网站下载启动包；它包含您完成项目所需的免费资源。要下载这些资源，请执行以下操作：\n\n打开页面\n\
    点击您的书《从零到精通》\n\n![](img/c9583cf50ad5be24b6f6664ecc4a5c58_7_0.png)\n\n在新页面上，请点击写着“点击此处下载您的资源”的链接\n\
    \n![](img/c9583cf50ad5be24b6f6664ecc4a5c58_7_1.png)\n\n本书献给 Mathis\n\n# 目录\n\n\
    - [致谢](Credits)\n- [关于作者](About the Author)\n- [本书的支持和资源](Support and Resources\
    \ for this Book)\n- [目录](Table of Contents)\n- [前言](Preface)\n- [本书涵盖的内容](Content\
    \ Covered by this Book)\n- [使用本书所需条件](What you Need to Use this Book)\n- [本书适合谁](Who\
    \ this book is for)\n- [本书不适合谁](Who this book is not for)\n- [如何从本书中学习](How you\
    \ will learn from this book)\n- [每章的格式和写作惯例](Format of Each Chapter and Writing\
    \ Conventions)\n- [特别说明](Special Notes)\n- [如何从本书中获得最佳学习效果？](How Can You Learn\
    \ Best from this Book?)\n- [反馈](Feedback)\n- [下载本书的解决方案](Downloading the Solutions\
    \ for the Book)\n- [改进本书](Improving the Book)\n- [支持作者](Supporting the Author)\n\
    - [第1章：从我们的射击游戏开始](Chapter 1: Starting with our shooter game)\n    - [使用方向键移动NPC](Moving\
    \ the NPC using the arrow keys)\n    - [为玩家角色创建武器](Creating a weapon for the player\
    \ character)\n    - [为目标创建一个类](Creating a class for the target(s))\n    - [关卡总结](Level\
    \ roundup)\n    - [总结](Summary)\n    - [测验](Quiz)\n    - [测验答案](Answers to the\
    \ Quiz.)\n\n# 检查清单\n\n# 第2章：创建物品栏\n\n- 创建物品栏\n- 在武器之间切换\n- 收集弹药\n- 关卡总结\n- 总结\n\
    - 测验\n- 测验答案\n- 检查清单\n- 挑战1\n\n# 第3章：添加碰撞和人工智能\n\n- 本章所需资源\n- 添加墙壁\n- 添加与墙壁的碰撞检测\n\
    - 使用路径点移动NPC\n- 为NPC添加听觉和视觉\n- 关卡总结\n- 检查清单\n- 测验\n- 测验答案\n- 挑战1\n\n# 第4章：创建有限状态机\n\
    \n- 初始化游戏\n- 跟随玩家\n- 触发状态之间的转换\n- 生成NPC\n- 关卡总结\n- 检查清单\n- 测验\n- 测验答案\n- 挑战1\n\
    \n# 第5章：打磨我们的游戏\n\n- 改变敌人的外观\n- 显示点\n- 检测与点的碰撞并更新分数\n- 显示分数\n- 检测与NPC的碰撞\n- 关卡总结\n\
    - 检查清单\n- 测验\n- 测验解决方案\n- 挑战1\n\n# 第6章：常见问题解答\n\n- 脚本\n- 与资产交互\n- 使用图形用户界面\n-\
    \ 创建和使用类\n- 使用列表\n- 图片和音频\n- 检测用户输入\n- 致谢\n\n# 前言\n\n本书将向您展示如何能够非常快速地用Python编码并创建游戏。\n\
    \nPython是一种强大的编程语言，广泛应用于各行各业，即使您拥有（或正在使用）技术规格非常低的计算机，也可以使用它。\n\n本系列丛书《从零到精通的Python游戏》让您能够探索Python的核心功能，特别是那些能够快速创建有趣的2D游戏的功能。阅读本系列丛书后，您应该会发现用Python编码和创建简单而有趣的电子游戏变得更容易。\n\
    \n本系列丛书假设读者没有先验知识，它将引导您入门Python，通过轻松的学习曲线，让您快速掌握这种编程语言提供的所有出色功能。\n\n通过完成每一章，并遵循分步说明，您将逐步提高技能，变得更加精通Python，并创建多个游戏。\n\
    \n除了精通Python之外，您还将创建包含许多电子游戏常见技术的游戏，例如：关卡设计、对象创建、纹理、碰撞检测、灯光、武器创建、角色动画、粒子、人工智能和菜单。\n\
    \n您将学习如何使用Python和Pygame创建自定义菜单和简单的用户界面，并为非玩家角色（NPC）制作动画并赋予人工智能，使其能够使用寻路跟随玩家角色。\n\
    \n最后，您还可以在本书的不同阶段导出您的游戏，以便与朋友分享并获得一些反馈。"
