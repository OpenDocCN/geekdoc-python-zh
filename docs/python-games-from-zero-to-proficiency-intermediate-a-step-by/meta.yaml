- md: "## Chapter 2: Creating an Inventory\n\nIn this section, we will start to improve\
    \ the code created in the previous. Some of the objectives of this section will\
    \ be to:\n\n- Create an inventory.\n- Create classes for the weapons to be added\
    \ to the inventory.\n- Implement a system whereby the player will be able to switch\
    \ between weapons and also collect and account for ammunitions for each weapon.\n\
    \nAfter completing this chapter, you will be able to:\n\n- Create and instantiate\
    \ classes.\n- Draw shapes and text onscreen.\n- Use match statements.\n- Move\
    \ objects in the pygame window.\n\n## Creating the inventory\n\nIn this section,\
    \ we will start to create the inventory for the player character. The idea is\
    \ to create a system that makes it possible to add and scroll through the weapons\
    \ and ammunitions gathered by the player.\n\nSo the first step will be to create\
    \ three different Python classes:\n\n- A class called a class based on the code\
    \ that has been created earlier to account for and draw bullets\n- A class called\
    \ a class that will be used to store and instantiate weapons.\n- A class called\
    \ a class to add and manage the weapons and the corresponding ammunitions.\n\n\
    First let’s start with the class\n\nPlease add the following code to the script\
    \ (outside of any method or class):\n\n```\nclass Weapon:\n    WEAPON_TYPE_GUN\
    \ = 0\n    WEAPON_TYPE_AUTO_GUN = 1\n    WEAPON_TYPE_GRENADE = 2\n```\n\nIn the\
    \ previous code we define the class Weapon along with some member variables that\
    \ will be used when defining new weapons.\n\nPlease add the following method to\
    \ the class\n\n```\ndef __init__(self, type_of_weapon):\n    self.type = type_of_weapon\n\
    \    match self.type:\n        case self.WEAPON_TYPE_GUN:\n            self.name\
    \ = \"GUN\"\n            self.ammunitions = 10\n            self.max_ammo = 100\n\
    \            self.shoot_delay = 10\n```\n\nIn the previous code:\nWe define the\
    \ constructor for the class. It takes one parameter (other than the parameter\
    \ self) called type_of_weapon that will be used to define the type of a new weapon.\n\
    We set the type of the weapon based on that parameter.\nWe then use a match/case\
    \ structure to define the features of each type of weapons to be created.\nFor\
    \ each type of weapon, we define a name, the number of ammunitions, the maximum\
    \ number of ammunitions that can be held by the player for that weapon, along\
    \ with the delay time (the time it takes for the player to be able to shoot again\
    \ with that weapon).\nSo, in that case (i.e., gun) the weapon will be named with\
    \ 10 ammunitions initially; the player will only be able to carry 100 bullets,\
    \ and s/he will be able to shoot at most, every 10 frames.\n\nNow that we have\
    \ defined the feature for the weapon of type we can add more information about\
    \ the other weapons: the automatic gun and the grenade launcher.\n\nPlease add\
    \ the following code just after the one you have typed:\n\n```\n        case self.WEAPON_TYPE_AUTO_GUN:\n\
    \            self.name = \"AUTO GUN\"\n            self.ammunitions = 10\n   \
    \         self.max_ammo = 40\n            self.shoot_delay = 20\n        case\
    \ self.WEAPON_TYPE_GRENADE:\n            self.name = \"GRENADE\"\n           \
    \ self.ammunitions = 10\n            self.max_ammo = 40\n            self.shoot_delay\
    \ = 30\n```\n\nIn the previous code, similarly to the weapon of type we define\
    \ the feature for the weapons of type AUTO_GUN and GRENADE including the name,\
    \ the initial number of ammunitions, the maximum number of ammunitions, and the\
    \ delay between shots.\n\nNow that we have defined the class it is time to define\
    \ the class Inventory that will be used store the weapons.\n\nPlease add the following\
    \ class to the script (outside of any method or class, for example; just before\
    \ the class\n\n```\nclass Inventory:\n    WEAPON_TYPE_GUN = 0\n    WEAPON_TYPE_AUTO_GUN\
    \ = 1\n    WEAPON_TYPE_GRENADE = 2\n    def __init__(self):\n        self.weapons\
    \ = []\n        self.current_index = 0\n```\n\nIn the previous code, we define\
    \ the class Inventory along with some member variables that will be used to define\
    \ the types of weapons added to the inventory. We also define the constructor\
    \ where we declare a list that will store all the weapons in that inventory, along\
    \ with a variable current_index that will specify which weapon is currently in\
    \ use.\n\nNow that the constructor has been defined, we will add more methods\
    \ that will be used to manage the weapons and the corresponding ammunitions.\n\
    \nPlease add the following methods within the class\n\n```\n    def add_weapon(self,\
    \ type_of_weapon):\n        list_size = len(self.weapons)\n        self.weapons.insert(list_size,\
    \ Weapon(type_of_weapon))\n    def change_weapon_tab(self):\n        self.current_index\
    \ += 1\n        if (self.current_index > (len(self.weapons) - 1)):\n         \
    \   self.current_index = 0\n    def increase_ammo(self, type_of_ammo, increment):\n\
    \        if (self.weapons[type_of_ammo].ammunitions + increment <\n          \
    \  self.weapons[type_of_ammo].max_ammo):\n            self.weapons[type_of_ammo].ammunitions\
    \ += increment\n```\n\nIn the previous code:\nWe define three member methods:\
    \ add_weapon, change_weapon_tab, and increase_ammo.\n\nIn the first method called\
    \ add_weapon we add a weapon to the list called weapons using the size of the\
    \ list so that this element added is always the last one in the list (using the\
    \ method append would do the opposite).\n\nIn the second method called change_weapon_tab\
    \ we update the index of the current weapon in use, and we check if we have reached\
    \ the last weapon in the list; in that case, we set the index to 0 (i.e., the\
    \ first element in the array).\nIn the last method called increase_ammo we check\
    \ that the number of ammunitions for the weapon considered has not reached the\
    \ maximum that the player can carry, before more ammunitions can be added.\n\n\
    ## Switching between weapons\n\nNow that we have defined classes for the inventory\
    \ and the weapons to be added, it is time to manage how the player can switch\
    \ between these weapons, and display the current weapon in use, along with the\
    \ number of ammunitions for that weapon.\n\nPlease add the following code to the\
    \ script, outside of any method or class (new code in bold):\n\n```\nnpcs.append(npc1)\n\
    npcs.append(npc2)\nWEAPON_TYPE_GUN = 0\nWEAPON_TYPE_AUTO_GUN = 1\nWEAPON_TYPE_GRENADE\
    \ = 2\ngrenades = []\ninventory = Inventory()\ninventory.add_weapon(WEAPON_TYPE_GUN)\n\
    inventory.add_weapon(WEAPON_TYPE_AUTO_GUN)\ninventory.add_weapon(WEAPON_TYPE_GRENADE)\n\
    ```\n\nIn the previous code:\nWe define the variables that will be used to define\
    \ the type for each weapon added (e.g., gun, automatic gun, or grenade).\nWe create\
    \ a list for the grenades that will be used in the game.\nWe create a new inventory,\
    \ and we then add three types of weapons to it: a gun, an automatic gun, and a\
    \ grenade launcher.\n\nNow that the inventory has been created and filled with\
    \ three weapons, we will manage the user's keyboard input.\n\nPlease comment the\
    \ following code in the method\n\n```\n\"\"\"can_shoot = False\nmy_bulllet = Bullet(player_rect.x\
    \ + 15, player_rect.y +15, player_angle)\nbullets.append(my_bulllet)\"\"\"\n```\n\
    \nThe previous code was used before we created the inventory, so it needs to be\
    \ commented so that more code that accounts for the inventory can be added instead.\n\
    \nPlease add this code at the beginning of the method window.\n\n```\nglobal grenades\n\
    ```\n\nPlease add the following code to the method controls (new code in bold):\n\
    \n```\nif keys_pressed[pygame.K_SPACE] and can_shoot:\n    if (\n        (inventory.current_index\
    \ == inventory.WEAPON_TYPE_GUN or\n        inventory.current_index == inventory.WEAPON_TYPE_AUTO_GUN)\n\
    \        and inventory.weapons[inventory.current_index].ammunitions > 0\n    ):\n\
    \        can_shoot = False\n        my_bulllet = Bullet(player_rect.x, player_rect.y,\
    \ player_angle)\n        bullets.append(my_bulllet)\n        inventory.weapons[inventory.current_index].ammunitions\
    \ -= 1\n```\n\nIn the previous code:\nWe check whether the player has pressed\
    \ the SPACE bar and that s/he can shoot.\nWe then check whether the player’s current\
    \ weapon is a gun or an automatic gun and that s/he has enough ammunitions for\
    \ that weapon.\nIn that case, we make sure that s/he can’t shoot until the weapons\
    \ delay has elapsed.\nWe then create a new bullet, add it to the list of bullets,\
    \ and update the ammunitions for the current weapon accordingly.\n\nNext, we need\
    \ to specify what happens when the player decides to fire the grenade launcher.\n\
    \nPlease add the following code after the one you have just typed:\n\n```\nelif\
    \ (inventory.current_index ==\n    inventory.WEAPON_TYPE_GRENADE and\n    inventory.weapons[inventory.current_index].ammunitions\
    \ > 0):\n    can_shoot = False\n    my_grenade = Grenade(player_rect.x, player_rect.y,\
    \ player_angle)\n    grenades.append(my_grenade)\n    inventory.weapons[inventory.current_index].ammunitions\
    \ -= 1\n```\n\nIn the previous code:\nWe check whether the current weapon is the\
    \ grenade launcher and that we have enough ammunitions.\nIn that case, we set\
    \ the variable can_shoot to False."
  mdcn: "## 第二章：创建物品栏\n\n在本节中，我们将开始改进上一章创建的代码。本节的一些目标将是：\n\n-   创建一个物品栏。\n-   为要添加到物品栏中的武器创建类。\n\
    -   实现一个系统，使玩家能够在武器之间切换，并收集和统计每种武器的弹药。\n\n完成本章后，你将能够：\n\n-   创建和实例化类。\n-   在屏幕上绘制形状和文本。\n\
    -   使用 `match` 语句。\n-   在 `pygame` 窗口中移动对象。\n\n## 创建物品栏\n\n在本节中，我们将开始为玩家角色创建物品栏。其理念是创建一个系统，使玩家能够添加和浏览收集到的武器和弹药。\n\
    \n因此，第一步是创建三个不同的 Python 类：\n\n-   一个名为 `Bullet` 的类，基于之前创建的代码，用于统计和绘制子弹。\n-   一个名为\
    \ `Weapon` 的类，用于存储和实例化武器。\n-   一个名为 `Inventory` 的类，用于添加和管理武器及相应的弹药。\n\n首先，让我们从\
    \ `Weapon` 类开始。\n\n请将以下代码添加到脚本中（在任何方法或类之外）：\n\n```\nclass Weapon:\n    WEAPON_TYPE_GUN\
    \ = 0\n    WEAPON_TYPE_AUTO_GUN = 1\n    WEAPON_TYPE_GRENADE = 2\n```\n\n在前面的代码中，我们定义了\
    \ `Weapon` 类以及一些成员变量，这些变量将在定义新武器时使用。\n\n请将以下方法添加到 `Weapon` 类中：\n\n```\ndef __init__(self,\
    \ type_of_weapon):\n    self.type = type_of_weapon\n    match self.type:\n   \
    \     case self.WEAPON_TYPE_GUN:\n            self.name = \"GUN\"\n          \
    \  self.ammunitions = 10\n            self.max_ammo = 100\n            self.shoot_delay\
    \ = 10\n```\n\n在前面的代码中：\n我们定义了 `Weapon` 类的构造函数。它接受一个参数（除了 `self` 参数之外），名为 `type_of_weapon`，该参数将用于定义新武器的类型。\n\
    我们根据该参数设置武器的类型。\n然后，我们使用 `match/case` 结构来定义要创建的每种武器类型的特性。\n对于每种武器类型，我们定义了名称、弹药数量、玩家可以为该武器携带的最大弹药数量，以及延迟时间（玩家能够再次使用该武器射击所需的时间）。\n\
    因此，在这种情况下（即手枪），该武器将被命名为 \"GUN\"，初始弹药为 10 发；玩家最多只能携带 100 发子弹，并且最多每 10 帧才能射击一次。\n\
    \n现在我们已经定义了 `WEAPON_TYPE_GUN` 类型武器的特性，我们可以添加关于其他武器的更多信息：自动枪和榴弹发射器。\n\n请在你刚刚输入的代码之后添加以下代码：\n\
    \n```\n        case self.WEAPON_TYPE_AUTO_GUN:\n            self.name = \"AUTO\
    \ GUN\"\n            self.ammunitions = 10\n            self.max_ammo = 40\n \
    \           self.shoot_delay = 20\n        case self.WEAPON_TYPE_GRENADE:\n  \
    \          self.name = \"GRENADE\"\n            self.ammunitions = 10\n      \
    \      self.max_ammo = 40\n            self.shoot_delay = 30\n```\n\n在前面的代码中，类似于\
    \ `WEAPON_TYPE_GUN` 类型的武器，我们定义了 `WEAPON_TYPE_AUTO_GUN` 和 `WEAPON_TYPE_GRENADE`\
    \ 类型武器的特性，包括名称、初始弹药数量、最大弹药数量以及射击间隔。\n\n现在我们已经定义了 `Weapon` 类，是时候定义 `Inventory`\
    \ 类了，该类将用于存储武器。\n\n请将以下类添加到脚本中（在任何方法或类之外，例如；就在 `Weapon` 类之前）：\n\n```\nclass Inventory:\n\
    \    WEAPON_TYPE_GUN = 0\n    WEAPON_TYPE_AUTO_GUN = 1\n    WEAPON_TYPE_GRENADE\
