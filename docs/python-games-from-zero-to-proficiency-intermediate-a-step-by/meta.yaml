  md: '# About the Author


    Patrick Felicia is a lecturer and researcher at Waterford Institute of Technology,
    where he teaches and supervises undergraduate and postgraduate students. He obtained
    his MSc in Multimedia Technology in 2003 and PhD in Computer Science in 2009 from
    University College Cork, Ireland. He has published several books and articles
    on the use of video games for educational purposes, including the Handbook of
    Research on Improving Learning and Motivation through Educational Games: Multidisciplinary
    Approaches (published by IGI), and Digital Games in Schools: A Handbook for Teachers,
    published by European Schoolnet. Patrick is also the Editor-in-chief of the International
    Journal of Game-Based Learning (IJGBL), and the Conference Director of the Irish
    Symposium on Game-Based Learning, a popular conference on games and learning organized
    throughout Ireland.'
