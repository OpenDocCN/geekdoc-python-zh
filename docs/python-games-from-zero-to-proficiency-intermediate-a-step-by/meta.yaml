    \ code to the method window (new code in bold):\n\n```\nfor npc in npcs:\n   \
    \ npc.draw()\n    npc.move()\n    npc.hear()\n```\n\nYou can now save and compile\
    \ you code; as the game plays, and as you get closer to the NPC you should see\
    \ a message in the Command Prompt saying Heard The again, in the next section,\
    \ we will change the behaviour of the NPC so that it starts chasing the player\
    \ after it has heard him/her.\n\nNext, we can start to implement the NPC vision;\
    \ this feature will be implemented by checking that the NPC and the player are\
    \ in the same row or column. For this purpose, we will create two methods that\
    \ will specify which column the NPC and the player character are; by using these\
    \ methods and by comparing the column or row number for both the player and the\
    \ NPC, we will be able to determine whether they are on the same row, and consequently\
    \ whether the NPC can see the player.\n\nPlease add the following method to the\
    \ class\n\n```\ndef which_horizontal_lane_is_item(self, x,y, item_size):\n   \
    \ if (y >0 and y < 100 - item_size): return 0\n    elif (y > 200 and y < 250 -\
    \ item_size): return 1\n    elif (y > 350 and y < 400 - item_size): return 2\n\
    ```"
