- md: "## Quiz\n\nIt’s now time to check your knowledge with a quiz. Please answer\
    \ the following questions. The solutions are on the next page. Good luck!\n\n\
    Please specify whether the following statements are TRUE or FALSE\n\n- To detect\
    \ collision with an item, a rectangular area can be defined and checked against.\n\
    - The method `pygame.rect` can be used to define a rectangle.\n- The method `draw.rect`\
    \ can be used to draw a rectangle.\n- The method `collisionrect` can be used to\
    \ detect collision between two rectangular shapes.\n- Waypoints can be used to\
    \ specify a path for NPCs.\n- Variables of type `Vector2` can be used to store\
    \ information about 2-Dimensional vectors.\n- Normalising a vector means changing\
    \ its length to 1.\n- The method `math.hypot` can be used to calculate the distance\
    \ between two points, provided that we know their coordinates.\n- The following\
    \ code will save the coordinates 2 and 3 in the vector called `npc_position`:\n\
    ```python\nnpc_position.xy = 2,3\n```\n- The following code will set the variable\
    \ `x` to `False`:\n```python\nx = ( 1 > 2 ) or (2 < 1)\n```\n\n## Answers to the\
    \ quiz\n\n- False (it is `colliderect`)\n- False. It is False since both conditions\
    \ are false.\n\n## Challenge 1\n\nNow that you have managed to complete this chapter\
    \ and that you have improved your skills, let’s put these to the test.\n\nCreate\
    \ a new path for the NPC with different or additional waypoints. Modify the method\
    \ `hear` to obtain a wider radius.\n\n## Chapter 4: Creating a Finite State Machine\n\
    \nIn this section we will improve our game by adding the following features:\n\
    \n- A finite state machine whereby the NPC will be able to transition between\
    \ several states.\n- The ability for the NPC to chase the player once it has been\
    \ detected.\n- The ability to spawn NPCs overtime.\n\nAfter completing this chapter,\
    \ you will be able to:\n\n- Instantiate NPCs at run time.\n- Create a Finite State\
    \ Machine and manage transitions between these states.\n- Create a navigation\
    \ system that makes it possible for NPCs to navigate towards a specific target,\
    \ including the player.\n\n## Initializing the game\n\nIn this section, we will\
    \ start to create our finite state machine, this will involve:\n\n- Defining states\
    \ along with their names.\n- Creating code that branches out to a specific portion\
    \ of the code based on the current state.\n- Defining and applying rules for transitioning\
    \ between states.\n\nThe idea behind this finite state machine is that:\n\n- The\
    \ NPC will be initially idle.\n- After a few seconds, this NPC will change to\
    \ the state called `STATE_PATROL`.\n- After detecting the player, the NPC will\
    \ follow the player character.\n\nSo first we will define the different states\
    \ for the NPC.\n\nPlease add the following code outside of any method or class\
    \ in the script:\n\n```python\nimport types\nconstants = types.SimpleNamespace()\n\
    constants.STATE_IDLE = 0\nconstants.STATE_PATROL = 1\nconstants.STATE_FOLLOW_PLAYER\
    \ = 2\npatrol_timer = 0\nstart_patrol = False\n```\n\nIn the previous code we\
    \ create different variables for the states and we create the variables called\
    \ `patrol_timer`, and `start_patrol` that will be used to determine when the NPC\
    \ starts to patrol. The former will be used as a timer to determine the period\
    \ of time after which the NPC can start patrolling; the latter, will be kept to\
    \ `False` until the timer has reached the set time.\n\nPlease add the following\
    \ code to the method `__init__` in the class:\n\n```python\nself.state = constants.STATE_IDLE\n\
    self.can_hear_player = False\nself.can_see_player = False\n```\n\nIn the previous\
    \ code we specify that the NPC will be, by default, in the `IDLE` state; we then\
    \ declare two variables `can_hear_player` and `can_see_player` that will be used\
    \ to specify whether the NPC can hear or see the player character.\n\nNow that\
    \ these variables have been defined, we will start to implement the code that\
    \ will be required for (and executed in) each state.\n\n## Following the player\n\
    \nIn this section, we will create a method that will be called so that the NPC\
    \ can follow the player in the state called `STATE_FOLLOW_PLAYER`.\n\nThe algorithm\
    \ will involve the following steps:\n\n- Detect where the player is.\n- Detect\
    \ where the NPC is.\n- Move the NPC up or down (towards the player) if it is on\
    \ a clear column and if the player’s y coordinate is below or above its own y\
    \ coordinate.\n- Move the NPC left or right (towards the player) if it is on a\
    \ clear row and if the player’s x coordinate is below or above its own x coordinate.\n\
    \nSo let’s proceed:\n\nPlease add the following method to the class:\n\n```python\n\
    def follow_player(self):\n    global player_rect\n    npc_position = pygame.Vector2()\n\
    \    npc_position.xy = self.x,self.y\n    npc_direction = pygame.Vector2()\n```\n\
    \nIn the previous code:\n\nWe define the method called `follow_player`. This method\
    \ will be called when the NPC is in the state `STATE_FOLLOW_PLAYER`.\n\nIn that\
    \ method we refer to a global variable called `player_rect` that stores the current\
    \ position of the player.\n\nWe then store the coordinates of the NPC in a vector\
    \ called `npc_position`.\n\nFinally, we define a 2-Dimensional vector called `npc_direction`\
    \ that will be used to determine in which direction the NPC will move next.\n\n\
    Now that we have defined the vectors for both the NPC and the player, we can use\
    \ them to calculate the distance between them.\n\nPlease add the following code,\
    \ after the previous one (in the method `follow_player`):\n\n```python\nvertical_distance\
    \ = -player_rect.y + npc_position.y\nhorizontal_distance = -player_rect.x + npc_position.x\n\
    ```\n\nIn the previous code, we calculate the distance between the player and\
    \ the NPC, along the x and y axes.\n\nNow that we have defined the horizontal\
    \ and vertical distance, we can determine the direction to be followed by the\
    \ NPC so that it can follow the player.\n\nPlease add the following code:\n\n\
    ```python\nif (abs(vertical_distance) > 20 and self.can_move_vertically()):\n\
    \    npc_direction.xy = 0, (player_rect.y - npc_position.y)\nelif (abs(horizontal_distance)\
    \ > 20 and self.can_move_horizontally()):\n    npc_direction.xy = (player_rect.x\
    \ - npc_position.x, 0)\nif (npc_direction.length() > 1): npc_direction = npc_direction.normalize()\n\
    return npc_direction\n```\n\nIn the previous code:\n\nWe check that the vertical\
    \ distance between the NPC and the player is more than 20 pixels (in other words\
    \ that they are far apart) and that they can move vertically (i.e., that there\
    \ are no obstacles above or below the NPC); the latter is done through the method\
    \ called `can_move_vertically` that we yet have to create; in that case, we move\
    \ the NPC vertically, towards the player; the vertical direction is calculated\
    \ by subtracting the y coordinate between the NPC and the player character so\
    \ that we know whether the NPC should go up or down.\n\nWe check that the horizontal\
    \ distance between the NPC and the player is more than 20 pixels (in other words\
    \ that they are far apart) and that they can move horizontally (i.e., that there\
    \ are no obstacles left or right); the latter is done through the method called\
    \ `can_move_horizontally` that we yet have to create; in that case, we move the\
    \ NPC horizontally, towards the player; the horizontal direction is calculated\
    \ by subtracting the x coordinates between the NPC and the player character.\n\
    \nWe then normalise the vector so that its length is now 1. We do that as the\
    \ speed will be multiplied by this vector later on. Otherwise the speed would\
    \ depend on the position of the NPC.\n\nFinally, we return the vector `npc_direction`.\n\
    \nWe can now define and write the methods `can_move_horizontally` and `can_move_vertically`\
    \ that we called earlier on:\n\nPlease add the following methods to the class:\n\
    \n```python\ndef can_move_horizontally(self):\n    if (self.is_on_one_of_horizontal_lanes()):return\
    \ True\ndef can_move_vertically(self):\n    if (self.is_on_one_of_vertical_lanes()):\
    \ return True\n```\n\nPlease add this code outside of any method or class:\n\n\
    ```python\nennemy_size = 25\n```\n\nPlease add the following method to the class:\n\
    \n```python\ndef is_on_one_of_horizontal_lanes(self):\n    global ennemy_size\n\
    \    npc_position = pygame.Vector2()\n    npc_position.xy = self.x,self.y\n  \
    \  if (\n        (npc_position.y >0 and npc_position.y < 100 - ennemy_size) or\n\
    \        (npc_position.y > 200 and npc_position.y < 250 - ennemy_size) or\n  \
    \      (npc_position.y > 350 and npc_position.y < 400 - ennemy_size) or\n    \
    \    (npc_position.y > 500)\n    ):return True\n```\n\nIn the previous code:\n\
    \nWe define a method called `is_on_one_of_horizontal_lanes`.\n\nWe refer to a\
    \ global variable called `ennemy_size`.\n\nWe define a vector called `npc_position`.\n\
    \nWe then check, using a conditional statement, whether the NPC is on one of the\
    \ horizontal lanes defined by the boundaries of the white squares. In that case,\
    \ the value `True` is returned. Note that we use the variable `ennemy_size` to\
    \ account for the size of the NPC when checking its position.\n\nWe can now define\
    \ the other method that checks whether the NPC is on one of the vertical lanes\
    \ defined by the white squares; please add the following method to the class."
  mdcn: "## 测验\n\n现在是时候通过测验来检验你的知识了。请回答以下问题。答案在下一页。祝你好运！\n\n请判断以下陈述是正确还是错误\n\n-  \
    \ 为了检测与物品的碰撞，可以定义一个矩形区域并进行检查。\n-   方法 `pygame.rect` 可用于定义一个矩形。\n-   方法 `draw.rect`\
    \ 可用于绘制一个矩形。\n-   方法 `collisionrect` 可用于检测两个矩形形状之间的碰撞。\n-   路径点可用于为NPC指定路径。\n\
    -   `Vector2` 类型的变量可用于存储关于二维向量的信息。\n-   归一化向量意味着将其长度更改为1。\n-   方法 `math.hypot`\
    \ 可用于计算两点之间的距离，前提是我们知道它们的坐标。\n-   以下代码会将坐标2和3保存到名为 `npc_position` 的向量中：\n```python\n\
    npc_position.xy = 2,3\n```\n-   以下代码会将变量 `x` 设置为 `False`：\n```python\nx = ( 1\
    \ > 2 ) or (2 < 1)\n```\n\n## 测验答案\n\n-   错误（正确的方法是 `colliderect`）\n-   错误。因为两个条件都为假，所以结果为假。\n\
    \n## 挑战1\n\n既然你已经完成了本章并提升了技能，让我们来测试一下。\n\n为NPC创建一条包含不同或额外路径点的新路径。修改 `hear` 方法以获得更大的侦测半径。\n\
    \n## 第4章：创建有限状态机\n\n在本节中，我们将通过添加以下功能来改进我们的游戏：\n\n-   一个有限状态机，使NPC能够在多个状态之间进行转换。\n\
    -   一旦检测到玩家，NPC能够追逐玩家的能力。\n-   随时间生成NPC的能力。\n\n完成本章后，你将能够：\n\n-   在运行时实例化NPC。\n\
    -   创建一个有限状态机并管理这些状态之间的转换。\n-   创建一个导航系统，使NPC能够导航到特定目标，包括玩家。\n\n## 初始化游戏\n\n在本节中，我们将开始创建有限状态机，这将涉及：\n\
    \n-   定义状态及其名称。\n-   创建根据当前状态分支到特定代码部分的代码。\n-   定义并应用状态之间转换的规则。\n\n这个有限状态机背后的想法是：\n\
    \n-   NPC最初将处于空闲状态。\n-   几秒钟后，这个NPC将切换到名为 `STATE_PATROL` 的状态。\n-   检测到玩家后，NPC将跟随玩家角色。\n\
    \n因此，首先我们将定义NPC的不同状态。\n\n请在脚本中任何方法或类之外添加以下代码：\n\n```python\nimport types\nconstants\
    \ = types.SimpleNamespace()\nconstants.STATE_IDLE = 0\nconstants.STATE_PATROL\
    \ = 1\nconstants.STATE_FOLLOW_PLAYER = 2\npatrol_timer = 0\nstart_patrol = False\n\
    ```\n\n在前面的代码中，我们为状态创建了不同的变量，并创建了名为 `patrol_timer` 和 `start_patrol` 的变量，它们将用于确定NPC何时开始巡逻。前者将用作计时器，以确定NPC可以开始巡逻的时间段；后者将保持为\
    \ `False`，直到计时器达到设定时间。\n\n请在类的 `__init__` 方法中添加以下代码：\n\n```python\nself.state\
    \ = constants.STATE_IDLE\nself.can_hear_player = False\nself.can_see_player =\
    \ False\n```\n\n在前面的代码中，我们指定NPC默认处于 `IDLE` 状态；然后我们声明了两个变量 `can_hear_player` 和\
    \ `can_see_player`，它们将用于指定NPC是否能听到或看到玩家角色。\n\n现在这些变量已经定义好了，我们将开始实现每个状态所需（并在其中执行）的代码。\n\
    \n## 跟随玩家\n\n在本节中，我们将创建一个方法，以便NPC在名为 `STATE_FOLLOW_PLAYER` 的状态下能够跟随玩家。\n\n该算法将涉及以下步骤：\n\
    \n-   检测玩家的位置。\n-   检测NPC的位置。\n-   如果NPC位于清晰的列上，并且玩家的y坐标低于或高于其自身的y坐标，则向上或向下（朝向玩家）移动NPC。\n\
    -   如果NPC位于清晰的行上，并且玩家的x坐标低于或高于其自身的x坐标，则向左或向右（朝向玩家）移动NPC。\n\n那么，我们开始吧：\n\n请向类中添加以下方法：\n\
    \n```python\ndef follow_player(self):\n    global player_rect\n    npc_position\
    \ = pygame.Vector2()\n    npc_position.xy = self.x,self.y\n    npc_direction =\
    \ pygame.Vector2()\n```\n\n在前面的代码中：\n\n我们定义了名为 `follow_player` 的方法。当NPC处于 `STATE_FOLLOW_PLAYER`\
    \ 状态时，将调用此方法。\n\n在该方法中，我们引用了一个名为 `player_rect` 的全局变量，它存储了玩家的当前位置。\n\n然后，我们将NPC的坐标存储在一个名为\
    \ `npc_position` 的向量中。\n\n最后，我们定义了一个名为 `npc_direction` 的二维向量，它将用于确定NPC接下来移动的方向。\n\
    \n现在我们已经定义了NPC和玩家的向量，我们可以用它们来计算它们之间的距离。\n\n请在前面的代码之后（在 `follow_player` 方法中）添加以下代码：\n\
    \n```python\nvertical_distance = -player_rect.y + npc_position.y\nhorizontal_distance\
    \ = -player_rect.x + npc_position.x\n```\n\n在前面的代码中，我们计算了玩家和NPC之间沿x轴和y轴的距离。\n\n\
    现在我们已经定义了水平和垂直距离，我们可以确定NPC应遵循的方向，以便它能够跟随玩家。\n\n请添加以下代码：\n\n```python\nif (abs(vertical_distance)\
    \ > 20 and self.can_move_vertically()):\n    npc_direction.xy = 0, (player_rect.y\
    \ - npc_position.y)\nelif (abs(horizontal_distance) > 20 and self.can_move_horizontally()):\n\
