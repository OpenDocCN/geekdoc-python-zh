    \ also be changed so that you have a visual cue that indicates that the NPC the\
    \ detection works.\n\nPlease add the following method to the class\n\n```\ndef\
    \ hear(self):\n    npc_position = pygame.Vector2()\n    npc_position.xy = self.x,\
    \ self.y\n    distance_between_player_and_npc = get_distance(npc_position, player_rect)\n\
    \    if (distance_between_player_and_npc < 50):\n        print(\"Just Heard the\
    \ Player\")\nIn the previous code:\n```\n\nWe define a new method called hear\
    \ that takes no parameters (barre the self parameter to indicate that this is\
    \ a member method)\nWe store the position of the NPC in the variable\nWe then\
    \ call the method get_distance to compute the distance between the NPC and the\
    \ player.\n\nIf this distance is lesser than 50 pixels, we display a message in\
    \ the Command"
