    \ a bullet.\nThis bullet will be created from a class called Bullet and added\
    \ to an array of bullets.\nThis bullet will be propelled (i.e., moving) in the\
    \ direction where the player is looking.\nWhen this bullet collides with an obstacle\
    \ it will be deleted.\nA delay will be applied between each bullet so that the\
    \ player cannot shoot constantly.\n\nNow that the process is clearer, let’s create\
    \ and add that weapon:\n\nPlease open the script that you have been working with\
    \ in the previous section.\nAdd the following code before the first method in\
    \ the script:\n\n```python\nbullets=[]\ncan_shoot = True\nshoot_timer = 0\nshoot_delay\
