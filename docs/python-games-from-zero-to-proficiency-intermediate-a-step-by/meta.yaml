- md: "## Creating a weapon for the player character\n\nWhile the previous section\
    \ focused on creating and moving a 2D player character, this section will focus\
    \ on adding a weapon to the player character and using it.\nThis will consist\
    \ in:\n\n- Detecting when the user presses the SPACE bar\n- Creating a bullet\
    \ that moves towards where the player character is looking.\n- Move the bullet\
    \ across the screen.\n\nSo the first phase will be dedicated to creating a gun\
    \ that will be firing bullets at regular intervals.\n\nWe will detect whether\
