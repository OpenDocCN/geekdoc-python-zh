    \ \"GREEN\", (self.x, self.y-10,\n    self.health*30/100, 10))\n```\n\nIn the\
    \ previous code:\n\nWe modify the method called draw so that it displays an image\
    \ instead of a square.\n\nWe comment the previous code which consisted in displaying\
    \ a square. We then display the image of a blue ghost, based on the variable npc_img\
    \ that we have defined earlier.\n\nYou can now compile your code. As the game\
    \ starts, you should see that all the NPCs are now displayed as blue ghosts, as\
    \ per the next figure.\n\n![](img/c9583cf50ad5be24b6f6664ecc4a5c58_136_0.png)\n\
    \n## Displaying dots\n\nAs its, our player character can collect ammunitions and\
    \ shoot at the NPCs; while this is a great feature, it would be good for the player\
    \ character to be able to collect other items (e.g., pills, like in pacman) and\
    \ to increase the score accordingly.\n\nSo, in this section, we will:\n\n- Define\
    \ the location of each pill.\n- Display these pills using loops accordingly.\n\
    - Detect collision between the player character and the pills.\n- Remove the pills\
    \ when they have been collected.\n- Display the score and play a sound effect\
    \ when a pill has been collected.\n\nSo first, let’s define and display the pills;\
    \ the layout that we want to obtain with the pills is illustrated in the next\
    \ screenshot.\n\n![](img/c9583cf50ad5be24b6f6664ecc4a5c58_137_0.png)\n\nAs you\
    \ can see in the previous figure:\n\nThe pills are organised in four lines and\
    \ four columns.\n\nEach pill is represented by an orange disc.\nThe pills are\
    \ aligned with the different rows and columns that make up the maze.\nThe score\
    \ is displayed in white at the top of the window.\n\nFirst let’s display the pills\
    \ to collect.\n\nPlease add the following code outside of any method or class:\n\
    \n```\ndots = []\ndef init_dots():\n    global dots\n    dots = []\n    for i\
    \ in range(0,4):\n        for j in range (0,6):\n            dots.append (pygame.Rect(65+j*(WALL_INDENT),\n\
    \            60+i*WALL_INDENT, ennemy_size, ennemy_size))\ninit_dots()\n```\n\n\
    In the previous code:\n\nWe define a list called dots that will hold all the dots\
    \ displayed onscreen; using a list here will make it much easier to manage, to\
    \ display, and to remove the dots as the game unfolds.\nWe then create a method\
    \ called\nWithin this method, we refer to a global variable called dots that we\
    \ have defined earlier on.\n\nWe then use two nested loops; the first loop that\
    \ uses the variable i is employed for each row of dots, while the second loop,\
    \ that uses the variable is employed for each dot (i.e., column) within a row.\n\
    After defining these two loops, we use the variables i and which loop respectively\
    \ up to 3 and 5 to add a new item to the list. Each of these items is a rectangle\
    \ that will be used, amongst other things, to detect collision with the player.\
    \ The position of each rectangle is defined by an initial position for the first\
    \ item the variable WALL_INDENT (the space between each row) and the size of the\
    \ NPCs (we could have used a different size, and we use this size for consistency\
    \ across all the items displayed onscreen).\nFinally, we call the method that\
    \ we have just created. Having the code within a method will make it possible\
    \ to, if need be, re-initialize the position of each pill, later (especially if\
    \ the level has to be re-initialized).\n\nNext, we need to display these dots\
    \ and this will be done by looping through the list dots and by drawing a circle\
