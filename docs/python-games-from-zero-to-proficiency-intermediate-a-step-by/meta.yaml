  mdcn: "## 为NPC创建一个类\n\n目前，射击器运行良好，玩家角色可以射击带有生命值指示器的目标。话虽如此，为每个NPC创建一个类将非常有用，这样我们就可以轻松地添加和管理多个目标。因此，在本节中，我们将创建这样一个类，并修改我们的脚本，以便能够基于该类添加和管理新目标。\n\
    \n请在脚本中第一个方法之前添加以下类，例如，就在 `main` 类之前：\n\n```python\nclass NPC:\n    def __init__(self,\
    \ x, y, color):\n        self.x = x\n        self.y = y\n        self.color =\
    \ color\n        self.health = 100\n        self.collision_rect = pygame.Rect(self.x,\
    \ self.y, 25, 25)\n```\n\n在上面的代码中：\n- 我们定义了一个名为 `NPC` 的类。\n- 然后我们定义了该类的构造函数。\n\
    - 构造函数接受三个参数：NPC的x和y坐标，以及它的颜色。\n- 这些参数随后用于设置NPC的位置及其颜色。\n- 构造函数还定义了其他成员变量，包括 `health`（NPC的生命值）和\
    \ `collision_rect`（一个用于检测与其他对象碰撞的矩形）。\n\n现在构造函数和成员变量已经定义好了，我们可以为这个类定义一个成员方法，用于绘制NPC（或目前代表它的方块）。\n\
    \n请将以下方法添加到 `NPC` 类中：\n\n```python\ndef draw(self):\n    pygame.draw.rect(WIN,\
    \ self.color, (self.x, self.y, 30, 30))\n    pygame.draw.rect(WIN, \"GREEN\",\
    \ (self.x, self.y-10, self.health*30/100, 10))\n```\n\n在上面的代码中，我们定义了一个名为 `draw`\
    \ 的方法。这个方法绘制了对应于NPC的矩形及其生命条。\n\n现在 `NPC` 类已经定义好了，我们只需要基于该类实例化新的目标NPC，然后检测每个NPC的碰撞。\n\
    \n请在类定义之后添加以下代码：\n\n```python\nnpcs = []\nnpc1 = NPC(400, 400, \"BLUE\")\nnpc2\
    \ = NPC(400, 500, \"YELLOW\")\nnpcs.append(npc1)\nnpcs.append(npc2)\n```\n\n在上面的代码中：\n\
    - 我们声明了一个名为 `npcs` 的列表，它将包含所有从 `NPC` 类实例化的新NPC。\n- 我们基于 `NPC` 类实例化了两个新NPC。我们设置了它们的位置和颜色。\n\
    - 最后，我们将这些NPC添加到名为 `npcs` 的列表中。\n\n接下来，我们将管理子弹和NPC之间的碰撞。为此，我们将创建一个方法来检测子弹和从 `NPC`\
    \ 类实例化的NPC之间的碰撞。\n\n请将以下成员方法添加到 `NPC` 类中：\n\n```python\ndef check_collision2(self,\
    \ the_npcs, the_bullets):\n    self.collision_rect.x = self.x\n    self.collision_rect.y\
    \ = self.y\n    npc_index = 0\n    for npc in the_npcs:\n        if (self.collision_rect.colliderect(npc.collision_rect)):\n\
    \            npc.health -= 10\n            npc.draw()\n            the_bullets.pop(-1)\n\
    \            if (npc.health <= 0):\n                npcs.pop(npc_index)\n    \
    \    npc_index += 1\n```\n\n在上面的代码中：\n- 我们定义了方法 `check_collision2`。\n- 我们设置了碰撞矩形的位置。\n\
    - 这个方法接受三个参数：`self`，一个NPC数组和一个子弹数组。\n- 我们定义了一个名为 `npc_index` 的变量，用于跟踪当前的NPC。\n\
    - 然后我们创建一个循环，遍历作为参数传递的数组中包含的所有NPC。\n- 对于每个NPC，我们检查是否与子弹发生碰撞。\n- 如果发生碰撞，我们减少被子弹击中的NPC的生命值。\n\
    - 然后我们绘制NPC，并从相应的数组中移除子弹。\n- 接着我们检查NPC的生命值是否小于或等于0；如果是，则从数组和游戏中移除该NPC。为此，我们使用变量\
    \ `npc_index`。\n\n一旦这个方法创建完成，我们只需要移除之前的红色目标，使用新的碰撞方法，并仅在应用延迟后才允许射击。\n\n请在名为 `window`\
    \ 的方法中注释掉以下代码：\n\n```python\n#pygame.draw.rect(WIN, 'RED', target)\n#pygame.draw.rect(WIN,\
    \ \"GREEN\", (target.x, target.y-10, target_health*30/100, 10))\n```\n\n修改 `main`\
    \ 方法中的代码如下（新代码用粗体表示）：\n\n```python\ntest = bullet.check_collision()\nif (test\
    \ == -1):\n    bullets.pop(-1)\n    target_health -= 10\n    if (target_health\
    \ <= 0):\n        target.x = 0\nbullet.check_collision2(npcs, bullets)\n```\n\n\
    在上面的代码中，我们注释掉了与红色方块碰撞检测相关的行；我们还调用了 `check_collision2` 方法，并将 `npcs` 和 `bullets`\
    \ 列表作为参数传递。\n\n请将以下代码添加到 `window` 方法中（新代码用粗体表示）：\n\n```python\nfor npc in npcs:\n\
