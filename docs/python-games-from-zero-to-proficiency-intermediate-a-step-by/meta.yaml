- md: "## Adding collision detection with the walls\n\nSo at this stage we have created\
    \ and displayed the walls; so we just need to detect collision between the player\
    \ and these walls. To be able to do so, we will apply a few simple steps:\n\n\
    - Whenever the player moves, we record its direction (i.e., up, down, left, or\
    \ right).\n- After the player has moved, we check whether the player character\
    \ is colliding with one of the blocks (based on both their positions).\n- In case\
    \ of collision, we will move the player character in the opposite direction.\n\
    \nPlease add the following code to the method\n\n```python\nplayer_collision_rect\
    \ = player_rect\nif (\n    player_collision_rect.colliderect(Wall_rect1) or\n\
    \    player_collision_rect.colliderect(Wall_rect2) or\n    player_collision_rect.colliderect(Wall_rect3)\
    \ or\n    player_collision_rect.colliderect(Wall_rect4) or\n    player_collision_rect.colliderect(Wall_rect5)\
    \ or\n    player_collision_rect.colliderect(Wall_rect6) or\n    player_collision_rect.colliderect(Wall_rect7)\
    \ or\n    player_collision_rect.colliderect(Wall_rect8) or\n    player_collision_rect.colliderect(Wall_rect9)\
    \ or\n    player_collision_rect.colliderect(Wall_rect10) or\n    player_collision_rect.colliderect(Wall_rect11)\
