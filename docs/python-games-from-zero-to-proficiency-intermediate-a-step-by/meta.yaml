    \ the player eats one of these pills, s/he is invulnerable for 1 minute.\n- After\
    \ that minute, the level will restart whenever the player character collides with\
    \ an NPC.\n\n## Chapter 6: Frequently Asked Questions\n\nThis chapter provides\
    \ answers to the most frequently asked questions about the features that we have\
    \ covered in this book.\n\n## Scripts\n\nHow do I create a script?\nOpen a new\
    \ text file in a text editor of your choice and save it with the extension.\n\n\
    How can I check that my script has no errors?\nYou can compile your script using\
    \ the Command Prompt.\n\nWhat is the dot notation for?\nThe dot notation refers\
    \ to Object-Oriented Programming. Using dots, you can access properties and methods\
    \ (or methods) related to a particular object.\n\n## Interaction with assets\n\
    \nHow do I detect collisions?\nTo detect collisions for a sprite you need to create\
    \ a rectangle of the same size of the sprite and then detect collision between\
    \ this rectangle and the player character using the method.\n\n```\nif (self.collision_rect.colliderect(npc.collision_rect)):\n\
    ```\n\nHow can I create a scoring system?\nFor a simple scoring system, you can\
    \ create an integer and increase its value by one every time the player has collected\
    \ an item.\n\n## Using a graphical user interface\n\nHow do I create a text to\
    \ be displayed onscreen?\nTo display text on screen, you will need to create a\
    \ font, then a surface based on this font that includes the text to display, and\
    \ then display this surface onscreen.\n\n```\nscore_to_display = \" Score \" +\
    \ str(score)\ninfo = info_user_font.render(score_to_display, 1, \"WHITE\")\nWIN.blit(info,\
    \ (400, 10))\n```\n\nHow do I update a text to be displayed onscreen?\nYou will\
    \ need to update the surface used to display the text.\n\nHow do I detect the\
    \ players’ choice (when asked to select an option)?\nYou just need to create an\
    \ infinite loop within which you detect the key that has been pressed, as illustrated\
    \ in the next code snippet.\n\n```\nkey = pygame.key.get_pressed()\nif key[pygame.K_r]:\n\
    \    level = 1\n```\n\n## Create and use classes\n\nHow to define and use a class?\n\
    \n- Define the class.\n- Define a constructor along with member methods and variables.\n\
    - Instantiate that class and save the instance in a variable.\n\n```\nclass NPC:\n\
    \    def __init__(self, x, y, color):\n        self.x = x\n        self.y = y\n\
    \        self.color = color\n    ...\nnpc1 = NPC(50, 50, \"BLUE\")\n```\n\n##\
    \ Using Lists\n\nHow to create a list?\n\nCreate a new variable followed by =\n\
    \n```\nammos = []\n```\n\nHow to add items to a list?\n\nUse the method\n\n```\n\
    ammos.append(\"Hello\")\n```\n\nHow to access all the items in a list?\n\nUse\
    \ a loop to go through all the elements.\n\n```\nfor item in items:\n    print(str(item))\n\
    ```\n\n## Pictures and Audio\n\nHow do I play a sound?\n\n- Initialize the audio\
    \ mixer.\n- Load the sound to be played.\n- Play the sound.\n\n```\nExample:\n\
    pygame.mixer.init()\n...\nbeeping_snd = pygame.mixer.Sound('assets/beep.wav')\n\
    pygame.mixer.Channel(1).play(beeping_snd)\n```\n\nHow do I load and display an\
    \ image?\n\n- Load the image by creating a variable that points to the location\
    \ of that image.\n- Display the image using the method called blit.\n\n```\nnpc_img\
    \ = pygame.image.load(\"assets/npc_blue.jpg\")\nnpc_img = pygame.transform.scale(npc_img,\
    \ (ennemy_size, ennemy_size))\n...\nWIN.blit(npc_img, (self.x, self.y))\n```\n\
    \n## Detecting user inputs\n\nHow can I detect keystrokes?\nYou can detect keystrokes\
    \ by using the method pygame.key.get_pressed(). For example, the following code\
    \ detects when the key E is pressed.\n\n```\nkey = pygame.key.get_pressed()\n\
    if key[pygame.K_e]:\n```\n\nHow can I detect a click on a button?\nTo detect clicks\
    \ on a button, you can do the following:\n\n- Detect events.\n- Detect whether\
    \ an event corresponds to a button pressed on the mouse.\n- Detect which button\
    \ was pressed.\n\n```\nfor event in pygame.event.get():\n    if event.type ==\
    \ MOUSEBUTTONDOWN:\n        if event.button == 1:\n```"
