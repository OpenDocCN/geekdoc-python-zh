  mdcn: "## 测验答案\n\n- 正确\n- 正确\n- 正确\n- 正确\n- 正确\n- 正确\n- 正确\n- 正确\n- 错误（因为至少有一个条件为真，它将显示\
    \ True）\n- 错误（因为至少有一个条件为假，它将显示 False）\n\n## 挑战 1\n\n既然你已经成功完成了本章并提升了技能，让我们来检验一下。\n\
    \n- 更改新实例化 NPC 的颜色。\n- 将所有 NPC 的默认/初始状态设置为巡逻。\n- 更改 NPC 的速度。\n\n## 第五章：打磨我们的游戏\n\
    \n在本节中，我们将通过添加更多功能来开始打磨我们的游戏。\n\n完成本章后，你将能够：\n\n- 为 NPC 使用图片。\n- 使用循环在屏幕上绘制多个物品。\n\
    - 添加并播放音效。\n- 为 NPC 添加额外的行为。\n\n## 更改敌人的外观\n\n在本节中，我们将通过将迄今为止用于表示 NPC 的方块替换为实际的幽灵图像来更改\
    \ NPC 的外观。\n\n请打开你的脚本。\n在代码 `=` 之后、任何方法或类之外添加以下代码：\n\n```\nnpc_img = pygame.image.load(\"\
    assets/npc_blue.jpg\")\nnpc_img = pygame.transform.scale(npc_img,\n(ennemy_size,ennemy_size))\n\
    ```\n\n在前面的代码中，我们定义了变量 `npc_img`，它链接到保存在文件夹中的图像 `npc_blue`。然后我们转换此图像，使其适应用于 NPC\
    \ 碰撞的矩形，该矩形基于我们之前定义的变量 `ennemy_size`。\n\n请按如下方式修改 `NPC` 类中的 `draw` 方法（新代码为粗体）：\n\
    \n```\ndef draw (self):\n    #pygame.draw.rect(WIN,self.color,(self.x,self.y,\
    \ 30, 30))\n    WIN.blit(npc_img,(self.x, self.y))\n    pygame.draw.rect(WIN,\
    \ \"GREEN\", (self.x, self.y-10,\n    self.health*30/100, 10))\n```\n\n在前面的代码中：\n\
    \n我们修改了名为 `draw` 的方法，使其显示图像而不是方块。\n\n我们注释掉了之前用于显示方块的代码。然后，我们基于之前定义的变量 `npc_img`\
    \ 显示蓝色幽灵的图像。\n\n你现在可以编译你的代码了。游戏启动时，你应该看到所有 NPC 现在都显示为蓝色幽灵，如下图所示。\n\n![](img/c9583cf50ad5be24b6f6664ecc4a5c58_136_0.png)\n\
    \n## 显示点\n\n目前，我们的玩家角色可以收集弹药并向 NPC 射击；虽然这是一个很棒的功能，但如果玩家角色能够收集其他物品（例如，像吃豆人中的药丸）并相应地增加分数，那就更好了。\n\
    \n因此，在本节中，我们将：\n\n- 定义每个药丸的位置。\n- 相应地使用循环显示这些药丸。\n- 检测玩家角色与药丸之间的碰撞。\n- 在药丸被收集后将其移除。\n\
    - 显示分数并在收集药丸时播放音效。\n\n那么首先，让我们定义并显示药丸；我们想要通过药丸实现的布局如下图所示。\n\n![](img/c9583cf50ad5be24b6f6664ecc4a5c58_137_0.png)\n\
    \n如上图所示：\n\n药丸排列成四行四列。\n每个药丸由一个橙色圆盘表示。\n药丸与构成迷宫的不同行和列对齐。\n分数以白色显示在窗口顶部。\n\n首先让我们显示要收集的药丸。\n\
    \n请在任何方法或类之外添加以下代码：\n\n```\ndots = []\ndef init_dots():\n    global dots\n   \
    \ dots = []\n    for i in range(0,4):\n        for j in range (0,6):\n       \
    \     dots.append (pygame.Rect(65+j*(WALL_INDENT),\n            60+i*WALL_INDENT,\
    \ ennemy_size, ennemy_size))\ninit_dots()\n```\n\n在前面的代码中：\n\n我们定义了一个名为 `dots`\
    \ 的列表，它将保存屏幕上显示的所有点；在这里使用列表将使管理、显示和移除游戏进行中的点变得容易得多。\n然后我们创建一个名为 `init_dots` 的方法。\n\
    在此方法中，我们引用了之前定义的名为 `dots` 的全局变量。\n\n然后我们使用两个嵌套循环；第一个使用变量 `i` 的循环用于点的每一行，而第二个使用变量\
    \ `j` 的循环用于一行中的每个点（即列）。\n定义这两个循环后，我们使用变量 `i` 和 `j`，它们分别循环到 3 和 5，向列表中添加一个新项。这些项中的每一个都是一个矩形，它将用于（除其他外）检测与玩家的碰撞。每个矩形的位置由第一个项的初始位置、变量\
    \ `WALL_INDENT`（每行之间的空间）和 NPC 的大小（我们可以使用不同的大小，我们使用此大小是为了屏幕上显示的所有物品保持一致性）定义。\n\
    最后，我们调用我们刚刚创建的方法。将代码放在方法中将使以后（特别是在需要重新初始化关卡时）能够重新初始化每个药丸的位置。\n\n接下来，我们需要显示这些点，这将通过遍历\
    \ `dots` 列表并在为每个点定义的位置绘制一个圆来完成。\n\n请在方法 `window` 中的代码 `pygame.display.update()`\
    \ 之前添加以下代码：\n\n```\nfor dot in dots:\n    pygame.draw.circle(WIN, \"Orange\",\
    \ (dot.x+ennemy_size/2,\n    dot.y+ennemy_size/2), ennemy_size/4)\n```\n\n在前面的代码中：\n\
    \n我们遍历名为 `dots` 的列表中定义的所有点。\n然后我们为每个点绘制一个橙色圆圈。\n\n我们确保这个圆圈位于为此圆圈定义的碰撞矩形的中心。\n\n\
    你现在可以保存并编译你的代码了。运行游戏时，你现在应该看到点显示在每一行内。\n\n![](img/c9583cf50ad5be24b6f6664ecc4a5c58_140_0.png)\n\
    \n## 检测与点的碰撞并更新分数\n\n在上一节中，我们成功显示了玩家角色要收集的点；因此在本节中，我们将检测玩家与这些点之间的碰撞，并在发生碰撞时相应地增加分数。\n\
    那么，首先让我们检测与点的碰撞：\n\n请在任何类或方法之外添加以下代码。\n\n```\npygame.mixer.init()\nbeeping_snd\
    \ = pygame.mixer.Sound('assets/beep.wav')\nscore = 0\n```\n\n在前面的代码中，我们初始化了混音器模块，然后创建了变量\
    \ `beeping_snd`，它链接到 wav 文件。\n\n请在方法 `check_collision_with_player` 的开头添加以下代码（新代码为粗体）：\n\
    \n```\ndef check_colission_with_player():\n    global dots, score\n```\n\n在前面的代码中，我们引用了全局变量\
    \ `score` 和 `dots`。\n\n请在方法 `check_collision_with_player` 的末尾添加以下代码：\n\n```\n\
    dot_index = 0\nfor dot in dots:\n    if (player_collision_rect.colliderect(dot)):\n\
    \        dots.pop(dot_index)\n        pygame.mixer.Channel(1).play(beeping_snd)\n\
    \        score += 1\n    dot_index += 1\n```\n\n在前面的代码中：\n\n我们创建一个循环，以便遍历名为 `dots`\
    \ 的列表中包含的所有点。\n对于每个点，我们检查该点与玩家之间的碰撞。\n如果发生碰撞，我们播放哔哔声，并增加分数。\n我们还从列表中移除当前点。\n然后我们增加变量\
    \ `dot_index` 的值。\n\n你现在可以保存并运行你的代码了，你应该看到当玩家与一个点碰撞时，该点会从游戏中移除，如下图所示。\n\n![](img/c9583cf50ad5be24b6f6664ecc4a5c58_142_0.png)\n\
    \n## 显示分数\n\n在这个阶段，我们可以拾取点，我们现在需要的是跟踪并在屏幕上显示分数。\n\n请打开脚本。\n在方法 `window` 中的代码 `pygame.display.update()`\
    \ 之前添加以下代码：\n\n```\nscore_to_display = \" Score \" + str (score)\ninfo = info_user_font.render(score_to_display,1,\"\
    WHITE\")\nWIN.blit(info,(400,10))\n```\n\n在前面的代码中：\n\n我们声明变量 `score_to_display`，它包含一条由字符串\
    \ \" Score \" 后跟实际分数值组成的消息。\n然后我们以白色渲染此消息。\n最后，我们在屏幕顶部显示渲染后的文本。\n\n你现在可以保存并编译你的代码了。游戏运行时，你应该看到分数显示在窗口顶部，并且其值会随着你收集更多点而更新，如下图所示。"
