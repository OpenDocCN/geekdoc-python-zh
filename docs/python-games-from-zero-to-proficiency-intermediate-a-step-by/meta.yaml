    \ 0。\n最后，我们定义了变量 p_current 和 animation_frame，前者用作当前要显示的图像，后者对应于动画中的当前帧。\n\n现在我们已经定义了要包含在动画中的不同图像，我们将创建一个生成动画的方法。\n\
    \n请将以下函数添加到脚本中：\n\n```python\ndef animation():\n    global p_1,p_2,p_3,p_4,p_current,\
