    \ method called window before the code\n\n```\nfor dot in dots:\n    pygame.draw.circle(WIN,\
    \ \"Orange\", (dot.x+ennemy_size/2,\n    dot.y+ennemy_size/2), ennemy_size/4)\n\
    ```\n\nIn the previous code:\n\nWe loop through all the dots defined in the list\
    \ called\nWe then draw an orange circle for each dot.\n\nWe ensure that this circle\
    \ is in the middle of the collision rectangle defined for this circle.\n\nYou\
    \ can now save and compile your code. As your run the game, you should now see\
    \ that the dots are now displayed within each row.\n\n![](img/c9583cf50ad5be24b6f6664ecc4a5c58_140_0.png)\n\
    \n## Detecting collision with the dots and updating the score\n\nIn the previous\
