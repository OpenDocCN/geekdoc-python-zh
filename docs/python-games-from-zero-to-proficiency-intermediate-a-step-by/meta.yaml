    \ = 0\n```\n\n在前面的代码中，我们定义了 `Inventory` 类以及一些成员变量，这些变量将用于定义添加到物品栏中的武器类型。我们还定义了构造函数，在其中声明了一个列表，用于存储该物品栏中的所有武器，以及一个变量\
