    described below:

    below: below: below: below: below: below: below: below: below: below:

    below: below:


    ## How Can You Learn Best from this Book?


    Talk to your friends about what you are doing.


    We often think that we understand a topic until we have to explain it to friends
    and answer their questions. By explaining your different projects, what you just
    learned will become clearer to you.


    Do the exercises.


    All chapters include exercises that will help you to learn by doing. In other
    words, by completing these exercises, you will be able to better understand the
    topic and gain practical skills (i.e., rather than just reading).


    Don’t be afraid of making mistakes.


    I usually tell my students that making mistakes is part of the learning process.
    The more mistakes you make, the more opportunities you have for learning. At the
    start, you may find the errors disconcerting, or that Python does not work as
    expected until you understand what went wrong.


    Compile and run your games early.


    It is always great to compile and run your first game.


    Learn in chunks.


    It may be disconcerting to go through five or six chapters straight, as it may
    lower your motivation. Instead, give yourself enough time to learn, go at your
    own pace, and learn in small units (e.g., between 15 and 20 minutes per day).
    This will do at least two things for you: it will give your brain the time to
    “digest” the information that you have just learned, so that you can start fresh
    the following day. It will also make sure that you don’t “burn out” and that you
    keep your motivation levels high.


    ## Feedback


    While I have done everything possible to produce a book of high quality and value,
    I always appreciate feedback from readers so that the book can be improved accordingly.
    If you would like to give feedback, you can email me at


    ## Downloading the Solutions for the Book


    You can download the solutions for this book after creating a free online account
    at Once you have registered, a link to the files will be sent to you automatically.


    To download the solutions for this book (e.g., code) you need to download the
    startup pack on the companion website; it consists of free resources that you
    will need to complete your projects and code solutions. To download these resources,
    please do the following:


    Open the page


