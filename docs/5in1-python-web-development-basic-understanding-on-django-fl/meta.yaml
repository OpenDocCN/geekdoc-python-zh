- md: "Our first web2py application is successfully created and deployed.\n\nTo summarize,\
    \ Web2py is a free, fast, secure web development framework that is entirely written\
    \ in python and encourages using python in every way possible (model, view, controller).\
    \ It is a very good framework for small web applications or prototypes but fails\
    \ to fulfil the enterprise class quality requirements. It is because, in an enterprise\
    \ level application, the complexity of solving bugs will increase exponentially\
    \ because of the lack of unit tests, good and accurate error reporting and scattered\
    \ model.\n\n## Pyramid Framework\n\nPyramid is a general, open source, web application\
    \ development framework built in python. It allows python developer to create\
    \ web applications with ease.\n\nPyramid is backed by the enterprise knowledge\
    \ Management System KARL (a George Soros project).\n\n## Installing, starting\
    \ up and configuring\n\nAs described, “the start small, finish big, stay finished\
    \ framework”, Pyramid is much like Flask which takes very little effort to install\
    \ and run. In fact, you’ll recognize that some of the patterns are similar to\
    \ Flask once you start building this application.\n\nFollowing are the steps to\
    \ create pyramid framework environment –\n\n- First, create a project directory.\
    \ Here, we have created a directory named **pyramidProject** (you can choose any\
    \ name you want).\n- Next, create a virtual environment where you will install\
    \ all the project specific dependencies. Here, we created a virtual environment\
    \ folder named **pyramidEnv** where Pyramid is installed.\n- Then, go to the directory,\
    \ **pyramidEnv** and install the pyramid with **pip install pyramid**.\n\nOnce\
    \ everything is done as mentioned above, your directory structure will be as shown\
    \ below –\n\n![](img/abfbc559bd15a047a445fb826086e81f_52_0.png)\n\nAnd the pyramid\
    \ version installed in the system is given below –\n\n```\n>>> import pkg_resources\n\
    >>> pkg_resources.get_distribution(\"pyramid\").version\n'1.9.2'\n```\n\n## Core\
    \ Concepts\n\nThe Pyramid framework is based on below core concepts –\n\n- **Zope**\
    \ (extensibility, traversal, declarative security) – Pyramid is loosely based\
    \ on Zope in terms of extensibility, the concept of traversal and the declarative\
    \ security.\n- **Pylons** (URL dispatch, non-opinionated view of persistence,\
    \ templating, etc.) – Another area from where pyramid draws its concept is the\
    \ pylons project. Pylons have that concept of routes, that calls the URL dispatch\
    \ inside the pyramid framework and they also have the non-opinionated view of\
    \ persistence layer or templating.\n- **Django** (View, level of documentation)\
    \ – Pyramid also gets hint from Django. The way we take our view, routed our URL\
    \ and the level of documentation is very Django way.\n\nThe following are the\
    \ features of the Pyramid framework –\n\n- It is the fastest known Python web\
    \ framework.\n- It supports small and large projects (why rewrite when you outgrow\
    \ your small framework).\n- It supports single file webapps like microframeworks.\n\
    - It has built-in sessions.\n- It supports events similar to Plone/Zope.\n- It\
    \ provides Transaction Management (if already have noticed that we have used Zope\
    \ before).\n\n## Configuration\n\nConfiguration is the settings that influence\
    \ the operation of an application. There are two ways to configure a pyramid application:\
    \ imperative configuration and declarative configuration.\n\nPyramid configuration\
    \ supports –\n\n- Imperative configuration or even the overriding of the decorator-based\
    \ configs\n- Configuration conflict detection (including more local vs. less local\
    \ determination)\n- Configuration Extensibility (included from multiple apps)\n\
    - Flexible Authentication and Authorization Policies\n- Programmatic Introspection\
    \ of Configuration (view current state of routes to generate nav)\n\n## URL generation\n\
    \nIn pyramid, we can generate URLs for routes, resources and static assets. It\
    \ is easy and flexible to work with URL generation APIs. By generating URLs through\
    \ pyramid’s various APIs, users can change the configuration arbitrarily without\
    \ much worry of breaking a link with any of your web pages.\n\nSo in short, URL\
    \ in pyramid –\n\n- supports URL generation to allow changes to app that won’t\
    \ break links.\n- generates URLs to static resources that live either inside or\
    \ outside the application.\n- supports Routes and Traversal.\n\n## Views\n\nOne\
    \ of the primary jobs of pyramid is to find and invoke a view callable when a\
    \ request reaches your application. View callables are bits of code which do something\
    \ interesting in response to a request made in your application.\n\nWhen you map\
    \ your views onto your URL dispatch or python code, there can be any kind of call.\
    \ Views can be a function declaration or an instance, it can be used as a view\
    \ in the pyramid.\n\nSome important points about Views are given below –\n\n-\
    \ Views are generated from any callable.\n- Renderer based views can simply return\
    \ dictionaries (not required to return a webby style object).\n- Support multiple\
    \ views per route (GET vs. POST vs. HTTP Header check, etc.).\n- View response\
    \ adapters (when you want to specify how view returns values should be handled\
    \ vs. response objects).\n\n## Extensibility\n\nPyramid is designed with extensibility\
    \ in mind. So if a pyramid developer is keeping in mind certain constraints while\
    \ building an application, a third party should be able to change the application’s\
    \ behaviour without needing to modify its source code. The behaviour of a pyramid\
    \ application that obeys certain constraints can be overridden or extended without\
    \ any modification. It is designed for flexible deployments to multiple environments\
    \ (No Singletons). Pyramid has “Tweens” middleware support (WSGI middle ware,\
    \ but runs in the context of Pyramid itself).\n\n## Running a Hello, Pyramid Program\n\
    \nThe simplest program we can think after installing pyramid framework to check\
    \ if everything is working fine, is to run a simple “Hello, World” or “Hello,\
    \ Pyramid” program.\n\nBelow is my pyramid “Hello, Pyramid” program on 8000 port\
    \ number –\n\n```python\nfrom wsgiref.simple_server import make_server\nfrom pyramid.config\
    \ import Configurator\nfrom pyramid.response import Response\n\ndef hello_world(request):\n\
    \    return Response('<h1>Hello Pyramid!</h1>')\n\nif __name__ == '__main__':\n\
    \    with Configurator() as config:\n        config.add_route('hello', '/')\n\
    \        config.add_view(hello_world, route_name='hello')\n        app = config.make_wsgi_app()\n\
    \    server = make_server('0.0.0.0', 8000, app)\n    server.serve_forever()\n\
    ```\n\nAbove simple example is easy to run. Save this as app.py (In this, we have\
    \ given the name pyramid_helloW.py).\n\nRunning the simplest program: –\n\n```\n\
    (pyramidEnv) C:\\Users\\rajesh\\pyramidProject>python pyramid_helloW.py\n127.0.0.1\
    \ - - [09/Sep/2018 19:03:52] \"GET / HTTP/1.1\" 200 23\n127.0.0.1 - - [09/Sep/2018\
    \ 19:03:53] \"GET /favicon.ico HTTP/1.1\" 404 164\n```\n\nNext, open http://localhost:8000/\
    \ in a browser, and you will see the Hello, Pyramid! Message as follows –\n\n\
    ![](img/abfbc559bd15a047a445fb826086e81f_56_0.png)\n\nThe following is the explanation\
    \ for above code –\n\n**Line no. 1-3**\n\nAt the head of the file, we have import\
    \ statements. The first line imports make_server function, which can create a\
    \ simple web server when it is passed to an application. The second and third\
    \ line import the configuration and Response function from pyramid. These functions\
    \ are used to configure details and set parameters for the application and respond\
    \ to requests, respectively.\n\n**Line no. 5-6**\n\nNow we have a function definition\
    \ called **hello_world**. Implement view code that generates the response. A function\
    \ that fulfils the requirement of a view is responsible for rendering the text\
    \ that will be passed back to the requesting entity. In the above case, the function,\
    \ when called, uses the Response function we imported earlier. This passes back\
    \ a value that should be given to the client.\n\n**Line no. 8**\n\nif __name__\
    \ == '__main__': Python is saying, “Start here when running from the command line”,\
    \ rather than when this module is imported.\n\n**Line no. 9-11**\n\nIn line no.\
    \ 9, we create a variable called config out of the object created by the configurator\
    \ function that we imported at the top of the program. Line 10 and 11 call the\
    \ add_route and add_view method of this object. This method is used to define\
    \ a view that can be used by the application. As we can see, we pass the hello_world\
    \ function we defined earlier. This is where that function is actually incorporated\
    \ as a view.\n\n**Line no. 12-14**\n\nIn this, we actually create the WSGI application\
    \ by calling the make_wsgi_app method of the config object. This uses the object’s\
    \ attributes, such as the view we added, to create an application. This application\
    \ is then passed to the make_server function we imported in order to create an\
    \ object that can launch a web server to serve our application. The last line\
    \ launches this server.\n\nOur **hello world application** is one of the simplest\
    \ and easiest possible pyramid applications, configured “imperatively”. It is\
    \ imperative because the full power of Python is available to us as we perform\
    \ configuration tasks."
  mdcn: "我们的第一个web2py应用已成功创建并部署。\n\n总结一下，Web2py是一个免费、快速、安全的Web开发框架，完全用Python编写，并鼓励在所有可能的地方使用Python（模型、视图、控制器）。它是一个非常适合小型Web应用或原型的框架，但无法满足企业级的质量要求。这是因为在企业级应用中，由于缺乏单元测试、良好且准确的错误报告以及分散的模型，解决bug的复杂性会呈指数级增长。\n\
    \n## Pyramid框架\n\nPyramid是一个通用的、开源的、用Python构建的Web应用开发框架。它让Python开发者能够轻松创建Web应用。\n\
    \nPyramid由企业知识管理系统KARL（一个乔治·索罗斯的项目）提供支持。\n\n## 安装、启动和配置\n\n正如所述，“从小处着手，成就大事，保持完成”，Pyramid与Flask非常相似，安装和运行所需的努力非常少。事实上，一旦你开始构建这个应用，你会认识到其中一些模式与Flask相似。\n\
    \n以下是创建Pyramid框架环境的步骤——\n\n- 首先，创建一个项目目录。这里，我们创建了一个名为**pyramidProject**的目录（你可以选择任何你喜欢的名字）。\n\
    - 接下来，创建一个虚拟环境，你将在其中安装所有项目特定的依赖项。这里，我们创建了一个名为**pyramidEnv**的虚拟环境文件夹，并在其中安装了Pyramid。\n\
    - 然后，进入目录**pyramidEnv**，使用**pip install pyramid**安装pyramid。\n\n一旦按照上述步骤完成所有操作，你的目录结构将如下所示——\n\
    \n![](img/abfbc559bd15a047a445fb826086e81f_52_0.png)\n\n系统中安装的pyramid版本如下——\n\n\
    ```\n>>> import pkg_resources\n>>> pkg_resources.get_distribution(\"pyramid\"\
    ).version\n'1.9.2'\n```\n\n## 核心概念\n\nPyramid框架基于以下核心概念——\n\n- **Zope**（可扩展性、遍历、声明式安全）——Pyramid在可扩展性、遍历概念和声明式安全方面松散地基于Zope。\n\
    - **Pylons**（URL调度、对持久化、模板等的非固执己见的观点）——Pyramid借鉴其概念的另一个领域是Pylons项目。Pylons有路由的概念，这在Pyramid框架内部调用URL调度，它们也对持久化层或模板持非固执己见的观点。\n\
    - **Django**（视图、文档水平）——Pyramid也从Django中获得启发。我们处理视图、路由URL的方式以及文档水平都非常Django化。\n\
    \n以下是Pyramid框架的特性——\n\n- 它是已知最快的Python Web框架。\n- 它支持小型和大型项目（当你的小型框架不够用时，为什么要重写呢）。\n\
    - 它支持像微框架一样的单文件Web应用。\n- 它具有内置的会话。\n- 它支持类似于Plone/Zope的事件。\n- 它提供事务管理（如果你已经注意到我们之前使用过Zope）。\n\
    \n## 配置\n\n配置是影响应用程序操作的设置。有两种方法可以配置Pyramid应用：命令式配置和声明式配置。\n\nPyramid配置支持——\n\n\
    - 命令式配置，甚至可以覆盖基于装饰器的配置\n- 配置冲突检测（包括更局部与更不局部的确定）\n- 配置可扩展性（从多个应用包含）\n- 灵活的认证和授权策略\n\
    - 配置的编程内省（查看路由的当前状态以生成导航）\n\n## URL生成\n\n在Pyramid中，我们可以为路由、资源和静态资产生成URL。使用URL生成API既简单又灵活。通过Pyramid的各种API生成URL，用户可以随意更改配置，而无需担心破坏任何网页的链接。\n\
    \n所以简而言之，Pyramid中的URL——\n\n- 支持URL生成，以允许对应用进行更改而不会破坏链接。\n- 为位于应用内部或外部的静态资源生成URL。\n\
    - 支持路由和遍历。\n\n## 视图\n\nPyramid的主要工作之一是在请求到达你的应用时找到并调用一个视图可调用对象。视图可调用对象是响应于应用中发出的请求而执行某些有趣操作的代码片段。\n\
    \n当你将视图映射到你的URL调度或Python代码时，可以是任何类型的调用。视图可以是函数声明或实例，它可以在Pyramid中用作视图。\n\n关于视图的一些重要点如下——\n\
    \n- 视图可以从任何可调用对象生成。\n- 基于渲染器的视图可以简单地返回字典（不需要返回Web风格的对象）。\n- 支持每个路由多个视图（GET vs.\
    \ POST vs. HTTP头检查等）。\n- 视图响应适配器（当你想指定如何处理视图返回值与响应对象时）。\n\n## 可扩展性\n\nPyramid在设计时就考虑了可扩展性。因此，如果Pyramid开发者在构建应用时考虑到某些约束，第三方应该能够在不修改源代码的情况下改变应用的行为。遵守某些约束的Pyramid应用的行为可以在没有任何修改的情况下被覆盖或扩展。它被设计用于灵活部署到多个环境（没有单例）。Pyramid具有“Tweens”中间件支持（WSGI中间件，但在Pyramid自身的上下文中运行）。\n\
    \n## 运行一个Hello, Pyramid程序\n\n安装Pyramid框架后，我们能想到的最简单的程序来检查一切是否正常工作，就是运行一个简单的“Hello,\
    \ World”或“Hello, Pyramid”程序。\n\n下面是我的Pyramid “Hello, Pyramid”程序，运行在8000端口——\n\n\
    ```python\nfrom wsgiref.simple_server import make_server\nfrom pyramid.config\
    \ import Configurator\nfrom pyramid.response import Response\n\ndef hello_world(request):\n\
    \    return Response('<h1>Hello Pyramid!</h1>')\n\nif __name__ == '__main__':\n\
    \    with Configurator() as config:\n        config.add_route('hello', '/')\n\
    \        config.add_view(hello_world, route_name='hello')\n        app = config.make_wsgi_app()\n\
    \    server = make_server('0.0.0.0', 8000, app)\n    server.serve_forever()\n\
    ```\n\n上面的简单示例很容易运行。将其保存为app.py（在这里，我们将其命名为pyramid_helloW.py）。\n\n运行最简单的程序：-\n\
    \n```\n(pyramidEnv) C:\\Users\\rajesh\\pyramidProject>python pyramid_helloW.py\n\
    127.0.0.1 - - [09/Sep/2018 19:03:52] \"GET / HTTP/1.1\" 200 23\n127.0.0.1 - -\
    \ [09/Sep/2018 19:03:53] \"GET /favicon.ico HTTP/1.1\" 404 164\n```\n\n接下来，在浏览器中打开http://localhost:8000/，你将看到如下所示的Hello,\
    \ Pyramid!消息——\n\n![](img/abfbc559bd15a047a445fb826086e81f_56_0.png)\n\n以下是上述代码的解释——\n\
    \n**第1-3行**\n\n在文件开头，我们有导入语句。第一行导入make_server函数，当传递给一个应用时，它可以创建一个简单的Web服务器。第二行和第三行从pyramid导入配置和Response函数。这些函数分别用于配置应用的详细信息和设置参数，以及响应请求。\n\
    \n**第5-6行**\n\n现在我们有一个名为**hello_world**的函数定义。实现生成响应的视图代码。满足视图要求的函数负责渲染将传递回请求实体的文本。在上面的例子中，该函数在被调用时使用了我们之前导入的Response函数。这会将一个值传递回客户端。\n\
    \n**第8行**\n\nif __name__ == '__main__': Python的意思是，“当从命令行运行时从这里开始”，而不是当这个模块被导入时。\n\
    \n**第9-11行**\n\n在第9行，我们使用程序顶部导入的configurator函数创建的对象创建了一个名为config的变量。第10行和第11行调用该对象的add_route和add_view方法。此方法用于定义应用可以使用的视图。正如我们所看到的，我们传递了之前定义的hello_world函数。这就是该函数实际作为视图被纳入的地方。\n\
    \n**第12-14行**\n\n在这里，我们通过调用config对象的make_wsgi_app方法实际创建了WSGI应用。这使用对象的属性，例如我们添加的视图，来创建一个应用。然后，将此应用传递给我们导入的make_server函数，以创建一个可以启动Web服务器来服务我们应用的对象。最后一行启动了这个服务器。\n\
    \n我们的**hello world应用**是最简单、最容易的Pyramid应用之一，采用“命令式”配置。之所以是命令式，是因为在执行配置任务时，Python的全部功能都可供我们使用。"
