  md: '# Django Framework


    In this chapter, we will discuss about Django Framework in detail.


    Django is an MVT web framework that is used to build web applications. The huge
    Django web-framework comes with so many “batteries included” that developers often
    get amazed as to how everything manages to work together. The principle behind
    adding so many batteries is to have common web functionalities in the framework
    itself instead of adding latter as a separate library.


    One of the main reasons behind the popularity of Django framework is the huge
    Django community. The community is so huge that a separate website was devoted
    to it where developers from all corners developed third-party packages including
    authentication, authorization, full-fledged Django powered CMS systems, e-commerce
    add-ons and so on. There is a high probability that what you are trying to develop
    is already developed by somebody and you just need to pull that into your project.


    # Why should you use Django?


    Django is designed in such a way that encourages developers to develop websites
    fast, clean and with practical design. Django’s practical approach to getting
    things done is where it stands out from the crowd.


    If you’re planning to build a highly customizable app, such as social media website,
    Django is one of the best frameworks to consider. Django strength lies in its
    interaction between users or its ability to share different types of media. One
    of the great advantage of django is its ability to utilize large community-based
    support which gives you highly customizable third-party ready to use plugins in
    your applications.


    Below are the top ten reasons to choose Django for web development –


    # Python


    Python is arguably one of the easiest programming languages to learn because of
    its simple language constructs, flow structure and easy syntax. It is versatile
    and runs websites, desktop'
  merge: -1
  pgno: 15
- img_proc: true
  md: 'applications and mobile applications embedded in many devices and is used in
    other applications as a popular scripting language.


    # Batteries Included


    Django comes with common libraries which are essential to build common functionalities
    like URL routing, authentication, an object-relational mapper (ORM), a templating
    system and db-schema migrations.


    # Built-in admin


    Django has an in-built administration interface which lets you handle your models,
    user/ group permissions and to manage users. With model interface in place, there
    is no need for a separate database administration program for all but advanced
    database functions.


    # Doesn''t get in your way


    Creating a Django application adds no boilerplate and no unnecessary functions.
    There''s no mandatory imports, third-party libraries and no XML configuration
    files.


    # Scalable


    Django is based on MVC design pattern. It means that all the entities like db
    (database), back-end and front-end code are individual entity. Django allows us
    to separate code from the static media including pictures, files, CSS and JavaScript
    that make up your site.


    Django supports a full list of third-party libraries for web servers, caching,
    performance management, clustering and balancing. One of the advantages Django
    provides is the support for major email and messaging applications and services
    like ReST and OAuth.


    # Battle tested


    Django was first open-sourced in 2005. After 12 years of growth, Django now not
    only runs news publishing websites but also runs all or part of major global enterprise
    like Pinterest, Instagram, Disqus, Bitbucket, EventBrite and Zapier. This makes
    it a robust and reliable web framework to work with.'
