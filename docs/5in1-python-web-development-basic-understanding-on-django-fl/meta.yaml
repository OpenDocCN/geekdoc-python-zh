    ![](img/abfbc559bd15a047a445fb826086e81f_56_0.png)\n\nThe following is the explanation\
    \ for above code –\n\n**Line no. 1-3**\n\nAt the head of the file, we have import\
    \ statements. The first line imports make_server function, which can create a\
    \ simple web server when it is passed to an application. The second and third\
