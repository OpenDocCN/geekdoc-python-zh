    \nThis is just an overview of Django and we are able to create a blog with just\
    \ a few lines of code.\n\n## Flask Framework\n\nFlask is micro-framework which\
    \ has very little dependency on external libraries. It is a very light framework\
    \ and gives us freedom to do whatever we want.\n\nIn this chapter, we are going\
    \ to build a project using Python and Flask framework.\n\n## Flask Startup and\
    \ Configuration\n\nLike most widely used python libraries, the Flask package is\
