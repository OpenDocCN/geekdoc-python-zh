  md: '# Dash Framework


    In this chapter, we will discuss about the Dash framework in detail.


    Dash is an open-source Python framework used for building analytical web applications.
    It is a powerful library that simplifies the development of data-driven applications.
    It’s especially useful for Python data scientists who aren’t very familiar with
    web development. Users can create amazing dashboards in their browser using dash.


    Built on top of Plotly.js, React, and Flask, Dash ties modern UI elements like
    dropdowns, sliders and graphs directly to your analytical python code.


    Dash apps consist of a Flask server that communicates with front-end React components
    using JSON packets over HTTP requests.


    Dash applications are written purely in python, so NO HTML or JavaScript is necessary.


    # Dash Setup


    If Dash is not already installed in your terminal, then install the below mentioned
    Dash libraries. As these libraries are under active development, install and upgrade
    then frequently. Python 2 and 3 are also supported.


    +   - pip install dash==0.23.1 # The core dash backend

    - pip install dash-renderer==0.13.0 # The dash front-end

    - pip install dash-html-components==0.11.0 # HTML components

    - pip install dash-core-components==0.26.0 # Supercharged components

    - pip install plotly==3.1.0 # Plotly graphing library


    In order to make sure everything is working properly, here, we created a simple
    dashApp.py file.'
  merge: -1
  pgno: 59
