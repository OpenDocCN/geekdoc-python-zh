    style and more. However, Django includes all the batteries a web application needs,
    so we just need to install Django and start working.


    Django comes with an ORM, whereas Pyramid and Flask leave it to the developer
    to choose how (or if) they want their data to be stored. Generally, the most common
    ORM for non-Django web applications is SQLAlchemy by far, however, other options
    can be DjangoDB, MongoDB, LevelDB and SQLite.


    Being a developer, if I have to choose between Django and Web2py for my project.
    I need to have some idea of both the frameworks’ benefits and limitations. So
    let us compare Django and Web2py –'
  - '[PAGE 75]


    # Django


    The community of Django is a big plus. This actually means to a developer is the
    wealth of resources will be greater. Specifically, this comes down to –


    +   - Documentation

    - Open source resources

    - Third-party apps support

    - Deployment support

    - IRC channels with helpful developers


    Django has a very big community of development team and documentation. It is the
    right framework when we are dealing with writing a complex backend as it provides
    a lot of third party apps that lets you automate things like user’s logic (signup,
    authentication), asynchronous tasks, API creation, blogs, etc.


    # Web2py


    Web2py is a good fit to fast development of simple web apps or http servers. Below
    are some of the benefits and limitations of web2py.


    # Benefits of Web2py


    The following are some of the benefits of Web2py framework –


    +   - Web2py is a potential framework when compared to Django and Flask in terms
    of speed and simplicity of the development. As Web2py uses python-based template
    language, this allows python developers to start writing code immediately after
    understanding the basics of writing template as views.

    - Web2py can run python compiled code as an optimization to lower the running
    time and to allow you to distribute your code in a compiled fashion.'
- md: '## Limitations of Web2py


    The following are some of the limitations of the framework:


    - Web2py supports doctests, however it does not support unit testing. Now doctests
    are not the optimal choice because of their limited scope.

    - There is no differentiation between production and development mode. In case
    an exception occurred, ticket is generated all the times and you will have to
    navigate to the ticket to check the error. This might be helpful in case of production
    server but will be difficult in development environment as developers really need
    to see the error instantly rather than checking the ticket number.

    - Web2py has a good database abstraction layer (DAL) that allows you to abstract
    many types of database engines but it lacks powerful ORM. In case you are dealing
    with relatively large model, your code will get scattered by all nested definitions
    and attributes which makes things complicated.

    - We cannot use standard python development tools without modifications as web2py
    has really poor IDE support.


    The Django and Web2py framework are full stack frameworks. This means they provide
    all the code needed – from form generators to templating layouts and forms validation,
    and leave you to write things according to your specific needs.


    However, with the non-stack frameworks like Flask and Pyramid, if you want to
    create a full-featured website, you will need to add a lot of code and extra bits
    yourself. This takes lot of skill and time.


    ## Dash


    Dash is entirely designed for specific task of building a reactive framework for
    dashboards. Dash by Plotly is a great way for the python developer to create interactive
    web apps without having to learn Javascript and front end web development. Dash
    is built on top of Flask, Plotly.js, React and React Js.


    There is no comparison between Dash and other frameworks (mentioned above) as
    they belong to different category of frameworks. Below are some of the reasons
    to prefer dash over other interactive dashboard frameworks (Jupiter Dashboards,
    matplotlib and other) –


    - With just 50 lines of code, you can write a simple “hello world” Dash app, as
    Dash requires very little boilerplater.

    - Entire Dash apps are written in python language, the most preferred language
    globally.

    - In your own python code, you can bind dash interactive components like dropdown,
    text inputs, sliders, and graphs with reactive Dash “callbacks”.

    - Complicated UIs in Dash apps can have multiple inputs, multiple outputs and
    inputs that depends on other inputs.

    - Simultaneously, multiple users can work on Dash apps.

    - For creating your own Dash components with React, dash uses React.js to render
    components and includes a plugin system.

    - Developers or writers can write dash apps that respond to clicking, hovering
    or selecting points on the graph as Dash’s Graph components are interactive.


    ## Conclusion


    We can conclude that choosing the right framework out of many available python
    frameworks solely depends on the type of project, complexity, small or enterprise
    level project, kind of community support available or online resource available,
    scalability, security, etc.


    The above mentioned python frameworks are best in their class but have their own
    benefits and drawbacks (depending on the project requirement). So, one type of
    framework is not suitable for all kinds of projects.'
  mdcn: '## Web2py 的局限性


    以下是该框架的一些局限性：


    - Web2py 支持 doctest，但不支持单元测试。由于 doctest 的范围有限，目前并非最佳选择。

    - 生产环境和开发环境没有区分。一旦发生异常，系统总会生成工单，你必须导航到工单页面查看错误。这对生产服务器可能有帮助，但在开发环境中会很麻烦，因为开发者需要立即看到错误，而不是去查看工单号。

    - Web2py 拥有良好的数据库抽象层（DAL），允许你抽象多种数据库引擎，但缺乏强大的 ORM。如果处理相对较大的模型，代码会因所有嵌套定义和属性而变得分散，使事情复杂化。

    - 由于 Web2py 对 IDE 的支持非常差，我们无法在不修改的情况下使用标准的 Python 开发工具。


    Django 和 Web2py 框架是全栈框架。这意味着它们提供了所有需要的代码——从表单生成器到模板布局和表单验证，让你专注于根据特定需求编写内容。


    然而，对于 Flask 和 Pyramid 等非全栈框架，如果你想创建一个功能齐全的网站，你需要自己添加大量代码和额外部分。这需要大量的技能和时间。


    ## Dash


    Dash 完全专为构建仪表板响应式框架这一特定任务而设计。Plotly 的 Dash 是 Python 开发者创建交互式 Web 应用程序的绝佳方式，无需学习
    Javascript 和前端 Web 开发。Dash 构建在 Flask、Plotly.js、React 和 React Js 之上。


    Dash 与其他框架（上述提到的）没有可比性，因为它们属于不同类别的框架。以下是选择 Dash 而非其他交互式仪表板框架（Jupiter Dashboards、matplotlib
    等）的一些原因：


    - 仅需 50 行代码，你就可以编写一个简单的 "hello world" Dash 应用程序，因为 Dash 需要的样板代码非常少。

    - 整个 Dash 应用程序都使用全球最受欢迎的 Python 语言编写。

    - 在你自己的 Python 代码中，你可以将 Dash 交互组件（如下拉菜单、文本输入、滑块和图表）与响应式 Dash "回调"绑定。

    - Dash 应用程序中复杂的 UI 可以有多个输入、多个输出以及依赖于其他输入的输入。

    - 多个用户可以同时处理 Dash 应用程序。

    - 为了使用 React 创建自己的 Dash 组件，Dash 使用 React.js 来渲染组件，并包含一个插件系统。

    - 开发者或作者可以编写响应点击、悬停或在图表上选择点的 Dash 应用程序，因为 Dash 的 Graph 组件是交互式的。


    ## 结论


    我们可以得出结论，从众多可用的 Python 框架中选择正确的框架完全取决于项目类型、复杂性、小型或企业级项目、可用的社区支持或在线资源、可扩展性、安全性等。


    上述提到的 Python 框架在其类别中都是最好的，但都有各自的优点和缺点（取决于项目需求）。因此，一种类型的框架并不适合所有类型的项目。'
  merge: 0
