  md: 'are used to configure details and set parameters for the application and respond
    to requests, respectively.


    **Line no. 5-6**


    Now we have a function definition called **hello_world**. Implement view code
    that generates the response. A function that fulfils the requirement of a view
    is responsible for rendering the text that will be passed back to the requesting
    entity. In the above case, the function, when called, uses the Response function
    we imported earlier. This passes back a value that should be given to the client.


    **Line no. 8**


    if __name__ == ''__main__'': Python is saying, “Start here when running from the
    command line”, rather than when this module is imported.


    **Line no. 9-11**


    In line no. 9, we create a variable called config out of the object created by
    the configurator function that we imported at the top of the program. Line 10
    and 11 call the add_route and add_view method of this object. This method is used
    to define a view that can be used by the application. As we can see, we pass the
    hello_world function we defined earlier. This is where that function is actually
    incorporated as a view.


    **Line no. 12-14**


    In this, we actually create the WSGI application by calling the make_wsgi_app
    method of the config object. This uses the object’s attributes, such as the view
    we added, to create an application. This application is then passed to the make_server
    function we imported in order to create an object that can launch a web server
    to serve our application. The last line launches this server.


    Our **hello world application** is one of the simplest and easiest possible pyramid
    applications, configured “imperatively”. It is imperative because the full power
    of Python is available to us as we perform configuration tasks.'
