    separate the whole process of web development into two categories –


    +   - Front-end

    - Back-end


    Though frontend and backend web development are certainly distinct from each other,
    they are also like two sides of the same coin. A complete website relies on each
    side communicating and operating effectively with the other as a single unit.
    Both front-end and back-end are equally important in web development.


    The front-end or client-side of an application is the code responsible for everything
    the user directly experiences on screen from text colors to buttons, images and
    navigation menus. Some of the common skills and tools which are used by front-end
    developers are listed below –


    +   - HTML/CSS/JavaScript

    - CSS preprocessors

    - Frameworks

    - Libraries

    - Git and Github'
  - '[PAGE 6]


    Generally, the back-end/server-side of an application is responsible for managing
    information within the database and serving that information to the front-end.
    The back-end of a website consists of a server, application, and database. In
    general, it involves everything that happens before hitting your browser. The
    tools required in back-end web development are –


    +   - **Programming language** – Ruby, PHP, Python, etc.

    - **Database** – MySQL, PostgreSQL, MongoDB, Oracle, etc.


    # Why Web Development?


    In today’s world, there are multiple choices to promote your business or skills
    and share your ideas. Some of them are promotion through websites, native applications
    in marketplaces, etc. The trend of creating new website as a tool of business
    development is rapidly gaining momentum around the world. But, some of us may
    be unaware of the importance a website holds in the growth of a business.


    Currently there are numerous start-ups struggling to establish their presence
    in the open market. However, it is also true that most of them fail to gain as
    much targeted audience as they want. One primary reason which is bringing them
    down is that they underestimate the potential of a full feature developed website
    to earn business for them. Website development for business or any other purpose
    can prove quite fruitful.


    Let us look at some of the important reasons why website development is important
    for business growth –


    # Reaching out to your audiences


    Online websites can reach to broadest audience and are not restricted to a platform
    that constrain native applications. The viewers or customers can have easy access
    i.e. from a desktop/laptop to a mobile device, as websites have the capability
    to display the content through web browser.


    In comparison to native application, web browsing is much simpler because it does
    not require users to access the app store on their devices or download their app
    (which may include one or more processes in accessing to your contents). Distribution
    of your data is much more'
  - '[PAGE 7]


    flexible and agile with web-based application than native ones as there are no
    stringent app store requirements and content restrictions to follow.


    Another tool which is very helpful for web development is the power of utilizing
    SEO techniques to target your audiences.


    # 24/7 Accessible


    Instead of establishing a physical outlet for the company, if the business owner
    develops a website as an online forum or similar, there will be good chance of
    gaining larger audience online to link up. This is because, most of the people
    are wired up with the Internet all day.


    Generally, people prefer to go for the smartest way to check online first and
    then take a decision. So if the business owner fills all the basic details of
    the product and make a secure way to get the product to the customer in timely
    manner, then people will prefer buying online instead of visiting the outlet physically.
    This also allows people to access it even in the oddest hour of the day.


    # Convenience


    A fully functional website provides greater advantage for users where they can
    always tune in and look for what they need. Generally, users avoid going to stores
    physically if they have an option to get it online. So, if you are a smart businessman,
    you would prefer to have all the details of your products or your stores on the
    website only to earn business, which you otherwise might not.


    # Global Marketing


    With an online website, you can link up to social forums and market your product/service
    to a huge audience all around the globe. With this, you can regularly advertise
    and share your work on social forums to gain much higher footprints of targeted
    audience.


    # Credible Source


    An online portal is the most trustworthy platform for any company/organization.
    Sometimes official websites can even function as their sole office. Consider a
    scenario, where it is not easy'
  - '[PAGE 8]


    to get access to a company’s physical location. In such case, you can overcome
    this worry by focusing on their website.


    In short, by developing a website, you can promote your services by a few clicks
    and you can grab the attention of consumers from various parts of the world. The
    website of a company can prove remarkable to gain business not only in a shorter
    time but also with a much bigger audience.'
  - '[PAGE 9]


    # Python Frameworks


    Python is one of the most acceptable languages among web and application developers
    because of its strong emphasis on efficiency and readability. There are numerous
    outstanding Python web frameworks, each with their own specialities and features.


    # Django


    Here, we will outline some necessary details and features of Django framework.


    **Category** – Django belongs to the full-stack Python framework.


    **Release** – Latest release – 2.1 version, commonly used release – 1.8, 1.6 version.


    **About** – Built by experienced developers, Django is a high level Python web
    framework which allows rapid, clean and pragmatic design development. Django handles
    much of the complexities of web development, so you can focus on writing your
    app without a need to reinvent the wheel. It’s free and open source.


    To map objects to database table, Django uses ORM and the same is used to transfer
    from one database to other.


    It works with mostly all important databases like Oracle, MySQL, PostgreSQL, SQLite,
    etc.


    There are numerous websites in the industry which uses Django as their primary
    framework for backend development.


    # Features of Django


    Some of the exemplary features of this Python web framework are –


    +   - URL routing

    - Authentication

    - Database schema migrations

    - ORM (Object-relational mapper)

    - Template engine'
- md: '## Flask


    **Category** – Flask belongs to Non Full-stack frameworks.


    **Release** – 1.0.2 released on 2018-05-02


    **About** – It is classified as a micro-framework as we don’t require any particular
    libraries or tools. It has no form validation or database abstraction layer or
    any other components where pre-existing third party libraries provide common functions.
    However, flask support multiple extensions which extended the application features
    as if they were implemented in Flask itself. Extensions exist for object-relational
    mappers, form validation, upload handling, various open authentication technologies
    and several common frameworks related tools.


    ## Features of Flask


    - Integrated support for unit testing

    - Restful request dispatching

    - Contains development server and debugger

    - Uses Jinja2 templating

    - Support for secure cookies

    - Unicode-based

    - 100% WSGI 1.0 compliant

    - Extensive documentation

    - Google App Engine compatibility

    - Extensions available to enhance features desired


    ## Web2py


    **Category** – Web2py belongs to Full-stack framework family.


    **Release** – 2.17.1, released on 2018-08-06


    **About** – Python 2.6, 2.7 to Python 3.x version. With no further dependencies,
    it’s a complete package in itself. Development, database administration, debugging,
    deployment, testing, and maintenance of applications all can be done through web
    interface, but generally not required. It is a scalable open source framework
    that comes with its own web-based IDE alongside a code editor, one-click deployment
    and debugger.


    ## Features of Web2py


    This framework comes with many developing tools and built-in features that eliminate
    the hassle of complexity to the developers.


    - With no installation and configuration, it is easy to run.

    - Supports almost all major operating system, like Windows, Unix/Linux, Mac, Google
    App Engine and almost all web hosting platform through Python 2.7/3.5/3.6/ version.

    - Easy to communicate with MySQL, MSSQL, IBM DB2, Informix, Ingres, MongoDB, SQLite,
    PostgreSQL, Sybase, Oracle and Google App Engine.

    - It prevents the most common types of vulnerabilities including Cross Site Scripting,
    Injection Flaws, and Malicious File Execution.

    - Supports error tracking and internationalization.

    - Multiple protocols readability.

    - Employs successful software engineering practices that makes code easy to read
    and maintain.

    - Ensure user-oriented advancements through backward compatibility.


    ## Pyramid


    **Category** – Pyramid is a non-Full Stack Frameworks


    **Release** – 1.9.2, released on 2018-04-23


    **About** – Pyramid is a small, fast, down-to-earth Python web framework. It is
    developed as part of the Pylons Project. It is licensed under a BSD-like license.
    It makes real-world web application development and deployment more fun, more
    predictable and more productive.


    ## Features of Pyramid


    Python Pyramid is an open sourced framework with the following features –


    - **Simplicity** – Anyone can start to work with it without any prior knowledge
    about it.

    - **Minimalism** – Quite out of the box, Pyramid comes with only some important
    tools, which are needed for almost every web application, may it be security or
    serving static assets like JavaScript and CSS or attaching URLs to code.

    - **Documentation** – Includes exclusive and up to date documentation.

    - **Speed** – Very fast and accurate.

    - **Reliability** – It is developed, keeping in mind that it is conservative and
    tested exhaustively. If not tested properly, it will be considered as broke.

    - **Openness** – It’s sold with a permissive and open license.


    ## Dash


    **Category** – The Dash framework belongs to “other” Python web frameworks.


    **Release** – 0.24.1, core dash backend.


    **About** – Dash as an open source library for creating interactive web-based
    visualizations. The plotly team created Dash – an open source framework that leverages
    Flask, React.js and plotly.js to build custom data visualization apps. Key highlight
    of this library is that you can build highly interactive web application only
    through Python code. Data scientists love dash framework, specially all those
    who are less familiar with web development.


    With Dash, developers get access to all the configurable properties and underlying
    Flask instance. The applications developed using Dash framework can be deployed
    to servers and are eventually rendered in the web browser.


    Dash applications are inherently cross-platform (Linux/Win/Mac) and mobile friendly
    and the capabilities of applications can be extended by the rich set of Flask
    Plugins.


    ## Features of Dash


    - Provides access to configurable properties and Flask instance

    - Through Flask plugins, we can extend the capabilities of the Dash application

    - Mobile-ready


    ## Django Framework


    In this chapter, we will discuss about Django Framework in detail.


    Django is an MVT web framework that is used to build web applications. The huge
    Django web-framework comes with so many “batteries included” that developers often
    get amazed as to how everything manages to work together. The principle behind
    adding so many batteries is to have common web functionalities in the framework
    itself instead of adding latter as a separate library.


    One of the main reasons behind the popularity of Django framework is the huge
    Django community. The community is so huge that a separate website was devoted
    to it where developers from all corners developed third-party packages including
    authentication, authorization, full-fledged Django powered CMS systems, e-commerce
    add-ons and so on. There is a high probability that what you are trying to develop
    is already developed by somebody and you just need to pull that into your project.


    ## Why should you use Django?


    Django is designed in such a way that encourages developers to develop websites
    fast, clean and with practical design. Django’s practical approach to getting
    things done is where it stands out from the crowd.


    If you’re planning to build a highly customizable app, such as social media website,
    Django is one of the best frameworks to consider. Django strength lies in its
    interaction between users or its ability to share different types of media. One
    of the great advantage of django is its ability to utilize large community-based
    support which gives you highly customizable third-party ready to use plugins in
    your applications.


    Below are the top ten reasons to choose Django for web development –


    ## Python


    Python is arguably one of the easiest programming languages to learn because of
    its simple language constructs, flow structure and easy syntax. It is versatile
    and runs websites, desktop applications and mobile applications embedded in many
    devices and is used in other applications as a popular scripting language.


    ## Batteries Included


    Django comes with common libraries which are essential to build common functionalities
    like URL routing, authentication, an object-relational mapper (ORM), a templating
    system and db-schema migrations.


    ## Built-in admin


    Django has an in-built administration interface which lets you handle your models,
    user/ group permissions and to manage users. With model interface in place, there
    is no need for a separate database administration program for all but advanced
    database functions.


    ## Doesn''t get in your way


    Creating a Django application adds no boilerplate and no unnecessary functions.
    There''s no mandatory imports, third-party libraries and no XML configuration
    files.


    ## Scalable


    Django is based on MVC design pattern. It means that all the entities like db
    (database), back-end and front-end code are individual entity. Django allows us
    to separate code from the static media including pictures, files, CSS and JavaScript
    that make up your site.


    Django supports a full list of third-party libraries for web servers, caching,
    performance management, clustering and balancing. One of the advantages Django
    provides is the support for major email and messaging applications and services
    like ReST and OAuth.


    ## Battle tested


    Django was first open-sourced in 2005. After 12 years of growth, Django now not
    only runs news publishing websites but also runs all or part of major global enterprise
    like Pinterest, Instagram, Disqus, Bitbucket, EventBrite and Zapier. This makes
    it a robust and reliable web framework to work with.'
  mdcn: '## Flask


    **类别** – Flask 属于非全栈框架。


    **发布** – 1.0.2 版本于 2018-05-02 发布


    **简介** – 它被归类为微框架，因为我们不需要任何特定的库或工具。它没有表单验证、数据库抽象层或任何其他组件，这些功能通常由现有的第三方库提供通用实现。然而，Flask
    支持多种扩展，这些扩展可以扩展应用功能，就像它们是在 Flask 内部实现的一样。扩展涵盖了对象关系映射器、表单验证、上传处理、各种开放认证技术以及多个与常见框架相关的工具。


    ## Flask 的特性


    -   集成单元测试支持

    -   RESTful 请求分发

    -   包含开发服务器和调试器

    -   使用 Jinja2 模板引擎

    -   支持安全 Cookie

    -   基于 Unicode

    -   100% 符合 WSGI 1.0 标准

    -   文档详尽

    -   兼容 Google App Engine

    -   提供扩展以增强所需功能


    ## Web2py


    **类别** – Web2py 属于全栈框架家族。


    **发布** – 2.17.1 版本于 2018-08-06 发布


    **简介** – 支持 Python 2.6、2.7 到 Python 3.x 版本。无需额外依赖，它本身就是一个完整的软件包。应用程序的开发、数据库管理、调试、部署、测试和维护都可以通过
    Web 界面完成，但通常并非必需。它是一个可扩展的开源框架，自带基于 Web 的 IDE、代码编辑器、一键部署和调试器。


    ## Web2py 的特性


    该框架附带许多开发工具和内置功能，消除了开发者面临的复杂性困扰。


    -   无需安装和配置，易于运行。

    -   支持几乎所有主要操作系统，如 Windows、Unix/Linux、Mac、Google App Engine，并通过 Python 2.7/3.5/3.6/
    版本支持几乎所有 Web 托管平台。

    -   轻松与 MySQL、MSSQL、IBM DB2、Informix、Ingres、MongoDB、SQLite、PostgreSQL、Sybase、Oracle
    和 Google App Engine 通信。

    -   防止最常见的漏洞类型，包括跨站脚本攻击、注入缺陷和恶意文件执行。

    -   支持错误跟踪和国际化。

    -   支持多种协议可读性。

    -   采用成功的软件工程实践，使代码易于阅读和维护。

    -   通过向后兼容性确保面向用户的改进。


    ## Pyramid


    **类别** – Pyramid 是一个非全栈框架


    **发布** – 1.9.2 版本于 2018-04-23 发布


    **简介** – Pyramid 是一个小型、快速、务实的 Python Web 框架。它是 Pylons 项目的一部分开发的。它采用类似 BSD 的许可证。它使现实世界的
    Web 应用程序开发和部署变得更有趣、更可预测、更高效。


    ## Pyramid 的特性


    Python Pyramid 是一个开源框架，具有以下特性 –


    -   **简单性** – 任何人都可以开始使用它，无需任何先验知识。

    -   **极简主义** – 开箱即用，Pyramid 仅附带一些重要工具，这些工具几乎是每个 Web 应用程序都需要的，无论是安全性、提供静态资源（如 JavaScript
    和 CSS）还是将 URL 附加到代码。

    -   **文档** – 包含独家且最新的文档。

    -   **速度** – 非常快速和准确。

    -   **可靠性** – 它的开发考虑到了保守性和彻底测试。如果测试不当，它将被视为有缺陷。

    -   **开放性** – 它采用宽松和开放的许可证销售。


    ## Dash


    **类别** – Dash 框架属于“其他” Python Web 框架。


    **发布** – 0.24.1，核心 Dash 后端。


    **简介** – Dash 是一个用于创建交互式 Web 可视化的开源库。Plotly 团队创建了 Dash – 一个利用 Flask、React.js 和
    plotly.js 构建自定义数据可视化应用程序的开源框架。该库的关键亮点在于，你只需通过 Python 代码即可构建高度交互式的 Web 应用程序。数据科学家喜欢
    Dash 框架，尤其是那些不太熟悉 Web 开发的人。


    使用 Dash，开发者可以访问所有可配置属性和底层 Flask 实例。使用 Dash 框架开发的应用程序可以部署到服务器，并最终在 Web 浏览器中渲染。


    Dash 应用程序本质上是跨平台的（Linux/Win/Mac）且对移动设备友好，应用程序的功能可以通过丰富的 Flask 插件集进行扩展。


    ## Dash 的特性


    -   提供对可配置属性和 Flask 实例的访问

    -   通过 Flask 插件，我们可以扩展 Dash 应用程序的功能

    -   移动端就绪


    ## Django 框架


    在本章中，我们将详细讨论 Django 框架。


    Django 是一个用于构建 Web 应用程序的 MVT Web 框架。庞大的 Django Web 框架附带了如此多的“开箱即用”功能，以至于开发者常常惊讶于所有东西是如何协同工作的。添加如此多“电池”的原则是将常见的
    Web 功能集成到框架本身中，而不是在后期作为单独的库添加。


    Django 框架流行的主要原因之一是庞大的 Django 社区。社区如此庞大，以至于有一个专门的网站，来自世界各地的开发者在上面开发第三方包，包括认证、授权、功能齐全的
    Django 驱动的 CMS 系统、电子商务插件等等。你试图开发的功能很可能已经有人开发出来了，你只需要将其引入你的项目即可。


    ## 为什么应该使用 Django？


    Django 的设计鼓励开发者快速、简洁地开发网站，并采用实用的设计。Django 在完成任务方面的实用方法是其脱颖而出的地方。


    如果你计划构建一个高度可定制的应用程序，例如社交媒体网站，Django 是最好的框架之一。Django 的优势在于其用户交互能力或共享不同类型媒体的能力。Django
    的一个巨大优势是其利用大型社区支持的能力，这为你的应用程序提供了高度可定制的、即用型的第三方插件。


    以下是选择 Django 进行 Web 开发的十大理由 –


    ## Python


    Python 无疑是易于学习的编程语言之一，因为它具有简单的语言结构、流程结构和易于理解的语法。它用途广泛，可以运行网站、桌面应用程序和移动应用程序，嵌入在许多设备中，并作为流行的脚本语言用于其他应用程序。


    ## 开箱即用


    Django 附带了构建常见功能所必需的通用库，例如 URL 路由、认证、对象关系映射器（ORM）、模板系统和数据库模式迁移。


    ## 内置管理后台


    Django 有一个内置的管理界面，允许你处理模型、用户/组权限和管理用户。有了模型界面，除了高级数据库功能外，就不需要单独的数据库管理程序了。


    ## 不会妨碍你


    创建 Django 应用程序不会添加样板代码或不必要的函数。没有强制导入、第三方库和 XML 配置文件。


    ## 可扩展


    Django 基于 MVC 设计模式。这意味着所有实体，如数据库、后端和前端代码都是独立的实体。Django 允许我们将代码与构成网站的静态媒体（包括图片、文件、CSS
    和 JavaScript）分离。


    Django 支持一系列完整的第三方库，用于 Web 服务器、缓存、性能管理、集群和负载均衡。Django 提供的优势之一是支持主要的电子邮件和消息应用程序及服务，如
    ReST 和 OAuth。


    ## 经过实战检验


    Django 于 2005 年首次开源。经过 12 年的发展，Django 现在不仅运行新闻出版网站，还运行所有或部分主要全球企业，如 Pinterest、Instagram、Disqus、Bitbucket、EventBrite
    和 Zapier。这使其成为一个强大且可靠的 Web 框架。'
