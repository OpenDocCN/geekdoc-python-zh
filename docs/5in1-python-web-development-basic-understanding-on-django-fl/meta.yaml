  mdcn: "## Web2py 框架\n\nWeb2py 是一个易于使用的框架。使用 web2py，无需安装和配置，因为它具有可移植性，甚至可以在 USB 驱动器上运行。它基于\
    \ MVC 框架，与许多其他 Python 框架类似。尽管大多数框架不支持旧版本的 Python，但 web2py 仍然支持旧版本：Python 2.6 和\
    \ 2.7。它还支持目前被广泛接受的 LDAP 进行身份验证。\n\nWeb2py 通过专注于三个主要目标，试图降低 Web 开发的入门门槛：\n\n- 快速开发\n\
    - 易于使用\n- 安全性\n\n考虑到用户视角，Web2py 在内部不断构建和优化，使其成为一个更快、更精简的框架，包括支持向后兼容性。\n\n## 安装和配置\
    \ Web2py 框架\n\n运行 web2py 很简单，你需要从以下链接下载 exe 文件：http://www.web2py.com/init/default/download\n\
    \n对于 Windows，你可以下载 zip 文件，解压后直接运行 exe 文件或从命令行运行。你将看到以下屏幕，提示输入管理员密码。\n\n你可以选择一个管理员密码并启动服务器。你将看到以下屏幕。\n\
    \n## 使用 Web2py 创建应用\n\n现在我们准备创建一个新应用。点击底部的 admin 选项卡。因此，在输入管理员密码后，我们将看到以下屏幕。\n\
    \n转到新的简单应用程序，输入一些应用程序名称（如 helloWeb2py）并点击创建。这将显示如下所示的设计界面页面。\n\n你也可以访问你当前的实时网站\
    \ helloWeb2py，只需在本地机器上输入 http://127.0.0.1:8000/helloWeb2py，你将获得以下输出。\n\n在 helloWeb2py\
    \ 应用程序的设计页面中，转到控制器并点击 default.py 旁边的编辑按钮。如果你更改 index() 函数的返回值，将显示以下输出：\n\n```python\n\
    # ---- example index page ----\ndef index():\n    response.flash = T(\"Hello world\"\
    )\n    return \"Hello Guys, This is web2py app. This framework is very easy to\
    \ run and works effortlessly. Fun to work with it\"\n```\n\n保存更改，现在你可以检查在 helloWeb2py\
    \ 应用中所做的更改。只需刷新 http://127.0.0.1:8000/helloWeb2py 链接，你将看到以下输出。\n\n## 在云平台上部署应用\n\
    \n现在，如果你想将应用部署到云平台，请返回主页并点击站点。你可以选择任何部署选项。这里，我们选择 “pythonAnywhere”。访问 pythonAnywhere\
    \ 网站并注册（如果尚未注册）。点击 “**Add a new web app**” 并填写所有凭据（选择 web2py 应用）。全部完成。\n\n现在转到\
    \ https://username.pythonanywhere.com/welcome/default/index，点击 admin 选项卡（输入密码）。接下来点击上传并安装打包的应用程序。填写如下凭据并点击安装。\n\
    \n一切完成后，将出现如下所示的弹出消息。\n\n现在要查看你的应用，请打开以下链接：\n\nhttps://username.pythonanywhere.com/welcome/default/index，你可以看到以下屏幕。"
