    tested exhaustively. If not tested properly, it will be considered as broke.

    - **Openness** – It’s sold with a permissive and open license.


    ![](img/abfbc559bd15a047a445fb826086e81f_13_0.png)


    # Dash


    **Category** – The Dash framework belongs to “other” Python web frameworks.


    **Release** – 0.24.1, core dash backend.


    **About** – Dash as an open source library for creating interactive web-based
    visualizations. The plotly team created Dash – an open source framework that leverages
    Flask, React.js and plotly.js to build custom data visualization apps. Key highlight
    of this library is that you can build highly interactive web application only
    through Python code. Data scientists love dash framework, specially all those
    who are less familiar with web development.'
  - '[PAGE 14]


    With Dash, developers get access to all the configurable properties and underlying
    Flask instance. The applications developed using Dash framework can be deployed
    to servers and are eventually rendered in the web browser.


    Dash applications are inherently cross-platform (Linux/Win/Mac) and mobile friendly
    and the capabilities of applications can be extended by the rich set of Flask
    Plugins.


    ![](img/abfbc559bd15a047a445fb826086e81f_14_0.png)


    # Features of Dash


    +   - Provides access to configurable properties and Flask instance

    - Through Flash plugins, we can extend the capabilities of the Dash application

    - Mobile-ready'
  - '[PAGE 15]


    # Django Framework


    In this chapter, we will discuss about Django Framework in detail.


    Django is an MVT web framework that is used to build web applications. The huge
    Django web-framework comes with so many “batteries included” that developers often
    get amazed as to how everything manages to work together. The principle behind
    adding so many batteries is to have common web functionalities in the framework
    itself instead of adding latter as a separate library.


    One of the main reasons behind the popularity of Django framework is the huge
    Django community. The community is so huge that a separate website was devoted
    to it where developers from all corners developed third-party packages including
    authentication, authorization, full-fledged Django powered CMS systems, e-commerce
    add-ons and so on. There is a high probability that what you are trying to develop
    is already developed by somebody and you just need to pull that into your project.


    # Why should you use Django?


    Django is designed in such a way that encourages developers to develop websites
    fast, clean and with practical design. Django’s practical approach to getting
    things done is where it stands out from the crowd.


    If you’re planning to build a highly customizable app, such as social media website,
    Django is one of the best frameworks to consider. Django strength lies in its
    interaction between users or its ability to share different types of media. One
    of the great advantage of django is its ability to utilize large community-based
    support which gives you highly customizable third-party ready to use plugins in
    your applications.


    Below are the top ten reasons to choose Django for web development –


    # Python


    Python is arguably one of the easiest programming languages to learn because of
    its simple language constructs, flow structure and easy syntax. It is versatile
    and runs websites, desktop'
  - '[PAGE 16]


    applications and mobile applications embedded in many devices and is used in other
    applications as a popular scripting language.


    # Batteries Included


    Django comes with common libraries which are essential to build common functionalities
    like URL routing, authentication, an object-relational mapper (ORM), a templating
    system and db-schema migrations.


    # Built-in admin


    Django has an in-built administration interface which lets you handle your models,
    user/ group permissions and to manage users. With model interface in place, there
    is no need for a separate database administration program for all but advanced
    database functions.


    # Doesn''t get in your way


    Creating a Django application adds no boilerplate and no unnecessary functions.
    There''s no mandatory imports, third-party libraries and no XML configuration
    files.


    # Scalable


    Django is based on MVC design pattern. It means that all the entities like db
    (database), back-end and front-end code are individual entity. Django allows us
    to separate code from the static media including pictures, files, CSS and JavaScript
    that make up your site.


    Django supports a full list of third-party libraries for web servers, caching,
    performance management, clustering and balancing. One of the advantages Django
    provides is the support for major email and messaging applications and services
    like ReST and OAuth.


    # Battle tested


    Django was first open-sourced in 2005. After 12 years of growth, Django now not
    only runs news publishing websites but also runs all or part of major global enterprise
    like Pinterest, Instagram, Disqus, Bitbucket, EventBrite and Zapier. This makes
    it a robust and reliable web framework to work with.'
- md: "## Huge package support\n\nBecause of its large community support and huge\
    \ developers network, there is a high possibility that whatever you intend to\
    \ do might have been done before. Large international community of developers\
    \ contribute to the community by releasing their projects as open-source packages.\n\
    \nOne such repository of these projects is Django Package site. Currently, Django\
    \ packages list over 3400 plus reusable Django apps, sites and tools to use in\
    \ our Django projects.\n\n## Actively developed\n\nOne of the biggest risks associated\
    \ with open source project is its sustainability. We cannot be sure if it lasts\
    \ long.\n\nThere is no such risk with Django as it is 12 years old. Its consistent\
    \ releases, newer/better versions and active community is growing every-day with\
    \ a large core team of voluntary contributors who maintains and improve the code\
    \ base every-day.\n\n## Stable releases\n\nOpen-source software projects like\
    \ Django are, in many cases, actively developed and more secure than competing\
    \ proprietary software as many developers are developing and testing it every\
    \ day. However, the drawback of an open-source software project is the absence\
    \ of a stable codebase to commercially viable development.\n\nIn Django, we have\
    \ Long Term Support (LTS) versions of the software and a defined release process\
    \ as shown in the below image –\n\n![](img/abfbc559bd15a047a445fb826086e81f_17_0.png)\n\
    \n## First Class Documentation\n\nFrom the very first release, Django developers\
    \ made sure that there must be proper comprehensive documents available and the\
    \ tutorials are easily understand.\n\n## Who’s Using Django?\n\nBecause of the\
    \ Django’s unique strength, there are multiple popular websites which are built\
    \ with Python on top of the Django framework. Below are some of the major sites\
    \ which are fully or partially built based on Django.\n\n## Disqus\n\nIt is one\
    \ of the most preferred blog comment-hosting sites globally. It is easy to integrate\
    \ with most popular CMS (content management systems) like WordPress and many others\
    \ through Disqus. Handling a user-base of over 50 million, Django is able to satisfy\
    \ the site owners to reach out to their communities.\n\n![](img/abfbc559bd15a047a445fb826086e81f_18_0.png)\n\
    \n## The Onion\n\nThe Onion website which provide an online venue for their satirical\
    \ newspaper, Django provides the framework for it.\n\n![](img/abfbc559bd15a047a445fb826086e81f_19_0.png)\n\
    \n## Bitbucket\n\nBitbucket is like GitHub, a version control repository hosting\
    \ service. The only difference between Bitbucket and GitHub is that Bitbucket\
    \ hosts mercurial repositories whereas GitHub hosts git repositories. As millions\
    \ of users are associated with Bitbucket, and all the services which bitbucket\
    \ provides (like create a repo, push your code, add collaborators, commits, pull\
    \ request, etc.) has to be stable. Django is responsible for running the bitbucket\
    \ site.\n\n![](img/abfbc559bd15a047a445fb826086e81f_19_1.png)\n\n## Instagram\n\
    \nInstagram is a social networking app built especially for those who love to\
    \ share photos and videos to all their friends. Currently there are a lot of celebrities\
    \ on Instagram so as to stay closer to their fans. Django framework is running\
    \ the Instagram too.\n\n![](img/abfbc559bd15a047a445fb826086e81f_20_0.png)\n\n\
    ## Mozilla Firefox\n\nSecond most widely used browser in the world after Google\
    \ Chrome is the Mozilla browser. Now the help page of Mozilla is built with Django\
    \ framework.\n\n![](img/abfbc559bd15a047a445fb826086e81f_20_1.png)\n\n## Pinterest\n\
    \nMillions of users around the globe discover their new ideas and inspiration\
    \ from Pinterest. Pinterest is using the Django framework (done modification as\
    \ per their requirement) to run it.\n\n![](img/abfbc559bd15a047a445fb826086e81f_21_0.png)\n\
    \n## NASA\n\nThe National Aeronautics and Space Administration’s official website\
    \ is a place for millions of users to visit and check out the news, images, videos\
    \ and podcasts provided by the premiere agency. Django develops some specific\
    \ parts of official NASA website.\n\n![](img/abfbc559bd15a047a445fb826086e81f_21_1.png)\n\
    \n## The Washington Post\n\nIf there’s one influential newspaper in the world,\
    \ it is certainly the Washington Post. The Washington Post’s website is a hugely\
    \ popular online news source to accompany their daily paper. Its huge amount of\
    \ views and traffic has been easily handled by Django web framework.\n\n![](img/abfbc559bd15a047a445fb826086e81f_22_0.png)\n\
    \n## Reddit Gifts\n\nThe massively popular Reddit website has launched an online,\
    \ anonymous gift exchange and meetup platform called Reddit Gifts. The site connects\
    \ users from around the world and facilitates gifts exchange between them. The\
    \ Django web framework powers its functionalities.\n\n![](img/abfbc559bd15a047a445fb826086e81f_22_1.png)\n\
    \n## Prezi\n\nPrezi is a cloud based alternative to Microsoft PowerPoint built\
    \ on the Django framework. The site provides a virtual canvas that can be manipulated\
    \ and zoomed in and out. This provides the entire view of the presentation rather\
    \ than individual slides.\n\n![](img/abfbc559bd15a047a445fb826086e81f_23_0.png)\n\
    \n## Installing and Creating a Django project and app\n\nBefore installing Django,\
    \ we have to make sure that Python is installed. Assuming you are using virtualenv,\
    \ a simple pip install django should suffice.\n\n## Installing virtual environment\
    \ and Django\n\nBelow is the process to install virtual environment and Django\
    \ in your windows environment –\n\n```\nC:\\Users\\rajesh>mkdir djangoProject\n\
    \nC:\\Users\\rajesh>cd djangoProject\n\nC:\\Users\\rajesh\\djangoProject>virtualenv\
    \ djangoEnv\nUsing base prefix 'c:\\python\\python361'\nNew python executable\
    \ in C:\\Users\\rajesh\\djangoProject\\djangoEnv\\Scripts\\python.exe\nInstalling\
    \ setuptools, pip, wheel...done.\n\nC:\\Users\\rajesh\\djangoProject>djangoEnv\\\
    Scripts\\activate\n\n(djangoEnv) C:\\Users\\rajesh\\djangoProject>pip install\
    \ django\nCollecting django\n  Using cached https://files.pythonhosted.org/packages/51/1a/e0ac7886c7123a03014178d7517dc822af0fe51a72e1a6bff26153103322/Django-2.1-py3-none-any.whl\n\
    Collecting pytz (from django)\n  Using cached https://files.pythonhosted.org/packages/30/4e/27c34b62430286c6d59177a0042ed50dc789ce5d1ec740887653b898779a/pytz-2018.5-py2.py3-none-any.whl\n\
    Installing collected packages: pytz, django\nSuccessfully installed django-2.1\
    \ pytz-2018.5\n```\n\nTo verify if the Django is installed properly, type the\
    \ code given below –\n\n```\n(djangoEnv) C:\\Users\\rajesh\\djangoProject>python\n\
    Python 3.6.1 (v3.6.1:69c0db5, Mar 21 2017, 17:54:52) [MSC v.1900 32 bit (Intel)]\
    \ on win32\nType \"help\", \"copyright\", \"credits\" or \"license\" for more\
    \ information.\n>>> import django\n>>> print(django.get_version())\n2.1\n>>>\n\
    ```\n\n## Creating Django Project\n\nOnce the installation is completed, we need\
    \ to create a Django project.\n\nRunning the below command in your windows machine\
    \ will create the following django project –\n\n```\ndjango-admin startproject\
    \ my_project_name\n```\n\n![](img/abfbc559bd15a047a445fb826086e81f_25_0.png)\n\
    \nTyping dir will show one new file and one new directory as shown above.\n\n\
    **manage.py** – manage.py is a command-line-executable Python file which is just\
    \ a wrapper around django-admin. It helps us manage our project which is implied\
    \ in its name as well.\n\nWith this, it created a directory called, **myFirstDjangoProject**\
    \ inside myFirstDjangoProject which represents the configuration root for our\
    \ project. Let us explore much deeper into it.\n\n## Configuring Django\n\nBy\
    \ calling the myFirstDjangoProject directory “configuration root”, we mean this\
    \ directory holds the files necessary for generally configuring our Django project.\
    \ Pretty much everything outside this directory will be focused solely on the\
    \ “business logic” associated with the project’s models, views, routes, etc. All\
    \ points that connect the project together will lead here.\n\n![](img/abfbc559bd15a047a445fb826086e81f_26_0.png)\n\
    \n- __init__.py – This is empty and changes the directory into an importable Python\
    \ package.\n- settings.py – As the name suggest, it is the place where most configuration\
    \ items will be set.\n- urls.py – The URLs are set with urls.py. With this, we\
    \ don’t have to explicitly write every URL for the project in this file. However,\
    \ we have to tell Django about where the URLs have been declared (i.e., we need\
    \ to link other URL in urls.py).\n- Wsgi.py – This is to help application in production\
    \ and is similar to other applications like Flask, Tornado, Pyramid which exposes\
    \ some “app” object.\n\n## Setting the settings\n\nTaking a look inside settings.py\
    \ will reveal its considerable size – and these are just the defaults. Other things\
    \ that we need to take care are the static files, database, media files, cloud\
    \ integration or other dozens of ways that a Django project can be configured.\
    \ Let’s understand some points mentioned in the settings.py file –\n\n- **BASE_DIR**\
    \ – This is helpful for locating files. Inside the setting.py file, BASE_DIR parameter\
    \ sets the absolute path to the base directory.\n- **SECRET_KEY** – It is used\
    \ for making hashes. In general, we used secret_key for cookies, sessions, csrf\
    \ protection and auth tokens.\n- **DEBUG** – We can set it to project running\
    \ either in development or production mode."
  mdcn: "## 巨大的包支持\n\n由于其庞大的社区支持和庞大的开发者网络，无论你打算做什么，都很有可能已经有人做过了。庞大的国际开发者社区通过将他们的项目作为开源包发布来为社区做贡献。\n\
    \n这些项目的一个仓库就是 Django Package 网站。目前，Django packages 列出了超过 3400 个可重用的 Django 应用、站点和工具，供我们在\
    \ Django 项目中使用。\n\n## 活跃的开发\n\n与开源项目相关的最大风险之一是其可持续性。我们无法确定它是否能长久存在。\n\nDjango\
    \ 没有这样的风险，因为它已经有 12 年的历史了。它持续的发布、更新/更好的版本以及活跃的社区每天都在增长，有一个由志愿贡献者组成的大型核心团队，他们每天都在维护和改进代码库。\n\
    \n## 稳定的发布\n\n像 Django 这样的开源软件项目，在许多情况下，比竞争性的专有软件开发更活跃、更安全，因为每天都有许多开发者在开发和测试它。然而，开源软件项目的缺点是缺乏一个稳定的代码库来进行商业上可行的开发。\n\
    \n在 Django 中，我们有软件的长期支持（LTS）版本和一个定义的发布流程，如下图所示 –\n\n![](img/abfbc559bd15a047a445fb826086e81f_17_0.png)\n\
    \n## 一流的文档\n\n从第一个版本开始，Django 开发者就确保必须提供适当、全面的文档，并且教程易于理解。\n\n## 谁在使用 Django？\n\
    \n由于 Django 的独特优势，有许多流行的网站是基于 Django 框架用 Python 构建的。以下是一些完全或部分基于 Django 构建的主要网站。\n\
    \n## Disqus\n\n它是全球最受欢迎的博客评论托管网站之一。通过 Disqus，它可以轻松集成到大多数流行的 CMS（内容管理系统）中，如 WordPress\
    \ 和许多其他系统。Django 能够处理超过 5000 万的用户群，满足网站所有者与他们的社区建立联系的需求。\n\n![](img/abfbc559bd15a047a445fb826086e81f_18_0.png)\n\
    \n## The Onion\n\nThe Onion 网站为其讽刺报纸提供了一个在线场所，Django 为其提供了框架。\n\n![](img/abfbc559bd15a047a445fb826086e81f_19_0.png)\n\
    \n## Bitbucket\n\nBitbucket 就像 GitHub，是一个版本控制仓库托管服务。Bitbucket 和 GitHub 之间的唯一区别是\
    \ Bitbucket 托管 mercurial 仓库，而 GitHub 托管 git 仓库。由于数百万用户与 Bitbucket 相关联，并且 Bitbucket\
    \ 提供的所有服务（如创建仓库、推送代码、添加协作者、提交、拉取请求等）都必须稳定。Django 负责运行 Bitbucket 网站。\n\n![](img/abfbc559bd15a047a445fb826086e81f_19_1.png)\n\
    \n## Instagram\n\nInstagram 是一个专门为那些喜欢与所有朋友分享照片和视频的人打造的社交网络应用。目前，Instagram 上有很多名人，以便与他们的粉丝保持更近的距离。Django\
    \ 框架也在运行 Instagram。\n\n![](img/abfbc559bd15a047a445fb826086e81f_20_0.png)\n\n\
    ## Mozilla Firefox\n\n世界上仅次于 Google Chrome 的第二大最广泛使用的浏览器是 Mozilla 浏览器。现在，Mozilla\
    \ 的帮助页面是用 Django 框架构建的。\n\n![](img/abfbc559bd15a047a445fb826086e81f_20_1.png)\n\
    \n## Pinterest\n\n全球数百万用户从 Pinterest 发现他们的新想法和灵感。Pinterest 使用 Django 框架（根据他们的需求进行了修改）来运行它。\n\
    \n![](img/abfbc559bd15a047a445fb826086e81f_21_0.png)\n\n## NASA\n\n美国国家航空航天局的官方网站是数百万用户访问和查看该顶级机构提供的新闻、图片、视频和播客的地方。Django\
    \ 开发了 NASA 官方网站的一些特定部分。\n\n![](img/abfbc559bd15a047a445fb826086e81f_21_1.png)\n\
    \n## The Washington Post\n\n如果说世界上有一份有影响力的报纸，那无疑是《华盛顿邮报》。《华盛顿邮报》的网站是一个非常受欢迎的在线新闻来源，作为其日报的补充。其巨大的浏览量和流量已被\
    \ Django Web 框架轻松处理。\n\n![](img/abfbc559bd15a047a445fb826086e81f_22_0.png)\n\n\
    ## Reddit Gifts\n\n广受欢迎的 Reddit 网站推出了一个在线、匿名的礼物交换和聚会平台，名为 Reddit Gifts。该网站连接了来自世界各地的用户，并促进了他们之间的礼物交换。Django\
    \ Web 框架为其功能提供支持。\n\n![](img/abfbc559bd15a047a445fb826086e81f_22_1.png)\n\n##\
    \ Prezi\n\nPrezi 是一个基于云的、建立在 Django 框架上的 Microsoft PowerPoint 替代品。该网站提供了一个可以操作和缩放的虚拟画布。这提供了演示文稿的完整视图，而不是单个幻灯片。\n\
    \n![](img/abfbc559bd15a047a445fb826086e81f_23_0.png)\n\n## 安装和创建 Django 项目和应用\n\
    \n在安装 Django 之前，我们必须确保 Python 已安装。假设你使用 virtualenv，一个简单的 `pip install django`\
    \ 应该就足够了。\n\n## 安装虚拟环境和 Django\n\n以下是在你的 Windows 环境中安装虚拟环境和 Django 的过程 –\n\n```\n\
    C:\\Users\\rajesh>mkdir djangoProject\n\nC:\\Users\\rajesh>cd djangoProject\n\n\
    C:\\Users\\rajesh\\djangoProject>virtualenv djangoEnv\nUsing base prefix 'c:\\\
    python\\python361'\nNew python executable in C:\\Users\\rajesh\\djangoProject\\\
    djangoEnv\\Scripts\\python.exe\nInstalling setuptools, pip, wheel...done.\n\n\
    C:\\Users\\rajesh\\djangoProject>djangoEnv\\Scripts\\activate\n\n(djangoEnv) C:\\\
    Users\\rajesh\\djangoProject>pip install django\nCollecting django\n  Using cached\
    \ https://files.pythonhosted.org/packages/51/1a/e0ac7886c7123a03014178d7517dc822af0fe51a72e1a6bff26153103322/Django-2.1-py3-none-any.whl\n\
    Collecting pytz (from django)\n  Using cached https://files.pythonhosted.org/packages/30/4e/27c34b62430286c6d59177a0042ed50dc789ce5d1ec740887653b898779a/pytz-2018.5-py2.py3-none-any.whl\n\
    Installing collected packages: pytz, django\nSuccessfully installed django-2.1\
    \ pytz-2018.5\n```\n\n要验证 Django 是否正确安装，请输入以下代码 –\n\n```\n(djangoEnv) C:\\Users\\\
    rajesh\\djangoProject>python\nPython 3.6.1 (v3.6.1:69c0db5, Mar 21 2017, 17:54:52)\
    \ [MSC v.1900 32 bit (Intel)] on win32\nType \"help\", \"copyright\", \"credits\"\
    \ or \"license\" for more information.\n>>> import django\n>>> print(django.get_version())\n\
    2.1\n>>>\n```\n\n## 创建 Django 项目\n\n安装完成后，我们需要创建一个 Django 项目。\n\n在你的 Windows 机器上运行以下命令将创建以下\
    \ Django 项目 –\n\n```\ndjango-admin startproject my_project_name\n```\n\n![](img/abfbc559bd15a047a445fb826086e81f_25_0.png)\n\
    \n输入 `dir` 将显示一个新文件和一个新目录，如上所示。\n\n**manage.py** – manage.py 是一个命令行可执行的 Python\
    \ 文件，它只是 django-admin 的一个包装器。它帮助我们管理我们的项目，正如其名称所暗示的那样。\n\n通过此操作，它在 myFirstDjangoProject\
    \ 内部创建了一个名为 **myFirstDjangoProject** 的目录，该目录代表我们项目的配置根目录。让我们更深入地探索它。\n\n## 配置\
    \ Django\n\n将 myFirstDjangoProject 目录称为“配置根目录”，我们的意思是这个目录包含通常配置 Django 项目所需的文件。此目录之外的几乎所有内容都将专注于与项目模型、视图、路由等相关的“业务逻辑”。所有将项目连接在一起的要点都将指向这里。\n\
    \n![](img/abfbc559bd15a047a445fb826086e81f_26_0.png)\n\n- __init__.py – 这是空的，它将目录更改为可导入的\
    \ Python 包。\n- settings.py – 顾名思义，这是设置大多数配置项的地方。\n- urls.py – URL 使用 urls.py 进行设置。通过这个，我们不必在这个文件中为项目显式编写每个\
    \ URL。但是，我们必须告诉 Django URL 在哪里被声明（即，我们需要在 urls.py 中链接其他 URL）。\n- Wsgi.py – 这是为了帮助生产环境中的应用程序，类似于其他应用程序，如\
    \ Flask、Tornado、Pyramid，它们暴露一些“app”对象。\n\n## 设置 settings\n\n查看 settings.py 内部会揭示其相当大的规模\
    \ – 这些只是默认值。我们需要处理的其他事情包括静态文件、数据库、媒体文件、云集成或 Django 项目可以配置的其他数十种方式。让我们理解 settings.py\
    \ 文件中提到的一些要点 –\n\n- **BASE_DIR** – 这有助于定位文件。在 setting.py 文件中，BASE_DIR 参数设置基础目录的绝对路径。\n\
    - **SECRET_KEY** – 它用于生成哈希。通常，我们使用 secret_key 用于 cookie、会话、csrf 保护和身份验证令牌。\n-\
    \ **DEBUG** – 我们可以将其设置为项目在开发或生产模式下运行。"
