    # Calling Help


    Dash components are declarative. Every configurable aspect of these components
    is set during installation as a keyword argument. You can call help in your python
    console on any of the components to learn more about a component and its available
    arguments. Some of them are given below -


    ```

    >>> help(dcc.Dropdown)

    Help on class Dropdown in module builtins:

    class Dropdown(dash.development.base_component.Component)

    | A Dropdown component.

    | Dropdown is an interactive dropdown element for selecting one or more

    | items.

    | The values and labels of the dropdown items are specified in the `options`

    | property and the selected item(s) are specified with the `value` property.

    |

    | Use a dropdown when you have many options (more than 5) or when you are

    | constrained for space. Otherwise, you can use RadioItems or a Checklist,

    | which have the benefit of showing the users all of the items at once.

    |

    | Keyword arguments:

    | - id (string; optional)

    | - options (list; optional): An array of options

