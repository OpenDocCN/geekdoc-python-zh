  - '[PAGE 25]


    ![](img/abfbc559bd15a047a445fb826086e81f_25_0.png)


    Typing dir will show one new file and one new directory as shown above.


    **manage.py** – manage.py is a command-line-executable Python file which is just
    a wrapper around django-admin. It helps us manage our project which is implied
    in its name as well.


    With this, it created a directory called, **myFirstDjangoProject** inside myFirstDjangoProject
    which represents the configuration root for our project. Let us explore much deeper
    into it.


    # Configuring Django


    By calling the myFirstDjangoProject directory “configuration root”, we mean this
    directory holds the files necessary for generally configuring our Django project.
    Pretty much everything outside this directory will be focused solely on the “business
    logic” associated with the project’s models, views, routes, etc. All points that
    connect the project together will lead here.'
  - '[PAGE 26]


    ![](img/abfbc559bd15a047a445fb826086e81f_26_0.png)


    +   - __init__.py – This is empty and changes the directory into an importable
    Python package.

    - settings.py – As the name suggest, it is the place where most configuration
    items will be set.

    - urls.py – The URLs are set with urls.py. With this, we don’t have to explicitly
    write every URL for the project in this file. However, we have to tell Django
    about where the URLs have been declared (i.e., we need to link other URL in urls.py).

    - Wsgi.py – This is to help application in production and is similar to other
    applications like Flask, Tornado, Pyramid which exposes some “app” object.


    # Setting the settings


    Taking a look inside settings.py will reveal its considerable size – and these
    are just the defaults. Other things that we need to take care are the static files,
    database, media files, cloud integration or other dozens of ways that a Django
    project can be configured. Let’s understand some points mentioned in the settings.py
    file –


    +   - **BASE_DIR** – This is helpful for locating files. Inside the setting.py
    file, BASE_DIR parameter sets the absolute path to the base directory.

    - **SECRET_KEY** – It is used for making hashes. In general, we used secret_key
    for cookies, sessions, csrf protection and auth tokens.

    - **DEBUG** – We can set it to project running either in development or production
    mode.'
- md: "## Django Settings\n\n- **ALLOWED_HOSTS** – We provide the list of hostnames\
    \ through which our application is being served. In development mode, it is optional\
    \ to set; however, in production machine, we need to set our Django project.\n\
    \n- **INSTALLED_APPS** – It is the list of Django “apps” that are currently installed\
    \ and running in our Django project. In-built Django provides six installed apps\
    \ as follows –\n    - 'django.contrib.admin'\n    - 'django.contrib.auth'\n  \
    \  - 'django.contrib.contenttypes'\n    - 'django.contrib.sessions'\n    - 'django.contrib.messages'\n\
    \    - 'django.contrib.staticfiles'\n\n- **MIDDLEWARE** – It helps our Django\
    \ project to run. It’s a python class that hooks into django request/response\
    \ processing.\n\n- **TEMPLATES** – It defines how the document should be displayed\
    \ in the frontend. Django templates are used for producing any text-based format.\n\
    \n- **WSGI_APPLICATION** – Any server we set up has to know where the WSGI file\
    \ is. In case you’re using an external server, it will look in its own settings.\
    \ By default, it points to objects in wsgi.py.\n\n- **DATABASES** – It sets to\
    \ the databases our Django project is currently accessing. It is mandatory to\
    \ set default database. In case we set the database of our choice, we need to\
    \ mention few things related to database like - HOST, USER, PASSWORD, PORT, database\
    \ NAME, and appropriate ENGINE.\n\n- **STATIC_URL** – It is the URL to use when\
    \ referring to static files located in STATIC_ROOT. By default, it’s None.\n\n\
    However, we may need to add a path for static files. Go down to the end of the\
    \ file, and just underneath the STATIC_URL entry, add a new one called STATIC_ROOT\
    \ as shown below –\n\nmyFirstDjangoProject/settings.py\n\n```\nSTATIC_URL = '/static/'\n\
    \nSTATIC_ROOT = os.path.join(BASE_DIR, 'static')\n```\n\n## Setting up a Database\n\
    \nThere’s a lot of different database software that can store data for your site.\
    \ We’ll use the default one, sqlite3.\n\nThis is already set up in the below given\
    \ part of your **myFirstDjangoProject/settings.py** –\n\n```\nDATABASES = {\n\
    \    'default': {\n        'ENGINE': 'django.db.backends.sqlite3',\n        'NAME':\
    \ os.path.join(BASE_DIR, 'db.sqlite3'),\n    }\n}\n```\n\nTo create a database\
    \ for our blog, let’s run the following in the console – **python manage.py migrate**\
    \ (we need to be in the myFirstDjangoProject directory that contains the manage.py\
    \ file).\n\nYou will get the following output if everything goes well –\n\n```\n\
    (djangoEnv) C:\\Users\\rajesh\\djangoProject\\myFirstDjangoProject>python manage.py\
    \ migrate\nOperations to perform:\n  Apply all migrations: admin, auth, contenttypes,\
    \ sessions\nRunning migrations:\n  Applying contenttypes.0001_initial... OK\n\
    \  Applying auth.0001_initial... OK\n  Applying admin.0001_initial... OK\n  Applying\
    \ admin.0002_logentry_remove_auto_add... OK\n  Applying admin.0003_logentry_add_action_flag_choices...\
    \ OK\n  Applying contenttypes.0002_remove_content_type_name... OK\n  Applying\
    \ auth.0002_alter_permission_name_max_length... OK\n  Applying auth.0003_alter_user_email_max_length...\
    \ OK\n  Applying auth.0004_alter_user_username_opts... OK\n  Applying auth.0005_alter_user_last_login_null...\
    \ OK\n  Applying auth.0006_require_contenttypes_0002... OK\n  Applying auth.0007_alter_validators_add_error_messages...\
    \ OK\n  Applying auth.0008_alter_user_username_max_length... OK\n  Applying auth.0009_alter_user_last_name_max_length...\
    \ OK\n  Applying sessions.0001_initial... OK\n```\n\n## Starting the Web Server\n\
    \nYou need to be in the directory that contains the manage.py file. In the console,\
    \ we can start the web server by running python manage.py runserver as follows\
    \ –\n\n```\n(djangoEnv) C:\\Users\\rajesh\\djangoProject\\myFirstDjangoProject>python\
    \ manage.py runserver\nPerforming system checks...\n\nSystem check identified\
    \ no issues (0 silenced).\nAugust 28, 2018 - 20:08:12\nDjango version 2.1, using\
    \ settings 'myFirstDjangoProject.settings'\nStarting development server at http://127.0.0.1:8000/\n\
    Quit the server with CTRL-BREAK.\n[28/Aug/2018 20:08:27] \"GET / HTTP/1.1\" 200\
    \ 16348\n[28/Aug/2018 20:08:31] \"GET /static/admin/css/fonts.css HTTP/1.1\" 200\
    \ 423\n[28/Aug/2018 20:08:33] \"GET /static/admin/fonts/Roboto-Regular-webfont.woff\
    \ HTTP/1.1\" 200 80304\n[28/Aug/2018 20:08:34] \"GET /static/admin/fonts/Roboto-Bold-webfont.woff\
    \ HTTP/1.1\" 200 82564\n[28/Aug/2018 20:08:34] \"GET /static/admin/fonts/Roboto-Light-webfont.woff\
    \ HTTP/1.1\" 200 81348\n```\n\nNow all you need to do is check that your website\
    \ is running. Open your browser (Firefox, Chrome, Safari, Internet Explorer or\
    \ whatever you use) and enter this address –\n\n**http://127.0.0.1:8000/**\n\n\
    or\n\n**http://localhost:8000/** # As our webserver is running in our local machine\
    \ only.\n\nCongratulations! You’ve just created your first website and run it\
    \ using a web server!\n\n![](img/abfbc559bd15a047a445fb826086e81f_30_0.png)\n\n\
    While the web server is running, you won’t see a new command-line prompt to enter\
    \ additional commands. The terminal will accept next text but will not execute\
    \ new commands. This is because the web server continuously runs in order to listen\
    \ to incoming requests.\n\n## Django Models\n\nWe are trying to create a Django\
    \ model that will store all the posts in our blog. But to make sure it works,\
    \ we need to learn about objects.\n\n## Objects\n\nObjects is a collection of\
    \ properties and actions. Let us understand this with an example. Suppose we want\
    \ to model a cat, we will create an object called Cat that has properties such\
    \ as color, age, mood (good/bad/sleepy) and owner.\n\nThen the Cat has some actions:\
    \ purr, scratch or feed.\n\n```\nCat\n--------\ncolor\nage\nmood\nowner\npurr()\n\
    scratch()\nfeed(cat_food)\nCatFood\n--------\ntaste\n```\n\nSo basically we are\
    \ trying to describe real things in code with properties (called object properties)\
    \ and actions (called methods).\n\nAs we are building a blog, we need some text\
    \ content and a title. It is also necessary to have the author’s name, date of\
    \ creation and also the date of publication.\n\nSo our blog will have the following\
    \ objects –\n\n```\nPost\n--------\ntitle\ntext\nauthor\ncreated_date\npublished_date\n\
    ```\n\nAlso we need to have some method that publishes that post. As we are now\
    \ aware of what an object is, we can create a Django model for our blog post.\n\
    \nA model is a special kind of object in Django and is saved in the database.\
    \ We will store our data in SQLite database.\n\n## Creating an application\n\n\
    To keep everything clear, we will create a separate application inside our project.\
    \ Below, we’ll try to create a blog web application by running below mentioned\
    \ simple command.\n\nNow we will notice that a new myBlog directory is created\
    \ and it contains a number of files now. The directories and files in our project\
    \ should be as following –\n\n![](img/abfbc559bd15a047a445fb826086e81f_32_0.png)\n\
    \nAfter creating an application, we also need to tell Django to use it. We do\
    \ that in the file myFirstDjangoProject/settings.py.\n\n```\nINSTALLED_APPS =\
    \ [\n    'django.contrib.admin',\n    'django.contrib.auth',\n    'django.contrib.contenttypes',\n\
    \    'django.contrib.sessions',\n    'django.contrib.messages',\n    'django.contrib.staticfiles',\n\
    \    'myBlog',\n]\n```\n\n## Creating a blog post model\n\nIn the **myBlog/models.py**\
    \ file, we define all objects called Models – this is a place in which we will\
    \ define our blog post.\n\nLet’s open myBlog/models.py, remove everything from\
    \ it, and write code as follows –\n\n```\nfrom django.db import models\nfrom django.utils\
    \ import timezone\n\n# Create your models here.\nclass Post(models.Model):\n \
    \   author = models.ForeignKey('auth.User', on_delete=models.CASCADE)\n    title\
    \ = models.CharField(max_length=220)\n    text = models.TextField()\n    created_date\
    \ = models.DateTimeField(default=timezone.now)\n    published_date = models.DateTimeField(blank=True,\
    \ null=True)\n\n    def publish(self):\n        self.published_date = timezone.now()\n\
    \        self.save()\n\n    def __str__(self):\n        return self.title\n```\n\
    \nFirstly, we import some functionalities from other files by calling from or\
    \ import. So with this, instead of copying and pasting the same things in every\
    \ file, we can include some parts with **from and import**.\n\n**class Post(models.Model)**\
    \ – This line defines our model (it is an object).\n\n- class is a special keyword\
    \ that indicates that we are defining an object.\n- Post is the name of our model.\
    \ Always start a class name with an uppercase letter.\n- models.Model means that\
    \ the Post is a Django Model, so Django knows that it should be saved in the database."
  mdcn: "## Django 设置\n\n- **ALLOWED_HOSTS** – 我们提供应用程序通过哪些主机名提供服务的列表。在开发模式下，设置此项是可选的；然而，在生产环境中，我们需要为\
    \ Django 项目进行设置。\n\n- **INSTALLED_APPS** – 这是当前在 Django 项目中安装并运行的 Django “应用”列表。Django\
    \ 内置提供了六个已安装的应用，如下所示 –\n    - 'django.contrib.admin'\n    - 'django.contrib.auth'\n\
    \    - 'django.contrib.contenttypes'\n    - 'django.contrib.sessions'\n    - 'django.contrib.messages'\n\
    \    - 'django.contrib.staticfiles'\n\n- **MIDDLEWARE** – 它有助于我们的 Django 项目运行。它是一个\
    \ Python 类，用于挂钩到 Django 的请求/响应处理中。\n\n- **TEMPLATES** – 它定义了文档在前端应如何显示。Django\
    \ 模板用于生成任何基于文本的格式。\n\n- **WSGI_APPLICATION** – 我们设置的任何服务器都必须知道 WSGI 文件的位置。如果您使用的是外部服务器，它将在其自身的设置中查找。默认情况下，它指向\
    \ `wsgi.py` 中的对象。\n\n- **DATABASES** – 它设置为我们的 Django 项目当前正在访问的数据库。设置默认数据库是强制性的。如果我们设置了自选的数据库，我们需要提及一些与数据库相关的内容，例如\
    \ - HOST、USER、PASSWORD、PORT、数据库 NAME 和适当的 ENGINE。\n\n- **STATIC_URL** – 这是在引用位于\
    \ `STATIC_ROOT` 中的静态文件时使用的 URL。默认情况下，它是 `None`。\n\n然而，我们可能需要为静态文件添加一个路径。滚动到文件末尾，就在\
