  - '[PAGE 52]


    # Pyramid Framework


    Pyramid is a general, open source, web application development framework built
    in python. It allows python developer to create web applications with ease.


    Pyramid is backed by the enterprise knowledge Management System KARL (a George
    Soros project).


    # Installing, starting up and configuring


    As described, “the start small, finish big, stay finished framework”, Pyramid
    is much like Flask which takes very little effort to install and run. In fact,
    you’ll recognize that some of the patterns are similar to Flask once you start
    building this application.


    Following are the steps to create pyramid framework environment –


    +   - First, create a project directory. Here, we have created a directory named
    **pyramidProject** (you can choose any name you want).

    - Next, create a virtual environment where you will install all the project specific
    dependencies. Here, we created a virtual environment folder named **pyramidEnv**
    where Pyramid is installed.

    - Then, go to the directory, **pyramidEnv** and install the pyramid with **pip
    install pyramid**.


    Once everything is done as mentioned above, your directory structure will be as
    shown below –


    ![](img/abfbc559bd15a047a445fb826086e81f_52_0.png)


    And the pyramid version installed in the system is given below –'
  - '[PAGE 53]


    ```

    >>> import pkg_resources

    >>> pkg_resources.get_distribution("pyramid").version

    ''1.9.2''

    ```


    # Core Concepts


    The Pyramid framework is based on below core concepts –


    +   - **Zope** (extensibility, traversal, declarative security) – Pyramid is loosely
    based on Zope in terms of extensibility, the concept of traversal and the declarative
    security.

    - **Pylons** (URL dispatch, non-opinionated view of persistence, templating, etc.)
    – Another area from where pyramid draws its concept is the pylons project. Pylons
    have that concept of routes, that calls the URL dispatch inside the pyramid framework
    and they also have the non-opinionated view of persistence layer or templating.

    - **Django** (View, level of documentation) – Pyramid also gets hint from Django.
    The way we take our view, routed our URL and the level of documentation is very
    Django way.


    The following are the features of the Pyramid framework –


    +   - It is the fastest known Python web framework.

    - It supports small and large projects (why rewrite when you outgrow your small
    framework).

    - It supports single file webapps like microframeworks.

    - It has built-in sessions.

    - It supports events similar to Plone/Zope.

    - It provides Transaction Management (if already have noticed that we have used
    Zope before).


    # Configuration


    Configuration is the settings that influence the operation of an application.
    There are two ways to configure a pyramid application: imperative configuration
    and declarative configuration.'
  - '[PAGE 54]


    Pyramid configuration supports –


    +   - Imperative configuration or even the overriding of the decorator-based configs

    - Configuration conflict detection (including more local vs. less local determination)

    - Configuration Extensibility (included from multiple apps)

    - Flexible Authentication and Authorization Policies

    - Programmatic Introspection of Configuration (view current state of routes to
    generate nav)


    # URL generation


    In pyramid, we can generate URLs for routes, resources and static assets. It is
    easy and flexible to work with URL generation APIs. By generating URLs through
    pyramid’s various APIs, users can change the configuration arbitrarily without
    much worry of breaking a link with any of your web pages.


    So in short, URL in pyramid –


    +   - supports URL generation to allow changes to app that won’t break links.

    - generates URLs to static resources that live either inside or outside the application.

    - supports Routes and Traversal.


    # Views


    One of the primary jobs of pyramid is to find and invoke a view callable when
    a request reaches your application. View callables are bits of code which do something
    interesting in response to a request made in your application.


    When you map your views onto your URL dispatch or python code, there can be any
    kind of call. Views can be a function declaration or an instance, it can be used
    as a view in the pyramid.


    Some important points about Views are given below –'
  - '[PAGE 55]


    +   - Views are generated from any callable.

    - Renderer based views can simply return dictionaries (not required to return
    a webby style object).

    - Support multiple views per route (GET vs. POST vs. HTTP Header check, etc.).

    - View response adapters (when you want to specify how view returns values should
    be handled vs. response objects).


    # Extensibility


    Pyramid is designed with extensibility in mind. So if a pyramid developer is keeping
    in mind certain constraints while building an application, a third party should
    be able to change the application’s behaviour without needing to modify its source
    code. The behaviour of a pyramid application that obeys certain constraints can
    be overridden or extended without any modification. It is designed for flexible
    deployments to multiple environments (No Singletons). Pyramid has “Tweens” middleware
    support (WSGI middle ware, but runs in the context of Pyramid itself).


    # Running a Hello, Pyramid Program


    The simplest program we can think after installing pyramid framework to check
    if everything is working fine, is to run a simple “Hello, World” or “Hello, Pyramid”
    program.


    Below is my pyramid “Hello, Pyramid” program on 8000 port number –'
  - "[PAGE 56]\n\n```\npython\nfrom wsgiref.simple_server import make_server\nfrom\
    \ pyramid.config import Configurator\nfrom pyramid.response import Response\n\n\
    def hello_world(request):\n    return Response('<h1>Hello Pyramid!</h1>')\n\n\
    if __name__ == '__main__':\n    with Configurator() as config:\n        config.add_route('hello',\
    \ '/')\n        config.add_view(hello_world, route_name='hello')\n        app\
    \ = config.make_wsgi_app()\n    server = make_server('0.0.0.0', 8000, app)\n \
    \   server.serve_forever()\n```\n\nAbove simple example is easy to run. Save this\
    \ as app.py (In this, we have given the name pyramid_helloW.py).\n\nRunning the\
    \ simplest program: –\n\n```\n\n(pyramidEnv) C:\\Users\\rajesh\\pyramidProject>python\
    \ pyramid_helloW.py\n127.0.0.1 - - [09/Sep/2018 19:03:52] \"GET / HTTP/1.1\" 200\
    \ 23\n127.0.0.1 - - [09/Sep/2018 19:03:53] \"GET /favicon.ico HTTP/1.1\" 404 164\n\
    ```\n\nNext, open http://localhost:8000/ in a browser, and you will see the Hello,\
    \ Pyramid! Message as follows –\n\n![](img/abfbc559bd15a047a445fb826086e81f_56_0.png)\n\
    \nThe following is the explanation for above code –\n\n**Line no. 1-3**\n\nAt\
    \ the head of the file, we have import statements. The first line imports make_server\
    \ function, which can create a simple web server when it is passed to an application.\
    \ The second and third line import the configuration and Response function from\
    \ pyramid. These functions"
  - '[PAGE 57]


    are used to configure details and set parameters for the application and respond
    to requests, respectively.


    **Line no. 5-6**


    Now we have a function definition called **hello_world**. Implement view code
    that generates the response. A function that fulfils the requirement of a view
    is responsible for rendering the text that will be passed back to the requesting
    entity. In the above case, the function, when called, uses the Response function
    we imported earlier. This passes back a value that should be given to the client.


    **Line no. 8**


    if __name__ == ''__main__'': Python is saying, “Start here when running from the
    command line”, rather than when this module is imported.


    **Line no. 9-11**


    In line no. 9, we create a variable called config out of the object created by
    the configurator function that we imported at the top of the program. Line 10
    and 11 call the add_route and add_view method of this object. This method is used
    to define a view that can be used by the application. As we can see, we pass the
    hello_world function we defined earlier. This is where that function is actually
    incorporated as a view.


    **Line no. 12-14**


    In this, we actually create the WSGI application by calling the make_wsgi_app
    method of the config object. This uses the object’s attributes, such as the view
    we added, to create an application. This application is then passed to the make_server
    function we imported in order to create an object that can launch a web server
    to serve our application. The last line launches this server.


    Our **hello world application** is one of the simplest and easiest possible pyramid
    applications, configured “imperatively”. It is imperative because the full power
    of Python is available to us as we perform configuration tasks.'
- md: "To summarize, Pyramid is an open source python web framework with a large and\
    \ active community. This large community contributes towards making the python\
    \ web framework popular and relevant. Pyramid web framework simplify and accelerate\
    \ web application development by providing a set of robust features and tools.\n\
    \n## Dash Framework\n\nIn this chapter, we will discuss about the Dash framework\
    \ in detail.\n\nDash is an open-source Python framework used for building analytical\
    \ web applications. It is a powerful library that simplifies the development of\
    \ data-driven applications. It’s especially useful for Python data scientists\
    \ who aren’t very familiar with web development. Users can create amazing dashboards\
    \ in their browser using dash.\n\nBuilt on top of Plotly.js, React, and Flask,\
    \ Dash ties modern UI elements like dropdowns, sliders and graphs directly to\
    \ your analytical python code.\n\nDash apps consist of a Flask server that communicates\
    \ with front-end React components using JSON packets over HTTP requests.\n\nDash\
    \ applications are written purely in python, so NO HTML or JavaScript is necessary.\n\
    \n## Dash Setup\n\nIf Dash is not already installed in your terminal, then install\
    \ the below mentioned Dash libraries. As these libraries are under active development,\
    \ install and upgrade then frequently. Python 2 and 3 are also supported.\n\n\
    - pip install dash==0.23.1 # The core dash backend\n- pip install dash-renderer==0.13.0\
    \ # The dash front-end\n- pip install dash-html-components==0.11.0 # HTML components\n\
    - pip install dash-core-components==0.26.0 # Supercharged components\n- pip install\
    \ plotly==3.1.0 # Plotly graphing library\n\nIn order to make sure everything\
    \ is working properly, here, we created a simple dashApp.py file.\n\n## Dash or\
    \ App Layout\n\nDash apps are composed of two parts. The first part is the “layout”\
    \ of the app which basically describes how the application looks like. The second\
    \ part describes the interactivity of the application.\n\n## Core Components\n\
    \nWe can build the layout with the **dash_html_components** and the **dash_core_components**\
    \ library. Dash provides python classes for all the visual components of the application.\
    \ We can also customize our own components with JavaScript and React.js.\n\n```\n\
    import dash_core_components as dcc\nimport dash_html_components as html\n```\n\
    \nThe dash_html_components is for all HTML tags where the dash_core_components\
    \ is for interactivity built with React.js.\n\nUsing above two libraries, let\
    \ us write a code as given below –\n\n```\napp = dash.Dash()\napp.layout = html.Div(children=[\n\
    \    html.H1(children='Hello Dash'),\n    html.Div(children='''Dash Framework:\
    \ A web application framework for Python.''')\n])\n```\n\nAnd the equivalent HTML\
    \ code would look like this –\n\n```\n<div>\n    <h1> Hello Dash </h1>\n    <div>\
    \ Dash Framework: A web application framework for Python. </div>\n</div>\n```\n\
    \n## Writing Simple Dash app\n\nWe will learn how to write a simple example on\
    \ dash using above mentioned library in a file **dashApp.py**.\n\n```\n# -*- coding:\
    \ utf-8 -*-\nimport dash\nimport dash_core_components as dcc\nimport dash_html_components\
    \ as html\n\napp = dash.Dash()\napp.layout = html.Div(children=[\n    html.H1(children='Hello\
    \ Dash'),\n    html.Div(children='''Dash Framework: A web application framework\
    \ for Python.'''),\n\n    dcc.Graph(\n        id='example-graph',\n        figure={\n\
    \            'data': [\n                {'x': [1, 2, 3], 'y': [4, 1, 2], 'type':\
    \ 'bar', 'name': 'Delhi'},\n                {'x': [1, 2, 3], 'y': [2, 4, 5], 'type':\
    \ 'bar', 'name': u'Mumbai'},\n            ],\n            'layout': {\n      \
    \          'title': 'Dash Data Visualization'\n            }\n        }\n    )\n\
    ])\n\nif __name__ == '__main__':\n    app.run_server(debug=True)\n```\n\n## Running\
    \ the Dash app\n\nNote the following points while running the Dash app.\n\n```\n\
    (MyDjangoEnv) C:\\Users\\rajesh\\Desktop\\MyDjango\\dash>python dashApp1.py\n\
    ```\n\n- Serving Flask app \"dashApp1\" (lazy loading)\n- Environment: production\n\
    \  WARNING: Do not use the development server in a production environment.\n \
    \ Use a production WSGI server instead.\n- Debug mode: on\n- Restarting with stat\n\
    - Debugger is active!\n- Debugger PIN: 130-303-947\n- Running on **http://127.0.0.1:8050/**\
    \ (Press CTRL+C to quit)\n\n```\n127.0.0.1 - - [12/Aug/2018 09:32:39] \"GET /\
    \ HTTP/1.1\" 200 -\n127.0.0.1 - - [12/Aug/2018 09:32:42] \"GET /_dash-layout HTTP/1.1\"\
    \ 200 -\n127.0.0.1 - - [12/Aug/2018 09:32:42] \"GET /_dash-dependencies HTTP/1.1\"\
    \ 200 -\n127.0.0.1 - - [12/Aug/2018 09:32:42] \"GET /favicon.ico HTTP/1.1\" 200\
    \ -\n127.0.0.1 - - [12/Aug/2018 09:39:52] \"GET /favicon.ico HTTP/1.1\" 200 -\n\
    ```\n\nVisit **http://127.0.0.1:8050/** in your web browser. You should see an\
    \ app that looks like this.\n\n![](img/abfbc559bd15a047a445fb826086e81f_63_0.png)\n\
    \nIn above program, few important points to be noted are as follows –\n\n- The\
    \ app layout is composed of a tree of “components” like html.Div and dcc.Graph.\n\
    - The dash_html_components library has a component for every HTML tag. The html.H1\
    \ (children = ‘Hello Dash’) component generates a <h1> Hello Dash </h1> HTML element\
    \ in your application.\n- Not all components are pure HTML. The dash_core_components\
    \ describe higher-level components that are interactive and are generated with\
    \ JavaScript, HTML, and CSS through the React.js library.\n- Each component is\
    \ described entirely through keyword attributes. Dash is declarative: you will\
    \ primarily describe your application through these attributes.\n- The children\
    \ property is special. By convention, it’s always the first attribute which means\
    \ that you can omit it.\n- Html.H1 (children=’Hello Dash’) is the same as html.H1\
    \ (‘Hello Dash’).\n- The fonts in your application will look a little bit different\
    \ than what is displayed here. This application is using a custom CSS stylesheet\
    \ to modify the default styles of the elements. Custom font style is permissible,\
    \ but as of now, we can add the below URL or any URL of your choice –\n\n```\n\
    app.css.append_css({\"external_url\": \"https://codepen.io/chriddyp/pen/bWLwgP.css\"\
    })\n```\n\nto get your file to get the same look and feel of these examples.\n\
    \n## More about HTML\n\nThe dash_html_components library contains a component\
    \ class for every HTML tag as well as keyword arguments for all of the HTML arguments.\n\
    \nLet us add the inline style of the components in our previous app text -\n\n\
    ```\n# -*- coding: utf-8 -*-\nimport dash\nimport dash_core_components as dcc\n\
    import dash_html_components as html\n\napp = dash.Dash()\ncolors = {\n    'background':\
    \ '#87D653',\n    'text': '#ff0033'\n}\n\napp.layout = html.Div(style={'backgroundColor':\n\
    colors['background']}, children=[\n    html.H1(\n        children='Hello Dash',\n\
    \        style={\n            'textAlign': 'center',\n            'color': colors['text']\n\
    \        }\n    ),\n\n    html.Div(children='Dash: A web application framework\
    \ for Python.', style={\n        'textAlign': 'center',\n        'color': colors['text']\n\
    \    }),\n\n    dcc.Graph(\n        id='example-graph-2',\n\n        figure={\n\
    \            'data': [\n                {'x': [1, 2, 3], 'y': [4, 1, 2], 'type':\
    \ 'bar', 'name': 'Delhi'},\n                {'x': [1, 2, 3], 'y': [2, 4, 5], 'type':\
    \ 'bar', 'name': 'Mumbai'},\n            ],\n            'layout': {\n       \
    \         'plot_bgcolor': colors['background'],\n                'paper_bgcolor':\
    \ colors['background'],\n                'font': {\n                    'color':\
    \ colors['text']\n                }\n            }\n        }\n    )\n])\n\nif\
    \ __name__ == '__main__':\n    app.run_server(debug=True)\n```\n\nIn the above\
    \ example, we modified the inline styles of the html.Div and html.H1 components\
    \ with the style property.\n\n```\nhtml.H1('Hello Dash', style={'textAlign': 'center',\
    \ 'color': '#7FDBFF'})\n```\n\nIt is rendered in the Dash application as follows\
    \ –\n\n```\n<h1 style=\"text-align: center; color: #7FDBFF\"> Hello Dash</h1>\n\
    ```\n\nThere are couple of key distinctions between dash_html_components and HTML\
    \ attributes –\n\n- For style property in Dash, you can just supply a dictionary,\
    \ whereas in HTML, it is semicolon-separated string.\n- Style dictionary keys\
    \ are **camelCased**, so text-align changes to **textAlign**.\n- ClassName in\
    \ Dash is similar to HTML class attribute.\n- The first argument is the children\
    \ of the HTML tag which is specified through the children keyword argument.\n\n\
    ## Reusable Components\n\nBy writing our markup in Python, we can create complex\
    \ reusable components like tables without switching contexts or languages –\n\n\
    Below is a quick example that generates a “Table” from pandas dataframe.\n\n```\n\
    import dash\nimport dash_core_components as dcc\nimport dash_html_components as\
    \ html\nimport pandas as pd\n\ndf = pd.read_csv(\n    'https://gist.githubusercontent.com/chridp/'\n\
    \    'c78bf172206ce24f77d6363a2d754b59/raw/'\n    'c353e8ef842413cae56ae3920b8fd78468aa4cb2/'\n\
    \    'usa-agricultural-exports-2011.csv')\n\ndef generate_table(dataframe, max_rows=10):\n\
