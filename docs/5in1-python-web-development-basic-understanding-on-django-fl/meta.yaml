  md: '# Features of Pyramid


    Python Pyramid is an open sourced framework with the following features –


    +   - **Simplicity** – Anyone can start to work with it without any prior knowledge
    about it.

    - **Minimalism** – Quite out of the box, Pyramid comes with only some important
    tools, which are needed for almost every web application, may it be security or
    serving static assets like JavaScript and CSS or attaching URLs to code.

    - **Documentation** – Includes exclusive and up to date documentation.

    - **Speed** – Very fast and accurate.

    - **Reliability** – It is developed, keeping in mind that it is conservative and
    tested exhaustively. If not tested properly, it will be considered as broke.

    - **Openness** – It’s sold with a permissive and open license.


    ![](img/abfbc559bd15a047a445fb826086e81f_13_0.png)


    # Dash


