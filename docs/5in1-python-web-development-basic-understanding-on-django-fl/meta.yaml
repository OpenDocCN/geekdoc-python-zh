    \ 目录中）。\n\n如果一切顺利，您将获得以下输出 –\n\n```\n(djangoEnv) C:\\Users\\rajesh\\djangoProject\\\
    myFirstDjangoProject>python manage.py migrate\nOperations to perform:\n  Apply\
    \ all migrations: admin, auth, contenttypes, sessions\nRunning migrations:\n \
    \ Applying contenttypes.0001_initial... OK\n  Applying auth.0001_initial... OK\n\
    \  Applying admin.0001_initial... OK\n  Applying admin.0002_logentry_remove_auto_add...\
    \ OK\n  Applying admin.0003_logentry_add_action_flag_choices... OK\n  Applying\
    \ contenttypes.0002_remove_content_type_name... OK\n  Applying auth.0002_alter_permission_name_max_length...\
    \ OK\n  Applying auth.0003_alter_user_email_max_length... OK\n  Applying auth.0004_alter_user_username_opts...\
    \ OK\n  Applying auth.0005_alter_user_last_login_null... OK\n  Applying auth.0006_require_contenttypes_0002...\
    \ OK\n  Applying auth.0007_alter_validators_add_error_messages... OK\n  Applying\
    \ auth.0008_alter_user_username_max_length... OK\n  Applying auth.0009_alter_user_last_name_max_length...\
    \ OK\n  Applying sessions.0001_initial... OK\n```\n\n## 启动 Web 服务器\n\n您需要位于包含\
    \ `manage.py` 文件的目录中。在控制台中，我们可以通过运行 `python manage.py runserver` 来启动 Web 服务器，如下所示\
    \ –\n\n```\n(djangoEnv) C:\\Users\\rajesh\\djangoProject\\myFirstDjangoProject>python\
