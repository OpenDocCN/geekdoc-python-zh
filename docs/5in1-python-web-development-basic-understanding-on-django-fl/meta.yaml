    -   Models.DateTimeField – 这用于日期和时间。\n-   Models.ForeignKey – 这是到另一个模型的链接。\n\n\
    我们使用 **def** 定义一个函数/方法，publish 是该方法的名称。\n\n方法通常会返回一些东西。这里当我们调用 `__str__()` 时，我们将获得一个包含文章标题的文本（字符串）。\n\
    \n## 为数据库中的模型创建表\n\n最后一步是将新模型添加到我们的数据库中。首先，我们必须让 Django 理解我们已经在模型中做了一些更改。让我们在控制台窗口中使用命令\
    \ **python manage.py make migrations myBlog** 来执行相同的操作，如下所示 –\n\n```\n(djangoEnv)\
    \ C:\\Users\\rajesh\\djangoProject\\myFirstDjangoProject>python manage.py makemigrations\
    \ myBlog\n\nMigrations for 'myBlog':\n  myBlog\\migrations\\0001_initial.py\n\
    \    - Create model Post\n```\n\n然后，Django 准备一个迁移文件，我们现在必须将其应用到我们的数据库。在控制台中，我们可以输入：**python\
    \ manage.py migrate myBlog**，输出应如下所示 –\n\n```\n(djangoEnv) C:\\Users\\rajesh\\\
    djangoProject\\myFirstDjangoProject>python manage.py migrate myBlog\nOperations\
    \ to perform:\n  Apply all migrations: myBlog\nRunning migrations:\n  Applying\
    \ myBlog.0001_initial... OK\n```\n\n我们的 Post 模型现在已经在数据库中了。\n\n## Django 管理后台\n\
    \n为了添加、编辑和删除我们刚刚建模的文章，我们使用 Django 管理后台。\n\n所以让我们打开 **myBlog/admin.py 文件** 并将以下内容放入其中\
    \ –\n\n```\nfrom django.contrib import admin\nfrom .models import Post\n\n# Register\
    \ your models here.\nadmin.site.register(Post)\n```\n\n首先，我们导入（包含）上一章中定义的 Post\
    \ 模型。为了使我们的模型在管理页面上可见，我们需要使用 `admin.site.register(Post)` 将模型注册到管理站点。\n\n要登录管理站点，您需要创建一个超级用户\
    \ – 一个拥有站点上所有控制权的用户帐户。所以停止 Web 服务器并在命令行中输入 `python manage.py createsuperuser`，然后按回车键。\n\
    \n```\n(djangoEnv) C:\\Users\\rajesh\\djangoProject\\myFirstDjangoProject>python\
    \ manage.py createsuperuser\nUsername (leave blank to use 'rajesh'): admin\nEmail\
    \ address: hello@gmail.com\nPassword:\nPassword (again):\nSuperuser created successfully.\n\
    ```\n\n好的，现在是时候查看我们的 Post 模型了。记得在控制台中运行 `python manage.py runserver` 来启动 Web 服务器。转到您的浏览器并输入地址\
    \ **https://127.0.0.1:8000/admin/**。使用我们刚刚选择的凭据登录。然后您应该会看到如下所示的 Django 管理仪表板 –\n\
    \n![](img/abfbc559bd15a047a445fb826086e81f_36_0.png)\n\n转到文章并稍作尝试。您可以添加许多博客文章和来自任何地方的内容。您的博客将看起来像这样\
    \ –\n\n![](img/abfbc559bd15a047a445fb826086e81f_36_1.png)\n\n这只是 Django 的一个概述，我们能够仅用几行代码就创建一个博客。\n\
    \n## Flask 框架\n\nFlask 是一个微框架，对外部库的依赖非常少。它是一个非常轻量级的框架，让我们有自由去做任何我们想做的事情。\n\n在本章中，我们将使用\
    \ Python 和 Flask 框架构建一个项目。\n\n## Flask 启动和配置\n\n与大多数广泛使用的 Python 库一样，Flask 包可以从\
    \ Python 包索引（PyPI）安装。让我们先创建一个目录（在本章中，我们创建了一个名为 **flaskProject** 的目录），然后创建一个虚拟环境（并将其命名为\
    \ **flaskEnv**），所有项目相关的依赖项（包括 flask）都将加载到其中。您还可以安装 flask-sqlalchemy，以便您的 Flask\
    \ 应用程序有一种与 SQL 数据库通信的简单方式。\n\n安装 Flask 后，您的 flaskEnv（我们的虚拟环境名称）将显示如下内容 –\n\n```\n\
    (flaskEnv) C:\\Users\\rajesh\\flaskProject>pip freeze\nclick==6.7\nFlask==1.0.2\n\
    itsdangerous==0.24\nJinja2==2.10\nMarkupSafe==1.0\nWerkzeug==0.14.1\n```\n\n##\
    \ 使用 Flask 创建应用\n\n通过安装 Flask，我们可以用很少的几行代码创建一个简单的“**Flask 中的 hello 应用程序**”，如下所示\
    \ –\n\n```python\nfrom flask import Flask\n\napp = Flask(__name__)\n\n@app.route('/')\n\
    def hello():\n    return \"Hello, Flask!\"\n\nif __name__ == '__main__':\n   \
    \ app.run(debug=True)\n```\n\n在终端中输入以下内容 –\n\n```bash\n$python flaskapp.py\n```\n\
    \n您可以看到以下输出 –\n\n运行在 **http://127.0.0.1:5000/** 或 **localhost:5000**\n\n![](img/abfbc559bd15a047a445fb826086e81f_38_0.png)\n\
    \n以下是对我们在示例代码中所做内容的解释 –\n\n-   首先，我们导入 Flask 类库。此类的一个实例就是 WSGI 应用。\n-   其次，我们创建此类的一个实例。应用程序包或模块名称是我们的第一个参数。Flask\
    \ 必须知道在哪里可以找到静态文件、模板和其他文件，这是强制性的。\n-   接下来是 `route()` 装饰器，我们用它来知道哪个 URL 应该触发我们的方法/函数。\n\
    \n## 创建 URL 路由\n\nURL 路由使您的 Web 应用程序中的 URL 易于记忆。我们现在将创建一些 URL 路由 –\n\n/hello\n\
    /members\n/members/name\n\n我们可以根据上述 URL 编写以下代码并将其保存为 app.py。\n\n```\nfrom flask\
    \ import Flask, render_template\n\napp = Flask(__name__)\n\n@app.route('/')\n\
    def index():\n    return \"Index!\"\n\n@app.route('/Hello')\ndef hello():\n  \
    \  return \"Hello, World!\"\n\n@app.route(\"/members\")\ndef members():\n    return\
    \ \"Members\"\n\n@app.route(\"/members/<name>/\")\ndef getMember(name):\n    return\
    \ name\n\nif __name__ == '__main__':\n    app.run(debug=True)\n```\n\n重新启动应用程序后，我们使用以下代码行在不同\
    \ URL 上获取不同的输出 –\n\n```\n$ python app.py\n```\n\n**运行在 http://localhost:5000/**\n\
    \n我们将在浏览器中看到以下输出 –\n\n![](img/abfbc559bd15a047a445fb826086e81f_40_0.png)\n\n我们可以在浏览器中尝试其他\
    \ URL，如下所示 –\n\n**运行在 http://localhost:5000/hello，将给出以下输出 –**\n\n![](img/abfbc559bd15a047a445fb826086e81f_40_1.png)\n\
    \n**运行在 http://localhost:5000/members，将给出 –**\n\n![](img/abfbc559bd15a047a445fb826086e81f_40_2.png)\n\
    \n**运行在 http://localhost:5000/members/TutorialsPoint/，将给您以下输出 –**\n\n![](img/abfbc559bd15a047a445fb826086e81f_40_3.png)\n\
    \n但通常我们不想返回一个字符串（如上所述），我们返回模板。为此，我们想使用 Flask 中的函数 `render_template`，并返回带有某些输入的\
    \ `render_template`。所以，下面的函数将完成我们的工作 –\n\n```\nfrom flask import render_template\n\
    return render_template('home.html')\n```\n\n让我们创建一个名为 template 的文件夹，并将 home.html\
    \ 文件放入其中。\n\n接下来，我们将讨论布局。我们不会为每个模板都使用 html head 标签和 body 标签，而是设计一个布局来包含 head 和\
    \ body 标签，并包装当前视图或当前模板。为此，我们必须创建一个单独的文件并将其命名为 **layout.html**。在这里，我们可以放置我们普通的\
    \ head 标签、body 标签和所有其他必需的标签。\n\n我们可以用以下几行代码创建新的 layout.html –\n\n```\n<!DOCTYPE\
    \ html>\n<html>\n    <head>\n        <meta charset=\"utf-8\">\n        <title>MyFlaskApp</title>\n\
    \        <link rel=\"stylesheet\"\nhref=\"https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css\"\
    >\n    </head>\n    <body>\n        {% include 'includes/_navbar.html' %}\n  \
    \      <div class=\"container\">\n            {% block body %}\n            {%\
    \ endblock %}\n        </div>\n        <script\nsrc=\"https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js\"\
    >\n        </script>\n    </body>\n</html>\n```\n\n在上面的代码中，我们给出了标题 track，MyFlaskAp，在\
    \ head 中使用 css cdn，在 body 块中使用 javascript 来启用 bootstrap。\n\n现在，我们必须为每个页面创建导航栏。为此，我们必须首先创建一个\
    \ include 文件夹，然后在其中创建 _navbar.html 文件。现在在 _navbar.html 中，我们必须使用来自 getbootstrap.com\
    \ 的标准入门模板。新创建的 _navbar.html 文件将如下所示 –"
