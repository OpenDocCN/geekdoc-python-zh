  - '[PAGE 17]


    # Huge package support


    Because of its large community support and huge developers network, there is a
    high possibility that whatever you intend to do might have been done before. Large
    international community of developers contribute to the community by releasing
    their projects as open-source packages.


    One such repository of these projects is Django Package site. Currently, Django
    packages list over 3400 plus reusable Django apps, sites and tools to use in our
    Django projects.


    # Actively developed


    One of the biggest risks associated with open source project is its sustainability.
    We cannot be sure if it lasts long.


    There is no such risk with Django as it is 12 years old. Its consistent releases,
    newer/better versions and active community is growing every-day with a large core
    team of voluntary contributors who maintains and improve the code base every-day.


    # Stable releases


    Open-source software projects like Django are, in many cases, actively developed
    and more secure than competing proprietary software as many developers are developing
    and testing it every day. However, the drawback of an open-source software project
    is the absence of a stable codebase to commercially viable development.


    In Django, we have Long Term Support (LTS) versions of the software and a defined
    release process as shown in the below image –


    ![](img/abfbc559bd15a047a445fb826086e81f_17_0.png)'
  - '[PAGE 18]


    # First Class Documentation


    From the very first release, Django developers made sure that there must be proper
    comprehensive documents available and the tutorials are easily understand.


    # Who’s Using Django?


    Because of the Django’s unique strength, there are multiple popular websites which
    are built with Python on top of the Django framework. Below are some of the major
    sites which are fully or partially built based on Django.


    # Disqus


    It is one of the most preferred blog comment-hosting sites globally. It is easy
    to integrate with most popular CMS (content management systems) like WordPress
    and many others through Disqus. Handling a user-base of over 50 million, Django
    is able to satisfy the site owners to reach out to their communities.


    ![](img/abfbc559bd15a047a445fb826086e81f_18_0.png)


    # The Onion


    The Onion website which provide an online venue for their satirical newspaper,
    Django provides the framework for it.'
  - '[PAGE 19]


    ![](img/abfbc559bd15a047a445fb826086e81f_19_0.png)


    # Bitbucket


    Bitbucket is like GitHub, a version control repository hosting service. The only
    difference between Bitbucket and GitHub is that Bitbucket hosts mercurial repositories
    whereas GitHub hosts git repositories. As millions of users are associated with
    Bitbucket, and all the services which bitbucket provides (like create a repo,
    push your code, add collaborators, commits, pull request, etc.) has to be stable.
    Django is responsible for running the bitbucket site.


    ![](img/abfbc559bd15a047a445fb826086e81f_19_1.png)


    # Instagram


    Instagram is a social networking app built especially for those who love to share
    photos and videos to all their friends. Currently there are a lot of celebrities
    on Instagram so as to stay closer to their fans. Django framework is running the
    Instagram too.'
  - '[PAGE 20]


    ![](img/abfbc559bd15a047a445fb826086e81f_20_0.png)


    # Mozilla Firefox


    Second most widely used browser in the world after Google Chrome is the Mozilla
    browser. Now the help page of Mozilla is built with Django framework.


    ![](img/abfbc559bd15a047a445fb826086e81f_20_1.png)'
  - '[PAGE 21]


