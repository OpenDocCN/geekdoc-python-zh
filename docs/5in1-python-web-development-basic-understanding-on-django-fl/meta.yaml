  md: '# Web2py Framework


    Web2py is an easy-to-use framework. With web2py, no installation and configuration
    is required as it is portable and can be run on a USD drive too. It is based on
    the MVC frameworks like many other python frameworks. Though most of them do not
    support older versions of Python, web2py still supports older versions: python
    2.6 and 2.7. It also supports LDAP for authentication which is widely accepted
    these days.


    Web2py tries to lower the barrier of entry to web development by focusing on three
    main goals –


    +   - Rapid development

    - Ease of use

    - Security


    Keeping in mind the user perspective, Web2py is built and constantly being optimized
    internally to make it a faster and leaner framework including support for backward
    compatibility.


    # Installing and Configuring Web2py Framework


    Running a web2py is easy, you need to download the exe from the below link: http://www.web2py.com/init/default/download


    For windows, you can download the zip file, unzip it and run the exe file either
    directly or from the command line. You will be prompted with below screen asking
    for the admin password.'
