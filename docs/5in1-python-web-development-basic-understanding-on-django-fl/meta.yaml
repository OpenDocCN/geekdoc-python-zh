    Millions of users around the globe discover their new ideas and inspiration from
    Pinterest. Pinterest is using the Django framework (done modification as per their
    requirement) to run it.


    ![](img/abfbc559bd15a047a445fb826086e81f_21_0.png)


    # NASA


    The National Aeronautics and Space Administration’s official website is a place
    for millions of users to visit and check out the news, images, videos and podcasts
    provided by the premiere agency. Django develops some specific parts of official
    NASA website.


    ![](img/abfbc559bd15a047a445fb826086e81f_21_1.png)'
  - '[PAGE 22]


    # The Washington Post


    If there’s one influential newspaper in the world, it is certainly the Washington
    Post. The Washington Post’s website is a hugely popular online news source to
    accompany their daily paper. Its huge amount of views and traffic has been easily
    handled by Django web framework.


    ![](img/abfbc559bd15a047a445fb826086e81f_22_0.png)


    # Reddit Gifts


    The massively popular Reddit website has launched an online, anonymous gift exchange
    and meetup platform called Reddit Gifts. The site connects users from around the
    world and facilitates gifts exchange between them. The Django web framework powers
    its functionalities.


    ![](img/abfbc559bd15a047a445fb826086e81f_22_1.png)'
  - '[PAGE 23]


    # Prezi


    Prezi is a cloud based alternative to Microsoft PowerPoint built on the Django
    framework. The site provides a virtual canvas that can be manipulated and zoomed
    in and out. This provides the entire view of the presentation rather than individual
    slides.


    ![](img/abfbc559bd15a047a445fb826086e81f_23_0.png)


