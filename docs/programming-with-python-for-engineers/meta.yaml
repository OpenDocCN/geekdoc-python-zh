  md: '# Foreword


    Questions like "is there an algorithm for this?", "can we compute that?", or "can
    we approximate the next thing?" used to be the domain of computer scientists;
    now, almost every train of thought can be enhanced by asking versions of these
    questions. They’re variants of the practical question “how can I do this better/efficiently/safely?”,
    which is behind every advance since at least the fire-hardened spear. You really
    can’t do science or engineering if you ignore computational thinking, and to do
    science or engineering well requires hearing answers to computational questions
    in your head by reflex. The most usual (and usually the best) way to start fostering
    this reflex is to practice programming. This book has important features that
    will help you practice:


    +   - You can browse it online, at <http://pp4e.online/>, if you run into problems.

    - There is interactive content, where you can provide input and see what happens.

    - You can run each example in each chapter, using the Jupyter Notebook version
    of the book.

    - And there are lots of examples and exercises.


    Most people can learn to write simple programs quite well with practice and with
    careful guidance. But programming is a deep and subtle art. You’ll find as you
    proceed to learn that writing programs that do what you want them to do can be
    surprisingly delicate. First, one has to get used to all that syntax. This takes
    a bit of patience, and you should be willing to forgive yourself silly mistakes
    as long as you don’t make too many—I’ve been programming for at least 40 years
    now, and I occasionally use the wrong bracket, omit an indentation, drop a semicolon,
    or whatever. Then you’ll need to learn to express yourself, so that the program
    does what you want. This mostly just takes practice, but the next step is hard.
    You’ll find very often that you didn’t clearly understand what you wanted the
    program to do, and the program you wrote reflects that failure of understanding—it’s
    actually doing what you wanted, but you didn’t want the right thing in the first
    place. While everyone finds this experience annoying on occasion, being forced
    to very clearly think through what is the right thing is a valuable discipline.


    An important help with all these problems is practice. Strong programmers have
    written and read many different programs. Some lucky people just have gifts, but
    most strong programmers got that way by practice and'
  merge: -1
