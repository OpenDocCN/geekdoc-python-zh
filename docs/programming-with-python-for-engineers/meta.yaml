  md: 'imitation. Some types of problem—for example, sorting a list of numbers—turn
    up again and again in practice, so strong programmers remember patterns and learn
    from one another.


    Practice will help you develop a valuable habit. Suspect that you might make mistakes,
    and think about how you can find and fix them (Chap. 9 is good on this). Strong
    programmers know what behaviors their code should exhibit—for example, squared
    numbers are never negative—and check it is doing so. So if you have something
    that should be the square of a number and it’s negative, there’s a problem. Where
    the problem is, could get interesting; but there is one.


    You’ll find that producing programs of even moderate size that are known to be
    correct is challenging. Among other difficulties, specifying the correct behavior
    of a program can be difficult. Embracing these challenges has produced astonishing
    artifacts that have had an impact on a very large number of lives—for example,
    the fly-by-wire software that is a key part of modern air transportation allows
    people to visit their relatives cheaply and safely.


    As I looked through this book, I found the lovely line “There is no servant without
    fault, love me with the faults I have”. It captures my own experience of learning
    to program and continuing to program rather well. I still find it frustrating
    that programs do what I wrote, rather than what I should have written; and I still
    find trying to express what I know (or what I suspect) using code to be creative
    and fruitful. I close by commending the authors for putting so much time and effort
    into helping you learn to program. My life has certainly been enriched by learning
    to program, and I hope yours will be too.


    June 2023


    David Forsyth

    Fulton Watson Copp Chair in Computer Science

    University of Illinois at Urbana-Champaign

    Champaign, IL, USA'
