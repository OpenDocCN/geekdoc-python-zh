  md: '# l


    +   - **library** A package that contains a wide spectrum of predefined and organized
    actions and data.

    - **list comprehension** A compact mechanism for specifying the elements of a
    list.

    - **loop** —see iteration.


    # m


    +   - **Master Boot Record (MBR)** A small table at the beginning of a storage
    device, which contains a short machine code program to load the operating system
    if there is one.

    - **memory** An electronical table composed of a set of rows with a fixed set
    of cells each. Each cell is responsible for representing a bit. Each consecutive
    8 bits (bytes) has a unique address, and reading or modifying a byte is possible
    by providing its address.

    - **mutable** A mutable data type may be changed after being initialized. Common
    examples are the list and dict data types.


    # n


    +   - **nesting** The mechanism with which certain compound statements (or data
    structures) can be defined within other compound statements (or data structures).
    For example, iterative statements (while and for) and function definitions can
    be nested.


    # o


    +   - **object** A computational structure that has functions and data fields
    built according to the blueprint, namely the class.

    - **Operating System (OS)** A program that, after being loaded into the memory,
    manages resources and services such as the memory, the CPU, and the devices. It
    essentially hides the internal details of the hardware and makes the ugly binary
    machine understandable and manageable to us.

    - **operation code, or opcode** A fixed-length binary sequence that identifies
    the type of the operation in an instruction.


    # p


    +   - **package** —see library.

    - **paradigm** —see programming paradigm.

    - **peripheral** Any device outside of the von Neumann structure, namely the CPU
    and the memory. Examples include the keyboard, the storage devices, the monitor,
    and the printer.

    - **polling** A mechanism where the CPU regularly asks the peripheral devices
    if there is anything the CPU needs to take care of. See also interrupt.

    - **polymorphism** A mechanism allowing a descendant object to appear and function
    like its ancestor object when necessary.

    - **program** —see computer program.

    - **programming paradigm** A style or an approach to programming that outlines
    rules, concepts, and practices for developing computer programs.'
