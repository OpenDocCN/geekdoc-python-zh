  md: '# Preface


    # Target Audience of the Book


    This book is intended to be an accompanying textbook for teaching programming
    to science and engineering students with no prior programming expertise. This
    endeavor requires a delicate balance between providing in-depth details on computers
    and programming in a complete manner and the programming needs of science and
    engineering disciplines. With the hope of providing a suitable balance, the book
    uses Python as the programming language, since it is easy to learn and program
    with. Moreover, to keep the balance, the book is made up of three topics:


    +   - The Basics of Computers and Computing (Chaps. 1–3): The book starts with
    the definitions of computation and an introduction to modern hardware and software
    infrastructure on which programming is commonly performed and the spectrum of
    programming languages.

    - Programming with Python (Chaps. 4–9): These chapters present the basic building
    blocks of Python programming and continue with the ground formation for solving
    a problem in Python. Since almost all science and engineering libraries in Python
    are written with an object-oriented approach, a gentle introduction to this concept
    is also provided in this part.

    - Using Python for Science and Engineering Problems (Chaps. 10–12): The book reserves
    the last chapters to practical and powerful tools that are commonly used in various
    science and engineering disciplines. These tools provide functionalities for reading
    and writing data from/to files, working with data (using e.g., algebraic, numerical
    or statistical computations) and plotting data. These tools are then utilized
    in example problems and applications at the end of the book.


    # A Note on the Python Version Used in This Book


    The Python version referred to in this book is 3.6. However, to the best of our
    knowledge, the version at the time of printing (version 3.11) is compatible with
    the codes presented in this book.'
