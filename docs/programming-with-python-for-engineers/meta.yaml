  md: '**pseudo-code** A natural language description of the steps that are followed
    in an algorithm. It is not as specific or restricted as a programming language,
    but it is not as free as the language we use for communicating with other humans:
    A pseudo-code should be composed of precise and feasible steps and avoid ambiguous
    descriptions. See also flowchart.


    **Program Counter (PC)** A special register in the CPU that holds the address
    of the next instruction in the memory.


    **Random Access Memory (RAM)** An addressable memory which provides constant-time
    access to data for reading or writing purposes given the address of the data.


    **recursion** A fundamental tool of the functional paradigm for defining a function
    such that the function being defined is called while defining the function.


    **register** A small memory unit in the CPU that is typically addressed with a
    special name, e.g., Program Counter, Instruction Register, and Data Register.


    **script** A human-readable program code that can be executed by an interpreter.


    **sign-magnitude notation** An intuitive method for representing integers in binary
    such that the first bit is reserved for the sign of the number and the remaining
    bits for the magnitude. See also Two’s complement notation.


    **set comprehension** A compact mechanism for specifying the elements of a set.


    **slicing** An indexing mechanism for describing the indices of a range of elements.


    **string** A data type for representing a sequence of characters, i.e., text.


    **two’s complement notation** An ingenious method for representing integers in
    binary such that a negative number is represented by flipping the bits of its
    magnitude (in binary) and adding 1 to it. See also sign-magnitude notation.


    **type conversion** Transforming data from one data type to another; e.g., from
    a floating point number to an integer.


    **variable** A name or reference to a memory location that holds data.


    **von Neumann Architecture** An architecture that describes the organization of
    the main hardware components and their interaction.'
  merge: -1
