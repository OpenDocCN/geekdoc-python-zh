  md: '# Interactive Example 0.1


    This indicates a dynamic content, which can be in the form of a video or a visual
    tutorial web application, where the output updates in real-time, based on your
    input. In the e-book version, you can switch to the Web application by clicking
    the title of the box. However, in the printed version, this interactive feature
    is not available and the box displays a static image snapshot. It is highly recommended
    that the reader temporarily switches to the e-book version to access the relevant
    box and to activate its interactive functionality by clicking on it.


    # Hands-on Code 0.1


    This indicates a code snippet that is executable and modifiable in the e-book
    version. In the printed book, the code and its output will be displayed. In the
    e-book version, when you click on the box, you will be directed to an interactive
    Python environment. Essentially, you will be taken to a portal containing the
    Python interpreter with some pretyped code provided. There, you can run the code
    and experiment with it by making modifications and rerunning it.


    # Installation Notes 0.1


    After completing your learning period, you will likely find yourself writing code
    on standalone computers. While it is possible to continue programming on Jupyter
    Notebook, doing so may introduce additional web connectivity overhead. Moreover,
    standalone software deployment is often not feasible in those environments. Therefore,
    it is advisable to learn how to set up a Python run-time environment on your local
    computer. These boxes provide you with information on this matter.


    ```

    >>> x = -34.1905

    >>> y = (x if x > 0 else -x)**0.5

    >>> print(y)

    5.84726431761

    ```


    The gray boxes, such as the one above, are integral components of the written
    tutoring material. They are static and intended for reading purposes only. They
    do contain sample Python code runs.'
