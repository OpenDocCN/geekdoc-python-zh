  md: '# a


    **address** An integer that uniquely identifies a location (byte) in the memory.


    **algorithm** A step-by-step procedure that, when executed, leads to an output
    for the input we provided.


    **aliasing** A situation where more than one variable is the name of (or point
    to) the same location in memory.


    **assembler** A machine code program that serves as a translator from some relatively
    more readable text, the assembly program, into machine code.


    **assembly** A human-readable low-level programming language that is very close
    to binary machine code that is understandable by the CPU.


    **Arithmetic Logic Unit (ALU)** One of the important units in the CPU responsible
    for performing arithmetic (addition, subtraction, multiplication, division) and
    logic (less-than, greater-than, equal-to, etc.) operations.


    # b


    **basic data types** The data types that represent single information items, i.e.,
    integers, floating-point numbers, complex numbers, and Booleans.


    **Basic Input Output System (BIOS)** A machine code responsible for initializing
    the critical computer hardware and the main operating system in the computer.
    It resides in a memory which, even when the power is off, does not lose its content,
    much like a flash drive. It is electronically located exactly at the address where
    the CPU looks for its first instruction.


    **bit** The smallest unit of information in digital computers. A bit can be either
    0 or 1.


    **Boolean** A data type which can take only two values, `True` or `False`.


    **byte** A sequence of 8 bits.'
  merge: -1
  pgno: 135
- img_proc: false
  md: '# c


    **Central Processing Unit (CPU)** One of the main components of the von Neumann
    Architecture responsible for executing programs. It has three main units: Control
    Unit, Arithmetic Logic Unit, and Registers.


    **class** A prescription that defines a particular object. The blueprint of an
    object.


    **compiler** A program that can translate code written in a high-level human-readable
    programming language into binary machine code. The binary code produced by a compiler
    is generally stored in a file that can be loaded into the memory and executed
    by the CPU when requested.


    **complexity (of algorithms)** A measure for comparing different algorithms, in
    general, with respect to their running times.


    **computer** An electronic device that has a “microprocessor” in it. In a broader
    sense, any physical entity that can do “computation” can also be called a computer.


    **computer program** Instructions and data that perform a certain task.


    **computing** The process of inferring data from other data.


    **constructor** A special member function of an object that is responsible for
    initializing the object, e.g., its member variables.


    **container data types** Data types that represent multiple information items.
    Commonly used container data types are tuple, list, str, dict, and set data types.


    **Control Unit (CU)** A special unit in the CPU responsible for fetching instructions
    from the memory, interpreting (“decoding”) them, and executing them. After executing
    an instruction finishes, the control unit continues with the next instruction
    in the memory. This “fetch–decode–execute” cycle is constantly executed by the
    control unit.


    # d


    **debugging** An act of looking for errors in a code, finding their causes, and
    correcting them.


    **dictionary (dict)** A mutable container data type in Python for storing pairs
    of (key, value).


    **directory** A file system structure that contains files and other directories.
    Directories are used by operating systems to provide an easy-to-use (file system)
    hierarchical access to information in storage devices.


    # e


    **electronics** Circuits or devices constructed using transistors, microchips,
    and other hardware components.


    **encapsulation** One of the important features of object-oriented programming.
    It describes that data and actions are glued together in a data–action structure
    called “object” that conforms to a rule of “need-to-know” and “maximal-privacy”.


    **exception** An event that occurs due to a specific error (e.g., division by
    zero) during the execution of a program.'
  merge: -1
  pgno: 136
- img_proc: false
  md: '**expression** Specification of a calculation (e.g., 3 + 4 * 5), which, when
    evaluated (performed), yields some data as a result.


    **f**


    **Fetch–Decode–Execute Cycle** The cycle followed by a CPU while running a program.
    A computer typically follows this cycle from the moment it is turned on until
    it is turned off.


    **file** A sequence of bytes stored on a secondary storage, typically a hard drive
    (alternative secondary storage devices include CD, DVD, USB disk, tape drive).


    **file system** A hierarchical organization of data into files. It usually consists
    of files separated into directories where directories can contain files or other
    directories.


    **floating point** The data type used to represent real numbers.


    **flowchart** A graphical representation of an algorithm. A flowchart uses boxes
    with specific shapes to denote the steps and arrows to describe the flow of an
    algorithm. See also pseudo-code.


    **folder** —see directory.


    **function** A grouping of actions under a given name that performs a specific
    task.


    **i**


    **immutable** An immutable data type cannot be changed after being initialized.
    Common examples are the tuple, str, and frozenset data types.


    **index** An integer representing the position of an item in a container. It can
    be positive or negative. If it is positive, the index of the first element is
    zero. If it is negative, the index of the last item is –1.


    **inheritance** One of the important features of object-oriented programming.
    It refers to defining ‘descendant’ objects from ‘parent’ objects so that the descendant
    objects inherit all functions and data of their ancestors.


    **instruction** A machine-understandable specification of an operation that can
    be understood and executed by a CPU. It is often used to refer to binary machine
    instruction.


    **Instruction Register (IR)** A special-purpose register in the CPU to hold the
    current instruction being executed.


    **interpreter** An interactive program that translates code written in a high-level
    human-readable programming language into binary machine code. An interpreter does
    not provide binary machine code to the programmer but, instead, it always acts
    as an intermediary between the programmer (i.e., the programmer’s code) and the
    binary machine code.


    **interrupt** A low-level mechanism that facilitates communication between peripheral
    devices and the CPU.


    **iteration** A fundamental programming ingredient that facilitates repeating
    a sequence of instructions over and over.


    **iterator** An object that provides a countable number of values on demand.'
