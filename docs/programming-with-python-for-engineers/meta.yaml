  md: "# Hands-on Code 9.1\n\n```\ndef divisible(m, n):\n    return m % n == 0\n\n\
    def count(m):\n    sum = 0\n    for i in range(1,1000):\n        if divisible(i,\
    \ m):\n            sum += 1\n    return sum\n\nvalue = int(input())\nprint('input\
    \ value is:', value)\nprint(value, ' divides ', count(value), ' many integers\
    \ in range [1, 1000]')\n```\n\nIt works without any problem for non-zero input\
    \ values. However, if you enter 0, it outputs the long message in Fig.9.1:\n\n\
    This output is called an Error Traceback. When a run-time error occurs, you will\
    \ get one of these and the execution of the program will be terminated. Depending\
    \ on the settings, the output may be more brief but you will get line numbers\
    \ and the line leading to the error.\n\nThe classification of the error is defined\
    \ as an Exception and colored red in the error output. It is displayed in the\
    \ first line and repeated with its explanation in the last line. Traceback also\
    \ reports the functions involving the error, from the outermost to the innermost.\
    \ Each arrow (colored green) marks the program line causing the error. The last\
    \ item in the traceback is the actual position where the error occurred; the 2nd\
    \ line having return m % n == 0 in this case. The divisible() function containing\
    \ the error line is called by the 7th line, the count() function, which is called\
    \ by the 14th line of the program.\n\nFig. A traceback example for a run-time\
    \ error"
  merge: -1
