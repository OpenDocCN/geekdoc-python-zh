  md: '# Preface


    Python is a language that was initially introduced in 1991 and has seen regular
    version upgrades, with new versions typically being released approximately once
    a year. Starting from Python 3.0, each major version has been maintained for about
    five years. It’s important to note that Python 3.0 introduced backward incompatibilities,
    meaning that Python 2 code does not run unmodified with a Python 3 interpreter.
    However, there are tools available that help in transitioning Python 2 code to
    Python 3. As of now, all Python 3.x versions maintain backward compatibility.
    The expectation is that if a future Python 4.0 version is released, it will strive
    to maintain backward compatibility.


    +   - [https://docs.python.org/3.11/whatsnew/index.html](https://docs.python.org/3.11/whatsnew/index.html)
    for the current version (as of writing this book).

    - [https://devguide.python.org/versions/](https://devguide.python.org/versions/).

    - [https://en.wikipedia.org/wiki/History_of_Python](https://en.wikipedia.org/wiki/History_of_Python).

    - [https://en.wikibooks.org/wiki/Python_Programming/Version_history](https://en.wikibooks.org/wiki/Python_Programming/Version_history).


    Please refer to these resources to explore the specific changes and features introduced
    in different Python versions.


    # How to Use the Book


    This book takes an “interactive” and “minimalist” approach, focusing on direct
    interaction with examples and problems rather than emphasizing every detail or
    specialized subject. It is not intended to serve as a comprehensive reference
    manual, but rather as a “first things first” and “hands-on” guide. To provide
    additional information on skipped details, the book will include links to further
    reading. With this in mind, readers are strongly encouraged to thoroughly read
    and engage with all of the content of the book.


    The book’s interactivity is thanks to Jupyter notebook.¹ Therefore, the book differs
    from a conventional book by providing some dynamic content. This content can appear
    in audio-visual form as well as some applets (small applications) embedded in
    the book. It is also possible that the book asks the reader to complete/write
    a piece of Python program, run it, and inspect the result, from time to time.
    The reader is encouraged to complete these minor tasks. Such tasks and interactions
    are of great help in gaining an acquaintance with Python and building up self-confidence
    in solving problems with Python.


    The printed version of the book and in parallel the e-book extensively contain
    four types of boxes. They are easily recognizable by their background color and
    numbered like figures or tables as follows:


    ¹https://jupyter.org.'
