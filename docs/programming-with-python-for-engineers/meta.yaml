  md: '# Interactive Web Page of the Book


    To facilitate dynamic contents and interaction with code segments, all chapters
    are served at the following Web page and executable in your web browser without
    installing any software: [https://pp4e.online/](https://pp4e.online/).


    # Solutions Manual


    A pdf solutions manual for problems posed in this book is available for download
    by instructors adopting this book for use in their courses from [https://sites.google.com/springernature.com/extramaterial/lecturer-material](https://sites.google.com/springernature.com/extramaterial/lecturer-material).


    # Textual Conventions in the Book


    +   - Codes and outputs are presented in `teletype` font.

    - The first introduction of a term or a keyword is emphasized in *italic*.

    - The definitions of the key concepts are also provided as a glossary at the end
    of the book.

    - Python function names, whether built-in or user-defined, are always followed
    by a pair of parentheses “()” when referenced outside of the code.

    - External references, such as websites or external resources, are provided as
    footnotes or end-notes.

    - Occasionally, when a term description is lengthy, angle brackets are employed
    to enclose the description, similar to their use in the syntax of the language.


    Ankara, Türkiye


    Sinan Kalkan

    Onur T. Şehitoğlu

