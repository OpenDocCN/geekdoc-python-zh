- md: "## 3- Visualizations with Python and Matplotlib\n\n- 101 different visualizations\
    \ for the loaded dataset\n\n**Ecommerce sales dataset was generated using Synthetic\
    \ data approach using Python Faker library:**\n\n- File name: ecommerce_sales.csv\n\
    - # of entries 10,000\n\n**Dataset description:**\n\nThe Ecommerce Sales Dataset\
    \ presented in this file, \"ecommerce_sales.csv,\" has been meticulously generated\
    \ using a Synthetic Data Approach in Python, leveraging the powerful Faker library.\
    \ This dataset serves as a simulated representation of an online retail store's\
    \ sales transactions and customer interactions, intended solely for educational\
    \ and illustrative purposes.\n\nWith a total of 10,000 entries, each row in the\
    \ dataset encapsulates a unique synthetic sales transaction. The data encompasses\
    \ diverse attributes, including Order ID, Customer ID, Product ID, Purchase Date,\
    \ Product Category, Quantity, and Total Sales Amount, Gender, Age, Age Group,\
    \ Marital Status, Price Per Unit, and Customer Type.\n\nWhile the information\
    \ bears resemblance to authentic ecommerce sales data, it is important to emphasize\
    \ that this dataset does not originate from any real-world transactions or establishments.\
    \ As such, it does not represent any actual customer behaviors, market trends,\
    \ or business performance.\n\nThis synthetic dataset provides an invaluable resource\
    \ for learners and data enthusiasts, offering an opportunity to practice data\
    \ analysis techniques, explore various visualization methods, and develop Python\
    \ programming skills. However, it is crucial to recognize that this data should\
    \ not be used for making genuine business decisions or drawing conclusions that\
    \ impact real-world scenarios.\n\nAs users engage with the Synthetic Ecommerce\
    \ Sales Dataset, they are encouraged to apply their knowledge to real, reliable\
    \ datasets from trusted sources when conducting actual data analysis and decision-making\
    \ in professional settings. By doing so, learners can harness the power of data\
    \ to drive meaningful insights and contribute to data-driven strategies and optimizations\
    \ in the realm of ecommerce and beyond.\n\nThe synthetic data generated using\
    \ the Faker library in this guidebook is intended for educational and illustrative\
    \ purposes only. The data is entirely fictional and does not represent any real-world\
    \ observations or trends. While Faker provides realistic-looking data, it is not\
    \ sourced from actual observations or events. Therefore, any conclusions or inferences\
    \ drawn from this synthetic data should be treated with caution and not be used\
    \ as a basis for real decision-making or analysis.\n\nThe purpose of using Faker-generated\
    \ data is to demonstrate data visualization techniques and provide a platform\
    \ for practicing Python data analysis skills. As a learner, it is encouraged to\
    \ explore and experiment with the data to understand the visualization concepts\
    \ better. However, for practical and meaningful data analysis, it is essential\
    \ to work with authentic, representative, and relevant datasets obtained from\
    \ reliable sources. Always validate and use real data when conducting actual analyses\
    \ and drawing conclusions in professional settings.\n\nRemember, the synthetic\
    \ data generated by Faker is a valuable tool for learning, experimentation, and\
    \ practicing data analysis techniques. It serves as a stepping stone to building\
    \ proficiency in Python data visualization and exploring various visualization\
    \ libraries and tools. As you progress, apply your skills to analyze genuine datasets\
    \ to gain valuable insights and contribute to data-driven decision-making in real-world\
    \ scenarios.\n\n## 101 Visualizations with Python: Code and Comprehensive Explanations\
    \ for Every Visualization\n\nIn this comprehensive guidebook, embark on an illuminating\
    \ journey through 101 data visualizations, each expertly crafted using Python\
    \ code. Delve into the depths of data analysis and visualization as you unravel\
    \ the intricacies of each visualization's purpose and design.\n\nWith a rich assortment\
    \ of visualizations at your disposal, learn how to manipulate data, identify patterns,\
    \ and communicate insights effectively. From classic bar charts and line plots\
    \ to sophisticated 3D visualizations and interactive dashboards, this guidebook\
    \ equips you with the tools to become a master of data storytelling.\n\nEach visualization\
    \ is accompanied by a detailed explanation, offering valuable insights into data\
    \ interpretation, visualization techniques, and best practices. Discover how to\
    \ leverage Python's versatile libraries such as Matplotlib, Seaborn, Plotly, and\
    \ more, to create captivating visual narratives.\n\nWhether you're a data enthusiast,\
    \ aspiring analyst, or seasoned professional, \"101 Distinctive Visualizations\
    \ with Python\" empowers you to wield the power of Python to distill complex data\
    \ into actionable insights. Unlock the art of data visualization and elevate your\
    \ data-driven decision-making with this immersive and educational guidebook.\n\
    \n**IMPORTANT NOTE:** Each visual is presented in the following order: Visual\
    \ #, Title, explanation, Python code, and graph.\n\nPython code\n\n```python\n\
    # Import necessary libraries\nimport pandas as pd\nimport matplotlib.pyplot as\
    \ plt\nimport seaborn as sns\nfrom datetime import datetime, timedelta\nfrom wordcloud\
    \ import WordCloud\n```\n\n```python\n# Load the dataset\ndf = pd.read_csv('ecommerce_sales.csv')\n\
    ```\n\n```\n<class 'pandas.core.frame.DataFrame'>\nRangeIndex: 10000 entries,\
    \ 0 to 9999\nData columns (total 13 columns):\n #   Column            Non-Null\
    \ Count  Dtype \n---  ------            --------------  ----- \n 0   Order_ID\
    \          10000 non-null  object\n 1   Customer_ID       10000 non-null  object\n\
    \ 2   Product_ID        10000 non-null  object\n 3   Purchase_Date     10000 non-null\
    \  object\n 4   Product_Category  10000 non-null  object\n 5   Quantity      \
    \    10000 non-null  int64 \n 6   Total_Sales       10000 non-null  float64\n\
    \ 7   Gender            10000 non-null  object\n 8   Marital_Status    10000 non-null\
    \  object\n 9   Price_Per_Unit    10000 non-null  float64\n 10  Customer_Type\
    \     10000 non-null  object\n 11  Age               10000 non-null  int64 \n\
    \ 12  Age_Group         10000 non-null  category\ndtypes: category(1), float64(2),\
    \ int64(2), object(8)\nmemory usage: 947.6+ KB\n```\n\n### Visualization 1: Bar\
    \ Chart - Top 10 Product Categories by Sales\n\nVisualizing the total sales for\
    \ the top 10 product categories using a bar chart.\n\n```python\n# Visualization\
    \ 1: Bar Chart - Top 10 Product Categories by Sales\ntop_10_categories = df.groupby('Product_Category')['Total_Sales'].sum().nlargest(10)\n\
    plt.bar(top_10_categories.index, top_10_categories.values)\nplt.xticks(rotation=45)\n\
    plt.xlabel('Product Category')\nplt.ylabel('Total Sales')\nplt.title('Top 10 Product\
    \ Categories by Sales')\nplt.show()\n```\n\n![](img/966e1b40d2cfcef5bc164fe15aa29c1e_17_0.png)\n\
    \n### Visualization 2: Pie Chart - Sales Distribution by Customer Type\n\nDisplaying\
    \ the percentage distribution of sales among different customer types using a\
    \ pie chart.\n\n```python\n# Visualization 2: Pie Chart - Sales Distribution by\
    \ Customer Type\ncustomer_type_sales = df.groupby('Customer_Type')['Total_Sales'].sum()\n\
    plt.pie(customer_type_sales, labels=customer_type_sales.index, autopct='%1.1f%%')\n\
