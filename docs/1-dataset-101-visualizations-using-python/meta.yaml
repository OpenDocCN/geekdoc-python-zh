    \ Count')\nplt.title('Sales by Month')\nplt.show()\n```\n\n![](img/966e1b40d2cfcef5bc164fe15aa29c1e_21_0.png)\n\
    \n## Visualization 6: Scatter Plot - Total Sales vs. Quantity\nExploring the relationship\
    \ between total sales and quantity purchased using a scatter plot.\n\n```python\n\
    # Visualization 6: Scatter Plot - Total Sales vs. Quantity\nplt.scatter(df['Total\
    \ Sales'], df['Quantity'])\nplt.xlabel('Total Sales')\nplt.ylabel('Quantity')\n\
    plt.title('Total Sales vs. Quantity')\nplt.show()\n```\n\n![](img/966e1b40d2cfcef5bc164fe15aa29c1e_22_0.png)\n\
    \n## Visualization 7: Line Plot - Monthly Sales Trend\nDisplaying the monthly\
    \ sales trend over time using a line plot.\n\n```python\n# Visualization 7: Line\
    \ Plot - Monthly Sales Trend\nmonthly_sales = df.resample('M', on='Purchase_Date')['Total_Sales'].sum()\n\
    plt.plot(monthly_sales)\nplt.xlabel('Date')\nplt.ylabel('Monthly Sales')\nplt.title('Monthly\
    \ Sales Trend')\nplt.show()\n```\n\n![](img/966e1b40d2cfcef5bc164fe15aa29c1e_23_0.png)\n\
    \n## Visualization 8: Stacked Bar Chart - Sales by Customer Type and Product Category\n\
    Visualizing the sales breakdown by customer type and product category using a\
    \ stacked bar chart.\n\n```python\n# Visualization 8: Stacked Bar Chart - Sales\
    \ by Customer Type and Product Category\ncustomer_category_sales = df.pivot_table(index='Customer_Type',\
    \ columns='Product_Category', values='Total_Sales', aggfunc='sum')\ncustomer_category_sales.plot(kind='bar',\
    \ stacked=True, figsize=(10, 6))\nplt.xlabel('Customer Type')\nplt.ylabel('Total\
    \ Sales')\nplt.title('Sales by Customer Type and Product Category')\nplt.legend(title='Product\
