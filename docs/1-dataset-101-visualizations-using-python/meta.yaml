    \ 或标准 Python 发行版）。以下是使用两种方法安装库的详细步骤：\n\n- **使用 pip（标准 Python 发行版）：**\n  - 步骤 1：在你的计算机上打开命令提示符或终端。\n\
    \  - 步骤 2：确保你已安装 Python。你可以通过运行以下命令检查你的 Python 版本：\n    ```\n    python --version\n\
    \    ```\n  - 步骤 3：将 pip 更新到最新版本（可选但推荐）：\n    ```\n    pip install --upgrade pip\n\
