    ## 程序 1：计算前 n 个自然数之和的程序\n\n```\n>>>num = int(input(\"Enter the number\"))\n>>>sum=0\n\
    >>>for i in range(num):\n>>>    sum=sum+i\n>>>print(\"sum of natural numbers is\"\
    ,sum)\n```\n\n输出：\nEnter the number10\nsum of natural number is 45\n\n## 程序 2：计算前\
    \ n 个偶数自然数之和的程序\n\n```\n>>>num = int(input(\"Enter the number\"))\n>>>sum=0\n\
