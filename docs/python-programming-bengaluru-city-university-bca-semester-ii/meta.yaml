    >>>    print(\"There are many types of birds.\")\n>>>def flight(self):\n>>>  \
    \  print(\"Most of the birds can fly but some cannot.\")\n>>>class sparrow(Bird):\n\
    >>>    def flight(self):\n>>>    print(\"Sparrows can fly.\")\n>>>class ostrich(Bird):\n\
    >>>    def flight(self):\n>>>    print(\"Ostriches cannot fly.\")\n>>>obj_bird\
