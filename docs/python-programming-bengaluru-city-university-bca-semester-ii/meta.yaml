    \ 饼图。\n\n# 第11章\n\n## 随机游走\n\n### 11.1 什么是随机游走？\n\n简而言之，随机游走是相对于当前状态以“随机”方式进行后续步骤的过程。这个基本描述可以根据附加条件进行修改，以生成适用于你特定用例的随机游走。现实世界中一些更著名的随机游走包括股票行情走势、基质中活细胞的运动以及粒子的布朗运动。\n\
    \n在这里，我们模拟一维（一维）、二维（二维）和三维（三维）的紧凑随机游走。停止位置用 o 表示，起始点用 + 表示。\n\n这些要求可能因应用而异；例如，游走可能从特定的股票价格开始，或者从显微镜确定的细胞位置开始。步骤选择通常是概率性的，并基于来自先前数据、投影假设、正在测试的假设等的附加信息。\n\
    \n![](img/c5c3113c0233e765f6875c52296f229f_139_0.png)\n\n### 11.2 一维随机游走\n\n一维随机游走是最简单的随机游走类型。在这种类型的随机游走中，移动物体只能在一个维度上移动。在这个例子中，是上下移动。\n\
    \n计划是让物体随机向上或向下移动 n 次，同时将位置数据存储在列表中。\n\n由于物体的运动是一维的，路径在图中由一定高度的线表示。由于很难确定物体在每个阶段的位置，这没有用。为了使图表更具说明性，我们将为过程中的每一步添加一个时间戳。这将其转换为一个二维图表，日期作为\
    \ x 轴，物体的位置作为 y 轴。\n\n示例：\n\n```python\nimport numpy as np\nimport matplotlib.pyplot\
    \ as plt\nimport random\n\ndef randomwalk1D(n):\n    x, y = 0, 0\n    # 生成时间点\
    \ [1, 2, 3, ... , n]\n    timepoints = np.arange(n + 1)\n    positions = [y]\n\
    \    directions = [\"UP\", \"DOWN\"]\n    for i in range(1, n + 1):\n        #\
    \ 随机选择向上或向下\n        step = random.choice(directions)\n        # 将物体向上或向下移动\n\
    \        if step == \"UP\":\n            y += 1\n        elif step == \"DOWN\"\
    :\n            y -= 1\n        # 记录位置\n        positions.append(y)\n    return\
    \ timepoints, positions\n\ntime_data, pos_data = randomwalk1D(1000)\nplt.plot(time_data,\
    \ pos_data, 'r-')\nplt.title(\"Python 中的一维随机游走\")\nplt.show()\n```\n\n输出：\n\n\
    ![](img/c5c3113c0233e765f6875c52296f229f_141_0.png)\n\n### 11.3 二维随机游走\n\n二维随机游走的原理与一维完全相同。物体现在除了上下移动外，还可以向其他方向移动。它也可以向左或向右移动。\n\
    \n在二维场景中，你不再绘制时间。相反，通过将 x、y 坐标对添加到图中，可以观察到游走。这显示了物体的 n 步二维路径。\n\n示例：\n\n```python\n\
    import numpy as np\nimport matplotlib.pyplot as plt\nimport random\n```"
