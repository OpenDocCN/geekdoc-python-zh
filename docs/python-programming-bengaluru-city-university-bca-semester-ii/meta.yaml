    \ = random.choice(directions)\n        # Move the object according to the direction\n\
    \        if step == \"RIGHT\":\n            x[i] = x[i - 1] + 1\n            y[i]\
    \ = y[i - 1]\n        elif step == \"LEFT\":\n            x[i] = x[i - 1] - 1\n\
