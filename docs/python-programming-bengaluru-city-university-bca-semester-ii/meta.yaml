    ## PREFACE


    The book is being compiled by assuming that the reader has a certain basic amount
    of programming knowledge. This book is written by considering the syllabus designed
    for National Education Policy [NEP] for 3rd semester BCA Course of Bengaluru City
    University.


    This book is compiled in a very systematic manner. The book contains lots of programming
    illustrations, syntax structures and theoretical aspects of Python Programming.
    The book is very easy to comprehend. Students would be benefited as all the topics,
    right from the fundamentals to the advanced topics are covered.


    The main features of the book are :


    - Complete coverage of all the topics as per the NEP syllabus of Python

    - Several examples and diagrams are included

    - Succinct explanation of programming concepts


    This book is of extreme use to BCA students of (3rd semester NEP-Syllabus) of
    Bengaluru City University.


    Dr. Hanumanthappa M

    Veena R

    Lohith Kumar G


    ## SYLLABUS


    ### UNIT - I [12 Hours]


    **Parts Python Programming Language:** Python Interpreter/Shell, Identifiers,
    Keywords, Statements and Expressions, Variables, Operators, Precedence and Associativity,
    Data types, Indentation, Comments, Reading Input, Print Output, Type Conversions,
    The type() function and Is operator, Dynamic and Strongly Typed Language.


    **Control Flow Statements:** The if Decision Control Flow Statement, The if…else
    Decision Control Flow Statement, The if…elif…else Decision Control Statement,
    Nested if Statement, The while Loop, The for Loop, The continue and break Statements.


    **Functions:** Built-In Functions, Commonly Used Modules, Function Definition
    and Calling the Function, The return Statement and void Function, Scope and Life
    time of Variables, Default Parameters, Command Line Arguments.


    **Strings:** Creating and Storing Strings, Basic String operations, Accessing
    Characters in String by Index Number, String Slicing and Joining, String methods.


    ### UNIT - II [12 Hours]


    **Lists:** Creating Lists, Basic List Operations, Indexing and Slicing in Lists,
    Built-In Functions Used on Lists, List Methods, The del Statement.


    **Dictionaries:** Creating Dictionary, Accessing and modifying key:value pairs
    in Dictionaries, Built-In Functions Used on Dictionaries, Dictionary methods,
    The del Statement.


    **Tuples and Sets:** Creating Tuples, Basic Tuple Operations, Indexing and Slicing
    in Tuples, Built-In Functions Used on Tuples, Relations between Tuples and Lists,
    Relations between Tuples and Dictionaries, Tuple Methods, Using zip() Function,
    Sets, Set Methods, Frozenset.


    ### UNIT - III [12 Hours]


    **Files:** Types of files, Creating and Reading Text Data, File Methods to Read
    and Write Data, Reading and Writing Binary Files, The Pickle module, Reading and
    writing CSV files.


    **Object-Oriented Programming:** Classes and Objects, Creating Classes in Python,
    Creating Objects in Python, The Constructor Method, Classes with Multiple Objects,
    Class Attributes versus Data attributes, Encapsulation, Inheritance, The Polymorphism.


    ### UNIT - IV [12 Hours]


    **Data Visualization:** Generating Data-Installing Matplotlib, Plotting a Simple
    Line Graph, Random Walks, Rolling Dice with Plotly. Downloading Data- The CSV
    File Format, Mapping Global Data Sets: JSON Format, Working with APIs: Using a
    Web API, Visualizing Repositories Using Plotly.


