    The Python dictionary is a set of things that is arranged. A dictionary has a
    key/value pair for each entry. When the key is known, dictionaries are designed
    to retrieve values quickly.


    # 6.1 Creating a Dictionary


    Placing things inside curly braces and separating them with commas makes it easy
    to create a dictionary. A pair of values that correspond to a key and an item
    are called a pair (key: value).


    While the keys must be immutable in nature (string, number, or tuple with immutable
    members), they must also be unique. Values can be of any data type and can repeat,
    but keys cannot.


    Example:


    ```

    >>># empty dictionary

    >>>my_dict = {}

    >>># dictionary with integer keys

    >>>my_dict = {1: ''apple'', 2: ''ball''}

    >>>print(my_dict)

    >>># dictionary with mixed keys

    >>>my_dict = {''name'': ''John'', 1: [2, 4, 3]}

    >>>print(my_dict)

    >>># using dict()

    ```'
