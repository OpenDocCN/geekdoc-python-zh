    # Transfer Statements


    In Python, transfer statements are used to alter the program''s way of execution
    in a certain manner.


    For this purpose, we use two types of transfer statements.


    +   1. break statement

    2. continue statement


    The break statement is used inside the loop to exit out of the loop. It is useful
    when we want to terminate the loop as soon as the condition is fulfilled instead
    of doing the remaining iterations. It reduces execution time. Whenever the controller
    encountered a break statement, it comes out of that loop immediately


    Let''s see how to break a for a loop when we found a number greater than 5.


    ```

    >>> for num in range (10):

    >>>     if num > 5:

    >>>         print("stop")

    >>>         break

    >>>     print(num)

    ```


    Output:


    ```

    C:\Users\CSC\Pictures\python>python demo.py

    0

    1

    2

    3

    4

    5

    stop

    ```


    The continue statement is used to skip the current iteration and continue with
    the next iteration.'
