    ## 10.6 Matplotlib Plotting


    What is use of plotting in Python?


    The plot() function is used to draw points (markers) in a diagram. By default,
    the plot() function draws a line from point to point. The function takes parameters
    for specifying points in the diagram. Parameter 1 is an array containing the points
    on the x-axis.


    For Example:


    Parameter 1 is an array containing the points on the **x-axis**.


    Parameter 2 is an array containing the points on the **y-axis**.


    If we need to plot a line from (1, 3) to (8, 10), we have to pass two arrays [1,
    8] and [3, 10] to the plot function.


    Draw a line in a diagram from position (1, 3) to position (8, 10):


    ```python

    import matplotlib.pyplot as plt

    import numpy as np

    xpoints=np.array([1, 8])

    ypoints=np.array([3, 10])

    plt.plot(xpoints,ypoints)

    plt.show()

    ```


    **Output:**


    ![](img/c5c3113c0233e765f6875c52296f229f_118_0.png)


    ## 10.7 Matplotlib Markers


    Functions to handle markers in Matplotlib are available in the matplotlib.dates
    module. It is utilised by both the plot''s and scatter''s marker functionality.
    Each point is highlighted using a different marker.


    Different formatting features in marker:


    - Marker reference

    - Format string

    - Color reference

    - Marker size

    - Marker color


    ### Marker Reference


    Example


    ```python

    ...


    plt.plot(ypoints, marker = ''*'')


    # the markers are Formatted in the form of star (''*'')


    ...

    ```


    Output:


    ![](img/c5c3113c0233e765f6875c52296f229f_119_0.png)


    ### Different Markers List in Table


    | ''o'' | Circle | ''+'' | Plus | ''4'' | Tri Right | ''H'' | Hexagon |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | ''*'' | Star | ''P'' | Plus (filled) | ''|'' | Vline | ''h'' | Hexagon |

    | ''.'' | Point | ''s'' | Square | ''_'' | Hline | ''v'' | Triangle Down |

    | '','' | Pixel | ''D'' | Diamond | ''1'' | Tri Down | ''^'' | Triangle Up |

    | ''x'' | X | ''d'' | Diamond (thin) | ''2'' | Tri Up | ''<'' | Triangle Left
    |

    | ''X'' | X (filled) | ''p'' | Pentagon | ''3'' | Tri Left | ''>'' | Triangle
    Right |


    ### Format String


    This parameter is also called fmt, and is written with this syntax:

    `marker|line|color`


    Example


    ```python

    import matplotlib.pyplot as plt

    import numpy as np

    ypoints=np.array([3, 8, 1, 10])

    plt.plot(ypoints, ''o:r'')

    plt.show()

    ```


    ### Different formatting string types


    | Line Syntax | Description |

    | --- | --- |

    | ''-'' | Solid line |

    | '':'' | Dotted line |

    | ''--'' | Dashed line |

    | ''-.'' | Dashed/dotted line |


    ### Color Reference


    This is used to change the color of the graph.


    Different formatting reference given in the table:


    | Color Syntax | Description | Color Syntax | Description |

    | :--- | :--- | :--- | :--- |

    | ''r'' | Red | ''c'' | Cyan |

    | ''g'' | Green | ''m'' | Magenta |

    | ''b'' | Blue | ''y'' | Yellow |

    | ''w'' | White | ''k'' | Black |


    ### Marker Size


    You can use the keyword argument markersize or the shorter version, ms to set
    the size of the markers:


    Example:


    ```python

    import matplotlib.pyplot as plt

    import numpy as np

    ypoints=np.array([3, 8, 1, 10])

    plt.plot(ypoints,marker= ''o'',ms= 20)

    plt.show()

    ```


    Output:


    ![](img/c5c3113c0233e765f6875c52296f229f_121_0.png)


    ### Marker Color


    You can use the keyword argument markeredgecolor or the shorter mec to set the
    color of the edge of the markers:


    Example:


    ```python

    import matplotlib.pyplot as plt

    import numpy as np

    ypoints=np.array([3, 8, 1, 10])

    plt.plot(ypoints,marker= ''o'',ms= 20,mec= ''r'')

