  md: '# CHAPTER 11


    # RANDOM WALKS


    # 11.1 What is Random Walk?


    A random walk is, to put it simply, the process of taking subsequent steps in
    a “randomized” manner relative to the current state. This basic description can
    then be modified with additional conditions to produce a random walk for your
    particular use case. Some of the more well-known random walks observed in the
    real world are stock ticker movement, living cell movement in a substrate, and
    Brownian motion of particles.


    Here, we simulate a condensed random walk in one dimension (one dimension), two
    dimensions (two dimensions), and three dimensions (three dimensions). Stop locations
    are indicated by o, and starting points are indicated by +.


    These requirements can vary depending on the application; for example, the walk
    may begin at a specific stock price or at a cell position determined by microscopy.
    Step selection is typically probabilistic and is based on additional information
    from previous data, projection assumptions, the hypothesis being tested, etc.


    ![](img/c5c3113c0233e765f6875c52296f229f_139_0.png)'
  merge: -1
  pgno: 139
- img_proc: true
  md: "# 11.2 One Dimensional Random Walk\n\nThe 1D random walk is the simplest type\
    \ of random walk. The moving item can only move in one dimension in this type\
    \ of random walk. Up and down, in this instance.\n\nThe plan is for the item to\
    \ move up or down n times at random while storing the position data in a list.\n\
    \nThe path is represented by a line of a certain height in the graph because the\
    \ object's movement is one-dimensional. Because it is difficult to determine where\
    \ the object was at each stage, this is useless. We will give each step in the\
    \ process a timestamp in order to make the graph more illuminating. This turns\
    \ it into a 2D graph with the date as the x-axis and the object's position as\
    \ the y-axis.\n\nExample:\n\n```\nimport numpy as np\nimport matplotlib.pyplot\
    \ as plt\nimport random\n\ndef randomwalk1D(n):\n    x, y = 0, 0\n    # Generate\
    \ the time points [1, 2, 3, ... , n]\n    timepoints = np.arange(n + 1)\n    positions\
    \ = [y]\n    directions = [\"UP\", \"DOWN\"]\n    for i in range(1, n + 1):\n\
    \        # Randomly select either UP or DOWN\n        step = random.choice(directions)\n\
    \        # Move the object up or down\n        if step == \"UP\":\n          \
    \  y += 1\n        elif step == \"DOWN\":\n            y -= 1\n        # Keep\
    \ track of the positions\n        positions.append(y)\n    return timepoints,\
    \ positions\n```"
  merge: -1
  pgno: 140
- img_proc: true
