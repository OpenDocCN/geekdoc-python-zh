    \ pass\n```\n\n## 8.11 Python 中的 Try 与 else\n\n如果 `try` 内的代码块在没有任何问题的情况下执行，你可能偶尔希望运行另一段代码。在某些情况下，你可以将\
    \ `try` 语句与可选的 `else` 关键字配对。\n\n示例：\n\n```python\n# 打印偶数倒数的程序\n>>> try:\n... \
