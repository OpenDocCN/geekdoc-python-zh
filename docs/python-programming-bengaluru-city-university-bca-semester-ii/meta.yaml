    \ except:\n...     print(\"Not an even number!\")\n>>> else:\n...     reciprocal\
    \ = 1/num\n...     print(reciprocal)\n```\n\n## 8.12 Python 中的 Try 与 Finally\n\
    \n在 Python 中，`finally` 子句是 `try` 语句的可选补充。这个子句通常用于释放外部资源，并且总是被执行。\n\n例如，我们可能在通过网络连接到远程数据中心时使用文件或图形用户界面（GUI）。\n\
    \n在任何这些场景中，无论程序是否成功运行，我们都必须在终止前清除资源。`finally` 子句执行这些操作（关闭文件、关闭 GUI 或断开网络连接）以确保执行。\n\
    \n这里是一个文件操作示例来演示这一点。\n\n```python\n>>> try:\n...     f = open(\"test.txt\", encoding='utf-8')\n\
