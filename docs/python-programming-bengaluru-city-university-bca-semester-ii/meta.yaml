- md: "## CHAPTER 3\n\n## FUNCTIONS AND STRINGS IN PYTHON\n\nA function in Python\
    \ is a collection of connected statements that carry out a certain activity. Functions\
    \ assist in segmenting our program into manageable, modular portions. Our program\
    \ becomes more organized and controlled as it gets bigger and bigger. It also\
    \ makes the code reusable and prevents repetition.\n\n## 3.1 Defining a Function\n\
    \nSyntax:\n\n```\ndef func_name(parameters):\n    statements\n```\n\nThe function\
    \ definition that is displayed above consists of the following elements.\n\n1.\
    \  The function header's initial keyword is def.\n2.  The name of the function,\
    \ used to identify it specifically. The conventions for creating Python identifiers\
    \ apply to naming functions as well.\n3.  The parameters (arguments) by which\
    \ we give a function values. They are not required.\n4.  A colon (:) to indicate\
    \ the function header's conclusion.\n5.  A valid Python statement or statements\
    \ that make up the body of the function. The indentation level for each statement\
    \ must be the same (usually 4 spaces).\n6.  A return statement that is optional\
    \ that allows the function to return a value.\n\nExample:\n\n```\n>>>def greet(name):\n\
    >>>    \"\"\"\n>>>    This function greets to\n>>>    the person passed in as\n\
    >>>    a parameter\n>>>    \"\"\"\n>>>    print(\"Hello, \" + name + \". Good\
    \ morning!\")\n```\n\n## 3.2 Function Call\n\nA function can be called from another\
    \ function, a program, or even the Python prompt once it has been declared. We\
    \ just need to type the function name and the relevant parameters to call the\
    \ function.\n\nSyntax:\nFunc_name(parameters)\n\nExample:\n>>>greet(\"abc\")\n\
    \nOutput:\n\n```\nE:\\python>practice-1.py\nHello, abc. Good morning!\n```\n\n\
    Example 2:\n>>> def addition(a,b):\n>>>     print(a+b)\n>>> addition(20,30)\n\n\
    Output:\n\n```\nC:\\Users\\CSC\\Pictures\\python>python demo.py\n50\n```\n\nNote:\
    \ Prior to calling a function in Python, the definition of the function must always\
    \ be present. Otherwise, we will encounter a problem. For instance,\n\n```\n#\
    \ function call\ngreet('Paul')\n# function definition\ndef greet(name):\n    print(\"\
    Hello, \" + name + \". Good morning!\")\n# Error: name 'greet' is not defined\n\
    ```\n\n**Output:**\n\n```\nE:\\python>practice-1.py\nTraceback (most recent call\
    \ last):\n  File \"E:\\python\\practice-1.py\", line 2, in <module>\n    greet('Paul')\n\
    NameError: name 'greet' is not defined\n```\n\n![](img/c5c3113c0233e765f6875c52296f229f_43_0.png)\n\
    \n**Working of a function**\n\n## 3.3 Function with Return Keyword\n\nIn a function\
    \ return keyword is used when you want to return a value. Let's see the same example\
    \ with return.\n\n**Example:**\n\n```\n>>> def addition(a,b):\n>>>     return\
    \ a+b\n>>> print(addition(20,30))\n```\n\n**Output:**\n\n```\nC:\\Users\\CSC\\\
    Pictures\\python>python demo.py\n50\n```\n\n**Note:** When we are using return\
    \ in function then we must print the function while calling.\n\n## Program 5:\
    \ Write a function to perform following operations\n\na. Addition b. Subtraction\
    \ c. Multiplication d. Division\n\na=20, b=10 >>> Output: 30 10 200 2\n\n## 3.4\
    \ Local Scope and Global Scope\n\nA variable's scope refers to the area of a program\
    \ where it is used. When defined inside a function, parameters and variables are\
    \ hidden to outsiders. Consequently, they are local in scope.\n\nThe time that\
    \ a variable is stored in memory is referred to as its lifetime. Variables inside\
    \ of a function are only valid for the duration of that function.\n\nUpon our\
    \ return from the event, they are destroyed. Consequently, a function does not\
    \ retain the value of a variable from earlier calls.\n\nHere is an illustration\
    \ of the range of a variable within a function.\n\n```\n>>>def my_func():\n>>>\
    \    x = 10\n>>>    print(\"Value inside function:\",x)\n>>>x = 20\n>>>my_func()\n\
    >>>print(\"Value outside function:\",x)\n```\n\nOutput:\n\n```\nE:\\python>practice-1.py\n\
    Value inside function: 10\nValue outside function: 20\n```\n\nAs can be seen,\
