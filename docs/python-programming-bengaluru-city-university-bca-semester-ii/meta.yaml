    # 10. bool()


    The bool() function returns the boolean value of a specified object.

    The object will always return True, unless:

    The object is empty, like [], (), {}

    The object is False

    The object is 0

    The object is None


    Syntax

    bool(object)


    ```

    Example:

    x = bool(1)

    print(x)

    output: true

    ```


    # 11. len()


    The len() function returns the number of items in an object.

    When the object is a string, the len() function returns the number of characters
    in the string.


    Syntax

    len(object)


    ```

    Example:

    mylist=["apple", "banana", "cherry"]

    x = len(mylist)

    output : 3

    ```


    # 12. slice()


    The slice() function returns a slice object.

    A slice object is used to specify how to slice a sequence. You can specify where
    to start the slicing, and where to end. You can also specify the step, which allows
    you to e.g. slice only every other item.


