  md: "# 13.5 Flask Debug Mode\n\nBy using the run () method, one can launch a Flask\
    \ application. In contrast, the application should be manually restarted for each\
    \ change made to the code while it is being developed. Turn on debug support to\
    \ avoid this annoyance. In case the code is altered, the server will then reload\
    \ itself. To track any application errors, it will also offer a helpful debugger.\n\
    \nSetting the application object's debug property to True before launching it\
    \ or passing the debug parameter to the run () method turns on the Debug mode.\n\
    \n```\napp.debug = True\napp.run()\napp.run(debug = True)\n```\n\n# 13.6 Flask\
    \ Routing\n\nThe routing technique is used by contemporary web frameworks to aid\
    \ users in remembering application URLs. It is advantageous to bypass the home\
    \ page and go directly to the desired page.\n\nExample:\n\n```\nfrom flask import\
    \ Flask\napp = Flask(__name__)\n@app.route('/')\ndef hello_world():\n    return\
    \ 'Hello World'\n@app.route('/python')\ndef hello_python():\n    return 'Hello\
    \ Python'\nif __name__ == '__main__':\n    app.run(debug=True)\n```"
