    # 8.8 Exception in Python


    When a problem occurs in your program, Python''s numerous built-in exceptions
    are raised (something in the program goes wrong).

    The Python interpreter stops the running process and transfers control to the
    caller process until these exceptions are addressed. The program will crash if
    the situation is not handled.

    Consider a software where function A calls function B, and function B calls function
    C. If an exception arises in function C but is not handled there, the exception
    is passed to B and then to A.

    If the error is never addressed, a notification is shown and our software abruptly
    and unpredictably ends.'
