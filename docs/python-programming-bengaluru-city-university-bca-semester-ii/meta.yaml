  mdcn: '## 1.10.2 关键字 True 和 False 的示例


    Python 有两个真值：True 和 False。它们是 Python 中逻辑（布尔）或比较操作的结果。例如：


    ```

    >>> True or False

    True

    >>> True or False

    True

    ```


    ![](img/c5c3113c0233e765f6875c52296f229f_16_0.png)


    ## 1.11 Python 中的语句和表达式


    Python 中的语句


    语句是提供给 Python 解释器执行的指令。


    示例：


    ```

    >>> print ("Good morning")

    >>> print ("Hello, how are you?")

    ```


    输出：


    ```

    >>> print("Good morning")

    Good morning

    >>> print("Hello,how are you?")

    Hello,how are you?

    ```


    Python 中的表达式


    表达式是运算符和操作数的组合，它们共同产生某个其他值。


    示例：


    ```

    >>> sum = 25+50

    >>> print(sum)

    ```


    输出：


    ```

    >>> sum 25+50

    >>> print(sum)

    75

    ```


    ## 1.12 Python 中的变量


    什么是变量？


    变量只是用于存储值的指定内存空间。这意味着当你创建一个变量时，你会预留一些内存。解释器根据变量的数据类型分配内存并确定可以放入预留内存的内容。


    因此，你可以通过为变量指定不同的数据类型来存储整数、小数或字符。Python 变量不需要显式声明来预留内存。当你为变量提供一个值时，声明会自动发生。为了给变量赋值，请使用等号（=）。


    ### 1.12.1 声明变量的规则


    - 变量名必须以字母或下划线字符开头，哪个先出现都可以。

    - 变量名不能以数字开头。

    - 变量名中只允许使用下划线（_）、数字 0 到 9 以及字母 A 到 Z。

    - 变量名区分大小写


    变量名是 = 运算符左侧的操作数，其值是右侧的操作数。例如，


    ```

    >>>a= 23

    >>>print(a)

    **输出：**

    >>> a=23

    >>> print(a)

    23

    ```


    Python 允许你同时将相同的值赋给多个变量。例如，


    ```

    >>>a= 23

    >>>a= 25

    >>>print(a)

    **输出：**

    >>> a=23

    >>> a=25

    >>> print(a)

    25

    ```


    ## 1.13 Python 中的数据类型


    内存中可以存储多种类型的数据。例如，一个人的地址和年龄都以字母数字字符的形式保存。Python 包含多种标准数据类型，用于指定可以对它们执行的操作以及每种类型的存储方式。


    ![](img/c5c3113c0233e765f6875c52296f229f_19_0.png)


    Python 有五种常见的数据类型。


    - 数字

    - 字符串

    - 列表

    - 元组

    - 字典


    ### 1.13.1 Python 数字


    数字数据类型用于跟踪数字。当你给一个数字赋值时，会生成一个对象。Python 支持四种不同的数字类型：


    - int（有符号整数）

    - long（长整数，也可以用八进制和十六进制表示）

    - float（浮点实数值）

    - complex（复数）


    以下是一些数字示例：


    | Int | long | Float | Complex |

    |---|---|---|---|

    | 10 | 51924361L | 0.0 | 3.14j |

    | 100 | -0x19323L | 15.20 | 45.j |

    | -786 | 0122L | -21.9 | 9.322e-36j |

    | 080 | 0xDEFABCECBDAECBFBAEI | 32.3+e18 | .876j |

    | -0490 | 535633629843L | -90. | -.6545+0J |

    | -0x260 | -052318172735L | -32.54e100 | 3e+26J |

    | 0x69 | -4721885298529L | 70.2-E12 | 4.53e-7j |


    ### 1.13.2 Python 字符串


    Python 将字符串定义为用引号括起来的连续字符集合。Python 接受成对的双引号或单引号。使用切片运算符（`[]` 和 `[:]`）可以获取字符串的子集，索引从字符串开头的
    0 开始，到结尾的 -1。


    ```

    mystr = "hello"


    mystr[0:] 我们将在后续章节中看到更多这些内容。

    ```


    星号（*）表示重复运算符，加号（+）表示字符串连接运算符。


    ### 1.13.3 Python 列表


    列表是 Python 中最灵活的复合数据类型。列表中的项目用逗号分隔，并用方括号（`[]`）括起来。在某些方面，列表与 C 的数组相似。列表可以包含不同数据类型的元素，这是它与其他集合的一个区别。


    ```

    mylist = ["hello",33,"89"]

    ```


    使用切片运算符（`[]` 和 `[:]`）可以访问列表中存储的值，索引从列表开头的 0 开始，一直到列表末尾的 -1。星号（*）表示重复运算符，加号（+）是列表连接运算符。


    ```

    mylist [0:] 我们将在后续章节中看到更多这些内容。

    ```


    ### 1.13.4 Python 元组


    元组是另一种类似于列表的序列数据类型。元组包含多个值，并用逗号分隔。然而，与列表不同，元组用圆括号括起来。


    ```

    mytup = ("hi","22"," name")

    ```


    元组和列表的主要区别在于元组包含在圆括号（`( )`）中且不能更改，而列表包含在方括号（`[ ]`）中，可以更改其元素和大小。元组类似于只读列表。


    ### 1.13.5 Python 字典


    Python 中的字典结构有点类似于哈希表。它们通过键值对工作，类似于 Perl 中看到的关联数组或哈希。字典键通常由文本或数字组成，尽管它几乎可以是任何
    Python 类型。然而，值可以是任何 Python 对象。


    ```

    mytup = {"name": "harry"," age":"22"," course":"bca"}

    ```


    字典用花括号（`{ }`）分隔，方括号（`[ ]`）用于赋值和访问值。


    ### 1.13.6 Type () 函数


    Type 函数用于检查变量或值的数据类型。type() 函数的语法是：


    ```

    type("value")

    type(var_name)

    ```


    示例：


    ```

    >>>print(type("hello"))

    >>>a=25

    >>>print(type(a))

    ```


    输出：


    ```

    E:\python>python practice-1.py

    <class ''str''>

    <class ''int''>

    ```


    ### 1.13.7 数据类型转换


    你可能偶尔需要在内置类型之间进行转换。你可以使用类型名称作为函数在类型之间进行转换。


    有许多内置函数可以执行数据类型转换。这些操作会产生一个全新的对象来表示转换后的值。


    | 索引 | 函数含义 |

    |---|---|

    | 1 | **int(x [,base])** 将 x 转换为整数。如果 x 是字符串，base 指定基数。 |

    | 2 | **long(x [,base] )** 将 x 转换为长整数。如果 x 是字符串，base 指定基数。 |

    | 3 | **float(x)** 将 x 转换为浮点数。 |

    | 4 | **complex(real [,imag])** 创建一个复数。 |

    | 5 | **str(x)** 将对象 x 转换为字符串表示形式。 |

    | 6 | **repr(x)** 将对象 x 转换为表达式字符串。 |

    | 7 | **eval(str)** 计算一个字符串并返回一个对象。 |

    | 8 | **tuple(s)** 将 s 转换为元组。 |

    | 9 | **list(s)** 将 s 转换为列表。 |

    | 10 | **set(s)** 将 s 转换为集合。 |

    | 11 | **dict(d)** 创建一个字典。d 必须是（键，值）元组的序列。 |

    | 12 | **frozenset(s)** 将 s 转换为冻结集合。 |

    | 13 | **chr(x)** 将整数转换为字符。 |

    | 14 | **unichr(x)** 将整数转换为 Unicode 字符。 |

    | 15 | **ord(x)** 将单个字符转换为其整数值。 |

    | 16 | **hex(x)** 将整数转换为十六进制字符串。 |

    | 17 | **oct(x)** 将整数转换为八进制字符串。 |


