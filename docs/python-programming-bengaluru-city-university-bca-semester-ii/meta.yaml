    # FILE AND EXCEPTION HANDLING


    Programming involves dealing with files on a regular basis. Python has built-in
    methods for creating, opening, and closing files, which makes handling files easier.


    # 8.1 Types of Files


    File creation, reading, and writing are all supported via built-in Python routines.
    Binary files and regular text files are the two types of files that can be processed
    by Python (written in binary language, 0s, and 1s).


    +   1. **Text files:** Each line of text in this type of file is concluded with
    a unique character called EOL (End of Line), which in Python is equivalent to
    the new line character (‘\n’).

    2. **Binary files:** Data is kept in binary files after being translated into
    a machine-understandable language; there is no line terminator in these files.


    # 8.2 Methods used to Access Files


    Access modes control the kinds of operations that can be performed on the opened
    file. When a file is opened, it describes how it will be utilized. Additionally,
    these modes specify where the File Handle is located within the file. A file handle
    acts as a cursor, indicating where data must be read or written into the file.
    Python has six different access modes.


    +   1. **Read-Only (‘r’):** Read the text file. A handle is placed at the start
    of the file. The I/O error is raised if the file does not exist. Additionally,
    this is the manner by which a file is opened by default.'
  - '[PAGE 93]


    +   2. **Open the file to allow reading and writing (r+).** The handle is located
    at the start of the file

    3. **Open the file for writing only (‘w’).** The data is overwritten and truncated
    for the already-existing files. The start of the file is where the handle is located.
    if the file doesn’t already exist, creates it.

    4. **Open the file for reading and writing with the “w+” command.** Data is overwritten
    and truncated for an existing file. The start of the file is where the handle
    is located.

    5. **Append Only (‘a’):** Start writing in the file. If the file doesn’t already
    exist, one is created. The handle is situated at the file’s conclusion. The newly
    written data will be added at the end, following the previously written data.

    6. **Append and Read (‘a+’):** Allows reading and writing in the file. If the
    file doesn’t already exist, one is created. The handle is situated at the file’s
    conclusion. The newly written data will be added at the end, following the previously
    written data.


    # 8.3 Loading Files into Memory


    A computer has two different types of memory: primary memory and secondary memory.
    All files stored by you or anyone else are kept in secondary memory since the
    computer deletes any data in primary memory when it shuts down. Therefore, you
    must load the text file into main memory before editing it or simply using it
    in Python. Python uses “file handlers” to communicate with files that are loaded
    in main memory (This is how your operating system gives access to python to interact
    with the file you opened by searching the file in its memory if found it returns
    a file handler and then you can work with the file).


    # 8.4 Opening a File


    To open a file, use the built-in open () function in Python. This function returns
    a handle, also known as a file object, which can be used to read or modify the
    file appropriately.


    Example:


    ```

    >>> f = open(“test.txt”)    # open file in current directory

    >>> f = open(“C:/Python38/README.txt”)    # specifying full path

    ```


    When opening a file, the mode can be specified. We indicate in mode whether we
    wish to read the file, write to it, or append data to it. Additionally, we may
    choose whether we want to open the file in binary mode or text mode.


    Reading is done in text mode by default. When reading from the file in this mode,
    strings are returned.'
