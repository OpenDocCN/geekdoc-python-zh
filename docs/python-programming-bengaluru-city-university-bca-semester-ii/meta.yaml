    , \"Doe\")\nx.printname()\n```\n\n## 创建子类\n\n在创建子类时，将父类作为参数添加，你就可以设计一个继承其功能的类：\n\
    \n我们目前开发的子类继承了父类的属性和函数。\n\n我们希望给子类添加 `__init__()` 函数（而不是 `pass` 关键字）。\n\n- 每次使用该类创建新对象时，`__init__()`\
