  md: '# Methods & Description


    +   1. **GET** Sends data in unencrypted form to the server. Most common method.

    2. **HEAD** Same as GET, but without response body

    3. **POST** Used to send HTML form data to server. Data received by POST method
    is not cached by server.

    4. **PUT** Replaces all current representations of the target resource with the
    uploaded content.

    5. **DELETE** Removes all current representations of the target resource given
    by a URL


    The Flask route responds to GET requests by default. However, this choice can
    be changed by giving the route() decorator a methods parameter.


    Let''s first develop an HTML form and use the POST method to transmit form data
    to a URL in order to illustrate the use of the POST method in URL routing.


