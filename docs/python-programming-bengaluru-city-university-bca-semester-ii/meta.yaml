    # 10.5 Matplotlib Pyplot


    The functions in Matplotlib pyplot enable Matplotlib to function similarly to
    MATLAB. Each pyplot function modifies a figure in some way, such as by creating
    a figure, a plotting region within a figure, some lines within a plotting area,
    labelling the plot, etc.


    The plt alias is typically used to import the majority of the Matplotlib functions,
    which are located in the pyplot submodule:

    import matplotlib.pyplot as plt

    Now the Pyplot package can be referred to as plt.


    Example: Draw a line in a diagram from position (0,0) to position (6,250)


    ```

    import matplotlib.pyplot as plt

    import numpy as np

    xpoints=np.array([0, 6])

    ypoints=np.array([0, 250])

