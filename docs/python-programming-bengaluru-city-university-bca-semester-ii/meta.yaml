    sum of even natural numbers is\", sum)\n```\n\n输出：\nEnter the number10\nsum of\
    \ even natural number is 20\n\n## 程序 3：计算字符串中元音字母数量的程序\n\n```\n>>>mystr = input(\"\
    Enter the string\")\n>>>count=0\n>>>for i in mystr:\n>>>    if i=='a' or i=='e'\
