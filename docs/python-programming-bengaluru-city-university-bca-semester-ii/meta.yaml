    greater\nC:\\Users\\CSC\\Pictures\\python>python demo.py\nlesser\nC:\\Users\\\
    CSC\\Pictures\\python>python demo.py\nequal\n```\n\n## 4. 嵌套 if-else\n\n嵌套 if\
    \ 语句用于根据给定条件执行一组指令，如果条件失败，我们可以在 if 块中给出另一个 if 条件来执行。它可以根据需要继续嵌套任意多个 if 条件。\n\n\
    语法：\n\n```\nif(condition):\n    statements\n    statements\nif(condition):\n \
    \   statements\n    statements\nif(condition):\n    statements\n    statements\n\
    ```\n\n示例：\n\n```\n>>> mynum = 5\n>>> if mynum == 5:\n>>>     print (\"Number\
    \ is 5\")\n>>> if mynum== 10:\n>>>     print (\"number is 10\")\n>>> if mynum==\
    \ 20:\n>>>     print (\"number is 20\")\n```\n\n输出：\n\n```\nC:\\Users\\CSC\\Pictures\\\
    python>python demo.py\nnumber is 5\nC:\\Users\\CSC\\Pictures\\python>python demo.py\n\
    number is 10\nC:\\Users\\CSC\\Pictures\\python>python demo.py\nnumber is 20\n\
    ```\n\n## 程序 1：编写一个程序来判断正数或负数。\n\n```\nnum = 10\n>>>\n输出：正数\n```\n\n## 程序 2：编写一个程序来判断奇数或偶数。\n\
    \n```\nnum = 53\n>>>\n输出：奇数\n```\n\n## 程序 3：编写一个程序来找出三个数中的最大值。\n\n```\nnum = 63\n\
    num1 = 45\nnum2 = 33\n>>>\n输出：63\n```\n\n## 迭代语句\n\n在 Python 中，迭代语句允许我们在条件为 True\
    \ 时重复执行一段代码块。我们也称之为循环语句。\n\nPython 提供了以下两种循环语句来重复执行某些操作\n\n- 1. for 循环\n- 2. while\
    \ 循环\n\n## 1. for 循环\n\n使用 for 循环，我们可以遍历任何序列或可迭代变量。序列可以是字符串、列表、字典、元组、集合。\n\n###\
    \ 类型 1：使用 range()：\n\n此循环将接受一个数字作为参数，并从默认值 0 开始迭代到该数字。\n\n示例：参数 1\n\n```\n>>>\
    \ for i in range (5):\n>>>     print(i)\n```\n\n**输出：**\n\n```\nC:\\Users\\CSC\\\
    Pictures\\python>python demo.py\n0\n1\n2\n3\n4\n```\n\n此循环将接受两个数字作为参数。第一个数字是迭代的起始数字，第二个数字是迭代停止的结束数字。\n\
    \n**示例：** 参数 2\n\n```\n>>> for i in range (5,10):\n>>>     print(i)\n```\n\n**输出：**\n\
