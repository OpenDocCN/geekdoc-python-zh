    # 6.2 Accessing Dictionary


    A dictionary employs keys, whereas other data types require indexing to access
    values. Keys can be utilized with the get() function or inside square brackets
    [].


    In the event that a key cannot be found in the dictionary, KeyError is raised
    if we use square brackets []. On the other hand, if the key cannot be located,
    the get() method returns None.


    Example:


    ```

    >>># get vs [] for retrieving elements

    >>>my_dict = {''name'': ''Jack'', ''age'': 26}

    >>>print(my_dict[''name''])

    >>>print(my_dict.get(''age''))

    >>># Trying to access keys which doesn''t exist throws error

    >>>print(my_dict.get(''address''))

    >>># KeyError

    >>>print(my_dict[''address''])

    ```'
