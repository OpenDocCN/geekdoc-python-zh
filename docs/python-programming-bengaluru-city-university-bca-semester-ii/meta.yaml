    # 9.8 Inheritance


    We can define a class that includes all the methods and properties of another
    class thanks to inheritance. The class that is being inherited from is referred
    to as the parent class or base class. The term “child class,” sometimes known
    as “derived class,” refers to a class that inherits from another class.


    # Create a Parent Class


    The syntax is the same as creating any other class because any class can be a
    parent class:


    Example


