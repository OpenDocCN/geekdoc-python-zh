    # CHAPTER 13


    # WORKING WITH WEB APPLICATION


    # 13.1 What is Web Application?


    Python-driven web apps make decisions about what actions to perform and what material
    to display using Python code. Your users don''t need to install anything because
    the web server that hosts your website runs your code. A browser and an Internet
    connection are all they require to communicate with your code.


    It might be challenging to get Python to run on a website, but there are a variety
    of web frameworks that handle the complexities for you. You will construct a fundamental
    Flask application in this lesson, as was already explained.


    You''ll get a high-level overview of the key steps required to run your Python
    code on a server and respond to users in the following section.


    # 13.2 What is Flask?


    A lightweight web framework is Flask. You can pick and select the Flask extensions
    and components that your website needs. I enjoy this feature since it lets you
    build stuff up gradually and clutter-free.


    Flask MongoEngine and Flask RESTful will be the two main Flask extensions we employ.
    The former is made for developing an API and streamlines the process, while the
    first will enable us to create Classes as templates for our data.


    # 13.3 Flask Installation


    Flask installation typically requires Python 2.6 or above. Python 3 (Python 3.3
    and later) is supported by Flask and its dependencies, however many Flask extensions
    do not. Therefore, it is advised that Python 2.7 be used to install Flask.'
