    \n考虑一个软件，其中函数 A 调用函数 B，函数 B 调用函数 C。如果在函数 C 中发生异常但未在该处处理，则异常将传递给 B，然后传递给 A。如果错误从未得到解决，则会显示通知，我们的软件会突然且不可预测地终止。\n\
    \n## 8.9 Python 中捕获异常\n\nPython 中的 `try` 语句可用于管理异常。\n\n`try` 子句包含可能导致异常的关键操作。`except`\
    \ 子句包含管理异常的代码。\n\n因此，一旦我们确定了异常，就可以决定采取什么行动。这里有一个简单的说明。\n\n```python\n>>> # 导入模块\
    \ sys 以获取异常类型\n>>> import sys\n>>> randomList = ['a', 0, 2]\n>>> for entry in\
