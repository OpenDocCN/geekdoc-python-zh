    # 2.2 Python comparison operators


    They make decisions about their relationship by comparing the values on either
    side of them. Also known as relational operators, they are.


    | Operator Name | Meaning |

    |---|---|

    | == | The condition is satisfied if the two operands have equal values. |

    | != | The condition is met if the values of the two operands are not equal. |

    | > | The condition is met if the left operand''s value exceeds the right operand''s
    value. |'
