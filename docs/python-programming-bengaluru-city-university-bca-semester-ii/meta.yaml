    >>>x.printname()

    ```


    # Create a Child Class


    Adding the parent class as a parameter while developing the child class will allow
    you to design a class that inherits its functionality:


    The child class we have so far developed inherits the parent class’s properties
    and functions.


    We wish to give the child class the __init__() function (instead of the pass keyword).


    +   - Every time the class is used to create a new object, the __init__() function
    is invoked automatically.

    - The __init__() function that you add will prevent the child class from continuing
    to use the parent’s __init__() function.

    - The __init__() function of a child overrides any inheritance from its parent.


    Example:


    ```

    >>>class Person:

    ```'
