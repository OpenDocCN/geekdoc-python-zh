    Good morning

    ```


    **Example 3:**


    ```

    >>> print ("hello", wish) #printing variables and statements together

    **Output:**

    Hello Good morning

    ```


    # 1.9 Identifiers in Python


    A Python identifier is a name used to identify a variable, function, class, module
    or other object. An identifier starts with a letter A to Z or a to z or an underscore
    (_) followed by zero or more letters, underscores and digits (0 to 9).


    +   - Python does not allow punctuation characters such as @, $, and % within
    identifiers.

    - Python is a case sensitive programming language.

    - Thus, Manpower and manpower are two different identifiers in Python.


    **Rules for declaring Python identifiers?**


    +   - Python allows for the use of underscore (_), lowercase (a-z), uppercase
    (A-Z), and number (0-9) in identifier names.

    - Every time, a non-numeric character should begin the name.

    - There should be more than just numbers in an identification name.'
  - '[PAGE 15]


    +   - In Python, as in the majority of other languages, identifier names are case-sensitive.
    (''Ash'' and ''ASH'' are not the same thing.)

    - It won''t show an error if users start their identifiers with an underscore.

    - Although the PEP-8 standard rule suggests keeping lines to 79 characters in
    length, an identifier name can be any length.

    - The names of keywords and identifiers shouldn''t coincide. (Users can examine
    a list of all the keywords in Python and prevent problems by typing help() followed
    by "keywords").

    - There is no necessity for leading double underscores ($).


    Here is an example of naming a correct Identifier


    ```

    >>> My_language = "Python"

    >>> myName = "xyz"

    >>> __username__ = "abc12"

    ```


    Here is an example of naming an incorrect Identifier


    ```

    >>> 7hello = "hello"

    >>> @hello = "hello"

    >>> __user@7= "abc12"

    ```


    # 1.10 Keywords in Python


    Keywords are predefined and reserved words in python that have some special meaning.
    Keywords cannot be used as variable name, function name or any other identifier.
    They are used to define the syntax of the coding.


    +   - In python, keywords are case sensitive. Example: True and true and both
    different words in python

    - In python all keywords are in lowercase except True, False and None


    # 1.10.1 List of all keywords in python:


    | And | Exec | Not |

    | Assert | Finally | Or |

    | Break | For | Pass |

    | Class | From | Print |

    | Continue | Global | Raise |

    | Def | If | Return |

    | Del | Import | Try |'
- md: '## 1.10.2 Example of keywords with True, False


    Python has two truth values: True and False. They are the outcomes of logical
    (Boolean) or comparison operations in Python. For instance:


    ```

    >>> True or False

    True

    >>> True or False

    True

    ```


    ![](img/c5c3113c0233e765f6875c52296f229f_16_0.png)


    ## 1.11 Statements and Expressions in Python


    Statements in Python


    Statements are the instructions given to the python interpreter to execute.


    Example:


    ```

    >>> print ("Good morning")

    >>> print ("Hello, how are you?")

    ```


    Output:


    ```

    >>> print("Good morning")

    Good morning

    >>> print("Hello,how are you?")

    Hello,how are you?

    ```


    Expressions in Python


    Expressions are the combination of operators and operands which together produces
    some other value.


    Example:


    ```

    >>> sum = 25+50

    >>> print(sum)

    ```


    Output:


    ```

    >>> sum 25+50

    >>> print(sum)

    75

    ```


    ## 1.12 Variables in Python


    What are variables?


    Variables are just designated memory spaces for storing values. This means that
    you set aside some memory when you create a variable. The interpreter allocates
    memory and determines what can be placed in the reserved memory based on the data
    type of a variable.


    As a result, you can store integers, decimals, or characters in variables by giving
    them alternative data types. Python variables do not require an explicit declaration
    to set aside memory. When you provide a variable a value, the declaration takes
    place automatically. In order to give variables values, use the equal sign (=).


    ### 1.12.1 Rules of declaring a variable


    - A letter or the underscore character, whichever comes first, must begin a variable
    name.

    - No number can be used to begin a variable name.

    - Only underscores ( ), digits 0 through 9, and letters A through Z are permitted
    in variable names.

    - Case sensitivity applies to variable names


    The name of the variable is the operand to the left of the = operator, and its
    value is the operand to the right. As an illustration,


    ```

    >>>a= 23

    >>>print(a)

    **Output:**

    >>> a=23

    >>> print(a)

    23

    ```


    Python enables you to simultaneously assign the same value to multiple variables.
    For instance,


    ```

    >>>a= 23

    >>>a= 25

    >>>print(a)

    **Output:**

    >>> a=23

    >>> a=25

    >>> print(a)

    25

    ```


    ## 1.13 Data Types in Python


    There are numerous sorts of data that can be kept in memory. For instance, a person''s
    address and age are both maintained as alphanumeric characters. Python contains
    a number of standard data types that are used to specify the actions that may
    be performed on them and the storage method for each of them.


    ![](img/c5c3113c0233e765f6875c52296f229f_19_0.png)


    Python has five common data types.


    - Numbers

    - String

    - List

    - Tuple

    - Dictionary


    ### 1.13.1 Python numbers


    Number data types keep track of numbers. When you give a number a value, an object
    is generated. Python supports four different numerical types:


    - int (signed integers)

    - long (long integers, they can also be represented in octal and hexadecimal)

    - float (floating point real values)

    - complex (complex numbers)


    Here are some examples of numbers:


    | Int | long | Float | Complex |

    |---|---|---|---|

    | 10 | 51924361L | 0.0 | 3.14j |

    | 100 | -0x19323L | 15.20 | 45.j |

    | -786 | 0122L | -21.9 | 9.322e-36j |

    | 080 | 0xDEFABCECBDAECBFBAEI | 32.3+e18 | .876j |

    | -0490 | 535633629843L | -90. | -.6545+0J |

    | -0x260 | -052318172735L | -32.54e100 | 3e+26J |

    | 0x69 | -4721885298529L | 70.2-E12 | 4.53e-7j |


    ### 1.13.2 Python strings


    Python defines a string as a continuous collection of characters that are enclosed
    in quotation marks. Python accepts either double or single quotes in pairs. With
    indexes beginning at 0 at the beginning of the string and moving toward -1 at
    the conclusion, subsets of strings can be taken using the slice operator ([] and
    [:]).


    ```

    mystr = "hello"


    mystr[0:] We will see more of these in further chapter.

    ```


    The repetition operator is represented by the asterisk (*), and the string concatenation
    operator by the plus sign (+).


    ### 1.13.3 Python lists


    The most flexible compound data type in Python is a list. Items on a list are
    denoted by commas and enclosed in square brackets ([]). In certain ways, lists
    and C''s arrays are similar. A list''s ability to contain elements of various
    data types is one way it differs from other collections.


    ```

    mylist = ["hello",33,"89"]

    ```


    With indexes beginning at 0 at the list''s beginning and moving all the way to
    -1 at the list''s end, the slice operator ([] and [:]) can be used to access the
    values kept in a list. The repetition operator is represented by the asterisk
    (*), and the plus (+) sign is the list concatenation operator.


    ```

    mylist [0:] We will see more of these in further chapter.

    ```


    ### 1.13.4 Python tuples


    Tuples are another sequence data type that resemble lists. Multiple values are
    contained in a tuple and are separated by commas. Tuples, however, are encapsulated
    in parenthesis, unlike lists.


    ```

    mytup = ("hi","22"," name")

    ```


    The major distinction between tuples and lists is that tuples are contained in
    parenthesis (()) and cannot be altered, but lists are enclosed in brackets ([])
    and can have their elements and size changed. Tuples are analogous to read-only
    lists.


    ### 1.13.5 Python dictionary


    Dictionary structures in Python are somewhat akin to hash tables. Key-value pairs
    make them function similarly to associative arrays or hashes seen in Perl. A dictionary
    key often consists of texts or numbers, though it can be nearly any Python type.
    Values, however, can be any Python object at all.


    ```

    mytup = {"name": "harry"," age":"22"," course":"bca"}

    ```


    Curly braces () delimit dictionaries, and square braces () allow for value assignment
    and access ([]).


    ### 1.13.6 Type () function


    Type function is used to check the data type of the variable or value. The type()
    function syntax is:


    ```

    type("value")

    type(var_name)

    ```


    Example:


    ```

    >>>print(type("hello"))

    >>>a=25

    >>>print(type(a))

    ```


    Output:


    ```

    E:\python>python practice-1.py

    <class ''str''>

    <class ''int''>

    ```


    ### 1.13.7 Data Type Conversion


    You might occasionally need to conduct conversions between the built-in kinds.
    You can convert between types by using the type name as a function.


    There are numerous built-in functions that conduct data type conversion. These
    operations produce a brand-new object that represents the converted value.


    | Index | Function meaning |

    |---|---|

    | 1 | **int(x [,base])** Converts x to an integer. base specifies the base if
    x is a string. |

    | 2 | **long(x [,base] )** Converts x to a long integer. base specifies the base
    if x is a string. |

    | 3 | **float(x)** Converts x to a floating-point number. |

    | 4 | **complex(real [,imag])** Creates a complex number. |

    | 5 | **str(x)** Converts object x to a string representation. |

    | 6 | **repr(x)** Converts object x to an expression string. |

    | 7 | **eval(str)** Evaluates a string and returns an object. |

    | 8 | **tuple(s)** Converts s to a tuple. |

    | 9 | **list(s)** Converts s to a list. |

    | 10 | **set(s)** Converts s to a set. |

    | 11 | **dict(d)** Creates a dictionary. d must be a sequence of (key,value) tuples.
    |

    | 12 | **frozenset(s)** Converts s to a frozen set. |

    | 13 | **chr(x)** Converts an integer to a character. |

    | 14 | **unichr(x)** Converts an integer to a Unicode character. |

    | 15 | **ord(x)** Converts a single character to its integer value. |

    | 16 | **hex(x)** Converts an integer to a hexadecimal string. |

    | 17 | **oct(x)** Converts an integer to an octal string. |


