    # CHAPTER 2


    # BASICS OF PYTHON PROGRAMMING


    # Operators


    Operators are used to perform operations on variables and values

    Python language supports the following types of operators.


    +   - Arithmetic Operators

    - Comparison (Relational) Operators

    - Assignment Operators

    - Logical Operators

    - Bitwise Operators

    - Membership Operators

    - Identity Operators


    Let us have a look on all operators one by one.


    # 2.1 Python Arithmetic Operators


    | Operator Name | Meaning |

    | --- | --- |

    | + Addition | values on either side of the operator are added. |

    | - Subtraction | the right hand operand is subtracted from the left hand operand.
    |

    | * Multiplication | values on either side of the operator are multiplied. |

    | / Division | splits the right hand operand by the left hand operand. |

    | % Modulus | returns the remainder after dividing the left hand operand by the
    right hand operand. |'
