    # CHAPTER 8


    # FILE AND EXCEPTION HANDLING


    Programming involves dealing with files on a regular basis. Python has built-in
    methods for creating, opening, and closing files, which makes handling files easier.


    # 8.1 Types of Files


    File creation, reading, and writing are all supported via built-in Python routines.
    Binary files and regular text files are the two types of files that can be processed
    by Python (written in binary language, 0s, and 1s).


    +   1. **Text files:** Each line of text in this type of file is concluded with
    a unique character called EOL (End of Line), which in Python is equivalent to
    the new line character (‘\n’).

    2. **Binary files:** Data is kept in binary files after being translated into
    a machine-understandable language; there is no line terminator in these files.


    # 8.2 Methods used to Access Files


    Access modes control the kinds of operations that can be performed on the opened
    file. When a file is opened, it describes how it will be utilized. Additionally,
    these modes specify where the File Handle is located within the file. A file handle
    acts as a cursor, indicating where data must be read or written into the file.
    Python has six different access modes.


    +   1. **Read-Only (‘r’):** Read the text file. A handle is placed at the start
    of the file. The I/O error is raised if the file does not exist. Additionally,
    this is the manner by which a file is opened by default.'
