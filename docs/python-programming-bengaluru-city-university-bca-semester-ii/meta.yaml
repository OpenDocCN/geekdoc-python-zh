    | --- | --- | --- | --- | --- | --- | --- | --- |

    | ''*'' | 星号 | ''P'' | 加号（填充） | ''|'' | 垂直线 | ''h'' | 六边形 |

    | ''.'' | 点 | ''s'' | 正方形 | ''_'' | 水平线 | ''v'' | 下三角 |

    | '','' | 像素 | ''D'' | 菱形 | ''1'' | 下三角 | ''^'' | 上三角 |

