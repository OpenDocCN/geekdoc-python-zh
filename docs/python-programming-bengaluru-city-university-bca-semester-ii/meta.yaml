  md: "+   - templates\n  - hello.html\n\nThe phrase “web templating system” describes\
    \ the process of creating an HTML script that allows variable data to be dynamically\
    \ entered. A template engine, a particular type of data source, and a template\
    \ processor make up a web template system.\n\nJinja2 template engine is used by\
    \ Flask. When a web template is produced, placeholders for variables and expressions\
    \ (in this example, Python expressions) are substituted with their actual values.\n\
    \nThe file named hello.html in the templates folder contains the following code.\n\
