    >>>print(x)\n```\n\n输出：\n\n```\nE:\\python>practice-1.py\ndict_items([('brand',\
    \ 'Ford'), ('model', 'Mustang'), ('year', 1964)])\n```\n\n### Keys()\n\n返回包含字典键的列表。\n\
    \n例如：\n\n```\n>>>car = {\n    \"brand\": \"Ford\",\n    \"model\": \"Mustang\"\
