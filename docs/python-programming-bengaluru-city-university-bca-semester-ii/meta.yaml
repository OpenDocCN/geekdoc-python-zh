    An object-oriented programming language is Python. Object-oriented programming
    places more of an emphasis on objects than procedure-oriented programming, which
    places more of a focus on functions.


    A collection of data (variables) and methods (functions) that manipulate those
    variables is an object. A class is an object''s blueprint in a similar way.


    A class can be compared to a rough draught or prototype of a home. It includes
    all of the information regarding the floors, doors, windows, etc. We construct
    the house in accordance with these descriptions. The item is a house.


    We can generate numerous objects from a class, much as numerous homes may be built
    using a single house''s blueprint. The process of producing an object is known
    as instantiation, and an object is also referred to as an instance of a class.


