    4. **Hierarchical Inheritance:** Hierarchical inheritance is the process of creating
    multiple derived classes from a single base class. Two child (derived) classes
    and a parent (base) class are present in this software.


    ![](img/c5c3113c0233e765f6875c52296f229f_112_0.png)


    Example:


    ```

    >>>class Parent:

    >>>    def func1(self):

    >>>        print("This function is in parent class.")

    >>>class Child1(Parent):

    >>>    def func2(self):

    >>>        print("This function is in child 1.")

    >>>class Child2(Parent):

    >>>    def func3(self):

    >>>        print("This function is in child 2")

    >>>object1 = Child1()

    >>>object2 = Child2()

    >>>object1.func1()

    >>>object1.func2()

    >>>object2.func1()

    >>>object2.func3()

    ```'
