    ## 8.8 Exception in Python\n\nWhen a problem occurs in your program, Python's\
    \ numerous built-in exceptions are raised (something in the program goes wrong).\
    \ The Python interpreter stops the running process and transfers control to the\
    \ caller process until these exceptions are addressed. The program will crash\
    \ if the situation is not handled.\n\nConsider a software where function A calls\
    \ function B, and function B calls function C. If an exception arises in function\
    \ C but is not handled there, the exception is passed to B and then to A. If the\
    \ error is never addressed, a notification is shown and our software abruptly\
    \ and unpredictably ends.\n\n## 8.9 Catching Exception in Python\n\nA `try` statement\
    \ in Python can be used to manage exceptions.\n\nThe `try` clause contains the\
    \ crucial operation that can cause an exception. The `except` clause contains\
    \ the code that manages exceptions.\n\nThus, once we have identified the exception,\
    \ we may decide what actions to take. Here is an easy illustration.\n\n```python\n\
    >>> # import module sys to get the type of exception\n>>> import sys\n>>> randomList\
    \ = ['a', 0, 2]\n>>> for entry in randomList:\n...     try:\n...         print(\"\
    The entry is\", entry)\n...         r = 1/int(entry)\n...         break\n... \
    \    except:\n...         print(\"Oops!\", sys.exc_info()[0], \"occurred.\")\n\
    ...         print(\"Next entry.\")\n...         print()\n>>> print(\"The reciprocal\
    \ of\", entry, \"is\", r)\n```\n\nThe `randomList` list's values are iterated\
    \ over in this application. The `try` block contains the code that, as already\
    \ established, has the potential to raise an exception.\n\nIf there is no exception,\
    \ the `except` block is bypassed, and normal operation proceeds (for last value).\
    \ But if an exception arises, the `except` block handles it (first and second\
    \ values).\n\nUsing the `exc_info()` method in the `sys` module, we print the\
    \ exception's name here. We can see that `0` results in `ZeroDivisionError` and\
    \ that `a` causes `ValueError`.\n\n## 8.10 Python: Catching Particular Exceptions\n\
    \nThe `except` clause in the example above did not contain any specific exceptions.\
    \ This will catch all exceptions and treat every case uniformly, hence it is not\
    \ a good programming approach. It is possible to specify the exceptions that an\
    \ `except` clause should cover.\n\nIf an exception occurs, just one of any number\
    \ of `except` clauses that are attached to a `try` clause will be carried out.\n\
    \nTo indicate numerous exceptions in an `except` clause, we can use a tuple of\
    \ values. Pseudo-code is demonstrated here.\n\n```python\n>>> try:\n...     #\
    \ do something\n...     pass\n>>> except ValueError:\n...     # handle ValueError\
    \ exception\n...     pass\n>>> except (TypeError, ZeroDivisionError):\n...   \
    \  # handle multiple exceptions\n...     # TypeError and ZeroDivisionError\n...\
    \     pass\n>>> except:\n...     # handle all other exceptions\n...     pass\n\
    ```\n\n## 8.11 Try with else in Python\n\nIf the code block inside `try` executed\
    \ without any issues, you could occasionally want to run another section of code.\
    \ You can pair the `try` statement with the optional `else` keyword in certain\
    \ situations.\n\nExample:\n\n```python\n# program to print the reciprocal of even\
    \ numbers\n>>> try:\n...     num = int(input(\"Enter a number: \"))\n...     assert\
    \ num % 2 == 0\n>>> except:\n...     print(\"Not an even number!\")\n>>> else:\n\
    ...     reciprocal = 1/num\n...     print(reciprocal)\n```\n\n## 8.12 Try and\
    \ Finally in Python\n\nIn Python, a `finally` clause is an optional addition to\
    \ the `try` statement. This phrase, which is typically used to release external\
    \ resources, is always put into effect.\n\nFor instance, we might be utilizing\
    \ a file or a Graphical User Interface while connecting via the network to a distant\
    \ data center (GUI).\n\nIn any of these scenarios, whether the program ran successfully\
    \ or not, we must clear away the resource before it terminates. The `finally`\
    \ clause carries out these operations (closing a file, shutting a GUI, or disconnecting\
    \ from the network) to ensure execution.\n\nHere is a file operation example to\
    \ demonstrate this.\n\n```python\n>>> try:\n...     f = open(\"test.txt\", encoding='utf-8')\n\
    ...     # perform file operations\n>>> finally:\n...     f.close()\n```\n\n##\
