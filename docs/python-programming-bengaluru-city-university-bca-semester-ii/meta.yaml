  mdcn: "## 9.2 定义类\n\nPython中的类定义以`class`关键字开头，就像函数定义以`def`关键字开头一样。\n\n类的简要描述可以放在类内部的第一个字符串中，这被称为文档字符串。虽然这不是强制要求的，但强烈建议这样做。\n\
    \n以下是对类的简要解释。\n\n```python\n>>>class MyNewClass:\n    >>> \"\"\"This is a docstring.\
    \ I have created a new class\"\"\"\n    >>>pass\n```\n\n类的每个属性都在一个新的局部命名空间中声明。函数或数据都可以是属性。\n\
    \n它还具有以双下划线开头的独特属性，例如。例如，该类的文档字符串由`__doc__`提供。\n\n一旦定义了一个类，就会创建一个同名的新类对象。这个类对象使我们能够访问各种特性，并允许我们创建属于该类的全新对象。\n\
    \n示例：\n\n```python\n>>>class Person:\n    >>> \"\"\"This is a person class\"\"\
    \"\n    >>>age = 10\n    >>>def greet(self):\n    >>>    print('Hello')\n>>>print(Person.age)\n\
    >>>print(Person.greet)\n>>>print(Person.__doc__)\n```\n\n## 9.3 创建对象\n\n我们观察到类对象可以访问许多特性。\n\
    \n此外，它还可以用来实例化该类对象类型的新实例。函数调用类似于创建对象的过程。\n\n```python\n>>> harry = Person()\n\
    ```\n\n这将创建一个名为Harry的新对象实例。通过使用对象名称的前缀，我们可以访问对象的属性。\n\n属性包括数据和方法。对象的方法是该类对应的函数。\n\
    \n换句话说，由于`Person.greet`是一个函数对象（一个类属性），`Person.greet`将是一个方法对象。\n\n示例：\n\n```python\n\
    >>>class Person:\n>>>    \"This is a person class\"\n>>>    age = 10\n>>>    def\
    \ greet(self):\n>>>        print('Hello')\n\n# create a new object of Person class\n\
    >>>harry = Person()\n>>>print(Person.greet)\n>>>print(harry.greet)\n\n# Calling\
    \ object's greet() method\n>>>harry.greet()\n```\n\n你可能注意到了类内部函数定义中的`self`参数，但我们刚刚调用了Harry的方法`greet()`，没有传递任何参数。它仍然执行了。\n\
    \n这是因为当对象调用其方法时，对象本身总是作为第一个参数传递。因此，`Person.greet`等同于`harry.greet()`。\n\n通常，使用n个参数列表调用一个方法，等同于使用一个参数列表调用相应的函数，该参数列表是通过将方法的对象放在第一个参数之前构成的。\n\
    \n这些解释决定了对象本身必须是类函数的第一个参数。通常用`self`来描述这个参数。虽然可以给它起不同的名字，但我们强烈建议这样做。\n\n## 9.4\
    \ Python中的构造函数\n\n特定函数是具有特殊意义的类函数，并以双下划线开头。\n\n`__init__()`方法非常重要。每次创建该类的新对象时，都会调用这个特定的函数。\n\
    \n在面向对象编程中，这种函数也被称为构造函数（OOP）。通常，我们用它来初始化每个变量。\n\n示例：\n\n```python\n>>>class ComplexNumber:\n\
    >>>    def __init__(self, r=0, i=0):\n>>>        self.real = r\n>>>        self.imag\
    \ = i\n>>>    def get_data(self):\n>>>        print(f'{self.real}+{self.imag}j')\n\
    >>># Create a new ComplexNumber object\n>>>num1 = ComplexNumber(2, 3)\n>>># Call\
    \ get_data() method\n>>>num1.get_data()\n>>># Create another ComplexNumber object\n\
    >>># and create a new attribute 'attr'\n>>>num2 = ComplexNumber(5)\n>>>num2.attr\
    \ = 10\n>>>print((num2.real, num2.imag, num2.attr))\n>>># but c1 object doesn't\
    \ have attribute 'attr'\n>>># AttributeError: 'ComplexNumber' object has no attribute\
    \ 'attr'\n>>>print(num1.attr)\n```\n\n## 面向对象的支柱\n\n## 9.5 封装\n\n封装是Python、Java等面向对象语言中的基本概念之一。通过封装限制对方法和变量的访问。封装通过将代码和数据封装在一个单元中来保护它们，防止意外修改。\n\
    \n封装是一种将代码（方法）和作用于数据的数据（变量）组合成单个实体的技术。封装意味着一个类的变量对其他类是私有的，只能通过当前类的方法访问。\n\n考虑一个为专业人士、工程师和学生提供培训的企业。该企业分为不同的部门，如运营、财务、会计、销售等。现在，需要2022年销售记录的会计部门成员无法直接访问它们。\n\
    \n必须得到销售部门团队成员的同意，会计部门员工才能访问。因此，其他部门不了解销售统计数据。公司的财务信息同样对其他部门屏蔽，仅对财务部门可用。会计、销售、财务、运营、营销等的数据在其他部门是不可见的。\n\
    \n示例：\n\n```python\n>>>class Students:\n>>>    def __init__(self, name, rank,\
    \ points):\n>>>        self.name = name\n>>>        self.rank = rank\n>>>    \
    \    self.points = points\n>>>    # custom function\n>>>    def demofunc(self):\n\
    >>>        print(\"I am \"+self.name)\n>>>        print(\"I got Rank \",+self.rank)\n\
    >>># create 4 objects\n>>>st1 = Students(\"Steve\", 1, 100)\n>>>st2 = Students(\"\
    Chris\", 2, 90)\n>>>st3 = Students(\"Mark\", 3, 76)\n>>>st4 = Students(\"Kate\"\
    , 4, 60)\n>>># call the functions using the objects created above\n>>>st1.demofunc()\n\
    >>>st2.demofunc()\n>>>st3.demofunc()\n>>>st4.demofunc()\n```\n\n## 9.6 多态\n\n\
    多态指的是存在多种形式。编程中的多态指的是对多种类型使用相同的函数名（但有不同的签名）。主要区别在于函数中使用的数据类型和参数数量。\n\n示例：\n\n\
    ```python\n>>>class Bird:\n>>>def intro(self):\n>>>    print(\"There are many\
    \ types of birds.\")\n>>>def flight(self):\n>>>    print(\"Most of the birds can\
    \ fly but some cannot.\")\n>>>class sparrow(Bird):\n>>>    def flight(self):\n\
    >>>    print(\"Sparrows can fly.\")\n>>>class ostrich(Bird):\n>>>    def flight(self):\n\
