    ```


    This plot is the second plot in the illustration, which has a row and two columns.


    In other words, if we want a figure with two rows and one column such that the
    two plots are placed on top of one another rather than side by side, we can write
    the syntax as follows:


    Example:


    Draw 2 plots on top of each other:


    ```python

    import matplotlib.pyplot as plt

