    # 2.6 Python Membership Operators


    The membership operators in Python check whether a series of objects, such as
    strings, lists, or tuples, is present.


    | Operator | Description |

    | --- | --- |

    | in | Evaluates to true if it finds a variable in the specified sequence and
    false otherwise. |

    | not in | Evaluates to true if it does not finds a variable in the specified
    sequence and false otherwise. |


