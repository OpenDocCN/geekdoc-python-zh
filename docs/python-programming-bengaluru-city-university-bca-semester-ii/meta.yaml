    ## 10.11 Matplotlib Subplot


    The three inputs provided by the subplot() function describe the arrangement of
    the figure.


    The first and second arguments serve as representations for the layout''s rows
    and columns.


    The current plot''s index is represented by the third argument.


    ```python

