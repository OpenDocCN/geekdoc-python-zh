    \ 块，正常操作继续（对于最后一个值）。但如果发生异常，则 `except` 块会处理它（对于第一个和第二个值）。\n\n我们在这里使用 `sys` 模块中的\
    \ `exc_info()` 方法打印异常的名称。我们可以看到 `0` 导致 `ZeroDivisionError`，而 `a` 导致 `ValueError`。\n\
    \n## 8.10 Python：捕获特定异常\n\n上面示例中的 `except` 子句没有包含任何特定的异常。这将捕获所有异常并统一处理每种情况，因此这不是一个好的编程方法。可以指定\
    \ `except` 子句应涵盖的异常。\n\n如果发生异常，附加到 `try` 子句的任何数量的 `except` 子句中只有一个会被执行。\n\n为了在\
    \ `except` 子句中指示多个异常，我们可以使用值的元组。这里演示了伪代码。\n\n```python\n>>> try:\n...     # 执行某些操作\n\
    ...     pass\n>>> except ValueError:\n...     # 处理 ValueError 异常\n...     pass\n\
