    14. 写出字典中 `update` 方法的语法。\n15. 字典中 `pop` 和 `popitem` 方法的区别。\n16. 解释如何使用循环概念访问字典的键和值。\n\
    \n## 第 7 章\n\n## 集合\n\n一组无序的元素被称为集合。每个集合元素必须是唯一的（无重复）且不可变的（不能更改）。\n\n但是，集合本身是可以更改的。我们可以添加或移除元素。\n\
    \n此外，集合可用于执行数学运算，如并集、交集、对称差集等。例如：\n\n`thisset = {\"apple\", \"banana\", \"cherry\"\
