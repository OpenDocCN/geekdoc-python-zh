    In Python, the while loop statement repeatedly executes a code block while a particular
    condition is true. In a while-loop, every time the condition is checked at the
    beginning of the loop, and if it is true, then the loop''s body gets executed.
    When the condition became False, the controller comes out of the block.


    **Syntax:**

    While(condition):

    Statements


