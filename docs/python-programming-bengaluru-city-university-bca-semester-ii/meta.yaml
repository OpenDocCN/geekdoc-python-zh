    \ bytearray()\n\n返回一个 bytearray 对象。\n\n语法：`bytearray(x, encoding, error)`\n\n\
    示例：\n```python\nx = bytearray(4)\nprint(x)\n```\n输出：\n```\nbytearray(b'\\x00\\\
    x00\\x00\\x00')\n```\n\n## 6. bytes()\n\n返回一个 bytes 对象。\n\n语法：`bytes(x, encoding,\
