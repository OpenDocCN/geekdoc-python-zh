    ## BASICS OF PYTHON PROGRAMMING


    ## Operators


    Operators are used to perform operations on variables and values. Python language
    supports the following types of operators.


    - Arithmetic Operators

    - Comparison (Relational) Operators

    - Assignment Operators

    - Logical Operators

    - Bitwise Operators

    - Membership Operators

    - Identity Operators


    Let us have a look on all operators one by one.


    ### 2.1 Python Arithmetic Operators


    | Operator Name | Meaning |

    | --- | --- |

    | + Addition | values on either side of the operator are added. |

    | - Subtraction | the right hand operand is subtracted from the left hand operand.
    |

    | * Multiplication | values on either side of the operator are multiplied. |

    | / Division | splits the right hand operand by the left hand operand. |

    | % Modulus | returns the remainder after dividing the left hand operand by the
    right hand operand. |

    | ** Exponent | calculates operators'' exponential (power) values |

    | // Floor Division | The division of operands known as "floor division" eliminates
    the digits following the decimal point from the quotient. However, the result
    is floored, or rounded away from zero (towards negative infinity), if one of the
    operands is negative. |


    Example: Let us look at the examples of each operator


    ```

    >>> a=20

    >>> b=10

    >>> sum = a+b

    >>> sub = a-b

    >>> mul = a*b

    >>> div = a/b

    >>> mod = a%b

    >>> exp = a**b

    >>> flr = a//b

    >>>print("Addition is",sum)

    >>>print("Substraction is",sub)

    >>>print("multiplication is", mul)

    >>>print("division is",div)

    >>>print("modulus is",mod)

    >>>print("expnential is",exp)

    >>>print("floor value is",flr)

    ```


    **Output:**


    ```

    C:\Users\CSC\Pictures\python>python demo.py

    Addition is 30

    Substraction is 10

    multipliction is 200

    division is 2.0

    modulus is 0

    expnential is 10240000000000

    floor value is 2

    ```


    ### 2.2 Python comparison operators


    They make decisions about their relationship by comparing the values on either
    side of them. Also known as relational operators, they are.


    | Operator Name | Meaning |

    |---|---|

    | == | The condition is satisfied if the two operands have equal values. |

    | != | The condition is met if the values of the two operands are not equal. |

    | > | The condition is met if the left operand''s value exceeds the right operand''s
    value. |

    | < | The condition is met if the left operand''s value is lower than the right
    operand''s value. |

    | >= | The condition is met if the value of the left operand is greater than or
    equal to the value of the right operand. |

    | <= | The condition is met if the left operand''s value is less than or equal
    to the right operand''s value. |


    **Example:** Let us look at the examples of each operator


    ```

    >>> a=20

    >>> b=10

    >>> print(a==b)

    >>> print(a!=b)

    >>> print(a>b)

    >>> print(a<b)

    >>> print(a<=b)

    ```


    **Output:**


    ```

    C:\Users\CSC\Pictures\python>python demo.py

    False

    True

    True

    False

    False

    True

    ```


    ### 2.3 Python Assignment Operators


    | Operator Name | Meaning |

    | :--- | :--- |

    | = | Assigns values from right side operands to left side operand |

    | += Add AND | It adds right operand to the left operand and assign the result
    to left operand |

    | -= Subtract AND | It subtracts right operand from the left operand and assign
    the result to left operand |

    | *= Multiply AND | It multiplies right operand with the left operand and assign
    the result to left operand |

    | /= Divide AND | It divides left operand with the right operand and assign the
    result to left operand |

    | %= Modulus AND | It takes modulus using two operands and assign the result to
    left operand |

    | **= Exponent AND | Performs exponential (power) calculation on operators and
    assign value to the left operand |

    | //= Floor Division | It performs floor division on operators and assign value
    to the left operand |


    **Example:** Let us look at the examples of each operator


    ```

    >>> a=20

    >>> a+=10

    >>> print(a)

    >>> a - =10

    >>> print(a)

    >>> a * =10

    >>> print(a)

    >>> a / =10

    >>> print(a)

    >>> a %= 10

    >>> print(a)

    >>> a**=10

    >>> print(a)

    >>> a // 10

    ```


    **Output:**


    ```

    C:\Users\CSC\Pictures\python>python demo.py

    30

    20

    200

    20.0

    0.0

    0.0

    0.0

    ```


    ### 2.4 Python Bitwise Operators


    Bitwise operators operate bit by bit, working with bits. If a = 60 and b = 13,
    their values would be 0011 1100 and 0000 1101, respectively, in binary code. The
    bitwise operators that Python supports are listed in the table below.


    | Operator name | Meaning | Example |

    |---|---|---|

    | & Binary AND | Operator copies a bit to the result if it exists in both operands
    | (a & b) (means 0000 1100) |

    | \| Binary OR | It copies a bit if it exists in either operand. | (a \| b) =
    61 (means 0011 1101) |

    | ^ Binary XOR | It copies the bit if it is set in one operand but not both. |
    (a ^ b) = 49 (means 0011 0001) |

    | ~ Binary Ones Complement | It is unary and has the effect of ''flipping'' bits.
    | (~a ) = -61 (means 1100 0011 in 2''s complement form due to a signed binary
    number. |

    | << Binary Left Shift | The left operands value is moved left by the number of
    bits specified by the right operand. | a << 2 = 240 (means 1111 0000) |

    | >> Binary Right Shift | The left operands value is moved right by the number
    of bits specified by the right operand. | a >> 2 = 15 (means 0000 1111) |


    Output:


    ```

    C:\Users\CSC\Pictures\python>python demo.py

    12

    61

    12

    49

    -61

    240

    15

    ```


    ### 2.5 Python Logical Operators


    The Python language supports the following logical operators.


    | Operator | Description | Example |

    | --- | --- | --- |

    | and Logical AND | If both the operands are true then condition becomes true.
    | (a and b) is true. |

    | or Logical OR | If any of the two operands are non-zero then condition becomes
    true. | (a or b) is true. |

    | not Logical NOT | Used to reverse the logical state of its operand. | Not(a
    and b) is false. |


    Output:


    ```

    C:\Users\CSC\Pictures\python>python demo.py

    False

    True

    True

    ```


    ### 2.6 Python Membership Operators


    The membership operators in Python check whether a series of objects, such as
    strings, lists, or tuples, is present.


    | Operator | Description |

    | --- | --- |

    | in | Evaluates to true if it finds a variable in the specified sequence and
    false otherwise. |

    | not in | Evaluates to true if it does not finds a variable in the specified
    sequence and false otherwise. |


    Example:


    ```

    >>>Greet = "Good morning"

    >>>Print(''G'' in greet)

    >>>Print(''Good'' not in greet)

    ```


    Output:


    ```

    E:\python>python practice-1.py

    True

    False

    ```


    ### 2.7 Python Identity Operators


    Identity operators compare the memory locations of two objects


    | Operator | Description |

    | --- | --- |

    | is | Evaluates to true if the variables on either side of the operator point
    to the same object and false otherwise. |

    | is not | Evaluates to false if the variables on either side of the operator
    point to the same object and true otherwise. |


    Example:


    ```

    >>>X =5

    >>>Y= 5

    >>>X2 = "hello"

    >>>Y2 =" hello"

    >>>Print(x is y)

    >>>Print(x2 is not y)

    ```


    Output:


    ```

    E:\python>python practice-1.py

    True

    False

    ```


    ### 2.8 Python Operator’s Precedence


    In python operator precedence is the level of operator in which operations will
    be performed.


    The following table lists all operators from highest precedence to lowest.


    | Number | Operator level |

    |---|---|

    | 1 | **Exponentiation (raise to the power) |

    | 2 | ~ + -Complement, unary plus and minus (method names for the last two are
    +@ and -@) |

    | 3 | * / % //Multiply, divide, modulo and floor division |

    | 4 | + -Addition and subtraction |

    | 5 | >> <<Right and left bitwise shift |

    | 6 | &Bitwise ‘AND’ |

    | 7 | ^ \|Bitwise exclusive ‘OR’ and regular ‘OR’ |

    | 8 | <= < > >=Comparison operators |

    | 9 | <> == !=Equality operators |

    | 10 | = %= /= //= -= += *= **=Assignment operators |

    | 11 | is is notIdentity operators |

    | 12 | in not inMembership operators |

    | 13 | not or andLogical operators |'
