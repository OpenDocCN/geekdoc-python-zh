    E:\\python>practice-1.py\n{'brand': 'Ford', 'model': 'Mustang', 'year': 1964}\n\
    ```\n\n### Fromkeys()\n\n用于返回特定的键和特定的值。\n\n例如：\n\n```\n>>>x = ('key1', 'key2',\
