    written data will be added at the end, following the previously written data.

    6. **Append and Read (‘a+’):** Allows reading and writing in the file. If the
    file doesn’t already exist, one is created. The handle is situated at the file’s
    conclusion. The newly written data will be added at the end, following the previously
    written data.


    # 8.3 Loading Files into Memory


    A computer has two different types of memory: primary memory and secondary memory.
    All files stored by you or anyone else are kept in secondary memory since the
    computer deletes any data in primary memory when it shuts down. Therefore, you
    must load the text file into main memory before editing it or simply using it
    in Python. Python uses “file handlers” to communicate with files that are loaded
    in main memory (This is how your operating system gives access to python to interact
    with the file you opened by searching the file in its memory if found it returns
    a file handler and then you can work with the file).


    # 8.4 Opening a File


    To open a file, use the built-in open () function in Python. This function returns
    a handle, also known as a file object, which can be used to read or modify the
    file appropriately.


    Example:


    ```

    >>> f = open(“test.txt”)    # open file in current directory

    >>> f = open(“C:/Python38/README.txt”)    # specifying full path

    ```


    When opening a file, the mode can be specified. We indicate in mode whether we
    wish to read the file, write to it, or append data to it. Additionally, we may
    choose whether we want to open the file in binary mode or text mode.


    Reading is done in text mode by default. When reading from the file in this mode,
    strings are returned.'
