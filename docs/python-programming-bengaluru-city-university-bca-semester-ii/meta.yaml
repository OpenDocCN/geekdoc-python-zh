    # Object Oriented Pillars


    # 9.5 Encapsulation


    One of the fundamental ideas in object-oriented languages like Python, Java, etc.
    is encapsulation. Access to methods and variables is limited through encapsulation.
    Encapsulation protects code and data by enclosing them in one unit to prevent
    accidental modification.


    Encapsulation is a technique for combining the code (methods) and data (variables)
    acting on the data into a single entity. Encapsulation means that a class''s variables
    are kept private from other classes and are only accessible through the methods
    of the current class.'
