    # Types of inheritance


    Types of Inheritance depend upon the number of child and parent classes involved.


    There are four types of inheritance in Python:


    +   1. **Single Inheritance**: Single inheritance allows for the inheritance of
    properties from a single parent class by a derived class, allowing for the reuse
    of existing code and the inclusion of new features.


    ![](img/c5c3113c0233e765f6875c52296f229f_109_0.png)


    Example:


    ```

    >>>class Parent:

    >>>     def func1(self):

    >>>         print("This function is in parent class.")

    >>>class Child(Parent):

    ```'
