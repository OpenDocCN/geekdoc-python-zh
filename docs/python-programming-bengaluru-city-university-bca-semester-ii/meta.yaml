    ## Python编程基础


    ## 运算符


    运算符用于对变量和值执行操作。Python语言支持以下类型的运算符。


    - 算术运算符

    - 比较（关系）运算符

    - 赋值运算符

    - 逻辑运算符

    - 位运算符

    - 成员运算符

    - 身份运算符


    让我们逐一了解所有运算符。


    ### 2.1 Python算术运算符


    | 运算符名称 | 含义 |

    | --- | --- |

    | + 加法 | 将运算符两侧的值相加。 |

    | - 减法 | 用左侧操作数减去右侧操作数。 |

    | * 乘法 | 将运算符两侧的值相乘。 |

    | / 除法 | 用右侧操作数除以左侧操作数。 |

    | % 取模 | 返回左侧操作数除以右侧操作数后的余数。 |

    | ** 幂运算 | 计算运算符的指数（幂）值。 |

    | // 整除 | 称为"整除"的除法会从商中移除小数点后的数字。但是，如果其中一个操作数为负数，则结果会向下取整，或向远离零的方向（向负无穷大）取整。 |


    示例：让我们看看每个运算符的示例


    ```

    >>> a=20

    >>> b=10

    >>> sum = a+b

    >>> sub = a-b

    >>> mul = a*b

    >>> div = a/b

    >>> mod = a%b

    >>> exp = a**b

    >>> flr = a//b

    >>>print("Addition is",sum)

    >>>print("Substraction is",sub)

    >>>print("multiplication is", mul)

    >>>print("division is",div)

    >>>print("modulus is",mod)

    >>>print("expnential is",exp)

    >>>print("floor value is",flr)

    ```


    **输出：**


    ```

    C:\Users\CSC\Pictures\python>python demo.py

    Addition is 30

    Substraction is 10

    multipliction is 200

    division is 2.0

    modulus is 0

    expnential is 10240000000000

    floor value is 2

    ```


    ### 2.2 Python比较运算符


    它们通过比较两侧的值来判断它们之间的关系。也称为关系运算符。


    | 运算符名称 | 含义 |

    |---|---|

    | == | 如果两个操作数的值相等，则条件为真。 |

    | != | 如果两个操作数的值不相等，则条件为真。 |

    | > | 如果左侧操作数的值大于右侧操作数的值，则条件为真。 |

    | < | 如果左侧操作数的值小于右侧操作数的值，则条件为真。 |

    | >= | 如果左侧操作数的值大于或等于右侧操作数的值，则条件为真。 |

    | <= | 如果左侧操作数的值小于或等于右侧操作数的值，则条件为真。 |


    **示例：** 让我们看看每个运算符的示例


    ```

    >>> a=20

    >>> b=10

    >>> print(a==b)

    >>> print(a!=b)

    >>> print(a>b)

    >>> print(a<b)

    >>> print(a<=b)

    ```


    **输出：**


    ```

    C:\Users\CSC\Pictures\python>python demo.py

    False

    True

    True

    False

    False

    True

    ```


    ### 2.3 Python赋值运算符


    | 运算符名称 | 含义 |

    | :--- | :--- |

    | = | 将右侧操作数的值赋给左侧操作数 |

    | += 加后赋值 | 将右侧操作数加到左侧操作数，并将结果赋给左侧操作数 |

    | -= 减后赋值 | 从左侧操作数中减去右侧操作数，并将结果赋给左侧操作数 |

    | *= 乘后赋值 | 将左侧操作数乘以右侧操作数，并将结果赋给左侧操作数 |

    | /= 除后赋值 | 将左侧操作数除以右侧操作数，并将结果赋给左侧操作数 |

    | %= 取模后赋值 | 使用两个操作数进行取模运算，并将结果赋给左侧操作数 |

    | **= 幂运算后赋值 | 对运算符执行指数（幂）计算，并将值赋给左侧操作数 |

    | //= 整除后赋值 | 对运算符执行整除运算，并将值赋给左侧操作数 |


    **示例：** 让我们看看每个运算符的示例


    ```

    >>> a=20

    >>> a+=10

    >>> print(a)

    >>> a - =10

    >>> print(a)

    >>> a * =10

    >>> print(a)

    >>> a / =10

    >>> print(a)

    >>> a %= 10

    >>> print(a)

    >>> a**=10

    >>> print(a)

    >>> a // 10

    ```


    **输出：**


    ```

    C:\Users\CSC\Pictures\python>python demo.py

    30

    20

    200

    20.0

    0.0

    0.0

    0.0

    ```


    ### 2.4 Python位运算符


    位运算符逐位操作，处理二进制位。如果 a = 60 且 b = 13，它们的二进制代码值分别为 0011 1100 和 0000 1101。Python支持的位运算符如下表所示。


    | 运算符名称 | 含义 | 示例 |

    |---|---|---|

    | & 按位与 | 如果两个操作数中都存在该位，则将该位复制到结果中 | (a & b) (表示 0000 1100) |

    | \| 按位或 | 如果任一操作数中存在该位，则复制该位。 | (a \| b) = 61 (表示 0011 1101) |

    | ^ 按位异或 | 如果该位在一个操作数中设置而在另一个中未设置，则复制该位。 | (a ^ b) = 49 (表示 0011 0001) |

    | ~ 按位取反 | 它是一元运算符，具有"翻转"位的效果。 | (~a ) = -61 (由于是有符号二进制数，表示 1100 0011 的二进制补码形式。
    |

    | << 按位左移 | 左侧操作数的值按右侧操作数指定的位数向左移动。 | a << 2 = 240 (表示 1111 0000) |

    | >> 按位右移 | 左侧操作数的值按右侧操作数指定的位数向右移动。 | a >> 2 = 15 (表示 0000 1111) |


    输出：


    ```

    C:\Users\CSC\Pictures\python>python demo.py

    12

    61

    12

    49

    -61

    240

    15

    ```


    ### 2.5 Python逻辑运算符


    Python语言支持以下逻辑运算符。


    | 运算符 | 描述 | 示例 |

    | --- | --- | --- |

    | and 逻辑与 | 如果两个操作数都为真，则条件为真。 | (a and b) 为真。 |

    | or 逻辑或 | 如果两个操作数中任一个非零，则条件为真。 | (a or b) 为真。 |

    | not 逻辑非 | 用于反转其操作数的逻辑状态。 | Not(a and b) 为假。 |


    输出：


    ```

    C:\Users\CSC\Pictures\python>python demo.py

    False

    True

    True

    ```


    ### 2.6 Python成员运算符


    Python中的成员运算符检查一系列对象（如字符串、列表或元组）是否存在。


    | 运算符 | 描述 |

    | --- | --- |

    | in | 如果在指定序列中找到变量，则计算结果为真，否则为假。 |

    | not in | 如果在指定序列中未找到变量，则计算结果为真，否则为假。 |


    示例：


    ```

    >>>Greet = "Good morning"

    >>>Print(''G'' in greet)

    >>>Print(''Good'' not in greet)

    ```


    输出：


    ```

    E:\python>python practice-1.py

    True

    False

    ```


    ### 2.7 Python身份运算符


    身份运算符比较两个对象的内存位置。


    | 运算符 | 描述 |

    | --- | --- |

    | is | 如果运算符两侧的变量指向同一个对象，则计算结果为真，否则为假。 |

    | is not | 如果运算符两侧的变量指向同一个对象，则计算结果为假，否则为真。 |


    示例：


    ```

    >>>X =5

    >>>Y= 5

    >>>X2 = "hello"

    >>>Y2 =" hello"

    >>>Print(x is y)

    >>>Print(x2 is not y)

    ```


    输出：


    ```

    E:\python>python practice-1.py

    True

    False

    ```


    ### 2.8 Python运算符优先级


    在Python中，运算符优先级是指执行操作的运算符级别。


