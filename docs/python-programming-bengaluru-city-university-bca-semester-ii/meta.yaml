    mystr[0:] We will see more of these in further chapter.

    ```


    The repetition operator is represented by the asterisk (*), and the string concatenation
    operator by the plus sign (+).


    # 1.13.3 Python lists


    The most flexible compound data type in Python is a list. Items on a list are
    denoted by commas and enclosed in square brackets ([]). In certain ways, lists
    and C''s arrays are similar. A list''s ability to contain elements of various
    data types is one way it differs from other collections.


    ```

    mylist = ["hello",33,"89"]

    ```


    With indexes beginning at 0 at the list''s beginning and moving all the way to
    -1 at the list''s end, the slice operator ([] and [:]) can be used to access the
    values kept in a list. The repetition operator is represented by the asterisk
    (*), and the plus (+) sign is the list concatenation operator.


    ```

    mylist [0:] We will see more of these in further chapter.

    ```


    # 1.13.4 Python tuples


    Tuples are another sequence data type that resemble lists. Multiple values are
    contained in a tuple and are separated by commas. Tuples, however, are encapsulated
    in parenthesis, unlike lists.


    ```

