    # CHAPTER 1


    # INTRODUCTION TO PYTHON PROGRAMMING


    # 1.1 History


    Python was developed by Guido van Rossum at Centrum Wiskunde & Informatica (CWI)
    in the Netherlands in the late 1980s as a replacement for the ABC programming
    language, which was influenced by SETL, and is capable of handling exceptions
    (from the beginning plus new capabilities in Python 3.11 and interacting with
    the Amoeba operating system. In December 1989, it was put into action.


    Van Rossum served as the project''s sole developer up until July 12, 2018, when
    he declared his "permanent vacation" from his duties as Python''s "benevolent
    dictator for life," a title the Python community gave him to represent his long-term
    devotion as the project''s top decision-maker. A five-member Steering Council
    was chosen to oversee the project in January 2019 by active Python core contributors.


    # 1.2 Definition


    Python is a robust programming language that is simple to learn. Its object-oriented
    programming methodology is straightforward but efficient, and it includes good
    high-level data structures. Python is a fantastic language for scripting and quick
    application development in many domains on most platforms because to its clean
    syntax, dynamic typing, and nature of being an interpreted language.


    # 1.3 Features of Python


    The latest release of Python is 3.11. As mentioned before, Python is one of the
    most widely used language over the web. I''m going to list few of them here:'
- md: '## 1.4 Applications of Python


    Python can be used in different applications to perform different tasks. Some
    of the applications are mentioned below.


    - Python is used in servers to create web applications.

    - Python can be used with software to create workflow.

    - Python also can connect with database systems.

    - Python can be used in reading and modifying files.

    - Python can be used in big data and to perform complex mathematical problems.


    ## 1.5 Python Installation


    Here are the steps to install Python on Windows machine.


    **Step 1:** Open a Web browser and go to https://www.python.org/downloads/


    ![](img/c5c3113c0233e765f6875c52296f229f_8_0.png)


    **Step 2:** To download the latest version click on Download Python 3.11.0


    ![](img/c5c3113c0233e765f6875c52296f229f_8_1.png)


    **Step 3:** After downloading open the setup file and before installing check
    on add to path and install now.


    ![](img/c5c3113c0233e765f6875c52296f229f_9_0.png)


    **Step 4:** Installation will be completed and it shows setup is successful. Now
    the python is installed in the system. Let''s check how to start python programming.


    ## 1.6 Python Interpreter/Shell


    ### 1.6.1 What is shell?


    Since an OS is made up of many different programs, they carry out operations like
    file handling, memory management, and resource management while also facilitating
    the seamless operation of your apps.


    ### 1.6.2 What is Python shell?


    Python interpreter reads a line of code and executes that line, then repeats this
    execution until no errors are found.


    The Python Shell provides you with a command line interface so that you can use
    to give commands directly to the Python interpreter.


    ### 1.6.3 Running python through shell


    **Step 1:** Open the python IDLE or python command prompt.


    **Step 2:** Execute the following example program.


    Example:


    ```

    >>> print("Hello python")

    ```


    Output:


    ![](img/c5c3113c0233e765f6875c52296f229f_10_0.png)


    In the following examples, input and output are distinguished by the presence
    or absence of prompts (>>> and ...): to repeat the example, you must type everything
    after the prompt, when the prompt appears.


    ### 1.6.4 Running python through script


    **Step 1:** To run python using script, firstly create a text file and rename
    it as demo.py.


    ![](img/c5c3113c0233e765f6875c52296f229f_10_1.png)


    **Step 2:** Then open demo.py with text document file and write the example program
    code in the file and save the file.


    ![](img/c5c3113c0233e765f6875c52296f229f_11_0.png)


    **Step 3:** To run the file go to command prompt of the file path and type Python
    demo.py.


    ![](img/c5c3113c0233e765f6875c52296f229f_11_1.png)


    Your first program is running successfully.


    ### Python shell vs Python script


    | Python shell | Python script |

    | :--- | :--- |

    | 1. Python shell is used to execute simple programs and debug some of the complex
    programs. | 1. Python script is used to execute complex and lengthy programs which
    may be used in large scale applications. |


    ## 1.7 Python Comments


    Python code can be explained using comments. Code can be made more readable by
    using comments. When testing code, comments can be used to stop execution. Comments
    starts with a #, and Python will ignore them:


    ### Single line comment


    ```

    #This is a comment

    print ("Hello, World!")

    ```


    Python allows comments at the end of lines, ignoring the preceding text.


    ```

    print ("Hello, World!") #This is a comment

    ```


    It''s possible to use comments to stop Python from executing code as well as to
    provide explanations for the code:


    ```

    #cheering for friend

    print ("Cheers! friend")

    ```


    ### Output Screen:


    ![](img/c5c3113c0233e765f6875c52296f229f_12_0.png)


    ### Multiline comments


    There isn''t actually a syntax for multi-line comments in Python. You could use
    the # symbol to indicate a multiline comment.


    ### Example:


    ```

    #commenthere

    #writtenin

    #multipleline

    print("Hello, World!")

    ```


    Python will not use string literals that are not assigned to variables, therefore
    you can add a multiline string (in triple quotes) to your code and write your
    comment inside of it:


    Example:


    ```

    """

    multi

    line

    comment

    """

    print("Hey, there!")

    ```


    Output screen:


    ![](img/c5c3113c0233e765f6875c52296f229f_13_0.png)


    ### Reading Input in Python


    In python we read the input taken from user using input () function. Generally,
    input function accepts all the inputs given by the user in string format. If we
    want to accept the integer values from user then we have to do type casting, which
    we will be learning in the next session.


    Example:


    ```

    >>> a = input ("Enter your message")

    ```


    Output:


    Enter your message: Good morning

    Good morning


    ## 1.8 Printing an Output in Python


    In python, we can print the output in three ways:


    1. Printing statements.

    2. Printing variables.

    3. Printing statements and variables together.


    **Example 1:**

    Printing statements.


    ```

    >>> print("hello") #printing statements

    ```


    **Output:** hello


    **Example 2:**

    Printing Variables.


    ```

    >>> wish = "Good morning" #printing variables

    >>> print(wish) #printing variables

    ```


    **Output:**

    Good morning


    **Example 3:**


    ```

    >>> print ("hello", wish) #printing variables and statements together

    ```


    **Output:**

    Hello Good morning


    ## 1.9 Identifiers in Python


    A Python identifier is a name used to identify a variable, function, class, module
    or other object. An identifier starts with a letter A to Z or a to z or an underscore
    (_) followed by zero or more letters, underscores and digits (0 to 9).


    - Python does not allow punctuation characters such as @, $, and % within identifiers.

    - Python is a case sensitive programming language.

    - Thus, Manpower and manpower are two different identifiers in Python.


    **Rules for declaring Python identifiers?**


    - Python allows for the use of underscore (_), lowercase (a-z), uppercase (A-Z),
    and number (0-9) in identifier names.

    - Every time, a non-numeric character should begin the name.

    - There should be more than just numbers in an identification name.

    - In Python, as in the majority of other languages, identifier names are case-sensitive.
    (''Ash'' and ''ASH'' are not the same thing.)

    - It won''t show an error if users start their identifiers with an underscore.

    - Although the PEP-8 standard rule suggests keeping lines to 79 characters in
    length, an identifier name can be any length.

    - The names of keywords and identifiers shouldn''t coincide. (Users can examine
    a list of all the keywords in Python and prevent problems by typing help() followed
    by "keywords").

    - There is no necessity for leading double underscores ($).


    Here is an example of naming a correct Identifier:


    ```

    >>> My_language = "Python"

    >>> myName = "xyz"

    >>> __username__ = "abc12"

    ```


    Here is an example of naming an incorrect Identifier:


    ```

    >>> 7hello = "hello"

    >>> @hello = "hello"

    >>> __user@7= "abc12"

    ```


    ## 1.10 Keywords in Python


    Keywords are predefined and reserved words in python that have some special meaning.
    Keywords cannot be used as variable name, function name or any other identifier.
    They are used to define the syntax of the coding.


    - In python, keywords are case sensitive. Example: True and true and both different
    words in python.

    - In python all keywords are in lowercase except True, False and None.


    ### 1.10.1 List of all keywords in python:


    | And | Exec | Not |

    | :--- | :--- | :--- |

    | Assert | Finally | Or |

    | Break | For | Pass |

    | Class | From | Print |

    | Continue | Global | Raise |

    | Def | If | Return |

    | Del | Import | Try |'
  mdcn: '## 1.4 Python 的应用


    Python 可用于不同的应用以执行不同的任务。以下列举了部分应用场景。


    - Python 用于服务器端，创建 Web 应用程序。

    - Python 可与软件结合，创建工作流程。

    - Python 也能连接数据库系统。

    - Python 可用于读取和修改文件。

    - Python 可用于大数据处理以及执行复杂的数学问题。


    ## 1.5 Python 安装


    以下是在 Windows 机器上安装 Python 的步骤。


    **步骤 1：** 打开网页浏览器，访问 https://www.python.org/downloads/


    ![](img/c5c3113c0233e765f6875c52296f229f_8_0.png)


    **步骤 2：** 要下载最新版本，请点击 Download Python 3.11.0。


    ![](img/c5c3113c0233e765f6875c52296f229f_8_1.png)


    **步骤 3：** 下载完成后，打开安装文件，在安装前勾选“Add to path”（添加到路径），然后点击“Install now”（立即安装）。


    ![](img/c5c3113c0233e765f6875c52296f229f_9_0.png)


    **步骤 4：** 安装将完成，并显示安装成功。现在 Python 已安装在系统中。让我们看看如何开始 Python 编程。


    ## 1.6 Python 解释器/Shell


    ### 1.6.1 什么是 Shell？


    由于操作系统由许多不同的程序组成，它们在执行文件处理、内存管理和资源管理等操作的同时，也确保了应用程序的顺畅运行。


    ### 1.6.2 什么是 Python Shell？


    Python 解释器读取一行代码并执行该行，然后重复此执行过程，直到未发现错误为止。


    Python Shell 为你提供了一个命令行界面，你可以使用它直接向 Python 解释器发送命令。


    ### 1.6.3 通过 Shell 运行 Python


    **步骤 1：** 打开 Python IDLE 或 Python 命令提示符。


    **步骤 2：** 执行以下示例程序。


    示例：


    ```

    >>> print("Hello python")

    ```


    输出：


    ![](img/c5c3113c0233e765f6875c52296f229f_10_0.png)


    在以下示例中，输入和输出通过提示符（>>> 和 ...）的存在与否来区分：要重复示例，必须在提示符出现时输入提示符后的所有内容。


    ### 1.6.4 通过脚本运行 Python


    **步骤 1：** 要使用脚本运行 Python，首先创建一个文本文件并将其重命名为 demo.py。


    ![](img/c5c3113c0233e765f6875c52296f229f_10_1.png)


    **步骤 2：** 然后用文本编辑器打开 demo.py，在文件中编写示例程序代码并保存文件。


    ![](img/c5c3113c0233e765f6875c52296f229f_11_0.png)


    **步骤 3：** 要运行该文件，请转到文件路径的命令提示符，输入 Python demo.py。


    ![](img/c5c3113c0233e765f6875c52296f229f_11_1.png)


    你的第一个程序正在成功运行。


    ### Python Shell 与 Python 脚本


    | Python Shell | Python 脚本 |

    | :--- | :--- |

    | 1. Python Shell 用于执行简单程序和调试一些复杂程序。 | 1. Python 脚本用于执行可能用于大规模应用的复杂且冗长的程序。 |


    ## 1.7 Python 注释


    可以使用注释来解释 Python 代码。使用注释可以使代码更具可读性。在测试代码时，可以使用注释来停止执行。注释以 # 开头，Python 会忽略它们：


    ### 单行注释


    ```

    #This is a comment

    print ("Hello, World!")

    ```


    Python 允许在行尾添加注释，忽略前面的文本。


    ```

    print ("Hello, World!") #This is a comment

    ```


    也可以使用注释来阻止 Python 执行代码，以及为代码提供解释：


    ```

    #cheering for friend

    print ("Cheers! friend")

    ```


    ### 输出屏幕：


    ![](img/c5c3113c0233e765f6875c52296f229f_12_0.png)


    ### 多行注释


    实际上，Python 中没有多行注释的语法。你可以使用 # 符号来表示多行注释。


    ### 示例：


    ```

    #commenthere

    #writtenin

    #multipleline

    print("Hello, World!")

    ```


    Python 不会使用未赋值给变量的字符串字面量，因此你可以在代码中添加一个多行字符串（使用三引号），并在其中编写注释：


    示例：


    ```

    """

    multi

    line

    comment

    """

    print("Hey, there!")

    ```


    输出屏幕：


    ![](img/c5c3113c0233e765f6875c52296f229f_13_0.png)


    ### 在 Python 中读取输入


    在 Python 中，我们使用 `input()` 函数读取用户输入。通常，`input` 函数以字符串格式接受用户给出的所有输入。如果我们想接受用户的整数值，则必须进行类型转换，我们将在下一节中学习。


    示例：


    ```

    >>> a = input ("Enter your message")

    ```


    输出：


    Enter your message: Good morning

    Good morning


    ## 1.8 在 Python 中打印输出


    在 Python 中，我们可以通过三种方式打印输出：


    1. 打印语句。

    2. 打印变量。

    3. 同时打印语句和变量。


    **示例 1：**

    打印语句。


    ```

    >>> print("hello") #printing statements

    ```


    **输出：** hello


    **示例 2：**

    打印变量。


    ```

    >>> wish = "Good morning" #printing variables

    >>> print(wish) #printing variables

    ```


    **输出：**

    Good morning


    **示例 3：**


    ```

    >>> print ("hello", wish) #printing variables and statements together

    ```


    **输出：**

    Hello Good morning


    ## 1.9 Python 中的标识符


    Python 标识符是用于标识变量、函数、类、模块或其他对象的名称。标识符以字母 A 到 Z 或 a 到 z 或下划线 (_) 开头，后跟零个或多个字母、下划线和数字
    (0 到 9)。


    - Python 不允许在标识符中使用标点字符，如 @、$ 和 %。

    - Python 是一种区分大小写的编程语言。

    - 因此，Manpower 和 manpower 在 Python 中是两个不同的标识符。


    **声明 Python 标识符的规则？**


    - Python 允许在标识符名称中使用下划线 (_)、小写字母 (a-z)、大写字母 (A-Z) 和数字 (0-9)。

    - 名称必须以非数字字符开头。

    - 标识符名称中不能只包含数字。

    - 与大多数其他语言一样，Python 中的标识符名称区分大小写。（''Ash'' 和 ''ASH'' 不是同一回事。）

    - 如果用户以开头下划线命名标识符，不会显示错误。

    - 尽管 PEP-8 标准规则建议将行长度保持在 79 个字符以内，但标识符名称可以是任意长度。

    - 关键字和标识符的名称不应重合。（用户可以通过输入 `help()` 后跟 "keywords" 来查看 Python 中所有关键字的列表，以避免问题。）

    - 不需要前导双下划线 ($)。


    以下是正确命名标识符的示例：


    ```

    >>> My_language = "Python"

    >>> myName = "xyz"

    >>> __username__ = "abc12"

    ```


    以下是错误命名标识符的示例：


    ```

    >>> 7hello = "hello"

    >>> @hello = "hello"

    >>> __user@7= "abc12"

    ```


    ## 1.10 Python 中的关键字


    关键字是 Python 中预定义和保留的单词，具有特殊含义。关键字不能用作变量名、函数名或任何其他标识符。它们用于定义代码的语法。


    - 在 Python 中，关键字区分大小写。例如：True 和 true 在 Python 中是两个不同的词。

    - 在 Python 中，所有关键字都是小写的，除了 True、False 和 None。


    ### 1.10.1 Python 中所有关键字的列表：


    | And | Exec | Not |

    | :--- | :--- | :--- |

    | Assert | Finally | Or |

    | Break | For | Pass |

    | Class | From | Print |

    | Continue | Global | Raise |

    | Def | If | Return |

    | Del | Import | Try |'
