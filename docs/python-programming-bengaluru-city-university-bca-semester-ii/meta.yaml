    Output:


    ![](img/c5c3113c0233e765f6875c52296f229f_141_0.png)


    # 11.3 Two Dimensional Random Walk


    The random walk in two dimensions operates on the exact same principle as in one.
    The object can now travel in additional directions besides only up and down. It
    can also shift to the left or right as an alternative.


    You are no longer plotting against time in the 2D scenario. Instead, by adding
    the x, y coordinate pairs to the graph, it is feasible to see the walk. This displays
    the object''s n-step, 2D route.


    Example:


    ```

    import numpy as np

    import matplotlib.pyplot as plt

    import random

    ```'
