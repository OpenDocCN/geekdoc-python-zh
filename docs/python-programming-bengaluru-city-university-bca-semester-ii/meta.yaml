- md: "## 13.5 Flask Debug Mode\n\nThe Flask class's `run()` method finally launches\
    \ the app on the local development server.\n`app.run(host, port, debug, options)`\
    \ (host, port, debug, options).\n\n**Parameters & Description**\n\n1.  **Host**\n\
    \    Hostname to listen on. Defaults to 127.0.0.1 (localhost). Set to '0.0.0.0'\
    \ to have server available externally.\n2.  **Port**\n    Defaults to 5000.\n\
    3.  **Debug**\n    Defaults to false. If set to true, provides a debug information.\n\
    4.  **Options**\n    To be forwarded to underlying Werkzeug server.\n\n**Output:**\n\
    \nNow execute the python script file in python shell by using command:\n`Python\
    \ Hello.py`\n\n```\nE:\\python>practice-1.py\n* Servicing Flask app 'practice-1'\n\
    * Debug mode: off\nWARNING: This is a development server. Do not use it in a production\
    \ deployment.\n* Running on http://127.0.0.1:5000\nPress CTRL+C to quit\n```\n\
    \nNow run localhost:5000 on browser.\n\n**Output:**\n\n![](img/c5c3113c0233e765f6875c52296f229f_153_0.png)\n\
    \nHello World\n\nBy using the `run()` method, one can launch a Flask application.\
    \ In contrast, the application should be manually restarted for each change made\
    \ to the code while it is being developed. Turn on debug support to avoid this\
    \ annoyance. In case the code is altered, the server will then reload itself.\
    \ To track any application errors, it will also offer a helpful debugger.\n\n\
    Setting the application object's debug property to True before launching it or\
    \ passing the debug parameter to the `run()` method turns on the Debug mode.\n\
    \n```python\napp.debug = True\napp.run()\napp.run(debug = True)\n```\n\n## 13.6\
    \ Flask Routing\n\nThe routing technique is used by contemporary web frameworks\
    \ to aid users in remembering application URLs. It is advantageous to bypass the\
    \ home page and go directly to the desired page.\n\nExample:\n\n```python\nfrom\
    \ flask import Flask\napp = Flask(__name__)\n@app.route('/')\ndef hello_world():\n\
    \    return 'Hello World'\n@app.route('/python')\ndef hello_python():\n    return\
    \ 'Hello Python'\nif __name__ == '__main__':\n    app.run(debug=True)\n```\n\n\
    Output:\n\n![](img/c5c3113c0233e765f6875c52296f229f_155_0.png)\n\nThe function\
    \ `hello_python()` is where the URL rule \"/python\" is bound. As a result, when\
    \ a user accesses the URL http://localhost:5000/python, the browser will display\
    \ the output of the `hello_python()` function.\n\n### 13.6 Passing a Variable\n\
    \nBy including movable components in the rule argument, a URL can be created dynamically.\
    \ This component's variable-name attribute is marked. It is sent as a keyword\
    \ argument to the function that is connected to the rule.\n\nThe `route()` decorator's\
    \ rule parameter in the example below has a `<name>` variable portion tied to\
    \ the URL \"/hello.\" So, if the URL http://localhost:5000/kiran is typed into\
    \ the browser, the argument \"Kiran\" will be passed to the `hello_name()` function.\n\
    \nExample:\n\n```python\nfrom flask import Flask\napp = Flask(__name__)\n@app.route('/')\n\
    def hello_world():\n    return 'Hello World'\n@app.route('/python')\ndef hello_python():\n\
    \    return 'Hello Python'\n@app.route('/<name>')\ndef hello_name(name):\n   \
    \ return 'Hello %s!' % name\nif __name__ == '__main__':\n    app.run(debug=True)\n\
    ```\n\nOutput:\n\n![](img/c5c3113c0233e765f6875c52296f229f_156_0.png)\n\n## 13.7\
    \ Redirecting Url\n\nFor dynamically creating a URL for a particular function,\
    \ the `url_for()` function is very helpful. The first argument to the function\
    \ is the name of the function, and it also takes one or more keyword arguments,\
    \ each of which corresponds to a variable in the URL.\n\nUse of the `url_for()`\
    \ function is demonstrated in the script below.\n\n```python\nfrom flask import\
    \ Flask, redirect, url_for\napp = Flask(__name__)\n@app.route('/admin')\ndef hello_admin():\n\
    \    return 'Hello Admin'\n@app.route('/guest/<guest>')\ndef hello_guest(guest):\n\
    \    return 'Hello %s as Guest' % guest\n@app.route('/user/<name>')\ndef hello_user(name):\n\
    \    if name =='admin':\n        return redirect(url_for('hello_admin'))\n   \
    \ else:\n        return redirect(url_for('hello_guest', guest = name))\n\nif __name__\
    \ == '__main__':\n    app.run(debug = True)\n```\n\nOutput:\n\n![](img/c5c3113c0233e765f6875c52296f229f_157_0.png)\n\
    \n## 13.8 Flask Templates\n\nThe output of a function that is linked to a specific\
    \ URL may be returned as HTML. For instance, the `hello()` function in the following\
    \ script will render \"Hello World\" with an attached `<h1>` tag.\n\nExample:\n\
    \n```python\nfrom flask import Flask, render_template\n\napp = Flask(__name__)\n\
    \n@app.route('/')\ndef index():\n    return render_template('hello.html')\n\n\
    if __name__ == '__main__':\n    app.run(debug = True)\n```\n\nFlask will try to\
    \ find the HTML file in the templates folder, in the same folder in which this\
    \ script is present.\n\n- Application folder\n  - Hello.py\n  - templates\n  \
    \  - hello.html\n\nThe phrase \"web templating system\" describes the process\
    \ of creating an HTML script that allows variable data to be dynamically entered.\
    \ A template engine, a particular type of data source, and a template processor\
    \ make up a web template system.\n\nJinja2 template engine is used by Flask. When\
    \ a web template is produced, placeholders for variables and expressions (in this\
    \ example, Python expressions) are substituted with their actual values.\n\nThe\
    \ file named `hello.html` in the templates folder contains the following code.\n\
    \n```html\n<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\"\
    >\n<meta http-equiv=\"X-UA-Compatible\" content=\"IE=edge\">\n<meta name=\"viewport\"\
    \ content=\"width=device-width, initial-scale=1.0\">\n<title>Document</title>\n\
    </head>\n<body>\n<h1>Hello World</h1>\n<p>This is render template example</p>\n\
    </body></html>\n```\n\n**Output:**\n\n![](img/c5c3113c0233e765f6875c52296f229f_158_0.png)\n\
    \n## 13.9 Flask http Methods\n\nThe World Wide Web's data communication is built\
    \ on the HTTP protocol. This protocol defines a variety of data retrieval techniques\
    \ from a given URL. The following table lists the various http methods:\n\n###\
    \ Methods & Description\n\n| Method | Description |\n| :--- | :--- |\n| **GET**\
    \ | Sends data in unencrypted form to the server. Most common method. |\n| **HEAD**\
    \ | Same as GET, but without response body. |\n| **POST** | Used to send HTML\
    \ form data to server. Data received by POST method is not cached by server. |\n\
    | **PUT** | Replaces all current representations of the target resource with the\
    \ uploaded content. |\n| **DELETE** | Removes all current representations of the\
    \ target resource given by a URL. |\n\nThe Flask route responds to GET requests\
    \ by default. However, this choice can be changed by giving the `route()` decorator\
    \ a methods parameter.\n\nLet's first develop an HTML form and use the POST method\
    \ to transmit form data to a URL in order to illustrate the use of the POST method\
    \ in URL routing.\n\nSave the script below as `login.html`.\n\n```html\n<html>\n\
    <body>\n<form action = \"http://localhost:5000/login\" method = \"post\">\n<p>Enter\
    \ Name:</p>\n<p><input type = \"text\" name = \"username\" /></p>\n<p>Enter Password:</p>\n\
    <p><input type = \"text\" name = \"password\" /></p>\n<p><input type = \"submit\"\
    \ value = \"submit\" /></p>\n</form>\n</body>\n</html>\n```\n\nNow let get the\
    \ login using python flask. Now enter the following code below in python shell.\n\
    \n```python\nfrom flask import Flask, redirect, url_for, request, render_template\n\
    app = Flask(__name__)\n@app.route('/')\ndef home():\n    return render_template('login.html')\n\
    \n@app.route('/success/<name>')\ndef success(name):\n    return 'welcome %s' %\
    \ name\n\n@app.route('/failed')\ndef failed():\n    return 'Login unsuccess'\n\
    \n@app.route('/login',methods = ['POST', 'GET'])\ndef login():\n    if request.method\
    \ == 'POST':\n        user = request.form['username']\n        pass1= request.form['password']\n\
    \        if user=='admin' and pass1=='admin':\n            return redirect(url_for('success',name\
    \ = user))\n        else:\n            return redirect(url_for('failed'))\n\n\
    if __name__ == '__main__':\n    app.run(debug = True)\n```\n\n**Output 1:** Wrong\
    \ credentials\n\n![](img/c5c3113c0233e765f6875c52296f229f_160_0.png)\n\nEnter\
    \ Name:\n\nabc\n\nEnter Password:\n\n123\n\nSubmit\n\n![](img/c5c3113c0233e765f6875c52296f229f_161_0.png)\n\
    \nLogin unsuccess\n\n**Output 2:** Correct Credentials\n\n![](img/c5c3113c0233e765f6875c52296f229f_161_1.png)\n\
    \nEnter Name:\n\nadmin\n\nEnter Password:\n\nadmin\n\nSubmit\n\n![](img/c5c3113c0233e765f6875c52296f229f_161_2.png)\n\
    \nwelcome admin"
  mdcn: "## 13.5 Flask 调试模式\n\nFlask 类的 `run()` 方法最终在本地开发服务器上启动应用。\n`app.run(host,\
    \ port, debug, options)` (host, port, debug, options)。\n\n**参数与描述**\n\n1.  **Host**\n\
    \    要监听的主机名。默认为 127.0.0.1（本地主机）。设置为 '0.0.0.0' 可使服务器对外可用。\n2.  **Port**\n    默认为\
    \ 5000。\n3.  **Debug**\n    默认为 false。如果设置为 true，则提供调试信息。\n4.  **Options**\n \
    \   要转发给底层 Werkzeug 服务器的选项。\n\n**输出：**\n\n现在使用以下命令在 Python shell 中执行 Python 脚本文件：\n\
    `Python Hello.py`\n\n```\nE:\\python>practice-1.py\n* Servicing Flask app 'practice-1'\n\
    * Debug mode: off\nWARNING: This is a development server. Do not use it in a production\
    \ deployment.\n* Running on http://127.0.0.1:5000\nPress CTRL+C to quit\n```\n\
    \n现在在浏览器中运行 localhost:5000。\n\n**输出：**\n\n![](img/c5c3113c0233e765f6875c52296f229f_153_0.png)\n\
    \nHello World\n\n通过使用 `run()` 方法，可以启动 Flask 应用。相比之下，在开发过程中，每次对代码进行更改时，都需要手动重启应用。开启调试支持可以避免这种麻烦。如果代码被修改，服务器将自动重新加载。为了跟踪任何应用错误，它还会提供一个有用的调试器。\n\
    \n在启动应用之前将应用对象的 debug 属性设置为 True，或者将 debug 参数传递给 `run()` 方法，即可开启调试模式。\n\n```python\n\
    app.debug = True\napp.run()\napp.run(debug = True)\n```\n\n## 13.6 Flask 路由\n\n\
    现代 Web 框架使用路由技术来帮助用户记住应用 URL。绕过主页直接访问所需页面是有利的。\n\n示例：\n\n```python\nfrom flask\
    \ import Flask\napp = Flask(__name__)\n@app.route('/')\ndef hello_world():\n \
    \   return 'Hello World'\n@app.route('/python')\ndef hello_python():\n    return\
    \ 'Hello Python'\nif __name__ == '__main__':\n    app.run(debug=True)\n```\n\n\
    输出：\n\n![](img/c5c3113c0233e765f6875c52296f229f_155_0.png)\n\n函数 `hello_python()`\
    \ 绑定了 URL 规则 \"/python\"。因此，当用户访问 URL http://localhost:5000/python 时，浏览器将显示 `hello_python()`\
    \ 函数的输出。\n\n### 13.6 传递变量\n\n通过在规则参数中包含可移动组件，可以动态创建 URL。该组件的变量名属性被标记。它作为关键字参数传递给与该规则关联的函数。\n\
    \n在下面的示例中，`route()` 装饰器的 rule 参数有一个 `<name>` 变量部分绑定到 URL \"/hello\"。因此，如果在浏览器中输入\
    \ URL http://localhost:5000/kiran，参数 \"Kiran\" 将被传递给 `hello_name()` 函数。\n\n示例：\n\
    \n```python\nfrom flask import Flask\napp = Flask(__name__)\n@app.route('/')\n\
    def hello_world():\n    return 'Hello World'\n@app.route('/python')\ndef hello_python():\n\
    \    return 'Hello Python'\n@app.route('/<name>')\ndef hello_name(name):\n   \
    \ return 'Hello %s!' % name\nif __name__ == '__main__':\n    app.run(debug=True)\n\
    ```\n\n输出：\n\n![](img/c5c3113c0233e765f6875c52296f229f_156_0.png)\n\n## 13.7 重定向\
    \ URL\n\n`url_for()` 函数对于为特定函数动态创建 URL 非常有用。该函数的第一个参数是函数名，它还接受一个或多个关键字参数，每个参数对应\
    \ URL 中的一个变量。\n\n下面的脚本演示了 `url_for()` 函数的使用。\n\n```python\nfrom flask import Flask,\
    \ redirect, url_for\napp = Flask(__name__)\n@app.route('/admin')\ndef hello_admin():\n\
    \    return 'Hello Admin'\n@app.route('/guest/<guest>')\ndef hello_guest(guest):\n\
    \    return 'Hello %s as Guest' % guest\n@app.route('/user/<name>')\ndef hello_user(name):\n\
    \    if name =='admin':\n        return redirect(url_for('hello_admin'))\n   \
    \ else:\n        return redirect(url_for('hello_guest', guest = name))\n\nif __name__\
    \ == '__main__':\n    app.run(debug = True)\n```\n\n输出：\n\n![](img/c5c3113c0233e765f6875c52296f229f_157_0.png)\n\
    \n## 13.8 Flask 模板\n\n与特定 URL 关联的函数的输出可以作为 HTML 返回。例如，下面脚本中的 `hello()` 函数将渲染带有\
    \ `<h1>` 标签的 \"Hello World\"。\n\n示例：\n\n```python\nfrom flask import Flask, render_template\n\
    \napp = Flask(__name__)\n\n@app.route('/')\ndef index():\n    return render_template('hello.html')\n\
    \nif __name__ == '__main__':\n    app.run(debug = True)\n```\n\nFlask 将尝试在与该脚本所在文件夹相同的\
    \ templates 文件夹中查找 HTML 文件。\n\n- 应用文件夹\n  - Hello.py\n  - templates\n    - hello.html\n\
    \n\"Web 模板系统\" 这个短语描述了创建允许动态输入变量数据的 HTML 脚本的过程。Web 模板系统由模板引擎、特定类型的数据源和模板处理器组成。\n\
    \nFlask 使用 Jinja2 模板引擎。当生成 Web 模板时，变量和表达式（在此示例中为 Python 表达式）的占位符将被其实际值替换。\n\n\
    templates 文件夹中名为 `hello.html` 的文件包含以下代码。\n\n```html\n<!DOCTYPE html>\n<html lang=\"\
    en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta http-equiv=\"X-UA-Compatible\"\
    \ content=\"IE=edge\">\n<meta name=\"viewport\" content=\"width=device-width,\
    \ initial-scale=1.0\">\n<title>Document</title>\n</head>\n<body>\n<h1>Hello World</h1>\n\
    <p>This is render template example</p>\n</body></html>\n```\n\n**输出：**\n\n![](img/c5c3113c0233e765f6875c52296f229f_158_0.png)\n\
    \n## 13.9 Flask HTTP 方法\n\n万维网的数据通信建立在 HTTP 协议之上。该协议定义了从给定 URL 检索数据的各种技术。下表列出了各种\
    \ HTTP 方法：\n\n### 方法与描述\n\n| 方法 | 描述 |\n| :--- | :--- |\n| **GET** | 以未加密形式向服务器发送数据。最常用的方法。\
    \ |\n| **HEAD** | 与 GET 相同，但没有响应体。 |\n| **POST** | 用于将 HTML 表单数据发送到服务器。POST 方法接收的数据不会被服务器缓存。\
    \ |\n| **PUT** | 用上传的内容替换目标资源的所有当前表示。 |\n| **DELETE** | 删除由 URL 给出的目标资源的所有当前表示。\
    \ |\n\nFlask 路由默认响应 GET 请求。但是，可以通过为 `route()` 装饰器提供 methods 参数来更改此选择。\n\n为了说明\
    \ POST 方法在 URL 路由中的使用，我们首先开发一个 HTML 表单，并使用 POST 方法将表单数据传输到 URL。\n\n将下面的脚本保存为 `login.html`。\n\
    \n```html\n<html>\n<body>\n<form action = \"http://localhost:5000/login\" method\
    \ = \"post\">\n<p>Enter Name:</p>\n<p><input type = \"text\" name = \"username\"\
    \ /></p>\n<p>Enter Password:</p>\n<p><input type = \"text\" name = \"password\"\
    \ /></p>\n<p><input type = \"submit\" value = \"submit\" /></p>\n</form>\n</body>\n\
    </html>\n```\n\n现在让我们使用 Python Flask 获取登录。现在在 Python shell 中输入以下代码。\n\n```python\n\
    from flask import Flask, redirect, url_for, request, render_template\napp = Flask(__name__)\n\
    @app.route('/')\ndef home():\n    return render_template('login.html')\n\n@app.route('/success/<name>')\n\
    def success(name):\n    return 'welcome %s' % name\n\n@app.route('/failed')\n\
    def failed():\n    return 'Login unsuccess'\n\n@app.route('/login',methods = ['POST',\
    \ 'GET'])\ndef login():\n    if request.method == 'POST':\n        user = request.form['username']\n\
    \        pass1= request.form['password']\n        if user=='admin' and pass1=='admin':\n\
    \            return redirect(url_for('success',name = user))\n        else:\n\
    \            return redirect(url_for('failed'))\n\nif __name__ == '__main__':\n\
    \    app.run(debug = True)\n```\n\n**输出 1：** 凭据错误\n\n![](img/c5c3113c0233e765f6875c52296f229f_160_0.png)\n\
    \nEnter Name:\n\nabc\n\nEnter Password:\n\n123\n\nSubmit\n\n![](img/c5c3113c0233e765f6875c52296f229f_161_0.png)\n\
    \nLogin unsuccess\n\n**输出 2：** 凭据正确\n\n![](img/c5c3113c0233e765f6875c52296f229f_161_1.png)\n\
    \nEnter Name:\n\nadmin\n\nEnter Password:\n\nadmin\n\nSubmit\n\n![](img/c5c3113c0233e765f6875c52296f229f_161_2.png)\n\
    \nwelcome admin"
