    \ 'age': 27, 'address': 'Downtown'}\n```\n\n## 6.4 字典方法\n\n下表列出了可用于字典的方法。其中一些方法已在上面的示例中使用过。\n\
    \n| 方法 | 描述 |\n|---|---|\n| clear() | 从字典中移除所有项。 |\n| copy() | 返回字典的浅拷贝。 |\n|\
    \ fromkeys(seq[, v]) | 返回一个新字典，其键来自 `seq`，值等于 `v`（默认为 `None`）。 |\n| get(key[,d])\
    \ | 返回键的值。如果键不存在，返回 `d`（默认为 `None`）。 |\n| items() | 返回一个包含字典项（键，值）格式的新对象。 |\n\
    | keys() | 返回字典键的新对象。 |\n| pop(key[,d]) | 移除指定键的项并返回其值，如果未找到键则返回 `d`。如果未提供 `d`\
    \ 且未找到键，则引发 `KeyError`。 |\n| popitem() | 移除并返回一个任意项（键，值）。如果字典为空，则引发 `KeyError`。\
    \ |\n| setdefault(key[,d]) | 如果键在字典中，则返回相应的值。如果不在，则插入值为 `d` 的键并返回 `d`（默认为 `None`）。\
    \ |\n| update([other]) | 用 `other` 中的键/值对更新字典，覆盖现有键。 |\n| values() | 返回字典值的新对象。\
    \ |\n\n### Clear()\n\n此方法用于移除/清空字典中的每个元素。\n例如：\n\n```\n>>>car = {\"brand\": \"\
    Ford\",\n\"model\": \"Mustang\",\n\"year\": 1964}\n>>>car.clear()\n>>>print(car)\n\
    ```\n\n输出：\n\n```\nE:\\python>practice-1.py\n{ }\n```\n\n### Copy()\n\n使用此方法，可以将一个字典的键和值复制到另一个字典中。\n\
