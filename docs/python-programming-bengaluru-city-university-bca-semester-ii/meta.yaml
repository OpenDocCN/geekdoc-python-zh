  md: '# 3.5 Lambda Function


    A lambda function in Python is a unique class of function that doesn''t have a
    function name. For instance,


    ```

    lambda: print(''Hello World'')

    ```


    To create a lambda function, we substitute the lambda keyword for the def keyword.
    The lambda function declaration syntax is as follows:


    ```

    lambda argument(s): expression

    ```


    Here,


    +   - argument(s) - any value passed to the lambda function

    - expression - expression is executed and returned


    Let''s see an example,


    ```

    greet = lambda: print(''Hello World'')

    ```


    Here, a lambda function has been created and assigned to the greet variable. This
    lambda function must be called in order to be used. To invoke the lambda function
    is shown below:


    ```

    greet ()

    ```


    ```

    E:\python>practice-1.py

    Hello World

    ```


