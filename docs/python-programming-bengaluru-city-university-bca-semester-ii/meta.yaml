  md: '# 8.9 Catching Exception in Python


    A try statement in Python can be used to manage exceptions.


    The try clause contains the crucial operation that can cause an exception. The
    except clause contains the code that manages exceptions.


    Thus, once we have identified the exception, we may decide what actions to take.
    Here is an easy illustration.


    ```

    >>># import module sys to get the type of exception

    >>>import sys

    >>>randomList = [''a'', 0, 2]

    >>>for entry in randomList:

    >>>    try:

    >>>        print("The entry is", entry)

    >>>        r = 1/int(entry)

    >>>        break

    >>>    except:

    >>>        print("Oops!", sys.exc_info()[0], "occurred.")

    >>>        print("Next entry.")

    >>>        print()

    >>>print("The reciprocal of", entry, "is", r)

    ```


    The randomList list''s values are iterated over in this application. The try block
    contains the code that, as already established, has the potential to raise an
    exception.


    If there is no exception, the except block is bypassed, and normal operation proceeds
    (for last value). But if an exception arises, the except block handles it (first
    and second values).


    Using the exc info() method in the sys module, we print the exception''s name
    here. We can see that 0 results in Zero Division Error and that a causes Value
    Error.


    # 8.10 Python: Catching Particular Exceptions


    The except clause in the example above did not contain any specific exceptions.


    This will catch all exceptions and treat every case uniformly, hence it is not
    a good programming approach. It is possible to specify the exceptions that an
    except clause should cover.'
