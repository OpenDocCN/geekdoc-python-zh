  md: '# 9.8 Inheritance


    We can define a class that includes all the methods and properties of another
    class thanks to inheritance. The class that is being inherited from is referred
    to as the parent class or base class. The term “child class,” sometimes known
    as “derived class,” refers to a class that inherits from another class.


    # Create a Parent Class


    The syntax is the same as creating any other class because any class can be a
    parent class:


    Example


    ```

    >>>class Person:

    >>>    def __init__(self,fname,lname):

    >>>        self.firstname=fname

    >>>        self.lastname=lname


    >>>    def printname(self):

    >>>        print(self.firstname, self.lastname)


    #Use the Person class to create an object, and then execute the

    printname method:

    >>>x=Person("John", "Doe")

    >>>x.printname()

    ```


    # Create a Child Class


    Adding the parent class as a parameter while developing the child class will allow
    you to design a class that inherits its functionality:


    The child class we have so far developed inherits the parent class’s properties
    and functions.


    We wish to give the child class the __init__() function (instead of the pass keyword).


    +   - Every time the class is used to create a new object, the __init__() function
    is invoked automatically.

    - The __init__() function that you add will prevent the child class from continuing
    to use the parent’s __init__() function.

    - The __init__() function of a child overrides any inheritance from its parent.


    Example:


    ```

    >>>class Person:

    ```'
