    # 9.7 Abstraction


    In Python, abstraction is the practice of managing complexity by concealing extra
    information from the user. One of the fundamental ideas of object-oriented programming
    (OOP) languages is this. That makes it possible for the user to add even more
    intricate logic on top of the abstraction already present without having to comprehend
    or even consider all the hidden background or back-end complexity.


    That is a very broad core subject that is not just applicable to object-oriented
    programming. Everywhere in the real world or in our surroundings, you can see
    it.


