    ## 前言


    本书的编写基于读者具备一定编程基础知识的假设。本书是根据班加罗尔城市大学 BCA 课程第三学期的国家教育政策 [NEP] 教学大纲编写的。


    本书编排非常系统。书中包含大量编程示例、语法结构和 Python 编程的理论知识。本书易于理解。从基础到高级主题的所有内容均已涵盖，学生将从中受益匪浅。


    本书的主要特点包括：


    -   完全涵盖 Python NEP 教学大纲的所有主题

    -   包含多个示例和图表

    -   对编程概念进行简洁明了的解释


    本书对班加罗尔城市大学（第三学期 NEP 教学大纲）的 BCA 学生极为有用。


    Hanumanthappa M 博士

    Veena R

    Lohith Kumar G


    ## 教学大纲


    ### 第一单元 [12 小时]


    **Python 编程语言部分：** Python 解释器/Shell，标识符，关键字，语句和表达式，变量，运算符，优先级和结合性，数据类型，缩进，注释，读取输入，打印输出，类型转换，type()
    函数和 Is 运算符，动态和强类型语言。


    **控制流语句：** if 决策控制流语句，if…else 决策控制流语句，if…elif…else 决策控制语句，嵌套 if 语句，while 循环，for
    循环，continue 和 break 语句。


    **函数：** 内置函数，常用模块，函数定义和调用函数，return 语句和 void 函数，变量的作用域和生命周期，默认参数，命令行参数。


    **字符串：** 创建和存储字符串，基本字符串操作，通过索引号访问字符串中的字符，字符串切片和连接，字符串方法。


    ### 第二单元 [12 小时]


    **列表：** 创建列表，基本列表操作，列表中的索引和切片，列表使用的内置函数，列表方法，del 语句。


    **字典：** 创建字典，访问和修改字典中的键值对，字典使用的内置函数，字典方法，del 语句。


    **元组和集合：** 创建元组，基本元组操作，元组中的索引和切片，元组使用的内置函数，元组和列表之间的关系，元组和字典之间的关系，元组方法，使用 zip()
    函数，集合，集合方法，frozenset。


    ### 第三单元 [12 小时]


    **文件：** 文件类型，创建和读取文本数据，用于读写数据的文件方法，读写二进制文件，Pickle 模块，读写 CSV 文件。


    **面向对象编程：** 类和对象，在 Python 中创建类，在 Python 中创建对象，构造函数方法，具有多个对象的类，类属性与数据属性，封装，继承，多态。


    ### 第四单元 [12 小时]


    **数据可视化：** 生成数据-安装 Matplotlib，绘制简单折线图，随机游走，使用 Plotly 掷骰子。下载数据- CSV 文件格式，映射全球数据集：JSON
    格式，使用 API：使用 Web API，使用 Plotly 可视化仓库。


