    Number of vowels in string is 4\n\n## 程序 4：计算字符串长度的程序\n\n```\n>>>mystr = input(\"\
    Enter the string\")\n>>>count=0\n>>>for i in mystr:\n>>>    count=count+1\n>>>print(\"\
    Length of the string is\", count)\n```\n\n**输出：**\nEnter the stringgood morning\n\
    Length of the string is 12\n\n## 2. While 循环\n\n在 Python 中，while 循环语句在特定条件为真时重复执行一段代码块。在\
    \ while 循环中，每次循环开始时都会检查条件，如果条件为真，则执行循环体。当条件变为 False 时，控制器退出该代码块。\n\n**语法：**\n\
    While(condition):\nStatements\n\n```\n>>> num = 1\n>>> while (num <= 5):\n>>>\
    \     print(num)\n>>>     num = num + 1\n```\n\n输出：\n\n```\nC:\\Users\\CSC\\Pictures\\\
    python>python demo.py\n1\n2\n3\n4\n5\n```\n\n## 跳转语句\n\n在 Python 中，跳转语句用于以特定方式改变程序的执行流程。\n\
    \n为此，我们使用两种类型的跳转语句。\n\n- 1. break 语句\n- 2. continue 语句\n\nbreak 语句用于在循环内部退出循环。当我们希望在条件满足时立即终止循环，而不是执行剩余的迭代时，它非常有用。它减少了执行时间。每当控制器遇到\
    \ break 语句时，它会立即退出该循环。\n\n让我们看看当找到一个大于 5 的数字时如何中断 for 循环。\n\n```\n>>> for num\
    \ in range (10):\n>>>     if num > 5:\n>>>         print(\"stop\")\n>>>      \
    \   break\n>>>     print(num)\n```\n\n输出：\n\n```\nC:\\Users\\CSC\\Pictures\\python>python\
    \ demo.py\n0\n1\n2\n3\n4\n5\nstop\n```\n\ncontinue 语句用于跳过当前迭代，并继续下一次迭代。\n\n让我们看看如果数字是\
    \ 5，如何跳过 for 循环的迭代，并继续执行循环体中的其他数字。\n\n**示例：**\n\n```\n>>> for i in range (3,8):\n\
    >>>     if num == 5:\n>>>         continue\n>>>     else:\n>>>         print(num)\n\
    ```\n\n**输出：**\n\n```\nC:\\Users\\CSC\\Pictures\\python>python demo.py\n3\n4\n\
    6\n7\n```\n\n## 复习题\n\n- 1. Python 中的运算符是什么？\n- 2. 举例解释不同类型的运算符。\n- 3. = 和 ==\
    \ 运算符的区别。\n- 4. 哪个运算符用于检查字符是否存在于字符串中？\n- 5. 解释 is 运算符的用法。\n- 6. 举例解释运算符优先级。\n\
    - 7. 解释 Python 中的缩进。\n- 8. 什么是控制语句以及控制语句的类型？\n- 9. 什么是条件语句？举例解释其类型。\n- 10. 什么是迭代语句？举例解释其类型。\n\
    - 11. 举例解释“使用 range 的 for 循环”和“使用数据的 for 循环”之间的区别。\n- 12. 什么是跳转语句？\n- 13. 举例解释\
    \ break 和 continue。\n- 14. 解释 for 循环中 range 函数的参数。\n- 15. 举例解释 while 循环。"
