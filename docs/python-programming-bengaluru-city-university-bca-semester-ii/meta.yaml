    \ 3. any()\n\n检查列表中的任何项目是否为 True。\n\n语法：`any(iterable)`\n\n其中，`iterable` 是一个对象（列表、元组、字典）。\n\
    \n示例：\n```python\nmytuple = (0, 1, False)\nx = any(mytuple)\nprint(x)\n```\n输出：\n\
    ```\nTrue\n```\n\n## 4. bin()\n\n返回指定数字的二进制版本。\n\n语法：`bin(n)`\n\n其中，`n` 是必需的整数。\n\
