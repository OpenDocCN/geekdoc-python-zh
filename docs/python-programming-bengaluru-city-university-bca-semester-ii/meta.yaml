- md: "## 9.8 Inheritance\n\nWe can define a class that includes all the methods and\
    \ properties of another class thanks to inheritance. The class that is being inherited\
    \ from is referred to as the parent class or base class. The term “child class,”\
    \ sometimes known as “derived class,” refers to a class that inherits from another\
    \ class.\n\n## Create a Parent Class\n\nThe syntax is the same as creating any\
    \ other class because any class can be a parent class:\n\nExample\n\n```python\n\
    class Person:\n    def __init__(self, fname, lname):\n        self.firstname =\
    \ fname\n        self.lastname = lname\n\n    def printname(self):\n        print(self.firstname,\
    \ self.lastname)\n\n# Use the Person class to create an object, and then execute\
    \ the\n# printname method:\nx = Person(\"John\", \"Doe\")\nx.printname()\n```\n\
    \n## Create a Child Class\n\nAdding the parent class as a parameter while developing\
    \ the child class will allow you to design a class that inherits its functionality:\n\
    \nThe child class we have so far developed inherits the parent class’s properties\
    \ and functions.\n\nWe wish to give the child class the `__init__()` function\
    \ (instead of the `pass` keyword).\n\n- Every time the class is used to create\
    \ a new object, the `__init__()` function is invoked automatically.\n- The `__init__()`\
    \ function that you add will prevent the child class from continuing to use the\
    \ parent’s `__init__()` function.\n- The `__init__()` function of a child overrides\
    \ any inheritance from its parent.\n\nExample:\n\n```python\nclass Person:\n \
    \   def __init__(self, name1, name2, name3):\n        self.first_name = name1\n\
    \        self.second_name = name2\n        self.third_name = name3\n    def printname(self):\n\
    \        print(self.first_name, self.second_name, self.third_name)\n\nclass Student(Person):\n\
    \    pass\n\nx = Student(\"kaushik\", \"akash\", \"varun\")\nx.printname()\n```\n\
    \n## Types of inheritance\n\nTypes of Inheritance depend upon the number of child\
    \ and parent classes involved.\n\nThere are four types of inheritance in Python:\n\
    \n1. **Single Inheritance**: Single inheritance allows for the inheritance of\
    \ properties from a single parent class by a derived class, allowing for the reuse\
    \ of existing code and the inclusion of new features.\n\n![](img/c5c3113c0233e765f6875c52296f229f_109_0.png)\n\
    \nExample:\n\n```python\nclass Parent:\n    def func1(self):\n        print(\"\
    This function is in parent class.\")\n\nclass Child(Parent):\n    def func2(self):\n\
    \        print(\"This function is in child class.\")\n\nobject = Child()\nobject.func1()\n\
    object.func2()\n```\n\n2. **Multiple Inheritance:** Multiple inheritances refer\
    \ to a type of inheritance where a class can originate from multiple base classes.\
    \ All of the base classes' features are passed down to the derived class in multiple\
    \ inheritances.\n\n![](img/c5c3113c0233e765f6875c52296f229f_110_0.png)\n\nExample:\n\
    \n```python\nclass Mother:\n    mothername = \"\"\n    def mother(self):\n   \
    \     print(self.mothername)\n\nclass Father:\n    fathername = \"\"\n    def\
    \ father(self):\n        print(self.fathername)\n\nclass Son(Mother, Father):\n\
    \    def parents(self):\n        print(\"Father :\", self.fathername)\n      \
    \  print(\"Mother :\", self.mothername)\n\ns1 = Son()\ns1.fathername = \"RAM\"\
    \ns1.mothername = \"SITA\"\ns1.parents()\n```\n\n3. **Multilevel Inheritance:**\
    \ Features from the base class and the derived class are further inherited into\
    \ the new derived class in multilevel inheritance. This is comparable to a relationship\
    \ between a grandfather and a grandchild.\n\n![](img/c5c3113c0233e765f6875c52296f229f_111_0.png)\n\
    \nExample:\n\n```python\nclass Grandfather:\n    def __init__(self, grandfathername):\n\
    \        self.grandfathername = grandfathername\n\nclass Father(Grandfather):\n\
    \    def __init__(self, fathername, grandfathername):\n        self.fathername\
    \ = fathername\n        Grandfather.__init__(self, grandfathername)\n\nclass Son(Father):\n\
    \    def __init__(self, sonname, fathername, grandfathername):\n        self.sonname\
    \ = sonname\n        Father.__init__(self, fathername, grandfathername)\n    def\
    \ print_name(self):\n        print('Grandfather name :', self.grandfathername)\n\
    \        print(\"Father name :\", self.fathername)\n        print(\"Son name :\"\
    , self.sonname)\n\ns1 = Son('Prince', 'Rampal', 'Lal mani')\nprint(s1.grandfathername)\n\
    s1.print_name()\n```\n\n4. **Hierarchical Inheritance:** Hierarchical inheritance\
    \ is the process of creating multiple derived classes from a single base class.\
    \ Two child (derived) classes and a parent (base) class are present in this software.\n\
    \n![](img/c5c3113c0233e765f6875c52296f229f_112_0.png)\n\nExample:\n\n```python\n\
    class Parent:\n    def func1(self):\n        print(\"This function is in parent\
    \ class.\")\n\nclass Child1(Parent):\n    def func2(self):\n        print(\"This\
    \ function is in child 1.\")\n\nclass Child2(Parent):\n    def func3(self):\n\
    \        print(\"This function is in child 2\")\n\nobject1 = Child1()\nobject2\
    \ = Child2()\nobject1.func1()\nobject1.func2()\nobject2.func1()\nobject2.func3()\n\
    ```\n\n5. **Hybrid Inheritance:** Hybrid inheritance is inheritance made up of\
    \ various inheritance types.\n\n![](img/c5c3113c0233e765f6875c52296f229f_113_0.png)\n\
    \nExample:\n\n```python\nclass School:\n    def func1(self):\n        print(\"\
    This function is in school.\")\n\nclass Student1(School):\n    def func2(self):\n\
    \        print(\"This function is in student 1. \")\n\nclass Student2(School):\n\
    \    def func3(self):\n        print(\"This function is in student 2.\")\n\nclass\
    \ Student3(Student1, School):\n    def func4(self):\n        print(\"This function\
    \ is in student 3.\")\n\nobject = Student3()\nobject.func1()\nobject.func2()\n\
    ```\n\n## REVIEW QUESTIONS\n\n1. What is an object?\n2. What is oop?\n3. What\
