  md: '# 1.11 Statements and Expressions in Python


    Statements in Python


    Statements are the instructions given to the python interpreter to execute.


    Example:


    ```

    >>> print ("Good morning")

    >>> print ("Hello, how are you?")

    ```


    Output:


    ```

    >>> print("Good morning")

    Good morning

    >>> print("Hello,how are you?")

    Hello,how are you?

    ```


    Expressions in Python


    Expressions are the combination of operators and operands which together produces
    some other value.


    Example:


    ```

    >>> sum = 25+50

    >>> print(sum)

    ```


    Output:


    ```

    >>> sum 25+50

    >>> print(sum)

    75

    ```


    # 1.12 Variables in Python


    What are variables?


    Variables are just designated memory spaces for storing values. This means that
    you set aside some memory when you create a variable. The interpreter allocates
    memory and determines what can be placed in the reserved memory based on the data
    type of a variable.


    As a result, you can store integers, decimals, or characters in variables by giving
    them alternative data types. Python variables do not require an explicit declaration
    to set aside memory. When you provide a variable a value, the declaration takes
    place automatically. In order to give variables values, use the equal sign (=).'
