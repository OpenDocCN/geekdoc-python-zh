    # 5.2 Accessing Tuple Elements


    Accessing a tuple''s elements is possible in a number of different ways.


    # Index Value


    A tuple item can be accessed by using the index operator []. Indexes begin at
    0 in Python. For example, an index of 0 to 4 will be used for a tuple of 5 elements.


    An IndexError will be raised if you attempt to access an index that is not one
    of these. You need an integer for the index. Other types, such as float, are not
    allowed; doing so will cause a TypeError.


    With nested indexing, nested tuples can be accessed.


    Example:


    ```

    >>>my_tup = (''p'', ''r'', ''o'', ''b'', ''e'')

    >>>print(my_tup[0])

    >>>print(my_tup[2])

    >>>print(my_tup[-1])

    >>>print(my_tup[2.0])

    ```'
