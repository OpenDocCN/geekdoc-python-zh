  mdcn: "## 第三章\n\n## PYTHON中的函数与字符串\n\nPython中的函数是一组执行特定活动的语句集合。函数有助于将我们的程序分割成易于管理的模块化部分。随着程序规模的不断扩大，它变得更加有条理和可控。它还使代码可重用，并防止重复。\n\
    \n## 3.1 定义函数\n\n语法：\n\n```\ndef func_name(parameters):\n    statements\n```\n\
    \n上面显示的函数定义包含以下元素。\n\n1.  函数头的第一个关键字是`def`。\n2.  函数的名称，用于唯一标识它。创建Python标识符的约定也适用于函数命名。\n\
    3.  我们向函数传递值的参数（实参）。它们不是必需的。\n4.  一个冒号（:）表示函数头的结束。\n5.  一个或多个有效的Python语句构成函数体。每个语句的缩进级别必须相同（通常是4个空格）。\n\
    6.  一个可选的`return`语句，允许函数返回一个值。\n\n示例：\n\n```\n>>>def greet(name):\n>>>    \"\"\
    \"\n>>>    This function greets to\n>>>    the person passed in as\n>>>    a parameter\n\
    >>>    \"\"\"\n>>>    print(\"Hello, \" + name + \". Good morning!\")\n```\n\n\
    ## 3.2 函数调用\n\n一旦函数被声明，就可以从另一个函数、程序甚至Python提示符调用它。我们只需要输入函数名和相关参数即可调用该函数。\n\n\
    语法：\nFunc_name(parameters)\n\n示例：\n>>>greet(\"abc\")\n\n输出：\n\n```\nE:\\python>practice-1.py\n\
    Hello, abc. Good morning!\n```\n\n示例2：\n>>> def addition(a,b):\n>>>     print(a+b)\n\
    >>> addition(20,30)\n\n输出：\n\n```\nC:\\Users\\CSC\\Pictures\\python>python demo.py\n\
    50\n```\n\n注意：在Python中调用函数之前，必须始终存在该函数的定义。否则，我们将遇到问题。例如，\n\n```\n# function call\n\
    greet('Paul')\n# function definition\ndef greet(name):\n    print(\"Hello, \"\
    \ + name + \". Good morning!\")\n# Error: name 'greet' is not defined\n```\n\n\
    **输出：**\n\n```\nE:\\python>practice-1.py\nTraceback (most recent call last):\n\
    \  File \"E:\\python\\practice-1.py\", line 2, in <module>\n    greet('Paul')\n\
    NameError: name 'greet' is not defined\n```\n\n![](img/c5c3113c0233e765f6875c52296f229f_43_0.png)\n\
    \n**函数的工作原理**\n\n## 3.3 带有return关键字的函数\n\n在函数中，当你想要返回一个值时，使用`return`关键字。让我们看看使用`return`的同一个例子。\n\
    \n**示例：**\n\n```\n>>> def addition(a,b):\n>>>     return a+b\n>>> print(addition(20,30))\n\
    ```\n\n**输出：**\n\n```\nC:\\Users\\CSC\\Pictures\\python>python demo.py\n50\n```\n\
    \n**注意：** 当我们在函数中使用`return`时，调用时必须打印该函数。\n\n## 程序5：编写一个函数执行以下操作\n\na. 加法 b. 减法\
    \ c. 乘法 d. 除法\n\na=20, b=10 >>> 输出：30 10 200 2\n\n## 3.4 局部作用域和全局作用域\n\n变量的作用域是指程序中使用该变量的区域。当在函数内部定义时，参数和变量对外部是隐藏的。因此，它们的作用域是局部的。\n\
    \n变量存储在内存中的时间被称为其生命周期。函数内部的变量仅在该函数执行期间有效。\n\n当我们从函数返回时，它们就被销毁了。因此，函数不会保留之前调用中变量的值。\n\
    \n下面是一个函数内变量作用域的示例。\n\n```\n>>>def my_func():\n>>>    x = 10\n>>>    print(\"\
    Value inside function:\",x)\n>>>x = 20\n>>>my_func()\n>>>print(\"Value outside\
    \ function:\",x)\n```\n\n输出：\n\n```\nE:\\python>practice-1.py\nValue inside function:\
    \ 10\nValue outside function: 20\n```\n\n如图所示，`x`的初始值为20。即使`x`被函数`my_func()`从0更改为10，这对函数外部的值也没有影响。\n\
    \n这是因为函数内部的变量`x`可以与外部变量（对函数而言是全局的）区分开来。它们是两个具有不同作用域的不同变量，尽管共享相同的名称。\n\n然而，函数内部的变量从外部是可见的。它们涵盖了整个世界。\n\
    \n从函数内部，我们可以读取这些值，但无法修改（写入）它们。如果要在函数外部更改变量的值，必须使用`global`关键字将变量声明为全局变量。\n\n##\
    \ 3.5 Lambda函数\n\nPython中的lambda函数是一种特殊的函数，没有函数名。例如，\n\n```\nlambda: print('Hello\
    \ World')\n```\n\n要创建lambda函数，我们用`lambda`关键字代替`def`关键字。lambda函数声明语法如下：\n\n```\n\
    lambda argument(s): expression\n```\n\n这里，\n\n-   `argument(s)` - 传递给lambda函数的任何值\n\
    -   `expression` - 执行并返回的表达式\n\n让我们看一个例子，\n\n```\ngreet = lambda: print('Hello\
    \ World')\n```\n\n这里，创建了一个lambda函数并赋值给`greet`变量。这个lambda函数必须被调用才能使用。调用lambda函数的方法如下所示：\n\
    \n```\ngreet ()\n```\n\n```\nE:\\python>practice-1.py\nHello World\n```\n\n##\
    \ 3.6 Python中的内置函数\n\n以下是Python中所有可用的函数：\n\n| 函数 | 描述 |\n| --- | --- |\n| abs()\
    \ | 返回数字的绝对值 |\n| all() | 如果可迭代对象中的所有项都为真，则返回True |\n| any() | 如果可迭代对象中的任何项为真，则返回True\
    \ |\n| ascii() | 返回对象的可读版本。将非ASCII字符替换为转义字符 |\n| bin() | 返回数字的二进制版本 |\n| bool()\
    \ | 返回指定对象的布尔值 |\n| bytearray() | 返回一个字节数组 |\n| bytes() | 返回一个字节对象 |\n| callable()\
    \ | 如果指定对象是可调用的，则返回True，否则返回False |\n| chr() | 返回指定Unicode代码对应的字符 |\n| classmethod()\
    \ | 将方法转换为类方法 |\n| compile() | 将指定源代码编译为对象，准备执行 |\n| complex() | 返回一个复数 |\n| delattr()\
    \ | 从指定对象中删除指定属性（属性或方法） |\n| dict() | 返回一个字典（数组） |\n| dir() | 返回指定对象的属性和方法列表 |\n\
    | divmod() | 返回参数1除以参数2的商和余数 |\n| enumerate() | 接受一个集合（例如元组）并将其作为枚举对象返回 |\n| eval()\
    \ | 计算并执行一个表达式 |\n| exec() | 执行指定的代码（或对象） |\n| filter() | 使用过滤函数排除可迭代对象中的项 |\n\
    | float() | 返回一个浮点数 |\n| format() | 格式化指定的值 |\n| frozenset() | 返回一个冻结集合对象 |\n\
    | getattr() | 返回指定属性（属性或方法）的值 |\n| globals() | 以字典形式返回当前全局符号表 |\n| hasattr() |\
    \ 如果指定对象具有指定属性（属性/方法），则返回True |\n| hash() | 返回指定对象的哈希值 |\n| help() | 执行内置帮助系统\
    \ |\n| hex() | 将数字转换为十六进制值 |\n| id() | 返回对象的id |\n| input() | 允许用户输入 |\n| int()\
    \ | 返回一个整数 |\n| isinstance() | 如果指定对象是指定对象的实例，则返回True |\n| issubclass() | 如果指定类是指定对象的子类，则返回True\
    \ |\n| iter() | 返回一个迭代器对象 |\n| len() | 返回对象的长度 |\n| list() | 返回一个列表 |\n| locals()\
    \ | 返回当前本地符号表的更新字典 |"
