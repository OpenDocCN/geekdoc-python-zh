    28. Explain matplotlibpycharts with an example.\n\n# CHAPTER 11\n\n## RANDOM WALKS\n\
    \n### 11.1 What is Random Walk?\n\nA random walk is, to put it simply, the process\
    \ of taking subsequent steps in a “randomized” manner relative to the current\
    \ state. This basic description can then be modified with additional conditions\
    \ to produce a random walk for your particular use case. Some of the more well-known\
    \ random walks observed in the real world are stock ticker movement, living cell\
    \ movement in a substrate, and Brownian motion of particles.\n\nHere, we simulate\
    \ a condensed random walk in one dimension (one dimension), two dimensions (two\
    \ dimensions), and three dimensions (three dimensions). Stop locations are indicated\
    \ by o, and starting points are indicated by +.\n\nThese requirements can vary\
    \ depending on the application; for example, the walk may begin at a specific\
    \ stock price or at a cell position determined by microscopy. Step selection is\
    \ typically probabilistic and is based on additional information from previous\
    \ data, projection assumptions, the hypothesis being tested, etc.\n\n![](img/c5c3113c0233e765f6875c52296f229f_139_0.png)\n\
    \n### 11.2 One Dimensional Random Walk\n\nThe 1D random walk is the simplest type\
    \ of random walk. The moving item can only move in one dimension in this type\
    \ of random walk. Up and down, in this instance.\n\nThe plan is for the item to\
    \ move up or down n times at random while storing the position data in a list.\n\
    \nThe path is represented by a line of a certain height in the graph because the\
    \ object's movement is one-dimensional. Because it is difficult to determine where\
    \ the object was at each stage, this is useless. We will give each step in the\
    \ process a timestamp in order to make the graph more illuminating. This turns\
    \ it into a 2D graph with the date as the x-axis and the object's position as\
    \ the y-axis.\n\nExample:\n\n```python\nimport numpy as np\nimport matplotlib.pyplot\
    \ as plt\nimport random\n\ndef randomwalk1D(n):\n    x, y = 0, 0\n    # Generate\
    \ the time points [1, 2, 3, ... , n]\n    timepoints = np.arange(n + 1)\n    positions\
    \ = [y]\n    directions = [\"UP\", \"DOWN\"]\n    for i in range(1, n + 1):\n\
    \        # Randomly select either UP or DOWN\n        step = random.choice(directions)\n\
    \        # Move the object up or down\n        if step == \"UP\":\n          \
    \  y += 1\n        elif step == \"DOWN\":\n            y -= 1\n        # Keep\
    \ track of the positions\n        positions.append(y)\n    return timepoints,\
    \ positions\n\ntime_data, pos_data = randomwalk1D(1000)\nplt.plot(time_data, pos_data,\
    \ 'r-')\nplt.title(\"1D Random Walk in Python\")\nplt.show()\n```\n\nOutput:\n\
    \n![](img/c5c3113c0233e765f6875c52296f229f_141_0.png)\n\n### 11.3 Two Dimensional\
    \ Random Walk\n\nThe random walk in two dimensions operates on the exact same\
    \ principle as in one. The object can now travel in additional directions besides\
    \ only up and down. It can also shift to the left or right as an alternative.\n\
    \nYou are no longer plotting against time in the 2D scenario. Instead, by adding\
    \ the x, y coordinate pairs to the graph, it is feasible to see the walk. This\
    \ displays the object's n-step, 2D route.\n\nExample:\n\n```python\nimport numpy\
    \ as np\nimport matplotlib.pyplot as plt\nimport random\n```"
