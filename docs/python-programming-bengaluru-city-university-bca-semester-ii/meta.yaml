    >>> def func2(self):

    >>>     print("This function is in child class.")

    >>> object = Child()

    >>> object.func1()

    >>> object.func2()

    ```


    2. **Multiple Inheritance:** Multiple inheritances refer to a type of inheritance
    where a class can originate from multiple base classes. All of the base classes''
    features are passed down to the derived class in multiple inheritances.


    ![](img/c5c3113c0233e765f6875c52296f229f_110_0.png)


    Example:


    ```

    >>> class Mother:

    >>>     mothername = ""

    >>>     def mother(self):

    >>>         print(self.mothername)

    >>> class Father:

    >>>     fathername = ""

    >>>     def father(self):

    >>>         print(self.fathername)

    >>> class Son(Mother, Father):

    >>>     def parents(self):

    >>>         print("Father :", self.fathername)

    >>>         print("Mother :", self.mothername)

    >>> s1 = Son()

    ```'
