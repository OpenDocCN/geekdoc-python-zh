    3. **Open the file for writing only (‘w’).** The data is overwritten and truncated
    for the already-existing files. The start of the file is where the handle is located.
    if the file doesn’t already exist, creates it.

    4. **Open the file for reading and writing with the “w+” command.** Data is overwritten
