    \n示例：\n```python\nx = dict(name=\"John\", age=36, country=\"Norway\")\nprint(x)\n\
    ```\n输出：\n```\n{'name': 'John', 'age': 36, 'country': 'Norway'}\n```\n\n## 8.\
    \ filter()\n\n`filter()` 函数返回一个迭代器，其中的项目通过一个函数进行过滤，以测试该项目是否被接受。\n\n语法：\n```python\n\
