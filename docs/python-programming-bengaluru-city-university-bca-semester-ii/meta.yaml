    # 3.4 Local Scope and Global Scope


    A variable''s scope refers to the area of a program where it is used. When defined
    inside a function, parameters and variables are hidden to outsiders. Consequently,
    they are local in scope.


    The time that a variable is stored in memory is referred to as its lifetime. Variables
    inside of a function are only valid for the duration of that function.


    Upon our return from the event, they are destroyed. Consequently, a function does
    not retain the value of a variable from earlier calls.


    Here is an illustration of the range of a variable within a function.


    ```

    >>>def my_func():

    >>>    x = 10

    >>>    print("Value inside function:",x)

    >>>x = 20

    >>>my_func()

    >>>print("Value outside function:",x)

    ```


    Output:


    ```

    E:\python>practice-1.py

    Value inside function: 10

    Value outside function: 20

    ```


    As can be seen, x starts out with a value of 20. Even though x was changed from
    0 to 10 by the function my func(), this had no impact on the value outside of
    the function.


    This is so that the variable x inside the function can be distinguished from the
    variable outside (which is global to the function). They are two distinct variables
    with diverse scopes, although sharing the identical names.


    However, variables inside the function are visible from the outside. They encompass
    the entire world.


    From within the function, we can read these values, but we are unable to modify
