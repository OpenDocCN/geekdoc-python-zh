    >>>obj_spr.flight()\n>>>obj_ost.intro()\n>>>obj_ost.flight()\n```\n\n## 9.7 抽象\n\
    \n在Python中，抽象是通过向用户隐藏额外信息来管理复杂性的实践。这是面向对象编程（OOP）语言的基本概念之一。这使得用户能够在现有抽象的基础上添加更复杂的逻辑，而无需理解甚至考虑所有隐藏的后台或后端复杂性。\n\
    \n这是一个非常广泛的核心主题，不仅适用于面向对象编程。在现实世界或我们周围的环境中随处可见。\n\n程序员可以使用抽象来隐藏程序中所有不必要的信息和操作，使其更易于使用和更高效。我们现在可以开始学习如何使用Python程序来实现抽象。\n\
    \n在我们的程序中使用抽象类和方法，使我们能够在Python中实现抽象。\n\n示例：\n\n```python\n>>># Python program\
