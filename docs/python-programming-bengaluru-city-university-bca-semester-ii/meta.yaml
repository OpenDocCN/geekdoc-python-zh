    # 8.5 Closing a File


    The file must be properly closed after all operations have been completed on it.


    The resources that were bound to a file will become available after it has been
    closed. The Python close () method is used to complete the task.


    Python has an unreferenced object garbage collector, but we shouldn''t rely on
    it to close the file.


    Example:


    ```

    >>>f = open("test.txt", encoding = ''utf-8'')

    >>># perform file operations

    >>>f.close()

    ```


    # 8.6 Writing a File


    Open the file in write w, append a, or exclusive creation x mode before writing
    to it in Python.


    We must exercise caution when using the w mode because it will overwrite any existing
    data in the file. As a result, all previous data are deleted.


    The write () method is used to write a string or a sequence of bytes (for binary
    files). The amount of characters written to the file are returned by this procedure.


    Example:


    ```

    >>>with open("test.txt",''w'',encoding = ''utf-8'') as f:

    >>>    f.write("my first file\n")

    >>>    f.write("This file\n\n")

    >>>    f.write("contains three lines\n")

    ```


    If test.txt doesn''t already exist in the current directory, this application
    will create it there. If it does, it has been replaced.'
