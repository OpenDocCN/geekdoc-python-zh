    ```\n>>> for i in range (2,10,2):\n>>>     print(i)\n```\n\n**输出：**\n\n```\nC:\\\
    Users\\CSC\\Pictures\\python>python demo.py\n2\n4\n6\n8\n```\n\n### 类型 2：使用数据\n\
    \n```\n>>> data = \"Hello\"\n>>> for i in data\n>>>     print(i)\n```\n\n输出：\n\
