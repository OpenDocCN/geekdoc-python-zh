    # SETS


    An unordered group of elements is referred to as a set. Each set element must
    be distinct (no duplication) and unchangeable (cannot be changed).


    Sets can be changed, though. There are things we can add or take away.


    Additionally, sets can be utilised in mathematics to execute set operations like
    union, intersection, symmetric difference, etc. For example:


    this set = {“apple”, “banana”, “cherry”}


    here, thisset contains the 3 elements.


    # 7.1 Creating a Set


    A set is created by enclosing all the components (items) in curly braces, separating
    them with commas, or by using the set() function, which is built-in.


    It may contain any number of items, each of which could be of a different type.
    However, a set cannot contain mutable elements like dictionaries, sets, or lists.


    Example:


    ```

    >>># Different types of sets in Python

    >>># set of integers

    >>>my_set = {1, 2, 3}

    >>>print(my_set)

    >>># set of mixed datatypes

    >>>my_set = {1.0, “Hello”, (1, 2, 3)}

    >>>print(my_set)

    ```'
