    # Consensus Control


    ## 3


    ## Key Points


    - “Consensus”, which is the main topic of this chapter, means that all the agents
    reach an agreement about their states.

    - A basic consensus controller is given by the sum of its relative states with
    respect to the neighbors.

    - The collective dynamics of the multi-agent system with the controller is expressed
    as a linear system with the graph Laplacian associated with the network. The convergence
    property of the system is determined by the eigenvalues of the graph Laplacian.

    - The discrete-time case is similar to the continuous-time case, while, instead
    of the graph Laplacian, the Perron matrix plays an important role in the discrete-time
    case.


    ## 3.1 Consensus Problem


    Consider the multi-agent system, composed of agents 1, 2, . . . , n. The dynamics
    of agent i is given by


    $\dot{x}_i(t) = f_i(x_i(t), u_i(t))$, (3.1)


    where $x_i(t) \in \mathbb{R}^m$ and $u_i(t) \in \mathbb{R}^l$ are the state and
    the input, respectively, and $f_i : \mathbb{R}^m \times \mathbb{R}^l \rightarrow
    \mathbb{R}^m$ is a function.


    **Supplementary Information** The online version contains supplementary material
    available at https://doi.org/10.1007/978-3-031-52981-8_3.


    For determining the control input, each agent can use the information on some
    other agents. An agent from which agent $i$ can obtain the information is called
    a *neighbor* and the set of neighbors is denoted by $\mathbf{N}_i \subseteq \{1,
    2, \ldots, n\} \setminus \{i\}$. The set $\mathbf{N}_i$ could be time-varying
    in practice, but it is assumed to be time-invariant in this chapter. The resulting
    information flow is represented by a network, which is mathematically expressed
    by the graph $G = (\mathbf{V}, \mathbf{E})$ for $\mathbf{V} \triangleq \{1, 2,
    \ldots, n\}$ and $\mathbf{E} \triangleq \{(j, i) \in \mathbf{V} \times \mathbf{V}
    | j \in \mathbf{N}_i\}$.


    The controller of agent $i$ is on the basis of the information collected by its
    neighbors, which is in general given by either one of the following:


    Absolute-state-based: $u_i(t) = g_i(x_i(t), [x_j(t)]_{j \in \mathbf{N}_i})$,

    Relative-state-based: $u_i(t) = h_i([x_j(t) - x_i(t)]_{j \in \mathbf{N}_i})$,
    (3.2)


    where $g_i : \mathbb{R}^m \times \mathbb{R}^{m|\mathbf{N}_i|} \to \mathbb{R}^l$
    and $h_i : \mathbb{R}^{m|\mathbf{N}_i|} \to \mathbb{R}^l$ are functions. The former
    is employed when each agent can obtain the information of the state of itself
    and the neighbors, e.g., by communication among agents. The latter is exploited
    when the information of each agent is limited to the relative value of its state
    with respect to neighbors. For example, this case appears when $x_i(t)$ ($i =
    1, 2, \ldots, n$) represent the positions in a space and each agent measures the
    relative position to a neighbor by an internal sensor such as a vision-based sensor.


    If the functions $f_i$ ($i = 1, 2, \ldots, n$) are common in all the agents, the
    agents are said to be *homogeneous*; otherwise, they are said to be *heterogeneous*.
    Similarly, the controllers are said to be *homogeneous* or *heterogeneous* depending
    on the homogeneity of the controllers.


    For the multi-agent system in (3.1), the notion of *consensus* is defined as follows:
    If the system with the initial state $(x_1(0), x_2(0), \ldots, x_n(0))$ satisfies


    $$\lim_{t \to \infty} (x_i(t) - x_j(t)) = 0$$ (3.3)


    for every $(i, j) \in \mathbf{V} \times \mathbf{V}$, we call that *the system
    achieves consensus for the initial state* $(x_1(0), x_2(0), \ldots, x_n(0))$.
    If the system achieves consensus for every initial state $(x_1(0), x_2(0), \ldots,
    x_n(0)) \in \mathbb{R}^{m \times n}$, we simply call that *the system achieves
    consensus*. The *consensus problem* is to determine the control inputs $u_i(t)$
    ($i = 1, 2, \ldots, n$) such that the system achieves consensus.


    If the system achieves consensus and there exists an $\alpha \in \mathbb{R}^m$
    such that


    $$\lim_{t \to \infty} x_i(t) = \alpha$$ (3.4)


    for some $i \in \mathbf{V}$ (equivalently for every $i \in \mathbf{V}$), then
    $\alpha$ is called the *consensus value*.


    The following are typical consensus values, which are targets of the system. According
    to the value, consensus is classified into several types:


    - Average consensus:


    $$\alpha = \frac{1}{n} \sum_{i=1}^n x_i(0).$$ (3.5)'
