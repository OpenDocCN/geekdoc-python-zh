    # 2.4.7 Graph-Related Dynamical Systems


    Here we introduce graph-related dynamical systems, which are fundamental models
    for dynamical multi-agent systems discussed in this book. Namely, we consider
    the following continuous-time dynamical system:


    $$\dot{x}(t) = -Lx(t), \quad t \geq 0, \quad x(t) \in \mathbb{R}^n, \tag{2.83}$$


    where $L$ is the graph Laplacian of a graph $G$, and the discrete-time dynamical
    system:


    $$x[k+1] = Px[k], \quad k = 0, 1, 2, \ldots, \quad x[k] \in \mathbb{R}^n, \tag{2.84}$$


    where $P$ is the Perron matrix.


    We have the following theorem for the convergence of the solution $x(t) = e^{-Lt}x(0)$
    to the differential Eq. (2.83), and the solution $x[k] = P^kx[0]$ to the difference
    Eq. (2.84). In this theorem, the existence of a spanning tree in graph $G$ is
    essential.


    **Theorem 2.22** *Consider a graph $G$ which has a spanning tree. Let $\Delta$
    be the maximum in-degree of $G$.*


    *(i) Let $L \in \mathbb{R}^{n \times n}$ be the graph Laplacian and let $v_1 \in
    \mathbb{R}^{1 \times n}$ be a left eigenvector of $L$ associated with its zero
    eigenvalue. Then*


    $$\lim_{t \to \infty} e^{-Lt} = \left( \frac{1}{v_1 \mathbf{1}_n} \right) \mathbf{1}_n
    v_1. \tag{2.85}$$


    *(ii) Let $P \in \mathbb{R}^{n \times n}$ be the Perron matrix for an arbitrarily
    given $\varepsilon > 0$, and let $w_1 \in \mathbb{R}^{1 \times n}$ be a left eigenvector
    of $P$ associated with the eigenvalue 1. If $\varepsilon \Delta < 1$,*'
