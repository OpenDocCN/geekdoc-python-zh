    # 7.3 Spreading Phenomenon over Complex Networks


    In the previous section, we assumed the homogeneous mixing hypothesis. Under this
    assumption, the network over which viruses spread is symmetric. However, the real
    human contact network is much more complex than such a symmetric network. In this
    section, we discuss the viral spreading phenomenon over complex random networks.


    $^1$ The definition of the basic reproductive number $R_0$ depends on the model,
