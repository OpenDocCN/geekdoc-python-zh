    # 2.4.2 Connectivity


    Here we discuss the connectivity of a graph.

    For a directed graph $G = (V, E)$, a *directed path* of length $m$ is a sequence
    of nodes in $V$ as


    $\{i_0, i_1, \dots, i_m\}$


    where $(i_k, i_{k+1}) \in E$ for any $k \in \{0, 1, \dots, m-1\}$. Intuitively,
    a path is a trajectory of a pen drawn from $i_0$ to $i_m$ through edges of the
    graph with a single stroke. For example, $\{1, 2, 4, 6\}$ in the graph in Fig.
    2.6 is a path from 1 to 6, and $\{1, 2, 3, 5, 4, 3, 5, 4, 6\}$ is another path
    from 1 to 6.


    Let us consider a directed graph $G = (V, E)$. Two nodes $i, j \in V$ are said
    to be *connected* if there exists a path from $i$ to $j$. If any nodes $i, j \in
    V$ are connected to each other, then the directed graph $G$ is said to be *strongly
    connected*. For undirected $G$, we just say $G$ is *connected* instead of strongly
    connected. A directed graph is said to be *weakly connected* if it is connected
    as an undirected graph by replacing all directed edges by undirected edges.


    The directed graph in Fig. 2.5 is not strongly connected since there is no path
    from 2 to the other nodes, but it is weakly connected. On the other hand, the
    balanced graph in Fig. 2.6 is strongly connected. For a small graph, the connectivity
    is easily checked by looking into the drawn graph. However, for a large graph
    with thousands of nodes, it is impossible. In such a case, we can check the connectivity
    numerically by solving an eigenvalue problem of a matrix. See Sect. 2.4.6 for
    details.'
