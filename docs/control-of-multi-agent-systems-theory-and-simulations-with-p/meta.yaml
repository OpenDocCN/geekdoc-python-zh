    $$


    现在，利用引理 5.12 以及 $R_w^v = \frac{\partial \tilde{e}^v}{\partial p} = \frac{\partial
    \tilde{e}^v}{\partial \tilde{e}^u} \frac{\partial \tilde{e}^u}{\partial p} = \frac{\partial
    \tilde{e}^v}{\partial \tilde{e}^u} R_w^u$，并记 $Q(\tilde{e}^u) = R_w^u (R_w^u)^\top$
    和 $f'' = \frac{\partial f(\tilde{e}^u)}{\partial \tilde{e}^u}$，我们可以进一步得到


    $$

    \begin{aligned}

    \dot{\tilde{e}}^u(t) &= -R_w^u (R_w^u)^\top \tilde{e}^u(t) - R_w^u (R_w^v)^\top
    f(\tilde{e}^u(t)) \\

    &= -Q(\tilde{e}^u) \tilde{e}^u(t) - Q(\tilde{e}^u) (f'')^\top f(\tilde{e}^u(t)).
    \quad (5.72)

    \end{aligned}

    $$


    **定理 5.12** 当一个无穷小弱刚性构型系统通过梯度下降律 (5.69) 更新时，(5.72) 给出的误差动力学局部指数收敛到零。此外，(5.70)
    中的 $\tilde{e}(t)$ 当 $t \rightarrow \infty$ 时局部渐近收敛到零。


    **证明** (5.72) 的局部稳定性可以通过在 $\tilde{e}^u$ 处线性化来检验。证明与文献 [22] 中定理 3 的证明完全相同，简要总结如下。(5.72)
    的雅可比矩阵计算为


    $$

    \begin{aligned}

    J(\tilde{e}^u) &= \left. \frac{\partial [-Q(\tilde{e}^u) \tilde{e}^u - Q(\tilde{e}^u)
    (f'')^\top f(\tilde{e}^u)]}{\partial \tilde{e}^u} \right|_{\tilde{e}^u=0} \\

    &= -\left. \frac{\partial Q(\tilde{e}^u)}{\partial \tilde{e}^u} [\tilde{e}^u +
    (f'')^\top f(\tilde{e}^u)] - Q(\tilde{e}^u) \left[ I_{\sigma^u \times \sigma^u}
    + \frac{\partial [(f'')^\top f(\tilde{e}^u)]}{\partial \tilde{e}^u} \right] \right|_{\tilde{e}^u=0}.
    \quad (5.73)

    \end{aligned}

    $$


    让我们考虑 $\tilde{e}^u$ 的一个小邻域，由集合 $\mathbf{B}_r \triangleq \{\tilde{e}^u : \|\tilde{e}^u\|
    < r\}$ 定义，其中 $r > 0$ 是一个小常数。那么，$\tilde{e}^u$ 和 $\tilde{e}^v$ 是有界的，这意味着 $f''$ 和
    $Q(\tilde{e}^u)$ 也是有界的。因此，(5.72) 的解是有界的。此外，由于 (5.72) 的右端是连续可微的，雅可比矩阵 $J(\tilde{e}^u)$
    是有界且利普希茨连续的。(5.73) 的右端在 $\tilde{e}^u = 0$ 时可以简化为


    $$

    J(\tilde{e}^u) = -Q(\tilde{e}^u) \left[ I_{\sigma^u \times \sigma^u} + \frac{\partial
    [(f'')^\top f(\tilde{e}^u)]}{\partial \tilde{e}^u} \right]_{\tilde{e}^u=0} .

    $$


    现在，由


    $$

    \frac{\partial [(f'')^\top f(\tilde{e}^u)]}{\partial \tilde{e}^u} = \frac{\partial^2
    f(\tilde{e}^u)}{\partial (\tilde{e}^u)^2}^\top f(\tilde{e}^u) + \frac{\partial
    f(\tilde{e}^u)}{\partial \tilde{e}^u}^\top \frac{\partial f(\tilde{e}^u)}{\partial
    \tilde{e}^u} ,

    $$


    它是正定的，我们可以看到 $\left[ I_{\sigma^u \times \sigma^u} + \frac{\partial [(f'')^\top
    f(\tilde{e}^u)]}{\partial \tilde{e}^u} \right]_{\tilde{e}^u=0}$ 是对称且正定的。同时，由于
    $Q(\tilde{e}^u)$ 是对称且正定的，$J(\tilde{e}^u)$ 的特征值是实数且为正。因此，我们可以得出结论：(5.72) 的 $\tilde{e}^u
    = 0$ 是一个局部指数稳定的平衡点。最后，由于 $\tilde{e}^u(t) \to 0$，我们有 $\tilde{e}^v(t) \to 0$ 当 $t
    \to \infty$。


    请注意，带有误差向量 (5.68) 的控制律 (5.69) 是距离和角度约束的组合。然而，如果 $\mathbf{E} = \emptyset$，那么它是一个完全基于角度的控制方案，这与文献
    [5, 11] 中研究的构型控制律相同。


    ## 5.4 Python 代码


    ### 5.4.1 Python 代码 5.1：基于距离的构型控制


    Python 代码 5.1 是第 5.3.1 节中基于距离的构型控制的程序。此代码是 Python 代码 3.1 的修改版。第 27 行显示了底层的图拓扑，表明
    $\mathbf{N}_1 = \{2, 4\}$，$\mathbf{N}_2 = \{1, 3, 4, 5\}$，$\mathbf{N}_3 = \{2,
    5\}$，$\mathbf{N}_4 = \{1, 2, 5\}$，$\mathbf{N}_5 = \{2, 3, 4\}$。第 29 行和第 31 行显示了智能体的初始位置和期望位置。请注意，期望位置用于计算相邻智能体之间的期望距离。例如，智能体
    1 和 2 是相邻智能体；因此，根据第 31 行的期望位置，计算出智能体 1 和 2 之间的期望智能体间距离为 1。第 17-18 行给出的代码计算了距离误差，即当前距离减去期望距离。图
    5.12 显示了在基于距离的构型控制律控制下智能体的轨迹。初始位置与第 29 行给出的位置完全相同；然而，图 5.12 中显示的最终位置与第 31 行给出的期望位置不同。'
