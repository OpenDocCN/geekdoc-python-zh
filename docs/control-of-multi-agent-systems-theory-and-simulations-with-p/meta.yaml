    $\mathbb{Z}$ The set of integers

    $\mathbb{R}$ The set of real numbers

    $\mathbb{N}$ The set of natural numbers including 0, that is, $\mathbb{N} = \{0,
    1, 2, \dots\}$

    $\mathbb{C}$ The set of complex numbers

    $\mathbb{R}_+$ The set of positive numbers

    $\mathbb{R}_{0+}$ The set of non-negative numbers

    j The imaginary number

    $|z|$ The absolute value of $z \in \mathbb{C}$

    $\text{Re}(z)$ The real part of $z \in \mathbb{C}$

    $\text{Im}(z)$ The imaginary part of $z \in \mathbb{C}$

    $\emptyset$ The empty set

    $\mathbf{S}^{m \times n}$ The set of $m \times n$ matrices whose elements are
    in a set $\mathbf{S}$

    $\mathbf{S}^n$ The set of $n$-dimensional vectors whose elements are in a set
    $\mathbf{S}$

    $\mathbf{S}^\infty$ The set of sequences $(x_1, x_2, \dots)$ with $x_i \in \mathbf{S}$,
    $i = 1, 2, \dots$

    $\text{int}(\mathbf{S})$ The interior of a set $\mathbf{S}$

    $\text{bd}(\mathbf{S})$ The boundary of a set $\mathbf{S}$

    $\text{cl}(\mathbf{S})$ The closure of a set $\mathbf{S}$

    $|\mathbf{S}|$ The number of elements in a finite set $\mathbf{S}$

    $\text{dim}(\mathbf{S})$ The dimension of a linear space $\mathbf{S}$

    $\mathbf{S}^\perp$ The orthogonal complement of a linear space $\mathbf{S}$

    $\mathbf{S}_1 \subset \mathbf{S}_2$ $\mathbf{S}_1$ is a strict subset of $\mathbf{S}_2$
    (i.e., $\mathbf{S}_1 \neq \mathbf{S}_2$)

    $\mathbf{S}_1 \subseteq \mathbf{S}_2$ $\mathbf{S}_1$ is a subset of $\mathbf{S}_2$

    $\mathbf{S}_1 \cup \mathbf{S}_2$ The union of $\mathbf{S}_1$ and $\mathbf{S}_2$

    $\bigcup_{i=1}^n \mathbf{S}_i$ The union of $\mathbf{S}_1, \mathbf{S}_2, \dots,
    \mathbf{S}_n$

    $\mathbf{S}_1 \cap \mathbf{S}_2$ The intersection of $\mathbf{S}_1$ and $\mathbf{S}_2$

    $\bigcap_{i=1}^n \mathbf{S}_i$ The intersection of $\mathbf{S}_1, \mathbf{S}_2,
    \dots, \mathbf{S}_n$

    $\mathbf{S}_1 \setminus \mathbf{S}_2$ The difference between $\mathbf{S}_1$ and
    $\mathbf{S}_2$, namely, $\mathbf{S}_1 \setminus \mathbf{S}_2 \triangleq \{x \in
    \mathbf{S}_1 : x \notin \mathbf{S}_2\}$

    $\mathbf{1}_n$ The $n$-dimensional vector whose elements are all one

    $\langle x, y \rangle$ The Euclidean inner product of vectors $x, y \in \mathbb{R}^n$,
    that is, $\langle x, y \rangle \triangleq y^\top x$'
