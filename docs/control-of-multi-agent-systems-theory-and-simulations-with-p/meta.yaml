  md: 'each agent regulates a set of constraints connected to it. To formulate this
    formation control problem, we employ some mathematical concepts from *graph rigidity*
    [9]. For example, in Fig. 5.2, if there is one more constraint between agents
    2 and 3, the formation configuration will be unique up to translations and rotation,
    as far as three constraints are kept. That is, as far as the constraints between
    1 and 2, 2 and 3, and 1 and 3 are kept constant, the triangle configuration of
    the formation will be maintained. Let our focus be limited to local decision without
    communications to a central controller, and relative measurements without using
    a global measurement; then such a formation control problem is called *distributed
    formation control* [1]. Consequently, in distributed formation control, we would
    like to design controllers for individual agents such that:


    +   - the magnitude of the current constraints would become the magnitude of the
    desired constraints,

    - formation configuration would be unique up to some trivial motions (translations,
    rotations, etc.),

    - and agents interact with each other locally without interacting with a central
    coordinator.


    This chapter is dedicated to distributed formation control problems. In Sect.
    5.2, we introduce some basic rigidity theories. Then in Sect. 5.3, based on the
    rigidity theories, distance-, bearing-, and angle-based formation control problems
    are introduced.


    # 5.2 Rigidity Theory


    Let us consider a graph (denoted by $G$) that consists of a set of vertices $\mathbf{V}$
    and a set of edges $\mathbf{E}$, i.e., $G = (\mathbf{V}, \mathbf{E})$. If each
    vertex is placed at a position $p_i \in \mathbb{R}^d$, we say that the set of
    vertices (or agents) is realized at $p \in \mathbb{R}^{dn}$, where $p$ is a stacked
    vector $p = [p_1^\top, \dots, p_n^\top]^\top$. The combination of a graph $G$
    and a realization $p$ is called a framework, symbolized as $f_p = (G, p)$ or $f_p
    = (\mathbf{V}, \mathbf{E}, p)$. Given an edge set, sometimes, we consider directions
    of edges even though it is an undirected graph. So, to avoid confusion, we need
    some clarifications in edge notations. Let there exist an edge $(i, j)$ from node
    $i$ to node $j$ for an undirected graph $G = (\mathbf{V}, \mathbf{E})$, where
    $|\mathbf{V}| = n$, and $|\mathbf{E}| = 2m$. Then, it implies that there also
    exists an edge as $(j, i)$, which means that for an undirected graph, if two nodes
    are connected by an edge, then the directions are of bi-directional. Thus, the
    edges of an undirected graph could be partitioned as $\mathbf{E} = \mathbf{E}_+
    \cup \mathbf{E}_-$, where $\mathbf{E}_+$ and $\mathbf{E}_-$ are disjoint, and
    $(i, j) \in \mathbf{E}_+$ implies $(j, i) \in \mathbf{E}_-$. Then, according to
    the decomposed edge sets $\mathbf{E}_+$ and $\mathbf{E}_-$, we could also have
    the incidence matrix of the graph as $H = [H_+^\top, -H_+^\top]^\top$ or $H =
    [H_+^\top, H_+^\top]^\top$. Note that without notational confusion, when we mention
    the set of edges and the incidence matrix by the symbols $\mathbf{E}$ and $H$,
    respectively, it means that $\mathbf{E}$ is $\mathbf{E}_+$ and $H$ is $H_+$ for
    undirected graphs. But for a directed graph, $\mathbf{E}$ and $H$ are defined
    according'
