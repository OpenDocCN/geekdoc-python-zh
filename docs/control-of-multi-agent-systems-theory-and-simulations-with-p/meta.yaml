    \ $\\Pi_{\\mathbf{C}}(v)$ of $v \\in \\mathbb{R}^n$ onto the following subset:\n\
    \n$$\\mathbf{C} = \\{(x_1, \\dots, x_N) : x_1 = x_2 = \\cdots = x_N\\}$$\n\nis\
    \ given by\n\n$$\\Pi_{\\mathbf{C}}(v) = \\begin{bmatrix} \\bar{v} \\\\ \\vdots\
