    \n> $^4$ Two square matrices $A_1 \\in \\mathbb{R}^{n \\times n}$ and $A_2 \\\
    in \\mathbb{R}^{n \\times n}$ are said to be *similar* if there exists a non-singular\
    \ matrix $T \\in \\mathbb{R}^{n \\times n}$ such that $A_2 = T^{-1} A_1 T$.\n\n\
    where $J_1, J_2, \\ldots, J_r$ are defined by\n\n$$J_i \\triangleq \\operatorname{diag}\\\
