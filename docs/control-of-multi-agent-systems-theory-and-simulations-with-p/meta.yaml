    ### 7.3.1 随机网络


    我们在此回顾*随机网络*，或称*随机图*，其中边是在固定节点数下随机选择的。


    首先，我们考虑一个称为 *Erdős–Rényi 随机图模型* 的简单随机网络。这是一个图 $G = (\mathbf{V}, \mathbf{E})$，其中
    $\mathbf{V} = \{1, 2, \dots, N\}$，每条边以预设概率 $p \in (0, 1)$ 随机选择，即，


    $(i, j) \in \mathbf{E}, \quad \text{概率为 } p, \qquad (7.19)$


    对于每个 $i, j \in \mathbf{V}$。容易证明，*平均度* $\langle k \rangle$，即 $G$ 中每个节点的平均边数，由下式给出


    $\langle k \rangle = (N - 1)p. \qquad (7.20)$


    同样，*度分布* $P(k)$，即一个节点度为 $k$ 的概率，由下式给出


    $P(k) = \binom{N - 1}{k} p^k (1 - p)^{N - 1 - k}, \quad k = 0, 1, 2, \dots, N
    - 1. \qquad (7.21)$


    **示例 7.4** *(Python)* 我们可以使用 `NetworkX` 包轻松生成一个 Erdős–Rényi 随机图。Python 程序见第 7.4.4
    节。


    我们设置节点数 $N = 100$ 和边连接概率 $p = 0.02$。我们还固定一个随机种子 `seed = 1`，以便每次计算生成相同的图。使用 `NetworkX`
    函数 `erdos_renyi_graph` 生成一个 Erdős–Rényi 随机图。计算得到平均度为 `ave_deg = 2.26`，接近 $(N -
    1)p = 1.98$。然后，绘制度分布如图 7.4 所示。我们注意到该分布可以用*泊松分布*近似


    $P(k) \approx \frac{e^{-\lambda} \lambda^k}{k!}, \qquad (7.22)$


    其中 $\lambda = 2.26$（网络的平均度）。


    让我们考虑另一个度分布服从幂律的随机图。换句话说，这是一个度分布满足以下条件的随机图


    $P(k) \propto k^{-\alpha}, \qquad (7.23)$


    对于大的 $k$，其中 $\alpha$ 是一个正参数。这样的网络称为*无标度网络*。无标度网络在我们周围随处可见；社交网络、像万维网这样的计算机网络、航空网络以及接触网络
    [1,2]。


    无标度网络可以按如下方式生成：


