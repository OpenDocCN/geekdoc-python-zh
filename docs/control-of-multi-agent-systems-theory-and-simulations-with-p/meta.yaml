- md: '## 1.2.6 Human Society


    A *human society* is a group of individuals who interact with each other. The
    individuals share common values, beliefs, and customs, and work together to achieve
    common goals and objectives. Therefore, it forms a network called a *human social
    network* with the nodes representing individuals and the edges representing the
    relationships between individuals.


    An example of a social network is the Karate club [26,83]. It is a small network
    of 34 members of a karate club, which was studied by Wayne Zachary [83]. The Karate
    club network includes information about the friendships and interactions between
    members of the club, as well as their social roles and positions within the club.
    This network is often used in network analysis to illustrate concepts such as
    centrality, clustering, and community detection [26,66].


    A social networking service (SNS) has also been widely studied as a social network
    [34]. SNS is an online platform that enables users to create and maintain a public
    or semi-public profile, and to interact with other users through the sharing of
    content, messages, and other forms of communication. Examples of SNSs include
    Facebook, X (Twitter), and LinkedIn. SNSs are often used as tools for social interaction,
    communication, and information sharing, and have become an important part of many
    people''s daily lives.


    Very recently, an increased interest in *viral spreading networks* has emerged
    due to the pandemic of COVID-19 [1,73]. A viral spreading network is a network
    model of the spread of a virus or disease within a population. In this network,
    the nodes represent individuals, and the edges represent the transmission of the
    virus between individuals. Viral spreading networks are used to know how factors
    such as network structure, individual behavior, and public interventions can influence
    the spread of a virus [63]. The topic of viral spreading networks is discussed
    in Chap. 7 of this book.


    ## 1.3 Control of Multi-agent Systems: Emerging Topics in Systems and Control


    The purpose of this book is to introduce the control theory of multi-agent systems.
    In this section, we showcase emerging topics in the control of multi-agent systems,
    some of which will be studied in detail in this book.


    ### 1.3.1 Consensus Control


    Consensus (or called *agreement*) means that all the agents reach an agreement
    about a quantity of interest when each agent has its own value for the quantity.
    It is one of the fundamental objectives for multi-agent systems, which can be
    applied to various tasks such as synchronization of coupled oscillators, aggregation
    of information, and formation control of multiple robots.


    Consensus problems refer to analyzing whether a system to achieve consensus or
    not or designing parameters of a system to achieve consensus. The study of consensus
    problems date back to the 1960s (see, e.g., [21] and references therein) and continues
    to the present in several academic fields. In the control community, they have
    been studied in the late 1990s [69] and a number of results have been presented
    by incorporating the traditional control theory into consensus problems. A theoretical
    framework of consensus control is introduced in Chap. 3.


    ### 1.3.2 Coverage Control


    Coverage means placing agents so that an area of interest is covered by the agents
    at a desired density. This is another fundamental task for multi-agent systems
    as well as consensus. Coverage is essential, especially for mobile sensor networks
    to monitor a physical quantity in the entire space of the environment. In this
    case, mobile sensors are deployed such that the environment is divided into small
    areas with small overlaps and each small area is seen by a sensor. Coverage is
    a general task, containing the consensus in its special case. Moreover, it has
    connections to the so-called Voronoi tessellation in computer geometry and location
    optimization problems in mathematical optimization (see, e.g., [25,67] and references
    therein). We will study coverage control in Chap. 4.


    ### 1.3.3 Formation Control


    Formation control of multi-agent systems is one of the hot topics studied in the
    systems and control community. In the traditional formation control problems,
    they considered the control variables in a decentralized setup but assumed the
    sensing variables are available in a centralized setup. In distributed formation
    control, both the sensing variables and control variables are utilized in a distributed
    setup, i.e., set up from the relationships with neighboring nodes [2]. In this
    book, we focus on the distributed control problems under a multi-agent framework.
    Since the distributed formation control uses only local sensing variables, without
    any global information, it could be considered as a more general setup than the
    consensus-based multi-agent formation setup. Basic mathematical background and
    recent theoretical developments of distributed formation control will be presented
    in Chap. 5.


    ### 1.3.4 Controllability of Networks


    Network controllability has been steadily studied in multi-agent systems theory.
    The main issue is to examine whether a network is controllable, based on only
    the structure of the network (i.e., the topology of the underlying graph or sign
    of edges). Given a network $\dot{x}(t) = Ax(t) + Bu(t)$, the matrix $A$ represents
    the connectivities between nodes. It could be an adjacency matrix or could be
    a Laplacian matrix, depending on the considered network property. Theoretical
    developments are divided into two cases as *almost all edge weights* and *for
    all edge weights* [61]. Since the controllability is decided by inputs, the structure
    of the input matrix $B$ is critical. Thus, we need to check the controllability
    of the pair $(A, B)$ from some combinatorial approaches. Recently, in [37], a
    more generalized case considering *arbitrary structure* of some edges (could be
    zero or non-zero) has been developed. Since the system matrix $A$ could be a Laplacian,
    the controllability theory developed in the literature could be applied to diffusively
    coupled networks with input nodes (i.e., consensus networks) [72].


    ### 1.3.5 Model Predictive Control


    Model predictive control (MPC) is widely used in many control applications. A
    major merit of MPC is that it can handle constraints on the system''s behavior,
    such as limits on the control inputs and the system''s state [58]. MPC can be
    applied to not only linear time-invariant systems but also more complex systems
    such as nonlinear systems [28], hybrid systems [14], and multi-agent systems [15].


    MPC of multi-agent systems optimizes the control actions of each individual agent
    based on the predicted behavior of the other agents in the system to achieve a
    common goal. For example, in a multi-robot system, distributed MPC is proposed
    to generate non-colliding trajectories in real time for multiple robots [57].
    Also, distributed MPC is applied to power systems for the automatic generation
    control (AGC) for controlling system frequency and tie-line interchange [79].


    ### 1.3.6 Event-Triggered and Sparse Control


    *Resource-aware control* is one of the most important control technologies for
    recent complex and networked systems. The control aims at reducing the control
    and network resources such as energy, memory size, computational time, and communication
    bandwidth. There are two major methods to achieve resource-aware control. One
    is *event-triggered control* [31]. In event-triggered control, the control action
    is updated only when a certain event or condition is detected, by which the communication
    and control burden can be dramatically reduced. The other is *sparse control*,
    also known as *maximum hands-off control* [62,64], where the time length on which
    the control action is active is minimized under control constraints. The key point
    of this control is the minimization of the active period or the maximization of
    the inactive period, which can be solved as an optimal control problem. The two
    methods have been applied to multi-agent systems to achieve resource-aware control
    in multi-agent systems. For example, the consensus control mentioned above can
    be implemented as an event-triggered control [22]. Also, the sparse control has
    been extended to multi-agent consensus in [33].'
  mdcn: '## 1.2.6 人类社会


    *人类社会*是一个由相互互动的个体组成的群体。这些个体共享共同的价值观、信仰和习俗，并为实现共同的目标和目的而协同工作。因此，它形成了一个被称为*人类社会网络*的网络，其中节点代表个体，边代表个体之间的关系。


    社会网络的一个例子是空手道俱乐部[26,83]。这是一个由34名空手道俱乐部成员组成的小型网络，由韦恩·扎卡里[83]进行了研究。空手道俱乐部网络包含了关于俱乐部成员之间友谊和互动的信息，以及他们在俱乐部内的社会角色和地位。该网络常用于网络分析，以说明中心性、聚类和社区检测等概念[26,66]。


    社交网络服务（SNS）也作为社会网络被广泛研究[34]。SNS是一个在线平台，允许用户创建和维护公开或半公开的个人资料，并通过分享内容、消息和其他形式的通信与其他用户互动。SNS的例子包括Facebook、X（Twitter）和LinkedIn。SNS常被用作社交互动、通信和信息共享的工具，已成为许多人日常生活的重要组成部分。


    最近，由于COVID-19大流行，人们对*病毒传播网络*的兴趣日益增长[1,73]。病毒传播网络是病毒或疾病在人群中传播的网络模型。在这个网络中，节点代表个体，边代表病毒在个体之间的传播。病毒传播网络用于了解网络结构、个体行为和公共干预等因素如何影响病毒的传播[63]。病毒传播网络的主题将在本书第7章中讨论。


    ## 1.3 多智能体系统的控制：系统与控制中的新兴主题


    本书的目的是介绍多智能体系统的控制理论。在本节中，我们展示多智能体系统控制中的一些新兴主题，其中一些将在本书中进行详细研究。


    ### 1.3.1 一致性控制


    一致性（或称为*共识*）意味着当每个智能体对某个感兴趣的量都有自己的值时，所有智能体就该量达成一致。这是多智能体系统的基本目标之一，可应用于耦合振荡器同步、信息聚合和多机器人编队控制等多种任务。


    一致性问题是指分析系统是否能够达成一致，或设计系统参数以达成一致。对一致性问题的研究可以追溯到20世纪60年代（参见，例如，[21]及其参考文献），并持续至今，涉及多个学术领域。在控制领域，它们于20世纪90年代末开始被研究[69]，通过将传统控制理论融入一致性问题，已经提出了许多成果。一致性控制的理论框架将在第3章中介绍。


    ### 1.3.2 覆盖控制


    覆盖是指将智能体放置在某个区域，使得该区域以期望的密度被智能体覆盖。这是多智能体系统的另一项基本任务，与一致性同等重要。覆盖至关重要，特别是对于移动传感器网络监测整个环境空间中的物理量。在这种情况下，部署移动传感器，使得环境被划分为重叠较小的小区域，并且每个小区域都被一个传感器覆盖。覆盖是一项通用任务，其特殊情况包含一致性。此外，它与计算机几何中的所谓Voronoi剖分以及数学优化中的位置优化问题有关（参见，例如，[25,67]及其参考文献）。我们将在第4章研究覆盖控制。


    ### 1.3.3 编队控制


    多智能体系统的编队控制是系统与控制领域研究的热点之一。在传统的编队控制问题中，考虑的是在分散设置下的控制变量，但假设感知变量在集中设置下可用。在分布式编队控制中，感知变量和控制变量都在分布式设置下使用，即基于与相邻节点的关系来设置[2]。在本书中，我们专注于多智能体框架下的分布式控制问题。由于分布式编队控制仅使用局部感知变量，没有任何全局信息，因此可以认为它比基于一致性的多智能体编队设置更为通用。分布式编队控制的基本数学背景和最新的理论进展将在第5章中介绍。


    ### 1.3.4 网络的可控性


    网络可控性在多智能体系统理论中得到了持续研究。主要问题是仅基于网络的结构（即底层图的拓扑或边的符号）来检查网络是否可控。给定一个网络 $\dot{x}(t)
    = Ax(t) + Bu(t)$，矩阵 $A$ 表示节点之间的连接性。根据所考虑的网络特性，它可能是邻接矩阵或拉普拉斯矩阵。理论发展分为*几乎所有边权重*和*对所有边权重*两种情况[61]。由于可控性由输入决定，输入矩阵
    $B$ 的结构至关重要。因此，我们需要从某些组合方法来检查配对 $(A, B)$ 的可控性。最近，在[37]中，发展了一种考虑某些边*任意结构*（可以是零或非零）的更一般化情况。由于系统矩阵
    $A$ 可能是拉普拉斯矩阵，文献中发展的可控性理论可以应用于具有输入节点的扩散耦合网络（即一致性网络）[72]。


    ### 1.3.5 模型预测控制


    模型预测控制（MPC）广泛应用于许多控制应用中。MPC的一个主要优点是它可以处理系统行为的约束，例如控制输入和系统状态的限制[58]。MPC不仅适用于线性时不变系统，也适用于更复杂的系统，如非线性系统[28]、混合系统[14]和多智能体系统[15]。


    多智能体系统的MPC基于系统中其他智能体的预测行为，优化每个个体智能体的控制动作，以实现共同目标。例如，在多机器人系统中，提出了分布式MPC，为多个机器人实时生成无碰撞轨迹[57]。此外，分布式MPC应用于电力系统，用于自动发电控制（AGC），以控制系统频率和联络线交换[79]。


    ### 1.3.6 事件触发与稀疏控制


    *资源感知控制*是近年来复杂和网络化系统最重要的控制技术之一。该控制旨在减少控制和网络资源，如能量、内存大小、计算时间和通信带宽。实现资源感知控制有两种主要方法。一种是*事件触发控制*[31]。在事件触发控制中，仅当检测到特定事件或条件时才更新控制动作，从而可以显著减少通信和控制负担。另一种是*稀疏控制*，也称为*最大放手控制*[62,64]，其中在控制约束下最小化控制动作活跃的时间长度。该控制的关键点是活跃期的最小化或非活跃期的最大化，这可以作为一个最优控制问题来解决。这两种方法已被应用于多智能体系统，以实现多智能体系统的资源感知控制。例如，上面提到的一致性控制可以实现为事件触发控制[22]。此外，稀疏控制已在[33]中扩展到多智能体一致性。'
