    # Python Code 6.2: Group testing by Gradient Projection in Example 6.3


    ```

    1 import numpy as np

    2 import matplotlib.pyplot as plt

    3

    4 ## Parameter settings

    5 m = 20 # Number of tests

    6 n = 100 # Number of people

    7 k = 5 # Number of positives

    8 # Original vector

    9 np.random.seed(1)

    10 x_orig = np.zeros(n)

    11 S = np.random.randint(n,size=k)

    12 x_orig[S] = 1

    13 # Testing matrix

    14 A = np.random.randint(2,size=(m, n))

    15 # Result vector

    16 b = A @ x_orig

    17 ## Closed-form solution

    18 Ap = np.linalg.pinv(A) # Moore-Penrose pseudo inverse of A

    19 x_opt = Ap @ b

    20 ## Optimization by gradient projection algorithm

    21 # Parameter settings

    22 alpha = 1.5 # Step size

    23 max_itr = 100 # Number of iterations

    24 x = np.random.randn(n) # Initial guess

    25 M = np.eye(n) - Ap @ A

    26 v = Ap @ b

    27 error = np.zeros(max_itr) # Residual

    28 # Iteration

    29 for k in range(max_itr):

    30     error[k] = np.linalg.norm(x_opt - x)

