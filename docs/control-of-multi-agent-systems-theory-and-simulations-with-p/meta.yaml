    - `plt.grid(True)` toggles the display of a grid on the plot.\n- `plt.show()`\
    \ renders and displays the plot.\n\n## 2.2 Linear Algebra\n\nIn the *algebraic\
    \ graph theory*, a graph (or a network) is represented using a matrix. The analysis\
    \ of a graph-related matrix plays an important role for analyzing properties of\
    \ the graph, such as connectivity. In this section, we will introduce important\
    \ facts and theorems in linear algebra that are often used in the algebraic graph\
    \ theory. We also show Python codes for matrix analysis.\n\n### 2.2.1 Notation\n\
    \nFor two vectors $x$ and $y$ in $n$-dimensional real vector space $\\mathbb{R}^n$,\
    \ we define the *inner product* by $\\langle x, y \\rangle \\triangleq x^\\top\
    \ y$, and the *Euclidean norm* or $\\ell^2$ *norm* by\n\n$$\\|x\\| \\triangleq\
    \ \\sqrt{\\langle x, x \\rangle} = \\sqrt{\\sum_{i=1}^n |x_i|^2}, \\tag{2.5}$$\n\
    \nwhere $x_i$ is the $i$th element of $x$. We say two vectors $x$ and $y$ are\
    \ *orthogonal* if $\\langle x, y \\rangle = 0$ holds, for which we denote $x \\\
    perp y$. For two subsets $\\mathbf{S}_1$ and $\\mathbf{S}_2$ in $\\mathbb{R}^n$,\
    \ we say $\\mathbf{S}_1$ and $\\mathbf{S}_2$ are orthogonal and write $\\mathbf{S}_1\
    \ \\perp \\mathbf{S}_2$ if $x_1 \\perp x_2$ holds for any $x_1 \\in \\mathbf{S}_1$\
    \ and $x_2 \\in \\mathbf{S}_2$. For a subset $\\mathbf{S} \\subseteq \\mathbb{R}^n$,\
    \ the *orthogonal complement* $\\mathbf{S}^\\perp$ is defined by\n\n$$\\mathbf{S}^\\\
    perp \\triangleq \\{x \\in \\mathbb{R}^n : \\langle x, y \\rangle = 0, \\forall\
    \ y \\in \\mathbf{S}\\}. \\tag{2.6}$$\n\nIt is easily shown that, for any $\\\
    mathbf{S} \\subseteq \\mathbb{R}^n$, $\\mathbf{S}^\\perp$ is a closed linear subspace\
    \ of $\\mathbb{R}^n$. In particular, if $\\mathbf{S}$ is itself a closed linear\
    \ subspace, then any vector $x \\in \\mathbb{R}^n$ can be uniquely decomposed\
    \ into\n\n$$x = y + z, \\quad y \\in \\mathbf{S}, \\quad z \\in \\mathbf{S}^\\\
    perp. \\tag{2.7}$$\n\nNamely, the space $\\mathbb{R}^n$ is the direct sum of $\\\
    mathbf{S}$ and $\\mathbf{S}^\\perp$, that is,\n\n$$\\mathbb{R}^n = \\mathbf{S}\
    \ \\oplus \\mathbf{S}^\\perp. \\tag{2.8}$$\n\nWe call this decomposition the *orthogonal\
    \ decomposition* of $\\mathbb{R}^n$.\n\n### 2.2.2 Matrix Rank\n\nLet us consider\
    \ a matrix as a mapping between two finite-dimensional linear spaces. We begin\
    \ with two important linear subspaces related to a matrix: the kernel and the\
    \ image. For a matrix $A \\in \\mathbb{R}^{m \\times n}$, we define the *kernel*\
    \ of $A$ by\n\n$$\\ker(A) \\triangleq \\{x \\in \\mathbb{R}^n : Ax = 0\\}, \\\
    tag{2.9}$$\n\nand the *image* by\n\n$$\\mathrm{imag}(A) \\triangleq \\{Ax \\in\
    \ \\mathbb{R}^m : x \\in \\mathbb{R}^n\\}. \\tag{2.10}$$\n\nThe dimension of $\\\
    mathrm{imag}(A)$ is called the *rank*, and written as $\\mathrm{rank}(A)$. The\
    \ following theorem is called the *dimension theorem* that plays an important\
    \ role in linear algebra:\n\n**Theorem 2.1** (Dimension theorem) *For a matrix\
    \ $A \\in \\mathbb{R}^{m \\times n}$, we have*\n\n$$\\dim(\\ker(A)) + \\mathrm{rank}(A)\
    \ = n. \\tag{2.11}$$\n\nIn particular, the analysis of the rank of a matrix often\
    \ plays an important role in graph analysis. We show some properties of the matrix\
    \ rank in the following theorem:\n\n**Theorem 2.2** (i) *For a matrix $A \\in\
    \ \\mathbb{R}^{m \\times n}$, we have*\n\n$$\\mathrm{rank}(A^\\top) = \\mathrm{rank}(A).\
    \ \\tag{2.12}$$\n\n(ii) For matrices $A_1, A_2 \\in \\mathbb{R}^{m \\times n}$,\
    \ we have\n\n$$\\operatorname{rank}(A_1 + A_2) \\leq \\operatorname{rank}(A_1)\
    \ + \\operatorname{rank}(A_2). \\tag{2.13}$$\n\n(iii) For a matrix $A \\in \\\
    mathbb{R}^{m \\times n}$ and non-singular matrices $T_1 \\in \\mathbb{R}^{m \\\
    times m}$ and $T_2 \\in \\mathbb{R}^{n \\times n}$, we have\n\n$$\\operatorname{rank}(A)\
    \ = \\operatorname{rank}(T_1 A) = \\operatorname{rank}(A T_2) = \\operatorname{rank}(T_1\
    \ A T_2). \\tag{2.14}$$\n\n(iv) Matrices $A_1, A_2 \\in \\mathbb{R}^{m \\times\
    \ n}$ satisfy\n\n$$\\operatorname{rank}(A_1) = \\operatorname{rank}(A_2), \\tag{2.15}$$\n\
    \nif and only if there exist two non-singular matrices $T_1 \\in \\mathbb{R}^{m\
    \ \\times m}$ and $T_2 \\in \\mathbb{R}^{n \\times n}$ such that\n\n$$A_2 = T_1\
    \ A_1 T_2. \\tag{2.16}$$\n\n(v) If a matrix $A \\in \\mathbb{R}^{m \\times n}$\
    \ satisfies\n\n$$\\operatorname{rank}(A) = n, \\tag{2.17}$$\n\nthen $A^\\top A$\
    \ is non-singular. In this case, for any vector $x \\in \\mathbb{R}^m$, there\
    \ uniquely exist $y \\in \\mathbf{S} \\triangleq \\operatorname{imag}(A)$ and\
    \ $z \\in \\mathbf{S}^\\perp$ such that $x = y + z$, and these vectors are given\
    \ by\n\n$$y = A(A^\\top A)^{-1} A^\\top x, \\quad z = (I - A(A^\\top A)^{-1} A^\\\
