    # 6.7 Summary


    In this chapter, we briefly reviewed the basics of convex optimization and introduced
    distributed optimization based on convex optimization techniques. We considered
    the problem of group testing as an ill-posed inverse problem, for which convex
    optimization plays an important role. For convex optimization, we studied two
    important methods: the subgradient method and the proximal method. Based on these
    methods, we then derived distributed optimization algorithms. Through Python simulations,
    we confirmed the distributed algorithms work well. In this chapter, we did not
    discuss parallel computation for distributed optimization, for which the package
    disropt [12] provides an easy way to implement a distributed algorithm based on
    MPI (Message Passing Interface).


    For the basics of convex optimization, [4,5,8] are nice books for beginners. You
    will find brief explanations of the package CVXPY in [9]. For distributed optimization,
    you can refer to [7,16]. The $\ell^1$ optimization appears in sparse representation
    and compressed sensing, which you can deeply understand by reading [11,13,17].


