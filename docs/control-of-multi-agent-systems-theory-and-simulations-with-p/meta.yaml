  md: 'A scale-free network can be generated as follows:


    +   (i) Choose a random graph of $m_0$ nodes as an initial graph. We assume that
    each node of this graph has at least one edge.

    (ii) Add a new node with $m \leq m_0$ edges that randomly connect the new node
    to $m$ nodes already in the graph. The probability that an edge of the new node
    connects to node $i$ depends on the degree $k_i$ of node $i$. Namely, this probability
    is given by

    $$\Pi(k_i) = \frac{k_i}{\sum_j k_j}, \quad i = 1, 2, \ldots \tag{7.24}$$

    (iii) Continue the above process until the number of nodes reaches a prefix number
    $N$.


    The generation model is called the *Barabási–Albert model*. The edge choice with
    the probability (7.24) is called the *preferential attachment*. Due to the preferential
    attachment, higher-degree nodes have a bigger chance to connect new nodes than
    lower-degree nodes.


    **Example 7.5** (*Python*) Let us generate a scale-free network by NetworkX. The
    Python program is given in Sect. 7.4.5 which generates a scale-free network by
    the Barabási–Albert model. We set the number of nodes $N = 100$ and the number
    of added edges $m = 1$. The average degree is computed as $\langle k \rangle =
    1.98$, which is similar to the average degree of the Erdős–Rényi random graph
    in Example 7.4. However, the degree distribution is very different, as shown in
    Fig. 7.5. The maximum degree of the Erdős–Rényi random graph in Example 7.4 is
    8 from Fig. 7.4, while that of the Barabási–Albert random graph is 19, and also
    there is a node with degree 13. This is thanks to the power law in (7.23), and
    such a distribution is said


    ![](img/6f6a40195ea61efdca2c32abeddbaaca_229_0.png)


    **Fig. 7.4** Degree distribution $P(k)$ of an Erdős–Rényi random graph'
