    $J$ quantifies the achievement degree of consensus. Since $(\partial J / \partial
    x)^\top(x) = Lx$, the collective dynamics in (3.16) is equivalent to the gradient
    system for $J$, i.e.,


    $$\dot{x}(t) = -\left(\frac{\partial J}{\partial x}\right)^\top (x(t)). \tag{3.24}$$


    If $G$ is connected, $L$ is positive semidefinite with only one zero eigenvalue
    from Theorem 2.18 and Corollary 2.1. Thus, the set of stationary points, i.e.,
    the solution set to the equation


    $$\frac{\partial J}{\partial x}(x) = 0, \tag{3.25}$$


