  md: 'equivalent if mag[$c_i(p(\mathbf{v}_i))$] = mag[$c_i(q(\mathbf{v}_i))$] for
    all $c_i \in \mathbf{C}$, where $c_i(p(\mathbf{v}_i))$ is the constraint for the
    points $p(\mathbf{v}_i)$, $c_i(q(\mathbf{v}_i))$ is the constraint for the points
    $q(\mathbf{v}_i)$, and mag[$c_i$] is the magnitude of the constraint $c_i$. The
    magnitude of a constraint could be the length (i.e., distance), the direction,
    or any attribute of the corresponding edge. Since in Fig. 5.3, the edges are considered
    as the constraints, if we choose the constraint index as $i = 1$, then it is the
    edge ①. In such case, we have $\mathbf{v}_1 = \{1, 2\}$ and mag[$c_1(p(\mathbf{v}_1))$]
    is the length or direction of the edge ①.


    Next, to consider the concept of the adjective *equivalent* at a complete graph,
    given a set of vertices $\mathbf{V}$ with realization $p$, we make another set
    of constraints $\overline{\mathbf{C}}$, which covers all possible constraints
    among the agents. So, for the case of Fig. 5.3, we can have $\overline{\mathbf{C}}
    = \mathbf{C} \cup \{(1, 3)\}$, which is a complete graph. Then, if mag[$c_i(p(\mathbf{v}_i))$]
    = mag[$c_i(q(\mathbf{v}_i))$] for all $c_i \in \overline{\mathbf{C}}$, we call
    them (two frameworks) *congruent* to each other. With these concepts, we can make
    the following concept:


    **Definition 5.1** A framework $f_p$ is called *rigid* in a given Euclidean space
    $\mathbb{R}^{dn}$ (i.e., $n$ agents in $\mathbb{R}^d$) if there exists a neighborhood
    $\mathbf{U}_p$ around $p$ such that every framework $f_q$, $q \in \mathbf{U}_p$,
    equivalent to $f_p$ is also congruent to $f_p$. Moreover, a framework $f_p$ is
    called *globally rigid* in a given Euclidean space if every framework $f_q$, $q
    \in \mathbb{R}^{dn}$, equivalent to $f_p$ is also congruent to $f_p$ in the entire
    domain.


    It is required to remark that the concept of rigidity could be defined in another
    way [3]. Consider an undirected graph $G = (\mathbf{V}, \mathbf{E})$, where the
    edge set $\mathbf{E}$ is, for simplicity, considered to represent the distance
    constraints. Note that without notational confusion, when we discuss a graph rigidity,
    the underlying graph is undirected one, and simply denoted as $G$. Denoting the
    displacement between two nodes $p_i$ and $p_j$ as $z_{ij} = p_j - p_i$, and distance
    between them as $d_{ij}$, we use $z_k$ to denote the $k$-th vector of $\{z_{ij},
    \forall(i, j) \in \mathbf{E}\}$. Then, $z$ is the stacked vector as $z = [z_1^\top,
    z_2^\top, \dots, z_m^\top]^\top$. Let us order the edges in their lengths in some
    way (ex., it could be an increasing order of edge indices) and define $h_G : \mathbb{R}^{dn}
    \to \mathbb{R}^m$ by


    ```

    $$h_G(p) = [\|p_j - p_i\|^2]_{(i,j) \in \mathbf{E}} = [\|z_k\|^2]_{k \in \{1,2,\dots,m\}}.
    \tag{5.1}$$

    ```


    We now make a new edge set $\mathbf{E}_K$, which is a union of $\mathbf{E}$ and
    a set of newly added edges at all pairs of unconnected vertices. So, the graph
    $G = (\mathbf{V}, \mathbf{E}_K)$ is a complete graph, which is denoted as $G_K$.
    Note that a complete graph with $n$ vertices is also denoted as $K(n)$. Then,
    we define $h_{G_K}(p)$ accordingly. Now, we can have concepts for rigidity and
    flexibility as follows:


    **Definition 5.2** (*Rigidity and flexibility* [3]) Consider a framework $f_p
    = (G, p)$. Then it is called *rigid* in $\mathbb{R}^d$ if there exists a neighborhood
    $\mathbf{U}_p$ of $p$ such that


    ```

    $$h_{G_K}^{-1}(h_{G_K}(p)) \cap \mathbf{U}_p = h_G^{-1}(h_G(p)) \cap \mathbf{U}_p,
    \tag{5.2}$$

    ```'
