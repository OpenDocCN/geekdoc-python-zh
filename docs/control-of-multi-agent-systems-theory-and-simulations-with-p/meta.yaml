  md: '# Theorem 2.14 The following facts hold:


    (i) $e^0 = I$ holds, where $0 \in \mathbb{R}^{n \times n}$ is the zero matrix.

    (ii) If two matrices $A_1 \in \mathbb{R}^{n \times n}$ and $A_2 \in \mathbb{R}^{n
    \times n}$ are commutative (i.e., $A_1 A_2 = A_2 A_1$), then

    $$e^{A_1} e^{A_2} = e^{A_1 + A_2} \tag{2.58}$$

    holds. In particular, for any $A \in \mathbb{R}^{n \times n}$ and any $t_1, t_2
    \in \mathbb{R}$, we have

    $$e^{A t_1} e^{A t_2} = e^{A(t_1 + t_2)}. \tag{2.59}$$

    (iii) For any $A \in \mathbb{R}^{n \times n}$ and any non-singular $T \in \mathbb{R}^{n
    \times n}$, we have

    $$e^{T A T^{-1}} = T e^A T^{-1}. \tag{2.60}$$

    (iv) For any $A \in \mathbb{R}^{n \times n}$, we have

    $$e^A e^{-A} = I. \tag{2.61}$$

    That is, $e^{-A}$ is the inverse matrix of $e^A$.

    (v) Let $\{\lambda_1, \lambda_2, \ldots, \lambda_n\}$ be the eigenvalues of $A
    \in \mathbb{R}^{n \times n}$. Then the eigenvalues of $e^A$ are given by $\{e^{\lambda_1},
    e^{\lambda_2}, \ldots, e^{\lambda_n}\}$.


    Now, we can discuss the solution to (2.56) by using the matrix exponential.


    # Theorem 2.15 The solution to the differential equation (2.56) is given by


    $$x(t) = e^{At} x(0), \quad t \ge 0. \tag{2.62}$$


    From Eq. (2.61), the matrix exponential $e^{At}$ is always non-singular, even
    if $A$ is singular. Although the matrix exponential is not necessarily semi-simple,
    we can consider decomposition like the spectral decomposition in (2.41) for $e^{At}$.
    Let $\{\lambda_1, \lambda_2, \ldots, \lambda_r\}$ be distinct eigenvalues of $A$
    without multiplicity. Let $J$ be the Jordan canonical form of $A$ as in (2.33)–(2.36),
    and $T$ be the transformation matrix to $J$, that is, $A = T J T^{-1}$. Then we
    have


    $$\begin{aligned} e^{At} &= e^{T(Jt)T^{-1} } \ &= T e^{Jt} T^{-1} \tag{2.63} \
    &= T \operatorname{diag}\left(e^{J_{11} t}, e^{J_{12} t}, \ldots, e^{J_{ij} t},
    \ldots, e^{J_{\alpha r} t}\right) T^{-1}, \end{aligned}$$


    where


    $$e^{J_{ij} t} \triangleq \left[\begin{array}{cccc} e^{\lambda_i t} & t e^{\lambda_i
    t} & \cdots & \frac{t^{n_{ij}-1}}{(n_{ij}-1)!} e^{\lambda_i t} \ 0 & e^{\lambda_i
    t} & \ddots & \vdots \ \vdots & \ddots & \ddots & t e^{\lambda_i t} \ 0 & \cdots
    & 0 & e^{\lambda_i t} \end{array}\right]. \tag{2.64}$$'
