    can be computed by $[x_j(t) - x_i(t)]_{j \in \mathbf{N}_i(x(t))}$ and the first
    item of Lemma 4.7. Then the coverage controller becomes


    $$u_i(t) = -k\left(x_i(t) - \mathrm{cent}(\mathbf{C}_i(x(t)))\right). \tag{4.30}$$'
