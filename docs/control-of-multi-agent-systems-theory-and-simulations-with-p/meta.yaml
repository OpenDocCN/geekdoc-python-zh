    $$\sum_{\tau=0}^{k-1} \Phi^\tau = (I - \Phi)^{-1}(I - \Phi^k) \to (I - \Phi)^{-1}
    = \alpha^{-1} P^{-1}. \quad (6.33)$$


    由 (6.31) 可得


    $$\lim_{k \to \infty} x[k] = \alpha^{-1} P^{-1} \alpha q = P^{-1} q, \quad (6.34)$$


    这与 (6.27) 完全相同。


    ## 6.3.2 梯度投影算法


    现在，我们考虑一个约束优化问题


    $$\min_{x \in \mathbb{R}^n} f(x) \quad \text{subject to} \quad x \in \mathbf{C},
    \quad (6.35)$$


    其中 $\mathbf{C}$ 是 $\mathbb{R}^n$ 的一个闭的、非空的凸子集。


    那么，*梯度投影算法* 由下式给出


    $$x[k+1] = \Pi_{\mathbf{C}}(x[k] - \alpha \nabla f(x[k])), \quad k = 0, 1, 2,
    \ldots \tag{6.37}$$


    我们在此考虑固定步长。梯度投影算法交替应用 (6.18) 中的梯度下降算法和向 $\mathbf{C}$ 的投影 $\Pi_{\mathbf{C}}$。对于算法
    (6.37) 的收敛性，以下定理 [6, Proposition 3.3.2] 与梯度下降算法的定理 6.2 非常相似：


    **定理 6.3** 设 $\{x[k]\}$ 是由梯度投影算法 (6.37) 生成的序列，其中对所有 $k \in \{0, 1, 2, \ldots\}$
    有 $\alpha_k = \alpha$。假设存在 $L > 0$ 满足 (6.23)。如果 $\alpha \in (0, 2/L)$，那么 $\{x[k]\}$
    的极限点是约束优化问题 (6.35) 的一个解。


    **例 6.2** 这里，我们考虑 *最小范数问题*，即在约束 $x \in \mathbf{C}$ 下最小化二次函数 (6.25)，其中 $P = I$
    且 $q = 0$（即 $f(x) = \frac{1}{2}\|x\|^2$），约束为


    $$\mathbf{C} = \{x \in \mathbb{R}^n : Ax = b\}, \tag{6.38}$$


    其中 $A \in \mathbb{R}^{m \times n}$ ($m \ge n$) 具有满行秩，且 $b \in \mathbb{R}^m$。最小范数问题是在
    (6.38) 定义的 *超平面* $\mathbf{C} \subset \mathbb{R}^n$ 中寻找离原点最近的点（以 $\ell^2$ 范数度量）。首先，投影
    $\Pi_{\mathbf{C}}$ 计算如下（见练习 i）


    $$\Pi_{\mathbf{C}}(v) = v + A^+(b - Av), \tag{6.39}$$


    其中 $A^+$ 是 $A$ 的 *Moore–Penrose 伪逆*，定义为


    $$A^+ \triangleq A^\top (AA^\top)^{-1}. \tag{6.40}$$


    注意，由于 $A$ 具有满行秩，矩阵 $AA^\top$ 是可逆的。然后，我们求解优化问题 (6.35)。由于 $\nabla f(x) = x$，梯度投影算法由下式给出


    $$\begin{aligned} x[k+1] &= \Pi_{\mathbf{C}}(x[k] - \alpha x[k]) \\ &= (1 - \alpha)x[k]
    + A^+(b - A(1 - \alpha)x[k]) \\ &= (1 - \alpha)(I - A^+A)x[k] + A^+b. \end{aligned}
    \tag{6.41}$$


    由此，我们有


    $$\begin{aligned} x[k] &= (1 - \alpha)^k(I - A^+A)^k x[0] + \sum_{\tau=0}^{k-1}
    (1 - \alpha)^\tau (I - A^+A)^\tau A^+b \\ &= (1 - \alpha)^k(I - A^+A)^k x[0] +
    A^+b + \sum_{\tau=1}^{k-1} (1 - \alpha)^\tau (I - A^+A)^\tau A^+b. \end{aligned}
    \tag{6.42}$$


    由于 $AA^+ = I$，我们有 $(I - A^+A)A^+ = A^+ - A^+ = 0$，并且对于 $\tau = 1, 2, \ldots, k
    - 1$，


    $$(I - A^+A)^\tau A^+b = (I - A^+A)^{\tau-1}(I - A^+A)A^+b = 0 \quad (6.43)$$


    因此，我们有


    $$x[k] = (1 - \alpha)^k(I - A^+A)^kx[0] + A^+b. \quad (6.44)$$


    那么，$\nabla f(x) = x$ 的 Lipschitz 常数 $L$ 为 1，定理 6.3 中的收敛条件为 $0 < \alpha < 2$。由于
    $A^+A$ 的特征值为 0 或 1 [3, Proposition 6.1.6]，$(1 - \alpha)(I - A^+A)$ 的特征值位于开单位圆盘
    $\{z \in \mathbb{C} : |z| < 1\}$ 内。因此，当 $k \to \infty$ 时，$(1 - \alpha)^k(I - A^+A)^k
    \to 0$，序列 $\{x[k]\}$ 满足


    $$\lim_{k \to \infty} x[k] = A^+b. \quad (6.45)$$


    这实际上是 (6.46) 的解。$\square$


    **例 6.3** (*Python*) 现在，我们求解优化问题


    $$\min_{x \in \mathbb{R}^n} \frac{1}{2} \|x\|^2 \quad \text{subject to} \quad
    Ax = b, \quad (6.46)$$


    其中 $A$ 和 $b$ 与第 6.2 节中考虑的群组测试相同。(6.41) 中的梯度投影算法在第 6.6.2 节的 Python 代码 6.2 中实现。图
    6.6 显示了 $x[k]$ 与 (6.46) 的闭式解 $A^+b$ 之间的误差。根据此结果，我们可以说 (6.45) 中的性质在小于 $10^{-14}$
    的机器精度内成立。$\square$


    ![](img/6f6a40195ea61efdca2c32abeddbaaca_187_0.png)


