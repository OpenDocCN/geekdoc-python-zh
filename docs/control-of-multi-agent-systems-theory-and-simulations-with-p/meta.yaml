    $$\begin{aligned} x_i[k+1] &= \text{prox}_{f_i/\rho}(z[k] - u_i[k]), \ z[k+1]
    &= \text{prox}_{g/(N\rho)}(\overline{x[k+1]} + \overline{u[k]}), \ u_i[k+1] &=
    u_i[k] + x_i[k+1] - z[k+1]. \end{aligned} \tag{6.142}$$


    In this distributed algorithm, the vectors $x_i[k]$ and $u_i[k]$ are locally updated
    by agent $i$ using the vector $z[k]$ that is updated at and sent from the central
