  md: '# Introduction


    # 1


    # 1.1 What is a Multi-agent System?


    If there are multiple agents, they can form a multi-agent system. You can think
    of a group of mobile robots, a flock of birds, and a crowd of people, as a multi-agent
    system. The academic definition of a multi-agent system is as follows: *A multi-agent
    system*, or a MAS for short, is a system consisting of multiple intelligent agents
    that can autonomously make decisions through local interactions to achieve global
    tasks. We can find a lot of multi-agent systems around us. We showcase important
    examples of multi-agent systems in the real world in Sect. 1.2.


    To obtain a mathematical model of a multi-agent system, the following *three essential
    elements* should be taken into account:


    +   (i) **dynamics** that describe the motion of the agents

    (ii) **network** that shows how the agents connect with each other by local interactions

    (iii) **control** that is taken by each agent for making the multi-agent system
    to be resilient and achieving a global goal.


    For any mathematical model of multi-agent systems, you can find these three essential
    elements. Concrete examples will be shown in the next section. Please carefully
    check what the three essential elements are, how they are mathematically represented,
    and which elements you can design when you consider a multi-agent system. In this
    book, we mainly study the third element, control.


    # 1.2 Multi-agent Systems in the Real World


    # 1.2.1 Sensor Network


    The first example of a real-world multi-agent system is a *sensor network* [81,82].
    A sensor network is a group of multiple sensors that are distributed in an environment'
  merge: -1
  pgno: 17
- img_proc: true
  md: '![](img/6f6a40195ea61efdca2c32abeddbaaca_18_0.png)


    to measure physical values such as temperature, sound, vibration, and pressure.
    In a sensor network, the sensors are connected to a wireless network to transfer
    and exchange data. Each sensor updates its state, e.g., the estimated temperature,
    by such interactions, with a carefully designed control algorithm. By using a
    sensor network, we can construct a low-cost, high-precision sensing system.


    In a wireless sensor network, *multi-hop communication* is often used to transmit
    data to distant sensor nodes. To conserve energy consumed in the sensor network,
    avoid data dropouts, and reduce transmission delays, multi-hop optimal routing
    should be carefully designed.


    There are two types of sensor networks; centralized and distributed networks.
    A *centralized sensor network*, shown in Fig. 1.1a, has a special node called
    the data center that collects the data from all sensor nodes and processes the
    *big data* all at once. On the other hand, a *distributed sensor network* has
    no data center as shown in Fig. 1.1b. Alternatively, each sensor node has a small
    embedded computer that processes observed data for noise reduction, interpolation,
    and estimation using data from neighbor sensors sent through the network. It is
    important for a distributed sensor network to carefully design a distributed algorithm
    that is executed on each sensor node to achieve a global goal. The design theory
    for this is related to *consensus control* of a multi-agent system, which will
    be discussed in Chap. 3, and also distributed optimization discussed in Chap.6.


    # 1.2.2 Systems Biology


    Systems biology is an academic field aiming at understanding, analyzing, and synthesizing
    biological systems from a system point of view. With the rapid development of
    measurement technology, such as microarray technology, systems biology has attracted
    much attention since the late 1990s.


    Systems biology has been studied from different aspects. One of the main targets
    is the biological networks (see, e.g., [5]) such as gene regulatory networks,
    metabolic networks, and neural networks. In such a network, the nodes are dynamical
    systems'
  merge: -1
  pgno: 18
- img_proc: true
  md: 'and the interaction among them exhibits complex behaviors. In this sense, the
    biological networks are treated as a class of multi-agent systems.


    An important topic for a biological network is the analysis and design of the
    attractors. An attractor of a system is a set of state values to which the state
    eventually reaches from an initial state. For example, the set of equilibria is
    an attractor. Other important topics are controllability and observability with
    respect to biologically possible input and output nodes. These three topics are
    the basic issues in the control theory, while the problem settings are rather
    different from the typical ones. In particular, since it is not easy to obtain
    an exact mathematical model of a biological network, the problems are often formulated
    with the assumption that the model is not available but the time-series data of
    the output is available [11,55,76]. On the other hand, the network structures
    of biological networks have been identified and included in several databases
    (e.g., KEGG [39]). By considering this, the problems are addressed, provided that
    only the information of the network structure is available [9,10,12,16].


    # 1.2.3 Swarm Robotics


    Swarm robotics is an engineering discipline that deals with the collective behavior
    of multiple robots under a limited information flow, such as local interactions
    among the robots and between the group of robots and the environment. An example
    of swarm robot systems is shown in Fig. 1.2. Swarm robotics is often inspired
    by the swarms in nature, such as the flock of birds, swarm of ants, and self-organization
    of substances, which give hints to design a swarm robot system.


    The resulting multiple robots are expected to extend or create new functionality
    that cannot be obtained by a single robot, such as fault tolerance, energy efficiency,
    and load balancing. The topics covered in this book are the basics to realize
    this functionality. See [29] for the overview of swarm robotics.


    ![](img/6f6a40195ea61efdca2c32abeddbaaca_19_0.png)


    Fig. 1.2 Swarm robot system in the Mechanical Systems Control Laboratory in Kyoto
    University'
  merge: -1
  pgno: 19
- img_proc: true
  md: '![](img/6f6a40195ea61efdca2c32abeddbaaca_20_0.png)


    ![](img/6f6a40195ea61efdca2c32abeddbaaca_20_1.png)


    (a) Birds flying in a formation. (b) Collective behavior of plants.


    Fig. 1.3 Examples of collective behaviors in nature


    # 1.2.4 Collective Behaviors


    The theory of multi-agent systems could be utilized for analyzing the dynamics
    of collective behaviors (see Fig. 1.3 for examples). One of the most famous models
    is developed in [75], where group behaviors of animals are simulated by a distributed
    model. For the simulations, three different rules ((1) collision avoidance, (2)
    velocity matching, and (3) flock centering) are used. On the other hand, in [17],
    two different rules ((1) individual agents attempt to maintain a minimum inter-agent
    distance, and (2) if the agents do not perform the first rule, they tend to attract
    each other and try to align themselves with neighboring agents) are developed.
    These two rules are modeled by dynamic equations. The attempt to maintain the
    distances between agents could be reformulated in distance-based formation control,
    which will be studied in Chap. 5.


    A simple but advanced dynamic model was developed in [36]. They considered a simple
    interaction rule to have a consensus in state values. The rule of [36] is a consensus
    algorithm, which will be discussed in Chap. 3. Generalized dynamic rules for flocking
    behaviors are developed in [68], which provides mathematical proofs for various
    dynamical motions. So, we can see that the dynamics of collective behaviors have
    been motivated by real animals’ motions, but have been gradually developed into
    mathematical models. The mathematical models have been widely analyzed in control
    systems society. It is noticeable that the early works were conducted in centralized
    simulation setups. That is, in these early works, the state values are defined
    in a common global coordinate frame; however, as the theory has advanced, the
    state values are defined in local coordinate frames [2]. To explain the complicated
    motions of animals, it is important to define the states of collective behaviors
    in local coordinate frames; so the multi-agent systems theory could be nicely
    employed for the analysis of the motions of animals. Chapters 3, 4, and 5 of this
    book will provide theoretical backgrounds for this topic.


    # 1.2.5 UAVs


    One of the most promising applications of multi-agent systems theory is unmanned
    aerial vehicles (UAVs). Although still there are some gaps between the actual'
  merge: -1
  pgno: 20
- img_proc: true
  md: '![](img/6f6a40195ea61efdca2c32abeddbaaca_21_0.png)


    (a) UAVs flying for a surveillance. (b) LED shows of UAVs.


    **Fig. 1.4** Examples of UAVs flying in multi-agent setups


    realization and theory, as the technology of communications, sensors, actuators,
    and on-board processing is advanced, the formation flying or coordination control
    of multiple UAVs has been gradually realistic. The goal of control of multiple
    UAVs could be various, such as surveillance, agriculture, airborne imaging, ad
    hoc communication networking [32], and performance show [42]. Figure 1.4 shows
    some applications of multiple UAVs flying in a formation.


    To realize UAVs in a multi-agent setup, UAVs need to fly in an autonomous way.
    That is, there should be no centralized controller, and they need to communicate
    in an ad hoc network. If UAVs communicate with a central coordinator, it may be
    called a *centralized implementation*. If no central computer or no centralized
    coordinator is used for the operation of UAVs, it may be called *decentralized*
    or *distributed implementation*. Each implementation has some advantages and disadvantages.
    The centralized implementation could handle some emergency situations quite safely
    and could update the command signals in real time as the operator wants. However,
    its coverage of operation is limited and the communication burden would be heavy.
    On the other hand, the decentralized or distributed implementation would require
    less communication signals, and the range of operation is much wider than the
    centralized implementation.


    In this book, as the theoretical background of control of multiple UAVs, fully
    distributed formation control theory is provided in Chap. 5. Also, to have optimal
    mission planning (e.g., trajectory planning or mission assignment), the UAVs may
    have to compute the decision values in a distributed way. Such distributed computation
    could be obtained by distributed optimization. This book provides some basic theoretical
    backgrounds of distributed optimization in Chap. 6. Depending on applications,
    an optimal assignment may be achieved by a coverage control scheme such as the
    Voronoi diagram. The coverage control schemes will be provided in Chap. 4. Also,
    to have formation maintenance, the heading angles of UAVs should be aligned. The
    alignment could be achieved by a consensus scheme, which will be introduced in
    Chap. 3.'
