    # 2.2.8 Perron–Frobenius Theory


    Non-negative and positive matrices have interesting properties of their eigenvalues,
    which are summarized in the *Perron–Frobenius theory*. These properties are often
    used in analyzing networks and multi-agent systems.


    First, we introduce the concept of the *reducibility* of a matrix. A matrix $A
    \in \mathbb{R}^{n \times n}$ ($n \geq 2$) is said to be *reducible* if there exists
    a permutation matrix$^5$ $\Pi \in \mathbb{R}^{n \times n}$ such that


    $$\Pi^\top A \Pi = \begin{bmatrix} A_{11} & A_{12} \ 0 & A_{22} \end{bmatrix},$$


    $^5$ A matrix $\Pi \in \{0, 1\}^{n \times n}$ is called a *permutation matrix*
    if there is precisely one entry equal to 1 in each row and column, and the other
    entries are all 0.'
  - '[PAGE 52]


    where $A_{11}$ and $A_{22}$ are square matrices. For $n = 1$, $A$ is said to be
    reducible if $A = 0$.

    We say $A \in \mathbb{R}^{n \times n}$ is *irreducible* if $A$ is not reducible.
    For the irreducibility of a matrix, the following theorem is useful:


    **Theorem 2.9** *A matrix $A = [a_{ij}] \in \mathbb{R}^{n \times n}$ with $n \geq
    2$ is irreducible if and only if $(I + \text{abs}(A))^{n-1}$ is positive, that
    is,*

    $$(I + \text{abs}(A))^{n-1} > 0, \tag{2.52}$$

    *where $\text{abs}(A)$ is a matrix whose $(i, j)$-entry is $|a_{ij}|$, namely,
    $\text{abs}(A) = [|a_{ij}|] \in \mathbb{R}^{n \times n}$.*


    For non-negative matrices, the following theorem is known as *Perron–Frobenius
    theorem*:


    **Theorem 2.10** (*Perron–Frobenius theorem*) *Let $A \in \mathbb{R}^{n \times
    n}$ be a non-negative matrix. Then, the spectral radius $\rho(A)$ is an eigenvalue
    of $A$, associated with which there exists a non-negative eigenvector (i.e., an
    eigenvector whose elements are all non-negative). Moreover, if $A$ is also irreducible,
    then the following properties hold:*


    +   (i) $\rho(A) > 0$.

    (ii) $\rho(A)$ is a simple eigenvalue of $A$.

    (iii) There exists a positive eigenvector (i.e., the elements are all positive)
    associated with the eigenvalue $\rho(A)$.


    For positive matrices, we have the following theorem called *Perron theorem*:


    **Theorem 2.11** (*Perron theorem*) *Suppose $A \in \mathbb{R}^{n \times n}$ is
    positive. Then the following properties hold:*


    +   (i) $\rho(A) > 0$.

    (ii) $\rho(A)$ is a simple eigenvalue of $A$, and the absolute values of the other
    eigenvalues are strictly less than $\rho(A)$.

