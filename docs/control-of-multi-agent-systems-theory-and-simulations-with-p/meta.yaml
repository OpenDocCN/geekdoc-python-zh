  md: '# 7.3.1 Random Networks


    Here we review *random networks*, or *random graphs*, where the edges are randomly
    chosen with a fixed number of nodes.


    First, we consider a simple random network called the *Erdős–Rényi random graph
    model*. This is a graph $G = (\mathbf{V}, \mathbf{E})$ with $\mathbf{V} = \{1,
    2, \dots, N\}$, where each edge is randomly chosen with a prefixed probability
    $p \in (0, 1)$, that is,


    $(i, j) \in \mathbf{E}, \quad \text{with probability } p, \qquad (7.19)$


    for every $i, j \in \mathbf{V}$. It is easily shown that the *average degree*
    $\langle k \rangle$, the average number of edges per node in $G$, is given by


    $\langle k \rangle = (N - 1)p. \qquad (7.20)$


    Also, the *degree distribution* $P(k)$, the probability of a node to have degree
    $k$, is given by


    $P(k) = \binom{N - 1}{k} p^k (1 - p)^{N - 1 - k}, \quad k = 0, 1, 2, \dots, N
    - 1. \qquad (7.21)$


    **Example 7.4** *(Python)* We can easily generate an Erdős–Rényi random graph
    with the `NetworkX` package. The Python program is given in Sect. 7.4.4.


    We set the number of nodes $N = 100$ and the edge connection probability $p =
    0.02$. We also fix a random seed, `seed = 1`, to generate the same graph for every
    computation. An Erdős–Rényi random graph is generated by using the `NetworkX`
    function `erdos_renyi_graph`. The average degree is computed as `ave_deg = 2.26`
    which is close to $(N - 1)p = 1.98$. Then, the degree distribution is plotted
    as shown in Fig. 7.4. We note that the distribution can be approximated by the
    *Poisson distribution*


    $P(k) \approx \frac{e^{-\lambda} \lambda^k}{k!}, \qquad (7.22)$


    with $\lambda = 2.26$ (the average degree of the network).


    Let us consider another random graph whose degree distribution follows a power
    law. In other words, it is a random graph whose degree distribution satisfies


    $P(k) \propto k^{-\alpha}, \qquad (7.23)$


    for large $k$, where $\alpha$ is a positive parameter. Such a network is called
    a *scale-free network*. Scale-free networks can be found around us; social networks,
    computer networks like the WWW, airline networks, and contact networks [1,2].'
