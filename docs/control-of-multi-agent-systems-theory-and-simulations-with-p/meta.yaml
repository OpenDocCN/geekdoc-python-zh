  md: 'To define infinitesimal motions, taking a derivative of $g_G(p)$ as $\dot{g}_G(p(t))$,
    we can have


    $$\dot{g}_G(p(t)) = \frac{\partial g_G}{\partial p}(p(t))\frac{\partial p}{\partial
    t} = R_w(t)\dot{p}(t). \tag{5.22}$$


    Thus, the set of infinitesimal motions for a weakly rigid formation system (denoted
    as $\mathbf{M}_w$) can be defined as


    $$\mathbf{M}_w \triangleq \{\delta p \ : \ R_w\delta p = 0, \delta p \neq 0\}.
    \tag{5.23}$$


    The set $\mathbf{M}_w$ is equal to the null space of $R_w$. To understand the
    null space of $R_w$ in the three-dimensional space (i.e., $d=3$), let us use the
    following rotation matrices:


    $$J_1 \triangleq \begin{bmatrix} 0 & 0 & 0 \ 0 & 0 & -1 \ 0 & 1 & 0 \end{bmatrix}
    ; \ J_2 \triangleq \begin{bmatrix} 0 & 0 & 1 \ 0 & 0 & 0 \ -1 & 0 & 0 \end{bmatrix}
    ; \ J_3 \triangleq \begin{bmatrix} 0 & -1 & 0 \ 1 & 0 & 0 \ 0 & 0 & 0 \end{bmatrix}
    . \tag{5.24}$$


    With $J_1$, $J_2$, and $J_3$, we further define


    $$\mathbf{L}_R \triangleq \{\mathbf{1}_n \otimes I_3, (I_n \otimes J_1)p, (I_n
    \otimes J_2)p, (I_n \otimes J_3)p\}, \tag{5.25}$$


    and


    $$\mathbf{L}_S \triangleq \{\mathbf{1}_n \otimes I_3, (I_n \otimes J_1)p, (I_n
    \otimes J_2)p, (I_n \otimes J_3)p, p\}. \tag{5.26}$$


    In the above sets, the element $\mathbf{1}_n \otimes I_3$ represents linear translational
    motions along three independent axes in the three-dimensional space; $(I_n \otimes
    J_1)p$, $(I_n \otimes J_2)p$ and $(I_n \otimes J_3)p$ represent rotational motions
    around three independent axes, respectively; and $p$ represents a scaling motion
    of a formation system. Thus, we can consider $\mathbf{L}_R$ as the set of bases
    of infinitesimal motions when $\mathbf{E} \neq \emptyset$ and $\mathbf{A} \neq
    \emptyset$, and consider $\mathbf{L}_S$ as the set of bases of infinitesimal motions
    when $\mathbf{E} = \emptyset$ and $\mathbf{A} \neq \emptyset$, respectively. Thus,
    in the three-dimensional space, we could make the following observation for a
    weakly rigid formation system:


    **Lemma 5.4** ([14]) *Given a framework $f_p = (\mathbf{V}, \mathbf{E}, \mathbf{A},
    p)$, it holds $\text{span}(\mathbf{L}_R) \subseteq \text{ker}(R_w)$ for $\mathbf{E}
    \neq \emptyset$, and $\text{span}(\mathbf{L}_S) \subseteq \text{ker}(R_w)$ for
    $\mathbf{E} = \emptyset$.*


    Moreover, the above lemma immediately results in the conclusion that, when $\mathbf{E}
    \neq \emptyset$, $\text{rank}(R_w) \leq dn - \frac{d(d+1)}{2}$, and when $\mathbf{E}
    = \emptyset$, $\text{rank}(R_w) \leq dn - \frac{d(d+1)}{2} - 1$. In the case of
    $\mathbf{E} \neq \emptyset$, it is equal to (5.5) since only translational and
    rotational motions are trivial ones. However, in the case of $\mathbf{E} = \emptyset$,
    since there is no distance constraint anymore, there could exist a scaling motion.
    That is why $\text{rank}(R_w)$ is upper bounded'
