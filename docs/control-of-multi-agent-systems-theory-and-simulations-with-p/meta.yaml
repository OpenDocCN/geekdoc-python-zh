- md: '## Viral Spreading Phenomenon


    ### Key Points


    - SI (susceptible–infected), SIS (susceptible–infected–susceptible), and SIR (susceptible–infected–recovered)
    models under the homogeneous mixing hypothesis are given as a simple system of
    ordinary differential equations.

    - The degree distribution of an Erdős–Rényi random graph is approximated by the
    Poisson distribution, while that of a scale-free network follows a power law.

    - A scale-free network with an exponent between 2 and 3 has a few nodes called
    hubs that have very large degrees.

    - Under SI, SIS, and SIR models over a scale-free network with an exponent between
    2 and 3, the virus instantly spreads due to a few hubs.


    ### 7.1 Viral Spreading Phenomenon over Complex Networks


    The spreading phenomenon can be found in many practical networks. For example,
    the spread of information, such as ideas, news, and rumors can be found on online
    social networks such as X (Twitter), Facebook, and LinkedIn. Also, we have been
    experiencing the spread of infectious diseases through a population, which can
    be modeled as a spreading phenomenon over a human network. In this chapter, we
    introduce basic mathematical models for the viral spreading phenomenon by which
    we analyze the dynamical behaviors as a multi-agent system, analytically and by
    simulation.


    **Supplementary Information** The online version contains supplementary material
    available at https://doi.org/10.1007/978-3-031-52981-8_7.


    © The Author(s), under exclusive license to Springer Nature Switzerland AG 2024

    M. Nagahara et al., *Control of Multi-agent Systems*, Advanced Textbooks in Control
    and Signal Processing, https://doi.org/10.1007/978-3-031-52981-8_7


    207


    ### 7.2 Mathematical Models of Viral Spreading Phenomenon


    In this section, we introduce some mathematical models that describe the spreading
    phenomenon over a network.


    #### 7.2.1 SI Model


    The first model we consider is the *SI model*, in which all agents (or humans)
    in a network have only two states, Susceptible (S) and Infected (I). A susceptible
    agent has not yet been infected by any virus. An infected agent has been infected
    and can infect susceptible agents around. In the SI model, we assume that all
    infected agents never recover and remain in the infected state forever.


    Let $N$ be the number of agents in a network. Let $S(t)$ and $I(t)$ be the number
    of susceptible and infected agents at time $t \geq 0$, respectively. Then, we
    have


    $$S(t) + I(t) = N, \tag{7.1}$$


    for all $t \geq 0$. We assume that at the initial time $t = 0$, there are $S_0$
    susceptible agents and $I_0$ infected agents. That is,


    $$S(0) = S_0, \quad I(0) = I_0. \tag{7.2}$$


    Then, we assume that the agents are well mixed so that every agent has an equal
    probability of contacting every other agent. This assumption is called *homogeneous
    mixing hypothesis*. With this assumption, we do not need to care about the structure
    of the network. Under the homogeneous mixing hypothesis, each infected agent encounters
    a susceptible agent at probability $S(t)/N$. Then, the virus will be transmitted
    from an infected agent to a susceptible agent at probability $\alpha$ per unit
    time, which is assumed to be the same for all agents. Let $\mu$ be the average
    number of contacts for each agent, namely the average degree of the contact network.
    In summary, at time $t \geq 0$, $I(t)$ infected agents contact $\mu$ agents, $S(t)/N$
    of which are susceptible and infected at probability $\alpha$ per unit time. Therefore,
    the average number $\Delta I$ of new infected agents during a short period $\Delta
    t$ is given by


    $$\Delta I = \frac{\alpha \mu S(t)}{N} \times I(t) \times \Delta t. \tag{7.3}$$


    Taking $\Delta t \to 0$, we have the following differential equation:


    $$\frac{dI}{dt} = \beta S(t) I(t), \tag{7.4}$$


    where $\beta \triangleq \alpha \mu / N$ which is called the *transmission coefficient*.


    ![](img/6f6a40195ea61efdca2c32abeddbaaca_224_0.png)


    **Fig. 7.1** Simulation result of (7.5)


    The differential equation (7.4) with constraint (7.1) and initial condition (7.2)
    has a closed-form solution. In fact, we have the following solution:


    $$S(t) = \frac{S_0}{s_0 + i_0 e^{\lambda t}}, \quad I(t) = \frac{I_0 e^{\lambda
    t}}{s_0 + i_0 e^{\lambda t}}, \qquad (7.5)$$


    where $s_0 \triangleq S_0/N$, $i_0 \triangleq I_0/N$, and $\lambda \triangleq
    N\beta$. The number $\lambda$ is called the *transmission rate* or *transmissibility*.
    Also, we define the *characteristic time* $\tau \triangleq 1/\lambda = 1/(N\beta)$,
    which roughly shows the time of virus spread over the network.


    Since $\lambda > 0$, it is easily understood that when $t \to \infty$, we have


    $$\lim_{t \to \infty} S(t) = 0, \quad \lim_{t \to \infty} I(t) = N. \qquad (7.6)$$


    That is, all agents become infected after all.


    **Example 7.1** (*Python*) Let us run a simulation of the SI model with Python.
    The Python program is given in Sect. 7.4.1. We set the number of agents $N = 100$,
    the transmission rate $\lambda = 2$, and the initial numbers $I(0) = 1$ and $S(0)
    = N - I(0) = 99$. The simulation is done based on the closed-form solution (7.5),
    and the result is shown in Fig. 7.1. The limiting property in (7.6) is observed
    in Fig. 7.1. $\square$


    #### 7.2.2 SIS Model


    We can extend the SI model to a bit more realistic model, called the *SIS* model.
    In this model, each infected agent will recover and go back to the susceptible
    state at probability $\gamma$ per unit time. The number $\gamma$ is called the
    *recovery rate*. The associated differential equation is given by


    $$\frac{dI}{dt} = \beta S(t)I(t) - \gamma I(t). \tag{7.7}$$


    With constraint (7.1) and initial condition (7.2), this differential equation
    also has a closed-form given by


    $$I(t) = \frac{(\lambda - \gamma)I_0 e^{(\lambda - \gamma)t}}{(\lambda - \gamma)
    + \beta I_0 (e^{(\lambda - \gamma)t} - 1)} = N \left(1 - \frac{\gamma}{\lambda}\right)
    \frac{C e^{(\lambda - \gamma)t}}{1 + C e^{(\lambda - \gamma)t}}, \tag{7.8}$$


    where $\lambda = N\beta$ and $C$ is defined as


    $$C = \frac{i_0}{1 - i_0 - \gamma/\lambda}, \quad i_0 = \frac{I_0}{N}. \tag{7.9}$$


    The characteristic time $\tau$ is given from (7.8) as


    $$\tau = \frac{1}{\lambda - \gamma} = \frac{1}{N\beta - \gamma}. \tag{7.10}$$


    From this, we can say that if $\lambda - \gamma < 0$, or


    $$R_0 \triangleq \frac{\lambda}{\gamma} = \frac{N\beta}{\gamma} < 1, \tag{7.11}$$


    then the number of infected people decreases by (7.8). The number $R_0$ is called
    the *basic reproductive number*. From (7.8), we can easily see that


    $$\lim_{t \to \infty} I(t) = \begin{cases} N(1 - R_0^{-1}), & \text{if } R_0 >
    1, \\ 0, & \text{if } R_0 < 1. \end{cases} \tag{7.12}$$


    The basic reproductive number $R_0$ is very important to control viral spreading.
    If we can reduce $R_0$ to less than 1 by social distancing for example, then the
    number of infected people decreases to zero from (7.12).


    **Example 7.2** (*Python*) Here we show a Python simulation of the SIS model.
    The Python program is given in Sect. 7.4.2. We set $N = 100$, $I_0 = 10$, and
    $\lambda = 2$. We compute the curves of $I(t)$ for $\gamma = 1$ (i.e., $R_0 =
    2 > 1$), and $\gamma = 3$ (i.e., $R_0 = 2/3 < 1$). Figure 7.2 shows the results.
    From these results, we can see that if $R_0 > 1$, then $I(t)$ approaches $N(1
    - R_0^{-1}) = 50$, and if $R_0 < 1$, then $I(t)$ converges to zero as indicated
    in (7.12).


    ![](img/6f6a40195ea61efdca2c32abeddbaaca_226_0.png)


    **Fig. 7.2** Simulation results: $I(t)$ with the basic reproductive number $R_0
    > 1$ (left) and $R_0 < 1$ (right)


    #### 7.2.3 SIR Model


    In the SIS model, we assume that infected agents recover and become susceptible
    agents. In this subsection, we instead add a new state called Recovered (R) and
    consider the *SIR model*. In this model, infected agents recover at rate $\gamma$
    as in the SIS model, but the recovered agents never get infected but move to the
    recovered state. The dynamics is described as follows:


    $$\frac{dS}{dt} = -\beta S(t)I(t), \quad (7.13)$$

    $$\frac{dI}{dt} = \beta S(t)I(t) - \gamma I(t), \quad (7.14)$$

    $$\frac{dR}{dt} = \gamma I(t). \quad (7.15)$$


    We note that there is no closed-form solution for the system of differential equations.
    First, from (7.13)–(7.15), we have


    $$\frac{d}{dt}(S + I + R) = 0. \quad (7.16)$$


    Since the population is $N$, we have


    $$S(t) + I(t) + R(t) = N, \quad t \ge 0. \quad (7.17)$$


    Let us assume $I(0) + R(0) = N$ and $R(0) = 0$. We further assume that there are
    a very small number of infected agents, namely, $I(0) \ll N$, and the infected
    agents have very little influence on the susceptible agents at an initial short
    time duration. In other words, we assume $S(t) \approx S(0)$ for $t \approx 0$.
    Then, we have a linearized model for (7.14):


    $$\frac{dI}{dt} = \beta S(0)I(t) - \gamma I(t) = \lambda_0 I(t), \quad (7.18)$$'
  mdcn: '## 病毒传播现象


    ### 关键要点


    - 在均匀混合假设下，SI（易感-感染）、SIS（易感-感染-易感）和SIR（易感-感染-康复）模型被表示为一个简单的常微分方程组。

    - 埃尔德什-雷尼随机图的度分布近似于泊松分布，而无标度网络的度分布遵循幂律分布。

    - 指数在2到3之间的无标度网络中存在少数称为枢纽的节点，它们具有非常大的度。

    - 在指数介于2到3之间的无标度网络上，基于SI、SIS和SIR模型，病毒会因少数枢纽节点而瞬间传播。


    ### 7.1 复杂网络上的病毒传播现象


    传播现象可见于许多实际网络中。例如，信息（如观点、新闻和谣言）的传播可见于X（Twitter）、Facebook和LinkedIn等在线社交网络。此外，我们一直经历着传染病在人群中的传播，这可以建模为在人类网络上的传播现象。在本章中，我们介绍病毒传播现象的基本数学模型，通过这些模型，我们从解析和仿真角度分析多智能体系统的动态行为。


    **补充信息** 在线版本包含补充材料，可访问 https://doi.org/10.1007/978-3-031-52981-8_7。


    © 作者，经Springer Nature Switzerland AG 2024独家许可

    M. Nagahara 等，《多智能体系统控制》，控制与信号处理高级教科书，https://doi.org/10.1007/978-3-031-52981-8_7


    207


    ### 7.2 病毒传播现象的数学模型


    在本节中，我们介绍一些描述网络上传播现象的数学模型。


    #### 7.2.1 SI模型


    我们考虑的第一个模型是*SI模型*，其中网络中的所有智能体（或人）只有两种状态：易感（S）和感染（I）。易感智能体尚未被任何病毒感染。感染智能体已被感染，并能感染周围的易感智能体。在SI模型中，我们假设所有感染智能体永远不会康复，并永远保持在感染状态。


    设$N$为网络中的智能体数量。设$S(t)$和$I(t)$分别为时间$t \geq 0$时的易感和感染智能体数量。那么，对于所有$t \geq 0$，我们有


    $$S(t) + I(t) = N, \tag{7.1}$$


    我们假设在初始时间$t = 0$时，有$S_0$个易感智能体和$I_0$个感染智能体。即，


    $$S(0) = S_0, \quad I(0) = I_0. \tag{7.2}$$


    然后，我们假设智能体充分混合，使得每个智能体接触其他每个智能体的概率相等。这个假设被称为*均匀混合假设*。在此假设下，我们无需关心网络的结构。在均匀混合假设下，每个感染智能体遇到易感智能体的概率为$S(t)/N$。那么，病毒将以每单位时间$\alpha$的概率从感染智能体传播给易感智能体，该概率对所有智能体都相同。设$\mu$为每个智能体的平均接触数，即接触网络的平均度。总之，在时间$t
    \geq 0$，$I(t)$个感染智能体接触$\mu$个智能体，其中$S(t)/N$个是易感的，并以每单位时间$\alpha$的概率被感染。因此，在短时间$\Delta
    t$内新感染智能体的平均数量$\Delta I$由下式给出


    $$\Delta I = \frac{\alpha \mu S(t)}{N} \times I(t) \times \Delta t. \tag{7.3}$$


    取$\Delta t \to 0$，我们得到以下微分方程：


    $$\frac{dI}{dt} = \beta S(t) I(t), \tag{7.4}$$


    其中$\beta \triangleq \alpha \mu / N$，称为*传播系数*。


    ![](img/6f6a40195ea61efdca2c32abeddbaaca_224_0.png)


    **图 7.1** (7.5)的仿真结果


    具有约束(7.1)和初始条件(7.2)的微分方程(7.4)具有解析解。事实上，我们有以下解：


    $$S(t) = \frac{S_0}{s_0 + i_0 e^{\lambda t}}, \quad I(t) = \frac{I_0 e^{\lambda
    t}}{s_0 + i_0 e^{\lambda t}}, \qquad (7.5)$$


    其中$s_0 \triangleq S_0/N$，$i_0 \triangleq I_0/N$，且$\lambda \triangleq N\beta$。数$\lambda$称为*传播率*或*传染性*。此外，我们定义*特征时间*$\tau
    \triangleq 1/\lambda = 1/(N\beta)$，它大致表示病毒在网络上传播所需的时间。


    由于$\lambda > 0$，很容易理解当$t \to \infty$时，我们有


    $$\lim_{t \to \infty} S(t) = 0, \quad \lim_{t \to \infty} I(t) = N. \qquad (7.6)$$


    即，所有智能体最终都会被感染。


    **例 7.1** (*Python*) 让我们用Python运行SI模型的仿真。Python程序在第7.4.1节给出。我们设置智能体数量$N = 100$，传播率$\lambda
    = 2$，初始数量$I(0) = 1$和$S(0) = N - I(0) = 99$。仿真基于解析解(7.5)进行，结果如图7.1所示。在图7.1中观察到了(7.6)中的极限性质。$\square$


    #### 7.2.2 SIS模型


    我们可以将SI模型扩展到一个更现实的模型，称为*SIS*模型。在此模型中，每个感染智能体将以每单位时间$\gamma$的概率康复并回到易感状态。数$\gamma$称为*康复率*。相关的微分方程由下式给出


    $$\frac{dI}{dt} = \beta S(t)I(t) - \gamma I(t). \tag{7.7}$$


    具有约束(7.1)和初始条件(7.2)，该微分方程也具有解析解，由下式给出


    $$I(t) = \frac{(\lambda - \gamma)I_0 e^{(\lambda - \gamma)t}}{(\lambda - \gamma)
    + \beta I_0 (e^{(\lambda - \gamma)t} - 1)} = N \left(1 - \frac{\gamma}{\lambda}\right)
    \frac{C e^{(\lambda - \gamma)t}}{1 + C e^{(\lambda - \gamma)t}}, \tag{7.8}$$


    其中$\lambda = N\beta$，$C$定义为


    $$C = \frac{i_0}{1 - i_0 - \gamma/\lambda}, \quad i_0 = \frac{I_0}{N}. \tag{7.9}$$


    特征时间$\tau$由(7.8)给出为


    $$\tau = \frac{1}{\lambda - \gamma} = \frac{1}{N\beta - \gamma}. \tag{7.10}$$


    由此，我们可以说如果$\lambda - \gamma < 0$，或者


    $$R_0 \triangleq \frac{\lambda}{\gamma} = \frac{N\beta}{\gamma} < 1, \tag{7.11}$$


    那么根据(7.8)，感染人数会减少。数$R_0$称为*基本再生数*。从(7.8)我们可以很容易地看出


    $$\lim_{t \to \infty} I(t) = \begin{cases} N(1 - R_0^{-1}), & \text{if } R_0 >
    1, \\ 0, & \text{if } R_0 < 1. \end{cases} \tag{7.12}$$


    基本再生数$R_0$对于控制病毒传播非常重要。如果我们能通过保持社交距离等方式将$R_0$降低到1以下，那么根据(7.12)，感染人数将减少到零。


    **例 7.2** (*Python*) 这里我们展示SIS模型的Python仿真。Python程序在第7.4.2节给出。我们设置$N = 100$，$I_0
    = 10$，和$\lambda = 2$。我们计算$\gamma = 1$（即$R_0 = 2 > 1$）和$\gamma = 3$（即$R_0 = 2/3
    < 1$）时的$I(t)$曲线。图7.2显示了结果。从这些结果我们可以看到，如果$R_0 > 1$，则$I(t)$趋近于$N(1 - R_0^{-1}) =
    50$；如果$R_0 < 1$，则$I(t)$如(7.12)所示收敛到零。


    ![](img/6f6a40195ea61efdca2c32abeddbaaca_226_0.png)


    **图 7.2** 仿真结果：基本再生数$R_0 > 1$（左）和$R_0 < 1$（右）时的$I(t)$


    #### 7.2.3 SIR模型


    在SIS模型中，我们假设感染智能体康复后成为易感智能体。在本小节中，我们改为添加一个称为康复（R）的新状态，并考虑*SIR模型*。在此模型中，感染智能体以与SIS模型相同的速率$\gamma$康复，但康复的智能体永远不会被感染，而是进入康复状态。动力学描述如下：


    $$\frac{dS}{dt} = -\beta S(t)I(t), \quad (7.13)$$

    $$\frac{dI}{dt} = \beta S(t)I(t) - \gamma I(t), \quad (7.14)$$

    $$\frac{dR}{dt} = \gamma I(t). \quad (7.15)$$


    我们注意到该微分方程组没有解析解。首先，从(7.13)–(7.15)，我们有


    $$\frac{d}{dt}(S + I + R) = 0. \quad (7.16)$$


    由于总人口为$N$，我们有


    $$S(t) + I(t) + R(t) = N, \quad t \ge 0. \quad (7.17)$$


    让我们假设$I(0) + R(0) = N$且$R(0) = 0$。我们进一步假设感染智能体数量非常少，即$I(0) \ll N$，并且在初始短时间内感染智能体对易感智能体的影响很小。换句话说，我们假设对于$t
    \approx 0$，$S(t) \approx S(0)$。那么，我们得到(7.14)的线性化模型：


    $$\frac{dI}{dt} = \beta S(0)I(t) - \gamma I(t) = \lambda_0 I(t), \quad (7.18)$$'
