    ## 7.5 Summary


    In this chapter, we have studied mathematical models of viral spreading over a
    network. First, we assumed the homogeneous mixing hypothesis, under which we derived
    ordinary differential equation models of SI, SIS, and SIR. Then, we introduced
    complex random networks that do not necessarily satisfy the homogeneous mixing
    hypothesis. The SI and SIR models are obtained under such complex networks. Finally,
    by Python with NDlib package, we can easily execute multi-agent simulation of
    a pandemic over a complex network.'
