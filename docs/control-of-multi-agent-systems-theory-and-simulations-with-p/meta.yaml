    $v = (v_1, \dots, v_N)$ 的投影 $\Pi_{\mathbf{C}}(v)$ 由下式给出（见练习 iii）


    $$\Pi_{\mathbf{C}}(v) = \begin{bmatrix} \bar{v} \\ \vdots \\ \bar{v} \end{bmatrix},
