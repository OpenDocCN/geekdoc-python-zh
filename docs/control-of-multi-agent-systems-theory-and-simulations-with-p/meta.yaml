- img_proc: true
  md: 'The objective function $J$ can be defined in several ways. A typical form is
    given by


    $$J(x) = \int_{\mathbf{Q}} \min_{i \in \{1, 2, \dots, n\}} h(\|q - x_i\|) \phi(q)
    dq, \quad (4.5)$$


    where $x = [x_1^\top \ x_2^\top \ \cdots \ x_n^\top]^\top \in \mathbb{R}^{mn}$,
    $h : \mathbb{R}_+ \to \mathbb{R}$ is a nondecreasing, piecewise differentiable,
    and integrable function on $\mathbf{Q}$, and $\phi : \mathbb{R}^m \to \mathbb{R}_{0+}$
    is an integrable function on $\mathbf{Q}$. The function $h$ is called the *performance
    function*, which quantifies the utility of the location $q \in \mathbf{Q}$ at
    a certain distance from agent $i$ (a smaller value indicates more utility), and
    thus $\min_{i \in \{1, 2, \dots, n\}} h(\|q - x_i\|)$ represents the utility of
    the location $q$ with respect to the nearest ones in $x_1, x_2, \dots, x_n$ in
    the sense of the distance $\|q - x_i\|$. On the other hand, $\phi$ describes the
    importance of the location $q \in \mathbf{Q}$. It is called the *weighting function*.
    Therefore, $\min_{i \in \{1, 2, \dots, n\}} h(\|q - x_i\|) \phi(q)$ represents
    a weighted utility of the location $q$ generated by the nearest agent and $J(x)$
    is the total weighted utility on $\mathbf{Q}$.


    To illustrate this function $J$, let us consider the situation where


    +   - the agents are mobile sensors equipped with a vision sensor,

    - the agents are to be deployed on the workspace $\mathbf{Q}$ to detect an anomaly
    at each location $q \in \mathbf{Q}$, and

    - the amount of the economic loss caused by an anomaly varies depending on the
    location $q$.


    It is natural to assume that the detection accuracy of the vision sensor at $x_i$
    degrades with the distance $\|q - x_i\|$. This property, i.e., the relation between
    the detection accuracy and the distance $\|q - x_i\|$, is represented by the function
    $h$. Meanwhile, the locations with the potential of large economic loss are relatively
    important in the detection process. This is described by the function $\phi$.


    # 4.2 Voronoi Diagrams


    A *Voronoi diagram*, which is a concept of geometry, plays an important role to
    solve the coverage problem for the objective function in (4.5). In this section,
    we introduce its concept and some properties.


    # 4.2.1 Definition


    Consider a set $\mathbf{Q} \subset \mathbb{R}^m$ and $n$ distinct points $x_i$
    ($i = 1, 2, \dots, n$) in $\mathbf{Q}$. Although $\mathbf{Q}$ is assumed to be
    closed in Sect. 4.1, it is necessarily neither bounded nor closed in this section.
    An example is illustrated in Fig. 4.3, where $m = 2$, $\mathbf{Q} = [0, 1] \times
    [0, 1]$, $n = 10$, and the points are indicated by dots.'
  merge: -1
  pgno: 103
- img_proc: true
  md: 'The *Voronoi diagram* for the set **Q** and the points $x_i \in \mathbf{Q}
    (i = 1, 2, \dots, n)$ is the partition of **Q** such that


    +   - each region, which is resulted by the partition, contains exactly one point,

    - the point in each region is the nearest point to any locations in the region.


    More precisely, the Voronoi diagram is defined as the set (of sets)


    $\{\mathbf{C}_1(x), \mathbf{C}_2(x), \dots, \mathbf{C}_n(x)\},$ (4.6)


    where $x \triangleq [x_1^\top \; x_2^\top \; \cdots \; x_n^\top]^\top$ and


    $\mathbf{C}_i(x) \triangleq \{q \in \mathbf{Q} : \|q - x_i\| \leq \|q - x_j\|
    \; (j = 1, 2, \dots, n)\} \; (i = 1, 2, \dots, n).$ (4.7)


    The set $\mathbf{C}_i(x)$ is called the *Voronoi cell* of the point $i$. The Voronoi
    cells have disjoint interiors but may share their boundaries. Note that a Voronoi
    diagram is properly defined only if $x_i \neq x_j$ for $i \neq j$.


    **Example 4.1** Consider the set $\mathbf{Q} = [0, 1] \times [0, 1]$ and the points


    $x_1 \triangleq \begin{bmatrix} 0.1 \ 0.1 \end{bmatrix}, \; x_2 \triangleq \begin{bmatrix}
    0.8 \ 0.6 \end{bmatrix}, \; x_3 \triangleq \begin{bmatrix} 0.2 \ 0.7 \end{bmatrix},
    \; x_4 \triangleq \begin{bmatrix} 0.6 \ 0.2 \end{bmatrix}, \; x_5 \triangleq \begin{bmatrix}
    0.3 \ 0.2 \end{bmatrix},$

    $x_6 \triangleq \begin{bmatrix} 0.3 \ 0.5 \end{bmatrix}, \; x_7 \triangleq \begin{bmatrix}
    0.9 \ 0.1 \end{bmatrix}, \; x_8 \triangleq \begin{bmatrix} 0.8 \ 0.9 \end{bmatrix},
    \; x_9 \triangleq \begin{bmatrix} 0.6 \ 0.7 \end{bmatrix}, \; x_{10} \triangleq
    \begin{bmatrix} 0.5 \ 0.4 \end{bmatrix},$


    which are distinct from each other and illustrated in Fig. 4.3. Then the Voronoi
    diagram is given by Fig. 4.4, which is generated by Python Code 4.1 in Sect. 4.5.1,
    where the dots express the points $x_i (i = 1, 2, \dots, 10)$ and the solid lines
    represent the boundaries of the Voronoi cells. $\square$


    The following property is useful for computing and analyzing Voronoi diagrams:


    **Lemma 4.1** *Consider the Voronoi diagram $\{\mathbf{C}_1(x), \mathbf{C}_2(x),
    \dots, \mathbf{C}_n(x)\}$ for a set $\mathbf{Q} \subset \mathbb{R}^m$ and $n$
    distinct points $x_i \in \mathbf{Q} (i = 1, 2, \dots, n)$. Let $\{q \in \mathbb{R}^m
    : D_{ij}q + d_{ij} = 0\}$ denote the perpendicular bisector of the line segment
    between $x_i$ and $x_j$, where $D_{ij} \in \mathbb{R}^{1 \times m}$ is a row vector
    and $d_{ij} \in \mathbb{R}$ is a scalar such that $D_{ij}x_i + d_{ij} \leq 0$.
    Then*


    $\mathbf{C}_i(x) = \mathbf{Q} \cap \left( \bigcap_{j \in \{1, 2, \dots, n\} \setminus
    \{i\}} \{q \in \mathbb{R}^m : D_{ij}q + d_{ij} \leq 0\} \right).$ (4.8)


    **Proof** By the definition of perpendicular bisectors, we have


    $\{q \in \mathbb{R}^m : D_{ij}q + d_{ij} \leq 0\} = \{q \in \mathbb{R}^m : \|q
    - x_i\| \leq \|q - x_j\|\}$ (4.9)


    for $j \neq i$. This and the definition of Voronoi cells, i.e., (4.7), prove (4.8).
    $\square$'
