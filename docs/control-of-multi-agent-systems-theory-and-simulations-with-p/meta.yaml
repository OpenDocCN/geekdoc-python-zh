    network $G = (\mathbf{V}, \mathbf{E})$, where $\mathbf{V} = \{1, 2, \ldots, N\}$
    is the set of vertices (i.e., agents), and $\mathbf{E} \subset \mathbf{V} \times
    \mathbf{V}$ is the set of edges (i.e., links between interactive agents). We assume
