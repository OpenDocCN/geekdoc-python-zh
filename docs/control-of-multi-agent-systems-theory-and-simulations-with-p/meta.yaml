  md: '# Series Editor’s Foreword


    The beauty of the discipline of automatic control lies in the wide variety of
    application areas and ways in which it can be approached. The community includes
    scientists from purely mathematical backgrounds who find their place in the context
    of control theory, as well as engineers more experienced in control-enabling technologies,
    or researchers interested in the implementation of automatic controls in so many
    engineering and non-engineering application areas. The *Advanced Textbooks in
    Control and Signal Processing* series aims to provide a field of publication of
    interest to all these professionals who characterize the automatic control community,
    emphasizing both new emerging areas and more traditional aspects, perhaps revisited
    in a modern way and with an emphasis on innovative aspects and tools. The target
    audience of the series is also varied, addressing both young people eager to become
    familiar with topics never before addressed and a more expert audience. Often,
    and this is the case with the text presented below, the volumes in the series
    also emphasize implementation and numerical aspects, showing how abstract theories
    also have an immediate result at the simulation level, thus expanding the pool
    of interested potential readers.


    A field that has gained increasing popularity in recent decades is that of multi-agent
    control systems, the subject of this volume. The context is one in which a number
    of dynamic systems interact with each other by exchanging potentially limited
    information according to certain interconnection structures. The objective is
    to analyse a collective behaviour resulting from the interaction and possibly
    influence its overall performance by acting in a decentralized manner on individual
    subsystems. There are many engineering, natural and social spheres where such
    collective behaviour is exhibited and where a rigorous theory and appropriate
    tools are required fully to understand the phenomena, whether positive or potentially
    catastrophic, that arise from interaction. Noteworthy in this sense is the dramatic
    experience of the recent COVID-19 pandemic. It is no coincidence that tools typically
    adopted in the field of systems control theory on networks have made it possible
    to model virus-propagation phenomena scientifically and propose solutions to confine
    the virus. Another highly topical area of application is that of machine learning,
    in which the study of graph neural networks can be approached with tools typical
    of multi-agent systems.'
  merge: -1
  pgno: 5
- img_proc: true
  md: 'In this volume, the authors Masaaki Nagahara (Hiroshima University), Shun-Ichi
    Azuma (Kyoto University) and Hyo-Sung Ahn (Gwangju Institute of Science and Technology)
    deal with the subject of multi-agent systems in a very clear, rigorous and comprehensive
    manner. The subject of multi-agent systems lends itself to encompassing a multitude
    of different sub-areas, ranging from the so-called “consensus control”, in which
    predetermined outputs of agents must achieve a common pattern, to “coverage control”,
    in which agents must cover a predetermined area according to a certain uniformity
    and density, to “formation control”, in which, thinking of agents as a fleet of
    robots, the latter must be controlled to follow pre-determined trajectories while
    maintaining a desired spatial pattern. The topic typically also includes the area
    known as “distributed optimization” in which a global system “optimum” is achieved
    cooperatively by individual agents that are appropriately controlled to achieve
    local optimums. The authors deal with all these sub-areas in the volume, devoting
    a chapter to each, in a non-repetitive manner from a mathematical and expository
    point of view, under the common umbrella of multi-agent systems. The book is also
    made very topical by the addition of a final chapter that introduces mathematical
    models capable of describing the complex dynamics of virus propagation by scientifically
    showing the strong influence that the interconnection structure has in spreading
    or confining the virus.


    On a mathematical level, the book is decidedly self-contained, presenting all
    the tools of linear algebra and graph theory instrumental to the development of
    the algorithms and the demonstration of the results presented in the text. As
    is also emphasized by the title, the peculiarity of the book is the emphasis placed
    on presenting the implementation code, via the open-source tool Python, of the
    majority of the tools and algorithms presented in the text. This makes the text
    particularly interesting even for those with a more practical and implementation-oriented
    outlook, while still maintaining a great deal of interest for readers who are
    more attentive to formal and methodological aspects. These elements make the book’s
    audience very broad. Certainly, the text is ideal for first-year graduate students
    in control systems, computer science, and engineering. I expect that the student,
    the researcher, the lecturer and the engineer will find this volume of great value
    for the study of multi-agent systems and, as Editor of the series, I am very happy
    to welcome this new contribution.


    January 2024


    Lorenzo Marconi

    Università di Bologna

    Bologna, Italy'
