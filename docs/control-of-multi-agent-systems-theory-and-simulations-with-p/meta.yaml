    # Coverage Control


    # 4


    # Key Points


    +   - “Coverage” means placing agents in an environment at a desired density.

    - A coverage problem is formulated as the minimization problem of an objective
    function quantifying the degree of coverage.

    - A basic solution to the coverage problem is given by the gradient of the objective
    function, which is explicitly represented by the Voronoi diagram (Voronoi cells)
    for the positions of the agents.

    - The resulting multi-agent system becomes a gradient system, which converges
    to a stationary point of the objective function. In this sense, coverage is achieved.


    # 4.1 Coverage Problem


    In this section, we consider a multi-agent system with $n$ agents placed in an
    environment in the $m$-dimensional space, as illustrated in Fig. 4.1.


    Agent $i$ is a mobile robot, whose dynamics is described by


    $\dot{x}_i(t) = f_i(x_i(t), u_i(t)),$ (4.1)


    where $x_i(t) \in \mathbb{R}^m$ is the position in the $m$-dimensional space,
    $u_i(t) \in \mathbb{R}^l$ is the control input, and $f_i : \mathbb{R}^m \times
    \mathbb{R}^l \rightarrow \mathbb{R}^m$ is a function.


    Each agent equips a proximity sensor, such as a vision sensor and laser scanner,
    which gives the information on the relative positions to agents in its visible
    region.


    **Supplementary Information** The online version contains supplementary material
    available at https://doi.org/10.1007/978-3-031-52981-8_4.'
  - '[PAGE 102]


    Fig. 4.1 Multi-agent system with mobile robots in the two-dimensional space


    ![](img/6f6a40195ea61efdca2c32abeddbaaca_102_0.png)


    The visible region of agent $i$ is given by


    $\{q \in \mathbf{Q} : x_j \notin \mathbf{S}(q, x_i) \quad \forall j \in \{1, 2,
    \ldots, n\} \setminus \{i\}\}$, (4.2)


    where $\mathbf{Q} \subset \mathbb{R}^m$ is a bounded set representing the environment
    of interest, which is called the *workspace*, and $\mathbf{S}(q, x_i) \subseteq
    \mathbf{Q}$ is the half-open line segment between $q \in \mathbf{Q}$ and $x_i
    \in \mathbf{Q}$, i.e., $\mathbf{S}(q, x_i) = \bigcup_{\theta \in [0, 1)} \{\theta
    q + (1 - \theta)x_i\}$. In this chapter, an agent in the visible region of agent
    $i$ is called a *neighbor* of agent $i$. Since the agents are mobile, the neighbors
    of each agent are state-dependent and thus time-varying. Thus, we use $\mathbf{N}_i(x(t))
    \subseteq \{1, 2, \ldots, n\} \setminus \{i\}$ to represent the set of the neighbors
    of agent $i$ at time $t$, where $x(t) \triangleq [x_1^\top(t) \ x_2^\top(t) \
    \cdots \ x_n^\top(t)]^\top \in \mathbb{R}^{mn}$ is the collective state.


    The controller of agent $i$ is a relative-state-based one for time-varying neighbors,
    given by


    $u_i(t) = g_i([x_j(t) - x_i(t)]_{j \in \mathbf{N}_i(x(t))})$, (4.3)


    where $g_i$ is a function of the relative positions of the neighbors of $i$ at
    time $t$.


    For the above multi-agent system, *coverage* means to place the agents in an environment
    at a desired density on the workspace $\mathbf{Q}$, as illustrated in Fig. 4.2.
    The *coverage problem* is to design the control inputs $u_i$ ($i = 1, 2, \ldots,
    n$) such that $(x_1(t), x_2(t), \ldots, x_n(t))$ converges to a minimum point
    of a function quantifying the coverage of interest, i.e.,


    $\lim_{t \to \infty} J(x(t)) = \min_{x \in \mathbf{Q}^n} J(x)$, (4.4)


    where $J : \mathbb{R}^{mn} \to \mathbb{R}$ is a function quantifying the coverage,
    corresponding to the *objective function* of our coverage problem.


    Fig. 4.2 Image of coverage


    ![](img/6f6a40195ea61efdca2c32abeddbaaca_102_1.png)'
  - '[PAGE 103]


    The objective function $J$ can be defined in several ways. A typical form is given
    by


    $$J(x) = \int_{\mathbf{Q}} \min_{i \in \{1, 2, \dots, n\}} h(\|q - x_i\|) \phi(q)
    dq, \quad (4.5)$$


    where $x = [x_1^\top \ x_2^\top \ \cdots \ x_n^\top]^\top \in \mathbb{R}^{mn}$,
    $h : \mathbb{R}_+ \to \mathbb{R}$ is a nondecreasing, piecewise differentiable,
    and integrable function on $\mathbf{Q}$, and $\phi : \mathbb{R}^m \to \mathbb{R}_{0+}$
    is an integrable function on $\mathbf{Q}$. The function $h$ is called the *performance
    function*, which quantifies the utility of the location $q \in \mathbf{Q}$ at
    a certain distance from agent $i$ (a smaller value indicates more utility), and
    thus $\min_{i \in \{1, 2, \dots, n\}} h(\|q - x_i\|)$ represents the utility of
    the location $q$ with respect to the nearest ones in $x_1, x_2, \dots, x_n$ in
    the sense of the distance $\|q - x_i\|$. On the other hand, $\phi$ describes the
    importance of the location $q \in \mathbf{Q}$. It is called the *weighting function*.
    Therefore, $\min_{i \in \{1, 2, \dots, n\}} h(\|q - x_i\|) \phi(q)$ represents
    a weighted utility of the location $q$ generated by the nearest agent and $J(x)$
    is the total weighted utility on $\mathbf{Q}$.


    To illustrate this function $J$, let us consider the situation where


    +   - the agents are mobile sensors equipped with a vision sensor,

    - the agents are to be deployed on the workspace $\mathbf{Q}$ to detect an anomaly
    at each location $q \in \mathbf{Q}$, and

    - the amount of the economic loss caused by an anomaly varies depending on the
    location $q$.


    It is natural to assume that the detection accuracy of the vision sensor at $x_i$
    degrades with the distance $\|q - x_i\|$. This property, i.e., the relation between
    the detection accuracy and the distance $\|q - x_i\|$, is represented by the function
    $h$. Meanwhile, the locations with the potential of large economic loss are relatively
    important in the detection process. This is described by the function $\phi$.


    # 4.2 Voronoi Diagrams


    A *Voronoi diagram*, which is a concept of geometry, plays an important role to
    solve the coverage problem for the objective function in (4.5). In this section,
    we introduce its concept and some properties.


    # 4.2.1 Definition


    Consider a set $\mathbf{Q} \subset \mathbb{R}^m$ and $n$ distinct points $x_i$
    ($i = 1, 2, \dots, n$) in $\mathbf{Q}$. Although $\mathbf{Q}$ is assumed to be
    closed in Sect. 4.1, it is necessarily neither bounded nor closed in this section.
    An example is illustrated in Fig. 4.3, where $m = 2$, $\mathbf{Q} = [0, 1] \times
    [0, 1]$, $n = 10$, and the points are indicated by dots.'
