    where $\Phi$ is a positive semi-definite matrix. It is easily shown that the quadratic
    function (6.67) is a proper, closed, and convex function. The proximal operator
    is given by


    $$\text{prox}_{\gamma f}(v) = (\Phi + \gamma^{-1}I)^{-1}(y + \gamma^{-1}v). \tag{6.68}$$


    A special case is the $\ell^2$ norm squared $\|x\|^2 = x^\top x$, whose proximal
    operator is given by


    $$\text{prox}_{\gamma \|\cdot\|^2}(v) = \frac{v}{2\gamma + 1}. \tag{6.69}$$


    # Indicator Function


    Let $\mathbf{C} \subset \mathbb{R}^n$ be a non-empty, closed, and convex set.
    Then, the indicator function on $\mathbf{C}$ is defined by


    $$I_{\mathbf{C}}(x) \triangleq \begin{cases} 0, & \text{if } x \in \mathbf{C},
    \ +\infty, & \text{if } x \notin \mathbf{C}. \end{cases} \tag{6.70}$$


    Since $\mathbf{C}$ is non-empty, closed, and convex, its indicator function $I_{\mathbf{C}}(x)$
    is a proper, closed, and convex function. This is easily understood by drawing
    the epigraph of $I_{\mathbf{C}}(x)$. Then, the proximal operator is given by


    $$\text{prox}_{\gamma I_{\mathbf{C}}}(v) = \Pi_{\mathbf{C}}(v), \tag{6.71}$$


    where $\Pi_{\mathbf{C}}$ is the projection onto the set $\mathbf{C}$.


    In particular, for the *consensus set* for $N$ vectors $x_1, \dots, x_N \in \mathbb{R}^n$
    defined by


    $$\mathbf{C} \triangleq \{(x_1, \dots, x_N) : x_1 = x_2 = \cdots = x_N\}, \tag{6.72}$$


    the projection $\Pi_{\mathbf{C}}(v)$ of $v = (v_1, \dots, v_N)$ is given by (see
    Exercise iii)


    $$\Pi_{\mathbf{C}}(v) = \begin{bmatrix} \bar{v} \ \vdots \ \bar{v} \end{bmatrix},
    \quad \bar{v} \triangleq \frac{1}{N} \sum_{j=1}^N v_j. \tag{6.73}$$


    This is used for establishing distributed algorithms based on multi-agent consensus
    (see Sect. 6.5.2).


    # $\ell^1$ Norm


    The proximal operator of the $\ell^1$ norm is given by (see Exercise iv)


    $$\text{prox}_{\gamma \|\cdot\|_1}(v) = S_{\gamma}(v). \tag{6.74}$$'
