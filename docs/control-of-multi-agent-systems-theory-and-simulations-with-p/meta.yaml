    was shown that if and only if the models of the individual systems have an embedded
    internal model of a virtual exosystem, then the agents reach a synchronization.
    A synchronization problem of a group of uncertain heterogeneous linear systems
    was studied in [41] based on output measurements and output consensus. The synchronization
    problems of a group of coupled oscillator networks (i.e., coupled in phase angles
    $\theta_i - \theta_j$) were also interpreted as a multi-agent systems theory [23].
    Recently, a synchronization problem for a group of general heterogeneous nonlinear
    agents was analyzed in the averaged dynamics (or, so-called *blended dynamics*)
    [43]. For a strongly coupled general heterogeneous nonlinear network, they analyzed
    that with only the static diffusive-type coupling $u_i = k \sum_{j=1}^N \alpha_{ij}(x_j
    - x_i)$, the agents could reach an average dynamics. The blended dynamics technique
    was utilized to solve various distributed optimization problems [52]. For an excellent
