    Lemma 5.3 provides a condition for checking the infinitesimal bearing rigidity
    of a framework. However, since it needs to check the rank condition, which is
    a kind of algebraic property, it is not a topological condition. To examine the
    rigidity from a topological perspective, we use a generic property that is similar
    to Definition 5.8:


    **Definition 5.12** (*Generic bearing rigidity*) A framework $f_p$ is said to
    be generically bearing rigid if almost all frameworks $f_q$ with realization $q$
    under the same topology are infinitesimally bearing rigid.


    The above definition means that if a graph $G = (\mathbf{V}, \mathbf{E})$ with
    bearing constraints is infinitesimally bearing rigid for a specific realization
    $p$, then we can say that the graph $G$ is bearing rigid. Since the graph $G$
    does not include any algebraic information, it is purely a topological definition.
    By way of using a rank-reduced condition of a framework that is infinitesimally
    bearing rigid with a special realization $p$, and by showing that the set for
    making the rank to be reduced is a set of measure zero, we can make the following
    result:


    **Theorem 5.4** ([28]) *For a graph $G = (\mathbf{V}, \mathbf{E})$, if it is infinitesimally
    bearing rigid with specific $p$, then the graph $G$ is bearing rigid for almost
    all realizations.*


    With the above theorem, we are able to check the bearing rigidity from a topological
    perspective, rather than examining all realizations.


    # 5.2.3 Weak Rigidity (Angle Rigidity)


    In the previous subsections, two graph rigidity theories with constraints on the
    edge length (distance) and on the edge directions (bearing vectors), respectively,
    were presented. In this subsection, we combine these constraints with angle constraints
    between two incident edges. The rigidity theory developed by combining different
    sorts of constraints (distances, bearing vectors, or angle constraints) is called
    *weak rigidity* theory [14]. If pure angles are used as constraints, it could
    be called *angle rigidity* [6,11].


    As done in the distance and bearing rigidity theories, it is convenient to use
    indices of agents to represent angle constraints. Suppose that there is an angle
    constraint between two edges (displacement vectors) $z_{ki} = p_i - p_k$ and $z_{kj}
    = p_j - p_k$. Then, as depicted in Fig. 5.8, we write this angle constraint as
    an ordered triple $(k, i, j)$.'
