    Let us consider the following constrained optimization problem:


    $$\min_{x \in \mathbb{R}^n} \sum_{i=1}^N f_i(x) \quad \text{subject to} \quad
    x \in \bigcap_{i=1}^N \mathbf{C}_i, \tag{6.106}$$


    where $f_1, f_2, \ldots, f_N : \mathbb{R}^n \to \mathbb{R} \cup \{+\infty\}$ are
    proper, closed, and convex functions, and $\mathbf{C}_1, \mathbf{C}_2, \ldots,
    \mathbf{C}_N \subset \mathbb{R}^n$ are non-empty, closed, and convex sets. We
    here assume that the function $f_i$ and the set $\mathbf{C}_i$ are known only
    to the $i$-th agent. Then, borrowing the idea of the subgradient projection algorithm
    mentioned in Sect. 6.3.3, we consider the following iteration algorithm:


    $$x_i[k+1] = \Pi_{\mathbf{C}_i} \left( \sum_{j=1}^N p_{ij} x_j[k] - \alpha_k g_i[k]
    \right), \tag{6.107}$$


    where $\Pi_{\mathbf{C}_i}$ is the projection operator onto $\mathbf{C}_i$, and
    $\alpha_k$ is a variable step size. We note that if $\mathbf{C}_i = \mathbb{R}^n$
    for all $i \in \{1, 2, \ldots, N\}$, then this iteration is for the unconstrained
    problem (6.101) with a variable step size. For the step size, we assume a *diminishing
    step size* satisfying


    $$\sum_k \alpha_k = +\infty, \quad \sum_k \alpha_k^2 < +\infty. \tag{6.108}$$


    We have the following convergence theorem [15]:


    **Theorem 6.10** *Assume that the Perron matrix $P = [p_{ij}]$ satisfies $\mathbf{1}^\top
    P = \mathbf{1}$ (i.e., $P$ is doubly stochastic). Assume also that there exists
    $\beta > 0$ such that $\|g\| \le \beta$ for any $g \in \partial f_i(x)$, $i \in
    \mathbf{V}$, and $x \in \mathbb{R}^n$. If the step size $\alpha_k$ in (6.107)
    satisfies the diminishing step size conditions (6.108), then the sequence $\{x_i[k]\}$
