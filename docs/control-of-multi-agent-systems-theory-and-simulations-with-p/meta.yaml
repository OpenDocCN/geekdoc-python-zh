  md: '5.2 Rigidity Theory


    129


    **Definition 5.14** (*Weak rigidity*) A framework $(G, p)$ is called *weakly rigid*
    in $\mathbb{R}^d$ if there exists a neighborhood $\mathbf{U}_p$ of $p$ such that
    every framework $(G, q)$, where $q$ stays in the neighborhood $\mathbf{U}_p$,
    i.e., $q \in \mathbf{U}_p$, weakly equivalent to $(G, p)$ is also weakly congruent
    to $(G, p)$.


    **Definition 5.15** (*Global weak rigidity*) A framework $(G, p)$ is called *globally
    weakly rigid* in $\mathbb{R}^d$ if every framework $(G, q)$ weakly equivalent
    to $(G, p)$ is also weakly congruent to $(G, p)$ in $\mathbb{R}^d$.


    As a special case, if $\mathbf{E} = \emptyset$ and $\mathbf{A} \neq \emptyset$,
    then all the constraints are only angles. Such cases are studied under the name
    of *angle rigidity* [6,11]. For angle rigidity theory, we may use the following
    additional concepts:


    **Definition 5.16** (*Angle equivalence and proportional congruence* [13]) Two
    frameworks $f_p = (G, p)$ and $f_q = (G, q)$ with $\mathbf{E} = \emptyset$ and
    $\mathbf{A} \neq \emptyset$ are called *angular-equivalent* if $\cos(\theta_{ij}^k)
    \in f_p = \cos(\theta_{ij}^k) \in f_q$, $\forall(k, i, j) \in \mathbf{A}$. Two
    frameworks are called *proportionally congruent* if $\|p_i - p_j\| = c\|q_i -
    q_j\|$ for all possible pairs of vertices, where $c$ is a proportional constant.


    **Definition 5.17** (*Angle rigidity* [5]) A framework $(\mathbf{V}, \mathbf{A},
    p)$ is called *angle rigid* in $\mathbb{R}^d$ if there exists a neighborhood $\mathbf{U}_p$
    of $p$ such that every framework $(\mathbf{V}, \mathbf{A}, q)$, where $q$ stays
    in the neighborhood $\mathbf{U}_p$, i.e., $q \in \mathbf{U}_p$, angular-equivalent
    to $(\mathbf{V}, \mathbf{A}, p)$ is also proportionally congruent to $(\mathbf{V},
    \mathbf{A}, q)$. A framework $(\mathbf{V}, \mathbf{A}, p)$ is called *globally
    angle rigid* in $\mathbb{R}^d$ if every framework $(\mathbf{V}, \mathbf{A}, q)$
    angular-equivalent to $(\mathbf{V}, \mathbf{A}, p)$ is also proportionally congruent
    to $(\mathbf{V}, \mathbf{A}, p)$ in $\mathbb{R}^d$.


    Note that the framework $f_p$ could be a triple $f_p = (\mathbf{V}, \mathbf{E},
    p)$ or $f_p = (\mathbf{V}, \mathbf{A}, p)$, or quadruple $f_p = (\mathbf{V}, \mathbf{E},
    \mathbf{A}, p)$ depending upon the constraints.


    So far, the concepts for weak (angle) rigidity have been introduced. Next, we
    would like to introduce a tool to check weak rigidity (or angle rigidity). As
    done in distance or bearing rigidity, for this purpose, we need to use some algebraic
    solutions by employing the concept of *infinitesimal weak rigidity* for the case
    of $\mathbf{E} \neq \emptyset$ or *infinitesimal angle rigidity* for the case
    of $\mathbf{E} = \emptyset$. Similar to the infinitesimal distance and bearing
    rigidities, we need to obtain a weak rigidity matrix (or angle rigidity matrix)
    to define infinitesimal motions. Let us focus on a combination of distance constraints
    and angle constraints. With the set of distance constraints (i.e., $\mathbf{E}$)
    and angle constraints (i.e., $\mathbf{A}$), let us define an edge-weak function
    $g_G(p) : \mathbb{R}^{dn} \rightarrow \mathbb{R}^{m+w}$ as


    $$g_G(p) = [\tilde{d}^\top, \tilde{a}^\top]^\top \in \mathbb{R}^{m+w}, \tag{5.17}$$


    where $\tilde{d} = [\|z_1\|^2, \|z_2\|^2, \ldots, \|z_m\|^2]^\top$ and $\tilde{a}
    = [a_1, a_2, \ldots, a_w]^\top$. Then, the weak rigidity matrix is defined as
    the Jacobian matrix of $g_G(p)$:'
