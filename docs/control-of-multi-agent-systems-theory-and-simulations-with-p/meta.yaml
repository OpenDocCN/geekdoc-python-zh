    # 6.4.3 ADMM


    Let us consider the following optimization problem:


    $$\underset{x \in \mathbb{R}^n, z \in \mathbb{R}^m}{\text{minimize}} \quad f(x)
    + g(z) \quad \text{subject to} \quad h(x, z) = 0, \tag{6.92}$$


    where $f : \mathbb{R}^n \to \mathbb{R} \cup \{+\infty\}$ and $g : \mathbb{R}^m
    \to \mathbb{R} \cup \{+\infty\}$ are proper, closed, and convex functions, and
    $h$ is an affine function of $x$ and $z$, defined as


    $$h(x, z) \triangleq Ax + Bz - c, \tag{6.93}$$


    with $A \in \mathbb{R}^{p \times n}$, $B \in \mathbb{R}^{p \times m}$, and $c
    \in \mathbb{R}^p$. This is a generalized version of (6.78), since (6.92) is equivalent
    to (6.78) if we choose $A = I$, $B = -I$, and $c = 0$. To solve this optimization
    problem, we introduce the *alternating direction method of multipliers*, or ADMM
    for short. The idea is to consider the *augmented Lagrangian* defined by


    $$L_{\rho}(x, z, y) \triangleq f(x) + g(z) + y^\top h(x, z) + \frac{\rho}{2} \|h(x,
    z)\|^2, \tag{6.94}$$


    where $\rho > 0$ is a parameter. Then, the iterative algorithm of ADMM is given
    by


    $$\begin{aligned} x[k+1] &= \underset{x}{\arg\min} \, L_{\rho}(x, z[k], y[k]),
    \ z[k+1] &= \underset{z}{\arg\min} \, L_{\rho}(x[k+1], z, y[k]), \ y[k+1] &= y[k]
    + \rho h(x[k+1], z[k+1]). \end{aligned} \tag{6.95}$$


    It is easily shown that this algorithm is equivalent to


    $$\begin{aligned} x[k+1] &= \underset{x}{\arg\min} \left( f(x) + \frac{\rho}{2}
    \|h(x, z[k]) + u[k]\|^2 \right), \ z[k+1] &= \underset{z}{\arg\min} \left( g(z)
    + \frac{\rho}{2} \|h(x[k+1], z) + u[k]\|^2 \right), \ u[k+1] &= u[k] + h(x[k+1],
    Bz[k+1]), \end{aligned} \tag{6.96}$$


    where $u[k] \triangleq y[k]/\rho$.


