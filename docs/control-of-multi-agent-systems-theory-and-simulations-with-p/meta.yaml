    ## 5.3 基于刚性的编队控制


    基于刚性的编队控制旨在设计控制律，通过实现期望的约束来达成框架的特定构型。期望的约束可以是智能体之间的边长、边的方向或两条相邻边之间的夹角。然而，即使实现了期望的约束，如果不考虑编队的拓扑结构，也可能无法确保构型的唯一性。例如，在图
    5.10a 中，三个智能体受到两个约束的限制：


    - 方向向量 $g_{ki}$。

    - 角度 $\theta_{ij}^k$。


    那么，如图 5.10b 所示，尽管满足了约束，但构型并不唯一；它是柔性的。在方向和角度约束下，节点 $i$ 和 $j$ 的位置可以连续地放置在 $i''$
    和 $j''$，或者 $i''''$ 和 $j''''$。然而，如图 5.9 所示，如果我们对三个智能体有不同的约束，那么节点就不能通过平滑运动（在图 5.9c
    中没有缩放运动）被放置在不同的位置。因此，为了获得唯一的编队，仅仅满足所需的约束是不够的；编队的底层拓扑结构应该是刚性的。因此，应该使用刚性理论从拓扑角度确保编队构型的唯一性。在接下来的小节中，我们介绍基于图刚性理论的分布式编队控制方案。本节的结果主要采用自
