    # 2.2.3 Positive and Non-negative Matrices


    The graph-related matrices such as the graph Laplacian and the Perron matrix we
    will study in this book have a special property; they have no negative elements.
    Here we consider such matrices. Let us consider a matrix $A \in \mathbb{R}^{m
    \times n}$. If the elements in $A$ are all positive (or non-negative), then $A$
    is said to be *positive* (or *non-negative*). We write $A > 0$ if $A$ is positive
    and $A \ge 0$ if $A$ is non-negative. By definition, it is easily shown that if
    $A_1$ and $A_2$ are positive (or non-negative), then $A_1 + A_2$ and $A_1 A_2$
    are also positive (or non-negative).


    Let us consider a non-negative matrix $A = [a_{ij}] \in \mathbb{R}^{n \times n}$.
    If the row sums of $A$ are all 1, that is, if


    $$a_{i1} + a_{i2} + \cdots + a_{in} = 1 \qquad (2.25)$$


    holds for all $i \in \{1, 2, \ldots, n\}$, then $A$ is said to be a *stochastic
    matrix*. The condition (2.25) for any $i$ can be also written by


    $$A\mathbf{1}_n = \mathbf{1}_n, \qquad (2.26)$$'
