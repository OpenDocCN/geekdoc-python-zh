    nodes. It could be an adjacency matrix or could be a Laplacian matrix, depending
    on the considered network property. Theoretical developments are divided into
    two cases as *almost all edge weights* and *for all edge weights* [61]. Since
    the controllability is decided by inputs, the structure of the input matrix $B$
    is critical. Thus, we need to check the controllability of the pair $(A, B)$ from
    some combinatorial approaches. Recently, in [37], a more generalized case considering
    *arbitrary structure* of some edges (could be zero or non-zero) has been developed.
    Since the system matrix $A$ could be a Laplacian, the controllability theory developed
    in the literature could be applied to diffusively coupled networks with input
    nodes (i.e., consensus networks) [72].


    # 1.3.5 Model Predictive Control


    Model predictive control (MPC) is widely used in many control applications. A
    major merit of MPC is that it can handle constraints on the system''s behavior,
    such as limits on the control inputs and the system''s state [58]. MPC can be
    applied to not only linear time-invariant systems but also more complex systems
    such as nonlinear systems [28], hybrid systems [14], and multi-agent systems [15].


    MPC of multi-agent systems optimizes the control actions of each individual agent
    based on the predicted behavior of the other agents in the system to achieve a
    common goal. For example, in a multi-robot system, distributed MPC is proposed
    to generate non-colliding trajectories in real time for multiple robots [57].
    Also, distributed MPC is applied to power systems for the automatic generation
    control (AGC) for controlling system frequency and tie-line interchange [79].


    # 1.3.6 Event-Triggered and Sparse Control


    *Resource-aware control* is one of the most important control technologies for
    recent complex and networked systems. The control aims at reducing the control
    and network resources such as energy, memory size, computational time, and communication
    bandwidth. There are two major methods to achieve resource-aware control. One
    is *event-triggered control* [31]. In event-triggered control, the control action
    is updated only when a certain event or condition is detected, by which the communication
    and control burden can be dramatically reduced. The other is *sparse control*,
    also known as *maximum hands-off control* [62,64], where the time length on which
    the control action is active is minimized under control constraints. The key point
    of this control is the minimization of the active period or the maximization of
    the inactive period, which can be solved as an optimal control problem. The two
    methods have been applied to multi-agent systems to achieve resource-aware control
    in multi-agent systems. For example, the consensus control mentioned above can
    be implemented as an event-triggered control [22]. Also, the sparse control has
    been extended to multi-agent consensus in [33].'
- md: '## 1.4 Multi-agent Systems in Other Important Research Fields


    ### 1.4.1 Graph Signal Processing


    Recently, signal processing over a network has been actively researched in the
    field of signal processing. This topic is often called *graph signal processing*
    [70, 71]. In usual signal processing, we consider a signal $x[k], k = 0, 1, 2,
    \dots$, which is defined over the discrete-time domain $\{0, 1, 2, \dots, N\}$
    as shown in Fig. 1.5a. We can take this domain as a network, or a graph, of nodes
    $0, 1, 2, \dots, N$, and directed edges $(k, k+1), k = 0, 1, 2, \dots, N-1$. Then,
    in graph signal processing, signals are defined over a general graph, as depicted
    in Fig. 1.5b. This generalization leads to a rich research field of signal processing.
    For example, we can discuss a generalized version of the sampling theorem over
    a network [78]. Fourier transformation, interpolation, and filtering of graph
    signals have also been extensively studied recently. In particular, low-pass filtering
    of graph signals has been proven to be mathematically related to consensus control
    of multi-agent systems [35], which will be discussed in Chap. 3 of this book.
    Graph signal processing has also been applied to distributed sensor networks,
    image and video processing, and machine learning.


    ### 1.4.2 Machine Learning


    *Deep neural networks* have been extensively researched in the field of machine
    learning [27, 50]. A deep neural network is an artificial neural network with
    a large number of layers. A deep neural network is composed of multiple layers
    of interconnected nodes, with each layer performing a specific function such as
    feature extraction, transformation, or classification. Deep neural networks are
    trained using large amounts of data and are able to learn complex patterns and
    relationships within the data. Deep neural networks have wide applications in
    image and speech recognition, natural language processing, and recommendation
    systems. It has been applied to control systems, e.g., see [19].


    A *graph neural network* is a deep learning model to operate on graph-structured
    data [87]. The objective of a graph neural network is to learn a representation
    of the data that is effective for a specific task, such as node classification
    or graph classification. The techniques in graph signal processing mentioned above
    are used in the analysis and design. Graph neural networks have been shown to
    be effective for a wide range of tasks and have been applied to problems in a
    variety of fields, including natural language processing, chemistry, and biology.


    ### 1.4.3 Distributed Optimization


    Distributed optimization aims at finding an optimal solution to a global optimization
    problem in a distributed or decentralized manner. In distributed optimization,
    multiple agents or local computers minimize their own local cost functions with
    local constraints by exchanging information about local solutions with neighboring
    agents. Therefore, distributed optimization is operated in a computer network.
    Theoretical analysis of distributed optimization, such as convergence to a global
    solution, is discussed in a very similar way to the consensus in multi-agent control
    systems. Distributed optimization has broad applications to sensor networks [74],
    electric power systems [60], and control [65].


    Distributed optimization is discussed in Chap. 6 of this book.


    ### 1.4.4 Boolean Networks


    A Boolean network is a multi-agent system where each node has a binary state,
    i.e., the state takes a binary value (0 or 1) at each time instant. An example
    is given as follows:


    $$

    \begin{cases}

    x_1(t+1) = x_3(t) \wedge \bar{x}_4(t), \\

    x_2(t+1) = x_1(t), \\

    x_3(t+1) = \bar{x}_2(t) \vee x_1(t), \\

    x_4(t+1) = x_1(t),

    \end{cases}

    $$

    (1.1)


    where $x_i(t)$ is the state of node $i$ which takes 0 or 1, i.e., $x_i(t) \in
    \{0, 1\}$, $\bar{x}_i(t)$ to represent the negation of $x_i(t)$, and the operators
    $\vee$ and $\wedge$ are the logical OR and logical AND, respectively. For example,
    from the initial state $x_1(0) = x_2(0) = x_3(0) = x_4(0) = 0$, the system evolves
    as


    $$

    \begin{bmatrix} 0 \\ 0 \\ 0 \\ 0 \end{bmatrix} \to \begin{bmatrix} 0 \\ 0 \\ 1
    \\ 0 \end{bmatrix} \to \begin{bmatrix} 1 \\ 0 \\ 1 \\ 0 \end{bmatrix} \to \begin{bmatrix}
    1 \\ 1 \\ 1 \\ 1 \end{bmatrix} \to \begin{bmatrix} 0 \\ 1 \\ 1 \\ 1 \end{bmatrix}
    \to \cdots,

    $$

    (1.2)


    where each vector represents $[x_1(t)\ x_2(t)\ x_3(t)\ x_4(t)]^\top$ for $t =
    0, 1, \ldots$


    This model was proposed by Kauffman in 1969 [38] and since then it has been frequently
    used for the analysis and design of digital or digitally behaved multi-agent systems.
    In particular, it is known as a good approximation of various biological networks
    [6,30].


    For Boolean networks, the stability (existence of attractors) [7,9,10,24,45,53,
    54,59,85], controllability and observability [20,49,86], and control synthesis
    [3,13, 44,46–48,86] are the main interests. Since the state is restricted to be
    binary, the approaches are different from those for the usual systems, i.e., with
    continuous-valued states. Moreover, some problems are reduced into combinatorial
    problems. Thus, they are often hard to solve due to NP-hardness [4].


    ### 1.4.5 Swarm Intelligence


    Swarm intelligence, which could be categorized as optimization techniques motivated
    by collective behaviors [77], is closely related to applications of multi-agent
    systems. However, unlikely the consensus algorithm, there is no specific formula
    in swarm intelligence. The particle swarm optimization (PSO) introduced in [40]
    searches for the better solution by changing the current position based on the
    local best value and global best value [8]. Since PSO updates the algorithm iteratively
    based on interactions of particles, it could be considered as a multi-agent system
    algorithm. Similar to PSO, a cooperative bat searching algorithm (CBA) was proposed
    to solve an optimization problem in [84]. The CBA updates the velocities with
    the interaction term $\Sigma_{j \in N_i} (v_j(k-1) - v_i(k-1))$; so it is a kind
    of consensus-style update algorithm. Recently, swarm intelligence algorithms have
    been used for localization [8] and flocking control [18] of multiple UAV networks.


    The swarm intelligence algorithms could be considered as heuristic optimization
    techniques. The detailed setups of swarm intelligence algorithms are different;
    but we could combine the algorithms with consensus, coverage control, or formation
    control algorithms for better performance.


    ### 1.4.6 Synchronization


    The synchronization problem is a subject that has been studied in multi-agent
    systems theory for a long time. The consensus problem considers only the diffusive
    couplings of neighboring agents (i.e., $x_i - x_j$) and the synchronization problem
    considers the agreement of states in more complicated dynamics. It is usually
    hard to distinguish the consensus and synchronization clearly. In a sense, the
    synchronization problems are more general than the consensus problems, but more
    coupling terms or more state information (or output measurements) are used in
    the synchronization problems. As analyzed in [56], a general linear system (linear
    time-invariant systems) reaches a consensus with an observer-type consensus protocol,
    which could be considered as more complicated couplings (but without any state
    information). So, the boundary between consensus and synchronization is not clear.
    A group of heterogeneous dynamics was analyzed with general local controllers
    in [80]. They used local controllers for individual agents, which use coupling
    and output measurements. It was shown that if and only if the models of the individual
    systems have an embedded internal model of a virtual exosystem, then the agents
    reach a synchronization. A synchronization problem of a group of uncertain heterogeneous
    linear systems was studied in [41] based on output measurements and output consensus.
    The synchronization problems of a group of coupled oscillator networks (i.e.,
    coupled in phase angles $\theta_i - \theta_j$) were also interpreted as a multi-agent
    systems theory [23]. Recently, a synchronization problem for a group of general
    heterogeneous nonlinear agents was analyzed in the averaged dynamics (or, so-called
    *blended dynamics*) [43]. For a strongly coupled general heterogeneous nonlinear
    network, they analyzed that with only the static diffusive-type coupling $u_i
    = k \sum_{j=1}^N \alpha_{ij}(x_j - x_i)$, the agents could reach an average dynamics.
    The blended dynamics technique was utilized to solve various distributed optimization
    problems [52]. For an excellent overview of synchronization problems, and for
    further applications (estimation of the number of agents in the network, distributed
    least-squares solving, distributed median solving, optimal power dispatch, distributed
    observer, and edge-wise funnel coupling) of blended dynamics, it is recommended
    to refer to [51].


    ## 1.5 Summary


    In this chapter, we have briefly reviewed the state-of-the-art of multi-agent
    systems research. As we have shown in this chapter, multi-agent systems are widely
    used in many fields both in academia and industry. In this book, we in particular
    focus on the control of multi-agent systems, which also have broad applications
    as showcased in this chapter.


    References [81,82] are survey papers on sensor networks. The book [70] gives a
    good introduction to the theory of graph signal processing. References [17,75]
    provide initial formulations for simulations of collective behaviors, and [36,68]
    are well-known papers in consensus. For the detailed mathematical descriptions
    of distributed formation control, it is recommended to refer to [2]. References
    [40,77,83] provide good overviews for swarm intelligence optimization, and Refs.
    [56,80] are for classical synchronization problems, while Refs. [43,52] introduce
    a consensus-style synchronization problem for general nonlinear dynamics. It is
    highly recommended to read [51] to have cutting-edge knowledge on synchronization
    problems.


