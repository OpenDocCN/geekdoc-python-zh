  - '[PAGE 239]


    For the basics of random networks, you can refer to the textbook of [2], which
    also discusses the viral spreading phenomenon over random networks. For the details
    of spreading models over a complex network discussed in Sect. 7.3, please refer
    to [4] and [2, Sect. 10.3]. If you are interested in *control* of pandemics, survey
    articles [3,8] are informative. For NDlib introduced in Sect. 7.3.3, please see
    [5].


    # 7.6 Exercises


    +   (i) Prove that the solution of the ordinary differential equation (7.4) with
    constraint (7.1) and initial condition (7.2) is given by (7.5).

    (ii) Prove that the solution of the ordinary differential equation (7.7) with
    constraint (7.1) and initial condition (7.2) is given by (7.8).

    (iii) Prove (7.31) for a large-scale Erdös–Rényi random network (Hint: use the
    Poisson distribution).

    (iv) Prove the limiting property (7.33) for a scale-free network whose degree
    distribution is given by (7.23) with $2 < \alpha \leq 3$.

    (v) By modifying Python Code 7.6, check the property (7.34) by increasing the
    total number of people.

    (vi) Perform NDlib simulation of viral spreading over a Watts–Strogatz random
    network [6,7], and compare the results with those shown in Sect. 7.3.3.


    # References


    +   1. Albert R, Barabási AL (2002) Statistical mechanics of complex networks.
    Rev Mod Phys 74:47–97

    2. Barabási AL (2016) Network science. Cambridge University Press

    3. Nowzari C, Preciado VM, Pappas GJ (2016) Analysis and control of epidemics:
    a survey of spreading processes on complex networks. IEEE Control Syst Mag 36(1):26–46

    4. Pastor-Satorras R, Castellano C, Van Mieghem P, Vespignani A (2015) Epidemic
    processes in complex networks. Rev Mod Phys 87(3):925–979

    5. Rossetti G, Milli L, Rinzivillo S, Sirbu A, Pedreschi D, Giannotti F (2018)
    NDLIB: a python library to model and analyze diffusion processes over complex
    networks. Int J Data Sci Anal 5:61–79

    6. Watts DJ (1999) Small worlds—the dynamics of networks between order and randomness.
    Princeton University Press

    7. Watts DJ (1998) Collective dynamics of ‘small-world’ networks. Nature 393:440–442

    8. Zino L, Cao M (2021) Analysis, prediction, and control of epidemics: a survey
    from scalar to dynamic network models. IEEE Circuits Syst Mag 21(4):4–23'
