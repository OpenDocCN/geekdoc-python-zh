    $R_w^b = \begin{bmatrix} 2(p_1 - p_2)^\top & 2(p_2 - p_1)^\top & 0 \ \frac{\partial}{\partial
    p_1} \cos(\theta_{23}^1) & \frac{\partial}{\partial p_2} \cos(\theta_{23}^1) &
    \frac{\partial}{\partial p_3} \cos(\theta_{23}^1) \ \frac{\partial}{\partial p_1}
    \cos(\theta_{12}^3) & \frac{\partial}{\partial p_2} \cos(\theta_{12}^3) & \frac{\partial}{\partial
    p_3} \cos(\theta_{12}^3) \end{bmatrix}$


    and the rigidity matrix for Fig. 5.9c is given as the Jacobian matrix of $g_G(p)
    = [\cos(\theta_{23}^1), \cos(\theta_{12}^3)]^\top$:


    $R_w^c = \begin{bmatrix} \frac{\partial}{\partial p_1} \cos(\theta_{23}^1) & \frac{\partial}{\partial
    p_2} \cos(\theta_{23}^1) & \frac{\partial}{\partial p_3} \cos(\theta_{23}^1) \
