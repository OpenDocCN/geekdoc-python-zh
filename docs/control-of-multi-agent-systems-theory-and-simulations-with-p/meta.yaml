    ## 2.2.7 盖尔圆盘定理


    首先，矩阵 $A \in \mathbb{R}^{n \times n}$ 的特征值集合称为*谱*，最大绝对特征值称为*谱半径*，我们用 $\rho(A)$
    表示。即，对于矩阵 $A \in \mathbb{R}^{n \times n}$ 的特征值 $\lambda_1, \lambda_2, \ldots,
    \lambda_n$，谱半径 $\rho(A)$ 定义为


    $$\rho(A) \triangleq \max(|\lambda_1|, |\lambda_2|, \ldots, |\lambda_n|).$$


    谱半径的一个上界由以下定理给出：


    **定理 2.7** *对于矩阵 $A \in \mathbb{R}^{n \times n}$，我们有*


    $$\rho(A) \leq \|A\|,$$


    其中 $\|A\|$ 是由欧几里得范数 (2.5) 诱导的范数，定义为


    $$\|A\| \triangleq \max_{x \in \mathbb{R}^n \setminus \{0\}} \frac{\|Ax\|}{\|x\|}.$$


    *此外，如果 $A$ 是对称的，我们有*


    $$\rho(A) = \|A\|.$$


    根据这个定理，复平面上以 0 为中心、半径为 $\|A\|$ 的闭圆盘包含了 $A$ 的所有特征值。也就是说，我们可以在不计算特征值的情况下，使用 $\|A\|$
    的值粗略估计特征值的区域。然而，对于许多应用来说，这种估计不够精确，我们希望获得更精确的区域。为此，可以使用*盖尔圆盘定理*。


    **定理 2.8**（盖尔圆盘定理）*对于矩阵 $A = [a_{ij}] \in \mathbb{R}^{n \times n}$，在 $\mathbb{C}$
    中定义以下区域：*


    $$\mathbf{R}_i \triangleq \left\{ z \in \mathbb{C} : |z - a_{ii}| \leq \sum_{j
    \in \{1, 2, \ldots, n\} \setminus \{i\}} |a_{ij}| \right\},$$


    $$\mathbf{C}_j \triangleq \left\{ z \in \mathbb{C} : |z - a_{jj}| \leq \sum_{i
    \in \{1, 2, \ldots, n\} \setminus \{j\}} |a_{ij}| \right\},$$


    其中 $i, j \in \{1, 2, \ldots, n\}$。设 $\lambda_1, \lambda_2, \ldots, \lambda_n$
    是 $A$ 的特征值。那么我们有


    $$\{\lambda_1, \lambda_2, \ldots, \lambda_n\} \subseteq \mathbf{R} \triangleq
    \bigcup_{i=1}^n \mathbf{R}_i, \quad \{\lambda_1, \lambda_2, \ldots, \lambda_n\}
    \subseteq \mathbf{C} \triangleq \bigcup_{j=1}^n \mathbf{C}_j,$$


    因此 $\{\lambda_1, \lambda_2, \ldots, \lambda_n\} \subseteq \mathbf{R} \cap \mathbf{C}$。


    ![](img/6f6a40195ea61efdca2c32abeddbaaca_51_0.png)


    图 2.2 $A$ 的特征值区域：$\mathbf{R} = \bigcup_{j=1}^3 \mathbf{R}_j$（左）和 $\mathbf{C} =
    \bigcup_{j=1}^3 \mathbf{C}_j$（右）。三个特征值用黑点表示


    **例 2.6** 让我们考虑以下矩阵：


    $$A = \begin{bmatrix} 1 & -6 & 0 \\ 3 & 3 & 2 \\ -1 & 0 & 2 \end{bmatrix}.$$


    我们使用盖尔圆盘定理来寻找特征值的区域。根据定理 2.8，集合 $\mathbf{R}_i$ 和 $\mathbf{C}_j$ 为


    $\mathbf{R}_1 = \{z \in \mathbb{C} : |z - 1| \leq 6\}$，$\mathbf{R}_2 = \{z \in
    \mathbb{C} : |z - 3| \leq 5\}$，$\mathbf{R}_3 = \{z \in \mathbb{C} : |z - 2| \leq
    1\}$，

    $\mathbf{C}_1 = \{z \in \mathbb{C} : |z - 1| \leq 4\}$，$\mathbf{C}_2 = \{z \in
    \mathbb{C} : |z - 3| \leq 6\}$，$\mathbf{C}_3 = \{z \in \mathbb{C} : |z - 2| \leq
