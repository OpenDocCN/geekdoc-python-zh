    ## 4.3.3 Proof of Theorem 4.1


    First of all, we show that the system evolves in the direction of the interior
    of $\mathbf{Q}^n$ if the system is at the boundary of $\mathbf{Q}^n \setminus
    \mathbf{S}$ or in its neighborhood.


    Consider the Voronoi diagram $\{\mathbf{C}_1(x), \mathbf{C}_2(x), \dots, \mathbf{C}_n(x)\}$
    for a set $\mathbf{Q} \subset \mathbb{R}^m$ and $n$ distinct points $x_i \in \mathbf{Q}$
    ($i = 1, 2, \dots, n$). For an integrable function $\psi : \mathbf{Q} \times \mathbb{R}_{0+}
    \to \mathbb{R}_{0+}$, let


    $$\text{gmass}_{\psi}(\mathbf{C}_i(x), x_i) \triangleq \int_{\mathbf{C}_i(x)}
    \psi(q, \|q - x_i\|) dq \qquad (4.32)$$


    and


    $$\text{gcent}_{\psi}(\mathbf{C}_i(x), x_i) \triangleq \frac{1}{\text{gmass}_{\psi}(\mathbf{C}_i(x),
    x_i)} \int_{\mathbf{C}_i(x)} q \psi(q, \|q - x_i\|) dq. \qquad (4.33)$$


    These are generalized versions of the functions “mass” and “cent” in (4.10) and
    (4.11). By the definitions of $\text{gmass}_{\psi}$, $\text{gcent}_{\psi}$, and
    Voronoi diagrams (in particular, $\mathbf{C}_i(x)$ has nonzero measure), it is
    trivial that


    $$\text{gmass}_{\psi}(\mathbf{C}_i(x), x_i) > 0, \quad \text{gcent}_{\psi}(\mathbf{C}_i(x),
    x_i) \in \text{int}(\mathbf{C}_i(x)) \qquad (4.34)$$


    hold if $\psi(q, \|q - x_i\|) > 0$ for almost all $q \in \mathbf{Q}$.


    **Lemma 4.9** *Consider the objective function $J$ in (4.5). Assume that $m =
    2$, $\mathbf{Q}$ is a bounded polyhedron, and $h$ is continuously differentiable
    on $\mathbb{R}_{0+}$. Then*


    $$\frac{\partial J}{\partial x_i}(x) = \text{gmass}_{\psi}(\mathbf{C}_i(x), x_i)
    \left( x_i - \text{gcent}_{\psi}(\mathbf{C}_i(x), x_i) \right) \qquad (4.35)$$


    on $\mathbf{Q}^n \setminus \mathbf{S}$, where


    $$\psi(q) \triangleq \frac{\partial h}{\partial r}(\|q - x_i\|) \frac{1}{\|q -
    x_i\|} \phi(q). \qquad (4.36)$$


    **Proof** *Since $\|q - x_i\| \neq 0$ for almost all $q \in \mathbf{C}_i(x)$ and
    $(\partial h / \partial r)(\|q - x_i\|)$ is finite for every $q \in \mathbf{C}_i(x)$,
    we obtain (4.35) by applying (4.32), (4.33), and (4.36) to (4.16), i.e.,*


    $$\begin{aligned} \int_{\mathbf{C}_i(x)} \frac{\partial}{\partial x_i} h(\|q -
    x_i\|) \phi(q) dq &= \int_{\mathbf{C}_i(x)} -\frac{\partial h}{\partial r}(\|q
    - x_i\|) \frac{(q - x_i)}{\|q - x_i\|} \phi(q) dq \\ &= \int_{\mathbf{C}_i(x)}
    -(q - x_i) \psi(q, \|q - x_i\|) dq \end{aligned}$$


    $$= \int_{\mathbf{C}_i(x)} x_i \psi(q, \|q - x_i \|) dq - \int_{\mathbf{C}_i(x)}
    q \psi(q, \|q - x_i \|) dq$$

    $$= \text{gmass}_{\psi}(\mathbf{C}_i(x), x_i) x_i - \text{gmass}_{\psi}(\mathbf{C}_i(x),
    x_i) \text{gcent}_{\psi}(\mathbf{C}_i(x), x_i)$$

    $$= \text{gmass}_{\psi}(\mathbf{C}_i(x), x_i) \left( x_i - \text{gcent}_{\psi}(\mathbf{C}_i(x),
    x_i) \right).$$


    Therefore, the coverage controllers in (4.22) are represented as


    $$u_i(t) = -k_i \left( [x_j(t) - x_i(t)]_{j \in \mathbf{N}_i(x(t))} \right) \text{gmass}_{\psi}(\mathbf{C}_i(x(t)),
