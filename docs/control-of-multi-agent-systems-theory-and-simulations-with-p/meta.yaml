    # 5.3.1 Distance-Based Formation Control


    In distance-based formation control, the main control variables are inter-agent
    distances between agents. However, it should be remarked that the sensing variables
    are relative displacements between two agents. The relative displacements are
    displacements between agents under the misaligned orientation setup. Note that
    in consensus-based formation control, both the sensing and control variables are
    displacements under the aligned orientation setup [19]. Let us consider a group
    of agents moving in the two-dimensional space, i.e., $d = 2$. We also suppose
    that each agent is governed by single integrator dynamics as


    $\dot{p}_i(t) = u_i(t)$. (5.27)


    The displacement vectors $z_{ij} = p_j - p_i$ can be written by an incidence matrix
    as $z = \bar{H} p$. Also let us denote the desired distances of the edges as $d_k$,
    and the square of desired distances as $\bar{d} = [d_1^2, d_2^2, \dots, d_m^2]^\top$.
    The desired positions of agents are written as a stacked vector $\hat{p} = [\hat{p}_1^\top,
    \hat{p}_2^\top, \dots, \hat{p}_n^\top]^\top$ defined by the set $\hat{p} \in \{p
    : \|p_i - p_j\| = d_k, \forall k = 1, \dots, m\}$, and we say that the desired
    distances are achieved when $p_i = R^\Delta(\hat{p}_i + p^\Delta)$, $\forall i
    \in \mathbf{V}$, where $R^\Delta$ is a common rotation matrix and $p^\Delta$ is
    a common translation offset. Then, the error of squared distances of the edges
    can be written as $\tilde{e}_k = \|z_k\|^2 - d_k^2$. Now using the notation $\tilde{d}
    = [\|z_1\|^2, \|z_2\|^2, \dots, \|z_m\|^2]^\top$, we write $\tilde{e} = \tilde{d}
    - \bar{d}$.


    To generate control inputs in a distributed way, each agent is asked to minimize
    the following potential function:


    $\phi(p(t)) = \frac{1}{4}\|\tilde{e}(t)\|^2 = \frac{1}{4}\|\tilde{d}(t) - \bar{d}\|^2$.
    (5.28)


    The potential function $\phi(p(t))$ becomes zero if and only if $\tilde{d}(t)
    = \bar{d}$. Thus, if the group of agents achieves $\phi(p(t)) = 0$ as $t \to \infty$
    by a cooperative work but in a distributed way, then all the desired distances
    would be achieved. By way of accomplishing the desired distances, a unique configuration
    of the formation should be achieved, which leads a necessity of using the distance
    rigidity theory. Let us suppose that the underlying topology of the graph is rigid.
    Then, by minimizing the potential function $\phi(p(t))$ via gradient-descent law
