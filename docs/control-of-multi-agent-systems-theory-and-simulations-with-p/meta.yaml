    Now, we consider the following unconstrained optimization problem:


    $$\operatorname{minimize}_{x \in \mathbb{R}^n} f(x) + g(x),$$


    where $f$ is a differentiable and convex function satisfying $\operatorname{dom}(f)
    = \mathbb{R}^n$, and $g : \mathbb{R}^n \to \mathbb{R} \cup \{+\infty\}$ is a proper,
    closed, and convex function. We also assume that $g$ is *proximable*, that is,
    $g$ has a closed form of its proximal operator, like the $\ell^1$ norm considered
    above. For example, we can consider the $\ell^1$-regularized *least squares*,
    also known as *LASSO* (*Least Absolute Shrinkage and Selection Operator*) described
