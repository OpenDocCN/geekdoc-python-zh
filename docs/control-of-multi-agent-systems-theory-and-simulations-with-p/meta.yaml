    where $x_i$ is the $i$-th entry of $x \in \mathbb{R}^n$. For simplicity, we also
    use the “nabla” notation for the gradient in this section, namely,


    $$\nabla f(c) \triangleq \frac{\partial f}{\partial x}(c),$$


