  md: 'First, the set of the eigenvalues of a matrix $A \in \mathbb{R}^{n \times n}$
    is called the *spectrum*, and the maximum absolute eigenvalue is called the *spectral
    radius*, which we denote by $\rho(A)$. Namely, for the eigenvalues $\lambda_1,
    \lambda_2, \ldots, \lambda_n$ of a matrix $A \in \mathbb{R}^{n \times n}$, the
    spectral radius $\rho(A)$ is defined by


    $$\rho(A) \triangleq \max(|\lambda_1|, |\lambda_2|, \ldots, |\lambda_n|).$$


    An upper bound of the spectral radius is obtained by the following theorem:


    **Theorem 2.7** *For a matrix $A \in \mathbb{R}^{n \times n}$, we have*


    $$\rho(A) \leq \|A\|,$$


    where $\|A\|$ is the induced norm by the Euclidean norm (2.5), defined by


    $$\|A\| \triangleq \max_{x \in \mathbb{R}^n \setminus \{0\}} \frac{\|Ax\|}{\|x\|}.$$


    *Moreover, if $A$ is symmetric, we have*


    $$\rho(A) = \|A\|.$$


    From this theorem, the closed circle in the complex plane with radius $\|A\|$
    and center 0 includes all the eigenvalues of $A$. Namely, we can roughly estimate
    a region of eigenvalues by using the value of $\|A\|$ without computing the eigenvalues.
    However, this estimation is not precise enough for many applications, and we want
    to obtain more accurate region. For this purpose, *Gershgorin circle theorem*
    is available.


    **Theorem 2.8** (Gershgorin circle theorem) *For a matrix $A = [a_{ij}] \in \mathbb{R}^{n
    \times n}$, define the following regions in $\mathbb{C}$ :*


    $$\mathbf{R}_i \triangleq \left\{ z \in \mathbb{C} : |z - a_{ii}| \leq \sum_{j
    \in \{1, 2, \ldots, n\} \setminus \{i\}} |a_{ij}| \right\},$$


    $$\mathbf{C}_j \triangleq \left\{ z \in \mathbb{C} : |z - a_{jj}| \leq \sum_{i
    \in \{1, 2, \ldots, n\} \setminus \{j\}} |a_{ij}| \right\},$$


    for $i, j \in \{1, 2, \ldots, n\}$. Let $\lambda_1, \lambda_2, \ldots, \lambda_n$
    be the eigenvalues of $A$. Then we have


    $$\{\lambda_1, \lambda_2, \ldots, \lambda_n\} \subseteq \mathbf{R} \triangleq
    \bigcup_{i=1}^n \mathbf{R}_i, \quad \{\lambda_1, \lambda_2, \ldots, \lambda_n\}
    \subseteq \mathbf{C} \triangleq \bigcup_{j=1}^n \mathbf{C}_j,$$


    and hence $\{\lambda_1, \lambda_2, \ldots, \lambda_n\} \subseteq \mathbf{R} \cap
    \mathbf{C}$.'
