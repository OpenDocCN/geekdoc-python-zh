    $t$ 的函数。如果从符号或推导中可以清楚看出，我们将省略参数 $t$。也就是说，例如，位置 $p$ 表示 $p(t)$，刚性矩阵 $R_p$ 表示 $R_p(t)$。因此，建议将状态或符号理解为
    $t$ 的函数。


