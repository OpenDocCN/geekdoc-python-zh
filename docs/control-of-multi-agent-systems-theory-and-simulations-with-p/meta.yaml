  md: 'Chapter 4: We introduce coverage control based on gradient-based control and
    its application to multi-agent display.

    Chapter 5: We study formation control with the concept of graph rigidity.

    Chapter 6: As an application of consensus control in Chap. 3, we introduce distributed
    optimization algorithms.

    Chapter 7: We analyze the viral spreading phenomenon using ideas of multi-agent
    systems.


    The relations between these chapters are shown in the following figure:


    ![](img/6f6a40195ea61efdca2c32abeddbaaca_8_0.png)


    In this figure, the nodes are the chapters in this book and the arrows show the
    dependencies of the chapters. For example, if you want to quickly study the distributed
    optimization in Chap. 6, you can start with Chap. 1 and read Chaps. 2, 3, and
    6. If you are a teacher who wants to use this book for a semester-long course
    with a total 30 h, you can design your course with this diagram using “depth-first
    search” or “breadth-first search”.


    Finally, this book is based on the authors’ research and teaching for decades,
    in particular the book *Control of Multi-agent Systems* written in Japanese, which
    was published in 2015 by Corona Publishers, Japan. The second author is supported
    in the publication of this book by the JST FOREST program JPMJFR2123. We gratefully
    acknowledge colleagues and mentors to support our activities.


    A **pdf solutions manual** for end-of-chapter problems and all figures for lecture
