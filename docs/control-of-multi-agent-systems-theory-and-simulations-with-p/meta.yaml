    \ 20, 0.001)\n13 x = odeint(Ax, x0, t, args=(A,))\n14\n15 plt.plot(t,x)\n16 plt.xlabel('t')\n\
    17 plt.ylabel('x')\n18 plt.grid()\n19 plt.show()\n```\n\n## 2.4 Graph Theory\n\
    \nThis section discusses basics of graph theory. In particular, we here introduce\
    \ the *algebraic graph theory* that gives us powerful and efficient tools to analyze\
    \ graphs or networks with the theorems in linear algebra discussed in the previous\
    \ section.\n\n### 2.4.1 What is a Graph?\n\nA graph is a mathematical object that\
    \ is useful to model a network. A graph has multiple nodes (or vertices), and\
    \ edges that connect nodes. Mathematically, a graph is a pair of sets of nodes\
    \ and edges. For example, if we have the node set **V** = {1, 2, . . . , n} and\
    \ the edge set **E** ⊂ **V** × **V**, then the graph is defined as *G* = (**V**,\
    \ **E**).\n\nWhen the number *n* of edges is small, then visualization of the\
    \ graph is also beneficial. The graph shown in Fig. 2.4 is a famous social network\
    \ called *Zachary's Karate Club* [2,14]. In this graph, the nodes represent the\
    \ 34 members of the Karate club, and the 78 edges indicate the true relationship\
    \ between club members who regularly interacted outside the club. This graph is\
    \ frequently used as a benchmark in community detection [2].\n\nZachary's network\
    \ is an *undirected graph*, where the edges have no direction. If we instead consider\
    \ a social network service (SNS) like X (Twitter), or the World Wide Web network,\
    \ each edge has a direction (follow/followed or link/linked). Such a graph is\
    \ called a *directed graph*, or *digraph* for short. For a directed graph, (*i*,\
    \ *j*) ∈ **E** does\n\n![](img/6f6a40195ea61efdca2c32abeddbaaca_62_0.png)\n\n\
    not necessarily imply $(j, i) \\in \\mathbf{E}$, for $i, j \\in \\mathbf{V}$.\
    \ On the other hand, for an undirected graph, $(i, j) \\in \\mathbf{E}$ holds\
    \ if and only if $(j, i) \\in \\mathbf{E}$ holds. For an undirected graph, we\
    \ sometimes exclude $(i, j)$ in $\\mathbf{E}$ if $i > j$, and put only $(i, j)$\
    \ with $i < j$ into $\\mathbf{E}$ for simplicity. In this case, we need to be\
    \ aware of whether we are dealing with directed or undirected graphs.\n\n**Example\
    \ 2.11** *(Python)* Here we define and draw a directed graph by Python. We use\
    \ a useful package called NetworkX [11] for computation in graph theory, as mentioned\
    \ in Sect. 2.1. The Python code is given in Sect. 2.5.1. We draw a directed graph\
    \ $G = (\\mathbf{V}, \\mathbf{E})$ with $\\mathbf{V} = \\{1, 2, 3, 4\\}$, and\n\
    \n$\\mathbf{E} = \\{(1, 2), (1, 3), (3, 2), (3, 4), (4, 1)\\}$.\n\nWe show the\
    \ result in Fig. 2.5. The graph of Zachary's Karate Club in Fig. 2.4 can also\
    \ be obtained by the following lines:\n\n```\nG2 = nx.karate_club_graph()\nnx.draw(G2,\
    \ node_size=500,\n        node_color='orange', with_labels=True)\n```\n\nLet us\
    \ consider a directed graph $G = (\\mathbf{V}, \\mathbf{E})$. For a node $i \\\
    in \\mathbf{V}$, the number of head ends adjacent to $i$ is called the *in-degree*,\
    \ and denoted by $d_i^{\\text{in}}$. Likewise, the number of tail ends adjacent\
    \ to $i$ is called the *out-degree*, and denoted by $d_i^{\\text{out}}$. The\n\
    \n![](img/6f6a40195ea61efdca2c32abeddbaaca_63_0.png)\n\n**Fig. 2.5** A directed\
    \ graph\n\n*maximum degree* is the maximum value among the in-degrees of the nodes\
    \ in **V**, namely,\n\n$$\\Delta \\triangleq \\max_{i \\in \\mathbf{V}} d_i^{\\\
    text{in}}.$$\n\nA directed graph is said to be *balanced* if $d_i^{\\text{in}}\
    \ = d_i^{\\text{out}}$ for all $i \\in \\mathbf{V}$. For an undirected graph,\
    \ we only define the *degree* of node $i \\in \\mathbf{V}$, the number of edges\
