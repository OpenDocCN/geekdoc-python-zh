    # 4.2.2 Relation to Coverage


    The objective function $J$ in (4.5) is characterized by Voronoi diagrams.

    Let

    $$\mathbf{S} \triangleq \{x \in \mathbb{R}^{mn} : \exists(i, j) \in \{1, 2, \ldots,
    n\} \text{ s.t. } x_i = x_j \text{ and } i \neq j\}, \quad (4.13)$$

    where $x_i \in \mathbb{R}^m$ is the $i$-th block of the vector $x$ divided by
    every $m$ elements. Then the situation where $x_i \in \mathbf{Q}$ ($i = 1, 2,
    \ldots, n$) are distinct from each other is represented as

    $$(x_1, x_2, \ldots, x_n) \in \mathbf{Q}^n \setminus \mathbf{S}. \quad (4.14)$$


    $^1$ Consider the space $\mathbb{R}^n$. The intersection of half-spaces is called
    a *polyhedron*. In other words, a polyhedron $\mathbf{P}$ is given by $\mathbf{P}
    = \{x \in \mathbb{R}^n : Cx + d \leq 0\}$ for some matrix $C \in \mathbb{R}^{m
    \times n}$ and vector $d \in \mathbb{R}^m$.'
