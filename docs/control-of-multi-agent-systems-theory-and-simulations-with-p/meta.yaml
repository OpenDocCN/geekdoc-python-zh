  md: 'The function $S_{\gamma} : \mathbb{R}^n \to \mathbb{R}^n$ is the *soft-thresholding
    function* defined by


    $$[S_{\gamma}(v)]_i \triangleq \begin{cases} v_i - \gamma, & \text{if } v_i \ge
    \gamma, \ 0, & \text{if } -\gamma < v_i < \gamma, \ v_i + \gamma, & \text{if }
    v_i \le -\gamma, \end{cases}$$


    $$i = 1, 2, \ldots, n,$$


    where $[S_{\gamma}(v)]_i$ is the $i$-th element of $S_{\gamma}(v)$ and $v_i$ is
    the $i$-th element of $v$.


    # $\ell^{\infty}$ Norm


    Let us consider the $\ell^{\infty}$ norm $\|x\|_{\infty} = \max\{|x_i| : i = 1,
    2, \ldots, n\}$. Its proximal operator is given by


    $$\operatorname{prox}_{\gamma \|\cdot\|_{\infty}}(v) = v - \gamma \Pi_{\bar{\mathbf{B}}_1}(v/\gamma),$$


    where $\bar{\mathbf{B}}_1$ is the $\ell^1$ *unit ball* defined by


    $$\bar{\mathbf{B}}_1 \triangleq \{x \in \mathbb{R}^n : \|x\|_1 \le 1\}.$$


    We note that the projection $\Pi_{\bar{\mathbf{B}}_1}(v)$ onto this set has no
    closed-form, and we need to rely on numerical computation for the projection.
    See [16, Sect. 6.5] for details.


