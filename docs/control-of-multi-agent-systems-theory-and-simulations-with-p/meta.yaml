    ### 3.2.1 积分器智能体的一致性控制器


    现在，我们为最基本的一类多智能体系统提出一种一致性控制器。


    考虑一个具有积分器智能体的多智能体系统，即智能体 $i$ 的动力学由下式给出


    $$\dot{x}_i(t) = u_i(t), \tag{3.10}$$


    其中 $x_i(t) \in \mathbb{R}$ 且 $u_i(t) \in \mathbb{R}$。该控制器是一种基于相对状态的控制器：


    $$u_i(t) = \sum_{j \in \mathbf{N}_i} (x_j(t) - x_i(t)), \tag{3.11}$$


    它是其与邻居的相对状态之和。该控制器被称为*一致性控制器*或*一致性协议*。$^1$


    以下示例演示了一致性控制器：


    **示例 3.2** 考虑由 (3.10) 和 (3.11) 给出的多智能体系统，其中 $n = 6$，$\mathbf{N}_1 = \{2\}$，$\mathbf{N}_2
    = \{3, 5\}$，$\mathbf{N}_3 = \{4\}$，$\mathbf{N}_4 = \{1, 2\}$，$\mathbf{N}_5 = \{6\}$，且
    $\mathbf{N}_6 = \{2\}$。该网络如图 3.1a 所示。


    图 3.2 显示了由第 3.5 节将要介绍的 Python 代码 3.1 计算的状态演化，初始状态为 $x_1(0) = -1$，$x_2(0) = 2$，$x_3(0)
    = 6$，$x_4(0) = 3$，$x_5(0) = -3$，且 $x_6(0) = 1$。可以观察到，系统通过 (3.11) 中的一致性控制器实现了共识。


    同时，以下示例值得注意：


    **示例 3.3** 考虑示例 3.2 中多智能体系统的修改版本，其中 $\mathbf{N}_2 = \{3\}$，$\mathbf{N}_6 = \emptyset$，其余与示例
    3.2 相同。该网络如图 3.1b 所示。


