    # 6.3.3 Subgradient Methods


    Here, we consider the optimization problem (6.35) with non-differentiable $f :
    \mathbb{R}^n \to \mathbb{R} \cup \{+\infty\}$. In this case, we can also design
    an efficient algorithm similar to the gradient projection algorithm, by using
    a subgradient. A vector $g \in \mathbb{R}^n$ is a *subgradient* of $f$ at a point
    $z \in \text{dom}(f)$ if


    $$f(x) \geq f(z) + g^\top(x - z), \quad \forall x \in \mathbb{R}^n. \tag{6.47}$$


    The set of all subgradients of $f$ at $z \in \text{dom}(f)$ is called the *subdifferential*
    of $f$ at $z \in \text{dom}(f)$, and denoted by $\partial f(z)$.


    Figure 6.7 illustrates the geometry of a subgradient. The hyperplane $\mathbf{P}
    \subset \mathbb{R}^{n+1}$ including a point $(z, f(z)) \in \mathbb{R}^{n+1}$ can
    be represented by


    $$a^\top(x - z) + b(y - f(z)) = 0, \tag{6.48}$$


    for some $a \in \mathbb{R}^n$ and $b \in \mathbb{R}$. We assume $b \neq 0$, and
    define $g \triangleq a/b$. Then the equation (6.48) becomes


    $$y = f(z) + g^\top(x - z). \tag{6.49}$$


    The upper space of the hyperplane $\mathbf{P}$ is described by


    $$y \geq f(z) + g^\top(x - z), \tag{6.50}$$


