    $\delta = p - p^*$ is employed. Then, from $\dot{\delta}(t) = \dot{p}(t)$, we
    can have


    $$\dot{\delta}(t) = \bar{H}^\top \text{diag} \left( P_{g_1}, P_{g_2}, \dots, P_{g_m}
