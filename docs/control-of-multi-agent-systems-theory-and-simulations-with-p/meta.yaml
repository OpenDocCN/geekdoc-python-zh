    $$u_i(t) = -\sum_{j \in \mathbf{N}_i} P_{g_{ij}}(t) g_{ij}^*. \tag{5.64}$$


    Then, a modified control law from the gradient control law is given as


    $$u(t) = -\bar{H}^\top \text{diag} \left( P_{g_1}, P_{g_2}, \dots, P_{g_m} \right)
