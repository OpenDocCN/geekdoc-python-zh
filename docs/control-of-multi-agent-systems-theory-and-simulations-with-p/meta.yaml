  md: 'We have also the SIR model over a random network. The SIR model is given by


    $$\frac{dS_k(t)}{dt} = -\lambda k S_k(t) \bar{\Theta}(I(t)), \quad (7.35)$$

    $$\frac{dI_k(t)}{dt} = \beta \lambda k S_k(t) \bar{\Theta}(I(t)) - \gamma I_k(t),
    \quad (7.36)$$

    $$\frac{dR_k(t)}{dt} = \gamma I_k(t), \quad (7.37)$$


    where


    $$\bar{\Theta}(I(t)) \triangleq \frac{1}{\langle k \rangle} \sum_{l=1}^{\Delta}
    (l-1) P(l) i_l(t), \quad i_l(t) \triangleq \frac{I_l(t)}{N_l}. \quad (7.38)$$


    The characteristic time $\tau_{\text{SIR}}$ is given by


    $$\tau_{\text{SIR}} = \frac{\langle k \rangle}{\lambda \langle k^2 \rangle - (\lambda
    + \gamma) \langle k \rangle}. \quad (7.39)$$


    For Erdős–Rényi random graphs, it follows from (7.31) that


    $$\tau_{\text{SIR}} = \frac{1}{\lambda (\langle k \rangle + 1) - (\lambda + \gamma)}.
    \quad (7.40)$$


    This is always finite. On the other hand, for scale-free networks that satisfy
    $2 \le \alpha < 3$, it can be said that


    $$\tau_{\text{SIR}} \to 0, \quad \text{as } N \to \infty. \quad (7.41)$$


    This is due to hubs or super-spreaders in the scale-free network as discussed
    above.


