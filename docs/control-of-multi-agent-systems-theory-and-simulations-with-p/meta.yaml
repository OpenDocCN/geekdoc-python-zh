    $$\text{diag}\left(\frac{P_{g_1}}{\|z_1\|}, \frac{P_{g_2}}{\|z_2\|}, \dots, \frac{P_{g_m}}{\|z_m\|}\right)
    \bar{H} p = \text{diag}\left(\frac{P_{g_1}}{\|z_1\|}, \frac{P_{g_2}}{\|z_2\|},
    \dots, \frac{P_{g_m}}{\|z_m\|}\right) z, \quad (5.12)$$


    where $z = [z_1^\top, z_2^\top, \dots, z_m^\top]^\top$. Thus, due to the property
