    22     angle_error = f_new(p,p_des,N_angle)

    23     Jaco_mat= approx_derivative(f_new,p,args=(p_des,N_angle))

    24     #Jaco_mat = nd.Jacobian(f_new)(p,p_des,N_angle)

    25     dpdt = -1 * np.inner(np.transpose(Jaco_mat),angle_error)

    26     return dpdt.reshape(-1)

    27

    28 ## Setup and run

    29 N_angle = [[1,2,3], [3,1,2]]

    30 N_angle = [[x-1 for x in y] for y in N_angle]

    31 #p0 = np.array([[0,2], [0,0], [1,-1], [1,1]])

