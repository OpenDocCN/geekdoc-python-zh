    ![](img/6f6a40195ea61efdca2c32abeddbaaca_144_0.png)


    The triple $(k, i, j)$ should be understood as a scalar angle between two vectors
    $z_{ki}$ and $z_{kj}$ (denoted as $\theta_{ij}^k$), without considering directions
    and signs. Then, the set of angle constraints could be defined as [13]


    $$\mathbf{A} = \{(k, i, j) : \theta_{ij}^k \in [0, \pi], i, j, k \in \mathbf{V}\}.
    \quad (5.16)$$


    Let the distance or bearing constraints be represented by the edge symbol $\mathbf{E}$
    as done in the previous subsections. Let $|\mathbf{A}| = w$ and $|\mathbf{E}|
    = m$. The cosine of $\theta_{ij}^k$ is written as $a_{kij}$, i.e., $a_{kij} =
    \cos(\theta_{ij}^k)$. The $h$-th angle constraint is sometimes represented as
    $a_h$, where $h \in \{1, 2, \dots, w\}$, and $g$-th edge constraint is also represented
    as $z_g$, where $g \in \{1, 2, \dots, m\}$. Let a set of vertices be given as
    $\mathbf{V}$, along with the set of edge constraints $\mathbf{E}$, and with the
    set of angle constraints $\mathbf{A}$. Then, a formation graph could be written
    as $G = (\mathbf{V}, \mathbf{E}, \mathbf{A})$. With a realization $p$, a framework
    can be a quadruple as $f_p = (G, p) = (\mathbf{V}, \mathbf{E}, \mathbf{A}, p)$.
    Now, to deliver the weak rigidity theory clearly, we need the following concepts.
    But, for simplicity, we restrict the edge constraints only to distances.


    **Definition 5.13** *(Weak equivalence and weak congruence)* Two frameworks $f_p
    = (G, p)$ and $f_q = (G, q)$, with different realizations $p$ and $q$ are called
    *weakly equivalent* if


    +   - $\|p_i - p_j\| = \|q_i - q_j\|$, $\forall(i, j) \in \mathbf{E}$, and

    - $\cos(\theta_{ij}^k) \in f_p = \cos(\theta_{ij}^k) \in f_q$, $\forall(k, i,
    j) \in \mathbf{A}$,


    where $\cos(\theta_{ij}^k) \in f_p$ denotes that $\cos(\theta_{ij}^k)$ is decided
    in the framework $f_p$, while $\cos(\theta_{ij}^k) \in f_q$ is decided in the
    framework $f_q$. Two frameworks are called *weakly congruent* if $\|p_i - p_j\|
    = \|q_i - q_j\|$ for all possible pairs of vertices.


    The principle for the weak congruence is the same as the distance congruence defined
    in Definition 5.3. However, in the weak rigidity theory, we assume $\mathbf{A}
    \neq \emptyset$, and also assume $\mathbf{E} \neq \emptyset$. If $\mathbf{A} =
    \emptyset$, then the weak equivalence and weak congruence are same to the definitions
    in Definition 5.3.


    Now, with the above definitions, we are able to address the meaning of weak rigidity.'
- md: '## 5.2 Rigidity Theory


    **Definition 5.14** (*Weak rigidity*) A framework $(G, p)$ is called *weakly rigid*
    in $\mathbb{R}^d$ if there exists a neighborhood $\mathbf{U}_p$ of $p$ such that
    every framework $(G, q)$, where $q$ stays in the neighborhood $\mathbf{U}_p$,
    i.e., $q \in \mathbf{U}_p$, weakly equivalent to $(G, p)$ is also weakly congruent
    to $(G, p)$.


    **Definition 5.15** (*Global weak rigidity*) A framework $(G, p)$ is called *globally
    weakly rigid* in $\mathbb{R}^d$ if every framework $(G, q)$ weakly equivalent
    to $(G, p)$ is also weakly congruent to $(G, p)$ in $\mathbb{R}^d$.


    As a special case, if $\mathbf{E} = \emptyset$ and $\mathbf{A} \neq \emptyset$,
    then all the constraints are only angles. Such cases are studied under the name
    of *angle rigidity* [6,11]. For angle rigidity theory, we may use the following
    additional concepts:


    **Definition 5.16** (*Angle equivalence and proportional congruence* [13]) Two
    frameworks $f_p = (G, p)$ and $f_q = (G, q)$ with $\mathbf{E} = \emptyset$ and
    $\mathbf{A} \neq \emptyset$ are called *angular-equivalent* if $\cos(\theta_{ij}^k)
    \in f_p = \cos(\theta_{ij}^k) \in f_q$, $\forall(k, i, j) \in \mathbf{A}$. Two
    frameworks are called *proportionally congruent* if $\|p_i - p_j\| = c\|q_i -
    q_j\|$ for all possible pairs of vertices, where $c$ is a proportional constant.


    **Definition 5.17** (*Angle rigidity* [5]) A framework $(\mathbf{V}, \mathbf{A},
    p)$ is called *angle rigid* in $\mathbb{R}^d$ if there exists a neighborhood $\mathbf{U}_p$
    of $p$ such that every framework $(\mathbf{V}, \mathbf{A}, q)$, where $q$ stays
    in the neighborhood $\mathbf{U}_p$, i.e., $q \in \mathbf{U}_p$, angular-equivalent
    to $(\mathbf{V}, \mathbf{A}, p)$ is also proportionally congruent to $(\mathbf{V},
    \mathbf{A}, q)$. A framework $(\mathbf{V}, \mathbf{A}, p)$ is called *globally
    angle rigid* in $\mathbb{R}^d$ if every framework $(\mathbf{V}, \mathbf{A}, q)$
    angular-equivalent to $(\mathbf{V}, \mathbf{A}, p)$ is also proportionally congruent
    to $(\mathbf{V}, \mathbf{A}, p)$ in $\mathbb{R}^d$.


    Note that the framework $f_p$ could be a triple $f_p = (\mathbf{V}, \mathbf{E},
    p)$ or $f_p = (\mathbf{V}, \mathbf{A}, p)$, or quadruple $f_p = (\mathbf{V}, \mathbf{E},
    \mathbf{A}, p)$ depending upon the constraints.


    So far, the concepts for weak (angle) rigidity have been introduced. Next, we
    would like to introduce a tool to check weak rigidity (or angle rigidity). As
    done in distance or bearing rigidity, for this purpose, we need to use some algebraic
    solutions by employing the concept of *infinitesimal weak rigidity* for the case
    of $\mathbf{E} \neq \emptyset$ or *infinitesimal angle rigidity* for the case
    of $\mathbf{E} = \emptyset$. Similar to the infinitesimal distance and bearing
    rigidities, we need to obtain a weak rigidity matrix (or angle rigidity matrix)
    to define infinitesimal motions. Let us focus on a combination of distance constraints
    and angle constraints. With the set of distance constraints (i.e., $\mathbf{E}$)
    and angle constraints (i.e., $\mathbf{A}$), let us define an edge-weak function
    $g_G(p) : \mathbb{R}^{dn} \rightarrow \mathbb{R}^{m+w}$ as


    $$g_G(p) = [\tilde{d}^\top, \tilde{a}^\top]^\top \in \mathbb{R}^{m+w}, \tag{5.17}$$


    where $\tilde{d} = [\|z_1\|^2, \|z_2\|^2, \ldots, \|z_m\|^2]^\top$ and $\tilde{a}
    = [a_1, a_2, \ldots, a_w]^\top$. Then, the weak rigidity matrix is defined as
    the Jacobian matrix of $g_G(p)$:


    $$R_w = \frac{\partial g_G}{\partial p}(p) = \begin{bmatrix} \frac{\partial \bar{d}}{\partial
    p} & \frac{\partial \bar{a}}{\partial p} \end{bmatrix} \in \mathbb{R}^{(m+w) \times
    dn}$$


    If $\mathbf{E} = \emptyset$, the matrix $R_w$ might be called angle rigidity matrix
    [5, 11].


    **Example 5.6** Let us consider triangular formations with distance and angle
    constraints as shown in Fig. 5.9a–c. The weak rigidity matrices for these three
    cases could be computed. The weak rigidity matrix for Fig. 5.9a is given as the
    Jacobian matrix of $g_G(p) = [\|z_{12}\|^2, \|z_{13}\|^2, \cos(\theta_{23}^1)]^\top$:


    $$R_w^a = \begin{bmatrix} 2(p_1 - p_2)^\top & 2(p_2 - p_1)^\top & 0 \\ 2(p_1 -
    p_3)^\top & 0 & 2(p_3 - p_1)^\top \\ \frac{\partial}{\partial p_1} \cos(\theta_{23}^1)
    & \frac{\partial}{\partial p_2} \cos(\theta_{23}^1) & \frac{\partial}{\partial
    p_3} \cos(\theta_{23}^1) \end{bmatrix}$$


    the rigidity matrix for Fig. 5.9b is given as the Jacobian matrix of $g_G(p) =
    [\|z_{12}\|^2, \cos(\theta_{23}^1), \cos(\theta_{12}^3)]^\top$:


    $$R_w^b = \begin{bmatrix} 2(p_1 - p_2)^\top & 2(p_2 - p_1)^\top & 0 \\ \frac{\partial}{\partial
    p_1} \cos(\theta_{23}^1) & \frac{\partial}{\partial p_2} \cos(\theta_{23}^1) &
    \frac{\partial}{\partial p_3} \cos(\theta_{23}^1) \\ \frac{\partial}{\partial
    p_1} \cos(\theta_{12}^3) & \frac{\partial}{\partial p_2} \cos(\theta_{12}^3) &
    \frac{\partial}{\partial p_3} \cos(\theta_{12}^3) \end{bmatrix}$$


    and the rigidity matrix for Fig. 5.9c is given as the Jacobian matrix of $g_G(p)
    = [\cos(\theta_{23}^1), \cos(\theta_{12}^3)]^\top$:


    $$R_w^c = \begin{bmatrix} \frac{\partial}{\partial p_1} \cos(\theta_{23}^1) &
    \frac{\partial}{\partial p_2} \cos(\theta_{23}^1) & \frac{\partial}{\partial p_3}
    \cos(\theta_{23}^1) \\ \frac{\partial}{\partial p_1} \cos(\theta_{12}^3) & \frac{\partial}{\partial
    p_2} \cos(\theta_{12}^3) & \frac{\partial}{\partial p_3} \cos(\theta_{12}^3) \end{bmatrix}$$


    with


    $$\frac{\partial}{\partial p_k} \cos(\theta_{ij}^k) = \frac{\partial}{\partial
    p_k} \frac{z_{ki}^\top}{\|z_{ki}\|} \frac{z_{kj}}{\|z_{kj}\|} = \frac{z_{kj}^\top}{\|z_{kj}\|}
    \frac{1}{\|z_{ki}\|} \left[ I_2 - \frac{z_{ki} z_{ki}^\top}{\|z_{ki}\|^2} \right]
    + \frac{z_{ki}^\top}{\|z_{ki}\|} \frac{1}{\|z_{kj}\|} \left[ I_2 - \frac{z_{kj}
    z_{kj}^\top}{\|z_{kj}\|^2} \right]$$


    $$\frac{\partial}{\partial p_i} \cos(\theta_{ij}^k) = \frac{\partial}{\partial
    p_i} \frac{z_{ki}^\top}{\|z_{ki}\|} \frac{z_{kj}}{\|z_{kj}\|} = -\frac{z_{kj}^\top}{\|z_{kj}\|}
    \frac{1}{\|z_{ki}\|} \left[ I_2 - \frac{z_{ki} z_{ki}^\top}{\|z_{ki}\|^2} \right]$$


    $$\frac{\partial}{\partial p_j} \cos(\theta_{ij}^k) = \frac{\partial}{\partial
    p_j} \frac{z_{ki}^\top}{\|z_{ki}\|} \frac{z_{kj}}{\|z_{kj}\|} = -\frac{z_{ki}^\top}{\|z_{ki}\|}
    \frac{1}{\|z_{kj}\|} \left[ I_2 - \frac{z_{kj} z_{kj}^\top}{\|z_{kj}\|^2} \right]$$


    To define infinitesimal motions, taking a derivative of $g_G(p)$ as $\dot{g}_G(p(t))$,
    we can have


    $$\dot{g}_G(p(t)) = \frac{\partial g_G}{\partial p}(p(t))\frac{\partial p}{\partial
    t} = R_w(t)\dot{p}(t). \tag{5.22}$$


    Thus, the set of infinitesimal motions for a weakly rigid formation system (denoted
    as $\mathbf{M}_w$) can be defined as


    $$\mathbf{M}_w \triangleq \{\delta p \ : \ R_w\delta p = 0, \delta p \neq 0\}.
    \tag{5.23}$$


    The set $\mathbf{M}_w$ is equal to the null space of $R_w$. To understand the
    null space of $R_w$ in the three-dimensional space (i.e., $d=3$), let us use the
    following rotation matrices:


    $$J_1 \triangleq \begin{bmatrix} 0 & 0 & 0 \\ 0 & 0 & -1 \\ 0 & 1 & 0 \end{bmatrix}
    ; \ J_2 \triangleq \begin{bmatrix} 0 & 0 & 1 \\ 0 & 0 & 0 \\ -1 & 0 & 0 \end{bmatrix}
    ; \ J_3 \triangleq \begin{bmatrix} 0 & -1 & 0 \\ 1 & 0 & 0 \\ 0 & 0 & 0 \end{bmatrix}
    . \tag{5.24}$$


    With $J_1$, $J_2$, and $J_3$, we further define


    $$\mathbf{L}_R \triangleq \{\mathbf{1}_n \otimes I_3, (I_n \otimes J_1)p, (I_n
    \otimes J_2)p, (I_n \otimes J_3)p\}, \tag{5.25}$$


    and


    $$\mathbf{L}_S \triangleq \{\mathbf{1}_n \otimes I_3, (I_n \otimes J_1)p, (I_n
    \otimes J_2)p, (I_n \otimes J_3)p, p\}. \tag{5.26}$$


    In the above sets, the element $\mathbf{1}_n \otimes I_3$ represents linear translational
    motions along three independent axes in the three-dimensional space; $(I_n \otimes
    J_1)p$, $(I_n \otimes J_2)p$ and $(I_n \otimes J_3)p$ represent rotational motions
    around three independent axes, respectively; and $p$ represents a scaling motion
    of a formation system. Thus, we can consider $\mathbf{L}_R$ as the set of bases
    of infinitesimal motions when $\mathbf{E} \neq \emptyset$ and $\mathbf{A} \neq
    \emptyset$, and consider $\mathbf{L}_S$ as the set of bases of infinitesimal motions
    when $\mathbf{E} = \emptyset$ and $\mathbf{A} \neq \emptyset$, respectively. Thus,
    in the three-dimensional space, we could make the following observation for a
    weakly rigid formation system:


    **Lemma 5.4** ([14]) *Given a framework $f_p = (\mathbf{V}, \mathbf{E}, \mathbf{A},
    p)$, it holds $\text{span}(\mathbf{L}_R) \subseteq \text{ker}(R_w)$ for $\mathbf{E}
    \neq \emptyset$, and $\text{span}(\mathbf{L}_S) \subseteq \text{ker}(R_w)$ for
    $\mathbf{E} = \emptyset$.*


    Moreover, the above lemma immediately results in the conclusion that, when $\mathbf{E}
    \neq \emptyset$, $\text{rank}(R_w) \leq dn - \frac{d(d+1)}{2}$, and when $\mathbf{E}
    = \emptyset$, $\text{rank}(R_w) \leq dn - \frac{d(d+1)}{2} - 1$. In the case of
    $\mathbf{E} \neq \emptyset$, it is equal to (5.5) since only translational and
    rotational motions are trivial ones. However, in the case of $\mathbf{E} = \emptyset$,
    since there is no distance constraint anymore, there could exist a scaling motion.
    That is why $\text{rank}(R_w)$ is upper bounded'
  mdcn: '## 5.2 刚性理论


    **定义 5.14**（*弱刚性*）一个框架 $(G, p)$ 在 $\mathbb{R}^d$ 中被称为*弱刚性*的，如果存在 $p$ 的一个邻域 $\mathbf{U}_p$，使得每一个框架
    $(G, q)$（其中 $q$ 位于邻域 $\mathbf{U}_p$ 内，即 $q \in \mathbf{U}_p$）若与 $(G, p)$ 弱等价，则也与
    $(G, p)$ 弱全等。


    **定义 5.15**（*全局弱刚性*）一个框架 $(G, p)$ 在 $\mathbb{R}^d$ 中被称为*全局弱刚性*的，如果每一个与 $(G, p)$
    弱等价的框架 $(G, q)$ 在 $\mathbb{R}^d$ 中也与 $(G, p)$ 弱全等。


    作为一个特例，如果 $\mathbf{E} = \emptyset$ 且 $\mathbf{A} \neq \emptyset$，那么所有约束都只是角度约束。这类情况在*角度刚性*
    [6,11] 的名称下进行研究。对于角度刚性理论，我们可以使用以下附加概念：


    **定义 5.16**（*角度等价与比例全等* [13]）两个框架 $f_p = (G, p)$ 和 $f_q = (G, q)$，其中 $\mathbf{E}
    = \emptyset$ 且 $\mathbf{A} \neq \emptyset$，如果满足 $\cos(\theta_{ij}^k) \in f_p =
    \cos(\theta_{ij}^k) \in f_q$，$\forall(k, i, j) \in \mathbf{A}$，则被称为*角度等价*。如果对于所有可能的顶点对，满足
    $\|p_i - p_j\| = c\|q_i - q_j\|$，其中 $c$ 是一个比例常数，则这两个框架被称为*比例全等*。


    **定义 5.17**（*角度刚性* [5]）一个框架 $(\mathbf{V}, \mathbf{A}, p)$ 在 $\mathbb{R}^d$ 中被称为*角度刚性*的，如果存在
    $p$ 的一个邻域 $\mathbf{U}_p$，使得每一个框架 $(\mathbf{V}, \mathbf{A}, q)$（其中 $q$ 位于邻域 $\mathbf{U}_p$
    内，即 $q \in \mathbf{U}_p$）若与 $(\mathbf{V}, \mathbf{A}, p)$ 角度等价，则也与 $(\mathbf{V},
    \mathbf{A}, q)$ 比例全等。一个框架 $(\mathbf{V}, \mathbf{A}, p)$ 在 $\mathbb{R}^d$ 中被称为*全局角度刚性*的，如果每一个与
    $(\mathbf{V}, \mathbf{A}, p)$ 角度等价的框架 $(\mathbf{V}, \mathbf{A}, q)$ 在 $\mathbb{R}^d$
    中也与 $(\mathbf{V}, \mathbf{A}, p)$ 比例全等。


    请注意，框架 $f_p$ 可以是三元组 $f_p = (\mathbf{V}, \mathbf{E}, p)$ 或 $f_p = (\mathbf{V},
    \mathbf{A}, p)$，也可以是四元组 $f_p = (\mathbf{V}, \mathbf{E}, \mathbf{A}, p)$，具体取决于约束条件。


    到目前为止，我们已经介绍了弱（角度）刚性的概念。接下来，我们想介绍一个用于检验弱刚性（或角度刚性）的工具。正如在距离或方位刚性中所做的那样，为此目的，我们需要使用一些代数解法，即利用*无穷小弱刚性*（对于
    $\mathbf{E} \neq \emptyset$ 的情况）或*无穷小角度刚性*（对于 $\mathbf{E} = \emptyset$ 的情况）的概念。类似于无穷小距离和方位刚性，我们需要获得一个弱刚性矩阵（或角度刚性矩阵）来定义无穷小运动。让我们关注距离约束和角度约束的组合。给定距离约束集（即
    $\mathbf{E}$）和角度约束集（即 $\mathbf{A}$），让我们定义一个边弱函数 $g_G(p) : \mathbb{R}^{dn} \rightarrow
    \mathbb{R}^{m+w}$ 为


    $$g_G(p) = [\tilde{d}^\top, \tilde{a}^\top]^\top \in \mathbb{R}^{m+w}, \tag{5.17}$$


    其中 $\tilde{d} = [\|z_1\|^2, \|z_2\|^2, \ldots, \|z_m\|^2]^\top$ 且 $\tilde{a} =
    [a_1, a_2, \ldots, a_w]^\top$。那么，弱刚性矩阵被定义为 $g_G(p)$ 的雅可比矩阵：


    $$R_w = \frac{\partial g_G}{\partial p}(p) = \begin{bmatrix} \frac{\partial \bar{d}}{\partial
    p} & \frac{\partial \bar{a}}{\partial p} \end{bmatrix} \in \mathbb{R}^{(m+w) \times
    dn}$$


    如果 $\mathbf{E} = \emptyset$，矩阵 $R_w$ 可能被称为角度刚性矩阵 [5, 11]。


    **示例 5.6** 让我们考虑如图 5.9a–c 所示的具有距离和角度约束的三角形编队。可以计算这三种情况的弱刚性矩阵。图 5.9a 的弱刚性矩阵由 $g_G(p)
    = [\|z_{12}\|^2, \|z_{13}\|^2, \cos(\theta_{23}^1)]^\top$ 的雅可比矩阵给出：


    $$R_w^a = \begin{bmatrix} 2(p_1 - p_2)^\top & 2(p_2 - p_1)^\top & 0 \\ 2(p_1 -
    p_3)^\top & 0 & 2(p_3 - p_1)^\top \\ \frac{\partial}{\partial p_1} \cos(\theta_{23}^1)
    & \frac{\partial}{\partial p_2} \cos(\theta_{23}^1) & \frac{\partial}{\partial
    p_3} \cos(\theta_{23}^1) \end{bmatrix}$$


    图 5.9b 的刚性矩阵由 $g_G(p) = [\|z_{12}\|^2, \cos(\theta_{23}^1), \cos(\theta_{12}^3)]^\top$
    的雅可比矩阵给出：


    $$R_w^b = \begin{bmatrix} 2(p_1 - p_2)^\top & 2(p_2 - p_1)^\top & 0 \\ \frac{\partial}{\partial
    p_1} \cos(\theta_{23}^1) & \frac{\partial}{\partial p_2} \cos(\theta_{23}^1) &
    \frac{\partial}{\partial p_3} \cos(\theta_{23}^1) \\ \frac{\partial}{\partial
    p_1} \cos(\theta_{12}^3) & \frac{\partial}{\partial p_2} \cos(\theta_{12}^3) &
    \frac{\partial}{\partial p_3} \cos(\theta_{12}^3) \end{bmatrix}$$


    图 5.9c 的刚性矩阵由 $g_G(p) = [\cos(\theta_{23}^1), \cos(\theta_{12}^3)]^\top$ 的雅可比矩阵给出：


    $$R_w^c = \begin{bmatrix} \frac{\partial}{\partial p_1} \cos(\theta_{23}^1) &
    \frac{\partial}{\partial p_2} \cos(\theta_{23}^1) & \frac{\partial}{\partial p_3}
    \cos(\theta_{23}^1) \\ \frac{\partial}{\partial p_1} \cos(\theta_{12}^3) & \frac{\partial}{\partial
    p_2} \cos(\theta_{12}^3) & \frac{\partial}{\partial p_3} \cos(\theta_{12}^3) \end{bmatrix}$$


    其中


    $$\frac{\partial}{\partial p_k} \cos(\theta_{ij}^k) = \frac{\partial}{\partial
    p_k} \frac{z_{ki}^\top}{\|z_{ki}\|} \frac{z_{kj}}{\|z_{kj}\|} = \frac{z_{kj}^\top}{\|z_{kj}\|}
    \frac{1}{\|z_{ki}\|} \left[ I_2 - \frac{z_{ki} z_{ki}^\top}{\|z_{ki}\|^2} \right]
    + \frac{z_{ki}^\top}{\|z_{ki}\|} \frac{1}{\|z_{kj}\|} \left[ I_2 - \frac{z_{kj}
    z_{kj}^\top}{\|z_{kj}\|^2} \right]$$


    $$\frac{\partial}{\partial p_i} \cos(\theta_{ij}^k) = \frac{\partial}{\partial
    p_i} \frac{z_{ki}^\top}{\|z_{ki}\|} \frac{z_{kj}}{\|z_{kj}\|} = -\frac{z_{kj}^\top}{\|z_{kj}\|}
    \frac{1}{\|z_{ki}\|} \left[ I_2 - \frac{z_{ki} z_{ki}^\top}{\|z_{ki}\|^2} \right]$$


    $$\frac{\partial}{\partial p_j} \cos(\theta_{ij}^k) = \frac{\partial}{\partial
    p_j} \frac{z_{ki}^\top}{\|z_{ki}\|} \frac{z_{kj}}{\|z_{kj}\|} = -\frac{z_{ki}^\top}{\|z_{ki}\|}
    \frac{1}{\|z_{kj}\|} \left[ I_2 - \frac{z_{kj} z_{kj}^\top}{\|z_{kj}\|^2} \right]$$


    为了定义无穷小运动，对 $g_G(p)$ 求导得到 $\dot{g}_G(p(t))$，我们可以得到


    $$\dot{g}_G(p(t)) = \frac{\partial g_G}{\partial p}(p(t))\frac{\partial p}{\partial
    t} = R_w(t)\dot{p}(t). \tag{5.22}$$


    因此，一个弱刚性编队系统的无穷小运动集合（记为 $\mathbf{M}_w$）可以定义为


    $$\mathbf{M}_w \triangleq \{\delta p \ : \ R_w\delta p = 0, \delta p \neq 0\}.
    \tag{5.23}$$


    集合 $\mathbf{M}_w$ 等于 $R_w$ 的零空间。为了理解三维空间（即 $d=3$）中 $R_w$ 的零空间，让我们使用以下旋转矩阵：


    $$J_1 \triangleq \begin{bmatrix} 0 & 0 & 0 \\ 0 & 0 & -1 \\ 0 & 1 & 0 \end{bmatrix}
    ; \ J_2 \triangleq \begin{bmatrix} 0 & 0 & 1 \\ 0 & 0 & 0 \\ -1 & 0 & 0 \end{bmatrix}
    ; \ J_3 \triangleq \begin{bmatrix} 0 & -1 & 0 \\ 1 & 0 & 0 \\ 0 & 0 & 0 \end{bmatrix}
    . \tag{5.24}$$


    利用 $J_1$、$J_2$ 和 $J_3$，我们进一步定义


    $$\mathbf{L}_R \triangleq \{\mathbf{1}_n \otimes I_3, (I_n \otimes J_1)p, (I_n
    \otimes J_2)p, (I_n \otimes J_3)p\}, \tag{5.25}$$


    以及


    $$\mathbf{L}_S \triangleq \{\mathbf{1}_n \otimes I_3, (I_n \otimes J_1)p, (I_n
    \otimes J_2)p, (I_n \otimes J_3)p, p\}. \tag{5.26}$$


    在上述集合中，元素 $\mathbf{1}_n \otimes I_3$ 表示沿三维空间中三个独立轴的线性平移运动；$(I_n \otimes J_1)p$、$(I_n
    \otimes J_2)p$ 和 $(I_n \otimes J_3)p$ 分别表示绕三个独立轴的旋转运动；而 $p$ 表示编队系统的缩放运动。因此，当 $\mathbf{E}
    \neq \emptyset$ 且 $\mathbf{A} \neq \emptyset$ 时，我们可以将 $\mathbf{L}_R$ 视为无穷小运动的基集合；当
    $\mathbf{E} = \emptyset$ 且 $\mathbf{A} \neq \emptyset$ 时，我们可以将 $\mathbf{L}_S$
    视为无穷小运动的基集合。因此，在三维空间中，我们可以对弱刚性编队系统做出以下观察：


    **引理 5.4** ([14]) *给定一个框架 $f_p = (\mathbf{V}, \mathbf{E}, \mathbf{A}, p)$，当 $\mathbf{E}
    \neq \emptyset$ 时，有 $\text{span}(\mathbf{L}_R) \subseteq \text{ker}(R_w)$；当 $\mathbf{E}
    = \emptyset$ 时，有 $\text{span}(\mathbf{L}_S) \subseteq \text{ker}(R_w)$。*


    此外，上述引理立即得出结论：当 $\mathbf{E} \neq \emptyset$ 时，$\text{rank}(R_w) \leq dn - \frac{d(d+1)}{2}$；当
    $\mathbf{E} = \emptyset$ 时，$\text{rank}(R_w) \leq dn - \frac{d(d+1)}{2} - 1$。在
    $\mathbf{E} \neq \emptyset$ 的情况下，这与 (5.5) 相等，因为只有平移和旋转运动是平凡运动。然而，在 $\mathbf{E}
    = \emptyset$ 的情况下，由于不再有距离约束，可能存在缩放运动。这就是为什么 $\text{rank}(R_w)$ 有一个上界'
