  md: '# 2.1.1 An Overview of Python


    Python is an interpreted programming language developed in the late 1980s by Guido
    van Rossum, which has since become one of the most popular programming languages
    in the world [9]. Python is extensively used in various fields including data
    science, artificial intelligence, machine learning, and scientific computing,
    making it a versatile language suitable for a wide array of applications.


    One of the key strengths of Python is the availability of a multitude of useful
    packages, including `NumPy` and `SciPy` for scientific computing, `TensorFlow`
    and `scikit-learn` for machine learning, `NetworkX` for network analysis, to name
    a few. These packages provide pre-written solutions to a plethora of challenges,
    thereby allowing developers and researchers to focus on their specific tasks.


    # 2.1.2 Python Environment


    Instead of setting up your Python environment by installing Python and related
    packages from scratch, we recommend to install an Integrated Development Environment
    (IDE) such as `Jupyter Notebook`.¹ This can also increase your productivity by
    combining code editing, debugging, and testing in an easy-to-use application.
    We particularly recommend to use `Google Colaboratory` (Colab for short), a web-based
    IDE, with which you can write and execute Python codes through your internet browser.


    To use Google Colab, you need to have a Google account and be signed in. Once
    you are signed in, you can access Colab by visiting the following link:


    ```

    https://colab.research.google.com/.

    ```


    On this web page, you can create a new notebook by clicking the **New Notebook**
    button, then you will find a new notebook opened in your browser, on which you
    can then use to write and run code. In particular, if you want to run a Python
    program shown in this book, just copy and paste it into a new cell, and press
    the **Play** button (or use the “Shift+Enter” keyboard shortcut).


    You can also use the Jupyter Notebook, which is a simple interactive environment
    for Python coding. We distribute the Python programs in this book as `.ipynb`
    files, which you can directly open by the Google Colab or the Jupyter Notebook.
    From now on, we assume you can use a Python platform like the Google Colab and
