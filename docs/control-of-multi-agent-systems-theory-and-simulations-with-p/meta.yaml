    which could be considered as more complicated couplings (but without any state
    information). So, the boundary between consensus and synchronization is not clear.
    A group of heterogeneous dynamics was analyzed with general local controllers
    in [80]. They used local controllers for individual agents, which use coupling
    and output measurements. It'
