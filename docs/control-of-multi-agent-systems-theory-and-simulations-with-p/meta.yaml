    Python Code 6.4 is a Python program for group testing by the FISTA algorithm in
    Example 6.6


    # Python Code 6.4: Group Testing by FISTA Algorithm in Example 6.6


    ```

    1 import numpy as np

    2 import matplotlib.pyplot as plt

    3

    4 ## Parameter settings

    5 m = 100 # Number of tests

    6 n = 1000 # Number of people

    7 k = 5 # Number of positives

    8 # Original vector

    9 np.random.seed(1)

    10 x_orig = np.zeros(n)

    11 S = np.random.randint(n,size=k)

    12 x_orig[S] = 1

    13 # Testing matrix

    14 A = np.random.randint(2,size=(m, n))

    15 # Result vector with noise

    16 b = A @ x_orig + 0.1 * np.random.randn(m)

    17 ## Optimization by FISTA

    18 # Soft-thresholding function

    19 def St(lmbd, v):

    20     n = v.shape[0]

    21     Sv = np.zeros(n)

    22     i = np.abs(v) > lmbd

    23     Sv[i] = v[i] - np.sign(v[i]) * lmbd

    24     return Sv

    25 # Parameter settings

    26 lmbd = 5

    27 A_norm = np.linalg.norm(A,2)

    28 gamma = 1/A_norm**2 # Step size

    29 max_itr = 5000 # Number of iterations

    30 x = np.zeros(n) # Initial guess for x

    31 z = x # Initial guess for z

    32 t = 0 # Initial guess for t

    33 error = np.zeros(max_itr) # residual

    34 # Iteration

    35 for k in range(max_itr):

    36     error[k] = np.linalg.norm(x_orig - x)

    37     res = A @ z - b

    38     x2 = St(gamma*lmbd, z - gamma*A.T @ res)

    39     t2 = (1 + np.sqrt(1+4*t**2))/2

    40     z = x2 + (t-1)/t2 * (x2 - x)

    41     x = x2

    42     t = t2

    43 ## Error analysis

    44 fig = plt.figure()

    45 plt.semilogy(error)

    46 plt.xlabel("k")

    ```'
