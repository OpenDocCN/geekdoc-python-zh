    ## 7.3 Spreading Phenomenon over Complex Networks


    In the previous section, we assumed the homogeneous mixing hypothesis. Under this
    assumption, the network over which viruses spread is symmetric. However, the real
    human contact network is much more complex than such a symmetric network. In this
    section, we discuss the viral spreading phenomenon over complex random networks.


    $^1$ The definition of the basic reproductive number $R_0$ depends on the model,
    and hence the number for the SIS model, $\beta N / \gamma$ is different from that
    for the SIR model. We use the same symbol $R_0$ here for simplicity.


    ### 7.3.1 Random Networks


    Here we review *random networks*, or *random graphs*, where the edges are randomly
    chosen with a fixed number of nodes.


    First, we consider a simple random network called the *Erdős–Rényi random graph
    model*. This is a graph $G = (\mathbf{V}, \mathbf{E})$ with $\mathbf{V} = \{1,
    2, \dots, N\}$, where each edge is randomly chosen with a prefixed probability
    $p \in (0, 1)$, that is,


    $(i, j) \in \mathbf{E}, \quad \text{with probability } p, \qquad (7.19)$


    for every $i, j \in \mathbf{V}$. It is easily shown that the *average degree*
    $\langle k \rangle$, the average number of edges per node in $G$, is given by


    $\langle k \rangle = (N - 1)p. \qquad (7.20)$


    Also, the *degree distribution* $P(k)$, the probability of a node to have degree
    $k$, is given by


    $P(k) = \binom{N - 1}{k} p^k (1 - p)^{N - 1 - k}, \quad k = 0, 1, 2, \dots, N
    - 1. \qquad (7.21)$


    **Example 7.4** *(Python)* We can easily generate an Erdős–Rényi random graph
    with the `NetworkX` package. The Python program is given in Sect. 7.4.4.


    We set the number of nodes $N = 100$ and the edge connection probability $p =
    0.02$. We also fix a random seed, `seed = 1`, to generate the same graph for every
    computation. An Erdős–Rényi random graph is generated by using the `NetworkX`
    function `erdos_renyi_graph`. The average degree is computed as `ave_deg = 2.26`
    which is close to $(N - 1)p = 1.98$. Then, the degree distribution is plotted
    as shown in Fig. 7.4. We note that the distribution can be approximated by the
    *Poisson distribution*


    $P(k) \approx \frac{e^{-\lambda} \lambda^k}{k!}, \qquad (7.22)$


    with $\lambda = 2.26$ (the average degree of the network).


    Let us consider another random graph whose degree distribution follows a power
    law. In other words, it is a random graph whose degree distribution satisfies


    $P(k) \propto k^{-\alpha}, \qquad (7.23)$


    for large $k$, where $\alpha$ is a positive parameter. Such a network is called
    a *scale-free network*. Scale-free networks can be found around us; social networks,
    computer networks like the WWW, airline networks, and contact networks [1,2].


    A scale-free network can be generated as follows:


    - (i) Choose a random graph of $m_0$ nodes as an initial graph. We assume that
    each node of this graph has at least one edge.

    - (ii) Add a new node with $m \leq m_0$ edges that randomly connect the new node
    to $m$ nodes already in the graph. The probability that an edge of the new node
    connects to node $i$ depends on the degree $k_i$ of node $i$. Namely, this probability
    is given by

    $$\Pi(k_i) = \frac{k_i}{\sum_j k_j}, \quad i = 1, 2, \ldots \tag{7.24}$$

    - (iii) Continue the above process until the number of nodes reaches a prefix
    number $N$.


    The generation model is called the *Barabási–Albert model*. The edge choice with
    the probability (7.24) is called the *preferential attachment*. Due to the preferential
    attachment, higher-degree nodes have a bigger chance to connect new nodes than
    lower-degree nodes.


    **Example 7.5** (*Python*) Let us generate a scale-free network by NetworkX. The
    Python program is given in Sect. 7.4.5 which generates a scale-free network by
    the Barabási–Albert model. We set the number of nodes $N = 100$ and the number
    of added edges $m = 1$. The average degree is computed as $\langle k \rangle =
    1.98$, which is similar to the average degree of the Erdős–Rényi random graph
    in Example 7.4. However, the degree distribution is very different, as shown in
    Fig. 7.5. The maximum degree of the Erdős–Rényi random graph in Example 7.4 is
    8 from Fig. 7.4, while that of the Barabási–Albert random graph is 19, and also
    there is a node with degree 13. This is thanks to the power law in (7.23), and
    such a distribution is said to be a *heavy-tailed distribution*. The nodes of
    degrees 19 and 13 are called *hubs*, which have much more connections than other
    nodes. In a scale-free network, hubs can be found in general. □


    **Fig. 7.4** Degree distribution $P(k)$ of an Erdős–Rényi random graph


    **Fig. 7.5** Degree distribution $P(k)$ of a scale-free network by the Barabási–Albert
    random


    ### 7.3.2 Viral Spreading over Random Networks


    Now, we discuss viral spreading models over random networks discussed above. In
    particular, there will be a few nodes, or agents, that have very high degrees
    in a scale-free network. Such people can contact many other agents and hence will
    be much more likely to be infected. Therefore, we distinguish nodes by their degrees
    and assume that nodes with the same degree are statistically equivalent. For this,
    we denote by $I_k$ and $S_k$ the numbers of infected and susceptible agents, or
    nodes, with degree $k$. We also denote by $N_k$ the number of all nodes with degree
    $k$, that is, we have


    $$I_k(t) + S_k(t) = N_k, \quad t \geq 0, \quad k = 1, 2, \ldots, \Delta, \tag{7.25}$$


    where $\Delta$ is the maximum degree. Let us consider a scale-free network with
