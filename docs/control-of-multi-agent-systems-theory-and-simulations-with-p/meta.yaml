    (f'')^\top f(\tilde{e}^u)]}{\partial \tilde{e}^u} \right|_{\tilde{e}^u=0} \\

    &= -\left. \frac{\partial Q(\tilde{e}^u)}{\partial \tilde{e}^u} [\tilde{e}^u +
    (f'')^\top f(\tilde{e}^u)] - Q(\tilde{e}^u) \left[ I_{\sigma^u \times \sigma^u}
    + \frac{\partial [(f'')^\top f(\tilde{e}^u)]}{\partial \tilde{e}^u} \right] \right|_{\tilde{e}^u=0}.
    \quad (5.73)

    \end{aligned}

    $$


    Let us consider a small neighborhood of $\tilde{e}^u$, defined by the set $\mathbf{B}_r
    \triangleq \{\tilde{e}^u : \|\tilde{e}^u\| < r\}$ where $r > 0$ is a small constant.
    Then, $\tilde{e}^u$ and $\tilde{e}^v$ are bounded, which implies the boundedness
    of $f''$ and $Q(\tilde{e}^u)$. Thus, the solution of (5.72) is bounded. Moreover,
    the Jacobian matrix $J(\tilde{e}^u)$ is bounded and Lipschitz continuous since
    the right-hand side of (5.72) is continuously differentiable. The right-hand side
    of (5.73), when $\tilde{e}^u = 0$, could be simplified as


    $$

    J(\tilde{e}^u) = -Q(\tilde{e}^u) \left[ I_{\sigma^u \times \sigma^u} + \frac{\partial
    [(f'')^\top f(\tilde{e}^u)]}{\partial \tilde{e}^u} \right]_{\tilde{e}^u=0} .

    $$


