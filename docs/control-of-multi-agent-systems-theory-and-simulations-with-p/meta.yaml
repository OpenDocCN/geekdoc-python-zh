    ## 6.3.3 次梯度方法


    这里，我们考虑优化问题 (6.35)，其中 $f : \mathbb{R}^n \to \mathbb{R} \cup \{+\infty\}$ 是不可微的。在这种情况下，我们也可以通过使用次梯度来设计一个类似于梯度投影算法的高效算法。向量
    $g \in \mathbb{R}^n$ 是 $f$ 在点 $z \in \text{dom}(f)$ 处的 *次梯度*，如果


    $$f(x) \geq f(z) + g^\top(x - z), \quad \forall x \in \mathbb{R}^n. \tag{6.47}$$


    $f$ 在 $z \in \text{dom}(f)$ 处的所有次梯度的集合称为 $f$ 在 $z \in \text{dom}(f)$ 处的 *次微分*，记为
    $\partial f(z)$。


    图 6.7 说明了次梯度的几何意义。包含点 $(z, f(z)) \in \mathbb{R}^{n+1}$ 的超平面 $\mathbf{P} \subset
    \mathbb{R}^{n+1}$ 可以表示为


    $$a^\top(x - z) + b(y - f(z)) = 0, \tag{6.48}$$


    其中 $a \in \mathbb{R}^n$ 和 $b \in \mathbb{R}$。我们假设 $b \neq 0$，并定义 $g \triangleq
    a/b$。那么方程 (6.48) 变为


    $$y = f(z) + g^\top(x - z). \tag{6.49}$$


    超平面 $\mathbf{P}$ 的上半空间描述为


    $$y \geq f(z) + g^\top(x - z), \tag{6.50}$$


    ![](img/6f6a40195ea61efdca2c32abeddbaaca_188_0.png)


    **图 6.7** $f$ 的上图 epi(f) 和一个支撑超平面 $\mathbf{P}$'
