    # 2.2.10 Linear Systems and Matrix Exponential


    Here, we elucidate the concept of the matrix exponential, which plays an important
    role in linear control theory. Let us consider a simple ordinary differential
    equation


    $$\dot{x}(t) = ax(t), \quad t \geq 0, \tag{2.54}$$

    where $x(t) \in \mathbb{R}$. The solution is easily obtained by


    $$x(t) = e^{at}x(0), \quad t \geq 0. \tag{2.55}$$

    In systems and control, we often consider a *multi-variable* system described
    by


    $$\dot{x}(t) = Ax(t), \quad t \geq 0, \tag{2.56}$$

    where $x(t)$ is an $n$-dimensional real vector and $A \in \mathbb{R}^{n \times
    n}$ is a matrix. To analyze this multi-variable differential equation, the matrix
    exponential plays a very important role. For a square matrix $A \in \mathbb{R}^{n
    \times n}$, the *matrix exponential* $e^A$ is defined by


    $$e^A \triangleq \sum_{k=0}^{\infty} \frac{1}{k!} A^k. \tag{2.57}$$

    The matrix exponential has interesting properties as in the following theorem:'
