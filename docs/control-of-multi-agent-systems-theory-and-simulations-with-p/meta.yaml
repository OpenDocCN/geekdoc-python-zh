    the neighborhood of $p$ (denote it as $\mathbf{U}_p^1$). If a framework is generic,
    then by Definition 5.8, in the neighborhood of $p$ (denote it as $\mathbf{U}_p^2$),
    a generic distance rigidity is also equivalent to distance rigidity. Consequently,
    since there exists an intersection set between $\mathbf{U}_p^1$ and $\mathbf{U}_p^2$,
    i.e., $\mathbf{U}_p^1 \cap \mathbf{U}_p^2 = \mathbf{U}_p^3$, the three concepts
    become equivalent in $\mathbf{U}_p^3$. $\square$


    The above theorem implies that the distance rigidity property could be evaluated
    by a topology of a given graph, rather than using a framework. When the rigidity
    is evaluated topologically, we then could consider only the graph, not the framework.
    Given a graph, to have a distance rigidity property, we can intuitively imagine
    that the edges should be well distributed and any subgraph also needs to be distance
    rigid. These intuitions were firstly analyzed in [16] as:


    **Theorem 5.2** (Laman Theorem) [9,16] *Given a graph $G = (\mathbf{V}, \mathbf{E})$
    with $2n - 3$ edges in the two-dimensional space, it is distance rigid if and
    only if there is no subgraph $G'' = (\mathbf{V}'', \mathbf{E}'')$, where $\mathbf{V}''
    \subseteq \mathbf{V}$ and $\mathbf{E}'' \subseteq \mathbf{E}$, that has more than
    $2n'' - 3$ edges where $n'' = |\mathbf{V}''|$.*


    The Laman theorem means that the edges of $G = (\mathbf{V}, \mathbf{E})$ are independent⁵
    if and only if no subgraph has more than $2n'' - 3$ edges [9]. Thus, the Laman
    theorem is a fully topological method to check the distance rigidity in the two-dimensional
    space. However, the Laman theorem is not sufficient in higher dimensional spaces
    [9], and it is not for global distance rigidity, it is only for local distance
    rigidity. Also, since the graph $G = (\mathbf{V}, \mathbf{E})$ has only the $2n
    - 3$ edges, it is called minimally distance rigidity. It is known that any minimally
    distance rigidity graph could be generated by Henneberg construction.


    ⁴ In the existing literature, the concepts of the adjective *regular* and *generic*
    are distinguished. A regular realization is a property of the realization $p$,
    and a generic realization is a property of an open neighborhood. However, since
    they are introduced to handle the rigidity from a topological perspective, they
    may imply each other. To follow the existing concepts of the literature, we consider
    both concepts in this book separately.


