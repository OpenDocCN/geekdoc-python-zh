    \mathbf{C}_j$ 绘制在图 2.2 中。$A$ 的特征值为 2.69 和 $1.66 \pm 4.17\mathrm{j}$，实际上，它们位于交集
    $\mathbf{R} \cap \mathbf{C}$ 内。


