    # 一致性控制


    ## 3


    ## 关键点


    - “一致性”是本章的主要主题，指的是所有智能体就其状态达成一致。

    - 一个基本的一致性控制器由其相对于邻居的状态之和给出。

    - 带有该控制器的多智能体系统的集体动力学被表示为一个与网络相关的图拉普拉斯矩阵的线性系统。系统的收敛性由图拉普拉斯矩阵的特征值决定。

    - 离散时间情况与连续时间情况类似，但在离散时间情况下，佩龙矩阵而非图拉普拉斯矩阵扮演着重要角色。


    ## 3.1 一致性问题


    考虑由智能体 1, 2, . . . , n 组成的多智能体系统。智能体 i 的动力学由下式给出


    $\dot{x}_i(t) = f_i(x_i(t), u_i(t))$, (3.1)


    其中 $x_i(t) \in \mathbb{R}^m$ 和 $u_i(t) \in \mathbb{R}^l$ 分别是状态和输入，$f_i : \mathbb{R}^m
    \times \mathbb{R}^l \rightarrow \mathbb{R}^m$ 是一个函数。


    **补充信息** 在线版本包含补充材料，可在 https://doi.org/10.1007/978-3-031-52981-8_3 获取。


    为了确定控制输入，每个智能体可以使用其他一些智能体的信息。智能体 $i$ 可以从中获取信息的智能体称为*邻居*，邻居集合记为 $\mathbf{N}_i \subseteq
    \{1, 2, \ldots, n\} \setminus \{i\}$。在实践中，集合 $\mathbf{N}_i$ 可能是时变的，但在本章中假设它是时不变的。由此产生的信息流由一个网络表示，该网络在数学上由图
    $G = (\mathbf{V}, \mathbf{E})$ 表示，其中 $\mathbf{V} \triangleq \{1, 2, \ldots, n\}$，$\mathbf{E}
    \triangleq \{(j, i) \in \mathbf{V} \times \mathbf{V} | j \in \mathbf{N}_i\}$。


    智能体 $i$ 的控制器基于其邻居收集的信息，通常由以下两种形式之一给出：


    基于绝对状态：$u_i(t) = g_i(x_i(t), [x_j(t)]_{j \in \mathbf{N}_i})$，

    基于相对状态：$u_i(t) = h_i([x_j(t) - x_i(t)]_{j \in \mathbf{N}_i})$, (3.2)


    其中 $g_i : \mathbb{R}^m \times \mathbb{R}^{m|\mathbf{N}_i|} \to \mathbb{R}^l$ 和
    $h_i : \mathbb{R}^{m|\mathbf{N}_i|} \to \mathbb{R}^l$ 是函数。当每个智能体可以获得自身和邻居的状态信息时（例如，通过智能体之间的通信），使用前者。当每个智能体的信息仅限于其相对于邻居的状态的相对值时，使用后者。例如，当
    $x_i(t)$ ($i = 1, 2, \ldots, n$) 表示空间中的位置，并且每个智能体通过内部传感器（如基于视觉的传感器）测量与邻居的相对位置时，就会出现这种情况。


    如果函数 $f_i$ ($i = 1, 2, \ldots, n$) 在所有智能体中是相同的，则称这些智能体是*同质的*；否则，它们是*异质的*。类似地，控制器根据其同质性被称为*同质的*或*异质的*。


    对于 (3.1) 中的多智能体系统，*一致性*的概念定义如下：如果具有初始状态 $(x_1(0), x_2(0), \ldots, x_n(0))$ 的系统满足


    $$\lim_{t \to \infty} (x_i(t) - x_j(t)) = 0$$ (3.3)


    对于每个 $(i, j) \in \mathbf{V} \times \mathbf{V}$，我们称*系统对于初始状态* $(x_1(0), x_2(0),
    \ldots, x_n(0))$ *实现了一致性*。如果系统对于每个初始状态 $(x_1(0), x_2(0), \ldots, x_n(0)) \in \mathbb{R}^{m
    \times n}$ 都实现了一致性，我们简单地称*系统实现了一致性*。*一致性问题*是确定控制输入 $u_i(t)$ ($i = 1, 2, \ldots,
    n$) 使得系统实现一致性。


    如果系统实现了一致性，并且存在一个 $\alpha \in \mathbb{R}^m$ 使得


    $$\lim_{t \to \infty} x_i(t) = \alpha$$ (3.4)


    对于某个 $i \in \mathbf{V}$（等价地对于每个 $i \in \mathbf{V}$），那么 $\alpha$ 被称为*一致性值*。


    以下是一些典型的一致性值，它们是系统的目标。根据该值，一致性被分为几种类型：


    - 平均一致性：


    $$\alpha = \frac{1}{n} \sum_{i=1}^n x_i(0).$$ (3.5)'
