    $$x[k] = \Phi^k x[0] + \sum_{\tau=0}^{k-1} \Phi^\tau \alpha q. \quad (6.31)$$


    由 (6.28)，我们可以选择一个满足 (6.23) 的 Lipschitz 常数 $L$ 为 $P$ 的最大特征值，我们将其记为 $\lambda_{\max}(P)$。那么，如果定理
    6.2 中的条件 $\alpha \in (0, 2/L)$ 成立，则


    $$|\lambda_i(\Phi)| = |\lambda_i(I - \alpha P)| = |1 - \alpha \lambda_i(P)| <
    1, \quad \forall i \in \{1, 2, \dots, n\}, \quad (6.32)$$


    其中 $\lambda_i(\Phi)$ 是矩阵 $\Phi$ 的第 $i$ 个特征值。因此，当 $k \to \infty$ 时，$\Phi^k \to
