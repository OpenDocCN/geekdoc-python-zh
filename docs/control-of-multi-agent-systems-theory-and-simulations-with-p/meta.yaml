    $$\dot{\tilde{e}}^u(t) = -R_w^u (R_w^u)^\top \tilde{e}^u(t) - R_w^u (R_w^v)^\top
    f(\tilde{e}^u(t))$$

    $$= -Q(\tilde{e}^u) \tilde{e}^u(t) - Q(\tilde{e}^u) (f'')^\top f(\tilde{e}^u(t)).
    \quad (5.72)$$

    ```


    **Theorem 5.12** When an infinitesimally weakly rigid formation system is updated
    by the gradient-descent law (5.69), the error dynamics given in (5.72) converges
    to zero locally exponentially fast. Moreover, $\tilde{e}(t)$ in (5.70) locally
    asymptotically converges to zero as $t \rightarrow \infty$.


    **Proof** The local stability of (5.72) could be examined by way of linearization
    at $\tilde{e}^u$. The proof is exactly the same as the proof of Theorem 3 of [22],
    which is briefly summarized in what follows. The Jacobian of (5.72) is computed
    as


    ```

    $$J(\tilde{e}^u) = \left. \frac{\partial [-Q(\tilde{e}^u) \tilde{e}^u - Q(\tilde{e}^u)
    (f'')^\top f(\tilde{e}^u)]}{\partial \tilde{e}^u} \right|_{\tilde{e}^u=0}$$

    $$= -\left. \frac{\partial Q(\tilde{e}^u)}{\partial \tilde{e}^u} [\tilde{e}^u
    + (f'')^\top f(\tilde{e}^u)] - Q(\tilde{e}^u) \left[ I_{\sigma^u \times \sigma^u}
    + \frac{\partial [(f'')^\top f(\tilde{e}^u)]}{\partial \tilde{e}^u} \right] \right|_{\tilde{e}^u=0}.
    \quad (5.73)$$

    ```


    Let us consider a small neighborhood of $\tilde{e}^u$, defined by the set $\mathbf{B}_r
    \triangleq \{\tilde{e}^u : \|\tilde{e}^u\| < r\}$ where $r > 0$ is a small constant.
    Then, $\tilde{e}^u$ and $\tilde{e}^v$ are bounded, which implies the boundedness
    of $f''$ and $Q(\tilde{e}^u)$. Thus, the solution of (5.72) is bounded. Moreover,'
