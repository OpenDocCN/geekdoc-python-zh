    The graph $G^u$ is composed of the set of vertices and the set of minimal constraints
    ($\mathbf{E}^u$ and $\mathbf{A}^u$), i.e., $G^u = (\mathbf{V}, \mathbf{E}^u, \mathbf{A}^u)$.
    The remaining graph is $G^v = (\mathbf{V}, \mathbf{E}^v, \mathbf{A}^v)$ where
    $\mathbf{E}^v = \mathbf{E} \setminus \mathbf{E}^u$ and $\mathbf{A}^v = \mathbf{A}
    \setminus \mathbf{A}^u$. The graphs $G^u$ and $G^v$ have different distance and
    angle constraints, although they have the same vertices. Let us divide the error
    vector $\tilde{e} \in \mathbb{R}^\sigma$ into two parts $\tilde{e}^u \in \mathbb{R}^{\sigma^u}$
