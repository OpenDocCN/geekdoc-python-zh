    times m_i} \\quad (i=1,2,\\ldots,r) \\tag{2.34}$$\n\n$$J_{ij} \\triangleq \\begin{bmatrix}\
    \ \\lambda_i & 1 & & 0 \\\\ & \\ddots & \\ddots & \\\\ & & \\lambda_i & 1 \\\\\
    \ 0 & & & \\lambda_i \\end{bmatrix} \\in \\mathbb{C}^{n_{ij} \\times n_{ij}} \\\
    quad (j=1,2,\\ldots,\\alpha_i) \\tag{2.35}$$\n\n$$m_i \\triangleq \\sum_{j=1}^{\\\
