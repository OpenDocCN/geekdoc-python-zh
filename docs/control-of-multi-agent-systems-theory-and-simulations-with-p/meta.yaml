    **Fig. 6.4** Local minimizer \(\tilde{x}\) and global minimizer \(x^*\) of a convex
    function (left) and a non-convex function (right)


    One of the most important properties of convex optimization is that if there exists
    a *local minimizer*, it is also a *global minimizer*. Now, a local minimizer and
    a global minimizer of the optimization problem (6.8) are defined as follows: If
    there exists an open set \(\mathbf{B} \subset \mathbb{R}^n\) that contains a feasible
    solution \(\tilde{x} \in \mathbf{C}\) such that \(f(x) \geq f(\tilde{x})\), for
    all \(x \in \mathbf{B} \cap \mathbf{C}\), then \(f(\tilde{x})\) is called a *local
    minimizer* of the optimization problem (6.8). Also, if a feasible solution \(x^*
    \in \mathbf{C}\) satisfies \(f(x) \geq f(x^*)\) for all \(x \in \mathbf{C}\),
    then \(x^*\) is called a *global minimizer* of (6.8). Figure 6.4 illustrates local
    and global minimizers of convex and non-convex functions. It is easily understood
    from this figure that the local minimizer \(\tilde{x}\) is also the global minimizer
    \(x^*\) for a convex function, while they may not coincide for a non-convex function.
    The following theorem summarizes this important property of convex functions [4,
    Proposition 3.1.1]:


    > **Theorem 6.1** *For the convex optimization problem (6.8), if a local minimizer
    exists, it is also a global minimizer.*


    By this theorem, if we have an algorithm that can find a local minimizer of a
    convex optimization problem, it becomes an algorithm for a global minimizer. For
    example, let us consider an unconstrained optimization problem with a *differentiable*
    and convex function \(f(x)\) and \(\mathbf{C} = \mathbb{R}\). Then, a point \(\tilde{x}
    \in \mathbb{R}\) satisfying


    \[ \frac{df}{dx}(\tilde{x}) = 0 \tag{6.9} \]


    is a local minimizer, and this is also a global minimizer. Generally, for an unconstrained
    convex optimization with a differentiable cost function, an algorithm searching
    for a point at which the *gradient* of \(f\) is zero is an algorithm for a global
    minimizer. This idea is very important to derive gradient-based algorithms for
    convex optimization, which we will see in Sect. 6.3.


    # ## 6.2 Group Testing


    Here, we consider a real example of convex optimization, *group testing*. This
    is a problem of finding a few people who are infected with a virus like syphilis
    or have antibodies against, e.g., COVID-19, among a large number of patients in
    a'
- md: 'small number of blood tests [10]. Suppose that there are $n$ people of which
    $k$ people are infected. We also suppose that there is a blood test that can detect
    whether an individual is infected or not. It is obvious that we can exactly determine
    the infected people by examining all $n$ samples of blood. Group testing can decrease
    the number of tests by *mixing* some blood samples and examining the blood at
    once. Let us formulate this mathematically.


    Let $x = [x_1, x_2, \dots, x_n]^\top \in \{0, 1\}^n$ be an $n$-dimensional vector
    taking binary values of 0 and 1. We define $x_i = 1$ if the $i$-th individual
    is positive, and $x_i = 0$ if it is negative. The vector $x$ is unknown, and we
    find $x$ by group testing. The mixing procedure is defined as the inner product
    of $x$ and a *testing vector* $a \in \{0, 1\}^n$. The one-valued elements in $a$
    indicate which blood samples are tested. For example, if $x = [1, 1, 0, 0, 1,
    0]^\top$ and $a = [1, 1, 1, 0, 0, 0]^\top$, then we test the first three elements
    in $x$, and the result is


    $$\langle a, x \rangle = 2. \tag{6.10}$$


    This means that there are two positives among the first three individuals. Here,
    we assume the blood test is very precise so that the number of positives in mixed
    blood can be detected.


    Now, we do group testing $m$ times with testing vectors $a_j, j = 1, 2, \dots,
    m$. From the motivation of group testing, we take $m < n$. The results of group
    testing are given by


    $$b_j = \langle a_j, x \rangle, \quad j = 1, 2, \dots, m, \tag{6.11}$$


    which are observed. Define


    $$A \triangleq \begin{bmatrix} a_1^\top \\ a_2^\top \\ \dots \\ a_m^\top \end{bmatrix}
    \in \mathbb{R}^{m \times n}, \quad b \triangleq \begin{bmatrix} b_1 \\ b_2 \\
    \dots \\ b_m \end{bmatrix} \in \mathbb{R}^m, \tag{6.12}$$


    then the problem of group testing is to find a binary vector $x \in \{0, 1\}^n$
    that satisfies $Ax = b$. The matrix $A$ is called the *testing matrix*, in the
    context of group testing, or called the *measurement matrix* in general cases,
    and the vector $b$ is called the *measurement vector*.


    In this formulation, we assume the matrix $A$ is fixed and has full row rank (i.e.,
    $\text{rank}(A) = m$). As shown in the numerical simulation below, we can define
    $A$ as a random binary matrix. Since $m < n$ and the matrix $A$ is a fat matrix,
    the problem is ill-posed and the equation $Ax = b$ has infinitely many solutions
    if $x$ is assumed a real-valued vector.


    The important point here is that there are just a few positives in $n$ individuals,
    or the number of positive elements in $x$ is small. Since $x$ is a binary vector,
    this means that the $\ell^1$ norm $\|x\|_1$ is much smaller than $n$. Taking account
    of this, we consider the following optimization problem:


    $$\min_{x \in \mathbb{R}^n} \|x\|_1 \quad \text{subject to} \quad Ax = b. \tag{6.13}$$


    This is a convex optimization problem since the cost function $f(x) = \|x\|_1$
    is a proper, closed, and convex function, and the constraint set $\mathbf{C} =
    \{x \in \mathbb{R}^n : Ax = b\}$ is a non-empty, closed, convex set, since $A$
    has full row rank.


    The optimization problem is called the $\ell^1$ optimization, also known as the
    *basis pursuit* in compressed sensing [11,17]. This optimization seeks a *sparsest*
    vector $x$ that satisfies the linear equation $Ax = b$, where the sparsest vector
    means that the vector contains the maximum number of zero elements [13].


    An easy way to numerically solve the convex optimization problem (6.13) is to
    use CVXPY [1,9], which is an open-source Python-embedded modeling language for
    convex optimization problems. To use CVXPY, we need to install it simply by


    ```

    ! pip install cvxpy

    ```


    Then, we import some packages including cvxpy:


    ```

    import cvxpy as cp

    import numpy as np

    import matplotlib.pyplot as plt

    ```


    Now, we set parameters in the optimization problem. We assume the size $n$ of
    the original vector, $x_{\text{orig}}$, is 100, in which 5 of the elements are
    ones, and the others are zeros. Namely, the original vector is a 5-sparse vector.
    The indices of the five non-zero elements are chosen randomly. The Python code
    for this is given as


    ```

    # Vector size (number of people)

    n = 100

    # Number of positives

    k = 5

    # Random seed

    np.random.seed(1)

    # Original vector (n-dimensional, k-sparse)

    x_orig = np.zeros(n)

    S = np.random.randint(n,size=k)

    x_orig[S] = 1

    ```


    We fix the number of tests $m = 20$, and define the matrix $A \in \mathbb{R}^{m
    \times n}$ by a random matrix whose elements are independently drawn from the
    identical uniform distribution over $\{0, 1\}$. This is done in Python by


    ```

    # Number of tests

    m = 20

    # Testing matrix

    A = np.random.randint(2,size=(m, n))

    ```


    The vector $b$ is computed by


    ```

    # Result vector

    b = A @ x_orig

    ```


    Finally, we write the CVXPY code for this optimization:


    ```

    # Optimization variable

    x = cp.Variable(n)

    # Cost function (L1 norm)

    cost = cp.norm1(x)

    # Constraints (linear equations)

    constraints = [A @ x == b]

    # Optimization problem

    prob = cp.Problem(cp.Minimize(cost), constraints)

    # Solve by CVXPY

    prob.solve()

    # Print the result

    print("status:", prob.status)

    print("optimal value", prob.value)

    ```


    In this code,


    - `cp.Variable(n)` defines the optimization variable $x$ of size $n$.

    - `cp.norm1(x)` is the $\ell^1$ norm of $x$, which is the cost function in our
    problem.

    - The constraint $Ax = b$ is described as `[A @ x == b]`.

    - `cp.Problem` defines the constrained optimization problem.

    - `prob.solve()` numerically solves the problem.


    If we run this code, we will find the following outputs:


    ```

    status: optimal

    optimal value 4.9999999999886 .

    ```


    The status indicates that the optimization algorithm in CVX achieved an optimal
    value which is 4.9999999999886. Note that $\|x_{\text{orig}}\|_1 = 5$ and this
    result shows that the minimizer, which we denote by $\hat{x}$, has almost the
    same $\ell^1$ norm.


    Figure 6.5 shows the stem plots of the original $x_{\text{orig}}$ and the reconstructed
    $\hat{x}$ (the program is given as Python Code 6.1 in Sect. 6.6.1). We can see
    that the reconstructed vector is almost the same as the original vector.


    Finally, we round the value of the reconstructed $\hat{x}$ and see how precisely
    it detects the positive individuals by group testing:


    ![](img/6f6a40195ea61efdca2c32abeddbaaca_182_0.png)


    Fig. 6.5 The original sparse vector $x_{\text{orig}}$ (left) and the reconstructed
    vector by the $\ell^1$ optimization (right)


    ```

    python

    print(np.nonzero(x_orig))

    x_est=np.round(x.value)

    print(x_est.nonzero())

    ```


    The results are given as


    ```

    (array([ 9, 12, 37, 72, 75]),)

    (array([ 9, 12, 37, 72, 75]),) .

    ```


    The first result is the set of indices of the non-zero elements in $x_{\text{orig}}$,
    and the second result is that in rounded $\hat{x}$. We can see the reconstruction
    is exact with $m = 20$ tests that are much less than $n = 100$.


    As we have seen in the above example, CVXPY is very useful and easy to code for
    solving convex optimization problems. However, if we solve a large-scale problem
    as in image processing, CVXPY might be insufficient. Moreover, if we solve a convex
    optimization problem in real time, as in a few msec, with a cheap device on which
    CVXPY cannot be installed, we need to implement a fast and efficient numerical
    optimization algorithm. In the following sections, we will see how to obtain such
    algorithms.


    ## 6.3 Gradient-Based Algorithms


    In this section, we consider efficient algorithms that solve the convex optimization
    problem in Problem 6.1 or (6.8) where $f$ is differentiable over $\text{dom}(f)$.
    The key tool of this section is the *gradient* of $f$ defined by


    $$\frac{\partial f}{\partial x} \triangleq \left[ \frac{\partial f}{\partial x_1},
    \frac{\partial f}{\partial x_2}, \dots, \frac{\partial f}{\partial x_n} \right]^\top,$$


    where $x_i$ is the $i$-th entry of $x \in \mathbb{R}^n$. For simplicity, we also
    use the “nabla” notation for the gradient in this section, namely,


    $$\nabla f(c) \triangleq \frac{\partial f}{\partial x}(c),$$


    for $c \in \text{dom}(f)$.


    ### 6.3.1 Gradient Descent Algorithm


    Here, we consider an unconstrained optimization problem with $\mathbf{C} = \mathbb{R}^n$,
    namely, we solve


    $$\minimize_{x \in \mathbb{R}^n} f(x).$$


    It is easily shown that if $\bar{x} \in \mathbb{R}^n$ is a local minimizer of
    $f$, then


    $$\nabla f(\bar{x}) = 0$$


    holds. Therefore, to find a solution to (6.16), we just need to seek $\bar{x}$
    that satisfies (6.17). Such a point is called a *stationary point*. However, in
    many cases, it is impossible to obtain a closed-form solution for the stationary
    point that satisfies (6.17), and hence we need an algorithm to find a stationary
    point of $f$ *numerically*. The *gradient descent algorithm* is the most widely
    used algorithm for this purpose. The algorithm is an iterative algorithm given
    by


    $$x[k+1] = x[k] - \alpha_k \nabla f(x[k]), \quad k = 0, 1, 2, \dots,$$


    where $\alpha_k \in \mathbb{R}$ is the *step size* of this algorithm that should
    be carefully chosen. A well-used method to find $\alpha_k$ at each step is the
    *line search*, that minimizes the cost function $f$ along the line $\{x[k] - \alpha
    \nabla f(x[k]) : \alpha \geq 0\} \subset \mathbb{R}^n$. More precisely, the step
    size $\alpha_k$ is chosen such that


    $$\alpha_k = \arg \min_{\alpha \geq 0} f(x[k] - \alpha \nabla f(x[k])).$$


    It is often difficult to solve the minimization problem in (6.19), and the following
    approximation methods are widely used instead of the exact line search:


    - (i) Choose $\alpha_k$ such that

    $$g(\alpha_k) \leq g(0) + \sigma g''(0)\alpha_k,$$'
