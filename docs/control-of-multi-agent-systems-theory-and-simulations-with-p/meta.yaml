    framework is close to the desired framework in the sense of $\|p^* - p\| < \epsilon$
    up to infinitesimal motions. Then, there exists a smooth function $f$ such that
    $\tilde{e}^v = f(\tilde{e}^u)$ holds.


    Let the rigidity matrices corresponding to the frameworks $f_p^u = (G^u, p)$ and
    $f_p^v = (G^v, p)$ be denoted as $R_w^u$ and $R_w^v$, respectively. Then, we can
    have $R_w^u = P^u R_w$ and $R_w^v = P^v R_w$. Also from $\tilde{e} = (P^u)^\top
    \tilde{e}^u + (P^v)^\top \tilde{e}^v$, we can have


    ```

    $$\dot{\tilde{e}}^u(t) = P^u \dot{\tilde{e}}(t) = -P^u R_w(t) R_w^\top(t) \tilde{e}(t)$$

    $$= -P^u R_w R_w^\top \left[ (P^u)^\top \tilde{e}^u(t) + (P^v)^\top \tilde{e}^v(t)
    \right]$$

    $$= -R_w^u (R_w^u)^\top \tilde{e}^u(t) - R_w^u (R_w^v)^\top \tilde{e}^v(t). \quad
    (5.71)$$

    ```


    Now, using Lemma 5.12 and using $R_w^v = \frac{\partial \tilde{e}^v}{\partial
    p} = \frac{\partial \tilde{e}^v}{\partial \tilde{e}^u} \frac{\partial \tilde{e}^u}{\partial
    p} = \frac{\partial \tilde{e}^v}{\partial \tilde{e}^u} R_w^u$, and denoting $Q(\tilde{e}^u)
    = R_w^u (R_w^u)^\top$ and $f'' = \frac{\partial f(\tilde{e}^u)}{\partial \tilde{e}^u}$,
