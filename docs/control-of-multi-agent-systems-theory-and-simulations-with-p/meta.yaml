  mdcn: "## 覆盖控制\n\n## 4\n\n### 关键要点\n\n- “覆盖”是指将智能体以期望的密度放置在环境中。\n- 覆盖问题被表述为一个目标函数的最小化问题，该目标函数量化了覆盖程度。\n\
    - 覆盖问题的一个基本解由目标函数的梯度给出，该梯度可以由智能体位置的Voronoi图（Voronoi单元）显式表示。\n- 由此产生的多智能体系统成为一个梯度系统，该系统收敛到目标函数的一个驻点。从这个意义上说，覆盖得以实现。\n\
    \n### 4.1 覆盖问题\n\n在本节中，我们考虑一个由 $n$ 个智能体组成的多智能体系统，这些智能体被放置在 $m$ 维空间的环境中，如图4.1所示。\n\
    \n智能体 $i$ 是一个移动机器人，其动力学描述为\n\n$\\dot{x}_i(t) = f_i(x_i(t), u_i(t)),$ (4.1)\n\n\
    其中 $x_i(t) \\in \\mathbb{R}^m$ 是 $m$ 维空间中的位置，$u_i(t) \\in \\mathbb{R}^l$ 是控制输入，$f_i\
    \ : \\mathbb{R}^m \\times \\mathbb{R}^l \\rightarrow \\mathbb{R}^m$ 是一个函数。\n\n\
    每个智能体配备一个接近传感器，例如视觉传感器和激光扫描仪，它提供其可见区域内其他智能体的相对位置信息。\n\n**补充信息** 在线版本包含补充材料，可在\
    \ https://doi.org/10.1007/978-3-031-52981-8_4 获取。\n\n图4.1 二维空间中的移动机器人多智能体系统\n\n\
    ![](img/6f6a40195ea61efdca2c32abeddbaaca_102_0.png)\n\n智能体 $i$ 的可见区域由下式给出\n\n\
    $\\{q \\in \\mathbf{Q} : x_j \\notin \\mathbf{S}(q, x_i) \\quad \\forall j \\\
    in \\{1, 2, \\ldots, n\\} \\setminus \\{i\\}\\}$, (4.2)\n\n其中 $\\mathbf{Q} \\\
    subset \\mathbb{R}^m$ 是一个有界集，表示感兴趣的环境，称为*工作空间*，$\\mathbf{S}(q, x_i) \\subseteq\
    \ \\mathbf{Q}$ 是 $q \\in \\mathbf{Q}$ 和 $x_i \\in \\mathbf{Q}$ 之间的半开线段，即 $\\mathbf{S}(q,\
    \ x_i) = \\bigcup_{\\theta \\in [0, 1)} \\{\\theta q + (1 - \\theta)x_i\\}$。在本章中，位于智能体\
    \ $i$ 可见区域内的智能体称为智能体 $i$ 的*邻居*。由于智能体是移动的，每个智能体的邻居是状态相关的，因此是时变的。因此，我们使用 $\\mathbf{N}_i(x(t))\
    \ \\subseteq \\{1, 2, \\ldots, n\\} \\setminus \\{i\\}$ 来表示时间 $t$ 时智能体 $i$ 的邻居集合，其中\
    \ $x(t) \\triangleq [x_1^\\top(t) \\ x_2^\\top(t) \\ \\cdots \\ x_n^\\top(t)]^\\\
    top \\in \\mathbb{R}^{mn}$ 是集体状态。\n\n智能体 $i$ 的控制器是一个基于相对状态的时变邻居控制器，由下式给出\n\n$u_i(t)\
    \ = g_i([x_j(t) - x_i(t)]_{j \\in \\mathbf{N}_i(x(t))})$, (4.3)\n\n其中 $g_i$ 是时间\
    \ $t$ 时 $i$ 的邻居相对位置的函数。\n\n对于上述多智能体系统，*覆盖*意味着将智能体以期望的密度放置在工作空间 $\\mathbf{Q}$ 上的环境中，如图4.2所示。*覆盖问题*是设计控制输入\
    \ $u_i$ ($i = 1, 2, \\ldots, n$)，使得 $(x_1(t), x_2(t), \\ldots, x_n(t))$ 收敛到量化感兴趣覆盖的函数的最小值点，即\n\
    \n$\\lim_{t \\to \\infty} J(x(t)) = \\min_{x \\in \\mathbf{Q}^n} J(x)$, (4.4)\n\
    \n其中 $J : \\mathbb{R}^{mn} \\to \\mathbb{R}$ 是量化覆盖的函数，对应于我们覆盖问题的*目标函数*。\n\n图4.2\
    \ 覆盖的图像\n\n![](img/6f6a40195ea61efdca2c32abeddbaaca_102_1.png)\n\n目标函数 $J$ 可以用多种方式定义。一个典型的形式由下式给出\n\
    \n$$J(x) = \\int_{\\mathbf{Q}} \\min_{i \\in \\{1, 2, \\dots, n\\}} h(\\|q - x_i\\\
    |) \\phi(q) dq, \\quad (4.5)$$\n\n其中 $x = [x_1^\\top \\ x_2^\\top \\ \\cdots \\\
    \ x_n^\\top]^\\top \\in \\mathbb{R}^{mn}$，$h : \\mathbb{R}_+ \\to \\mathbb{R}$\
    \ 是一个非递减、分段可微且在 $\\mathbf{Q}$ 上可积的函数，$\\phi : \\mathbb{R}^m \\to \\mathbb{R}_{0+}$\
    \ 是一个在 $\\mathbf{Q}$ 上可积的函数。函数 $h$ 称为*性能函数*，它量化了位置 $q \\in \\mathbf{Q}$ 距离智能体\
    \ $i$ 某一距离的效用（值越小表示效用越大），因此 $\\min_{i \\in \\{1, 2, \\dots, n\\}} h(\\|q - x_i\\\
    |)$ 表示位置 $q$ 相对于 $x_1, x_2, \\dots, x_n$ 中最近者的效用（在距离 $\\|q - x_i\\|$ 的意义上）。另一方面，$\\\
    phi$ 描述了位置 $q \\in \\mathbf{Q}$ 的重要性。它被称为*权重函数*。因此，$\\min_{i \\in \\{1, 2, \\\
    dots, n\\}} h(\\|q - x_i\\|) \\phi(q)$ 表示由最近智能体生成的位置 $q$ 的加权效用，而 $J(x)$ 是 $\\\
    mathbf{Q}$ 上的总加权效用。\n\n为了说明这个函数 $J$，让我们考虑以下情况：\n\n- 智能体是配备视觉传感器的移动传感器，\n- 智能体将被部署在工作空间\
    \ $\\mathbf{Q}$ 上，以检测每个位置 $q \\in \\mathbf{Q}$ 的异常，\n- 异常造成的经济损失量根据位置 $q$ 而变化。\n\
    \n自然可以假设，位于 $x_i$ 的视觉传感器的检测精度随着距离 $\\|q - x_i\\|$ 的增加而降低。这一特性，即检测精度与距离 $\\|q -\
    \ x_i\\|$ 之间的关系，由函数 $h$ 表示。同时，在检测过程中，具有较大经济损失潜力的位置相对重要。这由函数 $\\phi$ 描述。\n\n###\
    \ 4.2 Voronoi图\n\n*Voronoi图*是一个几何概念，在解决目标函数为(4.5)式的覆盖问题中起着重要作用。在本节中，我们介绍其概念和一些性质。\n\
    \n#### 4.2.1 定义\n\n考虑一个集合 $\\mathbf{Q} \\subset \\mathbb{R}^m$ 和 $\\mathbf{Q}$\
    \ 中的 $n$ 个不同点 $x_i$ ($i = 1, 2, \\dots, n$)。虽然在第4.1节中假设 $\\mathbf{Q}$ 是闭集，但在本节中它既不必有界也不必闭。例如图4.3所示，其中\
    \ $m = 2$，$\\mathbf{Q} = [0, 1] \\times [0, 1]$，$n = 10$，点用点表示。\n\n(ii) 考虑一个二维空间中具有积分器智能体的多智能体系统，其中智能体\
    \ $i$ 的动力学由下式给出\n\n$\\dot{x}_i(t) = u_i(t)$ (3.46)\n\n其中 $x_i(t) \\in \\mathbb{R}^2$，$u_i(t)\
    \ \\in \\mathbb{R}^2$。\n\n- a. 找到一个基于相对状态的控制器以实现一致性。\n- b. (Python) 开发一个Python代码来模拟上述解决方案。\n\
    \n(iii) Python代码3.3是Python代码3.1的替代方案，但作为多智能体系统的仿真程序，它不太可取。说明这一说法的理由。\n\n### Python代码3.3：Python代码3.1的替代代码\n\
    \n```python\nfrom scipy.integrate import odeint\nimport numpy as np\nimport matplotlib.pyplot\
    \ as plt\n\ndef MAS(x,t,L):\n    dxdt = np.dot(-L,x)\n    return dxdt\n\nL = np.array([\n\
    \    [ 1, -1,  0,  0,  0,  0],\n    [ 0,  2, -1,  0, -1,  0],\n    [ 0,  0,  1,\
    \ -1,  0,  0],\n    [-1, -1,  0,  2,  0,  0],\n    [ 0,  0,  0,  0,  1, -1],\n\
    \    [ 0, -1,  0,  0,  0,  1]])\n\nx0 = np.array([-1, 2, 6, 3, -3, 1])\nt = np.arange(0,\
    \ 5, 0.001)\nx = odeint(MAS, x0, t, args=(L,))\n\nplt.plot(t,x)\nplt.xlabel('t')\n\
    plt.ylabel('xi')\nplt.grid()\nplt.show()\n```\n\n(iv) 考虑以下离散时间多智能体系统：\n\n$$\n\\\
    begin{cases}\nx_1[k+1] = f(x_1[k], x_2[k], x_4[k]), \\\\\nx_2[k+1] = f(x_1[k],\
    \ x_2[k], x_5[k]), \\\\\nx_3[k+1] = f(x_3[k], x_4[k], x_5[k]), \\\\\nx_4[k+1]\
    \ = f(x_1[k], x_3[k], x_4[k]), \\\\\nx_5[k+1] = f(x_1[k], x_2[k], x_5[k]),\n\\\
    end{cases}\n$$\n\n其中 $x_i[k] \\in \\mathbb{R}$ ($i = 1, 2, \\dots, 5$) 是状态，$f\
    \ : \\mathbb{R}^3 \\to \\mathbb{R}$ 是一个待设计的函数。\n\n- a. 找到一个函数 $f$ 以实现最大一致性。\n\
    - b. (Python) 开发一个Python代码来模拟上述解决方案。\n\n### 参考文献\n\n1. Ren W, Beard RW (2008)\
