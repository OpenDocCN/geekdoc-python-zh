    +   (i) $P$ has at least one eigenvalue of 1, and $\mathbf{1}_n$ is an eigenvector
    associated with eigenvalue 1, that is, $P\mathbf{1}_n = \mathbf{1}_n$ holds.

    (ii) Assume $\varepsilon \Delta < 1$ where $\Delta$ is the maximum in-degree of
    graph $G$. Then the eigenvalues of $P$ except for 1 lie in the open unit circle
    of $\mathbb{C}$.

    (iii) The eigenvalue 1 of $P$ is semi-simple.


    **Proof** (i) From Theorem 2.18, the graph Laplacian $L$ has an eigenvalue 0,
    and $\mathbf{1}_n$ is an associated eigenvector. Then, it is easily shown that
    $P = I - \varepsilon L$ has at least one eigenvalue of 1, and $\mathbf{1}_n$ is
    an eigenvector associated with eigenvalue 1, from Lemma 2.4.

    (ii) This is easily shown from Lemma 2.5.

    (iii) From Lemma 2.4, the algebraic and the geometric multiplicities of the eigenvalue
    0 of $L$ are, respectively, the same as those of the eigenvalue 1 of $P$. From
    Theorem 2.18, the eigenvalue 0 of $L$ is semi-simple. Therefore, the eigenvalue
    1 of $P$ is also semi-simple.


