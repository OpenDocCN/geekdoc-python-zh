    # 5 Formation Control


    ## Key Points


    - “Formation”, which is the main concept of this chapter, means that agents are
    placed at different locations with some unique configuration.

    - A formation controller is designed as a function of errors of the constraints
    that define the relative locations of the agents.

    - Graph rigidity plays a key role for achieving a unique configuration in distributed
    formation control setup.

    - Gradient controllers are designed to minimize the sum of local cost functions.


    ## 5.1 Distributed Formation Control


    Let us consider agents moving or placed in a Euclidean space, which has capabilities
    of measurements, communications, decisions, and/or actuations. These agents may
    be connected to other agents physically, or they may be connected by a communication
    network. Also, agents may measure each other through some sensors. The physical
    connections, connections through communications, or detection through measurements
    could be considered as constraints that regulate the behaviors of agents. The
    constraints could be set up relatively between agents, or they could be set up
    globally with respect to a common reference frame. Figure 5.1 shows two agents
    with a single constraint between them. The constraint could be represented in
    local coordinate frames $^1\Sigma$ and $^2\Sigma$, and could be represented in
    the global coordinate frame $^g\Sigma$.


    **Supplementary Information** The online version contains supplementary material
    available at https://doi.org/10.1007/978-3-031-52981-8_5.


    **Fig. 5.1** Local and global coordinate frames. Agents 1 and 2 have their own
