    equivalent* if $P_{p_i - p_j}(q_i - q_j) = 0$ for all edges $(i, j) \in \mathbf{E}$.
    The two frameworks are called *bearing congruent* if $P_{p_i - p_j}(q_i - q_j)
    = 0$ for all possible pairs of vertices.


    **Definition 5.10** (*Bearing rigidity*) A framework $(G, p)$ is called *bearing
    rigid* in $\mathbb{R}^d$ if there exists a neighborhood $\mathbf{U}_p$ of $p$
    such that every framework $(G, q)$, where $q$ stays in the neighborhood $\mathbf{U}_p$,
    i.e., $q \in \mathbf{U}_p$, which is bearing equivalent to $(G, p)$, is also bearing
    congruent to $(G, p)$.


    **Definition 5.11** (*Global bearing rigidity*) A framework $(G, p)$ is called
    *globally bearing rigid* in $\mathbb{R}^d$ if every framework $(G, q)$ bearing
