    # 2.2.4 Eigenvalues


    The main tool for analyzing and designing networks and multi-agent systems is
    the *eigenvalues* of a graph-related matrix. Here, we review the fundamental properties
    of the eigenvalues. Let us consider the following equation:


    $$Ax = \lambda x, \tag{2.29}$$


    where $A \in \mathbb{R}^{n \times n}$ is given and $x \in \mathbb{C}^n$ and $\lambda
    \in \mathbb{C}$ are unknown. If there exist a scalar $\lambda$ and a non-zero
    vector $x$ that satisfy (2.29), then $\lambda$ is called an *eigenvalue* of $A$
    and $x$ is called an *eigenvector* of $A$ associated with $\lambda$. Also, if
    there exists a non-zero row vector $\xi \in \mathbb{C}^{1 \times n}$ and a scalar
    $\lambda \in \mathbb{C}$ such that


    $$\xi A = \lambda \xi \tag{2.30}$$


    holds, then $\xi$ is called a *left eigenvector* associated with $\lambda$. With
    this definition, we sometimes call a column vector $x$ that satisfies (2.29) as
    a *right eigenvector*. In this book, if we say an eigenvector, it is a right eigenvector.


    The following theorems are important to characterize the eigenvectors of a matrix:


    **Theorem 2.3** *A scalar $\lambda \in \mathbb{C}$ is an eigenvalue of matrix
    $A \in \mathbb{R}^{n \times n}$ if and only if the matrix $\lambda I - A$ is singular.*


    **Theorem 2.4** *A scalar $\lambda \in \mathbb{C}$ is an eigenvalue of matrix
    $A \in \mathbb{R}^{n \times n}$ if and only if $\lambda$ is a root of the characteristic
    polynomial of $A$ defined by*


    $$p_A(s) \triangleq \det(sI - A). \tag{2.31}$$


    From Theorem 2.4, every $A \in \mathbb{R}^{n \times n}$ has exactly $n$ eigenvalues
    counted with multiplicity. The multiplicity of $\lambda$ as a root of the characteristic
    polynomial $p_A$ is called the *algebraic multiplicity*. On the other hand, the
    number of linearly independent eigenvectors associated with an eigenvalue $\lambda$,
    or the dimension of $\ker(\lambda I - A)$, is called the *geometric multiplicity*.
    Every eigenvalue has a geometric multiplicity greater than or equal to 1, and
    the geometric multiplicity is always less than or equal to the algebraic multiplicity.
    An eigenvalue is said to be *simple* if its algebraic multiplicity is equal to
    1, and hence its geometric multiplicity is also 1. An eigenvalue is said to be
    *semi-simple* if its algebraic multiplicity is equal to its geometric multiplicity.
    If all the eigenvalues are semi-simple, then the matrix is said to be a *semi-simple
    matrix*.


    **Example 2.3** *(Python) Let us consider the following matrix:*


    $$A = \begin{bmatrix} 1 & 0 & 0 \ 0 & 1 & 1 \ 0 & 0 & 1 \end{bmatrix}. \tag{2.32}$$'
