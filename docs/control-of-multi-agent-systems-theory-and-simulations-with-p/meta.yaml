- md: '## Distributed Optimization


    ### Key Points


    - The problem of group testing can be formulated as convex optimization.

    - Convex optimization problems can be easily solved by CVXPY with Python.

    - There are two important algorithms to solve convex optimization problems: the
    subgradient method and the proximal method.

    - A distributed optimization algorithm solves a (global) convex optimization by
    agents that cooperatively solve their local convex optimization problems.

    - Distributed optimization algorithms are easily derived by the subgradient method
    and the proximal method.


    ### 6.1 Convex Optimization


    Let us review important facts in convex optimization. First, we define convex
    sets.


    **Definition 6.1** *(Convex set)* Let **C** be a subset of $\mathbb{R}^n$. **C**
    is said to be convex if

    $$tx + (1 - t)y \in \mathbf{C}$$

    holds for any vectors $x, y \in \mathbf{C}$ and for any real number $t \in [0,
    1]$.


    If a set **C** is not convex, then **C** is said to be *non-convex*. Figure 6.1
    shows examples of a convex set and a non-convex set. In the convex set (left),
    the line segment between any two points $x$ and $y$ in the set lies completely
    in the set. On the other hand, in the non-convex set (right), there exists a line
    segment that partially lies outside of the set.


    **Supplementary Information** The online version contains supplementary material
    available at https://doi.org/10.1007/978-3-031-52981-8_6.


    Fig. 6.1 Convex set (left) and non-convex set (right)


    ![](img/6f6a40195ea61efdca2c32abeddbaaca_176_0.png)


    In convex optimization, we often use a function $f : \mathbb{R}^n \to \mathbb{R}
    \cup \{+\infty\}$, which takes values in *extended real numbers* $\mathbb{R} \cup
    \{+\infty\}$. The following function, called an *indicator function*, is an example
    of such a function:


    $$f(x) = \begin{cases} 0, & \text{if } \|x\| \le 1, \\ +\infty, & \text{otherwise.}
    \end{cases} \quad (6.2)$$


    For a function $f$ taking values in $\mathbb{R} \cup \{+\infty\}$, we define its
    *effective domain* by


    $$\text{dom}(f) \triangleq \{x \in \mathbb{R}^n : f(x) < +\infty\}. \quad (6.3)$$


    That is, the effective domain of $f : \mathbb{R}^n \to \mathbb{R} \cup \{+\infty\}$
    is a set in $\mathbb{R}^n$ on which $f$ takes finite real values. For example,
    the effective domain of the indicator function (6.2) is given by


    $$\text{dom}(f) = \{x \in \mathbb{R}^n : \|x\| \le 1\}. \quad (6.4)$$


    A function is said to be *proper* if its effective domain is non-empty, that is,
    there exists at least one $x \in \mathbb{R}^n$ such that $f(x) < +\infty$.


    Now, let us define a convex function.


    **Definition 6.2** (*Convex function*) Let $f : \mathbb{R}^n \to \mathbb{R} \cup
    \{+\infty\}$ be a proper function. The function $f$ is said to be a *convex function*
    if


    $$f(tx + (1-t)y) \le tf(x) + (1-t)f(y) \quad (6.5)$$


    holds for any vectors $x, y \in \text{dom}(f)$ and for any real number $t \in
    [0, 1]$.


    If a function is not convex, then it is said to be a *non-convex function*. Figure
    6.2 shows examples of a convex function and a non-convex function. For the convex
    function (left), the line segment between any two points $(x, f(x))$ and $(y,
    f(y))$, where $x, y \in \text{dom}(f)$, lies above or on the graph of $f$. On
    the other hand, if $f$ is non-convex, there exists a line segment that partially
    lies below the graph.


    For a proper function $f : \mathbb{R}^n \to \mathbb{R} \cup \{+\infty\}$, the
    $\alpha$-sublevel set $C_\alpha(f)$ is defined by


    $$C_\alpha(f) \triangleq \{x \in \text{dom}(f) : f(x) \le \alpha\}. \quad (6.6)$$


    ![](img/6f6a40195ea61efdca2c32abeddbaaca_177_0.png)


    Figure 6.3 (left) illustrates the sublevel set $C_{\alpha}(f)$ of a function $f$.
    From this figure, it is easily shown that if $f$ is a convex function then $C_{\alpha}(f)$
    is a convex set for any $\alpha \in \mathbb{R}$. A function $f : \mathbb{R}^n
    \to \mathbb{R} \cup \{+\infty\}$ is said to be *closed* if its sublevel set $C_{\alpha}(f)$
    is a closed set for any $\alpha \in \mathbb{R}$.


    The *epigraph* $\text{epi}(f)$ of function $f$ is defined by


    $$\text{epi}(f) \triangleq \{(x, t) \in \mathbb{R}^n \times \mathbb{R} : x \in
    \text{dom}(f), f(x) \leq t\}. \quad (6.7)$$


    Figure 6.3 (right) illustrates the epigraph $\text{epi}(f)$ of function $f$. From
    this figure, we can see that the epigraph of $f$ is the region above the graph
    on its effective domain. It is also easily understood that $f$ is a convex function
    if and only if $\text{epi}(f)$ is a convex set.


    Now, we write a convex optimization problem that we consider in this section in
    a general form.


    **Problem 6.1** (Convex optimization) Let $f : \mathbb{R}^n \to \mathbb{R} \cup
    \{+\infty\}$ be a proper, closed, and convex function, and $\mathbf{C} \subset
    \mathbb{R}^n$ be a closed convex set. Then, a *convex optimization problem* is
    a problem to find a vector $x^* \in \mathbf{C}$ that minimizes the function $f(x)$
    over the set $\mathbf{C} \subset \mathbb{R}^n$.


    In this problem, the function $f(x)$ is called a *cost function* or an *objective
    function*. The set $\mathbf{C}$ is called a *constraint set* or a *feasible set*,
    the entries of $\mathbf{C}$ are called *feasible solutions*, and the inclusion
    $x \in \mathbf{C}$ is called a *constraint*. The optimization problem is simply
    described as


    $$\min_{x \in \mathbb{R}^n} f(x) \quad \text{subject to} \quad x \in \mathbf{C}.
    \quad (6.8)$$


    ![](img/6f6a40195ea61efdca2c32abeddbaaca_177_1.png)


    ![](img/6f6a40195ea61efdca2c32abeddbaaca_178_0.png)


    **Fig. 6.4** Local minimizer \(\tilde{x}\) and global minimizer \(x^*\) of a convex
    function (left) and a non-convex function (right)


    One of the most important properties of convex optimization is that if there exists
    a *local minimizer*, it is also a *global minimizer*. Now, a local minimizer and
    a global minimizer of the optimization problem (6.8) are defined as follows: If
    there exists an open set \(\mathbf{B} \subset \mathbb{R}^n\) that contains a feasible
    solution \(\tilde{x} \in \mathbf{C}\) such that \(f(x) \geq f(\tilde{x})\), for
    all \(x \in \mathbf{B} \cap \mathbf{C}\), then \(f(\tilde{x})\) is called a *local
    minimizer* of the optimization problem (6.8). Also, if a feasible solution \(x^*
    \in \mathbf{C}\) satisfies \(f(x) \geq f(x^*)\) for all \(x \in \mathbf{C}\),
    then \(x^*\) is called a *global minimizer* of (6.8). Figure 6.4 illustrates local
    and global minimizers of convex and non-convex functions. It is easily understood
    from this figure that the local minimizer \(\tilde{x}\) is also the global minimizer
    \(x^*\) for a convex function, while they may not coincide for a non-convex function.
    The following theorem summarizes this important property of convex functions [4,
    Proposition 3.1.1]:


    > **Theorem 6.1** *For the convex optimization problem (6.8), if a local minimizer
    exists, it is also a global minimizer.*


    By this theorem, if we have an algorithm that can find a local minimizer of a
    convex optimization problem, it becomes an algorithm for a global minimizer. For
    example, let us consider an unconstrained optimization problem with a *differentiable*
    and convex function \(f(x)\) and \(\mathbf{C} = \mathbb{R}\). Then, a point \(\tilde{x}
    \in \mathbb{R}\) satisfying


    \[ \frac{df}{dx}(\tilde{x}) = 0 \tag{6.9} \]


    is a local minimizer, and this is also a global minimizer. Generally, for an unconstrained
    convex optimization with a differentiable cost function, an algorithm searching
    for a point at which the *gradient* of \(f\) is zero is an algorithm for a global
    minimizer. This idea is very important to derive gradient-based algorithms for
    convex optimization, which we will see in Sect. 6.3.


    ### 6.2 Group Testing


    Here, we consider a real example of convex optimization, *group testing*. This
    is a problem of finding a few people who are infected with a virus like syphilis
    or have antibodies against, e.g., COVID-19, among a large number of patients in
    a'
  mdcn: '## 分布式优化


    ### 关键要点


    -   群体检测问题可以表述为凸优化问题。

    -   凸优化问题可以使用 Python 的 CVXPY 轻松求解。

    -   求解凸优化问题有两种重要算法：次梯度法和近端法。

    -   分布式优化算法通过代理协作求解其局部凸优化问题来解决（全局）凸优化问题。

    -   分布式优化算法可以很容易地通过次梯度法和近端法推导出来。


    ### 6.1 凸优化


    让我们回顾凸优化中的重要事实。首先，我们定义凸集。


    **定义 6.1** *（凸集）* 设 **C** 是 $\mathbb{R}^n$ 的一个子集。如果对于任意向量 $x, y \in \mathbf{C}$
    和任意实数 $t \in [0, 1]$，都有

    $$tx + (1 - t)y \in \mathbf{C}$$

    成立，则称 **C** 是凸的。


    如果一个集合 **C** 不是凸的，则称 **C** 是*非凸的*。图 6.1 展示了一个凸集和一个非凸集的例子。在凸集（左图）中，集合内任意两点 $x$
    和 $y$ 之间的线段完全位于集合内。另一方面，在非凸集（右图）中，存在一条线段部分位于集合之外。


    **补充信息** 在线版本包含补充材料，可访问 https://doi.org/10.1007/978-3-031-52981-8_6。


    图 6.1 凸集（左）和非凸集（右）


    ![](img/6f6a40195ea61efdca2c32abeddbaaca_176_0.png)


    在凸优化中，我们经常使用函数 $f : \mathbb{R}^n \to \mathbb{R} \cup \{+\infty\}$，其值域为*扩展实数* $\mathbb{R}
    \cup \{+\infty\}$。以下函数，称为*指示函数*，是此类函数的一个例子：


    $$f(x) = \begin{cases} 0, & \text{if } \|x\| \le 1, \\ +\infty, & \text{otherwise.}
    \end{cases} \quad (6.2)$$


    对于一个取值于 $\mathbb{R} \cup \{+\infty\}$ 的函数 $f$，我们定义其*有效域*为


    $$\text{dom}(f) \triangleq \{x \in \mathbb{R}^n : f(x) < +\infty\}. \quad (6.3)$$


    也就是说，函数 $f : \mathbb{R}^n \to \mathbb{R} \cup \{+\infty\}$ 的有效域是 $\mathbb{R}^n$
    中使得 $f$ 取有限实数值的集合。例如，指示函数 (6.2) 的有效域由下式给出


    $$\text{dom}(f) = \{x \in \mathbb{R}^n : \|x\| \le 1\}. \quad (6.4)$$


    如果一个函数的有效域非空，即存在至少一个 $x \in \mathbb{R}^n$ 使得 $f(x) < +\infty$，则称该函数是*正常函数*。


    现在，让我们定义凸函数。


    **定义 6.2** *（凸函数）* 设 $f : \mathbb{R}^n \to \mathbb{R} \cup \{+\infty\}$ 是一个正常函数。如果对于任意向量
    $x, y \in \text{dom}(f)$ 和任意实数 $t \in [0, 1]$，都有


    $$f(tx + (1-t)y) \le tf(x) + (1-t)f(y) \quad (6.5)$$


    成立，则称函数 $f$ 是一个*凸函数*。


    如果一个函数不是凸的，则称其为*非凸函数*。图 6.2 展示了一个凸函数和一个非凸函数的例子。对于凸函数（左图），任意两点 $(x, f(x))$ 和 $(y,
    f(y))$（其中 $x, y \in \text{dom}(f)$）之间的线段位于 $f$ 的图像上方或之上。另一方面，如果 $f$ 是非凸的，则存在一条线段部分位于图像下方。


    对于一个正常函数 $f : \mathbb{R}^n \to \mathbb{R} \cup \{+\infty\}$，其 $\alpha$-次水平集 $C_\alpha(f)$
    定义为


    $$C_\alpha(f) \triangleq \{x \in \text{dom}(f) : f(x) \le \alpha\}. \quad (6.6)$$


    ![](img/6f6a40195ea61efdca2c32abeddbaaca_177_0.png)


    图 6.3（左）说明了函数 $f$ 的次水平集 $C_{\alpha}(f)$。从该图可以很容易地看出，如果 $f$ 是凸函数，那么对于任意 $\alpha
    \in \mathbb{R}$，$C_{\alpha}(f)$ 都是凸集。如果函数 $f : \mathbb{R}^n \to \mathbb{R} \cup
    \{+\infty\}$ 的次水平集 $C_{\alpha}(f)$ 对于任意 $\alpha \in \mathbb{R}$ 都是闭集，则称该函数是*闭函数*。


    函数 $f$ 的*上镜图* $\text{epi}(f)$ 定义为


    $$\text{epi}(f) \triangleq \{(x, t) \in \mathbb{R}^n \times \mathbb{R} : x \in
    \text{dom}(f), f(x) \leq t\}. \quad (6.7)$$


    图 6.3（右）说明了函数 $f$ 的上镜图 $\text{epi}(f)$。从该图可以看出，$f$ 的上镜图是其有效域上图像上方的区域。同样容易理解，$f$
    是凸函数当且仅当 $\text{epi}(f)$ 是凸集。


    现在，我们将本节中考虑的凸优化问题写成一般形式。


    **问题 6.1** *（凸优化）* 设 $f : \mathbb{R}^n \to \mathbb{R} \cup \{+\infty\}$ 是一个正常、闭的凸函数，且
    $\mathbf{C} \subset \mathbb{R}^n$ 是一个闭凸集。那么，*凸优化问题*就是寻找一个向量 $x^* \in \mathbf{C}$，使其在集合
    $\mathbf{C} \subset \mathbb{R}^n$ 上最小化函数 $f(x)$。


    在此问题中，函数 $f(x)$ 称为*代价函数*或*目标函数*。集合 $\mathbf{C}$ 称为*约束集*或*可行集*，$\mathbf{C}$ 中的元素称为*可行解*，包含关系
    $x \in \mathbf{C}$ 称为*约束*。优化问题可简单描述为


    $$\min_{x \in \mathbb{R}^n} f(x) \quad \text{subject to} \quad x \in \mathbf{C}.
    \quad (6.8)$$


    ![](img/6f6a40195ea61efdca2c32abeddbaaca_177_1.png)


    ![](img/6f6a40195ea61efdca2c32abeddbaaca_178_0.png)


    **图 6.4** 凸函数（左）和非凸函数（右）的局部极小值点 \(\tilde{x}\) 和全局极小值点 \(x^*\)


    凸优化最重要的性质之一是，如果存在*局部极小值点*，那么它也是*全局极小值点*。现在，优化问题 (6.8) 的局部极小值点和全局极小值点定义如下：如果存在一个开集
    \(\mathbf{B} \subset \mathbb{R}^n\)，包含一个可行解 \(\tilde{x} \in \mathbf{C}\)，使得对于所有
    \(x \in \mathbf{B} \cap \mathbf{C}\)，都有 \(f(x) \geq f(\tilde{x})\)，则 \(f(\tilde{x})\)
    称为优化问题 (6.8) 的*局部极小值点*。同样，如果一个可行解 \(x^* \in \mathbf{C}\) 满足对于所有 \(x \in \mathbf{C}\)，都有
    \(f(x) \geq f(x^*)\)，则 \(x^*\) 称为 (6.8) 的*全局极小值点*。图 6.4 说明了凸函数和非凸函数的局部和全局极小值点。从该图可以很容易地理解，对于凸函数，局部极小值点
    \(\tilde{x}\) 也是全局极小值点 \(x^*\)，而对于非凸函数，它们可能不重合。以下定理总结了凸函数的这一重要性质 [4, Proposition
    3.1.1]：


    > **定理 6.1** *对于凸优化问题 (6.8)，如果存在局部极小值点，那么它也是全局极小值点。*


    根据这个定理，如果我们有一个算法可以找到凸优化问题的局部极小值点，那么它也就成为了一个寻找全局极小值点的算法。例如，让我们考虑一个具有*可微*凸函数 \(f(x)\)
    且 \(\mathbf{C} = \mathbb{R}\) 的无约束优化问题。那么，满足


    \[ \frac{df}{dx}(\tilde{x}) = 0 \tag{6.9} \]


    的点 \(\tilde{x} \in \mathbb{R}\) 是一个局部极小值点，它也是全局极小值点。通常，对于具有可微代价函数的无约束凸优化，搜索 \(f\)
    的*梯度*为零的点的算法就是寻找全局极小值点的算法。这个想法对于推导凸优化的基于梯度的算法非常重要，我们将在第 6.3 节中看到。


    ### 6.2 群体检测


    这里，我们考虑凸优化的一个实际例子，*群体检测*。这是一个在大量患者中寻找少数感染了梅毒等病毒或具有针对例如 COVID-19 抗体的人的问题。'
