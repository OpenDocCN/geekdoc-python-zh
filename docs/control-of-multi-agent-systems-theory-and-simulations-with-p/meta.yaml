    Theory and Simulations with Python


    ![](img/6f6a40195ea61efdca2c32abeddbaaca_0_0.png)


    ## Advanced Textbooks in Control and Signal Processing


    **Series Editors**


    Michael J. Grimble, Department of Electronic and Electrical Engineering, University
    of Strathclyde, Glasgow, UK


    Lorenzo Marconi, Department of Electrical, Electronic, and Information Engineering,
    Università di Bologna, Bologna, Italy


    **Advanced Textbooks in Control and Signal Processing** is a series designed to
    present ideas in these disciplines in a manner suitable for students and tutors
    involved in advanced-undergraduate and graduate courses. The subject matter may
    be theoretical or applied but must be suitable for learning at this level – these
    books do not often contain the latest cutting-edge research but take more of a
    long view of a subject as a whole and deal with general areas rather than specific
    niches.


    Volumes in this series are designed to be adopted as classroom textbooks and are
    often augmented with accessory material available from the Web. This can be anything
    from MATLAB® files to pdf slides to be projected in class as teaching aids. Solutions
    manual pdfs available for download by class instructors are common additions and
    books are peer reviewed with view to the requirements of classroom tuition.


    Titles in this series should be between 200 and 500 pages in length and should
    contain pedagogical material to assist the student: problems (preferably with
    solutions in a separate pdf); examples; learning plans; case studies; thorough
    background reference lists; etc.


    Authors wishing to submit a proposal for this series should contact the


    ### Series Editors


    Professor **Michael J. Grimble** Department of Electronic and Electrical Engineering,
    Royal College Building, 204 George Street, Glasgow G1 1XW, United Kingdom


    **e-mail:** [m.j.grimble@strath.ac.uk](mailto:m.j.grimble@strath.ac.uk)


    Professor **Lorenzo Marconi** of the Università di Bologna, Department of Electrical,
