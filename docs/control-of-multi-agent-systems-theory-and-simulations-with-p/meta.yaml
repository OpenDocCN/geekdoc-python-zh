    the $\omega$-limit set by $\mathbf{O}(x(0))$. Since $\mathbf{D}$ is a bounded
    invariant set, we have $\mathbf{O}(x(0)) \subseteq \mathbf{D}$ under (b) (see
    Lemma 4.1 in [6]). Then, as proven later, it follows that:


    $$\mathbf{O}(x(0)) \subseteq \mathbf{M}, \tag{4.53}$$


    where $\mathbf{M}$ is the largest invariant set contained in $\mathbf{E}$. By
    reminding us that $\mathbf{O}(x(0))$ is an $\omega$-limit set of $x(t)$, (4.53)
    means that $x(t)$ converges to $\mathbf{M}$ as $t \to \infty$.


    Next, we prove (4.53). Consider again the above solution $x(t)$ for $x(0) \in
    \mathbf{D}$. It turns out from the definition of the $\omega$-limit sets, that,
    for each $p \in \mathbf{O}(x(0))$, there exists a sequence $(t_1, t_2, \dots)
    \in \mathbb{R}_+^\infty$ such that $\lim_{k \to \infty} t_k = \infty$ and


    $$\lim_{k \to \infty} V(x(t_k)) = V(p). \tag{4.54}$$


    On the other hand, we have $\lim_{t \to \infty} V(x(t)) = \alpha$ for some $\alpha
    \in \mathbb{R}$ because $V(x)$ is continuous and $\dot{V}(x) \leq 0$ on the bounded
    set $\mathbf{D}$. Thus, it follows from the continuity of $V(x)$ that


    $$\lim_{k \to \infty} V(x(t_k)) = \alpha \tag{4.55}$$


    for the same sequence $(t_1, t_2, \dots)$.


    Equations (4.54) and (4.55) imply that


    $$V(p) = \alpha, \quad \forall p \in \mathbf{O}(x(0)). \tag{4.56}$$


    Since $\dot{V}(x) = ((\partial V / \partial x)(x))^\top \dot{x}$ and (4.56) implies
    $(\partial V / \partial x)(x) = 0$ for any $x \in \mathbf{O}(x(0))$, we obtain


    $$\dot{V}(x) = 0, \quad \forall x \in \mathbf{O}(x(0)). \tag{4.57}$$


    This suggests that $\mathbf{O}(x(0)) \subseteq \mathbf{E} = \{x \in \mathbf{D}
    : \dot{V}(x) = 0\}$. Moreover, $\mathbf{O}(x(0))$ is an invariant set from Lemma
    4.1 in [6] and every invariant set contained in $\mathbf{E}$ is a subset of $\mathbf{M}$.
    These prove (4.53). $\square$


    $^2$ Consider the system $\dot{x}(t) = f(x(t))$, where $x(t) \in \mathbb{R}^n$
    is the state and $f : \mathbb{R}^n \to \mathbb{R}^n$. Let $\phi(t, x_0)$ be a
    solution on $(-\infty, +\infty)$ passing through $x_0$ at some time. The point
    $z$ is called the $\omega$-limit point of $x_0$ if there exists a sequence $(t_1,
    t_2, \dots)$ such that $\lim_{k \to \infty} t_k = \infty$ and $\lim_{k \to \infty}
    \phi(t_k, x_0) = z$. The set of all $\omega$-limit points of $x_0$ is called the
    $\omega$-limit set of $x_0$.'
