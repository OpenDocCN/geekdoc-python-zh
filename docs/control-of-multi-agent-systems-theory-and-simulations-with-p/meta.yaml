    # 4.6 Summary


    In this chapter, coverage control has been addressed. We have seen that the coverage
    problem is formulated as the minimization problem of an objective function quantifying
    the degree of coverage. We have focused on the integrator agents in a similar
    way to Chap. 3 and presented gradient-based controllers. The convergence property
    has been established by LaSalle’s invariance principle.


    In this chapter, we have focused on rather specific cases of coverage control.
    The book [2] and expository article [11] introduce a more comprehensive framework
    to coverage control. On the other hand, as mentioned above, basic properties of
    gradient systems play an important role in coverage control. We suggest the book
    [3] for much more on gradient systems.


