    The following lemma shows the relation between the function $J$ and the corresponding
    Voronoi diagrams:


    **Lemma 4.3** Consider the objective function $J$ in (4.5). Assume (4.14) and
    let $\{\mathbf{C}_1(x), \mathbf{C}_2(x), \ldots, \mathbf{C}_n(x)\}$ be the Voronoi
    diagram for $\mathbf{Q}$ and $x_i$ ($i = 1, 2, \ldots, n$). Then


    $$J(x) = \sum_{i=1}^n \int_{\mathbf{C}_i(x)} h(\|q - x_i\|)\phi(q)dq. \qquad (4.15)$$


    **Proof** Equation (4.5) is expressed as


    $$\begin{aligned} J(x) &= \int_{\mathbf{Q}} \min_{i \in \{1, 2, \ldots, n\}} h(\|q
    - x_i\|)\phi(q)dq \ &= \int_{\bigcup_{j=1}^n \mathbf{C}_j(x)} \min_{i \in \{1,
    2, \ldots, n\}} h(\|q - x_i\|)\phi(q)dq \ &= \sum_{j=1}^n \int_{\mathbf{C}_j(x)}
    \min_{i \in \{1, 2, \ldots, n\}} h(\|q - x_i\|)\phi(q)dq \ &= \sum_{j=1}^n \int_{\mathbf{C}_j(x)}
    h(\|q - x_j\|)\phi(q)dq. \end{aligned}$$


    The second and third equations are given by Lemma 4.2 (i) and (iii), and the final
    equation is obtained by the definition of Voronoi cells in (4.7) and the fact
    that $h$ is nondecreasing. By replacing $j$ with $i$ in the final term, we obtain
    (4.15). $\square$


    The following result is concerned with the differentiability and gradient of $J(x)$
    in the case of $m = 2$:


    **Lemma 4.4** Consider the objective function $J$ in (4.5). Assume that $m = 2$,
    $\mathbf{Q}$ is a bounded polyhedron, and $h$ is continuously differentiable on
    $\mathbb{R}_{0+}$. Then the following statements hold:


    (i) The function $J$ is continuously differentiable on $\mathbf{Q}^n \setminus
