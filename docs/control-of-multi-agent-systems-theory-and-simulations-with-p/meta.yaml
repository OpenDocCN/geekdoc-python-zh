    From the above theorem, every semi-simple matrix $A \in \mathbb{R}^{n \times n}$
    has $n$ linearly independent eigenvectors $x_1, x_2, \ldots, x_n \in \mathbb{R}^n$.
    If $A$ is semi-simple, then $A^\top$ is also semi-simple, and hence $A^\top$ has
    $n$ linearly independent eigenvectors $y_1, y_2, \ldots, y_n \in \mathbb{R}^n$,
    that is,


    $$Ax_i = \lambda_i x_i \quad (2.38)$$

    $$A^\top y_i = \lambda_i y_i \quad (2.39)$$


    hold for any $i \in \{1, 2, \ldots, n\}$. From (2.39), we have


    $$y_i^\top A = \lambda_i y_i^\top. \quad (2.40)$$


    It follows that $y_i^\top$ is a left eigenvector of $A$. Since the eigenvectors
    $x_1, x_2, \ldots, x_n$ are linearly independent, the matrix $T \triangleq [x_1
    \ x_2 \ \cdots \ x_n]$ is non-singular. If we take $y_i$ such that $y_i^\top x_i
    = 1$ ($i = 1, 2, \ldots, n$), then it is easily shown that $T^{-1} = [y_1 \ y_2
    \ \cdots \ y_n]^\top$ holds. In summary, we have


    $$A = T \operatorname{diag}(\lambda_1, \lambda_2, \ldots, \lambda_n) T^{-1} =
    \sum_{i=1}^n \lambda_i x_i y_i^\top. \quad (2.41)$$


    We call the decomposition in (2.41) the *spectral decomposition* of semi-simple
    matrix $A$.


