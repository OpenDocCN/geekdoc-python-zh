    the Jacobian matrix $J(\tilde{e}^u)$ is bounded and Lipschitz continuous since
    the right-hand side of (5.72) is continuously differentiable. The right-hand side
    of (5.73), when $\tilde{e}^u = 0$, could be simplified as


    $$J(\tilde{e}^u) = -Q(\tilde{e}^u) \left[ I_{\sigma^u \times \sigma^u} + \frac{\partial
    [(f'')^\top f(\tilde{e}^u)]}{\partial \tilde{e}^u} \right]_{\tilde{e}^u=0} .$$


    Now, from


    $$\frac{\partial [(f'')^\top f(\tilde{e}^u)]}{\partial \tilde{e}^u} = \frac{\partial^2
    f(\tilde{e}^u)}{\partial (\tilde{e}^u)^2}^\top f(\tilde{e}^u) + \frac{\partial
    f(\tilde{e}^u)}{\partial \tilde{e}^u}^\top \frac{\partial f(\tilde{e}^u)}{\partial
    \tilde{e}^u} ,$$


    which is positive-definite, we can see that $\left[ I_{\sigma^u \times \sigma^u}
    + \frac{\partial [(f'')^\top f(\tilde{e}^u)]}{\partial \tilde{e}^u} \right]_{\tilde{e}^u=0}$
    is symmetric and positive-definite. Also since $Q(\tilde{e}^u)$ is symmetric and
    positive-definite, the eigenvalues of $J(\tilde{e}^u)$ are real and positive.
