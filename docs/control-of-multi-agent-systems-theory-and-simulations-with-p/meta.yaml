    9 # Simulation

    10 T = 100 # Simulation time

    11 dt = 0.1 # Step size

    12 I = np.zeros(T) # Initializing I(t)

    13 I[0] = I0 # Initial value

    14 C = i0/(1-i0-gamm/lmbd)

    15 for k in range(1,T):

