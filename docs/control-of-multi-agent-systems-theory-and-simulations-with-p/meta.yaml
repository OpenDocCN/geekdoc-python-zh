    $$R_p^\top \tilde{e} = (E(p) \otimes I_2)p,$$

    ```


    where the matrix $E$ is called an error matrix, which is calculated as


    ```

    $$E(p) = \begin{bmatrix} \tilde{e}_{12} + \tilde{e}_{13} & -\tilde{e}_{12} & -\tilde{e}_{13}
    \ -\tilde{e}_{12} & \tilde{e}_{12} + \tilde{e}_{23} & -\tilde{e}_{23} \ -\tilde{e}_{13}
    & -\tilde{e}_{23} & \tilde{e}_{13} + \tilde{e}_{23} \end{bmatrix}.$$

