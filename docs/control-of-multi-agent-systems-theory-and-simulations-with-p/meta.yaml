    - p_1^\top \ 0 & p_2^\top - p_3^\top & p_3^\top - p_2^\top & 0 \ 0 & p_2^\top
    - p_4^\top & 0 & p_4^\top - p_2^\top \ 0 & 0 & p_3^\top - p_4^\top & p_4^\top
