- md: '## 6.5.2 Distributed ADMM


    Let us consider the following unconstrained minimization problem:


    $$\min_{x \in \mathbb{R}^n} \sum_{i=1}^N f_i(x). \tag{6.117}$$


    This problem can be equivalently represented by


    $$\min_{x_1, x_2, \dots, x_N \in \mathbb{R}^n} \sum_{i=1}^N f_i(x_i) \text{ subject
    to } x_1 = x_2 = \cdots = x_N. \tag{6.118}$$


    Then, by using the indicator function (6.70) with


    $$\mathbf{C} \triangleq \{(x_1, x_2, \dots, x_N) : x_1 = x_2 = \cdots = x_N\},
    \tag{6.119}$$


    we have the unconstrained convex optimization problem:


    $$\min_{x_1, x_2, \dots, x_N \in \mathbb{R}^n} \sum_{i=1}^N f_i(x_i) + I_{\mathbf{C}}(x_1,
    x_2, \dots, x_N). \tag{6.120}$$


    Moreover, we introduce new variables $z_i = x_i, i = 1, 2, \dots, N$


    $$x \triangleq [x_1^\top, x_2^\top, \dots, x_N^\top]^\top \in \mathbb{R}^{nN},
    \quad z \triangleq [z_1^\top, \dots, z_N^\top]^\top \in \mathbb{R}^{nN}, \tag{6.121}$$


    and function


    $$f(x) \triangleq \sum_{i=1}^{N} f_i(x_i).$$


    Then we have the following optimization problem:


    $$\underset{x, z \in \mathbb{R}^{nN}}{\text{minimize}} \quad f(x) + I_{\mathbf{C}}(z)
    \quad \text{subject to} \quad x = z.$$


    This is a special case of the optimization problem (6.92) with $g(z) = I_{\mathbf{C}}(z)$
    and $h(x, z) = x - z$. The associated ADMM algorithm is given by


    $$x[k+1] = \underset{x}{\text{arg min}} \left( f(x) + \frac{\rho}{2} \|x - z[k]
    + u[k]\|^2 \right),$$


    $$z[k+1] = \underset{z}{\text{arg min}} \left( I_{\mathbf{C}}(z) + \frac{\rho}{2}
    \|x[k+1] - z + u[k]\|^2 \right),$$


    $$u[k+1] = u[k] + x[k+1] - z[k+1].$$


    We can describe this iteration algorithm in a distributed manner. First, the objective
    function in (6.124) can be rewritten as


    $$f(x) + \frac{\rho}{2} \|x - z[k] + u[k]\|^2 = \sum_{i=1}^{N} \left\{ f_i(x_i)
    + \frac{\rho}{2} \|x_i - z_i[k] + u_i[k]\|^2 \right\}.$$


    Therefore, the update (6.124) for $x[k+1]$ is divided into $N$ updates as


    $$x_i[k+1] = \underset{x_i}{\text{arg min}} \left\{ f_i(x_i) + \frac{\rho}{2}
    \|x_i - z_i[k] + u_i[k]\|^2 \right\}$$


    $$= \text{prox}_{f_i/\rho}(z_i[k] - u_i[k]), \quad i = 1, 2, \ldots, N,$$


    where we used the definition of proximal operator (6.63).


    Then, the update in (6.125) is given by the projection of $x[k+1] + u[k]$ onto
    $\mathbf{C}$, which can be obtained from (6.73) by


    $$z_i[k+1] = \overline{x[k+1]} + \overline{u[k]} = \frac{1}{N} \sum_{j=1}^{N}
    (x_j[k+1] + u_j[k]), \quad i = 1, \ldots, N.$$


    Finally, from (6.126) and (6.129), we have


    $$u_i[k+1] = u_i[k] + x_i[k+1] - \overline{x[k+1]} - \overline{u[k]}.$$


    At the same time, we have


    $$\overline{u[k+1]} = \frac{1}{N} \sum_{i=1}^{N} u_i[k+1]$$

    $$= \frac{1}{N} \sum_{i=1}^{N} \{u_i[k] + x_i[k+1] - \overline{x[k+1]} - \overline{u[k]}\}
    \quad (6.131)$$

    $$= \overline{u[k]} + \overline{x[k+1]} - \overline{x[k+1]} - \overline{u[k]}$$

    $$= 0.$$


    Therefore, we have $\overline{u[k]} = 0$ for all $k = 0, 1, 2, \dots$ if we choose
    the initial value $u[0]$ as 0. From (6.128), (6.129), (6.130), and (6.131), we
    finally obtain the following distributed ADMM algorithm:


    $$x_i[k+1] = \text{prox}_{f_i/\rho}(\overline{x[k]} - u_i[k]),$$

    $$u_i[k+1] = u_i[k] + x_i[k+1] - \overline{x[k+1]}. \quad (6.132)$$


    In this algorithm, the computation of $x_i[k+1]$ is done in parallel, but needs
    the global data $\overline{x[k]}$. For this, we adopt the *central collector*
    or the *fusion center* that collects data $x_i[k]$, $i = 1, \dots, N$, from all
    the agents, computes the average $\overline{x[k]}$, and sends it back to the agents.
    Figure 6.14 shows the network for the distributed algorithm. As we can see, the
    central collector $C$ connects all the agents, while each agent only exchanges
    data with $C$. Such a network is called a *star network*.


    **Example 6.9** (*Distributed least squares*) Here, we consider the problem of
    *least squares* to solve the following optimization problem:


    $$\text{minimize} \quad \|Ax - b\|^2. \quad (6.133)$$


    We assume $A \in \mathbb{R}^{m \times n}$ has full column rank, that is, $m \ge
    n$ and $\text{rank}(A) = n$. Then, $A^\top A$ is invertible, and the minimizer
    of (6.133) is given by (see Exercise vi)


    $$x^* = (A^\top A)^{-1} A^\top b. \tag{6.134}$$


    Now, let us reformulate the optimization problem (6.133) as a distributed optimization
    problem as in (6.117), and write down the corresponding ADMM algorithm. Let $A
    \triangleq [a_1, a_2, \dots, a_m]^\top$ with $a_i \in \mathbb{R}^n$ and $b \triangleq
    [b_1, b_2, \dots, b_m]^\top$ as in (6.12). Then we have


    $$\|Ax - b\|_2^2 = \left\| \begin{bmatrix} a_1^\top x - b_1 \\ a_2^\top x - b_2
    \\ \vdots \\ a_m^\top x - b_m \end{bmatrix} \right\|^2 = \sum_{i=1}^m (a_i x -
    b_i)^2. \tag{6.135}$$


    Therefore, we can take $f_i(x) = (a_i x - b_i)^2$ in (6.117). Then, the proximal
    operator of $f_i$ is derived from (6.67) and (6.68) as


    $$\text{prox}_{f_i/\rho}(v) = (a_i a_i^\top + \rho I)^{-1} (b_i a_i + \rho v).
    \tag{6.136}$$


    Finally, the distributed ADMM algorithm for (6.133) is given by


    $$x_i[k+1] = Q_i(b_i a_i + \rho(\overline{x}[k] - u_i[k])), \ u_i[k+1] = u_i[k]
    + x_i[k+1] - \overline{x}[k+1], \tag{6.137}$$


    where


    $$Q_i \triangleq (a_i a_i^\top + \rho I)^{-1}, \quad i = 1, 2, \dots, m. \tag{6.138}$$


    The matrices $Q_1, Q_2, \dots, Q_m$ should be computed before the iteration to
    reduce the computational burden. $\square$


    **Example 6.10** *(Python)* Now, we implement the distributed ADMM algorithm (6.137)
    for the problem of least squares (6.133). We assume that $A$ is a binary-valued
    matrix of size $20 \times 20$ (i.e., $n = m = 20$), as considered in Sect. 6.2.
    The observation vector $b$ is given by


    $$b = A x_{\text{orig}} + w, \tag{6.139}$$


    where $x_{\text{orig}}$ is a sparse binary-valued vector which has 2 non-zero
    elements (i.e., $\|x\|_0 = 2$), and $w \in \mathbb{R}^m$ is an $m$-dimensional
    Gaussian noise, with mean 0 and covariance $0.01^2 I$. The Python code is given
    in Sect. 6.6.6.


    Figure 6.15 shows the error between the average $\overline{x}[k]$ and the original
    vector $x_{\text{orig}}$ by the distributed ADMM algorithm (6.137) with $\rho
    = 1$ and 1000 iterations. We see the error decreases as the update is iterated.
    Figure 6.16 shows the reconstructed vector $x[1000]$. There remain errors in the
    reconstructed vector, but the original binary-valued vector can be exactly reconstructed
    by rounding. $\square$


    ## 6.5.3 Distributed ADMM with Regularization


    In this section, we consider the following regularized optimization problem:


    $$\min_{x \in \mathbb{R}^n} \sum_{i=1}^N f_i(x) + g(x), \quad (6.140)$$


    where $g : \mathbb{R}^n \mapsto \mathbb{R} \cup \{+\infty\}$ is the regularization
    function, which is a proper, closed, and convex function. We assume the regularization
    function $g$ is known to all agents. The unconstrained optimization in (6.140)
    can be rewritten as


    $$\text{minimize}_{x_1, x_2, \dots, x_N, z \in \mathbb{R}^n} \sum_{i=1}^N f_i(x_i)
    + g(z) \quad \text{subject to} \quad x_1 = x_2 = \dots = x_N = z. \tag{6.141}$$


    Then, in a similar way to the derivation of the distributed ADMM in the previous
    subsection, we have the distributed ADMM as follows:


    $$\begin{aligned} x_i[k+1] &= \text{prox}_{f_i/\rho}(z[k] - u_i[k]), \\ z[k+1]
    &= \text{prox}_{g/(N\rho)}(\overline{x[k+1]} + \overline{u[k]}), \\ u_i[k+1] &=
    u_i[k] + x_i[k+1] - z[k+1]. \end{aligned} \tag{6.142}$$


    In this distributed algorithm, the vectors $x_i[k]$ and $u_i[k]$ are locally updated
    by agent $i$ using the vector $z[k]$ that is updated at and sent from the central
    collector C, as shown in Fig. 6.14.


    **Example 6.11** (Python) Here, we consider the problem of *regularized least
    squares*, that is described as


    $$\text{minimize} \|Ax - b\|^2 + \lambda\|x\|_1. \tag{6.143}$$


    This is a regularized version of the least squares discussed in Example 6.9. If
    the original vector $x_{\text{orig}}$ is sparse, this formulation should be better
    than the unregularized least squares. The distributed algorithm in (6.142) corresponding
    to this optimization problem is given by


    $$\begin{aligned} x_i[k+1] &= Q_i(b_i a_i + \rho(z[k] - u_i[k])), \\ z[k+1] &=
    S_{\lambda/(N\rho)}(\overline{x[k+1]} + \overline{u[k]}), \\ u_i[k+1] &= u_i[k]
    + x_i[k+1] - z[k+1], \end{aligned} \tag{6.144}$$


    where $Q_i$ is given in (6.138) and $S_{\lambda/(N\rho)}$ is the soft-thresholding
    operator defined in (6.75) with $\gamma = \lambda/(N\rho)$.


    The Python code for this is given in Sect. 6.6.7. $A$ and $x_{\text{orig}}$ are
    the same as those in Example 6.9, and $b$ is given as in (6.139). We take $\lambda
    = 1$ in (6.143) and $\rho = 1$ in (6.144).


    Figure 6.17 shows the error between the average $\overline{x[k]}$ and the original
    vector $x_{\text{orig}}$ by the distributed ADMM algorithm (6.144). The convergence
    is faster than the result of the unregularized least squares in Example 6.9. Figure
    6.16 shows the reconstructed vector $x[1000]$. Thanks to the regularization term
    $\|x\|_1$ in (6.143), the reconstructed vector contains smaller errors than that
    of unregularized least squares (Fig. 6.18).'
  mdcn: '## 6.5.2 分布式ADMM


    让我们考虑以下无约束最小化问题：


    $$\min_{x \in \mathbb{R}^n} \sum_{i=1}^N f_i(x). \tag{6.117}$$


    该问题可以等价地表示为


    $$\min_{x_1, x_2, \dots, x_N \in \mathbb{R}^n} \sum_{i=1}^N f_i(x_i) \text{ subject
    to } x_1 = x_2 = \cdots = x_N. \tag{6.118}$$


    然后，利用指示函数 (6.70)，其中


    $$\mathbf{C} \triangleq \{(x_1, x_2, \dots, x_N) : x_1 = x_2 = \cdots = x_N\},
    \tag{6.119}$$


    我们得到无约束凸优化问题：


    $$\min_{x_1, x_2, \dots, x_N \in \mathbb{R}^n} \sum_{i=1}^N f_i(x_i) + I_{\mathbf{C}}(x_1,
    x_2, \dots, x_N). \tag{6.120}$$


    此外，我们引入新变量 $z_i = x_i, i = 1, 2, \dots, N$


    $$x \triangleq [x_1^\top, x_2^\top, \dots, x_N^\top]^\top \in \mathbb{R}^{nN},
    \quad z \triangleq [z_1^\top, \dots, z_N^\top]^\top \in \mathbb{R}^{nN}, \tag{6.121}$$


    以及函数


    $$f(x) \triangleq \sum_{i=1}^{N} f_i(x_i).$$


    那么我们有以下优化问题：


    $$\underset{x, z \in \mathbb{R}^{nN}}{\text{minimize}} \quad f(x) + I_{\mathbf{C}}(z)
    \quad \text{subject to} \quad x = z.$$


    这是优化问题 (6.92) 的一个特例，其中 $g(z) = I_{\mathbf{C}}(z)$ 且 $h(x, z) = x - z$。相应的ADMM算法由下式给出


    $$x[k+1] = \underset{x}{\text{arg min}} \left( f(x) + \frac{\rho}{2} \|x - z[k]
    + u[k]\|^2 \right),$$


    $$z[k+1] = \underset{z}{\text{arg min}} \left( I_{\mathbf{C}}(z) + \frac{\rho}{2}
    \|x[k+1] - z + u[k]\|^2 \right),$$


    $$u[k+1] = u[k] + x[k+1] - z[k+1].$$


    我们可以用分布式的方式描述这个迭代算法。首先，(6.124) 中的目标函数可以重写为


    $$f(x) + \frac{\rho}{2} \|x - z[k] + u[k]\|^2 = \sum_{i=1}^{N} \left\{ f_i(x_i)
    + \frac{\rho}{2} \|x_i - z_i[k] + u_i[k]\|^2 \right\}.$$


    因此，$x[k+1]$ 的更新 (6.124) 被分解为 $N$ 个更新：


    $$x_i[k+1] = \underset{x_i}{\text{arg min}} \left\{ f_i(x_i) + \frac{\rho}{2}
    \|x_i - z_i[k] + u_i[k]\|^2 \right\}$$


    $$= \text{prox}_{f_i/\rho}(z_i[k] - u_i[k]), \quad i = 1, 2, \ldots, N,$$


    其中我们使用了近端算子 (6.63) 的定义。


    然后，(6.125) 中的更新由 $x[k+1] + u[k]$ 在 $\mathbf{C}$ 上的投影给出，这可以从 (6.73) 得到：


    $$z_i[k+1] = \overline{x[k+1]} + \overline{u[k]} = \frac{1}{N} \sum_{j=1}^{N}
    (x_j[k+1] + u_j[k]), \quad i = 1, \ldots, N.$$


    最后，由 (6.126) 和 (6.129)，我们有


    $$u_i[k+1] = u_i[k] + x_i[k+1] - \overline{x[k+1]} - \overline{u[k]}.$$


    同时，我们有


    $$\overline{u[k+1]} = \frac{1}{N} \sum_{i=1}^{N} u_i[k+1]$$

    $$= \frac{1}{N} \sum_{i=1}^{N} \{u_i[k] + x_i[k+1] - \overline{x[k+1]} - \overline{u[k]}\}
    \quad (6.131)$$

    $$= \overline{u[k]} + \overline{x[k+1]} - \overline{x[k+1]} - \overline{u[k]}$$

    $$= 0.$$


    因此，如果我们选择初始值 $u[0]$ 为 0，那么对于所有 $k = 0, 1, 2, \dots$，我们有 $\overline{u[k]} = 0$。由
    (6.128)、(6.129)、(6.130) 和 (6.131)，我们最终得到以下分布式ADMM算法：


    $$x_i[k+1] = \text{prox}_{f_i/\rho}(\overline{x[k]} - u_i[k]),$$

    $$u_i[k+1] = u_i[k] + x_i[k+1] - \overline{x[k+1]}. \quad (6.132)$$


    在此算法中，$x_i[k+1]$ 的计算是并行进行的，但需要全局数据 $\overline{x[k]}$。为此，我们采用*中心收集器*或*融合中心*，它从所有智能体收集数据
    $x_i[k]$，$i = 1, \dots, N$，计算平均值 $\overline{x[k]}$，并将其发送回智能体。图 6.14 显示了分布式算法的网络。如我们所见，中心收集器
    $C$ 连接所有智能体，而每个智能体仅与 $C$ 交换数据。这样的网络称为*星型网络*。


    **示例 6.9** (*分布式最小二乘*) 这里，我们考虑*最小二乘*问题，以解决以下优化问题：


    $$\text{minimize} \quad \|Ax - b\|^2. \quad (6.133)$$


    我们假设 $A \in \mathbb{R}^{m \times n}$ 具有满列秩，即 $m \ge n$ 且 $\text{rank}(A) = n$。那么，$A^\top
    A$ 可逆，且 (6.133) 的最小化器由下式给出（见练习 vi）


    $$x^* = (A^\top A)^{-1} A^\top b. \tag{6.134}$$


    现在，让我们将优化问题 (6.133) 重新表述为如 (6.117) 所示的分布式优化问题，并写出相应的ADMM算法。令 $A \triangleq [a_1,
    a_2, \dots, a_m]^\top$，其中 $a_i \in \mathbb{R}^n$，且 $b \triangleq [b_1, b_2, \dots,
    b_m]^\top$，如 (6.12) 所示。那么我们有


    $$\|Ax - b\|_2^2 = \left\| \begin{bmatrix} a_1^\top x - b_1 \\ a_2^\top x - b_2
    \\ \vdots \\ a_m^\top x - b_m \end{bmatrix} \right\|^2 = \sum_{i=1}^m (a_i x -
    b_i)^2. \tag{6.135}$$


    因此，我们可以在 (6.117) 中取 $f_i(x) = (a_i x - b_i)^2$。那么，$f_i$ 的近端算子由 (6.67) 和 (6.68)
    推导为


    $$\text{prox}_{f_i/\rho}(v) = (a_i a_i^\top + \rho I)^{-1} (b_i a_i + \rho v).
    \tag{6.136}$$


    最后，(6.133) 的分布式ADMM算法由下式给出


    $$x_i[k+1] = Q_i(b_i a_i + \rho(\overline{x}[k] - u_i[k])), \ u_i[k+1] = u_i[k]
    + x_i[k+1] - \overline{x}[k+1], \tag{6.137}$$


    其中


    $$Q_i \triangleq (a_i a_i^\top + \rho I)^{-1}, \quad i = 1, 2, \dots, m. \tag{6.138}$$


    矩阵 $Q_1, Q_2, \dots, Q_m$ 应在迭代前计算，以减少计算负担。$\square$


    **示例 6.10** *(Python)* 现在，我们为最小二乘问题 (6.133) 实现分布式ADMM算法 (6.137)。我们假设 $A$ 是一个大小为
    $20 \times 20$ 的二值矩阵（即 $n = m = 20$），如第 6.2 节所述。观测向量 $b$ 由下式给出


    $$b = A x_{\text{orig}} + w, \tag{6.139}$$


    其中 $x_{\text{orig}}$ 是一个稀疏的二值向量，有 2 个非零元素（即 $\|x\|_0 = 2$），而 $w \in \mathbb{R}^m$
    是一个 $m$ 维高斯噪声，均值为 0，协方差为 $0.01^2 I$。Python 代码在第 6.6.6 节中给出。


    图 6.15 显示了使用 $\rho = 1$ 和 1000 次迭代的分布式ADMM算法 (6.137) 得到的平均值 $\overline{x}[k]$
    与原始向量 $x_{\text{orig}}$ 之间的误差。我们看到误差随着迭代更新而减小。图 6.16 显示了重构向量 $x[1000]$。重构向量中仍存在误差，但通过对原始二值向量进行舍入可以精确重构。$\square$


    ## 6.5.3 带正则化的分布式ADMM


    在本节中，我们考虑以下正则化优化问题：


    $$\min_{x \in \mathbb{R}^n} \sum_{i=1}^N f_i(x) + g(x), \quad (6.140)$$


    其中 $g : \mathbb{R}^n \mapsto \mathbb{R} \cup \{+\infty\}$ 是正则化函数，它是一个正常、闭的凸函数。我们假设正则化函数
    $g$ 对所有智能体都是已知的。(6.140) 中的无约束优化可以重写为


    $$\text{minimize}_{x_1, x_2, \dots, x_N, z \in \mathbb{R}^n} \sum_{i=1}^N f_i(x_i)
    + g(z) \quad \text{subject to} \quad x_1 = x_2 = \dots = x_N = z. \tag{6.141}$$


    然后，以类似于上一小节推导分布式ADMM的方式，我们得到如下分布式ADMM：


    $$\begin{aligned} x_i[k+1] &= \text{prox}_{f_i/\rho}(z[k] - u_i[k]), \\ z[k+1]
    &= \text{prox}_{g/(N\rho)}(\overline{x[k+1]} + \overline{u[k]}), \\ u_i[k+1] &=
    u_i[k] + x_i[k+1] - z[k+1]. \end{aligned} \tag{6.142}$$


    在此分布式算法中，向量 $x_i[k]$ 和 $u_i[k]$ 由智能体 $i$ 使用在中心收集器 C 处更新并发送的向量 $z[k]$ 进行局部更新，如图
    6.14 所示。


    **示例 6.11** (Python) 这里，我们考虑*正则化最小二乘*问题，描述为


    $$\text{minimize} \|Ax - b\|^2 + \lambda\|x\|_1. \tag{6.143}$$


    这是示例 6.9 中讨论的最小二乘的正则化版本。如果原始向量 $x_{\text{orig}}$ 是稀疏的，这种表述应该优于无正则化的最小二乘。与此优化问题对应的分布式算法
    (6.142) 由下式给出


    $$\begin{aligned} x_i[k+1] &= Q_i(b_i a_i + \rho(z[k] - u_i[k])), \\ z[k+1] &=
    S_{\lambda/(N\rho)}(\overline{x[k+1]} + \overline{u[k]}), \\ u_i[k+1] &= u_i[k]
    + x_i[k+1] - z[k+1], \end{aligned} \tag{6.144}$$


    其中 $Q_i$ 由 (6.138) 给出，$S_{\lambda/(N\rho)}$ 是在 (6.75) 中定义的软阈值算子，其中 $\gamma = \lambda/(N\rho)$。


    此问题的 Python 代码在第 6.6.7 节中给出。$A$ 和 $x_{\text{orig}}$ 与示例 6.9 中的相同，$b$ 如 (6.139)
    所示。我们在 (6.143) 中取 $\lambda = 1$，在 (6.144) 中取 $\rho = 1$。


    图 6.17 显示了使用分布式ADMM算法 (6.144) 得到的平均值 $\overline{x[k]}$ 与原始向量 $x_{\text{orig}}$
    之间的误差。其收敛速度比示例 6.9 中无正则化最小二乘的结果更快。图 6.16 显示了重构向量 $x[1000]$。得益于 (6.143) 中的正则化项
    $\|x\|_1$，重构向量比无正则化最小二乘（图 6.18）的误差更小。'
