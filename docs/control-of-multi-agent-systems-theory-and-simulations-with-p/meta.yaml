    **Lemma 5.7** Let $\breve{p}$ be a point in $\mathbf{U}_{eq}^{ude}$, i.e., $\breve{p}
    \in \mathbf{U}_{eq}^{ude}$. Then, the gradient-descent based dynamics (5.29) is
    unstable at $\breve{p}$.


    **Proof** Based on (5.30), let $\breve{p} \in \mathbf{U}_{eq}^{ude}$: then the
    agents are staying at an undesired equilibrium point. Then $\dot{p}_1(t) = -\tilde{e}_{12}(t)z_{12}(t)
    - \tilde{e}_{13}(t)z_{13}(t) = 0$, $\dot{p}_2(t) = -\tilde{e}_{21}(t)z_{21}(t)
    - \tilde{e}_{23}(t)z_{23}(t) = 0$, and $\dot{p}_3(t) = -\tilde{e}_{31}(t)z_{31}(t)
    - \tilde{e}_{32}(t)z_{32}(t) = 0$, while at least one of $\tilde{e}_{12}(t)$,
    $\tilde{e}_{13}(t)$, $\tilde{e}_{23}(t)$ is not zero. But, to satisfy this requirement,
    some of $z_{ij}(t)$ should be zero, or the vectors $z_{12}(t)$, $z_{13}(t)$, $z_{23}(t)$
    should be of collinear. Thus, we can see that the vectors $z_{12}(t)$, $z_{13}(t)$,
    $z_{23}(t)$ are linearly dependent. To check the stability of (5.29), we use the
    Hessian matrix of (5.40). Without loss of generality, since the vectors $z_{12}(t)$,
    $z_{13}(t)$, $z_{23}(t)$ are linearly dependent, we can simply consider $R_y =
    0$ at $p = \breve{p}$. Then, we have


    $$\overline{\mathfrak{H}}_{\phi}(\breve{p}) = 2 \begin{bmatrix} R_x^\top R_x +
    \frac{1}{2}E(\breve{p}) & 0 \ 0 & \frac{1}{2}E(\breve{p}) \end{bmatrix}. \tag{5.41}$$


    We also note that we have $\dot{p}(t) = (E(p(t)) \otimes I_2)p(t) = 0$ if $p =
    \breve{p} \in \mathbf{U}_{eq}^{ude}$, which means that $(E(\breve{p}) \otimes
    I_2)\breve{p} = 0$. Now, we can have


    $$\begin{aligned} \hat{p}^\top (E(\breve{p}) \otimes I_2)\hat{p} &= \hat{p}^\top
    (E(\breve{p}) \otimes I_2)\hat{p} - \breve{p}^\top (E(\breve{p}) \otimes I_2)\breve{p}
    \ &= \sum_{(i,j) \in \mathbf{E}} \tilde{e}_{ij}(\|\hat{p}_i - \hat{p}_j\|^2 -
    \|\breve{p}_i - \breve{p}_j\|^2) \ &= - \sum_{(i,j) \in \mathbf{E}} \tilde{e}_{ij}^2
    < 0. \end{aligned} \tag{5.42}$$


    Consequently, by (5.42), we can see that the Hessian matrix (5.41) is negative
    definite. Thus, we can claim that the gradient-descent based dynamics (5.29) is
    unstable at $p = \breve{p} \in \mathbf{U}_{eq}^{ude}$. $\square$


    Now, we can make the following main statement:


    **Theorem 5.8** Consider a $K(3)$ graph in the two-dimensional space driven by
    the gradient-descent control law (5.29). For almost every initial position (if
    $p(0) \notin \mathbf{U}_{eq}^{ude}$), the agents converge to $\mathbf{U}_{eq}^{des}$.


    **Proof** From (5.35), we can see that $z_{ij}$ and $\tilde{e}_{ij}$ are bounded,
    and by LaSalle''s invariance principle, $\phi(p(t)) \to 0$ as $t \to \infty$.
    Thus, $p(t)$ converges to either $\mathbf{U}_{eq}^{des}$ or $\mathbf{U}_{eq}^{ude}$.
    But, from Lemma 5.7, we know that $\mathbf{U}_{eq}^{ude}$ is not stable. Furthermore,
    since $\dot{p}(t) = (E(p(t)) \otimes I_2)p(t) = 0$ if $p(t) = \breve{p} \in \mathbf{U}_{eq}^{ude}$,
    we can see that $p(t)$ converges to a point in $\mathbf{U}_{eq}^{des}$ as far
    as $p(0) \notin \mathbf{U}_{eq}^{ude}$. Therefore, for almost all initial positions
    (i.e., if $p(0) \notin \mathbf{U}_{eq}^{ude}$), we can say that the agents will
    converge to desired configuration as time passes. $\square$'
- md: '## 5.3 Rigidity-Induced Formation Control


    Next, we study a local convergence for a general case with $n$-agents. There are
    a number of existing works that study a local convergence of (5.29). When choosing
    a point $p = p^* \in \mathbf{U}_{eq}^{des}$, then inserting $p^*$ at $\mathfrak{H}_{\phi}(p)$,
    we can analyze a local stability. If $p$ is replaced by $p^*$, we have $\mathfrak{H}_{\phi}(p^*)
    = 2R_p^\top(p^*)R_p(p^*)$. Then, as commented in [25], a framework $f_p = (G,
    p)$ is infinitesimally distance rigid if and only if $\text{rank}(R_p^\top R_p)
    = 2n - 3$ in the two-dimensional space. It is well known that the eigenvalues
    of $R_p^\top R_p$ are positive real except three zero eigenvalues [25]. So, there
    are three eigenvectors corresponding to three zero eigenvalues when the formation
    is infinitesimally rigid. These eigenvectors are interpreted as two translation
    motions along $x$ and $y$ axes, and one rotational motion around the formation''s
    centroid [23]. So, if we ignore three trivial translational and rotational motions,
    the Hessian matrix $\mathfrak{H}_{\phi}(p^*)$ has all positive real eigenvalues.
    Thus, we may claim that any infinitesimally distance-rigid formation is locally
    asymptotically stable at a desired configuration. If we use the relationship $z
    = \tilde{H}p$, an analysis can be performed on the link space $z$, which makes
    it possible to use a Lyapunov stability analysis on a compact set [1]. Or, if
    we remove the centroid dynamics by a coordinate transformation, we also could
    analyze the stability in a bounded set [15]. In what follows, the results of [15]
    are briefly summarized.


    Let us transform the position vector as


    $$\bar{p} = Tp = \begin{bmatrix} p^o \\ p^r \end{bmatrix}, \tag{5.43}$$


    where $T$ is an orthogonal matrix with a vector $\frac{1}{n}\mathbf{1}_n^\top
    \otimes I_2$ at first two rows. Then, using $\dot{\bar{p}}(t) = T\dot{p}(t)$,
    we are able to have


    $$\begin{aligned} \dot{\bar{p}}(t) &= -T\tilde{H}^\top \text{diag}(z_1, z_2, \dots,
    z_m)\tilde{e}(t) \\ &= -\overline{H}^\top \text{diag}(z_1, z_2, \dots, z_m)\tilde{e}(t),
    \tag{5.44} \end{aligned}$$


    where $\overline{H} = \tilde{H}T^{-1} = \tilde{H}T^\top$. Since $\tilde{H}$ is
    an incidence matrix, the first two columns of $\overline{H}$ are zero vectors,
    i.e., $\overline{H}$ is decomposed as $\overline{H} = [0_{m \times 2}, H^r]$ where
    $H^r \in \mathbb{R}^{m \times (2n-2)}$ is the reduced incidence matrix. Thus,
    since the first two row vectors of $\overline{H}^\top \text{diag}(z_1, z_2, \dots,
    z_m)$ are zero, which means $\dot{p}^o(t) = 0$, $^7$ from (5.43) we have


    $$\dot{p}^r(t) = -(H^r)^\top \text{diag}(z_1, z_2, \dots, z_m)\tilde{e}(t). \tag{5.45}$$


    Now, the displacement vector $z$ can be modified as


    $$z = \tilde{H}p = \tilde{H}T^{-1}\bar{p} = \overline{H}\bar{p} = H^r p^r. \tag{5.46}$$


    $^7$ Note that $p^o(t)$ is the average of the positions. So, from $\dot{p}^o(t)
    = \frac{1}{n}\sum_{i=1}^n \dot{p}_i(t) = -\frac{1}{n}\sum_{i=1}^n \left[\sum_{j
    \in \mathbb{N}_i} \tilde{e}_{ij}(t)z_{ij}(t)\right]$, we also have $\dot{p}^o(t)
    = 0$.


    Let $z^r = H^r p^r$, then (5.45) can be expressed as


    $$\dot{p}^r(t) = -(H^r)^\top \text{diag}(z_1^r, z_2^r, \dots, z_m^r)\tilde{e}(z^r)
    = -R_{p^r}^\top \tilde{e}(z^r) = -(E(p^r(t)) \otimes I_2)p^r(t), \tag{5.47}$$


    where $R_{p^r}$ is the rigidity matrix expressed as a function of $z^r$, and $\tilde{e}(z^r)$
    means that $\tilde{e}$ is also written as a function of $z^r$. From the above
    dynamics, the following relationship can be obtained:


    $$TR_p^\top = \begin{bmatrix} 0_{2 \times m} \\ R_{p^r}^\top \end{bmatrix}. \tag{5.48}$$


    Then, from the above relationship, we can have


    $$TR_p^\top R_p T^\top = \begin{bmatrix} 0_{2 \times 2} & 0_{2 \times (2n-2)}
    \\ 0_{(2n-2) \times 2} & R_{p^r}^\top R_{p^r} \end{bmatrix}. \tag{5.49}$$


    Thus, since $T$ is a similarity transformation matrix, the matrix $R_{p^r}^\top
    R_{p^r} \in \mathbb{R}^{(2n-2) \times (2n-2)}$ has only one zero eigenvalue with
    all others being positive real. That is, the matrix $R_{p^r}^\top R_{p^r}$ has
    three zero eigenvalues, and two of them are $0_{2 \times 2}$ in the right-hand
    side of (5.49), which means that $R_{p^r}^\top R_{p^r}$ has only one zero eigenvalue.
