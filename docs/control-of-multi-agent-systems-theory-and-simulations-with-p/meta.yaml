    ## 6.4 近端算法


    在上一节中，我们了解了针对具有不可微代价函数的约束优化的次梯度投影算法。在本节中，我们将考虑另一种基于*近端算子*来解决此类优化问题的方法。


    ### 6.4.1 近端算子


    令 $f : \mathbb{R}^n \to \mathbb{R} \cup \{+\infty\}$ 是一个正常、闭且凸的函数。参数为 $\gamma
    > 0$ 的*近端算子*定义为


    $$\text{prox}_{\gamma f}(v) \triangleq \arg \min_{x \in \text{dom}(f)} \left\{
    \gamma f(x) + \frac{\|x - v\|_2^2}{2} \right\}, \quad v \in \mathbb{R}^n. \quad
    (6.63)$$


    我们注意到，对于任何正常、闭且凸的函数 $f$，以及任何 $\gamma > 0$，对于任何 $v \in \mathbb{R}^n$，$\text{prox}_{\gamma
    f}(v)$ 都是唯一存在的，因此近端算子是良定义的 [13, Sect. 4.2.1]。


    为了理解近端算子的作用，让我们考虑一个具有不可微 $f$ 的无约束优化问题 (6.16)。那么求解 (6.16) 的近端算法由下式给出


    $$x[k+1] = \text{prox}_{\gamma_k f}(x[k]), \quad k = 0, 1, 2, \ldots, \tag{6.64}$$


    其中 $\gamma_k$ 是此迭代的步长。由 (6.63)，迭代 (6.64) 可以重写为


    $$x[k+1] = \underset{x \in \text{dom}(f)}{\arg\min} \left\{ f(x) + \frac{\|x -
    x[k]\|_2^2}{2\gamma_k} \right\}. \tag{6.65}$$


    函数 $f(x) + \|x - x[k]\|_2^2/(2\gamma_k)$ 总是一个*强凸函数*，<sup>1</sup> 即使 $f$ 不是强凸的而只是凸的（例如
    $f(x) = \|x\|_1$）。也就是说，算法 (6.65) 在每一步都用一个强凸函数来近似 $f$，这比一般的凸函数更容易最小化。


    对于这个算法，我们有以下定理 [5, Proposition 5.1.3]：


    **定理 6.6** *假设参数序列 $\{\gamma_k\}$ 满足对所有 $k$ 有 $\gamma_k > 0$ 且*


    $$\sum_{k=0}^{\infty} \gamma_k = +\infty. \tag{6.66}$$


    *那么，对于任何初始向量 $x[0] \in \mathbb{R}^n$，由近端算法 (6.64) 生成的序列 $\{x[k]\}$ 收敛到 $f$ 的一个极小值点。*


    在接下来的几节中，我们将介绍利用近端算子在凸优化中的高效算法。在此之前，我们将展示一些有用函数的近端算子。


    ### 二次函数


    让我们考虑以下*二次函数*：


    $$f(x) = \frac{1}{2} x^\top \Phi x - y^\top x, \tag{6.67}$$


    > <sup>1</sup> 如果存在 $\beta > 0$ 使得对于任何 $x, y \in \text{dom}(f) \subset \mathbb{R}^n$
    和任何 $t \in [0, 1]$，以下不等式成立，则称函数 $f$ 是*强凸的*：

    >

    > $$f(tx + (1-t)y) \leq tf(x) + (1-t)f(y) - t(1-t)\frac{\beta}{2}\|x - y\|_2^2.$$


    其中 $\Phi$ 是一个半正定矩阵。容易证明二次函数 (6.67) 是一个正常、闭且凸的函数。其近端算子由下式给出


    $$\text{prox}_{\gamma f}(v) = (\Phi + \gamma^{-1}I)^{-1}(y + \gamma^{-1}v). \tag{6.68}$$


    一个特例是 $\ell^2$ 范数的平方 $\|x\|^2 = x^\top x$，其近端算子由下式给出


    $$\text{prox}_{\gamma \|\cdot\|^2}(v) = \frac{v}{2\gamma + 1}. \tag{6.69}$$


    ### 指示函数


    令 $\mathbf{C} \subset \mathbb{R}^n$ 是一个非空、闭且凸的集合。那么，$\mathbf{C}$ 上的指示函数定义为


    $$I_{\mathbf{C}}(x) \triangleq \begin{cases} 0, & \text{if } x \in \mathbf{C},
    \\ +\infty, & \text{if } x \notin \mathbf{C}. \end{cases} \tag{6.70}$$


    由于 $\mathbf{C}$ 是非空、闭且凸的，其指示函数 $I_{\mathbf{C}}(x)$ 是一个正常、闭且凸的函数。通过绘制 $I_{\mathbf{C}}(x)$
