    be removed without losing the rigidity property.


    Let us first analyze the convergence of minimally infinitesimally weakly rigid
    graphs. Then, based on this result, we further analyze the convergence of general
    weak rigid graphs. From Definition 5.18, for any MIWR graph, the rank of the rigidity
    matrix is $\text{rank}(R_w) = dn - \frac{d(d+1)}{2}$, when $\mathbf{E} \neq \emptyset$,
    and $\text{rank}(R_w) = dn - \frac{d(d+1)}{2} - 1$ when $\mathbf{E} = \emptyset$
    (see Theorem 5.5). However, the number of row vectors is equal to the number of
    constraints. Thus, the rank of the rigidity matrix of MIWR graphs is of full row
    rank. Consequently, we can claim the following result:


    **Lemma 5.11** *For any MIWR graphs, $R_w$ is of full-row rank for all $t \geq
    0$ and the matrix $R_w R_w^\top$ is positive-definite.*


    **Theorem 5.11** *Let the desired formation be minimally infinitesimally weakly
    rigid (MIWR). Then, if the initial formation graph is close to the desired formation
    graph and agents are updated by (5.69), then the error $\tilde{e}$ converges to
    zero exponentially fast.*


    **Proof** Let us choose a Lyapunov candidate as $V(\tilde{e}(t)) = \frac{1}{2}
