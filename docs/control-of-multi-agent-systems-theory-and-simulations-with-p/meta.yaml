    $k$ people are infected. We also suppose that there is a blood test that can detect
    whether an individual is infected or not. It is obvious that we can exactly determine
    the infected people by examining all $n$ samples of blood. Group testing can decrease
    the number of tests by *mixing* some blood samples and examining the blood at
    once. Let us formulate this mathematically.


    Let $x = [x_1, x_2, \dots, x_n]^\top \in \{0, 1\}^n$ be an $n$-dimensional vector
    taking binary values of 0 and 1. We define $x_i = 1$ if the $i$-th individual
    is positive, and $x_i = 0$ if it is negative. The vector $x$ is unknown, and we
    find $x$ by group testing. The mixing procedure is defined as the inner product
    of $x$ and a *testing vector* $a \in \{0, 1\}^n$. The one-valued elements in $a$
    indicate which blood samples are tested. For example, if $x = [1, 1, 0, 0, 1,
    0]^\top$ and $a = [1, 1, 1, 0, 0, 0]^\top$, then we test the first three elements
    in $x$, and the result is


    $$\langle a, x \rangle = 2. \tag{6.10}$$


    This means that there are two positives among the first three individuals. Here,
    we assume the blood test is very precise so that the number of positives in mixed
    blood can be detected.


    Now, we do group testing $m$ times with testing vectors $a_j, j = 1, 2, \dots,
    m$. From the motivation of group testing, we take $m < n$. The results of group
    testing are given by


    $$b_j = \langle a_j, x \rangle, \quad j = 1, 2, \dots, m, \tag{6.11}$$


    which are observed. Define


    $$A \triangleq \begin{bmatrix} a_1^\top \ a_2^\top \ \dots \ a_m^\top \end{bmatrix}
    \in \mathbb{R}^{m \times n}, \quad b \triangleq \begin{bmatrix} b_1 \ b_2 \ \dots
    \ b_m \end{bmatrix} \in \mathbb{R}^m, \tag{6.12}$$


    then the problem of group testing is to find a binary vector $x \in \{0, 1\}^n$
    that satisfies $Ax = b$. The matrix $A$ is called the *testing matrix*, in the
    context of group testing, or called the *measurement matrix* in general cases,
    and the vector $b$ is called the *measurement vector*.


    In this formulation, we assume the matrix $A$ is fixed and has full row rank (i.e.,
    $\text{rank}(A) = m$). As shown in the numerical simulation below, we can define
    $A$ as a random binary matrix. Since $m < n$ and the matrix $A$ is a fat matrix,
    the problem is ill-posed and the equation $Ax = b$ has infinitely many solutions
    if $x$ is assumed a real-valued vector.


    The important point here is that there are just a few positives in $n$ individuals,
    or the number of positive elements in $x$ is small. Since $x$ is a binary vector,
    this means that the $\ell^1$ norm $\|x\|_1$ is much smaller than $n$. Taking account
    of this, we consider the following optimization problem:


    $$\min_{x \in \mathbb{R}^n} \|x\|_1 \quad \text{subject to} \quad Ax = b. \tag{6.13}$$'
