    # 4.8.2 LaSalle''s Invariance Principle


    Consider the system


    $$\dot{x}(t) = f(x(t)), \tag{4.51}$$


    where $x(t) \in \mathbb{R}^n$ is the state and $f : \mathbb{R}^n \to \mathbb{R}^n$
    is a function. Assume that the system has a unique solution on the time interval
    $[0, \infty)$ for each $x(0) \in \mathbf{X}$, where $\mathbf{X} \subseteq \mathbb{R}^n$
    is a set.


    For the system, a set $\mathbf{D} \subseteq \mathbf{X}$ is called the *invariant
    set* if


    $$x(t) \in \mathbf{D}, \quad \forall t \in \mathbb{R}_+ \tag{4.52}$$


    for any $x(0) \in \mathbf{D}$.


    LaSalle''s invariance principle is concerned with a kind of stability of the system
    in (4.51). The following result is a generalized version of LaSalle''s invariance
