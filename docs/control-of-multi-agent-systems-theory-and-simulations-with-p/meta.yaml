    ```

    1 import matplotlib.pyplot as plt

    2 import numpy as np

    3 # Parameters

    4 N = 100 # Number of agents

    5 lmbd = 2 # Transmission rate

    6 gamm = 1 # Recovery rate

    7 I0 = 10 # Initial number of I

