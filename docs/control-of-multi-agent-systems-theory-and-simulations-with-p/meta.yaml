    # 7.3.2 Viral Spreading over Random Networks


    Now, we discuss viral spreading models over random networks discussed above. In
    particular, there will be a few nodes, or agents, that have very high degrees
    in a scale-free network. Such people can contact many other agents and hence will
    be much more likely to be infected. Therefore, we distinguish nodes by their degrees
    and assume that nodes with the same degree are statistically equivalent. For this,
    we denote by $I_k$ and $S_k$ the numbers of infected and susceptible agents, or
    nodes, with degree $k$. We also denote by $N_k$ the number of all nodes with degree
    $k$, that is, we have


    $$I_k(t) + S_k(t) = N_k, \quad t \geq 0, \quad k = 1, 2, \ldots, \Delta, \tag{7.25}$$


    where $\Delta$ is the maximum degree. Let us consider a scale-free network with
    degree distribution $P(k)$, $k = 1, 2, \ldots, \Delta$. Then, the SI model for
    the nodes of degree $k$ over this network is given by


    $$\frac{dI_k(t)}{dt} = \lambda k S_k(t) \Theta(I(t)), \tag{7.26}$$


    where $I(t) \triangleq [I_1(t), I_2(t), \ldots, I_{\Delta}(t)]^\top$ and


    $$\Theta(I(t)) \triangleq \frac{1}{\langle k \rangle} \sum_{l=1}^{\Delta} l P(l)
    i_l(t), \tag{7.27}$$'
  merge: -1
  pgno: 230
- img_proc: true
  md: 'where $i_l(t) \triangleq I_l(t)/N_l, l = 1, 2, \ldots, \Delta$, and $\langle
    k \rangle$ is the *average degree* defined by


    $$\langle k \rangle \triangleq \sum_{k=1}^{\Delta} k P(k). \tag{7.28}$$


    To see the viral spreading phenomenon described by this model, we consider the
    characteristic time. The characteristic time for the SI model (7.26) is given
    by


    $$\tau_{\mathrm{SI}} = \frac{\langle k \rangle}{\lambda(\langle k^2 \rangle -
    \langle k \rangle)}. \tag{7.29}$$


    where $\langle k^2 \rangle$ is the second moment of the degree distribution $P(k)$
    of the network, that is,


    $$\langle k^2 \rangle = \sum_{k=1}^{\Delta} k^2 P(k). \tag{7.30}$$


    First, let us consider the Erdös–Rényi random graph model. It is shown that in
    the Erdös–Rényi random graph model, the following equality holds:


    $$\langle k^2 \rangle = \langle k \rangle (\langle k \rangle + 1). \tag{7.31}$$


    Then, the characteristic time is given by


    $$\tau_{\mathrm{SI}} = \frac{1}{\lambda \langle k \rangle}. \tag{7.32}$$


    That is, the characteristic time becomes short if the average degree $\langle
    k \rangle$ is large.


    Then, let us consider the scale-free network with the degree distribution (7.23).
    In particular, we consider $2 < \alpha \le 3$, which holds in many real networks.
    Then, it is easily shown that


    $$\langle k^2 \rangle \to \infty, \quad \text{as } N \to \infty, \tag{7.33}$$


    while $\langle k \rangle < \infty$ for the limiting case. Then, from (7.29), we
    have


    $$\tau_{\mathrm{SI}} \to 0, \quad \text{as } N \to \infty. \tag{7.34}$$


    This means that even if the transmission rate $\lambda$ is very small, the virus
    spreads immediately over a very large scale-free network. This is due to a few
    *hubs* that have a very large degree, which are sometimes called *super-spreaders*,
    through which the virus widely and quickly spreads over the scale-free network.'
