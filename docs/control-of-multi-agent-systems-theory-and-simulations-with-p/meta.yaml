    ### 1.4.1 图信号处理


    近年来，网络上的信号处理在信号处理领域得到了积极研究。这个主题通常被称为*图信号处理* [70, 71]。在常规信号处理中，我们考虑一个信号 $x[k],
    k = 0, 1, 2, \dots$，它定义在离散时间域 $\{0, 1, 2, \dots, N\}$ 上，如图 1.5a 所示。我们可以将这个域视为一个由节点
    $0, 1, 2, \dots, N$ 和有向边 $(k, k+1), k = 0, 1, 2, \dots, N-1$ 构成的网络或图。然后，在图信号处理中，信号被定义在一个通用的图上，如图
    1.5b 所示。这种推广催生了一个丰富的信号处理研究领域。例如，我们可以讨论网络上采样定理的广义版本 [78]。图信号的傅里叶变换、插值和滤波最近也得到了广泛研究。特别是，图信号的低通滤波已被证明在数学上与多智能体系统的共识控制相关
    [35]，这将在本书第 3 章中讨论。图信号处理也已应用于分布式传感器网络、图像和视频处理以及机器学习。


    ### 1.4.2 机器学习


    *深度神经网络*在机器学习领域得到了广泛研究 [27, 50]。深度神经网络是一种具有大量层的人工神经网络。深度神经网络由多层互连的节点组成，每一层执行特定的功能，如特征提取、转换或分类。深度神经网络使用大量数据进行训练，能够学习数据中的复杂模式和关系。深度神经网络在图像和语音识别、自然语言处理以及推荐系统中有广泛应用。它也已被应用于控制系统，例如参见
    [19]。


    *图神经网络*是一种用于处理图结构数据的深度学习模型 [87]。图神经网络的目标是学习数据的一种有效表示，以用于特定任务，如节点分类或图分类。上述图信号处理中的技术被用于其分析和设计。图神经网络已被证明对广泛的任务有效，并已应用于包括自然语言处理、化学和生物学在内的多个领域的问题。


    ### 1.4.3 分布式优化


    分布式优化旨在以分布式或去中心化的方式找到全局优化问题的最优解。在分布式优化中，多个智能体或本地计算机通过与相邻智能体交换关于本地解的信息，来最小化其自身的局部代价函数并满足局部约束。因此，分布式优化是在计算机网络中运行的。分布式优化的理论分析，例如收敛到全局解，其讨论方式与多智能体控制系统中的共识非常相似。分布式优化在传感器网络
    [74]、电力系统 [60] 和控制 [65] 中有广泛应用。


    本书第 6 章将讨论分布式优化。


    ### 1.4.4 布尔网络


    布尔网络是一种多智能体系统，其中每个节点具有二进制状态，即状态在每个时刻取二进制值（0 或 1）。一个例子如下：


    $$

    \begin{cases}

    x_1(t+1) = x_3(t) \wedge \bar{x}_4(t), \\

    x_2(t+1) = x_1(t), \\

    x_3(t+1) = \bar{x}_2(t) \vee x_1(t), \\

    x_4(t+1) = x_1(t),

    \end{cases}

    $$

    (1.1)


    其中 $x_i(t)$ 是节点 $i$ 的状态，取值为 0 或 1，即 $x_i(t) \in \{0, 1\}$，$\bar{x}_i(t)$ 表示 $x_i(t)$
    的否定，运算符 $\vee$ 和 $\wedge$ 分别是逻辑或和逻辑与。例如，从初始状态 $x_1(0) = x_2(0) = x_3(0) = x_4(0)
    = 0$ 开始，系统的演化过程为


    $$

    \begin{bmatrix} 0 \\ 0 \\ 0 \\ 0 \end{bmatrix} \to \begin{bmatrix} 0 \\ 0 \\ 1
    \\ 0 \end{bmatrix} \to \begin{bmatrix} 1 \\ 0 \\ 1 \\ 0 \end{bmatrix} \to \begin{bmatrix}
    1 \\ 1 \\ 1 \\ 1 \end{bmatrix} \to \begin{bmatrix} 0 \\ 1 \\ 1 \\ 1 \end{bmatrix}
    \to \cdots,

    $$

    (1.2)


    其中每个向量代表 $t = 0, 1, \ldots$ 时刻的 $[x_1(t)\ x_2(t)\ x_3(t)\ x_4(t)]^\top$。


    该模型由 Kauffman 于 1969 年提出 [38]，此后常被用于数字或具有数字行为的多智能体系统的分析和设计。特别是，它被认为是各种生物网络的良好近似模型
    [6,30]。


    对于布尔网络，主要关注点包括稳定性（吸引子的存在性）[7,9,10,24,45,53, 54,59,85]、可控性和可观性 [20,49,86] 以及控制综合
    [3,13, 44,46–48,86]。由于状态被限制为二进制，其方法与通常的系统（即具有连续值状态的系统）不同。此外，一些问题被归结为组合问题。因此，由于
    NP 难度 [4]，它们通常难以求解。


    ### 1.4.5 群体智能


    群体智能可以归类为受集体行为启发的优化技术 [77]，与多智能体系统的应用密切相关。然而，与共识算法不同，群体智能中没有特定的公式。文献 [40] 中引入的粒子群优化（PSO）通过基于局部最优值和全局最优值改变当前位置来搜索更优解
    [8]。由于 PSO 基于粒子间的交互迭代更新算法，它可以被视为一种多智能体系统算法。类似于 PSO，文献 [84] 提出了一种协作蝙蝠搜索算法（CBA）来解决优化问题。CBA
    使用交互项 $\Sigma_{j \in N_i} (v_j(k-1) - v_i(k-1))$ 更新速度；因此它是一种共识式的更新算法。最近，群体智能算法已被用于多无人机网络的定位
    [8] 和集群控制 [18]。


    群体智能算法可以被视为启发式优化技术。群体智能算法的具体设置各不相同；但我们可以将这些算法与共识、覆盖控制或编队控制算法结合，以获得更好的性能。


    ### 1.4.6 同步


    同步问题是多智能体系统理论中长期研究的一个课题。共识问题仅考虑相邻智能体之间的扩散耦合（即 $x_i - x_j$），而同步问题则考虑更复杂动力学中的状态一致性。通常很难清晰地区分共识和同步。从某种意义上说，同步问题比共识问题更一般化，但同步问题中使用了更多的耦合项或更多的状态信息（或输出测量）。如文献
    [56] 所分析，一个一般的线性系统（线性时不变系统）通过观察者类型的共识协议达到共识，这可以被视为更复杂的耦合（但不使用任何状态信息）。因此，共识和同步之间的界限并不清晰。文献
    [80] 分析了一组具有不同动力学的异构系统，使用了通用的局部控制器。他们为各个智能体使用了局部控制器，这些控制器利用耦合和输出测量。结果表明，当且仅当各个系统的模型嵌入了一个虚拟外系统的内部模型时，智能体才能达到同步。文献
    [41] 基于输出测量和输出共识，研究了一组不确定异构线性系统的同步问题。一组耦合振荡器网络（即通过相位角 $\theta_i - \theta_j$ 耦合）的同步问题也被解释为多智能体系统理论
    [23]。最近，文献 [43] 在平均动力学（或所谓的*混合动力学*）中分析了一组一般异构非线性智能体的同步问题。对于强耦合的一般异构非线性网络，他们分析指出，仅使用静态扩散型耦合
    $u_i = k \sum_{j=1}^N \alpha_{ij}(x_j - x_i)$，智能体就能达到平均动力学。混合动力学技术已被用于解决各种分布式优化问题
    [52]。关于同步问题的优秀综述，以及混合动力学的进一步应用（网络中智能体数量的估计、分布式最小二乘求解、分布式中位数求解、最优功率调度、分布式观察者以及边漏斗耦合），建议参考文献
    [51]。


    ## 1.5 总结


    在本章中，我们简要回顾了多智能体系统研究的最新进展。正如本章所示，多智能体系统在学术界和工业界的许多领域都有广泛应用。在本书中，我们特别关注多智能体系统的控制，正如本章所展示的，其应用也非常广泛。


    参考文献 [81,82] 是关于传感器网络的综述论文。书籍 [70] 对图信号处理理论进行了很好的介绍。参考文献 [17,75] 提供了集体行为仿真的初步公式，而
    [36,68] 是共识领域的知名论文。关于分布式编队控制的详细数学描述，建议参考文献 [2]。参考文献 [40,77,83] 对群体智能优化进行了很好的概述，参考文献
    [56,80] 则针对经典的同步问题，而参考文献 [43,52] 介绍了一般非线性动力学的共识式同步问题。强烈建议阅读文献 [51] 以获取关于同步问题的前沿知识。


