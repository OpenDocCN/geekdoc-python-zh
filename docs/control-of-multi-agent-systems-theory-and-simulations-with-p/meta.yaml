    的大小将严重依赖于 $n$。这可能导致当 $n$ 较大时收敛缓慢。考虑到这一事实，合理的选择是使用 $k_i([x_j(t) - x_i(t)]_{j \in
    \mathbf{N}_i(x(t))})$，使得 (4.28) 中的项 $\mathrm{mass}(\mathbf{C}_i(x))$ 被消去，例如


