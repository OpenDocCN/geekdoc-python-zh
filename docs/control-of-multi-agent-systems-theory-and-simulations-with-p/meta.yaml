    as $t \to \infty$:*


    *   *for each $x(0) \in \mathbf{D}$, the system has a unique solution on the time
    interval $[0, \infty)$.*

    *   *$\mathbf{D}$ is an invariant set of the system (see Appendix 4.8.2 for invariant
    sets).*

    *   *there exists no $x(0) \in \mathbf{D}$ such that $x(t)$ converges to the set
    $\mathrm{cl}(\mathbf{D}) \setminus \mathbf{D}$ as $t \to \infty$.*


    **Proof** This fact is a consequence of LaSalle''s invariance principle in Lemma
    4.13 in Appendix 4.8.1.


    Let $V(x) \triangleq J(x)$. Since $K(x)$ is positive-definite on $\mathbf{X}$,
    (4.17) provides


    $$\dot{V}(x) = \left(\frac{\partial J}{\partial x}(x)\right)^\top \left(-K(x)\frac{\partial
