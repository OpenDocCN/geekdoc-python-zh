    ## 4.3.3 定理 4.1 的证明


    首先，我们证明如果系统位于 $\mathbf{Q}^n \setminus \mathbf{S}$ 的边界或其邻域内，系统将向 $\mathbf{Q}^n$
    的内部演化。


    考虑集合 $\mathbf{Q} \subset \mathbb{R}^m$ 和 $n$ 个不同的点 $x_i \in \mathbf{Q}$（$i = 1,
    2, \dots, n$）的 Voronoi 图 $\{\mathbf{C}_1(x), \mathbf{C}_2(x), \dots, \mathbf{C}_n(x)\}$。对于一个可积函数
    $\psi : \mathbf{Q} \times \mathbb{R}_{0+} \to \mathbb{R}_{0+}$，令


    $$\text{gmass}_{\psi}(\mathbf{C}_i(x), x_i) \triangleq \int_{\mathbf{C}_i(x)}
    \psi(q, \|q - x_i\|) dq \qquad (4.32)$$


    和


    $$\text{gcent}_{\psi}(\mathbf{C}_i(x), x_i) \triangleq \frac{1}{\text{gmass}_{\psi}(\mathbf{C}_i(x),
    x_i)} \int_{\mathbf{C}_i(x)} q \psi(q, \|q - x_i\|) dq. \qquad (4.33)$$


    这些是 (4.10) 和 (4.11) 中函数“mass”和“cent”的广义版本。根据 $\text{gmass}_{\psi}$、$\text{gcent}_{\psi}$
    和 Voronoi 图的定义（特别是 $\mathbf{C}_i(x)$ 具有非零测度），如果对于几乎所有 $q \in \mathbf{Q}$ 有 $\psi(q,
    \|q - x_i\|) > 0$，那么显然有


    $$\text{gmass}_{\psi}(\mathbf{C}_i(x), x_i) > 0, \quad \text{gcent}_{\psi}(\mathbf{C}_i(x),
    x_i) \in \text{int}(\mathbf{C}_i(x)) \qquad (4.34)$$


    成立。


    **引理 4.9** *考虑 (4.5) 中的目标函数 $J$。假设 $m = 2$，$\mathbf{Q}$ 是一个有界多面体，且 $h$ 在 $\mathbb{R}_{0+}$
    上连续可微。那么对于 $\mathbf{Q}^n \setminus \mathbf{S}$，有*


    $$\frac{\partial J}{\partial x_i}(x) = \text{gmass}_{\psi}(\mathbf{C}_i(x), x_i)
    \left( x_i - \text{gcent}_{\psi}(\mathbf{C}_i(x), x_i) \right) \qquad (4.35)$$


    其中


    $$\psi(q) \triangleq \frac{\partial h}{\partial r}(\|q - x_i\|) \frac{1}{\|q -
    x_i\|} \phi(q). \qquad (4.36)$$


    **证明** *由于对于几乎所有 $q \in \mathbf{C}_i(x)$ 有 $\|q - x_i\| \neq 0$，并且对于每个 $q \in
    \mathbf{C}_i(x)$，$(\partial h / \partial r)(\|q - x_i\|)$ 是有限的，我们通过将 (4.32)、(4.33)
    和 (4.36) 应用于 (4.16) 得到 (4.35)，即*


    $$\begin{aligned} \int_{\mathbf{C}_i(x)} \frac{\partial}{\partial x_i} h(\|q -
    x_i\|) \phi(q) dq &= \int_{\mathbf{C}_i(x)} -\frac{\partial h}{\partial r}(\|q
    - x_i\|) \frac{(q - x_i)}{\|q - x_i\|} \phi(q) dq \\ &= \int_{\mathbf{C}_i(x)}
    -(q - x_i) \psi(q, \|q - x_i\|) dq \end{aligned}$$


    $$= \int_{\mathbf{C}_i(x)} x_i \psi(q, \|q - x_i \|) dq - \int_{\mathbf{C}_i(x)}
    q \psi(q, \|q - x_i \|) dq$$

    $$= \text{gmass}_{\psi}(\mathbf{C}_i(x), x_i) x_i - \text{gmass}_{\psi}(\mathbf{C}_i(x),
    x_i) \text{gcent}_{\psi}(\mathbf{C}_i(x), x_i)$$

    $$= \text{gmass}_{\psi}(\mathbf{C}_i(x), x_i) \left( x_i - \text{gcent}_{\psi}(\mathbf{C}_i(x),
    x_i) \right).$$


    因此，在引理 4.9 的条件下，(4.22) 中的覆盖控制器表示为


    $$u_i(t) = -k_i \left( [x_j(t) - x_i(t)]_{j \in \mathbf{N}_i(x(t))} \right) \text{gmass}_{\psi}(\mathbf{C}_i(x(t)),
    x_i(t))$$

    $$\quad \times \left( x_i(t) - \text{gcent}_{\psi}(\mathbf{C}_i(x(t)), x_i(t))
    \right) \tag{4.37}$$


    **引理 4.10** 考虑由 (4.21) 和 (4.22) 给出的多智能体系统（其中 $m = 2$）。假设定理 4.1 中的 (a) 和 (c) 成立，并且（在
    (a) 下）$\mathbf{Q}$ 由下式给出


    $$\mathbf{Q} = \{q \in \mathbb{R}^2 : Cq + d \leq 0\} \tag{4.38}$$


    其中 $C \in \mathbb{R}^{\ell \times 2}$ 是某个矩阵，$d \in \mathbb{R}^{\ell}$ 是某个向量。进一步假设
    $h$ 在 $\mathbb{R}_{0+}$ 上连续可微。对于 $x = (x_1, x_2, \ldots, x_n) \in \mathbf{Q}^n$
    和 $(i, j) \in \{1, 2, \ldots, n\} \times \{1, 2, \ldots, \ell\}$，令


    $$y_j(x_i) \triangleq C_j x_i + d_j \tag{4.39}$$


    和


    $$\mathbf{L}(x) \triangleq \{(i, j) \in \{1, 2, \ldots, n\} \times \{1, 2, \ldots,
    \ell\} : y_j(x_i) = 0\}, \tag{4.40}$$


    其中 $C_j$ 和 $d_j$ 分别是 $C$ 的第 $j$ 行向量和 $d$ 的第 $j$ 个元素。此外，令


    $$\dot{y}_j(x_i, x) \triangleq \frac{\partial y_j}{\partial x_i}(x_i) \dot{x}_i.
    \tag{4.41}$$


    对于每个 $\hat{x} = (\hat{x}_1, \hat{x}_2, \ldots, \hat{x}_n) \in \text{bd}(\mathbf{Q}^n)
    \setminus \mathbf{S}$，存在一个正数 $r \in \mathbb{R}_+$，使得对于任何 $x \in \mathbf{B}(\hat{x},
    r) \cap (\mathbf{Q}^n \setminus \mathbf{S})$，有


    $$\dot{y}_j(x_i, x) < 0 \quad \forall (i, j) \in \mathbf{L}(\hat{x}) \tag{4.42}$$'
