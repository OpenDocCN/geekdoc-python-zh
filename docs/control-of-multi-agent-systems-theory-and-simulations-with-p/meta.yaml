    $$\begin{aligned} \frac{\partial J}{\partial x_i}(x) &= \int_{\mathbf{C}_i(x)}
    \frac{\partial}{\partial x_i} \|q - x_i\|^2 \phi(q) dq \ &= \int_{\mathbf{C}_i(x)}
    -2(q - x_i) \phi(q) dq \ &= \int_{\mathbf{C}_i(x)} 2x_i \phi(q) dq - \int_{\mathbf{C}_i(x)}
    2q \phi(q) dq \ &= 2x_i \mathrm{mass}(\mathbf{C}_i(x)) - 2 \mathrm{mass}(\mathbf{C}_i(x))
    \mathrm{cent}(\mathbf{C}_i(x)) \ &= 2 \mathrm{mass}(\mathbf{C}_i(x)) \left(x_i
    - \mathrm{cent}(\mathbf{C}_i(x))\right) \tag{4.27} \end{aligned}$$


    on $x \in \mathbf{Q}^n \setminus \mathbf{S}$. This completes the proof. $\square$


    From Lemmas 4.8 and (4.22), we have the following coverage controller:


    $$u_i(t) = -2k_i([x_j(t) - x_i(t)]_{j \in \mathbf{N}_i(x(t))}) \mathrm{mass}(\mathbf{C}_i(x(t)))
    \left(x_i(t) - \mathrm{cent}(\mathbf{C}_i(x(t)))\right). \tag{4.28}$$


    A remaining issue is how to determine the gain $k_i([x_j(t) - x_i(t)]_{j \in \mathbf{N}_i(x(t))})$.
    A reasonable choice is as follows: It is clear from (4.10) and the definition
    of Voronoi diagrams that $\mathrm{mass}(\mathbf{C}_i(x))$ tends to decrease as
    the number $n$ of agents increases. Thus, if a constant is set to $k_i([x_j(t)
    - x_i(t)]_{j \in \mathbf{N}_i(x(t))})$, the magnitude of $u_i(t)$ heavily depends
    on $n$. This may result in slow convergence for a large $n$. By considering this
    fact, it is reasonable to use $k_i([x_j(t) - x_i(t)]_{j \in \mathbf{N}_i(x(t))})$
    so that the term $\mathrm{mass}(\mathbf{C}_i(x))$ is canceled out in (4.28), e.g.,


    $$k_i([x_j(t) - x_i(t)]_{j \in \mathbf{N}_i(x(t))}) = \frac{k}{2\mathrm{mass}(\mathbf{C}_i(x(t)))}
    \tag{4.29}$$


