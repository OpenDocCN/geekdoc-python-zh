    Next, let us introduce the notions of the *mass* and *centroid* for the Voronoi
    cells. Suppose that an integrable function $\phi : \mathbf{Q} \to \mathbb{R}_{0+}$
    is given. This can be considered as the utility of the location $q \in \mathbf{Q}$.
    Then, for the Voronoi cell $\mathbf{C}_i(x)$ and function $\phi$, let


    $$\text{mass}(\mathbf{C}_i(x)) \triangleq \int_{\mathbf{C}_i(x)} \phi(q) dq \qquad
    (4.10)$$


    and


    $$\text{cent}(\mathbf{C}_i(x)) \triangleq \frac{1}{\text{mass}(\mathbf{C}_i(x))}
    \int_{\mathbf{C}_i(x)} q \phi(q) \, dq. \qquad (4.11)$$


    If we consider $\mathbf{C}_i(x)$ as a rigid body with density $\phi$, the former
    and latter correspond to the mass and the centroid of the body, respectively.
    The former is called the *mass*'
