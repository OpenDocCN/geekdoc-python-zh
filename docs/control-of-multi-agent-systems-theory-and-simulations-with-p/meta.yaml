    # 6.3.1 Gradient Descent Algorithm


    Here, we consider an unconstrained optimization problem with $\mathbf{C} = \mathbb{R}^n$,
    namely, we solve


    $$\minimize_{x \in \mathbb{R}^n} f(x).$$


    It is easily shown that if $\bar{x} \in \mathbb{R}^n$ is a local minimizer of
    $f$, then


    $$\nabla f(\bar{x}) = 0$$


    holds. Therefore, to find a solution to (6.16), we just need to seek $\bar{x}$
    that satisfies (6.17). Such a point is called a *stationary point*. However, in
    many cases, it is impossible to obtain a closed-form solution for the stationary
    point that satisfies (6.17), and hence we need an algorithm to find a stationary
    point of $f$ *numerically*. The *gradient descent algorithm* is the most widely
    used algorithm for this purpose. The algorithm is an iterative algorithm given
    by


    $$x[k+1] = x[k] - \alpha_k \nabla f(x[k]), \quad k = 0, 1, 2, \dots,$$


    where $\alpha_k \in \mathbb{R}$ is the *step size* of this algorithm that should
    be carefully chosen. A well-used method to find $\alpha_k$ at each step is the
    *line search*, that minimizes the cost function $f$ along the line $\{x[k] - \alpha
    \nabla f(x[k]) : \alpha \geq 0\} \subset \mathbb{R}^n$. More precisely, the step
    size $\alpha_k$ is chosen such that


    $$\alpha_k = \arg \min_{\alpha \geq 0} f(x[k] - \alpha \nabla f(x[k])).$$


    It is often difficult to solve the minimization problem in (6.19), and the following
    approximation methods are widely used instead of the exact line search:


