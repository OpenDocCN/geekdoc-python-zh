- md: '## 3.3 Discrete-Time Case


    Now, we address consensus control in the discrete-time domain. Consider a multi-agent
    system, where agent $i$ is a discrete-time integrator:


    $$x_i[k+1] = x_i[k] + u_i[k], \tag{3.27}$$


    where $k \in \{0, 1, \dots\}$ is the discrete time, and $x_i[k] \in \mathbb{R}$
    and $u_i[k] \in \mathbb{R}$ are the state and the input, respectively. The relative-state-based
    controller is given by


    $$u_i[k] = \varepsilon \sum_{j \in \mathbf{N}_i} (x_j[k] - x_i[k]), \tag{3.28}$$


    where $\mathbf{N}_i$ is the set of neighbors of agent $i$ and $\varepsilon \in
    \mathbb{R}_+$ is the step size, which is, as detailed later, usually selected
    so that


    $$\varepsilon \Delta < 1 \tag{3.29}$$


    **Example 3.6** Consider the multi-agent system given by (3.27) and (3.28), where
    $n = 6$, $\mathbf{N}_1 = \{2\}$, $\mathbf{N}_2 = \{3, 5\}$, $\mathbf{N}_3 = \{4\}$,
    $\mathbf{N}_4 = \{1, 2\}$, $\mathbf{N}_5 = \{6\}$, $\mathbf{N}_6 = \{2\}$, and
    $\varepsilon = 0.4$. In this case, $\Delta = 2$ and thus $\varepsilon \Delta =
    0.8$, i.e., (3.29) holds. The network structure is illustrated in Fig. 3.1a. This
    is the discrete-time version of the system in Example 3.2.


    Figure 3.7 depicts the state evolution by Python Code 3.2 (see Sect. 3.5.2) for
    the initial states $x_1[0] = -1$, $x_2[0] = 2$, $x_3[0] = 6$, $x_4[0] = 3$, $x_5[0]
    = -3$, and $x_6[0] = 1$, which shows that the system achieves consensus by the
    discrete-time controllers. $\square$


    **Example 3.7** Consider the modified version of the multi-agent system in Example
    3.6, where $\mathbf{N}_2 = \{3\}$, $\mathbf{N}_6 = \emptyset$, and the others
    are the same as Example 3.6. This is the discrete-time version of the system in
    Example 3.3.


    Figure 3.8 shows the state evolution for the same initial states as Example 3.3.
    A similar result is obtained in discrete time to the case of Example 3.3. $\square$


    In a similar way to the continuous-time case, a consensus condition can be obtained
    by analyzing the collective dynamics. Let $x[k] \in \mathbb{R}^n$ and $u[k] \in
    \mathbb{R}^n$ be the collective state and input, respectively. Then the collective
    dynamics of the multi-agent system is given by


    $$x[k + 1] = Px[k], \tag{3.30}$$


    where $P \in \mathbb{R}^{n \times n}$ is the Perron matrix defined in (2.80) for
    the graph Laplacian $L$ and step size $\varepsilon$. If (3.29) holds for the maximum
    in-degree $\Delta$ of $G$, all eigenvalues of $P$ are in a closed unit circle
    in the complex plane as shown in Theorem 2.20 (ii).


    From (3.30), a discrete-time version of Theorem 3.1 is obtained as follows:


    **Theorem 3.2** Consider the multi-agent system given by (3.27) and (3.28). If
    (3.29) holds, the following statements hold:


    (i) The system achieves consensus if and only if $G$ has a spanning tree.

    (ii) If the system achieves consensus, the consensus value is given by


    $$\alpha = \frac{w_1 x[0]}{w_1 \mathbf{1}_n}, \quad (3.31)$$


    where $w_1 \in \mathbb{R}^{1 \times n}$ is a left eigenvector of $P$ associated
    with the eigenvalue 1. Moreover, if $G$ is balanced, the system achieves average
    consensus.


    **Proof** If (3.29) holds and $G$ has a spanning tree, we have


    $$\lim_{k \to \infty} x[k] = \lim_{k \to \infty} P^k x[0] = \left( \frac{1}{w_1
    \mathbf{1}_n} \right) \mathbf{1}_n w_1 x[0] = \left( \frac{w_1 x[0]}{w_1 \mathbf{1}_n}
    \right) \mathbf{1}_n \quad (3.32)$$


    from (ii) of Theorem 2.22. This proves the sufficiency of (i) and the former of
    (ii).

    The necessity of (i) is proven in a similar way to the proof of Theorem 3.1 (i).
    The Perron matrix $P$ has the eigenvalue 1 of algebraic multiplicity more than
    one, which is semi-simple. Therefore, there exists an eigenvector $q \in \mathbb{R}^n$
    associated with the eigenvalue 1 such that $q$ and $\mathbf{1}_n$ are linearly
    independent. Since $Pq = q$, $q$ is an equilibrium of the system in (3.30). Thus
    $\lim_{k \to \infty} x[k] = q \notin \text{span}(\mathbf{1}_n)$ for $x[0] = q$,
    which implies that the system does not achieve consensus.

    Finally, the latter of (ii) is proven in the same way as the corresponding part
    of Theorem 3.1, with the fact that $w_1$ is also a left eigenvector of $L$ associated
    with its zero eigenvalue. $\square$


    Except for the condition in (3.29), we obtain a similar consequence to the continuous-time
    case in discrete time. In particular, it is remarked that the consensus value
    in (3.31) is equal to the consensus value in (3.20), because $w_1$ is equal to
    a left eigenvector $v_1$ of $L$ associated with its zero eigenvalue.


    **Example 3.8** Consider the multi-agent system in Example 3.6, whose network
    structure has a spanning tree shown in Fig. 3.1. Therefore, the system achieves
    consensus from Theorem 3.2 (i). On the other hand, the consensus value is calculated
    as follows: From (3.30), the collective dynamics is given by


    $$x[k+1] = Px[k] = \begin{bmatrix} 1-\varepsilon & 1+\varepsilon & 0 & 0 & 0 &
    0 \\ 0 & 1-2\varepsilon & 1+\varepsilon & 0 & 1+\varepsilon & 0 \\ 0 & 0 & 1-\varepsilon
    & 1+\varepsilon & 0 & 0 \\ 1+\varepsilon & 1+\varepsilon & 0 & 1-2\varepsilon
    & 0 & 0 \\ 0 & 0 & 0 & 0 & 1-\varepsilon & 1+\varepsilon \\ 0 & 1+\varepsilon
    & 0 & 0 & 0 & 1-\varepsilon \end{bmatrix} x[k] = \begin{bmatrix} 0.6 & 1.4 & 0
    & 0 & 0 & 0 \\ 0 & 0.2 & 1.4 & 0 & 1.4 & 0 \\ 0 & 0 & 0.6 & 1.4 & 0 & 0 \\ 1.4
    & 1.4 & 0 & 0.2 & 0 & 0 \\ 0 & 0 & 0 & 0 & 0.6 & 1.4 \\ 0 & 1.4 & 0 & 0 & 0 &
    0.6 \end{bmatrix} x[k].$$


    Since $[1\ 2\ 2\ 1\ 2\ 2]$ is a left eigenvector of $P$ associated with its eigenvalue
    1, we have


    $$\alpha = \frac{(1 \times (-1)) + (2 \times 2) + (2 \times 6) + (1 \times 3)
    + (2 \times (-3)) + (2 \times 1)}{1 + 2 + 2 + 1 + 2 + 2} = 1.4$$


    from (3.31). This analysis agrees with the result in Example 3.6. $\square$


    For the case of undirected networks, we obtain the following result:


    **Corollary 3.2** *Consider the multi-agent system in Theorem 3.2. If (3.29) holds
    and $G$ is an undirected network, the following statements hold:*


    *(i) The system achieves average consensus if and only if $G$ is connected.*

    *(ii) If the system achieves consensus, the consensus value is given by (3.21),
    i.e., the system achieves average consensus.* $\square$


    ## 3.4 Performance of Consensus Controllers


    The convergence speed to consensus is one of the performance indices of multi-agent
    systems. In this section, we analyze the convergence speed of the multi-agent
    systems'
  mdcn: '## 3.3 离散时间情形


    现在，我们讨论离散时间域中的共识控制。考虑一个多智能体系统，其中智能体 $i$ 是一个离散时间积分器：


    $$x_i[k+1] = x_i[k] + u_i[k], \tag{3.27}$$


    其中 $k \in \{0, 1, \dots\}$ 是离散时间，$x_i[k] \in \mathbb{R}$ 和 $u_i[k] \in \mathbb{R}$
    分别是状态和输入。基于相对状态的控制器由下式给出：


    $$u_i[k] = \varepsilon \sum_{j \in \mathbf{N}_i} (x_j[k] - x_i[k]), \tag{3.28}$$


    其中 $\mathbf{N}_i$ 是智能体 $i$ 的邻居集合，$\varepsilon \in \mathbb{R}_+$ 是步长，如后文详述，通常选择使得


    $$\varepsilon \Delta < 1 \tag{3.29}$$


    **例 3.6** 考虑由 (3.27) 和 (3.28) 给出的多智能体系统，其中 $n = 6$，$\mathbf{N}_1 = \{2\}$，$\mathbf{N}_2
    = \{3, 5\}$，$\mathbf{N}_3 = \{4\}$，$\mathbf{N}_4 = \{1, 2\}$，$\mathbf{N}_5 = \{6\}$，$\mathbf{N}_6
    = \{2\}$，且 $\varepsilon = 0.4$。在此情况下，$\Delta = 2$，因此 $\varepsilon \Delta = 0.8$，即
    (3.29) 成立。网络结构如图 3.1a 所示。这是例 3.2 中系统的离散时间版本。


    图 3.7 描绘了由 Python 代码 3.2（见第 3.5.2 节）得到的初始状态 $x_1[0] = -1$，$x_2[0] = 2$，$x_3[0]
    = 6$，$x_4[0] = 3$，$x_5[0] = -3$，$x_6[0] = 1$ 下的状态演化，这表明系统通过离散时间控制器实现了共识。$\square$


    **例 3.7** 考虑例 3.6 中多智能体系统的修改版本，其中 $\mathbf{N}_2 = \{3\}$，$\mathbf{N}_6 = \emptyset$，其余与例
    3.6 相同。这是例 3.3 中系统的离散时间版本。


    图 3.8 显示了与例 3.3 相同初始状态下的状态演化。在离散时间下得到了与例 3.3 类似的结果。$\square$


    与连续时间情形类似，可以通过分析集体动力学来获得共识条件。令 $x[k] \in \mathbb{R}^n$ 和 $u[k] \in \mathbb{R}^n$
    分别为集体状态和输入。则多智能体系统的集体动力学由下式给出：


    $$x[k + 1] = Px[k], \tag{3.30}$$


    其中 $P \in \mathbb{R}^{n \times n}$ 是针对图拉普拉斯 $L$ 和步长 $\varepsilon$ 在 (2.80) 中定义的
