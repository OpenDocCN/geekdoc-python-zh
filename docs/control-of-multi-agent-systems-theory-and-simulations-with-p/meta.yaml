  md: 'Defining matrix $A$ and vector $b$ by


    $$A \triangleq \begin{bmatrix} 1 & 2 \ 3 & 9 \end{bmatrix}, \quad b \triangleq
    \begin{bmatrix} 1 \ 4 \end{bmatrix}, \tag{2.2}$$


    Eq.(2.1) can be described as $Ax = b$ where $x \in \mathbb{R}^2$ is the variable
    to be solved. Defining the matrix and the vector in Python is simply done by


    ```

    A = np.array([[1, 2], [3, 9]])

    b = np.array([1, 4])

    ```


    The function `array` in the NumPy package defines matrices and vectors. To define
    a matrix, use a nested list of numbers as above. Then, to solve (2.1) for $x$,
    we do


    ```

    x = np.linalg.solve(A, b)

    print(x)

    ```


    Here, we use the function `solve` in the `linalg` submodule in Numpy. This program
    returns [0.33333333 0.33333333], which is a numerical result of [1/3, 1/3]. We
    implicitly add the following line before printing the numerical result:


    ```

    np.set_printoptions(precision=2)

    ```


    The function `set_printoptions` sets the floating point precision to 2 by setting
    the `precision` parameter to be equal to 2. Then, 0.33333333 will be displayed
    as 0.33. Since we often use functions in the `linalg` submodule, we can previously
    import this submodule as


    ```

    import numpy.linalg as LA

    ```


    Please make sure you add this line in the top of your program. Then, we can simply
    write


    ```

    x = LA.solve(A, b)

    print(x)

    ```


    The inverse matrix of $A$ can be easily computed by


    ```

    A_inv = LA.inv(A)

    print(A_inv)

    ```'
