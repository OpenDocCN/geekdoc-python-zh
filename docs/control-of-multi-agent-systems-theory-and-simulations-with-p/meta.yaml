    # 3.6 Summary


    In this chapter, we have introduced a basic framework of consensus control. In
    particular, we have focused on the integrator agents and the consensus controllers
    based on the sum of its relative states with respect to the neighbors. We have
    seen its convergence property, which is characterized by the network topology
    of the system to be considered. In addition, the discrete-time case has been addressed,
    where all the results are similar to the continuous-time case with a few exceptions.


    For a comprehensive introduction to consensus control and related issues, we recommend
    the books [1,2] and expository articles [3,4]. Although we have focused on the
    most fundamental framework in this chapter, the topic has been extended in several
    directions. For example, we can find cases for a more general consensus value
    in [5,6] and those on time-varying networks in [5,7–9]. It is also interesting
    to see the results for quantized interaction, e.g., in [10,11], and those with
    malicious agents, e.g., in [6].


