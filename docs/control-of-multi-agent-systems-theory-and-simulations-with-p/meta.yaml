    Based on this discussion, the following result is obtained:


    **Theorem 3.1** Consider the multi-agent system given by (3.10) and (3.11). The
    following statements hold.


    (i) The system achieves consensus if and only if $G$ has a spanning tree.

    (ii) If the system achieves consensus, the consensus value is given by


    $$\alpha = \frac{v_1x(0)}{v_1\mathbf{1}_n}, \tag{3.20}$$


    where $v_1 \in \mathbb{R}^{1 \times n}$ is the left eigenvector of $L$ associated
    with its zero eigenvalue. Moreover, if $G$ is a balanced network, then


    $$\alpha = \frac{1}{n} \sum_{i=1}^n x_i(0), \tag{3.21}$$


    *i.e.*, the system achieves average consensus.


    **Proof** The remaining part is to prove:


    (a) The system does not achieve consensus if $G$ has no spanning tree,

    (b) Equation (3.21) holds if $G$ is balanced.


    (a) Assume that $G$ has no spanning tree. From Theorem 2.21, the graph Laplacian
    $L$ has a zero eigenvalue of algebraic multiplicity more than one, which is semi-simple.
    Therefore, there exists an eigenvector $q \in \mathbb{R}^n$ associated with the
    zero eigenvalue such that $q$ and $\mathbf{1}_n$ are linearly independent ($q
    \notin \text{span}(\mathbf{1}_n)$). Since $Lq = 0$ by the definition of $q$, $q$
    is an equilibrium of the system in (3.16). Thus $\lim_{t \to \infty} x(t) = q$
    for $x(0) = q$ and then $q \notin \text{span}(\mathbf{1}_n)$, which implies that
    the system does not achieve consensus.


    (b) If $G$ is balanced, then $v_1 \in \text{span}(\mathbf{1}_n)$ from Theorem
    2.19. This fact and (3.20) imply (3.21).


