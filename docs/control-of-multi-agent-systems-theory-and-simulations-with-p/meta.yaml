    Here, we present a solution to the coverage problem for the most fundamental case.


    # 4.3.1 Gradient Systems


    Gradient systems play an important role for realizing coverage control. We first
    review gradient systems and their stability.


    Consider an open set $\mathbf{X} \subset \mathbb{R}^n$. A gradient system [3]
    on $\mathbf{X}$ is given by


    $$\dot{x}(t) = -K(x(t))\frac{\partial J}{\partial x}(x(t)), \quad (4.17)$$


