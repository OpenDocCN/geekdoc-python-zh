    algebra and graph theory. They will be used in the following chapters. We have
    provided Python codes for some important computations in linear algebra and graph
    theory. In particular, the eigenvalues of the graph Laplacian and the Perron matrix
    play a very important role in controlling multi-agent systems, for which NumPy
