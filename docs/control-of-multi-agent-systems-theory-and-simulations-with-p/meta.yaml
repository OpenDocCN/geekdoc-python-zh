    Now, we address consensus control in the discrete-time domain. Consider a multi-agent
    system, where agent $i$ is a discrete-time integrator:


    $$x_i[k+1] = x_i[k] + u_i[k], \tag{3.27}$$


    where $k \in \{0, 1, \dots\}$ is the discrete time, and $x_i[k] \in \mathbb{R}$
    and $u_i[k] \in \mathbb{R}$ are the state and the input, respectively. The relative-state-based
    controller is given by


    $$u_i[k] = \varepsilon \sum_{j \in \mathbf{N}_i} (x_j[k] - x_i[k]), \tag{3.28}$$


    where $\mathbf{N}_i$ is the set of neighbors of agent $i$ and $\varepsilon \in
    \mathbb{R}_+$ is the step size, which is, as detailed later, usually selected
    so that


    $$\varepsilon \Delta < 1 \tag{3.29}$$'
