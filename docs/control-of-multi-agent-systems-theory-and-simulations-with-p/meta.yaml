    # 2.1.4 Numerical Computation with Python


    Python can do more things. For the purpose of this textbook, we here show some
    simple numerical computation examples with Python.


    # Packages


    We first import useful packages for numerical computation. We use the function
    `import` to do this. The following program imports the packages:


    ```

    import numpy as np

    import matplotlib.pyplot as plt

    ```


    The NumPy$^2$ package is useful for numerical computations like the inner product
    of two vectors and the multiplication of two matrices [5]. The package uses the
    well-known linear algebra libraries of Basic Linear Algebra Subprograms (BLAS)
    and Linear Algebra Package (LAPACK) which are the most reliable libraries for
    numerical computation [10].


    The Matplotlib$^3$ is a comprehensive library for creating static, animated, and
    interactive visualizations in Python. In particular, we will often use the `pyplot`
    submodule for plotting beautiful graphs.


    # Matrices and Vectors


    First, let us consider a system of linear equations:


    $$x + 2y = 1$$

    $$3x + 9y = 4.$$'
