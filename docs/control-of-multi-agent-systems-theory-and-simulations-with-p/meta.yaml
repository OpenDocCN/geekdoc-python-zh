    Consider a multi-agent system given by (3.10) and (3.11). We assume that $G$ is
    a connected undirected network. Then the graph Laplacian $L$ is symmetric with
    $n$ real eigenvalues which can be ordered as


    $$0 = \lambda_1 < \lambda_2 \le \cdots \le \lambda_n. \tag{3.34}$$


    The second smallest eigenvalue $\lambda_2$, which is nonzero for a connected $G$,
    is called the *algebraic connectivity* of the network. The algebraic connectivity
    is a measure of how well connected the graph $G$ is. For example, consider the
    network in Fig. 3.5 denoted by $G = (\mathbf{V}, \mathbf{E})$, and two modified
    versions of $G$:


    $$G_1 = (\mathbf{V}, \mathbf{E} \cup \{(1, 6), (6, 1), (3, 5), (5, 3)\}),$$

    $$G_2 = (\mathbf{V}, \mathbf{E} \setminus \{(2, 5), (5, 2)\}).$$


    Their connections are, respectively, more dense and more sparse than the original,
    which is reflected by the magnitude of algebraic connectivity as follows:


    $$G : \lambda_2 = 1,$$

    $$G_1 : \lambda_2 = 1.382,$$

    $$G_2 : \lambda_2 = 0.486.$$


    Now, we show that the convergence speed is characterized by the algebraic connectivity
    $\lambda_2$. For the network $G$, the system achieves the consensus at a consensus
    value $\alpha$. For quantifying the deviation from the consensus, we introduce


    $$e(t) \triangleq x(t) - \alpha \mathbf{1}_n, \tag{3.35}$$


    which is called the *disagreement vector*. Since $\dot{x}(t) = \dot{e}(t)$ and
    $-Lx(t) = -L(e(t) + \alpha \mathbf{1}_n) = -Le(t) - \alpha L\mathbf{1}_n = -Le(t)$,
    the dynamics of $e(t)$ is given by


    $$\dot{e}(t) = -Le(t). \tag{3.36}$$


    Then the following result presents the convergence speed to consensus:


    **Theorem 3.3** *Consider the multi-agent system given by (3.10) and (3.11). Assume
    that $G$ is a connected undirected network, and let $\lambda_2 \in \mathbb{R}_+$
    be the algebraic connectivity of $G$. Then*


    $$\|e(t)\| \le \|e(0)\|e^{-\lambda_2 t}, \tag{3.37}$$


    *i.e., the system achieves consensus exponentially with a speed that is faster
    than or equal to $\lambda_2$.*'
