- md: '## Mathematical Symbols


    $\mathbb{Z}$ The set of integers

    $\mathbb{R}$ The set of real numbers

    $\mathbb{N}$ The set of natural numbers including 0, that is, $\mathbb{N} = \{0,
    1, 2, \dots\}$

    $\mathbb{C}$ The set of complex numbers

    $\mathbb{R}_+$ The set of positive numbers

    $\mathbb{R}_{0+}$ The set of non-negative numbers

    j The imaginary number

    $|z|$ The absolute value of $z \in \mathbb{C}$

    $\text{Re}(z)$ The real part of $z \in \mathbb{C}$

    $\text{Im}(z)$ The imaginary part of $z \in \mathbb{C}$

    $\emptyset$ The empty set

    $\mathbf{S}^{m \times n}$ The set of $m \times n$ matrices whose elements are
    in a set $\mathbf{S}$

    $\mathbf{S}^n$ The set of $n$-dimensional vectors whose elements are in a set
    $\mathbf{S}$

    $\mathbf{S}^\infty$ The set of sequences $(x_1, x_2, \dots)$ with $x_i \in \mathbf{S}$,
    $i = 1, 2, \dots$

    $\text{int}(\mathbf{S})$ The interior of a set $\mathbf{S}$

    $\text{bd}(\mathbf{S})$ The boundary of a set $\mathbf{S}$

    $\text{cl}(\mathbf{S})$ The closure of a set $\mathbf{S}$

    $|\mathbf{S}|$ The number of elements in a finite set $\mathbf{S}$

    $\text{dim}(\mathbf{S})$ The dimension of a linear space $\mathbf{S}$

    $\mathbf{S}^\perp$ The orthogonal complement of a linear space $\mathbf{S}$

    $\mathbf{S}_1 \subset \mathbf{S}_2$ $\mathbf{S}_1$ is a strict subset of $\mathbf{S}_2$
    (i.e., $\mathbf{S}_1 \neq \mathbf{S}_2$)

    $\mathbf{S}_1 \subseteq \mathbf{S}_2$ $\mathbf{S}_1$ is a subset of $\mathbf{S}_2$

    $\mathbf{S}_1 \cup \mathbf{S}_2$ The union of $\mathbf{S}_1$ and $\mathbf{S}_2$

    $\bigcup_{i=1}^n \mathbf{S}_i$ The union of $\mathbf{S}_1, \mathbf{S}_2, \dots,
    \mathbf{S}_n$

    $\mathbf{S}_1 \cap \mathbf{S}_2$ The intersection of $\mathbf{S}_1$ and $\mathbf{S}_2$

    $\bigcap_{i=1}^n \mathbf{S}_i$ The intersection of $\mathbf{S}_1, \mathbf{S}_2,
    \dots, \mathbf{S}_n$

    $\mathbf{S}_1 \setminus \mathbf{S}_2$ The difference between $\mathbf{S}_1$ and
    $\mathbf{S}_2$, namely, $\mathbf{S}_1 \setminus \mathbf{S}_2 \triangleq \{x \in
    \mathbf{S}_1 : x \notin \mathbf{S}_2\}$

    $\mathbf{1}_n$ The $n$-dimensional vector whose elements are all one

    $\langle x, y \rangle$ The Euclidean inner product of vectors $x, y \in \mathbb{R}^n$,
    that is, $\langle x, y \rangle \triangleq y^\top x$

    $\|x\|$ The Euclidean norm of $x \in \mathbb{R}^n$, that is, $\|x\| \triangleq
    \sqrt{\langle x, x \rangle}$

    $\|x\|_p$ The $\ell^p$ norm ($1 \le p < \infty$) of $x \in \mathbb{R}^n$, that
    is, $\|x\|_p \triangleq \left\{ \sum_{i=1}^n |x_i|^p \right\}^{1/p}$. If $p =
    2$, we omit the subscript and write $\|x\|$

    $\|x\|_\infty$ The $\ell^\infty$ norm of $x \in \mathbb{R}^n$, that is, $\|x\|_\infty
    \triangleq \max\{|x_1|, |x_2|, \dots, |x_n|\}$

    $\mathbf{B}(c, r)$ The open ball with Euclidean norm of center $c$ and radius
    $r$, i.e., $\{x \in \mathbb{R}^n : \|x - c\| < r\}$

    $\overline{\mathbf{B}}(c, r)$ The closed ball $\{x \in \mathbb{R}^n : \|x - c\|
    \le r\}$

    $\mathbf{B}_p(c, r)$ The open ball with the $\ell^p$ norm of center $c$ and radius
    $r$, i.e., $\{x \in \mathbb{R}^n : \|x - c\|_p < r\}$

    $\overline{\mathbf{B}}_p(c, r)$ The closed ball $\{x \in \mathbb{R}^n : \|x -
    c\|_p \le r\}$. The unit ball $\mathbf{B}_p(0, 1)$ is sometimes abbreviated as
    $\mathbf{B}_p$

    $x \perp y$ Two vectors $x, y \in \mathbb{R}^n$ are orthogonal, that is, $\langle
    x, y \rangle = 0$

    $\text{span}(x_1, x_2, \dots, x_n)$ The linear span of vectors $x_1, x_2, \dots,
    x_n$

    $\text{span}(A)$ The linear span of column vectors $a_1, a_2, \dots, a_n$ of matrix
    $A = [a_1, a_2, \dots, a_n] \in \mathbb{R}^{m \times n}$

    $I_n$ The identity matrix in $\mathbb{R}^{n \times n}$. The subscript $n$ may
    be omitted if its dimension is clear

    $0_{m,n}$ The zero vector (or matrix) of size $m \times n$. We often omit the
    subscript $m, n$ and just write $0$

    $[x_i]$ The column vector consisting of $x_i$ as the $i$-th element

    $[x_i]_{i \in \mathbf{I}}$ The column vector consisting of $x_i$ with $i \in \mathbf{I}$

    $[a_{ij}]$ The matrix consisting of $a_{ij}$ as the $(i, j)$-th element

    $[a_{ij}]_{(i,j) \in \mathbf{E}}$ The matrix consisting of $a_{ij}$ with $(i,
    j) \in \mathbf{E}$

    $A^\top$ The transpose of matrix $A$

    $\text{abs}(A)$ The absolute-value matrix defined by $\text{abs}(A) \triangleq
    [[|a_{ij}|]]$ for $A = [a_{ij}]$

    $\text{ker}(A)$ The kernel (or the null space) of matrix $A$

    $\text{imag}(A)$ The image of matrix $A$

    $\text{rank}(A)$ The rank of matrix $A$

    $\text{det}(A)$ The determinant of square matrix $A$

    $A^{-1}$ The inverse matrix (if it exists) of square matrix $A$

    $A \otimes B$ The Kronecker product of matrices $A$ and $B$

    $\text{diag}(A_1, A_2, \dots, A_n)$ The block diagonal matrix of matrices $A_1,
    A_2, \dots, A_n$

    $A > 0$ $A$ is positive definite

    $A \ge 0$ $A$ is positive semi-definite

    $A < 0$ $A$ is negative definite

    $A \le 0$ $A$ is negative semi-definite

    $A > 0$ $A$ is a positive matrix

    $A \ge 0$ $A$ is a non-negative matrix

    $\rho(A)$ The spectral radius of matrix $A$, that is, the maximum absolute eigenvalue
    of $A$

    $\delta_{ij}$ The Kronecker delta, that is, $\delta_{ij} = 1$ if $i = j$, and
    $\delta_{ij} = 0$ otherwise

    $o(g(x))$ The Bachmann–Landau notation, that is, for continuous functions $f(x)$
    and $g(x)$, if $\lim_{x \to a} |f(x)/g(x)| = 0$ holds, then we write $f(x) = o(g(x))$
    as $x \to a$

    $\frac{\partial f}{\partial x}(x)$ The gradient vector of differentiable function
    $f : \mathbb{R}^n \to \mathbb{R}$, that is,

    $$\frac{\partial f}{\partial x}(x) \triangleq \left[ \frac{\partial f}{\partial
    x_1}(x) \frac{\partial f}{\partial x_2}(x) \cdots \frac{\partial f}{\partial x_n}(x)
    \right]^\top.$$

    We also write $\nabla f$ for the gradient vector of $f$. For $f : \mathbb{R}^n
    \to \mathbb{R}^m$, $\frac{\partial f}{\partial x}$ is the Jacobian matrix

    $f^{-1}$ The inverse image of a function $f : X \to Y$, that is,

    $$f^{-1}(y) \triangleq \{x \in X : f(x) = y\},$$

