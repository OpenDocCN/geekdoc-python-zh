    ($i = 1, 2, \dots, n$). For an integrable function $\psi : \mathbf{Q} \times \mathbb{R}_{0+}
    \to \mathbb{R}_{0+}$, let


    $$\text{gmass}_{\psi}(\mathbf{C}_i(x), x_i) \triangleq \int_{\mathbf{C}_i(x)}
    \psi(q, \|q - x_i\|) dq \qquad (4.32)$$


    and


    $$\text{gcent}_{\psi}(\mathbf{C}_i(x), x_i) \triangleq \frac{1}{\text{gmass}_{\psi}(\mathbf{C}_i(x),
    x_i)} \int_{\mathbf{C}_i(x)} q \psi(q, \|q - x_i\|) dq. \qquad (4.33)$$


    These are generalized versions of the functions “mass” and “cent” in (4.10) and
    (4.11). By the definitions of $\text{gmass}_{\psi}$, $\text{gcent}_{\psi}$, and
    Voronoi diagrams (in particular, $\mathbf{C}_i(x)$ has nonzero measure), it is
    trivial that


    $$\text{gmass}_{\psi}(\mathbf{C}_i(x), x_i) > 0, \quad \text{gcent}_{\psi}(\mathbf{C}_i(x),
    x_i) \in \text{int}(\mathbf{C}_i(x)) \qquad (4.34)$$


    hold if $\psi(q, \|q - x_i\|) > 0$ for almost all $q \in \mathbf{Q}$.


