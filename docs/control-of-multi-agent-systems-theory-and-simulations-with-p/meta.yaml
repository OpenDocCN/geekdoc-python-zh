    ## 5.3 Rigidity-Induced Formation Control


    The rigidity-induced formation control seeks to design control laws that achieve
    a specific configuration of a framework by way of accomplishing the desired constraints.
    The desired constraints could be edge lengths between agents, directions of edges,
    or angles between two incident edges. However, even though desired constraints
    are achieved, a unique configuration may not be ensured if we do not consider
    the topology of a formation. For example, in Fig. 5.10a, three agents are constrained
    by two constraints:


    - Bearing vector $g_{ki}$.

    - Angle $\theta_{ij}^k$.


    Then, as shown in Fig. 5.10b, although the constraints are satisfied, the configuration
    is not unique; it is flexible. With direction and angle constraints, the positions
    of nodes $i$ and $j$ could be placed at $i''$ and $j''$, or $i''''$ and $j''''$
    continuously. However, as shown in Fig. 5.9, if we have different constraints
    for the three agents, then the nodes cannot be placed at different locations by
    a smooth motion (without a scaling motion in Fig. 5.9c). Thus, for a unique formation,
    it is not enough just to satisfy the required constraints; but the underlying
    topology of the formation should be rigid. Therefore, the rigidity theory should
    be used for ensuring a uniqueness of a formation configuration from a topological
    perspective. In the following subsections, we introduce distributed formation
    control schemes based on graph rigidity theories. The results of this section
    are mostly adopted from [1,5,13,15].


    Note that in the previous section (Sect. 5.2), all the symbols are used without
    being parameterized by $t$ (time) since the rigidity theory is for the concept
    for stationary graph topology. However, in this section, since we consider a dynamic
    problem (control problems), almost all the symbols (position, angles, bearing
    vectors, rigidity matrices, errors, displacements, etc.) are functions of $t$.
    If it is clear from notation or derivations, we will drop the parameter $t$. That
    is, for example, the position $p$ means $p(t)$, and the rigidity matrix $R_p$
    means $R_p(t)$. So, it is recommended to understand the states or symbols as functions
    of $t$.


    ### 5.3.1 Distance-Based Formation Control


    In distance-based formation control, the main control variables are inter-agent
    distances between agents. However, it should be remarked that the sensing variables
    are relative displacements between two agents. The relative displacements are
    displacements between agents under the misaligned orientation setup. Note that
    in consensus-based formation control, both the sensing and control variables are
    displacements under the aligned orientation setup [19]. Let us consider a group
    of agents moving in the two-dimensional space, i.e., $d = 2$. We also suppose
    that each agent is governed by single integrator dynamics as


    $\dot{p}_i(t) = u_i(t)$. (5.27)


    The displacement vectors $z_{ij} = p_j - p_i$ can be written by an incidence matrix
    as $z = \bar{H} p$. Also let us denote the desired distances of the edges as $d_k$,
    and the square of desired distances as $\bar{d} = [d_1^2, d_2^2, \dots, d_m^2]^\top$.
    The desired positions of agents are written as a stacked vector $\hat{p} = [\hat{p}_1^\top,
    \hat{p}_2^\top, \dots, \hat{p}_n^\top]^\top$ defined by the set $\hat{p} \in \{p
    : \|p_i - p_j\| = d_k, \forall k = 1, \dots, m\}$, and we say that the desired
    distances are achieved when $p_i = R^\Delta(\hat{p}_i + p^\Delta)$, $\forall i
    \in \mathbf{V}$, where $R^\Delta$ is a common rotation matrix and $p^\Delta$ is
    a common translation offset. Then, the error of squared distances of the edges
    can be written as $\tilde{e}_k = \|z_k\|^2 - d_k^2$. Now using the notation $\tilde{d}
    = [\|z_1\|^2, \|z_2\|^2, \dots, \|z_m\|^2]^\top$, we write $\tilde{e} = \tilde{d}
    - \bar{d}$.


    To generate control inputs in a distributed way, each agent is asked to minimize
    the following potential function:


    $\phi(p(t)) = \frac{1}{4}\|\tilde{e}(t)\|^2 = \frac{1}{4}\|\tilde{d}(t) - \bar{d}\|^2$.
    (5.28)


    The potential function $\phi(p(t))$ becomes zero if and only if $\tilde{d}(t)
    = \bar{d}$. Thus, if the group of agents achieves $\phi(p(t)) = 0$ as $t \to \infty$
    by a cooperative work but in a distributed way, then all the desired distances
    would be achieved. By way of accomplishing the desired distances, a unique configuration
    of the formation should be achieved, which leads a necessity of using the distance
    rigidity theory. Let us suppose that the underlying topology of the graph is rigid.
    Then, by minimizing the potential function $\phi(p(t))$ via gradient-descent law
    $u(t) = -\nabla \phi(p(t))$, it can produce the following dynamics [1,15]:


    $\dot{p}(t) = -\nabla \phi(p(t)) = -\left[\frac{\partial \phi}{\partial p}(p(t))\right]
    = -\bar{H}^\top \text{diag}(z_1, z_2, \dots, z_m)\tilde{e}(t) = -R_p^\top(t)\tilde{e}(t)$,
    (5.29)'
