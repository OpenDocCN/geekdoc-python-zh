    $$x[k+1] = x[k] - \alpha \nabla f(x[k]) = x[k] - \alpha (Px[k] - q), \quad (6.29)$$


    其中我们假设步长固定。令 $\Phi \triangleq I - \alpha P$。则迭代 (6.29) 可重写为


    $$x[k+1] = \Phi x[k] + \alpha q. \quad (6.30)$$


