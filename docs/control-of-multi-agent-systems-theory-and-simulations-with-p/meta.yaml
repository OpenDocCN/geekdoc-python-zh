    \ role in making distributed optimization algorithms, as discussed in the following\
    \ section.\n\n## 6.5 Distributed Optimization\n\nIn this section, we consider\
    \ distributed algorithms to solve the following optimization problem:\n\n$$\\\
    min_{x \\in \\mathbb{R}^n} \\sum_{i=1}^N f_i(x) \\quad \\text{subject to} \\quad\
    \ x \\in \\bigcap_{i=1}^N C_i,$$ (6.100)\n\nwhere $f_i : \\mathbb{R}^n \\to \\\
    mathbb{R} \\cup \\{+\\infty\\}$ is a proper, closed, and convex function, and\
    \ $C_i \\subset \\mathbb{R}^n$ is a non-empty, closed, and convex set. The idea\
    \ of distributed optimization is to seek a *global* minimizer of (6.100) in a\
    \ way that a *local* cost function $f_i$ is minimized subject to a local constraint\
    \ $x \\in C_i$ by the $i$-th agent ($i = 1, 2, \\ldots, N$) which constantly exchanges\
    \ computation results with neighboring agents. Such algorithms can be obtained\
    \ by combining the method of consensus discussed in Chap. 3 with the optimization\
    \ algorithms introduced in the previous sections, such as gradient-based and proximal\
    \ algorithms. First, we look into the distributed subgradient algorithm.\n\n###\
    \ 6.5.1 Distributed Subgradient Algorithm\n\nHere we consider an unconstrained\
    \ optimization problem:\n\n$$\\min_{x \\in \\mathbb{R}^n} \\sum_{i=1}^N f_i(x),$$\
    \ (6.101)\n\nwhere $f_1, f_2, \\ldots, f_N : \\mathbb{R}^n \\to \\mathbb{R} \\\
    cup \\{+\\infty\\}$ are proper, closed, and convex functions. To solve this problem\
    \ in a distributed manner, we introduce $N$ agents that solve local optimization\
