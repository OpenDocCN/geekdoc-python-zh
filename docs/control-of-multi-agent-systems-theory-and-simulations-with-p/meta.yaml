    point, that is, there exist $x^*$, $z^*$, and $y^*$ such that*


    $$L_0(x^*, z^*, y) \leq L_0(x^*, z^*, y^*) \leq L_0(x, z, y^*), \quad \forall
    x, z, y. \tag{6.97}$$'
