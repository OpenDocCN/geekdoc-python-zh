- md: "## Coverage Control\n\n## 4\n\n### Key Points\n\n- “Coverage” means placing\
    \ agents in an environment at a desired density.\n- A coverage problem is formulated\
    \ as the minimization problem of an objective function quantifying the degree\
    \ of coverage.\n- A basic solution to the coverage problem is given by the gradient\
    \ of the objective function, which is explicitly represented by the Voronoi diagram\
    \ (Voronoi cells) for the positions of the agents.\n- The resulting multi-agent\
    \ system becomes a gradient system, which converges to a stationary point of the\
    \ objective function. In this sense, coverage is achieved.\n\n### 4.1 Coverage\
    \ Problem\n\nIn this section, we consider a multi-agent system with $n$ agents\
    \ placed in an environment in the $m$-dimensional space, as illustrated in Fig.\
    \ 4.1.\n\nAgent $i$ is a mobile robot, whose dynamics is described by\n\n$\\dot{x}_i(t)\
    \ = f_i(x_i(t), u_i(t)),$ (4.1)\n\nwhere $x_i(t) \\in \\mathbb{R}^m$ is the position\
    \ in the $m$-dimensional space, $u_i(t) \\in \\mathbb{R}^l$ is the control input,\
    \ and $f_i : \\mathbb{R}^m \\times \\mathbb{R}^l \\rightarrow \\mathbb{R}^m$ is\
    \ a function.\n\nEach agent equips a proximity sensor, such as a vision sensor\
    \ and laser scanner, which gives the information on the relative positions to\
    \ agents in its visible region.\n\n**Supplementary Information** The online version\
    \ contains supplementary material available at https://doi.org/10.1007/978-3-031-52981-8_4.\n\
    \nFig. 4.1 Multi-agent system with mobile robots in the two-dimensional space\n\
    \n![](img/6f6a40195ea61efdca2c32abeddbaaca_102_0.png)\n\nThe visible region of\
    \ agent $i$ is given by\n\n$\\{q \\in \\mathbf{Q} : x_j \\notin \\mathbf{S}(q,\
    \ x_i) \\quad \\forall j \\in \\{1, 2, \\ldots, n\\} \\setminus \\{i\\}\\}$, (4.2)\n\
    \nwhere $\\mathbf{Q} \\subset \\mathbb{R}^m$ is a bounded set representing the\
    \ environment of interest, which is called the *workspace*, and $\\mathbf{S}(q,\
    \ x_i) \\subseteq \\mathbf{Q}$ is the half-open line segment between $q \\in \\\
    mathbf{Q}$ and $x_i \\in \\mathbf{Q}$, i.e., $\\mathbf{S}(q, x_i) = \\bigcup_{\\\
    theta \\in [0, 1)} \\{\\theta q + (1 - \\theta)x_i\\}$. In this chapter, an agent\
    \ in the visible region of agent $i$ is called a *neighbor* of agent $i$. Since\
    \ the agents are mobile, the neighbors of each agent are state-dependent and thus\
    \ time-varying. Thus, we use $\\mathbf{N}_i(x(t)) \\subseteq \\{1, 2, \\ldots,\
    \ n\\} \\setminus \\{i\\}$ to represent the set of the neighbors of agent $i$\
    \ at time $t$, where $x(t) \\triangleq [x_1^\\top(t) \\ x_2^\\top(t) \\ \\cdots\
    \ \\ x_n^\\top(t)]^\\top \\in \\mathbb{R}^{mn}$ is the collective state.\n\nThe\
    \ controller of agent $i$ is a relative-state-based one for time-varying neighbors,\
    \ given by\n\n$u_i(t) = g_i([x_j(t) - x_i(t)]_{j \\in \\mathbf{N}_i(x(t))})$,\
    \ (4.3)\n\nwhere $g_i$ is a function of the relative positions of the neighbors\
    \ of $i$ at time $t$.\n\nFor the above multi-agent system, *coverage* means to\
    \ place the agents in an environment at a desired density on the workspace $\\\
    mathbf{Q}$, as illustrated in Fig. 4.2. The *coverage problem* is to design the\
    \ control inputs $u_i$ ($i = 1, 2, \\ldots, n$) such that $(x_1(t), x_2(t), \\\
    ldots, x_n(t))$ converges to a minimum point of a function quantifying the coverage\
    \ of interest, i.e.,\n\n$\\lim_{t \\to \\infty} J(x(t)) = \\min_{x \\in \\mathbf{Q}^n}\
    \ J(x)$, (4.4)\n\nwhere $J : \\mathbb{R}^{mn} \\to \\mathbb{R}$ is a function\
    \ quantifying the coverage, corresponding to the *objective function* of our coverage\
    \ problem.\n\nFig. 4.2 Image of coverage\n\n![](img/6f6a40195ea61efdca2c32abeddbaaca_102_1.png)\n\
    \nThe objective function $J$ can be defined in several ways. A typical form is\
    \ given by\n\n$$J(x) = \\int_{\\mathbf{Q}} \\min_{i \\in \\{1, 2, \\dots, n\\\
    }} h(\\|q - x_i\\|) \\phi(q) dq, \\quad (4.5)$$\n\nwhere $x = [x_1^\\top \\ x_2^\\\
    top \\ \\cdots \\ x_n^\\top]^\\top \\in \\mathbb{R}^{mn}$, $h : \\mathbb{R}_+\
    \ \\to \\mathbb{R}$ is a nondecreasing, piecewise differentiable, and integrable\
    \ function on $\\mathbf{Q}$, and $\\phi : \\mathbb{R}^m \\to \\mathbb{R}_{0+}$\
    \ is an integrable function on $\\mathbf{Q}$. The function $h$ is called the *performance\
    \ function*, which quantifies the utility of the location $q \\in \\mathbf{Q}$\
    \ at a certain distance from agent $i$ (a smaller value indicates more utility),\
    \ and thus $\\min_{i \\in \\{1, 2, \\dots, n\\}} h(\\|q - x_i\\|)$ represents\
    \ the utility of the location $q$ with respect to the nearest ones in $x_1, x_2,\
    \ \\dots, x_n$ in the sense of the distance $\\|q - x_i\\|$. On the other hand,\
    \ $\\phi$ describes the importance of the location $q \\in \\mathbf{Q}$. It is\
    \ called the *weighting function*. Therefore, $\\min_{i \\in \\{1, 2, \\dots,\
    \ n\\}} h(\\|q - x_i\\|) \\phi(q)$ represents a weighted utility of the location\
    \ $q$ generated by the nearest agent and $J(x)$ is the total weighted utility\
    \ on $\\mathbf{Q}$.\n\nTo illustrate this function $J$, let us consider the situation\
    \ where\n\n- the agents are mobile sensors equipped with a vision sensor,\n- the\
    \ agents are to be deployed on the workspace $\\mathbf{Q}$ to detect an anomaly\
    \ at each location $q \\in \\mathbf{Q}$, and\n- the amount of the economic loss\
    \ caused by an anomaly varies depending on the location $q$.\n\nIt is natural\
    \ to assume that the detection accuracy of the vision sensor at $x_i$ degrades\
    \ with the distance $\\|q - x_i\\|$. This property, i.e., the relation between\
    \ the detection accuracy and the distance $\\|q - x_i\\|$, is represented by the\
    \ function $h$. Meanwhile, the locations with the potential of large economic\
    \ loss are relatively important in the detection process. This is described by\
    \ the function $\\phi$.\n\n### 4.2 Voronoi Diagrams\n\nA *Voronoi diagram*, which\
    \ is a concept of geometry, plays an important role to solve the coverage problem\
    \ for the objective function in (4.5). In this section, we introduce its concept\
    \ and some properties.\n\n#### 4.2.1 Definition\n\nConsider a set $\\mathbf{Q}\
    \ \\subset \\mathbb{R}^m$ and $n$ distinct points $x_i$ ($i = 1, 2, \\dots, n$)\
    \ in $\\mathbf{Q}$. Although $\\mathbf{Q}$ is assumed to be closed in Sect. 4.1,\
    \ it is necessarily neither bounded nor closed in this section. An example is\
    \ illustrated in Fig. 4.3, where $m = 2$, $\\mathbf{Q} = [0, 1] \\times [0, 1]$,\
    \ $n = 10$, and the points are indicated by dots.\n\n(ii) Consider a multi-agent\
    \ system with integrator agents in the two-dimensional space, where the dynamics\
    \ of agent $i$ is given by\n\n$\\dot{x}_i(t) = u_i(t)$ (3.46)\n\nfor $x_i(t) \\\
    in \\mathbb{R}^2$ and $u_i(t) \\in \\mathbb{R}^2$.\n\n- a. Find a relative-state-based\
    \ controller to achieve consensus.\n- b. (Python) Develop a Python code to simulate\
    \ the above solution.\n\n(iii) Python Code 3.3 is an alternative to Python Code\
    \ 3.1, but it is less preferable as a simulation program of multi-agent systems.\
    \ Show reasons for this claim.\n\n### Python Code 3.3: An Alternative Code to\
    \ Python Code 3.1\n\n```python\nfrom scipy.integrate import odeint\nimport numpy\
    \ as np\nimport matplotlib.pyplot as plt\n\ndef MAS(x,t,L):\n    dxdt = np.dot(-L,x)\n\
    \    return dxdt\n\nL = np.array([\n    [ 1, -1,  0,  0,  0,  0],\n    [ 0,  2,\
    \ -1,  0, -1,  0],\n    [ 0,  0,  1, -1,  0,  0],\n    [-1, -1,  0,  2,  0,  0],\n\
    \    [ 0,  0,  0,  0,  1, -1],\n    [ 0, -1,  0,  0,  0,  1]])\n\nx0 = np.array([-1,\
    \ 2, 6, 3, -3, 1])\nt = np.arange(0, 5, 0.001)\nx = odeint(MAS, x0, t, args=(L,))\n\
    \nplt.plot(t,x)\nplt.xlabel('t')\nplt.ylabel('xi')\nplt.grid()\nplt.show()\n```\n\
    \n(iv) Consider the following discrete-time multi-agent system:\n\n$$\n\\begin{cases}\n\
    x_1[k+1] = f(x_1[k], x_2[k], x_4[k]), \\\\\nx_2[k+1] = f(x_1[k], x_2[k], x_5[k]),\
    \ \\\\\nx_3[k+1] = f(x_3[k], x_4[k], x_5[k]), \\\\\nx_4[k+1] = f(x_1[k], x_3[k],\
    \ x_4[k]), \\\\\nx_5[k+1] = f(x_1[k], x_2[k], x_5[k]),\n\\end{cases}\n$$\n\nwhere\
    \ $x_i[k] \\in \\mathbb{R}$ ($i = 1, 2, \\dots, 5$) is the state and $f : \\mathbb{R}^3\
    \ \\to \\mathbb{R}$ is a function to be designed.\n\n- a. Find a function $f$\
    \ to achieve maximum consensus.\n- b. (Python) Develop a Python code to simulate\
    \ the above solution.\n\n### References\n\n1. Ren W, Beard RW (2008) Distributed\
    \ consensus in multi-vehicle cooperative control: theory and applications. Communications\
    \ and control engineering. Springer, London\n2. Mesbahi M, Egerstedt M (2010)\
    \ Graph theoretic methods in multiagent networks. Princeton University Press,\
    \ Princeton\n3. Olfati-Saber R, Fax JA, Murray RM (2007) Consensus and cooperation\
    \ in networked multi-agent systems. Proc IEEE 95(1):215–233\n4. Oh K, Park M,\
    \ Ahn H (2015) A survey of multi-agent formation control. Automatica 53:424–440\n\
    5. Cortés J (2008) Distributed algorithms for reaching consensus on general functions.\
    \ Automatica 44(3):726–737\n6. Sundaram S, Hadjicostis C (2011) Distributed function\
    \ calculation via linear iterative strategies in the presence of malicious agents.\
    \ IEEE Trans Autom Control 56(7):1496–1508\n7. Olfati-Saber R, Murray RM (2004)\
    \ Consensus problems in networks of agents with switching topology and time-delays.\
    \ IEEE Trans Autom Control 49(9):1520–1533\n8. Moreau L (2005) Stability of multiagent\
    \ systems with time-dependent communication links. IEEE Trans Autom Control 50(2):169–182\n\
    9. Ren W, Beard RW (2005) Consensus seeking in multiagent systems under dynamically\
    \ changing interaction topologies. IEEE Trans Autom Control 50(5):655–661\n10.\
    \ Carli R, Fagnani F, Speranzon A, Zampieri S (2008) Communication constraints\
    \ in the average consensus problem. Automatica 44(3):671–684\n11. Frasca P, Carli\
    \ R, Fagnani F, Zampieri S (2009) Average consensus on networks with quantized\
