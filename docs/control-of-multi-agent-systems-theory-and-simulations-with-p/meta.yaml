    # 7.2.3 SIR Model


    In the SIS model, we assume that infected agents recover and become susceptible
    agents. In this subsection, we instead add a new state called Recovered (R) and
    consider the *SIR model*. In this model, infected agents recover at rate $\gamma$
    as in the SIS mode, but the recovered agents never get infected but move to the
    recovered state. The dynamics is described as follows:


    ```

    $$\frac{dS}{dt} = -\beta S(t)I(t), \quad (7.13)$$

    $$\frac{dI}{dt} = \beta S(t)I(t) - \gamma I(t), \quad (7.14)$$

    $$\frac{dR}{dt} = \gamma I(t). \quad (7.15)$$

    ```


    We note that there is no closed-form solution for the system of differential equations.
    First, from (7.13)–(7.15), we have


    ```

    $$\frac{d}{dt}(S + I + R) = 0. \quad (7.16)$$

    ```


    Since the population is $N$, we have


    ```

    $$S(t) + I(t) + R(t) = N, \quad t \ge 0. \quad (7.17)$$

    ```


    Let us assume $I(0) + R(0) = N$ and $R(0) = 0$. We further assume that there are
    a very small number of infected agents, namely, $I(0) \ll N$, and the infected
    agents have very little influence on the susceptible agents at an initial short
    time duration. In other words, we assume $S(t) \approx S(0)$ for $t \approx 0$.
    Then, we have a linearized model for (7.14):


    ```

    $$\frac{dI}{dt} = \beta S(0)I(t) - \gamma I(t) = \lambda_0 I(t), \quad (7.18)$$

    ```'
