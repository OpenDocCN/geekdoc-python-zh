    $$\frac{d}{dt} \sum_{i=1}^n x_i(t) = \mathbf{1}_n^\top \dot{x}(t) = -\mathbf{1}_n^\top
    L x(t) = 0 \tag{3.26}$$


    from Theorem 2.19 and the fact that an undirected graph is balanced. This means
    that the sum of $x_i(t)$ is invariant. Thus, the consensus value is equal to the
    average of the initial states.


