    \n# 6.5.1 Distributed Subgradient Algorithm\n\nHere we consider an unconstrained\
    \ optimization problem:\n\n$$\\min_{x \\in \\mathbb{R}^n} \\sum_{i=1}^N f_i(x),$$\
    \ (6.101)"
  - '[PAGE 200]


    where $f_1, f_2, \ldots, f_N : \mathbb{R}^n \to \mathbb{R} \cup \{+\infty\}$ are
    proper, closed, and convex functions. To solve this problem in a distributed manner,
    we introduce $N$ agents that solve local optimization problems, with multi-agent
    network $G = (\mathbf{V}, \mathbf{E})$, where $\mathbf{V} = \{1, 2, \ldots, N\}$
    is the set of vertices (i.e., agents), and $\mathbf{E} \subset \mathbf{V} \times
    \mathbf{V}$ is the set of edges (i.e., links between interactive agents). We assume
    that $G$ is undirected and connected.


    First, we set the initial guess $x_i[0] \in \mathbb{R}^n$ to the $i$-th agent
    ($i \in \mathbf{V}$). Then, the $i$-th agent updates and maintains the local guess
    $x_i[k]$ at each time step (in discrete time). The update rule for $x_i[k]$ is
    given by


    $$x_i[k+1] = \sum_{j=1}^N p_{ij} x_j[k] - \alpha g_i[k], \tag{6.102}$$


    where


    +   - $p_{ij}$ is the $(i, j)$-th element of Perron matrix $P = I - \varepsilon
    L$ with $\varepsilon > 0$ and the graph Laplacian $L$ of graph $G$,

    - $\alpha > 0$ is a fixed step size,

    - $g_i[k]$ is a subgradient of $f_i$ at $x_i[k]$, that is, $g_i[k] \in \partial
    f_i(x_i[k])$.


    From the result of the consensus discussed in Chap. 3, if we take $\alpha = 0$,
    then $x_1[k], x_2[k], \ldots, x_N[k]$ all converge to the average of $x_1[0],
    x_2[0], \ldots, x_N[0]$ under a connectivity condition of graph $G$ and $\varepsilon
    < 1/\Delta$. Therefore, the update (6.102) has two steps: a consensus step and
    a subgradient step. Intuitively, by the subgradient step, the $i$-th agent tries
    to minimize the local cost function $f_i$, while by the consensus step, the agent
    adjusts its own estimate by looking at the local average of the neighboring agents.


    The convergence of (6.102) is summarized in the following theorem [14]:


    **Theorem 6.9** Assume that there exists $\beta > 0$ such that $\|g\| \le \beta$
    for any $g \in \partial f_i(x)$, $i \in \mathbf{V}$, and $x \in \mathbb{R}^n$.
    Assume also that the optimization problem (6.101) has at least one solution. Then
    the time average


    $$\hat{x}_i[k] \triangleq \frac{1}{k} \sum_{\tau=1}^k x_i[\tau] \tag{6.103}$$


    of the iterates obtained by (6.102) satisfies


    $$\limsup_{k \to \infty} f(\hat{x}_i[k]) \le f^* + \frac{\alpha \beta^2 c}{2},
    \quad i \in \mathbf{V}, \tag{6.104}$$


    where


    $$c \triangleq N \left\{ 1 + 8 \left( 2 + \frac{N \gamma}{1 - \gamma} \right)
    \right\}, \quad \gamma \triangleq 1 - \frac{\eta}{4N^2}, \tag{6.105}$$


    and $\eta$ is the minimum non-zero element of the Perron matrix $P$.'
