    (3.11) 中的控制器并不总能实现共识，并且共识性质，即系统是否能达成共识，取决于网络的结构。 □


    $^1$ 共识通常被称为*一致*。当使用此术语时，(3.11) 中的控制器被称为*一致控制器*或*一致协议*。


