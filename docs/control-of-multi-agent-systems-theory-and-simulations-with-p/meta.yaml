    # 5.3 Rigidity-Induced Formation Control


    The rigidity-induced formation control seeks to design control laws that achieve
    a specific configuration of a framework by way of accomplishing the desired constraints.
    The desired constraints could be edge lengths between agents, directions of edges,
    or angles between two incident edges. However, even though desired constraints
    are achieved, a unique configuration may not be ensured if we do not consider
    the topology of a formation. For example, in Fig. 5.10a, three agents are constrained
    by two constraints:


    +   - Bearing vector $g_{ki}$.

    - Angle $\theta_{ij}^k$.


    Then, as shown in Fig. 5.10b, although the constraints are satisfied, the configuration
    is not unique; it is flexible. With direction and angle constraints, the positions
    of nodes $i$ and $j$ could be placed at $i''$ and $j''$, or $i''''$ and $j''''$
    continuously. However, as shown in Fig. 5.9, if we have different constraints
    for the three agents, then the nodes cannot be placed at different locations by
    a smooth motion (without a scaling motion in Fig. 5.9c). Thus, for a unique formation,
    it is not enough just to satisfy the required constraints; but the underlying
    topology of the formation should be rigid. Therefore, the rigidity theory should
    be used for ensuring a uniqueness of a formation configuration from a topological
    perspective. In the following subsections, we introduce distributed formation
    control schemes based on graph rigidity theories. The results of this section
    are mostly adopted from [1,5,13,15].


    Note that in the previous section (Sect. 5.2), all the symbols are used without
    being parameterized by $t$ (time) since the rigidity theory is for the concept
    for stationary graph topology. However, in this section, since we consider a dynamic
    problem (control problems), almost all the symbols (position, angles, bearing
    vectors, rigidity matrices, errors, displacements, etc.) are functions of $t$.
    If it is clear from notation or derivations, we will drop the parameter $t$. That
    is, for example, the position $p$ means


    ![](img/6f6a40195ea61efdca2c32abeddbaaca_150_0.png)'
