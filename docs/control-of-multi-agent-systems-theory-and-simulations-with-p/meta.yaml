    ## 6.4 Proximal Algorithms


    In the previous section, we have seen the subgradient projection algorithm for
    constrained optimization with a non-differentiable cost function. In this section,
    we will consider another method to solve this type of optimization based on *proximal
    operators*.


    ### 6.4.1 Proximal Operator


    Let $f : \mathbb{R}^n \to \mathbb{R} \cup \{+\infty\}$ be a proper, closed, and
    convex function. The *proximal operator* with parameter $\gamma > 0$ is defined
    by


    $$\text{prox}_{\gamma f}(v) \triangleq \arg \min_{x \in \text{dom}(f)} \left\{
    \gamma f(x) + \frac{\|x - v\|_2^2}{2} \right\}, \quad v \in \mathbb{R}^n. \quad
    (6.63)$$


    We note that for any proper, closed, and convex function $f$, and any $\gamma
    > 0$, $\text{prox}_{\gamma f}(v)$ uniquely exists for any $v \in \mathbb{R}^n$
    and hence the proximal operator is well-defined [13, Sect. 4.2.1].


    To understand the role of the proximal operator, let us consider an unconstrained
    optimization problem (6.16) with non-differentiable $f$. Then the proximal algorithm
    to find a solution to (6.16) is given by


    $$x[k+1] = \text{prox}_{\gamma_k f}(x[k]), \quad k = 0, 1, 2, \ldots, \tag{6.64}$$


    where $\gamma_k$ is the step size of this iteration. From (6.63), the iteration
    (6.64) can be rewritten as


    $$x[k+1] = \underset{x \in \text{dom}(f)}{\arg\min} \left\{ f(x) + \frac{\|x -
    x[k]\|_2^2}{2\gamma_k} \right\}. \tag{6.65}$$


    The function $f(x) + \|x - x[k]\|_2^2/(2\gamma_k)$ is always a *strongly convex
    function*,<sup>1</sup> even if $f$ is not strongly convex but just convex (e.g.,
    $f(x) = \|x\|_1$). Namely, the algorithm (6.65) approximates $f$ by a strongly
    convex function at each step, which is much easier to minimize than general convex
    functions.


    For this algorithm, we have the following theorem [5, Proposition 5.1.3]:


    **Theorem 6.6** *Suppose that the parameter sequence $\{\gamma_k\}$ satisfies
    $\gamma_k > 0$ for all $k$ and*


    $$\sum_{k=0}^{\infty} \gamma_k = +\infty. \tag{6.66}$$


    *Then, the sequence $\{x[k]\}$ generated by the proximal algorithm (6.64) converges
    to one of the minimizers of $f$ for any initial vector $x[0] \in \mathbb{R}^n$.*


    In the following sections, we introduce efficient algorithms in convex optimization
    by using the proximal operator. Before that, we will showcase proximal operators
    for some useful functions.


    ### Quadratic Function


    Let us consider the following *quadratic function*:


    $$f(x) = \frac{1}{2} x^\top \Phi x - y^\top x, \tag{6.67}$$


    > <sup>1</sup> A function $f$ is said to be *strongly convex* if there exists
    $\beta > 0$ such that for any $x, y \in \text{dom}(f) \subset \mathbb{R}^n$ and
    any $t \in [0, 1]$, the following inequality holds:

    >

    > $$f(tx + (1-t)y) \leq tf(x) + (1-t)f(y) - t(1-t)\frac{\beta}{2}\|x - y\|_2^2.$$


    where $\Phi$ is a positive semi-definite matrix. It is easily shown that the quadratic
    function (6.67) is a proper, closed, and convex function. The proximal operator
    is given by


    $$\text{prox}_{\gamma f}(v) = (\Phi + \gamma^{-1}I)^{-1}(y + \gamma^{-1}v). \tag{6.68}$$


    A special case is the $\ell^2$ norm squared $\|x\|^2 = x^\top x$, whose proximal
    operator is given by


    $$\text{prox}_{\gamma \|\cdot\|^2}(v) = \frac{v}{2\gamma + 1}. \tag{6.69}$$


    ### Indicator Function


    Let $\mathbf{C} \subset \mathbb{R}^n$ be a non-empty, closed, and convex set.
    Then, the indicator function on $\mathbf{C}$ is defined by


    $$I_{\mathbf{C}}(x) \triangleq \begin{cases} 0, & \text{if } x \in \mathbf{C},
    \\ +\infty, & \text{if } x \notin \mathbf{C}. \end{cases} \tag{6.70}$$


    Since $\mathbf{C}$ is non-empty, closed, and convex, its indicator function $I_{\mathbf{C}}(x)$
    is a proper, closed, and convex function. This is easily understood by drawing
    the epigraph of $I_{\mathbf{C}}(x)$. Then, the proximal operator is given by


    $$\text{prox}_{\gamma I_{\mathbf{C}}}(v) = \Pi_{\mathbf{C}}(v), \tag{6.71}$$


    where $\Pi_{\mathbf{C}}$ is the projection onto the set $\mathbf{C}$.


    In particular, for the *consensus set* for $N$ vectors $x_1, \dots, x_N \in \mathbb{R}^n$
    defined by


    $$\mathbf{C} \triangleq \{(x_1, \dots, x_N) : x_1 = x_2 = \cdots = x_N\}, \tag{6.72}$$


    the projection $\Pi_{\mathbf{C}}(v)$ of $v = (v_1, \dots, v_N)$ is given by (see
    Exercise iii)


    $$\Pi_{\mathbf{C}}(v) = \begin{bmatrix} \bar{v} \\ \vdots \\ \bar{v} \end{bmatrix},
    \quad \bar{v} \triangleq \frac{1}{N} \sum_{j=1}^N v_j. \tag{6.73}$$


    This is used for establishing distributed algorithms based on multi-agent consensus
    (see Sect. 6.5.2).


    ### $\ell^1$ Norm


    The proximal operator of the $\ell^1$ norm is given by (see Exercise iv)


    $$\text{prox}_{\gamma \|\cdot\|_1}(v) = S_{\gamma}(v). \tag{6.74}$$'
