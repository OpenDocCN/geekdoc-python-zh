  md: '# 4.4 Application to Multi-agent Display


    Coverage control has a wide range of applications, such as sensor networks, surveillance,
    and so on. Here, as an application example, we introduce the so-called *multi-agent
    display* or *robotic mass games* [9], which represents a given image as a formation
    of agents.


    Consider a grayscale image $r : \mathbf{Q} \rightarrow [0, 1]$, where $\mathbf{Q}
    \subset \mathbb{R}^2$ is a bounded workspace, $r(q) = 0$ ($r(q) = 1$) implies
    that a black pixel (a white pixel) is placed at the location $p$, and $0 < r(q)
    < 1$ means that a gray pixel is placed at $q$. An example of $r$ is shown in Fig.
    4.7.


    In order to represent this image as a formation of agents, the idea of *halftone
    image processing* is useful. The halftone image processing is to transform a grayscale
    image into a binary image with a similar appearance to the original. The principle
    is that more black pixels are placed at the parts corresponding to the dark parts
    of the original image. This principle and the spatial low-pass filtering property
    of the human eye result in a similar appearance to the original.


    On the other hand, the coverage control with the objective function $J(x)$ in
    (4.5) places agents so that the distribution of the agents becomes a desirable
    one specified by the weighting function $\phi$.


    Therefore, multi-agent display would be achieved by


    +   - making the agents play black pixels,

    - using coverage control to place the agents so that the distribution of the agents
    corresponds to the reference image $r$.


    Figure 4.8 shows the simulation result of the multi-agent display for the original
    image in Fig. 4.7 and the coverage control with $n = 3000$,


    $$J(x) = \int_{[0,100] \times [0,100]} \min_{i \in \{1, 2, \dots, 3000\}} \|q
    - x_i\|^2 e^{10(r(q)-1)} dq \quad (4.49)$$


    and the corresponding controller in the form of (4.30) with $k = 0.5$.


    It is observed that the original image is represented as a formation of agents.
    In this way, multi-agent display is realized by coverage control.


