    # 4.8.2 LaSalle''s Invariance Principle


    Consider the system


    $$\dot{x}(t) = f(x(t)), \tag{4.51}$$


    where $x(t) \in \mathbb{R}^n$ is the state and $f : \mathbb{R}^n \to \mathbb{R}^n$
    is a function. Assume that the system has a unique solution on the time interval
    $[0, \infty)$ for each $x(0) \in \mathbf{X}$, where $\mathbf{X} \subseteq \mathbb{R}^n$
    is a set.


    For the system, a set $\mathbf{D} \subseteq \mathbf{X}$ is called the *invariant
    set* if


    $$x(t) \in \mathbf{D}, \quad \forall t \in \mathbb{R}_+ \tag{4.52}$$


    for any $x(0) \in \mathbf{D}$.


    LaSalle''s invariance principle is concerned with a kind of stability of the system
    in (4.51). The following result is a generalized version of LaSalle''s invariance
    principle in the sense that the initial state set is not always closed unlike
    the typical case of LaSalle''s invariance principle. This version plays an important
    role to guarantee the convergence of coverage control:


    **Lemma 4.13** *Consider the system in (4.51) and a bounded set $\mathbf{D} \subset
    \mathbb{R}^n$ such that the system has a unique solution on the time interval
    $[0, \infty)$ for each $x(0) \in \mathbf{D}$ and $\mathbf{D}$ is an invariant
    set of the system. If*


    *(a) there exists a continuously differentiable function $V : \mathbb{R}^n \to
    \mathbb{R}$ such that $\dot{V}(x) \leq 0$ for every $x \in \mathbf{D}$,*


    *(b) there exists no $x(0) \in \mathbf{D}$ such that $x(t)$ converges to the set
    $\text{cl}(\mathbf{D}) \setminus \mathbf{D}$ as $t \to \infty$,*


    *then, for every $x(0) \in \mathbf{D}$, $x(t)$ converges to the largest invariant
    set contained in $\mathbf{E} \triangleq \{x \in \mathbf{D} : \dot{V}(x) = 0\}$
    as $t \to \infty$, where the “largest invariant set” means an invariant set which
    contains all the invariant sets contained in $\mathbf{E}$. $\square$*


