    ### 3.2.2 共识条件


    现在，我们考虑具有共识控制器的多智能体系统实现共识的条件。


    首先，让我们推导由 (3.10) 和 (3.11) 给出的多智能体系统的集体动力学。令 $A \in \{0, 1\}^{n \times n}$，$D \in
    \mathbb{N}^{n \times n}$，且 $L \in \mathbb{Z}^{n \times n}$ 分别为网络 $G$ 的邻接矩阵、度矩阵和图拉普拉斯矩阵，并令
    $a_{ij} \in \{0, 1\}$ 为 $A$ 的 $(i, j)$ 元素，即


    $$a_{ij} = \begin{cases} 0 & \text{如果 } j \notin \mathbf{N}_i, \\ 1 & \text{如果
    } j \in \mathbf{N}_i. \end{cases} \quad (3.12)$$


    我们使用 $x(t) \in \mathbb{R}^n$ 和 $u(t) \in \mathbb{R}^n$ 分别表示集体状态和输入，即 $x(t) = [x_1(t)
