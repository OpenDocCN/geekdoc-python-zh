    ### 4.3.1 Gradient Systems


    Gradient systems play an important role for realizing coverage control. We first
    review gradient systems and their stability.


    Consider an open set $\mathbf{X} \subset \mathbb{R}^n$. A gradient system [3]
    on $\mathbf{X}$ is given by


    $$\dot{x}(t) = -K(x(t))\frac{\partial J}{\partial x}(x(t)), \quad (4.17)$$


    where $x(t) \in \mathbf{X}$ is the state, $J : \mathbb{R}^n \to \mathbb{R}$ is
    a continuously differentiable function on $\mathbf{X}$, and $K : \mathbf{X} \to
    \mathbb{R}^{n \times n}$ is a matrix-valued function such that $K$ is continuously
    differentiable on $\mathbf{X}$ and $K(x)$ is a positive-definite matrix for any
    $x \in \mathbf{X}$.


    If $K(x) \equiv I$, the right-hand side of (4.17) corresponds to the direction
    of the steepest descent of $J$.


    **Lemma 4.5** *Consider the system in (4.17). If $J$ is twice continuously differentiable
    on an open set $\mathbf{X}$, the following statements hold:*


    (i) *For each $x(0) \in \mathbf{X}$, there exists a $\delta \in \mathbb{R}_+$
    such that the system has a unique solution $x(t)$ on the time interval $[0, \delta]$.*


    (ii) *Consider a bounded set $\mathbf{D} \subseteq \mathbf{X}$. Suppose that an
    initial state $x(0) \in \mathbf{D}$ is given. If the following statements hold,
    the system has a unique solution on the time interval $[0, \infty)$:*


    - *there exists a $\delta \in \mathbb{R}_+$ such that the system has a unique
    solution $x(t)$ which belongs to $\mathbf{D}$ on the time interval $[0, \delta]$.*

    - *there exists no $\tau \in \mathbb{R}_+$ such that the system has a unique solution
