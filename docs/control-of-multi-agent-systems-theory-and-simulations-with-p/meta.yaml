  md: '**Lemma 5.7** Let $\breve{p}$ be a point in $\mathbf{U}_{eq}^{ude}$, i.e.,
    $\breve{p} \in \mathbf{U}_{eq}^{ude}$. Then, the gradient-descent based dynamics
    (5.29) is unstable at $\breve{p}$.


