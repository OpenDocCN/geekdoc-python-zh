  md: 'where $h_G^{-1}$ is the inverse image of the function $h_G$. The framework
    is *flexible* in $\mathbb{R}^d$ if there exists a continuous path $x : [0, 1]
    \to \mathbb{R}^{dn}$ such that $x(0) = p$ and $x(t) \in h_G^{-1}(h_G(p)) \setminus
    h_{G_K}^{-1}(h_{G_K}(p))$ for all $t \in (0, 1]$.<sup>1</sup>


    In the following subsections, we specifically study the rigidity concepts with
    the constraints of distances, bearing vectors (directions of edges), and angles.
    According to the type of constraints, the different concepts for equivalence and
    congruence will be properly redefined.


    # 5.2.1 Distance Rigidity


    Given a graph $G = (V, E)$, let the set of edges $E$ represent distance constraints
    between two vertices. Then, vertices could be embedded into arbitrary points in
    the general $d$-dimensional space, $\mathbb{R}^d$. Out of these arbitrary points,
    let us select two realizations $p$ and $q$. Then, for evaluating distance rigidity,
    we could employ the concepts of *equivalence* and *congruence*.


    **Definition 5.3** (*Distance equivalence and distance congruence*) Two frameworks
    $(G, p)$ and $(G, q)$, with different realizations $p$ and $q$, are called *distance
    equivalent* if $\|p_i - p_j\| = \|q_i - q_j\|$ for all edges $(i, j) \in E$. The
    two frameworks are called *distance congruent* if $\|p_i - p_j\| = \|q_i - q_j\|$
    for all possible pairs of vertices.


    **Definition 5.4** (*Distance rigidity*) A framework $(G, p)$ is called *distance
    rigid* in $\mathbb{R}^d$ if there exists a neighborhood $U_p$ of $p$ such that
    every framework $(G, q)$, where $q$ stays in the neighborhood $U_p$, i.e., $q
    \in U_p$, which is distance equivalent to $(G, p)$, is also distance congruent
    to $(G, p)$.


    Definition 5.4 is only applied to frameworks staying close enough to each other
    in the sense of equivalence. However, there could exist congruent frameworks,
    even though they are not close enough in the sense of equivalence. The following
    definition provides a concept for global distance rigidity:


    **Definition 5.5** (*Global distance rigidity*) A framework $(G, p)$ is called
    *globally distance rigid* in $\mathbb{R}^d$ if every framework $(G, q)$ equivalent
    to $(G, p)$ is also congruent to $(G, p)$ in $\mathbb{R}^d$.


    **Example 5.2** Consider four agents in Fig. 5.3. Let us have an arbitrary realization
    as $p_1 = [1, 1]^\top$, $p_2 = [0, 0]^\top$, $p_3 = [2, -1]^\top$, $p_4 = [3,
    0]^\top$. Let us have another arbitrary realization with $q_1 = [2, 1]^\top$,
