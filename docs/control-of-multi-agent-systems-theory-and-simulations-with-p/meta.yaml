    # 2.2 Linear Algebra


    In the *algebraic graph theory*, a graph (or a network) is represented using a
    matrix. The analysis of a graph-related matrix plays an important role for analyzing
    properties of the graph, such as connectivity. In this section, we will introduce
    important facts and theorems in linear algebra that are often used in the algebraic
    graph theory. We also show Python codes for matrix analysis.


    # 2.2.1 Notation


    For two vectors $x$ and $y$ in $n$-dimensional real vector space $\mathbb{R}^n$,
    we define the *inner product* by $\langle x, y \rangle \triangleq x^\top y$, and
    the *Euclidean norm* or $\ell^2$ *norm* by


    $$\|x\| \triangleq \sqrt{\langle x, x \rangle} = \sqrt{\sum_{i=1}^n |x_i|^2},
    \tag{2.5}$$'
  - '[PAGE 40]


    where $x_i$ is the $i$th element of $x$. We say two vectors $x$ and $y$ are *orthogonal*
    if $\langle x, y \rangle = 0$ holds, for which we denote $x \perp y$. For two
    subsets $\mathbf{S}_1$ and $\mathbf{S}_2$ in $\mathbb{R}^n$, we say $\mathbf{S}_1$
    and $\mathbf{S}_2$ are orthogonal and write $\mathbf{S}_1 \perp \mathbf{S}_2$
    if $x_1 \perp x_2$ holds for any $x_1 \in \mathbf{S}_1$ and $x_2 \in \mathbf{S}_2$.
    For a subset $\mathbf{S} \subseteq \mathbb{R}^n$, the *orthogonal complement*
    $\mathbf{S}^\perp$ is defined by


    $$\mathbf{S}^\perp \triangleq \{x \in \mathbb{R}^n : \langle x, y \rangle = 0,
    \forall y \in \mathbf{S}\}. \tag{2.6}$$


    It is easily shown that, for any $\mathbf{S} \subseteq \mathbb{R}^n$, $\mathbf{S}^\perp$
    is a closed linear subspace of $\mathbb{R}^n$. In particular, if $\mathbf{S}$
    is itself a closed linear subspace, then any vector $x \in \mathbb{R}^n$ can be
    uniquely decomposed into


    $$x = y + z, \quad y \in \mathbf{S}, \quad z \in \mathbf{S}^\perp. \tag{2.7}$$


    Namely, the space $\mathbb{R}^n$ is the direct sum of $\mathbf{S}$ and $\mathbf{S}^\perp$,
    that is,


    $$\mathbb{R}^n = \mathbf{S} \oplus \mathbf{S}^\perp. \tag{2.8}$$


    We call this decomposition the *orthogonal decomposition* of $\mathbb{R}^n$.


    # 2.2.2 Matrix Rank


    Let us consider a matrix as a mapping between two finite-dimensional linear spaces.
    We begin with two important linear subspaces related to a matrix: the kernel and
    the image. For a matrix $A \in \mathbb{R}^{m \times n}$, we define the *kernel*
    of $A$ by


    $$\ker(A) \triangleq \{x \in \mathbb{R}^n : Ax = 0\}, \tag{2.9}$$


    and the *image* by


    $$\mathrm{imag}(A) \triangleq \{Ax \in \mathbb{R}^m : x \in \mathbb{R}^n\}. \tag{2.10}$$


    The dimension of $\mathrm{imag}(A)$ is called the *rank*, and written as $\mathrm{rank}(A)$.
    The following theorem is called the *dimension theorem* that plays an important
    role in linear algebra:


    **Theorem 2.1** (Dimension theorem) *For a matrix $A \in \mathbb{R}^{m \times
    n}$, we have*


    $$\dim(\ker(A)) + \mathrm{rank}(A) = n. \tag{2.11}$$


    In particular, the analysis of the rank of a matrix often plays an important role
    in graph analysis. We show some properties of the matrix rank in the following
    theorem:


    **Theorem 2.2** (i) *For a matrix $A \in \mathbb{R}^{m \times n}$, we have*


    $$\mathrm{rank}(A^\top) = \mathrm{rank}(A). \tag{2.12}$$'
  - '[PAGE 41]


    (ii) For matrices $A_1, A_2 \in \mathbb{R}^{m \times n}$, we have


    $$\operatorname{rank}(A_1 + A_2) \leq \operatorname{rank}(A_1) + \operatorname{rank}(A_2).
    \tag{2.13}$$


    (iii) For a matrix $A \in \mathbb{R}^{m \times n}$ and non-singular matrices $T_1
    \in \mathbb{R}^{m \times m}$ and $T_2 \in \mathbb{R}^{n \times n}$, we have


    $$\operatorname{rank}(A) = \operatorname{rank}(T_1 A) = \operatorname{rank}(A
    T_2) = \operatorname{rank}(T_1 A T_2). \tag{2.14}$$


    (iv) Matrices $A_1, A_2 \in \mathbb{R}^{m \times n}$ satisfy


    $$\operatorname{rank}(A_1) = \operatorname{rank}(A_2), \tag{2.15}$$


    if and only if there exist two non-singular matrices $T_1 \in \mathbb{R}^{m \times
    m}$ and $T_2 \in \mathbb{R}^{n \times n}$ such that


    $$A_2 = T_1 A_1 T_2. \tag{2.16}$$


    (v) If a matrix $A \in \mathbb{R}^{m \times n}$ satisfies


    $$\operatorname{rank}(A) = n, \tag{2.17}$$


    then $A^\top A$ is non-singular. In this case, for any vector $x \in \mathbb{R}^m$,
    there uniquely exist $y \in \mathbf{S} \triangleq \operatorname{imag}(A)$ and
    $z \in \mathbf{S}^\perp$ such that $x = y + z$, and these vectors are given by


    $$y = A(A^\top A)^{-1} A^\top x, \quad z = (I - A(A^\top A)^{-1} A^\top)x. \tag{2.18}$$


    The characterization of the image of a matrix is also important. This is sometimes
    done by the span of vectors in the space. The *span* of vectors $x_1, x_2, \ldots,
    x_n$ in $\mathbb{R}^m$ are defined by


    $$\operatorname{span}(x_1, x_2, \ldots, x_n) \triangleq \{\alpha_1 x_1 + \alpha_2
    x_2 + \cdots + \alpha_n x_n : \alpha_1, \alpha_2, \ldots, \alpha_n \in \mathbb{R}\}.
    \tag{2.19}$$


    This set is the minimum linear subspace that includes $\{x_1, x_2, \ldots, x_n\}$.
    That is, for any linear subspace $\mathbf{S} \subset \mathbb{R}^m$ including $\{x_1,
    x_2, \ldots, x_n\}$, we have


    $$\operatorname{span}(x_1, x_2, \ldots, x_n) \subset \mathbf{S}. \tag{2.20}$$


    Let us consider a matrix $A \in \mathbb{R}^{m \times n}$, and let $a_i \in \mathbb{R}^m$
    be the $i$th column vector of $A$, that is, $A = [a_1 \ a_2 \ \cdots \ a_n]$.
    Then we have


    $$\operatorname{span}(a_1, a_2, \ldots, a_n) = \operatorname{imag}(A). \tag{2.21}$$


