    Equations (3.38) and (3.42) imply (3.37). $\square$


    A similar result is obtained for the discrete-time case. Let $e[k] \triangleq
    x[k] - \alpha \mathbf{1}_n$, which is the disagreement vector in discrete time.
    The dynamics of $e[k]$ is given by


    $$e[k+1] = Pe[k]. \tag{3.43}$$


    Note that $\mu_i = 1 - \varepsilon \lambda_i$ for the eigenvalues $\mu_i$ ($i=1,
    2, \dots, n$) of $P$ from Lemma 2.4.


    The following result is a discrete-time version of Theorem 3.3:


    **Theorem 3.4** *Consider the multi-agent system given by (3.27) and (3.28). Assume
    that $G$ is a connected undirected network, and let $\mu_2 \in (0, 1)$ be the
    second largest eigenvalue of the Perron matrix $P$. Then*


    $$\|e[k+1]\| \leq \mu_2 \|e[k]\|, \tag{3.44}$$


    *i.e., the system achieves average consensus exponentially with a speed that is
    faster than or equal to $\mu_2$.*


    **Proof** From Lemma 2.23 (ii), we obtain


