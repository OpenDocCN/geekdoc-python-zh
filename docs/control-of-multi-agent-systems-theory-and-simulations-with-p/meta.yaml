    If a matrix $A \in \mathbb{R}^{n \times n}$ is similar to a diagonal matrix, then
    $A$ is said to be *diagonalizable*. From the Jordan canonical form, we have the
    following theorem:


    **Theorem 2.5** *A matrix $A \in \mathbb{R}^{n \times n}$ is diagonalizable if
    and only if $A$ is semi-simple.*


    From the above theorem, every semi-simple matrix $A \in \mathbb{R}^{n \times n}$
    has $n$ linearly independent eigenvectors $x_1, x_2, \ldots, x_n \in \mathbb{R}^n$.
    If $A$ is semi-simple, then $A^\top$ is also semi-simple, and hence $A^\top$ has
    $n$ linearly independent eigenvectors $y_1, y_2, \ldots, y_n \in \mathbb{R}^n$,
    that is,


    $$Ax_i = \lambda_i x_i \quad (2.38)$$

    $$A^\top y_i = \lambda_i y_i \quad (2.39)$$


    hold for any $i \in \{1, 2, \ldots, n\}$. From (2.39), we have


    $$y_i^\top A = \lambda_i y_i^\top. \quad (2.40)$$


    It follows that $y_i^\top$ is a left eigenvector of $A$. Since the eigenvectors
    $x_1, x_2, \ldots, x_n$ are linearly independent, the matrix $T \triangleq [x_1
    \ x_2 \ \cdots \ x_n]$ is non-singular. If we take $y_i$ such that $y_i^\top x_i
    = 1$ ($i = 1, 2, \ldots, n$), then it is easily shown that $T^{-1} = [y_1 \ y_2
    \ \cdots \ y_n]^\top$ holds. In summary, we have


    $$A = T \operatorname{diag}(\lambda_1, \lambda_2, \ldots, \lambda_n) T^{-1} =
    \sum_{i=1}^n \lambda_i x_i y_i^\top. \quad (2.41)$$


    We call the decomposition in (2.41) the *spectral decomposition* of semi-simple
    matrix $A$.


    ## 2.2.6 Spectral Mapping Theorem


    Here we introduce a useful tool to compute the eigenvalues of a *function* of
    a matrix. Let us consider a polynomial


    $$f(s) \triangleq \sum_{k=0}^N c_k s^k. \quad (2.42)$$


    For this, let us consider the *polynomial matrix* $f(A)$, which is obtained by
    replacing $s$ in (2.42) with $A \in \mathbb{R}^{n \times n}$. That is,


    $$f(A) \triangleq \sum_{k=0}^N c_k A^k, \quad (2.43)$$


    where we define $A^0 \triangleq I$. For polynomial matrix $f(A)$, we have the
    following theorem called the *spectral mapping theorem*:


    **Theorem 2.6** (spectral mapping theorem) *Let us consider a matrix $A \in \mathbb{R}^{n
    \times n}$ whose eigenvalues are $\lambda_1, \lambda_2, \ldots, \lambda_n$ (with
    multiplicity). Let $f(s)$ be a polynomial. Then the eigenvalues of polynomial
    matrix $f(A) \in \mathbb{R}^{n \times n}$ are $f(\lambda_1), f(\lambda_2), \ldots,
    f(\lambda_n)$ (with multiplicity).*


    **Example 2.5** (*Python*) To check Theorem 2.6, let us consider the following
    matrix:


    $$A = \begin{bmatrix} 0 & -1 & -1 \\ -1 & 1 & 0 \\ -1 & 0 & 1 \end{bmatrix}.$$


    The eigenvalues are obtained by


    ```python

    import numpy as np

    import numpy.linalg as LA


    A = np.array([[0,-1,-1],[-1,1,0],[-1,0,1]])

    s, V = LA.eig(A)

    print(s)

    ```


    From the result, the eigenvalues are $-1$, $2$, and $1$. Then, let us consider
    another matrix


    $$B = A^2 + A + I.$$


    The eigenvalues of $B$ are obtained from Theorem 2.6 as


    $$(-1)^2 + (-1) + 1 = 1, \quad 2^2 + 2 + 1 = 7, \quad 1^2 + 1 + 1 = 3.$$


    To confirm this, we run the following code:


    ```python

    B = A @ A + A + np.eye(3)

    s2, V2 = LA.eig(B)

    print(s2)

    ```


    The answer is $[7. \quad 1. \quad 3.]$, and the values are exactly the same as
    the theoretical values. $\square$


    ## 2.2.7 Gershgorin Circle Theorem


    First, the set of the eigenvalues of a matrix $A \in \mathbb{R}^{n \times n}$
    is called the *spectrum*, and the maximum absolute eigenvalue is called the *spectral
    radius*, which we denote by $\rho(A)$. Namely, for the eigenvalues $\lambda_1,
    \lambda_2, \ldots, \lambda_n$ of a matrix $A \in \mathbb{R}^{n \times n}$, the
    spectral radius $\rho(A)$ is defined by


    $$\rho(A) \triangleq \max(|\lambda_1|, |\lambda_2|, \ldots, |\lambda_n|).$$


    An upper bound of the spectral radius is obtained by the following theorem:


    **Theorem 2.7** *For a matrix $A \in \mathbb{R}^{n \times n}$, we have*


    $$\rho(A) \leq \|A\|,$$


    where $\|A\|$ is the induced norm by the Euclidean norm (2.5), defined by


    $$\|A\| \triangleq \max_{x \in \mathbb{R}^n \setminus \{0\}} \frac{\|Ax\|}{\|x\|}.$$


    *Moreover, if $A$ is symmetric, we have*


    $$\rho(A) = \|A\|.$$


    From this theorem, the closed circle in the complex plane with radius $\|A\|$
    and center 0 includes all the eigenvalues of $A$. Namely, we can roughly estimate
    a region of eigenvalues by using the value of $\|A\|$ without computing the eigenvalues.
    However, this estimation is not precise enough for many applications, and we want
    to obtain more accurate region. For this purpose, *Gershgorin circle theorem*
    is available.


    **Theorem 2.8** (Gershgorin circle theorem) *For a matrix $A = [a_{ij}] \in \mathbb{R}^{n
    \times n}$, define the following regions in $\mathbb{C}$ :*


    $$\mathbf{R}_i \triangleq \left\{ z \in \mathbb{C} : |z - a_{ii}| \leq \sum_{j
    \in \{1, 2, \ldots, n\} \setminus \{i\}} |a_{ij}| \right\},$$


    $$\mathbf{C}_j \triangleq \left\{ z \in \mathbb{C} : |z - a_{jj}| \leq \sum_{i
    \in \{1, 2, \ldots, n\} \setminus \{j\}} |a_{ij}| \right\},$$


    for $i, j \in \{1, 2, \ldots, n\}$. Let $\lambda_1, \lambda_2, \ldots, \lambda_n$
    be the eigenvalues of $A$. Then we have


    $$\{\lambda_1, \lambda_2, \ldots, \lambda_n\} \subseteq \mathbf{R} \triangleq
    \bigcup_{i=1}^n \mathbf{R}_i, \quad \{\lambda_1, \lambda_2, \ldots, \lambda_n\}
    \subseteq \mathbf{C} \triangleq \bigcup_{j=1}^n \mathbf{C}_j,$$


    and hence $\{\lambda_1, \lambda_2, \ldots, \lambda_n\} \subseteq \mathbf{R} \cap
    \mathbf{C}$.


    ![](img/6f6a40195ea61efdca2c32abeddbaaca_51_0.png)


    Fig.2.2 Regions of eigenvalues of $A$: $\mathbf{R} = \bigcup_{j=1}^3 \mathbf{R}_j$
    (left) and $\mathbf{C} = \bigcup_{j=1}^3 \mathbf{C}_j$ (right). Three eigenvalues
    are shown by bullets


    **Example 2.6** Let us consider the following matrix:


    $$A = \begin{bmatrix} 1 & -6 & 0 \\ 3 & 3 & 2 \\ -1 & 0 & 2 \end{bmatrix}.$$


    We find regions of eigenvalues by using Gershgorin circle theorem. From Theorem
    2.8, the sets $\mathbf{R}_i$ and $\mathbf{C}_j$ are given as


    $\mathbf{R}_1 = \{z \in \mathbb{C} : |z - 1| \leq 6\}$, $\mathbf{R}_2 = \{z \in
    \mathbb{C} : |z - 3| \leq 5\}$, $\mathbf{R}_3 = \{z \in \mathbb{C} : |z - 2| \leq
    1\}$,

    $\mathbf{C}_1 = \{z \in \mathbb{C} : |z - 1| \leq 4\}$, $\mathbf{C}_2 = \{z \in
    \mathbb{C} : |z - 3| \leq 6\}$, $\mathbf{C}_3 = \{z \in \mathbb{C} : |z - 2| \leq
    2\}$.


    Then, the sets $\mathbf{R} = \bigcup_{i=1}^3 \mathbf{R}_i$ and $\mathbf{C} = \bigcup_{j=1}^3
    \mathbf{C}_j$ are plotted in Fig. 2.2. The eigenvalues of $A$ are 2.69 and $1.66
    \pm 4.17\mathrm{j}$, and actually, they lie within the intersection $\mathbf{R}
    \cap \mathbf{C}$.


    The Python program for this example is given in Sect. 2.3.1. $\square$


    ## 2.2.8 Perron–Frobenius Theory


    Non-negative and positive matrices have interesting properties of their eigenvalues,
    which are summarized in the *Perron–Frobenius theory*. These properties are often
    used in analyzing networks and multi-agent systems.


    First, we introduce the concept of the *reducibility* of a matrix. A matrix $A
    \in \mathbb{R}^{n \times n}$ ($n \geq 2$) is said to be *reducible* if there exists
    a permutation matrix$^5$ $\Pi \in \mathbb{R}^{n \times n}$ such that


    $$\Pi^\top A \Pi = \begin{bmatrix} A_{11} & A_{12} \\ 0 & A_{22} \end{bmatrix},$$


    $^5$ A matrix $\Pi \in \{0, 1\}^{n \times n}$ is called a *permutation matrix*
    if there is precisely one entry equal to 1 in each row and column, and the other
    entries are all 0.


    where $A_{11}$ and $A_{22}$ are square matrices. For $n = 1$, $A$ is said to be
    reducible if $A = 0$.

    We say $A \in \mathbb{R}^{n \times n}$ is *irreducible* if $A$ is not reducible.
    For the irreducibility of a matrix, the following theorem is useful:


    **Theorem 2.9** *A matrix $A = [a_{ij}] \in \mathbb{R}^{n \times n}$ with $n \geq
    2$ is irreducible if and only if $(I + \text{abs}(A))^{n-1}$ is positive, that
    is,*

    $$(I + \text{abs}(A))^{n-1} > 0, \tag{2.52}$$

    *where $\text{abs}(A)$ is a matrix whose $(i, j)$-entry is $|a_{ij}|$, namely,
    $\text{abs}(A) = [|a_{ij}|] \in \mathbb{R}^{n \times n}$.*


    For non-negative matrices, the following theorem is known as *Perron–Frobenius
    theorem*:


    **Theorem 2.10** (*Perron–Frobenius theorem*) *Let $A \in \mathbb{R}^{n \times
    n}$ be a non-negative matrix. Then, the spectral radius $\rho(A)$ is an eigenvalue
    of $A$, associated with which there exists a non-negative eigenvector (i.e., an
    eigenvector whose elements are all non-negative). Moreover, if $A$ is also irreducible,
    then the following properties hold:*


    - (i) $\rho(A) > 0$.

    - (ii) $\rho(A)$ is a simple eigenvalue of $A$.

    - (iii) There exists a positive eigenvector (i.e., the elements are all positive)
