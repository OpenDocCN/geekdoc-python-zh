    # 3.3 Discrete-Time Case


    Now, we address consensus control in the discrete-time domain. Consider a multi-agent
    system, where agent $i$ is a discrete-time integrator:


    $$x_i[k+1] = x_i[k] + u_i[k], \tag{3.27}$$


