    of $L$ for the continuous-time system, and the second largest eigenvalue of $P$
    for the discrete-time system. See Theorems 3.3 and 3.4. For these theorems, the
    following theorem is important:


    **Theorem 2.23** Consider an undirected graph $G$. Let $L \in \mathbb{R}^{n \times
    n}$ be the graph Laplacian and let $P \in \mathbb{R}^{n \times n}$ be the Perron
    matrix for an arbitrarily given $\varepsilon > 0$.'
