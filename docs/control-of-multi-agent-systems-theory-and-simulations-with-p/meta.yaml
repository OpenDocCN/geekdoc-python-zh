    # 2.4.5 Perron Matrices


    Let us consider a graph $G = (\mathbf{V}, \mathbf{E})$ and its graph Laplacian
    $L \in \mathbb{R}^{n \times n}$. We define the *Perron matrix* $P \in \mathbb{R}^{n
    \times n}$ of $G$ with parameter $\varepsilon > 0$ by


    $$P \triangleq I - \varepsilon L. \tag{2.80}$$


    The Perron matrix and its eigenvalues also play important roles in the analysis
    of a graph, in particular, the analysis of the discrete-time dynamics of multi-agent
    systems (see e.g., Sect. 2.4.7 below) The eigenvalues of the Perron matrix $P$
    can be easily computed from the eigenvalues of the graph Laplacian $L$ from Theorem
    2.6. In fact, we have the following lemma:


    > **Lemma 2.4** *Let $L \in \mathbb{R}^{n \times n}$ and $P \in \mathbb{R}^{n
    \times n}$ be, respectively, the graph Laplacian and the Perron matrix with $\varepsilon
    > 0$ of a graph $G$. Let $\lambda_1, \lambda_2, \ldots, \lambda_n$ be the eigenvalues
    of $L$, and $\mu_1, \mu_2, \ldots, \mu_n$ be the eigenvalues of $P$. Then, with
    an appropriate ordering of the eigenvalues, we have*


    $$\mu_i = 1 - \varepsilon \lambda_i \tag{2.81}$$


    *for any $i \in \{1, 2, \ldots, n\}$. Moreover, any eigenvector (or left eigenvector)
    of $L$ associated with $\lambda_i$ is an eigenvector (or left eigenvector) of
    $P$ associated with $\mu_i$, and vice versa.*


    Similar to Lemma 2.3 for the graph Laplacian $L$, a region that includes all the
    eigenvalues of $P$ can be obtained.


    > **Lemma 2.5** *Let $P \in \mathbb{R}^{n \times n}$ be the Perron matrix with
    $\varepsilon > 0$ of a graph $G$. The eigenvalues of $P$ lie in the circle $\mathbf{R}_P$
    in $\mathbb{C}$ whose center is $1 - \varepsilon \Delta$ and whose radius is $\varepsilon
    \Delta$, that is,*


    $$\mathbf{R}_P \triangleq \{z \in \mathbb{C} : |z - (1 - \varepsilon \Delta)|
    \leq \varepsilon \Delta\}, \tag{2.82}$$'
