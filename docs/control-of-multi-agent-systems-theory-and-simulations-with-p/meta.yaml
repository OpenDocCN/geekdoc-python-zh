    $\|x\|$ The Euclidean norm of $x \in \mathbb{R}^n$, that is, $\|x\| \triangleq
    \sqrt{\langle x, x \rangle}$

    $\|x\|_p$ The $\ell^p$ norm ($1 \le p < \infty$) of $x \in \mathbb{R}^n$, that
    is, $\|x\|_p \triangleq \left\{ \sum_{i=1}^n |x_i|^p \right\}^{1/p}$. If $p =
    2$, we omit the subscript and write $\|x\|$

    $\|x\|_\infty$ The $\ell^\infty$ norm of $x \in \mathbb{R}^n$, that is, $\|x\|_\infty
    \triangleq \max\{|x_1|, |x_2|, \dots, |x_n|\}$

    $\mathbf{B}(c, r)$ The open ball with Euclidean norm of center $c$ and radius
    $r$, i.e., $\{x \in \mathbb{R}^n : \|x - c\| < r\}$

    $\overline{\mathbf{B}}(c, r)$ The closed ball $\{x \in \mathbb{R}^n : \|x - c\|
    \le r\}$

    $\mathbf{B}_p(c, r)$ The open ball with the $\ell^p$ norm of center $c$ and radius
    $r$, i.e., $\{x \in \mathbb{R}^n : \|x - c\|_p < r\}$

    $\overline{\mathbf{B}}_p(c, r)$ The closed ball $\{x \in \mathbb{R}^n : \|x -
    c\|_p \le r\}$. The unit ball $\mathbf{B}_p(0, 1)$ is sometimes abbreviated as
    $\mathbf{B}_p$

    $x \perp y$ Two vectors $x, y \in \mathbb{R}^n$ are orthogonal, that is, $\langle
    x, y \rangle = 0$

    $\text{span}(x_1, x_2, \dots, x_n)$ The linear span of vectors $x_1, x_2, \dots,
    x_n$

    $\text{span}(A)$ The linear span of column vectors $a_1, a_2, \dots, a_n$ of matrix
    $A = [a_1, a_2, \dots, a_n] \in \mathbb{R}^{m \times n}$

    $I_n$ The identity matrix in $\mathbb{R}^{n \times n}$. The subscript $n$ may
    be omitted if its dimension is clear

    $0_{m,n}$ The zero vector (or matrix) of size $m \times n$. We often omit the
    subscript $m, n$ and just write $0$

    $[x_i]$ The column vector consisting of $x_i$ as the $i$-th element

    $[x_i]_{i \in \mathbf{I}}$ The column vector consisting of $x_i$ with $i \in \mathbf{I}$

    $[a_{ij}]$ The matrix consisting of $a_{ij}$ as the $(i, j)$-th element

    $[a_{ij}]_{(i,j) \in \mathbf{E}}$ The matrix consisting of $a_{ij}$ with $(i,
    j) \in \mathbf{E}$

    $A^\top$ The transpose of matrix $A$

    $\text{abs}(A)$ The absolute-value matrix defined by $\text{abs}(A) \triangleq
    [[|a_{ij}|]]$ for $A = [a_{ij}]$

    $\text{ker}(A)$ The kernel (or the null space) of matrix $A$

    $\text{imag}(A)$ The image of matrix $A$

    $\text{rank}(A)$ The rank of matrix $A$

    $\text{det}(A)$ The determinant of square matrix $A$

    $A^{-1}$ The inverse matrix (if it exists) of square matrix $A$

    $A \otimes B$ The Kronecker product of matrices $A$ and $B$

