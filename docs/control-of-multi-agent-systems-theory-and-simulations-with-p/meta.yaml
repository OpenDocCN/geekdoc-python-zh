    ### 3.2.1 Consensus Controllers for Integrator Agents


    Now, we present a consensus controller for the most fundamental class of multi-agent
    systems.


    Consider a multi-agent system with integrator agents, i.e., the dynamics of agent
    $i$ is given by


    $$\dot{x}_i(t) = u_i(t), \tag{3.10}$$


    where $x_i(t) \in \mathbb{R}$ and $u_i(t) \in \mathbb{R}$. The controller is a
    relative-state-based one:


    $$u_i(t) = \sum_{j \in \mathbf{N}_i} (x_j(t) - x_i(t)), \tag{3.11}$$


    which is the sum of its relative states with respect to the neighbors. This controller
    is called the *consensus controller* or *consensus protocol*.$^1$


    The following example demonstrates consensus controllers:


    **Example 3.2** Consider the multi-agent system given by (3.10) and (3.11), where
    $n = 6$, $\mathbf{N}_1 = \{2\}$, $\mathbf{N}_2 = \{3, 5\}$, $\mathbf{N}_3 = \{4\}$,
    $\mathbf{N}_4 = \{1, 2\}$, $\mathbf{N}_5 = \{6\}$, and $\mathbf{N}_6 = \{2\}$.
    The network is illustrated in Fig. 3.1a.


    Figure 3.2 shows the state evolution calculated by Python Code 3.1 to be presented
    in Sect. 3.5 for the initial states $x_1(0) = -1$, $x_2(0) = 2$, $x_3(0) = 6$,
    $x_4(0) = 3$, $x_5(0) = -3$, and $x_6(0) = 1$. It is observed that the system
    achieves consensus by the consensus controllers in (3.11).


    Meanwhile, the following example is worth noting:


    **Example 3.3** Consider the modified version of the multi-agent system in Example
    3.2, where $\mathbf{N}_2 = \{3\}$, $\mathbf{N}_6 = \emptyset$, and the others
    are the same as Example 3.2. The network is illustrated in Fig. 3.1b.


    Figure 3.3 shows the state evolution for the same initial states as in Example
    3.2. Unlike the case of Example 3.2, the system does not achieve consensus because
    there exists no information pathway between some pair of agents such as the pair
    of agents 1 and 6. This suggests that the controllers in (3.11) do not always
    achieve consensus and that the consensus property, i.e., whether the system achieves
    consensus or not, depends on the structure of the network. □


    $^1$ Consensus is often called the *agreement*. When using this terminology, the
    controller in (3.11) is called the *agreement controller* or *agreement protocol*.


    **Fig. 3.2** State evolution for the network in Fig. 3.1a (Python Code 3.1)


    **Fig. 3.3** State evolution for the network in Fig. 3.1b


    ### 3.2.2 Conditions for Consensus


    Now, we consider conditions for a multi-agent system with the consensus controllers
    to achieve consensus.


    First, let us derive the collective dynamics of the multi-agent system given by
    (3.10) and (3.11). Let $A \in \{0, 1\}^{n \times n}$, $D \in \mathbb{N}^{n \times
    n}$, and $L \in \mathbb{Z}^{n \times n}$ be the adjacency matrix, the degree matrix,
    and the graph Laplacian of the network $G$, and let $a_{ij} \in \{0, 1\}$ be the
    $(i, j)$-element of $A$, i.e.,


    $$a_{ij} = \begin{cases} 0 & \text{if } j \notin \mathbf{N}_i, \\ 1 & \text{if
    } j \in \mathbf{N}_i. \end{cases} \quad (3.12)$$


    We use $x(t) \in \mathbb{R}^n$ and $u(t) \in \mathbb{R}^n$ to express the collective
    state and input, respectively, i.e., $x(t) = [x_1(t) \ x_2(t) \ \cdots \ x_n(t)]^\top$
    and $u(t) = [u_1(t) \ u_2(t) \ \cdots \ u_n(t)]^\top$. Then the collective dynamics
    of the agents in (3.10) is represented by


    $$\dot{x}(t) = u(t). \quad (3.13)$$


    On the other hand, the collective controller is given by


    $$u(t) = -(D - A)x(t) = -Lx(t) \quad (3.14)$$


    because the right-hand side of (3.11) is rewritten as


    $$\sum_{j \in \mathbf{N}_i} (x_j(t) - x_i(t)) = \sum_{j \in \mathbf{N}_i} x_j(t)
    - \sum_{j \in \mathbf{N}_i} x_i(t) = \sum_{j=1}^n a_{ij} x_j(t) - |\mathbf{N}_i|
    x_i(t), \quad (3.15)$$


    where the first and second terms result in $A$ and $D$ in (3.14), respectively.
    From (3.13) and (3.14), we have the collective dynamics of the multi-agent system
    is as follows:


    $$\dot{x}(t) = -Lx(t). \quad (3.16)$$


    Next, we analyze the solution of the collective dynamics in (3.16). From Theorem
    2.15, the solution is given by


    $$x(t) = e^{-Lt} x(0). \quad (3.17)$$


    If $G$ has a spanning tree, then


    $$\lim_{t \to \infty} e^{-Lt} = \left( \frac{1}{v_1 \mathbf{1}_n} \right) \mathbf{1}_n
    v_1 \quad (3.18)$$


    which implies that the system achieves consensus at $(v_1x(0))/(v_1\mathbf{1}_n)$.
    Based on this discussion, the following result is obtained:


    **Theorem 3.1** Consider the multi-agent system given by (3.10) and (3.11). The
    following statements hold.


    (i) The system achieves consensus if and only if $G$ has a spanning tree.

    (ii) If the system achieves consensus, the consensus value is given by


    $$\alpha = \frac{v_1x(0)}{v_1\mathbf{1}_n}, \tag{3.20}$$


    where $v_1 \in \mathbb{R}^{1 \times n}$ is the left eigenvector of $L$ associated
    with its zero eigenvalue. Moreover, if $G$ is a balanced network, then


    $$\alpha = \frac{1}{n} \sum_{i=1}^n x_i(0), \tag{3.21}$$


    *i.e.*, the system achieves average consensus.


    **Proof** The remaining part is to prove:


    (a) The system does not achieve consensus if $G$ has no spanning tree,

    (b) Equation (3.21) holds if $G$ is balanced.


    (a) Assume that $G$ has no spanning tree. From Theorem 2.21, the graph Laplacian
    $L$ has a zero eigenvalue of algebraic multiplicity more than one, which is semi-simple.
    Therefore, there exists an eigenvector $q \in \mathbb{R}^n$ associated with the
    zero eigenvalue such that $q$ and $\mathbf{1}_n$ are linearly independent ($q
    \notin \text{span}(\mathbf{1}_n)$). Since $Lq = 0$ by the definition of $q$, $q$
    is an equilibrium of the system in (3.16). Thus $\lim_{t \to \infty} x(t) = q$
    for $x(0) = q$ and then $q \notin \text{span}(\mathbf{1}_n)$, which implies that
    the system does not achieve consensus.


    (b) If $G$ is balanced, then $v_1 \in \text{span}(\mathbf{1}_n)$ from Theorem
    2.19. This fact and (3.20) imply (3.21).


    **Example 3.4** Consider the multi-agent system in Example 3.2, whose network
    structure is shown in Fig. 3.1a. Since the network structure has a spanning tree
    in Fig. 3.4, the system achieves consensus from Theorem 3.1 (i).


    **Fig. 3.4** A spanning tree of the network in Fig. 3.1


    The consensus value is calculated as follows: From (3.16), the collective dynamics
    is given by


    $$\dot{x}(t) = -Lx(t) = \begin{bmatrix} 1 & -1 & 0 & 0 & 0 & 0 \\ 0 & 2 & -1 &
    0 & -1 & 0 \\ 0 & 0 & 1 & -1 & 0 & 0 \\ -1 & -1 & 0 & 2 & 0 & 0 \\ 0 & 0 & 0 &
    0 & 1 & -1 \\ 0 & -1 & 0 & 0 & 0 & 1 \end{bmatrix} x(t). \quad (3.22)$$


    Since $[1\ 2\ 2\ 1\ 2\ 2]$ is a left eigenvector of $L$ associated with its zero
    eigenvalue, we have


    $$\alpha = \frac{(1 \times (-1)) + (2 \times 2) + (2 \times 6) + (1 \times 3)
    + (2 \times (-3)) + (2 \times 1)}{1 + 2 + 2 + 1 + 2 + 2} = 1.4$$


    from (3.21).


    This analysis is consistent with the result in Example 3.2.


    For the case of undirected networks, we have a more specific result.


    **Corollary 3.1** *Consider the multi-agent system in Theorem 3.1. If $G$ is an
    undirected network, the following statements hold:*


    (i) *The system achieves consensus if and only if $G$ is connected.*

    (ii) *If the system achieves consensus, the consensus value is given by (3.21),
    i.e., the system achieves average consensus.*


    **Proof** *If $G$ is undirected, then*


    (a) $G$ is balanced,

    (b) $G$ has a spanning tree if and only if $G$ is connected


    from the definitions of undirected graphs, balanced graphs, and Lemma 2.1. These
    facts and Theorem 3.1 prove (i) and (ii).


    ---


    The first four consensus values are fairly basic in sensor networks, in which
    the measurements of distributed sensors are statistically processed. The final
    value is considered, e.g., when the leader agent wants to distribute a command
    over the agents.


    If the system achieves consensus at $\alpha$ in (3.5), we call that *the system
    achieves average consensus*. Similar terminologies are used for the other consensus
    values.


    **Example 3.1** Consider a multi-agent system with $n = 6$ and $m = 1$. If $x_1(0)
    = 1$, $x_2(0) = 2$, $x_3(0) = 6$, $x_4(0) = 3$, $x_5(0) = 3$, $x_6(0) = 1$, then:


    - Average consensus: $\alpha = (1/6)(1 + 2 + 6 + 3 + 3 + 1) = 8/3$.

    - Geometric-mean consensus: $\alpha = \sqrt[6]{1 \times 2 \times 6 \times 3 \times
    3 \times 1} \simeq 2.18$.

    - Maximum consensus: $\alpha = \max_{i \in \{1,2,\dots,6\}} x_i(0) = 6$.

    - Minimum consensus: $\alpha = \min_{i \in \{1,2,\dots,6\}} x_i(0) = 1$.

    - Leader-follower consensus with agent 4 as the leader: $\alpha = x_4(0) = 3$.


    - Geometric-mean consensus (for $m = 1$):


    $$\alpha = \left(\prod_{i=1}^{n} x_i(0)\right)^{\frac{1}{n}}, \quad (3.6)$$


    where $x_i(0) > 0$ for all $i$.


    - Maximum consensus (for $m = 1$):


    $$\alpha = \max_{i \in \mathbf{V}} x_i(0). \quad (3.7)$$


    - Minimum consensus (for $m = 1$):


    $$\alpha = \min_{i \in \mathbf{V}} x_i(0). \quad (3.8)$$


    - Leader-follower consensus:


    $$\alpha = x_\ell(0), \quad (3.9)$$


    where agent $\ell \in \mathbf{V}$ is the leader of the system.'
