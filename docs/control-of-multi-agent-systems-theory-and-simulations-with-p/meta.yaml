    velocities of the nodes that do not change the equivalence conditions between
    nodes are called *infinitesimal motions*. In distance-constrained formation, if
    the infinitesimal motions include only the translational and rotational motions,
    it is also called *trivial motions*. The motions of nodes that keep the congruence
