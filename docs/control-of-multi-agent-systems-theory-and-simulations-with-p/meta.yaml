    w_1. \quad (2.86)$$


    **Proof (i)** Let $S \in \mathbb{R}^{n \times n}$ be a nonsingular matrix that
    transforms $L$ to the Jordan form


    $$S^{-1}LS = \begin{bmatrix} 0 & 0 & 0 & \cdots & 0 \ 0 & J_1 & 0 & & 0 \ 0 &
    0 & J_2 & \ddots & \vdots \ \vdots & & \ddots & \ddots & 0 \ 0 & 0 & \cdots &
    0 & J_r \end{bmatrix}, \quad (2.87)$$


    and let $s_1 \in \mathbb{R}^n$ and $s_1^* \in \mathbb{R}^{1 \times n}$ be the
    first column vector of $S$ and the first row vector of $S^{-1}$, respectively.
    Note that $s_1^* s_1 = 1$ because of $S^{-1}S = I$. Since $LS = SJ$, $L\mathbf{1}_n
    = 0$, and $v_1 L = 0$, a pair of $s_1$ and $s_1^*$ is given by $\mathbf{1}_n$
    and $(v_1 \mathbf{1}_n)^{-1} v_1$, while $s_1 s_1^*$ is a constant matrix for
    any choice of $s_1$ and $s_1^*$. Since $-J_i$ ($i = 1, 2, \ldots, n$) are Hurwitz
    from Theorems 2.18 and 2.16, and the fact that $G$ has a spanning tree, it follows
    from Theorem 2.21 that


    $$\lim_{t \to \infty} e^{-Lt} = \lim_{t \to \infty} e^{-(SJS^{-1})t} = \lim_{t
    \to \infty} Se^{-Jt}S^{-1} = \lim_{t \to \infty} S \begin{bmatrix} 1 & 0 & 0 &
    \cdots & 0 \ 0 & e^{-J_1 t} & 0 & & 0 \ 0 & 0 & e^{-J_2 t} & \ddots & \vdots \
    \vdots & & \ddots & \ddots & 0 \ 0 & 0 & \cdots & 0 & e^{-J_r t} \end{bmatrix}
    S^{-1}$$


    $$= S \begin{bmatrix} 1 & 0 & 0 & \cdots & 0 \ 0 & 0 & 0 & & 0 \ 0 & 0 & 0 & \ddots
    & \vdots \ \vdots & & \ddots & \ddots & 0 \ 0 & 0 & \cdots & 0 & 0 \end{bmatrix}
    S^{-1} = s_1 s_1^* = \mathbf{1}_n \left( \frac{1}{v_1 \mathbf{1}_n} \right) v_1
    = \left( \frac{1}{v_1 \mathbf{1}_n} \right) \mathbf{1}_n v_1,$$


    which proves (2.85).


    (ii) It is proved in the same way as (i).


