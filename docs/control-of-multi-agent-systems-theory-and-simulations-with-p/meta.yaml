    It is easy to verify that the input $P_{g_{ij}} g_{ij}^*$ is perpendicular to
    the bearing vector $g_{ij}$ for all $t \geq 0$. So, the agents may move along
    the perpendicular direction until $g_{ij} \to g_{ij}^*$ as $t \to \infty$ since
    $P_{g_{ij}^*} g_{ij}^* = 0$. Let us define the centroid and scale of the formation
    as


    $$p^c(t) \triangleq \frac{1}{n} \sum_{i=1}^n p_i(t) \quad \text{and} \quad s(t)
    \triangleq \sqrt{\frac{1}{n} \sum_{i=1}^n \|p_i(t) - p^c\|^2}. \tag{5.66}$$


    Noticing that $\tilde{R}_z$ and $R_z$ have the same null space, we can make the
    following result:


    **Lemma 5.10** *The centroid $p^c(t)$ and scale $s(t)$ are stationary, i.e., $p^c(t)
    = p^c(0)$ and $s(t) = s(0)$ for all $t \geq 0$.*


