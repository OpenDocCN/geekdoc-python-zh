    $$g(\alpha) \triangleq f(x[k] - \alpha \nabla f(x[k])),$$

    $$g''(\alpha) \triangleq \frac{dg(\alpha)}{d\alpha} = -\nabla f(x[k] - \alpha
    \nabla f(x[k]))^\top \nabla f(x[k]).$$


    This is called the *Armijo rule*.


    (ii) Choose $\alpha_k$ such that


    $$g(\alpha_k) \leq g(0) + \sigma_1 g''(0)\alpha_k, \quad g(\alpha_k) \geq \sigma_2
    g''(0)$$


    hold for some $\sigma_1, \sigma_2 \in (0, 1)$. This is called the *Wolfe rule*.


    (iii) Suppose that $\nabla f$ is *Lipschitz continuous* with constant $L > 0$,
    that is,


    $$\|\nabla f(x) - \nabla f(y)\| \leq L\|x - y\|,$$


    holds for any $x, y \in \mathbb{R}^n$. Choose a *fixed step size* $\alpha_k =
    \alpha$ that satisfies $\alpha \in (0, 2/L)$.


    For the *fixed step-size* method, we have the following convergence result [6,
    Proposition 1.2.2]:


    **Theorem 6.2** *Let $\{x[k]\}$ be the sequence generated by the gradient descent
    algorithm (6.18) with $\alpha_k = \alpha$ for all $k \in \{0, 1, 2, \dots\}$.
    Suppose that there exists $L > 0$ that satisfies (6.23). If $\alpha \in (0, 2/L)$,
    then the limit point*


    $$\tilde{x} \triangleq \lim_{k \to \infty} x[k]$$


    *is stationary, that is, $\tilde{x}$ satisfies (6.17).*


    **Example 6.1** *Let us consider the following quadratic function:*


    $$f(x) = \frac{1}{2}x^\top Px - q^\top x,$$


    where $P = P^\top \in \mathbb{R}^{n \times n}$ is positive-definite, and $q \in
    \mathbb{R}^n$. Since $f(x)$ can be rewritten as


    $$f(x) = \frac{1}{2}(x - P^{-1}q)^\top P(x - P^{-1}q) - q^\top P^{-1}q,$$


    the minimum value of $f(x)$ is achieved at


    $$x^* = P^{-1}q.$$


    This can be also understood since the gradient $\nabla f$ is given by


    $$\nabla f(x) = Px - q.$$


    Now, we use the gradient descent algorithm to find $x^*$ in (6.27). The algorithm
    is described as


    $$x[k+1] = x[k] - \alpha \nabla f(x[k]) = x[k] - \alpha (Px[k] - q), \quad (6.29)$$


    where we assume a fixed step size. Let $\Phi \triangleq I - \alpha P$. Then the
    iteration (6.29) is rewritten as


    $$x[k+1] = \Phi x[k] + \alpha q. \quad (6.30)$$


    It follows that


    $$x[k] = \Phi^k x[0] + \sum_{\tau=0}^{k-1} \Phi^\tau \alpha q. \quad (6.31)$$


    From (6.28), we can choose a Lipschitz constant $L$ that satisfies (6.23) as the
    maximum eigenvalue of $P$, which we denote by $\lambda_{\max}(P)$. Then if the
    condition $\alpha \in (0, 2/L)$ in Theorem 6.2 holds, then


    $$|\lambda_i(\Phi)| = |\lambda_i(I - \alpha P)| = |1 - \alpha \lambda_i(P)| <
    1, \quad \forall i \in \{1, 2, \dots, n\}, \quad (6.32)$$


    where $\lambda_i(\Phi)$ is the $i$-th eigenvalue of matrix $\Phi$. Hence, we have
    $\Phi^k \to 0$ as $k \to \infty$. Also, the sum of $\Phi^\tau$ in (6.31) satisfies


    $$\sum_{\tau=0}^{k-1} \Phi^\tau = (I - \Phi)^{-1}(I - \Phi^k) \to (I - \Phi)^{-1}
    = \alpha^{-1} P^{-1}. \quad (6.33)$$


    It follows from (6.31) that


    $$\lim_{k \to \infty} x[k] = \alpha^{-1} P^{-1} \alpha q = P^{-1} q, \quad (6.34)$$


    which is exactly the same as (6.27).


    ## 6.3.2 Gradient Projection Algorithm


    Now, we consider a constrained optimization


    $$\min_{x \in \mathbb{R}^n} f(x) \quad \text{subject to} \quad x \in \mathbf{C},
    \quad (6.35)$$


    where $\mathbf{C}$ is a closed, non-empty, and convex subset of $\mathbb{R}^n$.


    Then, the *gradient projection algorithm* is given by


    $$x[k+1] = \Pi_{\mathbf{C}}(x[k] - \alpha \nabla f(x[k])), \quad k = 0, 1, 2,
    \ldots \tag{6.37}$$


    We here consider a fixed step size. The gradient projection algorithm alternately
    applies the gradient descent algorithm in (6.18) and the projection $\Pi_{\mathbf{C}}$
    onto $\mathbf{C}$. For the convergence of the algorithm (6.37), the following
    theorem [6, Proposition 3.3.2] is very similar to Theorem 6.2 for the gradient
    descent algorithm:


    **Theorem 6.3** Let $\{x[k]\}$ be the sequence generated by the gradient projection
    algorithm (6.37) with $\alpha_k = \alpha$ for all $k \in \{0, 1, 2, \ldots\}$.
    Suppose that there exists $L > 0$ that satisfies (6.23). If $\alpha \in (0, 2/L)$,
    then the limit point of $\{x[k]\}$ is a solution to the constrained optimization
    problem (6.35).


    **Example 6.2** Here, we consider the *least norm problem*, where we minimize
    the quadratic function (6.25) with $P = I$ and $q = 0$ (i.e., $f(x) = \frac{1}{2}\|x\|^2$)
    under the constraint $x \in \mathbf{C}$ with


    $$\mathbf{C} = \{x \in \mathbb{R}^n : Ax = b\}, \tag{6.38}$$


    where $A \in \mathbb{R}^{m \times n}$ ($m \ge n$) has full row rank, and $b \in
    \mathbb{R}^m$. The least norm problem is to seek the nearest point (measured by
    the $\ell^2$ norm) from the origin to the *hyperplane* $\mathbf{C} \subset \mathbb{R}^n$
    defined in (6.38). First, the projection $\Pi_{\mathbf{C}}$ is computed as (see
    Exercise i)


    $$\Pi_{\mathbf{C}}(v) = v + A^+(b - Av), \tag{6.39}$$


    where $A^+$ is *Moore–Penrose pseudo-inverse* of $A$ defined by


    $$A^+ \triangleq A^\top (AA^\top)^{-1}. \tag{6.40}$$


    Note that since $A$ has full row rank, the matrix $AA^\top$ is invertible. Then,
    we solve the optimization problem (6.35). Since $\nabla f(x) = x$, the gradient
    projection algorithm is given by


    $$\begin{aligned} x[k+1] &= \Pi_{\mathbf{C}}(x[k] - \alpha x[k]) \\ &= (1 - \alpha)x[k]
    + A^+(b - A(1 - \alpha)x[k]) \\ &= (1 - \alpha)(I - A^+A)x[k] + A^+b. \end{aligned}
    \tag{6.41}$$


    From this, we have


    $$\begin{aligned} x[k] &= (1 - \alpha)^k(I - A^+A)^k x[0] + \sum_{\tau=0}^{k-1}
    (1 - \alpha)^\tau (I - A^+A)^\tau A^+b \\ &= (1 - \alpha)^k(I - A^+A)^k x[0] +
    A^+b + \sum_{\tau=1}^{k-1} (1 - \alpha)^\tau (I - A^+A)^\tau A^+b. \end{aligned}
    \tag{6.42}$$


    Since $AA^+ = I$, we have $(I - A^+A)A^+ = A^+ - A^+ = 0$ and


    $$(I - A^+A)^\tau A^+b = (I - A^+A)^{\tau-1}(I - A^+A)A^+b = 0 \quad (6.43)$$


    for $\tau = 1, 2, \ldots, k - 1$. Therefore, we have


    $$x[k] = (1 - \alpha)^k(I - A^+A)^kx[0] + A^+b. \quad (6.44)$$


    Then, the Lipschitz constant $L$ of $\nabla f(x) = x$ is 1, and the condition
    for convergence in Theorem 6.3 is $0 < \alpha < 2$. Since the eigenvalues of $A^+A$
    are 0 or one [3, Proposition 6.1.6], the eigenvalues of $(1 - \alpha)(I - A^+A)$
    are in the open unit disc $\{z \in \mathbb{C} : |z| < 1\}$. Therefore, $(1 - \alpha)^k(I
    - A^+A)^k \to 0$ as $k \to \infty$, and the sequence $\{x[k]\}$ satisfies


    $$\lim_{k \to \infty} x[k] = A^+b. \quad (6.45)$$


    This is actually the solution to the least norm problem. $\square$


    **Example 6.3** (*Python*) Now, we solve the optimization problem


    $$\min_{x \in \mathbb{R}^n} \frac{1}{2} \|x\|^2 \quad \text{subject to} \quad
    Ax = b, \quad (6.46)$$


    with $A$ and $b$ as considered for group testing in Sect. 6.2. The gradient projection
    algorithm in (6.41) is implemented in Python Code 6.2 in Sect. 6.6.2. Figure 6.6
    shows the error between $x[k]$ and the closed-form solution to (6.46) given by
    $A^+b$. From this result, we can say the property in (6.45) holds within the machine
    precision less than $10^{-14}$. $\square$


    ![](img/6f6a40195ea61efdca2c32abeddbaaca_187_0.png)


    **Fig. 6.6** Error $\|x[k] - A^+b\|$ by the gradient projection algorithm


    ## 6.3.3 Subgradient Methods


    Here, we consider the optimization problem (6.35) with non-differentiable $f :
    \mathbb{R}^n \to \mathbb{R} \cup \{+\infty\}$. In this case, we can also design
    an efficient algorithm similar to the gradient projection algorithm, by using
    a subgradient. A vector $g \in \mathbb{R}^n$ is a *subgradient* of $f$ at a point
    $z \in \text{dom}(f)$ if


    $$f(x) \geq f(z) + g^\top(x - z), \quad \forall x \in \mathbb{R}^n. \tag{6.47}$$


    The set of all subgradients of $f$ at $z \in \text{dom}(f)$ is called the *subdifferential*
    of $f$ at $z \in \text{dom}(f)$, and denoted by $\partial f(z)$.


    Figure 6.7 illustrates the geometry of a subgradient. The hyperplane $\mathbf{P}
    \subset \mathbb{R}^{n+1}$ including a point $(z, f(z)) \in \mathbb{R}^{n+1}$ can
    be represented by


    $$a^\top(x - z) + b(y - f(z)) = 0, \tag{6.48}$$


    for some $a \in \mathbb{R}^n$ and $b \in \mathbb{R}$. We assume $b \neq 0$, and
    define $g \triangleq a/b$. Then the equation (6.48) becomes


    $$y = f(z) + g^\top(x - z). \tag{6.49}$$


    The upper space of the hyperplane $\mathbf{P}$ is described by


    $$y \geq f(z) + g^\top(x - z), \tag{6.50}$$


    ![](img/6f6a40195ea61efdca2c32abeddbaaca_188_0.png)


    **Fig. 6.7** The epigraph epi(f) of $f$ and a supporting hyperplane $\mathbf{P}$'
