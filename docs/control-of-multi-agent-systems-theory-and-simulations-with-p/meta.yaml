    # $\ell^{\infty}$ Norm


    Let us consider the $\ell^{\infty}$ norm $\|x\|_{\infty} = \max\{|x_i| : i = 1,
    2, \ldots, n\}$. Its proximal operator is given by


    $$\operatorname{prox}_{\gamma \|\cdot\|_{\infty}}(v) = v - \gamma \Pi_{\bar{\mathbf{B}}_1}(v/\gamma),$$


    where $\bar{\mathbf{B}}_1$ is the $\ell^1$ *unit ball* defined by


    $$\bar{\mathbf{B}}_1 \triangleq \{x \in \mathbb{R}^n : \|x\|_1 \le 1\}.$$


    We note that the projection $\Pi_{\bar{\mathbf{B}}_1}(v)$ onto this set has no
    closed-form, and we need to rely on numerical computation for the projection.
    See [16, Sect. 6.5] for details.


    # 6.4.2 Proximal Gradient Algorithm


    Now, we consider the following unconstrained optimization problem:


    $$\operatorname{minimize}_{x \in \mathbb{R}^n} f(x) + g(x),$$


    where $f$ is a differentiable and convex function satisfying $\operatorname{dom}(f)
    = \mathbb{R}^n$, and $g : \mathbb{R}^n \to \mathbb{R} \cup \{+\infty\}$ is a proper,
    closed, and convex function. We also assume that $g$ is *proximable*, that is,
    $g$ has a closed form of its proximal operator, like the $\ell^1$ norm considered
    above. For example, we can consider the $\ell^1$-regularized *least squares*,
    also known as *LASSO* (*Least Absolute Shrinkage and Selection Operator*) described
    by


    $$\operatorname{minimize}_{x \in \mathbb{R}^n} \|Ax - b\|^2 + \lambda \|x\|_1,$$


    where $A \in \mathbb{R}^{n \times n}$, $b \in \mathbb{R}^n$, $\lambda > 0$ are
    fixed.


    The *proximal gradient algorithm* for (6.78) is given as follows:


    $$x[k+1] = \operatorname{prox}_{\gamma g}\left(x[k] - \gamma \nabla f(x[k])\right),
    \quad k = 0, 1, 2, \ldots$$


