p;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp'
  mdcn: '## 4.8.2 拉萨尔不变性原理


    考虑系统


    $$\dot{x}(t) = f(x(t)), \tag{4.51}$$


    其中 $x(t) \in \mathbb{R}^n$ 是状态，$f : \mathbb{R}^n \to \mathbb{R}^n$ 是一个函数。假设对于每个
    $x(0) \in \mathbf{X}$，系统在时间区间 $[0, \infty)$ 上有唯一解，其中 $\mathbf{X} \subseteq \mathbb{R}^n$
    是一个集合。


    对于该系统，如果对于任意 $x(0) \in \mathbf{D}$，都有


    $$x(t) \in \mathbf{D}, \quad \forall t \in \mathbb{R}_+ \tag{4.52}$$


    则集合 $\mathbf{D} \subseteq \mathbf{X}$ 被称为*不变集*。


    拉萨尔不变性原理关注的是系统 (4.51) 的一种稳定性。以下结果是拉萨尔不变性原理的推广版本，其意义在于初始状态集不一定是闭集，这与拉萨尔不变性原理的典型情况不同。这个版本在保证覆盖控制的收敛性方面起着重要作用：


    **引理 4.13** *考虑系统 (4.51) 和一个有界集 $\mathbf{D} \subset \mathbb{R}^n$，使得对于每个 $x(0)
    \in \mathbf{D}$，系统在时间区间 $[0, \infty)$ 上有唯一解，并且 $\mathbf{D}$ 是系统的一个不变集。如果*


    *(a) 存在一个连续可微函数 $V : \mathbb{R}^n \to \mathbb{R}$，使得对于每个 $x \in \mathbf{D}$，$\dot{V}(x)
    \leq 0$，*


    *(b) 不存在 $x(0) \in \mathbf{D}$ 使得当 $t \to \infty$ 时 $x(t)$ 收敛到集合 $\text{cl}(\mathbf{D})
    \setminus \mathbf{D}$，*


    *那么，对于每个 $x(0) \in \mathbf{D}$，当 $t \to \infty$ 时，$x(t)$ 收敛到包含在 $\mathbf{E} \triangleq
    \{x \in \mathbf{D} : \dot{V}(x) = 0\}$ 中的最大不变集，其中“最大不变集”是指包含所有包含在 $\mathbf{E}$
    中的不变集的不变集。$\square$*


    **证明** 考虑给定 $x(0) \in \mathbf{D}$ 的解 $x(t)$。由于 $\mathbf{D}$ 是一个有界不变集，$x(t)$ 在时间区间
    $[0, \infty)$ 上是有界的且属于 $\mathbf{D}$。根据文献 [6] 中的引理 4.1，$x(t)$ 存在一个（非空的）$\omega$-极限集$^2$。我们将
    $\omega$-极限集记为 $\mathbf{O}(x(0))$。由于 $\mathbf{D}$ 是一个有界不变集，在条件 (b) 下，我们有 $\mathbf{O}(x(0))
    \subseteq \mathbf{D}$（参见文献 [6] 中的引理 4.1）。那么，如后文所证，可得：


    $$\mathbf{O}(x(0)) \subseteq \mathbf{M}, \tag{4.53}$$


    其中 $\mathbf{M}$ 是包含在 $\mathbf{E}$ 中的最大不变集。回顾 $\mathbf{O}(x(0))$ 是 $x(t)$ 的 $\omega$-极限集，(4.53)
    意味着当 $t \to \infty$ 时，$x(t)$ 收敛到 $\mathbf{M}$。


    接下来，我们证明 (4.53)。再次考虑上述 $x(0) \in \mathbf{D}$ 的解 $x(t)$。根据 $\omega$-极限集的定义，对于每个
    $p \in \mathbf{O}(x(0))$，存在一个序列 $(t_1, t_2, \dots) \in \mathbb{R}_+^\infty$ 使得
    $\lim_{k \to \infty} t_k = \infty$ 且


    $$\lim_{k \to \infty} V(x(t_k)) = V(p). \tag{4.54}$$


    另一方面，由于 $V(x)$ 连续且在有界集 $\mathbf{D}$ 上 $\dot{V}(x) \leq 0$，我们有 $\lim_{t \to \infty}
    V(x(t)) = \alpha$，其中 $\alpha \in \mathbb{R}$。因此，由 $V(x)$ 的连续性可知，对于同一个序列 $(t_1,
    t_2, \dots)$，


    $$\lim_{k \to \infty} V(x(t_k)) = \alpha \tag{4.55}$$


    方程 (4.54) 和 (4.55) 意味着


    $$V(p) = \alpha, \quad \forall p \in \mathbf{O}(x(0)). \tag{4.56}$$


    由于 $\dot{V}(x) = ((\partial V / \partial x)(x))^\top \dot{x}$，且 (4.56) 意味着对于任何
    $x \in \mathbf{O}(x(0))$，$(\partial V / \partial x)(x) = 0$，我们得到


    $$\dot{V}(x) = 0, \quad \forall x \in \mathbf{O}(x(0)). \tag{4.57}$$


    这表明 $\mathbf{O}(x(0)) \subseteq \mathbf{E} = \{x \in \mathbf{D} : \dot{V}(x) =
    0\}$。此外，根据文献 [6] 中的引理 4.1，$\mathbf{O}(x(0))$ 是一个不变集，并且包含在 $\mathbf{E}$ 中的每个不变集都是
    $\mathbf{M}$ 的子集。这些证明了 (4.53)。$\square$


    $^2$ 考虑系统 $\dot{x}(t) = f(x(t))$，其中 $x(t) \in \mathbb{R}^n$ 是状态，$f : \mathbb{R}^n
    \to \mathbb{R}^n$。令 $\phi(t, x_0)$ 为在某个时刻经过 $x_0$ 的定义在 $(-\infty, +\infty)$ 上的解。如果存在一个序列
    $(t_1, t_2, \dots)$ 使得 $\lim_{k \to \infty} t_k = \infty$ 且 $\lim_{k \to \infty}
    \phi(t_k, x_0) = z$，则点 $z$ 被称为 $x_0$ 的 $\omega$-极限点。$x_0$ 的所有 $\omega$-极限点的集合被称为
    $x_0$ 的 $\omega$-极限集。


    ## 参考文献


    1. Boyd S, Vandenberghe L (2004) 凸优化. 剑桥大学出版社

    2. Bullo F, Cortés J, Martínez S (2009) 机器人网络的分布式控制. 应用数学系列, 普林斯顿大学出版社

    3. Helmke U, Moore JB (1994) 优化与动力系统. Springer, 伦敦

    4. Yamamoto M (2000) 常微分方程的稳定性. 实教出版社

    5. Cortés J, Martínez S, Bullo F (2005) 具有有限范围交互的空间分布式覆盖优化与控制. ESAIM: Control
    Optim Calc Var 11–4:691–719

    6. Khalil HK (2002) 非线性系统, 第3版. Prentice Hall

    7. Hartman P (2002) 常微分方程, 第2版. SIAM

    8. Walter W (2013) 常微分方程. Springer, 纽约

    9. Izumi S, Azuma S, Sugie T (2012) 通过分布式混合控制器实现的机器人集体游戏. 见: 第4届IFAC混合系统分析与设计会议,
    pp 339–343

    10. USC-SIPI图像数据库. http://sipi.usc.edu/database/

    11. Martínez S, Cortés J, Bullo F (2007) 具有分布式信息的运动协调. IEEE Control Syst Mag 27–4:75–88


    # 5 编队控制


    ## 关键点


    - “编队”是本章的主要概念，指的是智能体以某种独特的构型被放置在不同的位置。

    - 编队控制器被设计为定义智能体相对位置的约束误差的函数。

    - 图的刚性在分布式编队控制设置中实现独特构型方面起着关键作用。

    - 梯度控制器被设计为最小化局部代价函数之和。


    ## 5.1 分布式编队控制


    让我们考虑在欧几里得空间中移动或放置的智能体，这些智能体具有测量、通信、决策和/或执行的能力。这些智能体可能与其他智能体物理连接，也可能通过通信网络连接。此外，智能体可能通过某些传感器相互测量。物理连接、通过通信的连接或通过测量的检测都可以被视为调节智能体行为的约束。这些约束可以在智能体之间相对设置，也可以相对于一个共同的参考系全局设置。图
    5.1 显示了两个智能体及其之间的一个约束。该约束可以在局部坐标系 $^1\Sigma$ 和 $^2\Sigma$ 中表示，也可以在全局坐标系 $^g\Sigma$
    中表示。


    **补充信息** 在线版本包含补充材料，可在 https://doi.org/10.1007/978-3-031-52981-8_5 获取。


    **图 5.1** 局部和全局坐标系。智能体 1 和 2 各自有自己的局部坐标系 $^1\Sigma$ 和 $^2\Sigma$。全局坐标系是 $^g\Sigma$。


