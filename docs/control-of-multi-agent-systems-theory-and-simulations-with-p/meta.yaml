    every $x(0) \in \mathbf{D}$, $x(t)$ converges to the largest invariant set contained
    in $\{x \in \mathbf{D} : \dot{V}(x) = 0\}$ as $t \to \infty$.


    On the other hand, the largest invariant set contained in $\{x \in \mathbf{D}
    : \dot{V}(x) = 0\}$ is equal to the set of stationary points of $J$ contained
    in $\mathbf{D}$. In fact, we have


    $$\{x \in \mathbf{D} : \dot{V}(x) = 0\} = \left\{x \in \mathbf{D} : \frac{\partial
