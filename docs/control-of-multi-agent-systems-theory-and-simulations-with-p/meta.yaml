    # 2.4.3 Spanning Tree


    In a strongly connected directed graph (or a connected undirected graph), information
    from any node can be reached to all nodes over the graph. On the other hand, in
    some applications, we only require at least one node from which information can
    be sent to the other nodes. Then, the graph needs not to be strongly connected.
    This idea is realized as the existence of a spanning tree as defined below.


    Let us consider a graph $G = (\mathbf{V}, \mathbf{E})$, and another graph $G''
    = (\mathbf{V}'', \mathbf{E}'')$. If they satisfy $\mathbf{V}'' \subset \mathbf{V}$
    and $\mathbf{E}'' \subset \mathbf{E}$, then we say $G''$ is a *subgraph* of $G$,
    and write $G'' \subset G$.'
