    is $n$, the size of the adjacency matrix becomes $n \times n$. The adjacency matrix
    indicates that if there exists an edge from $j$ to $i$ (not from $i$ to $j$),
    then $a_{ij}$ is 1, and if no link from $j$ to $i$, then $a_{ij} = 0$. For any
