    $$\text{diag}\left(\frac{P_{g_1}}{\|z_1\|}, \frac{P_{g_2}}{\|z_2\|}, \dots, \frac{P_{g_m}}{\|z_m\|}\right)
    z = 0. \quad (5.13)$$


