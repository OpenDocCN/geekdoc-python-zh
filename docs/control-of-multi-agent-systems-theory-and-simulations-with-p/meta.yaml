    differentiable on $\mathbf{X}$, $f$ is continuously differentiable on $\mathbf{X}$.
    Thus, it follows from Lemma 4.11 (i) that $f$ is locally Lipschitz on $\mathbf{X}$.
    This and Lemma 4.11 (in Appendix 4.8.1) (ii) prove (i).


    (ii) As shown in the proof of (i), $f$ is continuous on $\mathbf{D} \subseteq
    \mathbf{X}$. Thus, $f$ is bounded on the bounded set $\mathbf{D}$. It follows
