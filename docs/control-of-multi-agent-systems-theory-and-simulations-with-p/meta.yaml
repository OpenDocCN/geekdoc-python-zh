    **Definition 5.18** Given a framework $f_p = (\mathbf{V}, \mathbf{E}, \mathbf{A},
    p)$, it is called *minimally infinitesimally weakly rigid (MIWR)* if it is infinitesimally
    weak rigid and if no single edge (distance constraints) or angle constraint can
    be removed without losing the rigidity property.


    Let us first analyze the convergence of minimally infinitesimally weakly rigid
    graphs. Then, based on this result, we further analyze the convergence of general
    weak rigid graphs. From Definition 5.18, for any MIWR graph, the rank of the rigidity
    matrix is $\text{rank}(R_w) = dn - \frac{d(d+1)}{2}$, when $\mathbf{E} \neq \emptyset$,
    and $\text{rank}(R_w) = dn - \frac{d(d+1)}{2} - 1$ when $\mathbf{E} = \emptyset$
    (see Theorem 5.5). However, the number of row vectors is equal to the number of
    constraints. Thus, the rank of the rigidity matrix of MIWR graphs is of full row
    rank. Consequently, we can claim the following result:


    **Lemma 5.11** *For any MIWR graphs, $R_w$ is of full-row rank for all $t \geq
    0$ and the matrix $R_w R_w^\top$ is positive-definite.*


    **Theorem 5.11** *Let the desired formation be minimally infinitesimally weakly
    rigid (MIWR). Then, if the initial formation graph is close to the desired formation
    graph and agents are updated by (5.69), then the error $\tilde{e}$ converges to
    zero exponentially fast.*


    **Proof** Let us choose a Lyapunov candidate as $V(\tilde{e}(t)) = \frac{1}{2}
    \|\tilde{e}(t)\|^2$. We define a set $\Psi \triangleq \{\tilde{e} : V(\tilde{e})
    \leq \epsilon\}$, where $\epsilon$ is arbitrary small. Since it is infinitesimally
    weakly rigid, any formation in the set $\Psi$ is also infinitesimally weakly rigid.
    Then, we have $\dot{V}(\tilde{e}(t)) = -\tilde{e}^\top(t)\dot{\tilde{e}}(t) =
    -\tilde{e}^\top(t) R_w(t) R_w^\top(t) \tilde{e}(t) = -\|R_w^\top(t)\tilde{e}(t)\|^2
    \leq -\lambda_{min} \|\tilde{e}(t)\|^2$ where $\lambda_{min} > 0$ is the minimum
    eigenvalue of $R_w(t) R_w^\top(t)$ by Lemma 5.11. Thus, due to the fact $\dot{V}(\tilde{e}(t))
    \leq -2\lambda_{min} V(\tilde{e}(t))$, it is locally exponentially stable. $\square$


    Now, we consider general infinitesimally weakly rigid graphs. Following a technique
    in [21], we decompose a graph to a MIWR part and other remaining part. The MIWR
    part is denoted as $(G^u, p)$ and the other part is denoted as $(G^v, p)$, respectively.
    The graph $G^u$ is composed of the set of vertices and the set of minimal constraints
    ($\mathbf{E}^u$ and $\mathbf{A}^u$), i.e., $G^u = (\mathbf{V}, \mathbf{E}^u, \mathbf{A}^u)$.
    The remaining graph is $G^v = (\mathbf{V}, \mathbf{E}^v, \mathbf{A}^v)$ where
    $\mathbf{E}^v = \mathbf{E} \setminus \mathbf{E}^u$ and $\mathbf{A}^v = \mathbf{A}
    \setminus \mathbf{A}^u$. The graphs $G^u$ and $G^v$ have different distance and
    angle constraints, although they have the same vertices. Let us divide the error
    vector $\tilde{e} \in \mathbb{R}^\sigma$ into two parts $\tilde{e}^u \in \mathbb{R}^{\sigma^u}$
    and $\tilde{e}^v \in \mathbb{R}^{\sigma^v}$, respectively, corresponding to the
    constraints of the graphs $G^u$ and $G^v$. Then, we can have a permutation matrix
    $P = [(P^u)^\top, (P^v)^\top]^\top$ such that $[(\tilde{e}^u)^\top, (\tilde{e}^v)^\top]^\top
    = P^\top \tilde{e}$ holds, i.e., $\tilde{e}^u = P^u \tilde{e}$ and $\tilde{e}^v
    = P^v \tilde{e}$. Let a desired framework be given as $f_{p^*} = (\mathbf{V},
    \mathbf{E}, \mathbf{A}, p^*)$, and current framework $f_p = (\mathbf{V}, \mathbf{E},
    \mathbf{A}, p)$. Also two realizations are very close up to infinitesimal motions,
    i.e., there exists small $\epsilon$ such that $\|p^* - p\| < \epsilon$. Then,
    in a very small neighborhood $U_p$ of $p$, the error $\tilde{e}^u$ could be considered
    as a function of $p$ and $p^*$. It is also clear that the error $\tilde{e}^v$
    is a function of $p$ and $p^*$ since both the frameworks $f_p$ and $f_{p^*}$ are
    infinitesimally weakly rigid. Let us denote these functions as $\tilde{e}^u =
    f^u(p, p^*)$ and $\tilde{e}^v = f^v(p, p^*)$. Then, with'
