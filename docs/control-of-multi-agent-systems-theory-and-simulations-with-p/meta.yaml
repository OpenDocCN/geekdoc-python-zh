    mathbf{V} = \\{1, 2, \\ldots, N\\}$ is the set of vertices (i.e., agents), and\
    \ $\\mathbf{E} \\subset \\mathbf{V} \\times \\mathbf{V}$ is the set of edges (i.e.,\
    \ links between interactive agents). We assume that $G$ is undirected and connected.\n\
    \nFirst, we set the initial guess $x_i[0] \\in \\mathbb{R}^n$ to the $i$-th agent\
    \ ($i \\in \\mathbf{V}$). Then, the $i$-th agent updates and maintains the local\
    \ guess $x_i[k]$ at each time step (in discrete time). The update rule for $x_i[k]$\
    \ is given by\n\n$$x_i[k+1] = \\sum_{j=1}^N p_{ij} x_j[k] - \\alpha g_i[k], \\\
    tag{6.102}$$\n\nwhere\n\n- $p_{ij}$ is the $(i, j)$-th element of Perron matrix\
