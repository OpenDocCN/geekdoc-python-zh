    \ > j$，我们会排除 $\\mathbf{E}$ 中的 $(i, j)$，而只将 $i < j$ 的 $(i, j)$ 放入 $\\mathbf{E}$。在这种情况下，我们需要注意我们处理的是有向图还是无向图。\n\
