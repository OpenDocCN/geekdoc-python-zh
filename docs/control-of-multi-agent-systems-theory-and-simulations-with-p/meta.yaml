    \n## 6.7 总结\n\n在本章中，我们简要回顾了凸优化的基础知识，并介绍了基于凸优化技术的分布式优化。我们将分组检测问题视为一个不适定的逆问题，凸优化在其中扮演着重要角色。对于凸优化，我们研究了两种重要方法：次梯度法和近端法。基于这些方法，我们随后推导出了分布式优化算法。通过\
    \ Python 仿真，我们验证了分布式算法运行良好。在本章中，我们没有讨论分布式优化的并行计算，而 disropt [12] 包为基于 MPI（消息传递接口）实现分布式算法提供了一种简便的方法。\n\
