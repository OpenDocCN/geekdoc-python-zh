  md: '# 5.5 Summary


    This chapter is dedicated to a distributed formation control problem of multi-agent
    systems. The topological perspective of a formation system is characterized by
    underlying graph rigidity properties. Since the topology of a graph is maintained,
    the agents only could regulate the constraints between neighboring agents. Thus,
    with only local task, the agents could achieve a desired formation configuration,
    without using any global information, or global communications.


    The theory of distributed formation control has been developed on the basis of
    graph rigidity theory. After Laman’s Lemma [16], the graph rigidity theory has
    been studied in the field of mathematics for a long time. Although the main issues
    and excellent technical overview of the rigidity theory could be found in [2],
    the detailed theoretical developments and analyses could be obtained in [3,4,7,8].
    Since the graph rigidity theory is a foundation stone of distributed formation
    control, it is highly required to have theoretical backgrounds in rigidity theory.
    In the sense of the same mathematical formulation, the network localization is
    considered a kind of dual problem of distributed formation control. This duality
    issue was traced back to unique realization problem of a graph. It is recommended
    to read [9,10] to search for the root of the network localization problem. The
    detailed duality issue between formation control and network localization is addressed
    in [1] under the setup of multi-agent dynamics. However, it is noticeable that
    in the network localization problems, the underlying graph is supposed to be globally
    rigid, which is a concept much more complicated to examine from an algebraic perspective.
    The first dynamical analysis of distributed formation control could be found in
    [15]. Since then, some technical analyses based on inter-agent dynamics and algebra
    of rigidity matrix have been developed in [18,25]. Distributed formation control
    is a topic studied in the field of control systems; so the nodes are considered
    as dynamic agents. To analyze the behaviors of dynamic agents, it is also required
    to have some mathematical background in control systems and dynamics; for this,
    it is recommended to read [12,24]. In the early period of distributed formation
    control research, the distance-based formation control problems were studied;
    it is suggested to read [20–22] to get some advanced developments. Since the rigidity
    theory was adopted to control theory for distributed formation control problems,
    it has been extended to various problems with further developments. Although the
    rigidity theory in mathematics was established in the perspective of edge distances,
    in control society, the rigidity theory was expanded to bearing theory and angle
    rigidity. For those expansions, it is recommended to read [5,6,11,23,26–28]. A
    comprehensive survey of the various formation control theory, including displacement-based
    approaches, could be found in [19]. An approach to develop a unified distributed
    formation control theory, combining the distances, bearing, and angles, could
    be found in [13,14].'
