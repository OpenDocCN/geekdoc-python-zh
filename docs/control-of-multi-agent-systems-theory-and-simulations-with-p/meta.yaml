- md: "## Linear Algebra and Graph Theory with Python\n\n## 2\n\n### Key Points\n\n\
    - Linear algebra is a powerful tool for the analysis of graphs. Particularly,\
    \ the graph Laplacian and the Perron matrix play an important role.\n- The graph\
    \ Laplacian (resp. the Perron matrix) has at least one eigenvalue of 0 (resp.\
    \ 1).\n- The connectivity of a graph can be analyzed by the multiplicity of the\
    \ 0 (resp. 1) eigenvalue of the graph Laplacian (resp. the Perron matrix).\n-\
    \ NumPy and NetworkX packages in Python are useful for computations in linear\
    \ algebra and graph theory, respectively.\n\n### 2.1 Brief Introduction to Python\n\
    \nIn this book, we use Python as a programming language for analysis, design,\
    \ and simulation of multi-agent systems. Section 2.1 forms a brief introduction\
    \ to the Python programming language. For more in-depth detail, we refer you to\
    \ textbooks dedicated to teaching Python as a language such as [7,9]. The programs\
    \ in later sections will also help you to learn the practicalities of Python programming.\n\
    \n**Supplementary Information** The online version contains supplementary material\
    \ available at https://doi.org/10.1007/978-3-031-52981-8_2.\n\n© The Author(s),\
    \ under exclusive license to Springer Nature Switzerland AG 2024\nM. Nagahara\
    \ et al., *Control of Multi-agent Systems*, Advanced Textbooks in Control and\
    \ Signal Processing, https://doi.org/10.1007/978-3-031-52981-8_2\n\n17\n\n###\
    \ 2.1.1 An Overview of Python\n\nPython is an interpreted programming language\
    \ developed in the late 1980s by Guido van Rossum, which has since become one\
    \ of the most popular programming languages in the world [9]. Python is extensively\
    \ used in various fields including data science, artificial intelligence, machine\
    \ learning, and scientific computing, making it a versatile language suitable\
    \ for a wide array of applications.\n\nOne of the key strengths of Python is the\
    \ availability of a multitude of useful packages, including `NumPy` and `SciPy`\
    \ for scientific computing, `TensorFlow` and `scikit-learn` for machine learning,\
    \ `NetworkX` for network analysis, to name a few. These packages provide pre-written\
    \ solutions to a plethora of challenges, thereby allowing developers and researchers\
    \ to focus on their specific tasks.\n\n### 2.1.2 Python Environment\n\nInstead\
    \ of setting up your Python environment by installing Python and related packages\
    \ from scratch, we recommend to install an Integrated Development Environment\
    \ (IDE) such as `Jupyter Notebook`.¹ This can also increase your productivity\
    \ by combining code editing, debugging, and testing in an easy-to-use application.\
    \ We particularly recommend to use `Google Colaboratory` (Colab for short), a\
    \ web-based IDE, with which you can write and execute Python codes through your\
    \ internet browser.\n\nTo use Google Colab, you need to have a Google account\
    \ and be signed in. Once you are signed in, you can access Colab by visiting the\
    \ following link:\n\n```\nhttps://colab.research.google.com/.\n```\n\nOn this\
    \ web page, you can create a new notebook by clicking the **New Notebook** button,\
    \ then you will find a new notebook opened in your browser, on which you can then\
    \ use to write and run code. In particular, if you want to run a Python program\
    \ shown in this book, just copy and paste it into a new cell, and press the **Play**\
    \ button (or use the “Shift+Enter” keyboard shortcut).\n\nYou can also use the\
    \ Jupyter Notebook, which is a simple interactive environment for Python coding.\
    \ We distribute the Python programs in this book as `.ipynb` files, which you\
    \ can directly open by the Google Colab or the Jupyter Notebook. From now on,\
    \ we assume you can use a Python platform like the Google Colab and the Jupyter\
    \ Notebook.\n\n> ¹https://jupyter.org/.\n\n### 2.1.3 Hello World\n\nLet us begin\
    \ with a simple program that outputs the phrase *Hello, World!* This is simply\
    \ done by\n\n```\nprint(\"Hello, World!\")\n```\n\nThe function `print` prints\
    \ out the argument sentence \"Hello, World!\". When executed, this program will\
    \ display the greeting `Hello, World!` on the screen.\n\n### 2.1.4 Numerical Computation\
    \ with Python\n\nPython can do more things. For the purpose of this textbook,\
    \ we here show some simple numerical computation examples with Python.\n\n####\
    \ Packages\n\nWe first import useful packages for numerical computation. We use\
    \ the function `import` to do this. The following program imports the packages:\n\
    \n```\nimport numpy as np\nimport matplotlib.pyplot as plt\n```\n\nThe NumPy$^2$\
    \ package is useful for numerical computations like the inner product of two vectors\
    \ and the multiplication of two matrices [5]. The package uses the well-known\
    \ linear algebra libraries of Basic Linear Algebra Subprograms (BLAS) and Linear\
    \ Algebra Package (LAPACK) which are the most reliable libraries for numerical\
    \ computation [10].\n\nThe Matplotlib$^3$ is a comprehensive library for creating\
    \ static, animated, and interactive visualizations in Python. In particular, we\
    \ will often use the `pyplot` submodule for plotting beautiful graphs.\n\n####\
    \ Matrices and Vectors\n\nFirst, let us consider a system of linear equations:\n\
    \n$$x + 2y = 1$$\n$$3x + 9y = 4.$$\n\nDefining matrix $A$ and vector $b$ by\n\n\
    $$A \\triangleq \\begin{bmatrix} 1 & 2 \\\\ 3 & 9 \\end{bmatrix}, \\quad b \\\
    triangleq \\begin{bmatrix} 1 \\\\ 4 \\end{bmatrix}, \\tag{2.2}$$\n\nEq.(2.1) can\
    \ be described as $Ax = b$ where $x \\in \\mathbb{R}^2$ is the variable to be\
    \ solved. Defining the matrix and the vector in Python is simply done by\n\n```\n\
    A = np.array([[1, 2], [3, 9]])\nb = np.array([1, 4])\n```\n\nThe function `array`\
    \ in the NumPy package defines matrices and vectors. To define a matrix, use a\
    \ nested list of numbers as above. Then, to solve (2.1) for $x$, we do\n\n```\n\
    x = np.linalg.solve(A, b)\nprint(x)\n```\n\nHere, we use the function `solve`\
    \ in the `linalg` submodule in Numpy. This program returns [0.33333333 0.33333333],\
    \ which is a numerical result of [1/3, 1/3]. We implicitly add the following line\
    \ before printing the numerical result:\n\n```\nnp.set_printoptions(precision=2)\n\
    ```\n\nThe function `set_printoptions` sets the floating point precision to 2\
    \ by setting the `precision` parameter to be equal to 2. Then, 0.33333333 will\
    \ be displayed as 0.33. Since we often use functions in the `linalg` submodule,\
    \ we can previously import this submodule as\n\n```\nimport numpy.linalg as LA\n\
    ```\n\nPlease make sure you add this line in the top of your program. Then, we\
    \ can simply write\n\n```\nx = LA.solve(A, b)\nprint(x)\n```\n\nThe inverse matrix\
    \ of $A$ can be easily computed by\n\n```\nA_inv = LA.inv(A)\nprint(A_inv)\n```\n\
    \nThe answer will be\n\n```\n[[ 3.         -0.66666667]\n [-1.          0.33333333]]\n\
    ```\n\n#### Defining Functions\n\nIn Python, a function is a reusable block of\
    \ code that performs a specific computation. Defining functions promotes modularity,\
    \ code reusability, and a structured programming approach.\n\nLet us define the\
    \ *sign* function, which is mathematically defined by\n\n$$\\text{sign}(x) \\\
    triangleq \\begin{cases} -1 & \\text{if } x < 0, \\\\ 1 & \\text{if } x > 0, \\\
    \\ 0 & \\text{if } x = 0. \\end{cases} \\quad (2.3)$$\n\nThe following is the\
    \ code:\n\n```\ndef sign(x):\n    if x < 0:\n        return -1\n    elif x > 0:\n\
    \        return 1\n    else:\n        return 0\n```\n\nThe keyword `def` is for\
    \ the beginning of a function definition, `sign` is the name of the function,\
    \ and `x` is the argument of the function. Don't forget to put a colon ':' at\
    \ the end of the `def` line. In this definition, we use the *if-elif-else* structure,\
    \ where *elif* means \"else if\".\n\nNote that the combination of the colon (:)\
    \ and tabs (or, more commonly, spaces), plays an important role in the structure\
    \ and readability of code in Python. The colon is used at the end of the initiating\
    \ line of a code construct to signal the beginning of a related block of code.\
    \ Once the colon has indicated the start of a block, the subsequent lines are\
    \ indented to mark their inclusion in that block. The indentation delineates the\
    \ boundaries of the block. It informs the interpreter (and the developer) that\
    \ the lines that follow, provided they are indented, belong to a specific block.\n\
    \n#### Drawing Graphs\n\nDrawing graphs can be easily done by Python. For this,\
    \ we use the `pyplot` sub-module in the Matplotlib package as mentioned above.\
    \ Here we draw two graphs of\n\n$$y_1(t) = \\sin(t), \\quad y_2(t) = \\cos(t),\
    \ \\quad t \\in [0, 2\\pi]. \\quad (2.4)$$\n\n85. Zhang S, Hayashida M, Akutsu\
    \ T, Ching W, Ng MK (2007) Algorithms for finding small attractors in Boolean\
    \ networks. EURASIP J Bioinf Syst Biol 2007:20180\n\n86. Zhao Y, Cheng D, Qi H\
    \ (2010) Input-state incidence matrix of Boolean control networks and its applications.\
    \ Syst Control Lett 59–12:767–774\n\n87. Zhou J et al (2020) Graph neural networks:\
    \ a review of methods and applications. AI Open 1:57–81"
  mdcn: "## 使用Python进行线性代数与图论分析\n\n## 2\n\n### 关键要点\n\n-   线性代数是分析图的强大工具。其中，图拉普拉斯矩阵和佩龙矩阵扮演着重要角色。\n\
    -   图拉普拉斯矩阵（或佩龙矩阵）至少有一个特征值为0（或1）。\n-   图的连通性可以通过图拉普拉斯矩阵（或佩龙矩阵）的0（或1）特征值的重数来分析。\n\
    -   Python中的NumPy和NetworkX包分别适用于线性代数和图论的计算。\n\n### 2.1 Python简介\n\n在本书中，我们使用Python作为编程语言，用于多智能体系统的分析、设计和仿真。第2.1节对Python编程语言进行了简要介绍。如需更深入的细节，我们建议您参考专门教授Python语言的教材，例如[7,9]。后续章节中的程序也将帮助您学习Python编程的实践应用。\n\
    \n**补充信息** 在线版本包含补充材料，可访问 https://doi.org/10.1007/978-3-031-52981-8_2。\n\n© 作者，经Springer\
    \ Nature Switzerland AG 2024独家许可\nM. Nagahara 等，《多智能体系统控制》，控制与信号处理高级教科书，https://doi.org/10.1007/978-3-031-52981-8_2\n\
    \n17\n\n### 2.1.1 Python概述\n\nPython是一种解释型编程语言，由Guido van Rossum在1980年代末期开发，此后已成为世界上最流行的编程语言之一[9]。Python广泛应用于数据科学、人工智能、机器学习和科学计算等多个领域，使其成为适用于广泛应用场景的通用语言。\n\
    \nPython的一个关键优势在于其拥有大量有用的包，例如用于科学计算的`NumPy`和`SciPy`，用于机器学习的`TensorFlow`和`scikit-learn`，用于网络分析的`NetworkX`，等等。这些包为众多挑战提供了预先编写的解决方案，从而使开发人员和研究人员能够专注于他们的特定任务。\n\
    \n### 2.1.2 Python环境\n\n我们建议您安装一个集成开发环境（IDE），例如`Jupyter Notebook`，而不是从头开始安装Python及相关包来设置您的Python环境。¹\
    \ 这也可以通过将代码编辑、调试和测试结合在一个易于使用的应用程序中来提高您的生产力。我们特别推荐使用基于网络的IDE `Google Colaboratory`（简称Colab），通过它您可以通过互联网浏览器编写和执行Python代码。\n\
