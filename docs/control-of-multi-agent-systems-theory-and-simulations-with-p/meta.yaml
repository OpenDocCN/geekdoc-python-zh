    \ Canonical Form and Spectral Decomposition\n\nThe Jordan canonical form is a\
    \ matrix representation that explicitly shows the structure of a matrix in view\
    \ of its eigenvalues. Let $\\lambda_1, \\lambda_2, \\ldots, \\lambda_r$ be the\
