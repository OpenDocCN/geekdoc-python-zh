    # 2.4 Graph Theory


    This section discusses basics of graph theory. In particular, we here introduce
    the *algebraic graph theory* that gives us powerful and efficient tools to analyze
    graphs or networks with the theorems in linear algebra discussed in the previous
    section.


    # 2.4.1 What is a Graph?


    A graph is a mathematical object that is useful to model a network. A graph has
    multiple nodes (or vertices), and edges that connect nodes. Mathematically, a
    graph is a pair of sets of nodes and edges. For example, if we have the node set
    **V** = {1, 2, . . . , n} and the edge set **E** ⊂ **V** × **V**, then the graph
    is defined as *G* = (**V**, **E**).


    When the number *n* of edges is small, then visualization of the graph is also
    beneficial. The graph shown in Fig. 2.4 is a famous social network called *Zachary''s
    Karate Club* [2,14]. In this graph, the nodes represent the 34 members of the
    Karate club, and the 78 edges indicate the true relationship between club members
    who regularly interacted outside the club. This graph is frequently used as a
    benchmark in community detection [2].


    Zachary''s network is an *undirected graph*, where the edges have no direction.
    If we instead consider a social network service (SNS) like X (Twitter), or the
    World Wide Web network, each edge has a direction (follow/followed or link/linked).
    Such a graph is called a *directed graph*, or *digraph* for short. For a directed
    graph, (*i*, *j*) ∈ **E** does'
