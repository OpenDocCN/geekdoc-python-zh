  md: "# Creating React Applications with Python\n\n```\nuseState = React.useState\n\
    \ndef render(root_component, props, container):\n    \"\"\"Loads main react component\
    \ into DOM\"\"\"\n\n    def main():\n        ReactDOM.render(\n            React.createElement(root_component,\
    \ props),\n            document.getElementById(container)\n        )\n\n    document.addEventListener('DOMContentLoaded',\
    \ main)\n```\n\nAt the top of the file, we used one of Transcrypt’s __pragma__\
    \ compiler directives to tell it to ignore the code between the skip/noskip block.\
    \ The code in this block doesn’t affect the transpiled JavaScript, but it keeps\
    \ any Python linter that you may have in your IDE quiet by stubbing out the JavaScript\
    \ commands that are otherwise unknown to Python.\n\nNext, we use the Node require()\
    \ function to load the React JavaScript libraries into the module namespace. Then,\
    \ we map the React createElement() and useState() methods to module-level Python\
    \ variables as we did before. As we’ll see shortly, this will allow us to import\
    \ those variables into other Python modules. Finally, we moved the render() function\
    \ we created previously into this module as well.\n\nNow that we have the JavaScript\
    \ interface somewhat self-contained, we can utilize it in our application:\n\n\
    Listing 9: *app.py*\n\n```\nfrom pyreact import useState, render, createElement\
    \ as el\n\ndef ListItems(props):\n    items = props['items']\n    return [el('li',\
    \ {'key': item}, item) for item in items]\n\ndef App():\n    newItem, setNewItem\
    \ = useState(\"\")\n    items, setItems = useState([])\n\n    def handleSubmit(event):\n\
    \        event.preventDefault()\n        # setItems(items.__add__(newItem))\n\
    \        setItems(items + [newItem])  # __:opov\n        setNewItem(\"\")\n\n\
    \    def handleChange(event):\n        target = event['target']\n        setNewItem(target['value'])\n\
    ```"
