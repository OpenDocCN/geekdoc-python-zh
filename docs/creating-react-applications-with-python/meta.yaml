    ## About the Author


    **John Sheehan** graduated with a degree in Computer Science & Engineering from
    the University of Illinois at Chicago, and has been programming primarily with
    Python for over a decade. As a freelance software developer, they have developed
    custom business software for scores of companies throughout the United States.
    In their free time, John is an avid DIYer, electronics enthusiast, and musician.
    They are currently based in sunny Southern California, and are the meetup organizer
    for the local Python and Raspberry Pi user groups.


