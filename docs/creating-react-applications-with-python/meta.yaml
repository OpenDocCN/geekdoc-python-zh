    \ defeats the purpose of using JSX in the first place.\n\nIn this module, we created\
    \ two functional React components. The App component is the main entry point and\
    \ serves as the top of the component tree that we are building. Here we have two\
    \ state variables that we create along with their companion setter functions.\
    \ The newItem state variable will hold an entered value that is to be added to\
    \ the list. The items state variable will then hold all of the values that have\
    \ been previously entered.\n\nWe then have two functions, one to perform an action\
    \ when the form submits the value that was entered, and another that synchronizes\
    \ the value that is being entered with the state of our React component.\n\nThen,\
    \ in the return statement of the App() function, we declare the tree of elements\
    \ that define the UI. The top of the element tree starts with an HTML form. This\
    \ allows us to take advantage of its default submit button, which in this case\
    \ calls our handleSubmit() function that will add new values to the list.\n\n\
    In the handleSubmit() function, when adding a new item to our list, we used an\
    \ in-line compiler directive to let Transcrypt know that this particular line\
    \ of code is using an operator overload:\n\n```python\nsetItems(items + [newItem])\
    \  # __:opov`\n```\n\nBy default, Transcrypt turns off this capability as it would\
    \ cause the generated JavaScript to take a performance hit if it were enabled\
    \ globally due to the overhead required to implement that feature. If you’d rather\
    \ not use the compiler directive to enable operator overloading only where needed,\
    \ in a case like this you could also call the appropriate Python operator overload\
    \ dunder method directly as shown in the commented line just above it.\n\nInside\
    \ (or below) that, we have an input element for entering new values along with\
    \ a corresponding label element that identifies it in the UI. The input element\
    \ has the handleChange() function as its onChange event handler that keeps the\
    \ React state synced up with what the UI is showing.\n\nNext in the element tree\
    \ is the list of values that have already been entered. These will be displayed\
    \ in the UI using an HTML ordered list element that will number the items that\
    \ are added to it.\n\nThis brings us to this module’s second functional component,\
    \ ListItems, that renders the values in our items state variable as HTML li elements.\
    \ The items are passed into this component as a property that we deconstruct into\
    \ a local variable. From there, we use a Python list comprehension to build the\
    \ list of li elements by iterating through the items.\n\nThe last step is to call\
    \ the imported render() function that will attach our App React component to the\
    \ DOM hook point identified by 'root' in the HTML file:\n\n```python\nrender(App,\
    \ None, 'root')\n```\n\nYou’ll notice that because we put all of the Python-to-JavaScript\
    \ mappings in the pyreact.py module, that this module can be 100% pure pythonic\
    \ Python. No mixing of languages, no weird contortions of the Python language,\
