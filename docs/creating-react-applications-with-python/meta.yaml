- md: "## Introduction\n\n### 1.1 Full-Stack Python\n\nLet me start by getting this\
    \ out of the way: *I really like programming in Python, and I'm not a big fan\
    \ of JavaScript*. But let's face it, JavaScript is the way of the web, and Python\
    \ doesn't run in a web browser. So end of story, right? Well not so fast, because\
    \ just like the popular TypeScript language gets transpiled into JavaScript to\
    \ run in a web browser, [Transcrypt](https://transcrypt.org/) does the same thing\
    \ for Python.\n\nBecause of the way Transcrypt maps Python data types and language\
    \ constructs to JavaScript, your Python code is able to utilize the full ecosystem\
    \ of JavaScript libraries that exist. Transcrypt acts as a bridge that enables\
    \ you to take advantage of existing JavaScript web application technologies rather\
    \ than trying to reinvent them. And, it does it in a way that doesn't significantly\
    \ affect application performance over using plain JavaScript, or that requires\
    \ a large runtime module to be downloaded to the client. And though we *use* JavaScript\
    \ libraries, we don't have to code in JavaScript to use their APIs.\n\n### 1.2\
    \ Features of Transcrypt\n\n- It's PIP installable\n- Python code is transpiled\
    \ to JavaScript before being deployed\n- It uses a very small JavaScript runtime\
    \ (~40K)\n- It can generate sourcemaps for troubleshooting Python in the browser\n\
    - The generated JavaScript is human-readable\n- The generated JavaScript can be\
    \ minified\n- Performance is comparable to native JavaScript\n- It maps Python\
    \ data types and language constructs to JavaScript\n- It acts as a bridge between\
    \ the Python and JavaScript worlds\n- It supports almost all Python built-ins\
    \ and language constructs\n- It only has limited support for the Python standard\
    \ library\n- Your Python code can “directly” call JavaScript functions\n- Native\
    \ JavaScript can call your Python functions\n- It only supports 3rd party Python\
    \ libraries that are pure Python\n\n## Creating React Applications with Python\n\
    \n### 1.3 npm instead of pip\n\nMost Python language constructs and built-ins\
    \ have been implemented in Transcrypt, so working with standard Python objects\
    \ like lists, dictionaries, strings, and more will feel just like Python should.\
    \ Generally speaking however, third-party Python libraries are not supported unless\
    \ the library (and its dependencies) are pure Python.\n\nWhat this means is that\
    \ instead of turning to urllib or the requests library when you need to make an\
    \ HTTP request from your web browser application, you would utilize window.fetch()\
    \ or the JavaScript axios library instead. But you would still code to those JavaScript\
    \ libraries using Python.\n\n## Tutorial\n\n### 2.1 Installation\n\nGetting started\
    \ with Transcrypt is pretty easy. Ideally, you would want to create a Python virtual\
    \ environment for your project, activate it, and then use PIP to install Transcrypt.\
    \ Transcrypt currently supports Python 3.9 or Python 3.7 so you will need to create\
    \ your virtual environment with one of those versions, and then install the appropriate\
    \ version of Transcrypt:\n\n```\n$ python3.9 -m venv venv\nor\n$ python3.7 -m\
    \ venv venv\n\n$ source venv/bin/activate\n(for Windows use venv\\Scripts\\activate\
    \ )\n\n(venv) $ pip install transcrypt==3.9\nor\n(venv) $ pip install transcrypt==3.7.16\n\
    ```\n\n### 2.2 Hello World\n\nWith Transcrypt installed, we can try a simple *Hello\
    \ World* web application to see how it works. We'll create two files: a Python\
    \ file with a few functions, and an HTML file that we will open up in a web browser:\n\
    \nListing 1: *hello.py*\n\n```\ndef say_hello():\n    document.getElementById('destination').innerHTML\
    \ = \"Hello World!\"\n\ndef clear_it():\n    document.getElementById('destination').innerHTML\
    \ = \"\"\n```\n\nListing 2: *hello.html*\n\n```\n<!DOCTYPE html>\n<html lang=\"\
    en\">\n    <body>\n        <script type=\"module\">\n            import {say_hello,\
    \ clear_it} from \"./__target__/hello.js\";\n            document.getElementById(\"\
    sayBtn\").onclick = say_hello;\n            document.getElementById(\"clearBtn\"\
    ).onclick = clear_it;\n        </script>\n        <button type=\"button\" id=\"\
    sayBtn\">Click Me!</button>\n        <button type=\"button\" id=\"clearBtn\">Clear</button>\n\
    \        <div id=\"destination\"></div>\n    </body>\n</html>\n```\n\nWe then\
    \ transpile the Python file with the Transcrypt CLI:\n(venv) $ transcrypt --nomin\
    \ --map hello\n\nHere, we passed the transcrypt command three arguments:\n\n-\
    \ --nomin turns off minification to leave the generated code in a human-readable\
    \ format\n- --map generates sourcemaps for debugging Python code in the web browser\n\
    - hello is the name of python module to transpile\n\nWe can serve up the *Hello\
    \ World* application using the built-in Python HTTP server:\n(venv) $ python -m\
    \ http.server\n\nThis starts up a webserver that serves up files in the current\
    \ directory, from which we can open our HTML file at:\nhttp://localhost:8000/hello.html\n\
    \n![](img/b9edce8c37f03791c5b16f4807072a3c_7_0.png)\n\nAs you can see with this\
    \ simple demonstration, we have Python calling methods of JavaScript objects using\
    \ Python syntax, and JavaScript calling \"Python\" functions that have been transpiled.\
    \ And as mentioned earlier, the generated JavaScript code is quite readable:\n\
    \nListing 3 (Generated code): `__target__/hello.js`\n\n```\n// Transcrypt'ed from\
    \ Python\nimport {AssertionError, ... , zip} from './org.transcrypt.__runtime__.js';\n\
    var __name__ = '__main__';\nexport var say_hello = function () {\n    document.getElementById\
    \ ('destination').innerHTML = 'Hello World!';\n};\nexport var clear_it = function\
    \ () {\n    document.getElementById ('destination').innerHTML = '';\n};\n\n//#\
    \ sourceMappingURL=hello.map\n```\n\n### 2.3 Sourcemaps\n\nTo demonstrate the\
    \ sourcemap feature, we can again create two source files: a Python file with\
    \ a function to be transpiled, and an HTML file that will be the entry point for\
    \ our application in the web browser. This time, our Python file will have a function\
    \ that outputs text to the web browser console using both JavaScript and Python\
    \ methods, along with a JavaScript method call that will generate an error at\
    \ runtime:\n\nListing 4: *sourcemap.py*\n\n```\ndef print_stuff():\n    console.log(\"\
    Native JS console.log call\")\n    print(\"Python print\")\n    console.invalid_method(\"\
    This will be an error\")\n```\n\nListing 5: *sourcemap.html*\n\n```\n<!DOCTYPE\
    \ html>\n<html lang=\"en\">\n    <body>\n        <script type=\"module\">\n  \
    \          import {print_stuff} from \"./__target__/sourcemap.js\";\n        \
    \    document.getElementById(\"printBtn\").onclick = print_stuff;\n        </script>\n\
    \        <button type=\"button\" id=\"printBtn\">Print</button>\n    </body>\n\
    </html>\n```\n\n(venv) $ transcrypt --nomin --map sourcemap\n\nThis time, with\
    \ the built-in Python HTTP server started using:\n(venv) $ python -m http.server\n\
    \nWe can open our test application at:\nhttp://localhost:8000/sourcemap.html\n\
    \n![](img/b9edce8c37f03791c5b16f4807072a3c_9_0.png)\n\nIf you open the developer\
    \ console in the web browser and then click the button, the first two calls will\
    \ execute, printing the text to the web browser console. The call to the JavaScript\
    \ console.log() method behaves as you would expect. But as you can see here, the\
    \ Python print() function ends up getting transpiled to call the JavaScript console.log()\
    \ method as well.\n\nThe third function call generates an error since we are trying\
    \ to call a nonexistent method of the JavaScript console object. However, what’s\
    \ nice in this case is that the sourcemap can direct us to the cause of the problem\
    \ in our *Python* source file. So, even though it is the generated JavaScript\
    \ that is actually running in the web browser, using a sourcemap, we can still\
    \ view our Python code right in the web browser and see where the error occurred\
    \ in the Python file as well.\n\n![](img/b9edce8c37f03791c5b16f4807072a3c_9_1.png)\n\
    \n### 2.4 React\n\nNow that we’ve seen how Transcrypt lets us make calls to JavaScript,\
    \ let’s step it up and use Transcrypt to make calls to the React library. We’ll\
    \ start with another simple *Hello World* application again, but this time doing\
    \ it the React way. We’ll stick with the two source files: a python file to be"
  mdcn: "## 简介\n\n### 1.1 全栈 Python\n\n首先让我澄清一点：*我真的很喜欢用 Python 编程，对 JavaScript 并不太感冒*。但现实是，JavaScript\
    \ 是 Web 的主流语言，而 Python 无法在 Web 浏览器中运行。所以，故事到此结束了吗？嗯，先别急，因为就像流行的 TypeScript 语言会被转译成\
    \ JavaScript 以在浏览器中运行一样，[Transcrypt](https://transcrypt.org/) 对 Python 也做了同样的事情。\n\
    \n由于 Transcrypt 将 Python 数据类型和语言结构映射到 JavaScript 的方式，你的 Python 代码能够利用现有的完整 JavaScript\
    \ 库生态系统。Transcrypt 充当一座桥梁，使你能够利用现有的 JavaScript Web 应用技术，而不是试图重新发明它们。而且，它实现这一点的方式，并不会像使用纯\
    \ JavaScript 那样显著影响应用程序性能，也不需要下载一个大型的运行时模块到客户端。虽然我们*使用* JavaScript 库，但我们不必用 JavaScript\
    \ 编码来使用它们的 API。\n\n### 1.2 Transcrypt 的特性\n\n- 可通过 PIP 安装\n- Python 代码在部署前会被转译为\
    \ JavaScript\n- 使用非常小的 JavaScript 运行时（约 40K）\n- 可以生成源映射，用于在浏览器中调试 Python 代码\n\
    - 生成的 JavaScript 代码可读性强\n- 生成的 JavaScript 代码可以被压缩\n- 性能与原生 JavaScript 相当\n- 将\
    \ Python 数据类型和语言结构映射到 JavaScript\n- 充当 Python 和 JavaScript 世界之间的桥梁\n- 支持几乎所有 Python\
    \ 内置函数和语言结构\n- 仅对 Python 标准库提供有限支持\n- 你的 Python 代码可以“直接”调用 JavaScript 函数\n- 原生\
    \ JavaScript 可以调用你的 Python 函数\n- 仅支持纯 Python 编写的第三方 Python 库\n\n## 使用 Python 创建\
    \ React 应用程序\n\n### 1.3 使用 npm 而非 pip\n\n大多数 Python 语言结构和内置函数都已在 Transcrypt 中实现，因此使用标准\
    \ Python 对象（如列表、字典、字符串等）的感觉应该和使用原生 Python 一样。然而，一般来说，第三方 Python 库是不被支持的，除非该库（及其依赖项）是纯\
    \ Python 编写的。\n\n这意味着，当你的 Web 浏览器应用程序需要发出 HTTP 请求时，你不会转向使用 urllib 或 requests 库，而是会利用\
    \ `window.fetch()` 或 JavaScript 的 axios 库。但你仍然会使用 Python 来编写调用这些 JavaScript 库的代码。\n\
    \n## 教程\n\n### 2.1 安装\n\n开始使用 Transcrypt 非常简单。理想情况下，你应该为你的项目创建一个 Python 虚拟环境，激活它，然后使用\
    \ PIP 安装 Transcrypt。Transcrypt 目前支持 Python 3.9 或 Python 3.7，因此你需要使用其中一个版本创建虚拟环境，然后安装相应版本的\
    \ Transcrypt：\n\n```\n$ python3.9 -m venv venv\n或\n$ python3.7 -m venv venv\n\n\
    $ source venv/bin/activate\n（对于 Windows，使用 venv\\Scripts\\activate）\n\n(venv)\
    \ $ pip install transcrypt==3.9\n或\n(venv) $ pip install transcrypt==3.7.16\n\
    ```\n\n### 2.2 Hello World\n\n安装好 Transcrypt 后，我们可以尝试一个简单的 *Hello World* Web 应用程序，看看它是如何工作的。我们将创建两个文件：一个包含几个函数的\
    \ Python 文件，以及一个我们将在 Web 浏览器中打开的 HTML 文件：\n\n清单 1：*hello.py*\n\n```\ndef say_hello():\n\
    \    document.getElementById('destination').innerHTML = \"Hello World!\"\n\ndef\
    \ clear_it():\n    document.getElementById('destination').innerHTML = \"\"\n```\n\
    \n清单 2：*hello.html*\n\n```\n<!DOCTYPE html>\n<html lang=\"en\">\n    <body>\n\
    \        <script type=\"module\">\n            import {say_hello, clear_it} from\
    \ \"./__target__/hello.js\";\n            document.getElementById(\"sayBtn\").onclick\
    \ = say_hello;\n            document.getElementById(\"clearBtn\").onclick = clear_it;\n\
    \        </script>\n        <button type=\"button\" id=\"sayBtn\">Click Me!</button>\n\
    \        <button type=\"button\" id=\"clearBtn\">Clear</button>\n        <div\
    \ id=\"destination\"></div>\n    </body>\n</html>\n```\n\n然后我们使用 Transcrypt CLI\
    \ 转译 Python 文件：\n(venv) $ transcrypt --nomin --map hello\n\n这里，我们向 transcrypt\
    \ 命令传递了三个参数：\n\n- `--nomin` 关闭压缩，使生成的代码保持可读格式\n- `--map` 生成源映射，用于在 Web 浏览器中调试\
    \ Python 代码\n- `hello` 是要转译的 Python 模块名称\n\n我们可以使用内置的 Python HTTP 服务器来提供 *Hello\
    \ World* 应用程序：\n(venv) $ python -m http.server\n\n这将启动一个 Web 服务器，提供当前目录中的文件，我们可以通过以下地址打开我们的\
    \ HTML 文件：\nhttp://localhost:8000/hello.html\n\n![](img/b9edce8c37f03791c5b16f4807072a3c_7_0.png)\n\
    \n正如这个简单演示所示，我们看到 Python 使用 Python 语法调用 JavaScript 对象的方法，而 JavaScript 调用已被转译的“Python”函数。如前所述，生成的\
    \ JavaScript 代码相当易读：\n\n清单 3（生成的代码）：`__target__/hello.js`\n\n```\n// Transcrypt'ed\
    \ from Python\nimport {AssertionError, ... , zip} from './org.transcrypt.__runtime__.js';\n\
    var __name__ = '__main__';\nexport var say_hello = function () {\n    document.getElementById\
    \ ('destination').innerHTML = 'Hello World!';\n};\nexport var clear_it = function\
    \ () {\n    document.getElementById ('destination').innerHTML = '';\n};\n\n//#\
    \ sourceMappingURL=hello.map\n```\n\n### 2.3 源映射\n\n为了演示源映射功能，我们可以再次创建两个源文件：一个包含要转译函数的\
    \ Python 文件，以及一个作为应用程序在 Web 浏览器中入口点的 HTML 文件。这一次，我们的 Python 文件将包含一个函数，该函数使用 JavaScript\
    \ 和 Python 方法向 Web 浏览器控制台输出文本，以及一个将在运行时产生错误的 JavaScript 方法调用：\n\n清单 4：*sourcemap.py*\n\
    \n```\ndef print_stuff():\n    console.log(\"Native JS console.log call\")\n \
    \   print(\"Python print\")\n    console.invalid_method(\"This will be an error\"\
    )\n```\n\n清单 5：*sourcemap.html*\n\n```\n<!DOCTYPE html>\n<html lang=\"en\">\n\
    \    <body>\n        <script type=\"module\">\n            import {print_stuff}\
    \ from \"./__target__/sourcemap.js\";\n            document.getElementById(\"\
    printBtn\").onclick = print_stuff;\n        </script>\n        <button type=\"\
    button\" id=\"printBtn\">Print</button>\n    </body>\n</html>\n```\n\n(venv) $\
    \ transcrypt --nomin --map sourcemap\n\n这一次，使用以下命令启动内置的 Python HTTP 服务器：\n(venv)\
    \ $ python -m http.server\n\n我们可以通过以下地址打开我们的测试应用程序：\nhttp://localhost:8000/sourcemap.html\n\
    \n![](img/b9edce8c37f03791c5b16f4807072a3c_9_0.png)\n\n如果你在 Web 浏览器中打开开发者控制台，然后点击按钮，前两个调用将执行，将文本打印到\
    \ Web 浏览器控制台。对 JavaScript `console.log()` 方法的调用行为符合预期。但正如你在这里看到的，Python 的 `print()`\
    \ 函数最终也被转译为调用 JavaScript 的 `console.log()` 方法。\n\n第三个函数调用会产生错误，因为我们试图调用 JavaScript\
    \ `console` 对象的一个不存在的方法。然而，这种情况下的优点是，源映射可以将我们引导到 *Python* 源文件中问题的原因。因此，尽管实际在 Web\
    \ 浏览器中运行的是生成的 JavaScript，但使用源映射，我们仍然可以在 Web 浏览器中直接查看我们的 Python 代码，并查看 Python 文件中错误发生的位置。\n\
    \n![](img/b9edce8c37f03791c5b16f4807072a3c_9_1.png)\n\n### 2.4 React\n\n现在我们已经了解了\
    \ Transcrypt 如何让我们调用 JavaScript，让我们更进一步，使用 Transcrypt 来调用 React 库。我们将再次从一个简单的\
    \ *Hello World* 应用程序开始，但这次采用 React 的方式。我们将继续使用两个源文件：一个要转译的 Python 文件，以及一个作为应用程序在\
    \ Web 浏览器中入口点的 HTML 文件。"
