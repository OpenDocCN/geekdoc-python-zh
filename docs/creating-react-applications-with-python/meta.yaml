  md: '# 2.5 Building a React Application


    Having done a simple React application, let’s now create one that has a few more
    moving parts. This demo will take a value entered through the UI and add it to
    a list when submitted.


    Most web applications of any utility will get large enough to where it becomes
    too unwieldy to manage manually. This is where package managers and application
    bundlers come into play. For this next example, we’ll use the Parcel bundler to
    build and bundle the application so you can see what this developer stack might
    look like for larger applications.


    First, we need to install the necessary JavaScript libraries to support the development
    toolchain. This does require [Node.js](https://nodejs.org) to be installed on
    your system so that we can use the Node Package Manager. We start by initializing
    a new project and installing the Parcel bundler library along with the plug-in
    for Transcrypt:


    ```

    $ npm init -y

    $ npm install parcel-bundler --save-dev

    $ npm install parcel-plugin-transcrypt --save-dev

    ```


    Then we can install the React libraries:


    ```

    $ npm install react@16 react-dom@16

    ```


    Because of a version incompatibility, there is a file in the current Transcrypt
    plug-in that requires a patch. The file in question is:

    **./node_modules/parcel-plugin-transcrypt/asset.js**


    In that file, change line 2 that loads the Parcel Logger module from this:


    ```

    const logger = require(''parcel-bundler/src/Logger'');

    ```


    to this:


    ```

    const logger = require(''@parcel/logger/src/Logger'');

    ```


    Once this modification is made to change the location of the Parcel Logger module,
    the Transcrypt plug-in for Parcel should be working.


    **NOTE FOR WINDOWS USERS:**

    For those of you using Windows, two more changes need to be made to the **asset.js**
    file for it to work in Windows environments. The first is to modify the default
    Transcrypt build configuration to just use the version of Python that you set
    your virtual environment up with.

    To do that, change line 14 that defines the Transcrypt command to simply use python
    instead of python3, changing it from this:'
