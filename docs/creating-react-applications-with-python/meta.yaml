  md: '# Creating React Applications with Python


    # 1.3 npm instead of pip


    Most Python language constructs and built-ins have been implemented in Transcrypt,
    so working with standard Python objects like lists, dictionaries, strings, and
    more will feel just like Python should. Generally speaking however, third-party
    Python libraries are not supported unless the library (and its dependencies) are
    pure Python.


    What this means is that instead of turning to urllib or the requests library when
    you need to make an HTTP request from your web browser application, you would
    utilize window.fetch() or the JavaScript axios library instead. But you would
    still code to those JavaScript libraries using Python.'
