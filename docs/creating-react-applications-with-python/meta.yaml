    \ USERS:**\nFor those of you using Windows, two more changes need to be made to\
    \ the **asset.js** file for it to work in Windows environments. The first is to\
    \ modify the default Transcrypt build configuration to just use the version of\
    \ Python that you set your virtual environment up with.\nTo do that, change line\
    \ 14 that defines the Transcrypt command to simply use python instead of python3,\
    \ changing it from this:\n\n```\n\"command\": \"python3 -m transcrypt\",\n```\n\
    \nto this:\n\n```\n\"command\": \"python -m transcrypt\",\n```\n\nThe second change\
    \ has to do with modifying an import file path so that it uses Windows-style back-slashes\
    \ instead of the Linux/Mac style forward-slashes. For this modification, we can\
    \ use a string replace() method on line 143 to make an inline correction to the\
    \ file path for Windows environments. So change this line:\n\n```\nthis.content\
    \ = `export * from \"${this.importPath}\";`;\n```\n\nto this:\n\n```\nthis.content\
    \ = `export * from \"${this.importPath.replace(/\\/g, '/')}\";`;\n```\n\nAt some\
    \ point, I would expect that a modification will be incorporated into the parcel-plugin-transcrypt\
    \ package so that this hack can be avoided in the future.\n\nNow that we have\
