  md: '# Creating React Applications with Python


    ![](img/b9edce8c37f03791c5b16f4807072a3c_9_0.png)


    If you open the developer console in the web browser and then click the button,
    the first two calls will execute, printing the text to the web browser console.
    The call to the JavaScript console.log() method behaves as you would expect. But
    as you can see here, the Python print() function ends up getting transpiled to
    call the JavaScript console.log() method as well.


    The third function call generates an error since we are trying to call a nonexistent
    method of the JavaScript console object. However, what’s nice in this case is
    that the sourcemap can direct us to the cause of the problem in our *Python* source
    file. So, even though it is the generated JavaScript that is actually running
    in the web browser, using a sourcemap, we can still view our Python code right
    in the web browser and see where the error occurred in the Python file as well.


    ![](img/b9edce8c37f03791c5b16f4807072a3c_9_1.png)


