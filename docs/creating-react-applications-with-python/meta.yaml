  md: "# Creating React Applications with Python\n\n```\n\"command\": \"python3 -m\
    \ transcrypt\",\n```\n\nto this:\n\n```\n\"command\": \"python -m transcrypt\"\
    ,\n```\n\nThe second change has to do with modifying an import file path so that\
    \ it uses Windows-style back-slashes instead of the Linux/Mac style forward-slashes.\
    \ For this modification, we can use a string replace() method on line 143 to make\
    \ an inline correction to the file path for Windows environments. So change this\
    \ line:\n\n```\nthis.content = `export * from \"${this.importPath}\";`;\n```\n\
    \nto this:\n\n```\nthis.content = `export * from \"${this.importPath.replace(/\\\
    /g, '/')}\";`;\n```\n\nAt some point, I would expect that a modification will\
    \ be incorporated into the parcel-plugin-transcrypt package so that this hack\
    \ can be avoided in the future.\n\nNow that we have a bundler in place, we have\
    \ more options as to how we work with JavaScript libraries. For one, we can now\
    \ take advantage of the Node require() function that allows us to control the\
    \ namespace that JavaScript libraries get loaded into. We will use this to isolate\
    \ our Python-to-JavaScript mappings to one module, which keeps the rest of our\
    \ code modules all pure Python.\n\nListing 8: pyreact.py\n\n```\n# __pragma__\
    \ ('skip')\ndef require(lib):\n    return lib\n\nclass document:\n    getElementById\
    \ = None\n    addEventListener = None\n# __pragma__ ('noskip')\n\n# Load React\
    \ and ReactDOM JavaScript libraries into local namespace\nReact = require('react')\n\
    ReactDOM = require('react-dom')\n\n# Map React javaScript objects to Python identifiers\n\
    createElement = React.createElement\n```"
