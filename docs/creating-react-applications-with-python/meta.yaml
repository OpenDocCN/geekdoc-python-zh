  md: '# Introduction


    # 1.1 Full-Stack Python


    Let me start by getting this out of the way: *I really like programming in Python,
    and I''m not a big fan of JavaScript*. But let''s face it, JavaScript is the way
    of the web, and Python doesn''t run in a web browser. So end of story, right?
    Well not so fast, because just like the popular TypeScript language gets transpiled
    into JavaScript to run in a web browser, [Transcrypt](https://transcrypt.org/)
    does the same thing for Python.


    Because of the way Transcrypt maps Python data types and language constructs to
    JavaScript, your Python code is able to utilize the full ecosystem of JavaScript
    libraries that exist. Transcrypt acts as a bridge that enables you to take advantage
    of existing JavaScript web application technologies rather than trying to reinvent
    them. And, it does it in a way that doesn''t significantly affect application
    performance over using plain JavaScript, or that requires a large runtime module
    to be downloaded to the client. And though we *use* JavaScript libraries, we don''t
    have to code in JavaScript to use their APIs.


    # 1.2 Features of Transcrypt


    +   - It''s PIP installable

    - Python code is transpiled to JavaScript before being deployed

    - It uses a very small JavaScript runtime (~40K)

    - It can generate sourcemaps for troubleshooting Python in the browser

    - The generated JavaScript is human-readable

    - The generated JavaScript can be minified

    - Performance is comparable to native JavaScript

    - It maps Python data types and language constructs to JavaScript

    - It acts as a bridge between the Python and JavaScript worlds

    - It supports almost all Python built-ins and language constructs

    - It only has limited support for the Python standard library

    - Your Python code can “directly” call JavaScript functions

    - Native JavaScript can call your Python functions

    - It only supports 3rd party Python libraries that are pure Python'
