    **./node_modules/parcel-plugin-transcrypt/asset.js**\n\nIn that file, change line\
    \ 2 that loads the Parcel Logger module from this:\n\n```\nconst logger = require('parcel-bundler/src/Logger');\n\
    ```\n\nto this:\n\n```\nconst logger = require('@parcel/logger/src/Logger');\n\
    ```\n\nOnce this modification is made to change the location of the Parcel Logger\
