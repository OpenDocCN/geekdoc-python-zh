  md: '# Creating React Applications with Python


    Then open the demo React application at:

    http://localhost:8000/hello_react.html


    ![](img/b9edce8c37f03791c5b16f4807072a3c_11_0.png)


    While functionally the same as the first demo application we did, this time React
    adds dynamically generated HTML as a child of a specified element - in this case,
    the "root" div.


    Here, we added some convenience variables, useState and el, to map the global
    React methods to local Python variables. The React createElement() method is the
    workhorse of the library and is used to generate HTML elements in the browser
    dynamically.


    React is declarative, functional, and is based on state. What this means, is that
    you define the view, and then React handles when and how it gets updated when
    there are changes in state. By design, React state variables are immutable and
    use a setter function to make updates. This helps React to know when changes to
    state occur, so it can then re-render the view as needed. In this example, we
    used the React useState() method to create the val variable and its corresponding
    setVal() setter function.


    The return statement of a React functional component generally consists of a number
    of nested and chained calls to the React createElement() function that collectively
    form a tree structure of HTML elements and/or React components. This is where
    the view is declaratively defined. It may take some time to get more comfortable
    with this if you are not used to doing functional programming in Python.


    The ReactDOM render() function takes the top-level React component and a reference
    to the HTML element to attach it to in the DOM. This is where it adds the dynamically
    generated HTML tree that React produces as a child of the specified element.'
