  md: "# Tutorial\n\n# 2.1 Installation\n\nGetting started with Transcrypt is pretty\
    \ easy. Ideally, you would want to create a Python virtual environment for your\
    \ project, activate it, and then use PIP to install Transcrypt. Transcrypt currently\
    \ supports Python 3.9 or Python 3.7 so you will need to create your virtual environment\
    \ with one of those versions, and then install the appropriate version of Transcrypt:\n\
    \n```\n$ python3.9 -m venv venv\nor\n$ python3.7 -m venv venv\n\n$ source venv/bin/activate\n\
    (for Windows use venv\\Scripts\\activate )\n\n(venv) $ pip install transcrypt==3.9\n\
    or\n(venv) $ pip install transcrypt==3.7.16\n```\n\n# 2.2 Hello World\n\nWith\
    \ Transcrypt installed, we can try a simple *Hello World* web application to see\
    \ how it works. We'll create two files: a Python file with a few functions, and\
    \ an HTML file that we will open up in a web browser:\n\nListing 1: *hello.py*\n\
    \n```\ndef say_hello():\n    document.getElementById('destination').innerHTML\
    \ = \"Hello World!\"\n\ndef clear_it():\n    document.getElementById('destination').innerHTML\
    \ = \"\"\n```\n\nListing 2: *hello.html*\n\n```\n<!DOCTYPE html>\n<html lang=\"\
    en\">\n    <body>\n        <script type=\"module\">\n            import {say_hello,\
    \ clear_it} from \"./__target__/hello.js\";\n            document.getElementById(\"\
    sayBtn\").onclick = say_hello;\n```"
