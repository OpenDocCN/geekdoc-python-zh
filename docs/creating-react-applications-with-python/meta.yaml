    # __pragma__ ('skip')\ndef require(lib):\n    return lib\n\nclass document:\n\
    \    getElementById = None\n    addEventListener = None\n# __pragma__ ('noskip')\n\
    \n# Load React and ReactDOM JavaScript libraries into local namespace\nReact =\
    \ require('react')\nReactDOM = require('react-dom')\n\n# Map React javaScript\
    \ objects to Python identifiers\ncreateElement = React.createElement\nuseState\
    \ = React.useState\n\ndef render(root_component, props, container):\n    \"\"\"\
    Loads main react component into DOM\"\"\"\n\n    def main():\n        ReactDOM.render(\n\
    \            React.createElement(root_component, props),\n            document.getElementById(container)\n\
    \        )\n\n    document.addEventListener('DOMContentLoaded', main)\n```\n\n\
    At the top of the file, we used one of Transcrypt’s __pragma__ compiler directives\
    \ to tell it to ignore the code between the skip/noskip block. The code in this\
    \ block doesn’t affect the transpiled JavaScript, but it keeps any Python linter\
