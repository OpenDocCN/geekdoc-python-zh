    \nThis starts up a webserver that serves up files in the current directory, from\
    \ which we can open our HTML file at:\nhttp://localhost:8000/hello.html\n\n![](img/b9edce8c37f03791c5b16f4807072a3c_7_0.png)\n\
    \nAs you can see with this simple demonstration, we have Python calling methods\
    \ of JavaScript objects using Python syntax, and JavaScript calling \"Python\"\
    \ functions that have been transpiled. And as mentioned earlier, the generated\
    \ JavaScript code is quite readable:\n\nListing 3 (Generated code): `__target__/hello.js`\n\
    \n```\n// Transcrypt'ed from Python\nimport {AssertionError, ... , zip} from './org.transcrypt.__runtime__.js';\n\
    var __name__ = '__main__';\nexport var say_hello = function () {\n    document.getElementById\
    \ ('destination').innerHTML = 'Hello World!';\n};\nexport var clear_it = function\
    \ () {\n    document.getElementById ('destination').innerHTML = '';\n};\n```"
