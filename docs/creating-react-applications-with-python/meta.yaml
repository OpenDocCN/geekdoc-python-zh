  mdcn: "## 使用 Python 创建 React 应用程序\n\n```python\nreturn el('form', {'onSubmit': handleSubmit},\n\
    \    el('label', {'htmlFor': 'newItem'}, \"New Item: \"),\n    el('input', {'id':\
    \ 'newItem',\n        'onChange': handleChange,\n        'value': newItem\n  \
    \  }),\n    el('input', {'type': 'submit'}),\n    el('ol', None,\n        el(ListItems,\
    \ {'items': items})\n    )\n)\n\nrender(App, None, 'root')\n```\n\n如前所述，我们从 **pyreact.py**\
    \ 模块导入所需的 JavaScript 映射，就像导入任何其他 Python 模块一样。我们将 React 的 `createElement()` 方法别名为\
    \ `el`，以使其更易于使用。\n\n如果你已经熟悉 React，此时你可能想知道为什么我们直接调用 `createElement()`，而不是将这些调用隐藏在\
    \ JSX 之后。原因在于 Transcrypt 利用 Python 的 AST 模块来解析 PY 文件，而 JSX 语法不是有效的 Python，因此会破坏这一过程。如果你真的想使用\
    \ JSX，*确实*有办法在 Transcrypt 中使用它，但在我看来，你必须采用的方式在某种程度上违背了使用 JSX 的初衷。\n\n在本模块中，我们创建了两个函数式\
    \ React 组件。`App` 组件是主入口点，作为我们正在构建的组件树的顶层。这里我们创建了两个状态变量及其配套的 setter 函数。`newItem`\
    \ 状态变量将保存要添加到列表中的输入值。`items` 状态变量则将保存所有先前输入的值。\n\n然后，我们有两个函数：一个用于在表单提交输入值时执行操作，另一个用于将正在输入的值与\
    \ React 组件的状态同步。\n\n接着，在 `App()` 函数的 return 语句中，我们声明了定义 UI 的元素树。元素树的顶层从一个 HTML\
    \ 表单开始。这使我们能够利用其默认的提交按钮，在本例中，该按钮调用我们的 `handleSubmit()` 函数，该函数将新值添加到列表中。\n\n在 `handleSubmit()`\
    \ 函数中，当向列表添加新项时，我们使用了一个内联编译器指令，让 Transcrypt 知道这行代码使用了运算符重载：\n\n```python\nsetItems(items\
    \ + [newItem])  # __:opov`\n```\n\n默认情况下，Transcrypt 会关闭此功能，因为如果全局启用，由于实现该特性所需的开销，会导致生成的\
    \ JavaScript 性能下降。如果你不想使用编译器指令仅在需要的地方启用运算符重载，在这种情况下，你也可以直接调用相应的 Python 运算符重载魔术方法，如其上方注释行所示。\n\
    \n在其中（或下方），我们有一个用于输入新值的 input 元素，以及一个在 UI 中标识它的相应 label 元素。input 元素将 `handleChange()`\
    \ 函数作为其 onChange 事件处理程序，以保持 React 状态与 UI 显示的内容同步。\n\n元素树中的下一个是已输入值的列表。这些值将使用 HTML\
    \ 有序列表元素在 UI 中显示，该元素会为添加到其中的项目编号。\n\n这就引出了本模块的第二个函数式组件 `ListItems`，它将 `items`\
    \ 状态变量中的值渲染为 HTML `li` 元素。这些项作为属性传递给该组件，我们将其解构为一个局部变量。然后，我们使用 Python 列表推导式通过遍历这些项来构建\
    \ `li` 元素列表。\n\n最后一步是调用导入的 `render()` 函数，该函数将我们的 `App` React 组件附加到 HTML 文件中由 'root'\
    \ 标识的 DOM 挂载点：\n\n```python\nrender(App, None, 'root')\n```\n\n你会注意到，由于我们将所有 Python\
    \ 到 JavaScript 的映射都放在了 `pyreact.py` 模块中，因此这个模块可以是 100% 纯 Pythonic 的 Python。没有语言混合，没有对\
    \ Python 语言的奇怪扭曲，也没有 JavaScript！\n\n为了完成这个演示，我们现在只需要一个可以加载到 Web 浏览器中的 HTML 入口点：\n\
    \n**清单 10：index.html**\n\n```html\n<!DOCTYPE html>\n<html lang=\"en\">\n    <head>\n\
    \        <script src=\"app.py\"></script>\n        <title>React to Python</title>\n\
    \    </head>\n    <body>\n        <div id=\"root\"></div>\n    </body>\n</html>\n\
    ```\n\n这一次，我们不是直接运行 Transcrypt，而是可以使用 Node 的 npx 包运行器运行 parcel 命令。得益于 Transcrypt\
    \ Parcel 插件，它也会为我们运行 Transcrypt 并打包生成的 JavaScript 文件：\n\n```\n(venv) $ npx parcel\
    \ --log-level 4 --no-cache index.html\n```\n\n这还会启动 Parcel 开发 Web 服务器，该服务器将使用默认路由在以下地址提供生成的内容：\n\
    http://localhost:1234\n\n![](img/b9edce8c37f03791c5b16f4807072a3c_17_0.png)\n\n\
    至此，我们已经具备了使用 Python 构建 React 应用程序的基础！\n\n## 更多内容...\n\n### 3.1 React to Python\n\
