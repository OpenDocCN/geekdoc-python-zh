    \n任何实用的Web应用程序最终都会变得足够大，以至于手动管理变得过于繁琐。这就是包管理器和应用打包器发挥作用的地方。在下一个例子中，我们将使用Parcel打包器来构建和打包应用，以便你了解对于更大的应用，这种开发栈可能是什么样子。\n\
