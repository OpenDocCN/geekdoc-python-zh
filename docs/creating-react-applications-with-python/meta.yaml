    \ and bundle the application so you can see what this developer stack might look\
    \ like for larger applications.\n\nFirst, we need to install the necessary JavaScript\
    \ libraries to support the development toolchain. This does require [Node.js](https://nodejs.org)\
    \ to be installed on your system so that we can use the Node Package Manager.\
    \ We start by initializing a new project and installing the Parcel bundler library\
    \ along with the plug-in for Transcrypt:\n\n```\n$ npm init -y\n$ npm install\
