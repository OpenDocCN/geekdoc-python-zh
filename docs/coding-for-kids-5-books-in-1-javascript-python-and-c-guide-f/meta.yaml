    \ multiline comments sit in between the following symbols: /\\*\\*/\n\nExamples\
    \ of comments:\n\n```\n// Test Code\n\n/* Line 1 of Comments\nLine 2 of Comments\
    \ */\n```\n\n## Declaring variables\n\nAll variables must be declared or defined\
