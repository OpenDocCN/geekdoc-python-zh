- md: "## Example 4 – Guess World Capitals\n\nIn this example we use both list and\
    \ dictionary. A dictionary `capital_dict` is used to make country:capital key\
    \ pairs. Then we get the dictionary keys using `keys()` method and store them\
    \ in `countries` list. This is essential so we can use `random.choice()` function\
    \ which takes a list and return a value from list randomly. Then inside an infinite\
    \ while loop, user is asked for a capital using `input` function and the answer\
    \ is compared to actual capitals.\n\n```python\n# World capital game\nimport random\n\
    \n# World capitals dictionary\ncapital_dic={\n    'spain':'madrid',\n    'france':'paris',\n\
    \    'germany':'berlin',\n    'norway':'oslo',\n    'india':'new delhi',\n   \
    \ 'egypt':'cairo'\n}\n\n# get countries and convert it to list so we can use random\
    \ function\ncountries = list(capital_dic.keys())\nprint ('Let\\'s learn World\
    \ Capitals. Enter quit to quit the game.')\n\nwhile True:\n    # pick a random\
    \ country\n    country = random.choice(countries)\n    capital = capital_dic[country]\n\
    \n    guess = input(f'what is the capital of {country}.')\n    # if user type\
    \ quit, quit\n    if guess.lower() == 'quit':\n        break\n    elif guess.lower()\
    \ == capital:\n        print(f'Correct !')\n        break\n    else:\n       \
    \ print(f'Incorrect. The capital of {country} is {capital}.')\n```\n\n## Output:\n\
    \n```\nwhat is the capital of india. []\nLet's learn World Capitals. Enter quit\
    \ to quit the game.\n```\n\n## Wrong answer is entered.\n\n```\nLet's learn World\
    \ Capitals. Enter quit to quit the game.\nwhat is the capital of india.cairo\n\
    Incorrect. The capital of india is new delhi.\n\nwhat is the capital of norway.\
    \ []\n```\n\n## Correct answer is entered.\n\n```\nLet's learn World Capitals.\
    \ Enter quit to quit the game.\nwhat is the capital of india.cairo\nIncorrect.\
    \ The capital of india is new delhi.\nwhat is the capital of norway.oslo\nCorrect\
    \ !\n```\n\nIn above code, Cairo is entered as the capital of India. As the answer\
    \ is incorrect, the program outputs ‘Incorrect. The capital of india is new delhi’.\n\
    \nIn the second part of the program, ‘oslo’ is entered as the correct capital\
    \ of Norway, and the program outputs ‘correct!’\n\n## Example 5 – Random quotes\n\
    \nThis example generates random quote from a tuple of quotes using `random.choice()`\
    \ function. While a list would also work, a tuple is used because we never intend\
    \ to manipulate quotes, they remain immutable throughout the program. For large\
    \ immutable object, tuple is more efficient and also secures since it guarantees\
    \ that object can never change without having error. Preventing accidental manipulation.\n\
    \n```python\n# Random quote\nimport random\n\n# since we dont intend to do any\
    \ operation on quotes we use tuple instead of lists\nquotes = (\n    \"Yesterday's\
    \ the past, tomorrow's the future, but today is a gift.\",\n    \"The best preparation\
    \ for tomorrow is doing your best today.\",\n    \"Change your life today.\",\n\
    \    \"If you fell down yesterday, stand up today.\",\n    \"Never give up. \"\
    ,\n    \"Dream as if you'll live forever.\",\n    \"The science of today is the\
    \ technology of tomorrow.\",\n    \"Did I offer peace today?\",\n)\n\nrand_quotes\
    \ = random.choice(quotes)\nprint(\"Todays quote is:\", rand_quotes)\n```\n\nTodays\
    \ quote is: Change your life today.\n\n## Example 6 – Guess a country name\n\n\
    In this example, we make a game similar to hangman where we ask the user to guess\
    \ the name of the country. We have a tuple of various country names. The user\
    \ is allowed to have guess a few times incorrectly before losing. We make a list\
    \ of correctly guessed characters where correct guesses are appended to. The user\
    \ wins when the guessed list length is equal to country name length. Note that\
    \ we used a list data structure for guessed characters since it is continuously\
    \ updated while countries are in tuple since it is never mutated.\n\n```python\n\
    # guess a random country\n\nimport random\n\n# list of countries\ncountries =\
    \ ('france', 'usa', 'spain', 'india', 'brazil', 'norway', 'germany')\n\n# Choose\
    \ random country from countries\ncountry = random.choice(countries)\n\n# number\
    \ of turns\nturns = 4\n\n# a list to store the guessed characters\nguessed = []\n\
    while turns > 0:\n    # print guessed characters\n    for char in country:\n \
    \       if char in guessed:\n            print(char, end='')\n        else:\n\
    \            print('-', end='')\n\n    print()\n    print(f\"You have {turns}\
    \ left.\")\n\n    # user input\n    guess = input(\"guess a character:\")\n\n\
    \    # make sure guess is lowercase\n    guess = guess.lower()\n\n    # if guess\
    \ already made\n    if guess in guessed:\n        print(\"You have already made\
    \ this guess\\n\")\n\n    # check input with the character in word\n    if guess\
    \ not in country:\n        turns -= 1\n    else:\n        # character is in word\
    \ , append character\n        # the number of times it appear in word\n      \
    \  count = country.count(guess)\n        for i in range(count):\n            guessed.append(guess)\n\
    \n    # if guessed length match country length then user wins\n    # else if ran\
    \ out of turns user loses\n    if len(guessed) == len(country):\n        print(\"\
    Congratulation you guessed correctly!!\")\n        break\n    elif turns == 0:\n\
    \        print(\"Good luck next time\")\n```\n\n## Output:\n\n```\nGuess the characters\n\
    ------\nYou have 4 left.\nguess a character:n\nn-----\nYou have 4 left.\nguess\
    \ a character:o\nno----\nYou have 4 left.\nguess a character:r\nnor---\nYou have\
    \ 4 left.\nguess a character:w\nnorw--\nYou have 4 left.\nguess a character:a\n\
    norwa-\nYou have 4 left.\nguess a character:f\nnorwa-\nYou have 3 left.\nguess\
    \ a character:y\nCongratulation you guessed correctly!!\n```\n\n## Practice Problems\n\
    \n1. Write a program to append all dictionary values to a list.\n2. Write a program\
    \ to check if a given key exist in a dictionary.\n3. Write a program to find highest\
    \ numerical value in a dictionary.\n4. Write a program that takes 2 equally sized\
    \ lists and convert them into a dictionary where list 1 contains the keys and\
    \ list 2 contains the values.\n5. Create a program that picks and prints a random\
    \ joke from list or tuple of jokes .\n\n## Objects\n\nAn object is a collection\
    \ of instances of data structures that belong to a class. These instances can\
    \ have different data types. Think of a class as a factory that produce objects.\n\
    \n### Example 1: Object Shape\n\nIn this example. We create a class `shape`, the\
    \ class assigns name, color, size and position to object. Then we create object\
    \ `my_shape` by calling the class at line 8. At line 9 through 12, we access object\
    \ values by using dot ‘.’ notation. For example, `my_shape.name` is circle. Then\
    \ we change object values by reassigning them to different values.\n\n```python\n\
    # create class\nclass shape:\n    name = 'circle'\n    color = 'red'\n    size\
    \ = 5\n    position = (0,0)\n\nmy_shape = shape()\nprint(\"name is: \", my_shape.name)\n\
    print(\"color is: \", my_shape.color)\nprint(\"size is: \", my_shape.size)\nprint(\"\
    position is: \", my_shape.position)\n\nmy_shape.name = 'triangle'\nmy_shape.color\
    \ = 'black'\nmy_shape.size = 10\nmy_shape.position = (10, 10)\n\nprint()\nprint(\"\
    my_shape values after reassignment are:\")\nprint()\n\nprint(\"name is: \", my_shape.name)\n\
    print(\"color is: \", my_shape.color)\nprint(\"size is: \", my_shape.size)\nprint(\"\
    position is: \", my_shape.position)\n```\n\nname is: circle\ncolor is: red\nsize\
    \ is: 5\nposition is: (0, 0)\n\nmy_shape values after reassignment are:\n\nname\
    \ is: triangle\ncolor is: black\nsize is: 10\nposition is: (10, 10)\n\n### Example\
    \ 2: Dice Game\n\nThis is a game of dice between 2 players where dice is flipped\
    \ 1000 times. If dice flip result in an even number player 1 wins one point, if\
    \ it is odd player 2 wins 1 point. The dice flip is implemented using random number\
    \ function.\n\n```python\n# dice game if it is even player 1 point\n# odd player\
    \ 2 gets 1 point\n# import random library\nimport random\n\n# create class player\
    \ with score intialize to zero\nclass player:\n    score = 0\n\n# if number is\
    \ even return True else return False\ndef is_even(n):\n    even = None\n    if\
    \ n % 2 == 0:\n        even = True\n    else:\n        even = False\n\n    return\
    \ even\n\n# create players\nplayer1 = player()\nplayer2 = player()\n\n# run loop\
    \ for 1000 times\nfor i in range(1000):\n    # dice flip , return random number\
    \ between 1 and 6 inclusive\n    dice = random.randint(1, 6)\n\n    if is_even(dice):\n\
    \        player1.score += 1\n    else:\n        player2.score += 1\n\nprint(\"\
    Player 1 score is: \", player1.score)\nprint(\"Player 2 score is: \", player2.score)\n\
    ```\n\n`randint` which generate numbers between 1 and 6 inclusive. Class `player`\
    \ creates player objects with score initialized to zero. Each time one player\
    \ wins we access `player.score` and increment it by one.\n\n```\nPlayer 1 score\
    \ is:  518\nPlayer 2 score is:  482\n```\n\nWe can see that players score are\
    \ close, which is expected since each player win probability is 50% as the ration\
    \ of odd:even of dice output is 1:1.\n\n## Practice Problems"
