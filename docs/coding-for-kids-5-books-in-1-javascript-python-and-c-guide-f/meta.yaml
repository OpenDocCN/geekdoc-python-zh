    \n## Pong Game\n\nThe Pong game is a fun game that builds on the “**Bouncing Ball**”\
    \ game on Page 215 of this book. So, the program has a ball bouncing around the\
    \ canvas. We add a bat in the LH corner of the screen that moves up and down.\
    \ The bat of length 15 pixels is drawn using **clearRect()** and **fillRect()**.\
    \ It is set to a constant xlocation of 10 and the ylocation is defined by a variable\
    \ called **yrect**. yrect is defined in functions **movedown()** and **moveup()**.\
    \ Moveup() is activated when up button is pressed and it decreases yrect by 30\
    \ pixels, which moves the bat up. Movedown() is activated when down button is\
    \ pressed and it increases yrect by 30 pixels, which moves the bat down.\n\nAlso,\
    \ the function **press(event)** detects the presence of keys pressed and activates\
    \ moveup() and movedown() when up and down button are pressed respectively.\n\n\
    And we finally have the **frame()** function. It is a function that checks if\
    \ the ball is next to the top, bottom and right walls. If the x-coordinate of\
    \ the ball gets close to 500, then it is close to the right wall. Then we change\
    \ the direction of x-motion to create a bounce back. We do the same thing if the\
    \ y-coordinate is 0 or 500 (it reaches top/bottom wall), so we change direction\
    \ of y-motion for the bounce.\n\nAnd finally, we have a check to see if the ball\
    \ touches the bat. We calculate the distance dist between bat location and ball\
    \ location using Pythagoras theorem. If the distance (dist) is less than 75 pixels,\
    \ then we change the direction of x-motion.\n\n```html\n<head>\n    <title>Pong\
    \ Game</title>\n</head>\n<body>\n    <canvas id=\"canvas\" width=\"800\" height=\"\
    600\" style=\"border:1px solid #000000;\"></canvas>\n    <script src=\"https://code.jquery.com/jquery-2.1.0.js\"\
    ></script>\n    <script>\n        var canvas = document.getElementById(\"canvas\"\
    );\n        var cx = canvas.getContext(\"2d\");\n        var w=canvas.width;\n\
    \        var l=canvas.length;\n        var yrect=0;\n        cx.beginPath();\n\
    \        cx.clearRect(0, 0, 800, 600);\n        cx.rect(10, yrect, 15, 90);\n\
    \        cx.fill();\n        cx.fillStyle = \"black\";\n\n        setInterval(press\
    \ , 100);\n\n        //Ball variables\n        var snx=1;\n        var sny=1;\n\
    \        setInterval(frame, 10);\n        locationx=Math.random()*350;\n     \
    \   locationy=Math.random()*350;\n\nfunction movedown()\n{\nyrect=yrect+30;\n\
    if (yrect>570)\n{\nyrect=yrect-30;\n}\ncx.beginPath();\ncx.clearRect(0, 0, 800,\
    \ 600);\ncx.rect(10, yrect, 15, 90);\ncx.fill();\ncx.fillStyle = \"black\";\n\
    }\nfunction moveup()\n{\nyrect=yrect-30;\nif (yrect<0)\n{\nyrect=yrect+30;\n}\n\
    cx.beginPath();\ncx.clearRect(0, 0, 800, 600);\ncx.rect(10, yrect, 15, 90);\n\
    cx.fill();\ncx.fillStyle = \"black\";\n}\n\nvar keyc = {\n16: \"shift\",\n27:\
    \ \"escape\",\n32: \"space\",\n37: \"left\",\n38: \"up\",\n39: \"right\",\n40:\
    \ \"down\",\n46: \"delete\"\n};\n$(\"body\").keydown(press);\n\nfunction press(event)\n\
    {\nif (keyc[event.keyCode]==\"up\")\n{\nmoveup();\n}\n\nif (keyc[event.keyCode]==\"\
    down\")\n{\nmovedown();\n}\n}\nfunction frame()\n{\n//Circle\ncx.beginPath();\n\
    cx.clearRect(20, 0, 800, 600);\ncx.arc(locationx,locationy,20,0,2*Math.PI);\n\
    cx.fillStyle = \"red\";\ncx.stroke();\ncx.fill();\ndist=Math.sqrt((locationx-10)**2+(locationy-yrect)**2);\n\
    //document.write(dist);\nif (locationx>=800)\n{\nsnx=snx*-1;\n}\nif (dist<75)\n\
    {\nsnx=snx*-1;\nlocationx=locationx+snx*20;\n}\nif (locationy>=600)\n{\nsny=sny*-1;\n\
    }\nif (locationy<=0)\n{\nsny=sny*-1;\n}\nlocationx=locationx+snx*5;\nlocationy=locationy+sny*5;\n\
    }\n</script>\n</body>\n</html>\n```\n\n# Output:\n\n![](img/443990a0ec620659ce8be783c0758bc6_410_0.png)\n\
    \n## Handwritten calculation (distance between bat and ball)\n\n![](img/443990a0ec620659ce8be783c0758bc6_410_1.png)\n\
    \n$Dist = \\sqrt{(ylocation - yrect)^2 + (xlocation - 10)^2}$\n\n## Practice Problems\n\
