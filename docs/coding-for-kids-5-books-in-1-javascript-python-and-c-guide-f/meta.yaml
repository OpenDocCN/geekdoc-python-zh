    \n同时，如果你感兴趣，可以查看以下书籍：\n[Python Crash Course by Eric Matthes](https://www.google.com/search?q=Python+Crash+Course+by+Eric+Matthes)\n\
    [Learning Python by Mark Lutz](https://www.google.com/search?q=Learning+Python+by+Mark+Lutz)\n\
