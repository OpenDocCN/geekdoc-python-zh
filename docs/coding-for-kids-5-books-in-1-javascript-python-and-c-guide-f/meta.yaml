  md: '# Exponent and Logarithms


    Exponents in Javascript are done using the Math.pow() function and natural logarithms
    are done using Math.log(). If we want logarithm to the base10 we use Math.log10().


    ```

    <html>

    <head><title>Sample Form</title></head>

    <body>

    <button onclick="test()">Random Numbers</button>

    <script>

    function test()

    {

    var n1 = Math.pow(6,2);

    var n2 = Math.pow(7,3);

    var n3 = Math.log(100);

    var n4 = Math.log10(100);


    document.write("6 raised to the power 2 = <strong>"+n1+"</strong><br>");

    document.write("7 raised to the power 3 = <strong>"+n2+"</strong><br>");

    document.write("The natural logarithm of 100 is = <strong>"+n3+"</strong><br>");

    document.write("Logarithm (to the base 10) of 100 is = <strong>"+n4+"</strong><br>");


    }

    </script>

    </body>

    </html>

    ```


    In the code above, we have two examples of exponents using Math.pow(x,y). Basically,
    x is raised to the power of y in both both cases. n1 and n2 give exponents. n3
    shows a natural logarithm of 100 and n4 shows logarithm to base 10 of 100.'
  merge: -1
  pgno: 283
