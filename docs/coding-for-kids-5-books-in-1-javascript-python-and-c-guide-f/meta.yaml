    Testing 1,2,3


    I know that it may be a simple test for some; but it is important to make sure
    that everything is working before we get on to actual programming.


    ## Intro to html


    ### What is html?


    Html stands for Hyper Text Markup Language

    Html is the language that humans use to connect with web browsers like Chrome,
    Internet Explorer, Firefox etc.

    Sometimes, it is assisted by css and JavaScript; but the basic structure of a
    web page is defined by html.

    It is pretty simple and easy to grasp for even beginners to programming and young
    kids.

    Html is done using simple tags that look like the ends of an arrow.


    ### Example of a html tag


    Here’s what a html tag looks like:

    **<p>** - Example of a tag

    Every html tag has an extra tag that signals the end of the tag. The ending of
    a tag has a slash in it in addition to the two ends of a tag. See below for a
    simple example.


    ```

    <p> - Tag starts

    </p> - Tag ends

    ```


    ### Basic html tags and What They’re Used For


    <html>

    This is the tag that starts every piece of html code.


    <head>

    This is the code that is executed first before anything else.


    <title>

    This is the code written in the top ribbon of the browser.


    <body>

    Includes the information that appears on the page.


    <p>

    This is used for a paragraph of text that appears on the body.


    <h1>, <h2>, <h3>, <h4>, <h5>, <h6>

    These are used for headings on text in descending order of size. <h1> is the largest
    size heading, and <h6> is the smallest.


    <strong>

    This is used to bold text


    <ul>

    This is used for unordered lists such as bulleted items


    <li>

    Used to add a bullet icon before a line of text


    <ol>

    This is used for ordered lists such as items numbered from 1,2,3...


    <div>

    These are larger sections of content; that generally contain several paragraphs,
    headings, etc.


    <a>

    This is used to hyperlink text. Hyperlink is what happens when you click on a
    piece of underlined text and it links to another page


    <img>

    This is used for adding images to a web page.


    Now, you might be wondering that it’s a lot to learn. Don’t worry. You don’t need
    to memorize any of it for now.

    Just use it as a reference for when you code.

    We’re going to go through an examples that will explain everything better.


    ### Html example:


    ```

    <html>

    <head>

    <title>Greeting to html.......</title>

    </head>

    <body>

    <h1>Welcome to your first html website</h1>

    <h2>Time to get started....</h2>

    <p>Hi. My name is Bob. I am excited to learn about programming a website. Here''s
    a few things we will learn.</p>

    <ul>

    <li>Basics of html</li>

    <li>CSS</li>

    <li>JavaScript</li>

    </ul>

    </body>

    </html>

    ```


    Same code below: (that you can copy and paste)


    ```

    <html>

