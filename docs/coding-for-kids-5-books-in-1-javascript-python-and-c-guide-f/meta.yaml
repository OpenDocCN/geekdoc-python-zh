    ## 计时器与动画


    ### 什么是计时器？


    Javascript 中的计时器用于为 Javascript 代码计时。它允许用户在不同的时间间隔执行代码的不同部分。**setTimeOut()** 和
    **setTimeInterval()** 函数用于设置计时器。**setTimeOut()** 允许在执行代码前有一个固定的延迟；**settimeinterval()**
    允许代码在每次执行之间有固定间隔地多次执行。例如：**setTimeOut(a, 1000)** 在 **1000 毫秒（1 秒）** 后执行函数 **a**。**setTimeInterval(a,
    1000)** 会持续执行该函数，每次运行之间间隔 **1000 毫秒（1 秒）**。这些函数是运行 JavaScript 动画的关键。


    ### 计时器示例


    在我们的代码中，我们只使用 **setInterval()** 函数。在下面的示例中，有两个按钮运行两个独立的函数。第一个函数 **writename()**
    每 2500 毫秒（或 2.5 秒）在屏幕上打印一次名字“Bob”。函数 **fname()** 使用 **setinterval(fname, 2500)**
    运行，并写入名字“Bob”。第二个函数运行 **setcount()** 函数，从 1 开始打印数字，每次递增 1，间隔为 500 毫秒（0.5 秒）。因此，它会打印
    1,2,3,4 等等，每次打印之间间隔 0.5 秒。


    ```html

    <html>

    <head><title>Counting Timer</title>

    </head>

    <body>

    <link rel="stylesheet" href="samplestyle.css" />

    <button class="btn a" onclick="setcount()">Count</button>

    <button class="btn a" onclick="writename()">Write Name</button>


    <script>

    function writename()

    {

    var name="Bob";

    setInterval(fname, 2500);

    function fname()

    {

    document.write(''<link rel="stylesheet" type="text/css" href="samplestyle.css"
    />'');

    document.write(name);

    document.write("<br>");

    }

    }


    function setcount()

    {

    count=0;

    setInterval(timeUp, 500);

    function timeUp()

    {

    document.write(''<link rel="stylesheet" type="text/css" href="samplestyle.css"
    />'');

    count=count+1;

    document.write(count);

    document.write("<br>");

    }

    }

    </script>

    </body>

    </html>

    ```


