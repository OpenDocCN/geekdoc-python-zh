  md: '# Introduction


    Rob had been in front of his computer for a few hours. He was in the middle of
    programming the next version of his JavaScript game. After making a lot of progress
    in the last month, he was now stuck. He tried a lot of different things, but still
    just cannot make it work. This is a common problem in coding. Learning the basics
    of coding is a good start. Rob read my first coding book ([Coding for Kids Ages
    9-15](https://example.com)) a few months ago and he was very excited. Not only
    did learn the basics well and successfully went through all the exercises; he
    also implemented some of his own programs and fun coding games. He loved programming;
    and he was hooked.


    After a couple of months, however, Rob got stuck. He was getting tired and bored.
    He kept doing similar programs over and over. He struggled with more advanced
    topics. The story of Rob is similar to those of thousands of kids across America
    and the world. These kids have the resources and money available to move forward.
    Some of their parents have spent a month’s salary (sometimes even more) to get
    their child a laptop to program with. However, both the parents and their kids
    realize that they need more to get going. There is something missing. Something
    that is hard to quantify.


    The story of Rob and others inspired me to write the next Javascript book. While
    Rob might seem to be struggling, he needs to be commended for his effort. Too
    many of us give up at the first sight of difficulty. We move on from activity
    to activity with the mindset of a kitten playing with a ball of yarn. The truth
    is that there is no movement forward in any activity without a little bit of effort
    and pain. Rob just needs that little bit more, and that’s contained in this book.


    This book starts off with some of the basics to ensure that you have the basic
    knowledge needed to more forward. We’ll talk about setting up your workspace and
    doing basic programming and testing. However, this book does have a strong emphasis
    on coding games, activities and puzzles. These are meant to embed a deeper love
    for what programming can accomplish. We realize how important these kind of coding
    games are to the learning'
