    the ball is next to the top, bottom and right walls. If the x-coordinate of the
    ball gets close to 500, then it is close to the right wall. Then we change the
    direction of x-motion to create a bounce back. We do the same thing if the y-coordinate
    is 0 or 500 (it reaches top/bottom wall), so we change direction of y-motion for
    the bounce.

