    \n# WHILE LOOP EXAMPLE 1\n\nA while loop runs while a certain condition is met.\
    \ If the condition is no longer met, it breaks out of the loop. In the below example,\
    \ the program executes a while loop that takes in a user input via the prompt\
    \ function. The while loop keeps running and printing the user text. The loop\
    \ stops when the user inputs the word ‘**STOP**’. Once the word is input, that’s\
    \ the end of the while loops and the program stops.\n\n```html\n<html>\n<head><title>While\
    \ Loop Test</title></head>\n<body>\n<button onclick=\"testwhileloop()\">Test</button>\n\
    <script>\nfunction testwhileloop()\n{\n    var inputtext = \"\";\n    while (inputtext\
    \ != \"STOP\")\n    {\n        inputtext = prompt(\"Enter what you want to do\
    \ now (Enter in ALL CAPS)\");\n        document.write(\"Next Activity = \"+inputtext+\"\
    <br>\");\n    }\n}\n</script>\n</body>\n</html>\n```\n\nHere’s the output below\
    \ that shows how this works.\n\n# Output:\n\n![](img/443990a0ec620659ce8be783c0758bc6_306_0.png)\n\
    \n![](img/443990a0ec620659ce8be783c0758bc6_306_1.png)\n\n![](img/443990a0ec620659ce8be783c0758bc6_306_2.png)\n\
    \n# Practice Problems\n\n1. Write a program that inputs a number via a form and\
