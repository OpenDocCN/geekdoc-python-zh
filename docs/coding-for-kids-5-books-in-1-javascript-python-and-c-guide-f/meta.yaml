  mdcn: "## 输出：\n\n![](img/443990a0ec620659ce8be783c0758bc6_248_0.png)\n\n希望通过这个示例，你对HTML表单的基础知识有了一些了解。在接下来的几章中，我们将学习如何使用JavaScript来处理我们输入的信息。实际上，我们将使用这个相同的示例，并用JavaScript将其打印出来。\n\
    \n## 练习题\n\n- 1. 编写一个HTML表单，作为大学生的简历。它通过文本框接受名、姓、大学名称；通过下拉菜单选择大学年级。然后有3个活动/实习/合作项目。每个活动都有一个开始日期元素、结束日期元素和一个足够大的文本区域来描述经历。最后是一个提交按钮。\n\
    - 2. 编写一个HTML表单，作为购物清单。它接受名、姓、购物日期、地址和城市。它有5个下拉菜单，每个菜单包含30个常见的杂货物品可供选择。最后，它有一个提交按钮。\n\
    \n以上每个练习都将在下一章中用JavaScript进行扩展。\n\n## 什么是JavaScript？\n\nJavaScript是一种高级编程语言，用于使网页更具交互性和动态性。它是基于文本且用户友好的。HTML用于创建网页结构，CSS用于网页样式，而JavaScript则用于使网页与用户更具交互性。它允许不同的HTML元素相互交互、执行计算、动画等。换句话说，它使网页编程变得有趣。\n\
    \n## 在HTML中使用JavaScript\n\n在HTML网页中使用JavaScript有两种方式。第一种方式是直接在HTML的`<script>`标签内添加代码。这在下面代码的蓝色部分中显示。\n\
    \n```\n<html>\n<head><title>Test file 1</title>\n</head>\n<body>\n<script>\n//在此处输入JavaScript代码\n\
    </script>\n</body>\n</html>\n```\n\n第二种方式是创建一个包含代码的外部JavaScript文件，并将其保存为`.js`文件。然后你可以将该文件链接到HTML内容。例如，假设你创建了一个名为`test.js`的文件。你可以使用下面代码的蓝色部分将其链接：\n\
    \n```\n<html>\n<head><title>Test file 2</title>\n</head>\n<body>\n<script src=\"\
    test.js\"></script>\n</body>\n</html>\n```\n\n## JavaScript元素\n\n有了这些基础知识，让我们来看一些基本的JavaScript元素。\n\
    \n**函数**\nJavaScript中的函数是一组执行特定任务的代码行。\n它在JavaScript的`<script>`标签内定义如下：\n\n```\n\
    function afunc()\n{\n//在此处输入函数代码\n}\n```\n\n函数的名称是`afunc`，花括号内的代码在每次调用`afunc`时执行。\n\
    当我们想在同一程序中多次执行相同任务时，使用函数非常有用。我们可以直接调用函数，而不是多次编写相同的代码行。\n\n**变量**\nJavaScript中的变量是一个占位符，它具有某个值。该值可以在整个程序中更改，并可用于代码的其他部分。让我们看一个例子：\n\
    \n```\nvar x=5;\n```\n\n`x`是定义的变量。它初始值为5。\n之后，在程序中，它可以更改为不同的值，例如：\n\n```\nx=10;\n\
    ```\n\n现在，`x`的值为10。并且，如果我们执行：\n\n```\nx=x-1;\n```\n\n那么`x`变为9。我们刚才展示的是一个整数变量。我们也可以有用于存储文本值的字符串变量，例如：\n\
    \n```\nvar b=”abcd”\n```\n\n`b`是一个持有值`abcd`的变量。\n最后，我们可以有只持有`true`/`false`值的布尔变量。例如：\n\
    \n```\nvar c = true;\nvar d = (7>5);\nvar e = (7<6);\n```\n\n变量`c`、`d`和`e`都是布尔变量。变量`c`被赋值为`true`。变量`d`为`true`（因为7大于5）。变量`e`为`false`（因为7不小于6）。\n\
    \n## document.write()\n\n`document.write()`用于在网页上打印元素。括号内的任何内容都会打印在网页上。例如：\n`document.write(“Example\
    \ print”);`\n上面这行代码在屏幕上打印出单词“**Example print**”。\n我们也可以在屏幕上打印变量。例如，\n`var a=7;`\n\
    `document.write(a)`\n上面这行代码在屏幕上打印出7。\n并且，我们还可以使用“+”运算符组合不同的元素。例如：\n`var a=7;`\n\
    `document.write(“The number printed is “+a);`\n上面这行代码打印出“The number printed is\
    \ 7”。\n\n## alert()\n\n`alert()`在屏幕上弹出一个带有特定消息的弹出窗口。例如，\n`alert(“Hello”)`\n上面的消息会弹出一个显示“Hello”的弹出窗口。\n\
    \n![](img/443990a0ec620659ce8be783c0758bc6_253_0.png)\n\n## prompt()\n\n`prompt()`具有相同的弹出窗口，但带有一个允许用户输入的文本框。用户输入可以存储在一个变量中。例如：\n\
    `var name = prompt(“What is your name”);`\n它会显示一个弹出窗口。一旦用户输入他的名字并点击确定，它就会将值存储在变量`name`中。\n\
    \n![](img/443990a0ec620659ce8be783c0758bc6_254_0.png)\n\n## document.getElementById().value\n\
    \n`Document.getElementById().value`用于将HTML元素获取到JavaScript变量中。因此，我们需要使用HTML元素的`id`并将其放在括号内。让我们看一个例子。\n\
    让我们看下面的HTML元素：\n`Enter number: <input name=”x” type=”number” id=”test” size=”20”><br>`\n\
    JavaScript代码：\n`var testv=document.getElementById(“test”).value;`\n该HTML元素是一个表单文本框，用于接受用户输入的数字。\n\
    在JavaScript中，用户赋值的数字被设置给变量`testv`。\n\n## 如何添加注释\n\n注释是你添加到代码中以记录或解释代码的项目。注释不能被执行，也不会影响程序。\n\
    JavaScript中的注释使用两个双反斜杠（`//`）添加在注释前面。\n\n```\nhtml\n<html>\n<head>\n<title>Print\
    \ Name and Age......</title>\n</head>\n<body>\n<form id=\"form1\">\nEnter Name:\
    \ <input name=\"Enter Name\" type=\"text\" id=\"name\" size=\"20\"><br>\nEnter\
