    it touch the ‘ground’. Player moves the paddle by pointing the mouse to intended
    direction.


    In the game loop, infinite loop, ball is moves using move_ball() function which
    updates the ball position .Then , we draw the ball at its new location and move
    the paddle to where the mouse pointer points. We update display at fps frame per
    second. Fps is set at 80 frame per second. We can make the game more challenging/faster
    by increasing this number.


    It is always a good idea to read any game code in a top down approach, starting
    first at the main game loop getting high level idea about how the game operates.
    Then delving into functions definitions and understanding them one by on. The
    snippet below is our game loop.


    Now that you have a high-level idea about the game you can read the complete program.
    The code is well commented for the ease of reading.'
