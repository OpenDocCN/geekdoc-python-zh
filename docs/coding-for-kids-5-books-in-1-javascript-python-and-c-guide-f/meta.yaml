    # Comparison Operators


    Comparison operators compare two values and return either true or false


    Examples of comparison operators are:


    **Less than (<)**

    It returns true if the value on the left is less than the value on the right.
    Otherwise, it returns false.


    **Greater than (>)**

    It returns true if the value on the left is greater than the value on the right.
    Otherwise, it returns false.


    **Less than or equal to (<=)**

    It returns true if the value on the left is less than or equal to the value on
    the right. Otherwise, it returns false.


    **Greater than or equal to (>=)**

    It returns true if the value on the left is greater than or equal to the value
    on the right. Otherwise, it returns false.


    **Equal to (==)**

    It returns true if the value on the left is equal to the value on the right. Otherwise,
    it returns false.


    **Not equal to (!=)**

    It returns true if the value on the left is not equal to the value on the right.
    Otherwise, it returns false.


