    }\n</script>\n\n</body>\n</html>\n```\n\n很好。\n\n现在我们的 CSS 样式表已经链接到了我们的 HTML 文件。\n\
    \n## CSS 术语\n\n**html{}, body{}:** HTML 花括号内的代码定义了整个 HTML 文件的样式。花括号内的 body 代码是\
