    # Drawing (with measurements):


    Below is the drawing with the canvas size relative to the regular computer monitor
    screen. The green measurements are the size of the computer screen, and the black
    measurements are the size of the canvas. One can only draw on the canvas and not
    on the rest of the screen.


    ![](img/443990a0ec620659ce8be783c0758bc6_361_1.png)


    # Creating a Circle on the Canvas


    A circle in JavaScript is created using 5 steps. That’s what we do in the code
    below.

    The first step is to convert the html element to a JavaScript variable using document.getElementById.
    Then it is converted to a 2D drawing element'
  merge: -1
  pgno: 361
- img_proc: true
  md: 'variable using getContext(“2d”). In the below example, variable c2x is the
    drawing element.


    We can start any drawing in JavaScript with **beginPath()** and then clear the
    canvas using **clearRect**. Here’s how **clearRect** works, as in the below example:


    **clearRect(a,b,c,d)** means that the top left corner of the rectangle starts
    at an x-coordinate of **a** and y-coordidnate of **b**; it has a width of **c**
    and a height of **d**. So, we start at **(a,b)**, and clear a canvas of width
    c and height d. In the example below, we start at **(0,0)**, and clear the entire
    canvas of width **500** pixels and height **500** pixels. This makes the entire
    canvas blanks and ready to draw.


    Next, we draw the circle using the arc function. So, let’s see how that works:


    **arc(a,b,c,d,e)** is how we draw the circle. **(a,b)** is the center of the circle;
    **a** being the x-coordinate and **b** being the y-coordinate. **c** is the radius
    of the circle. **d** is the starting part of the arc of the circle. **e** is the
    ending part of the arc.


    **d** and **e** are measured in radians. For a full circle, d and e would be 0
    and 2π respectively. For a half-circle d and e would be between 0 and π.


    In the below example, Circle 1 center is at **(50,50)** and has a radius of **20**
    pixels. Circle 2 is at a center point of **(250,250)** and has a larger radius
    of **70**. Circle 3 is actually a semi-circle as it goes from 0 to π radians.
    It is closer to the bottom right hand corner at **(350,350)** and has a radius
    of **50** pixels.


    In the final step we draw the circles using stroke(). If we want to fill the circles,
    we do so using fill(). And we can change the color using fillStyle().'
