  md: '# Game Time - Loops


    Now, it’s time to design a few games based on what we’ve learned so far. There’s
    no better way of learning concepts than applying them; and even better to apply
    them to something fun.

    Before, getting started, let’s talk about one concept; which is adding html elements
    using Javascript.


    # Adding html Elements using JavaScript


    What if want to add a button or textbox in the middle of the JavaScript program.
    Yes, you can do that within JavaScript using the document.write() function. For
    example, you can create a button using:

    `document.write(''<button onClick="afunction()">Restart</button>'');`

    In the above line, we create a button with text ‘Restart’ on it. On clicking the
    button, **afunction()** is run. This is very useful in games where we have the
    option to keep running the program instead of stopping. Now, let’s look at a similar
    program below.


    ```

    <html>

    <head><title>Sample Form</title></head>

    <body>

    <link rel="stylesheet" type="text/css" href="samplestyle.css" />

    <form id="form1">

    Enter First Number:<input name="number1" type="number" id="num1" size="20"><br>

    Enter Second Number:<input name="number2" type="number" id="num2" size="20"><br><br>

    Enter Third Number: <input name="number3" type="number" id="num3" size="20"></textarea><br><br>


    <button class = "btn submit" onclick="multiplynum()">Submit</button>


    <script>

    function multiplynum()

    {

    var n1 = document.getElementById("num1").value;

    var n2 = document.getElementById("num2").value;

    var n3 = document.getElementById("num3").value;

    document.write(''<link rel="stylesheet" type="text/css" href="samplestyle.css"
    />'');

    document.write("The product of the three numbers is " +n1*n2*n3);

    document.write(''<br>'');

    document.write(''<button onClick="redirect()">Home</button>'');

    }


    function redirect()

    {

    window.location.replace("form_JavaScript.html");

    }

    </script>


    </body>

    </html>

    ```'
