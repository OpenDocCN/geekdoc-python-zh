  md: '# Objects


    An object in programming is a collection of properties with values for each property.
    These properties need not be the same variable types. For example, we can have
    an object with both string and numerical properties.


    # Example 1


    In the example below, we create an object for a car. It has 4 different properties,
    one for name, one for model, one for price, one for license plate. These are accepted
    through user input via forms.

    They are accepted as input in the **entercar()** function and then assigned to
    an object in printcars() function. In the **printcars()** functions, the user
    inputs via forms are assigned to 4 separate variables.

    These variables are assigned to the object car as shown below. The property and
    value are separated from one another using: and the different property/values
    are separated using a comma(,)

    In the below example, type, model, license and price are properties; while **carname**,
    **carmodel**, **carnumber** and **carprice** are the values of the respective
    properties. The 4 values below are the ones that are from the user form.


    ```

    var car={type:carname,model:carmodel,license:carnumber,price:carprice};

    ```


    And to access the object values, we use the dot(.) operator before the property.
    For example, **car.type** will give you the value assigned to property ‘type’
    of object ‘car’.

    And thus, we print out car type and price by accessing the object property value.

    The code is available below with outputs.'
