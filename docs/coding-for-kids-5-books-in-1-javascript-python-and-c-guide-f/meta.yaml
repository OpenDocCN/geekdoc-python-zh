  md: '# Animations in Pygame


    Animations are images manipulated to appear as moving pictures. To make an animation
    we create many continues pictures/shapes and view them continuously. The number
    of times we update the screen is called Frames per second (fps); fps is the number
    of frames/pictures showed in second. Greater fps numbers make the transitions
    in videos/games smoother thus increasing the quality. The game loop discussed
    in earlier chapter is responsible for updating the state of game at fps frame
    per second. This is how games are made, updating the screen continuously with
    pictures at a rate human eyes can’t distinguish that pictures are in fact discrete.
    The figure below shows multiple frames of a running horse. Grouping these frames
    will result in a running horse video.'
