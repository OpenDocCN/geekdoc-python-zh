    \ 5 点之后，则使用节目的评级。如果评级是“普通观众”，那么电视可以工作；然而，如果评级是“成人观众”，那么电视就不会打开。\n\n## 循环\n\n循环是一组重复执行一定次数的指令。在大多数情况下，某个过程被执行，并且有一个计数器每次增加\
    \ 1。在过程结束时，我们检查计数器是否超过了我们需要执行该过程的次数。如果达到了我们需要的次数，我们就停止循环。\n\n例如，假设你想在屏幕上打印数字 1\
