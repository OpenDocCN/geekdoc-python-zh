- md: "## Drawing shapes using pygame\n\nIntroduction to pygame\nLearning coding is\
    \ interesting but it’s even more interesting and engaging when you’re actually\
    \ making games. While coding a game, you will find yourself applying all the ideas\
    \ you learnt in this book like loops, conditionals, variables, functions, lists,\
    \ objects and even more.\nFor coding games, we will use python library **Pygame**.\
    \ Pygame is a python library for making games. It was created by Pete Shiners\
    \ and it enjoys a wide community support.\n\n## Installation\n\n*To install pygame\
    \ library on your system follow these steps.*\n*If you are using anaconda Jupyter\
    \ lab on desktop*\n\n![](img/443990a0ec620659ce8be783c0758bc6_603_0.png)\n\n*Locate\
    \ “anaconda Prompt (anaconda3)” on your system.*\n\n*Click on “anaconda Prompt\
    \ (anaconda3)” to open it.*\n\nIn the command prompt type “**pip install pygame**”\
    \ and press Enter. If installed successfully, it should display “**Successfully\
    \ installed pygame**” message.\n\n![](img/443990a0ec620659ce8be783c0758bc6_604_0.png)\n\
    \nIf you are using the <u>online version of jupyter lab</u>, type “**pip install\
    \ pygame**” inside the cell and execute the cell.\n\nIf you are using <u>notepad++\
    \ along with Python</u>, open command prompt.\n\nTo run your program locate command\
    \ Prompt on your system and open it.\n\n![](img/443990a0ec620659ce8be783c0758bc6_605_0.png)\n\
    \nType “**pip install pygame**” and Enter.\n\n![](img/443990a0ec620659ce8be783c0758bc6_605_1.png)\n\
    \nNow you are ready to start coding games!, let’s start.\n\n## Colors basics –\
    \ RGB color model\n\nBefore starting to code games, we got to learn about colors.\
    \ After all we are not in the business of creating boring games in black and white\
    \ shades! We should be able to create colorful interesting games full of life,\
    \ full of colors.\nThere are millions and millions of colors but how can we determine\
    \ color in a computer? The answer is RGB color model.\nRGB stands for Red, Green\
    \ and Blue using 3 corresponding numbers one for each color. We can create any\
    \ color we want. Each color has a number ranging from 0 to 255 where 0 is null\
    \ intensity and 255 is the maximum intensity of color. Here are some typical color\
    \ values:\n\n| (R, G, B) | Color name |\n| :--- | :--- |\n| **(255, 255, 255)**\
    \ | White |\n| **(255, 0, 0)** | Red |\n| **(0, 255, 0)** | Green |\n| **(0, 0,\
    \ 255)** | Blue |\n| **(0, 0, 0)** | Black |\n\nTo further experiment with RGB,\
    \ you can find free RGB calculator here:\nhttps://www.w3schools.com/colors/colors_rgb.asp\n\
    \n![](img/443990a0ec620659ce8be783c0758bc6_607_0.png)\n\nSource: RGB calculator\
    \ in w3schools\n\n## Basic shape creation methods\n\nLet’s start learning basic\
    \ methods to create shapes.\n`pygame.init()` – Initialize pygame and give permissions.\
    \ This line is essential to start pygame session.\n`pygame.display.set_mode((X,\
    \ Y))` – Creates a display window surface with dimension (x,y) where x is width\
    \ and y is height. This acts as our background.\n`pygame.display.set_caption(‘name’)`\
    \ – Sets display caption name.\n`display_surface.fill(color)` – Fills display\
    \ surface with a particular color. Color is a RGB tuple.\n`pygame.draw.polygon(surface,\
    \ color, points_list)` – Takes display_surface and draws polygon with color color\
    \ and points in points_list. points_list is a list of cartesian sets such as [(3,\
    \ 5), (5, 9)].\n\n`pygame.draw.line(surface, color, start_point, end_point, thickness)`\
    \ – Draws a line with color col, with starting point start_point and ending point\
    \ end_point with optional thickness thickness.\n\n`pygame.draw.circle(surface,\
    \ color, center, radius, thickness)` - Draws a circle with color color, center\
    \ center, radius radius and thickness thickness.\n\n`pygame.draw.ellipse(surface,\
    \ color, bounding_rectangle, thickness)` – Draws an ellipse bounded and centered\
    \ by rectangle bounding_rectangle with optional thickness thickness. bounding_rectangle\
    \ is given by (x, y, width, height) where x and y are upper left corner coordinate,\
    \ width is rectangle width and height is rectangle height.\n\n`pygame.draw.rect(surface,\
    \ col, (x, y, width, height), thickness)` – Draws a rectangle with color col and\
    \ coordinates in rectangle_tuple and thickness thickness. (x, y, width, height)\
    \ is same as bounding_rectangle discussed above.\n\nTo read and learn more methods\
    \ use pygame documentation, Coders read much more than they write. They read others’\
    \ codes, documentations and manuals. This is a good practice in reading documentation.\n\
    https://www.pygame.org/docs/ref/draw.html\n\n## pygame coordinate system\n\npygame\
    \ default coordinate system origin is centered at upper left (0,0) corner where\
    \ positive x points rightward and negative y point downward.\n\n![](img/443990a0ec620659ce8be783c0758bc6_609_0.png)\n\
    \n## Example 1 Implementing basic drawing methods\n\n```python\n# import pygame\
    \ module\nimport pygame\n\n# activate a pygame library inst .\npygame.init()\n\
    \n# define the RGB value some colors\nwhite = (255, 255, 255)\nblack = (0, 0,\
    \ 0)\nyellow = (255, 255, 0)\nred = (255, 0, 0)\ngreen = (0, 255, 0)\nrandom_color\
    \ = (120, 30, 50)\n\n# assigning width 600 , height 600 to background\ndimensions\
    \ = (600, 600)\n\n# create the display surface object\n# of specific dimension..e(X,Y).\n\
    display = pygame.display.set_mode(dimensions)\n\n#pygame window name\npygame.display.set_caption('Basic\
    \ shapes')\n\n# Fill display surface with white\n# with white colour\ndisplay.fill(white)\n\
    \n# draw a polygon using draw.polygon()\n# pygame.draw.polygon(surface, color,\
    \ points_list)\npygame.draw.polygon(display, yellow,\n                    [(446,\
    \ 300), (591, 406),\n                     (536, 577), (356, 577), (300, 406)])\n\
    \n# draw horizontal line\n# pygame.draw.line(surface, color, start_point, end_point,\
    \ thickness)\npygame.draw.line(display, random_color,\n                 (0, 300),\
    \ (600, 300), 4)\n\n# draw vertical line\npygame.draw.line(display, random_color,\n\
    \                 (300, 0), (300, 600), 4)\n\n# draw a circle\n# pygame.draw.circle(surface,\
    \ color, center_point, radius, thickness)\npygame.draw.circle(display, red, (150,\
    \ 150), 50, 0)\n\n# draw a ellipse pygame.draw.ellipse(surface, color, bounding_rectangle,\
    \ thickness)\npygame.draw.ellipse(display, green, (400, 100, 100, 150), 0)\n\n\
    # draw a rectangle\n# pygame.draw.rect(surface, col, (x,y,width,height), thickness)\n\
    pygame.draw.rect(display, black, (100, 400, 100, 100))\n\n# infinite loop to keep\
    \ session on\nwhile True :\n\n    # iterate over the list of Event objects\n \
    \   # that was returned by pygame.event.get() method.\n    for event in pygame.event.get()\
    \ :\n\n        # if event object type is QUIT when corner exist button is clicked\n\
    \        # then quitting pygame and program\n        if event.type == pygame.QUIT\
    \ :\n\n            # kill pygame session\n            pygame.quit()\n        \
    \    # quit the program.\n            quit()\n\n        # Draws the objects screen.\n\
    \        pygame.display.update()\n```\n\nIn this example we implement the basic\
    \ pygame drawing methods we discussed in this chapter. We create a circle, ellipse,\
    \ polygon, square and lines. Each shape is created with its own color, position\
    \ and size. Try to read and understand this program. It is well commented to facilitate\
    \ easy reading.\n\n## Infinite loop (game loop)\n\nWhy do we have infinite loop\
    \ at line 57? Pygame library is used to create video games. Video is nothing but\
    \ a continuous stream of pictures viewed in a short amount of time so human eyes\
    \ can’t detect the difference. The loop will keep updating the screen with any\
    \ newly drawn shapes on it and keeps the session on. Without this infinite loop,\
    \ Pygame will display the shapes momentarily and cease running. This infinite\
    \ loop is called the game loop since it is the loop that contains the main logic\
    \ of a game and is also responsible for updating the screen with any new status.\n\
    \n## Output:\n\n![](img/443990a0ec620659ce8be783c0758bc6_612_0.png)\n\nOutput\
    \ is a white background divided into four quadrants. Where a basic shape lives\
    \ on each quadrant."
  mdcn: "## 使用pygame绘制图形\n\npygame简介\n学习编程很有趣，但当你真正制作游戏时，它会变得更加有趣和引人入胜。在编写游戏的过程中，你会发现自己运用了本书中学到的所有概念，比如循环、条件语句、变量、函数、列表、对象等等。\n\
    为了编写游戏，我们将使用Python库**Pygame**。Pygame是一个用于制作游戏的Python库。它由Pete Shiners创建，并享有广泛的社区支持。\n\
    \n## 安装\n\n*要在你的系统上安装pygame库，请遵循以下步骤。*\n*如果你在桌面端使用anaconda Jupyter lab*\n\n![](img/443990a0ec620659ce8be783c0758bc6_603_0.png)\n\
    \n*在你的系统上找到“anaconda Prompt (anaconda3)”。*\n\n*点击“anaconda Prompt (anaconda3)”打开它。*\n\
    \n在命令提示符中输入“**pip install pygame**”并按回车键。如果安装成功，它应该会显示“**Successfully installed\
    \ pygame**”消息。\n\n![](img/443990a0ec620659ce8be783c0758bc6_604_0.png)\n\n如果你使用的是<u>jupyter\
    \ lab的在线版本</u>，在单元格内输入“**pip install pygame**”并执行该单元格。\n\n如果你使用<u>notepad++和Python</u>，请打开命令提示符。\n\
    \n要运行你的程序，请在你的系统上找到命令提示符并打开它。\n\n![](img/443990a0ec620659ce8be783c0758bc6_605_0.png)\n\
    \n输入“**pip install pygame**”并按回车键。\n\n![](img/443990a0ec620659ce8be783c0758bc6_605_1.png)\n\
    \n现在你已经准备好开始编写游戏了！，让我们开始吧。\n\n## 颜色基础 – RGB颜色模型\n\n在开始编写游戏之前，我们需要了解颜色。毕竟，我们可不是在做制作黑白单调游戏的生意！我们应该能够创造出充满生机、色彩斑斓的有趣游戏。\n\
    颜色有千千万万种，但我们如何在计算机中确定颜色呢？答案是RGB颜色模型。\nRGB代表红、绿、蓝，使用三个对应的数字，每种颜色一个。我们可以创造出任何我们想要的颜色。每种颜色都有一个从0到255的数字，其中0表示无强度，255表示颜色的最大强度。以下是一些典型的颜色值：\n\
    \n| (R, G, B) | 颜色名称 |\n| :--- | :--- |\n| **(255, 255, 255)** | 白色 |\n| **(255,\
    \ 0, 0)** | 红色 |\n| **(0, 255, 0)** | 绿色 |\n| **(0, 0, 255)** | 蓝色 |\n| **(0,\
    \ 0, 0)** | 黑色 |\n\n要进一步实验RGB，你可以在这里找到免费的RGB计算器：\nhttps://www.w3schools.com/colors/colors_rgb.asp\n\
    \n![](img/443990a0ec620659ce8be783c0758bc6_607_0.png)\n\n来源：w3schools中的RGB计算器\n\
    \n## 基本形状创建方法\n\n让我们开始学习创建形状的基本方法。\n`pygame.init()` – 初始化pygame并授予权限。这一行对于启动pygame会话至关重要。\n\
    `pygame.display.set_mode((X, Y))` – 创建一个尺寸为(x,y)的显示窗口表面，其中x是宽度，y是高度。这作为我们的背景。\n\
    `pygame.display.set_caption(‘name’)` – 设置显示窗口的标题名称。\n`display_surface.fill(color)`\
    \ – 用特定颜色填充显示表面。颜色是一个RGB元组。\n`pygame.draw.polygon(surface, color, points_list)`\
    \ – 接收显示表面，并用颜色`color`和`points_list`中的点绘制多边形。`points_list`是一个笛卡尔坐标集的列表，例如[(3,\
    \ 5), (5, 9)]。\n\n`pygame.draw.line(surface, color, start_point, end_point, thickness)`\
    \ – 绘制一条颜色为`col`，起点为`start_point`，终点为`end_point`，可选粗细为`thickness`的线。\n\n`pygame.draw.circle(surface,\
    \ color, center, radius, thickness)` - 绘制一个颜色为`color`，圆心为`center`，半径为`radius`，粗细为`thickness`的圆。\n\
    \n`pygame.draw.ellipse(surface, color, bounding_rectangle, thickness)` – 绘制一个由矩形`bounding_rectangle`界定和居中的椭圆，可选粗细为`thickness`。`bounding_rectangle`由(x,\
    \ y, width, height)给出，其中x和y是左上角坐标，width是矩形宽度，height是矩形高度。\n\n`pygame.draw.rect(surface,\
    \ col, (x, y, width, height), thickness)` – 绘制一个颜色为`col`，坐标在`rectangle_tuple`中，粗细为`thickness`的矩形。(x,\
    \ y, width, height)与上面讨论的`bounding_rectangle`相同。\n\n要阅读和学习更多方法，请使用pygame文档，程序员阅读的远比他们编写的多。他们阅读他人的代码、文档和手册。这是阅读文档的良好实践。\n\
    https://www.pygame.org/docs/ref/draw.html\n\n## pygame坐标系统\n\npygame默认坐标系统的原点位于左上角(0,0)，其中正x轴向右，负y轴向下。\n\
    \n![](img/443990a0ec620659ce8be783c0758bc6_609_0.png)\n\n## 示例1 实现基本绘图方法\n\n```python\n\
    # import pygame module\nimport pygame\n\n# activate a pygame library inst .\n\
    pygame.init()\n\n# define the RGB value some colors\nwhite = (255, 255, 255)\n\
    black = (0, 0, 0)\nyellow = (255, 255, 0)\nred = (255, 0, 0)\ngreen = (0, 255,\
    \ 0)\nrandom_color = (120, 30, 50)\n\n# assigning width 600 , height 600 to background\n\
    dimensions = (600, 600)\n\n# create the display surface object\n# of specific\
    \ dimension..e(X,Y).\ndisplay = pygame.display.set_mode(dimensions)\n\n#pygame\
    \ window name\npygame.display.set_caption('Basic shapes')\n\n# Fill display surface\
    \ with white\n# with white colour\ndisplay.fill(white)\n\n# draw a polygon using\
    \ draw.polygon()\n# pygame.draw.polygon(surface, color, points_list)\npygame.draw.polygon(display,\
    \ yellow,\n                    [(446, 300), (591, 406),\n                    \
    \ (536, 577), (356, 577), (300, 406)])\n\n# draw horizontal line\n# pygame.draw.line(surface,\
    \ color, start_point, end_point, thickness)\npygame.draw.line(display, random_color,\n\
    \                 (0, 300), (600, 300), 4)\n\n# draw vertical line\npygame.draw.line(display,\
    \ random_color,\n                 (300, 0), (300, 600), 4)\n\n# draw a circle\n\
    # pygame.draw.circle(surface, color, center_point, radius, thickness)\npygame.draw.circle(display,\
    \ red, (150, 150), 50, 0)\n\n# draw a ellipse pygame.draw.ellipse(surface, color,\
    \ bounding_rectangle, thickness)\npygame.draw.ellipse(display, green, (400, 100,\
    \ 100, 150), 0)\n\n# draw a rectangle\n# pygame.draw.rect(surface, col, (x,y,width,height),\
    \ thickness)\npygame.draw.rect(display, black, (100, 400, 100, 100))\n\n# infinite\
    \ loop to keep session on\nwhile True :\n\n    # iterate over the list of Event\
    \ objects\n    # that was returned by pygame.event.get() method.\n    for event\
    \ in pygame.event.get() :\n\n        # if event object type is QUIT when corner\
    \ exist button is clicked\n        # then quitting pygame and program\n      \
    \  if event.type == pygame.QUIT :\n\n            # kill pygame session\n     \
    \       pygame.quit()\n            # quit the program.\n            quit()\n\n\
    \        # Draws the objects screen.\n        pygame.display.update()\n```\n\n\
    在这个例子中，我们实现了本章讨论的基本pygame绘图方法。我们创建了一个圆、椭圆、多边形、正方形和线。每个形状都用它自己的颜色、位置和大小创建。试着阅读和理解这个程序。它注释良好，便于阅读。\n\
    \n## 无限循环（游戏循环）\n\n为什么我们在第57行有一个无限循环？Pygame库用于创建电子游戏。视频不过是在短时间内观看的一连串连续图片，以至于人眼无法察觉差异。这个循环将不断用任何新绘制的形状更新屏幕，并保持会话运行。没有这个无限循环，Pygame只会短暂显示形状然后停止运行。这个无限循环被称为游戏循环，因为它是包含游戏主要逻辑的循环，也负责用任何新状态更新屏幕。\n\
    \n## 输出：\n\n![](img/443990a0ec620659ce8be783c0758bc6_612_0.png)\n\n输出是一个白色背景，被分成四个象限。每个象限上都有一个基本形状。"
