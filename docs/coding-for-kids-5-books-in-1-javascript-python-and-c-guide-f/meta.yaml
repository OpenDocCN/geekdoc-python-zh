  md: "# Conditional Statement\n\nConditional Statements are also known as control\
    \ statements. They help decide the flow of the program. Sometimes we want a specific\
    \ block of code to execute only if a certain condition is met. Ex: We take the\
    \ weather as an input from the user and print “Don’t forget your umbrella” if\
    \ it’s rainy or prints “Have a nice day” if it is not.\n\n```\nweather = input(“Input\
    \ the weather? “)\nif weather == “rainy”:\n    print(“Don’t forget your umbrella”)\n\
    else:\n    print(“Have a nice day”)\n```\n\nIf the user inputs “rainy”, print(“Don’t\
    \ forget your umbrella” gets executed and python skips the code inside the else\
    \ block. If the user inputs something other than “rainy”, Python skips the code\
    \ inside the if block and executes the code in the else block. The general syntax\
    \ is:\n\n```\nif *condition is True* :\n    ....... execute this code block .........\n\
    else:\n    ....... execute this code block .........\n```"
  merge: -1
  pgno: 436
