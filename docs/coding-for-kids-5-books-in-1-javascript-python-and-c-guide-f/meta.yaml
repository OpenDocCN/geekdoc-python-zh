    - 2. Write a function that test if a number is a prime number. Prime numbers are\
    \ number divisible only by itself and 1.\n- 3. Write a function that tests if\
    \ number is odd.\n\n## Loops\n\nLoops in coding are a sequence of instructions\
    \ that are repeated a certain number of times.\nThink of a loop like repeating\
    \ operation that keeps repeating until a condition is met.\nThere are mainly 2\
    \ types of loops based on the conditions of execution. They are:\n\n- a. **FOR\
    \ Loops:** FOR loops contain a sequence of instructions that are executed for\
    \ a certain number of times. For example, a FOR loop from 1 to 10 executes the\
    \ code inside the loop 10 times.\n- b. **WHILE Loops:** WHILE loops is a sequence\
    \ of instructions that are executed till a certain condition is met.\n\nNow, if\
    \ we want to do a 1000 executions of execute function; we use a FOR loop. The\
    \ FOR loop below starts at 0 and ends at 999, thus running execute function 1000\
    \ times.\n\n```python\nfor i in range(1000):\n    execute()\n```\n\nFinally, if\
    \ we want to keep running execute() till 6 PM, we use a WHILE loop.\n\n```python\n\
    while (checktime != 18:00):\n    execute()\n```\n\nThese are simple examples of\
    \ the loops to explain the concepts of loops. This concept is very important in\
    \ coding.\nNow, let’s do some examples in python.\n\n## FOR LOOP Example 1\n\n\
    A simple example of a For Loop is a program that counts to 10.\n\n```python\n\
    for i in range(11):\n    print(i)\n```\n\nThe above code is probably the simplest\
