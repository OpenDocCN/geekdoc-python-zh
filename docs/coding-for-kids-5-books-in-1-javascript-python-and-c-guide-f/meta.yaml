    是圆弧的起始部分。**e** 是圆弧的结束部分。


    **d** 和 **e** 以弧度为单位。对于一个完整的圆，d和e分别为0和2π。对于半圆，d和e在0和π之间。


    在下面的例子中，圆1的中心在 **(50,50)**，半径为 **20** 像素。圆2的中心点在 **(250,250)**，半径更大，为 **70**。圆3实际上是一个半圆，因为它从0到π弧度。它更靠近右下角
    **(350,350)**，半径为 **50** 像素。


    在最后一步，我们使用 stroke() 绘制圆。如果我们想填充圆，我们使用 fill() 来实现。我们可以使用 fillStyle() 来改变颜色。'
