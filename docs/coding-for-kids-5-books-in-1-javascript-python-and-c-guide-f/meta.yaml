    - x1

    - x_1_abc

    - RATE

    - bigBonus_


    Examples of invalid variable names:


    +   - 12

    - 3x

    - %change data

    - -1 PROG.CPP


    The first three, 12 3x %change, are not allowed because they do not start with
    a letter or an underscore.


    C++ is also case sensitive, meaning that the following are three distinct variable
    names:


    +   - Rate

    - RATE

    - Rate


