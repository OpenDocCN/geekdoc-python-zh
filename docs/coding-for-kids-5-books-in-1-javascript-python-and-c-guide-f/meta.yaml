    \ type is <class 'int'>\nyi is 5 and it's type is <class 'int'>\nzi is 5 and it's\
    \ type is <class 'int'>\nxf is 5.2 and it's type is <class 'float'>\nyf is 5.01\
    \ and it's type is <class 'float'>\nzf is 5.0 and it's type is <class 'float'>\n\
    ```\n\n我们可以在输出中看到 `int` 和 `float` 之间的区别。我们可以看到，将字符串整数（即 “5”）传递给 `int` 函数会返回整数类型。类似地，对于\
    \ `float` 函数，它接受浮点数字符串（即 “5.2”）并返回浮点数。注意 “5” 和 “5.2” 是字符串，因为它们在引号中。在不使用 `int`\
    \ 或 `float` 将它们转换为数字的情况下，我们不能在任何数学运算中使用它们。\n\n我们还注意到，对于所有值，`int` 会移除小数部分并保留整数部分。它不会四舍五入，只是移除小数部分。`float`\
