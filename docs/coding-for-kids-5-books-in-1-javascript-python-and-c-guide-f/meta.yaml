- md: '## Modulus Operation


    The modulus operation returns the remainder between two numbers. It looks like
    the percentage sign %. Here’s an example below:


    ```html

    <html>

    <head><title>Sample Form</title></head>

    <body>

    <form id="form1">

    Enter First Number:<input name="number1" type="number" id="num1" size="20"><br>

    Enter Second Number:<input name="number2" type="number" id="num2" size="20"><br><br>

    <button onclick="test()">Calculate Remainder</button>

    </form>

    <script>

    function test()

    {

    var n1 = parseInt(document.getElementById("num1").value);

    var n2 = parseInt(document.getElementById("num2").value);

    var remainder=n1%n2;

    document.write("The remainder when "+n1+" is divided by "+n2+" is "+remainder+"<br>");

    }

    </script>

    </body>

    </html>

    ```


    The above code takes in two numbers via a html form and finds the remainder between
    the two; as shown in output below.


    ## Output:


    ![](img/443990a0ec620659ce8be783c0758bc6_280_0.png)


    After hitting the button “**Calculate Remainder**”


    ![](img/443990a0ec620659ce8be783c0758bc6_280_1.png)


    ## Math.Random()


    Math.Random() returns a random number between 0 and 1. If we want to get a random
    between 0 and 10, we multiply by 10 and round the answer (using Math.round()).
    Let’s look at a few examples.


    ```html

    <html>

    <head><title>Sample Form</title></head>

    <body>


    <button onclick="test()">Random Numbers</button>


    <script>

    function test()

    {

    var n1 = Math.random();

    var n2 = Math.round(Math.random()*50);

    var n3 = Math.round(Math.random()*50);

    var n4 = Math.round(Math.random()*1000);


    var remainder=n1%n2;


    document.write("Random number between 0 and 1 = <strong>"+n1+"</strong><br>");

    document.write("1st Random number between 0 and 50 = <strong>"+n2+"</strong><br>");

    document.write("2nd Random number between 0 and 50 = <strong>"+n3+"</strong><br>");

    document.write("Random number between 0 and 1000 = <strong>"+n4+"</strong><br>");


    }

    </script>


    </body>

    </html>

    ```


    In the above example, n1 is a random number between 0 and 1.

    n2 and n3 are two different random numbers between 0 and 50. You should probably
    see that n2 and n3 are different because both numbers are randomized.

    n4 returns a random number between 0 and 1000.

    We can see the results in the output below. As the numbers are randomized we should
    get a different result each time we run the program.

    Math.Random() is a fun function and we are going to be using it in quite a few
    games this book.


    ## Output:


    Random number between 0 and 1 = **0.20604429056114348**

    1st Random number between 0 and 50 = **21**

    2nd Random number between 0 and 50 = **6**

    Random number between 0 and 1000 = **866**


    ## Exponent and Logarithms


    Exponents in Javascript are done using the Math.pow() function and natural logarithms
    are done using Math.log(). If we want logarithm to the base10 we use Math.log10().


    ```html

    <html>

    <head><title>Sample Form</title></head>

    <body>

    <button onclick="test()">Random Numbers</button>

    <script>

    function test()

    {

    var n1 = Math.pow(6,2);

    var n2 = Math.pow(7,3);

    var n3 = Math.log(100);

    var n4 = Math.log10(100);


    document.write("6 raised to the power 2 = <strong>"+n1+"</strong><br>");

    document.write("7 raised to the power 3 = <strong>"+n2+"</strong><br>");

    document.write("The natural logarithm of 100 is = <strong>"+n3+"</strong><br>");

    document.write("Logarithm (to the base 10) of 100 is = <strong>"+n4+"</strong><br>");


    }

    </script>

    </body>

    </html>

    ```


    In the code above, we have two examples of exponents using Math.pow(x,y). Basically,
    x is raised to the power of y in both both cases. n1 and n2 give exponents. n3
    shows a natural logarithm of 100 and n4 shows logarithm to base 10 of 100.


    **Output:**


    6 raised to the power 2 = **36**

    7 raised to the power 3 = **343**

    The natural logarithm of 100 is = **4.605170185988092**

    Logarithm (to the base 10) of 100 is = **2**


    ## Square root


    Math.sqrt() is used the find square root and Math.Abs() is used to find the absolute
    value of a number.

    Here’s a few examples:


    ```html

    <html>

    <head><title>Sample Form</title></head>

    <body>

    <button onclick="test()">Test</button>

    <script>

    function test()

    {

    var n1 = Math.sqrt(36);

    var n2 = Math.sqrt(75);

    var n3 = Math.abs(13);

    var n4 = Math.abs(-14);


    document.write("The square root of 36 = <strong>"+n1+"</strong><br>");

    document.write("The square root of 75 = <strong>"+n2+"</strong><br>");

    document.write("The absolute value of 13 is = <strong>"+n3+"</strong><br>");

    document.write("The absolute value of -14 = <strong>"+n4+"</strong><br>");


    }

    </script>

    </body>

    </html>

    ```


    In the above code, n1 and n2 are examples of the square root function;

    while n3 and n4 are examples of the absolute function.

    If you haven’t heard of the absolute value function, it basically returns a positive
    value whether the number is +ve or -ve. So, 13 and -13 would both return an absolute
    value of 13.


    **Output:**


    The square root of 36 = **6**

    The square root of 75 = **8.660254037844387**

    The absolute value of 13 is = **13**

    The absolute value of -14 = **14**


    ## Trigonometry


    Yes, JavaScript can be used for trigonometric functions as well. Here’s a few
    of them.

    Math.sin(x) returns the sine value of x radians. If we want to find the sine of
    x degrees, then we have to convert it to radians. So, we should change the function
    to Math.sin(x*MATH.PI/180).

    Also, keep in mind that in Javascript, we represent the value of π as Math.PI

    We can also do cos and tan function using Math.cos(x) and Math.tan(x), where x
    is in radians.

    Let’s look at an example program below:


    ```html

    <html>

    <head><title>Sample Form</title></head>

    <body>

    <button onclick="test()">Test</button>

    <script>

    function test()

    {

    var n1 = Math.sin(5);

    var n2 = Math.sin(5*Math.PI/180);

    var n3 = Math.sin(90*Math.PI/180);

    var n4 = Math.cos(10);

    var n5 = Math.cos(10*Math.PI/180);

    var n6 = Math.cos(0*Math.PI/180);

    var n7 = Math.tan(30);

    var n8 = Math.tan(30*Math.PI/180);

    var n9 = Math.tan(45*Math.PI/180);


    document.write("The sine of 5 radians = <strong>"+n1+"</strong><br>");

    document.write("The sine of 5 degrees = <strong>"+n2+"</strong><br>");

    document.write("The sine of 90 degrees = <strong>"+n3+"</strong><br>");

    document.write("The cos of 10 radians = <strong>"+n1+"</strong><br>");

    document.write("The cos of 10 degrees = <strong>"+n2+"</strong><br>");

    document.write("The cos of 0 degrees = <strong>"+n3+"</strong><br>");

    document.write("The tan of 30 radians = <strong>"+n7+"</strong><br>");

    document.write("The tan of 30 degrees = <strong>"+n8+"</strong><br>");

    document.write("The tan of 45 degrees = <strong>"+n9+"</strong><br>");

    }

    </script>

    </body>

    </html>

    ```


    In the above code, we show 3 examples of sine, cos and tan values. And we show
    the difference between calculating trigonometric values of degrees and radians.
    For example, for n1, we calculate the value of sin(5 radians) and in n2 we calculate
    the value of sin(5 degrees). In n2, we had to convert 5 degrees into radians by
    doing sin(5* π/180).


    ## Output:


    The sine of 5 radians = -0.9589242746631385

    The sine of 5 degrees = 0.08715574274765817

    The sine of 90 degrees = 1

    The cos of 10 radians = -0.9589242746631385

    The cos of 10 degrees = 0.08715574274765817

    The cos of 0 degrees = 1

    The tan of 30 radians = -6.405331196646276

    The tan of 30 degrees = 0.5773502691896257

    The tan of 45 degrees = 0.9999999999999999


    ## Practice Problems


    1. Write a program that calculates the total salary payment cost for a team. Create
    a form that takes in two inputs; number of employees and average hours worked
    per employee. Use parseInt to ensure that the number of employees is an integer.
    Round the average hours worked to the top hour (So, 5.2 and 5.6 hours would both
    become 6 hours). Multiply the two inputs and print out the total salary paid to
    employees.

    2. Let’s get started and make a demo calculator with all that we’ve learned. Create
    a form that takes in two numbers in 2 textboxs and has 15 buttons. Each buttons
    links to a JavaScript button that does a calculation. Create a button each for
    addition, subtraction, multiplication, division, remainder, exponent, natural
    logarithms, logarithms (to base 10), square root, sine, cos, tan, cosec, sec,
    cot. Some of these buttons only need one number to operate (trig functions, square
    root, logarithms) while others need two numbers.

    3. Create a program that calculates the height of a building you are looking at
    using trigonometry. The program takes in two user inputs in a form. The first
    is the distance from the building; and the second is the viewing angle to the
    top of the building. Use trigonometry (tan value to be specific) to calculate
    the height of the building.'
  mdcn: '## 取模运算


    取模运算返回两个数字之间的余数。它看起来像百分号 %。下面是一个示例：


    ```html

    <html>

    <head><title>Sample Form</title></head>

    <body>

    <form id="form1">

    Enter First Number:<input name="number1" type="number" id="num1" size="20"><br>

