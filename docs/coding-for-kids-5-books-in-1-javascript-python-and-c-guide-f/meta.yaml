  md: '# document.write()


    document.write() is used to print elements on the web page. Anything that is within
    the brackets is printed on the web page. For example:

    document.write(“Example print”);

    The above line prints the words “**Example print**” on the screen.

    We can also print variables on the screen. For example,

    var a=7;

    document.write(a)

    Above line prints 7 on the screen.

    And, we can combine different elements also using “+” operator. For example:

    var a=7;

    document.write(“The number printed is “+a);

    The above line prints “The number printed is 7”.


    # alert()


    Alert puts a pop-up on the screen with a particular message. For example,

    alert(“Hello”)

    The above message has a pop-up message that says “Hello”


    ![](img/443990a0ec620659ce8be783c0758bc6_253_0.png)


    # prompt()


    prompt has the same popup but what a textbox that allows user input. The user
    input can be stored in a variable. For example:

    var name = prompt(“What is your name”);

    It shows a pop-up. Once the user enters his name and says ok, it stores the value
    in the variable name.'
  merge: -1
  pgno: 253
- img_proc: true
  md: '![](img/443990a0ec620659ce8be783c0758bc6_254_0.png)


    # document.getElementById().value


    Document.getElementById().value is used to get html elements into JavaScript variables.
    So, we need to use the id of the html element and put it in between brackets.
    Let’s look at an example.

    Let’s look at below html element:

    Enter number: <input name=”x” type=”number” id=”test” size=”20”><br>

    JavaScript code:

    var testv=document.getElementById(“test”).value;

    The html element is a form textbox that accepts a number from the user.

    In Javascript, the number that the user assigns is set to the variable testv.


    # How to add Comments


    Comments are items that you add to the code to document or explain the code. Comments
    cannot be executed and do not effect the program.

    Comments in JavaScript are added using two double backslash in front of the comment
    (“//”)'
