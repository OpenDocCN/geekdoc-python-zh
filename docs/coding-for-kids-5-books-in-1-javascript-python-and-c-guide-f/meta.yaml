  md: '# Having Fun with Strings


    # Strings and String Variables


    We’ve touched on this in the previous chapters. A string is any piece of text
    that is used in a program. As an example, “abcd” is a string; while the number
    7 is not a string. It is an integer.

    A string variable is a place to store a string. As an example, st is a string
    variable below that stores the value of “abcd”.

    var st=”abcd”;

    Now, let’s have some fun with strings using our knowledge of JavaScript and loops.


    # Finding Length of a String


    Now, let’s input a string in a textbox and find the length of the string.


    ```

    <html>

    <head><title>JavaScript Lesson 4 - Strings</title></head>

    <body>

    <form id="form1">

    Enter Name:<input name="name" type="text" id="name" size="20"><br>

    </form>

    <button onclick="strlength()">Name Length</button>

    <script>


    function strlength()

    {

    var name2=document.getElementById("name").value;

    document.write(name2.length);

    }

    </script>


    </body>

    </html>

    ```


    The code below lets you input your name through a textbox. When you click the
    button, it runs the function strlength() that calculates the length of your name.'
