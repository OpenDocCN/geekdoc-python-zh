    ).value);\nvar num2=parseFloat(document.getElementById(\"num2\").value);\n   \
    \ if ((num1+num2)<15)\n    {\n        document.write('两个数字的和小于 15');\n    }\n\
    \    else\n    {\n        document.write('两个数字的和大于或等于 15');\n    }\n}\n\n</script>\n\
    </body>\n</html>\n```\n\n输出：\n\n输入数字 1:\n\n输入数字 2:\n\n检查总和\n\n输出（用户已填写）：\n\n输入数字\
    \ 1: 3\n\n输入数字 2: 4\n\n检查总和\n\n输出（点击“检查总和”按钮后）：\n\n两个数字的和小于 15\n\n# 输出（第二组数字已填写）\n\
    \n输入数字 1: 14\n\n输入数字 2: 3\n\n检查总和\n\n# 输出（点击“检查总和”按钮后）\n\n两个数字的和大于或等于 15\n\n#\
    \ 代码分解：\n\n```javascript\nvar num1=parseFloat(document.getElementById(\"num1\"\
    ).value);\nvar num2=parseFloat(document.getElementById(\"num2\").value);\n```\n\
    \n这些行将用户填写的两个数字的值存储在两个变量 num1 和 num2 中。\n\n```javascript\nif ((num1+num2)<15)\n\
    ```\n\n这检查两个数字的和是否大于 15。\n\n```javascript\n{\ndocument.write('两个数字的和小于 15');\n\
    }\n```\n\n如果和小于 15，则激活上述循环并打印出‘两个数字的和小于 15。’\n\n```javascript\nelse\n{\ndocument.write('两个数字的和大于或等于\
    \ 15');\n}\n```\n\n如果和大于 15，则激活上述循环并打印出‘两个数字的和大于或等于 15。’"
