  md: '# What is JavaScript?


    JavaScript is a high-level programming language that is used to make web pages
    more interactive and dynamic. It is text-based and user-friendly. While html is
    used to create a web page structure and css is for web page style, JavaScript
    is used to make the web page more interactive with the user. It allows different
    html elements to interact with each other, performs calculations, animations etc.
    In other words, it makes web page programming fun.


    # Using JavaScript with html


    There are two ways to use JavaScript in a html web page. The first way is to just
    add the code within script tags in html. This is shown in the blue portion of
    the code below.


    ```

    <html>

    <head><title>Test file 1</title>

    </head>

    <body>

    <script>

    //Enter JavaScript code here

    </script>

    </body>

    </html>

    ```


    The 2nd way is to create an external JavaScript file that contains the code and
    save it as a .js file. Then you can link the file to the html content. For example,
    let’s say you create a file called ‘test.js’. You can link it using the blue portion
    of the code below:


    ```

    <html>

    <head><title>Test file 2</title>

    </head>

    <body>

    ```'
  merge: -1
  pgno: 250
- img_proc: true
  md: '```

    <script src=" test.js"></script>

    </body>

    </html>

    ```


    # JavaScript Elements


    With that basic knowledge, let’s have a look at some basic JavaScript elements.


    **functions**

    A function in JavaScript is a set of lines of code that performs a certain task.

    It is defined in JavaScript within the script tags as:


    ```

    function afunc()

    {

    //Enter function code here

    }

    ```


    The name of the function is afunc and the code within the curly brackets is executed
    each time afunc is called on.

    It is useful to have functions when we want to perform the same task several times
    in the same program. We can just call on the function instead of writing the same
    lines of code several times.


    **Variables**

    A variable in JavaScript is a placeholder that takes on a certain value. The value
    can be changed throughout the program and can be used in other parts of the code.
    Let’s take an example:


    ```

    var x=5;

    ```


    x is the variable defined. It starts with a value of 5.

    Later on, in the program, it can be changed to a different value, as in:


    ```

    x=10;

    ```


    Now, x has a value of 10. And, if we do:


    ```

    x=x-1;

    ```


    Then x becomes 9. What we just showed is an integer variable. We can also have
    string variables used to store text values, as in:


    ```

    var b=”abcd”

    ```'
  merge: -1
  pgno: 251
- img_proc: true
  md: 'b is a variable that holds the value abcd.

    And finally, we can have Boolean variables that holds only true/false values.
    For example:


    ```

    var c = true;

    var d = (7>5);

    var e = (7<6);

    ```


    Variables c,d and e are all Boolean variables. Variable c is assigned to true.
    Variable d is true (because 7 is greater than 5). Variable e is false (because
    7 is not less than 6).'
