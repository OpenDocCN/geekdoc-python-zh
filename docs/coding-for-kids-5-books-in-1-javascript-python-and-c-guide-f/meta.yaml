  - '[PAGE 496]


    # Why Python is Great for Beginners


    Python is a great programming language to learn. It’s easy to learn and it is
    a good entry point into the world of programming. Python was invented by a person
    named Guido van Rossum, he was working on an educational project to build a language
    for new coders called ABC. As a result of this project he created the Python programming
    language. Guido made Python with four main goals in mind. These goals are to be
    intuitive, open source, easy to understand and to be versatile to allow for shorter
    development time. Python continues developing and maturing till today. Many enthusiasts
    and developers use it every day for a variety of tasks. Python is used for many
    tasks like web development, scripting, web scraping, data analysis and automation.
    Here’s why Python is great:


    # Shallow learning curve


    Python takes little time to learn. This makes it a great language for beginners
    to start learning programing. That is why it used in many introductory computer
    science courses around the world.


    # Intuitive'
  - '[PAGE 497]


    The syntax of Python is very easy to read. In fact, it reads very similar to English
    and that is one reason for its intuitiveness. The language is consistent overall
    and is easy to read. You don’t have to spend time understanding arcane symbols
    and syntax. Code is read much more often than it is written. That’s why readability
    is a great advantage for language to have.


    # Very little boilerplate


    The “Hello World” program is a common basic program that is just one line of code.
    Simple programs like that can be written with very little “starting code” or additional
    codes. Python comes with powerful data types already built-in. Python has Lists,
    Dicts, Tuples, Sets, strings. These datatypes make it easy to start developing
    right away without having to implement those data structures from scratch. These
    data types (and many more) facilitate short development times and more flexible
    timelines.


    # Great Ecosystem


    A programming language is of little value only by itself. What makes a programming
    language widely adopted and useful is the supporting community and libraries it
    has. There are lots of third-party libraries and people to help you.


    # Interpreted language'
  - '[PAGE 498]


    Python is a high-level scripting language (like PHP, Ruby, Perl, JavaScript, etc.).
    High level Languages of this type generally don’t require variables to be declared
    in advance. They allow variables types to change. This called dynamic typing.
    Python in an interpretive language meaning programs can run directly without having
    to be compiled before execution.


    # Versatility


    Python has many applications, including data science, machine learning, web development,
    and game development.

    Here are some examples of Python modules.


    +   - [Pandas](https://pandas.pydata.org/) is used for data wrangling and analysis.

    - [matplotlib](https://matplotlib.org/), a plotting library useful for plotting
    graphs using many sorts of graphs.

    - [Pygame](https://www.pygame.org/) for developing games

    - [Django](https://www.djangoproject.com/), a framework for web development


    Python emphasize fundamentals, the core philosophy of the language is “The Zen
    of Python”. You can get them by typing on python “import this”. The Zen of Python
    are:


    +   1. Beautiful is better than ugly.

    2. Explicit is better than implicit.'
