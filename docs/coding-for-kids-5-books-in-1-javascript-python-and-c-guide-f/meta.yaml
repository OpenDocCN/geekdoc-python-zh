    <script>


    function strsplit()

    {

    var animal=document.getElementById("ani").value;

    aniarray=animal.split(",");          // Split on commas

    var len=aniarray.length;

    var aninumber;

    for (i=0; i<=len-1;i++)

    {

    aninumber=i+1;

    document.write("Animal "+aninumber+" is "+aniarray[i]+"<br>");

    }

    }


    </script>

    </body>

    </html>

    ```'
