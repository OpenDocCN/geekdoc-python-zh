    ## HTML 表单


    ### 什么是 HTML 表单？


    HTML 表单是网页上你可以输入信息的空白框。

    就是那些你在网上看到的，用来输入你的姓名、年龄、密码等的表单。

    下面是一个表单的样子：


    ![](img/443990a0ec620659ce8be783c0758bc6_139_0.png)


    ### 表单 HTML 标签格式


    下面是一个表单 HTML 标签的示例，它接收姓名、职业和性别。


    ```

    <form id="form1">

    Name: <input name="Enter Name" type="text" id="name" size="20"><br>

    Occupation: <input type="text" id="occupation" size="20"><br>

    Age: <input type="number" id="gender" size="20"><br>

    </form>

    ```


    一旦你运行程序，输出将如下所示。你可以在输出中的空白框里输入任何内容。这些空白框也被称为文本框。


    ![](img/443990a0ec620659ce8be783c0758bc6_140_0.png)


    ### 表单 HTML 标签的不同部分


    `<form id="form1">`

    表单 id 标签是表单的名称，将在代码的其余部分作为参考使用。

    姓名：

    职业：

    年龄：

    这是写在框左侧的文本。它用于向用户描述在框中输入什么。

    `input type="text"`

    这意味着你在框中输入的内容是文本或字符串类型。例如，姓名和职业使用文本类型，因为你在框中输入的是字母。

    `input type="number"`

    这意味着你在框中输入的内容是数字。例如，年龄和电话号码会使用数字类型，因为它们完全是数字。


    ```

    id="name"

    id="occupation"

    id="gender"

    ```


    id 是该框在程序其余部分中的名称。我们将在程序的其余部分使用 id 来引用该框。


    ```

    size="20"

    ```


    这意味着框的长度是 20 像素。要更改此值，请更改 size 的值。例如，如果你想将框的长度加倍，请将 size 更改为 40。


    ## JavaScript 示例


    ### 什么是 JavaScript？


    JavaScript 是一种高级编程语言。它最常用于在 HTML 页面上执行用户操作。

    它还有助于增强用户在网页上的交互。


    ### 如何在 HTML 中使用 JavaScript


    有两种方法可以在 HTML 页面上使用 JavaScript：

    第一种方法是直接将 JavaScript 代码包含在 `<script>` 标签内。如下所示：


    ```

    <html>

    <head>

    <title> </title>

    </head>

    <body>

    <script>

    </script>

    </body>

    </html>

    ```


    JavaScript 代码将位于上面红色显示的两个 script 标签之间。


    第二种方法是创建一个 JavaScript 文件并将其保存为 .js 文件。然后你会在 HTML 代码中引用这个 JavaScript 文件。如下所示。


    ```

    <html>

    <head>

    <title> </title>

    </head>

    <body>

    <script src="newfile.js"></script>

    </body>

    </html>

    ```


    你会将所有 JavaScript 代码包含在 newfile.js 文件中。


    ### 你需要了解的 JavaScript 术语


    接下来我们将通过几个 JavaScript HTML 代码示例。我们需要了解以下术语才能理解代码。


    **函数**

    JavaScript 函数是执行任务的任意代码行集合。函数通常用于执行当你点击 HTML 按钮时需要发生的任务。每个函数都有一个名称，并在 HTML 代码中被引用。下面是一个例子：

    `function abcd()`

    abcd 是执行特定任务的函数的名称。它将在 HTML 代码中被引用为 abcd。


    ### 变量


    变量用于在 JavaScript 中存储名称或数字。可以把它想象成一个可以存储一个值的盒子。每次你需要那个值时，都会引用那个盒子。它的定义如下：


    ```

    var flag=1;

    ```


    flag 是变量的名称，它存储值 1。所以任何时候在 JavaScript 程序中引用 flag；它的值都是 1（除非你更改了 flag 的值）。flag
    的这个值可以用来定义其他变量。例如：


    ```

    var king=flag*2;

    ```


    king 现在的值是 1*2=2。所以变量是处理未知量的好方法。


    ### document.getElementbyID().value


    这个 JavaScript 术语用于获取 HTML 表单文本框中项目的值。所以，如果你在表单文本框中填写了你的名字并点击一个按钮，document.getElementbyID()
    会获取你在框中输入的内容的值。例如：


    ```

    var yname=document.getElementById("name").value;

    ```


    “name”是在 HTML 中定义的表单文本框的 id。要了解这在 HTML 中是如何完成的，请查看上一章关于 HTML 标签的部分。在文本框中输入的任何内容都存储在一个名为
    yname 的变量中。从现在起，它将在 JavaScript 中被引用为 yname。


    ### Document.write()


    此函数用于在网页浏览器上打印任何内容。例如，


    ```

    document.write(“xyz”);

    ```


    在屏幕上打印 xyz。你也可以使用“+”运算符添加两个不同的项。


    ```

    document.write(“xyz”+”123”);

    ```


    在屏幕上打印 xyz123。当你想向变量添加文本时，这很有用。例如。


    ```

    var yname=document.getElementById("name").value;

    document.write(“My name is “+yname);

    ```


    如果你在文本框中输入了“Matt”，它会在屏幕上打印出“My name is Matt”。


    ### parseint()


    parseint 将数字更改为整数，无论它是否是小数。例如，

    parseint(2.8) 将等于 3。

    Parseint(2) 将只是 2。


    ### parsefloat()


    parsefloat() 与 parseint() 相反。它将数字更改为小数。例如，

    parseint(2) 将等于 2.0

    Parseint(3.1) 将只是 3.1


