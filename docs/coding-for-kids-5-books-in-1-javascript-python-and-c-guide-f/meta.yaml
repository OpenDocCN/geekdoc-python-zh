  md: '# Arrays


    What is An Array?

    An array is basically a group of items that are stored in a single name. They
    are accessed using different indexes of the name. For example, in Javascript:

    var name[5] is an array of size 5. The first element is name[0], the second element
    is name[1] and so on.....

    So, if we want to assign values to the array:

    var name[5]=[“Abhi”,”Bob”,”Aaron”,”Steve”,”Mark”]

    The above creates an array of size 5. To print the first element in JavaScript,
    we do:

    document.write(name[0]);

    This prints out Abhi, which is the first element of the array.

    If we do:

    document.write(name[4]);

    This prints out Mark, which is the last element of the array.

    If we want to add an element to the array use the push function as below:

    name.push(“Carl”);

    document.write(name[5]);

    This prints out Carl, which is the new element of the array.

    Now, let’s go through a couple of examples:


    # Example 1


    In this example, we create 3 arrays and assign them values in JavaScript, and
    then print them on the screen.'
  merge: -1
  pgno: 187
- img_proc: true
  md: '```

    html

    <html>

    <head><title>Arrays 1</title></head>

    <body>


    <button onclick="createarray()">Create Array</button>


    <script>


    function createarray()

    {

    var name = ["Bob","Peter","Nick"];

    var age=[32,10,11];

    var loc=new Array("New York","Rockford","Kansas");// 2nd way to start array

    document.write(name[0]+'' lives in ''+loc[0]+'' and age is ''+age[0]+"<br>");

    document.write(name[1]+'' lives in ''+loc[1]+'' and age is ''+age[1]+"<br>");

    document.write(name[2]+'' lives in ''+loc[2]+'' and age is ''+age[2]+"<br>");

    name.push("Steve");

    age.push(20);

    loc.push("Miami");

    document.write(name[3]+'' lives in ''+loc[3]+'' and age is ''+age[3]+"<br>");

    }


    </script>


    </body>

    </html>

    ```


    The above example, `createarray()` creates 3 arrays `name`, `age` and `loc`. Each
    array has three elements assigned. They are printed on the screen using `document.write()`.

    After that we add a 4th element using `push` for all 3 arrays and then that is
    printed out as well.'
