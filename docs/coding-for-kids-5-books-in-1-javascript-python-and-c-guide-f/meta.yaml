  md: "# Global and local Variables\n\nVariables that are created outside functions\
    \ are accessible to any function. They are called global functions. Global variables\
    \ can be accessed by any function. Local variables are variables that are defined\
    \ inside functions and cannot be accesses from outside function scopes.\n\nIn\
    \ the code below “lang” variable is global so func() function can access it. When\
    \ func() is called the output is python.\n\n```\n# this variable is global to\
    \ this scope\nlang = \"Python\"\n\ndef func():\n    print(lang)\n\nfunc()\n```\n\
    \nPython\n\n```\n# this variable is global to this scope\nlang = \"Python\"\n\n\
    def func():\n    # this variable is local to this function\n    lang = \"C++\"\
    \n    print(lang)\n\nfunc()\nprint(lang)\n```\n\nC++\nPython"
