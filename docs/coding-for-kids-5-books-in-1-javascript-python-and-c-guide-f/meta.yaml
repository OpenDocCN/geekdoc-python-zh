    # 练习\n\n你可以复制上面的代码并尝试使用它。一旦你理解了代码，你就可以创建自己的 JavaScript HTML 函数。这里有几个你可以尝试的练习。\n\
    \n- 1. 编写一个程序，使用 6 个文本框输入 6 个科目的学校成绩。编写两个 JavaScript 函数来计算科目的总分和平均分。\n- 2. 编写一个\
    \ JavaScript 程序，输入 5 个不同的学生姓名和爱好，并打印出这些学生的姓名和爱好。\n\n## 条件语句\n\n### 什么是条件语句？\n\n\
    它是一种检查某个条件是否为真的语句。它可以简单到检查一个数字是否小于 10，也可以复杂到检查患者的医疗样本是否存在某种疾病。\n在 Javascript 中，条件语句使用\
    \ IF ELSE 语句来完成。\n所以，它基本上检查如果某事为真，则执行一个动作。如果它不为真，则执行其他操作。例如，\n\n```javascript\n\
    IF (George==”Hungry”)\n{\n    Document.write(‘给 George 一点零食);\n}\nELSE\n{\n  \
    \  Document.write(‘不给 George 零食’);\n}\n```\n\n在上面的例子中，代码检查 George 是否饿了，并执行两个动作之一。如果\
    \ George 饿了，则打印‘给 George 一点零食’。如果没有，则打印‘不给 George 零食’）\n这是一个使用 IF ELSE 语句的 JavaScript\
    \ 条件语句的简单示例。\n\n### IF ELSE 循环 – 示例 1\n\n```html\n<html>\n<head>\n<title>检查两个数字的和是否大于\
    \ 15.......</title>\n</head>\n<body>\n<form id=\"form1\">\n输入数字 1: <input type=\"\
