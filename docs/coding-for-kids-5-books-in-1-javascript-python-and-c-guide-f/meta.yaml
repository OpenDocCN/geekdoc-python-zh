    \ 140), 10, 0)\n\n# Draw mouth using arc\n# arc(surface, color, bounding_rect,\
    \ start_angle, stop_angle, width=1)\npygame.draw.arc(display, red, (135, 175,30,25),\
    \ 0, math.pi, width=1)\n\n# Infinite Loop to keep session on\nwhile True :\n \
    \   # iterate over the list of Event objects\n    # that was returned by pygame.event.get()\
    \ method.\n    for event in pygame.event.get() :\n\n        # if event object\
    \ type is QUIT when corner exist button is clicked\n        # then quitting pygame\
    \ and program\n        if event.type == pygame.QUIT :\n\n            # kill pygame\
    \ session\n            pygame.quit()\n            # quit the program.\n      \
    \      quit()\n\n        # Draws the objects screen.\n        pygame.display.update()\n\
    ```\n\n# 输出：\n\n![](img/443990a0ec620659ce8be783c0758bc6_614_0.png)\n\n![](img/443990a0ec620659ce8be783c0758bc6_614_1.png)\n\
    \n# 练习题\n\n1.  使用前面讨论的悲伤表情程序，将其改为笑脸。\n2.  创建一个800x800的显示区域，绘制四条相连的红色边框，并在中心绘制一个被边框外接的圆形。\n\
    3.  选择4个你最喜欢的表情符号，尝试使用pygame绘制它们。\n4.  创建一个类似于下图足球场的形状。\n\n![](img/443990a0ec620659ce8be783c0758bc6_615_0.png)\n\
    \n# Pygame中的动画\n\n动画是通过操控图像使其看起来像移动的画面。为了制作动画，我们创建许多连续的图像/形状并连续查看它们。我们更新屏幕的次数称为每秒帧数（fps）；fps是每秒显示的帧/图像数量。更高的fps数字使视频/游戏中的过渡更平滑，从而提高质量。前面章节讨论的游戏循环负责以每秒fps帧的速度更新游戏状态。游戏就是这样制作的，以人眼无法分辨图像实际上是离散的速率持续用图像更新屏幕。下图显示了一匹奔跑的马的多个帧。将这些帧组合起来将产生一个奔跑的马的视频。\n\
    \n![](img/443990a0ec620659ce8be783c0758bc6_617_0.png)\n\n著名的运动中的马\n\n# 增长的正方形\n\
    \n我们制作一个正方形，其大小不断增长，直到填满整个屏幕右下象限。逻辑与我们在前面示例中制作各种形状非常相似，只是有两个主要区别。我们创建pygame时钟实例\
    \ `clock=pygame.time.Clock()`，这是一个pygame用于跟踪时间的方法。我们在程序中使用它来控制我们想要的每秒帧数（fps），使用\
    \ `clock.tick(fps)`。更快的fps会更频繁地更新形状，使正方形增长得更快。\n\n第二个区别是正方形的边长不再是固定的。每次循环迭代，使用\
    \ `side = 1.01 * side` 增加正方形的边长，使用 `screen.fill(white)` 清除屏幕（用白色填充），并绘制具有新边长的新正方形。尝试修改1.01这个值，观察增加/减少这个值如何影响动画速度。\n\
    \n```python\n# growing square\nimport pygame\n\n# frames per second to control\
    \ speed\nfps = 50\n\n# Define some colors\nwhite = (255, 255, 255)\nred = (255,\
    \ 0, 0)\n\n# A clock instance so we can control frames per second fps\nclock =\
    \ pygame.time.Clock()\n\n# initialize display surface\nscreen = pygame.display.set_mode((500,\
    \ 500))\npygame.display.set_caption(\"Growing square\")\n\npygame.init()\n# white\
    \ background\nscreen.fill(white)\n\n# intitial square side legnth\nside = 50\n\
    \n# game infinite loop\nloop = True\nwhile loop:\n    # if quit button press event\
    \ quit\n    for event in pygame.event.get():\n        if event.type == pygame.QUIT:\n\
    \            loop = 0\n\n    pygame.draw.rect(screen, red, (250, 250, side, side))\n\
    \n    # update frame\n    pygame.display.update()\n\n    # update fps frames per\
    \ second\n    clock.tick(fps)\n\n    side = 1.01 * side\n    # clear screen\n\
    \    screen.fill(white)\n\npygame.quit()\n```\n\n# 输出快照：\n\n![](img/443990a0ec620659ce8be783c0758bc6_620_0.png)\n\
    \n![](img/443990a0ec620659ce8be783c0758bc6_620_1.png)\n\n![](img/443990a0ec620659ce8be783c0758bc6_620_2.png)\n\
    \n![](img/443990a0ec620659ce8be783c0758bc6_620_3.png)\n\n# 增长的圆形\n\n这个示例与增长的正方形示例非常相似，只是我们绘制的是圆形而不是正方形，并且增加的是半径而不是边长。\n\
    \n```python\n# growing circle\nimport pygame\n\n# frames per second\nfps = 50\n\
    \n# Define some colors\nwhite = (255, 255, 255)\nred = (255, 0, 0)\n\n# A clock\
    \ instance so we can control frames per second fps\nclock = pygame.time.Clock()\n\
    \n# initialize display surface\nscreen = pygame.display.set_mode((500, 500))\n\
    pygame.display.set_caption(\"Growing circle\")\n\npygame.init()\n# white background\n\
    screen.fill(white)\n\n# game infinite loop\nloop = True\n\n# intitial circle radius\n\
    rad = 50\n\nwhile loop:\n\n    # if quit button press event quit\n    for event\
    \ in pygame.event.get():\n        if event.type == pygame.QUIT:\n            loop\
    \ = 0\n\n    pygame.draw.circle(screen, red, (250, 250), rad)\n\n    # update\
    \ frame\n    pygame.display.update()\n\n    # update fps frames per second\n \
    \   clock.tick(fps)\n\n    rad = 1.01 * rad\n    # clear screen\n    screen.fill(white)\n\
    \npygame.quit()\n```\n\n# 输出快照：\n\n![](img/443990a0ec620659ce8be783c0758bc6_623_0.png)\n\
    \n![](img/443990a0ec620659ce8be783c0758bc6_623_1.png)\n\n# 在不同方向移动球\n\n在这个示例中，我们使用\
    \ move_right、move_left、move_up 和 move_down 函数将球向四个不同方向移动。\n逻辑与前面的示例类似，我们不是每帧都增加形状大小，而是每次“增长”对象的位置。\n\
    球从中心开始移动，直到碰到边界，然后再次从中心重新开始。\nmove_right() 函数通过更新球的坐标来工作。该函数不接受任何输入，因为它直接在全局作用域中访问\
    \ x 和 y，因为 x 和 y 被定义为全局变量。\n每次函数调用，x 坐标增加2像素的步长。步长决定了形状移动的平滑程度。\n该函数确保球靠近边界，方法是永远不将\
    \ x 增加到超过480。背景表面大小为500。如果 x > 480，球的位置将重置为中心。\n\n```python\n# global x and y\
    \ so it have access to outer x and y\n# right function\ndef move_right():\n  \
    \  global x,y\n\n    # if ball is near border reset to center\n    if x < 480:\n\
    \        x = x + 2\n    else:\n        x = 250\n        y = 250\n```\n\n其他函数 move_left、move_up\
    \ 和 move_down 的实现类似，只是改变 x 和 y 是增加还是减少，并检测不同的边界。\n仔细阅读下面的代码并尝试理解它。"
