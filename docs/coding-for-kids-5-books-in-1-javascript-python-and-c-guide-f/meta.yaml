    \ the infinite while loop\nHi from the infinite while loop\nHi from the infinite\
    \ while loop\n```\n\n## 解释\n\n由于条件始终为真，这将永远运行下去。\n\n## 无限 for 循环\n\n无限 for 循环的定义如下所示：\n\
    \n```cpp\n#include<iostream>\nusing namespace std;\n\nint main(){\n\n    for(;;){\n\
    \        cout << \"Hi from the infinite for loop\"<< endl;\n    }\n\n    return\
    \ 0;\n}\n```\n\n## 解释\n\n请注意，要声明一个无限 for 循环，您只需在与 for 关键字关联的括号中放置两个分号，即：\n\n```cpp\n\
    for(;;){\n    //此代码将无限运行\n}\n```\n\n## 练习\n\n1. 将以下循环重写为 for 循环。\n   a.\n   ```cpp\n\
    \   int x = 2;\n   while(x <= 200)\n   {\n       if (x < 10 && x != 1)\n     \
    \  cout << 'YY';\n       x=x+2;\n   }\n   ```\n   b.\n   ```cpp\n   int a = 2;\n\
    \   while(a <=21)\n   {\n       cout << 'YY';\n       a++;\n   }\n   ```\n2. 以下代码的输出是什么（当嵌入完整程序中时）？\n\
    \   ```cpp\n   for (int ctr = 2; ctr < 15; ctr++)\n       cout << (3 + ctr) <<\
    \ endl;\n   ```\n3. 以下代码的输出是什么？\n   ```cpp\n   for (int b = 50; b > 2; b = b -\
    \ 3)\n   {\n       cout << \"Hi \";\n       cout << b << endl;\n   }\n   ```\n\
    4. 编写一个程序，使用 for 循环创建并无限次打印你的名字。\n\n## 数组\n\n数组是相同数据类型值的集合。\n\n集合中的每个值都有一个与之关联的索引，可用于检索该值。\n\
    \nC++ 中的索引从0开始，而不是1，这被称为 **零基索引**。就像从0开始计数而不是从1开始。\n\n## 练习\n\n如果我给物品贴上从0到4的标签，我有多少个物品？\n\
    \n**答案：5**\n\n## 声明数组\n\n声明数组时，我们首先指定数组将保存的值的数据类型，然后是数组的变量名，最后是在方括号中指定它将保存的元素数量。\n\
    \n例如：\n\n```cpp\nint size[4];\nsize = {1,2,3,4};\n```\n\n## 解释\n\n上面我们声明了一个变量名为\
    \ *size* 的数组，它保存了4个整数数据类型的值。\n\n```cpp\nint size[4];\n```\n\n- `int` -> 数组保存的元素的数据类型\n\
    - `size` -> 数组的名称\n- `[4]` -> 指定数组保存的元素数量\n\n语句 `size = {1, 2, 3, 4}` 初始化一个数组，这仅仅意味着为数组变量赋值。\n\
    \n您也可以同时声明和初始化一个数组，如下所示：\n\n## 示例\n\n```cpp\nint size[4] = { 1,2,3,4};\nint size[]\
    \ = { 1,2,3,4};\n```\n\n如果参数较少，其余部分将初始化为该数据类型的零值。\n\n## 从数组中检索值\n\n通过使用索引指定所需值的位置来从数组中检索值。\n\
    \n## 示例\n\n假设我们想检索数组中的第一个元素，我们的代码将是：\n\n```cpp\n#include<iostream>\nusing namespace\
    \ std;\n\nint main(){\n    int size[4] = { 1,2,3,4};\n    int firstElement = size[0];\n\
    \n    cout << firstElement ;\n    return 0;\n}\n```\n\n## 解释\n\n这一行 `int firstElement\
    \ = size[0];` 检索数组中的第一个元素。\n\n请注意，由于在 C++ 中我们从0开始计数，数组中第一个元素的索引是0。\n程序打印出1，因为\
    \ size 中的第一个元素是1。\n\n## 练习\n\n检索第四个元素。（提示：索引不是4）\n\n## 遍历数组中的元素\n\n如果我们想检索数组中的所有元素，可以使用循环来完成。\n\
    我们将使用 *for* 循环，因为这是最简单的方法。\n\n## 示例\n\n```cpp\n#include<iostream>\nusing namespace\
    \ std;\n\nint main(){\n    int size[4] = { 1,2,3,4};\n\n    for(int i = 0 ; i\
    \ < 4; i++){\n        cout << size[i] ;\n    }\n    return 0;\n}\n```\n\n## 解释\n\
    \n请注意，我们的计数器从0开始，条件是计数器 *i* 的值应小于4，即数组的大小。\n\n## 练习\n\n请在一个文件中完成：\n\n1. 编写一个计算圆面积的函数。\n\
    2. 创建一个数组，保存10个你想知道面积的圆的半径。\n3. 遍历数组以计算圆的面积，并将结果打印到屏幕上。\n4. 仅计算数组中第四个位置的圆的面积。\n\
    5. 创建一个包含你名字字符的数组，并将所有字符打印到屏幕上。\n\n## 结构体\n\n结构体是一组值，使您能够以逻辑方式组织数据，即以对您有意义的方式组织数据。\n\
    \n假设您想收集关于朋友年龄、体重和身高的信息。\n\n根据我们目前的知识，我们会这样做：\n\n## 示例代码\n\n```cpp\n#include<iostream>\n\
    using namespace std;\n\nint main(){\n    int kevinAge = 10;\n    int kevinWeight\
    \ = 30;\n    int kevinHeight = 1;\n\n    int jesiccaAge = 15;\n    int jesiccaWeight\
    \ = 28;\n    int jesiccaHeight = 1;\n}\n```\n\n结构体使得分组此类信息变得更容易。\n\n让我们首先定义一个结构体。\n\
    \n## 结构体定义\n\n```cpp\n#include<iostream>\nusing namespace std;\n\nstruct PersonInfo{\n\
    \    int age;\n    int weight;\n    int height;\n};\n\nint main(){\n    return\
    \ 0;\n}\n```\n\n## 解释\n\n结构体在任何函数定义（包括主函数）之外定义。\n\n我们使用关键字 **struct** 来定义一个结构体，后面是我们想给结构体的名称，这个名称被称为\
    \ *结构体标签*。\n\n在与结构体标签关联的大括号内，我们声明结构体变量，这些变量也被称为 *成员名称*。在上面的例子中，**age**、**weight**\
    \ 和 **height** 是 *成员名称*。"
