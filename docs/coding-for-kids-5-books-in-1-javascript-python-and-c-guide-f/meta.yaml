    </body>\n</html>\n```\n\n## 输出：\n\n```\nxi= 5\nyi= 5\nzi= 5\nxf= 5.2\nyf= 5.01\n\
    zf= 5.65\n```\n\n我们可以看到parseInt和parseFloat的结果是不同的。对于xi和yi，我们传递了字符串“5.2”。它被认为是字符串，因为它在引号内。即使引号内有一个数字，在实际执行parseInt或parseFloat之前，我们也不能将其用于任何数学运算。完成parseInt或parseFloat后，它就变成了一个数字。我们还注意到，对于所有值，parseInt会移除小数点并使其成为整数。它不会四舍五入，只是移除小数部分。\n\
    \nparseFloat保留小数值。所以，如果你想处理小数；使用parseFloat。如果你不想要小数，那么使用parseInt。\n\n### 数字取整\
