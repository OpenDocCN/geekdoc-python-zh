    \ It is initialized to underscores (_) with the same length as the original animal.\n\
    \nThe variable **remletters** is the number of remaining letters to be guessed.\
    \ A while loop is created to accept user guesses as long as **remletters>0**.\n\
    \nUsing prompt, we accept a single letter input from the user. If there is more\
    \ than one letter input, we set an error message and ask the user to enter only\
    \ one letter. Once the user enters a letter, we enter a loop that checks each\
    \ letter of the random animal against the user letter. Each time there is a match,\
    \ we subtract **remletters** by 1 and update the relevant part of **answerArray**\
    \ with the matched letters. At the end of the while loop, the user has guessed\
    \ the animal, and we print out a congratulatory note with the name of the animal.\n\
    \nAt any point within the while loop, if the user doesn’t enter a letter and tries\
    \ to proceed, we exit the program loop and print out the animal name.\n\nAt the\
    \ end of the game, the user has the option to restart the program using the **Home**\
    \ button. Here’s the code below with some examples.\n\n```html\n<html>\n<head>\n\
    \  <title>Animal Hangman</title>\n  <link rel=\"stylesheet\" href=\"samplestyle.css\"\
    \ />\n</head>\n<body>\n  <button class=\"btn\" onclick=\"animalhangmman()\">Start\
    \ Animal Hangman</button>\n\n  <script>\n    function animalhangmman()\n    {\n\
    \      // Create an array of animals\n      var animals = [\n        \"tiger\"\
    ,\n        \"lion\",\n        \"monkey\",\n        \"kangaroo\",\n        \"racoon\"\
    ,\n        \"flamingo\",\n        \"elephant\",\n        \"porcupine\"\n     \
    \ ];\n      var chosenanimal = animals[Math.floor(Math.random() * animals.length)];\n\
    \      var answerArray = [];\n      for (var i = 0; i < chosenanimal.length; i++)\
    \ {\n        answerArray[i] = \"_\";\n      }\n    }\n  </script>\n</body>\n</html>\n\
    ```\n\n```javascript\nvar remletters = chosenanimal.length;\nwhile (remletters\
    \ > 0)\n{\nalert(answerArray.join(\" \"));\nvar guess = prompt(\"Guess a letter,\
    \ or click Cancel to stop playing.\");\nif (guess == null)\n{\n// Exit the game\
    \ loop\nbreak;\n}\nelse if (guess.length !== 1)\n{\nalert(\"Please enter a single\
    \ letter.\");\n}\nelse\n{\n// Update the game state with the guess\nfor (var j\
    \ = 0; j < chosenanimal.length; j++)\n{\nif (chosenanimal[j] === guess)\n{\nanswerArray[j]\
    \ = guess;\nremletters=remletters-1;\n}\n}\n} // The end of the game loop\n}\n\
    // Show the answer and congratulate the player\nalert(answerArray.join(\" \"));\n\
    alert(\"Good job! The answer was \" + chosenanimal);\n}\n</script>\n</body>\n\
