- md: '## Having Fun with Strings


    ## Strings and String Variables


    We’ve touched on this in the previous chapters. A string is any piece of text
    that is used in a program. As an example, “abcd” is a string; while the number
    7 is not a string. It is an integer.

    A string variable is a place to store a string. As an example, st is a string
    variable below that stores the value of “abcd”.

    var st=”abcd”;

    Now, let’s have some fun with strings using our knowledge of JavaScript and loops.


    ## Finding Length of a String


    Now, let’s input a string in a textbox and find the length of the string.


    ```html

    <html>

    <head><title>JavaScript Lesson 4 - Strings</title></head>

    <body>

    <form id="form1">

    Enter Name:<input name="name" type="text" id="name" size="20"><br>

    </form>

    <button onclick="strlength()">Name Length</button>

    <script>


    function strlength()

    {

    var name2=document.getElementById("name").value;

    document.write(name2.length);

    }

    </script>


    </body>

    </html>

    ```


    The code below lets you input your name through a textbox. When you click the
    button, it runs the function strlength() that calculates the length of your name.

    name2 is the variable that stores the value of your name.

    name2.length gets the length of the string (number of letters in your name).

    Let’s look at the output:


    Enter Name: mather


    Name Length


    After clicking the button ‘Name Length’, we get:

    6


    Let’s do another example:


    Enter Name: christopher


    Name Length


    After clicking the button ‘Name Length’, we get:

    11


    So, now that we know how to find the length of a string, let’s use that knowledge
    to reverse your name. The code below does that.


    ```html

    <html>

    <head><title>JavaScript Lesson 4 - Strings</title></head>

    <body>

    <form id="form1">

    Enter Name:<input name="name" type="text" id="name" size="20"><br>

    </form>

    <button onclick="strlength()">Name Length</button>

    <button onclick="namereverse()">Name Reverse</button>

    <script>


    function strlength()

    {

    var name2=document.getElementById("name").value;

    document.write(name2.length);

    }


    function namereverse()

    {

    var name2=document.getElementById("name").value;

    len=name2.length;

    for (i=len-1;i>=0;i--)

    {

    document.write(name2[i]);

    }

    }


    </script>


    </body>

    </html>

    ```


    The code below lets you input your name through a textbox. When you click the
    button, it runs the function `namereverse()` that reverses your name. Name2 stores
    the value you entered for your name len stores the number of letters in your name.
    Then we create a loop than runs from len-1 to 0. The reason we use 0 is because
    name2 is an array of letters. The first index of the array is 0 in JavaScript.
    So the first character is name2[0]. In the loop, we go backwards and decrease
    the count by 1 each time. And, within the loop, we print the value of the character
    that is indexed by the count. Now, let’s run the program:


    Enter Name: mather


    Name Length Name Reverse


    After clicking **Name Reverse** button, we get


    rehtam


    Now, what if you have a lot of spaces at the end of a string. Let’s fix that by
    trimming strings.


    ## Splitting Strings


    Now, did you know that you can split a string into an array of elements. You can
    achieve this using the split function. Now, let’s try an example. In the code
    below, you take a list of 3 animals as input into a textbox which are separated
    by commas.

    The split function separates this into an array of 3 elements and you can print
    out each element using document.write function.


    ```html

    <html>

    <head><title>Splitting Strings</title></head>

    <body>

    <form id="form1">

    Enter List of 3 Animals separated by commas:<input name="name" type="text" id="ani"
    size="20"><br>

    </form>

    <button onclick="strsplit()">Get Animals</button>


    <script>


    function strsplit()

    {

    var animal=document.getElementById("ani").value;

    aniarray=animal.split(",");          // Split on commas

    document.write("The first animal is "+aniarray[0]+"<br>");

    document.write("The second animal is "+aniarray[1]+"<br>");

    document.write("The third animal is "+aniarray[2]+"<br>");

    }


    </script>

    </body>

    </html>

    ```


    Now, let’s check out the output:


    Enter List of 3 Animals separated by commas: tiger, lion, wolf


    Get Animals


    After clicking the button **Get Animals** we have:


    **The first animal is tiger**

    **The second animal is lion**

    **The third animal is wolf**


    The above code works if you have 3 animals as input. You might ask if there’s
    a code that can work for more than 3 animals. Yes, it can. You need to find the
    length of the string array using length function and then use a FOR loop when
    printing the animals. In the forloop, we use aninumber to keep track of the animal
    count; and aniarray[i] to keep track of the actual animals to print.

    Note that aninumber is always 1 more than i, because i starts from 0 in a JavaScript
    array.

    Here’s the code below:


    ```html

    <html>

    <head><title>Splitting Strings</title></head>

    <body>

    <form id="form1">

    Enter List of Animals separated by commas:<input name="name" type="text" id="ani"
    size="20"><br>

    </form>


    <button onclick="strsplit()">Get Animals</button>


    <script>


    function strsplit()

    {

    var animal=document.getElementById("ani").value;

    aniarray=animal.split(",");          // Split on commas

    var len=aniarray.length;

    var aninumber;

    for (i=0; i<=len-1;i++)

    {

    aninumber=i+1;

    document.write("Animal "+aninumber+" is "+aniarray[i]+"<br>");

    }

    }


    </script>

    </body>

    </html>

    ```


    And, here’s the output below.


    Enter List of Animals separated by commas: lion, tiger, wolf, rhino, dog


    Get Animals


    We enter names of 5 animals and click the **Get Animals** button.


    - Animal 1 is lion

    - Animal 2 is tiger

    - Animal 3 is wolf

    - Animal 4 is rhino

    - Animal 5 is dog


    ## Replacing Strings


    Now, let’s say you have a long paragraph and you want to replace a particular
    word with another. You use the function .replace. In the below example, we replace
    “Atlanta” with “Charleston”. Please remember that this works for only 1 instance
    of Atlanta. We use a html form element called textarea. Textarea is a bigger form
    of textbox which can take multiple lines of text from the user. And then we write
    the modified sentence on the screen.


    ```html

    <html>

    <head><title>Replacing Strings</title></head>

    <body>

    <form id="form1">

    What was your day like?: <textarea name="sentence" cols="20" rows="5" id="sentence"></textarea><br><br>

    </form>

    <button onclick="strreplace()">Fix Sentence</button>

    <script>

    function strreplace()

    {

    var daydesc=document.getElementById("sentence").value;

    var daydescmod=daydesc.replace("Atlanta","Charleston");

    document.write(daydescmod);

    }

    </script>

    </body>

    </html>

    ```


    Now, let’s run the program.


    ![](img/443990a0ec620659ce8be783c0758bc6_199_0.png)


    Once we click **Fix Sentence** button, we get:


    **I went to Charleston this summer for a long nice summer vacation.**


    ## Substrings and String Index


    There are a couple of other string manipulation techniques that I would like to
    discuss before we move on. These are string index and substring.

    String Index gives you the position within a certain string that another string
    occurs. For example, the string index of boy in the string “The boy climbed the
    tree” is 4, because boy starts at the 4th character of the overall string.

    A substring lets you extract a section of an existing string. For example, in
    the same string “The boy climbed the tree”; if we do a substring from 6 to 10
    we get “oy cl” because those are the characters between 6 and 10.

    Now, let’s look at an example below:


    ```html

    <html>

    <head><title>Substrings and String Index</title></head>

    <body>

    <form id="form1">

    What was your day like?: <textarea name="sentence" cols="20" rows="5" id="sentence"></textarea><br><br>

    What String would you like to find the String Index Of?:<input name="test string"
    type="text" id="tstr" size="20"><br><br>

    </form>


    <button onclick="strindex()">Find Index</button>


    <script>


    function strindex()

    {

    var daydesc=document.getElementById("sentence").value;

    var str = document.getElementById("tstr").value;

    var ind=daydesc.indexOf(str);

    document.write("The String Index is "+ind);

    }


    </script>

    </body>

    </html>

    ```


    In the above example, daydesc is the large string and str is the string we need
    to find the string index for. The variable ind stores the value of the string
    index and then we print the answer using document.write. Now, let’s run the program:'
  mdcn: '## 玩转字符串


    ## 字符串与字符串变量


    我们在前面的章节中已经接触过这个概念。字符串是程序中使用的任何文本片段。例如，“abcd”是一个字符串；而数字7不是字符串，它是一个整数。

    字符串变量是存储字符串的地方。例如，下面的 `st` 就是一个存储了“abcd”值的字符串变量。

    `var st=”abcd”;`

    现在，让我们运用JavaScript和循环的知识，来玩转字符串。


    ## 查找字符串长度


    现在，让我们在文本框中输入一个字符串，并找出它的长度。


    ```html

    <html>

    <head><title>JavaScript Lesson 4 - Strings</title></head>

    <body>

    <form id="form1">

    Enter Name:<input name="name" type="text" id="name" size="20"><br>

    </form>

    <button onclick="strlength()">Name Length</button>

    <script>


    function strlength()

    {

    var name2=document.getElementById("name").value;

    document.write(name2.length);

    }

    </script>


    </body>

    </html>

    ```


    下面的代码让你通过文本框输入你的名字。当你点击按钮时，它会运行 `strlength()` 函数来计算你名字的长度。

    `name2` 是存储你名字值的变量。

    `name2.length` 获取字符串的长度（你名字中的字母数）。

    让我们看看输出：


    Enter Name: mather


    Name Length


    点击“Name Length”按钮后，我们得到：

    6


    让我们再做一个例子：


    Enter Name: christopher


    Name Length


    点击“Name Length”按钮后，我们得到：

    11


    那么，既然我们知道了如何查找字符串的长度，就让我们利用这个知识来反转你的名字。下面的代码实现了这一点。


    ```html

    <html>

    <head><title>JavaScript Lesson 4 - Strings</title></head>

    <body>

    <form id="form1">

    Enter Name:<input name="name" type="text" id="name" size="20"><br>

    </form>

    <button onclick="strlength()">Name Length</button>

    <button onclick="namereverse()">Name Reverse</button>

    <script>


    function strlength()

    {

    var name2=document.getElementById("name").value;

    document.write(name2.length);

    }


    function namereverse()

    {

    var name2=document.getElementById("name").value;

    len=name2.length;

    for (i=len-1;i>=0;i--)

    {

    document.write(name2[i]);

    }

    }


    </script>


    </body>

    </html>

    ```


    下面的代码让你通过文本框输入你的名字。当你点击按钮时，它会运行 `namereverse()` 函数来反转你的名字。`name2` 存储你输入的名字值，`len`
    存储你名字的字母数。然后我们创建一个从 `len-1` 到 `0` 的循环。我们使用0的原因是 `name2` 是一个字母数组。在JavaScript中，数组的第一个索引是0。所以第一个字符是
    `name2[0]`。在循环中，我们反向进行，每次将计数减1。并且，在循环内部，我们打印由计数索引的字符的值。现在，让我们运行程序：


    Enter Name: mather


    Name Length Name Reverse


    点击 **Name Reverse** 按钮后，我们得到


    rehtam


    那么，如果字符串末尾有很多空格怎么办？让我们通过修剪字符串来解决这个问题。


    ## 分割字符串


    现在，你知道吗？你可以将一个字符串分割成一个元素数组。你可以使用 `split` 函数来实现这一点。现在，让我们尝试一个例子。在下面的代码中，你将一个由逗号分隔的3种动物的列表作为输入放入文本框。

    `split` 函数将其分割成一个包含3个元素的数组，你可以使用 `document.write` 函数打印出每个元素。


    ```html

    <html>

    <head><title>Splitting Strings</title></head>

    <body>

    <form id="form1">

    Enter List of 3 Animals separated by commas:<input name="name" type="text" id="ani"
    size="20"><br>

    </form>

    <button onclick="strsplit()">Get Animals</button>


    <script>


    function strsplit()

    {

    var animal=document.getElementById("ani").value;

    aniarray=animal.split(",");          // Split on commas

    document.write("The first animal is "+aniarray[0]+"<br>");

    document.write("The second animal is "+aniarray[1]+"<br>");

    document.write("The third animal is "+aniarray[2]+"<br>");

    }


    </script>

    </body>

    </html>

    ```


    现在，让我们看看输出：


    Enter List of 3 Animals separated by commas: tiger, lion, wolf


    Get Animals


    点击 **Get Animals** 按钮后，我们得到：


    **The first animal is tiger**

    **The second animal is lion**

    **The third animal is wolf**


    上面的代码在你输入3种动物时有效。你可能会问，是否有代码可以处理超过3种动物的情况。是的，可以。你需要使用 `length` 函数找到字符串数组的长度，然后在打印动物时使用
    `FOR` 循环。在 `for` 循环中，我们使用 `aninumber` 来跟踪动物计数；使用 `aniarray[i]` 来跟踪要打印的实际动物。

    请注意，`aninumber` 总是比 `i` 大1，因为在JavaScript数组中，`i` 从0开始。

    下面是代码：


    ```html

    <html>

    <head><title>Splitting Strings</title></head>

    <body>

    <form id="form1">

    Enter List of Animals separated by commas:<input name="name" type="text" id="ani"
    size="20"><br>

    </form>


    <button onclick="strsplit()">Get Animals</button>


    <script>


    function strsplit()

    {

    var animal=document.getElementById("ani").value;

    aniarray=animal.split(",");          // Split on commas

    var len=aniarray.length;

    var aninumber;

    for (i=0; i<=len-1;i++)

    {

    aninumber=i+1;

    document.write("Animal "+aninumber+" is "+aniarray[i]+"<br>");

    }

    }


    </script>

    </body>

    </html>

    ```


    下面是输出结果。


