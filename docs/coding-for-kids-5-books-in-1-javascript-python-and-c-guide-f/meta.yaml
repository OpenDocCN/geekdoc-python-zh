    \n![](img/443990a0ec620659ce8be783c0758bc6_634_0.png)\n\n## 练习题\n\n- 1. 修改增长的正方形，使其从左上角而不是中心开始增长。\n\
    - 2. 在中心创建一个每2秒闪烁一次的红色圆圈。\n- 3. 创建一个缩小的圆圈，它从半径等于窗口大小开始，缩小到半径10。\n- 4. 创建2个弹跳的小球，它们从边界弹跳，并且如果相撞也会互相弹跳。提示：在弹跳函数中检查小球之间的距离，如果足够近则触发弹跳。\n\
    \n## 处理按键和鼠标点击事件\n\nPygame 主要使用 pygame.event 模块处理用户输入。pygame.event 监听并注册来自键盘或鼠标的所有事件。每次事件发生时，都会创建一个事件对象来记录它。\n\
    事实上，我们在程序中已经多次使用了 pygame.event。\n在这个代码片段中，在游戏循环中我们持续检查任何新的 pygame.event 事件。\n\
    `pygame.event.get()` 返回自上次 `pygame.event.get()` 调用以来发生的所有事件列表。\n当按下退出按钮时，pygame.event\
    \ 将此事件注册为类型为 pygame.QUIT 的事件。\n因此我们遍历所有事件，并检查是否有任何事件的类型是 pygame.QUIT，如果是，我们将 loop\
    \ 变量设置为 false，以便在下一次迭代中退出循环。\n\n```python\n# 游戏无限循环\nloop = True\nwhile loop:\n\
    \    # 如果按下退出按钮，则退出事件循环\n    for event in pygame.event.get():\n        if event.type\
    \ == pygame.QUIT:\n            loop = False\n```\n\n要了解更多关于 pygame 事件的信息，请参考此链接：\n\
    [http://man.hubwiz.com/docset/PyGame.docset/Contents/Resources/Documents/ref/event.html](http://man.hubwiz.com/docset/PyGame.docset/Contents/Resources/Documents/ref/event.html)\n\
    \n此表显示了一些常见的 pygame.event 常量及其属性。\n\n| 常量名称 | 属性 |\n|---|---|\n| QUIT | 无 |\n\
    | ACTIVEEVENT | gain, state |\n| KEYDOWN | key, mod |\n| KEYUP | key, mod |\n\
    | MOUSEMOTION | pos, rel, buttons |\n| MOUSEBUTTONUP | pos, button |\n| MOUSEBUTTONDOWN\
    \ | pos, button |\n\n## 键盘事件\n\nKEYUP 和 KEYDOWN 事件具有表示键盘按键的 key 常量属性。\n使用大写字母\
    \ K 后跟下划线和按键名称，\n例如 F1 是 K_F1，w 是 K_w。\n在这个代码片段中，我们使用 pygame.KEYDOWN 检查按键何时被按下，我们检查按下了哪个方向键并打印按键名称的消息。\n\
    \n```python\nfor event in pygame.event.get():\n    if event.type == pygame.QUIT:\n\
    \        pygame.quit()\n    elif event.type == pygame.KEYDOWN:\n        if event.key\
    \ == pygame.K_UP:\n            print(\"玩家向上移动！\")\n        elif event.key == pygame.K_LEFT:\n\
    \            print(\"玩家向左移动！\")\n        elif event.key == pygame.K_DOWN:\n  \
    \          print(\"玩家向下移动！\")\n        elif event.key == pygame.K_RIGHT:\n   \
    \         print(\"玩家向右移动！\")\n```\n\n要阅读所有按键绑定，请阅读 pygame 按键文档 [https://www.pygame.org/docs/ref/key.html](https://www.pygame.org/docs/ref/key.html)\n\
    \n## 鼠标事件\n\n在 pygame 中有三种类型的鼠标事件：MOUSEBUTTONDOWN、MOUSEBUTTONUP 和 MOUSEMOTION。\n\
    当用户按下或移动鼠标时，会接收到 MOUSEBUTTONUP 和 MOUSEMOTION 事件。\n它们具有以下属性：\nButton：1 表示左键，2 表示鼠标滚轮，3\
    \ 表示右键。\nPos：按下按钮时鼠标的绝对位置 (x,y)。\n\n当用户移动鼠标时，会接收到 MOUSEMOTION 事件，它有 3 个属性：\nButtons：一个元组，表示鼠标按钮是否被按下（左键、鼠标滚轮、右键）。\n\
    Pos：光标的绝对位置 (x,y)，单位为像素。\nRel：相对于上一次位置的位置 (relative_x, relative_y)。\n\n在这个例子中，我们使用了讨论过的三个鼠标属性来检测鼠标。\n\
    \n```python\n# 检测鼠标动作\n\nfor event in pygame.event.get():\n    if event.type ==\
    \ pygame.QUIT:\n        pygame.quit()\n    elif event.type == pygame.MOUSEMOTION:\n\
    \        if event.rel[0] > 0:  # 'rel' 是一个元组 (x, y)。'rel[0]' 是 x 值。\n        \
    \    print(\"鼠标向右移动\")\n        elif event.rel[1] > 0:  # pygame 原点在左上角，所以更高的\
    \ y 值意味着更靠下。\n            print(\"鼠标向下移动\")\n    elif event.type == pygame.MOUSEBUTTONDOWN:\n\
    \        if event.button == 1:\n            print(\"按下鼠标左键\")\n        elif event.button\
    \ == 3:\n            print(\"按下鼠标右键\")\n    elif event.type == pygame.MOUSEBUTTONUP:\n\
    \        print(\"鼠标按钮释放\")\n```\n\n## 示例 1：移动的正方形\n\n在这个例子中，我们实现了一个类似于上一章的移动正方形，但它通过键盘按键移动。我们检测类型为\
    \ pygame.KEYDOWN 的事件，然后检查事件。"
