    # Mouse events


    There are there types of mouse events in pygame . MOUSEBUTTONDOWN, MOUSEBUTTONUP
    , and MOUSEMOTION.

    MOUSEBUTTONUP , and MOUSEMOTION are received when user presses or moves a mouse.

    They have attributes:

    Button : 1 for left button , 2 for mouse wheel and 3 for right button .

    Pos : Mouse absolute position of mouse (x,y) when button is pressed


    MOUSEMOTION is received when user mouse moves, it has 3 attributes

    Buttons : tuple of mouse button pressed or not (left, mouse wheel, right )

    Pos : absolute cursor position (x,y) in pxels'
