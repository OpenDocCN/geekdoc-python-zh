- md: "Python also offers string comparison operators just as you can compare numbers\
    \ using ==, >, < etc. You can also compare strings using the same operators.\n\
    \n| Operator | Name | Description | Example | Returns |\n| :--- | :--- | :---\
    \ | :--- | :--- |\n| == | Equality | Returns True if strings are equal else False.\
    \ | \"Python\" == \"C++\" | False |\n| != | Not equal | Returns True if strings\
    \ are not equal else False. | \"Python\" != \"C++\" | True |\n| > | Greater than\
    \ | Returns True if len(str1) > len(str2) else False | \"Python\" > \"C++\" |\
    \ True |\n| >= | Greater than or equal | Returns True if len(str1) >= len(str2)\
    \ else False | \"Python\" >= \"Python\" | True |\n| < | Less than | Returns True\
    \ if len(str1) < len(str2) else False | \"Python\" < \"C++\" | False |\n| <= |\
    \ Less than or equal | Returns True if len(str1) <= len(str2) else False | \"\
    Python\" <= \"C++\" | False |\n\n## Example 1: String methods\n\nThe script below\
    \ uses the string methods we learnt to do interesting operations on strings. This\
    \ program takes username via input function and do interesting string methods\
    \ on user name. The code is commented. Read and investigate the code. After you\
    \ have understood the code, try to tinker with it.\n\n```python\nname = \"Nick\
    \ John\"\n\nn = len(name)\nindex0 = name[0]\nindexneg = name[-1]\nindex0_4 = name[0:4]\n\
    \n# Using f-string to concatenate sentences\njob = f\"\\'{name} is an Engineer\\\
    '\"\nprint(\"using f-string output is\", job)\n\n#slicing and indexing\nprint(f\"\
    name length is: {n}\")\nprint(f\"name index 0 is {index0}\")\nprint(f\"name index\
    \ -1 is {indexneg}\")\nprint(f\"name slice [0:4] is {index0_4}\")\n\n# in operation,\
    \ split, replace, capitalize\nis_in = \"Nick\" in name\nprint(f\"\"Nick\" in name\
    \ returns {is_in}\")\nsplited = name.split()\nprint(f\"name.split() returns {splited}\"\
    )\nname = name.replace(\"Nick\", \"Biden\")\nprint(f\"Nick John after replacing\
    \ with name.replace() is {name}\")\nprint(f\"james capitalized is {'james'.capitalize()}\"\
    )\n\n# count, isalnum, isalpha, isdigit\nname = \"Obama Jame\"\ncount = name.count(\"\
    Nick\")\nprint(f\"Nick occurs {count} times in \\'{name}\\'\")\n\nnon_alphanum\
    \ = \"eoe12#\"\nnon_alpha = \"23\"\ndigit = '223'\n\nprint(f\"{non_alphanum} is\
    \ alphanumeric is {non_alphanum.isalnum()}\")\nprint(f\"{non_alpha} is alphabetic\
    \ is {non_alpha.isalpha()}\")\nprint(f\"{digit} is only digits {digit.isdigit()}\"\
    )\n```\n\n**Output:**\n\n```\nusing f-string output is 'Nick John is an Engineer'\n\
    name length is: 9\nname index 0 is N\nname index -1 is n\nname slice [0:4] is\
    \ Nick\n\"Nick\" in name returns True\nname.split() returns ['Nick', 'John']\n\
    Nick John after replacing with name.replace() is Biden John\njames capitalized\
    \ is James\nNick occurs 0 times in 'Obama Jame'\neoe12# is alphanumeric is False\n\
    23 is alphabetic is False\n223 is only digits True\n```\n\n## Example 2 – Reversing\
    \ name\n\nIn this program, we will input our name through input function and the\
    \ function will print the name length and the reverse of your name. First, we\
    \ loop through name characters and print each character. For the reverse part,\
    \ we loop through 1 and up to string length and index the name string using negative\
    \ i starting backward. For example, if word length is 10, we start with index\
    \ -1 through -10.\nNote: print(char, end='.') prints char and end with ‘.’ Instead\
    \ of usual newline.\n\n```python\nname = input(\"Enter your name: \")\n\nn = len(name)\n\
    print(\"The length of your name is \", n)\nprint()\nfor char in name :\n    print(char,end='.')\n\
    \nprint()\nprint(\"The reverse is\")\n\nfor i in range(1, n+1):\n    print(name[-i],\
    \ end=\".\")\n```\n\n**Output:**\n```\nEnter your name: James Bond\nThe length\
    \ of your name is 10\n\nJ.a.m.e.s. .B.o.n.d.\nThe reverse is\nd.n.o.B. .s.e.m.a.J.\n\
    ```\n\n## Example 3 – Vowels counter program\n\nThis program counts the vowels\
    \ in a string. It starts by initializing count to zero, then converting all text\
    \ characters to lowercase so we can use comparison between text characters and\
    \ vowels characters in lowercase. Then we loop through characters in text and\
    \ check if char in vowels, if true count gets incremented by one.\n\n```python\n\
    vowels = 'aeiou'\n\n# returns the count of vowels in text\ndef count_vowels(text):\n\
    \    count = 0\n    # convert text to all lowercase so it compares correctly\n\
    \    # to vowels\n    text = text.lower()\n    for char in text:\n        if char\
    \ in vowels:\n            count += 1\n    return count\n\ntext = \"Learning programming\
    \ is amazing tool to learn\"\ncount = count_vowels(text)\nprint(f\"There are {count}\
    \ vowels in text.\")\n```\n\n**Output:**\n```\nThere are 15 vowels in text.\n\
    ```\n\n## Example 4 – Remove negative words from a text\n\nThis program iterates\
    \ through the words by splitting them first using str.split().\n\nstr.split()\
    \ splits negative_words by space into words. For example “I like CS”.split() returns\
    \ [“I”, “like”, “CS”]. The block function loop through negative_words list and\
    \ if any word is in the text, we replace the word with asterisk string that match\
    \ negative word length.\n\n```python\n# replace all instances negative words with\
    \ stars matching the length of these words\n\nnegative_words = \"bad kill haters\"\
    \n\ndef block(text):\n    # split words into list of words\n    for negative in\
    \ negative_words.split():\n        if negative in text:\n            text = text.replace(negative,\
    \ len(negative)*'*')\n    return text\n\ntext = \"haters kill love\"\nblocked_text\
    \ = block(text)\n\nprint(f\"Original text : {text}\")\nprint(f\"Blocked text :\
    \ {blocked_text}\")\n```\n\n**Output:**\n```\nOriginal text : haters kill love\n\
    Blocked text : ****** **** love\n```\n\n## Practice Problems\n\n- 1. Palindrome\
    \ is a word which reads the same forward as backward, such as Civic, Level, Mom,\
    \ Noon and radar. Write a program that return true if the phrase is a palindrome.\n\
    - 2. Write a program that prints how many one-character repeats are there in a\
    \ given text.\n- 3. Write a program that generate random n length alphanumeric\
    \ password.\n- 4. Write a program to replace comma with dots in given string,\
    \ such as “32,323,23” to “32.323.23”\n- 5. Write a program that computes sum of\
    \ digits in a string, such as “452” digits sum to 11.\n\n## Doing Math with Python\n\
    \nPython is a great programming language to perform and analyze data from users.\
    \ We’ll go over a few functions that help you get familiar with python. Now, this\
    \ section is not for everyone. It’s for those who are interested in implementing\
    \ a math in their programs, or like math and would like to see it implemented\
    \ in Python. Some of the concepts are taught in high schools, so this section\
    \ may not be good for younger students.\n\n### int/float\n\n**int** — Takes string\
    \ variable and return an integer or if passed with a float returns the integer\
    \ part of float.\n\n**float** — Takes string variable and converts it to float\
    \ number.\n\nLet’s look at an example below.\nIn this example, we put 3 of the\
    \ numbers through int and float and see the output.\n\n```python\nxi = int(5.2)\n\
    yi = int(5)\nzi = int(\"5\")\nxf = float(\"5.2\")\nyf = float(5.01)\nzf = float(5)\n\
    \nprint(f\"xi is {xi} and it's type is {type(xi)}\")\nprint(f\"yi is {yi} and\
