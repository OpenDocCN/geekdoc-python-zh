    # Introduction


    ## What is Programming


    Programming is the art of writing a computer program. A computer program is a
    set of instructions that a machine can comprehend to perform a certain task. Computer
    programming is how humans communicate with machines.


    Computers are pretty good at following the instructions we give them.


    A program is just simply a list of steps that should be followed to achieve a
    goal. It is just like a recipe, to prepare your favorite dish you just need to
    follow the instructions on the recipe.


    The only issue is that computers do not speak English as we do, they speak their
    own language. This computer language is known as machine language.


    There is a part on the computer called the interpreter, which interprets our instructions
    to machine language so that the computer is able to understand the instructions
    we are giving it. This interpreter is also known as a **compiler**.


    A compiler is the interface between the programming language and the machine.
    A programming language is a very simple language to learn and there are numerous
    programming languages out there. We are only going to learn C++ in this book.


    As you know, spoken languages usually have grammar. Grammar is a way of arranging
    words in a language to make sense to others who speak that language. Programming
    languages have grammar as well, which we call **syntax**.


    In order for the compiler to understand you, you have to use the proper syntax
    or else it will cause an error. We will at first spend a lot of time learning
    the syntax of our programming language.


    In summary, we write a program using a programming language. The programming languages
    communicates with the compiler. The compiler translates the language to machine
    language and then runs the program. The computer reads our instructions and does
    what we have told it to do.


    Your first programming language is usually the toughest to learn but after learning
    it, it becomes easier to learn other languages.


    ## Why C++


    You can do a lot after learning C++. You can make games, use the Arduino board
    to make cool projects or even program planes if you are allowed to do that. The
    only limit you have is your imagination.


    The main benefit of C++ is that it is very portable between operating systems
    and compilers. This means that the same code can be used in Windows, Linux, Opera
    etc.


    C++ has a large community support with developer forums, online tutorials, Facebook
    community groups, which is very significant for beginner programmers. It’s much
    easier to learn as you can ask other people in the community if you get stuck.


    C++ is also very scalable and flexible in multiple environments. This means that
    it can be used by beginner programmers and advanced professionals for different
    purposes. It can also be used to code games, applications, software and apps.


    C++ is wildly used in graphics and is now used in emerging technologies like image
    processing, pattern recognition and in embedded systems like location tracing.


    C++ is more efficient at using computer memory, so it saves space on your hard
    drive.


    ## Why Learn Programming


    Programming at its core is not really about writing code but thinking of ways
    to solve problems. You get to learn and appreciate that there are different ways
    to tackle a problem and sometimes one way is better than the other. You also learn
    that breaking a big problem into small parts makes your work easier.


    It is also about learning how to collaborate with others. People usually assume
    that programmers work by themselves to solve problems, but programmers act as
    a team most of the time. We like sharing what we have built with others, and this
    enables us to learn from one another there by advancing each other''s skills.


    In addition, programming teaches you to never give up easily, because your programs
    will never work out the first time you write them. You will get errors from time
    to time but as a programmer you don''t let them bring you down. You pick yourself
    up when you fall and try again.


    Finally, you feel comfortable in this digital world where computers run almost
    everything. To you it will not be magic as you know how to use computers to do
    your tasks.


    At the end of the day even if you don''t become a programmer, you will be able
    to know how computers can help you out in your work and gain all these skills.


    ## Setting Up the Workspace


    In order to write code, you need at least a text editor and a compiler.'
