    下面是画布尺寸相对于常规计算机显示器屏幕的绘图。绿色尺寸是计算机屏幕的大小，黑色尺寸是画布的大小。只能在画布上绘图，而不能在屏幕的其余部分绘图。


    ![](img/443990a0ec620659ce8be783c0758bc6_361_1.png)


    ## 在画布上创建圆形


    在JavaScript中，创建一个圆需要5个步骤。这就是我们在下面代码中所做的。


    第一步是使用 document.getElementById 将HTML元素转换为JavaScript变量。然后使用 getContext(“2d”) 将其转换为2D绘图元素变量。在下面的例子中，变量
    c2x 是绘图元素。


    我们可以使用 **beginPath()** 开始JavaScript中的任何绘图，然后使用 **clearRect** 清除画布。以下是 **clearRect**
    的工作原理，如下面的例子所示：


    **clearRect(a,b,c,d)** 意味着矩形的左上角从x坐标 **a** 和y坐标 **b** 开始；它的宽度为 **c**，高度为 **d**。因此，我们从
    **(a,b)** 开始，清除宽度为c、高度为d的画布。在下面的例子中，我们从 **(0,0)** 开始，清除整个宽度为 **500** 像素、高度为 **500**
    像素的画布。这使得整个画布变为空白，准备绘图。


    接下来，我们使用arc函数绘制圆形。那么，让我们看看它是如何工作的：


