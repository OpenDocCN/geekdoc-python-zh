  md: '# # KeyPress and Mouse Click Event


    # ## What does a KeyPress Element Do?


    A KeyPress element detects when a certain event happens on the keyboard. The action
    of typing a key is called an event. A KeyPress Element is part of jQuery. jQuery
    is a JavaScript library used to handle events, animations etc. Below is a simple
    example of a keypress element.


    # ## KeyPress Example 1


    Before we start the program, we upload the jQuery library on to the program using
    below code:


    ```

    <script src="https://code.jquery.com/jquery-2.1.0.js"></script>

    ```


    In Javascript, we create a variable called **keyc** which contains all the keycodes.
    The keycodes are numbers assigned to every event that occurs when we type on the
    keyboard. For example, 32 is the keycode for the event of pressing the spacebar.
    To get a list of all the event keycodes, we can check them on the link below:

    [https://keycode.info/](https://keycode.info/)

    We include only 8 keycodes shown in the program; as this is just a test program.
    Feel free to include more if you want to. Then we have the below code that runs
    the function **press(event)** when a key is pressed.

    **$(“body”).keydown(press)**

    Inside the function, we use **keyc[event.keycode]** to access the event that happened
    when we pressed the button. See some examples below for the output.'
