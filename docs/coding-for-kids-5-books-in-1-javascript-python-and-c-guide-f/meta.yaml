    \n\n\npygame.quit()\n```\n\n```\npython\n# Draw the ball at x_ball, y_ball\ndef\
    \ ball():\n    pygame.draw.circle(screen, red, (x_ball, y_ball), 10, 10)\n\n#\
    \ draw paddle at x, y\ndef paddle(x,y):\n    pygame.draw.rect(screen, black, (x,\
    \ y, 80, 10))\n\n# move ball by a step\ndef move_ball():\n    global x_ball, y_ball,\
    \ horizontal_direction, vertical_direction\n    # if ball is going to left decrement\
