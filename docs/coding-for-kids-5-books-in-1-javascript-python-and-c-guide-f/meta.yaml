    然而，几个月后，罗布遇到了困难。他开始感到疲倦和无聊。他一遍又一遍地做着类似的程序。他在更高级的主题上挣扎。罗布的故事与美国和世界各地成千上万的孩子们的故事相似。这些孩子有资源和金钱可以继续前进。他们中的一些父母花了一个月的工资（有时甚至更多）给孩子买一台用于编程的笔记本电脑。然而，父母和他们的孩子都意识到他们需要更多才能继续前进。有些东西缺失了。有些东西很难量化。


    罗布和其他人的故事激励我写下这本 JavaScript 书。虽然罗布看起来似乎在挣扎，但他应该为自己的努力受到赞扬。我们太多人在一看到困难时就放弃了。我们像玩毛线球的小猫一样，从一个活动转到另一个活动。事实是，任何活动没有一点努力和痛苦都无法前进。罗布只需要多一点点，而这就包含在这本书里。


    本书从一些基础知识开始，以确保你拥有继续前进所需的基本知识。我们将讨论设置你的工作空间以及进行基本的编程和测试。然而，本书确实非常强调编码游戏、活动和谜题。这些旨在培养对编程所能实现之事的更深热爱。我们意识到这类编码游戏对学习的重要性'
