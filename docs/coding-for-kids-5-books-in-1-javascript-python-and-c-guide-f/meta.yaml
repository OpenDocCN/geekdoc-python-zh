- md: "## Having Fun with Strings\n\nA string is an array of characters, i.e. ‘Hello’\
    \ can be represented as [‘H’,’e’,’l’,’l’,’o’]. Therefore we can use all the previously\
    \ discussed array functions on strings as well.\n\n```python\nstring = \"Hello\"\
    \n\nfor character in string:\n    print(character)\n```\n\nBelow is the output\n\
    \n```\nH\ne\nl\nl\no\n>>>\n```\n\nBelow are a few functions that are helpful while\
    \ dealing with strings.\n\n## Split\n\nThe .split() function takes in a value\
    \ and splits the string using the value as a separator into an array of smaller\
    \ strings.\n\n```python\n>>> s = \"Python is cool\"\n>>> s.split(' ')\n['Python',\
    \ 'is', 'cool']\n>>> s = 'a,b,c,d,e,f,g'\n>>> s.split(',')\n['a', 'b', 'c', 'd',\
    \ 'e', 'f', 'g']\n>>>\n```\n\nIn the first instance, we split the string using\
    \ space as a separator and in the second instance we split the string using a\
    \ comma as a separator.\n\n## Is functions\n\n- **isalnum()** - Returns True if\
    \ all characters in the string are alphanumeric\n- **isalpha()** - Returns True\
    \ if all characters in the string are in the alphabet\n- **islower()** - Returns\
    \ True if all characters in the string are lower case\n- **isnumeric()** - Returns\
