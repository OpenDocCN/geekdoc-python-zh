    \n## 游戏 3 – 带随机数的数学测验\n\n在下面的程序中，有5个由10个随机数生成的数学问题。这10个随机数是变量**number1-number10**。问题的答案被计算并存储在变量**answer1-answer5**中。这15个变量被称为全局变量，因为它们位于任何函数之外。这意味着它们的值可以在程序中的任何地方被任何函数访问。\n\
