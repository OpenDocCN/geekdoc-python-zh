    it can understand, i.e. machine language. Machine Language. Machine Language consists
    of 0s and 1s. Below is an example of Machine Language:


    ```

    10011 00011 110001 1001010101 100001 001 0111 0000 11111 11010101

    ```


    Although the computer might find it easy to read, we humans do not. Therefore,
    to make instructions readable and easier to understand, we use Programming Languages.
    We write the instructions for the computer in a programming language, and it is
    converted to machine language which can be understood by the computer.


