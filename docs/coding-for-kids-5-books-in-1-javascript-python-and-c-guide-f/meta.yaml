    # Example 3 – Guess World Capitals


    In this program, we code a quiz that asks the user the capital of a random country
    around the world, and checks if the answer is correct.

    In the program, the one button runs the **worldquiz()** function. In the function,
    we declare two arrays. One array contains all the countries around the world;
    and the other contains all the capitals.

    You can get the values for these arrays below:

    [https://drive.google.com/file/d/1Vbnrllk290oVmh3Vn8Jv2EgFBL1w8vSd/view?usp=sharing](https://drive.google.com/file/d/1Vbnrllk290oVmh3Vn8Jv2EgFBL1w8vSd/view?usp=sharing)

    We then chose a random number between 0 and x, x being the length of the array.
    This random number picks a random country from the array. We do this using **Math.random()**
    and **Math.floor()**.

    We take in a user guess for the capital using **prompt**. We compare the user
    guess to the actual capital. Then, we send the user a message telling them they’re
    correct or wrong (with the correct capital if they’re wrong).

    Then, the user has the chance to restart the program with the **Home** button
    that runs the **redirect()** function. The redirect function runs ‘**GuessWorldCapitals.html**’
    which is the name of the file. The code and the outputs are shown below.'
