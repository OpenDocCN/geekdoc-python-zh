    survey done by Tech Republic, only 8% of teachers felt reasonably confident to
    teach children programming. 50% of kids in America do not have access to the internet
    at home. The statistics are even worse for girls and children of color in America;
    who have less resources and role models to look up to.


    So, you need to take to take this into your own hands.


    # What Not To Do


    You might be wondering what you need to do to get started. There’s a couple of
    things I advise against doing. I would advise against hiring a programmer who
    has no experience in'
  - '[PAGE 116]


    teaching kids. They are experts in the topic; but it’s been decades since they
    started programming; so, they can’t relate to a kid who hasn’t learnt programming
    before and who’s learning basic Mathematics. The next thing to avoid is to search
    for the latest textbook on JavaScript; and read it out for your kid. These are
    as useful for learning programming; as a dictionary is for learning a language.
    They are expensive, and more useful as a reference tool for existing programmers.
    I also recommend against coding camps. These can work for a minority of students;
    but most students get lost in the large group of kids that are learning. One to
    one attention is the best way to get going.


    # First Steps to Get Started


    This book is the best way to get started. I’ve broken down programming into a
    series of basic chapters; and relate it to the real world. The first chapter will
    help you set up your JavaScript and html files for you to get started.


    I also have code for every chapter that you can copy and paste to get working.
    Every aspect of the code is well explained; and I have exercises that you can
    complete yourself with the concepts in the chapter.


    I also have a recommended one on one tutor at the end of the book; and additional
    books you can use to build on your knowledge.'
