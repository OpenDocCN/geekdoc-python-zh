  md: '# Tuples


    Tuples are similar to lists as they also store collection of items. In facts tuple
    can be considered immutable lists. Tuples are immutable, once assigned, they can’t
    change. This makes them more efficient and faster. Tuples are defined using parentheses
    whereas lists are defines using square brackets.

    To create a tuple, put comma separated value in parentheses.


    ```

    my_tuple = (1,3,5)

    ```


    For a single value tuple follow the value with a comma. Without a comma python
    considers it a number.


    ```

    my_tuple = (1,)

    ```


    In this snippet we create tuples and try to modify its value, however python throws
    type error because tuples are immutable.'
