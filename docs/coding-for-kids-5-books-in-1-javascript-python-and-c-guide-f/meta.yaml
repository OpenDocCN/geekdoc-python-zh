    \ everyone involved. There is also a very important section on the softer side\
    \ of programming. This chapter talks about how to improve your coding through\
    \ self-discovery, teamwork, self-discipline and healthy habits. These are the\
    \ soft skills that would really help Rob move forward in programming.\n\n## Soft\
    \ Skills of Coding\n\nMy experiences with teaching kids coding, and also from\
    \ hearing from Rob have convinced me that soft skills are just as important as\
    \ technical knowledge in coding. These soft skills also help you with all other\
    \ aspects of life moving forward. So, it’s a win-win all the way around.\n\nSo,\
    \ what exactly are soft skills? Soft skills relate more to how people work. This\
    \ is different from hard technical skills which focus on what people work on.\
    \ Soft skills relate to how people deal with mental, physical and interpersonal\
    \ problems. In combination with good technical knowledge, soft skills can take\
    \ your performance to a higher level. Here are some of the skills that I am talking\
    \ about:\n\n1.  **Focus and Concentration:** Ability to focus on a single task\
    \ at hand is a tough skill to master in a world dominated by social media and\
    \ other distractions. Multi-tasking may seem cool; but in the long run it takes\
    \ away from quality work and quality education.\n    a. A new tool to help you\
    \ focus is something called isochronic tones. This is specific music that gets\
    \ your mind in the right frame and helps you focus. You can check out these tones\
    \ for free by searching ‘isochronic tones’ on Youtube or Google.\n    b. Another\
    \ tool is daily meditation. Meditation for 5 minutes at the start of the day can\
    \ help you build focus over time.\n    c. And finally, breaking your work down\
    \ into periods of 20-30 minutes can make a big difference. Take a 5-10 minute\
    \ walk between each session and come back refreshed.\n\n2.  **Perseverance**:\
    \ The ability to persist and learn from failures is very important in coding.\
    \ It’s common practice among programmers to try to break the code (or make the\
    \ code fail) so they can learn the weak points in a program, and make it improve.\
    \ You can do the same for your program and for your programming skill.\n\n3. \
    \ **Teamwork**: Going at coding alone is necessary when starting off; but will\
    \ hold you back in the long run. You can learn a lot faster from the mistakes\
    \ of others; than from your own mistakes. You can join a local programming club\
    \ in your own city; hire a programming tutor; join relevant facebook coding groups;\
    \ post on redditt threads and learn from Github code. It’s important to be active\
    \ on these groups and recognized as a positive contributor.\n\n4.  **Physical\
    \ Health**: This is a very underrated and undervalued trait by many programmers.\
    \ But in the long run, it really hurts people in the industry. Back problems,\
    \ obesity, carpal tunnel syndrome are common health issues that programmers encounter\
    \ after working in the industry for 5-10 years or more. Here’s a few ways to take\
    \ better care of your health.\n    a. Maintain a good sitting posture: Sit upright.\
    \ Make sure your laptop is close to eye level, so you don’t have to bend your\
    \ neck down. Make sure your feet are in line with your knees.\n    b. Take frequent\
    \ breaks: I recommend taking breaks every 20-30 minutes. Take a walk in between\
    \ periods.\n    c. Diet: Maintain a healthy diet high in good fats, protein and\
    \ complex carbs. Minimize simple carbs and sugar.\n    d. Exercise: Maintain a\
    \ regular exercise regime or play a sport. It’s important to exercise at least\
    \ 3-4 times a week (maybe more).\n    e. Sleep: Get at least 7-8 hours of sleep\
    \ every night. If you’re unable to sleep, ask a qualified doctor how you can improve\
    \ your sleep.\n\nOne can write entire books on each of the above topics; but this\
    \ is a coding book, so I will leave it there. Just remember that the above soft\
    \ skills are very important and you can work on them while you are coding as well.\n\
    \n## Setting Up Your Workspace\n\n### What You Need\n\nYou need a laptop/desktop\
    \ with an internet connection, and a web browser installed. I recommend using\
    \ Mozilla Firefox or Google Chrome.\n\n### Download/Install Text Editing software\n\
    \nDownload the latest version of a text editing software. I recommend downloading\
    \ NotePad++. Once you download, double click the Setup.exe file and follow the\
    \ installation prompts.\n[https://notepad-plus-plus.org/downloads/](https://notepad-plus-plus.org/downloads/)\n\
    \n### Start using NotePad++\n\nOpen Notepad++ from your Desktop or Start Menu\n\
    \n![](img/443990a0ec620659ce8be783c0758bc6_229_0.png)\n\nNow, click **File>New**\
    \ to open a New File.\n\n![](img/443990a0ec620659ce8be783c0758bc6_230_0.png)\n\
    \n![](img/443990a0ec620659ce8be783c0758bc6_230_1.png)\n\nNow, choose **File>Save**\
    \ As and choose **.html** as the file type\n\n![](img/443990a0ec620659ce8be783c0758bc6_231_0.png)\n\
    \n![](img/443990a0ec620659ce8be783c0758bc6_231_1.png)\n\n### Test Program\n\n\
    Now, let’s test if the program connects with the browser.\nJust type in random\
    \ text in your file. In my file, I’ve typed “**This is a Test Message.**”\nNow\
    \ **File>Save.**\nAfter that, click **Run>Launch in Firefox/Chrome/IE** depending\
    \ on which browser you are using.\nIf it is working, the text that you typed in\
    \ should show in the browser window.\n\n![](img/443990a0ec620659ce8be783c0758bc6_232_0.png)\n\
    \n![](img/443990a0ec620659ce8be783c0758bc6_233_0.png)\n\n![](img/443990a0ec620659ce8be783c0758bc6_233_1.png)\n\
    \nResult:\n\n![](img/443990a0ec620659ce8be783c0758bc6_234_0.png)\n\nThis is a\
    \ great simple way to ensure that your program is working before moving forward.\n\
    \n**Aside:**\nOne issue that some students have encountered is that the run browser\
    \ option sometimes does not work and gives an error. This is because the path\
    \ is not set right. If, for some reason, it doesn’t work, you can still run the\
    \ program.\n\n1.  Just save the Notepad++ as a html document.\n2.  Close the Notepad++\
    \ file.\n3.  Go the folder where the html document is.\n4.  Double click on the\
    \ html file and it should work.\n\n### What is html?\n\nhtml stands for Hyper\
    \ Text Markup Language.\nIt is the programming language that we use to interact\
    \ with the internet through web pages. The basic structure of all web pages is\
    \ defined by html.\nIt is simple enough for beginner programmers to grasp quickly.\n\
    Most html programming is done by items called tags. These tags start with <>\n\
    And end with </>. For example, a common tag is the paragraph tag which begins\
    \ with <p> and ends with </p>.\n\n### Common html Tags\n\n-   `<html>` - This\
    \ tag is used at the start of every webpage to denote the start of html code\n\
    -   `<head>` - This piece of html code is executed before the rest of the program\n\
    -   `<title>` - This tag is used the title the web page. It writes the text on\
    \ to the top ribbon of the webpage.\n-   `<body>` - This is the information on\
    \ the body of the web page.\n-   `<h1>` - Used to denote a heading tag. This is\
    \ the largest size heading tag.\n-   `<h2>`, `<h3>`, `<h4>`, `<h5>`, `<h6>` -\
    \ Used to denote subheadings of decreasing size.\n-   `<p>` - Used to denote paragraphs\
    \ of text\n-   `<img>` - This shows an image on the web page. This image either\
    \ links to an external web page or to an internal file.\n-   `<strong>` - Added\
    \ to make text bold\n-   `<ul>` - This is for an unordered list. An example of\
    \ this would be a list of items in bullet form.\n-   `<li>` - Adds a bullet item\
    \ to an unordered list.\n-   `<ol>` - This is for ordered lists such as numbered\
    \ lists from 1,2,3....\n-   `<div>` - Used to denote larger sections of text;\
    \ that contain several paragraphs..\n-   `<a>` - Used to link items in a web page\
    \ to another web page.\n-   `<br>` - Adds a line break to the code and moves to\
    \ the next line.\n\n### Example of html code\n\nBelow is an example of basic html\
    \ code. It has examples of all the above html codes. You can type these out or\
    \ copy paste the example below that.\n\n![](img/443990a0ec620659ce8be783c0758bc6_237_0.png)\n\
    \n### Copy Paste Version of html code\n\nYou can copy and paste below code into\
    \ your html browser to see if it works\n\n```html\n<html>\n<head>\n<title>My first\
    \ html website......</title>\n</head>\n<body>\n<h1>Welcome to Programming in Javascript\
    \ (this is a h1 tag)</h1>\n<h2>Let's get started (this is a h2 tag)</h2>\n<h3>This\
    \ is the start of bigger things (this is a h3 tag)</h3>\n<p>We're going over a\
    \ few basic html tags here but you can feel free to play around them and experiment.\n\
    There are 1000's of html tags that you can learn in the long run. Here's a list\
    \ of topics you can learn below (This is a paragraph tag)</p>\n<ul> Below is the\
    \ example of an unordered bulleted list\n<li>Basics of html</li>\n```"
  mdcn: "这个过程充满了乐趣和好奇心，对所有参与者来说都非常令人兴奋。书中还有一个非常重要的部分，探讨了编程的“软技能”方面。这一章讲述了如何通过自我发现、团队合作、自律和健康习惯来提升你的编程能力。这些软技能将真正帮助罗布在编程道路上取得进步。\n\
    \n## 编程的软技能\n\n我教孩子们编程的经验，以及从罗布那里听到的，都让我确信软技能在编程中与技术知识同等重要。这些软技能也能帮助你在生活的其他方面不断前进。所以，这完全是双赢的。\n\
    \n那么，软技能到底是什么？软技能更多地与人们如何工作有关。这不同于专注于人们工作内容的硬技术技能。软技能涉及人们如何处理心理、身体和人际问题。结合良好的技术知识，软技能可以将你的表现提升到更高的水平。以下是我所说的一些技能：\n\
    \n1.  **专注力：** 在一个被社交媒体和其他干扰主导的世界里，专注于手头单一任务的能力是一项难以掌握的技能。多任务处理可能看起来很酷；但从长远来看，它会损害工作质量和教育质量。\n\
    \    a. 一个帮助你专注的新工具叫做等时音。这是一种特定的音乐，能让你的大脑进入正确的状态并帮助你集中注意力。你可以在Youtube或Google上搜索“等时音”免费试听这些音调。\n\
    \    b. 另一个工具是每日冥想。每天开始时冥想5分钟，随着时间的推移可以帮助你建立专注力。\n    c. 最后，将你的工作分解成20-30分钟的时间段会产生很大的不同。在每个时间段之间散步5-10分钟，然后精神焕发地回来。\n\
    \n2.  **毅力：** 在编程中，坚持并从失败中学习的能力非常重要。程序员的常见做法是尝试破坏代码（或让代码失败），以便他们可以了解程序的薄弱点并加以改进。你可以对你的程序和你的编程技能做同样的事情。\n\
    \n3.  **团队合作：** 单打独斗在开始时是必要的；但从长远来看会限制你的发展。从别人的错误中学习比从自己的错误中学习要快得多。你可以加入你所在城市的本地编程俱乐部；聘请编程导师；加入相关的Facebook编程小组；在Reddit帖子上发帖并向Github代码学习。在这些小组中保持活跃并被视为积极的贡献者很重要。\n\
    \n4.  **身体健康：** 这是许多程序员非常低估和不重视的特质。但从长远来看，它确实会伤害到这个行业的人。背部问题、肥胖、腕管综合征是程序员在行业工作5-10年或更长时间后常见的健康问题。以下是一些更好地照顾你健康的方法。\n\
    \    a. 保持良好的坐姿：坐直。确保你的笔记本电脑接近眼睛高度，这样你就不用低头。确保你的脚与膝盖在一条直线上。\n    b. 经常休息：我建议每20-30分钟休息一下。在时间段之间散步。\n\
    \    c. 饮食：保持健康的饮食，富含优质脂肪、蛋白质和复合碳水化合物。尽量减少简单碳水化合物和糖的摄入。\n    d. 锻炼：保持规律的锻炼计划或进行体育运动。每周至少锻炼3-4次（可能更多）很重要。\n\
    \    e. 睡眠：每晚至少保证7-8小时的睡眠。如果你无法入睡，请咨询合格的医生如何改善睡眠。\n\n关于以上每个主题都可以写成整本书；但这是一本编程书，所以我就不展开了。请记住，上述软技能非常重要，你可以在编程的同时努力提升它们。\n\
    \n## 设置你的工作空间\n\n### 你需要什么\n\n你需要一台连接互联网并安装了网络浏览器的笔记本电脑/台式机。我推荐使用Mozilla Firefox或Google\
    \ Chrome。\n\n### 下载/安装文本编辑软件\n\n下载最新版本的文本编辑软件。我推荐下载Notepad++。下载后，双击Setup.exe文件并按照安装提示操作。\n\
    [https://notepad-plus-plus.org/downloads/](https://notepad-plus-plus.org/downloads/)\n\
    \n### 开始使用Notepad++\n\n从你的桌面或开始菜单打开Notepad++\n\n![](img/443990a0ec620659ce8be783c0758bc6_229_0.png)\n\
    \n现在，点击**文件>新建**来打开一个新文件。\n\n![](img/443990a0ec620659ce8be783c0758bc6_230_0.png)\n\
    \n![](img/443990a0ec620659ce8be783c0758bc6_230_1.png)\n\n现在，选择**文件>另存为**，并将文件类型选择为**.html**\n\
    \n![](img/443990a0ec620659ce8be783c0758bc6_231_0.png)\n\n![](img/443990a0ec620659ce8be783c0758bc6_231_1.png)\n\
    \n### 测试程序\n\n现在，让我们测试一下程序是否能与浏览器连接。\n只需在你的文件中输入一些随机文本。在我的文件中，我输入了“**这是一条测试消息。**”\n\
    现在**文件>保存。**\n之后，根据你使用的浏览器，点击**运行>在Firefox/Chrome/IE中启动**。\n如果它正常工作，你输入的文本应该会显示在浏览器窗口中。\n\
    \n![](img/443990a0ec620659ce8be783c0758bc6_232_0.png)\n\n![](img/443990a0ec620659ce8be783c0758bc6_233_0.png)\n\
    \n![](img/443990a0ec620659ce8be783c0758bc6_233_1.png)\n\n结果：\n\n![](img/443990a0ec620659ce8be783c0758bc6_234_0.png)\n\
    \n这是一个很好的简单方法，可以在继续之前确保你的程序正常工作。\n\n**附注：**\n一些学生遇到的问题是，运行浏览器选项有时不起作用并给出错误。这是因为路径设置不正确。如果由于某种原因它不工作，你仍然可以运行程序。\n\
    \n1.  只需将Notepad++保存为html文档。\n2.  关闭Notepad++文件。\n3.  转到html文档所在的文件夹。\n4.  双击html文件，它应该就能工作了。\n\
    \n### 什么是html？\n\nhtml代表超文本标记语言。\n它是我们用来通过网页与互联网交互的编程语言。所有网页的基本结构都是由html定义的。\n\
    它足够简单，初学者程序员可以快速掌握。\n大多数html编程是通过称为标签的项目完成的。这些标签以<>开头\n以</>结尾。例如，一个常见的标签是段落标签，它以<p>开头，以</p>结尾。\n\
    \n### 常见的html标签\n\n-   `<html>` - 此标签用于每个网页的开头，表示html代码的开始\n-   `<head>` - 这段html代码在程序的其余部分之前执行\n\
    -   `<title>` - 此标签用于设置网页标题。它将文本写入网页的顶部标题栏。\n-   `<body>` - 这是网页主体上的信息。\n-   `<h1>`\
    \ - 用于表示标题标签。这是最大尺寸的标题标签。\n-   `<h2>`、`<h3>`、`<h4>`、`<h5>`、`<h6>` - 用于表示尺寸递减的子标题。\n\
    -   `<p>` - 用于表示文本段落\n-   `<img>` - 这在网页上显示一张图片。此图片链接到外部网页或内部文件。\n-   `<strong>`\
    \ - 添加以使文本加粗\n-   `<ul>` - 这用于无序列表。一个例子是项目符号形式的列表。\n-   `<li>` - 向无序列表添加一个项目符号项。\n\
    -   `<ol>` - 这用于有序列表，例如从1,2,3...开始的编号列表。\n-   `<div>` - 用于表示较大的文本部分；包含多个段落。\n\
    -   `<a>` - 用于将网页中的项目链接到另一个网页。\n-   `<br>` - 在代码中添加换行符并移动到下一行。\n\n### html代码示例\n\
    \n下面是基本html代码的一个示例。它包含了上述所有html代码的示例。你可以输入这些代码，或者复制粘贴下面的示例。\n\n![](img/443990a0ec620659ce8be783c0758bc6_237_0.png)\n\
    \n### html代码的复制粘贴版本\n\n你可以复制并粘贴下面的代码到你的html浏览器中，看看它是否有效\n\n```html\n<html>\n<head>\n\
    <title>My first html website......</title>\n</head>\n<body>\n<h1>Welcome to Programming\
    \ in Javascript (this is a h1 tag)</h1>\n<h2>Let's get started (this is a h2 tag)</h2>\n\
    <h3>This is the start of bigger things (this is a h3 tag)</h3>\n<p>We're going\
    \ over a few basic html tags here but you can feel free to play around them and\
    \ experiment.\nThere are 1000's of html tags that you can learn in the long run.\
    \ Here's a list of topics you can learn below (This is a paragraph tag)</p>\n\
    <ul> Below is the example of an unordered bulleted list\n<li>Basics of html</li>\n\
    ```"
