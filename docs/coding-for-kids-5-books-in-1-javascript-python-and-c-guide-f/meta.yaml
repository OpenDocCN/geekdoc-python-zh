  mdcn: "## upper()、lower()、swapcase()\n\nupper() 将所有字符转换为大写，lower() 将所有字符转换为小写，swapcase()\
    \ 将小写字符转换为大写，大写字符转换为小写。\n\n```\n>>> 'HeLLo'.lower()\n'hello'\n>>> 'HeLLo'.upper()\n\
    'HELLO'\n>>> 'HeLLo'.swapcase()\n'hElLO'\n>>> \n```\n\n## 字符串连接\n\n`+` 运算符可用于连接字符串。\n\
    \n```\n>>> s1 = 'Hello'\n>>> s2 = 'World'\n>>> s1+s2\n'HelloWorld'\n>>> \n```\n\
    \n只能连接两个字符串，不能使用 `+` 运算符连接字符串和整数。但是，你可以使用 `str()` 将整数转换为字符串，然后将其连接到另一个字符串。\n\n\
    ```\n>>> 'Hi' + 2\nTraceback (most recent call last):\n  File \"<pyshell#23>\"\
    , line 1, in <module>\n    'Hi' + 2\nTypeError: can only concatenate str (not\
    \ \"int\") to str\n>>> 'Hi' + str(2)\n'Hi2'\n>>> |\n```\n\n如你所见，'Hi' + 2 会报错，因为\
    \ 2 是一个整数，但使用 `str(2)` 将其转换为字符串后，结果是 'Hi2'。\n\n## join\n\njoin 函数用于从列表创建一个字符串。它接受一个值作为分隔符，并将列表中的所有元素连接起来形成一个字符串。确保列表中的所有元素都是字符串类型或已转换为字符串。\n\
    \n```\n>>> ''.join(['Test' , 'Join' , 'Function' , 'Hello' , 'Wordl'])\n'TestJoinFunctionHelloWordl'\n\
    >>> ' '.join(['Test' , 'Join' , 'Function' , 'Hello' , 'Wordl'])\n'Test Join Function\
    \ Hello Wordl'\n>>> ','.join(['Test' , 'Join' , 'Function' , 'Hello' , 'Wordl'])\n\
    'Test,Join,Function,Hello,Wordl'\n>>> |\n```\n\n在第一种情况下，我们没有传递任何分隔符，它直接连接字符串，中间没有空格或分隔符。在第二种情况下，我们传递了一个空格作为分隔符，因此结果中单词之间有空格。在第三种情况下，我们传递了一个逗号，单词之间用逗号分隔。\n\
    \n## find\n\nfind 函数返回单词在字符串中首次出现的索引。如果未找到该单词，则返回 -1。\n\n```\n>>> \"Hello World\"\
    .find(\"Hello\")\n0\n>>> \"Hello World\".find(\"World\")\n6\n>>> \"Hello World\"\
    .find(\"world\")\n-1\n>>> \"Hello World\".find(\"Python\")\n-1\n>>> |\n```\n\n\
    在第一种情况下，我们尝试在字符串 \"Hello World\" 中查找 \"Hello\"，它返回 0，因为 0 是找到 'Hello' 首次出现的起始索引。同样，在第二种情况下，它返回\
    \ 6，因为 6 是起始索引。请注意，Python 区分大小写，因此当我们尝试搜索 'world' 时，它返回 -1。当我们尝试搜索 'Python' 时，它也返回\
    \ -1，因为它不存在于 'Hello World' 中。\n\n## replace\n\nreplace 函数用于将一个字符串替换为另一个字符串，如下例所示。\n\
    \n```\n>>> \"Hello World\".replace(\"o\" , \"2\")\n'Hell2 W2rld'\n>>> \"Hello\
    \ World\".replace(\"Hello\" ,\"*\")\n'* World'\n>>> |\n```\n\n在第一种情况下，我们将所有出现的字母\
    \ 'o' 替换为 \"2\"，在第二种情况下，我们将 \"Hello\" 替换为 \"*\"。\n\n## 练习\n\n- 1) 编写一个程序，查找一个特定字符串在输入的更大字符串中出现的次数。\n\
