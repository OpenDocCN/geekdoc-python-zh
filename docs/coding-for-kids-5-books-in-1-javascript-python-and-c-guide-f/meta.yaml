- md: "A text editor is just a program that enables you to write and save code as\
    \ a file.\n\nFiles usually have extensions to their file names to indicate the\
    \ kind of file it is. When writing C++ files, the files will have the extension\
    \ .cpp, example main.cpp.\n\nWe are going to use an application known as Code::Blocks\
    \ to write, compile and run our programs. Code::Blocks is what is known as an\
    \ IDE, integrated development environment.\n\nAn IDE has everything you need to\
    \ write, compile and run a program in one place.\n\nBelow is a picture of the\
    \ layout of the Code::Blocks IDE.\n\n![](img/443990a0ec620659ce8be783c0758bc6_13_0.png)\n\
