    Next, let’s talk about rounding numbers. We use the functions `math.ceil()`, `math.floor()`
    and `round()`. `math.ceil()` rounds to the first integer more than the decimal
    number, `math.floor()` rounds to the first integer less than the decimal number
    and `round()` to the nearest integer (whether it’s more or less). Let’s look at
    a sample program.


    ```python

    # import the library

    import math


    xc = math.ceil(5.2)

    yc = math.ceil(7.8)

    zc = math.ceil(4.5)


    xf = math.floor(5.2)

    yf = math.floor(7.8)

    zf = math.floor(4.5)


    xr = round(5.2)

    yr = round(7.8)

    zr = round(4.5)


    print(f"Example of math.ceil()")

    print(f"xc is {xc}")

    print(f"yc is {yc}")

    print(f"zc is {zc}")

    print()

    print(f"Example of math.floor()")

    print(f"xf is {xf}")

    print(f"yf is {yf}")

    print(f"zf is {zf}")

    print()

    print(f"Example of round()")

    print(f"xr is {xr}")

    print(f"yr is {yr}")

    print(f"zr is {zr}")

    ```


