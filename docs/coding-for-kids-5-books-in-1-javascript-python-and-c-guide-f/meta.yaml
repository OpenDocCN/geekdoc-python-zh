    \ by Bob Mather\n\n## 第四册：Python 儿童编程\n\n## 引言\n\n在 21 世纪，我们周围没有任何东西可以离开计算机而工作。计算机无处不在。手机、笔记本电脑、自动取款机，凡是你能想到的，里面都有计算机。此外，还有其他机器内部隐藏着嵌入式计算机。这些包括洗衣机、烘干机、冰箱、汽车、车辆、空调和电梯等物品，它们内部都有某种计算机芯片。我们如何告诉计算机如何工作？是通过编程！编程语言是一种机器可以理解并运行以执行各种任务的语言。这是我们与机器沟通，让它们理解我们想要完成什么的方式。程序是执行任务的逻辑顺序语句。程序可以使用我们想要的任何编程语言编写。它甚至可以是\
    \ 1 和 0，这是计算机唯一能理解的东西。计算机中的一切都是 1 和 0。高级编程语言使用类似英语的语言，这样我们就可以轻松地为计算机编程。最终，任何语言编写的任何程序都会被转换为\
    \ 1 和 0，以便机器能够理解。\n\n技术已经存在于我们的日常生活中，并且正以前所未有的速度增长。所有这些技术都需要被发明、编程和维护！只有通过理解计算机，我们才能做到这一切，并维护和发展技术以取得更大的进步。\n\
