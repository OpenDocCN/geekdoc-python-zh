  md: '# List **methods**


    Similar to the string methods discussed in earlier chapters. Lists comes with
    useful methods to use. We will study frequently used list methods here, to find
    out and learn more methods follow this python documentation link.


    https://docs.python.org/3/tutorial/datastructures.html


    # Basic list operations


    This table summaries basic list operations.


    | Expression | Name | Output |

    | :--- | :--- | :--- |

    | `len([''a'', ''b'', ''1''])` | Length | 3 |

    | `[''a'', ''b'', ''c''] + [''d'', ''e'', ''f'']` | List concatenation | `[''a'',
    ''b'', ''c'', ''d'', ''e'', ''f'']` |

    | `[''Hi!''] * 4` | Repetition | `[''Hi!'', ''Hi!'', ''Hi!'', ''Hi!'']` |

    | `''a'' in [''a'', ''b'', ''c'']` | Membership | True |

    | `for num in [1, 2, 3]: print(num)` | List iteration | 1<br>2<br>3 |

    | `n = [''a'', ''b'', ''c'']<br>n[0] = ''z''<br>print(n)` | List element assignment
    | `[''z'', ''b'', ''c'']` |


    **list[index]** – Indexing operator, selects a single value from a list. The number
    inside the brackets is called index, it is an integer value. Indexing in python
    starts at zero. Similar to strings you can also have negative index where it starts
    indexing backward.'
