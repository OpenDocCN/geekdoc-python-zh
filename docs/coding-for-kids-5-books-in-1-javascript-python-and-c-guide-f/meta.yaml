  md: '# Timer and Animations


    # What is a Timer?


    A timer in Javascript is used to time Javascript code. It allows the user to execute
    different portions of the code at different time intervals. **setTimeOut()** and
    **setTimeInterval()** functions are used to set the timer. **setTimeOut()** allows
    a fixed break before executing a code; **settimeinterval()** allows the code to
    be executed multiple times with a fixed interval between each execution. For example:
    **setTimeOut(a, 1000)** executes the function **a** after **1000 ms (1 second)**.
    **setTimeInterval(a, 1000)** keeps executing the function with a break of **1000
    ms (1 second)** between runs. These functions are the key to running JavaScript
    animations.


    # Timer Example


    In our code, we only use the **setInterval()** function. In the example below,
    we have two buttons that run two separate functions. The first function **writename()**
    prints the name “Bob” on the screen every 2500 ms (or 2.5 seconds). The function
    **fname()** is run using **setinterval(fname, 2500)** and write the name “Bob”.
    The second function runs the function **setcount()** prints numbers starting from
    1 and increments it by 1 each time with a break of 500 ms (0.5 seconds). So, it
    prints 1,2,3,4 and so on with a break of 0.5 seconds between each print.'
  merge: -1
  pgno: 370
- img_proc: true
  md: '```

    html

    <html>

    <head><title>Counting Timer</title>

    </head>

    <body>

    <link rel="stylesheet" href="samplestyle.css" />

    <button class="btn a" onclick="setcount()">Count</button>

    <button class="btn a" onclick="writename()">Write Name</button>


    <script>

    function writename()

    {

    var name="Bob";

    setInterval(fname, 2500);

    function fname()

    {

    document.write(''<link rel="stylesheet" type="text/css" href="samplestyle.css"
    />'');

    document.write(name);

    document.write("<br>");

    }

    }


    function setcount()

    {

    count=0;

    setInterval(timeUp, 500);

    function timeUp()

    {

    document.write(''<link rel="stylesheet" type="text/css" href="samplestyle.css"
    />'');

    count=count+1;

    document.write(count);

    document.write("<br>");

    }

    }

    </script>

    </body>

    </html>

