  - '[PAGE 72]


    To use the **for loop** we specify the number of times we want to run the block
    of code associated with that for loop.


    The block of code associated with the for loop is in between the opening and closing
    curly braces


    ```

    {

    }

    ```


    In our code the associated block of code has only the line: cout << "My name"
    << endl;


    Inside the opening and closing parenthesis associated with the *for* keyword we
    specify three important things separated by two semicolons


    The first is what number to begin counting at, for us, we begin counting from
    1 so we declare the integer variable **i** holding the value 1.


    The second, separated from the first by a semicolon, is the condition that should
    be true in order for the block of code associated with for loop to be executed.
    We usually use comparison operators such as >, <, <=, >= in this section.


    In our case , **i <= 10**, means only run the block of code if the value of the
    variable i is less or equal to 10, otherwise stop the loop and proceed with the
    rest of the program.


    Finally, the third part, separated by a semicolon from the second part, increments
    the count variable, in our case we increment by 1 using the special notation **i++**


    In addition, this increment occurs after the block of code runs


