    # Growing Circle


    We use the **setInterval** and **arc** functions to write a program that expands
    a circle. A button when clicked runs the growing square function. In the growing
    square functions, we do a **setinterval** where we run the function **frame()**
    every 50 ms (0.05 seconds). We declare a variable size to 10 pixels. **Size**
    contains the radius of the circle.

    In the function frame, we first clear the entire canvas using **clearRect()**.
    Then we draw a circle starting at the center of (250,250) of radius ‘**size**’.
    **Size** is increased by 5 every time the loop is executed. Once size is greater
    than the 350, it is set back to 10. This ensures that once the circle is larger
    than the canvas, it restarts growing from a small size.


    ```html

    <html>

    <head><title>Growing Circle</title>

    </head>

    <body>

    <canvas id="myCanvas" width="500" height="500" style="border:2px solid"></canvas><br>

    <button class="btn a" onclick="growingcircle()">Circle</button>

    <script>

    function growingcircle()

    {

    var c = document.getElementById("myCanvas");

    var ctx = c.getContext("2d");

    setInterval(frame, 50);

    size=10;

    function frame()

    {

    //Circle

    if (size>350)

    {

    size=10;

    }

    ctx.beginPath();

    ctx.clearRect(0, 0, 500, 500);

    ctx.arc(250,250,size,0,2*Math.PI);

    ctx.fillStyle = "blue";

    ctx.stroke();

    ctx.fill();

