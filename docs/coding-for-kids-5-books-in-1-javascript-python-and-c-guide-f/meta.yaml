    The above code works if you have 3 animals as input. You might ask if there’s
    a code that can work for more than 3 animals. Yes, it can. You need to find the
    length of the string array using length function and then use a FOR loop when
    printing the animals. In the forloop, we use aninumber to keep track of the animal
    count; and aniarray[i] to keep track of the actual animals to print.

    Note that aninumber is always 1 more than i, because i starts from 0 in a JavaScript
    array.

    Here’s the code below:


    ```

    <html>

    <head><title>Splitting Strings</title></head>

    <body>

    <form id="form1">

