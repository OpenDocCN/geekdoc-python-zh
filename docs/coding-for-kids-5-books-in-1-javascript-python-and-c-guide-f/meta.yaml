    \ y\n\n    # 如果触碰到右边界或左边界，则使水平步长取反\n    if x > 480 or x < 20:\n        stepx =\
    \ -1 * stepx\n\n    # 如果触碰到上边界或下边界，则使垂直步长取反\n    if y > 480 or y < 20:\n     \
    \   stepy = -1 * stepy\n\n    # 更新 x 和 y\n    x += stepx\n    y += stepy\n\n#\
