    In the below example, we use the timer and ball functions to move the ball in
    4 different directions using 4 buttons. Each button runs the function that moves
    the ball in a particular direction.

    For example, if we press down, it moves the ball down using the **MoveDown()**
    function. Once the ball reaches the bottom of the canvas, it restarts from the
    top again.

    In each of the functions, we set a position variable to indicate starting point
    of the ball. In MoveUp() and MoveDown() we set the y position to 500 and 0 respectively.
    Using the setInterval function we increase/decrease the position variable by 5
    pixels to move the ball every 50 ms (0.05 seconds).

    And, we use the IF function to check if the ball has reached the end of the canvas,
    and set it back to the original function.'
