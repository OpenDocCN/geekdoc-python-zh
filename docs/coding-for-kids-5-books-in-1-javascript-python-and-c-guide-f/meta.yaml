- md: "## Code Output\n\n![](img/443990a0ec620659ce8be783c0758bc6_238_0.png)\n\nNow,\
    \ let’s break down the different elements:\nBelow is the title tag `<title>`\n\
    \nBelow are the heading tags `<h1>`, `<h2>`, `<h3>`\n\n![](img/443990a0ec620659ce8be783c0758bc6_239_0.png)\n\
    \nBelow is the paragraph tag `<p>`\n\n![](img/443990a0ec620659ce8be783c0758bc6_239_1.png)\n\
    \nBelow is an unordered bulleted list `<ul>` `<li>`\n\n![](img/443990a0ec620659ce8be783c0758bc6_239_2.png)\n\
    \nBelow are 3 hyperlink tags to 3 popular websites `<a href>`\n\n![](img/443990a0ec620659ce8be783c0758bc6_239_3.png)\n\
    \n## Practice Problems\n\n1.  Make a website with a title tag that has a list\
    \ of grocery items in an unordered list. Use a paragraph tag to indicate any special\
    \ instructions you may have for particular items. At the end of the list, use\
    \ a hyperlink tag to link to the website of the closest grocery store.\n2.  Create\
    \ a website with a list of all the players on your soccer team. Use a title, heading\
    \ and paragraph tag to welcome users to your website and describe the team and\
    \ the philosophy of the team. Use an ordered list to list the players.\n3.  Make\
    \ a website that lists all your favorite restaurants and coffee shops in your\
    \ area in an unordered list. Use a title, heading and paragraph tag to introduce\
    \ yourself and the dining experience in your area.\n\n## Sample html Program\n\
    \n## What This Project Does\n\nThis html project creates two buttons. These two\
    \ buttons switch between two images of Day and Night. The two buttons are labelled\
    \ ‘Day’ and ‘Night’\nThis is a simple html project that creates a button that\
    \ can switch a light bulb on the page on/off. We are going to use two bulb images\
    \ to make this happen. The button will switch between the two images.\n\n## Concepts\
    \ to Understand for this Chapter\n\nWe’ll need to understand button tags and image\
    \ tags for this example.\n\n**Button Tag**\n`<button onclick=**Action** >**Button\
    \ text**</button>`\nThe button element has two elements. An Action and Button\
    \ Text. The Button Text is the text that shows on the button; and the Action is\
    \ what happens when the user clicks on the button\n\n**Image Tag**\n`<img id=**ImageId**\
    \ src=**ImageUrl** style=**ImageSize**>`\nThe Image Tag has three elements.\n\
    The **ImageId** is the name you assign to the image. This name is used to reference\
    \ the image in the code.\n**Imageurl** is the url of the image that the tag is\
    \ referencing. If the image is in the same folder as the html file, then you can\
    \ use the file name only instead of the entire url.\n**ImageSize** sets the width\
    \ and height of the Image. The width and height are in pixels.\n\n## Files\n\n\
    Here are the two files that you need to use for the next project. You can download\
    \ these and save it in the same folder that you are going to create the html file.\n\
    [Day Picture](Day Picture)\n[Night Picture](Night Picture)\n\n## Code\n\n```html\n\
    <html>\n<body>\n\n<h2>Day and Night Buttons</h2>\n\n<button onclick=\"document.getElementById('myImage').src='DayImage.jpg'\"\
    >Day</button>\n\n<img id=\"myImage\" src=\"DayImage.jpg\" style=\"width:200px\"\
    >\n\n<button onclick=\"document.getElementById('myImage').src='NightImage.jpg'\"\
    >Night</button>\n\n</body>\n</html>\n```\n\n## Output\n\nInitially, the default\
    \ is set to Day Image.\n\n### Day and Night Buttons\n\n![](img/443990a0ec620659ce8be783c0758bc6_243_0.png)\n\
    \nOnce, you click the **Night** button, you get:\n\n### Day and Night Buttons\n\
    \n![](img/443990a0ec620659ce8be783c0758bc6_244_0.png)\n\nDay Night\n\nThen, when\
    \ you click **Day** button again, you get:\n\n### Day and Night Buttons\n\n![](img/443990a0ec620659ce8be783c0758bc6_244_1.png)\n\
    \nDay Night\n\n## Code Explained\n\n```html\n<img id=\"myImage\" src=\"DayImage.jpg\"\
    \ style=\"width:200px\">\n```\n\nThe above html element is an image tag. It has\
    \ 3 elements; id, src and style. id is a label for the image. In this case, it\
    \ is labelled as “myImage”. The id is used to reference the image throughout the\
    \ program. src is the source of the image the tag loads. The image “DayImage.jpg”\
    \ is in the same folder as the html file.\n\n```html\n<button onclick=\"document.getElementById('myImage').src='DayImage.jpg'\"\
    >Day</button>\n```\n\nThe above element is a button element. It has a parameter\
    \ called **onclick** which describes what action is done when clicking the button.\
    \ document.getElementById obtains the element with id ‘myImage’. So it displays\
    \ ‘DayImage.jpg’ on ‘myImage’ when you click the button. ‘Day’ is the text written\
    \ on the button.\n\n```html\n<button onclick=\"document.getElementById('myImage').src='NightImage.jpg'\"\
    >Night</button>\n```\n\ndocument.getElementById obtains the element with id ‘myImage’.\
    \ So, it displays ‘NightImage.jpg’ on ‘MyImage’ when the button is clicked. ‘Night’\
    \ is the text written on the button.\n\n## Practice Problems\n\n1.  Find 3 images\
    \ of a person running, walking and standing still. Write a program with 3 buttons\
    \ where the person runs, walks or stands till based on the button your press.\n\
    2.  Find 3 images of a traffic light with red, green and orange light on. Write\
    \ a program with 3 buttons that say ‘STOP’, ‘GO’ and ‘WATCH’. The traffic light\
    \ switches to red when ‘STOP’ button is pressed; switches to green when ‘GO’ button\
    \ is pressed; and to yellow when ‘WATCH’ button is pressed.\n\n## html forms\n\
    \nRemember those forms you see online where you enter your name and age and date\
    \ of birth? Those are html forms.\nToday, we’re going to learn how to make those.\n\
    Before we start making forms, we need to learn about a few basic form elements:\n\
    **Button `<button>`** - It is an element that allows the user to perform an action\
    \ when clicked.\n**Textbox `<input>`** - This element allows the user to type\
    \ text into a box on the browser screen. It’s used to collect small text items\
    \ like name, city etc.\n**Textarea `<textarea>`** - This allows the user to input\
    \ larger quantities of text. It is bigger in size than the textbox. It’s used\
    \ for larger text items like address, comments etc.\n**Option Select `<select>`**\
    \ - This element allows the user to select between several available options.\
    \ It’s basically a drop-down box.\n**Date Input `<input type=”date”>`** - This\
    \ elements allows the user to choose a date from a calendar drop down.\nNow, let’s\
    \ go through each of these examples through a sample form below.\n\n## Sample\
    \ Form\n\n```html\n<html>\n<head><title>Sample Form</title></head>\n<body>\n<form\
    \ id=\"form1\">\nEnter First Name:<input name=\"frstname\" type=\"text\" id=\"\
    frstname\" size=\"20\"><br>\nEnter Last Name:<input name=\"lname\" type=\"text\"\
    \ id=\"lname\" size=\"20\"><br><br>\nEnter Address: <textarea name=\"TextBox\"\
    \ cols=\"40\" rows=\"5\" id=\"tstr2\"></textarea><br><br>\nEnter Country: <select\
    \ id=\"country\" name=\"country\">\n<option value=\"USA\">USA</option>\n<option\
    \ value=\"Mexico\">Mexico</option>\n<option value=\"Canada\">Canada</option>\n\
    <option value=\"Australia\">Australia</option>\n</select><br>\nDate of Birth:\
    \ <input type=\"date\" id=\"start\" name=\"trip-start\"\nvalue=\"2020-07-22\"\n\
    min=\"1918-01-01\" max=\"2020-06-31\"><br>\n<button onclick=\"\">Submit</button>\n\
    </form>\n</body>\n</html>\n```\n\nNow, let’s go through each part of the code.\n\
    \n```html\n<form id=\"form1\">\n```\n\nEach form starts with the `<form>` html\
    \ element. The id “form1” is the name that you give the form. The id is used to\
    \ reference the form in the rest of the program.\n\n```html\nEnter First Name:<input\
    \ name=\"frstname\" type=\"text\" id=\"frstname\" size=\"20\"><br>\nEnter Last\
    \ Name:<input name=\"lname\" type=\"text\" id=\"lname\" size=\"20\"><br><br>\n\
    ```\n\nThe above 2 lines are textboxes for first and last name. The type is assigned\
    \ to “text” because name is a form of text. The id “frstname” and “lname” will\
    \ be used to reference the code if we need to later. The size is set to “20” which\
    \ means it can accept 20 characters. You can change it to a larger or shorter\
    \ size as needed.\n\n```html\nEnter Address: <textarea name=\"TextBox\" cols=\"\
    40\" rows=\"5\" id=\"tstr2\"></textarea><br><br>\n```\n\nThe above element is\
    \ a textarea element for the address. It has 5 rows (rows=”5”) and 40 characters\
    \ per row (cols=”40”). It is labelled as “tstr2”.\n\n```html\nEnter Country: <select\
    \ id=\"country\" name=\"country\">\n    <option value=\"USA\">USA</option>\n \
    \   <option value=\"Mexico\">Mexico</option>\n    <option value=\"Canada\">Canada</option>\n\
    \    <option value=\"Australia\">Australia</option>\n</select><br>\n```\n\nThe\
    \ above element is a select option element for choosing a country. It allows you\
    \ to select between a drop-down menu of 4 different options; USA, Mexico, Canada\
    \ and Australia. It is labelled as “country” (id=”country”).\n\n```html\nDate\
    \ of Birth: <input type=\"date\" id=\"start\" name=\"trip-start\"\n    value=\"\
    2020-07-22\"\n    min=\"1918-01-01\" max=\"2020-06-31\"><br>\n```\n\nThe above\
    \ element is an input date element, that lets you choose a date of birth between\
    \ 1918 (min=”1918-01-01”) and 2020(max=”2020-06-31”). It is named as “start” (id=”start”)\
    \ and is set to a value of 2020-07-22 (value=”2020-07-22”).\n\n```html\n<button\
    \ onclick=\"\">Submit</button>\n```\n\nThe above element is a button element.\
    \ It has the text “Submit” written on it. It does nothing on clicking as the onclick\
    \ function is empty.\nNow, let’s have a look at what happens when we run the program."
  mdcn: "## 代码输出\n\n![](img/443990a0ec620659ce8be783c0758bc6_238_0.png)\n\n现在，让我们分解不同的元素：\n\
    下面是标题标签 `<title>`\n\n下面是标题标签 `<h1>`、`<h2>`、`<h3>`\n\n![](img/443990a0ec620659ce8be783c0758bc6_239_0.png)\n\
    \n下面是段落标签 `<p>`\n\n![](img/443990a0ec620659ce8be783c0758bc6_239_1.png)\n\n下面是无序列表标签\
    \ `<ul>` `<li>`\n\n![](img/443990a0ec620659ce8be783c0758bc6_239_2.png)\n\n下面是3个指向3个流行网站的超链接标签\
    \ `<a href>`\n\n![](img/443990a0ec620659ce8be783c0758bc6_239_3.png)\n\n## 练习题\n\
    \n1.  创建一个网站，包含一个标题标签和一个无序列表，列出杂货物品。使用段落标签为特定物品添加任何特殊说明。在列表末尾，使用超链接标签链接到最近杂货店的网站。\n\
    2.  创建一个网站，列出你足球队的所有队员。使用标题、标题和段落标签欢迎用户访问你的网站，并描述球队和球队的理念。使用有序列表列出队员。\n3.  创建一个网站，用无序列表列出你所在地区所有你喜欢的餐厅和咖啡店。使用标题、标题和段落标签介绍你自己以及你所在地区的餐饮体验。\n\
    \n## 示例 html 程序\n\n## 本项目功能\n\n这个 html 项目创建了两个按钮。这两个按钮在白天和夜晚的两张图片之间切换。这两个按钮分别标记为“白天”和“夜晚”。\n\
    这是一个简单的 html 项目，创建了一个可以开关页面上灯泡的按钮。我们将使用两张灯泡图片来实现这一点。按钮将在两张图片之间切换。\n\n## 本章需要理解的概念\n\
    \n对于这个例子，我们需要理解按钮标签和图像标签。\n\n**按钮标签**\n`<button onclick=**Action** >**Button text**</button>`\n\
    按钮元素有两个组成部分。一个动作和按钮文本。按钮文本是显示在按钮上的文字；动作是用户点击按钮时发生的事情。\n\n**图像标签**\n`<img id=**ImageId**\
    \ src=**ImageUrl** style=**ImageSize**>`\n图像标签有三个组成部分。\n**ImageId** 是你分配给图像的名称。这个名称用于在代码中引用该图像。\n\
    **ImageUrl** 是标签引用的图像的 URL。如果图像与 html 文件在同一文件夹中，那么你可以只使用文件名而不是完整的 URL。\n**ImageSize**\
    \ 设置图像的宽度和高度。宽度和高度以像素为单位。\n\n## 文件\n\n以下是下一个项目需要使用的两个文件。你可以下载它们，并将其保存在你将要创建 html\
    \ 文件的同一文件夹中。\n[白天图片](Day Picture)\n[夜晚图片](Night Picture)\n\n## 代码\n\n```html\n\
    <html>\n<body>\n\n<h2>白天和夜晚按钮</h2>\n\n<button onclick=\"document.getElementById('myImage').src='DayImage.jpg'\"\
    >白天</button>\n\n<img id=\"myImage\" src=\"DayImage.jpg\" style=\"width:200px\"\
    >\n\n<button onclick=\"document.getElementById('myImage').src='NightImage.jpg'\"\
    >夜晚</button>\n\n</body>\n</html>\n```\n\n## 输出\n\n最初，默认设置为白天图片。\n\n### 白天和夜晚按钮\n\
    \n![](img/443990a0ec620659ce8be783c0758bc6_243_0.png)\n\n一旦你点击**夜晚**按钮，你会看到：\n\
    \n### 白天和夜晚按钮\n\n![](img/443990a0ec620659ce8be783c0758bc6_244_0.png)\n\n白天 夜晚\n\
    \n然后，当你再次点击**白天**按钮时，你会看到：\n\n### 白天和夜晚按钮\n\n![](img/443990a0ec620659ce8be783c0758bc6_244_1.png)\n\
    \n白天 夜晚\n\n## 代码解释\n\n```html\n<img id=\"myImage\" src=\"DayImage.jpg\" style=\"\
    width:200px\">\n```\n\n上面的 html 元素是一个图像标签。它有3个组成部分：id、src 和 style。id 是图像的标签。在这个例子中，它被标记为“myImage”。id\
    \ 用于在整个程序中引用该图像。src 是标签加载的图像的来源。图像“DayImage.jpg”与 html 文件在同一文件夹中。\n\n```html\n\
    <button onclick=\"document.getElementById('myImage').src='DayImage.jpg'\">白天</button>\n\
    ```\n\n上面的元素是一个按钮元素。它有一个名为 **onclick** 的参数，描述了点击按钮时执行的操作。document.getElementById\
    \ 获取 id 为‘myImage’的元素。因此，当你点击按钮时，它会在‘myImage’上显示‘DayImage.jpg’。‘白天’是写在按钮上的文字。\n\
    \n```html\n<button onclick=\"document.getElementById('myImage').src='NightImage.jpg'\"\
    >夜晚</button>\n```\n\ndocument.getElementById 获取 id 为‘myImage’的元素。因此，当按钮被点击时，它会在‘MyImage’上显示‘NightImage.jpg’。‘夜晚’是写在按钮上的文字。\n\
    \n## 练习题\n\n1.  找3张一个人跑步、走路和站立的图片。编写一个程序，包含3个按钮，根据你按下的按钮，人物会跑步、走路或站立。\n2.  找3张交通信号灯显示红灯、绿灯和橙灯的图片。编写一个程序，包含3个按钮，分别标记为“停止”、“通行”和“注意”。当按下“停止”按钮时，交通信号灯切换为红灯；当按下“通行”按钮时，切换为绿灯；当按下“注意”按钮时，切换为黄灯。\n\
    \n## html 表单\n\n还记得你在网上看到的那些让你输入姓名、年龄和出生日期的表单吗？那些就是 html 表单。\n今天，我们将学习如何制作这些表单。\n\
    在开始制作表单之前，我们需要了解一些基本的表单元素：\n**按钮 `<button>`** - 这是一个允许用户在点击时执行操作的元素。\n**文本框 `<input>`**\
    \ - 这个元素允许用户在浏览器屏幕上的一个框中输入文本。它用于收集像姓名、城市等小型文本项。\n**文本区域 `<textarea>`** - 这允许用户输入更大量的文本。它的尺寸比文本框大。它用于像地址、评论等较大的文本项。\n\
    **选项选择 `<select>`** - 这个元素允许用户在几个可用选项之间进行选择。它基本上是一个下拉框。\n**日期输入 `<input type=”date”>`**\
    \ - 这个元素允许用户从日历下拉菜单中选择一个日期。\n现在，让我们通过下面的示例表单来逐一了解这些例子。\n\n## 示例表单\n\n```html\n\
    <html>\n<head><title>示例表单</title></head>\n<body>\n<form id=\"form1\">\n输入名字：<input\
    \ name=\"frstname\" type=\"text\" id=\"frstname\" size=\"20\"><br>\n输入姓氏：<input\
    \ name=\"lname\" type=\"text\" id=\"lname\" size=\"20\"><br><br>\n输入地址：<textarea\
    \ name=\"TextBox\" cols=\"40\" rows=\"5\" id=\"tstr2\"></textarea><br><br>\n输入国家：<select\
    \ id=\"country\" name=\"country\">\n<option value=\"USA\">美国</option>\n<option\
    \ value=\"Mexico\">墨西哥</option>\n<option value=\"Canada\">加拿大</option>\n<option\
    \ value=\"Australia\">澳大利亚</option>\n</select><br>\n出生日期：<input type=\"date\"\
    \ id=\"start\" name=\"trip-start\"\nvalue=\"2020-07-22\"\nmin=\"1918-01-01\" max=\"\
    2020-06-31\"><br>\n<button onclick=\"\">提交</button>\n</form>\n</body>\n</html>\n\
    ```\n\n现在，让我们逐一查看代码的每个部分。\n\n```html\n<form id=\"form1\">\n```\n\n每个表单都以 `<form>`\
    \ html 元素开始。id “form1”是你给表单起的名字。id 用于在程序的其余部分引用该表单。\n\n```html\n输入名字：<input name=\"\
    frstname\" type=\"text\" id=\"frstname\" size=\"20\"><br>\n输入姓氏：<input name=\"\
    lname\" type=\"text\" id=\"lname\" size=\"20\"><br><br>\n```\n\n上面两行是用于名字和姓氏的文本框。type\
