    # Example 4 Bouncing ball


    In this program we create a ball that keep bouncing off borders.

    What does it mean for a ball to bounce off border?

    Earlier we kept moving the ball by incrementing/decrementing its x and y position
    by a unit step.

    In moving the ball right, we incremented x by 1, while we decremented x by 1 to
    move it to left. So, to bounce the ball of a given border we need to detect which
    border it is hitting and increment or decrement the right coordinate x or y.

    In bounce function,


    ```

    stepx = -1 * stepx , flip x direction if right or left borders touched

    stepy = -1 * stepy , flip y direction if top or bottom borders touched

    ```


    These lines keep flipping the corresponding coordinate whenever a border is touched.'
