    \n# 按键和鼠标点击事件\n\n## 按键元素的作用是什么？\n\n按键元素检测键盘上何时发生某个事件。按下键的动作称为事件。按键元素是jQuery的一部分。jQuery是一个用于处理事件、动画等的JavaScript库。下面是一个按键元素的简单示例。\n\
    \n## 按键示例1\n\n在我们开始程序之前，我们使用以下代码将jQuery库上传到程序中：\n\n```\n<script src=\"https://code.jquery.com/jquery-2.1.0.js\"\
