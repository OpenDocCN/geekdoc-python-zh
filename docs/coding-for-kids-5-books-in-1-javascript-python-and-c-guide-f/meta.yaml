    我知道这对某些人来说可能是一个简单的测试；但在我们开始真正的编程之前，确保一切正常工作是很重要的。


    ## HTML 简介


    ### 什么是 HTML？


    HTML 代表超文本标记语言。

    HTML 是人类用来与 Chrome、Internet Explorer、Firefox 等网页浏览器进行交互的语言。

    有时，它会得到 CSS 和 JavaScript 的辅助；但网页的基本结构是由 HTML 定义的。

    它非常简单，即使是编程初学者和小孩子也容易掌握。

    HTML 使用简单的标签来完成，这些标签看起来像箭头的两端。


    ### HTML 标签示例


    这是一个 HTML 标签的样子：

    **<p>** - 标签示例

    每个 HTML 标签都有一个额外的标签来表示标签的结束。结束标签除了标签的两端外，还有一个斜杠。请参阅下面的简单示例。


    ```

    <p> - 标签开始

    </p> - 标签结束

    ```


    ### 基本 HTML 标签及其用途


    <html>

    这是每个 HTML 代码片段开始的标签。


    <head>

    这是在其他任何内容之前首先执行的代码。


    <title>

    这是写在浏览器顶部标题栏中的代码。


    <body>

    包含页面上显示的信息。


    <p>

    用于页面主体上显示的文本段落。


    <h1>, <h2>, <h3>, <h4>, <h5>, <h6>

    这些用于按大小降序排列的文本标题。<h1> 是最大尺寸的标题，<h6> 是最小的。


    <strong>

    用于加粗文本


    <ul>

    用于无序列表，如项目符号列表


    <li>

    用于在文本行前添加项目符号图标


    <ol>

    用于有序列表，如从 1,2,3... 开始编号的项目


    <div>

    这些是较大的内容部分；通常包含多个段落、标题等。


    <a>

    用于超链接文本。超链接就是当你点击一段带下划线的文本时，它会链接到另一个页面。


    <img>

    用于向网页添加图片。


    现在，你可能想知道要学的东西很多。别担心。你现在不需要记住任何东西。

    只需在你编码时将其作为参考。

    我们将通过一个例子来更好地解释一切。


    ### HTML 示例：


    ```

    <html>

    <head>

    <title>Greeting to html.......</title>

    </head>

    <body>

    <h1>Welcome to your first html website</h1>

    <h2>Time to get started....</h2>

    <p>Hi. My name is Bob. I am excited to learn about programming a website. Here''s
    a few things we will learn.</p>

    <ul>

    <li>Basics of html</li>

    <li>CSS</li>

    <li>JavaScript</li>

    </ul>

    </body>

    </html>

    ```


    以下是相同的代码：（你可以复制粘贴）


    ```

    <html>

    <head>

    <title>Greeting to html.......</title>

    </head>

    <body>

    <h1>Welcome to your first html website</h1>

    <h2>Time to get started....</h2>

    <p>Hi. My name is Bob. I am excited to learn about programming a website. Here''s
    a few things we will learn.</p>

    <ul>

    <li>Basics of html</li>

    <li>CSS</li>

    <li>JavaScript</li>

    </ul>

    </body>

    </html>

    ```


    ### 这是我们得到的输出


    ![](img/443990a0ec620659ce8be783c0758bc6_127_0.png)


    让我们将输出与代码中的标签联系起来。


    ![](img/443990a0ec620659ce8be783c0758bc6_127_1.png)


    ### 练习


    1.  创建一个介绍你自己的 HTML 网站。创建一个标题标签，内容为“介绍”。使用 h1 和 h2 标签为你自己创建一个标题。然后创建一个段落，谈谈你自己、你的年龄、学校和家乡。最后，创建一个你的爱好的项目符号列表。


    2.  创建一个谈论你最喜欢的运动队或电视节目的 HTML 网站。创建一个标题标签，内容为该节目/运动队的名称。使用 h1 和 h2 标签创建一个标题。然后创建一个段落，谈谈你为什么喜欢这个队伍/电视节目，以及它们为什么如此棒。最后，创建一个你最喜欢的节目中的球员/人物的项目符号列表。


    ## 灯泡示例 - HTML


    ### 这个项目做什么


    这是一个简单的 HTML 项目，它创建了一个按钮，可以切换页面上的灯泡开/关。我们将使用两张灯泡图片来实现这一点。按钮将在两张图片之间切换。


    ### 本章需要理解的概念


    对于这个例子，我们需要理解按钮标签和图像标签。


    ### 按钮标签


    ```

    <button onclick=**Action** >**Button text**</button>

    ```


    按钮元素有两个元素。一个动作和按钮文本。按钮文本是显示在按钮上的文本；动作是用户点击按钮时发生的事情。


    ### 图像标签


    ```

    <img id=**ImageId** src=**ImageUrl** style=**ImageSize**>

    ```


    图像标签有三个元素。

    ImageId 是你分配给图像的名称。此名称用于在代码中引用图像。

    ImageUrl 是标签引用的图像的 URL。如果图像与 HTML 文件在同一文件夹中，那么你可以只使用文件名而不是整个 URL。

    ImageSize 设置图像的宽度和高度。'
