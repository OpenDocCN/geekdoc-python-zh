    \n![](img/443990a0ec620659ce8be783c0758bc6_154_0.png)\n\n# 输出（已填写）：\n\n![](img/443990a0ec620659ce8be783c0758bc6_154_1.png)\n\
    \n**答案（+ 按钮）：**\n总和是 11\n\n**答案（- 按钮）：**\n差值是 1\n\n**答案（* 按钮）：**\n乘积是 30\n\n**答案（/\
