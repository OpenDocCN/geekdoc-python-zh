  md: '# Introduction


    It was a bright summer afternoon in Atlanta; and I grabbed my laptop to watch
    the latest episode of ‘Game of Thrones’ on the porch outside. As I sat on the
    three-legged chair; I felt a wobble on the rear leg. The leg just came off the
    stool and I crashed to the ground on my back. Hearing the loud thud on the porch,
    both my wife, Isabelle, and son, Arnad, came out. “Are you ok?” Isabelle gasped.
    I was shaken, but fine, as Isabelle helped me up. I walked inside and grabbed
    a glass of water to get me back to my senses. To my amazement, I noticed, through
    the window, my 9-year-old son, Arnad try to figure out how to piece it together.
    He assembled the leg back in and noticed that the chair was still wobbling. He
    then switched out the screw with the one on the good leg; and the chair was still
    wobbling. He finally glued the sliding mechanism that held the screw in place;
    and that magically fixed the chair. Wow!!


    Next, we can talk about Betty. Our neighbour’s daughter, Betty, struggled with
    Social Sciences for the longest time. Her parents were used to failing grades
    in this topic; and were relieved each time she got a ‘D’. So, imagine their shock
    when Betty came back one day with a report card that showed an ‘A’ in social science.
    Yeah, Betty was a hardworking girl and she did do well in some of her subjects;
    but this turnaround was unexpected. Then, Betty showed her parents her social
    science improvement plan in the last three months. She broke down the list of
    topics she would work on every week; and how she would simplify some of the harder
    topics with documentaries and group study sessions. She systematically moved on
    from topic to topic till she addressed all of them.'
  merge: -1
  pgno: 113
- img_proc: true
  md: 'And finally, we address Carl. Carl was a tennis player at the start of high
    school. He was a lot smaller and weaker than his opponents. As a result, he lost
    pretty badly in his first tournament. He struggled to even get a few points. While
    he was upset, he realized that his loss was not a loss due to lack of skill; it
    was based of circumstances. He analysed the situation; and realized that he needed
    to improve his skill and positional play on the court. He analysed the movement
    of his opponents on the court; and adapted his shots to always make sure they
    played him off balance. He did plenty of yoga and other stretching exercises to
    improve his flexibility, balance and speed. He started improving month after month.
    Every month, he practiced a different shot. In a couple of years, he grew into
    his frame and was much stronger and wider. And due to his hard work, he was much
    more skilled than his opponents. In his third year of high school, he won the
    annual tournament with really no competition at all.


    All of these situations are hypothetical and can happen due to innate characteristics
    of certain kids. Also, coding does not guarantee that you will learn these skills.
    But, all of these situations demonstrate skills that can be learnt during coding.
    Arnad systematically examined the chair and its different components; and worked
    through each component to find the problem. This is the same as a process called
    ‘debugging’ in programming. Debugging is what happens when a program doesn’t work.
    It requires systematic analysis of the code to find the problem and make it work.


    Betty looked at a problem; and organized it into different parts that are required
    to achieve a result. This is similar to problem solving in programming. This is
    understanding what is required to solve a coding problem; and structure the code
    into different sections to make the program work.'
  merge: -1
  pgno: 114
- img_proc: true
  md: 'Carl is doing the same thing as Betty; he is structuring a problem into different
    parts so it can be solved in a simple manner. But, in addition, he is prioritizing
    different skills on the tennis court. He spent time figuring out which skills
    are more important to beating his opponent and worked on those first. Prioritization
    is an important skill in programming after a code is properly structured. Coders
    want to prioritize more vital tasks in the code to test first.


    All these skills are vital to programming; and your kids should learn these if
    they learn how to code well. It doesn’t really matter if they become programmers.
    The skills will benefit your kids for life. Programming also helps kids improve
    at basic math and reading; in addition to better logic and problem-solving skills.


    These skills, combined with communication skills they learn in high school, are
    the reason why software engineers are paid a median annual salary of $112000 (as
    of 2018) in America. This is over double the average salary in America.


    Despite this, high schools all over the world, even in affluent areas, lack the
    staff and technical resources to handle this task. According to a 2000 K-12 teacher
    survey done by Tech Republic, only 8% of teachers felt reasonably confident to
    teach children programming. 50% of kids in America do not have access to the internet
    at home. The statistics are even worse for girls and children of color in America;
    who have less resources and role models to look up to.


    So, you need to take to take this into your own hands.


    # What Not To Do


    You might be wondering what you need to do to get started. There’s a couple of
    things I advise against doing. I would advise against hiring a programmer who
    has no experience in'
  merge: -1
  pgno: 115
- img_proc: true
  md: 'teaching kids. They are experts in the topic; but it’s been decades since they
    started programming; so, they can’t relate to a kid who hasn’t learnt programming
    before and who’s learning basic Mathematics. The next thing to avoid is to search
    for the latest textbook on JavaScript; and read it out for your kid. These are
    as useful for learning programming; as a dictionary is for learning a language.
    They are expensive, and more useful as a reference tool for existing programmers.
    I also recommend against coding camps. These can work for a minority of students;
    but most students get lost in the large group of kids that are learning. One to
    one attention is the best way to get going.


