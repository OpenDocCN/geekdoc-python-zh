  md: "The function **searchRecord()** takes in an array of names (**name[]**) and\
    \ an array of registration numbers (**regnum[]**) as arguments. It also takes\
    \ in two variables for registration number **reg** and index **in**.\n**reg**\
    \ is the registration number we are using to search for the student record, while\
    \ **in** is the number of records.\nThe function search the array **regum[]**\
    \ using a for loop for the registration number **reg**.\nIf **reg** is found,\
    \ the function prints out the student registration number and name.\nIf **reg**\
    \ is not found, the function prints out “Record is not found”\n\n```\n// search\
    \ record function to search the record of the student if it is exist and then\
    \ print record\nvoid searchRecord(string name[], string regnum[], string reg,int\
    \ in) {\n\n    // is found variable to check wether a record is exist or not in\
    \ the array if exist set it true\n    bool isfound = false;\n\n    // Loop till\
    \ array to check a wether a record exist or not\n    for(int index = 0; index\
    \ < in; index = index + 1) {\n\n        // check the every record in array if\
    \ match then\n        if ( regnum[index] == reg ) {\n\n            // record is\
    \ found\n            isfound = true;\n\n            // printing the record\n \
    \           cout << \"Student Registration Number  : \"\n            <<  regnum[index]\
    \  << \"\\t\\t\" <<  \" Student Name : \"  << name[index] << endl;\n         \
    \   cout << endl;\n\n\n            // terminating from Loop\n            break;\n\
    \n        }\n    }\n\n    // if a particular record is not exist then\n    if\
    \ (isfound == false) {\n\n        // display that record is not exist\n      \
    \  cout <<\" Record is not found : \" <<endl;\n        cout << endl;\n    }\n\
    }\n```"
