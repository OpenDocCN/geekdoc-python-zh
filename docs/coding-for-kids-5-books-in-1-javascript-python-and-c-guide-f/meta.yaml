    \ with boxes where you can store things. In addition, these boxes are of different\
    \ sizes and type. Hence you can determine what you can store in them.\n\nIn addition,\
    \ we can label these boxes so that we can refer to the name later easily.\n\n\
    ### Variable Assignment\n\nA variable is a name given to a value that is stored\
    \ in memory.\n\nA variable name is also known as an **identifier**.\n\nYou can\
