    print()

    print(f"The sum is {Sum}")

    print(f"The difference is {difference}")

    print(f"The product is {product}")

    print(f"The quotient is {quotient}")

    ```


    In this code, we accept two numbers using a Python `input()` function. The two
    numbers are assigned to two variables `n1` and `n2`. Then we calculate the sum,
    difference, product and quotient and assign them to 4 different variables. At
    the end, these 4 variables are printed out using `print()`.


    # Output:


    ```

    num1: 9

    num2: 3


    The sum is 12.0

    The difference is 6.0

    The product is 27.0

    The quotient is 3.0

    ```


    ## Modulus operation


    The modulus operation returns the remainder between two numbers. It looks like
    the percentage sign `%`. Here’s an example below:


    ```python

    n1 = float(input(''num1: ''))

    n2 = float(input(''num2: ''))


    remainder = n1 % n2

    print()

    print(f"Remainder is {remainder}")

    ```


    The above code takes in two numbers via an input and finds the remainder between
    the two; as shown in output below.


    # Output:


    ```

    num1: 9

    num2: 2


    Remainder is 1.0

    ```


    The remainder when 9 is divided by 2 is indeed 1.


    ## math.random()


    ```python

    import random


    n1 = random.random()

    n2 = round(random.random() * 50)

    n3 = round(random.random() * 50)

    n4 = round(random.random() * 1000)


    print(f"Random number between 0 and 1 {n1}")

    print(f"1st random number between 0 and 50 {n2}")

    print(f"2nd random number between 0 and 50 {n3}")

    print(f"Random number between 0 and 1000 {n4}")

    ```


    `math.random()` returns a random number between 0 and 1. If we want to get a random
    between 0 and 10, we multiply by 10 and round the answer (using `round()`). Let’s
    look at a few examples.


    In the above example, `n1` is a random number between 0 and 1. `n2` and `n3` are
    two different random numbers between 0 and 50. You should probably see that `n2`
    and `n3` are different because both numbers are randomized. `n4` returns a random
    number between 0 and 1000. We can see the results in the output below. As the
    numbers are randomized, we should get a different result each time we run the
    program. `math.random()` is a fun function and we are going to be using it in
    quite a few games this book.


    # Output:


    ```

    Random number between 0 and 1 0.2054234851201563

    1st random number between 0 and 50 3

    2nd random number between 0 and 50 37

    Random number between 0 and 1000 57

    ```


    ## Exponent and Logarithms


    Exponents in Python are done using the `pow(b, n)` or `b**n` function and logarithm
    using `math.log(n, base)`. So natural logarithm is done using `math.log(number,
    math.e)`. If we want logarithm to the base 10 we use `math.log(n, 10)`. `math.e`
    is Euler constant.


    ```python

    import math


    n1 = 6 ** 2

    n2 = 7 ** 3

    n3 = pow(7, 3)

    n4 = math.log(100, math.e)

    n5 = math.log(100, 10)


    print(f"6 raised to the power 2 = {n1}")

    print(f"7 raised to the power 3 = {n2}")

    print(f"7 raised to the power 3 = {n3}")

    print(f"The natural logarithm of 100 is {n4}")

    print(f"Logarithm base 10 of 100 is {n5}")

    ```


    In the code above, we have three examples of exponents using both `**` operator
    and `pow(a, b)` function. Basically, x is raised to the power of y in those cases.
    `n1`, `n2` and `n3` give exponents. `n4` shows a natural logarithm of 100 and
    `n5` shows logarithm to base 10 of 100.


    ```

    6 raised to the power 2 = 36

    7 raised to the power 3 = 343

    7 raised to the power 3 = 343

    The natural logarithm of 100 is 4.605170185988092

    Logarithm base 10 of 100 is 2.0

    ```


    # Output:


    ## Square root


    `math.sqrt()` is used to find square root and `math.abs()` is used to find the
    absolute value of a number.


    Note: You can also use operator `**` to find square root by raising number to
    power 0.5.


    Here’s a few examples:


    ```python

    import math


    n1 = 36 ** 0.5

    n2 = 75 ** 0.5

    n3 = math.sqrt(75)

    n4 = abs(13)

    n5 = abs(-14)


    print(f"The square root of 36 = {n1}")

    print(f"The square root of 75 = {n2}")

    print(f"The square root of 75 = {n3}")

    print(f"The absolute value of 13 = {n4}")

    print(f"The absolute value of -14 = {n5}")

    ```


    In the above code, `n1`, `n2` and `n3` are examples of the square root function;
    while `n4` and `n5` are examples of the absolute function. If you haven’t heard
    of the absolute value function, it basically returns a positive value whether
    the number is +ve or -ve. So, 13 and -13 would both return an absolute value of
    13.


    # Output:


    ```

    The square root of 36 = 6.0

    The square root of 75 = 8.660254037844387

    The square root of 75 = 8.660254037844387

    The absolute value of 13 = 13

    The absolute value of -14 = 14

    ```


    ## Trigonometry


    Yes, Python can be used to do trigonometric functions as well. Here’s a few of
    them. `math.sin(x)` returns the sine value of x radians. If we want to find the
    sine of x degrees, then we have to convert it to radians. So, we should change
    the function to `math.sin(x*math.pi/180)`. Also, keep in mind that in Python,
    we represent the value of π as `math.pi`. We can also do cos and tan function
    using `math.cos(x)` and `math.tan(x)`, where x is in radians. Let’s look at an
    example program below:


    ```python

    import math


    n1 = math.sin(5)

    n2 = math.sin(5 * math.pi/180)

    n3 = math.sin(90 * math.pi/180)

    n4 = math.cos(10)

    n5 = math.cos(10 * math.pi/180)

    n6 = math.cos(0 * math.pi/180)

    n7 = math.tan(30)

    n8 = math.tan(30 * math.pi/180)

    n9 = math.tan(45 * math.pi/180)


    print(f"The sine of 5 radians = {n1}")

    print(f"The sine of 5 degrees = {n2}")

    print(f"The sine of 90 degrees = {n3}")

    print(f"The cosine of 10 radians = {n4}")

    print(f"The cosine of 10 degrees = {n5}")

    print(f"The cosine of 0 degrees = {n6}")

    print(f"The tan of 30 radians = {n7}")

    print(f"The tan of 30 degrees = {n8}")

    print(f"The tan of 45 degrees = {n9}")

    ```


    In the above code, we show 3 examples of sine, cos and tan values. And we show
    the difference between calculating trigonometric values of degrees and radians.
    For example, for `n1`, we calculate the value of sin(5 radians) and in `n2` we
    calculate the value of sin(5 degrees). In `n2`, we had to convert 5 degrees into
    radians by doing sin(5* π/180).


    # Output:


    ```

    The sine of 5 radians = -0.9589242746631385

    The sine of 5 degrees = 0.08715574274765817

    The sine of 90 degrees = 1.0

    The cosine of 10 radians = -0.8390715290764524

    The cosine of 10 degrees = 0.984807753012208

    The cosine of 0 degrees = 1.0

    The tan of 30 radians = -6.405331196646276

    The tan of 30 degrees = 0.5773502691896257

    The tan of 45 degrees = 0.9999999999999999

    ```


