  md: '# # Hello World in C++


    The first program that all programmers write when learning a new programming language
    is known as Hello World.


    It is just basically writing a program that displays the words ''Hello World''
    to the screen. Since we are programmers now, we say that we are *printing* the
    words ''Hello World'' to the screen.


    I will be giving out code examples, and you will have to type the examples in
    the Code::Blocks and click on the build and run button to compile and execute
    the code in order to see the results.


    # ## Creating A Project in Code::Blocks


    In order to run code in Code::Blocks we have to first create a project. So first
    of all we need to open up Code::Blocks.


    To create a project, click on **File > New > Project**


    In the pop-up window select **Console application** and click on the button **Go**'
