    # FOR Loop Example 3 – Nested Loops


    In the final example, we use FOR loops to create a star pattern.

    So, we create a 2nd button labelled ‘Print Star Loop’ which runs **starloop()**
    on clicking. In the function, again, looplength has the value of the loop we enter
