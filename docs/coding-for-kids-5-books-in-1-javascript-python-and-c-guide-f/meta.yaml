- md: "## Conditional Statement\n\nConditional Statements are also known as control\
    \ statements. They help decide the flow of the program. Sometimes we want a specific\
    \ block of code to execute only if a certain condition is met. Ex: We take the\
    \ weather as an input from the user and print \"Don't forget your umbrella\" if\
    \ it's rainy or prints \"Have a nice day\" if it is not.\n\n```\nweather = input(\"\
    Input the weather? \")\nif weather == \"rainy\":\n    print(\"Don't forget your\
    \ umbrella\")\nelse:\n    print(\"Have a nice day\")\n```\n\nIf the user inputs\
    \ \"rainy\", print(\"Don't forget your umbrella\") gets executed and python skips\
    \ the code inside the else block. If the user inputs something other than \"rainy\"\
    , Python skips the code inside the if block and executes the code in the else\
    \ block. The general syntax is:\n\n```\nif *condition is True* :\n    .......\
    \ execute this code block .........\nelse:\n    ....... execute this code block\
    \ .........\n```\n\n## Types of condition\n\n### Boolean variable\n\nA boolean\
    \ variable can have either a value of True or False.\n\n```\nboolean = True\n\n\
    if boolean:\n    print(\"The value is True\")\nelse:\n    print(\"The value is\
    \ False\")\n```\n\nFirst, we declare a boolean variable called 'boolean' and set\
    \ it True. If 'boolean' is True, we print \"The value is True\". If it is false,\
    \ we print \"The value is False\". Below is the output when 'boolean' is set to\
    \ True\n\n```\nThe value is True\n>>> |\n```\n\n### Comparison operators\n\nThe\
    \ different type of comparison operators supported by Python are:\n\n- > - greater\
    \ than\n- < - less than\n- == - equal (Note there are two equal signs, a single\
    \ equal is used to assign values to a variable, two equal signs are used for comparison)\n\
    - != - not equal to\n- >= - greater than or equal to\n- <= - less than or equal\
    \ to\n\nComparison can only be made between numbers or strings. It is not possible\
    \ to compare a number to a string. When we take input from the user, we get a\
    \ string value. If the string contains only numeric characters, we can convert\
    \ it to an int using int(). Conversion of data types is known as typecasting.\n\
    \n```\nnumber = int(input(\"Number? \"))\n\nif number > 10:\n    print(\"{} is\
    \ greater than 10\".format(number))\nelse:\n    print(\"{} is not greater than\
    \ 10\".format(number))\n```\n\nIn the above code, we take an input from the user\
    \ and convert it to an integer. We then compare it with 10 and print a statement.\
    \ If we enter an input of 8, which is less than 10, we get the following output.\n\
    \n```\nNumber? 8\n8 is not greater than 10\n>>> |\n```\n\nWe can also compare\
    \ strings like the weather example mentioned at the beginning. Below are a few\
    \ comparison examples in the Python Shell\n\n```\n>>> 100 == 101\nFalse\n>>> 100\
    \ != 101\nTrue\n>>> 10 > 9\nTrue\n>>> 10 < 9\nFalse\n>>> 'a' > 'b'\nFalse\n>>>\
    \ 'b' > 'a'\nTrue\n>>> 'hello' == 'hello'\nTrue\n>>> 'world' == 'WORLD'\nFalse\n\
    >>> |\n```\n\nPython is case sensitive, as it can be seen in the last example,\
    \ 'world' != 'WORLD'.\n\n### Combination of conditions\n\nMultiple conditions\
    \ can be combined using the 'and', 'or' and 'not'.\n\n```\n>>> True and True\n\
    True\n>>> True and False\nFalse\n>>> False and False\nFalse\n>>> False and True\n\
    False\n>>> True or True\nTrue\n>>> True or False\nTrue\n>>> False or True\nTrue\n\
    >>> False or False\nFalse\n>>> not True\nFalse\n>>> not False\nTrue\n```\n\n###\
    \ elif keyword\n\nWhile only one of the if or else code blocks will execute, you\
    \ may have a case where you want one of many code blocks to execute based on the\
    \ condition. You can use the elif keyword for such a case. The elif keyword is\
    \ roughly translated to \"else if\".\n\n```\nnumber = int(input(\"Number? \"))\n\
    \nif number > 10:\n    print(\"{} is greater than 10\".format(number))\nelif number\
    \ > 5:\n    print(\"{} is greater than 5\".format(number))\nelse:\n    print(\"\
    {} is not greater than 5 or 10\".format(number))\n```\n\nThe above code is similar\
    \ to the 'number-checker' code we had earlier, but now it also checks if the number\
    \ is greater than 5. Below is the output when the user inputs 8\n\n```\nNumber?\
    \ 8\n8 is greater than 5\n>>> |\n```\n\n## Example\n\n1) A function to print the\
    \ grade based on the mark input by the user\n\n```\ndef func(mark):\n    mark\
    \ = int(mark)\n    if mark >= 90:\n        print(\"Grade A\")\n    elif mark <\
    \ 90 and mark >= 80:\n        print(\"Grade B\")\n    elif mark < 80 and mark\
    \ >= 70:\n        print(\"Grade C\")\n    elif mark < 70 and mark >= 60:\n   \
    \     print(\"Grade D\")\n    else:\n        print(\"Grade F\")\n\nmark = input(\"\
    Enter the Mark? \")\nfunc(mark)\n```\n\nThe function 'func' takes a variable mark\
    \ as a parameter. It checks for the following conditions:\n\n- If 'mark' is greater\
    \ than or equal to 90, it prints \"Grade A\"\n- If 'mark' is in the range of 80\
    \ - 89 (note it's < 90 and not <= 90), it prints \"Grade B\"\n- If 'mark' is in\
    \ the range of 70 - 79, it prints \"Grade C\"\n- If 'mark' is in the range of\
    \ 60 - 69, it prints \"Grade D\"\n- If none of the conditions is satisfied, it\
    \ prints \"Grade F\"\n\nFor every input, only one of the conditions is satisfied,\
    \ and as a result, only one print statement is executed. Below is the output for\
    \ user's input 65\n\n```\nEnter the Mark? 65\nGrade D\n>>> |\n```\n\nSince 65\
    \ is between 60-69, the third elif condition is satisfied.\nBelow is the output\
    \ for user's input 90\n\n```\nEnter the Mark? 90\nGrade A\n>>>\n```\n\nSince 90\
    \ >= 90, the if condition is satisfied, and the if block is executed.\n\nBelow\
    \ is the output when the user's input is 50\n\n```\nEnter the Mark? 50\nGrade\
    \ F\n>>> |\n```\n\n50 is not in any of the above ranges. Therefore, none of the\
    \ conditions is satisfied, and the else block is executed.\n\n2) A Basic Calculator\n\
    \n```\ndef Calculator(number1, number2, operation):\n    number1 = int(number1)\n\
    \    number2 = int(number2)\n    if operation == '+':\n        return number1\
    \ + number2\n    elif operation == '-':\n        return number1 - number2\n  \
    \  else:\n        return \"Operator is not supported\"\n\nn1 = input(\"Enter the\
    \ first number? \")\nn2 = input(\"Enter the second number? \")\nop = input(\"\
    Enter the operator? \")\n\nprint(Calculator(n1, n2, op))\n```\n\nThe above code\
    \ takes two numbers and an operator as an input from the user. It returns the\
    \ sum or difference based on the operator the user inputs. The following checks\
    \ are performed:\n\n- If the operator is '+', we return the sum of the two numbers\n\
    - If the operator is '-', we return the difference between the two numbers\n-\
    \ If any other operator is input, we return an error message\n\nBelow is the output\
    \ when the user inputs 10, 20, +\n\n```\nEnter the first number? 10\nEnter the\
    \ second number? 20\nEnter the operator? +\n30\n```\n\nSince the operator is '+',\
    \ the if condition is executed and the sum is returned.\n\nBelow is the output\
    \ when the user inputs 20, 10, -\n\n```\nEnter the first number? 20\nEnter the\
    \ second number? 10\nEnter the operator? -\n10\n>>> |\n```\n\nSince the operator\
    \ is '-', the elif condition is executed, and the difference is returned.\n\n\
    Below is the output when the user inputs an invalid operator\n\n```\nEnter the\
    \ first number? 20\nEnter the second number? 10\nEnter the operator? /\nOperator\
    \ is not supported\n>>> |\n```\n\nThe operator '/' doesn't satisfy the if or the\
    \ elif condition, therefore, the else code block is executed.\n\n## Exercise\n\
    \n- 1) Extend the calculator function above to support multiplication and division\
    \ operators.\n- 2) Write a function which takes two numbers as input from the\
    \ user and returns \"Yes\" if number 1 is divisible by number 2 and \"No\" if\
    \ it is not. Hint: Use the modulo operator, '%'. It returns the remainder of number1\
    \ divided by number2. If it returns 0, it is divisible.\n\n## Nested Conditional\
    \ Statements\n\nIn cases when we want multiple conditions to be checked, using\
    \ keywords 'and' and 'or' makes code hard to read, therefore, we used nested conditional\
    \ statements. Nested conditional statements are simply if..else blocks inside\
    \ an if, elif or else block. Below is the general syntax:\n\n```\nif *condition\
    \ is True* :\n    if *condition is True* :\n        ...... execute this code block\
    \ .......\n    elif *condition is True*:\n        ...... execute this code block\
    \ .......\n    else:\n        ...... execute this code block .......\nelse:\n\
    \    ...... execute this code block .......\n```\n\n## Example\n\nIn this example,\
    \ we are going to take a 4-digit year as an input and check if it is a leap year.\
    \ Now, this is a little more complicated than we think. We know that every 4 years\
    \ is a leap year. So that is our first check. So, a year like 1996 would be a\
    \ leap year. But, every 100 years, there is no leap year."
  mdcn: "## 条件语句\n\n条件语句也被称为控制语句。它们帮助决定程序的执行流程。有时我们希望只有在满足特定条件时才执行某段代码。例如：我们从用户那里获取天气信息，如果是雨天则打印“别忘了带伞”，如果不是则打印“祝你有美好的一天”。\n\
    \n```\nweather = input(\"Input the weather? \")\nif weather == \"rainy\":\n  \
    \  print(\"Don't forget your umbrella\")\nelse:\n    print(\"Have a nice day\"\
    )\n```\n\n如果用户输入“rainy”，则执行 `print(\"Don't forget your umbrella\")`，Python 会跳过\
    \ `else` 块中的代码。如果用户输入的不是“rainy”，Python 会跳过 `if` 块中的代码，执行 `else` 块中的代码。通用语法如下：\n\
    \n```\nif *condition is True* :\n    ....... execute this code block .........\n\
    else:\n    ....... execute this code block .........\n```\n\n## 条件的类型\n\n### 布尔变量\n\
    \n布尔变量的值只能是 True 或 False。\n\n```\nboolean = True\n\nif boolean:\n    print(\"\
    The value is True\")\nelse:\n    print(\"The value is False\")\n```\n\n首先，我们声明一个名为\
    \ 'boolean' 的布尔变量并将其设置为 True。如果 'boolean' 为 True，我们打印 \"The value is True\"。如果为\
    \ False，我们打印 \"The value is False\"。当 'boolean' 设置为 True 时，输出如下：\n\n```\nThe value\
    \ is True\n>>> |\n```\n\n### 比较运算符\n\nPython 支持的不同类型的比较运算符有：\n\n- > - 大于\n- <\
    \ - 小于\n- == - 等于（注意有两个等号，单个等号用于给变量赋值，两个等号用于比较）\n- != - 不等于\n- >= - 大于或等于\n- <=\
    \ - 小于或等于\n\n比较只能在数字或字符串之间进行。不能将数字与字符串进行比较。当我们从用户那里获取输入时，得到的是一个字符串值。如果字符串只包含数字字符，我们可以使用\
    \ `int()` 将其转换为整数。数据类型的转换称为类型转换。\n\n```\nnumber = int(input(\"Number? \"))\n\n\
    if number > 10:\n    print(\"{} is greater than 10\".format(number))\nelse:\n\
    \    print(\"{} is not greater than 10\".format(number))\n```\n\n在上面的代码中，我们从用户那里获取输入并将其转换为整数。然后我们将其与\
    \ 10 进行比较并打印一条语句。如果我们输入 8，它小于 10，我们将得到以下输出：\n\n```\nNumber? 8\n8 is not greater\
    \ than 10\n>>> |\n```\n\n我们也可以像开头提到的天气示例那样比较字符串。以下是 Python Shell 中的一些比较示例：\n\n\
    ```\n>>> 100 == 101\nFalse\n>>> 100 != 101\nTrue\n>>> 10 > 9\nTrue\n>>> 10 < 9\n\
    False\n>>> 'a' > 'b'\nFalse\n>>> 'b' > 'a'\nTrue\n>>> 'hello' == 'hello'\nTrue\n\
    >>> 'world' == 'WORLD'\nFalse\n>>> |\n```\n\nPython 区分大小写，如最后一个示例所示，'world' !=\
    \ 'WORLD'。\n\n### 条件的组合\n\n可以使用 'and'、'or' 和 'not' 组合多个条件。\n\n```\n>>> True and\
    \ True\nTrue\n>>> True and False\nFalse\n>>> False and False\nFalse\n>>> False\
    \ and True\nFalse\n>>> True or True\nTrue\n>>> True or False\nTrue\n>>> False\
    \ or True\nTrue\n>>> False or False\nFalse\n>>> not True\nFalse\n>>> not False\n\
    True\n```\n\n### elif 关键字\n\n虽然 if 或 else 代码块中只有一个会执行，但你可能遇到需要根据条件从多个代码块中选择一个执行的情况。你可以使用\
    \ `elif` 关键字来处理这种情况。`elif` 关键字大致可以翻译为“否则如果”。\n\n```\nnumber = int(input(\"Number?\
    \ \"))\n\nif number > 10:\n    print(\"{} is greater than 10\".format(number))\n\
    elif number > 5:\n    print(\"{} is greater than 5\".format(number))\nelse:\n\
    \    print(\"{} is not greater than 5 or 10\".format(number))\n```\n\n上面的代码类似于我们之前的“数字检查器”代码，但现在它也检查数字是否大于\
    \ 5。当用户输入 8 时，输出如下：\n\n```\nNumber? 8\n8 is greater than 5\n>>> |\n```\n\n## 示例\n\
    \n1) 一个根据用户输入的分数打印等级的函数\n\n```\ndef func(mark):\n    mark = int(mark)\n    if\
    \ mark >= 90:\n        print(\"Grade A\")\n    elif mark < 90 and mark >= 80:\n\
    \        print(\"Grade B\")\n    elif mark < 80 and mark >= 70:\n        print(\"\
    Grade C\")\n    elif mark < 70 and mark >= 60:\n        print(\"Grade D\")\n \
    \   else:\n        print(\"Grade F\")\n\nmark = input(\"Enter the Mark? \")\n\
    func(mark)\n```\n\n函数 'func' 接受一个变量 mark 作为参数。它检查以下条件：\n\n- 如果 'mark' 大于或等于 90，它打印\
    \ \"Grade A\"\n- 如果 'mark' 在 80 - 89 的范围内（注意是 < 90 而不是 <= 90），它打印 \"Grade B\"\n\
    - 如果 'mark' 在 70 - 79 的范围内，它打印 \"Grade C\"\n- 如果 'mark' 在 60 - 69 的范围内，它打印 \"\
    Grade D\"\n- 如果没有满足任何条件，它打印 \"Grade F\"\n\n对于每个输入，只有一个条件被满足，因此只执行一个 print 语句。当用户输入\
    \ 65 时，输出如下：\n\n```\nEnter the Mark? 65\nGrade D\n>>> |\n```\n\n因为 65 在 60-69\
    \ 之间，所以满足第三个 elif 条件。\n当用户输入 90 时，输出如下：\n\n```\nEnter the Mark? 90\nGrade A\n\
    >>>\n```\n\n因为 90 >= 90，所以满足 if 条件，执行 if 块。\n\n当用户输入 50 时，输出如下：\n\n```\nEnter\
    \ the Mark? 50\nGrade F\n>>> |\n```\n\n50 不在上述任何范围内。因此，没有满足任何条件，执行 else 块。\n\n\
    2) 一个基础计算器\n\n```\ndef Calculator(number1, number2, operation):\n    number1 =\
    \ int(number1)\n    number2 = int(number2)\n    if operation == '+':\n       \
    \ return number1 + number2\n    elif operation == '-':\n        return number1\
