  md: 'In this example, we are going to take a 4 digit year as an input and check
    if it is a leap year. Now, this is a little more complicated than we think.

    We know that every 4 years is a leap year. So that is our first check. So a year
    like 1996 would be a leap year.

    But, every 100 years, there is no leap year. So, 1800 and 1900 are not leap years.

    Also, there is another exception. Every 400 years, it is not a leap year. So 1600
    and 2000 are not leap years. So there are 3 checks.'
  merge: -1
  pgno: 169
- img_proc: true
  md: "```\nhtml\n<html>\n<head><title>Leap Year Check</title></head>\n<body>\n<form\
    \ id=\"form1\">\nEnter Year: <input type=\"number\" id=\"year\" size=\"20\"><br>\n\
    </form>\n<button onclick=\"leapyear()\">Leap Year?</button>\n\n<script>\n\nfunction\
    \ leapyear()\n{\nvar yr=parseInt(document.getElementById(\"year\").value);\nvar\
    \ lpyear=0;\n    if ((yr%4)==0)//First loop that checks if the year is divisible\
    \ by 4\n    {\n        lpyear=1;\n        if((yr%100)==0)//Second loop that checks\
    \ if the year is divisible by 4\n        {\n            lpyear=0;\n          \
    \  if((yr%400)==0)//Third loop that checks if the year is divisible by 4\n   \
    \         {\n                lpyear=1;\n            }\n        }\n    }\nif (lpyear==1)\n\
    {\n    document.write(yr+\" is a leap year\");\n}\nelse\n{\n    document.write(yr+\"\
    \ is not a leap year\");\n}\n}\n</script>\n</html>\n```"
