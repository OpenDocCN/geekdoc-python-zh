    \ building.\n\nThere are three buttons on top of the editor that enable us to\
    \ build and run our project.\n\n![](img/443990a0ec620659ce8be783c0758bc6_21_0.png)\n\
    \nThe yellow gear button enables you to build the project, the green play button\
    \ enables you to run the build project, while the third, which is a combination\
    \ of the gear and play button, enables you to build and run the project. Click\
    \ on the combination of the two to execute the project.\n\nA pop-up window will\
    \ appear with the words 'Hello World' as shown below.\n\n![](img/443990a0ec620659ce8be783c0758bc6_22_0.png)\n\
    \nThis is what is known as the **console** or **terminal**. The console shows\
    \ the output in C++. Just close the window to get rid of it.\n\nNOTE: make sure\
    \ that you save your file before building and running it, this can be done by\
    \ pressing **Control-s (Ctrl+s)** after every change.\n\n### Explanation of the\
    \ code\n\nThe main line in this program, is the line:\n\n```cpp\ncout << \"Hello\
    \ World\" << endl;\n```\n\nFirst of all, notice that the line ends with a semicolon\
    \ (;), this is very important as it indicates the end of this instruction.\n\n\
    **cout** is just the programmer way of calling a screen, you can think of it as\
