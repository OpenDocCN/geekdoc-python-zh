- md: "## Variables\n\nIntroduction to variables\nThink of a variable as a container\
    \ used to hold some value. A variable is a location in memory holding some value.\
    \ In static type programming language such as C and C++ variable type must be\
    \ declared beforehand and variable type cannot change anytime later. That is why\
    \ we first declare the variable where we assign the value type then we assign\
    \ a value to the variable.\nBelow is an example of variable declaration and assignment\
    \ in a statically typed language.\n**int var;** Variable declaration of type integer.\n\
    **var = 8;** Variable assignment to 8.\nBut since Python is dynamically typed\
    \ you don’t have to declare variable type first, it will automatically work out\
    \ the variable type for you. To define a variable, assign a value to variable\
    \ name using equality sign. This is called assignment operator. The code below\
    \ assigns three variables to a string, integer and a float.\n\n```python\n# variables\n\
    \nlang = \"python\"\nnum1 = 2\nnum2 = 3.4\n\nprint(lang)\nprint(num1)\nprint(num2)\n\
    print('\\n')\n\nprint(type(lang))\nprint(type(num1))\nprint(type(num2))\n```\n\
    \n## Output:\n\n```\npython\n2\n3.4\n```\n\n```\n<class 'str'>\n<class 'int'>\n\
    <class 'float'>\n```\n\nObserve that each variable has a type without being explicitly\
    \ defined.\nString variables are declared with either single quotes or double\
    \ quotes.\nWe can define several variables on one line such as var1, var2, var3\
    \ = 1, 2, 3.\n\n```python\nx, y, z = 1, 2, 3\nprint(x, y, z)\n```\n\n## Output:\n\
    \n```\n1 2 3\n```\n\n## Variable Name Rules\n\nIn Python variable names have few\
    \ rules. The rules are:\n\n- 1. Variable name must start with a letter or “_”\
    \ underscore.\n- 2. Name of variables must be alphanumeric; no special characters\
    \ are allowed.\n- 3. Variable name is case sensitive A and a are different variables.\n\
    \nExample of different variable names.\n\n```python\nnum = 1\nNUM = 2\n_2num =\
    \ 3\nnum2 = 4\nnum2_ = 5\n\nprint(num, NUM, _2num, num2, num2_)\n```\n\n```\n\
    1 2 3 4 5\n```\n\nNote that on the above snippet variables names were assigned\
    \ a meaningful named. This is very important on programming as it makes reading\
    \ programs easy to read.\n\n## Global and Local Variables\n\nVariables that are\
    \ created outside functions are accessible to any function. They are called global\
    \ functions. Global variables can be accessed by any function. Local variables\
    \ are variables that are defined inside functions and cannot be accesses from\
    \ outside function scopes.\n\nIn the code below “lang” variable is global so func()\
    \ function can access it. When func() is called the output is Python.\n\n```python\n\
    # this variable is global to this scope\nlang = \"Python\"\n\ndef func():\n  \
    \  print(lang)\n\nfunc()\n```\n\n```\nPython\n```\n\n```python\n# this variable\
    \ is global to this scope\nlang = \"Python\"\n\ndef func():\n    # this variable\
    \ is local to this function\n    lang = \"C++\"\n    print(lang)\n\nfunc()\nprint(lang)\n\
    ```\n\n```\nC++\nPython\n```\n\nSimilarly, here “lang” variable is global, but\
    \ we also have variable named lang that is equal to C++. When func() is called\
    \ the output is C++ because the local variable inside func have precedence over\
    \ global variable outside func. However, when we print variable lang we see that\
    \ the global variable didn’t change. That is because even though we have lang\
    \ variable inside func and outside, there scopes are separate and they do not\
    \ interfere/override with each other.\n\n## Assignment Operators\n\nAssignments\
    \ operators are used to assign values in Python. They are also used to manipulate\
    \ and update variable values. The table below shows assignment operators and their\
    \ names. These operators are used as shorthand to their equivalents.\n\n| Operator\
    \ | Name | Example | Equivalent |\n| :--- | :--- | :--- | :--- |\n| = | Assignment\
    \ operator | j = 2 | j = 2 |\n| += | Addition assignment | j += 2 | j = j + 2\
    \ |\n| -= | Subtraction assignment | j -= 2 | j = j - 2 |\n| *= | Multiplication\
    \ assignment | j *= 2 | j = j * 2 |\n| /= | Division assignment | j /= 2 | j =\
    \ j / 2 |\n| %= | Modulus assignment | j %= 2 | j = j % 2 |\n| **= | Exponential\
    \ assignment | j **= 2 | j = j**2 |\n\n```python\na, b, c, d, e, f = 1, 1, 1,\
    \ 1, 1, 1\n\na += 2\nb -= 2\nc *= 2\nd /= 2\ne %= 2\nf **= 2\n\nprint(\"a is \"\
    , a)\nprint(\"b is \", b)\nprint(\"c is \", c)\nprint(\"d is \", d)\nprint(\"\
    e is \", e)\nprint(\"f is \", f)\n```\n\n```\na is 3\nb is -1\nc is 2\nd is 0.5\n\
    e is 1\nf is 1\n```\n\nThe script below, assign all variables a, b, c, d, e, f\
    \ in line 1, to 1. Then it uses assignment operator to update variables values.\
    \ Investigate the output to understand how operator assignment work.\n\n## String\
    \ Methods\n\nOne of the most powerful aspects of Python, is that it provides powerful\
    \ functions right out of the box without having to re-implement them. String methods\
    \ in Python are versatile and so powerful that it spares you the need to spend\
    \ time implementing them from scratch. You can easily manipulate string with them.\
    \ In this section we will learn some of Python string methods.\n\nHere is list\
    \ of common Python string methods.\n\nString concatenation : to concatenate two\
    \ strings together just use + operator.\n\n```python\nA = \"Hello\"\nB = \"World\"\
    \nA + B  # returns \"Hello World\"\n```\n\nAlso multiplying a string by any number\
    \ n repeats the string n times.\n\n```python\nA = 5 * \"hi\"\nA  # returns \"\
    hihihihihi\"\n```\n\nlen(str) – length function returns string characters length.\n\
    \nlen(\"python is amazing\") - returns 17. Note that len count spaces too!\n\n\
    str[index] – indexing operator, selects a single character from string. The number\
    \ inside the brackets is called index, it is an integer value. Indexing in Python\
    \ starts at zero.\n\n```python\na = \"Python\"\na[0]  # value is \"P\"\na[5] \
    \ # value is \"n\"\n```\n\nYou can also use negative index, where it will start\
    \ indexing backward, starting at the last character.\n\n```python\na[-1]  # value\
    \ is \"n\"\na[-2]  # value is \"o\"\n```\n\nstr[starting_index: ending_index]\
    \ - slicing operator, slices the string at starting index and ends at one character\
    \ before ending index.\n\n```python\na = \"Programming is amazing\"\na[0:11] \
    \ # value is \"Programming\"\na[15:19]  # value is \"amaz\"\n```\n\nin - in operator\
    \ returns True if character is in string.\n\n```python\nlang = \"language\"\n\"\
    a\" in lang  # returns True\n```\n\nstr.split(char) — Split a string into a list\
    \ of strings by character char\n\n```python\nlangs = \"Python,C++,C\"\nlangs.split(\"\
    ,\")  # returns ['Python', ' C++', 'C']\n```\n\nstr.replace(oldval, newval) -\
    \ replace phrase oldval with newval in string str.\n\n```python\nA = \"Python\
    \ is powerful\"\nA.replace(\"Python\", \"C++\")  # returns 'C++ is powerful'\n\
    ```\n\nf-string — is an easy way to format strings and variables, they are easy\
    \ to use and also faster.\n\n```python\nn = 7\nprint(\"number is \", n)  # outputs\
    \ \"number is 7\"\nprint(f\"number is {n}\")  # outputs \"number is 7\"\n```\n\
    \n**str.capitalize()** - Capitalize first letter of string, if its already capitalized\
    \ it returns the original string.\n\n```python\nsent = \"message was sent\"\n\
    sent.capitalize()  # returns \"Message was sent\"\n```\n\n**str.count(substring)**\
    \ - returns how many times substring occurs in str.\n\n```python\nmess = \"Life\
    \ is beautiful\"\nmess.count('is')  # returns 1.\n```\n\n**str.isalnum()** - returns\
    \ true if a string is alphanumeric meaning it's a combination of alphabet or/and\
    \ numbers.\n\n```python\na = 'door2'\nb = 'door'\nc = 'door#$'\na.isalnum()  #\
    \ return True.\nb.isalnum()  # return True.\nc.isalnum()  # return False.\n```\n\
    \nstr.isalpha() — returns True if all string characters are letters.\n\n```python\n\
    a = 'door1'\na.isalpha()  # returns False\n```\n\nstr.isdigit() - returns True\
    \ if str contains digits only.\n\n```python\nn = '324235'\nm = 'd4ds'\nn.isdigit()\
    \  # returns True\nm.isdigit()  # returns False\n```\n\n**str.islower()**- returns\
    \ True if string characters are all lowercase.\n\n```python\ns = \"People\"\n\
    s.islower()  # return False\n```\n\n**str.isupper()**- returns True if string\
    \ characters are all uppercase.\n\n```python\nS = \"ALL\"\ns.isupper()  # returns\
    \ True.\n```"
  mdcn: "## 变量\n\n变量简介\n将变量想象成一个用来存放某个值的容器。变量是内存中存放某个值的位置。在静态类型编程语言（如 C 和 C++）中，变量类型必须事先声明，并且变量类型不能随时更改。这就是为什么我们首先声明变量并指定其值类型，然后再为变量赋值。\n\
    以下是在静态类型语言中声明和赋值变量的示例。\n**int var;** 声明一个整数类型的变量。\n**var = 8;** 将变量赋值为 8。\n但由于\
    \ Python 是动态类型的，你不必先声明变量类型，它会自动为你推断变量类型。要定义一个变量，只需使用等号将值赋给变量名即可。这称为赋值运算符。下面的代码将三个变量分别赋值为字符串、整数和浮点数。\n\
    \n```python\n# 变量\n\nlang = \"python\"\nnum1 = 2\nnum2 = 3.4\n\nprint(lang)\n\
    print(num1)\nprint(num2)\nprint('\\n')\n\nprint(type(lang))\nprint(type(num1))\n\
    print(type(num2))\n```\n\n## 输出：\n\n```\npython\n2\n3.4\n```\n\n```\n<class 'str'>\n\
    <class 'int'>\n<class 'float'>\n```\n\n观察每个变量都有一个类型，而无需显式定义。\n字符串变量可以用单引号或双引号声明。\n\
    我们可以在一行中定义多个变量，例如 var1, var2, var3 = 1, 2, 3。\n\n```python\nx, y, z = 1, 2, 3\n\
    print(x, y, z)\n```\n\n## 输出：\n\n```\n1 2 3\n```\n\n## 变量命名规则\n\n在 Python 中，变量名有几条规则。规则如下：\n\
    \n- 1. 变量名必须以字母或下划线“_”开头。\n- 2. 变量名必须是字母数字组合；不允许使用特殊字符。\n- 3. 变量名区分大小写，A 和 a 是不同的变量。\n\
    \n不同变量名的示例。\n\n```python\nnum = 1\nNUM = 2\n_2num = 3\nnum2 = 4\nnum2_ = 5\n\n\
    print(num, NUM, _2num, num2, num2_)\n```\n\n```\n1 2 3 4 5\n```\n\n请注意，在上面的代码片段中，变量名被赋予了有意义的名称。这在编程中非常重要，因为它使程序更易于阅读。\n\
    \n## 全局变量和局部变量\n\n在函数外部创建的变量可以被任何函数访问。它们被称为全局变量。全局变量可以被任何函数访问。局部变量是在函数内部定义的变量，不能从函数作用域外部访问。\n\
    \n在下面的代码中，“lang”变量是全局的，因此 func() 函数可以访问它。当调用 func() 时，输出为 Python。\n\n```python\n\
    # 此变量在此作用域内是全局的\nlang = \"Python\"\n\ndef func():\n    print(lang)\n\nfunc()\n\
    ```\n\n```\nPython\n```\n\n```python\n# 此变量在此作用域内是全局的\nlang = \"Python\"\n\ndef\
    \ func():\n    # 此变量在此函数内是局部的\n    lang = \"C++\"\n    print(lang)\n\nfunc()\n\
    print(lang)\n```\n\n```\nC++\nPython\n```\n\n类似地，这里的“lang”变量是全局的，但我们也有一个名为 lang\
    \ 的变量，其值为 C++。当调用 func() 时，输出为 C++，因为 func 内部的局部变量优先于 func 外部的全局变量。然而，当我们打印变量\
