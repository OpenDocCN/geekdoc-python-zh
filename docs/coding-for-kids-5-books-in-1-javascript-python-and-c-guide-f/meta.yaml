  md: '# Intro to html


    # What is html?


    Html stands for Hyper Test Markup Language

    Html is the language that humans use to connect with web browsers like Chrome,
    Internet Explorer, Firefox etc.

    Sometimes, it is assisted by css and JavaScript; but the basic structure of a
    web page is defined by html.

    It is pretty simple and easy to grasp for even beginners to programming and young
    kids.

    Html is done using simple tags that look like the ends of an arrow.


    # Example of a html tag


    Here’s what a html tag looks like:

    **<p>** - Example of a tag

    Every html tag has an extra tag that signals the end of the tag. The ending of
    a tag has a slash in it in addition to the two ends of a tag. See below for a
    simple example.


    ```

    <p> - Tag starts

    </p> - Tag ends

    ```'
