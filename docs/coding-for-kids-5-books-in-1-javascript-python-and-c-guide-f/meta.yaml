    \ 使用 Python 进行数学运算\n\nPython 是一种非常适合执行和分析用户数据的编程语言。我们将介绍一些帮助你熟悉 Python 的函数。现在，这一部分并非适合所有人。它适合那些有兴趣在程序中实现数学运算，或者喜欢数学并希望看到它在\
    \ Python 中实现的人。其中一些概念在高中教授，因此这一部分可能不适合年幼的学生。\n\n### int/float\n\n**int** — 接受字符串变量并返回整数，如果传递浮点数则返回浮点数的整数部分。\n\
    \n**float** — 接受字符串变量并将其转换为浮点数。\n\n让我们看下面的例子。\n在这个例子中，我们将 3 个数字通过 `int` 和 `float`\
    \ 处理，并查看输出。\n\n```python\nxi = int(5.2)\nyi = int(5)\nzi = int(\"5\")\nxf = float(\"\
    5.2\")\nyf = float(5.01)\nzf = float(5)\n\nprint(f\"xi is {xi} and it's type is\
