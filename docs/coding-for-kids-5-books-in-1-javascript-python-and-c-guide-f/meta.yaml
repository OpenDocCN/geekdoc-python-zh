    \n![](img/443990a0ec620659ce8be783c0758bc6_35_0.png)\n\n![](img/443990a0ec620659ce8be783c0758bc6_35_1.png)\n\
    \n## string\n\n字符串是用于存储文本的变量。它可以容纳任意长度的字符串。在下面的示例中，**yourName** 是一个变量，保存着值 \"\
    **Catherine**\"。\n\n![](img/443990a0ec620659ce8be783c0758bc6_36_0.png)\n\n![](img/443990a0ec620659ce8be783c0758bc6_36_1.png)\n\
    \n## 变量名\n\nC++ 变量名必须以字母或下划线开头，其余所有字符必须是字母、数字或下划线。\n\n有效变量名的示例：\n\n- x\n- x1\n\
    - x_1_abc\n- RATE\n- bigBonus_\n\n无效变量名的示例：\n\n- 12\n- 3x\n- %change data\n- -1\
    \ PROG.CPP\n\n前三个，12、3x、%change，是不允许的，因为它们不是以字母或下划线开头。\n\nC++ 也是区分大小写的，这意味着以下是三个不同的变量名：\n\
    \n- Rate\n- RATE\n- Rate\n\n## 驼峰命名法\n\n驼峰命名法是一种编程实践，其中多个单词写在一起没有空格，并且每个单词的首字母大写（第一个单词除外）。\n\
    \n单词 *end of car* 将变成：endOfCar。\n驼峰命名法是命名变量时常用的编程实践。\n\n## 关键字\n\n关键字是不能用作变量名的名称，因为它们是为编程语言语法保留的。\n\
    \n如果将它们用作变量名，编译器将抛出错误，或者你可能最终会改变某些基本函数的基本功能。\n\n关键字的示例包括基本数据类型，如 int、bool 等，以及\
    \ struct 和 class 等名称。\n\n## 注释\n\n有时我们想解释我们的代码，以便其他人可以理解我们做了什么。将来，这些信息将帮助我们在回顾代码时记住我们做了什么。\n\
    \n在编程中，我们通过在代码中编写注释来实现这一点。有两种类型的注释：单行注释和多行注释。\n\n单行注释以两个正斜杠（//）开头，而多行注释位于以下符号之间：/\\\
    *\\*/\n\n注释示例：\n\n```\n// 测试代码\n\n/* 注释第 1 行\n注释第 2 行 */\n```\n\n## 声明变量\n\n所有变量在使用前都必须声明或定义。\n\
    \n要声明/定义一个变量，你只需要指定一个数据类型和一个变量名，后跟一个分号：\n\n当你声明一个变量而不给它一个值时，我们说该变量是 *未初始化* 的。\n\
    未初始化的变量将有一个随机值。\n\n给未初始化的变量赋值称为 *初始化* 它。\n\n你也可以同时声明和初始化一个变量。\n\n在这个示例中，我们将利用注释并声明一些变量，其值将打印到控制台。\n\
    \n在 Code::Blocks 中创建一个新项目，编写以下代码，构建并运行它。\n\n## 示例代码\n\n```cpp\n#include <iostream>\n\
    using namespace std;\n\nint main() {\n\n    /*\n        这是一个多行注释\n        可以看到，它跨越\n\
    \        多行\n    */\n        int length; // 声明变量 length\n        int width; //\
    \ 声明变量 width\n\n        length = 20; // 初始化变量 length\n        width = 20;// 初始化变量\
    \ width\n\n        int depth = 40; // 声明并初始化\n\n        cout << length << endl;\n\
    \        cout << width << endl;\n        cout << depth << endl;\n\n        return\
    \ 0;\n    }\n```\n\n## 解释\n\n在上面的程序中，在 main 代码块中，我们首先通过在 /\\*\\*/ 之间编写来编写一个多行注释。\n\
    然后我们声明两个 int 类型的变量 *length* 和 *width*，而不初始化它们，我们稍后再做。\n\n然后我们声明并初始化 int 类型的变量\
    \ *depth* 为 40。最后，我们将 length、width 和 depth 的值打印到控制台，每个值各占一行。\n\n## 练习\n\n1.  编写一个程序，包含输出五个或六个已定义但未初始化的变量值的语句。编译并运行程序。输出是什么？解释一下。\n\
    2.  创建一个包含你名字的字符串变量并将其打印到控制台。\n3.  创建一个 char 变量并将其打印到控制台。\n4.  创建一个 bool 变量并将其打印到控制台。\n\
    5.  创建一个 float 变量并将其打印到控制台。\n6.  创建一个名为 time of day 的 long 变量，使用驼峰命名法，并将其打印到控制台。\n\
    \n## 数学运算\n\n在本节中，我们将制作一个只执行两个数字乘法的小计算器。程序将要求我们输入两个要相乘的数字，并打印乘法的结果。\n\n首先，我们将介绍如何在\
    \ C++ 中执行数学运算。\n\n## 加法\n\n加法使用 + 运算符完成。\n\n## 加法示例代码\n\n```cpp\n#include<iostream>\n\
    using namespace std;\n\nint main(){\n    int x = 1;\n    int y = 2;\n    int sum\
    \ = x + y;\n    cout << sum;\n    return 0;\n}\n```\n\n代码的输出将是 **3**，这是 x 和 y\
    \ 的和。\n\n## 减法"
