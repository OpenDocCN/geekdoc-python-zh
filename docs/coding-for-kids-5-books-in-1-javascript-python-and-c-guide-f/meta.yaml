    # Python Keywords


    1. Syntax

    Syntax is to Python what grammar is to English. It is a set of rules that must
    be followed while writing code. Ex: there is a syntax to display output, there
    is a syntax to perform complex math functions etc.


    2. Comments

    Comments are statements which the Python code will ignore. They are used to explain
    your code to other users, describe the purpose of a particular piece of code etc.
    The syntax for adding comments is:


    ```

    # Add your comment

    ```


    Python will ignore the line which is preceded by a #


    3. Variable

    A variable is used to store names or value(s) in Python. Think of it as a box
    that can value(s). That box is referenced each time you need that value(s). The
    syntax for defining a variable is as below:


    ```

    var = 10

    ```'
  - '[PAGE 429]


    In the above example, var is the name of the variable, and it stores a value of
    10. Anytime, you use the name ‘var’ in your code, Python will replace it with
    the value, i.e. 10.


    The basic types of values a variable can store are:

    - String to store text values, ex: var = ‘Python is fun’

    - Integer to store integer values, ex: var = 10

    - Float to store decimal values, ex: var = 9.81

    - Boolean to store True/False, ex: var = True

    A variable can also store more than one value, and more on that will be discussed
    later.


    # 4. Function


    A function in Python is a set of lines of code with a name assigned to it. A function
    is used when a certain piece of code needs to be used in multiple places. Instead
    of typing the lines each time, you can type the function name. When Python sees
    the function name, it executes the lines of code associated with that function
    name. First, you have to define a function in the below format:


    ```

    def my_function( input variables ):

    ```'
