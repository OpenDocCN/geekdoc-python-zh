- md: "## Practice Problems\n\n1. Write a program that takes in a string and prints\
    \ out every 2nd character in the string. For example “wfwfwkfnfwbej” would print\
    \ out “ffkbwj”.\n2. Write a program that takes in a long sentence and replaces\
    \ all instances of the word “red” with “yellow”.\n3. Write a program that takes\
    \ in an address and checks if the zip code contains 5 characters. If it contains\
    \ more or less, or there is no zip code, print out “Invalid Address”.\n\n## Arrays\n\
    \nAn array in JavaScript is used to store a group of similar variables. Think\
    \ about how you would store ages of people using variables. Let’s say we have\
    \ three people and their ages. We can store them in variables age1; age2 and age\
    \ 3.\n\n```\nage1=5;\nage2=25;\nage=45;\n```\n\nNow, let’s say we have 10 people.\
    \ We can store it in variables age1, age2..... age10. Now, what if we had to store\
    \ it for 100 people. You get the picture. There are too many variables to track.\
    \ For this reason, we use arrays. For storing 10 ages, we can just use.\n\n```\n\
    age=[5,25,45,60,20,23,24,43,34,78];\n```\n\nTo access the values in Javascript,\
    \ we use the index of the array. The index of the 1st element is 0, 2nd is 1,\
    \ 3rd is 2 and so on.... For example,\n\n**document.write(age[0])** outputs 5;\n\
    **document.write(age[1])** outputs 25;\n**document.write(age[5])** outputs 23.\n\
    \n### Example 1 – Creating An Array in JavaScript\n\nNow, let’s look at the example\
    \ below. We create 3 arrays in JavaScript for name, age and state of 5 people.\
    \ We print these out using array index. And then we add a 6th person using **.push()**\
    \ feature. Check out the code and output below.\n\n```\n<html>\n<head><title>JavaScript\
    \ Lesson 5 - Arrays</title></head>\n<body>\n<link rel=\"stylesheet\" href=\"samplestyle.css\"\
    \ />\n\n<button onclick=\"createarray()\">Print Array</button>\n\n<script>\n\n\
    function createarray()\n{\ndocument.write('<link rel=\"stylesheet\" type=\"text/css\"\
    \ href=\"samplestyle.css\" />');\ndocument.write('<br>');\n\nvar nm = [\"Jim\"\
    ,\"Tim\",\"Kim\",\"Bim\",\"Sam\"];\nvar age=[7,56,40,34,56];\nvar state=[\"Florida\"\
    ,\"California\",\"Georgia\", \"Illinois\", \"Nevada\"];\ndocument.write(nm[0]+'\
    \ lives in '+state[0]+' state and age is '+age[0]+\"<br>\");\ndocument.write(nm[1]+'\
    \ lives in '+state[1]+' state and age is '+age[1]+\"<br>\");\ndocument.write(nm[2]+'\
    \ lives in '+state[2]+' state and age is '+age[2]+\"<br>\");\ndocument.write(nm[3]+'\
    \ lives in '+state[3]+' state and age is '+age[3]+\"<br>\");\ndocument.write(nm[4]+'\
    \ lives in '+state[4]+' state and age is '+age[4]+\"<br>\");\nname.push(\"Yang\"\
    );//Adding another index to the array\nage.push(20);\nloc.push(\"California\"\
    );\ndocument.write(nm[5]+' lives in '+state[5]+' state and age is '+age[5]+\"\
    <br>\");\n\n}\n</script>\n\n</body>\n</html>\n```\n\n### Output:\n\n![](img/443990a0ec620659ce8be783c0758bc6_333_0.png)\n\
    \nOn clicking **Print Array**, we get..\n\n![](img/443990a0ec620659ce8be783c0758bc6_334_0.png)\n\
    \n### Example 2 – Assigning An Array Through A Form\n\nIn this example, we input\
    \ name, age and state through a html form. In Javascript, we assign the form elements\
    \ to variables.\n3 names, ages and state locations are entered via a form and\
    \ entered into 3 arrays using **document.getElementById**.\nThe array is printed\
    \ at the end using **document.write()**.\n\n```\n<html>\n<head><title>JavaScript\
    \ Lesson 5 - Arrays</title></head>\n<body>\n<link rel=\"stylesheet\" href=\"samplestyle.css\"\
    \ />\nEnter Name1 <input name=\"name\" type=\"text\" id=\"name0\" size=\"20\"\
    ><br>\nEnter Age1 <input name=\"age\" type=\"number\" id=\"age0\" size=\"20\"\
    ><br>\nEnter State1 <input name=\"state\" type=\"text\" id=\"state0\" size=\"\
    20\"><br>\n\nEnter Name2 <input name=\"name\" type=\"text\" id=\"name1\" size=\"\
    20\"><br>\nEnter Age2 <input name=\"age\" type=\"number\" id=\"age1\" size=\"\
    20\"><br>\nEnter State2 <input name=\"state\" type=\"text\" id=\"state1\" size=\"\
    20\"><br>\n\nEnter Name3 <input name=\"name\" type=\"text\" id=\"name2\" size=\"\
    20\"><br>\nEnter Age4 <input name=\"age\" type=\"number\" id=\"age2\" size=\"\
    20\"><br>\nEnter State4 <input name=\"state\" type=\"text\" id=\"state2\" size=\"\
    20\"><br>\n<button onclick=\"createarray()\">Start Program</button>\n```\n\n```\n\
    <script>\n\nfunction createarray()\n{\nvar nm=[];\nvar age=[];\nvar state=[];\n\
    \nnm[0]=document.getElementById(\"name0\").value;\nage[0]=document.getElementById(\"\
    age0\").value;\nstate[0]=document.getElementById(\"state0\").value;\nnm[1]=document.getElementById(\"\
    name1\").value;\nage[1]=document.getElementById(\"age1\").value;\nstate[1]=document.getElementById(\"\
    state1\").value;\nnm[2]=document.getElementById(\"name2\").value;\nage[2]=document.getElementById(\"\
    age2\").value;\nstate[2]=document.getElementById(\"state2\").value;\n\ndocument.write('<link\
    \ rel=\"stylesheet\" type=\"text/css\" href=\"samplestyle.css\" />');\ndocument.write('<br>');\n\
    document.write(nm[0] + \" is \"+age[0]+\" years old and lives in \"+state[0]+\"\
    <br>\");\ndocument.write(nm[1] + \" is \"+age[1]+\" years old and lives in \"\
    +state[1]+\"<br>\");\ndocument.write(nm[2] + \" is \"+age[2]+\" years old and\
    \ lives in \"+state[2]+\"<br>\");\n\n}\n```\n\n### Output:\n\n![](img/443990a0ec620659ce8be783c0758bc6_336_0.png)\n\
    \nOn Clicking **Start Program**, we get:\n\n![](img/443990a0ec620659ce8be783c0758bc6_336_1.png)\n\
    \n### Example 3 – Guess World Capitals\n\nIn this program, we code a quiz that\
    \ asks the user the capital of a random country around the world, and checks if\
    \ the answer is correct.\nIn the program, the one button runs the **worldquiz()**\
    \ function. In the function, we declare two arrays. One array contains all the\
    \ countries around the world; and the other contains all the capitals.\nYou can\
    \ get the values for these arrays below:\n[https://drive.google.com/file/d/1Vbnrllk290oVmh3Vn8Jv2EgFBL1w8vSd/view?usp=sharing](https://drive.google.com/file/d/1Vbnrllk290oVmh3Vn8Jv2EgFBL1w8vSd/view?usp=sharing)\n\
    We then chose a random number between 0 and x, x being the length of the array.\
    \ This random number picks a random country from the array. We do this using **Math.random()**\
    \ and **Math.floor()**.\nWe take in a user guess for the capital using **prompt**.\
    \ We compare the user guess to the actual capital. Then, we send the user a message\
    \ telling them they’re correct or wrong (with the correct capital if they’re wrong).\n\
    Then, the user has the chance to restart the program with the **Home** button\
    \ that runs the **redirect()** function. The redirect function runs ‘**GuessWorldCapitals.html**’\
    \ which is the name of the file. The code and the outputs are shown below.\n\n\
    ```\n<html>\n<head><title>Guess World Capitals</title>\n<link rel=\"stylesheet\"\
    \ href=\"styles.css\" />\n</head>\n<body>\n<button class=\"btn a\" onclick=\"\
    worldquiz()\">Start Quiz</button>\n<script>\n\nfunction worldquiz()\n{\n\nvar\
    \ countries = [\"Afghanistan\",\"Albania\",\"Algeria\",\"Andorra\",\"Angola\"\
    ,\"Antigua and Barbuda\",\"Argentina\",\"Armenia\",...];\nvar capitals = [\"Kabul\"\
    ,\"Tirana (Tirane)\",\"Algiers\",\"Andorra la Vella\",\"Luanda\",\"Saint John's\"\
    ,\"Buenos Aires\",\"Yer...];\nvar randomcountrynumber = Math.floor(Math.random()\
    \ * countries.length);\nvar chosencountry = countries[randomcountrynumber];\n\
    var chosencapital = capitals[randomcountrynumber];\nvar guess = prompt(\"What\
    \ is the capital of \"+chosencountry+\" ?\");\n\nif (guess.toUpperCase()==chosencapital.toUpperCase())\n\
    {\n    document.write(\"<p>Congratulations. You are correct.</p>\");\n}else\n\
    {\n    document.write(\"<p>Wrong. The capital is \"+chosencapital+\"</p>\");\n\
    }\n\ndocument.write('<link rel=\"stylesheet\" type=\"text/css\" href=\"styles.css\"\
    \ />');\ndocument.write('<br>');\n\ndocument.write('<button onClick=\"redirect()\"\
    >Home</button>');\n\n}\nfunction redirect()\n{\nwindow.location.replace(\"GuessWorldCapitals.html\"\
    );\n}\n\n</script>\n</body>\n</html>\n```\n\n### Output #1:\n\n![](img/443990a0ec620659ce8be783c0758bc6_338_0.png)\n\
    \nClick **Start Quiz**\n\n![](img/443990a0ec620659ce8be783c0758bc6_339_0.png)\n\
    \n![](img/443990a0ec620659ce8be783c0758bc6_339_1.png)\n\n### Output #2:\n\n![](img/443990a0ec620659ce8be783c0758bc6_339_2.png)\n\
    \nWrong. The Capital Is Addis Ababa\n\nHome\n\n### Example 4 – Random Jokes\n\n\
    This program prints a random joke out a random joke picked from a list of jokes.\
    \ The one button runs the **writejoke()** function. In the function, we declare\
    \ an array that contains all the jokes.\nYou can get the values for the array\
    \ below:\n[https://drive.google.com/file/d/1xDN9dt2Gvj-mdPmi5ATCnP1tvOZtZt25/view?usp=sharing](https://drive.google.com/file/d/1xDN9dt2Gvj-mdPmi5ATCnP1tvOZtZt25/view?usp=sharing)\n\
    We then chose a random number between 0 and x, x is the length of the array. This\
    \ random number picks a random country. We do this using **Math.random()** and\
    \ **Math.floor()**.\nWe then print out the joke using the **document.write()**\
    \ function.\nThen, the user has the chance to restart the program with the **Home**\
    \ button that runs the **redirect()** function."
  mdcn: "## 练习题\n\n1.  编写一个程序，接收一个字符串并打印出字符串中每隔一个的字符。例如，“wfwfwkfnfwbej”会打印出“ffkbwj”。\n\
