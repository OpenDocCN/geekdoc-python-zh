    # MouseClick – Hide and Seek


    In the below example, we upload a html image and choose a random position on the
    image as the location of “Tim” in our hide and seek game. Now, we click on different
    positions within the image. The program calculates how far the click is from Tim
    using Pythagros theorem. You can get the image using the link below, or use your
    own image.

    Hide and Seek Picture Link:

    [https://drive.google.com/file/d/1gmPI4Z2Rm9iAA9vEBi7LWehe-uNE2UQ4/view?usp=sharing](https://drive.google.com/file/d/1gmPI4Z2Rm9iAA9vEBi7LWehe-uNE2UQ4/view?usp=sharing)

    In the below code, **timx** and **timy** are two random numbers between 0 and
    500 that determine the x and y co-ordinates of where Tim is hidden in this picture.

    **mousec(event)** is the function that runs when the mouse is clicked. Inside
    the function **event.offsetX** gives the x co-ordinate of the click and **event.offsetY**
    gives the y-coordinate of the click. **ctr** is a counter that counts the number
    of clicks and increments by 1 inside the **mousec** function.

    The program then uses Pythagros theorem to find the distance between Tim and the
    mouseclick and prints the distance as an alert.

    Once the distance is less than 10 pixels; you found Timmy and the program prints
    out the number of clicks it took.'
