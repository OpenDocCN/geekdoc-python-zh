    \n**font-size:** 指定字体的大小。\n\n**background-color:** 指定元素的背景颜色。可以从下面链接中的多种颜色中选择。\n\
    https://www.quackit.com/css/css_color_codes.cfm\n\n**color:** 指定书写文本的颜色。\n\n**border:**\
