    \ pygame.\n4. Create a shape similar to Football pitch picture below.\n\n![](img/443990a0ec620659ce8be783c0758bc6_615_0.png)\n\
    \n# Animations in Pygame\n\nAnimations are images manipulated to appear as moving\
    \ pictures. To make an animation we create many continues pictures/shapes and\
    \ view them continuously. The number of times we update the screen is called Frames\
    \ per second (fps); fps is the number of frames/pictures showed in second. Greater\
    \ fps numbers make the transitions in videos/games smoother thus increasing the\
    \ quality. The game loop discussed in earlier chapter is responsible for updating\
    \ the state of game at fps frame per second. This is how games are made, updating\
    \ the screen continuously with pictures at a rate human eyes can’t distinguish\
    \ that pictures are in fact discrete. The figure below shows multiple frames of\
    \ a running horse. Grouping these frames will result in a running horse video.\n\
    \n![](img/443990a0ec620659ce8be783c0758bc6_617_0.png)\n\nThe famous horse in motion\n\
    \n# Growing square\n\nWe make a square that grows in size until it fills the entire\
    \ lower right screen quadrant. The logic is very similar to how we made various\
    \ shapes in the previous example except for 2 main differences. We make pygame\
    \ clock instance `clock=pygame.time.Clock()` , this is a pygame method to keep\
    \ track of time .We use it in the program to control how many frames per seconds\
    \ (fps) we want using `clock.tick(fps)` . Faster fps updates the shape more frequently\
    \ which makes the square grows faster.\n\nThe second difference is that square\
    \ side is not fixed anymore. Every loop iteration the square side is increased\
    \ using line `side = 1.01 * side` , the screen is cleared (filled with white color)\
    \ using `screen.fill(white)` and a new square with the new side size is drawn\
    \ . Experiment with the value 1.01 , observe how increasing/decreasing this value\
    \ affect the animation speed .\n\n```python\n# growing square\nimport pygame\n\
    \n# frames per second to control speed\nfps = 50\n\n# Define some colors\nwhite\
    \ = (255, 255, 255)\nred = (255, 0, 0)\n\n# A clock instance so we can control\
    \ frames per second fps\nclock = pygame.time.Clock()\n\n# initialize display surface\n\
    screen = pygame.display.set_mode((500, 500))\npygame.display.set_caption(\"Growing\
    \ square\")\n\npygame.init()\n# white background\nscreen.fill(white)\n\n# intitial\
    \ square side legnth\nside = 50\n\n# game infinite loop\nloop = True\nwhile loop:\n\
    \    # if quit button press event quit\n    for event in pygame.event.get():\n\
    \        if event.type == pygame.QUIT:\n            loop = 0\n\n    pygame.draw.rect(screen,\
    \ red, (250, 250, side, side))\n\n    # update frame\n    pygame.display.update()\n\
    \n    # update fps frames per second\n    clock.tick(fps)\n\n    side = 1.01 *\
    \ side\n    # clear screen\n    screen.fill(white)\n\npygame.quit()\n```\n\n#\
    \ Output snapshots:\n\n![](img/443990a0ec620659ce8be783c0758bc6_620_0.png)\n\n\
    ![](img/443990a0ec620659ce8be783c0758bc6_620_1.png)\n\n![](img/443990a0ec620659ce8be783c0758bc6_620_2.png)\n\
    \n![](img/443990a0ec620659ce8be783c0758bc6_620_3.png)\n\n# Growing circle\n\n\
    This example is very similar to growing square example. Except that we draw a\
    \ circle instead of square and increase the radius instead of side length.\n\n\
    ```python\n# growing circle\nimport pygame\n\n# frames per second\nfps = 50\n\n\
    # Define some colors\nwhite = (255, 255, 255)\nred = (255, 0, 0)\n\n# A clock\
    \ instance so we can control frames per second fps\nclock = pygame.time.Clock()\n\
    \n# initialize display surface\nscreen = pygame.display.set_mode((500, 500))\n\
    pygame.display.set_caption(\"Growing circle\")\n\npygame.init()\n# white background\n\
    screen.fill(white)\n\n# game infinite loop\nloop = True\n\n# intitial circle radius\n\
    rad = 50\n\nwhile loop:\n\n    # if quit button press event quit\n    for event\
    \ in pygame.event.get():\n        if event.type == pygame.QUIT:\n            loop\
    \ = 0\n\n    pygame.draw.circle(screen, red, (250, 250), rad)\n\n    # update\
    \ frame\n    pygame.display.update()\n\n    # update fps frames per second\n \
    \   clock.tick(fps)\n\n    rad = 1.01 * rad\n    # clear screen\n    screen.fill(white)\n\
    \npygame.quit()\n```\n\n# Output snapshots:\n\n![](img/443990a0ec620659ce8be783c0758bc6_623_0.png)\n\
    \n![](img/443990a0ec620659ce8be783c0758bc6_623_1.png)\n\n# Moving a ball in different\
    \ direction\n\nIn this example we move a ball in 4 different directions using\
    \ move_right, move_left, move_up, and move_down functions.\nThe logic is similar\
    \ to previous examples, instead of growing shape size every frame we ‘grow’ object\
    \ position each time.\nThe ball starts in the center and keeps moving until it\
    \ hits border where restarts from center again.\nmove_right() function works by\
    \ updating the ball coordinates. The function does not take any inputs because\
    \ it accesses x and y directly in the global scope because x and y are defined\
    \ as a global variable.\nWith each function call the x coordinate is incremented\
    \ by step size of 2 pixels. The step size determines how smooth the shape moves.\n\
    The function makes sure the ball is near border by never incrementing x beyond\
    \ 480. The background surface size is 500. If x > 480 the ball position is reset\
    \ to center.\n\n```python\n# global x and y so it have access to outer x and y\n\
    # right function\ndef move_right():\n    global x,y\n\n    # if ball is near border\
    \ reset to center\n    if x < 480:\n        x = x + 2\n    else:\n        x =\
    \ 250\n        y = 250\n```\n\nOther function move_left, move_up, and move_down\
    \ functions are implemented similarly but with changing whether x and y is incremented\
    \ and detecting a different border.\nRead the code below carefully and try to\
    \ understand it ."
  mdcn: "## 示例 2 悲伤表情\n\n在这个脚本中，我们创建一个愤怒的悲伤表情。这个程序与上一个示例非常相似，只是我们绘制了不同的形状。悲伤表情基本上由1个圆形作为脸部、2个圆形作为眼睛和一个弧线作为嘴巴组成。要理解弧线方法，请阅读\
    \ **pygame** 文档。尝试理解弧线是如何定位的，你将在练习题中用到它。\n\n```python\n# import pygame module\n\
    import pygame\nimport math\n\n# activate a pygame library inst .\npygame.init()\n\
    \n# define the RGB value some colors\nwhite = (255, 255, 255)\nyellow = (255,\
