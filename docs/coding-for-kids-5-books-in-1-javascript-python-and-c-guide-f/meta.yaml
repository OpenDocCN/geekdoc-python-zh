  md: '# Substrings and String Index


    There are a couple of other string manipulation techniques that I would like to
    discuss before we move on. These are string index and substring.

    String Index gives you the position within a certain string that another string
    occurs. For example, the string index of boy in the string “The boy climbed the
    tree” is 4, because boy starts at the 4th character of the overall string.

    A substring lets you extract a section of an existing string. For example, in
    the same string “The boy climbed the tree”; if we do a substring from 6 to 10
    we get “oy cl” because those are the characters between 6 and 10.

    Now, let’s look at an example below:


    ```

    <html>

    <head><title>Substrings and String Index</title></head>

    <body>

    <form id="form1">

    What was your day like?: <textarea name="sentence" cols="20" rows="5" id="sentence"></textarea><br><br>

    What String would you like to find the String Index Of?:<input name="test string"
    type="text" id="tstr" size="20"><br><br>

    </form>


    <button onclick="strindex()">Find Index</button>


    <script>


    function strindex()

    {

    var daydesc=document.getElementById("sentence").value;

    var str = document.getElementById("tstr").value;

    var ind=daydesc.indexOf(str);

    document.write("The String Index is "+ind);

    }


    </script>

    </body>

    </html>

    ```


    In the above example, daydesc is the large string and str is the string we need
    to find the string index for. The variable ind stores the value of the string
    index and then we print the answer using document.write. Now, let’s run the program:'
  merge: -1
