    # Growing Square


    We use the **setInterval** and **fillRect** functions to write a program that
    expands a square. A button when clicked runs the growing square function. In the
    growing square functions, we do a **setinterval** where we run the function **frame()**
    every 10 ms (0.01 seconds). We declare a variable size to 10 pixels. **Size**
    contains the length of the square.

    In the function frame, we first clear the entire canvas using **clearRect()**.
    Then we draw a rectangle starting at (0,0) of length ‘**size**’. **Size** is increased
    by 5 every time the function is executed. Once size is greater than the 500, it
    is set back to 10. This ensures that once the square is larger than the canvas,
    it restarts growing from a small size.'
