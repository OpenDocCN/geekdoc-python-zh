  md: '# Doing Math with JavaScript


    JavaScript is a great programming language to perform calculations and analyse
    data from users. We’ll go over a few functions that help get you going with JavaScript.

    Now, this section is not for everyone. It’s only for those who are interested
    in implementing a lot of math in their programs, or like math and would like to
    see it implemented in JavaScript.


    # ParseInt/ParseFloat


    **parseInt** – ParseInt takes in a string variable and returns an integer. It
    also takes in decimal numbers and converts them to integers.

    **ParseFloat** – ParseFloat is similar to parseInt but works with decimal numbers.

    Let’s look at an example below.

    In the example, we put 3 of the numbers through parseInt and the same numbers
    through parseFloat. And we see the outputs.'
