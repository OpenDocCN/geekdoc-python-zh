  md: '# CSS Terms


    html{}

    The above term is used to define css for the entire html file. Any thing that
    is within the bracket will be used in the html code.


    body{}

    Defines the style for the body of the html code.


    .btn{}

    Sets the style for any buttons in the web page. You have to define a class called
    ‘btn’ in your html code for the button. See code above for example of that.


    .btn:hover{}

    sets the style for the button when you hover the mouse over the button in the
    web page.


    background-color:

    Background color of the website.


    text-decoration:

    Used to add decoration to the text such as wavy, dotted, curved etc.


    text-transform:

    Used the capitalize and un-capitalize entire words or parts of a word


    text-align:

    Can align the text at the left, right or center of the page.


    color:

    Sets the color of the text on the page


    padding:

    Sets the gap between the edge of the page and the text/button elements.


    line-height:

    Sets the height of the line for the text.


    font-family:

    Sets the type of font that you want to use for the text.


    font-size:

    Sets the size of the font.


    font-weight:

    Can set the font as bold when needed.'
