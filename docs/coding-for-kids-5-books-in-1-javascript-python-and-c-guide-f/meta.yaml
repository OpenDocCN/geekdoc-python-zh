    \n![](img/443990a0ec620659ce8be783c0758bc6_630_2.png)\n\n## Example 4 Bouncing\
    \ ball\n\nIn this program we create a ball that keep bouncing off borders.\nWhat\
    \ does it mean for a ball to bounce off border?\nEarlier we kept moving the ball\
    \ by incrementing/decrementing its x and y position by a unit step.\nIn moving\
    \ the ball right, we incremented x by 1, while we decremented x by 1 to move it\
    \ to left. So, to bounce the ball of a given border we need to detect which border\
    \ it is hitting and increment or decrement the right coordinate x or y.\nIn bounce\
    \ function,\n\n```python\nstepx = -1 * stepx , flip x direction if right or left\
    \ borders touched\nstepy = -1 * stepy , flip y direction if top or bottom borders\
    \ touched\n```\n\nThese lines keep flipping the corresponding coordinate whenever\
    \ a border is touched.\n\n```python\n# bouncing ball\nimport pygame\nimport random\n\
    \n# frames per second\nfps = 50\n\n# Define some colors\nwhite = (255, 255, 255)\n\
    red = (255, 0, 0)\n\n# A clock instance so we can control frames per second fps\n\
