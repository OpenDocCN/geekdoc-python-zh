- md: "## Example 2 Frowny face\n\nIn this script we create an angry frowny face.\
    \ This program is very similar to the last example. Except that we draw different\
    \ shapes. Frowny face basically consists of a 1 circle for face, 2 circles for\
    \ eyes and an arc for mouth. To understand arc method, read **pygame** documentation.\
    \ Try to understand how arc gets oriented, you will need it in the practice problems.\n\
    \n```python\n# import pygame module\nimport pygame\nimport math\n\n# activate\
    \ a pygame library inst .\npygame.init()\n\n# define the RGB value some colors\n\
    white = (255, 255, 255)\nyellow = (255, 255, 0)\nred = (255, 0, 0)\n\n# assigning\
    \ width 600 , height 600 to background\ndimensions = (300, 300)\n\n# create the\
    \ display surface object\ndisplay = pygame.display.set_mode(dimensions)\n\n#pygame\
    \ window name\npygame.display.set_caption(\"Frowny face !\")\n\n# Display color\
    \ is white\ndisplay.fill(white)\n\n# Draw face\npygame.draw.circle(display, yellow,\
    \ (150, 150), 50, 0)\n\n# Draw left eye\npygame.draw.circle(display, red, (130,\
    \ 140), 10, 0)\n\n# Draw right eye\npygame.draw.circle(display, red, (170, 140),\
    \ 10, 0)\n\n# Draw mouth using arc\n# arc(surface, color, bounding_rect, start_angle,\
    \ stop_angle, width=1)\npygame.draw.arc(display, red, (135, 175,30,25), 0, math.pi,\
    \ width=1)\n\n# Infinite Loop to keep session on\nwhile True :\n    # iterate\
    \ over the list of Event objects\n    # that was returned by pygame.event.get()\
    \ method.\n    for event in pygame.event.get() :\n\n        # if event object\
    \ type is QUIT when corner exist button is clicked\n        # then quitting pygame\
    \ and program\n        if event.type == pygame.QUIT :\n\n            # kill pygame\
    \ session\n            pygame.quit()\n            # quit the program.\n      \
    \      quit()\n\n        # Draws the objects screen.\n        pygame.display.update()\n\
    ```\n\n# Output:\n\n![](img/443990a0ec620659ce8be783c0758bc6_614_0.png)\n\n![](img/443990a0ec620659ce8be783c0758bc6_614_1.png)\n\
    \n# Practice Problems\n\n1. Use frowny face program discussed earlier and turn\
    \ it into smiley face instead.\n2. Create a display of 800 by 800 and create 4\
    \ sides connected red boarders and a circle centered at center where it is circumscribed\
