  md: '# Creating a Rectangle on the Canvas


    The drawing of a rectangle begins the same way as of a circle; with the canvas
    and 2D context variables. Again, we use **beginPath()** and **clearRect()** to
    start the process. Then we use a function known as **fillRect()** which is shown
    below:

    **fillRect(a,b,c,d)** means that the top left corner of the rectangle starts at
    an x-coordinate of **a** and y-coordinate of **b**; it has a width of **c** and
    a height of **d**. So, we start at **(a,b)**, and clear a canvas of width c and
    height d. In the example below, we start at **(0,0)**, and creates a rectangle
    of width 50 pixels and height 100 pixels. It is a red triangle (since fillRect
    is red).

    There is a second **fillRect()** which creates a square of width 75 pixels (as
    both width and height are set to the same value of 75). The top left corner of
    the square starts at **(150,150)**.

    In both cases, fillRect() automatically draws and fills the rectangle with the
    assigned color.


    ```

    <html>

    <head><title>Sample Canvas</title>

    </head>

    <body>

    <canvas id="acanvas" width="500" height="500" style="border:2px solid"></canvas><br>

    <button class="btn a" onclick="drawsquare()">Draw Square</button>


    <script>

    function drawsquare()

    {

    var i = document.getElementById("acanvas");

    var c2x = i.getContext("2d");


    //Rectangle 1

    c2x.beginPath();

    c2x.fillStyle = "red";

    c2x.clearRect(0, 0, 500, 500);

    c2x.fillRect(0, 0, 50, 100);


    //Square 1

    c2x.beginPath();

    c2x.fillStyle = "blue";

    c2x.fillRect(150, 150, 75, 75);

    }

    </script>

    </body>

    </html>

    ```


