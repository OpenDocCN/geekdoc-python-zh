    Two comparisons can be combined using the “and” operator, which is **&&** in C++.
    For example, the following Boolean expression is true provided a is bigger in
    value than 5 and a is smaller than 10:


    **(5 < a) && (a < 10)**


    The above operation returns true if a is between 5 and 10 (not including 5,10).


    When two comparisons are connected using a **&&**, the entire expression is true,
    provided both comparisons are true; otherwise, the entire expression is false.


    You can also combine two comparisons using the “or” operator, which is spelled
    || in C++. For example, the following is true provided b is less than 2 or b is
    greater than 9:


    **(b < 2) || (b > 9)**


    The above expression returns true if b is less than 2 or b is greater than 9.


    In an expression that uses || operation, the expression is true provided that
    either of the comparisons is true. If both expressions are false, then the expression
    is false.


    A Boolean expression can be negated using the ! operation. For example,


    **!(a > b)**

    Returns true if “a is not greater than b”.


    In most cases, there is no need to use the exclamation (!) operator.


    For example,

    **!(a > b) is the same as to a <= b**'
