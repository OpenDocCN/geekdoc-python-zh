  md: '# Find


    The find functions returns the index of the first occurrence of the word in a
    string. If the word is not found it returns -1.


    ```

    >>> "Hello World".find("Hello")

    0

    >>> "Hello World".find("World")

    6

    >>> "Hello World".find("world")

    -1

    >>> "Hello World".find("Python")

    -1

    >>> |

    ```


    In the first instance we try to find “Hello” in the string “Hello World” and it
    returns 0 since 0 is the start index where it finds the first occurrence of ‘Hello’.
    Similarly, in the second instance, it returns 6 since 6 is the start index. Note
    that Python is case sensitive and therefore when we try to search for ‘world’
    it returns -1. It also returns -1 when we try to search for ‘Python’ since it
    is not present in ‘Hello World’


