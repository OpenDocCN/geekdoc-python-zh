    <ul>

    <li>Basics of html</li>

    <li>CSS</li>

    <li>JavaScript</li>

    </ul>

    </body>

    </html>

    ```


    ### Here’s What We Get as An Output


    ![](img/443990a0ec620659ce8be783c0758bc6_127_0.png)


    And let’s link the output to the tags in the code.


    ![](img/443990a0ec620659ce8be783c0758bc6_127_1.png)


    ### Exercises to Practice


    1. Create a html website that introduces yourself. Create a title tag that says
    ‘Introduction’. Create a headline for yourself using a h1 and h2 tag. Then create
    a paragraph where you talk about yourself, your age, school, and hometown. Then
    finally, create a bulleted list of your hobbies.


    2. Create a html website that talks about your favorite sports team or TV show.
    Create a title tag that says the name of the show/sports team. Create a headline
    using a h1 and h2 tag. Then create a paragraph where you talk about why you like
    the team/TV show and why they are so awesome. Then finally, create a bulleted
    list of your favorite players/people on the show.


    ## The Bulb Example - html


    ### What This Project Does


    This is a simple html project that creates a button that can switch a light bulb
    on the page on/off. We are going to use two bulb images to make this happen. The
    button will switch between the two images.


    ### Concepts to Understand for this Chapter


    We’ll need to understand button tags and image tags for this example.


    ### Button Tag


    ```

    <button onclick=**Action** >**Button text**</button>

    ```


    The button element has two elements. An Action and Button Text. The Button Text
    is the text that shows on the button; and the Action is what happens when the
    user clicks on the button


    ### Image Tag


    ```

    <img id=**ImageId** src=**ImageUrl** style=**ImageSize**>

    ```


    The Image Tag has three elements.

    The ImageId is the name you assign to the image. This name is used to reference
    the image in the code.

    ImageUrl is the url of the image that the tag is referencing. If the image is
    in the same folder as the html file, then you can use the file name only instead
    of the entire url.

    ImageSize sets the width and height of the Image.'
