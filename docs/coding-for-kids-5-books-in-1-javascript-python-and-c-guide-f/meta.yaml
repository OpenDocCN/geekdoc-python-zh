    \ JavaScript 中检查两个条件是否都为真，然后再执行操作；那么你需要将两个 if 循环相互嵌套。让我们用上一章的例子来说明。我们想检查乔治是否饿了并且有钱给他买零食。如果不是，则执行其他操作。例如，\n\
