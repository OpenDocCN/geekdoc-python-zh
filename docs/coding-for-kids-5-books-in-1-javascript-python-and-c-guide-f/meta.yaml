    ## Creating a Smiley Face


    In the below example, we use our knowledge of circles and semi-circles to create
    a smiley face.


    First, we do a yellow circle of 75 pixel radius in the center of the screen, which
    is the face. We then draw 2 small black circles of 10 pixels each which serve
    as the eyes.


    And finally, we do a semi-circle filled with black color of radius 30 pixels.
    This is the smile.


    Pretty cute, huh? You can get creative and make any face you want.


    ```html

    <html>

    <head><title>Smiley Face</title>

    </head>

    <body>

    <canvas id="acanvas" width="500" height="500" style="border:2px solid"></canvas><br>

    <button class="btn a" onclick="drawsquare()">Draw Square</button>


    <script>

    function drawsquare()

    {

    var i = document.getElementById("acanvas");

    var c2x = i.getContext("2d");


    //Yellow Face

    c2x.beginPath();

    c2x.clearRect(0, 0, 500, 500);

    c2x.arc(250,250,75,0,2*Math.PI);

    c2x.fillStyle = "yellow";

    c2x.stroke();

    c2x.fill();


    //Black Eyes

    c2x.beginPath();

    c2x.arc(225,225,10,0,2*Math.PI);

    c2x.fillStyle = "black";

    c2x.stroke();

    c2x.fill();


    c2x.beginPath();

    c2x.arc(275,225,10,0,2*Math.PI);

    c2x.fillStyle = "black";

    c2x.stroke();

    c2x.fill();


    //Black Smile


    c2x.beginPath();

    c2x.arc(250,275,30,0,1*Math.PI);

    c2x.fillStyle = "black";

    c2x.stroke();

    c2x.fill();

    }

    </script>

    </body>

    </html>

