    ## 数学函数


    到目前为止，这已经非常棒了。但如果你想制作一个迷你计算器呢？或者教孩子们数学？学习如何编写数学函数也是加快孩子们理解数学的好方法。你可以为孩子们设置数学测验，并用
    JavaScript 函数来验证。

    让我们从一些可以在 JavaScript 中实现的基本数学函数开始。


    **Math.Round()**

    `Math.Round()` 将一个十进制数四舍五入到最接近的整数。例如，`Math.Round(1.635)` 四舍五入为 2；而 `Math.Round(1.43)`
    四舍五入为 1。


    **Math.ceil()**

    `Math.ceil()` 向上取整。它基本上是向上舍入到更高的整数。例如，`Math.ceil(1.67)` 返回 2；而 `Math.ceil(2.01)`
    返回 3。


    **Math.floor()**

    `Math.floor()` 向下取整。它基本上是去掉十进制数的小数点。所以，`Math.floor(1.47)` 返回 1；`Math.floor(2.34)`
    也返回 2。


    **Math.Sqrt()**

    `Math.Sqrt()` 返回一个数的平方根。所以，`Math.sqrt(9)` 返回 3；而 `Math.sqrt(16)` 返回 4。


    **Math.min()**

    `Math.min()` 返回一个数组的最小值。只需将数组放在括号内。所以，如果

    `a=[13,11,34,54,9];`

    `Math.min(A)` 返回 9。


    **Math.max()**

    `Math.max()` 返回一个数组的最大值。所以对于上面的例子，`Math.max(A)` 返回 54。


    ## Math.Random()


    `Math.Random()` 是一个很酷的函数。它返回一个介于 0 和 1 之间的随机十进制数；不包括 1。

    所以，`Math.Random()` 第一次可能是 0.95，第二次可能是 0.43。

    因此，你可以玩一个 0 到 10 之间的猜数字游戏。只需在下面这样做：

    **`Math.Round(Math.Random()*10)`** 会给你一个 0 到 10 之间的随机整数。


