  md: '# String Variables


    A string variable in JavaScript programming is used to store a group of characters.

    For example:

    `var x="awe3t5"`

    x is a string variable that stores the value of “awe3t5”.

    It is a string variable of size 6. When we access the string, remember that the
    values start from 0 instead of 1. For example, `x[0]` returns a value of a, `x[1]`
    returns w and so on.

    Strings are very useful in processing text information likes names, addresses
    etc.

    Here’s a list of useful functions that can be used to process strings.


    **length** – This returns the length of a string. In the above example, x.length
    returns 6.


    **charAt(y)** – This returns the character at position y in the string. For example,
    in the string x; if we want the 5th character, we do `x.charAt(5)` and that returns
    t.


    **indexOf(y)** – Checks the index of character y in the string. For example, `x.indexOf(‘a’)`
    returns 0.


    **lastIndexOf(y)** – Checks the last index of character y in the string. For example,
    `x.lastIndexOf(‘e’)` returns 3. This is only useful if there are multiple occurrences
    of the same string.


    **.concat(b)** – This join string b to a previous string. For example, if string
    a = ”xyz” and string b = “lmn”; `a.concat(b)` gives “xyzlmn”.


    **includes(y)** – This checks if string y is included in a string and returns
    a true or false value. For example, if string x= “Hi Peter”; then `x.includes(“Hi”)`
    returns true, but `x.includes(“Home”)` returns false.


    **replace(x,a)** – This basically replaces all instances of string x with string
    a. For example if a string str =”Hi Peter”; then `str.replace(“Hi”,”Hello”)` becomes
    str=”Hello Peter”.


    **startswith(y)** – This checks if a string starts with string y. It returns a
    Boolean variable of **true** or **false** value. In the above example,'
  merge: -1
  pgno: 322
- img_proc: true
  md: 'str.startswith(“Hi”) returns true while str.startswith(“Hello”) returns false.

    **toUpper()** – This changes the entire string to upper case. In the above example,
    str.toUpper() becomes “HI PETER”.

    **toLower()** – This changes the entire string to lower case. In the above example,
    str.Lower() becomes “hi peter”.


    # Example 1 – Playing with Your Name; Reverse name game


    In the example below, we enter our name through a form. There are two buttons,
    one prints the length of your name; and the second reverses your name. The first
    button runs a function called **strlength()**. **strlength()** gets your name
    via the form and finds the length using the **.length** function. The second button
    executes a function called **namereverse()**. namereverse() gets your name via
    the form again and finds the length. Then it runs a FOR loop which starts from
    the last character and keeps subtracting 1 till it reaches the first character.
    It prints out the character at each loop iteration. This prints out letters from
    the last character to the first, thus reversing the name.

    Below is the code and output.'
