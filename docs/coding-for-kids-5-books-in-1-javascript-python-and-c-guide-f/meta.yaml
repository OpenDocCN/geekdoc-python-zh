    a bat in the LH corner of the screen that moves up and down. The bat of length
    15 pixels is drawn using **clearRect()** and **fillRect()**. It is set to a constant
    xlocation of 10 and the ylocation is defined by a variable called **yrect**. yrect
    is defined in functions **movedown()** and **moveup()**. Moveup() is activated
    when up button is pressed and it decreases yrect by 30 pixels, which moves the
    bat up. Movedown() is activated when down button is pressed and it increases yrect
    by 30 pixels, which moves the bat down.

    Also, the function **press(event)** detects the presence of keys pressed and activates
    moveup() and movedown() when up and down button are pressed respectively.

