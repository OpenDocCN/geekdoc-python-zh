    # Bouncing Ball


    In this example, we move the ball towards the edge of the canvas and the ball
    bounces back when it hits the canvas.

    This is done by modifying the equation that determines the x location and y location
    of the ball.

    Firstly, in this case, we move the ball in both x and y locations at the same
    time. So, we have two separate variables, **locationx** and **locationy**. There
    are another 2 variables, that determine the direction in which the ball moves;
    **snx** and **sny**. If snx is positive, it moves to the right. If snx is negative,
    it moves to the left. Thus, the equations for locationx and locationy are:

    **locationx=locationx+snx*5**

    **locationy=locationy+sny*5**

    So, we move the ball 5 pixels through x (either left or right) and 5 pixels through
    y (either up or down)

    If the ball reaches the side edge of the canvas (**locationy=500** or **locationx=0**),
    then we change direction of x motion (**snx=snx*-1**).

    And, if the ball reaches the upper/lower edge of the canvas (**locationy=500**
    or **locationy=0**) then we change the direction of y-motion (**sny=sny*-1**).

    This change of direction creates the bounce that we see on the screen.


