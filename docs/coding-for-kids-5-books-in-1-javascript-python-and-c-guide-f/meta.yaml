    is to assign all New York residents flying in to a separate hotel. The button
    runs a function called addcheck(). Addcheck() takes in name and address from the
    form and assigns them to variables.

    An IF function with .includes() checks if the address contains “New York”.

    If it does, then the name string concatenates with the hotel 1 string using .concat().

    If it does not contain New York, then the name string concatenates with the hotel
    2 string.

    We print out the concatenated string in either case.

    Here’s the code with a couple of outputs below showcasing the 2 different cases.


    ```html

    <html>

    <head><title>JavaScript Lesson 4 - Strings</title></head>

    <body>

    <link rel="stylesheet" href="samplestyle.css" />

    <form id="form1">

    Enter Name:<input name="name" type="text" id="name" size="20"><br>

    Enter Address: <textarea name="TextBox" cols="40" rows="5" id="address"></textarea><br><br>


    <button onclick="addcheck()">Check Address</button>


    <script>


    function addcheck()

    {

    var nm=document.getElementById("name").value;

    var address=document.getElementById("address").value;

    var len=address.length;

    var pstr="";

    h1=" stays in Hotel 1";

    h2=" stays in Hotel 2";

    if (address.includes("New York"))

    {

    pstr=nm.concat(h1);

    document.write(pstr);

    }

    else

    {

    pstr=nm.concat(h2);

    document.write(pstr);

    }

    document.write(''<link rel="stylesheet" type="text/css" href="samplestyle.css"
    />'');

    document.write(''<br>'');

    }


