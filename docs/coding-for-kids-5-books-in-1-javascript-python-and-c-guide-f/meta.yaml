    # Square root


    Math.sqrt() is used the find square root and Math.Abs() is used to find the absolute
    value of a number.

    Here’s a few examples:


    ```

    <html>

    <head><title>Sample Form</title></head>

    <body>

    <button onclick="test()">Test</button>

    <script>

    function test()

    {

    var n1 = Math.sqrt(36);

    var n2 = Math.sqrt(75);

    var n3 = Math.abs(13);

    var n4 = Math.abs(-14);


    document.write("The square root of 36 = <strong>"+n1+"</strong><br>");

    document.write("The square root of 75 = <strong>"+n2+"</strong><br>");

    document.write("The absolute value of 13 is = <strong>"+n3+"</strong><br>");

    document.write("The absolute value of -14 = <strong>"+n4+"</strong><br>");


    }

    </script>

    </body>

    </html>

    ```


    In the above code, n1 and n2 are examples of the square root function;

    while n3 and n4 are examples of the absolute function.

    If you haven’t heard of the absolute value function, it basically returns a positive
    value whether the number is +ve or -ve. So, 13 and -13 would both return an absolute
    value of 13.


