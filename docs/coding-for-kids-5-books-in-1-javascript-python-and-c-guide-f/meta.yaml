  - '[PAGE 235]


    # What is html?


    html stands for Hyper Text Markup Language.

    It is the programming language that we use to interact with the internet through
    web pages. The basic structure of all web pages is defined by html.

    It is simple enough for beginner programmers to grasp quickly.

    Most html programming is done by items called tags. These tags start with <>

    And end with </>. For example, a common tag is the paragraph tag which begins
    with <p> and ends with </p>.


    # Common html Tags


    <html> - This tag is used at the start of every webpage to denote the start of
    html code


    <head> - This piece of html code is executed before the rest of the program

    <title> - This tag is used the title the web page. It writes the text on to the
    top ribbon of the webpage.


    <body> - This is the information on the body of the web page.


    <h1> - Used to denote a heading tag. This is the largest size heading tag.


    <h2>,<h3>,<h4>,<h5>,<h6> - Used to denote subheadings of decreasing size.


    <p> - Used to denote paragraphs of text


    <img> - This shows an image on the web page. This image either links to an external
    web page or to an internal file.


    <strong> - Added to make text bold'
  - '[PAGE 236]


    **<ul>** - This is for an unordered list. An example of this would be a list of
    items in bullet form.


    **<li>** - Adds a bullet item to an unordered list.


    **<ol>** - This is for ordered lists such as numbered lists from 1,2,3....


    **<div>** - Used to denote larger sections of text; that contain several paragraphs..


    **<a>** - Used to link items in a web page to another web page.


    **<br>** - Adds a line break to the code and moves to the next line.'
