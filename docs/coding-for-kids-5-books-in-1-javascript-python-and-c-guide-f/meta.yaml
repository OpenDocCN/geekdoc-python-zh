  mdcn: "## 示例 3：可整除性判断：\n\n在此示例中，`is_divisible` 函数检查 `a` 是否能被 `b` 整除。如果能，它会打印一条消息并将\
    \ `div` 设置为 `True`。如果 `a` 不能被 `b` 整除，`else` 语句将处理这种情况，打印消息并将 `div` 设置为 `False`。\n\
    \n```python\n# is divisible\n\n# checks if a is divisible by b, print a message\n\
    # return true if divisible else false\n\ndef is_divisible(a, b):\n    div = None\n\
    \    if a % b == 0:\n        print(f\"{a} is divisible by {b}\")\n        div\
    \ = True\n    else:\n        print(f\"{a} is not divisible by {b}\")\n       \
    \ div = False\n    return div\n\nn1 = is_divisible(8, 2)\nn2 = is_divisible(8,\
    \ 3)\n\nprint(n1)\nprint(n2)\n```\n\n```\n8 is divisible by 2\n8 is not divisible\
    \ by 3\nTrue\nFalse\n```\n\n## 练习题\n\n- 1. 编写一个程序，找出 1 到 5000 之间能被 11 整除的数字。\n\
    - 2. 编写一个函数，测试一个数字是否为质数。质数是只能被自身和 1 整除的数字。\n- 3. 编写一个函数，测试一个数字是否为奇数。\n\n## 循环\n\
    \n编程中的循环是一系列指令，它们会重复执行一定的次数。\n可以将循环想象成一个重复操作，它会一直重复直到满足某个条件。\n根据执行条件，主要有两种类型的循环。它们是：\n\
    \n- a. **FOR 循环：** FOR 循环包含一系列指令，这些指令会执行一定的次数。例如，一个从 1 到 10 的 FOR 循环会执行循环内的代码\
    \ 10 次。\n- b. **WHILE 循环：** WHILE 循环是一系列指令，它们会执行直到满足某个条件。\n\n现在，如果我们想执行 `execute`\
    \ 函数 1000 次；我们使用 FOR 循环。下面的 FOR 循环从 0 开始，到 999 结束，因此运行 `execute` 函数 1000 次。\n\n\
    ```python\nfor i in range(1000):\n    execute()\n```\n\n最后，如果我们想一直运行 `execute()`\
    \ 直到下午 6 点，我们使用 WHILE 循环。\n\n```python\nwhile (checktime != 18:00):\n    execute()\n\
    ```\n\n这些是解释循环概念的简单示例。这个概念在编程中非常重要。\n现在，让我们在 Python 中做一些示例。\n\n## FOR 循环示例 1\n\
    \nFOR 循环的一个简单示例是一个计数到 10 的程序。\n\n```python\nfor i in range(11):\n    print(i)\n\
    ```\n\n上面的代码可能是 FOR 循环最简单的示例。循环从 0 运行到 10，因此它运行 11 次，每次打印 `i`，即循环迭代次数。\n\n**注意：**\
    \ `range(n)` 函数使循环从 0 运行到 n-1。\n\n**for i in range(11)**\n\n上面这行意味着循环从 0 开始（i=0）。每次增加\
