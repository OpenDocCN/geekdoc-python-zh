    \ event happen an event object is created to record it.\nIn fact, we have been\
    \ using pygame.event several times in our programs.\nIn this snippet, in game\
    \ loop we continuously check for any new events pygame.event.\n`pygame.event.get()`\
    \ returns a list of events that occurred since the last `pygame.event.get()` call.\n\
    When the quit button is pressed pygame.event registers this event as event with\
    \ a type pygame.QUIT .\nSo we loop through all events and check if any of the\
    \ events type is pygame.QUIT if so we set loop variable to false to quit the loop\
    \ in next iteration.\n\n```\npython\n# game infinite loop\nloop = True\nwhile\
    \ loop:\n    # if quit button press event quit\n    for event in pygame.event.get():\n\
    \        if event.type == pygame.QUIT:\n            loop = False\n```\n\nTo read\
