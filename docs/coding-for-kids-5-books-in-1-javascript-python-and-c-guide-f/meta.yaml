    \n子字符串起始位置？: 10\n\n子字符串结束位置？: 20\n\n查找子字符串\n\n一旦我们点击 **查找子字符串**，我们得到答案：\n**子字符串是\
    \ Atlanta fo**\n\n上面的答案是10个字符，如果包括空格的话。\n\n## 练习题：\n\n你可以复制上面的例子，一旦你能够运行它们并理解代码；你就可以尝试下面的几个问题。\n\
    \n- 1. 编写一个程序，查找一个特定字符串在一个更大的字符串中出现的次数，这个更大的字符串是在一个文本框中输入的？\n- 2. 编写一个程序，接收一个包含姓名、数学成绩、英语成绩、物理成绩和地理成绩的字符串。使用\
    \ `split` 函数分隔字符串，并计算该人的平均分。例如，“Mark, 90, 34, 56, 65” 将计算出 Mark 的 90, 34, 56,\
    \ 65 的平均分。\n\n提示：你可以使用 `parseInt()` 将成绩转换为数字。\n\n## CSS 简介\n\n## 什么是 CSS？\n\n\
    CSS 代表层叠样式表。CSS 用于设置网站的设计和样式——包括字体、颜色、布局、阴影和配色方案。它们与 HTML 和 JavaScript 配合得非常好。\n\
    \n## 如何在 HTML 网站中使用 CSS\n\n使用 CSS 的最佳方式是创建一个单独的 CSS 文件，并在 HTML 头文件中引用它。\n现在，让我们创建一个\
    \ CSS 文件。\n\n- 1. 打开一个空白的 Notepad++ 文档。\n- 2. 点击“另存为”，并将文件类型选择为“CSS”。我们将这个文件命名为\
    \ `style`。\n\n![](img/443990a0ec620659ce8be783c0758bc6_204_0.png)\n\n![](img/443990a0ec620659ce8be783c0758bc6_205_0.png)\n\
    \n- 3. 点击“保存”。\n- 4. 转到相关的 HTML 文件，并在头文件中包含下面这行代码。\n\n```\n<link rel=\"stylesheet\"\
    \ href=\"style.css\" />\n```\n\n- 5. （可选）如果你想包含任何按钮 CSS 元素，你需要像下面这样定义一个按钮类：\n\n\
    ```\n<button class =\"btn str\" onclick=\"substr()\">Find SubString</button>\n\
    ```\n\n现在，让我们在上一章的例子中插入样式表。\n\n```html\n<html>\n<head>\n<title>Substrings and\
    \ String Index</title>\n<link rel=\"stylesheet\" href=\"style.css\" />\n</head>\n\
    <body>\n<form id=\"form1\">\nWhat was your day like?: <textarea name=\"sentence\"\
    \ cols=\"20\" rows=\"5\" id=\"sentence\"></textarea><br><br>\nSubstring From?:<input\
    \ name=\"test string\" type=\"number\" id=\"tstr1\" size=\"20\"><br><br>\nSubstring\
    \ To?:<input name=\"test string\" type=\"number\" id=\"tstr2\" size=\"20\"><br><br>\n\
    </form>\n\n<button class =\"btn str\" onclick=\"substr()\">Find SubString</button>\n\
    \n<script>\n\nfunction substr()\n{\nvar daydesc=document.getElementById(\"sentence\"\
    ).value;\nvar strnum1 = document.getElementById(\"tstr1\").value;\nvar strnum2\
    \ = document.getElementById(\"tstr2\").value;\n\nvar sstr=daydesc.substring(strnum1,strnum2);\n\
    document.write(\"The SubString is \"+sstr);\n}\n\n</script>\n</body>\n</html>\n\
    ```\n\n很好。现在我们的 CSS 样式表已经链接到我们的 HTML 文件了。\n\n## CSS 术语\n\n`html{}`\n上面的术语用于为整个\
    \ HTML 文件定义 CSS。括号内的任何内容都将用于 HTML 代码中。\n\n`body{}`\n定义 HTML 代码主体的样式。\n\n`.btn{}`\n\
    设置网页中任何按钮的样式。你必须在 HTML 代码中为按钮定义一个名为 `btn` 的类。参见上面的代码示例。\n\n`.btn:hover{}`\n设置当鼠标悬停在网页按钮上时按钮的样式。\n\
    \n`background-color:`\n网站的背景颜色。\n\n`text-decoration:`\n用于为文本添加装饰，如波浪线、点线、曲线等。\n\
    \n`text-transform:`\n用于将整个单词或单词的一部分大写或小写。\n\n`text-align:`\n可以将文本与页面的左侧、右侧或中心对齐。\n\
    \n`color:`\n设置页面上文本的颜色。\n\n`padding:`\n设置页面边缘与文本/按钮元素之间的间距。\n\n`line-height:`\n\
    设置文本的行高。\n\n`font-family:`\n设置你想要用于文本的字体类型。\n\n`font-size:`\n设置字体的大小。\n\n`font-weight:`\n\
    可以在需要时将字体设置为粗体。\n\n这些是我们将在示例中使用的一些 CSS 属性。但是，有成千上万的 CSS 属性可用于各种不同的目的。如果你想了解更多，你可以在这里查看：[https://www.tutorialrepublic.com/css-reference/css3-properties.php](https://www.tutorialrepublic.com/css-reference/css3-properties.php)\
    \ 那么，让我们来看一个我们的 CSS 文件的例子：\n\n## CSS 示例\n\n```css\nhtml, body {\n    text-decoration:\
    \ none;\n    text-transform: capitalize;\n    text-align: center;\n    margin:\
    \ 0;\n    padding-top: 100px;\n    min-height: 100%;\n    color: black;\n    background-color:\
    \ cyan;\n    line-height: 1;\n    font-family: serif;\n    font-size: 20px;\n\
    \    font-weight: bold;\n}\n\n.btn {\n    background-color: Crimson;\n    border:\
    \ none;\n    color: black;\n    padding: 10px 24px;\n    text-align: center;\n\
    \    text-decoration: none;\n    display: inline-block;\n    font-size: 16px;\n\
    }\n\n.btn:hover {\n    background-color: MidnightBlue;\n    color: white;\n}\n\
    ```\n\n在 CSS 代码的 `html` 和 `body` 部分，文本被设置为页面居中并大写。它距离顶部 100 像素，颜色为黑色，行高为 1。它是粗体，字体大小为\
    \ 20 像素。页面的背景是青色（浅蓝色）。\n按钮有一个单独的 CSS 设置。它的颜色是深红色（红色），文本是黑色。文本距离顶部 10 像素，距离两侧 24\
    \ 像素。它是居中对齐的，字体大小为 16 像素。\n当我们用鼠标悬停在按钮上时，按钮的背景变为午夜蓝（蓝色），文本变为白色。\n我们可以在下面看到它的样子。让我们用两种方式查看我们的网站，一次是在应用\
    \ CSS 之前；一次是在链接 CSS 文件之后。\n\n## 输出（无 CSS）：\n\n![](img/443990a0ec620659ce8be783c0758bc6_210_0.png)\n\
    \n## 输出（有 CSS）：\n\n![](img/443990a0ec620659ce8be783c0758bc6_210_1.png)\n\n## 输出（有\
    \ CSS 且鼠标悬停在按钮上）：\n\n![](img/443990a0ec620659ce8be783c0758bc6_211_0.png)\n\n正如你所看到的，它对网站的视觉吸引力产生了巨大的影响。你可以自己自定义所有这些元素，为文本、背景和按钮使用不同的颜色。\n\
    \n## 练习题：\n\n你可以复制上面的例子，一旦你能够运行它们并理解代码；你就可以尝试下面的几个问题。\n\n- 1. 修改样式元素，找到对你来说看起来最好的元素。尝试\
    \ 5 种不同的颜色字体、不同的文本大小和不同的文本形式，以找到最好看的网站。\n- 2. 使用 `style.css` 文件为你迄今为止编写的所有程序创建一个样式表。\n\
    \n## 链接多个网页\n\n现在，你已经设置了一个链接了 CSS 的网页。但你可能注意到，当你点击“查找子字符串”按钮时，网页会切换回原始设计。这是因为\
    \ JavaScript 部分还没有链接到网页。\n为了刷新你的记忆，我们讨论的代码接收一个字符串，并根据用户的偏好打印一个子字符串。用户指定子字符串的开始和结束。下面是代码：\n\
    \n```html\n<html>\n<head>\n<title>Substrings and String Index</title>\n<link rel=\"\
    stylesheet\" href=\"style.css\" />\n</head>\n<body>\n<form id=\"form1\">\nWhat\
    \ was your day like?: <textarea name=\"sentence\" cols=\"20\" rows=\"5\" id=\"\
    sentence\"></textarea><br><br>\nSubstring From?:<input name=\"test string\" type=\"\
    number\" id=\"tstr1\" size=\"20\"><br><br>\nSubstring To?:<input name=\"test string\"\
    \ type=\"number\" id=\"tstr2\" size=\"20\"><br><br>\n</form>\n\n<button class\
    \ =\"btn str\" onclick=\"substr()\">Find SubString</button>\n\n<script>\n\nfunction\
    \ substr()\n{\nvar daydesc=document.getElementById(\"sentence\").value;\nvar strnum1\
    \ = document.getElementById(\"tstr1\").value;\nvar strnum2 = document.getElementById(\"\
    tstr2\").value;\n\nvar sstr=daydesc.substring(strnum1,strnum2);\ndocument.write(\"\
    The SubString is \"+sstr);\n}\n\n</script>\n</body>\n</html>\n```\n\n正如你所看到的，代码链接到了\
    \ `style.css` 样式表以获取当前的设计。\n所以，我们得到下面的输出："
