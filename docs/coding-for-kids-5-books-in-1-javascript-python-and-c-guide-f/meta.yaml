- img_proc: true
  md: "# Soft Skills of Coding\n\nMy experiences with teaching kids coding, and also\
    \ from hearing from Rob have convinced me that soft skills are just as important\
    \ as technical knowledge in coding. These soft skills also help you with all other\
    \ aspects of life moving forward. So, it’s a win-win all the way around.\n\nSo,\
    \ what exactly are soft skills? Soft skills relate more to how people work. This\
    \ is different from hard technical skills which focus on what people work on.\
    \ Soft skills relate to how people deal with mental, physical and interpersonal\
    \ problems. In combination with good technical knowledge, soft skills can take\
    \ your performance to a higher level. Here are some of the skills that I am talking\
    \ about:\n\n+   1. **Focus and Concentration:** Ability to focus on a single task\
    \ at hand is a tough skill to master in a world dominated by social media and\
    \ other distractions. Multi-tasking may seem cool; but in the long run it takes\
    \ away from quality work and quality education.\n    a. A new tool to help you\
    \ focus is something called isochronic tones. This is specific music that gets\
    \ your mind in the right frame and helps you focus. You can check out these tones\
    \ for free by searching ‘isochronic tones’ on Youtube or Google.\n    b. Another\
    \ tool is daily meditation. Meditation for 5 minutes at the start of the day can\
    \ help you build focus over time.\n    c. And finally, breaking your work down\
    \ into periods of 20-30 minutes can make a big difference. Take a 5-10 minute\
    \ walk between each session and come back refreshed."
  merge: -1
  pgno: 225
- img_proc: true
  md: '+   2. **Perseverance**: The ability to persist and learn from failures is
    very important in coding. It’s common practice among programmers to try to break
    the code (or make the code fail) so they can learn the weak points in a program,
    and make it improve. You can do the same for your program and for your programming
    skill.


    +   3. **Teamwork**: Going at coding alone is necessary when starting off; but
    will hold you back in the long run. You can learn a lot faster from the mistakes
    of others; than from your own mistakes. You can join a local programming club
    in your own city; hire a programming tutor; join relevant facebook coding groups;
    post on redditt threads and learn from Github code. It’s important to be active
    on these groups and recognized as a positive contributor.


    +   4. **Physical Health**: This is a very underrated and undervalued trait by
    many programmers. But in the long run, it really hurts people in the industry.
    Back problems, obesity, carpal tunnel syndrome are common health issues that programmers
    encounter after working in the industry for 5-10 years or more. Here’s a few ways
    to take better care of your health.


    +   a. Maintain a good sitting posture: Sit upright. Make sure your laptop is
    close to eye level, so you don’t have to bend your neck down. Make sure your feet
    are in line with your knees.'
  merge: -1
  pgno: 226
- img_proc: true
  md: '+   b. Take frequent breaks: I recommend taking breaks every 20-30 minutes.
    Take a walk in between periods.

    c. Diet: Maintain a healthy diet high in good fats, protein and complex carbs.
    Minimize simple carbs and sugar.

    d. Exercise: Maintain a regular exercise regime or play a sport. It’s important
    to exercise at least 3-4 times a week (maybe more).

    e. Sleep: Get at least 7-8 hours of sleep every night. If you’re unable to sleep,
    ask a qualified doctor how you can improve your sleep.


    One can write entire books on each of the above topics; but this is a coding book,
    so I will leave it there. Just remember that the above soft skills are very important
    and you can work on them while you are coding as well.'
