    \ any of these animals is a tiger, and then print out which number animal is the\
    \ tiger.\n4. Write a program that is a filter for a car dealership. It takes in\
    \ the name and price of a car via prompt function. The program prints out the\
    \ name of the car each time. It stops when the sum of all the cars exceed a value\
    \ of $50000; as that is the upper limit of their budget.\n5. Write a program that\
    \ takes in two user number inputs via prompt function. Keep making the user input\
    \ two numbers till their sum is greater than 20. Once the user inputs two numbers\
    \ whose sum is greater than 20, the program stops.\n6. Write a program that takes\
    \ in the vote of a person via user prompt. There are 3 candidates. It checks if\
    \ the vote is any of the candidates and adds to the candidate vote total. There\
    \ is a final prompt that asks if there are any more votes and it accepts the values\
    \ of ‘Y/N’. If ‘N’, then it stops the program and prints out the winner. If ‘Y’,\
    \ then it asks for the vote again and repeats the process.\n7. Write a program\
    \ that takes a user input and outputs the following star pattern below. For example,\
    \ if the user inputs the number ‘6’ it outputs:\n\n```\n******\n*****\n****\n\
    ***\n**\n*\n```\n\n8. Write a program that takes in a user input and prints out\
    \ the sum of numbers from 1 to that number. For example, if the user inputs 3;\
    \ the sum is 1+2+3=6.\n\n# Game Time - Loops\n\nNow, it’s time to design a few\
    \ games based on what we’ve learned so far. There’s no better way of learning\
    \ concepts than applying them; and even better to apply them to something fun.\n\
    Before, getting started, let’s talk about one concept; which is adding html elements\
    \ using Javascript.\n\n# Adding html Elements using JavaScript\n\nWhat if want\
    \ to add a button or textbox in the middle of the JavaScript program. Yes, you\
    \ can do that within JavaScript using the document.write() function. For example,\
    \ you can create a button using:\n`document.write('<button onClick=\"afunction()\"\
    >Restart</button>');`\nIn the above line, we create a button with text ‘Restart’\
    \ on it. On clicking the button, **afunction()** is run. This is very useful in\
    \ games where we have the option to keep running the program instead of stopping.\
    \ Now, let’s look at a similar program below.\n\n```html\n<html>\n<head><title>Sample\
    \ Form</title></head>\n<body>\n<link rel=\"stylesheet\" type=\"text/css\" href=\"\
    samplestyle.css\" />\n<form id=\"form1\">\nEnter First Number:<input name=\"number1\"\
    \ type=\"number\" id=\"num1\" size=\"20\"><br>\nEnter Second Number:<input name=\"\
    number2\" type=\"number\" id=\"num2\" size=\"20\"><br><br>\nEnter Third Number:\
    \ <input name=\"number3\" type=\"number\" id=\"num3\" size=\"20\"></textarea><br><br>\n\
    \n<button class = \"btn submit\" onclick=\"multiplynum()\">Submit</button>\n\n\
    <script>\nfunction multiplynum()\n{\nvar n1 = document.getElementById(\"num1\"\
    ).value;\nvar n2 = document.getElementById(\"num2\").value;\nvar n3 = document.getElementById(\"\
    num3\").value;\ndocument.write('<link rel=\"stylesheet\" type=\"text/css\" href=\"\
    samplestyle.css\" />');\ndocument.write(\"The product of the three numbers is\
    \ \" +n1*n2*n3);\ndocument.write('<br>');\ndocument.write('<button onClick=\"\
    redirect()\">Home</button>');\n}\n\nfunction redirect()\n{\nwindow.location.replace(\"\
    form_JavaScript.html\");\n}\n</script>\n\n</body>\n</html>\n```\n\nThe program\
    \ above is the form in the previous chapter. We just added two lines and a function.\n\
    The two lines create a Home button which runs the function **redirect()**.\nThe\
    \ **redirect()** function runs the program again. **'form_JavaScript.html'** is\
    \ the name of the file we are running. You should change 'form_JavaScript' to\
    \ whatever you have named your html file.\n\n# Output #1\n\n![](img/443990a0ec620659ce8be783c0758bc6_311_0.png)\n\
    \nAfter entering numbers and clicking Submit, we get:\n\n![](img/443990a0ec620659ce8be783c0758bc6_311_1.png)\n\
    \nAnd now, after clicking Home button, we get:\n\n![](img/443990a0ec620659ce8be783c0758bc6_311_2.png)\n\
    \nSo, it basically restarts the html program.\nNow, let’s get started with our\
    \ first game.\n\n# Game 1 – Guess Random Numbers\n\nIn this game, we’re going\
    \ to create a form that takes in a number via a textbox. The number is between\
    \ 0 and 10. Then we compare that number to a random number generated via JavaScript\
    \ (using Math.random). If it is the same, then the guessed number is correct.\
    \ If not, then we give them the right number. The user has the option to click\
    \ the Home button and try again. See the code and output below.\n\n```html\n<html>\n\
    <head><title>Guess Number</title>\n<link rel=\"stylesheet\" href=\"samplestyle.css\"\
    \ />\n</head>\n<body>\n<form id=\"form1\">\nGuess Number between 0 and 10:<input\
    \ name=\"name\" type=\"number\" id=\"num1\" size=\"20\"><br>\n</form>\n<button\
    \ class=\"btn a\" onclick=\"guessnumber()\">Check</button>\n<script>\n\nfunction\
    \ guessnumber()\n{\nvar guess=document.getElementById(\"num1\").value;\nvar rand=Math.floor(Math.random()*10);\n\
