    # Keywords


    Keywords are names that cannot be used as variable names as they are reserved
    for programming language syntax.


    If you use them as variable names the compiler will throw errors, or you might
    end up changing the basic functionality of some basic function.


    Examples of keywords include the basic data types, such as int, bool and the rest,
    and names such as struct and class.


    # Comments


    Sometimes we want to explain our code so that others can understand what we did.
    In the future that information will help us remember what we did as we go through
    the code.


    In programming we achieve this by writing comments within our code. There are
    two types of comments, single line comments and multiline comments.


    Single line comments begin with two forward slashes (//) while multiline comments
    sit in between the following symbols: /**/


    Examples of comments:


    ```

    // Test Code


    /* Line 1 of Comments

    Line 2 of Comments */

    ```'
