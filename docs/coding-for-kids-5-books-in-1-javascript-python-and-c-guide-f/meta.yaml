    \ That means we can make the loop as long as we want.\n\n```python\ndef main():\n\
    \    loop_length = int(input(\"Please enter how many loop: \"))\n    for i in\
    \ range(loop_length):\n        print(i)\n```\n\nThe input takes in a number input\
    \ and stores in a variable called “loop_length”.\n\n```\nPlease enter the loop\
