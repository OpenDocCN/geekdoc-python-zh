- md: "## A Short message from the Author:\n\nHey, are you enjoying the book? I’d\
    \ love to hear your thoughts!\n\nMany readers do not know how hard reviews are\
    \ to come by, and how much they help an author.\n\n![](img/443990a0ec620659ce8be783c0758bc6_59_0.png)\n\
    \nI would be incredibly thankful if you could take just 60 seconds to write a\
    \ brief review on Amazon, even if it’s just a few sentences!\n\n[>> Click here\
    \ to leave a quick review](https://example.com)\n\nThank you for taking the time\
    \ to share your thoughts!\n\n## Conditional Statement\n\nWe usually want to do\
    \ something only when a certain condition is true. For example, if it is sunny\
    \ outside then we go out and play, else we stay at home.\n\nThe statement, it\
    \ is sunny outside, can only either be true or false.\n\nIn programming we have\
    \ a data type that can only store the value true or false, this data type is known\
    \ as a **boolean**. In C++ we usually shorten it to **bool**.\n\nIn addition,\
    \ we sometimes want to run lines of code only when a certain condition is true,\
    \ and we achieve this using **if** statement. Let's do an example, which will\
    \ make it easier to understand.\n\n## Example Code\n\n![](img/443990a0ec620659ce8be783c0758bc6_60_0.png)\n\
    \n![](img/443990a0ec620659ce8be783c0758bc6_61_0.png)\n\n## Explanation\n\nIn the\
    \ above example, we first create a variable called *sunny* that holds a boolean\
    \ value since it has the data type *bool*.\n\nUsing the *if* statement we check\
    \ whether it is true that it is sunny, if it is, we print \"You can go outside\
    \ to play\" to the screen else we print \"Don't go outside to play\".\n\n## Exercise\n\
    \nChange the variable *sunny* to be *false* and see what will be printed.\n\n\
    ## Comparison Operators\n\nComparison operators compare two values and return\
    \ either true or false.\n\nExamples of comparison operators are:\n\n**Less than\
    \ (<)**\nIt returns true if the value on the left is less than the value on the\
    \ right. Otherwise, it returns false.\n\n**Greater than (>)**\nIt returns true\
    \ if the value on the left is greater than the value on the right. Otherwise,\
    \ it returns false.\n\n**Less than or equal to (<=)**\nIt returns true if the\
    \ value on the left is less than or equal to the value on the right. Otherwise,\
    \ it returns false.\n\n**Greater than or equal to (>=)**\nIt returns true if the\
    \ value on the left is greater than or equal to the value on the right. Otherwise,\
    \ it returns false.\n\n**Equal to (==)**\nIt returns true if the value on the\
    \ left is equal to the value on the right. Otherwise, it returns false.\n\n**Not\
    \ equal to (!=)**\nIt returns true if the value on the left is not equal to the\
    \ value on the right. Otherwise, it returns false.\n\n## Example of use of comparison\
    \ operators\n\nLet's say you want to print to the screen the string ‘x is greater\
    \ than 5’ if x is indeed greater than 5 else you print ‘x is less than or equal\
    \ to 5’.\n\n```cpp\n#include<iostream>\nusing namespace std;\n\nint main(){\n\
    \    int x = 3;\n\n    if(x > 5){\n        cout << \"x is greater than 5\" <<\
    \ endl;\n    }else{\n        cout << \"x is less than or equal to 5\" << endl;\n\
    \    }\n    return 0;\n}\n```\n\n![](img/443990a0ec620659ce8be783c0758bc6_63_0.png)\n\
    \n## Building Boolean Expressions\n\nA **Boolean expression** is any expression\
    \ that has one of two values. It is either true or false. It is basically an expression\
    \ that compares two values and returns true/false.\n\nTwo comparisons can be combined\
    \ using the “and” operator, which is **&&** in C++. For example, the following\
    \ Boolean expression is true provided a is bigger in value than 5 and a is smaller\
    \ than 10:\n\n**(5 < a) && (a < 10)**\n\nThe above operation returns true if a\
    \ is between 5 and 10 (not including 5,10).\n\nWhen two comparisons are connected\
    \ using a **&&**, the entire expression is true, provided both comparisons are\
    \ true; otherwise, the entire expression is false.\n\nYou can also combine two\
    \ comparisons using the “or” operator, which is spelled || in C++. For example,\
    \ the following is true provided b is less than 2 or b is greater than 9:\n\n\
    **(b < 2) || (b > 9)**\n\nThe above expression returns true if b is less than\
    \ 2 or b is greater than 9.\n\nIn an expression that uses || operation, the expression\
    \ is true provided that either of the comparisons is true. If both expressions\
    \ are false, then the expression is false.\n\nA Boolean expression can be negated\
    \ using the ! operation. For example,\n\n**!(a > b)**\nReturns true if “a is not\
    \ greater than b”.\n\nIn most cases, there is no need to use the exclamation (!)\
    \ operator.\n\nFor example,\n**!(a > b) is the same as to a <= b**\n\n## Truth\
    \ Tables\n\nThe following are known as truth tables. It indicates all the possibilities\
    \ that a combination of each expression can be and the resulting boolean value.\n\
    \nAND\n\n| expression1 | expression2 | expression1 && expression2 |\n|---|---|---|\n\
    | true | True | True |\n| true | False | False |\n| false | True | False |\n|\
    \ false | False | False |\n\nOR\n\n| expression1 | expression2 | expression1 ||\
    \ expression2 |\n|---|---|---|\n| true | True | True |\n| true | False | True\
    \ |\n| false | True | True |\n| false | False | False |\n\nNOT\n\n| expression\
    \ | ! expression |\n| --- | --- |\n| true | False |\n| false | True |\n\n## Example\
    \ of Boolean expressions\n\nLet’s say that you only buy food when you are hungry,\
    \ and you have money. To represent this in code it will be something like this.\n\
    \nExample\n\n```cpp\n#include<iostream>\nusing namespace std;\n\nint main(){\n\
    \    bool isHungry = true;\n    bool hasMoney = true;\n\n    if( isHungry && hasMoney){\n\
    \        cout << \"I will buy food\" << endl;\n    }else{\n        cout << \"\
    I can't buy food\" << endl;\n    }\n\n    return 0;\n}\n```\n\n![](img/443990a0ec620659ce8be783c0758bc6_68_0.png)\n\
    \n## Explanation\n\nThe string ‘I will buy food’ only gets printed when the variables\
    \ **isHungry** and **hasMoney** are true. Otherwise, the string ‘I can’t buy food’\
    \ is printed. Change the program to print ‘I will buy food’ if **isHungry** is\
    \ true or **hasMoney** is true.\n\n## Exercise\n\n1. Write a program that outputs\
    \ the word **Small** if the score is less than 10 and **Big** if the value of\
    \ the score is bigger than 100.\n2. Write a program that outputs the word **Success**\
    \ provided the variable **test** is greater than or equal to 50 and the value\
    \ of the variable **codingPrograms** is greater than 5. Otherwise, the programs\
    \ output the word **failure**. The variables **test** and **codingPrograms** are\
    \ both of type int.\n3. Write a program that outputs the word **Danger** if the\
    \ variable **temp** is greater than 37, or the value of the variable **press**\
    \ is greater than 1, or both. Otherwise, the program prints the word **Great**.\
    \ The variables **temp** and **press** are both of type int.\n\n## Loops\n\nLoops\
    \ enable us to repeat a set of instructions a fixed number of times. It can also\
    \ be repeated forever if we wanted to.\n\nThere are usually two types of loops,\
    \ *finite loops* and *infinite loops*.\n\nFinite loops repeat the set of instructions\
    \ a countable number of times while infinite loops repeat a set of instructions\
    \ forever.\n\n### How we specify loops\n\nIn C++ there are two ways of declaring\
    \ loops.\nOne way is to use the **for** keyword and the other is to use the **while**\
    \ keyword.\n\n### For loops\n\nLet's say you want to print out your name 10 times\
    \ to the console, you might think of writing out the instruction `'cout << \"\
    My name\"<< endl;'` 10 times.\nUsing For loops is a good way to prevent repetition\
    \ of the same statement and shorten the code.\n\n## Example\n\n![](img/443990a0ec620659ce8be783c0758bc6_71_0.png)\n\
    \n![](img/443990a0ec620659ce8be783c0758bc6_71_1.png)\n\n## Explanation\n\nTo use\
    \ the **for loop** we specify the number of times we want to run the block of\
    \ code associated with that for loop.\n\nThe block of code associated with the\
    \ for loop is in between the opening and closing curly braces\n\n```\n{\n}\n```\n\
    \nIn our code the associated block of code has only the line: cout << \"My name\"\
    \ << endl;\n\nInside the opening and closing parenthesis associated with the *for*\
    \ keyword we specify three important things separated by two semicolons.\n\nThe\
    \ first is what number to begin counting at, for us, we begin counting from 1\
    \ so we declare the integer variable **i** holding the value 1.\n\nThe second,\
    \ separated from the first by a semicolon, is the condition that should be true\
    \ in order for the block of code associated with for loop to be executed. We usually\
    \ use comparison operators such as >, <, <=, >= in this section.\n\nIn our case\
    \ , **i <= 10**, means only run the block of code if the value of the variable\
    \ i is less or equal to 10, otherwise stop the loop and proceed with the rest\
    \ of the program.\n\nFinally, the third part, separated by a semicolon from the\
    \ second part, increments the count variable, in our case we increment by 1 using\
    \ the special notation **i++**.\n\nIn addition, this increment occurs after the\
    \ block of code runs.\n\n## Exercise"
  mdcn: "## 来自作者的简短留言：\n\n嘿，你喜欢这本书吗？我很想听听你的想法！\n\n许多读者不知道获得书评有多难，以及它们对作者有多大帮助。\n\n\
    ![](img/443990a0ec620659ce8be783c0758bc6_59_0.png)\n\n如果你能花60秒在亚马逊上写一篇简短的书评，哪怕只有几句话，我将不胜感激！\n\
    \n[>> 点击此处快速留下书评](https://example.com)\n\n感谢你花时间分享你的想法！\n\n## 条件语句\n\n我们通常只在某个条件为真时才想做某事。例如，如果外面阳光明媚，我们就出去玩，否则我们就待在家里。\n\
    \n“外面阳光明媚”这个陈述，只能是真或假。\n\n在编程中，我们有一种只能存储真或假值的数据类型，这种数据类型被称为**布尔类型**。在C++中，我们通常将其简写为**bool**。\n\
    \n此外，我们有时只想在某个条件为真时运行某些代码行，我们通过**if**语句来实现这一点。让我们看一个例子，这将使它更容易理解。\n\n## 示例代码\n\
    \n![](img/443990a0ec620659ce8be783c0758bc6_60_0.png)\n\n![](img/443990a0ec620659ce8be783c0758bc6_61_0.png)\n\
    \n## 解释\n\n在上面的例子中，我们首先创建了一个名为*sunny*的变量，它存储一个布尔值，因为它的数据类型是*bool*。\n\n使用*if*语句，我们检查“阳光明媚”是否为真，如果是，我们就在屏幕上打印“你可以出去玩”，否则我们打印“不要出去玩”。\n\
    \n## 练习\n\n将变量*sunny*改为*false*，看看会打印什么。\n\n## 比较运算符\n\n比较运算符比较两个值并返回真或假。\n\n比较运算符的例子有：\n\
    \n**小于 (<)**\n如果左边的值小于右边的值，则返回真。否则，返回假。\n\n**大于 (>)**\n如果左边的值大于右边的值，则返回真。否则，返回假。\n\
    \n**小于或等于 (<=)**\n如果左边的值小于或等于右边的值，则返回真。否则，返回假。\n\n**大于或等于 (>=)**\n如果左边的值大于或等于右边的值，则返回真。否则，返回假。\n\
    \n**等于 (==)**\n如果左边的值等于右边的值，则返回真。否则，返回假。\n\n**不等于 (!=)**\n如果左边的值不等于右边的值，则返回真。否则，返回假。\n\
    \n## 比较运算符使用示例\n\n假设你想在屏幕上打印字符串‘x is greater than 5’，如果x确实大于5，否则你打印‘x is less\
    \ than or equal to 5’。\n\n```cpp\n#include<iostream>\nusing namespace std;\n\n\
    int main(){\n    int x = 3;\n\n    if(x > 5){\n        cout << \"x is greater\
    \ than 5\" << endl;\n    }else{\n        cout << \"x is less than or equal to\
    \ 5\" << endl;\n    }\n    return 0;\n}\n```\n\n![](img/443990a0ec620659ce8be783c0758bc6_63_0.png)\n\
    \n## 构建布尔表达式\n\n**布尔表达式**是任何具有两个值之一的表达式。它要么为真，要么为假。它基本上是一个比较两个值并返回真/假的表达式。\n\n\
    两个比较可以使用“与”运算符组合，在C++中是**&&**。例如，以下布尔表达式在a的值大于5且a小于10时为真：\n\n**(5 < a) && (a <\
    \ 10)**\n\n如果a在5和10之间（不包括5和10），上述操作返回真。\n\n当两个比较使用**&&**连接时，只要两个比较都为真，整个表达式就为真；否则，整个表达式为假。\n\
    \n你也可以使用“或”运算符组合两个比较，在C++中写作||。例如，以下表达式在b小于2或b大于9时为真：\n\n**(b < 2) || (b > 9)**\n\
    \n如果b小于2或b大于9，上述表达式返回真。\n\n在使用||运算符的表达式中，只要其中一个比较为真，表达式就为真。如果两个表达式都为假，则表达式为假。\n\
    \n布尔表达式可以使用!运算符取反。例如，\n\n**!(a > b)**\n如果“a不大于b”，则返回真。\n\n在大多数情况下，不需要使用感叹号(!)运算符。\n\
    \n例如，\n**!(a > b) 等同于 a <= b**\n\n## 真值表\n\n以下被称为真值表。它指出了每个表达式组合的所有可能性以及产生的布尔值。\n\
    \n与 (AND)\n\n| 表达式1 | 表达式2 | 表达式1 && 表达式2 |\n|---|---|---|\n| 真 | 真 | 真 |\n| 真\
    \ | 假 | 假 |\n| 假 | 真 | 假 |\n| 假 | 假 | 假 |\n\n或 (OR)\n\n| 表达式1 | 表达式2 | 表达式1 \\\
    |\\| 表达式2 |\n|---|---|---|\n| 真 | 真 | 真 |\n| 真 | 假 | 真 |\n| 假 | 真 | 真 |\n| 假 |\
    \ 假 | 假 |\n\n非 (NOT)\n\n| 表达式 | ! 表达式 |\n| --- | --- |\n| 真 | 假 |\n| 假 | 真 |\n\
    \n## 布尔表达式示例\n\n假设你只在饥饿且有钱的时候才买食物。在代码中表示这一点会是这样的。\n\n示例\n\n```cpp\n#include<iostream>\n\
    using namespace std;\n\nint main(){\n    bool isHungry = true;\n    bool hasMoney\
    \ = true;\n\n    if( isHungry && hasMoney){\n        cout << \"I will buy food\"\
    \ << endl;\n    }else{\n        cout << \"I can't buy food\" << endl;\n    }\n\
    \n    return 0;\n}\n```\n\n![](img/443990a0ec620659ce8be783c0758bc6_68_0.png)\n\
    \n## 解释\n\n字符串‘I will buy food’只有在变量**isHungry**和**hasMoney**都为真时才会被打印。否则，字符串‘I\
    \ can't buy food’会被打印。修改程序，使得如果**isHungry**为真或**hasMoney**为真，就打印‘I will buy food’。\n\
    \n## 练习\n\n1.  编写一个程序，如果分数小于10则输出单词**Small**，如果分数值大于100则输出**Big**。\n2.  编写一个程序，如果变量**test**大于或等于50且变量**codingPrograms**的值大于5，则输出单词**Success**。否则，程序输出单词**failure**。变量**test**和**codingPrograms**都是int类型。\n\
    3.  编写一个程序，如果变量**temp**大于37，或变量**press**的值大于1，或两者都满足，则输出单词**Danger**。否则，程序打印单词**Great**。变量**temp**和**press**都是int类型。\n\
    \n## 循环\n\n循环使我们能够将一组指令重复固定次数。如果我们愿意，也可以永远重复。\n\n通常有两种类型的循环，*有限循环*和*无限循环*。\n\n\
    有限循环将一组指令重复可数的次数，而无限循环则永远重复一组指令。\n\n### 我们如何指定循环\n\n在C++中，有两种声明循环的方式。\n一种是使用**for**关键字，另一种是使用**while**关键字。\n\
    \n### For循环\n\n假设你想在控制台打印你的名字10次，你可能会想到把指令`'cout << \"My name\"<< endl;'`写10次。\n\
    使用For循环是防止重复相同语句并缩短代码的好方法。\n\n## 示例\n\n![](img/443990a0ec620659ce8be783c0758bc6_71_0.png)\n\
    \n![](img/443990a0ec620659ce8be783c0758bc6_71_1.png)\n\n## 解释\n\n要使用**for循环**，我们指定希望运行与该for循环关联的代码块的次数。\n\
    \n与for循环关联的代码块位于开始和结束花括号之间\n\n```\n{\n}\n```\n\n在我们的代码中，关联的代码块只有一行：cout << \"\
    My name\" << endl;\n\n在与*for*关键字关联的开始和结束括号内，我们指定三个重要的内容，由两个分号分隔。\n\n第一个是从哪个数字开始计数，对我们来说，我们从1开始计数，所以我们声明整型变量**i**，其值为1。\n\
    \n第二个，与第一个用分号分隔，是为了使与for循环关联的代码块被执行而必须为真的条件。我们通常在这一部分使用比较运算符，如>、<、<=、>=。\n\n在我们的例子中，**i\
    \ <= 10**意味着只有当变量i的值小于或等于10时才运行代码块，否则停止循环并继续程序的其余部分。\n\n最后，第三部分，与第二部分用分号分隔，递增计数变量，在我们的例子中，我们使用特殊符号**i++**递增1。\n\
    \n此外，此递增发生在代码块运行之后。\n\n## 练习"
