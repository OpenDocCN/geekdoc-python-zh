    \            max_value = item\n\n    return max_value\n\nmaximum = find_max([1,3,9,200,6,-10])\n\
    print(\"Max in array is: \", maximum)\n```\n\nFirst we set max_value to the first\
    \ element in the array. This is temporary. Next we iterate through each element\
    \ in the array and check if that element is greater than the max we set, if so\
    \ it will set that value as the new max. Once it has iterated through the entire\
    \ array, max_value should contain the absolute max in the array.\n\nFor the given\
    \ array [1, 3, 9, 200, 6, -10], output is:\n\n```\nMax in array is:  200\n>>>\n\
    ```"
