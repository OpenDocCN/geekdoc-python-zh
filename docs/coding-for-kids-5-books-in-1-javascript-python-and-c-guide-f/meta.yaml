  md: '# CSS Terms


    **html{}, body{}:** The code within the html brackets defines the styling for
    the entire html files. The body code within the brackets is the code for the body
    of the html file.


    **text-decoration:** Can modify the text design by making it wavy, dotted, curly
    etc.


    **text-transform:** Can capitalize parts or the whole text


    **text-align:** Can align the text at the center, right or left


    **margin:** Margin is the space between elements. It is expressed in terms of
    pixels. For example, margin: 5px specifies a margin of 5 pixels.


    **padding:** Padding is the space within an element from the outer boundary. It
    is specified in pixels as well.


    **display:** Can be used to completely turn off an element. (e.g. display: none
    switches off the element completely)


    **hidden:** Can he used to hide an element while it still takes up space in the
    layout.


    **font-size:** Specifies the size of the font.


    **background-color:** Specifies the background color of the element. Any of the
    wide variety of colors in the link below can be chosen.

    https://www.quackit.com/css/css_color_codes.cfm


    **color:** Specifies the color of the written text.


    **border:** Specifies the presence and type/style of border around an element.
    There can be a hidden, dotted, double border; or there can also be no border.


    **font-weight:** Specifies the boldness of a font.


    **min-height:** Specifies the minimum height of an element. Height is in pixels.


    **line-height:** Specifies the height of a line of text. Height is in pixels.


    # CSS Button Elements


    **.btn{}** – This specifies the styling for any buttons defined in html. To make
    a button accessible in css, we have to include the class name in the html definition
    as we did in the previous example.'
