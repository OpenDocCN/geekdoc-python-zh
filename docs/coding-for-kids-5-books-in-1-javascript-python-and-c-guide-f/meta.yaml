- md: "## Conditionals and functions\n\n### Boolean values and expressions\n\nPython\
    \ has types `int` and `float` for numbers. Similarly, it has type `bool` for conditional\
    \ values `True` and `False`. Bool is named after British mathematician George\
    \ Boole who founded the mathematical discipline Boolean algebra, the basis of\
    \ modern computer science.\nBool types are extremely important in Python because\
    \ they are used to evaluate conditional statements. Conditional statements are\
    \ statements that change behavior of program based on some condition.\n\n```python\n\
    print(type(True))\nprint(type(False))\nprint(type(true))\n```\n\n```\n<class 'bool'>\n\
    <class 'bool'>\n```\n\n```\n---------------------------------------------------------------------------\n\
    NameError                                 Traceback (most recent call last)\n\
    <ipython-input-34-5bfe175a5f35> in <module>\n      1 print(type(True))\n     \
    \ 2 print(type(False))\n----> 3 print(type(true))\n\nNameError: name 'true' is\
    \ not defined\n```\n\nIn this snippet, we print out type of `True` and `False`.\
    \ Note that `True` is not the same as `true` as the code outputs an error when\
    \ trying print the type of `true` instead of `True`. Boolean expressions are expressions\
    \ evaluated to either `True` or `False`. We write Boolean expression using comparisons\
    \ operators.\n\n### Comparisons operators\n\nComparison operators are used to\
    \ compare value in python. Their output is always of type `bool` either `True`\
    \ or `False`.\n\n| Operator | name | Description | Example | Returns |\n| :---\
    \ | :--- | :--- | :--- | :--- |\n| == | Equality | Returns `True` if numbers are\
    \ equal else `False`. | 5 == 9 | False |\n| != | Not equal | Returns `True` if\
    \ numbers are not equal else `False`. | 5 != 9 | True |\n| > | Greater than |\
    \ Returns `True` if n1 > n2 else `False` | 10 > 1 | True |\n| >= | Greater than\
    \ or equal | Returns `True` if n1 >= n2 else `False` | 10 >= 10 | True |\n| <\
    \ | Less than | Returns `True` if n1 < n2 else `False` | 5 < 10 | False |\n| <=\
    \ | Less than or equal | Returns `True` if n1 <= n2 else `False` | 1 <= 2 | False\
    \ |\n\n### Logical operators\n\nPython has three logical operators `and`, `or`\
    \ and `not`. What each one does is similar to their intuitive meaning. The truth\
    \ table below capture what they do exactly.\n\n| X | Y | not X | X or Y | X and\
    \ Y |\n|---|---|---|---|---|\n| True | True | False | True | True |\n| True |\
    \ False | False | True | False |\n| False | True | True | True | False |\n| False\
    \ | False | True | False | False |\n\n### Example 1: Comparisons and logical operators\n\
    \nThis snippet illustrates some examples using comparison and logical operators.\n\
    \n```python\n# comparison operators\n\nx = 0\ny = 10\n\n# number comparisons\n\
    print(\"y == x is\", y == x)\nprint(\"y >= x is\", y >= x)\nprint(\"y < x is\"\
    , y < x)\nprint(\"y <= x is\", y <= x)\n\nprint()\n\n# logical operators\nprint(\"\
    (not True is)\", not True)\nprint(\"(True and True) is\", True and True)\nprint(\"\
    (True and False) is\", True and False)\nprint(\"(True or False) is\", True or\
    \ False)\nprint(\"(False or False) is\", False or False)\n```\n\n```\ny == x is\
    \ False\ny >= x is True\ny < x is False\ny <= x is False\n\n(not True is) False\n\
    (True and True) is True\n(True and False) is False\n(True or False) is True\n\
    (False or False) is False\n```\n\n## Conditional statements\n\n### If conditional\n\
    \nConditional statement is what makes programs smart. A computer is able to make\
    \ decisions that enable program to change its behavior according to some Boolean\
    \ expression that evaluated to either `True` or `False`. `if` conditional in its\
    \ simplest form is:\n\n```python\nif expression:\n    statement\n```\n\nWhere\
    \ it executes `statement` if `expression` evaluated to `True` only. Note that\
    \ statements must be indented below the `if` statement. The indented space is\
    \ called block.\n\n### If else conditional\n\nIf else is very similar to `if`\
    \ conditional except that we have `else` block that executes if `expression` is\
    \ `False`.\n\n```python\nif expression:\n    statement1\nelse:\n    statement2\n\
    ```\n\nNow we have 2 branches, first branch is `statement1` and second branch\
    \ is `statement2`. The program will execute the branch that correspond to logical\
    \ expression evaluation. Think of branches as a road that forks into different\
    \ roads.\n\n### if elif else conditional\n\nWhat if want to have multiple branches\
    \ instead of only two? `if elif else` conditional is also called chained conditionals.\
    \ In chained conditional only one branch is executed. `elif` stand for else if.\
    \ We can have any number of `elif` statements as the program logic needs.\nFirst,\
    \ `if expression` is evaluated, if it evaluates to false, then program proceed\
    \ to evaluating `expression2` belonging to first `elif`, the program keeps evaluating\
    \ each expression until it evaluates to `True` and execute the corresponding statement/block.\
    \ If all statements evaluate to `False` then it executes `else` block.\n\n```python\n\
    if expression:\n    statement1\nelif expression2:\n    statement2\nelif expression3:\n\
    \    statement3\nelse:\n    statement4\n```\n\n### Nested Conditional\n\nWhat\
    \ if we want to create branches inside other branches? We can nest `if` conditional\
    \ inside other `if` conditional. This is called nested conditional. Keep in mind\
    \ that too many nested conditionals generally make the program difficult to read\
    \ so use them only when you can’t capture your program logic using combination\
    \ of logical operators.\n\n```python\nif expression:\n    if expression1:\n  \
    \      statement1\n    else:\n        statement2\nelse:\n    statement3\n```\n\
    \nIn this snippet, nested conditional was reduced into a flat `if` conditional\
    \ using `and` logical operators. Observe that the second `if` conditional is easier\
    \ to read.\n\n```python\nx = -1\ny = 5\n\n# nested conditional\nif x < 0:\n  \
    \  if y < 10:\n        print(\"nested conditional: x < 0 and y < 10\")\n\nprint()\n\
    \n# Equivalent version using and\nif x < 0 and y < 10:\n    print(\"and version\
    \ conditional: x < 0 and y < 10\")\n```\n\n```\nnested conditional: x < 0 and\
    \ y < 10\n\nand version conditional: x < 0 and y < 10\n```\n\n### Example 2: Conditionals\n\
    \nIn this program, we first check if `x` is a positive number using simple `if`\
    \ conditional. Check if `y` is positive or negative number using `if else` conditional.\
    \ Note that there is a corner case left unchecked when `y` is zero so we use `if\
    \ elif else` to check if `z` is positive, negative or zero.\n\n```python\n# simple\
    \ if case\nx = 5\ny = -3\nz = 0\n\n# only check for positivity\nif x > 0:\n  \
    \  print(\"x is positive number !\")\n\nprint()\n\n# Check if number is positive\
    \ or negative using if else\nif y > 0:\n    print(\"y is positive number !\")\n\
    else:\n    print(\"y is negative number !\")\n\nprint()\n\n# Check if number is\
    \ positive, negative or zero using if elif else\nif z > 0:\n    print(\"z is positive\
    \ number !\")\nelif z < 0:\n    print(\"z is negative number !\")\nelse:\n   \
    \ print(\"z is zero !\", z)\n```\n\n```\nx is positive number !\n\ny is negative\
    \ number !\n\nz is zero 0\n```\n\n## Functions\n\nA function is a block of reusable\
    \ code that performs specific task when called. Think of them as a machine/black\
    \ box which take inputs and transform them into outputs. This black box is run\
    \ every time it’s called. Functions help in breaking the code into simple easily\
    \ maintainable reusable modules. In fact, you have been using function all the\
    \ way through this book without noticing. For example, `print()` is a function\
    \ that takes string input and display it on screen. Also, the string methods you\
    \ learnt in the past chapter are function that operates on strings.\n\nA black\
    \ box representing square function\n\n![](img/443990a0ec620659ce8be783c0758bc6_557_0.png)\n\
    \n### Functions definition\n\nFunctions are defined in python using `def` keyword.\n\
    \n```python\ndef function_name(input_parameters):\n    statements\n```\n\nTo call\
    \ a function type the function name with inputs.\n\n```python\nfunction_name(input_parameters)\n\
    ```\n\nIn the code below, we define a function that greets a user by name. It\
    \ takes one input a name and print hello to user name.\n\n```python\n# function\
    \ example\nmy_name = 'Jame'\n\n# say hello to name\ndef hello(name):\n    print(\"\
    Hello !\", name)\n\n# function call\nhello(my_name)\n```\n\n```\nHello ! Jame\n\
    ```\n\n### return statement\n\nIn the previous script, we ran `print` function\
    \ inside `hello` function, but what if we need to return just a value instead\
    \ to the caller?\nIn this snippet, `hello` function returns a string. `hello`\
    \ function is called first and the returned value is stored in the assigned variable.\n\
    \n```python\n# function example\nmy_name = 'Jame'\n\n# return hello to name\n\
    def hello(name):\n    return \"Hello !\" + name\n\n# function call\nreturned_name\
    \ = hello(my_name)\nprint(returned_name)\n```\n\n```\nHello !Jame\n```\n\n###\
    \ Empty return\n\nWhen a function return statement is empty it terminates the\
    \ function run and return `None`."
  mdcn: "## 条件语句与函数\n\n### 布尔值与表达式\n\nPython 有用于数字的类型 `int` 和 `float`。类似地，它也有用于条件值\
    \ `True` 和 `False` 的类型 `bool`。Bool 以英国数学家乔治·布尔的名字命名，他创立了布尔代数这一数学学科，这是现代计算机科学的基础。\n\
    布尔类型在 Python 中极其重要，因为它们用于评估条件语句。条件语句是根据某些条件改变程序行为的语句。\n\n```python\nprint(type(True))\n\
    print(type(False))\nprint(type(true))\n```\n\n```\n<class 'bool'>\n<class 'bool'>\n\
    ```\n\n```\n---------------------------------------------------------------------------\n\
    NameError                                 Traceback (most recent call last)\n\
    <ipython-input-34-5bfe175a5f35> in <module>\n      1 print(type(True))\n     \
    \ 2 print(type(False))\n----> 3 print(type(true))\n\nNameError: name 'true' is\
    \ not defined\n```\n\n在这个代码片段中，我们打印出 `True` 和 `False` 的类型。请注意，`True` 与 `true`\
    \ 不同，因为代码在尝试打印 `true` 的类型而不是 `True` 时会输出错误。布尔表达式是求值为 `True` 或 `False` 的表达式。我们使用比较运算符编写布尔表达式。\n\
    \n### 比较运算符\n\n比较运算符用于在 Python 中比较值。它们的输出始终是 `bool` 类型，即 `True` 或 `False`。\n\n\
    | 运算符 | 名称 | 描述 | 示例 | 返回值 |\n| :--- | :--- | :--- | :--- | :--- |\n| == | 等于\
    \ | 如果数字相等则返回 `True`，否则返回 `False`。 | 5 == 9 | False |\n| != | 不等于 | 如果数字不相等则返回\
    \ `True`，否则返回 `False`。 | 5 != 9 | True |\n| > | 大于 | 如果 n1 > n2 则返回 `True`，否则返回\
    \ `False` | 10 > 1 | True |\n| >= | 大于或等于 | 如果 n1 >= n2 则返回 `True`，否则返回 `False`\
    \ | 10 >= 10 | True |\n| < | 小于 | 如果 n1 < n2 则返回 `True`，否则返回 `False` | 5 < 10\
    \ | False |\n| <= | 小于或等于 | 如果 n1 <= n2 则返回 `True`，否则返回 `False` | 1 <= 2 | False\
    \ |\n\n### 逻辑运算符\n\nPython 有三个逻辑运算符 `and`、`or` 和 `not`。它们的功能与其直观含义相似。下面的真值表准确地描述了它们的作用。\n\
    \n| X | Y | not X | X or Y | X and Y |\n|---|---|---|---|---|\n| True | True |\
    \ False | True | True |\n| True | False | False | True | False |\n| False | True\
    \ | True | True | False |\n| False | False | True | False | False |\n\n### 示例\
    \ 1：比较和逻辑运算符\n\n此代码片段展示了一些使用比较和逻辑运算符的示例。\n\n```python\n# comparison operators\n\
    \nx = 0\ny = 10\n\n# number comparisons\nprint(\"y == x is\", y == x)\nprint(\"\
    y >= x is\", y >= x)\nprint(\"y < x is\", y < x)\nprint(\"y <= x is\", y <= x)\n\
    \nprint()\n\n# logical operators\nprint(\"(not True is)\", not True)\nprint(\"\
    (True and True) is\", True and True)\nprint(\"(True and False) is\", True and\
    \ False)\nprint(\"(True or False) is\", True or False)\nprint(\"(False or False)\
    \ is\", False or False)\n```\n\n```\ny == x is False\ny >= x is True\ny < x is\
    \ False\ny <= x is False\n\n(not True is) False\n(True and True) is True\n(True\
    \ and False) is False\n(True or False) is True\n(False or False) is False\n```\n\
    \n## 条件语句\n\n### If 条件语句\n\n条件语句使程序变得智能。计算机能够做出决策，使程序根据某个求值为 `True` 或 `False`\
    \ 的布尔表达式来改变其行为。最简单的 `if` 条件语句形式如下：\n\n```python\nif expression:\n    statement\n\
    ```\n\n其中，仅当 `expression` 求值为 `True` 时，才执行 `statement`。请注意，语句必须在 `if` 语句下方缩进。缩进的空间称为代码块。\n\
    \n### If else 条件语句\n\nIf else 与 `if` 条件语句非常相似，只是我们有一个 `else` 代码块，当 `expression`\
    \ 为 `False` 时执行。\n\n```python\nif expression:\n    statement1\nelse:\n    statement2\n\
    ```\n\n现在我们有两个分支，第一个分支是 `statement1`，第二个分支是 `statement2`。程序将执行与逻辑表达式求值结果相对应的分支。可以将分支想象成一条分叉成不同道路的道路。\n\
    \n### if elif else 条件语句\n\n如果我们想要多个分支而不仅仅是两个呢？`if elif else` 条件语句也称为链式条件语句。在链式条件语句中，只有一个分支会被执行。`elif`\
    \ 代表 else if。根据程序逻辑的需要，我们可以有任意数量的 `elif` 语句。\n首先，求值 `if expression`，如果它求值为 false，则程序继续求值属于第一个\
    \ `elif` 的 `expression2`，程序持续求值每个表达式，直到它求值为 `True` 并执行相应的语句/代码块。如果所有语句都求值为 `False`，则执行\
    \ `else` 代码块。\n\n```python\nif expression:\n    statement1\nelif expression2:\n\
    \    statement2\nelif expression3:\n    statement3\nelse:\n    statement4\n```\n\
    \n### 嵌套条件语句\n\n如果我们想在其他分支内部创建分支呢？我们可以在其他 `if` 条件语句内部嵌套 `if` 条件语句。这称为嵌套条件语句。请记住，过多的嵌套条件语句通常会使程序难以阅读，因此仅在无法使用逻辑运算符的组合来捕捉程序逻辑时才使用它们。\n\
    \n```python\nif expression:\n    if expression1:\n        statement1\n    else:\n\
    \        statement2\nelse:\n    statement3\n```\n\n在这个代码片段中，嵌套条件语句被简化为使用 `and`\
    \ 逻辑运算符的扁平 `if` 条件语句。观察第二个 `if` 条件语句更容易阅读。\n\n```python\nx = -1\ny = 5\n\n# nested\
    \ conditional\nif x < 0:\n    if y < 10:\n        print(\"nested conditional:\
    \ x < 0 and y < 10\")\n\nprint()\n\n# Equivalent version using and\nif x < 0 and\
    \ y < 10:\n    print(\"and version conditional: x < 0 and y < 10\")\n```\n\n```\n\
    nested conditional: x < 0 and y < 10\n\nand version conditional: x < 0 and y <\
    \ 10\n```\n\n### 示例 2：条件语句\n\n在这个程序中，我们首先使用简单的 `if` 条件语句检查 `x` 是否为正数。使用 `if else`\
    \ 条件语句检查 `y` 是正数还是负数。请注意，当 `y` 为零时有一个边界情况未检查，因此我们使用 `if elif else` 来检查 `z` 是正数、负数还是零。\n\
    \n```python\n# simple if case\nx = 5\ny = -3\nz = 0\n\n# only check for positivity\n\
    if x > 0:\n    print(\"x is positive number !\")\n\nprint()\n\n# Check if number\
    \ is positive or negative using if else\nif y > 0:\n    print(\"y is positive\
    \ number !\")\nelse:\n    print(\"y is negative number !\")\n\nprint()\n\n# Check\
    \ if number is positive, negative or zero using if elif else\nif z > 0:\n    print(\"\
    z is positive number !\")\nelif z < 0:\n    print(\"z is negative number !\")\n\
    else:\n    print(\"z is zero !\", z)\n```\n\n```\nx is positive number !\n\ny\
    \ is negative number !\n\nz is zero 0\n```\n\n## 函数\n\n函数是一个可重用的代码块，在被调用时执行特定任务。可以将它们视为一个机器/黑盒子，它接收输入并将其转换为输出。这个黑盒子每次被调用时都会运行。函数有助于将代码分解成简单、易于维护、可重用的模块。事实上，你一直在使用函数，只是没有注意到。例如，`print()`\
    \ 是一个函数，它接受字符串输入并将其显示在屏幕上。此外，你在上一章学到的字符串方法也是操作字符串的函数。\n\n一个代表平方函数的黑盒子\n\n![](img/443990a0ec620659ce8be783c0758bc6_557_0.png)\n\
