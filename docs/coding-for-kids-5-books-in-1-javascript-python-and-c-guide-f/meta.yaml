    # What does a MouseClick Element Do?


    A Mouse element detects the click/motion of the mouse and the location of the
    mouse cursor on the html canvas when the event happens. It can also perform a
    certain function when this happens.


    # MouseClick Example


    In the below example, the user checks if the mouse has been clicked on the canvas.
    It checks for the click using the line:

    `$(“#canvas”).click(mousec)`

    **canvas** is the name of the html canvas and **mousec** is the name of the function
    that runs on clicking the mouse. Inside the function, the user writes that the
    mouse has been clicked.'
