    \n```\nif *condition is True* :\n    if *condition is True* :\n        ......\
    \ execute this code block .......\n    elif *conditio is True*:\n        ......\
    \ execute this code block .......\n    else:\n        ...... execute this code\
    \ block .......\nelse:\n    ...... execute this code block .......\n```\n\n# Example\n\
    \nIn this example, we are going to take a 4-digit year as an input and check if\
    \ it is a leap year. Now, this is a little more complicated than we think. We\
