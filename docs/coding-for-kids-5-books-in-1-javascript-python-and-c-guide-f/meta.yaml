    \n# WHILE 循环示例 1\n\n当满足特定条件时，`while` 循环会运行。如果条件不再满足，它就会跳出循环。在下面的示例中，程序执行一个 `while`\
    \ 循环，该循环通过 `prompt` 函数接收用户输入。`while` 循环持续运行并打印用户输入的文本。当用户输入单词‘**STOP**’时，循环停止。一旦输入该单词，`while`\
    \ 循环就结束了，程序停止。\n\n```html\n<html>\n<head><title>While 循环测试</title></head>\n<body>\n\
    <button onclick=\"testwhileloop()\">测试</button>\n<script>\nfunction testwhileloop()\n\
    {\n    var inputtext = \"\";\n    while (inputtext != \"STOP\")\n    {\n     \
    \   inputtext = prompt(\"输入你现在想做的事情（全部大写输入）\");\n        document.write(\"下一个活动\
    \ = \"+inputtext+\"<br>\");\n    }\n}\n</script>\n</body>\n</html>\n```\n\n下面是显示其工作原理的输出。\n\
