    \ = int(input(\"Please enter the pyramid height: \"))\n\nfor i in range(pyramid_height):\n\
    \    for j in range(i):\n        print('*', end='')\n    print()\n```\n\n```\n\
    Please enter the pyramid height: 8\n*\n**\n***\n****\n*****\n******\n*******\n\
