  md: '# Math.Random()


    Math.Random() returns a random number between 0 and 1. If we want to get a random
    between 0 and 10, we multiply by 10 and round the answer (using Math.round()).
    Let’s look at a few examples.


    ```

    <html>

    <head><title>Sample Form</title></head>

    <body>


    <button onclick="test()">Random Numbers</button>


    <script>

    function test()

    {

    var n1 = Math.random();

    var n2 = Math.round(Math.random()*50);

    var n3 = Math.round(Math.random()*50);

    var n4 = Math.round(Math.random()*1000);


    var remainder=n1%n2;


    document.write("Random number between 0 and 1 = <strong>"+n1+"</strong><br>");

    document.write("1st Random number between 0 and 50 = <strong>"+n2+"</strong><br>");

    document.write("2nd Random number between 0 and 50 = <strong>"+n3+"</strong><br>");

    document.write("Random number between 0 and 1000 = <strong>"+n4+"</strong><br>");


    }

    </script>


    </body>

    </html>

    ```


    In the above example, n1 is a random number between 0 and 1.

    n2 and n3 are two different random numbers between 0 and 50. You should probably
    see that n2 and n3 are different because both numbers are randomized.

    n4 returns a random number between 0 and 1000.

    We can see the results in the output below. As the numbers are randomized we should
    get a different result each time we run the program.

    Math.Random() is a fun function and we are going to be using it in quite a few
    games this book.


    # Output:'
