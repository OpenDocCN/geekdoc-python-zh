  md: '# JavaScript Terms You Need to Know


    We are going through a couple of JavaScript html code examples next. We need to
    know the following terms to understand the code.


    **function**

    A JavaScript function is any set of lines of code that performs a task. A function
    is normally made to execute tasks that need to happen when you click on a html
    button. Every function has a name and is referenced in the html code. An example
    is below:

    `function abcd()`

    abcd is the name of the function that performs a specific task. It will be referenced
    in html code as abcd.'
  merge: -1
  pgno: 144
- img_proc: true
  md: '# Variable


    A variable is used to store names or numbers in JavaScript. Think of it as a box
    that can store one value. That box is referenced each time you need that value.
    It is defined as below:


    ```

    var flag=1;

    ```


    flag is the name of the variable and it stores the value of 1. So anytime flag
    is referenced in the JavaScript program; it has a value of 1 (unless you change
    the value of flag). This value of flag can be used to define other variables.
    For example:


    ```

    var king=flag*2;

    ```


    king now has a value of 1*2=2. So variables are a good way of dealing with unknown
    quantities.


    # document.getElementbyID().value


    This javascript term is used to get the value of an item in a html form textbox.
    So, if you fill out a form textbox with your name and click on a button, the document.getElementbyID()
    gets the value of what you typed in the box. As an example:


    ```

    var yname=document.getElementById("name").value;

    ```


    “name” is the id of the form textbox that is defined in html. To see how this
    is done in html, check out the section on html tags in the previous chapter. Whatever
    is typed in the textbox is stored in a variable called yname. It will be referenced
    in javascript from now on as yname.


    # Document.write()


    This function is used to print anything on the web browser. For example,


    ```

    document.write(“xyz”);

    ```


    Prints xyz on the screen. You can also add two different terms by using the “+”
    button.


    ```

    document.write(“xyz”+”123”);

    ```


    Prints xyz123 on the screen. This is useful when you want to add text to a variable.
    For example.


    ```

    var yname=document.getElementById("name").value;

    document.write(“My name is “+yname);

    ```


    If you typed in “Matt” in the textbox, it prints out “My name is Matt” on the
    screen.'
  merge: -1
  pgno: 145
