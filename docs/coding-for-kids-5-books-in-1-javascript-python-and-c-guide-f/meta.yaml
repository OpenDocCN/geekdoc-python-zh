    \nThis is a great practice program. But you might be thinking that kids can use\
    \ this program only once as we always use the same numbers. To fix this problem,\
    \ we generate random numbers in the next game.\n\n## Game 3 – Math Quiz with Random\
    \ Numbers\n\nIn this program below, there are 5 math questions generated by 10\
    \ random numbers. The 10 random numbers are variables **number1-number10**. The\
    \ answers to the questions are calculated and are stored in variables **answer1-answer5**.\
    \ These 15 variables are called global variables as they are outside any functions.\
    \ This means that their values can be accessed anywhere in the program by any\
    \ function.\nThe function **startquiz()** uses the 10 variables **number1-number10**\
    \ to write the quiz on the screen and create a form that takes in 5 answers with\
    \ id’s **num1-num5**. On clicking the **Check** button, these 5 answers are sent\
    \ to the function **guessnumber()** and stored as variables **guess1-guess5**.\
    \ These 5 answers (**guess1-guess5**) are checked against calculated answers (**answer1-answer5**)\
    \ using 5 different IF functions. Each time there is a correct answer, a counter\
    \ is incremented. Eventually, the counter is printed to show the number of correct\
    \ answers. There is also a **Home** button at the end which gives the user the\
    \ option to restart the program with fresh questions. These questions are randomly\
    \ generated which means that the user gets different questions each time.\n\n\
    ```html\n<html>\n<head><title>Math Quiz</title></head>\n<link rel=\"stylesheet\"\
    \ href=\"samplestyle.css\" />\n<body>\n<button class=\"btn\" onclick=\"startquiz()\"\
