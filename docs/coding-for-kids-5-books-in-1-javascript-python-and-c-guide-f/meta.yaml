  md: '# Lists


    Lists are sequences that store collections of items. List is one of the containers
    most commonly used due to its versatility. Lists can hold different types of data.
    They are heterogeneous meaning they don’t have to store similar data types. Lists
    are mutable so you cany modify a list after its creation. To create a list, put
    comma separated value in square brackets.


    ```

    my_list = []

    my_list = list( )

    ```


    or


    The code below creates lists of numbers, strings and a heterogenous list of both
    numbers and strings.


    ```

    # create list either by square brackets or list()

    my_list = []

    my_list = list()


    # Define list l1, l2, l3

    # list1 sequence of numbers

    list1 = [1, 2, 3]


    # list2 sequence of strings

    list2 = ["Nick", "Tom", "Jane"]


    # list3 sequence of numbers and strings

    list3 = ["Nick", 10, "Python", 50]


    # list4 a list containg other lists

    list4 = [l1, l2, l3]


    print("list1 is:", l1)

    print("list2 is:", l2)

    print("list3 is:", l3)

    print("list4 is:", l4)

    ```


    ```

    list1 is: [1, 2, 3]

    list2 is: [''Nick'', ''Tom'', ''Jane'']

    list3 is: [''a'', 1, ''Python'', 5]

    list4 is: [[1, 2, 3], [''Nick'', ''Tom'', ''Jane''], [''a'', 1, ''Python'', 5]]

    ```'
