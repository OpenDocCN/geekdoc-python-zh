  md: '# Conditional Statement


    We usually want to do something only when a certain condition is true. For example,
    if it is sunny outside then we go out and play, else we stay at home.


    The statement, it is sunny outside, can only either be true or false.


    In programming we have a data type that can only store the value true or false,
    this data type is known as a **boolean**. In C++ we usually shorten it to **bool**.


    In addition, we sometimes want to run lines of code only when a certain condition
    is true, and we achieve this using **if** statement. Let''s do an example, which
    will make it easier to understand


