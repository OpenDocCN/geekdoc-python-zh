- md: "## IF ELSE Loop – Example 2\n\n```html\n<html>\n<head>\n<title>Check if number\
    \ is divisible by 2......</title>\n</head>\n<body>\n<form id=\"form1\">\nEnter\
    \ Number: <input type=\"number\" id=\"num1\" size=\"20\"><br>\n</form>\n<button\
    \ onclick=\"checkdivby2()\">Check div</button>\n\n<script>\nfunction checkdivby2()\n\
    {\nvar number=parseFloat(document.getElementById(\"num1\").value);\nif ((number%2)==0)\n\
    {\n    document.write(number+\" is divisible by 2\");\n}\nelse\n{\n    document.write(number+\"\
    \ is not divisible by 2\");\n}\n}\n</script>\n```\n\nOutput:\n\nEnter Number:\
    \ [ ]\n\n[Check div]\n\nOutput (Filled 1):\n\nEnter Number: [12]\n\n[Check div]\n\
    \nOutput (After clicking ‘Check div’ button)\n\n12 is divisible by 2\n\nOutput\
    \ (Filled 2):\n\nEnter Number: [21]\n\n[Check div]\n\nOutput (After clicking ‘Check\
    \ div’ button)\n\n21 is not divisible by 2\n\n## Breaking down the code:\n\n```javascript\n\
    if ((number%2)==0)\n```\n\nAbove line of code checks if number is divisible by\
    \ 2\n\n```javascript\n{\n    document.write(number+\" is divisible by 2\");\n\
    }\n```\n\nAbove section of code is activated if number is divisible by 2. It prints\
    \ out that the number is divisible by 2.\n\n```javascript\nelse\n{\n    document.write(number+\"\
    \ is not divisible by 2\");\n}\n```\n\nAbove section of code is activated if number\
    \ is not divisible by 2. It prints out that the number is not divisible by 2.\n\
    \n## Exercises to Practice\n\nYou can copy the code above and play around with\
    \ it. Once you understand the code, you can create your own JavaScript html functions.\
    \ Here’s a couple you can try.\n\n1. Write a program that takes in school marks\
    \ in 6 subjects using 6 textboxes. Write a JavaScript function that checks the\
    \ average and then checking if the student passes or fails. If the score is less\
    \ than 60, then the student fails.\n2. Write a program that takes in a year and\
    \ checks if it is a leap year.\n\n## Nested Conditional Statements\n\nThese are\
    \ basically conditional statements within conditional statements. These are also\
    \ called nested loops. Let’s say that you want to check if two conditions are\
    \ true in Javascript, before you take an action; then you put two if loops within\
    \ each other. Let’s take the example from the previous chapter. We want to check\
    \ if George is hungry and has money to give him a snack. not true, then do something\
    \ else. As an example,\n\n```javascript\nIF (George==\"Hungry\")\n{\n    IF (George==\"\
    Has Money\")\n    {\n        Document.write('Buy George a Snack');\n    }\n  \
    \  ELSE\n    {\n        Document.write('Make George a Snack');\n    }\n}\nELSE\n\
    {\n    Document.write('No snack for George');\n}\n```\n\nIn the above example,\
    \ the code checks if George is hungry first. If George is hungry then it performs\
    \ a 2nd check. It checks if George has money. If George has money, it prints ‘Buy\
    \ George a snack’. If he’s hungry but doesn’t have money, then print ‘Make George\
    \ a snack’. If he’s not hungry, then print ‘No snack for George’. This is a simple\
    \ example of a nested IF ELSE statement in JavaScript.\n\n## NESTED IF ELSE LOOP\
    \ EXAMPLE\n\nIn this example, we are going to take a 4 digit year as an input\
    \ and check if it is a leap year. Now, this is a little more complicated than\
    \ we think.\nWe know that every 4 years is a leap year. So that is our first check.\
    \ So a year like 1996 would be a leap year.\nBut, every 100 years, there is no\
    \ leap year. So, 1800 and 1900 are not leap years.\nAlso, there is another exception.\
    \ Every 400 years, it is not a leap year. So 1600 and 2000 are not leap years.\
    \ So there are 3 checks.\n\n```html\n<html>\n<head><title>Leap Year Check</title></head>\n\
    <body>\n<form id=\"form1\">\nEnter Year: <input type=\"number\" id=\"year\" size=\"\
    20\"><br>\n</form>\n<button onclick=\"leapyear()\">Leap Year?</button>\n\n<script>\n\
    \nfunction leapyear()\n{\nvar yr=parseInt(document.getElementById(\"year\").value);\n\
    var lpyear=0;\n    if ((yr%4)==0)//First loop that checks if the year is divisible\
    \ by 4\n    {\n        lpyear=1;\n        if((yr%100)==0)//Second loop that checks\
    \ if the year is divisible by 100\n        {\n            lpyear=0;\n        \
    \    if((yr%400)==0)//Third loop that checks if the year is divisible by 400\n\
    \            {\n                lpyear=1;\n            }\n        }\n    }\nif\
    \ (lpyear==1)\n{\n    document.write(yr+\" is a leap year\");\n}\nelse\n{\n  \
    \  document.write(yr+\" is not a leap year\");\n}\n}\n</script>\n</html>\n```\n\
    \nOutput:\n\nEnter Year: [ ]\n\n[Leap Year?]\n\n### Run #1\n\nEnter Year: [1992]\n\
    \n[Leap Year?]\n\nOutput:\n\n1992 is a leap year\n\n### Run #2\n\nEnter Year:\
    \ [1995]\n\n[Leap Year?]\n\nOutput:\n\n1995 is not a leap year\n\n### Run #3\n\
    \nEnter Year: [1900]\n\n[Leap Year?]\n\n**Output:**\n\n1900 is not a leap year\n\
    \n### Run #4:\n\nEnter Year: 2000\n\nLeap Year?\n\n**Output:**\n\n2000 is a leap\
    \ year\n\nAs you can see from the above code and results, it properly calculates\
    \ the leap year through the use of 3 nested if loops.\n1992 is a leap year since\
    \ it is divisible by 4.\n1995 is not a leap year since it is not divisible by\
    \ 4.\n1900 is not a leap year since it is divisible by 100.\n2000 is a leap year\
    \ since it is divisible by 400.\n\n## Exercises to Practice\n\nYou can copy the\
    \ code above and play around with it. Once you understand the code, you can create\
    \ your own JavaScript html functions. Here’s a couple you can try.\n\n1. Three\
    \ sensors are attached to a printing device, with three alarms attached to the\
    \ sensors. The first sensor, \"A,\" detects if the device needs ink. The second\
    \ sensor, \"B,\" detects if the device needs repair. The third sensor, \"C,\"\
    \ detects if the device should jam. An alarm sounds if 2 or more problems occur.\n\
    2. Schools are given snow days given specific circumstances. If there is ice on\
    \ the roads, but no salt, then a snow day is given. If there is salt however,\
    \ then a snow day is not given. Regardless of whether or not there is salt, whenever\
    \ there is >2 inches of snow, then a snow day is given.\n3. A computer chip controls\
    \ whether or not children are allowed to watch a specific TV show. If the time\
    \ is before 5PM, then the TV always works. However, if it's after 5PM, then the\
    \ shows rating is used. If the rating is for General Audiences, then the TV will\
    \ work; however, if the rating is for Mature Audiences, then the TV does not turn\
    \ on.\n\n## Loops\n\nA loop is a set of instructions that is repeated a certain\
    \ amount of times. In most cases, a certain process is done and there is a count\
    \ of the process that increases by 1. At the end of the process, we check if the\
    \ count is over the number of times we need the process done. If it has reached\
    \ the number of times we need, then we stop the loop.\n\nFor example, let’s say\
    \ you want to print the numbers 1 to 10 on the screen. Then use a loop which counts\
    \ from 1 to 10. It prints the count on the screen each time.\n\nIn JavaScript,\
    \ we use a function called **FOR** to implement this loop. We’ll go through a\
    \ simple example below.\n\n### Example #1\n\n```html\n<html>\n<head><title>Print\
    \ 1 to 20</title></head>\n<body>\n\n<button onclick=\"printtotwenty()\">Print\
