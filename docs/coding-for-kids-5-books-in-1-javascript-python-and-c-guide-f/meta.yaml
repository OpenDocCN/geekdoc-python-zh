    \ Using the box analogy a data type determines the type of the box to store our\
    \ value. The value which we store is 20. The variable name is called **radius**,\
    \ which means the label on the box is radius.\nThe value of the variable can change\
    \ throughout the program as long as it is of the same data type. In the above\
    \ program, we change the value to 40.\n\nThis is acceptable as 40 is an int (integer)\
    \ data type."
  mdcn: "文本编辑器只是一个能让你编写代码并将其保存为文件的程序。\n\n文件通常在其文件名后带有扩展名，以表明文件的类型。编写C++文件时，文件扩展名为`.cpp`，例如`main.cpp`。\n\
    \n我们将使用一个名为Code::Blocks的应用程序来编写、编译和运行我们的程序。Code::Blocks被称为IDE，即集成开发环境。\n\nIDE将编写、编译和运行程序所需的一切都集中在一个地方。\n\
    \n下面是Code::Blocks IDE布局的图片。\n\n![](img/443990a0ec620659ce8be783c0758bc6_13_0.png)\n\
    \n## 下载和安装Code::Blocks\n\n你需要：\n\n- 1. 一台笔记本电脑/台式机\n- 2. 互联网连接\n- 3. 网页浏览器，如Chrome、Windows\
    \ Edge或Firefox\n\n访问此网站并下载Code::Blocks应用程序：\nhttps://www.fosshub.com/Code-Blocks.html?dwl=codeblocks-20.03mingw-setup.exe\n\
    \n只需将链接复制并粘贴到浏览器中。\n\n注意：请确保下载名为Code Blocks Windows 64 bit (including compiler)的文件。\n\
    \n此版本包含我们需要的编译器。\n\n之后只需安装应用程序，完成后打开它。\n\n你可以访问Code::Blocks网站了解更多：\nhttps://www.codeblocks.org/。该网站也包含用户手册和下载其他操作系统IDE的链接。\n\
    \n## C++中的Hello World\n\n所有程序员在学习一门新的编程语言时编写的第一个程序被称为Hello World。\n\n它基本上就是编写一个程序，在屏幕上显示“Hello\
    \ World”这几个字。既然我们现在是程序员了，我们说我们正在*打印*“Hello World”到屏幕上。\n\n我将提供代码示例，你需要在Code::Blocks中输入这些示例，并点击构建和运行按钮来编译和执行代码，以便查看结果。\n\
    \n### 在Code::Blocks中创建项目\n\n为了在Code::Blocks中运行代码，我们必须首先创建一个项目。所以首先我们需要打开Code::Blocks。\n\
    \n要创建一个项目，点击**文件 > 新建 > 项目**。\n\n在弹出的窗口中选择**控制台应用程序**，然后点击**Go**按钮。\n\n![](img/443990a0ec620659ce8be783c0758bc6_16_0.png)\n\
    \n确保在此窗口中选择**C++**。\n在信息窗口点击**下一步**。\n\n![](img/443990a0ec620659ce8be783c0758bc6_17_0.png)\n\
    \n为项目命名，目前是**Hello World**。选择保存项目的文件夹。\n\n![](img/443990a0ec620659ce8be783c0758bc6_18_0.png)\n\
    \n确保你选择了**GNU GCC Compiler**作为编译器，然后点击**完成**。\n\n现在在左侧，Hello World下方，点击**Sources文件夹**旁边的+图标以显示**main.cpp**文件。双击它，文件就会显示在右侧的编辑器窗口中。\n\
    \n![](img/443990a0ec620659ce8be783c0758bc6_19_0.png)\n\n编辑器中的代码如下所示。\n\n### 代码\n\
    \n```cpp\n#include <iostream>\nusing namespace std;\n\nint main()\n{\n    cout\
    \ << \"Hello World\" << endl;\n    return 0;\n}\n```\n\n我非常确定你第一次看到上面的代码时会觉得它很复杂。但通过接下来的几章，我们将理解这一切的含义。现在请坚持住，我将尝试解释这个程序的主要部分。\n\
    编程的诀窍在于坚持，因为你学得越多，事情就会变得越容易。\n\n让我们先运行代码。\n\n### 运行代码\n\n要运行代码，我们必须先编译它。\n\n在Code::Blocks中，我们使用*构建*这个术语而不是编译。这是因为一个项目通常由多个C++文件组成，我们将编译所有文件的过程称为构建。\n\
    \n编辑器顶部有三个按钮，使我们能够构建和运行项目。\n\n![](img/443990a0ec620659ce8be783c0758bc6_21_0.png)\n\
    \n黄色齿轮按钮用于构建项目，绿色播放按钮用于运行已构建的项目，而第三个按钮是齿轮和播放按钮的组合，用于构建并运行项目。点击这个组合按钮来执行项目。\n\n\
    将出现一个弹出窗口，显示“Hello World”，如下所示。\n\n![](img/443990a0ec620659ce8be783c0758bc6_22_0.png)\n\
    \n这就是所谓的**控制台**或**终端**。控制台显示C++的输出。关闭窗口即可将其关闭。\n\n注意：确保在构建和运行之前保存文件，这可以通过在每次更改后按**Control-s\
    \ (Ctrl+s)**来完成。\n\n### 代码解释\n\n这个程序的主要行是：\n\n```cpp\ncout << \"Hello World\"\
    \ << endl;\n```\n\n首先，注意这行以分号(;)结尾，这非常重要，因为它表示这条指令的结束。\n\n**cout**只是程序员对屏幕的称呼，你可以将其视为控制台输出的缩写。\n\
    \n符号<<的意思只是将我后面的内容显示在屏幕上。\n\n'Hello World'是我们想要显示在屏幕上的文本。注意它被双引号包围。双引号是语法的一部分，非常重要。\n\
    \n我们将被双引号包围的文本称为**字符串**。\n\n下一个<<符号的意思是，将我后面的内容添加到文本'Hello World'中。在编程中，我们称之为**连接**，即将两个字符串连接在一起。\n\
    \n**endl**，意思是添加一个换行符，换行符就像在电脑上打字时按回车键一样，它会将你带到当前文本下方的下一行。\n\n正如你所看到的，在编写程序时，我们不仅仅用纯英语书写，我们遵循一些特定的规则，称为语言的*语法*。\n\
    \n### 练习\n\n- 1. 更改文本，使程序打印出你的名字，构建并运行代码。\n- 2. 将代码行**cout << \"Hello World\"\
    ;**编写两次，看看控制台上打印了什么。这与编写两次**cout << 'Hello World' << endl;**有什么不同？\n- 3. 创建一个新项目，给它任意你喜欢的名字，并将其存储在不同的文件夹位置。\n\
    \    - a. 对于这个新项目，点击运行图标，注意发生了什么。\n    - b. 对于这个新项目，分别点击构建齿轮图标和运行图标，注意发生了什么。\n\
    \n## 变量\n\n在本章中，我将首先带你了解计算机中对编程重要的主要部分。\n\n计算机的主要部分是处理器。它负责实际读取你的代码并执行你指示的操作。\n\
    \n此外，还有一个称为**RAM**的存储区域，代表**随机存取存储器**。这是存储你所有需要的东西的地方，甚至你的程序也存储在这里。\n\n你可以把它想象成一堆带有盒子的架子，你可以在里面存放东西。此外，这些盒子有不同的大小和类型。因此，你可以决定在其中存放什么。\n\
    \n此外，我们可以给这些盒子贴上标签，以便以后可以轻松地引用名称。\n\n### 变量赋值\n\n变量是分配给存储在内存中的值的名称。\n\n变量名也称为**标识符**。\n\
    \n你可以将变量想象成一个盒子，我们将值放在里面，而变量名就是我们贴在盒子上的标签。\n\n还有一个称为数据类型的东西分配给每个盒子。数据类型是存储在盒子中的信息类型。这意味着特定的变量只能存储特定类型的数据。数据类型的例子包括字符串、数字、布尔值等。\n\
    \n下面是一个变量赋值的例子。我们在一个名为variables的新项目中用Code::Blocks编写它，按**Control-S**保存文件，然后构建并运行。\n\
    \n### 示例代码\n\n![](img/443990a0ec620659ce8be783c0758bc6_26_0.png)\n\n上面我们声明了一个名为*radius*的变量，数据类型为int，即整数，并将其初始化为值20。\n\
    \n**int**就是我们所说的**数据类型**。使用盒子的类比，数据类型决定了存储我们值的盒子的类型。我们存储的值是20。变量名叫做**radius**，这意味着盒子上的标签是radius。\n\
    只要数据类型相同，变量的值可以在整个程序中更改。在上面的程序中，我们将值更改为40。\n\n这是可以接受的，因为40是int（整数）数据类型。"
