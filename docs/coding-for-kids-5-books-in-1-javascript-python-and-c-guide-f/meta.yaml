    \ the file on the editor window on the right-hand side.\n\n![](img/443990a0ec620659ce8be783c0758bc6_19_0.png)\n\
    \nThe code in the editor looks like the example below.\n\n### Code\n\n```cpp\n\
    #include <iostream>\nusing namespace std;\n\nint main()\n{\n    cout << \"Hello\
