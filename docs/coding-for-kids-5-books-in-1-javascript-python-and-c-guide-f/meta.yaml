    \ random.choice(countries)\n    capital = capital_dic[country]\n\n    guess =\
    \ input(f'what is the capital of {country}.')\n    # if user type quit, quit\n\
    \    if guess.lower() == 'quit':\n        break\n    elif guess.lower() == capital:\n\
    \        print(f'Correct !')\n        break\n    else:\n        print(f'Incorrect.\
    \ The capital of {country} is {capital}.')\n```\n\n## 输出：\n\n```\nwhat is the\
    \ capital of india. []\nLet's learn World Capitals. Enter quit to quit the game.\n\
    ```\n\n## 输入了错误的答案。\n\n```\nLet's learn World Capitals. Enter quit to quit the\
    \ game.\nwhat is the capital of india.cairo\nIncorrect. The capital of india is\
    \ new delhi.\n\nwhat is the capital of norway. []\n```\n\n## 输入了正确的答案。\n\n```\n\
    Let's learn World Capitals. Enter quit to quit the game.\nwhat is the capital\
    \ of india.cairo\nIncorrect. The capital of india is new delhi.\nwhat is the capital\
    \ of norway.oslo\nCorrect !\n```\n\n在上面的代码中，输入了开罗作为印度的首都。由于答案不正确，程序输出“Incorrect.\
    \ The capital of india is new delhi”。\n\n在程序的第二部分，输入了“oslo”作为挪威的正确首都，程序输出“correct!”。\n\
    \n## 示例 5 – 随机名言\n\n这个示例使用 `random.choice()` 函数从一个名言元组中生成随机名言。虽然使用列表也可以，但这里使用元组是因为我们不打算对名言进行任何操作，它们在整个程序中保持不可变。对于大型不可变对象，元组更高效，也更安全，因为它保证对象在没有错误的情况下永远不会被更改，防止了意外操作。\n\
    \n```python\n# Random quote\nimport random\n\n# since we dont intend to do any\
    \ operation on quotes we use tuple instead of lists\nquotes = (\n    \"Yesterday's\
    \ the past, tomorrow's the future, but today is a gift.\",\n    \"The best preparation\
    \ for tomorrow is doing your best today.\",\n    \"Change your life today.\",\n\
    \    \"If you fell down yesterday, stand up today.\",\n    \"Never give up. \"\
    ,\n    \"Dream as if you'll live forever.\",\n    \"The science of today is the\
    \ technology of tomorrow.\",\n    \"Did I offer peace today?\",\n)\n\nrand_quotes\
    \ = random.choice(quotes)\nprint(\"Todays quote is:\", rand_quotes)\n```\n\nTodays\
    \ quote is: Change your life today.\n\n## 示例 6 – 猜测国家名称\n\n在这个示例中，我们制作了一个类似于“吊死鬼”的游戏，要求用户猜测国家的名称。我们有一个包含多个国家名称的元组。用户在失败前可以有几次错误的猜测机会。我们创建一个列表来存储正确猜测的字符，正确的猜测会被追加到这个列表中。当猜测列表的长度等于国家名称的长度时，用户获胜。请注意，我们使用列表数据结构来存储猜测的字符，因为它需要持续更新，而国家名称使用元组，因为它永远不会被修改。\n\
    \n```python\n# guess a random country\n\nimport random\n\n# list of countries\n\
    countries = ('france', 'usa', 'spain', 'india', 'brazil', 'norway', 'germany')\n\
    \n# Choose random country from countries\ncountry = random.choice(countries)\n\
    \n# number of turns\nturns = 4\n\n# a list to store the guessed characters\nguessed\
    \ = []\nwhile turns > 0:\n    # print guessed characters\n    for char in country:\n\
    \        if char in guessed:\n            print(char, end='')\n        else:\n\
    \            print('-', end='')\n\n    print()\n    print(f\"You have {turns}\
    \ left.\")\n\n    # user input\n    guess = input(\"guess a character:\")\n\n\
    \    # make sure guess is lowercase\n    guess = guess.lower()\n\n    # if guess\
    \ already made\n    if guess in guessed:\n        print(\"You have already made\
    \ this guess\\n\")\n\n    # check input with the character in word\n    if guess\
    \ not in country:\n        turns -= 1\n    else:\n        # character is in word\
    \ , append character\n        # the number of times it appear in word\n      \
    \  count = country.count(guess)\n        for i in range(count):\n            guessed.append(guess)\n\
    \n    # if guessed length match country length then user wins\n    # else if ran\
    \ out of turns user loses\n    if len(guessed) == len(country):\n        print(\"\
    Congratulation you guessed correctly!!\")\n        break\n    elif turns == 0:\n\
    \        print(\"Good luck next time\")\n```\n\n## 输出：\n\n```\nGuess the characters\n\
    ------\nYou have 4 left.\nguess a character:n\nn-----\nYou have 4 left.\nguess\
    \ a character:o\nno----\nYou have 4 left.\nguess a character:r\nnor---\nYou have\
    \ 4 left.\nguess a character:w\nnorw--\nYou have 4 left.\nguess a character:a\n\
    norwa-\nYou have 4 left.\nguess a character:f\nnorwa-\nYou have 3 left.\nguess\
    \ a character:y\nCongratulation you guessed correctly!!\n```\n\n## 练习题\n\n1. \
    \ 编写一个程序，将字典的所有值追加到一个列表中。\n2.  编写一个程序，检查给定的键是否存在于字典中。\n3.  编写一个程序，找出字典中的最大数值。\n\
    4.  编写一个程序，接受两个大小相等的列表，并将它们转换为一个字典，其中列表1包含键，列表2包含值。\n5.  创建一个程序，从笑话列表或元组中随机选取并打印一个笑话。\n\
    \n## 对象\n\n对象是属于某个类的数据结构实例的集合。这些实例可以具有不同的数据类型。可以将类想象成一个生产对象的工厂。\n\n### 示例 1：对象形状\n\
    \n在这个示例中，我们创建了一个 `shape` 类，该类为对象分配名称、颜色、大小和位置。然后我们在第8行通过调用该类创建了对象 `my_shape`。在第9到12行，我们使用点号‘.’表示法访问对象的值。例如，`my_shape.name`\
    \ 是 circle。然后我们通过将对象的值重新赋给不同的值来更改它们。\n\n```python\n# create class\nclass shape:\n\
    \    name = 'circle'\n    color = 'red'\n    size = 5\n    position = (0,0)\n\n\
    my_shape = shape()\nprint(\"name is: \", my_shape.name)\nprint(\"color is: \"\
    , my_shape.color)\nprint(\"size is: \", my_shape.size)\nprint(\"position is: \"\
    , my_shape.position)\n\nmy_shape.name = 'triangle'\nmy_shape.color = 'black'\n\
    my_shape.size = 10\nmy_shape.position = (10, 10)\n\nprint()\nprint(\"my_shape\
    \ values after reassignment are:\")\nprint()\n\nprint(\"name is: \", my_shape.name)\n\
    print(\"color is: \", my_shape.color)\nprint(\"size is: \", my_shape.size)\nprint(\"\
    position is: \", my_shape.position)\n```\n\nname is: circle\ncolor is: red\nsize\
    \ is: 5\nposition is: (0, 0)\n\nmy_shape values after reassignment are:\n\nname\
    \ is: triangle\ncolor is: black\nsize is: 10\nposition is: (10, 10)\n\n### 示例\
    \ 2：骰子游戏\n\n这是一个两名玩家之间的骰子游戏，骰子被投掷1000次。如果骰子投掷结果是偶数，玩家1得1分；如果是奇数，玩家2得1分。骰子投掷是使用随机数函数实现的。\n\
    \n```python\n# dice game if it is even player 1 point\n# odd player 2 gets 1 point\n\
    # import random library\nimport random\n\n# create class player with score intialize\
    \ to zero\nclass player:\n    score = 0\n\n# if number is even return True else\
    \ return False\ndef is_even(n):\n    even = None\n    if n % 2 == 0:\n       \
    \ even = True\n    else:\n        even = False\n\n    return even\n\n# create\
    \ players\nplayer1 = player()\nplayer2 = player()\n\n# run loop for 1000 times\n\
    for i in range(1000):\n    # dice flip , return random number between 1 and 6\
    \ inclusive\n    dice = random.randint(1, 6)\n\n    if is_even(dice):\n      \
    \  player1.score += 1\n    else:\n        player2.score += 1\n\nprint(\"Player\
    \ 1 score is: \", player1.score)\nprint(\"Player 2 score is: \", player2.score)\n\
    ```\n\n`randint` 生成1到6之间的数字（包含1和6）。`player` 类创建了分数初始化为零的玩家对象。每次一个玩家获胜，我们就访问 `player.score`\
    \ 并将其加一。\n\n```\nPlayer 1 score is:  518\nPlayer 2 score is:  482\n```\n\n我们可以看到玩家的分数很接近，这是预期的，因为每个玩家获胜的概率是50%，因为骰子输出的奇偶比例是1:1。\n\
    \n## 练习题"
