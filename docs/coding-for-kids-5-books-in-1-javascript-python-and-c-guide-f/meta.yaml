  md: '# Moving a ball in different direction


    In this example we move a ball in 4 different directions using move_right, move_left,
    move_up, and move_down functions.

    The logic is similar to previous examples, instead of growing shape size every
    frame we ‘grow’ object position each time.

    The ball starts in the center and keeps moving until it hits border where restarts
    from center again.

    move_right() function works by updating the ball coordinates. The function does
    not take any inputs because it accesses x and y directly in the global scope because
    x and y are defined as a global variable.

    With each function call the x coordinate is incremented by step size of 2 pixels.
    The step size determines how smooth the shape moves.

    The function makes sure the ball is near border by never incrementing x beyond
    480. The background surface size is 500. If x > 480 the ball position is reset
    to center.'
