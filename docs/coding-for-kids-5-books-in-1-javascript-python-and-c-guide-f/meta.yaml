    \ <input type=\"number\" id=\"age\" size=\"20\"><br>\n</form>\n<button onclick=\"\
    writename()\">Print Intro</button>\n\n<script>\nfunction writename()\n{\n    //创建变量\n\
    \    var nameValue=document.getElementById(\"name\").value;\n    var hobby=document.getElementById(\"\
    hobby\").value;\n    var age=document.getElementById(\"age\").value;\n\n    //在屏幕上打印姓名\n\
    \    document.write(\"This is \"+nameValue+\". I am \"+ age+\" years old.My favorite\
    \ hobby is \"+hobby);\n}\n</script>\n</body>\n</html>\n```\n\n下面是注释的一个例子。注释是绿色的，并用红色圈出。\n\
