    \ a data type and a variable name followed by a semicolon:\n\nWhen you declare\
    \ a variable without giving it a value, we say that the variable is *uninitialized*.\n\
    Uninitialized variable will have a random value in it.\n\nGiving an uninitialized\
    \ variable a value is known as *initializing* it.\n\nYou can also declare and\
