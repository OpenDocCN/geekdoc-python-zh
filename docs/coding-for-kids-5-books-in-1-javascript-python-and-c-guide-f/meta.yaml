    five stars *****. For censorship’s sake, we are using “Fudge” as our curse word.

    The button runs **filterc()** function. The **filterc()** function takes in the
    text via the textarea id in the form. An IF function with **.includes** and **.toUpperCase()**
    checks if the word “Fudge” is found. The **.toUpperCase()** is used because we
    do not know if the curse word is entered in lower case or Upper case.

    If it is the curse word, we use **.replace** to replace the words “Fudge” and
    “FUDGE” with “******”. At the end, we print out the modified string. We have the
    code and a couple of output variations below.'
