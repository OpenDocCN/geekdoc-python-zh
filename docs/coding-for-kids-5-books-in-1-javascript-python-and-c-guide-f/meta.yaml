    \n## 第二本书：\n\n## 面向 9-15 岁儿童的编程\n\n从零开始学习基础 HTML、CSS 和 JavaScript\n\n## 引言\n\n\
    那是一个亚特兰大明媚的夏日午后；我抓起笔记本电脑，到外面的门廊上看《权力的游戏》最新一集。当我坐在那把三条腿的椅子上时；我感到后腿有些摇晃。那条腿直接从凳子上脱落，我仰面摔倒在地上。听到门廊上传来巨大的撞击声，我的妻子伊莎贝尔和儿子阿尔纳德都跑了出来。“你还好吗？”伊莎贝尔倒吸一口气问道。我吓了一跳，但没事，伊莎贝尔扶我站了起来。我走进屋里，喝了杯水让自己回过神来。令我惊讶的是，我透过窗户看到我9岁的儿子阿尔纳德正试图弄清楚如何把它拼凑起来。他把腿装了回去，但发现椅子仍然摇晃。然后，他把螺丝换到了另一条好腿上的螺丝；椅子还是摇晃。最后，他用胶水粘住了固定螺丝的滑动机构；椅子神奇地修好了。哇！！\n\
    \n接下来，我们来谈谈贝蒂。我们邻居的女儿贝蒂，在社会科学这门课上挣扎了很长时间。她的父母已经习惯了这门课不及格；每次她拿到“D”都会松一口气。所以，想象一下，当贝蒂有一天拿着成绩单回来，上面显示社会科学得了“A”时，他们有多震惊。是的，贝蒂是个勤奋的女孩，她在一些科目上确实表现不错；但这次转变是出乎意料的。然后，贝蒂向父母展示了她过去三个月的社会科学提升计划。她列出了每周要学习的主题清单；以及她将如何通过纪录片和小组学习来简化一些较难的主题。她系统地从一个主题推进到另一个主题，直到涵盖了所有内容。\n\
    \n最后，我们来说说卡尔。卡尔在高中刚开始时是一名网球运动员。他比对手矮小和瘦弱得多。结果，他在第一次锦标赛中输得很惨。他甚至很难拿到几分。虽然他很沮丧，但他意识到他的失败并非由于缺乏技巧；而是基于环境因素。他分析了情况；意识到他需要提高自己的技巧和在球场上的位置感。他分析了对手在球场上的移动；并调整自己的击球方式，以确保始终让对手失去平衡。他做了大量的瑜伽和其他伸展运动来提高柔韧性、平衡性和速度。他开始逐月进步。每个月，他都练习一种不同的击球。几年后，他长高了，变得更强壮、更结实。由于他的努力，他的技巧比对手好得多。在他高中的第三年，他赢得了年度锦标赛，几乎没有遇到任何竞争。\n\
    \n所有这些情况都是假设的，可能由于某些孩子的先天特质而发生。此外，编程并不能保证你将学会这些技能。但是，所有这些情况都展示了在编程过程中可以学到的技能。阿尔纳德系统地检查了椅子及其不同的部件；并逐一检查每个部件以找到问题。这与编程中一个叫做“调试”的过程相同。调试发生在程序无法运行时。它需要系统地分析代码以找到问题并使其运行。\n\
    \n贝蒂审视了一个问题；并将其分解为实现结果所需的不同部分。这类似于编程中的问题解决。这是理解解决编码问题所需的内容；并将代码组织成不同的部分以使程序运行。\n\
    \n卡尔和贝蒂做的是同样的事情；他将问题分解成不同的部分，以便以简单的方式解决。但是，除此之外，他还在网球场上对不同的技能进行优先级排序。他花时间弄清楚哪些技能对击败对手更重要，并首先练习这些技能。在代码结构正确之后，优先级排序是编程中的一项重要技能。程序员希望优先测试代码中更重要的任务。\n\
    \n所有这些技能对编程都至关重要；如果你的孩子想学好编程，他们应该学习这些技能。他们是否真的成为程序员并不重要。这些技能将使你的孩子终身受益。编程还能帮助孩子提高基础数学和阅读能力；以及更好的逻辑和解决问题的能力。\n\
    \n这些技能，加上他们在高中学到的沟通技能，是软件工程师在美国年薪中位数达到 112000 美元（截至 2018 年）的原因。这是美国平均工资的两倍多。\n\
    \n尽管如此，世界各地的高中，即使在富裕地区，也缺乏处理这项任务的人员和技术资源。根据 Tech Republic 在 2000 年进行的一项 K-12 教师调查，只有\
    \ 8% 的教师认为自己能胜任教孩子编程。美国 50% 的孩子在家里无法上网。对于美国的女孩和有色人种儿童来说，情况更糟；他们拥有更少的资源和可以效仿的榜样。\n\
    \n所以，你需要自己动手。\n\n## 不该做什么\n\n你可能想知道你需要做什么来开始。有几件事我建议不要做。我建议不要雇佣没有教孩子经验的程序员。他们是这个领域的专家；但他们开始编程已经是几十年前的事了；所以，他们无法理解一个还没学过编程、正在学习基础数学的孩子。接下来要避免的是去寻找最新的\
    \ JavaScript 教科书；然后读给你的孩子听。这些对于学习编程来说，就像字典对于学习语言一样有用。它们很贵，而且对现有程序员来说更像是参考工具。我也建议不要参加编程训练营。这些可能对少数学生有用；但大多数学生会在一大群学习的孩子中迷失方向。一对一的关注是开始的最佳方式。\n\
    \n## 开始的第一步\n\n本书是开始的最佳方式。我将编程分解为一系列基础章节；并将其与现实世界联系起来。第一章将帮助你设置 JavaScript 和 html\
    \ 文件，以便你开始学习。\n\n我还有每一章的代码，你可以复制粘贴来运行。代码的每个方面都有详细解释；我还提供了练习，你可以用本章的概念自己完成。\n\n\
    我在书末还推荐了一对一的导师；以及你可以用来拓展知识的额外书籍。"
