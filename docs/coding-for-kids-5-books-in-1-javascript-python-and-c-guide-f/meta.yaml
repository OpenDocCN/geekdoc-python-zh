  md: '# # Variables


    In this chapter I will first take you through the main parts of the computer that
    are important in programming.


    The main part of the computer is known as the processor. This is what actually
    reads your code and does what you instructed.


    In addition, there is a storage area known as **RAM**, which stands for **Random
    Access Memory**. This is where everything you need is stored, even your program
    is stored here.


    You can think of it as a bunch of shelves with boxes where you can store things.
    In addition, these boxes are of different sizes and type. Hence you can determine
    what you can store in them.


    In addition, we can label these boxes so that we can refer to the name later easily.


    # ## Variable Assignment


    A variable is a name given to a value that is stored in memory.


    A variable name is also known as an **identifier**.


    You can think of a variable as a box where we place our value in, and a variable
    name as a label we place on the box.


    There is also a thing called data type assigned to each box. A data type is a
    type of information that is stored in a box. That means that the particular variable
    can store only a particular type of data. Examples of data types include strings,
    numbers, booleans etc.'
  merge: -1
