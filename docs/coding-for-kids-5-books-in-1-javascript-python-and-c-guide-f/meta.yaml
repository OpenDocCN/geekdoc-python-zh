    # 引言


    ## 什么是编程


    编程是编写计算机程序的艺术。计算机程序是一组机器可以理解以执行特定任务的指令。计算机编程是人类与机器沟通的方式。


    计算机非常擅长遵循我们给出的指令。


    程序仅仅是为了实现目标而需要遵循的一系列步骤。它就像一份食谱，要准备您喜爱的菜肴，只需按照食谱上的说明操作即可。


    唯一的问题是计算机不像我们那样说英语，它们有自己的语言。这种计算机语言被称为机器语言。


    计算机中有一个部分叫做解释器，它将我们的指令解释为机器语言，以便计算机能够理解我们给出的指令。这个解释器也被称为**编译器**。


    编译器是编程语言和机器之间的接口。编程语言是一种非常容易学习的语言，市面上有众多编程语言。在本书中，我们只学习C++。


    如您所知，口语通常有语法。语法是一种在语言中排列单词的方式，以便让说这种语言的人理解。编程语言也有语法，我们称之为**语法**。


    为了让编译器理解您，您必须使用正确的语法，否则会导致错误。我们将首先花大量时间学习编程语言的语法。


    总之，我们使用编程语言编写程序。编程语言与编译器通信。编译器将语言翻译成机器语言，然后运行程序。计算机读取我们的指令并执行我们告诉它做的事情。


    您的第一门编程语言通常是最难学的，但学会之后，学习其他语言就会变得更容易。


    ## 为何选择C++


    学习C++后，您可以做很多事情。您可以制作游戏，使用Arduino板制作很酷的项目，甚至如果允许的话，可以编程飞机。您唯一的限制是您的想象力。


    C++的主要优点是它在操作系统和编译器之间具有很强的可移植性。这意味着相同的代码可以在Windows、Linux、Opera等系统中使用。


    C++拥有庞大的社区支持，包括开发者论坛、在线教程、Facebook社区群组，这对初学者程序员非常重要。当您遇到困难时，可以向社区中的其他人请教，学习起来容易得多。


    C++在多种环境中也具有很强的可扩展性和灵活性。这意味着初学者程序员和高级专业人士都可以出于不同目的使用它。它还可以用于编写游戏、应用程序、软件和App。


    C++广泛应用于图形领域，现在也用于图像处理、模式识别等新兴技术以及位置追踪等嵌入式系统。


    C++在使用计算机内存方面效率更高，因此可以节省硬盘空间。


    ## 为何学习编程


    编程的核心其实不是编写代码，而是思考解决问题的方法。您将学习并理解解决问题有多种方法，有时一种方法比另一种更好。您还会了解到，将大问题分解成小部分会使您的工作更容易。


    编程也是关于学习如何与他人协作。人们通常认为程序员独自解决问题，但大多数时候程序员是作为一个团队工作的。我们喜欢与他人分享我们构建的东西，这使我们能够相互学习，从而提升彼此的技能。


    此外，编程教会您不要轻易放弃，因为您的程序第一次编写时永远不会成功。您会不时遇到错误，但作为程序员，您不会让它们击垮您。您会在跌倒时重新站起来，再次尝试。


    最后，在这个计算机几乎运行一切的数字世界中，您会感到得心应手。对您来说，这不再是魔法，因为您知道如何使用计算机来完成任务。


    即使最终没有成为程序员，您也将了解计算机如何在工作中帮助您，并获得所有这些技能。


    ## 搭建工作环境


    要编写代码，您至少需要一个文本编辑器和一个编译器。'
