    ## 为什么 Python 适合初学者


    Python 是一门非常适合学习的编程语言。它易于上手，是进入编程世界的良好起点。Python 由一位名叫吉多·范罗苏姆的人发明，他当时正在一个名为 ABC
    的教育项目中工作，旨在为新程序员构建一种语言。该项目的结果就是他创建了 Python 编程语言。吉多在创建 Python 时考虑了四个主要目标。这些目标是：直观、开源、易于理解以及通用性强以缩短开发时间。Python
    至今仍在不断发展和成熟。许多爱好者和开发者每天都在使用它完成各种任务。Python 被用于许多任务，如 Web 开发、脚本编写、网络爬虫、数据分析和自动化。以下是
    Python 的优点：


    ### 学习曲线平缓


    Python 学习所需时间很短。这使得它成为初学者开始学习编程的绝佳语言。这就是为什么它被世界各地许多计算机科学入门课程所采用。


    ### 直观


    Python 的语法非常易于阅读。事实上，它读起来非常像英语，这是其直观性的原因之一。该语言整体上保持一致，易于阅读。你无需花时间去理解晦涩的符号和语法。代码被阅读的次数远多于被编写的次数。这就是为什么可读性对一门语言来说是一个巨大的优势。


    ### 极少的样板代码


    “Hello World” 程序是一个常见的基础程序，只有一行代码。像这样的简单程序可以用很少的“起始代码”或额外代码编写。Python 内置了强大的数据类型。Python
    有列表、字典、元组、集合、字符串。这些数据类型使得你可以立即开始开发，而无需从头实现这些数据结构。这些数据类型（以及更多）有助于缩短开发时间并提供更灵活的时间安排。


    ### 优秀的生态系统


    一门编程语言本身的价值有限。使其被广泛采用和有用的是它所拥有的支持社区和库。有大量的第三方库和人员可以帮助你。


    ### 解释型语言


    Python 是一种高级脚本语言（如 PHP、Ruby、Perl、JavaScript 等）。这类高级语言通常不需要预先声明变量。它们允许变量类型改变。这称为动态类型。Python
    是一种解释型语言，意味着程序可以直接运行，无需在执行前进行编译。


    ### 通用性强


    Python 有许多应用领域，包括数据科学、机器学习、Web 开发和游戏开发。

    以下是一些 Python 模块的示例。


    - [Pandas](https://pandas.pydata.org/) 用于数据整理和分析。

    - [matplotlib](https://matplotlib.org/)，一个绘图库，可用于使用多种图表类型绘制图形。

    - [Pygame](https://www.pygame.org/) 用于开发游戏。

    - [Django](https://www.djangoproject.com/)，一个用于 Web 开发的框架。


    Python 强调基础，该语言的核心哲学是“Python 之禅”。你可以通过在 Python 中输入“import this”来获取它们。Python 之禅是：


    1. 优美优于丑陋。

    2. 明了优于隐晦。

    3. 简洁优于复杂。

    4. 复杂优于繁琐。

    5. 扁平优于嵌套。

    6. 稀疏优于密集。

    7. 可读性很重要。


    ## 设置 Python 工作区


