    <a href=www.google.com>


    ## Exercises to Practice:


    You can copy the above examples and once you are able to run them and understand
    the code; you can try a few of the problems below.


    - 1. Add a home button and link your best css design to every web page that you’ve
    designed in this book.

    - 2. Create a program that links to external web pages based on user preference.


    ## Math Functions


    This is amazing so far. But what if you want to make a mini calculator? Or teach
    math to kids? Learning how to code Math functions is a great way to also increase
    the pace at which your kids understand Math. You can set up Math tests for your
    kids and verify them with JavaScript functions.

    Let’s get started with some basic Math functions that we can implement in JavaScript.


    **Math.Round()**

    Math.Round() rounds a decimal number to the nearest whole number. For example,
    Math.Round(1.635) rounds to 2; while Math.Round(1.43) rounds to 1


    **Math.ceil()**

    Math.ceil() round to the higher number. It basically rounds up to the higher whole
    number. For example, Math.ceil(1.67) returns 2; while Math.ceil(2.01) returns
    3.


    **Math.floor()**

    Math.floor() rounds to the lower whole number. It basically removes the decimal
    points from a decimal number. So, Math.floor(1.47) returns 1; and Math.floor(2.34)
    also returns 2.


    **Math.Sqrt()**

    Math.Sqrt() returns the square root of a number. So, Math.sqrt(9) returns 3; while
    Math.sqrt(16) returns 4.


    **Math.min()**

    Math.min() returns the minimum value of an array. Just put the array inside the
    bracket. So, if

    a=[13,11,34,54,9];

    Math.min(A) returns 9


    **Math.max()**

    Math.min() returns the maximum value of an array. So for the above example, Math.max(A)
    returns 54.


    ## Math.Random()


    Math.Random() is a cool function. It returns a random decimal number between 0
    and 1; not including 1.

    So, Math.Random() could include 0.95 the first time and 0.43 the second time.

    So, you could play a guess the number game between 0 and 10. Just do this below:

    **Math.Round(Math.Random()*10)** gives you a random whole number between 0 and
    10.


