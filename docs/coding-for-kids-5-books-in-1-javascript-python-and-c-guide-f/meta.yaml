  md: '# Trigonometry


    Yes, JavaScript can be used for trigonometric functions as well. Here’s a few
    of them.

    Math.sin(x) returns the sine value of x radians. If we want to find the sine of
    x degrees, then we have to convert it to radians. So, we should change the function
    to Math.sin(x*MATH.PI/180).

    Also, keep in mind that in Javascript, we represent the value of π as Math.PI

    We can also do cos and tan function using Math.cos(x) and Math.tan(x), where x
    is in radians.

    Let’s look at an example program below:


    ```

    <html>

    <head><title>Sample Form</title></head>

    <body>

    <button onclick="test()">Test</button>

    <script>

    function test()

    {

    var n1 = Math.sin(5);

    var n2 = Math.sin(5*Math.PI/180);

    var n3 = Math.sin(90*Math.PI/180);

    var n4 = Math.cos(10);

    var n5 = Math.cos(10*Math.PI/180);

    var n6 = Math.cos(0*Math.PI/180);

    var n7 = Math.tan(30);

    var n8 = Math.tan(30*Math.PI/180);

    var n9 = Math.tan(45*Math.PI/180);


    document.write("The sine of 5 radians = <strong>"+n1+"</strong><br>");

    document.write("The sine of 5 degrees = <strong>"+n2+"</strong><br>");

    document.write("The sine of 90 degrees = <strong>"+n3+"</strong><br>");

    document.write("The cos of 10 radians = <strong>"+n1+"</strong><br>");

    document.write("The cos of 10 degrees = <strong>"+n2+"</strong><br>");

    document.write("The cos of 0 degrees = <strong>"+n3+"</strong><br>");

    document.write("The tan of 30 radians = <strong>"+n7+"</strong><br>");

    document.write("The tan of 30 degrees = <strong>"+n8+"</strong><br>");

    document.write("The tan of 45 degrees = <strong>"+n9+"</strong><br>");

    }

    </script>

    </body>

    </html>

    ```


    In the above code, we show 3 examples of sine, cos and tan values. And we show
    the difference between calculating trigonometric values of degrees and radians.
    For example, for n1, we calculate the value of sin(5 radians)'
