  md: '# Variables


    Introduction to variables

    Think of a variable as a container used to hold some value. A variable is a location
    in memory holding some value. In static type programming language such as c and
    c++ variable type must be declared beforehand and variable type cannot change
    anytime later. That is why we first declare the variable where we assign the value
    type then we assign a value to the variable.

    Below is an example of variable declaration and assignment in a statically typed
    language.

    **int var;** Variable declaration of type integer.

    **var = 8;** Variable assignment to 8.

    But since python is dynamically typed you don’t have to declare variable type
    first, it will automatically work out the variable type for you. To define a variable,
    assign a value to variable name using equality sign. This is called assignment
    operator. The code below assigns three variables to a string, integer and a float.'
