  md: "# # Loops\n\nLoops in coding are a sequence of instructions that are repeated\
    \ a certain number of times.\nThink of a loop like an escalator. The steps run\
    \ in a direction again and again till someone pushes the stop button.\nThere are\
    \ 3 types of loops based on the conditions of execution. They are:\n\n+   a. **IF\
    \ Loops:** IF loops contain a sequence of instructions that are executed if a\
    \ certain condition is met. If the conditions are not met, the loop is not executed.\n\
    b. **FOR Loops:** FOR loops contain a sequence of instructions that are executed\
    \ for a certain number of times. For example, a FOR loop from 1 to 10 executes\
    \ the code inside the loop 10 times.\nc. **WHILE Loops:** WHILE loops is a sequence\
    \ of instructions that are executed till a certain condition is met.\n\nNow, let’s\
    \ look at the elevator example through each of these loops.\nLet’s say we want\
    \ the elevator to run only when there are more than 1000 people in the building.\
    \ Then we use an IF loop that checks the number of people in the building and\
    \ then runs the elevator function if that is the case.\nThe IF Loop Example:\n\
    \n```\nif(people>1000)\n{\n    Runelevator();\n}\n```\n\nNow, if we want to do\
    \ a 1000 run test on the elevator to see if it can hold a certain weight; we use\
    \ a FOR loop. The FOR loop below starts at 0 and ends at 999, thus running the\
    \ elevator a 1000 times.\n\n```\nfor (i=0;i<1000;i++)\n```"
