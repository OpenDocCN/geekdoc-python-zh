    \ also bounce off each other if they collide. Hint: in bounce function check for\
    \ the distance between balls, if close enough trigger a bounce.\n\n## Handling\
    \ Keypress and Mouse Click events\n\nPygame deal with user inputs mainly using\
    \ pygame.event module. pygame.event listens and register all events that comes\
    \ from a keyboard or mouse. Every time event happen an event object is created\
    \ to record it.\nIn fact, we have been using pygame.event several times in our\
    \ programs.\nIn this snippet, in game loop we continuously check for any new events\
    \ pygame.event.\n`pygame.event.get()` returns a list of events that occurred since\
    \ the last `pygame.event.get()` call.\nWhen the quit button is pressed pygame.event\
    \ registers this event as event with a type pygame.QUIT .\nSo we loop through\
    \ all events and check if any of the events type is pygame.QUIT if so we set loop\
    \ variable to false to quit the loop in next iteration.\n\n```python\n# game infinite\
    \ loop\nloop = True\nwhile loop:\n    # if quit button press event quit\n    for\
    \ event in pygame.event.get():\n        if event.type == pygame.QUIT:\n      \
    \      loop = False\n```\n\nTo read more about pygame events refer to this link\
    \ :\n[http://man.hubwiz.com/docset/PyGame.docset/Contents/Resources/Documents/ref/event.html](http://man.hubwiz.com/docset/PyGame.docset/Contents/Resources/Documents/ref/event.html)\n\
    \nThis table show some of common pygame.event constant and their attributes.\n\
    \n| Constant name | Attributes |\n|---|---|\n| QUIT | none |\n| ACTIVEEVENT |\
    \ gain, state |\n| KEYDOWN | key, mod |\n| KEYUP | key, mod |\n| MOUSEMOTION |\
    \ pos, rel, buttons |\n| MOUSEBUTTONUP | pos, button |\n| MOUSEBUTTONDOWN | pos,\
    \ button |\n\n## Keyboard events\n\nKEYUP and KEYDOWN events have attribute key\
    \ constants representing keyboard keys.\nUsing capital k followed by underscore\
    \ and key name ,\nFor example F1 is K_F1, w is K_w.\nIn this snippet, we check\
    \ when a key is pressed down using pygame.KEYDOWN , we check what arrow key is\
    \ pressed down and print a message for key name .\n\n```python\nfor event in pygame.event.get():\n\
    \    if event.type == pygame.QUIT:\n        pygame.quit()\n    elif event.type\
    \ == pygame.KEYDOWN:\n        if event.key == pygame.K_UP:\n            print(\"\
    Player moved up!\")\n        elif event.key == pygame.K_LEFT:\n            print(\"\
    Player moved left!\")\n        elif event.key == pygame.K_DOWN:\n            print(\"\
    Player moved down!\")\n        elif event.key == pygame.K_RIGHT:\n           \
    \ print(\"Player moved right!\")\n```\n\nTo read all key binding, read pygame\
    \ keys documentation on [https://www.pygame.org/docs/ref/key.html](https://www.pygame.org/docs/ref/key.html)\n\
    \n## Mouse events\n\nThere are three types of mouse events in pygame . MOUSEBUTTONDOWN,\
    \ MOUSEBUTTONUP , and MOUSEMOTION.\nMOUSEBUTTONUP , and MOUSEMOTION are received\
    \ when user presses or moves a mouse.\nThey have attributes:\nButton : 1 for left\
    \ button , 2 for mouse wheel and 3 for right button .\nPos : Mouse absolute position\
    \ of mouse (x,y) when button is pressed\n\nMOUSEMOTION is received when user mouse\
    \ moves, it has 3 attributes\nButtons : tuple of mouse button pressed or not (left,\
    \ mouse wheel, right )\nPos : absolute cursor position (x,y) in pixels\n\nRel:\
    \ position relative to previous position (relative_x, relative_y)\n\nIn this example\
    \ we used to detect mouse using the three discussed mouse attributes .\n\n```python\n\
    # detect mouse actions\n\nfor event in pygame.event.get():\n    if event.type\
    \ == pygame.QUIT:\n        pygame.quit()\n    elif event.type == pygame.MOUSEMOTION:\n\
    \        if event.rel[0] > 0:  # 'rel' is a tuple (x, y). 'rel[0]' is the x-value.\n\
    \            print(\"Moving the mouse to the right\")\n        elif event.rel[1]\
    \ > 0:  # pygame origin is at top left corner so higher y-val mean it further\
    \ down.\n            print(\"Moving the mouse down\")\n    elif event.type ==\
    \ pygame.MOUSEBUTTONDOWN:\n        if event.button == 1:\n            print(\"\
    Left mouse button pressed\")\n        elif event.button == 3:\n            print(\"\
    Right mouse button pressed\")\n    elif event.type == pygame.MOUSEBUTTONUP:\n\
    \        print(\"Mouse button released\")\n```\n\n## Example 1 : Moving Square\n\
    \nIn this example we implement a moving square similar to past chapter but it\
    \ moves by keyboard keys instead. We detect event of type pygame KEYDOWN then\
    \ we check for event."
