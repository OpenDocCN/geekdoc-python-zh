    stepx = -1 * stepx , 如果触碰到右或左边界则翻转 x 方向\nstepy = -1 * stepy , 如果触碰到上或下边界则翻转 y\
    \ 方向\n```\n\n这些行在每次触碰到边界时翻转相应的坐标。\n\n```python\n# 弹跳的小球\nimport pygame\nimport\
