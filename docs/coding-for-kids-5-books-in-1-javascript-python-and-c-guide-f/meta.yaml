    # Growing Radial Circle


    A radial circle is very similar to a circle. A radial circle controls the color
    of the circle, the background and can also add an extra color to the border between
    the circle and the background. In the below example, we create a radial circle
    of color red with a blue background. And there is a yellow border to the red ball,
    which acts like an annulus.

    In the below example, **createRadialGradient()** is used to create the circle.
    This is how it works.

    **createRadialGradient(a,b,c,d,e,f)** creates an inner circle with **center (a,b)**
    with radius **c**. The second circle creates a circle with **center (d,e)** with
    radius **f**. If we want an annular circle then we should have them at same center
    i.e. **(a,b) = (d,e)**.

    In the below example, we have an inner circle and outer circle at the center of
    the canvas **(250,250)**. The radius of the outer circle is always **20** pixels
    more than the inner circle.

    The inner circle color is set to red using **addColorStop(0,“red”)** and the the
    background is set to blue using **addColorStop(1,“blue”)**. Finally, the outer
    circle color is set to yellow using **addColorStop(0.5,“yellow”)**.'
