  mdcn: "## 减法\n\n减法使用 `-` 运算符完成。\n\n### 减法示例代码\n\n```cpp\n#include<iostream>\nusing\
    \ namespace std;\n\nint main(){\n    int x = 1;\n    int y = 2;\n    int difference\
    \ = x - y ;\n    cout << difference ;\n    return 0;\n}\n```\n\n代码的输出将是 **-1**。\n\
    \n## 乘法\n\n乘法使用 `*` 运算符完成。\n\n### 乘法示例代码\n\n```cpp\n#include<iostream>\nusing\
    \ namespace std;\n\nint main(){\n    int x = 3;\n    int y = 2;\n    int multiplication\
    \ = x * y ;\n    cout << multiplication ;\n    return 0;\n}\n```\n\n代码的输出将是 **6**。\n\
    \n## 除法\n\n除法使用 `/` 运算符完成，它返回除法的商。\n\n### 除法示例代码\n\n```cpp\n#include<iostream>\n\
    using namespace std;\n\nint main(){\n    int x = 3;\n    int y = 2;\n    int quotient\
    \ = x / y ;\n    cout << quotient ;\n    return 0;\n}\n```\n\n上述代码的输出将是 1.5。\n\
    \n## 余数\n\n为了获得除法的余数，请使用取模运算符，该运算符由符号 `%` 表示。\n\n```cpp\n#include<iostream>\n\
    using namespace std;\n\nint main(){\n    int x = 3;\n    int y = 2;\n    int remainder\
    \ = x % y ;\n    cout << remainder ;\n    return 0;\n}\n```\n\n代码的输出将是 **1**，这是\
    \ x 除以 y 时的余数。\n\n## 从用户获取输入\n\n到目前为止，我们只是在向控制台打印内容，没有来自用户的任何输入。在本节中，我们将通过向用户请求输入来使我们的程序更加令人兴奋。\n\
    \n### cin\n\n**cin** 用于接受来自键盘的输入，可以将其视为代表控制台输入。\n\n### 示例代码\n\n```cpp\n#include\
    \ <iostream>\nusing namespace std;\n\nint main() {\n    int num;\n\n    cout <<\
    \ \"Enter a number: \";\n\n    // 获取整数输入\n    cin >> num;\n\n    cout << \"You\
    \ entered: \" << num;\n\n    return 0;\n}\n```\n\n### 解释\n\n这里我们首先创建一个名为 *num*\
    \ 的 int 类型变量，我们将用它来存储从键盘输入获得的值。\n\n然后我们向用户请求一些输入，并将其打印回控制台：\n'You entered: 1'，如果你在控制台中输入\
    \ 1。\n\n## 一个简单的计算器\n\n我们将需要向用户请求两个要相乘的数字，然后向用户显示乘法的结果。\n\n### 示例代码\n\n```cpp\n\
    #include <iostream>\nusing namespace std;\n\nint main() {\n    int num1;\n   \
    \ int num2;\n\n    // 提示输入 num1\n    cout << \"Enter a num1: \";\n    cin >> num1;\n\
    \n    // 提示输入 num2\n    cout << \"Enter a num2: \";\n    cin >> num2;\n\n    int\
    \ multiplication = num1 * num2;\n    cout << \"Result of multiplication: \" <<\
    \ multiplication;\n\n    return 0;\n}\n```\n\n### 解释\n\n我们首先声明两个 int 类型的变量，它们将存储用户输入，即\
    \ num1 和 num2。\n\n我们提示用户输入 num1，然后使用 cin 将其存储在相应的变量中。我们对 num2 执行相同的操作。\n\n然后我们对这两个数执行乘法运算，并将结果显示给用户。\n\
    \n### 练习\n\n1. 将以下每个数学公式转换为 C++ 表达式，每个变量的值都来自用户输入。\n   1. 3x\n   2. 3x + y\n \
    \  3. (x + y)/7\n   4. (3x + y) / (z + 2)\n2. 编写一个程序，使用 6 个输入变量接收 6 个科目的学校成绩。计算总分和平均分。\n\
    3. 编写一个程序，从用户那里接收一个整数，并确定它是偶数还是奇数。提示：使用取模运算。\n\n## 函数\n\n函数是一组执行给定任务的代码行。每个函数都被分配了一个名称，并将在程序中通过该名称引用。\n\
    \n在 C++ 中，函数需要返回一个值，并且在定义函数时通常会指明要返回的值的数据类型。\n\n在本节中，我们将编写一个计算矩形面积的函数。\n\n###\
    \ 函数示例\n\n矩形的面积等于其长度乘以宽度，因此下面是一个计算它的函数。\n\n在 main 函数之前这样写：\n\n```cpp\n#include\
    \ <iostream>\nusing namespace std;\n\n// 定义名为 areaOfRectangle 的函数\nint areaOfRectangle(\
    \ int length , int width){\n    int area = length * width;\n    return area;\n\
    }\n\nint main() {\n    return 0; \n}\n```\n\n### 解释\n\n**int** 是要返回的值的数据类型，因此我们期望函数在运行时给我们返回一个整数。这由第\
    \ 7 行结束大括号上方的 **return area;** 行指示。注意变量 **area** 被声明为整数类型，因为这是函数返回的变量。\n\n**areaOfRectangle**\
    \ 是我们给函数起的名字。注意它是用驼峰命名法编写的。\n\n函数名称后面是一对括号，在括号内我们声明两个变量，这些变量被称为**参数**。在上面的例子中，**length**\
    \ 和 **width** 是参数。\n\n它们将保存我们在运行函数时传递给函数的值，并且可以在函数的代码块中访问它们。\n\n然后我们在花括号中放置我们的代码，以将其标记为与该函数名关联的代码行。\n\
    \n最后，我们有 **return** 语句。\n\n### 运行函数\n\n查看下面的代码\n\n```cpp\n#include <iostream>\n\
    using namespace std;\n\nint areaOfRectangle( int length , int width){\n    int\
    \ area = length * width;\n    return area;\n}\nint main() {\n\n    // 调用 areaOfRectangle\
    \ 函数\n    // length = 4 且 width = 5\n\n    int area = areaOfRectangle(4,5);\n\n\
    \    cout << \"Area is: \" << area << endl;\n    return 0;\n}\n```\n\n![](img/443990a0ec620659ce8be783c0758bc6_55_0.png)\n\
    \n### 解释\n\n当我们想要运行一个函数时，我们通常说我们正在**调用**该函数。\n\n有些函数在被调用时会接收值，就像我们的函数一样，我们称这些值为函数的***参数***。\n\
    \n注意传递参数给函数的语法，我们首先写函数名，然后在开括号和闭括号之间写参数，用逗号分隔。\n\n所以，在我们的例子中，我们正在调用函数 ***areaOfRectangle***，传递两个参数，即\
    \ 4 和 5。\n我们期望函数返回一个值，即计算出的面积，并且计算出的面积值的数据类型为整数。\n\n因此，我们将返回的值赋给名为 *area* 的 *int*\
    \ 类型变量。\n\n然后我们将结果打印到屏幕上。在这种情况下，矩形的面积是 20，所以这就是屏幕上显示的输出。\n\n### void 函数\n\n被称为\
    \ void 函数的函数是在被调用后不返回任何内容的函数。\n\n### 示例代码\n\n![](img/443990a0ec620659ce8be783c0758bc6_56_0.png)\n\
    \n![](img/443990a0ec620659ce8be783c0758bc6_57_0.png)\n\n### 解释\n\n注意指定的返回类型是 void，并且我们在函数体中没有使用\
    \ return 关键字。\n\n除此之外，与我们定义其他非 void 函数的方式没有其他区别。\n\n### 练习\n\n1. 创建一个名为 Descending()\
    \ 的函数，它接受四个参数。每个参数都是 int 类型的数字。如果四个数字按降序排列，则函数返回 true；否则，返回 false。例如，Descending(4,\
    \ 3, 3, 1) 和 Descending(3, 2, 2, 1) 都返回 true，而 Descending(2, 1, 3, 2) 返回 false。\n\
    \n2. 创建一个名为 isOdd() 的函数，它接受一个 int 类型的参数并返回一个布尔值。如果输入是奇数，则函数返回 true。如果是偶数，则返回 false。\n\
    \n3. 以下程序的输出是什么？\n\n```cpp\n#include <iostream>\nusing namespace std;\nvoid sayhi();\n\
    void hide(int audiencenumber);\nint main()\n{\n    sayhi();\n    hide(6);\n  \
    \  cout << \"Extra time:\\n\";\n    hide(2);\n    sayhi();\n    cout << \"End\
    \ of program.\\n\";\n    return 0;\n}\nvoid sayhi()\n{\n    cout << \"Hello\\\
    n\";\n}\nvoid hide(int audiencenumber)\n{\n    if (audiencenumber < 5)\n     \
    \   return;\n    cout << \"Bye\\n\";\n}\n```\n\n4. 编写一个计算圆周长的函数，该函数有一个名为 radius\
    \ 的 int 类型参数，返回类型为 double。使用 pi 作为值为 3.142 的 double 变量。"
