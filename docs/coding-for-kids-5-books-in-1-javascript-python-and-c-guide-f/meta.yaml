    \n**parseInt** – ParseInt接收一个字符串变量并返回一个整数。它也接收十进制数并将其转换为整数。\n**ParseFloat** –\
    \ ParseFloat与parseInt类似，但适用于十进制数。\n让我们看下面的例子。\n在这个例子中，我们将3个数字分别通过parseInt和相同的数字通过parseFloat。然后我们查看输出结果。\n\
