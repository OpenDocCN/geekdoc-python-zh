    # Strip


    lstrip() removes trailing spaces in the beginning of the string , rstrip() removes
    trailing spaces at the end of the string, strip() removes trailing spaces from
    the beginning and end of the string


    ```

    >>> s = ''       Hi       ''

    >>> len(s.lstrip())

    9

    >>> len(s.rstrip())

    9

    >>> len(s.strip())

    2

    >>> |

    ```


    ‘s’ is a string variable with 7 spaces at the beginning and 7 at the end. Therefore
    the total length is 16.


    +   1) lstrip() removes the first 7 space characters therefore length is 9

    2) rstrip() removes the last 7 space characters therefore length is 9

    3) strip() removes the first 7 and last 7 therefore the length is 2


