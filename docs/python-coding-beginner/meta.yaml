    unordered data structure, meaning the elements are not stored in any particular
    order, and you can modify its contents after creation.


    # ### Creating a Dictionary:


    You can create a dictionary by enclosing comma-separated key-value pairs within
    curly braces {}, with a colon : separating each key from its corresponding value.
    Here''s an example:


    ```

    python

    # Creating a dictionary

    my_dict = {''name'': ''John'', ''age'': 30, ''city'': ''New York''}


    ```'
