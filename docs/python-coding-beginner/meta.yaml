    \   self.color = \"black\"\n        self.shape = \"pen\"\n        self.start_x\
    \ = None\n        self.start_y = None\n        self.prev_x = None\n        self.prev_y\
    \ = None\n        self.shapes = []\n\n        self.canvas = tk.Canvas(self.root,\
    \ width=self.canvas_width, height=self.canvas_height, bg=\"white\")\n        self.canvas.pack()\n\
    \n        self.color_button = tk.Button(self.root, text=\"Select Color\", command=self.select_color)\n\
    \        self.color_button.pack()\n\n        self.pen_button = tk.Button(self.root,\
    \ text=\"Pen\", command=lambda: self.set_shape(\"pen\"))\n        self.pen_button.pack(side=tk.LEFT)\n\
    \        self.line_button = tk.Button(self.root, text=\"Line\", command=lambda:\
    \ self.set_shape(\"line\"))\n        self.line_button.pack(side=tk.LEFT)\n   \
    \     self.rectangle_button = tk.Button(self.root, text=\"Rectangle\", command=lambda:\
    \ self.set_shape(\"rectangle\"))\n        self.rectangle_button.pack(side=tk.LEFT)\n\
    \        self.circle_button = tk.Button(self.root, text=\"Circle\", command=lambda:\
    \ self.set_shape(\"circle\"))\n        self.circle_button.pack(side=tk.LEFT)\n\
    \n        self.undo_button = tk.Button(self.root, text=\"Undo\", command=self.undo)\n\
    \        self.undo_button.pack(side=tk.RIGHT)\n        self.clear_button = tk.Button(self.root,\
    \ text=\"Clear\", command=self.clear_canvas)\n        self.clear_button.pack(side=tk.RIGHT)\n\
    \n        self.canvas.bind(\"<Button-1>\", self.start_draw)\n        self.canvas.bind(\"\
    <B1-Motion>\", self.draw)\n        self.canvas.bind(\"<ButtonRelease-1>\", self.end_draw)\n\
    ```"
