  md: '# Introduction to Sets:


    In Python, a set is an unordered collection of unique elements. It is mutable,
    meaning you can add or remove elements after creation, but unlike lists or tuples,
    sets do not support indexing or slicing.


    # Creating a Set:


    You can create a set by enclosing comma-separated elements within curly braces
    {}. Here''s an example:


    ```

    # Creating a set

    my_set = {1, 2, 3, 4, 5}

    ```


    # Adding and Removing Elements:


    You can add new elements to a set using the **add()** method or remove existing
    elements using the **remove()** or **discard()** methods. Here''s an example:


    ```

    # Adding elements to a set

    my_set.add(6)

    print(my_set)  # Output: {1, 2, 3, 4, 5, 6}


    # Removing elements from a set

    my_set.remove(3)

    print(my_set)  # Output: {1, 2, 4, 5, 6}

    ```'
  merge: -1
  pgno: 19
