    wind_speed\": data[\"wind\"][\"speed\"]\n        }\n        return weather\n \
    \   else:\n        return None\n\ndef main():\n    api_key = \"YOUR_API_KEY\"\
    \  # Replace with your OpenWeatherMap API key\n    city = input(\"Enter city name:\
