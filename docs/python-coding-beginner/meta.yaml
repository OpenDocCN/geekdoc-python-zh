    Python syntax is straightforward and easy to understand. Here are some fundamental
    concepts you need to know:


    +   1. **Variables and Data Types:** In Python, variables are used to store data.
    Python supports various data types, including integers, floats, strings, lists,
    tuples, dictionaries, and booleans.


    **Indentation:** Python uses indentation to define blocks of code, such as loops
    and functions. Proper indentation is crucial for code readability and syntax correctness.'
