    # ## Introduction to Dictionaries and Sets


    # ### Introduction to Dictionaries:


    In Python, a dictionary is a collection of key-value pairs. It is a mutable and
    unordered data structure, meaning the elements are not stored in any particular
    order, and you can modify its contents after creation.


    # ### Creating a Dictionary:


    You can create a dictionary by enclosing comma-separated key-value pairs within
    curly braces {}, with a colon : separating each key from its corresponding value.
    Here''s an example:


    ```

    python

    # Creating a dictionary

    my_dict = {''name'': ''John'', ''age'': 30, ''city'': ''New York''}


    ```'
  merge: -1
  pgno: 16
- img_proc: true
  md: '# Accessing Values:


    You can access the value associated with a specific key by using square brackets
    [] and providing the key. Here''s an example:


    ```

    python

    # Accessing values

    print(my_dict[''name''])  # Output: John

    print(my_dict[''age''])   # Output: 30


    ```


    # Modifying Values:


    You can modify the value associated with a key by simply assigning a new value
    to it. Here''s an example:


    ```

    python

    # Modifying values

    my_dict[''age''] = 35

    print(my_dict[''age''])  # Output: 35


    ```


    # Adding and Removing Key-Value Pairs:


    You can add new key-value pairs to a dictionary or remove existing ones using
    the **update()** method to add or update multiple key-value pairs at once, or
    the **del** keyword to remove a specific key-value pair.'
