    \        raise ValueError(\"At least one character type must be enabled.\")\n\n\
    \    password = ''.join(random.choice(characters) for _ in range(length))\n  \
    \  return password\n\n# Example usage:\ngenerated_password = generate_password(length=12,\
    \ uppercase=True, lowercase=True, digits=True, special_chars=True)\nprint(\"Generated\
    \ Password:\", generated_password)\n```\n\nThis function, **generate_password**,\
    \ takes several parameters:\n\n+   - **length**: The length of the password (default\
