  md: "```\npython\ndef select_color(self):\n    color = colorchooser.askcolor()\n\
    \    if color[1]:\n        self.color = color[1]\n\ndef set_shape(self, shape):\n\
    \    self.shape = shape\n\ndef start_draw(self, event):\n    self.start_x = event.x\n\
    \    self.start_y = event.y\n    if self.shape == \"pen\":\n        self.prev_x\
    \ = event.x\n        self.prev_y = event.y\n\ndef draw(self, event):\n    if self.shape\
    \ == \"pen\":\n        current_x = event.x\n        current_y = event.y\n    \
    \    self.canvas.create_line(self.prev_x, self.prev_y, current_x, current_y, fill=self.color,\
    \ width=2)\n        self.prev_x = current_x\n        self.prev_y = current_y\n\
    \ndef end_draw(self, event):\n    if self.shape == \"line\":\n        self.canvas.create_line(self.start_x,\
    \ self.start_y, event.x, event.y, fill=self.color, width=2)\n    elif self.shape\
    \ == \"rectangle\":\n        self.canvas.create_rectangle(self.start_x, self.start_y,\
    \ event.x, event.y, outline=self.color, width=2)\n    elif self.shape == \"circle\"\
    :\n        self.canvas.create_oval(self.start_x, self.start_y, event.x, event.y,\
    \ outline=self.color, width=2)\n    self.shapes.append((self.shape, self.color,\
    \ self.start_x, self.start_y, event.x, event.y))\n\ndef undo(self):\n    if self.shapes:\n\
    \        self.canvas.delete(\"all\")\n        self.shapes.pop()\n        for shape\
    \ in self.shapes:\n            if shape[0] == \"pen\":\n                self.start_x,\
    \ self.start_y = shape[2], shape[3]\n                self.prev_x, self.prev_y\
    \ = shape[2], shape[3]\n                for i in range(4, len(shape), 2):\n  \
    \                  self.canvas.create_line(shape[i-2], shape[i-1], shape[i], shape[i+1],\
    \ fill=shape[1], width=2)\n                    self.prev_x, self.prev_y = shape[i],\
    \ shape[i+1]\n            elif shape[0] == \"line\":\n                self.canvas.create_line(shape[2],\
    \ shape[3], shape[4], shape[5], fill=shape[1], width=2)\n            elif shape[0]\
    \ == \"rectangle\":\n                self.canvas.create_rectangle(shape[2], shape[3],\
    \ shape[4], shape[5], outline=shape[1], width=2)\n            elif shape[0] ==\
    \ \"circle\":\n                self.canvas.create_oval(shape[2], shape[3], shape[4],\
    \ shape[5], outline=shape[1], width=2)\n\ndef clear_canvas(self):\n    self.canvas.delete(\"\
    all\")\n    self.shapes.clear()\n\nroot = tk.Tk()\npaint_app = PaintApp(root)\n\
