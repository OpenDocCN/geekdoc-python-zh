  md: '# **Objects:**


    +   - An object is an instance of a class. It represents a specific instance or
    occurrence of the class, with its own set of attributes and behaviors.


    +   - Objects are created (instantiated) using the class name followed by parentheses,
    optionally passing arguments to the class constructor (`__init__` method).


    +   - Multiple objects can be created from the same class, each with its own unique
    state.


    Example:


    ```

    python

    car1 = Car("Toyota", "Corolla", 2022)

    car2 = Car("Honda", "Civic", 2021)

    ```


    # **Attributes:**


    +   - Attributes are variables that belong to objects. They represent the state
    or characteristics of the object.


    +   - Each object has its own set of attributes, which can be accessed and modified
    using dot notation (`object.attribute`).


    Example:


    ```

    python

    print(car1.make)  # Output: Toyota

    print(car2.model) # Output: Civic


    car1.year = 2023 # Modifying attribute value

    ```'
  merge: -1
  pgno: 46
- img_proc: true
  md: "# Methods:\n\n+   - Methods are functions defined within a class that perform\
    \ operations on objects or modify their attributes.\n- Methods are called using\
    \ dot notation (**object.method()**), and they have access to the object's attributes\
    \ through the **self** parameter.\n\nExample:\n\n```\ncar1.start_engine()  # Output:\
    \ Engine started.\n```\n\n# Inheritance:\n\n+   - Inheritance is a mechanism that\
    \ allows a class (subclass) to inherit attributes and methods from another class\
    \ (superclass).\n- Subclasses can extend or override the behavior of the superclass,\
    \ adding new attributes or methods as needed.\n\nExample:\n\n```\nclass ElectricCar(Car):\n\
    \    def __init__(self, make, model, year, battery_capacity):\n        super().__init__(make,\
    \ model, year)\n        self.battery_capacity = battery_capacity\n\n    def start_engine(self):\n\
    \        print(\"Electric motor started.\")\n```"
