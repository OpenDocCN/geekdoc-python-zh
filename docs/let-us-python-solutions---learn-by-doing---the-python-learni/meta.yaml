    26. Synchronization

    27. Numpy Library

    28. Periodic Tests


    ## 1 Introduction to Python


    ### [A] Answer the following:


    (a) Mention 5 fields in which Python is popularly used.


    Answer


    - System Programming

    - Game Programming

    - Robotics Programming

    - Rapid Prototyping

    - Internet Scripting


    (b) Where is event-driven programming popularly used?


    Answer


    Event-driven programming is primarily used for creating GUI application containing
    elements like windows, check, boxes, button, combo-boxes, scroll-bars, menus etc.
    When we interact with these GUI elements through mouse/keyboard/touch an event
    occurs and a function gets called to tackle that event.


    (c) Why Python is called portable language?


    Answer


    We can create and test code on one platform and run it on any other platform.
    This makes Python a portable language.


    (d) What is the single most important feature of different programming models
    discussed in this chapter?


    Answer


    Functional programming model - It decomposes a problem into a set of functions.


    Procedural programming model - It solves a problem by implementing one statement
    (procedure) at a time. Thus it contains explicit steps that are executed in a
    specific order. It also uses functions, but these are not mathematical functions
    like the ones used in functional programming. Functional programming focuses on
    expressions, whereas Procedural programming focuses on statements.


    Object-oriented programming model - It mimics the real world by creating inside
    the computer a mini-world of objects.


    Event-driven programming model - It generates events when we interact with different
    GUI elements like Windows, check boxes, buttons, combo-boxes, scroll bars, menus,
    etc. Each event is tackled by calling an event handler function.


    (e) Which of the following is not a feature of Python?


    - Static typing

    - Variable declaration before use

    - Run-time error handling through error numbers

    - Library support for containers like Lists, Dictionaries, Tuples


    Answer


    - Static typing

    - Variable declaration before use

    - Run-time error handling through error numbers


    (f) Give an example application of each of the following programming models:


    - Functional model

    - Procedural model

    - Object-oriented model

    - Event-driven model


    Answer


    - Functional model: Finding factorial value of a number.

    - Procedural model: Step-by-step procedure to sort a set of numbers.

    - Object-oriented model: Interaction of objects like customer, product, order,
    etc.

    - Event-driven model: A GUI application which display "Hi" on left-click of a
    mouse and "Hello" on right-click of a mouse.


    ### [B] State whether the following statements are True or False:


    (a) Python is free to use and distribute.


    Answer


    True


    (b) Same Python program can work on different OS - microprocessor combinations.


    Answer


    True


    (c) It is possible to use C++ or Java libraries in a Python program.


    Answer


    True


    (d) In Python type of the variable is decided based on its usage.


    Answer


    True


    (e) Python cannot be used for building GUI applications.


    Answer


    False


    (f) Python supports functional, procedural, object-oriented and event-driven programming
    models.


    Answer


    True


    (g) GUI applications are based on event-driven programming model.


    Answer


    True


    (h) Functional programming model consists of interaction of multiple objects.


    Answer


    False


    ### [C] Match the following:


    a. Functional programming

    b. Event-driven programming

    c. Procedural programming


    1. GUI element based interaction

    2. Interaction of objects

    3. Statements'
