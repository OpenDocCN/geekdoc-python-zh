  md: '# [A] Answer the following:


    (a) Mention 5 fields in which Python is popularly used.


    Answer


    +   - System Programming

    - Game Programming

    - Robotics Programming

    - Rapid Prototyping

    - Internet Scripting


    (b) Where is event-driven programming popularly used?


    Answer


    Event-driven programming is primarily used for creating GUI application containing
    elements like windows, check, boxes, button, combo-boxes, scroll-bars, menus etc.
    When we interact with these GUI elements through mouse/keyboard/touch an event
    occurs and a function gets called to tackle that event.


    (c) Why Python is called portable language?


    Answer


    We can create and test code on one platform and run it on any other platform.
    This makes Python a portable language.


    (d) What is the single most important feature of different programming models
    discussed in this chapter?


    Answer


    Functional programming model - It decomposes a problem into a set of functions.


    Procedural programming model - It solves a problem by implementing one statement
    (procedure) at a time. Thus it contains explicit steps that are executed in a
    specific order. It also uses functions, but these are not mathematical functions
    like the ones used in functional programming. Functional programming focuses on
    expressions, whereas Procedural programming focuses on statements.'
  merge: -1
