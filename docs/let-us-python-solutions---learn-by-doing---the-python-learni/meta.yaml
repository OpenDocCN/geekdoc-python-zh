  md: "```\ndef calculate(*args, **kwargs) :\n    start_time = time.perf_counter()\n\
    \    value = func(*args, **kwargs)\n    end_time = time.perf_counter()\n    runtime\
    \ = end_time - start_time\n    print(f'Finished {func.__name__!r} in {runtime:.8f}\
    \ secs')\n    return value\nreturn calculate\n```\n\n```\n@timer\ndef factorial(num)\
    \ :\n    p = i = 1\n    while i <= num :\n        p = p * i\n        i += 1\n\
    \    return(p)\n```\n\n```\nf = factorial(7)\nprint('Factorial of 7 = ', f)\n\
    f = factorial(10)\nprint('Factorial of 10 = ', f)\nf = factorial(25)\nprint('Factorial\
    \ of 25 = ', f)\n```\n\n# Output\n\nFinished 'factorial' in 0.00000599 secs\n\
