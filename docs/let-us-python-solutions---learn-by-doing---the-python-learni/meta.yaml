    ## About Yashavant Kanetkar


    Through his books and online Quest Video Courses on C, C++, Data Structures, VC++,
    .NET, etc. Yashavant Kanetkar has created, molded and groomed lacs of IT careers
    in the last two and half decades. Yashavant’s books and online courses have made
    a significant contribution in creating top-notch IT manpower in India and abroad.


    Yashavant’s books are globally recognized and millions of students / professionals
    have benefitted from them. His books have been translated into Hindi, Gujarati,
    Japanese, Korean and Chinese languages. Many of his books are published in India,
    USA, Japan, Singapore, Korea and China.


    Yashavant is a much sought-after speaker in the IT field and has conducted seminars/workshops
    at TedEx, IITs, NITs, IIITs and global software companies.


    Yashavant has been honored with the prestigious “Distinguished Alumnus Award”
    by IIT Kanpur for his entrepreneurial, professional and academic excellence. This
    award was given to top 50 alumni of IIT Kanpur who have made significant contribution
    towards their profession and betterment of society in the last 50 years.


    In recognition of his immense contribution to IT education in India, he has been
    awarded the "Best .NET Technical Contributor" and "Most Valuable Professional"
    awards by Microsoft for 5 successive years.


    Yashavant holds a BE from VJTI Mumbai and M. Tech. from IIT Kanpur. His current
    affiliations include being a Director of KICIT Pvt. Ltd. and an Adjunct Faculty
    at IIIT, Bangalore. He can be reached at kanetkar@kicit.com or through http://www.kicit.com.


    ## About Aditya Kanetkar


    Aditya Kanetkar is currently working as a Software Engineer at Microsoft India
    Development Center, Bengaluru. He has 6 years of experience working in the software
    development industry. His current passion is anything remotely connected to Python,
    Machine Learning, Distributed Systems, Cloud Computing, Containers and C#.


    Formerly, he worked at Microsoft HQ, Redmond, Washington and Oracle HQ, Redwood
    City, California. Aditya holds a Bachelor''s degree in Computer Science and Engineering
    from IIT Guwahati and a Master''s degree in Computer Science from Georgia Tech,
    Atlanta.


    Aditya can be reached through http://www.kicit.com.


    ## Contents


    1. Introduction to Python

    2. Getting Started

    3. Python Basics

    4. Strings

    5. Decision Control Instruction

    6. Repetition Control Instruction

    7. Console Input/Output

    8. Lists

