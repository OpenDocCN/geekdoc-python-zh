  md: "# # Bytes\n\nBytes object is an immutable sequence of single bytes. Mutable\
    \ version is called bytearray.\n\n```\n<bytes> = b'<str>'\n<int>   = <bytes>[<index>]\n\
    <bytes> = <bytes>[<slice>]\n<bytes> = <bytes>.join(<coll_of_bytes>)\n```\n\n#\
    \ Encode\n\n```\n<bytes> = bytes(<coll_of_ints>)\n<bytes> = bytes(<str>, 'utf-8')\n\
    <bytes> = <int>.to_bytes(n_bytes, ...)\n<bytes> = bytes.fromhex('<hex>')\n```\n\
    \n# Decode\n\n```\n<list>  = list(<bytes>)\n<str>   = str(<bytes>, 'utf-8')\n\
    <int>   = int.from_bytes(<bytes>, ...)\n'<hex>' = <bytes>.hex()\n```\n\n# Read\
    \ Bytes from File\n\n```\ndef read_bytes(filename):\n    with open(filename, 'rb')\
    \ as file:\n        return file.read()\n```\n\n# Write Bytes to File\n\n```\n\
    def write_bytes(filename, bytes_obj):\n    with open(filename, 'wb') as file:\n\
    \        file.write(bytes_obj)\n```\n\n# # Struct\n\n+   - Module that performs\
    \ conversions between a sequence of numbers and a bytes object.\n- System's type\
    \ sizes, byte order, and alignment rules are used by default.\n\n```\nfrom struct\
    \ import pack, unpack\n<bytes> = pack('<format>', <el_1> [, ...])\n<tuple> = unpack('<format>',\
    \ <bytes>)\n```\n\n```\n>>> pack('>hhl', 1, 2, 3)\nb'\\x00\\x01\\x00\\x02\\x00\\\
    x00\\x03'\n>>> unpack('>hhl', b'\\x00\\x01\\x00\\x02\\x00\\x00\\x03')\n(1, 2,\
    \ 3)\n```\n\n# Format\n\nFor standard type sizes and manual alignment (padding)\
    \ start format string with:\n\n+   - '=' - System's byte order (usually little-endian).\n\
    - '<' - Little-endian.\n- '>' - Big-endian (also '!').\n\nBesides numbers, pack()\
    \ and unpack() also support bytes objects as part of the sequence:\n\n+   - 'c'\
    \ - A bytes object with a single element. For pad byte use 'x'.\n- '<n>s' - A\
    \ bytes object with n elements."
