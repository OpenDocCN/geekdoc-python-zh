  md: "# DataFrame\n\nTable with labeled rows and columns.\n\n```\n>>> pd.DataFrame([[1,\
    \ 2], [3, 4]], index=['a', 'b'], columns=['x', 'y'])\n   x  y\na  1  2\nb  3 \
    \ 4\n```\n\n```\n<DF>    = pd.DataFrame(<list_of_rows>)    # Rows can be either\
    \ lists, dicts or series.\n<DF>    = pd.DataFrame(<dict_of_columns>) # Columns\
    \ can be either lists, dicts or series.\n```\n\n```\n<el>    = <DF>.loc[row_key,\
    \ column_key]    # Or: <DF>.iloc[row_index, column_index]\n<Sr/DF> = <DF>.loc[row_key/s]\
    \            # Or: <DF>.iloc[row_index/es]\n<Sr/DF> = <DF>.loc[:, column_key/s]\
    \      # Or: <DF>.iloc[:, column_index/es]\n<DF>    = <DF>.loc[row_bools, column_bools]\
    \ # Or: <DF>.iloc[row_bools, column_bools]\n```\n\n```\n<Sr/DF> = <DF>[column_key/s]\
    \             # Or: <DF>.column_key\n<DF>    = <DF>[row_bools]               \
    \ # Keeps rows as specified by bools.\n<DF>    = <DF>[<DF_of_bools>]         \
    \   # Assigns NaN to items that are False in bools.\n```\n\n```\n<DF>    = <DF>\
    \ > <el/Sr/DF>              # Returns DF of bools. Sr is treated as a row.\n<DF>\
    \    = <DF> + <el/Sr/DF>              # Items with non-matching keys get value\
    \ NaN.\n```\n\n```\n<DF>    = <DF>.set_index(column_key)     # Replaces row keys\
    \ with values from the column.\n<DF>    = <DF>.reset_index(drop=False)   # Drops\
    \ or moves row keys to column named index.\n<DF>    = <DF>.sort_index(ascending=True)\
    \ # Sorts rows by row keys. Use `axis=1` for cols.\n<DF>    = <DF>.sort_values(column_key/s)\
    \ # Sorts rows by passed column/s. Also `axis=1`.\n```\n\n# DataFrame – Merge,\
    \ Join, Concat:\n\n```\n>>> l = pd.DataFrame([[1, 2], [3, 4]], index=['a', 'b'],\
    \ columns=['x', 'y'])\n   x  y\na  1  2\nb  3  4\n>>> r = pd.DataFrame([[4, 5],\
    \ [6, 7]], index=['b', 'c'], columns=['y', 'z'])\n   y  z\nb  4  5\nc  6  7\n\
    ```\n\n| | 'outer' | 'inner' | 'left' | Description |\n|---|---|---|---|---|\n\
    | l.merge(r, on='y', how=...) | x y z<br>0 1 2 .<br>1 3 4 5<br>2 . 6 7 | x y z<br>3\
    \ 4 5 | x y z<br>1 2 .<br>3 4 5 | Merges on column if 'on' or 'left/right_on'\
    \ are set, else on shared cols. Uses 'inner' by default. |\n| l.join(r, lsuffix='l',\
    \ rsuffix='r', how=...) | x yl yr z<br>a 1 2 . .<br>b 3 4 4 5<br>c . . 6 7 | x\
    \ yl yr z<br>3 4 4 5 | x yl yr z<br>1 2 . .<br>3 4 4 5 | Merges on row keys. Uses\
    \ 'left' by default. If r is a Series, it is treated as a column. |\n| pd.concat([l,\
    \ r], axis=0, join=...) | x y z<br>a 1 2 .<br>b 3 4 .<br>b . 4 5<br>c . 6 7 |\
    \ y<br>2<br>4<br>4<br>6 | | Adds rows at the bottom. Uses 'outer' by default.\
    \ A Series is treated as a column. To add a row use pd.concat([l, DF([sr])]).\
    \ |\n| pd.concat([l, r], axis=1, join=...) | x y y z<br>a 1 2 . .<br>b 3 4 4 5<br>c\
    \ . . 6 7 | x y y z<br>3 4 4 5 | | Adds columns at the right end. Uses 'outer'\
    \ by default. A Series is treated as a column. |\n| l.combine_first(r) | x y z<br>a\
    \ 1 2 .<br>b 3 4 5<br>c . 6 7 | | | Adds missing rows and columns. Also updates\
    \ items that contain NaN. Argument r must be a DF. |"
