  md: "# # Duck Types\n\nA duck type is an implicit type that prescribes a set of\
    \ special methods. Any object that has those methods defined is considered a member\
    \ of that duck type.\n\n# Comparable\n\n+   - If eq() method is not overridden,\
    \ it returns 'id(self) == id(other)', which is the same as 'self is other'.\n\
    - That means all objects compare not equal by default.\n- Only the left side object\
    \ has eq() method called, unless it returns NotImplemented, in which case the\
    \ right object is consulted. False is returned if both return NotImplemented.\n\
    - Ne() automatically works on any object that has eq() defined.\n\n```\nclass\
    \ MyComparable:\n    def __init__(self, a):\n        self.a = a\n    def __eq__(self,\
    \ other):\n        if isinstance(other, type(self)):\n            return self.a\
    \ == other.a\n        return NotImplemented\n```\n\n# Hashable\n\n+   - Hashable\
    \ object needs both hash() and eq() methods and its hash value should never change.\n\
    - Hashable objects that compare equal must have the same hash value, meaning default\
    \ hash() that returns 'id(self)' will not do.\n- That is why Python automatically\
    \ makes classes unhashable if you only implement eq().\n\n```\nclass MyHashable:\n\
    \    def __init__(self, a):\n        self._a = a\n    @property\n    def a(self):\n\
    \        return self._a\n    def __eq__(self, other):\n        if isinstance(other,\
    \ type(self)):\n            return self.a == other.a\n        return NotImplemented\n\
    \    def __hash__(self):\n        return hash(self.a)\n```\n\n# Sortable\n\n+\
    \   - With 'total_ordering' decorator, you only need to provide eq() and one of\
    \ lt(), gt(), le() or ge() special methods and the rest will be automatically\
    \ generated.\n- Functions sorted() and min() only require lt() method, while max()\
    \ only requires gt(). However, it is best to define them all so that confusion\
    \ doesn't arise in other contexts.\n- When two lists, strings or dataclasses are\
    \ compared, their values get compared in order until a pair of unequal values\
    \ is found. The comparison of this two values is then returned. The shorter sequence\
    \ is considered smaller in case of all values being equal.\n- For proper alphabetical\
    \ order pass 'key=locale.strxfrm' to sorted() after running 'locale.setlocale(locale.LC_COLLATE,\
    \ \"en_US.UTF-8\")'.\n\n```\nfrom functools import total_ordering\n\n@total_ordering\n\
    class MySortable:\n    def __init__(self, a):\n        self.a = a\n    def __eq__(self,\
    \ other):\n        if isinstance(other, type(self)):\n            return self.a\
    \ == other.a\n        return NotImplemented\n    def __lt__(self, other):\n  \
    \      if isinstance(other, type(self)):\n            return self.a < other.a\n\
    \        return NotImplemented\n```"
