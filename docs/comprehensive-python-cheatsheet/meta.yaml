    \ to the package's modules unless they are explicitly imported in its init script.\n\
    \n# # Closure\n\nWe have/get a closure in Python when:\n\n+   - A nested function\
    \ references a value of its enclosing function and then\n- the enclosing function\
    \ returns the nested function.\n\n```\ndef get_multiplier(a):\n    def out(b):\n\
    \        return a * b\n    return out\n```\n\n```\n>>> multiply_by_3 = get_multiplier(3)\n\
    >>> multiply_by_3(10)\n30\n```\n\n+   - If multiple nested functions within enclosing\
    \ function reference the same value, that value gets shared.\n- To dynamically\
    \ access function's first free variable use '<function>.__closure__[0].cell_contents'.\n\
    \n# Partial\n\n```\nfrom functools import partial\n<function> = partial(<function>\
    \ [, <arg_1>, <arg_2>, ...])\n```\n\n```\n>>> def multiply(a, b):\n...     return\
    \ a * b\n>>> multiply_by_3 = partial(multiply, 3)\n>>> multiply_by_3(10)\n30\n\
    ```\n\n+   - Partial is also useful in cases when function needs to be passed\
    \ as an argument because it enables us to set its arguments beforehand.\n- A few\
    \ examples being: 'defaultdict(<func>)', 'iter(<func>, to_exc)' and dataclass's\
    \ 'field(default_factory=<func>)'.\n\n# Non-Local\n\nIf variable is being assigned\
    \ to anywhere in the scope, it is regarded as a local variable, unless it is declared\
    \ as a 'global' or a 'nonlocal'.\n\n```\ndef get_counter():\n    i = 0\n    def\
    \ out():\n        nonlocal i\n        i += 1\n        return i\n    return out\n\
    ```\n\n```\n>>> counter = get_counter()\n>>> counter(), counter(), counter()\n\
    (1, 2, 3)\n```"
  - "[PAGE 12]\n\n# # Decorator\n\n+   - A decorator takes a function, adds some functionality\
    \ and returns it.\n- It can be any callable, but is usually implemented as a function\
    \ that returns a closure.\n\n```\n@decorator_name\ndef function_that_gets_passed_to_decorator():\n\
    \    ...\n```\n\n# Debugger Example\n\nDecorator that prints function's name every\
    \ time the function is called.\n\n```\nfrom functools import wraps\n\ndef debug(func):\n\
    \    @wraps(func)\n    def out(*args, **kwargs):\n        print(func.__name__)\n\
    \        return func(*args, **kwargs)\n    return out\n\n@debug\ndef add(x, y):\n\
    \    return x + y\n```\n\n+   - Wraps is a helper decorator that copies the metadata\
    \ of the passed function (func) to the function it is wrapping (out).\n- Without\
    \ it 'add.__name__' would return 'out'.\n\n# LRU Cache\n\nDecorator that caches\
    \ function's return values. All function's arguments must be hashable.\n\n```\n\
    from functools import lru_cache\n\n@lru_cache(maxsize=None)\ndef fib(n):\n   \
    \ return n if n < 2 else fib(n-2) + fib(n-1)\n```\n\n+   - Default size of the\
    \ cache is 128 values. Passing 'maxsize=None' makes it unbounded.\n- CPython interpreter\
    \ limits recursion depth to 1000 by default. To increase it use 'sys.setrecursionlimit(<depth>)'.\n\
    \n# Parametrized Decorator\n\nA decorator that accepts arguments and returns a\
    \ normal decorator that accepts a function.\n\n```\nfrom functools import wraps\n\
    \ndef debug(print_result=False):\n    def decorator(func):\n        @wraps(func)\n\
    \        def out(*args, **kwargs):\n            result = func(*args, **kwargs)\n\
    \            print(func.__name__, result if print_result else '')\n          \
    \  return result\n        return out\n    return decorator\n\n@debug(print_result=True)\n\
    def add(x, y):\n    return x + y\n```\n\n+   - Using only '@debug' to decorate\
    \ the add() function would not work here, because debug would then receive the\
    \ add() function as a 'print_result' argument. Decorators can however manually\
    \ check if the argument they received is a function and act accordingly."
