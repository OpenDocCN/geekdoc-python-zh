    # # Open


    Opens the file and returns a corresponding file object.


    ```

    <file> = open(<path>, mode=''r'', encoding=None, newline=None)

    ```


    +   - ''encoding=None'' means that the default encoding is used, which is platform
    dependent. Best practice is to use ''encoding="utf-8"'' whenever possible.

    - ''newline=None'' means all different end of line combinations are converted
    to ''\n'' on read, while on write all ''\n'' characters are converted to system''s
    default line separator.

    - ''newline=""'' means no conversions take place, but input is still broken into
    chunks by readline() and readlines() on every ''\n'', ''\r'' and ''\r\n''.'
