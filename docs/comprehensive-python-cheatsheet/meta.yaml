    \                 # Checks if the thread has finished executing.\n<Thread>.join()\
    \                              # Waits for the thread to finish.\n```\n\n+   -\
    \ Use 'kwargs=<dict>' to pass keyword arguments to the function.\n- Use 'daemon=True',\
    \ or the program will not be able to exit while the thread is alive.\n- To delay\
    \ thread execution use 'Timer(seconds, <func>)' instead of Thread().\n\n# Lock\n\
    \n```\n<lock> = RLock()                             # Lock that can only be released\
    \ by acquirer.\n<lock>.acquire()                             # Waits for the lock\
    \ to be available.\n<lock>.release()                             # Makes the lock\
    \ available again.\n```\n\nOr:\n\n```\nwith <lock>:                          \
    \       # Enters the block by calling acquire() and\n    ...                 \
    \                     # exits it with release(), even on error.\n```\n\n# Semaphore,\
    \ Event, Barrier\n\n```\n<Semaphore> = Semaphore(value=1)             # Lock that\
    \ can be acquired by 'value' threads.\n<Event>      = Event()                \
    \       # Method wait() blocks until set() is called.\n<Barrier>    = Barrier(n_times)\
    \              # Wait() blocks until it's called n_times.\n```\n\n# Queue\n\n\
    ```\n<Queue> = queue.Queue(maxsize=0)             # A thread-safe first-in-first-out\
    \ queue.\n<Queue>.put(<el>)                            # Blocks until queue stops\
    \ being full.\n<Queue>.put_nowait(<el>)                     # Raises queue.Full\
    \ exception if full.\n<el> = <Queue>.get()                         # Blocks until\
    \ queue stops being empty.\n<el> = <Queue>.get_nowait()                  # Raises\
    \ queue.Empty exception if empty.\n```\n\n# Thread Pool Executor\n\n```\n<Exec>\
    \ = ThreadPoolExecutor(max_workers=None) # Or: `with ThreadPoolExecutor() as <name>:\
    \ ...`\n<iter> = <Exec>.map(<func>, <args_1>, ...)    # Multithreaded and non-lazy\
    \ map(). Keeps order.\n<Futr> = <Exec>.submit(<func>, <arg_1>, ...) # Creates\
    \ a thread and returns its Future obj.\n<Exec>.shutdown()                    \
    \        # Blocks until all threads finish executing.\n```\n\n```\n<bool> = <Future>.done()\
    \                     # Checks if the thread has finished executing.\n<obj>  =\
    \ <Future>.result(timeout=None)       # Waits for thread to finish and returns\
    \ result.\n<bool> = <Future>.cancel()                   # Cancels or returns False\
    \ if running/finished.\n<iter> = as_completed(<coll_of_Futures>)     # Next()\
    \ waits for next completed Future.\n```\n\n+   - Map() and as_completed() also\
    \ accept 'timeout' argument that causes TimeoutError if result isn't available\
    \ in 'timeout' seconds after next() is called.\n- Exceptions that happen inside\
    \ threads are raised when next() is called on map's iterator or when result()\
    \ is called on a Future. Its exception() method returns exception or None.\n-\
    \ ProcessPoolExecutor provides true parallelism, but everything sent to/from workers\
    \ must be pickable. Queues must be sent using executor's 'initargs' and 'initializer'\
    \ parameters."
