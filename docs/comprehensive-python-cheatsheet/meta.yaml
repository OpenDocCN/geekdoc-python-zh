    \  253.4     32.2      a = list(range(10000))\n     4         1        534.1 \
    \   534.1     67.8      b = set(range(10000))\n```\n\n# Call and Flame Graphs\n\
    \n```\n$ apt/brew install graphviz && pip3 install gprof2dot snakeviz\n$ tail\
    \ --lines=4 test.py > test.py\n$ python3 -m cProfile -o test.prof test.py\n$ gprof2dot\
    \ --format=pstats test.prof | dot -T png -o test.png\n$ xdg-open/open test.png\n\
    $ snakeviz test.prof\n```\n\n# Sampling and Memory Profilers\n\n| pip3 install\
    \ | Type | Target | How to run | Live |\n|---|---|---|---|---|\n| pyinstrument\
    \ | Sampling | CPU | pyinstrument test.py | x |\n| py-spy | Sampling | CPU | py-spy\
    \ top -- python3 test.py | ✓ |\n| scalene | Sampling | CPU+Memory | scalene test.py\
    \ | x |\n| memray | Tracing | Memory | memray run --live test.py | ✓ |\n\n# #\
    \ NumPy\n\nArray manipulation mini-language. It can run up to one hundred times\
    \ faster than the equivalent Python code. An even faster alternative that runs\
    \ on a GPU is called CuPy.\n\n```\n# $ pip3 install numpy\nimport numpy as np\n\
    \n<array> = np.array(<list/list_of_lists/...>)           # Returns a 1d/2d/..\
    \ NumPy array.\n<array> = np.zeros/ones/empty(<shape>)                 # Also\
    \ np.full(<shape>, <el>).\n<array> = np.arange(from_inc, to_exc, ±step)      \
    \     # Also np.linspace(start, stop, len).\n<array> = np.random.randint(from_inc,\
    \ to_exc, <shape>) # Also np.random.random(<shape>).\n\n<view>  = <array>.reshape(<shape>)\
    \                     # Also `<array>.shape = <shape>`.\n<array> = <array>.flatten()\
    \                            # Also `<view> = <array>.ravel()`.\n<view>  = <array>.transpose()\
    \                          # Or: <array>.T\n\n<array> = np.copy/abs/sqrt/log/int64(<array>)\
    \          # Returns new array of the same shape.\n<array> = <array>.sum/max/mean/argmax/all(axis)\
    \        # Passed dimension gets aggregated.\n<array> = np.apply_along_axis(<func>,\
    \ axis, <array>)   # Func can return a scalar or array.\n\n<array> = np.concatenate(<list_of_arrays>,\
    \ axis=0)     # Links arrays along first axis (rows).\n<array> = np.row_stack/column_stack(<list_of_arrays>)\
    \  # Treats 1d arrays as rows or columns.\n<array> = np.tile/repeat(<array>, <int/list>\
    \ [, axis]) # Tiles array or repeats its elements.\n```\n\n+   - Shape is a tuple\
    \ of dimension sizes. A 100x50 RGB image has shape (50, 100, 3).\n- Axis is an\
    \ index of the dimension that gets aggregated. Leftmost dimension has index 0.\
    \ Summing the RGB image along axis 2 will return a greyscale image with shape\
    \ (50, 100)."
