- md: "## Imports\n\n```python\nimport <module>           # Imports a built-in or\
    \ '<module>.py'.\nimport <package>          # Imports a built-in or '<package>/__init__.py'.\n\
    import <package>.<module> # Imports a built-in or '<package>/<module>.py'.\n```\n\
    \n- Package is a collection of modules, but it can also define its own objects.\n\
    - On a filesystem this corresponds to a directory of Python files with an optional\
    \ init script.\n- Running 'import <package>' does not automatically provide access\
    \ to the package's modules unless they are explicitly imported in its init script.\n\
    \n## Closure\n\nWe have/get a closure in Python when:\n\n- A nested function references\
    \ a value of its enclosing function and then\n- the enclosing function returns\
    \ the nested function.\n\n```python\ndef get_multiplier(a):\n    def out(b):\n\
    \        return a * b\n    return out\n```\n\n```python\n>>> multiply_by_3 = get_multiplier(3)\n\
    >>> multiply_by_3(10)\n30\n```\n\n- If multiple nested functions within enclosing\
    \ function reference the same value, that value gets shared.\n- To dynamically\
    \ access function's first free variable use '<function>.__closure__[0].cell_contents'.\n\
    \n## Partial\n\n```python\nfrom functools import partial\n<function> = partial(<function>\
    \ [, <arg_1>, <arg_2>, ...])\n```\n\n```python\n>>> def multiply(a, b):\n... \
    \    return a * b\n>>> multiply_by_3 = partial(multiply, 3)\n>>> multiply_by_3(10)\n\
    30\n```\n\n- Partial is also useful in cases when function needs to be passed\
    \ as an argument because it enables us to set its arguments beforehand.\n- A few\
    \ examples being: 'defaultdict(<func>)', 'iter(<func>, to_exc)' and dataclass's\
    \ 'field(default_factory=<func>)'.\n\n## Non-Local\n\nIf variable is being assigned\
    \ to anywhere in the scope, it is regarded as a local variable, unless it is declared\
    \ as a 'global' or a 'nonlocal'.\n\n```python\ndef get_counter():\n    i = 0\n\
    \    def out():\n        nonlocal i\n        i += 1\n        return i\n    return\
    \ out\n```\n\n```python\n>>> counter = get_counter()\n>>> counter(), counter(),\
    \ counter()\n(1, 2, 3)\n```\n\n## Decorator\n\n- A decorator takes a function,\
    \ adds some functionality and returns it.\n- It can be any callable, but is usually\
    \ implemented as a function that returns a closure.\n\n```python\n@decorator_name\n\
    def function_that_gets_passed_to_decorator():\n    ...\n```\n\n## Debugger Example\n\
    \nDecorator that prints function's name every time the function is called.\n\n\
    ```python\nfrom functools import wraps\n\ndef debug(func):\n    @wraps(func)\n\
    \    def out(*args, **kwargs):\n        print(func.__name__)\n        return func(*args,\
    \ **kwargs)\n    return out\n\n@debug\ndef add(x, y):\n    return x + y\n```\n\
    \n- Wraps is a helper decorator that copies the metadata of the passed function\
    \ (func) to the function it is wrapping (out).\n- Without it 'add.__name__' would\
    \ return 'out'.\n\n## LRU Cache\n\nDecorator that caches function's return values.\
    \ All function's arguments must be hashable.\n\n```python\nfrom functools import\
    \ lru_cache\n\n@lru_cache(maxsize=None)\ndef fib(n):\n    return n if n < 2 else\
    \ fib(n-2) + fib(n-1)\n```\n\n- Default size of the cache is 128 values. Passing\
    \ 'maxsize=None' makes it unbounded.\n- CPython interpreter limits recursion depth\
    \ to 1000 by default. To increase it use 'sys.setrecursionlimit(<depth>)'.\n\n\
    ## Parametrized Decorator\n\nA decorator that accepts arguments and returns a\
    \ normal decorator that accepts a function.\n\n```python\nfrom functools import\
    \ wraps\n\ndef debug(print_result=False):\n    def decorator(func):\n        @wraps(func)\n\
    \        def out(*args, **kwargs):\n            result = func(*args, **kwargs)\n\
    \            print(func.__name__, result if print_result else '')\n          \
    \  return result\n        return out\n    return decorator\n\n@debug(print_result=True)\n\
    def add(x, y):\n    return x + y\n```\n\n- Using only '@debug' to decorate the\
    \ add() function would not work here, because debug would then receive the add()\
    \ function as a 'print_result' argument. Decorators can however manually check\
    \ if the argument they received is a function and act accordingly.\n\n## Class\n\
    \n```python\nclass <name>:\n    def __init__(self, a):\n        self.a = a\n \
    \   def __repr__(self):\n        class_name = self.__class__.__name__\n      \
    \  return f'{class_name}({self.a!r})'\n    def __str__(self):\n        return\
    \ str(self.a)\n\n    @classmethod\n    def get_class_name(cls):\n        return\
    \ cls.__name__\n```\n\n- Return value of repr() should be unambiguous and of str()\
    \ readable.\n- If only repr() is defined, it will also be used for str().\n- Methods\
    \ decorated with '@staticmethod' do not receive 'self' nor 'cls' as their first\
    \ arg.\n\nExpressions that call the str() method:\n\n```python\nprint(<el>)\n\
    f'{<el>}'\nlogging.warning(<el>)\ncsv.writer(<file>).writerow([<el>])\nraise Exception(<el>)\n\
    ```\n\nExpressions that call the repr() method:\n\n```python\nprint/str/repr([<el>])\n\
    print/str/repr({<el>: <el>})\nf'{<el>!r}'\nZ = dataclasses.make_dataclass('Z',\
    \ ['a']); print/str/repr(Z(<el>))\n>>> <el>\n```\n\n### Constructor Overloading\n\
    \n```python\nclass <name>:\n    def __init__(self, a=None):\n        self.a =\
    \ a\n```\n\n### Inheritance\n\n```python\nclass Person:\n    def __init__(self,\
    \ name, age):\n        self.name = name\n        self.age = age\n\nclass Employee(Person):\n\
    \    def __init__(self, name, age, staff_num):\n        super().__init__(name,\
    \ age)\n        self.staff_num = staff_num\n```\n\n### Multiple Inheritance\n\n\
    ```python\nclass A: pass\nclass B: pass\nclass C(A, B): pass\n```\n\nMRO determines\
    \ the order in which parent classes are traversed when searching for a method\
    \ or an attribute:\n\n```python\n>>> C.mro()\n[<class 'C'>, <class 'A'>, <class\
    \ 'B'>, <class 'object'>]\n```\n\n## Property\n\nPythonic way of implementing\
    \ getters and setters.\n\n```python\nclass Person:\n    @property\n    def name(self):\n\
    \        return ' '.join(self._name)\n\n    @name.setter\n    def name(self, value):\n\
    \        self._name = value.split()\n```\n\n```python\n>>> person = Person()\n\
    >>> person.name = '\\t Guido  van Rossum \\n'\n>>> person.name\n'Guido van Rossum'\n\
    ```\n\n## Dataclass\n\nDecorator that automatically generates init(), repr() and\
    \ eq() special methods.\n\n```python\nfrom dataclasses import dataclass, field\n\
    \n@dataclass(order=False, frozen=False)\nclass <class_name>:\n    <attr_name>:\
    \ <type>\n    <attr_name>: <type> = <default_value>\n    <attr_name>: list/dict/set\
    \ = field(default_factory=list/dict/set)\n```\n\n- Objects can be made sortable\
    \ with 'order=True' and immutable with 'frozen=True'.\n- For object to be hashable,\
    \ all attributes must be hashable and 'frozen' must be True.\n- Function field()\
    \ is needed because '<attr_name>: list = []' would make a list that is shared\
    \ among all instances. Its 'default_factory' argument can be any callable.\n-\
    \ For attributes of arbitrary type use 'typing.Any'.\n\nInline:\n\n```python\n\
    from dataclasses import make_dataclass\n<class> = make_dataclass('<class_name>',\
    \ <coll_of_attribute_names>)\n<class> = make_dataclass('<class_name>', <coll_of_tuples>)\n\
    <tuple> = ('<attr_name>', <type> [, <default_value>])\n```\n\nRest of type annotations\
    \ (CPython interpreter ignores them all):\n\n```python\nimport collections.abc\
    \ as abc, typing as tp\n<var_name>: list/set/abc.Iterable/abc.Sequence/tp.Optional[<type>]\
    \ [= <obj>]\n<var_name>: dict/tuple/tp.Union[<type>, ...] [= <obj>]\ndef func(<arg_name>:\
    \ <type> [= <obj>]) -> <type>: ...\n```\n\n## Slots\n\nMechanism that restricts\
    \ objects to attributes listed in 'slots' and significantly reduces their memory\
    \ footprint.\n\n```python\nclass MyClassWithSlots:\n    __slots__ = ['a']\n  \
    \  def __init__(self):\n        self.a = 1\n```\n\n## Duck Types\n\nA duck type\
    \ is an implicit type that prescribes a set of special methods. Any object that\
    \ has those methods defined is considered a member of that duck type.\n\n## Comparable\n\
    \n- If eq() method is not overridden, it returns 'id(self) == id(other)', which\
    \ is the same as 'self is other'.\n- That means all objects compare not equal\
    \ by default.\n- Only the left side object has eq() method called, unless it returns\
    \ NotImplemented, in which case the right object is consulted. False is returned\
    \ if both return NotImplemented.\n- Ne() automatically works on any object that\
    \ has eq() defined.\n\n```python\nclass MyComparable:\n    def __init__(self,\
    \ a):\n        self.a = a\n    def __eq__(self, other):\n        if isinstance(other,\
    \ type(self)):\n            return self.a == other.a\n        return NotImplemented\n\
    ```\n\n## Hashable\n\n- Hashable object needs both hash() and eq() methods and\
    \ its hash value should never change.\n- Hashable objects that compare equal must\
    \ have the same hash value, meaning default hash() that returns 'id(self)' will\
    \ not do.\n- That is why Python automatically makes classes unhashable if you\
    \ only implement eq().\n\n```python\nclass MyHashable:\n    def __init__(self,\
    \ a):\n        self._a = a\n    @property\n    def a(self):\n        return self._a\n\
    \    def __eq__(self, other):\n        if isinstance(other, type(self)):\n   \
    \         return self.a == other.a\n        return NotImplemented\n    def __hash__(self):\n\
    \        return hash(self.a)\n```\n\n## Sortable\n\n- With 'total_ordering' decorator,\
    \ you only need to provide eq() and one of lt(), gt(), le() or ge() special methods\
    \ and the rest will be automatically generated.\n- Functions sorted() and min()\
    \ only require lt() method, while max() only requires gt(). However, it is best\
    \ to define them all so that confusion doesn't arise in other contexts.\n- When\
    \ two lists, strings or dataclasses are compared, their values get compared in\
    \ order until a pair of unequal values is found. The comparison of this two values\
    \ is then returned. The shorter sequence is considered smaller in case of all\
    \ values being equal.\n- For proper alphabetical order pass 'key=locale.strxfrm'\
    \ to sorted() after running 'locale.setlocale(locale.LC_COLLATE, \"en_US.UTF-8\"\
    )'.\n\n```python\nfrom functools import total_ordering\n\n@total_ordering\nclass\
    \ MySortable:\n    def __init__(self, a):\n        self.a = a\n    def __eq__(self,\
    \ other):\n        if isinstance(other, type(self)):\n            return self.a\
    \ == other.a\n        return NotImplemented\n    def __lt__(self, other):\n  \
    \      if isinstance(other, type(self)):\n            return self.a < other.a\n\
    \        return NotImplemented\n```"
  mdcn: "## 导入\n\n```python\nimport <module>           # 导入内置模块或 '<module>.py' 文件。\n\
    import <package>          # 导入内置包或 '<package>/__init__.py' 文件。\nimport <package>.<module>\
    \ # 导入内置包中的模块或 '<package>/<module>.py' 文件。\n```\n\n- 包是模块的集合，但它也可以定义自己的对象。\n-\
    \ 在文件系统中，这对应于一个包含 Python 文件的目录，以及一个可选的初始化脚本。\n- 运行 `import <package>` 不会自动提供对包内模块的访问，除非这些模块在其初始化脚本中被显式导入。\n\
    \n## 闭包\n\n在 Python 中，当我们满足以下条件时，就得到了一个闭包：\n\n- 一个嵌套函数引用了其外层函数的一个值，并且\n- 外层函数返回了这个嵌套函数。\n\
    \n```python\ndef get_multiplier(a):\n    def out(b):\n        return a * b\n \
    \   return out\n```\n\n```python\n>>> multiply_by_3 = get_multiplier(3)\n>>> multiply_by_3(10)\n\
    30\n```\n\n- 如果外层函数内的多个嵌套函数引用了同一个值，那么该值将被共享。\n- 要动态访问函数的第一个自由变量，请使用 `<function>.__closure__[0].cell_contents`。\n\
    \n## 偏函数\n\n```python\nfrom functools import partial\n<function> = partial(<function>\
    \ [, <arg_1>, <arg_2>, ...])\n```\n\n```python\n>>> def multiply(a, b):\n... \
    \    return a * b\n>>> multiply_by_3 = partial(multiply, 3)\n>>> multiply_by_3(10)\n\
    30\n```\n\n- 偏函数在需要将函数作为参数传递的情况下也很有用，因为它允许我们预先设置其参数。\n- 一些例子包括：`defaultdict(<func>)`、`iter(<func>,\
    \ to_exc)` 以及数据类的 `field(default_factory=<func>)`。\n\n## 非局部变量\n\n如果变量在作用域内的任何地方被赋值，它就被视为局部变量，除非它被声明为\
    \ `global` 或 `nonlocal`。\n\n```python\ndef get_counter():\n    i = 0\n    def\
    \ out():\n        nonlocal i\n        i += 1\n        return i\n    return out\n\
    ```\n\n```python\n>>> counter = get_counter()\n>>> counter(), counter(), counter()\n\
    (1, 2, 3)\n```\n\n## 装饰器\n\n- 装饰器接收一个函数，添加一些功能，然后返回它。\n- 它可以是任何可调用对象，但通常实现为一个返回闭包的函数。\n\
    \n```python\n@decorator_name\ndef function_that_gets_passed_to_decorator():\n\
    \    ...\n```\n\n## 调试器示例\n\n一个在每次函数调用时打印函数名称的装饰器。\n\n```python\nfrom functools\
    \ import wraps\n\ndef debug(func):\n    @wraps(func)\n    def out(*args, **kwargs):\n\
    \        print(func.__name__)\n        return func(*args, **kwargs)\n    return\
    \ out\n\n@debug\ndef add(x, y):\n    return x + y\n```\n\n- `wraps` 是一个辅助装饰器，它将被装饰函数（`func`）的元数据复制到它所包装的函数（`out`）上。\n\
    - 如果没有它，`add.__name__` 将返回 `'out'`。\n\n## LRU 缓存\n\n一个缓存函数返回值的装饰器。函数的所有参数必须是可哈希的。\n\
    \n```python\nfrom functools import lru_cache\n\n@lru_cache(maxsize=None)\ndef\
    \ fib(n):\n    return n if n < 2 else fib(n-2) + fib(n-1)\n```\n\n- 缓存的默认大小是 128\
    \ 个值。传递 `maxsize=None` 使其无界。\n- CPython 解释器默认将递归深度限制为 1000。要增加它，请使用 `sys.setrecursionlimit(<depth>)`。\n\
    \n## 参数化装饰器\n\n一个接受参数并返回一个接受函数的普通装饰器的装饰器。\n\n```python\nfrom functools import\
    \ wraps\n\ndef debug(print_result=False):\n    def decorator(func):\n        @wraps(func)\n\
    \        def out(*args, **kwargs):\n            result = func(*args, **kwargs)\n\
    \            print(func.__name__, result if print_result else '')\n          \
    \  return result\n        return out\n    return decorator\n\n@debug(print_result=True)\n\
    def add(x, y):\n    return x + y\n```\n\n- 在这里只使用 `@debug` 来装饰 `add()` 函数将不起作用，因为\
    \ `debug` 会将 `add()` 函数作为 `print_result` 参数接收。然而，装饰器可以手动检查它接收的参数是否是一个函数，并相应地采取行动。\n\
    \n## 类\n\n```python\nclass <name>:\n    def __init__(self, a):\n        self.a\
    \ = a\n    def __repr__(self):\n        class_name = self.__class__.__name__\n\
    \        return f'{class_name}({self.a!r})'\n    def __str__(self):\n        return\
    \ str(self.a)\n\n    @classmethod\n    def get_class_name(cls):\n        return\
    \ cls.__name__\n```\n\n- `repr()` 的返回值应该是明确的，而 `str()` 的返回值应该是可读的。\n- 如果只定义了 `repr()`，它也将用于\
    \ `str()`。\n- 用 `@staticmethod` 装饰的方法不接收 `self` 或 `cls` 作为其第一个参数。\n\n调用 `str()`\
    \ 方法的表达式：\n\n```python\nprint(<el>)\nf'{<el>}'\nlogging.warning(<el>)\ncsv.writer(<file>).writerow([<el>])\n\
    raise Exception(<el>)\n```\n\n调用 `repr()` 方法的表达式：\n\n```python\nprint/str/repr([<el>])\n\
    print/str/repr({<el>: <el>})\nf'{<el>!r}'\nZ = dataclasses.make_dataclass('Z',\
    \ ['a']); print/str/repr(Z(<el>))\n>>> <el>\n```\n\n### 构造函数重载\n\n```python\n\
    class <name>:\n    def __init__(self, a=None):\n        self.a = a\n```\n\n###\
    \ 继承\n\n```python\nclass Person:\n    def __init__(self, name, age):\n       \
    \ self.name = name\n        self.age = age\n\nclass Employee(Person):\n    def\
    \ __init__(self, name, age, staff_num):\n        super().__init__(name, age)\n\
    \        self.staff_num = staff_num\n```\n\n### 多重继承\n\n```python\nclass A: pass\n\
    class B: pass\nclass C(A, B): pass\n```\n\nMRO（方法解析顺序）决定了在搜索方法或属性时遍历父类的顺序：\n\n\
    ```python\n>>> C.mro()\n[<class 'C'>, <class 'A'>, <class 'B'>, <class 'object'>]\n\
    ```\n\n## 属性\n\n实现 getter 和 setter 的 Pythonic 方式。\n\n```python\nclass Person:\n\
    \    @property\n    def name(self):\n        return ' '.join(self._name)\n\n \
    \   @name.setter\n    def name(self, value):\n        self._name = value.split()\n\
    ```\n\n```python\n>>> person = Person()\n>>> person.name = '\\t Guido  van Rossum\
    \ \\n'\n>>> person.name\n'Guido van Rossum'\n```\n\n## 数据类\n\n一个自动生成 `init()`、`repr()`\
    \ 和 `eq()` 特殊方法的装饰器。\n\n```python\nfrom dataclasses import dataclass, field\n\n\
    @dataclass(order=False, frozen=False)\nclass <class_name>:\n    <attr_name>: <type>\n\
    \    <attr_name>: <type> = <default_value>\n    <attr_name>: list/dict/set = field(default_factory=list/dict/set)\n\
    ```\n\n- 可以通过 `order=True` 使对象可排序，通过 `frozen=True` 使其不可变。\n- 要使对象可哈希，所有属性必须是可哈希的，并且\
    \ `frozen` 必须为 `True`。\n- 需要 `field()` 函数，因为 `<attr_name>: list = []` 会创建一个在所有实例之间共享的列表。其\
    \ `default_factory` 参数可以是任何可调用对象。\n- 对于任意类型的属性，请使用 `typing.Any`。\n\n内联方式：\n\n\
    ```python\nfrom dataclasses import make_dataclass\n<class> = make_dataclass('<class_name>',\
    \ <coll_of_attribute_names>)\n<class> = make_dataclass('<class_name>', <coll_of_tuples>)\n\
    <tuple> = ('<attr_name>', <type> [, <default_value>])\n```\n\n其余的类型注解（CPython\
    \ 解释器会忽略它们）：\n\n```python\nimport collections.abc as abc, typing as tp\n<var_name>:\
    \ list/set/abc.Iterable/abc.Sequence/tp.Optional[<type>] [= <obj>]\n<var_name>:\
    \ dict/tuple/tp.Union[<type>, ...] [= <obj>]\ndef func(<arg_name>: <type> [= <obj>])\
    \ -> <type>: ...\n```\n\n## 插槽\n\n一种将对象限制为仅包含 `slots` 中列出的属性并显著减少其内存占用的机制。\n\n\
    ```python\nclass MyClassWithSlots:\n    __slots__ = ['a']\n    def __init__(self):\n\
    \        self.a = 1\n```\n\n## 鸭子类型\n\n鸭子类型是一种隐式类型，它规定了一组特殊方法。任何定义了这些方法的对象都被视为该鸭子类型的成员。\n\
    \n## 可比较\n\n- 如果未重写 `eq()` 方法，它返回 `id(self) == id(other)`，这与 `self is other` 相同。\n\
    - 这意味着所有对象默认比较不相等。\n- 只有左侧对象会调用 `eq()` 方法，除非它返回 `NotImplemented`，在这种情况下会咨询右侧对象。如果两者都返回\
    \ `NotImplemented`，则返回 `False`。\n- `ne()` 会自动在任何定义了 `eq()` 的对象上工作。\n\n```python\n\
    class MyComparable:\n    def __init__(self, a):\n        self.a = a\n    def __eq__(self,\
    \ other):\n        if isinstance(other, type(self)):\n            return self.a\
    \ == other.a\n        return NotImplemented\n```\n\n## 可哈希\n\n- 可哈希对象需要同时实现 `hash()`\
    \ 和 `eq()` 方法，并且其哈希值应永不改变。\n- 比较相等的可哈希对象必须具有相同的哈希值，这意味着返回 `id(self)` 的默认 `hash()`\
    \ 将不起作用。\n- 这就是为什么如果你只实现了 `eq()`，Python 会自动使类不可哈希。\n\n```python\nclass MyHashable:\n\
    \    def __init__(self, a):\n        self._a = a\n    @property\n    def a(self):\n\
    \        return self._a\n    def __eq__(self, other):\n        if isinstance(other,\
    \ type(self)):\n            return self.a == other.a\n        return NotImplemented\n\
    \    def __hash__(self):\n        return hash(self.a)\n```\n\n## 可排序\n\n- 使用 `total_ordering`\
    \ 装饰器，你只需要提供 `eq()` 和 `lt()`、`gt()`、`le()` 或 `ge()` 中的一个特殊方法，其余的将自动生成。\n- 函数 `sorted()`\
    \ 和 `min()` 只需要 `lt()` 方法，而 `max()` 只需要 `gt()`。然而，最好将它们全部定义，以免在其他上下文中产生混淆。\n-\
    \ 当比较两个列表、字符串或数据类时，它们的值会按顺序比较，直到找到一对不相等的值。然后返回这两个值的比较结果。如果所有值都相等，则较短的序列被认为更小。\n\
    - 要获得正确的字母顺序，请在运行 `locale.setlocale(locale.LC_COLLATE, \"en_US.UTF-8\")` 后，将 `key=locale.strxfrm`\
    \ 传递给 `sorted()`。\n\n```python\nfrom functools import total_ordering\n\n@total_ordering\n\
    class MySortable:\n    def __init__(self, a):\n        self.a = a\n    def __eq__(self,\
    \ other):\n        if isinstance(other, type(self)):\n            return self.a\
    \ == other.a\n        return NotImplemented\n    def __lt__(self, other):\n  \
    \      if isinstance(other, type(self)):\n            return self.a < other.a\n\
    \        return NotImplemented\n```"
