    ```\n\n# # Audio\n\n```\nimport wave\n```\n\n```\n<Wave_read>  = wave.open('<path>',\
    \ 'rb')       # Opens the WAV file.\nframerate    = <Wave_read>.getframerate()\
    \       # Number of frames per second.\nnchannels    = <Wave_read>.getnchannels()\
    \       # Number of samples per frame.\nsampwidth    = <Wave_read>.getsampwidth()\
    \       # Sample size in bytes.\nnframes      = <Wave_read>.getnframes()     \
    \    # Number of frames.\n<params>     = <Wave_read>.getparams()          # Immutable\
    \ collection of above.\n<bytes>      = <Wave_read>.readframes(nframes)  # Returns\
    \ next 'nframes' frames.\n```\n\n```\n<Wave_write> = wave.open('<path>', 'wb')\
    \       # Truncates existing file.\n<Wave_write>.setframerate(<int>)         \
    \      # 44100 for CD, 48000 for video.\n<Wave_write>.setnchannels(<int>)    \
    \           # 1 for mono, 2 for stereo.\n<Wave_write>.setsampwidth(<int>)    \
    \           # 2 for CD quality sound.\n<Wave_write>.setparams(<params>)      \
    \         # Sets all parameters.\n<Wave_write>.writeframes(<bytes>)          \
    \    # Appends frames to the file.\n```\n\n+   - Bytes object contains a sequence\
    \ of frames, each consisting of one or more samples.\n- In a stereo signal, the\
    \ first sample of a frame belongs to the left channel.\n- Each sample consists\
    \ of one or more bytes that, when converted to an integer, indicate the displacement\
    \ of a speaker membrane at a given moment.\n- If sample width is one byte, then\
    \ the integer should be encoded unsigned.\n- For all other sizes, the integer\
    \ should be encoded signed with little-endian byte order.\n\n# Sample Values\n\
    \n| sampwidth | min | zero | max |\n|---|---|---|---|\n| 1 | 0 | 128 | 255 |\n\
    | 2 | -32768 | 0 | 32767 |\n| 3 | -8388608 | 0 | 8388607 |\n\n# Read Float Samples\
    \ from WAV File\n\n```\ndef read_wav_file(filename):\n    def get_int(bytes_obj):\n\
    \        an_int = int.from_bytes(bytes_obj, 'little', signed=(sampwidth != 1))\n\
    \        return an_int - 128 * (sampwidth == 1)\n    with wave.open(filename,\
    \ 'rb') as file:\n        sampwidth = file.getsampwidth()\n        frames = file.readframes(-1)\n\
    \    bytes_samples = (frames[i : i+sampwidth] for i in range(0, len(frames), sampwidth))\n\
    \    return [get_int(b) / pow(2, sampwidth * 8 - 1) for b in bytes_samples]\n\
    ```"
