    ## Floats


    ```

    {1.23456:10.3}                       # ''      1.23''

    {1.23456:10.3f}                      # ''     1.235''

    {1.23456:10.3e}                      # '' 1.235e+00''

    {1.23456:10.3%}                      # ''  123.456%''

    ```


