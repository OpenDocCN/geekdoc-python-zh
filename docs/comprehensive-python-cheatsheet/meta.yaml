    \ 'rect spd facing_left frame_cycle'.split())\n        return Mario(get_rect(1,\
    \ 1), P(0, 0), False, it.cycle(range(3)))\n    def get_tiles():\n        border\
    \ = [(x, y) for x in range(W) for y in range(H) if x in [0, W-1] or y in [0, H-1]]\n\
    \        platforms = [(randint(1, W-2), randint(2, H-2)) for _ in range(W*H //\
    \ 10)]\n        return [get_rect(x, y) for x, y in border + platforms]\n    def\
    \ get_rect(x, y):\n        return pg.Rect(x*16, y*16, 16, 16)\n    run(get_screen(),\
    \ get_images(), get_mario(), get_tiles())\n\ndef run(screen, images, mario, tiles):\n\
    \    clock = pg.time.Clock()\n    pressed = set()\n    while not pg.event.get(pg.QUIT)\
    \ and clock.tick(28):\n        keys = {pg.K_UP: D.n, pg.K_RIGHT: D.e, pg.K_DOWN:\
    \ D.s, pg.K_LEFT: D.w}\n        pressed |= {keys.get(e.key) for e in pg.event.get(pg.KEYDOWN)}\n\
