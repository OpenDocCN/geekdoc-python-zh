  md: '# # Pandas


    ```

    # $ pip3 install pandas matplotlib

    import pandas as pd, matplotlib.pyplot as plt

    ```


    # Series


    Ordered dictionary with a name.


    ```

    >>> pd.Series([1, 2], index=[''x'', ''y''], name=''a'')

    x    1

    y    2

    Name: a, dtype: int64

    ```


    ```

    <Sr> = pd.Series(<list>)                    # Assigns RangeIndex starting at 0.

    <Sr> = pd.Series(<dict>)                    # Takes dictionary''s keys for index.

    <Sr> = pd.Series(<dict/Series>, index=<list>) # Only keeps items with keys specified
    in index.

    ```


    ```

    <el> = <Sr>.loc[key]                        # Or: <Sr>.iloc[index]

    <Sr> = <Sr>.loc[keys]                       # Or: <Sr>.iloc[indexes]

    <Sr> = <Sr>.loc[from_key : to_key_inclusive] # Or: <Sr>.iloc[from_i : to_i_exclusive]

    ```


    ```

    <el> = <Sr>[key/index]                      # Or: <Sr>.key

    <Sr> = <Sr>[keys/indexes]                   # Or: <Sr>[<keys_slice/slice>]

    <Sr> = <Sr>[bools]                          # Or: <Sr>.loc/iloc[bools]

    ```


    ```

    <Sr> = <Sr> > <el/Sr>                       # Returns a Series of bools.

    <Sr> = <Sr> + <el/Sr>                       # Items with non-matching keys get
    value NaN.

    ```


    ```

    <Sr> = pd.concat(<coll_of_Sr>)              # Concats multiple series into one
    long Series.

    <Sr> = <Sr>.combine_first(<Sr>)             # Adds items that are not yet present.

    <Sr>.update(<Sr>)                           # Updates items that are already present.

    ```


    ```

    <Sr>.plot.line/area/bar/pie/hist()           # Generates a Matplotlib plot.

    plt.show()                                  # Displays the plot. Also plt.savefig(<path>).

    ```


    # Series – Aggregate,Transform,Map:


    ```

    <el> = <Sr>.sum/max/mean/idxmax/all()        # Or: <Sr>.agg(lambda <Sr>: <el>)

    <Sr> = <Sr>.rank/diff/cumsum/ffill/interpl() # Or: <Sr>.agg/transform(lambda <Sr>:
    <Sr>)

    <Sr> = <Sr>.fillna(<el>)                     # Or: <Sr>.agg/transform/map(lambda
    <el>: <el>)

    ```


    ```

    >>> sr = pd.Series([2, 3], index=[''x'', ''y''])

    x    2

    y    3

    ```


    | | ''sum'' | [''sum''] | {''s'': ''sum''} |

    |---|---|---|---|

    | sr.apply(...) | 5 | sum 5 | s 5 |

    | sr.agg(...) | | | |


    | | ''rank'' | [''rank''] | {''r'': ''rank''} |

    |---|---|---|---|

    | sr.apply(...) | | rank | |

    | sr.agg(...) | x 1 | x 1 | r x 1 |

    | | y 2 | y 2 | y 2 |


    +   - Keys/indexes/bools can''t be tuples because ''obj[x, y]'' is converted to
    ''obj[(x, y)]''!

    - Methods ffill(), interpolate(), fillna() and dropna() accept ''inplace=True''.

    - Last result has a hierarchical index. Use ''<Sr>[key_1, key_2]'' to get its
    values.'
