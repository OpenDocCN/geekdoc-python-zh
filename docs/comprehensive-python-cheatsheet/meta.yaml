    <tuple> = (*<coll.>, [...])    # Or: tuple(<collection>) [+ ...]

    <set>   = {*<coll.> [, ...]}   # Or: set(<collection>) [| ...]

    <dict>  = {**<dict> [, ...]}   # Or: dict(**<dict> [, ...])


    head, *body, tail = <coll.>    # Head or tail can be omitted.

