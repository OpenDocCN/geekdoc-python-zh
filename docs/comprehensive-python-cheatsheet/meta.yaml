    \ ...\n```\n\n```\ncdef class <class_name>:\n    cdef public <ctype> <attr_name>\n\
    \    def __init__(self, <ctype> <arg_name>):\n        self.<attr_name> = <arg_name>\n\
    ```\n\n```\ncdef enum <enum_name>: <member_name>, <member_name>, ...\n```\n\n\
    # Virtual Environments\n\nSystem for installing libraries directly into project's\
    \ directory.\n\n```\n$ python3 -m venv <name>       # Creates virtual environment\
    \ in current directory.\n$ source <name>/bin/activate  # Activates venv. On Windows\
    \ run `<name>\\Scripts\\activate`.\n$ pip3 install <library>      # Installs the\
    \ library into active environment.\n$ python3 <path>              # Runs the script\
    \ in active environment. Also `./<path>`.\n$ deactivate                  # Deactivates\
    \ the active virtual environment.\n```\n\n# Basic Script Template\n\n```\n#!/usr/bin/env\
    \ python3\n#\n# Usage: .py\n#\n\nfrom sys import argv, exit\nfrom collections\
    \ import defaultdict, namedtuple\nfrom dataclasses import make_dataclass\nfrom\
    \ enum import Enum\nimport functools as ft, itertools as it, operator as op, re\n\
    \ndef main():\n    pass\n\n###\n## UTIL\n#\n\ndef read_file(filename):\n    with\
    \ open(filename, encoding='utf-8') as file:\n        return file.readlines()\n\
    \nif __name__ == '__main__':\n    main()\n```"
