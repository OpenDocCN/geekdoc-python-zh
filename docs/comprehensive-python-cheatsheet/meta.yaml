  md: "# Property\n\nPythonic way of implementing getters and setters.\n\n```\nclass\
    \ Person:\n    @property\n    def name(self):\n        return ' '.join(self._name)\n\
    \n    @name.setter\n    def name(self, value):\n        self._name = value.split()\n\
    ```\n\n```\n>>> person = Person()\n>>> person.name = '\\t Guido  van Rossum \\\
    n'\n>>> person.name\n'Guido van Rossum'\n```\n\n# Dataclass\n\nDecorator that\
    \ automatically generates init(), repr() and eq() special methods.\n\n```\nfrom\
    \ dataclasses import dataclass, field\n\n@dataclass(order=False, frozen=False)\n\
    class <class_name>:\n    <attr_name>: <type>\n    <attr_name>: <type> = <default_value>\n\
    \    <attr_name>: list/dict/set = field(default_factory=list/dict/set)\n```\n\n\
    +   - Objects can be made sortable with 'order=True' and immutable with 'frozen=True'.\n\
    - For object to be hashable, all attributes must be hashable and 'frozen' must\
    \ be True.\n- Function field() is needed because '<attr_name>: list = []' would\
    \ make a list that is shared among all instances. Its 'default_factory' argument\
    \ can be any callable.\n- For attributes of arbitrary type use 'typing.Any'.\n\
    \nInline:\n\n```\nfrom dataclasses import make_dataclass\n<class> = make_dataclass('<class_name>',\
    \ <coll_of_attribute_names>)\n<class> = make_dataclass('<class_name>', <coll_of_tuples>)\n\
    <tuple> = ('<attr_name>', <type> [, <default_value>])\n```\n\nRest of type annotations\
    \ (CPython interpreter ignores them all):\n\n```\nimport collections.abc as abc,\
    \ typing as tp\n<var_name>: list/set/abc.Iterable/abc.Sequence/tp.Optional[<type>]\
    \ [= <obj>]\n<var_name>: dict/tuple/tp.Union[<type>, ...] [= <obj>]\ndef func(<arg_name>:\
    \ <type> [= <obj>]) -> <type>: ...\n```\n\n# Slots\n\nMechanism that restricts\
    \ objects to attributes listed in 'slots' and significantly reduces their memory\
    \ footprint.\n\n```\nclass MyClassWithSlots:\n    __slots__ = ['a']\n    def __init__(self):\n\
    \        self.a = 1\n```"
