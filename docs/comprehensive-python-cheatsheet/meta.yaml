- md: "## Threading\n\nCPython interpreter can only run a single thread at a time.\
    \ Using multiple threads won't result in a faster execution, unless at least one\
    \ of the threads contains an I/O operation.\n\n```python\nfrom threading import\
    \ Thread, Timer, RLock, Semaphore, Event, Barrier\nfrom concurrent.futures import\
    \ ThreadPoolExecutor, as_completed\n```\n\n## Thread\n\n```python\n<Thread> =\
    \ Thread(target=<function>)          # Use `args=<collection>` to set the arguments.\n\
    <Thread>.start()                             # Starts the thread.\n<bool> = <Thread>.is_alive()\
    \                 # Checks if the thread has finished executing.\n<Thread>.join()\
    \                              # Waits for the thread to finish.\n```\n\n- Use\
    \ `kwargs=<dict>` to pass keyword arguments to the function.\n- Use `daemon=True`,\
    \ or the program will not be able to exit while the thread is alive.\n- To delay\
    \ thread execution use `Timer(seconds, <func>)` instead of Thread().\n\n## Lock\n\
    \n```python\n<lock> = RLock()                             # Lock that can only\
    \ be released by acquirer.\n<lock>.acquire()                             # Waits\
    \ for the lock to be available.\n<lock>.release()                            \
    \ # Makes the lock available again.\n```\n\nOr:\n\n```python\nwith <lock>:   \
    \                              # Enters the block by calling acquire() and\n \
    \   ...                                      # exits it with release(), even on\
    \ error.\n```\n\n## Semaphore, Event, Barrier\n\n```python\n<Semaphore> = Semaphore(value=1)\
    \             # Lock that can be acquired by 'value' threads.\n<Event>      =\
    \ Event()                       # Method wait() blocks until set() is called.\n\
    <Barrier>    = Barrier(n_times)              # Wait() blocks until it's called\
    \ n_times.\n```\n\n## Queue\n\n```python\n<Queue> = queue.Queue(maxsize=0)   \
    \          # A thread-safe first-in-first-out queue.\n<Queue>.put(<el>)      \
    \                      # Blocks until queue stops being full.\n<Queue>.put_nowait(<el>)\
    \                     # Raises queue.Full exception if full.\n<el> = <Queue>.get()\
    \                         # Blocks until queue stops being empty.\n<el> = <Queue>.get_nowait()\
    \                  # Raises queue.Empty exception if empty.\n```\n\n## Thread\
    \ Pool Executor\n\n```python\n<Exec> = ThreadPoolExecutor(max_workers=None) #\
    \ Or: `with ThreadPoolExecutor() as <name>: ...`\n<iter> = <Exec>.map(<func>,\
    \ <args_1>, ...)    # Multithreaded and non-lazy map(). Keeps order.\n<Futr> =\
    \ <Exec>.submit(<func>, <arg_1>, ...) # Creates a thread and returns its Future\
    \ obj.\n<Exec>.shutdown()                            # Blocks until all threads\
    \ finish executing.\n```\n\n```python\n<bool> = <Future>.done()              \
    \       # Checks if the thread has finished executing.\n<obj>  = <Future>.result(timeout=None)\
    \       # Waits for thread to finish and returns result.\n<bool> = <Future>.cancel()\
    \                   # Cancels or returns False if running/finished.\n<iter> =\
    \ as_completed(<coll_of_Futures>)     # Next() waits for next completed Future.\n\
    ```\n\n- `map()` and `as_completed()` also accept `timeout` argument that causes\
    \ TimeoutError if result isn't available in `timeout` seconds after `next()` is\
    \ called.\n- Exceptions that happen inside threads are raised when `next()` is\
    \ called on map's iterator or when `result()` is called on a Future. Its `exception()`\
    \ method returns exception or None.\n- ProcessPoolExecutor provides true parallelism,\
    \ but everything sent to/from workers must be pickable. Queues must be sent using\
    \ executor's `initargs` and `initializer` parameters.\n\n## Operator\n\nModule\
    \ of functions that provide the functionality of operators. Functions are ordered\
    \ by operator precedence, starting with least binding.\n\n```python\nimport operator\
    \ as op\n<bool> = op.not_(<obj>)                                    # or, and,\
    \ not (or/and missing)\n<bool> = op.eq/ne/lt/le/gt/ge/contains/is_(<obj>, <obj>)\
    \   # ==, !=, <, <=, >, >=, in, is\n<obj>  = op.or_/xor/and_(<int/set>, <int/set>)\
    \             # |, ^, &\n<int>  = op.lshift/rshift(<int>, <int>)             \
    \       # <<, >>\n<obj>  = op.add/sub/mul/truediv/floordiv/mod(<obj>, <obj>) #\
    \ +, -, *, /, //, %\n<num>  = op.neg/invert(<num>)                           \
    \   # -, ~\n<num>  = op.pow(<num>, <num>)                               # **\n\
    <func> = op.itemgetter/attrgetter/methodcaller(<obj> [, ...])  # [index/key],\
    \ .name, .name()\n```\n\n```python\nelementwise_sum  = map(op.add, list_a, list_b)\n\
    sorted_by_second = sorted(<collection>, key=op.itemgetter(1))\nsorted_by_both\
    \   = sorted(<collection>, key=op.itemgetter(1, 0))\nproduct_of_elems = functools.reduce(op.mul,\
    \ <collection>)\nfirst_element    = op.methodcaller('pop', 0)(<list>)\n```\n\n\
    - Bitwise operators require objects to have `or()`, `xor()`, `and()`, `lshift()`,\
    \ `rshift()` and `invert()` special methods, unlike logical operators that work\
    \ on all types of objects.\n- Also: `<bool> = <bool> &|^ <bool>` and `<int> =\
    \ <bool> &|^ <int>`.\n\n## Introspection\n\n```python\n<list> = dir()        \
    \                  # Names of local variables, functions, classes, etc.\n<dict>\
    \ = vars()                         # Dict of local variables, etc. Also locals().\n\
    <dict> = globals()                      # Dict of global vars, etc. (incl. '__builtins__').\n\
    ```\n\n## Attributes\n\n```python\n<list> = dir(<object>)                  # Names\
    \ of object's attributes (including methods).\n<dict> = vars(<object>)       \
    \          # Dict of writable attributes. Also <obj>.__dict__.\n<bool> = hasattr(<object>,\
    \ '<attr_name>') # Checks if getattr() raises an AttributeError.\nvalue  = getattr(<object>,\
    \ '<attr_name>') # Raises AttributeError if attribute is missing.\nsetattr(<object>,\
    \ '<attr_name>', value)  # Only works on objects with '__dict__' attribute.\n\
    delattr(<object>, '<attr_name>')         # Same. Also `del <object>.<attr_name>`.\n\
    ```\n\n## Parameters\n\n```python\n<Sig>  = inspect.signature(<function>)  # Function's\
    \ Signature object.\n<dict> = <Sig>.parameters               # Dict of Parameter\
    \ objects.\n<memb> = <Param>.kind                   # Member of ParameterKind\
    \ enum.\n<obj>  = <Param>.default                # Default value or Parameter.empty.\n\
    <type> = <Param>.annotation             # Type or Parameter.empty.\n```\n\n##\
    \ Metaprogramming\n\nCode that generates code.\n\n## Type\n\nType is the root\
    \ class. If only passed an object it returns its type (class). Otherwise it creates\
    \ a new class.\n\n```python\n<class> = type('<class_name>', <tuple_of_parents>,\
    \ <dict_of_class_attributes>)\n```\n\n```python\n>>> Z = type('Z', (), {'a': 'abcde',\
    \ 'b': 12345})\n>>> z = Z()\n```\n\n## Meta Class\n\nA class that creates classes.\n\
    \n```python\ndef my_meta_class(name, parents, attrs):\n    attrs['a'] = 'abcde'\n\
    \    return type(name, parents, attrs)\n```\n\nOr:\n\n```python\nclass MyMetaClass(type):\n\
    \    def __new__(cls, name, parents, attrs):\n        attrs['a'] = 'abcde'\n \
    \       return type.__new__(cls, name, parents, attrs)\n```\n\n- `new()` is a\
    \ class method that gets called before `init()`. If it returns an instance of\
    \ its class, then that instance gets passed to `init()` as a `self` argument.\n\
    - It receives the same arguments as `init()`, except for the first one that specifies\
    \ the desired type of the returned instance (MyMetaClass in our case).\n- Like\
    \ in our case, `new()` can also be called directly, usually from a `new()` method\
    \ of a child class (`def __new__(cls): return super().__new__(cls)`).\n- The only\
    \ difference between the examples above is that `my_meta_class()` returns a class\
    \ of type `type`, while `MyMetaClass()` returns a class of type `MyMetaClass`.\n\
    \n## Metaclass Attribute\n\nRight before a class is created it checks if it has\
    \ the `metaclass` attribute defined. If not, it recursively checks if any of its\
    \ parents has it defined and eventually comes to `type()`.\n\n```python\nclass\
    \ MyClass(metaclass=MyMetaClass):\n    b = 12345\n```\n\n```python\n>>> MyClass.a,\
    \ MyClass.b\n('abcde', 12345)\n```\n\n## Type Diagram\n\n```python\ntype(MyClass)\
    \ == MyMetaClass          # MyClass is an instance of MyMetaClass.\ntype(MyMetaClass)\
    \ == type             # MyMetaClass is an instance of type.\n```\n\n![](img/3f9f692c7257b66046bda97daa079a2d_31_0.png)\n\
    \n## Inheritance Diagram\n\n```python\nMyClass.__base__ == object            \
    \ # MyClass is a subclass of object.\nMyMetaClass.__base__ == type           #\
    \ MyMetaClass is a subclass of type.\n```\n\n![](img/3f9f692c7257b66046bda97daa079a2d_31_1.png)"
  mdcn: "## 线程\n\nCPython 解释器一次只能运行一个线程。使用多个线程并不会加快执行速度，除非其中至少一个线程包含 I/O 操作。\n\n```python\n\
    from threading import Thread, Timer, RLock, Semaphore, Event, Barrier\nfrom concurrent.futures\
    \ import ThreadPoolExecutor, as_completed\n```\n\n## 线程\n\n```python\n<Thread>\
    \ = Thread(target=<function>)          # 使用 `args=<collection>` 来设置参数。\n<Thread>.start()\
    \                             # 启动线程。\n<bool> = <Thread>.is_alive()          \
    \       # 检查线程是否已完成执行。\n<Thread>.join()                              # 等待线程完成。\n\
    ```\n\n- 使用 `kwargs=<dict>` 向函数传递关键字参数。\n- 使用 `daemon=True`，否则程序将无法在线程存活时退出。\n\
    - 要延迟线程执行，请使用 `Timer(seconds, <func>)` 代替 Thread()。\n\n## 锁\n\n```python\n<lock>\
    \ = RLock()                             # 只能由获取者释放的锁。\n<lock>.acquire()      \
    \                       # 等待锁可用。\n<lock>.release()                           \
    \  # 使锁再次可用。\n```\n\n或者：\n\n```python\nwith <lock>:                          \
    \       # 通过调用 acquire() 进入代码块，\n    ...                                     \
    \ # 并通过 release() 退出，即使在错误时也是如此。\n```\n\n## 信号量、事件、屏障\n\n```python\n<Semaphore>\
    \ = Semaphore(value=1)             # 可被 'value' 个线程获取的锁。\n<Event>      = Event()\
    \                       # wait() 方法会阻塞，直到调用 set()。\n<Barrier>    = Barrier(n_times)\
    \              # wait() 会阻塞，直到被调用 n_times 次。\n```\n\n## 队列\n\n```python\n<Queue>\
    \ = queue.Queue(maxsize=0)             # 一个线程安全的先进先出队列。\n<Queue>.put(<el>)   \
    \                         # 阻塞，直到队列不再满。\n<Queue>.put_nowait(<el>)            \
    \         # 如果队列已满，则引发 queue.Full 异常。\n<el> = <Queue>.get()                  \
    \       # 阻塞，直到队列不再空。\n<el> = <Queue>.get_nowait()                  # 如果队列为空，则引发\
    \ queue.Empty 异常。\n```\n\n## 线程池执行器\n\n```python\n<Exec> = ThreadPoolExecutor(max_workers=None)\
    \ # 或者：`with ThreadPoolExecutor() as <name>: ...`\n<iter> = <Exec>.map(<func>,\
    \ <args_1>, ...)    # 多线程且非惰性的 map()。保持顺序。\n<Futr> = <Exec>.submit(<func>, <arg_1>,\
    \ ...) # 创建一个线程并返回其 Future 对象。\n<Exec>.shutdown()                            #\
    \ 阻塞，直到所有线程完成执行。\n```\n\n```python\n<bool> = <Future>.done()                 \
    \    # 检查线程是否已完成执行。\n<obj>  = <Future>.result(timeout=None)       # 等待线程完成并返回结果。\n\
    <bool> = <Future>.cancel()                   # 取消线程，如果线程正在运行/已完成则返回 False。\n<iter>\
    \ = as_completed(<coll_of_Futures>)     # Next() 等待下一个完成的 Future。\n```\n\n- `map()`\
    \ 和 `as_completed()` 也接受 `timeout` 参数，如果在 `next()` 被调用后 `timeout` 秒内结果不可用，则会引发\
    \ TimeoutError。\n- 线程内部发生的异常会在调用 map 迭代器的 `next()` 或调用 Future 的 `result()` 时引发。其\
    \ `exception()` 方法返回异常或 None。\n- ProcessPoolExecutor 提供真正的并行性，但发送到/从工作进程接收的所有内容都必须是可序列化的。队列必须使用执行器的\
    \ `initargs` 和 `initializer` 参数发送。\n\n## 运算符\n\n提供运算符功能的函数模块。函数按运算符优先级排序，从最低绑定开始。\n\
    \n```python\nimport operator as op\n<bool> = op.not_(<obj>)                  \
    \                  # or, and, not (or/and 缺失)\n<bool> = op.eq/ne/lt/le/gt/ge/contains/is_(<obj>,\
    \ <obj>)   # ==, !=, <, <=, >, >=, in, is\n<obj>  = op.or_/xor/and_(<int/set>,\
    \ <int/set>)             # |, ^, &\n<int>  = op.lshift/rshift(<int>, <int>)  \
    \                  # <<, >>\n<obj>  = op.add/sub/mul/truediv/floordiv/mod(<obj>,\
    \ <obj>) # +, -, *, /, //, %\n<num>  = op.neg/invert(<num>)                  \
    \            # -, ~\n<num>  = op.pow(<num>, <num>)                           \
    \    # **\n<func> = op.itemgetter/attrgetter/methodcaller(<obj> [, ...])  # [index/key],\
    \ .name, .name()\n```\n\n```python\nelementwise_sum  = map(op.add, list_a, list_b)\n\
    sorted_by_second = sorted(<collection>, key=op.itemgetter(1))\nsorted_by_both\
    \   = sorted(<collection>, key=op.itemgetter(1, 0))\nproduct_of_elems = functools.reduce(op.mul,\
