    # Special Sequences


    ```

    ''\d'' == ''[0-9]''                     # Matches decimal characters.

    ''\w'' == ''[a-zA-Z0-9_]''              # Matches alphanumerics and underscore.

    ''\s'' == ''[ \t\n\r\f\v]''             # Matches whitespaces.

    ```


    +   - By default, decimal characters, alphanumerics and whitespaces from all alphabets
    are matched unless ''flags=re.ASCII'' argument is used.

    - As shown above, it restricts all special sequence matches to the first 128 characters
    and prevents ''\s'' from accepting ''[\x1c-\x1f]'' (the so-called separator characters).

    - Use a capital letter for negation (all non-ASCII characters will be matched
    when used in combination with ASCII flag).


