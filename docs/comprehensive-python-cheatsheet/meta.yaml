    ```

    <Image> = Image.new(''<mode>'', (width, height))    # Also `color=<int/tuple/str>`.

    <Image> = Image.open(<path>)                    # Identifies format based on file
    contents.

    <Image> = <Image>.convert(''<mode>'')              # Converts image to the new
    mode.

    <Image>.save(<path>)                             # Selects format based on the
    path extension.

    <Image>.show()                                   # Opens image in the default
    preview app.

    ```


    ```

    <int/tuple> = <Image>.getpixel((x, y))           # Returns pixel''s color.

    <Image>.putpixel((x, y), <int/tuple>)            # Changes pixel''s color.

    <ImagingCore> = <Image>.getdata()                # Returns a flattened view of
    all pixels.

    <Image>.putdata(<list/ImagingCore>)              # Updates pixels with a copy
    of the sequence.

    <Image>.paste(<Image>, (x, y))                   # Draws passed image at specified
    location.

    ```


    ```

    <Image> = <Image>.filter(<Filter>)               # `<Filter> = ImageFilter.<name>([<args>])`

    <Image> = <Enhance>.enhance(<float>)             # `<Enhance> = ImageEnhance.<name>(<Image>)`

    ```


    ```

    <array> = np.array(<Image>)                      # Creates a NumPy array from
    the image.

    <Image> = Image.fromarray(np.uint8(<array>))     # Use <array>.clip(0, 255) to
    clip values.

    ```


    # Modes


    +   - ''L'' - 8-bit pixels, greyscale.

    - ''RGB'' - 3x8-bit pixels, true color.

    - ''RGBA'' - 4x8-bit pixels, true color with transparency mask.

    - ''HSV'' - 3x8-bit pixels, Hue, Saturation, Value color space.


    # Examples


    Creates a PNG image of a rainbow gradient:


    ```

    WIDTH, HEIGHT = 100, 100

    n_pixels = WIDTH * HEIGHT

    hues = (255 * i/n_pixels for i in range(n_pixels))

    img = Image.new(''HSV'', (WIDTH, HEIGHT))

    img.putdata([(int(h), 255, 255) for h in hues])

    img.convert(''RGB'').save(''test.png'')

    ```


    Adds noise to the PNG image and displays it:


    ```

    from random import randint

    add_noise = lambda value: max(0, min(255, value + randint(-20, 20)))

    img = Image.open(''test.png'').convert(''HSV'')

    img.putdata([(add_noise(h), s, v) for h, s, v in img.getdata()])

    img.show()

    ```


    # Image Draw


    ```

    from PIL import ImageDraw, ImageFont

    <ImageDraw> = ImageDraw.Draw(<Image>)            # Object for adding 2D graphics
    to the image.

    <ImageDraw>.point((x, y))                        # Draws a point. Truncates floats
    into ints.

    <ImageDraw>.line((x1, y1, x2, y2 [, ...]))       # To get anti-aliasing use Image''s
    resize().

    <ImageDraw>.arc((x1, y1, x2, y2), deg1, deg2)    # Always draws in clockwise direction.

    <ImageDraw>.rectangle((x1, y1, x2, y2))          # To rotate use Image''s rotate()
    and paste().

    <ImageDraw>.polygon((x1, y1, x2, y2, ...))       # Last point gets connected to
    the first.

    <ImageDraw>.ellipse((x1, y1, x2, y2))            # To rotate use Image''s rotate()
    and paste().

    <ImageDraw>.text((x, y), text, font=<Font>)      # `<Font> = ImageFont.truetype(<path>,
    size)`

    ```


    +   - Use ''fill=<color>'' to set the primary color.

    - Use ''width=<int>'' to set the width of lines or contours.

    - Use ''outline=<color>'' to set the color of the contours.

    - Color can be an int, tuple, ''#rrggbb[aa]'' string or a color name.'
