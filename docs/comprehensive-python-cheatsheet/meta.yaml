  md: "# Indexing\n\n```\n<el>        = <2d_array>[row_index, column_index]    # <3d_a>[table_i,\
    \ row_i, column_i]\n<1d_view>   = <2d_array>[row_index]                # <3d_a>[table_i,\
    \ row_i]\n<1d_view>   = <2d_array>[:, column_index]          # <3d_a>[table_i,\
    \ :, column_i]\n<2d_view>   = <2d_array>[rows_slice, columns_slice] # <3d_a>[table_i,\
    \ rows_s, columns_s]\n\n<2d_array>  = <2d_array>[row_indexes]              # <3d_a>[table_i/is,\
    \ row_is]\n<2d_array>  = <2d_array>[:, column_indexes]        # <3d_a>[table_i/is,\
    \ :, column_is]\n<1d_array>  = <2d_array>[row_indexes, column_indexes] # <3d_a>[table_i/is,\
    \ row_is, column_is]\n<1d_array>  = <2d_array>[row_indexes, column_index]   #\
    \ <3d_a>[table_i/is, row_is, column_i]\n\n<2d_bools>  = <2d_array> > <el/1d/2d_array>\
    \        # 1d_array must have size of a row.\n<1d/2d_a>   = <2d_array>[<2d/1d_bools>]\
    \            # 1d_bools must have size of a column.\n```\n\n+   - Indexes should\
    \ not be tuples because Python converts `obj[i, j]` to `obj[(i, j)]`!\n- `:` returns\
    \ a slice of all dimension's indexes. Omitted dimensions default to `:`.\n- Any\
    \ value that is broadcastable to the indexed shape can be assigned to the selection.\n\
    \n# Broadcasting\n\nSet of rules by which NumPy functions operate on arrays of\
    \ different sizes and/or dimensions.\n\n```\nleft  = [[0.1], [0.6], [0.8]]   \
    \       # Shape: (3, 1)\nright = [ 0.1 ,  0.6 ,  0.8 ]          # Shape: (3,)\n\
    ```\n\n1. If array shapes differ in length, left-pad the shorter shape with ones:\n\
    \n```\nleft  = [[0.1], [0.6], [0.8]]          # Shape: (3, 1)\nright = [[0.1 ,\
    \  0.6 ,  0.8]]          # Shape: (1, 3) <- !\n```\n\n2. If any dimensions differ\
    \ in size, expand the ones that have size 1 by duplicating their elements:\n\n\
    ```\nleft  = [[0.1,  0.1,  0.1],             # Shape: (3, 3) <- !\n          [0.6,\
    \  0.6,  0.6],\n          [0.8,  0.8,  0.8]]\n\nright = [[0.1,  0.6,  0.8],  \
    \           # Shape: (3, 3) <- !\n          [0.1,  0.6,  0.8],\n          [0.1,\
    \  0.6,  0.8]]\n```\n\n# Example\n\nFor each point returns index of its nearest\
    \ point (`[0.1, 0.6, 0.8]` => `[1, 2, 1]`):\n\n```\n>>> points = np.array([0.1,\
    \ 0.6, 0.8])\n[ 0.1,  0.6,  0.8]\n>>> wrapped_points = points.reshape(3, 1)\n\
    [[ 0.1],\n [ 0.6],\n [ 0.8]]\n>>> distances = wrapped_points - points\n[[ 0. ,\
    \ -0.5, -0.7],\n [ 0.5,  0. , -0.2],\n [ 0.7,  0.2,  0. ]]\n>>> distances = np.abs(distances)\n\
    [[ 0. ,  0.5,  0.7],\n [ 0.5,  0. ,  0.2],\n [ 0.7,  0.2,  0. ]]\n>>> distances[range(3),\
    \ range(3)] = np.inf\n[[ inf,  0.5,  0.7],\n [ 0.5,  inf,  0.2],\n [ 0.7,  0.2,\
    \  inf]]\n>>> distances.argmin(1)\n[1, 2, 1]\n```"
