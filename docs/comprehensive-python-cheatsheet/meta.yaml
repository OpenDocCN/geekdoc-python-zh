    \ a html file in a web browser use 'webbrowser.open(<path>)' instead.\n\n```\n\
    # $ pip3 install flask\nimport flask\n\napp = flask.Flask(__name__)\napp.run(host=None,\
    \ port=None, debug=None)\n```\n\n+   - Starts the app at 'http://localhost:5000'.\
    \ Use 'host=\"0.0.0.0\"' to run externally.\n- Install a WSGI server like Waitress\
    \ and a HTTP server such as Nginx for better security.\n- Debug mode restarts\
    \ the app whenever script changes and displays errors in the browser.\n\n# Static\
    \ Request\n\n```\n@app.route('/img/<path:filename>')\ndef serve_file(filename):\n\
    \    return flask.send_from_directory('dirname/', filename)\n```\n\n# Dynamic\
    \ Request\n\n```\n@app.route('/<sport>')\ndef serve_html(sport):\n    return flask.render_template_string('<h1>{{title}}</h1>',\
    \ title=sport)\n```\n\n+   - Use 'render_template(filename, <kwargs>)' to render\
    \ file located in templates dir.\n- To return an error code use 'abort(<int>)'\
    \ and to redirect use 'redirect(<url>)'.\n- 'request.args[<str>]' returns parameter\
    \ from the query string (URL part after '?').\n- Use 'session[key] = value' to\
    \ store session data like username, etc.\n\n# REST Request\n\n```\n@app.post('/<sport>/odds')\n\
    def serve_json(sport):\n    team = flask.request.form['team']\n    return {'team':\
    \ team, 'odds': [2.09, 3.74, 3.68]}\n```\n\nStarts the app in its own thread and\
    \ queries its REST API:\n\n```\n# $ pip3 install requests\n>>> import threading,\
    \ requests\n>>> threading.Thread(target=app.run, daemon=True).start()\n>>> url\
    \ = 'http://localhost:5000/football/odds'\n>>> request_data = {'team': 'arsenal\
    \ f.c.'}\n>>> response = requests.post(url, data=request_data)\n>>> response.json()\n\
    {'team': 'arsenal f.c.', 'odds': [2.09, 3.74, 3.68]}\n```\n\n# # Profiling\n\n\
    ```\nfrom time import perf_counter\nstart_time = perf_counter()\n...\nduration_in_seconds\
    \ = perf_counter() - start_time\n```\n\n# Timing a Snippet\n\n```\n>>> from timeit\
    \ import timeit\n>>> timeit('list(range(10000))', number=1000, globals=globals(),\
    \ setup='pass')\n0.19373\n```"
