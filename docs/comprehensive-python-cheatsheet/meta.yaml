  md: "# # Class\n\n```\npython\nclass <name>:\n    def __init__(self, a):\n     \
    \   self.a = a\n    def __repr__(self):\n        class_name = self.__class__.__name__\n\
    \        return f'{class_name}({self.a!r})'\n    def __str__(self):\n        return\
    \ str(self.a)\n\n    @classmethod\n    def get_class_name(cls):\n        return\
    \ cls.__name__\n```\n\n+   - Return value of repr() should be unambiguous and\
    \ of str() readable.\n- If only repr() is defined, it will also be used for str().\n\
    - Methods decorated with '@staticmethod' do not receive 'self' nor 'cls' as their\
    \ first arg.\n\nExpressions that call the str() method:\n\n```\npython\nprint(<el>)\n\
    f'{<el>}'\nlogging.warning(<el>)\ncsv.writer(<file>).writerow([<el>])\nraise Exception(<el>)\n\
    ```\n\nExpressions that call the repr() method:\n\n```\npython\nprint/str/repr([<el>])\n\
    print/str/repr({<el>: <el>})\nf'{<el>!r}'\nZ = dataclasses.make_dataclass('Z',\
    \ ['a']); print/str/repr(Z(<el>))\n>>> <el>\n```\n\n# ## Constructor Overloading\n\
    \n```\npython\nclass <name>:\n    def __init__(self, a=None):\n        self.a\
    \ = a\n```\n\n# ## Inheritance\n\n```\npython\nclass Person:\n    def __init__(self,\
    \ name, age):\n        self.name = name\n        self.age = age\n\nclass Employee(Person):\n\
    \    def __init__(self, name, age, staff_num):\n        super().__init__(name,\
    \ age)\n        self.staff_num = staff_num\n```\n\n# ## Multiple Inheritance\n\
