    \              # 也可用 `names=<list>, parse_dates=False`。\n<DF> = pd.read_pickle/excel('<path/url>')\
    \     # 使用 `sheet_name=None` 获取所有 Excel 工作表。\n<DF> = pd.read_sql('<table/query>',\
    \ <conn.>)  # SQLite3/SQLAlchemy 连接（参见 #SQLite）。\n```\n\n```\n<dict> = <DF>.to_dict(['d/l/s/...'])\
    \          # 将列返回为字典、列表或 Series。\n<str>  = <DF>.to_json/html/csv([<path>])   \
    \   # 也可用 to_markdown/latex([<path>])。\n<DF>.to_pickle/excel(<path>)         \
    \         # 运行 `$ pip3 install \"pandas[excel]\" odfpy`。\n<DF>.to_sql('<table_name>',\
    \ <connection>)     # 也可用 `if_exists='fail/replace/append'`。\n```\n\n## GroupBy\n\
    \n根据传入列的值将数据框的行分组的对象。\n\n```\n>>> df = pd.DataFrame([[1, 2, 3], [4, 5, 6], [7,\
    \ 8, 6]], list('abc'), list('xyz'))\n>>> df.groupby('z').get_group(6)\n   x  y\
    \  z\nb  4  5  6\nc  7  8  6\n```\n\n```\n<GB> = <DF>.groupby(column_key/s)  \
    \           # 根据传入的列将 DF 分组。\n<DF> = <GB>.apply(<func>)                     #\
    \ 映射每个组。函数可以返回 DF、Sr 或 el。\n<GB> = <GB>[column_key]                       # 单列\
    \ GB。所有操作返回一个 Sr。\n<Sr> = <GB>.size()                            # 一个包含组大小的 Sr。键是组的“名称”。\n\
    ```\n\n## GroupBy – 聚合、转换、映射：\n\n```\n<DF> = <GB>.sum/max/mean/idxmax/all()  \
    \       # 或：<GB>.agg(lambda <Sr>: <el>)\n<DF> = <GB>.rank/diff/cumsum/ffill()\
    \          # 或：<GB>.transform(lambda <Sr>: <Sr>)\n<DF> = <GB>.fillna(<el>)   \
    \                   # 或：<GB>.transform(lambda <Sr>: <Sr>)\n```\n\n```\n>>> gb\
    \ = df.groupby('z'); gb.apply(print)\n   x  y  z\na  1  2  3\n   x  y  z\nb  4\
    \  5  6\nc  7  8  6\n```\n\n| | 'sum' | 'rank' | ['rank'] | {'x': 'rank'} |\n\
    |---|---|---|---|---|\n| gb.agg(...) | x  y<br>z<br>3  1  2<br>6  11  13 | x \
    \ y<br>a  1  1<br>b  1  1<br>c  2  2 | x  y<br>rank rank<br>a  1  1<br>b  1  1<br>c\
    \  2  2 | x<br>a  1<br>b  1<br>c  2 |\n| gb.transform(...) | x  y<br>a  1  2<br>b\
    \  11  13<br>c  11  13 | x  y<br>a  1  1<br>b  1  1<br>c  2  2 | | |\n\n## Rolling\n\
    \n用于滚动窗口计算的对象。\n\n```\n<RSr/RDF/RGB> = <Sr/DF/GB>.rolling(win_size)   # 也可：`min_periods=None,\
    \ center=False`。\n<RSr/RDF/RGB> = <RDF/RGB>[column_key/s]        # 或：<RDF/RGB>.column_key\n\
    <Sr/DF>       = <R>.mean/sum/max()             # 或：<R>.apply/agg(<agg_func/str>)\n\
    ```\n\n## Plotly\n\n```\n# $ pip3 install pandas plotly kaleido\nimport pandas\
    \ as pd, plotly.express as ex\n<Figure> = ex.line(<DF>, x=<col_name>, y=<col_name>)\
    \   # 或：ex.line(x=<list>, y=<list>)\n<Figure>.update_layout(margin=dict(t=0, r=0,\
    \ b=0, l=0), ...)  # `paper_bgcolor='rgb(0, 0, 0)'`。\n<Figure>.write_html/json/image('<path>')\
    \              # 也可用 <Figure>.show()。\n```\n\n显示按洲分组的每百万人口冠状病毒死亡总数的折线图：\n\n![](img/3f9f692c7257b66046bda97daa079a2d_46_0.png)\n\
    \n```\ncovid = pd.read_csv('https://covid.ourworldindata.org/data/owid-covid-data.csv',\n\
    \                    usecols=['iso_code', 'date', 'total_deaths', 'population'])\n\
    continents = pd.read_csv('https://gist.githubusercontent.com/stevewithington/20a69c0b6d2ff'\n\
    \                         '846ea5d35e5fc47f26c/raw/country-and-continent-codes-list-csv.csv',\n\
    \                         usecols=['Three_Letter_Country_Code', 'Continent_Name'])\n\
    df = pd.merge(covid, continents, left_on='iso_code', right_on='Three_Letter_Country_Code')\n\
    df = df.groupby(['Continent_Name', 'date']).sum().reset_index()\ndf['Total Deaths\
    \ per Million'] = df.total_deaths * 1e6 / df.population\ndf = df[df.date > '2020-03-14']\n\
    df = df.rename({'date': 'Date', 'Continent_Name': 'Continent'}, axis='columns')\n\
    ex.line(df, x='Date', y='Total Deaths per Million', color='Continent').show()\n\
    ```\n\n显示冠状病毒总病例数以及比特币、道琼斯指数和黄金价格变化的多轴折线图：\n\n![](img/3f9f692c7257b66046bda97daa079a2d_47_0.png)\n\
    \n```\npython\nimport pandas as pd, plotly.graph_objects as go\n\ndef main():\n\
    \    covid, bitcoin, gold, dow = scrape_data()\n    display_data(wrangle_data(covid,\
    \ bitcoin, gold, dow))\n\ndef scrape_data():\n    def get_covid_cases():\n   \
    \     url = 'https://covid.ourworldindata.org/data/owid-covid-data.csv'\n    \
    \    df = pd.read_csv(url, usecols=['location', 'date', 'total_cases'])\n    \
    \    return df[df.location == 'World'].set_index('date').total_cases\n    def\
    \ get_ticker(symbol):\n        url = (f'https://query1.finance.yahoo.com/v7/finance/download/{symbol}?'\
    \ \n               'period1=1579651200&period2=9999999999&interval=1d&events=history')\n\
    \        df = pd.read_csv(url, usecols=['Date', 'Close'])\n        return df.set_index('Date').Close\n\
    \    out = get_covid_cases(), get_ticker('BTC-USD'), get_ticker('GC=F'), get_ticker('^DJI')\n\
    \    return map(pd.Series.rename, out, ['Total Cases', 'Bitcoin', 'Gold', 'Dow\
    \ Jones'])\n\ndef wrangle_data(covid, bitcoin, gold, dow):\n    df = pd.concat([bitcoin,\
    \ gold, dow], axis=1)  # 通过按日期连接列来创建表格。\n    df = df.sort_index().interpolate()\
    \            # 按日期排序表格并插值 NaN。\n    df = df.loc['2020-02-23':]               \
    \     # 丢弃 '2020-02-23' 之前的行。\n    df = (df / df.iloc[0]) * 100              \
    \    # 计算相对于第一天的百分比。\n    df = df.join(covid)                           # 添加包含\
    \ covid 病例的列。\n    return df.sort_values(df.index[-1], axis=1)   # 按最后一天的值对列排序。\n\
    \ndef display_data(df):\n    figure = go.Figure()\n    for col_name in reversed(df.columns):\n\
    \        yaxis = 'y1' if col_name == 'Total Cases' else 'y2'\n        trace =\
    \ go.Scatter(x=df.index, y=df[col_name], name=col_name, yaxis=yaxis)\n       \
    \ figure.add_trace(trace)\n    figure.update_layout(\n        yaxis1=dict(title='Total\
    \ Cases', rangemode='tozero'),\n        yaxis2=dict(title='%', rangemode='tozero',\
    \ overlaying='y', side='right'),\n        legend=dict(x=1.08),\n        width=944,\n\
    \        height=423\n    )\n    figure.show()\n\nif __name__ == '__main__':\n\
    \    main()\n```\n\n## PySimpleGUI\n\n```\npython\n# $ pip3 install PySimpleGUI\n\
    import PySimpleGUI as sg\n\nlayout = [[sg.Text(\"What's your name?\")], [sg.Input()],\
    \ [sg.Button('Ok')]]\nwindow = sg.Window('Window Title', layout)\nevent, values\
    \ = window.read()\nprint(f'Hello {values[0]}!' if event == 'Ok' else '')\n```\n\
    \n## 附录\n\n## Cython\n\n将 Python 代码编译成 C 的库。\n\n```\n# $ pip3 install cython\n\
    import pyximport; pyximport.install()\nimport <cython_script>\n<cython_script>.main()\n\
    ```\n\n定义：\n\n- 所有 `cdef` 定义都是可选的，但它们有助于加速。\n- 脚本需要以 `pyx` 扩展名保存。\n\n```\ncdef\
    \ <ctype> <var_name> = <el>\ncdef <ctype>[n_elements] <var_name> = [<el>, <el>,\
    \ ...]\ncdef <ctype/void> <func_name>(<ctype> <arg_name>): ...\n```\n\n```\ncdef\
    \ class <class_name>:\n    cdef public <ctype> <attr_name>\n    def __init__(self,\
    \ <ctype> <arg_name>):\n        self.<attr_name> = <arg_name>\n```\n\n```\ncdef\
    \ enum <enum_name>: <member_name>, <member_name>, ...\n```\n\n## 虚拟环境\n\n将库直接安装到项目目录的系统。\n\
    \n```\n$ python3 -m venv <name>       # 在当前目录创建虚拟环境。\n$ source <name>/bin/activate\
    \  # 激活 venv。在 Windows 上运行 `<name>\\Scripts\\activate`。\n$ pip3 install <library>\
    \      # 将库安装到活动环境中。\n$ python3 <path>              # 在活动环境中运行脚本。也可用 `./<path>`。\n\
    $ deactivate                  # 停用活动的虚拟环境。\n```\n\n## 基本脚本模板\n\n```\n#!/usr/bin/env\
    \ python3\n#\n# Usage: .py\n#\n\nfrom sys import argv, exit\nfrom collections\
    \ import defaultdict, namedtuple\nfrom dataclasses import make_dataclass\nfrom\
    \ enum import Enum\nimport functools as ft, itertools as it, operator as op, re\n\
    \ndef main():\n    pass\n\n###\n## UTIL\n#\n\ndef read_file(filename):\n    with\
    \ open(filename, encoding='utf-8') as file:\n        return file.readlines()\n\
    \nif __name__ == '__main__':\n    main()\n```"
