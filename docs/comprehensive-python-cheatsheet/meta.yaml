  md: "# Write Float Samples to WAV File\n\n```\ndef write_to_wav_file(filename, float_samples,\
    \ nchannels=1, sampwidth=2, framerate=44100):\n    def get_bytes(a_float):\n \
    \       a_float = max(-1, min(1 - 2e-16, a_float))\n        a_float += sampwidth\
    \ == 1\n        a_float *= pow(2, sampwidth * 8 - 1)\n        return int(a_float).to_bytes(sampwidth,\
    \ 'little', signed=(sampwidth != 1))\n    with wave.open(filename, 'wb') as file:\n\
    \        file.setnchannels(nchannels)\n        file.setsampwidth(sampwidth)\n\
    \        file.setframerate(framerate)\n        file.writeframes(b''.join(get_bytes(f)\
    \ for f in float_samples))\n```\n\n# Examples\n\nSaves a 440 Hz sine wave to a\
    \ mono WAV file:\n\n```\nfrom math import pi, sin\nsamples_f = (sin(i * 2 * pi\
