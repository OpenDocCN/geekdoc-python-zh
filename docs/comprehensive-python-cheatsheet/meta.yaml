    \ text='Website').next_sibling.a['href']\n    logo_url   = table.find('img')['src']\n\
    \    logo       = requests.get(f'https:{logo_url}').content\n    filename   =\
    \ os.path.basename(logo_url)\n    with open(filename, 'wb') as file:\n       \
