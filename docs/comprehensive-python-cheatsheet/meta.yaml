  md: 'Integer types. Use a capital letter for unsigned type. Minimum and standard
    sizes are in brackets:


    +   - ''b'' - char (1/1)

    - ''h'' - short (2/2)

    - ''i'' - int (2/4)

    - ''l'' - long (4/4)

