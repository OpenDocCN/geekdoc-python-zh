    \ argument, or `\\r` will be added in front of every `\\n` on platforms that use\
    \ `\\r\\n` line endings!\n- Open existing file with `mode=\"w\"` to overwrite\
    \ it or `mode=\"a\"` to append to it.\n\n# Parameters\n\n+   - `dialect` - Master\
    \ parameter that sets the default values. String or a `csv.Dialect` object.\n\
    - `delimiter` - A one-character string used to separate fields.\n- `quotechar`\
    \ - Character for quoting fields that contain special characters.\n- `doublequote`\
    \ - Whether quotechars inside fields are/get doubled or escaped.\n- `skipinitialspace`\
    \ - Is space character at the start of the field stripped by the reader.\n- `lineterminator`\
    \ - How writer terminates rows. Reader is hardcoded to `\\n`, `\\r`, `\\r\\n`.\n\
    - `quoting` - 0: As necessary, 1: All, 2: All but numbers which are read as floats,\
    \ 3: None.\n- `escapechar` - Character for escaping quotechars if `doublequote`\
    \ is False.\n\n# Dialects\n\n| | excel | excel-tab | unix |\n|---|---|---|---|\n\
    | delimiter | `,` | `\\t` | `,` |\n| quotechar | `\"` | `\"` | `\"` |\n| doublequote\
    \ | True | True | True |\n| skipinitialspace | False | False | False |\n| lineterminator\
    \ | `\\r\\n` | `\\r\\n` | `\\n` |\n| quoting | 0 | 0 | 1 |\n| escapechar | None\
    \ | None | None |\n\n# Read Rows from CSV File\n\n```\ndef read_csv_file(filename,\
    \ dialect='excel', **params):\n    with open(filename, encoding='utf-8', newline='')\
