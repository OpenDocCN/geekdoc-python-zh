  md: "# Meta Class\n\nA class that creates classes.\n\n```\ndef my_meta_class(name,\
    \ parents, attrs):\n    attrs['a'] = 'abcde'\n    return type(name, parents, attrs)\n\
    ```\n\nOr:\n\n```\nclass MyMetaClass(type):\n    def __new__(cls, name, parents,\
    \ attrs):\n        attrs['a'] = 'abcde'\n        return type.__new__(cls, name,\
    \ parents, attrs)\n```\n\n+   - New() is a class method that gets called before\
    \ init(). If it returns an instance of its class, then that instance gets passed\
    \ to init() as a 'self' argument.\n- It receives the same arguments as init(),\
    \ except for the first one that specifies the desired type of the returned instance\
    \ (MyMetaClass in our case).\n- Like in our case, new() can also be called directly,\
    \ usually from a new() method of a child class (def __new__(cls): return super().__new__(cls)).\n\
    - The only difference between the examples above is that my_meta_class() returns\
    \ a class of type type, while MyMetaClass() returns a class of type MyMetaClass.\n\
    \n# Metaclass Attribute\n\nRight before a class is created it checks if it has\
    \ the 'metaclass' attribute defined. If not, it recursively checks if any of its\
    \ parents has it defined and eventually comes to type().\n\n```\nclass MyClass(metaclass=MyMetaClass):\n\
    \    b = 12345\n```\n\n```\n>>> MyClass.a, MyClass.b\n('abcde', 12345)\n```\n\n\
    # Type Diagram\n\n```\ntype(MyClass) == MyMetaClass          # MyClass is an instance\
    \ of MyMetaClass.\ntype(MyMetaClass) == type             # MyMetaClass is an instance\
    \ of type.\n```\n\n![](img/3f9f692c7257b66046bda97daa079a2d_31_0.png)\n\n# Inheritance\
    \ Diagram\n\n```\nMyClass.__base__ == object             # MyClass is a subclass\
    \ of object.\nMyMetaClass.__base__ == type           # MyMetaClass is a subclass\
    \ of type.\n```\n\n![](img/3f9f692c7257b66046bda97daa079a2d_31_1.png)"
