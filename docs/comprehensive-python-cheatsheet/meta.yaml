- md: "# Comprehensive Python Cheatsheet\n\n## Contents\n\n```\nToC = {\n    '1. Collections':\
    \ [List, Dictionary, Set, Tuple, Range, Enumerate, Iterator, Generator],\n   \
    \ '2. Types':       [Type, String, Regular_Exp, Format, Numbers, Combinatorics,\
    \ Datetime],\n    '3. Syntax':      [Args, Inline, Import, Decorator, Class, Duck_Types,\
    \ Enum, Exception],\n    '4. System':      [Exit, Print, Input, Command_Line_Arguments,\
    \ Open, Path, OS_Commands],\n    '5. Data':        [JSON, Pickle, CSV, SQLite,\
    \ Bytes, Struct, Array, Memory_View, Deque],\n    '6. Advanced':    [Threading,\
    \ Operator, Introspection, Metaprograming, Eval, Coroutine],\n    '7. Libraries':\
    \   [Progress_Bar, Plot, Tables, Curses, Logging, Scraping, Web, Profile],\n \
    \   '8. Multimedia':  [NumPy, Image, Animation, Audio, Pygame, Pandas, Plotly,\
    \ PySimpleGUI]\n}\n```\n\n## Main\n\n```\nif __name__ == '__main__':    # Runs\
    \ main() if file wasn't imported.\n    main()\n```\n\n## List\n\n```\n<list> =\
    \ <list>[<slice>]              # Or: <list>[from_inclusive : to_exclusive : ±step]\n\
    \n<list>.append(<el>)                  # Or: <list> += [<el>]\n<list>.extend(<collection>)\
    \          # Or: <list> += <collection>\n\n<list>.sort()                     \
    \   # Sorts in ascending order.\n<list>.reverse()                     # Reverses\
    \ the list in-place.\n<list> = sorted(<collection>)        # Returns a new sorted\
    \ list.\n<iter> = reversed(<list>)            # Returns reversed iterator.\n\n\
    sum_of_elements  = sum(<collection>)\nelementwise_sum  = [sum(pair) for pair in\
    \ zip(list_a, list_b)]\nsorted_by_second = sorted(<collection>, key=lambda el:\
    \ el[1])\nsorted_by_both   = sorted(<collection>, key=lambda el: (el[1], el[0]))\n\
    flatter_list     = list(itertools.chain.from_iterable(<list>))\nproduct_of_elems\
    \ = functools.reduce(lambda out, el: out * el, <collection>)\nlist_of_chars  \
    \  = list(<str>)\n```\n\n- For details about sorted(), min() and max() see **sortable**.\n\
    - Module **operator** provides functions itemgetter() and mul() that offer the\
    \ same functionality as **lambda** expressions above.\n\n```\n<list>.insert(<int>,\
    \ <el>)    # Inserts item at index and moves the rest to the right.\n<el>  = <list>.pop([<int>])\
    \ # Removes and returns item at index or from the end.\n<int> = <list>.count(<el>)\
    \  # Returns number of occurrences. Also works on strings.\n<int> = <list>.index(<el>)\
    \  # Returns index of the first occurrence or raises ValueError.\n<list>.remove(<el>)\
    \         # Removes first occurrence of the item or raises ValueError.\n<list>.clear()\
    \              # Removes all items. Also works on dictionary and set.\n```\n\n\
    ## Dictionary\n\n```\n<view> = <dict>.keys()                    # Coll. of keys\
    \ that reflects changes.\n<view> = <dict>.values()                  # Coll. of\
    \ values that reflects changes.\n<view> = <dict>.items()                   # Coll.\
    \ of key-value tuples that reflects chgs.\n\nvalue  = <dict>.get(key, default=None)\
    \    # Returns default if key is missing.\nvalue  = <dict>.setdefault(key, default=None)\
    \ # Returns and writes default if key is missing.\n<dict> = collections.defaultdict(<type>)\
    \  # Returns a dict with default value `<type>()`.\n<dict> = collections.defaultdict(lambda:\
    \ 1) # Returns a dict with default value 1.\n\n<dict> = dict(<collection>)   \
    \            # Creates a dict from coll. of key-value pairs.\n<dict> = dict(zip(keys,\
    \ values))          # Creates a dict from two collections.\n<dict> = dict.fromkeys(keys\
    \ [, value])    # Creates a dict from collection of keys.\n\n<dict>.update(<dict>)\
    \                     # Adds items. Replaces ones with matching keys.\nvalue =\
    \ <dict>.pop(key)                   # Removes item or raises KeyError if missing.\n\
    {k for k, v in <dict>.items() if v == value} # Returns set of keys that point\
    \ to the value.\n{k: v for k, v in <dict>.items() if k in keys} # Returns a dictionary,\
    \ filtered by keys.\n```\n\n### Counter\n\n```\n>>> from collections import Counter\n\
    >>> colors = ['blue', 'blue', 'blue', 'red', 'red']\n>>> counter = Counter(colors)\n\
    >>> counter['yellow'] += 1\nCounter({'blue': 3, 'red': 2, 'yellow': 1})\n>>> counter.most_common()[0]\n\
    ('blue', 3)\n```\n\n## Set\n\n```\n<set> = set()                             #\
    \ `{}` returns a dictionary.\n\n<set>.add(<el>)                           # Or:\
    \ <set> |= {<el>}\n<set>.update(<collection> [, ...])        # Or: <set> |= <set>\n\
    \n<set>  = <set>.union(<coll.>)             # Or: <set> | <set>\n<set>  = <set>.intersection(<coll.>)\
    \      # Or: <set> & <set>\n<set>  = <set>.difference(<coll.>)        # Or: <set>\
    \ - <set>\n<set>  = <set>.symmetric_difference(<coll.>) # Or: <set> ^ <set>\n\
    <bool> = <set>.issubset(<coll.>)          # Or: <set> <= <set>\n<bool> = <set>.issuperset(<coll.>)\
    \        # Or: <set> >= <set>\n\n<el> = <set>.pop()                        # Raises\
    \ KeyError if empty.\n<set>.remove(<el>)                        # Raises KeyError\
    \ if missing.\n<set>.discard(<el>)                       # Doesn't raise an error.\n\
    ```\n\n### Frozen Set\n\n- Is immutable and hashable.\n- That means it can be\
    \ used as a key in a dictionary or as an element in a set.\n\n```\n<frozenset>\
    \ = frozenset(<collection>)\n```\n\n## Tuple\n\nTuple is an immutable and hashable\
    \ list.\n\n```\n<tuple> = ()\n<tuple> = (<el>,)\n<tuple> = (<el_1>, <el_2> [,\
    \ ...])\n```\n\n### Named Tuple\n\nTuple's subclass with named elements.\n\n```\n\
    >>> from collections import namedtuple\n>>> Point = namedtuple('Point', 'x y')\n\
    >>> p = Point(1, y=2)\nPoint(x=1, y=2)\n>>> p[0]\n1\n>>> p.x\n1\n>>> getattr(p,\
    \ 'y')\n2\n```\n\n## Range\n\nImmutable and hashable sequence of integers.\n\n\
    ```\n<range> = range(stop)\n<range> = range(start, stop)\n<range> = range(start,\
    \ stop, ±step)\n```\n\n```\n>>> [i for i in range(3)]\n[0, 1, 2]\n```\n\n## Enumerate\n\
    \n```\nfor i, el in enumerate(<collection> [, i_start]):\n    ...\n```\n\n## Iterator\n\
    \n```\n<iter> = iter(<collection>)\n<iter> = iter(<function>, to_exclusive)\n\
    <el>   = next(<iter> [, default])\n<list> = list(<iter>)\n```\n\n### Itertools\n\
    \n```\nimport itertools as it\n```\n\n```\n<iter> = it.count(start=0, step=1)\n\
    <iter> = it.repeat(<el> [, times])\n<iter> = it.cycle(<collection>)\n```\n\n```\n\
    <iter> = it.chain(<coll>, <coll> [, ...])\n<iter> = it.chain.from_iterable(<coll>)\n\
    ```\n\n```\n<iter> = it.islice(<coll>, to_exclusive)\n<iter> = it.islice(<coll>,\
    \ from_inc, ...)\n```\n\n## Generator\n\n- Any function that contains a yield\
    \ statement returns a generator.\n- Generators and iterators are interchangeable.\n\
    \n```\ndef count(start, step):\n    while True:\n        yield start\n       \
    \ start += step\n```\n\n```\n>>> counter = count(10, 2)\n>>> next(counter), next(counter),\
    \ next(counter)\n(10, 12, 14)\n```\n\n## Type\n\n- Everything is an object.\n\
    - Every object has a type.\n- Type and class are synonymous.\n\n```\n<type> =\
    \ type(<el>)                # Or: <el>.__class__\n<bool> = isinstance(<el>, <type>)\
    \  # Or: issubclass(type(<el>), <type>)\n```\n\n```\n>>> type('a'), 'a'.__class__,\
    \ str\n(<class 'str'>, <class 'str'>, <class 'str'>)\n```\n\nSome types do not\
    \ have built-in names, so they must be imported:\n\n```\nfrom types import FunctionType,\
    \ MethodType, LambdaType, GeneratorType, ModuleType\n```\n\n### Abstract Base\
    \ Classes\n\nEach abstract base class specifies a set of virtual subclasses. These\
    \ classes are then recognized by isinstance() and issubclass() as subclasses of\
    \ the ABC, although they are really not. ABC can also manually decide whether\
    \ or not a specific class is its virtual subclass, usually based on which methods\
    \ the class has implemented. For instance, Iterable ABC looks for method iter(),\
    \ while Collection ABC looks for iter(), contains() and len().\n\n```\n>>> from\
    \ collections.abc import Iterable, Collection, Sequence\n>>> isinstance([1, 2,\
    \ 3], Iterable)\nTrue\n```\n\n| | Iterable | Collection | Sequence |\n|---|---|---|---|\n\
    | list, range, str | ✓ | ✓ | ✓ |\n| dict, set | ✓ | ✓ | |\n| iter | ✓ | | |\n\n\
    ```\n>>> from numbers import Number, Complex, Real, Rational, Integral\n>>> isinstance(123,\
    \ Number)\nTrue\n```\n\n| | Number | Complex | Real | Rational | Integral |\n\
    |---|---|---|---|---|---|\n| int | ✓ | ✓ | ✓ | ✓ | ✓ |\n| fractions.Fraction |\
    \ ✓ | ✓ | ✓ | ✓ | |\n| float | ✓ | ✓ | ✓ | | |\n| complex | ✓ | ✓ | | | |\n| decimal.Decimal\
    \ | ✓ | | | | |"
  mdcn: "# 综合 Python 速查表\n\n## 目录\n\n```\nToC = {\n    '1. 集合类型': [列表, 字典, 集合, 元组,\
    \ 范围, 枚举, 迭代器, 生成器],\n    '2. 类型':     [类型, 字符串, 正则表达式, 格式化, 数字, 组合数学, 日期时间],\n\
    \    '3. 语法':     [参数, 内联, 导入, 装饰器, 类, 鸭子类型, 枚举, 异常],\n    '4. 系统':     [退出, 打印,\
    \ 输入, 命令行参数, 打开, 路径, 操作系统命令],\n    '5. 数据':     [JSON, Pickle, CSV, SQLite, 字节,\
    \ 结构体, 数组, 内存视图, 双端队列],\n    '6. 高级':     [线程, 运算符, 自省, 元编程, 求值, 协程],\n    '7.\
    \ 库':       [进度条, 绘图, 表格, 终端控制, 日志, 网页抓取, Web, 性能分析],\n    '8. 多媒体':   [NumPy,\
    \ 图像, 动画, 音频, Pygame, Pandas, Plotly, PySimpleGUI]\n}\n```\n\n## 主程序\n\n```\n\
    if __name__ == '__main__':    # 如果文件未被导入，则运行 main()。\n    main()\n```\n\n## 列表\n\
    \n```\n<列表> = <列表>[<切片>]              # 或：<列表>[起始索引（包含） : 结束索引（不包含） : ±步长]\n\n\
    <列表>.append(<元素>)                # 或：<列表> += [<元素>]\n<列表>.extend(<集合>)       \
    \         # 或：<列表> += <集合>\n\n<列表>.sort()                        # 按升序排序。\n<列表>.reverse()\
    \                     # 原地反转列表。\n<列表> = sorted(<集合>)              # 返回一个新的已排序列表。\n\
    <迭代器> = reversed(<列表>)          # 返回反转迭代器。\n\n元素总和      = sum(<集合>)\n逐元素求和   \
    \ = [sum(pair) for pair in zip(list_a, list_b)]\n按第二项排序  = sorted(<集合>, key=lambda\
    \ el: el[1])\n按两项排序    = sorted(<集合>, key=lambda el: (el[1], el[0]))\n扁平化列表  \
    \  = list(itertools.chain.from_iterable(<列表>))\n元素乘积      = functools.reduce(lambda\
    \ out, el: out * el, <集合>)\n字符列表      = list(<字符串>)\n```\n\n- 关于 `sorted()`、`min()`\
    \ 和 `max()` 的详细信息，请参见 **可排序**。\n- **运算符** 模块提供了 `itemgetter()` 和 `mul()` 函数，其功能与上述\
    \ **lambda** 表达式相同。\n\n```\n<列表>.insert(<整数>, <元素>)    # 在指定索引处插入元素，并将后续元素向右移动。\n\
    <元素>  = <列表>.pop([<整数>])  # 移除并返回指定索引处的元素，或从末尾移除。\n<整数> = <列表>.count(<元素>)   #\
    \ 返回出现次数。也适用于字符串。\n<整数> = <列表>.index(<元素>)   # 返回第一次出现的索引，否则引发 ValueError。\n<列表>.remove(<元素>)\
    \           # 移除第一次出现的元素，否则引发 ValueError。\n<列表>.clear()                  # 移除所有元素。也适用于字典和集合。\n\
    ```\n\n## 字典\n\n```\n<视图> = <字典>.keys()                    # 反映更改的键集合。\n<视图> =\
    \ <字典>.values()                  # 反映更改的值集合。\n<视图> = <字典>.items()            \
    \       # 反映更改的键值对元组集合。\n\n值  = <字典>.get(键, 默认值=None)         # 如果键缺失，返回默认值。\n\
    值  = <字典>.setdefault(键, 默认值=None)  # 如果键缺失，返回并写入默认值。\n<字典> = collections.defaultdict(<类型>)\
    \  # 返回一个默认值为 `<类型>()` 的字典。\n<字典> = collections.defaultdict(lambda: 1) # 返回一个默认值为\
    \ 1 的字典。\n\n<字典> = dict(<集合>)                     # 从键值对集合创建字典。\n<字典> = dict(zip(键列表,\
    \ 值列表))        # 从两个集合创建字典。\n<字典> = dict.fromkeys(键列表 [, 值])     # 从键集合创建字典。\n\
    \n<字典>.update(<字典>)                     # 添加项。替换具有匹配键的项。\n值 = <字典>.pop(键)    \
    \                   # 移除项，如果键缺失则引发 KeyError。\n{k for k, v in <字典>.items() if v\
    \ == 值} # 返回指向该值的键的集合。\n{k: v for k, v in <字典>.items() if k in 键列表} # 返回按键过滤的字典。\n\
    ```\n\n### 计数器\n\n```\n>>> from collections import Counter\n>>> colors = ['blue',\
    \ 'blue', 'blue', 'red', 'red']\n>>> counter = Counter(colors)\n>>> counter['yellow']\
    \ += 1\nCounter({'blue': 3, 'red': 2, 'yellow': 1})\n>>> counter.most_common()[0]\n\
    ('blue', 3)\n```\n\n## 集合\n\n```\n<集合> = set()                             # `{}`\
    \ 返回一个字典。\n\n<集合>.add(<元素>)                         # 或：<集合> |= {<元素>}\n<集合>.update(<集合>\
    \ [, ...])              # 或：<集合> |= <集合>\n\n<集合>  = <集合>.union(<集合>)         \
    \    # 或：<集合> | <集合>\n<集合>  = <集合>.intersection(<集合>)      # 或：<集合> & <集合>\n<集合>\
    \  = <集合>.difference(<集合>)        # 或：<集合> - <集合>\n<集合>  = <集合>.symmetric_difference(<集合>)\
    \ # 或：<集合> ^ <集合>\n<布尔值> = <集合>.issubset(<集合>)         # 或：<集合> <= <集合>\n<布尔值>\
    \ = <集合>.issuperset(<集合>)       # 或：<集合> >= <集合>\n\n<元素> = <集合>.pop()        \
    \              # 如果为空，引发 KeyError。\n<集合>.remove(<元素>)                      # 如果缺失，引发\
    \ KeyError。\n<集合>.discard(<元素>)                     # 不会引发错误。\n```\n\n### 冻结集合\n\
    \n- 不可变且可哈希。\n- 这意味着它可以用作字典的键或集合的元素。\n\n```\n<冻结集合> = frozenset(<集合>)\n```\n\n\
    ## 元组\n\n元组是不可变且可哈希的列表。\n\n```\n<元组> = ()\n<元组> = (<元素>,)\n<元组> = (<元素1>, <元素2>\
    \ [, ...])\n```\n\n### 命名元组\n\n具有命名元素的元组子类。\n\n```\n>>> from collections import\
    \ namedtuple\n>>> Point = namedtuple('Point', 'x y')\n>>> p = Point(1, y=2)\n\
    Point(x=1, y=2)\n>>> p[0]\n1\n>>> p.x\n1\n>>> getattr(p, 'y')\n2\n```\n\n## 范围\n\
    \n不可变且可哈希的整数序列。\n\n```\n<范围> = range(结束)\n<范围> = range(开始, 结束)\n<范围> = range(开始,\
    \ 结束, ±步长)\n```\n\n```\n>>> [i for i in range(3)]\n[0, 1, 2]\n```\n\n## 枚举\n\n\
    ```\nfor i, el in enumerate(<集合> [, 起始索引]):\n    ...\n```\n\n## 迭代器\n\n```\n<迭代器>\
    \ = iter(<集合>)\n<迭代器> = iter(<函数>, 结束值)\n<元素>   = next(<迭代器> [, 默认值])\n<列表>  \
    \ = list(<迭代器>)\n```\n\n### 迭代工具\n\n```\nimport itertools as it\n```\n\n```\n\
    <迭代器> = it.count(start=0, step=1)\n<迭代器> = it.repeat(<元素> [, 次数])\n<迭代器> = it.cycle(<集合>)\n\
    ```\n\n```\n<迭代器> = it.chain(<集合>, <集合> [, ...])\n<迭代器> = it.chain.from_iterable(<集合>)\n\
    ```\n\n```\n<迭代器> = it.islice(<集合>, 结束值)\n<迭代器> = it.islice(<集合>, 起始值（包含）, ...)\n\
    ```\n\n## 生成器\n\n- 任何包含 `yield` 语句的函数都返回一个生成器。\n- 生成器和迭代器可以互换使用。\n\n```\ndef count(start,\
    \ step):\n    while True:\n        yield start\n        start += step\n```\n\n\
    ```\n>>> counter = count(10, 2)\n>>> next(counter), next(counter), next(counter)\n\
    (10, 12, 14)\n```\n\n## 类型\n\n- 万物皆对象。\n- 每个对象都有一个类型。\n- 类型和类是同义词。\n\n```\n<类型>\
    \ = type(<元素>)                # 或：<元素>.__class__\n<布尔值> = isinstance(<元素>, <类型>)\
    \  # 或：issubclass(type(<元素>), <类型>)\n```\n\n```\n>>> type('a'), 'a'.__class__,\
    \ str\n(<class 'str'>, <class 'str'>, <class 'str'>)\n```\n\n一些类型没有内置名称，因此必须导入：\n\
    \n```\nfrom types import FunctionType, MethodType, LambdaType, GeneratorType,\
    \ ModuleType\n```\n\n### 抽象基类\n\n每个抽象基类都指定了一组虚拟子类。然后，这些类被 `isinstance()` 和 `issubclass()`\
    \ 识别为 ABC 的子类，尽管它们实际上并不是。ABC 也可以手动决定一个特定类是否是其虚拟子类，通常基于该类实现了哪些方法。例如，Iterable ABC\
    \ 查找 `iter()` 方法，而 Collection ABC 查找 `iter()`、`contains()` 和 `len()` 方法。\n\n```\n\
    >>> from collections.abc import Iterable, Collection, Sequence\n>>> isinstance([1,\
    \ 2, 3], Iterable)\nTrue\n```\n\n| | Iterable | Collection | Sequence |\n|---|---|---|---|\n\
    | list, range, str | ✓ | ✓ | ✓ |\n| dict, set | ✓ | ✓ | |\n| iter | ✓ | | |\n\n\
    ```\n>>> from numbers import Number, Complex, Real, Rational, Integral\n>>> isinstance(123,\
    \ Number)\nTrue\n```\n\n| | Number | Complex | Real | Rational | Integral |\n\
    |---|---|---|---|---|---|\n| int | ✓ | ✓ | ✓ | ✓ | ✓ |\n| fractions.Fraction |\
    \ ✓ | ✓ | ✓ | ✓ | |\n| float | ✓ | ✓ | ✓ | | |\n| complex | ✓ | ✓ | | | |\n| decimal.Decimal\
    \ | ✓ | | | | |"
