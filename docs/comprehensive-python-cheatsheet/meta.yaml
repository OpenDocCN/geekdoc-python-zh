  md: "# # Logging\n\n```\nimport logging\n```\n\n```\nlogging.basicConfig(filename=<path>,\
    \ level='DEBUG')  # Configures the root logger (see Setup).\nlogging.debug/info/warning/error/critical(<str>)\
    \    # Logs to the root logger.\n<Logger> = logging.getLogger(__name__)      \
    \        # Logger named after the module.\n<Logger>.<level>(<str>)           \
    \                  # Logs to the logger.\n<Logger>.exception(<str>)          \
    \                 # Calls error() with caught exception.\n```\n\n# Setup\n\n```\n\
    logging.basicConfig(\n    filename=None,                                  # Logs\
    \ to console (stderr) by default.\n    format='%(levelname)s:%(name)s:%(message)s',\
    \    # Add '%(asctime)s' for local datetime.\n    level=logging.WARNING,     \
    \                     # Drops messages with lower priority.\n    handlers=[logging.StreamHandler(sys.stderr)]\
    \    # Uses FileHandler if filename is set.\n)\n```\n\n```\n<Formatter> = logging.Formatter('<format>')\
    \         # Creates a Formatter.\n<Handler> = logging.FileHandler(<path>, mode='a')\
    \   # Creates a Handler. Also `encoding=None`.\n<Handler>.setFormatter(<Formatter>)\
    \                 # Adds Formatter to the Handler.\n<Handler>.setLevel(<int/str>)\
    \                       # Processes all messages by default.\n<Logger>.addHandler(<Handler>)\
    \                      # Adds Handler to the Logger.\n<Logger>.setLevel(<int/str>)\
    \                        # What is sent to its/ancestor's handlers.\n```\n\n+\
    \   - Parent logger can be specified by naming the child logger '<parent>.<name>'.\n\
    - If logger doesn't have a set level it inherits it from the first ancestor that\
    \ does.\n- Formatter also accepts: pathname, filename, funcName, lineno, thread\
    \ and process.\n- A 'handlers.RotatingFileHandler' creates and deletes log files\
    \ based on 'maxBytes' and 'backupCount' arguments.\n\nCreates a logger that writes\
    \ all messages to file and sends them to the root's handler that prints warnings\
    \ or higher:\n\n```\n>>> logger = logging.getLogger('my_module')\n>>> handler\
    \ = logging.FileHandler('test.log', encoding='utf-8')\n>>> formatter = logging.Formatter('%(asctime)s\
    \ %(levelname)s:%(name)s:%(message)s')\n>>> handler.setFormatter(formatter)\n\
    >>> logger.addHandler(handler)\n>>> logging.basicConfig(level='DEBUG')\n>>> logging.root.handlers[0].setLevel('WARNING')\n\
    >>> logger.critical('Running out of disk space.')\nCRITICAL:my_module:Running\
