    \ 和 Semaphore 类。\n\n运行一个终端游戏，你控制一个星号，必须避开数字：\n\n```python\nimport asyncio, collections,\
    \ curses, curses.textpad, enum, random\n\nP = collections.namedtuple('P', 'x y')\
    \           # Position\nD = enum.Enum('D', 'n e s w')                   # Direction\n\
    W, H = 15, 7                                    # Width, Height\n\ndef main(screen):\n\
    \    curses.curs_set(0)                           # Makes cursor invisible.\n\
    \    screen.nodelay(True)                         # Makes getch() non-blocking.\n\
    \    asyncio.run(main_coroutine(screen))          # Starts running asyncio code.\n\
    \nasync def main_coroutine(screen):\n    moves = asyncio.Queue()\n    state =\
    \ {'*': P(0, 0), **{id_: P(W//2, H//2) for id_ in range(10)}}\n    ai   = [random_controller(id_,\
    \ moves) for id_ in range(10)]\n    mvc  = [human_controller(screen, moves), model(moves,\
    \ state), view(state, screen)]\n    tasks = [asyncio.create_task(cor) for cor\
    \ in ai + mvc]\n    await asyncio.wait(tasks, return_when=asyncio.FIRST_COMPLETED)\n\
    \nasync def random_controller(id_, moves):\n    while True:\n        d = random.choice(list(D))\n\
    \        moves.put_nowait((id_, d))\n        await asyncio.sleep(random.triangular(0.01,\
    \ 0.65))\n\nasync def human_controller(screen, moves):\n    while True:\n    \
    \    key_mappings = {258: D.s, 259: D.n, 260: D.w, 261: D.e}\n        if d :=\
    \ key_mappings.get(screen.getch()):\n            moves.put_nowait(('*', d))\n\
    \        await asyncio.sleep(0.005)\n\nasync def model(moves, state):\n    while\
    \ state['*'] not in (state[id_] for id_ in range(10)):\n        id_, d = await\
    \ moves.get()\n        x, y   = state[id_]\n        deltas = {D.n: P(0, -1), D.e:\
    \ P(1, 0), D.s: P(0, 1), D.w: P(-1, 0)}\n        state[id_] = P((x + deltas[d].x)\
    \ % W, (y + deltas[d].y) % H)\n\nasync def view(state, screen):\n    offset =\
    \ P(curses.COLS//2 - W//2, curses.LINES//2 - H//2)\n    while True:\n        screen.erase()\n\
    \        curses.textpad.rectangle(screen, offset.y-1, offset.x-1, offset.y+H,\
    \ offset.x+W)\n        for id_, p in state.items():\n            screen.addstr(offset.y\
    \ + (p.y - state['*'].y + H//2) % H,\n                          offset.x + (p.x\
    \ - state['*'].x + W//2) % W, str(id_))\n        screen.refresh()\n        await\
    \ asyncio.sleep(0.005)\n\nif __name__ == '__main__':\n    curses.wrapper(main)\n\
    ```\n\n## 库\n\n### 进度条\n\n```python\n# $ pip3 install tqdm\n>>> import tqdm, time\n\
    >>> for el in tqdm.tqdm([1, 2, 3], desc='Processing'):\n...     time.sleep(1)\n\
    Processing: 100%|████████████████████████████| 3/3 [00:03<00:00,  1.00s/it]\n\
    ```\n\n### 绘图\n\n```python\n# $ pip3 install matplotlib\nimport matplotlib.pyplot\
    \ as plt\nplt.plot/bar/scatter(x_data, y_data [, label=<str>])  # Or: plt.plot(y_data)\n\
    plt.legend()                                          # Adds a legend.\nplt.savefig(<path>)\
    \                                   # Saves the figure.\nplt.show()          \
    \                                  # Displays the figure.\nplt.clf()         \
    \                                    # Clears the figure.\n```\n\n### 表格\n\n将\
    \ CSV 文件打印为 ASCII 表格：\n\n```python\n# $ pip3 install tabulate\nimport csv, tabulate\n\
    with open('test.csv', encoding='utf-8', newline='') as file:\n    rows   = csv.reader(file)\n\
    \    header = next(rows)\n    table  = tabulate.tabulate(rows, header)\nprint(table)\n\
    ```\n\n### Curses\n\n在控制台中运行一个基本的文件浏览器：\n\n```python\n# pip3 install windows-curses\n\
    import curses, os\nfrom curses import A_REVERSE, KEY_DOWN, KEY_UP, KEY_LEFT, KEY_RIGHT,\
    \ KEY_ENTER\n\ndef main(screen):\n    ch, first, selected, paths = 0, 0, 0, os.listdir()\n\
    \    while ch != ord('q'):\n        height, width = screen.getmaxyx()\n      \
    \  screen.erase()\n        for y, filename in enumerate(paths[first : first+height]):\n\
    \            color = A_REVERSE if filename == paths[selected] else 0\n       \
    \     screen.addnstr(y, 0, filename, width-1, color)\n        ch = screen.getch()\n\
    \        selected += (ch == KEY_DOWN) - (ch == KEY_UP)\n        selected = max(0,\
    \ min(len(paths)-1, selected))\n        first += (selected >= first + height)\
    \ - (selected < first)\n        if ch in [KEY_LEFT, KEY_RIGHT, KEY_ENTER, ord('\\\
    n'), ord('\\r')]:\n            new_dir = '..' if ch == KEY_LEFT else paths[selected]\n\
    \            if os.path.isdir(new_dir):\n                os.chdir(new_dir)\n \
    \               first, selected, paths = 0, 0, os.listdir()\n\nif __name__ ==\
    \ '__main__':\n    curses.wrapper(main)\n```\n\n### 日志\n\n```python\nimport logging\n\
    ```\n\n```python\nlogging.basicConfig(filename=<path>, level='DEBUG')  # Configures\
    \ the root logger (see Setup).\nlogging.debug/info/warning/error/critical(<str>)\
    \    # Logs to the root logger.\n<Logger> = logging.getLogger(__name__)      \
    \        # Logger named after the module.\n<Logger>.<level>(<str>)           \
    \                  # Logs to the logger.\n<Logger>.exception(<str>)          \
    \                 # Calls error() with caught exception.\n```\n\n### 设置\n\n```python\n\
    logging.basicConfig(\n    filename=None,                                  # Logs\
    \ to console (stderr) by default.\n    format='%(levelname)s:%(name)s:%(message)s',\
    \    # Add '%(asctime)s' for local datetime.\n    level=logging.WARNING,     \
    \                     # Drops messages with lower priority.\n    handlers=[logging.StreamHandler(sys.stderr)]\
    \    # Uses FileHandler if filename is set.\n)\n```\n\n```python\n<Formatter>\
    \ = logging.Formatter('<format>')         # Creates a Formatter.\n<Handler> =\
    \ logging.FileHandler(<path>, mode='a')   # Creates a Handler. Also `encoding=None`.\n\
    <Handler>.setFormatter(<Formatter>)                 # Adds Formatter to the Handler.\n\
    <Handler>.setLevel(<int/str>)                       # Processes all messages by\
    \ default.\n<Logger>.addHandler(<Handler>)                      # Adds Handler\
    \ to the Logger.\n<Logger>.setLevel(<int/str>)                        # What is\
