    # Attributes


    ```

    <list> = dir(<object>)                  # Names of object''s attributes (including
    methods).

    <dict> = vars(<object>)                 # Dict of writable attributes. Also <obj>.__dict__.

    <bool> = hasattr(<object>, ''<attr_name>'') # Checks if getattr() raises an AttributeError.

