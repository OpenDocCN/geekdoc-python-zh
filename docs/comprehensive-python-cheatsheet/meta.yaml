  md: "# # Iterable Duck Types\n\n# Iterable\n\n+   - Only required method is iter().\
    \ It should return an iterator of object's items.\n- Contains() automatically\
    \ works on any object that has iter() defined.\n\n```\nclass MyIterable:\n   \
    \ def __init__(self, a):\n        self.a = a\n    def __iter__(self):\n      \
    \  return iter(self.a)\n    def __contains__(self, el):\n        return el in\
    \ self.a\n```\n\n```\n>>> obj = MyIterable([1, 2, 3])\n>>> [el for el in obj]\n\
    [1, 2, 3]\n>>> 1 in obj\nTrue\n```\n\n# Collection\n\n+   - Only required methods\
    \ are iter() and len(). Len() should return the number of items.\n- This cheatsheet\
    \ actually means '<iterable>' when it uses '<collection>'.\n- I chose not to use\
    \ the name 'iterable' because it sounds scarier and more vague than 'collection'.\
    \ The only drawback of this decision is that the reader could think a certain\
    \ function doesn't accept iterators when it does, since iterators are the only\
    \ built-in objects that are iterable but are not collections.\n\n```\nclass MyCollection:\n\
    \    def __init__(self, a):\n        self.a = a\n    def __iter__(self):\n   \
    \     return iter(self.a)\n    def __contains__(self, el):\n        return el\
    \ in self.a\n    def __len__(self):\n        return len(self.a)\n```\n\n# Sequence\n\
    \n+   - Only required methods are getitem() and len().\n- Getitem() should return\
    \ an item at the passed index or raise IndexError.\n- Iter() and contains() automatically\
    \ work on any object that has getitem() defined.\n- Reversed() automatically works\
