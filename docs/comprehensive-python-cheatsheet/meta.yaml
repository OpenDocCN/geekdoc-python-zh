    # # Memory View


    +   - A sequence object that points to the memory of another bytes-like object.

    - Each element can reference a single or multiple consecutive bytes, depending
    on format.

    - Order and number of elements can be changed with slicing.

    - Casting only works between char and other types and uses system''s sizes.

    - Byte order is always determined by the system.


    ```

    <mview> = memoryview(<bytes/bytearray/array>)  # Immutable if bytes, else mutable.

    <real>  = <mview>[<index>]                     # Returns an int or a float.

    <mview> = <mview>[<slice>]                     # Mview with rearranged elements.

    <mview> = <mview>.cast(''<typecode>'')           # Casts memoryview to the new
    format.

    <mview>.release()                              # Releases the object''s memory
    buffer.


    <bytes> = bytes(<mview>)                       # Returns a new bytes object.

    <bytes> = <bytes>.join(<coll_of_mviews>)       # Joins mviews using bytes object
    as sep.

    <array> = array(''<typecode>'', <mview>)         # Treats mview as a sequence
    of numbers.

