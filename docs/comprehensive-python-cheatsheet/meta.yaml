  md: "# DataFrame – Aggregate, Transform, Map:\n\n```\n<Sr> = <DF>.sum/max/mean/idxmax/all()\
    \          # Or: <DF>.apply/agg(lambda <Sr>: <el>)\n<DF> = <DF>.rank/diff/cumsum/ffill/interpl()\
    \  # Or: <DF>.apply/agg/transform(lambda <Sr>: <Sr>)\n<DF> = <DF>.fillna(<el>)\
    \                      # Or: <DF>.applymap(lambda <el>: <el>)\n```\n\n+   - All\
    \ operations operate on columns by default. Pass 'axis=1' to process the rows\
    \ instead.\n\n```\n>>> df = pd.DataFrame([[1, 2], [3, 4]], index=['a', 'b'], columns=['x',\
    \ 'y'])\n   x  y\na  1  2\nb  3  4\n```\n\n| | 'sum' | ['sum'] | {'x': 'sum'}\
    \ |\n|---|---|---|---|\n| df.apply(...)<br>df.agg(...) | x 4<br>y 6 | x y<br>sum\
    \ 4 6 | x 4 |\n\n| | 'rank' | ['rank'] | {'x': 'rank'} |\n|---|---|---|---|\n\
    | df.apply(...)<br>df.agg(...)<br>df.transform(...) | x y<br>a 1 1<br>b 2 2 |\
    \ x y<br>rank rank<br>a 1 1<br>b 2 2 | x<br>a 1<br>b 2 |\n\n+   - Use '<DF>[col_key_1,\
    \ col_key_2][row_key]' to get the fifth result's values.\n\n# DataFrame – Plot,\
    \ Encode, Decode:\n\n```\n<DF>.plot.line/area/bar/hist/scatter/box()    # Also:\
    \ `x=column_key, y=column_key/s`.\nplt.show()                                \
    \    # Displays the plot. Also plt.savefig(<path>).\n```\n\n```\n<DF> = pd.read_json/html('<str/path/url>')\
    \    # Run `$ pip3 install beautifulsoup4 lxml`.\n<DF> = pd.read_csv('<path/url>')\
    \              # Also `names=<list>, parse_dates=False`.\n<DF> = pd.read_pickle/excel('<path/url>')\
    \     # Use `sheet_name=None` to get all Excel sheets.\n<DF> = pd.read_sql('<table/query>',\
    \ <conn.>)  # SQLite3/SQLAlchemy connection (see #SQLite).\n```\n\n```\n<dict>\
    \ = <DF>.to_dict(['d/l/s/...'])          # Returns columns as dicts, lists or\
    \ series.\n<str>  = <DF>.to_json/html/csv([<path>])      # Also to_markdown/latex([<path>]).\n\
    <DF>.to_pickle/excel(<path>)                  # Run `$ pip3 install \"pandas[excel]\"\
    \ odfpy`.\n<DF>.to_sql('<table_name>', <connection>)     # Also `if_exists='fail/replace/append'`.\n\
    ```\n\n# GroupBy\n\nObject that groups together rows of a dataframe based on the\
    \ value of the passed column.\n\n```\n>>> df = pd.DataFrame([[1, 2, 3], [4, 5,\
    \ 6], [7, 8, 6]], list('abc'), list('xyz'))\n>>> df.groupby('z').get_group(6)\n\
    \   x  y  z\nb  4  5  6\nc  7  8  6\n```\n\n```\n<GB> = <DF>.groupby(column_key/s)\
    \             # Splits DF into groups based on passed column.\n<DF> = <GB>.apply(<func>)\
    \                     # Maps each group. Func can return DF, Sr or el.\n<GB> =\
    \ <GB>[column_key]                       # Single column GB. All operations return\
    \ a Sr.\n<Sr> = <GB>.size()                            # A Sr of group sizes.\
    \ Keys are group \"names\".\n```\n\n# GroupBy – Aggregate, Transform, Map:\n\n\
    ```\n<DF> = <GB>.sum/max/mean/idxmax/all()         # Or: <GB>.agg(lambda <Sr>:\
    \ <el>)\n<DF> = <GB>.rank/diff/cumsum/ffill()          # Or: <GB>.transform(lambda\
    \ <Sr>: <Sr>)\n<DF> = <GB>.fillna(<el>)                      # Or: <GB>.transform(lambda\
    \ <Sr>: <Sr>)\n```"
