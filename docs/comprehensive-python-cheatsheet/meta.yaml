  - "[PAGE 15]\n\n# # Duck Types\n\nA duck type is an implicit type that prescribes\
    \ a set of special methods. Any object that has those methods defined is considered\
    \ a member of that duck type.\n\n# Comparable\n\n+   - If eq() method is not overridden,\
    \ it returns 'id(self) == id(other)', which is the same as 'self is other'.\n\
    - That means all objects compare not equal by default.\n- Only the left side object\
    \ has eq() method called, unless it returns NotImplemented, in which case the\
    \ right object is consulted. False is returned if both return NotImplemented.\n\
    - Ne() automatically works on any object that has eq() defined.\n\n```\nclass\
    \ MyComparable:\n    def __init__(self, a):\n        self.a = a\n    def __eq__(self,\
    \ other):\n        if isinstance(other, type(self)):\n            return self.a\
    \ == other.a\n        return NotImplemented\n```\n\n# Hashable\n\n+   - Hashable\
    \ object needs both hash() and eq() methods and its hash value should never change.\n\
    - Hashable objects that compare equal must have the same hash value, meaning default\
    \ hash() that returns 'id(self)' will not do.\n- That is why Python automatically\
    \ makes classes unhashable if you only implement eq().\n\n```\nclass MyHashable:\n\
    \    def __init__(self, a):\n        self._a = a\n    @property\n    def a(self):\n\
    \        return self._a\n    def __eq__(self, other):\n        if isinstance(other,\
    \ type(self)):\n            return self.a == other.a\n        return NotImplemented\n\
    \    def __hash__(self):\n        return hash(self.a)\n```\n\n# Sortable\n\n+\
    \   - With 'total_ordering' decorator, you only need to provide eq() and one of\
    \ lt(), gt(), le() or ge() special methods and the rest will be automatically\
    \ generated.\n- Functions sorted() and min() only require lt() method, while max()\
    \ only requires gt(). However, it is best to define them all so that confusion\
    \ doesn't arise in other contexts.\n- When two lists, strings or dataclasses are\
    \ compared, their values get compared in order until a pair of unequal values\
    \ is found. The comparison of this two values is then returned. The shorter sequence\
    \ is considered smaller in case of all values being equal.\n- For proper alphabetical\
    \ order pass 'key=locale.strxfrm' to sorted() after running 'locale.setlocale(locale.LC_COLLATE,\
    \ \"en_US.UTF-8\")'.\n\n```\nfrom functools import total_ordering\n\n@total_ordering\n\
    class MySortable:\n    def __init__(self, a):\n        self.a = a\n    def __eq__(self,\
    \ other):\n        if isinstance(other, type(self)):\n            return self.a\
    \ == other.a\n        return NotImplemented\n    def __lt__(self, other):\n  \
    \      if isinstance(other, type(self)):\n            return self.a < other.a\n\
    \        return NotImplemented\n```"
- md: "## Iterator\n\n- Any object that has methods `next()` and `iter()` is an iterator.\n\
    - `next()` should return next item or raise `StopIteration` exception.\n- `iter()`\
    \ should return 'self'.\n\n```python\nclass Counter:\n    def __init__(self):\n\
    \        self.i = 0\n    def __next__(self):\n        self.i += 1\n        return\
    \ self.i\n    def __iter__(self):\n        return self\n```\n\n```python\n>>>\
    \ counter = Counter()\n>>> next(counter), next(counter), next(counter)\n(1, 2,\
    \ 3)\n```\n\nPython has many different iterator objects:\n\n- Sequence iterators\
    \ returned by the `iter()` function, such as `list_iterator` and `set_iterator`.\n\
    - Objects returned by the `itertools` module, such as `count`, `repeat` and `cycle`.\n\
    - Generators returned by the generator functions and generator expressions.\n\
    - File objects returned by the `open()` function, etc.\n\n## Callable\n\n- All\
    \ functions and classes have a `__call__()` method, hence are callable.\n- When\
    \ this cheatsheet uses '<function>' as an argument, it actually means '<callable>'.\n\
    \n```python\nclass Counter:\n    def __init__(self):\n        self.i = 0\n   \
    \ def __call__(self):\n        self.i += 1\n        return self.i\n```\n\n```python\n\
    >>> counter = Counter()\n>>> counter(), counter(), counter()\n(1, 2, 3)\n```\n\
    \n## Context Manager\n\n- `with` statements only work with objects that have `__enter__()`\
    \ and `__exit__()` special methods.\n- `__enter__()` should lock the resources\
    \ and optionally return an object.\n- `__exit__()` should release the resources.\n\
    - Any exception that happens inside the `with` block is passed to the `__exit__()`\
    \ method.\n- The `__exit__()` method can suppress the exception by returning a\
    \ true value.\n\n```python\nclass MyOpen:\n    def __init__(self, filename):\n\
    \        self.filename = filename\n    def __enter__(self):\n        self.file\
    \ = open(self.filename)\n        return self.file\n    def __exit__(self, exc_type,\
    \ exception, traceback):\n        self.file.close()\n```\n\n```python\n>>> with\
    \ open('test.txt', 'w') as file:\n...     file.write('Hello World!')\n>>> with\
    \ MyOpen('test.txt') as file:\n...     print(file.read())\nHello World!\n```\n\
    \n## Iterable Duck Types\n\n### Iterable\n\n- Only required method is `__iter__()`.\
    \ It should return an iterator of object's items.\n- `__contains__()` automatically\
    \ works on any object that has `__iter__()` defined.\n\n```python\nclass MyIterable:\n\
    \    def __init__(self, a):\n        self.a = a\n    def __iter__(self):\n   \
    \     return iter(self.a)\n    def __contains__(self, el):\n        return el\
    \ in self.a\n```\n\n```python\n>>> obj = MyIterable([1, 2, 3])\n>>> [el for el\
    \ in obj]\n[1, 2, 3]\n>>> 1 in obj\nTrue\n```\n\n### Collection\n\n- Only required\
    \ methods are `__iter__()` and `__len__()`. `__len__()` should return the number\
    \ of items.\n- This cheatsheet actually means '<iterable>' when it uses '<collection>'.\n\
    - I chose not to use the name 'iterable' because it sounds scarier and more vague\
    \ than 'collection'. The only drawback of this decision is that the reader could\
    \ think a certain function doesn't accept iterators when it does, since iterators\
    \ are the only built-in objects that are iterable but are not collections.\n\n\
    ```python\nclass MyCollection:\n    def __init__(self, a):\n        self.a = a\n\
    \    def __iter__(self):\n        return iter(self.a)\n    def __contains__(self,\
    \ el):\n        return el in self.a\n    def __len__(self):\n        return len(self.a)\n\
    ```\n\n### Sequence\n\n- Only required methods are `__getitem__()` and `__len__()`.\n\
    - `__getitem__()` should return an item at the passed index or raise `IndexError`.\n\
    - `__iter__()` and `__contains__()` automatically work on any object that has\
