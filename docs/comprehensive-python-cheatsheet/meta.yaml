    <bool> = <str>.startswith(<sub_str>)     # Pass tuple of strings for multiple
    options.

    <bool> = <str>.endswith(<sub_str>)       # Pass tuple of strings for multiple
    options.

    <int>  = <str>.find(<sub_str>)           # Returns start index of the first match
    or -1.

    <int>  = <str>.index(<sub_str>)          # Same, but raises ValueError if missing.

    ```


    ```

    <str>  = <str>.lower()                   # Changes the case. Also upper/capitalize/title().

    <str>  = <str>.replace(old, new [, count]) # Replaces ''old'' with ''new'' at
    most ''count'' times.

    <str>  = <str>.translate(<table>)        # Use `str.maketrans(<dict>)` to generate
    table.

    ```


    ```

    <str>  = chr(<int>)                      # Converts int to Unicode character.

    <int>  = ord(<str>)                      # Converts Unicode character to int.

