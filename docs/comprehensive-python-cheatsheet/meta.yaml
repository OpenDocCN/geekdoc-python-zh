    \             # func(0, 0)\nfunc(<keyword_args>)                     # func(x=0,\
    \ y=0)\nfunc(<positional_args>, <keyword_args>)  # func(0, y=0)\n```\n\nInside\
    \ Function Definition\n\n```\ndef func(<nondefault_args>): ...               \
    \   # def func(x, y): ...\ndef func(<default_args>): ...                     #\
    \ def func(x=0, y=0): ...\ndef func(<nondefault_args>, <default_args>): ...  #\
    \ def func(x, y=0): ...\n```\n\n+   - Default values are evaluated when function\
    \ is first encountered in the scope.\n- Any mutation of a mutable default value\
    \ will persist between invocations!\n\n# # Splat Operator\n\nInside Function Call\n\
    \nSplat expands a collection into positional arguments, while splatty-splat expands\
    \ a dictionary into keyword arguments.\n\n```\nargs   = (1, 2)\nkwargs = {'x':\
    \ 3, 'y': 4, 'z': 5}\nfunc(*args, **kwargs)\n```\n\nIs the same as:\n\n```\nfunc(1,\
    \ 2, x=3, y=4, z=5)\n```\n\nInside Function Definition\n\nSplat combines zero\
    \ or more positional arguments into a tuple, while splatty-splat combines zero\
    \ or more keyword arguments into a dictionary.\n\n```\ndef add(*a):\n    return\
    \ sum(a)\n```\n\n```\n>>> add(1, 2, 3)\n6\n```\n\nLegal argument combinations:\n\
    \n```\ndef f(*args): ...                  # f(1, 2, 3)\ndef f(x, *args): ... \
    \              # f(1, 2, 3)\ndef f(*args, z): ...               # f(1, 2, z=3)\n\
    \ndef f(**kwargs): ...                # f(x=1, y=2, z=3)\ndef f(x, **kwargs):\
    \ ...             # f(x=1, y=2, z=3) | f(1, y=2, z=3)\n\ndef f(*args, **kwargs):\
    \ ...         # f(x=1, y=2, z=3) | f(1, y=2, z=3) | f(1, 2, z=3) | f(1, 2, 3)\n\
    def f(x, *args, **kwargs): ...      # f(x=1, y=2, z=3) | f(1, y=2, z=3) | f(1,\
    \ 2, z=3) | f(1, 2, 3)\ndef f(*args, y, **kwargs): ...      # f(x=1, y=2, z=3)\
    \ | f(1, y=2, z=3)\n\ndef f(*, x, y, z): ...              # f(x=1, y=2, z=3)\n\
    def f(x, *, y, z): ...              # f(x=1, y=2, z=3) | f(1, y=2, z=3)\ndef f(x,\
    \ y, *, z): ...              # f(x=1, y=2, z=3) | f(1, y=2, z=3) | f(1, 2, z=3)\n\
    ```"
