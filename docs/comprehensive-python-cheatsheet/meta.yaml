  md: '# # Operator


    Module of functions that provide the functionality of operators. Functions are
    ordered by operator precedence, starting with least binding.


    ```

    import operator as op

    <bool> = op.not_(<obj>)                                    # or, and, not (or/and
    missing)

    <bool> = op.eq/ne/lt/le/gt/ge/contains/is_(<obj>, <obj>)   # ==, !=, <, <=, >,
    >=, in, is

    <obj>  = op.or_/xor/and_(<int/set>, <int/set>)             # |, ^, &

    <int>  = op.lshift/rshift(<int>, <int>)                    # <<, >>

    <obj>  = op.add/sub/mul/truediv/floordiv/mod(<obj>, <obj>) # +, -, *, /, //, %

    <num>  = op.neg/invert(<num>)                              # -, ~

    <num>  = op.pow(<num>, <num>)                               # **

    <func> = op.itemgetter/attrgetter/methodcaller(<obj> [, ...])  # [index/key],
    .name, .name()

    ```


    ```

    elementwise_sum  = map(op.add, list_a, list_b)

    sorted_by_second = sorted(<collection>, key=op.itemgetter(1))

    sorted_by_both   = sorted(<collection>, key=op.itemgetter(1, 0))

    product_of_elems = functools.reduce(op.mul, <collection>)

    first_element    = op.methodcaller(''pop'', 0)(<list>)

    ```


