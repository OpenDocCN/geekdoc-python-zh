- md: "## Web\n\nFlask is a micro web framework/server. If you just want to open a\
    \ html file in a web browser use `webbrowser.open(<path>)` instead.\n\n```python\n\
    # $ pip3 install flask\nimport flask\n\napp = flask.Flask(__name__)\napp.run(host=None,\
    \ port=None, debug=None)\n```\n\n- Starts the app at `http://localhost:5000`.\
    \ Use `host=\"0.0.0.0\"` to run externally.\n- Install a WSGI server like Waitress\
    \ and a HTTP server such as Nginx for better security.\n- Debug mode restarts\
    \ the app whenever script changes and displays errors in the browser.\n\n## Static\
    \ Request\n\n```python\n@app.route('/img/<path:filename>')\ndef serve_file(filename):\n\
    \    return flask.send_from_directory('dirname/', filename)\n```\n\n## Dynamic\
    \ Request\n\n```python\n@app.route('/<sport>')\ndef serve_html(sport):\n    return\
    \ flask.render_template_string('<h1>{{title}}</h1>', title=sport)\n```\n\n- Use\
    \ `render_template(filename, <kwargs>)` to render file located in templates dir.\n\
    - To return an error code use `abort(<int>)` and to redirect use `redirect(<url>)`.\n\
    - `request.args[<str>]` returns parameter from the query string (URL part after\
    \ '?').\n- Use `session[key] = value` to store session data like username, etc.\n\
    \n## REST Request\n\n```python\n@app.post('/<sport>/odds')\ndef serve_json(sport):\n\
    \    team = flask.request.form['team']\n    return {'team': team, 'odds': [2.09,\
    \ 3.74, 3.68]}\n```\n\nStarts the app in its own thread and queries its REST API:\n\
    \n```python\n# $ pip3 install requests\n>>> import threading, requests\n>>> threading.Thread(target=app.run,\
    \ daemon=True).start()\n>>> url = 'http://localhost:5000/football/odds'\n>>> request_data\
    \ = {'team': 'arsenal f.c.'}\n>>> response = requests.post(url, data=request_data)\n\
    >>> response.json()\n{'team': 'arsenal f.c.', 'odds': [2.09, 3.74, 3.68]}\n```\n\
    \n## Profiling\n\n```python\nfrom time import perf_counter\nstart_time = perf_counter()\n\
    ...\nduration_in_seconds = perf_counter() - start_time\n```\n\n## Timing a Snippet\n\
    \n```python\n>>> from timeit import timeit\n>>> timeit('list(range(10000))', number=1000,\
    \ globals=globals(), setup='pass')\n0.19373\n```\n\n## Profiling by Line\n\n```bash\n\
    $ pip3 install line_profiler\n$ echo '@profile\ndef main():\n    a = list(range(10000))\n\
    \    b = set(range(10000))\nmain()' > test.py\n$ kernprof -lv test.py\nLine #\
    \      Hits         Time  Per Hit  % Time  Line Contents\n==============================================================\n\
    \     1                                           @profile\n     2           \
    \                                def main():\n     3         1        253.4  \
    \  253.4     32.2      a = list(range(10000))\n     4         1        534.1 \
    \   534.1     67.8      b = set(range(10000))\n```\n\n## Call and Flame Graphs\n\
    \n```bash\n$ apt/brew install graphviz && pip3 install gprof2dot snakeviz\n$ tail\
    \ --lines=4 test.py > test.py\n$ python3 -m cProfile -o test.prof test.py\n$ gprof2dot\
    \ --format=pstats test.prof | dot -T png -o test.png\n$ xdg-open/open test.png\n\
    $ snakeviz test.prof\n```\n\n## Sampling and Memory Profilers\n\n| pip3 install\
    \ | Type | Target | How to run | Live |\n|---|---|---|---|---|\n| pyinstrument\
    \ | Sampling | CPU | pyinstrument test.py | x |\n| py-spy | Sampling | CPU | py-spy\
    \ top -- python3 test.py | ✓ |\n| scalene | Sampling | CPU+Memory | scalene test.py\
    \ | x |\n| memray | Tracing | Memory | memray run --live test.py | ✓ |\n\n## NumPy\n\
    \nArray manipulation mini-language. It can run up to one hundred times faster\
    \ than the equivalent Python code. An even faster alternative that runs on a GPU\
    \ is called CuPy.\n\n```python\n# $ pip3 install numpy\nimport numpy as np\n\n\
    <array> = np.array(<list/list_of_lists/...>)           # Returns a 1d/2d/.. NumPy\
    \ array.\n<array> = np.zeros/ones/empty(<shape>)                 # Also np.full(<shape>,\
    \ <el>).\n<array> = np.arange(from_inc, to_exc, ±step)           # Also np.linspace(start,\
    \ stop, len).\n<array> = np.random.randint(from_inc, to_exc, <shape>) # Also np.random.random(<shape>).\n\
    \n<view>  = <array>.reshape(<shape>)                     # Also `<array>.shape\
    \ = <shape>`.\n<array> = <array>.flatten()                            # Also `<view>\
    \ = <array>.ravel()`.\n<view>  = <array>.transpose()                         \
    \ # Or: <array>.T\n\n<array> = np.copy/abs/sqrt/log/int64(<array>)          #\
    \ Returns new array of the same shape.\n<array> = <array>.sum/max/mean/argmax/all(axis)\
    \        # Passed dimension gets aggregated.\n<array> = np.apply_along_axis(<func>,\
    \ axis, <array>)   # Func can return a scalar or array.\n\n<array> = np.concatenate(<list_of_arrays>,\
    \ axis=0)     # Links arrays along first axis (rows).\n<array> = np.row_stack/column_stack(<list_of_arrays>)\
    \  # Treats 1d arrays as rows or columns.\n<array> = np.tile/repeat(<array>, <int/list>\
    \ [, axis]) # Tiles array or repeats its elements.\n```\n\n- Shape is a tuple\
    \ of dimension sizes. A 100x50 RGB image has shape (50, 100, 3).\n- Axis is an\
    \ index of the dimension that gets aggregated. Leftmost dimension has index 0.\
    \ Summing the RGB image along axis 2 will return a greyscale image with shape\
    \ (50, 100).\n\n## Indexing\n\n```python\n<el>        = <2d_array>[row_index,\
    \ column_index]    # <3d_a>[table_i, row_i, column_i]\n<1d_view>   = <2d_array>[row_index]\
    \                # <3d_a>[table_i, row_i]\n<1d_view>   = <2d_array>[:, column_index]\
    \          # <3d_a>[table_i, :, column_i]\n<2d_view>   = <2d_array>[rows_slice,\
    \ columns_slice] # <3d_a>[table_i, rows_s, columns_s]\n\n<2d_array>  = <2d_array>[row_indexes]\
    \              # <3d_a>[table_i/is, row_is]\n<2d_array>  = <2d_array>[:, column_indexes]\
    \        # <3d_a>[table_i/is, :, column_is]\n<1d_array>  = <2d_array>[row_indexes,\
    \ column_indexes] # <3d_a>[table_i/is, row_is, column_is]\n<1d_array>  = <2d_array>[row_indexes,\
    \ column_index]   # <3d_a>[table_i/is, row_is, column_i]\n\n<2d_bools>  = <2d_array>\
    \ > <el/1d/2d_array>        # 1d_array must have size of a row.\n<1d/2d_a>   =\
    \ <2d_array>[<2d/1d_bools>]            # 1d_bools must have size of a column.\n\
    ```\n\n- Indexes should not be tuples because Python converts `obj[i, j]` to `obj[(i,\
    \ j)]`!\n- `:` returns a slice of all dimension's indexes. Omitted dimensions\
    \ default to `:`.\n- Any value that is broadcastable to the indexed shape can\
    \ be assigned to the selection.\n\n## Broadcasting\n\nSet of rules by which NumPy\
    \ functions operate on arrays of different sizes and/or dimensions.\n\n```python\n\
    left  = [[0.1], [0.6], [0.8]]          # Shape: (3, 1)\nright = [ 0.1 ,  0.6 ,\
    \  0.8 ]          # Shape: (3,)\n```\n\n1. If array shapes differ in length, left-pad\
    \ the shorter shape with ones:\n\n```python\nleft  = [[0.1], [0.6], [0.8]]   \
    \       # Shape: (3, 1)\nright = [[0.1 ,  0.6 ,  0.8]]          # Shape: (1, 3)\
    \ <- !\n```\n\n2. If any dimensions differ in size, expand the ones that have\
    \ size 1 by duplicating their elements:\n\n```python\nleft  = [[0.1,  0.1,  0.1],\
    \             # Shape: (3, 3) <- !\n          [0.6,  0.6,  0.6],\n          [0.8,\
    \  0.8,  0.8]]\n\nright = [[0.1,  0.6,  0.8],             # Shape: (3, 3) <- !\n\
    \          [0.1,  0.6,  0.8],\n          [0.1,  0.6,  0.8]]\n```\n\n## Example\n\
    \nFor each point returns index of its nearest point (`[0.1, 0.6, 0.8]` => `[1,\
    \ 2, 1]`):\n\n```python\n>>> points = np.array([0.1, 0.6, 0.8])\n[ 0.1,  0.6,\
    \  0.8]\n>>> wrapped_points = points.reshape(3, 1)\n[[ 0.1],\n [ 0.6],\n [ 0.8]]\n\
    >>> distances = wrapped_points - points\n[[ 0. , -0.5, -0.7],\n [ 0.5,  0. , -0.2],\n\
    \ [ 0.7,  0.2,  0. ]]\n>>> distances = np.abs(distances)\n[[ 0. ,  0.5,  0.7],\n\
    \ [ 0.5,  0. ,  0.2],\n [ 0.7,  0.2,  0. ]]\n>>> distances[range(3), range(3)]\
    \ = np.inf\n[[ inf,  0.5,  0.7],\n [ 0.5,  inf,  0.2],\n [ 0.7,  0.2,  inf]]\n\
    >>> distances.argmin(1)\n[1, 2, 1]\n```\n\n## Image\n\n```python\n# $ pip3 install\
    \ pillow\nfrom PIL import Image, ImageFilter, ImageEnhance\n```\n\n```python\n\
    <Image> = Image.new('<mode>', (width, height))    # Also `color=<int/tuple/str>`.\n\
    <Image> = Image.open(<path>)                    # Identifies format based on file\
    \ contents.\n<Image> = <Image>.convert('<mode>')              # Converts image\
    \ to the new mode.\n<Image>.save(<path>)                             # Selects\
    \ format based on the path extension.\n<Image>.show()                        \
    \           # Opens image in the default preview app.\n```\n\n```python\n<int/tuple>\
    \ = <Image>.getpixel((x, y))           # Returns pixel's color.\n<Image>.putpixel((x,\
    \ y), <int/tuple>)            # Changes pixel's color.\n<ImagingCore> = <Image>.getdata()\
    \                # Returns a flattened view of all pixels.\n<Image>.putdata(<list/ImagingCore>)\
    \              # Updates pixels with a copy of the sequence.\n<Image>.paste(<Image>,\
    \ (x, y))                   # Draws passed image at specified location.\n```\n\
    \n```python\n<Image> = <Image>.filter(<Filter>)               # `<Filter> = ImageFilter.<name>([<args>])`\n\
    <Image> = <Enhance>.enhance(<float>)             # `<Enhance> = ImageEnhance.<name>(<Image>)`\n\
    ```\n\n```python\n<array> = np.array(<Image>)                      # Creates a\
    \ NumPy array from the image.\n<Image> = Image.fromarray(np.uint8(<array>))  \
    \   # Use <array>.clip(0, 255) to clip values.\n```\n\n## Modes\n\n- 'L' - 8-bit\
    \ pixels, greyscale.\n- 'RGB' - 3x8-bit pixels, true color.\n- 'RGBA' - 4x8-bit\
    \ pixels, true color with transparency mask.\n- 'HSV' - 3x8-bit pixels, Hue, Saturation,\
    \ Value color space.\n\n## Examples\n\nCreates a PNG image of a rainbow gradient:\n\
    \n```python\nWIDTH, HEIGHT = 100, 100\nn_pixels = WIDTH * HEIGHT\nhues = (255\
    \ * i/n_pixels for i in range(n_pixels))\nimg = Image.new('HSV', (WIDTH, HEIGHT))\n\
    img.putdata([(int(h), 255, 255) for h in hues])\nimg.convert('RGB').save('test.png')\n\
    ```\n\nAdds noise to the PNG image and displays it:\n\n```python\nfrom random\
    \ import randint\nadd_noise = lambda value: max(0, min(255, value + randint(-20,\
    \ 20)))\nimg = Image.open('test.png').convert('HSV')\nimg.putdata([(add_noise(h),\
    \ s, v) for h, s, v in img.getdata()])\nimg.show()\n```\n\n## Image Draw\n\n```python\n\
    from PIL import ImageDraw, ImageFont\n<ImageDraw> = ImageDraw.Draw(<Image>)  \
    \          # Object for adding 2D graphics to the image.\n<ImageDraw>.point((x,\
    \ y))                        # Draws a point. Truncates floats into ints.\n<ImageDraw>.line((x1,\
    \ y1, x2, y2 [, ...]))       # To get anti-aliasing use Image's resize().\n<ImageDraw>.arc((x1,\
    \ y1, x2, y2), deg1, deg2)    # Always draws in clockwise direction.\n<ImageDraw>.rectangle((x1,\
    \ y1, x2, y2))          # To rotate use Image's rotate() and paste().\n<ImageDraw>.polygon((x1,\
    \ y1, x2, y2, ...))       # Last point gets connected to the first.\n<ImageDraw>.ellipse((x1,\
    \ y1, x2, y2))            # To rotate use Image's rotate() and paste().\n<ImageDraw>.text((x,\
    \ y), text, font=<Font>)      # `<Font> = ImageFont.truetype(<path>, size)`\n\
    ```\n\n- Use `fill=<color>` to set the primary color.\n- Use `width=<int>` to\
    \ set the width of lines or contours.\n- Use `outline=<color>` to set the color\
    \ of the contours.\n- Color can be an int, tuple, '#rrggbb[aa]' string or a color\
    \ name."
  mdcn: "## Web\n\nFlask 是一个微型 Web 框架/服务器。如果你只是想在网页浏览器中打开一个 HTML 文件，请改用 `webbrowser.open(<path>)`。\n\
    \n```python\n# $ pip3 install flask\nimport flask\n\napp = flask.Flask(__name__)\n\
    app.run(host=None, port=None, debug=None)\n```\n\n- 在 `http://localhost:5000`\
    \ 启动应用。使用 `host=\"0.0.0.0\"` 可在外部运行。\n- 安装 WSGI 服务器（如 Waitress）和 HTTP 服务器（如 Nginx）以提高安全性。\n\
    - 调试模式会在脚本更改时重启应用，并在浏览器中显示错误。\n\n## 静态请求\n\n```python\n@app.route('/img/<path:filename>')\n\
    def serve_file(filename):\n    return flask.send_from_directory('dirname/', filename)\n\
    ```\n\n## 动态请求\n\n```python\n@app.route('/<sport>')\ndef serve_html(sport):\n\
    \    return flask.render_template_string('<h1>{{title}}</h1>', title=sport)\n\
    ```\n\n- 使用 `render_template(filename, <kwargs>)` 渲染位于 templates 目录中的文件。\n- 要返回错误代码，请使用\
    \ `abort(<int>)`；要重定向，请使用 `redirect(<url>)`。\n- `request.args[<str>]` 返回查询字符串（URL\
    \ 中 '?' 之后的部分）中的参数。\n- 使用 `session[key] = value` 存储会话数据，如用户名等。\n\n## REST 请求\n\
    \n```python\n@app.post('/<sport>/odds')\ndef serve_json(sport):\n    team = flask.request.form['team']\n\
    \    return {'team': team, 'odds': [2.09, 3.74, 3.68]}\n```\n\n在自己的线程中启动应用并查询其\
    \ REST API：\n\n```python\n# $ pip3 install requests\n>>> import threading, requests\n\
    >>> threading.Thread(target=app.run, daemon=True).start()\n>>> url = 'http://localhost:5000/football/odds'\n\
    >>> request_data = {'team': 'arsenal f.c.'}\n>>> response = requests.post(url,\
    \ data=request_data)\n>>> response.json()\n{'team': 'arsenal f.c.', 'odds': [2.09,\
    \ 3.74, 3.68]}\n```\n\n## 性能分析\n\n```python\nfrom time import perf_counter\nstart_time\
    \ = perf_counter()\n...\nduration_in_seconds = perf_counter() - start_time\n```\n\
    \n## 代码片段计时\n\n```python\n>>> from timeit import timeit\n>>> timeit('list(range(10000))',\
    \ number=1000, globals=globals(), setup='pass')\n0.19373\n```\n\n## 逐行性能分析\n\n\
    ```bash\n$ pip3 install line_profiler\n$ echo '@profile\ndef main():\n    a =\
    \ list(range(10000))\n    b = set(range(10000))\nmain()' > test.py\n$ kernprof\
    \ -lv test.py\nLine #      Hits         Time  Per Hit  % Time  Line Contents\n\
    ==============================================================\n     1       \
    \                                    @profile\n     2                        \
    \                   def main():\n     3         1        253.4    253.4     32.2\
    \      a = list(range(10000))\n     4         1        534.1    534.1     67.8\
    \      b = set(range(10000))\n```\n\n## 调用图和火焰图\n\n```bash\n$ apt/brew install\
    \ graphviz && pip3 install gprof2dot snakeviz\n$ tail --lines=4 test.py > test.py\n\
    $ python3 -m cProfile -o test.prof test.py\n$ gprof2dot --format=pstats test.prof\
    \ | dot -T png -o test.png\n$ xdg-open/open test.png\n$ snakeviz test.prof\n```\n\
    \n## 采样和内存分析器\n\n| pip3 install | 类型 | 目标 | 如何运行 | 实时 |\n|---|---|---|---|---|\n\
    | pyinstrument | 采样 | CPU | pyinstrument test.py | x |\n| py-spy | 采样 | CPU |\
    \ py-spy top -- python3 test.py | ✓ |\n| scalene | 采样 | CPU+内存 | scalene test.py\
    \ | x |\n| memray | 追踪 | 内存 | memray run --live test.py | ✓ |\n\n## NumPy\n\n\
    数组操作微型语言。它比等效的 Python 代码快一百倍。一个更快的替代方案是在 GPU 上运行的 CuPy。\n\n```python\n# $ pip3\
    \ install numpy\nimport numpy as np\n\n<array> = np.array(<list/list_of_lists/...>)\
    \           # 返回一个 1d/2d/.. NumPy 数组。\n<array> = np.zeros/ones/empty(<shape>)\
    \                 # 也支持 np.full(<shape>, <el>)。\n<array> = np.arange(from_inc,\
    \ to_exc, ±step)           # 也支持 np.linspace(start, stop, len)。\n<array> = np.random.randint(from_inc,\
    \ to_exc, <shape>) # 也支持 np.random.random(<shape>)。\n\n<view>  = <array>.reshape(<shape>)\
    \                     # 也支持 `<array>.shape = <shape>`。\n<array> = <array>.flatten()\
    \                            # 也支持 `<view> = <array>.ravel()`。\n<view>  = <array>.transpose()\
    \                          # 或：<array>.T\n\n<array> = np.copy/abs/sqrt/log/int64(<array>)\
    \          # 返回相同形状的新数组。\n<array> = <array>.sum/max/mean/argmax/all(axis)    \
    \    # 传递的维度被聚合。\n<array> = np.apply_along_axis(<func>, axis, <array>)   # 函数可以返回标量或数组。\n\
    \n<array> = np.concatenate(<list_of_arrays>, axis=0)     # 沿第一个轴（行）链接数组。\n<array>\
    \ = np.row_stack/column_stack(<list_of_arrays>)  # 将 1d 数组视为行或列。\n<array> = np.tile/repeat(<array>,\
    \ <int/list> [, axis]) # 平铺数组或重复其元素。\n```\n\n- 形状是一个维度大小的元组。一个 100x50 的 RGB 图像的形状为\
    \ (50, 100, 3)。\n- 轴是被聚合的维度的索引。最左边的维度索引为 0。沿轴 2 对 RGB 图像求和将返回一个形状为 (50, 100) 的灰度图像。\n\
    \n## 索引\n\n```python\n<el>        = <2d_array>[row_index, column_index]    # <3d_a>[table_i,\
    \ row_i, column_i]\n<1d_view>   = <2d_array>[row_index]                # <3d_a>[table_i,\
    \ row_i]\n<1d_view>   = <2d_array>[:, column_index]          # <3d_a>[table_i,\
    \ :, column_i]\n<2d_view>   = <2d_array>[rows_slice, columns_slice] # <3d_a>[table_i,\
    \ rows_s, columns_s]\n\n<2d_array>  = <2d_array>[row_indexes]              # <3d_a>[table_i/is,\
    \ row_is]\n<2d_array>  = <2d_array>[:, column_indexes]        # <3d_a>[table_i/is,\
    \ :, column_is]\n<1d_array>  = <2d_array>[row_indexes, column_indexes] # <3d_a>[table_i/is,\
    \ row_is, column_is]\n<1d_array>  = <2d_array>[row_indexes, column_index]   #\
    \ <3d_a>[table_i/is, row_is, column_i]\n\n<2d_bools>  = <2d_array> > <el/1d/2d_array>\
    \        # 1d_array 必须具有行的大小。\n<1d/2d_a>   = <2d_array>[<2d/1d_bools>]       \
    \     # 1d_bools 必须具有列的大小。\n```\n\n- 索引不应是元组，因为 Python 会将 `obj[i, j]` 转换为 `obj[(i,\
    \ j)]`！\n- `:` 返回所有维度索引的切片。省略的维度默认为 `:`.\n- 任何可广播到索引形状的值都可以分配给选择。\n\n## 广播\n\n\
    NumPy 函数在不同大小和/或维度的数组上操作的一组规则。\n\n```python\nleft  = [[0.1], [0.6], [0.8]]   \
    \       # 形状：(3, 1)\nright = [ 0.1 ,  0.6 ,  0.8 ]          # 形状：(3,)\n```\n\n\
    1. 如果数组形状长度不同，则在较短形状的左侧填充 1：\n\n```python\nleft  = [[0.1], [0.6], [0.8]]     \
    \     # 形状：(3, 1)\nright = [[0.1 ,  0.6 ,  0.8]]          # 形状：(1, 3) <- !\n```\n\
    \n2. 如果任何维度大小不同，则通过复制其元素来扩展大小为 1 的维度：\n\n```python\nleft  = [[0.1,  0.1,  0.1],\
    \             # 形状：(3, 3) <- !\n          [0.6,  0.6,  0.6],\n          [0.8,\
    \  0.8,  0.8]]\n\nright = [[0.1,  0.6,  0.8],             # 形状：(3, 3) <- !\n \
    \         [0.1,  0.6,  0.8],\n          [0.1,  0.6,  0.8]]\n```\n\n## 示例\n\n对于每个点，返回其最近点的索引（`[0.1,\
    \ 0.6, 0.8]` => `[1, 2, 1]`）：\n\n```python\n>>> points = np.array([0.1, 0.6, 0.8])\n\
    [ 0.1,  0.6,  0.8]\n>>> wrapped_points = points.reshape(3, 1)\n[[ 0.1],\n [ 0.6],\n\
    \ [ 0.8]]\n>>> distances = wrapped_points - points\n[[ 0. , -0.5, -0.7],\n [ 0.5,\
    \  0. , -0.2],\n [ 0.7,  0.2,  0. ]]\n>>> distances = np.abs(distances)\n[[ 0.\
    \ ,  0.5,  0.7],\n [ 0.5,  0. ,  0.2],\n [ 0.7,  0.2,  0. ]]\n>>> distances[range(3),\
    \ range(3)] = np.inf\n[[ inf,  0.5,  0.7],\n [ 0.5,  inf,  0.2],\n [ 0.7,  0.2,\
    \  inf]]\n>>> distances.argmin(1)\n[1, 2, 1]\n```\n\n## 图像\n\n```python\n# $ pip3\
    \ install pillow\nfrom PIL import Image, ImageFilter, ImageEnhance\n```\n\n```python\n\
    <Image> = Image.new('<mode>', (width, height))    # 也支持 `color=<int/tuple/str>`。\n\
    <Image> = Image.open(<path>)                    # 根据文件内容识别格式。\n<Image> = <Image>.convert('<mode>')\
    \              # 将图像转换为新模式。\n<Image>.save(<path>)                            \
    \ # 根据路径扩展名选择格式。\n<Image>.show()                                   # 在默认预览应用中打开图像。\n\
    ```\n\n```python\n<int/tuple> = <Image>.getpixel((x, y))           # 返回像素的颜色。\n\
    <Image>.putpixel((x, y), <int/tuple>)            # 更改像素的颜色。\n<ImagingCore> = <Image>.getdata()\
    \                # 返回所有像素的扁平化视图。\n<Image>.putdata(<list/ImagingCore>)        \
    \      # 用序列的副本更新像素。\n<Image>.paste(<Image>, (x, y))                   # 在指定位置绘制传递的图像。\n\
    ```\n\n```python\n<Image> = <Image>.filter(<Filter>)               # `<Filter>\
    \ = ImageFilter.<name>([<args>])`\n<Image> = <Enhance>.enhance(<float>)      \
    \       # `<Enhance> = ImageEnhance.<name>(<Image>)`\n```\n\n```python\n<array>\
    \ = np.array(<Image>)                      # 从图像创建 NumPy 数组。\n<Image> = Image.fromarray(np.uint8(<array>))\
    \     # 使用 <array>.clip(0, 255) 裁剪值。\n```\n\n## 模式\n\n- 'L' - 8 位像素，灰度。\n- 'RGB'\
    \ - 3x8 位像素，真彩色。\n- 'RGBA' - 4x8 位像素，带透明度掩码的真彩色。\n- 'HSV' - 3x8 位像素，色相、饱和度、明度颜色空间。\n\
    \n## 示例\n\n创建一个彩虹渐变的 PNG 图像：\n\n```python\nWIDTH, HEIGHT = 100, 100\nn_pixels\
    \ = WIDTH * HEIGHT\nhues = (255 * i/n_pixels for i in range(n_pixels))\nimg =\
    \ Image.new('HSV', (WIDTH, HEIGHT))\nimg.putdata([(int(h), 255, 255) for h in\
    \ hues])\nimg.convert('RGB').save('test.png')\n```\n\n向 PNG 图像添加噪声并显示它：\n\n```python\n\
    from random import randint\nadd_noise = lambda value: max(0, min(255, value +\
    \ randint(-20, 20)))\nimg = Image.open('test.png').convert('HSV')\nimg.putdata([(add_noise(h),\
    \ s, v) for h, s, v in img.getdata()])\nimg.show()\n```\n\n## 图像绘制\n\n```python\n\
    from PIL import ImageDraw, ImageFont\n<ImageDraw> = ImageDraw.Draw(<Image>)  \
    \          # 用于向图像添加二维图形的对象。\n<ImageDraw>.point((x, y))                      \
    \  # 绘制一个点。将浮点数截断为整数。\n<ImageDraw>.line((x1, y1, x2, y2 [, ...]))       # 要获得抗锯齿效果，请使用\
    \ Image 的 resize()。\n<ImageDraw>.arc((x1, y1, x2, y2), deg1, deg2)    # 始终顺时针方向绘制。\n\
    <ImageDraw>.rectangle((x1, y1, x2, y2))          # 要旋转，请使用 Image 的 rotate() 和\
    \ paste()。\n<ImageDraw>.polygon((x1, y1, x2, y2, ...))       # 最后一个点连接到第一个点。\n\
    <ImageDraw>.ellipse((x1, y1, x2, y2))            # 要旋转，请使用 Image 的 rotate() 和\
    \ paste()。\n<ImageDraw>.text((x, y), text, font=<Font>)      # `<Font> = ImageFont.truetype(<path>,\
    \ size)`\n```\n\n- 使用 `fill=<color>` 设置主颜色。\n- 使用 `width=<int>` 设置线条或轮廓的宽度。\n\
    - 使用 `outline=<color>` 设置轮廓的颜色。\n- 颜色可以是整数、元组、'#rrggbb[aa]' 字符串或颜色名称。"
