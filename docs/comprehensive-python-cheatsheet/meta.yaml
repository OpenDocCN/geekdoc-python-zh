    - Use ''unicodedata.normalize("NFC", <str>)'' on strings that may contain characters
    like ''Ö'' before comparing them, because they can be stored as one or two characters.


    ## Property Methods


    ```

    <bool> = <str>.isdecimal()               # Checks for [0-9].

    <bool> = <str>.isdigit()                 # Checks for [²³¹] and isdecimal().

    <bool> = <str>.isnumeric()               # Checks for [½²³] and isdigit().

    <bool> = <str>.isalnum()                 # Checks for [a-zA-Z] and isnumeric().

    <bool> = <str>.isprintable()             # Checks for [ !#$%...] and isalnum().

    <bool> = <str>.isspace()                 # Checks for [ \t\n\r\f\v\x1c-\x1f\x85\xa0...].

    ```


    ## Regex


    Functions for regular expression matching.


    ```

    import re

    ```


    ```

    <str>   = re.sub(<regex>, new, text, count=0)  # Substitutes all occurrences with
    ''new''.

    <list>  = re.findall(<regex>, text)            # Returns all occurrences as strings.

    <list>  = re.split(<regex>, text, maxsplit=0)  # Add brackets around regex to
    include matches.

    <Match> = re.search(<regex>, text)             # First occurrence of the pattern
    or None.

    <Match> = re.match(<regex>, text)              # Searches only at the beginning
    of the text.

    <iter>  = re.finditer(<regex>, text)           # Returns all occurrences as Match
    objects.

    ```


    - Argument ''new'' can be a function that accepts a Match object and returns a
    string.

    - Argument ''flags=re.IGNORECASE'' can be used with all functions.

    - Argument ''flags=re.MULTILINE'' makes ''^'' and ''$'' match the start/end of
    each line.

    - Argument ''flags=re.DOTALL'' makes ''.'' also accept the ''\n''.

    - Use r''\1'' or ''\1'' for backreference (''\1'' returns a character with octal
    code 1).

    - Add ''?'' after ''*'' and ''+'' to make them non-greedy.


    ## Match Object


    ```

    <str>   = <Match>.group()                  # Returns the whole match. Also group(0).

    <str>   = <Match>.group(1)                 # Returns the part inside first brackets.

    <tuple> = <Match>.groups()                 # Returns all bracketed parts.

    <int>   = <Match>.start()                  # Returns start index of the match.

    <int>   = <Match>.end()                    # Returns exclusive end index of the
    match.

    ```


    ## Special Sequences


    ```

    ''\d'' == ''[0-9]''                     # Matches decimal characters.

    ''\w'' == ''[a-zA-Z0-9_]''              # Matches alphanumerics and underscore.

    ''\s'' == ''[ \t\n\r\f\v]''             # Matches whitespaces.

    ```


    - By default, decimal characters, alphanumerics and whitespaces from all alphabets
    are matched unless ''flags=re.ASCII'' argument is used.

    - As shown above, it restricts all special sequence matches to the first 128 characters
    and prevents ''\s'' from accepting ''[\x1c-\x1f]'' (the so-called separator characters).

    - Use a capital letter for negation (all non-ASCII characters will be matched
    when used in combination with ASCII flag).


    ## Format


    ```

    <str> = f''{<el_1>}, {<el_2>}''         # Curly brackets can also contain expressions.

    <str> = ''{}, {}''.format(<el_1>, <el_2>) # Or: ''{0}, {a}''.format(<el_1>, a=<el_2>)

    <str> = ''%s, %s'' % (<el_1>, <el_2>)     # Redundant and inferior C-style formatting.

    ```


    ## Example


    ```

    >>> Person = collections.namedtuple(''Person'', ''name height'')

    >>> person = Person(''Jean-Luc'', 187)

    >>> f''{person.name} is {person.height / 100} meters tall.''

    ''Jean-Luc is 1.87 meters tall.''

    ```


    ## General Options


    ```

    {el:<10}                             # ''<el>       ''

    {el:^10}                             # ''    <el>    ''

    {el:>10}                             # ''       <el>''

    {el:.<10}                            # ''<el>.......''

    {el:0}                               # ''<el>''

    ```


    - Options can be generated dynamically: f''{<el>:{<str/int>}[...]}''.

    - Adding ''='' to the expression prepends it to the output: f''{1+1=}'' returns
    ''1+1=2''.

    - Adding ''!r'' to the expression converts object to string by calling its repr()
    method.


    ## Strings


    ```

    {''abcde'':10}                        # ''abcde     ''

    {''abcde'':10.3}                      # ''abc       ''

    {''abcde'':.3}                        # ''abc''

    {''abcde''!r:10}                      # "''abcde''   "

    ```


    ## Numbers


    ```

    {123456:10}                          # ''    123456''

    {123456:10,}                         # ''   123,456''

    {123456:10_}                         # ''   123_456''

    {123456:+10}                         # ''   +123456''

    {123456:=+10}                        # ''+   123456''

