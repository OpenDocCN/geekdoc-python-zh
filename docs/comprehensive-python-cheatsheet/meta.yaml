    | | {<float>} | {<float>:f} | {<float>:e} | {<float>:%} |

    |---|---|---|---|---|

    | 0.000056789 | ''5.6789e-05'' | ''0.000057'' | ''5.678900e-05'' | ''0.005679%''
    |

