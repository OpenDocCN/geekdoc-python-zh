  md: "# Iterator\n\n+   - Any object that has methods next() and iter() is an iterator.\n\
    - Next() should return next item or raise StopIteration exception.\n- Iter() should\
    \ return 'self'.\n\n```\nclass Counter:\n    def __init__(self):\n        self.i\
    \ = 0\n    def __next__(self):\n        self.i += 1\n        return self.i\n \
    \   def __iter__(self):\n        return self\n```\n\n```\n>>> counter = Counter()\n\
    >>> next(counter), next(counter), next(counter)\n(1, 2, 3)\n```\n\nPython has\
    \ many different iterator objects:\n\n+   - Sequence iterators returned by the\
    \ iter() function, such as list_iterator and set_iterator.\n- Objects returned\
    \ by the itertools module, such as count, repeat and cycle.\n- Generators returned\
    \ by the generator functions and generator expressions.\n- File objects returned\
    \ by the open() function, etc.\n\n# Callable\n\n+   - All functions and classes\
    \ have a call() method, hence are callable.\n- When this cheatsheet uses '<function>'\
    \ as an argument, it actually means '<callable>'.\n\n```\nclass Counter:\n   \
    \ def __init__(self):\n        self.i = 0\n    def __call__(self):\n        self.i\
    \ += 1\n        return self.i\n```\n\n```\n>>> counter = Counter()\n>>> counter(),\
    \ counter(), counter()\n(1, 2, 3)\n```\n\n# Context Manager\n\n+   - With statements\
    \ only work with objects that have enter() and exit() special methods.\n- Enter()\
    \ should lock the resources and optionally return an object.\n- Exit() should\
    \ release the resources.\n- Any exception that happens inside the with block is\
    \ passed to the exit() method.\n- The exit() method can suppress the exception\
    \ by returning a true value.\n\n```\nclass MyOpen:\n    def __init__(self, filename):\n\
    \        self.filename = filename\n    def __enter__(self):\n        self.file\
    \ = open(self.filename)\n        return self.file\n    def __exit__(self, exc_type,\
    \ exception, traceback):\n        self.file.close()\n```\n\n```\n>>> with open('test.txt',\
    \ 'w') as file:\n...     file.write('Hello World!')\n>>> with MyOpen('test.txt')\
    \ as file:\n...     print(file.read())\nHello World!\n```"
