    rshift() and invert() special methods, unlike logical operators that work on all
    types of objects.

    - Also: ''<bool> = <bool> &|^ <bool>'' and ''<int> = <bool> &|^ <int>''.


    # # Introspection


    ```

    <list> = dir()                          # Names of local variables, functions,
    classes, etc.

    <dict> = vars()                         # Dict of local variables, etc. Also locals().

    <dict> = globals()                      # Dict of global vars, etc. (incl. ''__builtins__'').

