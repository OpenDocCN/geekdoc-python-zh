    \ 一种逐行读取并执行 Python 代码，将其翻译成机器可理解指令的程序。\n3.  **语法：** 管理 Python 代码结构和格式的规则，包括缩进、标点符号和关键字。\n\
    4.  **变量：** 一个命名的存储位置，用于存储可在整个程序中访问和修改的数据。\n5.  **数据类型：** Python 中数据的分类，包括整数、浮点数、字符串、列表、元组、字典和集合。\n\
    6.  **字符串：** 用单引号（''）或双引号（\" \"）括起来的字符序列，用于文本操作。\n7.  **整数：** 没有小数点的整数，用于算术运算。\n\
    8.  **浮点数：** 表示带小数点的数字的数值数据类型，用于更精确的计算。\n9.  **列表：** 用方括号 [] 括起来的有序项目集合，允许进行添加、删除和访问元素等可变操作。\n\
    10. **元组：** 类似于列表但不可变，意味着其元素在创建后无法更改，并用圆括号 () 括起来。\n11. **字典：** 用花括号 {} 括起来的键值对集合，允许根据键高效检索值。\n\
    12. **集合：** 用花括号 {} 括起来的唯一元素集合，可用于并集、交集和差集等数学运算。\n13. **布尔值：** 表示真值的数据类型，要么是 True，要么是\
    \ False，常用于条件语句和逻辑运算。\n14. **条件语句：** 根据指定条件控制程序流程的语句，包括 if、elif 和 else。\n15. **循环：**\
    \ 重复执行一段代码直到满足指定条件的控制结构，例如 for 循环和 while 循环。\n16. **函数：** 执行特定任务的可重用代码块，通常带有参数和返回值。\n\
    17. **模块：** 包含 Python 代码的文件，可以导入并在其他 Python 程序中重用，有助于将代码组织成逻辑单元。\n18. **包：** 组织成目录的相关\
    \ Python 模块集合，便于模块化编程和代码重用。\n19. **异常：** 程序执行期间发生的错误，会中断其正常流程，可以使用 try-except\
    \ 块捕获和处理。\n20. **面向对象编程（OOP）：** 一种将代码组织成对象的编程范式，对象封装数据和行为，促进模块化和可重用性。\n21. **类：**\
    \ 创建对象的蓝图，定义其属性（特征）和行为（方法）。\n22. **实例：** 从类创建的单个对象，拥有自己独特的属性和行为集。\n23. **继承：**\
    \ OOP 中的一种机制，一个类（子类）可以从另一个类（父类）继承属性和方法，促进代码重用和可扩展性。\n24. **多态性：** 不同对象以不同方式响应相同消息或方法调用的能力，从而提高适应性和模块化。\n\
