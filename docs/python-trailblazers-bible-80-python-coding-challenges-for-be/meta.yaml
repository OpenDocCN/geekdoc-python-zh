    20. **Object-Oriented Programming (OOP)**: A programming paradigm that organizes
    code into objects, which encapsulate data and behavior, promoting modularity and
    reusability.


    21. **Class**: A blueprint for creating objects, defining their properties (attributes)
    and behaviors (methods).


    22. **Instance**: An individual object created from a class, possessing its own
    unique set of attributes and behaviors.


    23. **Inheritance**: A mechanism in OOP where a class (subclass) can inherit attributes
    and methods from another class (superclass), promoting code reuse and extensibility.


    24. **Polymorphism**: The capacity for diverse objects to react to identical messages
    or method calls in varied manners, thereby boosting adaptability and compartmentalization.


    25. **Encapsulation**: The bundling of data and methods that operate on the data
    within a single unit (class), hiding the internal implementation details from
    the outside world.'
