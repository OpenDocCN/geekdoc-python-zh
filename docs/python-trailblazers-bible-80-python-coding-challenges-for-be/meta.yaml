  md: '# # Chapter 3


    # ## Basic Python Syntax: Variables, Data Types, Operators, and Expressions


    In this guide, we''ll cover the fundamental aspects of Python syntax, including
    variables, data types, operators, and expressions. These concepts form the building
    blocks of any Python program and are essential for understanding and solving coding
    challenges effectively.


    # ### 1. Variables:


    In Python, variables are employed to retain data values. You can conceptualize
    a variable as a named repository that holds a value. Python variables have the
    capability to store a range of data types, encompassing numbers, strings, lists,
    dictionaries, and beyond.


    In Python, initializing a variable involves assigning a value to a name utilizing
    the `=` operator. Here''s an example:


    ```

    python

    # Declaring variables

    x = 10

    name = "John"

    is_student = True

    ```'
  merge: -1
  pgno: 14
- img_proc: true
  md: 'In this example, `x`, `name`, and `is_student` are variables storing an integer,
    a string, and a boolean value, respectively.


    # 2. Data Types:


    Python supports several built-in data types, including:


    +   - **Integers**: Whole numbers without decimal points, e.g., `10`, `-5`, `1000`.

    - **Floats**: Numbers with decimal points, e.g., `3.14`, `-0.5`, `2.0`.

    - **Strings**: Textual data enclosed in single or double quotes, e.g., `"hello"`,
    `''Python''`, `"123"`.

    - **Booleans**: Logical values representing True or False.

    - **Lists**: Ordered collections of items, e.g., `[1, 2, 3]`, `["apple", "banana",
    "orange"]`.

    - **Tuples**: Immutable ordered collections of items, e.g., `(1, 2, 3)`, `("red",
    "green", "blue")`.

    - **Dictionaries**: Unordered collections of key-value pairs, e.g., `{"name":
    "John", "age": 30}`.


    You have the option to utilize the `type()` function to ascertain the data type
    of a variable:


    ```

    python

    # Check data types

    x = 10

    print(type(x)) # Output: <class ''int''>


    name = "John"

    print(type(name)) # Output: <class ''str''>

    ```'
