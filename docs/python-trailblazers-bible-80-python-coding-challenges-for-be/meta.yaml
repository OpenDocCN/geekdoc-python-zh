    # A Glossary of Terms for Python Beginner


    +   1. **Python:** A high-level programming language known for its simplicity
    and readability.

    2. **Interpreter:** A program that reads and executes Python code line by line,
    translating it into machine-understandable instructions.

    3. **Syntax:** The rules governing the structure and format of Python code, including
    indentation, punctuation, and keywords.

    4. **Variable:** A named storage location used to store data that can be accessed
    and modified throughout the program.

    5. **Data Types:** The classification of data in Python, including integers, floats,
    strings, lists, tuples, dictionaries, and sets.

    6. **String:** A sequence of characters enclosed within single ('''') or double
    (" ") quotes, used for text manipulation.'
