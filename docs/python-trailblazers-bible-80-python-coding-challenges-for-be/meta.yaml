    # A Glossary of Terms for Python Beginner


    +   1. **Python:** A high-level programming language known for its simplicity
    and readability.

    2. **Interpreter:** A program that reads and executes Python code line by line,
    translating it into machine-understandable instructions.

    3. **Syntax:** The rules governing the structure and format of Python code, including
    indentation, punctuation, and keywords.

    4. **Variable:** A named storage location used to store data that can be accessed
    and modified throughout the program.

    5. **Data Types:** The classification of data in Python, including integers, floats,
    strings, lists, tuples, dictionaries, and sets.

    6. **String:** A sequence of characters enclosed within single ('''') or double
    (" ") quotes, used for text manipulation.'
  - '[PAGE 145]


    +   7. **Integer**: A whole number without decimal points, used for arithmetic
    operations.

    8. **Float**: A numerical data type representing numbers with decimal points,
    used for more precise calculations.

    9. **List**: An ordered collection of items enclosed within square brackets [],
    allowing for mutable operations like adding, removing, and accessing elements.

    10. **Tuple**: Similar to lists but immutable, meaning their elements cannot be
    changed after creation and are enclosed within parentheses ().

    11. **Dictionary**: A collection of key-value pairs enclosed within curly braces
    {}, allowing for efficient retrieval of values based on keys.

    12. **Set**: A collection of unique elements enclosed within curly braces {},
    useful for mathematical operations like union, intersection, and difference.

    13. **Boolean**: A data type representing truth values, either True or False,
    often used in conditional statements and logical operations.

    14. **Conditional Statements**: Statements that control the flow of a program
    based on specified conditions, including if, elif, and else.

    15. **Loop**: A control structure that repeats a block of code until a specified
    condition is met, such as for loops and while loops.

    16. **Function**: A reusable block of code that performs a specific task, often
    with parameters and a return value.

    17. **Module**: A file containing Python code that can be imported and reused
    in other Python programs, helping to organize code into logical units.'
  - '[PAGE 146]


    18. **Package**: A collection of related Python modules organized into directories,
    facilitating modular programming and code reuse.


    19. **Exception**: An error that occurs during the execution of a program, disrupting
    its normal flow, which can be caught and handled using try-except blocks.


    20. **Object-Oriented Programming (OOP)**: A programming paradigm that organizes
    code into objects, which encapsulate data and behavior, promoting modularity and
    reusability.


    21. **Class**: A blueprint for creating objects, defining their properties (attributes)
    and behaviors (methods).


    22. **Instance**: An individual object created from a class, possessing its own
    unique set of attributes and behaviors.


    23. **Inheritance**: A mechanism in OOP where a class (subclass) can inherit attributes
    and methods from another class (superclass), promoting code reuse and extensibility.


    24. **Polymorphism**: The capacity for diverse objects to react to identical messages
    or method calls in varied manners, thereby boosting adaptability and compartmentalization.


    25. **Encapsulation**: The bundling of data and methods that operate on the data
    within a single unit (class), hiding the internal implementation details from
    the outside world.'
