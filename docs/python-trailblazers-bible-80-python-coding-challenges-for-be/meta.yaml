  md: '+   7. **Integer**: A whole number without decimal points, used for arithmetic
    operations.

    8. **Float**: A numerical data type representing numbers with decimal points,
    used for more precise calculations.

    9. **List**: An ordered collection of items enclosed within square brackets [],
    allowing for mutable operations like adding, removing, and accessing elements.

    10. **Tuple**: Similar to lists but immutable, meaning their elements cannot be
    changed after creation and are enclosed within parentheses ().

    11. **Dictionary**: A collection of key-value pairs enclosed within curly braces
    {}, allowing for efficient retrieval of values based on keys.

    12. **Set**: A collection of unique elements enclosed within curly braces {},
    useful for mathematical operations like union, intersection, and difference.

    13. **Boolean**: A data type representing truth values, either True or False,
    often used in conditional statements and logical operations.

    14. **Conditional Statements**: Statements that control the flow of a program
    based on specified conditions, including if, elif, and else.

    15. **Loop**: A control structure that repeats a block of code until a specified
    condition is met, such as for loops and while loops.

    16. **Function**: A reusable block of code that performs a specific task, often
    with parameters and a return value.

    17. **Module**: A file containing Python code that can be imported and reused
    in other Python programs, helping to organize code into logical units.'
