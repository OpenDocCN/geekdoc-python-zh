    # ## Task 2: Create Functions to Make the Code More Manageable


    Now that we have the parameter list changed to accommodate these upgrades, we
    need to change the script. As mentioned in the introductory comments, flow charts
    might be helpful. To begin with, let’s look at a flow chart of the existing program
    for our tool (Fig. 15.1).


