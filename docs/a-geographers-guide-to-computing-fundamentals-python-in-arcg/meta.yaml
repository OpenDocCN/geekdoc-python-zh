    city = cityCursor.next()

    ```


    The behavior of a cursor does not change just because we are interested in the
    shape now, so the variable city contains a tuple of items, given in the order
    in which they are listed in the line defining the cursor. This means that the
    geometry is in entry #0 within the list. Therefore, access that geometry by running
    the following line:


    ```

    geom = city[0]

    ```


    We can confirm that this is, indeed, a geometry by typing geom into a blank Notebook
