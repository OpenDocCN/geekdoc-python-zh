    \ to have another `elif` condition:\n\n```\nelif percentCover > 30:\n    ARCPY.AddError(\"\
    Your building might be too big to pass the permit process. Please check your measurements!\"\
    )\n```\n\nSave the script, and run the tool again with values that should produce\
    \ this error. Now you’ll get a message that the tool failed. View details to see\
    \ how it failed, and you’ll find that the culprit is the error message you just\
    \ put into the script. After all, it makes sense that if you add an error to the\
