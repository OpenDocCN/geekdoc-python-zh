    \ total building area; building type\n\n→ def assess(self):\n\n→ def propose(self,\
    \ newArea, newType):\n```\n\nThese set up the blueprints. Now we can use the flow\
    \ charts to fill in the methods that are defined here.\n\n---\n\n³ The two pieces\
