    \ \".\"\n```\n\nThis line is building the error message from the information provided\
    \ and is trying to incorporate the parameters into a longer string for a helpful\
    \ error message. This means that one of the properties accessed through the `self`\
    \ object is not a string, but this line assumes it is. Where did these come from?\
    \ The `createMessage()` method is called within the `__init__()` method, so the\
    \ property is established as a string within the `__init__()` method. Here are\
    \ the lines for the properties accessed in line 18:\n\n```\nself.lotID = str(lotID)\n\
    self.info1 = info1\nself.info2 = info2\n```\n\nFrom this, we can rule out `lotID`\
    \ as the problem, as it is turned into a string here. This means that `info1`\
    \ and/or `info2` are not strings. However, they were within the error message\
    \ for criterion 2, as we got that message without a problem. This means that instead\
    \ of just turning the `info1` and `info2` properties into strings here, we might\
    \ want to handle that earlier in such a manner that `info1` and `info2` are always\
    \ presented as strings. This means we want to go and check out the code in the\
    \ previous line in the traceback, wherein the `ApprovalError` is raised, which\
    \ is line 69. It reads as follows:\n\n```\nraise ApprovalError(1, self.lotID,\
    \ percent, self.threshold)\n```\n\nThe first parameter is the error type, which\
    \ is not present in line 18, so it cannot be that. We see in the `__init__()`\
    \ method that `lotID` is turned into a string there, so it cannot be that. This\
    \ leaves just the `info1` and `info2` properties, which are the percent of the\
    \ lot covered by buildings, and the maximum permitted percent for any lot. These,\
    \ it turns out, may well be numbers. Therefore, to fix this, we should turn `percent`\
    \ and `self.threshold` here into strings, replacing them with `str(percent)` and\
    \ `str(self.threshold)`.\n\n> ⁷Actually, they are mistakes I made when developing\
    \ the code for this chapter and I am stepping you through the debugging process\
    \ I carried out. So this can also be a reminder that, even as you near the end\
    \ of the semester, you will encounter bugs. I’ve been programming in various languages\
    \ for over 20 years (!!!) and still do things like this. The tip for successful\
    \ programming truly is how to interpret the error messages and not get too frustrated."
