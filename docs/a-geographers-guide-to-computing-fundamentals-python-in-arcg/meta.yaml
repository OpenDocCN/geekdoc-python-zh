    。\n\n# 表格与游标\n\n## 10\n\n### 引言：计算机如何表示表格\n\n在第 8 章中，我们介绍了如何在 ArcPy 中访问数据，第 9\
    \ 章讨论了栅格。本章转向矢量数据，但重点是所有矢量数据的一个超类：表格。表格在计算机中表示为，从某种意义上说，是栅格数据结构极力避免的网格。表格按行和列组织，每个对应于行/列组合的单元格恰好有一个值。典型表格中的条目数量远少于栅格中的单元格数量，并且相邻值相同的概率要小得多，因此不会尝试压缩文件大小。\n\
    \n为了访问和操作表格中的数据，我们使用一组称为游标的工具。它们逐行循环遍历表格中的行，就像 `csv.reader` 类允许我们查看 csv 文件的内容一样。因此，它们适用于表格和表格的任何子类，即矢量数据，因为这些是具有属性表的数据类型。有了游标这个名字，你可以像思考文字处理器中的光标一样思考它们：标记你所在位置的东西。然而，这些游标不是标记你在文本文档中输入的位置，而是标记\
    \ ArcGIS 正在处理的表格中的行。它总是遵循一些规则，因此不像文本文档中的光标那样灵活。它必须从表格顶部开始，就在第一行之前，这样第一次调用下面将解释的\
    \ `next()` 方法时，它会移动到第一行。它一次检查一行，每次完成一行后，它必须移动到下一行——不能跳来跳去。最后，一旦它到达表格末尾，在检查完最后一行之后，游标就停在那里，而不是返回到表格顶部。这最后一部分可能看起来很奇怪，但当我们使用\
    \ `for` 循环处理游标时就会变得有用。如果它返回到开头继续，`for` 循环可能会变成无限循环，永远不会停止！图 10.1 说明了这些规则，蓝色箭头代表游标的位置。\n\
    \nArcPy 不仅仅提供一种类型的游标，而是为我们提供了三种不同的游标，所有这些游标都在 `arcpy.da` 模块（用于数据访问）中。¹ 第一种，也是最简单的，是搜索游标。它用于访问和子集化数据，但没有对数据集的写入权限。如果你想编辑数据集，你将需要一个更新游标。它允许编辑表格中的值，并删除整行。但是，它不添加新行。这需要插入游标，其工作是向表格添加新行。\n\
    \n## 任务 1：搜索游标简介\n\n这个选举要素类包含许多全州选举的数据，包括参议员、州长和总统的初选和大选。我们将使用所有三种游标来回答问题，并使用表中的数据向要素类添加几个字段。\n\
    \n> ¹在通用的 ArcPy 模块中也有一组三个游标，但强烈不推荐使用；它们仅为“向后兼容”而提供，这意味着 ArcPy 团队不想因为使用它们的旧脚本会失效而立即删除它们，但任何新脚本都不应使用它们。\n\
    \n**补充信息：** 在线版本包含可在 [https://doi.org/10.1007/978-3-031-08498-0_10] 获取的补充材料。"
