    IDLE instead of the Python Window.


    For something as basic as this, where we access datasets to describe them, but
    make no attempt to edit them, use them for analysis, or create new data, the transition
    from the Python Window or Notebook to IDLE is not as great as you might fear.
    I introduce the necessary steps here, and you will, in the non-guided task, be
    writing a script that uses these ideas to operate in IDLE instead of the Python
    Window.


    First, recall that `arcpy` is a Python module, and when working outside of the
