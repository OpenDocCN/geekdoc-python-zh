    \n## 任务 2：访问和检查基本 ArcPy 类\n\n本章的任务将使用 ArcGIS Pro 中的 Python 窗口，因为我们主要是一次查看一行代码。我们要做的第一件事是查看环境工作空间，因为我们在开始一个新项目时经常需要检查或设置它。`arcpy`\
