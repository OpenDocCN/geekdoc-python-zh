    \ newBuildingType)\n    ARCPY.AddMessage(\"Your permit should be approved, and\
    \ the new tax amount is estimated to be \" + str(newAppraisal))\nexcept ApprovalError\
    \ as ae:\n    ARCPY.AddError(\"There was an error during the approval process.\
    \ \" + str(ae))\nexcept StopIteration as si:\n    ARCPY.AddError(\"Your lot number\
    \ doesn't exist.\")\n```\n\nDefining our new classes introduces another keyword,\
    \ which is like `def`, but for classes. It is, appropriately enough, `class`.\
    \ As with everything else in Python, to ensure the code that belongs to the class\
    \ we are defining is allocated correctly, anything indented under the `class`\
    \ line belongs to that class. If we are extending an existing class, we put the\
    \ parent class or superclass in parentheses after the new class name. This is\
    \ done below to establish the `ApprovalError` class as extending the `ValueError`\
    \ class, as it is a type of value error, ensuring it can inherit properties and\
    \ methods from `ValueError`.\n\nAt the start of the python file, immediately after\
    \ the import statement, enter this:\n\n```\nclass ApprovalError(ValueError):\n\
    ```\n\nWe need to then set up what methods we are defining, which, like functions,\
