    comprise the object’s state. Python provides direct access to these properties,
    but sometimes you can only read the properties, rather than write or alter them.
    It is similar to the difference between lists, which can be altered after they
    are created, and tuples, which cannot. The distinction is that properties that
    are read-only can change, albeit through less direct means. Also like variables,
    these properties can be of any data type, including objects. In fact, this is
    something we will frequently encounter within ArcPy. The class blueprint enforces
    that every object within the class has the same set of properties, which are all
    of the same types, although the values of those properties can change from one
    object to another.


    In addition to the properties, classes contain methods. These methods are similar
    to functions, in that they are blocks of code which have the ability to accept
    input parameters and provide return values. Like functions, they are not required
    to do so. The advantage of class-specific methods is that they can more directly
    use the properties, and alter the properties, of the object than having a generic
    function which accepts the object of its properties as an input parameter.


    As this visualization approach extending the box metaphor to a crate containing
    multiple boxes as well as methods is cumbersome and will not scale well to more
    complicated classes, a visual language called Unified Modeling Language, or UML,
    is often employed. There are several kinds of diagrams that make up UML, and we
    will be focusing here on a type called a class diagram. The class diagram for
    Fig. 7.1 is given in Fig. 7.2.


    The classes we will be working with are in a module ESRI provides, called `arcpy`.
    There are functions and classes built into `arcpy`, as well as a series of submodules.
    Each submodule has its own access. For example, the Data Access module is accessed
    through `arcpy.da.`, while the Mapping module is in `arcpy.mp`. As you may have
    observed, the dot delimiter is not just used for identifying properties and methods
    within classes but also for accessing classes and functions within modules. This
    is why we had `csv.reader` a few times in code from earlier chapters. It was accessing
    the `reader` class in the `csv` module. We can then access classes within those
    submodules by extending the dot sequence farther, and access properties and methods
    by extending it even farther. Thus, accessing the `ArcGISProject` class can be
    done through `arcpy.mp.ArcGISProject("CURRENT")`, and we can even access the file
    path for it with `arcpy.mp.ArcGISProject("CURRENT").filePath`.


    **Supplementary Information:** The online version contains supplementary material
    available at [https://doi.org/10.1007/978-3-031-08498-0_7].'
- md: '## 7.1 An object variable of the class ArcGISProject


    ![](img/37990581b275bdf7d510c6f2d9702a31_83_0.png)


    ![](img/37990581b275bdf7d510c6f2d9702a31_83_1.png)


    ## 7.2 Class diagram representation of Fig. 7.1


    `mp.ArcGISProject("CURRENT").filePath`. In theory, because properties can be objects
    and methods can return objects, which have their own properties and methods, we
    can continue to extend the dot sequence ad nauseam. However, in most situations,
    you would want to use a variable to hold an intermediate value, because it can
    be difficult to follow a long line of text punctuated with dots.


    Each module, as well as the generic `arcpy` module, has functions and classes,
    and those classes, as described above, have their own methods and properties.
    The distinction between a function within a module and a method belonging to a
    class within that module is that the class method is accessed through a variable
    belonging to that class, while the function is accessed directly from the module.


    As an example, if you want to print something in `arcpy`, instead of using the
    `print` function, which will work in the Python Window and Notebook, but not if
    you use a custom tool (see Chap. 14 for details), you can use the built-in `arcpy`
    function of `arcpy.AddMessage("message goes here")`. This function works anywhere
    in a program, and isn''t tied to any variable. It simply prints the message. On
    the other hand, there is a `polygon` object, which we will see more of in Chap.
    11 on geometries. The `polygon` object has properties like `isMultipart`, which
    tells you whether the polygon is a single unit (like West Virginia) or a series
    of polygons (like Hawaii). This property cannot, though, be evaluated without
    reference to an object of that class type. Just asking “is this polygon multipart”
    makes no sense if we don’t know what “this polygon” refers to, we must use a variable
    of the type `polygon` to access the property `isMultipart`. Therefore, if we have
    a variable called `state` which is of type `polygon`, we can have an expression
    of `state.isMultipart` which will evaluate to `True` for Hawaii and `False` for
    West Virginia. Likewise, the `polygon` class has functions, which also need to
    go through a separate variable of the type `polygon`. One of these is `buffer`,
    which returns a new `polygon` object applying a buffer around the old polygon.
    Therefore, to find a buffer extending 50 kilometers around West Virginia, you
    would need something like `state.buffer(50000)` where the input parameter is the
    distance of the buffer expressed in map units (assuming meters for this example).


    The submodules we will be working with most in this book are the Data Access,
    Mapping, and Spatial Analyst modules. The Data Access module, as the name suggests,
    is how to access, manipulate, and edit data. It is through `arcpy.da`. Mapping,
    which is in `arcpy.mp`, helps us create and edit the symbology of maps. The Spatial
    Analyst module, in `arcpy.sa`, helps us work with rasters.


    ## Task 1: Reading ArcPy Documentation


    Remembering the properties and methods of any class might seem like a lot to keep
    track of. This is why we have formal documentation, which serves as the English
    (or other language) description of a blueprint for every object within ArcPy.¹
    The first class we will use is the `ArcGISProject`, and part of its documentation
    blueprint is reprinted below. The entire documentation is available at http://pro.arcgis.com/en/pro-app/arcpy/mapping/arcgisproject-class.htm.


    The standard documentation has four main parts: a discussion, the properties of
    the class, the overview of the methods for the class, and lastly, a more detailed
    explanation of each of the methods. The discussion, which is not reprinted below,
    provides the general overview of what the class provides, why it exists, and how
    it might be used. The discussion for the `ArcGISProject` class points out that
    it is typically one of the first variables that you set when working with ArcPy
    scripts because it serves as the entry point for many of the other pieces of ArcPy
    and projects within ArcGIS Pro. The discussion also highlights that it is the
    means for accessing both maps and layouts, which are, after all, much of the purpose
    of ArcGIS in the first place.


    The properties table has pretty much all the information you’d need to know about
    each property. The leftmost column provides the name of the property and whether
    it is read-only or provides write access. For example, `dateSaved` is read-only,
    while the `defaultGeodatabase` property can be both read and written to. This
    would make sense because you don’t want people to be able to directly change the
    `dateSaved` property, because they could change it to a value which is false.
    It can, though, be changed indirectly, as the `save()` method will change the
    `dateSaved` property so that it accurately reflects when the project was last
    saved. The middle column, the explanation, is straightforward in telling you what
    that property contains. In many cases, the property name is itself self-explanatory
    (like `dateSaved`). The rightmost column is at least as important as the property
    name itself. It contains the data type of the property, whether that is a string,
    an object representing a date and time, or another custom object, like a `Map`.


    > ¹I won’t guarantee the existence or quality of modules other than ArcPy, although
    many of them do have acceptable documentation. After all, if you want your module
    to be widely used, it is hard for that to take place if you have no documentation
    telling people how to use the object types in that module.


    ## Properties


    | Property | Explanation | Data Type |

    | :--- | :--- | :--- |

    | activeMap (Read Only) | Returns the map object associated with the focused view
    within the application. If a layout view is active, it will return the map associated
    with the active map frame.<br><br>**Note:** This property is designed to be executed
    from within the application using a script tool or the Python window. If a script
    is run outside of the application, None will always be returned. | Map |

    | activeView (Read Only) | Returns a MapView or a Layout, depending on the current
    view. If the ArcGIS Pro project has no open views, or if the active view is something
    other than a map view or layout view (for example, a chart, table, Model Builder
    view, and so on), None will be returned.<br><br>**Note:** This property is designed
    to be executed from within the application using a script tool or the Python window.
    If a script is run outside of the application, None will always be returned. |
    Object |

    | dateSaved (Read Only) | Returns a Python datetime object that reports the project''s
    last saved date. | DateTime |

    | defaultGeodatabase (Read and Write) | The project''s default geodatabase location.
    The string must include the geodatabase''s full path and file name. | String |

    | defaultToolbox (Read and Write) | The project''s default toolbox location. The
    string must include the toolbox''s full path and file name. | String |


    The next segment of the documentation is the overview table of the methods. The
    explanation is again a straightforward idea, but we will look at the left column
    in more depth. Where you saw the name of the property, you now see the name of
    the method, accompanied by the tuple of parameters, much like you saw with functions.
    The one extra thing to notice is the parameters in parentheses and curly braces
    ( { } ). As with the function, any methods you see *must* have the tuple of parameters,
    even if that tuple doesn''t contain any parameters. The `save()` function has
    the parentheses even though it does not require any input parameters. These parentheses
    are, in fact, how the Python syntax distinguishes properties from methods. Some
    parameters in the tuple are themselves in curly braces, like the {wildcard} parameter
    of the `listMaps(...)` method. These parameters are optional, in which case Python
    will use the values you provide if you choose to do so, or follow a default value
    if you do not provide one. The explanation column describes what the method does,
    and specifies what, if anything, gets returned.


    ## Method Overview


    | Method | Explanation |

    | :--- | :--- |

    | `importDocument(document_path, {include_layout}, {reuse_existing_maps})` | Imports
    map (.mxd), globe (.3dd), and scene (.sxd) documents into an ArcGIS Pro project.
    It also imports the contents of map files (.mapx), layout files (.pagx), and report
    files (.rptx). |

    | `listBrokenDataSources()` | Returns a Python list of `Layer` and/or `Table`
    objects that have broken connections to their original source data for all maps
    in a project. |

    | `listColorRamps({wildcard})` | The `listColorRamps` method references color
    ramps available in a project. |

    | `listLayouts({wildcard})` | Returns a Python list of `Layout` objects in an
    ArcGIS project (.aprx). |

    | `listMaps({wildcard})` | Returns a Python list of `Map` objects in an ArcGIS
    project (.aprx). |

    | `listReports({wildcard})` | Returns a Python list of `Report` objects in an
    ArcGIS project (.aprx). |


    After looking at this overview, you might want to examine some methods in more
    detail. This is the last major segment of the documentation. I''ve pulled out
    three methods to highlight a few aspects. The `listMaps()` method illustrates
    the optional parameter. It has a wildcard parameter which you can use to subset
    the list of maps it returns by the names of those maps. The table below specifies
    that the data type of this parameter must be a string, although the explanation
    states that it does not need to be the full name. It can use an asterisk to be
    a bit more generic, such as "R*" referring to any and all maps whose name starts
    with the letter R. It also explains that if the wildcard parameter is left out,
    it uses the default value of `None`, which will indicate that it returns all maps
    in the project. There''s a separate table for information about the return value.
    In this case, it informs us that the data type is a list and that we can expect
    the list to contain objects of the class `Map`.'
  mdcn: '## 7.1 ArcGISProject 类的对象变量


    ![](img/37990581b275bdf7d510c6f2d9702a31_83_0.png)


    ![](img/37990581b275bdf7d510c6f2d9702a31_83_1.png)


    ## 7.2 图 7.1 的类图表示


    `mp.ArcGISProject("CURRENT").filePath`。理论上，由于属性可以是对象，方法可以返回对象，而这些对象又有自己的属性和方法，我们可以无限地扩展这个点号序列。然而，在大多数情况下，你会希望使用一个变量来保存中间值，因为跟踪一长串用点号分隔的文本可能会很困难。


    每个模块以及通用的 `arcpy` 模块都有函数和类，而这些类，如上所述，有自己的方法和属性。模块内的函数与属于该模块内类的方法之间的区别在于，类方法是通过属于该类的变量来访问的，而函数则是直接从模块访问的。


    举个例子，如果你想在 `arcpy` 中打印某些内容，而不是使用 `print` 函数（该函数在 Python 窗口和 Notebook 中有效，但如果你使用自定义工具则无效，详见第
    14 章），你可以使用内置的 `arcpy` 函数 `arcpy.AddMessage("message goes here")`。这个函数在程序中的任何地方都有效，并且不依赖于任何变量。它只是打印消息。另一方面，有一个
    `polygon` 对象，我们将在第 11 章关于几何的部分看到更多。`polygon` 对象具有像 `isMultipart` 这样的属性，它告诉你多边形是单一部分（如西弗吉尼亚州）还是由一系列多边形组成（如夏威夷）。然而，如果不引用该类类型的对象，就无法评估此属性。如果我们不知道“这个多边形”指的是什么，仅仅问“这个多边形是多部分的吗”是没有意义的，我们必须使用
    `polygon` 类型的变量来访问 `isMultipart` 属性。因此，如果我们有一个名为 `state` 的变量，其类型为 `polygon`，我们可以有一个表达式
    `state.isMultipart`，对于夏威夷它将计算为 `True`，对于西弗吉尼亚州则为 `False`。同样，`polygon` 类也有函数，这些函数也需要通过一个单独的
    `polygon` 类型的变量来访问。其中之一是 `buffer`，它返回一个新的 `polygon` 对象，在旧多边形周围应用一个缓冲区。因此，要找到西弗吉尼亚州周围
    50 公里范围的缓冲区，你需要类似 `state.buffer(50000)` 的代码，其中输入参数是以地图单位表示的缓冲区距离（本例中假设为米）。


    本书中我们将最常使用的子模块是数据访问、制图和空间分析模块。顾名思义，数据访问模块是如何访问、操作和编辑数据。它是通过 `arcpy.da` 实现的。制图模块位于
    `arcpy.mp`，帮助我们创建和编辑地图的符号系统。空间分析模块位于 `arcpy.sa`，帮助我们处理栅格数据。


    ## 任务 1：阅读 ArcPy 文档


    记住任何类的属性和方法似乎需要跟踪很多信息。这就是为什么我们有正式文档，它作为 ArcPy 中每个对象蓝图的英文（或其他语言）描述。¹ 我们将使用的第一个类是
    `ArcGISProject`，其文档蓝图的一部分转载如下。完整文档可在 http://pro.arcgis.com/en/pro-app/arcpy/mapping/arcgisproject-class.htm
    获取。


    标准文档有四个主要部分：讨论、类的属性、类的方法概述，以及最后对每个方法的更详细解释。下面未转载的讨论部分提供了该类提供什么、为什么存在以及如何使用的总体概述。`ArcGISProject`
    类的讨论指出，它通常是在使用 ArcPy 脚本时设置的第一个变量之一，因为它作为 ArcPy 和 ArcGIS Pro 项目中许多其他部分的入口点。讨论还强调它是访问地图和布局的手段，毕竟这在很大程度上是
    ArcGIS 的主要目的。


    属性表包含了你需要了解的关于每个属性的几乎所有信息。最左列提供了属性的名称以及它是只读还是提供写访问。例如，`dateSaved` 是只读的，而 `defaultGeodatabase`
    属性可以读写。这是合理的，因为你不想让人们能够直接更改 `dateSaved` 属性，因为他们可能会将其更改为一个错误的值。然而，它可以间接更改，因为 `save()`
    方法会更改 `dateSaved` 属性，使其准确反映项目上次保存的时间。中间列，即解释，直接告诉你该属性包含什么。在许多情况下，属性名称本身就是不言自明的（如
    `dateSaved`）。最右列至少与属性名称本身一样重要。它包含属性的数据类型，无论是字符串、表示日期和时间的对象，还是另一个自定义对象，如 `Map`。


    > ¹ 我不保证 ArcPy 以外的模块的存在或质量，尽管其中许多模块确实有可接受的文档。毕竟，如果你想让你的模块被广泛使用，如果没有文档告诉人们如何使用该模块中的对象类型，那是很难实现的。


    ## 属性


    | 属性 | 解释 | 数据类型 |

    | :--- | :--- | :--- |

    | activeMap (只读) | 返回与应用程序中聚焦视图关联的地图对象。如果布局视图处于活动状态，它将返回与活动地图框关联的地图。<br><br>**注意：**
    此属性设计为在应用程序内部使用脚本工具或 Python 窗口执行。如果在应用程序外部运行脚本，将始终返回 None。 | Map |

    | activeView (只读) | 返回 MapView 或 Layout，具体取决于当前视图。如果 ArcGIS Pro 项目没有打开的视图，或者活动视图不是地图视图或布局视图（例如，图表、表格、模型构建器视图等），则返回
    None。<br><br>**注意：** 此属性设计为在应用程序内部使用脚本工具或 Python 窗口执行。如果在应用程序外部运行脚本，将始终返回 None。
    | Object |

    | dateSaved (只读) | 返回一个 Python datetime 对象，报告项目上次保存的日期。 | DateTime |

    | defaultGeodatabase (读写) | 项目的默认地理数据库位置。字符串必须包含地理数据库的完整路径和文件名。 | String |

    | defaultToolbox (读写) | 项目的默认工具箱位置。字符串必须包含工具箱的完整路径和文件名。 | String |


    文档的下一部分是方法概述表。解释同样是一个直接的概念，但我们将更深入地查看左列。你之前看到属性名称的地方，现在看到的是方法名称，伴随着参数元组，就像你在函数中看到的一样。需要注意的一点是括号和花括号
    ( { } ) 中的参数。与函数一样，你看到的任何方法*必须*有参数元组，即使该元组不包含任何参数。`save()` 函数有括号，即使它不需要任何输入参数。这些括号实际上是
    Python 语法区分属性和方法的方式。元组中的一些参数本身在花括号中，例如 `listMaps(...)` 方法的 {wildcard} 参数。这些参数是可选的，在这种情况下，如果你选择提供值，Python
    将使用你提供的值，或者如果你不提供，则使用默认值。解释列描述了方法的功能，并指定了返回的内容（如果有的话）。


    ## 方法概述


    | 方法 | 解释 |

    | :--- | :--- |

    | `importDocument(document_path, {include_layout}, {reuse_existing_maps})` | 将地图
    (.mxd)、球体 (.3dd) 和场景 (.sxd) 文档导入 ArcGIS Pro 项目。它还导入地图文件 (.mapx)、布局文件 (.pagx) 和报告文件
    (.rptx) 的内容。 |

    | `listBrokenDataSources()` | 返回一个 Python 列表，包含项目中所有地图中与原始源数据连接断开的 `Layer` 和/或
    `Table` 对象。 |

    | `listColorRamps({wildcard})` | `listColorRamps` 方法引用项目中可用的颜色渐变。 |

    | `listLayouts({wildcard})` | 返回 ArcGIS 项目 (.aprx) 中 `Layout` 对象的 Python 列表。 |

    | `listMaps({wildcard})` | 返回 ArcGIS 项目 (.aprx) 中 `Map` 对象的 Python 列表。 |

    | `listReports({wildcard})` | 返回 ArcGIS 项目 (.aprx) 中 `Report` 对象的 Python 列表。 |


    查看此概述后，你可能希望更详细地研究一些方法。这是文档的最后一个主要部分。我挑选了三个方法来强调几个方面。`listMaps()` 方法说明了可选参数。它有一个通配符参数，你可以用它来根据地图名称筛选返回的地图列表。下表指定了此参数的数据类型必须是字符串，尽管解释指出它不需要是完整名称。它可以使用星号来更通用一些，例如
    "R*" 指代所有名称以字母 R 开头的地图。它还解释说，如果省略通配符参数，它将使用默认值 `None`，这将表示返回项目中的所有地图。有一个单独的表格提供有关返回值的信息。在这种情况下，它告诉我们数据类型是一个列表，并且我们可以期望该列表包含
    `Map` 类的对象。'
