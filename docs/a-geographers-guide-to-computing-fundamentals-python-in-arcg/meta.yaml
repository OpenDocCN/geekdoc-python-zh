    to access other classes. Methods and properties that are used to connect the classes
    shown are included, although other properties and methods are not included to
    conserve space and clarity. The numbers tell you how many instances of the subsequent
    class can be accessed. For example, the `listMaps()` method of the `ArcGISProject`
    class gives you a list of maps, which could contain any number of maps, including
    zero, so this is labeled with 0...n. A fuller description of UML diagrams like
    this is provided in the Appendix (Fig. 12.1).


    The first step is the ArcGIS Project, represented in a class called `ArcGISProject`.
    Through the methods we have seen before, we can access the list of maps from the
    project. We can also access a list of layouts, which is the subject of the next
    chapter. Each map, then, has a list of layers, which may or may not be empty.
    This much, we have seen before. I could extend from the Layer class to some of
    the data-oriented properties and methods, such as `dataSource`, but as this is
    a chapter on cartographic symbology, we continue with the Symbology object, accessed
    through the `Layer.symbology` property.


    The Symbology object is equivalent to the Symbology panel in ArcGIS Pro, accessing
    the same information. Just as there are different versions of the symbology panel
    for rasters and vectors, we can use an object of the Symbology class to access
    either a raster colorizer through the `Symbology.colorizer` property or a vector
    renderer through the `Symbology.renderer` property. The tasks in the remainder
    of this chapter will only use the renderer, although colorizers are discussed
    below to introduce you to them.


    Furthermore, we can see that there are two types of raster colorizers which are
    supported by arcpy. One, `RasterUniqueValueColorizer`, is for (as the name tells
    you) using a unique value for each distinct value, or a set of values, while the
    other, `RasterClassifyColorizer`, is for stretched values. Both of these use a
    color ramp, accessed in both cases through a `colorizer.colorRamp` property. You
    will also see next to both the colorizer subclasses that there are properties
    with more basic Python types simply listed there. For example, `RasterUniqueValueColorizer`
    has a property called `field` which is of type String. This is the field used
    to determine the colors which are shown. Similarly, `RasterClassifyColorizer`
    has a `classificationField` property of type String. In addition, it has a `classificationMethod`
    property, with options like "NaturalBreaks" and "Quantile" that tell ArcGIS how
    to carry out the classification.


    Another distinction between the colorizers is that, while both use a color ramp
    to get the colors, the `RasterClassifyColorizer` has a list of class breaks, each
    of which is of the class `RasterClassBreak`. These, in turn, store a representation
    of the color as a dictionary. The details of how a dictionary becomes a color
    will be seen later, in the discussion of vector symbologies. There is an upper
    bound to the class, which is a double type. There is no lower bound, however,
    which suggests that the class breaks are sorted, and the upper bound of the previous
    class can be considered the lower bound of this one. The label is represented
    as a String, and this is what the class is called in the legend and in the Table
    of Contents. Meanwhile, the `RasterUniqueValueColorizer` doesn''t have a set of
    class breaks, because this is not relevant to representing data by their unique
    values. Instead, there is a list of `ItemGroup` objects, accessed through the
    `RasterUniqueValueColorizer.groups` property, and each of these item groups has
    itself a list of items, and each of these items associates a color with a list
    of values.


    This illustrates the number of steps needed to change the color of forest pixels
    in a land cover map. You have to get the project and access the correct map and
    then the correct layer within that project. Then you get that layer''s symbology
    and, as a raster layer, its colorizer. Since a land cover map would be using a
    unique value colorizer, access that colorizer''s item group, followed by the appropriate
    raster item for which "forest" is in the values List. Then you can change the
    color of that item.


    Unfortunately, vector symbology isn''t any more streamlined (Fig. 12.2). Vector
    symbology at least initially appears even more complicated than the raster symbology,
    although there are actually some similarities. Just as there are two types of
    colorizers, there are four varieties of renderers. The `UniqueValueRenderer` is,
    unsurprisingly, similar to the `RasterUniqueValueColorizer`. Both have a `groups`
    property that accesses a list of objects of class `ItemGroup`. The difference
    is that while the `items` property of the `RasterUniqueValueColorizer` gives you
    a list of `RasterItem` objects, the `items` property here gives a list of objects
    of the type `Item`. Both the `Item` and `RasterItem` classes have a list of values,
    although whereas the `RasterItem` associates all the values in this list with
    a color, the `Item` associates them with a `Symbol`. The symbol is, in a sense,
    the heart of vector symbology. Most renderers access a symbol somehow or other.
    We will look at symbols in more detail shortly. Also, just as the `RasterUniqueValueColorizer`
    accesses a `ColorRamp` object, so does the `UniqueValueRenderer`.


    Where there is a `RasterClassifyColorizer` to represent classified data within
    a raster, there are two main ways of representing classified data through this
    symbology: by altering the colors and by altering the symbol sizes.¹ The `GraduatedColorsRenderer`
    is the approach of altering the colors, while the `GraduatedSymbolsRenderer` is
    the approach of altering the symbol sizes. The properties match this distinction,
    yet there are differences brought on by those


    ¹Yes, I am aware of dot density maps and other approaches, but they aren''t covered
    here.'
- md: '## Task 1: Basic Mapping Tasks—Adding Layers


    Throughout this lab, we will be working with a geodatabase of some reference layers:
    counties (USCensus2010_arc), states, highways, rivers, and cities. The overarching
    goal will be to produce a map of county by income with the other layers there
    for reference. Copy everything over to your preferred workspace and open the Python
    Window, as we will use that for the guided tasks in this chapter.


    I have given you a basic starting project already, so open `mapping_start.aprx`,
    and fix the inevitable broken data references. You will notice that one of the
    layers listed above is missing: the rivers. We will start by adding this layer
    using scripting. Open the Python Window and enter these two lines:


    ```

    aprx = arcpy.mp.ArcGISProject("CURRENT")

    thisMap = aprx.listMaps()[0]

    ```


    **Question 1: Why might it be better to set the map to “current” rather than designate
    a file location?**


    Now we will add the rivers layer. To do this, we want two layer objects: one for
    the layer we are inserting into the document and one that we can use to tell ArcMap
    where in the Table of Contents to put it. The `listLayers` function works similar
    to the `listMaps` function, but here we are specifying the name we want:


    ```

    roadLayer = thisMap.listLayers("roads")[0]

    ```


    **Question 2: Why would specifying the parameter for “roads” be better than using
    the index of the roads layer (e.g., `thisMap.listLayers()[1]`)?**


    As with the `listMaps` function, it returns a list, even when there is only one
    item in the list, so the `[0]` is necessary. We have to point ArcMap to the right
    geodatabase layer to give it the rivers. (Edit the file path as necessary.) Once
    complete, it adds the layer to the map and returns a Result object:


    ```

    >>> riverLayer = arcpy.management.MakeFeatureLayer("C:/noSpaces/arc/WVAGP/mapping/mapping_start.gdb/rivers",
    "river_lyr")


    <Result ''river_lyr''>

    ```


    ## Task 2: Changing Layer Properties


    It may not be very useful to us to have the states covering up the counties like
    this, so let’s make the states layer invisible. To retrieve the states layer and
    put it into a variable for continued access, enter the following line:


    ```

    statesLayer = thisMap.listLayers("states")[0]

    ```


    Take a look at the properties of the Layer class by going to the arcpy for ArcGIS
    Pro help website and search for Layer class. (It’s also at http://pro.arcgis.com/en/pro-app/arcpy/mapping/layer-class.htm.)
    Keep this window open; it will be useful later! These are the attributes of the
    layer that you can change through arcPy. Some of them are “Read Only,” like isRasterLayer.
    This means that arcPy will be able to tell you whether or not it is a raster layer,
    but you won’t be able to change it. This makes sense, as it would create major
    problems and probably cause ArcGIS to crash if you could change a layer from a
    vector layer to a raster layer without concurrently switching the dataset that
    it refers to from a vector to a raster. Others, like transparency, are labeled
    “Read and Write,” meaning you can use the code to change a layer’s transparency.
    Do any of the properties look particularly useful for what we want to do? Try
    this line:


    ```

    statesLayer.visible = False

    ```


    Hit enter. You should have a map like this, with the box next to the name of the
    states layer unchecked.


    So we’ve turned off the states to see the counties, and this can be worthwhile.
    But maybe we’d prefer to make the states hollow with a thicker outline and give
    them labels, for reference purposes. We will first tackle the labels and address
    the symbology in the next task.


    **Question 3: What code can you use to make the states layer visible?**


    Now let’s add labels to the states. There should be a property of the Layer class
    that you can find which will allow you to display the labels.


    **Question 4: What is it? What code do you need to include here?**


    Just as there are different types of datasets that we examined with the Describe
    object, there are different types of layers (raster, feature, etc.), and again
    analogous to the properties of the Describe object, some of the layer properties
    are only available to certain layer types. We can check whether or not a property
    is supported using the supports() method.


    For example, this line checks whether `statesLayer` supports the *contrast* property.
    Then create variables to access each layer, not just the states and road layer
    variables that you have at the moment.


    ```

    statesLayer.supports("CONTRAST")

    ```


    **Question 5: Create variables to access each layer, and use them to identify
    which layers (if any) in our geodatabase support the *brightness* property? Enter
    the relevant code here.**


    ## Task 3: Changing Symbology


    As stated above, we would like to make the states hollow. This can be done through
    the symbology property. As described in the introductory remarks, there is a chain
    of properties we will need to go through to edit a symbology. The first of these
    is the symbology property of the layer. That, in turn, has a renderer, which records
    how the layer as a whole is drawn. There are several types of renderers, for different
    ways of displaying the layer. Find out what the renderer type of the states layer
    is by typing the next lines and hitting Enter:


    ```

    statesSymbology = statesLayer.symbology

    statesSymbology.renderer.type

    ```


    You should get the answer to Question 6 below:

    **Question 6: (5 points) What is the renderer type for the states layer?**

    This type of renderer means each feature is displayed using the exact same symbol,
    which we can access through the first of the following lines. This makes sense,
    as looking at the map, all the states will be the same color with the same outline
    thickness. (The exact color may vary depending upon how ArcGIS Pro seems to feel
    that day.) We wanted it hollow, which is through the second of the following lines:


    ```

    statesSymbol = statesSymbology.renderer.symbol

    statesSymbol.color = {''RGB'' : [0, 0, 0, 0]}

    ```


    **Question 7: Using the help documentation for the symbol class, why is the *last*
    number in the list specifying the color a 0?**

    You should not see any changes. What we have done so far is edit the variable
    holding the symbology for the layer. Think back to the variable called bob in
    Chap. 2, which was given the item in a list, but changing the variable bob didn''t
    change the list. A similar dynamic is happening here, in which the `statesSymbology`
    variable was changed, but that didn''t change the symbology property of the layer.²
    We now need to go back to save those edits into the layer. This is done through
    setting the symbology property of the layer. (The symbology property is, after
    all, both read and write enabled.)


    ```

    statesLayer.symbology = statesSymbology

    ```


    Now it is hollow, but to make the state borders distinct from the county borders,
    we want to give it a thicker outline. This is through the `size` property:


    ```

    statesSymbol.size = 3

    statesLayer.symbology = statesSymbology

    ```


    > ²I say "similar dynamic" instead of "same dynamic" because, for some reason,
    editing the variable called statesSymbol *did* automatically have the changes
    get reflected within the statesSymbology variable, even though changes to statesSymbology
    have not yet been reflected by the statesLayer variable. To use computer science
    jargon, it is as if ArcPy used call by reference to access statesSymbol but call
    by value for accessing statesSymbology.'
