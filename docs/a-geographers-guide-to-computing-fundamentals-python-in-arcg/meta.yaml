  md: 'For something as basic as this, where we access datasets to describe them,
    but make no attempt to edit them, use them for analysis, or create new data, the
    transition from the Python Window or Notebook to IDLE is not as great as you might
    fear. I introduce the necessary steps here, and you will, in the non-guided task,
    be writing a script that uses these ideas to operate in IDLE instead of the Python
    Window.


    First, recall that `arcpy` is a Python module, and when working outside of the
    Python Window in ArcGIS Pro, we must `import` it like any other module. Therefore,
    you''ll have to start off with an `import arcpy` statement.


    Second, you might have used the GUI to specify the environment workspace. Of course,
    the GUI is not available in IDLE, so you will have to use code to specify the
    environment workspace. I suggest making use of the Python input function to request
    this information from the user, rather than building the file path directly into
    the code. After all, you don''t know where I keep my files, and I should not have
    to edit your code at all to grade it. Therefore, it''s best if you ask me, as
