    for the geometry. This illustrates that the property of an object can be, and
    often is, another object. Every county must follow this blueprint, and contain
    values for these properties. Collectively, all the values of the properties is
    called the *state* of the object. We would then consider objects to be the same,
    or equal to each other, if all values within their *state* match. Within this
    county example, the county containing WVU might have the following state: the
    population is 96,189, the name is “Monongalia,” the state is “WV,” the FIPS is
    54061, and the geometry is the polygon representing the county boundary. Even
    though the other 54 counties within WV have the same value for the state property,
    an object would only be deemed equal to Monongalia County if all properties matched
    Monongalia County’s properties, not just one property.


    Just as each class blueprint has a set of associated properties, it has a set
    of methods, each with specific input parameters and output values. For example,
    the `.append()` method is associated with lists, but not with tuples, as we have
    seen before, because lists can be edited while tuples are immutable. Likewise,
    `.lower()` is only for strings, not dictionaries or lists. The outcome of running
    these methods also depends entirely upon the state of the object. For example,
    every list has a `.sort()` method. The Python code within the `.sort()` method
    will be the same for every list, although the result of sorting the list will,
    of course, vary from list to list based upon its contents. It might even give
    an error message if it contains data types which cannot be sorted, such as objects.


    Another delimiter is used here when working with objects, the period. It is what
    separates the name of the variable containing the object, and the properties and
    methods within that object. This period is what syntactically distinguishes a
    property from a variable and a method from a function.


    When parsing properties, they all have the following generic syntax:


    ```

    object_name.property_name

    ```


    For example, if the variable `monongalia` contains the County object representing
    the county, you can enter `monongalia.population` and it will return the population
    of that county. Meanwhile, using the same property on a different county should
    give access to the population of that county.


    ²Strictly speaking, there is the possibility of optional parameters, so the function
    call can have fewer parameters than the function definition. However, setting
    up this kind of function is beyond the scope of this chapter, so we can act for
    the time being that they must be the same. Chapter 20, Task 3, includes how to
    define a function with optional parameters.'
