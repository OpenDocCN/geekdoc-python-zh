  - "[PAGE 234]\n\n#for each field in the list of keys\n\n#create a list of field\
    \ values for this feature, one per feature class\n\n#compile all the summary values\
    \ for this field\n\n#Put the summary value in the correct column in the output\
    \ row\n\n#use update cursor to populate the new fields in targetFC\n\nNow we will\
    \ fill in after each of the comments. It starts with defining the function using\
    \ the input parameters taken from the UML diagram and getting the list of fields\
    \ from the keys of the dictionary:\n\n```\n#define the function and get the list\
    \ of fields\ndef populateSummaries(fcList, fieldSumDict, targetFC, keyField):\n\
    \    fieldList = list(fieldSumDict.keys())\n```\n\nWe cannot just add these fields\
    \ to the target feature class and call it done, because there can be many summaries\
    \ for each of these fields, and we should have a new field in the target class\
    \ for each field/summary combination. That means creating a new list of all the\
    \ fields that will be added to the target feature class. It is initialized as\
    \ the key ID field, because we will need this later. Then, the remainder of this\
    \ list is generated by looping through the fields in the `fieldList` and creating\
    \ a new field for each of the summary procedures for each field. There is an `if/elif`\
    \ statement in here because while “minimum” and “mean” are acceptable for a field\
    \ name, the “<” and “=” characters that can appear in a less than procedure string,\
    \ notated as “<0.05,” for example, or the “=” in an equality procedure, such as\
    \ “=HH,” are not permitted within field names. The content of the `if/elif` statement\
    \ replaces < with LT_ and any decimal points that may appear with an underscore.\
    \ Likewise, an equals sign is replaced with is_. The one new syntax structure\
    \ here is the condensed way of getting the list of field names. Instead of having\
    \ a for loop stretch over many lines, `[field.name for field in ARCPY.ListFields(targetFC)]`\
    \ tells the computer to create a list because it has square brackets at the outside,\
    \ with the items in the list taken from the `field.name` property of each `field`\
    \ in the list given by `ARCPY.ListFields(targetFC)`. We need to get this list\
    \ because we will get an error message if we try to add a field to a feature class\
    \ that already has the field. Therefore, this is needed for the `if/else` statement\
    \ confirming whether the new field is in the feature class’ existing fields. I\
    \ use the `pass` statement here if it is in the existing fields because it is\
    \ easier to read with the condition in the affirmative, even though I want to\
    \ do something when it isn’t true:\n\n```\n#Add new fields to target feature class\n\
    targetFCFields = [keyField]\nfor field in fieldList:\n    sums = fieldSumDict[field]\n\
    \    for summ in sums:\n        toAppend = summ\n        if summ.startswith(\"\
    <\"):\n            toAppend = \"LT_\" + summ[1:].replace(\".\", \"_\")\n     \
    \   elif summ.startswith(\"=\"):\n            toAppend = \"is_\" + summ[1:]\n\n\
    \        newField = field + \"_\" + toAppend\n        targetExistingFields = [field.name\
    \ for field in ARCPY.ListFields(targetFC)]\n        if newField in targetExistingFields:\n\
    \            pass\n        else:\n```"
  - "[PAGE 235]\n\nARCPY.AddField_management(targetFC, newField, \"DOUBLE\")\n\ntargetFCFields.append(newField)\n\
    \nOnce the fields are established in the target feature class, we can move on\
    \ to the rest of the function by creating the multiCursor. This involves giving\
    \ the cursor a list of both the fields in the dictionary and the key field. However,\
    \ it is necessary to copy the list first because the cursor's list needs to have\
    \ the key field, while fieldList should not. A copy must be made using the .copy()\
    \ method, not just a simple assignment operation, because the assignment operation\
    \ simply has two variables referring to the same list structure in memory, so\
    \ appending a value to one appends it to the other.³ Once that new field is created,\
    \ the multiCursor can be initialized, as well as the list of summary values that\
    \ will be used to store the results of each of the summary calculations:\n\n```\n\
    #Create the multicursor\ncursorFieldList = fieldList.copy()\ncursorFieldList.append(keyField)\n\
    mc = MULTICURSOR.multiCursor(fcList, cursorFieldList, keyField)\nsummaryValues\
    \ = []\n```\n\nNow we can create an update cursor of the target feature class,\
    \ using the fields we have already created and added if necessary. Then loop through\
    \ each of the features within this cursor. Because we initialized the list of\
    \ target fields to begin with the key value, we can now access that value is item\
    \ 0 in the row to ensure we have the appropriate feature ID value when extracting\
    \ all of that feature's values from the multiCursor:\n\n```\n#for each feature\
    \ in an update cursor of the target feature class\nupdate = ARCPY.da.UpdateCursor(targetFC,\
    \ targetFCFields)\nfor row in update:\n    rowID = row[0]\n#extract that feature's\
    \ values using the multicursor.\n    thisFeature = mc.extractFeature(rowID)\n\
    ```\n\nAfter a couple more initializations, which are needed to keep track of\
    \ where in the lists of fields and summary values we are, we can loop through\
    \ the fields in the list of fields taken from the dictionary. We start the summary\
    \ values index at 1 instead of at 0 because the purpose of this index is to track\
    \ where in the update cursor's row we are, and the first item in that row was\
    \ the key ID:\n\n```\n#for each field in the list of keys\ncurrentFieldIndex =\
    \ 0\ncurrentSummaryIndex = 1\nfor field in fieldList:\n```\n\nNow that we are\
    \ looking at each feature/field combination, we need to generate a list of all\
    \ the values for this combination. We can use a shortcut here because thisFeature\
    \ is the extracted data for this feature from the multiCursor. It should be constructed\
    \ as a list of lists such that each of the items in thisFeature refers to a list\
    \ of the values for a specific feature class and that inner list has the values\
    \ in a consistent order, with the desired item always at the position represented\
    \ by currentFieldIndex. Therefore, looping through each of the lists within thisFeature\
    \ and getting the item with the current field index should give us the list of\
    \ all values for this feature/field combination:\n\n```\n#create a list of field\
    \ values for this feature, one per feature class\nvalues = []\nfor cursorRow in\
    \ thisFeature:\n```\n\n> ³This is the second instance I have encountered in which\
    \ Python uses anything resembling call by reference instead of call by value.\
    \ This is the other exception referred to toward the end of Chapter 2, Task 1."
  - "[PAGE 236]\n\n```\nvalues.append(cursorRow[currentFieldIndex])\ncurrentFieldIndex\
    \ = currentFieldIndex + 1\n```\n\nHaving gotten our list of values, we can now\
    \ work through the summaries. This should be straightforward Python to read. We\
    \ get a list of all the desired summary procedures as the value associated with\
    \ the field's key and give the `summarize()` function the information it needs.\
    \ Note that the optional parameters to this function are provided only when they\
    \ are needed and that they are specified through naming the parameter and giving\
    \ it the value with the assignment operator, such as `cat=category` to assign\
    \ the variable category to the parameter `cat`:\n\n```\n#compile all the summary\
    \ values for this field\nsummaries = fieldSumDict[field]\nfor summary in summaries:\n\
    \    if summary.startswith(\"<\"):\n        procedure = \"COUNT_UNDER\"\n    \
    \    threshold = float(summary[1:])\n        thisSummary = SUMMARIZE.summarize(procedure,\
    \ values, threshold=threshold)\n\n    elif summary.startswith(\"=\"):\n      \
    \  procedure == \"COUNT_CATEGORY\"\n        category = summary[1:]\n        thisSummary\
    \ = SUMMARIZE.summarize(procedure, values, cat=category)\n    else:\n        procedure\
    \ = summary\n        thisSummary = SUMMARIZE.summarize(procedure, values)\n```\n\
    \nThe remainder of the function is also straightforward. The value is put into\
    \ the correct slot in the row, and that index gets incremented. Lastly, when all\
    \ the values for that feature have been created and placed into the row, the update\
    \ cursor gets updated. At the conclusion of the function, after all loops are\
    \ done, the update cursor is deleted to ensure there are no lingering locks blocking\
    \ anyone else from using this file:\n\n```\n#Put the summary value in the correct\
    \ column in the output row\nrow[currentSummaryIndex] = thisSummary\ncurrentSummaryIndex\
    \ = currentSummaryIndex + 1\n#use update cursor to populate the new fields in\
    \ targetFC\nupdate.updateRow(row)\n\ndel update\n```\n\nIf you have everything\
    \ entered accurately, and run the code, it will take a while, but finish. If you\
    \ had ArcGIS Pro open with the target feature class, you will need to close that\
    \ feature class so that this program can update that feature class. Please do\
    \ so and answer the next questions.\n\n**Question 4: What is the maximum p-value\
    \ (LMiPValue_MAXUMUM) for Seminole County?**\n**Question 5: How many of the simulated\
    \ iterations had a p-value less than 0.01 (LMiPValue_LT_0_01) for Jasper County?**\n\
    \n# Task 6: Unguided Work\n\nIn the unguided work (Task 7) of Chap. 16, you created\
    \ a new class called Neighborhood. Take the class definition from your Chap. 16,\
    \ Task 7 file, and create a new neighborhood.py file to define that class. Likewise,\
    \ take the Parcel class and place it in a parcel.py file. Then take the remainder\
    \ of that file, name it chapter20_task6.py, and have it complete the same functional-"
