  md: '# Concluding Remarks


    Having made it all the way to the end of the journey here, some perspective may
    be in order. You have taken steps from beginning to program, learning what variables,
    operators, loops, and conditional statements are, all the way to creating your
    own tools and toolboxes within ArcGIS. These tools have include several functions
    you have written yourself, as well as classes you created yourself, spread across
    several files. To go all the way from the start to the finish, here is an accomplishment,
    and for many of you, will provide the skills you need to begin and, hopefully,
    continue a career in GIS using or developing programs for a long time to come.
    Furthermore, I hope you have the skills and confidence to make the transition
    away from Python if and when ESRI changes programming languages. For that matter,
    these skills can help you move from the ESRI line of products to open source GIS
    programs like QGIS.


    Even so, no single book can even attempt to cover the wide range of topics that
    could conceivably fit into the realm of GIS programming. Some of these may be
    useful resources for you if you seek to deepen your knowledge about one or more
    of the following topics.


    # GIS Algorithms


    Perhaps the middle chapters sparked your interest in the nuts and bolts of the
    specific algorithms that enable the GIS to work, such as “how does the computer
    actually take the two geometries and find their intersection?” A couple resources
    for this can be the following books.


    +   - Wise, Stephen (2014). *GIS Fundamentals, 2nd ed.* Boca Raton, FL: CRC Press.

    - Xiao, Ningchuan (2016). *GIS Algorithms.* London: SAGE.

    - Gold, Christopher (2016). *Spatial Context: An Introduction to Fundamental Computer
    Algorithms for Spatial Analysis.* Boca Raton, FL: CRC Press.

    - Lovelace, Robin, Jakub Nowosad, & Jannes Muenchow (2019). *Geocomputation with
    R.* Boca Raton, FL: CRC Press.


    # Web GIS


    Maybe sharing data and code has gotten you interested in working more with Web
    GIS. If so, I can suggest these resources.


    +   - Fu, Pinde (2020). *Getting to Know Web GIS, 4th ed.* Redlands, CA: Esri
    Press.

    - Dorman, Michael (2020). *Introduction to Web Mapping.* Boca Raton, FL: CRC Press.


    # Open Source GIS


    Maybe after the end of this book, you feel confident enough to move away from
    ESRI entirely and you want to start working with or even contributing to open
    source GIS projects. If so, here are a couple places to start.


    +   - Neteler, Markus & Helena Mitasova (2013). *Open Source GIS: A GRASS GIS
    Approach.* New York: Springer.

    - Menke, Kurt, Richard Smith, Jr., Luigi Pirelli, & John Van Hoesen (2016). *Mastering
    QGIS, 2nd ed.* Birmingham, UK: Packt.'
  merge: -1
