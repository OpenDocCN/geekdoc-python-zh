    \ create are accessible as you continue your work.\n\n## Task 4: Parsing Complex\
    \ Statements\n\nThis task looks at how the computer reads complex statements that\
    \ span multiple lines. Recall from Chap. 2 that the computer parses code by looking\
    \ for specific syntax patterns in the code, such as how the assignment operator\
    \ requires a variable name on the left side and an expression on the right side.\
    \ The computer is, in these complex statements, using similar ideas, although\
    \ the patterns are simply more complicated and can cover more than one line.\n\
    \nLooking at a conditional statement, we have the following:\n\n```python\nif\
    \ paid_dictionary[\"Eve Douglas\"]:\n    print(\"send a receipt.\")\nelse:\n \
    \   if student_dictionary[\"Eve Douglas\"]:\n        print(\"Send a bill for $\"\
    , student_price)\n    else:\n        print(\"Send a bill for $\", price)\n```\n\
    \nIt always starts with the keyword if. The computer needs this keyword to recognize\
    \ that what follows is a conditional statement. The if keyword should then be\
    \ followed by an expression that evaluates to a Boolean value.² This is why we\
    \ used the dictionaries to associate the names with a series of True/False values.\
    \ Because expressions can sometimes continue on and on, like x = 1 + 2 + 3 + 4\
    \ + 5, we need to give the computer a signal that the expression is done, and\
    \ can be evaluated. For this reason, the line ends with a colon.\n\nThe statement(s)\
    \ for the then clause, or what to do if the expression is true, immediately follow\
    \ the line with the if keyword. Here, because the person has paid, a receipt should\
    \ be sent. Any number of statements and therefore any number of lines can be in\
    \ the section with the true clause. Therefore, like the need for a colon at the\
    \ end of the Boolean expression, the computer needs some kind of signal that the\
    \ set of statements for the then clause has ended. This is why there is the indentation.\
    \ That’s the part of the pattern, or the invisible delimiter-like character, that\
    \ denotes what is versus isn’t part of the then clause statements. As mentioned\
    \ above, if there is an `else:` clause, the keyword else is at the same indentation\
    \ level as the keyword `if`. Any statements that are in the `else` clause are\
    \ also indented a level beyond the initial keyword, to align with the statements\
    \ in the then clause. If these indentation levels are incorrect, the computer\
    \ will not be able to accurately figure out whether a line is or isn’t inside\
    \ a conditional statement. The same applies to `elif` lines in between the `if`\
    \ and the `else` lines.\n\nWhen the conditional statement is completed, the computer\
    \ can move on to the next line(s) of code, which are aligned with the `if` and\
    \ `else` keywords. The conclusion of the extra level(s) of indentation is what\
    \ tells the computer that the conditional statement is over, and so the next lines\
    \ must be carried out regardless of the value of the Boolean expression at the\
    \ start of the if statement.\n\n```python\nif [condition]:\n    → statement(s)\n\
    elif [condition]:\n    → statement(s)\nelse:\n    → statement(s)\nremainder of\
    \ script\n```\n\nIf any part of this is broken, there will be errors that can\
    \ often be harder to track down than those you encountered in Chap. 2. Behind\
    \ the scenes, Python numbers each of the lines in the complex statement, so that\
    \ `if paid_dictionary[\"Eve Douglas\"]:` is line number 1. Unlike lists, in this\
    \ aspect of programming, we start counting the normal way, at line number 1 instead\
    \ of line 0. However, if the syntax is incorrect, the computer might get partway\
    \ through the remainder of the code to discover it doesn’t work. The computer\
    \ reports, then, the location of the error, but it reports the line on which the\
    \ computer realized there was an error. For example, if you omit the colon, it\
    \ will notice that the code doesn’t fit the pattern when it sees a signal to move\
    \ to the next line before it finds the colon. However, because of that, it discovered\
    \ the error on the next line, line 2, because it only realized there was a problem\
    \ when it jumped to the next line before finding the signal to officially end\
    \ line 1. This means that, even if the computer reports that you have an error\
    \ on line 2, the fix for it may well not be in line 2, but in line 1, or anything\
    \ else that starts prior to the line which found the error.\n\nLoops have similar\
    \ patterns, especially when it comes to using tabs to demarcate blocks of code.\
    \ Another similarity is that both start with keywords that indicate the purpose\
    \ of the upcoming set of commands, `if`, `for`, and especially `while`. The `while`\
    \ statement, like the `if` statement, must be followed by an expression that evaluates\
    \ to a Boolean value, but instead of doing the true side of the flow chart once,\
    \ it keeps on going until that expression is evaluated as false. Again, this means\
    \ that, eventually, the expression must evaluate to false. Therefore, in one way\
    \ or another, you have to ensure that the value of that expression has an opportunity\
    \ to change from true to false. If you don’t, and the expression always remains\
    \ true, this creates an infinite loop. The only way out of an infinite loop is\
    \ to force ArcGIS to close, and hope you saved everything.\n\n```python\nwhile\
    \ [condition]:\n    → statement(s)\nremainder of script\n```\n\nThe `for` loops\
    \ have a bit trickier pattern, because of the added keyword `in`. It has the pattern\
    \ where the `for` keyword must be followed by a variable name, then the keyword\
    \ `in`, and finally a sequence of items to iterate through. Right now, a list\
    \ is the most commonplace sequence you will be using here. Like the other complex\
    \ statements, the statements that fall within the loop must be indented one level.\n\
    \n```python\nfor [variable] in [list]:\n    → statement(s)\nremainder of script\n\
    ```\n\nIn this chapter, we saw conditional statements and loops as well as how\
    \ to develop a flow chart to help you think through the structure of a program.\
    \ Conditional statements contain if/then/elif/else portions, and even if the else\
    \ clause would be empty, it can still be represented in the flow chart to reduce\
    \ the possibilities of confusion. Loops come in two varieties: for and while loops,\
    \ and for both, the flow chart can help structure what is inside, versus outside,\
    \ the loop.\n\n## Task 5: Debugging Exercise\n\nThis is the first of several debugging\
