    \ the name of the instructor to store it in a variable. Type that line and press\
    \ Enter.\n\n```\n>>> inst_name = row[0]\n>>>\n```\n\nNow we can enter the `if/elif`\
    \ statement as one block into the Python Shell. As usual, make sure the indentation\
