    \ process that often leads up to the creation of the package. In many situations,\
    \ whether for creating a package or not, you may find yourself in a position where\
    \ you want to be using more than one Python file. It may be a situation where\
    \ a single file is becoming too long to manage, so you want to break it up. More\
    \ common, though, is a situation in which you realize some parts of the code you\
    \ are writing could be more generically useful and would be beneficial to be a\
    \ separate file that is more readily accessible to a wider range of projects.\n\
    \nThis is the case in the situation that inspired the code for this chapter. I\
    \ was working on a research project in which I created hundreds of feature classes\
    \ of simulated data for statistical analysis. This thus far unpublished project\
    \ looked at the sensitivity of statistical p-values to certain geographic situations,\
    \ and I assessed this sensitivity by comparing the results of LISA analysis of\
    \ the US 2016 presidential election against LISA analyses of randomly simulated\
    \ data. There were 100 simulations for each LISA analysis, each of those simulations\
    \ being in its own feature class. For part of this work, I wanted to create a\
    \ list of the values for each county across all 100 simulations and find the minimum,\
    \ maximum, mean, standard deviation, and other analytical summaries for this list\
    \ of numbers. The standard approach for GIS would have been to join all the simulation\
    \ feature classes, but joining 100 feature classes seemed like overkill for this\
    \ situation. While I could perhaps have had 100 cursors stepping simultaneously\
    \ through the feature classes, there isn’t any guarantee that they will have all\
    \ features in the same order, which is necessary for the summaries I was computing.\n\
    \nTherefore, instead, I decided to create a class called a multiCursor that can\
    \ act like a cursor in stepping through the files, but where a cursor returns\
    \ a list for the single row corresponding to that feature’s entry in the attribute\
    \ table for the feature class associated with that cursor, in the multiCursor,\
    \ it returns a list of lists, with each internal list corresponding to that feature’s\
    \ entry in one of the feature classes and the overall list containing one list\
    \ for each of the feature classes provided to it. It would also be useful if the\
    \ multiCursor also has methods to support finding all values associated with a\
    \ specific feature, and to support finding all values associated with a specific\
    \ field.\n\nThis concept of a multiCursor can be useful in additional situations,\
    \ not just this specific p-value investigation, so I wanted it to be a separate\
    \ Python file that can be accessed. Likewise, I felt that the function carrying\
    \ out the summary statistics could also be more broadly useful, so set that out\
    \ as its own file. Then there is a third file for this specific research project.\n\
    \nAs this project becomes more complex, there should be a way to organize the\
    \ structure and represent it, to ensure that all parts get completed, and that\
    \ it is easier to identify the relevant parts of the code for later communication\
    \ about it. This way is using a Unified Modeling Language, or UML. It was briefly\
    \ introduced in Chap. 12 to show the connections between different classes involved\
