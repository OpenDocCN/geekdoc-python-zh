    TechIssues\\data\\Ohio_simple.shp\")\n<arcpy._mp.Layer object at 0x000002AA0CE89BA8>\n\
    ```\n\nBefore going any further, you might want to save the script. There is no\
    \ direct “Save As” menu item within the Python Window, and you have probably recognized\
    \ through an earlier lab that saving the project does not, in fact, save the contents\
    \ of the Python Window, even if it saves the contents of a Python Notebook. The\
    \ way this saving is done is to right-click in the main part of the Python Window,\
    \ and choose “Save Transcript.” This brings up a “Save As” dialog box. Give your\
    \ file a sensible name. To confirm that it was saved, right-click again in the\
    \ main part of the Python Window and choose “Clear Transcript.” This makes the\
    \ Python Window empty again. To reload the transcript, right-click in the lower\
    \ line, where you had been entering the code. Choose “Load Code.” This will bring\
    \ up a dialog box, and you can navigate to the file you just created. You should\
