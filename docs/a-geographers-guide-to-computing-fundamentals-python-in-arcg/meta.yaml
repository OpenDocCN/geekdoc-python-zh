    you save your work as an ArcGIS Pro project (either the .aprx project or the .ppkx
    packaged project), the contents of the Python Window are not preserved. That means
    we should start with setting up the relevant variables before continuing here.
    This chapter, as well as Chaps. 4 and 8, is written to use the Python Notebook,
    which has been added in ArcGIS Pro version 2.8, because it provides a more direct
    means of recording and saving the work.¹


    Go to ArcGIS Pro and start a new Python Notebook. There are a couple ways to do
    this. I usually go through the Python Notebook button in the Analysis ribbon.
    The notebook has a small set of menus at the top, along with some buttons. Under
    that, you should have a blank box with `In [ ]:` next to it. This is where our
    Python code will go. Enter all of the following lines into the box:


