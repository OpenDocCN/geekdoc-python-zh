  md: 'Python handles the bookkeeping of which data type is contained in each variable
    behind the scenes, making it very easy to change the type of the variable. We
    simply reassign the value. This is equivalent to taking the text string “$100.00”
    out of the box labeled price and putting the number 100 into it.


    +   - Type `price = 100.00` and press Enter.

    - Now we want to reenter `student_price = price * 0.5`. You can press the up arrow
    key twice to bring back this line, as the up and down arrow keys navigate forward
    and backward in the history of the Python statements you have entered during this
    session. Once you have it, press Enter.

    - Lastly, type `print(student_price)` and press Enter to confirm its value.


    ```

    >>> price = 100

    >>> student_price = price * 0.5

    >>> print(student_price)

    50.0

    ```


    There are several data types in Python, and all programming languages, for that
    matter. Some of the most common ones are text strings; integers, which in Python
    are called short and long types; real numbers, which in Python are float and double
    types; Boolean variables, which are True or False; sequences, which will be covered
    in more depth shortly; the `none` type, which corresponds to an empty box; and
    other, more complex custom-designed object types, such as an ArcGIS feature class
    or map legend. Continuing the box analogy, we can represent them with different
    colored boxes. Text strings are green; numbers are blue, with integers darker
    than real numbers; a Boolean value is orange; and the `none` type is red (Fig.
    2.4).


    ![](img/37990581b275bdf7d510c6f2d9702a31_23_0.png)


    There are different integer types with obscure names, as well as different real
    number types with obscure names for the following reason. All numbers have to
    be represented in binary—that is, 0s and 1s. Computers are designed such that
    each number should be a consistent number of binary digits (aka bits) long. In
    the early days of computer programming, they figured that 32 bits would be sufficient,
    as it can take 2^32 distinct values, ranging from about -2.15 billion to 2.15
    billion. Engineers and programmers soon realized that this wasn’t enough. Because
    many operations were developed with a 32-bit number in mind, they created a different
    data type that is 64 bits. To distinguish them, they are called short integers
    and long integers, which gives you the data types `short` and `long`. Real numbers
    are more complicated. They break the 32 bits into two parts and use scientific
    notation, representing 504.16 as 5.0416 * 10^2. The larger part is the mantissa
    (5.0416) and the smaller part is the exponent (2). Because of the exponent, the
