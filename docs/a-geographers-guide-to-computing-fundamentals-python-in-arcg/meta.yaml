    \ the Python system that this is intended to be a package.\n\nThe other file we\
    \ need is up one directory, in the first chapter21 folder, alongside the inner\
    \ chapter21 folder. It is to be called setup.py, and it has information about\
    \ the package. There is also a strict structure for this file. It gives the metadata\
    \ about the package through a `setup()` function, which should look very much\
    \ like this. The names of the input parameters for the `setup()` function are\
    \ mostly self-explanatory. The ones that might not be as readily apparent are\
    \ the last three. The packages parameter uses the `find_packages()` function to\
    \ extract everything from the chapter21 folder, as specified in the where parameter\
    \ to the `find_packages()` function. The license parameter specifies a usage license\
