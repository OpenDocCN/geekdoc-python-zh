  md: '# Putting It All Together


    # 17


    # Introductory Comments: Turning Specifications into a Program


    This chapter is structured differently from the others but provides an opportunity
    to develop a simple GIS application all on your own. However, it may also be the
    most useful if you will use GIS in your job or research. The scenario is one in
    which you are given specifications and have to create a tool. I provide below
    an illustrative example of how I would work through that process. While there
    is no hard and fast way of programming that will be guaranteed to work for everyone,
    there are a few principles that apply to everyone: the importance of planning
    and the inevitability of debugging. In the illustrative example, that is, in lieu
    of the guided tasks, I work through the planning process I would use and show
    you that, even as someone who first learned programming in 1995, I still make
    my fair share of bugs.


    The general principle is that many of the programming situations you will encounter
    are unguided, to put it mildly. Imagine being told by a supervisor to write a
    program to add a tool that does *this* in ArcGIS Pro, whatever *this* may be.
    They won''t tell you what objects and functions you will need. They might not
    even have the right data for you to evaluate whether the tool works. All you will
    get is a set of tasks that the tool is supposed to accomplish for the user. In
    another setting, you might find yourself thinking “it would be better if I had
    a tool to do *this*,” and your observations take the place of the supervisor.
    Even then, you have no direct guidance, just instructions, and possibly a deadline.
    What do you do then?


    The tools that I use are the ones that we have used throughout the book—pseudocode
    and flow charts. Others may have different strategies. Regardless of the form
    it takes, as you work through the tasks at the end of this chapter, I encourage
    you to take the planning part seriously and move from the plans to the scripts
    early enough to have time to carry out the inevitable debugging. The following
    example shows one way of accomplishing this.


    # Illustrative Example


    The files for this example are a GIS file of cities in Europe and a CSV file of
    airport connections¹ between these cities.


    Given these files, suppose I am asked to develop a tool to assist the airport
    planners in ensuring enough fuel is stocked. They recognize that the amount of
    fuel needed per day is related to the total length of flights departing the airport.
    For this task, make the unlikely assumption that there is exactly one flight per
    day leaving each city for all of its connections. In other words, no routes are
    flown more than once per day, and they are flown every day. This means we want
    to sum up the lengths from a specified city to all places connected to that city.


    The tool I am to develop will allow the user to type in a city name, read the
    CSV file, find all the cities connected to the provided city, calculate the sum
    of distances from the provided city to all of these connected cities, and lastly
    report this sum of distances within an ARCPY message. Additionally, it should
    give a sensible error message if that city is not found in the dataset and give
    a warning if that city has no connections.


    With this task, the first thing I would do is take a look at the datasets. The
    cities file looks straightforward within ArcGIS. It is a point-based file, with
    a few attributes, although this calculation will need the geometries instead.


    ¹Not actual connections. I made them up, but think they are pretty plausible,
    at least as a subset of likely connections.'
