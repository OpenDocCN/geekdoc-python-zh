  md: 'The last form of sequence that we will look at is a dictionary. Dictionaries
    are not ordered, but they have pairs of items associated with each other, much
    like a dictionary associates words with their definitions. It doesn’t matter what
    the 42nd word in the dictionary is, as long as you can find its definition. In
    this scenario, we would want to associate each participant with whether or not
    they have paid yet.


    Constructing a dictionary can take several steps.⁷ We will first set up an empty
    dictionary. Where tuples use parentheses, and lists use square brackets, dictionaries
    use curly braces.


    +   - Type `paid:dictionary = {}` and press Enter.

    - We now need to enter each person with their payment status. Adding an item to
    a dictionary is through the following syntax:


    `dict_name[key] = value`


    - Note, again, the use of brackets instead of parentheses or curly braces. In
    this example, the key is the participant’s name, and the value is their payment
    status. Enter the following lines, pressing Enter after each one:


    - `paid:dictionary["Alice Scholl"] = True`

    - `paid:dictionary["Eve Douglas"] = False`

    - `paid:dictionary["Fred Jackson"] = False`

    - `paid:dictionary["John Smith"] = True`

    - `paid:dictionary["Monty Adams"] = True`

    - `paid:dictionary["Robert Waters"] = False`

    - `paid:dictionary["Tyler Rose"] = True`

    - To look at the dictionary, enter `paid:dictionary` and press Enter.


    ```

    >>> paid:dictionary = {}

    >>> paid:dictionary["Alice Scholl"] = True

    >>> paid:dictionary["Eve Douglas"] = False

    >>> paid:dictionary["Fred Jackson"] = False

    >>> paid:dictionary["John Smith"] = True

    >>> paid:dictionary["Monty Adams"] = True

    >>> paid:dictionary["Robert Waters"] = False

    >>> paid:dictionary["Tyler Rose"] = True

    >>> paid:dictionary

    {''Alice Scholl'': True, ''Eve Douglas'': False, ''Fred Jackson'': False, ''John
    Smith'': True, ''Monty Adams'': True, ''Robert Waters'': False, ''Tyler Rose'':
    True}

    ```


    You can see that there are pairs of keys and values, printed together with colons
    in each pair. While in this case, they were printed in the same order in which
    they were added, this is not guaranteed because dictionaries, unlike lists and
    tuples, do not have an inherent ordering.


    To get a list of the keys in a dictionary, which in this case is a list of participants,
    a two-step process is needed. It starts with the `.keys()` method of the dictionary,
    but this does not return a list. It instead returns something called a View, which
    can be turned into a list through the `list()` function. Since we have no need
    of the View, we don’t need to create a variable to hold it. Instead, we can take
    that and put it directly into the list function as below. This highlights another
    element of parsing more complex lines of code. The input to a function is what
    is between the parentheses following the function name of list. Just like in algebra,
    you evaluate things inside parentheses before doing anything else. That means
    the expression of `paid:dictionary.keys()` gets evaluated, and the result of that
    evaluation gets put into the `list()` function.


    +   - Type `list(paid:dictionary.keys())` and press Enter.


    > ⁷This is one way of creating the dictionary. There are others that can create
    it in a single, lengthy, line of code. I prefer this approach, especially as it
    can work well with loops, which we will see in the next chapter.'
