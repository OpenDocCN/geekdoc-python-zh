    ## Springer Textbooks in Earth Sciences, Geography and Environment


    The Springer Textbooks series publishes a broad portfolio of textbooks on Earth
    Sciences, Geography and Environmental Science. Springer textbooks provide comprehensive
    introductions as well as in-depth knowledge for advanced studies. A clear, reader-friendly
    layout and features such as end-of-chapter summaries, work examples, exercises,
    and glossaries help the reader to access the subject. Springer textbooks are essential
    for students, researchers and applied scientists.


    Jamison Conley


    ## A Geographer''s Guide to Computing Fundamentals


    Python in ArcGIS Pro


