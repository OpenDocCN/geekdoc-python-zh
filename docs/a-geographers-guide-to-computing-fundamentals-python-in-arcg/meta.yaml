  md: '# Reading a Python Script


    # 5


    # Introductory Comments: The Value of Documentation and Comments


    The previous exercises introduced basics of Python scripting. There are many scripts
    that you can find online, so it is common to take a script you find elsewhere
    and try to run it and identify what it does. Code repositories, such as GitHub,
    provide many scripts, but they do not exist merely as an assortment of files containing
    Python code. Instead, there are structures in place to help you determine what
    the code does. These structures are documentation and comments. Both of these
    help us, as the programmer, translate between English and the Computerese of Python.
    Documentation is information provided external to the computer code. It is typically
    web pages or documents that provide a detailed guide for users of the code, such
    as a listing of what every object does, its properties, its methods, as well as
    a sample piece of code calling the function or using that object. Comments, on
    the other hand, provide information within the code itself. It is usually more
    fine-grained, looking at individual blocks of code within the file and explaining
    them. Another way of looking at the distinction between documentation and comments
    is what the audience is. Documentation is for people who want to use a file, while
    comments are for people who want to edit a file.


    The other thing being introduced in this chapter is the Integrated Development
    and Learning Environment (IDLE), which is the third way we will be looking at
    Python code in this book. Where the ArcGIS Pro Python Window is useful for working
    with Python code one line at a time, and the Python Notebook is useful for discrete
    blocks or snippets of code, the program called IDLE serves as a platform for running
    and editing Python programs that span an entire file (or more than one file—see
    Chap. 20). This introduction to IDLE will start out with a program that has already
    been written.


    In this chapter, you will build upon the GIS training example from the previous
    chapters and examine a new script doing something you haven’t encountered yet.
    You will interpret what the script does by opening it, stepping through it in
    IDLE, and using online help documentation to figure out commands and functions
    you have not yet encountered. Doing so is much like detective work, finding clues
    of what the script may be doing, comparing that with knowledge you already have
    and commands you have used, and searching for additional information to solve
    the problems of identifying and learning what the unfamiliar parts of the script
    are doing. To fit their purpose, you will examine documentation from the perspective
    of a user, employing existing documentation to help you decipher the script, and
    you will use comments to annotate the code in this script as if you were needing
    to share it with someone else.


    # Task 1: Importing a Python File into IDLE


    You have been given a script called reading_python_script.py and it is up to you
    to figure out what it does. You also have two data files we have been using to
    manage the training: participants.csv and instructors.csv. We will use IDLE to
    run the file.


