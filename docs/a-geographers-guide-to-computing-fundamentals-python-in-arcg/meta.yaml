  md: 'You should then find that there are nine cities in the new layer called `springfields`.


    Just as accessing data through an online service looked very similar to accessing
    data on your hard drive, there is little functional difference between using a
    regular tool in an ArcGIS Pro toolbox versus using a tool that accesses an online
    service. In this case, we want the Generate Drive Time Trade Area tool within
    the Business Analyst extension. Looking at its documentation, just as we would
    with any other tool, we can see that it requires an input point layer from which
    the drive time polygons will be based, an output feature class to store the results;
    what travel mode will be used, such as Driving Time, Walking Time, or Trucking
    Distance; and the distance that is used for the polygon boundaries, such as 60
    minutes or 100 kilometers. In this case, we want to ensure the starting points
    are the cities named Springfield, giving a sensible output name, and set up a
    driving time of 60 minutes. This gives the following line:


    ```

    arcpy.ba.GenerateDriveTimeTradeArea(''springfields'', ''springfields_hour_away'',
    ''Driving Time'', 60, ''MINUTES'')

    ```


    This might take a while, depending upon how many processing requests the ESRI
    servers are dealing with at the moment, but you will have a map with drive-time
    polygons representing an hour from each of the nine Springfields in this dataset.
    Note that your polygons may look somewhat different from one time to another because
    of differing traffic conditions. As such, the answer to Question 3 is not guaranteed
    to be fully consistent from one iteration running this tool to another iteration
    of the same tool.


    # Question 3: How many states intersect the Springfield polygons?


    # Task 3: Create your own online service


    Having used services set up by others, you may wish to move on to creating your
    own service for sharing data that you have. Sharing tools through a Python package
    is more complex than sharing data and is covered in Chap. 21, so we will focus
    here on sharing data.


    This requires having a connection with your ArcGIS Online account and its associated
    data portal, so the first thing we will do is sign into that portal. The `arcpy.SignInToPortal`
    built-in function accomplishes this for us, and it takes as input parameters the
    site you are signing into (arcgis.com) your ArcGIS Online account username and
    password. In the example below, I have altered both the username and password:


    ```

    arcpy.SignInToPortal("https://www.arcgis.com", "UsernameRedacted", "PasswordRedacted")

    ```


    As output, you will see a dictionary of information about the account, but this
    is not something we will use in the remainder of the task. Setting up the data
    so that it can be uploaded through the service is a process that takes multiple
    stages. The first of these stages is creating a draft of the service on your local
    computer. That way, you can make sure everything is as you want before you submit
    it for online sharing.


    This is ultimately through the map''s `getWebLayerSharingDraft()` method, but
    that has enough input parameters that we need to initialize a few things before
    we can get there. First, as we are creating a draft of the service on the local
    hard drive, we need to know where it is going. This is set up through an output
    directory of wherever you want to put this:


    ```

    outdir = "D:\classes\TechIssues\labs\Python\Chap18"

    ```


