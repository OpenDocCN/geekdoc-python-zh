    # 16


    # Introductory Remarks: Strategies for Creating and Managing Classes


    Once again, this chapter continues the progression of making the usability of
    ArcGIS Pro better within the context of approving or denying building permits
    for a city. This requires changes, again to the tool, to align it better to the
    purpose of having a tool. In this case, we will change it to carry out more of
