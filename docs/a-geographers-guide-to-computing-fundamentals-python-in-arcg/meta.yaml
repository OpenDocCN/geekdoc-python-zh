    # Tables and Cursors


    # 10


    # Introductory Comments: How a Computer Represents Tables


    In Chap. 8, we were introduced to accessing data within ArcPy, and Chap. 9 discussed
    rasters. This chapter moves toward vector data, but focuses on a superclass of
    all vector data: tables. Tables are represented within the computer as, in a sense,
    the grids that the raster data structures worked so hard to avoid. The tables
    are organized in rows and columns, and each cell corresponding to a row/column
    combination has exactly one value. The number of entries in the typical table
    is much fewer than the number of cells in a raster, and neighboring values are
    much less likely to be the same, so there is no attempt to compress the file size.


    To access and manipulate the data in the tables, we use a set of tools called
    cursors. These cycle through the rows in the table, one at a time, much like the
    `csv.reader` class allowed us to look at the contents of a csv file. Therefore,
    they work on tables and any subclasses of tables, namely, vector data, as those
    are the data types with attribute tables. With the name cursor, you can think
    of them the same way you think of the cursor in a word processor: something that
    marks the place where you are. However, instead of marking where in a text document
    you are typing, these cursors mark the row in a table that ArcGIS is working with.
    It always follows a few rules, so it isn’t as flexible as a cursor in a text document.
    It must start at the top of the table, just before the first row, so that the
    first call of the `next()` method, explained below, moves it to the first row.
    It examines each row one at a time, and each time it finishes with a row, it must
    move to the next row—no skipping around. Lastly, once it reaches the end of the
    table, after it has finished examining the last row, the cursor just sits there
    rather than returning to the top of the table. This last part might seem odd,
    but becomes useful when we use `for` loops to work with cursors. If it returned
    to the beginning to keep going, a `for` loop could become an infinite loop and
    never stop! Figure 10.1 illustrates these rules, with the blue arrows representing
    the position of the cursor.


    Instead of just one type of cursor, ArcPy has provided three different cursors
    for us to use, all of which are in the `arcpy.da` module (for data access).¹ The
    first, and simplest, is a search cursor. It is used to access and subset the data,
    but does not have writing privileges to the dataset. If you want to edit the dataset,
    you will instead need an update cursor. It allows values in the table to be edited,
    and entire rows to be deleted. However, it does not add new rows. This requires
    an insert cursor, whose job is to add new rows to the table.


    # Task 1: Introduction to Search Cursors


    This election feature class has data for many statewide elections, for senate,
    governor, and president, both primary and general elections. We will use all three
    kinds of cursors to answer questions and add a couple fields to the feature class,
    using data from the table.


    > ¹There is also a set of three cursors in the general ArcPy module, but these
    are emphatically not recommended; they are only provided for “backward compatibility,”
    meaning the ArcPy people don’t want to get rid of them just yet because old scripts
    using then will become broken, but any new scripts should not use them.


    **Supplementary Information:** The online version contains supplementary material
    available at [https://doi.org/10.1007/978-3-031-08498-0_10].'
- md: "## 10 Tables and Cursors\n\nItem 1: In the 2012 Democratic primary, President\
    \ Obama lost several counties to political unknown Keith Judd.² We will use a\
    \ search cursor to identify which counties these are. As the purpose of a search\
    \ cursor is to subset the data, it usually uses a query. This is not required,\
    \ however, if you want to read (but not edit) data from all rows in the table.\
    \ The first line below creates the cursor, and it is very similar for all three\
    \ types of cursors, at least in the terms of which parameters are required or\
    \ frequently used. These are the three parameters used below, which are the first\
    \ three that are described in the documentation. Please use the documentation\
    \ to answer question 1.\n\n**Question 1: The first three parameters for the arcpy.da.SearchCursor()\
    \ function are the ones you are most likely to use. What is the role of each of\
    \ them?**\n\nOpen a Python Notebook and run the following lines, being careful\
    \ about the variable names. The output of this is the answer to question 2, so\
    \ it is not printed below.\n\n```\nsearch = arcpy.da.SearchCursor(\"WV_elections2016\"\
    , [\"Name\"], \"\"Obama12PPV\" < \"Judd12PPV\"\")\nfor county in search:\n   \
    \ print(county[0])\n```\n\n**Question 2: (10 points) Which counties gave more\
    \ votes to Mr. Judd than Mr. Obama?**\n\nYou may notice that the `print` statement\
    \ accesses the name through `county[0]`. The use of brackets is a clue about `county`'s\
    \ nature: it is a list. Not only that, but it follows a predictable structure\
    \ based upon the code you give it. Recall from this chapter's introductory remarks\
    \ that the cursor must proceed through the table one row at a time. Each time\
    \ through the loop, `county` is referring to the next row in the Table. At first,\
    \ you might expect then that it is a list of all the values of the cells in that\
    \ row. However, that would be more cells than we need. Instead, each item in the\
    \ list contained in the `county` variable is the value corresponding to the same\
    \ index in the list of attributes from the second input parameter. This means\
    \ that in the example above, `county` is a list of exactly one item: the name\
    \ of the county. With a query specified, the `for` loop will only access entries\
    \ which meet that cursor’s criterion. This means that the SearchCursor represented\
    \ by the `search` variable has selected out only those counties which voted for\
    \ Judd in this primary election. It is as if the search cursor checks the first\
    \ row for whether that query’s criteria are met, and provides that row if and\
    \ only if the criteria are met. If not, it skips to the next row and checks that\
    \ row, and continues the process until it either reaches the end of the table\
    \ or it reaches another row that meets the criteria and provides that row. In\
    \ this way, only the subset of counties which voted for Judd is selected out without\
    \ having to use the `Select()` function as in Chap. 7.\n\n²Also, inmate at a federal\
    \ penitentiary.\n\n## Task 2: Introduction to Update Cursors\n\nItem 2: In the\
    \ Republican primary of that year, the number of total votes seems to be mistakenly\
    \ calculated, since all the values are zero. We will want an update cursor to\
    \ fix this problem. Because this now requires editing the data, we need to have\
    \ an update cursor, rather than a search cursor.\n\nFirst, let’s create the update\
    \ cursor. Enter the following line into a new Notebook cell. You will notice its\
    \ similarity to how the search cursor was created. It is, indeed, the same syntax\
    \ and same input parameters, but without the search query this time. Again, pay\
    \ close attention to variable names: there are many similar variable names, and\
    \ all the candidate names are all truncated to five characters to fit a naming\
    \ convention.³\n\n```\nupdate = arcpy.da.UpdateCursor(\"WV_elections2016\", [\"\
    Romne12PPV\", \"Santo12PPV\", \"Paul12PPV\", \"Gingr12PPV\", \"Roeme12PPV\", \"\
    Tot12Rep\"])\n```\n\nNow, to make the corrections, we will calculate the total\
    \ votes cast field as the sum of the individual candidates’ totals, and add those\
    \ to the table. As with the search cursor, `county` is a list referring to each\
    \ row’s values as the cursor cycles through the rows one by one, and the elements\
    \ of that list are the values corresponding to the list in the second input parameter\
    \ to the `UpdateCursor` constructor method that created the `update` variable.\n\
    \n```\nfor county in update:\n    county[5] = county[0] + county[1] + county[2]\
    \ + county[3] + county[4]\n    update.updateRow(county)\n```\n\nWhen trying to\
    \ edit files, you may be familiar with messages that tell you a certain file is\
    \ locked for editing by another application. Update cursors like this are one\
    \ of the applications that can and will do this. This means we have to remove\
    \ that lock on editing to make sure things behave well if we want to use another\
    \ update or insert cursor. This is accomplished by deleting the variable storing\
    \ the update cursor, because deleting it also deletes any associated locks from\
    \ memory. This uses a new keyword: `del`.\n\n```\ndel update\n```\n\nLook in the\
    \ attribute table. The Tot12Rep column should be filled in with numbers now. Right-click\
    \ on the column header and choose statistics.\n\n**Question 3: What are the mean\
    \ and standard deviation of the total votes cast by county in the 2012 Republican\
    \ presidential primary?**\n\n## Task 3: Deleting and Inserting Rows\n\nImagine\
    \ you have just received the results from the 2018 election, and want to add it\
    \ into your feature class of election results so that you may compare Senator\
    \ Manchin’s results in 2018 against those from 2012. However, this is not a straightforward\
    \ join, as the structure of the 2018 election results doesn’t completely match\
    \ that of our general feature class. Open up the table in the .gdb that was provided.\
    \ You should notice a few things: First, the second row is a description of the\
    \ headers. While this is useful information, it does not have a counterpart in\
    \ the feature class, so we will want to remove it. Also, if you look closely,\
    \ you might notice that a county is missing: Monongalia County! So we want to\
    \ delete the information in the second row, and insert a new row for Monongalia\
    \ County.\n\nTo delete a row, we again want an update cursor, but this time, for\
    \ the table with the 2018 results. First, notice that we are only accessing the\
    \ name attribute. Second, there is a query to ensure we are only looking at the\
    \ information row, by asking whether the attribute “Name” matches the value “County\
    \ Name.” You might notice that the attribute name (of NAME) is in double quotes,\
    \ while the value of the attribute (County Name) is in single quotes. This is\
    \ how SQL is set up. However, to achieve the string of “NAME” = ‘County Name’,\
    \ we need to use the escape character ‘\\’ to indicate that we want to include\
    \ a single quote mark at this spot in the string. It is needed to allow Python\
    \ to recognize the difference between a quote mark that is a character in the\
    \ text string and a quote mark that ends the string.\n\nLastly, because deleting\
    \ rows is not something that can be undone, I have written a double check into\
    \ the code, by again seeing if the name has the value of “County Name.” This way,\
    \ we are making absolutely sure we do not accidentally and permanently delete\
    \ the wrong row(s). At the end, we will again need to delete the cursor.\n\n```\n\
    update = arcpy.da.UpdateCursor('WV_election_2018_only', [\"NAME\"], '\"NAME\"\
    \ = \\'County Name\\'')\nfor row in update:\n    print(row)\n    if row[0] ==\
    \ \"County Name\":\n        update.deleteRow()\ndel update\n```\n\nNext, we need\
    \ an insert cursor to add the data for Monongalia County. The insert cursor gets\
    \ set up similar to the other two, with the name of a layer, and a set of attributes.\
    \ This time, however, we are going to tell the computer what values to put into\
    \ these attributes for the new row(s) instead of extracting those cell values\
    \ from the table. As you enter the code below, take special care with the tuple\
    \ of the second line. Note that there are two pairs of parentheses. The first\
    \ indicates the input parameter for the insertRow() function. The input parameter\
    \ is itself a tuple, also using a pair of parentheses, providing the values that\
    \ will be added to the table. In this situation, be careful and read over your\
    \ values (at least) twice before running the cell in the Notebook. These values\
    \ must be in the same order as the list of parameters used when creating an insert\
    \ cursor, because the computer is not smart enough to rearrange them if you made\
    \ any mistakes. It is a challenge (but possible) to edit them after the fact.\n\
    \n```\ninsert = arcpy.da.InsertCursor('WV_election_2018_only', [\"NAME\", \"FIPS\"\
    , \"Manch18SGP\", \"Morri18SGP\", \"Holle18SGP\"])\n\ninsert.insertRow((\"Monongalia\"\
    , 54061, 58.19627104, 35.2796717, 6.524057259))\ndel insert\n```\n\nAfter running\
    \ these lines, close the table (if it was open) and reopen it. Take a look to\
    \ confirm that the insert cursor worked.\n\n**Question 4: What is the value for\
    \ Monongalia County for most attributes? Why did this happen?**\n\n## Task 4:\
    \ More Advanced Use of Cursors\n\nIf this has been done correctly, we can now\
    \ use cursors again to put the 2018 senate general election percents into the\
    \ existing feature class. We only want these columns, not the entire set of 2018\
    \ attributes, because with the two elections for the state supreme court, and\
    \ the amendments, there are many results in this 2018 election file that we do\
    \ not need. This means that a join might be overkill, even though the data is\
    \ there and (if task 3 was done correctly) done in such a way that a join is now\
    \ possible. Instead, we will use cursors to add just the three desired columns.\n\
    \nBefore this happens, though, it is helpful to consider what is needed, and plan\
    \ out the task with a flow chart. The core of the task will be taking the values\
    \ that are extracted from the table and put them into the feature class. It should\
    \ by now be clear this will require an update cursor. So let’s start out our flow\
    \ chart.\n\n³Candidate (5 characters) + year (2 characters) + office (President,\
    \ Governor, or Senate) + election type (Primary or General) + attribute type (Vote\
    \ total or Percent)."
  mdcn: "## 10 表格与游标\n\n项目1：在2012年民主党初选中，奥巴马总统在几个县输给了政治素人基思·贾德。² 我们将使用搜索游标来识别这些县。由于搜索游标的目的是对数据进行子集筛选，它通常使用查询语句。不过，如果你想读取（但不编辑）表中所有行的数据，则不是必需的。下面第一行代码创建了游标，对于三种类型的游标来说，这行代码非常相似，至少在所需或常用参数方面是如此。以下是使用的三个参数，它们是文档中描述的前三个参数。请使用文档来回答问题1。\n\
