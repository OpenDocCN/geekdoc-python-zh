    work within the Python Window. Just enter the first group of lines in this task
    to ensure all the relevant variables created in Chap. 2 are accessible and skip
    to Task 2. To save, though, you’d need to right-click in the upper portion of
    the Python Window and choose “Save Transcript.” This will save both the code you
    entered and the resulting output, including any and all error messages.


