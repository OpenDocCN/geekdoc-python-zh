    ## ArcPy 中的数据结构与编程


    本书的第一部分向你介绍了 Python 编程的基础知识。到现在，你可能想知道我们是否会进入本书的 ArcGIS 特定部分。本节就是开始的地方。任何上过入门
    GIS 课程的人都知道数据结构在 GIS 和地理处理中的重要性。表格、矢量、栅格和其他数据结构的使用对于任何 GIS 工作都是不可避免的。这些结构对于在 GIS
    环境中进行编程同样至关重要，因为毕竟你几乎肯定是在使用 Python 代码在 ArcGIS Pro 中使用这些相同的 GIS 数据结构来执行分析步骤。本节重点介绍数据结构，包括它们在
    GIS 中的表示方式以及 Python 如何访问它们。


    在 ArcGIS Pro 中访问 GIS 数据结构需要使用 ArcPy 模块。该模块在第 7 章中介绍，同时更详细地讨论了面向对象编程，因为这种方法在 ArcPy
    中访问 GIS 数据和工具时被大量使用。第 8 章更明确地转向 ArcPy 中的 GIS 数据结构，允许你确定未知数据集的数据类型。接下来的三章更详细地探讨了三种最常见的
    GIS 数据结构：栅格、表格和矢量。本节的最后几章将数据结构讨论扩展到编程的数据结构，以及 Python 对象如何提供一种非常结构化的方法来表示在 GIS
    中创建和操作地图所固有的信息或数据。这两章分别探讨了制图学的符号方面和布局方面。


