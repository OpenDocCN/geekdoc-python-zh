    \n地图框被下一种类型的元素引用，即图例元素。毕竟，图例提供了地图内容的视觉描述，因此它需要能够引用地图框以访问其描述的内容。它还有一个LegendItems列表，其中包含这些描述。图例项内容的顺序在arrangement属性中。\n\
    \n我们将在本章中使用的另外两个布局元素是最直接的。文本元素包含文本，因此指的是地图标题或致谢等内容。地图周边元素的性质从其名称上不那么明显，但它指的是地图的其他辅助元素，如指北针和比例尺。\n\
    \n以下任务向你介绍并让你使用其中一些元素，以改善数据的制图呈现。作为初步说明，值得承认arcpy在这方面的局限性。可以在地图上移动元素，并在某些有限的情况下编辑它们。但是，严格在arcpy内无法创建地图元素，无论是地图框、图例、指北针还是其他任何东西。因此，我们将在此练习中混合使用图形用户界面（GUI）和Python窗口。即使在这种有限的设置下，使用arcpy仍然很有用，因为它可以让你对布局进行非常精细的控制，并能够记录布局中每个元素的确切位置，以便可以用相同或不同的数据重新创建它。\n\
