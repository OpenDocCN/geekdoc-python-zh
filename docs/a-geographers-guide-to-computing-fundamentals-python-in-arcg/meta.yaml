    \ Even if the terminology may change, packages are used across many programming\
    \ languages and environments and have been used for decades.\n\nThe primary advantages\
    \ of packages are their portability and their structure, and these are interrelated.\
    \ The portability is evident in how many packages are shared through various online\
    \ code repositories, such as GitHub or PyPI, the Python Package Index. By having\
    \ packages available in these central repositories, it becomes much easier both\
    \ to share your code for a wider audience and to find code that others have shared.\n\
    \nThis portability only works, however, when there is a common structure underlying\
