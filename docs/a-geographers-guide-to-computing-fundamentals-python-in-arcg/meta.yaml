    \ of topics, which will also be initialized to zero and incremented by one each\
    \ time we go through the loop.\n\n**Question 1: Please enter code to create these\
    \ variables into a new, empty code block, and click Run.**\n\nRecall from above\
    \ that extracting the list of keys from a dictionary does not always return them\
    \ in the same order in which they were entered. This is why we need to sort the\
    \ list of topics, and is why they have the numbers at the start, representing\
    \ what topics are covered first, second, third, etc. Having these numbers guarantees\
    \ that sorting the list will provide the appropriate ordering.\n\nNow we are ready\
    \ for our `while` loop. We can first create a flow chart of what needs to happen.\
