    comes first, followed by the parameters. As in the code itself, if there are no
    parameters, a pair of parentheses containing nothing is still included. If there
    are parameters, then those are included within the parentheses as a name : type
    pair, as was done with the properties. Using the approach of the ESRI documentation,
    optional parameters are indicated here with curly braces. Lastly, the type of
    return value from the method is given after the final colon in the line. If nothing
    is returned, then the word “void” may be used to make this lack of return value
    explicit. Therefore, every `ArcGISProject` has a method called `save()` that takes
    no parameters and returns no values. Meanwhile, there is also a method called
    `listLayouts()` that has an optional wildcard parameter that is a string, and
    it returns a list to the code. While we know that this list must contain `Layout`
    objects, this is not explicitly guaranteed by Python, as lists can contain multiple
    types of entries, and, therefore, the return type here is simply denoted as a
    list.


    One advantage of class diagrams here is that they are more compact than the crate
    approach. This means that it is feasible to represent larger classes. In fact,
    only a portion of `ArcGISProject` had been presented in the crate in Fig. A.1.
    Figure A.3, below, presents the entire class structure for `ArcGISProject` in
    a single diagram.


    # Class Diagram: Connecting Multiple Classes


    Chapter 12 introduced another layer to the visual representation of class structures.
    When working with many classes at once, it can be very useful to depict how those
    classes relate to each other. An example of this is within the context of navigating
    the web of interconnected classes within the `arcpy.mp` module. For example, if
    you have an ArcGIS project and you want to change the color ramp used by a particular
    layer containing a choropleth map, it is not immediately obvious how to navigate
    from the `ArcGISProject` object to a `ColorRamp` object to edit this part of the
    layout. Using the diagrams from Figures 12.1 and 12.2, reprinted below as Figs.
    A.4 and A.5, and following the arrows in them, we can see the chain of'
  merge: -1
  pgno: 254
- img_proc: true
  md: '![](img/37990581b275bdf7d510c6f2d9702a31_255_0.png)


    Fig. A.3 Full class diagram representation of ArcGISProject


    methods that would be needed to get from a project to that color ramp. We first
    get a Map through the listMaps() method of the ArcGISProject object. From the
    map, the listLayers() method is used to access a Layer. The Layer has a Symbology
    accessed through the symbology property. Likewise, the renderer property is used
    to access a Renderer object. A choropleth map suggests this Renderer would be
    of the GraduatedColorsRenderer subtype, which has a colorRamp property that can
    allow accessing, and thereby editing, of that color ramp. It should be noted that
    for clarity, as well as ensuring each figure fits on a single page, only a small
    subset of the properties and methods are included for each class.


    The new elements of the diagrams here are the connections, represented by the
    arrows and associated numerical annotations. There are two types of arrows. The
    first has a diamond head. These indicate associations in which one class contains
    a reference to another, and the second class can be considered as part of the
    first. For example, each ArcGIS project contains one or more maps, as well as
    one or more layouts. Meanwhile, those Map and Layout objects do not generally
    exist outside of an ArcGISProject object. Likewise, a map may contain any number
    of tables and layers, yet in the code, those Table and Layer objects are only
    accessed via the Map object.


    The other type of arrow has a standard triangular arrow head and represents superclass
    and subclass relationships, like those described in Chap. 8. Here, there are two
    such examples: a RasterClassifyColorizer and a RasterUniqueValueColorizer as subclasses
    of Colorizer, and the four types of renderer as subclasses of Renderer.² Because
    there are no generic colorizers or generic renderers, and everything must be one
    of the subclasses, these are considered abstract classes, which is indicated by
    italics.


    The other item here are the numerical annotations, which indicate the cardinality
    of the relationships. Each association arrow has two numbers, which indicate how
    many of each class can be associated with the other. For example, an ArcGISProject
    can have any number of Map objects in its list, including 0. Likewise, it can
    have any number of Layout objects, including 0. Therefore, both of these have
    0..n marked. However, each Map can be associated with only one ArcGISProject,
    and the same is true of each Layout object. By contrast, each Layer has exactly
    one Symbology, and each Symbology is associated with a single Layer through the
    symbology property. This puts a 1 at both ends of the arrow. Lastly, each Symbology
    has either a Colorizer if it contains raster data or a Renderer if it contains
    vector data. Since this means a Symbology has zero or one Colorizer, and zero
    or one Renderer, this arrow uses a 0..1 notation.


    > ²Even this is not fully representative of the documentation. There are no Colorizer
    and Renderer classes mentioned in the documentation, even though the code seems
    to behave as if there are abstract classes for Colorizer and Renderer. This absence
    of an explicit abstract class is why the colorizer and renderer properties have
    a generic Object type instead of anything more specific.'
