    # Introductory Comments: GIS-Specific Data Structures


    As the discussion of computational data types is inextricably linked with GIS
    data types, we turn to the two primary data types in GIS: rasters and vectors.
    Rasters are easier to work with in ArcPy, so that is where we are starting. Raster
    data structures are conceptually a grid of cells, each of which contains a value
    (Fig. 9.1).


    Once we have the values, the simplest approach to storing this in the computer
    would be to create a list of values, putting them in order, and making sure the
    number of rows or columns is also represented so there’s a way to turn a one-dimensional
    list into a two-dimensional grid (Fig. 9.2).


    For this simple example, writing out 64 numbers would not be a large burden. However,
    rasters typically have far more than 64 cells in them. Rasters that are grids
    of 1000×1000 or more, and therefore have over 1,000,000 cells, are not uncommon.
    A typical raster, giving elevation in the Morgantown area, is shown below (Fig.
    9.3). It has almost 17 million pixels, and with elevation values like 1330.099976,
    it would take over 56,000 pages to print all the individual values.


    As you could therefore predict, this approach can create a very large file size.
    Conveniently, however, neighboring values often have the same value, such as all
    the elevation values for the Monongahela River, winding through this raster. There
    are several data structures which use this similarity of neighboring values to
    reduce the file size of the rasters. A detailed examination of these is beyond
    the scope of this book, but you can get a sense of the variety of approaches by
    returning to the ArcPy Describe documentation from the previous chapter, and take
    a look at the Raster Dataset properties. You will see a property called `compressionType`,
    and there are 16 different approaches to reducing the file size supported by ArcGIS
    Pro version 2.8. Some of the additional resources listed in the Concluding Remarks
    provide more information about raster data structures.


    For the purposes of these introductory remarks, it is sufficient to understand
    that there are two primary goals that these raster data structures all aim to
    support: a reduced file size from simply listing every single value and being
    able to easily identify the value at any given location. The first goal is a straightforward
    reaction to large file sizes and limited storage abilities. The second is valuable
    not just for displaying the raster on the screen, but also for the tools that
    will be examined in the tasks of this chapter. The tools need this information
    because many raster operations are focal, meaning they use a neighborhood around
    the central cell, and apply the tool’s calculations to all the values within that
    neighborhood. For example, ArcGIS Pro calculates the slope of the raster at a
    cell by applying some algebraic calculations of the 3×3 window centered on the
    cell, not just the central cell.¹ This means that whatever data structure is being
    used must be able to readily find the neighboring cells to any specified cell.
    This need to get the values of a neighborhood of cells is enhanced by the ability
    to find the value at any location.


    Conveniently, we will not have to worry about the exact specifications of the
    compression types as we carry out the remaining tasks. Within ArcPy, most raster
    processing functions are in the Spatial Analyst, or `.sa` module, so that will
    be the focus of the following tasks.


    ¹For all the gory details, go to https://pro.arcgis.com/en/pro-app/latest/tool-reference/3d-analyst/how-slope-works.htm


    **Supplementary Information:** The online version contains supplementary material
    available at [https://doi.org/10.1007/978-3-031-08498-0_9].


