    # Task 2: Plan Out the Classes with UML, Flow Charts, and Pseudocode


    Before we start writing out the code, we will want to plan what goes here. Without
    having a plan of attack, we will probably be staring at a blank screen not knowing
    where or how to begin. The first step is to identify what we need to include as
    the properties and methods for our two new classes. The simpler one is the `ApprovalError`
    class. It has, as shown below, some information that is going to be useful for
    creating the error message, specifically the type of error, the lot ID, two relevant
    pieces of information in generically titled properties of `info1` and `info2`,³
    and the error message we will want to give to the user. Lastly, notice that for
    the purposes of this exercise, instead of a variable name, like `aprx` above,
    the object is called `self` below the box (Fig. 16.2).


    Using the information in the properties, we then want to plan out the `createMessage()`
    method. A flow chart for this is below, assuming error types follow these codes:
    1 is a proposal denied because the building was too large, and 2 represents a
    proposal denied because the proposed building is of a type that does not match
    buildings already on the lot (Fig. 16.3).


    The parcel class is more complex than the `ApprovalError` but in terms of what
    it needs as the blueprint of methods and properties is not much more so. It also
    has five properties, but it has two methods instead of one: an `assess()` method
    which is specific to calculating the value and the primary method called `propose()`,
    which takes in the area and type of the proposed building and decides whether
    to approve the proposal or not (Fig. 16.4).


    Of the two methods, `assess` is by far the simpler one. It just applies a formula
    to the relevant information and returns the result of that calculation (Fig. 16.5).


    The only potential hang-up you might notice is that we are using the building
    type, which is one of the properties of the class, to find a tax rate. It so happens
    that we can have variables within the object which are, in effect, private instead
    of public.⁴ One such variable allows us to get a tax rate for the building based
    upon its type.


    **Question 2 (5 points): Knowing what you do about Python, what data type would
    you use for this variable linking tax rates with building types? Why?**


    The other method carries out the calculations for the approval process, so it
    is more complex. We need to check the two conditions for approving or denying
    building proposals: whether the new building matches the type of existing buildings,
    if


    ³The two pieces of information here are different for the different error types,
    so a more specific name cannot be given. This suggests that maybe we would want
    to have different extensions of the ApprovalError class, but that seems a bit
    too much for this exercise. It also illustrates that, while it is presented here
    in a neat and tidy fashion, there is some iteration in the process of deciding
    what is or isn''t needed, as I didn''t realize I would need two generic pieces
    of information to create the error messages until I started working on the createMessage()
    planning below.


    ⁴Some programming languages allow you to explicitly make properties and even methods
    private. Python is not one of those, to my knowledge, so we are using properties
    whose existence we would not advertise, so we can treat them as private.'
