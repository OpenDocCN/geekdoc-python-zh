    \ variable and put it back into the counties layer object’s symbology property\
    \ to make any changes to the map. When done, you probably have a choropleth map\
    \ of land area (ALAND10) using a yellow to red color scheme:\n\n```\ncountiesSymbology\
    \ = countiesLayer.symbology\ncountiesSymbology.updateRenderer('GraduatedColorsRenderer')\n\
    countiesLayer.symbology = countiesSymbology\n```\n\nNow that we have changed the\
    \ renderer type to a choropleth map, this particular choropleth map might not\
    \ be what we want. Therefore, we can use scripting to make some changes to this.\
    \ First is the attribute we are using. Then we can change the color scheme to\
    \ shades of blue, if we want. This is through the list of available color ramps\
    \ through the `aprx` object. Lastly, we again want to make sure the changes are\
    \ reflected in the map:\n\n```\ncountiesSymbology.renderer.classificationField\
    \ = \"MedianAge\"\ncountiesSymbology.renderer.colorRamp = aprx.listColorRamps(\"\
    Blues (5 Classes)\")[0]\ncountiesLayer.symbology = countiesSymbology\n```\n\n\
    ## Task 4: Debugging Exercise\n\nLet’s say that we want to use a different set\
    \ of class breaks, as well as a different set of colors. When the bugs are fixed,\
    \ the following code will change the counties layer to use a quantile break point.\
    \ They will also use shades of gray with the following colors, all by the RGB\
    \ scale: (30, 30, 30), (60, 60, 60), (100, 100, 100), (150, 150, 150), and (200,\
    \ 200, 200). There are four bugs:\n\n```\ncolorsList = [[30, 30, 30, 100], [60,\
    \ 60, 60, 100], [100, 100, 100, 100], [150, 150, 150, 100],\n[200, 200, 200, 100]]\n\
    countiesSymbology = countiesLayer.symbology\ncountiesSymbology.renderer.classificationMethod\
    \ = 'Quartile'\ncountiesSymbology.renderer.breakCount=5\nbreaks = countiesSymbology.renderer.classBreaks\n\
    index = 0\nfor break in breaks:\n    break.symbol.color = {'RBG': colorsList[index]}\n\
    countiesLayer.symbology = countiesSymbology\n```\n\n## Task 5: Unguided Work\n\
    \nYou will now use the help documentation, the preceding tasks, and potentially\
    \ other available resources to change the symbology of the map to meet the following\
    \ specifications. Use arcpy, instead of the GUI, and stay in the Python Window\
    \ so that changes are immediately visible.\n\nCities layer:\n(5 points) Change\
    \ to a size 2 pt circle. You may leave the color the same.\n\nRiver layer:\n(5\
    \ points) Change it so the rivers are blue (any shade of blue is acceptable).\n\
    \nRoads:\n(5 points) Change it to use the built-in “Highway” symbol\n\nStates:\n\
    Leave the states layer as is.\n\nCounties:\nChange it to be a choropleth map using:\n\
    (5 points) the attribute of per capita income (PCIncome)\n(5 points) with 7 classes\n\
    (5 points) an equal interval classification system\n(20 points each, 30 total)\
    \ using the following labels and colors (in RGB format)\n\n| Label | Color |\n\
    |---|---|\n| Very low income | (0, 20, 0, 100) |\n| Low income | (0, 60, 0, 100)\
    \ |\n| Moderately low income | (0, 100, 0, 100) |\n| Middle income | (0, 140,\
    \ 0, 100) |\n| Moderately high income | (0, 180, 0, 100) |\n| High income | (0,\
    \ 220, 0, 100) |\n| Very high income | (0, 255, 0, 100) |\n\n## Mapping: Layouts\n\
    \n### 13\n\n### Introductory Comments: Data Structures for Maps Versus Layouts\n\
    \nThis chapter follows on from the previous chapter, but where Chap. 12 looked\
    \ at the map figure and how to make changes to the appearance of layers in the\
    \ map, this chapter looks at the layout of the map on the page. In terms that\
    \ would be familiar to ArcGIS Pro users, fully aware of the distinction between\
    \ the map view and the layout view, Chap. 12 examines what is possible in arcpy\
    \ with respect to the map view, while Chap. 13 here examines what is possible\
    \ in arcpy with respect to the layout view.\n\nAs with the classes in Chap. 12,\
    \ visualizing the structure of the relationships among the classes can help, and\
    \ this is presented in Fig. 13.1. As before, we have the Map and the Layout classes\
    \ accessed through the ArcGISProject. Where Chap. 12 looked at classes attached\
    \ to the Map, this looks at classes attached to the Layout. They are all within\
    \ the framework of map elements and accessed through the `.listElements()` method.\
    \ There are several types of map elements that can be contained within this list,\
    \ and the tasks below use four of them: a map frame element, a legend element,\
    \ a map surround element which refers to things like scale bars and north arrows,\
    \ and a text element.\n\nWhile there is no “LayoutElement” superclass that could\
    \ hold these properties, there are a few properties that are common to all of\
    \ the individual element classes (even including those not presented here). They\
    \ all refer to the size and position of the element as it relates to the page:\
    \ the height, width, and X and Y coordinates. There are other properties and methods\
    \ specific to some of the types of Layout element that we are using here. The\
    \ map frame is, by its name, the element that holds the map figure. This is why\
    \ it has a reference to the map inside the frame through the `.map` property and\
    \ a reference to a camera object, which is telling the map frame where on that\
    \ map to center itself and what scale to use for zooming in or out.\n\nThe map\
    \ frame is referenced by the next type of element, which is the legend element.\
    \ After all, the legend provides a visual description of the contents of a map,\
    \ so it needs to be able to refer to a map frame to access the contents it is\
    \ describing. It also has a list of LegendItems in which those descriptions are\
    \ held. The order of the contents of a legend item is in the arrangement property.\n\
    \nThe remaining two layout elements that we will be working with in this chapter\
    \ are the most straightforward ones. Text elements contain text and, as such,\
    \ refer to things like the map title or the credits. The nature of a map surround\
    \ element is not as evident by its name, but it refers to the other ancillary\
    \ elements of a map, like a north arrow and a scale bar.\n\nThe following tasks\
    \ introduce you to and have you work with some of these elements for the purpose\
    \ of improving the cartographic presentation of the data. As a preliminary note,\
    \ it is worth acknowledging the limitations of arcpy in this regard. It is possible\
    \ to move elements on the map and, in some limited cases, edit them. However,\
    \ there is no way strictly within arcpy to create a map element, whether it is\
    \ the map frame, the legend, the north arrow, or anything else. Therefore, we\
    \ will be using a mix of the GUI and the Python Window for this exercise. It is\
    \ still useful to employ arcpy, even within this limited setting, because it can\
    \ allow you to exercise very fine control over the layout and be able to record\
    \ the exact placement of each element within the layout so that it can be recreated\
    \ with the same or different data.\n\n136\n\n13 Mapping: Layouts\n\nFig. 13.1\
    \ Class diagram of selected Layout-related classes\n\n![](img/37990581b275bdf7d510c6f2d9702a31_139_0.png)\n\
    \n## Task 1: Working with the Map Frame\n\nOpen up the project from Chap. 12 and\
    \ have it as you did at the end of the unguided portion.¹ Use the GUI to add a\
    \ layout to the project. This is through the Insert tab → New Layout. Use the\
    \ letter size at the top left of the options that are presented.\n\nOnce you have\
    \ the layout open, we can begin to access it with arcpy commands. Just as we always\
    \ worked with lists for the map, we also work with lists here, even when there\
    \ is one layout in the project.\n\nEnter the following code into the Python Window:\n\
    \n```\naprx = arcpy.mp.ArcGISProject(\"CURRENT\")\nlayout = aprx.listLayouts()[0]\n\
    ```\n\nMost of the time, we will then use the layout to access various elements\
    \ within it. This is through the following line:\n\n```\nlayout.listElements()\n\
    ```\n\n### Question 1: How many elements are currently in the map?\n\nEven with\
    \ this layout as generic as it is, we can see some useful information from it,\
    \ as it stores the page information. Especially important is to recognize the\
    \ page units, because we are introducing what is, in a sense, a second coordinate\
    \ system: the coordinates of the page. These are what will be used to locate and\
    \ place items on the page. You can see in the layout view that there are rulers\
    \ along the top and left sides of the layout window. These represent the page\
    \ coordinates. Using either the documentation or the Python Window strategy of\
    \ waiting after the dot to see the property and method options, answer the following\
    \ questions:\n\n### Question 2a: What is the height, width, and units for the\
    \ page?\n### Question 2b: What code did you enter to find this out?\n\nAs our\
    \ layout isn’t very useful at the moment, the first thing we would want to do\
    \ with it is to put a map frame in it. We will have to create a map frame in GUI.\
    \ To do so, have the layout view active, and then go to the Insert tab and choose\
    \ Map Frame. Then drag a rectangle in the layout to place the map frame. You do\
    \ not have to be precise in your drawing of the rectangle because we will be using\
    \ arcpy to make its position and size exactly where and what we want them to be.\
    \ Once you do so, you might have a layout like this (depending, of course, upon\
    \ your zoom level for the project and the exact rectangle you drew).\n\n¹Strictly\
    \ speaking, it isn’t mandatory to have it exactly as this was instructed at the\
    \ end of Chap. 12. The layout code will work no matter what stage of Chap. 12\
    \ it is on, although the legend size in particular might seem off if you have\
