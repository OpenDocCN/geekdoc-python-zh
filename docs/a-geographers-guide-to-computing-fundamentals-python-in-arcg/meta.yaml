  md: '# Task 1: Working with the Map Frame


    Open up the project from Chap. 12 and have it as you did at the end of the unguided
    portion.¹ Use the GUI to add a layout to the project. This is through the Insert
    tab → New Layout. Use the letter size at the top left of the options that are
    presented.


    Once you have the layout open, we can begin to access it with arcpy commands.
    Just as we always worked with lists for the map, we also work with lists here,
    even when there is one layout in the project.


    Enter the following code into the Python Window:


    ```

    aprx = arcpy.mp.ArcGISProject("CURRENT")

    layout = aprx.listLayouts()[0]

    ```


    Most of the time, we will then use the layout to access various elements within
    it. This is through the following line:


    ```

    layout.listElements()

    ```


    # Question 1: How many elements are currently in the map?


    Even with this layout as generic as it is, we can see some useful information
    from it, as it stores the page information. Especially important is to recognize
    the page units, because we are introducing what is, in a sense, a second coordinate
    system: the coordinates of the page. These are what will be used to locate and
    place items on the page. You can see in the layout view that there are rulers
    along the top and left sides of the layout window. These represent the page coordinates.
    Using either the documentation or the Python Window strategy of waiting after
    the dot to see the property and method options, answer the following questions:


    # Question 2a: What is the height, width, and units for the page?

    Question 2b: What code did you enter to find this out?


    As our layout isn’t very useful at the moment, the first thing we would want to
    do with it is to put a map frame in it. We will have to create a map frame in
    GUI. To do so, have the layout view active, and then go to the Insert tab and
    choose Map Frame. Then drag a rectangle in the layout to place the map frame.
    You do not have to be precise in your drawing of the rectangle because we will
    be using arcpy to make its position and size exactly where and what we want them
    to be. Once you do so, you might have a layout like this (depending, of course,
    upon your zoom level for the project and the exact rectangle you drew).


    ¹Strictly speaking, it isn’t mandatory to have it exactly as this was instructed
