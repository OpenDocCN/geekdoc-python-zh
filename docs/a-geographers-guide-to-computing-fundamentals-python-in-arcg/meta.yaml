  - "[PAGE 111]\n\n# 10 Tables and Cursors\n\n![](img/37990581b275bdf7d510c6f2d9702a31_111_0.png)\n\
    \nItem 1: In the 2012 Democratic primary, President Obama lost several counties\
    \ to political unknown Keith Judd.² We will use a search cursor to identify which\
    \ counties these are. As the purpose of a search cursor is to subset the data,\
    \ it usually uses a query. This is not required, however, if you want to read\
    \ (but not edit) data from all rows in the table. The first line below creates\
    \ the cursor, and it is very similar for all three types of cursors, at least\
    \ in the terms of which parameters are required or frequently used. These are\
    \ the three parameters used below, which are the first three that are described\
    \ in the documentation. Please use the documentation to answer question 1.\n\n\
    **Question 1: The first three parameters for the arcpy.da.SearchCursor() function\
    \ are the ones you are most likely to use. What is the role of each of them?**\n\
    \nOpen a Python Notebook and run the following lines, being careful about the\
    \ variable names. The output of this is the answer to question 2, so it is not\
    \ printed below.\n\n```\nsearch = arcpy.da.SearchCursor(\"WV_elections2016\",\
    \ [\"Name\"], \"\"Obama12PPV\" < \"Judd12PPV\"\")\nfor county in search:\n   \
    \ print(county[0])\n```\n\n**Question 2: (10 points) Which counties gave more\
    \ votes to Mr. Judd than Mr. Obama?**\n\nYou may notice that the `print` statement\
    \ accesses the name through `county[0]`. The use of brackets is a clue about `county`'s\
    \ nature: it is a list. Not only that, but it follows a predictable structure\
    \ based upon the code you give it. Recall from this chapter's introductory remarks\
    \ that the cursor must proceed through the table one row at a time. Each time\
    \ through the loop, `county` is referring to the next row in the Table. At first,\
    \ you might expect then that it is a list of all the values of the cells in that\
    \ row. However, that would be more cells than we need. Instead, each item in the\
    \ list contained in the `county` variable is the value corresponding to the same\
    \ index in the list of attributes from the second input parameter. This means\
    \ that in the example above, `county` is a list of exactly one item: the name\
    \ of the county. With a query specified, the `for` loop will only access\n\n²Also,\
    \ inmate at a federal penitentiary."
  - "[PAGE 112]\n\nentries which meet that cursor’s criterion. This means that the\
    \ SearchCursor represented by the `search` variable has selected out only those\
    \ counties which voted for Judd in this primary election. It is as if the search\
    \ cursor checks the first row for whether that query’s criteria are met, and provides\
    \ that row if and only if the criteria are met. If not, it skips to the next row\
    \ and checks that row, and continues the process until it either reaches the end\
    \ of the table or it reaches another row that meets the criteria and provides\
    \ that row. In this way, only the subset of counties which voted for Judd is selected\
    \ out without having to use the `Select()` function as in Chap. 7.\n\n# Task 2:\
    \ Introduction to Update Cursors\n\nItem 2: In the Republican primary of that\
    \ year, the number of total votes seems to be mistakenly calculated, since all\
    \ the values are zero. We will want an update cursor to fix this problem. Because\
    \ this now requires editing the data, we need to have an update cursor, rather\
    \ than a search cursor.\n\nFirst, let’s create the update cursor. Enter the following\
    \ line into a new Notebook cell. You will notice its similarity to how the search\
    \ cursor was created. It is, indeed, the same syntax and same input parameters,\
    \ but without the search query this time. Again, pay close attention to variable\
    \ names: there are many similar variable names, and all the candidate names are\
    \ all truncated to five characters to fit a naming convention.³\n\n```\nupdate\
    \ = arcpy.da.UpdateCursor(\"WV_elections2016\", [\"Romne12PPV\", \"Santo12PPV\"\
    , \"Paul12PPV\", \"Gingr12PPV\", \"Roeme12PPV\", \"Tot12Rep\"])\n```\n\nNow, to\
    \ make the corrections, we will calculate the total votes cast field as the sum\
    \ of the individual candidates’ totals, and add those to the table. As with the\
    \ search cursor, `county` is a list referring to each row’s values as the cursor\
    \ cycles through the rows one by one, and the elements of that list are the values\
    \ corresponding to the list in the second input parameter to the `UpdateCursor`\
    \ constructor method that created the `update` variable.\n\n```\nfor county in\
    \ update:\n    county[5] = county[0] + county[1] + county[2] + county[3] + county[4]\n\
    \    update.updateRow(county)\n```\n\nWhen trying to edit files, you may be familiar\
    \ with messages that tell you a certain file is locked for editing by another\
    \ application. Update cursors like this are one of the applications that can and\
    \ will do this. This means we have to remove that lock on editing to make sure\
    \ things behave well if we want to use another update or insert cursor. This is\
    \ accomplished by deleting the variable storing the update cursor, because deleting\
