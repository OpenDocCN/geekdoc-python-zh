  md: "# 10 Tables and Cursors\n\n![](img/37990581b275bdf7d510c6f2d9702a31_111_0.png)\n\
    \nItem 1: In the 2012 Democratic primary, President Obama lost several counties\
    \ to political unknown Keith Judd.² We will use a search cursor to identify which\
    \ counties these are. As the purpose of a search cursor is to subset the data,\
    \ it usually uses a query. This is not required, however, if you want to read\
    \ (but not edit) data from all rows in the table. The first line below creates\
    \ the cursor, and it is very similar for all three types of cursors, at least\
    \ in the terms of which parameters are required or frequently used. These are\
    \ the three parameters used below, which are the first three that are described\
    \ in the documentation. Please use the documentation to answer question 1.\n\n\
    **Question 1: The first three parameters for the arcpy.da.SearchCursor() function\
    \ are the ones you are most likely to use. What is the role of each of them?**\n\
    \nOpen a Python Notebook and run the following lines, being careful about the\
    \ variable names. The output of this is the answer to question 2, so it is not\
    \ printed below.\n\n```\nsearch = arcpy.da.SearchCursor(\"WV_elections2016\",\
