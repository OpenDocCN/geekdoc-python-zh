    ```\n\nAt the end of the row, we then need to increment the variable `index` by\
    \ one, so that when we start the next row, it is going to be looking at the correct\
    \ spot in the matrix.\n\n```python\n# Add one to the index at the end of the row\
    \ so we can start the next row of the correlation matrix:\nindex = index + 1\n\
    ```\n\nPutting this all together gives the following code block:\n\n```python\n\
    corr_matrix = []\nindex = 0\nfor i in fields:\n    corr_matrix.append([])\n  \
