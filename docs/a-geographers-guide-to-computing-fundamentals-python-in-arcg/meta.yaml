    \ with the key FIPS\n→ Hollen 2018% ← the value in HollenDict associated with\
    \ the key FIPS\n```\n\nWith this pseudocode created, we can now turn it into the\
    \ python code below, which I am presenting in stages. You may enter this in stages\
    \ into the Python Notebook, or all at once.\nThe new dictionaries are created\
    \ first.\n\n```\nManchinDict = {}\nMorrisseyDict = {}\nHollenDict = {}\n```\n\n\
    Next, we create the search cursor for the 2018 results. Note that this will only\
