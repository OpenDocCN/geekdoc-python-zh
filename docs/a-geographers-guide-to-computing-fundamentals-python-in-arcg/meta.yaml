    \n让我们来大致了解一下脚本的目的，因为脚本作者很不帮忙地提供了一个没有信息量的文件名！\n\n- 在包含脚本的窗口中，转到“运行”菜单并选择“运行模块”。\n\
    - 当 Python Shell 窗口中出现提示时，输入参与者文件的完整文件路径，从驱动器盘符（例如 \"C:\"）到扩展名（\".csv\"）。对于我来说，它是下面列出的“我的文档”文件夹。无论你将其保存在哪里，请确保输入时使用正斜杠（/）。\n\
    - 按 Enter 键。\n\n- 当下一个提示出现时，输入讲师文件的完整文件路径，同样从驱动器盘符到扩展名，然后按 Enter 键。\n\n然后你应该会收到一条消息，说明哪些讲师肯定能负担得起，哪些可能负担得起。\n\
    \n```\nEnter the file path for the participants file. C:/Users/jfconley/Documents/admin/Python/participants.csv\n\
    Enter the file path for the instructors file. C:/Users/jfconley/Documents/admin/Python/instructors.csv\n\
    We can definitely afford these instructors:\nCatherine Smith\nFred Williams\n\
    We might be able to afford these instructors:\nAllen Bletchley\n>>>\n```\n\n这表明了脚本的预期用途：帮助决定使用哪位讲师进行培训。\n\
    \n## 任务 2：使用在线 Python 帮助文档理解脚本的一部分\n\n从脚本开始，你遇到了我们尚未见过的 Python 代码。第一行是 `import\
    \ csv`。首先，注意 `import` 这个词是橙色的。IDLE 中的脚本编辑器会用不同的颜色突出显示某些类型的标记，以帮助表示“词性”的种类，延续语言的比喻。关键字是橙色的。我们可以在线查找\
    \ `import` 关键字的作用。\n\n访问 Python 文档 https://docs.python.org/3/。虽然这会显示 Python 3.9.7\
    \ 文档（在撰写本文时），但我们希望切换到 ArcGIS Pro 使用的相同版本的 Python，即（同样在撰写本文时）Python 3.6。转到当前显示为“3.9.7”的下拉菜单并选择“3.6”，或者在\
    \ *按版本列出的文档* 列表中选择“Python 3.6 (security-fixes)”。\n\n在右上角的 *快速搜索* 中，输入“import”并点击\
    \ *Go* 按钮。向下滚动一些，你会看到一个标题为“6. 模块”的链接。点击它以了解更多关于模块的信息。在实践中，你可能需要阅读几页文档才能找到正确的那一页。不过，在这种情况下，你可能可以排除那些在单词“important”中突出显示了“import”字母的页面。模块是扩展\
    \ Python 以服务于特定目的的扩展。就像你必须在 ArcGIS 中启用 Spatial Analyst 和 Network Analyst 等扩展一样，你也必须在\
    \ Python 中启用扩展或模块。`import` 语句就是处理这个的，这里我们导入了一个名为 csv 的模块。顾名思义，它允许 IDLE（以及一般的 Python）读写逗号分隔值（.csv）文件。有许多模块，包括一个专门用于\
    \ ArcGIS 的模块（称为 ArcPy），我们将在本书后面看到更多相关内容。\n\n现在我们已经导入了 csv 模块，我们来看下一行来解读它。它读作：\n\
    \n```\nparticipants_path = input(\"Enter the file path for the participants file.\
    \ \")\n```\n\n首先，你可能注意到我们有两种新颜色：紫色和绿色。根据语法，我们可以弄清楚它们是什么。因为紫色是一个名称后跟括号，这符合函数的语法。因此，紫色用于函数名，尽管它仅限于标准\
    \ Python 内置的函数。（换句话说，你定义的任何函数都将是黑色的，而不是紫色的。）绿色文本以引号开始和结束，告诉我们它是一个字符串。\n\n此外，你可能在运行脚本时认出了这个字符串。再看一下\
    \ Python Shell，你会看到它是你提供参与者文件路径时的提示。这是 `input` 函数功能的一个线索。再次在 Python 文档中搜索“input\
    \ function”（不带引号），如果你向下滚动，你会看到一个“2. 内置函数”的链接。看看那个，你会在页面顶部看到一个所有内置函数的表格。"
