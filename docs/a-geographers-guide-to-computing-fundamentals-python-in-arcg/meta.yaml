  md: '# Appendix: Unified Modeling Language (UML)


    As you move from simpler to more complex programming, from keeping track of simple
    variables, to objects, to classes, and ultimately managing projects containing
    multiple files, having a way to represent all the pieces of your code becomes
    important. A common way of managing this more complex code is through Unified
    Modeling Language, or UML. While UML is intended for managing software systems
    that are far more complex than what it presented within this book, a few aspects
    nonetheless can be useful here. There are 13 different types of diagrams in this
    visual language¹ within 3 broad categories. As such, an appendix here can only
    touch the surface of the complexity that UML can work with, so if you are interested
    in more information after reading this, I suggest looking at the UML organization’s
    website at http://www.uml.org and following the references noted therein.


    UML is a visual language which can represent a range of levels of abstraction
    of the processes inherent in constructing and maintaining a software system. The
    first category represents the structure diagrams, which depict how different objects,
    classes, and packages are constructed within the code. The UML diagrams presented
    within this book are from this category, so this is what is presented more fully
    within this appendix. The other two categories represent aspects of software development
    that tend to arise and become more relevant with more complex applications than
    we are building within this book. Briefly, behavior diagrams depict the processes
    that take place within the software system. Diagrams in this category are more
    focused on what the components of the system do, rather than how they are constructed.
    They can also represent the actions the users may want the software to do. The
    third type of diagram, interaction diagrams, depict how the different parts of
    the software system communicate with each other. As this book has focused primarily
    upon the structures within coding for GIS applications, this appendix focuses
    on the structure diagrams that are introduced in the chapters to provide a more
    detailed interpretation of how those diagrams are constructed and interpreted.


    # Class Diagram: A Single Class


    Our entry point into UML is through the representation of a single class. Recall
    from Chap. 7 that classes contain properties, which are like object-specific variables
    and methods, which are like object-specific functions. The diagram for a single
    class concisely depicts these parts of a class.


    Figure 7.1, reproduced here as Fig. A.1, introduced the concept of an object by
    extending the box metaphor for variables, by presenting an object as a crate which
    can hold a series of boxes. Thus, any object of the class `ArcGISProject` is guaranteed
    to have properties of the type `activeMap`, `dateSaved`, `defaultGDB`, etc., as
    well as methods called `save()` and `listLayouts()`, among others. While the colors
    of the boxes can represent the types of properties, such as green for text strings,
    this approach becomes difficult to scale to larger classes. UML class diagrams
    provide a more formal structure to this sort of visualization. Figure A.2 gives
    a UML class diagram version of Fig. A.1.


    The class diagram here has three boxes, matching the three portions of the metaphorical
    crate. Like the label on the top of the crate, the top box contains the name of
    the class. The properties that are in the boxes in the left side of the crate
    correspond to the information in the middle of the three boxes in the class diagram.
    Each property has a single line. The name of the property comes first, followed
    by the type of that property after the colon. The methods, which are on the right
    side of the crate, are presented in the lowermost box in the class diagram. Two
    methods are presented. The name of the method


    ¹It is 13 as of UML version 2.0.'
