  mdcn: "## 任务 2. 为自定义工具编写脚本\n\n在导入语句下方，输入以下四行代码：\n\n```\nblockArea = ARCPY.GetParameter(0)\n\
    buildingArea = ARCPY.GetParameter(1)\npercentCover = (buildingArea / blockArea)\
    \ * 100\nARCPY.AddMessage(\"Your building covers \" + str(percentCover) + \" percent\
    \ of the lot\")\n```\n\n# 问题 1：然后，添加注释来描述每一行代码的功能。\n\n保存脚本。现在通过在 ArcGIS Pro 中再次运行你的工具来测试代码。你不需要关闭它或更改数值。只需再次点击“运行”按钮。这次查看详细信息时，你应该会看到另一条消息，具体来说就是上面第四行代码创建的那条消息。\n\
    \n至此，你可能已经认识到，在工具中运行脚本涉及一些函数，这些函数与你在其他上下文中见过的函数相似，但并不完全相同。由于参数是通过对话框提供的，我们需要某种东西来替代\
    \ `input` 函数，而 `ARCPY.GetParameter()` 正是为我们提供这项服务。括号中的数字⁴ 是我们想要从列表中获取的参数的索引。还记得在工具属性的“参数”集中输入地块面积和建筑面积的参数吗？这就是我们获取它们的方式，索引就是我们想要的内容在该列表中的位置。地块面积位于顶部，因此\
    \ `blockArea` 变量作为参数 #0 被访问。建筑面积是此表中的第二行，因此 `buildingArea` 是从参数 #1 创建的。同样，`print`\
    \ 函数在工具中无法正常工作，因为没有输出窗口可以打印任何内容。我们通过 `ARCPY.AddMessage()` 函数来解决这个问题。我们在第 9 章中，在\
    \ `Result` 对象的上下文中查看了消息。这里我们看到这个消息是如何创建的。我们还看到如何在字符串上使用 + 运算符。它只是将第二个字符串附加到第一个字符串的末尾，因此\
    \ “Hello” + “World” 变成 “HelloWorld”。请注意，如果你想让内容看起来正常，必须注意空格，所以我可能建议使用 “Hello”\
    \ + “ ” + “World”。在某些情况下，比如 `print` 函数，这等同于 “Hello”, “World”，但使用逗号分隔符会产生错误消息。问题\
    \ 2 要求你找出原因。\n\n# 问题 2：使用 `AddMessage()` 函数的帮助文档或它创建的错误消息，为什么我们应该对字符串使用 + 运算符，而不是像\
    \ `print` 函数那样使用逗号分隔符？\n\n如上所述，工具的一个优点是通过指定输入变量的类型，可以消除相当多的运行时错误，但这并不能使我们免于逻辑错误。\n\
    \n# 问题 3：这段代码可能允许用户犯什么逻辑错误？（包括你在测试代码时能够引发的任何逻辑错误？）逻辑错误是指程序给出的结果不是用户预期的错误。\n\n\
    我们可以在代码中做的一个小改进是，如果建筑面积的值大于地块面积，则警告用户。如果用户没有注意输入对话框的提示，先输入了建筑面积，就可能发生这种情况。这可能比一条简单消息所能处理的更严重，因此我们不会给用户一条消息，而是给他们一个警告，表明他们可能做错了什么。在\
    \ `ARCPY.AddMessage(\"...\")` 行之后，将以下代码行添加到你的程序中，并保存文件：\n\n```\nif percentCover\
    \ > 100:\n    ARCPY.AddWarning(\"Your building area is greater than your block\
    \ area. Please check your values and reenter them.\")\n```\n\n⁴ 由于 GetParameter\
    \ 是一个函数，是的，这个数字是 GetParameter 的参数。但简单地说“GetParameter 的参数是参数列表中参数的索引”会令人困惑。\n\n\
    尝试使用应触发警告的值进行操作，你会看到一个黄色框，显示“计算面积已完成，但有警告”。如果你继续查看详细信息，你会看到警告，它以黄色显示，并带有黄色的三角形警告标志。但是，转到消息区域，常规消息和警告都会出现。\n\
    \n回想一下场景设置，你当地政府的一条开发规则是，特定地块上的建筑物面积不得超过土地总面积的 30%。超过 100% 的比率可能表示输入错误，而 30% 到\
    \ 100% 之间的值可能表示一个应该被拒绝或至少需要进一步审查的申请。因此，为此，我们将使用 `AddError()` 函数。\n\n在脚本末尾，添加以下行以扩展\
    \ `if` 语句，使其具有另一个 `elif` 条件：\n\n```\nelif percentCover > 30:\n    ARCPY.AddError(\"\
    Your building might be too big to pass the permit process. Please check your measurements!\"\
    )\n```\n\n保存脚本，并使用应产生此错误的值再次运行该工具。现在你会收到一条消息，表明工具失败了。查看详细信息以了解它如何失败，你会发现罪魁祸首是你刚刚放入脚本中的错误消息。毕竟，如果你向输出添加一个错误，并使用应触发该错误消息的参数运行该工具，它会认为该工具失败了，这是有道理的。虽然我们将在后面的章节中继续扩展这个工具，但目前，我们将转向与他人共享该工具。\n\
    \n## 任务 3：共享工具\n\n使此工具变得有用的最后一步是能够与所有人共享该工具和相关数据。毕竟，我们希望 ArcGIS Pro 的新手用户无需大量培训即可尽可能简单地运行它。虽然最初猜测共享\
    \ .aprx 文件可能有意义，但它对计算机有隐含的指令，例如“从该来源获取第一层的数据”，如果“该来源”是你计算机上的文件夹而不是公共驱动器，ArcGIS\
    \ Pro 将无法找到它。相反，我们想创建 ESRI 所称的“项目包”，它提供了我们可能需要的一切。\n\n将提供的三个 shapefile 加载到地图中。然后转到\
    \ **共享** 功能区并选择 **项目** 项，这是功能区中最左边的项，位于 **包** 部分。这会弹出一个标记为“打包项目”的窗口，位于左侧，工具（可能）之前所在的位置。将包保存到文件而不是在线帐户，确保选择一个有意义的名称和文件位置。添加项目用途的摘要，确保它符合场景。同样，添加一些标签。如果你的组织有许多项目，这些标签会很有用，你可以使用标签轻松找到给定任务的相关项目。\n\
    \n确保选中“在组织外共享”框，因为这应确保包含数据。还要确保选中“包含工具箱”框，因为这是共享工具箱和相关工具所必需的。最后，如果你按照说明操作并在上一个任务中生成了错误消息，请取消选中“包含历史记录项”框。如果选中此框，地理处理历史记录中的错误将导致此部分失败。\n\
    \n点击“打包”按钮。如果它要求你先保存项目，请这样做。\n\n**问题 4：** 该包将根据以下标准进行评估：\nA. 它是否包含数据和工具并能正常打开？\n\
    B. 该工具是否为可接受的建筑面积和地块面积创建了适当的消息？\nC. 如果地块面积大于建筑面积，该工具是否生成警告？\nD. 如果建筑物对于地块来说太大，该工具是否生成错误？\n\
    \n## 任务 4：批判性思维\n\n代替本章的调试和无指导编程部分，我将让你考虑关于直观与表达性界面的介绍性评论，并回答以下问题：\n\n**问题 5：**\
    \ 牢记引言中关于用户交互的原则，讨论至少一个你能想到的改进，以改进这个用于评估地块内建筑物的特定任务的界面（如果你理论上可以进行任何类型的更改——而不仅仅是你知道如何实现的更改）。"
