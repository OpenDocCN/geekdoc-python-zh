    \ to be. If you are doing this in IDLE or another Python environment, you’d have\
    \ to use the file path to specify the project you want; this is not needed in\
    \ the Python Window, as it knows what is open.\nTo take a look briefly at the\
    \ `aprx` variable, type `aprx` and press Enter.\n\n```\n>>> aprx = arcpy.mp.ArcGISProject(\"\
    CURRENT\")\n>>> aprx\n<arcpy._mp.ArcGISProject object at 0x000002AA0CEDA8D0>\n\
