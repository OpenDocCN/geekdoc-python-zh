    \ It currently covers \" + self.info1 + \"% of the lot and cannot exceed \" +\
    \ self.info2 + \".\"\n```\n\n同样从底部开始，计算机在第18行发现了一个 `TypeError`。（在我的代码中是第20行——取决于你插入\
    \ `__str__()` 方法的方式和位置，对你来说可能不同。）消息告诉我们它期望一个字符串，但得到了一个数字（类型为 `float`）。所以让我们看看第20行：\n\
    \n```\nmessage = \"Your building for \" + self.lotID + \" is too big to pass the\
    \ permit process. It currently covers \" + self.info1 + \"% of the lot and cannot\
    \ exceed \" + self.info2 + \".\"\n```\n\n这一行正在根据提供的信息构建错误消息，并试图将参数合并到一个更长的字符串中，以形成一个有用的错误消息。这意味着通过\
    \ `self` 对象访问的属性之一不是字符串，但这一行假设它是。这些是从哪里来的？`createMessage()` 方法在 `__init__()` 方法中被调用，因此该属性在\
    \ `__init__()` 方法中被建立为字符串。以下是第18行中访问的属性的代码行：\n\n```\nself.lotID = str(lotID)\n\
    self.info1 = info1\nself.info2 = info2\n```\n\n由此，我们可以排除 `lotID` 是问题所在，因为它在这里被转换成了字符串。这意味着\
    \ `info1` 和/或 `info2` 不是字符串。然而，在标准2的错误消息中它们是字符串，因为我们毫无问题地得到了那个消息。这意味着我们可能希望在这里不仅仅是将\
    \ `info1` 和 `info2` 属性转换为字符串，而是更早地处理，以便 `info1` 和 `info2` 始终以字符串形式呈现。这意味着我们想去查看回溯中上一行的代码，即引发\
    \ `ApprovalError` 的地方，也就是第69行。它读作：\n\n```\nraise ApprovalError(1, self.lotID,\
    \ percent, self.threshold)\n```\n\n第一个参数是错误类型，它在第18行中不存在，所以不可能是它。我们在 `__init__()`\
    \ 方法中看到 `lotID` 在那里被转换成了字符串，所以也不可能是它。这就只剩下 `info1` 和 `info2` 属性了，它们是建筑覆盖的地块百分比和任何地块允许的最大百分比。事实证明，它们很可能是数字。因此，要修复这个问题，我们应该将这里的\
    \ `percent` 和 `self.threshold` 转换为字符串，用 `str(percent)` 和 `str(self.threshold)`\
    \ 替换它们。\n\n> ApprovalError() 调用中未指定 self 参数的部分原因，可以通过我在这里设置 `__init__()` 等效方式来说明。第一个\
    \ self 是指 ApprovalError 对象的 self，这是在第5-21行中活跃的 self，从 ApprovalError 类的 `__init__()`\
