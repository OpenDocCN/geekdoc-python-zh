    A 的按钮，悬停时会显示“直线文本”标签。点击地图以放置它。与地图环绕元素一样，我们可以使用 `listElements` 方法的输入参数来仅检索文本元素。当然，目前我们只有一个。标题应位于布局顶部，我们希望它相当大，因此输入以下代码行将其定位在布局中：


    ```

