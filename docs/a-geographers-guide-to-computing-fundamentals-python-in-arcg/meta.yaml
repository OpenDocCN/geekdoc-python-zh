  md: 'Click on the `input()` entry in the table and it takes you to a description
    of that function. It tells you that the `input` function presents a prompt, which
    is the text string, and reads in whatever the user types. That input is then stored
    as a string in the variable on the left side of the equals sign, `participants_path`
    in our case.

    We can also use the variable names as clues, and the name `participants_path`
    tells us it is the file path of that file.

    The next line uses the `open()` function.


    ```

    participants_file = open(participants_path)

    ```


    Clicking on that entry in the table informs you that it opens the file and creates
    it as an object of the type “file.” This is distinct from the file path in the
    previous line. The difference between a file and a file path is important: the
    file path is like an address, while the file is the building at that address.
    My office is at 98 Beechurst Ave., Morgantown WV 26506. This is simply a piece
    of text telling people where it is found. It says nothing directly about the building
    there. It could be a house, an old building, or a new building. The building at
    that address can change, as the building was indeed renovated in 2007. This changed
    the building, just as saving a file changes the file, but the address or the file
    path has not changed. This is why they are separate variables. Even then, the
    file object is a pretty generic type, just like all you know from an address is
    that a building is there. Just as a file could be a Python file, an Excel file,
    a Word file, a PDF, etc., the building at an address could be a house, an office
    complex, an academic hall, an apartment building, etc. To be able to properly
    use the file, we need to read it. This is the job of the next line.

    You will see that this next line has the same general structure as the preceding
    two, although the name of the function, `csv.reader`, is not purple, nor is it
    found in the website listing built-in functions.


    ```

    participants_reader = csv.reader(participants_file)

    ```


    A clue to this comes from the top line, where we imported the `csv` module. A
    web search for “Python csv.reader” can confirm this, where it is a function that
    constructs an object that can read CSV (comma-separated values) files. Note that
    this is still not actually reading the file. Recall that in programming, we tend
    to break things apart into smaller and smaller pieces, taking one incremental
    step at a time. As such, finding the file path, accessing the file, constructing
    a file reader, and reading the file line by line are all separate pieces of code.
    Another reason to do this is because the first parts—finding the file path and
    accessing the file—are generic to all file types, but the reader part is specific
    to CSV files. Therefore, it makes sense to have different readers for different
    file types, but there is no need to store or access file paths differently. Returning
    to the address analogy, what you do at a house versus an office complex can be
    different, but the addresses are interpreted consistently. Driving to 98 Beechurst
    Ave. is the same whether it is a house or an academic building, but you would
    knock on the front door of the house while entering the academic building to find
    the departmental office.

    Lastly, once we have the file reader ready, we can carry out the task or tasks
    we wanted to do with the file. This is equivalent to carrying out the tasks for
    the building you are at, which might be selling girl scout cookies. You’d simply
    ask the homeowners what they want if you are at a house, but you might ask the
    staff in the department office to circulate a flier. Oftentimes, we will use data
    structures, such as lists or dictionaries, to store the contents of the file.


    # Task 3: Running Code Statement by Statement to Understand It


    Rather than just reading line by line and looking things up in the help documentation,
    we can run the code one statement at a time to break it down and see what is happening
    at each step. We can also, at times, insert print statements or simply type in
    variable names to examine their values.

    Open up the Python Shell by going to the *Run* menu, and selecting *Python Shell*.

    This brings up a new window with a `>>>` prompt to enter the Python code in one
    statement at a time.

