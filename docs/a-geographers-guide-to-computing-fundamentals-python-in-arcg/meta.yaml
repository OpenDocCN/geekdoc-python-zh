    \ = ' + str(lotNum)\n    search = ARCPY.da.SearchCursor('lots', [\"AREA\", \"\
    KEY\", \"BLOCK\", \"SECTION\"], query)\n    lot = search.next()\n    lotArea =\
    \ lot[0]\n    lotBlock = lot[2]\n    lotSection = lot[3]\n    buildings = ARCPY.da.SearchCursor('buildings',\
