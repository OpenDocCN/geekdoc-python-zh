    ## Task 3: Create your own online service


    Having used services set up by others, you may wish to move on to creating your
    own service for sharing data that you have. Sharing tools through a Python package
    is more complex than sharing data and is covered in Chap. 21, so we will focus
    here on sharing data.


    This requires having a connection with your ArcGIS Online account and its associated
    data portal, so the first thing we will do is sign into that portal. The `arcpy.SignInToPortal`
    built-in function accomplishes this for us, and it takes as input parameters the
    site you are signing into (arcgis.com) your ArcGIS Online account username and
    password. In the example below, I have altered both the username and password:


    ```

    arcpy.SignInToPortal("https://www.arcgis.com", "UsernameRedacted", "PasswordRedacted")

    ```


    As output, you will see a dictionary of information about the account, but this
    is not something we will use in the remainder of the task. Setting up the data
    so that it can be uploaded through the service is a process that takes multiple
    stages. The first of these stages is creating a draft of the service on your local
    computer. That way, you can make sure everything is as you want before you submit
    it for online sharing.


    This is ultimately through the map''s `getWebLayerSharingDraft()` method, but
    that has enough input parameters that we need to initialize a few things before
    we can get there. First, as we are creating a draft of the service on the local
    hard drive, we need to know where it is going. This is set up through an output
    directory of wherever you want to put this:


    ```

    outdir = "D:\classes\TechIssues\labs\Python\Chap18"

    ```


    There is then the service name, which is what you want your service to be called.
    As this is an example, I have chosen a name that reflects that purpose:


    ```

    service_name = "FeatureSharingDraftExample"

    ```


    The full file name simply adds the appropriate file extension (`.sddraft`) onto
    the name of the service:


    ```

    file_name = service_name + ".sddraft"

    ```


    We can then put all of this together for the complete output location for our
    draft:


    ```

    output = outdir + "" + file_name

    ```


    Using four lines and four variables for different portions of the file path might
    seem like overkill, but some parts of this will be reused for other elements of
    the process of uploading the draft to the service online. This is, after all,
    a small-scale version of a strategy we have used throughout this book of breaking
    a problem down into smaller pieces, so that individual portions can be changed
    and reused as needed. Now that we have the place in which we are storing our draft,
    we need to get the contents of that draft set up. For this, we will share a layer
    of the counties file from Chap. 12.


    If you haven’t done so already, access the counties layer through the following
    lines:


    ```

    aprx = arcpy.mp.ArcGISProject("CURRENT")

    m = aprx.listMaps()[0]

    counties_layer = m.listLayers("USCensus2010_arc")[0]

    ```


    There are different types of servers that we can be using, based upon the data
    in question. As we want to set up a server to share, or host, vector data, which
    contains features, we want a server type of "HOSTING_SERVER" and a service type
    of "FEATURE." If we were sharing a raster dataset, this would instead be a "TILE"
    service type. The map object has a method that allows us to turn it into a service
    for sharing features, and it will give us the draft we want. Make sure you have
    the county layer exactly as you want it to appear before running these lines of
    code, as the symbology will be encoded within this draft and will not be readily
    changeable afterward. Notice that, while we are using only one layer here, the
    counties layer, we could include many layers in the list if we wished to share
    more than just this:


    ```

    sddraft = m.getWebLayerSharingDraft("HOSTING_SERVER", "FEATURE", service_name,
    [counties_layer])

    sddraft.exportToSDDraft(output)

    ```


    You won’t likely see any change to your map, so don’t panic. If this worked properly
    for you, then you are ready to turn the draft into a proper service. This has
    the terminology of a “service definition,” as it is still a file located on your
    hard drive but which contains all the information needed to publish it online.
    It still abstains from taking that last step of the final publication. This disconnection
    has a few advantages, especially within larger GIS-using organizations. There
    can be multiple people involved in the process, as well as many layers being shared.
    This bifurcation of creating the service from uploading the service allows different
    people to have those two different roles, as well as allowing many people to create
    service definitions and place them into a common directory so that all of them
    can be uploaded at once when everything is prepared.


    This illustrates one of the principles of sharing your work. In many cases, it
    is not a single GIS user sharing their work as an individual but an organization
    that is creating a GIS portal for sharing larger amounts of data. This means that
    the practice of sharing the data is only partially about the code for making it
    happen; it is just as much, if not more, an organizational endeavor that requires
    cooperation and coordination among a larger group of users within that organization.
    To take the example from the first task, there is plenty of data about access
    to health care that is shared by the HRSA. It is unlikely that there is only one
    person involved in the processes of collecting, maintaining, and sharing that
    data.¹ Therefore, splitting the two pieces of this process makes sense.


    Before we do that, we have to create the file for storing the service definition,
    which is where we reuse some pieces of creating the draft. We can reuse the file
    name, stored in the variable service_name, as well as the output directory, stored
    in outdir. The difference is that we are creating the service directory itself,
    with the file extension .sd, instead of the draft with the extension .sddraft:


    ```

    sd_file_name = service_name + ".sd"

    sd_output = outdir + "" + sd_file_name

    ```


    Now that the name is ready, we can take the first step of that bifurcated process:
    staging the service. This is done through the following line:


    > ¹I haven’t investigated their organizational structure, but am simply making
    inferences about the amount of work involved in collecting such data and the amount
    of data they have.'
