  md: "As long as there are no error messages, the installation was probably successful.\
    \ Now we can check to ensure it worked by opening up a Python shell through IDLE.\
    \ To do this, go to IDLE and click on the Run menu. Choose “Python Shell.” Type\
    \ in the following lines. Note that we need to specify which file we want from\
    \ the chapter21 module. Then, we can access the summarize function within it:\n\
    \n```\n>>> numbers = [1, 2, 3, 4, 5, 1, 2, 3, 4, 1, 2, 3, 1, 2]\n>>> from chapter21\
    \ import summarize\n>>> summarize.summarize(\"MEAN\", numbers)\n2.4285714285714284\n\
    ```\n\n**Question 1: Using the imported summarize function, what is the standard\
    \ deviation of this set of numbers?**\n\nEven though we are now able to access\
    \ our module within a generic IDLE shell, ArcGIS Pro still cannot find it. We\
    \ have to explicitly tell ArcGIS Pro how to find our module, and that is the focus\
    \ of the next task.\n\n# Task 2: Telling ArcGIS Pro to Access the Package\n\n\
    A Python Script Tool, as we have previously been using, is great for creating\
    \ a tool that runs a single script. However, as its name implies, it only handles\
    \ one script.¹ The more flexible approach for multiple files is to use a Python\
    \ Toolbox instead.\n\nFollowing the guidance in the online help documentation\
    \ for “Creating geoprocessing modules” from ESRI,² there is, like with Task 1,\
    \ a strict structure to how the files are organized for a Python Toolbox. We will\
    \ first get the structure set up and then create the toolbox to go into the structure.\
    \ It will initially look like the structure from Task 1, although we will be enhancing\
    \ this. At this stage, the only change you should make is to ensure that setup.py\
    \ has a name, description, and long description appropriate for Chap. 21 instead\
    \ of Chap. 20. The name must be chapter21 to match the folder next to it (Fig.\
    \ 21.2).\n\nThe help documentation then suggests adding a series of additional\
    \ folders, which will remain empty for now. Toolbox files may later go into these\
    \ for distribution purposes, but this chapter is focused on debugging purposes\
    \ and getting it into ArcGIS Pro especially, so this chapter does not concern\
    \ itself with the contents of these folders. For now, it is better to have a structure\
    \ that more closely mimics that from Task 1. We will have these folders, but leave\
    \ them alone for now (Fig. 21.3).\n\nIn the course of testing the code, I found\
    \ one area for improvement within the summarize.py file. To show where the new\
    \ code fits into the summarize() function, the entire function is shown below\
    \ with the new lines underlined. It turns out that the data I am analyzing has\
    \ some <null> values in it, and Python is, understandably, unable to sort a list\
    \ which contains the value None. Asking Python to sort a list which cannot be\
    \ sorted results in a TypeError. To ensure this doesn’t derail the entire analytical\
    \ process, I added a try/except statement which automatically returns -999 if\
    \ the data cannot be sorted. The use of a number like -999 is a common placeholder\
    \ for missing data in GIS databases.\n\nI am presenting this now instead of showing\
    \ you the error and having you fix it because fixing code that is in the imported\
    \ files and having that appear in the tool within the Python Toolbox are not as\
    \ simple as making a change, clicking “save,” and rerunning the tool. Each time\
    \ you revise the associated files (summarize.py and multiCursor.py here), you\
    \ must close ArcGIS Pro and restart it for the changes to be recognized by the\
    \ tool. It is as if ArcGIS Pro compiles the imported files at the time of import\
    \ and only bothers to look at whether they changed when the project is being assembled\
    \ when it is loaded into ArcGIS Pro:\n\n```\ndef summarize(procedure, valueList,\
    \ threshold=0.05, cat='HH'):\n    output = -999\n    try:\n```\n\n¹By placing\
    \ Python files in the same directory, I was able to get it to access additional\
    \ files, as in Task 1, but any corrections or changes to the imported files were\
    \ never reflected in the compiled code. It appears ArcGIS Pro compiled the code\
    \ into binary files that it stored somewhere and then never allowed for them to\
    \ be changed. This led to very unusual error messages in which the error message\
    \ reflected the old code, but the line printed on the screen was the new code\
    \ that attempted to resolve the error message. As such, I recommend the Toolbox\
    \ approach here unless you are *100%* confident the imported files will never\
    \ need to be changed.\n\n²https://pro.arcgis.com/en/pro-app/latest/arcpy/geoprocessing_and_python/extending-geoprocessing-through-python-modules.htm\
    \ at the time of writing"
