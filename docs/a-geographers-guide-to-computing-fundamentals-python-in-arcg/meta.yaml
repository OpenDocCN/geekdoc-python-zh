    共享数据服务和使用已作为服务共享的数据，正如前一章所述，是人们加入 Web GIS 生态系统中更广泛的 GIS 用户网络的主要切入点之一。然而，数据并不是
    GIS 系统中唯一可以共享的部分。本书的主要重点是培养创建脚本以某种方式增强 ArcGIS Pro 的技能。一旦您有了对您有用的脚本，同样的脚本可能对其他人也有用，这是合乎逻辑的。本书的最后几章致力于创建一个您可以与他人共享的包。


    然而，创建包的第一步是了解它们是如何使用的。因此，本章重点介绍他人创建的外部包的使用。它将使用两个包：`numpy` 和 `arcgisbinding`。`numpy`
    包是一个统计计算包，它提供了比 ArcGIS Pro 自动包含的更广泛的统计分析功能。如果您需要更强大的统计计算能力，可能值得完全离开 Python，转而使用名为
    R 的统计计算系统。`arcgisbinding` 包在 R 中，允许在 ArcGIS Pro 和 R 编程环境之间进行通信。


    已经为 Python 创建了各种各样的模块，其中大多数与 ArcGIS 或空间数据关系不大。模块的概念在第 5 章中引入，将其介绍为 Python 基础版本的扩展。到现在，您已经非常熟悉其中一个模块：ArcPy。正如
    ArcPy 服务于特定的扩展目的——允许在 ArcGIS 环境中使用 Python 代码——其他模块服务于其他目的。其中一些包含在通过 ArcGIS Pro
    提供的 Python 安装中，例如您在第 5 章中用于读写 CSV 文件的 csv 模块。如果您转到功能区的“项目”选项卡，然后单击左侧菜单中的“Python”，您将看到
    Python 包管理器。虽然本章和相关任务不会更改可用的包，但您可以使用“添加包”按钮将更多包安装到当前的 ArcGIS Pro 环境中。但是，不支持导入不在此列表中的包，大概是因为
    ESRI 只支持他们已验证不会导致 ArcGIS Pro 崩溃或以其他方式行为异常的包。


    从计算的角度来看，模块是一系列服务于共同总体目的的 Python 文件。这意味着，如果您可以研究 Python 模块的内容，您就可以潜在地使用第 5 章中关于阅读
    Python 代码的策略来弄清楚模块的每个组件在做什么。然而，从实际的角度来看，通常有太多的 Python 文件无法实现这一点。这种大量文件通常影响我们查看或使用模块的方式是通过错误消息。下面重新打印了前一章的一个错误消息。查看消息的
    Traceback 部分是我们现在看到更多的内容，通过跟踪不同函数中的错误消息。在此错误消息中，我们看到它指的是文件“c:\program files\arcgis\pro”中的错误。


    **补充信息：** 在线版本包含补充材料，可在 [https://doi.org/10.1007/978-3-031-08498-0_19] 获取。'
