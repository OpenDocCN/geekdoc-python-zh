    ### Introductory Comments: Python Modules


    Sharing a data service and using data that has been shared as a service is, as
    was stated in the previous chapter, one of the primary entry points for people
    to join the broader network of GIS users in the Web GIS ecosystem. Data, however,
    is not the only part of the GIS system that can be shared. The primary focus of
    this book is developing skills to create scripts to enhance ArcGIS Pro in one
    way or another. Once you have scripts that are useful to you, it is only logical
    that the same scripts may be of use to others. The final chapters of this book
    work toward creating a package that you can share with others.


    The first step, though, in creating a package is understanding how they are used.
    As such, this chapter focuses on the use of external packages that have been created
    by others. It will use two packages: `numpy` and `arcgisbinding`. The `numpy`
    package is a statistical computing package and provides a wider array of functions
    for statistical analysis than those which are automatically included within ArcGIS
    Pro. If you need even more statistical computing abilities, it may be worth leaving
    Python entirely for the statistical computing system called R. The `arcgisbinding`
    package is in R and allows for communication between ArcGIS Pro and an R programming
    environment.


    There is a wide variety of modules that have been created for Python, most of
    which have little to do with ArcGIS or spatial data. The concept of modules was
    introduced in Chap. 5, introducing them as extensions to the base version of Python.
    By now, you are quite familiar with one of those modules: ArcPy. Just as ArcPy
    serves a specific extension purpose—allowing the use of Python code within an
    ArcGIS environment—other modules serve other purposes. Some of these are included
    with the installation of Python provided through ArcGIS Pro, like the csv module
    you used in Chap. 5 to read and write CSV files. If you go to the Project tab
    of the ribbon and click on Python in the menu at left, you will see the Python
    Package Manager. While this chapter and the associated tasks will not change what
    packages are available, you can use the Add Packages button to install more packages
    to the current ArcGIS Pro environment. However, importing packages that are not
    on this list is not supported, presumably because ESRI will only support packages
    that they have verified will not cause ArcGIS Pro to crash or otherwise behave
    strangely.


    From a computational perspective, modules are a series of Python files that all
    serve a common overarching purpose. This means that, if you could investigate
    the contents of a python module, you could potentially use the strategies from
    Chap. 5 on reading python code to figure out what each of the components of the
