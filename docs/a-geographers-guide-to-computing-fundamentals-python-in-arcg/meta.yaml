    \ this method. Looking at the code below, it might not be immediately apparent\
    \ that these are calls to the constructor for this class, because the input parameters\
    \ to this constructor are presented vertically instead of all in the same row.\
    \ As long as the input parameters are indented exactly one level, this is permitted.\
    \ The commas at the end of all but the last line might give away that these are\
    \ the input parameter tuples for a constructor:\n\n+   - fcList: list of feature\
    \ classes\n- fieldTable: table of fields and strings\n- keyField: field\n- targetFC:\
    \ feature class\n\nThe first is the list of input feature classes. Its display\
    \ name and name properties reflect this purpose, and the difference is that the\
    \ display name is what appears in the tool's dialog box, but the name is used\
