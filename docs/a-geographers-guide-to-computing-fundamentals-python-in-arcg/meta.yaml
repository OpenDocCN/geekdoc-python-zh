    \ 文件\n\n### 20\n\n### 引言：更复杂的编程与 UML\n\n本书中关于分享你的工作的最后一部分，我们将介绍如何创建一个 Python 包。具体细节将在下一章中介绍，但首先，我们将更深入地探讨通常导致包创建的编程过程。在许多情况下，无论是否创建包，你都可能发现自己需要使用多个\
    \ Python 文件。可能的情况是单个文件变得过长难以管理，因此你想将其拆分。但更常见的情况是，你意识到你编写的代码中某些部分可能具有更广泛的通用性，将其作为单独的文件会更易于被更多项目访问，这将是有益的。\n\
    \n这正是启发本章代码的情景。我当时正在一个研究项目中工作，该项目创建了数百个模拟数据的要素类用于统计分析。这个迄今未发表的项目研究了统计 p 值对某些地理情况的敏感性，我通过比较美国\
    \ 2016 年总统选举的 LISA 分析结果与随机模拟数据的 LISA 分析结果来评估这种敏感性。每次 LISA 分析有 100 次模拟，每次模拟都在其自己的要素类中。对于这项工作的部分，我想创建一个列表，包含每个县在所有\
    \ 100 次模拟中的值，并找出这个数字列表的最小值、最大值、平均值、标准差和其他分析摘要。GIS 的标准方法是连接所有模拟要素类，但连接 100 个要素类对于这种情况来说似乎有些过头。虽然我或许可以让\
    \ 100 个游标同时遍历这些要素类，但无法保证它们都以相同的顺序包含所有要素，而这对于我计算的摘要是必要的。\n\n因此，我决定创建一个名为 multiCursor\
    \ 的类，它可以像游标一样遍历文件，但游标返回的是与该游标关联的要素类中该要素在属性表中对应条目的单行列表，而在 multiCursor 中，它返回的是一个列表的列表，每个内部列表对应于该要素在其中一个要素类中的条目，整个列表包含为它提供的每个要素类的一个列表。如果\
