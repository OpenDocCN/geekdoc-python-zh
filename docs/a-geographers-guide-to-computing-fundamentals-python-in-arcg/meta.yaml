    \ points): Knowing what you do about Python, what data type would you use for\
    \ this variable linking tax rates with building types? Why?**\n\nThe other method\
    \ carries out the calculations for the approval process, so it is more complex.\
    \ We need to check the two conditions for approving or denying building proposals:\
    \ whether the new building matches the type of existing buildings, if there are\
