  md: "Within the inner chapter21 folder, place copies of the multiCursor.py and summarize.py\
    \ files. If everything from Chap. 20 worked out correctly, you should have no\
    \ need to edit these files. Simply copy them and paste them into the chapter21/chapter21\
    \ folder. These therefore form the basis of the package by providing the substantive\
    \ content. However, the mere existence of these files in this folder does not\
    \ provide the structural syntax that is needed for the package to work correctly.\
    \ As an analogy, think of the pages of a book. These two files form the pages\
    \ of the book. They give the information that is absolutely necessary for the\
    \ book to have any instructive or entertainment value. However, if all you have\
    \ are the pages without any binding, it all falls apart and cannot be actually\
    \ read as a book. We need the binding. The rest of the package provides this binding\
    \ to make sure the contents are usable. The binding takes the form of two additional\
    \ .py files.\n\nThe first of these is much like the initialization method for\
    \ a class and is named `__init__.py`. As with that method, it has two underscores\
    \ before and after the init. To create this file, I suggest opening up IDLE and\
    \ going to the File menu and then New file. Once it is opened, save that new file\
    \ as `__init__.py` in the chapter21/chapter21 directory, so that it is sitting\
    \ alongside summarize.py and multiCursor.py. After you have saved it, you are\
    \ done. Oddly enough, this file is, for a project as simple as this one, empty.\
    \ There can be other instructions here for more complicated packages, but nothing\
    \ is needed for us. Nonetheless, even though it is empty, it is necessary to alert\
    \ the Python system that this is intended to be a package.\n\nThe other file we\
    \ need is up one directory, in the first chapter21 folder, alongside the inner\
    \ chapter21 folder. It is to be called setup.py, and it has information about\
    \ the package. There is also a strict structure for this file. It gives the metadata\
    \ about the package through a `setup()` function, which should look very much\
    \ like this. The names of the input parameters for the `setup()` function are\
    \ mostly self-explanatory. The ones that might not be as readily apparent are\
    \ the last three. The packages parameter uses the `find_packages()` function to\
    \ extract everything from the chapter21 folder, as specified in the where parameter\
    \ to the `find_packages()` function. The license parameter specifies a usage license\
    \ that you want to use for your package. The MIT license is a commonly used one\
    \ which says that it is free to use with the disclaimer that provided “as is”\
    \ and thus the author is not legally liable for any consequences of bugs. You\
    \ can use https://choosealicense.com/ to investigate your options. The last parameter\
    \ specifies the packages that your package requires. In this case, because we\
    \ import `arcpy` and `statistics`, these should also be available:\n\n```\nfrom\
    \ setuptools import setup, find_packages\n\nsetup(\n    name=\"chapter21\",\n\
    \    version=\"0.1\",\n    author=\"Jamison Conley\",\n    author_email=\"<jamison.conley@mail.wvu.edu>\"\
    ,\n    description=\"Chapter 21\",\n    long_description=\"Multicursor and summarize\
    \ package for Chapter 21 of Geographer's Guide to Programming\",\n    packages=find_packages(where='chapter21'),\n\
    \    license='MIT license',\n    install_requires=['arcpy', 'statistics']\n)\n\
    ```\n\nBefore proceeding any further, you should have the following folder and\
    \ file structure. If it looks like this, you are ready to go (Fig. 21.1).\n\n\
    Installing packages is not done through IDLE. There are separate systems for this,\
    \ one of which is called pip. To access it, we need to get to the command line\
    \ prompt for Windows. I suggest using the search function next to the Windows\
    \ start menu and searching for “cmd.” You will then see “Command Prompt” as an\
    \ app. Click on that, and you’ll see this window appear."
