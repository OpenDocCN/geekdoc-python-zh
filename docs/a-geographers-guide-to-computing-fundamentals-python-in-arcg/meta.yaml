    # Task 2: Use Online Python Help Documentation to Understand Part of the Script


    From the start of the script, you encounter Python code we have not yet seen.
    The first line is `import csv`. First, notice that the word `import` is in orange.
    The script editor in IDLE highlights certain types of tokens in different colors
    to help signify the kinds of the “parts of speech,” to continue the language metaphor.
    Keywords are in orange. We can look online to find out what the `import` keyword
    is doing.


    Go to the Python documentation at https://docs.python.org/3/. While this brings
    up Python 3.9.7 documentation (at the time of writing), we want to switch over
    to the same version of Python that ArcGIS Pro uses, which (again, at the time
    of writing) is Python 3.6. Go to either the drop-down menu which currently says
    “3.9.7” and choose “3.6” or select the “Python 3.6 (security-fixes)” in the list
    of *Docs by version*.


    In the *Quick search* at the top right, enter “import” and click the *Go* button.
    Scroll down some, and you’ll see a link titled “6. Modules.” Click on it to see
    more about modules. In practice, you might need to read through several pages
    of documentation before finding the right one. In this case, though, you could
    probably rule out those which highlighted the letters for “import” within the
    word “important.” Modules are extensions to Python which serve specific purposes.
    Just like you must enable extensions like Spatial Analyst and Network Analyst
    within ArcGIS, you must enable extensions or modules within Python. The `import`
    statement is what handles that, and here we are importing a module called csv.
    As the name suggests, it is what allows IDLE (and Python in general) to read and
    write comma-separated values (.csv) files. There are many modules, including one
    specific for ArcGIS (called ArcPy), which we will see much more of later in the
    book.


    Now that we have the csv module imported, we look to the next line to decipher
    it. It reads:


    ```

    participants_path = input("Enter the file path for the participants file. ")

    ```


    First, you may notice that we have two new colors: purple and green. Based upon
    the syntax, we can figure out what they are. Because the purple is a name followed
    by parentheses, this fits the syntax for functions. Therefore, purple is for the
    names of functions, although it is limited to functions that are built into standard
    Python. (In other words, any functions you define will be black, rather than purple.)
    The green text starts and ends with quotation marks, telling us that it is a string.


    Furthermore, you might recognize the string from when running the script. Take
    another look at the Python Shell and you will see that it is the prompt you had
    when providing the file path for the participants. That is a clue to what the
    `input` function does. Search again in the Python documentation for “input function”
    (without the quotation marks) and if you scroll down, you’ll see a link for “2.
    Built-in Functions.” Take a look at that, and you will see a table of all built-in
    functions at the top of the page.'
