    To create the variables for `paid` and `instructor`, enter the following lines.
    Note that `True` and `None` are case-sensitive keywords, as is the other Boolean
    value, `False`.


    ```

    paid = True

    instructor = None

    ```


    Before going any farther, here is a note on variable names. They can contain letters,
    numbers, and underscores, but cannot start with a number. Also, they cannot be
    `keywords`. Keywords are words that have been reserved for a very specific purpose
    within Python. You now have two keywords on the screen, and they are in slightly
    darker font—`True` and `None`. Because they are reserved for specific values in
    variables, you cannot have variables called `True` or `None`. We will see keywords
    throughout this book, and a complete list is available at [https://docs.python.org/3/reference/lexical_analysis.html#keywords](https://docs.python.org/3/reference/lexical_analysis.html#keywords).


    There''s one further note for assigning variable values. We have, thus far, been
    using another form of token, `literals`, which are values that the computer will
    interpret exactly as they are. In that sense, literals are another form of nouns
    for Computerese. Examples are numbers (100, 0.5, etc.) and text strings ("ArcGIS
    Training," "98 Beechurst Ave.," etc.).


    You might, at times, want to do something like the following, in which a variable
    exists on both sides of the equals sign:


    ```

    x = y

    ```


    The computer can handle this in two different ways, and some programming languages
    choose one approach, while others chose the second. The first approach is to have
    both names, `x` and `y`, refer to the same box. This is not what Python usually
    does. Most of the time, Python instead still treats them as separate boxes, but
    copies the `contents` of `y` and puts that value in `x`. Therefore, if you do
    this, and then change the value of `x`, `y` will still have that original value,
    instead of change along with `x`. However, there are exceptions to this in Chap.
    12, Task 3, and Chap. 20, Task 5.


    # Sequences


    We now have variables for all the boxes in Figure 2.4 except for the list of participants,
    which is a kind of sequence. Python has several kinds of sequences, and the three
    we will look at here are lists, tuples, and dictionaries. Lists and tuples are
    both ordered, meaning the items they contain have an index, and thus can be referred
    to as the first, second, third, etc. item in the list. The only difference is
    that tuples cannot be edited after they have been created, while lists can be
    changed. This difference restricts what methods are available for tuples versus
    lists, as things which would alter the contents as an effect of the method, like
    sorting a list, are not available for tuples. The syntax for creating a list and
    a tuple is as follows:


    ```

    list_name = [item_0, item_1, item_2, ..., last_item]

    tuple_name = (item_0, item_1, item_2, ..., last_item)

    ```


    You will note that the only difference is square brackets for the list and parentheses
    for the tuple. Let''s create a tuple of `participants` with the following code
    (all on one line):


    ```

    participants = ("John Smith", "Fred Jackson", "Alice Scholl", "Bob Waters", "Eve
    Douglas", "Monty Adams")

    Press Enter.

    ```


    Tuples are ordered, so we can use an index to access individual items in the tuple.
    Perhaps counterintuitively, the indexes start at 0, rather than 1. Thus, John
    Smith is the zeroth item in the tuple. To access items in the tuple, you enter
    the name of the tuple, followed by the index you want in square brackets. (This
    syntax uses square brackets for both lists and tuples. If you use parentheses,
    you will get what is, at least for now, a very confusing error message. If you
    recall the syntax patterns described in the introductory comments, remember that
    a name that immediately preceded parentheses was interpreted as a function, rather
    than a variable. If you use parentheses here, it will try to interpret the name
    of your sequence variable as the name of a function, when no such function exists,
    and the computer gets very confused by this.)'
