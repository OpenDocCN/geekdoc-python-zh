  md: '![](img/37990581b275bdf7d510c6f2d9702a31_165_0.png)


    Fig. 16.1 Class diagram of a class with properties and methods


    are built-in methods that apply to most (if not all) classes, and they get their
    name because the method names always start and end with two underscores (a double
    underscore or “dunder”). The two that we will use in this chapter are the `__init__`
    and `__str__` methods. The first of these is the class’ constructor method, which
    is the code that is run when an object of this class is created and is typically
    where the properties of this new object are set. Without it being made explicit,
    you have used `__init__` methods repeatedly. Any time you use a class’ constructor
    method, you implicitly use the `__init__` constructor. Therefore, when you create
    a Describe object through calling `arcpy.Describe()`, this is, behind the scenes,
    calling the `__init__` method of the Describe class. The second of these is how
    the object will be represented when it is turned into a string. It isn’t an exact
    match for this, but you can probably think of it as what happens to an object
    when you call the `str()` function on that object.


    When programming within a class, you will need to be able to refer to the object
    of that class which is the instance of the class that all the properties and methods
    are acting upon. For example, when you call the `aprx.listLayouts()` method through
    the `aprx` variable in the figure above, the code within the `listLayouts` method
    needs to be able to access the `aprx` variable. This is not as straightforward
    as you might initially think, because the code has to be written such that it
    doesn’t matter what the variable is called. We don’t know if the `ArcGISProject`
    object is called `aprx`, `myProject`, `currentProj`, or even `iHateArc`. For this
    reason, it is accessed within the code through a special variable which is usually
    called `self`.² When creating the variable in the `__init__` method, `self` is
    the first variable. Likewise, when passing the variable through methods, the first
    parameter is always `self`. Just as you would use `aprx.listLayouts()` in the
    Python Window, you would use `self.listLayouts()` if you needed to access the
    list of layouts while in another method of the `ArcGISProject` class. Also, if
    you need to access a property within a method, like the `save()` method needing
    to be able to access the `filePath` property, the code within `save()` would use
    `self.filePath` to get to that property.


    As we update this tool to provide better functionality and create our two classes:
    `Parcel` and `ApprovalError`, we will see these concepts in action.


    # Task 1: Update the Tool Dialog Box


    As stated above, we want to be able to enter three input parameters: a lot ID
    number, represented as a string; the area of a proposed building, represented
    as a Double; and the type of building, representing a string restricted to be
    from the following list of values: COMMERCIAL, COMMUNITY, EDUCATION, GOVERNMENT,
    HEALTH, RECREATION/TOURIST, or RESIDENTIAL. These are taken directly from the
    type field within the file of buildings, so must be exactly as they appear, including
    in all caps. Otherwise, the code will not work.


    **Question 1: Please make the changes to the tool to make it appear as below.
    Note the changes to the display name of the tool (“Propose New Building”), the
    three parameters, the display text for them, and the ability to select from the
    list of building types. Not shown: all three parameters are now required. This
    should be a review of skills from the previous two chapters.**


    > ²It is not required to be called self, but standard practice is that it almost
    always called this. As such, I’ll just refer to it as self from here on out.'
