    # Part IV

    Sharing Your Work with Others


    Even though it can often seem to be a very solitary practice, computer programming
    is greatly enhanced when connected with the community of millions of programmers
    worldwide. You have already, perhaps unwittingly, worked within some of these
    connections. It can even be as simple as searching online to investigate whether
    anyone else has encountered the bug you are currently staring at, and seeing if
    their solution will work for you, too. Also, any time you import a package, or
    even use software written by others, you are building upon the work of others.
    This sharing is made more explicit with WebGIS, another subject which readily
    fills its own book, and is thus not fully explored here. The primary ways that
    sharing happens is through connections with packages others have written, and
    creating your own package to share with others.


