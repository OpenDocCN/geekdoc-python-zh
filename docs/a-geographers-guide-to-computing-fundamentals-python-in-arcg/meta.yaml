    # Introductory Comments: Strategies for Managing More Complex Code


    This chapter picks up where Chap. 14 left off, continuing to improve the usability
    of ArcGIS Pro within the context of the cadastral application from the previous
    lab. There are two ways we will try to improve things. The first will be to change
    the parameters to allowing the user to either enter the lot number or enter the
    block and section number for the building, instead of having to know the size
    of the lot and the size of the building footprint. The second improvement will
    be to improve how errors get handled, so the user is less likely to be the recipient
    of hard-to-read error messages.


    To make these improvements, we will need to have a more complex structure to our
    Python code, including defining our own functions and using more than one function.
    Most of the concepts that underlie this added complexity are not new. The first
    section of the book provided almost everything that you need to know, whether
    that is defining a function and calling it or using a conditional statement. The
    only new material is some additional means of managing and creating error messages,
    which will be introduced as it is entered into the program.


    The bigger changes are, in a way, the length of the program, as the file gets
    longer. As it does so, and especially in later chapters as the complexity continues
    to increase, you might find it useful to use the strategies introduced earlier
    of pseudo-code outlines and/or flow charts to better plan the code, as well as
    understand what it is doing. Lastly, this chapter illustrates a realistic aspect
    of the evolution of code within a program. The additions and changes do not take
    place in a nice, neat, and linear fashion but instead are added to different portions
    of the code out of order. This mirrors what often happens in practice, especially
    for large projects that are too lengthy to be developed sequentially from start
    to finish in one sitting.


