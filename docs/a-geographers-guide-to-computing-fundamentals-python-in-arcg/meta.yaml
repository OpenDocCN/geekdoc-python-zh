    # Task 4: Provide Metadata About Your Service


    Looking at the image at the end of the previous task, you might notice it is not
    very useful for anyone who might want to use this service. It even has a generic
    name that, while descriptive for its purpose within this book, does not convey
    to a broader, external audience what this service might provide. The description
    is missing. In a sense, this is like a can of food without its label. There’s
    little way to know what the contents are unless you open the can or access the
    data. However, who wants to take the time to access data that they know nothing
    about in the unlikely event it is useful for anything they might want to do?


    As mentioned in the chapter introduction, we need to add some metadata to this
    in order to make it more useful. If you take a look at the different properties
    of the `FeatureSharingDraft` class, you might notice several of them contain information
    about the service. By default, these properties do not contain any useful information,
    but we can edit them to make them more useful.


    The first one we will edit is the `.credits` property. The online documentation
    does not provide as much help as we might want here, as it simply says it is “a
    string that represents the credits.” Since the credits on a map typically provide
    information about the source of the data, we can provide the source of this dataset:


    ```

    sddraft.credits = "US Census Bureau, 2010 Decennial Census"

    ```'
  - '[PAGE 204]


    The next property we will edit is the summary. This, unsurprisingly, provides
    a brief overview of what the user can expect to see:


    ```

    sddraft.summary = "US Counties, symbolized by per capita income"

    ```


    Third, we can provide a fuller explanation of the contents of the service through
    the description:


    ```

    sddraft.description = "This feature class shows the per capita income of United
    States Counties in 2010, using a five-class natural breaks classification."

    ```


    The fourth property we will edit is the `.tags` property. This helps with searching.
    If you want people who are searching for data to be able to find your service,
    you should carefully consider what tags you want to provide. In this example,
    a person searching for “income” might find this service to be useful, so having
    a tag of “income” will help it appear somewhere in their search results:


    ```

    sddraft.tags = "income, US Counties"

    ```


    The final property that we will edit is the `.useLimitations` property. Depending
    upon the nature of the data, you might want to specify any recommendations for
    when you would not use this data. For example, if the precision of the location
    is coarse, you might want to specify that it is not suitable for use at scales
    larger than 1:100,000. In this case, we do not have any such limitations, so will
    specify that:


    ```

    sddraft.useLimitations = "none"

    ```


    Revisiting the documentation for these properties, notice that they are generic
    strings. The computer, lacking all common sense, will gladly accept any string
    in here, even “42” or “bad wolf,” regardless of how useful or useless it is for
    the purpose. In that sense, it fills the same function as the comments do within
    our code. The computer ignores this information and blindly presents it to the
    user. The difference is that comments are, in most cases, only within a small
    group of people, perhaps even just for yourself, to help explain the purpose of
    individual lines of the code. On the other hand, this metadata about your service
    is public facing, available to anyone who might come across it. It should, therefore,
    go without saying that this is an important communication strategy that can help
    enhance or limit the use of your service.


    Returning to the code, we have edited the draft of the service definition. To
    make these changes public, we have to revisit the code from the previous task
    turning the draft into a fully uploaded service. There is, though, one more step
    to do first. In your examination of the properties, you might have noticed one
    called `.overwriteExistingService`. This records whether or not you are allowed
    to change the service once it is created. Type in the following line to examine
    its value:


    ```

    sddraft.overwriteExistingService

    ```


    # Question 4: Is the value of this property True or False?


    If the value is True, we are ready to move forward with the staging and uploading
    process. If the value is False, we need to first set it to be True with the following
    line:


    ```

    sddraft.overwriteExistingService = True

    ```


    Once that is done, we can use the same lines as above to share our updated service
    with the rest of the world:


    ```

    sddraft.exportToSDDraft(output)

    arcpy.StageService_server(output, sd_output)

    arcpy.UploadServiceDefinition_server(sd_output, "HOSTING_SERVER")

    ```'
