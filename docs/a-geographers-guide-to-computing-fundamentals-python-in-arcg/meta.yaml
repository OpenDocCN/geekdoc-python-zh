    Describe, how many properties are available for Shapefile FeatureClasses?


    **Question 6 (5 points):** Using those inherited from *all* superclasses, including
    Describe, how many properties are available for Raster Datasets?


    # Task 3: Running an ArcPy Script in IDLE


    You may have noticed in many of the code samples in the ArcPy documentation that
    there are examples for using the function, method, or object in the Python Window
    within ArcGIS Pro, as well as in a stand-alone script that would run in an outside
    environment, like IDLE. We will start here with accessing `arcpy` commands through
    IDLE instead of the Python Window.'
