    \ Stewart\nChecking on instructor  Donna Jones\nChecking on instructor  Hussein\
    \ Yousafzai\nChecking on instructor  Fred Williams\n>>>\n```\n\nYou might notice\
    \ that the instructor we examined for the first row, Caine MacEwan, is not printed\
    \ here. This is because of our use of the `next()` function. As stated above,\
    \ the `for` loop means that the file reader essentially calls `next()` until there\
    \ are no remaining items in the list. It keeps track of which row is the next\
    \ one for it to access. When we simply start into the `for` loop, that item is\
    \ the first one, or item 0. However, our use of `next()` moved that index to item\
