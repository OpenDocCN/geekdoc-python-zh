- md: "## Task 5: Debug the Code\n\nFirst, let's try it out with values which ought\
    \ to work. Run your tool with the following inputs: lot number 42007001, new building\
    \ area 100, and new building type RESIDENTIAL.\n\nOpen up the message by clicking\
    \ on the little triangle arrow to the left of the check mark.\n\n**Question 4\
    \ (10 points): What is the estimated tax assessment of this property?**\n\nNow\
    \ let's look at what happens if the building type doesn't match an existing building.\
    \ Change the lot number to 42004001, which contains an EDUCATION building already,\
    \ but leave the new building type as RESIDENTIAL. You should get a massive error\
    \ message, concluding with NameError: name \"errorType\" is not defined.\n\n![](img/37990581b275bdf7d510c6f2d9702a31_173_0.png)\n\
    \nThis traceback gives us information on how to find all the different areas where\
    \ the error might be. We can read it from the bottom up. It tells us that the\
    \ error was discovered on line 15, in the method called `createMessage`. The line\
    \ says `if errorType == 1:` and there is nothing called `errorType`. In this situation,\
    \ that's all you would need to possibly recognize that, while there is a perfectly\
    \ good property called `errorType`, without `self.`, we are not actually accessing\
    \ that property. The computer is, instead, looking for a separate variable called\
    \ `errorType`, which doesn't exist. Therefore, we need to replace `errorType`\
    \ with `self.errorType`. This is true both here and a couple lines below when\
    \ we create the message for error type #2.\n\nIf we hadn't recognized this in\
    \ line 15, the error could have been a problem in the method that called `createMessage`\
    \ instead of in `createMessage` itself. To see what that was, we need to go up\
    \ one entry in this traceback. It then says it was line 10, within the `__init__`\
    \ method, that called `createMessage`, and, indeed, you can see that it tells\
    \ you the line is `self.message = self.createMessage()`.\n\nWe can continue up\
    \ the traceback to see what initialized this error message in the first place.\
    \ That is in line 65, within the `propose` method, where it raises an `ApprovalError`.\
    \ While the error is, again, not here, it illustrates one aspect of how custom\
    \ classes work. We never called anything like `appError = appError.__init__(2,\
    \ \"12180010009\", \"RESIDENTIAL,\" \"EDUCATION\")`, even though, in this line,\
    \ the `__init__` method is nonetheless called. That is an aspect of creating objects:\
    \ the `__init__` method is always accessed through what is called the constructor,\
    \ which is a method whose name is the exact same as the name of the class (`ApprovalError`\
    \ here) and which has all the input parameters from the `__init__()` method minus\
    \ the required `self` parameter. Thus, to construct the object and run the code\
    \ within the `__init__()` method, we need to call the constructor through the\
    \ name of the class, using this piece of code:\n\n```\nApprovalError(2, self.lotID,\
    \ newType, self.buildingType)\n```\n\nto access this method:\n\n```\n__init__(self,\
    \ 2, self.lotID, newType, self.buildingType)\n```\n\nLastly, in the traceback,\
    \ as this approval error is raised within the `propose()` method, we see that\
    \ the call to the `propose()` method is on line 80, in the line `newAppraisal\
    \ = permitParcel.propose(newBuildingSize, newBuildingType)`.\n\nWhile it is not\
    \ the case here, it is possible that we could have an error in either the `newBuildingSize`\
    \ or `newBuildingType` parameters, but it is not discovered until we try to create\
    \ the error message at the end of this traceback. This will be illustrated later.\n\
    \nFix the error on lines 15 and 17 by replacing `errorType` with `self.errorType`,\
    \ if you haven't already done so. Then run the tool again, and you should get\
    \ an error message, but not the expected one.\n\n![](img/37990581b275bdf7d510c6f2d9702a31_174_0.png)\n\
    \nWe took the trouble to create a good, custom error message for the user, but\
    \ it isn't what is shown here. This is because we need to override an existing\
    \ method, specifically the `__str__()` method. If you add `ARCPY.AddMessage()`\
    \ lines, you will see that the `createMessage()` method works perfectly and that\
    \ the message property is correct. However, we have not told `str(ae)` to actually\
    \ access that message. Just as `ApprovalError()` calls the `__init__()` method,\
    \ `str(ae)` calls the `__str__()` method. Currently, without overriding that method,\
    \ it instead relies upon a basic `__str__()` method which just prints the tuple\
    \ of parameters. We instead want it to print out the error message we have created.\
    \ This is a very simple addition to the `ApprovalError` class, defining how we\
    \ want to implement the `__str__()` method to override it and return the message\
    \ we have already created. Define your override of the `__str__()` method after\
    \ the `__init__()` method using the code below:\n\n```\ndef __str__(self):\n \
    \   return self.message\n```\n\nTry the tool again with the same inputs, and you\
    \ should get the correct error message this time.\nNow you have an error message\
    \ saying “There was an error during the approval process. Your building type for\
