    \ of UML is probably overkill. Even so, the use of class diagrams can still be\
    \ useful and can help illustrate how we can organize our thoughts before attempting\
    \ to write the code.\n\n**Supplementary Information:** The online version contains\
    \ supplementary material available at [https://doi.org/10.1007/978-3-031-08498-0_20].\n\
    \nMore than anything else, I hope that what you get from this chapter is a sense\
    \ of the planning that is involved in a larger programming project. To return\
