  md: "# Task 4: Fill in the Shells of the Classes\n\nWe will start with the `ApprovalError`\
    \ class. Its constructor, or `__init__()` method, largely just fills in the properties\
    \ but uses the other method, `createMessage()`, to generate the `message` property.\
    \ Notice that for the most part, this is done by taking one of the input parameters\
    \ and simply assigning it to the property, which is distinguished through the\
    \ `self.propertyName` syntax. While in this case, I have reused the parameter\
    \ names as the property names, there is no requirement that they match like this:\n\
    \n```\ndef __init__(self, errorType, lotID, info1, info2):\n    self.errorType\
    \ = errorType\n    self.lotID = str(lotID)\n    self.info1 = info1\n    self.info2\
    \ = info2\n    self.message = self.createMessage()\n```\n\nThe `createMessage()`\
    \ method follows the flow chart in a straightforward manner. Mainly, notice that,\
    \ even though we did not use the `self` variable in calling the `createMessage()`\
    \ method, it is listed as one of the inputs. As mentioned above, it is the first\
    \ parameter in a method. Otherwise, setting up a method is very similar to setting\
    \ up a function, including the use of the `return` keyword to return a value.\
    \ In this case, it is the message.\nEnter it as follows. This will later generate\
    \ an error, which I have intentionally put in here to illustrate a couple things\
    \ in Task 5. However, running the code will fail until we finish filling in all\
    \ of the method shells:\n\n```\ndef createMessage(self):\n    message = ''\n \
    \   if errorType == 1:\n        message = \"Your building for \" + self.lotID\
    \ + \" is too big to pass the permit process. It currently covers \" + self.info1\
    \ + \"% of the lot and cannot exceed \" + self.info2 + \".\"\n    elif errorType\
    \ == 2:\n        message = \"Your building type for \" + self.lotID + \" does\
    \ not match existing buildings on the lot. It is a \" + self.info1 + \" type while\
    \ the others are \" + self.info2 + \".\"\n    else:\n        message = \"There\
    \ was an unspecified error in the approval process: type is \" + str(self.errorType)\
    \ + \"; lot is \" + self.lotID + \"; information provided is \" + self.info1 +\
    \ \" and \" + self.info2 + \".\"\n    return message\n```\n\nWe can now move on\
    \ to the `Parcel` class. As mentioned above, the `__init__()` method will use\
    \ logic and code largely drawn from the existing `calculateFromLot()` method.\
    \ Start by copying the entire contents of the function into the `__init__()` method.\
    \ Add an indent to every line so that it is indented where it needs to be.\nNow,\
    \ let's move on to adjusting it. First, the first two lines of the method are\
    \ no longer needed, as we now have the lot ID established as a required parameter.\
    \ Instead, though, we need to make sure the object's `lotID` property is set properly.\
    \ Do this by replacing the `if` statement before the query with the following\
    \ line:\n\n```\nself.lotID = lotID\n```\n\nI used a slightly different parameter\
    \ name (`lotID` versus `lotNum`). Make the change in the query to refer to the\
    \ correct variable.\nThe next lines establishing variables and the building search\
