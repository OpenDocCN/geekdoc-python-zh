    shape now, so the variable city contains a tuple of items, given in the order
    in which they are listed in the line defining the cursor. This means that the
    geometry is in entry #0 within the list. Therefore, access that geometry by running
    the following line:


    ```

    geom = city[0]

    ```


    We can confirm that this is, indeed, a geometry by typing geom into a blank Notebook
    cell and running it. You will then see the point that this geometry represents.
    Of course, a point isn’t very interesting here, but this might be of more use
    when we have a more complex shape. Regardless of the type of the geometry, some
    of the properties of any geometry we may want to look at are the following: how
    many points it contains, the first and last points, its length, its area, and
    how many parts it has. The last of the following lines provides something called
    the “WKT” or “Well Known Text,” which is a text-based representation of the geometry.
    Its advantage is that it is portable; many other systems can import WKT (why it
    is well-known!), and this would then be a means of taking geometries out of ArcGIS
    and into other systems.


