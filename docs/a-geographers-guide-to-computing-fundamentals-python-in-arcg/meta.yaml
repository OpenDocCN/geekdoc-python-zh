    ## 12


    ### 引言：使用UML和类图管理复杂对象


    在前面的章节中，我们了解了如何调查、如何操作，以及在较小程度上如何分析GIS数据的数据结构。这些数据结构不仅与分析和地理处理紧密交织，也与制图学密切相关。在ArcGIS的计算机图形学框架内，幕后进行了大量计算，这些计算也与数据结构相关。它必须获取空间坐标（如经纬度对），并计算出这对坐标在屏幕上的位置。接着是矢量数据的简化和概括，其中线条和多边形边界可能会被简化以加快绘制速度。这对于小比例尺（缩小显示）的地图尤为关键。如果你的莫农加希拉河线条非常详细，追踪着所有细小的弯曲，但地图缩小到整个西弗吉尼亚州，很可能整个弯曲都包含在屏幕上的单个像素内。如果是这样，就没有必要尝试绘制所有细节，因为这不会改变细节在屏幕上的显示效果。道格拉斯-普克线条概括算法就是执行这种简化的一种方法。


    对于栅格数据，也有类似的简化方法以加快加载和渲染速度。这是通过金字塔实现的，你可能间接遇到过，因为ArcGIS经常询问你是否要创建金字塔。这些是数据在不同分辨率下的表示，通过合并像素来实现，因为就像河流的弯曲一样，如果许多栅格像素将适合单个屏幕像素，就没有必要尝试单独直接表示每个栅格像素。


    所有这些计算机图形学算法都依赖于GIS数据结构，并且在某种程度上创建了新的GIS数据结构，即使它们只是用于在屏幕上显示数据的临时结构。我们不会在此深入探讨这些计算机图形学问题的具体细节，因为ArcGIS会为我们处理它们。相反，我们将探讨计算中数据结构的另一种方法。虽然这不是你直接放到地图上的那种数据，但地图如何从GIS数据构建的表示中包含了大量信息。这些额外信息，比如地图中有多少图层、某个要素类是什么颜色，以及分级统计图的分类断点，也都需要在计算机中表示。这些制图信息以另一系列计算数据结构的形式存在。本章和下一章将探讨arcpy映射模块（在ArcGIS
    Pro中称为`arcpy.mp`——如果你看到`arcpy.mapping`，你看到的是ArcGIS Desktop的脚本，而不是Pro）中的这些计算数据结构。


    这些用于制图的计算数据结构再次使用了类和对象。虽然我们之前已经见过并使用过类和对象，但映射模块使用了比我们迄今为止遇到的更广泛的类。这是因为ArcGIS在从包含多个图层的地图一直到将州立公园内的瞭望点绘制为亮红色点（直径为四个屏幕像素，位于浅绿色多边形内，该多边形有深绿色边框，厚度为两个屏幕像素）的过程中，需要执行许多步骤。每个步骤都提供了关于如何绘制图像以及在屏幕上绘制什么的不同信息和决策。正如我们在第5章中采取了几个步骤，从指向CSV文件的文件路径到可以读取CSV文件的对象，并且沿途每一步都有不同类型的变量一样，每个制图步骤也有自己的对象和类。为了理清所有这些类，我们将使用比第7章介绍的更完整的UML类图版本。这些图不仅显示每个类的一般内容，还显示类之间如何连接。箭头显示哪个类用于访问其他类。用于连接所示类的方法和属性被包含在内，尽管为了节省空间和清晰度，其他属性和方法未被包含。数字告诉你后续类可以访问多少个实例。例如，`ArcGISProject`类的`listMaps()`方法给你一个地图列表，该列表可能包含任意数量的地图，包括零个，因此标记为0...n。附录（图12.1）提供了对此类UML图的更完整描述。


    第一步是ArcGIS项目，由名为`ArcGISProject`的类表示。通过我们之前见过的方法，我们可以从项目中访问地图列表。我们还可以访问布局列表，这是下一章的主题。然后，每个地图都有一个图层列表，该列表可能为空也可能非空。这一点我们之前已经见过。我可以从Layer类扩展到一些面向数据的属性和方法，例如`dataSource`，但由于本章是关于制图符号系统的，我们继续讨论Symbology对象，通过`Layer.symbology`属性访问。


    Symbology对象等同于ArcGIS Pro中的符号系统面板，访问相同的信息。正如栅格和矢量有不同的符号系统面板版本一样，我们可以使用Symbology类的对象通过`Symbology.colorizer`属性访问栅格着色器，或通过`Symbology.renderer`属性访问矢量渲染器。本章剩余部分的任务将只使用渲染器，尽管下面会讨论着色器以向你介绍它们。


    此外，我们可以看到arcpy支持两种类型的栅格着色器。一种是`RasterUniqueValueColorizer`，用于（正如其名称所示）为每个不同的值或一组值使用唯一值，而另一种`RasterClassifyColorizer`用于拉伸值。两者都使用颜色渐变，在两种情况下都通过`colorizer.colorRamp`属性访问。你还会在两个着色器子类旁边看到一些具有更基本Python类型的属性只是简单地列出。例如，`RasterUniqueValueColorizer`有一个名为`field`的属性，类型为String。这是用于确定显示颜色的字段。类似地，`RasterClassifyColorizer`有一个类型为String的`classificationField`属性。此外，它还有一个`classificationMethod`属性，选项如"NaturalBreaks"和"Quantile"，告诉ArcGIS如何执行分类。


    着色器之间的另一个区别是，虽然两者都使用颜色渐变来获取颜色，但`RasterClassifyColorizer`有一个分类断点列表，每个断点都是`RasterClassBreak`类。这些反过来将颜色表示存储为字典。字典如何变成颜色的细节将在后面讨论矢量符号系统时看到。该类有一个上限，是双精度类型。然而，没有下限，这表明分类断点是排序的，前一个类的上限可以被视为当前类的下限。标签表示为String，这是该类在图例和内容列表中的名称。同时，`RasterUniqueValueColorizer`没有一组分类断点，因为这与通过唯一值表示数据无关。相反，有一个`ItemGroup`对象列表，通过`RasterUniqueValueColorizer.groups`属性访问，每个项目组本身有一个项目列表，每个项目将颜色与一组值关联起来。


    这说明了更改土地覆盖图中森林像素颜色所需的步骤数量。你必须获取项目并访问正确的地图，然后是该地图中的正确图层。然后你获取该图层的符号系统，并且作为栅格图层，获取其着色器。由于土地覆盖图将使用唯一值着色器，访问该着色器的项目组，然后是相应的栅格项目，其中"森林"在值列表中。然后你可以更改该项目的颜色。


    不幸的是，矢量符号系统并没有更简化（图12.2）。矢量符号系统至少最初看起来比栅格符号系统更复杂，尽管实际上有一些相似之处。正如有两种类型的着色器一样，有四种类型的渲染器。`UniqueValueRenderer`与`RasterUniqueValueColorizer`相似，这并不令人意外。两者都有一个`groups`属性，访问`ItemGroup`类的对象列表。区别在于，虽然`RasterUniqueValueColorizer`的`items`属性给你一个`RasterItem`对象列表，但这里的`items`属性给出一个`Item`类型的对象列表。`Item`和`RasterItem`类都有一个值列表，尽管`RasterItem`将此列表中的所有值与一种颜色关联，而`Item`将它们与一个`Symbol`关联。符号在某种意义上是矢量符号系统的核心。大多数渲染器都以某种方式访问符号。我们很快将更详细地探讨符号。此外，正如`RasterUniqueValueColorizer`访问`ColorRamp`对象一样，`UniqueValueRenderer`也是如此。


    对于表示栅格内分类数据的`RasterClassifyColorizer`，有两种主要方式通过此符号系统表示分类数据：通过更改颜色和通过更改符号大小。¹ `GraduatedColorsRenderer`是更改颜色的方法，而`GraduatedSymbolsRenderer`是更改符号大小的方法。属性与此区别相匹配，但由这些


    ¹是的，我知道点密度图和其他方法，但这里不涉及。'
