    ArcGIS Pro. This section focuses on the type called script tools. These are simpler,
    and therefore a gentler introduction to how scripts can be used to create new
    tools. The other type, which is introduced in Chaps. 20 and 21 of Part IV, is
    called a Python toolbox. This approach has more flexibility, and allows for projects
    that incorporate multiple Python files into one tool. For those of you who get
    interested in more in-depth development of GIS software, including contributing
    to the open source QGIS, this more advanced approach may become more useful for
    you.'
  - '[PAGE 147]


    # Creating Custom Tools


    # 14


    # Introductory Comments: Concepts of User Interfaces


    We have seen thus far the ability to enter Python lines and pieces statement by
    statement into the Python Window or block by block in the Python Notebook in ArcGIS
    Pro. Additionally, we have seen how to run standalone scripts within IDLE. However,
    what if you want to run an entire script within ArcGIS Pro? This is accomplished
    through custom tools.


    Custom tools can serve two purposes. The first is running a script that provides
    a tool or analytical technique that is not yet implemented within ArcGIS Pro.
    For example, some forms of spatial regression, like spatial lag regression and
    spatial error regression, are not implemented within ArcGIS.¹ A custom tool, then,
    would accomplish this task. However, most of you are probably not going to be
    engaging in that level of statistical or analytical computing, because this specialized
    task is mainly carried out within the academic research community, and the majority
    of geography undergraduates are not going into that community after graduation.
    This is where the second purpose of tools comes in: making ArcGIS Pro easier to
    use by making it more accessible. The comments below discuss some user interface
    concepts that can help to understand the value of being able to create custom
    tools above and beyond adding new functions to ArcGIS.


    User interfaces, including ArcGIS Pro, have an inherent tension between two goals:
    making the interface intuitive versus making the interface expressive. An intuitive
    interface is easy to use, whereas an expressive interface has a wide range of
    capabilities. For the most part, an intuitive interface will be limited in expressiveness
    by only carrying out a few tasks. However, an expressive interface typically gains
    its expressiveness at the expense of being easy to use. You can probably think
    of this with ArcGIS easily enough by recognizing that it is quite powerful in
    the range of things it can do, but it is not user-friendly or intuitive.


    At the most extreme end of expressiveness, there are command line interfaces,
    which is basically scripting. The number of commands is extremely large, and within
    Python, we can import many packages, which increases the expressiveness even further
    by importing many more functions, classes, and therefore capabilities. However,
    as you are learning throughout this book, it is not easy to use.


    We can place ArcGIS Pro in an intermediate category. Thanks to a graphical user
    interface instead of command line, it is easier to use, but there are still many
    tools and menus and ribbons to navigate. While you would not need to frequently
    refer to online documentation, as with arcpy, or memorize hundreds of functions
    and classes, it is still easy to get lost in the various parts of the ArcGIS Pro
    interface.


    At the most intuitive end, within a GIS context, we can perhaps place a tool dialog
    as an example. If you take just a single tool, you have a clear sense of what
    the parameters are, what you should do, and how to make the tool run properly.
    However, as intuitive as a tool with input dialog boxes may be, it only does one
    task. Therefore, it is as limited in expressiveness as possible. Breaking out
    of the GIS context, “natural language processing,” which is the type of computing
    for voice assistants like those with the Amazon Alexa and Siri in the Apple iPhone,
    is perhaps the gold standard of intuitiveness. You can, in theory at least, ask
    Alexa to set the temperature of your house to a specific setting and (assuming
    you have a thermostat that


    ¹ESRI is adding new statistical techniques with, it seems, each new version or
    ArcGIS Pro, so this statement may soon become outdated. Also, see the incorporation
    of an R program that does exactly this in Chap. 19.


    **Supplementary Information:** The online version contains supplementary material
    available at [https://doi.org/10.1007/978-3-031-08498-0_14].'
  - '[PAGE 148]


    can cooperate with Alexa) have it adjust accordingly.² Likewise, you can ask Alexa
    for the answers to trivia problems, math problems, spelling problems, and so forth.
    These involve computation, and Alexa is, after all, largely a computer.


    Our goal with the task set below, then, is to use a tool to create an intuitive
    functionality for a commonly executed problem within a building permit process
    and embed this tool within an ArcGIS Pro project. Lastly, you will share this
    project and all associated data in a single package so that all the work can be
    readily shared with less GIS-savvy colleagues.


    # Task 1: Create a Custom Tool


    # About the Application


    Imagine you work in the local government office that is responsible for evaluating
    development applications. You are the GIS analyst responsible for maintaining
    the city’s cadaster, which is stored in ArcGIS. A number of your colleagues are
    responsible for providing applicants with some basic information about their properties
    and advising them whether their applications are likely to be favorably considered,
    but they don’t have much experience using GIS. So your job is to build a custom
    tool that will enable your colleagues to use the GIS effectively to answer applicants’
    questions without requiring them to take a 2-week ESRI training course.


    One of the development rules that your local government has is that the size of
    buildings on a particular block of land cannot exceed 30% of the total land area.
    So your tool needs to do the following things:


    +   - Do a calculation that figures out what proportion of the land is currently
    occupied by a structure.

    - Tell the user how much of the block is currently occupied by structures.


    Start ArcGIS Pro with a new project. When you do this, ArcGIS Pro automatically
    creates a toolbox for that project. In ArcCatalog, go to that new toolbox through
    the “Toolboxes” link in the top of the catalog list. Within it should be a toolbox
    which shares its name with the name of the new project.


    Right-click on it and select New→Script. In the Add Script box that comes up,
    type in the name CalculateArea, and the label “Calculate Area”³. Lastly, connect
    the tool to the script by setting the “Script File” option to the calculateArea.py
    file that has been provided for you, wherever you have saved it. Click OK to save
    the edits.


    You might have to close and reopen the “Toolboxes” arrow in the Catalog window
    or otherwise refresh it. ArcGIS won’t necessarily update the display to recognize
    that you have added a tool until you close and reopen it.


    What we are going to do is essentially build the dialog box for the tool. In place
    of the `input` functions that we used in IDLE, we need to have a dialog box in
    ArcGIS that collects this information from the user. It ends up being a bit more
    rigorous than the `input` function because it requires us to specify the data
    type of the input value. It also permits output values. The ability to specify
    the data type helps us resolve plenty of potentially confusing errors immediately,
    such as the user entering a feature collection when a raster is expected.


    Right-click on the newly created CalculateArea tool and select Properties. At
    left, choose Parameters instead of General. Now we will enter the two parameters.
    Click in the first cell underneath Label, and write Block Area. For the Name,
    put Block_Area or BlockArea (as long as it has no space). We want to restrict
    this to real numbers by ensuring it is of the type Double. To the right of Block_Area
    under data type choose Double by clicking on the small ellipsis … that appears
    and choosing “Double” in the long list that appears when you click on the little
    triangle at the right end of the bar.


    ![](img/37990581b275bdf7d510c6f2d9702a31_148_0.png)


    ² See the anecdote about computers not having common sense in Chap. 1 for details
    on the “in theory” comment.


    ³ Observe that the name has no space, as spaces aren’t always allowed in parts
    of ArcGIS file names and file paths. Meanwhile, we are using a label that is more
    readable.'
- md: "## Task 2. Write a Script for a Custom Tool\n\nBelow the import, type the following\
    \ four lines of code:\n\n```\nblockArea = ARCPY.GetParameter(0)\nbuildingArea\
    \ = ARCPY.GetParameter(1)\npercentCover = (buildingArea / blockArea) * 100\nARCPY.AddMessage(\"\
    Your building covers \" + str(percentCover) + \" percent of the lot\")\n```\n\n\
    # Question 1: Then, add comments to describe what each line of code is doing.\n\
    \nSave the script. Now test the code by running your tool again in ArcGIS Pro.\
    \ You shouldn’t need to close it or change the values. Just click the Run button\
    \ again. When you view the details this time, you should have another message,\
    \ specifically the one that is created in the fourth line above.\n\nBy now, you\
    \ might recognize that running a script within a tool involves some functions\
    \ which are similar to ones you’ve seen before in other contexts but which are\
    \ nonetheless not identical. By having the parameters provided through the dialog\
    \ box, we need something that replaces the `input` function, and `ARCPY.GetParameter()`\
    \ provides that service for us. The number in the parentheses⁴ is the index of\
    \ which parameter we want to get from the list. Remember entering in the parameters\
    \ of block area and building area into the “Parameters” set of the tool properties?\
    \ This is how we get those, and the index is the position in that list of what\
    \ we want. Block Area is at the top, so the `blockArea` variable is accessed as\
    \ parameter #0. Building Area is the second row in this table, so `buildingArea`\
    \ is created from parameter #1. Likewise, `print` functions will not operate properly\
    \ in a tool, because there is no output window to print anything to. We solve\
    \ this through the `ARCPY.AddMessage()` function. We looked at messages in Chap.\
    \ 9, within the context of a `Result` object. Here we see how this message gets\
    \ created. We also see how it is possible to use a + operator on strings. It simply\
    \ appends the second string onto the end of the first, so that “Hello” + “World”\
    \ becomes “HelloWorld.” Note that you have to be careful with spaces if you want\
    \ things to look normal, so I might suggest “Hello” + “ ” + “World” instead. In\
    \ some situations, like the print function, this is equivalent to “Hello”, “World”,\
    \ but using comma delimiters creates an error message. Question 2 asks you to\
    \ identify why this is the case.\n\n# Question 2: Using the help documentation\
    \ of the `AddMessage()` function, or the error message it creates, why should\
    \ we use the + operator with strings, instead of a comma delimiter like we did\
    \ with the `print` function?\n\nAs said above, an advantage of the tool is that\
    \ by specifying the type for input variables, a fair number of runtime errors\
    \ can be removed, but this will not save us from logical errors.\n\n# Question\
    \ 3: What is a logical error that this code might allow a user to make? (including\
    \ any logical errors you were able to induce while testing the code?) Logical\
    \ errors would be errors for which the program gives a result the user was not\
    \ expecting.\n\nOne small improvement we could make in the code would be to warn\
    \ the user if the value for the building area is greater than the area for the\
    \ block. This might happen if the user is not paying attention to what the input\
    \ dialog box is prompting them for and enters in the building area first. This\
    \ is probably more serious than a simple message would warrant, so instead of\
    \ giving the user a message, we will give them a warning that they may have done\
    \ something wrong. Add the following lines of code to your program after `ARCPY.AddMessage(\"\
    ...\")` line, and save the file:\n\n```\nif percentCover > 100:\n    ARCPY.AddWarning(\"\
    Your building area is greater than your block area. Please check your values and\
    \ reenter them.\")\n```\n\n⁴As GetParameter is a function, yes, this number is\
    \ the parameter of GetParameter. But simply saying “the parameter of GetParameter\
    \ is the index of the parameter in the parameter list” is confusing.\n\nTry this\
    \ out with values that should trigger the warning, and you’ll see a yellow box\
    \ that says “Calculate Area completed with warnings.” If you proceed to view the\
    \ details, you’ll see the warning, which is displayed in yellow with a triangular\
    \ yellow warning sign. However, going over to the messages area, both the general\
    \ message and the warning appear.\n\nRecall from the scenario setup that one of\
    \ the development rules that your local government has is that the size of buildings\
    \ on a particular block of land cannot exceed 30% of the total land area. Whereas\
    \ a ratio exceeding 100% probably indicates a typo, a value between 30% and 100%\
    \ might indicate an application that should get rejected or at least merit further\
    \ scrutiny. So for this, we will use the `AddError()` function.\n\nAt the end\
    \ of the script, add these lines to extend the `if` statement to have another\
    \ `elif` condition:\n\n```\nelif percentCover > 30:\n    ARCPY.AddError(\"Your\
    \ building might be too big to pass the permit process. Please check your measurements!\"\
    )\n```\n\nSave the script, and run the tool again with values that should produce\
    \ this error. Now you’ll get a message that the tool failed. View details to see\
    \ how it failed, and you’ll find that the culprit is the error message you just\
    \ put into the script. After all, it makes sense that if you add an error to the\
    \ outputs and run the tool with parameters that should trigger that error message,\
    \ it would consider the tool to have failed. While we will continue to expand\
    \ this tool in later chapters, for the time being, we will shift this to sharing\
    \ the tool for others to use.\n\n## Task 3: Sharing the Tool\n\nThe last portion\
    \ of making this useful is to be able to share the tool and associated data with\
    \ everyone. After all, we want this to be as simple as possible for a novice user\
    \ of ArcGIS Pro to run it without extensive training. While an initial guess of\
    \ sharing the .aprx file might make sense, it has implicit instructions to the\
    \ computer like “get the data for the first layer from that source,” and if “that\
    \ source” is a folder on your computer instead of a common drive, ArcGIS Pro won’t\
    \ be able to find it. Instead, we want to create what ESRI calls a “Project Package”\
    \ which provides everything we might need.\n\nLoad into the map the three shapefiles\
    \ provided. Then go to the **Share** ribbon and pick the **Project** item, which\
    \ is the leftmost item in the ribbon and is in the **Package** section. This brings\
    \ up a window labeled “Package Project” at left, where the tool (probably) had\
    \ been. Save the package to a file instead of an online account, being sure to\
    \ choose a name and file location that makes sense. Add a summary of what the\
    \ project is for, being sure it fits the scenario. Likewise, add some tags. These\
    \ would be useful if your organization has many projects, and you can use tags\
    \ to easily find relevant projects for a given task.\n\nMake sure the “Share outside\
    \ of organization” box is checked, as this should ensure the data is included.\
    \ Also make sure the “Include Toolboxes” box is checked, because this is necessary\
    \ to share the toolbox and associated tools. Lastly, if you followed instructions\
    \ and generated the error message in the previous task, uncheck the “Include History\
    \ Items” box. Having errors in the geoprocessing history will cause this part\
    \ to fail if and only if this box is checked.\n\nClick the Package button. If\
    \ it asks you to save the project first, please do so.\n\n**Question 4:** The\
    \ package will be evaluated by the following criteria:\nA. Does it open with the\
    \ data and tool included?\nB. Does the tool create the appropriate message for\
    \ building and lot areas that are acceptable?\nC. Does the tool generate the warning\
    \ if the lot area is bigger than the building?\nD. Does the tool generate the\
    \ error if the building is too big for the lot?\n\n## Task 4: Critical Thinking\n\
    \nIn lieu of debugging and unguided programming portions for this chapter, I will\
    \ instead have you consider the introductory remarks about intuitive versus expressive\
    \ interfaces, and answer the following question:\n\n**Question 5:** Keeping in\
