    \ in parentheses. If there are no inputs, you must have an empty pair of parentheses.\n\
    \nFurthermore, the number of input parameters needs to match the number of parameters\
    \ in the function definition, and they must be presented to the function call\
    \ in the same order as you defined them in the function definition.² Python will\
    \ simply take the first value in the parentheses for the call, and put it into\
    \ the first slot of the parameters’ tuple, then the second value in the parentheses\
    \ into the second slot of the parameters’ tuple, and so on. It will not look to\
    \ see if the names are similar, and will only pay attention to the order here.\n\
    \n```\nType in `calculate_revenue(paid_dictionary, student_dictionary, price,\
    \ student_price)` and click Run.\n```\n\n**Question 2 (10 points): Based upon\
    \ the value you receive, how much has been collected so far?**\n\n## Task 2: Objects\n\
    \nThe other basic idea of Python we will cover in this chapter is objects. Objects\
    \ are a complex kind of data type, typically more complicated than integers and\
    \ Boolean values. We have, in fact, already seen some objects, because lists,\
    \ tuples, dictionaries, and even strings can be considered objects. The defining\
    \ characteristic of objects is that they have properties and methods attached\
    \ to them. Properties are like object-specific variables, while methods are like\
    \ object-specific functions. While objects in general have much flexibility in\
    \ their setup, each of the objects has a specific template, called its class,\
    \ to which each variable which is an instance of that class adheres. This class\
    \ is a very specific blueprint of what properties and methods are associated with\
    \ that object type. Creating custom classes, or custom blueprints, will be addressed\
    \ in Chap. 15.\n\nAs mentioned in the introductory comments, each class has a\
    \ set of properties, which are a set of values associated with each instance of\
    \ this object type. For example, if we had a class of type County, it could contain\
    \ the following properties (among others): population, name, state, FIPS, and\
    \ geometry. These properties would be an integer for the population, a string\
    \ for the name and state, another integer (or string) for FIPS, and a different\
    \ type of object representing polygons for the geometry. This illustrates that\
    \ the property of an object can be, and often is, another object. Every county\
    \ must follow this blueprint, and contain values for these properties. Collectively,\
    \ all the values of the properties is called the *state* of the object. We would\
    \ then consider objects to be the same, or equal to each other, if all values\
    \ within their *state* match. Within this county example, the county containing\
    \ WVU might have the following state: the population is 96,189, the name is “Monongalia,”\
    \ the state is “WV,” the FIPS is 54061, and the geometry is the polygon representing\
    \ the county boundary. Even though the other 54 counties within WV have the same\
    \ value for the state property, an object would only be deemed equal to Monongalia\
    \ County if all properties matched Monongalia County’s properties, not just one\
    \ property.\n\nJust as each class blueprint has a set of associated properties,\
    \ it has a set of methods, each with specific input parameters and output values.\
    \ For example, the `.append()` method is associated with lists, but not with tuples,\
    \ as we have seen before, because lists can be edited while tuples are immutable.\
    \ Likewise, `.lower()` is only for strings, not dictionaries or lists. The outcome\
    \ of running these methods also depends entirely upon the state of the object.\
    \ For example, every list has a `.sort()` method. The Python code within the `.sort()`\
    \ method will be the same for every list, although the result of sorting the list\
    \ will, of course, vary from list to list based upon its contents. It might even\
    \ give an error message if it contains data types which cannot be sorted, such\
    \ as objects.\n\nAnother delimiter is used here when working with objects, the\
    \ period. It is what separates the name of the variable containing the object,\
    \ and the properties and methods within that object. This period is what syntactically\
    \ distinguishes a property from a variable and a method from a function.\n\nWhen\
    \ parsing properties, they all have the following generic syntax:\n\n```\nobject_name.property_name\n\
    ```\n\nFor example, if the variable `monongalia` contains the County object representing\
