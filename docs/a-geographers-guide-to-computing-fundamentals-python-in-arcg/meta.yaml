    \ Enabling the Computer to Make Simple Decisions\n\nIn the previous chapter, you\
    \ gave the computer an instruction and it carried it out. Then you gave it the\
    \ next command and it carried it out. However, the power of scripting lies in\
    \ many ways in the ability of computers to carry out more complex instructions,\
    \ whether that is deciding which set of instructions to do, such as send a payment\
    \ reminder only if a person has not yet paid for the registration, or printing\
    \ a certificate of completion for every person in the list of participants.\n\n\
    It would be enough of a pain to have to investigate each person, one by one, by\
    \ retrieving their value from the dictionary, and deciding ourselves whether to\
    \ take the next step. Additionally, it would be equally cumbersome to type in\
    \ each name one by one to print off the certificate, especially when we have typed\
    \ in this information once already. This means that by only doing one instruction\
    \ at a time, like in Chap. 2, we are not taking advantage of benefits of scripting\
    \ in the first place—the computer’s ability to make comparisons and decisions\
    \ extremely quickly.\n\nIt so happens that Python provides ways for us to carry\
    \ out each of these two scenarios. The first of these is a conditional statement,\
    \ in which the computer first investigates whether something is true or false,\
    \ and takes one action or another based upon that result. In Python, conditional\
    \ statements take the form of `if ... elif ... else` statements. The second of\
    \ these is a loop, which repeats the same task multiple times. In Python, loops\
    \ have two forms: `for` loops and `while` loops.\n\nBoth conditional statements\
    \ and loops are more complex statements. This is the setting, alluded to in Chap.\
    \ 2, where a statement can take up multiple lines of code. Even if it is more\
    \ complex, it is within this complexity that we get more value from our scripts\
    \ and our programs.\n\n## Task 1: Explore the Python Notebook\n\nThis chapter’s\
    \ set of tasks continues where the last one left off, and even if you save your\
    \ work as an ArcGIS Pro project (either the .aprx project or the .ppkx packaged\
    \ project), the contents of the Python Window are not preserved. That means we\
