    \ else with them, which makes the importation process much easier for the vast\
    \ majority of programmers who would not have the skills necessary to implement\
    \ those connections manually. This means we must rely on the computer to implement\
    \ those connections. Trusting the computer to make the connections properly means\
    \ there must be a structure that is strictly adhered to in order to ensure the\
    \ computer can find what it is looking for. This structure is examined and implemented\
    \ in Task 1.\n\nThe remainder of the chapter takes the package that is created\
    \ in Task 1 and enables it to be imported into the code for an ArcGIS Pro tool,\
    \ which can then be packaged and shared as a .ppkx file.\n\n### Task 1: Turning\
    \ the MultiCursor and Summarize Files into a Formal Package\n\nThe first aspect\
    \ of sharing our code with the wider world and making it accessible to ArcGIS\
    \ Pro is turning it into a package. In one sense, a package is simply a collection\
    \ of files. However, while the computer is great at storing collections of files,\
    \ if we want the computer to use those files without human supervision, they must\
    \ be structured just as strictly as our computer code is. Any deviation from the\
    \ structure that is expected of python packages will cause problems much like\
    \ a syntax error prevents python code from being read.\n\nTo set up that structure,\
    \ we will want to use a completely new folder and only have the minimum necessary\
    \ inside that folder. Go to Windows File Explorer, and navigate to whatever file\
    \ location you want to use for this chapter’s work. Since this is continuing the\
    \ PValue work from Chap. 20, I am using the same directory that I was using for\
    \ that work. In your chosen directory, create a new folder, and call it “chapter21.”\
    \ Within that folder, create another folder, also called “chapter21.” This gives\
    \ the folder structure below, although the .idlerc folder will be automatically\
    \ generated later, so you won’t have it yet.\n\n![](img/37990581b275bdf7d510c6f2d9702a31_238_0.png)\n\
    \nWithin the inner chapter21 folder, place copies of the multiCursor.py and summarize.py\
    \ files. If everything from Chap. 20 worked out correctly, you should have no\
    \ need to edit these files. Simply copy them and paste them into the chapter21/chapter21\
    \ folder. These therefore form the basis of the package by providing the substantive\
    \ content. However, the mere existence of these files in this folder does not\
    \ provide the structural syntax that is needed for the package to work correctly.\
    \ As an analogy, think of the pages of a book. These two files form the pages\
    \ of the book. They give the information that is absolutely necessary for the\
    \ book to have any instructive or entertainment value. However, if all you have\
    \ are the pages without any binding, it all falls apart and cannot be actually\
    \ read as a book. We need the binding. The rest of the package provides this binding\
    \ to make sure the contents are usable. The binding takes the form of two additional\
    \ .py files.\n\nThe first of these is much like the initialization method for\
    \ a class and is named `__init__.py`. As with that method, it has two underscores\
    \ before and after the init. To create this file, I suggest opening up IDLE and\
