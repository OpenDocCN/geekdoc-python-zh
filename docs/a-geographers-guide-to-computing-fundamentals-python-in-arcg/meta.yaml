    \ high income | (0, 180, 0, 100) |\n| High income | (0, 220, 0, 100) |\n| Very\
    \ high income | (0, 255, 0, 100) |\n\n## 制图：布局\n\n### 13\n\n### 引言：地图与布局的数据结构\n\
    \n本章承接上一章，但第12章关注的是地图图形以及如何更改地图中图层的外观，而本章则关注地图在页面上的布局。用ArcGIS Pro用户熟悉的术语来说，他们清楚地图视图和布局视图之间的区别，第12章探讨了arcpy在地图视图方面能做什么，而本章第13章则探讨了arcpy在布局视图方面能做什么。\n\
    \n与第12章中的类一样，可视化类之间关系的结构会有所帮助，这在图13.1中呈现。和之前一样，我们有通过ArcGISProject访问的Map和Layout类。第12章关注的是附加到Map的类，而本章关注的是附加到Layout的类。它们都在地图元素的框架内，并通过`.listElements()`方法访问。此列表中可以包含几种类型的地图元素，下面的任务使用了其中四种：地图框元素、图例元素、地图周边元素（指比例尺和指北针等）以及文本元素。\n\
