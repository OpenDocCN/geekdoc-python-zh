    that can take in the application with the polygon information, compute what is
    needed, and answer those three questions without any additional steps from the
    user would make the job easier.


    **Question 1: Describe another scenario with a workflow of at least three steps
    that would be frequently repeated, and therefore would benefit from scripting.
    Also provide a step-by-step set of instructions for the workflow.**


    The other limitation that can inspire scripting is that, as extensive as the toolboxes
    are, they cannot cover everything. New statistical techniques are developed on
    a constant basis, and you may want to use a statistical test which is not implemented
    in ArcGIS Pro. Scripting can also solve this, by allowing you to create a new
    tool, and write the code to carry out this new test. While the statistical toolboxes
    are growing within ArcGIS, they (at the time of writing) do not implement spatial
    lag or spatial error regression from the field of spatial econometrics (Ward &
    Gleditsch, 2008). If a person wants to use these tools, she or he would have to
    write a script to implement it in a new tool.


    **Question 2: Describe another tool you wish you had in ArcGIS Pro.**


    # Task 2: Algorithms and Computational Thinking


    The step-by-step set of instructions you provided in question 1 above is an example
    of an algorithm. Algorithms are the basis of how computer software works. They
    are sets of instructions that tell the computer precisely what to do. You can
    think of an algorithm like a recipe. A recipe for chocolate chip cookies tells
    you what you need to have—the flour, the sugar, the eggs, the chocolate chips,
    etc. It also tells you how much to use of each ingredient and what to do, and
    it provides a detailed set of instructions on how to combine and work with the
    ingredients to turn them into cookies. In this, the recipe is an algorithm for
    turning the flour, sugar, and other inputs into the output of cookies. Likewise,
    the city planning example I gave above would take as inputs the polygons for the
    lot, the building, and the parking area for commercial applications, and provide
    as output the answers to those three questions.


    Most computers would not have an idea what your step-by-step instructions are
    above, however. You need to translate the instructions from English to “Computerese,”
    which is the language that the computer can truly understand. Every programming
    and scripting language, from BASIC to Java to Python, can be considered a dialect
    of Computerese. A fuller description of Computerese, and Python, is in the following
    chapters, so only a few general ideas are introduced here.


    First, the computer has zero common sense and a limited vocabulary. As an example,
    I’ll draw from a new form of computer—the home voice assistant, like the Amazon
    Echo. Here is a conversation I had:

    Me: “Alexa, turn the air conditioning to 72 degrees.”

    Alexa: “There is no device called air conditioning.”

    Me: “Alexa, set the AC to 72 degrees.”

    Alexa: “There is no device called AC.”

    Me [getting a little annoyed]: “Alexa, set the temperature to 72 degrees.”

    Alexa: “The air conditioning is set to 72 degrees.”'
- md: "Displaying the limited vocabulary, even though the phrase “air conditioning”\
    \ appeared in Alexa’s words to me, it did not have any meaning to the computer,\
    \ as when I asked to set the air conditioning, it could not find a device called\
    \ that. It only responded to “temperature.” The computer also displayed a lack\
    \ of common sense in not recognizing synonyms that any person would.\n\nThe second\
    \ general principle of Computerese is that computers take everything literally.\
    \ In the city planning example, I might have a typo in the ratio of the building\
    \ size to the lot size, multiplying instead of dividing a building footprint of\
    \ 3000 square feet by a parcel size of 9000 square feet to conclude that the building\
    \ covers 27,000,000% of the lot. Any person will recognize that this is a nonsense\
    \ answer, although the computer will happily report it back to the user. Even\
    \ if you meant to divide, and multiplying gives a nonsense answer, the computer\
    \ will carry out your instructions literally, and multiply the two numbers.\n\n\
    The third general principle, which is used under the hood, so to speak, of GIS,\
    \ even if we don’t see the practical effects often, is that the computer cannot\
    \ see shapes or polygons. It can only work with numbers, and really only work\
    \ with 0s and 1s. This means that everything in a GIS, from the text fields in\
    \ an attribute table to all the geometries, must ultimately be converted into\
    \ numbers. This has a bigger impact in, say, why it can take so long to find the\
    \ intersection of two multipolygons, although it will not substantially impact\
    \ the scripts we use and create in this course.\n\nThe fourth principle, which\
    \ is the advantage, is that the computer can read and carry out these instructions\
    \ incredibly fast. This benefit makes all the frustrations imposed by the first\
    \ three principles worthwhile.\n\nTo take these principles and turn our English\
    \ thoughts into Computerese instructions, we have to engage in computational thinking,\
    \ trying to think like a computer might. A good quote on this comes from an unusual\
    \ source: *Dirk Gently’s Holistic Detective Agency* by Douglas Adams (1987):\n\
    \n> Richard continued, “What I mean is that if you really want to understand something,\
    \ the best way is to try and explain it to someone else. That forces you to sort\
    \ it out in your mind. And the more slow and dim-witted your pupil, the more you\
    \ have to break things down into more and more simple ideas. And that’s really\
    \ the essence of programming. By the time you’ve sorted out a complicated idea\
    \ into little steps that even a stupid machine can deal with, you’ve learned something\
    \ about it yourself.”\n\nTo program the computer, or give it the right instructions,\
    \ we have to break the instructions down into very detailed, very simple ideas.\
    \ We have to get to the building blocks of whatever language we are using, Python\
    \ in this book. We can’t just say find the area of a polygon; we have to tell\
    \ the computer to access the geometry of the polygon, and from that geometry,\
    \ get the area. We can’t just tell the computer to calculate a ratio; we have\
    \ to explicitly divide one number by the other. This means that an essential step\
    \ in any programming task is to break a general task into smaller subtasks, and\
    \ break each of those down into individual steps, and then translate each individual\
    \ step from English into Computerese. This “divide and conquer” approach is a\
    \ critical component of programming and computational thinking.\n\nThis is illustrated\
    \ within the following scenario. Imagine you are a GIS consultant tasked with\
    \ planning the stops for a series of rallies for a presidential candidate in the\
    \ last week of the campaign. Your task is to find the sites of seven rallies,\
    \ one per evening. The campaign manager has provided you with a set of constraints:\
    \ (1) the rallies must be in different states, (2) the rallies need to be in states\
    \ where the polling indicates a close contest, (3) the rallies need to be in large\
    \ cities in those states, and (4) each rally needs a venue with at least 10,000\
    \ seats. Additionally, the campaign has provided you with the polling data, the\
    \ city population data, and the available venues in each city, so that you have\
    \ all the data you need to carry out the task.\n\nAt first, this might seem daunting,\
    \ but through the “divide and conquer” strategy, it can be answered. Looking at\
    \ the criteria, it would seem that there are two parts to this task, so we could\
    \ have two subtasks. The first is to identify the seven states. Then, once we\
    \ have the states picked, we need to identify a city and venue within each of\
    \ the chosen states. Using this, we can start a very general outline.\n\nA. Identify\
    \ states for rallies.\nB. For each selected state, choose a city and venue.\n\n\
    We have one main criterion for the states: that the polling is close. We have\
    \ polling data, so we can find the difference in voting intent between the two\
    \ top candidates. This might or might not be in the data itself, so we may have\
    \ to calculate the difference as the absolute value of candidate A minus candidate\
    \ B. Once we have this, find the seven states with the lowest values, which can\
    \ be executed by sorting the states along this new variable and finding the lowest\
    \ ones. This illustrates taking the subtask and breaking it down further into\
    \ individual steps, as in the more specific outline below.\n\nA. Identify states\
    \ for rallies.\n    a. Calculate new field in polling data:\n        i. Margin\
    \ = |Candidate_A – Candidate_B|/(Candidate_A + Candidate_B)\n    b. Sort states\
    \ by Margin (with the lowest values first).\n    c. Select the first seven states\
    \ in the sorted list.\nB. For each selected state, choose a city and venue.\n\n\
    Now we can break the second subtask down. Within each state, we would need to\
    \ find all the venues in the list of available venues which have a large enough\
    \ capacity. This can give a list of venues with associated cities, and we would\
    \ then want to identify the associated city with the largest population, and pick\
    \ the biggest venue in that city. You will notice a process of initializing variables,\
    \ or setting them to a starting value, and updating them as I cycle through a\
    \ list of venues. The initialization process is what happens in steps B.b and\
    \ B.c. The updating portion happens in steps B.d.i.1 and B.d.i.2. This is a common\
    \ programming strategy as well. Filling this out within the outline gives what\
    \ is below.\n\nA. Identify states for rallies.\n    a. Calculate new field in\
    \ polling data:\n        i. Margin = |Candidate_A – Candidate_B|/(Candidate_A\
    \ + Candidate_B)\n    b. Sort states by Margin (with the lowest values first).\n\
    \    c. Select the first seven states in the sorted list.\nB. For each selected\
    \ state, choose a city and venue.\n    a. Select venues within the state from\
    \ the list of all venues in the country.\n    b. Set the rally venue to the first\
    \ venue in the list.\n    c. Set the rally city to the city containing the rally\
    \ venue.\n    d. For each venue within the state:\n        i. If it has a capacity\
    \ above 10,000 seats:\n            1. If its city’s population is more than that\
    \ of the current rally city, change the rally city and rally venue to this venue\
    \ and its city.\n            2. If its city’s population is equal to that of the\
    \ selected city (which probably means the same city), change the rally city and\
    \ rally venue to this city and venue **only if** the venue’s capacity is larger\
    \ than the capacity of the current rally venue.\n\nThis outline helps to organize\
    \ the process of translating English tasks into Computerese, and illustrates how\
    \ the overarching task is broken down into simpler and simpler steps. The outline\
    \ is in what can be called “pseudocode,” which is a generic form of Computerese,\
    \ rather than any specific scripting or programming language. It gives the set\
    \ of instructions that will be carried out within the algorithm to complete the\
    \ task, and these pseudocode instructions can be transcribed into any scripting\
    \ or programming language. Having this intermediate step of detailed instructions\
    \ is useful, and is therefore something that I would recommend you continue to\
    \ do in the unguided exercises throughout this book.\n\n## Task 3: Non-guided\
    \ Work\n\nAs the unguided task, imagine yourself doing GIS work for a conservation\
    \ agency, seeking to propose areas to set aside for the protection of an endangered\
    \ bird species. You have the following data: known nesting sites of the bird,\
    \ a polygon-based dataset of forest areas, and a dataset of oil and gas wells.\
    \ The proposed areas are forest areas which are at least 5 square miles in area,\
    \ contain nesting sites, and which have no oil and gas wells either inside them\
    \ or within 0.5 miles of the edge of the forest. Your task is to identify all\
    \ forests meeting these criteria.\n\n**Question 3: Provide a detailed outline\
    \ of instructions for carrying out this task. Use at least two levels of the outline\
    \ (outline the task into subtasks, with individual steps inside each subtask).\
    \ You do not need to turn the individual steps into Python (or any other language).**\n\
    \nUse the example outline for locating political rallies at the end of Task 2\
    \ as a guide for the level of detail that is expected."
  mdcn: "尽管“空调”一词出现在Alexa对我说的话中，但计算机并未赋予其任何含义，因为当我要求设置空调时，它找不到名为该设备的设备。它只响应“温度”一词。计算机还表现出缺乏常识，无法识别任何人都会理解的同义词。\n\
    \n计算机语言的第二个普遍原则是，计算机对一切都按字面意思理解。在城市规划的例子中，我可能在建筑尺寸与地块尺寸的比例上出现了拼写错误，将3000平方英尺的建筑面积乘以9000平方英尺的地块面积，得出建筑覆盖了地块27,000,000%的结论。任何人都会认识到这是一个无意义的答案，尽管计算机会愉快地将其报告给用户。即使你本意是除法，而乘法给出了一个无意义的答案，计算机也会按字面意思执行你的指令，并将两个数字相乘。\n\
    \n第三个普遍原则，可以说是在地理信息系统（GIS）底层使用的，即使我们不经常看到其实际效果，那就是计算机无法看到形状或多边形。它只能处理数字，实际上只能处理0和1。这意味着GIS中的所有内容，从属性表中的文本字段到所有几何图形，都必须最终转换为数字。这在例如为什么找到两个多边形的交集可能需要很长时间等方面有更大的影响，尽管它不会实质性地影响我们在本课程中使用和创建的脚本。\n\
    \n第四个原则，也是优势所在，是计算机可以极其快速地读取和执行这些指令。这一好处使得前三个原则带来的所有挫折都值得了。\n\n为了将这些原则和我们的英语思维转化为计算机语言指令，我们必须进行计算思维，尝试像计算机可能那样思考。关于这一点，一个很好的引述来自一个不寻常的来源：道格拉斯·亚当斯（1987）的《Dirk\
    \ Gently的全息侦探事务所》：\n\n> 理查德继续说道：“我的意思是，如果你真的想理解某件事，最好的方法是尝试向别人解释。这迫使你在脑海中整理它。而你的学生越迟钝，你就越需要将事物分解成越来越简单的想法。而这正是编程的本质。当你把一个复杂的想法整理成即使是愚蠢的机器也能处理的小步骤时，你自己也学到了一些东西。”\n\
    \n要为计算机编程，或给它正确的指令，我们必须将指令分解成非常详细、非常简单的想法。我们必须深入到我们所使用的语言（本书中是Python）的基本构建块。我们不能只说找到多边形的面积；我们必须告诉计算机访问多边形的几何图形，并从该几何图形中获取面积。我们不能只告诉计算机计算比率；我们必须明确地将一个数字除以另一个数字。这意味着任何编程任务的一个基本步骤是将一个通用任务分解成更小的子任务，并将每个子任务分解成单独的步骤，然后将每个单独的步骤从英语翻译成计算机语言。这种“分而治之”的方法是编程和计算思维的关键组成部分。\n\
    \n以下场景说明了这一点。想象你是一名GIS顾问，负责为一位总统候选人在竞选活动最后一周的一系列集会规划站点。你的任务是找到七个集会的地点，每晚一个。竞选经理为你提供了一套约束条件：（1）集会必须在不同的州举行，（2）集会需要在民意调查显示竞争激烈的州举行，（3）集会需要在这些州的大城市举行，以及（4）每个集会需要一个至少有10,000个座位的场地。此外，竞选团队为你提供了民意调查数据、城市人口数据以及每个城市的可用场地，因此你拥有执行任务所需的所有数据。\n\
    \n起初，这可能看起来令人生畏，但通过“分而治之”的策略，可以解决这个问题。查看标准，这个任务似乎有两个部分，因此我们可以有两个子任务。第一个是确定七个州。然后，一旦我们选定了州，我们需要在每个选定的州内确定一个城市和场地。使用这个，我们可以开始一个非常通用的提纲。\n\
    \nA. 确定集会的州。\nB. 对于每个选定的州，选择一个城市和场地。\n\n我们对州有一个主要标准：民意调查接近。我们有民意调查数据，因此我们可以找到两位领先候选人之间投票意向的差异。这可能在数据本身中，也可能不在，因此我们可能需要计算差异为候选人A减去候选人B的绝对值。一旦我们有了这个，找到差异值最低的七个州，这可以通过按这个新变量对州进行排序并找到最低的来执行。这说明了将子任务进一步分解为单独的步骤，如下方更具体的提纲所示。\n\
    \nA. 确定集会的州。\n    a. 在民意调查数据中计算新字段：\n        i. 差距 = |候选人_A – 候选人_B|/(候选人_A +\
    \ 候选人_B)\n    b. 按差距对州进行排序（最低值在前）。\n    c. 从排序列表中选择前七个州。\nB. 对于每个选定的州，选择一个城市和场地。\n\
    \    a. 从全国所有场地的列表中选择该州内的场地。\n    b. 将集会场地设置为列表中的第一个场地。\n    c. 将集会城市设置为包含集会场地的城市。\n\
    \    d. 对于该州内的每个场地：\n        i. 如果其容量超过10,000个座位：\n            1. 如果其城市的人口多于当前集会城市的人口，则将集会城市和集会场地更改为该场地及其城市。\n\
    \            2. 如果其城市的人口等于所选城市的人口（可能意味着同一个城市），则**仅当**该场地的容量大于当前集会场地的容量时，才将集会城市和集会场地更改为该城市和场地。\n\
    \n这个提纲有助于组织将英语任务翻译成计算机语言的过程，并说明了如何将总体任务分解为越来越简单的步骤。该提纲采用了一种可以称为“伪代码”的形式，这是一种通用的计算机语言形式，而不是任何特定的脚本或编程语言。它给出了将在算法中执行以完成任务的指令集，这些伪代码指令可以转录为任何脚本或编程语言。拥有这个详细指令的中间步骤是有用的，因此我建议你在本书整个非指导性练习中继续这样做。\n\
    \n## 任务3：非指导性工作\n\n作为非指导性任务，想象你正在为一家保护机构从事GIS工作，旨在提出为保护一种濒危鸟类物种而划出的区域。你拥有以下数据：该鸟类的已知筑巢地点、基于多边形的森林区域数据集以及油气井数据集。拟议区域是面积至少为5平方英里的森林区域，包含筑巢地点，并且其内部或森林边缘0.5英里范围内没有油气井。你的任务是找出所有符合这些标准的森林。\n\
    \n**问题3：提供执行此任务的详细指令提纲。使用至少两级提纲（将任务分解为子任务，并在每个子任务内列出单独的步骤）。你不需要将单独的步骤转换为Python（或任何其他语言）。**\n\
    \n以任务2末尾定位政治集会的示例提纲作为预期详细程度的指南。"
