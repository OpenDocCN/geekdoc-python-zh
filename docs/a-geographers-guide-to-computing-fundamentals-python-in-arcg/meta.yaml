  md: "sented. The extensive use of `.value` properties might be surprising here,\
    \ so allow me to explain. You might have found the text referring to the `getParameterInfo()`\
    \ method confusing because we were referring to two types of parameters: one being\
    \ the values that are inputs to the constructor method and the other being the\
    \ `Parameter` object under construction. This means that if I get an item from\
    \ the list of parameters below, it returns an object of type `Parameter`. This\
    \ `Parameter` object refers to an item in the dialog box and contains information\
    \ like its name, its data type, and its current value. To get that value, we need\
    \ to start with the parameter's `.value` property. However, this does not immediately\
    \ provide access to the value we are wanting, like the list of input feature classes,\
    \ the key field, or the target feature collection. For the simpler data types,\
    \ like the field and the target feature class, the `.value` property provides\
    \ us an object of type `Value`. This might seem like overkill to have a class\
    \ that basically serves as a simple container for the value of the property, but\
    \ it is in contrast to the more complex data types. To get the actual value, or\
    \ the content of that entry in the tool's dialog box, we need to get the `.value`\
    \ property of the `Value` object. This is why parameters 2 and 3 have the seemingly\
    \ redundant `.value.value` part to them. The first `.value` moves from the `Parameter`\
    \ object to the `Value` object, while the second extracts the true value from\
    \ the `Value` object.\n\nFor the more complex data types, like the list of feature\
    \ classes, we have to work some to extract the desired information from that `.value`\
    \ property. The first parameter is returned as a `ValueTable` object from the\
    \ `.value` method. This is, of course, not the same thing as a list of feature\
    \ classes, so we have to loop through each of the rows in this `ValueTable` and\
    \ get the values from it one by one, to append them to a list that will become\
    \ our feature class list. That's what the `for` loop below accomplishes:\n\n```\n\
    def execute(self, parameters, messages):\n    \"\"\"The source code of the tool.\"\
    \"\"\n    try:\n        #get parameters from the tool: list of input FCs; list\
    \ of fields; output target FC; key field\n\n        fcVT = parameters[0].value\n\
    \        fcList = []\n        for val in range(fcVT.rowCount):\n            fcList.append(fcVT.getValue(val,\
    \ 0))\n        fieldTable = parameters[1].value\n        keyField = parameters[2].value.value\n\
    \        targetFC = parameters[3].value.value\n```\n\nThere is even more processing\
    \ to convert the field table parameter into the dictionary we want. Perhaps confusingly,\
    \ the parameter with the `.datatype` property of \"GPValueTable\" returned a list\
    \ instead of a `ValueTable`. That means the exact code for looping through this\
    \ parameter doesn't match what we used to create the list of feature classes,\
    \ but the logic is similar. The `for` loop cycles through each row in the table.\
    \ Recall from the way in which we set up the parameter that the first item in\
    \ this is the field and the second is the procedure. To get the actual field,\
    \ we need to, once again, use the `.value` property. However, this is not needed\
    \ for the text string representing the procedure, stored in the `proc` variable.\
    \ Instead of just adding this pair to the dictionary, however, we need to see\
    \ if that field already exists as a key in the dictionary. If it does, that means\
    \ we have seen this field before in the table and need to make sure we append\
    \ the procedure to the list of summary procedures for this field instead of overwriting\
    \ it. If it isn't in the list of keys, then we need to start a new list of procedures\
    \ and add it as a new entry to the dictionary:\n\n```\nfieldSumDict = {}\nfor\
    \ i in fieldTable:\n    field = i[0].value\n    proc = i[1]\n    if field in fieldSumDict.keys():\n\
    \        procedures = fieldSumDict.get(field)\n        procedures.append(proc)\n\
    \        fieldSumDict[field] = procedures\n    else:\n        procedures = [proc]\n\
    \        fieldSumDict[field] = procedures\n```"
