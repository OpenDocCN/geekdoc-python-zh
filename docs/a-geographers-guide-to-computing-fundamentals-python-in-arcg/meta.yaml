    We used the fact that the block number and section number are in the lot file
    when extracting the lot size within the `calculateFromBuilding` function. However,
    as set up right now, our tool will not allow the user to use the lot-based option
    and enter the block and section numbers instead of the lot number. For example,
    the user should be able to have the Option be “Lot Number,” but leave the Lot
    Number itself blank, and enter Block #23 and Section #41, and still have it work.


    Make changes **to the script** to allow this to happen. The only changes you may
    make to the tool is altering the label for the lot-based option, as it isn’t using
    a lot number any more.⁷ This, however, is not required:


    - The tool will be evaluated based upon the following expected behaviors:

    - The tool should give a proper response for a lot that contains buildings.

    - The tool should still give an error if the combination of block and section
    number does not exist.

    - The tool should still give a warning if the combination appears to contain no
    buildings, but the lot exists.


    Note: There are multiple ways of accomplishing this. As long as the script behaves
    correctly regardless of what values I enter, you will get credit regardless of
    your approach.


    ⁷Translation. Don’t just tell them to use the block/section option for either
    file. Allow the option parameter to be “Lot Number” (or “Lot Information” should
    you choose to edit it), the lot number parameter to be blank, and the block and
    section number information to be filled out.


    ## Creating Custom Classes


    ## 16


    ## Introductory Remarks: Strategies for Creating and Managing Classes


    Once again, this chapter continues the progression of making the usability of
    ArcGIS Pro better within the context of approving or denying building permits
    for a city. This requires changes, again to the tool, to align it better to the
    purpose of having a tool. In this case, we will change it to carry out more of
    the approval process. Specifically, we want to be able to enter a lot ID number
    (as was done in parameter #1 by the end of the previous lab), the area of a proposed
    building,¹ and the type of building (residential, commercial, etc.). Given this
    information, the tool will report the estimated appraised tax bill or will give
    an ArcGIS error message about why the proposed building is unlikely to be approved.


    While carrying out these changes will make life easier for the user, it will make
    the code still more complex. To help evaluate the proposed buildings, we will
    create two new classes. One is called `Parcel`, which will represent the combination
    of the lot and building(s) contained on that lot. The other is called `ApprovalError`,
    which is an extension of the `ValueError` class to represent a specific version
    of value error which violates the guidelines of the approval process.


    Before we go further, we will revisit ideas about classes which were introduced
    in the ArcPy chapter. The object-based approach allows us to have variables which
    are of more complicated types than the standard suite of text, numbers, and Boolean
    values. Each object has a blueprint of its class, which represents the set of
    things it contains. The main parts to this blueprint are properties, which are
    akin to variables specific to this object, and methods, which are functions that
    operate on this object. Recall this diagram from the ArcPy chapter, showing some
    of the properties on the left and methods on the right associated with the class
    `ArcGISProject`, and we have the variable `aprx` which is an object of the type
    `ArcGISProject` (Fig. 16.1).


    Just as we would want to use custom functions to be able to make code more reusable
    and readable, if we have a group of variables and functions which are related
    to each other, and which we may find ourselves calling repeatedly, perhaps it
    would be wise to group them into a single class with those variables and functions
    converted into properties and methods. In the scenario here, while we are receiving
    applications to create a building, the evaluation is done at the scale of a parcel.
    Since the information for the parcel is split between the file for the buildings
    and the file for the lots, we may want to create a class that combines the relevant
    information from the two different files into a single object. Once that information
    is combined, we can then continue the analysis with the parcel holding all of
    our information in a single place for us.


    Recall from the data description that we can have classes which extend other classes.
    Just as we had a `FeatureClass` which extended `Table`, and implemented all the
    properties and methods associated with the `Table` and adds additional properties
    and methods, we can create classes which extend existing classes. These new classes
    can then make use of the existing class'' properties and methods, add new properties
    and methods, as well as override existing methods. Overriding a method keeps the
    method in existence, but changes how it gets carried out. For example, highlighting
    the selected items in a table in ArcGIS Pro will make those rows appear differently
    within the attribute table. Highlighting selected items is also carried out by
    a feature class, but the way they get highlighted is different. The relevant rows
    of the attribute table still appear differently, but the features in the map also
    get highlighted, so we can see how the action of highlighting items is carried
    out in a different manner. Within Python, overriding methods is especially notable
    for what are called “dunder” methods. These


    ¹Ideally, this would accept a polygon, from which area can be calculated, along
    with comparing it to the polygon of the lot to evaluate setbacks, but while polygon
    is a valid input parameter type, giving the tool the ability to input a polygon
    would probably be counterproductive to the idea of trying to make this easier
    for the user, not harder.


    ![](img/37990581b275bdf7d510c6f2d9702a31_165_0.png)


    Fig. 16.1 Class diagram of a class with properties and methods


    are built-in methods that apply to most (if not all) classes, and they get their
    name because the method names always start and end with two underscores (a double
    underscore or “dunder”). The two that we will use in this chapter are the `__init__`
    and `__str__` methods. The first of these is the class’ constructor method, which
    is the code that is run when an object of this class is created and is typically
    where the properties of this new object are set. Without it being made explicit,
    you have used `__init__` methods repeatedly. Any time you use a class’ constructor
    method, you implicitly use the `__init__` constructor. Therefore, when you create
    a Describe object through calling `arcpy.Describe()`, this is, behind the scenes,
    calling the `__init__` method of the Describe class. The second of these is how
    the object will be represented when it is turned into a string. It isn’t an exact
    match for this, but you can probably think of it as what happens to an object
    when you call the `str()` function on that object.


    When programming within a class, you will need to be able to refer to the object
    of that class which is the instance of the class that all the properties and methods
