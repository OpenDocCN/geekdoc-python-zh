  md: 'A function is a collection of statements that serve a common purpose. This
    common purpose or task is more complex than can be completed in a single statement,
    just as a paragraph is a collection of sentences that are all related to a common
    topic. Functions often, but not always, have one or more inputs, called parameters,
    and often, but again not always, have one output value.


    We may want to have a function that calculates the total amount of revenue generated
    by the training session. The first thing to do is figure out what the inputs and
    output will be, if there are any. The output should be straightforward: the total
    amount of money that has been collected. The full set of inputs may be less obvious.
    The dictionary we already have of whether or not people have paid would be a good
    place to start. Once you know whether or not someone has paid, you need to know
    how much they have paid. This requires the price variable. Because of the student
    discount, this also requires knowing whether or not each person is a student,
    and what the student price is. This gives us a set of four inputs we could need.


    Before we begin to write our function, we should plan it out. You might first
    recognize that a `for` loop through each of the names will be a good structure
    for ensuring we have checked everyone on the roster, so let''s start a flow chart
    (Fig. 4.1).


    It doesn''t look like much yet, so let''s next figure out the questions we need
    to answer for each student. We want to know if they have paid yet, and if they
