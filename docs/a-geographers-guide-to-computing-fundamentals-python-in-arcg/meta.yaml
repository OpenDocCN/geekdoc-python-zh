    # Task 3: Changing Symbology


    As stated above, we would like to make the states hollow. This can be done through
    the symbology property. As described in the introductory remarks, there is a chain
    of properties we will need to go through to edit a symbology. The first of these
    is the symbology property of the layer. That, in turn, has a renderer, which records
    how the layer as a whole is drawn. There are several types of renderers, for different
    ways of displaying the layer. Find out what the renderer type of the states layer
    is by typing the next lines and hitting Enter:


    ```

    statesSymbology = statesLayer.symbology

    statesSymbology.renderer.type

    ```


    You should get the answer to Question 6 below:

    **Question 6: (5 points) What is the renderer type for the states layer?**

    This type of renderer means each feature is displayed using the exact same symbol,
    which we can access through the first of the following lines. This makes sense,
    as looking at the map, all the states will be the same color with the same outline
    thickness. (The exact color may vary depending upon how ArcGIS Pro seems to feel
    that day.) We wanted it hollow, which is through the second of the following lines:


    ```

    statesSymbol = statesSymbology.renderer.symbol

    statesSymbol.color = {''RGB'' : [0, 0, 0, 0]}

    ```


    **Question 7: Using the help documentation for the symbol class, why is the *last*
    number in the list specifying the color a 0?**

    You should not see any changes. What we have done so far is edit the variable
    holding the symbology for the layer. Think back to the variable called bob in
    Chap. 2, which was given the item in a list, but changing the variable bob didn''t
    change the list. A similar dynamic is happening here, in which the `statesSymbology`
    variable was changed, but that didn''t change the symbology property of the layer.²
    We now need to go back to save those edits into the layer. This is done through
    setting the symbology property of the layer. (The symbology property is, after
    all, both read and write enabled.)


    ```

    statesLayer.symbology = statesSymbology

    ```


    Now it is hollow, but to make the state borders distinct from the county borders,
    we want to give it a thicker outline. This is through the `size` property:


    ```

    statesSymbol.size = 3

    statesLayer.symbology = statesSymbology

    ```


