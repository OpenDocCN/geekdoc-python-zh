    \ in the map. If so, remove one by right-clicking on the layer’s name and choosing\
    \ “Remove.”)\n\nWe may at this point wish to see some of the properties or methods\
    \ of the map. One way of accomplishing this is to type `Ohio_map.` and pause after\
    \ the dot. Recall from earlier that the properties are accessed through the general\
    \ syntax of `object_name.property` and the methods are similarly accessed through\
    \ `object_name.method(parameters)`. Pausing after `object_name.` gets the Python\
    \ Window to suggest the possible properties and methods.\n\nFurthermore, you might\
