  md: "try/except block, the computer looks to see if there is an `except StopIteration`\
    \ clause. Previously, there wasn’t so execution of the entire program stopped,\
    \ and you got an error message in the tool. Now there is an `except StopIteration`\
    \ clause, so what happens in that except block of code is where the program goes.\
    \ In this case, it still provides an error message to ArcGIS Pro, although we\
    \ are able to give an error message that is far more useful than “StopIteration.”\n\
    \nEntering a nonexistent combination of block and section number here doesn’t\
    \ generate an error. It just sits there and might eventually report an answer\
    \ of zero. This means that for us to treat it similarly, we need to raise the\
    \ error ourselves. This can be done by counting the number of buildings in this\
    \ block/section combination and raising our own `StopIteration` if it has the\
    \ value of zero.⁶ The `calculateFromBuilding` function is presented below, with\
    \ the new code being that which involves the variable `buildingCount`:\n\n```\n\
    def calculateFromBuilding(bBlock, bSection):\n    query = '\"BLOCK\" = ' + str(bBlock)\
    \ + ' AND \"SECTION\" = ' + str(bSection)\n    buildings = ARCPY.da.SearchCursor('Narra_foot',\
    \ [\"BLOCK\", \"SECTION\", \"F_AREA\"], query)\n    lot = ARCPY.da.SearchCursor('Narra_block',\
    \ [\"AREA\", \"BLOCK\", \"SECTION\"], query).next()\n    lotArea = lot[0]\n  \
    \  lotBlock = lot[1]\n    lotSection = lot[2]\n    buildingsTotalArea = 0\n  \
    \  buildingCount = 0\n    for building in buildings:\n        buildingCount =\
    \ buildingCount + 1\n        buildingBlock = building[0]\n        buildingSection\
    \ = building[1]\n        buildingArea = building[2]\n        if lotBlock == buildingBlock\
    \ and lotSection == buildingSection:\n            buildingsTotalArea = buildingsTotalArea\
    \ + buildingArea\n    if buildingCount == 0:\n        raise StopIteration\n  \
    \  return calculate(buildingsTotalArea, lotArea)\n```\n\nThe `try/except` statement\
    \ can then get an `else` clause in the `except StopIteration` lines. They are\
    \ the last lines of the newly edited `try/except` block here:\n\n```\ntry:\n \
    \   option = ARCPY.GetParameter(0)\n    if option == \"Lot Number\":\n       \
    \ lotNumber = ARCPY.GetParameter(1)\n        pctCover = calculateFromLot(lotNumber)\n\
    \    elif option == \"Building Block & Section\":\n        buildingBlock = ARCPY.GetParameter(2)\n\
    \        buildingSection = ARCPY.GetParameter(3)\n        pctCover = calculateFromBuilding(buildingBlock,\
    \ buildingSection)\n    ARCPY.AddMessage(\"Your building covers \" + str(pctCover)\
    \ + \" percent of your lot. It should pass.\")\nexcept ValueError as ve:\n   \
    \ ARCPY.AddError(\"There was an error during the operation of the tool. \" + str(ve))\n\
    except StopIteration as si:\n```\n\n> ⁶ Using a StopIteration here when the problem\
    \ has nothing to do with anything that is iterating, like a for loop, is officially\
    \ not best practice. However, using the same kind of error as the other option\
    \ streamlines our try/except code."
