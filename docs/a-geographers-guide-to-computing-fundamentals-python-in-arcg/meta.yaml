  md: "Task 3: Adding a Try/Except Structure\n\n155\n\n![](img/37990581b275bdf7d510c6f2d9702a31_156_0.png)\n\
    \nFig. 15.3 Changing the messages to errors\n\n```\npython\nraise ValueError(\"\
    Your building might be too big to pass the permit process. Please check your measurements!\"\
    )\nreturn percentCover\n```\n\nNext, we will work on the other part of error handling,\
    \ catching an error to prevent the user from seeing the error message. This involves\
    \ a new complex statement type: a `try/except` block. Python will try to run the\
    \ code in the `try` block. If it works, great. The code inside the `try` block\
    \ is fully executed and the `except` part is ignored. If there was an error, however,\
    \ Python will see if the type of error raised is in the `except` section of the\
    \ structure. If that type is listed, then the code inside the relevant `except`\
    \ block is executed. If that type of error is not listed, then the error that\
    \ occurred gets passed on to ArcGIS Pro and almost certainly results in a bunch\
    \ of error messages and red text where you expected to get your output. Lastly,\
    \ notice that we except the `ValueError` as a specific variable called `ve`. This\
    \ allows us to access the message that is inside the error, which was put there\
    \ when we created the message. The `ValueError` is explicitly used here because\
    \ it is what is raised within the function. Put this at the very end of the program\
    \ file:\n\n```\npython\ntry:\n\nexcept ValueError as ve:\n    ARCPY.AddError(\"\
    There was an error during the operation of the tool. \" + str(ve))\n```\n\nNow\
    \ we will fill in code for the `try` block, which largely entails moving the parameter\
    \ acquisition lines from the start of the script, and finally adding that `if/elif`\
    \ statement to control what happens based upon the value the user chose within\
    \ the option parameter. Let's first plan it out by updating our flow chart (Fig.\
    \ 15.4).\n\nTo update the code, it helps to recognize that the options are restricted\
    \ to the values in the Value List Filter from setting up the new dialog box. We\
    \ will be able to use these restricted values in the conditional statement, knowing\
    \ that they must match, as long as there are no typos. This fills in the `try`\
    \ block as below:\n\n```\npython\ntry:\n    option = ARCPY.GetParameter(0)\n \
    \   if option == \"Lot Number\":\n        lotNumber = ARCPY.GetParameter(1)\n\
    \        pctCover = calculateFromLot(lotNumber)\n    elif option == \"Building\
    \ Block & Section\":\n```"
