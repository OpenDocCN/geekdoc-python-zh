  - '[PAGE 178]


    The connections file initially looks more complicated. Each row is a list of cities.
    The structure is that the first column is hub city within the airport network,
    and the remaining columns are the cities connected to that hub. It is set up that
    most flights are only listed once, because they go from hub to spoke in the network,
    and to save space, rows for the spokes are not included. For example, the London
    line has Dundee as a connected location, but Dundee, as a spoke in the network,
    does not have its own line in the file. Even so, when the user types in Dundee,
    its connection with London should be included in the calculations.


    Having looked at the files to see what I have to work with, I would then start
    to plan out the tool, laying out the starting and ending points (Fig. 17.1).


    Obviously, we need to do more to fill in the black box, but this is a starting
    point. The next step we might need is to read the connections CSV file. It doesn’t
    depend directly upon getting the city, so I will add this box in without an arrow
    to it, but it will provide needed information for the (currently) black box calculations
    (Fig. 17.2).


    Once we have the data loaded in, we can start to fill in the black box and, as
    I have drawn below, make it more gray than black, as the inner workings of the
    black box get exposed and filled in. The two main components of what has to happen
    inside this black box are finding the connected cities and adding up all of their
    distances from the primary city (Fig. 17.3).


    We can now break down either of the gray boxes. I’ll pick the second one, since
    it doesn’t matter which order we break them down in, as long as they both get
    done. One thing to think about within your planning is to consider what inputs
    and outputs you need to get each step done. Adding up all of the distances can
    be pretty straightforward, although we need to consider what the inputs to this
    step will be. Naturally, we need the individual distances. But how will the computer
    represent these distances? There are a few possibilities, and a list or a dictionary
    comes to mind. I might revise this later, but will, for the time being, choose
    a list. When adding up the distances, it isn’t of great importance which distance
    corresponds to which connection, and that’s the main value of using a dictionary
    versus a list. Having a list of distances then means looping through all the distances
    and adding them to a running total. We have done this logic before, so hopefully
    it is familiar to you (Fig. 17.4).


    This makes clear that the other gray box will need to finish by giving us a list
    of distances. It will end up following a similar logic, but what happens will
    be more complex. I’ve started to flesh out what is needed here, making the parts
    of the black box again clearer, but the lighter gray boxes still have some work
    to go (Fig. 17.5).


    To make the flow chart easier to read, I’ll pull out these two gray boxes into
    their own flow chart. The first part tackles whether the line in the CSV file
    contains a connection involving the city that the user entered. This should be
    a simple enough


