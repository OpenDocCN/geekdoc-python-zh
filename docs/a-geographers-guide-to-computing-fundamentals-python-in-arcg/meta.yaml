- md: "## Reading a Python Script\n\n## 5\n\n## Introductory Comments: The Value of\
    \ Documentation and Comments\n\nThe previous exercises introduced basics of Python\
    \ scripting. There are many scripts that you can find online, so it is common\
    \ to take a script you find elsewhere and try to run it and identify what it does.\
    \ Code repositories, such as GitHub, provide many scripts, but they do not exist\
    \ merely as an assortment of files containing Python code. Instead, there are\
    \ structures in place to help you determine what the code does. These structures\
    \ are documentation and comments. Both of these help us, as the programmer, translate\
    \ between English and the Computerese of Python. Documentation is information\
    \ provided external to the computer code. It is typically web pages or documents\
    \ that provide a detailed guide for users of the code, such as a listing of what\
    \ every object does, its properties, its methods, as well as a sample piece of\
    \ code calling the function or using that object. Comments, on the other hand,\
    \ provide information within the code itself. It is usually more fine-grained,\
    \ looking at individual blocks of code within the file and explaining them. Another\
    \ way of looking at the distinction between documentation and comments is what\
    \ the audience is. Documentation is for people who want to use a file, while comments\
    \ are for people who want to edit a file.\n\nThe other thing being introduced\
    \ in this chapter is the Integrated Development and Learning Environment (IDLE),\
    \ which is the third way we will be looking at Python code in this book. Where\
    \ the ArcGIS Pro Python Window is useful for working with Python code one line\
    \ at a time, and the Python Notebook is useful for discrete blocks or snippets\
    \ of code, the program called IDLE serves as a platform for running and editing\
    \ Python programs that span an entire file (or more than one file—see Chap. 20).\
    \ This introduction to IDLE will start out with a program that has already been\
    \ written.\n\nIn this chapter, you will build upon the GIS training example from\
    \ the previous chapters and examine a new script doing something you haven’t encountered\
    \ yet. You will interpret what the script does by opening it, stepping through\
    \ it in IDLE, and using online help documentation to figure out commands and functions\
    \ you have not yet encountered. Doing so is much like detective work, finding\
    \ clues of what the script may be doing, comparing that with knowledge you already\
    \ have and commands you have used, and searching for additional information to\
    \ solve the problems of identifying and learning what the unfamiliar parts of\
    \ the script are doing. To fit their purpose, you will examine documentation from\
    \ the perspective of a user, employing existing documentation to help you decipher\
    \ the script, and you will use comments to annotate the code in this script as\
    \ if you were needing to share it with someone else.\n\n## Task 1: Importing a\
    \ Python File into IDLE\n\nYou have been given a script called reading_python_script.py\
    \ and it is up to you to figure out what it does. You also have two data files\
    \ we have been using to manage the training: participants.csv and instructors.csv.\
    \ We will use IDLE to run the file.\n\n**Supplementary Information:** The online\
    \ version contains supplementary material available at [https://doi.org/10.1007/978-3-031-08498-0_5].\n\
    \n© The Author(s), under exclusive license to Springer Nature Switzerland AG 2022\n\
    J. Conley, *A Geographer’s Guide to Computer Fundamentals*, Springer Textbooks\
    \ in Earth Sciences, Geography and Environment, https://doi.org/10.1007/978-3-031-08498-0_5\n\
    \n45\n\n- Using Windows Navigator, navigate to where you have the script saved.\n\
    - Right-click on the name and select *Edit with IDLE (ArcGIS Pro)*. Make sure\
    \ you select the ArcGIS Pro option, because ArcGIS Pro and ArcGIS Desktop use\
    \ different versions of Python, and this script is only guaranteed to work in\
    \ Pro.\n\n![](img/37990581b275bdf7d510c6f2d9702a31_55_0.png)\n\nThis brings up\
    \ the script in a separate window. We will look at the code line by line throughout\
    \ this exercise.\n\n## Task 1: Importing a Python File into IDLE\n\n47\n\n```\n\
    reading_python_script.py - N:\\transfer2\\Python\\PythonBook\\reading_python_script.py\
    \ (3.6.2)\n```\n\n```\nFile Edit Format Run Options Window Help\n```\n\n```\n\
    import csv\nparticipants_path = input(\"Enter the file path for the participants\
    \ file. \")\nparticipants_file = open(participants_path)\nparticipants_reader\
    \ = csv.reader(participants_file)\npaid_dictionary = {}\nstudent_dictionary =\
    \ {}\nfor row in participants_reader:\n    paid_dictionary[row[0]] = row[2]\n\
    \    student_dictionary[row[0]] = row[1]\nprice = 400.0\nstudent_price = 200.0\n\
    \ndef calc_revenue(include_all):\n    total_revenue = 0\n    names = list(paid_dictionary.keys())\n\
    \    for name in names:\n        if (student_dictionary[name] == \"TRUE\"):\n\
    \            if (paid_dictionary[name] == \"TRUE\") or include_all:\n        \
    \        total_revenue += student_price\n        else:\n            if (paid_dictionary[name]\
    \ == \"TRUE\") or include_all:\n                total_revenue += price\n    return\
    \ total_revenue\n\nmax_revenue = calc_revenue(True)\nmin_revenue = calc_revenue(False)\n\
    \nroom_cost = 300.0\nfood_cost = 10*len(paid_dictionary)\nmin_instructor = min_revenue\
    \ - room_cost - food_cost\nmax_instructor = max_revenue - room_cost - food_cost\n\
    \ninstructors_path = input(\"Enter the file path for the instructors file. \"\
    )\ninstructors_file = open(instructors_path)\ninstructors_reader = csv.reader(instructors_file)\n\
    \nmin_inst_list = []\nmax_inst_list = []\n\nfor row in instructors_reader:\n```\n\
    \nLet's see about getting a general overview of the script's purpose, since the\
    \ script's author unhelpfully provided a non-informative file name!\n\n- In the\
    \ window with the script in it, go to the Run menu and select Run Module.\n- When\
    \ a prompt appears in the Python Shell window, type in the full file path to the\
    \ participants file, from the drive letter (e.g., \"C:\") to the extension (\"\
    .csv\"). For mine, it is the My Documents folder listed below. No matter where\
    \ you have it, make sure that when you enter it, the forward slash (/) should\
    \ be used.\n- Press Enter.\n\n- When the next prompt appears, type in the full\
    \ file path for the instructor file, again from the drive letter to the extension,\
    \ and press Enter.\n\nYou should then get a message of which instructors can definitely\
    \ be afforded, and which are possibly affordable.\n\n```\nEnter the file path\
    \ for the participants file. C:/Users/jfconley/Documents/admin/Python/participants.csv\n\
    Enter the file path for the instructors file. C:/Users/jfconley/Documents/admin/Python/instructors.csv\n\
    We can definitely afford these instructors:\nCatherine Smith\nFred Williams\n\
    We might be able to afford these instructors:\nAllen Bletchley\n>>>\n```\n\nThis\
    \ gives some indication of what the script is intended to do: help decide which\
    \ instructor to use for the training.\n\n## Task 2: Use Online Python Help Documentation\
    \ to Understand Part of the Script\n\nFrom the start of the script, you encounter\
    \ Python code we have not yet seen. The first line is `import csv`. First, notice\
    \ that the word `import` is in orange. The script editor in IDLE highlights certain\
    \ types of tokens in different colors to help signify the kinds of the “parts\
    \ of speech,” to continue the language metaphor. Keywords are in orange. We can\
    \ look online to find out what the `import` keyword is doing.\n\nGo to the Python\
    \ documentation at https://docs.python.org/3/. While this brings up Python 3.9.7\
    \ documentation (at the time of writing), we want to switch over to the same version\
    \ of Python that ArcGIS Pro uses, which (again, at the time of writing) is Python\
    \ 3.6. Go to either the drop-down menu which currently says “3.9.7” and choose\
    \ “3.6” or select the “Python 3.6 (security-fixes)” in the list of *Docs by version*.\n\
    \nIn the *Quick search* at the top right, enter “import” and click the *Go* button.\
    \ Scroll down some, and you’ll see a link titled “6. Modules.” Click on it to\
    \ see more about modules. In practice, you might need to read through several\
    \ pages of documentation before finding the right one. In this case, though, you\
    \ could probably rule out those which highlighted the letters for “import” within\
    \ the word “important.” Modules are extensions to Python which serve specific\
    \ purposes. Just like you must enable extensions like Spatial Analyst and Network\
    \ Analyst within ArcGIS, you must enable extensions or modules within Python.\
    \ The `import` statement is what handles that, and here we are importing a module\
    \ called csv. As the name suggests, it is what allows IDLE (and Python in general)\
    \ to read and write comma-separated values (.csv) files. There are many modules,\
    \ including one specific for ArcGIS (called ArcPy), which we will see much more\
    \ of later in the book.\n\nNow that we have the csv module imported, we look to\
    \ the next line to decipher it. It reads:\n\n```\nparticipants_path = input(\"\
    Enter the file path for the participants file. \")\n```\n\nFirst, you may notice\
    \ that we have two new colors: purple and green. Based upon the syntax, we can\
    \ figure out what they are. Because the purple is a name followed by parentheses,\
    \ this fits the syntax for functions. Therefore, purple is for the names of functions,\
    \ although it is limited to functions that are built into standard Python. (In\
    \ other words, any functions you define will be black, rather than purple.) The\
    \ green text starts and ends with quotation marks, telling us that it is a string.\n\
    \nFurthermore, you might recognize the string from when running the script. Take\
    \ another look at the Python Shell and you will see that it is the prompt you\
    \ had when providing the file path for the participants. That is a clue to what\
    \ the `input` function does. Search again in the Python documentation for “input\
    \ function” (without the quotation marks) and if you scroll down, you’ll see a\
    \ link for “2. Built-in Functions.” Take a look at that, and you will see a table\
    \ of all built-in functions at the top of the page."
  mdcn: "## 阅读 Python 脚本\n\n## 5\n\n## 引言性评论：文档与注释的价值\n\n前面的练习介绍了 Python 脚本的基础知识。网上可以找到许多脚本，因此，拿一个别处找到的脚本，尝试运行并弄清楚它的功能，是很常见的做法。像\
    \ GitHub 这样的代码仓库提供了许多脚本，但它们并非仅仅是一堆包含 Python 代码的文件集合。相反，它们有相应的结构来帮助你确定代码的功能。这些结构就是文档和注释。这两者都帮助我们程序员在英语和\
    \ Python 的“计算机语言”之间进行翻译。文档是提供在计算机代码外部的信息。它通常是网页或文档，为代码用户提供详细指南，例如列出每个对象的功能、属性、方法，以及调用该函数或使用该对象的示例代码片段。另一方面，注释则在代码本身内部提供信息。它通常更细粒度，着眼于文件中的单个代码块并进行解释。区分文档和注释的另一个角度是受众不同。文档是给想使用文件的人看的，而注释是给想编辑文件的人看的。\n\
    \n本章介绍的另一件事是集成开发与学习环境（IDLE），这是本书中我们将要查看 Python 代码的第三种方式。ArcGIS Pro Python 窗口适用于一次处理一行\
    \ Python 代码，Python Notebook 适用于离散的代码块或代码片段，而名为 IDLE 的程序则作为一个平台，用于运行和编辑跨越整个文件（或多个文件——见第\
    \ 20 章）的 Python 程序。对 IDLE 的介绍将从一个已经编写好的程序开始。\n\n在本章中，你将基于前几章的 GIS 培训示例，研究一个执行你尚未遇到过的新操作的脚本。你将通过打开脚本、在\
    \ IDLE 中逐步执行它，并使用在线帮助文档来弄清楚你尚未遇到的命令和函数，从而解释脚本的功能。这样做很像侦探工作，寻找脚本可能在做什么的线索，将其与你已有的知识和使用过的命令进行比较，并搜索额外信息来解决识别和学习脚本中不熟悉部分功能的问题。为了符合其目的，你将从用户的角度检查文档，利用现有文档帮助你解读脚本，并且你将使用注释来注释此脚本中的代码，就像你需要与其他人分享它一样。\n\
    \n## 任务 1：将 Python 文件导入 IDLE\n\n你得到了一个名为 `reading_python_script.py` 的脚本，需要由你来弄清楚它的功能。你还有两个我们一直用于管理培训的数据文件：`participants.csv`\
    \ 和 `instructors.csv`。我们将使用 IDLE 来运行该文件。\n\n**补充信息：** 在线版本包含可在 [https://doi.org/10.1007/978-3-031-08498-0_5]\
    \ 获取的补充材料。\n\n© 作者，经 Springer Nature Switzerland AG 2022 独家许可\nJ. Conley, *A Geographer’s\
    \ Guide to Computer Fundamentals*, Springer Textbooks in Earth Sciences, Geography\
    \ and Environment, https://doi.org/10.1007/978-3-031-08498-0_5\n\n45\n\n- 使用 Windows\
    \ 资源管理器，导航到你保存脚本的位置。\n- 右键单击文件名，选择 *使用 IDLE (ArcGIS Pro) 编辑*。请确保选择 ArcGIS Pro\
    \ 选项，因为 ArcGIS Pro 和 ArcGIS Desktop 使用不同版本的 Python，并且此脚本仅保证在 Pro 中运行。\n\n![](img/37990581b275bdf7d510c6f2d9702a31_55_0.png)\n\
    \n这会在一个单独的窗口中打开脚本。在整个练习中，我们将逐行查看代码。\n\n## 任务 1：将 Python 文件导入 IDLE\n\n47\n\n```\n\
    reading_python_script.py - N:\\transfer2\\Python\\PythonBook\\reading_python_script.py\
    \ (3.6.2)\n```\n\n```\nFile Edit Format Run Options Window Help\n```\n\n```\n\
