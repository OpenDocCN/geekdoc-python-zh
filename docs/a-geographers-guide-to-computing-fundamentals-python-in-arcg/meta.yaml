    layout.listElements()\n```\n\n### 问题1：当前地图中有多少个元素？\n\n即使这个布局如此通用，我们也可以从中看到一些有用的信息，因为它存储了页面信息。尤其重要的是要认识到页面单位，因为我们正在引入一种在某种意义上是第二坐标系的东西：页面坐标。这些坐标将用于在页面上定位和放置项目。你可以在布局视图中看到布局窗口顶部和左侧的标尺。这些代表页面坐标。使用文档或Python窗口策略（在点后等待以查看属性和方法选项），回答以下问题：\n\
    \n### 问题2a：页面的高度、宽度和单位是什么？\n### 问题2b：你输入了什么代码来找出这些信息？\n\n由于我们的布局目前不太有用，我们想做的第一件事是在其中放置一个地图框。我们必须在图形用户界面（GUI）中创建一个地图框。为此，使布局视图处于活动状态，然后转到“插入”选项卡并选择“地图框”。然后在布局中拖动一个矩形来放置地图框。你绘制矩形时不必精确，因为我们将使用arcpy来使其位置和大小完全符合我们的要求。一旦你这样做，你可能会得到一个像这样的布局（当然，这取决于你项目的缩放级别和你绘制的确切矩形）。\n\
    \n¹严格来说，不一定必须完全按照第12章末尾的指示进行。无论处于第12章的哪个阶段，布局代码都可以工作，尽管如果你有不同数量的可见图层或分级色彩地图中不同数量的类别，图例大小可能看起来会有所不同。"
