  mdcn: '## 任务 6：自主练习


    在第 16 章的自主练习（任务 7）中，你创建了一个名为 `Neighborhood` 的新类。请从你的第 16 章任务 7 文件中提取该类的定义，并创建一个新的
    `neighborhood.py` 文件来定义该类。同样地，将 `Parcel` 类提取出来，放入一个 `parcel.py` 文件中。然后，将该文件的其余部分命名为
    `chapter20_task6.py`，并让它完成相同的功能——'
