    it might be used. The discussion for the ArcGISProject class points out that it
    is typically one of the first variables that you set when working with ArcPy scripts
    because it serves as the entry point for many of the other pieces of ArcPy and
    projects within ArcGIS Pro. The discussion also highlights that it is the means
    for accessing both maps and layouts, which are, after all, much of the purpose
    of ArcGIS in the first place.


    The properties table has pretty much all the information you’d need to know about
    each property. The leftmost column provides the name of the property and whether
    it is read-only or provides write access. For example, `dateSaved` is read-only,
    while the `defaultGeodatabase` property can be both read and written to. This
    would make sense because you don’t want people to be able to directly change the
    `dateSaved` property, because they could change it to a value which is false.
    It can, though, be changed indirectly, as the `save()` method will change the
    `dateSaved` property so that it accurately reflects when the project was last
    saved. The middle column, the explanation, is straightforward in telling you what
    that property contains. In many cases, the property name is itself self-explanatory
    (like `dateSaved`). The rightmost column is at least as important as the property
    name itself. It contains the data type of the property, whether that is a string,
    an object representing a date and time, or another custom object, like a `Map`.


    > ¹I won’t guarantee the existence or quality of modules other than ArcPy, although
    many of them do have acceptable documentation. After all, if you want your module
    to be widely used, it is hard for that to take place if you have no documentation
    telling people how to use the object types in that module.'
