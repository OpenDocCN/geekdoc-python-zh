    paid = True

    instructor = None

    ```


    Before going any farther, here is a note on variable names. They can contain letters,
    numbers, and underscores, but cannot start with a number. Also, they cannot be
    `keywords`. Keywords are words that have been reserved for a very specific purpose
    within Python. You now have two keywords on the screen, and they are in slightly
    darker font—`True` and `None`. Because they are reserved for specific values in
    variables, you cannot have variables called `True` or `None`. We will see keywords
    throughout this book, and a complete list is available at [https://docs.python.org/3/reference/lexical_analysis.html#keywords](https://docs.python.org/3/reference/lexical_analysis.html#keywords).


    There''s one further note for assigning variable values. We have, thus far, been
    using another form of token, `literals`, which are values that the computer will
    interpret exactly as they are. In that sense, literals are another form of nouns
    for Computerese. Examples are numbers (100, 0.5, etc.) and text strings ("ArcGIS
    Training," "98 Beechurst Ave.," etc.).


    You might, at times, want to do something like the following, in which a variable
    exists on both sides of the equals sign:


    ```

    x = y

    ```


    The computer can handle this in two different ways, and some programming languages
    choose one approach, while others chose the second. The first approach is to have
    both names, `x` and `y`, refer to the same box. This is not what Python usually
    does. Most of the time, Python instead still treats them as separate boxes, but
    copies the `contents` of `y` and puts that value in `x`. Therefore, if you do
    this, and then change the value of `x`, `y` will still have that original value,
    instead of change along with `x`. However, there are exceptions to this in Chap.
    12, Task 3, and Chap. 20, Task 5.


    # Sequences


    We now have variables for all the boxes in Figure 2.4 except for the list of participants,
    which is a kind of sequence. Python has several kinds of sequences, and the three
