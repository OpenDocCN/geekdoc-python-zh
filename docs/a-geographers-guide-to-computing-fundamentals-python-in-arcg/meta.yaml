    Parameters。它在坡度计算方式上提供了一点灵活性，并“提供了一种更新的实现”。按照链接到 Surface Parameters 工具，我们可以看到更多输入参数，允许我们更精确地指定邻域，包括更大的邻域和自适应邻域。为了与使用
