    Lastly, to do the same for polygon data, we will use one of the wildlife management
    areas. Everything should look very similar to the line, except the list of points
    in the polygon closes the loop to distinguish it from a line, and the header for
    the WKT indicates it is a multipolygon, which means that this feature could have
    more than one polygon in it, like an archipelago, even though it only has one
