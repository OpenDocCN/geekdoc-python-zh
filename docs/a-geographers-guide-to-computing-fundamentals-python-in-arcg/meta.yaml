- md: "## Task 4: Write the Python Code for multiCursor.py\n\nThe next most complex\
    \ file is the multiCursor file, even though it has several methods within it.\
    \ Because it uses cursors and other `arcpy` functions, we need to import `arcpy`\
    \ at the start. The other elements of the flow charts are listed below as comments,\
    \ which we will fill in:\n\n```python\nimport arcpy as arcpy\n```\n\n```python\n\
    #define the class\n```\n\n```python\n#define the __init__ method\n```\n\n```python\n\
    #create properties from the input parameters\n```\n\n```python\n#initialize other\
    \ properties for a cursor of the first feature class and the index of the key\
    \ field\n```\n\n```python\n#define the next method\n```\n\n```python\n#move the\
    \ primary cursor to its next feature\n```\n\n```python\n#extract that feature's\
    \ values and return it\n```\n\n```python\n#define the extractFeature method with\
    \ the fid as an input parameter\n```\n\n```python\n#initialize the output as an\
    \ empty list\n```\n\n```python\n#create a query to find the feature that was provided\n\
    ```\n\n```python\n#for each feature class\n```\n\n```python\n#create a cursor\
    \ for that feature\n\n#get the feature's values from that cursor and add it to\
    \ the output.\n\n#return the output\n\n#define the extractField method with the\
    \ field as an input parameter\n\n#initialize the output to an empty list\n\n#create\
    \ a cursor for just that field in the first feature class\n\n#for each feature\
    \ in that cursor\n\n#initialize the row in the output to a list containing the\
    \ value from that feature/field combination\n\n#create a query for this feature\n\
    \n#for each remaining feature class\n\n#create a search cursor for that feature/field\
    \ combination\n\n#add the value to the end of the row\n\n#when all feature classes\
    \ are done, add this row to the output\n\n#return the output\n\n#define the reset\
    \ function as resetting the primary cursor property\n```\n\nDefining the class\
    \ is as simple as using the `class` keyword with the appropriate syntax:\n\n```python\n\
    import arcpy as arcpy\n\n#define the class\nclass multiCursor():\n```\n\nNext\
    \ we define the `__init__()` method, which is the constructor for objects of the\
    \ class `multiCursor`. Recall that, as with any method, the first parameter must\
    \ be `self`. The other input parameters are as specified earlier:\n\n```python\n\
    #define the __init__ method\ndef __init__(self, fcList, fieldList, keyID):\n```\n\
    \nWe then create properties from these parameters that will ensure they are accessible\
    \ throughout the code for this class. The properties all start with `self.` as\
    \ part of their syntax:\n\n```python\n#create properties from the input parameters\n\
    self.fields = fieldList\nself.keyID = keyID\nself.featureClasses = fcList\n```\n\
    \nThe other two properties are initialized as a search cursor accessing the first\
    \ feature class and using the field list provided as an input parameter. At this\
    \ point, we could use `fieldList` or `self.fields`. The index of the key field\
    \ in the field list is also accessed and stored for future reference:\n\n```python\n\
    #initialize other properties for a cursor of the first feature class and the index\
    \ of the key field.\nself.primaryCursor = arcpy.da.SearchCursor(fcList[0], fieldList)\n\
    self.keyIDIndex = fieldList.index(keyID)\n```\n\nOur first regular method is the\
    \ `next()` method. As it has no input parameters in the UML diagram, the only\
    \ input here is the `self` that all methods must have. It starts simply enough\
    \ by advancing the `primaryCursor` property to the next feature in that cursor:\n\
    \n```python\n#define the next method\ndef next(self):\n\n#move the primary cursor\
    \ to its next feature\nprimaryCursorRow = self.primaryCursor.next()\n```\n\nThe\
    \ process of extracting the feature's value is only slightly more complicated,\
    \ because the row returned by that advancement step has all the fields for the\
    \ feature in question. However, we only need the key value to make sure we have\
    \ the right information for the `extractFeature` method. This is why we stored\
    \ the `keyIDIndex` property. It will tell us where in the list stored in this\
    \ row variable to find the right value:\n\n```python\n#extract that feature's\
    \ values and return it\nkeyIDValue = primaryCursorRow[self.keyIDIndex]\noutput\
    \ = extractFeature(keyIDValue)\n```\n\nThat leads us to the `extractFeature` method.\
    \ It starts easily enough by initializing the output to an empty list and then\
    \ creating a query to find the feature. Recall that the `keyID` property stores\
    \ the field used as the key field, so a query that searches for all features with\
    \ the key value equal to the specified `fid` value will get us to the right feature:\n\
    \n```python\n#define the extractFeature method with the fid as an input parameter\n\
    def extractFeature(self, fid):\n#initialize the output as an empty list\noutput\
    \ = []\n#create a query to find the feature that was provided\nkeyIDQuery = '\"\
    ' + self.keyID + '\" = ' + str(fid)\n```\n\nNext, we loop through the feature\
    \ classes and use that query to ensure we have a search cursor that is specific\
    \ to the feature we are interested in:\n\n```python\n#for each feature class\n\
    for fc in self.featureClasses:\n#create a cursor for that feature\ncursor = arcpy.da.SearchCursor(fc,\
    \ self.fields, keyIDQuery)\n#get the feature's values from that cursor and add\
    \ it to the output.\nfor row in cursor:\noutput.append(row)\n#return the output\n\
    return output\n```\n\nThe `extractField` method is similar, but it focuses on\
    \ a single field across all feature classes. It starts by initializing the output\
    \ to an empty list and creating a cursor for just that field in the first feature\
    \ class:\n\n```python\n#define the extractField method with the field as an input\
    \ parameter\ndef extractField(self, field):\n#initialize the output to an empty\
    \ list\noutput = []\n#create a cursor for just that field in the first feature\
    \ class\ncursor = arcpy.da.SearchCursor(self.featureClasses[0], [self.keyID, field])\n\
    #for each feature in that cursor\nfor row in cursor:\n#initialize the row in the\
    \ output to a list containing the value from that feature/field combination\n\
    outputRow = [row[1]]\n#create a query for this feature\nkeyIDQuery = '\"' + self.keyID\
    \ + '\" = ' + str(row[0])\n#for each remaining feature class\nfor fc in self.featureClasses[1:]:\n\
    #create a search cursor for that feature/field combination\nfieldCursor = arcpy.da.SearchCursor(fc,\
    \ [field], keyIDQuery)\nfor fieldRow in fieldCursor:\n#add the value to the end\
    \ of the row\noutputRow.append(fieldRow[0])\n#when all feature classes are done,\
    \ add this row to the output\noutput.append(outputRow)\n#return the output\nreturn\
    \ output\n```\n\nFinally, the reset function is defined as resetting the primary\
    \ cursor property:\n\n```python\n#define the reset function as resetting the primary\
    \ cursor property\ndef reset(self):\nself.primaryCursor = arcpy.da.SearchCursor(self.featureClasses[0],\
    \ self.fields)\n```\n\nIf the procedure is the maximum:\n\n```python\n#elif the\
    \ procedure is the maximum\n    elif procedure == \"MAXIMUM\":\n        output\
    \ = valueList[-1]\n```\n\nIf the procedure is the mean, we can use built-in functions\
    \ of `len` and `sum` to get the number of items in the list and their sum. Dividing\
    \ the sum by the number of items gives us the mean, and we can easily return that:\n\
    \n```python\n#elif the procedure is the mean\n    elif procedure == \"MEAN\":\n\
    \        count = len(valueList)\n        total = sum(valueList)\n        output\
    \ = total/count\n```\n\nIf the procedure is the standard deviation, it would be\
    \ possible to calculate that. However, when there is a module that includes a\
    \ function to calculate it for us, why not use that? Therefore, we will use the\
    \ `STATS.stdev()` function for this option:\n\n```python\n#elif the procedure\
    \ is the standard deviation\n    elif procedure == \"ST_DEV\":\n        output\
    \ = STATS.stdev(valueList)\n```\n\nIf the procedure is to count the number of\
    \ items less than a certain value, we will need to loop through the list of values\
    \ to get this. However, to make it a bit faster, we can use the fact that we have\
    \ already sorted the list. If we start at the beginning and keep counting until\
    \ we find a value that exceeds the threshold, the index we are at when we finish\
    \ counting gives us the desired answer. The only catch is that with a while loop\
    \ here, to avoid errors if all values are less than the threshold, we need to\
    \ add another condition that the index is before the end of the list:\n\n```python\n\
    #elif the procedure is less than\n    elif procedure == \"COUNT_UNDER\":\n   \
    \     soFar = valueList[0]\n        index = 0\n        while (soFar < threshold\
    \ and index < len(valueList)):\n            index = index + 1\n            soFar\
    \ = valueList[index]\n        output = index\n```\n\nIf the procedure is to count\
    \ the number of items equal to a specified value, there's no such means to speed\
    \ up the process. We have to investigate every item in the list and add to the\
    \ output count each time that value is found:\n\n```python\n#elif the procedure\
    \ is equal to\n    elif procedure == \"COUNT_CATEGORY\":\n        output = 0\n\
    \        for value in valueList:\n            if value == cat:\n             \
    \   output = output + 1\n```\n\nLastly, if nothing worked, then the procedure\
    \ that was given must not have been a valid entry. In that case, it is best to\
    \ raise a `ValueError` to provide a helpful error message to the user or the programmer.\
    \ At the very end of the function is the expected return statement:\n\n```python\n\
    #else it fit nothing\n    else:\n        raise ValueError(\"Invalid procedure\
    \ type: \" + procedure)\n```\n\n```python\n#return the output value\n    return\
    \ output\n```\n\nYou may have had a couple questions about programming decisions\
    \ as you looked through this, and these are the first two questions.\n\n**Question\
    \ 1: What was the purpose of sorting the list? Note: the ability to make finding\
    \ the less than count was a nice side benefit, so there are other, more direct,\
    \ benefits, too. Identify those more direct benefits.**\n\n**Question 2: For the\
    \ count of the values less than a threshold, our last index points to the first\
    \ item *greater* than the threshold, but we did not subtract one to get the number\
    \ of items less than the threshold. Why is it correct to *not* subtract one from\
    \ the index?**"
