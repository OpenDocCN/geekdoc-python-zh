  - '[PAGE 105]


    Confirm this with `type(cell)`. You''ll see that this is a special kind of object
    within `arcpy` called a `Result` object. `Result` objects are what are sometimes
    called "wrapper" objects, because they "wrap" a bunch of useful information around
    a theme into a single object. In this case, the theme is the operation of the
    `GetCellValue` function.


    The most useful part for most situations is the output. A result can contain multiple
    outputs, so we can start with `cell.outputCount` to find out how many outputs
    there are. It should be pretty straightforward that getting the value of a cell
    within a raster with only one band will only have one output. Enter `cell.getOutput(0)`
    to confirm that the output matches your answer to question 5.


    Result objects match a critical aspect of how ArcGIS projects retain and store
    the geoprocessing history. Go to the Catalog pane in ArcGIS Pro, and go to the
    History tab. You should see a "Get Cell Value" entry there, even though you didn''t
    run it through the toolbox or catalog. This illustrates that running a tool through
    ArcPy and running it through the GUI are equivalent. In fact, if you right-click
    on any entry in the History, three of the options relate to the Python version
    of that entry: "Copy Python Command," "Send to Python Window," and "Save as Python
    Script." If you hover over the Get Cell Value entry in the History, you''ll see
    details about its operation. It turns out that we can access this information
    through the `result` object. I''m illustrating below the result of the `slope`
    operation we did before, so that the following image doesn''t give you answers
    to any questions.


