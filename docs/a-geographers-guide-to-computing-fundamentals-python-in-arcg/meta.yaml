    ## Basics of Accessing Data in ArcGIS


    ### Introductory Comments: Superclasses, Subclasses, and Inheritance


    Almost every single GIS project is going to involve data, usually a large amount
    of it. This chapter introduces you to working with data through ArcPy, and also
    introduces a programming concept called inheritance.


    As we have seen, there are many variable types within Python, such as text strings,
    integers, real numbers, lists, dictionaries, tuples, and any kind of object. We
    might wish to group these into categories to help us better understand the dynamics
    of these different types and how they relate to one another. For example, integers
    and real numbers are both types of numbers. Likewise, we might see lists, tuples,
    and dictionaries as all collections of things. Given that, we can develop the
    following chart, showing these relationships among some of the basic Python data
    types (Fig. 8.1).


    With these relationships, we know that anything that the top row can do, such
    as multiplying two numbers together, can also be done by the items below it in
    the chart. This means that you can multiply two integers together, and two real
    numbers together, because multiplication applies to all numbers. However, the
    reverse is not always true. It makes sense to get the fractional part of a real
    number (the part after the decimal point). However, this is not the case for an
    integer, as it by definition has nothing after the decimal point.


    Similarly, there are some properties that apply to all collections, like asking
    how many values it contains. Meanwhile, you can ask for the nth item in a tuple
    or a list, but not a dictionary, because dictionary items are accessed through
    their key, rather than any indexing or ordering. We could even update our figure
    to reflect this added step in the hierarchy (Fig. 8.2).


    Recalling the concept of classes from earlier, we can apply these concepts to
    objects and classes, and at the same time be more specific in our terminology.
    The classes at the top of an arrow are *superclasses*, while the classes at the
    bottom end are *subclasses*. For example, a Dictionary is a subclass of Collection,
    and Collection is a superclass of Dictionary. This also means that intermediate
    levels of a chart like this have classes that can be both. An Indexed Collection
    is a subclass of Collection, but a superclass of List and Tuple. The other concept
    here is *inheritance*. Classes of objects have methods and properties, as seen
    before. Any methods and properties that are implemented for a superclass are also
    available for all subclasses. This means that it is possible to get item #5 from
    an indexed collection, as this would be a method applicable to any indexed collection.¹
    Because it applies for an indexed collection, it will work for both tuples and
    lists, as they are subclasses of the indexed collection class. However, the concept
    of “get item #5” doesn’t work for all collections, because dictionaries aren’t
    ordered. Therefore, “get item #5” belongs to the Indexed Collection class, and
    its subclasses, but not its superclass of Collection. Possibly confusing the situation
    further, we can, however, apply “get item” to all collections here. It’s just
    that dictionaries and indexed collections answer the question of “which item to
    get” differently. Dictionaries use a key, which can be any type of object, while
    indexed collections must use a numerical index. This means that while using brackets
    [] to get an item will work with both indexed collections and dictionaries, what
    goes inside the brackets must be different.


    These ideas apply to objects more generally, and therefore to the types of datasets
    within ArcPy. After all, you can load many types of data into ArcGIS, and we might
    be able to put them into categories based upon some of the methods or properties
    which can apply to them. For example, we might group all raster data types together,
    and all vector data types together. Figure 8.3 shows a hierarchy of some of the
    different ArcPy data types. This is, by no means, a complete set of all dataset
    types, but include the ones we may encounter most in this book. The breakdown
    seems to meet our commonsense conceptions of GIS data, with the initial split
    more or less being rasters versus vectors. I put “more or less” because of the
    Table superclass for all vector data, which is primarily in feature classes. Table
    refers to anything that has an attribute table or is a stand-alone table. For
    example, if you have a geodatabase (GDB) feature class of West Virginia counties,
    and a separate table, without any attached spatial component, of election results
    to join with that shapefile, both are Tables, but only the GDB feature class is
    a feature class. This illustrates that, under some circumstances, we can have
    an object that is a member of a superclass without it having to belong to any
    of the specific subclasses. A CSV file that you load into ArcGIS Pro will be a
    Table, but will not be any of the subclasses of Table, such as Feature Class or
    GDB Table. This doesn’t always happen for superclasses, but is in this case. For
    example, a generic dataset cannot exist without being one of the subtypes of dataset
    even though a generic table can exist.


    The second lesson is that a subclass can inherit from multiple superclasses. Observing
    the arrows, we can see that the GDB Feature Class inherits from both the GDB Table
    and the Feature Class. This means that any of the methods and properties associated
    with the GDB Table are associated with the GDB Feature Class, as is everything
    associated with the Feature Class. This ability to have multiple inheritance gives
    a great deal of flexibility to the class structure in Python in general and ArcPy
    in particular.


    We will begin to work with GIS data using the `arcpy.Describe()` function and
    the resulting description object, and use those to investigate some of the inheritance
    structure for GIS datasets within ArcPy.


    ### Task 1: Using arcpy.Describe


    There are many scenarios where, as you are carrying out a GIS project, you are
    given some data which you do not know much about. Before you begin to work with
    it, you may wish to examine it some. While this could be done through the GUI
    in ArcGIS Pro, we will use ArcPy. Scripting can help here because you may consistently
    want to know the same pieces of information about your incoming data, ensuring
    a script is more useful than pointing and clicking. Moreover, if you are managing
    a very large project, you can be receiving more datasets than you can keep up
    with, thus needing the speed of the computer to help manage the flow of data.


    This examination is through the Describe object, which we can access through the
    `arcpy.Describe()` function.² The Describe object is somewhat unique in that it
    has no methods, only properties. For that matter, it only has read-only properties—you
    cannot even write to the object. This may seem unusual, but recognize that for
    most of the properties, they are based upon the data used to create the object,
    and we want to ensure that the Describe object perfectly matches the data. Therefore,
    allowing us to write to (and therefore edit) the properties stored in the Describe
    object without making any changes to the corresponding data would make the Describe
    object incorrect. This is, to say the least, undesirable, so all properties have
    been marked as read-only.


    Before we can use the Describe object to examine data, we need to have data to
    look at. I have provided a few for you on the common drive. Copy the data from
    the Lab6 folder to a new Lab6 folder on your N: drive (or wherever else you want
    to use as your workspace).


    Open ArcGIS and *set the environment workspace* to the folder in which you have
    placed this chapter’s data. You can use either the Python command or the ArcGIS
    GUI. There is no need to load the data to the map, although you are welcome to
    do so. It is, in fact, more critical that you set the environment workspace to
    the same place the data has been loaded, as the following lines will not work
    unless the workspace is pointed in the right direction.


    In a new Python Notebook, run `arcpy.ListFeatureClasses()`.


    **Question 1:** How many feature classes are in the data folder?


    Now run `arcpy.ListRasters()`.


    **Question 2:** How many raster datasets are in the data folder?


    Now run `arcpy.ListTables()`.


    **Question 3:** How many tables are in the data folder?


    ¹ Strictly speaking, the [5] isn’t a method, but for our purposes here, using
    Python data types you are familiar with, the concept of inheritance applies nonetheless.


    ² If you’ve been observant, especially of the ArcPy documentation, you might recognize
    that the arcpy.Describe() function is, in fact, the constructor for an object
    of the type Describe. This will then be used shortly to create a variable of this
    class type.


    **Supplementary Information:** The online version contains supplementary material
    available at [https://doi.org/10.1007/978-3-031-08498-0_8].'
  mdcn: '## 任务 5：非引导式工作


    我提供了一个不同的 ArcGIS 项目，名为 IntroToArcpy_Task4。请使用你在本练习中迄今为止看到的部分或全部内容来回答以下问题。请提供答案以及在
    Python 窗口记录中用于找到答案的行。


    **问题 9：** 此项目中有多少个要素类？

    **问题 10：** 要素类 #3 的数据源是什么？

    **问题 11：** 使用帮助文档查找一个工具并在 Python 中执行它，将所有这些合并为一个名为 “Task_4” 的要素类。

    **问题 12：** 导出的记录是否回答了问题 9–11 的所有内容？


    ## 在 ArcGIS 中访问数据的基础知识


    ### 引言：超类、子类和继承


    几乎每个 GIS 项目都会涉及数据，通常是大量的数据。本章将向你介绍如何通过 ArcPy 处理数据，并引入一个称为继承的编程概念。


    正如我们所见，Python 中有许多变量类型，例如文本字符串、整数、实数、列表、字典、元组以及任何类型的对象。我们可能希望将它们分组归类，以帮助我们更好地理解这些不同类型之间的动态关系及其相互联系。例如，整数和实数都是数字类型。同样，我们可以将列表、元组和字典都视为事物的集合。基于此，我们可以制定以下图表，展示一些基本
    Python 数据类型之间的这些关系（图 8.1）。


    有了这些关系，我们知道顶行能做的任何事情，例如将两个数字相乘，图表中它下面的项目也能做到。这意味着你可以将两个整数相乘，也可以将两个实数相乘，因为乘法适用于所有数字。然而，反过来并不总是成立。获取实数的小数部分（小数点后的部分）是有意义的。但对于整数来说则不然，因为根据定义，它小数点后没有任何内容。


    同样，有一些属性适用于所有集合，比如询问它包含多少个值。同时，你可以询问元组或列表中的第 n 个项目，但不能询问字典，因为字典项目是通过其键来访问的，而不是通过任何索引或排序。我们甚至可以更新我们的图表以反映层次结构中的这个额外步骤（图
    8.2）。


    回想一下之前关于类的概念，我们可以将这些概念应用于对象和类，同时在术语上更加具体。箭头顶部的类是*超类*，而底部的类是*子类*。例如，字典是集合的子类，而集合是字典的超类。这也意味着像这样的图表的中间级别包含既可以是超类也可以是子类的类。索引集合是集合的子类，但也是列表和元组的超类。这里的另一个概念是*继承*。对象类具有方法和属性，如前所述。为超类实现的任何方法和属性也适用于所有子类。这意味着可以从索引集合中获取第
    5 个项目，因为这适用于任何索引集合的方法。¹ 因为它适用于索引集合，所以它对元组和列表都有效，因为它们是索引集合类的子类。然而，“获取第 5 个项目”的概念并不适用于所有集合，因为字典是无序的。因此，“获取第
    5 个项目”属于索引集合类及其子类，但不属于其超类集合。可能让情况更令人困惑的是，我们确实可以将“获取项目”应用于这里的所有集合。只是字典和索引集合回答“获取哪个项目”的方式不同。字典使用键，键可以是任何类型的对象，而索引集合必须使用数字索引。这意味着虽然使用方括号
    [] 获取项目对索引集合和字典都有效，但方括号内的内容必须不同。


    这些想法更普遍地适用于对象，因此也适用于 ArcPy 中的数据集类型。毕竟，你可以将许多类型的数据加载到 ArcGIS 中，我们或许可以根据可以应用于它们的一些方法或属性将它们分类。例如，我们可以将所有栅格数据类型归为一组，将所有矢量数据类型归为一组。图
    8.3 展示了一些不同 ArcPy 数据类型的层次结构。这绝不是所有数据集类型的完整集合，但包括了我们在本书中可能最常遇到的那些。这种细分似乎符合我们对 GIS
    数据的常识性概念，最初的划分或多或少是栅格与矢量。我说“或多或少”是因为所有矢量数据的超类 Table，主要存在于要素类中。Table 指的是任何具有属性表或独立表的内容。例如，如果你有一个西弗吉尼亚州县的地理数据库（GDB）要素类，以及一个单独的、没有任何附加空间组件的选举结果表，用于与该
    shapefile 连接，两者都是 Table，但只有 GDB 要素类是要素类。这说明，在某些情况下，我们可以有一个属于超类的成员对象，而不必属于任何特定的子类。你加载到
    ArcGIS Pro 中的 CSV 文件将是一个 Table，但不会是 Table 的任何子类，例如要素类或 GDB 表。超类并不总是如此，但在此例中是这样。例如，一个通用数据集不能在没有其子类型的情况下存在，而一个通用表则可以存在。


    第二个教训是，一个子类可以从多个超类继承。观察箭头，我们可以看到 GDB 要素类同时继承自 GDB 表和要素类。这意味着与 GDB 表相关的任何方法和属性都与
    GDB 要素类相关，与要素类相关的所有内容也是如此。这种多重继承的能力为 Python 中的类结构，特别是 ArcPy 中的类结构，提供了极大的灵活性。


    我们将开始使用 `arcpy.Describe()` 函数和生成的描述对象来处理 GIS 数据，并使用它们来研究 ArcPy 中 GIS 数据集的一些继承结构。


    ### 任务 1：使用 arcpy.Describe


    在执行 GIS 项目时，有许多场景是你被提供了一些你不太了解的数据。在开始处理之前，你可能希望先检查一下。虽然这可以通过 ArcGIS Pro 中的 GUI
    完成，但我们将使用 ArcPy。脚本在这里可以提供帮助，因为你可能经常需要了解关于传入数据的相同信息，确保脚本比点击操作更有用。此外，如果你管理一个非常大的项目，你可能会收到比你能跟上的更多的数据集，因此需要计算机的速度来帮助管理数据流。


    这种检查是通过 Describe 对象进行的，我们可以通过 `arcpy.Describe()` 函数访问它。² Describe 对象有些独特，因为它没有方法，只有属性。就此而言，它只有只读属性——你甚至不能写入对象。这可能看起来不寻常，但请认识到，对于大多数属性，它们是基于用于创建对象的数据，我们希望确保
    Describe 对象与数据完全匹配。因此，允许我们写入（从而编辑）存储在 Describe 对象中的属性，而不对相应数据进行任何更改，会使 Describe
    对象不正确。这至少可以说是不可取的，因此所有属性都标记为只读。


    在我们使用 Describe 对象检查数据之前，我们需要有数据可供查看。我在公共驱动器上为你提供了一些数据。将 Lab6 文件夹中的数据复制到你的 N: 驱动器（或你希望用作工作区的任何其他位置）上的新
    Lab6 文件夹中。


    打开 ArcGIS 并将*环境工作区*设置为你放置本章数据的文件夹。你可以使用 Python 命令或 ArcGIS GUI。无需将数据加载到地图中，尽管你欢迎这样做。事实上，更重要的是将环境工作区设置为与数据加载位置相同，因为除非工作区指向正确方向，否则以下行将无法工作。


    在新的 Python Notebook 中，运行 `arcpy.ListFeatureClasses()`。


    **问题 1：** 数据文件夹中有多少个要素类？


    现在运行 `arcpy.ListRasters()`。


    **问题 2：** 数据文件夹中有多少个栅格数据集？


    现在运行 `arcpy.ListTables()`。


    **问题 3：** 数据文件夹中有多少个表？


    ¹ 严格来说，[5] 不是一个方法，但就我们此处的目的而言，使用你熟悉的 Python 数据类型，继承的概念仍然适用。


    ² 如果你一直很细心，特别是 ArcPy 文档，你可能会认识到 arcpy.Describe() 函数实际上是 Describe 类型对象的构造函数。这将很快用于创建此类类型的变量。


    **补充信息：** 在线版本包含补充材料，可在 [https://doi.org/10.1007/978-3-031-08498-0_8] 获取。'
