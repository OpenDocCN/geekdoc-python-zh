    \ in the project package from the previous lab, why is it acceptable—in this instance—to\
    \ use the layer names of lots and buildings directly in the cursor functions?**\n\
    \n# Task 5: Run the Script in the Tool and Further Improve Error Handling\n\n\
    With these functions filled out, we should have all parts of our script ready\
    \ to run within the tool. If you made changes to a script that isn't in an obscure\
    \ folder associated with the project package, you will need to change the Script\
    \ File in the tool's properties→General area, so that it refers to whatever file\
    \ you have been editing.⁴\n\nRun the tool with the lot number option, with lot\
    \ number 12181240006.\n**Question 5: What is the percent of the lot covered by\
    \ the building in this lot?**\n\nHowever, entering a lot number that doesn't exist\
    \ gives a \"StopIteration\" exception.⁵ This is something that is going to be\
    \ confusing to a novice user, so we want to fix this so that the user at least\
    \ gets an easier to understand error message. We can have multiple except clauses\
    \ in a try/except block, just like we can have multiple elif clauses. In this\
    \ case, a StopIteration exception is caught, and its message gets replaced with\
    \ a betting response through the ARCPY. AddError() function. The full try/except\
    \ block is presented below, with the new code in the last three lines:\n\n```\n\
    try:\n    option = ARCPY.GetParameter(0)\n    if option == \"Lot Number\":\n \
    \       lotNumber = ARCPY.GetParameter(1)\n        pctCover = calculateFromLot(lotNumber)\n\
    \    elif option == \"Building Block & Section\":\n        buildingBlock = ARCPY.GetParameter(2)\n\
    \        buildingSection = ARCPY.GetParameter(3)\n        pctCover = calculateFromBuilding(buildingBlock,\
    \ buildingSection)\n    ARCPY.AddMessage(\"Your building covers \" + str(pctCover)\
    \ + \" percent of your lot. It should pass.\")\nexcept ValueError as ve:\n   \
    \ ARCPY.AddError(\"There was an error during the operation of the tool. \" + str(ve))\n\
    except StopIteration as si:\n    if option == \"Lot Number\":\n        ARCPY.AddError(\"\
    Your lot number doesn't exist.\")\n```\n\nTo see what is happening, let's follow\
    \ the exception as it gets raised and propagated through the program here. The\
    \ StopIteration exception takes place when the next() function is called on the\
    \ cursor named search in calculateFromLot(). That exception gets raised there,\
    \ and execution of the calculateFromLot() function stops immediately. Then the\
    \ exception goes up to what called that function, which is in the fifth line of\
    \ the try/except block. Since this is in a\n\n⁴Within a project package, at least,\
    \ this is an easy mistake to make, as the package copies the file to a new project\
    \ in a fairly obscure area, so changing the script to where you have the previous\
    \ lab materials saved is probably easier to work with.\n⁵There is a difference\
    \ between exceptions and errors, although the difference is beyond the scope of\
    \ this book."
