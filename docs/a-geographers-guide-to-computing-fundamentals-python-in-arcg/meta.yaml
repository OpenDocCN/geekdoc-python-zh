    is because humans have common sense that (most of the time) allows us to figure
    out what the author was trying to say, even if the author did not follow the Chicago
    style guide precisely. Returning to the computer as the high-speed idiot, it lacks
    that common sense. If a comma is missing, it truly cannot figure out what you
    are trying to tell it. Some example delimiters that we have seen before are parentheses
    for tuples, brackets for lists, curly braces for dictionaries, colons in index
    ranges (and we will see them more in complex statements, coming in the next chapter),
    commas separating items in a list or tuples, and periods noting methods specific
    to objects, such as the period in the `name.lower()` command you just typed in.
    A common source of errors is missing or incorrect delimiters, so it is worth paying
    attention to them. A full list is available at https://docs.python.org/3/reference/lexical_analysis.html#delimiters.
    That list also classifies assignment operators, like the = sign, as delimiters
    that “also perform an operation.” For the purposes of this book, to be less confusing
    about this dual purpose, I have introduced them as operators. Likewise, quote
    marks are treated as special characters, but are not deemed to be delimiters because
    they are part of the token with the rest of the string that they contain, instead
    of a distinct token unto themselves.


    # Expressions and Statements


    Expressions, as noted above, are analogous to phrases in standard writing. They
    evaluate to something, whether that is a number, a text string, a Boolean (true
    or false) value, or a more complex object. Some simple examples are:


    ```

    x + 5

    x == 5

    name.lower()

    ```


    Each of these evaluates to a single value, but does not provide a command for
    the computer to execute. This is the purpose of a statement, which is like a sentence.
    Just as it can be a challenge to come up with a concise definition of a sentence,
    the closest to a good, concise definition of statement is “a complete unit of
    execution.” This definition is so standardized that it has, in fact, been circulated
    so many times online that finding the official source of this definition to cite
    is not possible. However, this definition is also vague enough that a lot can
    fall under this definition. Simple statements often, but not always, involve setting
    the value of a variable. A decent, but not foolproof, test you can use is whether
    it causes something to get printed in the Python shell you have open for the exercise.
    The shell will print the result of evaluating an expression, but it will simply
    execute a statement without printing anything (unless, of course, it is a print
    statement).


    This chapter introduced you to the basic building blocks of Python, from the individual
    words that make up a Python statement, as variables, operators, and keywords.
    Different specific types of variables, including lists, tuples, dictionaries,
    and strings, were all introduced. Then this task wrapped up by introducing the
    concepts of delimiters, expressions, and statements. The next chapter builds upon
    statements by providing complex statements to give more nuanced control of what
    the computer executes.


    # Task 2: Finding and Fixing Bugs


    One lesson that everyone working in any form of coding discovers extremely quickly
    is just how commonplace bugs are.⁸ Therefore, being able to debug the code that
    you write is quite possibly the most important skill in any computing endeavor—more
    important than the ins and outs of any specific language, like Python. This section
    will introduce a few pointers, while Chap. 6 has a more in-depth examination of
    the different kinds of errors that can arise as you write your programs and scripts.


    There are a few sources of errors that are extremely frequent that I will go over
    here. The first is having a missing token, which is often a missing delimiter,
    as those are the easiest to forget. In this example, we will take a line similar
    to what you entered above, but remove a delimiter.


    > ⁸The ubiquity of bugs is no joke. I have been programming in one way, shape,
    or form for over 25 years, since a high school course in BASIC. I still routinely
    have bugs in almost anything I write. The difference of experience isn’t that
    you create perfect programs the first time, but that you develop better skills
    at interpreting error messages and the ability to address those errors.'
