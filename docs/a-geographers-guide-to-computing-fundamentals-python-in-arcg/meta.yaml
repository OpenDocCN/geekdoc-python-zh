- md: "## Error Handling 15\n\n## Introductory Comments: Strategies for Managing More\
    \ Complex Code\n\nThis chapter picks up where Chap. 14 left off, continuing to\
    \ improve the usability of ArcGIS Pro within the context of the cadastral application\
    \ from the previous lab. There are two ways we will try to improve things. The\
    \ first will be to change the parameters to allowing the user to either enter\
    \ the lot number or enter the block and section number for the building, instead\
    \ of having to know the size of the lot and the size of the building footprint.\
    \ The second improvement will be to improve how errors get handled, so the user\
    \ is less likely to be the recipient of hard-to-read error messages.\n\nTo make\
    \ these improvements, we will need to have a more complex structure to our Python\
    \ code, including defining our own functions and using more than one function.\
    \ Most of the concepts that underlie this added complexity are not new. The first\
    \ section of the book provided almost everything that you need to know, whether\
    \ that is defining a function and calling it or using a conditional statement.\
    \ The only new material is some additional means of managing and creating error\
    \ messages, which will be introduced as it is entered into the program.\n\nThe\
    \ bigger changes are, in a way, the length of the program, as the file gets longer.\
    \ As it does so, and especially in later chapters as the complexity continues\
    \ to increase, you might find it useful to use the strategies introduced earlier\
    \ of pseudo-code outlines and/or flow charts to better plan the code, as well\
    \ as understand what it is doing. Lastly, this chapter illustrates a realistic\
    \ aspect of the evolution of code within a program. The additions and changes\
    \ do not take place in a nice, neat, and linear fashion but instead are added\
    \ to different portions of the code out of order. This mirrors what often happens\
    \ in practice, especially for large projects that are too lengthy to be developed\
    \ sequentially from start to finish in one sitting.\n\n## Task 1: Update the Parameter\
    \ List for the Tool\n\nThe first part of making these upgrades is figuring out\
    \ what information we need from the user to make this updated approach possible.\
    \ We will change the set of parameters our tool accepts to accomplish this. First,\
    \ we need to know which set of information they are giving. This means changing\
    \ the first parameter from the lot area to one that sets the option they are taking:\
    \ lot number or building block/section number. Change the Label to “Option,” and\
    \ the Name to “Option.” We want this to be a String, so change the Data Type to\
    \ String. There will be a new setting in the parameter list that we will use,\
    \ because we only want one of two options to be selected. There is a setting called\
    \ “Filter.” Select it, and pick “Value List.” Type in the first option (“Lot Number”—but\
    \ without the quotes), and click the + button to add another row. Then type in\
    \ “Building Block & Section.” It is critical to have these EXACTLY as they appear\
    \ here. Typos in these strings will cause serious issues with the code.¹ It should\
    \ appear as you see below.\n\n¹Unless you have matching typos in the code, which\
    \ is not a recommended strategy.\n\nClick OK. Then change the second parameter\
    \ “Label” to Lot Number, and set its data type to string.² We also want it to\
    \ be an Optional parameter. Likewise, we need to add two more optional parameters\
    \ for the building block number and building section number. These can have the\
    \ data type of Long. When you have completed it, the parameter list should look\
    \ like this.\n\n**Question 1: Why did we set the last three parameters to be optional,\
    \ instead of required?**\n\n## Task 2: Create Functions to Make the Code More\
    \ Manageable\n\nNow that we have the parameter list changed to accommodate these\
    \ upgrades, we need to change the script. As mentioned in the introductory comments,\
    \ flow charts might be helpful. To begin with, let’s look at a flow chart of the\
    \ existing program for our tool (Fig. 15.1).\n\n> ²Yes, string, even though it\
    \ is a number. It turns out that the lot numbers are, in fact, so numerically\
    \ large that they do not even fit within a Long integer data type. Therefore,\
    \ we will have to treat them as a string, which is acceptable because it is a\
    \ categorical variable anyway.\n\nFig. 15.1 Beginning flow chart\n\nFirst, we\
    \ will change the section of the code that collects the parameters to get all\
    \ four parameters instead of just the ones from before, which by itself does not\
    \ require any change to the flow chart. It does, though, mean that we will need\
    \ more code, because we no longer have `buildingArea` and `blockArea` directly\
    \ from the user, so will have to look them up from the identifiers that the user\
    \ does provide:\n\n```\nimport arcpy as ARCPY\n\noption = ARCPY.GetParameter(0)\n\
    lotNumber = ARCPY.GetParameter(1)\nbuildingBlock = ARCPY.GetParameter(2)\nbuildingSection\
    \ = ARCPY.GetParameter(3)\n```\n\nBecause the user can provide the identifiers\
    \ in one of two options, it makes sense that after getting the parameters, we\
    \ would now need a conditional statement to identify which option is being selected.\
    \ Our script will have several ways to be completed, because of the two options\
    \ for the first parameter. This directly increases the complexity but also indirectly\
    \ increases the complexity. In both options, we will want to do the calculations\
    \ that are the remainder of the existing flow chart. However, if we think we might\
    \ be using an if/else statement to handle the two options, why have the same calculation\
    \ code repeated in both parts of the if/else statement? To handle this, using\
    \ a function is commonplace. We will first put the main logic of the code into\
    \ a function. This gives the next flow chart, which is obviously incomplete now\
    \ that not all parts are even connected (Fig. 15.2).\n\nThis entails a few changes\
    \ in the code. Recall that functions must begin with a line that starts with the\
    \ `def` keyword, as this is what defines a function. We would need a couple parameters\
    \ to carry out these calculations: building area and block area. These are set\
    \ as parameters into the `def` statement. Once that is done, the only change for\
    \ now is to make sure we use the `return` keyword to return the calculated value.\
    \ We will get to the conditional statement later:\n\n```\ndef calculate(buildingArea,\
    \ blockArea):\n    percentCover = (buildingArea / blockArea) * 100\n    if percentCover\
    \ > 100:\n        ARCPY.AddWarning(\"Your building area is greater than your block\
    \ area. Please check your values and reenter them\")\n    elif percentCover >\
    \ 30:\n        ARCPY.AddError(\"Your building might be too big to pass the permit\
    \ process. Please check your measurements!\")\n    return percentCover\n```\n\n\
    Working backward from the newly defined function, we now need to have ways of\
    \ taking the information that the user provided and using it to find the building\
    \ area and block area. Once that is done, those value can be the inputs into this\
    \ function. Because of how we are setting up the tool, separate functions for\
    \ the lot option and the building option would be helpful. The `def` statements\
    \ are shown below, but do not yet contain any code. That will be done the next\
    \ task:\n\nFig. 15.2 Introducing a function\n\n```\ndef calculateFromLot(lotNum):\n\
    \ndef calculateFromBuilding(bBlock, bSection):\n```\n\n## Task 3: Adding a Try/Except\
    \ Structure\n\nThis task starts to handle errors in a manner that we can use to\
    \ make the tool easier to use. In this context, errors are things that you have\
    \ encountered many times while debugging, such as a `SyntaxError` or `TypeError`.\
    \ We can do better than waiting for Python to generate an error for us. It might\
    \ initially seem redundant to create an error when we already have the `ARCPY.AddError()`\
    \ function that can provide an error message to the user. However, using Error\
    \ objects gives us more flexibility in handling them. If we know something isn’t\
    \ right, such as a building being larger than its lot, we can create the error\
    \ ourselves. Also, if a situation arises that creates an error, but we can provide\
    \ a workaround, that, too, is something we might want to address. In this manner,\
    \ we can use errors more intelligently to make life easier on the user.\n\nErrors\
    \ are created through the `raise` statement. These send error messages. Those\
    \ messages then get received within the code that called the line that generated\
    \ the error. If that code cannot handle the error, it sends the error message\
    \ back out and back up the parsing stack. If you think back to the Traceback in\
    \ Chap. 6 on debugging, where the error was found in line 23 of a function but\
    \ was when that function got called on line 68. The error is raised in the function\
    \ on line 23, and the error message is received on line 68. In that chapter, line\
    \ 68 had no way of dealing with it, so the script stopped running, and you, the\
    \ programmer, were given the error message. Changing the function to raise errors\
    \ changes the flow chart slightly, from giving warnings and errors to raising\
    \ `ValueError` objects. This means that a value is wrong, as would be the case\
    \ if the building area were greater than the lot area, or if the percent of the\
    \ lot which is covered could lead to a denied permit (Fig. 15.3).\n\nSee below\
    \ for how these were changed, including having a message that is more useful to\
    \ the user inside the parentheses. This is another useful purpose of having custom\
    \ errors; you can control what the messages are and therefore can try to make\
    \ them as useful as possible to the users:\n\n```\ndef calculate(buildingArea,\
    \ blockArea):\n    percentCover = (buildingArea / blockArea) * 100\n    if percentCover\
    \ > 100:\n        raise ValueError(\"Your building area is greater than your block\
    \ area. Please check your values and reenter them\")\n    elif percentCover >\
    \ 30:\n```"
  mdcn: "## 错误处理 15\n\n## 引言：管理更复杂代码的策略\n\n本章承接第14章的内容，继续在前一个实验的宗地应用背景下，提升 ArcGIS\
    \ Pro 的可用性。我们将尝试通过两种方式来改进。第一种是更改参数，允许用户输入地块编号或建筑物的街区和区段编号，而无需知道地块大小和建筑物占地面积。第二种改进是改善错误处理方式，使用户更少收到难以理解的错误信息。\n\
    \n为了实现这些改进，我们的 Python 代码需要更复杂的结构，包括定义自己的函数并使用多个函数。支撑这种复杂性的大部分概念并不新鲜。本书第一部分几乎提供了你需要知道的所有内容，无论是定义和调用函数，还是使用条件语句。唯一的新内容是一些管理和创建错误信息的额外方法，这些将在程序中引入时进行介绍。\n\
    \n更大的变化在某种程度上是程序的长度，因为文件会变长。随着它的增长，尤其是在后续章节中复杂性持续增加时，你可能会发现使用之前介绍的伪代码大纲和/或流程图来更好地规划代码以及理解其功能会很有用。最后，本章说明了程序内代码演进的一个现实方面。添加和更改并非以整洁、线性的方式进行，而是无序地添加到代码的不同部分。这反映了实践中经常发生的情况，特别是对于那些太长而无法一次性从头到尾顺序开发的大型项目。\n\
    \n## 任务 1：更新工具的参数列表\n\n进行这些升级的第一部分是弄清楚我们需要从用户那里获取哪些信息，以使这种更新的方法成为可能。我们将更改工具接受的参数集来实现这一点。首先，我们需要知道他们提供的是哪一组信息。这意味着将第一个参数从地块面积更改为设置他们选择的选项：地块编号或建筑物街区/区段编号。将“标签”更改为“选项”，将“名称”更改为“选项”。我们希望这是一个字符串，因此将“数据类型”更改为字符串。参数列表中将有一个我们将使用的新设置，因为我们只希望选择两个选项中的一个。有一个名为“过滤器”的设置。选择它，然后选择“值列表”。输入第一个选项（“地块编号”——不带引号），然后单击\
    \ + 按钮添加另一行。然后输入“建筑物街区与区段”。关键是要让这些字符串与这里显示的完全一致。这些字符串中的拼写错误会导致代码出现严重问题。¹ 它应该如下所示。\n\
    \n¹ 除非你在代码中有匹配的拼写错误，但这不是推荐的策略。\n\n单击“确定”。然后将第二个参数的“标签”更改为“地块编号”，并将其数据类型设置为字符串。²\
    \ 我们还希望它是一个可选参数。同样，我们需要为建筑物街区编号和建筑物区段编号添加两个可选参数。这些可以是长整型数据类型。完成后，参数列表应如下所示。\n\n\
    **问题 1：为什么我们将最后三个参数设置为可选，而不是必需？**\n\n## 任务 2：创建函数以使代码更易于管理\n\n现在我们已经更改了参数列表以适应这些升级，我们需要更改脚本。如引言中所述，流程图可能会有所帮助。首先，让我们看看我们工具现有程序的流程图（图\
    \ 15.1）。\n\n> ²是的，字符串，尽管它是一个数字。事实证明，地块编号在数值上非常大，甚至不适合长整型数据类型。因此，我们将不得不将它们视为字符串，这是可以接受的，因为无论如何它都是一个分类变量。\n\
    \n图 15.1 初始流程图\n\n首先，我们将更改收集参数的代码部分，以获取所有四个参数，而不仅仅是之前的参数，这本身不需要对流程图进行任何更改。然而，它确实意味着我们需要更多的代码，因为我们不再直接从用户那里获取\
    \ `buildingArea` 和 `blockArea`，因此必须从用户提供的标识符中查找它们：\n\n```\nimport arcpy as ARCPY\n\
    \noption = ARCPY.GetParameter(0)\nlotNumber = ARCPY.GetParameter(1)\nbuildingBlock\
    \ = ARCPY.GetParameter(2)\nbuildingSection = ARCPY.GetParameter(3)\n```\n\n因为用户可以提供两种选项之一的标识符，所以在获取参数后，我们现在需要一个条件语句来识别选择了哪个选项，这是合理的。由于第一个参数的两个选项，我们的脚本将有多种完成方式。这直接增加了复杂性，但也间接增加了复杂性。在两种选项中，我们都希望执行现有流程图剩余部分的计算。然而，如果我们认为可能使用\
    \ if/else 语句来处理这两个选项，为什么要在 if/else 语句的两个部分中重复相同的计算代码呢？为了处理这个问题，使用函数是常见的做法。我们将首先把代码的主要逻辑放入一个函数中。这给出了下一个流程图，现在显然不完整，因为并非所有部分都已连接（图\
    \ 15.2）。\n\n这需要在代码中进行一些更改。回想一下，函数必须以 `def` 关键字开头的行开始，因为这是定义函数的方式。我们需要几个参数来执行这些计算：建筑物面积和街区面积。这些被设置为\
    \ `def` 语句的参数。完成后，目前唯一的更改是确保我们使用 `return` 关键字返回计算值。我们稍后会处理条件语句：\n\n```\ndef calculate(buildingArea,\
    \ blockArea):\n    percentCover = (buildingArea / blockArea) * 100\n    if percentCover\
    \ > 100:\n        ARCPY.AddWarning(\"Your building area is greater than your block\
    \ area. Please check your values and reenter them\")\n    elif percentCover >\
    \ 30:\n        ARCPY.AddError(\"Your building might be too big to pass the permit\
    \ process. Please check your measurements!\")\n    return percentCover\n```\n\n\
    从新定义的函数反向推导，我们现在需要有方法获取用户提供的信息，并使用它来查找建筑物面积和街区面积。一旦完成，这些值就可以作为此函数的输入。由于我们设置工具的方式，为地块选项和建筑物选项分别创建函数会很有帮助。`def`\
