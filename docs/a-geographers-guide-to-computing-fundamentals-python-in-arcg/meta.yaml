    # Task 2: Use a Tool That Accesses an Online Service


    The second way many people use elements of Web GIS is through online services.
    In this approach, instead of accessing data that is otherwise not on your computer,
    it is running tools that are not stored on your computer. As with accessing data
    in the first task, this allows the user to access tools that would otherwise be
    impractical on their own hard drive.


    The primary ways this is needed is if the tool requires access to frequently updated
    information to work properly. This is the case with tools that find drive-time
    polygons, which is what you will be doing later in this task. Generating a polygon
    representing all the places within an hour’s drive of a specific point or set
    of points requires the traffic conditions. Of course, traffic conditions are updated
    very frequently in order to be useful. It is impossible to store all of the relevant
    information on your desktop computer and maintain it so that it is always current.
    Instead, the tool is set up as an online service so that it can access that data
    at the moment it is run, to ensure the most reliable results. The other way that
    a tool can be beneficial as an online service is if it is too computationally
    intensive for the hardware and software requirements of most computers. As desktop
    computers are generally powerful these days, this is not as common for a desktop
    GIS like ArcGIS Pro. However, for tools that employ algorithms that can benefit
    from parallel processing beyond the number of processing cores in a standard computer,
    it can be worthwhile to set it up as a cloud computing service that makes use
    of more processing cores in a network setting than would be available otherwise.
    This need for more processing power can also arise in a Web GIS setting if the
    user is accessing the GIS through a web browser instead of the desktop environment.
    Web browsers cannot assume or access large amounts of processing power, if only
    because they are typically designed to be run on a wide variety of hardware platforms,
    including devices with very limited internal processing capabilities. To avoid
    overloading the web browser or the computer using that browser, the GIS uses the
    browser to get input information from the user but handles the computation through
    a cloud computing setting independent of the browser.


    In our ArcPy setting, since most tools are included in the software itself, the
    first need is more common. Most, if not all, ArcGIS Pro tools that make use of
    online services require processing credits to run. Therefore, before you continue
    with this task, make sure you or your organization has enough credits to carry
    out the task. This can be viewed at [https://pro.arcgis.com/en/pro-app/latest/tool-reference/appendices/geoprocessing-tools-that-use-credits.htm](https://pro.arcgis.com/en/pro-app/latest/tool-reference/appendices/geoprocessing-tools-that-use-credits.htm),
    and at the time of writing, the code for this task uses 4.5 credits.


    Load the data from Chap. 12, so that you have the states, counties, cities, rivers,
    and highways visible. We will be finding all the areas that are within an hour’s
    drive time of a city called Springfield. The first stage of this is to create
    a new layer of just the cities named Springfield. To accomplish this, enter the
    following code, which should look familiar from previous chapters:


    ```

    arcpy.MakeFeatureLayer_management(''cities'', ''springfields'', ""AREANAME" =
    ''Springfield''")

    ```'
