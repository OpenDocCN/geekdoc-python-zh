  md: "![](img/37990581b275bdf7d510c6f2d9702a31_155_0.png)\n\nFig. 15.2 Introducing\
    \ a function\n\n```\ndef calculateFromLot(lotNum):\n\ndef calculateFromBuilding(bBlock,\
    \ bSection):\n```\n\n# Task 3: Adding a Try/Except Structure\n\nThis task starts\
    \ to handle errors in a manner that we can use to make the tool easier to use.\
    \ In this context, errors are things that you have encountered many times while\
    \ debugging, such as a `SyntaxError` or `TypeError`. We can do better than waiting\
    \ for Python to generate an error for us. It might initially seem redundant to\
    \ create an error when we already have the `ARCPY.AddError()` function that can\
    \ provide an error message to the user. However, using Error objects gives us\
    \ more flexibility in handling them. If we know something isn’t right, such as\
    \ a building being larger than its lot, we can create the error ourselves. Also,\
    \ if a situation arises that creates an error, but we can provide a workaround,\
    \ that, too, is something we might want to address. In this manner, we can use\
    \ errors more intelligently to make life easier on the user.\n\nErrors are created\
    \ through the `raise` statement. These send error messages. Those messages then\
    \ get received within the code that called the line that generated the error.\
    \ If that code cannot handle the error, it sends the error message back out and\
    \ back up the parsing stack. If you think back to the Traceback in Chap. 6 on\
    \ debugging, where the error was found in line 23 of a function but was when that\
    \ function got called on line 68. The error is raised in the function on line\
    \ 23, and the error message is received on line 68. In that chapter, line 68 had\
    \ no way of dealing with it, so the script stopped running, and you, the programmer,\
    \ were given the error message. Changing the function to raise errors changes\
    \ the flow chart slightly, from giving warnings and errors to raising `ValueError`\
    \ objects. This means that a value is wrong, as would be the case if the building\
    \ area were greater than the lot area, or if the percent of the lot which is covered\
    \ could lead to a denied permit (Fig. 15.3).\n\nSee below for how these were changed,\
    \ including having a message that is more useful to the user inside the parentheses.\
    \ This is another useful purpose of having custom errors; you can control what\
    \ the messages are and therefore can try to make them as useful as possible to\
    \ the users:\n\n```\ndef calculate(buildingArea, blockArea):\n    percentCover\
    \ = (buildingArea / blockArea) * 100\n    if percentCover > 100:\n        raise\
    \ ValueError(\"Your building area is greater than your block area. Please check\
    \ your values and reenter them\")\n    elif percentCover > 30:\n```"
