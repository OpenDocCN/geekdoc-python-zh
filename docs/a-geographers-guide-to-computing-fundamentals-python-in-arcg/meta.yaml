    ## Part II


    ## Data Structures in ArcPy and Programming


    The first section of this book introduced you to the basics of Python programming.
    By now, you might be wondering if we will ever get to the ArcGIS-specific portion
    of the book. This section is where it begins. Anyone who has been through even
    an introductory GIS course is aware of the importance of data structures in GIS
    and geoprocessing. The use of tables, vectors, rasters, and other data structures
    is inescapable for any GIS work. These structures are equally critical for programming
    within a GIS environment because, after all, you are almost certainly using the
    Python code to carry out analytical steps using these same GIS data structures
    within ArcGIS Pro. This section focuses upon the data structures, both as they
    are represented within the GIS and how Python accesses them.


    Accessing GIS data structures within ArcGIS Pro requires the use of the ArcPy
    module. This module is introduced in Chap. 7, along with a more extended discussion
    of object-oriented programming, as this approach to programming is heavily used
    to access GIS data and tools within ArcPy. Chapter 8 more explicitly moves toward
    the GIS data structures within ArcPy, allowing you to determine the data type
    for an unknown data set. The following three chapters examine the three most common
    GIS data structures in more detail: rasters, tables, and vectors. The concluding
    chapters of this section extend the data structure discussion to look at the data
    structures of programming, and how Python objects provide a very structured approach
    to representing the information—or data—inherent in creating and manipulating
    maps in a GIS. These two chapters look at the symbology aspect of cartography
    and the layout aspect of cartography, respectively.


    ## Introduction to ArcPy


    ## 7


    ## Introductory Comments: Objects and Classes


    Before proceeding to the instructions, we will expand upon two important concepts
    that were introduced in Chap. 4: objects and classes. Objects were introduced
    in that chapter, where the ideas of properties and methods were introduced as
    the defining features of objects. A class is the formal structure of the properties
    and methods which each type of object uses.


    Expanding upon the box idea from Chap. 2, an object was described in Chap. 4 as
    a crate containing a group of boxes, all of which are within the overarching object,
    as well as a set of binders representing the methods of that object. This is represented
    above by the variable called `aprx`, which has some of its properties shown on
    the left and a couple of its methods on the right, represented as simplified flow
    charts. Following Fig. 2.4, the boxes representing properties are color-coded
    by type, with String properties in green, orange representing a Map object, and
    gray representing a DateTime object. The class is the blueprint of what exists
    within each crate. For example, it specifies that each variable in the `ArcGISProject`
    class must have a property called `filePath` which contains a String. Likewise,
    it specifies that each object within this class must have a method called `listLayouts`
    which accepts a String as an optional input, and provides a list, and each item
    within that list will be a `Layout` object. Each property, like a variable, contains
    a value. These values are the properties of the object, and they collectively
    comprise the object’s state. Python provides direct access to these properties,
    but sometimes you can only read the properties, rather than write or alter them.
    It is similar to the difference between lists, which can be altered after they
    are created, and tuples, which cannot. The distinction is that properties that
    are read-only can change, albeit through less direct means. Also like variables,
    these properties can be of any data type, including objects. In fact, this is
    something we will frequently encounter within ArcPy. The class blueprint enforces
    that every object within the class has the same set of properties, which are all
    of the same types, although the values of those properties can change from one
    object to another.


    In addition to the properties, classes contain methods. These methods are similar
    to functions, in that they are blocks of code which have the ability to accept
    input parameters and provide return values. Like functions, they are not required
    to do so. The advantage of class-specific methods is that they can more directly
    use the properties, and alter the properties, of the object than having a generic
    function which accepts the object of its properties as an input parameter.


    As this visualization approach extending the box metaphor to a crate containing
    multiple boxes as well as methods is cumbersome and will not scale well to more
    complicated classes, a visual language called Unified Modeling Language, or UML,
    is often employed. There are several kinds of diagrams that make up UML, and we
    will be focusing here on a type called a class diagram. The class diagram for
    Fig. 7.1 is given in Fig. 7.2.


    The classes we will be working with are in a module ESRI provides, called `arcpy`.
    There are functions and classes built into `arcpy`, as well as a series of submodules.
    Each submodule has its own access. For example, the Data Access module is accessed
    through `arcpy.da.`, while the Mapping module is in `arcpy.mp`. As you may have
    observed, the dot delimiter is not just used for identifying properties and methods
    within classes but also for accessing classes and functions within modules. This
    is why we had `csv.reader` a few times in code from earlier chapters. It was accessing
