    Move the center of the map to the south to make room for insets by centering it
    on 35 Degrees North, instead of 40.

    Insert two new map frames (using GUI).

    Name one Alaska and the other Hawaii.

    Alaska gets the following specifications:


    - Map X = -150 degrees.

    - Map Y = 60 degrees.

    - Width = 2".

    - Height = 2".

    - Scale = 1:80000000.

    - Element Position X = 1".

    - Element Position Y = 4".

    - Add text (using GUI) and set the text to “Alaska”.

    - Text position X = 1.75".

    - Text position Y = 5.8".

    - Text size 11 font.


    Hawaii gets the following specifications:


    - Map X = -158 Degrees.

    - Map Y = 20 Degrees.

    - Width = 1.5".

    - Height = 1.25".

    - Scale = 1:20000000.

    - Element Position X = 3".

    - Element Position Y = 4".

    - Add text (using GUI) and set the text to “Hawaii”.

    - Text position X = 3.75".

    - Text position Y = 5.05".

    - Text size 11 font.


    Export as USIncome_layout2.pdf.


    ## Part III


    ## Creating Algorithms to Enhance ArcGIS Pro


    Once you have the data structures in your GIS, we can combine this with the basics
    of programming, especially the control statements and the use of functions, to
    develop new algorithms to extend and enhance the abilities of ArcGIS Pro. After
    all, most people engage in the programming process for ArcGIS Pro with one of
    two goals in mind: having scripts to automate one or more processes in ArcGIS
    Pro so that it is less cumbersome than constantly using the GUIs provided within
    the toolbox, or writing programs to create a new tool to add functionality that
    isn’t available in ArcGIS Pro.


    For either of these, an understanding of algorithms will greatly help the development
    of the scripts and programs that are needed to accomplish these objectives. While
    a full exploration of GIS algorithms would be more extensive than can fit into
    this book, and is already the subject of existing books, this section provides
    a foundation in the development of algorithms, and places it within the context
    of creating new tools and new classes for use within ArcGIS Pro.


    Chapter 14 introduces the creation of new tools that allow you to run your scripts
    within ArcGIS Pro directly, and Chap. 15 adds the more sophisticated handling
    of errors to this to make the tools more user friendly. Chapter 16 extends this
    to show how to create your own custom classes that can enhance the data structures
    you use in your programs and scripts. Lastly, Chap. 17 provides an example of
    the development of algorithms to solve a problem and asks you to develop your
    own algorithms to solve problems within an applied context.


    I will note here that there are two types of custom tools that can be made within
    ArcGIS Pro. This section focuses on the type called script tools. These are simpler,
    and therefore a gentler introduction to how scripts can be used to create new
    tools. The other type, which is introduced in Chaps. 20 and 21 of Part IV, is
    called a Python toolbox. This approach has more flexibility, and allows for projects
    that incorporate multiple Python files into one tool. For those of you who get
    interested in more in-depth development of GIS software, including contributing
    to the open source QGIS, this more advanced approach may become more useful for
    you.


    ## Creating Custom Tools


    ## 14


    ## Introductory Comments: Concepts of User Interfaces


    We have seen thus far the ability to enter Python lines and pieces statement by
    statement into the Python Window or block by block in the Python Notebook in ArcGIS
    Pro. Additionally, we have seen how to run standalone scripts within IDLE. However,
    what if you want to run an entire script within ArcGIS Pro? This is accomplished
    through custom tools.


    Custom tools can serve two purposes. The first is running a script that provides
    a tool or analytical technique that is not yet implemented within ArcGIS Pro.
    For example, some forms of spatial regression, like spatial lag regression and
    spatial error regression, are not implemented within ArcGIS.¹ A custom tool, then,
    would accomplish this task. However, most of you are probably not going to be
    engaging in that level of statistical or analytical computing, because this specialized
    task is mainly carried out within the academic research community, and the majority
    of geography undergraduates are not going into that community after graduation.
    This is where the second purpose of tools comes in: making ArcGIS Pro easier to
    use by making it more accessible. The comments below discuss some user interface
    concepts that can help to understand the value of being able to create custom
    tools above and beyond adding new functions to ArcGIS.


    User interfaces, including ArcGIS Pro, have an inherent tension between two goals:
    making the interface intuitive versus making the interface expressive. An intuitive
    interface is easy to use, whereas an expressive interface has a wide range of
    capabilities. For the most part, an intuitive interface will be limited in expressiveness
    by only carrying out a few tasks. However, an expressive interface typically gains
    its expressiveness at the expense of being easy to use. You can probably think
    of this with ArcGIS easily enough by recognizing that it is quite powerful in
    the range of things it can do, but it is not user-friendly or intuitive.


    At the most extreme end of expressiveness, there are command line interfaces,
    which is basically scripting. The number of commands is extremely large, and within
    Python, we can import many packages, which increases the expressiveness even further
    by importing many more functions, classes, and therefore capabilities. However,
    as you are learning throughout this book, it is not easy to use.


    We can place ArcGIS Pro in an intermediate category. Thanks to a graphical user
    interface instead of command line, it is easier to use, but there are still many
    tools and menus and ribbons to navigate. While you would not need to frequently
    refer to online documentation, as with arcpy, or memorize hundreds of functions
    and classes, it is still easy to get lost in the various parts of the ArcGIS Pro
    interface.


    At the most intuitive end, within a GIS context, we can perhaps place a tool dialog
    as an example. If you take just a single tool, you have a clear sense of what
    the parameters are, what you should do, and how to make the tool run properly.
    However, as intuitive as a tool with input dialog boxes may be, it only does one
    task. Therefore, it is as limited in expressiveness as possible. Breaking out
    of the GIS context, “natural language processing,” which is the type of computing
    for voice assistants like those with the Amazon Alexa and Siri in the Apple iPhone,
    is perhaps the gold standard of intuitiveness. You can, in theory at least, ask
    Alexa to set the temperature of your house to a specific setting and (assuming
    you have a thermostat that can cooperate with Alexa) have it adjust accordingly.²
    Likewise, you can ask Alexa for the answers to trivia problems, math problems,
    spelling problems, and so forth. These involve computation, and Alexa is, after
    all, largely a computer.


    Our goal with the task set below, then, is to use a tool to create an intuitive
    functionality for a commonly executed problem within a building permit process
    and embed this tool within an ArcGIS Pro project. Lastly, you will share this
    project and all associated data in a single package so that all the work can be
    readily shared with less GIS-savvy colleagues.


    ## Task 1: Create a Custom Tool


    ## About the Application


    Imagine you work in the local government office that is responsible for evaluating
    development applications. You are the GIS analyst responsible for maintaining
    the city’s cadaster, which is stored in ArcGIS. A number of your colleagues are
    responsible for providing applicants with some basic information about their properties
    and advising them whether their applications are likely to be favorably considered,
    but they don’t have much experience using GIS. So your job is to build a custom
    tool that will enable your colleagues to use the GIS effectively to answer applicants’
    questions without requiring them to take a 2-week ESRI training course.


    One of the development rules that your local government has is that the size of
    buildings on a particular block of land cannot exceed 30% of the total land area.
    So your tool needs to do the following things:


    - Do a calculation that figures out what proportion of the land is currently occupied
    by a structure.

    - Tell the user how much of the block is currently occupied by structures.


    Start ArcGIS Pro with a new project. When you do this, ArcGIS Pro automatically
    creates a toolbox for that project. In ArcCatalog, go to that new toolbox through
    the “Toolboxes” link in the top of the catalog list. Within it should be a toolbox
    which shares its name with the name of the new project.


    Right-click on it and select New→Script. In the Add Script box that comes up,
    type in the name CalculateArea, and the label “Calculate Area”³. Lastly, connect
    the tool to the script by setting the “Script File” option to the calculateArea.py
    file that has been provided for you, wherever you have saved it. Click OK to save
    the edits.


    You might have to close and reopen the “Toolboxes” arrow in the Catalog window
    or otherwise refresh it. ArcGIS won’t necessarily update the display to recognize
    that you have added a tool until you close and reopen it.


    What we are going to do is essentially build the dialog box for the tool. In place
    of the `input` functions that we used in IDLE, we need to have a dialog box in
    ArcGIS that collects this information from the user. It ends up being a bit more
    rigorous than the `input` function because it requires us to specify the data
    type of the input value. It also permits output values. The ability to specify
    the data type helps us resolve plenty of potentially confusing errors immediately,
    such as the user entering a feature collection when a raster is expected.


    Right-click on the newly created CalculateArea tool and select Properties. At
    left, choose Parameters instead of General. Now we will enter the two parameters.
    Click in the first cell underneath Label, and write Block Area. For the Name,
    put Block_Area or BlockArea (as long as it has no space). We want to restrict
    this to real numbers by ensuring it is of the type Double. To the right of Block_Area
    under data type choose Double by clicking on the small ellipsis … that appears
    and choosing “Double” in the long list that appears when you click on the little
    triangle at the right end of the bar.


    ![](img/37990581b275bdf7d510c6f2d9702a31_148_0.png)


    ¹ ESRI is adding new statistical techniques with, it seems, each new version or
    ArcGIS Pro, so this statement may soon become outdated. Also, see the incorporation
    of an R program that does exactly this in Chap. 19.


    **Supplementary Information:** The online version contains supplementary material
    available at [https://doi.org/10.1007/978-3-031-08498-0_14].


    ² See the anecdote about computers not having common sense in Chap. 1 for details
    on the “in theory” comment.


    ³ Observe that the name has no space, as spaces aren’t always allowed in parts
    of ArcGIS file names and file paths. Meanwhile, we are using a label that is more
    readable.'
