    ### 引言：GIS 特定的数据结构


    由于计算数据类型的讨论与 GIS 数据类型密不可分，我们转向 GIS 中的两种主要数据类型：栅格和矢量。栅格在 ArcPy 中更容易处理，因此我们从这里开始。栅格数据结构在概念上是一个单元格网格，每个单元格包含一个值（图
    9.1）。


    一旦我们有了值，在计算机中存储它的最简单方法是创建一个值列表，按顺序排列，并确保行数或列数也被表示出来，这样就有办法将一维列表转换为二维网格（图 9.2）。


    对于这个简单的例子，写出 64 个数字不会是一个很大的负担。然而，栅格通常包含远不止 64 个单元格。1000×1000 或更大的网格栅格，因此拥有超过 1,000,000
    个单元格，并不少见。一个典型的栅格，显示摩根敦地区的海拔，如下所示（图 9.3）。它有近 1700 万个像素，像 1330.099976 这样的海拔值，打印所有单个值将需要超过
    56,000 页。


    因此你可以预测，这种方法可能会产生非常大的文件大小。然而，方便的是，相邻值通常具有相同的值，例如蜿蜒穿过此栅格的莫农加希拉河的所有海拔值。有几种数据结构利用这种相邻值的相似性来减小栅格的文件大小。对这些结构的详细检查超出了本书的范围，但你可以通过返回上一章的
    ArcPy Describe 文档，并查看栅格数据集属性来了解各种方法。你会看到一个名为 `compressionType` 的属性，ArcGIS Pro
    2.8 版本支持 16 种不同的减小文件大小的方法。结论部分列出的一些附加资源提供了更多关于栅格数据结构的信息。


    就这些引言而言，理解这些栅格数据结构都旨在支持两个主要目标就足够了：通过简单地列出每个值来减小文件大小，以及能够轻松识别任何给定位置的值。第一个目标是对大文件大小和有限存储能力的直接反应。第二个目标不仅对于在屏幕上显示栅格很有价值，而且对于本章任务中将要检查的工具也很有价值。这些工具需要这些信息，因为许多栅格操作是局部的，这意味着它们使用中心单元格周围的邻域，并将工具的计算应用于该邻域内的所有值。例如，ArcGIS
    Pro 通过应用以单元格为中心的 3×3 窗口的一些代数计算来计算栅格在单元格处的坡度，而不仅仅是中心单元格。¹ 这意味着无论使用什么数据结构，都必须能够轻松找到任何指定单元格的相邻单元格。这种获取邻域单元格值的需求因能够找到任何位置的值而得到加强。


