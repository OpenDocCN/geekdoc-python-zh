    # Object Diagram


    While not included in the main text of the book, one other UML diagram can be
    useful for tracking down complex bugs: the object diagram. It looks very similar
    to a class diagram. The difference is that the class diagram shows the ways the
    different classes relate to each other in general, while an object diagram provides
    the specific values of the object variables at a point in time while the code
    is running. Therefore, to focus on the variables and their properties, a few changes
    get made. Firstly, the variable name gets included in the header. Secondly, the
    types of properties are replaced with their exact values. Thirdly,'
