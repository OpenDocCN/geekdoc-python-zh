    Similarly, while it isn''t used here, if we were making use of an ArcGISProject
    object, the “CURRENT” approach to pointing it to the correct project would fail.
    After all, “CURRENT” is an instruction to use the currently open project in ArcGIS
    Pro. If you are in IDLE, you probably don''t have ArcGIS Pro open to even have
