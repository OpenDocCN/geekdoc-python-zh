    \ chapter (Fig. 16.7).\n\nThe question becomes where do we put this code? As it\
    \ is something that happens when we initially create the parcel, it belongs in\
    \ the `__init__()` dunder method.\n\n## Task 3: Create Shells of the Classes\n\
    \nNow that we have our plans, we can start to fill in the code for these classes.\
