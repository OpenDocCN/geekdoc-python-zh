    classes between the overarching Describe object and the specific GDB Feature Class
    here. In this case, in addition to Describe and GDB Feature Class, all properties
    belonging to FeatureClass, GDB Table, Editor Tracking Dataset, Table, and Dataset
    classes are also inherited by the GDB FeatureClass. Therefore, while it looks
    a bit underwhelming through the documentation itself, where there are only four
    properties listed, it is important to acknowledge that with GDB FeatureClasses,
    we can also access the 12 properties in the Describe object, the six properties
    for the FeatureClass object, the ten properties for GDB Table, and so on. It is
    just these four which are unique to the GDB FeatureClass itself and any subclasses
    it may have.


