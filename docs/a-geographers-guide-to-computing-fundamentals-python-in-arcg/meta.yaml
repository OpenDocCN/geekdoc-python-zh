    ## 7


    ## 引言：对象与类


    在继续说明之前，我们将扩展第 4 章中介绍的两个重要概念：对象和类。对象在那一章中被介绍，其中属性和方法的概念被引入作为对象的定义特征。类是每种对象类型使用的属性和方法的正式结构。


    扩展第 2 章的盒子概念，第 4 章将对象描述为一个装有一组盒子的板条箱，所有这些盒子都在整体对象内，以及一组代表该对象方法的活页夹。上图中由名为 `aprx`
    的变量表示，其左侧显示了一些属性，右侧显示了几个方法，表示为简化的流程图。遵循图 2.4，代表属性的盒子按类型进行颜色编码，String 属性为绿色，橙色代表
    Map 对象，灰色代表 DateTime 对象。类是每个板条箱内存在内容的蓝图。例如，它指定 `ArcGISProject` 类中的每个变量必须有一个名为
    `filePath` 的属性，该属性包含一个 String。同样，它指定此类中的每个对象必须有一个名为 `listLayouts` 的方法，该方法接受一个
    String 作为可选输入，并提供一个列表，该列表中的每个项目将是一个 `Layout` 对象。每个属性，就像变量一样，包含一个值。这些值是对象的属性，它们共同构成了对象的状态。Python
    提供了对这些属性的直接访问，但有时你只能读取属性，而不能写入或更改它们。这类似于列表（创建后可以更改）和元组（创建后不能更改）之间的区别。区别在于只读属性可以更改，尽管是通过不太直接的方式。同样像变量一样，这些属性可以是任何数据类型，包括对象。事实上，这是我们在
    ArcPy 中经常遇到的情况。类蓝图强制类中的每个对象都具有相同的属性集，这些属性都是相同的类型，尽管这些属性的值可以从一个对象更改为另一个对象。


    除了属性之外，类还包含方法。这些方法类似于函数，因为它们是能够接受输入参数并提供返回值的代码块。像函数一样，它们不需要这样做。类特定方法的优势在于，它们可以比接受对象及其属性作为输入参数的通用函数更直接地使用和更改对象的属性。


    由于这种将盒子隐喻扩展到包含多个盒子以及方法的板条箱的可视化方法很笨拙，并且无法很好地扩展到更复杂的类，因此通常使用一种称为统一建模语言（UML）的可视化语言。UML
    由几种图表组成，我们将在这里关注一种称为类图的图表。图 7.1 的类图如图 7.2 所示。


    我们将要使用的类位于 ESRI 提供的一个名为 `arcpy` 的模块中。`arcpy` 中内置了函数和类，以及一系列子模块。每个子模块都有自己的访问方式。例如，数据访问模块通过
    `arcpy.da.` 访问，而映射模块在 `arcpy.mp` 中。正如你可能观察到的，点分隔符不仅用于标识类中的属性和方法，还用于访问模块中的类和函数。这就是为什么我们在前面章节的代码中多次使用
    `csv.reader`。它访问的是 `csv` 模块中的 `reader` 类。然后我们可以通过进一步扩展点序列来访问这些子模块中的类，并通过进一步扩展来访问属性和方法。因此，可以通过
    `arcpy.mp.ArcGISProject("CURRENT")` 访问 `ArcGISProject` 类，我们甚至可以通过 `arcpy.mp.ArcGISProject("CURRENT").filePath`
    访问其文件路径。


