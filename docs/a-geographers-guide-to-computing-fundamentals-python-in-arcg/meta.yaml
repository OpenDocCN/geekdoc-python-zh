- md: "**Question 8:** Using the `GetCellValue` function, are the value of the slope\
    \ from the `Slope` tool and the value of the slope from the `SurfaceParameters`\
    \ tool close to each other (within 0.01 degrees)?\n\n## Task 2: Reclassification\n\
    \nGoing back to the red cedar scenario, once we have the slope created, using\
    \ either tool, we need to reclassify the slope to isolate the ideal red cedar\
