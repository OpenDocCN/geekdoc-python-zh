  md: 'The renderer type which has no analogue within the raster colorizers is the
    `SimpleRenderer`. After all, while a simple dot map with all cities represented
    with the same symbol is a potentially useful map layer, a raster with all pixels
    simply colorized to the same color is not very useful. Therefore, there''s a `SimpleRenderer`
    that just has a `symbol` property.


    This `symbol` property provides access, as do other properties of other renderers,
    to an object of the `Symbol` class. This represents how the feature is actually
    drawn on the map, so if you want to, for example, change the size of a point,
    or the color of a polygon, you have to do so through the `Symbol` that is being
    used to draw that object. There is a lengthy series of properties belonging to
    the Symbol class, only a couple of which are shown in the diagram. The colors
    are, as with the raster colorizers, represented as dictionaries, which might seem
    an unusual choice. There are several ways of representing colors in computer graphics,
    so just assuming that your colors are going to follow the most common format of
    RGB (red, green, blue), is not a safe assumption. Therefore, `arcpy` gives you
    the opportunity to represent colors in one of several different ways through a
    dictionary with exactly one entry. This entry uses the color format (RGB, CMYK,
    HSV being common ones) as the dictionary item''s key, as a String. The value associated
    with that key is a list of numbers, such as the red, green, and blue values ranging
    from 0 to 255. There is, furthermore, an additional value, called alpha in the
    documentation. This impacts the opacity or transparency, with 100 as completely
    opaque or not at all transparent and 0 as completely transparent.


    The following tasks introduce some of these symbology representations through
    vector renderers. It is not a complete enumeration of everything within `arcpy.mp`
    by any stretch but may serve as a useful introduction to scripting with symbologies.


    # Task 1: Basic Mapping Tasks—Adding Layers


    Throughout this lab, we will be working with a geodatabase of some reference layers:
    counties (USCensus2010_arc), states, highways, rivers, and cities. The overarching
    goal will be to produce a map of county by income with the other layers there
    for reference. Copy everything over to your preferred workspace and open the Python
    Window, as we will use that for the guided tasks in this chapter.


    I have given you a basic starting project already, so open `mapping_start.aprx`,
    and fix the inevitable broken data references. You will notice that one of the
    layers listed above is missing: the rivers. We will start by adding this layer
    using scripting. Open the Python Window and enter these two lines:


    ```

    aprx = arcpy.mp.ArcGISProject("CURRENT")

    thisMap = aprx.listMaps()[0]

    ```


    **Question 1: Why might it be better to set the map to “current” rather than designate
    a file location?**


    Now we will add the rivers layer. To do this, we want two layer objects: one for
    the layer we are inserting into the document and one that we can use to tell ArcMap
    where in the Table of Contents to put it. The `listLayers` function works similar
    to the `listMaps` function, but here we are specifying the name we want:


    ```

    roadLayer = thisMap.listLayers("roads")[0]

    ```


    **Question 2: Why would specifying the parameter for “roads” be better than using
    the index of the roads layer (e.g., `thisMap.listLayers()[1]`)?**


    As with the `listMaps` function, it returns a list, even when there is only one
    item in the list, so the `[0]` is necessary. We have to point ArcMap to the right
    geodatabase layer to give it the rivers. (Edit the file path as necessary.) Once
    complete, it adds the layer to the map and returns a Result object:


    ```

    >>> riverLayer = arcpy.management.MakeFeatureLayer("C:/noSpaces/arc/WVAGP/mapping/mapping_start.gdb/rivers",
    "river_lyr")


    <Result ''river_lyr''>

    ```'
