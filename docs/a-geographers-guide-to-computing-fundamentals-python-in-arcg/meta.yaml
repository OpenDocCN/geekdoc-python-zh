    +   - `name = "ArcGIS Training"`

    - Hit the Enter key.


    Now the line appeared above, and the code entry line is once again blank. This
    means that the previous line was executed.


    ![](img/37990581b275bdf7d510c6f2d9702a31_20_1.png)


    **Fig. 2.1** The x variable'
