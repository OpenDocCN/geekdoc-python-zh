    sd_file_name = service_name + ".sd"

    sd_output = outdir + "" + sd_file_name

    ```


    Now that the name is ready, we can take the first step of that bifurcated process:
    staging the service. This is done through the following line:


    > ¹I haven’t investigated their organizational structure, but am simply making
