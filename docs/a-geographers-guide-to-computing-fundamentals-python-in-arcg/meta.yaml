    \ 30 → 0\n- 30 to 45 → 1\n- 45 to 90 → 2\n\nThis requires constructing a remap\
    \ table, which we can create with the following line. Be careful with the position,\
    \ type, and number of brackets [] and parentheses ().\n\n```\nremap = RemapRange([[0,\
    \ 30, 0], [30, 45, 1], [45, 90, 2]])\n```\n\nThe remap table is a list of lists,\
    \ and each of the three lists has, in turn, three entries inside of it. This setup\
    \ of nested lists is a pretty common data structure for computer science, because\
    \ it is a handy way to represent tabular data. We can change the formatting of\
    \ this remap table list of lists into the following, which more closely mirrors\
    \ the appearance of a table, and which you’ll notice matches the reclassification\
    \ categories above.\n\n```\n[[ 0, 30, 0],\n [30, 45, 1],\n [45, 90, 2]]\n```\n\
    \nThe first item in each inner list is the starting number for the reclassification\
    \ range. The second item is the ending number of the reclassification range. The\
    \ third item is the new value this class is getting. If we had more than three\
    \ classes, we would have a list of four, or five, or however many lists, but each\
    \ of these smaller, inner lists would have to have three values matching this\
    \ order of the lowest value in the range, the highest value in the range, and\
    \ the new value for the class.\n\nOnce the remap table is set up, we can carry\
    \ out the reclassification itself with this line.\n\n```\nslopeReclass = Reclassify(slope,\
    \ \"Value\", remap)\n```\n\n**Question 9:** Open the attribute table of the reclassified\
    \ raster to find out how many cells are in each of the categories. Use this to\
    \ fill out the table below.\n\n| Class (\"VALUE\" in the attribute table) | Number\
    \ of cells (aka \"COUNT\") |\n| :--- | :--- |\n| 0 | |\n| 1 | |\n| 2 | |\n\n##\
    \ Task 3: Aspect Considerations\n\nUsing similar scripting to the `Slope` tool\
    \ or the `SurfaceParameters` tool, create the aspect of this DEM, and reclassify\
    \ it for the following ranges, because red cedar prefers south- and southwest-facing\
    \ slopes.\n\n- -1 to 135 → 0\n- 135 to 180 → 1\n- 180 to 270 → 2\n- 270 to 360\
    \ → 0\n\n**Question 10: What is the code you used to create your aspect raster,\
    \ and the reclassified aspect raster?**\n\n## Task 4: Map Algebra\n\nNext, to\
    \ combine the two reclassed maps into a suitability map, we want their product.\
    \ There are a couple ways of conducting map algebra. The first of these is through\
    \ the tools within the spatial analyst toolbox. The best means of carrying out\
    \ this combination step is multiplication. Looking through the different tools\
    \ available within the spatial analyst toolbox should make clear one that would\
    \ allow you to multiply two rasters together. For example, if instead of multiplying,\
    \ we were adding rasters, I could have `suitability = Plus(slopeReclass, aspectReclass)`.\n\
    \nAlternatively, observe that the `.sa` module is the only module which contains\
    \ its own operators. This means that you can apply operators to add, subtract,\
    \ multiply, or divide rasters in the same manner that you would add, subtract,\
    \ multiply, or divide numbers together. The addition version of this approach\
    \ would give `suitability = slopeReclass + aspectReclass`.\n\nChoose one of those\
    \ approaches for finding the product of the two reclassed rasters and write your\
    \ code below.\n\n**Question 11: Provide the map algebra code for the product of\
    \ the two reclassed rasters.**\n\nRecall from above that saving map algebra outputs\
    \ is not automatic. Use the `.save()` method of raster objects to save the suitability\
    \ raster to file. If you provide a name as the input parameter, it will save the\
    \ raster as having that name, and located in the environment workspace you specified\
    \ at the start of task 1.\n\n```\n>>> suitability.save(\"suitability\")\n```\n\
    \n## Task 5: Debugging Exercise\n\nThis debugging task repeats the scenario above,\
    \ but with different criteria, looking for areas which are flatter (slope < 5%\
    \ is ideal, and < 10% is acceptable) and east-facing (between 45 and 135 degrees\
    \ acceptable, and between 70 and 110 ideal). It is to calculate suitability by\
    \ adding the two reclassified inputs, and save it to a new file called “flat_east.”\
    \ There are four bugs.\n\n```\nfrom arcpy.sa import everything\nslope_task5 =\
    \ SurfaceParameters(\"morg3m\", SLOPE)\naspect_task5 = SurfaceParameters(\"morg3m\"\
    , \"ASPECT\")\nslope_remap_task5 = RemapRange([[0, 5, 2], [5, 10, 1], [10, 90,\
    \ 0]])\naspect_remap_task5 = RemapRange([[-1, 45, 0, 45, 70, 1, 70, 110, 2, 110,\
    \ 135, 1, 135, 360, 0]])\nslopeReclass = Reclassify(slope_task5, \"Value\", slope_remap_task5)\n\
    aspectReclass = Reclassify(aspect_task5, \"Value\", aspect_remap_task5)\nsuitability_task5\
    \ = slope_remap_task5 + aspect_remap_task5\nsuitability.save(\"flat_east\")\n\
    ```\n\n## Task 6: Unguided Work\n\nUsing the same DEM and the Brooks Hall shapefile,\
    \ write a script to run *in IDLE, not the Python Window*, which will complete\
    \ the following tasks:\n\n- 1. Ask the user to input the workspace folder where\
    \ the data is stored.\n- 2. Ensure the spatial analyst extension is checked out.\n\
    - 3. Create a viewshed of areas visible from Brooks Hall.\n- 4. Find areas above\
    \ 350 meters above sea level.\n- 5. Create a new raster of high-elevation areas\
    \ which are visible from Brooks Hall.\n- 6. Save that raster as “Lab9Sec5” within\
    \ the workspace provided in task 1.\n\n# Tables and Cursors\n\n## 10\n\n### Introductory\
    \ Comments: How a Computer Represents Tables\n\nIn Chap. 8, we were introduced\
    \ to accessing data within ArcPy, and Chap. 9 discussed rasters. This chapter\
    \ moves toward vector data, but focuses on a superclass of all vector data: tables.\
    \ Tables are represented within the computer as, in a sense, the grids that the\
    \ raster data structures worked so hard to avoid. The tables are organized in\
    \ rows and columns, and each cell corresponding to a row/column combination has\
    \ exactly one value. The number of entries in the typical table is much fewer\
    \ than the number of cells in a raster, and neighboring values are much less likely\
    \ to be the same, so there is no attempt to compress the file size.\n\nTo access\
    \ and manipulate the data in the tables, we use a set of tools called cursors.\
    \ These cycle through the rows in the table, one at a time, much like the `csv.reader`\
    \ class allowed us to look at the contents of a csv file. Therefore, they work\
    \ on tables and any subclasses of tables, namely, vector data, as those are the\
    \ data types with attribute tables. With the name cursor, you can think of them\
    \ the same way you think of the cursor in a word processor: something that marks\
    \ the place where you are. However, instead of marking where in a text document\
    \ you are typing, these cursors mark the row in a table that ArcGIS is working\
    \ with. It always follows a few rules, so it isn’t as flexible as a cursor in\
    \ a text document. It must start at the top of the table, just before the first\
    \ row, so that the first call of the `next()` method, explained below, moves it\
    \ to the first row. It examines each row one at a time, and each time it finishes\
    \ with a row, it must move to the next row—no skipping around. Lastly, once it\
    \ reaches the end of the table, after it has finished examining the last row,\
    \ the cursor just sits there rather than returning to the top of the table. This\
    \ last part might seem odd, but becomes useful when we use `for` loops to work\
    \ with cursors. If it returned to the beginning to keep going, a `for` loop could\
    \ become an infinite loop and never stop! Figure 10.1 illustrates these rules,\
    \ with the blue arrows representing the position of the cursor.\n\nInstead of\
    \ just one type of cursor, ArcPy has provided three different cursors for us to\
    \ use, all of which are in the `arcpy.da` module (for data access).¹ The first,\
    \ and simplest, is a search cursor. It is used to access and subset the data,\
    \ but does not have writing privileges to the dataset. If you want to edit the\
    \ dataset, you will instead need an update cursor. It allows values in the table\
    \ to be edited, and entire rows to be deleted. However, it does not add new rows.\
    \ This requires an insert cursor, whose job is to add new rows to the table.\n\
    \n## Task 1: Introduction to Search Cursors\n\nThis election feature class has\
    \ data for many statewide elections, for senate, governor, and president, both\
    \ primary and general elections. We will use all three kinds of cursors to answer\
    \ questions and add a couple fields to the feature class, using data from the\
    \ table.\n\n> ¹There is also a set of three cursors in the general ArcPy module,\
    \ but these are emphatically not recommended; they are only provided for “backward\
    \ compatibility,” meaning the ArcPy people don’t want to get rid of them just\
    \ yet because old scripts using then will become broken, but any new scripts should\
    \ not use them.\n\n**Supplementary Information:** The online version contains\
    \ supplementary material available at [https://doi.org/10.1007/978-3-031-08498-0_10]."
  mdcn: "**问题 8：** 使用 `GetCellValue` 函数，`Slope` 工具生成的坡度值与 `SurfaceParameters` 工具生成的坡度值是否接近（在\
    \ 0.01 度以内）？\n\n## 任务 2：重分类\n\n回到红雪松场景，一旦我们使用任一工具创建了坡度，就需要对坡度进行重分类，以隔离出理想的红雪松生长条件。我们希望将坡度重分为三类：\n\
    \n- 0 到 30 → 0\n- 30 到 45 → 1\n- 45 到 90 → 2\n\n这需要构建一个重映射表，我们可以通过以下代码行来创建。请注意方括号\
    \ `[]` 和圆括号 `()` 的位置、类型和数量。\n\n```\nremap = RemapRange([[0, 30, 0], [30, 45, 1],\
    \ [45, 90, 2]])\n```\n\n重映射表是一个列表的列表，其中三个列表中的每一个又依次包含三个条目。这种嵌套列表的设置是计算机科学中一种非常常见的数据结构，因为它是表示表格数据的一种便捷方式。我们可以将这个重映射表列表的格式更改为以下形式，这更接近表格的外观，并且你会注意到它与上面的重分类类别相匹配。\n\
    \n```\n[[ 0, 30, 0],\n [30, 45, 1],\n [45, 90, 2]]\n```\n\n每个内部列表中的第一个项目是重分类范围的起始值。第二个项目是重分类范围的结束值。第三个项目是该类别被赋予的新值。如果我们有超过三个类别，我们将有一个包含四个、五个或任意多个列表的列表，但每个较小的内部列表都必须包含三个值，按照范围最低值、范围最高值和类别新值的顺序排列。\n\
    \n一旦重映射表设置完毕，我们就可以使用以下代码行执行重分类本身。\n\n```\nslopeReclass = Reclassify(slope, \"\
    Value\", remap)\n```\n\n**问题 9：** 打开重分类后栅格的属性表，找出每个类别中有多少个单元格。使用此信息填写下表。\n\n|\
    \ 类别（属性表中的 \"VALUE\"） | 单元格数量（即 \"COUNT\"） |\n| :--- | :--- |\n| 0 | |\n| 1 |\
    \ |\n| 2 | |\n\n## 任务 3：坡向考虑\n\n使用与 `Slope` 工具或 `SurfaceParameters` 工具类似的脚本，创建此\
    \ DEM 的坡向，并按以下范围进行重分类，因为红雪松偏好朝南和西南的坡向。\n\n- -1 到 135 → 0\n- 135 到 180 → 1\n- 180\
    \ 到 270 → 2\n- 270 到 360 → 0\n\n**问题 10：你用于创建坡向栅格和重分类坡向栅格的代码是什么？**\n\n## 任务 4：地图代数\n\
    \n接下来，为了将两个重分类后的地图合并为一个适宜性地图，我们需要它们的乘积。有几种方法可以进行地图代数。第一种是通过空间分析工具箱中的工具。执行此组合步骤的最佳方法是乘法。浏览空间分析工具箱中可用的不同工具，应该能清楚地找到一个允许你将两个栅格相乘的工具。例如，如果我们不是相乘而是相加栅格，我可以使用\
    \ `suitability = Plus(slopeReclass, aspectReclass)`。\n\n或者，观察到 `.sa` 模块是唯一包含自己的运算符的模块。这意味着你可以像对数字进行加、减、乘、除运算一样，对栅格应用运算符进行加、减、乘、除。这种方法的加法版本将是\
    \ `suitability = slopeReclass + aspectReclass`。\n\n选择其中一种方法来计算两个重分类栅格的乘积，并在下面写出你的代码。\n\
    \n**问题 11：提供计算两个重分类栅格乘积的地图代数代码。**\n\n回顾上文，保存地图代数输出不是自动的。使用栅格对象的 `.save()` 方法将适宜性栅格保存到文件。如果你提供一个名称作为输入参数，它将把栅格保存为该名称，并位于你在任务\
    \ 1 开始时指定的环境工作空间中。\n\n```\n>>> suitability.save(\"suitability\")\n```\n\n## 任务\
    \ 5：调试练习\n\n此调试任务重复了上述场景，但使用了不同的标准，寻找更平坦的区域（坡度 < 5% 是理想的，< 10% 是可接受的）和朝东的坡向（45\
    \ 到 135 度之间是可接受的，70 到 110 度之间是理想的）。目的是通过将两个重分类后的输入相加来计算适宜性，并将其保存到名为 \"flat_east\"\
    \ 的新文件中。共有四个错误。\n\n```\nfrom arcpy.sa import everything\nslope_task5 = SurfaceParameters(\"\
    morg3m\", SLOPE)\naspect_task5 = SurfaceParameters(\"morg3m\", \"ASPECT\")\nslope_remap_task5\
    \ = RemapRange([[0, 5, 2], [5, 10, 1], [10, 90, 0]])\naspect_remap_task5 = RemapRange([[-1,\
    \ 45, 0, 45, 70, 1, 70, 110, 2, 110, 135, 1, 135, 360, 0]])\nslopeReclass = Reclassify(slope_task5,\
    \ \"Value\", slope_remap_task5)\naspectReclass = Reclassify(aspect_task5, \"Value\"\
    , aspect_remap_task5)\nsuitability_task5 = slope_remap_task5 + aspect_remap_task5\n\
    suitability.save(\"flat_east\")\n```\n\n## 任务 6：自主练习\n\n使用相同的 DEM 和 Brooks Hall\
    \ shapefile，编写一个脚本在 *IDLE 中运行，而不是 Python 窗口*，以完成以下任务：\n\n- 1. 要求用户输入存储数据的工作空间文件夹。\n\
    - 2. 确保已签出空间分析扩展模块。\n- 3. 创建从 Brooks Hall 可见区域的视域。\n- 4. 找出海拔高于 350 米的区域。\n- 5.\
