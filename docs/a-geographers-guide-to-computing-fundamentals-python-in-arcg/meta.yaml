  mdcn: "文本字符串显示为绿色；数字显示为蓝色，其中实数为浅蓝色，整数为深蓝色。布尔值`paid`为`True`或`False`，显示为橙色。`instructor`尚未确定，因此是一个空框，代表`None`类型。最后，我们有一系列`participants`，这是一组名称或文本字符串，全部连接在一个方框序列中。\n\
    \n要创建`paid`和`instructor`变量，请输入以下行。请注意，`True`和`None`是区分大小写的关键字，另一个布尔值`False`也是如此。\n\
    \n```\npaid = True\ninstructor = None\n```\n\n在继续之前，这里有一个关于变量名的说明。它们可以包含字母、数字和下划线，但不能以数字开头。此外，它们不能是`关键字`。关键字是在Python中保留用于特定目的的单词。你现在屏幕上有两个关键字，它们的字体颜色稍深——`True`和`None`。因为它们被保留用于变量中的特定值，所以你不能有名为`True`或`None`的变量。我们将在本书中看到关键字，完整列表可在[https://docs.python.org/3/reference/lexical_analysis.html#keywords](https://docs.python.org/3/reference/lexical_analysis.html#keywords)找到。\n\
    \n关于赋值变量值，还有一点需要说明。到目前为止，我们一直在使用另一种形式的标记——`字面量`，即计算机将按原样解释的值。从这个意义上说，字面量是计算机语言的另一种名词形式。例如数字（100、0.5等）和文本字符串（\"\
    ArcGIS Training\"、\"98 Beechurst Ave.\"等）。\n\n你有时可能想做类似以下的事情，其中变量出现在等号的两侧：\n\n\
    ```\nx = y\n```\n\n计算机可以用两种不同的方式处理这个问题，一些编程语言选择第一种方法，而另一些则选择第二种。第一种方法是让两个名称`x`和`y`引用同一个框。这不是Python通常的做法。大多数情况下，Python仍然将它们视为单独的框，但会复制`y`的`内容`并将该值放入`x`中。因此，如果你这样做，然后更改`x`的值，`y`仍然会保留原始值，而不会随`x`一起更改。但是，在第12章任务3和第20章任务5中有例外情况。\n\
    \n## 序列\n\n我们现在为图2.4中的所有方框创建了变量，除了参与者列表，这是一种序列。Python有几种类型的序列，我们将在这里讨论的三种是列表、元组和字典。列表和元组都是有序的，这意味着它们包含的项目有一个索引，因此可以称为列表中的第一、第二、第三等项目。唯一的区别是元组在创建后不能编辑，而列表可以更改。这种差异限制了元组与列表可用的方法，因为那些会改变内容的方法（如排序列表）对元组不可用。创建列表和元组的语法如下：\n\
