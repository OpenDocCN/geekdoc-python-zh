    You will see here that the replace function created a new string, but did not
    directly alter the old one, keeping the variable `name` as it was. The line we
    use for this shows a common practice in scripting and programming that might look
    unusual to the more mathematically minded. The variable used to calculate the
    expression on the right side of the equals sign is the same variable that is receiving
    the value of that expression on the left of the equals sign: `name = name.replace("ArcGIS",
    "ESRI")`. This works because, while you would read the line left to right, the
    assignment operator evaluates the right side first, and then takes whatever value
    that returns and places it in the box for the variable on the left. It will do
    this even if it means overwriting the value that was used in the expression.


    +   - To save the change, type `name = name.replace("ArcGIS", "ESRI")` and press
    Enter.

    - To confirm the save, type `name` and press Enter.


    ```

    >>> name = name.replace("ArcGIS", "ESRI")

