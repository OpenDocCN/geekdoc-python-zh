- md: "## Task 3: Using a Tool Through ArcPy\n\nOnce we have a reference to our feature\
    \ class, we would often want to apply one or more of the tools within ArcGIS to\
    \ work with or analyze that feature class. The geoprocessing task we will do here\
    \ is selection.\n\nThe data has records from the 2004 presidential election, so\
    \ we will select those counties which voted for George W. Bush and put them into\
    \ a new feature class called “Republican.”\n\nIn the desktop GUI, there are several\
    \ ways to accomplish this, but one of them is to go to the Analysis ribbon, and\
    \ click the Tools button, to bring up the Geoprocessing pane. Do this. In the\
    \ Geoprocessing pane that appeared at the right, use the search bar, currently\
    \ labeled with “Find Tools,” and search for “Select.” You should then see as the\
    \ top option a tool “Select (Analysis Tools).” Click it. In the tool dialog that\
    \ then appears, there is a small circle with a question mark in the top right.\
    \ This brings up the help file, so click it.\n\nScroll down in the help file and\
    \ you will find a section labeled “Parameters” with two options: “Dialog” and\
    \ “Python.” We want the Python tab, so click that tab. This contains all the information\
    \ we need to run this tool in Python. In this tab, there is a section labeled\
    \ “Code sample,” containing two examples, one using this tool through the Python\
    \ Window and a second using this tool in a stand-alone script, such as we used\
    \ in IDLE in the previous exercise.\n\nReturning to the top of this section, we\
    \ see three parameters: `in_features`, `out_feature_class`, and `where_clause`.\
    \ The `in_features` requires a feature layer, so perhaps the `Ohio_layer` variable\
    \ we already have would work. The output feature class will be a feature class\
    \ in the environment workspace. To be explicit about this, we can create a variable\
    \ for it with the following line:\n\n```\nout_fc = \"Republican\"\n```\n\nThe\
    \ last part is a SQL query. We will see SQL in greater detail when dealing with\
    \ attribute data in Chap. 10. A relevant issue here is that attributes of the\
    \ dataset are always included in double quotes. This means that to identify counties\
    \ where the attribute Bush is greater than the attribute Kerry, we need to make\
    \ sure “Bush” and “Kerry” are in double quotes. This then requires us to use single\
    \ quotes to denote the start and end of the string for this query.\n\n```\nquery\
    \ = '\"Bush\" > \"Kerry\"'\n```\n\nWe now have variables set up to run the Select\
    \ tool. Enter the following line. Following the syntax at the top of the Python\
    \ tab in the documentation, we have the following line:\n\n```\narcpy.analysis.Select(Ohio_layer,\
    \ out_fc, query)\n```\n\nHowever, note that in the code samples, a different setup\
    \ is employed, which would give the following:\n\n```\narcpy.Select_analysis(\"\
    Ohio_layer\", out_fc, query)\n```\n\nI recommend the former setting, as it is\
    \ newer and more likely to be continually supported on a longer-term basis, while\
    \ the latter approach may be deprecated, or removed from usage and support, so\
    \ keeping the newer construct would be helpful. The change is part of a restructuring\
    \ of submodules within ArcPy where at least some of the different toolboxes within\
    \ ArcToolbox have their own module within ArcPy. The Analysis Tools toolbox contains\
    \ almost all of the objects that will be associated with the tools in this toolbox.\
    \ For example, each of the tools within the Extract toolbox has its own ArcPy\
    \ command: `arcpy.analysis.Clip`, `arcpy.analysis.Select`, `arcpy.analysis.Split`,\
    \ `arcpy.analysis.SplitByAttributes`, and `arcpy.analysis.TableSelect`.\n\nWhether\
    \ you use the old style with the toolbox indicated by `_analysis` at the end,\
    \ or the new style with the toolbox-specific submodules, you should then get a\
    \ `Result` object as a return value, and the Table of Contents at left should\
    \ now have a Republican entry. Mine appeared in the exact same shade of pink as\
    \ the input layer, so I suggest changing the color to make it distinguishable.\n\
    \n```\n>>> arcpy.analysis.Select(Ohio_layer, out_fc, query)\n<Result 'C:\\Users\\\
    jfconley\\Documents\\ArcGIS\\Projects\\Chapter7\\Chapter7.gdb\\Republican'>\n\
    ```\n\n![](img/37990581b275bdf7d510c6f2d9702a31_92_0.png)\n\n(Note: it is not\
    \ required to use variables for the parameters. We could just as easily take the\
    \ values of the three variables and substitute them in the `arcpy.analysis.Select(...)`\
    \ line. However, I recommend using variables in such situations because if, say,\
    \ you had a typo in the output feature class name, and needed to re-run the tool,\
    \ you would not need to retype the query, and potentially introduce a new error\
    \ if that gets a typo. You'd just need to reuse the existing `query` variable\
    \ after editing the line that creates that variable. This is especially pronounced\
    \ if you are reusing that query and would have to track down every single instance\
    \ instead of just fixing it once.)\n\n## Task 4: Debugging Exercise\n\nThis debugging\
    \ exercise provides three statements involving ArcPy code, and each statement\
    \ has one error in it. Find and fix the error.\n\n```\nfields = arcpy.ListFields('Republican')\n\
    for field in fields:\n    print (field.name, \" is a \", fields.type)\n\nclipped_Fc\
    \ = arcpy.analysis.Clip('Republican', 'Ohio_simple', 'new_output')\n```\n\nRecall\
    \ that just because it runs does not guarantee it runs accurately. There can always\
    \ be logical errors."
  mdcn: "## 任务 3：通过 ArcPy 使用工具\n\n一旦我们获得了要素类的引用，通常会希望应用 ArcGIS 中的一个或多个工具来处理或分析该要素类。我们将在此执行的地理处理任务是选择。\n\
    \n数据包含 2004 年总统选举的记录，因此我们将选择那些投票给乔治·W·布什的县，并将它们放入一个名为“Republican”的新要素类中。\n\n在桌面图形用户界面中，有多种方法可以完成此操作，其中一种是转到“分析”功能区，然后单击“工具”按钮以打开地理处理窗格。请执行此操作。在右侧出现的地理处理窗格中，使用当前标记为“查找工具”的搜索栏，搜索“Select”。然后，你应该会看到顶部选项是一个名为“Select\
    \ (Analysis Tools)”的工具。单击它。在随后出现的工具对话框中，右上角有一个带问号的小圆圈。这会打开帮助文件，因此请单击它。\n\n向下滚动帮助文件，你会找到一个标记为“参数”的部分，其中有两个选项：“对话框”和“Python”。我们需要\
    \ Python 选项卡，因此请单击该选项卡。这包含了我们在 Python 中运行此工具所需的所有信息。在此选项卡中，有一个标记为“代码示例”的部分，其中包含两个示例：一个通过\
    \ Python 窗口使用此工具，另一个在独立脚本中使用此工具，例如我们在上一个练习中在 IDLE 中使用的脚本。\n\n返回到此部分的顶部，我们看到三个参数：`in_features`、`out_feature_class`\
    \ 和 `where_clause`。`in_features` 需要一个要素图层，因此我们已有的 `Ohio_layer` 变量可能适用。输出要素类将是环境工作空间中的一个要素类。为了明确这一点，我们可以用以下行创建一个变量：\n\
    \n```\nout_fc = \"Republican\"\n```\n\n最后一部分是 SQL 查询。我们将在第 10 章处理属性数据时更详细地了解 SQL。这里相关的问题是，数据集的属性始终包含在双引号中。这意味着要识别属性\
    \ Bush 大于属性 Kerry 的县，我们需要确保“Bush”和“Kerry”用双引号括起来。这要求我们使用单引号来表示此查询字符串的开始和结束。\n\n\
    ```\nquery = '\"Bush\" > \"Kerry\"'\n```\n\n我们现在已设置好运行 Select 工具的变量。输入以下行。根据文档中\
    \ Python 选项卡顶部的语法，我们有以下行：\n\n```\narcpy.analysis.Select(Ohio_layer, out_fc, query)\n\
    ```\n\n但是，请注意，在代码示例中，采用了不同的设置，这将得到以下结果：\n\n```\narcpy.Select_analysis(\"Ohio_layer\"\
    , out_fc, query)\n```\n\n我推荐使用前一种设置，因为它更新，并且更有可能在更长的时间内得到持续支持，而后一种方法可能已被弃用，或从使用和支持中移除，因此保留新的构造将有所帮助。此更改是\
    \ ArcPy 中子模块重组的一部分，其中 ArcToolbox 中至少一些不同的工具箱在 ArcPy 中拥有自己的模块。分析工具工具箱包含几乎所有将与此工具箱中的工具关联的对象。例如，提取工具箱中的每个工具都有自己的\
    \ ArcPy 命令：`arcpy.analysis.Clip`、`arcpy.analysis.Select`、`arcpy.analysis.Split`、`arcpy.analysis.SplitByAttributes`\
    \ 和 `arcpy.analysis.TableSelect`。\n\n无论你使用旧样式（工具箱由末尾的 `_analysis` 指示）还是新样式（使用特定于工具箱的子模块），你都应该获得一个\
    \ `Result` 对象作为返回值，并且左侧的内容列表现在应该有一个 Republican 条目。我的条目与输入图层呈现完全相同的粉红色阴影，因此我建议更改颜色以使其可区分。\n\
    \n```\n>>> arcpy.analysis.Select(Ohio_layer, out_fc, query)\n<Result 'C:\\Users\\\
    jfconley\\Documents\\ArcGIS\\Projects\\Chapter7\\Chapter7.gdb\\Republican'>\n\
    ```\n\n![](img/37990581b275bdf7d510c6f2d9702a31_92_0.png)\n\n（注意：不需要为参数使用变量。我们同样可以获取三个变量的值，并将它们直接代入\
    \ `arcpy.analysis.Select(...)` 行中。但是，我建议在这种情况下使用变量，因为例如，如果你在输出要素类名称中有一个拼写错误，并且需要重新运行该工具，你将不需要重新输入查询，并且如果查询出现拼写错误，可能会引入新的错误。你只需在编辑创建该变量的行后，重用现有的\
    \ `query` 变量即可。如果你重用该查询，并且必须追踪每一个实例，而不是只修复一次，这一点尤其明显。）\n\n## 任务 4：调试练习\n\n此调试练习提供了三个涉及\
