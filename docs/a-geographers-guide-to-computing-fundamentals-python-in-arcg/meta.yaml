    \n```\n>>> arcpy.env.workspace\n'C:\\Users\\jfconley\\Documents\\ArcGIS\\Projects\\\
    Chapter7\\Chapter7.gdb'\n```\n\n正如我们之前看到的 `ArcGISProject` 文档所指定的，这是最常用于进入 ArcPy\
    \ 的类。因此，让我们创建一个包含此类对象的变量，引用当前项目。方便的是，Python 窗口为我们提供了一种获取该对象的方法。\n输入 `aprx = arcpy.mp.ArcGISProject(\"\
