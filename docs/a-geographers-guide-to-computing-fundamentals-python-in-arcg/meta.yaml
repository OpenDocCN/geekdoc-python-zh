  md: 'This would then be equivalent to the following Python line:


    ```

    def tool_exec (in_params, out_params):

    ```


    You might observe, though, that there is no line in this file that actually executes
    the function. That hints at one of the more computationally complex aspects of
    this bridge. All examples consist solely of a function named `tool_exec`, indicating
    that when the tool is run, the bridge is looking for a function by the name of
    `tool_exec`, and automatically runs that function.


    The next line after the function definition, `arc.progress_label("Loading packages...")`,
    looks like it could be accessing the method of an object. This is similar to what
    is going on, by setting the label that is attached to the progress bar in ArcGIS
    Pro. The difference is that dots are permitted in variable names and function
    names within R, so this is simply a function called `arc.progress_label`, not
    a method of some variable called `arc`. Looking at the PDF documentation for the
    `arcgisbinding` project will show that almost all of the functions provided by
    the package begin with `arc`, including the dot. This illustrates that when comparing
    one programming language against another, the delimiters and keywords are often
    what can change the most.


    After the two functions for updating the progress bar are run, we see another
    mostly familiar type of structure: the conditional statement. The same keyword
    of `if` is used, and in both cases, a Boolean expression follows that keyword.
    While they were not needed here, the curly braces could have been used again in
    place of the colon, like they are used for the function definition statement.
    The lines inside the conditional statement perhaps provide a better clue to what
    it is doing than the condition itself, at least for those who are unfamiliar with
    R. The function name `install.packages` suggests a purpose similar to importing
    a module, and that is, indeed, what this is doing. The conditional statement is
    making sure a module is imported only if it is needed—i.e., it hasn''t already
    been loaded. A fairly quick search about the require function reveals that it
    is what R uses to import a package within a function, as we are in this case.
    It also shows that for R packages, importing a package is a two-step process,
    where it first must be installed, then it must be accessed through the `require`
    function or the `library` function if you are not in another function.


    The next three lines all seem to be accessing values from the input parameters,
    and the use of variable names corresponding to the input parameters from the tool
    makes this very likely. It shows the use of R''s assignment operator. Where Python
    uses a single equals sign (=) to make an assignment, R uses a two-character left-facing
    arrow (<-).


    The two lines after accessing the input parameters are, again, updating the progress
    bar''s label and position. The subsequent five lines are, at first glance, fairly
    straightforward assignment operators. If you take a look at the `arcgisbinding`
    documentation, you might begin to decipher the different functions that are used
    here. The first one, `arc.open`, as the name indicates, opens up the input data
    layer. Then the two sets of variables are appended to get a single list of fields
    that needs to be retrieved from the dataset. This retrieval is in the `arc.select`
    function. The last of these lines, `arc.data2sp`, converts the data into a spatial
    data frame, which is a data structure specific to R. This reinforces the issues
    of working with `numpy`, in that transferring from one package to another, or
    in this case, one language to another, frequently requires the conversion of data
    from a structure suitable for the first package to one suitable for the second
    package.


    As you look through the remainder of the script, observe that most of the lines
    are variations on the ones already explained here, whether that is setting the
    label or position of the progress bar, assigning values to variables, or using
    a conditional statement to control the execution of the code. You will probably
    even notice the `print` function looking very similar.


    This task should help provide confidence that, upon learning the basic fundamentals
    of computing, such as variables, assignments, control statements, and functions,
    it becomes easier to switch among different programming languages. Therefore,
    through the skills contained in this book, you should have not only a guide to
    computing with Python in ArcGIS Pro but really a guide to GIS computing in general
    for when—not if, but when—ESRI decides to change from Python to another language,
    or you decide to move to a different GIS platform, like QGIS.


