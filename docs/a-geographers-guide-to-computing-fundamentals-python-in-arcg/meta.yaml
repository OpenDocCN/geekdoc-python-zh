  md: "You might expect that an `import` statement to be able to access any non-`arcpy`\
    \ python module within our code. In this case, however, `numpy` is, like `arcpy`,\
    \ automatically imported when working within the Python Window. This means there\
    \ is no need for a dedicated `import` statement. Instead, we can just access the\
    \ `numpy` functions directly, as long as we preface them with the `numpy`. package\
    \ identifier.\n\nTyping in `numpy`. to the Python Window and waiting will bring\
    \ up all of the available functions within `numpy`. If you hover over the function\
    \ in this list, you will get more information about that function. In this case,\
    \ we will use the function for getting the correlation coefficient of two sets\
    \ of numbers. This is `numpy.corrcoef()`. Type in `numpy.cor` to be able to access\
    \ the information about the function we want to use. Hover over that, and look\
    \ for the answer to the following question. Since the information from hovering\
    \ does not persist very long, you might need to delete the `r` at the end of `numpy.cor`,\
    \ retype that letter, and hover the mouse over the function again to get the answer.\n\
    \n# Question 2: What Does the corrcoef() Function Return?\n\nIn addition to what\
    \ it returns, we need to focus on what it uses as its input. While the return\
    \ value might make it seem like we should be able to give it the array variable\
    \ as input and get the correlation matrix as the output, this will not work. It,\
    \ instead, works well with two columns from the table at a time. However, we can\
    \ use loops to generate a larger correlation matrix.\n\nBefore we get to this,\
    \ let's take a look at a single output. First, note that we access a variable\
    \ within the array much like we would with getting values from a dictionary. Provide\
    \ the name of the variable as the index parameter to the array, and it will give\
    \ us the set of values for that attribute:\n\n```\nprint(numpy.corrcoef(array[fields[0]],\
    \ array[fields[1]]))\n```\n\nThis provides us with a 2 x 2 correlation matrix\
    \ for the first two variables within the fields list. This matrix is as follows:\n\
    \n```\n[[1. 0.56562693]\n [0.56562693 1. ]]\n```\n\nIt has two values repeated\
    \ twice. The top left is the correlation between field #0 and field #0. This,\
    \ of course, is 1, as the values are identical. Likewise, the lower right is the\
    \ correlation between field #1 and field #1. These are not really useful for us,\
    \ although they are part of the correlation matrix. The other two values are the\
    \ correlations between field #0 and field #1 in the top right and between field\
    \ #1 and field #0 in the lower left. Since correlations are symmetrical, these\
    \ two values are the same.\n\nTo generate a full correlation matrix for all 13\
    \ variables, we need to loop through each pair of values. To help us plan, let's\
    \ start with an outline and recognize that we want our correlation matrix to be\
    \ a list of lists. I have set this up as a series of comments:\n\n```\n# First\
    \ initialize the correlation matrix as an empty list, and an index variable to\
    \ 0.\n# Loop through all of the fields.\n# Start a new empty list to be the next\
    \ row in the correlation matrix.\n# Loop through all of the fields again.\n# Get\
    \ the correlation coefficient for the current pair of fields and add it to the\
    \ end of the row.\n# Add one to the index at the end of the row so we can start\
    \ the next row of the correlation matrix.\n```\n\nFilling in this set of comments,\
    \ we start with the initialization step.\n# First initialize the correlation matrix\
    \ as an empty list, and an index variable to 0:\n\n```\ncorr_matrix = []\nindex\
    \ = 0\n```\n\nLooping through all of the fields suggests the use of a `for` loop,\
    \ going through each field.\n# Loop through all of the fields:\n\n```\nfor i in\
    \ fields:\n```"
  merge: -1
