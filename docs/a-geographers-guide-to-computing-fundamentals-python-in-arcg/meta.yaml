    本书献给我的家人，特别是我的妻子 Lee Ann Nolan。没有她的指导，这本书就不会开始。没有她的耐心和支持，这本书就不会完成。我感谢她所有的帮助，这里的献词不足以表达谢意，但这是一个美好的开始。


    ## 前言


    与许多教科书一样，本书是我多年来设计并迭代教授 GIS 编程课程的课堂活动成果。它源于我开发的编程实验练习，以及认识到将这些练习与其余材料整合在一起，而不是将它们分隔成独立的部分或在线补充材料，能极大地帮助学生理解计算机科学原理如何运作，并帮助他们应用这些原理，尤其是在从一种编程语言转换到另一种编程语言时。


    就像我课堂上的学生一样，我并不假设您，读者，具有任何计算机科学背景或编程经验。但是，我假设您非常熟悉 ArcGIS Pro。如果您不熟悉 ArcGIS Pro，ESRI
    和其他来源提供了许多资源。ESRI 通过 http://www.esri.com/training/ 提供一系列网络培训，这可能是快速掌握 ArcGIS Pro
    的一种方式。


    以下是我设想您可能如何使用本书。我开发它是为了用于我教授的 GIS 编程课程，尽管您可能是从研究人员或专业人士的角度出发，希望在 GIS 工作中使用 Python，而不是从学生的角度出发。


    全书共 21 章，分为 4 个部分。第一部分“熟悉 Python”（第 1-6 章）作为计算机科学原理（尤其是 Python）的总体介绍。这一部分对于那些几乎没有或没有编程经验的人很重要，换句话说，对于那些不了解变量、语句和函数等术语的人很重要。第二部分从通用编程和
    Python 转向在 ArcGIS Pro 中的编程应用。它是通过数据结构（如栅格和矢量）的视角来实现的。第三部分在数据结构的基础上，进一步探讨算法的创建以及在
    ArcGIS Pro 中开发新工具以实现和使用这些算法。最后，第四部分在此基础上扩展，然后转向涉及多个 Python 文件的更复杂程序，以及开发 Python
    包以在 ArcGIS Pro 中使用这些程序。


    在课堂环境中，我在一个快节奏的单学期课程中使用第一至第三部分。如果有更多时间，我建议采用两门课程的序列：第一学期从第一和第二部分开始，第二学期从第三和第四部分开始。在非课堂环境中，我鼓励那些几乎没有或没有编程背景的人从第一部分开始，而那些有编程经验并且只想将现有的
    Python 知识应用到 ArcGIS Pro 中的人可以直接跳到第二部分及以后。


    大多数章节的结构旨在鼓励读者理解 GIS 背景下编程所依据的计算机科学原理以及这些原理的应用。这通过以下结构实现，该结构将实践练习嵌入到章节正文中。它们以开场白开始，通常介绍与所讨论章节相关的一个或多个计算机科学概念。然后是一系列引导性任务，引导学生完成开场白中介绍的概念。这些任务也详细阐述了开场白的内容，在任务中呈现主题的更复杂方面以及软件。引导性任务包含读者需要在
    Python 和 ArcGIS Pro 中完成的说明，以及评估和加强他们对所呈现材料理解的问题。在教学环境中，这些可以为与本书配套的计算机实验室活动提供问题。最后，章节以一个非引导性任务结束。这挑战读者将介绍和引导性任务中的概念和技能应用到新的情境中，以加强和应用它们。大多数章节在调试章节（第
    6 章）之后还包含一个专门的调试任务，以培养和加强调试技能。我鼓励读者在阅读章节时跟随引导性任务，并花时间调试调试练习。这些练习基于我 13 年教授这些材料期间学生向我展示的最常见的错误，因此学会识别和修复这些错误对您作为程序员的成功非常有帮助。最后，花时间完成非引导性任务将有助于加强章节内原理的应用。


    总而言之，本书的整体结构以及上述章节结构，旨在为读者长期从事 GIS 编程（无论是在工业界还是学术研究中）做好准备。特别是，将计算机科学原理和练习整合到同一章节中的意图是，对原理更牢固的理解将帮助读者从一种语言（如
    ArcMap 中的 VBA）过渡到新的平台（如 ArcGIS Pro 中的 Python）。这种理解为读者在动态、快速变化的技术领域工作做好了准备。


    感谢 Esri，既感谢其软件的总体开发，也特别感谢其允许使用屏幕截图。屏幕截图图像是 Esri 的知识产权，经许可在此使用。版权所有 © 2021 Esri
    及其许可方。保留所有权利。


    正如献词所说，即使是接近书籍规模的项目，也不是独自完成的。如果我不感谢那些在本指南编写过程中帮助过我的人，无论是有意还是无意的，那将是我的疏忽。影响最直接的是
    100 多名学生，他们参加了我从 2009 年到本书出版日期期间教授的 GIS 编程课程，特别是 2019 年至 2021 年的学生，他们的课程教材由本书第
    1-17 章的早期草稿组成。他们在修订过程中提供了宝贵的反馈。影响不那么直接的是我在古斯塔夫·阿道弗斯学院和宾夕法尼亚州立大学攻读本科和研究生时的同事，尤其是讲师。他们教授地理和计算机科学的方式无疑渗透到了我的教学方式中，从而影响了本书的内容。特别感谢
    Max Hailperin 和 Mark Gahegan 在这方面的有效教学。最后，最重要的影响来自我的家人。他们提供了一个环境和条件，让我能够完成这本书，无论是通过挺身而出提供帮助（谢谢你，Jason
    Nolan！），还是通过一般性的鼓励（谢谢你，Jocelyn 和 Evan，我的继子女！），或者是我的妻子（她本人是一名图书馆员）通过多种方式指导我完成写作和出版过程。没有她，这本书真的无法完成。


    美国西弗吉尼亚州摩根敦


    贾米森·康利'
