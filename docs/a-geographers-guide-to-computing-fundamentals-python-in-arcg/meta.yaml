    \ cursor.\n\n```\nfor county in search:\n    fips = county[0]\n    ManchinDict[fips]\
    \ = county[1]\n    MorrisseyDict[fips] = county[2]\n    HollenDict[fips] = county[3]\n\
    ```\n\nWith this loop done, and the dictionaries populated, we can then create\
    \ our fields. This is through an `arcpy` function called `management.AddField()`.\n\
    \n```\narcpy.management.AddField('WV_elections2016', \"Manch18SGP\", 'DOUBLE')\n\
