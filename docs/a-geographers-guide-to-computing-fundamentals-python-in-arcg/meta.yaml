    \n随着这个项目变得更加复杂，应该有一种方法来组织结构并表示它，以确保所有部分都得到完成，并且更容易识别代码的相关部分以便后续交流。这种方法就是使用统一建模语言，或\
    \ UML。它在第 12 章中被简要介绍，以展示与映射模块相关的不同类之间的联系，这里将添加更多内容。UML 是一种大型且结构化的方法，用于创建图表以辅助软件开发。由于\
    \ UML 是为比这大得多的项目设计的，完整实施 UML 可能有些过头。即便如此，类图的使用仍然有用，并可以帮助说明我们如何在尝试编写代码之前组织我们的思路。\n\
    \n**补充信息：** 在线版本包含补充材料，可在 [https://doi.org/10.1007/978-3-031-08498-0_20] 获取。\n\
    \n最重要的是，我希望你从本章中获得的是对大型编程项目所涉及的规划的感知。回到基础，我们将一个大项目分解成越来越小的子项目，直到这些子项目成为可管理的代码块，然后，如果计划顺利，它们可以轻松地融入大局，你就有了一个功能齐全的多文件程序。即使你不使用\
    \ UML 或类似的东西，执行一个大型项目几乎肯定需要比你之前章节所做的任何事情多得多的规划。\n\n### 任务 1：构建类 UML 图\n\n基于前一章的写作类比，面对像这样的大型任务，仅仅盯着一个空白文件可能会令人望而生畏，就像盯着一张空白页写一篇较长的文章一样令人望而生畏。在写文章之前，你可能会使用提纲来组织思路，但编程可能不那么严格线性，因此复杂项目的提纲可能没有帮助。相反，类图显示了编程项目中类之间的关系，该项目通常包含许多不同的类。由于类图是为面向对象编程设计的，其中一切都是对象，所有编程都存在于类中，而我们这里没有一个完全面向对象的系统，我们将不得不对类图进行一些调整，以适应程序中使用基于函数的编程风格的部分。\n\
