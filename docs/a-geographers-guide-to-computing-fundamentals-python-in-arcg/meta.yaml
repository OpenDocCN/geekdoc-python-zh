    <built-in method split of str object at 0x0000024C89380330>

    ```


    This probably is not what you were expecting. It seems to be telling us that the
    type of the variable called `name_list` is itself a built-in method called `split`.
    Recall that methods are attached to objects, and we see that it tells us the method
    is attached to a string object at `0x0000024C89380330`, a location in memory that
    is all but certain to be different as you follow along on your computer. If the
    type of a variable seems to be especially unusual, there is likely to be a problem
    with the line in which that variable was created. Looking at how `name_list` was
    created in line 7, we see that it is assigned to the value of `row[0].split`.
    As the error message indicates, one of the string methods is called split, and
    this one is attached to `row[0]`. In the bottommost cell of the Notebook, type
    in `row[0]` and run that cell. We see that it has the value ''John Smith'', which
    is a string object, presumably at that particular memory location. This means
    that the variable `name_list` was assigned to the value of the method split, as
    attached to that object. It is not the result you get from executing that method,
    but the method itself! Recognizing that if we want to execute a method, it works
    like executing a function, answer the following question.


    # Question 2: What is the error?


    Correct the error and re-run that cell within the Python Notebook.

    If you did the appropriate correction, you will notice that the error for this
    message was not on line 8, but instead earlier. It was only in line 8 that Python
    recognized that there was a problem. Because that variable referred to a method
    rather than a list, trying to access the item at index 1 was instead interpreted
