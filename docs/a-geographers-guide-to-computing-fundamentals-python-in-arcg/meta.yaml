    你可能注意到 `print` 语句通过 `county[0]` 访问名称。使用方括号是 `county` 性质的一个线索：它是一个列表。不仅如此，它还遵循基于你提供给它的代码的可预测结构。回顾本章的引言，游标必须逐行遍历表格。每次循环，`county`\
    \ 都指向表中的下一行。起初，你可能期望它是该行所有单元格值的列表。然而，那会包含比我们需要的更多的单元格。相反，`county` 变量中包含的列表中的每个项，其值对应于第二个输入参数中属性列表的相同索引。这意味着在上面的例子中，`county`\
    \ 是一个恰好包含一个项的列表：县的名称。指定了查询后，`for` 循环将只访问满足该游标条件的条目。这意味着由 `search` 变量表示的搜索游标仅选出了那些在这次初选中投票给贾德的县。就好像搜索游标检查第一行是否满足该查询的条件，并且仅当条件满足时才提供该行。如果不满足，它就跳到下一行并检查该行，继续这个过程，直到到达表的末尾或到达另一行满足条件并提供该行。通过这种方式，无需像第7章那样使用\
    \ `Select()` 函数，就选出了投票给贾德的县的子集。\n\n²同时，也是一名联邦监狱的囚犯。\n\n## 任务2：更新游标简介\n\n项目2：在当年的共和党初选中，总票数似乎被错误地计算了，因为所有值都是零。我们将需要一个更新游标来修复这个问题。因为这现在需要编辑数据，所以我们需要一个更新游标，而不是搜索游标。\n\
    \n首先，让我们创建更新游标。在新的 Notebook 单元格中输入以下行。你会注意到它与创建搜索游标的方式相似。实际上，它是相同的语法和相同的输入参数，只是这次没有搜索查询。再次，密切关注变量名：有许多相似的变量名，所有候选人名字都被截断为五个字符以符合命名规范。³\n\
    \n```\nupdate = arcpy.da.UpdateCursor(\"WV_elections2016\", [\"Romne12PPV\", \"\
    Santo12PPV\", \"Paul12PPV\", \"Gingr12PPV\", \"Roeme12PPV\", \"Tot12Rep\"])\n\
    ```\n\n现在，为了进行修正，我们将计算总投票数字段，将其作为各候选人得票总数的总和，并将这些添加到表中。与搜索游标一样，`county` 是一个列表，当游标逐行循环时，它引用每行的值，该列表的元素对应于创建\
    \ `update` 变量的 `UpdateCursor` 构造方法的第二个输入参数中的列表。\n\n```\nfor county in update:\n\
    \    county[5] = county[0] + county[1] + county[2] + county[3] + county[4]\n \
    \   update.updateRow(county)\n```\n\n在尝试编辑文件时，你可能熟悉这样的消息：某个文件被另一个应用程序锁定以进行编辑。像这样的更新游标就是能够并且将会执行此操作的应用程序之一。这意味着我们必须移除该编辑锁，以确保如果我们想使用另一个更新或插入游标时，一切都能正常运行。这是通过删除存储更新游标的变量来实现的，因为删除它也会从内存中删除任何关联的锁。这使用了一个新的关键字：`del`。\n\
    \n```\ndel update\n```\n\n查看属性表。Tot12Rep 列现在应该填满了数字。右键单击列标题并选择统计信息。\n\n**问题3：2012年共和党总统初选中，各县总投票数的平均值和标准差是多少？**\n\
    \n## 任务3：删除和插入行\n\n假设你刚刚收到2018年选举的结果，并希望将其添加到你的选举结果要素类中，以便你可以将参议员曼钦在2018年的结果与2012年的结果进行比较。然而，这并不是一个简单的连接，因为2018年选举结果的结构与我们通用要素类的结构并不完全匹配。打开提供的\
    \ .gdb 中的表格。你应该注意到几件事：首先，第二行是标题的描述。虽然这是有用的信息，但它在要素类中没有对应项，所以我们需要删除它。另外，如果你仔细看，你可能会注意到一个县缺失了：莫农加利亚县！所以我们想要删除第二行的信息，并为莫农加利亚县插入一个新行。\n\
    \n要删除一行，我们再次需要一个更新游标，但这次是针对包含2018年结果的表。首先，注意我们只访问名称属性。其次，有一个查询确保我们只查看信息行，通过询问属性“Name”是否与值“County\
    \ Name”匹配。你可能注意到属性名（NAME）在双引号中，而属性的值（County Name）在单引号中。这就是 SQL 的设置方式。然而，为了实现字符串\
    \ `\"NAME\" = 'County Name'`，我们需要使用转义字符 `\\` 来表示我们想在这个位置包含一个单引号。这是为了让 Python 能够区分文本字符串中的引号字符和结束字符串的引号。\n\
    \n最后，因为删除行是无法撤销的操作，我在代码中写了一个双重检查，再次查看名称是否具有值“County Name”。这样，我们绝对确保不会意外且永久地删除错误的行。最后，我们再次需要删除游标。\n\
    \n```\nupdate = arcpy.da.UpdateCursor('WV_election_2018_only', [\"NAME\"], '\"\
    NAME\" = \\'County Name\\'')\nfor row in update:\n    print(row)\n    if row[0]\
    \ == \"County Name\":\n        update.deleteRow()\ndel update\n```\n\n接下来，我们需要一个插入游标来添加莫农加利亚县的数据。插入游标的设置与其他两个类似，包含图层名称和一组属性。然而，这次我们将告诉计算机为新行在这些属性中放入什么值，而不是从表中提取这些单元格值。当你输入下面的代码时，请特别注意第二行的元组。注意有两对括号。第一对表示\
    \ `insertRow()` 函数的输入参数。输入参数本身是一个元组，也使用一对括号，提供将添加到表中的值。在这种情况下，请小心并在运行 Notebook\
    \ 中的单元格之前（至少）仔细检查你的值两次。这些值必须与创建插入游标时使用的参数列表顺序相同，因为计算机不够智能，无法在你犯错时重新排列它们。事后编辑它们是一个挑战（但可能）。\n\
    \n```\ninsert = arcpy.da.InsertCursor('WV_election_2018_only', [\"NAME\", \"FIPS\"\
    , \"Manch18SGP\", \"Morri18SGP\", \"Holle18SGP\"])\n\ninsert.insertRow((\"Monongalia\"\
    , 54061, 58.19627104, 35.2796717, 6.524057259))\ndel insert\n```\n\n运行这些行后，关闭表格（如果它是打开的）并重新打开它。查看以确认插入游标是否有效。\n\
    \n**问题4：莫农加利亚县大多数属性的值是多少？为什么会发生这种情况？**\n\n## 任务4：游标的更高级用法\n\n如果这已经正确完成，我们现在可以再次使用游标将2018年参议院大选的百分比放入现有的要素类中。我们只想要这些列，而不是2018年属性的整个集合，因为有了最高法院的两次选举和修正案，这个2018年选举文件中有许多我们不需要的结果。这意味着连接可能有些过度，即使数据在那里并且（如果任务3正确完成）已经以一种现在可以进行连接的方式处理了。相反，我们将使用游标只添加所需的三列。\n\
    \n不过，在此之前，考虑需要什么并用流程图规划任务是有帮助的。任务的核心是将从表中提取的值放入要素类中。到现在应该清楚，这将需要一个更新游标。所以让我们开始我们的流程图。\n\
    \n³候选人（5个字符）+ 年份（2个字符）+ 职位（总统、州长或参议员）+ 选举类型（初选或大选）+ 属性类型（总票数或百分比）。"
