    \ 的方法中。该行代码是 `if errorType == 1:`，但没有任何东西叫做 `errorType`。在这种情况下，你只需要认识到，虽然有一个完全有效的属性叫做\
    \ `errorType`，但没有 `self.`，我们实际上并没有访问那个属性。相反，计算机正在寻找一个单独的变量 `errorType`，而这个变量并不存在。因此，我们需要将\
    \ `errorType` 替换为 `self.errorType`。这在这里以及下面几行创建错误类型 #2 的消息时都适用。\n\n如果我们在第15行没有识别出这一点，错误可能出在调用\
