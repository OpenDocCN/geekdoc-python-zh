    # Appendix: Unified Modeling Language (UML)


    As you move from simpler to more complex programming, from keeping track of simple
    variables, to objects, to classes, and ultimately managing projects containing
    multiple files, having a way to represent all the pieces of your code becomes
    important. A common way of managing this more complex code is through Unified
    Modeling Language, or UML. While UML is intended for managing software systems
    that are far more complex than what it presented within this book, a few aspects
    nonetheless can be useful here. There are 13 different types of diagrams in this
    visual language¹ within 3 broad categories. As such, an appendix here can only
    touch the surface of the complexity that UML can work with, so if you are interested
    in more information after reading this, I suggest looking at the UML organization’s
    website at http://www.uml.org and following the references noted therein.


    UML is a visual language which can represent a range of levels of abstraction
    of the processes inherent in constructing and maintaining a software system. The
    first category represents the structure diagrams, which depict how different objects,
    classes, and packages are constructed within the code. The UML diagrams presented
    within this book are from this category, so this is what is presented more fully
    within this appendix. The other two categories represent aspects of software development
    that tend to arise and become more relevant with more complex applications than
    we are building within this book. Briefly, behavior diagrams depict the processes
    that take place within the software system. Diagrams in this category are more
    focused on what the components of the system do, rather than how they are constructed.
    They can also represent the actions the users may want the software to do. The
    third type of diagram, interaction diagrams, depict how the different parts of
    the software system communicate with each other. As this book has focused primarily
    upon the structures within coding for GIS applications, this appendix focuses
    on the structure diagrams that are introduced in the chapters to provide a more
    detailed interpretation of how those diagrams are constructed and interpreted.


    # Class Diagram: A Single Class


    Our entry point into UML is through the representation of a single class. Recall
    from Chap. 7 that classes contain properties, which are like object-specific variables
    and methods, which are like object-specific functions. The diagram for a single
    class concisely depicts these parts of a class.


    Figure 7.1, reproduced here as Fig. A.1, introduced the concept of an object by
    extending the box metaphor for variables, by presenting an object as a crate which
    can hold a series of boxes. Thus, any object of the class `ArcGISProject` is guaranteed
    to have properties of the type `activeMap`, `dateSaved`, `defaultGDB`, etc., as
    well as methods called `save()` and `listLayouts()`, among others. While the colors
    of the boxes can represent the types of properties, such as green for text strings,
    this approach becomes difficult to scale to larger classes. UML class diagrams
    provide a more formal structure to this sort of visualization. Figure A.2 gives
    a UML class diagram version of Fig. A.1.


    The class diagram here has three boxes, matching the three portions of the metaphorical
    crate. Like the label on the top of the crate, the top box contains the name of
    the class. The properties that are in the boxes in the left side of the crate
    correspond to the information in the middle of the three boxes in the class diagram.
    Each property has a single line. The name of the property comes first, followed
    by the type of that property after the colon. The methods, which are on the right
    side of the crate, are presented in the lowermost box in the class diagram. Two
    methods are presented. The name of the method


    ¹It is 13 as of UML version 2.0.'
- md: '## Class Diagram: Connecting Multiple Classes


    comes first, followed by the parameters. As in the code itself, if there are no
    parameters, a pair of parentheses containing nothing is still included. If there
    are parameters, then those are included within the parentheses as a name : type
    pair, as was done with the properties. Using the approach of the ESRI documentation,
    optional parameters are indicated here with curly braces. Lastly, the type of
    return value from the method is given after the final colon in the line. If nothing
    is returned, then the word “void” may be used to make this lack of return value
    explicit. Therefore, every `ArcGISProject` has a method called `save()` that takes
    no parameters and returns no values. Meanwhile, there is also a method called
    `listLayouts()` that has an optional wildcard parameter that is a string, and
    it returns a list to the code. While we know that this list must contain `Layout`
    objects, this is not explicitly guaranteed by Python, as lists can contain multiple
    types of entries, and, therefore, the return type here is simply denoted as a
    list.


    One advantage of class diagrams here is that they are more compact than the crate
    approach. This means that it is feasible to represent larger classes. In fact,
    only a portion of `ArcGISProject` had been presented in the crate in Fig. A.1.
    Figure A.3, below, presents the entire class structure for `ArcGISProject` in
    a single diagram.


    Chapter 12 introduced another layer to the visual representation of class structures.
    When working with many classes at once, it can be very useful to depict how those
    classes relate to each other. An example of this is within the context of navigating
    the web of interconnected classes within the `arcpy.mp` module. For example, if
    you have an ArcGIS project and you want to change the color ramp used by a particular
    layer containing a choropleth map, it is not immediately obvious how to navigate
    from the `ArcGISProject` object to a `ColorRamp` object to edit this part of the
    layout. Using the diagrams from Figures 12.1 and 12.2, reprinted below as Figs.
    A.4 and A.5, and following the arrows in them, we can see the chain of methods
    that would be needed to get from a project to that color ramp. We first get a
    Map through the listMaps() method of the ArcGISProject object. From the map, the
    listLayers() method is used to access a Layer. The Layer has a Symbology accessed
    through the symbology property. Likewise, the renderer property is used to access
    a Renderer object. A choropleth map suggests this Renderer would be of the GraduatedColorsRenderer
    subtype, which has a colorRamp property that can allow accessing, and thereby
    editing, of that color ramp. It should be noted that for clarity, as well as ensuring
    each figure fits on a single page, only a small subset of the properties and methods
    are included for each class.


    The new elements of the diagrams here are the connections, represented by the
    arrows and associated numerical annotations. There are two types of arrows. The
    first has a diamond head. These indicate associations in which one class contains
    a reference to another, and the second class can be considered as part of the
    first. For example, each ArcGIS project contains one or more maps, as well as
    one or more layouts. Meanwhile, those Map and Layout objects do not generally
    exist outside of an ArcGISProject object. Likewise, a map may contain any number
    of tables and layers, yet in the code, those Table and Layer objects are only
    accessed via the Map object.


    The other type of arrow has a standard triangular arrow head and represents superclass
    and subclass relationships, like those described in Chap. 8. Here, there are two
    such examples: a RasterClassifyColorizer and a RasterUniqueValueColorizer as subclasses
    of Colorizer, and the four types of renderer as subclasses of Renderer.² Because
    there are no generic colorizers or generic renderers, and everything must be one
    of the subclasses, these are considered abstract classes, which is indicated by
    italics.


    The other item here are the numerical annotations, which indicate the cardinality
    of the relationships. Each association arrow has two numbers, which indicate how
    many of each class can be associated with the other. For example, an ArcGISProject
    can have any number of Map objects in its list, including 0. Likewise, it can
    have any number of Layout objects, including 0. Therefore, both of these have
    0..n marked. However, each Map can be associated with only one ArcGISProject,
    and the same is true of each Layout object. By contrast, each Layer has exactly
    one Symbology, and each Symbology is associated with a single Layer through the
    symbology property. This puts a 1 at both ends of the arrow. Lastly, each Symbology
    has either a Colorizer if it contains raster data or a Renderer if it contains
    vector data. Since this means a Symbology has zero or one Colorizer, and zero
    or one Renderer, this arrow uses a 0..1 notation.


    > ²Even this is not fully representative of the documentation. There are no Colorizer
    and Renderer classes mentioned in the documentation, even though the code seems
    to behave as if there are abstract classes for Colorizer and Renderer. This absence
    of an explicit abstract class is why the colorizer and renderer properties have
    a generic Object type instead of anything more specific.


    ## Object Diagram


    While not included in the main text of the book, one other UML diagram can be
    useful for tracking down complex bugs: the object diagram. It looks very similar
    to a class diagram. The difference is that the class diagram shows the ways the
    different classes relate to each other in general, while an object diagram provides
    the specific values of the object variables at a point in time while the code
    is running. Therefore, to focus on the variables and their properties, a few changes
    get made. Firstly, the variable name gets included in the header. Secondly, the
    types of properties are replaced with their exact values. Thirdly, the methods
    section is removed, as it is no longer required. Lastly, parts of the diagram
    that are irrelevant, such as subclasses that are not currently in use, are removed.


    As an example, Fig. A.6 represents a project containing a map with a single layer.
    In that layer is map using a simple renderer with dark gray symbols of size 10
    points with black outlines.


    This can help with debugging by providing a more intuitive visualization of how
    the different variables relate to each other than just looking at a list of variables
