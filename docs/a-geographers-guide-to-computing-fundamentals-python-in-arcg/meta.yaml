    with any other tool, we can see that it requires an input point layer from which
    the drive time polygons will be based, an output feature class to store the results;
    what travel mode will be used, such as Driving Time, Walking Time, or Trucking
    Distance; and the distance that is used for the polygon boundaries, such as 60
    minutes or 100 kilometers. In this case, we want to ensure the starting points
    are the cities named Springfield, giving a sensible output name, and set up a
    driving time of 60 minutes. This gives the following line:


    ```

    arcpy.ba.GenerateDriveTimeTradeArea(''springfields'', ''springfields_hour_away'',
    ''Driving Time'', 60, ''MINUTES'')

    ```


    This might take a while, depending upon how many processing requests the ESRI
    servers are dealing with at the moment, but you will have a map with drive-time
    polygons representing an hour from each of the nine Springfields in this dataset.
    Note that your polygons may look somewhat different from one time to another because
    of differing traffic conditions. As such, the answer to Question 3 is not guaranteed
    to be fully consistent from one iteration running this tool to another iteration
