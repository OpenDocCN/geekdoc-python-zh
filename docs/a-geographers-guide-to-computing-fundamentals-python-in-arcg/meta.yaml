    ## 第三部分


    ## 创建算法以增强 ArcGIS Pro


    一旦你在 GIS 中建立了数据结构，我们就可以将其与编程基础知识（特别是控制语句和函数的使用）相结合，开发新的算法，以扩展和增强 ArcGIS Pro 的功能。毕竟，大多数人进行
    ArcGIS Pro 编程时，通常怀揣以下两个目标之一：编写脚本以自动化 ArcGIS Pro 中的一个或多个流程，使其比不断使用工具箱中提供的图形用户界面更便捷；或者编写程序以创建一个新工具，添加
    ArcGIS Pro 中尚不具备的功能。


    无论是哪种目标，理解算法都将极大地帮助开发实现这些目标所需的脚本和程序。虽然全面探讨 GIS 算法的内容会比本书所能容纳的更为广泛，并且这已经是现有书籍的主题，但本节为算法开发奠定了基础，并将其置于为
    ArcGIS Pro 创建新工具和新类的背景下。


    第 14 章介绍了创建新工具，使你能够直接在 ArcGIS Pro 中运行脚本；第 15 章在此基础上增加了更复杂的错误处理，使工具更用户友好。第 16 章进一步扩展，展示如何创建自定义类，以增强你在程序和脚本中使用的数据结构。最后，第
    17 章提供了一个开发算法以解决问题的示例，并要求你在应用情境中开发自己的算法来解决问题。


    我在此指出，在 ArcGIS Pro 中可以创建两种类型的自定义工具。本节重点介绍一种称为脚本工具的类型。它们更简单，因此是介绍如何使用脚本创建新工具的更温和的入门方式。另一种类型在第四部分的第
    20 和 21 章中介绍，称为 Python 工具箱。这种方法更灵活，允许将多个 Python 文件整合到一个工具中。对于那些对更深入的 GIS 软件开发（包括为开源
    QGIS 做出贡献）感兴趣的人来说，这种更高级的方法可能对你们更有用。


    ## 创建自定义工具


    ## 14


    ## 引言：用户界面的概念


    到目前为止，我们已经看到可以在 ArcGIS Pro 的 Python 窗口中逐行输入 Python 语句，或在 Python Notebook 中逐块输入。此外，我们还看到了如何在
    IDLE 中运行独立脚本。但是，如果你想在 ArcGIS Pro 中运行整个脚本呢？这可以通过自定义工具来实现。


    自定义工具可以服务于两个目的。第一个是运行一个提供 ArcGIS Pro 中尚未实现的工具或分析技术的脚本。例如，某些形式的空间回归，如空间滞后回归和空间误差回归，在
    ArcGIS 中并未实现。¹ 那么，自定义工具就可以完成这项任务。然而，你们大多数人可能不会从事那种水平的统计或分析计算，因为这种专业任务主要在学术研究界进行，而大多数地理学本科生毕业后并不会进入该领域。这就是工具的第二个目的所在：通过使
    ArcGIS Pro 更易于访问，从而使其更易于使用。下面的讨论将阐述一些用户界面概念，这些概念有助于理解创建自定义工具的价值，而不仅仅是为 ArcGIS
    添加新功能。


    用户界面（包括 ArcGIS Pro）在两个目标之间存在固有的张力：使界面直观与使界面富有表现力。直观的界面易于使用，而富有表现力的界面则具有广泛的功能。在大多数情况下，直观的界面会因其仅执行少数任务而在表现力上受到限制。然而，富有表现力的界面通常以牺牲易用性为代价来获得其表现力。你可能很容易想到
    ArcGIS 的这一点，认识到它在功能范围上非常强大，但并不用户友好或直观。


    在表现力的最极端端，是命令行界面，这基本上就是脚本。命令的数量极其庞大，在 Python 中，我们可以导入许多包，通过导入更多的函数、类，从而进一步增加表现力。然而，正如你在本书中所学到的，它并不容易使用。


    我们可以将 ArcGIS Pro 归入中间类别。得益于图形用户界面而非命令行，它更易于使用，但仍然有许多工具、菜单和功能区需要导航。虽然你不需要像使用 arcpy
    那样频繁地查阅在线文档，也不需要记忆数百个函数和类，但在 ArcGIS Pro 界面的各个部分中仍然容易迷失方向。


    在最直观的一端，在 GIS 背景下，我们或许可以将工具对话框作为一个例子。如果你只看单个工具，你会清楚地知道参数是什么，应该做什么，以及如何使工具正确运行。然而，无论带有输入对话框的工具多么直观，它只执行一项任务。因此，它在表现力上尽可能受限。跳出
    GIS 背景，“自然语言处理”——即像亚马逊 Alexa 和苹果 iPhone 中的 Siri 这样的语音助手所使用的计算类型——或许是直观性的黄金标准。理论上，你可以要求
    Alexa 将你家的温度设置为特定值，并（假设你有一个可以与 Alexa 配合的恒温器）让它相应地调整。² 同样，你可以向 Alexa 询问琐事问题、数学问题、拼写问题等的答案。这些都涉及计算，而
    Alexa 毕竟在很大程度上是一台计算机。


    因此，我们下面任务集的目标是，使用一个工具为建筑许可流程中常见的问题创建一个直观的功能，并将此工具嵌入到 ArcGIS Pro 项目中。最后，你将把这个项目及所有相关数据打包分享，以便所有工作都能轻松地与
    GIS 知识较少的同事共享。


    ## 任务 1：创建自定义工具


    ## 关于应用


    想象一下，你在负责评估开发申请的当地政府办公室工作。你是一名 GIS 分析师，负责维护存储在 ArcGIS 中的城市地籍。你的许多同事负责向申请人提供有关其房产的一些基本信息，并告知他们的申请是否可能获得有利考虑，但他们没有太多使用
    GIS 的经验。所以你的工作是构建一个自定义工具，使你的同事能够有效地使用 GIS 来回答申请人的问题，而无需他们参加为期两周的 ESRI 培训课程。


    当地政府的一条开发规则是，特定地块上的建筑物面积不得超过土地总面积的 30%。因此，你的工具需要做以下事情：


    - 进行计算，算出土地目前被建筑物占据的比例。

    - 告诉用户该地块目前被建筑物占据了多少。


    启动 ArcGIS Pro 并创建一个新项目。当你这样做时，ArcGIS Pro 会自动为该项目创建一个工具箱。在 ArcCatalog 中，通过目录列表顶部的“工具箱”链接找到该新工具箱。其中应该有一个与新项目同名的工具箱。


    右键单击它，选择“新建”→“脚本”。在弹出的“添加脚本”框中，输入名称 CalculateArea，标签“Calculate Area”³。最后，通过将“脚本文件”选项设置为你保存的
    calculateArea.py 文件（无论你将其保存在何处），将工具与脚本关联起来。单击“确定”保存编辑。


    你可能需要关闭并重新打开目录窗口中的“工具箱”箭头，或以其他方式刷新它。ArcGIS 不一定会更新显示以识别你已添加了工具，直到你关闭并重新打开它。


    我们要做的本质上是构建工具的对话框。代替我们在 IDLE 中使用的 `input` 函数，我们需要在 ArcGIS 中有一个对话框来从用户那里收集这些信息。它最终比
    `input` 函数更严格一些，因为它要求我们指定输入值的数据类型。它还允许输出值。指定数据类型的能力有助于我们立即解决许多潜在的混淆错误，例如，当期望输入栅格时用户却输入了要素集。


    右键单击新创建的 CalculateArea 工具，选择“属性”。在左侧，选择“参数”而非“常规”。现在我们将输入两个参数。单击“标签”下方的第一个单元格，输入
    Block Area。对于“名称”，输入 Block_Area 或 BlockArea（只要没有空格）。我们希望将其限制为实数，确保其类型为 Double。在
    Block_Area 右侧的“数据类型”下，通过单击出现的小省略号 … 并在单击栏右端小三角形时出现的长列表中选择“Double”。


    ![](img/37990581b275bdf7d510c6f2d9702a31_148_0.png)


    ¹ ESRI 似乎在每个新版本的 ArcGIS Pro 中都在添加新的统计技术，因此此陈述可能很快就会过时。另请参阅第 19 章中整合了一个执行此操作的 R
    程序的内容。


    **补充信息：** 在线版本包含补充材料，可在 [https://doi.org/10.1007/978-3-031-08498-0_14] 获取。


    ² 关于“理论上”的评论，请参阅第 1 章中关于计算机没有常识的轶事以获取详细信息。


    ³ 请注意，名称没有空格，因为空格在 ArcGIS 文件名和文件路径的某些部分中并不总是允许的。同时，我们使用了一个更具可读性的标签。'
