  md: 'Now we have a `TypeError` on line 8. Type errors are what happens when a function,
    operator, or method is expecting one data type, but receives a different type.
    In this case, based upon the error message, something is expecting a string or
    the empty value `None`, rather than the integer it receives.

    Here is line 8: `first_name = name_list(1)`.

    This might seem a bit odd. The only integer is the 1. Investigating what `name_list`
    is might provide us with a clue. Type `name_list` into the second cell of the
    Notebook and run it.


    ```

