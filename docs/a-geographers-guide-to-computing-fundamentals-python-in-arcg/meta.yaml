- md: '## Basics of Programming: Functions and Objects


    ## 4


    ### Introductory Comments: Managing More Complex Code


    As we build up more complex pieces of code from simple statements to complex statements,
    we can want blocks of code that are many statements long, but which are, nonetheless,
    not a full program. Using the scripting versus programming dichotomy introduced
    in Chap. 1, this is beginning to stretch us from the simple line-by-line scripting
    to a more methodologically thought-out approach to programming. If we keep to
    the heuristic that working in the Python Notebook or Python Window is scripting
    and writing a standalone Python file for a tool is programming, this is still
    within the scripting side of that line, but it is getting to be a fuzzy line.
    As we construct these more complex pieces of code, the structured reasoning processes
    of pseudocode and flow charts to help us figure out and manage what we want the
    computer to do become more critical to the success of writing the code. These
    blocks of code that do not form a full script are functions, which are akin to
    paragraphs in standard writing. Just as an essay uses paragraphs to manage the
    ideas and help communicate themes to the reader, a lengthy script, much less a
    full program, uses functions to manage the set of tasks the computer carries out.


    Like variables, functions are named. Unlike variables, instead of creating a box
    to hold a value, functions can, perhaps, be considered like a binder of instructions.
    That both are named entities can create confusion, so you’ll have to remember
    what names refer to variables and what names refer to functions. Even worse, it
    is possible—although very much not recommended—to have a name refer to a function,
    and then assign the same name to a variable, which would end up overwriting the
    function. All the instructions in the binder are the contents of that function,
    and the binder is labeled with the name, so that any time that function name gets
    used, the statements which are the contents of that binder are carried out. Where
    the comparison with paragraphs breaks down a bit is that functions allow—but do
    not require—input parameters and output values. Both of these are covered in more
    detail later in the chapter.


    What is really critical for managing your code is that this means that they can
    be reused. While reusing paragraphs in essays is typically frowned upon as redundant
    writing, if not plagiarism, reusing functions is their main purpose when coding.
    Functions are especially powerful with the input parameters and output values
    mentioned above because we can reuse the function, but with different input parameters,
    and allow the same code to evaluate the same processes, but with different inputs
    to generate a different output value.


    Objects add yet another layer of complexity and power to our code. They are complex
    data types. Whereas we have used simple types throughout, like numbers, Boolean
    values, and text strings, we can have far more complex types of data. These more
    complex types of data are objects. While objects have a wide range of flexibility
    in their setup, they consist largely of collections of properties and methods.
    Continuing the analogy of a variable as a container with the value, thinking of
    a simple data type as a box, we can consider an object as a crate containing variables
    internal to the object, which are called properties, and containing functions
    internal to the object, which are called methods. These are, to extend the analogy,
    boxes and binders within that crate, and which can refer to the other contents
    of the crate.


    How this helps us manage our code is perhaps not nearly as straightforward as
    functions, as they do, indeed, add a lot of complexity. The advantage here is
    that objects are not simply a free-for-all where any object can have any set of
    properties and methods. As with anything coding-related, there is a strict structure
    that each object must adhere to, called its class. Each class has a set of properties
    that every object in that class must have, and each object has a set of methods
    that every object in that class must implement using the same code. That way,
    if we have, for example, a class for forests, every object in that class must
    be a forest, and have the same properties, such as the forest’s size, the average
    age of the trees, or its dominant tree species. Furthermore, every object in that
    class must have the same methods, such as calculating its biomass using the properties
    of that forest. The code for calculating the biomass will be the same for every
    forest, as it is part of the class blueprint, but it will use the property values
    specific to each individual forest to ensure the calculation is both accurate
    and tailored to the specific forest.


    A side benefit to using functions and objects is that they also make debugging
    the code easier. If you had to repeat the same code, such as that biomass calculation,
    over and over again for each individual forest, but had a typo using a minus sign
    where you wanted a plus sign, you''d have to search all your code to make sure
    every single instance of that typo got fixed. This would be painstaking. However,
    if you have the task of calculating biomass neatly encapsulated within a method,
    then you''d have to only check that method and replace a single minus sign with
    a plus sign, and you know the bug is fully fixed.


    ### Task 1: Functions


    Before beginning this chapter''s tasks, either open up the saved file from the
    end of the previous chapter if you have Python Notebooks available, or enter the
    following code into the Python Window if your version of ArcGIS Pro does not include
    the Python Notebook:


    ```

    price = 100

    student_price = price * 0.5

    instructor = None

    participants = ["John Smith", "Fred Jackson", "Alice Scholl", "Robert Waters",
    "Eve Douglas",

    "Monty Adams", "Tyler Rose"]

    participants.sort()

    participants.reverse()

    paid_dictionary = {}

    paid_dictionary["Alice Scholl"] = True

    paid_dictionary["Eve Douglas"] = False

    paid_dictionary["Fred Jackson"] = False

    paid_dictionary["John Smith"] = True

    paid_dictionary["Monty Adams"] = True

    paid_dictionary["Robert Waters"] = False

    paid_dictionary["Tyler Rose"] = True

    student_dictionary = {}

    student_dictionary["Alice Scholl"] = True

    student_dictionary["Eve Douglas"] = False

    student_dictionary["Fred Jackson"] = True

    student_dictionary["John Smith"] = False

    student_dictionary["Monty Adams"] = False

    student_dictionary["Robert Waters"] = True

    student_dictionary["Tyler Rose"] = True

    topic_dictionary = {}

    topic_dictionary["01_Introduction"] = 1

    topic_dictionary["02_Python Basics"] = 5

    topic_dictionary["03_Reading Python"] = 2

    topic_dictionary["04_ArcPy Basics"] = 2

    topic_dictionary["05_Debugging"] = 3

    topic_dictionary["06_Introduction to Datasets"] = 1

    topic_dictionary["07_ArcPy Cursors"] = 3

    topic_dictionary["08_ArcPy Geometries"] = 2

    topic_dictionary["09_ArcPy Rasters"] = 2

    topic_dictionary["10_ArcPy Map Production"] = 4

    topic_dictionary["11_Exceptions"] = 1

    topic_dictionary["12_Functions and Classes"] = 2

    topic_dictionary["13_Custom Tools"] = 3

    topic_dictionary["14_Distribution of Tools"] = 2

    topic_dictionary["15_Concluding Project"] = 6

    ```


    A function is a collection of statements that serve a common purpose. This common
    purpose or task is more complex than can be completed in a single statement, just
    as a paragraph is a collection of sentences that are all related to a common topic.
    Functions often, but not always, have one or more inputs, called parameters, and
    often, but again not always, have one output value.


    We may want to have a function that calculates the total amount of revenue generated
    by the training session. The first thing to do is figure out what the inputs and
    output will be, if there are any. The output should be straightforward: the total
    amount of money that has been collected. The full set of inputs may be less obvious.
    The dictionary we already have of whether or not people have paid would be a good
    place to start. Once you know whether or not someone has paid, you need to know
    how much they have paid. This requires the price variable. Because of the student
    discount, this also requires knowing whether or not each person is a student,
    and what the student price is. This gives us a set of four inputs we could need.


    Before we begin to write our function, we should plan it out. You might first
    recognize that a `for` loop through each of the names will be a good structure
    for ensuring we have checked everyone on the roster, so let''s start a flow chart
    (Fig. 4.1).


    It doesn''t look like much yet, so let''s next figure out the questions we need
    to answer for each student. We want to know if they have paid yet, and if they
    have paid, whether or not they get the student discount. We can then slot those
    questions into the flow chart, suggesting an `if-else` structure inside the `for`
    loop (Fig. 4.2).


    Now we can fill in what to do at each of these three situations (Fig. 4.3).


    Now we have the `for` loop filled out, but we need to know what to do before and
    after it. Afterward is easy: report the total revenue as output. What happens
    before the `for` loop is the initialization process to set up the loop''s necessary
    information. In the function here, initialization takes the form of processing
    the input variables to make the `for` loop easier. One processing step is to extract
    a list of names from one of the dictionaries. We also need to initialize the total
    revenue at zero (Fig. 4.4).


    With our flow chart complete, we can start our code. This involves a couple new
    keywords. The `def` keyword defines a function, and has the syntax.


    ```

    def [function name] ([input parameter one], [input parameter 2], ...):

    ```


    ![](img/37990581b275bdf7d510c6f2d9702a31_46_0.png)


    **Fig. 4.1** Beginning of the function flow chart


    **Fig. 4.2** Fleshing out the flow chart for our function


    ![](img/37990581b275bdf7d510c6f2d9702a31_46_1.png)'
