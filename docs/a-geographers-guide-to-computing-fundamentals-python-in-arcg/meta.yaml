    integers, real numbers, lists, dictionaries, tuples, and any kind of object. We
    might wish to group these into categories to help us better understand the dynamics
    of these different types and how they relate to one another. For example, integers
    and real numbers are both types of numbers. Likewise, we might see lists, tuples,
    and dictionaries as all collections of things. Given that, we can develop the
    following chart, showing these relationships among some of the basic Python data
    types (Fig. 8.1).


    With these relationships, we know that anything that the top row can do, such
    as multiplying two numbers together, can also be done by the items below it in
    the chart. This means that you can multiply two integers together, and two real
    numbers together, because multiplication applies to all numbers. However, the
    reverse is not always true. It makes sense to get the fractional part of a real
    number (the part after the decimal point). However, this is not the case for an
    integer, as it by definition has nothing after the decimal point.


    Similarly, there are some properties that apply to all collections, like asking
    how many values it contains. Meanwhile, you can ask for the nth item in a tuple
    or a list, but not a dictionary, because dictionary items are accessed through
    their key, rather than any indexing or ordering. We could even update our figure
    to reflect this added step in the hierarchy (Fig. 8.2).


    Recalling the concept of classes from earlier, we can apply these concepts to
    objects and classes, and at the same time be more specific in our terminology.
    The classes at the top of an arrow are *superclasses*, while the classes at the
    bottom end are *subclasses*. For example, a Dictionary is a subclass of Collection,
    and Collection is a superclass of Dictionary. This also means that intermediate
    levels of a chart like this have classes that can be both. An Indexed Collection
    is a subclass of Collection, but a superclass of List and Tuple. The other concept
    here is *inheritance*. Classes of objects have methods and properties, as seen
    before. Any methods and properties that are implemented for a superclass are also
    available for all subclasses. This means that it is possible to get item #5 from
    an indexed collection, as this would be a method applicable to any indexed collection.¹
    Because it applies for an indexed collection, it will work for both tuples and
    lists, as they are subclasses of the indexed collection class. However, the concept
    of “get item #5” doesn’t work for all collections, because dictionaries aren’t
    ordered. Therefore, “get item #5” belongs to the Indexed Collection class, and
    its subclasses, but not its superclass of Collection. Possibly confusing the situation
    further, we can, however, apply “get item” to all collections here. It’s just
    that dictionaries and indexed collections answer the question of “which item to
    get” differently. Dictionaries use a key, which can be any type of object, while
    indexed collections must use a numerical index. This means that while using brackets
    [] to get an item will work with both indexed collections and dictionaries, what
    goes inside the brackets must be different.


    These ideas apply to objects more generally, and therefore to the types of datasets
    within ArcPy. After all, you can load many types of data into ArcGIS, and we might
    be able to put them into categories based upon some of the methods or


    ¹Strictly speaking, the [5] isn’t a method, but for our purposes here, using Python
    data types you are familiar with, the concept of inheritance applies nonetheless.


