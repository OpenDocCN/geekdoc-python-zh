    ## Task 1: Access Shape Information


    Copy the data to your workspace and add all data to a new map. We will be working
    with the Python Notebook for the guided tasks here, although all of it can be
    done within the Python Window if your version of ArcGIS Pro does not support Notebooks.


    We will now use the shape information encoded in ArcGIS and accessed through ArcPy
    to examine some properties of each of the three primary types of vector shapes.
    Recall from previous chapters that vector feature classes are all subclasses of
    tables. Since we accessed the items in a table through one of three forms of cursors
    and subclasses inherit functionality from their superclasses, we can also use
    any of the three kinds of cursors on our feature classes, too. This works because,
    while in the computer, they are stored separately (e.g., .dbf versus .shp for
    shapefiles); in practice, the geometry and the attributes are stored together,
    such that the file for the table and the file for the geometry must be in the
    same folder, alongside the .shx index file with the information on linking the
    geometry with the table. In fact, the geometry of a feature class is hidden in
    plain sight within the attribute table. Notice that, in any attribute table for
    explicitly spatial data, there will be a column called “Shape,” often the second
    column from the left, although this isn’t guaranteed. All of this column’s contents
    in the attribute table will tell you the type of geometry it is (e.g., “Point”).
    Embedded within that geometric shape, although not readily accessible through
    the attribute table, is the geometry information of that feature. Even though
    the attribute table doesn’t give us direct access to the geometries, we can use
    the same ArcPy cursor to access it. We access the geometric information by a special
    built-in variable name, “SHAPE@,” into the list of variables to be accessed when
    constructing the cursor with `SearchCursor()`, `UpdateCursor()`, or `InsertCursor()`.


    Points, lines, and polygons are all accessed through a `Geometry` object, which
    means that all properties are available for all shape types, even if there isn’t
    always a reason to use it, like getting the area of a point geometry. If you know
    the specific piece(s) of information within the geometry that you need, there
    are properties that you can add after the @, such as getting the area through
    `SHAPE@AREA`. These are in the Geometric Tokens segment of the help documentation
    at [https://pro.arcgis.com/en/pro-app/arcpy/get-started/reading-geometries.htm](https://pro.arcgis.com/en/pro-app/arcpy/get-started/reading-geometries.htm),
    but we will use the generic geometry `SHAPE@` for this chapter. It allows you
    to access all information, although not always as directly.


    Let’s start with the points, which we have in a layer called “Office_cities.”
    To access the geometries, run the following line:


    ```

    cityCursor = arcpy.da.SearchCursor("Office_cities", ["SHAPE@", "DESCRIPT"])

    ```


    Now we will want to examine how geometries work by getting a single geometry out
    of this cursor. In the previous lab, we saw how to use a for loop to cycle through
    the entries of a table. Here, to explore a single geometry, we just want a feature
    from that cursor. Just as we used the `.next()` function to examine a CSV file
    one line at a time, we can use the cursor’s `next()` function to go through the
    cursor’s contents one line at a time, or as here, to limit us to getting the first
    item. Run the following line:


    ```

    city = cityCursor.next()

    ```


    The behavior of a cursor does not change just because we are interested in the
    shape now, so the variable city contains a tuple of items, given in the order
    in which they are listed in the line defining the cursor. This means that the
    geometry is in entry #0 within the list. Therefore, access that geometry by running
    the following line:


    ```

    geom = city[0]

    ```


    We can confirm that this is, indeed, a geometry by typing geom into a blank Notebook
    cell and running it. You will then see the point that this geometry represents.
    Of course, a point isn’t very interesting here, but this might be of more use
    when we have a more complex shape. Regardless of the type of the geometry, some
    of the properties of any geometry we may want to look at are the following: how
    many points it contains, the first and last points, its length, its area, and
    how many parts it has. The last of the following lines provides something called
    the “WKT” or “Well Known Text,” which is a text-based representation of the geometry.
    Its advantage is that it is portable; many other systems can import WKT (why it
    is well-known!), and this would then be a means of taking geometries out of ArcGIS
    and into other systems.


    Using the following set of lines, get the information to answer the subsequent
    questions. While not all are needed to answer these questions, please run the
    lines anyway, as they are useful for answering later questions involving lines
    or polygons, and to illustrate how all properties are given for all geometry types,
    even if things like the length or the area of a point is a bit uninteresting:


    ```

    print("Point Count: ", geom.pointCount)

    print("First Point: ", geom.firstPoint)

    print("Last Point: ", geom.lastPoint)

    print("Length: ", geom.length)

    print("Area: ", geom.area)

    print("Part Count: ", geom.partCount)

    print("Well Known Text: ", geom.WKT)

    ```


    **Question 1: What is the area listed for this geometry?**

    **Question 2: How many parts does this geometry have?**


    You may have noticed that while the WKT provides text that can be parsed for extracting
    the coordinate information, it isn’t easily done, and the first and last points
    give all of the coordinates (including two that are not used here) through a Point
    object, rather than direct numbers. You can confirm this by running type(geom.firstPoint).
    We have to use this point object, although to show how we can access any point
    in a geometry that contains many points, not just the first and last points, we
    will use a different approach, with a function through the geometry object: getPart().
    Run the next four lines in a Notebook cell to create a point from the first (and
    only) point in this geometry, and print off its x and y coordinates. Within some
    rounding tolerance, these should match the coordinates in the WKT:


    ```

    cityPoint = geom.getPart()

    x = cityPoint.X

    y = cityPoint.Y

    print("X: ", x, ", Y: ", y)

    ```


    ```

    X: -80.087076 , Y: 38.220057

    ```


    Next, we will look at line data. There is a layer called “Trails_in_WMA.” Create
    its cursor and access the first trail’s geometry with the following lines:


    ```

    trailCursor = arcpy.da.SearchCursor("Trails_in_WMA", ["SHAPE@", "TRAIL_NAME"])

    trail = trailCursor.next()

    geom = trail[0]

    ```


    Having used the same variable name for the geometry, `geom`, we can simply run
    the same Notebook cell as before to print off the geometry''s information, like
    the point count, first point, length, and area. Rerun that cell and use the printed
    output to answer the questions below:


    **Question 3: How many points are in this geometry?**

    **Question 4: How many parts does this geometry have?**

    **Question 5: Are the first and last points the same?**


    We will now access the first part of the geometry to illustrate the geometry object
    for lines:


    ```

    python

    trailLine = geom.getPart(0)

    trailLine

    ```


    Upon entering the second line, you will notice that the line is stored as a type
    of Python collection we have not yet encountered: the array. Arrays are a lot
    like lists, but whereas lists can contain any multitude of data types, arrays
    are constrained such that they can only contain a single data type. Every item
    in this geometry is a point, meaning this is an array of points. As an array of
    points, we can think of the line as what would happen playing “connect the dots”
    with these points in the order in which they are presented. Like lists, we can
    loop through arrays with a `for` loop or access individual items using an index
    in brackets.


    **Question 6: Rounding to the nearest meter, which is the unit for this geometry,
    what are the X and Y coordinates for the point with index #5?**


    To illustrate the type constraint, try appending the number 42 to the array with
    the following line. Upon attempting to run it, you should get an error message
    with the key information at the end: that you are trying to add an item which
    is neither a point nor an array that contains only points:


    ```

