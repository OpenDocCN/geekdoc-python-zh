  md: '# Task 3: Preparation for Connecting ArcGIS with R


    The other package we will look at is the `arcgisbinding` package in R. This set
    of tasks will illustrate two lessons. First is connecting another platform with
    ArcGIS Pro through the ability to run R scripts in a newly created ArcGIS Pro
    tool. The other lesson is an introduction to Github, which is one of the primary
    venues where code is shared. We have to go to Github before we can go any further
    in this set of tasks because the connection between R and ArcGIS Pro is not something
    that is automatically installed with ArcGIS Pro. Instead, it must be downloaded
    and installed separately.


    Before we get to the details here, I’ll give a brief introduction to Github. It
    is one of the primary online repositories of open-source code. Open-source software
    represents a different mentality from a lot of software, such that for open-source
    software, any person can download the code for that software and is able to make
    changes to it. This means that for the r-bridge-install project that we will use,
    you can download and examine the Python code that makes it up. (Github accepts
    code in other languages as well; it just so happens that this one is in Python.)
    By contrast, there is no way to examine the source code for ArcGIS Pro. You can
    see at least parts of `arcpy`, but that is different from the code that Windows
    uses to run ArcGIS Pro.


    To install the connection between ArcGIS and R, first go to the following URL
    to access the correct software within the Github repository: [https://github.com/R-ArcGIS/r-bridge-install](https://github.com/R-ArcGIS/r-bridge-install).
    This website might be a bit intimidating when you first open it up. Most of what
    you see at the top of the page are items that are useful for those who need to
    see the exact scripts for this project, whether they want to just examine them
    or edit them. The row of buttons at the top provides different functions for those
    who are contributors and heavy users of the software in this project. We won’t
    need to look at these. As long as the top row is still actively on the button
    labeled “<> Code,” you can see under that row a list of folders and files. This
    is the code itself and a few associated files. The main thing to observe here
    is the set of ages at right. That represents the most recent edit to that file
    or to any file within the folder. As of the time of writing, only two of these
    are less than a year old, and most are considerably older. This can be a good
    sign as it indicates stability, assuming the code is routinely used. In this case,
    it is. Thus, for the code to be used frequently, but not edited frequently, it
    must be working very well—well enough to not be worried about finding many, if
    any, bugs.


    We are more interested here in the next section below that, which is labeled “Install
    the R-ArcGIS Bridge.” The first thing to notice here is that there are a couple
    different installation versions for the R-ArcGIS Bridge. Since we are working
    with ArcGIS Pro, we want the 64-bit installation of the R-ArcGIS Bridge to ensure
    it is compatible with ArcGIS Pro. Scroll down to the area labeled “ArcGIS Pro
    1.1+” and the “Offline Installation” below that. While either the online or offline
    installation would work, the offline installation process will probably be a bit
    more robust in case of internet connectivity difficulties, or simply working on
    a laptop that you want to travel with. Download the files through the “download
    this repository” link. Then click on the “latest version of the arcgisbinding
    package” link, and select the file named `arcgisbinding_1.0.1.244.zip`². Save
    both of those, and copy to a directory on your hard drive. The exact address of
    that directory is not important, although I do recommend something that is sensible
    and easier to remember because you’ll need that directory once we switch over
    to ArcGIS Pro to make the connection.


    Because the files downloaded in the .zip format, we need to extract the contents
    of those .zip files before ArcGIS Pro can use them. Navigate to the directory
    you just saved the files to, and extract them into that directory. Then, open
    up ArcGIS Pro, and go to the Catalog window. If you do not see it, find the View
    ribbon and click the “Catalog Pane” button. Then find the Toolboxes menu item,
    and right-click on that item. In the menu that pops up, select “Add Toolbox,”
    and navigate to the toolbox you just extracted from the first downloaded zip file.
    It is in the r-bridge-install-master folder and is called “R Integration.pyt.”


    Within that toolbox, you will find a tool called “Install R bindings.” Run that
    tool. You will probably get a “completed with warnings” alert, but that’s no need
    to panic. At this point, the bridge is set up for connecting ArcGIS Pro and R.


    # Task 4: Creating a Tool in ArcGIS to Use an R Script


    Now that it is installed, we can create a tool in ArcGIS Pro using the same steps
    that we used to create a tool in Chap. 14. The difference is that whereas in Chap.
    14, we used a Python script that we created, in this task, we are using an R script
    that is provided for us. This tool carries out a type of regression called spatial
    lag regression. This particular statistical technique


    ²That’s the version number as of the time of writing. This can, of course, get
    updated whenever they feel like it, so don’t panic if the version number is different.'
