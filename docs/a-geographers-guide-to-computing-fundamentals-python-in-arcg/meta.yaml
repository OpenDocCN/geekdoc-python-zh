- img_proc: true
  md: '# ArcPy for Web GIS Using ArcGIS Online 18


    This will introduce concepts of Web GIS and illustrate these concepts through
    the use the `arcpy.sharing` module. The use of data portals for Web GIS is also
    included. Just as important as writing the code here is creating metadata and
    the necessary information to enable people who come across your ArcGIS Online
    project to use and interpret it effectively.


    # Introductory Comments: Shared Services


    The first stage of sharing projects with the broader world often comes through
    the use of preexisting shared services. These services can be used to exchange
    data, both sharing data that you have collected and accessing data from other
    sources without having to download it directly. These services can also be used
    to share more than just the data but the entire setup of the project or even access
    more computing power than would otherwise be available on your own desktop or
    laptop machine. These form the key elements of Web GIS, which is a large enough
    and quickly enough growing portion of GIScience that plenty of books have been
    written about the subject. The Concluding Remarks list some of those. This chapter
    serves as only a very brief introduction to some of the tools that are available
    to you through ArcPy.


    Just as important as sharing the data or sharing the project is sharing the information
    you have about the project, which is the project’s metadata. Metadata is the information
    about the data, whether that is your dataset, your project, or a tool you are
    sharing, and it is critical to the effective implementation of a broader network
    of GIS practitioners and developers. After all, if all you do is say “here’s my
    data, it’s at https://gisportal.myschool.edu/server/rest/services/awesomeData/FeatureServer,”
    nobody will know what it contains, how old it is, what projection it uses, or
    anything else about the data. To be a valuable contributor in this network, you
    need to make sure your data is something that other people will want to use. Likewise,
    putting a .py file online does not encourage people to investigate or use your
    code, because they won’t know what is in it. Even if the code has good comments,
    they have to be sufficiently interested to download and open the file to even
    see those comments. The last guided task in this chapter takes you through the
    addition of some of this metadata to your project.


    # Task 1: Add Data from on Online Source


    The entry point for many people into the world of Web GIS is through a data service.
    This is accessing a dataset by telling the computer where to go online to find
    it, rather than downloading the data onto the local hard drive and pointing the
    computer to that hard drive. This has several advantages. First and foremost among
    them is that if you are working with a dataset that can be rapidly changing, such
    as daily meteorological records, or disease counts that are updated on a daily
    or weekly basis, you do not have to constantly re-download the data every time
    it is updated to ensure you are working with the most recent version of the dataset.
    Another advantage is that if the person or organization who created the dataset
    discovers and fixes an error, by connecting directly to the dataset on their server,
    you also immediately have access to the corrected version.


    From the perspective of ArcPy, there is not much difference between accessing
    a dataset from the local hard drive versus accessing a dataset from online. In
    fact, they use the same method of the `map` object: `addDataFromPath()`. The only
    difference is what goes into the parameter for that function.'
  merge: -1
