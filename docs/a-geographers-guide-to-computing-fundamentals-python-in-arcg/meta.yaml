    ## 16


    ## 引言：创建和管理类的策略


    本章再次延续了在城市建筑许可审批或拒绝的背景下，提升 ArcGIS Pro 可用性的进程。这再次需要对工具进行更改，以使其更符合拥有工具的目的。在这种情况下，我们将对其进行修改，以执行更多的审批流程。具体来说，我们希望能够输入一个地块
    ID 号（如上一个实验结束时在参数 #1 中所做的那样）、一个拟建建筑的面积¹，以及建筑类型（住宅、商业等）。根据这些信息，工具将报告预估的评估税单，或者给出一个
    ArcGIS 错误消息，说明为什么该拟建建筑不太可能获得批准。


    虽然执行这些更改将使用户的生活更轻松，但它也会使代码变得更加复杂。为了帮助评估拟建建筑，我们将创建两个新类。一个叫做 `Parcel`，它将代表地块及其上包含的建筑物的组合。另一个叫做
    `ApprovalError`，它是 `ValueError` 类的一个扩展，代表一种特定类型的值错误，即违反了审批流程指南的错误。


    在进一步讨论之前，我们将回顾在 ArcPy 章节中引入的关于类的概念。基于对象的方法允许我们拥有比标准文本、数字和布尔值更复杂的变量类型。每个对象都有其类的蓝图，该蓝图代表了它所包含的事物的集合。这个蓝图的主要部分是属性（properties），类似于特定于此对象的变量，以及方法（methods），即作用于此对象的函数。回想一下
    ArcPy 章节中的这个图表，它显示了与 `ArcGISProject` 类相关的一些属性（左侧）和方法（右侧），我们有一个变量 `aprx`，它是 `ArcGISProject`
    类型的对象（图 16.1）。


    正如我们希望使用自定义函数来使代码更具可重用性和可读性一样，如果我们有一组相互关联的变量和函数，并且我们可能会发现自己反复调用它们，那么将它们组合成一个单一的类，并将这些变量和函数转换为属性和方法，可能是明智的。在此场景中，虽然我们收到的是创建建筑的申请，但评估是在地块的尺度上进行的。由于地块的信息分散在建筑物文件和地块文件中，我们可能希望创建一个类，将来自两个不同文件的相关信息组合成一个单一的对象。一旦这些信息被组合起来，我们就可以继续进行分析，让地块将我们所有的信息保存在一个地方。


    回想一下数据描述，我们可以有扩展其他类的类。正如我们有一个扩展了 `Table` 的 `FeatureClass`，并实现了与 `Table` 相关的所有属性和方法，并添加了额外的属性和方法一样，我们可以创建扩展现有类的类。这些新类可以利用现有类的属性和方法，添加新的属性和方法，以及覆盖现有方法。覆盖一个方法会保留该方法的存在，但会改变其执行方式。例如，在
    ArcGIS Pro 中高亮显示表格中的选中项会使这些行在属性表中显示方式不同。高亮显示选中项也是由要素类执行的，但它们高亮显示的方式不同。属性表的相关行仍然显示不同，但地图中的要素也会被高亮显示，因此我们可以看到高亮显示项的操作是如何以不同的方式执行的。在
    Python 中，覆盖方法在所谓的“dunder”方法中尤为显著。这些


    ¹ 理想情况下，这应该接受一个多边形，从中可以计算面积，并将其与地块的多边形进行比较以评估退让距离，但虽然多边形是有效的输入参数类型，但赋予工具输入多边形的能力可能会与试图让用户更容易而非更难使用的想法背道而驰。


    ![](img/37990581b275bdf7d510c6f2d9702a31_165_0.png)


    图 16.1 具有属性和方法的类的类图


    是适用于大多数（如果不是全部）类的内置方法，它们之所以得名，是因为方法名总是以两个下划线（双下划线或“dunder”）开始和结束。我们将在本章中使用的两个是
    `__init__` 和 `__str__` 方法。第一个是类的构造函数方法，它是在创建此类的对象时运行的代码，通常用于设置这个新对象的属性。在没有明确说明的情况下，你已经多次使用了
    `__init__` 方法。每当你使用一个类的构造函数方法时，你都在隐式地使用 `__init__` 构造函数。因此，当你通过调用 `arcpy.Describe()`
    创建一个 Describe 对象时，这在幕后调用的是 Describe 类的 `__init__` 方法。第二个是对象在转换为字符串时的表示方式。它并不完全等同于此，但你可以将其想象为当你对一个对象调用
    `str()` 函数时发生的事情。


    在类内编程时，你需要能够引用该类的对象，即所有属性和方法作用于的类的实例。例如，当你通过上图中的 `aprx` 变量调用 `aprx.listLayouts()`
    方法时，`listLayouts` 方法内的代码需要能够访问 `aprx` 变量。这并不像你最初想象的那么简单，因为代码必须编写得无论变量叫什么名字都没关系。我们不知道
    `ArcGISProject` 对象是叫 `aprx`、`myProject`、`currentProj`，还是叫 `iHateArc`。因此，在代码中通过一个特殊的变量来访问它，这个变量通常被称为
    `self`。² 在 `__init__` 方法中创建变量时，`self` 是第一个变量。同样，在通过方法传递变量时，第一个参数总是 `self`。正如你会在
    Python 窗口中使用 `aprx.listLayouts()` 一样，如果你需要在 `ArcGISProject` 类的另一个方法中访问布局列表，你会使用
    `self.listLayouts()`。此外，如果你需要在方法中访问一个属性，比如 `save()` 方法需要能够访问 `filePath` 属性，`save()`
    中的代码将使用 `self.filePath` 来访问该属性。


    当我们更新此工具以提供更好的功能并创建我们的两个类：`Parcel` 和 `ApprovalError` 时，我们将看到这些概念在实际中的应用。


    ## 任务 1：更新工具对话框


    如上所述，我们希望能够输入三个输入参数：一个地块 ID 号，表示为字符串；一个拟建建筑的面积，表示为双精度浮点数（Double）；以及建筑类型，表示为一个字符串，其值仅限于以下列表：COMMERCIAL、COMMUNITY、EDUCATION、GOVERNMENT、HEALTH、RECREATION/TOURIST
    或 RESIDENTIAL。这些直接取自建筑物文件中的类型字段，因此必须完全按照它们出现的形式，包括全部大写。否则，代码将无法工作。


