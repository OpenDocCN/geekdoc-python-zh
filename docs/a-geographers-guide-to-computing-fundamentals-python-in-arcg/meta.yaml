    \ location, but some of the code later on will work best if it is a geodatabase\
    \ instead of a regular folder.\n\n```\n>>> arcpy.env.workspace\n'C:\\Users\\jfconley\\\
    Documents\\ArcGIS\\Projects\\Chapter7\\Chapter7.gdb'\n```\n\nAs the `ArcGISProject`\
    \ documentation we saw specified, that is the class that is most frequently the\
    \ gateway into ArcPy. Therefore, let’s create a variable containing an object\
    \ of this class, referring to the current project. Conveniently, the Python Window\
    \ gives us a way to get exactly that.\nType `aprx = arcpy.mp.ArcGISProject(\"\
    CURRENT\")` and press Enter. The “CURRENT” string is a Python Window-specific\
