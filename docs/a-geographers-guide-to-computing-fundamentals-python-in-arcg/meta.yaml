    \ until those sub-projects become manageable chunks of code, and then, if the\
    \ planning has gone well, they can easily slot into place for the bigger picture,\
    \ and you have a fully functioning multiple-file program. Even if you do not use\
    \ UML or anything like it, you will almost certainly require much more planning\
    \ to execute a larger project than anything that you did for the previous chapters.\n\
    \n### Task 1: Construction of UML-Like Diagrams\n\nBuilding upon the writing analogy\
    \ from earlier chapter, it can be daunting to just stare at an empty file for\
    \ a large task like this, just as it can be daunting to stare at an empty page\
    \ for a longer essay. Where you might use an outline to organize your thoughts\
    \ prior to writing an essay, programming might not be as strictly linear, so an\
    \ outline of a complex project is perhaps not helpful. Instead, a class diagram\
    \ shows the relationships between classes in a programming project that typically\
    \ contains many different classes. Since class diagrams are designed with object-oriented\
    \ programming in mind, in which everything is an object and all programming exists\
    \ within classes, and we do not have a fully object-oriented system here, we will\
    \ have to adapt the class diagram somewhat to accommodate the parts of the program\
    \ that use a function-based style of programming instead.\n\nI start here with\
    \ the main analytical program that we will attach to an ArcGIS Pro tool in Chap.\
