    arcPy 更改的图层属性。其中一些是“只读”的，例如 isRasterLayer。这意味着 arcPy 能够告诉您它是否是栅格图层，但您无法更改它。这是合理的，因为如果您可以在不同时切换其引用的数据集从矢量到栅格的情况下，将图层从矢量图层更改为栅格图层，这将造成重大问题并可能导致
    ArcGIS 崩溃。其他属性，如透明度，标记为“读写”，这意味着您可以使用代码更改图层的透明度。是否有任何属性对我们想要做的事情特别有用？尝试此行：


    ```

    statesLayer.visible = False

    ```


    按回车键。您应该会看到类似这样的地图，州图层名称旁边的复选框未被选中。


    因此，我们关闭了州图层以查看县图层，这可能是值得的。但也许我们更愿意将州图层设为空心，使用更粗的轮廓线，并为其添加标签，以供参考。我们将首先处理标签，并在下一个任务中解决符号化问题。


    **问题 3：您可以使用什么代码使州图层可见？**


    现在让我们为州添加标签。应该有一个 Layer 类的属性，您可以找到它，允许您显示标签。


    **问题 4：它是什么？您需要在此处包含什么代码？**


    正如我们使用 Describe 对象检查了不同类型的数据集一样，也有不同类型的图层（栅格、要素等），并且再次类似于 Describe 对象的属性，某些图层属性仅对特定图层类型可用。我们可以使用
    supports() 方法检查是否支持某个属性。


    例如，此行检查 `statesLayer` 是否支持 *contrast* 属性。然后创建变量以访问每个图层，而不仅仅是您当前拥有的州和道路图层变量。


    ```

    statesLayer.supports("CONTRAST")

    ```


    **问题 5：创建变量以访问每个图层，并使用它们来识别我们地理数据库中哪些图层（如果有）支持 *brightness* 属性？在此处输入相关代码。**


    ## 任务 3：更改符号化


    如上所述，我们希望将州图层设为空心。这可以通过符号化属性来完成。如引言所述，我们需要通过一系列属性来编辑符号化。首先是图层的符号化属性。该属性又有一个渲染器，记录整个图层的绘制方式。有几种类型的渲染器，用于不同的图层显示方式。通过输入以下行并按
    Enter 键来找出州图层的渲染器类型：


    ```

    statesSymbology = statesLayer.symbology

    statesSymbology.renderer.type

    ```


    您应该得到下面问题 6 的答案：

    **问题 6：（5 分）州图层的渲染器类型是什么？**

    这种类型的渲染器意味着每个要素都使用完全相同的符号显示，我们可以通过以下第一行访问它。这是合理的，因为查看地图，所有州都将具有相同的颜色和相同的轮廓线粗细。（确切的颜色可能取决于
    ArcGIS Pro 当天的感觉。）我们希望它是空心的，这通过以下第二行实现：


    ```

    statesSymbol = statesSymbology.renderer.symbol

    statesSymbol.color = {''RGB'' : [0, 0, 0, 0]}

    ```


    **问题 7：使用符号类的帮助文档，为什么指定颜色的列表中的*最后一个*数字是 0？**

    您不应该看到任何变化。到目前为止，我们所做的只是编辑保存图层符号化的变量。回想一下第 2 章中名为 bob 的变量，它被赋予列表中的一个项目，但更改变量 bob
    并不会更改列表。这里正在发生类似的动态，其中 `statesSymbology` 变量被更改，但这并未更改图层的符号化属性。² 我们现在需要返回以将这些编辑保存到图层中。这是通过设置图层的符号化属性来完成的。（毕竟，符号化属性是读写启用的。）


    ```

    statesLayer.symbology = statesSymbology

    ```


    现在它是空心的，但为了使州边界与县边界区分开来，我们希望给它一个更粗的轮廓线。这通过 `size` 属性实现：


    ```

    statesSymbol.size = 3

    statesLayer.symbology = statesSymbology

    ```


    > ²我说“类似的动态”而不是“相同的动态”，因为出于某种原因，编辑名为 statesSymbol 的变量*确实*自动将更改反映在 statesSymbology
    变量中，即使对 statesSymbology 的更改尚未被 statesLayer 变量反映。用计算机科学术语来说，就好像 ArcPy 使用按引用来访问
    statesSymbol，但使用按值来访问 statesSymbology。'
