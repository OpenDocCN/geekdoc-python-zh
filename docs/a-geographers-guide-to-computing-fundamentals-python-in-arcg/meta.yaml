  mdcn: "## 任务5：检查R脚本\n\n本任务将查看上一个任务中附加到工具的R脚本。此处的目的并非让你成为R语言编程专家——对于一本书来说，学习Python已经足够，无需再添加其他语言！相反，这里旨在说明两种语言之间的一些相似之处，从而论证本书第一部分的观点。一旦你掌握了编程基础，并能识别不同通用策略的语法模式，解密另一种语言的代码并最终用它编程就会变得容易得多。脚本如下：\n\
    \n```r\n#Spatial Lag Regression R Script\ntool_exec<- function(in_params, out_params)\
    \ {\n\n    arc.progress_label(\"Loading packages...\")\n    arc.progress_pos(20)\n\
    \n    if(!requireNamespace(\"spatialreg\", quietly = TRUE))\n        install.packages(\"\
    spatialreg\", quiet = TRUE)\n    if(!requireNamespace(\"spdep\", quietly = TRUE))\n\
    \        install.packages(\"spdep\", quiet = TRUE)\n    install.packages(\"spatialreg\"\
    , quiet = TRUE)\n    require(spatialreg)\n    require(spdep)\n\n    input_data\
    \ <- in_params[[1]]\n    dependent_variable <- in_params[[2]]\n    independent_variables\
    \ <- in_params[[3]]\n\n    arc.progress_label(\"Loading data...\")\n    arc.progress_pos(40)\n\
    \n    d <- arc.open(input_data)\n    fields_list <- append(c(dependent_variable),\
    \ independent_variables)\n    d_df_full <- arc.select(d)\n    d_df <- arc.select(d,\
    \ fields = fields_list)\n\n    d_sp <- arc.data2sp(d_df)\n\n    arc.progress_label(\"\
    Running Regression...\")\n    arc.progress_pos(60)\n\n    response <- d_df[, 1]\n\
    \    predictors <- d_df[, -1]\n\n    queen <- poly2nb(d_sp, queen = TRUE)\n  \
    \  queen_nb <- nb2listw(queen)\n    lagModel <- lagsarlm(response ~ ., data =\
    \ predictors, queen_nb)\n\n    arc.progress_label(\"Writing output...\")\n   \
    \ arc.progress_pos(80)\n\n    if(!is.null(lagModel) && lagModel != \"NA\")\n \
    \       print(summary(lagModel))\n\n    arc.progress_pos(100)\n}\n```\n\n首先要注意的是，它完全遵循下面这种单一的语法模式。其中的`function`一词可以提示正在发生什么。它是一个用于设置新函数的关键字，就像Python中的`def`语句一样。这个函数有两个输入参数：`in_params`和`out_params`。R语言使用开头和结尾的花括号来表示函数内代码块的开始和结束，而不是使用冒号和缩进：\n\
    \n```r\ntool_exec <- function(in_params, out_params){\n    ...\n}\n```\n\n这等同于以下Python代码行：\n\
    \n```python\ndef tool_exec (in_params, out_params):\n```\n\n不过，你可能会观察到，这个文件中实际上没有一行代码执行该函数。这暗示了这个桥接工具在计算上更复杂的一个方面。所有示例都只包含一个名为`tool_exec`的函数，这表明当工具运行时，桥接工具会寻找名为`tool_exec`的函数，并自动运行该函数。\n\
    \n函数定义后的下一行`arc.progress_label(\"Loading packages...\")`看起来像是在访问某个对象的方法。这与实际情况类似，它设置的是ArcGIS\
    \ Pro中进度条上显示的标签。不同之处在于，R语言允许点号出现在变量名和函数名中，所以这只是一个名为`arc.progress_label`的函数，而不是某个名为`arc`的变量的方法。查看`arcgisbinding`项目的PDF文档会发现，该包提供的几乎所有函数都以`arc`开头，包括点号。这说明在比较一种编程语言与另一种语言时，分隔符和关键字往往是变化最大的部分。\n\
    \n在运行了两个更新进度条的函数之后，我们看到了另一种熟悉的结构：条件语句。它使用了相同的`if`关键字，并且在两种情况下，关键字后面都跟着一个布尔表达式。虽然这里不需要，但花括号本可以像用于函数定义语句那样，再次用来代替冒号。对于不熟悉R语言的人来说，条件语句内部的行或许比条件本身更能提供线索。函数名`install.packages`暗示其目的类似于导入模块，事实也确实如此。这个条件语句确保只在需要时（即尚未加载时）才导入模块。快速搜索`require`函数会发现，它是在函数内部导入包时R所使用的方式，就像我们当前的情况。它还表明，对于R包，导入包是一个两步过程：首先必须安装，然后必须通过`require`函数或`library`函数（如果不在另一个函数中）来访问。\n\
    \n接下来的三行似乎都是从输入参数中获取值，并且使用的变量名与工具的输入参数相对应，这使得这种可能性很大。它展示了R语言赋值运算符的用法。Python使用单个等号（=）进行赋值，而R使用一个由两个字符组成的左向箭头（<-）。\n\
    \n访问输入参数后的两行再次更新了进度条的标签和位置。随后的五行乍一看是相当直接的赋值运算符。如果你查看`arcgisbinding`文档，你可能会开始解读这里使用的不同函数。第一个函数`arc.open`，顾名思义，打开输入数据层。然后将两组变量合并，得到一个需要从数据集中检索的字段列表。这个检索操作在`arc.select`函数中完成。这些行中的最后一行`arc.data2sp`将数据转换为空间数据框，这是R语言特有的数据结构。这强化了使用`numpy`时遇到的问题：从一个包转移到另一个包，或者在这种情况下，从一种语言转移到另一种语言，通常需要将数据从适合第一个包的结构转换为适合第二个包的结构。\n\
    \n当你浏览脚本的其余部分时，请注意大多数行都是对已解释行的变体，无论是设置进度条的标签或位置、为变量赋值，还是使用条件语句控制代码执行。你甚至可能会注意到`print`函数看起来非常相似。\n\
    \n本任务应有助于建立信心：一旦掌握了计算的基础知识，如变量、赋值、控制语句和函数，在不同编程语言之间切换就会变得更容易。因此，通过本书包含的技能，你不仅将获得在ArcGIS\
    \ Pro中使用Python进行计算的指南，而且实际上将成为GIS计算的通用指南——当（不是如果，而是当）ESRI决定从Python转向另一种语言，或者你决定转向不同的GIS平台（如QGIS）时。\n\
    \n## 任务6：自主练习\n\n我们可能希望获得二维直方图的数据，因为ArcGIS Pro中的图表功能仅支持创建一维直方图。在Python窗口中直接显示直方图本身可能行不通，但我们仍然可以获取每个区间中出现的街区组数量。"
