    \ row, and insert a new row for Monongalia County.\n\nTo delete a row, we again\
    \ want an update cursor, but this time, for the table with the 2018 results. First,\
    \ notice that we are only accessing the name attribute. Second, there is a query\
    \ to ensure we are only looking at the information row, by asking whether the\
    \ attribute “Name” matches the value “County Name.” You might notice that the\
    \ attribute name (of NAME) is in double quotes, while the value of the attribute\
    \ (County Name) is in single quotes. This is how SQL is set up. However, to achieve\
    \ the string of “NAME” = ‘County Name’, we need to use the escape character ‘\\\
    ’ to indicate that we want to include a single quote mark at this spot in the\
    \ string. It is needed to allow Python to recognize the difference between a quote\
    \ mark that is a character in the text string and a quote mark that ends the string.\n\
    \nLastly, because deleting rows is not something that can be undone, I have written\
    \ a double check into the code, by again seeing if the name has the value of “County\
    \ Name.” This way, we are making absolutely sure we do not accidentally and permanently\
    \ delete the wrong row(s). At the end, we will again need to delete the cursor.\n\
    \n```\nupdate = arcpy.da.UpdateCursor('WV_election_2018_only', [\"NAME\"], '\"\
