  - "[PAGE 212]\n\nis not (yet) installed with ArcGIS Pro by default, so if we want\
    \ to run it, a new tool must be created. There are packages in R that have a much\
    \ wider variety of statistical techniques than are available in ArcGIS Pro. Therefore,\
    \ a comparatively straightforward way to be able to use these additional statistical\
    \ techniques within the ArcGIS Pro environment is to be able to take an R script\
    \ that carries out the test and be able to run it within ArcGIS Pro, now that\
    \ we have a bridge between the two.\n\nFirst, create a new tool as you did before.\
    \ To recognize what it is, use the Name “SpatialLag,” and a Label of “Spatial\
    \ Lag Regression.” For the script file, navigate to the provided file of spatial_lag_test.R.\n\
    \nWe will then need to provide parameters for this new tool. It needs to have\
    \ the feature layer that is being analyzed as the input.³ This provides the data\
    \ for the analysis. We also need to choose the dependent and independent variables,\
    \ as a spatial lag regression is set up like any other regression.⁴ As the second\
    \ input parameter, use a single field as the dependent variable. We will also\
    \ want to make sure this field is in the dataset, so it must have a dependency\
    \ on the input dataset. The independent variables will also be set up as an input\
    \ variable with Field as the data type, except when you pick the Data Type, make\
    \ sure the box labeled “Multiple values” is checked. It also has a dependency\
    \ upon the input dataset to ensure the independent variables are contained in\
    \ this dataset.\n\nNow we can run this tool. Try it with the chapter19 feature\
    \ class as the input data, privbeh30 as the dependent variable, and HEALTHLINK,\
    \ SHAH, and BASCUNAN as independent variables. This runs a spatial lag regression\
    \ in which the dependent variable is the number of private behavioral health facilities\
    \ within 30 minutes of the centroid of the block group, and the three independent\
    \ variables are three different multivariate measures of socioeconomic barriers\
    \ to health-care access. Click Run.\n\nIt should say that it completed with warnings.\
    \ If not, you might have to save your work, close ArcGIS Pro, then go back to\
    \ the Windows start menu, and right-click on ArcGIS Pro to run it as an administrator.\
    \ (If this happens, I hope you have administrator access on your computer!) Once\
    \ you have it running as an administrator, redo the Install R bindings tool, and\
