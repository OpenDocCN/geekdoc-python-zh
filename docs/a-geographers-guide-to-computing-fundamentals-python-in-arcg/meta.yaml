- md: "## Task 5: Creating a New Geometry from Scratch\n\nNow imagine that you have\
    \ the planned route for a new trail within a WMA. Using coordinates provided,\
    \ we will create a geometry for this and add it to the trails layer using an insert\
    \ cursor. The first thing to do is create the points, which is simply accomplished\
    \ through an arcpy function for creating points, aptly named `arcpy.Point()`.\
    \ We will use this to create seven points for our new trail. These points then\
    \ have to be formed into an array, because that, after all, is how the coordinates\
    \ of a line are represented. ArcPy provides a function for creating an array,\
    \ as well, which takes as its input a list of the points you want in the array:\n\
    \n```\npoint1 = arcpy.Point(599347.2, 4388183.01)\npoint2 = arcpy.Point(599915.79,\
    \ 4387982.42)\npoint3 = arcpy.Point(599715.2, 4387320.48)\npoint4 = arcpy.Point(600036.14,\
    \ 4387099.84)\npoint5 = arcpy.Point(599955.91, 4386377.72)\npoint6 = arcpy.Point(600457.37,\
    \ 4386116.96)\npoint7 = arcpy.Point(600818.43, 4385976.55)\n\narray = arcpy.Array([point1,\
    \ point2, point3, point4, point5, point6, point7])\n```\n\nThe other thing we\
    \ need to create a geometry is to have an idea what its coordinate system is,\
    \ which is stored in that geometry's spatial reference. After all, we would like\
    \ ArcGIS to know whether we are dealing with latitude/longitude, UTM, or something\
    \ else. In this case, as we are adding to an existing feature class, we can find\
    \ the spatial reference of that feature class, by getting the spatial reference\
    \ of one of the other geometries for that feature class. Since we have been reusing\
    \ the geom variable, we need to go back and make sure it is referring to the correct\
    \ cursor. Once the geometry is set up, we can access its spatial reference just\
    \ like any other property. In this case, rather than looking at it, we want to\
    \ store it into a variable for later use. Once this is set up, we can now actually\
    \ create our new line geometry. There are some other attributes of the trails\
    \ that would be worth filling in, so we will create variables for these, as well.\
    \ They are separate variables, rather than used directly in the insert cursor's\
    \ command, because it is easier to identify what values correspond with which\
    \ attribute and edit the script properly if needed, by using variables here. Once\
    \ that all the data are prepared, we can add a feature to our feature class with\
    \ an InsertCursor:\n\n```\ntrailCursor = arcpy.da.SearchCursor(\"Trails_in_WMA\"\
    , [\"SHAPE@\", \"TRAIL_NAME\"])\ntrail = trailCursor.next()\ngeom = trail[0]\n\
    spref = geom.spatialReference\nnewLine = arcpy.Polyline(array, spref)\nname =\
    \ \"Cheat Canyon Trail\"\nlength = 0\ncat = \"Proposed Rail-Trails\"\nstat = \"\
    Proposed\"\ninsert = arcpy.da.InsertCursor('Trails_in_WMA', [\"SHAPE@\", \"TRAIL_NAME\"\
    , \"LENGTH\", \"CATEGORY\", \"Status\"])\ninsert.insertRow([newLine, name, length,\
    \ cat, stat])\ndel insert\n```\n\nRunning the code above will probably give a\
    \ mysterious numerical output. In this case, it is probably a 6, which indicates\
    \ that we have added a trail with FID #6 to the feature class. To see the new\
    \ trail, I had to go to the attribute table and select the new row. Then I shifted\
    \ over to the map, right-clicked on the layer name in the table of contents, went\
    \ to the Selection section, and chose Zoom to Selection. Once zoomed in on the\
    \ map, you can use the identify tool on the surrounding WMA to answer the following\
    \ question:\n\n**Question 17: Which WMA contains our new trail?**\n\n## Task 6:\
    \ Debugging Exercise\n\nThe following code, when it works, will find the intersection\
    \ of buffers around the trail and the associated WMA so that the ratio can correct\
    \ for the fact that buffers can extend beyond the boundary of the WMA. If fixed,\
    \ this could help you with the Challenge Task 8 below. For whatever reason, to\
    \ create polygons in the Geometry `intersect()` method, you need a dimension value\
    \ of 4. There are four errors:\n\n```\nwmaCursor = arcpy.da.SearchCursor(\"WMA_with_trails\"\
    , [\"SHAPE\", \"NAME\"])\nratioList = []\ntrailCursor.reset()\nfor trail in trailCursor:\n\
    \    for wma in wmaCursor:\n        if trail[0].contains(wma[0]):\n          \
    \  adjBuffer = trail[0].buffer(2000).intersect(wma[0])\n            adjArea =\
    \ adjBuffer.area()\n            ratio = (100 * adjArea/wma[0].area)\n        \
    \    ratioList.append(ratio)\n            print(trail[1], \"is within\", wma[1],\
    \ \"and the ratio is\", ratio)\n    wmaCursor.reset()\n```\n\n## Task 7: Unguided\
    \ Work\n\nAdd the state_park_utm and the nps_sept03_utm83 feature classes to the\
    \ map if they aren’t there already.\nWe want to conduct market research in an\
    \ area that might be very popular with nature enthusiasts, so the services could\
    \ be improved. One area was identified as a place that is in both the New River\
    \ Gorge National River (from the nps feature class) and in Babcock State Park.\n\
    **Write a script that achieves the following tasks, if copied and pasted into\
    \ the Python Notebook:**\n\n- 1. Use search cursors to extract these two features.\n\
    - 2. Use the appropriate geometry method to create a polygon of the *intersection*\
    \ of these two features. Look at the documentation to identify which geometry\
    \ method to use.⁴\n- 3. Use the `analysis.Select` function to create a feature\
    \ class called “Babcock” that is just Babcock State Park. (It can be either a\
    \ shapefile or a geodatabase feature class.)\n- 4. Use the `analysis.Clip` function\
    \ to clip the Babcock feature class from part 3 to the market area from part 2,\
    \ and call the output feature class “MarketArea.” (Again, either a shapefile or\
    \ geodatabase feature class is acceptable.)\n- 5. Save to a .py file and add 4\
    \ comments—one at each of the appropriate line(s) to describe the code for the\
    \ four steps above.\n\n## Challenge Task 8\n\nThis is an extra challenge task:\
    \ clip the buffers to the WMA areas, and add an evaluation attribute to the trails\
    \ file.\nThe ratio calculation I asked you to do ignored the possibility that\
    \ the buffers might leave the WMA. Mapping it out, most of them do.\nRevisit the\
    \ code in Tasks 2 and 3 to account for this, and only use the area of the buffer\
    \ that is also within the WMA.\nAlso add an attribute to the trails feature class\
    \ called “Evaluation” with a Boolean type, containing `True` if it can be built\
    \ and `False` if it cannot, using the criterion set out at the start of Part III.\n\
    \n## Hints\n\nLook through the geometry section of the ArcPy help documentation\
    \ to find potentially useful methods.\nThis may require a more thorough revision\
    \ that you initially anticipated. That’s why it is an extra challenge task!\n\n\
    ⁴If you access a tool from ArcToolbox instead of the geometry method for accomplishing\
    \ this, you will lose points."
  mdcn: "## 任务 5：从零开始创建新几何图形\n\n现在假设你已规划好野生动物管理区内一条新步道的路线。根据提供的坐标，我们将为此创建一个几何图形，并使用插入游标将其添加到步道图层中。首先要创建点，这可以通过一个名为\
    \ `arcpy.Point()` 的 arcpy 函数轻松完成。我们将用它为新步道创建七个点。这些点随后需要形成一个数组，因为这正是表示线坐标的方式。ArcPy\
    \ 也提供了一个创建数组的函数，其输入是你希望包含在数组中的点列表：\n\n```\npoint1 = arcpy.Point(599347.2, 4388183.01)\n\
    point2 = arcpy.Point(599915.79, 4387982.42)\npoint3 = arcpy.Point(599715.2, 4387320.48)\n\
    point4 = arcpy.Point(600036.14, 4387099.84)\npoint5 = arcpy.Point(599955.91, 4386377.72)\n\
    point6 = arcpy.Point(600457.37, 4386116.96)\npoint7 = arcpy.Point(600818.43, 4385976.55)\n\
    \narray = arcpy.Array([point1, point2, point3, point4, point5, point6, point7])\n\
    ```\n\n创建几何图形还需要了解其坐标系，这存储在该几何图形的空间参考中。毕竟，我们希望 ArcGIS 知道我们处理的是经纬度、UTM 还是其他坐标系。在本例中，由于我们是添加到现有的要素类中，我们可以通过获取该要素类中另一个几何图形的空间参考来找到该要素类的空间参考。由于我们一直在重用\
    \ `geom` 变量，我们需要回头确保它引用的是正确的游标。几何图形设置好后，我们就可以像访问任何其他属性一样访问其空间参考。在本例中，我们不是查看它，而是将其存储到一个变量中以备后用。设置好这些后，我们现在就可以实际创建新的线几何图形了。步道还有一些其他属性值得填写，因此我们也将为这些创建变量。它们是独立的变量，而不是直接在插入游标的命令中使用，因为在这里使用变量更容易识别哪个值对应哪个属性，并在需要时正确编辑脚本。所有数据准备好后，我们就可以使用\
    \ `InsertCursor` 向要素类添加一个要素：\n\n```\ntrailCursor = arcpy.da.SearchCursor(\"Trails_in_WMA\"\
    , [\"SHAPE@\", \"TRAIL_NAME\"])\ntrail = trailCursor.next()\ngeom = trail[0]\n\
    spref = geom.spatialReference\nnewLine = arcpy.Polyline(array, spref)\nname =\
    \ \"Cheat Canyon Trail\"\nlength = 0\ncat = \"Proposed Rail-Trails\"\nstat = \"\
    Proposed\"\ninsert = arcpy.da.InsertCursor('Trails_in_WMA', [\"SHAPE@\", \"TRAIL_NAME\"\
    , \"LENGTH\", \"CATEGORY\", \"Status\"])\ninsert.insertRow([newLine, name, length,\
    \ cat, stat])\ndel insert\n```\n\n运行上面的代码可能会产生一个神秘的数字输出。在本例中，它可能是 6，表示我们已向要素类添加了\
    \ FID #6 的步道。要查看新步道，我必须转到属性表并选择新行。然后我切换到地图，在内容列表中右键单击图层名称，转到“选择”部分，并选择“缩放到所选要素”。地图放大后，你可以使用识别工具查看周围的野生动物管理区，以回答以下问题：\n\
    \n**问题 17：哪个野生动物管理区包含我们的新步道？**\n\n## 任务 6：调试练习\n\n以下代码在正常运行时，会找到步道周围缓冲区与相关野生动物管理区的交集，以便该比率可以校正缓冲区可能超出野生动物管理区边界的情况。如果修复了，这可能对你完成下面的挑战任务\
    \ 8 有所帮助。出于某种原因，要在几何图形的 `intersect()` 方法中创建多边形，你需要一个维度值 4。代码中有四处错误：\n\n```\nwmaCursor\
    \ = arcpy.da.SearchCursor(\"WMA_with_trails\", [\"SHAPE\", \"NAME\"])\nratioList\
    \ = []\ntrailCursor.reset()\nfor trail in trailCursor:\n    for wma in wmaCursor:\n\
    \        if trail[0].contains(wma[0]):\n            adjBuffer = trail[0].buffer(2000).intersect(wma[0])\n\
    \            adjArea = adjBuffer.area()\n            ratio = (100 * adjArea/wma[0].area)\n\
    \            ratioList.append(ratio)\n            print(trail[1], \"is within\"\
    , wma[1], \"and the ratio is\", ratio)\n    wmaCursor.reset()\n```\n\n## 任务 7：自主练习\n\
    \n如果地图中尚未添加 `state_park_utm` 和 `nps_sept03_utm83` 要素类，请将它们添加到地图中。\n我们希望在一个可能深受自然爱好者欢迎的区域进行市场调研，以便改进服务。有一个区域被确定为同时位于新河峡谷国家河流（来自\
    \ NPS 要素类）和巴布科克州立公园内。\n**编写一个脚本，如果复制并粘贴到 Python Notebook 中，可以完成以下任务：**\n\n- 1.\
