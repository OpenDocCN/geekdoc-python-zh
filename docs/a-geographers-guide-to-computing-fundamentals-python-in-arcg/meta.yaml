    \ the next row in the correlation matrix:\ncorr_matrix.append([])\n```\n\nTo populate\
    \ each element within this row, we need to again loop through the matrix. The\
    \ nested `for` loops ensures we compare every possible pair of fields. Even though\
    \ the two loops are using the same list, they have different index variables,\
    \ marking different locations, so one will not confuse the other. Imagine having\
    \ two cursors looking at the same table, CursorA and CursorB. The position of\
    \ CursorA is not altered by CursorB, nor is the position of CursorB affected by\
    \ CursorA. They can cycle through the same table independently of each other.\
    \ The same dynamic can apply here, ensuring i and j do not interfere with each\
    \ other.\n\n```python\n# Loop through all of the fields again:\nfor j in fields:\n\
    ```\n\nNow that we are looking at a single pair of fields—field i and field j—we\
    \ can get the correlation between these two and add it to the end of the list\
    \ representing the current row inside the matrix. The first line below gets the\
    \ correlation coefficient matrix between the two variables, but we only want one\
    \ of the more useful values. The index pair [0][1] indicates item #1 (the second\
    \ item) in the top row, giving us the top right value. Getting the lower left\
    \ value would be just as useful, but this is the pair I chose to extract. Once\
    \ it is available, it can be appended to the end of the current row in the correlation\
    \ matrix. That is referenced through the variable called `index`, which we initialized\
    \ at 0 so it starts by creating the first row.\n\n```python\n# Get the correlation\
    \ coefficient for the current pair of fields and add it to the end of the row:\n\
