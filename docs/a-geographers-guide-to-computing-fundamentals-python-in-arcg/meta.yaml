  - '[PAGE 106]


    The relevant method names associated with the `result` object are pretty straightforward.
    We can look at the parameters through the inputs in the `result` object. The slope
    example I have above shows six inputs, even though I did not specify six inputs
    in the call to the `slope` function. This is because the `Result` object can still
    represent the default values within its input list, and this parameter list can
    include the output, even though the `arcpy.sa.slope` tool doesn''t even have an
    output raster parameter. Likewise, the information that pops up when you hover
    over the Get Cell Value includes as one of the parameters, the output value.


    # Question 6: Using `cell.inputCount`, how many inputs were there?


    Notice, also, that there are messages. As with counting the inputs and outputs,
    we can count how many messages there are with `cell.messageCount`. We can also
    find out what they are with the following command:


    ```

    cell.getMessages()

    ```


    This shows us all the messages at once, as I have below (using a different set
    of X and Y coordinates, so the answer to question 5 is still not given here).


    ```

    >>> cell.getMessages()

    ''Start Time: Wednesday, October 6, 2021 9:23:48 PM\n0\nSucceeded at Wednesday,
    October 6, 2021 9:23:48 PM (Elapsed Time: 0.09 seconds)''

    ```


    It might seem odd that there is one long line here (stretching onto a second line)
    for three messages. However, buried in the middle, you will see “\n0\n.” The \n
    characters represent “new lines.”⁶ If I print the messages instead of just accessing
    them, this will become clearer.


    ```

    print(cell.getMessages())

    Start Time: Wednesday, October 6, 2021 9:23:48 PM

    0

    Succeeded at Wednesday, October 6, 2021 9:23:48 PM (Elapsed Time: 0.09 seconds)

    ```


    We can access the messages individually in order, using the `cell.getMessage(index)`
    method, using 0, 1, or 2 for the index.


    The last property of the result object we will look at here is the severity, which
    represents the type of messages that were created. As you’ll see later, when creating
    your own tools, there are three types of messages: informative messages, which
    have a severity value of 0, that just provide information; warnings, which have
    a severity value of 1, that convey potential problems to the user even though
    the tool did operate and produce an output; and errors, which have a severity
    value of 2, that tell the user the tool did not finish.


    # Question 7: Using the `maxSeverity` property, what is the “worst” kind of message
    this tool produced? How many (if any) warnings and errors did it produce?


    Through these commands, you can see how `result` objects are useful in recording
    what was done and what the script produced. This allows us to save and record
    information about the outputs and the process, while the script itself only records
    the inputs to the functions.


    Before moving on, we will see another way of calculating the slope. In the documentation
    for the Spatial Analyst slope tool you looked at for question 1, you might have
    noticed a recommendation to use a newer tool for the slope: Surface Parameters.
    It provides a bit more flexibility in how the slope is calculated and “provides
    a newer implementation.” Following the link to the Surface Parameters tool, we
    can see a few more input parameters allowing us to specify the neighborhood more
    precisely, including larger neighborhoods and adaptive neighborhoods. To compare
    against the slope tool, which uses a 3x3 fixed window, we will use the default
    window specifications here, which are also 3x3 and fixed.


    ```

    slope2 = arcpy.sa.SurfaceParameters("morg3m", "SLOPE")

    ```


