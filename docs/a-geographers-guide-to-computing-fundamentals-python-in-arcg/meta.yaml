    ## --> --> distanceList.append(distance)\n    distanceList.append(distance)\n\n\
    这次，它通过了。太棒了！但消息多次报告了总里程，这很不寻常，而且如果我们试图估算进出这个繁忙的伦敦枢纽的总英里数或公里数，这个数字也偏低。首先，多次报告的问题很容易解决。仔细一看，我不小心将\
    \ `arcpy.AddMessage()` 函数缩进得太深了，所以它为连接文件的每一行都报告了。我会将其减少一级缩进并重新运行代码：\n\n```\nThe\
    \ total mileage is 971.255393840486\n```\n\n好多了，但数字仍然可疑地低。`distanceTo()` 方法使用输入数据的坐标系，在本例中是十进制度。相反，我们想使用能给出全球一致单位的东西，比如米或英里。我研究了不同的几何方法，找到了\
    \ `angleAndDistanceTo()`，根据文档，它可能有用，因为它的返回值中包含“距离（以米为单位）”。我会尝试它，将距离部分改为下面所示的样子，这行代码在两处使用：\n\
    \n```\ndistance = cityGeom.angleAndDistanceTo(userGeom)[1] / 1000\n```\n\n运行该工具后，给出了以下输出：\n\
    \n```\nThe total mileage is 75670.04804482049\n```\n\n这是一个好得多的结果，尽管看起来我们可能需要修复输出消息，因为“mileage”（英里数）这个词可能不适用于公里！我还加入了一个\
    \ `round` 函数来限制显示的位数：\n\n```\narcpy.AddMessage(\"The total distance is \" + str(round(totalMileage))\
    \ + \" km.\")\n```\n\n再次运行后得到以下结果：\n\n```\nThe total distance is 75670 km.\n```\n\
    \n虽然不明显，但这里还嵌入了另一个逻辑错误。枢纽之间的航班被列出了两次。这意味着，例如，从伦敦到巴黎的航班被计算了两次，一次是在读取伦敦行时，另一次是在读取巴黎行时。事实上，我们可以通过一点创造力和一个我尚未正式介绍但你们中的一些人可能已经发现的关键字来修复这个问题：`break`。这个关键字强制代码无论何种情况都退出一个\
    \ Python 循环。我在这里要做的是，如果一个城市不是枢纽，就保持代码不变，因为错误只出现在两个枢纽城市之间的连接上。不过，我必须改变它处理枢纽的方式。由于枢纽的所有航班都列在那一行中，对于枢纽，我唯一需要的信息就在那一行中。所以如果我遇到一个枢纽，我会将距离列表重置为空，将\
    \ CSV 文件该行内的所有内容追加进去，然后中断循环以确保不再向其中添加任何内容。这最终确保只有该行内的距离对枢纽的总距离有贡献：\n\n```\n# -->\
    \ if position == 1: 注意：我在代码中将 1 更正为 0\n    if position == 0:\n        distanceList\
    \ = []\n# --> --> for city in line[1:end] :\n        for city in line[1:]:\n\n\
    # --> --> --> cityGeom <-- getGeomOfCity(city)\n            cityGeom = getGeomOfCity(city)\n\
    \n# --> --> --> userGeom <-- getGeomOfCity(userCity)\n            userGeom = getGeomOfCity(userCity)\n\
    \n# --> --> --> distance <-- cityGeom.distanceTo(userGeom)\n# 回顾几何练习中的 .distanceTo()\
    \ 方法\n            distance = cityGeom.angleAndDistanceTo(userGeom)[1] / 1000\n\
    \n# --> --> --> distanceList.append(distance)\n            distanceList.append(distance)\n\
    \            break\n```\n\n修复这个问题后，又发现了另一个错误，即变量 `totalMileage` 在需要时未定义。这似乎不寻常：\n\
    \n```\nTraceback (most recent call last):\n  File \"D:\\books\\PythonManual\\\
    Chapter17\\Chap17.py\", line 81, in <module>\n    arcpy.AddMessage(\"The total\
    \ distance is \" + str(round(totalMileage)) + \" km.\")\nNameError: name 'totalMileage'\
    \ is not defined\n```\n\n查看代码中的这一行，我们发现存在一个缩进问题。它缩进了一级，因此位于 `for` 循环的代码中。当我们因为伦敦是\
    \ CSV 文件第一行的枢纽而中断 `for` 循环时，意味着循环的剩余部分从未运行过，甚至一次也没有。这意味着 `totalMileage` 从未被初始化，并且其初始化之后的\
    \ `for` 循环也从未执行。这意味着我需要将 `totalMileage` 的初始化和第二个 `for` 循环取消缩进，以确保它们不在第一个 `for`\
    \ 循环内部。毕竟，我想在追加所有内容并查看整个 CSV 文件之后运行总距离计算，而不是在运行 CSV 文件的循环内部：\n\nThe total distance\
    \ is 40230 km.\n\n尽管这更好了，但我们还没有完成测试。软件应该通过一系列检查来测试，所以仅仅因为它通过了一个参数化测试，并不能保证它能通过所有可能的参数化测试。最好还是看看对于在连接文件中但不是枢纽的城市会发生什么，以及测试对于在\
    \ shapefile 中但不在连接文件中的城市，以及一个根本不存在的城市会发生什么。\n我现在将尝试维也纳，这是一个在连接文件中但不是枢纽的城市：\n\n\
    The total distance is 2156 km.\n\n它似乎运行正确，给出了一个较小的数字。现在是马尔默，这是一个靠近哥本哈根的瑞典城市，但未在此连接集中列出：\n\
    \n```\nThe total distance is 0 km.\n```\n\n它给出了零，这很好。最后，我将尝试 Lodnon，这是伦敦的拼写错误版本，不在城市文件中：\n\
    \n```\nThe total distance is 0 km.\n```\n\n它也报告了零，这可能不是我们想要的。唯一会引发错误的情况是在 `getGeomOfCity`\
    \ 中运行搜索游标时，但我们只在连接文件中看到一个城市时才运行该函数。如果我将获取 `userGeom` 变量的操作移到读取参数后立即执行，我就能捕获这个问题。这也意味着要将其放入一个\
    \ `try/except` 块中。回想一下，搜索不存在的内容会引发 `StopIteration` 异常，因此我们将利用这一信息来精确捕获我们需要的内容。我们可以让\
    \ `try/except` 语句更紧凑；当我们知道感兴趣的异常会在特定行生成时，它不必尝试所有内容：\n\n```\n#userCity <-- 通过 arcpy.GetParameter\
    \ 函数从用户输入的城市\nuserCity = arcpy.GetParameter(0)\n\n# userGeom <-- getGeomOfCity(userCity)\n\
    try:\n    userGeom = getGeomOfCity(userCity)\nexcept StopIteration as si:\n  \
    \  arcpy.AddError(\"Your city is not in the database. Please check your spelling\
    \ and/or continent.\")\n```\n\n再次使用 Lodnon 运行它，给出了适当的错误消息：\n\n```\nYour city is\
    \ not the database. Please check your spelling and/or continent.\n```\n\n然而，如果你查看消息，它仍然报告总距离为\
    \ 0 km。这是因为 `AddError()` 函数不会停止整个程序，而只是给出一条错误消息，然后继续执行程序的其余部分。我们可以通过在 `except`\
    \ 子句中设置一个布尔变量来轻松解决这个问题，并且只有在该变量表明没有错误时才报告最终消息：\n\n```\n# userGeom <-- getGeomOfCity(userCity)\n\
    noError = True\ntry:\n    userGeom = getGeomOfCity(userCity)\nexcept StopIteration\
    \ as si:\n    arcpy.AddError(\"Your city is not in the database. Please check\
    \ your spelling and/or continent.\")\n    noError = False\n\n...\n\n# --> 将 totalMileage\
    \ 作为 Arcpy 消息报告\nif noError:\n    arcpy.AddMessage(\"The total distance is \"\
    \ + str(round(totalMileage)) + \" km.\")\n```\n\n我保存了这个，得到了一个更好的结果，只给出了错误消息，而没有额外的零距离声明。"
