    # Task 1: Access Shape Information


    Copy the data to your workspace and add all data to a new map. We will be working
    with the Python Notebook for the guided tasks here, although all of it can be
    done within the Python Window if your version of ArcGIS Pro does not support Notebooks.


    We will now use the shape information encoded in ArcGIS and accessed through ArcPy
    to examine some properties of each of the three primary types of vector shapes.
    Recall from previous chapters that vector feature classes are all subclasses of
    tables. Since we accessed the items in a table through one of three forms of cursors
    and subclasses inherit functionality from their superclasses, we can also use
    any of the three kinds of cursors on our feature classes, too. This works because,
    while in the computer, they are stored separately (e.g., .dbf versus .shp for
    shapefiles); in practice, the geometry and the attributes are stored together,
    such that the file for the table and the file for the geometry must be in the
    same folder, alongside the .shx index file with the information on linking the
    geometry with the table. In fact, the geometry of a feature class is hidden in
    plain sight within the attribute table. Notice that, in any attribute table for
    explicitly spatial data, there will be a column called “Shape,” often the second
    column from the left, although this isn’t guaranteed. All of this column’s contents
    in the attribute table will tell you the type of geometry it is (e.g., “Point”).
    Embedded within that geometric shape, although not readily accessible through
    the attribute table, is the geometry information of that feature. Even though
    the attribute table doesn’t give us direct access to the geometries, we can use
    the same ArcPy cursor to access it. We access the geometric information by a special
    built-in variable name, “SHAPE@,” into the list of variables to be accessed when
    constructing the cursor with `SearchCursor()`, `UpdateCursor()`, or `InsertCursor()`.


    Points, lines, and polygons are all accessed through a `Geometry` object, which
    means that all properties are available for all shape types, even if there isn’t
    always a reason to use it, like getting the area of a point geometry. If you know
    the specific piece(s) of information within the geometry that you need, there
    are properties that you can add after the @, such as getting the area through
    `SHAPE@AREA`. These are in the Geometric Tokens segment of the help documentation
    at [https://pro.arcgis.com/en/pro-app/arcpy/get-started/reading-geometries.htm](https://pro.arcgis.com/en/pro-app/arcpy/get-started/reading-geometries.htm),
    but we will use the generic geometry `SHAPE@` for this chapter. It allows you
    to access all information, although not always as directly.


    Let’s start with the points, which we have in a layer called “Office_cities.”
    To access the geometries, run the following line:


    ```

    cityCursor = arcpy.da.SearchCursor("Office_cities", ["SHAPE@", "DESCRIPT"])

    ```


    Now we will want to examine how geometries work by getting a single geometry out
    of this cursor. In the previous lab, we saw how to use a for loop to cycle through
    the entries of a table. Here, to explore a single geometry, we just want a feature
    from that cursor. Just as we used the `.next()` function to examine a CSV file
    one line at a time, we can use the cursor’s `next()` function to go through the
    cursor’s contents one line at a time, or as here, to limit us to getting the first
    item. Run the following line:'
