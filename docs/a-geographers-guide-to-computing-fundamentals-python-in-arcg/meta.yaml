  md: '# Mapping—Symbologies


    # 12


    # Introductory Comments: Using UML and Class Diagrams to Manage Complex Objects


    We saw in the previous chapters how to investigate, how to manipulate, and, to
    a lesser extent, how to analyze the data structures of our GIS data. These data
    structures are not just intertwined with analysis and geoprocessing but are also
    heavily involved with cartography. There is a lot of computation behind the scenes
    that ArcGIS carries out within the framework of computer graphics, and these also
    relate to the data structures. It has to take spatial coordinates, like a latitude-longitude
    pair, and figure out where on the screen that pair is located. Then there is simplification
    and generalization of vector data, in which the lines and polygon borders are
    potentially simplified to make drawing them faster. This is especially critical
    for small-scale (zoomed-out) maps. If your line for the Monongahela River is very
    detailed, tracking all the small twists and bends, but the map is zoomed out to
    the entire state of West Virginia, it is probably the case that there are entire
    bends contained within a single pixel on the screen. If so, there is no need to
    attempt to draw all the details, when it will make no difference in how the details
    appear on the screen. The Douglas-Peucker line generalization algorithm is a way
    of carrying out this simplification.


    There are similar approaches to simplifying raster data to make it faster to load
    and render. This is through pyramids, which you have probably indirectly encountered,
    because of how often ArcGIS asks whether you want to create pyramids. These are
    representations of the data at different resolutions, merging pixels, because,
    like the bends of the river, there is no need to try to directly represent the
    raster pixels individually if many of them will fit within a single screen pixel.


    All algorithms for these computer graphics depend upon the GIS data structures
    and, in a way, create new GIS data structures, even if they are temporary ones
    for displaying the data on the screen. We will not go into the specific details
    of these computer graphics concerns here, because ArcGIS handles them for us.
    We will, instead, look at another approach to data structures in computing. While
    it isn’t the kind of data that you directly put onto a map, there is a lot of
    information contained in the representation of how the map is constructed from
    the GIS data. This extra information, like how many layers are in the map, what
    color a certain feature class is, and the class breaks for a choropleth map, also
    all need to be represented within the computer. This cartographic information
    takes the form of another series of computational data structures. This chapter
    and the next one look at these computational data structures within the arcpy
