    \ 县，而不仅仅是一个属性。\n\n就像每个类蓝图都有一组关联的属性一样，它也有一组方法，每个方法都有特定的输入参数和输出值。例如，`.append()`\
    \ 方法与列表相关联，但与元组不相关，正如我们之前所见，因为列表可以编辑而元组是不可变的。同样，`.lower()` 仅适用于字符串，不适用于字典或列表。运行这些方法的结果也完全取决于对象的状态。例如，每个列表都有一个\
    \ `.sort()` 方法。`.sort()` 方法中的 Python 代码对于每个列表都是相同的，尽管根据其内容，对列表进行排序的结果当然会因列表而异。如果它包含无法排序的数据类型（如对象），它甚至可能给出错误消息。\n\
    \n在处理对象时，这里使用了另一个分隔符，即句点。它是分隔包含对象的变量的名称与该对象内的属性和方法的分隔符。这个句点在语法上区分了属性和变量，以及方法和函数。\n\
    \n在解析属性时，它们都具有以下通用语法：\n\n```\nobject_name.property_name\n```\n\n例如，如果变量 `monongalia`\
