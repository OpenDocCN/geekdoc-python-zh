    In most classes, we cannot simply create the object by putting it in quotes. So
    you might wonder, then, how an object gets created. This is through a specific
    method called a constructor. It has the same name as the class. Thus, creating
    an object of the type `ArcGISProject` uses the constructor method called `ArcGISProject()`.
    Like any other method, constructors may accept parameters, and always need the
    parentheses.


    # Task 3: Parsing Functions and Objects


    Parsing of functions and objects adds another level of complexity to trying to
    understand what is going on in our code and troubleshoot bugs, as well. In what
    we had before, the code was executed line by line from start to finish, with occasional
    skipping over lines, thanks to conditional statements and repeating lines due
    to loops. Functions and objects make this more complex, and therefore, add another
    level of complexity to how the computer both reads and executes the code.


    Specifically, by calling functions, the computer jumps from one part of a script
    to another. For example, if a function is defined in a script on lines 10 through
    36, but is then called in line 85, the code is executed as follows: it reads lines
    83, and then 84, and then when carrying out line 85, it then goes and runs lines
    10 through 36. After that is done, it resumes the code starting at line 86. Therefore,
    while the computer may tell you an error occurred on line 29, if there are multiple
    calls to the same function, say on lines 50, 74, and 105, that isn''t enough information
    to truly identify what is going on, in case the issue relates to the input parameters
    which could be different on lines 50, 74, 85, and 105. That additional information
    is necessary. To resolve this, the computer tracks an entire stack of information,
    each layer in the stack representing a part of how the computer got to the line
    it is currently executing. This is needed because just knowing how the top line
    of the stack, line 29 in the example, is insufficient, because there could be
    many ways of getting to line 29, and perhaps there is an error leading into one
    of the input parameters, instead of in the function code itself. In this situation,
    you would be told that not only was there an error in line 29, but that it occurred
    in the reference of line 29 that was called by the variable in line 85. This is
    convenient information when trying to narrow down the potential source of the
    problem and perhaps identify an error on line 83, which would be involved in the
    selection of values that get passed to the parameters of the function.


    To illustrate this, let''s create an error. Recall from Chap. 2 that setting the
    price variable to a string caused problems with code that assumes it is a number
