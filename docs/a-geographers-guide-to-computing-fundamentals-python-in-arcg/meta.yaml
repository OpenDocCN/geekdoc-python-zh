  md: 'digm, thanks in part to a scripting environment called Jupyter,³ which is the
    underlying technology for the Python Notebook in ArcGIS Pro. We will use it intermittently
    with the Python Window starting in Chap. 3. The third approach for ArcGIS Pro
    here is IDLE, which stands for “Integrated Development and Learning Environment”
    and is a programming environment that is included in the installation of ArcGIS
    Pro. It supports the most complexity in programming and debugging, and as such,
    when we shift from scripting to programming to support writing new Python-based
    tools to enhance ArcGIS Pro, we will use IDLE more extensively. To show its potential
    for investigating and debugging code, IDLE is introduced in Chaps. 5 and 6.


    Recall from the introductory comments that the scenario here is managing the roster
    for a GIS training seminar. The first thing we may want to do is set up a few
    basic properties of our seminar, like the name, address, and registration cap.
    In Computerese, these are equivalent to nouns. These can all be *variables* within
    our script. Variables are containers that hold values, and are referred to by
    names. You can think of a variable as a box that has a label on it for its name
    (Fig. 2.1).


    Start ArcGIS Pro with a new project. Select “Map” under a new “Blank Template.”
    Give it a sensible name, like Exercise2. Go to the Analysis ribbon and open the
