  md: "This is, it so happens, the biggest of the methods. The next method in our\
    \ code, assess(), is, as you can see in the flow chart, the easiest to implement:\n\
    \n```\ndef assess(self):\n    buildingRate = self.typeValueDict[self.buildingType]\n\
    \    return self.baseValue * self.lotArea + buildingRate * self.buildingArea\n\
    ```\n\nYou may notice, however, that this method uses a few properties that are\
    \ not created in the __init__() method. This refers back to the idea above of\
    \ public and private properties. We can create properties that store variables\
    \ that are useful for any instance of the class, but are not impacted by the particular\
    \ parameterization of any instance of this class. Here, the tax rates are not\
    \ changing based upon the parcel, but every parcel needs to be able to access\
    \ those rates for the assessment calculations. We can then set them up with a\
    \ few lines immediately after the class line:\n\n```\nclass Parcel:\n    typeValueDict\
    \ = {\"COMMERCIAL\": 1, \"COMMUNITY\": 0.3, \"EDUCATION\": 0.4, \"GOVERNMENT\"\
    : 0.1, \"HEALTH\": 0.25, \"RECREATION/TOURIST\": 0.9, \"RESIDENTIAL\": 0.7}\n\
    \    baseValue = 0.1\n    threshold = 30\n```\n\nThese lines then set up the rates\
    \ for the buildings based upon their type, as well as the base value rate for\
    \ the lot size. The last one, threshold, is used within the propose() method to\
    \ store the maximum percent of the lot which may be occupied by buildings.\n\n\
    The last method we need to fill in here is the propose() method. Enter it as below.\
    \ Notice that it raises our custom errors to indicate disapproval. It sends up\
    \ an approval error with type 2 if the building type doesn't match that of an\
    \ existing building type and the existing type isn't empty. It raises a type 1\
    \ error if the percent of the lot covered by buildings will now exceed the predetermined\
    \ threshold. Note that the information parameters for the ApprovalError are what\
    \ becomes useful in generating a helpful error message: the new building type\
    \ and the existing building type for the type 2 error, and the percent and the\
    \ threshold for the type 1 error. Notice that if there are no approval errors\
    \ we do not need to reenter the code for calculating the assessment, but instead\
    \ we just call the self.assess() method:\n\n```\ndef propose(self, newArea, newType):\n\
    \    newTotal = self.buildingArea + newArea\n    percent = 100 * (newTotal / self.lotArea)\n\
    \    if newType != self.buildingType and self.buildingType != \"EMPTY\":\n   \
    \     raise ApprovalError(2, self.lotID, newType, self.buildingType)\n    elif\
    \ percent > self.threshold:\n        raise ApprovalError(1, self.lotID, percent,\
    \ self.threshold)\n    else:\n        self.buildingType = newType\n        self.buildingArea\
    \ = newTotal\n        return self.assess()\n```\n\nNow we are ready to try out\
    \ our code."
