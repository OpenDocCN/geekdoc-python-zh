    \ multiCursor resets the primary cursor so that if or when the next() method is\
    \ called again, it will start over at the beginning:\n\n```python\n#define the\
    \ reset function as resetting the primary cursor property\ndef reset(self):\n\
    \    self.primaryCursor.reset()\n```\n\nThis concludes the file, since it only\
    \ has the class."
  mdcn: "## 任务5：为PValue_ch20.py编写Python代码\n\n此文件包含最复杂的逻辑，对应最复杂的流程图。这就是为什么它被放在最后。在讲解过程中，你可能会注意到流程图的设计是为了从ArcGIS工具获取输入参数，不过，正如任务1中提到的，我们这里坚持使用IDLE。这意味着获取数据的方式有所不同。由于这本质上是为第21章连接工具做的初步准备，我将值直接硬编码到文件中，而不是在IDLE\
    \ Python shell中使用`input()`函数从用户那里获取。如果我们坚持使用IDLE shell，那个函数会是更好的方法，尽管它远不如ArcGIS\
    \ Pro灵活，后者允许用户轻松输入要素类列表或字段/汇总过程对的值表。我将从这段代码开始讲解，尽管它出现在文件的末尾。\n\n第一行设置工作空间。接下来的四行创建将要使用的要素类列表。它们都有非常相似的名称，格式为`LISA_Queen_Rand#_GA`，其中只有数字从1到10变化。列表设置好之后，定义了目标要素集和关键字段。最后，没有像后面那样处理值表，而是直接创建了字典，使用名为`LMiPValue`的字段，并找出最小值、最大值、平均值、标准差，以及小于0.1、0.05和0.01的值的计数。所有输入参数都直接指定后，我们可以调用`populateSummaries()`函数：\n\
    \n```python\nARCPY.env.workspace = \"C:\\Users\\jfconley\\Documents\\ArcGIS\\\
    Projects\\PValue\\PValue.gdb\"\nbase = \"LISA_Queen_Rand\"\nfcList = []\nfor i\
    \ in range(10):\n    fcList.append(base + str(i+1) + \"_GA\")\ntargetFC = \"TrumpAndRandom_GA\"\
    \nkeyField = \"SOURCE_ID\"\nfieldSumDict = {}\nfieldSumDict[\"LMiPValue\"] = [\"\
    MINIMUM\", \"MAXIMUM\", \"MEAN\", \"ST_DEV\", \"<0.1\", \"<0.05\", \"<0.01\"]\n\
    \n#populate the summaries\npopulateSummaries(fcList, fieldSumDict, targetFC, keyField)\n\
    ```\n\n回到文件开头，我们需要确保这个Python文件能够访问另外两个Python文件。只要所有文件都存储在同一个文件夹中，这就非常容易实现，这也是我们将要采用的方式。我们可以使用相同的`import`语句来访问我们创建的这些文件。接下来是此函数流程图中每个元素的注释：\n\
    \n```python\nimport arcpy as ARCPY\nimport multiCursor as MULTICURSOR\nimport\
    \ summarize as SUMMARIZE\n\n#define the function and get the list of fields\n\n\
    #Add new fields to target feature class\n\n#Create the multicursor\n\n#for each\
    \ feature in an update cursor of the target feature class\n\n#extract that feature's\
    \ values using the multicursor.\n```\n\n获取要素行的下一步被放在一个try块中，因为要素类可能不包含该要素。我们尝试获取搜索游标中的下一行并将其附加到输出中。但是，如果该要素不包含在要素类中，我们将得到一个`StopIteration`错误。因为对于这个类的用户来说，停止迭代错误对应于缺失的要素可能并不明显，所以我们捕获这个错误，并抛出一个带有更有帮助的错误消息的`ValueError`：\n\
    \n```python\n#get the feature's values from that cursor and add it to the output.\n\
    try:\n    row = search.next()\n    output.append(row)\nexcept StopIteration as\
    \ si:\n    raise ValueError(\"The FID provided does not exist in at least one\
    \ feature class in this multicursor: \" + fid)\n```\n\n所有这些完成后，我们可以返回输出：\n\n```python\n\
    #return the output\nreturn output\n```\n\n在进入下一个方法之前，这里还有一个关于算法决策的问题，可能不太明显。在`try`块中，我们只是获取搜索游标中的下一行，没有确认它是否是正确的行，甚至没有尝试从游标中获取任何其他行。\n\
    \n**问题3：为什么我们可以确定`search.next()`会给我们正确的行，并且仅是正确的行，前提是该要素ID存在于要素类中。**\n\n接下来，我们设置`extractField`方法，以字段作为输入参数，并再次将输出初始化为空列表：\n\
    \n```python\n#define the extractField method\ndef extractField(self, field):\n\
    \    #initialize the output to an empty list\n    output = []\n```\n\n我们需要为第一个要素类中的这个字段创建一个游标，并且如上所述，必须使用与存储在属性中的游标不同的游标。由于我们必须创建一个新游标，我们不妨将其缩小到只包含关键字段和正在调查的字段。这在一个`if`语句中，该语句检查确认我们正在查看的字段存在于字段列表中。在最后，你会看到这个`else`子句，它抛出一个`ValueError`来通知用户或程序员所需的字段不在multiCursor的字段列表中：\n\
    \n```python\n#create a cursor for just that field in the first feature class\n\
    if field in self.fields:\n    localPrimarySearch = arcpy.da.SearchCursor(self.featureClasses[0],\
    \ [self.keyID, field])\n```\n\n一旦创建，我们遍历它，并可以用其第一个元素（来自第一个要素类的值）初始化输出表中该要素的行。根据我们上面定义搜索游标的方式，这保证是`feature[1]`。我们知道相关的ID值在第零项，正确的字段值在第一项：\n\
    \n```python\n#for each feature in that cursor\n    for feature in localPrimarySearch:\n\
    \        #initialize the row in the output to a list containing the value from\
    \ that\n        #feature/field combination\n        thisRow = [feature[1]]\n```\n\
    \nID值在第零项有助于我们为该要素创建查询，因此我们可以确保在查看所有其他要素类时，我们查看的是正确的要素。因为即使所有要素都相同，也不能保证游标顺序相同，所以我们必须在剩余的要素类中单独搜索每个要素，以确保所有值都正确对齐。因此，我们需要这个查询：\n\
    \n```python\n#create a query for this feature\n    currentKey = feature[0]\n \
    \   currentKeyQuery = '\"' + self.keyID + '\" = ' + str(currentKey)\n```\n\n然后我们可以遍历所有剩余的要素类。注意，我通过排除第一个要素类来对要素类列表进行子集化。那是我们已经查看过并通过初始化行为其值添加到行中的那个，所以这个for循环可以从索引1处的要素类开始，而不是索引0：\n\
    \n```python\n#for each remaining feature class\n    for fc in self.featureClasses[1:]:\n\
    ```\n\n我们可以使用该查询为要素类生成一个搜索游标。在这个游标内，我们可以使用与问题3相同的原理，简单地获取下一行，并且我们已经知道我们对该行中的第#1项感兴趣，这是基于游标的构建方式。该值被附加到行的末尾：\n\
    \n```python\n#create a search cursor for that feature/field combination\n    search\
    \ = arcpy.da.SearchCursor(fc, [self.keyID, field], currentKeyQuery)\n    #add\
    \ the value to the end of the row\n    thisRow.append(search.next()[1])\n```\n\
    \n在行结束时，将其添加到输出中。注意这里的缩进！\n\n```python\n#when all feature classes are done, add\
    \ this row to the output\n    output.append(thisRow)\nelse:\n    raise ValueError(\"\
    The provided field is not in the list of fields for this multicursor: \" + field)\n\
    ```\n\n最后，我们可以返回输出：\n\n```python\n#return the output\n    return output\n```\n\
    \n这个类的最后一个方法是最简单的。重置multiCursor会重置主游标，以便如果或当下次调用next()方法时，它将从头开始：\n\n```python\n\
    #define the reset function as resetting the primary cursor property\ndef reset(self):\n\
    \    self.primaryCursor.reset()\n```\n\n至此，文件结束，因为它只包含这个类。"
