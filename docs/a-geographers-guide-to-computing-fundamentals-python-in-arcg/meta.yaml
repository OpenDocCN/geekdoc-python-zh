  md: 'or is a stand-alone table. For example, if you have a geodatabase (GDB) feature
    class of West Virginia counties, and a separate table, without any attached spatial
    component, of election results to join with that shapefile, both are Tables, but
    only the GDB feature class is a feature class. This illustrates that, under some
    circumstances, we can have an object that is a member of a superclass without
    it having to belong to any of the specific subclasses. A CSV file that you load
    into ArcGIS Pro will be a Table, but will not be any of the subclasses of Table,
    such as Feature Class or GDB Table. This doesn’t always happen for superclasses,
    but is in this case. For example, a generic dataset cannot exist without being
    one of the subtypes of dataset even though a generic table can exist.


    The second lesson is that a subclass can inherit from multiple superclasses. Observing
    the arrows, we can see that the GDB Feature Class inherits from both the GDB Table
    and the Feature Class. This means that any of the methods and properties associated
    with the GDB Table are associated with the GDB Feature Class, as is everything
    associated with the Feature Class. This ability to have multiple inheritance gives
    a great deal of flexibility to the class structure in Python in general and ArcPy
    in particular.


    We will begin to work with GIS data using the `arcpy.Describe()` function and
    the resulting description object, and use those to investigate some of the inheritance
    structure for GIS datasets within ArcPy.


    # Task 1: Using arcpy.Describe


    There are many scenarios where, as you are carrying out a GIS project, you are
    given some data which you do not know much about. Before you begin to work with
    it, you may wish to examine it some. While this could be done through the GUI
    in ArcGIS Pro, we will use ArcPy. Scripting can help here because you may consistently
    want to know the same pieces of information about your incoming data, ensuring
    a script is more useful than pointing and clicking. Moreover, if you are managing
    a very large project, you can be receiving more datasets than you can keep up
    with, thus needing the speed of the computer to help manage the flow of data.


    This examination is through the Describe object, which we can access through the
    `arcpy.Describe()` function.² The Describe object is somewhat unique in that it
    has no methods, only properties. For that matter, it only has read-only properties—you
    cannot even write to the object. This may seem unusual, but recognize that for
    most of the properties, they are based upon the data used to create the object,
    and we want to ensure that the Describe object perfectly matches the data. Therefore,
    allowing us to write to (and therefore edit) the properties stored in the Describe
    object without making any changes to the corresponding data would make the Describe
    object incorrect. This is, to say the least, undesirable, so all properties have
    been marked as read-only.


    Before we can use the Describe object to examine data, we need to have data to
    look at. I have provided a few for you on the common drive. Copy the data from
    the Lab6 folder to a new Lab6 folder on your N: drive (or wherever else you want
    to use as your workspace).


    Open ArcGIS and *set the environment workspace* to the folder in which you have
    placed this chapter’s data. You can use either the Python command or the ArcGIS
    GUI. There is no need to load the data to the map, although you are welcome to
    do so. It is, in fact, more critical that you set the environment workspace to
    the same place the data has been loaded, as the following lines will not work
    unless the workspace is pointed in the right direction.


    In a new Python Notebook, run `arcpy.ListFeatureClasses()`.


    **Question 1: How many feature classes are in the data folder?**


    Now run `arcpy.ListRasters()`.


    **Question 2: How many raster datasets are in the data folder?**


    Now run `arcpy.ListTables()`.


    **Question 3: How many tables are in the data folder?**


    > ²If you’ve been observant, especially of the ArcPy documentation, you might
    recognize that the arcpy.Describe() function is, in fact, the constructor for
    an object of the type Describe. This will then be used shortly to create a variable
    of this class type.'
