    will help you recognize the nature of the bug and thereby fix it. A GIS analogy
    for this is recognizing that all the vector data in a GIS is, as far as the geometry
    is concerned, built upon the basics of points, lines, and polygons. Even though
    you might not think explicitly about the point coordinates when carrying out an
    analysis, having an understanding of how those points work and the properties
    of them, like what coordinate system and projection they are using, can help you
    to identify and troubleshoot different problems of analysis, such as when two
    datasets that should overlap don''t because they are using different coordinate
    systems. Likewise, understanding how the computer breaks down the script into
    those building blocks, and the properties of those building blocks, can help you
    debug and troubleshoot error messages that arise when you are writing a script.


    The first step in breaking down a line of code, or parsing it, is to identify
    the constituent parts of that line. This is equivalent to having to break a sentence
    down into the individual words that make up that sentence. Parsing is, in other
    words, how the computer reads Computerese. In computer science, these individual
    parts are called tokens, and different kinds of tokens fulfill different aspects
    of Computerese, much like nouns, verbs, and adjectives all have different roles
    within spoken language. I''ll illustrate the premise of parsing and breaking down
    the code with a few examples below, drawn from the hands-on tasks which appear
    after these introductory comments. In those guided tasks, you will see how to
    enter these Python lines, and others, into ArcGIS Pro to gain experience with
    these ideas.


    The first line is the following. Note that I will use the `courier new` font for
    Python code, which is commonplace for representing computer code in any language
    because it has the advantage that every character is the same width.


    ```

    student_price = price * 0.5

    ```'
  - '[PAGE 18]


    Each line, no matter how long or short it is, gets broken into these tokens. This
    is a simple line, which you can probably deduce from a little algebra sets the
    student price of something at half the regular price. The computer, though, lacks
    the common sense to figure it out, and must read it, token for token. However,
    first, the computer has to figure out what the individual tokens are in this line.
    This is a straightforward splitting of the line based upon where the spaces are.
    I''ve divided it into tokens using background shading. Each switch between light
    and dark background indicates a new token.


    ```

    student_price = price * 0.5

    ```


    Once this is done, the computer recognizes `student_price` and `price` as names.
    While we might recognize this by looking at it as them being variables, the computer
    doesn''t know it yet. It does, though, automatically recognize `=` and `*` for
    the mathematical operations they represent, and `0.5` as a number. Based upon
    how the `=` operator works, the computer either creates a new variable called
    `student_price`, or it changes the value already assigned to that variable. Meanwhile,
    `price` must be a variable, and one that is a number at that. Otherwise, there
    will be an error, the nature of which will be covered in Chap. 6 on debugging.


    The second line adds a new element, in which not all words are names.


    ```

    paid = True

    ```


    However, the idea of splitting the line into tokens at each space still remains.
    This gives the following breakdown:


    ```

    paid = True

    ```


    As with the first line, it creates or reassigns the value of a variable called
    `paid`. This time, though, the other word, `True`, is not a variable, but is itself
    what is called a keyword, or a word with a very specific meaning.


    The next example extends what is a token by introducing the quote marks. These
    must be present in pairs, because when the computer encounters the first quote
    mark, it immediately finds the corresponding ending quote mark and treats everything
    inside, along with the quote marks themselves, as a single token representing
    a piece of text.


    ```

    name = "ArcGIS Training"

    ```


    The following breakdown has the quote marks underlined to indicate the pairing
    of the two together.


    ```

    name = "ArcGIS Training"

    ```


    The next line builds upon the idea of the quote marks, with a pair of parentheses.
    It also adds commas. You can probably recognize this as a list of names.¹


    ```

    participants = ("John Smith", "Fred Jackson", "Alice Scholl", "Bob Waters", "Eve
    Douglas", "Monty Adams")

    ```


    The parentheses, like the quote marks, function as a pair. If you have one without
    the other, there will be an error message. While the quote marks indicate that
    everything inside of them is a text string, the parentheses tell the computer
    that everything inside of them is a list. Each of the items in the list is separated
    by a comma. The commas and parentheses are deemed here as their own tokens, because
    they fulfill roles in the line of code that are independent of everything around
    them.


    ```

    participants = ("John Smith", "Fred Jackson", "Alice Scholl", "Bob Waters", "Eve
    Douglas", "Monty Adams")

    ```


    ¹As will be clear later, it is not, in strict Python terminology, a list. At this
    point, though, we can colloquially call it a list, so throughout these introductory
    comments, I''ll refer to it as a list.'
  - '[PAGE 19]


    Also, having the more complex line begins to illustrate some more principles of
    how the computer parses a line, particularly the way that it depends upon patterns
    in the sequence of tokens to figure out what the line is doing. In this example,
    there are a few elements in the syntax, or structure, of the line to tell the
    computer that this is a list. The first of these is the matched set of parentheses,
    which here indicate the start and finish of the list. The other part is that what
    is in between those parentheses is a set of things—text strings in this case—each
    separated by a comma. It also determines what is on the right side of the equals
    sign before it attempts to place that value in the variable on the left side of
    the equals sign.


    The next example shows that the parentheses can also impact how other tokens get
    interpreted.


    ```

    print(student_price)

    ```


    The parentheses and its contents function much the same way as above, although
    in this case, it is only a single item in the list.² However, unlike the previous
    line, which took the list of names and set it to be the contents of a variable,
    this one has no = operator to indicate that.


    ```

    print(student_price)

    ```


    Because there is no operator, this changes the syntax of the line, which in turn
    changes how the computer interprets the word print. Because the word print is
    followed immediately by the opening parenthesis, the computer recognizes print
    as a function, not a variable. We will see more detail on functions in Chap. 4.


    The last example here extends this with one more token: a dot.


    ```

    participants.reverse()

    ```


    In this case, the dot, however, doesn''t represent a decimal point, but separates
    two words. Also notice the empty list at the end of the line, as represented by
    the two parentheses with nothing between them. Both the dot and the parentheses
    are critical to the correct running of this line of code.


    ```

    participants.reverse()

    ```


    The dot signifies that the token before the dot, participants in this example,
    must be a variable, and not just any variable. It has to be of one of a set of
    particular types of variables, called objects. What, then, is after the dot is
    something similar to a function, which is what the parentheses indicate. While
    both functions and objects will be used starting in this chapter, Chap. 4 will
    have much more information on both functions and objects.


    # Task 1: Basics of Python


    # Variables, Literals, and Operators


    Before we begin our examination of Python in ArcGIS Pro, we need to know how to
    access Python. There are three primary ways ArcGIS Pro interacts with the Python
    programming language: the Python Window, Python Notebooks, and IDLE. We will start
    with the Python Window, as it is the simplest means of interacting with small
    pieces of Python code. In other software environments, you may have encountered
    the term “Python Shell,” which is what this essentially is. It allows you to enter
    a statement in Python, and that statement will be executed immediately. This can
    be useful for exploring what different elements within the language do, so we
    will be using it for pedagogical purposes here. The next level of complexity is
    the Python Notebook, also integrated with recent versions of ArcGIS Pro. It allows
    you to work with snippets of code which can be multiple statements, and execute
    them in batches. The practice of Python scripting is moving toward the notebook
    paradigm.


    > ² Just like you may well go to the grocery store with a list of one item: milk,
    a list in Python can have only one item. It can even have zero items, which is
    useful if we want to build a grocery list from scratch, one item at a time. We
    start with an empty grocery list, or a blank piece of paper, and then write items
    on it, like milk, eggs, and bread.'
- md: "## 2.1 变量与数据类型\n\ndigm, thanks in part to a scripting environment called Jupyter,³\
    \ which is the underlying technology for the Python Notebook in ArcGIS Pro. We\
    \ will use it intermittently with the Python Window starting in Chap. 3. The third\
    \ approach for ArcGIS Pro here is IDLE, which stands for “Integrated Development\
    \ and Learning Environment” and is a programming environment that is included\
    \ in the installation of ArcGIS Pro. It supports the most complexity in programming\
    \ and debugging, and as such, when we shift from scripting to programming to support\
    \ writing new Python-based tools to enhance ArcGIS Pro, we will use IDLE more\
    \ extensively. To show its potential for investigating and debugging code, IDLE\
    \ is introduced in Chaps. 5 and 6.\n\nRecall from the introductory comments that\
    \ the scenario here is managing the roster for a GIS training seminar. The first\
    \ thing we may want to do is set up a few basic properties of our seminar, like\
    \ the name, address, and registration cap. In Computerese, these are equivalent\
    \ to nouns. These can all be *variables* within our script. Variables are containers\
    \ that hold values, and are referred to by names. You can think of a variable\
    \ as a box that has a label on it for its name (Fig. 2.1).\n\nStart ArcGIS Pro\
    \ with a new project. Select “Map” under a new “Blank Template.” Give it a sensible\
    \ name, like Exercise2. Go to the Analysis ribbon and open the Python Window.\
    \ If you have a version of ArcGIS Pro that is sufficiently updated to have both\
    \ the Python Window and Python Notebook, make sure you are using the Window.\n\
    \nFirst, a note about the Python Window you now see. It has two parts. The lower\
    \ part, which is currently one line, reads “Enter Python code here.” Here, you\
    \ will enter Python code line by line, and it gets executed as soon as the statement\
    \ is completed. Chapter 3 shows how statements can be longer than a single line.\
    \ The results of executing the statements you enter below are given in the top\
    \ part of the Window.\n\n![](img/37990581b275bdf7d510c6f2d9702a31_20_0.png)\n\n\
    Creating variables in Python is straightforward. All we need to do is type the\
    \ following line:\n\n- `name = \"ArcGIS Training\"`\n- Hit the Enter key.\n\n\
    Now the line appeared above, and the code entry line is once again blank. This\
    \ means that the previous line was executed.\n\n![](img/37990581b275bdf7d510c6f2d9702a31_20_1.png)\n\
    \n**Fig. 2.1** The x variable\n\nYou don’t see anything else, because the line\
    \ simply created the variable, and gave it a value. It did nothing with the variable.\
    \ We now have a box labeled *name* with the content “ArcGIS Training” (Fig. 2.2).\n\
    If we want to do something with it, we can print the value of the variable out\
    \ with a `print` function.\n\n- In the entry line, type `print(name)` and press\
    \ Enter.\n  It printed out the value of the variable name, which we just set to\
    \ “ArcGIS Training.”\n\n![](img/37990581b275bdf7d510c6f2d9702a31_21_1.png)\n\n\
    Instead of constantly repeating the image of the Python Window from here on out,\
    \ I will represent the output with the executed statement first following three\
    \ > characters, and then the output (if any). Those who have used other programming\
    \ shells, including the one in IDLE, may recognize this convention.\n\n```\n>>>\
    \ print(name)\nArcGIS Training\n```\n\nWithout getting too far ahead in the analogy\
    \ of Computerese, the lines you just entered were both statements, or sentences,\
    \ within Python. As with English and other languages, and as stated in the introductory\
    \ comments, all statements have a specific grammar, or syntax, that they must\
    \ adhere to.⁴ The syntax of setting up a variable is as follows, with at least\
    \ three\n\n![](img/37990581b275bdf7d510c6f2d9702a31_21_2.png)\n\n**Fig. 2.2**\
    \ The *name* variable\n\n> ⁴Or “to which they must adhere,” depending upon the\
    \ grammar rules you prefer. As we will see later, especially in Chap. 6, humans\
    \ reading English can handle flexibility and ambiguity like this. Computers reading\
    \ Python cannot.\n\ntokens, the first of which is the name of the variable, the\
    \ second of which is the equals sign, and the remainder of the line is an expression\
    \ which will evaluate to whatever you want to store in that variable.\n\n```\n\
    [variable name] = [value]\n```\n\nIn this syntax, the equals sign is an *operator*.\
    \ Operators act in many ways as the verbs in Computerese. Just as a sentence without\
    \ a verb does nothing (and is typically not permitted), operators hold the actions\
    \ that the computer will take. In this case, the operation is setting a value\
    \ for a variable. Other common operators are mathematical operations (like +,\
    \ -, etc.).\n\n- Use this syntax to create two more variables corresponding to\
    \ the following boxes.\n- Note that for numbers, you do not need quote marks.\
    \ In fact, the computer will read “9” as a text string containing the character\
    \ 9 instead of a number (Fig. 2.3).\nWhen complete, you should have the following:\n\
    \n```\n>>> address = \"98 Beechurst Ave.\"\n>>> cap = 20\n```\n\nYou may have\
    \ noticed that we have two different kinds of variables here: two text strings\
    \ and a number. In some programming languages, you have to specify the *type*\
    \ of variable, such as text string, integer, or real number. Python handles this\
    \ for you, so you do not have to specify, although the types do nonetheless exist,\
    \ and can limit what is or isn’t possible within a line of code. To illustrate\
    \ this, let’s create one more variable: price. At first glance, for printing brochures,\
    \ you might want the price to be a string that includes the dollar sign.\n\n-\
    \ Type `price = \"$100.00\"`\n- Hit enter.\n\nAfter some consideration, you realize\
    \ you might have to calculate discounts, such as a 50% student discount. Let’s\
    \ try multiplying the price variable by 0.5.\n\n- Type `student_price = price\
    \ * 0.5` and hit Enter.\nYou should have an error message, undoubtedly the first\
    \ of many that you will encounter as you learn programming.\n\n**Question 1:**\
    \ Use your own words to paraphrase the last line of the error message, about why\
    \ the error happened. (In other words, do not simply transcribe the error message.)\n\
    \n```\n>>> price = \"$100.00\"\n>>> student_price = price * 0.5\nTraceback (most\
    \ recent call last):\n  File \"<string>\", line 1, in <module>\nTypeError: can't\
    \ multiply sequence by non-int of type 'float'\n```\n\n![](img/37990581b275bdf7d510c6f2d9702a31_22_0.png)\n\
    \nPython handles the bookkeeping of which data type is contained in each variable\
    \ behind the scenes, making it very easy to change the type of the variable. We\
    \ simply reassign the value. This is equivalent to taking the text string “$100.00”\
    \ out of the box labeled price and putting the number 100 into it.\n\n- Type `price\
    \ = 100.00` and press Enter.\n- Now we want to reenter `student_price = price\
    \ * 0.5`. You can press the up arrow key twice to bring back this line, as the\
    \ up and down arrow keys navigate forward and backward in the history of the Python\
    \ statements you have entered during this session. Once you have it, press Enter.\n\
    - Lastly, type `print(student_price)` and press Enter to confirm its value.\n\n\
    ```\n>>> price = 100\n>>> student_price = price * 0.5\n>>> print(student_price)\n\
    50.0\n```\n\nThere are several data types in Python, and all programming languages,\
    \ for that matter. Some of the most common ones are text strings; integers, which\
    \ in Python are called short and long types; real numbers, which in Python are\
    \ float and double types; Boolean variables, which are True or False; sequences,\
    \ which will be covered in more depth shortly; the `none` type, which corresponds\
    \ to an empty box; and other, more complex custom-designed object types, such\
    \ as an ArcGIS feature class or map legend. Continuing the box analogy, we can\
    \ represent them with different colored boxes. Text strings are green; numbers\
    \ are blue, with integers darker than real numbers; a Boolean value is orange;\
    \ and the `none` type is red (Fig. 2.4).\n\n![](img/37990581b275bdf7d510c6f2d9702a31_23_0.png)\n\
    \nThere are different integer types with obscure names, as well as different real\
    \ number types with obscure names for the following reason. All numbers have to\
    \ be represented in binary—that is, 0s and 1s. Computers are designed such that\
    \ each number should be a consistent number of binary digits (aka bits) long.\
    \ In the early days of computer programming, they figured that 32 bits would be\
    \ sufficient, as it can take 2^32 distinct values, ranging from about -2.15 billion\
    \ to 2.15 billion. Engineers and programmers soon realized that this wasn’t enough.\
    \ Because many operations were developed with a 32-bit number in mind, they created\
    \ a different data type that is 64 bits. To distinguish them, they are called\
    \ short integers and long integers, which gives you the data types `short` and\
    \ `long`. Real numbers are more complicated. They break the 32 bits into two parts\
    \ and use scientific notation, representing 504.16 as 5.0416 * 10^2. The larger\
    \ part is the mantissa (5.0416) and the smaller part is the exponent (2). Because\
    \ of the exponent, the decimal point can be considered to “float” within the number,\
    \ rather than be a fixed location. Hence, it is called the `float` type. As with\
    \ the integers, it became apparent that 32 bits was insufficient, and a 64-bit\
    \ real number type would be needed. Since it has double the number of bits as\
    \ a float, it is called the `double` type."
  mdcn: "## 2.1 变量与数据类型\n\n这在一定程度上得益于一个名为 Jupyter³ 的脚本环境，它是 ArcGIS Pro 中 Python Notebook\
    \ 的底层技术。从第 3 章开始，我们将把它与 Python 窗口交替使用。ArcGIS Pro 的第三种方法是 IDLE，它代表“集成开发与学习环境”，是\
    \ ArcGIS Pro 安装中包含的一个编程环境。它支持最复杂的编程和调试，因此，当我们从脚本编写转向编程以支持编写新的基于 Python 的工具来增强\
    \ ArcGIS Pro 时，我们将更广泛地使用 IDLE。为了展示其在代码调查和调试方面的潜力，IDLE 将在第 5 章和第 6 章中介绍。\n\n回顾引言部分的说明，这里的场景是管理一个\
    \ GIS 培训研讨会的人员名单。我们可能想做的第一件事是设置研讨会的一些基本属性，比如名称、地址和注册上限。在计算机术语中，这些相当于名词。这些都可以成为我们脚本中的*变量*。变量是保存值的容器，并通过名称来引用。你可以把变量想象成一个盒子，上面贴着它的名称标签（图\
    \ 2.1）。\n\n启动 ArcGIS Pro 并创建一个新项目。在新的“空白模板”下选择“地图”。给它一个合理的名称，例如 Exercise2。转到“分析”功能区并打开\
    \ Python 窗口。如果你的 ArcGIS Pro 版本足够新，同时包含 Python 窗口和 Python Notebook，请确保你使用的是窗口。\n\
    \n首先，关于你现在看到的 Python 窗口，有一点需要说明。它分为两部分。下面部分目前只有一行，显示“在此处输入 Python 代码”。在这里，你将逐行输入\
    \ Python 代码，一旦语句完成，它就会被执行。第 3 章将展示语句如何可以长于单行。你输入的语句执行结果将显示在窗口的顶部部分。\n\n![](img/37990581b275bdf7d510c6f2d9702a31_20_0.png)\n\
    \n在 Python 中创建变量非常简单。我们只需要输入以下行：\n\n- `name = \"ArcGIS Training\"`\n- 按下回车键。\n\
    \n现在这一行出现在上方，代码输入行再次变为空白。这意味着前一行已被执行。\n\n![](img/37990581b275bdf7d510c6f2d9702a31_20_1.png)\n\
    \n**图 2.1** x 变量\n\n你看不到其他任何东西，因为这一行只是创建了变量并赋予了它一个值。它没有对变量做任何其他操作。我们现在有了一个标有 *name*\
    \ 的盒子，内容为“ArcGIS Training”（图 2.2）。\n如果我们想对它做点什么，可以使用 `print` 函数打印出变量的值。\n\n- 在输入行中，输入\
    \ `print(name)` 并按回车。\n  它打印出了变量 name 的值，我们刚刚将其设置为“ArcGIS Training”。\n\n![](img/37990581b275bdf7d510c6f2d9702a31_21_1.png)\n\
    \n为了避免从这里开始不断重复 Python 窗口的图像，我将用三个 > 字符后跟执行的语句，然后是输出（如果有的话）来表示输出。那些使用过其他编程 shell（包括\
    \ IDLE 中的 shell）的人可能认识这种约定。\n\n```\n>>> print(name)\nArcGIS Training\n```\n\n\
    在不过度深入计算机术语类比的情况下，你刚刚输入的行都是 Python 中的语句或句子。与英语和其他语言一样，正如引言部分所述，所有语句都必须遵循特定的语法或句法。⁴\
    \ 设置变量的语法如下，至少需要三个\n\n![](img/37990581b275bdf7d510c6f2d9702a31_21_2.png)\n\n**图\
    \ 2.2** *name* 变量\n\n> ⁴ 或者“必须遵循”，这取决于你偏好的语法规则。正如我们稍后将看到的，尤其是在第 6 章，阅读英语的人类可以处理这样的灵活性和歧义。阅读\
    \ Python 的计算机则不能。\n\n标记，第一个是变量的名称，第二个是等号，行的其余部分是一个表达式，该表达式将计算为你想要存储在该变量中的任何值。\n\
    \n```\n[变量名] = [值]\n```\n\n在此语法中，等号是一个*运算符*。运算符在许多方面充当计算机语言中的动词。就像一个没有动词的句子什么也不做（并且通常不被允许）一样，运算符包含了计算机将要执行的操作。在这种情况下，操作是为变量设置一个值。其他常见的运算符是数学运算（如\
    \ +、- 等）。\n\n- 使用此语法创建另外两个变量，对应以下盒子。\n- 注意，对于数字，你不需要引号。实际上，计算机将“9”读取为包含字符 9 的文本字符串，而不是一个数字（图\
    \ 2.3）。\n完成后，你应该得到以下内容：\n\n```\n>>> address = \"98 Beechurst Ave.\"\n>>> cap =\
    \ 20\n```\n\n你可能已经注意到，我们这里有两种不同类型的变量：两个文本字符串和一个数字。在一些编程语言中，你必须指定变量的*类型*，例如文本字符串、整数或实数。Python\
    \ 会为你处理这个，所以你不需要指定，尽管类型确实存在，并且可能限制一行代码中可能或不可能的操作。为了说明这一点，让我们再创建一个变量：price。乍一看，对于打印宣传册，你可能希望价格是一个包含美元符号的字符串。\n\
    \n- 输入 `price = \"$100.00\"`\n- 按回车。\n\n经过一些考虑，你意识到可能需要计算折扣，比如 50% 的学生折扣。让我们尝试将\
    \ price 变量乘以 0.5。\n\n- 输入 `student_price = price * 0.5` 并按回车。\n你应该会收到一条错误消息，这无疑是你在学习编程过程中将遇到的众多错误中的第一个。\n\
    \n**问题 1：** 用自己的话解释错误消息的最后一行，说明错误发生的原因。（换句话说，不要简单地抄写错误消息。）\n\n```\n>>> price =\
    \ \"$100.00\"\n>>> student_price = price * 0.5\nTraceback (most recent call last):\n\
    \  File \"<string>\", line 1, in <module>\nTypeError: can't multiply sequence\
    \ by non-int of type 'float'\n```\n\n![](img/37990581b275bdf7d510c6f2d9702a31_22_0.png)\n\
    \nPython 在幕后处理每个变量包含哪种数据类型的簿记工作，使得更改变量类型变得非常容易。我们只需重新赋值即可。这相当于将文本字符串“$100.00”从标有\
    \ price 的盒子中取出，并将数字 100 放入其中。\n\n- 输入 `price = 100.00` 并按回车。\n- 现在我们想重新输入 `student_price\
    \ = price * 0.5`。你可以按两次向上箭头键来调出这一行，因为向上和向下箭头键可以在你本次会话中输入的 Python 语句历史记录中向前和向后导航。找到它后，按回车。\n\
    - 最后，输入 `print(student_price)` 并按回车以确认其值。\n\n```\n>>> price = 100\n>>> student_price\
    \ = price * 0.5\n>>> print(student_price)\n50.0\n```\n\nPython 中有几种数据类型，实际上所有编程语言都是如此。一些最常见的类型有：文本字符串；整数，在\
    \ Python 中称为 short 和 long 类型；实数，在 Python 中是 float 和 double 类型；布尔变量，其值为 True 或\
    \ False；序列，稍后将更深入地介绍；`none` 类型，对应于一个空盒子；以及其他更复杂的自定义对象类型，例如 ArcGIS 要素类或地图图例。继续盒子类比，我们可以用不同颜色的盒子来表示它们。文本字符串是绿色的；数字是蓝色的，其中整数比实数颜色深；布尔值是橙色的；`none`\
    \ 类型是红色的（图 2.4）。\n\n![](img/37990581b275bdf7d510c6f2d9702a31_23_0.png)\n\n存在具有晦涩名称的不同整数类型，以及具有晦涩名称的不同实数类型，原因如下。所有数字都必须以二进制表示——即\
    \ 0 和 1。计算机的设计使得每个数字都应该是固定数量的二进制数字（又称位）长。在计算机编程的早期，他们认为 32 位就足够了，因为它可以表示 2^32\
    \ 个不同的值，范围大约从 -21.5 亿到 21.5 亿。工程师和程序员很快意识到这还不够。因为许多操作是基于 32 位数字开发的，他们创建了一种不同的\
    \ 64 位数据类型。为了区分它们，它们被称为短整数和长整数，这给出了数据类型 `short` 和 `long`。实数更复杂。他们将 32 位分成两部分，并使用科学计数法，将\
