    \ running the search cursor in `getGeomOfCity`, but we only run that function\
    \ when we see a city in the connections file. If I move that to getting the `userGeom`\
    \ variable as soon as I read the parameter, I could catch this problem. It also\
    \ means putting that into a `try/except` block. Recall that searching for something\
    \ that doesn't exist gives a `StopIteration` exception, so we will use this information\
    \ to catch exactly what we need. We can have the `try/except` statement be compact;\
    \ it doesn't have to try everything when we know the exception we are interested\
    \ in would be generated in a specific line:\n\n```\n#userCity <-- Input city from\
    \ the user through the arcpy.GetParameter function\nuserCity = arcpy.GetParameter(0)\n\
    \n# userGeom <-- getGeomOfCity(userCity)\ntry:\n    userGeom = getGeomOfCity(userCity)\n\
    except StopIteration as si:\n    arcpy.AddError(\"Your city is not in the database.\
    \ Please check your spelling and/or continent.\")\n```\n\nRunning it again with\
    \ Lodnon gave the appropriate error message:\n\n```\nYour city is not in the database.\
    \ Please check your spelling and/or continent.\n```\n\nHowever, if you look at\
    \ the messages, it still reports the total distance as 0 km. This is because the\
    \ `AddError()` function does not stop the entire program but simply gives an error\
    \ message and then moves on with the rest of the program. We can easily enough\
    \ remedy this, by setting a Boolean variable while in the `except` clause, and\
    \ only reporting the final message if that indicates there was no error:\n\n```\n\
    # userGeom <-- getGeomOfCity(userCity)\nnoError = True\ntry:\n    userGeom = getGeomOfCity(userCity)\n\
    except StopIteration as si:\n    arcpy.AddError(\"Your city is not in the database.\
    \ Please check your spelling and/or continent.\")\n    noError = False\n\n...\n\
    \n# --> report totalMileage as an Arcpy Message\nif noError:\n    arcpy.AddMessage(\"\
