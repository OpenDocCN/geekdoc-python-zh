    # Task 2: Inheritance of Properties


    In the table for question 4, you should have noticed that any property supported
    by the table (in the row for `tbList[0]`) is also supported by the feature classes
    (the rows for `fcList[#]`). Likewise, a couple properties should be supported
    by everything. We can use the help documentation to investigate how this illustrates
    the ways in which these properties are inherited from superclass to subclass.


    Go to https://pro.arcgis.com/en/pro-app/arcpy/functions/describe-object-properties.htm
    to see what is available for all Describe objects. You should see one of the properties
    in the table above: `name`. Because this is part of the Describe object properties,
    anything that can be described has a name. If you look at the list of all “Describe
    properties” at the left side of the window, you’ll notice there are “Folder properties”
    among others. This means that there are things which can be described (like folders)
    which are not exactly datasets. Therefore, while `name` applies to truly everything,
    even `datasetType` doesn’t apply to absolutely everything possible.


    Follow the link at left to “Dataset properties.” You’ll notice that `datasetType`
    is now listed, among others, but those listed for Describe object are not. However,
    everything that is a dataset still has a name. This property is still accessible
    because it was inherited from the Describe object. The authors of the documentation
    did not reprint all the inherited properties, trusting that you can use the information
    from the Summary section to find those. For example, follow the link to “GDB FeatureClass
