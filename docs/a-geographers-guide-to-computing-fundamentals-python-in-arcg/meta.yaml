    with functions. The one extra thing to notice is the parameters in parentheses
    and curly braces ( { } ). As with the function, any methods you see *must* have
    the tuple of parameters, even if that tuple doesn''t contain any parameters. The
    `save()` function has the parentheses even though it does not require any input
    parameters. These parentheses are, in fact, how the Python syntax distinguishes
    properties from methods. Some parameters in the tuple are themselves in curly
    braces, like the {wildcard} parameter of the `listMaps(...)` method. These parameters
    are optional, in which case Python will use the values you provide if you choose
    to do so, or follow a default value if you do not provide one. The explanation
    column describes what the method does, and specifies what, if anything, gets returned.


