    \ Enter to confirm that we do, indeed, have a Map object instead of a list.\n\n\
    ```\n>>> Ohio_map = aprx.listMaps()[0]\n>>> Ohio_map\n<arcpy._mp.Map object at\
    \ 0x000002AA0CEDA780>\n```\n\nNow we are ready to add our data to the map. There\
    \ are a few ways to do this, but one of them is to make a new layer, which automatically\
    \ gets added to the map. The layer can also allow us to access much of the symbology,\
    \ so this approach will be useful later on.\nType `Ohio_map.addDataFromPath(\"\
    ..your path...\")` and press Enter. While there is a return value for this function,\
    \ it is of little interest at the moment, because the primary interest in running\
    \ this line is to change the map by adding the data. You will now have a map of\
