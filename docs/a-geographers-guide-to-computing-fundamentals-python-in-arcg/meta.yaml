  md: "Question 1: Why would I immediately return the output in the `except` clause,\
    \ instead of using `pass` to simply avoid sorting the unsortable list? In other\
    \ words, think about what would happen if `pass` were used instead and why it\
    \ is not the right choice here.\n\nWith this in place, we are now ready to create\
    \ our Python Toolbox. This step is easy, with the only challenge being to ensure\
    \ it is located in the desired folder. Go to the Catalog panel in ArcGIS Pro,\
    \ and right-click on the Toolboxes entry. Select “New Python Toolbox.” You will\
    \ get a dialog box asking you where to put it and what name to use. The name is\
    \ less important than the location as long as you are consistent with the name.\
    \ The location must be in the chapter21Toolbox folder, alongside the chapter21\
    \ folder, setup.py, and the esri folder. As with the files in Chap. 20, the toolbox\
    \ must be located here to ensure it can find the chapter21 package (Fig. 21.4).\n\
    \nThis creates a toolbox with exactly one tool. That tool, at the moment, has\
    \ no input parameters and does absolutely nothing. This is because the Python\
    \ code associated with this toolbox is a placeholder file generated by ArcGIS\
    \ Pro, and in the next task, we will need to revise it to make it do what we want,\
    \ in this case, allow a tool to carry out the same functionality as in Chap. 20.\n\
    \n# Task 3: Editing the Code to Work in an ArcGIS Pro Python Toolbox\n\nYou might\
    \ have been wondering where the content of the PValue_ch20.py file was going to\
    \ go, since only multicursor.py and summarize.py were copied into the chapter21\
    \ folder. This code will go directly into the Toolbox itself. This means editing\
    \ the .pyt file for the toolbox. Don’t panic at the change in extension. ArcGIS\
    \ Pro uses .pyt for a Python Toolbox, and its contents are Python code. This means\
    \ that it can be edited just like a .py Python file. Now that we are able to access\
    \ the chapter21 package from within ArcGIS Pro, recall that we had to make slight\
    \ adjustments to the PValue_ch20.py program to have the information from the ArcGIS\
    \ Pro custom tool provided within the code instead of getting it from the tool.\
    \ Because, unlike in Chap. 21, we will be running the code through our toolbox,\
    \ we need to make the code appropriate for that setting. To access the toolbox\
    \ code, simply right-click on the toolbox and click “Edit.” This brings up a Python\
    \ file that might look quite daunting at first, but let’s take it in pieces and\
    \ make the changes as we go along.\n\nAt the top are the imports. In addition\
    \ to arcpy, we need our chapter21 imported code. This gives the following imports.\
    \ Note that the MULTICURSOR and SUMMARIZE imports are capitalized so that we can\
    \ reuse as much of the code as possible from Chap. 20 without changes:\n\n```\n\
    import arcpy as ARCPY\nimport chapter21\nfrom chapter21 import multiCursor as\
    \ MULTICURSOR\nfrom chapter21 import summarize as SUMMARIZE\n```\n\nNext is a\
    \ custom class definition for the Toolbox. We will make minimal changes here,\
    \ giving it more suitable values for the `.label` and `.alias` properties. I chose\
    \ “ctt” for the alias as an acronym of Chap. 21 Toolbox. If we wanted more than\
    \ one tool in this toolbox, we would define multiple tool classes after this (such\
    \ as Tool1, Tool2, etc.) and have `self.tools` refer to a list of all the tools\
    \ we define. Here, we only have one, so we can leave it as is:\n\n```\nclass Toolbox(object):\n\
    \    def __init__(self):\n        \"\"\"Define the toolbox (the name of the toolbox\
    \ is the name of the .pyt file).\"\"\"\n        self.label = \"Toolbox\"\n   \
    \     self.alias = \"ctt\"\n\n        # List of tool classes associated with this\
    \ toolbox\n        self.tools = [Tool]\n```"
