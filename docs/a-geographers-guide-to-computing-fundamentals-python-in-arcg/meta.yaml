    Pro这样的桌面GIS来说并不常见。然而，对于那些采用可以从标准计算机处理核心数量之外的并行处理中受益的算法的工具，将其设置为利用网络环境中比其他方式可用的更多处理核心的云计算服务可能是值得的。如果用户通过Web浏览器而不是桌面环境访问GIS，这种对更多处理能力的需求也可能出现在WebGIS环境中。Web浏览器无法假设或访问大量的处理能力，仅仅因为它们通常设计为在各种硬件平台上运行，包括内部处理能力非常有限的设备。为了避免使Web浏览器或使用该浏览器的计算机过载，GIS使用浏览器从用户获取输入信息，但通过独立于浏览器的云计算设置处理计算。


