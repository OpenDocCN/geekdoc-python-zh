    \ of your tool for Chap. 16, but should use the Toolbox script file for Chap.\
    \ 21 here.\n\nGrading criteria are as follows:\n\n- The package is appropriately\
    \ constructed, with the correct folder and file structure.\n- The Toolbox's tool\
    \ has the correct input parameterization in the `getParameterInfo()` method.\n\
    - The Toolbox's tool uses the new package, and correctly accesses it.\n- The tool\
    \ provides the correct behavior for inputs that are acceptable and are unacceptable\
    \ based upon the development criteria laid out in Chap. 16.\n\n## Concluding Remarks\n\
    \nHaving made it all the way to the end of the journey here, some perspective\
    \ may be in order. You have taken steps from beginning to program, learning what\
    \ variables, operators, loops, and conditional statements are, all the way to\
    \ creating your own tools and toolboxes within ArcGIS. These tools have include\
    \ several functions you have written yourself, as well as classes you created\
    \ yourself, spread across several files. To go all the way from the start to the\
    \ finish, here is an accomplishment, and for many of you, will provide the skills\
    \ you need to begin and, hopefully, continue a career in GIS using or developing\
    \ programs for a long time to come. Furthermore, I hope you have the skills and\
    \ confidence to make the transition away from Python if and when ESRI changes\
    \ programming languages. For that matter, these skills can help you move from\
    \ the ESRI line of products to open source GIS programs like QGIS.\n\nEven so,\
    \ no single book can even attempt to cover the wide range of topics that could\
    \ conceivably fit into the realm of GIS programming. Some of these may be useful\
    \ resources for you if you seek to deepen your knowledge about one or more of\
    \ the following topics.\n\n## GIS Algorithms\n\nPerhaps the middle chapters sparked\
    \ your interest in the nuts and bolts of the specific algorithms that enable the\
    \ GIS to work, such as “how does the computer actually take the two geometries\
    \ and find their intersection?” A couple resources for this can be the following\
    \ books.\n\n- Wise, Stephen (2014). *GIS Fundamentals, 2nd ed.* Boca Raton, FL:\
    \ CRC Press.\n- Xiao, Ningchuan (2016). *GIS Algorithms.* London: SAGE.\n- Gold,\
    \ Christopher (2016). *Spatial Context: An Introduction to Fundamental Computer\
    \ Algorithms for Spatial Analysis.* Boca Raton, FL: CRC Press.\n- Lovelace, Robin,\
    \ Jakub Nowosad, & Jannes Muenchow (2019). *Geocomputation with R.* Boca Raton,\
    \ FL: CRC Press.\n\n## Web GIS\n\nMaybe sharing data and code has gotten you interested\
    \ in working more with Web GIS. If so, I can suggest these resources.\n\n- Fu,\
    \ Pinde (2020). *Getting to Know Web GIS, 4th ed.* Redlands, CA: Esri Press.\n\
    - Dorman, Michael (2020). *Introduction to Web Mapping.* Boca Raton, FL: CRC Press.\n\
    \n## Open Source GIS\n\nMaybe after the end of this book, you feel confident enough\
    \ to move away from ESRI entirely and you want to start working with or even contributing\
    \ to open source GIS projects. If so, here are a couple places to start.\n\n-\
    \ Neteler, Markus & Helena Mitasova (2013). *Open Source GIS: A GRASS GIS Approach.*\
    \ New York: Springer.\n- Menke, Kurt, Richard Smith, Jr., Luigi Pirelli, & John\
    \ Van Hoesen (2016). *Mastering QGIS, 2nd ed.* Birmingham, UK: Packt.\n\n## Appendix:\
    \ Unified Modeling Language (UML)\n\nAs you move from simpler to more complex\
    \ programming, from keeping track of simple variables, to objects, to classes,\
    \ and ultimately managing projects containing multiple files, having a way to\
    \ represent all the pieces of your code becomes important. A common way of managing\
    \ this more complex code is through Unified Modeling Language, or UML. While UML\
    \ is intended for managing software systems that are far more complex than what\
    \ it presented within this book, a few aspects nonetheless can be useful here.\
    \ There are 13 different types of diagrams in this visual language¹ within 3 broad\
    \ categories. As such, an appendix here can only touch the surface of the complexity\
    \ that UML can work with, so if you are interested in more information after reading\
    \ this, I suggest looking at the UML organization’s website at http://www.uml.org\
    \ and following the references noted therein.\n\nUML is a visual language which\
    \ can represent a range of levels of abstraction of the processes inherent in\
    \ constructing and maintaining a software system. The first category represents\
    \ the structure diagrams, which depict how different objects, classes, and packages\
    \ are constructed within the code. The UML diagrams presented within this book\
    \ are from this category, so this is what is presented more fully within this\
    \ appendix. The other two categories represent aspects of software development\
    \ that tend to arise and become more relevant with more complex applications than\
    \ we are building within this book. Briefly, behavior diagrams depict the processes\
    \ that take place within the software system. Diagrams in this category are more\
    \ focused on what the components of the system do, rather than how they are constructed.\
    \ They can also represent the actions the users may want the software to do. The\
    \ third type of diagram, interaction diagrams, depict how the different parts\
    \ of the software system communicate with each other. As this book has focused\
    \ primarily upon the structures within coding for GIS applications, this appendix\
    \ focuses on the structure diagrams that are introduced in the chapters to provide\
    \ a more detailed interpretation of how those diagrams are constructed and interpreted.\n\
    \n### Class Diagram: A Single Class\n\nOur entry point into UML is through the\
    \ representation of a single class. Recall from Chap. 7 that classes contain properties,\
    \ which are like object-specific variables and methods, which are like object-specific\
    \ functions. The diagram for a single class concisely depicts these parts of a\
    \ class.\n\nFigure 7.1, reproduced here as Fig. A.1, introduced the concept of\
    \ an object by extending the box metaphor for variables, by presenting an object\
    \ as a crate which can hold a series of boxes. Thus, any object of the class `ArcGISProject`\
    \ is guaranteed to have properties of the type `activeMap`, `dateSaved`, `defaultGDB`,\
    \ etc., as well as methods called `save()` and `listLayouts()`, among others.\
    \ While the colors of the boxes can represent the types of properties, such as\
    \ green for text strings, this approach becomes difficult to scale to larger classes.\
    \ UML class diagrams provide a more formal structure to this sort of visualization.\
    \ Figure A.2 gives a UML class diagram version of Fig. A.1.\n\nThe class diagram\
    \ here has three boxes, matching the three portions of the metaphorical crate.\
    \ Like the label on the top of the crate, the top box contains the name of the\
    \ class. The properties that are in the boxes in the left side of the crate correspond\
    \ to the information in the middle of the three boxes in the class diagram. Each\
    \ property has a single line. The name of the property comes first, followed by\
    \ the type of that property after the colon. The methods, which are on the right\
    \ side of the crate, are presented in the lowermost box in the class diagram.\
    \ Two methods are presented. The name of the method\n\n¹It is 13 as of UML version\
    \ 2.0."
