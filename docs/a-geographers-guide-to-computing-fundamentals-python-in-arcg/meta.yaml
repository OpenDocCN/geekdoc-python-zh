  md: '# Part I

    Getting Acquainted with Python


    This first section of the book introduces you to the basics and fundamentals of
    programming. While the ultimate focus of the book is through the lens of programming
    within a GIS environment, and Python in ArcGIS Pro more specifically, this section
    does not deal much directly with the GIS aspect of the book. Just as you need
    a basic understanding and foundation of concepts like how raster divides the world
    into a grid, and vector represents the world through the geometric primitives
    of points, lines, and polygons before moving into broader and more in-depth concepts
    of geographic information science, a basic understanding of the foundation of
    how computer programs are built is needed before moving on to the more in-depth
    concepts of scripting specifically for a GIS environment.


    With this in mind, the first chapter introduces the processes of scripting and
    programming. It sets out the premise of why scripting is useful, even for those
    who may not develop new algorithms. Following that, the first chapter introduces
    the way of “thinking like a computer,” because when you get down to it, scripting
    is translating the tasks you want to accomplish into a language that a computer
    understands. The next three chapters function as a group, and collectively introduce
    the building blocks of programming languages, starting with variables and operators,
    moving through control statements, and concluding with functions and objects.
    The remaining two chapters of this section develop skills that are beneficial
    to anyone who writes scripts and programs: being able to read and decipher scripts
    that others have written, which may contain commands you are unfamiliar with,
    and being able to interpret error messages and debug them to fix the script.'
  merge: -1
  pgno: 12
- img_proc: true
  md: '# Introduction to Scripting and Programming


    # 1


    # Introductory Comments: Scripting Versus Programming


    Geographic information systems (GISs) are incredibly powerful tools, performing
    a wide range of functions for geographers. As Ron Abler and others wrote, “GISs
    are simultaneously the telescope, the microscope, the computer, and the Xerox
    machine of regional analysis and synthesis of spatial data” (1988). They allow
    us to see the big picture of complex global systems, as a telescope would. They
    allow us to delve into detailed analyses and descriptions, as a microscope would.
    It allows the copying and sharing of geographic data, like a Xerox machine. But
    first and foremost, GIS is the computer of spatial analysis. While the principles
    of spatial analysis and geoprocessing are not strictly dependent upon computers,
    and in some cases, predate computers, the GIS is the primary computational tool
    within geography. After all, with enough time and patience, any GIS operation
    could potentially be done with a sufficiently detailed gazetteer or almanac to
    look up data, a pencil to do any calculations, and a map to draw to communicate
    the results. Even so, some operations are absurdly impractical to carry out in
    these circumstances, and it is all much more feasible with a computational database
    in place of the gazetteer, a processor instead of a pencil, and a monitor or printer
    for the map.


    Recognizing the central nature of computational technology and computer science
    to GIS, this course will introduce concepts and principles of computer science
    underlying geographic information science. These are presented through the lens
    and the skill set of scripting within a geographic information system, specifically
    Python in ArcGIS Pro.


    Throughout the book, you will see two terms: scripting and programming. They are
    similar to each other, and if you ask a dozen programmers what the exact distinction
    is, you’ll probably get at least a dozen different answers, some of whom will
    question whether there is a distinction anymore. Within this book, since there
    are different definitions of this distinction, the difference is in how the code
    is run, which is directly related to the process that you, the programmer, use
    instead of the specifics of the code itself. Scripting is the process of entering
    a small segment of code, often a line or two at a time, and having that code run
    immediately to see what the outcome is. As one reviewer of this book’s proposal
    succinctly put it, “most people call it scripting when they are essentially gluing
    together code segments from Stackoverflow and/or Esri documentation.”


    However, there are limits to this approach to coding, as you move from simple
    tasks to more complex tasks that can rarely be done effectively in short code
    snippets. This means that you may want to have more structured and/or formal approach
    to constructing and executing your Python code. This structure is represented
    by algorithms, which are the focus of task 2 in this chapter, and forms the basis
    of the transition from scripting to programming. Programming is a more structured,
    or methodical, approach to implementing processes in computer code, in which you
    construct an algorithm, and then turn the conceptual algorithm into Python code.


    It is important to note that this distinction, as fuzzy as it is, relates to how
    you, as the coder, approach the Python code you write, not the code that is produced.
    Python can be used for both scripting and programming. The code that you produce
    within a scripting project, “gluing together code segments” in the reviewer’s
    words, can even be similar to the code you develop through programming strategies.
    Within this book, the distinction is most prominent later in the book, as programming
    skills form the basis of constructing new tools and extensions to ArcGIS Pro,
    which is the basis of Parts III and IV of this book. There are times when I will
    also use the term “coding,” which can refer to either scripting or programming.


    © The Author(s), under exclusive license to Springer Nature Switzerland AG 2022

    J. Conley, *A Geographer’s Guide to Computing Fundamentals*, Springer Textbooks
    in Earth Sciences, Geography and Environment, https://doi.org/10.1007/978-3-031-08498-0_1


    3'
  merge: -1
  pgno: 13
- img_proc: true
  md: '# Task 1: Why Use Scripting?


    If you are reading this book, you are probably already familiar with ArcGIS. As
    such, you are aware of both the power of GIS in its graphical user interface (GUI)
    and its limitations. For the power, think of the Toolbox in ArcGIS Pro. There
    are hundreds, if not thousands, of individual tools within the Toolbox. These
    can, in turn, be combined into workflows of several tools to create processes
    more useful and more powerful than any individual tool alone. To make the most
    of these tools and workflows, though, we might want to use scripting.


    Imagine a scenario within a city planning department, answering a few questions
    about each parcel within applications to build a new structure. You would want
    to know (1) how much of the parcel is going to be covered by the new building,
    (2) how close the building is to the property line, and (3) for commercial structures
    only, if the submitted plan also has sufficient parking space for the building.
    The first question would require calculating two areas, perhaps through creating
    attributes and performing “Calculate Geometry” operations in the attribute table,
    and then finding the ratio of those two areas. The second would require finding
    distances, perhaps through the Near tool. The third would again involve calculating
    areas, but this time between the building size and the parking lot size. While
    each of these operations alone is not difficult, a large enough city would have
    enough applications that it would be tedious to carry it out between the attribute
    table and the toolbox over and over again for each application. A simple script
    that can take in the application with the polygon information, compute what is
    needed, and answer those three questions without any additional steps from the
    user would make the job easier.


    **Question 1: Describe another scenario with a workflow of at least three steps
    that would be frequently repeated, and therefore would benefit from scripting.
    Also provide a step-by-step set of instructions for the workflow.**


    The other limitation that can inspire scripting is that, as extensive as the toolboxes
    are, they cannot cover everything. New statistical techniques are developed on
    a constant basis, and you may want to use a statistical test which is not implemented
    in ArcGIS Pro. Scripting can also solve this, by allowing you to create a new
    tool, and write the code to carry out this new test. While the statistical toolboxes
    are growing within ArcGIS, they (at the time of writing) do not implement spatial
    lag or spatial error regression from the field of spatial econometrics (Ward &
    Gleditsch, 2008). If a person wants to use these tools, she or he would have to
    write a script to implement it in a new tool.


    **Question 2: Describe another tool you wish you had in ArcGIS Pro.**


    # Task 2: Algorithms and Computational Thinking


    The step-by-step set of instructions you provided in question 1 above is an example
    of an algorithm. Algorithms are the basis of how computer software works. They
    are sets of instructions that tell the computer precisely what to do. You can
    think of an algorithm like a recipe. A recipe for chocolate chip cookies tells
    you what you need to have—the flour, the sugar, the eggs, the chocolate chips,
    etc. It also tells you how much to use of each ingredient and what to do, and
    it provides a detailed set of instructions on how to combine and work with the
    ingredients to turn them into cookies. In this, the recipe is an algorithm for
    turning the flour, sugar, and other inputs into the output of cookies. Likewise,
    the city planning example I gave above would take as inputs the polygons for the
    lot, the building, and the parking area for commercial applications, and provide
    as output the answers to those three questions.


    Most computers would not have an idea what your step-by-step instructions are
    above, however. You need to translate the instructions from English to “Computerese,”
    which is the language that the computer can truly understand. Every programming
    and scripting language, from BASIC to Java to Python, can be considered a dialect
    of Computerese. A fuller description of Computerese, and Python, is in the following
    chapters, so only a few general ideas are introduced here.


    First, the computer has zero common sense and a limited vocabulary. As an example,
    I’ll draw from a new form of computer—the home voice assistant, like the Amazon
    Echo. Here is a conversation I had:

    Me: “Alexa, turn the air conditioning to 72 degrees.”

    Alexa: “There is no device called air conditioning.”

    Me: “Alexa, set the AC to 72 degrees.”

    Alexa: “There is no device called AC.”

    Me [getting a little annoyed]: “Alexa, set the temperature to 72 degrees.”

    Alexa: “The air conditioning is set to 72 degrees.”'
  merge: -1
  pgno: 14
- img_proc: true
  md: 'Displaying the limited vocabulary, even though the phrase “air conditioning”
    appeared in Alexa’s words to me, it did not have any meaning to the computer,
    as when I asked to set the air conditioning, it could not find a device called
    that. It only responded to “temperature.” The computer also displayed a lack of
    common sense in not recognizing synonyms that any person would.


    The second general principle of Computerese is that computers take everything
    literally. In the city planning example, I might have a typo in the ratio of the
    building size to the lot size, multiplying instead of dividing a building footprint
    of 3000 square feet by a parcel size of 9000 square feet to conclude that the
    building covers 27,000,000% of the lot. Any person will recognize that this is
    a nonsense answer, although the computer will happily report it back to the user.
    Even if you meant to divide, and multiplying gives a nonsense answer, the computer
    will carry out your instructions literally, and multiply the two numbers.


    The third general principle, which is used under the hood, so to speak, of GIS,
    even if we don’t see the practical effects often, is that the computer cannot
    see shapes or polygons. It can only work with numbers, and really only work with
    0s and 1s. This means that everything in a GIS, from the text fields in an attribute
    table to all the geometries, must ultimately be converted into numbers. This has
    a bigger impact in, say, why it can take so long to find the intersection of two
    multipolygons, although it will not substantially impact the scripts we use and
    create in this course.


    The fourth principle, which is the advantage, is that the computer can read and
    carry out these instructions incredibly fast. This benefit makes all the frustrations
    imposed by the first three principles worthwhile.


    To take these principles and turn out English thoughts into Computerese instructions,
    we have to engage in computational thinking, trying to think like a computer might.
    A good quote on this comes from an unusual source: *Dirk Gently’s Holistic Detective
    Agency* by Douglas Adams (1987):


    > Richard continued, “What I mean is that if you really want to understand something,
    the best way is to try and explain it to someone else. That forces you to sort
    it out in your mind. And the more slow and dim-witted your pupil, the more you
    have to break things down into more and more simple ideas. And that’s really the
    essence of programming. By the time you’ve sorted out a complicated idea into
    little steps that even a stupid machine can deal with, you’ve learned something
    about it yourself.”


    To program the computer, or give it the right instructions, we have to break the
    instructions down into very detailed, very simple ideas. We have to get to the
    building blocks of whatever language we are using, Python in this book. We can’t
    just say find the area of a polygon; we have to tell the computer to access the
    geometry of the polygon, and from that geometry, get the area. We can’t just tell
    the computer to calculate a ratio; we have to explicitly divide one number by
    the other. This means that an essential step in any programming task is to break
    a general task into smaller subtasks, and break each of those down into individual
    steps, and then translate each individual step from English into Computerese.
    This “divide and conquer” approach is a critical component of programming and
    computational thinking.


    This is illustrated within the following scenario. Imagine you are a GIS consultant
    tasked with planning the stops for a series of rallies for a presidential candidate
    in the last week of the campaign. Your task is to find the sites of seven rallies,
    one per evening. The campaign manager has provided you with a set of constraints:
    (1) the rallies must be in different states, (2) the rallies need to be in states
    where the polling indicates a close contest, (3) the rallies need to be in large
    cities in those states, and (4) each rally needs a venue with at least 10,000
    seats. Additionally, the campaign has provided you with the polling data, the
    city population data, and the available venues in each city, so that you have
    all the data you need to carry out the task.


    At first, this might seem daunting, but through the “divide and conquer” strategy,
    it can be answered. Looking at the criteria, it would seem that there are two
    parts to this task, so we could have two subtasks. The first is to identify the
    seven states. Then, once we have the states picked, we need to identify a city
    and venue within each of the chosen states. Using this, we can start a very general
    outline.


    +   A. Identify states for rallies.

    B. For each selected state, choose a city and venue.


    We have one main criterion for the states: that the polling is close. We have
    polling data, so we can find the difference in voting intent between the two top
    candidates. This might or might not be in the data itself, so we may have to calculate
    the difference as the absolute value of candidate A minus candidate B. Once we
    have this, find the seven states with the lowest values, which can be executed
    by sorting the states along this new variable and finding the lowest ones. This
    illustrates taking the subtask and breaking it down further into individual steps,
    as in the more specific outline below.'
