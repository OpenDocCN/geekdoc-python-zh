    \ B.b and B.c. The updating portion happens in steps B.d.i.1 and B.d.i.2. This\
    \ is a common programming strategy as well. Filling this out within the outline\
    \ gives what is below.\n\nA. Identify states for rallies.\n    a. Calculate new\
    \ field in polling data:\n        i. Margin = |Candidate_A – Candidate_B|/(Candidate_A\
    \ + Candidate_B)\n    b. Sort states by Margin (with the lowest values first).\n\
    \    c. Select the first seven states in the sorted list.\nB. For each selected\
    \ state, choose a city and venue.\n    a. Select venues within the state from\
    \ the list of all venues in the country.\n    b. Set the rally venue to the first\
    \ venue in the list.\n    c. Set the rally city to the city containing the rally\
    \ venue.\n    d. For each venue within the state:\n        i. If it has a capacity\
    \ above 10,000 seats:\n            1. If its city’s population is more than that\
    \ of the current rally city, change the rally city and rally venue to this venue\
    \ and its city.\n            2. If its city’s population is equal to that of the\
    \ selected city (which probably means the same city), change the rally city and\
    \ rally venue to this city and venue **only if** the venue’s capacity is larger\
    \ than the capacity of the current rally venue.\n\nThis outline helps to organize\
    \ the process of translating English tasks into Computerese, and illustrates how\
    \ the overarching task is broken down into simpler and simpler steps. The outline\
    \ is in what can be called “pseudocode,” which is a generic form of Computerese,\
    \ rather than any specific scripting or programming language. It gives the set\
    \ of instructions that will be carried out within the algorithm to complete the\
    \ task, and these pseudocode instructions can be transcribed into any scripting\
    \ or programming language. Having this intermediate step of detailed instructions\
    \ is useful, and is therefore something that I would recommend you continue to\
    \ do in the unguided exercises throughout this book.\n\n# Task 3: Non-guided Work\n\
    \nAs the unguided task, imagine yourself doing GIS work for a conservation agency,\
    \ seeking to propose areas to set aside for the protection of an endangered bird\
    \ species. You have the following data: known nesting sites of the bird, a polygon-based\
    \ dataset of forest areas, and a dataset of oil and gas wells. The proposed areas\
    \ are forest areas which are at least 5 square miles in area, contain nesting\
    \ sites, and which have no oil and gas wells either inside them or within 0.5\
    \ miles of the edge of the forest. Your task is to identify all forests meeting\
    \ these criteria.\n\n**Question 3: Provide a detailed outline of instructions\
    \ for carrying out this task. Use at least two levels of the outline (outline\
    \ the task into subtasks, with individual steps inside each subtask). You do not\
    \ need to turn the individual steps into Python (or any other language).**\n\n\
    Use the example outline for locating political rallies at the end of Task 2 as\
    \ a guide for the level of detail that is expected."
- md: '## Basics of Programming: Variables, Operators, and Statements


    ## Introductory Comments: Parsing a Line of Code


    Programming in Python is much like writing in any other language, and this chapter
    begins the development an analogy of writing in Python to writing in a foreign
    language, which, in a way, is what scripting and programming are. That language
    is the Python dialect of the language introduced in Chap. 1 as Computerese. All
    programming languages are dialects of this language of Computerese, because they
    are all that similar to each other. While this book uses Python, the concepts
    are applicable to all programming and scripting languages. Chapter 19, Task 5,
    illustrates this when attaching a script written in a different language to an
    ArcGIS Pro tool. Therefore, if/when ArcGIS no longer uses Python, but switches
    to a different language, the skills you develop in this exercise will translate
    and transfer to whatever comes next.


    To focus on the basics of Python, this chapter, like the remainder of this section,
    will not use any ArcPy functions. The scenario is managing the roster for a GIS
    training seminar.


    This chapter begins by looking at how a computer reads a single line of code,
    equivalent to a phrase or sentence of Computerese.


    Every time a computer encounters a line of code to run, it first has to figure
    out what those instructions are. After all, as said in Chap. 1, everything is
    broken down into 1s and 0s, including text, meaning even the program itself must
    be transformed into a series of 1s and 0s. We won''t go anywhere near as far as
    the 1s and 0s, but we will look at the first step in that process of breaking
    down a line of computer code. As will be seen in Chap. 6, many of the bugs we
    can encounter are the result of the computer not being able to understand a line
    of computer code, so an understanding of how the computer approaches this process
    will help you recognize the nature of the bug and thereby fix it. A GIS analogy
    for this is recognizing that all the vector data in a GIS is, as far as the geometry
    is concerned, built upon the basics of points, lines, and polygons. Even though
    you might not think explicitly about the point coordinates when carrying out an
    analysis, having an understanding of how those points work and the properties
    of them, like what coordinate system and projection they are using, can help you
    to identify and troubleshoot different problems of analysis, such as when two
    datasets that should overlap don''t because they are using different coordinate
    systems. Likewise, understanding how the computer breaks down the script into
    those building blocks, and the properties of those building blocks, can help you
    debug and troubleshoot error messages that arise when you are writing a script.


    The first step in breaking down a line of code, or parsing it, is to identify
    the constituent parts of that line. This is equivalent to having to break a sentence
    down into the individual words that make up that sentence. Parsing is, in other
    words, how the computer reads Computerese. In computer science, these individual
    parts are called tokens, and different kinds of tokens fulfill different aspects
    of Computerese, much like nouns, verbs, and adjectives all have different roles
    within spoken language. I''ll illustrate the premise of parsing and breaking down
    the code with a few examples below, drawn from the hands-on tasks which appear
    after these introductory comments. In those guided tasks, you will see how to
    enter these Python lines, and others, into ArcGIS Pro to gain experience with
    these ideas.


    The first line is the following. Note that I will use the `courier new` font for
    Python code, which is commonplace for representing computer code in any language
    because it has the advantage that every character is the same width.


    ```

    student_price = price * 0.5

    ```


    Each line, no matter how long or short it is, gets broken into these tokens. This
    is a simple line, which you can probably deduce from a little algebra sets the
    student price of something at half the regular price. The computer, though, lacks
    the common sense to figure it out, and must read it, token for token. However,
    first, the computer has to figure out what the individual tokens are in this line.
    This is a straightforward splitting of the line based upon where the spaces are.
    I''ve divided it into tokens using background shading. Each switch between light
    and dark background indicates a new token.


    ```

    student_price = price * 0.5

    ```


    Once this is done, the computer recognizes `student_price` and `price` as names.
    While we might recognize this by looking at it as them being variables, the computer
    doesn''t know it yet. It does, though, automatically recognize `=` and `*` for
    the mathematical operations they represent, and `0.5` as a number. Based upon
    how the `=` operator works, the computer either creates a new variable called
    `student_price`, or it changes the value already assigned to that variable. Meanwhile,
    `price` must be a variable, and one that is a number at that. Otherwise, there
    will be an error, the nature of which will be covered in Chap. 6 on debugging.


    The second line adds a new element, in which not all words are names.


    ```

    paid = True

    ```


    However, the idea of splitting the line into tokens at each space still remains.
    This gives the following breakdown:


    ```

    paid = True

    ```


    As with the first line, it creates or reassigns the value of a variable called
    `paid`. This time, though, the other word, `True`, is not a variable, but is itself
    what is called a keyword, or a word with a very specific meaning.


    The next example extends what is a token by introducing the quote marks. These
    must be present in pairs, because when the computer encounters the first quote
    mark, it immediately finds the corresponding ending quote mark and treats everything
    inside, along with the quote marks themselves, as a single token representing
    a piece of text.


    ```

    name = "ArcGIS Training"

    ```


    The following breakdown has the quote marks underlined to indicate the pairing
    of the two together.


    ```

    name = "ArcGIS Training"

    ```


    The next line builds upon the idea of the quote marks, with a pair of parentheses.
    It also adds commas. You can probably recognize this as a list of names.¹


    ```

    participants = ("John Smith", "Fred Jackson", "Alice Scholl", "Bob Waters", "Eve
    Douglas", "Monty Adams")

    ```


    The parentheses, like the quote marks, function as a pair. If you have one without
    the other, there will be an error message. While the quote marks indicate that
    everything inside of them is a text string, the parentheses tell the computer
    that everything inside of them is a list. Each of the items in the list is separated
    by a comma. The commas and parentheses are deemed here as their own tokens, because
    they fulfill roles in the line of code that are independent of everything around
    them.


    ```

    participants = ("John Smith", "Fred Jackson", "Alice Scholl", "Bob Waters", "Eve
    Douglas", "Monty Adams")

    ```


    ¹As will be clear later, it is not, in strict Python terminology, a list. At this
    point, though, we can colloquially call it a list, so throughout these introductory
    comments, I''ll refer to it as a list.


    Also, having the more complex line begins to illustrate some more principles of
    how the computer parses a line, particularly the way that it depends upon patterns
    in the sequence of tokens to figure out what the line is doing. In this example,
    there are a few elements in the syntax, or structure, of the line to tell the
    computer that this is a list. The first of these is the matched set of parentheses,
    which here indicate the start and finish of the list. The other part is that what
    is in between those parentheses is a set of things—text strings in this case—each
    separated by a comma. It also determines what is on the right side of the equals
    sign before it attempts to place that value in the variable on the left side of
    the equals sign.


    The next example shows that the parentheses can also impact how other tokens get
    interpreted.


    ```

    print(student_price)

    ```


    The parentheses and its contents function much the same way as above, although
    in this case, it is only a single item in the list.² However, unlike the previous
    line, which took the list of names and set it to be the contents of a variable,
    this one has no = operator to indicate that.


    ```

    print(student_price)

    ```


    Because there is no operator, this changes the syntax of the line, which in turn
    changes how the computer interprets the word print. Because the word print is
    followed immediately by the opening parenthesis, the computer recognizes print
    as a function, not a variable. We will see more detail on functions in Chap. 4.


    The last example here extends this with one more token: a dot.


    ```

    participants.reverse()

    ```


    In this case, the dot, however, doesn''t represent a decimal point, but separates
    two words. Also notice the empty list at the end of the line, as represented by
    the two parentheses with nothing between them. Both the dot and the parentheses
    are critical to the correct running of this line of code.


    ```

    participants.reverse()

    ```


    The dot signifies that the token before the dot, participants in this example,
    must be a variable, and not just any variable. It has to be of one of a set of
    particular types of variables, called objects. What, then, is after the dot is
    something similar to a function, which is what the parentheses indicate. While
    both functions and objects will be used starting in this chapter, Chap. 4 will
    have much more information on both functions and objects.


    ## Task 1: Basics of Python


    ## Variables, Literals, and Operators


    Before we begin our examination of Python in ArcGIS Pro, we need to know how to
    access Python. There are three primary ways ArcGIS Pro interacts with the Python
    programming language: the Python Window, Python Notebooks, and IDLE. We will start
    with the Python Window, as it is the simplest means of interacting with small
    pieces of Python code. In other software environments, you may have encountered
    the term “Python Shell,” which is what this essentially is. It allows you to enter
    a statement in Python, and that statement will be executed immediately. This can
    be useful for exploring what different elements within the language do, so we
    will be using it for pedagogical purposes here. The next level of complexity is
    the Python Notebook, also integrated with recent versions of ArcGIS Pro. It allows
    you to work with snippets of code which can be multiple statements, and execute
    them in batches. The practice of Python scripting is moving toward the notebook
    paradigm.


    > ² Just like you may well go to the grocery store with a list of one item: milk,
    a list in Python can have only one item. It can even have zero items, which is
    useful if we want to build a grocery list from scratch, one item at a time. We
    start with an empty grocery list, or a blank piece of paper, and then write items
    on it, like milk, eggs, and bread.'
  mdcn: '## 编程基础：变量、运算符与语句


    ## 引言：解析一行代码


    Python 编程与使用任何其他语言写作非常相似，本章将开始构建一个类比：将 Python 编程比作用外语写作——从某种意义上说，脚本编写和编程正是如此。这种语言就是第
    1 章介绍的“计算机语”的 Python 方言。所有编程语言都是这种“计算机语”的方言，因为它们彼此之间非常相似。虽然本书使用 Python，但这些概念适用于所有编程和脚本语言。第
    19 章的任务 5 在将用不同语言编写的脚本附加到 ArcGIS Pro 工具时，就说明了这一点。因此，如果/当 ArcGIS 不再使用 Python 而切换到其他语言时，你在本练习中培养的技能将能够迁移并应用于任何后续语言。


    为了专注于 Python 的基础知识，本章以及本节的其余部分将不使用任何 ArcPy 函数。场景设定为管理一个 GIS 培训研讨会的参与者名单。


    本章首先探讨计算机如何读取单行代码，这相当于“计算机语”中的一个短语或句子。


    每次计算机遇到一行需要运行的代码时，它首先必须弄清楚这些指令是什么。毕竟，正如第 1 章所说，一切都分解为 1 和 0，包括文本，这意味着即使是程序本身也必须转换为一系列的
    1 和 0。我们不会深入到 1 和 0 的层面，但我们将探讨分解一行计算机代码过程的第一步。正如第 6 章将看到的，我们遇到的许多错误都是计算机无法理解一行计算机代码的结果，因此理解计算机如何处理这个过程将帮助你识别错误的性质并从而修复它。一个
    GIS 类比是：认识到 GIS 中的所有矢量数据，就几何而言，都是建立在点、线和面的基础之上的。即使你在执行分析时可能不会明确考虑点坐标，但理解这些点的工作原理及其属性（例如它们使用的坐标系和投影）可以帮助你识别和排查不同的分析问题，例如当两个本应重叠的数据集因为使用不同的坐标系而没有重叠时。同样，理解计算机如何将脚本分解为这些构建块，以及这些构建块的属性，可以帮助你调试和排查编写脚本时出现的错误消息。


    分解一行代码（或解析它）的第一步是识别该行的组成部分。这相当于必须将一个句子分解成构成该句子的单个单词。换句话说，解析就是计算机阅读“计算机语”的方式。在计算机科学中，这些单独的部分被称为标记，不同种类的标记满足“计算机语”的不同方面，就像名词、动词和形容词在口语中扮演不同的角色一样。我将通过下面几个例子来说明解析和分解代码的前提，这些例子摘自这些引言之后的实践任务。在那些引导性任务中，你将看到如何将这些
    Python 行以及其他行输入到 ArcGIS Pro 中，以获得对这些概念的实践经验。


    第一行如下。请注意，我将使用 `courier new` 字体表示 Python 代码，这在任何语言中表示计算机代码都很常见，因为它具有每个字符宽度相同的优势。


    ```

    student_price = price * 0.5

    ```


    每一行，无论多长或多短，都会被分解成这些标记。这是一个简单的行，你可能从一点代数知识就能推断出它将某物的学生价格设定为正常价格的一半。然而，计算机缺乏常识来弄清楚这一点，必须逐个标记地读取它。但是，首先，计算机必须弄清楚这一行中的单个标记是什么。这是基于空格位置对行进行的直接分割。我使用背景阴影将其划分为标记。每次明暗背景的切换都表示一个新的标记。


    ```

    student_price = price * 0.5

    ```


    一旦完成，计算机将 `student_price` 和 `price` 识别为名称。虽然我们可能通过观察将它们识别为变量，但计算机还不知道这一点。不过，它确实自动识别
    `=` 和 `*` 代表的数学运算，以及 `0.5` 是一个数字。根据 `=` 运算符的工作方式，计算机要么创建一个名为 `student_price` 的新变量，要么更改已分配给该变量的值。同时，`price`
    必须是一个变量，而且是一个数字变量。否则，将会出现错误，其性质将在第 6 章关于调试的部分中介绍。


    第二行增加了一个新元素，其中并非所有单词都是名称。


    ```

    paid = True

    ```


    然而，在每个空格处将行分割成标记的想法仍然存在。这给出了以下分解：


    ```

    paid = True

    ```


    与第一行一样，它创建或重新分配名为 `paid` 的变量的值。但这一次，另一个单词 `True` 不是一个变量，而是它本身被称为关键字，或者具有非常特定含义的单词。


    下一个示例通过引入引号扩展了什么是标记的概念。这些引号必须成对出现，因为当计算机遇到第一个引号时，它会立即找到相应的结束引号，并将引号内的所有内容以及引号本身视为一个代表文本片段的单一标记。


    ```

    name = "ArcGIS Training"

    ```


    以下分解中，引号被加下划线以表示它们成对出现。


    ```

    name = "ArcGIS Training"

    ```


    下一行在引号概念的基础上增加了一对括号。它还添加了逗号。你可能能认出这是一个名称列表。¹


    ```

    participants = ("John Smith", "Fred Jackson", "Alice Scholl", "Bob Waters", "Eve
    Douglas", "Monty Adams")

    ```


    括号与引号一样，成对工作。如果你只有一个而没有另一个，将会出现错误消息。虽然引号表示其中的所有内容都是文本字符串，但括号告诉计算机其中的所有内容是一个列表。列表中的每个项目由逗号分隔。逗号和括号在此被视为它们自己的标记，因为它们在代码行中扮演的角色独立于其周围的所有内容。


    ```

    participants = ("John Smith", "Fred Jackson", "Alice Scholl", "Bob Waters", "Eve
    Douglas", "Monty Adams")

    ```


    ¹稍后会清楚，在严格的 Python 术语中，它不是一个列表。但此时，我们可以通俗地称之为列表，因此在这些引言中，我将称其为列表。


    此外，更复杂的行开始说明计算机解析一行代码的更多原理，特别是它如何依赖于标记序列中的模式来弄清楚该行在做什么。在这个例子中，行的语法或结构中有几个元素告诉计算机这是一个列表。第一个是匹配的括号对，这里表示列表的开始和结束。另一部分是括号之间是一组东西——在这种情况下是文本字符串——每个都用逗号分隔。它还会在尝试将值放入等号左侧的变量之前，确定等号右侧的内容。


    下一个示例显示括号也会影响其他标记的解释方式。


    ```

    print(student_price)

    ```


    括号及其内容的功能与上面大致相同，尽管在这种情况下，它只是列表中的单个项目。² 然而，与前一行将名称列表设置为变量内容不同，这一行没有 `=` 运算符来表示这一点。


    ```

    print(student_price)

    ```


    因为没有运算符，这改变了行的语法，进而改变了计算机解释单词 `print` 的方式。因为单词 `print` 后面紧跟着左括号，计算机将 `print` 识别为函数，而不是变量。我们将在第
    4 章看到更多关于函数的细节。


    这里的最后一个示例用另一个标记扩展了这一点：一个点。


    ```

    participants.reverse()

    ```


    在这种情况下，点并不代表小数点，而是分隔两个单词。还要注意行末的空列表，由两个括号表示，中间没有任何内容。点和括号对于这行代码的正确运行都至关重要。


    ```

    participants.reverse()

    ```


    点表示点之前的标记（本例中为 `participants`）必须是一个变量，而且不仅仅是任何变量。它必须是一组特定类型的变量之一，称为对象。那么，点之后的内容类似于函数，括号表示的就是函数。虽然从本章开始将使用函数和对象，但第
    4 章将提供关于函数和对象的更多信息。


    ## 任务 1：Python 基础


    ## 变量、字面量和运算符


    在我们开始研究 ArcGIS Pro 中的 Python 之前，我们需要知道如何访问 Python。ArcGIS Pro 与 Python 编程语言交互主要有三种方式：Python
    窗口、Python Notebook 和 IDLE。我们将从 Python 窗口开始，因为它是与少量 Python 代码交互的最简单方式。在其他软件环境中，你可能遇到过“Python
    Shell”这个术语，这本质上就是它。它允许你输入一条 Python 语句，该语句将立即执行。这对于探索语言中不同元素的功能非常有用，因此我们将在教学目的上使用它。下一个复杂级别是
    Python Notebook，它也集成在最新版本的 ArcGIS Pro 中。它允许你处理可以包含多条语句的代码片段，并批量执行它们。Python 脚本编写实践正朝着
    Notebook 范式发展。


    > ² 就像你可能会带着一个只有一项物品的购物清单去杂货店：牛奶，Python 中的列表也可以只有一项。它甚至可以有零项，这在我们想从头开始构建一个购物清单，一次添加一项时很有用。我们从一个空的购物清单，或一张白纸开始，然后在上面写上物品，比如牛奶、鸡蛋和面包。'
