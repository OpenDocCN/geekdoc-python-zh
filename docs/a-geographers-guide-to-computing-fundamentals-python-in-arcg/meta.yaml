    \ is typically the case, `self`. Add these below the class line:\n\n```\n→ def\
    \ __init__(self, errorType, lotID, info1, info2):\n\n→ def createMessage(self):\n\
    ```\n\nBelow these two methods, provide the shell for the `Parcel` class. I have\
