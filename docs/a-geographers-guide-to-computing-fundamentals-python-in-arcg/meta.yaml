  md: 'Each line, no matter how long or short it is, gets broken into these tokens.
    This is a simple line, which you can probably deduce from a little algebra sets
    the student price of something at half the regular price. The computer, though,
    lacks the common sense to figure it out, and must read it, token for token. However,
    first, the computer has to figure out what the individual tokens are in this line.
    This is a straightforward splitting of the line based upon where the spaces are.
    I''ve divided it into tokens using background shading. Each switch between light
    and dark background indicates a new token.


    ```

    student_price = price * 0.5

    ```


    Once this is done, the computer recognizes `student_price` and `price` as names.
    While we might recognize this by looking at it as them being variables, the computer
    doesn''t know it yet. It does, though, automatically recognize `=` and `*` for
    the mathematical operations they represent, and `0.5` as a number. Based upon
    how the `=` operator works, the computer either creates a new variable called
    `student_price`, or it changes the value already assigned to that variable. Meanwhile,
    `price` must be a variable, and one that is a number at that. Otherwise, there
    will be an error, the nature of which will be covered in Chap. 6 on debugging.


    The second line adds a new element, in which not all words are names.


    ```

    paid = True

    ```


    However, the idea of splitting the line into tokens at each space still remains.
    This gives the following breakdown:


    ```

    paid = True

    ```


    As with the first line, it creates or reassigns the value of a variable called
    `paid`. This time, though, the other word, `True`, is not a variable, but is itself
    what is called a keyword, or a word with a very specific meaning.


    The next example extends what is a token by introducing the quote marks. These
    must be present in pairs, because when the computer encounters the first quote
    mark, it immediately finds the corresponding ending quote mark and treats everything
    inside, along with the quote marks themselves, as a single token representing
    a piece of text.


    ```

    name = "ArcGIS Training"

    ```


    The following breakdown has the quote marks underlined to indicate the pairing
    of the two together.


    ```

    name = "ArcGIS Training"

    ```


    The next line builds upon the idea of the quote marks, with a pair of parentheses.
    It also adds commas. You can probably recognize this as a list of names.¹


    ```

    participants = ("John Smith", "Fred Jackson", "Alice Scholl", "Bob Waters", "Eve
    Douglas", "Monty Adams")

    ```


    The parentheses, like the quote marks, function as a pair. If you have one without
    the other, there will be an error message. While the quote marks indicate that
    everything inside of them is a text string, the parentheses tell the computer
    that everything inside of them is a list. Each of the items in the list is separated
    by a comma. The commas and parentheses are deemed here as their own tokens, because
    they fulfill roles in the line of code that are independent of everything around
    them.


    ```

    participants = ("John Smith", "Fred Jackson", "Alice Scholl", "Bob Waters", "Eve
    Douglas", "Monty Adams")

    ```


    ¹As will be clear later, it is not, in strict Python terminology, a list. At this
    point, though, we can colloquially call it a list, so throughout these introductory
    comments, I''ll refer to it as a list.'
