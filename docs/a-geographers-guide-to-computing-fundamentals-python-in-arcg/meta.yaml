    \ bit of creativity and a keyword that I haven’t formally introduced but which\
    \ some of you may have found anyway: `break`. This keyword forces the code to\
    \ leave a Python loop no matter what. What I’ll do here is to leave the code alone\
    \ if a city isn’t the hub, because the error only arises for connections between\
    \ two hub cities. I will, though, have to change how it works for hubs. Since\
    \ all of the hub’s flights are listed in that line, the only information I need\
    \ for a hub is right there, in that line. So if and when I encounter a hub, I’ll\
    \ reset the distance list to empty, append everything within that line of the\
    \ CSV file and then break the loop to ensure I don’t add anything more to it.\
    \ This ultimately ensures that only the distances within this line contribute\
    \ to the total for a hub:\n\n```\n# --> if position == 1: NOTE: I CORRECTED THE\
    \ 1 TO 0 IN THE CODE\n    if position == 0:\n        distanceList = []\n# -->\
