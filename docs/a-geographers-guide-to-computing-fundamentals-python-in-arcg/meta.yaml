    # Task 1: Working with the Map Frame


    Open up the project from Chap. 12 and have it as you did at the end of the unguided
    portion.¹ Use the GUI to add a layout to the project. This is through the Insert
    tab → New Layout. Use the letter size at the top left of the options that are
    presented.


    Once you have the layout open, we can begin to access it with arcpy commands.
    Just as we always worked with lists for the map, we also work with lists here,
    even when there is one layout in the project.


    Enter the following code into the Python Window:


    ```

    aprx = arcpy.mp.ArcGISProject("CURRENT")

    layout = aprx.listLayouts()[0]

    ```


    Most of the time, we will then use the layout to access various elements within
    it. This is through the following line:


    ```

    layout.listElements()

    ```


    # Question 1: How many elements are currently in the map?


    Even with this layout as generic as it is, we can see some useful information
    from it, as it stores the page information. Especially important is to recognize
    the page units, because we are introducing what is, in a sense, a second coordinate
    system: the coordinates of the page. These are what will be used to locate and
    place items on the page. You can see in the layout view that there are rulers
    along the top and left sides of the layout window. These represent the page coordinates.
    Using either the documentation or the Python Window strategy of waiting after
    the dot to see the property and method options, answer the following questions:


    # Question 2a: What is the height, width, and units for the page?

    Question 2b: What code did you enter to find this out?


    As our layout isn’t very useful at the moment, the first thing we would want to
    do with it is to put a map frame in it. We will have to create a map frame in
    GUI. To do so, have the layout view active, and then go to the Insert tab and
    choose Map Frame. Then drag a rectangle in the layout to place the map frame.
    You do not have to be precise in your drawing of the rectangle because we will
    be using arcpy to make its position and size exactly where and what we want them
    to be. Once you do so, you might have a layout like this (depending, of course,
    upon your zoom level for the project and the exact rectangle you drew).


    ¹Strictly speaking, it isn’t mandatory to have it exactly as this was instructed
    at the end of Chap. 12. The layout code will work no matter what stage of Chap.
    12 it is on, although the legend size in particular might seem off if you have
    a different number of layers visible or a different number of classes in the choropleth
    map.'
- md: 'While this is a decent start, there is a lot of work to do. To accomplish that
    work, we need access to the map frame we just added. Enter `layout.listElements()`,
    and press enter to confirm that there is now an element within the layout. This
    element is the map frame, so we can access it through the following line:


    ```

    mapFrame = layout.listElements()[0]

    ```


    It is sensible to then want to ensure the zoom level of the map is where we want
    it, as well as ensuring it is centered properly. The map above fails both of these
    criteria. To remedy this, we need to access an intermediary object, the map frame''s
    camera. It is the camera that records the scale, the position, and the extent
    of the map within the map frame. Enter the following line to store the camera
    in a variable:


    ```

    camera = mapFrame.camera

    ```


    We might first want to set the camera''s X and Y coordinates, which is what is
    found in the center of the map. Use the following lines to accomplish this:


    ```

    camera.X = -96

    camera.Y = 40

    ```


    You will notice that these coordinates are latitude and longitude, rather than
    page coordinates, because they refer to placement of the map itself within the
    frame, rather than the placement of the map frame within the layout page.

    It is also probably zoomed to the wrong level. This is through the scale property
    of the camera. Enter the following line to change it to a scale of 1:40,000,000:


    ```

    camera.scale = 40000000

    ```


    Now that we have the map set up how we want, the next part of the task is putting
    it in the right part of the layout. This is where the page coordinates come into
    play. Page coordinates are structured such that the origin is the bottom left
    of the page, and we measure up from there and to the right from there. We want
    the lower left corner of the map frame to be 1 inch from the left side of the
    page and 4 inches up from the bottom. This is done through the element properties
    of the `mapFrame` variable. Likewise, we can use element properties to set the
    precise height and width of the map frame to be 5 inches and 6.5 inches, respectively.
    Enter the following code to accomplish this:


    ```

    mapFrame.elementHeight = 5

    mapFrame.elementPositionX = 1

    mapFrame.elementPositionY = 4

    mapFrame.elementWidth = 6.5

    ```


    Lastly, recognizing what is portrayed in the map frame, you will want to change
    the name of the map frame to "Lower48."

    This is through the following line:


    ```

    mapFrame.name = "Lower48"

    ```


    ## Task 2: Working with Map Surround Elements


    The next portion of the layout we will work with is the map surround elements.
    There are two that we will use here: the north arrow and the scale bar. In both
    cases, we will use the generic layout element properties to be specific about
    the position where we want them, although this is only possible after we add them
    through the GUI.

    First, we will insert the north arrow. While the layout view is active, go to
    the Insert tab, and select north arrow. Click on the map to place it. As with
    the map frame, you do not need to be exact, as we will be adjusting the position
    on the page using arcpy.

    Once it is added, we can access it using the input parameter option for the `layout.listElements()`
    method. There are several different types of layout elements available in arcpy,
    and we often know which element we want to work with. Thus, we can specify we
    want a Map surround element through the following lines. The north arrow has a
    fixed aspect ratio, so we really only need to set the width, which will be a quarter
    inch. We then want the north arrow to be below the map frame, on the right side:


    ```

    layout.listElements()

    arrow = layout.listElements(''MAPSURROUND_ELEMENT'')[0]

    arrow.elementWidth = 0.25

    arrow.elementPositionX = 7

    arrow.elementPositionY = 3.25

    ```


    Second, we will insert the scale bar. Again, this is through the Insert tab, but
    select scale bar, and likewise click on the map. Access the scale bar through
    the following code:


    ```

    scale = layout.listElements(''MAPSURROUND_ELEMENT'')[0]

    ```


    You’ll notice that except for the variable name, this is the same code as was
    used to access the north arrow, down to the list index. All items in the list
    are indexed in the order shown in the “Drawing Order” part of the Contents panel
    at the left side of the screen, with the top item being index #0 to the end of
    the list being at the bottom. When we inserted the scale bar, it was added to
    the top of the drawing order, so it is the new index #0 in the list.


    **Question 3: Thinking back to how variable assignment works in Python, does the
    `arrow` variable refer to the north arrow or the scale bar? Why is this the case?**


    Like the north arrow, we only need to set the width of the scale bar and its X
    and Y position, which we will want below the map frame on the left:


    ```

    scale.elementWidth = 3.75

    scale.elementPositionX = 1

    scale.elementPositionY = 3

    ```


    ## Task 3: Working with Text Elements


    For our text, we will want two pieces of text: a title and some simple credits.
    As with the map surround elements, we need to first create them using the GUI.
    To insert the title, go to the Insert tab, and in the Graphics and Text section,
    choose the button with the plain A, labeled “Straight text” if you hover over
    it. Click on the map to place it. As with the map surround elements, we can use
    the input parameter to the `listElements` method to only retrieve the text elements.
    Currently, of course, we only have one. The title should be at the top of the
    layout, and we want it to be fairly big, so enter the following lines to position
    it within the layout:


    ```

    title = layout.listElements(''TEXT_ELEMENT'')[0]

    title.elementHeight = 0.5

    title.elementPositionY = 9.75

    title.elementPositionX = 1.1

    ```


    In addition to the placement, we want to change the text from the generic “Text”
    that is created by ArcGIS Pro when we put it on the layout. This is through the
    `.text` property of the `title` variable:²


    ```

    title.text = "Reference and Income Map of U.S."

    ```


    Because this currently has the generic title of “Text” in the Drawing Order, we
    will want to make sure it is obvious which text is the title and which is the
    credits by changing its name, too:


    ```

    title.name = "Title"

    ```


    The other item to add is the credits. You can insert another text box for this
    like the title or use the Dynamic Text option by going to the Insert tab and then
    the Dynamic Text drop-down menu and choose Credits. Then click on the map. Either
    way, you will get a place for text on the map. We want this text to be at the
    lower right end of the layout and set its name to “Credits.” For the title, we
    specified the size by setting the height of the text box. In this case, we might
    be more interested in the size of the text font. We can use the `.textSize` property
    to set the font size. In this case, a font size of 12 points is good. We want
    the text on two lines, which means we will make use of the newLine character (‘\n’).
    This is the same thing that may have tripped you up if you didn’t do the slashes
    correctly in file paths, but this time, we want it. Insert the following text,
    making sure to replace my name with yours:


    ²For reasons I don’t understand, I had to enter this line twice for it to show
    up in the layout view. Don’t panic if you have to do the same.


    ```

    credits = layout.listElements(''TEXT_ELEMENT'')[0]

    credits.name = "Credits"

    credits.elementPositionY = 1

    credits.elementPositionX = 6.5

    credits.textSize = 12

    credits.text = "Guide to Programming \n Jamison Conley"

    ```


    ## Task 4: Working with Legend Elements


    The last element we will want for our layout is the legend. As with the other
    layout elements, we need to create the legend and edit it within the GUI before
    working with it in arcpy.


    Go to the Insert tab and select Legend, and then click on the map. It probably
    appeared as a single column that was far too long to be useful within our layout.
    It will be better with two columns. Now the legend should be a reasonable dimension
    for what we want, and we can place it in the lower left portion of the layout:


    ```

    legend = layout.listElements(''LEGEND_ELEMENT'')[0]

    legend.columnCount = 2


    legend.elementPositionX = 1

    legend.elementPositionY = 2.5

    ```


    The other thing we can do is to change the display name of the county layer to
    be more informative for the legend. To accomplish this, we will need to go back
    and access the map itself, as the layer is accessed by the map, not the layout.
    The asterisks before and after Census in the code below indicate what are called
    wild card characters. They mean we will access any layer with “Census” in its
    name, whether or not it is the entire name:


    ```

    map = mapFrame.map

    counties = map.listLayers("*Census*")[0]

    counties.name = "2010 Income"

    ```


    Once all of this is completed, we will lastly want to export the layout. Layouts
    have many export methods, each one based upon a particular output file extension.
    We might want to have a PDF for broad shareability, so enter this last line, changing
    the file path to whatever you have on your machine:


    ```

    layout.exportToPDF("J:/...filePath.../USIncome_layout1.pdf")

    ```


    **Question 4: This PDF will be assessed for accuracy of the position of all parts
    of this layout.**


    ## Task 5: Debugging Exercise


    To improve the layout further, you might want to have the choropleth legend portion
    split over two columns. When fixed, the following code should put the entirety
    of the choropleth legend item in the second column. You may want to examine the
    ArcPy documentation for relevant classes. There are three bugs, although you might
    need to make four changes, depending upon the behavior of ArcGIS Pro during the
    testing and debugging process:


    ```

    legend.fittingStrategy = ''ManualStrategy''

    items = legend.items()

    choroplethItem = items[-1]

    choroplethItem.column = 1

    ```'
