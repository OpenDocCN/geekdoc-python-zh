    \ letter m?**\n\nUsing either the Python Window auto-complete function or the\
    \ help documentation, identify the command which can help answer question 7. Note\
    \ that it is not required to start with m.\n\n**Question 7a: How many layers are\
    \ in this map?**\n\n**Question 7b: What was the Python statement (or statements)\
    \ you used to answer this?**\n\nYou should have it where the first layer is Ohio_layer.lyr,\
    \ as you created it above. To examine layer objects, let’s create a variable to\
    \ access this layer. Regardless of the order, we can use the optional parameter\
    \ to ensure we get the appropriate layer. Type:\n\n```\n>>> Ohio_layer = Ohio_map.listLayers(\"\
    Ohio_simple\")[0]\n```\n\nPress Enter. Again, all we know from the output of typing\
    \ `Ohio_layer` and pressing enter is that it is a Layer object.\n\n```\n>>> Ohio_layer\
    \ = Ohio_map.listLayers(\"Ohio_simple\")[0]\n>>> Ohio_layer\n<arcpy._mp.Layer\
    \ object at 0x000002AA0CF06320>\n```\n\nIf we continue this process of investigating\
    \ what is available by typing in `Ohio_layer.` and pause to examine the options,\
