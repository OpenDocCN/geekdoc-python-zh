  md: 'Now we need to initialize the row within the matrix. Note that the matrix itself
    was initialized only to an empty list. This means that since each element within
    the list is itself a list, we also need to initialize this interior list as an
    empty list, and add it to the end of the correlation matrix so that it is guaranteed
    to start a new row.


    ```

    # Start a new empty list to be the next row in the correlation matrix:


    → corr_matrix.append([])

    ```


    To populate each element within this row, we need to again loop through the matrix.
    The nested `for` loops ensures we compare every possible pair of fields. Even
    though the two loops are using the same list, they have different index variables,
    marking different locations, so one will not confuse the other. Imagine having
    two cursors looking at the same table, CursorA and CursorB. The position of CursorA
    is not altered by CursorB, nor is the position of CursorB affected by CursorA.
    They can cycle through the same table independently of each other. The same dynamic
    can apply here, ensuring i and j do not interfere with each other.


    ```

    # Loop through all of the fields again:


    → for j in fields:

    ```


    Now that we are looking at a single pair of fields—field i and field j—we can
    get the correlation between these two and add it to the end of the list representing
    the current row inside the matrix. The first line below gets the correlation coefficient
    matrix between the two variables, but we only want one of the more useful values.
    The index pair [0][1] indicates item #1 (the second item) in the top row, giving
    us the top right value. Getting the lower left value would be just as useful,
    but this is the pair I chose to extract. Once it is available, it can be appended
    to the end of the current row in the correlation matrix. That is referenced through
    the variable called `index`, which we initialized at 0 so it starts by creating
    the first row.


    ```

    # Get the correlation coefficient for the current pair of fields and add it to
    the end of the row:


    → → corr = numpy.corrcoef(array[i], array[j])[0][1]

    → → corr_matrix[index].append(corr)

    ```


    At the end of the row, we then need to increment the variable `index` by one,
    so that when we start the next row, it is going to be looking at the correct spot
    in the matrix.


    ```

    # Add one to the index at the end of the row so we can start the next row of the
    correlation matrix:


    → index = index + 1

    ```


    Putting this all together gives the following code block:


    ```

    corr_matrix = []

    index = 0

    for i in fields:

    → corr_matrix.append([])

    → for j in fields:

    → → corr = numpy.corrcoef(array[i], array[j])[0][1]

    → → corr_matrix[index].append(corr)

    → index = index + 1

    ```


    # Question 3: Using the indices in corr_matrix, what is the correlation between
    the MCGRAIL and ASANIN indices?'
