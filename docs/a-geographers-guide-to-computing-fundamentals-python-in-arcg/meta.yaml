  md: '# Task 3: Using a Tool Through ArcPy


    Once we have a reference to our feature class, we would often want to apply one
    or more of the tools within ArcGIS to work with or analyze that feature class.
    The geoprocessing task we will do here is selection.


    The data has records from the 2004 presidential election, so we will select those
    counties which voted for George W. Bush and put them into a new feature class
    called “Republican.”


    In the desktop GUI, there are several ways to accomplish this, but one of them
    is to go to the Analysis ribbon, and click the Tools button, to bring up the Geoprocessing
    pane. Do this. In the Geoprocessing pane that appeared at the right, use the search
    bar, currently labeled with “Find Tools,” and search for “Select.” You should
    then see as the top option a tool “Select (Analysis Tools).” Click it. In the
    tool dialog that then appears, there is a small circle with a question mark in
    the top right. This brings up the help file, so click it.


    Scroll down in the help file and you will find a section labeled “Parameters”
    with two options: “Dialog” and “Python.” We want the Python tab, so click that
    tab. This contains all the information we need to run this tool in Python. In
    this tab, there is a section labeled “Code sample,” containing two examples, one
    using this tool through the Python Window and a second using this tool in a stand-alone
    script, such as we used in IDLE in the previous exercise.


    Returning to the top of this section, we see three parameters: `in_features`,
    `out_feature_class`, and `where_clause`. The `in_features` requires a feature
    layer, so perhaps the `Ohio_layer` variable we already have would work. The output
    feature class will be a feature class in the environment workspace. To be explicit
    about this, we can create a variable for it with the following line:


    ```

    out_fc = "Republican"

    ```


    The last part is a SQL query. We will see SQL in greater detail when dealing with
    attribute data in Chap. 10. A relevant issue here is that attributes of the dataset
    are always included in double quotes. This means that to identify counties where
    the attribute Bush is greater than the attribute Kerry, we need to make sure “Bush”
    and “Kerry” are in double quotes. This then requires us to use single quotes to
    denote the start and end of the string for this query.


    ```

    query = ''"Bush" > "Kerry"''

    ```


    We now have variables set up to run the Select tool. Enter the following line.
    Following the syntax at the top of the Python tab in the documentation, we have
    the following line:


    ```

    arcpy.analysis.Select(Ohio_layer, out_fc, query)

    ```


    However, note that in the code samples, a different setup is employed, which would
    give the following:


    ```

    arcpy.Select_analysis("Ohio_layer", out_fc, query)

    ```


    I recommend the former setting, as it is newer and more likely to be continually
    supported on a longer-term basis, while the latter approach may be deprecated,
    or removed from usage and support, so keeping the newer construct would be helpful.
    The change is part of a restructuring of submodules within ArcPy where at least
    some of the different toolboxes within ArcToolbox have their own module within
    ArcPy. The Analysis Tools toolbox contains almost all of the objects that will
    be associated with the tools in this toolbox. For example, each of the tools within
    the Extract toolbox has its own ArcPy command: `arcpy.analysis.Clip`, `arcpy.analysis.Select`,
    `arcpy.analysis.Split`, `arcpy.analysis.SplitByAttributes`, and `arcpy.analysis.TableSelect`.


    Whether you use the old style with the toolbox indicated by `_analysis` at the
    end, or the new style with the toolbox-specific submodules, you should then get
    a `Result` object as a return value, and the Table of Contents at left should
    now have a Republican entry. Mine appeared in the exact same shade of pink as
    the input layer, so I suggest changing the color to make it distinguishable.


    ```

    >>> arcpy.analysis.Select(Ohio_layer, out_fc, query)

    <Result ''C:\Users\jfconley\Documents\ArcGIS\Projects\Chapter7\Chapter7.gdb\Republican''>

    ```'
