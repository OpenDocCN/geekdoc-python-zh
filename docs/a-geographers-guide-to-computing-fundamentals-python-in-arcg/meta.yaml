    \ 来修改嵌套的 for 循环。²（你可以通过写“在这里打印距离”来简化打印语句。）**\n\n**问题 13：列出每个城市最近的步道及其距离。（距离四舍五入到最近的米。）**\n\
    \n- Marlinton:\n- Petersburg:\n- Reedsville:\n- Summersville:\n- Weston:\n\n##\
    \ 任务 3：使用缓冲区创建新几何图形\n\n几何图形的另一个方法是创建缓冲区。就像运行一些栅格工具不会创建永久栅格一样，可以创建缓冲区和其他几何图形，其方式*不会*创建新的\
    \ shapefile 或要素类。它只是为 ArcPy 的使用创建一个多边形对象，但不会将其转换为要绘制在地图上的图层。这就是 `Geometry` 对象的缓冲区方法与工具箱中的\
    \ Buffer 工具或相关的 ArcPy 命令的不同之处。优点是它比创建全新的 shapefile 或地理数据库要素集合更快。\n\n为了存储面积，我们将使用一个字典来匹配一个键（在这种情况下是步道名称）和一个值（在这种情况下是缓冲区面积）。初始化过程之后的\
    \ `for` 循环将用每条步道周围 2000 米缓冲区的面积值填充字典；\n\n```\ntrailCursor.reset()\nareaDict =\
    \ {}\nfor trail in trailCursor:\n    name = trail[1]\n    shape = trail[0]\n \
    \   buffer = shape.buffer(2000)\n    area = buffer.area\n    areaDict[name] =\
    \ area\n```\n\n要确认它有效，输入这一行以检索与 Allegheny Trail 相关的值：\n\n```\nareaDict[\"Allegheny\
    \ Trail\"]\n```\n\n**问题 14：Allegheny Trail 周围的缓冲区有多大，四舍五入到最近的平方米？**\n\n## 任务 4：对两个多边形执行几何操作\n\
    \n我们的下一个任务是计算野生动物管理区的大小与该管理区内步道缓冲区大小的比率。\n\n²仔细思考缩进、变量和 reset 方法的位置，并且为了确保，在运行修改后的代码之前保存项目——有一种错误的方式会导致无限循环！"
