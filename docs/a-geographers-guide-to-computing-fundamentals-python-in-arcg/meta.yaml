    - Does a tool parameterization with an area too large get denied, with the appropriate
    error message?

    - Does a tool parameterization with a type unlike those of existing buildings
    get denied, with the appropriate error message?


    ## Task 6: Unguided Work


    The town council has passed a new ordinance, restricting the number of building
    types in each section number. However, a few sections are already being built
    with more than one type, and they are grandfathered in so that no new types would
    be permitted. This will entail the development of a new class for the Neighborhood.

    Please do the following:


    6a: Create a new class called Neighborhood. The constructor needs to accept a
    section number as the only input parameter.

    6b: Its constructor needs to store the section number to a property.

    6c: Its constructor also needs to use a cursor to loop through all the buildings
    in the section and create a list of property types already present in the section.
    If there are no buildings, this should be an empty list. (In other words, it should
    not have "EMPTY" in the list.)

    6d: Construct an object of the type Neighborhood within the try block and pass
    it as a parameter to the parcel’s propose method.

    6e: In the parcel’s propose method, check to make sure that the new building type
    does not violate the new ordinance, and raise an appropriate ApprovalError, per
    7e below, if it does violate it.

    6f: Add a new error type, #3, and accept as inputs the error type value 3, the
    lotID is still the lotID, info1 is the type of the proposed building, and info2
    is the list of existing building types, turned into a string.


    Example error messages would be:

    “Lot 12180950090 cannot accept a COMMERCIAL building because its section already
    contains RESIDENTIAL buildings.”

    or

    “Lot 12181000002 cannot accept a GOVERNMENT building because its section already
    contains RESIDENTIAL, HEALTH, and COMMERCIAL buildings.”


    I will evaluate these using a set of tool parameterizations, some of which are
    acceptable, and others which should cause this error message to appear.

    Save your project as a .ppkx file.


    8If there are no buildings in the section, then any building type is acceptable.


    ## Putting It All Together


    ### 17 Introductory Comments: Turning Specifications into a Program


    This chapter is structured differently from the others but provides an opportunity
    to develop a simple GIS application all on your own. However, it may also be the
    most useful if you will use GIS in your job or research. The scenario is one in
    which you are given specifications and have to create a tool. I provide below
    an illustrative example of how I would work through that process. While there
    is no hard and fast way of programming that will be guaranteed to work for everyone,
    there are a few principles that apply to everyone: the importance of planning
    and the inevitability of debugging. In the illustrative example, that is, in lieu
    of the guided tasks, I work through the planning process I would use and show
    you that, even as someone who first learned programming in 1995, I still make
    my fair share of bugs.


    The general principle is that many of the programming situations you will encounter
    are unguided, to put it mildly. Imagine being told by a supervisor to write a
    program to add a tool that does *this* in ArcGIS Pro, whatever *this* may be.
    They won''t tell you what objects and functions you will need. They might not
    even have the right data for you to evaluate whether the tool works. All you will
    get is a set of tasks that the tool is supposed to accomplish for the user. In
    another setting, you might find yourself thinking “it would be better if I had
    a tool to do *this*,” and your observations take the place of the supervisor.
    Even then, you have no direct guidance, just instructions, and possibly a deadline.
    What do you do then?


    The tools that I use are the ones that we have used throughout the book—pseudocode
    and flow charts. Others may have different strategies. Regardless of the form
    it takes, as you work through the tasks at the end of this chapter, I encourage
    you to take the planning part seriously and move from the plans to the scripts
    early enough to have time to carry out the inevitable debugging. The following
    example shows one way of accomplishing this.


    ### Illustrative Example


    The files for this example are a GIS file of cities in Europe and a CSV file of
    airport connections¹ between these cities.


    Given these files, suppose I am asked to develop a tool to assist the airport
    planners in ensuring enough fuel is stocked. They recognize that the amount of
    fuel needed per day is related to the total length of flights departing the airport.
    For this task, make the unlikely assumption that there is exactly one flight per
    day leaving each city for all of its connections. In other words, no routes are
    flown more than once per day, and they are flown every day. This means we want
    to sum up the lengths from a specified city to all places connected to that city.


    The tool I am to develop will allow the user to type in a city name, read the
    CSV file, find all the cities connected to the provided city, calculate the sum
    of distances from the provided city to all of these connected cities, and lastly
    report this sum of distances within an ArcPy message. Additionally, it should
    give a sensible error message if that city is not found in the dataset and give
    a warning if that city has no connections.


    With this task, the first thing I would do is take a look at the datasets. The
    cities file looks straightforward within ArcGIS. It is a point-based file, with
    a few attributes, although this calculation will need the geometries instead.


    ¹Not actual connections. I made them up, but think they are pretty plausible,
    at least as a subset of likely connections.


    The connections file initially looks more complicated. Each row is a list of cities.
    The structure is that the first column is hub city within the airport network,
    and the remaining columns are the cities connected to that hub. It is set up that
    most flights are only listed once, because they go from hub to spoke in the network,
    and to save space, rows for the spokes are not included. For example, the London
    line has Dundee as a connected location, but Dundee, as a spoke in the network,
    does not have its own line in the file. Even so, when the user types in Dundee,
    its connection with London should be included in the calculations.


    Having looked at the files to see what I have to work with, I would then start
    to plan out the tool, laying out the starting and ending points (Fig. 17.1).


    Obviously, we need to do more to fill in the black box, but this is a starting
    point. The next step we might need is to read the connections CSV file. It doesn’t
    depend directly upon getting the city, so I will add this box in without an arrow
    to it, but it will provide needed information for the (currently) black box calculations
    (Fig. 17.2).


    Once we have the data loaded in, we can start to fill in the black box and, as
    I have drawn below, make it more gray than black, as the inner workings of the
    black box get exposed and filled in. The two main components of what has to happen
    inside this black box are finding the connected cities and adding up all of their
    distances from the primary city (Fig. 17.3).


    We can now break down either of the gray boxes. I’ll pick the second one, since
    it doesn’t matter which order we break them down in, as long as they both get
    done. One thing to think about within your planning is to consider what inputs
    and outputs you need to get each step done. Adding up all of the distances can
    be pretty straightforward, although we need to consider what the inputs to this
    step will be. Naturally, we need the individual distances. But how will the computer
    represent these distances? There are a few possibilities, and a list or a dictionary
    comes to mind. I might revise this later, but will, for the time being, choose
    a list. When adding up the distances, it isn’t of great importance which distance
    corresponds to which connection, and that’s the main value of using a dictionary
    versus a list. Having a list of distances then means looping through all the distances
    and adding them to a running total. We have done this logic before, so hopefully
    it is familiar to you (Fig. 17.4).


    This makes clear that the other gray box will need to finish by giving us a list
    of distances. It will end up following a similar logic, but what happens will
    be more complex. I’ve started to flesh out what is needed here, making the parts
    of the black box again clearer, but the lighter gray boxes still have some work
    to go (Fig. 17.5).


    To make the flow chart easier to read, I’ll pull out these two gray boxes into
    their own flow chart. The first part tackles whether the line in the CSV file
    contains a connection involving the city that the user entered. This should be
    a simple enough


    ![](img/37990581b275bdf7d510c6f2d9702a31_178_0.png)


    **Fig. 17.1** Starting a flow chart


    ![](img/37990581b275bdf7d510c6f2d9702a31_178_1.png)


    **Fig. 17.2** Read a file'
