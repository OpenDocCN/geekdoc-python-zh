    # Mapping: Layouts


    # 13


    # Introductory Comments: Data Structures for Maps Versus Layouts


    This chapter follows on from the previous chapter, but where Chap. 12 looked at
    the map figure and how to make changes to the appearance of layers in the map,
    this chapter looks at the layout of the map on the page. In terms that would be
    familiar to ArcGIS Pro users, fully aware of the distinction between the map view
    and the layout view, Chap. 12 examines what is possible in arcpy with respect
    to the map view, while Chap. 13 here examines what is possible in arcpy with respect
    to the layout view.


    As with the classes in Chap. 12, visualizing the structure of the relationships
    among the classes can help, and this is presented in Fig. 13.1. As before, we
    have the Map and the Layout classes accessed through the ArcGISProject. Where
    Chap. 12 looked at classes attached to the Map, this looks at classes attached
    to the Layout. They are all within the framework of map elements and accessed
    through the `.listElements()` method. There are several types of map elements
    that can be contained within this list, and the tasks below use four of them:
    a map frame element, a legend element, a map surround element which refers to
    things like scale bars and north arrows, and a text element.


    While there is no “LayoutElement” superclass that could hold these properties,
    there are a few properties that are common to all of the individual element classes
    (even including those not presented here). They all refer to the size and position
    of the element as it relates to the page: the height, width, and X and Y coordinates.
    There are other properties and methods specific to some of the types of Layout
    element that we are using here. The map frame is, by its name, the element that
    holds the map figure. This is why it has a reference to the map inside the frame
    through the `.map` property and a reference to a camera object, which is telling
    the map frame where on that map to center itself and what scale to use for zooming
    in or out.


    The map frame is referenced by the next type of element, which is the legend element.
    After all, the legend provides a visual description of the contents of a map,
    so it needs to be able to refer to a map frame to access the contents it is describing.
    It also has a list of LegendItems in which those descriptions are held. The order
    of the contents of a legend item is in the arrangement property.


    The remaining two layout elements that we will be working with in this chapter
    are the most straightforward ones. Text elements contain text and, as such, refer
    to things like the map title or the credits. The nature of a map surround element
    is not as evident by its name, but it refers to the other ancillary elements of
    a map, like a north arrow and a scale bar.


    The following tasks introduce you to and have you work with some of these elements
    for the purpose of improving the cartographic presentation of the data. As a preliminary
    note, it is worth acknowledging the limitations of arcpy in this regard. It is
    possible to move elements on the map and, in some limited cases, edit them. However,
    there is no way strictly within arcpy to create a map element, whether it is the
    map frame, the legend, the north arrow, or anything else. Therefore, we will be
    using a mix of the GUI and the Python Window for this exercise. It is still useful
    to employ arcpy, even within this limited setting, because it can allow you to
    exercise very fine control over the layout and be able to record the exact placement
    of each element within the layout so that it can be recreated with the same or
    different data.'
