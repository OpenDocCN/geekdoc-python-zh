    # Debugging


    # 6


    # Introductory Comments: The Types of Errors


    As you have undoubtedly encountered thus far, the process of scripting inevitably
    produces many errors. As such, before moving forward, it is useful to understand
    different types of errors and how they may be caught and thereby corrected. Much
    of the skill in debugging is in one of two areas: correctly interpreting error
    messages and checking the output to ensure that it did what you wanted it to do.


    We can divide errors into three broad categories: syntax errors, runtime errors,
    and logical errors. The first two will give you the red text that you quite possibly
    dread now when working in the Python Window. Logical errors, however, are more
    insidious. They are when the code provides an answer—just not the right answer!


    The distinction between syntax errors and runtime errors is a bit blurred when
    working within the Python Window and Notebook, although it is clearer in IDLE.
    With syntax errors, there is a problem with the code’s grammar or syntax. This
    could be a misspelled word or variable name, a missing delimiter, or having the
    incorrect indentation. Regardless of the example, it is a situation where the
    computer cannot read the script to even attempt to figure out what you want it
    to do.


    With runtime errors, the script can be read, but not executed. This can occur
    when you have the wrong data type for an operation. For example, if you have a
    variable `x` which is a string and a variable `y` which is an integer, the statement
    `z = x - y` can be read. The syntax or grammar is perfect. However, when the computer
    tries to carry out that instruction, it realizes that it cannot subtract an integer
    from a string and gives an error. Another example is when you try to access an
    item in the list which doesn’t exist. If the `index` variable has the value of
    15, the statement `item = my_list[index]` can be read, but will give an error
    message if `my_list` only has 12 items.


    In practice, within the Python Window and Notebook, both syntax and runtime errors
    give the red text error message as soon as the computer realizes there is a problem.
    The difference is that while syntax errors would almost always be found in the
    line that generated the error, runtime errors can occur later, only once the error
    becomes apparent. Consider the following set of lines:


    ```

    x = "5"

    y = 4

    z = x - y

    ```


    You won’t see an error message until the third line, but the correction you’d
    probably want is changing the first line to `x = 5`. This illustrates the idea
    that while Python will give you a line number as part of the error message, that
    doesn’t guarantee the error occurs on that line. This can make runtime errors
    a bit trickier to track down and fix than syntax errors.


    The most challenging ones, however, are logical errors. For these, the script
    runs start to finish without generating any error messages. The problem, though,
    is that the output is not what it should be. An example would be the following
    attempt to calculate the distance between two points:


