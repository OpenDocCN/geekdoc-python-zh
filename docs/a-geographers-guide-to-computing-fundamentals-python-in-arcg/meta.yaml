    \ Pro 中打开 Python Notebook 时，Notebook 功能区中会出现一个“保存”按钮。点击它。然后将项目保存为 Chapter3.aprx。这样，当您重新打开保存的\
    \ ArcGIS Pro 项目时，您的代码将保留在此 Notebook 中。但是，仅仅因为它存在并不意味着它已经运行过。您必须重新运行代码块，以确保它们创建的变量在您继续工作时是可访问的。\n\
    \n## 任务 4：解析复杂语句\n\n本任务探讨计算机如何读取跨多行的复杂语句。回顾第 2 章，计算机通过查找代码中的特定语法模式来解析代码，例如赋值运算符要求左侧是变量名，右侧是表达式。在这些复杂语句中，计算机使用的是类似的思想，尽管模式更复杂，并且可以跨越多行。\n\
    \n查看一个条件语句，我们有以下内容：\n\n```python\nif paid_dictionary[\"Eve Douglas\"]:\n    print(\"\
    send a receipt.\")\nelse:\n    if student_dictionary[\"Eve Douglas\"]:\n     \
    \   print(\"Send a bill for $\", student_price)\n    else:\n        print(\"Send\
    \ a bill for $\", price)\n```\n\n它总是以关键字 `if` 开头。计算机需要这个关键字来识别后面是一个条件语句。`if` 关键字后面应跟一个计算结果为布尔值的表达式。²\
    \ 这就是为什么我们使用字典将名称与一系列 True/False 值关联起来。因为表达式有时会持续很长，比如 `x = 1 + 2 + 3 + 4 + 5`，我们需要给计算机一个信号，表明表达式已经结束，可以进行计算了。因此，该行以冒号结尾。\n\
    \nthen 子句的语句，即如果表达式为真时要执行的操作，紧跟在包含 `if` 关键字的行之后。在这里，因为此人已经付款，所以应该发送收据。true 子句部分可以包含任意数量的语句，因此也可以是任意数量的行。因此，就像布尔表达式末尾需要冒号一样，计算机需要某种信号来表明\
    \ then 子句的语句集已经结束。这就是缩进的作用。它是模式的一部分，或者说是类似不可见分隔符的字符，用于标识哪些内容属于 then 子句语句，哪些不属于。如上所述，如果存在\
    \ `else:` 子句，关键字 `else` 与关键字 `if` 处于相同的缩进级别。`else` 子句中的任何语句也缩进一级，超出初始关键字，以与 then\
    \ 子句中的语句对齐。如果这些缩进级别不正确，计算机将无法准确判断某一行是否在条件语句内部。同样的规则也适用于 `if` 和 `else` 行之间的 `elif`\
    \ 行。\n\n当条件语句完成后，计算机可以继续执行下一行或多行代码，这些代码与 `if` 和 `else` 关键字对齐。额外缩进级别的结束告诉计算机条件语句已经结束，因此接下来的几行必须执行，无论\
    \ if 语句开头的布尔表达式的值如何。\n\n```python\nif [condition]:\n    → statement(s)\nelif [condition]:\n\
    \    → statement(s)\nelse:\n    → statement(s)\nremainder of script\n```\n\n如果其中任何部分被破坏，将会出现错误，这些错误通常比您在第\
    \ 2 章中遇到的更难追踪。在幕后，Python 会为复杂语句中的每一行编号，因此 `if paid_dictionary[\"Eve Douglas\"\
    ]:` 是第 1 行。与列表不同，在编程的这一方面，我们从第 1 行开始正常计数，而不是第 0 行。但是，如果语法不正确，计算机可能会在代码的其余部分执行到一半时才发现它不起作用。然后，计算机会报告错误的位置，但它报告的是计算机意识到错误的那一行。例如，如果您省略了冒号，当它在找到冒号之前看到换行信号时，它会注意到代码不符合模式。然而，正因为如此，它在下一行（第\
    \ 2 行）发现了错误，因为它只有在跳到下一行而没有找到正式结束第 1 行的信号时才意识到有问题。这意味着，即使计算机报告您在第 2 行有错误，修复方法很可能不在第\
    \ 2 行，而是在第 1 行，或者在发现错误行之前的任何其他位置。\n\n循环具有类似的模式，尤其是在使用制表符来划分代码块时。另一个相似之处是两者都以指示即将执行的命令集目的的关键字开头，例如\
    \ `if`、`for`，尤其是 `while`。`while` 语句与 `if` 语句一样，必须后跟一个计算结果为布尔值的表达式，但它不是只执行一次流程图的\
    \ true 分支，而是持续执行，直到该表达式计算结果为 false。同样，这意味着最终该表达式必须计算为 false。因此，以某种方式，您必须确保该表达式的值有机会从\
    \ true 变为 false。如果您不这样做，并且表达式始终保持 true，这将创建一个无限循环。退出无限循环的唯一方法是强制关闭 ArcGIS，并希望您已保存所有内容。\n\
    \n```python\nwhile [condition]:\n    → statement(s)\nremainder of script\n```\n\
    \n`for` 循环的模式稍微复杂一些，因为添加了关键字 `in`。它的模式是 `for` 关键字后必须跟一个变量名，然后是关键字 `in`，最后是要迭代的项目序列。目前，列表是您在此处最常用的序列。与其他复杂语句一样，循环内的语句必须缩进一级。\n\
