  md: 'Lastly for this conversion process, we can access the ArcPy function that will
    carry it out for us. It is possible, although quite unlikely, that when looking
    at some of the other functions within the `.da` module of `arcpy` in earlier chapters,
    you noticed this function: `arcpy.da.FeatureClassToNumPyArray()`. It has two inputs:
    the feature class (or other table-based data type) that is being converted and
    the list of fields that are to be included within the `numpy` array. Enter the
    following line of code to make the conversion:


    ```

    array = arcpy.da.FeatureClassToNumPyArray(fc, fields)

    ```


    Now that we have our `numpy` array, you might be wondering why we could not just
    use a python array as introduced in Chap. 11. Let''s take a look at the interior
    of the `array` variable here by simply typing its name, `array`, and pressing
    enter. You should see output like this:


    ```

    array

    >>> array([(0.051485 , 0.07214039, 0.07781311, 0.21964603, 0.26566542, 0.22219777,
    0.31320043,

    0.21671328, 0.54892157, 0.26455139, -0.08471718, -0.27359168, -0.1790466 ), (0.06597251,
    0.06888793,

    0.03680725, 0.16410657, 0.27274817, 0.18133654, 0.2993142 , 0.18226777, 0.54615429,
    0.2543156 ,

    -0.27739867, -0.25147752, -0.35226863), (0.08192977, 0.11589624, 0.0748208, 0.25928362,
    0.30467272,

    0.27083206, 0.33296029, 0.20910387, 0.55237061, 0.29681452, -0.08425255, -0.09077854,
    -0.1229404

    ), ..., (0.15345213, 0.26639974, 0.40515671, 0.32551684, 0.42989901, 0.29654785,
    0.33668167,

    0.33963245, 0.88142758, 0.43140419, 0.10041128, -0.38272013, 0.11319308), (0.13256161,
    0.23169898,

    0.33223293, 0.37609896, 0.50805646, 0.39950759, 0.41706762, 0.3554569 , 0.86723604,
    0.41341665,

    0.17457706, 0.15773115, 0.23446054), (0.19719181, 0.27864918, 0.41363254, 0.34340663,
    0.44583826,

    0.32286904, 0.37952758, 0.45799205, 0.8389042, 0.59461085, 0.30320202, -0.17735393,
    0.43767242)],

    dtype=[(''HEALTHLINK'', ''<f8''), (''SHAH'', ''<f8''), (''BASCUNAN'', ''<f8''),
    (''MCGRAIL'', ''<f8''), (''DOMNICH'',

    ''<f8''), (''ASANIN'', ''<f8''), (''PAEZ'', ''<f8''), (''GAO'', ''<f8''), (''YIN'',
    ''<f8''), (''DALY'', ''<f8''),

    (''CHATEAU_SEFI'', ''<f8''), (''CHATEAU_SOC'', ''<f8''), (''CHATEAU_MAT'', ''<f8'')])

    ```


    At first glance, it resembles a somewhat more complicated list, in which it looks
    like a list of tuples. Note the pattern here of `array([(…values…), (…values…),
    (…values…), …, (…values…)], …)`. Each of the sets of values here, represented
    by the (…values…) elements of the pattern, constitutes one row in the table. In
    this case, since there were 13 fields selected, each of these rows has 13 numbers
    in it. If, like arrays work, all the internal data types are the same (e.g., all
    integers or all doubles), then this might not seem too different. However, there
    is another portion after all the values, starting with the `dtype` name. This,
    too, seems to be a list of tuples, as it again has the square brackets along the
    outside, with tuples in parentheses as the values in this list. Instead of one
    set of values for each feature or row in the table, it has one pair of values
    for each attribute or column in the table. This means that, in this example, there
    are 13 tuples, and each of these tuples start with the variable name and then
    has another value of ''<f8'' for each variable.


    Looking at documentation for NumPy, this is what they call a structured array.
    Structured arrays allow for more than one data type to be present, although it
    is not as free form as a list. The `dtype` list records what type of data is associated
    with each variable. Once this association is set up, every feature in the structured
    array must have the same number of attributes, in the same order, using the same
    data types as specified in the `dtype` list. In this case, the use of `f8` indicates
    that they are all 64-bit floating-point numbers, which correspond to Doubles in
    ArcGIS Pro. Even though all the data types in this particular structured array
    are all the same, this is not required.


    # Task 2: Using a numpy Function


    The means by which these 13 indices are compared is a covariance matrix. While
    ArcGIS Pro does not easily have a tool to compute such a matrix for vector data¹,
    `numpy` does. Therefore, we can use our newly created structured array to find
    the correlation matrix of all 13 of these indices, telling us the extent to which
    each possible pair of indices varies together.


    > ¹Strangely enough, it is available for raster data within the BandCollectionStats()
    function.'
