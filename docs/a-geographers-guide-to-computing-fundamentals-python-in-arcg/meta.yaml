    \ to illustrate some of the similarities between the two languages and thereby\
    \ demonstrate an argument from the first section of the book. Once you learn the\
    \ fundamentals of programming and can recognize the syntax patterns of different\
    \ general strategies, it becomes considerably easier to decipher code from another\
    \ language and eventually program in it. The script is below:\n\n```r\n#Spatial\
    \ Lag Regression R Script\ntool_exec<- function(in_params, out_params) {\n\n \
    \   arc.progress_label(\"Loading packages...\")\n    arc.progress_pos(20)\n\n\
    \    if(!requireNamespace(\"spatialreg\", quietly = TRUE))\n        install.packages(\"\
    spatialreg\", quiet = TRUE)\n    if(!requireNamespace(\"spdep\", quietly = TRUE))\n\
    \        install.packages(\"spdep\", quiet = TRUE)\n    install.packages(\"spatialreg\"\
    , quiet = TRUE)\n    require(spatialreg)\n    require(spdep)\n\n    input_data\
    \ <- in_params[[1]]\n    dependent_variable <- in_params[[2]]\n    independent_variables\
    \ <- in_params[[3]]\n\n    arc.progress_label(\"Loading data...\")\n    arc.progress_pos(40)\n\
    \n    d <- arc.open(input_data)\n    fields_list <- append(c(dependent_variable),\
    \ independent_variables)\n    d_df_full <- arc.select(d)\n    d_df <- arc.select(d,\
    \ fields = fields_list)\n\n    d_sp <- arc.data2sp(d_df)\n\n    arc.progress_label(\"\
    Running Regression...\")\n    arc.progress_pos(60)\n\n    response <- d_df[, 1]\n\
    \    predictors <- d_df[, -1]\n\n    queen <- poly2nb(d_sp, queen = TRUE)\n  \
    \  queen_nb <- nb2listw(queen)\n    lagModel <- lagsarlm(response ~ ., data =\
    \ predictors, queen_nb)\n\n    arc.progress_label(\"Writing output...\")\n   \
    \ arc.progress_pos(80)\n\n    if(!is.null(lagModel) && lagModel != \"NA\")\n \
    \       print(summary(lagModel))\n\n    arc.progress_pos(100)\n}\n```\n\nThe first\
    \ thing to notice is that it is entirely within a single syntax pattern as below.\
    \ The word `function` there can give a clue as to what is happening. It is a keyword\
    \ for setting up a new function, just like the `def` statement in Python. This,\
    \ then, has two input parameters for the function, `in_params` and `out_params`.\
    \ In place of the colon and indentation to indicate the beginning and end of the\
    \ code block within the function, R is using curly braces at the start and at\
    \ the end:\n\n```r\ntool_exec <- function(in_params, out_params){\n    ...\n}\n\
    ```\n\nThis would then be equivalent to the following Python line:\n\n```python\n\
    def tool_exec (in_params, out_params):\n```\n\nYou might observe, though, that\
    \ there is no line in this file that actually executes the function. That hints\
    \ at one of the more computationally complex aspects of this bridge. All examples\
    \ consist solely of a function named `tool_exec`, indicating that when the tool\
    \ is run, the bridge is looking for a function by the name of `tool_exec`, and\
    \ automatically runs that function.\n\nThe next line after the function definition,\
    \ `arc.progress_label(\"Loading packages...\")`, looks like it could be accessing\
    \ the method of an object. This is similar to what is going on, by setting the\
    \ label that is attached to the progress bar in ArcGIS Pro. The difference is\
    \ that dots are permitted in variable names and function names within R, so this\
    \ is simply a function called `arc.progress_label`, not a method of some variable\
    \ called `arc`. Looking at the PDF documentation for the `arcgisbinding` project\
    \ will show that almost all of the functions provided by the package begin with\
    \ `arc`, including the dot. This illustrates that when comparing one programming\
    \ language against another, the delimiters and keywords are often what can change\
    \ the most.\n\nAfter the two functions for updating the progress bar are run,\
    \ we see another mostly familiar type of structure: the conditional statement.\
    \ The same keyword of `if` is used, and in both cases, a Boolean expression follows\
    \ that keyword. While they were not needed here, the curly braces could have been\
    \ used again in place of the colon, like they are used for the function definition\
    \ statement. The lines inside the conditional statement perhaps provide a better\
    \ clue to what it is doing than the condition itself, at least for those who are\
    \ unfamiliar with R. The function name `install.packages` suggests a purpose similar\
    \ to importing a module, and that is, indeed, what this is doing. The conditional\
    \ statement is making sure a module is imported only if it is needed—i.e., it\
    \ hasn't already been loaded. A fairly quick search about the require function\
    \ reveals that it is what R uses to import a package within a function, as we\
    \ are in this case. It also shows that for R packages, importing a package is\
    \ a two-step process, where it first must be installed, then it must be accessed\
    \ through the `require` function or the `library` function if you are not in another\
    \ function.\n\nThe next three lines all seem to be accessing values from the input\
    \ parameters, and the use of variable names corresponding to the input parameters\
    \ from the tool makes this very likely. It shows the use of R's assignment operator.\
    \ Where Python uses a single equals sign (=) to make an assignment, R uses a two-character\
    \ left-facing arrow (<-).\n\nThe two lines after accessing the input parameters\
    \ are, again, updating the progress bar's label and position. The subsequent five\
    \ lines are, at first glance, fairly straightforward assignment operators. If\
    \ you take a look at the `arcgisbinding` documentation, you might begin to decipher\
    \ the different functions that are used here. The first one, `arc.open`, as the\
    \ name indicates, opens up the input data layer. Then the two sets of variables\
    \ are appended to get a single list of fields that needs to be retrieved from\
    \ the dataset. This retrieval is in the `arc.select` function. The last of these\
    \ lines, `arc.data2sp`, converts the data into a spatial data frame, which is\
    \ a data structure specific to R. This reinforces the issues of working with `numpy`,\
    \ in that transferring from one package to another, or in this case, one language\
    \ to another, frequently requires the conversion of data from a structure suitable\
    \ for the first package to one suitable for the second package.\n\nAs you look\
    \ through the remainder of the script, observe that most of the lines are variations\
    \ on the ones already explained here, whether that is setting the label or position\
    \ of the progress bar, assigning values to variables, or using a conditional statement\
    \ to control the execution of the code. You will probably even notice the `print`\
    \ function looking very similar.\n\nThis task should help provide confidence that,\
    \ upon learning the basic fundamentals of computing, such as variables, assignments,\
    \ control statements, and functions, it becomes easier to switch among different\
    \ programming languages. Therefore, through the skills contained in this book,\
    \ you should have not only a guide to computing with Python in ArcGIS Pro but\
    \ really a guide to GIS computing in general for when—not if, but when—ESRI decides\
    \ to change from Python to another language, or you decide to move to a different\
    \ GIS platform, like QGIS.\n\n## Task 6: Unguided Work\n\nWe may wish to have\
    \ the data for a two-dimensional histogram, since the Charts function within ArcGIS\
