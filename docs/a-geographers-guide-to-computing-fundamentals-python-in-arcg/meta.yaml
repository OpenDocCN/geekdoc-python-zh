  md: '# Developing a Custom Python Package


    # 21


    # Introductory Comments: Python Packages


    With a program that spans multiple files, sharing becomes more streamlined when
    we compile those files into a single package. In addition, having a package will
    make it possible to access our program here through an ArcGIS Pro tool. Packages
    are very commonplace within software development, as a semi-standardized unit
    of how code gets shared. Even if the terminology may change, packages are used
    across many programming languages and environments and have been used for decades.


    The primary advantages of packages are their portability and their structure,
    and these are interrelated. The portability is evident in how many packages are
    shared through various online code repositories, such as GitHub or PyPI, the Python
    Package Index. By having packages available in these central repositories, it
    becomes much easier both to share your code for a wider audience and to find code
    that others have shared.


    This portability only works, however, when there is a common structure underlying
    the packages. After all, every package you have imported, `arcpy`, `numpy`, and
    others, is a collection of Python files that the computer has made available to
    you. You did not have to open those files, install them yourself, or do anything
    else with them, which makes the importation process much easier for the vast majority
    of programmers who would not have the skills necessary to implement those connections
    manually. This means we must rely on the computer to implement those connections.
    Trusting the computer to make the connections properly means there must be a structure
    that is strictly adhered to in order to ensure the computer can find what it is
    looking for. This structure is examined and implemented in Task 1.


    The remainder of the chapter takes the package that is created in Task 1 and enables
    it to be imported into the code for an ArcGIS Pro tool, which can then be packaged
    and shared as a .ppkx file.


    # Task 1: Turning the MultiCursor and Summarize Files into a Formal Package


    The first aspect of sharing our code with the wider world and making it accessible
    to ArcGIS Pro is turning it into a package. In one sense, a package is simply
    a collection of files. However, while the computer is great at storing collections
    of files, if we want the computer to use those files without human supervision,
    they must be structured just as strictly as our computer code is. Any deviation
    from the structure that is expected of python packages will cause problems much
    like a syntax error prevents python code from being read.


    To set up that structure, we will want to use a completely new folder and only
    have the minimum necessary inside that folder. Go to Windows File Explorer, and
    navigate to whatever file location you want to use for this chapter’s work. Since
    this is continuing the PValue work from Chap. 20, I am using the same directory
    that I was using for that work. In your chosen directory, create a new folder,
    and call it “chapter21.” Within that folder, create another folder, also called
    “chapter21.” This gives the folder structure below, although the .idlerc folder
    will be automatically generated later, so you won’t have it yet.


    ![](img/37990581b275bdf7d510c6f2d9702a31_238_0.png)'
