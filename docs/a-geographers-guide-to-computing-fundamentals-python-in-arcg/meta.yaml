    # Delimiters


    Delimiters are punctuation marks that guide the computer in interpreting the code
    you write. In this, they function like punctuation in English or other languages.
    However, imagine the computer as the worst stickler for grammar you have ever
    seen, worse than the high school English teacher who spent an entire week on when
    you should and should not use a comma. This'
