  md: "Recall from Chap. 1 the principle of initializing variables. We will need to\
    \ keep track of some pieces of information as we work our way through this loop\
    \ to make sure we are doing all the calculations correctly. In this case, we need\
    \ to create four variables to store information for us to solve this problem.\
    \ The first is the total list of topics, so that we know what topics are available\
    \ for inclusion in the training. We can get this variable as the list of keys\
    \ from `topic_dictionary`. Also, to make sure the inner workings of the `while`\
    \ loop work properly, it should be sorted. The second variable is the list of\
    \ topics that will be in the training. We will initialize this to be an empty\
    \ list, which is represented by the brackets for a list with nothing in between\
    \ them. Each time through the loop, we will add to this list. The third piece\
    \ of information to assist our tracking is the number of hours taken by the topics\
    \ in the list of training topics thus far. We will initialize it at zero, and\
    \ add hours to it at the same time as we add topics to the list. The last variable\
    \ is an index variable to keep track of where we are in the list of topics, which\
    \ will also be initialized to zero and incremented by one each time we go through\
    \ the loop.\n\n**Question 1: Please enter code to create these variables into\
    \ a new, empty code block, and click Run.**\n\nRecall from above that extracting\
    \ the list of keys from a dictionary does not always return them in the same order\
    \ in which they were entered. This is why we need to sort the list of topics,\
    \ and is why they have the numbers at the start, representing what topics are\
    \ covered first, second, third, etc. Having these numbers guarantees that sorting\
    \ the list will provide the appropriate ordering.\n\nNow we are ready for our\
    \ `while` loop. We can first create a flow chart of what needs to happen. Note\
    \ that when the “No” part of the loop completes, it returns to the start. This\
    \ means that an infinite loop can happen if the number of total hours would never\
    \ exceed 24, and there was always a next topic (Fig. 3.3).\n\nWhile loops start\
    \ with the syntax of `while [condition]`: and the code that is indented in the\
    \ following lines will keep running as long as that condition is true. This means\
    \ that there is a potential problem lurking in any while loop—the infinite loop.\
    \ You must ensure that the condition in the while loop will eventually become\
    \ false. If it never becomes false, the loop will just keep on running and running\
    \ and running, without ever stopping. If you try this in ArcGIS, you will either\
    \ get a strange error or watch it run for a long time, and eventually ArcGIS will\
    \ crash after running out of memory. So before you run a `while` loop, I encourage\
    \ you to critically think through the code and confirm that it will end.\n\nThe\
    \ while loop is as follows. Please enter it and click Run:\n\n```\nwhile total_hours\
    \ < 24:\n    training_topics.append(topic_list[index])\n    total_hours = total_hours\
    \ + topic_dictionary.get(topic_list[index])\n    index = index + 1\n```\n\nWhen\
    \ all is said and done, your window should not yet have any output. This is because\
