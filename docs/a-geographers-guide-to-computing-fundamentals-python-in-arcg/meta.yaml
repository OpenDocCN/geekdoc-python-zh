    # Task 1: Turning a Feature Class into a numpy Array\n\nThe Python package that\
    \ we will use in addition to ArcPy is NumPy, a package to support scientific and\
    \ statistical computing. The examples in the tasks for this chapter come from\
    \ research I did on comparing measures of access to health care (Conley et al.\
    \ 2021) and which indeed make use of statistical computing.\n\nOne of the key\
    \ lessons when working with multiple modules is that different modules may use\
    \ similar, but not identical, data structures. In this case, `numpy` does not\
    \ inherently use the same data structures as `arcpy`, especially when `numpy`\
    \ does not have any specific interest in spatial data. This means that we will\
    \ have to make our first task the conversion of data from an `arcpy`-friendly\
    \ data structure into a `numpy`-friendly data structure. Conveniently, there is\
    \ already a function to accomplish this that is provided by `arcpy`.\n\nTo make\
    \ this conversion, we first need the desired data in its `arcpy` format. As we\
    \ have done before, this starts with getting the feature class. As this will be\
    \ carried out line by line, the Python Window will be a good place to run the\
    \ code, although using cells in a Python Notebook would also work:\n\n```\naprx\
    \ = arcpy.mp.ArcGISProject(\"CURRENT\")\nm = aprx.listMaps()[0]\nl = m.listLayers()[0]\n\
    fc = arcpy.ListFeatureClasses(\"chapter19\")[0]\n```\n\n# Question 1: Using python\
    \ code from previous chapters, how many fields are in fc?\n\nAs mentioned above,\
    \ this data comes from a project comparing different measures of access to health\
    \ care. Specifically, it compares a series of measures of socioeconomic and demographic\
    \ barriers to accessing health care. While many of the variables in the fields\
    \ of this feature class are used in the calculations of one or more of these measures,\
    \ they are not needed for this comparison. Instead, only a few of the variables\
    \ at the end are truly needed. We can set up a list of only the necessary fields\
    \ through the following line of code:\n\n```\nfields = ['HEALTHLINK', 'SHAH',\
    \ 'BASCUNAN', 'MCGRAIL', 'DOMNICH', 'ASANIN', 'PAEZ', 'GAO', 'YIN', 'DALY', 'CHATEAU_SEFI',\
    \ 'CHATEAU_SOC', 'CHATEAU_MAT']\n```"
