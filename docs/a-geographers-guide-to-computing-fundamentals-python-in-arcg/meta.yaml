    # Question 4: Is the slope a temporary or permanent raster?


    We cannot ask the raster to directly tell us which value is in a specific row
    and column index, probably because it isn''t actually represented as a whole series
    of rows and columns like a spreadsheet. We can, however, ask the raster to tell
    us the value at a particular location, which is probably more useful anyway. Besides,
    if we know the corners of the raster, and the cell size, we can use a little algebra
    to convert back and forth between row/column indices and locations on the ground.⁴
    This is through a tool that is outside of the spatial analyst toolbox.

    Enter `cell = arcpy.management.GetCellValue(slope, "590093 4381728")`⁵ and press
    Enter. The first parameter is the raster in question (`slope` here), and the second
    parameter is a string containing the X and Y coordinates of the location you want
    separated only by a space, and these coordinates must be in whatever coordinate
    system the map is using. (We are using UTM, zone 17N, in this exercise.)

