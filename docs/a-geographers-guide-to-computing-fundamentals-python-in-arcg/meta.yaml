  md: '# Vectors and Geometries


    # 11


    # Introductory Comments: Data Structures for Points, Lines, and Polygons


    In the previous chapter, we used cursors to access the attribute table of a feature
    class. In this chapter, we will examine and work with the geometry portion of
    a feature class. Recall that these are vector data, which means our geometries
    are stored as points, lines, and polygons.


    As far as the computer is concerned, the basic building blocks of all these shape
    types are points, with X and Y coordinates, recorded either in latitude and longitude,
    or in a planar coordinate system such as UTM or State Plane Coordinate System.
    Most commonly, these points will be labeled with some name or identifier, and
    given X and Y coordinates, as illustrated in the table shown below.¹ It should
    be noted here that what follows is but one approach to representing vector geometries
    in a computational structure. Different vector file types (shapefile, geodatabase,
    KML, etc.) can have different underlying structures. The common theme is the use
    of points, lines, and polygons and ensuring that lines and polygons are comprised
    of individual points that represent the vertices of lines and polygons (Fig. 11.1).


    If our data type is points, we can stop at that. If, instead we have lines, we
    have another step. This step, though, is as easy as connecting the dots. Lines
    are defined as a connected set of points. This can be represented through an additional
    table, as shown below (Fig. 11.2).


    Polygons add one additional level, representing the boundary of the polygon as
    a series of lines which collectively start and finish at the same location, as
    illustrated below. Often, these lines represent shared boundaries between polygons.
    For example, we could represent West Virginia as the border between West Virginia
    and Maryland, the border between West Virginia and Virginia, the border between
    West Virginia and Kentucky, the border between West Virginia and Ohio, and the
    border between West Virginia and Pennsylvania. Doing this can then allow us to
    reuse lines, such that the border between West Virginia and Ohio can be used as
    part of the outline of the West Virginia polygon and as part of the outline of
    the Ohio polygon (Fig. 11.3).


    Carrying out spatial analysis tasks, from identifying whether a point is in a
    polygon to carrying out a geographically weighted regression, is all built upon
    operations using geometry tables like these. After all, a computer can only work
    with numbers, and it is through tables like these that the computer transforms
    a geometric shape into a series of numbers. The operations for working with these
    tables can get surprisingly complex, so a detailed examination will not be undertaken
    here. If interested, some of the more advanced references in the Concluding Remarks
    provide examples of how complex it can get, even for something that would seem
    as simple as identifying whether a point is in a polygon or whether two lines
    intersect. In this chapter, we will instead use ArcPy to examine, edit, and do
    some simple geoprocessing functions on vector geometries.


    ¹As we will see later, the reality of linking coordinates to an attribute table
    is a bit more complex, but this will work well for illustrating concepts.


    **Supplementary Information:** The online version contains supplementary material
    available at [https://doi.org/10.1007/978-3-031-08498-0_11](https://doi.org/10.1007/978-3-031-08498-0_11).'
