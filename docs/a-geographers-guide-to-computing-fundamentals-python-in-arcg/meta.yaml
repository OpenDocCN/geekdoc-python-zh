  md: "# Task 3: Create Shells of the Classes\n\nNow that we have our plans, we can\
    \ start to fill in the code for these classes. While we are at it, we can change\
    \ the code for the `try/except` block at the end of the file. It will, in fact\
    \ get much simpler, as we will see. We just need to get the parameters from the\
    \ tool, create our parcel, run the `propose()` method, and give the user a message.\
    \ If there are any problems, we will receive an `ApprovalError`, which is caught\
    \ in an `except` clause. We also catch a `StopIteration` error, as before, to\
    \ improve the user friendliness for the situation where the user enters a lot\
    \ number which doesn't exist.\n\n```\ntry:\n    lotID = ARCPY.GetParameter(0)\n\
    \    newBuildingSize = ARCPY.GetParameter(1)\n    newBuildingType = ARCPY.GetParameter(2)\n\
    \    permitParcel = Parcel(lotID)\n    newAppraisal = permitParcel.propose(newBuildingSize,\
    \ newBuildingType)\n    ARCPY.AddMessage(\"Your permit should be approved, and\
    \ the new tax amount is estimated to be \" + str(newAppraisal))\nexcept ApprovalError\
    \ as ae:\n    ARCPY.AddError(\"There was an error during the approval process.\
    \ \" + str(ae))\nexcept StopIteration as si:\n    ARCPY.AddError(\"Your lot number\
    \ doesn't exist.\")\n```\n\nDefining our new classes introduces another keyword,\
    \ which is like `def`, but for classes. It is, appropriately enough, `class`.\
