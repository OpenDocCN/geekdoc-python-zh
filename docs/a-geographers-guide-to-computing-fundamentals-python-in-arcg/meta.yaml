    # Introductory Comments: More Complex Programming and UML


    The last part of sharing your work that we will cover in this book is creating
    a Python package. The details of that are in the next chapter, but, first, we
    will look more at the programming process that often leads up to the creation
    of the package. In many situations, whether for creating a package or not, you
    may find yourself in a position where you want to be using more than one Python
    file. It may be a situation where a single file is becoming too long to manage,
    so you want to break it up. More common, though, is a situation in which you realize
    some parts of the code you are writing could be more generically useful and would
    be beneficial to be a separate file that is more readily accessible to a wider
    range of projects.


    This is the case in the situation that inspired the code for this chapter. I was
    working on a research project in which I created hundreds of feature classes of
    simulated data for statistical analysis. This thus far unpublished project looked
    at the sensitivity of statistical p-values to certain geographic situations, and
    I assessed this sensitivity by comparing the results of LISA analysis of the US
    2016 presidential election against LISA analyses of randomly simulated data. There
    were 100 simulations for each LISA analysis, each of those simulations being in
    its own feature class. For part of this work, I wanted to create a list of the
    values for each county across all 100 simulations and find the minimum, maximum,
    mean, standard deviation, and other analytical summaries for this list of numbers.
    The standard approach for GIS would have been to join all the simulation feature
    classes, but joining 100 feature classes seemed like overkill for this situation.
    While I could perhaps have had 100 cursors stepping simultaneously through the
    feature classes, there isn’t any guarantee that they will have all features in
    the same order, which is necessary for the summaries I was computing.


    Therefore, instead, I decided to create a class called a multiCursor that can
    act like a cursor in stepping through the files, but where a cursor returns a
    list for the single row corresponding to that feature’s entry in the attribute
    table for the feature class associated with that cursor, in the multiCursor, it
    returns a list of lists, with each internal list corresponding to that feature’s
    entry in one of the feature classes and the overall list containing one list for
    each of the feature classes provided to it. It would also be useful if the multiCursor
    also has methods to support finding all values associated with a specific feature,
    and to support finding all values associated with a specific field.


    This concept of a multiCursor can be useful in additional situations, not just
    this specific p-value investigation, so I wanted it to be a separate Python file
    that can be accessed. Likewise, I felt that the function carrying out the summary
    statistics could also be more broadly useful, so set that out as its own file.
    Then there is a third file for this specific research project.


    As this project becomes more complex, there should be a way to organize the structure
    and represent it, to ensure that all parts get completed, and that it is easier
    to identify the relevant parts of the code for later communication about it. This
    way is using a Unified Modeling Language, or UML. It was briefly introduced in
    Chap. 12 to show the connections between different classes involved with the mapping
    module, and a bit more is added here. UML is a large and very structured approach
    to creating diagrams to assist in software development. Since UML was designed
    for much larger projects than this, a full implementation of UML is probably overkill.
    Even so, the use of class diagrams can still be useful and can help illustrate
    how we can organize our thoughts before attempting to write the code.


    **Supplementary Information:** The online version contains supplementary material
    available at [https://doi.org/10.1007/978-3-031-08498-0_20].'
  - '[PAGE 217]


    More than anything else, I hope that what you get from this chapter is a sense
    of the planning that is involved in a larger programming project. To return to
    the basics, we break down a big project into smaller and smaller sub-projects
    until those sub-projects become manageable chunks of code, and then, if the planning
    has gone well, they can easily slot into place for the bigger picture, and you
    have a fully functioning multiple-file program. Even if you do not use UML or
    anything like it, you will almost certainly require much more planning to execute
    a larger project than anything that you did for the previous chapters.


    # Task 1: Construction of UML-Like Diagrams


    Building upon the writing analogy from earlier chapter, it can be daunting to
    just stare at an empty file for a large task like this, just as it can be daunting
    to stare at an empty page for a longer essay. Where you might use an outline to
    organize your thoughts prior to writing an essay, programming might not be as
    strictly linear, so an outline of a complex project is perhaps not helpful. Instead,
    a class diagram shows the relationships between classes in a programming project
    that typically contains many different classes. Since class diagrams are designed
    with object-oriented programming in mind, in which everything is an object and
    all programming exists within classes, and we do not have a fully object-oriented
    system here, we will have to adapt the class diagram somewhat to accommodate the
    parts of the program that use a function-based style of programming instead.


    I start here with the main analytical program that we will attach to an ArcGIS
    Pro tool in Chap. 21.¹ It has the general code that isn’t part of any function,
    primarily to import the parameters, and a function to carry out the analyses.
    In the middle block of the class diagram² element below, I am denoting the input
    parameters with their names and their types, as they will be set up through the
    custom tool in Chap. 21. In the lower block, the function is specified. The first
    items under the name of the function are the input parameters. These will go into
    the tuple of parameters passed into the function, and the diagram also specifies
    the data types they will be. Lastly, it notes that there is no return value. We
    will see why when we fill out the plan for this function in Task 2. Also with
    respect to that plan, you will notice that this diagram specifies nothing about
    the code itself or what the contents will be. It treats it simply as a black box,
    specifying the inputs and outputs, and nothing else (Fig. 20.1).


    The next file will help out with the computation of the summaries. Its purpose
    is to take a list of numbers or test values, along with the procedure that is
    being used. Unlike the first file, it takes no information from the user and does
    not create any class with an `__init__` function. This means the middle block
    of the UML element is empty. The function is still presented in the lower block.
    It specifies what the input parameters are. Following the lead of the arcpy documentation
    that we have seen, I also indicated optional input parameters by placing their
    names in curly braces. Unlike the `populationSummaries` function, this function
    has a return value, which will be a floating-point number (Fig. 20.2).


    The third file is the one best suited for the UML diagram, as it contains a class:
    the `multiCursor`. All the file contains is the class, so we will only have the
    class itself shown. The middle component of the diagram element has the parameters


    ![](img/37990581b275bdf7d510c6f2d9702a31_217_0.png)


    Fig. 20.1 Diagram of the PValues_ch20.py file


    > ¹We aren’t doing this now because, for some reason, it is much easier to debug
    the program using IDLE. The tool will read the connected files, but if there is
    an error in a connected file that you need to debug, somehow, that fix doesn’t
    readily show up. It is as if the connected files were compiled and stored as the
    compiled binary files instead of something that can be changed later.


    ²This is, strictly speaking, not exactly a class diagram, because it is referring
    to a file instead of a class. This is because the file here uses functional programming
    instead of object-oriented programming, and UML is designed only for object-oriented
    programming. The use of internal variables set from the parameters of the tool
    as similar to properties, and a function in place of an object’s method(s) is
    an adaptation of UML that, in my opinion, helps to explain what is going on in
    this file. The same is true of Fig. 20.2.'
- md: '## Task 2: Plan the Components of the Files


    I''ll take the three files in the same order and plan them out. The approach here
    is parallel to the illustrative example at the start of Chap. 17. This section
    creates the flow charts and pseudocode for each of the three files, and the next
    three tasks fill in the pseudocode. I will skip the debugging aspect of Chap.
    17, however, because it would simply take too long! I also note here that the
    presentation of this is a more linear process than what actually took place. There
    was one case where I realized that, in fact, a different method would be very
    useful and went back to the UML concept, added a method, and returned to planning
    the code out. This will be explained when I get to that part of the relevant flow
    chart. Likewise, I weighed different options for some of the control statements,
    tried planning out several approaches, and only present the one that I ultimately
    settled on below. Again, a brief explanation is given at the appropriate spot.


    Just like we started out the flow chart for Chap. 17 very simply, the flow chart
    here for the PValues_ch20.py file starts out very simply (Fig 20.5).


    Using the UML diagram above, we can recall what those input parameters are going
    to be: a list of feature classes, a table of fields and strings, another field,
    and a feature class. The data types do not tell us very much, but here with our
    plan, we can fill out some of the intent behind the parameters. What we need from
    the user starts with a set of feature collections. These are the simulations in
    the motivating application from the introductory comments, although it can be
    any list of feature collections. We also need a table of fields and strings. This
    is an input type for ArcGIS Pro tools that I have not yet covered. It allows for
    input parameters to be entered in pairs (or groups of more than two, but pairs
    here). This way, the user can specify each pair of a field to be summarized alongside
    how it is to be summarized, such as finding the minimum value, the maximum value,
    the mean, etc. The field is, of course, that field, and the string is the summarization
    procedure. It should be noted that all of the fields in this table must be present
    in all of the feature classes in the fcList input parameter. The keyField is a
    unique identifier that will be used to keep track of the features as we cycle
    through them. Lastly, there is another feature class that will store the output
    of all the summaries in new fields. This target feature class does not need to
    be one of the input feature classes in fcList.


    The black box in the flow chart above will primarily be the populateSummaries
    function, but we can compare the parameters that we get from the user with the
    input parameters for the function and notice that there is one change. The function
    takes a dictionary, rather than a table. This means we need to somehow convert
    the table into a dictionary before we can run that function (Fig. 20.6).


    The means by which we carry out that conversion might not be straightforward,
    so let’s flesh that out. The first step in this is to figure out what we want
    this dictionary to look like. For creating the summaries, it would probably be
    useful if we had a record of all the summaries requested for each field. This
    lends itself to a dictionary in which the field is the key and the value is a
    list of all the summary procedures for this field. The available summary procedures
    are minimum, maximum, mean, standard deviation, counting the number of features
    that are less than a value, and counting the number of features that are equal
    to a value. The user, though, can request as many or as few of these as desired
    (Fig. 20.7).


    Once the dictionary is created, we can move to the box labeled “Run populateSummaries
    function” in the flow chart and thereby run the function that uses the dictionary
    and the other user-provided parameters, to calculate the summaries and put them
    in the right attributes of the target feature class. This last box in the overall
    flow chart, which is “Put summaries in target FC,” will be part of the function,
    and since that is the goal of the function, this is why there is no return value
    for the function. Instead of returning a value to the Python code, it instead
    puts those values in the feature class designated for that purpose.


    This is a more complicated flow chart, because it ultimately requires running
    the populateSummaries function for each combination of feature, field, and summary
    procedure. This means we are going to need a trio of nested for loops. I had initially
    considered looping through each field first, then each summary procedure, and
    each feature within that, but it became challenging to figure out how to correctly
    manage the update cursor. Because of that, I concluded that the simplest approach
    was to tackle each feature one by one, instead of each field, and therefore have
    the outermost loop be through the features (Fig. 20.8).


    Within the feature loop, I first extract all the values for that feature from
    the multiCursor. Once those values are extracted, I have a list of lists of the
    values. However, to get the summaries, I need a list of just those values for
    the field being examined at each stage of the “for each field” loop. Once I have
    that single list, I can give that list of values to the summarize function, along
    with the desired procedures, one by one in the innermost loop. Summarize gives
    me a single value, which I can place in the correct position in the update cursor.
    When all field and procedure combinations are completed for the feature, that
    row of the update cursor must be updated before moving on to the next feature.


    In this flow chart, we use both the summarize and multiCursor files. However,
    as far as this file is concerned, we are trusting that they do their work correctly
    and will not expand upon those boxes in the flow chart here. By splitting this
    up, we can separate out the complexity of computing the summaries and keeping
    track of the features and fields and feature classes.'
  mdcn: '## 任务 2：规划文件的组成部分


    我将按照相同的顺序处理这三个文件并进行规划。此处的方法与第 17 章开头的示例类似。本节为这三个文件中的每一个创建流程图和伪代码，接下来的三个任务将填充伪代码。不过，我将跳过第
    17 章的调试部分，因为那会花费太长时间！我还要在此说明，这里的呈现方式比实际发生的过程更具线性。有一个情况是，我意识到实际上另一种方法会非常有用，于是回到了
    UML 概念，添加了一个方法，然后继续规划代码。这将在我讲到相关流程图的那部分时进行解释。同样，对于一些控制语句，我权衡了不同的选项，尝试规划了几种方法，最终只呈现了我最终选定的那一种。同样，在适当的地方会给出简要说明。


    就像我们开始第 17 章的流程图非常简单一样，这里为 `PValues_ch20.py` 文件绘制的流程图开头也非常简单（图 20.5）。


    使用上面的 UML 图，我们可以回忆一下这些输入参数将是什么：一个要素类列表、一个包含字段和字符串的表、另一个字段以及一个要素类。数据类型本身并没有告诉我们太多信息，但在这里，通过我们的规划，我们可以填充一些参数背后的意图。我们需要用户提供的首先是一组要素集合。这些是引言注释中激励性应用中的模拟，尽管它可以是任何要素集合的列表。我们还需要一个包含字段和字符串的表。这是
    ArcGIS Pro 工具的一种输入类型，我之前还没有介绍过。它允许输入参数成对（或更多组，但这里是成对）输入。这样，用户可以指定每个字段及其对应的汇总方式，例如查找最小值、最大值、平均值等。字段当然是那个字段，字符串是汇总过程。需要注意的是，此表中的所有字段必须存在于
    `fcList` 输入参数的所有要素类中。`keyField` 是一个唯一标识符，用于在遍历要素时跟踪它们。最后，还有一个要素类，它将在新字段中存储所有汇总的结果。这个目标要素类不需要是
    `fcList` 中的输入要素类之一。


    上面流程图中的黑框主要是 `populateSummaries` 函数，但我们可以将从用户那里获得的参数与函数的输入参数进行比较，并注意到有一个变化。该函数接受一个字典，而不是一个表。这意味着我们需要在运行该函数之前，以某种方式将表转换为字典（图
    20.6）。


    我们执行此转换的方法可能并不直接，因此让我们详细说明一下。第一步是弄清楚我们希望这个字典是什么样子。为了创建汇总，如果我们有一个记录每个字段所有请求的汇总的记录，可能会很有用。这适合使用一个字典，其中字段是键，值是该字段所有汇总过程的列表。可用的汇总过程包括最小值、最大值、平均值、标准差、计算小于某个值的要素数量以及计算等于某个值的要素数量。然而，用户可以根据需要请求任意多或任意少的这些过程（图
    20.7）。


    一旦字典创建完成，我们就可以转到流程图中标记为“运行 populateSummaries 函数”的框，从而运行使用该字典和其他用户提供的参数来计算汇总并将其放入目标要素类的正确属性中的函数。整体流程图中的最后一个框，即“将汇总放入目标要素类”，将是该函数的一部分，由于这是函数的目标，这就是为什么该函数没有返回值。它不是将值返回给
    Python 代码，而是将这些值放入为此目的指定的要素类中。


    这是一个更复杂的流程图，因为它最终需要为每个要素、字段和汇总过程的组合运行 `populateSummaries` 函数。这意味着我们需要三重嵌套的 `for`
    循环。我最初考虑先遍历每个字段，然后是每个汇总过程，以及该字段内的每个要素，但发现很难正确管理更新游标。因此，我得出结论，最简单的方法是逐个处理每个要素，而不是每个字段，因此最外层的循环是遍历要素（图
    20.8）。


    在要素循环内，我首先从 `multiCursor` 中提取该要素的所有值。一旦这些值被提取出来，我就得到了一个值的列表的列表。然而，为了获得汇总，我需要在“遍历每个字段”循环的每个阶段，仅获取被检查字段的值的列表。一旦我有了这个单一列表，我就可以在最内层的循环中，将该值列表与所需的过程一起，逐一提供给
    `summarize` 函数。`summarize` 给我一个单一的值，我可以将其放置在更新游标的正确位置。当该要素的所有字段和过程组合完成后，在进入下一个要素之前，必须更新该行的更新游标。


    在这个流程图中，我们同时使用了 `summarize` 和 `multiCursor` 文件。然而，就本文件而言，我们相信它们能正确完成工作，并且不会在此处的流程图中展开这些框。通过这种拆分，我们可以将计算汇总的复杂性与跟踪要素、字段和要素类的复杂性分离开来。'
