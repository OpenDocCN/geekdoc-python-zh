    \ a .values() method, suggests to me that it is related to a dictionary, perhaps\
    \ with the different settings as the keys and the values of those environment\
    \ settings as the values. That this line arcpy.env[“workspace”] returns the default\
    \ workspace reinforces this hypothesis.\n\nMake sure you have this chapter’s data\
    \ loaded into ArcGIS Pro, open the Python Window, and type `arcpy.env.workspace`.\
    \ You might have noticed partway through that an autocomplete option came up.\
    \ I paused after “work” and the entire property name “workspace” is visible. You\
    \ can use this to identify or refresh your memory of property and method names\
    \ without going to the entire documentation. Press Enter. You’ll then see that\
