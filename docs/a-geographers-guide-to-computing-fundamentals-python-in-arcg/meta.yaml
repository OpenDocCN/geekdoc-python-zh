    \n² 严格来说，存在可选参数的可能性，因此函数调用可以比函数定义具有更少的参数。然而，设置这种函数超出了本章的范围，因此我们可以暂时认为它们必须相同。第\
    \ 20 章，任务 3 包括如何定义具有可选参数的函数。"
