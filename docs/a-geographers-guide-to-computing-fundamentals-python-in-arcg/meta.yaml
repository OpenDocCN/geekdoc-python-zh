    \ 行完全在左侧，位于 `>>>` 提示符下方，而不是关键字 `if` 下方。完成条件语句后按回车键。\n\n```\n>>> if inst_price\
    \ < min_instructor:\n        min_inst_list.append(inst_name)\n    elif inst_price\
