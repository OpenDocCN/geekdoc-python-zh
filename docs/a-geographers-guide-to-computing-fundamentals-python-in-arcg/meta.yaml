    trail = trailCursor.next()

    geom = trail[0]

    ```


    由于我们使用了相同的变量名 `geom` 来表示几何图形，我们可以简单地运行与之前相同的 Notebook 单元格来打印几何图形的信息，例如点数、第一个点、长度和面积。重新运行该单元格，并使用打印输出回答以下问题：


    **问题 3：此几何图形中有多少个点？**

    **问题 4：此几何图形有多少个部分？**

    **问题 5：第一个点和最后一个点相同吗？**


    我们现在将访问几何图形的第一部分，以说明线的几何图形对象：


