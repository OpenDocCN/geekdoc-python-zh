    \ chart (Fig. 3.1).\n\nAs you can see, there are three parts to this. First is\
    \ the question that will be used for the decision, which must be an expression\
    \ that evaluates to a Boolean value. Second is the set of actions to carry out\
    \ if the decision is True. Third is the set of actions to carry out if the decision\
    \ is False. As we construct this statement, we will replace the “send” actions\
    \ in the flow chart with `print` statements, and use Eve Douglas. Start with the\
    \ decision part.\n\n+   - Type `if paid_dictionary[\"Eve Douglas\"]:`\n  Make\
    \ sure you include the colon. Also, recall that the dictionary is set up that\
    \ the expression `paid_dictionary[\"Eve Douglas\"]` will evaluate to either `True`\
    \ or `False`.\n- Press Enter once.\n  The entry box has expanded to be two lines\
    \ tall. This is because the computer is still waiting for the rest of the statement,\
    \ and has not evaluated anything yet.\n  The next line or set of lines is for\
    \ what happens if the decision is true. It must be indented one level, which is\
    \ typically either four or eight spaces. I cannot stress the importance of the\
    \ indentation too much! Conveniently for us at this moment, the Python Notebook\
    \ automatically indents the line for us.\n\n![](img/37990581b275bdf7d510c6f2d9702a31_36_0.png)\n\
    \nFig. 3.1 Flow chart for conditional statement"
- md: "## Task 3: Loops\n\nWe can carry this out for all of the participants, not\
    \ just Eve, by using the other complex control statement: loops. As mentioned\
    \ above, there are two types of loops in Python, `for` loops and `while` loops.\
    \ Loops carry out the same lines of code several times. `For` loops repeat the\
    \ code for every item in a list. We can have a simple loop that prints each participant’s\
    \ name. Just as the `if` statement had a line setting up the conditional statement\
    \ starting with the keyword `if`, the `for` loop starts with a line setting it\
    \ up with the keyword `for`. That first line has a syntax like this:\n\n```\n\
    for [index] in [list]:\n```\n\nThe index variable is a variable, which you will\
    \ probably want to be a new variable, rather than one you have already declared.\
    \ It is your access to each item in the list. In the first time through the loop,\
    \ it refers to `list[0]`. The second time, it refers to `list[1]`. The loop continues\
    \ in this manner until there are no more items in the list. As with `if` statements,\
    \ the `for` line ends with a colon, and all lines of code that are to be repeated\
    \ must be indented one level to the right of the `for` line. This is demonstrated\
    \ in the simple loop below.\n\nIn the next empty code block, enter the following\
    \ code, where again, the arrow represents an indentation:\n\n```\nfor person in\
    \ participants:\n    print(person)\n```\n\nClick run, and you will see each participant\
    \ printed in the resulting output.\n\n```\nfor person in participants:\n    print(person)\n\
    \nJonathan Smith\nRobert Waters\nMonty Adams\nJohn Smith\nFred Jackson\nEve Douglas\n\
    Alice Scholl\n```\n\nThere is another kind of loop for situations where we do\
    \ not know in advance how many items we need to loop through or do not have a\
    \ list ready to cycle through. It is a `while` loop, and looks similar to a `for`\
    \ loop, except that where a `for` loop has a variable that iterates through a\
    \ list, a `while` loop has a true/false condition. To illustrate this, we will\
    \ examine another aspect of planning a GIS training, specifically what topics\
    \ will be covered. To accomplish this, we will create another dictionary, this\
    \ one linking the name of a topic with the amount of time (in hours) it may take\
    \ to complete the training on that topic. Assume that this is a 3-day training,\
    \ meaning there are 24 total hours (3 days * 8 hours per day) available. To decide\
    \ what topics can be advertised, we will use a `while` loop to add topics to a\
    \ list of topics until we reach 24 total hours of instruction.\n\nLet's first\
    \ create the dictionary with the following lines in a new, empty code block. Make\
    \ sure you run the code to ensure this variable is accessible in other code blocks:\n\
    \n- `topic_dictionary = {}`\n- `topic_dictionary[\"01_Introduction\"] = 1`\n-\
    \ `topic_dictionary[\"02_Python Basics\"] = 5`\n- `topic_dictionary[\"03_Reading\
    \ Python\"] = 2`\n- `topic_dictionary[\"04_ArcPy Basics\"] = 2`\n- `topic_dictionary[\"\
    05_Debugging\"] = 3`\n- `topic_dictionary[\"06_Introduction to Datasets\"] = 1`\n\
    - `topic_dictionary[\"07_ArcPy Cursors\"] = 3`\n- `topic_dictionary[\"08_ArcPy\
    \ Geometries\"] = 2`\n- `topic_dictionary[\"09_ArcPy Rasters\"] = 2`\n- `topic_dictionary[\"\
    10_ArcPy Map Production\"] = 4`\n- `topic_dictionary[\"11_Exceptions\"] = 1`\n\
    - `topic_dictionary[\"12_Functions and Classes\"] = 2`\n- `topic_dictionary[\"\
    13_Custom Tools\"] = 3`\n- `topic_dictionary[\"14_Distribution of Tools\"] = 2`\n\
    - `topic_dictionary[\"15_Concluding Project\"] = 6`\n\nRecall from Chap. 1 the\
    \ principle of initializing variables. We will need to keep track of some pieces\
    \ of information as we work our way through this loop to make sure we are doing\
    \ all the calculations correctly. In this case, we need to create four variables\
    \ to store information for us to solve this problem. The first is the total list\
    \ of topics, so that we know what topics are available for inclusion in the training.\
    \ We can get this variable as the list of keys from `topic_dictionary`. Also,\
    \ to make sure the inner workings of the `while` loop work properly, it should\
    \ be sorted. The second variable is the list of topics that will be in the training.\
    \ We will initialize this to be an empty list, which is represented by the brackets\
    \ for a list with nothing in between them. Each time through the loop, we will\
    \ add to this list. The third piece of information to assist our tracking is the\
    \ number of hours taken by the topics in the list of training topics thus far.\
    \ We will initialize it at zero, and add hours to it at the same time as we add\
    \ topics to the list. The last variable is an index variable to keep track of\
    \ where we are in the list of topics, which will also be initialized to zero and\
    \ incremented by one each time we go through the loop.\n\n**Question 1: Please\
    \ enter code to create these variables into a new, empty code block, and click\
    \ Run.**\n\nRecall from above that extracting the list of keys from a dictionary\
    \ does not always return them in the same order in which they were entered. This\
    \ is why we need to sort the list of topics, and is why they have the numbers\
    \ at the start, representing what topics are covered first, second, third, etc.\
    \ Having these numbers guarantees that sorting the list will provide the appropriate\
    \ ordering.\n\nNow we are ready for our `while` loop. We can first create a flow\
    \ chart of what needs to happen. Note that when the “No” part of the loop completes,\
    \ it returns to the start. This means that an infinite loop can happen if the\
    \ number of total hours would never exceed 24, and there was always a next topic\
    \ (Fig. 3.3).\n\nWhile loops start with the syntax of `while [condition]:` and\
    \ the code that is indented in the following lines will keep running as long as\
    \ that condition is true. This means that there is a potential problem lurking\
    \ in any while loop—the infinite loop. You must ensure that the condition in the\
    \ while loop will eventually become false. If it never becomes false, the loop\
    \ will just keep on running and running and running, without ever stopping. If\
    \ you try this in ArcGIS, you will either get a strange error or watch it run\
    \ for a long time, and eventually ArcGIS will crash after running out of memory.\
    \ So before you run a `while` loop, I encourage you to critically think through\
    \ the code and confirm that it will end.\n\nThe while loop is as follows. Please\
    \ enter it and click Run:\n\n```\nwhile total_hours < 24:\n    training_topics.append(topic_list[index])\n\
    \    total_hours = total_hours + topic_dictionary.get(topic_list[index])\n   \
    \ index = index + 1\n```\n\nWhen all is said and done, your window should not\
    \ yet have any output. This is because we didn’t tell the computer to also print\
    \ out the names from `topic_index`. Recall that there is code to print out the\
    \ names from a list in the `for` loop example above, and please revise this entry\
    \ or create a new code block entry to print out the contents of the `training_topics`\
    \ list.\n\n• Type `print(\"send a receipt\")` and press Enter once.\nLastly, we\
    \ need to tell the computer what to do if the decision evaluates to false. The\
    \ cue for this is through the `else` keyword. To work properly, the `else` keyword\
    \ must be at the same indentation level as the `if` keyword.\n\n• Click the mouse\
    \ to move the cursor to the start of the line to undo the automatic indentation\
    \ Python did for you.\n• Type in `else:` (with the colon) and press Enter once.\n\
    \n• Lastly, type in `print(\"send a bill\")` making sure that it lines up with\
    \ the previous print line, and press Enter to finish the line of code.\nIt should\
    \ look like this:\n\n```\nif paid_dictionary[\"Eve Douglas\"]:\n    print(\"send\
    \ a receipt\")\nelse:\n    print(\"send a bill\")\n```\n\nClick the Run button,\
    \ and you will see that it printed out that we need to send a bill to Eve.\n\n\
    ```\nif paid_dictionary[\"Eve Douglas\"]:\n    print(\"send a receipt\")\nelse:\n\
    \    print(\"send a bill\")\n\nsend a bill\n```\n\nWe might want to have a more\
    \ complex flow chart, incorporating how much Eve owes, based upon whether she\
    \ is a student.\nIn the next empty block of code, set up a `student_dictionary`\
    \ variable as an empty dictionary, much like you started with `paid_dictionary`.\n\
    Then, fill it as follows:\n\n- `student_dictionary = {}`\n- `student_dictionary[\"\
    Alice Scholl\"] = True`\n- `student_dictionary[\"Eve Douglas\"] = False`\n- `student_dictionary[\"\
    Fred Jackson\"] = True`\n- `student_dictionary[\"John Smith\"] = False`\n- `student_dictionary[\"\
    Monty Adams\"] = False`\n- `student_dictionary[\"Robert Waters\"] = True`\n- `student_dictionary[\"\
    Tyler Rose\"] = True`\n\nRun this code.\nNow our flow chart can look like this,\
    \ adding in another decision of which amount to put on the bill (Fig. 3.2).\n\
    We will now revise the previous `if/else` statement to accommodate this added\
    \ step. However, we will now cue the computer that we have a second condition\
    \ by using a different keyword: `elif`. This is short for else if, and indicates\
    \ that there is a second decision expression to run if the first decision expression\
    \ evaluates to false. We still can have the `else:` clause for when all expressions\
    \ are false.\n\n• Move the cursor to the start of the `else:` line and press Enter.\
    \ There should now be a blank line between `print(\"send a receipt\")` and `else:`.\
    \ It also probably decided to automatically indent the `else:` line in a failed\
    \ attempt to be helpful. Move that line back to the left.\n\n![Fig. 3.2 Flow chart\
    \ for if/elif/else statement](img/37990581b275bdf7d510c6f2d9702a31_38_0.png)\n\
    \n- In that blank line, type `elif student_dictionary[\"Eve Douglas\"]:` and press\
    \ Enter once.\n- Now type `print(\"send a bill for $\", student_price)` and press\
    \ Enter once. This inserts the value of the variable `student_price` into the\
    \ printed text.\n- Specify how much to charge the nonstudent attendees to the\
    \ training by revising the last line to `print(\"send a bill for $\", price)`.\n\
    \nIt should now look like this:\n\n```\nif paid_dictionary[\"Eve Douglas\"]:\n\
    \    print(\"send a receipt\")\nelif student_dictionary[\"Eve Douglas\"]:\n  \
    \  print(\"send a bill for $\", student_price)\nelse:\n    print(\"send a bill\
    \ for $\", price)\n```\n\nRun the code, and the output should update to `send\
    \ a bill for $ 100`.\nWe can do this another way, by embedding a second `if` statement\
    \ inside the `else` clause of the first one. Edit the code block to be the following\
    \ lines, where → represents an indentation. Note that the second `else:` must\
    \ line up with its corresponding `if` at one indent in. Run the code when it is\
    \ done, and you should see that the output still works.\n\n```\nif paid_dictionary[\"\
    Eve Douglas\"]:\n    → print(\"send a receipt.\")\nelse:\n    → if student_dictionary[\"\
    Eve Douglas\"]:\n        → → print(\"Send a bill for $\", student_price)\n   \
    \ → else:\n        → → print(\"Send a bill for $\", price)\n```"
  mdcn: "## 任务 3：循环\n\n我们可以通过使用另一种复杂的控制语句——循环，来对所有参与者（而不仅仅是伊芙）执行此操作。如上所述，Python 中有两种循环：`for`\
    \ 循环和 `while` 循环。循环会多次执行相同的代码行。`for` 循环会为列表中的每个项目重复执行代码。我们可以有一个简单的循环来打印每个参与者的名字。就像\
    \ `if` 语句有一行以关键字 `if` 开头来设置条件语句一样，`for` 循环也以一行以关键字 `for` 开头来设置。第一行的语法如下：\n\n```\n\
    for [index] in [list]:\n```\n\n索引变量是一个变量，你可能希望它是一个新变量，而不是你已经声明过的变量。它是你访问列表中每个项目的途径。在循环的第一次执行中，它指的是\
    \ `list[0]`。第二次，它指的是 `list[1]`。循环会以这种方式继续，直到列表中没有更多项目。与 `if` 语句一样，`for` 行以冒号结尾，并且所有要重复执行的代码行必须相对于\
    \ `for` 行向右缩进一级。下面的简单循环演示了这一点。\n\n在下一个空代码块中，输入以下代码，其中箭头再次代表缩进：\n\n```\nfor person\
    \ in participants:\n    print(person)\n```\n\n点击运行，你将在输出结果中看到每个参与者的名字。\n\n```\n\
    for person in participants:\n    print(person)\n\nJonathan Smith\nRobert Waters\n\
    Monty Adams\nJohn Smith\nFred Jackson\nEve Douglas\nAlice Scholl\n```\n\n还有一种循环适用于我们事先不知道需要循环多少个项目，或者没有现成列表可供循环的情况。它是一个\
    \ `while` 循环，看起来类似于 `for` 循环，不同之处在于 `for` 循环有一个遍历列表的变量，而 `while` 循环有一个真/假条件。为了说明这一点，我们将研究规划\
    \ GIS 培训的另一个方面，具体来说就是将涵盖哪些主题。为此，我们将创建另一个字典，这个字典将主题名称与完成该主题培训可能需要的时间（以小时为单位）联系起来。假设这是一个为期\
    \ 3 天的培训，这意味着总共有 24 小时（3 天 * 每天 8 小时）可用。为了决定可以宣传哪些主题，我们将使用一个 `while` 循环将主题添加到主题列表中，直到我们达到总共\
    \ 24 小时的教学时间。\n\n让我们首先在一个新的空代码块中用以下几行创建字典。确保你运行代码，以便此变量在其他代码块中可访问：\n\n- `topic_dictionary\
    \ = {}`\n- `topic_dictionary[\"01_Introduction\"] = 1`\n- `topic_dictionary[\"\
    02_Python Basics\"] = 5`\n- `topic_dictionary[\"03_Reading Python\"] = 2`\n- `topic_dictionary[\"\
    04_ArcPy Basics\"] = 2`\n- `topic_dictionary[\"05_Debugging\"] = 3`\n- `topic_dictionary[\"\
    06_Introduction to Datasets\"] = 1`\n- `topic_dictionary[\"07_ArcPy Cursors\"\
    ] = 3`\n- `topic_dictionary[\"08_ArcPy Geometries\"] = 2`\n- `topic_dictionary[\"\
    09_ArcPy Rasters\"] = 2`\n- `topic_dictionary[\"10_ArcPy Map Production\"] = 4`\n\
    - `topic_dictionary[\"11_Exceptions\"] = 1`\n- `topic_dictionary[\"12_Functions\
    \ and Classes\"] = 2`\n- `topic_dictionary[\"13_Custom Tools\"] = 3`\n- `topic_dictionary[\"\
    14_Distribution of Tools\"] = 2`\n- `topic_dictionary[\"15_Concluding Project\"\
    ] = 6`\n\n回顾第 1 章中初始化变量的原则。我们需要在循环过程中跟踪一些信息，以确保我们正确地进行所有计算。在这种情况下，我们需要创建四个变量来存储解决此问题所需的信息。第一个是主题的总列表，这样我们就知道哪些主题可以包含在培训中。我们可以从\
    \ `topic_dictionary` 中获取此变量作为键列表。此外，为了确保 `while` 循环的内部工作正常，它应该被排序。第二个变量是将包含在培训中的主题列表。我们将初始化它为空列表，这由一个中间没有任何内容的列表括号表示。每次循环时，我们将向此列表添加内容。第三个用于协助我们跟踪的信息是培训主题列表中主题目前已占用的小时数。我们将它初始化为零，并在向列表添加主题的同时向其添加小时数。最后一个变量是一个索引变量，用于跟踪我们在主题列表中的位置，它也将被初始化为零，并在每次循环时递增一。\n\
    \n**问题 1：请在新的空代码块中输入创建这些变量的代码，然后点击运行。**\n\n回顾上文，从字典中提取键列表并不总是按照它们输入的顺序返回。这就是为什么我们需要对主题列表进行排序，也是为什么它们在开头有数字，代表首先、其次、第三等涵盖的主题。拥有这些数字可以保证对列表进行排序将提供适当的顺序。\n\
    \n现在我们准备好进行 `while` 循环了。我们可以首先创建一个流程图来说明需要发生什么。请注意，当循环的“否”部分完成时，它会返回到起点。这意味着如果总小时数永远不会超过\
    \ 24，并且总是有下一个主题，那么可能会发生无限循环（图 3.3）。\n\n`while` 循环以 `while [condition]:` 的语法开始，只要该条件为真，后续缩进的代码行就会持续运行。这意味着任何\
    \ `while` 循环中都潜藏着一个潜在问题——无限循环。你必须确保 `while` 循环中的条件最终会变为假。如果它永远不会变为假，循环就会一直运行、运行、运行，永不停止。如果你在\
    \ ArcGIS 中尝试此操作，你可能会得到一个奇怪的错误，或者看着它运行很长时间，最终 ArcGIS 会在内存耗尽后崩溃。因此，在运行 `while` 循环之前，我鼓励你批判性地思考代码并确认它会结束。\n\
    \n`while` 循环如下。请输入它并点击运行：\n\n```\nwhile total_hours < 24:\n    training_topics.append(topic_list[index])\n\
    \    total_hours = total_hours + topic_dictionary.get(topic_list[index])\n   \
    \ index = index + 1\n```\n\n当一切完成后，你的窗口应该还没有任何输出。这是因为我们没有告诉计算机也打印出 `topic_index`\
    \ 中的名称。回顾上面的 `for` 循环示例中有一段代码可以打印出列表中的名称，请修改此条目或创建一个新的代码块条目来打印出 `training_topics`\
    \ 列表的内容。\n\n• 输入 `print(\"send a receipt\")` 并按一次 Enter。\n最后，我们需要告诉计算机如果决策评估为假该怎么办。这通过\
    \ `else` 关键字来提示。为了正常工作，`else` 关键字必须与 `if` 关键字处于相同的缩进级别。\n\n• 点击鼠标将光标移动到行首以撤销 Python\
    \ 为你做的自动缩进。\n• 输入 `else:`（带冒号）并按一次 Enter。\n\n• 最后，输入 `print(\"send a bill\")`，确保它与前面的\
    \ print 行对齐，然后按 Enter 完成这行代码。\n它应该看起来像这样：\n\n```\nif paid_dictionary[\"Eve Douglas\"\
    ]:\n    print(\"send a receipt\")\nelse:\n    print(\"send a bill\")\n```\n\n\
    点击运行按钮，你会看到它打印出我们需要向伊芙发送账单。\n\n```\nif paid_dictionary[\"Eve Douglas\"]:\n   \
    \ print(\"send a receipt\")\nelse:\n    print(\"send a bill\")\n\nsend a bill\n\
    ```\n\n我们可能希望有一个更复杂的流程图，根据伊芙是否是学生来确定她欠多少钱。\n在下一个空代码块中，设置一个 `student_dictionary`\
    \ 变量为空字典，就像你开始使用 `paid_dictionary` 一样。\n然后，按如下方式填充它：\n\n- `student_dictionary\
    \ = {}`\n- `student_dictionary[\"Alice Scholl\"] = True`\n- `student_dictionary[\"\
    Eve Douglas\"] = False`\n- `student_dictionary[\"Fred Jackson\"] = True`\n- `student_dictionary[\"\
    John Smith\"] = False`\n- `student_dictionary[\"Monty Adams\"] = False`\n- `student_dictionary[\"\
    Robert Waters\"] = True`\n- `student_dictionary[\"Tyler Rose\"] = True`\n\n运行此代码。\n\
    现在我们的流程图可以像这样，添加另一个决策来确定账单上应列明的金额（图 3.2）。\n我们现在将修改之前的 `if/else` 语句以适应这个额外的步骤。然而，我们现在将通过使用一个不同的关键字来提示计算机我们有第二个条件：`elif`。这是\
    \ else if 的缩写，表示如果第一个决策表达式评估为假，则运行第二个决策表达式。我们仍然可以有一个 `else:` 子句，用于所有表达式都为假的情况。\n\
    \n• 将光标移动到 `else:` 行的开头并按 Enter。现在 `print(\"send a receipt\")` 和 `else:` 之间应该有一个空行。它也可能决定自动缩进\
    \ `else:` 行，试图提供帮助但失败了。将该行移回左边。\n\n![图 3.2 if/elif/else 语句流程图](img/37990581b275bdf7d510c6f2d9702a31_38_0.png)\n\
    \n- 在该空行中，输入 `elif student_dictionary[\"Eve Douglas\"]:` 并按一次 Enter。\n- 现在输入 `print(\"\
    send a bill for $\", student_price)` 并按一次 Enter。这会将变量 `student_price` 的值插入到打印的文本中。\n\
    - 通过将最后一行修改为 `print(\"send a bill for $\", price)` 来指定向非学生参会者收取多少培训费用。\n\n它现在应该看起来像这样：\n\
    \n```\nif paid_dictionary[\"Eve Douglas\"]:\n    print(\"send a receipt\")\nelif\
    \ student_dictionary[\"Eve Douglas\"]:\n    print(\"send a bill for $\", student_price)\n\
    else:\n    print(\"send a bill for $\", price)\n```\n\n运行代码，输出应更新为 `send a bill\
    \ for $ 100`。\n我们可以通过另一种方式来实现，即在第一个 `else` 子句中嵌入第二个 `if` 语句。将代码块编辑为以下行，其中 → 代表缩进。请注意，第二个\
