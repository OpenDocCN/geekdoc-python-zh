    ## 任务 1：访问形状信息


    将数据复制到您的工作区，并将所有数据添加到一个新地图中。我们将使用 Python Notebook 来完成这里的引导任务，尽管如果您的 ArcGIS Pro
    版本不支持 Notebook，所有操作都可以在 Python 窗口中完成。


    我们现在将使用 ArcGIS 中编码并通过 ArcPy 访问的形状信息，来检查三种主要矢量形状类型的各自属性。回顾前面的章节，矢量要素类都是表的子类。由于我们通过三种游标形式之一来访问表中的项目，并且子类从其超类继承功能，因此我们也可以对要素类使用这三种游标中的任何一种。这是可行的，因为虽然在计算机中它们是分开存储的（例如，对于
    shapefile，.dbf 与 .shp 是分开的）；但在实践中，几何图形和属性是存储在一起的，因此表的文件和几何图形的文件必须位于同一文件夹中，与包含将几何图形与表链接信息的
    .shx 索引文件放在一起。事实上，要素类的几何图形就隐藏在属性表中。请注意，在任何显式空间数据的属性表中，都会有一个名为“Shape”的列，通常是左起第二列，尽管这并不能保证。该列在属性表中的所有内容都会告诉您它是什么类型的几何图形（例如，“Point”）。嵌入在该几何图形中的是该要素的几何信息，尽管无法通过属性表直接访问。尽管属性表没有给我们直接访问几何图形的权限，但我们可以使用相同的
    ArcPy 游标来访问它。我们通过一个特殊的内置变量名“SHAPE@”来访问几何信息，将其放入使用 `SearchCursor()`、`UpdateCursor()`
    或 `InsertCursor()` 构造游标时要访问的变量列表中。


    点、线和多边形都是通过 `Geometry` 对象访问的，这意味着所有属性对所有形状类型都可用，即使并非总有理由使用它，比如获取点几何图形的面积。如果您知道几何图形中需要的具体信息，可以在
    @ 后添加属性，例如通过 `SHAPE@AREA` 获取面积。这些内容位于帮助文档的“几何标记”部分，网址为 [https://pro.arcgis.com/en/pro-app/arcpy/get-started/reading-geometries.htm](https://pro.arcgis.com/en/pro-app/arcpy/get-started/reading-geometries.htm)，但本章我们将使用通用的几何图形
    `SHAPE@`。它允许您访问所有信息，尽管并非总是那么直接。


    让我们从点开始，我们有一个名为“Office_cities”的图层。要访问几何图形，请运行以下代码行：


    ```

    cityCursor = arcpy.da.SearchCursor("Office_cities", ["SHAPE@", "DESCRIPT"])

    ```


    现在，我们将通过从该游标中获取单个几何图形来检查几何图形的工作原理。在上一个实验中，我们看到了如何使用 for 循环遍历表中的条目。这里，为了探索单个几何图形，我们只需要从该游标中获取一个要素。就像我们使用
    `.next()` 函数一次检查 CSV 文件的一行一样，我们可以使用游标的 `next()` 函数一次遍历游标内容的一行，或者像这里一样，限制我们只获取第一个项目。运行以下代码行：


    ```

    city = cityCursor.next()

    ```


    游标的行为不会因为我们现在对形状感兴趣而改变，因此变量 city 包含一个项目元组，其顺序与定义游标的行中列出的顺序相同。这意味着几何图形位于列表中的第 #0
    项。因此，通过运行以下代码行来访问该几何图形：


    ```

    geom = city[0]

    ```


    我们可以通过在空白的 Notebook 单元格中输入 geom 并运行它来确认这确实是一个几何图形。然后您将看到该几何图形所代表的点。当然，这里的点不是很有趣，但当我们有更复杂的形状时，这可能会更有用。无论几何图形的类型如何，我们可能想要查看的任何几何图形的一些属性如下：它包含多少个点、第一个和最后一个点、它的长度、它的面积以及它有多少个部分。以下最后一行提供了所谓的“WKT”或“Well
    Known Text”，这是几何图形的基于文本的表示。它的优点是可移植性；许多其他系统可以导入 WKT（这就是它闻名的原因！），这将是将几何图形从 ArcGIS
    导出到其他系统的一种方式。


    使用以下代码行集，获取信息以回答后续问题。虽然并非所有问题都需要这些信息，但请仍然运行这些代码行，因为它们对于回答后面涉及线或多边形的问题很有用，并且可以说明所有属性如何为所有几何图形类型提供，即使点的长度或面积之类的东西有点无趣：


    ```

    print("Point Count: ", geom.pointCount)

    print("First Point: ", geom.firstPoint)

    print("Last Point: ", geom.lastPoint)

    print("Length: ", geom.length)

    print("Area: ", geom.area)

    print("Part Count: ", geom.partCount)

    print("Well Known Text: ", geom.WKT)

    ```


    **问题 1：此几何图形列出的面积是多少？**

    **问题 2：此几何图形有多少个部分？**


    您可能已经注意到，虽然 WKT 提供了可以解析以提取坐标信息的文本，但这并不容易完成，并且第一个和最后一个点通过 Point 对象给出所有坐标（包括此处未使用的两个坐标），而不是直接的数字。您可以通过运行
    type(geom.firstPoint) 来确认这一点。我们必须使用这个点对象，尽管为了展示如何访问包含多个点的几何图形中的任何点，而不仅仅是第一个和最后一个点，我们将使用不同的方法，通过几何图形对象使用一个函数：getPart()。在
    Notebook 单元格中运行接下来的四行代码，从该几何图形中的第一个（也是唯一的）点创建一个点，并打印其 x 和 y 坐标。在一定的舍入容差内，这些坐标应与
    WKT 中的坐标匹配：


    ```

    cityPoint = geom.getPart()

    x = cityPoint.X

    y = cityPoint.Y

    print("X: ", x, ", Y: ", y)

    ```


    ```

    X: -80.087076 , Y: 38.220057

    ```


