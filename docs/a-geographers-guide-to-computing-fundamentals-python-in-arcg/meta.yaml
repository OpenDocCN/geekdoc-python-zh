    1 英寸，距离底部 4 英寸。这通过 `mapFrame` 变量的元素属性来完成。同样，我们可以使用元素属性将地图框的精确高度和宽度分别设置为 5 英寸和
    6.5 英寸。输入以下代码来完成此操作：


