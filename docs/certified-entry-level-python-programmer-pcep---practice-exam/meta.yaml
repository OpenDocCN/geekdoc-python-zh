- md: "## Practice Exam 1\n\n1. What will the output be after executing the following\
    \ code snippet?\n    print(9** 3 ** 0 ** 1)\n\n    - A. 3\n    - B. 9\n    - C.\
    \ 1\n    - D. 18\n\n2. What will the output be, if we run the following code?\n\
    \n    ```\n    weekdays = (\"Monday\",\"Tuesday\",\"Wednesday\",\"Thursday\")\n\
    \    weekdays.append(\"Friday\")\n    print (weekdays)\n    ```\n\n    - A. Monday,\
    \ Tuesday, Wednesday, Thursday\n    - B. Friday\n    - C. None\n    - D. AttributeError:\
    \ 'tuple' object has no attribute 'append'\n\n3. How many times will it print\
    \ \"#\"?\n\n    ```\n    if x!=10:\n        print(\"#\")\n        if x<8:\n  \
    \          print(\"#\")\n        elif x==10:\n            print(\"#\")\n     \
    \   else:\n            print(\"#\")\n    else:\n        print(\"#\"*3)\n    ```\n\
    \n    - A. 3\n    - B. 1\n    - C. 2\n    - D. 4\n\n4. What is the output of this\
