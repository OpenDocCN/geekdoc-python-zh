- md: '# CERTIFIED ENTRY-LEVEL PYTHON PROGRAMMER (PCEP) - PRACTICE EXAMS


    ROBERT KARAMAGI


    # PCEP – Certified Entry-Level Python Programmer Certification Overview


    **PCEP – Certified Entry-Level Python Programmer** certification is a professional
    credential that measures your ability to accomplish coding tasks related to the
    essentials of programming in the Python language. A test candidate should demonstrate
    sufficient knowledge of the universal concepts of computer programming, the syntax
    and semantics of the Python language as well as the skills in resolving typical
    implementation challenges with the help of the Python Standard Library.


    **PCEP – Certified Entry-Level Python Programmer** certification shows that the
    individual is familiar with universal computer programming concepts like data
    types, containers, functions, conditions, loops, as well as Python programming
    language syntax, semantics, and the runtime environment. Becoming PCEP certified
    ensures that the individual is acquainted with the most essential means provided
    by Python 3 to enable her/him to start their own studies at an intermediate level
    and to continue their professional development.


    **PCEP – Certified Entry-Level Python Programmer** certification is an interim
    step to the PCAP – Certified Associate in Python Programming certification and
    the starting point to launch a career in software development, Python programming,
    and related technologies. Becoming PCEP certified will help you stand out from
    other candidates and get your foot in the door.


    # PCEP: Exam Information


    - Exam name: PCEP Certified Entry-Level Python Programmer

    - Exam Code/Exam Version: PCEP-30-01 | Status: Published

    - Exam Level: Entry

    - Associated Certifications: PCAP – Certified Associate in Python programming
    (PCAP-31-02, PCAP-31-01)

    - Pre-requisites: None

    - Duration: 45 minutes (exam) + approx. 5 minutes (Non-Disclosure Agreement/Tutorial)

    - Number of Questions: 30

    - Format: Single-choice and multiple-choice questions, drag & drop, gap fill |
    Python 3.x

    - Passing Score: 70%

    - Language: English

    - Courses Aligned: PCAP: Programming Essentials in Python (Cisco Networking Academy,
    instructor-led: Modules 1-3), PCAP: Programming Fundamentals in Python (Part 1)
    – OpenEDG Education Platform, self-enroll/self-study

    - Full Exam Price: USD 59

    - Delivery Channel: OpenEDG Testing Service

    - Testing Policies: Click here to view Testing Policies

    - Exam Syllabus: Click here to view Exam Syllabus

    - Sample Test: Click here to download a free PCEP sample test (TBA)


    # Exam Objectives


    The test candidate should demonstrate the sufficient knowledge of the following
    concepts:


    1. The fundamentals of computer programming, i.e. how the computer works, how
    the program is executed, how the programming language is defined and constructed,
    what the difference is between compilation and interpretation, what Python is,
    how it is positioned among other programming languages, and what distinguishes
    the different versions of Python;

    2. The basic methods of formatting and outputting data offered by Python, together
    with the primary kinds of data and numerical operators, their mutual relations
    and bindings; the concept of variables and variable naming conventions; the assignment
    operator, the rules governing the building of expressions; the inputting and converting
    of data;

    3. Boolean values to compare difference values and control the execution paths
    using the *if* and *if-else* instructions; the utilization of loops ( *while*
    and *for* ) and how to control their behavior using the *break* and *continue*
    instructions; the difference between logical and bitwise operations; the concept
    of lists and list processing, including the iteration provided by the *for* loop,
    and slicing; the idea of multi-dimensional arrays;

    4. The defining and using of functions – their rationale, purpose, conventions,
    and traps; the concept of passing arguments in different ways and setting their
    default values, along with the mechanisms of returning the function’s results;
    name scope issues; new data aggregates: tuples and dictionaries, and their role
    in data processing.


    # Exam block #1: Basic Concepts (17%)


    Objectives covered by the block (5 exam items)


    - fundamental concepts: interpreting and the interpreter, compilation and the
    compiler, language elements, lexis, syntax and semantics, Python keywords, instructions,
    indenting

    - literals: Boolean, integer, floating-point numbers, scientific notation, strings

    - comments

    - the print() function

    - the input() function

    - numeral systems (binary, octal, decimal, hexadecimal)

    - numeric operators: ** * / % // + –**

    - string operators: * +

    - assignments and shortcut operators


    # Exam block #2: Data Types, Evaluations, and Basic I/O Operations (20%)


    Objectives covered by the block (6 exam items)


    - operators: unary and binary, priorities and binding

    - bitwise operators: ~ & ^ | << >>

    - Boolean operators: **not and or**

    - Boolean expressions

    - relational operators ( == != > >= < <= ), building complex Boolean expressions

    - accuracy of floating-point numbers

    - basic input and output operations using the **input()** , **print()** , **int()**
    , **float()** , **str()**, **len()** functions

    - formatting **print()** output with **end=** and **sep=** arguments

    - type casting

    - basic calculations

    - simple strings: constructing, assigning, indexing, immutability


    # Exam block #3: Flow Control – loops and conditional blocks (20%)


    Objectives covered by the block (6 exam items)


    - conditional statements: **if** , **if-else** , **if-elif** , **if-elif-else**

    - multiple conditional statements

    - the **pass** instruction

    - building loops: **while** , **for** , **range()** , **in**

    - iterating through sequences

    - expanding loops: **while-else** , **for-else**

    - nesting loops and conditional statements

    - controlling loop execution: **break** , **continue**


    # Exam block #4: Data Collections – Lists, Tuples, and Dictionaries (23%)


    Objectives covered by the block (7 exam items)


    - simple lists: constructing vectors, indexing and slicing, the **len()** function

    - lists in detail: indexing, slicing, basic methods ( **append()** , **insert()**
    , **index()** ) and functions ( **len()** , **sorted()** , etc.), **del** instruction,
    iterating lists with the **for** loop, initializing, **in** and **not in** operators,
    list comprehension, copying and cloning

    - lists in lists: matrices and cubes

    - tuples: indexing, slicing, building, immutability

    - tuples vs. lists: similarities and differences, lists inside tuples and tuples
    inside lists

    - dictionaries: building, indexing, adding and removing keys, iterating through
    dictionaries as well as their keys and values, checking key existence, **keys()**,
    **items()** and **values()** methods

    - strings in detail: escaping using the \ character, quotes and apostrophes inside
    strings, multiline strings, basic string functions.


    # Exam block #5: Functions (20%)


    Objectives covered by the block (6 exam items)


    - defining and invoking your own functions and generators

    - **return** and **yield** keywords, returning results,

    - the **None** keyword,

    - recursion

    - parameters vs. arguments,

    - positional keyword and mixed argument passing,

    - default parameter values

    - converting generator objects into lists using the **list()** function

    - name scopes, name hiding (shadowing), the **global** keyword


    # Contents


    - [Practice Exam 1](Practice Exam 1)

    - [Practice Exam 2](Practice Exam 2)

    - [Practice Exam 3](Practice Exam 3)

    - [Practice Exam 4](Practice Exam 4)

    - [Practice Exam 5](Practice Exam 5)'
  mdcn: '# 认证入门级Python程序员（PCEP）- 模拟考试


    罗伯特·卡拉马吉


    # PCEP – 认证入门级Python程序员认证概述


    **PCEP – 认证入门级Python程序员**认证是一项专业资质，用于衡量您完成与Python语言编程基础相关的编码任务的能力。考生应展示对计算机编程通用概念、Python语言语法和语义的充分了解，以及借助Python标准库解决典型实现挑战的技能。


    **PCEP – 认证入门级Python程序员**认证表明个人熟悉通用的计算机编程概念，如数据类型、容器、函数、条件、循环，以及Python编程语言的语法、语义和运行时环境。获得PCEP认证确保个人掌握了Python
    3提供的最基本工具，使其能够开始中级水平的自学并继续其专业发展。


    **PCEP – 认证入门级Python程序员**认证是通往PCAP – 认证Python编程助理认证的过渡步骤，也是开启软件开发、Python编程及相关技术职业生涯的起点。获得PCEP认证将帮助您在众多候选人中脱颖而出，迈出职业生涯的第一步。


    # PCEP：考试信息


    - 考试名称：PCEP 认证入门级Python程序员

    - 考试代码/考试版本：PCEP-30-01 | 状态：已发布

    - 考试级别：入门级

    - 关联认证：PCAP – 认证Python编程助理（PCAP-31-02, PCAP-31-01）

    - 先决条件：无

    - 时长：45分钟（考试）+ 约5分钟（保密协议/教程）

    - 题目数量：30题

    - 格式：单选题和多选题、拖放题、填空题 | Python 3.x

    - 及格分数：70%

    - 语言：英语

    - 对齐课程：PCAP：Python编程基础（思科网络学院，讲师授课：模块1-3），PCAP：Python编程基础（第1部分）– OpenEDG教育平台，自主报名/自学

    - 完整考试价格：59美元

    - 考试渠道：OpenEDG考试服务

    - 考试政策：点击此处查看考试政策

    - 考试大纲：点击此处查看考试大纲

    - 样题：点击此处下载免费的PCEP样题（待定）


    # 考试目标


    考生应展示对以下概念的充分了解：


    1.  计算机编程基础，即计算机如何工作、程序如何执行、编程语言如何定义和构建、编译与解释的区别、Python是什么、它在其他编程语言中的定位，以及Python不同版本之间的区别；

    2.  Python提供的数据格式化和输出的基本方法，以及主要的数据类型和数值运算符、它们之间的相互关系和绑定；变量的概念和变量命名约定；赋值运算符、构建表达式的规则；数据的输入和转换；

    3.  用于比较不同值和使用 *if* 和 *if-else* 指令控制执行路径的布尔值；循环（ *while* 和 *for* ）的使用以及如何使用 *break*
    和 *continue* 指令控制其行为；逻辑运算和位运算的区别；列表和列表处理的概念，包括 *for* 循环提供的迭代和切片；多维数组的概念；

    4.  函数的定义和使用——其原理、目的、约定和陷阱；以不同方式传递参数和设置其默认值的概念，以及返回函数结果的机制；名称作用域问题；新的数据聚合：元组和字典，以及它们在数据处理中的作用。


    # 考试模块 #1：基本概念（17%）


    本模块涵盖的目标（5道考题）


    - 基本概念：解释与解释器、编译与编译器、语言元素、词汇、语法和语义、Python关键字、指令、缩进

    - 字面量：布尔值、整数、浮点数、科学计数法、字符串

    - 注释

    - print() 函数

    - input() 函数

    - 数制（二进制、八进制、十进制、十六进制）

    - 数值运算符：** * / % // + –**

    - 字符串运算符：* +

    - 赋值和快捷运算符


    # 考试模块 #2：数据类型、求值和基本I/O操作（20%）


    本模块涵盖的目标（6道考题）


    - 运算符：一元和二元、优先级和结合性

    - 位运算符：~ & ^ | << >>

    - 布尔运算符：**not and or**

    - 布尔表达式

    - 关系运算符（ == != > >= < <= ），构建复杂的布尔表达式

    - 浮点数的精度

    - 使用 **input()** 、 **print()** 、 **int()** 、 **float()** 、 **str()** 、 **len()**
    函数进行基本输入和输出操作

    - 使用 **end=** 和 **sep=** 参数格式化 **print()** 输出

    - 类型转换

    - 基本计算

    - 简单字符串：构造、赋值、索引、不可变性


    # 考试模块 #3：流程控制 – 循环和条件块（20%）


    本模块涵盖的目标（6道考题）


    - 条件语句： **if** 、 **if-else** 、 **if-elif** 、 **if-elif-else**

    - 多重条件语句

    - **pass** 指令

    - 构建循环： **while** 、 **for** 、 **range()** 、 **in**

    - 遍历序列

    - 扩展循环： **while-else** 、 **for-else**

    - 嵌套循环和条件语句

    - 控制循环执行： **break** 、 **continue**


    # 考试模块 #4：数据集合 – 列表、元组和字典（23%）


    本模块涵盖的目标（7道考题）


    - 简单列表：构造向量、索引和切片、 **len()** 函数

    - 列表详解：索引、切片、基本方法（ **append()** 、 **insert()** 、 **index()** ）和函数（ **len()** 、
    **sorted()** 等）、 **del** 指令、使用 **for** 循环遍历列表、初始化、 **in** 和 **not in** 运算符、列表推导式、复制和克隆

    - 列表中的列表：矩阵和立方体

    - 元组：索引、切片、构造、不可变性

    - 元组与列表：异同点、列表中的元组和元组中的列表

    - 字典：构造、索引、添加和删除键、遍历字典及其键和值、检查键是否存在、 **keys()** 、 **items()** 和 **values()** 方法

    - 字符串详解：使用 \ 字符转义、字符串中的引号和撇号、多行字符串、基本字符串函数。


    # 考试模块 #5：函数（20%）


    本模块涵盖的目标（6道考题）


    - 定义和调用自己的函数和生成器

    - **return** 和 **yield** 关键字，返回结果

    - **None** 关键字

    - 递归

    - 参数与实参

    - 位置、关键字和混合参数传递

    - 默认参数值

    - 使用 **list()** 函数将生成器对象转换为列表

    - 名称作用域、名称隐藏（遮蔽）、 **global** 关键字


    # 目录


    - [模拟考试 1](Practice Exam 1)

    - [模拟考试 2](Practice Exam 2)

    - [模拟考试 3](Practice Exam 3)

    - [模拟考试 4](Practice Exam 4)

    - [模拟考试 5](Practice Exam 5)'
