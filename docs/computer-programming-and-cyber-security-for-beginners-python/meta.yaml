  md: "# Chapter 21: PYTHON GENERATORS\n\nPython's generators\n\nBuilding an iterator\
    \ in Python takes a lot of effort. We must create a class containing the techniques\
    \ __iter__() and __next__(), maintain track of internal states and raise StopIteration\
    \ when no values are to be returned.\nThis is both lengthy and perplexing. In\
    \ such cases, the generator comes to the rescue.\nIterators can be easily created\
    \ with Python generators. All of the work indicated above is completed automatically\
    \ via Python generators.\nA generator, in simple terms, is a function that returns\
    \ an object (iterator) that we may iterate through (one value at a time).\n\n\
    Create Generators in Python\n\nCreating a generator in Python is a breeze. This\
    \ is the same as creating a regular function; only you'll use a yield statement\
    \ instead of a return statement.\nSuppose there is at least one yield statement\
    \ in it (it may also have other yield or return statements). Both yield and return\
    \ will return a value from a function. The distinction is that a return statement\
    \ closes a function completely, whereas a yield statement pauses it and saves\
    \ all of its states before continuing on subsequent calls.\nWhat are the differences\
    \ between the Generator and Normal functions?\nA generator function differs from\
    \ a regular function in the following ways.\n\n+   - One or more yield statements\
    \ can be found in the Generator function.\n- When called, it returns an object\
    \ (iterator), but it does not immediately begin operation.\n- Techniques like\
    \ __iter__() and __next__() are automatically implemented. As a result, we can\
    \ use next to iterate through the objects ().\n- When the function yields, it\
    \ is paused, and control is handed over to the caller.\n- Between calls, local\
    \ variables and their states are remembered.\n- Finally, when the function finishes,\
    \ StopIteration is automatically raised on further calls.\n\nHere's an example\
    \ that exemplifies all of the preceding concepts. My gen() is a generator function\
    \ containing numerous yield statements.\n\n```\n# A simple generator function\n\
    def my_gen():\n    n = 1\n    print('This is printed first')\n    # Generator\
    \ function contains yield statements\n    yield n\n\n    n += 1\n    print('This\
    \ is printed second')\n    yield n\n\n    n += 1\n    print('This is printed at\
    \ last')\n    yield n\n```\n\nAn interactive run in the interpreter is given below.\
    \ Run these in the Python shell to see the output."
  merge: -1
