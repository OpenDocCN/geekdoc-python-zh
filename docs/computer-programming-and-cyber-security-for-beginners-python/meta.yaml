  md: '# Chapter 14: PYTHON LOOP TUTORIAL – PYTHON FOR LOOP, NESTED FOR LOOP


    We will learn about several forms of Python loops in this Python Loop Tutorial.

    We''ll look at the subclasses, syntax, and examples of Python For Loop, Python
    While Loop, Python Loop Control Statements, and Nested For Loop.

    So, let''s get started with the Python Loop Tutorial.


    What exactly is a Python Loop?

    You don''t repeat statements a hundred times if you want them to run 100 times.

    Consider the situation when you need to print numbers from 1 to 99. Or maybe you''d
    like to greet 99 people.

    In this instance, you can utilize Python loops.

    We''ll go through four different forms of Python loops here:


    +   - Python For Loop

    - Python While Loop

    - Python Loop Control Statements

    - Nested For Loop in Python


    While Loop in Python

    In Python, a while loop iterates until the condition becomes False. To put it
    another way, it executes the statements while the condition it accepts is True.


    ![](img/a1c5e4a1633d0fcc232ce0059c778469_125_0.png)


    The condition is verified when the program control reaches the while loop. If
    the condition is true, the code block behind it is run.

    Remember to equally indent all statements within the loop. The condition is then
    double-checked.

    This process is repeated until the condition is no longer true.

    The first statement after the loop, if any, is then executed.


    ```

    >>> a=3


    >>> while(a>0):


    print(a)


    a-=1

    ```


    # Output


    3'
  merge: -1
  pgno: 125
- img_proc: true
  md: 'The numerals 3 to 1 are printed in this loop. A—wouldn''t work in Python. For
    the same reason, we use a-=1.


    # 1. An Infinite Loop


    When utilizing a while loop, be cautious because the condition may never become
    false if you forget to increment the counter variable in Python or write faulty
    logic.


    The loop will run indefinitely in this scenario, and the conditions after the
    loop will starve. Ctrl+C will stop the program from running.


    An infinite loop, on the other hand, might be advantageous. This is useful for
    client/server programming or when a semaphore is required.


    A semaphore is a variable that is primarily used to synchronize access to shared
    resources.


    # 2. The while loop''s else statement


    After a while loop, there may be an else statement. The block under the else expression
    is executed when the condition becomes false.


    It does not, however, run if you exit the loop or if an exception is thrown.


    ```

    >>> a=3


    >>> while(a>0):


    print(a)


    a-=1


    else:


    print("Reached 0")

    ```


    # Output


    3

    2

    1

    Reached 0


    We placed a break statement in the body of the while loop for a==1 in the following
    code. As a result, the statement in the else block is not executed when this occurs.


    ```

    >>> a=3


    >>> while(a>0):


    print(a)


    a-=1


    if a==1: break;


    else:


    print("Reached 0")

    ```


    # Output


    3

    2


    # 3. Single Statement while


    If we only have one statement in a while''s body, we may write it all in one line,
    just like an if statement.


    ```

    >>> a=3


    >>> while a>0: print(a); a-=1;

    ```


    # Output


    3'
