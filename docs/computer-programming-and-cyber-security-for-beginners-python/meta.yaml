    \n```python\n>>> all([])\n```\n\n**Output**\n\n```\nTrue\n```\n\n## Built-in Techniques\n\
    \nA technique is what you can do to build and change it, but a function can apply\
    \ to it and obtain a result. The dot-operator is used to call a technique on a\
