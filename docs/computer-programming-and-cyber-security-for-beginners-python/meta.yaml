    ## Chapter 2: GETTING YOU STARTED WITH PYTHON PROGRAMMING


    Step 1: Decide why you want to learn Python.


    Evaluate why you want to learn Python in the first place before you start learning
    it online. This is because it will be a lengthy and, at times, unpleasant journey.
    If you don''t have enough motivation, you won''t make it. Finding out what motivates
    you can help you set a long-term goal and a path to get there without becoming
    bored. You do not need to develop a specific project to study Python, just a general
    area of interest.


    Choose an area that interests you, such as:


    - Data science / Machine learning

    - Mobile apps

    - Websites

    - Games

    - Data processing and analysis

    - Hardware / Sensors / Robots

    - Scripts to automate your work


    Step 2: Acquire a Basic Syntax Understanding


    This stage, on the other hand, cannot be bypassed. You must first master the foundations
    of Python syntax before digging deeper into your chosen field. Because it isn''t
    extremely inspiring, you should invest as little time possible on it.


    I cannot emphasize enough the importance of spending as little time as possible
    on basic syntax. You will learn more quickly if you start working on things as
    soon as possible. If you get stuck later, you can always go back to the syntax.
    You should only spend a couple of weeks on this phase and no more than a month
    on it.


    Also, a brief reminder: Python 3 is the version to learn, not Python 2. Unfortunately,
    many online "learn Python" sites still teach Python 2, while Python 3 is the way
    to go. Bugs and security flaws in Python 2 will not be patched because it is no
    longer supported!


    Step 3: Create well-organized projects


    It''s possible to start developing projects on your own once you''ve mastered
    the basic syntax. Projects are a terrific technique to learn since they allow
    you to put what you''ve learned into practice. It will be difficult to remember
    your information until you put it to use. Projects will help you stretch your
    strengths, gain new skills, and build a portfolio to present potential employers.


    However, freeform projects will be painful at this point, as you''ll get stuck
    frequently and need to consult the documentation. As a result, it''s usually best
    to start with more structured tasks until you''re confident enough to build projects
    entirely independently. Many learning resources provide structured projects, which
    allow you to create fascinating things in the areas that interest you while also
    preventing you from being stuck.


    Let''s have a look at some useful resources for structured initiatives in each
    of these areas:


    ### Machine learning / Data science


    - Python for Data Analysis is a decent introduction to analyzing data in Python,
    published by the author of a prominent Python data analysis library.

    - Dataquest - A fun way to learn Python and data science. You examine a wide range
    of datasets, including CIA documents and NBA player statistics. Finally, complex
    algorithms like neural networks and decision trees are created.

    - Scikit-learn documentation — Scikit-learn is a popular Python machine learning
    package. It includes a wealth of documentation and lessons.

    - CS109 is a Harvard course that teaches Python in a data science environment.
    Some of their work, as well as other materials, are accessible over the internet.


    ### Apps for mobile devices


    - Kivy tutorial — Kivy is a Python-based tool for creating mobile apps. They provide
    a step-by-step tutorial on how to get started.


    ### Websites


    - How To Tango With Django — An introduction to Django, a powerful Python web
    framework.

    - Bottle tutorial - Another Python web framework is Bottle. This is where you
    should begin.


    ### Games


    - Pygame tutorials — This is a list of Pygame tutorials. Pygame is a popular Python
    package for developing games.

    - Codecademy – guides you through the process of creating a couple of easy games.

    - Pygame: Making Games — This book shows you how to make games in Python.

    - Invent Your Videogames with Python — a book that shows you how to use Python
    to create a range of games.


    ![](img/a1c5e4a1633d0fcc232ce0059c778469_15_0.png)


    A game was created with Pygame as an example. Phil Hassey created Barbie Seahorse
    Adventures 1.0.


    ### Robots/Hardware/Sensors


    - Using Arduino with Python — learn how to control sensors connected to an Arduino
    using Python.

    - Build hardware projects with Python and a Raspberry Pi while learning Python.

    - Python for Robotics – program robots using Python.

    - Raspberry Pi Cookbook — learn how to use the Raspberry Pi and Python to make
    robots.


    ### Scripts to Make Your Work More Automated


    - Automate the mundane with Python – learn how to use Python to automate everyday
    tasks.


    You should work on your projects after completing a few organized assignments
    in your field. But, first and foremost, you should invest some time understanding
    how to solve difficulties.


    Step 4: Work on Your Personal Python Projects


    It''s time to work on your projects to expand your Python expertise after finishing
    numerous predefined tasks. You''ll still use resources and understand concepts,
    and you''d be performing tasks that you''re passionate about. Before you start
    working on your projects, you should be comfortable debugging errors and problems
    with your applications. The following materials should be familiar to you:


    - StackOverflow – a question-and-answer platform where programmers can discuss
    their problems. Python-specific questions can be found here.

    - Google — every experienced programmer''s go-to search engine. When trying to
    fix problems, this tool comes in handy. Here''s an illustration.

    - Python documentation - a fantastic place to go for Python reference material.


    Once you''ve mastered troubleshooting challenges, you can start working on your
    projects. It''s a good idea to work on issues that you''re interested in. For
    example, I started working on automated stock trading programs quickly after learning
    programming.


    tips on how to locate interesting projects:


    - Add more features to the projects you were working on previously.

    - Take a look at our beginning Python projects.

    - Attend local Python gatherings to meet people who are working on interesting
    projects.

    - search for open-source projects to make contribution to.

    - Look into whether any local NGOs need volunteer developers.

    - Look at projects that others have completed and see if you can expand or adapt
    them. Github is a great location to look for them.

    - Look through other people''s blog postings to get ideas for projects.

    - Consider what tools would make your day-to-day life easier, and then create
    them.


    Always remember to start small. To acquire confidence, it''s often a good idea
    to start with something easy. It is preferable to start a small project and finish
    it than to start a large job and never finish it. We offer guided projects at
    Dataquest that give you tiny data science-related tasks on which you can build.


    Finding other people to work with can also help you stay motivated.


    If you''re stuck for project ideas, here are a few in each of the areas we''ve
    covered:


    ### Machine Learning / Data Science Project Concepts


    - A map that depicts state-by-state election polling.

    - An algorithm that forecasts your location''s weather.

    - A stock market forecasting program.

    - An algorithm that summaries news stories automatically.


    ### Mobile App Project Ideas


    - An app that keeps track of how far you walk each day.

    - An app that delivers you weather notifications.

    - A location-based communication in real-time.


    ### Website Project Ideas


    - A website that assists you in planning your weekly meals.

    - A website where people may rate and review video games.

    - A platform for taking notes.


    ### Python Game Project Ideas


    - A mobile game in which you capture territory based on your location.

    - A puzzle-solving game in which you program.


    ### Robots/Hardware/Sensors Project Concepts


    - Sensors that monitor your home''s temperature and allow you to keep an eye on
    it from afar.

    - A more intelligent alarm clock.

    - An obstacle-detecting self-driving robot.


    ### Work Automation Project Ideas


    - A script to automate data entry

    - A tool for extracting data from the internet.


    My first solo effort was porting my R-based automated essay scoring program to
    Python. It didn''t turn out to be particularly attractive, but it provided me
    a sense of success and set me on the path of improving my talents.


    The secret is to pick a task and finish it. You might never finish a job if you
    get too caught up in choosing the right one.


    Step 5: Continue to work on more challenging projects.


    Extend the scope and difficulty of your task to keep challenging yourself. It
    is time to try something new if you''re completely content with what you''ve done.


    You can start a new project if you want to.


    Here are some suggestions for when that moment arrives:


    - Teach a beginner how to develop a project you created.

    - Is it feasible to expand the scope of your tool? Is it able to process more
    information or handle more traffic?

    - Is there a way to make your program run faster?

    - Can you make your tool more valuable to a wider audience?

    - How would you market what you''ve created?


