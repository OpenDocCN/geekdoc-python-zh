    underscores (_), or integers (0-9).


    ```

    >>> year2=''Sophomore''

    >>> year2


    Output

    ‘Sophomore’


    >>> _$$=7


    Output

    SyntaxError: invalid syntax

    ```


    +   - Python and Python identifiers are case-sensitive. The terms "name" and "Name"
    are not interchangeable.


    ```

    >>> name=''Ayushi''

    >>> name


    Output

    ‘Ayushi’


    >>> Name


    Output

    ```'
