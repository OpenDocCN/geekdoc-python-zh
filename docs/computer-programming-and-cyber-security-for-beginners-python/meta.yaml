    \ 的 `start` 的值。因此，即使我们之前已经完成了 `countdown()` 函数的执行，在调用 `counter1()` 时仍然记住了该值。\n\
    \n闭包是 Python 中用于将一些数据（本例中为 2）附加到代码上的术语。\n\n即使变量超出作用域或函数从当前命名空间中移除，也会记住周围作用域中的值。为确保这一点，让我们运行以下代码：\n\
    \n```python\n>>> del countdown\n>>> counter1()\nT-minus 2\nT-minus 1\n>>> countdown(2)\n\
    Traceback (most recent call last):\n  ...\nNameError: name 'countdown' is not\
    \ defined\n```\n\n何时应该使用闭包？\n\n当类中只实现了少数几个方法（通常只有一个）时，闭包可以提供一种替代且更优雅的方式。在编写使用惰性或延迟求值思想的代码时，闭包和嵌套函数也特别有益。以下是一个示例：\n\
    \n```python\nfrom urllib.request import urlopen\n\ndef page(url):\n    def get():\n\
    \        return urlopen(url).read()\n    return get\n```\n\n前面示例中的 `page()` 函数不执行任何计算。相反，它只是生成并返回函数\
