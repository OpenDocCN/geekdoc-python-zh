    it later in the program.

    The interpreter determines the data type based on the value assigned. A variable
    can always be changed to a different type.

    If you save 7 in a variable, for example, you can afterward store ‘Dinosaur.’


    1. Naming Guidelines for Python Variables

    There are certain guidelines for naming variables (called an identifier).


    +   - A letter (A-Z/a-z) or an underscore (_) is the only way to start a Python
    variable.


