    \ arguments: a pattern and a string to search. Let us take a look at a couple\
    \ of examples.\n\n```python\n>>> match=re.search('aa?yushi','ayushi')\n>>> match.group()\n\
    ```\n\n**Output:**\n```\n'ayushi'\n```\n\n```python\n>>> match=re.search('aa?yushi?','ayush\
    \ ayushi')\n>>> match.group()\n```\n\n**Output:**\n```\n'ayush'\n```\n\n```python\n\
    >>> match=re.search('\\w*end','Hey! What are your plans for the weekend?')\n>>>\
    \ match.group()\n```\n\n**Output:**\n```\n'weekend'\n```\n\n```python\n>>> match=re.search('^\\\
    w*end','Hey! What are your plans for the weekend?')\n>>> match.group()\n```\n\n\
