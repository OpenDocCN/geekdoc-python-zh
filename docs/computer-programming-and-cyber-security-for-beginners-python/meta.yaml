    # Extra Challenge


    You can also allow users to set recurring alarms as an extra feature. They will
    be able to set alarms on certain days of the week, each week, that will ring at
    some time. For instance, an alarm can be set every Monday at 2:00 PM.


    You can add a snooze feature, so your users can snooze alarms rather than just
    dismiss them.


    # File Manager


    The number of files on an average PC user''s personal computer is fairly high.
    If all of those files are placed in a single directory, navigating and finding
    files or directories would be difficult. So, the files need to be arranged and
    managed correctly.


    This is where a director of files comes in. A file manager allows users to access
    files and folders through a user interface. While files can be controlled via
    the command-line, not all users know how to do that.


    Users can arrange, access, and manage their files and directories properly with
    a file manager, without knowing how to use the command line. Some of the tasks
    that a file manager does include copying, moving, and renaming files or directories.


    # Examples of Tools in File Manager


    Here are some ideas for the File Manager implementations:


    +   - FreeCommander

    - Explorer+++


    # Tech Details


    The file manager project''s main objective is to provide the users with an interface
    to manage their files. Users want a file manager with a good looking and easy
    to use file management tool.


    You can use the PySimpleGUI library without having to deal with a lot of complexity
    to create unique user interfaces with a powerful widget.


    Your users should perform simple tasks such as creating new directories or emptying
    text files. They should also be able to copy directories or files, and move them.


    For this project, the sys, os, and Shutil libraries will be very useful, because
    they can be used to perform actions on the context files while the user clicks
    away.


    Today, grid views and list views are common views, so you can implement both in
    the app. This gives the user the option to select which view option fits them.


    # Extra Challenge


    To make the file manager somewhat more advanced, a search function can be implemented.
    In this way, users can search for files and directories without having to manually
    find them.


    Also, you can implement a sorting feature. This will allow users to sort files
    by order, such as time, alphabetical order, or size.


    # Expenditure Tracker


    We have daily expenses ranging from foodstuffs to clothing to bills. There are
    so many expenses that it is normal to lose track of them and continue to spend
    until we are nearly out of cash. A tracker will help people look out for their
    expenses.


    It''s here that the expense tracker comes in. An expense tracker is a software
    tool enabling users to keep track of their spending. Depending on how advanced
    it is, it can also analyze the expenses, but let''s keep it simple for now.


    Users can set a budget with the expense tracker and track their expenditures so
    they can make better financial decisions.


    # Examples of Tracker Expenses


    Here are some of the Cost Tracker Concept implementations:'
- md: '## Tech Details


    This project''s main aim is to keep track of user expenses. Some statistical analysis
    must be done to allow users to get accurate information about their expenditures
    and to help them spend better.


    While monitoring the expenses is crucial, it is also necessary to have a good
    GUI. You can create a unique interface with PySimpleGUI to improve the user''s
    experience.


    PyData libraries like matplotlib and pandas can help to create an expense tracker.


    The pandas'' library can be used in the analysis of data, and the matplotlib library
    can be used for graph plotting. Graphs will provide the users with a visual representation
    of their expenses and usually, a visual representation is easier to understand.


    The application will get users data. The data here are the expenses inputted.
    So, the expenses will have to be stored in a database. For this project, the SQLite
    database is a good database option because it can be set up easily. The SQLite
    database can be used with the sqlite3 module.


    ## Extra Challenge


    For your users to benefit from this project, they will have to periodically enter
    their expenses which will slip their minds. Implementing a notification feature
    might be helpful for you. So, at certain times of the day or the week, the application
    will send a notification, reminding them to use the expense tracker.


    ## Ideas for a command-line project


    In this section, you will see command-line project ideas. The ideas discussed
    for the project can be classified as utility tools.


    Here are the ideas behind the project:


    - Contact Book

    - File Connectivity Checker

    - Bulk File Rename Tool

    - Directory Tree Generator


    ## Contact library


    We come across a lot of people every day. We make friends and acquaintances. We
    are getting their contacts to keep in contact later. Sadly, keeping the contact
    details you have received can be difficult. One way to achieve this is to write
    down the contact details. But this is not secure as you can easily lose the physical
    book.


    Here''s where the project Contact Book comes in. A contact book is a tool to save
    details about a contact, such as name, telephone number, address, and email address.
    For this project contact sheet, you can create a software tool that lets people
    save and find contact information.


    Users can save their contacts with the concept of the contact book project, with
    less chance of losing the saved contact information. It will always be accessible
    through the command-line from their computer.


    ## Examples of Software for Contacts


    There are Contact Book applications, but finding Contact Book products on the
    command line is rare, as most are Mobile, Web, or GUI applications.


    Below are some Contact Book Implementations:


    - Pobuca Connect

    - Simple Contacts


    ## Tech Details


    This project''s main purpose is to save the contact information. Set up the users''
    commands for entering contact details. You can use the argparse, or click frameworks
    on the command line. They abstract a lot of complicated things, so when executing
    commands, you just have to concentrate on the logic to be run.


    Some of the features that you should implement include the contact deletion commands,
    listing saved contacts, and updating contact information. You may also allow users
    to list contacts using different criteria, such as alphabetic order or date of
    contact formation.


    The SQLite database will be fine for saving contacts as it is a command-line project.
    SQLite is an easy-to-use setup. You can save the contact information in a file,
    but a file doesn''t provide the advantages you can get from using SQLite, such
    as performance and protection. The Python sqlite3 module will be very useful in
    using the SQLite database in this project.


    ## Extra Challenge


    Remember how do you store the database on your computer? What if something, like
    the user losing their files, happens? It means that they will lose the contact
    information, too. You can also push yourself and transfer your account to an online
    storage site. To do so, at some times you can upload database files to the cloud.
    Also, you can add a command allowing users to backup the database themselves.
    This way, if the database file is lost the user can still have access to the contacts.
    You should remember that some form of identification may be needed, so that the
    contact book can say which database file belongs to which user. Implementing an
    authentication function for users is one way to get things done.


    ## Site Connectivity Checker


    When you visit a URL, you expect your browser to view the requested links. But
    not always this is the case. Sometimes the sites may be down, so that you won''t
    get the results you want. Instead, error notices will be sent to you. You can
    continue to try a down site until it arrives and you get the information you need.
    This is where the project joins the Site Connection Checker. The Site Connectivity
    Checker visits a URL and returns the URL status: it may or may not be active.
    At intervals, the Site Connectivity Checker will visit the URL, returning the
    results of each session. Instead of visiting a URL manually, a Site Connectivity
    Checker will do all the manual work for you. So, you''ll just get the results
    of the search without having to waste time on the browser, waiting for the site
    to go live.


    ## Site Connectivity Checker Examples


    Here are some of the Site Connection Checker implementation ideas:


    - Site24x7

    - Ping


    ## Application Info


    This project''s main objective is to check the status of the sites. So, to test
    a website''s status, you must write code. You may choose either to use TCP or
    ICMP for your connections. One for checking out is the socket module. Socket Programming
    can also be read in Python (Guide). You can attach commands to allow users to
    add and remove sites from the list of sites to be reviewed through your chosen
    system, be it the button, Docopt, or Argparse frame. Also, users should be able
    to start the tool, stop it and determine the intervals. Since the list of files
    to be checked will have to be saved, you can either use an SQLite database through
    the sqlite3 module or save it in a file (just a list of sites).


    ## Extra Challenge


    The application will monitor the site''s connection status and show the results
    to the command-line. But that will allow the user to keep the command-line verified.
    You will raise the difficulty and get a notification feature implemented. The
    notification feature may be a sound that is played in the background to alert
    the user when a site changes its status. To store a site''s prior status, you''ll
    need a database. That is the only way the tool can tell about change of status.


    ## Bulk File Rename Tool


    Sometimes, all the files in a directory must be named according to certain conventions.
    For example, in a directory with File0001.jpg, you can name all the files, where
    the numbers are increasing based on the number of files in the directory. That
    can be stressful and repetitive to do manually. The Bulk File Rename Tool enable
    users to rename a large number of files, without the need to rename files manually.
    That saves a lot of time for the users. It saves them the trouble of having to
    do routine, boring work, and making mistakes. Users can rename files in a few
    seconds with the Bulk File Rename Tool, without any mistakes.


    ## Examples of Tools to Rename Bulk Files


    Here are several implementations of the concept of renaming Bulk File:


    - Rename

    - Ren


    ## Application Info


    The main goal of this idea for a project is to rename files. Therefore, the application
    has to find a way to manipulate the target files. The libraries os, sys, and shutil
    will be useful for much of this project.


    Using naming conventions your users will be able to rename all the files in the
    directory. They should, therefore, be able to pass choice in the naming convention.
    If you understand how regex functions, the regex module can help suit the appropriate
    naming patterns.


    A user may want to pass as part of the commands in a naming convention like my
    files, and expect the tool to rename all the files like myfilesXYZ, where XYZ
    is a number. Also, they should be able to select the directory where the files
    to be renamed are.


    ## Extra Challenge


    The big challenge in this project is renaming all of the files in a directory.
    However, users may need to name just a specific number of files. To test your
    skills, you can implement a feature that allows users to select the number of
    files to be renamed, rather than all the files.


    Note that renaming only several files allows the application to arrange the files
    based on alphabetical order, file size, or file creation time, depending on the
    user''s needs.


    ## Tree Directory Generator


    Directories are similar to family trees: each directory has a special relationship
    to other directories. No directories, except an empty root directory, ever remain
    on its own.


    It is difficult to see the connection between folders when you''re dealing with
    files and directories, because you can only see what''s in the current directory.
    You use a file manager, or you work from the command line.


    You can see the relation between files and directories like a tree or map with
    a Directory Tree Generator.


    This makes the positioning of the files and directories easier to understand.
    When explaining certain concepts, a directory treemap is important, and a generator
    of directory tree makes it easier to obtain a visual representation of the relationships
    between files and directories.


    ## Examples of Tree Generators in Directories


    Here are some Directory Tree Generator Implementations:


    - Dirtreex

    - Tree


    ## Application Info


    The Directory Tree Generator''s main objective is to visualize the connections
    between files and directories. The os library can be very useful to list the files
    and directories in a selected directory.


    Using a framework like Argparse or Docopt helps to abstract loads of things, allowing
    you to concentrate on writing code for the logic of the application.


    In the logic of the application, you can decide how files or directories you want
    to represent. It''s a brilliant way to go about it using different colors. The
    colored library can be used to print files and folders in various colors.


    Also, you can determine how far you want the Directory Tree Generator to go. For
    instance, if a directory has children directories twelve deep levels, you may
    only decide to go as deep as the fifth level.


    You can also let the user decide how deeply they want the Directory Tree Generator
    to go, if you wish.


    ## Extra Challenge


    Since the results will be on the command-line of the generated directory tree,
    you can go one step further. You can have the generator create directory tree
    images so it will essentially turn the text into an image.


    The pillow library would be useful for doing this.


