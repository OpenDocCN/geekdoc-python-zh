    ('Leo', 'Sharma')\n('Candy', 'Sharma')\n```\n\n## Python 正则表达式选项\n\n可以向我们描述的函数传递可选参数。以下是可能的选项：\n\
    \n1. Python 正则表达式 IGNORECASE\n\n在匹配时，此 Python 正则表达式忽略大小写。\n\n考虑以下 Python 正则表达式\
