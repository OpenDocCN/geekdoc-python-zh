    什么是Python循环？如果你想让语句运行100次，你不会重复写100遍。考虑一下你需要打印从1到99的数字的情况。或者你可能想向99个人问好。在这种情况下，你可以使用Python循环。我们将在这里介绍四种不同形式的Python循环：\n\
    \n- Python for循环\n- Python while循环\n- Python循环控制语句\n- Python中的嵌套for循环\n\n### Python中的while循环\n\
    \n在Python中，while循环会迭代直到条件变为False。换句话说，当它接受的条件为True时，它会执行语句。\n\n![](img/a1c5e4a1633d0fcc232ce0059c778469_125_0.png)\n\
    \n当程序控制到达while循环时，会验证条件。如果条件为真，则运行其后的代码块。请记住，循环内的所有语句都要同等缩进。然后再次检查条件。此过程会重复，直到条件不再为真。然后执行循环后的第一条语句（如果有的话）。\n\
    \n```python\n>>> a=3\n>>> while(a>0):\n    print(a)\n    a-=1\n```\n\n输出：\n```\n\
    3\n2\n1\n```\n\n此循环打印数字3到1。`a--`在Python中不起作用。出于同样的原因，我们使用`a-=1`。\n\n### 1. 无限循环\n\
    \n使用while循环时要小心，因为如果你忘记在Python中递增计数器变量或编写了错误的逻辑，条件可能永远不会变为假。在这种情况下，循环将无限运行，循环后的条件将无法执行。按Ctrl+C可以停止程序运行。\n\
    \n然而，无限循环可能也有优势。这在客户端/服务器编程或需要信号量时很有用。信号量是一个主要用于同步对共享资源访问的变量。\n\n### 2. while循环的else语句\n\
    \nwhile循环之后可以有一个else语句。当条件变为假时，执行else表达式下的代码块。但是，如果你退出循环或抛出异常，它不会执行。\n\n```python\n\
    >>> a=3\n>>> while(a>0):\n    print(a)\n    a-=1\nelse:\n    print(\"Reached 0\"\
    )\n```\n\n输出：\n```\n3\n2\n1\nReached 0\n```\n\n在下面的代码中，我们在while循环体中为`a==1`放置了一个break语句。因此，当这种情况发生时，else块中的语句不会执行。\n\
    \n```python\n>>> a=3\n>>> while(a>0):\n    print(a)\n    a-=1\n    if a==1: break;\n\
