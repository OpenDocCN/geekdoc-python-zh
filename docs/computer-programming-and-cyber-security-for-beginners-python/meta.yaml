    \ Regex will be discussed here. We'll also go over Python find all and Python\
    \ multiline.\n\nLet's get started with a quick Python Regex Cheat Sheet.\n\n###\
    \ What is a regular expression (Regex) in Python?\n\nA Python regular expression\
