    注意：可以使用替代发行版（如 Anaconda）在 macOS 上完成安装；但是，本书仅涵盖官方发行版。Anaconda 是一个著名的用于科学计算和数据科学的
    Python 环境。查看官方 Anaconda 文档的 macOS 安装说明，了解如何在你的 Mac 上安装 Anaconda。


    Homebrew 包管理器和官方安装程序安装的是不同的发行版。从 Homebrew 安装存在各种缺点。


    ### 安装 Homebrew 有其局限性


    Homebrew 上提供的 macOS Python 安装不包含 Tkinter 模块所需的 Tcl/Tk 要求。Tkinter 是一个用于创建图形用户界面的
    Python 库模块。它是 Tk GUI 工具包的接口，而 Tk 工具包并未包含在 Python 中。


    Homebrew 不安装所需的 Tk GUI 工具包。相反，它使用系统上已安装的版本。由于系统版本的 Tcl/Tk 过时或完全缺失，你可能无法导入 Tkinter
    模块。


    ## macOS 安装程序建议


    由于它易于从命令行管理，并且允许命令更新 Python 而无需访问网站，因此 Homebrew 包管理器是在 macOS 上安装 Python 的流行选择。因为
    Homebrew 是一个命令行程序，所以可以使用 bash 脚本来自动化它。


    另一方面，Homebrew 提供的 Python 发行版不受 Python Software Foundation 的控制，并且可能随时更改。官方安装程序是
    macOS 上最可靠的方法，特别是如果你打算使用 Tkinter 进行 Python GUI 编程。


    ## 如何使用官方安装程序安装


    在 macOS 上，通过官方安装程序安装 Python 是最可靠的选择。它包含 Python 应用程序开发所需的所有系统依赖项。


    通过官方安装程序，你可以分两步完成安装。


    **步骤 1：下载官方安装程序**


    要获取完整安装程序，请按照以下步骤操作：


    1.  转到 Python.org

    2.  单击“Latest Python”的链接

    3.  要开始下载，请滚动到底部并单击“macOS 64-bit installer”。'
