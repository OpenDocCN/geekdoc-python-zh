    \n## 第 17 章：函数式编程\n\n函数式编程是一种使用函数来定义计算的编程范式。函数式编程的一个显著特征是状态不变的概念。\n\n在命令式编程（这可能是你更熟悉的更普遍的编程范式）中，计算是通过语句执行的。这些是改变变量值并因此改变计算状态的命令。例如，一个\
    \ `for` 循环可以多次执行一条语句，每次修改一个变量的值，如下所示：\n\n```python\ncounter = 0\nfor i in range(10):\n\
    \    counter += 1\n```\n\n在循环的每次迭代中，当计数器的值增加一时，计算的状态就会发生变化，使其更接近最终状态。\n\n另一方面，函数式编程摒弃了状态的概念。函数式编程只处理不可变数据类型，而不是改变变量值。我们只处理原始数据结构的副本，因为不可变数据类型的值无法更改。在\
    \ Python 中，`map`、`filter` 和 `reduce` 函数都以相同的方式工作：它们构建并处理新的数据集，同时保持原始数据不变。\n\n\
