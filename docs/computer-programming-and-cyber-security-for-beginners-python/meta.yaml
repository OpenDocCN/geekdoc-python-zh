  - "[PAGE 170]\n\n```\npython\nclass PowTwo:\n    def __init__(self, max=0):\n  \
    \      self.n = 0\n        self.max = max\n\n    def __iter__(self):\n       \
    \ return self\n\n    def __next__(self):\n        if self.n > self.max:\n    \
    \        raise StopIteration\n\n        result = 2 ** self.n\n        self.n +=\
    \ 1\n        return result\n```\n\nThe preceding presentation was lengthy and\
    \ perplexing. Let's try it again with a generator function.\n\n```\npython\ndef\
    \ PowTwoGen(max=0):\n    n = 0\n    while n < max:\n        yield 2 ** n\n   \
    \     n += 1\n```\n\nThe implementation was concise and considerably cleaner because\
    \ generators kept care of information automatically.\n\n# 2. Memory Powerful\n\
    \nBefore returning the result, a regular function that returns a sequence will\
    \ build the full sequence in memory. If the number of elements in the sequence\
    \ is huge, this is overkill.\n\nUsing a generator to implement such sequences\
    \ saves memory and is preferred because it only produces one item at a time.\n\
    \n# 3. Infinite Stream Representation\n\nGenerators are great for representing\
    \ an endless stream of data. Infinite streams cannot be stored in memory, but\
    \ generators can represent an infinite stream of data because they only produce\
    \ one item at a time.\n\nThe generator function below can generate all even numbers\
    \ (at least in theory).\n\n```\npython\ndef all_even():\n    n = 0\n    while\
    \ True:\n        yield n\n        n += 2\n```\n\n# 4. Pipelining Generators\n\n\
    A set of processes can be pipelined using multiple generators. An example is the\
    \ greatest way to demonstrate this.\n\nAssume we have a machine that generates\
    \ numbers from the Fibonacci sequence. We also have a generator that squares numbers.\n\
    \nIf we wish to compute the sum of squares of integers in the Fibonacci series,\
    \ we can pipe the output of generator functions together in the following technique."
