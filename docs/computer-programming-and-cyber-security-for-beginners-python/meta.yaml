  - "[PAGE 37]\n\n# Chapter 5: FUNCTIONS IN PYTHON\n\nIn programming, functions are\
    \ used to group a collection of instructions that you want to utilize repeatedly\
    \ or better self-contained in a sub-program and called as needed due to their\
    \ complexity. That is, a function is a piece of code that is written to perform\
    \ a specific task. The function may or may not require several inputs to complete\
    \ that task. The function may or may not return one or more values when the task\
    \ is completed.\n\nIn Python, there are three categories of functions:\n\n+  \
    \ - Built-in functions such as help(), which asks for assistance, min(), which\
    \ returns the minimum value, print(), which prints an object to the terminal,\
    \ and so on... An overview containing more of these functions can be found here.\n\
    - User-Defined Functions (UDFs), which are functions created by users to assist\
    \ them;\n- Anonymous functions, often known as lambda functions, are not declared\
    \ using the conventional def keyword.\n\nTechniques vs. Functions\n\nA function\
    \ that is part of a class is referred to as a technique. A class instance or object\
    \ accesses it. This restriction does not apply to a function: it just relates\
    \ to a solo function. This indicates that while all techniques are functions,\
    \ not all functions are techniques.\n\nConsider this example, where you first\
    \ define a function `plus()` and then a `Summation` class with a `sum()` technique:\n\
    \n```\npython\n# Define a function 'plus()'\ndef plus(a,b):\n    return a + b\n\
    \n# Create a 'Summation' class\nclass Summation(object):\n    def sum(self, a,\
    \ b):\n        self.contents = a + b\n        return self.contents\n```\n\nYou\
    \ must first define an instance or object of the Summation class before calling\
    \ the sum() function. So, let's make a definition for such an object:\n\n```\n\
    python\n# Instantiate 'Summation' class to call 'sum()'\nsumInstance = Summation()\n\
    sumInstance.sum(1,2)\n```\n\nRemember that this instantiation isn't required when\
    \ calling the function plus()! You should be able to execute plus(1,2) without\
    \ any issues in the DataCamp Light code block!\n\nArguments vs. Parameters\n\n\
    Parameters are the names given to functions and techniques when they are defined\
    \ and where arguments are mapped. In other words, arguments are the things that\
    \ are passed into a function or technique call, whereas the function or technique\
    \ code refers to the arguments as parameter names.\n\nConsider the following scenario,\
    \ then return to the DataCamp Light chunk: Even though you created three parameters,\
    \ self, a, and b, you pass two arguments to the Summation class's sum() technique.\n\
    \nSo, what happened to you?\n\nEvery class technique's first argument references\
    \ the class's current instance, which is Summation. This argument is commonly\
    \ referred to as \"self.\"\n\nBecause the self is the parameter name for an implicitly\
    \ given argument that refers to the instance via which a technique is invoked,\
    \ you don't pass the reference to self in this situation. It is implicitly placed\
    \ into the argument list."
- md: "## User-Defined Functions: How To Define A Function (UDFs)\n\nThe following\
    \ are the four steps to defining a function in Python:\n\n1.  Declare the function\
    \ with the term `def`, followed by the function name.\n2.  Add parameters to the\
    \ function, which should be placed within the function's parentheses. Put a colon\
    \ at the end of your line.\n3.  Include statements that the functions should execute.\n\
    4.  If your function should output something, end it with a `return` statement.\
    \ Your function will return `None` if it doesn't have a `return` statement.\n\n\
    Of course, as you progress, your functions will become more complex: you can add\
    \ `for` loops, flow control, and more to make it more fine-grained:\n\n```python\n\
    def hello():\n    name = str(input(\"Enter your name: \"))\n    if name:\n   \
    \     print(\"Hello \" + str(name))\n    else:\n        print(\"Hello World\"\
    )\n    return\n\nhello()\n```\n\nYou ask the user for a name in the function mentioned\
    \ above. The function will print \"Hello World\" if no name is specified. Otherwise,\
    \ the user will be greeted with a personalized \"Hello.\"\n\nAlso, keep in mind\
    \ that your UDF can have one or more function parameters. When you get to the\
    \ section on Function Arguments, you'll learn more about this. Furthermore, as\
    \ a consequence of your function, you can return one or several values.\n\n###\
    \ The statement of return\n\nYou don't need to return anything in your UDF `hello()`\
    \ because you're printing something. There will be no difference between this\
    \ function and the one listed above:\n\n![](img/a1c5e4a1633d0fcc232ce0059c778469_38_0.png)\n\
    \nIf you want to keep working with the result of your function and test out some\
    \ operations on it, you'll need to use the `return` statement to return a value,\
    \ such as a String, an integer, or... Consider the following scenario, in which\
    \ `hello()` returns \"hello\" as a String and `hello_no_return()` returns `None`:\n\
    \n![](img/a1c5e4a1633d0fcc232ce0059c778469_38_1.png)\n\nBecause you can't do anything\
    \ with a `None`, the second technique returns an error. You'll get a `TypeError`\
    \ saying that the multiplication operation for `NoneType` (the `None` returned\
    \ by `hello_no_return()`) and `int` isn't possible (2).\n\nWhen a function encounters\
    \ a `return` statement, it exits immediately, even if that implies it won't return\
    \ any value:\n\n```python\n# script.py\ndef run():\n    for x in range(10):\n\
    \        if x == 2:\n            return\n    print(\"Run!\")\n\nrun()\n```\n\n\
    When working with the `return` statement, it's also worth noting that you can\
    \ utilize it to return multiple values. Tuples are used to do this. Keep in mind\
    \ that this data structure is similar to a list in that it can have many values.\
    \ On the other hand, Tuples are immutable, which means you can't change the amounts\
    \ contained in them! You put it together using double parentheses `()`. The comma\
    \ and the assignment operator can be used to unpack tuples into numerous variables.\
    \ To see how your function can return several values, consider the following example:\n\
    \n```python\n# script.py\n# Define `plus()`\ndef plus(a,b):\n    sum = a + b\n\
    \    return (sum, a)\n\n# Call `plus()` and unpack variables\nsum, a = plus(3,4)\n\
    \n# Print `sum()`\nprint(sum)\n```\n\n`return sum, a` would have the same outcome\
    \ as `return (sum, a)`, because of the former pack's `sum` and `a` into a tuple\
    \ behind the hood!\n\n## What Should A Function Be Called?\n\nYou've already seen\
    \ a lot of examples of how to call a function in the previous sections. When you\
    \ call a function, you're telling Python to run the function you've specified,\
    \ either directly through another function or from the Python prompt (as explained\
    \ in the section \"Nested Functions\"). Simply execute `hello()` to invoke your\
    \ newly defined function, as shown in the DataCamp Light chunk below:\n\n```python\n\
    # script.py\nhello()\n```\n\n## How Do I Include Docstrings In A Python Function?\n\
    \nAnother important part of writing Python functions is the use of docstrings.\
    \ Docstrings define your function's behavior, such as the computations it conducts\
    \ and the results it returns. These descriptions act as documentation for your\
    \ function, allowing anyone who reads the docstring of your function to understand\
    \ what it does without having to read the entire function definition. Function\
    \ docstrings are inserted in the line immediately following the function header,\
    \ between triple quotation marks. `'Prints \"Hello World\"'` is an adequate Docstring\
    \ for your `hello()` technique.\n\n```python\ndef hello():\n    \"\"\"Prints \"\
    Hello World.\"\n\n    Returns:\n        None\n    \"\"\"\n    print(\"Hello World\"\
    )\n    return\n```\n\nIt's worth noting that docstrings can be much longer than\
    \ the one shown here. If you want to learn more about docstrings, go to the Github\
    \ repositories of Python libraries like sci-kit-learn or pandas, where you'll\
    \ find many examples!\n\n## Python Function Arguments\n\nYou studied the distinction\
    \ between parameters and arguments earlier. In a nutshell, arguments are the items\
    \ passed to any function or technique call, whereas the technique or function\
    \ code refers to the arguments as parameter names. Python UDFs can take four different\
    \ types of arguments:\n\n-   Keyword arguments\n-   Variable number of arguments\n\
    -   Default arguments\n-   Required arguments\n\n## Default Arguments\n\nIf no\
    \ value is specified as an argument during the function call, the default parameter\
    \ is used. To assign this default value, use the assignment operator `=`, as illustrated\
    \ in the following example:\n\n![](img/a1c5e4a1633d0fcc232ce0059c778469_40_0.png)\n\
    \n## Required Arguments\n\nThe required arguments of a UDF, as the name implies,\
    \ are those that must be present. These arguments must be given during the function\
    \ call and in the correct order, as seen in the example below:\n\n![](img/a1c5e4a1633d0fcc232ce0059c778469_40_1.png)\n\
    \nTo call the function without encountering any problems, you'll need arguments\
    \ that map to the `a` and `b` parameters. The outcome won't change if you swap\
    \ `a` and `b` around, but it might if you modify `plus()` to the following:\n\n\
    ![](img/a1c5e4a1633d0fcc232ce0059c778469_40_2.png)\n\n## Keyword Arguments\n\n\
    You can utilize keyword arguments in your function call to ensure that you call\
    \ all of the parameters in the correct order. These are used to identify arguments\
    \ based on their parameter names. To make this more evident, consider the following\
    \ example:\n\nIt's worth noting that you may use the keyword arguments to change\
    \ the order of the parameters and still obtain the same result when you run your\
    \ function:\n\n```python\n# script.py\n# Define `plus()` function\ndef plus(a,b):\n\
    \    return a + b\n\n# Call `plus()` function with keyword arguments\nplus(b=2,\
    \ a=1)\n```\n\n## Variable Number of Arguments\n\nYou can make use of the following\
    \ syntax with `*args` if you don't know the precise amount of arguments you want\
    \ to provide to a function:\n\n```python\n# script.py\n# Define `plus()` function\
    \ to accept a variable number of arguments\ndef plus(*args):\n    return sum(args)\n\
    \n# Calculate the sum\nplus(1,4,5)\n```\n\nAn asterisk (`*`) is put before the\
    \ variable name that carries the values of all non-keyword variable parameters.\
    \ Note that you might have called the `addition()` function `*variant`, `*var_int_args`,\
    \ or any other name. Replace `*args` with a different name that includes an asterisk.\
    \ You'll notice that the code above continues to work! You can see how the above\
    \ program uses the built-in Python `sum()` function to add up all of the arguments\
    \ supplied to `plus()`. If you want to avoid this and create the function totally\
    \ from scratch, you can use this technique:\n\n```python\n# script.py\n# Define\
    \ `plus()` function to accept a variable number of arguments\ndef plus(*args):\n\
    \    total = 0\n    for i in args:\n        total += i\n    return total\n\n#\
    \ Calculate the sum\nplus(20,30,40,50)\n```\n\n## Global vs. Local Variables\n\
    \nVariables specified inside a function body have a local scope, while variables\
    \ defined outside the function body have a global scope. Local variables are defined\
    \ within a function block and can only be retrieved within that function, but\
    \ global variables are accessible by all functions in your script:"
  mdcn: "## 用户自定义函数：如何定义函数（UDFs）\n\n以下是Python中定义函数的四个步骤：\n\n1.  使用`def`关键字声明函数，后跟函数名。\n\
    2.  为函数添加参数，参数应放在函数的括号内。在行末加上冒号。\n3.  包含函数应执行的语句。\n4.  如果你的函数需要输出内容，请以`return`语句结束。如果函数没有`return`语句，它将返回`None`。\n\
    \n当然，随着你的进步，你的函数会变得更加复杂：你可以添加`for`循环、流程控制等，使其更加精细：\n\n```python\ndef hello():\n\
    \    name = str(input(\"Enter your name: \"))\n    if name:\n        print(\"\
    Hello \" + str(name))\n    else:\n        print(\"Hello World\")\n    return\n\
    \nhello()\n```\n\n在上面提到的函数中，你向用户询问姓名。如果未指定姓名，函数将打印\"Hello World\"。否则，用户将收到个性化的问候。\n\
    \n另外，请记住，你的UDF可以有一个或多个函数参数。当你学习到函数参数部分时，你会了解更多。此外，作为函数的结果，你可以返回一个或多个值。\n\n###\
    \ return语句\n\n在你的UDF `hello()`中，你不需要返回任何东西，因为你正在打印内容。这个函数与上面列出的函数之间没有区别：\n\n![](img/a1c5e4a1633d0fcc232ce0059c778469_38_0.png)\n\
    \n如果你想继续使用函数的结果并在其上测试一些操作，你需要使用`return`语句返回一个值，例如字符串、整数或...考虑以下场景，其中`hello()`返回字符串\"\
    hello\"，而`hello_no_return()`返回`None`：\n\n![](img/a1c5e4a1633d0fcc232ce0059c778469_38_1.png)\n\
    \n因为`None`不能做任何事情，所以第二种技术会返回错误。你会得到一个`TypeError`，提示`NoneType`（`hello_no_return()`返回的`None`）和`int`的乘法操作无法进行（2）。\n\
    \n当函数遇到`return`语句时，它会立即退出，即使这意味着它不会返回任何值：\n\n```python\n# script.py\ndef run():\n\
    \    for x in range(10):\n        if x == 2:\n            return\n    print(\"\
    Run!\")\n\nrun()\n```\n\n使用`return`语句时，还值得注意的是，你可以利用它返回多个值。元组用于实现这一点。请记住，这种数据结构类似于列表，可以包含多个值。另一方面，元组是不可变的，这意味着你不能更改其中包含的值！你使用双括号`()`将其组合在一起。可以使用逗号和赋值运算符将元组解包为多个变量。要了解你的函数如何返回多个值，请考虑以下示例：\n\
    \n```python\n# script.py\n# Define `plus()`\ndef plus(a,b):\n    sum = a + b\n\
    \    return (sum, a)\n\n# Call `plus()` and unpack variables\nsum, a = plus(3,4)\n\
    \n# Print `sum()`\nprint(sum)\n```\n\n`return sum, a`与`return (sum, a)`的结果相同，因为前者在底层将`sum`和`a`打包成一个元组！\n\
    \n## 函数应该叫什么名字？\n\n你在前面的章节中已经看到了很多调用函数的例子。当你调用一个函数时，你是在告诉Python运行你指定的函数，无论是通过另一个函数直接调用，还是从Python提示符调用（如\"\
    嵌套函数\"部分所述）。只需执行`hello()`即可调用你新定义的函数，如下方DataCamp Light代码块所示：\n\n```python\n# script.py\n\
    hello()\n```\n\n## 如何在Python函数中包含文档字符串？\n\n编写Python函数的另一个重要部分是使用文档字符串。文档字符串定义了你的函数的行为，例如它执行的计算和返回的结果。这些描述充当你的函数的文档，允许任何阅读函数文档字符串的人无需阅读整个函数定义即可理解其功能。函数文档字符串插入在函数头之后的下一行，位于三引号之间。`'Prints\
    \ \"Hello World\"'`是你的`hello()`方法的合适文档字符串。\n\n```python\ndef hello():\n    \"\"\
    \"Prints \"Hello World.\"\n\n    Returns:\n        None\n    \"\"\"\n    print(\"\
    Hello World\")\n    return\n```\n\n值得注意的是，文档字符串可以比这里显示的长得多。如果你想了解更多关于文档字符串的信息，请访问Python库（如sci-kit-learn或pandas）的Github仓库，那里有很多例子！\n\
    \n## Python函数参数\n\n你之前研究了参数和实参的区别。简而言之，实参是传递给任何函数或方法调用的项目，而方法或函数代码将实参称为参数名。Python\
    \ UDF可以接受四种不同类型的参数：\n\n-   关键字参数\n-   可变数量的参数\n-   默认参数\n-   必需参数\n\n## 默认参数\n\
    \n如果在函数调用期间未指定任何值作为实参，则使用默认参数。要分配此默认值，请使用赋值运算符`=`，如下例所示：\n\n![](img/a1c5e4a1633d0fcc232ce0059c778469_40_0.png)\n\
    \n## 必需参数\n\n顾名思义，UDF的必需参数是必须存在的参数。这些参数必须在函数调用期间按正确的顺序给出，如下例所示：\n\n![](img/a1c5e4a1633d0fcc232ce0059c778469_40_1.png)\n\
    \n要调用函数而不遇到任何问题，你需要与`a`和`b`参数对应的实参。如果你交换`a`和`b`的顺序，结果不会改变，但如果你将`plus()`修改为以下内容，结果可能会改变：\n\
    \n![](img/a1c5e4a1633d0fcc232ce0059c778469_40_2.png)\n\n## 关键字参数\n\n你可以在函数调用中使用关键字参数，以确保你按正确的顺序调用所有参数。这些参数用于根据其参数名识别实参。为了更清楚地说明这一点，请考虑以下示例：\n\
    \n值得注意的是，你可以使用关键字参数来更改参数的顺序，并在运行函数时仍然获得相同的结果：\n\n```python\n# script.py\n# Define\
    \ `plus()` function\ndef plus(a,b):\n    return a + b\n\n# Call `plus()` function\
    \ with keyword arguments\nplus(b=2, a=1)\n```\n\n## 可变数量的参数\n\n如果你不知道要提供给函数的确切实参数量，可以使用`*args`的以下语法：\n\
    \n```python\n# script.py\n# Define `plus()` function to accept a variable number\
    \ of arguments\ndef plus(*args):\n    return sum(args)\n\n# Calculate the sum\n\
    plus(1,4,5)\n```\n\n星号（`*`）放在保存所有非关键字可变参数值的变量名之前。请注意，你可能将`addition()`函数命名为`*variant`、`*var_int_args`或任何其他名称。将`*args`替换为包含星号的不同名称。你会注意到上面的代码仍然有效！你可以看到上面的程序如何使用内置的Python\
    \ `sum()`函数来累加提供给`plus()`的所有实参。如果你想避免这种情况并完全从头开始创建函数，可以使用此技术：\n\n```python\n#\
    \ script.py\n# Define `plus()` function to accept a variable number of arguments\n\
    def plus(*args):\n    total = 0\n    for i in args:\n        total += i\n    return\
    \ total\n\n# Calculate the sum\nplus(20,30,40,50)\n```\n\n## 全局变量与局部变量\n\n在函数体内指定的变量具有局部作用域，而在函数体外定义的变量具有全局作用域。局部变量在函数块内定义，只能在该函数内检索，而全局变量可由脚本中的所有函数访问："
