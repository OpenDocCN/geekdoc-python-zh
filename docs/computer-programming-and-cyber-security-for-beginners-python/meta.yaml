    \n在Python中，你可以将一个对象的值赋给另一个对象。\n\n```python\n>>> apple=orange\n>>> apple.color\n\
    ```\n\n输出：\n'Orange'\n\n### 属于Python类的属性\n\n我们将重新定义Python类`fruit`来演示这一点。\n\n```python\n\
    >>> class fruit:\n    size='Small'\n    def __init__(self,color,shape):\n    \
    \    self.color=color\n        self.shape=shape\n    def salutation(self):\n \
    \       print(f\"I am {self.color} and a shape {self.shape}\")\n```\n\n输出：\n'Small'\n\
    \n```python\n>>> orange=fruit('Orange','Round')\n>>> orange.size\n```\n\n输出：\n\
    'Small'\n\n因为我们重新定义了类，所以我们必须重新声明对象。一个函数也可以包含在Python类中。\n\n```python\n>>> class\
    \ fruit:\n    size='Small'\n    def __init__(self,color,shape):\n        self.color=color\n\
    \        self.shape=shape\n    def salutation():\n        print(f\"I am happy\"\
    )\n>>> fruit.salutation()\n```\n\n输出：\nI am happy\n\n```python\n>>> fruit.salutation\n\
    ```\n\n输出：\n<function fruit.salutation at 0x030C8390>\n\n### 如何删除Python属性、类和对象？\n\
    \n使用`del`关键字来删除属性、对象或类。\n\n```python\n>>> del orange.shape\n>>> orange.shape\n\
    ```\n\n输出：\nTraceback (most recent call last):\n  File \"<pyshell#118>\", line\
    \ 1, in <module>\n    orange.shape\nAttributeError: 'fruit' object has no attribute\
    \ 'shape.'\n\n让我们尝试删除一个对象。\n\n```python\n>>> del orange\n>>> orange\n```\n\n输出：\n\
    Traceback (most recent call last):\n  File \"<pyshell#120>\", line 1, in <module>\n\
    \    orange\nNameError: name 'orange' is not defined\n\n```python\n>>> fruit\n\
    <class '__main__.fruit'>\n>>> del fruit\n>>> fruit\n```\n\n输出：\nTraceback (most\
