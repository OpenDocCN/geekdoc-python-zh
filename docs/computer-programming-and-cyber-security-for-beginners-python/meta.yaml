  md: "# Chapter 17: FUNCTIONAL PROGRAMMING\n\nFunctional programming is a programming\
    \ paradigm that employs functions to define computation. One of functional programming's\
    \ distinguishing characteristics is the concept of an unchanging state.\n\nComputation\
    \ is carried out through statements in imperative programming, which is the more\
    \ prevalent programming paradigm you're presumably already familiar with. These\
    \ are commands that change the value of a variable and, as a result, the state\
    \ of the calculation. A for loop, for example, may execute a statement many times,\
    \ each time modifying the value of a variable, as shown below:\n\n```\ncounter\
    \ = 0\nfor i in range(10):\n    counter += 1\n```\n\nThe state of the calculation\
    \ changes every time the value of the counter is increased by one in each iteration\
    \ of the loop, bringing it closer to the end state.\n\nFunctional programming,\
    \ on the other hand, does away with the concept of state. Functional programming\
    \ only works with immutable data types rather than altering variable values. We\
    \ only work on copies of the original data structure because the values of immutable\
    \ data types cannot be changed. In Python, the map, filter, and reduce functions\
    \ all work in the same way: they construct and work on new data sets while leaving\
    \ the original data alone.\n\nFunctions are viewed as first-class citizens in\
    \ functional programming. In Python imperative programming, we usually modify\
    \ data for loops and list comprehensions, but in functional programming, we can\
    \ only utilize functions. This yields elegant solutions as well as advantages\
    \ such as greater modularity and parallel program execution efficiency.\n\nBefore\
    \ we go into examples of the map(), filter(), and reduce() functions in Python,\
    \ we'll need to go over another concept: higher-order functions.\n\n# Functions\
    \ of a Higher Order\n\nHigher-order functions are our major tool for defining\
    \ computation in functional programming. These are functions that accept a function\
    \ as a parameter and return another function. Three of Python's most important\
    \ higher-order methods are reduce (), map(), and filter(). When added with simpler\
    \ functions, they can be utilized to perform complex operations.\n\nIn the code\
    \ sample below, a higher-order function is illustrated. Greeting () accepts two\
    \ arguments: a function f and a name n and returns the function f. (n).\n\n```\n\
    >>> def greet(name):\n...     return \"Hello, {}!\".format(name)\n...\n>>> def\
    \ print_greeting(f, n):\n...     print(f(n))\n...\n>>> print_greeting(greet, \"\
    Governor\")\nHello, Governor!\n```\n\n# Anonymous Functions\n\nIn the last section,\
    \ we saw an instance of a function takes another function as an input. The map(),\
    \ filter(), and reduce() functions all do the same thing: Each of them takes a\
    \ function and a list of elements, then returns the result of applying the function\
    \ to every element in the list. We used Python's def keyword to define our functions\
    \ in the two instances above. This generates a callable Python object that, when\
    \ called, performs the statement supplied in its description.\n\nAnonymous functions\
    \ (also known as lambda functions) are favored in functional programming. They're\
