    \ function maintains; the rest of the series is discarded.\n\nList comprehensions\
    \ can also be used to filter elements in a sequence. This is thought to be a more\
    \ Pythonic approach.\n\n```\n>>> [country for country in countries if \"and\"\
    \ in country]\n['Bosnia and Herzegovina', 'Finland', 'Ireland']\n```\n\nIt's worth\
