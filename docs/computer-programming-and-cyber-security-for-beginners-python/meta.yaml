    \ `n=5` 调用了它。它被立即求值以生成结果。与第二个示例不同，lambda 函数没有附加到关键字，因此如果我们想再次使用它，就必须重新创建代码。\n\
    Lambda 对于 `map()`、`filter()` 和 `reduce()` 很有用，因为我们提供给它们的输入通常是短函数，在我们的程序中只会使用一次；因此，存储它们是没有意义的。与必须声明并保存在内存中的传统函数不同，匿名函数是短小且一次性的。\n\
    既然我们已经介绍了基础知识，让我们更仔细地看看 Python 的 `map()`、`filter()` 和 `reduce()` 方法。\n\n## map()\n\
