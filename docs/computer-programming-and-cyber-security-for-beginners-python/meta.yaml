    ## 1. Arithmetic Operators in Python\n\nPython operators for basic mathematical\
    \ operations are included in this list of Python arithmetic operators.\n\n###\
    \ a. Addition(+)\nThe values on equal sides of the operator are added together.\n\
    \n```\n>>> 3+4\nOutput\n7\n```\n\n### b. Subtraction(-)\nSubtracts the right-hand\
    \ value from the left-hand value.\n\n```\n>>> 3-4\nOutput\n-1\n```\n\n### c. Multiplication(*)\n\
    The values on equal sides of the operator are multiplied.\n\n```\n>>> 3*4\nOutput\n\
    12\n```\n\n### d. Division(/)\nDivides the left-hand value by the right-hand value.\
    \ It's worth noting that division yields a floating-point value.\n\n```\n>>> 3/4\n\
    Output\n0.75\n```\n\n### e. Exponentiation(**)\nTends to raise the first number\
    \ to the second's power.\n\n```\n>>> 3**4\nOutput\n81\n```\n\n### f. Floor Division(//)\n\
    Divides the quotient into integers and returns the result. After the decimal,\
    \ it dumps the digits.\n\n```\n>>> 3//4\n>>> 4//3\nOutput\n1\n>>> 10//3\nOutput\n\
    3\n```\n\n### g. Modulus(%)\nDivides the remaining and returns the result.\n\n\
    ```\n>>> 3%4\nOutput\n3\n>>> 4%3\nOutput\n1\n>>> 10%3\nOutput\n1\n>>> 10.5%3\n\
    Output\n1.5\n```\n\n## 2. Python Relational Operator\nThe Relational Python Operator\
    \ carries out the comparison between operands.\n\nThey indicate whether one operand\
    \ is greater, lesser, equal, or a combination of the three.\n\n### a. Less than(<)\n\
    This operator determines whether the value on the left is less than the value\
    \ on the right.\n\n```\n>>> 3<4\nOutput\nTrue\n```\n\n### b. Greater than(>)\n\
    It determines whether the value on the operator's left is greater than the value\
    \ on the right.\n\n```\n>>> 3>4\nOutput\nFalse\n```\n\n### c. Less than or equal\
    \ to(<=)\nIt determines if the value on the operator's left is less than or equal\
    \ to the value on the right.\n\n```\n>>> 7<=7\nOutput\nTrue\n```\n\n### d. Greater\
    \ than or equal to(>=)\nIt checks if the value on the operator's left is greater\
    \ than or equal to the one on the right.\n\n```\n>>> 0>=0\nOutput\nTrue\n```\n\
    \n### e. Equal to(==)\nThis operator determines whether the value on the operator's\
    \ left equals the value on the operator's right.\nThe Boolean value True is equivalent\
    \ to 1 but not to 2. Furthermore, 0 equals False.\n\n```\n>>> 3==3.0\nOutput\n\
    True\n>>> 1==True\nOutput\nTrue\n>>> 7==True\nOutput\nFalse\n>>> 0==False\nOutput\n\
    True\n>>> 0.5==True\nOutput\nFalse\n```\n\n### f. Not equal to(!=)\nIt determines\
    \ whether the value on the left of the operator differs from the value on the\
    \ right.\nThe Python operator <> does the same function. However, it was deprecated\
    \ in Python 3.\nWhen the relative operator's condition is met, it returns True.\
    \ Otherwise, False is returned. This return value can be used in another statement\
