- md: "# COMPUTER PROGRAMMING AND CYBER SECURITY FOR BEGINNERS\n\n# PYTHON\n\nA Step-by-Step\
    \ Guide to Learn Quickly and Easily All the Secrets and Tools of the Most Useful\
    \ and Efficient Coding Program\n\n![](img/a1c5e4a1633d0fcc232ce0059c778469_0_0.png)\n\
    \n![](img/a1c5e4a1633d0fcc232ce0059c778469_0_1.png)\n\n![](img/a1c5e4a1633d0fcc232ce0059c778469_0_2.png)\n\
    \n![](img/a1c5e4a1633d0fcc232ce0059c778469_0_3.png)\n\nMANUEL MCFEELY\n\n# © Copyright\
    \ 2021 by\nAll rights reserved.\n\nThe purpose of this document is to provide\
    \ accurate and reliable information about the topic and subject at hand. The book\
    \ is sold to understand that the publisher is not obligated to provide accounting,\
    \ legally allowed, or otherwise qualifying services. If legal or professional\
    \ counsel is required, a well-versed specialist should be consulted.\n\nA Committee\
    \ of the American Bar Association and a Committee of Publishers and Associations\
    \ recognized and approved the Declaration of Principles.\n\nNo portion of this\
    \ publication may be reproduced, duplicated, or transmitted in any form, whether\
    \ electronic or printed. It is strictly forbidden to record this publication,\
    \ and any storing of this material is only permitted with the publisher's prior\
    \ consent. All intellectual property rights are reserved.\n\nThe data shown here\
    \ is said to be accurate and consistent. Any liability arising from the use or\
    \ misuse of any policies, processes, or directions included here, whether due\
    \ to inattention or otherwise, is solely and completely the responsibility of\
    \ the receiving reader. Under no circumstances will the publisher be held liable\
    \ for any compensation, damages, or monetary loss incurred due to the material\
    \ included herein, whether directly or indirectly.\n\nAll copyrights not held\
    \ by the publisher belong to the authors.\n\nThe material provided here is solely\
    \ for educational purposes and is therefore universal. The information is presented\
    \ without any type of contract or guarantee assurance.\n\nThe trademarks are utilized\
    \ without the trademark owner's permission or backing, and the trademark is published\
    \ without the trademark owner's permission or backing. All trademarks and brands\
    \ mentioned in this book are the property of their respective owners and are not\
    \ linked with this publication.\n\n# TABLE OF CONTENTS\n\n- INTRODUCTION\n- Chapter\
    \ 1: INSTALLING PYTHON\n    - INSTALLING PYTHON ON WINDOWS\n        - HOW TO FIND\
    \ OUT WHAT PYTHON VERSION YOU HAVE ON WINDOWS\n        - RECOMMENDATIONS FROM\
    \ THE WINDOWS INSTALLER\n        - HOW TO GET IT FROM MICROSOFT'S STORE\n    \
    \    - HOW TO INSTALL FROM THE FULL INSTALLER\n    - HOW TO SETUP PYTHON ON A\
    \ MAC\n        - ON A MAC, HOW CAN YOU CHECK YOUR PYTHON VERSION?\n        - macOS\
    \ INSTALLER RECOMMENDATIONS\n        - HOW TO USE THE OFFICIAL INSTALLER TO INSTALL\n\
    \        - INSTALLING FROM HOMEBREW\n    - PYTHON FEATURES\n    - THE BENEFITS\
    \ OF PYTHON LEARNING\n- Chapter 2: HOW DO YOU GET STARTED PROGRAMMING WITH PYTHON\
    \ AND WHAT DO YOU NEED?\n    - CHOOSING A PROJECT PLATFORM\n- Chapter 3: PYTHON\
    \ COMMANDS\n    - THE BASIC PYTHON COMMANDS\n    - INTERMEDIATE PYTHON COMMANDS\n\
    \    - ADVANCED PYTHON COMMANDS\n- Chapter 4: CREATE YOUR FIRST PYTHON PROGRAM\n\
    \    - BEGINNER LEVEL PYTHON PROJECT IDEAS\n- Chapter 5: FUNCTIONS IN PYTHON\n\
    - Chapter 6: DATA TYPES\n- Chapter 7: PYTHON SET AND BOOLEANS WITH SYNTAX\n- Chapter\
    \ 8: PYTHON STRING TUTORIAL – PYTHON STRING FUNCTIONS AND OPERATIONS\n    - PYTHON\
    \ STRING OPERATIONS\n- Chapter 9: PYTHON LIST WITH EXAMPLES – A COMPLETE PYTHON\
    \ LIST TUTORIAL\n    - PYTHON LIST OPERATIONS\n    - PYTHON LIST COMPREHENSION\n\
    - Chapter 10: FROZENSET\n- Chapter 11: DICTIONARIES AND TUPLES\n    - DICTIONARIES\n\
    - Chapter 12: PYTHON VARIABLES AND DATA TYPES – A COMPLETE GUIDE FOR BEGINNERS\n\
    \    - PYTHON DATA TYPES\n    - PYTHON LOCAL AND GLOBAL VARIABLES\n- Chapter 13:\
    \ MODULES VS PACKAGES IN PYTHON\n- Chapter 14: PYTHON LOOP TUTORIAL – PYTHON FOR\
    \ LOOP, NESTED FOR LOOP\n- Chapter 15: PYTHON CLASS TUTORIAL – PYTHON OBJECT &\
    \ ATTRIBUTES BELONGING TO CLASS\n- Chapter 16: A DIVE INTO PYTHON CLOSURES AND\
    \ DECORATORS\n    - INTRODUCTION TO CLOSURES IN PYTHON\n- Chapter 17: FUNCTIONAL\
    \ PROGRAMMING\n- Chapter 18: PYTHON DECORATOR TUTORIAL – CHAINING DECORATORS,\
    \ PYTHON PIE SYNTAX\n- Chapter 19: NUMPY ARRAY\n- Chapter 20: PANDAS IN PYTHON\n\
    - Chapter 21: PYTHON GENERATORS\n- Chapter 22: PYTHON FUNCTION ARGUMENTS WITH\
    \ TYPES, SYNTAX, AND EXAMPLES\n- Chapter 23: PYTHON EXCEPTION – PYTHON ERROR &\
    \ IN-BUILT EXCEPTION IN PYTHON\n- Chapter 24: BRANCHING\n- Chapter 25: PYTHON\
    \ PACKAGES TUTORIAL – HOW TO CREATE YOUR PACKAGE\n- Chapter 26: PRACTICAL APPLICATION,\
    \ TWITTER\n- Chapter 27: WHAT IS PYTHON CALENDAR\n\n# INTRODUCTION\n\nPython is\
    \ a fantastic programming language to learn, and it can be applied to a wide range\
    \ of software development projects. Python can be used for a variety of tasks,\
    \ including web development, data analysis, machine learning, and artificial intelligence.\n\
    \nGuido Rossum designed Python in 1989 as an object-oriented programming language.\
    \ It's perfect for rapid prototyping complicated applications. It may be extended\
    \ to C or C++ and has interfaces to numerous OS system calls and libraries. Python\
    \ is used by many significant corporations, including NASA, Google, YouTube, BitTorrent,\
    \ and others.\n\nPython is intended to be a very understandable language. It typically\
    \ uses English terms instead of punctuation, and it has fewer syntactical structures\
    \ than other languages.\n\nPython is a must-have skill for students and working\
    \ professionals who want to become exceptional software engineers, especially\
    \ if they work in the Web Development field.\n\nYou'll study the fundamentals\
    \ of the Python programming language, as well as programming best practices, in\
    \ this course. You'll learn how to utilize Python data types and variables to\
    \ represent and store data, as well as conditionals and loops to control the flow\
    \ of your applications. To store groups of linked data, you'll use complicated\
    \ data structures like lists, sets, dictionaries, and tuples. You'll develop scripts,\
    \ define and document your unique custom functions, and handle failures. Finally,\
    \ you'll learn how to use the Python Standard Library and other third-party libraries\
    \ to identify and use modules.\n\n# Chapter 1: INSTALLING PYTHON\n\nThe first\
    \ step in becoming a Python coder is to install or update Python on your computer.\
    \ You may install Python using a package manager, obtain official Python distributions\
    \ from Python.org, or install customized distributions for scientific computing,\
    \ IoT, and embedded devices.\n\nThis tutorial focuses on official releases because\
    \ they're the greatest way to get started learning Python programming.\n\nYou\
    \ will learn how to:\n\n- Check the Python version that is installed on your computer\
    \ if any;\n- Update or Install Python on Windows, macOS, and Linux; and\n- Use\
    \ Python on mobile devices such as phones and tablets\n- Use online interpreters\
    \ to use Python on the web.\n\nThis book will help you no matter what operating\
    \ system you're using. Choose your operating system from the list below and get\
    \ started!\n\n## INSTALLING PYTHON ON WINDOWS\n\nOn Windows, there are three installation\
    \ options:\n\n1. The Microsoft Store\n2. The full installer\n3. Linux Subsystem\
    \ for Windows\n\nIn this chapter, you will learn how to check which version of\
    \ Python is installed on your Windows machine. You'll also discover which of the\
    \ three installation options is best for you.\n\n## HOW TO FIND OUT WHAT PYTHON\
    \ VERSION YOU HAVE ON WINDOWS\n\nOpen a command-line application, such as PowerShell\
    \ to see if Python is already installed on your Windows PC.\n\nHere's how to start\
    \ PowerShell:\n\n1. Press the Win key on your keyboard.\n2. Type PowerShell into\
    \ the search box.\n3. Hit the Enter key.\n\nYou may also right-click the Start\
    \ button and choose Windows PowerShell or Windows PowerShell for PowerShell (Admin).\n\
    \nYou can also use Windows Terminal or cmd.exe.\n\nInsert this command into the\
    \ command prompt and click Enter:\n\n```\nC:\\> python –version\nPython 3.8.4\n\
    ```\n\nYou can find out what version is installed by using the —version switch.\
    \ You can also use the -V switch to achieve the same result:\n\n```\nC:\\> python\
    \ –V\nPython 3.8.4\n```\n\nIn either case, you'll want to upgrade your installation\
    \ if it's older than 3.8.4, and it was the most recent version at the time of\
    \ writing.\n\nNote: If you don't have a Python version installed, each of the\
    \ following statements will open the Microsoft Store and take you to the Python\
    \ program page. In the next section, you'll learn how to finish the installation\
    \ through the Microsoft Store.\n\nYou can use the where.exe command in cmd.exe\
    \ or PowerShell to find out where the installation is located:\n\n- C:\\> where.exe\
    \ python\n- C:\\Users\\mertz\\AppData\\Local\\Programs\\Python\\Python37-32\\\
    python.exe\n\nIt's worth noting that the where.exe command will only work if your\
    \ user account has Python installed.\n\nWhat are your choices? Are"
