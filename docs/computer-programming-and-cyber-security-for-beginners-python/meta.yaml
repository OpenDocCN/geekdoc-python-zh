    ```\n\n**Output**\n\n```\n[2, 1, 3]\n```\n\n```python\n>>> a.append(4)\n>>> a\n\
    ```\n\n**Output**\n\n```\n[2, 1, 3, 4]\n```\n\n### b. insert()\n\nIt places an\
