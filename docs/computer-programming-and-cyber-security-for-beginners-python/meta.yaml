    ```\n\n# Output\n\n```\n'com'\n```\n\nYou can extract the portions you desire\
    \ using parentheses. Note that we used parenthesis to divide the pattern into\
    \ groups for this:\nr'([\\w.-]+)@([\\w-]+)\\.([\\w]+)'\n\n## Python findall()\n\
    \nPython regex search() terminates at the first match, as we saw above.\nHowever,\
    \ findall() in Python provides a list of all matches found.\n\n```\n>>> match=re.findall(r'advi[cs]e','I\
    \ could advise you on your poem, but you would disparage my advice')\n```\n\n\
    ```\n>>> for i in match:\n    print(i)\n```\n\n# Output\n\n```\nadvise\nadvice\n\
    ```\n\n```\n>>> type(match)\n```\n\n# Output\n\n```\n<class 'list'>\n```\n\n###\
    \ findall() with Files\n\nWe've dealt with files before and understand how to\
    \ read and write them. Why not make your life easier by utilizing Python's findall()\
    \ function to search for all files?\n\nTo go to the desktop, we'll first use the\
    \ os module. Let's see what happens.\n\n```\n>>> import os\n>>> os.chdir('C:\\\
    Users\\lifei\\Desktop')\n>>> f=open('Today.txt')\n```\n\nWe have a file named\
    \ Today.txt on our Desktop. These are its contents:\n\n- DS, DBMS, ADA, OS\n-\
    \ CSS, HTML, jQuery, JavaScript\n- C++, Python, Java\n- This sem's subjects\n\n\
    Now, let's call findall().\n\n```\n>>> match=re.findall(r'Java[\\w]*',f.read())\n\
    ```\n\nFinally, let's go over it again.\n\n```\n>>> for i in match:\n    print(i)\n\
    ```\n\n# Output\n\n```\nJavaScript\nJava\n```\n\n### findall() with Groups\n\n\
    We learned how parenthesis could be used to separate a pattern into groups. Take\
    \ a look at what occurs when we use Python Regex findall().\n\n```\n>>> match=re.findall(r'([\\\
    w]+)\\s([\\w]+)', 'Ayushi Sharma, Fluffy Sharma, Leo Sharma, Candy Sharma')\n\
    >>> for i in match:\n    print(i)\n```\n\n# Output\n\n```\n('Ayushi', 'Sharma')\n\
    ('Fluffy', 'Sharma')\n('Leo', 'Sharma')\n('Candy', 'Sharma')\n```\n\n## Python\
    \ Regex Options\n\nOptional arguments may be passed to the functions we described.\
    \ These are the possibilities:\n\n1. Python Regular Expression IGNORECASE\n\n\
    While matching, this Python Regex ignores case.\n\nConsider the following Python\
    \ Regex IGNORECASE:\n\n```\n>>> match=re.findall(r'hi', 'Hi, did you ship it,\
    \ Hillary?', re.IGNORECASE)\n>>> for i in match:\n    print(i)\n```\n\n# Output\n\
    \n```\nHi\nhi\nHi\n```\n\n2. Python MULTILINE\n\nWhen working with a multi-line\
    \ string, this allows ^ and $ to match the beginning and finish of each line rather\
    \ than the entire string.\n\n```\n>>> match=re.findall(r'^Hi', 'Hi, did you ship\
    \ it, Hillary?\\nNo, I didn\\'t, but Hi', re.MULTILINE)\n>>> for i in match:\n\
    \    print(i)\n```\n\n# Output\n\n```\nHi\nHi\n```\n\n3. Python DOTALL\n\n.* only\
    \ matches the first line; it does not scan the entire string. This is due to the\
    \ fact that . does not match a newline.\n\nWe use DOTALL to make this possible.\n\
    \n```\n>>> match=re.findall(r'.*','Hi, did you ship it, Hillary?\\nNo, I didn\\\
    't, but Hi',re.DOTALL)\n>>> for i in match:\n    print(i)\n```\n\n# Output\n\n\
    ```\nHi, did you ship it, Hillary?No, I didn't, but Hi\n```\n\n## Greedy vs Non-Greedy\n\
    \nThe metacharacters *, +, and ? are greedy. This means that they keep searching.\
    \ Let’s take an example.\n\n```\n>>> match=re.findall(r'(<.*>)','<em>Strong</em>\
    \ <i>Italic</i>')\n>>> for i in match:\n    print(i)\n```\n\n# Output\n\n```\n\
    <em>Strong</em> <i>Italic</i>\n```\n\nThis gave us the whole string because it\
    \ greedily keeps searching. What if we just want the opening and closing tags?\
    \ Look:\n\n```\n>>> match=re.findall(r'(<.*?>)','<em>Strong</em> <i>Italic</i>')\n\
    >>> for i in match:\n    print(i)\n```\n\n# Output\n\n```\n<em>\n</em>\n<i>\n\
    </i>\n```\n\nThe .* is greedy, and the ? makes it non-greedy.\nAlternatively,\
    \ we could also do this:\n\n```\n>>> match=re.findall(r'</?\\w+>','<em>Strong</em>\
    \ <i>Italic</i>')\n>>> for i in match:\n    print(i)\n```\n\n# Output\n\n```\n\
    <em>\n</em>\n<i>\n</i>\n```\n\nHere’s another example:\n\n```\n>>> match=re.findall('(a*?)b','aaabbc')\n\
    >>> for i in match:\n    print(i)\n```\n\n# Output\n\n```\na\na\na\n```\n\nThe\
    \ ? makes * non-greedy in this case. Also, if the b after the ? had been skipped,\
    \ the result would have been an empty string.\nAfter the ? there must be a character\
    \ to stop at. *? +? and ?? all work with this method.\nSimilarly, {m,n}? makes\
    \ it non-greedy and matches the fewest probable instances.\n\n## Substitution\n\
    \nThe sub() function can be used to replace a part of a string with another. pattern,\
    \ substring, and string are the three inputs to sub().\n\n```\n>>> re.sub('^a','an','a\
    \ apple')\n```\n\n# Output\n\n```\n'an apple'\n```\n\nHere, we used ^ so it won’t\
    \ change apple to apple. The grammar police approve.\n\n## Regex Applications\
    \ in Python\n\nSo, now that we have learned a lot about Python regular expressions,\
    \ where do we put them to use? They're useful in the following places:\n\n- Internet\
    \ search engines\n- Replace dialogues in word processors and text editors with\
    \ Find and Replace.\n- Tools for text processing, such as sed and AWK\n- Lexical\
    \ analysis\n\nThis was the Python Regex Tutorial in its entirety.\n\n## Regular\
    \ Expressions in Python Interview Questions\n\n1. In Python, what is a regular\
    \ expression? Use an example to demonstrate your point.\n2. What is the difference\
    \ between a regular expression and a regular expression in Python?\n3. What does\
    \ the question mark in a regular expression in Python mean?\n4. In Python, how\
    \ do you split a regular expression?\n5. What is the best way to see if a regular\
    \ expression is in Python?\n6. These were the fundamentals of regular expressions\
    \ in Python. To be honest, we think having such a tool in our arsenal is very\
    \ cool."
