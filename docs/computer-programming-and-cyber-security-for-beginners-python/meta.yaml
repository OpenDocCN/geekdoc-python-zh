    # # Chapter 13: MODULES VS PACKAGES IN PYTHON


    This book is a compilation of the most significant changes in Python modules and
    packages. Many programmers struggle to determine when and where a module or package
    should be utilized.


    A clear set of distinctions will be shown in this article, making it easier for
    the coder to work more efficiently with both modules and packages.


    What are Python Modules?


    A pythonic statement that comprises numerous functions is known as a module. Modules
    operate as a pre-defined library in the code that both the coder and the user
    can access.


    While the code is being executed, the python modules additionally save pre-defined
    functions from the library.


    **Example of Python Module:**


    ```

    import math


    from math import pow


    pow(2,8)


    print(pow)

    ```


    **Output:**


    ```

    <built-in function pow>

    >>>

    ```


    What are Python Packages?


    A package is a collection of tools that aid in the initialization of a program.
    For any source code, a python package serves as a user-variable interface. This
    makes a python package work for every functional code in the runtime at a specific
    moment.


    **Example of Python Package:**


    ```

    import math


    print("math package")

    ```


    **Output:**


    ```

    math package

    >>>

    ```


    Python Modules and Packages: What''s the Difference?


    1. Every user-oriented code is contained in a package, which contains the file
    init .py. However, this does not apply to any user-specific codes in runtime modules.


    2. A module is a file that contains Python code that runs in the background for
    user-specific programming. A package also alters user-interpreted code so that
    it can be readily executed during runtime.


    A python "module" is made up of a unit namespace and the variables extracted locally.
    There are also some parsed functions, such as:


    +   - Variables and constants

    - Property definitions by class

    - Any old or new value.

    - Typically, a module corresponds to a single file.

    - In the user interface library, a debugging tool.


    A few often used tools assist the coder in creating a new platform employing modules
    for efficient code execution. During runtime, this also installs and distributes
    packages throughout the library.


    The package''s well-structured and standard layout makes it simple to use user-specific
    utilities. It also makes runtime executions easier.'
