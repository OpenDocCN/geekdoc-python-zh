    \ 中构建迭代器需要大量工作。我们必须创建一个包含 `__iter__()` 和 `__next__()` 方法的类，跟踪内部状态，并在没有值可返回时引发\
    \ `StopIteration`。\n这既冗长又令人困惑。在这种情况下，生成器就派上用场了。\n使用 Python 生成器可以轻松创建迭代器。上述所有工作都通过\
    \ Python 生成器自动完成。\n简单来说，生成器是一个返回对象（迭代器）的函数，我们可以对其进行迭代（一次一个值）。\n\n### 在 Python\
