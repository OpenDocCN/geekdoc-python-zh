- md: "## Chapter 7: PYTHON SET AND BOOLEANS WITH SYNTAX\n\nWe've covered a variety\
    \ of Python data types so far. Strings, numbers, lists, tuples, and dictionaries\
    \ were among the objects we worked with.\n\nWe've also discovered that declaring\
    \ the type of data while defining it isn't necessary. Python set examples, and\
    \ Python Booleans will be discussed today.\n\nThen, in subsequent lectures, we'll\
    \ look at python functions.\n\n### What are Python Sets?\n\nWe'll start using\
    \ Python sets. In Python, a set is a collection of values. It is sequenced, but\
    \ indexing is not possible.\n\nAs we progress through the book with the Python\
    \ set, we will better understand this. Examples.\n\n### 1. Creating a Python Set\n\
    \nYou must type a sequence of elements separated by commas inside curly brackets\
    \ to declare a set. Assign it to a Python variable after that.\n\n```python\n\
    >>> a={1,3,2}\n```\n\nWe wrote it in the order 1, 3, 2, as you can see. We'll\
    \ access this set in point b and see what we receive.\n\nValues of many types\
    \ can be found in a set.\n\n```python\n>>> c={1,2.0,'three'}\n```\n\n#### a. Elements\
    \ that are duplicates\n\nThere can't be any duplicate elements in a set. Let's\
    \ try duplicating elements in another set and then accessing it from point b.\n\
    \n```python\n>>> b={3,2,1,2}\n```\n\n#### b. Flexibility\n\nA set can contain\
    \ mutable things like a list, set, or even a dictionary, but it cannot contain\
    \ mutable elements.\n\n```python\n>>> d={[1,2,3],4}\n```\n\nOutput\n\n```\nTraceback\
    \ (most recent call last):\n  File \"<pyshell#9>\", line 1, in <module>\n    d={[1,2,3],4}\n\
    TypeError: unhashable type: 'list'\n```\n\nThere isn't such thing as a nested\
    \ Python set, as we explained earlier.\n\n```python\n>>> d={{1,3,2},4}\n```\n\n\
    Output\n\n```\nTraceback (most recent call last):\n  File \"<pyshell#10>\", line\
    \ 1, in <module>\n    d={{1,3,2},4}\nTypeError: unhashable type: 'set'\n```\n\n\
    #### c. The Python set() function\n\nYou can create a set with the set() function.\n\
    \n```python\n>>> d=set()\n>>> type(d)\n```\n\nOutput\n\n```\n<class 'set'>\n```\n\
    \nThis produces a set object that is empty. It's important to remember that if\
    \ you define an empty set like this, you're declaring an empty dictionary, not\
    \ an empty set. Using the type() technique, we can verify this.\n\n```python\n\
    >>> d={}\n>>> type(d)\n```\n\nOutput\n\n```\n<class 'dict'>\n```\n\nHowever, the\
    \ set() function can also take a single argument. It should be a list-like iterable.\n\
    \n```python\n>>> d=set([1,3,2])\n```\n\n### 2. Using Python to Access a Set\n\n\
    Because Python sets do not support indexing, you can only access the complete\
    \ set at once. Let's see if we can go to the sets from point a.\n\n```python\n\
    >>> a\n```\n\nOutput\n\n```\n{1, 2, 3}\n```\n\nDid you see how the elements were\
    \ rearranged in ascending order? Now let's see if we can get into set c.\n\n```python\n\
    >>> c\n```\n\nOutput\n\n```\n{1, 2.0, 'three'}\n```\n\nFinally, let's access set\
    \ b.\n\n```python\n>>> b\n```\n\nOutput\n\n```\n{1, 2, 3}\n```\n\nAs you see,\
    \ we had two 2s when we declared the set, but now we only have one; therefore,\
    \ it reordered the set automatically.\n\nSets can't be sliced because they don't\
