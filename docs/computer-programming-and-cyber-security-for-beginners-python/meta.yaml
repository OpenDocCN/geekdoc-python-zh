    \ 关键字来定义我们的函数。这会生成一个可调用的 Python 对象，当被调用时，会执行其描述中提供的语句。\n\n匿名函数（也称为 lambda 函数）在函数式编程中很受欢迎。它们被称为匿名是因为它们没有名称，这与函数式编程的无状态性一致。Lambda\
    \ 函数与普通 Python 函数的不同之处在于，它们计算单个表达式并返回一个函数，而标准 Python 函数不需要这样做。因此，Lambda 函数不能使用诸如条件语句甚至\
    \ `return` 关键字之类的语句。Lambda 函数看起来像这样：\n\n```python\n>>> (lambda n: n*n)(5)\n25\n\
    ```\n\n我们也可以使用 `def` 关键字来指定此操作并获得相同的结果：\n\n```python\n>>> def square(n):\n...\
