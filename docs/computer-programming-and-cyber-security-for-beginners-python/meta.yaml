  md: 'The page() function in the preceding example does not do any calculations.
    Instead, it simply generates and returns the function get(), which, when called,
    fetches the contents of a web page. As a result, the computation performed by
    getting () is postponed in the program when getting () is evaluated. Consider
    the following scenario:


    ```

    >>> url1 = page("http://www.google.com")

    >>> url2 = page("http://www.bing.com") >>> url1

    <function page.<locals>.get at 0x10a6054d0>

