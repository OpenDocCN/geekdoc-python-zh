    \ the list of the websites they want to block\nwhile True:\n    if dt(dt.now().year,\
    \ dt.now().month, dt.now().day, 9) < dt.now() < dt(dt.now().year, dt.now().month,\
    \ dt.now().day,22):\n        print(\"Working hours\")\n        with open(hosts_path,\
    \ \"r+\") as file:\n            content = file.read()\n            for website\
    \ in web_sites_list:\n                if website in content:\n               \
    \     pass\n                else:\n                    file.write(redirect+\"\
    \ \"+website+\"\\n\")\n    else:\n        print(\"Fun time\")\n        with open(hosts_path,\
    \ \"r+\") as file:\n            content = file.readlines()\n            file.seek(0)\
    \   # reset the pointer to the top of the text file\n            for line in content:\n\
    \                # here comes the tricky line, basically we overwrite the whole\
    \ file\n                if not any(website in line for website in web_sites_list):\n\
    \                    file.write(line)\n                # do nothing otherwise\n\
    \            file.truncate()   # this line is used to delete the trailing lines\
    \ (that contain DNS)\n    time.sleep(5)\n```\n\n## 5. 二分查找算法\n\n仅从名称就足以了解该项目的概况。该程序要求你创建一个从0到你想要的任意范围的数字列表，其中每个后续数字相差2。\n\
    \n当一个人输入一个要搜索的随机数字时，程序会将列表分成两半开始搜索。如果在第一半中找到了所需的数字，则拒绝搜索另一半，反之亦然。搜索会持续进行，直到子数组的大小达到零或找到该数字。这个Python项目想法也可以帮助你编写在列表中搜索特定元素的软件。\n\
    \n代码示例：\n\n```python\n\"\"\" Binary Search Algorithm\n-----------------------------------\n\
    \"\"\"\n# iterative implementation of binary search in Python\ndef binary_search(a_list,\
    \ item):\n    \"\"\"Performs iterative binary search to find the position of an\
    \ integer in a given, sorted,\n    list.\n    a_list -- sorted list of integers\n\
    \    item -- integer you are searching for the position of\n    \"\"\"\n    first\
    \ = 0\n    last = len(a_list) - 1\n    while first <= last:\n        i = (first\
    \ + last) / 2\n        if a_list[i] == item:\n            return ' found at position\
    \ '.format(item=item, i=i)\n        elif a_list[i] > item:\n            last =\
    \ i - 1\n        elif a_list[i] < item:\n            first = i + 1\n        else:\n\
    \            return ' not found in the list'.format(item=item)\n\n# recursive\
    \ implementation of binary search in Python\ndef binary_search_recursive(a_list,\
    \ item):\n    \"\"\"Performs recursive binary search of an integer in a given,\
    \ sorted, list.\n    a_list -- sorted list of integers\n    item -- integer you\
    \ are searching for the position of\n    \"\"\"\n    first = 0\n    last = len(a_list)\
    \ - 1\n    if len(a_list) == 0:\n        return ' was not found in the list'.format(item=item)\n\
    \    else:\n        i = (first + last) // 2\n        if item == a_list[i]:\n \
    \           return ' found'.format(item=item)\n        else:\n            if a_list[i]\
    \ < item:\n                return binary_search_recursive(a_list[i+1:], item)\n\
    \            else:\n                return binary_search_recursive(a_list[:i],\
    \ item)\n```\n\n# 第5章：Python中的函数\n\n在编程中，函数用于将一组你想要重复使用或更好地封装在子程序中的指令分组，并根据需要调用，因为它们很复杂。也就是说，函数是一段为执行特定任务而编写的代码。该函数可能需要也可能不需要多个输入来完成该任务。该函数在任务完成时可能返回也可能不返回一个或多个值。\n\
    \n在Python中，函数分为三类：\n\n- 内置函数，例如用于请求帮助的`help()`、返回最小值的`min()`、将对象打印到终端的`print()`等等...\
    \ 包含更多此类函数的概述可以在这里找到。\n- 用户定义函数（UDFs），是用户创建的用于辅助他们的函数；\n- 匿名函数，通常称为lambda函数，不使用传统的`def`关键字声明。\n\
    \n### 方法与函数\n\n属于类的函数称为方法。它通过类实例或对象来访问。此限制不适用于函数：它只涉及单个函数。这意味着虽然所有方法都是函数，但并非所有函数都是方法。\n\
    \n考虑这个例子，你首先定义一个函数`plus()`，然后定义一个带有`sum()`方法的`Summation`类：\n\n```python\n# Define\
    \ a function 'plus()'\ndef plus(a,b):\n    return a + b\n\n# Create a 'Summation'\
    \ class\nclass Summation(object):\n    def sum(self, a, b):\n        self.contents\
    \ = a + b\n        return self.contents\n```\n\n在调用`sum()`函数之前，你必须先定义`Summation`类的一个实例或对象。那么，让我们为这样一个对象创建一个定义：\n\
    \n```python\n# Instantiate 'Summation' class to call 'sum()'\nsumInstance = Summation()\n\
    sumInstance.sum(1,2)\n```\n\n请记住，在调用函数`plus()`时不需要这个实例化！你应该能够在DataCamp Light代码块中毫无问题地执行`plus(1,2)`！\n\
    \n### 参数与形参\n\n参数是在定义函数和方法时给出的名称，实参被映射到这些名称上。换句话说，实参是传递给函数或方法调用的东西，而函数或方法代码将实参称为形参名称。\n\
    \n考虑以下场景，然后返回到DataCamp Light代码块：即使你创建了三个形参`self`、`a`和`b`，你向`Summation`类的`sum()`方法传递了两个实参。\n\
    \n那么，你发生了什么？\n\n每个类方法的第一个实参引用类的当前实例，即`Summation`。这个参数通常被称为“self”。\n\n因为`self`是一个隐式给定的实参的形参名称，该实参通过调用方法的实例来引用，所以你不需要在这种情况下传递对`self`的引用。它被隐式地放入实参列表中。"
