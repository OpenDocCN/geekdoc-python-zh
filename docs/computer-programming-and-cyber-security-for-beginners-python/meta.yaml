    它对两个值执行逐位异或（XOR）操作。在这种情况下，将 10(2) 和 11(3) 进行异或运算得到 01 (1)。\n\n```python\n>>> 2^3\n\
    Output\n1\n```\n\n### d. Python 中的按位取反(~)\n\n它返回一个数字的二进制按位取反。位被翻转。2 的二进制代码是 00000010。按位取反是\
