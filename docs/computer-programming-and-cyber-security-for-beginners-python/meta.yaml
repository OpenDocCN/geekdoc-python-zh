    The Calendar Module in Python has a number of functions.


    TextCalendar and HTMLCalendar are the two subclasses of the Python Calendar Class
    that we''ve examined so far. Let''s take a look at all of the functions that the
    Python Calendar Module has to offer.


    1. calendar.setfirstweekday(weekday) – Select the first day of the week.


    This allows us to choose the day of the week we want to start the week on. Monday
    is 0, while Sunday is 6.


    ```

    >>> t.setfirstweekday(cd.SUNDAY)

    >>> print(t.formatyear(2018,5))

    ```


    2. calendar.first weekday - Week''s first day


    The first day of the week is so determined.


    ```

    >>> t.firstweekday

    ```


    Output


    6


    3. calendar.isleap(year) — Determines whether or not a year is leap year.


    This determines whether or not a year is leap year.


    ```

    >>> cd.isleap(2018)

    ```


    Output


    False


    4. numberofleapyears(y1,y2) – The number of leap years in the range.


    This tells us the number of leap years from year y1 to year y2. >>> cd.leapdays(1995,2018)


    Output


    6


    5. calendar.weekday(year,month,day) – Day of week


    ```

    >>> cd.weekday(2018,12,31)

    ```


    Output


    0


    6. calendar.weekheader(n) – Abbreviated weekday names


    We now have a header with shorter weekday names. One weekday''s width in characters
    is w.


    ```

    >>> cd.weekheader(1)

    ```


    **Output**


    ‘S M T W T F S’


    ```

    >>> cd.weekheader(2)

    ```


    **Output**


    ‘Su Mo Tu We Th Fr Sa’


    ```

    >>> cd.weekheader(3)

    ```


    **Output**


    ‘Sun Mon Tue Wed Thu Fri Sat’'
