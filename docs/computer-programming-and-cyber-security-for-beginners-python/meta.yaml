    Declaring a list is rather simple—commas separate items, which are enclosed in
    brackets [ ].


    ```

    a = [1, 2.2, ''python'']

    ```


    To extract a range of items from a list, we can use the slicing operator [ ].
    In Python, the index starts at 0.


    ```

    a = [5,10,15,20,25,30,35,40]


    # a[2] = 15

    print("a[2] = ", a[2])


    # a[0:3] = [5, 10, 15]

