    \ the fundamentals of regular expressions in Python in this Python Regex lesson.\
    \ We'll utilize the re module for this. Before we begin, let's import it.\n\n\
    ```python\n>>> import re\n```\n\n### Metacharacters in Python Regex\n\nIn a Python\
    \ Regex, each character is either a metacharacter or a regular character. A metacharacter\
    \ has a unique meaning, whereas a standard character is a mirror image of itself.\n\
    \nThe following metacharacters are available in Python:\n\n| Metacharacter | Description\
    \ |\n| :--- | :--- |\n| ^ | Matches the start of the string |\n| . | Matches a\
    \ single character, except a newline. But when used inside square brackets, a\
    \ dot is matched. |\n| [] | A bracket expression matches a single character from\
    \ the ones inside it. [abc] matches ‘a’, ‘b’, and ‘c’. [a-z] matches characters\
    \ from ‘a’ to ‘z’. [a-cx-z] matches ‘a’, ‘b’, ‘c’, ‘x’, ‘y’, and ‘z’. |\n| [^\
    \ ] | Matches a single character from those except the ones mentioned in the brackets.\
    \ [^abc] matches all characters except ‘a’, ‘b’ and ‘c’. |\n| () | Parentheses\
    \ define a marked subexpression, also called a block, or a capturing group. |\n\
    | \\t, \\n, \\r, \\f | Tab, newline, return, form feed. |\n| * | Matches the preceding\
    \ character zero or more times. ab*c matches ‘ac’, ‘abc’, ‘abbc’, and so on. [ab]*\
    \ matches ‘’, ‘a’, ‘b’, ‘ab’, ‘ba’, ‘aba’, and so on. (ab)* matches ‘’, ‘ab’,\
    \ ‘abab’, ‘ababab’, and so on. |\n| {m,n} | Matches the preceding character minimum\
    \ m times, and maximum n times. a{2,4} matches ‘aa’, ‘aaa’, and ‘aaaa’. |\n| {m}\
    \ | Matches the preceding character exactly m times. |\n| ? | Matches the preceding\
    \ character zero or one times. ab?c matches 'ac' or 'abc'. |\n| + | Matches the\
    \ preceding character one or more times. ab+c matches 'abc', 'abbc', 'abbbc',\
    \ and so on, but not 'ac'. |\n| \\| | The choice operator matches either the expression\
    \ before it, or the one after. abc\\|def matches 'abc' or 'def'. |\n| \\w | Matches\
    \ a word character (a-zA-Z0-9). \\W matches single non-word characters. |\n| \\\
    b | Matches the boundary between word and non-word characters. |\n| \\s | Matches\
    \ a single whitespace character. \\S matches a single non-whitespace character.\
    \ |\n| \\d | Matches a single decimal digit character (0-9). |\n| \\ | A single\
    \ backslash inhibits a character's specialness. Examples: \\. \\* When unsure\
    \ if a character has a special meaning, put a \\ before it: \\@ |\n| $ | A dollar\
    \ matches the end of the string. |\n\nBackslashes are not handled in any special\
    \ way by a raw string literal. To do so, add an 'r' to the beginning of the pattern.\
    \ You might have to use '\\' for a single backslash character if you don't have\
    \ this. However, you simply need r\"\" for this.\n\n### A Match's Rules\n\nSo,\
    \ how does this function in practice? The following guidelines must be followed:\n\
    \n- 1. The search traverses the string from beginning to end.\n- 2. The entire\
    \ pattern, but not the entire string, must match.\n- 3. The search comes to an\
    \ end with the first match.\n\nThe group() technique returns the matching phrase\
    \ if a match is discovered. If this is not the case, it returns None.\n\n```python\n\
    >>> print(re.search('na', 'no'))\n```\n\n**Output:**\n```\nNone\n```\n\nLet's\
    \ have a look at a couple of key functions right now.\n\n### Regular Expression\
    \ Functions in Python\n\nA few routines are available to aid in the use of Python\
