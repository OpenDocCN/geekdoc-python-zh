    \ statement in its body to concentrate on the syntax.\n\n```python\n>>> class\
    \ fruit:\n    \"\"\"\n    This Python3 class creates instances of fruits\n   \
    \ \"\"\"\n    pass\n```\n\nOutput:\nPass\n\nA Python class object is created as\
    \ soon as we specify a class. However, as we stated in our Python Variables tutorial,\
    \ you can only name a class according to the identifier naming rules.\n\n```python\n\
    >>> fruit\n```\n\nOutput:\n<class ‘__main__.fruit’> #The class object\n\nA Python3\
    \ class may have attributes and techniques to execute on that data. We declare/define\
    \ these the usual way. Let’s take an example.\n\n```python\n>>> class fruit:\n\
    \    \"\"\"\n    This class creates instances of fruits\n    \"\"\"\n    color=\"\
    \"\n    def sayhi(self):\n        print(\"Hi\")\n>>> orange=fruit()\n```\n\nColor\
    \ is a property, and sayhi() is a way of calling on a fruit object. A standard\
    \ first-class function can be defined inside a technique but not outside of it\
    \ in a Python class.\n\n```python\n>>> class try1:\n    def mymethod(self):\n\
    \        def sayhello():\n            print(\"Hello\")\n        print(\"Hi\")\n\
    \        sayhello()\n\n>>> obj1=try1()\n>>> obj1.mymethod()\n```\n\nOutput:\n\
    Hi\nHello\n\nYou can also create an attribute on the fly.\n\n```python\n>>> orange.shape='Round'\n\
    >>> orange.shape\n```\n\nOutput:\n'Round'\n\n#### 2. Getting a List of Python\
    \ Class Members\n\nThe dot operator is used to access the members of a Python\
    \ class. For our fruit class, let's make an orange object.\n\n```python\n>>> orange=fruit()\n\
    ```\n\nLet's look at the color attribute for orange now.\n\n```python\n>>> orange.color\n\
    ```\n\nOutput:\n\"\"\n\nBecause we specified an empty string in the class definition,\
    \ this produces an empty string.\n\n```python\n>>> orange.sayhi()\n```\n\nOutput:\n\
    Hi\n\nHere, we called the technique sayhi() on orange. A technique may take arguments,\
    \ if defined that way.\n\n```python\n>>> class fruit:\n    def size(self,x):\n\
    \        print(f\"I am size {x}\")\n>>> orange=fruit()\n>>> orange.size(7)\n```\n\
    \nOutput:\nI am size 7\n\nA Python class may also have special attributes, like\
    \ __doc__ for the docstring.\n\n```python\n>>> fruit.__doc__\n```\n\nOutput:\n\
    '\\n\\tThis class creates instances of fruits\\n\\t'\n\nPython Techniques is a\
    \ good place to start if you want to learn more about Python techniques. But for\
    \ now, we'll use the self parameter, and the __init__() magic trick as an example.\n\
    \n```python\n>>> class fruit:\n    def size(self,x):\n        print(f\"I am size\
    \ {x}\")\n\n>>> orange=fruit()\n>>> orange.size(7)\n```\n\nOutput:\nI am Orange\
    \ and a size 7\n\nAs you can see, the __init__() technique in C++ or Java is identical\
    \ to a constructor. It is invoked every time a class object is created. The self\
    \ parameter, on the other hand, instructs the interpreter to deal with the current\
    \ object. This is similar to the Java keyword \"this.\" But it doesn't have to\
    \ be called \"self\"; it can be called anything. The object is supplied as the\
    \ first parameter, which corresponds to the word 'self.'\n\nfruit.salutation()\
    \ is the equivalent of orange.salutation() in this case (orange). Also, the salutation\
    \ is a technique object, for instance, 'orange,' not a function object for the\
    \ Python class.\n\n```python\n>>> fruit.salutation\n```\n\nOutput:\n<function\
    \ fruit.salutation at 0x0628FE40>\n\n```python\n>>> orange.salutation\n```\n\n\
    Output:\n<bound method fruit.salutation of <__main__.fruit object at 0x062835F0>>\n\
    \nYou can store a technique object into a variable for later use.\n\n```python\n\
    >>> sayhi=orange.salutation\n>>> sayhi()\n```\n\nOutput:\nI am Orange and a size\
    \ 7\n\n### What exactly is a Python Object?\n\nWhat good is a Python3 class if\
    \ it doesn't have an object? If a class is a notion, an object is the realization\
    \ of that idea. The __init__() technique of an object is called when it is created.\
    \ As we previously mentioned, the object is supplied to the class via the function\
    \ using the 'self' keyword.\n\n```python\n>>> orange=fruit('Orange',7)\n```\n\n\
    For the color and size properties, we used the values 'Orange' and 7. On the fly,\
    \ we may also declare attributes for an object. Take a look at how.\n\n```python\n\
    >>> orange.shape='Round'\n>>> orange.shape\n```\n\nOutput:\n'Round'\n\nIn Python,\
    \ you can assign the values of one object to another.\n\n```python\n>>> apple=orange\n\
    >>> apple.color\n```\n\nOutput:\n'Orange'\n\n### Attributes Belonging to Python\
    \ Class\n\nWe'll redefine the Python class fruit to demonstrate this.\n\n```python\n\
    >>> class fruit:\n    size='Small'\n    def __init__(self,color,shape):\n    \
    \    self.color=color\n        self.shape=shape\n    def salutation(self):\n \
    \       print(f\"I am {self.color} and a shape {self.shape}\")\n```\n\nOutput:\n\
    'Small'\n\n```python\n>>> orange=fruit('Orange','Round')\n>>> orange.size\n```\n\
    \nOutput:\n'Small'\n\nWe had to declare the object anew because we redefined the\
    \ class. A function can also be included in a Python class.\n\n```python\n>>>\
    \ class fruit:\n    size='Small'\n    def __init__(self,color,shape):\n      \
    \  self.color=color\n        self.shape=shape\n    def salutation():\n       \
    \ print(f\"I am happy\")\n>>> fruit.salutation()\n```\n\nOutput:\nI am happy\n\
    \n```python\n>>> fruit.salutation\n```\n\nOutput:\n<function fruit.salutation\
    \ at 0x030C8390>\n\n### How to Delete Python Attribute, Class, and Object?\n\n\
    The del keyword is used to delete an attribute, an object, or a class.\n\n```python\n\
    >>> del orange.shape\n>>> orange.shape\n```\n\nOutput:\nTraceback (most recent\
    \ call last):\n  File \"<pyshell#118>\", line 1, in <module>\n    orange.shape\n\
    AttributeError: 'fruit' object has no attribute 'shape.'\n\nLet's try deleting\
    \ an object.\n\n```python\n>>> del orange\n>>> orange\n```\n\nOutput:\nTraceback\
    \ (most recent call last):\n  File \"<pyshell#120>\", line 1, in <module>\n  \
    \  orange\nNameError: name 'orange' is not defined\n\n```python\n>>> fruit\n<class\
    \ '__main__.fruit'>\n>>> del fruit\n>>> fruit\n```\n\nOutput:\nTraceback (most\
    \ recent call last):\n  File \"<pyshell#133>\", line 1, in <module>\n    fruit\n\
    NameError: name 'fruit' is not defined\n\n### Class Python Interview Questions\n\
    \n- 1. What is a Python class? Use an example to demonstrate.\n- 2. In Python,\
    \ how do you call a class?\n- 3. Is it true that Python classes are slow?\n- 4.\
    \ When should you utilize Python classes?\n- 5. In Python, how do you define a\
    \ class?\n\n## Chapter 16: A DIVE INTO PYTHON CLOSURES AND DECORATORS\n\nClosures\
    \ are a class of Python constructs that are quite elegant. We'll learn about them,\
    \ how to define a closure, and why and when to utilize closures in this post.\
    \ However, before we can understand a closure, we must first comprehend what a\
    \ nested function is and how scoping constraints apply to it. So, let's get this\
    \ party started.\n\n### Python Scoping Rules and Nested Functions\n\nWhen a function\
    \ is run, a new local namespace reflects the local environment and contains the\
    \ names of function parameters and variables assigned within the function body.\
    \ A namespace can be compared to a dictionary, with the keys being the object\
    \ names and the values being the objects themselves.\n\nThe interpreter searches\
    \ the local namespace first when resolving names. If no match is found, the global\
    \ namespace, the module where the function is defined, is searched. If no match\
    \ is discovered, the built-in namespace is checked before the NameError exception\
    \ is raised. This is depicted in the diagram below:\n\n![Namespace search order\
    \ by Python Interpreter](img/a1c5e4a1633d0fcc232ce0059c778469_139_0.png)\n\nLet’s\
    \ consider the below example:\n\n```python\nage = 27\ndef birthday():\n    age\
    \ = 28\nbirthday()\nprint(age) # age will still be 27\n>>\n27\n```\n\nVariables\
    \ given inside a function have always been bound to the function's local namespace;\
    \ as a result, the variable age in the technique body refers to a new object with\
    \ the value 28, not the outside variable. The global statement can be used to\
    \ change this behavior. As shown in the example below:\n\n```python\nage = 27\n\
    name = \"Sarah\"\ndef birthday():\n    global age    # 'age' is in the global\
    \ namespace\n    age = 28\n```"
  mdcn: "## 第15章：Python类教程 – Python对象与类的属性\n\n在本Python类课程中，我们将学习Python类、它们的工作原理以及如何访问它们。另一方面，我们将探讨Python对象以及不同的Python类属性。在本课中，我们将了解如何在Python中删除对象、其属性或类。\n\
    \n正如我们已经指出的，Python是一种面向对象的语言。这意味着它更关注对象而非过程。一个对象可以用来模拟现实世界。让我们开始Python类和对象教程。\n\
    \n### 什么是Python类？\n\n类是对象的蓝图；一个类可以包含任意数量的相同类型的对象。它也被称为抽象数据类型。有趣的是，它本身没有任何值，但它充当对象的原型。让我们更深入地了解Python类。\n\
    \n### Python类语法\n\n#### 1. 在Python中定义Python类\n\n在Python编程中，使用`class`关键字来定义类。在Python中，我们使用`def`关键字来定义函数。与函数类似，Python3类也可以有一个文档字符串。这可以用来编写几行描述类功能的文字。目前，我们将在其主体中使用`pass`语句，以专注于语法。\n\
    \n```python\n>>> class fruit:\n    \"\"\"\n    This Python3 class creates instances\
    \ of fruits\n    \"\"\"\n    pass\n```\n\n输出：\nPass\n\n一旦我们指定了一个类，就会创建一个Python类对象。然而，正如我们在Python变量教程中所述，你只能根据标识符命名规则来命名一个类。\n\
    \n```python\n>>> fruit\n```\n\n输出：\n<class ‘__main__.fruit’> #The class object\n\
    \n一个Python3类可以有属性和在该数据上执行的方法。我们以通常的方式声明/定义这些。让我们看一个例子。\n\n```python\n>>> class\
    \ fruit:\n    \"\"\"\n    This class creates instances of fruits\n    \"\"\"\n\
    \    color=\"\"\n    def sayhi(self):\n        print(\"Hi\")\n>>> orange=fruit()\n\
    ```\n\n`color`是一个属性，`sayhi()`是一种在fruit对象上调用的方法。在Python类中，标准的一级函数可以在方法内部定义，但不能在方法外部定义。\n\
    \n```python\n>>> class try1:\n    def mymethod(self):\n        def sayhello():\n\
    \            print(\"Hello\")\n        print(\"Hi\")\n        sayhello()\n\n>>>\
    \ obj1=try1()\n>>> obj1.mymethod()\n```\n\n输出：\nHi\nHello\n\n你也可以动态创建一个属性。\n\n\
    ```python\n>>> orange.shape='Round'\n>>> orange.shape\n```\n\n输出：\n'Round'\n\n\
    #### 2. 获取Python类成员列表\n\n使用点运算符来访问Python类的成员。让我们为我们的fruit类创建一个orange对象。\n\n```python\n\
    >>> orange=fruit()\n```\n\n现在让我们看看orange的color属性。\n\n```python\n>>> orange.color\n\
    ```\n\n输出：\n\"\"\n\n因为我们在类定义中指定了一个空字符串，所以这会产生一个空字符串。\n\n```python\n>>> orange.sayhi()\n\
    ```\n\n输出：\nHi\n\n这里，我们在orange上调用了方法`sayhi()`。如果定义得当，一个方法可以接受参数。\n\n```python\n\
    >>> class fruit:\n    def size(self,x):\n        print(f\"I am size {x}\")\n>>>\
    \ orange=fruit()\n>>> orange.size(7)\n```\n\n输出：\nI am size 7\n\n一个Python类也可以有特殊属性，比如用于文档字符串的`__doc__`。\n\
    \n```python\n>>> fruit.__doc__\n```\n\n输出：\n'\\n\\tThis class creates instances\
    \ of fruits\\n\\t'\n\n如果你想了解更多关于Python方法的知识，Python方法是一个很好的起点。但现在，我们将使用`self`参数和`__init__()`魔术方法作为例子。\n\
    \n```python\n>>> class fruit:\n    def size(self,x):\n        print(f\"I am size\
    \ {x}\")\n\n>>> orange=fruit()\n>>> orange.size(7)\n```\n\n输出：\nI am Orange and\
    \ a size 7\n\n如你所见，`__init__()`方法在C++或Java中与构造函数相同。每次创建类对象时都会调用它。另一方面，`self`参数指示解释器处理当前对象。这类似于Java关键字`this`。但它不必被称为`self`；它可以是任何名称。对象作为第一个参数提供，对应于单词`self`。\n\
