    \ follows:\n\n```\ndef countdown(start):\n    # This is the outer enclosing function\
    \  def display():\n        # This is the nested function\n        n = start\n\
    \        while n > 0:\n            n-=1\n            print('T-minus %d' % n) \
    \ return display# Now let's try calling this function.\ncounter1 = countdown(2)\n\
    counter1()\n>>>\nT-minus 2\nT-minus 1\n```\n\nWith the value two as a parameter,\
    \ the countdown() function was called, and the resultant function was given the\
    \ name counter1. When counter1() is called, the value of start passed to countdown\
    \ is used (). As a result, even though we had previously completed the countdown()\
    \ function, the value was still remembered when calling counter1().\n\nThe closure\
    \ is the Python term for attaching some data (2 in this case) to the code.\n\n\
    Even if the variable goes out of scope or the function is removed from the current\
    \ namespace, the value in the surrounding scope is remembered. To be sure, let's\
    \ run the following code:\n\n```\n>>> del countdown>>> counter1()\nT-minus 2\n\
