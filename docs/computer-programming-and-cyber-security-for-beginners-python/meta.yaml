    第一步：明确你为何想学习 Python。


    在开始在线学习之前，先评估一下你最初为何想学习 Python。这是因为这将是一段漫长且有时可能不愉快的旅程。如果你没有足够的动力，你将无法坚持下去。找出激励你的因素可以帮助你设定一个长期目标以及一条通往目标的路径，而不会感到厌倦。你不需要开发一个特定的项目来学习
    Python，只需要一个大致的兴趣领域。


    选择一个你感兴趣的领域，例如：


    - 数据科学 / 机器学习

    - 移动应用

    - 网站

    - 游戏

    - 数据处理与分析

    - 硬件 / 传感器 / 机器人

    - 自动化工作的脚本


    第二步：掌握基本语法理解


    另一方面，这个阶段无法绕过。在深入你选择的领域之前，你必须首先掌握 Python 语法的基础。因为它不是特别鼓舞人心，你应该在上面花费尽可能少的时间。


    我再怎么强调在基本语法上花费尽可能少的时间也不为过。如果你尽快开始实践，你会学得更快。如果以后遇到困难，你总可以回过头来查阅语法。你应该只在这个阶段花几周时间，最多不超过一个月。


    另外，简要提醒一下：要学习的是 Python 3，而不是 Python 2。不幸的是，许多在线“学习 Python”网站仍然教授 Python 2，而 Python
    3 才是正途。Python 2 中的错误和安全漏洞将不会被修复，因为它已不再受支持！


    第三步：创建组织良好的项目


    一旦掌握了基本语法，你就可以开始独立开发项目了。项目是学习的绝佳方式，因为它们允许你将所学付诸实践。在应用之前，你很难记住所学的信息。项目将帮助你发挥优势、获得新技能，并建立一个作品集来展示给潜在雇主。


    然而，在这个阶段，自由形式的项目会很痛苦，因为你会经常遇到困难，需要查阅文档。因此，在你足够自信能够完全独立构建项目之前，最好从更有结构的任务开始。许多学习资源提供结构化项目，让你在感兴趣的领域创建有趣的东西，同时防止你陷入困境。


