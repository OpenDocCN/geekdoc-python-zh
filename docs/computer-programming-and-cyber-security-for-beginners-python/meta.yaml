- md: "## Output\n\nI love ferrets\n\n## 3. % operator\n\nIn a string, the percent\
    \ operator goes where the variables go. The letter s stands for a string in percents.\n\
    The string is followed by the variables and operator in parentheses/in a tuple.\n\
    \n```\n1. >>> b='ferrets'\n2. >>> print(\"I love %s and %s\" %(a,b))\n```\n\n\
    ## Output\n\nI love dogs and cats\n\nOther options include:\n- %f – for floating-point\
    \ numbers\n- %d – for integers\n\n## Escape Sequences in Python\n\nYou could want\
    \ to include a tab, a linefeed, or other characters in a Python string. This is\
    \ possible because to escape sequences.\nDepending on what you wish to do, an\
    \ escape sequence is a carriage returns followed by a character.\nPython can handle\
    \ the following sequences.\n\n- \\n – linefeed\n- \\t – tab\n\n```\n>>> print(\"\
    hell\\to\")\n```\n\n## Output\n\nhell    o\n\n- \\ – backslash\n\nA backslash\
    \ can indeed be part of an escape sequence. Thus, it must also be escaped by a\
    \ backslash.\n\n- ' – A backslash can be used to escape a single quote. This allows\
    \ you to freely utilize single quotes in a string.\n- \" – The double quote, like\
    \ the single quote, can be escaped.\n\nDo you have any reservations about Python\
    \ Strings and Python String Operations and Functions?\n\n## String Functions in\
    \ Python\n\nA set of functions in Python can be used to alter or create strings.\n\
    \n### 1. len()\n\nThe length of a string is returned by the len() function.\n\n\
    ```\n1. >>> a='book'\n2. >>> len(a)\n```\n\n## Output\n\n```\n4\n```\n\nYou can\
    \ also use it to find how long a slice of the string is.\n\n```\n1. >>> len(a[2:])\n\
    ```\n\n## Output\n\n```\n2\n```\n\n### 2. str()\n\nAny data type can be converted\
    \ to a string with this function.\n\n```\n>>> str(2+3j)\nOutput\n'(2+3j)'\n>>>\
    \ str(['red','green','blue'])\nOutput\n\"['red', 'green', 'blue']\"\n```\n\n###\
    \ 3. lower() and upper()\n\nThese techniques return the string in lowercase and\
    \ uppercase, respectively.\n\n```\n1. >>> a='Book'\n2. >>> a.lower()\n```\n\n\
    ## Output\n\n```\n'book'\n```\n\n```\n1. >>> a.upper()\n```\n\n## Output\n\n```\n\
    'BOOK'\n```\n\n### 4. strip()\n\nWhitespaces at the start and end of the string\
    \ are removed.\n\n```\n1. >>> a=' Book '\n2. >>> a.strip()\n```\n\n## Output\n\
    \n```\n'Book'\n```\n\n### 5. isdigit()\n\nReturns If all elements in a string\
    \ are digits, this value is true.\n\n```\n1. >>> a='777'\n2. >>> a.isdigit()\n\
    ```\n\n## Output\n\n```\nTrue\n```\n\n```\n1. >>> a='77a'\n2. >>> a.isdigit()\n\
    ```\n\n```\nFalse\n```\n\n### 6. isalpha()\n\nReturns True if all elements in\
    \ a string represent alphabet characters.\n\n```\n>>> a='abc'\n>>> a.isalpha()\n\
    ```\n\n## Output\n\n```\nTrue\n```\n\n```\n1. >>> a='ab7'\n2. >>> a.isalpha()\n\
    ```\n\n## Output\n\nFalse\n\n### 7. isspace()\n\nReturns True if all elements\
    \ in a string are spaces.\n\n```\n1. >>> a=' '\n2. >>> a.isspace()\n```\n\n##\
    \ Output\n\n```\nTrue\n```\n\n```\n1. >>> a='\\''\n2. >>> a.isspace()\n```\n\n\
    ## Output\n\n```\nFalse\n```\n\n### 8. startswith()\n\nIt takes a string as input\
    \ and returns True if the string to which it is applied begins with that string.\n\
    \n```\n>>> a.startswith('un')\n```\n\n## Output\n\n```\nTrue\n```\n\n### 9. endswith()\n\
    \nIt takes a string like an argument and returns True if indeed the string to\
    \ which it is applied is identical to the string in the argument.\n\n```\n>>>\
    \ a='therefore'\n>>> a.endswith('fore')\n```\n\n## Output\n\nTrue\n\n### 10. find()\n\
    \nIt accepts an argument and looks for it in the string it's applied to.\nThe\
    \ index of the substring is then returned.\n\n```\n>>> 'homeowner'.find('meow')\n\
    ```\n\n## Output\n\n```\n2\n```\n\nIf the string does not exist in the main string,\
    \ then the index it returns is -1.\n\n```\n>>> 'homeowner'.find('wow')\n```\n\n\
    ## Output\n\n-1\n\n### 11. replace()\n\nThere are two arguments required. The\
    \ first is the to-be-replaced substring. The second is the replacement substring.\n\
    \n```\n>>> 'banana'.replace('na','ha')\n```\n\n## Output\n\n```\n'bahaha'\n```\n\
    \n### 12. split()\n\nIt only takes one counterargument. After that, the string\
    \ is split around every instance of the argument.\n\n```\n>>> 'No. Okay. Why?'.split('.')\n\
    ```\n\n## Output\n\n```\n['No', ' Okay', ' Why?']\n```\n\n### 13. join()\n\nIt\
    \ takes a list as an argument and connects the list's components using the string\
    \ it's applied to.\n\n```\n>>> \"*\".join(['red','green','blue'])\n```\n\n## Output\n\
    \n```\n'red*green*blue'\n```\n\n## PYTHON STRING OPERATIONS\n\n### 1. Comparison\
    \ Operation in Python\n\nPython Strings can compare using relational operators.\n\
