    pair of keys and values in a Python dictionary is kept.


    Curly brackets are used to define dictionaries in Python. Commas separate the
    key-value pairs that make up the dictionary. A colon: connects each key-value
    pair.


    Let''s put two people''s ages in a dictionary. Gabby and Maelle are the two individuals.
    Gabby is eight years old, and Maelle is five. It''s worth noting that Gabby''s
    name is a string and her age is an integer.


    ```

    >>> age_dict = {"Gabby": 8 , "Maelle": 5}

    >>> type(age_dict)

    dict

    ```


    The values stored in a dictionary are called and assigned using the following
    syntax:


    ```

    dict_name[key] = value

    >>> age_dict = {"Gabby": 8 , "Maelle": 5}

    >>> age_dict["Gabby"]

    8

    ```


    We can add a new person to our age_dict with the following command:


    ```

    >>> age_dict = {"Gabby": 8 , "Maelle": 5}

    >>> age_dict["Peter"]= 40

    >>> age_dict

    {''Gabby'': 8, ''Maelle'': 5, ''Peter'': 40}

    ```


    Dictionaries can be converted to lists by calling the .items(), .keys(), and .values()
    techniques.


    ```

    >>> age_dict = {"Gabby": 8 , "Maelle": 5}

    >>> whole_list = list(age_dict.items())

    >>> whole_list

    [(''Gabby'', 8), (''Maelle'', 5)]

    >>> name_list = list(age_dict.keys())

    >>> name_list

    [''Gabby'', ''Maelle'']

    >>> age_list = list(age_dict.values())

    >>> age_list

    [8, 5]

    ```


    The. pop() technique can be used to remove items from dictionaries. The dictionary
    key supplied to the. pop() technique (together with its associated value) is removed
    from the dictionary.'
