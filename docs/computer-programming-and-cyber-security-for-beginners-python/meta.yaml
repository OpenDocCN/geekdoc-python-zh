    \n## Group Extraction\n\nLet's stick with the email example for now. What if all\
    \ you need is the username?\nYou can do this by passing an input (such as an index)\
    \ to the group() method.\nTake a look at the following:\n\n```\n>>> match=re.search(r'([\\\
    w.-]+)@([\\w-]+)\\.([\\w]+)','Please mail it to ayushiwasthere@gmail.com')\n>>>\
    \ match.group()\n```\n\n# Output\n\n```\n'ayushiwasthere@gmail.com'\n```\n\n```\n\
    >>> match.group(1)\n```\n\n# Output\n\n```\n'ayushiwasthere'\n```\n\n```\n>>>\
