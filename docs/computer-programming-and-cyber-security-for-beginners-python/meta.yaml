    What exactly is a Python String?

    A string in Python is a collection of characters. For handling Python strings,
    there is a built-in class called str.

    The type() technique can be used to demonstrate this.


    ```

    >>> type(''Dogs are love'')

    ```


    # Output


    ```

    <class ''str''>

    ```


    Python lacks the char data type, which is found in C++ and Java.

    What is the method to declare a Python string?

    Single quotes or double quotes can be used to declare a Python string.


    ```

    >>> a=''Dogs are love''

    >>> print(a)

    ```


