- md: "## 4. Website Blocker\n\nWe're all aware that a flood of unwanted websites\
    \ appears to divert our attention when we go online. This project is useful in\
    \ these scenarios since it can be configured to prohibit specific websites from\
    \ loading. The software can help people easily distracted and frequently visit\
    \ social media sites while working on something important.\n\nCode Example:\n\n\
    ```python\n\"\"\" Website Blocker\n---------------------------------\n\"\"\"\n\
    import time\nfrom datetime import datetime as dt\nhosts_path = r\"/etc/hosts\"\
    \   # r is for raw string\nhosts_temp = \"hosts\"\nredirect = \"127.0.0.1\"\n\
    web_sites_list = [\"www.facebook.com\", \"facebook.com\"]   # users can modify\
    \ the list of the websites they want to block\nwhile True:\n    if dt(dt.now().year,\
    \ dt.now().month, dt.now().day, 9) < dt.now() < dt(dt.now().year, dt.now().month,\
    \ dt.now().day,22):\n        print(\"Working hours\")\n        with open(hosts_path,\
    \ \"r+\") as file:\n            content = file.read()\n            for website\
    \ in web_sites_list:\n                if website in content:\n               \
    \     pass\n                else:\n                    file.write(redirect+\"\
    \ \"+website+\"\\n\")\n    else:\n        print(\"Fun time\")\n        with open(hosts_path,\
    \ \"r+\") as file:\n            content = file.readlines()\n            file.seek(0)\
    \   # reset the pointer to the top of the text file\n            for line in content:\n\
    \                # here comes the tricky line, basically we overwrite the whole\
    \ file\n                if not any(website in line for website in web_sites_list):\n\
    \                    file.write(line)\n                # do nothing otherwise\n\
    \            file.truncate()   # this line is used to delete the trailing lines\
    \ (that contain DNS)\n    time.sleep(5)\n```\n\n## 5. Binary Search Algorithm\n\
    \nThe name alone is sufficient to provide an overview of the project. The program\
    \ requires you to create a list of numbers ranging from 0 to whatever range you\
    \ want, with each subsequent number differing by two.\n\nWhen a person enters\
    \ a random figure to be searched, the program splits the list in half to start\
    \ searching. The other half is refused if the required number is discovered in\
    \ the first half, and vice versa. The hunt continues until the size of the subarray\
    \ reaches zero or the number is found. This Python project idea could also assist\
    \ you in writing software that searches a list for a certain element.\n\nCode\
    \ Example:\n\n```python\n\"\"\" Binary Search Algorithm\n-----------------------------------\n\
    \"\"\"\n# iterative implementation of binary search in Python\ndef binary_search(a_list,\
    \ item):\n    \"\"\"Performs iterative binary search to find the position of an\
    \ integer in a given, sorted,\n    list.\n    a_list -- sorted list of integers\n\
    \    item -- integer you are searching for the position of\n    \"\"\"\n    first\
    \ = 0\n    last = len(a_list) - 1\n    while first <= last:\n        i = (first\
    \ + last) / 2\n        if a_list[i] == item:\n            return ' found at position\
    \ '.format(item=item, i=i)\n        elif a_list[i] > item:\n            last =\
    \ i - 1\n        elif a_list[i] < item:\n            first = i + 1\n        else:\n\
    \            return ' not found in the list'.format(item=item)\n\n# recursive\
    \ implementation of binary search in Python\ndef binary_search_recursive(a_list,\
    \ item):\n    \"\"\"Performs recursive binary search of an integer in a given,\
    \ sorted, list.\n    a_list -- sorted list of integers\n    item -- integer you\
    \ are searching for the position of\n    \"\"\"\n    first = 0\n    last = len(a_list)\
    \ - 1\n    if len(a_list) == 0:\n        return ' was not found in the list'.format(item=item)\n\
    \    else:\n        i = (first + last) // 2\n        if item == a_list[i]:\n \
    \           return ' found'.format(item=item)\n        else:\n            if a_list[i]\
    \ < item:\n                return binary_search_recursive(a_list[i+1:], item)\n\
    \            else:\n                return binary_search_recursive(a_list[:i],\
    \ item)\n```\n\n# Chapter 5: FUNCTIONS IN PYTHON\n\nIn programming, functions\
    \ are used to group a collection of instructions that you want to utilize repeatedly\
    \ or better self-contained in a sub-program and called as needed due to their\
    \ complexity. That is, a function is a piece of code that is written to perform\
    \ a specific task. The function may or may not require several inputs to complete\
    \ that task. The function may or may not return one or more values when the task\
    \ is completed.\n\nIn Python, there are three categories of functions:\n\n- Built-in\
    \ functions such as help(), which asks for assistance, min(), which returns the\
    \ minimum value, print(), which prints an object to the terminal, and so on...\
    \ An overview containing more of these functions can be found here.\n- User-Defined\
    \ Functions (UDFs), which are functions created by users to assist them;\n- Anonymous\
    \ functions, often known as lambda functions, are not declared using the conventional\
    \ def keyword.\n\n### Techniques vs. Functions\n\nA function that is part of a\
    \ class is referred to as a technique. A class instance or object accesses it.\
    \ This restriction does not apply to a function: it just relates to a solo function.\
    \ This indicates that while all techniques are functions, not all functions are\
    \ techniques.\n\nConsider this example, where you first define a function `plus()`\
    \ and then a `Summation` class with a `sum()` technique:\n\n```python\n# Define\
    \ a function 'plus()'\ndef plus(a,b):\n    return a + b\n\n# Create a 'Summation'\
    \ class\nclass Summation(object):\n    def sum(self, a, b):\n        self.contents\
    \ = a + b\n        return self.contents\n```\n\nYou must first define an instance\
    \ or object of the Summation class before calling the sum() function. So, let's\
    \ make a definition for such an object:\n\n```python\n# Instantiate 'Summation'\
    \ class to call 'sum()'\nsumInstance = Summation()\nsumInstance.sum(1,2)\n```\n\
    \nRemember that this instantiation isn't required when calling the function plus()!\
    \ You should be able to execute plus(1,2) without any issues in the DataCamp Light\
    \ code block!\n\n### Arguments vs. Parameters\n\nParameters are the names given\
    \ to functions and techniques when they are defined and where arguments are mapped.\
    \ In other words, arguments are the things that are passed into a function or\
    \ technique call, whereas the function or technique code refers to the arguments\
    \ as parameter names.\n\nConsider the following scenario, then return to the DataCamp\
    \ Light chunk: Even though you created three parameters, self, a, and b, you pass\
    \ two arguments to the Summation class's sum() technique.\n\nSo, what happened\
    \ to you?\n\nEvery class technique's first argument references the class's current\
    \ instance, which is Summation. This argument is commonly referred to as \"self.\"\
    \n\nBecause the self is the parameter name for an implicitly given argument that\
    \ refers to the instance via which a technique is invoked, you don't pass the\
    \ reference to self in this situation. It is implicitly placed into the argument\
    \ list."
