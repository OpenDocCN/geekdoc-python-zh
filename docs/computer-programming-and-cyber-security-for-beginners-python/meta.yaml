    ## Chapter 10: FROZENSET\n\n### Python frozenset()\n\nThe frozenset() function\
    \ creates an immutable frozenset object from the specified iterable's elements.\n\
    \nA frozen set is a Python set object that is immutable. While parts of a set\
    \ can be changed at any moment, elements of a frozen set don't change after they've\
    \ been created.\n\nAs a result, frozen sets can be used as Dictionary keys or\
    \ as elements of other sets. However, it is not organized in the same way that\
    \ sets are (the elements can be set at any index).\n\nThe frozenset() function\
    \ has the following syntax:\n\n```python\nfrozenset([iterable])\n```\n\n### frozenset()\
    \ Parameters\n\nThere is only one parameter to the frozenset() function:\n\n-\
    \ iterable (Optional) - the iterable holds the elements that should be used to\
    \ initialize the frozenset.\n\nSet, dictionary, tuple, and other types of iterables\
    \ exist.\n\n### Return value from frozenset()\n\nThe frozenset() function creates\
    \ an immutable frozenset from the specified iterable's items.\n\nIt returns an\
    \ empty frozenset if no arguments are supplied.\n\n### Example 1: Working of Python\
    \ frozenset()\n\n```python\n# tuple of vowels\nvowels = ('a', 'e', 'i', 'o', 'u')\n\
    \nfSet = frozenset(vowels)\nprint('The frozen set is:', fSet)\nprint('The empty\
    \ frozen set is:', frozenset())\n\n# frozensets are immutable\nfSet.add('v')\n\
    ```\n\n**Output**\n\n```\nThe frozen set is: frozenset({'a', 'o', 'u', 'i', 'e'})\n\
    The empty frozen set is: frozenset()\nTraceback (most recent call last):\n  File\
    \ \"<string>\", line 8, in <module>\n    fSet.add('v')\nAttributeError: 'frozenset'\
    \ object has no attribute 'add'\n```\n\n### Example 2: Dictionary frozenset()\n\
    \nWhen you're using a dictionary as just an iterable for a frozen set, just the\
    \ dictionary's keys are used to generate the set.\n\n```python\n# random dictionary\n\
    person = {\"name\": \"John\", \"age\": 23, \"sex\": \"male\"}\n\nfSet = frozenset(person)\n\
    print('The frozen set is:', fSet)\n```\n\n**Output**\n\n```\nThe frozen set is:\
    \ frozenset({'name', 'sex', 'age'})\n```\n\n### Frozenset operations\n\nLike normal\
    \ sets, frozenset can perform several operations like copy, difference, symmetric_difference,\
    \ intersection, and union.\n\n```python\n# Frozensets\n# initialize A and B\n\
    A = frozenset([1, 2, 3, 4])\nB = frozenset([3, 4, 5, 6])\n\n# copying a frozenset\n\
    C = A.copy()  # Output: frozenset({1, 2, 3, 4})\nprint(C)\n\n# union\nprint(A.union(B))\
    \  # Output: frozenset({1, 2, 3, 4, 5, 6})\n\n# intersection\nprint(A.intersection(B))\
    \  # Output: frozenset({3, 4})\n\n# difference\nprint(A.difference(B))  # Output:\
    \ frozenset({1, 2})\n\n# symmetric_difference\nprint(A.symmetric_difference(B))\
    \  # Output: frozenset({1, 2, 5, 6})\n```\n\n**Output**\n\n```\nfrozenset({1,\
    \ 2, 3, 4})\nfrozenset({1, 2, 3, 4, 5, 6})\nfrozenset({3, 4})\nfrozenset({1, 2})\n\
    frozenset({1, 2, 5, 6})\n```\n\nSimilarly, other set techniques like issubset,\
    \ isdisjoint, and issuperset are also available.\n\n```python\n# Frozensets\n\
    # initialize A, B and C\nA = frozenset([1, 2, 3, 4])\nB = frozenset([3, 4, 5,\
    \ 6])\nC = frozenset([5, 6])\n\n# isdisjoint() method\nprint(A.isdisjoint(C))\
    \  # Output: True\n\n# issubset() method\nprint(C.issubset(B))  # Output: True\n\
    \n# issuperset() method\nprint(B.issuperset(C))  # Output: True\n```\n\n**Output**\n\
    \n```\nTrue\nTrue\nTrue\n```\n\n## CHAPTER 11: DICTIONARIES AND TUPLES\n\n###\
    \ Tuples and Dictionaries\n\nPython provides two more data structures that may\
    \ store numerous objects in addition to lists. Dictionaries and tuples are the\
    \ data structures in question. First, we'll talk about tuples.\n\n### Tuples\n\
    \nTuples are lists that can't be changed. A list's elements can be changed, but\
    \ a tuple's elements can only be accessed, not changed. The term tuple does not\
    \ imply that this data structure may only hold two values.\n\nIn Python, tuples\
    \ are created by enclosing components in parenthesis ( ) and separating them with\
    \ commas. The following statement creates a tuple using the integers 3, 4, and\
    \ 5.\n\n```python\n>>> t_var = (3,4,5)\n>>> t_var\n(3, 4, 5)\n```\n\nTake note\
    \ of how a list's elements can be changed:\n\n```python\n>>> l_var = [3,4,5] #\
    \ a list\n>>> l_var[0]= 8\n>>> l_var\n[8, 4, 5]\n```\n\nA tuple's elements cannot\
    \ be updated. An error is returned if you try to assign a new value to one of\
    \ the elements in a tuple.\n\n```python\n>>> t_var = (3,4,5) # a tuple\n>>> t_var[0]=\
    \ 8\n>>> t_var\n```\n\nThe 'tuple' object does not permit item assignment, which\
    \ is a TypeError.\n\nTo create a tuple with only one numerical value, the number\
    \ must be followed by a comma. If there is no comma, the variable is defined as\
    \ a number.\n\n```python\n>>> num = (5)\n>>> type(num)\nint\n```\n\nThe variable\
    \ is classified as a tuple when a comma is added after the number.\n\n```python\n\
    >>> t_var = (5,)\n>>> type(t_var)\ntuple\n```\n\n### DICTIONARIES\n\nKey: value\
    \ pairs are the building blocks of dictionaries. Lists and tuples are arranged\
    \ and retrieved in Python based on their position. Keys and values are used to\
    \ structure and retrieve dictionaries in Python. It doesn't matter where a pair\
    \ of keys and values in a Python dictionary is kept.\n\nCurly brackets are used\
    \ to define dictionaries in Python. Commas separate the key-value pairs that make\
    \ up the dictionary. A colon: connects each key-value pair.\n\nLet's put two people's\
    \ ages in a dictionary. Gabby and Maelle are the two individuals. Gabby is eight\
    \ years old, and Maelle is five. It's worth noting that Gabby's name is a string\
    \ and her age is an integer.\n\n```python\n>>> age_dict = {\"Gabby\": 8 , \"Maelle\"\
    : 5}\n>>> type(age_dict)\ndict\n```\n\nThe values stored in a dictionary are called\
    \ and assigned using the following syntax:\n\n```python\ndict_name[key] = value\n\
    >>> age_dict = {\"Gabby\": 8 , \"Maelle\": 5}\n>>> age_dict[\"Gabby\"]\n8\n```\n\
    \nWe can add a new person to our age_dict with the following command:\n\n```python\n\
    >>> age_dict = {\"Gabby\": 8 , \"Maelle\": 5}\n>>> age_dict[\"Peter\"]= 40\n>>>\
    \ age_dict\n{'Gabby': 8, 'Maelle': 5, 'Peter': 40}\n```\n\nDictionaries can be\
    \ converted to lists by calling the .items(), .keys(), and .values() techniques.\n\
    \n```python\n>>> age_dict = {\"Gabby\": 8 , \"Maelle\": 5}\n>>> whole_list = list(age_dict.items())\n\
    >>> whole_list\n[('Gabby', 8), ('Maelle', 5)]\n>>> name_list = list(age_dict.keys())\n\
    >>> name_list\n['Gabby', 'Maelle']\n>>> age_list = list(age_dict.values())\n>>>\
    \ age_list\n[8, 5]\n```\n\nThe .pop() technique can be used to remove items from\
    \ dictionaries. The dictionary key supplied to the .pop() technique (together\
    \ with its associated value) is removed from the dictionary."
