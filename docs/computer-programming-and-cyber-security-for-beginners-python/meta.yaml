    \ 匹配除换行符外的单个字符。但在方括号内使用时，匹配点本身。 |\n| [] | 方括号表达式匹配其内部字符中的一个。[abc] 匹配 ‘a’、‘b’ 和\
    \ ‘c’。[a-z] 匹配从 ‘a’ 到 ‘z’ 的字符。[a-cx-z] 匹配 ‘a’、‘b’、‘c’、‘x’、‘y’ 和 ‘z’。 |\n| [^ ]\
    \ | 匹配除方括号中提到的字符之外的单个字符。[^abc] 匹配除 ‘a’、‘b’ 和 ‘c’ 之外的所有字符。 |\n| () | 圆括号定义一个标记子表达式，也称为块或捕获组。\
    \ |\n| \\t, \\n, \\r, \\f | 制表符、换行符、回车符、换页符。 |\n| * | 匹配前面的字符零次或多次。ab*c 匹配 ‘ac’、‘abc’、‘abbc’\
    \ 等。[ab]* 匹配 ‘’、‘a’、‘b’、‘ab’、‘ba’、‘aba’ 等。(ab)* 匹配 ‘’、‘ab’、‘abab’、‘ababab’ 等。\
    \ |\n| {m,n} | 匹配前面的字符最少 m 次，最多 n 次。a{2,4} 匹配 ‘aa’、‘aaa’ 和 ‘aaaa’。 |\n| {m} |\
    \ 精确匹配前面的字符 m 次。 |\n| ? | 匹配前面的字符零次或一次。ab?c 匹配 'ac' 或 'abc'。 |\n| + | 匹配前面的字符一次或多次。ab+c\
    \ 匹配 'abc'、'abbc'、'abbbc' 等，但不匹配 'ac'。 |\n| \\| | 选择运算符匹配其前面的表达式或后面的表达式。abc\\\
    |def 匹配 'abc' 或 'def'。 |\n| \\w | 匹配单词字符（a-zA-Z0-9）。\\W 匹配单个非单词字符。 |\n| \\b |\
    \ 匹配单词字符和非单词字符之间的边界。 |\n| \\s | 匹配单个空白字符。\\S 匹配单个非空白字符。 |\n| \\d | 匹配单个十进制数字字符（0-9）。\
    \ |\n| \\ | 单个反斜杠抑制字符的特殊性。示例：\\. \\* 当不确定字符是否有特殊含义时，在其前面加一个 \\：\\@ |\n| $ | 美元符号匹配字符串的结尾。\
    \ |\n\n原始字符串字面量不会以任何特殊方式处理反斜杠。要这样做，请在模式开头添加一个 'r'。如果没有这个，你可能需要使用 '\\' 来表示单个反斜杠字符。但是，对于这个，你只需要\
    \ r\"\"。\n\n### 匹配的规则\n\n那么，这在实践中是如何运作的呢？必须遵循以下准则：\n\n- 1. 搜索从字符串的开头到结尾遍历。\n-\
    \ 2. 必须匹配整个模式，而不是整个字符串。\n- 3. 搜索在第一次匹配后结束。\n\n如果发现匹配，group() 方法返回匹配的短语。如果没有，则返回\
    \ None。\n\n```python\n>>> print(re.search('na', 'no'))\n```\n\n**输出：**\n```\n\
    None\n```\n\n现在让我们看几个关键函数。\n\n### Python 中的正则表达式函数\n\n有几个例程可用于帮助使用 Python 正则表达式。\n\
    \n- 1. match ()\n\n将一个模式和一个字符串发送给 match()。如果它们匹配，它返回字符串。否则，它将返回 None。\n\n让我们看一些\
    \ Python 中的正则表达式匹配示例。\n\n```python\n>>> print(re.match('center','centre'))\n```\n\
    \n**输出：**\n```\nNone\n```\n\n```python\n>>> print(re.match('...\\w\\we','centre'))\n\
