  md: '# Chapter 27: WHAT IS PYTHON CALENDAR


    The Python Calendar Module allows you to print calendars as well as to conduct
    calendar-related operations. Monday (day=0) and Sunday (day=6) are the start and
    finish dates for these calendars.


    This Python calendar tutorial will use the Gregorian calendar as the basic calendar,
    which can be adjusted indefinitely in both directions.


    The ISO 8601 standard specifies how zero and negative years should be interpreted.
    Year 0 is referred to as ‘1 BC,’ year 1 is referred to as ‘2 BC,’ and so on.


    This module contains the Calendar class, which provides many dates and time manipulation
    capabilities. Aside from that, the TextCalendar and HTMLCalendar classes can be
    used to provide pre-formatted output.


    This Python Calendar Module can be imported as-


    ```

    >>> import calendar as cd

    ```


    Calendar Class in Python


    The Calendar is the first class we''ll look at. This has the following constructor
    syntax: class calendar. Calendar(firstweekday=0)


    This produces a Calendar object that starts on whatever day of the week we specify.
    It starts on Monday by default, with a parameter value of 0.


    Sunday, as previously said, is at 6 p.m. We format a calendar using the principles
    taught in this lesson.


    The following techniques will be available on a Calendar instance:


    +   1. iterweekdays() — Weekdays


    This returns an iterator for a week''s worth of weekday numbers. The number we
    set as the first weekday is the first number returned by this iterator.


    ```

    >>> import calendar as cd


    >>> c=cd.Calendar(firstweekday=1)


    >>> for i in c.iterweekdays():


    print(i)

    ```


    Output


    ![](img/a1c5e4a1633d0fcc232ce0059c778469_207_0.png)


    +   2. itermonthdates(year, month) – Dates of month


    To acquire a complete week, this produces an iterator for all days of the month,
    as well as any days before or after it. Let''s make Monday the first workday.


    ```

    >>> c=cd.Calendar(firstweekday=0)


    >>> for i in c.itermonthdates(2018,12):


    print(i)

    ```


    Output'
