    # # Chapter 13: PYTHON OPERATOR – TYPES OF OPERATORS IN PYTHON


    In this Python Operator lesson, we''ll look at what an operator is and how to
    use it in the Python programming language.


    We''ll go over the syntax and examples for the following Python Operators: Arithmetic,
    Relational, Assignment, Logical, Membership, Identity, and Bitwise Operators.


    Let''s get started with the Python Operators Tutorial.


    ![](img/a1c5e4a1633d0fcc232ce0059c778469_112_0.png)


    What does a Python operator mean?


    An operator in Python is a symbol that performs a task on one or more operands.
    A variable or a value on which the operation is performed is referred to as an
    operand.


    There are seven types of Python operators:


    +   - Python Relational Operator

    - Python Arithmetic Operator

    - Python Assignment Operator

    - Python Membership Operator

    - Python Logical Operator

    - Python Identity Operator

    - Python Bitwise Operator


    1. Arithmetic Operators in Python


    Python operators for basic mathematical operations are included in this list of
    Python arithmetic operators.'
