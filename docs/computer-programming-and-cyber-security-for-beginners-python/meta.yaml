    \ 11。`3>>2` 将其向右移动两位。这得到数字 00，这是二进制的零。\n同样，`3>>1` 将其向右移动一位。这得到数字 01，这是二进制的一。\n\
    \n```python\n>>> 3>>2\nOutput\n0\n>>> 3>>1\nOutput\n1\n```\n\n以上就是关于 Python 运算符教程的全部内容。\n\
