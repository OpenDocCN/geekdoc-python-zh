    hi\nHi\n```\n\n2. Python MULTILINE\n\n处理多行字符串时，这允许 `^` 和 `$` 匹配每一行的开头和结尾，而不是整个字符串。\n\
    \n```\n>>> match=re.findall(r'^Hi', 'Hi, did you ship it, Hillary?\\nNo, I didn\\\
    't, but Hi', re.MULTILINE)\n>>> for i in match:\n    print(i)\n```\n\n# 输出\n\n\
    ```\nHi\nHi\n```\n\n3. Python DOTALL\n\n`.*` 只匹配第一行；它不会扫描整个字符串。这是因为 `.` 不匹配换行符。\n\
    \n我们使用 `DOTALL` 来使其成为可能。\n\n```\n>>> match=re.findall(r'.*','Hi, did you ship\
    \ it, Hillary?\\nNo, I didn\\'t, but Hi',re.DOTALL)\n>>> for i in match:\n   \
    \ print(i)\n```\n\n# 输出\n\n```\nHi, did you ship it, Hillary?No, I didn't, but\
    \ Hi\n```\n\n## 贪婪与非贪婪\n\n元字符 `*`、`+` 和 `?` 是贪婪的。这意味着它们会持续搜索。让我们举个例子。\n\n```\n\
    >>> match=re.findall(r'(<.*>)','<em>Strong</em> <i>Italic</i>')\n>>> for i in\
    \ match:\n    print(i)\n```\n\n# 输出\n\n```\n<em>Strong</em> <i>Italic</i>\n```\n\
    \n这给了我们整个字符串，因为它贪婪地持续搜索。如果我们只想要开始和结束标签呢？看：\n\n```\n>>> match=re.findall(r'(<.*?>)','<em>Strong</em>\
    \ <i>Italic</i>')\n>>> for i in match:\n    print(i)\n```\n\n# 输出\n\n```\n<em>\n\
    </em>\n<i>\n</i>\n```\n\n`.*` 是贪婪的，而 `?` 使其变为非贪婪。\n或者，我们也可以这样做：\n\n```\n>>> match=re.findall(r'</?\\\
    w+>','<em>Strong</em> <i>Italic</i>')\n>>> for i in match:\n    print(i)\n```\n\
    \n# 输出\n\n```\n<em>\n</em>\n<i>\n</i>\n```\n\n这是另一个例子：\n\n```\n>>> match=re.findall('(a*?)b','aaabbc')\n\
    >>> for i in match:\n    print(i)\n```\n\n# 输出\n\n```\na\na\na\n```\n\n在这种情况下，`?`\
    \ 使 `*` 变为非贪婪。此外，如果 `?` 后面的 `b` 被跳过，结果将是一个空字符串。\n`?` 后面必须有一个字符来停止。`*?`、`+?` 和\
    \ `??` 都适用于此方法。\n类似地，`{m,n}?` 使其变为非贪婪，并匹配尽可能少的实例。\n\n## 替换\n\n`sub()` 函数可用于将字符串的一部分替换为另一部分。`sub()`\
