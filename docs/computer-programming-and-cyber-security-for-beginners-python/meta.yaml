    \ -12], [54, 72]],\n                  index=['row1', 'row2'],\n              \
    \    columns=['column1', 'column2'])\nprint('{}\\n'.format(df))\ndf = pd.DataFrame({'a':\
    \ [18, -12], 'b': [54, 72]},\n                  index=['x', 'y'])\nprint('{}\\\
    n'.format(df))\n```\n\n### Changes and deletions\n\nThe append technique, which\
    \ accepts either a series or another DataFrame, can be used to add rows to a DataFrame.\
    \ When dealing with a series, we must either specify the index or use the `ignore\
    \ index` keyword. If `ignore index=True` is set, the row labels will be replaced\
    \ with integer indexes.\n\nThe append technique does not change the original DataFrame.\
    \ Instead, a new DataFrame is produced with the appended row.\n\n### The process\
    \ of dropping\n\nIn a DataFrame, we may use the `drop` technique to delete columns\
    \ and rows. One of 2 techniques can be used to accomplish this:\n\n1. Specify\
    \ the labels of the rows/columns to be dropped using the `labels` option. To drop\
    \ from the rows or columns axis, use the `labels` keyword argument with the `axis`\
    \ keyword argument (with a default value of 0).\n2. Without needing to utilize\
    \ the axis, give the labels of the rows or columns directly using the `index`\
    \ or `columns` keyword parameters.\n\n```python\nimport pandas as pd\ndf = pd.DataFrame([[10,\
    \ 20, 30], [40, 50, 60]])\nser = pd.Series([70, 80, 90], name='new row')\nprint('{}\\\
    n'.format(df))\ndf2 = df.append(ser)\nprint('{}\\n'.format(df2))\ndf3 = df.append(ser,\
    \ ignore_index = True)\nprint('{}\\n'.format(df3))\ndf3 = pd.DataFrame([[100,\
    \ 110, 120],[120, 120, 130]])\ndf4 = df.append(df3)\nprint('{}\\n'.format(df4))\n\
    ```\n\nDrop, like append, creates a new DataFrame.\n\nThe Concat function can\
    \ be used to join DataFrames together. Merge merges two DataFrames by using all\
    \ of their shared column labels.\n\n### Additional services\n\nPandas include\
    \ a large collection of data analysis tools that let us aggregate, sort, filter,\
    \ and characterize a dataset. The pyplot API can also be used to visualize DataFrames.\n\
    \n## Chapter 21: PYTHON GENERATORS\n\n### Python's generators\n\nBuilding an iterator\
    \ in Python takes a lot of effort. We must create a class containing the techniques\
    \ `__iter__()` and `__next__()`, maintain track of internal states and raise `StopIteration`\
    \ when no values are to be returned.\nThis is both lengthy and perplexing. In\
    \ such cases, the generator comes to the rescue.\nIterators can be easily created\
    \ with Python generators. All of the work indicated above is completed automatically\
    \ via Python generators.\nA generator, in simple terms, is a function that returns\
    \ an object (iterator) that we may iterate through (one value at a time).\n\n\
    ### Create Generators in Python\n\nCreating a generator in Python is a breeze.\
    \ This is the same as creating a regular function; only you'll use a `yield` statement\
    \ instead of a `return` statement.\nSuppose there is at least one `yield` statement\
    \ in it (it may also have other `yield` or `return` statements). Both `yield`\
    \ and `return` will return a value from a function. The distinction is that a\
    \ `return` statement closes a function completely, whereas a `yield` statement\
    \ pauses it and saves all of its states before continuing on subsequent calls.\n\
    What are the differences between the Generator and Normal functions?\nA generator\
    \ function differs from a regular function in the following ways.\n\n- One or\
    \ more `yield` statements can be found in the Generator function.\n- When called,\
    \ it returns an object (iterator), but it does not immediately begin operation.\n\
    - Techniques like `__iter__()` and `__next__()` are automatically implemented.\
    \ As a result, we can use `next` to iterate through the objects.\n- When the function\
    \ yields, it is paused, and control is handed over to the caller.\n- Between calls,\
    \ local variables and their states are remembered.\n- Finally, when the function\
    \ finishes, `StopIteration` is automatically raised on further calls.\n\nHere's\
    \ an example that exemplifies all of the preceding concepts. `My gen()` is a generator\
    \ function containing numerous `yield` statements.\n\n```python\n# A simple generator\
    \ function\ndef my_gen():\n    n = 1\n    print('This is printed first')\n   \
    \ # Generator function contains yield statements\n    yield n\n\n    n += 1\n\
    \    print('This is printed second')\n    yield n\n\n    n += 1\n    print('This\
    \ is printed at last')\n    yield n\n```\n\nAn interactive run in the interpreter\
    \ is given below. Run these in the Python shell to see the output."
