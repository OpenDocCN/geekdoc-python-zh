- md: "## 5. Membership Python Operator\n\nThese operators determine whether a value\
    \ belongs to a sequence. A list, a tuple, or a string can be used to represent\
    \ the sequence.\n‘in’ and ‘not in’ are the two membership python operators.\n\n\
    ### a. Python's in operator\n\nThis determines whether a value belongs to a series.\n\
    We can see that the string ‘fox’ does not belong in the list of pets in our case.\
    \ It does, however, belong to the string ‘cat,’ therefore it returns True.\nIn\
    \ addition, the word ‘me’ is a substring of the word ‘disappointment.’ As a result,\
    \ it returns true.\n\n```python\n>>> pets=['dog','cat','ferret']\n>>> 'fox' in\
    \ pets\nOutput\nFalse\n>>> 'cat' in pets\nOutput\nTrue\n>>> 'me' in 'disappointment'\n\
    Output\nTrue\n```\n\n### b. not in Operator in Python\n\nUnlike ‘in’, ‘not in’\
    \ checks if a value is not a sequence member.\n\n```python\n>>> 'pot' not in 'disappointment'\n\
    Output\nTrue\n```\n\nIn doubt yet in any Python operator with examples? Please\
    \ comment.\n\n## 6. Identity Operator in Python\n\nLet's move on to identifying\
    \ the Python Operator.\nThese operators determine whether the two operands have\
    \ the same identity. ‘Is’ and ‘Is Not’ are the two identity operators.\n\n###\
    \ a. is Operator in Python\n\nIt returns True if two operands have the same identity.\
    \ Otherwise, False is returned. Because 2 is not equal to 20, the result is False.\n\
    Also, the numbers \"2\" and \"2\" are the same. The differences in quotes do not\
    \ distinguish them. As a result, True is returned.\n\n```python\n>>> 2 is 20\n\
    Output\nFalse\n>>> '2' is \"2\"\nOutput\nTrue\n```\n\n### b. is not an Operator\
    \ in Python\n\n‘2’ is a string, and 2 is a number. As a result, it returns True.\n\
    \n```python\n>>> 2 is not '2'\nOutput\nTrue\n```\n\n## 7. Python Bitwise Operator\n\
    \nLet's have a look at the Bitwise Python Operator now.\nThese operate bit by\
    \ bit on the operands.\n\n### a. Binary AND(&) Operator in Python\n\nOn the two\
    \ values, it conducts a bit-by-bit AND operation. The binary value for 2 is 10,\
    \ whereas the binary value for 3 is 11. When you & them together, you get 10,\
    \ which is binary for two.\nLikewise, &-ing 011(3) and 100(4) yields 000. (0).\n\
    \n```python\n>>> 2&3\nOutput\n2\n>>> 3&4\nOutput\n0\n```\n\n### b. Python's Binary\
    \ OR(|) Operator\n\nOn the two values, it does a bit-by-bit OR. When you OR 10(2)\
    \ with 11(3), you get 11. (3).\n\n```python\n>>> 2|3\nOutput\n3\n```\n\n### c.\
    \ Python Binary XOR(^) Operator\n\nOn the two values, it executes a bit-by-bit\
    \ XOR(exclusive-OR). XORing 10(2) and 11(3) yields 01 in this case (1).\n\n```python\n\
    >>> 2^3\nOutput\n1\n```\n\n### d. In Python, Binary One's Complement(~)\n\nIt\
    \ returns the binary one's complement of a number. The bits are flipped. The binary\
    \ code for two is 00000010. 11111101 is one's complement.\nThis is binary for\
    \ -3. So, this results in -3. Similarly, ~1 results in -2.\n\n```python\n>>> ~-3\n\
    Output\n2\n```\n\nThe complement of -3 is 2, once again.\n\n### e. Python's Binary\
    \ Left-Shift(<<) Operator\n\nThe value of the left operand is shifted to the left\
    \ by the number of places specified by the right operand.\nThe binary of 2 is\
    \ 10 in this case, which shifts it to two positions to the left. This yields 1000,\
    \ which is the binary equivalent of the number 8.\n\n```python\n>>> 2<<2\nOutput\n\
    8\n```\n\n### f. Python Binary Right-Shift(>>)\n\nThe value of the left operand\
    \ is moved to the right by the number of places specified by the right operand.\n\
    Here, the binary of 3 is 11. 3>>2 shifts it two positions to the right. This yields\
    \ the number 00, which is binary for zero.\nSimilarly, 3>>1 shift it to the right\
    \ one position. This yields the number 01, which is binary for one.\n\n```python\n\
    >>> 3>>2\nOutput\n0\n>>> 3>>1\nOutput\n1\n```\n\nThis was all about the Python\
    \ Operator Tutorial.\n\n## Questions about Python Operators in Python Interviews\n\
    \n1. In Python, what is the not operator?\n2. What are the several types of relational\
    \ operators in Python?\n3. What does!= in Python mean?\n4. Describe the different\
    \ types of Bitwise Operators in Python.\n5. Describe the Python floor-divide and\
    \ assign operators.\n\nFinally, we looked at seven different types of Python operators\
    \ in this course.\nTo see how they function, we ran them in the Python Shell (IDLE).\
    \ This operator can also be used in conditions and to combine them.\nGo ahead\
    \ and experiment with some different combinations.\n\n## Chapter 13: MODULES VS\
    \ PACKAGES IN PYTHON\n\nThis book is a compilation of the most significant changes\
    \ in Python modules and packages. Many programmers struggle to determine when\
    \ and where a module or package should be utilized.\n\nA clear set of distinctions\
    \ will be shown in this article, making it easier for the coder to work more efficiently\
    \ with both modules and packages.\n\n### What are Python Modules?\n\nA pythonic\
    \ statement that comprises numerous functions is known as a module. Modules operate\
    \ as a pre-defined library in the code that both the coder and the user can access.\n\
    \nWhile the code is being executed, the python modules additionally save pre-defined\
    \ functions from the library.\n\n**Example of Python Module:**\n\n```python\n\
    import math\n\nfrom math import pow\n\npow(2,8)\n\nprint(pow)\n```\n\n**Output:**\n\
    \n```\n<built-in function pow>\n>>>\n```\n\n### What are Python Packages?\n\n\
    A package is a collection of tools that aid in the initialization of a program.\
    \ For any source code, a python package serves as a user-variable interface. This\
    \ makes a python package work for every functional code in the runtime at a specific\
    \ moment.\n\n**Example of Python Package:**\n\n```python\nimport math\n\nprint(\"\
    math package\")\n```\n\n**Output:**\n\n```\nmath package\n>>>\n```\n\n### Python\
    \ Modules and Packages: What's the Difference?\n\n1. Every user-oriented code\
    \ is contained in a package, which contains the file init .py. However, this does\
    \ not apply to any user-specific codes in runtime modules.\n\n2. A module is a\
    \ file that contains Python code that runs in the background for user-specific\
    \ programming. A package also alters user-interpreted code so that it can be readily\
    \ executed during runtime.\n\nA python \"module\" is made up of a unit namespace\
    \ and the variables extracted locally. There are also some parsed functions, such\
