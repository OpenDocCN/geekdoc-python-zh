    )\n```\n\nOutput\n\n```\nIt isn't Ayushi's birthday\n```\n\nBecause we wanted\
    \ two single marks in the string, we used double-quotes to delimit the entire\
    \ string.\n\n2. format() technique\nYou may perform the same thing with the format()\
    \ technique. It comes after the string and has the variables separated by commas\
    \ as arguments.\nTo position the variables in the string, use curly brackets.\
    \ You can either put 0,1,... or the variables inside the curly brackets.\nWhen\
    \ implementing the latter, you must use the formatting technique to assign values\
    \ to them.\n\n```\n>>> print(\"I love {0}\".format(a))\n```\n\nOutput\n\n```\n\
    I love dogs\n```\n\n```\n>>> print(\"I love {a}\".format(a='cats'))\n```\n\nOutput\n\
    \n```\nI love cats\n```\n\nThe variables do not have to be defined before the\
    \ print statement."
