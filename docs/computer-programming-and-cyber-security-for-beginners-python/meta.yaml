    # # Chapter 1: INSTALLING PYTHON


    The first step in becoming a Python coder is to install or update Python on your
    computer. You may install Python using a package manager, obtain official Python
    distributions from Python.org, or install customized distributions for scientific
    computing, IoT, and embedded devices.


    This tutorial focuses on official releases because they''re the greatest way to
    get started learning Python programming.


    You will learn how to:


    +   - Check the Python version that is installed on your computer if any;

    - Update or Install Python on Windows, macOS, and Linux; and

    - Use Python on mobile devices such as phones and tablets

    - Use online interpreters to use Python on the web.


    This book will help you no matter what operating system you''re using. Choose
    your operating system from the list below and get started!


    # ## INSTALLING PYTHON ON WINDOWS


    On Windows, there are three installation options:


    +   1. The Microsoft Store

    2. The full installer

    3. Linux Subsystem for Windows


    In this chapter, you will learn how to check which version of Python is installed
    on your Windows machine. You''ll also discover which of the three installation
    options is best for you.


    # ## HOW TO FIND OUT WHAT PYTHON VERSION YOU HAVE ON WINDOWS


    Open a command-line application, such as PowerShell to see if Python is already
    installed on your Windows PC.


    Here''s how to start PowerShell:


    +   1. Press the Win key on your keyboard.

    2. Type PowerShell into the search box.

    3. Hit the Enter key.


    You may also right-click the Start button and choose Windows PowerShell or Windows
    PowerShell for PowerShell (Admin).


    You can also use Windows Terminal or cmd.exe.


    Insert this command into the command prompt and click Enter:


    ```

    C:\> python –version

    Python 3.8.4

    ```


    You can find out what version is installed by using the —version switch. You can
    also use the -V switch to achieve the same result:


    ```

    C:\> python –V

    Python 3.8.4

    ```


    In either case, you''ll want to upgrade your installation if it''s older than
    3.8.4, and it was the most recent version at the time of writing.


    Note: If you don''t have a Python version installed, each of the following statements
    will open the Microsoft Store and take you to the Python program page. In the
    next section, you''ll learn how to finish the installation through the Microsoft
    Store.


    You can use the where.exe command in cmd.exe or PowerShell to find out where the
    installation is located:


    +   - C:\> where.exe python

    - C:\Users\mertz\AppData\Local\Programs\Python\Python37-32\python.exe


    It''s worth noting that the where.exe command will only work if your user account
    has Python installed.


    What are your choices? Are'
- md: 'There are several ways to install the official Python distribution on Windows,
    as previously mentioned:


    1.  **Microsoft Store package**: On Windows, the most basic installation is to
    use the Microsoft Store program. Beginner Python users searching for an easy-to-set-up
    interactive experience should try this.

    2.  **Full Installer**: This technique entails downloading Python from the Python.org
    website directly. Intermediate and advanced developers that require additional
    control over the setup process should use this.

    3.  **Windows Subsystem for Linux (WSL)**: The WSL enables you to operate a Linux
    environment in a Windows environment.


    Only the first two alternatives, which are the most common installation techniques
    in a Windows system, will be covered in this section.


    If you want to install under the WSL, go straight to the Linux section of this
    article after you''ve installed your preferred Linux distribution.


    Note: Alternative distributions, such as Anaconda, can be used to complete the
    installation on Windows; however, this article only covers official distributions.
    Anaconda is a well-known Python environment for scientific computing and data
    science.


    There are differences between the two official Python installers for Windows.
    There are some significant limits to the Microsoft Store bundle.


    ## The Microsoft Store Package''s Limitations


    The Microsoft Store package is described as follows in the official Python documentation:


    The Microsoft Store package is a user-friendly Python interpreter designed primarily
    for interactive use, such as by students.


    The most important point is that the Microsoft Store bundle is "primarily designed
    for interactive use." That is to say, the Microsoft Store package is intended
    for students and people who are learning Python for the first time.


    The Microsoft Store package has constraints that make it unsuitable for a professional
    development environment and aimed towards novice Pythonistas. It doesn''t have
    full write access to shared folders like TEMP or the registry, for example.


    ## RECOMMENDATIONS FROM THE WINDOWS INSTALLER


    Install from Microsoft Store if you are new to Python and want to study the language
    rather than build professional software. This is the easiest and quickest way
    to get started with the least amount of hassle.


    The official Python.org installation, on the other hand, is the ideal choice if
    you''re an experienced developer wishing to develop professional software in a
    Windows environment. Microsoft Store regulations won''t restrict you, and you''ll
    be able to choose where the executable is installed, as well as add Python to
    your PATH if necessary.


    ## HOW TO GET IT FROM MICROSOFT''S STORE


    If you''re new to Python and want to get started quickly, the Microsoft Store
    package is the most convenient technique to get started. Two steps are required
    to install through the Microsoft Store.


    **Step 1: In the Microsoft Store, go to the Python App Page.**


    Search for Python on the Microsoft Store app.


    You''ll probably notice a few different versions to choose from:


    ![](img/a1c5e4a1633d0fcc232ce0059c778469_6_0.png)


    To launch the installation screen, select Python 3.8 or the highest version number
    available in the app.


    Warning: Double-check that the Python program you''ve chosen is from the Python
    Software Foundation. The official Microsoft Store bundle will always be free;
    therefore, it''s not the right software if an app costs money.


    You can also launch PowerShell and enter the following command:


    ```

    C:\> python

    ```


    If you don''t already have a version of Python installed, pressing Enter will
    activate the Microsoft Store, which will take you to the most recent version of
    Python available.


    **Step 2: Download and install the Python application.**


    After you''ve decided which version to install, continue the installation by following
    these steps:


    1.  Click Get.

    2.  Wait for the application to complete the download process. The Get button
    will be replaced by an Install on my devices button when the download is complete.

    3.  Select the devices on which you would like to complete the installation by
    clicking Install on my devices.

    4.  To begin the installation, click Install Now and then OK.

    5.  If the installation went smoothly, the notification "This product is installed"
    will appear at the top of the Microsoft Store page.


    Congratulations! Python, including pip and IDLE, is now available to you!


    ## HOW TO INSTALL FROM THE FULL INSTALLER


    Installing via the complete installer is the best option for expert developers
    that require a full-featured Python programming environment. Installing via the
    Microsoft Store provides less customization and control over the installation.


    In two steps, you can install from the full installer.


    **Step 1: Download the Full Installer**


    To get the full installer, follow these steps:


    1.  Go to the Python.org

    2.  Click link for the Latest Python 3 Release - Python 3. x.x under the headline
    "Python Releases for Windows." Python 3.8.4 was the most recent version at the
    time of writing.

    3.  Navigate to the bottom of the page and choose either the 64-bit Windows x86-64
    executable installer or the 32-bit Windows x86 executable installer.


    If you are unsure whether to use the 32-bit or 64-bit installation, expand the
    box below for more information.


    **32-bit or 64-bit Python?**


    Show/Hide


    Move to the next step once the installer has finished downloading.


    **Step 2: Launch the Setup Program**


    After you have selected and downloaded an installer, double-click on it to launch
    it. A dialog window will pop up,


    ![](img/a1c5e4a1633d0fcc232ce0059c778469_8_0.png)


    similar to the one below:


    There are 4 things to keep in mind when looking at this dialog box:


    1.  The default install path is in the current Windows user''s AppData/ directory.

    2.  The Specify installation button allows you to customize the installation location
    and which additional features, such as pip and IDLE, are installed.

    3.  By default, the Install app for all users (recommended) checkbox is enabled.
    This means that the py.exe launcher will be accessible to all users on the machine.
    This box can be unchecked to limit Python to the current Windows user.

    4.  By default, the Add Python 3.8 to PATH checkbox is unchecked. There are various
    reasons why you would not want Python on your PATH, so think about the consequences
    before checking this option.


    You have absolute control over the installation process with the full installer.


    Warning: If you are unfamiliar with the term PATH, it is strongly advised that
    you do not use the full installer. Instead, get the Microsoft Store bundle.


    Use the settings on the dialog box to customize the installation to match your
    needs. Then press the Install Now button. It''s as simple as that!


    You now have the latest version of Python 3 installed on your Windows PC!


    ## HOW TO SETUP PYTHON ON A MAC


    On previous versions of macOS, Python 2 comes preloaded. Starting with macOS Catalina,
    this is no longer the case for current versions of macOS.


    On macOS, there are two installation options:


    1.  The formal installation program

    2.  The package manager for Homebrew


    This chapter will teach you how to determine which version of Python is installed
    on your Mac. You''ll also discover which of the two installation procedures is
    best for you.


    ## ON A MAC, HOW CAN YOU CHECK YOUR PYTHON VERSION?


    Open a command-line application, such as Terminal, to see the Python version you
    have on your Mac.


    Here''s how to start Terminal:


    1.  Press the Cmd+Space keys at the same time.

    2.  Select a terminal.

    3.  Hit the Enter key.


    You can also open Finder and go to Applications Utilities Terminal.


    Type the following commands into the command prompt:


    ```

    # Check the system Python version

    $ python --version

    # Check the Python 2 version

    $ python2 --version

    # Check the Python 3 version

    $ python3 --version

    ```


    If your machine has Python installed, one or more of these tasks should return
    a version number.


    If Python 3.6.10 was already installed on your computer, the python3 program would
    show the following version number:


    ```

    $ python3 –version

    Python 3.6.10

    ```


    If any of the following circumstances apply to you, you should download the most
    recent version of Python:


    - None of the commands listed above return a version number.

    - The Python 2. X series is the only version that appears.

    - You don''t have the most recent version of Python 3, version 3.8.4, as of this
    writing.


    What are your choices? Are


    On macOS, there are two options for installing the official Python distribution:


    1.  **The official installer is as follows**: This technique entails downloading
    and installing the official Python installer from the Python.org website.

    2.  **The package manager for homebrew**: If you don''t already have it installed,
    you''ll need to download and install the Homebrew package manager and then type
    a command into a terminal application.


    The Homebrew package manager and official installer will function, although the
    Python Software Foundation exclusively maintains the official installation.


    Note: Alternative distributions, such as Anaconda, can be used to complete the
    installation on macOS; however, this book only covers official distributions.
    Anaconda is a well-known Python environment for scientific computing and data
    science. Check out the official Anaconda documentation''s macOS installation instructions
    to discover how to install Anaconda on your Mac.


    The Homebrew package manager and The official installer both install different
    distributions. There are various drawbacks to installing from Homebrew.


    ### Installing Homebrew Has Its Limits


    The Tcl/Tk requirement required by the Tkinter module is not included in the Python
    installation for macOS available on Homebrew. Tkinter is a Python library module
    for creating graphical user interfaces. It is an interface for the Tk GUI toolkit,
    which isn''t included in Python.


    Homebrew does not install the Tk GUI toolkit required. Instead, it uses a version
    that is already installed on your system. You may be unable to import the Tkinter
    module because the system version of Tcl/Tk is old or missing entirely.


    ## macOS INSTALLER RECOMMENDATIONS


    Because it''s easy to administer from the command line and allows commands to
    update Python without going to a website, the Homebrew package manager is a popular
    option for installing Python on macOS. Because Homebrew is a command-line program,
    bash scripts can be used to automate it.


    The Python distribution provided by Homebrew, on the other hand, is not under
    the control of the Python Software Foundation and may change at any time. The
    official installer is the most dependable approach on macOS, especially if you
    plan on performing Python GUI programming with Tkinter.


    ## HOW TO USE THE OFFICIAL INSTALLER TO INSTALL


    On macOS, installing Python through the official installer is the most trustworthy
    option. It contains all of the system dependencies required for Python application
    development.


    In two steps, you can install via the official installer.


    **Step 1: Download the Official Installer**


    To get the full installer, follow these steps:


    1.  Go to the Python.org

    2.  Click the link for the Latest Python

    3.  To begin the download, scroll to the bottom and click macOS 64-bit installer.'
