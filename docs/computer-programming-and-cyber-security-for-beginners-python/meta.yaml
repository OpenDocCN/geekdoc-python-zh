  md: "# Chapter 10: FROZENSET\n\nPython frozenset()\nThe frozenset() function creates\
    \ an immutable frozenset object from the specified iterable's elements.\nA frozen\
    \ set is a Python set object that is immutable. While parts of a set can be changed\
    \ at any moment, elements of a frozen set don't change after they've been created.\n\
    As a result, frozen sets can be used as Dictionary keys or as elements of other\
    \ sets. However, it is not organized in the same way that sets are (the elements\
    \ can be set at any index).\nThe frozenset() function has the following syntax:\n\
    \n```\nfrozenset([iterable])\n```\n\nfrozenset() Parameters\nThere is only one\
    \ parameter to the frozenset() function:\n\n+   - iterable (Optional) - the iterable\
    \ holds the elements that should be used to initialize the frozenset.\nSet, dictionary,\
    \ tuple, and other types of iterables exist.\n\nReturn value from frozenset()\n\
    The frozenset() function creates an immutable frozenset from the specified iterable's\
    \ items.\nIt returns an empty frozenset if no arguments are supplied.\nExample\
    \ 1: Working of Python frozenset()\n\n```\n# tuple of vowels\nvowels = ('a', 'e',\
    \ 'i', 'o', 'u')\n\nfSet = frozenset(vowels)\nprint('The frozen set is:', fSet)\n\
    print('The empty frozen set is:', frozenset())\n\n# frozensets are immutable\n\
    fSet.add('v')\n```\n\nOutput\n\n```\nThe frozen set is: frozenset({'a', 'o', 'u',\
    \ 'i', 'e'})\nThe empty frozen set is: frozenset()\nTraceback (most recent call\
    \ last):\n  File \"<string>\", line 8, in <module>\n    fSet.add('v')\nAttributeError:\
    \ 'frozenset' object has no attribute 'add'\n```\n\nExample 2: Dictionary frozenset()\n\
    When you're using a dictionary as just an iterable for a frozen set, just the\
    \ dictionary's keys are used to generate the set.\n\n```\n# random dictionary\n\
    person = {\"name\": \"John\", \"age\": 23, \"sex\": \"male\"}\n\nfSet = frozenset(person)\n\
    print('The frozen set is:', fSet)\n```"
