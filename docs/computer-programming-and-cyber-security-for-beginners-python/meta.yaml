    Curly brackets are used to define dictionaries in Python. Commas separate the
    key-value pairs that make up the dictionary. A colon: connects each key-value
    pair.


    Let''s put two people''s ages in a dictionary. Gabby and Maelle are the two individuals.
    Gabby is eight years old, and Maelle is five. It''s worth noting that Gabby''s
    name is a string and her age is an integer.


    ```

    >>> age_dict = {"Gabby": 8 , "Maelle": 5}

    >>> type(age_dict)

