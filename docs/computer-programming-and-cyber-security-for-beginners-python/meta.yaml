  md: "# Chapter 16: A DIVE INTO PYTHON CLOSURES AND DECORATORS\n\nClosures are a\
    \ class of Python constructs that are quite elegant. We'll learn about them, how\
    \ to define a closure, and why and when to utilize closures in this post.\n\n\
    However, before we can understand a closure, we must first comprehend what a nested\
    \ function is and how scoping constraints apply to it. So, let's get this party\
    \ started.\n\nPython Scoping Rules and Nested Functions\n\nWhen a function is\
    \ run, a new local namespace reflects the local environment and contains the names\
    \ of function parameters and variables assigned within the function body. A namespace\
    \ can be compared to a dictionary, with the keys being the object names and the\
    \ values being the objects themselves.\n\nThe interpreter searches the local namespace\
    \ first when resolving names. If no match is found, the global namespace, the\
    \ module where the function is defined, is searched. If no match is discovered,\
    \ the built-in namespace is checked before the NameError exception is raised.\
    \ This is depicted in the diagram below:\n\n![](img/a1c5e4a1633d0fcc232ce0059c778469_139_0.png)\n\
    \nNamespace search order by Python Interpreter\n\nLet’s consider the below example:\n\
    \n```\nage = 27\ndef birthday():\n    age = 28birthday()\nprint(age) # age will\
    \ still be 27\n>>\n27\n```\n\nVariables given inside a function have always been\
    \ bound to the function's local namespace; as a result, the variable age in the\
    \ technique body refers to a new object with the value 28, not the outside variable.\
    \ The global statement can be used to change this behavior. As shown in the example\
    \ below:\n\n```\nage = 27\nname = \"Sarah\"\ndef birthday():\n    global age \
    \   # 'age' is in the global namespace\n    age = 28\n```"
