    >>> sayhi=orange.salutation\n>>> sayhi()\n```\n\n输出：\nI am Orange and a size 7\n\
    \n### Python对象到底是什么？\n\n如果一个Python3类没有对象，那它有什么用？如果类是一个概念，那么对象就是该概念的实现。对象的`__init__()`方法在创建时被调用。正如我们之前提到的，对象通过函数使用`self`关键字传递给类。\n\
    \n```python\n>>> orange=fruit('Orange',7)\n```\n\n对于`color`和`size`属性，我们使用了值`'Orange'`和`7`。我们也可以动态地为对象声明属性。看看怎么做。\n\
