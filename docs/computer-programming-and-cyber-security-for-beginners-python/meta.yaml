    >>> gdata = url1()    # Fetches http://www.google.com

    >>> bdata = url2()    # Fetches http://www.bing.com

    >>>

    ```


    It is possible to determine the values that are enclosed in the closure function.

    If a function is a closure function, it has a __closure__ attribute which returns
    a tuple of cell objects. We know that url1 and url2 are closure functions from
    the previous example.


    ```

    >>> page.__closure__    # Returns None since not a closure

    >>> url1.__closure__

    (<cell at 0x10a5f1250: str object at 0x10a5f3120>,)

    The closed value is stored in the cell contents attribute of the cell object.


    >>> url1.__closure__[0].cell_contents

    ''http://www.google.com''>>> url2.__closure__[0].cell_contents

    ''http://www.bing.com''

    ```


    In Python, a nested function is closed when it refers to a value in its enclosing
    scope. Closures help to obscure data to some extent. A closure can also be a useful
    tool for maintaining state consistency over several function calls.

    Follow these steps to create a closure function in Python:


    +   - We''ll need a nested function.

    - The enclosing function must return the nested function, and the nested function
