    \ for i in {2,3,3,4}:\n    print(i)\n```\n\n输出：\n```\n2\n3\n4\n```\n\n你也可以遍历一个字符串。\n\
    \n```python\n>>> for i in 'wisdom':\n    print(i)\n```\n\n输出：\n```\nw\ni\ns\n\
    d\no\nm\n```\n\n### 3. 遍历列表或类似结构的索引\n\n`len()`方法返回列表的长度。当你在它上面使用`range()`函数时，它会返回一个包含列表索引的range对象。你可以遍历它。\n\
    \n```python\n>>> list=['Romanian','Spanish','Gujarati']\n>>> for i in range(len(list)):\n\
