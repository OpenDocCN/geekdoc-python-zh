    \n在我们深入探讨 Python 中 `map()`、`filter()` 和 `reduce()` 函数的示例之前，我们需要回顾另一个概念：高阶函数。\n\
    \n## 高阶函数\n\n高阶函数是我们在函数式编程中定义计算的主要工具。这些是接受函数作为参数并返回另一个函数的函数。Python 中三个最重要的高阶方法是\
    \ `reduce()`、`map()` 和 `filter()`。当与更简单的函数结合使用时，它们可以用于执行复杂的操作。\n\n在下面的代码示例中，说明了一个高阶函数。`greeting()`\
    \ 接受两个参数：一个函数 `f` 和一个名称 `n`，并返回函数 `f(n)`。\n\n```python\n>>> def greet(name):\n\
