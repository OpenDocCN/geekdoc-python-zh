  md: 'Now that you''ve got everything set up, all you have to do is follow this development
    process:

    In lambda function.py, define the logic of your bot.

    Execute $ python entrypoint.py from your project''s root directory to test modifications.

    Once you''re satisfied with your bot''s performance, package the code as follows:

    To requirements.txt, add any additional libraries you used.

    From your project''s root directory, run sh create-lambda layer.sh 3.8. It will
    package the libraries in layer.zip for a Python 3.8+ runtime, as specified in
    requirements.txt.

    Run sh build package. Sh From your project''s root directory. It will create a
    zip file called lambda function.zip that contains the code for your Lambda function.

    The next step is to integrate your bot into an AWS Lambda function.

    Create an AWS Lambda Function for your bot.

    It''s simple to set up your bot as a Lambda function, but you must follow the
    steps in the correct order. Let''s have a look at the specifics.

    First, establish a Lambda Layer with the libraries used in the bot''s code (the
    layer.zip file you generated earlier).

    Second, make a Lambda function, submit your bot''s code (lambda function.zip),
    and add the layer you made.

    Finally, you''ll set up a trigger to run your Lambda function every day at 10
    a.m. (UTC.)

    Let''s begin by establishing a Lambda Layer.

    In the Services dropdown menu, look for Lambda. Choose the first alternative (Lambda.)


