    # 5. Python Logical Operations


    The and, or, and not operators in Python can also be used. False is the Boolean
    value of an empty string.


    a. If the value on the left is True, the value on the right is returned.

    Otherwise, the left-hand value is False, and it returns False.


    ```

    >>> "" and ''1''

    ```


    **Output**

    ''''


    ```

    >>> ''1'' and ""

    ```


    **Output**

    ''''


    b. or- It returns True if the value on the left is True. Otherwise, the rightmost
    value is returned.

    c. not- As previously stated, the Boolean value of an empty string is False.


    ```

    >>> not(''1'')

    ```


    **Output**

    False


    ```

    >>> not("")

    ```


    **Output**

    True


