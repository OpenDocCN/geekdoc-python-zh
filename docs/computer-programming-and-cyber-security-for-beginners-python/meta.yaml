  md: '# Keyword Arguments


    You can utilize keyword arguments in your function call to ensure that you call
    all of the parameters in the correct order. These are used to identify arguments
    based on their parameter names. To make this more evident, consider the following
    example:


    It''s worth noting that you may use the keyword arguments to change the order
    of the parameters and still obtain the same result when you run your function:


    ```

    script.py

    1 # Define `plus()` function

    2 def plus(a,b):

    3     return a + b

    4

    5 # Call `plus()` function with keyword arguments

    6 plus(b=2, a=1)


    IPython Shell

    In [1]:

    ```


    # Variable Number of Arguments


    You can make use of the following syntax with *args if you don''t know the precise
    amount of arguments you want to provide to a function:


    ```

    script.py

    1 # Define `plus()` function to accept a variable number of arguments

    2 def plus(*args):

    3     return sum(args)

    4

    5 # Calculate the sum

    6 plus(1,4,5)


    IPython Shell

    In [1]:

    ```


    An asterisk (*) is put before the variable name that carries the values of all
    non keyword variable parameters, an asterisk (*) is put. Note that you might have
    called the addition() function *variant, *var int args, or any other name. Replace
    *args with a different name that includes an asterisk. You''ll notice that the
    code above continues to work! You can see how the above program uses the built-in
    Python sum() function to add up all of the arguments supplied to plus (). If you
    want to avoid this and create the function totally from scratch, you can use this
    technique:


    ```

    script.py

    1 # Define `plus()` function to accept a variable number of arguments

    2 def plus(*args):

    3     total = 0

    4     for i in args:

    5         total += i

    6     return total

    7

    8 # Calculate the sum

    9 plus(20,30,40,50)


    IPython Shell

    In [1]:

    ```


    # Global vs. Local Variables


    Variables specified inside a function body have a local scope, while variables
    defined outside the function body have a global scope. Local variables are defined
    within a function block and can only be retrieved within that function, but global
    variables are accessible by all functions in your script:'
