    Frozenset operations

    Like normal sets, frozenset can perform several operations like copy, difference,
    symmetric_difference, intersection, and union.


    ```

    # Frozensets

    # initialize A and B

    A = frozenset([1, 2, 3, 4])

    B = frozenset([3, 4, 5, 6])


    # copying a frozenset

    C = A.copy()  # Output: frozenset({1, 2, 3, 4})

    print(C)


    # union

    print(A.union(B))  # Output: frozenset({1, 2, 3, 4, 5, 6})


    # intersection

    print(A.intersection(B))  # Output: frozenset({3, 4})


    # difference

    print(A.difference(B))  # Output: frozenset({1, 2})


    # symmetric_difference

    print(A.symmetric_difference(B))  # Output: frozenset({1, 2, 5, 6})

    ```


    # Output


    ```

    frozenset({1, 2, 3, 4})

    frozenset({1, 2, 3, 4, 5, 6})

    frozenset({3, 4})

    frozenset({1, 2})

    frozenset({1, 2, 5, 6})

    ```


    Similarly, other set techniques like issubset, isdisjoint, and issuperset are
    also available.'
