    # 1. An Infinite Loop


    When utilizing a while loop, be cautious because the condition may never become
    false if you forget to increment the counter variable in Python or write faulty
    logic.


    The loop will run indefinitely in this scenario, and the conditions after the
    loop will starve. Ctrl+C will stop the program from running.


    An infinite loop, on the other hand, might be advantageous. This is useful for
    client/server programming or when a semaphore is required.


    A semaphore is a variable that is primarily used to synchronize access to shared
    resources.


    # 2. The while loop''s else statement


    After a while loop, there may be an else statement. The block under the else expression
    is executed when the condition becomes false.


    It does not, however, run if you exit the loop or if an exception is thrown.


    ```

    >>> a=3


    >>> while(a>0):


    print(a)


    a-=1


    else:


    print("Reached 0")

    ```


    # Output


    3

    2

    1

    Reached 0


    We placed a break statement in the body of the while loop for a==1 in the following
    code. As a result, the statement in the else block is not executed when this occurs.


    ```

    >>> a=3


    >>> while(a>0):


    print(a)


    a-=1


    if a==1: break;


    else:


    print("Reached 0")

    ```


    # Output


    3

    2


    # 3. Single Statement while


    If we only have one statement in a while''s body, we may write it all in one line,
    just like an if statement.


    ```

    >>> a=3


    >>> while a>0: print(a); a-=1;

    ```


    # Output


    3'
