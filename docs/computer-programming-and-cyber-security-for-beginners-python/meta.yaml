    \n所有非出版商持有的版权均归作者所有。\n\n此处提供的材料仅供教育目的，因此具有普遍性。信息的呈现不附带任何类型的合同或保证。\n\n商标的使用未经商标所有者的许可或支持，且商标的发布也未经商标所有者的许可或支持。本书中提及的所有商标和品牌均为其各自所有者的财产，与本出版物无关。\n\
    \n# 目录\n\n- 引言\n- 第1章：安装 PYTHON\n    - 在 WINDOWS 上安装 PYTHON\n        - 如何查看您 WINDOWS\
    \ 系统上的 PYTHON 版本\n        - WINDOWS 安装程序的建议\n        - 如何从 MICROSOFT 商店获取\n  \
    \      - 如何从完整安装程序安装\n    - 如何在 MAC 上设置 PYTHON\n        - 在 MAC 上，如何检查您的 PYTHON\
    \ 版本？\n        - MACOS 安装程序建议\n        - 如何使用官方安装程序安装\n        - 从 HOMEBREW 安装\n\
    \    - PYTHON 特性\n    - 学习 PYTHON 的好处\n- 第2章：如何开始使用 PYTHON 编程以及您需要什么？\n    - 选择项目平台\n\
    - 第3章：PYTHON 命令\n    - 基本 PYTHON 命令\n    - 中级 PYTHON 命令\n    - 高级 PYTHON 命令\n\
    - 第4章：创建您的第一个 PYTHON 程序\n    - 初级 PYTHON 项目创意\n- 第5章：PYTHON 中的函数\n- 第6章：数据类型\n\
    - 第7章：PYTHON 集合与布尔值及语法\n- 第8章：PYTHON 字符串教程 – PYTHON 字符串函数与操作\n    - PYTHON 字符串操作\n\
    - 第9章：PYTHON 列表示例 – 完整的 PYTHON 列表教程\n    - PYTHON 列表操作\n    - PYTHON 列表推导式\n-\
    \ 第10章：FROZENSET\n- 第11章：字典与元组\n    - 字典\n- 第12章：PYTHON 变量与数据类型 – 初学者完整指南\n  \
    \  - PYTHON 数据类型\n    - PYTHON 局部变量与全局变量\n- 第13章：PYTHON 中的模块与包\n- 第14章：PYTHON\
    \ 循环教程 – PYTHON FOR 循环，嵌套 FOR 循环\n- 第15章：PYTHON 类教程 – PYTHON 对象与属于类的属性\n- 第16章：深入\
    \ PYTHON 闭包与装饰器\n    - PYTHON 闭包简介\n- 第17章：函数式编程\n- 第18章：PYTHON 装饰器教程 – 链式装饰器，PYTHON\
    \ PIE 语法\n- 第19章：NUMPY 数组\n- 第20章：PYTHON 中的 PANDAS\n- 第21章：PYTHON 生成器\n- 第22章：PYTHON\
    \ 函数参数类型、语法与示例\n- 第23章：PYTHON 异常 – PYTHON 错误与内置异常\n- 第24章：分支\n- 第25章：PYTHON 包教程\
    \ – 如何创建您的包\n- 第26章：实际应用，TWITTER\n- 第27章：什么是 PYTHON 日历\n\n# 引言\n\nPython 是一门极佳的编程语言，可用于广泛的软件开发项目。Python\
    \ 可用于多种任务，包括 Web 开发、数据分析、机器学习和人工智能。\n\nGuido Rossum 于 1989 年设计了 Python，作为一种面向对象的编程语言。它非常适合快速构建复杂应用的原型。它可以扩展到\
    \ C 或 C++，并具有与众多操作系统系统调用和库的接口。许多重要公司都使用 Python，包括 NASA、Google、YouTube、BitTorrent\
    \ 等。\n\nPython 旨在成为一种非常易于理解的语言。它通常使用英语术语而非标点符号，并且比其他语言具有更少的语法结构。\n\n对于希望成为卓越软件工程师的学生和在职专业人士来说，Python\
    \ 是一项必备技能，尤其是在 Web 开发领域工作的人。\n\n在本课程中，您将学习 Python 编程语言的基础知识以及编程最佳实践。您将学习如何使用 Python\
    \ 数据类型和变量来表示和存储数据，以及如何使用条件语句和循环来控制应用程序的流程。您将使用复杂的数据结构（如列表、集合、字典和元组）来存储相关数据组。您将编写脚本，定义和记录您独特的自定义函数，并处理错误。最后，您将学习如何使用\
    \ Python 标准库和其他第三方库来识别和使用模块。\n\n# 第1章：安装 PYTHON\n\n成为 Python 程序员的第一步是在您的计算机上安装或更新\
    \ Python。您可以使用包管理器安装 Python，从 Python.org 获取官方 Python 发行版，或者安装用于科学计算、物联网和嵌入式设备的定制发行版。\n\
    \n本教程侧重于官方版本，因为它们是开始学习 Python 编程的最佳方式。\n\n您将学习如何：\n\n- 检查您的计算机上是否安装了 Python 以及其版本；\n\
    - 在 Windows、macOS 和 Linux 上更新或安装 Python；以及\n- 在手机和平板电脑等移动设备上使用 Python\n- 使用在线解释器在\
    \ Web 上使用 Python。\n\n无论您使用什么操作系统，本书都将为您提供帮助。从下面的列表中选择您的操作系统并开始吧！\n\n## 在 WINDOWS\
    \ 上安装 PYTHON\n\n在 Windows 上，有三种安装选项：\n\n1.  Microsoft Store\n2.  完整安装程序\n3.  适用于\
    \ Windows 的 Linux 子系统\n\n在本章中，您将学习如何检查您的 Windows 机器上安装了哪个版本的 Python。您还将了解这三种安装选项中哪一种最适合您。\n\
    \n## 如何查看您 WINDOWS 系统上的 PYTHON 版本\n\n打开一个命令行应用程序，例如 PowerShell，以查看您的 Windows PC\
    \ 上是否已安装 Python。\n\n以下是启动 PowerShell 的方法：\n\n1.  按键盘上的 Win 键。\n2.  在搜索框中键入 PowerShell。\n\
    3.  按 Enter 键。\n\n您也可以右键单击“开始”按钮，然后选择 Windows PowerShell 或 Windows PowerShell（管理员）。\n\
    \n您也可以使用 Windows 终端或 cmd.exe。\n\n在命令提示符下输入此命令并按 Enter：\n\n```\nC:\\> python –version\n\
    Python 3.8.4\n```\n\n您可以使用 —version 开关来了解安装的版本。您也可以使用 -V 开关来达到相同的效果：\n\n```\n\
    C:\\> python –V\nPython 3.8.4\n```\n\n在任何一种情况下，如果您的安装版本早于 3.8.4（这是撰写本文时的最新版本），您都需要升级您的安装。\n\
    \n注意：如果您没有安装 Python 版本，以下每个语句都将打开 Microsoft Store 并将您带到 Python 程序页面。在下一节中，您将学习如何通过\
    \ Microsoft Store 完成安装。\n\n您可以使用 cmd.exe 或 PowerShell 中的 where.exe 命令来查找安装位置：\n\
    \n- C:\\> where.exe python\n- C:\\Users\\mertz\\AppData\\Local\\Programs\\Python\\\
    Python37-32\\python.exe\n\n值得注意的是，where.exe 命令仅在您的用户帐户安装了 Python 时才有效。\n\n您的选择是什么？是"
