    \ a\n```\n\n**Output**\n\n```\n[1, 3, 5, 4]\n```\n\n### e. clear()\n\nIt empties\
    \ the Python list.\n\n```python\n>>> a.clear()\n>>> a\n```\n\n**Output**\n\n```\n\
    []\n```\n\nIt now has a False value.\n\n```python\n>>> bool(a)\n```\n\n**Output**\n\
    \n```\nFalse\n```\n\n### f. index()\n\nThe first matched index of the item supplied\
    \ is returned.\n\n```python\n>>> a=[1,3,5,3,4]\n>>> a.index(3)\n```\n\n**Output**\n\
    \n```\n1\n```\n\n### g. count()\n\nIt gives you the count of the selected object.\n\
