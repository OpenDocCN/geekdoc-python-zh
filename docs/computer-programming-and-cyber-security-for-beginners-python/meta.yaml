    # Python Expression Generator


    Generator expressions make it simple to design simple generators on the fly. It
    simplifies the process of creating generators.

    Generator expressions work similarly to lambda functions in that they construct
    anonymous generator functions.

    The syntax of a generator expression in Python is identical to that of a list
    comprehension. However, instead of square brackets, round parenthesis is used.

    The main distinction between a list comprehension and a generator expression is
    that the former creates the complete list while the latter produces one item at
    a time.

    They are sloppy in their execution ( producing items only when asked for ). As
    a result, a generator expression uses far less memory than a list comprehension.


    ```

    # Initialize the list

    my_list = [1, 3, 6, 10]


    # square each term using list comprehension

    list_ = [x**2 for x in my_list]


    # same thing can be done using a generator expression

    # generator expressions are surrounded by parenthesis ()

    generator = (x**2 for x in my_list)


    print(list_)

    print(generator)

    ```


    # Output


    ```

    [1, 9, 36, 100]

    <generator object <genexpr> at 0x7f5d4eb4bf50>

    ```


    As we can see from the example above, the generator expression did not give the
    desired output right away. It instead returned a generator object, which only
    makes objects when they are requested.

