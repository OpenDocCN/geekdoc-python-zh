  md: 'Declaring a list is rather simple—commas separate items, which are enclosed
    in brackets [ ].


    ```

    a = [1, 2.2, ''python'']

    ```


    To extract a range of items from a list, we can use the slicing operator [ ].
    In Python, the index starts at 0.


    ```

    a = [5,10,15,20,25,30,35,40]


    # a[2] = 15

    print("a[2] = ", a[2])


    # a[0:3] = [5, 10, 15]

    print("a[0:3] = ", a[0:3])


    # a[5:] = [30, 35, 40]

    print("a[5:] = ", a[5:])

    ```


    # Output


    ```

    a[2] = 15

    a[0:3] = [5, 10, 15]

    a[5:] = [30, 35, 40]

    ```


    Lists are changeable, which means that the value of a list''s elements can be
    changed.


    ```

    a = [1, 2, 3]

    a[2] = 4

    print(a)

    ```


    # Output


    ```

    [1, 2, 4]

    ```


    # Tuple in Python


    A tuple, like a list, is an ordered series of elements. Tuples vary solely in
    that they are immutable. Tuples can''t be changed once they''ve been generated.


    Tuples are used to write-protect data and because they do not alter dynamically.


    It is defined within parenthesis (), with commas between the pieces.


    ```

    t = (5,''program'', 1+3j)

    ```


    We can extract things with the slicing operator [], but we can''t change its value.'
