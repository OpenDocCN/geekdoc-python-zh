    \ 40, 50, 60, 70, 80, 90])\nprint('{}\\n'.format(ser))\nser = pd.Series([20, 15.7,\
    \ '10'])\nprint('{}\\n'.format(ser))\n# A series from a numpy array\narr = np.array([0,\
    \ 10, 20, 30, 40, 50])\nser = pd.Series(arr, dtype = np.double)\nprint('{}\\n'.format(ser))\n\
