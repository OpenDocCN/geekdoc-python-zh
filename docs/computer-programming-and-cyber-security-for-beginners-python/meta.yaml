  md: '# Chapter 6: DATA TYPES


    This tutorial will teach you about the various data types available in Python.


    Python has several data types.


    In Python, each value has a datatype. Data types are essentially classes, and
    variables are instances (objects) of these classes because everything in Python
    programming is an object.


    Python has several different data types. The following are some of the more important
    types.


    Numbers in Python


    Python numbers include integers, floating-point numbers, and complex numbers.
    In Python, they are known as int, float, and complex classes.


    The type() technique can be used to determine which class a variable or value
    belongs to. The instance() function is used to determine if an object belongs
    to a specific class.


    ```

    a = 5

    print(a, "is of type", type(a))


    a = 2.0

    print(a, "is of type", type(a))


    a = 1+2j

    print(a, "is complex number?", isinstance(1+2j,complex))

    ```


    Output


    ```

    5 is of type <class ''int''>

    2.0 is of type <class ''float''>

    (1+2j) is complex number? True

    ```


    Integers can have any length; the only limitation is the amount of memory available.


    Up to 15 decimal digits, a floating-point number is accurate. Decimal points separate
    integers and floating points.


    1.0 is a floating-point number, while 1 is an integer.


    The formula for complex numbers is x + yj, where x is the real and y is the imaginary
    parts. Here are a few illustrations.


    ```

    >>> a = 1234567890123456789

    >>> a

    1234567890123456789

    >>> b = 0.1234567890123456789

    >>> b

    0.12345678901234568

    >>> c = 1+2j

    >>> c

    (1+2j)

    ```


    The float variable b has been shortened.


    A Python list is a collection of items in a specific order. It is an extremely
    flexible datatype that is one of the most commonly used in Python. It is not necessary
    for all items in a list to be of the same type.'
