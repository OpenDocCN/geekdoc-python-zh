    # filter()


    Python''s filter() function has the following syntax:


    ```

    filter(function, *sequence)

    ```


    Filter () accepts a function called a predicate, which returns "True" if an element
    meets the predicate''s condition and "False" otherwise. The items of the original
    sequence that pass the criteria are returned by the filter() function.

    We utilize the filter() technique on a list of nations to filter out names that
    don''t contain the string "and" in the code below.


    ```

    >>> countries = [''Bosnia and Herzegovina'', ''Finland'', ''Germany'', ''Ireland'',

    ''Sweden'', ''Turkey'', ''United Kingdom'']

    >>> list(filter(lambda x: "and" in x, countries))

    [''Bosnia and Herzegovina'', ''Finland'', ''Ireland'']

    ```


    Bosnia and Herzegovina, Finland, and Ireland are the nations for which the lambda
    function returns "True," These are the countries that the filter() function maintains;
    the rest of the series is discarded.

    List comprehensions can also be used to filter elements in a sequence. This is
    thought to be a more Pythonic approach.


    ```

    >>> [country for country in countries if "and" in country]

    [''Bosnia and Herzegovina'', ''Finland'', ''Ireland'']

    ```


    It''s worth noting that we can use the map(), filter(), and reduce() functions
    in the same call. Let''s imagine we want to filter out countries with names that
    don''t include the word "land," then transform the remaining countries'' names
    to uppercase. We might do this by combining the filter() and map() functions in
    Python, as seen below:


    ```

    >>> list(map(lambda x: x.upper(), filter(lambda x: "land" in x,

    countries)))

    [''FINLAND'', ''IRELAND'']

    ```


    # reduce()


    Reduce(), unlike map() and filter(), does not return a new series (). Instead,
    a single value is returned. Similar to the other two functions, the syntax is
    as follows:


    ```

    reduce(function, *sequence)

    ```


    reduce() applies the function to the sequence''s members from left to the right,
    beginning with the first two elements.

    We combine the results of applying the function on the first two elements of the
    sequence with the third element'
