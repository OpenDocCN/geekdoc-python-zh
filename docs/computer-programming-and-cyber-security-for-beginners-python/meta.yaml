    in text editors.


    It''s here where the Regex Query Tool comes in. A regex is a collection of strings
    which means that the regex query tool can test the validity of the queries. Once
    the regex matches patterns in the text, this tells the user and highlights the
    patterns that match. Your Regex Query Tool will check the user''s passed in regex
    strings for validity.


    Users can easily check the validity of their regex strings over the web with the
    Regex Query Tool. This makes it easier for them, rather than having to use a text
    editor to check the strings.


    #### For instance, Regex Query Tools


    Here are several Regex Query Device Implementations:


    - RegexTester

    - FreeFormatter


    #### Application Info


    The main aim of this type of project is to tell the user the validity of the query
    strings that are entered. You can make it give a negative or positive response
    like Query String Is True and Query String Is Invalid, which implements the positive
    answer in green and the negative in red.


    The query method doesn''t need to be built from scratch. You can use the standard
    re library of Python, which you can use to run the query strings on the text you
    are entering. When the query string matches nothing, the re library returns None,
    and it returns the matched strings if positive.


    Some users may not fully understand regex, so you can do a page explaining how
    regex works. You can create documentation that is sufficiently interesting to
    keep users excited about learning and understanding regex.


    #### Extra Challenge


    It''s fine to do a project that just returns the regex validity. But you can add
    a replacement function, too. This means that the application checks for regex
    validity and also allows users to replace the matched strings with something else.
    So, the tool is no longer a tool for finding but also a tool for replacing.


    ### URL Shortener


    URLs can be incredibly long, and not easy to use. It''s difficult when people
    share links or even try to remember a URL, because most URLs are filled with difficult
    characters and don''t make meaningful words.


    Here''s where the Shortener URL comes in. A URL Shortener decreases the characters
    or letters in a URL and makes it easier to read and remember. A URL close to xyz.com/wwryb78&svnhkn%sghq?Sfiyh
    may be shortened to xyz.com/piojwr.


    URLs are a joy to deal around with the URL Shortener.


    #### For example, URL Shorteners


    Here are some URL Shortener Implementations:


    - Bitly

    - MeShort


    #### Tech Details


    This project idea''s main aim is to shorten the URLs. The main task the application
    will perform is to shorten URLs, and then redirect users to the original URL when
    visiting the shortened URL.


    The users input the original URL in the application, and the result will be the
    new, shortened URL. To do so, a blend of random and string modules can be used
    to generate the characters for the shortened URL.


    You will need to save the original and shortened URLs in a database as users visit
    the shortened URL days, months, or years later. When a request enters, the application
    checks whether the URL exists and redirects to the original, or redirects it to
    a 404 page.


    #### Extra Challenge


    Creating a shortened URL with random characters makes them shorter, random URLs
    better than the long ones. But you can make the users'' outcome better. To customize
    URLs, you can add a feature, so users can customize the created URLs themselves.


    Unquestionably, a custom xyz.com/mysite URL is better than a randomly produced
    xyz.com/piojwr URL.


    ### Post-It Note


    Having many thoughts and ideas in a day is normal but forgetting is also normal.
    One way of working around missing things is to pin them down before they disappear
    into thin air. Although some of the thoughts and ideas that were forgotten may
    be insignificant, some may be very important.


    That is where a Post-It note comes in: A Post-It note is a small paper with low-tack
    adhesive on the back, making it fixable to surfaces such as papers, walls. Post-it
    notes make things easier to pin down. The idea for the Post-It Note project is
    something similar. It enables users to pinpoint things down, making them accessible
    anywhere, as it is a web application.


    With the Post-It note, people can now track items everywhere, without the fear
    of missing stuff or misplacing notes — which is difficult for paper notes.


    #### Post-it Notes for examples


    Here are some Post-It Note Implementations:


    - Note.ly

    - Pinup


    #### Tech Details


    This project''s main objective is to allow users to track thoughts. This implies
    that each user will have their notes, so they will need to have an account creation
    feature in the application. This ensures every user''s notes remain private to
    them.'
  mdcn: '你必须持续学习并完成作业。如果你做得正确，六个月后回顾自己的代码时，你会觉得它糟糕透顶。


    Python是一门非常有趣且令人满足的语言，我相信只要有适当的动力，任何人都能掌握它。


    ## 选择项目平台


    你需要为程序开发一个运行平台，以便让缺乏其他技术知识的人也能使用你的程序。桌面、网页和命令行是你构建项目时可以考虑的三大主要平台。


    ## 网站


    Web应用程序是运行在网页上的应用，无需下载即可在任何设备上访问，前提是能够接入互联网。如果你想让能上网的人访问你的项目，它就需要是一个Web应用程序。


    Web应用程序有前端和后端。后端是业务逻辑所在：数据由你的后端代码进行操作和存储。前端是应用程序的界面：你的前端代码决定了Web应用程序的外观。


    作为中级Python开发者，你的主要关注点将是后端代码。然而，前端代码同样重要，因此你需要一些CSS、HTML，可能还有JavaScript的知识来构建一个简单的图形用户界面。掌握基础知识就足够了。


    另一个选择是使用Python同时处理前端和后端。得益于anvil库，你可以专注于Python代码，无需HTML、JavaScript和CSS。


    使用Python，你可以通过Django和Flask等Web框架创建Web应用程序。使用Python构建Web应用的框架列表很长。有很多选择，但最流行的Web框架仍然是Django和Flask。


    ## 桌面图形界面


    无论是在台式机还是笔记本电脑上执行任务，你都是通过应用程序来完成的。作为中级Python开发者，你也可以制作自己的桌面应用程序。


    正如你在Web应用程序中看到的，你不必学习任何前端技术来创建图形用户界面应用程序。所有部分都可以使用Python构建。


    存在用于构建桌面应用程序的框架。PySimpleGUI就是其中之一，中级Python开发者会觉得它非常用户友好。


    像PyQt5这样的高级GUI框架功能强大，但可能学习曲线较陡峭。


    你构建的桌面GUI程序可以在Windows、Linux或Mac操作系统上运行。创建项目后，你只需将其编译成适合你首选操作系统的可执行文件即可。


    ## 命令行


    命令行应用程序是在控制台窗口中运行的应用程序。这就是Windows命令提示符，以及Linux和Mac的终端。


    你会点击使用Web或GUI应用程序，但对于命令行应用程序，你需要输入命令。命令行软件用户需要具备一定的技术专长，因为他们可能需要使用命令。


    命令行应用程序可能不如Web或GUI应用程序美观或用户友好，但这并不意味着它们不如Web或GUI应用程序有效。


    - 内容聚合器

    - 便签应用

    - 测验应用

    - 网址缩短器

    - 正则表达式查询工具


    ### 内容聚合


    内容就是黄金。从博客到社交媒体平台，它存在于网络的各个角落。为了跟上潮流，你需要持续检查互联网上的新信息。保持更新的一种方法是手动检查所有网站，查看有哪些新帖子。但这很耗时，而且相当累人。


    这就是内容聚合器的用武之地：内容聚合器从网络上的不同地方收集信息，并将所有这些信息汇集到一个地方。因此，要获取最新信息，你不必访问多个网站：一个网站就足够了。


    通过内容聚合器，你可以从一个聚合了所有内容的网站获取所有最新信息。


    #### 内容聚合器示例


    以下是一些内容聚合器实现的思路：


    - Hvper

    - AllTop


    #### 应用信息


    这个项目想法的主要目标是聚合内容。接下来，你需要知道你将使用网络聚合器从哪些地方获取网页。然后，你可以使用requests等库提交HTTP请求，使用BeautifulSoup解码并抓取所需页面的内容。


    作为后台进程，你的应用程序可以实现其内容聚合功能。因此，像apscheduler或celery这样的库会有所帮助。你可以尝试使用apscheduler。它非常适合后台的小型进程。


    从不同网站抓取内容后，你需要将其保存在某个地方。因此，你将使用数据库来保存已抓取的内容。


    #### 额外挑战


    为了更具挑战性，你可以添加更多网站。这将帮助你学习如何研究网站和提取知识。


    你还可以让用户订阅你聚合的某些网站。然后，内容聚合器会在每天结束时将当天的文章发送到用户的电子邮件地址。


    ### 正则表达式查询工具


    你我每天都在处理文本。本书有其结构，它也是文本。这让你更容易理解。有时，你需要在文本中查找某些信息，而使用文本编辑器中的常规搜索工具可能效率低下。


    这就是正则表达式查询工具的用武之地。正则表达式是一组字符串的集合，这意味着正则表达式查询工具可以测试查询的有效性。一旦正则表达式匹配到文本中的模式，它就会告知用户并高亮显示匹配的模式。你的正则表达式查询工具将检查用户传入的正则表达式字符串是否有效。


    用户可以通过正则表达式查询工具轻松地在网上检查其正则表达式字符串的有效性。这比使用文本编辑器检查字符串更容易。


    #### 例如，正则表达式查询工具


    以下是几个正则表达式查询工具的实现：


    - RegexTester

    - FreeFormatter


    #### 应用信息


    这类项目的主要目标是告知用户输入的查询字符串是否有效。你可以让它给出肯定或否定的响应，例如“查询字符串有效”和“查询字符串无效”，其中肯定响应用绿色实现，否定响应用红色实现。


    查询方法不需要从头构建。你可以使用Python的标准re库，用它来对输入的文本运行查询字符串。当查询字符串没有匹配到任何内容时，re库返回None；如果匹配成功，则返回匹配的字符串。


    有些用户可能不完全理解正则表达式，因此你可以创建一个解释正则表达式工作原理的页面。你可以创建足够有趣的文档，让用户对学习和理解正则表达式保持兴趣。


    #### 额外挑战


    做一个只返回正则表达式有效性的项目是可以的。但你也可以添加替换功能。这意味着应用程序不仅检查正则表达式的有效性，还允许用户将匹配的字符串替换为其他内容。因此，该工具不再仅仅是查找工具，也是替换工具。


    ### 网址缩短器


    网址可能非常长，不易使用。当人们分享链接甚至试图记住一个网址时，这很困难，因为大多数网址都包含难以理解的字符，无法构成有意义的单词。


    这就是网址缩短器的用武之地。网址缩短器减少网址中的字符或字母，使其更易于阅读和记忆。一个类似于xyz.com/wwryb78&svnhkn%sghq?Sfiyh的网址可以缩短为xyz.com/piojwr。


    有了网址缩短器，处理网址变得轻松愉快。


    #### 例如，网址缩短器


    以下是一些网址缩短器的实现：


    - Bitly

    - MeShort


    #### 技术细节


    这个项目想法的主要目标是缩短网址。应用程序将执行的主要任务是缩短网址，然后在用户访问缩短后的网址时将其重定向到原始网址。


    用户在应用程序中输入原始网址，结果将是新的、缩短后的网址。为此，可以使用random和string模块的组合来生成缩短网址所需的字符。


    由于用户可能在几天、几个月或几年后访问缩短后的网址，你需要将原始网址和缩短后的网址保存在数据库中。当请求进入时，应用程序检查该网址是否存在，如果存在则重定向到原始网址，否则重定向到404页面。


    #### 额外挑战


    创建带有随机字符的缩短网址使其比长网址更短、更好。但你可以让用户的结果更好。为了自定义网址，你可以添加一个功能，让用户可以自己定制创建的网址。


    毫无疑问，一个自定义的xyz.com/mysite网址比随机生成的xyz.com/piojwr网址更好。


    ### 便签应用


    一天中有许多想法和思绪是正常的，但忘记也是正常的。解决遗忘问题的一种方法是在它们消失之前将其记录下来。虽然一些被遗忘的想法和思绪可能无关紧要，但有些可能非常重要。


    这就是便签的用武之地：便签是一张背面带有低粘性粘合剂的小纸片，可以粘贴在纸张、墙壁等表面上。便签使记录事情变得更容易。便签项目的想法与此类似。它使用户能够记录事情，并且由于它是一个Web应用程序，可以在任何地方访问。


    有了便签，人们现在可以随时随地跟踪物品，不用担心遗漏东西或放错纸条——这对于纸质便签来说是很难的。


    #### 便签示例


    以下是一些便签应用的实现：


    - Note.ly

    - Pinup


    #### 技术细节


    这个项目的主要目标是让用户跟踪想法。这意味着每个用户都会有他们自己的便签，因此应用程序需要具备账户创建功能。这确保了每个用户的便签对其本人保持私密。'
