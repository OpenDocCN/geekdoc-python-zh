    假设其中至少有一个 `yield` 语句（它也可以有其他 `yield` 或 `return` 语句）。`yield` 和 `return` 都会从函数返回一个值。区别在于\
    \ `return` 语句会完全关闭函数，而 `yield` 语句会暂停函数并保存其所有状态，然后在后续调用时继续。\n生成器和普通函数有什么区别？\n生成器函数与普通函数有以下不同之处。\n\
    \n-   生成器函数中可以找到一个或多个 `yield` 语句。\n-   被调用时，它返回一个对象（迭代器），但不会立即开始执行。\n-   `__iter__()`\
    \ 和 `__next__()` 等方法会自动实现。因此，我们可以使用 `next` 来迭代对象。\n-   当函数 yield 时，它会暂停，并将控制权交给调用者。\n\
    -   在调用之间，会记住局部变量及其状态。\n-   最后，当函数结束时，后续调用会自动引发 `StopIteration`。\n\n下面是一个示例，说明了所有上述概念。`my_gen()`\
