  - "[PAGE 165]\n\n# Chapter 21: PYTHON GENERATORS\n\nPython's generators\n\nBuilding\
    \ an iterator in Python takes a lot of effort. We must create a class containing\
    \ the techniques __iter__() and __next__(), maintain track of internal states\
    \ and raise StopIteration when no values are to be returned.\nThis is both lengthy\
    \ and perplexing. In such cases, the generator comes to the rescue.\nIterators\
    \ can be easily created with Python generators. All of the work indicated above\
    \ is completed automatically via Python generators.\nA generator, in simple terms,\
    \ is a function that returns an object (iterator) that we may iterate through\
    \ (one value at a time).\n\nCreate Generators in Python\n\nCreating a generator\
    \ in Python is a breeze. This is the same as creating a regular function; only\
    \ you'll use a yield statement instead of a return statement.\nSuppose there is\
    \ at least one yield statement in it (it may also have other yield or return statements).\
    \ Both yield and return will return a value from a function. The distinction is\
    \ that a return statement closes a function completely, whereas a yield statement\
    \ pauses it and saves all of its states before continuing on subsequent calls.\n\
    What are the differences between the Generator and Normal functions?\nA generator\
    \ function differs from a regular function in the following ways.\n\n+   - One\
    \ or more yield statements can be found in the Generator function.\n- When called,\
    \ it returns an object (iterator), but it does not immediately begin operation.\n\
    - Techniques like __iter__() and __next__() are automatically implemented. As\
    \ a result, we can use next to iterate through the objects ().\n- When the function\
    \ yields, it is paused, and control is handed over to the caller.\n- Between calls,\
    \ local variables and their states are remembered.\n- Finally, when the function\
    \ finishes, StopIteration is automatically raised on further calls.\n\nHere's\
    \ an example that exemplifies all of the preceding concepts. My gen() is a generator\
    \ function containing numerous yield statements.\n\n```\n# A simple generator\
    \ function\ndef my_gen():\n    n = 1\n    print('This is printed first')\n   \
    \ # Generator function contains yield statements\n    yield n\n\n    n += 1\n\
    \    print('This is printed second')\n    yield n\n\n    n += 1\n    print('This\
    \ is printed at last')\n    yield n\n```\n\nAn interactive run in the interpreter\
    \ is given below. Run these in the Python shell to see the output."
- md: "## Python Generators\n\n```python\n>>> # It returns an object but does not\
    \ start execution immediately.\n>>> a = my_gen()\n\n>>> # We can iterate through\
    \ the items using next().\n>>> next(a)\nThis is printed first\n1\n>>> # Once the\
    \ function yields, the function is paused and the control is transferred\n\n>>>\
    \ # Local variables and theirs states are remembered between successive calls.\n\
    >>> next(a)\nThis is printed second\n2\n\n>>> next(a)\nThis is printed at last\n\
    3\n\n>>> # Finally, when the function terminates, StopIteration is raised automatically\
    \ on\n>>> next(a)\nTraceback (most recent call last):\n  ...\nStopIteration\n\
    >>> next(a)\nTraceback (most recent call last):\n  ...\nStopIteration\n```\n\n\
    It's worth noting that the value of variable n is maintained between calls in\
    \ the preceding example. The local variables aren't destroyed when the function\
    \ yields, unlike conventional functions. In addition, the generator object can\
    \ only be iterated once. To restart the process, use something like `a = my_gen()`\
    \ to generate a new generator object. Last but not least, generators can be used\
    \ directly with for loops. This is because a for loop takes an iterator and uses\
    \ the next() function to traverse it. When StopIteration is raised, it automatically\
    \ ends. To learn how a for loop is implemented in Python, see here.\n\n```python\n\
    # A simple generator function\ndef my_gen():\n    n = 1\n    print('This is printed\
    \ first')\n    # Generator function contains yield statements\n    yield n\n\n\
    \    n += 1\n    print('This is printed second')\n    yield n\n\n    n += 1\n\
    \    print('This is printed at last')\n    yield n\n\n# Using for loop\nfor item\
    \ in my_gen():\n    print(item)\n```\n\nWhen you run the program, the output will\
    \ be:\n\n```\nThis is printed first\n1\nThis is printed second\n2\nThis is printed\
    \ at last\n3\n```\n\n### Generators in Python with a Loop\n\nThe preceding example\
    \ is less useful, and we looked at it only to understand what was going on in\
    \ the background. Generator functions are often built using a loop with an appropriate\
    \ ending condition. Let's look at a generator that reverses a string as an example.\n\
    \n```python\ndef rev_str(my_str):\n    length = len(my_str)\n    for i in range(length\
    \ - 1, -1, -1):\n        yield my_str[i]\n\n# For loop to reverse the string\n\
    for char in rev_str(\"hello\"):\n    print(char)\n```\n\nOutput:\n\n```\no\nl\n\
    l\ne\nh\n```\n\nThe range() function was used in this example to acquire the index\
    \ in reverse order using the for a loop. Not only does this generator function\
    \ work with strings, but it also works with other types of iterables like list,\
    \ tuple, and so on.\n\n### Python Expression Generator\n\nGenerator expressions\
    \ make it simple to design simple generators on the fly. It simplifies the process\
    \ of creating generators. Generator expressions work similarly to lambda functions\
    \ in that they construct anonymous generator functions. The syntax of a generator\
    \ expression in Python is identical to that of a list comprehension. However,\
    \ instead of square brackets, round parenthesis is used. The main distinction\
    \ between a list comprehension and a generator expression is that the former creates\
    \ the complete list while the latter produces one item at a time. They are sloppy\
    \ in their execution (producing items only when asked for). As a result, a generator\
    \ expression uses far less memory than a list comprehension.\n\n```python\n# Initialize\
    \ the list\nmy_list = [1, 3, 6, 10]\n\n# square each term using list comprehension\n\
    list_ = [x**2 for x in my_list]\n\n# same thing can be done using a generator\
    \ expression\n# generator expressions are surrounded by parenthesis ()\ngenerator\
    \ = (x**2 for x in my_list)\n\nprint(list_)\nprint(generator)\n```\n\nOutput:\n\
    \n```\n[1, 9, 36, 100]\n<generator object <genexpr> at 0x7f5d4eb4bf50>\n```\n\n\
    As we can see from the example above, the generator expression did not give the\
    \ desired output right away. It instead returned a generator object, which only\
    \ makes objects when they are requested. The following is how we can begin receiving\
    \ stuff from the generator:\n\n```python\n# Initialize the list\nmy_list = [1,\
    \ 3, 6, 10]\n\na = (x**2 for x in my_list)\nprint(next(a))\n\nprint(next(a))\n\
    \nprint(next(a))\n\nprint(next(a))\n\nnext(a)\n```\n\nWe receive the following\
    \ output when we run the aforementioned program:\n\n```\n1\n9\n36\n100\nTraceback\
    \ (most recent call last):\n  File \"<string>\", line 15, in <module>\nStopIteration\n\
    ```\n\nAs function arguments, generator expressions can be used. The round parenthesis\
    \ can be dropped when used in this way.\n\n```python\n>>> sum(x**2 for x in my_list)\n\
    146\n\n>>> max(x**2 for x in my_list)\n100\n```\n\n### Utilization of Python Generators\n\
    \nGenerators are a strong implementation for a variety of reasons.\n\n#### 1.\
    \ It's Simple to Implement\n\nIn comparison to their iterator class cousin, generators\
    \ can be constructed straightforwardly and concisely. The following is an example\
    \ of using an iterator class to implement a power of two sequences.\n\n```python\n\
    class PowTwo:\n    def __init__(self, max=0):\n        self.n = 0\n        self.max\
    \ = max\n\n    def __iter__(self):\n        return self\n\n    def __next__(self):\n\
    \        if self.n > self.max:\n            raise StopIteration\n\n        result\
    \ = 2 ** self.n\n        self.n += 1\n        return result\n```\n\nThe preceding\
    \ presentation was lengthy and perplexing. Let's try it again with a generator\
    \ function.\n\n```python\ndef PowTwoGen(max=0):\n    n = 0\n    while n < max:\n\
    \        yield 2 ** n\n        n += 1\n```\n\nThe implementation was concise and\
    \ considerably cleaner because generators kept care of information automatically.\n\
    \n#### 2. Memory Powerful\n\nBefore returning the result, a regular function that\
    \ returns a sequence will build the full sequence in memory. If the number of\
    \ elements in the sequence is huge, this is overkill. Using a generator to implement\
    \ such sequences saves memory and is preferred because it only produces one item\
    \ at a time.\n\n#### 3. Infinite Stream Representation\n\nGenerators are great\
    \ for representing an endless stream of data. Infinite streams cannot be stored\
    \ in memory, but generators can represent an infinite stream of data because they\
    \ only produce one item at a time. The generator function below can generate all\
    \ even numbers (at least in theory).\n\n```python\ndef all_even():\n    n = 0\n\
    \    while True:\n        yield n\n        n += 2\n```\n\n#### 4. Pipelining Generators\n\
    \nA set of processes can be pipelined using multiple generators. An example is\
    \ the greatest way to demonstrate this. Assume we have a machine that generates\
    \ numbers from the Fibonacci sequence. We also have a generator that squares numbers.\
    \ If we wish to compute the sum of squares of integers in the Fibonacci series,\
    \ we can pipe the output of generator functions together in the following technique.\n\
    \n```python\ndef fibonacci_numbers(nums):\n    x, y = 0, 1\n    for _ in range(nums):\n\
    \        x, y = y, x+y\n        yield x\n\ndef square(nums):\n    for num in nums:\n\
    \        yield num**2\n\nprint(sum(square(fibonacci_numbers(10))))\n```\n\nOutput:\n\
    \n```\n4895\n```\n\nThis pipelining is effective and simple to read (not to mention\
    \ a lot cooler!).\n\n## Chapter 22: PYTHON FUNCTION ARGUMENTS WITH TYPES, SYNTAX,\
    \ AND EXAMPLES\n\nIn this Python Function Arguments tutorial, we'll look at Python's\
    \ several types of function arguments, including Python Keyword Arguments, Python\
    \ Default Arguments, and Python Arbitrary Arguments.\n\nLet's get started using\
    \ Python Function Arguments.\n\nWhat is a Python function, exactly?\n\nA Python\
    \ function is a set of statements that execute in a specific order and are given\
    \ a name. We can reuse code as a result of this. The keyword ‘def’ is used to\
    \ define a function. Let's have a look at an example.\n\n```python\n>>> def sayhello():\n\
    \    \"\"\"\n    This prints Hello\n    \"\"\"\n    print(\"Hello\")\n```\n\n\
    Then we simply put the function's name in parentheses to invoke it. Take note\
    \ of the docstring as well.\n\n```python\n>>> sayhello()\n```\n\nOutput:\n\n```\n\
    Hello\n```\n\nThis one does not accept any counter-arguments. Let's have a look\
    \ at one with python function arguments.\n\n```python\n>>> def sum(a,b):\n   \
    \ return a+b\n>>> sum(2,3)\n```\n\nOutput:\n\n```\n5\n```\n\nThe interpreter complains\
    \ if just one argument is passed.\n\n```python\n>>> sum(3)\nTraceback (most recent\
    \ call last):\n  File \"<pyshell#44>\", line 1, in <module>\n    sum(3)\n```\n\
    \nOutput:\n\n```\nTypeError: sum() missing 1 required positional argument: 'b'\n\
    ```\n\nDifferent types of parameters are used in python functions to deal with\
    \ such circumstances.\n\n### Python Function Arguments Types\n\nPython arguments\
    \ functions come in a variety of shapes and sizes. Let's go over each one by one:\n\
    \n#### 1. Python Program Arguments with Default Values\n\nPython Program arguments\
    \ can have default values. The assignment operator in Python(=) is used to assign\
    \ a default value to an argument. When a function is called without a value for\
    \ an argument, the default value (as previously stated) is used."
