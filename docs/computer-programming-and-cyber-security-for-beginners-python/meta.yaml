  md: '# Chapter 25: PYTHON PACKAGES TUTORIAL – HOW TO CREATE YOUR PACKAGE


    What are Python Packages?

    Our files are organized hierarchically in our computer systems. We don''t keep
    them all in one place. Similarly, as our programs expand, we separate them into
    packages.

    Programs in real-world projects are substantially larger than what we deal with
    in our Python learning path. We can keep comparable modules together in a bundle.

    A package can have sub-packages and modules, much like a directory can have subdirectories
    and files. In earlier classes, we made extensive use of modules.

    Do you recall your math, os, and collections classes? All of the modules are included
    in the official Python distribution. In our next session, we''ll look at the differences
    between a module and a package.

    But for now, let''s have a look at Python packages.


    Python Package Structure

    A package, as previously mentioned, can contain additional Python packages and
    modules. But what makes a package different from an ordinary directory? A Python
    package must contain a file named init .py in its directory.

    You can leave it blank or fill it with startup code. However, if your directory
    lacks a init .py file, it isn''t a package; it''s just a collection of Python
    scripts. It is excellent practice to leave init .py empty.

    Take a look at the following game structure:

    Game is the root package in this case. It includes the Sound, Image, and Level
    sub packages, as well as the file, init .py. Apart from the file init .py, sound
    has the modules load, play, and pause.

    Apart from initing .py, Image has open, edit, and shut modules. Apart from init
    .py, Level provides modules for a start, load, and over.


    In Python, how do you import modules from packages?

    Several modules can be found in a Python package. You must use the dot operator
    to import one of these into your program (.)

    In the instance above, simply type at the top of your Python program to import
    the load modules from subpackage sound:

    import Game.Sound. load

    We don''t type the extension because we don''t refer to the module by that name.
    There is a load module in the subpackage Level as well, but there is no conflict
    here.

    This is because we refer to the module by its complete name.

    We could import the module under an alias to avoid having to type so much every
    time we needed to use it:

    import Game.

    Sound. Load is the same as load game.

    (You can also do the following if you''re working as an interpreter:

    loadgame=Game.Sound. load

    This is also acceptable.)

    As an alternative, you could:

    from the game

    Importing sound is time-consuming.

    Now, if the Sound subpackage provides a volume up() function, we call it:

    load game.volume up(7)

    If we did it this way, we''d be able to:'
