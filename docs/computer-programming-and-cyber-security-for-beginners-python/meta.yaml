    print("a[5:] = ", a[5:])

    ```


    # Output


    ```

    a[2] = 15

    a[0:3] = [5, 10, 15]

    a[5:] = [30, 35, 40]

    ```


    Lists are changeable, which means that the value of a list''s elements can be
    changed.


    ```

    a = [1, 2, 3]

    a[2] = 4

    print(a)

    ```


    # Output


    ```

    [1, 2, 4]

    ```


