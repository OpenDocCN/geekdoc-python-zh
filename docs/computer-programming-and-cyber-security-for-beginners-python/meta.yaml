    # Chapter 9: PYTHON LIST WITH EXAMPLES – A COMPLETE PYTHON LIST TUTORIAL


    We will learn about Python lists in today''s session. We''ll go through how to
    use Python to construct, access, slice, and reassign lists. Then we''ll look at
    how to use functions on them. We''ll also talk about Python List Operations and
    Concatenation.


    Let''s get started with the Python List Tutorial.


    What exactly is a Python List?


    The Python programming language, unlike C++ or Java, does not support arrays.
    It then provides the ‘list'' class to hold a succession of values. A Python list
    can be thought of as a set of values.


    1. How to Create Python List?


    To make a python list of items, place the elements in square brackets, separated
    by commas. This is the python syntax that you must use. After that, you can assign
    it to a variable. Remember that Python is dynamically typed; therefore, you don''t
    need to define the data type.


    ```

    >>> colors=[''red'',''green'',''blue'']

    ```


    A Python list may hold several types of values.


    ```

    >>> days=[''Monday'', ''Tuesday'', ''Wednesday'',4,5,6,7.0]

    ```


    A list may have a python list.


    ```

    >>> languages=[[''English''],[''Gujarati''],[''Hindi''],''Romanian'',''Spanish'']

    >>> languages

    ```


    Output


    ```

    [[''English''], [''Gujarati''], [''Hindi''], ''Romanian'', ''Spanish'']

    ```


    ```

    >>> type(languages[0])

    ```


    Output


    ```

    <class ''list''>

    ```


    ```

    >>> languages=[(''English'',''Albanian''),''Gujarati'',''Hindi'',''Romanian'',''Spanish'']

    >>> languages[0]

    ```


