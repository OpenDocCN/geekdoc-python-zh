- md: "Now that you've got everything set up, all you have to do is follow this development\
    \ process:\n\n- In `lambda_function.py`, define the logic of your bot.\n- Execute\
    \ `$ python entrypoint.py` from your project's root directory to test modifications.\n\
    - Once you're satisfied with your bot's performance, package the code as follows:\n\
    \    - To `requirements.txt`, add any additional libraries you used.\n    - From\
    \ your project's root directory, run `sh create-lambda-layer.sh 3.8`. It will\
    \ package the libraries in `layer.zip` for a Python 3.8+ runtime, as specified\
    \ in `requirements.txt`.\n    - Run `sh build-package.sh` from your project's\
    \ root directory. It will create a zip file called `lambda_function.zip` that\
    \ contains the code for your Lambda function.\n\nThe next step is to integrate\
    \ your bot into an AWS Lambda function.\n\n## Create an AWS Lambda Function for\
    \ your bot\n\nIt's simple to set up your bot as a Lambda function, but you must\
    \ follow the steps in the correct order. Let's have a look at the specifics.\n\
    \n1. First, establish a Lambda Layer with the libraries used in the bot's code\
    \ (the `layer.zip` file you generated earlier).\n2. Second, make a Lambda function,\
    \ submit your bot's code (`lambda_function.zip`), and add the layer you made.\n\
    3. Finally, you'll set up a trigger to run your Lambda function every day at 10\
    \ a.m. (UTC.)\n\nLet's begin by establishing a Lambda Layer.\n\nIn the Services\
    \ dropdown menu, look for Lambda. Choose the first alternative (Lambda.)\n\n![](img/a1c5e4a1633d0fcc232ce0059c778469_202_0.png)\n\
    \nOn the sidebar, select Layer from the Additional Resources section. Then choose\
    \ Create.\n\n![](img/a1c5e4a1633d0fcc232ce0059c778469_202_1.png)\n\nChoose a name\
    \ for your layer in the Create Layer section, then upload the `layer.zip` file\
    \ you created previously and pick the Python 3.8 runtime.\n\n![](img/a1c5e4a1633d0fcc232ce0059c778469_203_0.png)\n\
    \nThat concludes our discussion. You've just finished creating your Lambda Layer.\
    \ Isn't that good?\n\nThe next step is to establish a new Lambda function.\n\n\
    On the sidebar, click Functions. After that, select the Create function.\n\n![](img/a1c5e4a1633d0fcc232ce0059c778469_203_1.png)\n\
    \nAfter that, give your function a name and select the Python 3.8 runtime.\n\n\
    ![](img/a1c5e4a1633d0fcc232ce0059c778469_203_2.png)\n\nYou've figured it out!\n\
    \nAfter that, you'll upload your code, add the Lambda Layer to your technique,\
    \ and create a scheduled trigger.\n\nTo upload the code, navigate to the Function\
    \ code box, pick Action, and then Upload a `.zip` file. Save your changes by uploading\
    \ `lambda_function.zip`.\n\n![](img/a1c5e4a1633d0fcc232ce0059c778469_204_0.png)\n\
    \nYou'll need to add the Twitter API Keys as environment variables in addition\
    \ to your code. Add the following variables as key-value pairs to Environment\
    \ variables by clicking Edit and adding them as key-value pairs:\n\n![](img/a1c5e4a1633d0fcc232ce0059c778469_204_1.png)\n\
    \nYour function will then have a Lambda Layer added to it.\n\nChoose Layers and\
    \ then Add a Layer.\n\n![](img/a1c5e4a1633d0fcc232ce0059c778469_204_2.png)\n\n\
    Select Custom layers on the following screen and locate the layer you made. Then\
    \ select Add.\n\n## Add layer\n\n![](img/a1c5e4a1633d0fcc232ce0059c778469_205_0.png)\n\
    \nYou've uploaded the code, established the environment variables, and inserted\
    \ the layer by this point. The only thing you're missing is the trigger that will\
    \ make your function run.\n\nBegin by selecting the Add trigger option to add\
    \ the trigger.\n\n![](img/a1c5e4a1633d0fcc232ce0059c778469_205_1.png)\n\nIn the\
    \ next screen, fill the required fields as follows:\n\n![](img/a1c5e4a1633d0fcc232ce0059c778469_206_0.png)\n\
    \nEvery day at 10 a.m., this trigger will run your Lambda function (UTC.) Take\
    \ a look at the Schedule Expressions documentation if you want to add a different\
    \ trigger.\n\nThe only thing left to do now is to test your Lambda function. Click\
    \ the Test button to get started. It will prompt you to create a Test Event, which\
    \ you can leave at its default settings.\n\n![](img/a1c5e4a1633d0fcc232ce0059c778469_206_1.png)\n\
    \nAfter you test your function, you should see a green banner with the Execution\
    \ result: succeeded if everything went smoothly. Otherwise, return to the previous\
    \ steps and double-check that everything is in order.\n\nYou did an excellent\
    \ job! Your Twitter bot is alive and well, or should I say tweeting ;)\n\nYou\
    \ went through the entire process of creating and deploying a Twitter bot from\
    \ start to finish. It had been a long journey in which you constructed and configured\
    \ a Twitter app, developed your bot's logic on your local machine, and deployed\
    \ your bot using an AWS Lambda function.\n\n# Chapter 27: WHAT IS PYTHON CALENDAR\n\
    \nThe Python Calendar Module allows you to print calendars as well as to conduct\
    \ calendar-related operations. Monday (day=0) and Sunday (day=6) are the start\
    \ and finish dates for these calendars.\n\nThis Python calendar tutorial will\
    \ use the Gregorian calendar as the basic calendar, which can be adjusted indefinitely\
    \ in both directions.\n\nThe ISO 8601 standard specifies how zero and negative\
    \ years should be interpreted. Year 0 is referred to as ‘1 BC,’ year 1 is referred\
    \ to as ‘2 BC,’ and so on.\n\nThis module contains the Calendar class, which provides\
    \ many dates and time manipulation capabilities. Aside from that, the TextCalendar\
    \ and HTMLCalendar classes can be used to provide pre-formatted output.\n\nThis\
    \ Python Calendar Module can be imported as:\n\n```python\n>>> import calendar\
    \ as cd\n```\n\n## Calendar Class in Python\n\nThe Calendar is the first class\
    \ we'll look at. This has the following constructor syntax: `class calendar.Calendar(firstweekday=0)`\n\
    \nThis produces a Calendar object that starts on whatever day of the week we specify.\
    \ It starts on Monday by default, with a parameter value of 0.\n\nSunday, as previously\
    \ said, is at 6 p.m. We format a calendar using the principles taught in this\
    \ lesson.\n\nThe following techniques will be available on a Calendar instance:\n\
    \n### 1. iterweekdays() — Weekdays\n\nThis returns an iterator for a week's worth\
    \ of weekday numbers. The number we set as the first weekday is the first number\
    \ returned by this iterator.\n\n```python\n>>> import calendar as cd\n\n>>> c=cd.Calendar(firstweekday=1)\n\
    \n>>> for i in c.iterweekdays():\n        print(i)\n```\n\nOutput\n\n![](img/a1c5e4a1633d0fcc232ce0059c778469_207_0.png)\n\
    \n### 2. itermonthdates(year, month) – Dates of month\n\nTo acquire a complete\
    \ week, this produces an iterator for all days of the month, as well as any days\
    \ before or after it. Let's make Monday the first workday.\n\n```python\n>>> c=cd.Calendar(firstweekday=0)\n\
    \n>>> for i in c.itermonthdates(2018,12):\n        print(i)\n```\n\nOutput\n\n\
    2018-11-26\n2018-11-27\n2018-11-28\n2018-11-29\n2018-11-30\n2018-12-01\n2018-12-02\n\
    2018-12-03\n2018-12-04\n2018-12-05\n2018-12-06\n2018-12-07\n2018-12-08\n2018-12-09\n\
    2018-12-10\n2018-12-11\n2018-12-12\n2018-12-13\n2018-12-14\n2018-12-15\n2018-12-16\n\
    2018-12-17\n2018-12-18\n2018-12-19\n2018-12-20\n2018-12-21\n2018-12-22\n2018-12-23\n\
    2018-12-24\n2018-12-25\n2018-12-26\n2018-12-27\n2018-12-28\n2018-12-29\n2018-12-30\n\
    2018-12-31\n2019-01-01\n2019-01-02\n2019-01-03\n2019-01-04\n2019-01-05\n2019-01-06\n\
    \n### 3. itermonthdays(year, month) – Days of the month\n\nAs a result, we have\
    \ an iterator for the month called \"day of the month.\" Outside of the month\
    \ we provide, the days return 0.\n\n```python\n>>> for i in c.itermonthdays(2018,12):\n\
    \        print(i)\n```\n\nOutput\n\n![](img/a1c5e4a1633d0fcc232ce0059c778469_209_0.png)\n\
    \nHave you noticed how the days between November and January melt into a 0?\n\n\
