    请继续尝试一些不同的组合。\n\n## 第 13 章：PYTHON 中的模块与包\n\n本书汇编了 Python 模块和包中最重要的变化。许多程序员在确定何时以及何处使用模块或包时感到困难。\n\
    本文将展示一组清晰的区别，使编码器能够更高效地使用模块和包。\n\n### 什么是 Python 模块？\n\n一个包含多个函数的 Python 语句被称为模块。模块在代码中充当预定义库，编码器和用户都可以访问。\n\
    在代码执行期间，Python 模块还会保存库中的预定义函数。\n\n**Python 模块示例：**\n\n```python\nimport math\n\
    \nfrom math import pow\n\npow(2,8)\n\nprint(pow)\n```\n\n**输出：**\n\n```\n<built-in\
    \ function pow>\n>>>\n```\n\n### 什么是 Python 包？\n\n包是帮助初始化程序的工具集合。对于任何源代码，Python\
    \ 包都充当用户变量接口。这使得 Python 包在特定时刻的运行时适用于每个功能代码。\n\n**Python 包示例：**\n\n```python\n\
    import math\n\nprint(\"math package\")\n```\n\n**输出：**\n\n```\nmath package\n\
    >>>\n```\n\n### Python 模块和包有什么区别？\n\n1. 每个面向用户的代码都包含在一个包中，该包包含文件 `__init__.py`。然而，这不适用于运行时模块中的任何用户特定代码。\n\
    \n2. 模块是一个包含 Python 代码的文件，这些代码在后台为用户特定的编程运行。包也会修改用户解释的代码，以便在运行时可以轻松执行。\n\nPython\
    \ \"模块\" 由一个单元命名空间和本地提取的变量组成。还有一些解析函数，例如：\n\n- 变量和常量\n- 类的属性定义\n- 任何旧值或新值。\n-\
    \ 通常，一个模块对应于单个文件。\n- 在用户界面库中，一个调试工具。\n\n一些常用的工具帮助编码器创建一个使用模块的新平台，以实现高效的代码执行。在运行时，这还会在整个库中安装和分发包。\n\
    \n包的良好结构和标准布局使得使用用户特定工具变得简单。它也使运行时执行更容易。\n\n### 什么区分了 Python 包和 Python 模块？\n\n\
    什么区分了 Python 包和模块是一个经常被问到的问题。Python 包是一个库，它将代码定义为任何给定函数的单一单元。另一方面，模块是一个具有内置功能的独立库。由于其可重用性，包比模块更可取。\n\
    \n#### 显式命名空间\n\n这是一种显式定义的命名空间。\n在首次处理的代码中，这提供了默认命名空间。在代码识别中，这些命名空间充当源代码。另一方面，新开发人员可以使用库来导入它们。然而，了解通用命名空间对于正确的代码执行总是一个好主意。\n\
    \n```python\ndef thisistech():\n    a='Greetings!'\n\nthisistech()\n```\n\n**输出：**\n\
    \n```\n>>> thisistech\n<function thisistech at 0x030BFCD0>\n>>>\n```\n\n#### 便捷\
    \ API\n\n这是一种在代码中为特定对象命名空间的机制。它将用户直接带到代码的核心，使问题易于发现。这也有助于解析代码，以便在运行时用作用户界面代码。\n\
    \n```python\nimport hello\n\nhello.hey()\n```\n\n**输出：**\n\n```\n'Hey, there!'\n\
    ```"
