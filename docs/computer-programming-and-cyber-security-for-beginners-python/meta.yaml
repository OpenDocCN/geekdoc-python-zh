    hello\"):\n    print(char)\n```\n\n输出：\n\n```\no\nl\nl\ne\nh\n```\n\n在这个例子中，`range()`\
    \ 函数被用于通过 for 循环以相反的顺序获取索引。这个生成器函数不仅适用于字符串，也适用于其他类型的可迭代对象，如列表、元组等。\n\n### Python\
    \ 表达式生成器\n\n生成器表达式使得即时设计简单的生成器变得简单。它简化了创建生成器的过程。生成器表达式的工作方式类似于 lambda 函数，因为它们构造匿名生成器函数。Python\
    \ 中生成器表达式的语法与列表推导式相同。但是，它使用圆括号而不是方括号。列表推导式和生成器表达式的主要区别在于，前者创建完整的列表，而后者一次产生一个项目。它们在执行时是惰性的（仅在被请求时才产生项目）。因此，生成器表达式比列表推导式使用更少的内存。\n\
    \n```python\n# 初始化列表\nmy_list = [1, 3, 6, 10]\n\n# 使用列表推导式对每个项求平方\nlist_ = [x**2\
    \ for x in my_list]\n\n# 使用生成器表达式可以做同样的事情\n# 生成器表达式被圆括号 () 包围\ngenerator = (x**2\
    \ for x in my_list)\n\nprint(list_)\nprint(generator)\n```\n\n输出：\n\n```\n[1,\
    \ 9, 36, 100]\n<generator object <genexpr> at 0x7f5d4eb4bf50>\n```\n\n从上面的例子可以看出，生成器表达式没有立即给出所需的输出。相反，它返回了一个生成器对象，该对象仅在被请求时才生成对象。以下是我们如何开始从生成器接收内容的方式：\n\
    \n```python\n# 初始化列表\nmy_list = [1, 3, 6, 10]\n\na = (x**2 for x in my_list)\n\
    print(next(a))\n\nprint(next(a))\n\nprint(next(a))\n\nprint(next(a))\n\nnext(a)\n\
    ```\n\n当我们运行上述程序时，我们收到以下输出：\n\n```\n1\n9\n36\n100\nTraceback (most recent call\
    \ last):\n  File \"<string>\", line 15, in <module>\nStopIteration\n```\n\n生成器表达式可以用作函数参数。以这种方式使用时，可以省略圆括号。\n\
    \n```python\n>>> sum(x**2 for x in my_list)\n146\n\n>>> max(x**2 for x in my_list)\n\
    100\n```\n\n### Python 生成器的利用\n\n生成器是一种强大的实现，原因多种多样。\n\n#### 1. 易于实现\n\n与它们的迭代器类表亲相比，生成器可以被直接而简洁地构建。以下是使用迭代器类实现二的幂序列的一个例子。\n\
    \n```python\nclass PowTwo:\n    def __init__(self, max=0):\n        self.n = 0\n\
    \        self.max = max\n\n    def __iter__(self):\n        return self\n\n  \
    \  def __next__(self):\n        if self.n > self.max:\n            raise StopIteration\n\
    \n        result = 2 ** self.n\n        self.n += 1\n        return result\n```\n\
    \n前面的展示冗长且令人困惑。让我们尝试用生成器函数重新实现。\n\n```python\ndef PowTwoGen(max=0):\n    n = 0\n\
    \    while n < max:\n        yield 2 ** n\n        n += 1\n```\n\n实现变得简洁且干净得多，因为生成器自动处理了信息。\n\
    \n#### 2. 内存高效\n\n返回序列的常规函数在返回结果之前会在内存中构建完整的序列。如果序列中的元素数量巨大，这是过度的。使用生成器来实现这样的序列可以节省内存，并且是首选，因为它一次只产生一个项目。\n\
    \n#### 3. 表示无限流\n\n生成器非常适合表示无限的数据流。无限流无法存储在内存中，但生成器可以表示无限的数据流，因为它们一次只产生一个项目。下面的生成器函数可以生成所有偶数（至少在理论上）。\n\
    \n```python\ndef all_even():\n    n = 0\n    while True:\n        yield n\n  \
    \      n += 2\n```\n\n#### 4. 管道化生成器\n\n可以使用多个生成器将一组过程管道化。一个例子是展示这一点的最佳方式。假设我们有一台生成斐波那契数列数字的机器。我们还有一个对数字求平方的生成器。如果我们希望计算斐波那契数列中整数的平方和，我们可以使用以下技术将生成器函数的输出管道化在一起。\n\
    \n```python\ndef fibonacci_numbers(nums):\n    x, y = 0, 1\n    for _ in range(nums):\n\
    \        x, y = y, x+y\n        yield x\n\ndef square(nums):\n    for num in nums:\n\
    \        yield num**2\n\nprint(sum(square(fibonacci_numbers(10))))\n```\n\n输出：\n\
    \n```\n4895\n```\n\n这种管道化高效且易于阅读（更不用说酷多了！）。\n\n## 第 22 章：带类型、语法和示例的 Python 函数参数\n\
    \n在这个 Python 函数参数教程中，我们将探讨 Python 的几种函数参数类型，包括 Python 关键字参数、Python 默认参数和 Python\
    \ 任意参数。\n\n让我们开始使用 Python 函数参数。\n\nPython 函数到底是什么？\n\nPython 函数是一组按特定顺序执行并被赋予名称的语句。因此，我们可以重用代码。关键字\
    \ `def` 用于定义函数。让我们看一个例子。\n\n```python\n>>> def sayhello():\n    \"\"\"\n    This\
    \ prints Hello\n    \"\"\"\n    print(\"Hello\")\n```\n\n然后我们只需将函数名放在括号中即可调用它。也要注意文档字符串。\n\
    \n```python\n>>> sayhello()\n```\n\n输出：\n\n```\nHello\n```\n\n这个函数不接受任何参数。让我们看一个带有\
    \ Python 函数参数的例子。\n\n```python\n>>> def sum(a,b):\n    return a+b\n>>> sum(2,3)\n\
    ```\n\n输出：\n\n```\n5\n```\n\n如果只传递一个参数，解释器会报错。\n\n```python\n>>> sum(3)\nTraceback\
    \ (most recent call last):\n  File \"<pyshell#44>\", line 1, in <module>\n   \
    \ sum(3)\n```\n\n输出：\n\n```\nTypeError: sum() missing 1 required positional argument:\
    \ 'b'\n```\n\nPython 函数使用不同类型的参数来处理这种情况。\n\n### Python 函数参数类型\n\nPython 函数参数有多种形式。让我们逐一介绍：\n\
    \n#### 1. 带有默认值的 Python 函数参数\n\nPython 函数参数可以有默认值。Python 中的赋值运算符 (`=`) 用于为参数分配默认值。当调用函数时未提供某个参数的值，则使用默认值（如前所述）。"
