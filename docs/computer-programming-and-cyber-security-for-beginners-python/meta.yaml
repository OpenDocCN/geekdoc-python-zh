    \ the value of variable n is maintained between calls in the preceding example.\n\
    The local variables aren't destroyed when the function yields, unlike conventional\
    \ functions. In addition, the generator object can only be iterated once.\nTo\
    \ restart the process, use something like a = my gen to generate a new generator\
    \ object ().\nLast but not least, generators can be used directly with for loops.\n\
    This is because a for loop takes an iterator and uses the next() function to traverse\
    \ it. When StopIteration is raised, it automatically ends. To learn how a for\
    \ loop is implemented in Python, see here."
