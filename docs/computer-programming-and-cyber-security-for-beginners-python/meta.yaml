  md: "# Chapter 5: FUNCTIONS IN PYTHON\n\nIn programming, functions are used to group\
    \ a collection of instructions that you want to utilize repeatedly or better self-contained\
    \ in a sub-program and called as needed due to their complexity. That is, a function\
    \ is a piece of code that is written to perform a specific task. The function\
    \ may or may not require several inputs to complete that task. The function may\
    \ or may not return one or more values when the task is completed.\n\nIn Python,\
    \ there are three categories of functions:\n\n+   - Built-in functions such as\
    \ help(), which asks for assistance, min(), which returns the minimum value, print(),\
    \ which prints an object to the terminal, and so on... An overview containing\
    \ more of these functions can be found here.\n- User-Defined Functions (UDFs),\
    \ which are functions created by users to assist them;\n- Anonymous functions,\
    \ often known as lambda functions, are not declared using the conventional def\
    \ keyword.\n\nTechniques vs. Functions\n\nA function that is part of a class is\
    \ referred to as a technique. A class instance or object accesses it. This restriction\
    \ does not apply to a function: it just relates to a solo function. This indicates\
    \ that while all techniques are functions, not all functions are techniques.\n\
    \nConsider this example, where you first define a function `plus()` and then a\
    \ `Summation` class with a `sum()` technique:\n\n```\npython\n# Define a function\
    \ 'plus()'\ndef plus(a,b):\n    return a + b\n\n# Create a 'Summation' class\n\
    class Summation(object):\n    def sum(self, a, b):\n        self.contents = a\
    \ + b\n        return self.contents\n```\n\nYou must first define an instance\
    \ or object of the Summation class before calling the sum() function. So, let's\
    \ make a definition for such an object:\n\n```\npython\n# Instantiate 'Summation'\
    \ class to call 'sum()'\nsumInstance = Summation()\nsumInstance.sum(1,2)\n```\n\
    \nRemember that this instantiation isn't required when calling the function plus()!\
    \ You should be able to execute plus(1,2) without any issues in the DataCamp Light\
    \ code block!\n\nArguments vs. Parameters\n\nParameters are the names given to\
    \ functions and techniques when they are defined and where arguments are mapped.\
    \ In other words, arguments are the things that are passed into a function or\
    \ technique call, whereas the function or technique code refers to the arguments\
    \ as parameter names.\n\nConsider the following scenario, then return to the DataCamp\
    \ Light chunk: Even though you created three parameters, self, a, and b, you pass\
    \ two arguments to the Summation class's sum() technique.\n\nSo, what happened\
    \ to you?\n\nEvery class technique's first argument references the class's current\
    \ instance, which is Summation. This argument is commonly referred to as \"self.\"\
    \n\nBecause the self is the parameter name for an implicitly given argument that\
    \ refers to the instance via which a technique is invoked, you don't pass the\
    \ reference to self in this situation. It is implicitly placed into the argument\
    \ list."
