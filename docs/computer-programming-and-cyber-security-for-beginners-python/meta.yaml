    # Chapter 23: PYTHON REGULAR EXPRESSION FUNCTIONS


    Regular Expressions in Python is one of my favorite topics. Let''s get started
    with Python Regex Tutorial without wasting any time.


    Metacharacters, samples, and functionalities of Python Regex will be discussed
    here. We''ll also go over Python find all and Python multiline.


    Let''s get started with a quick Python Regex Cheat Sheet.


    What is a regular expression (Regex) in Python?


    A Python regular expression is essentially a string of characters that defines
    a search pattern.


    Using this pattern in a string-searching technique, we can then “find” or “find
    and replace” strings. This feature is also available in Microsoft Word.


    We will study the fundamentals of regular expressions in Python in this Python
    Regex lesson. We''ll utilize the re module for this.


    Before we begin, let''s import it.


    ```

    >>> import re

    ```


    Metacharacters in Python Regex


    In a Python Regex, each character is either a metacharacter or a regular character.
    A metacharacter has a unique meaning, whereas a standard character is a mirror
    image of itself.


    The following metacharacters are available in Python:


    | Metacharacter | Description |

    | :--- | :--- |

    | ^ | Matches the start of the string |

    | . | Matches a single character, except a newline<br>But when used inside square
    brackets, a dot is matched |

    | [] | A bracket expression matches a single character from the ones inside it<br>[abc]
    matches ‘a’, ‘b’, and ‘c’<br>[a-z] matches characters from ‘a’ to ‘z’<br>[a-cx-z]
    matches ‘a’, ‘b’, ‘c’, ‘x’, ‘y’, and ‘z’ |

    | [^ ] | Matches a single character from those except the ones mentioned in the
    brackets[^abc]<br>matches all characters except ‘a’, ‘b’ and ‘c’ |

    | () | Parentheses define a marked subexpression, also called a block, or a capturing
    group |

    | \t, \n, \r, \f | Tab, newline, return, form feed |

    | * | Matches the preceding character zero or more times<br>ab*c matches ‘ac’,
    ‘abc’, ‘abbc’, and so on<br>[ab]* matches ‘’, ‘a’, ‘b’, ‘ab’, ‘ba’, ‘aba’, and
    so on<br>(ab)* matches ‘’, ‘ab’, ‘abab’, ‘ababab’, and so on |

    | {m,n} | Matches the preceding character minimum m times, and maximum n times<br>a{2,4}
    matches ‘aa’, ‘aaa’, and ‘aaaa’ |'
  - '[PAGE 176]


    | Symbol | Description |

    |---|---|

    | {m} | Matches the preceding character exactly m times |

    | ? | Matches the preceding character zero or one times<br>ab?c matches ''ac''
    or ''abc'' |

    | + | Matches the preceding character one or one times<br>ab+c matches ''abc'',
    ''abbc'', ''abbbc'', and so on, but not ''ac'' |

    | \| | The choice operator matches either the expression before it, or the one
    after<br>abc\|def matches ''abc'' or ''def'' |

    | \w | Matches a word character (a-zA-Z0-9)<br>\W matches single non-word characters
    |

    | \b | Matches the boundary between word and non-word characters |

    | \s | Matches a single whitespace character<br>\S matches a single non-whitespace
    character |

    | \d | Matches a single decimal digit character (0-9) |

    | \ | A single backslash inhibits a character''s specialness<br>Examples- \. \
    \*<br>When unsure if a character has a special meaning, put a \ before it:<br>\@
    |

    | $ | A dollar matches the end of the string |


    Backslashes are not handled in any special way by a raw string literal. To do
    so, add an ''r'' to the beginning of the pattern.


    You might have to use ''\'' for a single backslash character if you don''t have
    this. However, you simply need r"" for this.


    Characters that are similar to one another.


    # A Match''s Rules


    So, how does this function in practice? The following guidelines must be followed:


    +   1. The search traverses the string from beginning to end.

    2. The entire pattern, but not the entire string, must match.

    3. The search comes to an end with the first match.


    The group() technique returns the matching phrase if a match is discovered. If
    this is not the case, it returns None.


    ```

    >>> print(re.search(''na'', ''no''))

    ```


    # Output


    ```

    None

    ```


    Let''s have a look at a couple of key functions right now.


    # Regular Expression Functions in Python


    A few routines are available to aid in the use of Python regex.


    +   1. match ()


    A pattern and a string are sent to match(). It returns the string if they match.
    Otherwise, it will return None.


    Let us look at some regular expression match examples in Python.'
