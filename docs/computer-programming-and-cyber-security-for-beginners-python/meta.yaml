  md: '# CHAPTER 11: DICTIONARIES AND TUPLES


    Tuples and Dictionaries


    Python provides two more data structures that may store numerous objects in addition
    to lists. Dictionaries and tuples are the data structures in question. First,
    we''ll talk about tuples.


    Tuples


    Tuples are lists that can''t be changed. A list''s elements can be changed, but
    a tuple''s elements can only be accessed, not changed. The term tuple does not
    imply that this data structure may only hold two values.


    In Python, tuples are created by enclosing components in parenthesis ( ) and separating
    them with commas. The following statement creates a tuple using the integers 3,
    4, and 5.


    ```

    >>> t_var = (3,4,5)

    >>> t_var

    (3, 4, 5)

    ```


    Take note of how a list''s elements can be changed:


    ```

    >>> l_var = [3,4,5] # a list

    >>> l_var[0]= 8

    >>> l_var

    [8, 4, 5]

    ```


    A tuple''s elements cannot be updated. An error is returned if you try to assign
    a new value to one of the elements in a tuple.


    ```

    >>> t_var = (3,4,5) # a tuple

    >>> t_var[0]= 8

    >>> t_var

    ```


    The ''tuple'' object does not permit item assignment, which is a TypeError.

    To create a tuple with only one numerical value, the number must be followed by
    a comma. If there is no comma, the variable is defined as a number.


    ```

    >>> num = (5)

    >>> type(num)

    int

    ```


    The variable is classified as a tuple when a comma is added after the number.


    ```

    >>> t_var = (5,)

    >>> type(t_var)

    tuple

    ```


    # DICTIONARIES


    Key: value pairs are the building blocks of dictionaries. Lists and tuples are
    arranged and retrieved in Python based on their position. Keys and values are
    used to structure and retrieve dictionaries in Python. It doesn''t matter where
    a'
