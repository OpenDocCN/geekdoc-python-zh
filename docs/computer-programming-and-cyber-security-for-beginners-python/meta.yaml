    \nThis Python String guide will teach you what a Python string is and how to use\
    \ it with examples.\nYou'll also learn how to declare and slice a string in Python\
    \ and how to use Python String functions and operations.\nFinally, you will study\
    \ Python escape sequences.\nLet's get this Python String Tutorial started.\n\n\
    What exactly is a Python String?\nA string in Python is a collection of characters.\
    \ For handling Python strings, there is a built-in class called str.\nThe type()\
    \ technique can be used to demonstrate this.\n\n```\n>>> type('Dogs are love')\n\
    ```\n\nOutput\n\n```\n<class 'str'>\n```\n\nPython lacks the char data type, which\
    \ is found in C++ and Java.\nWhat is the method to declare a Python string?\n\
    Single quotes or double quotes can be used to declare a Python string.\n\n```\n\
    >>> a='Dogs are love'\n>>> print(a)\n```\n\nOutput\n\n```\nDogs are love\n```\n\
    \n```\n>>> a=\"Dogs are love\"\n>>> print(a)\n```\n\nOutput\n\n```\nDogs are love\n\
    ```\n\nYou can't start a string with a single quote and end it with a double quotation,\
    \ and vice versa.\n\n```\n>>> a='Dogs are love\"\n```\n\nOutput\n\n```\nSyntaxError:\
    \ EOL while scanning string literal\n```\n\n### How Do I Put Quotes in a Python\
    \ String?\n\nBecause quotes are used to delimit strings, there are a few things\
    \ to keep in mind when employing them within a string.\n\n```\n>>> a=\"Dogs are\
    \ \"love\"\"\n```\n\nOutput\n\n```\nSyntaxError: invalid syntax\n```\n\nIf you're\
    \ using double quotes inside a Python string, use single quotes to delimit the\
    \ string.\n\n```\n>>> a='Dogs are \"love\"'\n>>> print(a)\n```\n\nOutput\n\n```\n\
    Dogs are \"love.\"\n```\n\nIf you need to utilize single quotes inside a string,\
    \ split them with double-quotes.\n\n```\n>>> a=\"Dogs are 'love'\"\n>>> print(a)\n\
    ```\n\nOutput\n\n```\n'Dogs are 'love''\n```\n\n### Spanning a String Across Lines\n\
    \nYou can use triple quotes to spread a Python string across many lines.\n\n```\n\
    >>> a=\"\"\"Hello\nWelcome\"\"\"\n>>> print(a)\n```\n\nOutput\n\n```\nHello\n\
    Welcome\n```\n\nIt also retains newlines, unlike when employing a reverse slash.\n\
    \n```\n>>> a=\"Hello\\n    Welcome\"\n>>> print(a)\n```\n\nOutput\n\n```\nHello\
    \     Welcome\n```\n\n### How do I get a hold of a Python string?\n\nA string\
    \ cannot be modified; it's immutable.\n\n```\n>>> a=\"Dogs\"\n>>> a[0]=\"H\"\n\
    ```\n\nOutput\n\n```\nTraceback (most recent call last):\n  File \"<pyshell#22>\"\
    , line 1, in <module>\n    a[0]=\"H\"\nTypeError: 'str' object does not support\
    \ item assignment\n```\n\nBut you can access a string.\n\n```\n>>> a=\"Dogs are\
    \ love\"\n>>> a\n```\n\nOutput\n\n```\n'Dogs are love.'\n```\n\n```\n>>> print(a)\n\
    ```\n\nOutput\n\n```\nDogs are love\n```\n\n1. Displaying a single character\n\
    Put the index of a single character from a string in square brackets to display\
    \ it. The indexing starts at zero.\n\n```\n>>> a[1]\n```\n\nOutput\n\n```\n'o'\n\
    ```\n\n2. Slicing a string\nYou may wish to show only a portion of a string at\
    \ times. For this, use the slicing operator [].\n\n```\n>>> a[3:8]\n```\n\nOutput\n\
    \n```\n' are'\n```\n\nHere, it printed characters 3 to 7, with the indexing beginning\
    \ at 0.\n\n```\n>>> a[:8]\n```\n\nOutput\n\n```\n'Dogs are'\n```\n\nThis prints\
    \ the characters from the first to the seventh.\n\n```\n>>> a[8:]\n```\n\nOutput\n\
    \n```\n' love'\n```\n\nThis prints characters from character 8 to the end of the\
    \ string.\n\n```\n>>> a[:]\n```\n\nOutput\n\n```\n'Dogs are love.'\n```\n\nThis\
    \ prints the whole string.\n\n```\n>>> a[:-2]\n```\n\nOutput\n\n```\n'Dogs are\
    \ lo'\n```\n\nThis prints characters from the beginning to two characters less\
    \ than the end of the string.\n\n```\n>>> a[-2:]\n```\n\nOutput\n\n```\n've'\n\
    ```\n\nThis prints characters from two characters from the end to the end of the\
    \ string.\n\n```\n>>> a[-3:-2]\n```\n\nOutput\n\n```\n'o'\n```\n\nThis prints\
    \ characters from three characters from the string's end to two characters from\
    \ it.\n\nThe following codes return empty strings.\n\n```\n>>> a[-2:-2]\n```\n\
    \nOutput\n\n```\n''\n```\n\n```\n>>> a[2:2]\n```\n\nOutput\n\n```\n''\n```\n\n\
    ### Concatenation of Python Strings\n\nThe technique of joining two or more objects\
    \ is known as concatenation. The concatenation operator + can be used to link\
    \ Python Strings.\n\n```\n>>> a='Do you see this,'\n>>> b='$$?'\n>>> a+b\n```\n\
    \nOutput\n\n```\n'Do you see this, $$?'\n```\n\nLet's take another example.\n\n\
    ```\n>>> a='10'\n>>> print(2*a)\n```\n\nOutput\n\n```\n1010\n```\n\n```\n>>> '10'+10\n\
    ```\n\nOutput\n\n```\nTraceback (most recent call last):\n  File \"<pyshell#49>\"\
    , line 1, in <module>\n    '10'+10\nTypeError: must be str, not int\n```\n\n###\
    \ Python String Formatters\n\nYou might want to print variables alongside a string\
    \ at times. You can use commas or string formatters to achieve the same result.\n\
    \n```\n>>> city='Ahmedabad'\n>>> print(\"Age\",21,\"City\",city)\n```\n\nOutput\n\
    \n```\nAge 21 City Ahmedabad\n```\n\n1. f-strings\nThe letter ‘f’ precedes the\
    \ string, and the variables are mentioned in curly braces in their respective\
