  mdcn: "## 第24章：分支\n\n条件分支是编程的基本方面。当程序进行分支时，它会决定是否执行某个操作。\n\n创建分支：如果你使用Python，请研究其逻辑。\n\
    \n程序不会仅仅凭一时冲动来决定是否执行某个操作：我们依赖的是可靠的逻辑领域。\n\n强大的“if”语句是一切的起点。条件在外观上类似于循环，但它只执行一次。如果条件为True，if语句会检查它。如果为真，则执行以下缩进的代码（记住，我们使用四个空格而不是制表符来缩进代码）：\n\
    \n```\nif it's true, print (\"Hello World\")\n```\n\n运行此程序时，它将显示消息“Hello World”。将if条件更改为False：\n\
    \n```\nif the answer is False:\n    to be printed (\"Hello World\")\n```\n\n...结果将是什么也不会发生。\n\
    \n当然，你不能直接输入True或False。相反，你需要定义一个求值为True或False的条件；等号（==）是一个常见的例子。这用于确定两侧的两个事物是否相同。创建一个新文件并将password1.py代码粘贴进去。\n\
    \n**Password.py**\n\n```\npassword = \"qwerty\"\nattempt = input(\"Enter password:\
    \ \")\nif attempt == password:\n    print(\"Welcome\")\n```\n\n这段代码是一个基本程序，要求你输入密码；如果你输入正确的密码‘qwerty’，它会显示‘Welcome’。确保不要将等于逻辑运算符==与单个等号=混淆。双等号确保两侧相等，而单个等号确保两侧相等。对于新开发者来说，混淆==和=是一个常见的错误。\n\
    \n在Python中，分支是通过使用If Else语句来完成的。\n\n接下来要学习的条件分支控制是‘else’。这个命令是if的伴侣，它充当替代方案。当if分支为True时执行，而当它为False时执行另一个分支。\n\
    \n```\nif True:\n    print(\"The first branch ran\")\nelse:\n    print(\"The second\
    \ branch ran\")\n```\n\n运行此程序，你会看到‘The first branch ran’。但将True改为False：\n\n```\n\
    if False:\n    print(\"The first branch ran\")\nelse:\n    print(\"The second\
    \ branch ran\")\n```\n\n...你会看到‘The second branch ran’。让我们用这个来扩展我们的密码程序。输入password2.py中的代码。**Password2.py**\n\
    \n```\npassword = \"qwerty\"\nattempt = input(\"Enter password: \")\n\nif attempt\
    \ == password:\n    print(\"welcome\")\nelse:\n    print(\"Incorrect password!\"\
    )\n```\n\n重新启动程序。现在如果你输入正确的密码，你会得到欢迎消息。如果输入错误，你会得到一个错误通知，显示“密码不正确”。\n\n使用If、Else和Elif编写更智能的代码。\n\
    \n‘elif’是你应该知道的第三个分支语句。这个语句位于if和else语句之间，代表“else if”。考虑以下elif语句。请输入以下代码：\n\n```\n\
    if False:\n    print(\"The first block of code ran\")\nelif True:\n    print(\"\
    The second block of code ran\")\nelse:\n    print(\"The third block of code ran\"\
    )\n```\n\n运行此程序时，你会注意到它跳过了第一个if表达式，而是执行了elif语句。你会得到一条消息，显示“The second block of\
    \ code ran”。otherwise语句没有True或False条件；只要if和elif语句都不为True，它就会执行。（注意else语句是可选的；你可以只使用if和elif。）如果if和elif条件都设置为True会发生什么？试一试，看看是只运行if、elif，还是两者都运行。尝试删除else语句，看看会发生什么。这将帮助你理解if、elif和其他表达式。\n\
    \n工作场所分支：用于制作FizzBuzz的Python代码\n\n我们将向你展示一个在计算机编程面试中常用的软件。它叫做‘FizzBuzz’，用于证明你知道if、else和elif语句是什么。首先，你必须理解取模运算符（百分号）。这类似于除法运算符，用于获取除法的余数。考虑以下函数：\n\
    \n```\n10 / 4 == 2.5\n```\n\n如果我们使用取模，我们会得到：\n\n```\n10 % 4 == 2\n```\n\n取模在很多方面都很有用。你可以使用%\
    \ 2来判断一个数字是奇数还是偶数：\n\n```\n10 % 2 == 0 # this is even\n11 % 2 == 1 # this is odd\n\
    ```\n\n这个程序判断一个数字是偶数还是奇数：\n\n```\nnumber = 10\n\nif number % 2 == 0:\n    print(\"\
    The number is even\")\nelse:\n    print(\"The number is odd\")\n```\n\n用Python编写你的FizzBuzz程序\n\
    \n我们的FizzBuzz任务是打印从1到100的数字。如果数字能被3整除（例如6、3或9），则打印‘Fizz’而不是数字；如果数字能被5整除，则打印‘Buzz’而不是数字。\n\
    \n然而，如果一个数字能同时被3和5整除，例如15，你应该打印‘FizzBuzz’。\n\n在FizzBuzz中，我们向你介绍一个新元素：‘and’语句。这用于判断两个条件是否都满足：数字能同时被3和5整除。如果两个条件都为真，则返回True。\n\
    \nAnd、or和not是三个主要的逻辑运算符。前两个相当不言自明，但‘not’运算符起初可能有点令人困惑。不要担心；通过练习，你会掌握它的感觉。\n\n\
    使用fizzbuzz.py代码练习使用逻辑运算符以及if、else和elif部分。\n\n```\nfizzbuzz.py\n\ncount = 1\nend\
    \ = 100\n\nwhile count <= end:\n    if count % 5 == 0 and count % 3 == 0:\n  \
    \      print(\"FizzBuzz\")\n    elif count % 3 == 0:\n        print(\"Fizz\")\n\
    \    elif count % 5 == 0:\n        print(\"Buzz\")\n    else:\n        print(count)\n\
    \n    count += 1\n```\n\nPython的逻辑运算符\n\n逻辑运算符可用于组合条件。你有三个逻辑运算符可用：\n\nand：当两个操作数都为True时为True。\n\
    \nor：当任一操作数为True时为True：(a) 或 (b) 为真。\n\nnot：检查某事是否为真：如果a和b都为False，则not (a and\
    \ b)为True。\n\n学习如何为你的Python代码添加注释。\n\n在程序中使用注释是优秀程序员的标志。多亏了注释，人类可以理解你程序的部分内容。计算机完全忽略它们。在Python中，使用井号（#）开始注释行。它可以在自己的行上，也可以紧跟在代码行之后。Python一旦遇到#，就会停止将之后的任何内容翻译成机器码。\n\
    \n```\n# This is a comment. The whole line is ignored by the program\n# The print\
    \ statement will run, as it has no comment\n\nprint(\"Hello World\")\n\nprint(\"\
    Goodbye World\") # This is also a comment. But print() runs\n```\n\n## 第25章：PYTHON包教程——如何创建你的包\n\
    \n什么是Python包？\n我们的文件在计算机系统中是分层组织的。我们不会把它们都放在一个地方。同样，随着程序的扩展，我们将它们分成包。\n现实世界项目中的程序比我们在Python学习路径中处理的要大得多。我们可以将类似的模块放在一个包中。\n\
    一个包可以包含子包和模块，就像一个目录可以包含子目录和文件一样。在之前的课程中，我们广泛使用了模块。\n你还记得你的math、os和collections课程吗？所有这些模块都包含在官方Python发行版中。在下一节课中，我们将探讨模块和包之间的区别。\n\
    但现在，让我们先看看Python包。\n\nPython包结构\n如前所述，一个包可以包含额外的Python包和模块。但什么使一个包不同于普通目录？一个Python包必须在其目录中包含一个名为init.py的文件。\n\
    你可以将其留空或填充启动代码。但是，如果你的目录缺少init.py文件，它就不是一个包；它只是一组Python脚本。将init.py留空是一个很好的实践。\n\
    看看以下游戏结构：\n在这个例子中，Game是根包。它包括Sound、Image和Level子包，以及文件init.py。除了文件init.py，sound有load、play和pause模块。\n\
    除了initing.py，Image有open、edit和shut模块。除了init.py，Level提供了start、load和over模块。\n\n在Python中，如何从包中导入模块？\n\
    一个Python包中可以找到多个模块。你必须使用点运算符将其中一个导入到你的程序中（.）\n在上面的例子中，只需在Python程序的顶部输入以下内容，即可从子包sound导入load模块：\n\
    import Game.Sound.load\n我们不输入扩展名，因为我们不是通过那个名称引用模块。子包Level中也有一个load模块，但这里没有冲突。\n\
    这是因为我们通过完整名称引用模块。\n我们可以将模块导入为别名，以避免每次使用时都输入那么多：\nimport Game.Sound.Load as load_game\n\
    （如果你作为解释器工作，也可以这样做：\nloadgame=Game.Sound.load\n这也是可以接受的。）\n或者，你可以：\nfrom Game.Sound\
    \ import load\n现在，如果Sound子包提供了一个volume_up()函数，我们这样调用它：\nload_game.volume_up(7)\n\
    如果我们这样做，我们就能："
