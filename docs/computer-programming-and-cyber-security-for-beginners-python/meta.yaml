    >>> sayhello()\n```\n\n# Output\n\n```\n$$\nHello\n$$\n```\n\nChaining Decorators\
    \ in Python\n\nYou are not limited to only one Python decorator. That's where\
    \ the pie syntax shines. Let's have a look at how.\n\n```\n>>> def decor1(func):\n\
    \    def wrap():\n        print(\"$$$$$$$$$$$$$$$$\")\n        func()\n      \
    \  print(\"$$$$$$$$$$$$$$$$\")\n    return wrap\n\n>>> def decor2(func):\n   \
    \ def wrap():\n        print(\"###############\")\n        func()\n        print(\"\
    ###############\")\n    return wrap\n```\n\nNow, let's define the sayhello() function.\
    \ We'll use decor1 and decor2 on this.\n\n```\n>>> @decor1\n@decor2\ndef sayhello():\n\
    \    print(\"Hello\")\n\n>>> sayhello()\n```\n\n# Output\n\n```\n$$$$$$$$$$$$$$$$\n\
    ###############\nHello\n###############\n$$$$$$$$$$$$$$$$\n```\n\nNote how the\
    \ octothorpes (#) are sandwiched by dollars ($)?"
