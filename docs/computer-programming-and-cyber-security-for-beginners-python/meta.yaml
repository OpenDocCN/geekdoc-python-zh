  md: "```\n1. >>> def greeting(name='User'):\n2.         print(f\"Hello, {name}\"\
    )\n3. >>> greeting('Ayushi')\n```\n\n# Output\n\nHello, Ayushi\n\n```\n>>> greeting()\n\
    ```\n\n# Output\n\nHello, User\n\nWhen greeting() is used without an argument,\
    \ the name is set to its default value, which is ‘User.'\nA default value can\
    \ be set for any number of arguments. However, you must avoid using a non-default\
    \ option following a default argument.\nTo put it another way, if you supply a\
    \ default argument, any others that succeed must also have default values.\nThe\
    \ reason is straightforward. Assume you have a two-parameter function.\nThere\
    \ is no default value for the first argument, but there is for the second. You\
    \ simply have to submit one parameter when you call it now (assuming it was authorized).\n\
    It is the initial argument, according to the interpretation. So, what happens\
    \ to the second point? It is completely oblivious.\n\n```\n>>> def sum(a=1,b):\n\
    \    return a+b\n```\n\n# Output\n\nSyntaxError: non-default argument follows\
    \ default argument\n\nThis was all about Python 2's default arguments. Keyword\
