    \ 身份运算符\n- Python 位运算符\n\n## 1. Python 中的算术运算符\n\n此 Python 算术运算符列表中包含了用于基本数学运算的\
    \ Python 运算符。\n\n### a. 加法(+)\n将运算符两侧的值相加。\n\n```\n>>> 3+4\nOutput\n7\n```\n\n\
    ### b. 减法(-)\n从左侧值中减去右侧值。\n\n```\n>>> 3-4\nOutput\n-1\n```\n\n### c. 乘法(*)\n将运算符两侧的值相乘。\n\
    \n```\n>>> 3*4\nOutput\n12\n```\n\n### d. 除法(/)\n用左侧值除以右侧值。值得注意的是，除法产生一个浮点数值。\n\
    \n```\n>>> 3/4\nOutput\n0.75\n```\n\n### e. 幂运算(**)\n倾向于将第一个数提升到第二个数的幂。\n\n```\n\
    >>> 3**4\nOutput\n81\n```\n\n### f. 整除(//)\n将商除以整数并返回结果。它会丢弃小数点后的数字。\n\n```\n\
    >>> 3//4\n>>> 4//3\nOutput\n1\n>>> 10//3\nOutput\n3\n```\n\n### g. 取模(%)\n除以余数并返回结果。\n\
    \n```\n>>> 3%4\nOutput\n3\n>>> 4%3\nOutput\n1\n>>> 10%3\nOutput\n1\n>>> 10.5%3\n\
    Output\n1.5\n```\n\n## 2. Python 关系运算符\nPython 关系运算符执行操作数之间的比较。\n\n它们指示一个操作数是大于、小于、等于，还是这三者的组合。\n\
    \n### a. 小于(<)\n此运算符确定左侧的值是否小于右侧的值。\n\n```\n>>> 3<4\nOutput\nTrue\n```\n\n###\
    \ b. 大于(>)\n它确定运算符左侧的值是否大于右侧的值。\n\n```\n>>> 3>4\nOutput\nFalse\n```\n\n### c.\
    \ 小于或等于(<=)\n它确定运算符左侧的值是否小于或等于右侧的值。\n\n```\n>>> 7<=7\nOutput\nTrue\n```\n\n###\
    \ d. 大于或等于(>=)\n它检查运算符左侧的值是否大于或等于右侧的值。\n\n```\n>>> 0>=0\nOutput\nTrue\n```\n\n\
    ### e. 等于(==)\n此运算符确定运算符左侧的值是否等于运算符右侧的值。\n布尔值 True 等于 1 但不等于 2。此外，0 等于 False。\n\
    \n```\n>>> 3==3.0\nOutput\nTrue\n>>> 1==True\nOutput\nTrue\n>>> 7==True\nOutput\n\
    False\n>>> 0==False\nOutput\nTrue\n>>> 0.5==True\nOutput\nFalse\n```\n\n### f.\
    \ 不等于(!=)\n它确定运算符左侧的值是否与右侧的值不同。\nPython 运算符 <> 执行相同的功能。但是，它在 Python 3 中已被弃用。\n\
    当关系运算符的条件满足时，它返回 True。否则，返回 False。此返回值可用于另一个语句或表达式。\n\n```\n>>> 1!=1.0\n```\n\n\
    **输出**\n\nFalse\n\n```\n>>> -1<>-1.0\n```\n\n#这会导致语法错误\n\n## 3. Python 赋值运算符\n\
    \nPython 赋值运算符为变量赋值。在分配值之前，它可能通过一个因子对其进行修改。\n总共有八个赋值运算符：一个普通的和七个用于七种算术 Python\
    \ 运算符的。\n\n### a. 赋值(=)\n将值赋给左侧的表达式。值得注意的是，== 用于比较，而 = 用于赋值。\n\n```\n>>> a=7\n\
    >>> print(a)\nOutput\n7\n```\n\n### b. 加并赋值(+=)\n将两侧的值相加并赋给左侧的表达式。表达式 a+=10 等同于\
    \ a=a+10。\n以下所有赋值运算符同理。\n\n```\n>>> a+=2\n>>> print(a)\nOutput\n9\n```\n\n###\
    \ c. 减并赋值(-=)\n从左侧值中减去右侧值。然后将其赋给左侧的表达式。\n\n```\n>>> a-=2\n>>> print(a)\nOutput\n\
    7\n```\n\n### d. 除并赋值(/=)\n用左侧值除以右侧值。然后将其赋给左侧的表达式。\n\n```\n>>> a/=7\n>>> print(a)\n\
    Output\n1.0\n```\n\n### e. 乘并赋值(*=)\n将两侧的值相乘。然后将其赋给左侧的表达式。\n\n```\n>>> a*=8\n\
    >>> print(a)\nOutput\n8.0\n```\n\n### f. 取模并赋值(%=)\n对等式两侧执行取模运算。然后将其赋给左侧的表达式。\n\
    \n```\n>>> a%=3\n>>> print(a)\nOutput\n2.0\n```\n\n### g. 幂并赋值(**=)\n对等式两侧执行幂运算。然后将其赋给左侧的表达式。\n\
    \n```\n>>> a**=5\n>>> print(a)\nOutput\n32.0\n```\n\n### h. 整除并赋值(//=)\n对两侧的值应用整除。然后将其赋给左侧的表达式。\n\
    \n```\n>>> a//=3\n>>> print(a)\nOutput\n10.0\n```\n\n这是重要的 Python 运算符之一。\n\n##\
    \ 4. Python 逻辑运算符\n\n这些是可用于将两个或多个条件连接在一起的连接词。\n\n我们有 3 个 Python 逻辑运算符：and、or 和\
    \ not，都包含在 Python 运算符类别中。\n\n### a. Python 中的 and 运算符\n\n如果运算符两侧的条件都为真，则整个表达式为真。"
