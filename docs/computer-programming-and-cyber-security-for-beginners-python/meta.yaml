  mdcn: '## 技术细节


    本项目的主要目标是跟踪用户支出。必须进行一些统计分析，以便用户获得关于其支出的准确信息，并帮助他们更好地消费。


    虽然监控支出至关重要，但拥有一个良好的图形用户界面也是必要的。你可以使用 PySimpleGUI 创建一个独特的界面，以提升用户体验。


    像 matplotlib 和 pandas 这样的 PyData 库可以帮助创建一个支出跟踪器。


    pandas 库可用于数据分析，而 matplotlib 库可用于绘制图表。图表将为用户提供其支出的可视化表示，通常，可视化表示更容易理解。


    该应用程序将获取用户数据。这里的数据指的是输入的支出。因此，支出必须存储在数据库中。对于本项目，SQLite 数据库是一个很好的选择，因为它易于设置。SQLite
    数据库可以与 sqlite3 模块一起使用。


    ## 额外挑战


    为了让用户从本项目中受益，他们需要定期输入支出，而这很容易被遗忘。实现一个通知功能可能会对你有所帮助。因此，在一天或一周的特定时间，应用程序将发送通知，提醒他们使用支出跟踪器。


    ## 命令行项目创意


    在本节中，你将看到一些命令行项目创意。这里讨论的项目创意可以归类为实用工具。


    以下是项目背后的创意：


    -   通讯录

    -   文件连通性检查器

    -   批量文件重命名工具

    -   目录树生成器


    ## 通讯录


    我们每天都会遇到很多人。我们结交朋友和熟人。我们获取他们的联系方式以便日后联系。遗憾的是，保存收到的联系方式可能很困难。一种方法是写下联系方式。但这并不安全，因为你很容易丢失实体书。


    这就是通讯录项目派上用场的地方。通讯录是一种保存联系人详细信息的工具，例如姓名、电话号码、地址和电子邮件地址。对于这个通讯录项目，你可以创建一个软件工具，让人们保存和查找联系信息。


    用户可以利用通讯录项目的概念保存他们的联系人，这样丢失已保存联系信息的可能性更小。它将始终可以通过他们计算机上的命令行访问。


    ## 联系人软件示例


    有一些通讯录应用程序，但在命令行上找到通讯录产品很少见，因为大多数是移动端、Web 或图形用户界面应用程序。


    以下是一些通讯录实现：


    -   Pobuca Connect

    -   Simple Contacts


    ## 技术细节


    本项目的主要目的是保存联系信息。为用户设置输入联系人详细信息的命令。你可以在命令行上使用 argparse 或 click 框架。它们抽象了许多复杂的事情，因此在执行命令时，你只需专注于要运行的逻辑。


    你应该实现的一些功能包括删除联系人命令、列出已保存的联系人以及更新联系人信息。你还可以允许用户使用不同的标准列出联系人，例如按字母顺序或联系人创建日期。


    由于这是一个命令行项目，SQLite 数据库非常适合保存联系人。SQLite 是一个易于使用的设置。你可以将联系信息保存在文件中，但文件无法提供使用 SQLite
    所能获得的优势，例如性能和保护。Python 的 sqlite3 模块在本项目中使用 SQLite 数据库将非常有用。


    ## 额外挑战


    还记得你是如何将数据库存储在计算机上的吗？如果发生某些事情，比如用户丢失了他们的文件，会怎样？这意味着他们也会丢失联系信息。你也可以挑战自己，将你的账户转移到在线存储站点。为此，你可以在某些时候将数据库文件上传到云端。此外，你可以添加一个命令，允许用户自己备份数据库。这样，如果数据库文件丢失，用户仍然可以访问联系人。你应该记住，可能需要某种形式的身份验证，以便通讯录可以识别哪个数据库文件属于哪个用户。为用户实现身份验证功能是完成此任务的一种方法。


    ## 站点连通性检查器


    当你访问一个 URL 时，你期望你的浏览器能查看请求的链接。但情况并非总是如此。有时网站可能会宕机，因此你无法获得想要的结果。相反，你会收到错误通知。你可以持续尝试访问一个宕机的站点，直到它恢复并获得所需的信息。这就是站点连通性检查器项目的作用。站点连通性检查器访问一个
    URL 并返回其状态：它可能是活动的，也可能不是。站点连通性检查器会定期访问 URL，返回每次会话的结果。站点连通性检查器将为你完成所有手动工作，而不是手动访问
    URL。因此，你只需获得搜索结果，而无需浪费时间在浏览器上等待网站上线。


    ## 站点连通性检查器示例


    以下是一些站点连通性检查器的实现创意：


    -   Site24x7

    -   Ping


    ## 应用信息


    本项目的主要目标是检查站点的状态。因此，要测试网站的状态，你必须编写代码。你可以选择使用 TCP 或 ICMP 进行连接。socket 模块是一个值得研究的选择。你也可以阅读
    Python 中的套接字编程（指南）。你可以附加命令，允许用户通过你选择的系统（无论是 Button、Docopt 还是 Argparse 框架）从待检查站点列表中添加和删除站点。此外，用户应该能够启动工具、停止它并确定检查间隔。由于需要保存待检查的文件列表，你可以通过
    sqlite3 模块使用 SQLite 数据库，或者将其保存在文件中（只是一个站点列表）。


    ## 额外挑战


    该应用程序将监控站点的连接状态，并将结果显示在命令行上。但这将要求用户保持命令行处于验证状态。你将提高难度并实现一个通知功能。通知功能可以是在后台播放的声音，当站点状态改变时提醒用户。要存储站点之前的状态，你需要一个数据库。这是工具能够判断状态变化的唯一方式。


    ## 批量文件重命名工具


    有时，目录中的所有文件都必须按照特定的约定命名。例如，在一个包含 File0001.jpg 的目录中，你可以根据目录中的文件数量，将所有文件命名为数字递增的名称。手动执行此操作可能既费力又重复。批量文件重命名工具使用户能够重命名大量文件，而无需手动重命名文件。这为用户节省了大量时间。它使他们免于进行常规、枯燥的工作并犯错的麻烦。用户可以在几秒钟内使用批量文件重命名工具重命名文件，且不会出错。


    ## 批量文件重命名工具示例


    以下是批量文件重命名概念的几种实现：


    -   Rename

    -   Ren


    ## 应用信息


    这个项目创意的主要目标是重命名文件。因此，应用程序必须找到操作目标文件的方法。os、sys 和 shutil 库对本项目的大部分功能都很有用。


    使用命名约定，你的用户将能够重命名目录中的所有文件。因此，他们应该能够传递命名约定的选择。如果你理解正则表达式的工作原理，re 模块可以帮助匹配适当的命名模式。


    用户可能希望作为命令的一部分传递一个命名约定，例如 "my files"，并期望该工具将所有文件重命名为 "myfilesXYZ"，其中 XYZ 是一个数字。此外，他们应该能够选择要重命名的文件所在的目录。


    ## 额外挑战


    本项目的一个大挑战是重命名目录中的所有文件。然而，用户可能只需要重命名特定数量的文件。为了测试你的技能，你可以实现一个功能，允许用户选择要重命名的文件数量，而不是所有文件。


    请注意，仅重命名几个文件允许应用程序根据字母顺序、文件大小或文件创建时间来排列文件，具体取决于用户的需求。


    ## 目录树生成器


    目录类似于家谱：每个目录与其他目录都有特殊的关系。除了空的根目录外，没有目录是独立存在的。


    在处理文件和目录时，很难看到文件夹之间的联系，因为你只能看到当前目录中的内容。你使用文件管理器，或者从命令行工作。


    使用目录树生成器，你可以像树或地图一样查看文件和目录之间的关系。


    这使得文件和目录的定位更容易理解。在解释某些概念时，目录树图很重要，而目录树生成器使得获取文件和目录之间关系的可视化表示变得更加容易。


    ## 目录树生成器示例


    以下是一些目录树生成器的实现：


    -   Dirtreex

    -   Tree


    ## 应用信息


    目录树生成器的主要目标是可视化文件和目录之间的连接。os 库对于列出选定目录中的文件和目录非常有用。


    使用像 Argparse 或 Docopt 这样的框架有助于抽象大量事物，让你专注于编写应用程序逻辑的代码。


    在应用程序的逻辑中，你可以决定要表示哪些文件或目录。使用不同的颜色是一个很好的方法。colored 库可用于以各种颜色打印文件和文件夹。


    此外，你可以确定目录树生成器要深入到什么程度。例如，如果一个目录有十二层深的子目录，你可能只决定深入到第五层。


    如果你愿意，你也可以让用户决定目录树生成器要深入到什么程度。


    ## 额外挑战


    由于结果将在生成的目录树的命令行上显示，你可以更进一步。你可以让生成器创建目录树图像，从而本质上将文本转换为图像。


    Pillow 库对此会很有用。


