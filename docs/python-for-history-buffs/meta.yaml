    During the Renaissance, you learned about functions in Python. You used these
    tools to design a program that creates art inspired by Leonardo Da Vinci’s sketches,
    a project that combined art, history, and code in a creative way.


    In the Age of Exploration, you learned about importing modules in Python. You
    used these tools to create a compass that shows the current date and time in different
    countries, a project that combined geography, history, and code in a practical
