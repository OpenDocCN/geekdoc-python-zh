    \ a certain number of places down the alphabet. For example, with a shift of 1,\
    \ 'A' would be replaced by 'B', 'B' would become 'C', and so on.\n\nLet's say\
    \ we have a plaintext message that we want to encrypt:\n\n```python\nmessage =\
