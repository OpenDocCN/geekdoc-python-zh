    \ as input, and returns the message encrypted with the key. The key will be a\
    \ number that determines how many positions each letter in the message should\
    \ be shifted.\n\nHere's the code for our Enigma machine:\n\n```\ndef encrypt(message,\
    \ key):\n    encrypted_message = \"\"\n    for char in message:\n        if char.isalpha():\n\
    \            shift = key % 26\n            ascii_offset = 65 if char.isupper()\
    \ else 97\n            encrypted_char = chr((ord(char) - ascii_offset + shift)\
    \ % 26 + ascii_offset)\n            encrypted_message += encrypted_char\n    \
