    \ `continue`).\n\n### Loops\n\nIn Python, loops are used to execute a block of\
    \ code repeatedly until a certain condition is met. There are two types of loops\
    \ in Python: `for` and `while`.\n\n### For Loops\n\nA `for` loop is used for iterating\
    \ over a sequence (that is either a list, a tuple, a dictionary, a set, or a string)\
    \ or other iterable objects. Iterating over a sequence is called traversal.\n\n\
    Here's an example:\n\n```python\n# For loop\nfor i in range(5):\n    print(i)\n\
    ```\n\nIn this example, the `for` loop prints the numbers from 0 to 4. The `range(5)`\
    \ function generates a sequence of numbers from 0 to 4, and the for loop iterates\
    \ over this sequence, printing each number in turn.\n\n### While Loops\n\nA while\
    \ loop in Python is used to repeatedly execute a block of statements as long as\
    \ the given condition is true. The condition is checked before executing the loop\
    \ body.\n\nHere’s an example:\n\n```python\n# While loop\ni = 0\nwhile i < 5:\n\
    \    print(i)\n    i += 1\n```\n\nIn this example, the while loop prints the numbers\
    \ from 0 to 4. The loop continues to execute as long as the condition i < 5 is\
    \ true. Inside the loop, we increment the value of i by 1 after each iteration.\n\
    \n### Loop Control Statements\n\nLoop control statements change the execution\
    \ of a loop from its normal sequence. Python supports the following control statements:\
    \ break and continue.\n\n### Break Statement\n\nThe break statement in Python\
    \ terminates the current loop and resumes execution at the next statement, just\
    \ like the traditional break found in C.\n\nHere's an example:\n\n```python\n\
    # Break statement\nfor i in range(5):\n    if i == 3:\n        break\n    print(i)\n\
    ```\n\nIn this example, the for loop starts to print the numbers from 0 to 4.\
    \ However, when i equals 3, the break statement is executed, and the loop is terminated.\
    \ Thus, the numbers 0, 1, and 2 are printed, but 3 and 4 are not.\n\n### Continue\
    \ Statement\n\nThe continue statement in Python returns the control to the beginning\
    \ of the loop. The continue statement rejects all the remaining statements in\
    \ the current iteration of the loop and moves the control back to the top of the\
    \ loop.\n\nHere's an example:\n\n```python\n# Continue statement\nfor i in range(5):\n\
    \    if i == 3:\n        continue\n    print(i)\n```\n\nIn this example, the for\
