    \ Python 中可以自动化重复任务的循环。在本章中，我们将介绍 `for` 和 `while` 循环，以及循环控制语句（`break`、`continue`）。\n\
    \n### 循环\n\n在 Python 中，循环用于重复执行一段代码块，直到满足某个条件。Python 中有两种类型的循环：`for` 和 `while`。\n\
    \n### For 循环\n\n`for` 循环用于遍历一个序列（可以是列表、元组、字典、集合或字符串）或其他可迭代对象。遍历序列称为遍历。\n\n以下是一个示例：\n\
    \n```python\n# For 循环\nfor i in range(5):\n    print(i)\n```\n\n在此示例中，`for` 循环打印从\
