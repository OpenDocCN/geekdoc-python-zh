    ## 第一章：时间的黎明 – Python 基础


    我们将从最开始讲起：时间的黎明。本章介绍什么是编程以及 Python 的基础知识，就像文明最初的火花。它将涵盖：


    - Python 概述

    - 使用 Google Colab

