    \ 循环\n\nPython 中的 while 循环用于只要给定条件为真，就重复执行一段语句块。条件在执行循环体之前进行检查。\n\n以下是一个示例：\n\n\
    ```python\n# While 循环\ni = 0\nwhile i < 5:\n    print(i)\n    i += 1\n```\n\n\
    在此示例中，while 循环打印从 0 到 4 的数字。只要条件 i < 5 为真，循环就会继续执行。在循环内部，我们在每次迭代后将 i 的值增加 1。\n\
    \n### 循环控制语句\n\n循环控制语句改变循环的正常执行顺序。Python 支持以下控制语句：break 和 continue。\n\n### Break\
    \ 语句\n\nPython 中的 break 语句终止当前循环，并在下一条语句处恢复执行，就像 C 语言中的传统 break 一样。\n\n以下是一个示例：\n\
    \n```python\n# Break 语句\nfor i in range(5):\n    if i == 3:\n        break\n \
    \   print(i)\n```\n\n在此示例中，for 循环开始打印从 0 到 4 的数字。但是，当 i 等于 3 时，执行 break 语句，循环终止。因此，打印了数字\
    \ 0、1 和 2，但没有打印 3 和 4。\n\n### Continue 语句\n\nPython 中的 continue 语句将控制权返回到循环的开头。continue\
    \ 语句拒绝当前迭代循环中的所有剩余语句，并将控制权移回循环的顶部。\n\n以下是一个示例：\n\n```python\n# Continue 语句\nfor\
    \ i in range(5):\n    if i == 3:\n        continue\n    print(i)\n```\n\n在此示例中，for\
    \ 循环开始打印从 0 到 4 的数字。但是，当 i 等于 3 时，执行 continue 语句，跳过循环的当前迭代。因此，打印了数字 0、1、2 和 4，但没有打印\
    \ 3。\n\n## 项目：僧侣手稿\n\n既然我们已经介绍了循环和循环控制语句，让我们用一个项目来测试你的新技能。我们将生成一个具有重复图案的中世纪僧侣彩饰手稿。\n\
    \n黑暗时代的僧侣经常创作具有复杂、重复图案的手稿。我们可以用 Python 程序模拟这一点。\n\n假设我们想要创建一个看起来像这样的图案：\n\n```\n\
    * * * * *\n  * * * *\n* * * * *\n  * * * *\n* * * * *\n```\n\n我们可以创建一个函数，该函数接受图案的大小并生成它：\n\
    \n```python\ndef generate_pattern(size):\n    for i in range(size):\n        if\
    \ i % 2 == 0:\n            print(\"* \" * size)\n        else:\n            print(\"\
    \ *\" * size)\n```\n\n在此函数中，我们使用 for 循环遍历大小的范围。如果当前迭代是偶数（即 i % 2 == 0），我们打印一行从开头开始的星号。如果当前迭代是奇数，我们打印一行从空格后开始的星号。这创建了交替的图案。\n\
    \n现在我们可以使用此函数来生成我们的图案：\n\n```python\ngenerate_pattern(5)\n```\n\n当你运行此代码时，你应该会看到图案打印在屏幕上。\n\
    恭喜！你刚刚完成了你的第五个 Python 项目。在下一章中，我们将前往文艺复兴时期，学习 Python 中的函数。到时见！\n\n## 第六章：文艺复兴\
    \ – 函数\n\n欢迎来到文艺复兴时期，这是一个知识重生和重新发现的时代。正如文艺复兴是创新和学习的时代一样，本章将向你介绍 Python 中最强大的工具之一：函数。函数使我们能够有效地重用和管理代码，使我们的程序更有组织、更高效、更易于管理。\n\
    \n### 函数\n\n在 Python 中，函数是一个有组织的、可重用的代码块，用于执行单个相关操作。函数为你的应用程序提供更好的模块化和高度的代码重用。Python\
    \ 提供了许多内置函数，如 `print()`，也允许你创建自己的函数，这些函数称为用户定义函数。\n\n### 定义和调用函数\n\nPython 中的函数使用\
    \ `def` 关键字定义，后跟函数名和括号 `()`。任何输入参数或参数都应放在这些括号内。每个函数内的代码块以冒号 `:` 开头并缩进。\n\n以下是函数定义的示例：\n\
    \n```python\ndef greet():\n    print(\"Hello, world!\")\n```\n\n在此示例中，我们定义了一个名为\
    \ greet 的函数，当调用时打印字符串“Hello, world!”。\n\n要调用函数，你只需键入函数名后跟括号 ()。以下是我们如何调用 greet\
