    decodes messages from ancient Egyptian hieroglyphics, a project that brought history
    to life through code.


    As you entered the Roman Empire, you learned about conditional statements in Python.
    You used these tools to implement the Caesar cipher, a simple encryption technique
    used by Julius Caesar himself.


    In the Dark Ages, you learned about loops in Python. You used these tools to generate
    a medieval monk’s illuminated manuscript with repetitive patterns, a project that
    combined art and code in a unique way.


    During the Renaissance, you learned about functions in Python. You used these
    tools to design a program that creates art inspired by Leonardo Da Vinci’s sketches,
    a project that combined art, history, and code in a creative way.


    In the Age of Exploration, you learned about importing modules in Python. You
    used these tools to create a compass that shows the current date and time in different
    countries, a project that combined geography, history, and code in a practical
    way.


    During the Industrial Revolution, you learned about file I/O in Python. You used
    these tools to develop a program that can send messages in Morse code, a project
    that combined history, communication, and code in an innovative way.


    In the tumultuous times of the World Wars, you learned about error handling in
    Python. You used these tools to simulate the Enigma machine used during World
    War II to encrypt and decrypt messages, a project that combined history, cryptography,
    and code in a fascinating way.


    In the modern era of space exploration, you learned about various Python libraries
    that extend Python’s capabilities. You used these tools to analyze and visualize
    data from the Apollo moon missions, a project that combined history, space exploration,
    and code in an exciting way.


    Finally, in the age of information, you learned the basics of Data'
