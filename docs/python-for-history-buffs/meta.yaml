    **项目：年龄计算器** 学习如何创建一个简单的程序，计算历史人物如果今天还活着会是多少岁。


    # 第二章：古代文明 – Python 算术运算


    我们穿越到古代世界，探索 Python 如何执行数学运算，就像古人发明数学一样。


    - 算术运算（+、-、*、/、%）

    - 运算顺序

    - 比较运算符


    **项目：金字塔建造者** 使用 Python 计算建造你自己的金字塔需要多少块砖石。


    # 第三章：亚历山大图书馆 – 字符串和列表


    正如亚历山大图书馆是知识的中心，在本章中，我们学习 Python 中的字符串和列表，用于存储和操作信息。


    - 字符串操作

    - 列表和列表操作

    - 索引和切片


    **项目：象形文字解码器** 创建一个程序，解码来自古埃及象形文字的信息。


    # 第四章：罗马帝国 – 条件语句


    就像统治罗马帝国的法律一样，学习条件语句如何控制 Python 程序的流程。


    - If、else 和 elif 语句

    - 逻辑运算符（and、or、not）


    **项目：凯撒密码** 实现凯撒密码，这是尤利乌斯·凯撒本人使用的一种简单加密技术。


    # 第五章：黑暗时代 – 循环


    在任务重复且费力的“黑暗”时期，学习循环以及它们如何自动化重复任务。


    - For 循环

    - While 循环

    - 循环控制语句（break、continue）


    **项目：僧侣手稿** 生成具有重复图案的中世纪僧侣彩饰手稿。


    # 第六章：文艺复兴 – 函数


    就像文艺复兴时期知识的复兴和重新发现一样，学习 Python 中的函数以重用和管理代码。


    - 定义和调用函数

    - 函数参数和实参

    - Return 语句


    **项目：达芬奇笔记本** 设计一个程序，创作受达芬奇素描启发的艺术作品。


    # 第七章：大航海时代 – 导入模块


    正如探险家发现了新大陆，探索如何在 Python 中导入模块以获得新功能。


    - 模块的概念

    - 导入模块

    - Python 的 datetime 和 math 模块


    **项目：哥伦布的指南针** 创建一个指南针，显示不同国家的当前日期和时间。


    # 第八章：工业革命 – 文件 I/O


    正如工业革命改变了人们的工作方式，学习 Python 如何从文件读取和写入文件以管理数据。


