- md: "## Using Google Colab\n\nGoogle Colab is a free online platform that allows\
    \ you to write and execute Python code right in your browser. It’s a great tool\
    \ for learning Python as it doesn’t require any setup on your computer. To use\
    \ Google Colab:\n\n1. Go to [colab.research.google.com](https://colab.research.google.com)\n\
    2. Sign in with your Google account\n3. Click on “File” > “New notebook” to create\
    \ a new Python notebook\n\nGoogle Colab organizes your code into blocks, called\
    \ cells. You can run each cell of code separately.\n\nTo run a code cell in Google\
    \ Colab, follow these steps:\n\n1. Click on the cell to select it.\n2. You’ll\
    \ see a “play” button (shaped like a right arrow) on the left of the cell. Click\
    \ on this button to run the code inside the cell.\n3. Alternatively, you can use\
    \ the keyboard shortcut `Shift+Enter` to run the currently selected cell.\n\n\
    Please note that you need to be signed into your Google account to run cells in\
    \ Colab. Also, if it’s your first time running a cell in the current Colab session,\
    \ it may take a few moments for Google to allocate resources (a virtual machine)\
    \ for your notebook.\n\n## Variables\n\nIn Python, we can store data in variables.\
    \ A variable is like a container that holds a value. You can think of it as a\
    \ box that we put something inside. We can give a variable any name we like, as\
    \ long as it follows Python's naming rules. Here's an example:\n\n```\nmessage\
    \ = \"Hello, world!\"\n```\n\nIn this example, message is the variable, and “Hello,\
    \ world!” is the value we've stored in the variable.\n\n## Basic Data Types\n\n\
    Python has several basic data types. The most common ones are:\n\n- str (string):\
    \ used to represent text\n- int (integer): used to represent whole numbers\n-\
    \ float (floating point): used to represent decimal numbers\n\nHere's an example\
    \ of each:\n\n```\n# A string\nname = \"Ada Lovelace\"\n\n# An integer\nyear_born\
    \ = 1815\n\n# A float\npi_approx = 3.14\n```\n\n## Comments\n\nComments are lines\
    \ of text in your code that Python ignores. They're used to explain what your\
    \ code does, and they're a great way to make your code easier to understand. In\
    \ Python, you make a comment by starting a line with the # symbol:\n\n```\n# This\
    \ is a comment\n```\n\n## Print Statements\n\nIn Python, we can use the `print()`\
    \ function to output text to the screen. Here's an example:\n\n```\nprint(\"Hello,\
    \ world!\")\n```\n\nWhen you run this code, Python will print the phrase \"Hello,\
    \ world!\" to the screen.\n\n## Project: Age Calculator\n\nNow that we've covered\
    \ the basics, let's put your new skills to the test. We're going to create a simple\
    \ program that calculates the age of historical figures if they were alive today.\n\
    \nLet's say we want to calculate the age of Cleopatra, who was born in the year\
    \ 69 BC. We can do this by subtracting her birth year from the current year:\n\
    \n```\n# Cleopatra's birth year\nbirth_year = -69\n\n# Current year\ncurrent_year\
    \ = 2022\n\n# Calculate age\nage = current_year - birth_year\n\n# Print age\n\
    print(\"Cleopatra would be\", age, \"years old today.\")\n```\n\nWhen you run\
    \ this code, you should see the message “Cleopatra would be 2091 years old today.”\
    \ printed to the screen.\n\nCongratulations! You’ve just completed your first\
    \ Python project. In the next chapter, we’ll journey to the ancient world and\
    \ learn about arithmetic operations in Python. See you there!\n\n## Chapter 2:\
    \ Ancient Civilizations – Python Arithmetic Operations\n\nWelcome to the era of\
    \ ancient civilizations, a time when the foundations of mathematics were laid.\
    \ Just as the ancients invented mathematics, we will learn how Python performs\
    \ mathematical operations. In this chapter, we'll cover arithmetic operations,\
    \ the order of operations, and comparison operators.\n\n### Arithmetic Operations\n\
    \nPython supports a variety of arithmetic operations. These are the basic building\
    \ blocks of any mathematical calculation you might want to perform. Let's take\
    \ a look at each of them:\n\n### Addition (+)\n\nThe + operator adds two numbers\
    \ together. Here's an example:\n\n```\n# Addition\nresult = 7 + 3\nprint(result)\
    \  # Outputs: 10\n```\n\nIn this example, Python adds 7 and 3 together to get\
    \ 10.\n\n### Subtraction (-)\n\nThe - operator subtracts one number from another.\
    \ Here's an example:\n\n```\n# Subtraction\nresult = 7 - 3\nprint(result)  # Outputs:\
    \ 4\n```\n\nIn this example, Python subtracts 3 from 7 to get 4.\n\n### Multiplication\
    \ (*)\n\nThe * operator multiplies two numbers together. Here's an example:\n\n\
    ```\n# Multiplication\nresult = 7 * 3\nprint(result)  # Outputs: 21\n```\n\nIn\
    \ this example, Python multiplies 7 and 3 together to get 21.\n\n### Division\
    \ (/)\n\nThe / operator divides one number by another. Here's an example:\n\n\
    ```\n# Division\nresult = 7 / 3\nprint(result)  # Outputs: 2.3333333333333335\n\
    ```\n\nIn this example, Python divides 7 by 3 to get 2.3333333333333335.\n\n###\
    \ Modulo (%)\n\nThe % operator returns the remainder of a division operation.\
    \ Here's an example:\n\n```\n# Modulo\nresult = 7 % 3\nprint(result)  # Outputs:\
    \ 1\n```\n\nIn this example, Python divides 7 by 3 and returns the remainder,\
    \ 1.\n\n### Exponentiation (**)\n\nThe ** operator raises one number to the power\
    \ of another. Here's an example:\n\n```\n# Exponentiation\nresult = 2 ** 3\nprint(result)\
    \  # Outputs: 8\n```\n\nIn this example, Python raises 2 to the power of 3 to\
    \ get 8.\n\n### Floor Division (//)\n\nThe // operator divides one number by another\
    \ and rounds down to the nearest whole number. Here's an example:\n\n```\n# Floor\
    \ Division\nresult = 7 // 3\nprint(result)  # Outputs: 2\n```\n\nIn this example,\
    \ Python divides 7 by 3 and rounds down to 2.\n\n## Order of Operations\n\nJust\
    \ like in regular math, Python follows an order of operations. This order is often\
    \ remembered using the acronym PEMDAS:\n\n- Parentheses\n- Exponents\n- Multiplication\
    \ and Division\n- Addition and Subtraction\n\nHere’s an example:\n\n```\n# Order\
    \ of operations\nresult = (1 + 2) * 3 ** 2 / 9 - 1\nprint(result) # Outputs: 2.0\n\
    ```\n\nIn this example, Python first performs the operation in parentheses (1\
    \ + 2), then it performs the exponentiation 3 ** 2, then the division 9 / 9, and\
    \ finally the subtraction - 1.\n\n## Comparison Operators\n\nIn addition to arithmetic\
    \ operations, Python also supports comparison operators. These operators allow\
    \ you to compare two values and return a Boolean value (True or False). Here’s\
    \ a list of Python’s comparison operators:\n\n- ==: Equal to\n- !=: Not equal\
    \ to\n- <: Less than\n- >: Greater than\n- <=: Less than or equal to\n- >=: Greater\
    \ than or equal to\n\nHere’s an example of each:\n\n```\n# Equal to\nprint(7 ==\
    \ 3)  # Outputs: False\n\n# Not equal to\nprint(7 != 3)  # Outputs: True\n\n#\
    \ Less than\nprint(7 < 3)  # Outputs: False\n\n# Greater than\nprint(7 > 3)  #\
    \ Outputs: True\n\n# Less than or equal to\nprint(7 <= 3)  # Outputs: False\n\n\
    # Greater than or equal to\nprint(7 >= 3)  # Outputs: True\n```\n\n## Project:\
    \ Pyramid Builder\n\nNow that we've covered arithmetic and comparison operations,\
    \ let's put your new skills to the test. We're going to create a program that\
    \ calculates how many blocks you'd need to build your own pyramid.\n\nLet's say\
    \ we want to build a pyramid with a base of 10 blocks by 10 blocks. We can calculate\
    \ the total number of blocks needed by adding up the number of blocks in each\
    \ layer. The bottom layer has 10 * 10 = 100 blocks, the next layer has 9 * 9 =\
    \ 81 blocks, and so on, until the top layer, which has 1 * 1 = 1 block.\n\nHere's\
    \ how we can calculate this in Python:\n\n```\n# Base size\nbase = 10\n\n# Total\
    \ blocks\ntotal_blocks = 0\n\n# Calculate blocks for each layer\nfor i in range(base,\
    \ 0, -1):\n    layer_blocks = i * i\n    total_blocks += layer_blocks\n\n# Print\
    \ total blocks\nprint(\"You would need\", total_blocks, \"blocks to build your\
    \ pyramid.\")\n```\n\nWhen you run this code, you should see the message “You\
    \ would need 385 blocks to build your pyramid.” printed to the screen.\n\nCongratulations!\
    \ You’ve just completed your second Python project. In the next chapter, we’ll\
    \ journey to the Library of Alexandria and learn about strings and lists in Python.\
    \ See you there!"
  mdcn: "## 使用 Google Colab\n\nGoogle Colab 是一个免费的在线平台，允许你直接在浏览器中编写和执行 Python 代码。它是一个学习\
    \ Python 的绝佳工具，因为它不需要在你的计算机上进行任何设置。要使用 Google Colab：\n\n1.  前往 [colab.research.google.com](https://colab.research.google.com)\n\
    2.  使用你的 Google 账户登录\n3.  点击“文件” > “新建笔记本”以创建一个新的 Python 笔记本\n\nGoogle Colab 将你的代码组织成称为单元格的块。你可以单独运行每个代码单元格。\n\
    \n要在 Google Colab 中运行一个代码单元格，请按照以下步骤操作：\n\n1.  点击单元格以选中它。\n2.  你会在单元格左侧看到一个“播放”按钮（形状像一个向右的箭头）。点击此按钮即可运行单元格内的代码。\n\
    3.  或者，你可以使用键盘快捷键 `Shift+Enter` 来运行当前选中的单元格。\n\n请注意，你需要登录你的 Google 账户才能在 Colab\
    \ 中运行单元格。此外，如果你是当前 Colab 会话中第一次运行单元格，Google 可能需要一些时间为你的笔记本分配资源（一个虚拟机）。\n\n## 变量\n\
    \n在 Python 中，我们可以将数据存储在变量中。变量就像一个容纳值的容器。你可以把它想象成一个我们往里面放东西的盒子。我们可以给变量起任何我们喜欢的名字，只要它遵循\
    \ Python 的命名规则。这里有一个例子：\n\n```\nmessage = \"Hello, world!\"\n```\n\n在这个例子中，`message`\
    \ 是变量，而 \"Hello, world!\" 是我们存储在变量中的值。\n\n## 基本数据类型\n\nPython 有几种基本数据类型。最常见的有：\n\
    \n-   str（字符串）：用于表示文本\n-   int（整数）：用于表示整数\n-   float（浮点数）：用于表示小数\n\n以下是每种类型的一个示例：\n\
    \n```\n# 一个字符串\nname = \"Ada Lovelace\"\n\n# 一个整数\nyear_born = 1815\n\n# 一个浮点数\n\
    pi_approx = 3.14\n```\n\n## 注释\n\n注释是你代码中 Python 会忽略的文本行。它们用于解释你的代码做什么，是让你的代码更容易理解的好方法。在\
    \ Python 中，你通过以 `#` 符号开头来创建注释：\n\n```\n# 这是一个注释\n```\n\n## 打印语句\n\n在 Python 中，我们可以使用\
    \ `print()` 函数将文本输出到屏幕。这里有一个例子：\n\n```\nprint(\"Hello, world!\")\n```\n\n当你运行这段代码时，Python\
    \ 会将短语 \"Hello, world!\" 打印到屏幕上。\n\n## 项目：年龄计算器\n\n现在我们已经介绍了基础知识，让我们来测试一下你的新技能。我们将创建一个简单的程序，计算如果历史人物今天还活着，他们的年龄会是多少。\n\
    \n假设我们想计算出生于公元前 69 年的克利奥帕特拉的年龄。我们可以通过用当前年份减去她的出生年份来计算：\n\n```\n# 克利奥帕特拉的出生年份\n\
    birth_year = -69\n\n# 当前年份\ncurrent_year = 2022\n\n# 计算年龄\nage = current_year\
    \ - birth_year\n\n# 打印年龄\nprint(\"Cleopatra would be\", age, \"years old today.\"\
    )\n```\n\n当你运行这段代码时，你应该会看到消息 “Cleopatra would be 2091 years old today.” 被打印到屏幕上。\n\
    \n恭喜！你刚刚完成了你的第一个 Python 项目。在下一章中，我们将前往古代世界，学习 Python 中的算术运算。我们下一章见！\n\n## 第二章：古代文明\
    \ – Python 算术运算\n\n欢迎来到古代文明的时代，那是数学基础奠定的时代。正如古人发明了数学一样，我们将学习 Python 如何执行数学运算。在本章中，我们将介绍算术运算、运算顺序和比较运算符。\n\
    \n### 算术运算\n\nPython 支持多种算术运算。这些是你可能想执行的任何数学计算的基本构建块。让我们逐一了解它们：\n\n### 加法 (+)\n\
    \n`+` 运算符将两个数字相加。这里有一个例子：\n\n```\n# 加法\nresult = 7 + 3\nprint(result)  # 输出：10\n\
    ```\n\n在这个例子中，Python 将 7 和 3 相加得到 10。\n\n### 减法 (-)\n\n`-` 运算符从一个数字中减去另一个数字。这里有一个例子：\n\
    \n```\n# 减法\nresult = 7 - 3\nprint(result)  # 输出：4\n```\n\n在这个例子中，Python 从 7 中减去\
    \ 3 得到 4。\n\n### 乘法 (*)\n\n`*` 运算符将两个数字相乘。这里有一个例子：\n\n```\n# 乘法\nresult = 7 *\
    \ 3\nprint(result)  # 输出：21\n```\n\n在这个例子中，Python 将 7 和 3 相乘得到 21。\n\n### 除法 (/)\n\
    \n`/` 运算符将一个数字除以另一个数字。这里有一个例子：\n\n```\n# 除法\nresult = 7 / 3\nprint(result)  #\
    \ 输出：2.3333333333333335\n```\n\n在这个例子中，Python 将 7 除以 3 得到 2.3333333333333335。\n\
    \n### 取模 (%)\n\n`%` 运算符返回除法运算的余数。这里有一个例子：\n\n```\n# 取模\nresult = 7 % 3\nprint(result)\
    \  # 输出：1\n```\n\n在这个例子中，Python 将 7 除以 3 并返回余数 1。\n\n### 幂运算 (**)\n\n`**` 运算符将一个数字提升到另一个数字的幂。这里有一个例子：\n\
    \n```\n# 幂运算\nresult = 2 ** 3\nprint(result)  # 输出：8\n```\n\n在这个例子中，Python 将 2\
    \ 的 3 次幂计算为 8。\n\n### 整除 (//)\n\n`//` 运算符将一个数字除以另一个数字，并向下舍入到最接近的整数。这里有一个例子：\n\n\
    ```\n# 整除\nresult = 7 // 3\nprint(result)  # 输出：2\n```\n\n在这个例子中，Python 将 7 除以\
    \ 3 并向下舍入到 2。\n\n## 运算顺序\n\n就像在常规数学中一样，Python 遵循运算顺序。这个顺序通常用首字母缩写词 PEMDAS 来记忆：\n\
    \n-   括号\n-   指数\n-   乘法和除法\n-   加法和减法\n\n这里有一个例子：\n\n```\n# 运算顺序\nresult = (1\
    \ + 2) * 3 ** 2 / 9 - 1\nprint(result) # 输出：2.0\n```\n\n在这个例子中，Python 首先执行括号内的运算\
    \ (1 + 2)，然后执行指数运算 3 ** 2，接着是除法 9 / 9，最后是减法 - 1。\n\n## 比较运算符\n\n除了算术运算，Python\
    \ 还支持比较运算符。这些运算符允许你比较两个值并返回一个布尔值（True 或 False）。以下是 Python 比较运算符的列表：\n\n-   ==：等于\n\
    -   !=：不等于\n-   <：小于\n-   >：大于\n-   <=：小于或等于\n-   >=：大于或等于\n\n以下是每种运算符的一个示例：\n\
    \n```\n# 等于\nprint(7 == 3)  # 输出：False\n\n# 不等于\nprint(7 != 3)  # 输出：True\n\n\
    # 小于\nprint(7 < 3)  # 输出：False\n\n# 大于\nprint(7 > 3)  # 输出：True\n\n# 小于或等于\nprint(7\
    \ <= 3)  # 输出：False\n\n# 大于或等于\nprint(7 >= 3)  # 输出：True\n```\n\n## 项目：金字塔建造者\n\
    \n现在我们已经介绍了算术和比较运算，让我们来测试一下你的新技能。我们将创建一个程序，计算建造你自己的金字塔需要多少块积木。\n\n假设我们想建造一个底座为\
    \ 10 块乘以 10 块的金字塔。我们可以通过将每一层的积木数量相加来计算所需的总积木数。底层有 10 * 10 = 100 块积木，下一层有 9 * 9\
    \ = 81 块积木，依此类推，直到顶层，有 1 * 1 = 1 块积木。\n\n以下是我们如何在 Python 中计算这个：\n\n```\n# 底座大小\n\
    base = 10\n\n# 总积木数\ntotal_blocks = 0\n\n# 计算每一层的积木数\nfor i in range(base, 0,\
    \ -1):\n    layer_blocks = i * i\n    total_blocks += layer_blocks\n\n# 打印总积木数\n\
    print(\"You would need\", total_blocks, \"blocks to build your pyramid.\")\n```\n\
    \n当你运行这段代码时，你应该会看到消息 “You would need 385 blocks to build your pyramid.” 被打印到屏幕上。\n\
    \n恭喜！你刚刚完成了你的第二个 Python 项目。在下一章中，我们将前往亚历山大图书馆，学习 Python 中的字符串和列表。我们下一章见！"
