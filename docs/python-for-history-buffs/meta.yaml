    \ = \"\"\n    for char in message:\n        if char in alphabet:\n           \
    \ index = (alphabet.index(char) + shift) % 26\n            encrypted_message +=\
    \ alphabet[index]\n        else:\n            encrypted_message += char\n    return\
    \ encrypted_message\n```\n\nNow we can use this function to encrypt our message:\n\
    \n```python\nmessage = \"HELLO\"\nshift = 3\nprint(caesar_cipher(message, shift))\
