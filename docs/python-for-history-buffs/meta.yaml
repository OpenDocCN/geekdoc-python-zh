    Welcome to the Industrial Revolution, a period of rapid industrial growth that
    drastically changed the way people lived and worked. Just as the Industrial Revolution
    transformed the world, learning about file input/output (I/O) in Python will revolutionize
    the way you handle data.


    # ## File I/O


    In Python, we can read from and write to files directly from our programs. This
    is known as file I/O (input/output). File I/O is crucial when you want to save
    data for later use or read data from a file for processing in your program.


    # ## Opening and Closing Files


    Before we can read from or write to a file, we need to open it. We do this using
    the `open` function, which takes two parameters: the name of the file and the
    mode in which to open it. The mode can be ‘r’ for read mode, ‘w’ for write mode,
    ‘a’ for append mode, or ‘x’ to create a new file. If the mode is not specified,
    Python will open the file in read mode by default.


    Here’s an example of how to open a file:


    ```

    python

    file = open(''example.txt'', ''r'')

    ```'
