    ### 函数参数和参数\n\n函数也可以接受参数，这些参数是函数用于执行其任务的值。参数在定义函数时在括号内指定，当我们调用函数时，我们为这些参数提供值（称为参数）。\n\
    \n以下是带参数的函数示例：\n\n```python\ndef greet(name):\n    print(\"Hello, \" + name +\
