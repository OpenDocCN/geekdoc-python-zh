    # 前言


    欢迎来到《Python for History Buffs》！本书旨在带你踏上一段穿越时空的旅程，在探索引人入胜的历史世界的同时，学习 Python 编程的基础知识。


    编程是一项在我们现代世界中变得越来越重要的技能。它是一种允许我们创建软件、分析数据、构建网站等等的工具。特别是 Python，它是一种强大、通用的语言，由于其可读性和简单性，非常适合初学者。


    另一方面，历史是对我们过去的研究。它帮助我们理解我们从哪里来，以及过去的事件和人物如何塑造了我们今天生活的世界。通过研究历史，我们可以学到宝贵的教训，并获得更广阔的人生视角。


    在本书中，我们将结合这两个看似不同的学科。当我们穿越不同的历史时期时，我们将学习相应的 Python 概念。例如，当我们探索文明的黎明时，我们也将学习 Python
    的基础知识。当我们深入工业革命时，我们将学习 Python 中的文件输入/输出，这反映了那个时代对效率和生产力的关注。


    本书的每一章都将聚焦于一个特定的历史时期和一个相应的 Python 概念。我们将从基础开始，逐步深入到更高级的主题。每一章还将包含一个项目，将你所学的 Python
    技能与该章的历史背景结合起来。


    例如，在关于古代文明的章节中，你将学习 Python 中的算术运算。然后，你将应用这些技能来计算建造你自己的金字塔需要多少块砖石，就像古埃及人一样！


    本书旨在引人入胜且具有互动性。在每一章中，你都会发现历史趣闻、轶事和琐事，让学习过程变得有趣且引人入胜。你还会发现大量的示例和练习，以帮助巩固你正在学习的
    Python 概念。


    读完本书后，你将打下坚实的 Python 编程基础。你也会更加欣赏历史以及它塑造我们世界的方式。那么，你准备好开始这段激动人心的旅程了吗？让我们开始吧！


    # 第一章：时间的黎明 – Python 基础


    欢迎来到时间的黎明，这是我们穿越历史和 Python 编程之旅的起点。就像文明最初的火花开始闪耀一样，你对 Python 的理解也将开始点燃。在本章中，我们将涵盖
