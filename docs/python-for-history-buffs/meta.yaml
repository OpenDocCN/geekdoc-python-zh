    In the Great Library of Alexandria, you learned about strings and lists in Python.
    You used these tools to create a program that decodes messages from ancient Egyptian
    hieroglyphics, a project that brought history to life through code.


    As you entered the Roman Empire, you learned about conditional statements in Python.
    You used these tools to implement the Caesar cipher, a simple encryption technique
