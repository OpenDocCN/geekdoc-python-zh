  md: '# # Chapter 6 Welcome to the World of Programming What to do when an error
    occurs


    # ## Key Points


    +   - (1) Know what to do when an error occurs.

    - (2) Know how to isolate the problem from the error.


    # ## What to be prepared for when an error occurs


    Errors are one of the reasons why programming beginners give up programming.


    Especially when you have just started programming, you tend to think that you
    are not suited for programming because you do not know how to deal with them.


    However, once you get the hang of it, error countermeasures are not a problem,
    so here are some specific things you should do.


    # ## Coding spelling errors


    When programming, you type only English characters, so it is easy to make spelling
    mistakes if you are a beginner.


    Check the error message first to make sure there are no spelling mistakes.'
