    This time, I created a book on game programming.


    The reason for this is that I want beginners to enjoy the challenge of programming.

    I wanted to make it fun for beginners to try programming.


    To learn programming, it is good to make something that actually works and be
    impressed by it.

    I think it is better to do it in this order.


    As Horiemon(@takapon_jp) and Hiroyuki(@hirox246) said.

    "First of all, I have something I want to make.


    Then, they learn the skills by working backward from that state.

    That is the order in which they are learning.


    I wrote this book so that you can experience this phase as well.

