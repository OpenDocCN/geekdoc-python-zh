    \          if g_pat[i // 4][i % 4]:\n                draw_one_block(canvas, i\
    \ % 4 + g_pos['x'], i // 4 + g_pos['y'])\n    if g_scene == 1:\n        canvas.create_rectangle(40,\
    \ SCN_H // 2 - 50, SCN_W - 40, SCN_H // 2 + 50, fill='gray', tag='objects')\n\
    \        canvas.create_text(SCN_W // 2, SCN_H // 2, text='Game Over\\n\\nPlease\
    \ Space Key', font=('Monospace', 14, 'bold'), justify='center', fill='white',\
    \ anchor='center', tag='objects')\n```\n\n## 描述\n\n此函数绘制已放置的方块和正在操作的方块图案。没有它，游戏会随着进行逐渐变得过于沉重而无法运行。\n\
    \n# 函数创建（主函数）\n\n```python\ndef main_proc(root, canvas):\n    global g_buf, g_pat,\
