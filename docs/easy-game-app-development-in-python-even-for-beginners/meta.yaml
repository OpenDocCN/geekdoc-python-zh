  md: '# Graduation from a society where you are told to answer the phone


    Even a seriously stupid person can answer the phone, but this lack of productivity
    is enough to make you feel sick and tired of it.


    A lot of the reason I hate my job is that all the higher layers fill the post
    with incompetent people.

    I believe that this is the reason why I hate my job.


    The Japanese-style employment system is completely over.

    The lower level employees are sick of it because it is "full defense and clinch
    hell" on the job because the "old guys who don''t work" are the ones who have
    learned the hardest.


    I believe that many companies are seeing more and more young people leaving the
    workforce, but let''s get out of these companies with these old men as soon as
    possible. NO FUTURE.”'
