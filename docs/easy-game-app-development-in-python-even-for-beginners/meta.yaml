  md: '# Explanation


    This is the main function.

    Pressed keys are retrieved from g_events (queue) and processed.

    The left and right direction keys are processed, and the coordinates of the block
    pattern are overwritten.

    Rotation processing is also performed using the Space key.

    The space key is also processed when game over is displayed.

    If g_pat is None, a block pattern is generated.

    If the pattern collides with a block, the game is over.

    Speed control is also performed.

    Collision detection is performed with placed blocks.

    If a collision occurs, it stops (moves the contents of g_pat to g_buf).

    The placed block is investigated, and the line is deleted.

    Then, the coordinates are moved down by one.

    Update the previous fall processing time.

    The information updated by the call to main_proc() is reflected on the screen.

    Sets how many milliseconds from now main_proc() will be called, and

    update the game as main_proc() continues to be called.


