    \ None) is not None:\n        if g_scene == 0 and g_pat is not None:\n       \
    \     if e == 'Left':    g_pos['x'] += -1 if not is_crashed(g_pat, g_pos['x']\
    \ - 1, g_pos['y']) else 0\n            elif e == 'Right': g_pos['x'] += 1 if not\
    \ is_crashed(g_pat, g_pos['x'] + 1, g_pos['y']) else 0\n            elif e ==\
    \ 'space': g_pat = pat if not is_crashed(pat := np.rot90(np.array(g_pat, int)).tolist(),\
    \ **g_pos) else g_pat\n        elif g_scene == 1 and e == 'space':\n         \
    \   init_game()\n\n    if g_scene == 0:\n        if g_pat is None:\n         \
    \   g_pat = create_pattern()\n            for top in range(4):\n             \
    \   if any(g_pat[top]):\n                    g_pos['x'], g_pos['y'] = (GAME_W\
    \ - 4) // 2, -top\n                    break\n            g_scene = 1 if is_crashed(g_pat,\
    \ **g_pos) else 0\n\n        if get_time() - g_time > 400 or e == 'Down':\n  \
    \          if is_crashed(g_pat, g_pos['x'], g_pos['y'] + 1):\n               \
    \ for y in range(4):\n                    for x in range(4):\n               \
    \         if not out_of_screen(g_pos['x'] + x, g_pos['y'] + y):\n            \
    \                g_buf[g_pos['y'] + y][g_pos['x'] + x] |= g_pat[y][x]\n      \
    \          g_pat = None\n                new_buf = list(filter(lambda line: not\
    \ all(line), g_buf))\n                g_buf = [[0 for _ in range(GAME_W)] for\
    \ _ in range(GAME_H - len(new_buf))] + new_buf\n            else:\n          \
    \      g_pos['y'] += 1\n\n            g_time = get_time()\n\n    draw_game(canvas)\n\
    \    root.after(TIMER_WAIT, main_proc, root, canvas)\n```\n\n## 解释\n\n这是主函数。\n\
    从 `g_events`（队列）中检索按下的键并进行处理。\n处理左右方向键，并覆盖方块图案的坐标。\n使用空格键执行旋转处理。\n当显示游戏结束时，也处理空格键。\n\
    如果 `g_pat` 为 None，则生成方块图案。\n如果图案与方块发生碰撞，则游戏结束。\n还执行速度控制。\n与已放置的方块进行碰撞检测。\n如果发生碰撞，则停止（将\
