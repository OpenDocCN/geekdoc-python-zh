    # # What you need to play Tetris


    This hits on the question of where to start when it comes to programming.


    # ## Necessary functions


    +   1. Screen

    2. Blocks

    3. Controller

    4. Timer


    # ### (1) Screen


    Python has a library dedicated to games.

    For screen functions, there is a library called tkinter, which has a function
    called Canvas.


    # ### (2) Blocks


    The function to attach blocks to the screen can be created in tkinter.


    # ### (3) To operate with the keyboard


    The function "bind()" of the window created by tkinter can be used to implement
    this function.


    # ### (4) Timer


    A mechanism is needed to make the blocks fall down when time elapses.

    A timer can be implemented with the function "after" in Tkinter.'
