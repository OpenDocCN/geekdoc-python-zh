- md: '# PYTHON CRASH COURSE. GAME APP COOKBOOK


    Easy Game App Development in Python, Even for Beginners


    SATOCCHI


    ![](img/f23e236ec7f2be5ce38dbe377258f6bf_0_0.png)


    Python


    LEARNING FOR BEGINNER. PROGRAMMING IS VERY FUN.


    ## Getting Started


    You don''t have to have any experience at all to make a game app.


    Hello, my name is Satocchi (@stcheeee).


    This time, I created a book on game programming.


    The reason for this is that I want beginners to enjoy the challenge of programming.

    I wanted to make it fun for beginners to try programming.


    To learn programming, it is good to make something that actually works and be
    impressed by it.

    I think it is better to do it in this order.


    As Horiemon(@takapon_jp) and Hiroyuki(@hirox246) said.

    "First of all, I have something I want to make.


    Then, they learn the skills by working backward from that state.

    That is the order in which they are learning.


    I wrote this book so that you can experience this phase as well.

    In this book, I will show you how to make Tetris using the popular Python language.


    ## Target Audience


    The target audience of this book is people who want to start programming.


    This book is intended for people who want to start programming.


    Specifically, this book is intended for people who have just finished a series
    of Python courses on Progate and other sites.


    I want to share the joy of programming.


    I used to do programming in class and think, "Damn, that''s boring!"

    I can learn programming, I can have a full remote job, I can finish in 8 hours


    The work can be done in one shot, etc.

    I started to like programming after I realized that it was a great environmental
    advantage. I fell in love with programming after realizing that


    In the past, I was ridiculed as a "digital earthworker" and forced to work like
    a cart horse for subcontractors.

    However, nowadays there are many jobs available, and if you have the skills and
    communication abilities, you can freely choose your own working environment.


    The shortest way to improve is to "get absorbed in programming."


    We hope that this book will awaken you to the joy of programming.


    ## Chapter 1: Even a self-taught person can create game applications


    Why I decided to make Tetris


    ### Key Points


    - (1) Everyone seems to want to make it.

    - (2) Let''s enjoy the sense of accomplishment


    Because beginners can learn in a fun way


    This book is for learning programming, but most general books explain the syntax,
    and it''s hard to find something specific that you want to make.


    So, I wanted to try making a fun game by myself. I wanted to try to make a fun
    game by myself.


    Later on, I want you to go deep and wonder why it works.


    To make Tetris in Python, there are a lot of things to learn.

    You will probably have a lot of questions like, "Why does it work like this?


    If you get into the habit of looking things up line by line on Google or looking
    at official references, it will take a lot of time, but you will become very proficient.


    That''s what makes programming an accomplishment.


    At first, some people may feel self-loathing and wonder why it takes so long,
    but SATOCHI''s advice is to be curious and ask yourself, "Why does it work like
    this? I want you to try programming with a genuine feeling of "Why does it work
    like this?


    It''s a lot of fun.


    You can customize it later.


    Once you have a certain level of programming skills, you may want to add sound,
    or add more shapes to the Tetris blocks, etc. You can do all kinds of things you
    want. With game programming, there are many motivations to customize afterwards.


    With game programming, it is easy to be motivated to customize later, so let''s
    try programming Tetris this time.


    ### Summary of this section


    - (1) Let''s learn programming while having fun!

    - (2) Leave a legacy in the world!


    ## Chapter 2: Know the Technology Used in Tetris


    Prerequisite knowledge required to create an application


    ### Key Points


    - (1) Let''s check the programming language.

    - (2) Let''s check the development environment


    #### ☆Knowledge of Python


    Python is a programming language. In this book, we will try programming Tetris
    using Python.


    Some of the basics will be explained in this book, but if you want to learn it
    systematically, please try to learn programming on the website Progate. Progate
    is a great way for beginners to learn programming in a thorough and easy-to-understand
    way. If you first learn Python with Progate and then try this book, you will be
    able to make progress in your learning.


    # プログラミングで

    人生の可能性を広げよう


    👤 2,600,000 ユーザー 🌐 提供国数 100+


    ## Chapter 3: Learn Python


    ### Learn the basics with Progate


    #### Key Points


    - 1. Let''s do Progate''s Python course 1 to 5.

    - 2. Keep basic learning to a minimum.


    #### Why choose Progate?


    Progate is a very easy-to-understand online learning service.


    Satochi has been looking at various learning services, and I think Progate is
    the best choice for learning a language quickly. Progate offers courses from 1
    to 5.


    Progate''s courses range from 1 to 5, so it will take you about 10 hours to complete
    them all, but I recommend you give it a try.


    ### What about programming schools?


    Learning at a programming school generally depends on the school, but a course
    of about 200,000 yen for about one month of intensive learning


    You can learn about unclear points 1-on-1 with an engineer about 10 times with
    mentoring. In my opinion, the attributes of the school are very good.


    In Satocchi''s opinion, this is unnecessary for people whose attribute is originally
    an engineer. I think it is unnecessary for people who are engineers by nature.


    It may be possible for a complete beginner to use a school as an environment to
    try to learn. However, I am concerned about the high cost.


    But I am still concerned about the high cost. (If you have the money, it would
    be OK.)


    Basic learning should be kept to a minimum.


    The curriculum you can learn at Progate is just the rudiments of actual Python
    programming.


    After you have learned some of the basics, you will be better off actually taking
    on projects and building software, so I don''t recommend you to do the Progate
    10-week course.


    ### Summary of this section


    - (1) For basic learning, use Progate for a quick start.

    - (2) If you have the money, you can go to a programming school.


    ### You can also learn by video (youtube)


    #### Key Points


    - (1) You can learn on the go!

    - (2) Let''s actually move your hands!


    #### Advantages of learning on Youtube


    There are many good programming learning materials on Youtube. And they are free
    of charge. Therefore, we also recommend learning by video.


    ![](img/f23e236ec7f2be5ce38dbe377258f6bf_13_0.png)


    ### Satocchi TV (youtube) is also open.


    Satocchi opened youtube not only for Kindle books but also for videos to help
    everyone learn programming in an easy-to-understand way.


    https://www.youtube.com/channel/UC-5DcUCMb3g-28FRK3EtlfQ


    We will be adding various curriculum in the future, so please take a look.


    ![](img/f23e236ec7f2be5ce38dbe377258f6bf_14_0.png)


    ### A Note on Video Learning


    Studying with videos tends to make you feel like you''ve done some programming.
    However, I want you to be sure to "move your hands."


    If you don''t actually move your hands, you will only end up "feeling like you
    understand."


    If you are going to go through the trouble of learning, do it yourself.


    ### Summary of this section


    - (1) Video learning is free of charge, and there are many high-quality contents.

    - (2) It is important to do hands-on activities by yourself.


    ## Chapter 4: Make Preparations in Advance


    ### Let''s buy a Macbook!


    #### Key Points


    - (1) Macbook is the only choice for engineers.

    - (2) Let''s enjoy programming in style!


    ### Why Mac?


    (1) Because everyone''s a Mac (easy to Google).


    This is the center pin.


    System development is 70% bug catching.


    When we hit a wall, we Google, but most of the articles are about Mac.


    Therefore, Mac is a must to increase the amount of information.


    (2) The possibility of virus infection is much lower than Windows.


    (3) It''s cool.


    This is just as it is.


    (4) Good performance


    My main machine is a 12-inch MacBook.


    I think it was about 12 man yen, and it was one of the best purchases I ever made
    in my life.


    (5) Lightweight


    It is easy to carry around when it is light.


    (6) Linux-based


    The command line is almost the same as that of Linux, so it is easy to use for
    Linux users, and even if you have never used Linux before, I think you will be
    able to use Linux normally after learning with this.'
  mdcn: '# Python速成课程：游戏应用食谱


    即使对于初学者，也能轻松用Python开发游戏应用


    SATOCCHI


    ![](img/f23e236ec7f2be5ce38dbe377258f6bf_0_0.png)


    Python


    **初学者学习指南。编程非常有趣。**


    ## 开始之前


    制作游戏应用，你完全不需要任何经验。


    大家好，我是Satocchi (@stcheeee)。


    这次，我编写了一本关于游戏编程的书。


    原因是我想让初学者也能享受编程挑战的乐趣。

    我希望初学者尝试编程时也能乐在其中。


    学习编程，最好是动手制作一个能实际运行的东西，并为之感到震撼。

    我认为按这个顺序来效果更好。


    正如Horiemon(@takapon_jp)和Hiroyuki(@hirox246)所说：

    “首先，你心里得有个想做的东西。”


    然后，他们会从这个目标出发倒推，去学习所需的技能。

    这就是他们的学习顺序。


    我写这本书，就是为了让你也能体验这个过程。

    在本书中，我将向你展示如何使用流行的Python语言制作俄罗斯方块。


    ## 目标读者


    本书的目标读者是想要开始编程的人。


    本书适合那些想要开始编程的人。


    具体来说，本书适合那些刚刚在Progate等网站完成一系列Python课程的人。


    我想分享编程的乐趣。


    我以前上编程课时会想：“该死，太无聊了！”

    学会编程后，我能拥有全远程的工作，8小时就能完成工作。

    工作可以一口气做完，诸如此类。

    在我意识到这些巨大的环境优势后，我开始喜欢编程。在认识到这些后，我爱上了编程。


    过去，我曾被嘲笑为“数字民工”，像骡马一样为分包商卖命。

    然而，如今的工作机会很多，如果你有技能和沟通能力，就可以自由选择自己的工作环境。


    提升的最快方式就是“沉浸在编程中”。


    希望这本书能唤醒你对编程的乐趣。


    ## 第1章：即使是自学者也能创建游戏应用


    为什么我决定制作俄罗斯方块


    ### 要点


    - (1) 大家似乎都想做这个。

    - (2) 享受成就感


    因为初学者可以以有趣的方式学习


    这本书是用来学习编程的，但大多数通用书籍都只讲解语法，很难找到你想做的具体东西。


    所以，我想自己尝试做一个有趣的游戏。我想自己尝试制作一个有趣的游戏。


    我希望之后你能深入钻研，思考它为什么能运行。

    要用Python制作俄罗斯方块，有很多东西要学。

    你可能会有很多疑问，比如“为什么它能这样运行？”


    如果你养成在Google上逐行查找或查看官方文档的习惯，虽然会花很多时间，但你会变得非常熟练。

    这正是编程的成就感所在。


    起初，有些人可能会感到自厌，纳闷为什么这么耗时，但SATOCCHI的建议是保持好奇，问自己：“为什么它能这样运行？”我希望你能抱着“为什么它能这样运行？”的真实感受去尝试编程。

    这非常有趣。


    以后可以自定义。

    一旦你具备了一定的编程技能，你可能会想添加声音，或者给俄罗斯方块方块添加更多形状等等。你可以做任何你想做的事。游戏编程有很多后续自定义的动力。

    因为游戏编程很容易让人产生后续自定义的动力，所以这次让我们尝试编程制作俄罗斯方块吧。


    ### 本节小结


    - (1) 在快乐中学习编程！

    - (2) 为世界留下遗产！


    ## 第2章：了解俄罗斯方块所用的技术


    创建应用所需的前置知识


    ### 要点


    - (1) 了解一下编程语言。

    - (2) 确认一下开发环境


    #### ☆Python知识


    Python是一种编程语言。在本书中，我们将尝试使用Python编程制作俄罗斯方块。


    本书会讲解一些基础内容，但如果你想系统学习，建议尝试在Progate网站上学习编程。Progate非常适合初学者透彻、易懂地学习编程。如果你先通过Progate学习Python，然后再看本书，你的学习会进展得更顺利。


    # 用编程

    拓展人生的更多可能


    👤 2,600,000 用户 🌐 覆盖国家/地区 100+


    ## 第3章：学习Python


    ### 通过Progate学习基础


    #### 要点


    - 1. 完成Progate的Python课程1到5。

    - 2. 将基础学习保持在最低限度。


    #### 为什么选择Progate？


    Progate是一个非常易于理解的在线学习服务。


    Satochi研究过各种学习服务，我认为Progate是快速学习一门语言的最佳选择。Progate提供课程1到5。


    Progate的课程从1到5，完成所有课程大约需要10小时，但我推荐你尝试一下。


    ### 编程学校怎么样？


    在编程学校学习通常取决于学校，但大约20万日元的课程可以进行约一个月的密集学习。

    你可以获得大约10次与工程师的1对1辅导，以解答不清楚的地方。在我看来，学校的属性非常好。


    在Satocchi看来，对于本身属性就是工程师的人来说，这是不必要的。我认为对于天生就是工程师的人来说，这是不必要的。

    对于完全的初学者来说，或许可以把学校当作一个尝试学习的环境。但我担心成本太高。

    但我仍然担心高昂的费用。（如果你有钱，那没问题。）


    基础学习应保持在最低限度。

    在Progate上能学到的课程只是Python实际编程的皮毛。

    在学了一些基础之后，最好亲自接手项目、构建软件，所以我不推荐你参加Progate 10周的课程。


    ### 本节小结


    - (1) 基础学习，使用Progate快速起步。

    - (2) 如果你有钱，可以去编程学校。


    ### 也可以通过视频（youtube）学习


    #### 要点


    - (1) 可以在路上学习！

    - (2) 一定要动手实践！


    #### 在Youtube上学习的优势


    Youtube上有很多优质的编程学习资料，而且免费。因此，我们也推荐通过视频学习。


    ![](img/f23e236ec7f2be5ce38dbe377258f6bf_13_0.png)


    ### Satocchi TV（youtube）频道也开放了。


    Satocchi不仅为Kindle书籍开设了youtube频道，还通过视频帮助大家以易懂的方式学习编程。


    https://www.youtube.com/channel/UC-5DcUCMb3g-28FRK3EtlfQ


    未来我们会添加各种课程，请务必来看看。


    ![](img/f23e236ec7f2be5ce38dbe377258f6bf_14_0.png)


    ### 关于视频学习的一点说明


    学习视频往往会让人产生“我已经学了编程”的错觉。但我希望你一定要“动手实践”。

    如果不实际动手，最终只会“感觉懂了”。

    如果要费心学习，就自己动手去做。


    ### 本节小结


    - (1) 视频学习免费，且有很多高质量内容。

    - (2) 重要的是要自己动手实践。


    ## 第4章：提前做好准备


    ### 买一台Macbook吧！


    #### 要点


    - (1) Macbook是工程师的唯一选择。

    - (2) 享受有格调的编程！


    ### 为什么是Mac？


    (1) 因为人人都用Mac（容易搜到解决方案）。


    这是核心。

    系统开发70%的时间在抓bug。

    当我们遇到瓶颈时会去Google搜索，但大多数文章都是关于Mac的。

    因此，为了增加信息量，Mac是必备的。


    (2) 感染病毒的可能性比Windows低得多。


    (3) 它很酷。


    字面意思。


    (4) 性能好。


    我的主力机是一台12英寸MacBook。

    我记得大约花了12万日元，这是我人生中最划算的购买之一。


    (5) 轻便。

    轻便就易于携带。


    (6) 基于Linux。

    命令行与Linux几乎相同，因此对Linux用户来说易于使用，即使你从未使用过Linux，我想通过这本书学习后，你也能正常地使用Linux。'
