    Figure 3.8 A small model-servo.


    # 3.2.2 Servomotors and model-servos


    The term *servo* refers to using the motor in conjunction with a position encoder
    in a *closed-loop* feedback, or servo, loop [21]. Here the motor speed is continuously
    adjusted to reduce the difference between the desired position and the actual
    position, as reported by the encoder. This type of servomotor is often used in
    industrial applications, and requires an elaborate control system with a PID controller
    [21] and powerdrive-electronics. Servomotors are used in large industrial robots
    and applications that require high accuracy of positioning. Matching the parameters
    of the controller to the desired performance of the control loop in terms of accuracy,
    speed, and acceptable overshoot requires expert attention, and is beyond the scope
    of this book.


    Instead, we use the modest cousin of the servomotor, the *model-servo*, often
    simply referred to as a *servo*, shown in [Figure 3.8](#figure_3_8). It is often
    encountered in radio-controlled cars and planes but can also appear in robotic
    applications, such as controlling the position or angle of smaller robotic arms.
    Servos have a potentiometer mounted on the rotating shaft that is used as an encoder.
    It provides information about the position of the shaft, which typically has a
    rotation range of 0–180 degrees. The resistance is compared to a voltage derived
    from an electric signal corresponding to the desired position. The difference
    signal is amplified and used to turn a DC motor in the direction that minimizes
    the difference. This constitutes a simple proportional controller. Normally a
    small gearbox between the motor axis and the shaft reduces the speed but increases
    the precision of control and the torque. Note that the servo connects with three
    wires to the outside. Two of the wires are ground and supply voltage, nominally
    4.8 V. They are colored black and red, respectively. The third wire, yellow or
    white in many cases, carries the information about the desired position.


    The information about the desired position is communicated to the servo as a pulse-width
    modulated signal, as shown in [Figure 3.9](#figure_3_9). The servo expects a train
    of pulses with a spacing of 20 ms. Each individual pulse has a duration between
    1 and 2 ms, with a 1.5 ms duration specifying the mid-position. Producing such
    pulse patterns is easily done with a microcontroller, and we will do that in later
    chapters.


    Servomotors and servos use a closed-loop system to achieve a high accuracy of
    positioning, while stepper motors achieve this without closed-loop feedback.'
