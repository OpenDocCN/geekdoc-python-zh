  - '[PAGE 253]


    # CHAPTER 15

    Example: Medical Sensing


    In this chapter, we measure electrocardiograms (ECGs), the oxygen saturation level
    in our blood, and the bioimpedance with a NodeMCU, which controls the three sensors
    and displays their measurements using the web interface from Chapter 13, already
    shown in Figure 13.1. As an added bonus, we add circuitry to simulate the impedance
    of the human body and ECGs as well. Moreover, we provide the option to save measured
    values to the internal flash disk on the NodeMCU and later replay them, which
    opens the possibility to log data, for example, while exercising. Importantly,
    note that this project only illustrates the measurement processes and is not suitable
    for medical diagnosis!


    The hardware with the NodeMCU on the right and the three sensors is shown in Figure
    15.1. Next to the controller we see the breakout board [31] with the AD8232 to
    measure ECGs. It is accompanied by a cable that connects three electrodes to a
    3.5 mm jack, which is shown just below the symbol of the heart. The leads to the
    electrodes are color-coded: the black electrode should be connected to the right
    lower arm (RA), the blue one to the left lower arm (LA), and the red one to the
    right leg (RL), though other placements are also possible. The breakout board
    senses, amplifies, and cleans up the small voltage measured between the black
    and the blue electrodes, uses the red one as reference, and provides an analog
    voltage on its output pin. This output signal we route directly to the analog
    input pin A0 of the NodeMCU. Furthermore, signals to indicate whether the electrodes
    are connected are routed to digital input pins D3 and D4.


    The small breadboard shown on the right contains an ECG simulator, which allows
    us to test the AD8232 without connecting a patient. We store the voltages that
    describe


    ![](img/8f23875c54d5b3177d5d2a5bba06b37e_253_0.png)


    Figure 15.1 The project assembled on a solder-less breadboard. The circuit at
    the bottom left is a simple electronic model of the human body and the small breadboard
    on the right is part of the ECG simulator.'
  - '[PAGE 254]


    the ECG in tabular form on the NodeMCU and periodically pass values to the MCP4921
    digital-to-analog converter that we already discussed in Section 4.5.5. Apart
    from the power rails, its SPI-control wires SCK, MOSI, and CS are connected to
    pins D5, D7, and D8 on the NodeMCU, respectively. The three resistors (10kΩ, 10Ω,
    and 10kΩ), also placed on the small breadboard, reduce the signal between RL and
    RA to the level of mV, normally produced by the body. We directly connect them
    to the corresponding electrodes at the end of the cable that is attached to the
    jack on the AD8232 breakout board.


    The MAX30102-based pulse oximeter, already shown in Figure 2.40, is also mounted
    on a small breakout board that is placed to the left of the AD8232. As already
    mentioned in Section 2.3.3, it measures the saturation level of oxygen in blood
    (SPO2) by comparing the reflection of red and infrared light measured with a photo-transistor
    at the tip of a finger. The small optical sensor with photodiodes and transistor
    operates similarly to the color measurements from Chapter 11. It is seen near
    the center of the breakout board and is connected to the NodeMCU through the two
    I2C lines SCL and SDA, attached to pins D1 and D2, respectively.


    The third sensor, shown on the far left, is the bioimpedance network analyzer
    AD5933 that we already encountered in Chapter 12. We use it to measure the impedance
    between two electrodes attached to a circuit that models the impedance of a human
    body, called *Cole model*. The circuit with the eight-pin op-amp is the same we
    already used earlier; we only increase the value of the feedback resistor between
    pin 4 and 5 of the AD5933 to 10 kΩ. At the same time, we add a 10 kΩ resistors
    to pin 1 of the op-amp in order to limit the current delivered to the “body” to
    around 100 μA. We daisy-chain the I2C lines coming from the oximeter to interface
    the AD5933 and the controller.


    This circuit is brought to life with the following sketch that runs on the NodeMCU.
    It is a bit long, so we discuss it one part at a time. The first part closely
    follows the data acquisition system from Chapter 13 by providing WLAN credentials
    and loading the necessary libraries, only here we need to use the ones that are
    appropriate for the ESP8266-based NodeMCU. In order to control the MAX30102, we
    install the *DFRobot_MAX30102* library by issuing the command `git clone https://github.com/DFRobot/DFRobot_MAX30102.git`
    in the subdirectory ~/Arduino/libraries and subsequently use it in our sketch
    by including its header file and creating an object `Sensor` to interact with
    the device. We then include the support files for I2C from Section 4.4.3 and for
    the AD5933 from Chapter 12. Then a number of variable declarations follow; many
    were already used in Chapter 13. We only point out that `mmode` is used to identify
    actions of the different sensors and `Rcal` specifies the value of the current
    limiting resistor in kΩ.


    ```

