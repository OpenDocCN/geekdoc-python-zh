    \ 的命令。`LDR?` 命令从模拟引脚 A0 读取传感器值，`POWER` 命令设置和读取激光激励功率。最后我们遇到命令 `FSCAN nnn`，其中 `nnn`\
    \ 是通过使用我们之前用过的 `atof()` 函数读取行的其余部分得到的扫描范围。这里我们假设扫描器实际上会阻挡激光，并且在收集数据之前需要先将其收回。在\
    \ case 块内部，它首先通过串口报告它将要做什么，使能电机驱动器，并将障碍物移开。然后是一个 for 循环，电机在其中执行单个步进，并在每个步进内，对模拟引脚\
    \ A0 上的光敏电阻进行十次测量并求和。在每个步进结束时，测量值被写入串口线。一旦步数完成，电机驱动器就被禁用。实现的最后一个命令是 `CALIBRATE`，它测量传感器响应作为激光功率的函数。如果以后需要，我们可以使用后者将原始传感器读数转换为线性强度标度。\n\
    \n作为系统的第一个测试，我们在 Arduino IDE 中打开串口监视器，确保波特率设置为 `setup()` 函数中指定的值（本例中为 9600 波特），并通过向\
    \ UNO 发送 `LDR?` 来查询光敏电阻。响应格式为 `LDR nnn`，其中 `nnn` 是调用 `analogRead()` 函数得到的原始值。然后我们用\
    \ `POWER?` 查询激光功率，并用 `POWER nnn` 将其设置为新值，其中 `nnn` 是 0 到 255 之间的值。激光点的亮度应相应改变。接下来我们移动步进电机几步，例如用\
    \ `FMOVE 20`，然后用 `FMOVE -20` 将其移回起始位置。带有障碍物的小车应来回移动。最后一点，我们执行 `FSCAN 60`，这将使障碍物移动\
    \ 60 步，然后逐步返回起始位置，同时读取传感器并将值报告到串口线。如果所有这些初始测试都令人满意地完成，我们就进入自动化过程，为此我们选择了 octave。\n\
    \n基本上，我们将 Arduino UNO 连接到树莓派，编写一个 octave 脚本来打开串口线，向 UNO 发送命令并接收响应，这与我们在之前的示例中所做的非常相似。在编写\
    \ octave 脚本之前，我们需要校准障碍物的运动，以便能够以毫米而不是步数来显示宽度。在移动小车一段较大距离时，我使用了 250 个全步进，并且在移动前后拍摄一张带有旁边放置尺子的装置照片，很容易计算出校准常数\
    \ `xscale`（单位为 mm/step）。在我的例子中，250 步使小车移动了 39.2 毫米，这解释了以下脚本顶部附近的 `xscale` 值。\n\
    \n```matlab\n% scanplot2.m, V. Ziemann, 221103\nclose all; clear all\nxscale=0.161;\
    \  % mm/fullstep\ns=serialport('/dev/ttyACM0',9600);  % set device correctly\n\
    pause(3);\nflush(s);      % flush the input queue\nnsteps=60;\nwrite(s,\"FSCAN\
    \ 60\\n\");\npause(5);\nxx=zeros(1,nsteps); yy=xx;\nfor i=1:nsteps\n    xx(i)=i*xscale;\n\
    \    yy(i)=str2double(serialReadline(s));\nend\nclear s\nyy=smooth3(yy);     \
    \      % smooth data\nsubplot(2,1,1);\nplot(xx,yy);              % raw sensor\
    \ data\nylabel('arb. units');\nsubplot(2,1,2);\ndy=yy(2:end)-yy(1:end-1); % derivative\n\
    if (yy(1) > yy(end)) dy=-dy; end\nplot(xx(1:end-1),dy);\nxlabel('x [mm]'); ylabel('arb.\
    \ units');\ntitle(['FWHM = ', num2str(xscale*fwhm(dy),'%5.2f'), ' mm'])\nprint('laser_profile.png','-S1000,700')\n\
    ```\n\n254 ■ 使用 Arduino 和树莓派的传感器实践教程，第二版\n\n脚本的其余部分现在应该很熟悉了。打开串口线并刷新存在的任何字符后，我们定义步数并向\
    \ UNO 写入 `FSCAN 60`。然后我们等待一小段时间，并开始使用我们在第 12 章已经遇到的 `serialReadline()` 函数从串口线检索值。它从串口线读取字符，直到遇到终止符，并将获得的字符作为字符串返回。但回到主脚本。在检索数据并将其复制到数组\
    \ `yy` 的同时，我们也用适当缩放的水平轴值填充数组 `xx`。一旦循环完成，我们用 `clear s` 关闭串口设备。\n\n当所有数据在脚本中可用后，我们开始处理它。由于我们稍后将计算原始数据的导数，这是一个对噪声非常敏感的过程，我们使用\
    \ `smooth()` 函数对数组 `yy` 中的传感器值进行弱平滑。它平均三个连续值，并用平均值替换中间值。`smooth3()` 的 octave 脚本是\n\
    \n```matlab\n% smooth three consecutive points, V. Ziemann, 170628\nfunction out=smooth3(y);\n\
    y=[y(1),y(1:end),y(end)]; % add extremities\nf=ones(1,3)/3.0;          % filter\
    \ function\nout=conv(y,f);            % convolute\nout=out(3:end-2);         %\
    \ ensure same length\n```\n\n它首先创建一个新数组，其中端点加倍，以避免在端点处出现难看的伪影。在下一行中，我们创建由三个值为\
    \ 1/3 的值组成的滤波器函数 `f`，并用它对数据进行卷积。由于卷积产生的输出数组比原始数组长，我们在返回平滑数组作为值 `out` 之前移除了端点。一旦这些初始准备工作完成，我们在图\
    \ 16.4 的上图中显示平滑后的原始值，并为纵轴添加标签。然后我们计算连续值之间的差值，其动机是：在每个步进中，激光束的一小部分被遮挡，剩余强度的变化与障碍物在该步进期间穿过的窄带中的强度成正比。结果是一个与激光束横向强度分布成正比的信号，如图\
    \ 16.4 下图所示。其标题显示了激光轮廓的半高全宽（FWHM），约为 0.8 毫米。最后，我们生成一个图像文件，这正是我们准备图 16.4 的方式。"
