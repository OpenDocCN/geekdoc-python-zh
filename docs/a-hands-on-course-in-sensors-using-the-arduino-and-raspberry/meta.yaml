    \ data file, one line at a time, and dispatch the values to the browser. In this\
    \ way all recorded samples are shown on the browser.\n\n## 244 ■ A Hands-On Course\
    \ in Sensors Using the Arduino and Raspberry Pi, Second Edition\n\nIn order to\
    \ control the NodeMCU from the browser, we need to add features to the html file\
    \ esp32-daq.html from Chapter 13. In the updated version medisense.html, we add\
    \ the functionality to send JSON-formatted messages of type MMODE that set the\
    \ variable mmode on the controller. This is accomplished by adding the following\
    \ code snippet between the definition of the clear button and the display of the\
    \ IP address. It defines a selection menu that sends different values of mmode\
    \ to the NodeMCU with the JavaScript function sendSpecialCommand().\n\n```html\n\
