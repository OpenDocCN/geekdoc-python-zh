  md: 'scale. The operating principle of this and many other sensors is based on the
    availability of electrons in the conduction band of a material. In good (wires)
    or bad (resistors) conductors, electrons partially fill the available states in
    the conduction band up to some energy, the Fermi level, whereas in insulators
    the Fermi level is located in between the completely filled valence band and the
    conduction band [16]. Therefore, no electrons are available in the conduction
    band. Furthermore, the energy-difference between the upper boundary of the valence
    band and the lower boundary of the conduction band, the *bandgap*, is large, while
    for semiconductors it is only on the order of electron-volt (eV).


    In photoresistors the base material is often CdS, a semiconductor with a bandgap
    of about 2.4 eV. This energy equals that of photons of green light with a wavelength
    of about 500 nm. Therefore, green photons can elevate electrons from the valence
    to the conduction band and thus create electron–hole pairs. These now freely moving
    charge carriers conduct electric current and therefore increase the conductivity
    of the material. Figure 2.2 illustrates this in more detail. The upper figure
    shows a simplified band level scheme under dark conditions. The bold lines show
    the lower boundary of the conduction band and the upper boundary of the valence
    band. The dashed line shows the highest energy states that electrons occupy. For
    metals and resistors, this is close to the Fermi level. Conversely, in a semiconductor
    like CdS, the Fermi level lies between valence and conduction band. Yet, at room
    temperature, there are a few thermally excited electrons in the conduction band
    of CdS. We visualize this by the close proximity of the dashed line to the lower
    conduction-band boundary. In metals there are plenty of electrons in the conduction
    band, and the conductivity is high. In the resistor there are fewer electrons
    in the conduction band, or their mobility is impeded in other ways such that there
    is a shift in the Fermi level across the resistor. In dark conditions there are
    only very few thermally excited electrons in the conduction band of the LDR, and
    the conductivity is very low. Consequently, there is a large voltage-drop across
    the LDR and the measured voltage, which is the difference of Fermi levels between
    the measurement points. The measured voltage is therefore close to the full voltage
    delivered by the battery. If, on the other hand, the LDR is illuminated, the photons
    lift electrons from the valence band into the conduction band. This increases
    the conductivity and only a small voltage is dropped across the LDR. This consequently
    reduces the measured voltage, as shown in the lower graph of Figure 2.2. Note
    that we do not discuss the details of the interfaces between the different parts
    because that is beyond the scope of this book.


    In the middle of Figure 2.1 we show how to connect a photoresistor in series with
    a resistor $R_0$ (here 10 k$\Omega$) to create a voltage divider between the supply
    voltage $V_{cc}$ and ground. From the discussion of voltage dividers and a short
    refresher of basic circuit theory in appendix A or [17], the voltage $V_s$ on
    the signal terminal is then given by $V_s = V_{cc}R_{LDR}/(R_0 + R_{LDR})$. Thus,
    the illumination of the LDR changes its resistance $R_{LDR}$ and the signal voltage
    varies correspondingly. Note that we have to select the resistor $R_0$ in the
    middle of the range of $R_{LDR}$. This causes the voltage we measure to vary around
    half of the supply voltage. Therefore, we also need to use a volt meter in that
    voltage range. Very small variations of the light intensity are then difficult
    to resolve and may need to be amplified. Using a Wheatstone bridge, where we compare
    the voltages in two resistor dividers, as shown on the right of Figure 2.1, helps
    to alleviate this problem. We expand on the use of Wheatstone bridges in Section
    2.2.


    Other resistance-based sensors are *resistance-based temperature detectors* (RTD)
    such as the PT100 temperature sensor, which is a calibrated platinum-based sensor
    with a resistance of exactly 100 $\Omega$ at 0 $^\circ$C. It is based on the fact
    that the resistance of a very pure metal is determined only by scattering of electrons
    in the conduction band with phonons, which are vibrations of the ions that make
    up the crystal lattice of the metal. Moreover, higher temperatures cause stronger
    vibrations of the lattice, with correspondingly higher resistance.'
