    ***Time too short, double TIMESTEP\");\n    }\n}\ndelay(1);\n}\n```\n\nThe sketch\
    \ follows the usual format, where we first declare a number of variables in which\
    \ `npts` is the maximum number of points that can be acquired. The data samples\
    \ are stored in the `sample_buffer` once every `timestep` milliseconds. We also\
    \ declare the resistance R of the resistor used to discharge the capacitor. Since\
    \ the `Ticker.h` library we use in other chapters for the NodeMCU is unavailable\
    \ for the UNO, we include the `MsTimer2.h` header file and library instead. It\
    \ provides the functionality to repeatedly generate an interrupt and call an interrupt-service\
    \ routine called `timer_action()` in our sketch. This function is called every\
    \ `timestep` milliseconds. It first reads analog pin A0, then stores the value\
    \ in the `sample_buffer`, and increments `isamp`. If `isamp` reaches `nsamp`,\
    \ the timer is stopped to prevent the acquisition of further data points. Then\
    \ `isamp` is set to zero to prepare for the next acquisition and the variable\
    \ `sample_buffer_ready` is set to 1 to indicate that an acquisition is complete\
    \ and data is ready for further processing. Technically we can process the data\
    \ within the `timer_action` function, but normally this routine should contain\
    \ only time-critical actions, such as acquiring samples. It should be kept as\
    \ compact as possible, because it is called asynchronously to all other processing\
    \ and we should avoid excessive disturbances. The way to handle this problem is\
    \ to flag that the acquisition is ready, and in the main program, check for this\
    \ flag and perform the postprocessing. In this way, the time-critical and the\
    \ slower processes are efficiently decoupled. The `linfit()` function takes the"
