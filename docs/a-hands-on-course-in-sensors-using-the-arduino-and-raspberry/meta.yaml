  - "[PAGE 126]\n\n![](img/8f23875c54d5b3177d5d2a5bba06b37e_126_0.png)\n\nFigure 4.24\
    \ Measuring the temperature with a DS18b20 and displaying it on a NeoPixel strip†.\n\
    \n```\ncpp\n//Neopixel thermometer, V. Ziemann, 221115\n#include <OneWire.h>\n\
    #include <DallasTemperature.h>\n#define ONE_WIRE_BUS 2  // pin 2\nOneWire oneWire(ONE_WIRE_BUS);\n\
    DallasTemperature sensors(&oneWire);\n#include <Adafruit_NeoPixel.h>\n#define\
    \ NUMPIXELS 8\n#define PIN 6\nAdafruit_NeoPixel pixels(NUMPIXELS, PIN, NEO_GRB\
    \ + NEO_KHZ800);\nvoid setup() {\n  sensors.begin(); pixels.begin();\n}\nvoid\
    \ loop() {\n  sensors.requestTemperatures();\n  float temp=sensors.getTempCByIndex(0);\n\
    \  int imax=(int)temp-20;  // temperature above 20 degrees\n  pixels.clear();\n\
    \  for (int i=0;i<imax;i++) {\n    pixels.setPixelColor(i, pixels.Color(20+10*i,20,\
    \ 100-10*i));\n  }\n  pixels.show();\n  delay(1000);\n}\n```\n\nThen we illuminate\
    \ the units up to imax, which mimics the behavior of a conventional thermometer\
    \ with a mercury column. Note that we give the units different colors; the lowest\
    \ is almost blue, but the upper units become progressively more red."
