  md: "The function AD5933_config() receives these parameters as input and programs\
    \ the internal registers of the AD5933 according to the description in the datasheet.\
    \ In particular, the control registers 0x80 and 0x81 set the mode of operation\
    \ for mode and pga. Registers 0x8A and 0x8B set the time to wait after setting\
    \ a new frequency and before starting to measure. Registers 0x82 to 0x84 receive\
    \ an integer number, related to MCLK, that determines the output frequency according\
    \ to an equation found in the datasheet. First the most-significant byte is written\
    \ to 0x82, then the next byte to 0x83 and the least-significant byte to 0x84.\
    \ In the next step the frequency increment finc is converted to an integer number\
    \ that is likewise loaded to registers 0x85 to 0x87. Last, npts is written, one\
    \ byte at a time, to 0x88 and 0x89. When leaving this function all registers of\
    \ the AD5933 are loaded with the desired values and ready to enable the output,\
    \ which requires issuing a sequence of commands that are specified in the datasheet.\
    \ We provide a generic function AD5933_command() that receives cryptic byte values\
    \ as input and sets configures the device. Immediately below, we define functions\
    \ that give mnemonic names to some of the actions. The last two functions read\
    \ status bits that indicate whether a measurement is complete and that the frequency\
    \ sweep has finished.\n\n```\n// AD5933.h, V. Ziemann, 221118\nconst int AD5933=0x0D;\
    \  // I2C address\nfloat freq=5000.0, finc=500, MCLK=16.776E6;\nint npts=200;\n\
    byte mode=0,pga=1;  // ~2 Vpp, amp = times 1\nvoid AD5933_config(float freq,float\
    \ finc,int npts,byte mode,byte pga){\n    I2Cwrite(AD5933,0x80,0x00);     // Control\
    \ registers, reset\n    I2Cwrite(AD5933,0x81,0x10);\n    I2Cwrite(AD5933,0x80,((mode\
    \ & 0x03)<<1) | pga);\n    I2Cwrite(AD5933,0x8A,0x00);     // Settling time\n\
    \    I2Cwrite(AD5933,0x8B,0xFF);     // 255 cycles\n    long n=(long)(freq/(MCLK/4)*pow(2,27));\n\
    \    I2Cwrite(AD5933,0x82,(n>>16) & 0xFF);     // Starting frequency\n    I2Cwrite(AD5933,0x83,(n>>8)\
    \ & 0xFF);\n    I2Cwrite(AD5933,0x84,n & 0xFF);\n    long m=(long)(finc/(MCLK/4)*pow(2,27));\n\
    \    I2Cwrite(AD5933,0x85,(m>>16) & 0xFF);     // Frequency increment\n    I2Cwrite(AD5933,0x86,(m>>8)\
    \ & 0xFF);\n    I2Cwrite(AD5933,0x87,m & 0xFF);\n    I2Cwrite(AD5933,0x88,(npts>>8)\
    \ & 0xFF);   // Number of increments\n    I2Cwrite(AD5933,0x89,npts & 0xFF);\n\
    }\n// cmd: 0x10=init, 0x20=start, 0x30=increment, 0x40=repeat\n//      0x90=temp,\
    \ 0xA0=Pwdn, 0xB0=Stdby\nvoid AD5933_command(byte cmd) {\n    uint8_t b=I2Cread(AD5933,0x80);\n\
    \    I2Cwrite(AD5933,0x80,(b & 0x0F) | cmd);\n}\nvoid AD5933_standby() {AD5933_command(0xB0);}\n\
    void AD5933_init() {AD5933_command(0x10);}\nvoid AD5933_increment() {AD5933_command(0x30);}\n\
    void AD5933_power_down() {AD5933_command(0xA0);}\nint valid_data() {return ((I2Cread(AD5933,0x8F)\
    \ & 0x02) == 0x02);}\nint sweep_done() {return ((I2Cread(AD5933,0x8F) & 0x04)\
    \ == 0x04);}\n```"
