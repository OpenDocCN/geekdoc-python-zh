  - '[PAGE 219]


    # Example: Monitor for the Color of Water


    In this example, we determine the color of water, or more accurately stated, the
    absorption of material dissolved in water. An example is algae, which often proliferate
    during the summer and turn the water green because algae predominantly absorb
    the complementary color, which is red. In our experiment, we investigate the absorption
    of light with different colors by turning a three-color LED on and off, and observe
    the resulting modulation of the signal recorded by a phototransistor. If red light
    is absorbed, the resulting modulation depth of red is reduced, likewise for the
    other colors. By comparing the situation with LED on versus off, the system removes
    some of the influence of ambient background light, at least to some extent. On
    the left in Figure 11.1, we illustrate the absorption measurement with the RGB-LED
    on the left and the phototransistor on the right, with the absorbing material
    in between. We note that we can also use such a system to determine variations
    in the reflection from a surface, as is shown on the right in Figure 11.1.


    We construct the setup shown in Figure 11.1, using an Arduino UNO, and an RGB-LED,
    which houses a red, a green, and a blue LED in the same housing with a single
    connector for a common cathode or anode. In our case we use one with a common
    anode that is connected to the positive supply voltage. The respective color lights
    up if the controlling pin on the UNO is LOW. The phototransistor is an SFH3310,
    but any other model, sensitive in the visual spectral range, should work. The
    very simple setup is shown in Figure 11.2.


    ![](img/8f23875c54d5b3177d5d2a5bba06b37e_219_0.png)'
- md: "## 11.2 水色测量装置\n\n图11.2展示了使用Arduino UNO测量水色的装置。\n\n左侧是Arduino UNO，右下角是一个带有SFH3310光电晶体管的小面包板。发射极接地，集电极通过一个68\
    \ kΩ电阻连接到正电源电压。电阻值取决于光电晶体管，其确定依据是模拟输入引脚（通过蓝色导线连接到集电极）上需要有清晰可见的调制深度。稍加实验即可得到合理的电阻值。我们添加了一个10\
    \ μF和一个100 nF的电容来缓冲电源电压。RGB-LED放置在上方的面包板上，公共阳极连接到正电源电压，三个“颜色引脚”通过限流电阻连接到UNO的D2、D3和D4引脚。我们为红色LED选择了220\
    \ Ω，绿色为180 Ω，蓝色为150 Ω，以适应不同颜色LED的不同压降。\n\n在UNO上运行的程序中，我们需要依次切换LED，并同步记录光电晶体管记录的强度。这通过以下代码实现。\n\
    \n```cpp\n// Color monitor, V. Ziemann,170823\nint repeat=20;\nvoid alloff() {\
    \  //.......................alloff\n  digitalWrite(2,HIGH);  // red\n  digitalWrite(3,HIGH);\
    \  // green\n  digitalWrite(4,HIGH);  // blue\n}\nfloat measure(int pin, int repeat)\
    \ {  //..............measure\n  int hi,lo;\n  float sum=0;\n  alloff();\n  delay(10);\n\
    \  for (int i=0;i<repeat;i++) {\n    digitalWrite(pin,LOW);\n    delay(5);\n \
    \   lo=analogRead(0);\n    digitalWrite(pin,HIGH);\n    delay(5);\n    hi=analogRead(0);\n\
    \    sum+=(hi-lo);\n  }\n  return sum/repeat;\n}\nvoid setup() {  //.........................setup\n\
    \  Serial.begin(9600); while (!Serial) {;}\n  pinMode(2,OUTPUT);  // red\n  pinMode(3,OUTPUT);\
    \  // green\n  pinMode(4,OUTPUT);  // blue\n  alloff();\n  digitalWrite(2,LOW);\n\
    }\nvoid loop() {  //.........................loop\n  if (Serial.available()) {\n\
    \    char line[30];\n    Serial.readStringUntil('\\n').toCharArray(line,30);\n\
    \    if (strstr(line,\"OFF\")==line) {\n      alloff();\n    } else if (strstr(line,\"\
    RED\")==line) {\n      alloff();\n      digitalWrite(2,LOW);\n    } else if (strstr(line,\"\
    GREEN\")==line) {\n      alloff();\n      digitalWrite(3,LOW);\n    } else if\
    \ (strstr(line,\"BLUE\")==line) {\n      alloff();\n      digitalWrite(4,LOW);\n\
    \    } else if (strstr(line,\"COLOR?\")==line) {\n      float red=measure(2,repeat);\
    \    // red\n      float green=measure(3,repeat);  // green\n      float blue=measure(4,repeat);\
    \   // blue\n      Serial.print(\"COLOR \"); Serial.print(red);\n      Serial.print(\"\
    \\t\");Serial.print(green);\n      Serial.print(\"\\t\");Serial.println(blue);\n\
    \    } else if (strstr(line,\"REPEAT?\")==line) {\n      Serial.print(\"REPEAT\
    \ \"); Serial.println(repeat);\n    } else if (strstr(line,\"REPEAT \")==line)\
    \ {\n      repeat=(int)atof(&line[6]);\n    }\n  }\n  delay(10);\n}\n```\n\n首先，我们声明一个变量`repeat`和一个用于关闭所有LED的函数。函数`measure()`的输入参数是要切换的引脚和重复测量的次数。\n\
    \n图11.3展示了颜色传感器，左侧是RGB-LED，右侧是光电晶体管。\n\n我们在LED开启或关闭后添加5毫秒的延迟，以便电压稳定，然后再用`analogRead()`函数测量光电晶体管集电极的电压。LED开启和关闭时读数的差值累积在变量`sum`中，最后将累积差值的平均值返回给调用程序。在`setup()`函数中，我们初始化串口通信和RGB-LED的引脚，关闭所有LED，然后打开红色LED以指示系统已启动并正在运行。`loop()`函数使用我们在本书中通用的机制来关闭所有LED或打开红、绿、蓝中的一种颜色。如果查询是`COLOR?`，系统会测量光电晶体管在切换LED开启和关闭时的变化，并返回三个颜色变化的数字。最后，查询`REPEAT\
