  md: '# 4.6.3 WiFi


    For this section, we use a NodeMCU system that is connected to the host computer
    with a USB cable for programming. Moreover, the device support package as described
    in [Section 4.2](#) must be installed in the Arduino IDE. Our task is to connect
    the NodeMCU to a local wireless network; we assume it is called `MyHomeNet` and
    that it can be reached by other computers connected to the same network. All these
    computers will be able to query the measurement values of sensors connected to
    the NodeMCU. To better understand the setup, let us briefly discuss some general
    features of computer networks.


    Everybody is probably familiar with the fact that computers on the Internet are
    identified by IP numbers, such as `192.168.10.200`. Because the numbers are difficult
    to remember, there are also aliases such as `www.cnn.com`, and the translation
    is done by so-called *domain name resolution* or DNS servers. On our simple network,
    we assume that we can keep track of the numbers, and all sensors and host computers
    are connected to the (class-C) network `192.168.10.nn` where `nn` is a number
    between 2 and 254. The numbers 0 and 255 are reserved for special purposes, and
    we assume that the router that connects our network to the outside world (“the
    Internet”) has the IP number `192.168.10.1`. Note that the addresses starting
    with `192.168` are private numbers and can be used by anyone, provided that a
    router separates this network from the Internet. But we confine all our communication
    to within the `192.168.10` network, and identify each computer by its IP number.
    Each computer can potentially provide different services, such as running a web
    server, a measurement server, a mail server, or a server to allow logging onto
    the computer with standard protocols such as `telnet`, `ftp`, or `ssh`. The different
    services that a computer provides are identified by a *port number*. As an analogy,
    it may help to think of the IP number as a street address of an apartment building
    and the port numbers as the apartment numbers. The communication with a server
    that provides a service on a computer therefore requires the specification of
    the IP number and the port number.


    But how does a computer know its own IP number? There are two ways to specify
    this: by configuring the network setup manually and assigning the IP number explicitly.
    We use the second way and dynamically acquire the IP number via the *dynamic host
    configuration protocol*, DHCP, which is much more convenient, provided such functionality
    is available on a given network. In most networks with a wireless router, the
    router provides this service and one only has to tell a computer to use DHCP.
    In that case, the computer sends a request for an IP number at power-up. The DHCP
    server responds with an IP number that is then assigned to the newly connected
    computer. We assume that a DHCP server is running on our `192.168.10` network
    and the NodeMCU is also configured by default to use DHCP.


    Wireless networks are normally protected from unauthorized use by encrypting the
    communication. Most networks use an encryption standard called WPA that requires
    entering a password to connect to the network. We assume that the “MyHomeNet”
    WLAN is of that type. Having covered the networking basics, we are ready to connect
    our Arduino clone, the NodeMCU, to the WLAN.


    First we discuss the running of a simple web server on the NodeMCU, that uses
    the standard `http` protocol to communicate with other computers on the network.
    The following program shows how to set up a web server that listens on the default
    `http` port number 80. It provides access to temperature measurements and allows
    one to control the brightness of an LED. In our example we query the temperature
    measured by the NodeMCU, by directing a browser such as Mozilla Firefox to the
    address of the NodeMCU at [http://192.168.10.nn/temperature](http://192.168.10.nn/temperature),
    and the NodeMCU returns a web page with the temperature measured by an LM35 temperature
    sensor. The brightness of the built-in LED is controlled by adding a value to
    the address after a question mark, such that'
