- md: "The next group of JavaScript functions first defines the callback functions\
    \ to set the sample_period from the selection menu and to clear the display. The\
    \ function show_noconnect() displays a grey button for the state of the input\
    \ pin DI21, indicating that the data acquisition is not yet active. Then we define\
    \ functions to send the messages that cause the ESP32 to either set DAC25 to a\
    \ fixed value or to ramp it and create the sawtooth signal visible in Figure 13.1.\
    \ Next come functions to set the state of an output pin and to toggle it continuously.\
    \ Finally, we close the tags for SCRIPT, BODY, and HTML.\n\n```javascript\nfunction\
    \ setSamplePeriod(v) {\n  toStatus(\"Setting sample period to \"+ v + \" ms\"\
    );\n  sample_period=v;\n}\nfunction cleardisplay() {\n  dd = \"M0 512\";\n  document.getElementById('trace0').setAttribute('d',dd);\n\
    \  document.getElementById('trace0').setAttribute\n      ('transform','translate(0)');\n\
    \  document.getElementById('trace1').setAttribute('d',dd);\n  document.getElementById('trace1').setAttribute\n\
    \      ('transform','translate(0)');\n  current_position=0;\n}\nfunction show_noconnect()\
    \ {\n  c=document.getElementById('Din').getContext(\"2d\");\n  c.fillStyle = \"\
    #DDDDDD\"\n  for (i=2;i<3;i++) {c.fillRect(20+110*(i-2),0,100,20);}\n  c.font\
    \ = \"20px Arial\"; c.fillStyle = \"#000000\";\n  c.fillText(\"DI21\",50,17);\n\
    }\nfunction updatedac25(v) {\n  volts=v*3.3/255;\n  toStatus(\"Set DAC25 = \"\
    \ + v + \" -> \" + volts.toFixed(2) + \" V\");\n  websock.send(JSON.stringify({\
    \ \"cmd\" : \"DAC25\", \"val\" : v }));\n}\nfunction rampdac25(v) {\n  toStatus(\"\
    Ramp DAC25 with time step \" + v);\n  websock.send(JSON.stringify({ \"cmd\" :\
    \ \"RAMP25\", \"val\" : v }));\n}\nfunction setDO(v,s) {\n  vv=s?1:0;\n  toStatus(\"\
    Status changed on DO\"+ v + \" is \" + s + \" or \" + vv);\n  websock.send(JSON.stringify({\
    \ \"cmd\" : \"DO\"+v, \"val\" : + vv }));\n}\nfunction pulsepin18(v) {\n  toStatus(\"\
    Pulse D18 with time step \" + v + \" ms\");\n  websock.send(JSON.stringify({ \"\
    cmd\" : \"PULSE18\", \"val\" : v }));\n}\n</script> </body> </html>\n```\n\nIn\
    \ order to transfer this webpage to the ESP32 we create a subdirectory named data\
    \ under the subdirectory where ESP_minidaq.ino file resides and copy the html\
    \ file to it. Then we install the program that copies the contents of the data\
    \ subdirectory to the flash memory on the ESP32 by downloading ESP32FS-1.0.zip\
    \ from the *releases page* on https://github.com/me-no-dev/arduino-esp32fs-plugin\
    \ and unzip it in the /Arduino/tools/ subdirectory. After restarting the Arduino\
    \ IDE, we will find an entry *ESP32 Sketch Data Upload* in the *Tools* menu that\
    \ uploads the webpage to the ESP32, such that the server on port 80 finds it and\
    \ delivers it to connecting browsers. If the upload fails, ensure that the *Serial\
    \ monitor* window is closed and try again!\n\nAt this point, we have established\
    \ a two-way communication channel between the microcontroller and the browser\
    \ that has many advantages, because the user interface is entirely specified by\
    \ the HTML and JavaScript code running on the browser, which very flexible and\
    \ easy to extend, so we immediately use it for our next project.\n\n## QUESTIONS\
    \ AND PROJECT IDEAS\n\n1. Produce a 500 Hz rectangular signal on some output pin\
    \ of the ESP32.\n2. Make the minimum and maximum amplitudes of the sawtooth signal\
    \ adjustable, either use a selection menu or sliders on the web interface.\n3.\
    \ Use the second DAC on pin 26 to output a sine like signal by (slow) direct digital\
    \ synthesis.\n4. Do the same for a triangular output voltage that rises linearly\
    \ to the maximum and linearly goes back to zero.\n5. Add the AD9850 DDS board\
    \ and make it controllable through the web interface.\n6. Connect your favorite\
    \ sensor to the ESP32 and make it controllable through the web interface.\n7.\
    \ Program four output pins to produce the on-off pattern that drives stepper motors.\n\
    8. Add one button to the web interface that closes the websocket and another one\
    \ to reconnect if the connection was interrupted.\n9. Save the measurement samples\
    \ in an array on the browser using JavaScript, such that the numerical values\
    \ are displayed at the press of a button.\n\n## Example: Fast Acquisition\n\n\
    Occasionally it is desirable to observe and generate signals at rates higher than\
    \ the few hundred samples per second from Chapter 13, for example to analyze communication\
    \ channels, such as RS-232, or to observe acoustic signals. Luckily, the ESP32\
    \ is capable of sampling at rates in excess of 200 000 samples per second by directly\
    \ transferring samples from the ADC into memory without using the CPU using a\
    \ mode called *direct memory access* (DMA). It uses the I2S (Inter-IC Sound) support\
    \ on the ESP32 chip that is normally dedicated to digitally transmitting music.\
    \ Moreover, the ESP has built-in frequency generators for sinusoidal and rectangular\
    \ signals in the same frequency range.\n\nIt is straightforward to add these features\
    \ to our data acquisition system by including the following code snippet – based\
    \ on the ESP32 example HiFreq_ADC – to configure the high-speed mode in our sketch.\
    \ It includes the header file `driver/i2s.h` for I2S support and then configures\
    \ I2S to sample at the specified `i2s_sample_rate`. It reads the analog input\
    \ from input pin 32, which is connected to ADC1_CHANNEL_4. Replace the _4 by _7\
    \ to connect it to pin 35. We set the attenuation of the input voltages such that\
    \ it covers the range from zero to the supply voltage. Note that error handling\
    \ is rather basic; the program just prints a short message to the serial line.\n\
    \n```c\n#include <driver/i2s.h>\nbool i2s_adc_enabled=false;\nvoid i2sInit(uint32_t\
    \ i2s_sample_rate){\n  i2s_config_t i2s_config = {\n    .mode = (i2s_mode_t)(I2S_MODE_MASTER\
    \ | I2S_MODE_RX\n                                    | I2S_MODE_ADC_BUILT_IN),\n\
    \    .sample_rate =  i2s_sample_rate,\n    .bits_per_sample = I2S_BITS_PER_SAMPLE_16BIT,\n\
    \    .channel_format = I2S_CHANNEL_FMT_ONLY_LEFT,\n    .communication_format =\
    \ I2S_COMM_FORMAT_STAND_I2S,\n    .intr_alloc_flags = ESP_INTR_FLAG_LEVEL1,\n\
    \    .dma_buf_count = 8,\n    .dma_buf_len = 1024,    // 1024 is maximum length\n\
    \    .use_apll = true,       // needed for low frequencies\n    .tx_desc_auto_clear\
    \ = false,\n    .fixed_mclk = 0\n  };\n  if(ESP_OK != i2s_driver_install(I2S_NUM_0,\
    \ &i2s_config, 0, NULL)){\n    Serial.print(\"Error installing I2S.\");\n  }\n\
    \  if(ESP_OK != i2s_set_adc_mode(ADC_UNIT_1, ADC1_CHANNEL_4)){ // pin 32\n   \
    \ Serial.print(\"Error setting up ADC.\");\n  }\n  if(ESP_OK != adc1_config_channel_atten(ADC1_CHANNEL_4,\
    \ ADC_ATTEN_DB_11)){\n    Serial.print(\"Error setting up ADC attenuation.\");\n\
    \  }\n  if(ESP_OK != i2s_adc_enable(I2S_NUM_0)){\n    Serial.print(\"Error enabling\
    \ ADC.\");\n  }\n  Serial.print(\"I2S ADC setup ok\\n\");\n}\n```\n\nThe sinusoidal\
    \ frequency generator also uses the I2S hardware on the ESP32. After including\
    \ three header files, two variables define the frequency and output scale of the\
    \ signal, before the function cwDACinit(), which is based on the very detailed\
    \ information from https://github.com/krzychb/dac-cosine, configures the generator\
    \ by directly writing to registers on the ESP32. We point out that the fudge factor\
    \ 0.95 that appears in the calculation of frequency_step is needed to compensate\
    \ the _APPROX and to produce the specified output frequency. Note that setting\
    \ the desired frequency to zero disables the output.\n\n```c\n#include <driver/dac.h>\n\
    #include <soc/sens_reg.h>\n#include \"soc/rtc.h\"\nfloat dac25freq=0;\nint dac25scale=0;\
    \   // output full scale\nvoid cwDACinit(float freq, int scale, int offset) {\
    \ //...cwDACinit\n  if (abs(freq) < 1e-3) {dac_output_disable(DAC_CHANNEL_1);\
    \ return;}\n  int frequency_step=max(1.0,floor(0.5+0.95*65536.0*freq\n       \
