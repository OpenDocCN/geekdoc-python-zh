    );\n    }\n  }\n}\n```\n\n252 ■ A Hands-On Course in Sensors Using the Arduino\
    \ and Raspberry Pi, Second Edition\n\nAt the top of the sketch, a number of variables\
    \ are declared for the time to wait between stepper motor steps and the initial\
    \ setting of the pulse-width modulation for the laser_power. Then the pins used\
    \ for the stepper motor and the LASER are declared before defining the set_coils_fullstep()\
    \ function, which is identical to the full-step version we used earlier in Section\
    \ 4.5.4. We use full-step mode because the step resolution is sufficient, and\
    \ in half-step mode there is a small visible disturbance on the sensor from the\
    \ different currents drawn on alternate steps in half-step mode, where exciting\
    \ one coil and two coils take turns. In the setup() function, we initialize the\
    \ serial communication, declare the mode of the pins used for the motor, and initialize\
    \ the laser power to be 10 (of up to 255). The loop() function is built in much\
    \ the same way as before. It expects to receive single-line commands on the serial\
    \ line. As in Section 4.5.4, the FMOVE command moves the motor by the specified\
    \ number of steps. Then there are commands to set and return the STEPS and the\
    \ time to WAIT or ENABLE the motor driver. The command LDR? reads the sensor value\
    \ from analog pin A0, and the POWER command sets and reads the laser excitation.\
    \ Finally we encounter the command FSCAN nnn where nnn is the scan range retrieved\
    \ by reading the rest of line with the atof() function we used before. Here we\
    \ assume that the scanner actually blocks the laser, and first needs to be retracted\
    \ before collecting data. Inside the case block it first reports to the serial\
    \ line what it is about to do, enables the motor driver, and moves the obstacle\
    \ out of the way. Then comes a for loop, where the motor performs individual steps\
    \ and within each step, takes ten measurements of the LDR on analog pin A0 and\
    \ adds them up. At the end of each step the measurement value is written to the\
    \ serial line. Once the number of steps is complete, the motor driver is disabled.\
    \ The last command implemented is CALIBRATE, which measures the sensor response\
    \ as a function of the laser power. The latter we may later use to convert the\
    \ raw sensor readings to a linear intensity scale should the need arise.\n\nAs\
    \ a first test of the system, we open the Serial Monitor in the Arduino IDE, make\
    \ sure that the baud rate is set to the one specified in the setup() function,\
    \ 9600 baud in our case, and query the LDR by sending LDR? to the UNO. The response\
    \ has the format LDR nnn, where nnn is the raw value from the call to the analogRead()\
    \ function. Then we query the laser power with POWER? and set it to a new value\
    \ with POWER nnn, where nnn is a value between 0 and 255. The brightness of the\
    \ laser spot should change accordingly. Next we move the stepper motor a few steps,\
    \ for example, with FMOVE 20, and move it back to the starting position with FMOVE\
    \ -20. The wagon with the obstacle should move back and forth. As a last point,\
    \ we execute FSCAN 60, which will move the obstacle by 60 steps and then returns\
    \ to the starting position step by step, while reading the sensor and reporting\
    \ the value to the serial line. If all these initial tests complete satisfactorily,\
    \ we progress to automating the process, and for that we chose octave.\n\nBasically,\
    \ we hook up the Arduino UNO to the Raspi, write an octave script to open a serial\
    \ line, send commands to the UNO, and receive the response, very similar to what\
    \ we did in previous examples. Before writing the octave script, we need to calibrate\
    \ the motion of the obstacle in order to be able to show the width in mm instead\
    \ of steps. In moving the wagon a large distance, I use 250 full steps, and, taking\
    \ a photo of the setup with a ruler lying next to it before and after moving it,\
    \ is easy to calculate the calibration constant xscale in mm/step. In my case,\
    \ 250 steps moved the wagon by 39.2 mm, which explains the value for xscale near\
    \ the top of the following script.\n\n```matlab\n% scanplot2.m, V. Ziemann, 221103\n\
    close all; clear all\nxscale=0.161;  % mm/fullstep\ns=serialport('/dev/ttyACM0',9600);\
    \  % set device correctly\npause(3);\nflush(s);      % flush the input queue\n\
    nsteps=60;\nwrite(s,\"FSCAN 60\\n\");\npause(5);\nxx=zeros(1,nsteps); yy=xx;\n\
    for i=1:nsteps\n    xx(i)=i*xscale;\n    yy(i)=str2double(serialReadline(s));\n\
    end\nclear s\nyy=smooth3(yy);           % smooth data\nsubplot(2,1,1);\nplot(xx,yy);\
    \              % raw sensor data\nylabel('arb. units');\nsubplot(2,1,2);\ndy=yy(2:end)-yy(1:end-1);\
    \ % derivative\nif (yy(1) > yy(end)) dy=-dy; end\nplot(xx(1:end-1),dy);\nxlabel('x\
    \ [mm]'); ylabel('arb. units');\ntitle(['FWHM = ', num2str(xscale*fwhm(dy),'%5.2f'),\
    \ ' mm'])\nprint('laser_profile.png','-S1000,700')\n```\n\n254 ■ A Hands-On Course\
    \ in Sensors Using the Arduino and Raspberry Pi, Second Edition\n\nThe rest of\
    \ the script should be familiar by now. After opening the serial line and flushing\
    \ whatever characters are present, we define the number of steps and write FSCAN\
    \ 60 to the UNO. Then we wait a short time and start retrieving the values from\
    \ the serial line with the serialReadline() function we already encountered in\
    \ Chapter 12. It reads characters from the serial line until the termination character\
    \ is encountered, and returns the obtained characters as a character string. But\
    \ back to the main script. While retrieving data and copying it to the array yy,\
    \ we also fill the array xx with the properly scaled values for the horizontal\
    \ axis. Once the loop completes, we close the serial device with clear s.\n\n\
    After all data are available in the script, we start processing it. Since we will\
    \ calculate the derivative of the raw data later, which is a process that is very\
    \ sensitive to noise, we weakly smooth the sensor values in array yy with the\
    \ smooth() function. It averages three consecutive values and replaces the central\
    \ value with the average. The octave script for smooth3() is\n\n```matlab\n% smooth\
    \ three consecutive points, V. Ziemann, 170628\nfunction out=smooth3(y);\ny=[y(1),y(1:end),y(end)];\
    \ % add extremities\nf=ones(1,3)/3.0;          % filter function\nout=conv(y,f);\
    \            % convolute\nout=out(3:end-2);         % ensure same length\n```\n\
    \nIt first creates a new array with the extreme points doubled up to avoid ugly\
    \ artefacts at the end points. In the next line we create the filter function\
    \ f that consists of three values 1/3 and use it to convolute the data with the\
    \ filter. Since the convolution creates an output array that is longer than the\
    \ original, we remove the extreme points before returning the smoothed array as\
    \ the value out. Once these initial preparations are complete, we show the smoothed\
    \ raw values on the upper plot in Figure 16.4 and add a label to the vertical\
    \ axis. Then we calculate the difference between consecutive values, which is\
    \ motivated by the fact that in each step a little of the laser beam is obscured\
    \ and the change in remaining intensity is proportional to the intensity in the\
    \ small band that the obstacle transverses during that step. The result is a signal\
    \ that is proportional to the transverse intensity profile of the laser beam shown\
    \ in the bottom plot in Figure 16.4. Its title shows the full width at half maximum\
    \ (FWHM) of the laser profile, which is about 0.8 mm. Finally, we produce an image\
    \ file, which is precisely how we prepared Figure 16.4."
