    the book was first published. Newly added features include the ESP32 microcontroller,
    several environmental and medical sensors, actuators for signal generation, as
    well as a chapter on websockets; all illustrated in new case studies. This book
    is suitable for advanced undergraduate and graduate students taking hands-on laboratory
    courses in physics and engineering. Hobbyists in robotics clubs and other enthusiasts
    will also find this book of interest"-- Provided by publisher.

