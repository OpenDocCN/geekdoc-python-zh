    features, which contains functions that make plotting particularly simple. The
    loadtxt() function in the following line loads the data from the file into the
    array d. The next lines simply plot the data, add axis labels, and display the
    plot on the screen.


    A second option to display contents of the same data file, even with the timestamps
    taken into account nicely is to use octave, which has powerful capabilities to
    handle timestamps. We extract the data stored in the flatfile database and display
    it with the following script.


    ```

    % flatfile_reader.m, V. Ziemann, 221004

    d=importdata(''/home/pi/A0.dat'');

    TZ=1; t=719529+(d(:,1)+TZ*3600)/86400.0;

    plot(t,d(:,2))

    datetick(''x'',''HH:MM:SS'')

    ```


    Most of the work is done by the importdata() function. It figures out the format
    of the A0.dat file and loads its contents into the variable d, which is a matrix
    with two columns, one with the time information and the other with the measurement
    values. In the next line we convert the time into the standard format that the
    datetick() function expects. It will properly format the displayed time on the
    horizontal axis. Note that we use the variable TZ to denote the time zone. Since
    I live in Sweden, the local clock is one hour ahead of UTC standard time, to which
    the epoch refers. The constant 719529 is the number of days from January 1, 0000
    until January 1, 1970, and 86400 is the number of seconds per day. The plot looks
    similar to the one shown in Figure 5.8.


    After storing data in a flatfile database, retrieving it, and displaying the data,
    we now progress to using a more mature database, MariaDB. Earlier it was known
    as MySQL, but the copyright for that name is reserved, which caused the name change.


    # 5.6.2 MariaDB


    Among several databases available for the Raspi, we choose MariaDB [27] because
    internally it works just like MySQL and we keep referring to it as such. Moreover,
    MySQL-like databases are widely used and can be accessed reasonably easily from
    most programming languages. These include Python and, after some archaeology on
    the Internet, octave as well. We install the MariaDB database from the standard
    repositories with the following command:


    ```

    sudo apt-get install mariadb-server

    ```


    Despite installing the package mariadb-server, the name of the program to access
    the database is still mysql.


    Once MariaDB is installed, we create a database named readA0 that will contain
    roughly the same information as the flatfile in the previous section, namely a
    timestamp and measurement values. Creation of a new database must be done by mysql-user
    root and executed with administrator privileges using sudo. Without being asked
    for a password we log into the database with the following command:


    ```

    sudo mysql -u root

    ```


    We are immediately greeted by the prompt MariaDB [(none)]> where we create the
    new database with the following command:


    ```

    create database readA0;

    ```'
- md: 'Here we specifically need to point out the necessity to complete every command
    by a semicolon. We verify that the database **readA0** exists with the `show databases;`
    command at the MariaDB prompt. Since later we will not always want to work with
    the database **readA0** as mysql-administrator, we create a database user. To
    do so, we declare that we want to work with **readA0** by writing


    ```

    use readA0;

    ```


    at the prompt, which causes the name of the database to be displayed as part of
    the prompt. Now we create the user **me** and then grant privileges to work with
    the database, with the following sequence of commands:


    ```

    create user ''me''@''localhost'' identified by ''pwpw'';

    grant all privileges on readA0.* to ''me''@''localhost'';

    ```


    where **pwpw** is the (too simple, invent a better one) password. Luckily the
    syntax is fairly self-explanatory. Note that the granting of privileges can be
    tailored in a rather detailed fashion into reading, writing, and other privileges,
    but for our simple example we stick to the simple version. Once the general administration
    of creating a database and assigning a mysql user is done, we exit from the mysql
    prompt by typing `quit;`.


    But now we log onto MariaDB as user **me** by typing


    ```

    mysql -u me -p

    ```


    at the command prompt and entering the password. Alternatively, the command `mysql
    -u me -ppwpw` with the password **pwpw** immediately appended after the `-p` will
    directly log onto the mysql-prompt, but now as the user **me** who only has privileges
    to work with the **readA0** database. We verify this by executing the `show databases;`
    command, which shows **readA0** and some other administrative database that do
    not concern us here. In order to create a data structure, called **table** in
    our database, we select it with `use readA0;` and then enter


    ```

    create table fdata (ts timestamp, A0 float, A1 float);

    ```


    which creates a table **fdata** that stores a time stamp and two values in every
    row. Other options for things to store are **integer** and **BLOB**, the latter
    being a *binary large object*. The MariaDB manual, available at [https://mariadb.org/documentation/](https://mariadb.org/documentation/),
    holds a wealth of detailed information.


    The administrative task to create the table is done at this point, and we could
    `quit;`, but it is instructive to insert values into the newly created table by
    executing the following command at the prompt


    ```

    insert into fdata (A0,A1) values (3.14,2.71);

    ```


    and verify the contents of the database with the command


    ```

    select * from fdata;

    ```


    which prints the contents of the table. We observe that the timestamp variable
    was automatically filled with the time the values are inserted. The syntax to
    insert values is, again, rather self-explanatory. We `insert into` a table called
    **fdata** the variables (A0,A1) with values 3.14 and 2.71. Reading all values
    from the table is achieved by the `select` command. Specifying the asterisk causes
    the entire table **fdata** to be displayed. If we only want to print the timestamp
    **ts** and value A1, we can issue `select ts,A1 from fdata;`. These commands to
    create, insert, and select data from the table are standardized and are called
    Structured Query Language or SQL. Please inspect tutorials and further information
    about SQL on the Internet. After this exercise we exit the mysql program by executing
    the `quit;` command.


    Now we know the basic SQL commands to insert and retrieve data from tables. But
    rather than typing them from the mysql prompt, our next task is to use Python
    to execute the SQL commands. We add MySQL functionality, which also works with
    MariaDB, to Python by installing the python3-mysqldb package with the command


    ```

    sudo apt-get install python3-mysqldb

    ```


    at the command prompt, and are ready to access MariaDB databases from within Python.
    As a first task, we read the table fdata from the database readA0 we had created
    earlier. The following Python script achieves just that.


    ```

    # mysql_show.py, V. Ziemann, 221003

    import MySQLdb

    db=MySQLdb.connect("localhost","me","pwpw","readA0")

    cur=db.cursor()

    cur.execute("select * from fdata;")

    reply=cur.fetchall()

    print(reply)

    # for r in reply:                    # loop over entries

    #   print(r)                         # print each entry

    #   print(str(r[0]), str(r[1]), str(r[2]))  # format nicely

    db.close()

    ```


    First the library with MySQL support is imported, and then we connect to the database
    readA0 on computer localhost, as user me with password pwpw. The MySQLdb.connect()
    function returns a handle db to the database, and executing it corresponds to
    logging onto the database and executing the `use readA0;` command at the mysql
    prompt. The next line creates a cursor cur, which is equivalent to the MariaDB
    prompt and allows us to enter database insertion or retrieval commands. In the
    next line we execute the select command to display the entire table. We retrieve
    the output from the command in the variable reply with the fetchall() call and
    print the reply before closing the database. Note the structure of first executing
    a MariaDB command and then retrieving the reply with the fetchall() function.
    The reply, however, is a list of entries in an unfamiliar form. It is possible
    to display each measurement entry on a separate line by using the lines commented
    out by a hash (#). The code loops over each entry in the list, and in the first
    commented example, the print command displays one entry at a time. In the second
    example, the print command uses the str() function to convert each entry to a
    string which makes it human readable. Finally, we close the database with the
    call to the db.close() function.


    Our next task is to insert new entries with measurements into the database, and
    this is accomplished by the following Python script.


    ```

    # serial2mysql.py, V Ziemann, 221003

    import serial,time,MySQLdb

    ser=serial.Serial("/dev/ttyUSB0",9600,timeout=1)

    time.sleep(3)    # wait for serial to be ready

    ser.write("A0?\n".encode(''utf-8''))

    reply=ser.readline().decode(''utf-8'')

    val0=float(reply[3:].strip())

    ser.write("A1?\n".encode(''utf-8''))

    reply=ser.readline().decode(''utf-8'')

    val1=float(reply[3:].strip())

    ser.close()

    db=MySQLdb.connect("localhost","me","pwpw","readA0")

    cur=db.cursor()

    sql="insert into fdata (A0,A1) values (%f,%f);" % (val0,val1)

    print(sql)

    cur.execute(sql)

    db.commit()

    db.close()

    ```


    The first part of the script is very similar to earlier scripts. It just queries
    the Arduino UNO on the serial line and converts the measurement values from analog
    pin A0 and A1 to float values, which are stored in the variables val0 and val1.
    In the second part we connect to the database readA0 and obtain a cursor. We then
    build the sql string with the MySQL insert command and execute it in the next
    command, before committing the changes to the database and closing it. Note that
    we could perform several transactions in a row that might leave the database in
    a bad intermediate state. To prevent this from happening, all insert commands
    are buffered and all changes are committed to the database simultaneously with
    the commit() function call. In order to automatically record data, we add the
    line


    ```

    * * * * * /usr/bin/python3 /home/pi/python/serial2mysql.py

    ```


    to the crontab file using the command `crontab -e` that we already discussed in
    the previous section on flatfile databases.


    Now that we have a process that continuously fills the database, we want to use
    octave for postprocessing and to prepare plots for presentations. We therefore
    need a function to access the database from within octave, which turns out to
    be difficult, because neither MySQL nor MariaDB are supported by either the Raspberry
    Pi or octave repositories. Instead, we use code from the github site https://github.com/markuman/mex-mariadb
    that we must compile ourselves, which requires the installation of two development
    packages with


    ```

    sudo apt-get install liboctave-dev libmariadb-dev

    ```


    Once that is accomplished we use git clone to download the source code and then
    compile it with a call to make


    ```

    git clone https://github.com/markuman/mex-mariadb.git

    cd /home/pi/mex-mariadb

    make

    ```


    This creates the mex file mariadb_.mex, which is the compiled binary file that
    is called from a wrapper function mariadb.m. In order to enable all octave scripts
    to use the mariadb() function, we add the line


    ```

    addpath /home/pi/mex-mariadb

    ```


    to the octave startup file /home/pi/.octaverc.


    In a separate directory we prepare an octave script mariadb_read.m, which reads
    the values from the database and displays them.


    ```

    % mariadb_read.m, V. Ziemann, 221003

    clear all;

    sql=mariadb(''hostname'',''localhost'',''username'',''me'',''password'',''pwpw'');

    sql.database=''readA0''; % select database

    ```'
