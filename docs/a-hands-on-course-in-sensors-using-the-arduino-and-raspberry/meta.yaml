  md: "This starts the EPICS server and the process variable, here only `raspi:temp`,\
    \ is published on the local network so that any computer with the EPICS base system\
    \ installed and a working `caget` program can read the temperature from our Raspi.\n\
    \nIt remains to connect the NodeMCU microcontroller to EPICS. Since the NodeMCU\
    \ server from Section 4.6.3 listens on port 1137 at IP number 192.168.20.135 and\
    \ uses the same protocol (send ‘T?’, receive ‘T 22.1’), we just add the following\
    \ two lines to the `st.cmd` file:\n\n```\ndrvAsynIPPortConfigure(\"SOCKET1\",\"\
    192.168.20.135:1137\",0,0,0)\ndbLoadRecords(\"db/temperature.db\",\"PORT='SOCKET1',USER='node'\"\
    )\n```\n\nThe first line defines a symbol SOCKET1 that points to the port on the\
    \ NodeMCU, and the second line instructs EPICS to use the same database file `temperature.db`\
    \ as before, and link the communication to the PORT corresponding to the one defined\
    \ in the previous line. Once we add the two lines, we need to compile the project\
    \ again. This we do by issuing `make` in the directory `/home/epics/ioc/temp/`\
    \ and restarting `st.cmd` by executing `./iocBoot/ioctemp/st.cmd` from the same\
    \ directory. The result of this exercise is that EPICS now publishes two process\
    \ variables, `raspi:temp` from before and `node:temp` from the NodeMCU connected\
    \ by WLAN, which we can verify by entering the command `dbl` at the `epics>` prompt\
    \ that `st.cmd` provides.\n\nMost of the above actions we only need to do once,\
    \ and adding additional sensors to the EPICS IOC is only moderately complex. It\
    \ only requires writing the appropriate protocol file, say `new.proto` and database\
    \ file `new.db`, and copying both to the `./tempApp/Db` directory. Then we need\
    \ to add the database file to the project by adding `DB += new.db` to the Makefile\
    \ in the same directory. Finally, we need to add `drvAsynXConfigure` to the `st.cmd`\
    \ file and execute `dbLoadRecords` to link the database file to the appropriate\
    \ PORT. Finally, we compile once again and and run the `st.cmd` command.\n\n#\
    \ 6.5 STARTING THE IOC AT BOOT TIME\n\nIn the description above we need to start\
    \ the IOC `st.cmd` by hand and keep a terminal window with the running program\
    \ open all the time. To remedy this inconvenience, we create a startup script\
    \ named `epicsioc` that launches the IOC when the system boots. The file contains\
    \ the following lines:\n\n```\n#!/bin/sh\n#/etc/init.d/epicsioc\n### BEGIN INIT\
    \ INFO\n# Provides:          empicsioc\n# Required-Start:    $remote_fs $syslog\n\
    # Required-Stop:     $remote_fs $syslog\n# Default-Start:     2 3 4 5\n# Default-Stop:\
    \      0 1 6\n# Short-Description: Simple script to start a program at boot\n\
    # Description:       Start and stop epicsioc server\n### END INIT INFO\ncase \"\
    $1\" in\n  start)\n    echo \"Starting epicsioc\"\n    . /home/pi/.bash_aliases\n\
    \    cd /home/pi/epics/ioc/temp/iocBoot/ioctemp\n    /usr/bin/procServ -n \"IOC\"\
    \ -L /tmp/epics.log -i ^D^C 20000 ./st.cmd\n```"
