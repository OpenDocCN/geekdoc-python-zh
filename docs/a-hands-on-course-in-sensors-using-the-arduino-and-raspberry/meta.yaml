  md: "In the first few lines, we declare the variables, and in particular, a 30-character\
    \ buffer `line` to hold the multicharacter query. In the `setup()` function, we\
    \ use the internal 1.1 V reference voltage for the ADC and initialize the Serial\
    \ communication channel to operate at 9600 baud. The `while(!Serial)` statement\
    \ waits for the initialization of the Serial library to complete, and is only\
    \ needed on some newer Arduinos. We include it just for safety. In the `loop()`\
    \ function, we wait for characters to be available before reading an entire line\
    \ until the end-of-line character `\\n`. The `readStringUntil` returns a `String`\
    \ but we want to use a character array instead, and need to convert the type in\
    \ the appended `toCharArray` method. At this point the character array `line`\
    \ contains the request that was sent from the host computer to the Arduino; for\
    \ example, `A0?`. The following construction of `if (strstr(line,\"A0?\")==line)`\
    \ and similar commands checks whether `line` starts with the characters `A0?`\
    \ by comparing the pointer to the first occurrence of `A0?` in the array `line[]`\
    \ to the pointer to the start of `line[]`. The commands that follow are executed\
    \ provided the result evaluates to true, or else the subsequent comparison in\
    \ the `else if` sequence is tested. In the example, we test for `\"A0?\"`, `\"\
    A1?\"`, and `\"T?\"` to reply with the raw values of the analog pins 0 and 1 or\
    \ with the value from analog pin 0 converted to degrees Celsius. Consult the discussion\
    \ in [Section 2.1.2](#) regarding the conversion coefficient. If a command arrives,\
    \ and it is not in the list, the Arduino replies with `unknown command`. The way\
    \ to specify the query with an appended question mark and the reply to echo the\
    \ query with value appended is borrowed from the SCPI [23] command-language that\
    \ is commonly used to remotely control measurement equipment via GPIB, also known\
    \ as IEEE-488, or VXI.\n\nAs a final example, we discuss a simple *temperature\
    \ logger* that again uses the hardware setup as shown on the right side of Figure\
    \ 4.6, but sends the temperature value continuously to the host computer via the\
    \ serial line. The sketch is shown here:\n\n```\ncpp\n// ultra-simple LM35 temperature\
    \ logger, V. Ziemann, 161201\nfloat temp;\nvoid setup() {\n  analogReference(INTERNAL);\
    \  // 1.1V internal ADC reference\n  Serial.begin(9600);\n  while (!Serial) {;}\
    \  // wait for serial to initialize\n}\nvoid loop() {\n  temp=1.1*100*analogRead(0)/1023.0;\n\
    \  Serial.println(temp);\n  delay(1000);\n}\n```\n\nwhere the `setup()` function\
    \ equals that from the previous example, but the `loop()` function measures the\
    \ analog pin and converts the digital word to the temperature, and sends that\
    \ to the host computer. Then it waits 1000 ms before repeating the same. In the\
    \ Serial Monitor, that can be started by clicking on the button at the top right\
    \ in the IDE; we see that the temperature value in Celsius is reported once per\
    \ second in the lower text box provided the baud rate selected in the selection\
    \ box at the lower right matches the baud rate specified in the sketch.\n\nIn\
    \ the Arduino IDE, however, there is also a graphical plotting tool available.\
    \ We select it by choosing the `Tools->Serial Plotter` menu item. This opens a\
    \ window and shows the values received on the serial line in graphic format, provided\
    \ the baud rate is selected to match the one specified in the sketch. Note that\
    \ the `Serial Plotter` can show several measurement values simultaneously as traces\
    \ in different colors. This functionality, built in to the Arduino IDE, may serve\
    \ as a simple logger for temperatures or other measured values, if a quick solution\
    \ to record some values as a function of time is needed."
