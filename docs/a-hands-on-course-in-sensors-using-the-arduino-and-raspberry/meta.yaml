    void setup() {\n  pinMode(LED_BUILTIN, OUTPUT);\n}\nvoid loop() {\n  digitalWrite(LED_BUILTIN,\
    \ HIGH);   // turn the LED on\n  delay(1000);                       // wait for\
    \ a second\n  digitalWrite(LED_BUILTIN, LOW);    // turn the LED off\n  delay(1000);\
    \                       // wait for a second\n}\n```\n\nLet us step though this\
    \ sketch one line at a time. In the `setup()` function, we call the `pinMode(Pin,What)`\
    \ function, which declares that the pin called `LED_BUILTIN` (which is pin 13\
    \ on a UNO) will be used as output pin. That is all the initializing we do in\
    \ the `setup()` function. In the `loop()` we call `digitalWrite(Pin,State)`, which\
    \ causes the controller to put 5 V onto the specified pin if the requested state\
    \ is HIGH and 0 V if the requested state is LOW. The latter happens two lines\
    \ later. In between the changes to the output pin, we tell the controller to wait\
    \ for a specified number of milliseconds in the `delay(time_in_ms)` function.\
    \ So, all the loop function does is turn on the LED on pin 13, wait for 1000 ms\
    \ or 1 s, turn it off, wait again for 1 s, and then start all over again. Note\
    \ that all commands are terminated by a semicolon, as is customary in the C-language.\n\
    \nOnce we are satisfied with our program, we can compile it and check that the\
    \ syntax is correct and we did not forget any semicolons. Pressing the checkmark\
    \ symbol just below the File menu entry compiles the program and reports progress\
    \ in the status window below the program window. If the compilation completes\
    \ without errors and the UNO board is connected to a USB port, and it is selected\
    \ in the Tools→Port menu entry, we can download the program to the UNO by pressing\
    \ the → button located to the right of the compile button. After a few seconds,\
    \ a small LED on the UNO board should start to blink once per second. Now we can\
    \ change, for example, the delay time in the sketch, compile and download again,\
    \ and observe whether the LED blinks according to the newly specified times.\n\
    \nHere we only used very few commands, such as `pinMode` or `digitalWrite`, but\
    \ there are many more, and checking the Reference section on the Arduino website\
    \ at https://www.arduino.cc/reference/en/ is very inspirational. Moreover, clicking\
    \ on the different commands opens a new page, with explanations and examples on\
    \ how to use the functions. A further source of wisdom is the “Documentation”\
    \ tab from the menu list on the top of https://www.arduino.cc/, which offers a\
    \ large number of tutorials and examples. Keeping these resources in mind will\
    \ help us to quickly locate information to make things work. Moreover, there are\
    \ a large number of books on various Arduino projects, and compendia of tips and\
    \ tricks such as [22].\n\nAfter the first step to make the microcontroller follow\
    \ our bidding, we move on and read sensors.\n\n## 4.4 INTERFACING SENSORS\n\n\
    Here, the main task of the Arduino microcontroller is to read sensors, with their\
    \ different, often idiosyncratic interfaces, and convert the measured values to\
    \ a standard representation that is communicated to a host computer. We start\
    \ with the simplest sensor, a button or a switch.\n\n### 4.4.1 Button\n\nIn Figure\
    \ 4.5, we show how to connect a button between ground and pin 2 of the Arduino,\
    \ such that pressing the button will cause pin 2 to read 0 V or LOW. The following\
    \ listing shows a sketch that causes the built-in LED on pin 13 to light up, if\
    \ the button is pressed.\n\n```\n// button_press, V. Ziemann, 161013\nvoid setup()\
    \ {\n  pinMode(2,INPUT_PULLUP);   // button, default=HIGH\n  pinMode(13,OUTPUT);\
    \          // LED\n}\nvoid loop() {\n  if (digitalRead(2)==LOW) {\n    digitalWrite(13,HIGH);\n\
    \  } else {\n    digitalWrite(13,LOW);\n  }\n  delay(10);\n}\n```\n\nThe program\
    \ follows the normal scheme of initializing the hardware in the **setup()** function.\
    \ We first declare that pin 2 is an input pin, and we enable the internal pull-up\
    \ resistor that causes a well-defined “high” state on the pin if no button is\
    \ pressed. Pin 13 with the LED is declared as output, so we can turn it on and\
    \ off from within the sketch. In the **loop()** function, we check the state of\
    \ the button by calling the **digitalRead(Pin)** function, and test whether pin\
    \ 2 is LOW. If this is the case (note the double equal sign == in the comparison),\
    \ the LED on pin 13 is turned on by calling **digitalWrite(13,HIGH)**. If pin\
    \ 2 is found not to be LOW, the LED on pin 13 is tuned off with **digitalWrite(13,LOW);**.\
    \ Note the braces { and } and their use to define blocks of code in the **if (..)\
    \ { } else { }** construction. After the **if** statement, a short **delay()**\
    \ ensures that mechanical button bounces are ignored and that the processor has\
    \ a little time for its internal affairs. This is not absolutely necessary, but\
    \ good style.\n\nSensing the state of switches that indicate open doors or windows\
    \ follows exactly the same scheme, and we can sense up to 13 different switches\
    \ (if we do not use the LED on pin 13) and react in some manner."
  mdcn: "## 4.3 HELLO WORLD，BLINK\n\n现在，我们将Arduino UNO连接到运行Arduino IDE的主机电脑的任意USB端口，并从“工具→开发板”菜单中选择Arduino\
    \ UNO。这一步告诉IDE编译器将为哪个处理器生成代码，以及一些硬件特定的定义，例如我们在编程时可以使用的IO引脚名称。此时，IDE“知道”硬件是什么，但我们仍需告诉IDE\
    \ UNO连接到了哪个USB端口。我们在“工具→串口”菜单中完成此操作，通常UNO连接的串口会自动出现并可被选中。在Linux系统上，这通常是`/dev/ttyUSB0`或`/dev/ttyACM0`。在Windows电脑上，则是`COMx`，其中`x`是某个数字。\n\
    \n此时，我们就可以开始为UNO编程了，尽管图4.3中的示例程序只包含空函数。但在为Arduino编写程序之前，我们想先安装基于ESP8266微控制器的支持文件。安装很简单：打开“文件→首选项”菜单，在“附加开发板管理器网址”文本框中添加`http://arduino.esp8266.com/stable/package_esp8266com_index.json`，然后点击“确定”按钮。接着，打开“工具→开发板”菜单，打开“开发板管理器”，找到“esp8266”平台。然后选择最新版本并点击“安装”按钮。安装完成后，从“工具→开发板”菜单中选择“ESP826\
    \ Boards”平台。对于ESP-01，“Generic ESP8266 Module”条目是一个不错的选择；对于NodeMCU平台，则是“NodeMCU\
    \ 1.0”。\n\n安装ESP32处理器的支持遵循相同的流程。我们用逗号分隔，将以下地址`https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json`添加到“文件→首选项”菜单中的“附加开发板管理器网址”文本框。然后，我们打开“工具→开发板”菜单，搜索“esp32”平台，并安装最新版本，这可能需要一点时间。完成后，我们从“ESP32\
    \ Boards”子菜单的列表中选择型号——图4.2右侧所示的是“ESP32 Dev Module”。\n\n一旦选择了正确的平台（UNO、普通ESP8266、NodeMCU或ESP32）——我们将默认假设连接的是UNO——我们就可以编写程序（sketches）并将其下载到硬件了。\n\
    \n我们的第一个sketch几乎是所有新控制器的标准程序，即让一个LED闪烁。可以在“文件→示例”菜单中找到接口硬件（如传感器）的示例，其中让LED闪烁的示例位于“01.Basics→\
    \ Blink”菜单项下。选择后，一个包含示例代码的新窗口会打开。图4.4展示了原始代码，省略了许多以`//`开头的注释行。代码如下：\n\n```\nvoid\
    \ setup() {\n  pinMode(LED_BUILTIN, OUTPUT);\n}\nvoid loop() {\n  digitalWrite(LED_BUILTIN,\
    \ HIGH);   // turn the LED on\n  delay(1000);                       // wait for\
    \ a second\n  digitalWrite(LED_BUILTIN, LOW);    // turn the LED off\n  delay(1000);\
    \                       // wait for a second\n}\n```\n\n让我们逐行分析这个sketch。在`setup()`函数中，我们调用`pinMode(Pin,What)`函数，它声明名为`LED_BUILTIN`的引脚（在UNO上是引脚13）将被用作输出引脚。这就是我们在`setup()`函数中所做的全部初始化工作。在`loop()`中，我们调用`digitalWrite(Pin,State)`，如果请求的状态是HIGH，它会使控制器在指定引脚上输出5V；如果请求的状态是LOW，则输出0V。后者发生在两行之后。在输出引脚状态改变之间，我们通过`delay(time_in_ms)`函数告诉控制器等待指定的毫秒数。因此，`loop`函数所做的就是打开引脚13上的LED，等待1000毫秒或1秒，关闭它，再等待1秒，然后重新开始。请注意，所有命令都以分号结尾，这是C语言的惯例。\n\
    \n一旦我们对程序满意，就可以编译它，检查语法是否正确，并确保没有遗漏任何分号。点击“文件”菜单项下方的对勾符号会编译程序，并在程序窗口下方的状态窗口中报告进度。如果编译没有错误完成，并且UNO板已连接到USB端口，并在“工具→串口”菜单项中被选中，我们可以通过点击编译按钮右侧的→按钮将程序下载到UNO。几秒钟后，UNO板上的一个小LED应该开始每秒闪烁一次。现在，我们可以更改sketch中的延迟时间，重新编译并下载，观察LED是否按照新指定的时间闪烁。\n\
    \n这里我们只使用了很少的命令，如`pinMode`或`digitalWrite`，但还有更多命令，查看Arduino网站https://www.arduino.cc/reference/en/上的参考部分非常有启发性。此外，点击不同的命令会打开一个新页面，其中包含如何使用这些函数的解释和示例。另一个智慧源泉是https://www.arduino.cc/顶部菜单列表中的“Documentation”选项卡，它提供了大量的教程和示例。记住这些资源将帮助我们快速找到信息，使事情顺利进行。此外，还有大量关于各种Arduino项目的书籍，以及技巧和窍门的汇编，例如[22]。\n\
    \n在迈出让微控制器听从我们指挥的第一步后，我们继续前进，开始读取传感器。\n\n## 4.4 传感器接口\n\n在这里，Arduino微控制器的主要任务是读取具有不同、通常很独特的接口的传感器，并将测量值转换为标准表示形式，然后传递给主机电脑。我们从最简单的传感器开始，一个按钮或开关。\n\
    \n### 4.4.1 按钮\n\n在图4.5中，我们展示了如何将按钮连接在Arduino的地线和引脚2之间，使得按下按钮会导致引脚2读取到0V或LOW。下面的代码清单展示了一个sketch，如果按下按钮，它会使引脚13上的内置LED亮起。\n\
    \n```\n// button_press, V. Ziemann, 161013\nvoid setup() {\n  pinMode(2,INPUT_PULLUP);\
    \   // button, default=HIGH\n  pinMode(13,OUTPUT);          // LED\n}\nvoid loop()\
    \ {\n  if (digitalRead(2)==LOW) {\n    digitalWrite(13,HIGH);\n  } else {\n  \
    \  digitalWrite(13,LOW);\n  }\n  delay(10);\n}\n```\n\n该程序遵循在**setup()**函数中初始化硬件的常规模式。我们首先声明引脚2是输入引脚，并启用内部上拉电阻，这会在没有按钮按下时在引脚上产生一个明确的“高”状态。带有LED的引脚13被声明为输出，这样我们就可以在sketch中控制它的开关。在**loop()**函数中，我们通过调用**digitalRead(Pin)**函数检查按钮的状态，并测试引脚2是否为LOW。如果是这种情况（注意比较中的双等号`==`），则通过调用**digitalWrite(13,HIGH)**打开引脚13上的LED。如果发现引脚2不是LOW，则通过**digitalWrite(13,LOW);**关闭引脚13上的LED。注意花括号`{`和`}`以及它们在**if\
    \ (..) { } else { }**结构中用于定义代码块的作用。在**if**语句之后，一个短暂的**delay()**确保忽略机械按钮的抖动，并让处理器有时间处理其内部事务。这不是绝对必要的，但是一种良好的风格。\n\
    \n检测指示门窗开关状态的传感器遵循完全相同的模式，我们可以检测多达13个不同的开关（如果我们不使用引脚13上的LED），并以某种方式做出反应。"
