    A second option to display contents of the same data file, even with the timestamps
    taken into account nicely is to use octave, which has powerful capabilities to
    handle timestamps. We extract the data stored in the flatfile database and display
    it with the following script.


    ```

    % flatfile_reader.m, V. Ziemann, 221004

    d=importdata(''/home/pi/A0.dat'');

    TZ=1; t=719529+(d(:,1)+TZ*3600)/86400.0;

    plot(t,d(:,2))

    datetick(''x'',''HH:MM:SS'')

    ```


    Most of the work is done by the importdata() function. It figures out the format
    of the A0.dat file and loads its contents into the variable d, which is a matrix
    with two columns, one with the time information and the other with the measurement
    values. In the next line we convert the time into the standard format that the
    datetick() function expects. It will properly format the displayed time on the
    horizontal axis. Note that we use the variable TZ to denote the time zone. Since
    I live in Sweden, the local clock is one hour ahead of UTC standard time, to which
    the epoch refers. The constant 719529 is the number of days from January 1, 0000
    until January 1, 1970, and 86400 is the number of seconds per day. The plot looks
    similar to the one shown in Figure 5.8.


