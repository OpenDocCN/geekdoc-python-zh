- md: "## 10.2 The raw time series from the geophone and the corresponding spectrum.\n\
    \n```\nend\nout=char(int_array);\n```\n\nWe need to provide the handle dev to\
    \ the socket as input parameter, and the function returns a character string that\
    \ contains all characters until either a comma or the next end-of-line character.\
    \ In the function, we read one character at a time from the socket and stop reading\
    \ once a comma or end-of-line character 0xA appears. Then we return all received\
    \ data after conversion to characters.\n\nWe show the sensor node with SM-24 geophone,\
    \ amplifier, and NodeMCU in Figure 10.3. Running the octave script with the NodeMCU\
    \ connected to the same WLAN as the Raspi produces a file spectrum.png, shown\
    \ in Figure 10.2. Running the octave script again will overwrite the file, and\
    \ tapping with a finger on the table while recording samples results in a much\
    \ more noisy spectrum.\n\nRecording waveforms in octave and processing them further\
    \ is convenient to produce plots of the spectra, but if we want to include the\
    \ geophones in our EPICS control system, we need to provide the database and prototype\
    \ files. We start with the database record for the time series or waveform. It\
    \ is reproduced below,\n\n```\n# .../Db/geophone.db\nrecord(waveform, \"$(USER):wf\"\
    ) {\n  field(DESC,\"Geophone waveform\")\n  field(DTYP,\"stream\")\n  field(SCAN,\"\
    10 second\")\n  field(NELM,\"1024\")\n  field(FTVL,\"FLOAT\")\n  field(INP,\"\
    @geophone.proto get_wf $(PORT)\")\n}\n```\n\nwhere we have to declare a **waveform**\
    \ record, because we want to acquire the entire stream of 1024 samples in one\
    \ step. The first three fields provide the description, the declaration as a **stream**\
    \ device, and the rate at which the waveforms are collected. The next two fields\
    \ declare that we record 1024 float values, before linking to the protocol file\
    \ **geophone.proto** and the function **get_wf** in the last field of type INP.\
    \ After adding the line DB += geophone.db to .../Db/Makefile we prepare the referenced\
    \ protocol file **geophone.proto** that is reproduced below.\n\n```\n# .../Db/geophone.proto\n\
    Terminator = CR LF;\nget_wf {\n  ExtraInput = Ignore;\n  replyTimeout=2000;\n\
    \  out \"WF?\";\n  separator=\",\";\n  in \"%f\";\n}\n```\n\nHere we first define\
    \ the termination string of one command as CR LF, and then define the **get_wf**\
    \ function. For robustness, we require it to ignore any input that does not make\
    \ sense, and wait 2000 ms for the reply from the NodeMCU. The request for a new\
    \ waveform consists of sending WF? and receiving floats (\"%f\"), separated by\
    \ commas. The number of values to receive from the NodeMCU, 1024, is already specified\
    \ in the **geophone.db** file.\n\nIn a final step, we need to tell EPICS where\
    \ to find the NodeMCU and what socket to connect to. This is done, as discussed\
    \ in [Chapter 6](Chapter 6) on EPICS, in the **st.cmd** command file, which contains\
    \ the following two lines:\n\n```\ndrvAsynIPPortConfigure(\"SOCKET2\",\"192.168.20.144:1137\"\
    ,0,0,0)\ndbLoadRecords(\"db/geophone.db\",\"PORT='SOCKET2',USER='geophone'\")\n\
    ```\n\nThe first defines the IP and port number of the connected NodeMCU device,\
    \ and the second line specifies the database file `geophone.db` that describes\
    \ the protocol that is used when communicating with the NodeMCU. After adding\
    \ `DB += geophone.db` to the Makefile, we recompile the EPICS IOC and then execute\
    \ `st.cmd` from the command line, or, once we make sure that everything works\
    \ as expected, we create an init file to start the IOC at boot time, following\
    \ the procedure we discussed in [Section 6.5](https://example.com). At this point,\
    \ with a running IOC continuously retrieving waveforms from the NodeMCU, we can\
    \ obtain the most recent waveform with `caget geophone:wf`, which first returns\
    \ the number of samples, here 1024, followed by the 1024 samples. Other EPICS\
    \ programs, on any computer connected to the same network, can also obtain the\
    \ same waveforms, a new one every 10 seconds, as specified in the `geophone.db`\
    \ record file.\n\nIn order to illustrate access to epics variables from python\
    \ we now prepare python script that generates the plots shown in [Figure 10.2](https://example.com).\
    \ First we execute `sudo pip install pyepics` to install the latest version of\
    \ the `pyepics` package, which provides functions `epics.caget()` and `epics.caput()`\
    \ to read and set epics process variables that we use in the following script.\n\
    \n```\n# show_epics_waveform.py, V. Ziemann, 221103\nimport matplotlib.pyplot\
    \ as plt  # for plotting\nimport numpy as np               # for fft\nimport epics\
    \                     # epics access\ndata=epics.caget(\"geophone:wf\");\nplt.subplot(2,1,1)\n\
    plt.plot(data);\nplt.xlabel(\"Samples\")\nplt.ylabel(\"Amplitude\")\nplt.subplot(2,1,2)\n\
    fftvals=np.fft.fft(data)\nplt.plot(abs(fftvals))\nplt.ylabel(\"FFT\")\nplt.show()\n\
    ```\n\nAfter importing support for plotting and numerical calculations, just as\
    \ described in [Section 5.6](https://example.com), this script imports support\
    \ for epics and uses it to retrieve the waveform, which is stored in the array\
    \ `data`. The upper `subplot` shows the raw data trace and the lower `subplot`\
    \ shows its Fourier transform, calculated with the `numpy` function `fft.fft()`.\
    \ Adding scaling and further numerical calculations is straightforward.\n\n##\
    \ QUESTIONS AND PROJECT IDEAS\n\n- 1. Discuss the advantage of using interrupt-driven\
    \ acquisition over measuring 1000 samples in a loop with a `delay(1)` between\
    \ acquisitions.\n- 2. What is the purpose of the low-pass filter discussed in\
    \ this chapter?\n- 3. What is the maximum frequency we can determine uniquely\
    \ when sampling at a rate of 1000 samples per second?\n- 4. What is the resolution\
    \ (smallest detectable difference of frequencies) of the spectrum shown in [Figure\
    \ 10.2](https://example.com)? How can you increase it?\n- 5. Discuss why the sample\
    \ rate of the `Ticker.h` library is limited to 1000 samples per second.\n- 6.\
    \ Use a pin diode as sensor and sample it at a rate of 1000 samples per second.\
    \ Explore different flickering light sources such as lamps, TV screens, or computer\
    \ monitors.\n- 7. Use the `tone()` function to generate an oscillating signal\
    \ on an output pin. Then sample that pin with the built-in ADC and observe the\
    \ signal. What is the highest frequency you can uniquely observe? What happens\
    \ when you go beyond that frequency?\n- 8. Instead of the geophone, use a microphone\
    \ and “observe” your voice.\n- 9. Add an MCP3304 ADC to the NodeMCU and connect\
    \ two geophones, fill two `sample_buffer` arrays with data in the interrupt handler,\
    \ and send both waveforms to octave. If the geophones are placed on a large table\
    \ far apart, try out to determine the speed of sound by tapping on the table and\
    \ determine the shift in time between the two waveforms.\n- 10. Convert the octave\
    \ script `getTimeSeries.m` to Python and use `numpy` for the Fourier transform\
    \ and `matplotlib` to display the data.\n- 11. Rewrite the sketch running on the\
    \ NodeMCU to publish a webpage that receives the time-series data via websockets\
    \ and shows the upper graph from Figure 10.2. Search the Internet to find a JavaScript\
    \ implementation of a Fourier transform and display also the lower graph.\n\n\
    ## Example: Monitor for the Color of Water\n\nIn this example, we determine the\
    \ color of water, or more accurately stated, the absorption of material dissolved\
    \ in water. An example is algae, which often proliferate during the summer and\
    \ turn the water green because algae predominantly absorb the complementary color,\
    \ which is red. In our experiment, we investigate the absorption of light with\
    \ different colors by turning a three-color LED on and off, and observe the resulting\
    \ modulation of the signal recorded by a phototransistor. If red light is absorbed,\
    \ the resulting modulation depth of red is reduced, likewise for the other colors.\
    \ By comparing the situation with LED on versus off, the system removes some of\
    \ the influence of ambient background light, at least to some extent. On the left\
    \ in Figure 11.1, we illustrate the absorption measurement with the RGB-LED on\
    \ the left and the phototransistor on the right, with the absorbing material in\
    \ between. We note that we can also use such a system to determine variations\
    \ in the reflection from a surface, as is shown on the right in Figure 11.1.\n\
    \nWe construct the setup shown in Figure 11.1, using an Arduino UNO, and an RGB-LED,\
    \ which houses a red, a green, and a blue LED in the same housing with a single\
    \ connector for a common cathode or anode. In our case we use one with a common\
    \ anode that is connected to the positive supply voltage. The respective color\
    \ lights up if the controlling pin on the UNO is LOW. The phototransistor is an\
    \ SFH3310, but any other model, sensitive in the visual spectral range, should\
    \ work. The very simple setup is shown in Figure 11.2."
  mdcn: "## 10.2 地震计的原始时间序列及对应频谱\n\n```\nend\nout=char(int_array);\n```\n\n我们需要将句柄\
    \ `dev` 作为输入参数提供给套接字，该函数返回一个字符串，其中包含直到逗号或下一个行结束符的所有字符。在函数中，我们从套接字逐个读取字符，一旦遇到逗号或行结束符\
    \ `0xA` 就停止读取。然后，我们将所有接收到的数据转换为字符后返回。\n\n我们在图 10.3 中展示了配备 SM-24 地震计、放大器和 NodeMCU\
    \ 的传感器节点。在 NodeMCU 与树莓派连接到同一 WLAN 的情况下运行 octave 脚本，会生成一个名为 `spectrum.png` 的文件，如图\
    \ 10.2 所示。再次运行 octave 脚本会覆盖该文件，而在记录采样时用手指敲击桌子则会产生噪声更大的频谱。\n\n在 octave 中记录波形并进一步处理，便于生成频谱图。但如果我们希望将地震计集成到\
    \ EPICS 控制系统中，则需要提供数据库和协议文件。我们从时间序列或波形的数据库记录开始。其内容如下所示：\n\n```\n# .../Db/geophone.db\n\
    record(waveform, \"$(USER):wf\") {\n  field(DESC,\"Geophone waveform\")\n  field(DTYP,\"\
    stream\")\n  field(SCAN,\"10 second\")\n  field(NELM,\"1024\")\n  field(FTVL,\"\
    FLOAT\")\n  field(INP,\"@geophone.proto get_wf $(PORT)\")\n}\n```\n\n这里我们必须声明一个\
    \ **waveform** 记录，因为我们希望一次性获取包含 1024 个采样点的完整数据流。前三个字段提供了描述、声明为 **stream** 设备以及波形采集的速率。接下来的两个字段声明我们记录\
    \ 1024 个浮点值，然后在最后一个 `INP` 类型的字段中链接到协议文件 **geophone.proto** 和函数 **get_wf**。在 `.../Db/Makefile`\
    \ 中添加 `DB += geophone.db` 这一行后，我们准备下面所示的引用协议文件 **geophone.proto**。\n\n```\n# .../Db/geophone.proto\n\
    Terminator = CR LF;\nget_wf {\n  ExtraInput = Ignore;\n  replyTimeout=2000;\n\
    \  out \"WF?\";\n  separator=\",\";\n  in \"%f\";\n}\n```\n\n这里我们首先将一个命令的终止字符串定义为\
    \ `CR LF`，然后定义 **get_wf** 函数。为了健壮性，我们要求它忽略任何无意义的输入，并等待 2000 毫秒以接收来自 NodeMCU 的回复。请求新波形的操作包括发送\
    \ `WF?` 并接收以逗号分隔的浮点数（`\"%f\"`）。从 NodeMCU 接收的数值数量（1024）已在 **geophone.db** 文件中指定。\n\
    \n最后一步，我们需要告诉 EPICS 在哪里可以找到 NodeMCU 以及要连接哪个套接字。正如在关于 EPICS 的 [第 6 章](Chapter 6)\
    \ 中所讨论的，这通过 **st.cmd** 命令文件完成，该文件包含以下两行：\n\n```\ndrvAsynIPPortConfigure(\"SOCKET2\"\
    ,\"192.168.20.144:1137\",0,0,0)\ndbLoadRecords(\"db/geophone.db\",\"PORT='SOCKET2',USER='geophone'\"\
    )\n```\n\n第一行定义了已连接 NodeMCU 设备的 IP 和端口号，第二行指定了描述与 NodeMCU 通信时所用协议的数据库文件 `geophone.db`。在\
    \ Makefile 中添加 `DB += geophone.db` 后，我们重新编译 EPICS IOC，然后从命令行执行 `st.cmd`，或者，在确保一切按预期工作后，我们按照\
    \ [第 6.5 节](https://example.com) 中讨论的程序创建一个初始化文件，以便在启动时启动 IOC。此时，通过一个持续从 NodeMCU\
    \ 获取波形的运行 IOC，我们可以使用 `caget geophone:wf` 获取最新的波形，该命令首先返回采样点数（此处为 1024），然后是 1024\
    \ 个采样值。连接到同一网络的任何计算机上的其他 EPICS 程序也可以获取相同的波形，每 10 秒一个新波形，如 `geophone.db` 记录文件中所指定。\n\
    \n为了说明如何从 Python 访问 EPICS 变量，我们现在准备一个 Python 脚本，用于生成 [图 10.2](https://example.com)\
    \ 中所示的图表。首先，我们执行 `sudo pip install pyepics` 来安装最新版本的 `pyepics` 包，该包提供了 `epics.caget()`\
    \ 和 `epics.caput()` 函数，用于读取和设置 EPICS 过程变量，我们将在下面的脚本中使用它们。\n\n```\n# show_epics_waveform.py,\
    \ V. Ziemann, 221103\nimport matplotlib.pyplot as plt  # for plotting\nimport\
    \ numpy as np               # for fft\nimport epics                     # epics\
    \ access\ndata=epics.caget(\"geophone:wf\");\nplt.subplot(2,1,1)\nplt.plot(data);\n\
    plt.xlabel(\"Samples\")\nplt.ylabel(\"Amplitude\")\nplt.subplot(2,1,2)\nfftvals=np.fft.fft(data)\n\
    plt.plot(abs(fftvals))\nplt.ylabel(\"FFT\")\nplt.show()\n```\n\n在导入了如 [第 5.6 节](https://example.com)\
    \ 所述的绘图和数值计算支持后，该脚本导入了 EPICS 支持，并使用它来检索存储在数组 `data` 中的波形。上方的 `subplot` 显示原始数据轨迹，下方的\
    \ `subplot` 显示其傅里叶变换，使用 `numpy` 函数 `fft.fft()` 计算。添加缩放和其他数值计算是直接了当的。\n\n## 问题与项目构想\n\
    \n- 1. 讨论使用中断驱动采集相对于在循环中使用 `delay(1)` 间隔测量 1000 个采样点的优势。\n- 2. 本章讨论的低通滤波器的目的是什么？\n\
    - 3. 当以每秒 1000 个采样点的速率采样时，我们能唯一确定的最高频率是多少？\n- 4. [图 10.2](https://example.com)\
    \ 中所示频谱的分辨率（可检测的最小频率差）是多少？如何提高它？\n- 5. 讨论为什么 `Ticker.h` 库的采样率被限制为每秒 1000 个采样点。\n\
    - 6. 使用光电二极管作为传感器，并以每秒 1000 个采样点的速率对其进行采样。探索不同的闪烁光源，如灯、电视屏幕或计算机显示器。\n- 7. 使用 `tone()`\
    \ 函数在输出引脚上生成振荡信号。然后使用内置 ADC 对该引脚进行采样并观察信号。你能唯一观察到的最高频率是多少？当超过该频率时会发生什么？\n- 8.\
    \ 不使用地震计，而是使用麦克风来“观察”你的声音。\n- 9. 为 NodeMCU 添加一个 MCP3304 ADC 并连接两个地震计，在中断处理程序中用数据填充两个\
    \ `sample_buffer` 数组，并将两个波形都发送到 octave。如果地震计放置在相距较远的大桌子上，尝试通过敲击桌子来确定声速，并确定两个波形之间的时间偏移。\n\
    - 10. 将 octave 脚本 `getTimeSeries.m` 转换为 Python，并使用 `numpy` 进行傅里叶变换，使用 `matplotlib`\
    \ 显示数据。\n- 11. 重写在 NodeMCU 上运行的 sketch，以发布一个网页，该网页通过 websockets 接收时间序列数据并显示图 10.2\
    \ 中的上图。在互联网上搜索傅里叶变换的 JavaScript 实现，并显示下图。\n\n## 示例：水的颜色监测器\n\n在这个例子中，我们确定水的颜色，或者更准确地说，是溶解在水中的物质的吸收情况。一个例子是藻类，它们在夏季经常大量繁殖，使水变绿，因为藻类主要吸收其互补色，即红色。在我们的实验中，我们通过开关三色\
    \ LED 来研究不同颜色光的吸收情况，并观察光电晶体管记录的信号产生的调制。如果红光被吸收，则红色的调制深度会降低，其他颜色同理。通过比较 LED 开启与关闭的情况，该系统在一定程度上消除了环境背景光的一些影响。在图\
    \ 11.1 的左侧，我们展示了吸收测量装置，左侧是 RGB-LED，右侧是光电晶体管，中间是吸收物质。我们注意到，这样的系统也可以用来确定表面反射的变化，如图\
    \ 11.1 右侧所示。\n\n我们使用 Arduino UNO 和一个 RGB-LED 构建了图 11.1 所示的装置，该 LED 在一个封装内包含一个红色、一个绿色和一个蓝色\
    \ LED，并有一个用于公共阴极或阳极的连接器。在我们的案例中，我们使用一个公共阳极连接到正电源电压的 LED。当 UNO 上的控制引脚为低电平时，相应的颜色会亮起。光电晶体管是\
    \ SFH3310，但任何其他在可见光谱范围内敏感的型号都应该可以工作。非常简单的装置如图 11.2 所示。"
