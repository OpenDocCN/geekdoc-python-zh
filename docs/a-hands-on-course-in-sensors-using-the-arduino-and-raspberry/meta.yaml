  - "[PAGE 228]\n\nacquired data as well as the number of data points as input parameters,\
    \ internally performs the least-squares fit to the logarithm of the data points,\
    \ and returns the slope of the fit. The discussion of the algorithm is somewhat\
    \ technical, and is deferred to Appendix B.\n\nThe `setup()` function initializes\
    \ the serial line, declares digital pin D2 as output, and sets it to HIGH to start\
    \ charging the capacitor. The `loop()` function uses the standard query-response\
    \ protocol, and a capacitance measurement starts with the command `CAP? nnn`,\
    \ where `nnn` is the desired number of measurement points; per default the maximum\
    \ number `npts` is acquired. Then digital pin D2 is placed in high-impedance input\
    \ mode. We also ensure that the internal pull-up resistor is disabled, and start\
    \ the timer process with the `MsTimer::set()` function. It takes the time between\
    \ samples and the function to call as argument, and then we start the timer. Before\
    \ leaving this subroutine, we take the first data sample. The command `WF?` can\
    \ be used to retrieve the waveform data of the last acquisition. This is useful\
    \ for crosschecking the fitting in, for example, octave. The remaining commands\
    \ are used to set and read the `TIMESTEP` or the `RESISTOR` values. Once the handling\
    \ of the commands from the serial line is complete, we test whether the variable\
    \ `sample_buffer_ready` is set, which indicates that an acquisition is complete\
    \ and we can start postprocessing the raw data. First we reset the `sample_buffer_ready`\
    \ to zero, to prevent repeated calls, and then start charging the capacitor again\
    \ by configuring pin D2 as output, and wait a little while. Next we calculate\
    \ the `slope` from the samples. Since the slope is inversely proportional to the\
    \ time constant $\\tau = RC$, we can solve this for the capacitance $C$ with the\
    \ equation defining the `capacitance`. The factor `1e6` causes the displayed value\
    \ to be shown in $\\mu F$. Finally, we check whether the exponential decay of\
    \ the voltage actually extends over a sufficiently long time, and display a warning\
    \ if that is not the case.\n\nWe can measure capacitances by sending commands\
    \ from other programs that communicate over the serial line. From octave we use\
    \ the following program to initiate a measurement, and plot the data as shown\
    \ in Figure 12.2.\n\n```\n% capacitance_plot.m, V. Ziemann, 221103\n% pkg load\
    \ instrument-control\nclose all; clear all\ns=serialport('/dev/ttyACM0',9600);\n\
    pause(3);\nflush(s);\nwrite(s,\"CAP? 100\");\npause(1);\nreply=serialReadline(s);\n\
    capacitance=str2double(reply(4:end));\nwrite(s,\"TIMESTEP?\");\nreply=serialReadline(s);\n\
    if reply(1:8)==\"TIMESTEP\"\n    timestep=str2double(reply(9:end));\nelse\n  \
    \  disp(reply)\n    clear s;\n    return\nend\nwrite(s,\"WF?\");\nreply=serialReadline(s);\n\
    nsteps=str2num(reply(3:end));\nxx=zeros(nsteps,1); yy=xx;\n```"
- md: "## 12.2 电容放电波形测量\n\n![](img/8f23875c54d5b3177d5d2a5bba06b37e_229_0.png)\n\n\
    ![](img/8f23875c54d5b3177d5d2a5bba06b37e_229_1.png)\n\nFigure 12.2 The waveform\
    \ of the voltage on the capacitor as a function of time, while a 2.2 $\\mu$F Tantal\
    \ capacitor discharges through a 33 k$\\Omega$ resistor on a linear scale (above)\
    \ and on a logarithmic scale (below).\n\n```matlab\nfor k=1:nsteps\n    xx(k)=k*timestep*1e-3;\
    \                % in seconds\n    yy(k)=str2double(serialReadline(s))*5/1023;\
    \ % in Volt\nend\nclear s;\nsubplot(2,1,1); plot(xx,yy);\nxlabel(\"Time [s]\"\
    ); ylabel(\"Voltage [V]\");\ntitle([\"Capacitance = \" num2str(capacitance) \"\
    \ uF\"]);\nsubplot(2,1,2); semilogy(xx,yy);\nxlabel(\"Time [s]\"); ylabel(\"log(Voltage)\"\
    );\nprint('capacitance.png','-S1000,700')\n```\n\nWe need to keep in mind to load\
    \ the instrument-control toolbox in order to use the serial communication functionality\
    \ and clear the workspace, before actually opening the serial line. First we remove\
    \ any remaining characters from the input queue, and initiate a measurement with\
    \ the CAP? command. After a short waiting period, we read the reply with the serialReadline()\
    \ function, which is tailored after the queryResponse() function from Section\
    \ 5.5.4. It is reproduced here.\n\n```matlab\n% get response up to termination\
    \ character\nfunction out=serialReadline(dev,term_char)\n  if (nargin==1) term_char=10;\
    \ end  % defaults to LF=0x0A\n  i=1;\n  int_array=uint8(1);\n  while true    \
    \                 % loop forever\n    val=read(dev,1);           % and read one\
    \ byte\n    if (val==term_char) break; end % until term_char appears\n    int_array(i)=val;\
    \          % stuff byte in output\n    i=i+1;\n  end\n  out=char(int_array); \
    \          % convert to characters\nend\n```\n\nThis function reads characters\
    \ one at a time until an end-of-line character is found, and then returns the\
    \ received characters to the calling program, where the numerical value is extracted.\
    \ For the plot, we need to know the TIMESTEP used in the measurement, and request\
    \ it from the UNO with the TIMESTEP? command. If the reply starts with TIMESTEP,\
    \ all is well, and we extract the numerical value. If we retrieve something else\
    \ from the serial input queue, the time window for the measurements was too short,\
    \ and the measurement is invalid. In that case, the program closes the serial\
    \ port and returns control to the octave command prompt. If, on the other hand,\
    \ we obtain the numerical value of the time step, we request the waveform data\
    \ with the WF? command. The first returned line contains the number of points\
    \ acquired. The following lines contain the data points. Each new line is retrieved\
    \ with a call to serialReadline() until all data points are copied to the array\
    \ yy. Finally, we plot the curves with linear and logarithmic vertical scale.\
    \ The latter shows a clear linear dependence, which indicates the exponential\
    \ dependence of the voltage on time with a well-defined time constant. In the\
    \ last line, we produce a png file shown in Figure 12.2 that can be used to document\
    \ our work.\n\nInstead of analyzing the behavior of a device in the time domain,\
    \ we can also analyze it in the frequency domain by driving with a sinusoidal\
    \ current whose frequency we vary through our device under test (DUT). Simultaneously,\
    \ we measure the voltage drop over the device as a function of the frequency.\
    \ This is the operating principle of a network analyzer, which allows us to deduce\
    \ the magnitude and phase of the device's impedance from the ratio of voltage\
    \ and current. For this task we use the AD5933 impedance network analyzer, which\
    \ features a direct digital synthesizer, already discussed in Section 4.5.6, to\
    \ generate frequencies f up to around 100 kHz that are passed through the DUT.\
    \ At the same time it measures the voltage-drop across the DUT with a high-speed\
    \ ADC. Internally it performs a digital Fourier transform at the excitation frequency\
    \ – both with cosine and with sine – and reports back the two values, commonly\
    \ referred to as IQ-data for in-phase (I) and quadrature (Q) values. From these\
    \ two values we can deduce the amplitude of the impedance as √(I² + Q²) and the\
    \ phase from arctan(I/Q).\n\nThe output current of the AD5933 is limited which\
    \ in turn limits the smallest resistance we can measure. We therefore add an op-amp\
    \ wired as a line buffer to its output (pin 6 on the AD5933) as shown in the schematics\
    \ in the upper part of Figure 12.3. At the same time, the two 47 kΩ resistors\
    \ and the 47 nF capacitor adjust the bias voltage on the DUT to half of the supply\
    \ voltage, which matches the internally constrained offset voltage of the input\
    \ (pin 5) to the AD5933. The 1 kΩ resistor between pin 4 and 5 is the feedback\
    \ resistor of an op-amp inside the AD5933 that is wired as a transimpedance amplifier.\
    \ It converts the input current to a voltage that is then digitized with an ADC\
    \ inside the AD5933. This integrated circuit is controlled via I2C lines that\
    \ require 10 kΩ pullup resistors.\n\nThe lower part of Figure 12.3 shows the realization\
    \ of this circuit on a breadboard that is controlled by an UNO. We recognize the\
    \ AD5933 in the upper half of the breadboard with the 10 kΩ pullup resistors to\
    \ SDA on pin 15 and SCL on pin 16 on its right-hand side and the 1 kΩ feedback\
    \ resistor on its left-hand side. Pins 9 to 11 are connected to the positive supply\
    \ voltage and pins 12 to 14 are to ground. Here we need to point out that we soldered\
    \ the AD5933, which comes in a breadboard-incompatible format (SSOP), onto a so-called\
    \ Winslow carrier board with a breadboard-compatible pin spacing (DIP). The power\
    \ rails are connected to those on the UNO and the I2C lines SDA and SCL to pins\
    \ A4 and A5 on the UNO, respectively. Pin 6 of the AD5933 is routed via a 47 nF\
    \ capacitor to the positive input terminal of one of the op-amps inside the MCP6002\
    \ below; the two 47 kΩ resistor bias the input to half the supply voltage. The\
    \ negative input terminal (pin 2) is connected to the output on pin 1 of the op-amp\
    \ and further to the lower end of the DUT whose other end is directly connected\
    \ to the input pin 5 of the AD5933. The second op-amp inside the MCP6002 is not\
    \ used and we therefore tie its input pins to ground which is good practice to\
    \ reduce noise in the circuit.\n\n![](img/8f23875c54d5b3177d5d2a5bba06b37e_231_0.png)\n\
    \nFigure 12.3 The schematics for measuring a DUT with an AD5933 and an op-amp\
    \ to increase the measurement range (top) and the corresponding circuit on a breadboard,\
    \ controlled by an UNO†.\n\nBringing this circuit to life mostly involves controlling\
    \ the AD5933 which requires carefully studying its datasheet. In order to make\
    \ this effort reusable in other projects we collect this circuit-specific code\
    \ in the file `AD5933.h` that is reproduced below. First, we declare the I2C address\
    \ of the AD5933, initialize variables for the starting frequency and the frequency\
    \ increment, as well as the frequency MCLK of the internal oscillator from which\
    \ all oscillations are derived. The variable `npts` describes the number of frequency\
    \ points, `mode` sets the output voltage range, here about 2 V peak-to-peak, and\
    \ `pga` controls an internal ×5 amplifier.\n\nThe function AD5933_config() receives\
    \ these parameters as input and programs the internal registers of the AD5933\
    \ according to the description in the datasheet. In particular, the control registers\
    \ 0x80 and 0x81 set the mode of operation for mode and pga. Registers 0x8A and\
    \ 0x8B set the time to wait after setting a new frequency and before starting\
    \ to measure. Registers 0x82 to 0x84 receive an integer number, related to MCLK,\
    \ that determines the output frequency according to an equation found in the datasheet.\
    \ First the most-significant byte is written to 0x82, then the next byte to 0x83\
    \ and the least-significant byte to 0x84. In the next step the frequency increment\
    \ finc is converted to an integer number that is likewise loaded to registers\
    \ 0x85 to 0x87. Last, npts is written, one byte at a time, to 0x88 and 0x89. When\
    \ leaving this function all registers of the AD5933 are loaded with the desired\
    \ values and ready to enable the output, which requires issuing a sequence of\
    \ commands that are specified in the datasheet. We provide a generic function\
    \ AD5933_command() that receives cryptic byte values as input and sets configures\
    \ the device. Immediately below, we define functions that give mnemonic names\
    \ to some of the actions. The last two functions read status bits that indicate\
    \ whether a measurement is complete and that the frequency sweep has finished.\n\
    \n```cpp\n// AD5933.h, V. Ziemann, 221118\nconst int AD5933=0x0D;  // I2C address\n\
    float freq=5000.0, finc=500, MCLK=16.776E6;\nint npts=200;\nbyte mode=0,pga=1;\
    \  // ~2 Vpp, amp = times 1\nvoid AD5933_config(float freq,float finc,int npts,byte\
    \ mode,byte pga){\n    I2Cwrite(AD5933,0x80,0x00);     // Control registers, reset\n\
    \    I2Cwrite(AD5933,0x81,0x10);\n    I2Cwrite(AD5933,0x80,((mode & 0x03)<<1)\
    \ | pga);\n    I2Cwrite(AD5933,0x8A,0x00);     // Settling time\n    I2Cwrite(AD5933,0x8B,0xFF);\
    \     // 255 cycles\n    long n=(long)(freq/(MCLK/4)*pow(2,27));\n    I2Cwrite(AD5933,0x82,(n>>16)\
    \ & 0xFF);     // Starting frequency\n    I2Cwrite(AD5933,0x83,(n>>8) & 0xFF);\n\
    \    I2Cwrite(AD5933,0x84,n & 0xFF);\n    long m=(long)(finc/(MCLK/4)*pow(2,27));\n\
    \    I2Cwrite(AD5933,0x85,(m>>16) & 0xFF);     // Frequency increment\n    I2Cwrite(AD5933,0x86,(m>>8)\
    \ & 0xFF);\n    I2Cwrite(AD5933,0x87,m & 0xFF);\n    I2Cwrite(AD5933,0x88,(npts>>8)\
    \ & 0xFF);   // Number of increments\n    I2Cwrite(AD5933,0x89,npts & 0xFF);\n\
    }\n// cmd: 0x10=init, 0x20=start, 0x30=increment, 0x40=repeat\n//      0x90=temp,\
    \ 0xA0=Pwdn, 0xB0=Stdby\nvoid AD5933_command(byte cmd) {\n    uint8_t b=I2Cread(AD5933,0x80);\n\
    \    I2Cwrite(AD5933,0x80,(b & 0x0F) | cmd);\n}\nvoid AD5933_standby() {AD5933_command(0xB0);}\n\
    void AD5933_init() {AD5933_command(0x10);}\nvoid AD5933_increment() {AD5933_command(0x30);}\n\
    void AD5933_power_down() {AD5933_command(0xA0);}\nint valid_data() {return ((I2Cread(AD5933,0x8F)\
    \ & 0x02) == 0x02);}\nint sweep_done() {return ((I2Cread(AD5933,0x8F) & 0x04)\
    \ == 0x04);}\n```"
  mdcn: "## 12.2 电容放电波形测量\n\n![](img/8f23875c54d5b3177d5d2a5bba06b37e_229_0.png)\n\
    \n![](img/8f23875c54d5b3177d5d2a5bba06b37e_229_1.png)\n\n图 12.2 电容两端电压随时间变化的波形，其中\
    \ 2.2 $\\mu$F 钽电容通过 33 k$\\Omega$ 电阻放电，上图为线性刻度，下图为对数刻度。\n\n```matlab\nfor k=1:nsteps\n\
    \    xx(k)=k*timestep*1e-3;                % in seconds\n    yy(k)=str2double(serialReadline(s))*5/1023;\
    \ % in Volt\nend\nclear s;\nsubplot(2,1,1); plot(xx,yy);\nxlabel(\"Time [s]\"\
    ); ylabel(\"Voltage [V]\");\ntitle([\"Capacitance = \" num2str(capacitance) \"\
    \ uF\"]);\nsubplot(2,1,2); semilogy(xx,yy);\nxlabel(\"Time [s]\"); ylabel(\"log(Voltage)\"\
    );\nprint('capacitance.png','-S1000,700')\n```\n\n我们需要记住，在实际打开串行线路之前，要加载仪器控制工具箱以使用串行通信功能，并清空工作区。首先，我们清除输入队列中任何残留的字符，并使用\
    \ `CAP?` 命令启动测量。经过短暂的等待后，我们使用 `serialReadline()` 函数读取回复，该函数是根据第 5.5.4 节的 `queryResponse()`\
    \ 函数改编的。此处将其复制如下。\n\n```matlab\n% get response up to termination character\nfunction\
    \ out=serialReadline(dev,term_char)\n  if (nargin==1) term_char=10; end  % defaults\
    \ to LF=0x0A\n  i=1;\n  int_array=uint8(1);\n  while true                    \
    \ % loop forever\n    val=read(dev,1);           % and read one byte\n    if (val==term_char)\
    \ break; end % until term_char appears\n    int_array(i)=val;          % stuff\
    \ byte in output\n    i=i+1;\n  end\n  out=char(int_array);           % convert\
    \ to characters\nend\n```\n\n此函数逐个读取字符，直到找到行结束符，然后将接收到的字符返回给调用程序，从中提取数值。为了绘图，我们需要知道测量中使用的\
    \ `TIMESTEP`，并使用 `TIMESTEP?` 命令从 UNO 请求它。如果回复以 `TIMESTEP` 开头，则一切正常，我们提取数值。如果从串行输入队列中获取的是其他内容，则测量的时间窗口太短，测量无效。在这种情况下，程序关闭串行端口并将控制权返回给\
    \ Octave 命令提示符。另一方面，如果我们获得了时间步长的数值，则使用 `WF?` 命令请求波形数据。返回的第一行包含采集的点数。随后的行包含数据点。每一行新数据都通过调用\
    \ `serialReadline()` 获取，直到所有数据点都复制到数组 `yy` 中。最后，我们绘制具有线性和对数垂直刻度的曲线。后者显示出明显的线性关系，这表明电压对时间呈指数依赖关系，并具有明确的时间常数。在最后一行，我们生成一个\
    \ png 文件，如图 12.2 所示，可用于记录我们的工作。\n\n除了在时域中分析设备的行为外，我们还可以通过施加频率变化的正弦电流来驱动被测器件（DUT），从而在频域中对其进行分析。同时，我们测量器件两端的电压降随频率的变化。这是网络分析仪的工作原理，它允许我们从电压和电流的比值中推导出器件阻抗的幅度和相位。为此任务，我们使用\
    \ AD5933 阻抗网络分析仪，其特点是具有直接数字频率合成器（已在第 4.5.6 节讨论），可生成高达约 100 kHz 的频率 f，并通过 DUT。同时，它使用高速\
    \ ADC 测量 DUT 两端的电压降。在内部，它在激励频率下执行数字傅里叶变换——分别使用余弦和正弦——并报告两个值，通常称为同相（I）和正交（Q）值的\
    \ IQ 数据。从这两个值，我们可以推导出阻抗的幅度为 √(I² + Q²)，相位为 arctan(I/Q)。\n\nAD5933 的输出电流有限，这反过来限制了我们可以测量的最小电阻。因此，我们在其输出端（AD5933\
    \ 的引脚 6）添加一个配置为线性缓冲器的运算放大器，如图 12.3 上部的原理图所示。同时，两个 47 kΩ 电阻和 47 nF 电容将 DUT 上的偏置电压调整为电源电压的一半，这与\
    \ AD5933 内部约束的输入（引脚 5）偏移电压相匹配。引脚 4 和 5 之间的 1 kΩ 电阻是 AD5933 内部配置为跨阻放大器的运算放大器的反馈电阻。它将输入电流转换为电压，然后由\
    \ AD5933 内部的 ADC 进行数字化。该集成电路通过 I2C 线路控制，需要 10 kΩ 上拉电阻。\n\n图 12.3 的下半部分显示了在面包板上实现的该电路，由\
    \ UNO 控制。我们可以在面包板的上半部分看到 AD5933，其右侧是连接到引脚 15 的 SDA 和引脚 16 的 SCL 的 10 kΩ 上拉电阻，左侧是\
    \ 1 kΩ 反馈电阻。引脚 9 到 11 连接到正电源电压，引脚 12 到 14 连接到地。这里我们需要指出，我们将 AD5933（采用与面包板不兼容的\
    \ SSOP 封装）焊接到一个所谓的 Winslow 载板上，该载板具有与面包板兼容的引脚间距（DIP）。电源轨连接到 UNO 上的电源轨，I2C 线路 SDA\
    \ 和 SCL 分别连接到 UNO 的引脚 A4 和 A5。AD5933 的引脚 6 通过一个 47 nF 电容连接到下方 MCP6002 内部一个运算放大器的正输入端；两个\
    \ 47 kΩ 电阻将输入偏置到电源电压的一半。负输入端（引脚 2）连接到运算放大器的输出端（引脚 1），并进一步连接到 DUT 的下端，DUT 的另一端直接连接到\
    \ AD5933 的输入引脚 5。MCP6002 内部的第二个运算放大器未使用，因此我们将其输入引脚接地，这是减少电路噪声的良好实践。\n\n![](img/8f23875c54d5b3177d5d2a5bba06b37e_231_0.png)\n\
    \n图 12.3 使用 AD5933 和运算放大器测量 DUT 的原理图，以增加测量范围（上图），以及在面包板上实现的相应电路，由 UNO 控制†。\n\n\
    使该电路工作主要涉及控制 AD5933，这需要仔细研究其数据手册。为了使这项工作在其他项目中可重用，我们将此电路特定的代码收集在文件 `AD5933.h`\
    \ 中，该文件复制如下。首先，我们声明 AD5933 的 I2C 地址，初始化起始频率和频率增量的变量，以及内部振荡器的频率 MCLK，所有振荡都由此派生。变量\
    \ `npts` 描述频率点数，`mode` 设置输出电压范围，此处约为 2 V 峰峰值，`pga` 控制内部 ×5 放大器。\n\n函数 `AD5933_config()`\
    \ 接收这些参数作为输入，并根据数据手册中的描述对 AD5933 的内部寄存器进行编程。特别是，控制寄存器 0x80 和 0x81 设置 mode 和 pga\
    \ 的工作模式。寄存器 0x8A 和 0x8B 设置设置新频率后和开始测量前的等待时间。寄存器 0x82 到 0x84 接收一个与 MCLK 相关的整数，该整数根据数据手册中的方程确定输出频率。首先将最高有效字节写入\
    \ 0x82，然后将下一个字节写入 0x83，最低有效字节写入 0x84。在下一步中，频率增量 `finc` 被转换为一个整数，同样加载到寄存器 0x85\
    \ 到 0x87 中。最后，`npts` 一次一个字节地写入 0x88 和 0x89。离开此函数时，AD5933 的所有寄存器都已加载了所需的值，并准备好启用输出，这需要发出数据手册中指定的一系列命令。我们提供了一个通用函数\
    \ `AD5933_command()`，它接收晦涩的字节值作为输入并配置设备。紧随其后，我们定义了一些函数，为某些操作赋予助记名称。最后两个函数读取状态位，指示测量是否完成以及频率扫描是否已结束。\n\
    \n```cpp\n// AD5933.h, V. Ziemann, 221118\nconst int AD5933=0x0D;  // I2C address\n\
    float freq=5000.0, finc=500, MCLK=16.776E6;\nint npts=200;\nbyte mode=0,pga=1;\
    \  // ~2 Vpp, amp = times 1\nvoid AD5933_config(float freq,float finc,int npts,byte\
    \ mode,byte pga){\n    I2Cwrite(AD5933,0x80,0x00);     // Control registers, reset\n\
    \    I2Cwrite(AD5933,0x81,0x10);\n    I2Cwrite(AD5933,0x80,((mode & 0x03)<<1)\
    \ | pga);\n    I2Cwrite(AD5933,0x8A,0x00);     // Settling time\n    I2Cwrite(AD5933,0x8B,0xFF);\
    \     // 255 cycles\n    long n=(long)(freq/(MCLK/4)*pow(2,27));\n    I2Cwrite(AD5933,0x82,(n>>16)\
    \ & 0xFF);     // Starting frequency\n    I2Cwrite(AD5933,0x83,(n>>8) & 0xFF);\n\
    \    I2Cwrite(AD5933,0x84,n & 0xFF);\n    long m=(long)(finc/(MCLK/4)*pow(2,27));\n\
    \    I2Cwrite(AD5933,0x85,(m>>16) & 0xFF);     // Frequency increment\n    I2Cwrite(AD5933,0x86,(m>>8)\
    \ & 0xFF);\n    I2Cwrite(AD5933,0x87,m & 0xFF);\n    I2Cwrite(AD5933,0x88,(npts>>8)\
    \ & 0xFF);   // Number of increments\n    I2Cwrite(AD5933,0x89,npts & 0xFF);\n\
    }\n// cmd: 0x10=init, 0x20=start, 0x30=increment, 0x40=repeat\n//      0x90=temp,\
    \ 0xA0=Pwdn, 0xB0=Stdby\nvoid AD5933_command(byte cmd) {\n    uint8_t b=I2Cread(AD5933,0x80);\n\
    \    I2Cwrite(AD5933,0x80,(b & 0x0F) | cmd);\n}\nvoid AD5933_standby() {AD5933_command(0xB0);}\n\
    void AD5933_init() {AD5933_command(0x10);}\nvoid AD5933_increment() {AD5933_command(0x30);}\n\
    void AD5933_power_down() {AD5933_command(0xA0);}\nint valid_data() {return ((I2Cread(AD5933,0x8F)\
    \ & 0x02) == 0x02);}\nint sweep_done() {return ((I2Cread(AD5933,0x8F) & 0x04)\
    \ == 0x04);}\n```"
