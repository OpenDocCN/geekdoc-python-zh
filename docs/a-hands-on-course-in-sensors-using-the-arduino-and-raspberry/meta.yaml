    \ 包：\n\n```\nsudo apt-get install procServ telnet\n```\n\n如果其中一个程序已存在于当前系统中，则不会安装新软件。一旦所有必需的程序都已安装并且脚本已编写完成，我们使用\
    \ sudo 将其复制到系统目录 /etc/init.d，该目录包含操作系统的所有启动脚本。我们使用以下命令使其可执行：\n\n```\nsudo chmod\
    \ 755 /etc/init.d/epicsioc\n```\n\n并手动启动它以使用以下命令验证脚本是否按预期工作：\n\n```\nsudo systemctl\
    \ start epicsioc\n```\n\n如果一切正常，我们可以通过执行以下命令永久安装它：\n\n```\nsudo systemctl enable\
    \ epicsioc\n```\n\n这将在启动时自动启动 epicsioc 服务。请注意，我们也可以停止和禁用该服务。如果我们想连接到现在自主运行的 st.cmd\
    \ 进程，我们可以在登录到 Raspi 时使用 telnet：\n\n```\ntelnet localhost 20000\n```\n\n并看到 `st.cmd`\
    \ 程序的正常输出，以及 `procServ` 添加的一些管理信息（以 `@@@` 为前缀）。我们可以输入诸如 `dbl` 之类的命令来列出所有过程变量，并立即在\
    \ telnet 窗口中收到输出。`procServ` 打开的端口仅可从 Raspi 本身访问。如果我们想从另一台计算机登录，我们使用 `ssh` 首先登录到\
    \ Raspi，然后执行 `telnet`。这可以通过从远程桌面计算机执行以下命令来自动化：\n\n```\nssh -t pi@192.168.10.22\
    \ telnet localhost 20000\n```\n\n其中 192.168.10.22 是 Raspi 的 IP 地址。通过这种方式，Raspi\
    \ 可以无人值守地作为 Epics IOC 工作，但我们可以随时使用 `telnet` 连接到它，以跟踪性能并与 `st.cmd` 交互。\n\n## 问题与项目构想\n\
    \n1.  与自制系统相比，使用标准化控制系统有何优势？\n2.  编写协议和数据库文件，以接口前面章节讨论的传感器。\n3.  编写协议和数据库文件，以连接运行\
    \ [第 4.5.2 节](Section 4.5.2) 中草图的 Arduino UNO 来控制直流电机。\n4.  编写协议和数据库文件，以连接运行 [第\
    \ 4.5.3 节](Section 4.5.3) 中草图的 Arduino UNO 来控制模型舵机。\n5.  编写协议和数据库文件，以连接运行 [第 4.5.4\
    \ 节](Section 4.5.4) 中草图的 Arduino UNO 来控制步进电机。\n6.  研究工业或研究机构中使用的其他控制系统。\n7.  研究\
    \ stream 库的文档，了解如何处理 RS-232 线上主动出现的信息，例如来自 GPS 接收器的连续出现的位置数据流。\n8.  在本章中，我们通过\
    \ IP 地址 192.168.10.22 访问 Raspi，而在 [第 5.4 节](Section 5.4) 中通过 192.168.20.1 访问。解释为什么这不是一个笔误。"
