- img_proc: true
  md: 'The file must be made readable for the owner only by executing `sudo chmod
    600 /etc/hostapd/hostapd.conf`. It specifies the country in which we live – this
    is needed to determine the permissible WLAN frequencies, which differ from country
    to country – and other definitions, such as the name of the network, the details
    of the encryption, and the passphrase. Here we choose a secret phrase to prevent
    others from misusing your wireless network. Moreover, we need to ensure that `hostapd`
    finds its configuration file by verifying the line


    ```

    DAEMON_CONF=/etc/hostapd/hostapd.conf

    ```


    appears near the top of the file `/etc/init.d/hostapd`. Add it unless it is already
    there. Then we instruct the system to start the `hostapd` daemon at boot time
    with the command


    ```

    sudo systemctl unmask hostapd

    sudo systemctl enable hostapd

    ```


    After rebooting the system, we should be able to see a new WLAN named `messnetz`
    from a computer with a wireless network interface, but before we can connect to
    it we need to start the `dnsmasq` daemon that provides DHCP services on the 192.168.20.xx
    network and distributes IP numbers. The configuration file is called `/etc/dnsmasq.conf`
    and it should contain the following lines:


    ```

    domain-needed

    interface=wlan0

    dhcp-range=192.168.20.100,192.168.20.200,12h

    listen-address=192.168.20.1

    ```


    We save the originally installed version under a new name because it contains
    explanations of all parameters and is useful as a reference. For our system, however,
    we only need those in the above example, and they are almost self-explanatory.
    Finally, we register the `dnsmasq` daemon to start at boot time with the commands


    ```

    sudo systemctl unmask dnsmasq

    sudo systemctl enable dnsmasq

    ```


    and reboot the Raspi to ensure that all parts of the system are synchronized.

    In order to figure out which computers are connected to our WLAN `messnetz` and
    which services they offer on open ports, we install the program `nmap` with `sudo
    apt-get install nmap`. The following call


    ```

    nmap -sn 192.168.20.1/24

    ```


    lists the IP numbers of all computers connected to `messnetz`. The option `-sn`
    specifies the type of scan and `192.168.20.1/24` the range of IP numbers to probe,
    where `/24` is a shorthand notation for the netmask 255.255.255.0. This implies
    that all IP numbers of the form 192.168.20.nn are probed. If a device with, for
    example, 192.168.20.56 appears, the command


    ```

    nmap 192.168.20.56

    ```


    lists its open ports. This is a convenient way to ensure that a server started
    on the device is actually operational. Explore the many options of `nmap` with
    `man nmap`.

    At this point we have turned the Raspi into a WLAN access point that spans the
    `messnetz` WLAN. If the IP forwarding is enabled, we can even surf the web from
    any computer on `messnetz`. But we are mostly interested in communicating with
    sensor nodes that are connected to `messnetz` and will discuss how to use the
    Raspi as the spider in the center of a network of sensor nodes connected by serial
    or WLAN links.'
