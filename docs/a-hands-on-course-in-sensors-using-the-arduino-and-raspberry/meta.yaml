  md: "# Example: Fast Acquisition\n\nOccasionally it is desirable to observe and\
    \ generate signals at rates higher than the few hundred samples per second from\
    \ Chapter 13, for example to analyze communication channels, such as RS-232, or\
    \ to observe acoustic signals. Luckily, the ESP32 is capable of sampling at rates\
    \ in excess of 200 000 samples per second by directly transferring samples from\
    \ the ADC into memory without using the CPU using a mode called *direct memory\
    \ access* (DMA). It uses the I2S (Inter-IC Sound) support on the ESP32 chip that\
    \ is normally dedicated to digitally transmitting music. Moreover, the ESP has\
    \ built-in frequency generators for sinusoidal and rectangular signals in the\
    \ same frequency range.\n\nIt is straightforward to add these features to our\
    \ data acquisition system by including the following code snippet – based on the\
    \ ESP32 example HiFreq_ADC – to configure the high-speed mode in our sketch. It\
    \ includes the header file `driver/i2s.h` for I2S support and then configures\
    \ I2S to sample at the specified `i2s_sample_rate`. It reads the analog input\
    \ from input pin 32, which is connected to ADC1_CHANNEL_4. Replace the _4 by _7\
    \ to connect it to pin 35. We set the attenuation of the input voltages such that\
    \ it covers the range from zero to the supply voltage. Note that error handling\
    \ is rather basic; the program just prints a short message to the serial line.\n\
    \n```\n#include <driver/i2s.h>\nbool i2s_adc_enabled=false;\nvoid i2sInit(uint32_t\
    \ i2s_sample_rate){\n  i2s_config_t i2s_config = {\n    .mode = (i2s_mode_t)(I2S_MODE_MASTER\
    \ | I2S_MODE_RX\n                                    | I2S_MODE_ADC_BUILT_IN),\n\
    \    .sample_rate =  i2s_sample_rate,\n    .bits_per_sample = I2S_BITS_PER_SAMPLE_16BIT,\n\
    \    .channel_format = I2S_CHANNEL_FMT_ONLY_LEFT,\n    .communication_format =\
    \ I2S_COMM_FORMAT_STAND_I2S,\n    .intr_alloc_flags = ESP_INTR_FLAG_LEVEL1,\n\
    \    .dma_buf_count = 8,\n    .dma_buf_len = 1024,    // 1024 is maximum length\n\
    \    .use_apll = true,       // needed for low frequencies\n    .tx_desc_auto_clear\
    \ = false,\n    .fixed_mclk = 0\n  };\n  if(ESP_OK != i2s_driver_install(I2S_NUM_0,\
    \ &i2s_config, 0, NULL)){\n    Serial.print(\"Error installing I2S.\");\n  }\n\
    \  if(ESP_OK != i2s_set_adc_mode(ADC_UNIT_1, ADC1_CHANNEL_4)){ // pin 32\n```"
