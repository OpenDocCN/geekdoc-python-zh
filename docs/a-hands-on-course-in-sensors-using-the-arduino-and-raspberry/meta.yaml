    >\n    <OPTION value=\"0\">Ramp DAC25 OFF</OPTION>\n    <OPTION value=\"10\">Ramp\
    \ DAC25 with 10 ms steps</OPTION>\n    <OPTION value=\"50\">Ramp DAC25 with 50\
    \ ms steps</OPTION>\n</SELECT></P>\n<P><DIV id=\"adc32val\">ADC32: unknown</DIV>\n\
    <CANVAS id=\"adc32\" width=\"512\" height=\"10\"> </CANVAS>\n<DIV id=\"adc33val\"\
    >ADC33: unknown</DIV>\n<CANVAS id=\"adc33\" width=\"512\" height=\"10\"> </CANVAS>\n\
    </DETAILS></P>\n```\n\nIn the following section we open a second DETAIL which\
    \ contains the displayarea to show the voltages recorded by the ADCs. The displayarea\
    \ is defined as a scalable vector graphic in between SVG tags. Each trace is defined\
    \ as a PATH, just as in Chapter 8. After closing the DETAIL, we define the two\
    \ status lines that are shown at the bottom of the webpage.\n\n```\n<DETAILS open>\n\
    \  <SUMMARY>Logging display</SUMMARY>\n  <SVG id=\"displayarea\" width=\"1024px\"\
    \ height=\"512px\">\n    <PATH id=\"trace0\" d=\"M0 256\" />\n    <PATH id=\"\
    trace1\" d=\"M0 256\" />\n  </SVG>\n</DETAILS>\n<DIV id=\"status\">Status window</DIV>\n\
    <DIV id=\"reply\">Reply from ESP32</DIV>\n```\n\nThe following JavaScript makes\
    \ the webpage interactive. We first declare some variables and determine the IP\
    \ address of the ESP32. We store it, including the websocket port 81, in the variable\
    \ ipaddr and display it in the webpage element ip. Then we open the websocket\
    \ before defining the callback functions for error handling, opening, and closing\
    \ the websocket. The functions toStatus() and toReply() copy the text given as\
    \ argument to the respective lines at the bottom of the webpage. The functions\
    \ start() and stop() are callback functions for the respective buttons on the\
    \ webpage. They prepare JSON-formatted messages that instruct the ESP32 what to\
    \ do.\n\n```\n<SCRIPT>\n  var sample_period=100, current_position=0;\n  var ipaddr=location.hostname\
    \ + \":81\";\n  document.getElementById('ip').innerHTML=ipaddr;\n  show_noconnect();\n\
    \  var websocket = new WebSocket('ws://' + ipaddr);\n  websocket.onerror = function(evt)\
    \ { console.log(evt); toStatus(evt) };\n  websocket.onopen = function(evt) { console.log('websocket\
    \ open'); };\n  websocket.onclose = function(evt) {\n    console.log('websocket\
    \ close');\n    toStatus('websocket close');\n  };\n  function toStatus(txt){\n\
    \    document.getElementById('status').innerHTML=txt;}\n  function toReply(txt)\
    \ {\n    document.getElementById('reply').innerHTML=txt;}\n  function start()\
    \ {\n    websocket.send(JSON.stringify({\"cmd\":\"START\", \"val\":sample_period}));\n\
    \  }\n  function stop() {\n    websocket.send(JSON.stringify({ \"cmd\" : \"STOP\"\
    , \"val\" : \"-1\" }));\n    show_noconnect();\n  }\n</SCRIPT>\n```\n\nThe .onmessage\
    \ method is executed whenever a new message from the ESP32 arrives. It first parses\
    \ the messages and puts the message into the variable stuff, where we first probe\
    \ whether it is a message of type INFO in which case we just pass it to the toReply()\
