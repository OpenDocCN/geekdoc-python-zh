  mdcn: '## 2.3.2 开关型器件


    许多传感器通过提供一个*电压电平*来告知微控制器其状态或状态变化。它们可以被视为一个内置上拉电阻的开关，并且可以用相同的方式进行检测。


    如果传感器和微控制器的工作电压电平不匹配，可能会出现问题。如今，许多传感器工作在2.5–3.3 V的电平上，而微控制器则工作在2.5到5 V的电平上。检测更高的外部电压，例如汽车（12
    V）或工业控制应用（24或48 V）中使用的电压，需要对电压电平进行一些调整，以防止损坏传感器或微控制器。有现成的电平转换芯片，如74LVC245，但在许多情况下，使用两个电阻构成的简单分压器就足够了。然而，它只在信号从高压侧流向低压侧时有效。如果需要双向信号流，例如在I2C总线的数据线上，图2.33所示的基于N型MOSFET晶体管的解决方案易于实现。第一种情况，当两个逻辑信号都为高电平时，MOSFET不导通，因为栅极和源极之间的电压差接近于零。第二种情况，如果3.3
    V逻辑控制并将信号拉低，栅极和源极之间的差值为正，MOSFET导通，从而将5 V逻辑电平也拉低。第三种情况，当5 V逻辑控制且5 V逻辑信号被拉低时，内置二极管（在原理图中可见）导通，导致源极电压降至约0.7
    V。此时，栅源电压降足够大，足以使MOSFET完全导通，这也将3.3 V逻辑电平拉低。


    但让我们回到传感器。一种通过变化的电压电平报告其状态的突出器件是*PIR接近传感器*，如图2.34右侧所示。它感知红外辐射水平的变化，从而宣告生物的存在。这些传感器基于使用菲涅耳透镜（即图2.34中可见的圆顶）将入射红外辐射收集到热释电传感器上。透镜通常由聚乙烯制成，选择这种材料是因为其对红外辐射的低吸收率。因此，传感器的一侧被加热并膨胀，导致压电或热释电材料（通常是聚合物薄膜）发生弯曲。两种效应共同导致上下极板之间产生电压。首先，弯曲使材料产生应变并引起压电电压。其次，热量从热侧流向冷侧，增加了热释电电压。该器件的原理图设置如图2.34左侧所示。产生的微小电压随后被放大，并通过一个输出引脚暴露给周围的电子设备，一旦被人的存在触发，该引脚就会从低电压电平变为高电压电平，并保持可编程（通常通过一个小电位器）的时间。


    一些传感器将其测量值编码为电压脉冲进行报告，脉冲持续时间与值成正比。因此，我们需要以足够的精度测量该脉冲的持续时间。采用这种模式的一个器件是HC-SR04距离传感器，如图2.35所示，其工作原理类似于声纳。它发射一个短促的超声波（40
    kHz）声脉冲，并记录回波到达的时间，即声脉冲的往返时间$\Delta t$。距离$L$由该持续时间和声速（约$v = 340$ m/s）给出，公式为$L
    = \Delta t/2v$，或者用方便的单位表示为$L[\text{cm}] = 0.017\Delta t[\mu\text{s}]$。当脉冲发射时，器件上的一个引脚变为高电平，一旦回波到达或指定的超时时间到期，则返回低电平。一些更高级的型号使用相同的方法，但具有更大的量程，例如LV-EZx传感器。它们还支持其他报告距离的模式，例如与持续时间成比例的模拟电压，或直接作为RS-232信号报告，但更多内容将在下文介绍。


    另一种传感器常见于现代消费电子产品中，用于检测来自遥控器的*红外信号*。它严格来说不是科学传感器，但仍然是一个有趣的设备，工作非常可靠，因为它能抑制干扰的环境影响，并且只有在按下遥控器上的按钮时才会切换电视频道。通常它们工作在940
    nm的波长，与遥控器上的发光二极管匹配，并且它们内置光学带通滤波器，只允许该波长通过。然后信号被38 kHz的载波频率调制，在传感器上进行解调，使得只有基带信号被报告在输出引脚上。


    现在我们转向直接以数字形式报告其测量值的传感器，并首先讨论I2C器件。


    ## 2.3.3 I2C器件


    大量传感器内置了一些逻辑并支持高级通信协议。一个例子是运行在I2C总线上的*I2C*协议。与支持I2C的器件的物理连接只需要四根线：地线、电源电压Vcc、时钟SCL和数据SDA。后两者需要上拉电阻，这通常已经包含在作为I2C总线主设备以协调通信的微控制器中。它配置传感器，启动测量，然后从传感器读取数据。在物理上，通信基于同步串行协议，其中数据线在每次时钟线从高电平变为低电平时被采样。该协议是标准化的，我们不会深入细节，但需要提到I2C器件以及I2C传感器具有许多内部寄存器，可以写入以配置传感器，或读取以获取传感器数据。通信完全基于交换数字信号，并且如前所述，由通常为微控制器的总线主设备协调。多个器件可以共享相同的SDA和SCL线，因为每个器件都有自己的地址，并且仅通过指定器件地址来响应那些针对它的消息。


    BMP280或增强型BME680（如图2.36左侧所示）板载*气压*传感器。这些传感器基于使用压阻式应变计测量由分隔真空测试体积和外部气压的膜变形引起的应变[14]，如图2.37所示。整个组件直接构建在硅基板上，应变计通过对一小部分进行适当掺杂而创建。包括一个分辨率为0.01
    °C或更好的温度传感器，因为基于半导体的应变计具有温度依赖性。组件中还包括进一步的信号调理和处理电路，因此该器件通过I2C总线在地址0x76或0x77上与微控制器通信。测量范围从300到1100
    hPa（mbar），相对精度为±0.01 hPa，绝对精度约为1 hPa。增强版BME680是一种*环境传感器*。除了气压和温度外，它还使用图2.7所示设备的微型化版本来测量湿度和*挥发性有机化合物*（VOC）的存在。


    气压与来自主要传感器（应变计）的信号之间的关系相当复杂，并且由于制造公差，可能因设备而异。因此，每个设备（以及许多其他传感器）都需要通过将其暴露在已知条件（此处为压力）下进行*校准*，并记录特定于设备的常数，这些常数允许我们根据主要测量值准确确定压力。在BMP280或BME680的情况下，内置ADC报告一个与在电桥电路中测量的应变计电阻相关的值。在制造和校准过程中确定的校准常数存储在芯片上的存储器中。数据手册描述了一个详细的程序，以根据ADC报告的值和校准常数来获取压力。


    SCD30是一种*非色散红外*（NDIR）传感器，通过测量样品体积中波长为4.3 μm的红外光的吸收来确定二氧化碳（CO2）分子的相对浓度。其原理如图2.38左侧所示。来自红外二极管的光穿过样品体积，'
