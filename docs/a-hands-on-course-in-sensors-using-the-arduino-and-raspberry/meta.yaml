  md: "continuously displays the CO₂ concentration, the temperature, and the relative\
    \ humidity via the serial line such that we can watch it with the serial plotter\
    \ of the Arduino IDE or any other program that controls the serial line.\n\nThe\
    \ next environmental sensor – we use it later in a weather station – is the BME680.\
    \ We already briefly encountered this chip in Section 2.3.3. It features sensors\
    \ for barometric pressure, humidity, temperature, and volatile organic compounds,\
    \ all on the same chip. Since each individual BME680 is factory-calibrated and\
    \ has calibration constants for all sensors stored on-board, programming it is\
    \ rather intricate. Have a look at the low-level drivers available from https://github.com/BoschSensortec\
    \ to get an impression. Instead of using that library we use the high-level interface,\
    \ provided by the manufacturers of the breadboard shown in Figure 2.36 that we\
    \ incorporate into the Arduino IDE from the library manager where we search for\
    \ “Adafruit BME680” and install the library.\n\nWith this library the sketch to\
    \ read out the sensor is very short, because all the details of the I2C communication,\
    \ sensor readout, and data calibration data are encapsulated in the high-level\
    \ functions. We make the library accessible by including `Adafruit_BME680.h` header\
    \ file and then creating an object `bme` to access the sensor functionality. In\
    \ the function `setup()` we initialize the serial and I2C communication, make\
    \ sure the sensor is actually connected, and start to configure it. The three\
    \ commands to set the oversampling determine the accuracy of the returned temperature,\
    \ humidity, and pressure. The IIR filter defines and filter to average over successive\
    \ samples, which smoothes the data. Finally the small on-board heater for the\
    \ MQ-x sensor, which measures volatile organic compounds in air is configured\
    \ to heat up to 320°C and wait for 150 ms before reading the resistance that quantifies\
    \ the air quality, where higher resistance implies better air quality.\n\n```\n\
    cpp\n// BME680, V. Ziemann, 221006\n#include <Wire.h>\n#include <Adafruit_BME680.h>\n\
    Adafruit_BME680 bme;\nvoid setup() {\n  Serial.begin(9600); while (!Serial);\n\
    \  Wire.begin();\n  if (!bme.begin()) {Serial.println(\"Error: BME680 not found\"\
    );}\n  bme.setTemperatureOversampling(BME680_OS_8X);\n  bme.setHumidityOversampling(BME680_OS_2X);\n\
    \  bme.setPressureOversampling(BME680_OS_4X);\n  bme.setIIRFilterSize(BME680_FILTER_SIZE_3);\n\
    \  bme.setGasHeater(320, 150); // 320*C for 150 ms\n}\nvoid loop() {\n  bme.performReading();\
    \           // here the sensor is read out\n  Serial.print(bme.temperature); Serial.print(\"\
    \\t\");\n  Serial.print(bme.pressure/100.0); Serial.print(\"\\t\");  // hPa=mbar\n\
    \  Serial.print(bme.humidity); Serial.print(\"\\t\");\n  Serial.println(bme.gas_resistance/1000.0);\
    \             // kOhm\n  delay(1000);\n}\n```\n\nIn the function `loop()` we only\
    \ need to initiate an acquisition with `bme.performReading()` and then access\
    \ one value at a time. Note that we convert the pressure to hPa, which is the\
    \ same as mbar. Moreover the air quality is returned as the resistance of the\
    \ MQ-x sensor.\n\nWe can use the next sensor to determine the acceleration and\
    \ speed of rotation on carousel rides at a fair. Incidentally, similar sensors\
