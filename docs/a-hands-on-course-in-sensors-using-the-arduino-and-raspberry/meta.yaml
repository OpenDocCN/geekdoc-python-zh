  md: '# Example: Weather Station with Distributed Sensors


    Our first project is a weather station that measures barometric pressure, humidity,
    temperature, and air quality at a number of locations inside and outside a building.
    We use rrdtool to prepare plots of the measurements over periods of 4 hours, 2
    days, a week, and a month. Moreover, we prepare database files to enable integration
    into an EPICS control system. We select the NodeMCUs as microcontrollers for the
    sensor nodes because they are very easy to program, and flexible that they may
    be deployed all over the place without having to pull wires. Later in this chapter,
    we briefly show how to replace the NodeMCU by its smaller brethren, the ESP-01,
    which requires a little extra attention. Note that in either case we only show
    how to connect a single sensor node, but multiple copies only differ by their
    IP number. We can duplicate any interfacing software by simply changing the IP
    numbers appropriately.


    We choose the BME680, already discussed in Section 4.4.3, to measure the barometric
    pressure, humidity, temperature, and air quality. Figure 9.1 shows the project
    assembled on a breadboard with NodeMCU to the right of the BME680. The only connections
    are the power rails for ground and 3.3 V, as well as two I2C lines for clock and
    data. The former connects pin D1 on the NodeMCU to SCK on the sensor where as
    the latter connects pin D2 to SDI. We also added a 100 nF decoupling capacitor
    to the power rails.


    The program running on the microcontroller follows the template we used earlier.
    After defining the network credentials and including libraries for WiFi and the
    sensor, we define the WiFiServer server listening on port 1137 and the bme object,
    which allows us to communicate with the sensor. In the setup() function we first
    open the Serial line and configure the WiFi to use a static IP address. This is
    advantageous if we always want to find the weathernode at the same address rather
    than depending on the DHCP server on the Raspi to always assign the same. Then
    we establish the WLAN connection and then start the server, just as in Section
    4.6.3. At the end of the setup() function, we ensure that the sensor is actually
    present before initializing it.


    ```

    // Weathernode-BME680, V. Ziemann, 221028

    const char* ssid     = "messnetz";

