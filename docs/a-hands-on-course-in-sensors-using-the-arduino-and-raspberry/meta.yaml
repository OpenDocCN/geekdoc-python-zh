- img_proc: true
  md: 'Note that the raw measured data are returned in units of ADC counts. In order
    to obtain the impedance in Ohms and the phase in degrees, we need to calibrate
    the device for each chosen set of parameters with a known resistor $\hat{R}$ as
    DUT. For this purpose we typically chose $\hat{R}$ to be equal to the feedback
    resistor (1 k$\Omega$ in Figure 12.3) and fit a second-order polynomial `polyabs`
    to the magnitude and another polynomial `polyphase` to the phase. Note that we
    use the `atan2()` function, which takes the signs of its two arguments into account
    to find the angle in the correct quadrant. After plotting the magnitude, the phase
    and the raw I and Q signals in three plots, we specify the value `Rcal` of the
    calibration resistor. Only if the DUT is a calibration resistor, we uncomment
    the line with `dlmwrite()` to write the two polynomials to the file `calibpoly.dat`.


    ```

    f=(p(1):p(2):p(1)+p(2)*p(3))/1000; % frequency in kHz

    polyabs=polyfit(f'',data(:,3),2) % magnitude

    phase=atan2(data(:,2),data(:,1))*180/pi;

    polyphase=polyfit(f'',phase,2) % phase in degree

    subplot(3,1,1); plot(f,data(:,3),''k'',f,polyval(polyabs,f),''r-.'');

    xlabel("frequency [kHz]"); ylabel("abs(Z)")

    legend("data","fit");

    subplot(3,1,2); plot(f,phase,''k'',f,polyval(polyphase,f),''r-.'');

    xlabel("frequency [kHz]"); ylabel("phase(Z) [deg]")

    legend(''phase'',''fit'');

    subplot(3,1,3); plot(f,data(:,1),''b'',2,f,data(:,2),''r-.'');

    xlabel("frequency [kHz]"); ylabel("re(Z),im(Z)")

    legend("real(Z)","imag(Z)");

    Rcal=1; // calibration resistor

    %dlmwrite("calibpoly.dat",[polyabs'',polyphase''],"\t")

    ```


    Later, when measuring an unknown impedance, we read the previously saved polynomials
    and use them to scale the absolute value of the impedance and calculate the difference
    in phase to that of the resistor. This finally gives us the impedance in Ohms
    and the phase difference of the DUT relative to that of the calibration resistor.


    ```

    figure; %..............Impedance and phase

    cal=dlmread("calibpoly.dat","\t");

    absval=data(:,3);

    Zabs=Rcal*polyval(cal(:,1),f)''./absval;

    phase=atan2(data(:,2),data(:,1))*180/pi;

    Zphase=phase-polyval(cal(:,2),f)'';

    subplot(2,1,1); plot(f,Zabs,''k'')

    xlabel("frequency [kHz]"); ylabel("abs(Z) [kOhm]")

    subplot(2,1,2); plot(f,Zphase,''r'')

    xlabel("frequency [kHz]"); ylabel("phase(Z) [deg]")

    %capacitance_nF=mean(1./(2e6*pi*Zabs.*f''))*1e9 % nF

    ```


    The left-hand plots in Figure 12.4 show the raw values of a measurement where
    the DUT is a $C = 2.2$ nF capacitor. The three plots show magnitude, the phase,
    as well as I and Q from top to bottom. The right-hand plots show the values after
    the device was calibrated with a 1 k$\Omega$ resistor. We observe the inverse
    $1/2\pi fC$ dependence on the frequency on the top and a phase difference of close
    to -90 degree with respect to the calibration resistor. The commented-out line
    at the end of the script calculates the estimated capacitance from averaging $C
    = 1/2\pi fZ$, which reports 2.1 nF for our capacitor, which is within its specified
    10 % tolerance.'
