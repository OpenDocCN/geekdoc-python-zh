    \  delay(2000);\n}\n```\n\nFinally, we have to increase the size of out and doc,\
    \ both are defined near the top of the sketch, from 300 to 20000 in order to account\
    \ for the much longer dispatched waveform WF0.\n\nWe control the new functionality\
    \ on the ESP32 from the browser by adding code to the file esp32-daq.html. To\
    \ the SELECT menu for the sampling speed we add an OPTGROUP to send negative frequencies\
    \ to the ESP32, which uses them to configure the high-speed ADC with frequencies\
    \ between 1 kS/s and 1 MS/s.\n\n```\n<OPTGROUP label=\"Hi-speed I2S ADC\">\n \
    \ <OPTION value=\"-1000\">1 kSamples/s</OPTION>\n  <OPTION value=\"-10000\">10\
    \ kSamples/s</OPTION>\n  <OPTION value=\"-20000\">20 kSamples/s</OPTION>\n  <OPTION\
