    # CHAPTER 7


    # Messaging System: MQTT


    EPICS is not the only system to integrate a large number of sensors and actuators
    in a common framework. Another such system is the *message queue telemetry transport*
    (MQTT) [6] protocol that was originally created by, among others, IBM, in order
    to collect information from widely distributed infrastructures such as oil pipelines
    in a battery-saving and energy-efficient as well as robust and secure way. Today
    it is commonly used to pass messages between devices that constitute the Internet
    of Things (IoT) and has become ISO-standard ISO/IEC 20922. MQTT uses a *broker*
    that passes messages from clients publishing data to those that subscribe to the
    data. The name of parameters – the data – that are passed around are referred
    to as “topic.” They are organized hierarchically, such that the name


    ```

    weatherstations/stationA/node1/temperature

    ```


    refers to the temperature sensor on a weather station, called station A and connected
    to node 1. When subscribing to topics it is possible to use wildcards such as
    the plus-sign “+”, which is a single-level wild-card, or the hash “#,” which is
    a multi-level wild-card. Robustness and reliability of transmission is guaranteed
    by specifying three levels of *quality of service* (QoS), where the simplest level
    0 implies that the sensor only publishes data without any acknowledgment from
    the broker. Levels 1 and 2 implement increasingly advanced levels of handshake
    signals that ensure the arrival of data. Even a *last will* is available, which
    is transmitted to subscribing clients should a publishing client disconnect. Normally
    the broker immediately transmits any received data to the subscribing clients,
    but it is possible to specify that the broker retains the last good data point
    and transmits it to subscribers in case the publisher is offline, and to new subscribers
    upon their first connection. Since MQTT was intended to operate across public
    networks, encryption and security are part of the protocol.


    The core functionality of MQTT resides on the broker, such that clients can be
    very simple and connect and disconnect at will. This makes it possible to use
    clients that only wake up from a battery-saving deep sleep mode, perform a measurement,
    send it to the broker, and go back to sleep again. This attractive feature makes
    MQTT very popular for IoT applications and we therefore also discuss it as a complement
    to EPICS. In the following sections we operate a broker on the Raspberry Pi and
    use NodeMCUs as clients that publish and subscribe. In a final section we discuss
    a simple gateway that links MQTT to EPICS in order to benefit from the best of
    both worlds. In this way we can access lightweight clients connected over a public
    network across the gateway from our EPICS control system.


    After this overview of MQTT, let us follow the theme of the book and describe
    a working system that provides the basic functionality.'
  - '[PAGE 184]


    # 7.1 BROKER


    The `mosquitto` broker is widely supported on many platforms, and also on the
    Raspberry Pi. We install it, after bringing the system up to date with `sudo apt-get
    update` and `sudo apt-get upgrade`, using the command


    ```

    sudo apt-get install mosquitto mosquitto-clients

    ```


    where the `mosquitto` package contains the broker and the `mosquitto-clients`
    package contains the command line executables `mosquitto_pub` and `mosquitto_sub`.
    We use them to test the base functionality on the Raspi alone, without external
    clients.


    Immediately after the installation, `mosquitto` is already running and is registered
    as a service that starts after every reboot. During our initial tests we inspect
    the logging output with the following command, which helps to debug the problem
    in case something unexpected happens:


    ```

    sudo tail -f /var/log/mosquitto/mosquitto.log

    ```


    where `tail -f` takes the filename as argument and shows the last lines of the
    file, but, instead of stopping the display at the end of the file, keeps appending
    newly generated messages. Now we open a second terminal window and start publishing
    MQTT data using the `mosquitto_pub` command-line client with


    ```

    mosquitto_pub -d -h localhost -i Pub1 -t dummy/value -m 42 -r

    ```


    where `mosquitto_pub` is the executable, `-d` enables debugging output, and `-h`
    specifies the IP address of the broker; here it is `localhost`, because the broker
    runs on the same Raspi where we run the `mosquitto_pub` client. The parameter
    specified after `-i` identifies the publisher, `-t` the topic, and `-m` specifies
    the message, here the value 42. Appending `-r` instructs the broker to retain
    the message and send it in case the publisher is offline. The debugging output
    can be disabled by omitting the `-d` option. Running `mosquitto_pub -h` gives
    a short overview of available commands, and the manual page, accessible with `man
    mosquitto_pub`, provides more information.


    The `mosquitto_sub` executable provides the receiving end of MQTT message-passing.
    We run it in another terminal window where we execute


    ```

    mosquitto_sub -d -h localhost -i Sub1 -t dummy/value

    ```


    to subscribe to the topic `dummy/value` on the broker running on `localhost`.
    We identify the subscribing client by Sub1 and enable debugging with `-d`. After
    starting the executable, we are greeted with either an empty line or with the
    last published message that has the retain flag `-r` enabled. The `mosquitto_sub`
    keeps running, and if we publish new messages in the second terminal with `mosquitto_pub`,
    they immediately appear in the subscriber window.


    In the default configuration, this only works if both publisher and subscriber
    are on the same computer. In order to grant access to the broker from the network,
    we need to edit the configuration file `/etc/mosquitto/mosquitto.conf` and add
    the lines


    ```

    listener 1833

    allow_anonymous true

    ```


    to the end of the file. We can also restrict access to the wireless interface
    by adding the IP number of that interface to the first line, which then reads
    `listener 1833 192.168.20.1`, but then we always need to refer to this address
    when specifying the broker. The command line arguments then contain `-h 192.168.20.1`,
    rather than `-h localhost`. The second line enables access to the broker without
    a password.'
