    ln -s StreamDevice stream\ncd stream\n```\n\n这将创建一个子目录 `StreamDevice`，并在使用 `cd`\
    \ 进入之前，将其以通用名称 `stream` 命知。为了使构建过程与标准 `make` 系统兼容，我们需要在编辑 `./configure/RELEASE`\
    \ 之前，从该子目录中删除 `GNUmakefile`（如果存在），以确保 `EPICS_BASE` 指向 `/usr/local/epics/base`，并且以\
    \ `ASYN=` 开头的三行读取为：\n\n```\nASYN=/usr/local/epics/modules/asyn\n#CALC=$(SUPPORT)/calc-3-7\n\
