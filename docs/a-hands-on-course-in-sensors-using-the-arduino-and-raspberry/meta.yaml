    end\nout=char(int_array);           % convert to characters\n```\n\nThis function\
    \ reads characters one at a time until an end-of-line character is found, and\
    \ then returns the received characters to the calling program, where the numerical\
    \ value is extracted. For the plot, we need to know the TIMESTEP used in the measurement,\
    \ and request it from the UNO with the TIMESTEP? command. If the reply starts\
    \ with TIMESTEP, all is well, and we extract the numerical value. If we retrieve\
    \ something else from the serial input queue, the time window for the measurements\
    \ was too short, and the measurement is invalid. In that case, the program closes\
    \ the serial port and returns control to the octave command prompt. If, on the\
    \ other hand, we obtain the numerical value of the time step, we request the waveform\
    \ data with the WF? command. The first returned line contains the number of points\
    \ acquired. The following lines contain the data points. Each new line is retrieved\
    \ with a call to serialReadline() until all data points are copied to the array\
    \ yy. Finally, we plot the curves with linear and logarithmic vertical scale.\
    \ The latter shows a clear linear dependence, which indicates the exponential\
    \ dependence of the voltage on time with a well-defined time constant. In the\
    \ last line, we produce a png file shown in Figure 12.2 that can be used to document\
    \ our work.\n\nInstead of analyzing the behavior of a device in the time domain,\
    \ we can also analyze it in the frequency domain by driving with a sinusoidal\
    \ current whose frequency we vary through our device under test (DUT). Simultaneously,\
    \ we measure the voltage drop over the device as a function of the frequency.\
    \ This is the operating principle of a network analyzer, which allows us to deduce\
    \ the magnitude and phase of the device's impedance from the ratio of voltage\
    \ and current. For this task we use the AD5933 impedance network analyzer, which\
    \ features a direct digital synthesizer, already discussed in Section 4.5.6, to\
    \ generate frequencies f up to around 100 kHz that are passed through the DUT.\
    \ At the same time it measures the voltage-drop across the DUT with a high-speed\
    \ ADC. Internally it performs a digital Fourier transform at the excitation frequency\
    \ – both with cosine and with sine – and reports back the two values, commonly\
    \ referred to as IQ-data for in-phase (I) and quadrature (Q) values. From these\
    \ two values we can deduce the amplitude of the impedance as √(I² + Q²) and the\
    \ phase from arctan(I/Q).\n\nThe output current of the AD5933 is limited which\
    \ in turn limits the smallest resistance we can measure. We therefore add an op-amp\
    \ wired as a line buffer to its output (pin 6 on the AD5933) as shown in the schematics\
    \ in the upper part of Figure 12.3. At the same time, the two 47 kΩ resistors\
