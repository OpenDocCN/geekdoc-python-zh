    \ `webpage.html`。\n\n## 8.2 在浏览器中\n\n下面我们复制并注释负责图8.1的HTML文件 `webpage.html`。它包含HTML和JavaScript命令，用于协调浏览器和NodeMCU之间的通信。该文件包含通常的\
