    \       + (rect.height-event.clientY+rect.top));\n}\n```\n\nThe `showCoordinates()`\
    \ function writes the coordinates of the pixel where the mouse is clicked on the\
    \ `displayarea` to the status line, which is convenient to determine the length\
    \ of pulses.\n\nWe check out the system by generating a 2 kHz sinusoidal signal\
    \ on pin 25, sample it with 200 kS/s and show the waveform on the left-hand side\
    \ in Figure 14.1, which shows a smooth sinusoidal curve. The figure on the right-hand\
    \ side shows a 10 kHz sine wave, sampled at 1 MS/s. We observe distinct steps\
    \ in the displayed waveform indicating that the ADC reports the same value multiple\
