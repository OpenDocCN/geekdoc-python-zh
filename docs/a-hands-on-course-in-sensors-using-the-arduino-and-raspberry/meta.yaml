    RS-232-like protocol at low baud rates such as 2400 baud. Another protocol is
    RC-5, which is commonly used in TV remote controls. Receivers such as the TSOP2238
    have optical filters built in and are sensitive only to a narrow band of wavelengths
    around 940 nm. Moreover, they demodulate the 38 kHz carrier frequency and only
    deliver a 3.3 or 5 V signal on their output pin, making them very easy to interface.


    Note the generic structure: A communication channel is based on the low-level
    hardware and on a protocol stack that often consists of several layers on top
    of the hardware implementation. In our examples we use the convention to send
    a string, terminated with a question mark to signify a request. The reply then
    consists of the same string followed by a value. This convention defines a simple
    protocol for the communication. We can easily come up with other protocols, and
    add features such as checksums to test the integrity of the transmission. Also,
    I2C and MIDI communication are based on a standardized protocol where a number
    of bytes is transmitted and each byte signifies some particular information, such
    as the register to be addressed or the value that is written to the register.
    Of course, it is mandatory that all participants in a transaction agree on the
    interpretation of the bits and bytes that are transmitted, otherwise confusion
    will reign supreme.


    So far we always assumed that some unspecified host computer, for example, a desktop
    computer, is available and serves as the communication partner for the microcontroller.
    In the next chapter we consider one specific host computer that is widely available,
    well documented, and inexpensive – the Raspberry Pi.


    # QUESTIONS AND PROJECT IDEAS


    +   1. Convert the hex number 0x5CA3 to a) binary and b) decimal representation.

    2. The ADC that reads pin A0 on the NodeMCU is not very reliable. For example,
    connecting A0 to GND will not necessarily give a zero ADC reading. Make an attempt
    to calibrate it.

    3. Can you connect an MCP23017 IO-extender and a BME680 environmental sensor to
    the same I2C bus?

    4. Under what circumstances is it advantageous to use interrupts?

    5. You need up to 128 digital input pins. Use multiple copies of the MCP23017
    and explain how to connect them.

    6. Inspect the datasheet of the MCP3304 and find out how to configure it to read
    eight unipolar input voltages. What do you need to change in the software?

    7. If you need 128 unipolar analog input signals, how do you connect the MCP3304
    to an Arduino? Is it possible at all, and if so, how?

    8. Connect a three-color LED to an Arduino and independently control the brightness
    of the three colors via the serial line. Add features to directly set standard
    mix-colors such as orange or magenta.'
