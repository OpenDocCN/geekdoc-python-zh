    ![](img/8f23875c54d5b3177d5d2a5bba06b37e_65_0.png)


    Figure 3.7 Schematic illustrating the functionality of an H bridge.


    In this context we have to keep in mind that turning the coils rapidly on and
    off also rapidly changes the magnetic field, and this causes a voltage, the backward
    electromagnetic force, or *back-emf* that opposes the driving voltage. Thus, the
    faster the motor turns, the more the back-emf reduces the voltage, and thereby
    also the current flowing through the coils. This results in a reduced torque and
    for a given coil resistance we can either run at a slower speed or increase the
    driving voltage in order to maintain the required torque.


    As with the model trains, we also want to run the motor both forward and backward.
    Therefore we need to control the polarity of the supply voltage. Instead of reversing
    the supply cables by hand, which is not a very convenient option, we use an H
    bridge whose functionality is easily explained with the help of Figure 3.7. In
    the center of the figure a DC motor is located, with its supply leads extending
    to either side. The unipolar supply voltage is connected to the upper terminal
    labeled V+ and to ground. Depending on the position of the switches A, B, C, and
    D, the current flows through the motor. In case A and D are engaged, it flows
    from left to right, This is indicated by the dotted lines and the sense of rotation
    indicated by the small arrow in the motor. In case B and C are engaged, while
    A and D are open, the current flows in the opposite direction, causing the motor
    to turn in the opposite direction as well. Thus, by suitably toggling the four
    switches, we can adjust the sense of rotation of the motor at will. We only have
    to ensure that only one of the switches A and B is engaged at a given instance,
    because otherwise the supply voltage is short circuited.


    Of course, we can replace the switches with transistors and arrive at a system
    that is easily controllable by a microcontroller. And the situation is made even
    simpler, because ready-made integrated circuits that implement H bridges are available.
    The L293D is one of them, and we will use it in later chapters to control motors.
    Finally, we add speed control by pulse-width modulation. We either add a switching
    transistor between the upper terminal and the supply voltage, or we directly modulate
    the input terminals that control the switches A, B, C, and D.


    At this point we can adjust the speed and direction of a motor, which is essential
    for moving from one place to another, and the velocity at which this happens.
    On the other hand, if we only want to change the position or angle by a small
    amount, such as the rudder of a boat, we need means to directly adjust the position,
    rather than the velocity. Next we discuss two types of systems that do this, servomotors
    and stepper motors.'
- md: "## 3.2.2 Servomotors and model-servos\n\nThe term *servo* refers to using the\
    \ motor in conjunction with a position encoder in a *closed-loop* feedback, or\
    \ servo, loop [21]. Here the motor speed is continuously adjusted to reduce the\
    \ difference between the desired position and the actual position, as reported\
    \ by the encoder. This type of servomotor is often used in industrial applications,\
    \ and requires an elaborate control system with a PID controller [21] and power-drive\
    \ electronics. Servomotors are used in large industrial robots and applications\
    \ that require high accuracy of positioning. Matching the parameters of the controller\
    \ to the desired performance of the control loop in terms of accuracy, speed,\
    \ and acceptable overshoot requires expert attention, and is beyond the scope\
    \ of this book.\n\nInstead, we use the modest cousin of the servomotor, the *model-servo*,\
    \ often simply referred to as a *servo*, shown in Figure 3.8. It is often encountered\
    \ in radio-controlled cars and planes but can also appear in robotic applications,\
    \ such as controlling the position or angle of smaller robotic arms. Servos have\
    \ a potentiometer mounted on the rotating shaft that is used as an encoder. It\
    \ provides information about the position of the shaft, which typically has a\
    \ rotation range of 0–180 degrees. The resistance is compared to a voltage derived\
    \ from an electric signal corresponding to the desired position. The difference\
    \ signal is amplified and used to turn a DC motor in the direction that minimizes\
    \ the difference. This constitutes a simple proportional controller. Normally\
    \ a small gearbox between the motor axis and the shaft reduces the speed but increases\
    \ the precision of control and the torque. Note that the servo connects with three\
    \ wires to the outside. Two of the wires are ground and supply voltage, nominally\
    \ 4.8 V. They are colored black and red, respectively. The third wire, yellow\
    \ or white in many cases, carries the information about the desired position.\n\
    \nThe information about the desired position is communicated to the servo as a\
    \ pulse-width modulated signal, as shown in Figure 3.9. The servo expects a train\
    \ of pulses with a spacing of 20 ms. Each individual pulse has a duration between\
    \ 1 and 2 ms, with a 1.5 ms duration specifying the mid-position. Producing such\
    \ pulse patterns is easily done with a microcontroller, and we will do that in\
    \ later chapters.\n\nServomotors and servos use a closed-loop system to achieve\
    \ a high accuracy of positioning, while stepper motors achieve this without closed-loop\
    \ feedback.\n\n## 3.2.3 Stepper motors\n\nStepper motors change the angular position\
    \ of a shaft in small discrete steps, such that counting the steps gives the position.\
    \ In this way, no feedback or servomechanism is needed to achieve high repeatability,\
    \ and the motor can be operated open loop.\n\nIn Figure 3.10, we illustrate how\
    \ this is accomplished in a permanent-magnet stepper motor. The static part of\
    \ the motor consists of an iron yoke and four coils, of which two each are operated\
    \ in series. Here the upper and lower coils, labeled A and B, and the right and\
    \ left coils, labeled C and D, are two such pairs. On the rotor a moderately large\
    \ number of permanent magnets are assembled. In the figure we only use six magnets,\
    \ labeled 1 through 6, with the black end indicating the north pole. They are\
    \ oriented radially and their polarity alternates.\n\nWe assume that initially\
    \ only coils A and B are excited in such a way that the upper coil behaves as\
    \ a magnetic north pole and the lower as a south pole. In that case, the magnetic\
    \ field lines pass through both upper and lower coils, pass through the magnets\
    \ in the rotor, and return through the surrounding yoke. With this coil excitation\
    \ the rotor is indeed oriented, as shown in Figure 3.10, because the upper coil\
    \ behaves as a north pole and attracts the south pole of the upper permanent magnet,\
    \ labeled 1. Consequently, they are as close as possible. The converse is true\
    \ for the bottom coil and the magnet labeled 4. In order to turn the rotor by\
    \ 30 degrees in the counterclockwise direction, we have to turn coils A and B\
    \ off and coils C and D on. Thus, coil C on the right-hand side is a north pole\
    \ that attracts the permanent magnet labeled 3, which has a south pole pointing\
    \ outwards. Again, the converse is true for coil D on the left and magnet 6. The\
    \ rotor will then move until magnet 6 faces coil D. We continue turning the rotor\
    \ by turning coils C and D off and reversing the polarity of coils A and B, such\
    \ that the upper coil acts as a south pole that attracts magnet 2. Continuing\
    \ in this way, we find that we can turn the motor in a number of steps of 30 degrees\
    \ each by periodically exciting the coils in the following pattern:\n\n```\nterminal\
    \ a: 1000 1000 1...\n           b: 0010 0010 0...\n           c: 0100 0100 0...\n\
    \           d: 0001 0001 0...\n```\n\nwhere time runs from left to right. Here,\
    \ 1 indicates that the terminal is connected to the positive power supply voltage,\
    \ and 0 indicates that the coil is connected to ground potential. Stepping through\
    \ the sequence backward causes the motor to turn in the other direction. Observing\
    \ that time slots 1 and 3 show reversed polarity for the coils A and B implies\
    \ that we need an H bridge to implement the polarity reversal. We will return\
    \ to this implementation in Section 4.5.\n\nIt is instructive to analyze the excitation\
    \ pattern of the four terminals a through d a little more closely. The first observation\
    \ is that a sequence of four time slots repeats itself over and over again. Second,\
    \ we observe that a fundamental pattern is the excitation of terminal a with the\
    \ sequence 1000. The excitation of terminal b is shifted to the right by two time\
    \ slots which we may interpret as 180 degrees out of phase if we assume that 360\
    \ degrees corresponds to the four time slots. Likewise, terminal c and d are 90\
    \ and 270 degrees out of phase with the excitation of terminal a. This interpretation\
    \ will prove useful later when we write our own stepper motor driver and discuss\
    \ other modes of operating the motor, such as half- and microstepping modes.\n\
    \nNote that in the excitation pattern only one coil is excited at a time. But\
    \ we can also operate the motor with two coils excited simultaneously, one coil\
    \ pulling one permanent magnet and the other coil pushing another magnet. In this\
    \ way the torque of the motor can be increased by about 40 %, albeit at the expense\
    \ of doubling the required power, because there are two coils excited at the same\
    \ time. The pattern with increased torque is based on the fundamental sequence\
    \ 1100. Applying the appropriate phasing between the four terminals from above,\
    \ we arrive at the following pattern to excite the terminals:\n\n```\nterminal\
    \ a: 1100 1100 1...\n           b: 0011 0011 0...\n           c: 0110 0110 0...\n\
    \           d: 1001 1001 1...\n```\n\nwhere we see that the excitation of terminals\
    \ b through d is shifted by 2, 1, and 3 time slots with respect to that of terminal\
    \ a. A special point to note is that exciting two coils simultaneously will cause\
    \ the positions towards which the permanent magnet will point to lie in between\
    \ the coils, rather than directly facing the coils. Since we now have the single-coil\
    \ excitation pattern where the magnets point at the coils and the double-coil\
    \ excitation pattern where it points in between the coils, we might consider a\
    \ combination of both patterns... and find that by interleaving the steps of the\
    \ single-coil and double-coil excitation patterns, we obtain a sequence where\
    \ the step size is halved. This mode of operation is called half-step mode. The\
    \ pattern in which we have to excite the coils is the following:\n\n```\nterminal\
    \ a: 11100000 11100000 1...\n           b: 00001110 00001110 0...\n          \
    \ c: 00111000 00111000 0...\n           d: 10000011 10000011 1...\n```\n\nwhere\
    \ the period length is 8 time slots with a fundamental excitation pattern of 11100000.\
    \ The excitation sequence of terminal b is the fundamental shifted by half the\
    \ period length, or four time slots, or 180 degrees. Note that here, 360 degrees,\
    \ correspond to the eight time slots. And the sequence for terminals c and d are\
    \ shifted by two and six time slots, respectively.\n\nNote the general pattern:\
    \ terminals a and b are excited by a cosine-like sequence, which is evident by\
    \ calculating the voltage applied to coils A and B, which is a-b\n\na - b = 1\
    \ 1 1 0 -1 -1 -1 0\n\nwhich admittedly is a poor approximation of a cosine. Likewise\
    \ the voltage applied to coils C and D is c-d\n\nc - d = -1 0 1 1 1 0 -1 -1\n\n\
    and that is an equally poor approximation of a sine. Apparently, the signals applied\
    \ to the coil pairs roughly follow a cosine and a sine-like excitation. It is\
    \ easy to see how we can generalize this and use better approximations of the\
    \ cosine- and sine-like excitations of the coils, which is called *microstepping*\
    \ the motors.\n\nIn microstepping modes, the permanent magnets on the rotor are\
    \ moved to several intermediate positions in between coils. This finer control\
    \ comes at the expense of requiring a more advanced driver to control the output\
    \ current in finer steps than turning it on and off. An example of such a driver\
    \ is the DRV8825 circuit, which exposes very few control pins for direction and\
    \ stepping as well as selecting which microstepping mode to use. Internally it\
    \ generates the appropriate excitation pattern of the currents that are applied\
    \ to the coils.\n\nIn the above example, the stepper motor uses only six permanent\
    \ magnets, resulting in an angular increment of 30 degrees per step, or 12 steps\
    \ per revolution, but it is easy to see that we can increase the number of magnets\
    \ to reduce the step size significantly. Typical step sizes for commercially available\
    \ motors are 200 or 400 steps per revolution.\n\nHere we need to point out that\
    \ assigning one phase to coil terminals a and b and the other to terminals c and\
    \ d is only a convention, and some vendors prefer to enumerate the coils and associated\
    \ terminals sequentially when looking at the motor in Figure 3.10. This amounts\
    \ to swapping the labels of terminals b and c and implies that we may have to\
    \ swap two cables from the driver circuit to the motor in order to make it turn.\
    \ It is best to check the datasheet for the motor to find out what convention\
    \ is used for that particular motor.\n\nFurthermore, stepper motors come with\
    \ different numbers of connecting cables that expose the terminals of the coils.\
    \ On the left in Figure 3.11, the situation is depicted where all eight terminals\
    \ are exposed. Sometimes the center taps are internally connected, in which case\
    \ only four terminals are exposed, and this corresponds to the situation in the\
    \ discussion earlier in this section. On the right, the center terminals are internally\
    \ connected and are exposed, in which case the total number of exposed wires is\
    \ six. If the two central connections are internally joined, five wires are exposed.\
    \ Normally the exposed wires are color coded and identified in the datasheet,\
    \ but measuring the resistance between the exposed wires allows us to determine\
    \ the internal wiring of the motor experimentally.\n\nIn the previous stepper\
    \ motor examples, we always reverse the polarity of the coil excitation, which\
    \ requires a drive circuit with an H bridge. Stepper motors, however, can also\
    \ be operated without an H bridge in unipolar mode. In Figure 3.12 we show the\
    \ connection for a unipolar stepper motor that has center taps of the coils wired\
    \ together, as discussed in the previous paragraph, and exposes only one terminal\
    \ that is connected to the positive"
  mdcn: "## 3.2.2 伺服电机与模型舵机\n\n术语 *servo* 指的是将电机与位置编码器结合在 *闭环* 反馈（或伺服）回路中使用 [21]。在此回路中，电机速度被持续调整，以减小编码器报告的期望位置与实际位置之间的差异。这类伺服电机常用于工业应用，需要配备PID控制器\
    \ [21] 和功率驱动电子设备的复杂控制系统。伺服电机用于大型工业机器人和需要高定位精度的应用中。将控制器参数调整到控制回路在精度、速度和可接受超调量方面的期望性能，需要专家关注，超出了本书的范围。\n\
    \n因此，我们使用伺服电机的简易版本——*模型舵机*，通常简称为 *舵机*，如图3.8所示。它常见于遥控汽车和飞机，但也可能出现在机器人应用中，例如控制小型机械臂的位置或角度。舵机在旋转轴上安装了一个电位器，用作编码器。它提供轴的位置信息，其旋转范围通常为0–180度。电阻值与一个对应于期望位置的电信号所衍生的电压进行比较。差值信号被放大，并用于驱动直流电机向最小化差异的方向转动。这构成了一个简单的比例控制器。通常，电机轴与输出轴之间的一个小型减速齿轮箱会降低速度，但提高了控制精度和扭矩。请注意，舵机通过三根线与外部连接。其中两根线是地线和电源电压（标称4.8V），颜色分别为黑色和红色。第三根线（许多情况下为黄色或白色）承载关于期望位置的信息。\n\
    \n关于期望位置的信息以脉宽调制信号的形式传输给舵机，如图3.9所示。舵机期望接收间隔为20毫秒的脉冲序列。每个单独脉冲的持续时间在1到2毫秒之间，其中1.5毫秒的持续时间指定中间位置。使用微控制器可以轻松产生这种脉冲模式，我们将在后续章节中实现。\n\
    \n伺服电机和舵机使用闭环系统来实现高定位精度，而步进电机则无需闭环反馈即可实现这一点。\n\n## 3.2.3 步进电机\n\n步进电机通过小的离散步进改变轴的角位置，因此通过计算步数即可得到位置。这样，无需反馈或伺服机构即可实现高重复性，电机可以开环运行。\n\
    \n在图3.10中，我们说明了永磁步进电机是如何实现这一点的。电机的静止部分由一个铁轭和四个线圈组成，其中两个线圈串联工作。这里，标记为A和B的上下线圈，以及标记为C和D的左右线圈，就是这样的两对。转子上组装了数量适中的永磁体。图中我们只使用了六个磁体，标记为1到6，黑色端表示北极。它们径向排列，极性交替。\n\
    \n我们假设最初只有线圈A和B被激励，使得上线圈表现为磁北极，下线圈表现为南极。在这种情况下，磁力线穿过上下两个线圈，穿过转子中的磁体，并通过周围的轭返回。在这种线圈激励下，转子确实如图3.10所示定向，因为上线圈表现为北极，吸引标记为1的上部永磁体的南极。因此，它们尽可能靠近。对于下线圈和标记为4的磁体，情况正好相反。为了使转子逆时针旋转30度，我们必须关闭线圈A和B，并开启线圈C和D。这样，右侧的线圈C是北极，吸引标记为3的永磁体（其南极朝外）。同样，左侧的线圈D和磁体6的情况正好相反。转子将移动直到磁体6面对线圈D。我们继续通过关闭线圈C和D，并反转线圈A和B的极性（使上线圈表现为南极，吸引磁体2）来转动转子。以此类推，我们发现可以通过周期性地按以下模式激励线圈，使电机以每次30度的步数转动：\n\
    \n```\nterminal a: 1000 1000 1...\n           b: 0010 0010 0...\n           c:\
    \ 0100 0100 0...\n           d: 0001 0001 0...\n```\n\n其中时间从左向右流动。这里，1表示端子连接到正电源电压，0表示线圈连接到地电位。反向执行该序列会使电机向相反方向转动。观察时间槽1和3显示线圈A和B的极性反转，这意味着我们需要一个H桥来实现极性反转。我们将在第4.5节回到这个实现。\n\
    \n更仔细地分析端子a到d的激励模式是有启发性的。第一个观察是，四个时间槽的序列会一遍又一遍地重复。其次，我们观察到一个基本模式是端子a以序列1000被激励。端子b的激励向右移动了两个时间槽，如果我们假设360度对应四个时间槽，我们可以将其解释为180度相位差。同样，端子c和d与端子a的激励分别有90度和270度的相位差。当我们编写自己的步进电机驱动器并讨论电机的其他运行模式（如半步和微步模式）时，这种解释将被证明是有用的。\n\
    \n请注意，在激励模式中，一次只激励一个线圈。但我们也可以同时激励两个线圈来运行电机，一个线圈拉动一个永磁体，另一个线圈推动另一个磁体。这样，电机的扭矩可以增加约40%，但代价是所需功率加倍，因为同时有两个线圈被激励。增加扭矩的模式基于基本序列1100。应用上述四个端子之间的适当相位，我们得到以下激励端子的模式：\n\
    \n```\nterminal a: 1100 1100 1...\n           b: 0011 0011 0...\n           c:\
    \ 0110 0110 0...\n           d: 1001 1001 1...\n```\n\n我们看到端子b到d的激励相对于端子a分别移动了2、1和3个时间槽。一个特别需要注意的点是，同时激励两个线圈会导致永磁体指向的位置位于线圈之间，而不是直接面对线圈。既然我们现在有了磁体指向线圈的单线圈激励模式，以及磁体指向线圈之间的双线圈激励模式，我们可能会考虑将两种模式结合起来……并发现通过交错单线圈和双线圈激励模式的步骤，我们获得了一个步长减半的序列。这种运行模式称为半步模式。我们需要激励线圈的模式如下：\n\
    \n```\nterminal a: 11100000 11100000 1...\n           b: 00001110 00001110 0...\n\
    \           c: 00111000 00111000 0...\n           d: 10000011 10000011 1...\n\
    ```\n\n其中周期长度为8个时间槽，基本激励模式为11100000。端子b的激励序列是基本序列移动了半个周期长度，即四个时间槽，或180度。请注意，这里的360度对应八个时间槽。端子c和d的序列分别移动了两个和六个时间槽。\n\
    \n注意一般模式：端子a和b由类似余弦的序列激励，这通过计算施加到线圈A和B的电压（即a-b）可以明显看出：\n\na - b = 1 1 1 0 -1 -1\
    \ -1 0\n\n这无疑是对余弦的一个粗略近似。同样，施加到线圈C和D的电压是c-d：\n\nc - d = -1 0 1 1 1 0 -1 -1\n\n\
    这也是对正弦的一个同样粗略的近似。显然，施加到线圈对的信号大致遵循余弦和正弦类的激励。很容易看出我们如何推广这一点，并使用更好的余弦和正弦类线圈激励近似，这被称为电机的\
    \ *微步* 控制。\n\n在微步模式下，转子上的永磁体被移动到线圈之间的几个中间位置。这种更精细的控制是以需要更先进的驱动器为代价的，该驱动器需要以比简单开关更精细的步进来控制输出电流。这种驱动器的一个例子是DRV8825电路，它只暴露很少的控制引脚用于方向和步进，以及选择使用哪种微步模式。在内部，它生成施加到线圈的电流的适当激励模式。\n\
    \n在上面的例子中，步进电机只使用了六个永磁体，导致每步角度增量为30度，或每转12步，但很容易看出我们可以增加磁体数量以显著减小步长。商用电机的典型步长为每转200或400步。\n\
    \n这里我们需要指出，将一相分配给线圈端子a和b，另一相分配给端子c和d只是一种惯例，一些制造商在查看图3.10中的电机时，更喜欢按顺序枚举线圈和相关端子。这相当于交换端子b和c的标签，并意味着我们可能需要交换驱动器电路到电机的两根电缆才能使其转动。最好检查电机的数据手册，以确定该特定电机使用的是哪种惯例。\n\
    \n此外，步进电机带有不同数量的连接电缆，这些电缆暴露线圈的端子。在图3.11左侧，描绘了所有八个端子都暴露的情况。有时中心抽头在内部连接，这种情况下只暴露四个端子，这对应于本节前面讨论的情况。在右侧，中心端子在内部连接并暴露，这种情况下暴露的导线总数为六根。如果两个中心连接在内部连接，则暴露五根导线。通常，暴露的导线有颜色编码并在数据手册中标识，但测量暴露导线之间的电阻可以让我们通过实验确定电机的内部接线。\n\
    \n在前面的步进电机示例中，我们总是反转线圈激励的极性，这需要带有H桥的驱动电路。然而，步进电机也可以在单极模式下无需H桥运行。在图3.12中，我们展示了一个单极步进电机的连接，其中线圈的中心抽头连接在一起，如前一段所述，并且只暴露一个连接到正"
