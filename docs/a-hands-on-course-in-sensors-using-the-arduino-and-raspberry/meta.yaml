    \ repeatedly turns on for 10 μs and off for 90 μs.\n\n```\n// Pulse Generator\
    \ using PWM, V. Ziemann, 221021\n#include <TimerOne.h>\nconst int outpin = 9;\n\
    float period=100, width=10; // in microseconds\nvoid setup() {\n  Serial.begin(9600);\
