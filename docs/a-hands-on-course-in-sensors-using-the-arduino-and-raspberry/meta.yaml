- md: '## 3.1.2 Large currents


    Switching large currents and voltages requires us to “amplify” the small current
    that the microcontroller provides, and transistors of various flavors do just
    that. Namely, they amplify the current flowing into their base terminal by a factor
    β, which is specified in the datasheet of the transistor to a value that flows
    across the collector-emitter terminals. Refer to the left side of Figure 3.3 for
    the naming and location of the respective terminals of an NPN-transistor. If the
    amplification β is large enough, moderate base-currents cause the output current
    to saturate the transistor such that it behaves like a switch that turns on the
    connection from collector to emitter.


    In the example shown in Figure 3.3, the 1kΩ resistor on the base limits the input
    current across the base-emitter link to 5 mA, provided the control voltage is
    5 V. If the transistor has an amplification of 100, which is typical for many
    small signal transistors, it can switch up to 500 mA, which is more than is actually
    needed in this case. The actual current flowing through the collector-emitter
    link is determined by the 12 V supply voltage to the LED and the 680Ω resistor
    limiting the current. Note that using the transistor also decouples the voltage
    level of the controlling circuitry and the supply voltage, here 12 V, of the consumer,
    the LED. This way of operating a transistor is called open collector, because
    we can think of the collector terminal as a generic connection point for an (almost)
    arbitrary load that is connected to its own supply voltage. If the emitter-collector
    link is in the nonconducting state, no current flows, and the load is turned off.
    If a positive current flows into the base terminal, the emitter-collector link
    becomes conducting, the lower terminal of the load is shorted to ground, and a
    current flows from the load’s power supply through the load and turns it on.


    Since switching is very common, small switching currents are often desirable.
    This requires a transistor with a large amplification. One way to achieve this
    is to connect two transistors as a *Darlington* pair, as shown on the left in
    **Figure 3.4**. Such a pair has the current amplification of approximately the
    product of the two individual transistors, and is often used in switching applications,
    which accounts for the availability of integrated circuits that pack seven or
    eight Darlington pairs into a single package. An example, the ULN2003, is shown
    on the right in **Figure 3.4**. The seven input terminals on the left-hand side
    of the package are the base terminals of the Darlington pairs, and the output
    terminals on the right-hand side are the corresponding open collector terminals.
    The ground connection is located at the lower left, and the external positive
    power supply voltage is connected to the terminal labeled COM. This specific chip
    can switch up to seven times 500 mA, and the supply voltage for the load can be
    up to 40 V. The datasheets provide a lot more detailed information.


    In case we need to switch very high voltages of up to 1 kV or very large currents,
    we use MOSFETs. They require almost no current to flow into the gate in order
    to switch. Only the capacitance between the terminals needs to be charged, and
    this creates an electric field that pulls charge carriers into the depletion zone
    of the MOSFET, which causes it to conduct.


    Using transistors makes switching unipolar voltages very convenient, but if we
    need to switch AC household voltages on or off, such as lamps or the wake-up radio,
    we need a relay. Relays consist of a small electromagnet that mechanically closes
    or opens a contact. This achieves a high degree of separation between the controlling
    circuitry and the load circuit. The two sides only communicate via the magnetic
    field that toggles the switch, depending on whether current flows through the
    coil or not. A schematic image is shown on the left in **Figure 3.5**. There we
    see the coil with its two terminals on the left, and the switch on the right-hand
    side that toggles between the two terminals. Normally we need to prepend a transistor
    to switch the coil on and off because this requires a larger current than the
    microcontroller provides. Moreover, we need to pay attention, because the coil
    is an inductive load, and turning it off causes a large induction voltage that
    may damage the


    42 ■ A Hands-On Course in Sensors Using the Arduino and Raspberry Pi, Second Edition


    ![](img/8f23875c54d5b3177d5d2a5bba06b37e_60_0.png)


    Figure 3.2 The physics of an LED.


    zone, provided the voltage is higher than the voltage drop of the diode. This
    situation is opposite to the situation encountered in Figure 2.13, where the diode
    was reverse biased. The simplified band-level scheme and the corresponding circuit
    for the forward-biased LED is shown in Figure 3.2. We only show the lower boundary
    of the conduction band, and the upper boundary of the valence band inside the
    diode. Here both electrons and holes are pulled into the space-charge zone and
    have a chance to recombine. The energy that is released by the electrons dropping
    from the conduction band to the valence band is emitted as a photon. Note that
    the forward voltage drop of the LED is about the size of the bandgap and the resistor
    is needed to limit the current. LEDs emitting different colors have different
    bandgaps, and correspondingly, different forward voltage drops, where shorter
    wavelengths corresponds to larger bandgaps.


    As already seen in Figures 3.1 and 3.2, LEDs connect to a circuit with two wires,
    the short one is the cathode and needs to be connected to ground, or the more
    negative potential. The cathode is normally indicated by a flattened face of the
    hemispherical housing. The other wire is the anode and is connected to the more
    positive potential, provided we want the LED to light up. But simply connecting
    the LED to the power rails will likely destroy the diode. We need to connect a
    resistor in series with the diode, as shown in the center and right on Figure
    3.1. The voltage drop $V_d$ across most LEDs is between 1.5 and 3 V, where the
    lower values apply to red and infrared LED, and the higher value to blue and ultraviolet
    LEDs. Moreover, the typical operating current of the diode must be limited to
    some value below $I = 20$ mA. The resistor thus needs to be specified according
    to $R > (V_c - V_d)/I$, where $V_c$ is the supply voltage. A red LED thus works
    nicely on $V_c = 5$ V with $R = 180 \Omega$ or $220 \Omega$, or even larger values
    where I picked a larger resistor with the commonly available values. Normally
    the resistance value is not very critical; if chosen too large, the LED is simply
    less bright.


    In order to dynamically vary the brightness, changing the resistor value is rather
    inconvenient. The better way to achieve this is by rapidly turning the diode on
    and off at a rate much faster than the human eye can resolve, typically in the
    kHz range. Changing the duty cycle of the on- versus off-time proportionally changes
    the brightness of the LED. The added benefit of this method, called *pulse-width
    modulation*, is that the dissipated energy is reduced by the same ratio.


    If an LED or any other pulse-width modulated device needs to be galvanically separated
    from the control electronics, we use an optocoupler. This is a small integrated
    circuit that consists of an LED and a phototransistor. As discussed in Section
    2.1.3, a phototransistor behaves like a normal transistor with a high current
    amplification, but instead of passing a current into the base terminal of the
    transistor, the LED illuminates the region with depleted charges in the transistor
    and creates a large number of electron-hole pairs. Thus, the transistor becomes
    conducting and switches on a device on the “other” side of the circuit, without
    being electrically connected. This implies that only the on- or off-state or digital
    signals are communicated across the optocoupler. Typically they are used if devices
    located at different electrical potentials need to be switched on or off, or to
    prevent electric perturbations from the “other” side. We note in passing that
    the MIDI communication between musical instruments uses optocouplers at their
    respective inputs. This removes electrical disturbances and protects the musicians
    from electrocution.


    So far we only switched LEDs on and off, but we will look at how to control large
    currents and loads.


    ![](img/8f23875c54d5b3177d5d2a5bba06b37e_61_0.png)


    ![](img/8f23875c54d5b3177d5d2a5bba06b37e_62_0.png)


    Figure 3.4 Two NPN transistors connected to form a Darlington pair (left) and
    a ULN2003 Darlington array (right)†.'
  mdcn: '## 3.1.2 大电流


    切换大电流和大电压需要我们“放大”微控制器提供的小电流，而各种类型的晶体管正是为此而生。具体来说，它们将流入其基极的电流放大β倍，这个β值在晶体管的数据手册中指定，表示流经集电极-发射极的电流。关于NPN晶体管各端子的命名和位置，请参考图3.3的左侧。如果放大系数β足够大，适中的基极电流就能使输出电流饱和，从而使晶体管表现得像一个开关，接通集电极到发射极的连接。


    在图3.3所示的例子中，基极上的1kΩ电阻将基极-发射极链路的输入电流限制在5mA，前提是控制电压为5V。如果晶体管的放大系数为100（这对于许多小信号晶体管来说是典型的），它可以切换高达500mA的电流，这比本例实际需要的要大。流经集电极-发射极链路的实际电流由LED的12V电源电压和限制电流的680Ω电阻决定。请注意，使用晶体管还实现了控制电路和负载（此处为LED）的供电电压（12V）之间的电平隔离。这种操作晶体管的方式称为开集电极，因为我们可以将集电极端子视为一个通用连接点，用于连接（几乎）任意负载，而该负载连接到其自身的电源电压。如果发射极-集电极链路处于非导通状态，则没有电流流过，负载关闭。如果正电流流入基极，发射极-集电极链路变为导通，负载的下端接地，电流从负载的电源流经负载并将其打开。


    由于开关操作非常普遍，通常希望开关电流较小。这需要具有大放大系数的晶体管。实现这一点的一种方法是将两个晶体管连接成*达林顿*对，如**图3.4**左侧所示。这样一对晶体管的电流放大系数大约是两个单个晶体管放大系数的乘积，常用于开关应用，这也解释了为什么有将七个或八个达林顿对封装在一个芯片中的集成电路。一个例子是ULN2003，如**图3.4**右侧所示。封装左侧的七个输入端子是达林顿对的基极，右侧的输出端子是相应的开集电极端子。接地连接位于左下角，外部正电源电压连接到标有COM的端子。这个特定的芯片可以切换高达七路500mA的电流，负载的供电电压最高可达40V。数据手册提供了更详细的信息。


    如果我们需要切换高达1kV的极高电压或非常大的电流，我们会使用MOSFET。它们几乎不需要电流流入栅极即可进行开关。只需给端子之间的电容充电，这会产生一个电场，将电荷载流子拉入MOSFET的耗尽区，从而使其导通。


    使用晶体管使得切换单极电压非常方便，但如果我们需要开关交流市电电压，例如灯具或唤醒收音机，我们就需要继电器。继电器由一个小电磁铁组成，它通过机械方式闭合或断开触点。这实现了控制电路和负载电路之间的高度隔离。两侧仅通过磁场进行通信，该磁场根据线圈中是否有电流流过来切换开关。示意图如**图3.5**左侧所示。我们看到左侧的线圈及其两个端子，以及右侧在两个端子之间切换的开关。通常我们需要在前面加一个晶体管来开关线圈，因为这需要比微控制器提供的更大的电流。此外，我们需要注意，因为线圈是感性负载，关闭它会产生很大的感应电压，可能会损坏


    42 ■ 使用Arduino和Raspberry Pi的传感器实践课程，第二版


    ![](img/8f23875c54d5b3177d5d2a5bba06b37e_60_0.png)


    图3.2 LED的物理原理。


    区域，前提是电压高于二极管的压降。这种情况与图2.13中遇到的情况相反，那里二极管是反向偏置的。正向偏置LED的简化能带图和相应电路如图3.2所示。我们只显示了二极管内导带的下边界和价带的上边界。在这里，电子和空穴都被拉入空间电荷区，并有机会复合。电子从导带跃迁到价带时释放的能量以光子的形式发射出来。请注意，LED的正向压降大约等于带隙的大小，电阻用于限制电流。发射不同颜色的LED具有不同的带隙，相应地，具有不同的正向压降，其中较短的波长对应较大的带隙。


    如图3.1和3.2所示，LED通过两根导线连接到电路，短的那根是阴极，需要接地或连接到更负的电位。阴极通常由半球形外壳的扁平面指示。另一根导线是阳极，连接到更正的电位，前提是希望LED点亮。但简单地将LED连接到电源轨很可能会损坏二极管。我们需要将电阻与二极管串联，如图3.1中间和右侧所示。大多数LED的压降$V_d$在1.5到3V之间，其中较低值适用于红色和红外LED，较高值适用于蓝色和紫外LED。此外，二极管的典型工作电流必须限制在$I
    = 20$ mA以下的某个值。因此，电阻需要根据$R > (V_c - V_d)/I$来选择，其中$V_c$是电源电压。因此，一个红色LED在$V_c =
    5$ V时，使用$R = 180 \Omega$或$220 \Omega$，甚至更大的电阻值（我选择了常用值中较大的电阻）工作良好。通常电阻值不是非常关键；如果选择太大，LED只是亮度降低。


    为了动态改变亮度，改变电阻值相当不方便。更好的方法是以远快于人眼能分辨的速率（通常在kHz范围内）快速开关二极管。改变开与关时间的占空比可以按比例改变LED的亮度。这种方法的额外好处是，称为*脉宽调制*，其耗散的能量也按相同比例减少。


    如果LED或任何其他脉宽调制设备需要与控制电子设备进行电气隔离，我们使用光耦合器。这是一个小型集成电路，由一个LED和一个光电晶体管组成。如第2.1.3节所述，光电晶体管的行为类似于具有高电流放大系数的普通晶体管，但不是将电流注入晶体管的基极，而是LED照亮晶体管中电荷耗尽的区域，并产生大量的电子-空穴对。因此，晶体管变为导通状态，并在电路的“另一侧”打开一个设备，而无需电气连接。这意味着只有开或关状态或数字信号通过光耦合器传输。通常，当位于不同电位的设备需要开关，或防止来自“另一侧”的电气干扰时，会使用它们。我们顺便注意到，乐器之间的MIDI通信在其各自的输入端使用光耦合器。这消除了电气干扰，并保护音乐家免受电击。


    到目前为止，我们只开关了LED，但接下来我们将研究如何控制大电流和负载。


    ![](img/8f23875c54d5b3177d5d2a5bba06b37e_61_0.png)


    ![](img/8f23875c54d5b3177d5d2a5bba06b37e_62_0.png)


    图3.4 两个NPN晶体管连接成达林顿对（左）和ULN2003达林顿阵列（右）†。'
