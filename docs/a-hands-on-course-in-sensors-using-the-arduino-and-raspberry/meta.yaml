- md: "Up to this point we only defined the static webpage. In the following we make\
    \ it dynamic with the help of JavaScript which is enclosed between SCRIPT tags.\
    \ In the first line we determine the IP number of the computer that served the\
    \ webpage, normally the NodeMCU, and append the port number :81. After initializing\
    \ a number of variables needed to control and display the measurements, we display\
    \ the address. Note that the entity in the current browser window that is named\
    \ with id='ip' is accessible by document.getElementById('ip') and the method .innerHTML\
    \ gives access to the content of that entity. Here we use it to change the displayed\
    \ text to ipaddr. With the IP number known, we are ready to open the websocket\
    \ and give it the name websocket. We immediately specify its standard behavior\
    \ by defining the methods for error handling as well as opening and closing the\
    \ websocket; we simply write a descriptive message to the JavaScript console –\
    \ we discuss access to it below – and to the status line at the bottom of the\
    \ displayed webpage. The onmessage function breathes life into our webpage; it\
    \ determines the response of the browser window to messages arriving from the\
    \ NodeMCU. After writing the arriving event to the JavaScript console we parse\
    \ the event.data with the built-in JSON.parse function, which extracts the JSON\
    \ name-value pairs into the variable stuff. We then, for example, access the received\
    \ information with stuff[\"INFO\"] and, provided it is not undefined, write it\
    \ to the status line on the browser window. If stuff[\"TEMP\"] is not undefined,\
    \ we have received a new temperature, whose value is stored in val. In the following\
    \ line, we extract the attribute d, which contains the displayed data points,\
    \ from trace0 and store it in dd to which we add the new temperature value, properly\
    \ scaled by appending L xpix ypix to dd. Here xpix is the horizontal coordinate\
    \ in pixels and ypix the corresponding vertical coordinate inside displayarea.\
    \ Then we copy the updated dd back to d of trace0, which makes the new data point\
    \ visible in the browser window. Finally we increment the current_position and\
    \ check for overflow in which case we remove the first data point with the replace()\
    \ function. Its first argument is the search string that starts with an M, ends\
    \ with an L, and has any number of characters in between that are not an L ([^L]*).\
    \ Then we move the entire trace0 to the left and add new data points on the right\
    \ edge.\n\n```html\n<BUTTON id=\"start\" type=\"button\" onclick=\"start();\"\
    >Start</BUTTON>\n<BUTTON id=\"stop\" type=\"button\" onclick=\"stop();\">Stop</BUTTON>\n\
    <SELECT onchange=\"setSamplePeriod(this.value);\">\n  <OPTION selected=\"selected\"\
    \ value=\"1\">1 s</OPTION>\n  <OPTION value=\"2\">2 s</OPTION>\n  <OPTION value=\"\
    5\">5 s</OPTION>\n</SELECT>\n<BUTTON id=\"clear\" type=\"button\" onclick=\"cleardisplay();\"\
    >Clear</BUTTON>\n<A id='ip'>IP address</A>\n</P>\n<DETAILS open><SUMMARY>Logging\
    \ display</SUMMARY>\n  <SVG id=\"displayarea\" width=\"1024px\" height=\"512px\"\
    >\n    <PATH id=\"trace0\" d=\"M0 256\" />\n  </SVG>\n</DETAILS>\n<DIV id=\"status\"\
    >Status window</DIV>\n```\n\n```javascript\n<SCRIPT>\n  var ipaddr=location.hostname\
    \ + \":81\";\n  var sample_period=1, current_position=0, Tmin=10, Tmax=40;\n \
    \ document.getElementById('ip').innerHTML=ipaddr;\n  var websocket = new WebSocket('ws://'\
    \ + ipaddr);\n  websock.onerror = function(evt) { console.log(evt); toStatus(evt)\
    \ };\n  websock.onopen = function(evt) {console.log('websock open'); };\n  websock.onclose\
    \ = function(evt) {\n      console.log('websock close'); toStatus('websock close');\n\
    \  };\n  websock.onmessage=function(event) {\n      console.log(event);\n    \
    \  var stuff=JSON.parse(event.data);\n      var val=stuff[\"INFO\"]; //.................................info\n\
    \      if ( val != undefined ) {toStatus(val);}\n      val=stuff[\"TEMP\"];  \
    \    //.................................temperature\n      if ( val != undefined\
    \ ) {\n          dd=document.getElementById('trace0').getAttribute('d');\n   \
    \       dd += ' L' + current_position + ' '\n              + (512-512*(val-Tmin)/(Tmax-Tmin));\n\
    \          document.getElementById('trace0').setAttribute('d',dd);\n         \
    \ current_position += 1;\n          toStatus('T = ' + val);\n          if (current_position\
    \ > 1024) {\n              dd=document.getElementById('trace0').getAttribute('d')\n\
    \                  .replace(/M[^L]*L/, \"M\");\n              document.getElementById('trace0').setAttribute('d',dd);\n\
    \              document.getElementById('trace0').setAttribute\n              ('transform','translate('\
    \ + (1024-current_position) + ',0)');\n          }\n      }\n  }\n  function toStatus(txt){document.getElementById('status').innerHTML=txt;}\n\
    \  function start() {\n      websock.send(JSON.stringify({\"cmd\" : \"START\"\
    , \"val\" : sample_period}));\n  }\n  function stop() {\n      websock.send(JSON.stringify({\"\
    cmd\" : \"STOP\", \"val\" : \"-1\" }));\n  }\n  function setSamplePeriod(v) {\n\
    \      toStatus(\"Setting sample period to \"+ v + \" ms\");\n      sample_period=v;\n\
    \  }\n  function cleardisplay() {\n      dd = \"M0 256\";\n      document.getElementById('trace0').setAttribute('d',dd);\n\
    \      document.getElementById('trace0').setAttribute\n      ('transform','translate(0)');\n\
    \      current_position=0; toStatus(\"Display cleared\");\n  }\n</SCRIPT></BODY></HTML>\n\
    ```\n\nThe SCRIPT continues with the definition of the function toStatus(), which\
    \ just writes the text given as its argument to the status line and the definitions\
    \ of the callback functions for the buttons. The function start() forms a JSON\
    \ message with the two name-value pairs, one for cmd and one for val. It sends\
    \ the start command to the NodeMCU with the sample_period given as val. Likewise\
    \ stop() stops the acquisition and cleardisplay() resets the attribute d of trace0,\
    \ which clears the displayed trace. The callback function for the selection menu\
    \ in the SELECT tags setSamplePeriod() receives the value specified in the chosen\
    \ OPTION tag as argument and assigns it to sample_period. Finally, the open tags\
    \ for SCRIPT, BODY, and HTML are closed.\n\nWe copy this webpage to a subdirectory\
    \ named **data** under the subdirectory where **websocket_tempserver.ino** file\
    \ resides. Then we install the program that copies the contents of the **data**\
    \ subdirectory to the flash memory on the NodeMCU by downloading ESP8266FS-0.5.0.zip\
    \ from the releases page on https://github.com/esp8266/arduino-esp8266fs-plugin\
    \ and unzip it in the /Arduino/tools/ subdirectory. After restarting the Arduino\
    \ IDE, we find an entry *ESP8266 Sketch Data Upload* in the *Tools* menu. It uploads\
    \ the webpage to the NodeMCU – but only if the *Serial monitor* is closed – such\
    \ that the server on port 80 finds it and delivers it to connecting browsers.\n\
    \nUsing this system is rather simple. On any browser that has access to the network\
    \ with the NodeMCU we enter the IP number of the NodeMCU in the address bar, which\
    \ requests the webpage shown in Figure 8.1 from the NodeMCU. Once visible in the\
    \ browser, the JavaScript embedded on that webpage connects to the websocket port\
    \ 81 on the NodeMCU and establishes the two-way communication channel – the websocket.\
    \ It is henceforth used to send JSON-formatted messages back and forth.\n\nOn\
    \ the NodeMCU we can observe the communication via the serial monitor, because\
    \ the messages are echoed to the serial line. In a chromium browser, we open the\
    \ JavaScript console by pressing **Ctrl-Shift-I** and selecting the **Console**\
    \ tab. It can also be found behind the three dots at the top-right of the browser\
    \ under *More tools* and *Development tools*. Every argument of `console.log()`\
    \ in the JavaScript code embedded in the webpage shows up there. Now we can observe\
    \ how the communication between NodeMCU and browser is established when the page\
    \ is reloaded by pressing F5 in the browser (Mozilla or Chrome).\n\nMost examples\
    \ we encountered so far were deliberately chosen to be moderately simple, in order\
    \ to illustrate the mechanisms, but in the coming chapters we advance to more\
    \ complex projects, and start with a weather station with distributed sensors.\n\
    \n## QUESTIONS AND PROJECT IDEAS\n\n1.  Who initiates the communication: the NodeMCU\
    \ or the browser?\n2.  Add a 10s sampling time to the SELECT menu.\n3.  Add a\
    \ 100 ms sampling time to the SELECT menu. Note that you need to use `SampleSlow.attach_ms()`\
    \ on the NodeMCU to handle times shorter than a second.\n4.  Add a button to the\
    \ webpage that turns a pin on the NodeMCU on and off.\n5.  Display the state of\
    \ an input pin on the NodeMCU in a separate status line."
