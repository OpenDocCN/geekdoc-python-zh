    - V_-)/R_4 = (V_- - V_{out})/R_5$. Moreover, we observe that the positive input
    port is grounded, which forces the negative input port to be on ground potential
    as well. This implies $V_- = 0$, and the relation between input and output voltage
    becomes $V_{out} = -V_{in}R_5/R_4$, where the negative sign indicates that the
    amplifier is inverting. Note that we can add several input resistors $R_4$ in
    parallel with one end connected to the negative input port. This allows us to
    add the currents passing through the parallel copies of $R_4$, and we obtain a
    summing amplifier. The resistor values were simply chosen to be in a reasonable
    range. They need to be determined for each application.


    If we want to amplify a voltage without inverting it, we use the circuit shown
    on the left-hand side in Figure 2.18. The two resistors $R_1$ and $R_2$ constitute
    a voltage divider that forces the negative input voltage to be $V_- = V_{out}R_2/(R_1
    + R_2)$. But, at the same time, the op-amp forces $V_- = V_+$, which, after solving
