- img_proc: true
  md: "128 ■ A Hands-On Course in Sensors Using the Arduino and Raspberry Pi, Second\
    \ Edition\n\n```\ninterface wlan0\n    static ip_address=192.168.20.1/24\n   \
    \ nohook wpa_supplicant\n```\n\nat the end of the configuration file /etc/dhcpcd.conf.\
    \ The first line indicates that the following two lines relate to the built-in\
    \ wireless interface. The second line defines a static IP number to be 192.168.20.1\
    \ and the type of network (class C) with the shorthand notation /24. The third\
    \ line prevents the dhcp daemon to take control of the interface.\n\nWe now enable\
    \ network address translation, also called masquerading, between the wireless\
    \ network on wlan0 and the wired network on interface eth0 by executing the following\
    \ two commands in a terminal window\n\n```\nsudo iptables -t nat -A POSTROUTING\
    \ -o eth0 -j MASQUERADE\nsudo sh -c \"iptables-save > /etc/iptables.ipv4.nat\"\
    \n```\n\nThe first line uses the built-in command iptables to establish the rules\
    \ to apply and the second line saves them to the file /etc/iptables.ipv4.nat such\
    \ that they can be restored after a reboot. During the next boot the system loads\
    \ this configuration from the automatically executed file /etc/rc.local. We simply\
    \ add the following iptables-restore command just before exit 0 at the end of\
    \ /etc/rc.local.\n\n```\niptables-restore < /etc/iptables.ipv4.nat\nexit 0\n```\n\
    \nThis ensures that the network translation is properly initiated after rebooting\
    \ the system. Finally we allow network packages to pass between the interfaces,\
    \ which is disabled by default as a security measure. We enable forwarding by\
    \ removing the hash # from the line\n\n```\nnet.ipv4.ip_forward=1\n```\n\nin the\
    \ file /etc/sysctl.conf. We omit this step if all sensor nodes should only communicate\
    \ with the Raspi, but no other computer on the local network should be able to\
    \ surf the outside Internet beyond the Raspi, which might not be needed and poses\
    \ a potential security risk. This last step completes the basic network setup,\
    \ and we turn to the configuration of the access point software.\n\nThe configuration\
    \ file for the hostapd daemon is /etc/hostapd/hostapd.conf. It contains the following\
    \ lines:\n\n```\n# /etc/hostapd/hostapd.conf\ncountry_code=SE\ninterface=wlan0\n\
    ssid=messnetz\nchannel=7\nmacaddr_acl=0\nauth_algs=1\nignore_broadcast_ssid=0\n\
    wpa=2\nwpa_passphrase=zxcvZXCV\nwpa_key_mgmt=WPA-PSK\nwpa_pairwise=TKIP\nrsn_pairwise=CCMP\n\
    hw_mode=g\n```"
