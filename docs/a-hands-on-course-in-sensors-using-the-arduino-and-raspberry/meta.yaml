    \ MSP4921为零，第二位声明我们使用无缓冲电压。第三位我们选择内部放大倍数为1倍，第四位启用输出。一旦变量`val`中的16位组装完毕，我们就可以将CS拉低以启动通信，然后通过两次调用`SPI.transfer()`将16位数据分两个8位块传输到芯片，最后再将CS拉高以结束通信并在内部将电压传输到DAC的输出缓冲器。命令`A0?`回读电压，该电压已转换为伏特。这个简单的程序允许我们设置任何需要模拟控制电压作为输入的设备，并且还能回读电压以验证操作是否正确。\n\
    \n在其他情况下，我们不需要设置电压，而是需要生成周期性信号。\n\n## 4.5.6 周期性信号\n\n以下程序将Arduino UNO变成一个简单的脉冲发生器，它以微秒级的精度反复切换输出引脚的开和关。这是通过包含TimerOne库的头文件来实现的，该库使我们能够控制UNO上的内置硬件定时器。但请注意，该库只能访问引脚D9或D10。在定义了以微秒为单位的周期和脉冲宽度后，我们用指定的周期初始化Timer1，并启动pwm（脉冲宽度调制），其中引脚高电平的时间被缩放到0到1023的范围内。此时，引脚D9反复开启10\
