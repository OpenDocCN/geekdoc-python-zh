    then execute `telnet`. This can be automated by executing


    ```

    ssh -t pi@192.168.10.22 telnet localhost 20000

    ```


    from a remote desktop computer and where 192.168.10.22 is the IP-number of the
    Raspi. In this way, the Raspi works unattended as an Epics IOC but we can connect
    to it at any time using `telnet` in order to follow the performance and interact
    with `st.cmd`.


    # QUESTIONS AND PROJECT IDEAS


    +   1. Why is a standardized control system advantageous to use in comparison
    to a home-grown system?

    2. Write protocol and database files to interface the sensors discussed in previous
    chapters.

    3. Write protocol and database files to connect an Arduino UNO running the sketch
    in [Section 4.5.2](Section 4.5.2) to control a DC motor.

    4. Write protocol and database files to connect an Arduino UNO running the sketch
    in [Section 4.5.3](Section 4.5.3) to control a model-servo.

    5. Write protocol and database files to connect an Arduino UNO running the sketch
    in [Section 4.5.4](Section 4.5.4) to control a stepper motor.

    6. Research other control systems used in industry or research institutions.

    7. Research the documentation of the stream library on how to treat information
    that appears on the RS-232 line unsolicited, such as a continuously appearing
    stream of position data from a GPS receiver.

    8. In this chapter we address the Raspi by IP number 192.168.10.22 and in [Section
    5.4](Section 5.4) by 192.168.20.1. Explain, why this not a typo.'
