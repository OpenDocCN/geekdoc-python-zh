    we do not check the validity of the payload, which poses a potential security
    risk, if the system is reachable from the Internet.


    A few words are needed about the cryptic HTTP header that the NodeMCU returns
    to the calling browser. When a browser, such as Firefox or Chromium, connects
    to a web server on the default port 80, it first sends the name of the requested
    web page, such as GET /temperature in the above example, as an HTTP-GET request.
    Before returning the requested web page, the server sends some meta-information,
    such as a status code, and what type of information comes next. The status code
    for a properly understood request is 200, and for a missing page it is 404, a
    number probably everyone has seen as a response to a typo in the specification
    of a web page. The type may be an image, a media file such as a video, or HTML-formatted
    text, which is what we specify in the sketch as Content-Type. After an empty line
    the normal HTML header with the DOCTYPE follows, and the information embedded
    in <html> tags. We will discuss HTML and the structure of web pages in more detail
    in Section 5.7. Browsers do not render the meta-information, which therefore remains
    invisible, but we can eavesdrop on the communication with the netcat or telnet
    commands (more on those commands later in Section 5.3) by pointing them to port
    80 on the NodeMCU at IP address 192.68.20.184 and issuing GET /temperature by
    hand. All output from the server sub-sequentially appears in the same window.
    Figure 4.28 illustrates the exchange.


    Setting the brightness of the LED uses the same mechanism that is used to enter
    credit-card numbers when shopping online. It is based on the HTTP-GET method as
    well, but adds a query-string that follows the question mark after the address.
    The query-string has the form name=value. This mechanism to send information to
    a web server is often used'
