- md: "## 5.6 DATA STORAGE\n\nIn this section, we address several ways to store our\
    \ measurement data, and the archetypical data storage repository is a *database*.\
    \ We introduce a number of databases and use octave as well as python for the\
    \ presentation of the data.\n\n### 5.6.1 Flatfile\n\nThe simplest database is\
    \ certainly a file containing a time stamp and one or more measurement values,\
    \ possibly even in human-readable form. This is called a flatfile database, and\
    \ we create one by using the following Python script:\n\n```python\n# ask_repeat.py,\
    \ V. Ziemann, 220930\nimport serial, time, sys, atexit\ndef cleanup():\n    ser.close()\n\
    \    atexit.register(cleanup)\nquery=\"A0?\\n\".encode('utf-8')\nser=serial.Serial(\"\
    /dev/ttyUSB0\",9600,timeout=1)\ntime.sleep(3)    # wait for serial to be ready\n\
    while 1:\n    ser.write(query)\n    time.sleep(0.1)\n    reply=ser.readline().decode('utf-8')\n\
    \    print(int(time.time()), reply[3:].strip())\n    sys.stdout.flush()\n    time.sleep(1)\n\
    ```\n\nand store it in a file called **ask_repeat.py**. We recognize the same\
    \ organization as before, when we discussed Python scripts with importing functionality,\
    \ registering the *cleanup()* function, opening the serial line, and repeatedly\
    \ sending the query string and receiving the reply. The only difference is that\
    \ we print the *Unix time*, which is the number of seconds since January 1, 1970,\
    \ also called the *epoch*, before the measurement value. In the output, we therefore\
    \ see the following text\n\n```\n:\n1670955286 3.29\n1670955287 3.30\n1670955288\
    \ 3.29\n:\n```\n\nscrolling by. If we redirect this output into a file using the\
    \ following line of code:\n\n```\npython3 ask_repeat.py > db.dat\n```\n\nthat\
    \ we run in a terminal window on the Raspi, we create a flatfile database **db.dat**\
    \ with the time stamps and the measurement values. Later we can retrieve and convert\
    \ the data to a nice plot.\n\nRunning the data acquisition program in a dedicated\
    \ terminal window may be useful for short measurement sessions, but is hardly\
    \ useful if we want to log, for example, the temperature in a building for an\
    \ extended period of time, say a few months. In that case it is much preferable\
    \ to have a dedicated process that wakes up once every few minutes, reads the\
    \ temperature, and stores the value together with a timestamp in a file before\
    \ going back to sleep for a few minutes. As it turns out, Unix systems normally\
    \ have a system that takes care of these repeated tasks. It is called *cron*,\
    \ and it is a background process that wakes up once a minute, checks whether there\
    \ is a task to do, does it, and sleeps for a minute before checking again.\n\n\
    Let us start by creating a Python script that we want to execute at regular intervals.\
    \ In this particular case we place it in the /home/pi/bin directory and call the\
    \ file **single_request.py**. It contains the following lines:\n\n```python\n\
    # single_request.py, V. Ziemann, 220930\nimport serial, time\nser=serial.Serial(\"\
    /dev/ttyUSB0\",9600,timeout=1)\ntime.sleep(2)    # wait for serial to be ready\n\
    ser.write(b\"A0?\\n\")  # shorthand notation for encoding\ntime.sleep(0.1)\nreply=ser.readline().decode('utf-8')\n\
    print(int(time.time()), reply[3:].strip())\nser.close()\n```\n\nWe see that it\
    \ is rather similar to the previous scripts to read from the Arduino. It just\
    \ acquires one measurement and prints the value with the timestamp to standard\
    \ output. In order to make this program accessible for the cron software, it is\
    \ convenient to encapsulate it in a shell script file /home/pi/bin/readA0.sh that\
    \ contains the following lines:\n\n```bash\n#!/bin/bash\n/usr/bin/python /home/pi/bin/single_request.py\
