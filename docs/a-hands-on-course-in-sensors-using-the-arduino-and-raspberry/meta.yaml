    >\n    <PATH id=\"trace0\" d=\"M0 256\" />\n  </SVG>\n</DETAILS>\n<DIV id=\"status\"\
    >Status window</DIV>\n```\n\nUp to this point we only defined the static webpage.\
    \ In the following we make it dynamic with the help of JavaScript which is enclosed\
    \ between SCRIPT tags. In the first line we determine the ip number of the computer\
    \ that served the webpage, normally the NodeMCU, and append the port number :81.\
    \ After initializing a number of variables needed to control and display the measurements,\
    \ we display the address. Note that the entity in the current browser window that\
    \ is named with id='ip' is accessible by document.getElementById('ip') and the\
    \ method .innerHTML gives access to the content of that entity. Here we use it\
    \ to change the displayed text to ipaddr. With the IP number known, we are ready\
    \ to open the websocket and give it the name websocket. We immediately specify\
    \ its standard behavior by defining the methods for error handling as well as\
    \ opening and closing the websocket; we simply write a descriptive message to\
    \ the JavaScript console – we discuss access to it below – and to the status line\
    \ at the bottom of the displayed webpage. The onmessage function breathes life\
    \ into our webpage; it determines the response of the browser window to messages\
    \ arriving from the NodeMCU. After writing the arriving event to the JavaScript\
    \ console we parse the event.data with the built-in JSON.parse function, which\
    \ extracts the JSON name-value pairs into the variable stuff. We then, for example,\
    \ access the received information with stuff[\"INFO\"] and, provided it is not\
    \ undefined, write it to the status line on the browser window. If stuff[\"TEMP\"\
    ] is not undefined, we have received a new temperature, whose value is stored\
    \ in val. In the following line, we extract the attribute d, which contains the\
    \ displayed data points, from trace0 and store it in dd to which we add the new\
    \ temperature value, properly scaled by appending L xpix ypix to dd. Here xpix\
    \ is the horizontal coordinate in pixels and ypix the corresponding vertical coordinate\
    \ inside displayarea. Then we copy the updated dd back to d of trace0, which makes\
    \ the new data point visible in the browser window. Finally we increment the current_position\
    \ and check for overflow in which case we remove the first data point with the\
    \ replace() function. Its first argument is the search string that starts with\
    \ an M, ends with an L, and has any number of characters in between that are not\
    \ an L ([^L]*). Then we move the entire trace0 to the left and add new data points\
    \ on the right edge.\n\n```\n<SCRIPT>\n  var ipaddr=location.hostname + \":81\"\
    ;\n  var sample_period=1, current_position=0, Tmin=10, Tmax=40;\n  document.getElementById('ip').innerHTML=ipaddr;\n\
    \  var websocket = new WebSocket('ws://' + ipaddr);\n```"
