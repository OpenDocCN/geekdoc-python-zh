    and then reads data from the sensor. Physically, the communication is based on
    a synchronous serial protocol, where the data line is sampled every time the clock
    line changes from a high level to a low level. The protocol is standardized, and
    we will not go into details, but mention that the I2C devices and also I2C sensors
    have a number of registers internal that can be written to in order to configure
    the sensor, or read from in order to retrieve sensor data. The communication is
