    # 2.2 SIGNAL CONDITIONING


    The analog signals from the sensors can be too high or too low. They can be too
    noisy or otherwise inadequate to directly feed to an analog-to-digital converter
    (ADC) or a microcontroller. In many cases some signal conditioning is needed,
    and we will discuss some common methods in the following sections.


    # 2.2.1 Voltage divider


    In case the input voltage of the sensor exceeds the input range of what the microcontroller
    can handle, we have to reduce the voltage by a *voltage divider*, which consists
    of two fixed-value resistors. A typical example is to reduce the range from 0–5
    V to 0–3.3 V, which is accomplished by a combining two resistors with a ratio
    of $R_1/(R_1 + R_2) = 3.3/5 = 0.66$. A close example is shown in Figure 2.15,
    with a 12 and a 22 kΩ resistor. The ratio is 22/34 = 0.65, which is close to the
    desired ratio. Other combinations with larger and smaller values will work as
    well, as long as the ratio is correct. The sum of both resistors should not be
    too small because that will draw a larger current from the 0–5 V voltage source,
    and, depending on the internal resistance of the source, may affect the measured
    values.


    In order to improve the measurement sensitivity, resistance-based sensors are
    often wired in a Wheatstone-bridge configuration. An example is shown on the right
    of Figure 2.1. Here the voltage divider on the left side of the breadboard provides
    half the supply voltage at its center tap (the lower-signal wire) because the
    two resistors are equal. The voltage divider on the right-hand side is the same
    one, we encountered previously, with the upper-signal wire connected to the point
    between the upper resistor and the LDR. Normally one would choose the resistance
    of the right resistor to be in the middle of the range of interest of the LDR,
    such that voltage-difference between the signal wires is close to zero, indicating
    mid-range. In this way, depending on the light exposure, the voltage difference
    between the wires varies around zero and the sign tells us whether the exposure
    is lower or higher than the expected mid-range value. Since we now deal with voltages
    that vary around zero, it is easier to amplify that voltage in order to increase
    the sensitivity. For example, when using a plain voltmeter, we can use a smaller
    voltage range.'
