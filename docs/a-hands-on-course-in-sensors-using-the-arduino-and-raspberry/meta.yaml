  md: '# Actuators


    Even though sensors are the main topic of this book, sometimes we need to turn
    devices on and off, or we need to move a sensor very accurately, with much higher
    precision than we can achieve by hand. In other cases, the sensor is not at the
    location where we need to measure some quantity. In such situations we need an
    actuator to move it in a controlled way. Here *actuator* is the generic term for
    a device that controls external parameters. Examples are motors, valves, or switches,
    and we start the discussion with the latter.


    # 3.1 SWITCHES


    Turning an electric signal on and off is very easily done by toggling an output
    pin of a microcontroller, as we shall discuss in quite some detail in the next
    chapter. A typical microcontroller can provide rather limited currents on the
    order of a few mA. This is normally sufficient to control a single light-emitting
    diode, an LED, which typically draws less than 20 mA.


    # 3.1.1 Light-emitting diodes and optocouplers


    An LED, shown on the left in Figure 3.1, is similar to a conventional diode and
    consists of a semiconductor with a *pn* junction. If it is forward biased, with
    the *n*-terminal connected to the lower potential, the charge carriers, electrons,
    and holes are pulled into the space-charge


