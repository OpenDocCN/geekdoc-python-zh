  md: 'in Section 4.5.4. We use full-step mode because the step resolution is sufficient,
    and in half-step mode there is a small visible disturbance on the sensor from
    the different currents drawn on alternate steps in half-step mode, where exciting
    one coil and two coils take turns. In the setup() function, we initialize the
    serial communication, declare the mode of the pins used for the motor, and initialize
    the laser power to be 10 (of up to 255). The loop() function is built in much
    the same way as before. It expects to receive single-line commands on the serial
    line. As in Section 4.5.4, the FMOVE command moves the motor by the specified
    number of steps. Then there are commands to set and return the STEPS and the time
    to WAIT or ENABLE the motor driver. The command LDR? reads the sensor value from
    analog pin A0, and the POWER command sets and reads the laser excitation. Finally
    we encounter the command FSCAN nnn where nnn is the scan range retrieved by reading
    the rest of line with the atof() function we used before. Here we assume that
    the scanner actually blocks the laser, and first needs to be retracted before
    collecting data. Inside the case block it first reports to the serial line what
    it is about to do, enables the motor driver, and moves the obstacle out of the
    way. Then comes a for loop, where the motor performs individual steps and within
    each step, takes ten measurements of the LDR on analog pin A0 and adds them up.
    At the end of each step the measurement value is written to the serial line. Once
    the number of steps is complete, the motor driver is disabled. The last command
    implemented is CALIBRATE, which measures the sensor response as a function of
    the laser power. The latter we may later use to convert the raw sensor readings
    to a linear intensity scale should the need arise.


    As a first test of the system, we open the Serial Monitor in the Arduino IDE,
    make sure that the baud rate is set to the one specified in the setup() function,
    9600 baud in our case, and query the LDR by sending LDR? to the UNO. The response
    has the format LDR nnn, where nnn is the raw value from the call to the analogRead()
    function. Then we query the laser power with POWER? and set it to a new value
    with POWER nnn, where nnn is a value between 0 and 255. The brightness of the
    laser spot should change accordingly. Next we move the stepper motor a few steps,
    for example, with FMOVE 20, and move it back to the starting position with FMOVE
    -20. The wagon with the obstacle should move back and forth. As a last point,
    we execute FSCAN 60, which will move the obstacle by 60 steps and then returns
    to the starting position step by step, while reading the sensor and reporting
    the value to the serial line. If all these initial tests complete satisfactorily,
    we progress to automating the process, and for that we chose octave.


    Basically, we hook up the Arduino UNO to the Raspi, write an octave script to
    open a serial line, send commands to the UNO, and receive the response, very similar
    to what we did in previous examples. Before writing the octave script, we need
    to calibrate the motion of the obstacle in order to be able to show the width
    in mm instead of steps. In moving the wagon a large distance, I use 250 full steps,
    and, taking a photo of the setup with a ruler lying next to it before and after
    moving it, is easy to calculate the calibration constant xscale in mm/step. In
    my case, 250 steps moved the wagon by 39.2 mm, which explains the value for xscale
    near the top of the following script.


    ```

    % scanplot2.m, V. Ziemann, 221103

    close all; clear all

    xscale=0.161;  % mm/fullstep

    s=serialport(''/dev/ttyACM0'',9600);  % set device correctly

    pause(3);

    flush(s);      % flush the input queue

    nsteps=60;

    write(s,"FSCAN 60\n");

    pause(5);

    ```'
