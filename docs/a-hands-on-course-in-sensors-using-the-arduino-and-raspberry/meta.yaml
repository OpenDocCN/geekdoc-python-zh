  md: "Since we want to temporarily store integer values, we have to allocate memory\
    \ for the variables, which is done in the line containing `int inp,val;` as it\
    \ declares two integer variables named `inp` and `val`. In the `setup()` function,\
    \ we declare that we want to use the built-in serial (RS-232) hardware port with\
    \ a speed of 9600 baud, which is about 1000 characters per second. The receive\
    \ (RX) and transmit (TX) lines of the serial port are connected to pin 0 and pin\
    \ 1, but also routed to the RS232-USB converter on the UNO board that is connected\
    \ to the host computer. In the `loop()` function, we first check whether some\
    \ communication from the host computer has arrived, and if that is the case, we\
    \ read the character with the `Serial.read();` command, but do nothing further\
    \ with it. In the next line we read the analog pin A0 using the built-in ADC,\
    \ and store the value in the integer variable `val`. The value returned from the\
    \ 10-bit ADC is a number between 0 and 1023 (= 2^10 - 1) and *not* the voltage.\
    \ Later we will show how to convert this value to a voltage. The result of the\
    \ measurement is then sent via the serial line by `Serial.print()` and `Serial.println()`\
    \ commands. The difference between the two is that the former does not send a\
    \ carriage return character at the end of the message, and the latter does. After\
    \ the `if() { }` statement at the end of the loop, again a small delay is added.\
    \ Now we can compile and download the sketch to the Arduino, unless some syntax\
    \ error crept in. If that is the case, we need to check for missing semicolons\
    \ or spelling errors, especially the “camelHump-spelling” and capital letters\
    \ in the middle of the commands. Care is advisable, but the IDE uses syntax highlighting,\
    \ which makes such errors reasonably easy to spot. After all errors are corrected,\
    \ we download the sketch to the hardware.\n\nOnce the sketch is running on the\
    \ Arduino, we want to test it, and for that we need to have access to the other\
    \ end of the serial communication channel on the host computer. The easiest way\
    \ is to open the “Serial Monitor” by pressing the icon that looks like a looking\
    \ glass at the top right in the Arduino IDE. Clicking on it opens a simple terminal\
    \ program that has an input text box at the top. After ensuring that the baud\
    \ rate in the text box agrees with the one specified in the sketch, we enter any\
    \ character and press “Enter.” If all is well, the Arduino should report with\
    \ a line `Value is nnnn` in the text box below the entry box. Now turn the potentiometer\
    \ and enter a character followed by “Enter,” and see how the returned value changes.\n\
    \nSo far, so good, but would it not be nice if we could read out more analog ports\
    \ and even ask for which ones to read. This task is addressed in the following\
    \ sketch. It is rather similar to the previous one, so we only discuss the new\
    \ features.\n\n```\ncpp\n// Analog and Serial communication, v2, V. Ziemann, 161130\n\
    int inp,val;\nvoid setup() {\n  Serial.begin(9600);  // baud rate\n}\nvoid loop()\
    \ {\n  if (Serial.available()) {\n    inp=Serial.read();       // read serial\
    \ line\n    if (inp=='s') {\n      val=analogRead(0);     // read analog\n   \
    \   Serial.print(\"A0= \");  // and report back\n      Serial.println(val);\n\
    \    } else if (inp=='t') {\n      val=analogRead(1);\n      Serial.print(\"A1=\
    \ \"); Serial.println(val);\n    } else {\n      Serial.println(\"unknown command\"\
    );\n    }\n  }\n}\n```"
