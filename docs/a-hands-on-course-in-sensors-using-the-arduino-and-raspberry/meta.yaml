    \ loop() {\n  if (Serial.available()) {\n    char line[30];\n    Serial.readStringUntil('\\\
    n').toCharArray(line,30);\n    if (strstr(line,\"FREQ \")) {\n      freq=atof(&line[5]);\n\
    \      set_frequency(freq);\n    } else if (strstr(line,\"FREQ?\")) {\n      Serial.print(\"\
