    \ this way, they can be seamlessly included in logging, monitoring, or other display\
    \ programs that EPICS provides. Adding more sensors is as simple as adding protocol\
    \ and database files as well as including them in the Makefile in the Db directory,\
    \ and adding two lines in the st.cmd program.\n\nWith its on-board USB connector\
    \ and many input-output pins, the NodeMCU is a very convenient development platform,\
    \ but in this example, we only use two pins for I2C and, once the NodeMCU is up\
    \ and running, we no longer need the USB interface or the serial line. All communication\
    \ can be done via the WLAN interface. It is therefore prudent to migrate the project\
    \ to the ESP-01, which is also less expensive, an attractive feature if we plan\
    \ to deploy multiple weathernodes. On the other hand, the absence of a USB interface\
    \ makes programming the ESP-01 a bit more tricky. We can, however, directly connect\
    \ the ESP-01 with its eight exposed pins to an USB-to-serial converter, often\
    \ they are referred to as FTDI converters, named after the company that initially\
    \ offered them. We need to ensure, however, that VCC from the converter is 3.3\
    \ V rather than the more common 5 V. If that is not the case, a voltage regulator,\
