    \ echo command to pipe the string ALL? to the netcat program that we had earlier\
    \ used to directly communicate with network sockets."
  - "[PAGE 204]\n\nThe following shell script uses this construction with `echo` and\
    \ `netcat` to store the colon-separated string into the shell variable TEMP that\
    \ is used to feed the measurement values into the rrdtool database.\n\n```\n#!/bin/bash\n\
    # fill_weather_db.sh\nDB=/home/pi/rrdtool/weather.rrd\nTEMP=$(echo \"ALL?\" |\
    \ netcat -C 192.168.20.56 1137)\n/usr/bin/rrdtool update $DB N:$TEMP\n```\n\n\
    After saving the script we need to make it executable with the command `chmod\
    \ +x fill_weather_db.sh`. But before we start to fill the database with the `rrdtool\
    \ update` command, we must create it, where we assume the following command is\
    \ executed in the `/home/pi/rrdtool` directory.\n\n```\nrrdtool create weather.rrd\
    \ --step 60 \\n    DS:T:GAUGE:180:-20:100 \\n    DS:P:GAUGE:180:900:1100 \\n \
    \   DS:H:GAUGE:180:0:100 \\n    DS:VOC:GAUGE:180:0:1000 \\n    RRA:AVERAGE:0.5:1:2880\
    \ \\n    RRA:AVERAGE:0.5:10:2880 \\n    RRA:AVERAGE:0.5:60:2880\n```\n\nIt creates\
    \ the `weather.rrd` database file that expects values once every 60 seconds, and\
    \ contains four measurement columns (DS) for the temperature, pressure, humidity,\
    \ and air quality. Then it defines the archive (RRA), which is filled by single\
    \ averages for 2880 samples, which amounts to 2 days. The next two lines define\
