    reply 中，在关闭数据库之前打印回复。请注意其结构：首先执行 MariaDB 命令，然后使用 fetchall() 函数检索回复。然而，回复是以一种不熟悉的格式呈现的条目列表。可以使用被哈希符号
    (#) 注释掉的行，将每个测量条目显示在单独的行上。代码遍历列表中的每个条目，在第一个注释示例中，print 命令一次显示一个条目。在第二个示例中，print
