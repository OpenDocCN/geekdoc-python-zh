    \ wait after setting a new frequency and before starting to measure. Registers\
    \ 0x82 to 0x84 receive an integer number, related to MCLK, that determines the\
    \ output frequency according to an equation found in the datasheet. First the\
    \ most-significant byte is written to 0x82, then the next byte to 0x83 and the\
    \ least-significant byte to 0x84. In the next step the frequency increment finc\
    \ is converted to an integer number that is likewise loaded to registers 0x85\
    \ to 0x87. Last, npts is written, one byte at a time, to 0x88 and 0x89. When leaving\
