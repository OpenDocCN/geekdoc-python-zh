    In case we use a piezo-based sensor, the generated voltages can be much higher
    than is acceptable in the following circuit such as a microcontroller. In such
    a situation, *clamping diodes*, as shown on the right of Figure 2.15, are used.
    If the input voltage is between 0 and 5 V, the diodes are blocking, and the signal
    is passed on to the microcontroller. If, on the other hand, the input voltage
    exceeds 5 V plus the forward voltage drop, the diode starts conducting and shorts
    the input to the upper power rail of 5 V. If the input voltage is below 0 V, the
    lower diode starts conducting and shorts the input to ground. In either case,
    the voltage delivered to the microcontroller is limited to 0-5 V plus or minus
    the forward diode voltage drop. Many integrated circuits including microcontrollers
    have built-in clamping diodes. The Raspberry Pi, however, is a notable exception.


    # 2.2.2 Amplifiers


    Very small electrical signals usually need to be amplified to reach levels adequate
    for further processing. The standard device to achieve this is an *operational
    amplifier* or op-amp, shown on the left of Figure 2.16. There are two input ports
    on the left, one labeled “plus,” one labeled “minus,” and one output port. The
    latter delivers a voltage that depends on the difference between the two input
    ports. In an ideal op-amp, the amplification factor is infinite and we usually
    use some feedback mechanism to obtain a deterministic behavior, as discussed below.
    Normally, op-amps require both positive and negative supply voltage, even though
    sometimes it is possible to tie the negative supply rail to ground, in which case
    only unipolar signals can be amplified.


    Before discussing different circuits, we need to describe three basic principles
    that characterize op-amps.


    +   - The input impedance of the input ports is “infinite,” which means that no
    current flows into the op-amp and it will not load the upstream circuitry.

    - The op-amp tries to reduce the difference between the input ports $V_+ - V_-$
    to zero.

    - The amplification without feedback is quasi-infinite, and the output has a very
    low impedance and can provide high output currents.


    These simple rules will help us to design and understand the following circuits,
    but consult for example [17–19] for a more extensive discussion.


    We start by considering a *line buffer*, which is typically used as an impedance
    converter to transform the output of a sensor with a high impedance to a low-impedance
    signal that'
