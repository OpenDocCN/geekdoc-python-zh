    \ the different index-XX.html pages are constant. We need to point out that the\
    \ reported temperature is affected by the little heater for the MQ-x sensor inside\
    \ the BME680 and the reported value is therefore too high by about four degrees.\
    \ Moreover, I caused the small spikes in the humidity and corresponding dips in\
    \ air quality graphs by exhaling on the sensor.\n\nHaving the weather data displayed\
    \ for different time ranges is certainly adequate for home use, but in a laboratory\
    \ we want to integrate the data from the sensor nodes into the control system.\
    \ If we already have the EPICS system running, all we have to do is to prepare\
    \ the protocol and database files for our weather data. The former, written in\
    \ a more compact way, is the following.\n\n```\n# ./tempApp/Db/weather.proto\n\
    Terminator = CR LF;\nget_T {out \"T?\"; in \"T %f\"; ExtraInput = Ignore; }\n\
    get_P {out \"P?\"; in \"P %f\"; ExtraInput = Ignore; }\nget_H {out \"H?\"; in\
    \ \"H %f\"; ExtraInput = Ignore; }\nget_VOC {out \"VOC?\"; in \"VOC %f\"; ExtraInput\
    \ = Ignore; }\n```\n\nIt follows the already-known pattern of sending a query\
    \ with a question mark appended, and then receives the query, followed by the\
    \ measurement value. To accompany this file, which orchestrates the low-level\
    \ communication, we need a data base file, named weather.db, with the following\
    \ contents.\n\n```\n# ./tempApp/Db/weather.db\nrecord(ai, \"$(USER):T\") {\n \
    \   field(DESC, \"Temperature\")\n    field(SCAN, \"10 second\")\n    field(DTYP,\
    \ \"stream\")\n    field(INP, \"@weather.proto get_T $(PORT)\")\n}\nrecord(ai,\
    \ \"$(USER):P\") {\n    field(DESC, \"Pressure\")\n    field(SCAN, \"10 second\"\
    )\n    field(DTYP, \"stream\")\n    field(INP, \"@weather.proto get_P $(PORT)\"\
    )\n}\nrecord(ai, \"$(USER):H\") {\n    field(DESC, \"Humidity\")\n    field(SCAN,\
    \ \"10 second\")\n    field(DTYP, \"stream\")\n    field(INP, \"@weather.proto\
    \ get_H $(PORT)\")\n}\n```"
