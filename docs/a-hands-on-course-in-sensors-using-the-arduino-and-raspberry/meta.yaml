    # 18.4 GOOD ENGLISH


    There are a number of style guides for the English language available, from the
    classic *Elements of Style* [35], the MLA handbook [36], S. Pinker’s *Sense of
    Style*, [37] to S. King’s *On Writing* [38]. Apart from these more general guides,
    several scientific journals such as *Nature* [39] or *Reviews of Modern Physics*
    [40] make style guides available for their authors. In particular, the latter
    style guide is very readable, and its Appendix A on “Writing a better scientific
    article,” is highly recommended. In this section I highlight some of the topics
    in more detail.


    +   - In one of the style guides [39] we find the sentence “Nature journals prefer
    authors to write in the active voice. . . .” The *active voice* usually makes
    the presentation clearer, more vigorous, and often more concise. Experiments are
    not done by themselves, but we, the experimenters, perform them. Moreover, often
    the subject matter is already difficult to understand, so we should make the presentation
    as clear as possible without obfuscating who does what. Science does not become
    more objective just because the person who did the experiment hides behind the
    passive voice.

    - Authors should strive for *economy* in their presentation and avoid unnecessarily
    complicated constructions such as “owing to the fact that,” which we can usually
    replace with “because.” Often replacing passive constructions with active ones
    helps to disentangle complex sentences.

    - Avoid overloading the reader with sentences containing a large number of subclauses
    to explain every conceivable exception in one sentence. At the end of the sentence,
    the reader may have forgotten the beginning and what the subject of the sentence
    is.'
