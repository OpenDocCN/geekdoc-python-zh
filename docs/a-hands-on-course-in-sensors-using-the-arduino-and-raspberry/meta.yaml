    \ to output pin PB. In the same fashion, we set the remaining two output pins,\
    \ PC and PD, to the entry in `patA` that is shifted by one or three time slots,\
    \ respectively. Finally, we wait a short time, given by the variable `settle_time`.\
    \ This function implements a single step; in order to move a larger number of\
