    # 4.5.2 DC motors


    If we only want to control the speed of a very small motor, we can replace the
    LED and the 220 Ω resistor in the previous example by the motor. We also need
    to add flyback diodes to prevent the back-emf from damaging the transistor. For
    slightly larger motors, we need to use a transistor with a higher power rating,
    such as a TIP-120 Darlington power transistor. The TIP-120 has a flyback diode
    from emitter to collector already built in. Note that the performance of larger
    transistors normally degrades at higher frequency. Inspection of the datasheet,
    however, shows that this only affects frequencies well above 10 kHz.


    In Figure 4.14 we show the setup with a UNO controlling a small motor. The terminals
    of the transistor are base, collector, and emitter, from left to right, and the
    motor is connected between the collector and the supply voltage. The emitter is
    directly connected to ground, and we include an external flyback diode (horizontally
    mounted) between the motor leads, with the cathode pointing towards the right.
    The vertically mounted diode illustrates the connection of the built-in diode.
    We control the speed of the motor by pulse width modulating the base of the transistor
    that is connected to pin D9 on the UNO via a 1 kΩ resistor.


    Controlling the speed is useful, but often we also need to control the direction
    of rotation; for example, to drive a vehicle not only forward but also backward.
    The standard way to accomplish this feature is by using an H bridge, as discussed
    in Chapter 3. Here we use an L293D H bridge driver, which is called a *quadruple
    half-bridge driver*, a term that becomes clear by considering the pin layout of
    the 16-pin chip, shown in Figure 4.15. There are ground pins and two supply voltages,
    one for logic levels and one to supply power to the motor. Then there are four
    (quadruple) inputs with corresponding outputs. The circuit works in such a way
    as to translate the logic level on the input pins to the corresponding output
    pins, which in turn deliver the voltage level from the motor power supply to the
    motor. Thus, setting input 1 to HIGH and input 2 to LOW connects one motor lead
    to the motor supply voltage and the other to ground, which causes the motor to
    turn in one direction. Setting input 1 to LOW and input 2 to HIGH will cause the
    converse, and the motor will turn in the other direction. Two inputs and outputs
    therefore provide the functionality of a single H bridge. Since there are four
    inputs and outputs, we can use the L293D to implement two H'
