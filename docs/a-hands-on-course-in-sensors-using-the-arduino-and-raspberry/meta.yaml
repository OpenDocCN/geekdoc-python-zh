  - '[PAGE 147]


    The file must be made readable for the owner only by executing `sudo chmod 600
    /etc/hostapd/hostapd.conf`. It specifies the country in which we live – this is
    needed to determine the permissible WLAN frequencies, which differ from country
    to country – and other definitions, such as the name of the network, the details
    of the encryption, and the passphrase. Here we choose a secret phrase to prevent
    others from misusing your wireless network. Moreover, we need to ensure that `hostapd`
    finds its configuration file by verifying the line


    ```

    DAEMON_CONF=/etc/hostapd/hostapd.conf

    ```


    appears near the top of the file `/etc/init.d/hostapd`. Add it unless it is already
    there. Then we instruct the system to start the `hostapd` daemon at boot time
    with the command


    ```

    sudo systemctl unmask hostapd

    sudo systemctl enable hostapd

    ```


    After rebooting the system, we should be able to see a new WLAN named `messnetz`
    from a computer with a wireless network interface, but before we can connect to
    it we need to start the `dnsmasq` daemon that provides DHCP services on the 192.168.20.xx
    network and distributes IP numbers. The configuration file is called `/etc/dnsmasq.conf`
    and it should contain the following lines:


    ```

    domain-needed

    interface=wlan0

    dhcp-range=192.168.20.100,192.168.20.200,12h

    listen-address=192.168.20.1

    ```


    We save the originally installed version under a new name because it contains
    explanations of all parameters and is useful as a reference. For our system, however,
    we only need those in the above example, and they are almost self-explanatory.
    Finally, we register the `dnsmasq` daemon to start at boot time with the commands


    ```

    sudo systemctl unmask dnsmasq

    sudo systemctl enable dnsmasq

    ```


    and reboot the Raspi to ensure that all parts of the system are synchronized.

    In order to figure out which computers are connected to our WLAN `messnetz` and
    which services they offer on open ports, we install the program `nmap` with `sudo
    apt-get install nmap`. The following call


    ```

    nmap -sn 192.168.20.1/24

    ```


    lists the IP numbers of all computers connected to `messnetz`. The option `-sn`
    specifies the type of scan and `192.168.20.1/24` the range of IP numbers to probe,
    where `/24` is a shorthand notation for the netmask 255.255.255.0. This implies
    that all IP numbers of the form 192.168.20.nn are probed. If a device with, for
    example, 192.168.20.56 appears, the command


    ```

    nmap 192.168.20.56

    ```


    lists its open ports. This is a convenient way to ensure that a server started
    on the device is actually operational. Explore the many options of `nmap` with
    `man nmap`.

    At this point we have turned the Raspi into a WLAN access point that spans the
    `messnetz` WLAN. If the IP forwarding is enabled, we can even surf the web from
    any computer on `messnetz`. But we are mostly interested in communicating with
    sensor nodes that are connected to `messnetz` and will discuss how to use the
    Raspi as the spider in the center of a network of sensor nodes connected by serial
    or WLAN links.'
  - '[PAGE 148]


    # 5.5 COMMUNICATION WITH THE ARDUINO


    After the basic network infrastructure is set up, we connect the Arduino to the
    Raspi. Most programs on the Raspi work in a similar way as on desktop computers,
    which is no surprise, because a modern Raspi is about as powerful as a desktop
    computer from about a decade ago. We start by communicating via the Arduino IDE
    first, but later we will also use the Python programming language and octave.


    # 5.5.1 Arduino IDE


    We can install the Arduino IDE on the Raspi with `sudo apt-get install arduino`,
    but the version 1.8.13 in the repositories is moderately old. We can install a
    more recent version from https://www.arduino.cc. To do so, we open a browser on
    the Raspi, direct it to the Arduino download website, choose the *Linux ARM 32
    bit* version, and download directly to the Raspi''s download directory `/home/pi/Downloads/`.
    At the time of writing the most recent version was 1.8.19. We suggest to use the
    legacy version until the newer IDE version 2 supports all features such as data
    upload that we later need.


    If we chose to use the most recent version, we install it, as is customary, under
    the `/usr/local` tree by executing the following commands:


    ```

    cd /usr/local

    sudo tar xvJf /home/pi/Downloads/arduino-1.8.19-linuxarm.tar.xz

    cd /usr/local/bin

    sudo ln -s /usr/local/arduino-1.8.19/arduino arduino19

    ```


    where the `tar` command unpacks the downloaded archive into the subdirectory named
    `/usr/local/arduino-1.8.19/`, and the `ln -s` creates a so-called soft link with
    the alias `arduino19` for the `arduino` executable in the `/usr/local/bin/` directory.
    In this way it is automatically found when typing `arduino19` at the command line
    in a terminal window. Optionally, we can create a link in the *Programming* menu
    by starting the *Main Menu Editor* in the *Preference* section behind the *Menu*
    button with the image of a raspberry. In the left panel of the *Main Menu Editor*
    we select *Programming*, and then click on *New Item* on the right-side panel.
    In the opening window, we enter the name of the new program, *Arduino*, and browse
    to the `arduino19` executable in `/usr/local/bin` directory. Once these steps
    are completed, there is an *Arduino* entry in the *Programming* section of the
    main menu. Selecting it opens the Arduino IDE on the Raspi, and we could start
    programming the Arduino directly from the Raspi.


    Instead of retyping all the programs for the Arduino on the Raspi, we copy the
    files from our desktop computer to the Raspi with `scp`, which is part of the
    secure-shell program suite if it is a Unix-based system such as Linux or Mac.
    On a Windows system we use *WinSCP*. On a Linux Desktop computer we execute


    ```

    scp -r Arduino pi@192.168.10.nn:

    ```


    which copies the Arduino subdirectory and everything in it to the Raspi, including
    all hardware descriptions from the `Arduino/hardware` directory. Now we need to
    restart the Arduino IDE, and all our previously prepared sketches are available
    under the *File*→*Sketchbook* menu in the Arduino IDE on the Raspi. Before starting
    to compile our examples we add support for ESP8266 and ESP32-based microcontrollers
    by following the steps outlined at the end of Section 4.2 on page 60. On the Raspi,
    the procedure is just the same. Now we are ready to connect an Arduino UNO or
    NodeMCU to a USB port on the Raspi and program them directly from the Raspi.'
