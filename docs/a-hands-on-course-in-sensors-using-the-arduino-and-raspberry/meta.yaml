  md: '# Example: Monitor for the Color of Water


    In this example, we determine the color of water, or more accurately stated, the
    absorption of material dissolved in water. An example is algae, which often proliferate
    during the summer and turn the water green because algae predominantly absorb
    the complementary color, which is red. In our experiment, we investigate the absorption
    of light with different colors by turning a three-color LED on and off, and observe
    the resulting modulation of the signal recorded by a phototransistor. If red light
    is absorbed, the resulting modulation depth of red is reduced, likewise for the
    other colors. By comparing the situation with LED on versus off, the system removes
    some of the influence of ambient background light, at least to some extent. On
    the left in Figure 11.1, we illustrate the absorption measurement with the RGB-LED
    on the left and the phototransistor on the right, with the absorbing material
    in between. We note that we can also use such a system to determine variations
    in the reflection from a surface, as is shown on the right in Figure 11.1.


    We construct the setup shown in Figure 11.1, using an Arduino UNO, and an RGB-LED,
    which houses a red, a green, and a blue LED in the same housing with a single
    connector for a common cathode or anode. In our case we use one with a common
    anode that is connected to the positive supply voltage. The respective color lights
    up if the controlling pin on the UNO is LOW. The phototransistor is an SFH3310,
    but any other model, sensitive in the visual spectral range, should work. The
    very simple setup is shown in Figure 11.2.


    ![](img/8f23875c54d5b3177d5d2a5bba06b37e_219_0.png)'
