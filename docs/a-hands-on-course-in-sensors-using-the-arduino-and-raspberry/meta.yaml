    \nThe function AD5933_sweep() performs the frequency sweep by following the sequence\
    \ laid out in the datasheet and as long as the sweep is not completed. It checks\
    \ the status bit whether a measurement is done, at which point the registers with\
    \ the values for I and Q are read out and either written to the serial line or\
    \ copied to the arrays IVAL[] and Qval[] before incrementing the frequency. Note\
    \ that Itmp, Qtmp, Ival[] and Qval[] must be specified as int16_t in order to\
    \ treat the sign bit correctly.\n\nInside AD5933.h we use the functions I2Cwrite()\
    \ and I2Cread() from I2Crw.h on page 74 in Section 4.4.3. Both I2Crw.h and AD5933.h\
    \ must reside in the same subdirectory as the sketch shown below. The setup()\
    \ function only initializes serial and I2C communication. The loop() function\
    \ follows the well-proven scheme of reacting to commands received via the serial\
    \ line. The command SWEEP starts a sweep with the current parameters whereas OUTON\
    \ produces a constant-frequency output and OUTOFF turns it off. All parameters\
    \ can be changed with the commands FREQ, FINC, NPTS, MODE, and PGA, followed by\
    \ a numerical value. Finally, STATE? returns the values of the current parameters.\n\
    \n```\n// AD5933Serial, V. Ziemann, 221118\n#include <Wire.h>\n#include \"I2Crw.h\"\
    \n#include \"AD5933.h\"\nvoid setup() {\n  Serial.begin(115200); delay(1000);\n\
    \  Wire.begin();\n}\nvoid loop() {\n  char line[30];\n  if (Serial.available())\
    \ {\n    Serial.readStringUntil('\\n').toCharArray(line,30);\n    if (strstr(line,\"\
    SWEEP\")) {\n      AD5933_sweep(freq,finc,npts,mode,pga);\n```"
