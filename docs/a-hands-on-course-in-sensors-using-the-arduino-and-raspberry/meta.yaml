- md: "## 4.6 COMMUNICATION TO HOST\n\nSo far, we used only the serial monitor in\
    \ the Arduino IDE to communicate with the Arduino, but normally we also want to\
    \ communicate from other programs, and that is the topic of this section.\n\n\
    ### 4.6.1 RS-232 and USB\n\nThe serial monitor in the Arduino IDE uses an RS-232\
    \ protocol that is transported over a USB line. The translation happens automatically,\
    \ and plugging the USB cable into the host computer causes the latter to automatically\
    \ create a device file (`/dev/ttyUSBx` or `/dev/ttyACMx` on Linux, `COMx` on Windows,\
    \ and `/dev/tty.usbserial-xxx` on a Mac) that represents the other end of the\
    \ communication channel from the UNO to the host computer. We can then use any\
    \ terminal program on the host computer to connect to that device file, but have\
    \ to keep in mind to use the same baud rate that we specify in the `setup()` function\
    \ on the Arduino. To find out the device file to which the Arduino is connected,\
    \ we can use the Arduino IDE and inspect the Tools→Port menu, and write the name\
    \ of the device file down. In my case it was `/dev/ttyACM0`. After we close the\
    \ Arduino IDE, we can use any terminal-emulator program, such as putty on Windows,\
    \ or the very basic program screen on Linux or Mac, to connect to the UNO. In\
    \ my case the command\n\n```\nscreen /dev/ttyACM0 9600\n```\n\ndoes the trick,\
    \ and we can send commands to the Arduino and receive the response in the terminal\
    \ window. The `screen` program can be exited by pressing `Ctrl-a-k` and confirming\
    \ the question of whether one really wants to exit with `y`. The number 9600 is\
    \ the baud rate used for the communication and must match the number in the `Serial.begin()`\
    \ statement in the Arduino sketch. Note that 9600 is the default baud rate and\
    \ could be omitted in the `screen` command.\n\n### 4.6.2 Bluetooth\n\nBluetooth\
    \ functionality can be added by attaching an HC-06 Bluetooth dongle to ground,\
    \ power, and the Arduino pins 0 and 1. On the right-hand side in Figure 4.26 we\
    \ see four exposed pins labeled RXD, TXD, GND, and VCC. The latter two are connected\
    \ to the respective power supply connections, and RXD on the HC-06 is connected\
    \ to pin 1, labeled TX on the Arduino, which is illustrated on the left-hand side\
    \ in Figure 4.26. On this connection the information flows from the Arduino to\
    \ the HC-06. The pin labeled TXD on the HC-06 must be connected to pin 0, labeled\
    \ RX on the Arduino, and the information flows from the HC-06 to the Arduino on\
    \ this line. This crossed connection from TXD to RX and vice-versa is equivalent\
    \ to a null-modem cable. After connecting the HC-06 in this way, all communication\
    \ is sent via the HC-06 and the USB connection in parallel. For reliable operation,\
    \ the USB link should not be used while Bluetooth is in operation.\n\nOn the host\
    \ computer, we have to *pair* a new Bluetooth device with the host computer. On\
    \ Windows, this is done in the Bluetooth administration program. On some Linuxes,\
    \ similar user interfaces exist, but we can always pair Bluetooth devices using\
    \ a number of command-line programs. First we need to find out whether the host\
    \ computer has Bluetooth capabilities, by the command `hcitool dev`, which should\
    \ report at least one device, normally called `hci0`. Then we scan the surroundings\
    \ for Bluetooth devices with the command `hcitool scan`. If the HC-06 is powered\
    \ we should see at least one device with a line `xx:xx:xx:xx:xx:xx HC-06` where\
    \ the six-byte string is the MAC address of the Bluetooth device. To establish\
    \ pairing, we need to use `sudo` and call the `sudo bluetoothctl`. At the `[bluetooth]#`\
    \ prompt we initiate a search for new devices with `scan on`, which reports all\
    \ known devices. The following two commands establish the pairing\n\n```\ntrust\
    \ xx:xx:xx:xx:xx:xx\npair xx:xx:xx:xx:xx:xx\n```\n\nwhere `xx:xx:xx:xx:xx:xx`\
    \ is the MAC address of the HC-06 dongle we want to pair. During the previous\
    \ actions we are prompted for a PIN number, and unless we have changed the default\
    \ on the HC-06, we use 1234. Then we exit the `bluetoothctl` program and create\
    \ the device file for the serial communication by issuing\n\n```\nsudo rfcomm\
    \ bind 0 xx:xx:xx:xx:xx:xx\n```\n\nwhich creates a device file `/dev/rfcomm0`\
    \ that has the same functionality as the `/dev/ttyACM0` device file we used earlier\
    \ to communicate with the Arduino. Therefore we can again use the `screen` command\
    \ to communicate with the Arduino, but using `/dev/rfcomm0` as first argument\
    \ to the `screen` command instead. Note that the HC-06 is configured to communicate\
    \ with 9600 baud. This can be changed using AT commands, but we will not discuss\
    \ this further, and assume that all Bluetooth communication using the HC-06 is\
    \ done at 9600 baud. Once we are done using the Bluetooth serial link, we should\
    \ take it down by issuing the command `rfcomm release 0`, which will remove the\
    \ `/dev/rfcomm0` device file, and we will no longer be able to use it. The bottom\
    \ line is that we can communicate using Bluetooth in much the same way as using\
    \ native RS-232 or USB. We only need to pair the device and the host computer\
    \ once, and then create the device file using the `sudo rfcomm bind` command before\
    \ using the serial line, and delete it with the `sudo rfcomm release` command\
    \ once we are finished.\n\nThe ESP32 has bluetooth already built in and we use\
    \ it by including support for the BluetoothSerial library, declare `SerialBT`\
    \ device and use it henceforth in the same way as the `Serial` device to communicate.\
    \ Note that we give the device the name ESP32BT to identify itself. The `loop()`\
    \ function follows the query-response scheme, but uses `SerialBT` instead of `Serial`.\
    \ Here is a boiled-down version of a sketch that reads the analog voltage from\
    \ pin 33 of a ESP32.\n\n```\n// SerialBT, V. Ziemann, 221101\n#include <BluetoothSerial.h>\n\
    BluetoothSerial SerialBT;\nvoid setup() {SerialBT.begin(\"ESP32BT\");}\nvoid loop()\
    \ {\n  if (SerialBT.available()) {\n    char line[30];\n    SerialBT.readStringUntil('\\\
    n').toCharArray(line,30);\n    if (strstr(line,\"A0?\")) {\n      int val=analogRead(33);\n\
    \      SerialBT.print(\"A0 \"); SerialBT.println(3.3*val/4095);\n    }\n  }\n\
    }\n```\n\nOnce this sketch is compiled and downloaded to the ESP32, calling `hcitool\
    \ scan` will show a device ESP32BT and its MAC address. The setup with trusting\
    \ and pairing on the Raspi works in the same way as for the HC-06 dongle. When\
    \ asked to confirm some pin, you can just accept it.\n\nApart from the channels\
    \ based on serial communication, some microcontrollers, such as the ESP8266 or\
    \ ESP32, offer WLAN-based communication using network sockets. We will discuss\
    \ this nifty feature in the next section."
  mdcn: "## 4.6 与主机通信\n\n到目前为止，我们只使用了Arduino IDE中的串口监视器与Arduino进行通信，但通常我们也希望从其他程序进行通信，这正是本节的主题。\n\
    \n### 4.6.1 RS-232与USB\n\nArduino IDE中的串口监视器使用的是通过USB线路传输的RS-232协议。这种转换是自动完成的，将USB线缆插入主机计算机会导致后者自动创建一个设备文件（在Linux上为`/dev/ttyUSBx`或`/dev/ttyACMx`，在Windows上为`COMx`，在Mac上为`/dev/tty.usbserial-xxx`），该文件代表了从UNO到主机计算机的通信通道的另一端。然后，我们可以使用主机计算机上的任何终端程序连接到该设备文件，但必须记住使用与我们在Arduino的`setup()`函数中指定的相同的波特率。要找出Arduino连接到的设备文件，我们可以使用Arduino\
    \ IDE并检查工具→端口菜单，然后记下设备文件的名称。在我的情况下，它是`/dev/ttyACM0`。关闭Arduino IDE后，我们可以使用任何终端仿真程序，例如Windows上的putty，或Linux或Mac上非常基础的screen程序，来连接到UNO。在我的情况下，命令\n\
    \n```\nscreen /dev/ttyACM0 9600\n```\n\n就能完成此操作，我们可以在终端窗口中向Arduino发送命令并接收响应。可以通过按`Ctrl-a-k`并确认是否真的要退出的问题（输入`y`）来退出`screen`程序。数字9600是用于通信的波特率，必须与Arduino草图中`Serial.begin()`语句中的数字匹配。请注意，9600是默认波特率，在`screen`命令中可以省略。\n\
    \n### 4.6.2 蓝牙\n\n可以通过将HC-06蓝牙适配器连接到地线、电源和Arduino的引脚0和1来添加蓝牙功能。在图4.26的右侧，我们看到四个暴露的引脚，分别标记为RXD、TXD、GND和VCC。后两个连接到相应的电源连接，HC-06上的RXD连接到Arduino上标记为TX的引脚1，如图4.26左侧所示。在此连接上，信息从Arduino流向HC-06。HC-06上标记为TXD的引脚必须连接到Arduino上标记为RX的引脚0，信息在此线上从HC-06流向Arduino。这种从TXD到RX以及反向的交叉连接相当于一条零调制解调器电缆。以这种方式连接HC-06后，所有通信都通过HC-06和USB连接并行发送。为了可靠运行，在蓝牙运行时不应使用USB链路。\n\
    \n在主机计算机上，我们必须将新的蓝牙设备与主机计算机*配对*。在Windows上，这是在蓝牙管理程序中完成的。在某些Linux系统上，存在类似的用户界面，但我们始终可以使用一些命令行程序来配对蓝牙设备。首先，我们需要通过命令`hcitool\
    \ dev`来确定主机计算机是否具有蓝牙功能，该命令应报告至少一个设备，通常称为`hci0`。然后，我们使用命令`hcitool scan`扫描周围的蓝牙设备。如果HC-06已通电，我们应该看到至少一个设备，其行显示为`xx:xx:xx:xx:xx:xx\
    \ HC-06`，其中六字节字符串是蓝牙设备的MAC地址。要建立配对，我们需要使用`sudo`并调用`sudo bluetoothctl`。在`[bluetooth]#`提示符下，我们使用`scan\
    \ on`启动对新设备的搜索，该命令会报告所有已知设备。以下两个命令建立配对\n\n```\ntrust xx:xx:xx:xx:xx:xx\npair xx:xx:xx:xx:xx:xx\n\
    ```\n\n其中`xx:xx:xx:xx:xx:xx`是我们想要配对的HC-06适配器的MAC地址。在之前的操作过程中，系统会提示我们输入PIN码，除非我们更改了HC-06上的默认值，否则我们使用1234。然后我们退出`bluetoothctl`程序，并通过发出以下命令创建用于串口通信的设备文件\n\
    \n```\nsudo rfcomm bind 0 xx:xx:xx:xx:xx:xx\n```\n\n该命令创建一个设备文件`/dev/rfcomm0`，其功能与我们之前用于与Arduino通信的`/dev/ttyACM0`设备文件相同。因此，我们可以再次使用`screen`命令与Arduino通信，但这次使用`/dev/rfcomm0`作为`screen`命令的第一个参数。请注意，HC-06被配置为以9600波特率进行通信。这可以使用AT命令进行更改，但我们不会进一步讨论，并假设所有使用HC-06的蓝牙通信都以9600波特率进行。一旦我们完成使用蓝牙串行链路，我们应该通过发出命令`rfcomm\
    \ release 0`来关闭它，这将删除`/dev/rfcomm0`设备文件，我们将无法再使用它。关键在于，我们可以使用蓝牙进行通信，其方式与使用原生RS-232或USB非常相似。我们只需要将设备与主机计算机配对一次，然后在使用串行线路之前使用`sudo\
    \ rfcomm bind`命令创建设备文件，并在完成后使用`sudo rfcomm release`命令删除它。\n\nESP32已经内置了蓝牙，我们通过包含对BluetoothSerial库的支持来使用它，声明`SerialBT`设备，并从此以与`Serial`设备相同的方式使用它进行通信。请注意，我们给设备命名为ESP32BT以标识自身。`loop()`函数遵循查询-响应方案，但使用`SerialBT`而不是`Serial`。这是一个精简版的草图，用于读取ESP32引脚33的模拟电压。\n\
    \n```\n// SerialBT, V. Ziemann, 221101\n#include <BluetoothSerial.h>\nBluetoothSerial\
    \ SerialBT;\nvoid setup() {SerialBT.begin(\"ESP32BT\");}\nvoid loop() {\n  if\
    \ (SerialBT.available()) {\n    char line[30];\n    SerialBT.readStringUntil('\\\
    n').toCharArray(line,30);\n    if (strstr(line,\"A0?\")) {\n      int val=analogRead(33);\n\
    \      SerialBT.print(\"A0 \"); SerialBT.println(3.3*val/4095);\n    }\n  }\n\
    }\n```\n\n一旦这个草图被编译并下载到ESP32，调用`hcitool scan`将显示一个名为ESP32BT的设备及其MAC地址。在Raspi上进行信任和配对的设置与HC-06适配器的工作方式相同。当被要求确认某个PIN码时，您可以直接接受它。\n\
    \n除了基于串行通信的通道外，一些微控制器，如ESP8266或ESP32，还提供基于WLAN的通信，使用网络套接字。我们将在下一节讨论这个巧妙的功能。"
