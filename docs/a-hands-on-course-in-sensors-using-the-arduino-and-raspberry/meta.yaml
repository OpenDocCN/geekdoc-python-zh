  - "[PAGE 241]\n\nIn the loop() function we first let the web server and the websocket\
    \ interface handle their events and then check whether the info_available flag\
    \ is set, in which case we send the JSON-formatted message that is stored in the\
    \ info_buffer to the browser. Likewise, if output_ready is set, we first clear\
    \ and then assemble a DynamicJsonDocument named doc. We call it ADC and add the\
    \ measurement values stored in samples before converting this JSON-formatted message\
    \ into the character array out that we send to the browser.\n\n```\nvoid loop()\
    \ {\n  server2.handleClient();\n  webSocket.loop();\n  if (info_available==1)\
    \ {\n    info_available=0;\n    webSocket.sendTXT(websock_num,info_buffer,strlen(info_buffer));\n\
    \  }\n  if (output_ready==1) {\n    output_ready=0;\n    doc.to<JsonObject>();\
    \  // clear DynamicJsonDocument doc\n    for (int k=0;k<3;k++) {doc[\"ADC\"][k]=samples[k];}\n\
    \    serializeJson(doc,out);\n    webSocket.sendTXT(websock_num,out,strlen(out));\n\
    \  }\n  yield();\n}\n```\n\nWith the ESP32 programmed, we now turn to the webpage\
    \ and the JavaScript code that constitutes the “other” end of the websocket communication\
    \ channel. The header follows the description from Chapter 8, only here we specify\
    \ two traces.\n\n```\n<!DOCTYPE HTML>\n<HTML lang=\"en\">\n<HEAD>\n  <TITLE>ESP-DAQ</TITLE>\n\
    \  <META charset=\"UTF-8\">\n  <STYLE>\n    #displayarea { border: 1px solid black;\
    \ }\n    #adc32 { border: 1px solid black; }\n    #adc33 { border: 1px solid black;\
    \ }\n    #trace0 { fill: none; stroke: red; stroke-width: 1px;}\n    #trace1 {\
    \ fill: none; stroke: blue; stroke-width: 1px;}\n    #ip {float: right;}\n  </STYLE>\n\
    </HEAD>\n```\n\nThe following section specifies the appearance of the web page\
    \ shown in Figure 13.1. The buttons on the top, the selection menu to choose the\
    \ sampling time, and the displayed IP number are defined analogously to Chapter\
    \ 8.\n\n```\n<BODY>\n<P> ESP-DAQ:\n  <button id=\"start\" type=\"button\" onclick=\"\
    start();\">Start</button>\n  <button id=\"stop\" type=\"button\" onclick=\"stop();\"\
    >Stop</button>\n  <SELECT onchange=\"setSamplePeriod(this.value);\">\n    <OPTGROUP\
    \ label=\"Roll mode\">\n```"
