    \ value=\"4\">Oximeter Red live</OPTION>\n    <OPTION value=\"5\">Oximeter SPO2\
    \ live</OPTION>\n    <OPTION value=\"6\">AD5933 Calibrate</OPTION>\n    <OPTION\
    \ value=\"7\">AD5933 Frequency sweep</OPTION>\n    <OPTION value=\"8\">AD5933\
    \ at 50kHz</OPTION>\n    <OPTION value=\"100\">List directory</OPTION>\n    <OPTION\
    \ value=\"101\">Remove data file</OPTION>\n    <OPTION value=\"200\">Recording\
    \ ON</OPTION>\n    <OPTION value=\"201\">Recording OFF</OPTION>\n    <OPTION value=\"\
    202\">Replay recording</OPTION>\n    <OPTION value=\"300\">Start ECG output</OPTION>\n\
    \    <OPTION value=\"301\">Stop ECG output</OPTION>\n</SELECT>\n<A id='ip'>IP\
    \ address</A>\n```\n\n![Figure 15.2 The raw signal of the IR diode from the pulse\
