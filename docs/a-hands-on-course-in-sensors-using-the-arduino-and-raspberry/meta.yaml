    \ and finally, hourly averages over 60 samples for 120 days. In order to automatically\
    \ fill the database, we start the crontab editor with `crontab -e` and add the\
    \ line\n\n```\n* * * * * /home/pi/rrdtool/fill_weather_db.sh\n```\n\nto the end\
