    \ + (1024-current_position) + ',0)');\n        }\n    }\n}\n```\n\nThe SCRIPT\
    \ continues with the definition of the function toStatus(), which just writes\
    \ the text given as its argument to the status line and the definitions of the\
    \ callback functions for the buttons. The function start() forms a JSON message\
    \ with the two name-value pairs, one for cmd and one for val. It sends the start\
    \ command to the NodeMCU with the sample_period given as val. Likewise stop()\
    \ stops the acquisition and cleardisplay() resets the attribute d of trace0, which\
    \ clears the displayed trace. The callback function for the selection menu in\
    \ the SELECT tags setSamplePeriod() receives the value specified in the chosen\
    \ OPTION tag as argument and assigns it to sample_period. Finally, the open tags\
    \ for SCRIPT, BODY, and HTML are closed.\n\n```\nfunction toStatus(txt){document.getElementById('status').innerHTML=txt;}\n\
    function start() {\n    websock.send(JSON.stringify({\"cmd\" : \"START\", \"val\"\
    \ : sample_period}));\n}\nfunction stop() {\n    websock.send(JSON.stringify({\"\
    cmd\" : \"STOP\", \"val\" : \"-1\" }));\n}\nfunction setSamplePeriod(v) {\n  \
    \  toStatus(\"Setting sample period to \"+ v + \" ms\");\n    sample_period=v;\n\
    }\nfunction cleardisplay() {\n    dd = \"M0 256\";\n    document.getElementById('trace0').setAttribute('d',dd);\n\
    ```"
