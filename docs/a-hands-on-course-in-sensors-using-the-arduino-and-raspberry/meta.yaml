    \ 12次，以填充整数`adcvalue`的相应位，最后通过将CS引脚拉高来结束事务。在返回`adcvalue`之前，我们确保符号位被正确地纳入读数中。在`setup()`函数中，我们只初始化串行线路和MCP3304，而在`loop()`函数中，我们从ADC读取通道0的值，并在串行线路上显示其值。后者每秒重复一次。\n\
    \n除了位模拟引脚，我们也可以使用Arduino IDE自带的SPI库。基于<SPI.h>库但其他部分与前一个程序等效的程序如下。\n\n```\n// MCP3304,\
    \ V. Ziemann, 170726\n#include <SPI.h>\n#define CS 15  // D8\nint mcp3304_read_adc(int\
