    them in the airstream created by a fan, which we need to turn on and off.


    And that brings us to actuators, devices such as switches or motors that cause
    some change in external conditions. Sometimes they are part of the measurement
    process, such as the fan mentioned in the previous paragraph, or we need to move
    the sensor to where we want to measure, which typically requires motors.


