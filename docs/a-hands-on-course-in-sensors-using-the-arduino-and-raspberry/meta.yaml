  md: '# Least-Squares Fit


    In Chapter 12 we used the `linfit()` function on the Arduino to fit a straight
    line through a number $n$ of data points sampled at equidistant times. Here we
    briefly discuss the inner workings of that function that determines the slope
    $a$ and intercept $b$ by fitting data to a straight line. These parameters are
    determined by the requirement to minimize the sum of squared residuals $r_i =
    y_i - at_i - b$ for a number of data points $(t_i, y_i)$. We can restate the problem
    in the form of a linear equation that needs to be inverted in the least-squares
    sense


    $$\begin{pmatrix} \vdots \ y_i \ \vdots \end{pmatrix} = \begin{pmatrix} \vdots
    & \vdots \ t_i & 1 \ \vdots & \vdots \end{pmatrix} \begin{pmatrix} a \ b \end{pmatrix}$$
    (B.1)


    which we write in abbreviated form


    $$y = Ax$$ (B.2)


    where $A$ is the $n \times 2$ matrix in the previous equation and $x = (a, b)^T$.
    Here the superscripted $T$ denotes the transpose, and for the squared sum of the
    residuals $\sum_{i=1}^n r_i^2$ we write $\chi^2$. The latter we express as


    $$\chi^2 = \sum_{i=1}^n r_i^2 = (y^T - x^T A^T)(y - Ax)$$

    $$= y^T y - x^T A^T y - y^T Ax + x^T A^T Ax.$$ (B.3)


    Minimizing this expression with respect to $x$ results in a condition for the
    sought solution vector $x$. The condition for a minimum is the requirement that
    the gradient with respect to the fit parameters $x^T$ is zero. We somewhat sloppily
    write it as


    $$0 = \frac{\partial \chi^2}{\partial x^T} = -2A^T y + 2A^T Ax$$ (B.4)


    where we used $x^T A y = y^T A^T x$ because the expressions are scalars and any
    matrix of the form $A^T A$ is symmetric. This allows us to combine terms and we
    arrive at the previous equation. For a more detailed derivation see [43]. Left-multiplying
    with the inverse of $(A^T A)$, provided the matrix is nonsingular, isolates the
    sought-after fit-parameter $x$ and we obtain


    $$\begin{pmatrix} a \ b \end{pmatrix} = x = (A^T A)^{-1} A^T y.$$ (B.5)


    The right-hand side is often called pseudo-inverse of the matrix $A$, and we need
    to evaluate this expression in order to find $a$ and $b$. If the $t$ values are
    equidistant, we can absorb the'
