  md: 'On the desktop computer from which we want to log onto the Raspi via the network,
    we install the vncviewer software using the package manager of our Linux distribution.
    During the installation, the vncpasswd program should be installed as well, and
    we need to run it from the command prompt on our desktop computer. It prompts
    us to enter the same password for the VNC connection that we selected on the Raspi
    when running the vncserver program for the first time. Once that is done, the
    basic infrastructure to log onto the Raspi using VNC is in place. To simplify
    the entire process, we create a file named raspi.sh on the desktop computer with
    the following contents


    ```

    #!/bin/bash

    RASPI=192.168.10.nn

    ssh -X pi@${RASPI} vncserver -geometry 1280x960 &

    sleep 10

    vncviewer ${RASPI}:5901 -passwd ${HOME}/.vnc/passwd &

    ```


    and place that file in the "~/bin" directory. This little program remotely logs
    onto the Raspi with ssh, starts the vncserver program on the Raspi with the specified
    desktop geometry (we may use a smaller one such as 1024x768), then waits a few
    seconds and starts the vncviewer on the desktop computer using the credentials
    in the .vnc/passwd file in the home directory. After a few further seconds the
    desktop of the Raspi appears in a window on the desktop computer, and we seamlessly
    move the mouse and keyboard focus to the Raspi desktop, and execute commands on
    the Raspi. This is a very convenient way to use the Raspi, because it only requires
    a network connection and no other peripheral devices. In passing we mention that
    starting graphical programs that require administrator privileges, for example
    by sudo synaptic, on some systems do not have access to the display. In such cases
    we may grant authorization to all local users by first executing xhost localhost
    as normal user in a terminal window.


    At this point, we have a convenient setup to work on the Raspi, and are basically
    ready to communicate with all the microcontrollers with attached sensors. But
    using the hardware for both wired and wireless Ethernet on the Raspi is just too
    tempting to neglect, and in the next section we briefly describe how to use the
    wireless interface on the Raspi to span a private WLAN network to which we later
    connect the sensor nodes.


    # 5.4 RASPI AS A ROUTER


    In this setup we assume that the Raspi is connected to our normal network with
    its wired Ethernet RJ45 port, and we have access to it from our desktop computer
    to log on using ssh or vncviewer, as previously discussed. On the Raspi we need
    to install the following packages


    ```

    sudo apt-get update

    sudo apt-get install hostapd dnsmasq

    ```


    where we first update the repositories, and then download and install the hostapd
    and dnsmasq package. The former program is responsible for spanning the private
    wireless network, and turns the Raspi into a WLAN access point. The latter provides
    IP numbers on the private network via the DHCP protocol, and translates website
    names to IP numbers.


    As a first step we need to re-configure the network setup. In the default configuration
    there is a background process, a daemon called dhcpcd, that tries to obtain IP
    numbers for every network interface on the Raspi, including the wireless interface
    called wlan0. Instead, in order to operate the Raspi as an access point, we use
    for example nano to configure the interface ourselves by adding the following
    lines'
  merge: -1
