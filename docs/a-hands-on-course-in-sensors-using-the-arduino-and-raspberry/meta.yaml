    \ in the first five columns instructs cron to execute the program every time it\
    \ wakes up. The output of the crontab -l command has some basic explanations,\
    \ and more is available by executing man 5 crontab at the command prompt. So,\
    \ now we have a background process that records a measurement once a minute and\
    \ fills the file /home/pi/A0.dat until we remove the entry in the crontab file.\n\
    \nOur next task is to produce plots with python3 and two packages. The first package,\
