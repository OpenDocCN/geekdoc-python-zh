    Now we have several means at our disposal to switch devices and actuators on and
    off. Some of the most prominent and useful actuators are motors.


    # 3.2 MOTORS


    Motors in general translate chemical or electrical energy into mechanical energy,
    normally by rotating an axle in order to provide torque. Here, and in subsequent
    sections, we address electrical motors only. They come in a wide variety of types
    and can be powered by both AC and DC voltages. One of the most common types, and
    the one we will use, is a conventional DC motor with a commutator.


    # 3.2.1 DC motors


    The operating principle of a DC motor is most easily explained with the help of
    Figure 3.6. It is based on static magnetic field that is stationary in space,
    the *stator*, and one or more coils, electrically excited by an external voltage
    source. They are forced to rotate by reversing the polarity of the exciting voltage
    synchronously with the rotation. The rotating part is called the *rotor*, and
    the synchronous switch is the *commutator*. The torque on the rotor is provided
    by the Lorentz force that the electrons of the electric current experience in
    the external magnetic field. After half a turn, the external magnetic field has
    the “wrong”'
  - '[PAGE 64]


    ![](img/8f23875c54d5b3177d5d2a5bba06b37e_64_0.png)


    Figure 3.6 Basic operation principle of a DC motor. The magnetic north pole of
    the stator is to the left and the south pole to the right of the coil. Current
    is supplied to the brushes where it enters the commutator and passes through the
    rotor-coil, where the Lorentz force causes a force on the wire, moving it upwards.
    After half a turn, the commutator has rotated and reverses the polarity such that
    the current on the left side of the coil points in the same direction as before.


    polarity to continue forcing the coil to rotate, and would brake the rotation.
    This is prevented by reversing the polarity of the current flowing at just that
    point in time which allows the rotation to continue. The polarity reversal is
    effected by the commutator, which is shown as the two D-shaped objects that rotate
    between externally fixed electrodes, called *brushes*. Moreover, reversing the
    supply voltage causes the motor to rotate in the opposite direction.


    The sliding contact between the brushes and the commutator sometimes causes sparking
    at the moment of polarity reversal, because the brushes briefly connect the two
    D-shaped objects and thereby short circuit the supply voltage. The sparks then
    cause electrical disturbances that may be partially alleviated by connecting the
    brushes with a small, say 100 nF, capacitor. This also reduces the creation of
    ozone with its distinct smell, which often accompanies the operation of DC motors.
    In commercially available motors these effects are minimized, and other motor
    designs are used that circumvent these deficiencies. For example, in some *brushless
    DC motors*, the magnetic field of the rotor is provided by permanent magnets whose
    position is continuously monitored with a Hall sensor. This information is used
    in an electronic control unit to periodically excite the current through the coils
    of the stator in order to maintain the rotation. The complexity of the control
    unit places these motors outside the scope of this book, and we use normal DC
    motors for our projects despite their shortcomings.


    We can adjust the torque and the speed of the motor by varying voltage applied
    to the coils. A higher voltage makes the motor turn faster, and reasonable voltages
    are determined by the resistance of the coils. Often, however, it is advantageous
    to limit the voltages and control the currents that flow through the coils instead.
    Moreover, since the rotor has a finite inertia due to its mass, we can use pulse-width
    modulation to control the total power delivered to the coils in order to adjust
    torque and speed. In the fleeting moments when no current flows, the inertia maintains
    the rotation.


    In case you have a model railway, you may know that in the early days the speed
    of the trains was regulated by a variable transformer, and it was very difficult
    to run the trains at very slow speeds with voltages too low to reliably excite
    the coils. Modern model-railway controllers use pulse-width modulation to regulate
    the speed. In that way, the full supply voltage and current are always flowing,
    which reliably excites the coil, just not all the time. Operating the trains at
    slow speed now works much more reliably.'
