    \ STARTING THE IOC AT BOOT TIME\n\nIn the description above we need to start the\
    \ IOC `st.cmd` by hand and keep a terminal window with the running program open\
    \ all the time. To remedy this inconvenience, we create a startup script named\
    \ `epicsioc` that launches the IOC when the system boots. The file contains the\
    \ following lines:\n\n```\n#!/bin/sh\n#/etc/init.d/epicsioc\n### BEGIN INIT INFO\n\
