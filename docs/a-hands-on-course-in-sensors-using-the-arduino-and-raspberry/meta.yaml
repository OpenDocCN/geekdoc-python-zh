    \       Start and stop epicsioc server\n### END INIT INFO\ncase \"$1\" in\n  start)\n\
    \    echo \"Starting epicsioc\"\n    . /home/pi/.bash_aliases\n    cd /home/pi/epics/ioc/temp/iocBoot/ioctemp\n\
    \    /usr/bin/procServ -n \"IOC\" -L /tmp/epics.log -i ^D^C 20000 ./st.cmd\n \
