  md: '# Example: Profile of a Laser Beam


    In this example we measure the transverse profile of the laser beam from a laser
    pointer by carefully moving an obstacle across the beam and observing the change
    of the signal from a photoresistor. Figure 16.1 illustrates the method. We use
    a laser module from a sensor kit that is mounted on a breadboard and exposes two
    wires, one for ground and one for the positive supply voltage. In order to adjust
    the intensity of the laser, we use pulse-width modulation of the positive supply
    voltage. The sensor is a voltage divider consisting of a light sensitive resistor
    (LDR) and a 10 kΩ resistor. The obstacle is made of a piece of black plastic.
    As translation stage, we use the frame salvaged from an old CD-ROM drive, which
    moves a small wagon with a stepper motor back and forth over a distance of about
    40 mm, which is approximately the width of the readable area of a CD. The stepper
    motor drives a spindle, and that pulls and pushes the wagon with good precision.


    Figure 16.2 shows the salvaged frame from the CD drive. The frame has plenty of
    holes, which are convenient to add screws that in turn are used to attach laser,
    sensor, and obstacle. The laser on its small breakout board is located at the
    top right with the stepper motor beneath and hidden from view, but the spindle
    is clearly visible, running right to left near the top of the frame. There it
    engages the white plastic part that is attached to the wagon and moves it, when
    the motor turns. On the wagon there is a black piece of plastic visible that intercepts
    the laser beam and prevents the laser from hitting the LDR on the lower right
    on the frame. The LDR is also mounted on a small breakout board that is part of
    a sensor kit. We use it because the mounting holes make assembly and attaching
    the LDR to the screws on the frame easy. As controller we use an Arduino UNO that
    drives the motor


    ![](img/8f23875c54d5b3177d5d2a5bba06b37e_267_0.png)'
