    we execute the select command to display the entire table. We retrieve the output
    from the command in the variable reply with the fetchall() call and print the
    reply before closing the database. Note the structure of first executing a MariaDB
    command and then retrieving the reply with the fetchall() function. The reply,
    however, is a list of entries in an unfamiliar form. It is possible to display
    each measurement entry on a separate line by using the lines commented out by
    a hash (#). The code loops over each entry in the list, and in the first commented
    example, the print command displays one entry at a time. In the second example,
    the print command uses the str() function to convert each entry to a string which
    makes it human readable. Finally, we close the database with the call to the db.close()
    function.


    Our next task is to insert new entries with measurements into the database, and
