- md: '## 3.3 ANALOG VOLTAGES


    A simple way to produce a constant voltage is to low-pass filter a pulse-width
    modulated output voltage. The filter reduces the on-off variation and results
    in an average voltage level corresponding to the peak voltage times the duty factor
    of the pulse-width modulation. Varying the duty factor will produce a time-varying
    output voltage. There are, however, limitations to this method, mainly due to
    the quality of the output voltage, which is likely to have some ripple left over
    from the original modulation.


    A more reliable way is to use a *digital-to-analog converter* (DAC), which is
    a device that converts a digital word with a given length, such as 8 bits or 12
    bits, to a discrete voltage with 256 or 4096 intermediate levels, respectively.
    The operational principle is illustrated in Figure 3.13 for a 4-bit DAC using
    an $R-2R$ resistor network and an operational amplifier. The switches labeled
    bit3 to bit0 represent the digital input word, and the inverting input of the
    operational amplifier sums the currents that are added by toggling the respective
    switches. The inverting input is a virtual ground because the op-amp forces it
    to be the same potential as the noninverting input. This implies that the current
    flowing through all resistors is constant, and independent of the position of
    the switches; if the switch is in position 0, the current flows to the real ground,
    and if it is in position 1, it flows into the virtual ground. This implies that
    the voltages $V_3, \dots, V_0$ are constant and are given by $V_{k-1} = V_k/2$,
    which is easy to see for $V_1$ and $V_0$. The two right-most resistors with values
    $2R$ in parallel combine to a single resistor of value $R$. But this means that
    the node with $V_0$ is sandwiched between two resistors of value $R$, of which
    one is connected to a point with voltage $V_1$, thus $V_0 = V_1/2$. Since all
    the voltages $V_n$ are fixed the current flowing into the inverting input of the
    operational amplifier, provided that bit number $k$ is set, is given by $V_k/2R$,
    with $V_k = V_{ref}/2^{3-k}$. And all currents coming from the four branches add
    up, and the operational amplifier converts the current to an output voltage $V_{out}$.


    Most DACs use the $R-2R$ ladder resistor network, with a current-adding operational
    amplifier but add a digital front end with semiconductor switches that are controlled
    from a parallel bus, I2C, or SPI. An example of the latter is the MCP4921, a 12-bit
    DAC that is controlled via an SPI-compatible interface.


    ## 3.4 PERIODIC SIGNALS


    Occasionally circuits need to be periodically switched on and off or otherwise
    stimulated by periodic signals. Before the advent of integrated circuits, astable
    multivibrators were used for this purpose. The left-hand side in Figure 3.14 shows
    a basic example. Only one of the two transistors is conducting at any time. At
    the time just before $T_1$ switches on the left plate of capacitor $C_1$ had been
    charged through $R_{c1}$ to be more positive than its right plate. But as $T_1$
    starts conducting, $C_1$ discharges through $R_{b2}$ until the base voltage of
    $T_2$ exceeds the voltage at which start conducting and discharges $C_2$. At this
    point the roles of the two transistors and capacitors are reversed. Neither of
    the two states is stable, which causes the voltage at the output to oscillate.
    If the two resistors $R_{b1}$ and $R_{b2}$ connected to the base of the transistor
    and the two capacitors $C_1$ and $C_2$ are equal, the oscillation frequency of
    the output signal is approximately given by $f \approx 0.7/R_{b1}C_1$. Today,
    circuits with discrete components are largely replaced by special-purpose chips,
    such as the widely-used NE555, which recently celebrated its fiftieth birthday.
    It requires very few external components to generate periodic output signals over
    a wide range of frequencies.


    Most modern microcontrollers operate at such high clock rates that makes toggling
    output pins under software control a convenient option. We will return to this
    possibility in later chapters. If, on the other hand, other than rectangular signals
    are needed we can resort to *direct digital synthesis*. It is based on approximating
    the desired waveform – let’s assume it is sinusoidal – by a table of integer values
    that we store in memory of the controller and successively pass the values to
    a DAC. To reduce the frequency, we wait a little while before outputting the next
    value from the table. To increase the frequency, we jump over intermediate samples.
    For low frequencies, this is straightforward to implement in software. Luckily,
    for frequencies in the multi-MHz range, ready-made circuits, such as the AD9850,
    which produces sine and rectangular output up to 40 MHz, are available. Mounted
    on a breakout board, it is shown on the right-hand side in Figure 3.14. Programming
    the AD9850 is based on a synchronous serial protocol with a clock and a data line.


    The analog signals, switches, and motors we discussed so far are likely the most-used
    actuators, but there are others, and we consider a selection of them in the following
    section.


    ## 3.5 OTHER ACTUATORS


    In order to open doors or to move devices between well-defined end stops, *solenoid
    magnets* are used. They use soft-iron cores with surrounding magnetic coils whose
    current is turned on or off. They are conceptually not much different from an
    LED, except that the current required is much higher, and that requires a larger
    power supply. Moreover, a solenoid is a large inductive load, and turning it off
    causes a large back-emf that requires a large flyback protection diode, just as
    we discussed in the case of relays and DC motors in Section 3.1.2.


    The flow of liquids and gases can be controlled with pumps and valves. Pumps are
    usually based on motors driving paddle wheels, propellers, or turbines that move
    the liquid or gas from a region of low pressure to that of high pressure. The
    motors are controlled in the same way as discussed before. Flow rates are controlled
    by valves, which constrict the aperture through which the medium flows. An example
    is a butterfly valve, shown in Figure 3.15. The aperture can be restricted by
    the shaded aperture, which has the same diameter as the inner diameter of the
    pipe. Rotating the shaded aperture then adjusts the flow rate from fully closed,
    in which case the shaded aperture covers the entire inner diameter of the pipe,
    to fully open, in which case it stands perpendicular to the flow of the liquid
    or gas. To change its state we can either use a servo for smaller systems, a stepper
    motor, or a large servomotor, in case we need to constrict the flow in an oil
    pipeline.


    A common means for controlling large machinery uses hydraulics, based on controlling
    the flow of hydraulic oil. It uses pumps to move the oil into cylinders that cause
    a linear travel, or it is pumped through a turbine or propeller-based device to
    cause rotary motions. In either case the original pressure is provided by pumps,
    based on electric motors. The position of valves is also controlled by the same
    devices we discussed earlier in this chapter.


    And finally, we may consider humans as part of the larger system, and they need
    to be actuated. For this purpose we may use various attention-grabbing devices,
    such as piezoelectric buzzers, sirens, and loudspeakers, as well as optical devices
    comprising LEDs, NeoPixel color LEDs, liquid crystal displays, or small displays
    such as those found on printers or washing machines that report the current state
    of the apparatus.


    By now we have covered quite a selection of actuators and sensors and can turn
    things on, move them around, and measure a number of physical quantities. The
    next task is to interface this variety of sensors and actuators with their multitude
    of interfaces, and provide a standardized interface to communicate with the external
    world. This is the task of the microcontroller, and the flavors we will discuss
    in the following chapter are Arduinos and ESPs.


    ## QUESTIONS AND PROJECT IDEAS


    1.  What is the purpose of a fly-back diode? When do you need it?

    2.  The TV images are badly disturbed as soon as you turn on a DC motor. What
    is the cause and how can you alleviate the problem?

    3.  How do you control the speed of a DC motor if you need to run it at low speed?'
  mdcn: '## 3.3 模拟电压


    产生恒定电压的一种简单方法是对脉宽调制输出电压进行低通滤波。滤波器可以减少开关变化，产生一个平均电压电平，该电平等于峰值电压乘以脉宽调制的占空比。改变占空比将产生随时间变化的输出电压。然而，这种方法存在局限性，主要在于输出电压的质量，它可能残留原始调制带来的一些纹波。


    一种更可靠的方法是使用*数模转换器*（DAC），这是一种将给定长度（如8位或12位）的数字字转换为离散电压的设备，分别具有256或4096个中间电平。其工作原理如图3.13所示，这是一个使用$R-2R$电阻网络和运算放大器的4位DAC。标记为bit3到bit0的开关代表数字输入字，运算放大器的反相输入端对通过切换相应开关而增加的电流进行求和。反相输入端是一个虚地，因为运算放大器使其电位与同相输入端相同。这意味着流过所有电阻的电流是恒定的，并且与开关的位置无关；如果开关处于位置0，电流流向真实地；如果处于位置1，则流入虚地。这意味着电压$V_3,
    \dots, V_0$是恒定的，并且由$V_{k-1} = V_k/2$给出，这对于$V_1$和$V_0$很容易看出。最右边两个阻值为$2R$的电阻并联组合成一个阻值为$R$的电阻。但这意味着$V_0$节点夹在两个阻值为$R$的电阻之间，其中一个连接到电压为$V_1$的点，因此$V_0
    = V_1/2$。由于所有电压$V_n$都是固定的，因此流入运算放大器反相输入端的电流（假设第$k$位被设置）由$V_k/2R$给出，其中$V_k = V_{ref}/2^{3-k}$。来自四个支路的所有电流相加，运算放大器将电流转换为输出电压$V_{out}$。


    大多数DAC使用$R-2R$梯形电阻网络和电流求和运算放大器，但增加了一个数字前端，该前端包含由并行总线、I2C或SPI控制的半导体开关。后者的例子是MCP4921，一个通过SPI兼容接口控制的12位DAC。


    ## 3.4 周期性信号


    有时电路需要周期性地开关或以其他方式受到周期性信号的激励。在集成电路出现之前，非稳态多谐振荡器被用于此目的。图3.14左侧显示了一个基本示例。在任何时刻，两个晶体管中只有一个导通。在$T_1$导通之前的时刻，电容器$C_1$的左极板已通过$R_{c1}$充电，使其比右极板更正。但当$T_1$开始导通时，$C_1$通过$R_{b2}$放电，直到$T_2$的基极电压超过其开始导通的电压并放电$C_2$。此时，两个晶体管和电容器的角色互换。两种状态都不稳定，导致输出电压振荡。如果连接到晶体管基极的两个电阻$R_{b1}$和$R_{b2}$以及两个电容器$C_1$和$C_2$相等，则输出信号的振荡频率近似由$f
    \approx 0.7/R_{b1}C_1$给出。如今，分立元件电路在很大程度上已被专用芯片取代，例如广泛使用的NE555，它最近庆祝了其五十周年。它只需要很少的外部元件就能在很宽的频率范围内产生周期性输出信号。


    大多数现代微控制器以如此高的时钟速率运行，使得在软件控制下切换输出引脚成为一个方便的选择。我们将在后面的章节中回到这个可能性。另一方面，如果需要矩形信号以外的信号，我们可以求助于*直接数字合成*。它基于用存储在控制器内存中的整数值表来近似所需的波形——假设它是正弦波——并将这些值依次传递给DAC。为了降低频率，我们在输出表中的下一个值之前等待一会儿。为了提高频率，我们跳过中间的采样点。对于低频率，这在软件中很容易实现。幸运的是，对于多MHz范围内的频率，现成的电路是可用的，例如AD9850，它可产生高达40
    MHz的正弦和矩形输出。安装在分线板上，如图3.14右侧所示。AD9850的编程基于带有始终和数据线的同步串行协议。


    我们到目前为止讨论的模拟信号、开关和电机可能是最常用的执行器，但还有其他执行器，我们将在下一节中考虑其中的一部分。


    ## 3.5 其他执行器


    为了开门或在定义明确的端点之间移动设备，使用*电磁铁*。它们使用带有周围磁线圈的软铁芯，其电流被开启或关闭。从概念上讲，它们与LED没有太大不同，只是所需的电流要高得多，这需要更大的电源。此外，电磁铁是一个大的感性负载，关闭它会产生大的反电动势，需要大的续流保护二极管，正如我们在第3.1.2节讨论继电器和直流电机时所讨论的那样。


    液体和气体的流动可以用泵和阀门来控制。泵通常基于驱动桨轮、螺旋桨或涡轮的电机，将液体或气体从低压区域移动到高压区域。电机的控制方式与之前讨论的相同。流量由阀门控制，阀门限制介质流过的孔径。一个例子是蝶阀，如图3.15所示。孔径可以通过阴影孔径来限制，该孔径与管道的内径相同。旋转阴影孔径可以调节流量，从完全关闭（此时阴影孔径覆盖管道的整个内径）到完全打开（此时它垂直于液体或气体的流动）。为了改变其状态，对于较小的系统，我们可以使用伺服电机，对于步进电机，或者在需要限制石油管道中的流量时使用大型伺服电机。


    控制大型机械的常用手段是使用液压，基于控制液压油的流动。它使用泵将油移动到气缸中以产生线性行程，或者将其泵送通过基于涡轮或螺旋桨的装置以产生旋转运动。在这两种情况下，原始压力都由基于电动机的泵提供。阀门的位置也由我们在本章前面讨论的相同设备控制。


    最后，我们可以将人类视为更大系统的一部分，他们需要被驱动。为此，我们可以使用各种吸引注意力的设备，如压电蜂鸣器、警报器和扬声器，以及包括LED、NeoPixel彩色LED、液晶显示器或小型显示器（如打印机或洗衣机上报告设备当前状态的显示器）在内的光学设备。


    到目前为止，我们已经涵盖了相当多的执行器和传感器，可以打开事物、移动它们并测量许多物理量。下一个任务是将这些种类繁多的传感器和执行器及其众多的接口连接起来，并提供一个标准化的接口与外部世界通信。这是微控制器的任务，我们将在下一章讨论的类型是Arduino和ESP。


    ## 问题与项目想法


    1.  续流二极管的目的是什么？什么时候需要它？

    2.  一旦打开直流电机，电视图像就会严重干扰。原因是什么，如何缓解这个问题？

    3.  如果需要直流电机在低速下运行，如何控制其速度？'
