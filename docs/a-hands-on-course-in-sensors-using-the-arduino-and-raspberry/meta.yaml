    We connect a bipolar stepper motor in the way shown in Figure 4.19. Here we use
    an L293D H-bridge driver, the same integrated circuit we use to provide direction
    control for DC motors. Based on the pin-description for the circuit shown in Figure
    4.15, we immediately see that two supply wires from the left-hand side of the
    UNO connect to the pins for logic supply voltage and ground, and the enable pins
    are connected with the light-colored wire to pin D6 on the UNO. The wires connected
    to pins D2, D3, D4, and D5 on the Arduino are connected to the inputs of the four
    half-bridge drivers on the L293D. The four leads of the bipolar stepper motor
    are wired to the four output terminals of the corresponding drivers. In this circuit
    the terminal for the positive motor supply voltage on pin 8 of the L293D is connected
    to an external power supply. Since internally all four ground pins of the chip
    are connected, we can add a wire to connect the ground terminal on the other side
    of the L293D of the motor to the ground terminal of the power supply.


    It is remarkable that we can use the same code we used for the unipolar stepper
    motor for the bipolar motor as well. The same patterns, sent to the driver input
    pins, causes the bipolar motor to operate in full step mode. We can therefore
    use the same Arduino sketch as before to operate the motor, with the small reservation
    that we may need to swap the assignment of pins in the declaration of myStepper.


    We need to point out that at least one coil is always excited, and that causes
    the motor to get warm over time, even when it is not moving. This problem can
    be alleviated by adding a command to turn off all coils, albeit at the expense
    of losing some accuracy, because the holding torque from the excited coil is absent.
    If we can accept the small loss in precision, we can use the pin of the Arduino
    connected to the yellow wire to turn on and off the outputs of the driver chip.
    It must, however, be pulled high with digitalWrite(6, HIGH) for normal operation.


