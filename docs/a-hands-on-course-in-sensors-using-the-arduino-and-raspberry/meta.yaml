- img_proc: true
  md: '# CHAPTER 8


    # Websockets


    Occasionally, it is desirable to control the data acquisition hardware directly
    from an internet browser where the user interface is realized as an interactive
    webpage using *JavaScript*. In this way, even smartphones connected to the network
    can control the acquisition and display data in real time. Unfortunately, due
    to security concerns can normal sockets, such as those used the second example
    in [Section 4.6.3](#), not be accessed from a browser. Instead, however, we can
    use a simpler interface called *websockets*, which allows us to exchange simple
    text-based messages between microcontrollers and browsers.


    The text-based messages are formatted using the *JavaScript object notation* (JSON)
    where all data are specified by name-value pairs, enclosed in curly brackets.
    For example, we send a single temperature value from the microcontroller formatted
    as `{"TEMP":"27.2"}`. We can even add several pairs in the same message, such
    as `{"X":"17", "Y":"4"}`, or send arrays via `{"DATA":["17", "4"]}`, where the
    array values are enclosed in square brackets. We access the first value via `DATA[0]`,
    which evaluates to 17.


    In order to illustrate the communication, we will use the hardware from [Section
    4.6.3](#) with the LM35 temperature sensor connected to the analog input of a
    NodeMCU microcontroller. We program the NodeMCU to listen to JSON messages coming
    from a controlling browser that instructs it to start or stop measuring the temperature
    at regular intervals, pack the results in a JSON message, and send it back to
    the browser as soon as new data is available. Moreover, we start a regular webserver
    on the NodeMCU that serves the controlling webpage, shown in [Figure 8.1](#),
    that any browser, here chromium, can access. On the top, buttons to start and
    stop the acquisition are displayed together with a menu to select the update rate
    of the measurements. A third button clears the logging display shown below the
    buttons. Continuously arriving data points are added to it until the screen is
    filled when the trace starts moving to the left as new samples arrive. Below the
    logging display status information is shown, normally the value of the most recent
    data.


    Now, let''s see how to bring this system to live; first we look at the code on
    the NodeMCU.


    # 8.1 ON THE NODEMCU


    The NodeMCU has to handle several tasks simultaneously. It must serve the HTML
    file of webpage from [Figure 8.1](#), it has to listen to requests coming from
    the same page once it is running in the browser, and it must measure the temperature
    at regular intervals. We therefore add functionality, provided by additional libraries,
    for these tasks and open the *Library manager* in the *Tools* menu of the Arduino
    IDE to install the **WebSockets** and the **ArduinoJSON** libraries. Since the
    program is rather long, we''ll discuss it in smaller chunks.'
