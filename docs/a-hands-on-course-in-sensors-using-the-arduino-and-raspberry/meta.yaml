    \ (index k) over all frequencies. At each frequency, we calculate the magnitude\
    \ mag and phase phase of the measurement, read the corresponding value from the\
    \ calibration file, and fill sample[0] with the calibrated and scaled value that\
    \ ranges between zero at the bottom of the display and 1 kΩ at the top of the\
    \ display. We then subtract the calibration phase ph from phase, scale the values\
