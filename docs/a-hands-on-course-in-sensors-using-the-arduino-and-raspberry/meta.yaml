- md: '## 5.3 INSTALLING AND USING NEW SOFTWARE


    Before installing new software we first update the current system, which is based
    on an image file prepared some time ago. To do this we start a terminal program
    and enter the following two commands:


    ```

    sudo apt-get update

    sudo apt-get upgrade

    ```


    where the first command updates the database of installed programs and finds out
    whether newer versions are available. The second command installs the upgrades
    after a question to approve its selection. First, the newer versions are downloaded
    and then installed. This may take quite a while – about 30 minutes if the time
    since the last update or the creation of the initial installation media is long
    ago. Note that the system-administration command is called `apt-get`, and we have
    to run it with superuser privileges by prepending `sudo`. After the upgrade is
    complete and the program returns to the command line prompt, we have an up-to-date
    system and are ready to install additional software.


    Since we want to test the interface with the Arduino, we need to install the simple
    terminal emulator program `screen` by issuing the command


    ```

    sudo apt-get install screen

    ```


    and after confirming that some kilo-bytes are downloaded, the program is installed
    in a few seconds. We assume that we have an Arduino UNO programmed with the query-response
    sketch from page 66 and connect the USB cable from the UNO to a USB port on the
    Raspi. We then check the device name of the serial line by issuing `dmesg` in
    a terminal window, and inspect the output near the end. In my case, one line contains
    the string `ttyACM0`, but `ttyUSBn` with any number `n` can also occur, depending
    on the serial-to-USB converter installed on the UNO. Since the Arduino sketch
    uses 9600 baud for the serial line, we connect to it with


    ```

    screen /dev/ttyACM0 9600

    ```


    on the command line of the Raspi. Then we query the UNO by typing `A0?` followed
    by `Enter` in the screen terminal-window. The UNO should respond with `A0 nnn`
    where `nnn` is the value measured by the ADC on the UNO. Congratulations, we have
    established a communication link from the Raspi to the Arduino UNO. Once we are
    done with getting data from the UNO, we close the connection by pressing `Ctrl-a-k`
    in the screen window, confirm the question of whether we really want to quit by
    `y`, and return back to the command prompt.


    The **screen** program and in fact most programs on a Unix or Linux system bring
    their own help system, called manual pages, which can be accessed from the command
    line by typing `man <program name>` – for example, `man screen` in the present
    case. This displays information on how to use the program in the terminal window.
    In particular, all command line switches are explained. We exit from the `man`
    program by typing “q” in the window. Using `man` only works if the program name
    is known, but we can use the command `man -k <keyword>` to search the system for
    manual pages that have to do with `<keyword>`. The latter command works if we
    initialize a database once with `sudo mandb`. Check with `man mandb` to see what
    it really does!


    Later on, we will often have to edit configuration files or to write program code.
    The edited files are usually plain text files, so-called ASCII files, and we create
    and edit them with an editor program such as `nano`, `vi`, or `emacs`. The first
    two are already installed on the system, and since `vi` has a steep learning curve,
    `nano` is a good choice to start, unless we have another preference. We start
    `nano` from the command line by typing `nano <filename>`, and after pressing `Enter`,
    the terminal window opens with the contents of the file, if it exists, or an empty
    file, if it does not exist. Figure 5.3 shows `nano` after we added some text.
    At the bottom of the window the most important commands are listed, especially
    `Ctrl-x` to exit the program and `Ctrl-g` to open the built-in help system with
    more information about using `nano`. Here, both small and capital letters work
    in conjunction with the `Ctrl` key to execute commands, such as `Ctrl-k` and `Ctrl-u`
    to cut and paste the line with the cursor. Note that once a text file is written
    to disk, we can also view it using the `less` command or with `cat`. Please check
    the respective manual pages for additional information.


    We immediately put `nano` to good use and replace the default desktop manager,
    called `mutter`, which has an annoying bug that sometimes prevents windows from
    being resized or moved. We need to edit the configuration file `/etc/xdg/lxsession/LXDE-pi/desktop.conf`
    with


    ```

    sudo nano /etc/xdg/lxsession/LXDE-pi/desktop.conf

    ```


    and change the second line in the file from `window_manager=mutter` to `window_manager=openbox`,
    save the file and reboot. Note that editing file requires administrator privileges
    and we therefore need to prepend the command with `sudo`.


    Any program, library, or other package that is available in the official Raspberry
    Pi repositories can be installed by first updating the database with `sudo apt-get
    update`, which is only necessary once per session and then installing the package
    with `sudo apt-get`'
  mdcn: '## 5.3 安装和使用新软件


    在安装新软件之前，我们首先需要更新当前系统，该系统基于一个较早准备的镜像文件。为此，我们启动一个终端程序并输入以下两个命令：


    ```

    sudo apt-get update

    sudo apt-get upgrade

    ```


    其中第一个命令更新已安装程序的数据库，并检查是否有更新的版本可用。第二个命令在询问确认后安装升级。首先会下载较新的版本，然后进行安装。这可能需要相当长的时间——如果距离上次更新或初始安装介质创建的时间较久，大约需要30分钟。请注意，系统管理命令名为`apt-get`，我们需要通过在前面加上`sudo`来以超级用户权限运行它。升级完成并返回命令行提示符后，我们就拥有了一个最新的系统，可以准备安装其他软件了。


    由于我们想测试与Arduino的接口，需要安装一个简单的终端模拟器程序`screen`，通过执行命令


    ```

    sudo apt-get install screen

    ```


    在确认下载了几千字节后，程序会在几秒钟内安装完成。假设我们有一个Arduino UNO，已烧录了第66页的查询-响应程序，并将UNO的USB线连接到树莓派的USB端口。然后我们通过在终端窗口中执行`dmesg`来检查串行线路的设备名称，并查看输出末尾附近的内容。在我的情况下，有一行包含字符串`ttyACM0`，但根据UNO上安装的串行转USB转换器，也可能出现`ttyUSBn`（其中`n`是任意数字）。由于Arduino程序使用9600波特率进行串行通信，我们在树莓派的命令行上使用以下命令连接：


    ```

    screen /dev/ttyACM0 9600

    ```


    然后我们在screen终端窗口中输入`A0?`并按`Enter`来查询UNO。UNO应该会响应`A0 nnn`，其中`nnn`是UNO上ADC测量的值。恭喜，我们已经建立了从树莓派到Arduino
    UNO的通信链路。一旦我们从UNO获取数据完毕，可以通过在screen窗口中按`Ctrl-a-k`来关闭连接，通过输入`y`确认是否真的要退出，然后返回命令提示符。


    **screen**程序，实际上Unix或Linux系统上的大多数程序都自带帮助系统，称为手册页，可以通过在命令行输入`man <程序名>`来访问——例如，在当前情况下输入`man
    screen`。这将显示如何在终端窗口中使用该程序的信息。特别是，所有命令行选项都有解释。我们通过在窗口中输入“q”退出`man`程序。使用`man`仅在已知程序名时有效，但我们可以使用命令`man
    -k <关键词>`来搜索系统中与`<关键词>`相关的手册页。后者命令在我们使用`sudo mandb`初始化一次数据库后即可工作。通过`man mandb`查看它具体做了什么！


    稍后，我们将经常需要编辑配置文件或编写程序代码。编辑的文件通常是纯文本文件，即所谓的ASCII文件，我们使用编辑器程序（如`nano`、`vi`或`emacs`）来创建和编辑它们。前两个已经安装在系统上，由于`vi`学习曲线较陡，除非有其他偏好，`nano`是一个不错的入门选择。我们通过在命令行输入`nano
    <文件名>`来启动`nano`，按`Enter`后，终端窗口会打开，显示文件内容（如果文件存在）或一个空文件（如果文件不存在）。图5.3显示了我们添加了一些文本后的`nano`界面。在窗口底部列出了最重要的命令，特别是`Ctrl-x`退出程序和`Ctrl-g`打开内置帮助系统以获取更多关于使用`nano`的信息。在这里，小写字母和大写字母都可以与`Ctrl`键结合使用来执行命令，例如`Ctrl-k`和`Ctrl-u`用于剪切和粘贴光标所在的行。请注意，一旦文本文件写入磁盘，我们也可以使用`less`命令或`cat`来查看它。请查看各自的手册页以获取更多信息。


    我们立即善用`nano`，替换默认的桌面管理器`mutter`，它有一个恼人的错误，有时会阻止窗口调整大小或移动。我们需要编辑配置文件`/etc/xdg/lxsession/LXDE-pi/desktop.conf`：


    ```

    sudo nano /etc/xdg/lxsession/LXDE-pi/desktop.conf

