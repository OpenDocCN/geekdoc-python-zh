    在图2.1的中间，我们展示了如何将光敏电阻与一个电阻$R_0$（此处为10 k$\Omega$）串联，在电源电压$V_{cc}$和地之间创建一个分压器。根据对分压器的讨论以及附录A或[17]中对基本电路理论的简要回顾，信号端子上的电压$V_s$由$V_s
    = V_{cc}R_{LDR}/(R_0 + R_{LDR})$给出。因此，光敏电阻的光照改变了其电阻$R_{LDR}$，信号电压相应变化。请注意，我们必须将电阻$R_0$选择在$R_{LDR}$范围的中间。这导致我们测量的电压在电源电压的一半左右变化。因此，我们还需要在该电压范围内使用电压表。光强度的微小变化可能难以分辨，可能需要放大。使用惠斯通电桥，我们比较两个电阻分压器中的电压，如图2.1右侧所示，有助于缓解这个问题。我们将在第2.2节中扩展惠斯通电桥的使用。


    其他基于电阻的传感器是*电阻式温度检测器*（RTD），例如PT100温度传感器，这是一种经过校准的铂基传感器，在0 $^\circ$C时电阻恰好为100 $\Omega$。它基于这样一个事实：非常纯净的金属的电阻仅由导电带中电子与声子的散射决定，声子是构成金属晶格的离子的振动。此外，更高的温度导致晶格振动更强，电阻相应更高。


