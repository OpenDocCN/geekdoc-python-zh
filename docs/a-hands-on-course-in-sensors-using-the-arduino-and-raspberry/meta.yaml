    \ 和 `netcat` 的组合，将冒号分隔的字符串存储到 shell 变量 TEMP 中，该变量用于将测量值输入 rrdtool 数据库。\n\n```\n\
    #!/bin/bash\n# fill_weather_db.sh\nDB=/home/pi/rrdtool/weather.rrd\nTEMP=$(echo\
    \ \"ALL?\" | netcat -C 192.168.20.56 1137)\n/usr/bin/rrdtool update $DB N:$TEMP\n\
    ```\n\n保存脚本后，我们需要使用命令 `chmod +x fill_weather_db.sh` 使其可执行。但在我们开始使用 `rrdtool update`\
    \ 命令填充数据库之前，必须先创建它，我们假设以下命令在 `/home/pi/rrdtool` 目录中执行。\n\n```\nrrdtool create\
    \ weather.rrd --step 60 \\\n    DS:T:GAUGE:180:-20:100 \\\n    DS:P:GAUGE:180:900:1100\
    \ \\\n    DS:H:GAUGE:180:0:100 \\\n    DS:VOC:GAUGE:180:0:1000 \\\n    RRA:AVERAGE:0.5:1:2880\
    \ \\\n    RRA:AVERAGE:0.5:10:2880 \\\n    RRA:AVERAGE:0.5:60:2880\n```\n\n它创建了\
    \ `weather.rrd` 数据库文件，该文件期望每 60 秒接收一次值，并包含四个测量列（DS），分别用于温度、气压、湿度和空气质量。然后它定义了归档（RRA），该归档由\
