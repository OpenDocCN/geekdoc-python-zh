    \ side on the Arduino. Ground is connected with the other wire connected to the\
    \ left-hand side. The bases of the Darlington transistors are directly connected\
    \ to pins D2 to D5 of the Arduino and need to be controlled by the program.\n\n\
    The center tap of the motor coils are connected to the positive terminal of the\
    \ motor power supply with two wires. The other four wires are hooked up to the\
    \ collectors of the upper four Darlington transistors in the ULN2003. Since the\
    \ center tap of a coil is connected to positive supply voltage, placing a positive\
    \ voltage on the base of a Darlington will cause the collector-emitter link to\
    \ conduct and a current to flow through the coil. In this way we can excite the\
    \ coils in a suitable pattern to rotate the shaft either clockwise or counterclockwise.\
