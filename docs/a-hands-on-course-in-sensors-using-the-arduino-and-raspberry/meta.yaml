  md: '![](img/8f23875c54d5b3177d5d2a5bba06b37e_194_0.png)


    Figure 8.1 The webpage served by the NodeMCU from which the data acquisition is
    controlled and the data are displayed in real time illustrated by the bumps that
    are caused by placing a finger on the temperature sensor.


    After defining the network credentials, we add support for WiFi in general, for
    the webserver, and for the server responsible for the websocket. Furthermore,
    we add a library to decode JSON messages and another one to enable support the
    SPIFFS filesystem that we use to store the webpage in the flash memory of the
    NodeMCU. With these declarations, we are ready to declare the webserver **server2**
    to listen on port 80, which is commonly used for html. Likewise we define **webSocket**
    to handle the websocket communication on port 81.


    ```

    cpp

    // Minimal websocket temperature server, V. Ziemann, 221017

    const char* ssid     = "messnetz";

    const char* password = "zxcvZXCV";

    #include <ESP8266WiFi.h>

    #include <ESP8266WebServer.h>

    #include <WebSocketsServer.h>

    #include <ArduinoJson.h>

    #include "FS.h"                // SPIFFS filesystem

    ESP8266WebServer server2(80);   // port 80

    WebSocketsServer webSocket = WebSocketsServer(81);  // port 81

    ```


    In the following lines we add the support for an automatically repeating process
    that we call **SampleSlow**, define the period at which to execute the process
    and two flags that signal availability of things to send to the browser. The function
    **sampleslow_action()** simply sets one of these flags, such that the temperature
    measurement is handled in the main loop. We also allocate a variable to hold information
    that we send to the browser and a variable to remember the handle to the websockets
    that we need in several parts of the program.


    ```

    cpp

    #include <Ticker.h>

    Ticker SampleSlow;

    int sample_period=1,data_available=0,info_available=0;

    void sampleslow_action() {data_available=1;}

    char info_string[70];

    volatile uint8_t websock_num=0;

    ```'
