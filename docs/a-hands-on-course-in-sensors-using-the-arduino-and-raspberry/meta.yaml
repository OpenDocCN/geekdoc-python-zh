    are needed we can resort to *direct digital synthesis*. It is based on approximating
    the desired waveform – let’s assume it is sinusoidal – by a table of integer values
    that we store in memory of the controller and successively pass the values to
    a DAC. To reduce the frequency, we wait a little while before outputting the next
    value from the table. To increase the frequency, we jump over intermediate samples.
    For low frequencies, this is straightforward to implement in software. Luckily,
    for frequencies in the multi-MHz range, ready-made circuits, such as the AD9850,
    which produces sine and rectangular output up to 40 MHz, are available. Mounted
    on a breakout board, it is shown on the right-hand side in Figure 3.14. Programming
    the AD9850 is based on a synchronous serial protocol with a clock and a data line.


    The analog signals, switches, and motors we discussed so far are likely the most-used
    actuators, but there are others, and we consider a selection of them in the following
    section.


    # 3.5 OTHER ACTUATORS


    In order to open doors or to move devices between well-defined end stops, *solenoid
    magnets* are used. They use soft-iron cores with surrounding magnetic coils whose
    current is turned on or off. They are conceptually not much different from an
    LED, except that the current required is much higher, and that requires a larger
    power supply. Moreover, a solenoid is a large inductive load, and turning it off
    causes a large back-emf that requires a large flyback protection diode, just as
    we discussed in the case of relays and DC motors in Section 3.1.2.'
