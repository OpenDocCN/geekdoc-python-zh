  md: '# 126 ■ A Hands-On Course in Sensors Using the Arduino and Raspberry Pi, Second
    Edition


    ![](img/8f23875c54d5b3177d5d2a5bba06b37e_144_0.png)


    Figure 5.4 The Synaptic package manager.


    Nowadays many software packages are available from so-called git repositories.
    This includes the software accompanying this book, which is hosted on https://github.com
    and can be downloaded with


    ```

    git clone https://github.com/volkziem/HandsOnSensors2ed.git

    ```


    where the command git clone creates a subdirectory HandsOnSensors2ed into which
    the contents of the repository is copied. Should the git program be missing, we
    install it with sudo apt-get install git or with synaptic. Again, the command
    man git provides a wealth of information about the many options git and man git
    clone about the specific options when downloading – also called cloning – a repository.


    So far, we have used the Raspi as a standalone computer with screen, keyboard,
    and mouse directly attached to the Raspi, but that ties up the peripheral hardware.
    So, now is the time to install software to allow logging onto the Raspi via the
    network, and receiving a virtual copy of the Raspi desktop on our regular desktop
    computer. Then we have a Raspi-desktop in a window that behaves just like the
    one on a regular monitor. There already is such a server from RealVNC installed
    on the raspi, which can be enabled in the Raspberry Pi Configuration program,
    but in order to use it you need to install the proprietary RealVNC viewer on your
    Desktop. If you are reluctant to do so, you can achieve the same functionality
    by installing the tightvncserver on the Raspi with the command


    ```

    sudo apt-get install tightvncserver

    ```


    or, alternatively, via synaptic. This command removes the pre-installed realvnc-server
    and replaces it by one that is supported by many open source vncviewer programs.
    Once the installation has finished, we run vncpasswd from the command line as
    user pi, answer the questions about passwords, and remember them.'
