    The distance $L$ is given by this duration, and the speed of sound (approximately
    $v = 340$ m/s) by $L = \Delta t/2v$, or, in convenient units, $L[\text{cm}] =
    0.017\Delta t[\mu\text{s}]$. A pin on the device goes high when the pulse is emitted,
