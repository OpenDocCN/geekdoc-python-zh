    \ variables, such as `settle_time`, the time to wait between changing coil excitations,\
    \ and the `stepcounter`, which keeps track of the distance traveled. PA through\
    \ PD are the pins to which the coil terminals are connected, and `ENABLE` connects\
    \ to the enable pin of the H-bridge driver and can be used to de-excite all coils\
    \ to prevent them from overheating. Then the `set_coils()` function, which will\
    \ excite the coils in the correct pattern, is declared. Inside the function, we\
    \ first define the excitation pattern `patA` for coil A. In this case it is 1100,\
    \ the pattern in which two coils are always excited, and and provide the larger\
    \ torque. Alternatively we can also declare the pattern 1000 which would result\
    \ in the single-coil excitation pattern. See Section 3.2.3 for a discussion. The\
    \ variable `pat_length` is the number of different steps, four in this case. Next\
    \ we calculate the remainder with respect to `pat_length` of the input variable\
    \ `istep` to determine what the new state of the pattern excitation is, and write\
    \ the corresponding entry in the array `patA` to the output that is connected\
    \ to terminal PA. Next we calculate the entry in `patA` that is shifted by two\
