    and enable reading them out and translating the signals to a format that allows
    communication with a host computer using a standardized protocol. This comprises
    the hardware channels, which can be USB, RS-232, Bluetooth, or WiFi as well as
    the logical protocol, such as a simple query-response protocol. As host computer
    we use a Raspberry Pi [11] which, in its most recent incarnation, features four
    processing cores and runs a standard Linux system with a huge base of available
    software, including web servers, the MATLAB™-clone Octave, and even Mathematica™,
    all without license charges.


    The remainder of the book is organized as laid out in Figure 1.1. We first discuss
    a number of analog sensors and signal-conditioning methods, followed by a number
    of sensors that already provide their measurements in digital form, and the buses
    and protocols used. Next we discuss actuators. They switch things on and off,
    even those requiring large currents, and we learn how to control different types
    of motors that are sometimes needed as part of the measurement process. We then
    describe how to interface actuators and sensors with the Arduino, either by digitizing
    signals or by using the appropriate bus-interface. We go on to describe a program
    structure that permits the Arduino to support a simple query-response protocol
    in order to serve as a slave to a host computer. Next, we configure a Raspberry
    Pi as a standardized host computer. It will provide data storage in databases,
    and present the data in graphical form either using Octave and Python running
    locally on the Raspi or by publishing our measurement data with a web server,
    also running on the Raspi. We continue the discussion by installing the EPICS
    control system software and turn the Raspi into a full-blown control-system server
    that can join any other EPICS installation in a transparent way. We go on to discuss
    the MQTT message-passing system, which plays an important role in IoT applications.
    Websockets enable us to use web browsers, even on a smartphone, to directly communicate
    with the microcontrollers. Having assembled all the parts, we consider examples
    in which we build a weather station with distributed sensors, and systems to record
    ground vibrations, monitor the color of water, and measure the impedance of components.
    In more advanced examples, we build a data acquisition system that communicates
    directly with web browsers, then expand it to record electrocardiograms and other
    signals of medical relevance. Finally, we measure the width of the beam of a laser
    pointer, and a remote-controlled robot that also senses flames autonomously, moves
    to the fire, and sounds an alarm. We conclude by presenting guidelines about how
    to prepare a seminar presentation based on the examples and how to write a readable
    publication describing our data acquisition system using sensors, actuators, Arduino,
    and Raspberry Pi.'
