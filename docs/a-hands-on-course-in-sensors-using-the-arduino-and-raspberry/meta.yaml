    \ Pi, Second Edition\n\n![](img/8f23875c54d5b3177d5d2a5bba06b37e_82_0.png)\n\n\
    # 4.4.2 Analog input\n\nIn an earlier chapter, we saw that some sensors require\
    \ us to measure an analog voltage because they change their resistance. We place\
    \ them in a voltage divider and then read the voltage change on the central tap,\
    \ as shown on the left in Figure 2.1. Others, such as the LM35 temperature sensor,\
    \ directly produce a voltage and in this section we show how to interface these\
    \ sensors to the Arduino. First, we want to measure a voltage from one of the\
    \ analog input pins; here we use A0. The left of Figure 4.6 shows how to connect\
    \ a potentiometer as a variable voltage divider to the Arduino. One end of the\
    \ potentiometer is connected to ground, the other end to the supply voltage, and\
    \ the wiper with the variable tap of the potentiometer is connected to pin A0.\
    \ Turning the axis of the potentiometer causes the voltage on the center tap to\
    \ vary between ground and the 5 V supply voltage. The sketch to read the voltage\
    \ and report it via the serial cable (that is connected to the USB port) to the\
    \ host computer is shown next.\n\n```\n// Analog and serial communication, V.\
    \ Ziemann, 161130\nint inp,val;\nvoid setup() {\n  Serial.begin(9600);  // baud\
    \ rate\n}\nvoid loop() {\n  if (Serial.available()) {\n    inp=Serial.read();\
    \          // read character from serial\n    val=analogRead(0);          // read\
    \ analog\n    Serial.print(\"Value is \");  // and report back\n    Serial.println(val);\n\
    \  }\n  delay(50);                    // wait 50 ms\n}\n```"
