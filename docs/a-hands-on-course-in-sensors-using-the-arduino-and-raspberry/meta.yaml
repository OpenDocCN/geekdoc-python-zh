    Figure 3.13 Operational principle of a digital-to-analog converter.


    # 3.3 ANALOG VOLTAGES


    A simple way to produce a constant voltage is to low-pass filter a pulse-width
    modulated output voltage. The filter reduces the on-off variation and results
    in an average voltage level corresponding to the peak voltage times the duty factor
    of the pulse-width modulation. Varying the duty factor will produce a time-varying
    output voltage. There are, however, limitations to this method, mainly due to
    the quality of the output voltage, which is likely to have some ripple left over
    from the original modulation.


    A more reliable way is to use a *digital-to-analog converter* (DAC), which is
    a device that converts a digital word with a given length, such as 8 bits or 12
    bits, to a discrete voltage with 256 or 4096 intermediate levels, respectively.
    The operational principle is illustrated in Figure 3.13 for a 4-bit DAC using
    an $R-2R$ resistor network and an operational amplifier. The switches labeled
    bit3 to bit0 represent the digital input word, and the inverting input of the
    operational amplifier sums the currents that are added by toggling the respective
    switches. The inverting input is a virtual ground because the op-amp forces it
    to be the same potential as the noninverting input. This implies that the current
    flowing through all resistors is constant, and independent of the position of
    the switches; if the switch is in position 0, the current flows to the real ground,
    and if it is in position 1, it flows into the virtual ground. This implies that
    the voltages $V_3, \dots, V_0$ are constant and are given by $V_{k-1} = V_k/2$,
    which is easy to see for $V_1$ and $V_0$. The two right-most resistors with values
    $2R$ in parallel combine to a single resistor of value $R$. But this means that
    the node with $V_0$ is sandwiched between two resistors of value $R$, of which
    one is connected to a point with voltage $V_1$, thus $V_0 = V_1/2$. Since all
    the voltages $V_n$ are fixed the current flowing into the inverting input of the
    operational amplifier, provided that bit number $k$ is set, is given by $V_k/2R$,
    with $V_k = V_{ref}/2^{3-k}$. And all currents coming from the four branches add
    up, and the operational amplifier converts the current to an output voltage $V_{out}$.


    Most DACs use the $R-2R$ ladder resistor network, with a current-adding operational
    amplifier but add a digital front end with semiconductor switches that are controlled
    from a parallel bus, I2C, or SPI. An example of the latter is the MCP4921, a 12-bit
    DAC that is controlled via an SPI-compatible interface.


    # 3.4 PERIODIC SIGNALS


    Occasionally circuits need to be periodically switched on and off or otherwise
    stimulated by periodic signals. Before the advent of integrated circuits, astable
    multivibrators were used'
