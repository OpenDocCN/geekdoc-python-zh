  - '[PAGE 164]


    our measurement data, such as temperatures, on a web page. The round-robin database
    is implemented as a circular buffer that is filled up to the end and then wraps
    around and starts to overwrite the oldest values at the beginning of the buffer.
    Using `rrdtool` comprises three steps: creating the database, filling it with
    data, and extracting the data. But before delving into examples, we need to install
    the software with the following command:


    ```

    sudo apt-get install rrdtool

    ```


    after having updated the repositories with `sudo apt-get update` (just a friendly
    reminder not to forget the update step). Now we are ready to use the software.

    In what follows, we assume that all files reside in the subdirectory `/home/pi/rrdtool`.
    The first step – creating the database – is achieved by the `rrdtool create` command
    that we enter at the command prompt of the Raspi. In this step we define the frequency
    of storing data, the type and valid range of data, and the way the stored data
    should be preprocessed; more on the last point later. The simplest example, namely
    to create a database `db1.rrd`, is shown in the following example:


    ```

    rrdtool create db1.rrd --step 60 \n    DS:temp:GAUGE:180:-20:100 \n    RRA:AVERAGE:0.5:1:2880

    ```


    where we can also omit the backslash and write the entire command on a single
    line. The first part of the command creates `db1.rrd` and the database stores
    values every 60 seconds. The second line defines the data source (`DS:`), a variable
    called `temp` that is of type `GAUGE`, which is rrdtool-speak for “measurement
    value.” We require a valid data point to be uploaded to the database at least
    every 180 seconds before a value is marked as invalid. The expected range of values
    for the data points is between -20 and 100, which is reasonable for a temperature
    reading. The line starting with `RRA` defines the round-robin archive that contains
    averaged values; the number 0.5 is used internally and should not be changed;
    the number of data points to be averaged, here 1; and the total number of (averaged)
    data points that the database should hold. In the example we use 2880, which is
    the number of minutes in two days. Since we chose to average only one data point,
    we store all values, rather than actually averaging. The above `rrdtool` command
    creates the file `db1.rrd` in the directory where the command is executed. Note
    that we can create several data sources; for example, for temperature, humidity,
    and barometric pressure, by adding `DS:` statements. Moreover, note that the `RRA:`
    line creates one table in the database `db1.rrd`. We can define several more tables
    with additional `RRA:` statements. For example, adding `RRA:AVERAGE:0.5:30:336`
    will create a table with data averaged over 30 readings, thus one point every
    30 minutes, and will store 336 values, which corresponds to one week, because
    there are 336 half-hour periods in a week. Other options, instead of `AVERAGE`,
    are `MIN` and `MAX`, which will store the minimum or maximum in the specified
    time period, respectively. Please consult `man rrdtool` for more options. Now
    that we have a database, we can start to fill it with data.

    We fill the database with the `rrdtool update` command. The data we store are
    temperature measurements from an LM35 temperature sensor attached to an Arduino
    UNO, similar to the way we used it before. The following Python script sends `T?`
    to the UNO and receives the temperature data as a string that is similar to `T
    22.5`.


    ```

    # readtemp.py, V Ziemann, 221004

    import serial, time

    ser=serial.Serial("/dev/ttyUSB0",9600,timeout=1)

    time.sleep(3)          # wait for serial to be ready

    ser.write(b"T?\n")     # shorthand notation

    ```'
  - '[PAGE 165]


    ```

    reply=ser.readline().decode(''utf-8'')

    print(reply[2:].strip())

    ser.close()

    ```


    The difference from earlier versions is that we print out the numerical value
    only. We call this Python program from a shell script file with the name `filldb1.sh`.
    It contains the following lines:


    ```

    #!/bin/bash

    DB=/home/pi/rrdtool/db1.rrd

    TEMP=$(/usr/bin/python3 /home/pi/rrdtool/readtemp.py)

    /usr/bin/rrdtool update $DB N:$TEMP

    ```


    and we make it executable by executing `chmod +x filldb1.sh`. In the script, we
    first define a variable DB that contains the absolute path to the database file.
    It resides in `/home/pi/rrdtool/` as already mentioned above. On the next line
    we fill the variable TEMP with the output of the command between `$(` and `)`,
    but this is the temperature value that the command `/usr/bin/python3 /home/pi/rrdtool/readtemp.py`
    returns. Note that the absolute path is used for both the Python interpreter and
    the `readtemp.py` script. In the last line we execute the `rrdtool update` command
    with the database name stored in the variable DB, and fill it with the current
    time stamp, as indicated by `N:` and the temperature value stored in the variable
    TEMP. Executing `filldb1.py` from the command line sends a data point with the
    current time to the database, but that is rather inconvenient. A better solution
    is to run `filldb1.py` once a minute, automatically. We therefore update the crontab
    file by executing `crontab -e` and add the line


    ```

    * * * * * /home/pi/rrdtool/filldb1.sh

    ```


    to the end of the file. This will send a new data point to the database once every
    minute.

    Finally, in the third step, we retrieve the data and generate a graph with the
    `rrdtool graph` command. Here is an example:


    ```

    rrdtool graph db1.png -s -4h \n    -t "Temperature in my office" -v "T [C]" \n    DEF:t0=db1.rrd:temp:AVERAGE
    \n    LINE1:t0#FF0000:"Temperature";

    ```


    Note that we also can write the entire command on a single line. It creates a
    graphics file `db1.png` with start of the time axis 4 hours back, `-s -4h` in
    time, a title specified after the `-t` option, and the vertical axis label after
    the `-v` option. In the next line the handle `t0` is defined to refer to the data
    coming from the `db1.rrd` database and as the `AVERAGE` of the variable `temp`.
    Compare this to the `rrdtool create` command, where `temp` was defined in the
    `DS:` part of the command and `AVERAGE` in the `RRA:` part. Finally, we define
    a displayed line to use the handle `t0`, specify the color by hexadecimal RGB
    values (here red: `#FF0000`), and give it the label `Temperature`. In Figure 5.9
    we show the resulting graphics produced by the above `rrdtool graph` command.
    Note that only the last four hours are plotted, but the first part is missing,
    because the cron job was not running at that time. The data are therefore noted
    *invalid* in the database, and consequently not printed. The scale is adjusted
    automatically in the previous examples, but can also be specified explicitly.
    The command `man rrdtool` and the pointers therein provide a wealth of information
    on how to fine tune the output.

    After being able to measure, store, and retrieve measurement values, we want to
    present them on a web page for online observation and continuous checking.'
- md: "## 5.7 ONLINE PRESENTATION\n\nIn this section we describe how to present the\
    \ measured data on a web page that is published by a web server. It turns out\
    \ that the Raspi is quite capable of running a web server on the side while doing\
    \ all the other things such as acquiring and storing data. The basic software\
    \ needed is a web server, and we chose apache2 [29], which is installed by executing\n\
    \n```\nsudo apt-get install apache2\n```\n\non the command line of the Raspi.\
    \ After the installation is complete, we use a browser on any computer connected\
    \ to the network the Raspi is connected to and enter the IP number of the Raspi\
    \ in the address line. This also works on the browser installed on the Raspi;\
    \ enter localhost as the web address, and you should be greeted by the web page\
    \ shown in Figure 5.10. This page instructs us to replace the file named index.html\
    \ in the directory /var/www/html/ with our own copy. Note that the apache2 web\
    \ server is configured to present a file named index.html by default, if only\
    \ the address of the folder is given.\n\nSo, we need to prepare a simple web page,\
    \ which is a specially formatted text file in a format called HTML – an acronym\
    \ for *Hyper-Text Markup Language*. There are plenty of books on the subject,\
    \ and tutorials can be found on the web in abundance. Here we only use the most\
    \ basic features. We navigate to the directory /var/www/html/ and save index.html\
    \ as a backup with `sudo mv index.html index.html.bak`. Then we start our favorite\
    \ editor as superuser by prepending sudo, enter the following text, and save the\
    \ contents as index.html.\n\n```\n<!DOCTYPE HTML>\n<HTML>\n  <HEAD>\n    <TITLE>Raspi\
    \ Web Server</TITLE>\n  </HEAD>\n  <BODY>\n    <H1 ALIGN=CENTER>Raspi Web Server\
    \ Main Page</H1>\n    <HR SIZE=2 WIDTH=80%>\n    <H3>Available Goodies:</H3>\n\
    \    <UL>\n      <LI> <A HREF=\"temp/\">Temperature Graph</A> </LI>\n      <LI>\
    \ <A HREF=\"https://www.w3schools.com/html\">\n            HTML Tutorial</A> </LI>\n\
    \      <LI> <A HREF=\"https://www.w3resource.com/\">\n            W3resource tutorials</A>\n\
    \      <LI> <A HREF=\"https://www.raspberrypi.org\">\n            Raspberry Pi\
    \ web site</A> </LI>\n      <LI> <A HREF=\"https://www.arduino.cc\">Arduino web\
    \ site</A> </LI>\n    </UL>\n  </BODY>\n</HTML>\n```\n\nIf no typos crept in,\
    \ by entering the address http://localhost on a browser running locally on the\
    \ Raspi we should see the page shown in Figure 5.11. This is how the web browser\
    \ renders the contents of the file we just entered and now briefly discuss. At\
    \ the top of the file we have the declaration of the document type; it is an HTML\
    \ file. Then we have the opening tag `<HTML>` and a matching closing tag `</HTML>`\
    \ at the end of the file. Anything between them describes the contents of the\
    \ web page. Note that HTML tags (almost) always come in pairs: the tag name in\
    \ angle brackets and a matching closing tag with the same name, but prepended\
    \ with a slash. The next tags we encounter in the file are HEAD and TITLE, which\
    \ describe things that do not show up on the page but appear in the title bar\
    \ of the web browser. Finally, we reach the BODY tags, where we find the description\
    \ of the web page proper. The `<H1>` tag declares a large headline, and the ALIGN\
    \ directive specifies it to be centered on the web page. There are different levels\
    \ of header tags, from H1 to H6. The next line defines a horizontal rule with\
    \ the `<HR>` tag that covers 80% of the width of the page. Then we add a smaller\
    \ header with `<H3>` and an unnumbered list between the `<UL>` tags, with each\
    \ list item described by `<LI>` tags. The `<A>` tag is called an anchor. It points\
    \ to other websites specified in the HREF directive. The first list item points\
    \ to a local directory temp/ under the directory where the file index.html resides.\
    \ Since this does not yet exist, we need to create it.\n\nIn the directory /var/www/html/,\
    \ we create the temp/ subdirectory and copy a file, also named index.html, with\
    \ the following contents into the newly created subdirectory /var/www/html/temp/:\n\
    \n```\n<!DOCTYPE HTML>\n<HTML>\n  <HEAD>\n    <TITLE>Raspi Web server</TITLE>\n\
    \  </HEAD>\n  <BODY>\n    <H1 ALIGN=CENTER>Temperature</H1>\n    <IMG SRC=\"db1.png\"\
    \ ALT=\"Temperature in my office\">\n  </BODY>\n</HTML>\n```\n\nThe file contents\
    \ follows the same general layout as before, with the DOCTYPE declared first,\
    \ followed by `<HTML>` tags. Next come the `<HEAD>` tags and then the `<BODY>`\
    \ tags bracketing the displayed contents of the page. Here we also find a header\
    \ and a new tag `<IMG>` to direct the web browser to display the image specified\
    \ in the SRC directive. To make this work, we copy the file db1.png, the one we\
    \ created with rrdtool graph in the previous section, to the directory /var/www/html/temp/.\
    \ We always need to use sudo to edit or copy files to the system areas to which\
    \ the files under /var/www/ belong. This we can avoid by enabling private web\
    \ pages.\n\nThe private web pages commonly reside in a subdirectory called public_html\
    \ under the user's home directory. As user pi we therefore create it by typing\
    \ `mkdir /home/pi/public_html`. In order to use it we have to enable the userdir\
    \ module by executing `sudo a2enmod userdir` at the command prompt, and restarting\
    \ apache2 with the command `sudo systemctl restart apache2`, such that the newly\
    \ enabled module is loaded. Then we copy the files index.html and db1.png from\
    \ /var/www/html/temp/ to /home/pi/public_html and are ready to access the same\
    \ web page as before, but now under the new address http://localhost/~pi. Any\
    \ file we copy to the subdirectory /home/pi/public_html is then accessible from\
    \ a browser at the address http://localhost/~pi/ with the filename appended. For\
    \ example, http://localhost/~pi/db1.png only displays the graphics file in the\
    \ browser window, but nothing else.\n\nThe contents on the web page in the previous\
    \ example is static. We copy files to the public_html directory and then they\
    \ are presented as is. If we want to update, for example, the temperature graph,\
    \ we have to run rrdtool graph again and copy the new copy of the db1.png to public_html.\
    \ But this is a task that we easily automatize with the help of a cron job. We\
    \ prepare a file with the following contents:\n\n```\n#!/bin/bash\nDB=/home/pi/rrdtool/db1.rrd\n\
    /usr/bin/rrdtool graph /home/pi/public_html/db1.png -s -4h \\\n    -t \"Temperature\
    \ in my office\" -v \"T [C]\" \\\n    DEF:t0=$DB:temp:AVERAGE \\\n    LINE1:t0#FF0000:\"\
    Temperature\";\n/usr/bin/rrdtool graph /home/pi/public_html/db2.png -s -2d \\\n\
    \    -t \"Temperature in my office\" -v \"T [C]\" \\\n    DEF:t0=$DB:temp:AVERAGE\
    \ \\\n    LINE1:t0#FF0000:\"Temperature\";\n```\n\nand name it makegraph.sh. Then\
    \ we place the file in the /home/pi/rrdtool/ subdirectory and make it executable\
    \ with `chmod +x makegraph.sh`. In the file, we first define the database to use\
    \ and then have two almost identical copies of the rrdtool graph command from\
    \ the previous section. But in the first case, we create db1.png for data from\
    \ the last 4 hours, and in the second case we create db2.png for data from the\
    \ last two days (`-s -2d`). Note that the graphics files db1.png and db2.png are\
    \ specified to reside in the public_html directory, where they are accessible\
    \ to the web server. Finally, we make the makegraph.sh script execute every 10\
    \ minutes by adding the following line to our crontab file with the command `crontab\
    \ -e`\n\n```\n*/10 * * * * /home/pi/rrdtool/makegraph.sh > /dev/null\n```\n\n\
    where `*/10` in the first column means every 10 minutes and the `> /dev/null`\
    \ at the end means to suppress any output from the makegraph.sh command. So now\
    \ we can update the to-be-displayed content, but we still need to coax the web\
    \ browser to actually re-read that content at some interval. For this purpose\
    \ the `<META http-equiv=..>` tag exists, and we include it between the HEAD tags,\
    \ as shown in the following updated version of the public_html/index.html file\n\
    \n```\n<!DOCTYPE HTML>\n<HTML>\n  <HEAD>\n    <TITLE>Raspi Web server</TITLE>\n\
    \    <META http-equiv=\"refresh\" content=\"300\">\n  </HEAD>\n  <BODY>\n    <H1\
    \ ALIGN=CENTER>Temperature</H1>\n    <H3>The last 4 hours</H3>\n    <IMG SRC=\"\
    db1.png\" ALT=\"Temperature over 4 hours\">\n    <H3>The last 2 days</H3>\n  \
    \  <IMG SRC=\"db2.png\" ALT=\"Temperature over 2 days\">\n  </BODY>\n</HTML>\n\
    ```"
  mdcn: "## 5.7 在线展示\n\n本节我们将介绍如何在由网络服务器发布的网页上展示测量数据。事实证明，树莓派在执行数据采集和存储等其他任务的同时，完全有能力运行一个网络服务器。所需的基本软件是一个网络服务器，我们选择了apache2\
    \ [29]，通过在树莓派的命令行上执行以下命令进行安装：\n\n```\nsudo apt-get install apache2\n```\n\n安装完成后，我们可以在任何连接到树莓派所在网络的计算机上使用浏览器，并在地址栏中输入树莓派的IP地址。这在树莓派上安装的浏览器中同样适用；输入localhost作为网址，你应该会看到如图5.10所示的网页。该页面提示我们将目录`/var/www/html/`中名为`index.html`的文件替换为我们自己的副本。请注意，apache2网络服务器默认配置为在仅给出文件夹地址时展示名为`index.html`的文件。\n\
    \n因此，我们需要准备一个简单的网页，这是一个采用称为HTML（*超文本标记语言*的缩写）格式的特殊格式化文本文件。关于这个主题的书籍很多，网上也能找到大量的教程。这里我们只使用最基本的功能。我们导航到目录`/var/www/html/`，并使用`sudo\
    \ mv index.html index.html.bak`将`index.html`备份。然后我们以超级用户身份启动我们喜欢的编辑器（在命令前加上sudo），输入以下文本，并将内容保存为`index.html`。\n\
    \n```\n<!DOCTYPE HTML>\n<HTML>\n  <HEAD>\n    <TITLE>Raspi Web Server</TITLE>\n\
    \  </HEAD>\n  <BODY>\n    <H1 ALIGN=CENTER>Raspi Web Server Main Page</H1>\n \
    \   <HR SIZE=2 WIDTH=80%>\n    <H3>Available Goodies:</H3>\n    <UL>\n      <LI>\
    \ <A HREF=\"temp/\">Temperature Graph</A> </LI>\n      <LI> <A HREF=\"https://www.w3schools.com/html\"\
    >\n            HTML Tutorial</A> </LI>\n      <LI> <A HREF=\"https://www.w3resource.com/\"\
    >\n            W3resource tutorials</A>\n      <LI> <A HREF=\"https://www.raspberrypi.org\"\
    >\n            Raspberry Pi web site</A> </LI>\n      <LI> <A HREF=\"https://www.arduino.cc\"\
    >Arduino web site</A> </LI>\n    </UL>\n  </BODY>\n</HTML>\n```\n\n如果没有输入错误，在树莓派本地运行的浏览器中输入地址`http://localhost`，我们应该会看到如图5.11所示的页面。这就是网络浏览器渲染我们刚刚输入并即将简要讨论的文件内容的方式。在文件顶部，我们有文档类型的声明；这是一个HTML文件。然后我们有开始标签`<HTML>`和文件末尾匹配的结束标签`</HTML>`。它们之间的任何内容都描述了网页的内容。请注意，HTML标签（几乎）总是成对出现：尖括号中的标签名称和一个匹配的结束标签，名称相同但前面加了一个斜杠。我们在文件中遇到的下一个标签是HEAD和TITLE，它们描述的是不会出现在页面上但会出现在网络浏览器标题栏中的内容。最后，我们到达BODY标签，在这里我们找到网页本身的描述。`<H1>`标签声明一个大标题，ALIGN指令指定它在网页上居中。有不同级别的标题标签，从H1到H6。下一行使用`<HR>`标签定义一个水平线，覆盖页面宽度的80%。然后我们用`<H3>`添加一个较小的标题，并在`<UL>`标签之间添加一个无序列表，每个列表项由`<LI>`标签描述。`<A>`标签称为锚点。它指向HREF指令中指定的其他网站。第一个列表项指向文件`index.html`所在目录下的本地目录`temp/`。由于该目录尚不存在，我们需要创建它。\n\
    \n在目录`/var/www/html/`中，我们创建`temp/`子目录，并将一个同样名为`index.html`的文件（内容如下）复制到新创建的子目录`/home/pi/public_html`中：\n\
    \n```\n<!DOCTYPE HTML>\n<HTML>\n  <HEAD>\n    <TITLE>Raspi Web server</TITLE>\n\
    \  </HEAD>\n  <BODY>\n    <H1 ALIGN=CENTER>Temperature</H1>\n    <IMG SRC=\"db1.png\"\
    \ ALT=\"Temperature in my office\">\n  </BODY>\n</HTML>\n```\n\n文件内容遵循与之前相同的大致布局，首先声明DOCTYPE，然后是`<HTML>`标签。接下来是`<HEAD>`标签，然后是`<BODY>`标签，括起了页面的显示内容。这里我们还发现了一个标题和一个新标签`<IMG>`，用于指示网络浏览器显示SRC指令中指定的图像。为了使其工作，我们将文件`db1.png`（我们在上一节中使用rrdtool\
    \ graph创建的那个）复制到目录`/var/www/html/temp/`。我们总是需要使用sudo来编辑或复制文件到`/var/www/`下的系统区域。我们可以通过启用私有网页来避免这一点。\n\
    \n私有网页通常位于用户主目录下名为`public_html`的子目录中。因此，作为用户pi，我们通过输入`mkdir /home/pi/public_html`来创建它。为了使用它，我们必须通过在命令提示符下执行`sudo\
    \ a2enmod userdir`来启用userdir模块，并使用命令`sudo systemctl restart apache2`重启apache2，以便加载新启用的模块。然后我们将文件`index.html`和`db1.png`从`/var/www/html/temp/`复制到`/home/pi/public_html`，并准备好访问与之前相同的网页，但现在是在新地址`http://localhost/~pi`下。我们复制到子目录`/home/pi/public_html`的任何文件都可以通过浏览器在地址`http://localhost/~pi/`后附加文件名来访问。例如，`http://localhost/~pi/db1.png`只会在浏览器窗口中显示图形文件，没有其他内容。\n\
    \n上一个示例中网页上的内容是静态的。我们将文件复制到`public_html`目录，然后它们就会按原样展示。如果我们想更新，例如温度图，我们必须再次运行`rrdtool\
    \ graph`并将新的`db1.png`副本复制到`public_html`。但这是一个我们可以借助cron作业轻松自动化的任务。我们准备一个包含以下内容的文件：\n\
    \n```\n#!/bin/bash\nDB=/home/pi/rrdtool/db1.rrd\n/usr/bin/rrdtool graph /home/pi/public_html/db1.png\
    \ -s -4h \\\n    -t \"Temperature in my office\" -v \"T [C]\" \\\n    DEF:t0=$DB:temp:AVERAGE\
    \ \\\n    LINE1:t0#FF0000:\"Temperature\";\n/usr/bin/rrdtool graph /home/pi/public_html/db2.png\
    \ -s -2d \\\n    -t \"Temperature in my office\" -v \"T [C]\" \\\n    DEF:t0=$DB:temp:AVERAGE\
    \ \\\n    LINE1:t0#FF0000:\"Temperature\";\n```\n\n并将其命名为`makegraph.sh`。然后我们将文件放在`/home/pi/rrdtool/`子目录中，并使用`chmod\
    \ +x makegraph.sh`使其可执行。在文件中，我们首先定义要使用的数据库，然后是上一节中`rrdtool graph`命令的两个几乎相同的副本。但在第一种情况下，我们创建`db1.png`用于最近4小时的数据，在第二种情况下，我们创建`db2.png`用于最近两天的数据（`-s\
    \ -2d`）。请注意，图形文件`db1.png`和`db2.png`被指定位于`public_html`目录中，网络服务器可以访问它们。最后，我们通过使用命令`crontab\
    \ -e`将以下行添加到我们的crontab文件中，使`makegraph.sh`脚本每10分钟执行一次：\n\n```\n*/10 * * * * /home/pi/rrdtool/makegraph.sh\
    \ > /dev/null\n```\n\n其中第一列的`*/10`表示每10分钟，末尾的`> /dev/null`表示抑制`makegraph.sh`命令的任何输出。所以现在我们可以更新要显示的内容，但我们仍然需要引导网络浏览器在某个间隔实际重新读取该内容。为此，存在`<META\
    \ http-equiv=..>`标签，我们将其包含在HEAD标签之间，如下面更新的`public_html/index.html`文件所示：\n\n```\n\
    <!DOCTYPE HTML>\n<HTML>\n  <HEAD>\n    <TITLE>Raspi Web server</TITLE>\n    <META\
    \ http-equiv=\"refresh\" content=\"300\">\n  </HEAD>\n  <BODY>\n    <H1 ALIGN=CENTER>Temperature</H1>\n\
    \    <H3>The last 4 hours</H3>\n    <IMG SRC=\"db1.png\" ALT=\"Temperature over\
    \ 4 hours\">\n    <H3>The last 2 days</H3>\n    <IMG SRC=\"db2.png\" ALT=\"Temperature\
    \ over 2 days\">\n  </BODY>\n</HTML>\n```"
