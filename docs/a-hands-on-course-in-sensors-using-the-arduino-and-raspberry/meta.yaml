    \ output was connected to ADC32. About halfway through the acquisition, pin DO18\
    \ was turned on to toggle once per second. It was directly connected to ADC33\
    \ such that the second trace shows a toggling voltage. The first status line below\
    \ the display shows information generated on the browser, and the second line\
    \ shows information received from the ESP32.\n\nNow, let us turn to the code that\
    \ brings the ESP32 to life. As in Chapter 8 we start with the credentials to connect\
    \ to the WLAN and include support for WiFi, webserver, websockets, JSON, and the\
    \ SPIFFS filesystem. Note that the latter has a different name from the one used\
    \ earlier on the NodeMCU. Then we define the webserver to listen on port 80 and\
    \ the websockets on port 81. The ticker is used to generate the repetitive actions\
    \ for sampling the input pins and for controlling the output pins. After defining\
    \ a number variables we define a several functions that are called by the tickers,\
    \ here `sampleslow_action()` reads the input pins, stores their values in the\
    \ array `samples`, and signals the availability of new data by setting the `output_ready`\
    \ flag. The function `ramp25_action()` increments the 8-bit variable `dac25` and\
    \ writes it to DAC25. We do not need to worry about values above 255, because\
    \ the higher bits are automatically truncated. The function `pulse18_action()`\
    \ simply toggles DO18.\n\n220 ■ A Hands-On Course in Sensors Using the Arduino\
    \ and Raspberry Pi, Second Edition\n\n![](img/8f23875c54d5b3177d5d2a5bba06b37e_238_0.png)\n\
    \nFigure 13.1 Web interface for the ESP32-based data acquisition system.\n\n```cpp\n\
    // ESP32 DAQ, V. Ziemann, 221018\nconst char* ssid     = \"messnetz\";\nconst\
    \ char* password = \"zxcvZXCV\";\n#include <WiFi.h>\n#include <WebServer.h>\n\
    #include <WebSocketsServer.h>\n#include <ArduinoJson.h>\n#include <SPIFFS.h>\n\
    WebServer server2(80);                          // port 80\nWebSocketsServer webSocket\
    \ = WebSocketsServer(81);  // port 81\n#include <Ticker.h>\nTicker SampleSlow,Ramp25Ticker,Pulse18Ticker;\n\
    volatile uint8_t websock_num=0,info_available=0,output_ready=0;\nint sample_period=100,samples[3];\n\
    uint8_t dac25val=0,do18=0;\nchar info_buffer[80];\nchar out[300]; DynamicJsonDocument\
    \ doc(300);\nvoid sampleslow_action() { //.......................sampleslow_action\n\
    \  samples[0]=analogRead(32)/8;  // fit into 512 pixels vertically\n  samples[1]=analogRead(33)/8;\n\
    \  samples[2]=digitalRead(21);\n  output_ready=1;\n}\nvoid ramp25_action() {dac25val++;\
    \ dacWrite(25,dac25val);}\nvoid pulse18_action() {do18=!do18; digitalWrite(18,do18);}\n\
    ```\n\nThe next code section defines functions that handle the communication with\
    \ the browser. The function `handle_notfound()` simply returns a reminder about\
    \ how to access the web interface. The following functions define the interaction\
    \ with the websocket. The function `sendMSG()` formats a JSON package from name\
    \ and value received as input and packs it into the `info_buffer`, whose availability\
    \ is signalled to the main program by setting `info_available` to unity. The function\
    \ `webSocketEvent` is the callback function that is executed every time something\
    \ related to the websocket happens, such as a disconnecting or connecting client,\
    \ which are simply reported to the serial line. Note that we use `sendMSG()` to\
    \ also report back to the browser that the connection was established. Note that\
    \ `sendMSG()` only formats the message, which is later sent outside the scope\
    \ of the callback function. The next case handles JSON-formatted messages coming\
    \ from the browser, from which we extract the name-value pairs for the name `cmd`\
    \ and `val`. Depending on the `cmd` the `switch-case` construction starts or stops\
    \ the data acquisition. It starts by registering `sampleslow_action()` for automatic\
    \ execution at the `sample_period` specified by `val`. Other commands set the\
    \ output pin DO18 and the DAC25 to the values specified in `val` or register \"\
    tickers\" to ramp the DAC or toggle pin DO18.\n\n```cpp\nvoid handle_notfound()\
    \ {\n  server2.send(404,\"text/plain\",\"not found, use http://ip-address/\");\n\
    }\nvoid sendMSG(char *nam, const char *msg) {\n  (void) sprintf(info_buffer,\"\
    {\"%s\":\"%s\"}\",nam,msg);\n  info_available=1;\n}\nvoid webSocketEvent(uint8_t\
    \ num, WStype_t type, uint8_t * payload,\n                    size_t length) {\n\
    \  Serial.printf(\"webSocketEvent(%d, %d, ...)\\r\\n\", num, type);\n  websock_num=num;\n\
    \  switch(type) {\n    case WStype_DISCONNECTED:\n      Serial.printf(\"[%u] Disconnected!\\\
    r\\n\", num);\n      break;\n    case WStype_CONNECTED:\n      {\n        IPAddress\
    \ ip = webSocket.remoteIP(num);\n        Serial.printf(\"[%u] Connected from %d.%d.%d.%d\
    \ url: %s\\r\\n\",\n          num, ip[0], ip[1], ip[2], ip[3], payload);\n   \
    \   }\n      sendMSG(\"INFO\",\"ESP32: Successfully connected\");\n      break;\n\
    \    case WStype_TEXT:\n      {\n        Serial.printf(\"[%u] get Text: %s\\r\\\
    n\", num, payload);\n        DynamicJsonDocument root(300);\n        deserializeJson(root,payload);\n\
    \        const char *cmd = root[\"cmd\"];\n        const long val = root[\"val\"\
    ];\n        if (strstr(cmd,\"START\")) {\n          sendMSG(\"INFO\",\"ESP32:\
    \ Received Start command\");\n          sample_period=val;\n          SampleSlow.attach_ms(sample_period,sampleslow_action);\n\
    \          Serial.print(\"sample_period = \"); Serial.println(sample_period);\n\
    \        } else if (strstr(cmd,\"STOP\")) {\n          sendMSG(\"INFO\",\"ESP32:\
    \ Received Stop command\");\n          SampleSlow.detach();\n        } else if\
    \ (strstr(cmd,\"DAC25\")) {\n          dacWrite(25,val);\n          sendMSG(\"\
    INFO\",\"ESP32: set DAC25 to requested value\");\n        } else if (strstr(cmd,\"\
    DO18\")) { digitalWrite(18,val);\n        } else if (strstr(cmd,\"RAMP25\")) {\n\
    \          if (val > 0) {Ramp25Ticker.attach_ms(val,ramp25_action);\n        \
    \  } else {Ramp25Ticker.detach();}\n        } else if (strstr(cmd,\"PULSE18\"\
    )) {\n          if (val > 0) {Pulse18Ticker.attach_ms(val,pulse18_action);\n \
    \         } else {Pulse18Ticker.detach();}\n        } else {\n          Serial.println(\"\
    Unknown command\");\n          sendMSG(\"INFO\",\"ESP32: Unknown command received\"\
    );\n        }\n      }\n  }\n}\n```\n\nIn the setup() function we first configure\
    \ the digital pins, the serial line, and the WLAN interface, before starting the\
    \ websocket and register the callback function webSocketEvent(). Then we start\
    \ server2 to dish out the webpage, register the callback function to do the dishing,\
    \ but only if the SPIFFS filesystem, which stores the html file, is present.\n\
    \n```cpp\nvoid setup() {\n  pinMode(21,INPUT_PULLUP);\n  pinMode(18,OUTPUT);\n\
    \  dacWrite(25,0); // initialize DAC\n  Serial.begin(115200); delay(1000);\n \
    \ WiFi.begin(ssid, password);\n  while (WiFi.status() != WL_CONNECTED) {delay(500);\
    \ Serial.print(\".\");}\n  Serial.print(\"\\nConnected to \");  Serial.print(ssid);\n\
    \  Serial.print(\" with IP address: \"); Serial.println(WiFi.localIP());\n  webSocket.begin();\n\
    \  webSocket.onEvent(webSocketEvent);\n  if (!SPIFFS.begin(true)) {\n    Serial.println(\"\
    ERROR: no SPIFFS filesystem found\"); return;\n  } else {\n    server2.begin();\n\
    \    server2.serveStatic(\"/\", SPIFFS, \"/esp32-daq.html\");\n    server2.onNotFound(handle_notfound);\n\
    \    Serial.println(\"SPIFFS file system found and server started\");\n  }\n}\n\
    ```"
  mdcn: "## 第13章\n\n## 示例：数据采集系统\n\n在本示例中，我们将通过浏览器使用WebSockets控制ESP32微控制器产生和测量的数字与模拟信号，这是一个类似于第8章温度服务器的系统。我们将控制数字输出引脚DO18，既可以设置其值，也可以按可选的重复频率自动切换它。我们还将把引脚25上的DAC设置为指定值，或在最小和最大电压之间反复斜坡变化，以产生具有可选速率的简单锯齿波信号。为了测量电压，我们以最高每秒200次的可选速率读取输入引脚DI21以及引脚32和33上的两个ADC通道。这为数字通道提供了（尽管较慢的）逻辑分析仪功能，为模拟通道提供了示波器功能。\n\
    \n图13.1展示了在浏览器窗口中运行的用户界面。顶行显示了用于启动和停止采集、选择采样间隔以及清除显示的按钮。下方文本框的颜色显示了输入引脚DI21的状态——红色表示关闭，绿色表示开启。复选框用于开启或关闭输出引脚DO18，右侧的选择菜单用于以可选速率切换DO18。标有DAC25的滑块设置DAC的输出电压，而其右侧的选择菜单则选择不同速率的锯齿波信号。标有ADC32和ADC33的两个条形图显示了两个ADC上的输入电压。图形窗口显示了相应的波形，ADC32为红色，ADC33为蓝色。在保存图13.1所示图像时，产生锯齿波的DAC25输出连接到了ADC32。在采集进行到大约一半时，引脚DO18被开启，以每秒一次的频率切换。它直接连接到ADC33，因此第二条波形显示了切换的电压。显示下方的第一行状态信息是在浏览器端生成的，第二行信息则来自ESP32。\n\
    \n现在，让我们转向赋予ESP32生命的代码。与第8章一样，我们首先从连接到WLAN的凭证开始，并包含了对WiFi、Web服务器、WebSockets、JSON和SPIFFS文件系统的支持。请注意，后者与之前在NodeMCU上使用的名称不同。然后我们定义了监听端口80的Web服务器和端口81的WebSockets。定时器用于生成采样输入引脚和控制输出引脚的重复动作。在定义了一些变量之后，我们定义了几个由定时器调用的函数，这里`sampleslow_action()`读取输入引脚，将其值存储在数组`samples`中，并通过设置`output_ready`标志来通知新数据的可用性。函数`ramp25_action()`递增8位变量`dac25`并将其写入DAC25。我们不需要担心超过255的值，因为高位会被自动截断。函数`pulse18_action()`简单地切换DO18。\n\
    \n220 ■ 使用Arduino和树莓派的传感器实践教程，第二版\n\n![](img/8f23875c54d5b3177d5d2a5bba06b37e_238_0.png)\n\
    \n图13.1 基于ESP32的数据采集系统的Web界面。\n\n```cpp\n// ESP32 DAQ, V. Ziemann, 221018\nconst\
    \ char* ssid     = \"messnetz\";\nconst char* password = \"zxcvZXCV\";\n#include\
    \ <WiFi.h>\n#include <WebServer.h>\n#include <WebSocketsServer.h>\n#include <ArduinoJson.h>\n\
    #include <SPIFFS.h>\nWebServer server2(80);                          // port 80\n\
    WebSocketsServer webSocket = WebSocketsServer(81);  // port 81\n#include <Ticker.h>\n\
    Ticker SampleSlow,Ramp25Ticker,Pulse18Ticker;\nvolatile uint8_t websock_num=0,info_available=0,output_ready=0;\n\
    int sample_period=100,samples[3];\nuint8_t dac25val=0,do18=0;\nchar info_buffer[80];\n\
    char out[300]; DynamicJsonDocument doc(300);\nvoid sampleslow_action() { //.......................sampleslow_action\n\
    \  samples[0]=analogRead(32)/8;  // fit into 512 pixels vertically\n  samples[1]=analogRead(33)/8;\n\
    \  samples[2]=digitalRead(21);\n  output_ready=1;\n}\nvoid ramp25_action() {dac25val++;\
    \ dacWrite(25,dac25val);}\nvoid pulse18_action() {do18=!do18; digitalWrite(18,do18);}\n\
    ```\n\n下一个代码部分定义了处理与浏览器通信的函数。函数`handle_notfound()`简单地返回一个关于如何访问Web界面的提示。接下来的函数定义了与WebSocket的交互。函数`sendMSG()`根据输入的名称和值格式化一个JSON数据包，并将其打包到`info_buffer`中，其可用性通过将`info_available`设置为1来通知主程序。函数`webSocketEvent`是一个回调函数，每当与WebSocket相关的事件发生时（例如客户端断开或连接）就会执行，这些事件只是简单地报告到串行线。请注意，我们使用`sendMSG()`也向浏览器报告连接已建立。请注意，`sendMSG()`只格式化消息，该消息稍后在回调函数作用域之外发送。下一个case处理来自浏览器的JSON格式消息，我们从中提取名为`cmd`和`val`的名称-值对。根据`cmd`，`switch-case`结构启动或停止数据采集。它首先通过在`val`指定的`sample_period`间隔自动执行`sampleslow_action()`来启动。其他命令将输出引脚DO18和DAC25设置为`val`中指定的值，或注册“定时器”来斜坡变化DAC或切换引脚DO18。\n\
    \n```cpp\nvoid handle_notfound() {\n  server2.send(404,\"text/plain\",\"not found,\
    \ use http://ip-address/\");\n}\nvoid sendMSG(char *nam, const char *msg) {\n\
    \  (void) sprintf(info_buffer,\"{\"%s\":\"%s\"}\",nam,msg);\n  info_available=1;\n\
    }\nvoid webSocketEvent(uint8_t num, WStype_t type, uint8_t * payload,\n      \
    \              size_t length) {\n  Serial.printf(\"webSocketEvent(%d, %d, ...)\\\
    r\\n\", num, type);\n  websock_num=num;\n  switch(type) {\n    case WStype_DISCONNECTED:\n\
    \      Serial.printf(\"[%u] Disconnected!\\r\\n\", num);\n      break;\n    case\
    \ WStype_CONNECTED:\n      {\n        IPAddress ip = webSocket.remoteIP(num);\n\
    \        Serial.printf(\"[%u] Connected from %d.%d.%d.%d url: %s\\r\\n\",\n  \
    \        num, ip[0], ip[1], ip[2], ip[3], payload);\n      }\n      sendMSG(\"\
    INFO\",\"ESP32: Successfully connected\");\n      break;\n    case WStype_TEXT:\n\
    \      {\n        Serial.printf(\"[%u] get Text: %s\\r\\n\", num, payload);\n\
    \        DynamicJsonDocument root(300);\n        deserializeJson(root,payload);\n\
    \        const char *cmd = root[\"cmd\"];\n        const long val = root[\"val\"\
    ];\n        if (strstr(cmd,\"START\")) {\n          sendMSG(\"INFO\",\"ESP32:\
    \ Received Start command\");\n          sample_period=val;\n          SampleSlow.attach_ms(sample_period,sampleslow_action);\n\
    \          Serial.print(\"sample_period = \"); Serial.println(sample_period);\n\
    \        } else if (strstr(cmd,\"STOP\")) {\n          sendMSG(\"INFO\",\"ESP32:\
    \ Received Stop command\");\n          SampleSlow.detach();\n        } else if\
    \ (strstr(cmd,\"DAC25\")) {\n          dacWrite(25,val);\n          sendMSG(\"\
    INFO\",\"ESP32: set DAC25 to requested value\");\n        } else if (strstr(cmd,\"\
    DO18\")) { digitalWrite(18,val);\n        } else if (strstr(cmd,\"RAMP25\")) {\n\
    \          if (val > 0) {Ramp25Ticker.attach_ms(val,ramp25_action);\n        \
    \  } else {Ramp25Ticker.detach();}\n        } else if (strstr(cmd,\"PULSE18\"\
    )) {\n          if (val > 0) {Pulse18Ticker.attach_ms(val,pulse18_action);\n \
    \         } else {Pulse18Ticker.detach();}\n        } else {\n          Serial.println(\"\
    Unknown command\");\n          sendMSG(\"INFO\",\"ESP32: Unknown command received\"\
    );\n        }\n      }\n  }\n}\n```\n\n在`setup()`函数中，我们首先配置数字引脚、串行线和WLAN接口，然后启动WebSocket并注册回调函数`webSocketEvent()`。接着我们启动`server2`来提供网页，注册回调函数来执行提供操作，但前提是存储HTML文件的SPIFFS文件系统存在。\n\
    \n```cpp\nvoid setup() {\n  pinMode(21,INPUT_PULLUP);\n  pinMode(18,OUTPUT);\n\
    \  dacWrite(25,0); // initialize DAC\n  Serial.begin(115200); delay(1000);\n \
    \ WiFi.begin(ssid, password);\n  while (WiFi.status() != WL_CONNECTED) {delay(500);\
    \ Serial.print(\".\");}\n  Serial.print(\"\\nConnected to \");  Serial.print(ssid);\n\
    \  Serial.print(\" with IP address: \"); Serial.println(WiFi.localIP());\n  webSocket.begin();\n\
    \  webSocket.onEvent(webSocketEvent);\n  if (!SPIFFS.begin(true)) {\n    Serial.println(\"\
    ERROR: no SPIFFS filesystem found\"); return;\n  } else {\n    server2.begin();\n\
    \    server2.serveStatic(\"/\", SPIFFS, \"/esp32-daq.html\");\n    server2.onNotFound(handle_notfound);\n\
    \    Serial.println(\"SPIFFS file system found and server started\");\n  }\n}\n\
    ```"
