    \ to present a file named index.html by default, if only the address of the folder\
    \ is given.\n\nSo, we need to prepare a simple web page, which is a specially\
    \ formatted text file in a format called HTML – an acronym for *Hyper-Text Markup\
    \ Language*. There are plenty of books on the subject, and tutorials can be found\
    \ on the web in abundance. Here we only use the most basic features. We navigate\
    \ to the directory /var/www/html/ and save index.html as a backup with sudo mv\
    \ index.html index.html.bak. Then we start our favorite editor as superuser by\
    \ prepending sudo, enter the following text, and save the contents as index.html.\n\
    \n```\n<!DOCTYPE HTML>\n<HTML>\n  <HEAD>\n    <TITLE>Raspi Web Server</TITLE>\n\
    \  </HEAD>\n  <BODY>\n    <H1 ALIGN=CENTER>Raspi Web Server Main Page</H1>\n \
    \   <HR SIZE=2 WIDTH=80%>\n    <H3>Available Goodies:</H3>\n    <UL>\n      <LI>\
    \ <A HREF=\"temp/\">Temperature Graph</A> </LI>\n      <LI> <A HREF=\"https://www.w3schools.com/html\"\
    >\n            HTML Tutorial</A> </LI>\n      <LI> <A HREF=\"https://www.w3resource.com/\"\
    >\n            W3resource tutorials</A>\n      <LI> <A HREF=\"https://www.raspberrypi.org\"\
    >\n            Raspberry Pi web site</A> </LI>\n      <LI> <A HREF=\"https://www.arduino.cc\"\
    >Arduino web site</A> </LI>\n    </UL>\n  </BODY>\n</HTML>\n```\n\nIf no typos\
    \ crept in, by entering the address http://localhost on a browser running locally\
    \ on the Raspi we should see the page shown in Figure 5.11. This is how the web\
    \ browser renders the contents of the file we just entered and now briefly discuss.\
    \ At the top of the file we have the declaration of the document type; it is an\
    \ HTML file. Then we have the opening tag <HTML> and a matching closing tag </HTML>\
    \ at the end of the file. Anything between them describes the contents of the\
    \ web page. Note that HTML tags (almost) always come in pairs: the tag name in\
    \ angle brackets and a matching closing tag with the same name, but prepended\
    \ with a slash. The next tags we encounter in the file are HEAD and TITLE, which\
    \ describe things that do not show up on the page but appear in the title bar\
    \ of the web browser. Finally, we reach the BODY tags, where we find the description\
    \ of the web page proper. The <H1> tag declares a large headline, and the ALIGN\
    \ directive specifies it to be centered on the web page. There are different levels\
    \ of header tags, from H1 to H6. The next line defines a horizontal rule with\
    \ the <HR> tag that covers 80% of the width of the page. Then we add a smaller\
    \ header with <H3> and an unnumbered list between the <UL> tags, with each list\
    \ item described by <LI> tags. The <A> tag is called an anchor. It points to other\
    \ websites specified in the HREF directive. The first list item points to a local\
    \ directory temp/ under the directory where the file index.html resides. Since\
    \ this does not yet exist, we need to create it."
