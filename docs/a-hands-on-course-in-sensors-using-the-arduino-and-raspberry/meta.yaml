- md: "## 4.6.3 WiFi\n\nFor this section, we use a NodeMCU system that is connected\
    \ to the host computer with a USB cable for programming. Moreover, the device\
    \ support package as described in [Section 4.2](#) must be installed in the Arduino\
    \ IDE. Our task is to connect the NodeMCU to a local wireless network; we assume\
    \ it is called `MyHomeNet` and that it can be reached by other computers connected\
    \ to the same network. All these computers will be able to query the measurement\
    \ values of sensors connected to the NodeMCU. To better understand the setup,\
    \ let us briefly discuss some general features of computer networks.\n\nEverybody\
    \ is probably familiar with the fact that computers on the Internet are identified\
    \ by IP numbers, such as `192.168.10.200`. Because the numbers are difficult to\
    \ remember, there are also aliases such as `www.cnn.com`, and the translation\
    \ is done by so-called *domain name resolution* or DNS servers. On our simple\
    \ network, we assume that we can keep track of the numbers, and all sensors and\
    \ host computers are connected to the (class-C) network `192.168.10.nn` where\
    \ `nn` is a number between 2 and 254. The numbers 0 and 255 are reserved for special\
    \ purposes, and we assume that the router that connects our network to the outside\
    \ world (“the Internet”) has the IP number `192.168.10.1`. Note that the addresses\
    \ starting with `192.168` are private numbers and can be used by anyone, provided\
    \ that a router separates this network from the Internet. But we confine all our\
    \ communication to within the `192.168.10` network, and identify each computer\
    \ by its IP number. Each computer can potentially provide different services,\
    \ such as running a web server, a measurement server, a mail server, or a server\
    \ to allow logging onto the computer with standard protocols such as `telnet`,\
    \ `ftp`, or `ssh`. The different services that a computer provides are identified\
    \ by a *port number*. As an analogy, it may help to think of the IP number as\
    \ a street address of an apartment building and the port numbers as the apartment\
    \ numbers. The communication with a server that provides a service on a computer\
    \ therefore requires the specification of the IP number and the port number.\n\
    \nBut how does a computer know its own IP number? There are two ways to specify\
    \ this: by configuring the network setup manually and assigning the IP number\
    \ explicitly. We use the second way and dynamically acquire the IP number via\
    \ the *dynamic host configuration protocol*, DHCP, which is much more convenient,\
    \ provided such functionality is available on a given network. In most networks\
    \ with a wireless router, the router provides this service and one only has to\
    \ tell a computer to use DHCP. In that case, the computer sends a request for\
    \ an IP number at power-up. The DHCP server responds with an IP number that is\
    \ then assigned to the newly connected computer. We assume that a DHCP server\
    \ is running on our `192.168.10` network and the NodeMCU is also configured by\
    \ default to use DHCP.\n\nWireless networks are normally protected from unauthorized\
    \ use by encrypting the communication. Most networks use an encryption standard\
    \ called WPA that requires entering a password to connect to the network. We assume\
    \ that the “MyHomeNet” WLAN is of that type. Having covered the networking basics,\
    \ we are ready to connect our Arduino clone, the NodeMCU, to the WLAN.\n\nFirst\
    \ we discuss the running of a simple web server on the NodeMCU, that uses the\
    \ standard `http` protocol to communicate with other computers on the network.\
    \ The following program shows how to set up a web server that listens on the default\
    \ `http` port number 80. It provides access to temperature measurements and allows\
    \ one to control the brightness of an LED. In our example we query the temperature\
    \ measured by the NodeMCU, by directing a browser such as Mozilla Firefox to the\
    \ address of the NodeMCU at [http://192.168.10.nn/temperature](http://192.168.10.nn/temperature),\
    \ and the NodeMCU returns a web page with the temperature measured by an LM35\
    \ temperature sensor. The brightness of the built-in LED is controlled by adding\
    \ a value to the address after a question mark, such that\n\n![](img/8f23875c54d5b3177d5d2a5bba06b37e_131_0.png)\n\
    \nFigure 4.27 The NodeMCU with an LM35 temperature sensor†.\n\nhttp://192.168.10.nn/led?b=1023\
    \ sets the brightness to its maximum value. The circuit schematic is shown in\
    \ Figure 4.27, and the code that brings it to life is the following.\n\n```cpp\n\
    // TemperatureWebServerBrightness, V. Ziemann, 221214\n#include <ESP8266WiFi.h>\n\
    const char* ssid     = \"MyHomeNet\";\nconst char* password = \".......\";\nWiFiServer\
    \ server(80);  // server listens on html port 80\nvoid setup() {\n  pinMode(D0,OUTPUT);\
    \    // D0=GPIO16=LED_BUILTIN on NodeMCU\n  Serial.begin(115200); delay(10);\n\
    \  Serial.print(\"Connecting to \"); Serial.println(ssid);\n  WiFi.begin(ssid,\
    \ password);\n  while (WiFi.status() != WL_CONNECTED) {delay(500); Serial.print(\"\
    .\");}\n  Serial.print(\"\\nWiFi connected and \"); server.begin();\n  Serial.print(\"\
    server started at \"); Serial.println(WiFi.localIP());\n}\nvoid loop() {\n  WiFiClient\
    \ client = server.available();\n  while (client) {\n    Serial.println(\"new client\"\
    );\n    while(!client.available()){delay(1);}\n    String req = client.readStringUntil('\\\
    r');\n    Serial.println(req);\n    client.flush();\n    client.print(\"HTTP/1.1\
    \ 200 OK\\r\\nContent-Type: text/html\");\n    client.print(\"\\r\\n\\r\\n<!DOCTYPE\
    \ HTML>\\r\\n<html>\\r\\n\");\n    if (req.indexOf(\"/temperature\") != -1) {\n\
    \      float temp=100*3.3*analogRead(0)/1023;\n      client.print(\"Temperature=\"\
    ); client.print(temp,2);\n    } else if (req.indexOf(\"/led\") != -1) {\n    \
    \  int i1=req.indexOf(\"?b=\"); int i2=req.indexOf(\"HTTP\");\n      String payload=req.substring(i1+3,i2-1);\n\
    \      Serial.println(payload);\n      if (i1>0) analogWrite(D4,1023-payload.toInt());\n\
    \      client.print(\"Setting LED brightness to \"); client.print(payload);\n\
    \    }\n    client.println(\"</html>\"); delay(1);\n    client.stop();\n  }\n\
    }\n```\n\nIn this example we first include the header file with the ESP8266WiFi.h\
    \ library information, define the access parameters ssid and password for the\
    \ wireless network, and instantiate the server to listen on the default http-port\
    \ 80. In the setup() function, the serial line is opened to be able to listen\
    \ to debug information. Then the connection to the wireless network is established\
    \ with the WiFi.begin() function. Inside this function, the log-on to the wireless\
    \ network and the communication with the DHCP server is handled. Once WiFi.status\
    \ reports that the connection is established, we print information about the connection,\
    \ such as the acquired IP number, to the serial line. Then we start the server\
    \ with the call to the server.begin() function. In the loop() function a similar\
    \ construction as before receives a request from a client, stores the request\
    \ in the variable req, returns a standard http header with Content-type to the\
    \ client and then checks whether the request req contains the string /temperature.\
    \ If it does, the sketch determines the temperature with a call to the analogRead()\
    \ function, and writes the value back to the client. Note that this time we use\
    \ the indexOf method of a String to determine whether a substring is present.\
    \ If req contains /led, we determine the position of the question mark and trailing\
    \ characters HTTP and extract everything in between as the payload. After conversion\
    \ to an integer, we use the payload to set the brightness of the built-in LED.\
    \ We can inspect how req is constructed and why we have to find the trailing HTTP\
    \ by printing with Serial.println(req). If an unknown request arrives, we are\
    \ notified on the serial line. Finally, we add the concluding </html> tag and\
    \ close the connection to the client. We point out that in this simple example\
    \ we do not check the validity of the payload, which poses a potential security\
    \ risk, if the system is reachable from the Internet.\n\nA few words are needed\
    \ about the cryptic HTTP header that the NodeMCU returns to the calling browser.\
    \ When a browser, such as Firefox or Chromium, connects to a web server on the\
    \ default port 80, it first sends the name of the requested web page, such as\
    \ GET /temperature in the above example, as an HTTP-GET request. Before returning\
    \ the requested web page, the server sends some meta-information, such as a status\
    \ code, and what type of information comes next. The status code for a properly\
    \ understood request is 200, and for a missing page it is 404, a number probably\
    \ everyone has seen as a response to a typo in the specification of a web page.\
    \ The type may be an image, a media file such as a video, or HTML-formatted text,\
    \ which is what we specify in the sketch as Content-Type. After an empty line\
    \ the normal HTML header with the DOCTYPE follows, and the information embedded\
    \ in <html> tags. We will discuss HTML and the structure of web pages in more\
    \ detail in Section 5.7. Browsers do not render the meta-information, which therefore\
    \ remains invisible, but we can eavesdrop on the communication with the netcat\
    \ or telnet commands (more on those commands later in Section 5.3) by pointing\
    \ them to port 80 on the NodeMCU at IP address 192.68.20.184 and issuing GET /temperature\
    \ by hand. All output from the server sub-sequentially appears in the same window.\
    \ Figure 4.28 illustrates the exchange.\n\nSetting the brightness of the LED uses\
    \ the same mechanism that is used to enter credit-card numbers when shopping online.\
    \ It is based on the HTTP-GET method as well, but adds a query-string that follows\
    \ the question mark after the address. The query-string has the form name=value.\
    \ This mechanism to send information to a web server is often used"
  mdcn: "## 4.6.3 WiFi\n\n在本节中，我们使用一个通过USB线连接到主机进行编程的NodeMCU系统。此外，必须在Arduino IDE中安装[第4.2节](#)所述的设备支持包。我们的任务是将NodeMCU连接到本地无线网络；我们假设该网络名为`MyHomeNet`，并且同一网络中的其他计算机可以访问它。所有这些计算机都将能够查询连接到NodeMCU的传感器的测量值。为了更好地理解这个设置，让我们简要讨论一下计算机网络的一些基本特征。\n\
    \n大家可能都熟悉这样一个事实：互联网上的计算机通过IP地址来标识，例如`192.168.10.200`。由于这些数字难以记忆，因此也有像`www.cnn.com`这样的别名，而翻译工作由所谓的*域名解析*或DNS服务器完成。在我们这个简单的网络中，我们假设可以记住这些数字，并且所有传感器和主机计算机都连接到（C类）网络`192.168.10.nn`，其中`nn`是2到254之间的数字。数字0和255保留用于特殊目的，我们假设将我们的网络连接到外部世界（“互联网”）的路由器的IP地址为`192.168.10.1`。请注意，以`192.168`开头的地址是私有地址，任何人都可以使用，前提是有一个路由器将此网络与互联网隔开。但我们所有的通信都限制在`192.168.10`网络内，并通过IP地址标识每台计算机。每台计算机都可能提供不同的服务，例如运行Web服务器、测量服务器、邮件服务器，或允许使用`telnet`、`ftp`或`ssh`等标准协议登录计算机的服务器。计算机提供的不同服务通过*端口号*来标识。打个比方，可以将IP地址想象成公寓楼的街道地址，而端口号则是公寓号。因此，与提供服务的计算机上的服务器进行通信需要指定IP地址和端口号。\n\
    \n但是计算机如何知道自己的IP地址呢？有两种指定方式：通过手动配置网络设置并显式分配IP地址。我们使用第二种方式，即通过*动态主机配置协议*（DHCP）动态获取IP地址，这要方便得多，前提是给定网络具有此功能。在大多数带有无线路由器的网络中，路由器提供此服务，只需告诉计算机使用DHCP即可。在这种情况下，计算机在启动时会发送IP地址请求。DHCP服务器会响应一个IP地址，然后将其分配给新连接的计算机。我们假设`192.168.10`网络上运行着DHCP服务器，并且NodeMCU默认也配置为使用DHCP。\n\
    \n无线网络通常通过对通信进行加密来防止未经授权的使用。大多数网络使用一种名为WPA的加密标准，该标准要求输入密码才能连接到网络。我们假设“MyHomeNet”无线局域网属于这种类型。了解了网络基础知识后，我们就可以将我们的Arduino克隆板NodeMCU连接到无线局域网了。\n\
    \n首先，我们讨论在NodeMCU上运行一个简单的Web服务器，该服务器使用标准的`http`协议与网络上的其他计算机进行通信。以下程序展示了如何设置一个监听默认`http`端口号80的Web服务器。它提供对温度测量的访问，并允许控制LED的亮度。在我们的示例中，我们通过将浏览器（如Mozilla\
    \ Firefox）定向到NodeMCU的地址[http://192.168.10.nn/temperature](http://192.168.10.nn/temperature)来查询NodeMCU测量的温度，NodeMCU会返回一个包含LM35温度传感器测量温度的网页。内置LED的亮度通过在地址后添加一个问号和值来控制，例如：\n\
    \n![](img/8f23875c54d5b3177d5d2a5bba06b37e_131_0.png)\n\n图4.27 带有LM35温度传感器的NodeMCU†。\n\
    \nhttp://192.168.10.nn/led?b=1023 将亮度设置为最大值。电路原理图如图4.27所示，使其工作的代码如下。\n\n```cpp\n\
    // TemperatureWebServerBrightness, V. Ziemann, 221214\n#include <ESP8266WiFi.h>\n\
    const char* ssid     = \"MyHomeNet\";\nconst char* password = \".......\";\nWiFiServer\
