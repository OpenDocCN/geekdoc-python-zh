    ![](img/8f23875c54d5b3177d5d2a5bba06b37e_25_0.png)


    Figure 2.2 The band-level scheme and the schematics for the circuit with the LDR
    in a voltage divider. The upper graph illustrates dark conditions, and the lower
    graph shows conditions where the LDR is exposed to light. Note that the vertical
    axis by convention shows the energy of electrons. This causes the positive pole
    of the battery to have the most negative energy. See the text for a discussion.'
  - '[PAGE 26]


    8 ■ A Hands-On Course in Sensors Using the Arduino and Raspberry Pi, Second Edition


    ![](img/8f23875c54d5b3177d5d2a5bba06b37e_26_0.png)


    Figure 2.3 NTC resistors are doped semiconductors that have donor levels just
    below the conduction band. Increasing the temperature increases the kinetic energy
    of the electrons that allows them to occasionally jump into the conduction band,
    where they contribute to the conductivity of the material.


    Intuitively one might think of the crystal ions at higher temperature to oscillate
    with larger amplitudes, creating a larger target for the electrons to scatter,
    thus impeding their motion. Since this is an intrinsic property of the material,
    calibration measurements of resistance as a function of temperature are universally
    valid for all sensors of the same metal, provided the metal is very pure and free
    of imperfections. Commercial sensors are often made of platinum wire wound on
    a ceramic support body. The PT100 sensors are connected to a calibrated current
    source, similar to the one shown on the right-hand side in Figure 2.17. The voltage
    drop across the sensor is then measured with a volt meter, just as any other resistance
    measurement.


    Thermistors are resistors that have their temperature dependence deliberately
    made large. In *positive temperature calibration* (PTC) devices, the resistance
    increases with temperature, and in *negative temperature calibration* (NTC) devices,
    it decreases. PTCs are mostly used as protection devices that switch the resistance
    from a low- to a high-resistance state if a certain temperature is exceeded. They
    are based on polycrystalline materials that change their dielectric constant at
    a certain temperature, the Curie temperature, by a large amount. Above the Curie
    temperature, the state of the magnetic dipoles is disordered, and the dielectric
    constant is small. This causes the formation of large potential barriers between
    the crystal grains, which leads to a high resistance. Below the Curie temperature
    the molecular dipoles are aligned, the dielectric constant is large, and the resistance
    is low. A typical application of the PTC thermistor is a self-regulating heater,
    in which the heater also warms up the thermistor, which increases the resistance
    and limits the current to the heater until an equilibrium is found. PTCs can also
    be used to detect whether a threshold temperature is exceeded.


    The converse thermistors are NTCs, which decrease their resistance with increasing
    temperature. They are often used for temperature sensing and are based on a doped
    semiconducting material that has occupied impurity donor levels below the conduction
    band, as shown in Figure 2.3. Increasing the temperature thermally excites these
    electrons to jump into the conduction band, thus increasing the conductivity.
    This effect is much larger than the reduction of the resistance due to the ions
    oscillating and impeding the motion of the electrons, which was responsible for
    the temperature dependence in the PT100 sensor. Both NTC and PTC thermistors are
    sensed by connecting them to a constant-current source and measuring the voltage
    drop across the thermistor.


    A number of *position sensors*, either for rotary or linear position, are based
    on potentiometers. A potentiometer is a variable resistor where a slider moves
    up and down a'
- md: '## 2.1.2 Voltage-based sensors


    Figure 2.4 A rotary and a linear potentiometer (left) and a circuit illustrating
    the electric connections (right)†.


    resistance and shortens the distance of one end point to the slider, thereby reducing
    the resistance between two of the terminals. The distance between the slider and
    the other end point lengthens, causing the resistance between the slider and the
    other terminal to increase correspondingly. On the left-hand side of Figure 2.4
    we show a rotary and a linear potentiometer with three connectors; the two end
    points are connected to dark wires, and the one controlled by the slider is connected
    to a lighter-colored wire. The schematic view on the right of Figure 2.4 explains
    the functionality; the slider controls a variable mid-point of a voltage divider
    and the output voltage interpolates from 0 to 5 V in this case. A variation of
    the potentiometer is a joystick, which is based on two orthogonally mounted potentiometers,
    controlled by a small stick. We simply need to measure the voltage on the output
    with respect to ground in order to determine the position of the slider or the
    stick. An image of a joystick is shown on the left of Figure 2.5.


    Also, fluid levels of liquids with a small conductivity can be determined with
    a resistor whose resistance is varied by reducing the resistance between conducting
    stripes shown in Figure 2.5. The sensor is connected just as a potentiometer with
    the liquid level acting as the slider.


    Applying an external force to a material changes its equilibrium shape, and therefore
    strains the material. An example is a stretched wire that gets longer and thinner
    if pulled. Consider the resistance $R = \rho L/A$ of the wire, given in terms
    of resistivity $\rho$, length $L$, and cross-section $A$, and consider its change.
    We see that increasing $L$ and decreasing $A$ increases the resistance $R$. Thus,
    the simple wire converts its deformation to a small change in the resistivity,
    and therefore serves as a force-sensitive resistor that is often used as one branch
    in a Wheatstone bridge. The small effect of only changing the geometry of the
    wire can be greatly enhanced by using heavily doped semiconductors instead. The
    latter also change their resistivity $\rho$ by a large amount when strained. Alternatively,
    they are based on polymer thick-film technology. An example is the strain gauge
    shown in Figure 2.6.


    Figure 2.5 A joystick (left) and a fluid-level resistive sensor (right).


    Figure 2.6 A strain gauge.


    The MQ-2 and other MQ-x are *gas sensors* sensitive to different types of gas,
    depending on their type specification. They are based on a semiconductor substrate
    with a thin surface layer of polycrystalline $SnO_2$ tin oxide that is either
    sputtered or deposited by evaporation. The specificity to various gases depends
    on the temperature of the active area, which is adjusted by a heater, by the method
    of deposition, or by small additions of other materials, such as palladium, gold,
    or platinum. The variation of the resistance depends on the grain boundaries of
    the polycrystalline $SnO_2$ and on the insulating oxide layer between the grains
    that is affected by the adsorbed gases. On the left of Figure 2.7 we illustrate
    the working principle. The heater is located under the $SnO_2$ active layer and
    powered by passing a current through it. The resistance, which depends on the
    concentration of the specific gas, can be measured between the terminals labeled
    1 and 2. A device mounted on a small breakout board is shown on the right of Figure
    2.7. The heated sensing area is located under a protective metallic cover.


    After this short selection of resistance-based sensors we progress to discuss
    sensors that report a voltage directly.


    An example of a sensor that directly produces a voltage at its output pin is the
    LM35 *temperature sensor*, which is a silicon-bandgap temperature sensor. The
    operating principle is based on passing known currents $I_n$ with $n = 1, 2$ with
    current densities $j_n$ across the base-emitter junctions of two bipolar transistors,
    and comparing their respective voltage drops $V_{BE,n}$. The voltage difference
    is proportional to the temperature. This is easily understandable by inverting
    the current–voltage curve for the diode of the base-emitter junction


    $$j_n = A(T) \left[ e^{(eV_{BE,n} - E_g)/kT} - 1 \right]$$


    where $E_g = 1.2\text{V}$ is the bandgap energy of silicon, $k$ is the Boltzmann
    constant, and $T$ the absolute temperature in Kelvin. $A(T)$ is a device-specific
    constant with moderate temperature dependence. Assuming that both transistors
    are located on the same substrate and have the same temperature, we solve for
    two current densities $j_1$ and $j_2$ and obtain for the voltage difference $\Delta
    V_{BE} = V_{BE,1} - V_{BE,2} = kT/e \ln(j_1/j_2)$. In the LM35, the base-emitter
    diodes of the two transistors have different areas such that the ratio of the
    areas determines the current densities, provided that the same macroscopic current
    passes through the two transistors. There are operational amplifiers on the same
    substrate to provide signal conditioning such that the LM35 produces an output
    voltage $V_s$ that is related to the temperature $T$ by $V_s = T/100$. Here $V_s$
    is measured in volts and the temperature in degrees Celsius, such that a temperature
    of $23\,^\circ\text{C}$ results in a voltage of $0.23\text{V}$. The LM35 has three
    pins; one is connected to ground, one to the supply voltage, and the third one
    carries the voltage $V_s$ that is proportional to the temperature. Note the polarity
    for connecting the LM35 in Figure 2.8. The flat surface is pointing to the wires
    on the left-hand side.


    *Thermocouples* are temperature sensors that are based on the effects of temperature
    and temperature gradient on conductors made of different materials. Directly at
    the junction of the conductors, the Peltier effect causes a current that depends
    on the temperature. This happens at the points labeled by their respective temperatures
    $T_1$ and $T_2$ on the top left in Figure 2.9. On the wire segments a temperature
    gradient causes an additional current to flow, the Thomson effect. And finally,
    joining the two junctions and the wires causes a current to circulate, provided
    the loop is closed. This is called the Seebeck effect. If the loop is open, as
    shown at the top left of Figure 2.9, a voltage $U$ develops at the end terminals
    as a consequence of the Peltier, Thomson, and Seebeck effects. In practice, one
    junction, say at $T_1$, is held at known and constant temperature, for example,
    by immersing the junction in ice water. Then the voltage $U$ is related to the
    temperature difference $T_2 - T_1$ of the sensing end at $T_2$ and the reference
    temperature $T_1$. The magnitude of the voltage generated depends on the combination
    of metals and is typically on the order of $50\,\mu\text{V}/^\circ\text{C}$.


    In a *thermopile* a number of wire segments of materials A and B are connected
    in series, as shown on the bottom left in Figure 2.9. This increases the sensitivity
    of the device to temperature differences. Thermopiles are often found in devices
    sensing heat and infrared radiation, such as thermal imaging devices or contact-free
    thermometers. The sensor used in the latter is shown on the right of Figure 2.9.


    Figure 2.7 Schematic of an MQ-x gas detector (left) and a sensor mounted on a
    small breakout board (right).


    Figure 2.8 Image of an LM35 temperature sensor (left) and how to connect it (right†).


    12 ■ A Hands-On Course in Sensors Using the Arduino and Raspberry Pi, Second Edition


    Figure 2.9 The schematic of a thermocouple (top left), of a thermopile (bottom
    left), and an image of an MLX90614 contact-free thermometer (right).


    Some crystals and ceramics react to external stresses by producing a *piezoelectric*
    voltage between opposite sides of the material, as a consequence of rearranging
    charges within their crystal structure. The resulting voltages reach several kV
    and can be used to produce sparks in ignition circuits or in old-fashioned vinyl
    record players. There, a “crystal”-stylus is squeezed in the grooves of the record,
    and the generated voltages are amplified and made audible as sound. In scientific
    applications, piezoelectric sensors are used to measure pressures or forces.


    The speed of angular motion is easily sensed by a DC electrical motor that is
    operated backward as a generator. Instead of applying a voltage to turn the axis
    of the motor, turning the axis induces an induction voltage in the motor coils
    that is proportional to the angular velocity. Attached to a propeller that is
    turned by either a flowing liquid or a gas, such a device can measure *flow rates*.


    *Hall sensors* produce a voltage that is proportional to the *magnetic induction
    B*. Their mode of operation is explained in Figure 2.10 and is based on passing
    a known current *I* through a semiconductor. In the presence of a magnetic field,
    the Lorentz force deflects the charge carriers – electrons and holes – towards
    perpendicularly mounted electrodes (shaded). This creates a potential difference
    (a voltage) between the electrodes, which causes a transverse electric field that
    counteracts the deflection from the Lorentz force such that the following charge
    carriers can move towards the exit electrode undeflected. In equilibrium, the
    voltage difference between the upper and lower electrodes is proportional to the
    magnetic induction *B* and can be measured with a voltmeter. The A1324 Hall sensor,
    shown on the right in Figure 2.10, has signal-conditioning circuitry on board
    and only needs three pins.


    Figure 2.10 Schematic of a Hall sensor (left) and the A1324 sensor (right).'
  mdcn: '## 2.1.2 基于电压的传感器


    图 2.4 旋转式和线性电位器（左）以及说明电气连接的电路图（右）†。


    电阻，并缩短一端点到滑片的距离，从而减小两个端子之间的电阻。滑片与另一端点之间的距离变长，导致滑片与另一端子之间的电阻相应增加。在图 2.4 的左侧，我们展示了一个带有三个连接器的旋转式和线性电位器；两个端点连接到深色导线，由滑片控制的那个连接到颜色较浅的导线。图
    2.4 右侧的示意图解释了其功能；滑片控制着分压器的可变中点，在此例中，输出电压在 0 到 5 V 之间插值。电位器的一个变体是操纵杆，它基于两个正交安装的电位器，由一个小操纵杆控制。我们只需测量输出端相对于地的电压，即可确定滑片或操纵杆的位置。图
    2.5 左侧显示了操纵杆的图像。


    此外，具有微弱导电性的液体的液位也可以用电阻来确定，该电阻的阻值通过减小图 2.5 所示导电条带之间的电阻来改变。该传感器的连接方式与电位器相同，液位充当滑片。


    对材料施加外力会改变其平衡形状，从而使材料产生应变。一个例子是拉伸的导线，如果被拉伸，它会变得更长更细。考虑导线的电阻 $R = \rho L/A$，其中
    $\rho$ 是电阻率，$L$ 是长度，$A$ 是横截面积，并考虑其变化。我们看到，增加 $L$ 和减小 $A$ 会增加电阻 $R$。因此，简单的导线将其形变转换为电阻率的微小变化，从而用作力敏电阻，通常用作惠斯通电桥的一个支路。仅改变导线几何形状的微小效应可以通过使用重掺杂半导体来大大增强。后者在应变时也会使其电阻率
    $\rho$ 发生很大变化。或者，它们基于聚合物厚膜技术。一个例子是图 2.6 所示的应变片。


    图 2.5 操纵杆（左）和液位电阻式传感器（右）。


    图 2.6 应变片。


    MQ-2 和其他 MQ-x 是*气体传感器*，根据其类型规格对不同类型的气体敏感。它们基于半导体基底，其上有一层薄薄的多晶 $SnO_2$ 氧化锡表面层，该层通过溅射或蒸发沉积。对各种气体的特异性取决于活性区域的温度（由加热器调节）、沉积方法或少量添加的其他材料（如钯、金或铂）。电阻的变化取决于多晶
    $SnO_2$ 的晶界以及受吸附气体影响的晶粒间绝缘氧化层。在图 2.7 的左侧，我们说明了工作原理。加热器位于 $SnO_2$ 活性层下方，通过电流加热。电阻（取决于特定气体的浓度）可以在标记为
    1 和 2 的端子之间测量。图 2.7 右侧显示了一个安装在小型分线板上的设备。加热的传感区域位于保护性金属盖下方。


    在简要介绍了基于电阻的传感器之后，我们继续讨论直接报告电压的传感器。


    一个直接在其输出引脚产生电压的传感器例子是 LM35 *温度传感器*，它是一种硅带隙温度传感器。其工作原理基于让已知电流 $I_n$（其中 $n = 1,
    2$）以电流密度 $j_n$ 通过两个双极晶体管的基极-发射极结，并比较它们各自的电压降 $V_{BE,n}$。电压差与温度成正比。这可以通过反转基极-发射极结二极管的电流-电压曲线来轻松理解：


    $$j_n = A(T) \left[ e^{(eV_{BE,n} - E_g)/kT} - 1 \right]$$


    其中 $E_g = 1.2\text{V}$ 是硅的带隙能量，$k$ 是玻尔兹曼常数，$T$ 是以开尔文为单位的绝对温度。$A(T)$ 是一个具有中等温度依赖性的器件特定常数。假设两个晶体管位于同一基底上且温度相同，我们求解两个电流密度
    $j_1$ 和 $j_2$，得到电压差 $\Delta V_{BE} = V_{BE,1} - V_{BE,2} = kT/e \ln(j_1/j_2)$。在
    LM35 中，两个晶体管的基极-发射极二极管具有不同的面积，因此面积比决定了电流密度，前提是相同的宏观电流通过两个晶体管。同一基底上有运算放大器提供信号调理，使得
    LM35 产生的输出电压 $V_s$ 与温度 $T$ 的关系为 $V_s = T/100$。这里 $V_s$ 以伏特为单位，温度以摄氏度为单位，因此 $23\,^\circ\text{C}$
    的温度会产生 $0.23\text{V}$ 的电压。LM35 有三个引脚；一个接地，一个接电源电压，第三个引脚承载与温度成正比的电压 $V_s$。注意图 2.8
    中连接 LM35 的极性。平坦表面朝向左侧的导线。


    *热电偶*是基于温度和温度梯度对不同材料制成的导体的影响的温度传感器。在导体的连接处，帕尔贴效应会产生一个取决于温度的电流。这发生在图 2.9 左上角标记为各自温度
    $T_1$ 和 $T_2$ 的点上。在导线段上，温度梯度会导致额外的电流流动，即汤姆逊效应。最后，连接两个接点和导线会导致电流循环，前提是回路闭合。这被称为塞贝克效应。如果回路是开路的，如图
    2.9 左上角所示，由于帕尔贴、汤姆逊和塞贝克效应，在末端端子处会产生电压 $U$。在实践中，一个接点（例如在 $T_1$ 处）保持在已知且恒定的温度，例如通过将接点浸入冰水中。然后电压
    $U$ 与传感端（在 $T_2$ 处）和参考温度 $T_1$ 之间的温差 $T_2 - T_1$ 相关。产生的电压大小取决于金属的组合，通常在 $50\,\mu\text{V}/^\circ\text{C}$
    量级。


    在*热电堆*中，许多材料 A 和 B 的导线段串联连接，如图 2.9 左下角所示。这增加了设备对温差的灵敏度。热电堆通常用于感应热量和红外辐射的设备中，例如热成像设备或非接触式温度计。后者使用的传感器如图
    2.9 右侧所示。


    图 2.7 MQ-x 气体检测器示意图（左）和安装在小型分线板上的传感器（右）。


    图 2.8 LM35 温度传感器图像（左）及其连接方式（右†）。


    12 ■ 使用 Arduino 和 Raspberry Pi 的传感器实践课程，第二版


    图 2.9 热电偶示意图（左上）、热电堆示意图（左下）和 MLX90614 非接触式温度计图像（右）。


    一些晶体和陶瓷通过在材料相对两侧产生*压电*电压来应对外部应力，这是其晶体结构内电荷重新排列的结果。产生的电压可达数千伏，可用于在点火电路或老式黑胶唱片播放器中产生火花。在那里，“晶体”唱针被挤压在唱片的凹槽中，产生的电压被放大并作为声音播放出来。在科学应用中，压电传感器用于测量压力或力。


    角运动的速度可以通过作为发电机反向运行的直流电动机轻松感知。不是施加电压来转动电机轴，而是转动轴会在电机线圈中感应出与角速度成正比的感应电压。连接到由流动液体或气体（如空气）驱动的螺旋桨上，这样的设备可以测量*流量*。


    *霍尔传感器*产生与*磁感应强度 B* 成正比的电压。其工作原理如图 2.10 所示，基于让已知电流 *I* 通过半导体。在磁场存在下，洛伦兹力使电荷载流子——电子和空穴——偏转到垂直安装的电极（阴影部分）。这在电极之间产生电势差（电压），从而产生一个横向电场，该电场抵消洛伦兹力的偏转，使得后续的电荷载流子可以无偏转地向出口电极移动。在平衡状态下，上下电极之间的电压差与磁感应强度
    *B* 成正比，可以用电压表测量。图 2.10 右侧所示的 A1324 霍尔传感器板载信号调理电路，只需要三个引脚。


    图 2.10 霍尔传感器示意图（左）和 A1324 传感器（右）。'
