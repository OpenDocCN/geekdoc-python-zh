    Figure 12.3 The schematics for measuring a DUT with an AD5933 and an op-amp to
    increase the measurement range (top) and the corresponding circuit on a breadboard,
    controlled by an UNO†.


    Winslow carrier board with a breadboard-compatible pin spacing (DIP). The power
    rails are connected to those on the UNO and the I2C lines SDA and SCL to pins
    A4 and A5 on the UNO, respectively. Pin 6 of the AD5933 is routed via a 47 nF
    capacitor to the positive input terminal of one of the op-amps inside the MCP6002
    below; the two 47 kΩ resistor bias the input to half the supply voltage. The negative
    input terminal (pin 2) is connected to the output on pin 1 of the op-amp and further
    to the lower end of the DUT whose other end is directly connected to the input
    pin 5 of the AD5933. The second op-amp inside the MCP6002 is not used and we therefore
    tie its input pins to ground which is good practice to reduce noise in the circuit.


    Bringing this circuit to life mostly involves controlling the AD5933 which requires
    carefully studying its datasheet. In order to make this effort reusable in other
    projects we collect this circuit-specific code in the file `AD5933.h` that is
    reproduced below. First, we declare the I2C address of the AD5933, initialize
    variables for the starting frequency and the frequency increment, as well as the
    frequency MCLK of the internal oscillator from which all oscillations are derived.
    The variable `npts` describes the number of frequency points, `mode` sets the
    output voltage range, here about 2 V peak-to-peak, and `pga` controls an internal
