    \    float CO2,temp,hum;\n    while (!data_ready()) {delay(10);}  // 等待数据就绪\n\
    \    delay(20);\n    Wire.beginTransmission(SCD30);\n    Wire.write(0x03); Wire.write(0x00);\
    \  // 命令字节\n    Wire.endTransmission();\n    Wire.requestFrom(SCD30,18);\n   \
    \ b1 = Wire.read(); b2 = Wire.read(); b3 = Wire.read();\n    b4 = Wire.read();\
    \ b5 = Wire.read(); b6 = Wire.read();\n    raw=(b1<<24) | (b2<<16) | (b4<<8) |\
    \ b5;  // CO2\n    CO2=*(float*)&raw;    // ppm\n    b1 = Wire.read(); b2 = Wire.read();\
    \ b3 = Wire.read();\n    b4 = Wire.read(); b5 = Wire.read(); b6 = Wire.read();\n\
    \    raw=(b1<<24) | (b2<<16) | (b4<<8) | b5;  // 温度\n    temp=*(float*)&raw; \
    \  // 摄氏度\n    b1 = Wire.read(); b2 = Wire.read(); b3 = Wire.read();\n    b4 =\
    \ Wire.read(); b5 = Wire.read(); b6 = Wire.read();\n    raw=(b1<<24) | (b2<<16)\
    \ | (b4<<8) | b5;  // 湿度\n    hum=*(float*)&raw;    // 百分比\n    Serial.print(CO2);\
    \ Serial.print(\"\\t\");\n    Serial.print(temp); Serial.print(\"\\t\"); Serial.println(hum);\n\
    \    delay(2000);\n}\n}\n\n`loop` 函数实现了我们的标准查询-响应协议，并通过 I2C 总线向 SCD30 发送数据手册中给出的两字节命令。第一个命令\
    \ `V?` 通过向设备发送两字节命令 `0xD1 0x00` 来请求 SCD30 的固件版本，设备返回三个字节，其中前两个字节包含主版本号和次版本号。同样，第三个字节包含一个校验和。命令\
    \ `Start` 通过向设备发送 `0x00 0x10` 和默认环境气压来启动数据采集。同时，变量 `running` 被设置为 1。同样地，发送 `Stop`\
    \ 会向设备发送 `0x01 0x04`，停止数据采集，并将 `running` 设置为 0。在查询-响应协议部分之后，我们检查变量 `running`，如果它被设置，我们就在数据就绪时立即读取数据，我们通过\
    \ `data_ready()` 函数来检查。然后我们向设备发送两字节命令 `0x03 0x00`，请求新数据。数据以三个六字节块的形式到达。第一个块包含\
    \ CO2 浓度，第二个包含温度，第三个包含湿度。我们按照数据手册的说明，首先将字节转换为四字节无符号长整型变量，然后将其转换为浮点值，最后通过串行线路打印出来。由于默认采集时间为\
    \ 2 秒，我们只需等待那么长时间。因此，程序通过串行线路持续显示 CO₂ 浓度、温度和相对湿度，这样我们就可以使用 Arduino IDE 的串行绘图仪或任何其他控制串行线路的程序来观察它。\n\
    \n下一个环境传感器——我们稍后在气象站中使用它——是 BME680。我们在第 2.3.3 节已经简要介绍过这款芯片。它集成了气压、湿度、温度和挥发性有机化合物传感器，所有传感器都在同一芯片上。由于每个\
    \ BME680 都经过出厂校准，并且所有传感器的校验常数都存储在芯片上，因此编程相当复杂。可以查看 https://github.com/BoschSensortec\
    \ 提供的底层驱动程序以获得初步了解。我们没有使用那个库，而是使用了图 2.36 所示面包板制造商提供的高级接口，我们通过 Arduino IDE 的库管理器将其整合进来，在其中搜索\
    \ “Adafruit BME680” 并安装该库。\n\n使用这个库，读取传感器的程序非常简短，因为 I2C 通信、传感器读取和数据校准的所有细节都封装在高级函数中。我们通过包含\
    \ `Adafruit_BME680.h` 头文件使库可访问，然后创建一个对象 `bme` 来访问传感器功能。在 `setup()` 函数中，我们初始化串行和\
    \ I2C 通信，确保传感器确实已连接，并开始配置它。设置过采样的三个命令决定了返回的温度、湿度和压力的精度。IIR 滤波器定义了一个对连续样本进行平均的滤波器，这可以平滑数据。最后，配置用于测量空气中挥发性有机化合物的\
    \ MQ-x 传感器的小型板载加热器，使其加热到 320°C 并等待 150 毫秒，然后读取量化空气质量的电阻值，其中电阻越高意味着空气质量越好。\n\n\
    ```cpp\n// BME680, V. Ziemann, 221006\n#include <Wire.h>\n#include <Adafruit_BME680.h>\n\
    Adafruit_BME680 bme;\nvoid setup() {\n  Serial.begin(9600); while (!Serial);\n\
    \  Wire.begin();\n  if (!bme.begin()) {Serial.println(\"Error: BME680 not found\"\
    );}\n  bme.setTemperatureOversampling(BME680_OS_8X);\n  bme.setHumidityOversampling(BME680_OS_2X);\n\
    \  bme.setPressureOversampling(BME680_OS_4X);\n  bme.setIIRFilterSize(BME680_FILTER_SIZE_3);\n\
    \  bme.setGasHeater(320, 150); // 320°C 持续 150 毫秒\n}\nvoid loop() {\n  bme.performReading();\
    \           // 这里读取传感器\n  Serial.print(bme.temperature); Serial.print(\"\\t\"\
    );\n  Serial.print(bme.pressure/100.0); Serial.print(\"\\t\");  // hPa=mbar\n\
    \  Serial.print(bme.humidity); Serial.print(\"\\t\");\n  Serial.println(bme.gas_resistance/1000.0);\
    \             // kOhm\n  delay(1000);\n}\n```\n\n在 `loop()` 函数中，我们只需要用 `bme.performReading()`\
    \ 启动一次采集，然后逐个访问数值。注意我们将压力转换为 hPa，这与 mbar 相同。此外，空气质量以 MQ-x 传感器的电阻值形式返回。\n\n我们可以使用下一个传感器来确定游乐场旋转木马上的加速度和旋转速度。顺便说一句，类似的传感器也用于智能手机中，以确定它们是竖着拿还是横着拿。这个设备\
    \ MPU-6050 包含用于三维加速度和三轴角速度的独立传感器。它使用默认地址为 `0x68` 的标准 I2C。在下面的程序中，我们将解释如何将其连接到\
    \ Arduino。由于我们将频繁通过 I2C 线路读写单个字节，我们创建了一个名为 `I2Crw.h` 的文件，其中包含 `I2Cwrite()` 和 `I2Cread()`\
    \ 函数。注意它必须与包含它的程序位于同一目录中。在后面的章节中使用这个文件将为我们节省大量的编写工作。\n\n```cpp\n// I2Crw.h, V.\
    \ Ziemann, 221118\nvoid I2Cwrite(int addr, uint8_t reg, uint8_t val) {\n  Wire.beginTransmission(addr);\n\
    \  Wire.write(reg);\n  Wire.write(val);\n  Wire.endTransmission(true);\n}\nuint8_t\
    \ I2Cread(int addr, uint8_t reg) {\n  Wire.beginTransmission(addr);\n  Wire.write(reg);\n\
    \  Wire.endTransmission(false);\n  Wire.requestFrom(addr,1);\n  return Wire.read();\n\
    }\n```\n\n将基本功能封装在 `I2Crw.h` 中后，我们只需在下面的程序中包含它即可\n\n```cpp\n// MPU6050, V. Ziemann,\
    \ 221118\n#include <Wire.h>\n#include \"I2Crw.h\"\nconst int MPU6050=0x68;  //\
    \ 地址\nvoid mpu6050_init() {  //.......................mpu6050_init\n  Wire.begin();\n\
    \  int whoami=I2Cread(MPU6050,0x75);\n  if (whoami!=0x68) {\n    Serial.println(\"\
    No MPU6050 found!\"); while (1) {delay(10);}\n  }\n  I2Cwrite(MPU6050,0x6B,0);\
    \ // 唤醒设备\n  I2Cwrite(MPU6050,0x1B,0); // 陀螺仪配置, FS=0\n  I2Cwrite(MPU6050,0x1C,0);\
    \ // 加速度计配置, AFS=0\n}\nvoid mpu6050_read_float(int addr, float fdata[7]) { //...read_float\n\
    \  int16_t intval;\n  Wire.beginTransmission(addr);\n  Wire.write(0x3B);\n  Wire.endTransmission(false);\n\
    \  Wire.requestFrom(addr,14);\n  intval=Wire.read()<<8 | Wire.read(); fdata[0]=intval/16.384;\
    \ //ax\n  intval=Wire.read()<<8 | Wire.read(); fdata[1]=intval/16.384; //ay\n\
    \  intval=Wire.read()<<8 | Wire.read(); fdata[2]=intval/16.384; //az\n  intval=Wire.read()<<8\
    \ | Wire.read(); fdata[3]=intval/340.0+36.53; //T\n  intval=Wire.read()<<8 | Wire.read();\
    \ fdata[4]=intval/131.0; //gx\n  intval=Wire.read()<<8 | Wire.read(); fdata[5]=intval/131.0;\
    \ //gy\n```"
