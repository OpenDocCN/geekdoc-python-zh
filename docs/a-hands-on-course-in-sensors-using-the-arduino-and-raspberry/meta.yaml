    section. I do this for all originally identified chapters or sections, and often
    in this stage I note that I need to split sections into two or more or that I
    can combine sections with similar contents into a single one. As a guideline I
    assume that each topic in the bullet list will require one paragraph with about
    200 words or so to discuss adequately. I also try to roughly balance the length
    of sections, but this is of minor concern. Once I know what contents should show
    up in the respective sections, I start writing the text and “fill in the blanks.”
    Since key components – images, graphs, or tables – are already in place, I start
    each section with a short description of how it fits into the flow and then describe
    the material. I also try to write each section from start to end, because that
    helps to maintain a logical flow. At other times, if I do not come up with a decent
    start, I just start at a place where I have a good idea about how to present it
    and retrofit the missing parts later. In that case, however, I need to pay special
    attention later to ensure the flow.


    A particularly important section is the *Introduction*, where I need to convince
    the reader that the report treats a relevant and interesting subject by stating
    the chosen problem and how to solve it. But ideally the problem should also be
    put into the context of previous work. What have other researchers done before
    on related problems? How does their work differ from mine? This section, typically
    one or two paragraphs long, requires a number of key references from the published
    literature. At the end of the introduction, I sometimes give a brief outline of
    the report in the fashion of a commented table of contents. By this time I have
    hopefully convinced the reader to continue with the remainder of my report. And
    this is the prime task of the introduction: a brief statement of the problem,
    the context, and a brief outline of things to come.


    The *main part* of the report should follow the story line and the flow I initially
    decided upon. I write one or two paragraphs for each topic in the bullet list
    and make sure that the paragraphs are well connected in the sense that the reader
    knows how the following paragraph links to the present one. I try to avoid having
    the reader wonder what the lines he is presently reading have to do with the overall
    story line. Placing crosslinks with references to topics addressed earlier and
    how they connect to the present paragraph are helpful to make the text denser,
    and creates additional associations for the reader. Phrases such as, “where we
    use the result from page…” or “as discussed in Section…” illustrate the idea.


