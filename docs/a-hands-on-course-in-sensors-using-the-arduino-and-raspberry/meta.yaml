    \ the left-hand side. Its eight pins come in two columns of four each. The pins\
    \ on the left are labeled RXD, GP0, GP2, and GND from top to bottom. The pins\
    \ on the right are labeled VCC, RST, CH_PP, and TXD. In order to program the ESP-01,\
    \ we"
  - '[PAGE 209]


    ![](img/8f23875c54d5b3177d5d2a5bba06b37e_209_0.png)


    Figure 9.4 Weathernode with ESP-01 connected to a BME680†.


    connect its GND and VCC to the corresponding pins of the USB-to-serial converter.
    We also connect CH_PD and GP2 to VCC and GP0 to GND, which puts the ESP-01 into
    programming mode. Finally, we connect the serial-receive pin RXD to the serial-transmit
    pin TX on the converter and the TXD pin to RX. With the wiring in place we attach
    the USB-to-serial converter to our desktop computer, select the port from the
    *Tools→Port* menu, and select *Generic ESP8266 Module* in the *Tools→Board* menu
    in the Arduino IDE.


    We can essentially use the same program as for the NodeMCU, shown earlier in this
    chapter. All we need to do is to remove all references to `Serial`, because we
    will not use the Serial line. Moreover, we uncomment the line with `Wire.begin(0,2);`
    in the function `setup()`, which is necessary, because the default I2C pins that
    are used on the NodeMCU are not routed to exposed pins on the ESP-01. Instead,
    we use pins GP0 and GP2 for the I2C lines SDA and SCL, respectively. Finally,
    we compile and download the sketch the our ESP-01.


    Now we disconnect the programmed ESP-01 from the USB-to-serial converter and,
    following the wiring from Figure 9.4, connect it to the BME680 instead. Ground
    and 3.3 V supply rails are connected to VCC and GND pins on both devices. Note
    that also the pins labeled RST and CH_PD are connected to VCC. The I2C lines connect
    GP0 on the ESP-01 to SCK in the BME680. Likewise, GP2 is connected to SDI. Note
    that we must provide external pull-up resistors to the I2C lines; we use 10 kΩ
    resistors, but their value is not critical. For good measure, we should also provide
    100 nF bypass capacitors (not shown) between GND and VCC. Once we connect the
    supply voltage, this circuit will behave the same way as the one shown in Figure
    9.1, albeit with a smaller footprint.


    # QUESTIONS AND PROJECT IDEAS


    +   1. What is the average barometric pressure at sea level, on a rainy day, in
    a heavy storm, in a hurricane, or in La Paz?

    2. What is the typical humidity where you live, in a rain forest, in Death Valley,
    or at the La Silla Observatory in Chile?

    3. Add a separate temperature sensor, for example an LM35 or DS18b20, to crosscheck
    the value reported by the BME680.

    4. Add a separate humidity sensor such as the HYT221 or DHT11 to crosscheck the
    value reported by the BME680.

    5. Add a dust sensor to turn the weather station into an environmental logging
    station.'
- md: "## Example: Geophones\n\nIn the second example, we use the SM-24 geophone from\
    \ Figure 2.12 to record ground vibration spectra. Our plan is to attach the SM-24\
    \ to a battery-powered microcontroller that samples 1024 values at a high rate\
    \ and transmits the measurements via WLAN to the host computer, our Raspi. There\
    \ we use octave to postprocess and Fourier-transform the samples, as well as present\
    \ the results. Besides using octave, we also make the data available to EPICS,\
    \ such that the standard EPICS programs for display and post-processing can be\
    \ used.\n\nFor the sensor node, we use the NodeMCU microcontroller and the Ticker.h\
    \ library that allows sampling with a rate of 1000 times per second. Since the\
    \ frequency range of the SM-24 sensor is from 10 to 240 Hz, the sampling rate\
    \ of 1 kHz is four times the maximum frequency and should be adequate. The SM-24\
    \ sensor only produces a very small and bipolar output voltage in the mV range.\
    \ We therefore need to amplify the voltage in order to match the input voltage\
    \ range of 0 to 3.3 V of the ADC on the NodeMCU.\n\nWe base the amplifier on the\
    \ circuit shown in Figure 2.21, but increase the amplification to ×100 and add\
    \ a few components to adapt it to our sensor and arrive at the circuit shown in\
    \ Figure 10.1. The amplification is mostly given by the ratio of $R_3$ and $R_7$\
    \ to $R_1$ and $R_2$. We also add a 1.5 kΩ resistor $R_9$ across the input terminals\
    \ in order to damp the resonant peak at 10 Hz, which the SM-24 sensor exhibits\
    \ according to its datasheet. If we consider the internal coil resistance (375\
    \ Ω) of the sensor, mounting an additional 2.2 μF capacitor across the input terminals\
    \ creates a low-pass filter with a cutoff frequency of around 200 Hz. As discussed\
    \ in Section 2.2.4, this avoids aliasing of higher frequencies into the digitizing\
    \ bandwidth from 0 Hz to the Nyquist frequency of 500 Hz. The other components\
    \ have the same functionality as discussed in Section 2.2.2.\n\nAfter the signal\
    \ from the geophone is amplified, we use the ADC on the NodeMCU microcontroller\
    \ and collect 1024 samples: one sample every millisecond, and then pass the digitized\
    \ samples to the host computer via WLAN.\n\nThe code for this project first defines\
    \ the credentials and port number for the WLAN, and then imports support to create\
    \ the `server()` in the next line. The constants `npts` and `sample_period` specify\
    \ the number of samples to acquire and the number of milliseconds to wait between\
    \ acquisitions, respectively. The `Ticker.h` library adds support for timed and\
    \ interrupt-driven functions. The variables declared next are related to filling\
    \ the `sample_buffer`. The function `samplefast_action()` is called automatically\
    \ by the timer and is executed once a millisecond. In this function we first read\
    \ the built-in ADC and place the value into the `sample_buffer` before incrementing\
    \ the variable `isamp`, such that the next sample ends up in the following slot\
    \ in the array. Once the desired number `npts` of samples are acquired, we disable\
    \ the interrupt with the call to `SampleFast.detach()`, set the sample pointer\
    \ `isamp` to zero, and set the `sample_buffer_ready` flag to signal the main program\
    \ that the acquisition of the npts samples is complete. In the setup() function,\
    \ we first set the mode of the pin with the built-in LED and turn it on before\
    \ enabling the serial line for debugging, and connect to the WLAN. Then we start\
    \ the server process with the call to server.begin() and report everything to\
    \ the serial line, before turning the LED off.\n\n```cpp\n// Minimal time-series-server,\
    \ V. Ziemann, 170324\nconst char* ssid = \"messnetz\";\nconst char* password =\
    \ \"zxcvZXCV\";\nconst int port = 1137;\n#include <ESP8266WiFi.h>\nWiFiServer\
    \ server(port);\nconst uint16_t npts=1024;  // number of samples\nconst int sample_period=1;\
    \ // ms\n#include <Ticker.h>\nTicker SampleFast;\nuint16_t sample_buffer[npts];\n\
    volatile uint16_t isamp=0,sample_buffer_ready=0;\nchar line[30];\nvoid samplefast_action()\
    \ {  //..............samplefast_action\n  sample_buffer[isamp]=analogRead(0);\n\
    \  isamp++;\n  if (npts == isamp) {\n    SampleFast.detach();\n    isamp=0;\n\
    \    sample_buffer_ready=1;\n  }\n}\nvoid setup() { //........................................setup\n\
    \  pinMode(LED_BUILTIN,OUTPUT);\n  digitalWrite(LED_BUILTIN,LOW);\n  Serial.begin(115200);\n\
    \  WiFi.begin(ssid,password);\n  while (WiFi.status() != WL_CONNECTED) {\n   \
    \ delay(500); Serial.print(\".\");\n  }\n  Serial.println(\"\");\n  Serial.print(\"\
    Wifi connected to \"); Serial.println(ssid);\n  Serial.print(\"Server IP address:\
    \ \"); Serial.println(WiFi.localIP());\n  server.begin();\n  Serial.print(\"Server\
    \ started on port \"); Serial.println(port);\n  digitalWrite(LED_BUILTIN,HIGH);\n\
    }\nvoid loop() { //.............................................loop\n  WiFiClient\
    \ client = server.available();\n  while (client) {\n    while (!client.available())\
    \ {\n      delay(5);\n      if (!client.connected()) break;\n    }\n    client.readStringUntil('\\\
    n').toCharArray(line,30);\n    Serial.print(\"Received: \"); Serial.println(line);\n\
    \    if (strstr(line,\"WF?\")==line) {\n      digitalWrite(LED_BUILTIN,LOW);\n\
    \      sample_buffer_ready=0;\n      SampleFast.attach_ms(sample_period,samplefast_action);\n\
    \      while (!sample_buffer_ready) {delay(2);} // wait until done\n      for\
    \ (int i=0;i<npts-1;i++) {\n        client.print(sample_buffer[i]); client.print(\"\
    , \");\n      }\n      client.println(sample_buffer[npts-1]);\n      digitalWrite(LED_BUILTIN,HIGH);\n\
    \    } else {\n      Serial.println(\"unknown command, disconnecting\");\n   \
    \   client.stop();\n    }\n    client.flush();\n  }\n  yield();\n}\n```\n\nIn\
    \ the loop() function we wait for a client to connect, and then parse the request.\
    \ If the query-string is WF?, we turn on the LED and ensure the variable sample_buffer_ready\
    \ is zero before we start the acquisition with the call to SampleFast.attach_ms().\
    \ The arguments of the function are the periodicity in ms to call the function\
    \ specified as the second argument. This launches the automatic acquisition that\
    \ continues in the background. All we need to do in the loop() function is to\
    \ monitor whether sample_buffer_ready is still zero, in which case we wait a bit\
    \ longer. But once it becomes nonzero, which happens in the samplefast_action()\
    \ function after the desired number of samples is collected, we break the waiting\
    \ loop. Finally, we are ready to send the values, separated by commas, with client.print()\
    \ function calls, back to the client and turn the LED off.\n\nWe program this\
    \ sketch into the NodeMCU, whence it waits for a client to connect and to request\
    \ samples. Here we use octave to request a time series of samples from the geophone\
    \ and display both the received raw time-series data and its Fourier transform,\
    \ the spectrum. The code that achieves this is the following:\n\n196 ■ A Hands-On\
    \ Course in Sensors Using the Arduino and Raspberry Pi, Second Edition\n\n```matlab\n\
    % getTimeSeries.m, V. Ziemann, 221202\ns=tcpclient(\"192.168.20.144\",1137);\n\
    npts=1024;\nwrite(s,\"WF?\\n\");\npause(1);\ndata=zeros(1,npts);\nfor i=1:npts\n\
    \  data(i)=str2double(tcp_getvalue(s));\nend\nclear s;\nsubplot(2,1,1); plot(data);\
    \ xlim([0,npts])\nxlabel('Time [ms]'); ylabel('Amplitude [ADC bits]')\ndata=data-mean(data);\n\
    fftdata=2*abs(fft(data))/npts;\nfrequency=(0:(npts/2-1))*500/(npts/2);\nsubplot(2,1,2);\
    \ plot(frequency,fftdata(1:npts/2))\nxlabel('Frequency [Hz]'); ylabel('Spectral\
    \ density [ADC bits]')\nprint('spectrum.png','-S1000,700');\n```\n\nAlso, the\
    \ octave script follows earlier examples. We first define the socket s in the\
    \ call to the tcpclient() function and then specify the number of points npts\
    \ to acquire. This has to match the number of samples declared on the NodeMCU.\
    \ Next, we send the query string WF? to the socket, wait a while, and then collect\
    \ npts samples, which we store in the array data(). For this we use the function\
    \ tcp_getvalue() that extracts one comma-separated value from the socket. We discuss\
    \ that function in more detail below. The received value is encoded as a character\
    \ string, and we therefore need to convert it to a float value with the str2double()\
    \ function. Once all samples are received and stored in data(), we close the socket.\n\
    \nIn the following lines, we create two subplots of which the upper contains the\
    \ raw samples. Since the sample period is a millisecond, we state that as the\
    \ horizontal axis label. The vertical axis is just the raw ADC conversion, which\
    \ comes from the 10-bit ADC on the NodeMCU, and lies between 0 and 1023. For the\
    \ spectrum that we show in the lower subplot, we first subtract the mean of the\
    \ values in order to avoid a huge spectral peak at zero. It is caused by placing\
    \ the signal in mid-range of the ADC with the preamplifier. Then we Fourier transform\
    \ the samples and create an array frequency with the frequency values from zero\
    \ to the Nyquist frequency before plotting the spectrum and labeling the axes.\
    \ Finally, we use the print() function to create an image file that contains the\
    \ displayed plot with the specified size in pixels, 1000 × 700 in this case.\n\
    \nIn the octave script, we use the function tcp_getvalue to read a single sample\
    \ from the input stream. It is similar to the queryResponse.m function we used\
    \ in Section 5.5.4. Here is the octave code.\n\n```matlab\n% tcp_getvalue.m, V.\
    \ Ziemann, 221202\nfunction out=tcp_getvalue(dev)\ni=1;\nint_array=uint8(1);\n\
    while true\n  val=read(dev,1);\n  if ((val==',') || (val==0xA)) break; end\n \
    \ int_array(i)=val;\n  i=i+1;\n```\n\n6. Add the SCD30 CO$_2$ sensor to enhance\
    \ the system further.\n\n7. Add an LDR or a phototransistor to the weather station\
    \ to log the brightness.\n\n8. Add a remote-controlled fan that stirs the air\
    \ upon request.\n\n9. Rewrite the client program for the weather station running\
    \ on the NodeMCU and give it an MQTT interface.\n\n10. Rewrite the sketch running\
    \ on the NodeMCU to publish a webpage with graphs of measurement values, as described\
    \ in [Chapter 8](Chapter 8), that continuously updates the displayed values for\
    \ temperature, pressure, humidity, and air quality via websockets."
  mdcn: "## 示例：地震检波器\n\n在第二个示例中，我们使用图2.12中的SM-24地震检波器来记录地面振动频谱。我们的计划是将SM-24连接到一个电池供电的微控制器上，该控制器以高速率采样1024个值，并通过WLAN将测量数据传输到主机计算机，即我们的树莓派。在那里，我们使用Octave进行后处理和傅里叶变换采样数据，并展示结果。除了使用Octave，我们还将数据提供给EPICS，以便可以使用标准的EPICS程序进行显示和后处理。\n\
    \n对于传感器节点，我们使用NodeMCU微控制器和Ticker.h库，该库允许以每秒1000次的速率进行采样。由于SM-24传感器的频率范围是10到240\
    \ Hz，1 kHz的采样率是最大频率的四倍，应该是足够的。SM-24传感器仅产生非常小的、毫伏范围内的双极性输出电压。因此，我们需要放大电压，以匹配NodeMCU上ADC的0到3.3\
    \ V输入电压范围。\n\n我们的放大器基于图2.21所示的电路，但将增益提高到×100，并添加了一些组件以适应我们的传感器，最终得到图10.1所示的电路。增益主要由$R_3$和$R_7$与$R_1$和$R_2$的比值决定。我们还在输入端子之间添加了一个1.5\
    \ kΩ的电阻$R_9$，以抑制SM-24传感器根据其数据手册在10 Hz处表现出的谐振峰。如果我们考虑传感器的内部线圈电阻（375 Ω），在输入端子之间安装一个额外的2.2\
    \ μF电容器，将创建一个截止频率约为200 Hz的低通滤波器。如第2.2.4节所述，这避免了更高频率混叠到从0 Hz到500 Hz奈奎斯特频率的数字化带宽中。其他组件的功能与第2.2.2节中讨论的相同。\n\
    \n地震检波器的信号放大后，我们使用NodeMCU微控制器上的ADC收集1024个样本：每毫秒一个样本，然后通过WLAN将数字化的样本传递给主机计算机。\n\
    \n该项目的代码首先定义WLAN的凭据和端口号，然后在下一行导入支持以创建`server()`。常量`npts`和`sample_period`分别指定要获取的样本数和获取之间等待的毫秒数。`Ticker.h`库添加了对定时和中断驱动函数的支持。接下来声明的变量与填充`sample_buffer`有关。函数`samplefast_action()`由计时器自动调用，每毫秒执行一次。在此函数中，我们首先读取内置ADC并将值放入`sample_buffer`，然后递增变量`isamp`，以便下一个样本进入数组中的下一个位置。一旦获取了所需数量`npts`的样本，我们通过调用`SampleFast.detach()`禁用中断，将样本指针`isamp`设置为零，并设置`sample_buffer_ready`标志以通知主程序npts个样本的采集已完成。在setup()函数中，我们首先设置内置LED引脚的模式并将其打开，然后启用串行线路进行调试，并连接到WLAN。然后我们通过调用server.begin()启动服务器进程，并将所有信息报告到串行线路，然后关闭LED。\n\
    \n```cpp\n// Minimal time-series-server, V. Ziemann, 170324\nconst char* ssid\
    \ = \"messnetz\";\nconst char* password = \"zxcvZXCV\";\nconst int port = 1137;\n\
    #include <ESP8266WiFi.h>\nWiFiServer server(port);\nconst uint16_t npts=1024;\
    \  // number of samples\nconst int sample_period=1; // ms\n#include <Ticker.h>\n\
    Ticker SampleFast;\nuint16_t sample_buffer[npts];\nvolatile uint16_t isamp=0,sample_buffer_ready=0;\n\
    char line[30];\nvoid samplefast_action() {  //..............samplefast_action\n\
    \  sample_buffer[isamp]=analogRead(0);\n  isamp++;\n  if (npts == isamp) {\n \
    \   SampleFast.detach();\n    isamp=0;\n    sample_buffer_ready=1;\n  }\n}\nvoid\
    \ setup() { //........................................setup\n  pinMode(LED_BUILTIN,OUTPUT);\n\
    \  digitalWrite(LED_BUILTIN,LOW);\n  Serial.begin(115200);\n  WiFi.begin(ssid,password);\n\
    \  while (WiFi.status() != WL_CONNECTED) {\n    delay(500); Serial.print(\".\"\
    );\n  }\n  Serial.println(\"\");\n  Serial.print(\"Wifi connected to \"); Serial.println(ssid);\n\
    \  Serial.print(\"Server IP address: \"); Serial.println(WiFi.localIP());\n  server.begin();\n\
    \  Serial.print(\"Server started on port \"); Serial.println(port);\n  digitalWrite(LED_BUILTIN,HIGH);\n\
    }\nvoid loop() { //.............................................loop\n  WiFiClient\
    \ client = server.available();\n  while (client) {\n    while (!client.available())\
    \ {\n      delay(5);\n      if (!client.connected()) break;\n    }\n    client.readStringUntil('\\\
    n').toCharArray(line,30);\n    Serial.print(\"Received: \"); Serial.println(line);\n\
    \    if (strstr(line,\"WF?\")==line) {\n      digitalWrite(LED_BUILTIN,LOW);\n\
    \      sample_buffer_ready=0;\n      SampleFast.attach_ms(sample_period,samplefast_action);\n\
    \      while (!sample_buffer_ready) {delay(2);} // wait until done\n      for\
    \ (int i=0;i<npts-1;i++) {\n        client.print(sample_buffer[i]); client.print(\"\
    , \");\n      }\n      client.println(sample_buffer[npts-1]);\n      digitalWrite(LED_BUILTIN,HIGH);\n\
    \    } else {\n      Serial.println(\"unknown command, disconnecting\");\n   \
    \   client.stop();\n    }\n    client.flush();\n  }\n  yield();\n}\n```\n\n在loop()函数中，我们等待客户端连接，然后解析请求。如果查询字符串是WF?，我们打开LED并确保变量sample_buffer_ready为零，然后通过调用SampleFast.attach_ms()开始采集。该函数的参数是以毫秒为单位的周期性，用于调用作为第二个参数指定的函数。这启动了在后台继续的自动采集。我们在loop()函数中需要做的就是监控sample_buffer_ready是否仍为零，如果是，我们再等待一会儿。但是一旦它变为非零（这发生在samplefast_action()函数中，在收集到所需数量的样本之后），我们就跳出等待循环。最后，我们准备好通过client.print()函数调用，将值用逗号分隔，发送回客户端，并关闭LED。\n\
    \n我们将此程序烧录到NodeMCU中，然后它等待客户端连接并请求样本。这里我们使用Octave从地震检波器请求一个样本时间序列，并显示接收到的原始时间序列数据及其傅里叶变换，即频谱。实现此功能的代码如下：\n\
    \n196 ■ 使用Arduino和树莓派的传感器实践课程，第二版\n\n```matlab\n% getTimeSeries.m, V. Ziemann,\
    \ 221202\ns=tcpclient(\"192.168.20.144\",1137);\nnpts=1024;\nwrite(s,\"WF?\\n\"\
    );\npause(1);\ndata=zeros(1,npts);\nfor i=1:npts\n  data(i)=str2double(tcp_getvalue(s));\n\
    end\nclear s;\nsubplot(2,1,1); plot(data); xlim([0,npts])\nxlabel('Time [ms]');\
    \ ylabel('Amplitude [ADC bits]')\ndata=data-mean(data);\nfftdata=2*abs(fft(data))/npts;\n\
    frequency=(0:(npts/2-1))*500/(npts/2);\nsubplot(2,1,2); plot(frequency,fftdata(1:npts/2))\n\
    xlabel('Frequency [Hz]'); ylabel('Spectral density [ADC bits]')\nprint('spectrum.png','-S1000,700');\n\
    ```\n\n同样，Octave脚本遵循前面的示例。我们首先在tcpclient()函数调用中定义套接字s，然后指定要获取的点数npts。这必须与NodeMCU上声明的样本数匹配。接下来，我们将查询字符串WF?发送到套接字，等待一段时间，然后收集npts个样本，将其存储在数组data()中。为此，我们使用函数tcp_getvalue()，它从套接字中提取一个逗号分隔的值。我们将在下面更详细地讨论该函数。接收到的值编码为字符串，因此我们需要使用str2double()函数将其转换为浮点值。一旦所有样本都已接收并存储在data()中，我们就关闭套接字。\n\
    \n在接下来的几行中，我们创建两个子图，其中上方包含原始样本。由于采样周期是毫秒，我们将其作为水平轴标签。垂直轴只是原始的ADC转换值，来自NodeMCU上的10位ADC，范围在0到1023之间。对于我们在下方子图中显示的频谱，我们首先减去值的平均值，以避免在零处出现巨大的频谱峰。这是由前置放大器将信号置于ADC的中间范围引起的。然后我们对样本进行傅里叶变换，并创建一个频率数组，其中包含从零到奈奎斯特频率的频率值，然后绘制频谱并标记坐标轴。最后，我们使用print()函数创建一个图像文件，其中包含以指定像素尺寸（本例中为1000\
    \ × 700）显示的绘图。\n\n在Octave脚本中，我们使用函数tcp_getvalue从输入流中读取单个样本。它类似于我们在第5.5.4节中使用的queryResponse.m函数。以下是Octave代码。\n\
    \n```matlab\n% tcp_getvalue.m, V. Ziemann, 221202\nfunction out=tcp_getvalue(dev)\n\
