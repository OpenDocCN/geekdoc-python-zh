    \ we produce an image file, which is precisely how we prepared Figure 16.4."
- md: "## Figure 16.4 The raw sensor value as a function of the position of the obstacle\
    \ and the derived laser beam profile, which shows a moderate asymmetry.\n\nIn\
    \ this example, we use the FWHM rather than the standard deviation of the profile,\
    \ because the FWHM is a rather robust measure and works more reliably with profiles\
    \ that are non-Gaussian, asymmetric, and have tails that are moderately populated.\
    \ The standard deviation is heavily biassed by the latter. The script for the\
    \ FWHM is straightforward and is reproduced here.\n\n```\n% FWHM, V. Ziemann,\
    \ 170628\nfunction fwhm=fwhm(data)\nN=length(data);\nxmax = -1e30;\nxmin=min(data);\n\
    imax=-1;\nfor i=1:N\n  if (data(i) > xmax)\n    xmax=data(i);\n    imax=i;\n \
    \ end\nend\nileft=imax;\nwhile (data(ileft) > (xmax+xmin)/2 && ileft>1)\n  ileft=ileft-1;\n\
    end\niright=imax;\nwhile (data(iright) > (xmax+xmin)/2 && iright<N-1)\n  iright=iright+1;\n\
    end\nfwhm=iright-ileft-1;\n```\n\nIn the `fwhm()` function we first locate the\
    \ minimum and maximum of the data points as well as the location of the maximum.\
    \ Then we search toward the left until the value is less than halfway between\
    \ maximum and minimum. This results in the location `ileft` of that point. Then\
    \ we repeat the process on the right-hand side and return the difference of the\
    \ right and left halfway points as the FWHM. The minus one in the last equation\
    \ accounts for the fact that both searches overshoot before terminating the respective\
    \ `while` loops. This is partially compensated by subtracting one from the final\
    \ result.\n\nIn this example, we built a laser-beam profile monitor from scratch\
    \ using a small stepper motor and an LDR to illustrate the basic steps and how\
    \ to combine sensors and actuators to built an integrated system that is controlled\
    \ from `octave` or any other language that communicates over serial devices, such\
    \ as EPICS, LabView, or C. The system is far from perfect and many limitations\
    \ and improvements come to mind. For example: Is diffraction on the edge of the\
    \ obstacle a limitation? Is the step size adequate or should we use a better,\
    \ microstepping motor-driver? Does the profile change with different laser intensities?\
    \ Do we need to correct for intensity-related nonlinearities of the sensor system?\
    \ This is actually the purpose of the `CALIBRATE` command to provide the base\
    \ information. Does the profile show the same asymmetry when we scan from the\
    \ other side? We may also want to know the vertical beam size and any cross-plane\
    \ correlations to determine some basic aberrations. Is the profile the same after\
    \ swapping position of LDR and 10 kΩ resistor? We might want to add a second motor\
    \ moving the obstacle longitudinally in the direction of the laser beam. Adding\
    \ a lens and measuring the beam profile at several places allows us to determine\
    \ the $M^2$ of the laser beam, which is a measure of the laser quality and is\
    \ unity for a diffraction-limited beam. But these exercises we leave for the interested\
    \ reader to do at home, while we move on to build a robot that detects fire.\n\
    \n## QUESTIONS AND PROJECT IDEAS\n\n- 1. Use the frame from a salvaged CD-ROM\
    \ drive to move a spoon back and forth to stir your cup of coffee or tea.\n\n\
    ## Example: Fire-Seeking Robot\n\nIn this final example, we discuss a small robot\
    \ that detects heat radiation from a fire, moves towards the heat source, and\
    \ starts beeping once it reaches the source of the radiation. This is, of course,\
    \ a very simple prototype of an autonomous fire extinguisher. We require the robot\
    \ to either move autonomously, or to be manually controlled by a remote controller.\
    \ Despite the simple description, the project is rather ambitious and requires\
    \ us to solve the following subtasks:\n\n- 1. detect the heat source and its location;\n\
    - 2. control the speed and direction of motors;\n- 3. detect collisions, preferably\
    \ before they happen;\n- 4. sense joysticks and switches on the remote control;\n\
    - 5. send messages between remote controller and robot.\n\nWe base the hardware\
    \ of the robot on a ready-made chassis with two DC motors and an on-board battery\
    \ pack with five AA cells providing up to 7.5 V. Onto that chassis we mount a\
    \ full-size breadboard to house a NodeMCU controller, an H-bridge motor-driver,\
    \ and some linear voltage converters to provide 5 and 3.3 V. To provide additional\
    \ IO-pins we add a second Arduino that acts as a slave to the NodeMCU. On the\
    \ robot chassis is a dedicated place for a model-servo onto which we mount a very\
    \ small breadboard for the BPX38 IR phototransistors we use as flame sensors,\
    \ and the HC-SR04 distance sensor. Figure 17.1 shows the chassis with the servo\
    \ and the two breadboards already mounted. Mounting the sensors on the movable\
    \ breadboard makes it possible to point them in different directions by turning\
    \ the model-servo. We configure the NodeMCU as an access point that spans its\
    \ own WLAN network. We also start a server to receive commands from the remote\
    \ control. Apart from listening to the remote on the controller, we implement\
    \ a simple state machine, to which we can hand the control of the robot, which\
    \ subsequently runs autonomously.\n\nThe remote control is based on a second NodeMCU.\
    \ It connects to the WLAN spanned by the first NodeMCU on the robot and to the\
    \ server running on it. On the remote controller we connect a MCP3208 8-channel\
    \ ADC via SPI to the NodeMCU, and set the input voltages of the ADC channels with\
    \ two joysticks, two potentiometers, several voltage-dividers, and two switches.\
    \ The ADC readings are then interpreted as motor speed and model-servo setting,\
    \ and transmitted to the robot. The voltage on one ADC channel is set by a number\
    \ of switches and voltage dividers, which allows us to use a larger number of\
    \ switches than available digital IO pins, albeit at the expense of being able\
    \ to sense only one button at a time.\n\n## Figure 17.1 The chassis of the robot\
    \ with two breadboards. The smaller one can be turned by operating a model-servo.\
    \ Mounted on the larger breadboard are a NodeMCU on the right and a second chip\
    \ on the left, a bare ATmega328 that was initially tested and later replaced by\
    \ an Arduino NANO.\n\nWe show a simplified version of the remote controller with\
    \ less than all possible channels set up on a breadboard in Figure 17.2, where\
    \ we see the NodeMCU on the right and the MCP3208 ADC on the left. The MCP3208\
    \ has the same pin assignment as the MCP3304 from Section 4.4.4, and is connected\
    \ to the SPI port of the NodeMCU with CLK, MISO, MOSI, and CS lines, connected\
    \ to D5, D6, D7, and D8, respectively. A joystick, visible immediately to the\
    \ left of the breadboard, is connected to the power rails and the wiper to ADC\
    \ channels A0 and A1. Likewise, the potentiometer, visible on the far left, is\
    \ connected to ADC channel A5. Two buttons, visible near the bottom of Figure\
    \ 17.2, connect voltage dividers consisting of a 10 kΩ resistor to the positive\
    \ supply voltage, as well as 68 kΩ and 47 kΩ resistors. By using additional resistors\
    \ to ground with different values, it is possible to detect more buttons – one\
    \ at a time. Pressing the buttons supplies a definite voltage level to ADC channel\
    \ A7. Finally, there is a switch connected to IO pin D4. To clarify the wiring,\
    \ we also show the schematic corresponding to the breadboard layout in Figure\
    \ 17.3.\n\nThe sketch running on the remote controller that uses the hardware\
    \ described in the previous paragraph is the following. Since the sketch is fairly\
    \ long, we show and describe the preparatory sections first.\n\n## Figure 17.2\
    \ Simplified setup of the remote controller on a breadboard†.\n\n## Figure 17.3\
    \ The schematic of the remote controller†.\n\n260 ■ A Hands-On Course in Sensors\
    \ Using the Arduino and Raspberry Pi, Second Edition\n\n```\n// RCsenderUDP, V.\
    \ Ziemann, 170705\nconst char* ssid     = \"FireBot\";\nconst char* password =\
    \ \"..........\";\nconst char* host = \"192.168.4.1\";\nconst int port=1137;\n\
