    \ if (strstr(line,\"START\")) {\n      Timer1.start();\n    } else if (strstr(line,\"\
    STOP\")) {\n      Timer1.stop();\n    }\n  }\n  delay(10);\n}\n```\n\n在`loop()`函数中，我们可以使用标准的查询-响应结构来调整Timer1的参数，以指定`PERIOD`和`WIDTH`。更改这些参数后，我们立即根据需要调用`Timer1.setPeriod()`和`Timer1.pwm()`。输出引脚立即输出具有新参数的信号。命令`STOP`和`START`分别禁用和重新启动输出。请注意，输出信号是矩形的。它要么是开，要么是关。例如，要获得正弦输出，我们使用AD9850\
    \ DDS，它已经在[图3.14](Figure 3.14)的右侧展示过。\n\n![图4.23 连接到UNO的面包板上的AD9850†。](img/8f23875c54d5b3177d5d2a5bba06b37e_124_0.png)\n\
    \n图4.23显示了一个由UNO控制的AD9850。除了用于电源和地线的导线外，还需要四根额外的导线来设置频率。UNO上引脚D5的`W_CLK`和D3上的`DATA`用于传输设置频率的控制字，D4上的`FQ_UD`将输出更新到新频率，D2上的`RESET`用于初始化设备。正弦输出信号可从标有*sine\
    \ output*的两根导线获得。以下在UNO上运行的程序首先定义了初始频率、面包板上晶振的频率以及UNO上的四个引脚。宏**pulse_high**简单地对指定引脚产生一个脉冲。它在函数**set_frequency()**中使用，该函数接收以Hz为单位的频率作为输入并初始化设备。它遵循数据手册来计算相位增量寄存器**freq1**的值，然后将其逐位时钟输入设备。请注意，**freq1**中只有32位，我们依次向右移动。因此，最后八位全为零，并将正弦波的初始相位设置为零。最后，通过脉冲`FQ_UD`使新频率生效。\n\
    \n```cpp\n// AD9850, V. Ziemann, 221024\ndouble freq=100000;  // initial frequency\n\
    #define AD9850_CLOCK 125000000\nconst int W_CLK=5,FQ_UD=4,DATA=3,RESET=2;\n#define\
    \ pulseHigh(pin) {digitalWrite(pin,HIGH); digitalWrite(pin,LOW);}\nvoid set_frequency(double\
    \ frequency) {\n  pulseHigh(RESET); pulseHigh(W_CLK); pulseHigh(FQ_UD); // Reset\n\
    \  int32_t freq1=frequency * 4294967295/AD9850_CLOCK;\n  for (int i=0; i<40; i++){\n\
    \    digitalWrite(DATA,(freq1 >> i) & 0x01);\n    pulseHigh(W_CLK);\n  }\n  pulseHigh(FQ_UD);\n\
    }\nvoid setup() {\n  Serial.begin(9600);\n  pinMode(FQ_UD,OUTPUT); pinMode(W_CLK,OUTPUT);\n\
    \  pinMode(DATA,OUTPUT); pinMode(RESET,OUTPUT);\n  set_frequency(freq);\n}\nvoid\
    \ loop() {\n  if (Serial.available()) {\n    char line[30];\n    Serial.readStringUntil('\\\
    n').toCharArray(line,30);\n    if (strstr(line,\"FREQ \")) {\n      freq=atof(&line[5]);\n\
    \      set_frequency(freq);\n    } else if (strstr(line,\"FREQ?\")) {\n      Serial.print(\"\
    FREQ \"); Serial.println(freq);\n    }\n  }\n}\n```\n\n`setup()`函数仅初始化串口，将四条控制线声明为输出，并设置起始频率。在`loop()`函数中，我们提供了设置新频率和请求当前设置频率信息的功能。\n\
    \n到目前为止，我们已经有多种方法来控制电压、开关和电机的幅度和时序。现在，我们将通过讨论几种吸引用户注意力的方法来结束本节，这在发生故障或其他需要人工干预的事件时非常有用。\n\
    \n## 4.5.7 人类注意力执行器\n\nNeoPixel灯条有点像打了激素的LED。一个红色、一个绿色和一个蓝色LED单元，连同WS2811控制器，被组装成由八个或更多可独立寻址的此类单元组成的灯条。在使用它们之前，我们需要从“工具”菜单的库管理器中安装Adafruit_NeoPixel库。该库提供了设置所有单个LED强度的函数。我们通过在一个八单元NeoPixel灯条上显示用DS18b20测量的温度（如图4.11和再次在图4.24中所示）在21到28度之间来说明其用法。DS18b20连接到UNO的5V和地，并通过引脚D2读取。同样，NeoPixel灯条连接到电源轨，并通过引脚D6控制。由于灯条可能会突然消耗大电流，我们在电源轨上添加一个几μF的电容。以下程序基于第85页的示例；它只添加了初始化和使用NeoPixel的代码。首先，我们指定像素数量和灯条连接的引脚，然后创建一个具有标准参数的对象`pixel`。在`setup()`函数中，我们只需要调用`pixels.begin()`来初始化接口。在`loop()`函数中，我们首先测量温度并将实际值转换为高于20度的温度，即整数`imax`。"
