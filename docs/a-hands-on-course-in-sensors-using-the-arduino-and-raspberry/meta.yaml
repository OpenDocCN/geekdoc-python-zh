    ## 微控制器：Arduino


    本书中使用的微控制器都受到Arduino *集成开发环境*（IDE）的支持，该环境提供了一个易于使用的编程环境，使我们能够快速开始开发软件。虽然存在一些限制，但它是一个学习微控制器的绝佳系统。


    ### 4.1 硬件


    最初的Arduino基于Atmel微控制器，我们主要讨论Arduino UNO。后来，基于内置WLAN支持的ESP8266和ESP32微控制器的其他系列控制器也被集成到Arduino
    IDE中。因此，这些控制器可以像UNO一样进行编程。但让我们从UNO开始。


    #### 4.1.1 Arduino UNO


    Arduino UNO如图4.1所示，其主要组件是来自Atmel（现为Microchip™）的ATmega328p微控制器，即图中带有28个引脚的大芯片。它是一个具有8位宽寄存器的控制器，以16
    MHz的时钟频率运行。它拥有32 kB的RAM内存和1 kB的非易失性EEPROM内存，可用于存储需要在电源关闭和打开后仍然保留的持久数据。板上有三个定时器，本质上是计数时钟周期的计数器，可编程为在计数器达到某个值时执行某些操作。UNO通过13个数字输入输出（IO）引脚与其环境交互，其中大多数引脚可配置为输入或输出，并具有软件可配置的上拉电阻。多个引脚可配置为支持I2C、SPI和RS-232通信。此外，还有六个模拟输入引脚。它们测量高达5V电源电压的电压。可选地，内部参考电压源提供1.1V的参考电压。所有数字和模拟引脚都连接到Arduino印刷电路板（PCB）两侧可见的引脚排针上。此外，内置的硬件RS-232端口连接到一个RS-232转USB转换器，允许与主机计算机进行通信和编程。UNO板上没有WiFi、蓝牙或以太网支持，但可以提供扩展板，即所谓的*扩展板*，直接安装在引脚排头上以提供这些功能。


    可以将Arduino UNO描述为具有洗衣机的智能。它用定时器计时，可以感知来自例如温度传感器的电压，并且可以根据是否满足某些条件来打开或关闭电机或泵。通过这种方式，它还可以提供粘合逻辑，将传感器（模拟、I2C、SPI和其他）连接到主机计算机，这正是我们稍后将使用UNO的模式。顺便提一下，Arduino板有多种选择，从尺寸较小的*Micro*和*Nano*，到具有大量IO引脚的*Mega*，再到具有更强大CPU和内置无线接口的*MKR*、*RP2040*和*Portenta*板。


    然而，在下一节中，我们将讨论另一组微控制器，即ESP8266和ESP32。


    ### 4.1.2 ESP8266、NodeMCU和ESP32


    ESP8266由中国公司乐鑫于2014年发布，随后是2016年的ESP32。这些控制器迅速成为物联网（IoT）项目中最令人兴奋的平台之一，因为它们内置了开箱即用的WiFi支持，包括一个小型贴片天线。乐鑫的软件开发工具包（SDK）很快被集成到Arduino
    IDE中，如今ESP8266和ESP32可以像原始Arduino一样轻松地使用Arduino生态系统进行编程。


    但现在让我们看看ESP8266硬件，它有不同的版本。我们不仅将关注更复杂的NodeMCU板，还将在本节中提及基本的ESP-01。ESP-01和NodeMCU硬件的图像分别显示在图4.2的左侧和中心。两个芯片上的微控制器本质上是相同的，只是路由到电路板引脚的内部引脚数量不同。在内部，ESP8266芯片具有32位RISC
    CPU，通常以80 MHz或160 MHz运行，并拥有64 kB的指令RAM和96 kB的数据RAM。有16个通用IO（GPIO）引脚，可配置为输入或输出引脚，以及一个具有10位ADC的模拟输入。控制器支持I2C和SPI通信以及RS-232。所有这些都与Arduino类似，只是它运行得更快，内部寄存器更宽（ATmega中为32位而不是8位），但真正酷的特性是内置的WiFi支持。它符合IEEE
    802.11 b/g/n规范，支持WPA认证，这是当今大多数无线网络使用的标准。因此，基本上，我们可以将ESP8266连接到任何无线网络。


    在ESP8266发布两年后，更强大的双核ESP32微控制器问世。它实际上具有早期型号的所有功能，包括WiFi，但运行时钟速度更高，最高可达240 MHz，拥有320
    kB的RAM，并且板载支持蓝牙（BLE）。对于数据采集应用特别有吸引力的是多达十八个12位ADC通道和两个八位数模转换器（DAC）。近年来，出现了许多具有不同核心数量和其他功能的ESP32变体。


    在介绍了硬件之后，我们需要继续前进并开始编程。因此，我们在下一节中为Arduino IDE提供一个快速入门指南。


    ### 4.2 入门


    尽管有新的Arduino IDE版本2可用，但我们建议使用最新的版本1，即撰写本文时的1.8.19版本，因为后续章节中需要的一些功能在版本2中尚不可用。两个版本都可以从[https://www.arduino.cc/en/software](https://www.arduino.cc/en/software)获取，适用于最常见的操作系统，包括Linux、Mac和Windows。基本上，我们访问该网页，选择适合我们计算机类型的版本，然后下载软件包。然后，我们按照网站上给出的说明进行安装。安装完成后，我们通过点击图标启动IDE，或者通过在命令行中输入`arduino`然后按`Enter`来启动，这应该会打开IDE并显示一个类似于图4.3所示的窗口。如果没有，请通过从“文件”菜单中选择“新建”来创建一个“新建”草图，这是Arduino程序的名称。


    在这里，我们已经看到了Arduino程序（或同义词“草图”）的一般结构。有一个`setup()`函数，它在电源打开后*执行一次*。在此例程中完成所有初始化工作，例如定义引脚为输出或输入，以及配置串行线路。一旦`setup()`函数完成，`loop()`函数就会被重复调用，这样一旦它完成，它就会再次被调用，如此往复，直到电源关闭。请注意，Arduino
    IDE支持的编程语言与C语言非常相似。但是，有许多扩展可以提供对特定硬件的访问，例如ADC。'
