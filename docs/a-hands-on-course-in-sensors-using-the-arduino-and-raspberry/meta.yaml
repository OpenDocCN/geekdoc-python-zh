- md: '## 2.3.4 SPI devices


    The SPI interface is a synchronous serial communication bus, similar to the I2C
    bus, but it can operate at much higher speed and is therefore often used for devices
    that require the continuous transfer of large amounts of data, such as displays
    or audio equipment. SPI communication requires one master on the bus, a role normally
    taken by a microcontroller. The sensors are typically slave devices. They need
    at least six wires to connect: ground and supply voltage, the clock CLK, one line
    to send information from the master to the slave (MOSI, for master-out slave-in),
    one line for the reverse direction (MISO for master-in slave-out), and a chip-select
    line CS to identify the currently active slave. CLK, MISO, and MOSI lines can
    be shared among many slaves, but each slave requires its individual CS line.


    Some of the devices in the I2C section support this interface as well, and the
    interface can normally be selected by setting a pin on the device high or low.
    Details can be found in the datasheets.


    In a later project we connect the analog-to-digital converter MCP3304 to a microcontroller
    via SPI communication. It has eight single-ended 12-bit input channels but can
    also be configured to use two input channels as differential input. This circuit
    detects whether one or the other input is larger and thereby provides an additional
    sign bit. Thus, it provides one extra bit to obtain a 13-bit resolution. At the
    same time, the input range is extended to plus or minus times the supply voltage,
    despite operating from a unipolar power supply.


    A wavelength-selective optical filter, placed just before a phototransistor that
    detects the residual intensity; more CO₂ molecules simply absorb more light and
    reduce the intensity. The sensor, mounted on a small breadboard, is shown on the
    right-hand side in Figure 2.38. A small on-board microcontroller converts the
    intensity to the concentration in parts-per-million (ppm) that is accessible via
    I2C bus at address 0x61. Apart from the concentration, the SCD30 even measures
    the temperature and the humidity, both of which affect CO₂ sensing and are used
    to improve the resolution accuracy.


    The HYT221 and HYT939 are sensors that measure the *relative humidity* in the
    range from 0 to 100 %RH with a resolution of about 0.02 %RH. The operational principle
    of the measurement is based on a capacitor with a dielectric, made of a polymer
    as the sensing medium. The polymer is highly hygroscopic and easily absorbs water,
    which changes the relative dielectric constant ε_r by a large amount, because
    ε_r of the dry material is much smaller than that of water, which is about 80.
    Correspondingly, the capacitance C, being proportional to ε_r, changes by a large
    amount as well. This change of the capacitance is determined in a Wheatstone bridge
    with capacitors in two branches. For the calculation of the relative humidity,
    knowledge of the temperature is required, and provided by a built-in temperature
    sensor. On board, the raw data are compensated for a number of non-linearities,
    post-processed, and made available in registers that are accessible via an I2C
    interface. The I2C address of the sensor is hard-wired to 0x28 and a device is
    shown on the right-hand side in Figure 2.36.


    The HMC5883 is a three-axis magnetic field sensor that is based on the change
    of the resistance due to the *magnetoresistive* effect. The active material is
    a long meandering strip of a nickel-iron alloy on a nonconducting substrate. The
    change of resistance is due to the change of the spin–orbit coupling of valence
    electrons in the material. This affects the ease with which the conduction electrons
    propagate through the material and consequently the resistance. The active material
    is part of a Wheatstone bridge whose output voltage is conditioned and amplified
    before being digitized with an on-board ADC and made available on the I2C bus.
    The HMC5883L measures the field along three axes with a 12-bit (4192 steps) resolution
    in the range of ±8 gauss or ±800 μT. It is typically used in compass applications
    for mobile phones. The noise floor of the measurements is on the order of 0.2
    μT and up to 160 measurements/s can be taken.


    The MPU-6050 is a three-axis motion-detection chip consisting of an *accelerometer*
    and *gyroscope* to measure acceleration and angular velocities in three spatial
    dimensions. The accelerometer is based on the same sensing principle as the ADXL335
    discussed previously and illustrated in Figure 2.11, where a spring-suspended
    inertial mass changes its position when accelerated and varies capacitances that
    are measured in a bridge circuit. In the MPU-6050, however, digitizer and post-processing
    digital circuitry are added to provide the measurement data in digital form. The
    operational principle of the *gyroscope* [14] on the MPU-6050 is illustrated in
    Figure 2.39, where a small mass, suspended by springs on an inner frame, is forced
    to oscillate in the *x* direction by a micromachined electrostatic motor. The
    mass therefore has a velocity component *v_x* in the same direction. If the entire
    assembly rotates around the *z* axis, which points into the paper, a Coriolis
    force, given by the crossproduct of the velocity vector and the rotation vector,
    will point along the *y* axis. And this force moves the inner frame in the *y*
    direction, against the force of the springs that connect the inner to the outer
    frame. This motion subsequently produces an imbalance in the sensing capacitors,
    very much like what happens in the accelerometer, and is sensed in much the same
    way as well. Also, here the analog voltages are digitized on the chip, further
    processed, and made available on an I2C bus. The performance of the device is
    rather impressive. It measures the acceleration in various ranges between ±2 g
    and ±16 g with 16-bit resolution and a rate of up to 1 kHz. The rotation speed
    can be measured between ±250°/s and ±2000°/s with a resolution of about 10 to
    100°/s and a rate of up to 8 kHz. The I2C address of the device is 0xA0 or 0xA1,
    depending on the state of IO-pin AD0. An enhanced version of the MPU-6050 is the
    new ICM-20948 sensor with I2C address 0x68 or 0x69. It combines the functionality
    of accelerometer and gyroscope with that of a three-axis AK09916 Hall sensor,
    all internally aligned. The magnetic sensor has its own I2C address 0x0C, but
    shares the I2C pins with the accelerometer and the gyroscope.


    The MAX30102, mounted on a small breakout board called MAXREFDES117 and sold by
    the manufacturer of the circuit, is shown in the middle of Figure 2.40. It is
    a *pulse-oximeter* that determines the heart-rate and the saturation level of
    oxygen in blood by using a phototransistor to measure the relative absorption
    of the light emitted by a red LED and an infrared LED. Infrared light is predominantly
    absorbed by oxygenated hemoglobin, which is the molecule that transports oxygen
    in our blood. Red light, on the other hand, is predominantly absorbed by hemoglobin
    without attached oxygen molecules. By measuring the two absorptions many times
    during a heart beat it is possible to extract the time-varying pulsation of the
    oxygenated blood coming in the arteries from the heart. Determining the ratio
    of two time-varying signals has the benefit of reducing many systematic variations
    among different individuals that would otherwise compromise the accuracy of the
    measurements. The MAX30102 provides the raw signal from the phototransistor while
    much of the numerical postprocessing is relegated to a microcontroller that communicates
    with the device listening at address 0x57 via I2C.


    The AD5933 is an example of a bioimpedance measurement system. It contains a frequency-adjustable
    current source and a subsystem to synchronously measure the voltage drop across
    an unknown impedance, for example the part of a human body between electrodes.
    Frequencies below 1 kHz only probe the uppermost layer of the skin, because the
    skin behaves like the capacitor in a high-pass filter and blocks the lower frequencies
    to enter deeper into the body. With higher excitation frequencies we probe deeper
    into the body and determine the amount of body fat by measuring the rest, which
    is mostly water. Frequencies around 10 kHz measure the water outside of cells
    because cell membranes also act like a capacitors that block the lower frequencies,
    but increasing the frequencies above 50 kHz also determines the water inside the
    cells and thus the total amount of water in the body. Like the other devices in
    this section is the AD5933 accessible via I2C at address 0x0D.


    The TCS34725, shown on the right in Figure 2.40, is a *color sensor* that uses
    multiple photodiodes to determine the color of light by sensing the current from
    photo diodes behind optical filters that predominantly let one color pass, three
    diodes for red, three for green, and three for blue. Moreover, three unfiltered
    diodes provide information about light intensity. Internally, the photocurrents
    from the diodes are first integrated, then digitized with a 16-bit ADC, before
    they are made available on an I2C bus at address 0x29.


    The sensor chips are usually very small and difficult to work with, but luckily
    there are so-called breakout boards available that route the pins of the sensors
    to normally spaced (2.5 mm spacing) pins that can be attached, for example, to
    solderless breadboards. Figure 2.40 shows an MPU-6050, MAX30102, and a TCS34725
    mounted on breakout boards.'
  mdcn: '## 2.3.4 SPI 设备


    SPI 接口是一种同步串行通信总线，类似于 I2C 总线，但其运行速度要快得多，因此常用于需要连续传输大量数据的设备，例如显示器或音频设备。SPI 通信需要总线上有一个主设备，这个角色通常由微控制器担任。传感器通常是它们的从设备。它们至少需要六根线进行连接：地线和电源电压、时钟线
    CLK、一根用于从主设备向从设备发送信息的线路（MOSI，即主出从入）、一根用于反向传输的线路（MISO，即主入从出），以及一根片选线 CS 用于标识当前活动的从设备。CLK、MISO
    和 MOSI 线可以在多个从设备之间共享，但每个从设备都需要其独立的 CS 线。


    I2C 部分中的一些设备也支持此接口，通常可以通过将设备上的一个引脚设置为高电平或低电平来选择接口。详情请参阅数据手册。


    在后续项目中，我们将通过 SPI 通信将模数转换器 MCP3304 连接到微控制器。它具有八个单端 12 位输入通道，但也可以配置为使用两个输入通道作为差分输入。该电路检测哪个输入更大，从而提供一个额外的符号位。因此，它提供了一个额外的位以获得
    13 位分辨率。同时，尽管使用单极性电源供电，输入范围也扩展到了电源电压的正负倍数。


    一个波长选择性光学滤光片，放置在检测剩余强度的光电晶体管之前；更多的 CO₂ 分子会吸收更多的光并降低强度。该传感器安装在一块小面包板上，如图 2.38 右侧所示。一个小型板载微控制器将强度转换为百万分率（ppm）的浓度值，可通过
    I2C 总线在地址 0x61 访问。除了浓度，SCD30 甚至还能测量温度和湿度，这两者都会影响 CO₂ 检测，并用于提高分辨率精度。


    HYT221 和 HYT939 是测量 *相对湿度* 的传感器，范围从 0 到 100 %RH，分辨率约为 0.02 %RH。其测量原理基于一个以聚合物作为传感介质的介电电容器。该聚合物具有高度吸湿性，容易吸收水分，这会显著改变相对介电常数
    ε_r，因为干燥材料的 ε_r 远小于水的 ε_r（约为 80）。相应地，与 ε_r 成正比的电容 C 也会发生很大变化。这种电容变化是通过一个在两个分支中包含电容器的惠斯通电桥来确定的。为了计算相对湿度，需要温度知识，这由内置温度传感器提供。在板上，原始数据经过多种非线性补偿、后处理，并存储在可通过
    I2C 接口访问的寄存器中。该传感器的 I2C 地址硬编码为 0x28，一个设备如图 2.36 右侧所示。


    HMC5883 是一种三轴磁场传感器，其工作原理基于 *磁阻* 效应引起的电阻变化。活性材料是沉积在非导电基板上的镍铁合金长蜿蜒条带。电阻的变化是由于材料中价电子的自旋-轨道耦合发生变化。这影响了传导电子在材料中传播的难易程度，从而影响电阻。活性材料是惠斯通电桥的一部分，其输出电压经过调理和放大，然后通过板载
    ADC 数字化，并在 I2C 总线上提供。HMC5883L 在 ±8 高斯或 ±800 μT 的范围内，以 12 位（4192 步）分辨率测量三个轴上的磁场。它通常用于手机的指南针应用中。测量的噪声本底约为
    0.2 μT，每秒最多可进行 160 次测量。


    MPU-6050 是一款三轴运动检测芯片，由一个 *加速度计* 和一个 *陀螺仪* 组成，用于测量三个空间维度上的加速度和角速度。加速度计基于与之前讨论的
    ADXL335 相同的传感原理（如图 2.11 所示），其中弹簧悬挂的惯性质量在加速时改变其位置，并改变在电桥电路中测量的电容。然而，在 MPU-6050
    中，增加了数字化器和后处理数字电路，以数字形式提供测量数据。MPU-6050 上 *陀螺仪* [14] 的工作原理如图 2.39 所示，其中一个小质量块通过弹簧悬挂在内框架上，由微机电静电电机强制在
    *x* 方向振荡。因此，该质量块在相同方向上具有速度分量 *v_x*。如果整个组件绕指向纸内的 *z* 轴旋转，根据速度矢量和旋转矢量的叉积，会产生一个科里奥利力，该力将沿
    *y* 轴方向。这个力会将内框架沿 *y* 方向移动，对抗连接内框架和外框架的弹簧力。这种运动随后会在传感电容器中产生不平衡，非常类似于加速度计中发生的情况，并且其感知方式也大致相同。同样，这里的模拟电压在芯片上数字化，进一步处理，并通过
    I2C 总线提供。该设备的性能相当出色。它在 ±2 g 到 ±16 g 之间的各种范围内测量加速度，分辨率为 16 位，速率高达 1 kHz。旋转速度可在
    ±250°/s 到 ±2000°/s 之间测量，分辨率约为 10 到 100°/s，速率高达 8 kHz。该设备的 I2C 地址为 0xA0 或 0xA1，具体取决于
    IO 引脚 AD0 的状态。MPU-6050 的增强版本是新的 ICM-20948 传感器，I2C 地址为 0x68 或 0x69。它将加速度计和陀螺仪的功能与三轴
    AK09916 霍尔传感器的功能结合在一起，所有轴在内部对齐。磁传感器有自己的 I2C 地址 0x0C，但与加速度计和陀螺仪共享 I2C 引脚。


    MAX30102 安装在一块名为 MAXREFDES117 的小型分线板上，由电路制造商销售，如图 2.40 中间所示。它是一个 *脉搏血氧仪*，通过使用光电晶体管测量红色
    LED 和红外 LED 发出的光的相对吸收来确定心率和血液中的氧饱和度。红外光主要被含氧血红蛋白吸收，这是我们血液中运输氧气的分子。另一方面，红光主要被未结合氧分子的血红蛋白吸收。通过在一次心跳期间多次测量这两种吸收，可以提取出从心脏进入动脉的含氧血液的时变脉动。确定两个时变信号的比率的好处是减少了不同个体之间的许多系统性差异，否则这些差异会损害测量的准确性。MAX30102
    提供来自光电晶体管的原始信号，而大部分数值后处理则交给一个微控制器完成，该微控制器通过 I2C 与监听地址 0x57 的设备通信。


    AD5933 是生物阻抗测量系统的一个例子。它包含一个频率可调的电流源和一个子系统，用于同步测量未知阻抗（例如人体电极之间的部分）上的电压降。低于 1 kHz
    的频率仅探测皮肤的最外层，因为皮肤表现得像高通滤波器中的电容器，阻止较低频率进入身体更深处。随着激励频率的增加，我们可以探测到身体更深处，并通过测量主要是水的其余部分来确定体脂量。10
    kHz 左右的频率测量细胞外的水，因为细胞膜也像电容器一样阻挡较低频率，但将频率提高到 50 kHz 以上也可以确定细胞内的水，从而确定身体的总水量。与本节中的其他设备一样，AD5933
    可通过 I2C 在地址 0x0D 访问。


    TCS34725 如图 2.40 右侧所示，是一个 *颜色传感器*，它使用多个光电二极管来确定光的颜色，方法是感知位于光学滤光片后面的光电二极管产生的电流，这些滤光片主要让一种颜色通过，三个二极管用于红色，三个用于绿色，三个用于蓝色。此外，三个未过滤的二极管提供有关光强度的信息。在内部，来自二极管的光电流首先被积分，然后用
    16 位 ADC 数字化，之后通过 I2C 总线在地址 0x29 提供。


    传感器芯片通常非常小，难以操作，但幸运的是有所谓的分线板可用，它们将传感器的引脚引出到通常间距（2.5 mm 间距）的引脚上，这些引脚可以连接到例如无焊面包板上。图
    2.40 显示了安装在分线板上的 MPU-6050、MAX30102 和 TCS34725。'
