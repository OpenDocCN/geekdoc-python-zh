    并将文件中的第二行从`window_manager=mutter`更改为`window_manager=openbox`，保存文件并重启。请注意，编辑文件需要管理员权限，因此我们需要在命令前加上`sudo`。


    任何在官方Raspberry Pi软件仓库中可用的程序、库或其他软件包，都可以通过首先使用`sudo apt-get update`更新数据库（每个会话只需一次），然后使用`sudo
