  md: '# CHAPTER 18


    # Presenting and Writing


    After having gone through the basic electronics and programming examples, both
    on Arduinos and on the Raspi, and after completing several projects, we need to
    communicate our activities to our colleagues and condense our activities into
    a well-motivated and concise sequence of descriptions. This can be in the form
    of a presentation with slides, or as a report for a thesis or a journal. As a
    template for the contents of either presentation or report, we use the weather
    station example, just to illustrate the concepts with a specific example. We start
    with the discussion of a presentation with slides.


    # 18.1 PREPARING A PRESENTATION


    The key issues when preparing a presentation are *motivation* and a good *story
    line*, as well as substantial subject matter. Why is that so? The audience of
    a seminar usually is rather heterogenous and we have to provide a funnel to guide
    them from their different backgrounds to the subject matter of the seminar. Often
    a good start is stating a problem that is easy to understand and then pointing
    out how our project solves or at least alleviates the problem. The weather station
    came up in my home lab, because we use pressure vessels filled with liquid helium
    as well as high-voltage equipment. The potential effect of barometric pressure
    on the pressure vessels and the relevance of humidity for high voltage is intuitively
    understandable for most people. So that is a viable motivation as to why we care
    about the weather station as a device that helps us to correlate weather-based
    data with other measurement data.


    Once we have captured the attention of the audience with a catchy motivation,
    we need to keep it alive by following a well-conceived *story line* that places
    the relevant topics – the subject matter of the seminar – in a logically coherent
    sequence where one detail follows the previous in a natural way. My suggestion
    is to start with easily understandable facts and then progressively increase the
    complexity of the discussed material. We must avoid situations where the audience
    starts wondering *why* we talk about a particular topic and loses track of our
    story line. Since the story line addresses the overall organization of the presentation
    it needs to be sorted out beforehand.


    A method to organize a presentation that I found useful is the following: I start
    by estimating the number of slides that fit into the allotted time. An average
    slide typically requires 2–3 minutes for the audience to absorb. Thus, for a 20-minute
    presentation I target about 8–10 slides as a rule of thumb. Then I prepare a title
    page with a catchy title that encapsulates the essential point of the seminar,
    followed by one slide that motivates the problem I intend to address. This I follow
    up with a brief and qualitative description of the idea of how to solve it that
    I will elaborate in the remainder of the seminar. At this point the audience should
    have a good idea about the scope of my seminar and should'
  merge: -1
  pgno: 293
- img_proc: true
  md: 'be convinced that the idea I pursue has a decent chance of addressing the problem
    in a meaningful way. On the subsequent slides it is useful to concentrate on the
    *flow* of some quantity or some information from one stage to the next. In the
    example with the weather station, the information flows from the sensor via the
    microcontroller to the host computer where it is presented, either on a web page
    or accessible via control system. This flow of information we can mimic in the
    organization of the slides.


    For the bulk of the presentation, I recommend preparing the allotted number of
    empty slides and giving each slide a title. The title should address one key issue
    per slide and the sequence of slides should follow the logical flow we have identified
    beforehand. In the weather-station example we have the issues: hardware with sensors,
    microcontroller, host computer, then software running on the respective computing
    devices and protocols used to interface the devices. Once we have the slides with
    their titles, we can shuffle them around until we are satisfied with our story
    line.


    In the next step I place one or several pictures or graphs on each slide to illustrate
    the topic on the slide. Once all, or at least most, slides are equipped with a
    picture, I add a few bullet-points with keywords to each slide. They remind me
    of what I intend to say when presenting. They help me to understand my slides
    after 6 months, and those in the audience to remember what I said after 2 months.
    The slides are not a substitute for a self-contained report, but serve as illustrations
    for my presentation during a seminar.


    Once all slides contain a picture and a few keywords, it is time to review the
    story line again and see whether linking of the slides works. This addresses the
    flow from one slide to the next and whether it comes in a natural and well-motivated
    way. If many forward references are necessary, I consider reordering the slides
    to achieve a more natural flow where information required at some stage is already
    discussed on a previous slide. Sometimes forward references are difficult to avoid,
    but I try to minimize them.


    When almost all slides are completed, I suggest preparing a final slide with a
    clear synopsis of the main results and possibly some comments about how to extend
    the work. After a final pass through the slides, with a check for coherence to
    ensure that the title and final slides act as parentheses to enclose the subject
    matter, the presentation is ready.


    Just for convenience I summarize the above guidelines in a presentation cookbook:


    +   - Motivation: the problem and intended way to address it.

    - Think of a story line and the logical flow of a concept, preferably with increasing
    complexity.

    - Write a title on each slide and sort to follow the story line.

    - Add pictures to slides.

    - Add keywords to slides.

    - Add slide with conclusions and outlook.

    - Final check of coherence and linking. Done!


    Naturally, my presentation cookbook is subjective, and should not keep you from
    using a working way of preparing slides, but if you get stuck very early on in
    the process of preparing a seminar, my guidelines may help you to get started.


    Presenting one''s work in a seminar is the first step, and writing it up in a
    report or a thesis is the next.'
