  - "[PAGE 247]\n\n# Example: Fast Acquisition\n\nOccasionally it is desirable to\
    \ observe and generate signals at rates higher than the few hundred samples per\
    \ second from Chapter 13, for example to analyze communication channels, such\
    \ as RS-232, or to observe acoustic signals. Luckily, the ESP32 is capable of\
    \ sampling at rates in excess of 200 000 samples per second by directly transferring\
    \ samples from the ADC into memory without using the CPU using a mode called *direct\
    \ memory access* (DMA). It uses the I2S (Inter-IC Sound) support on the ESP32\
    \ chip that is normally dedicated to digitally transmitting music. Moreover, the\
    \ ESP has built-in frequency generators for sinusoidal and rectangular signals\
    \ in the same frequency range.\n\nIt is straightforward to add these features\
    \ to our data acquisition system by including the following code snippet – based\
