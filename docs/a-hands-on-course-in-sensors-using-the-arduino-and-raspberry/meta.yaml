- md: "## 4.4.2 Analog input\n\nIn an earlier chapter, we saw that some sensors require\
    \ us to measure an analog voltage because they change their resistance. We place\
    \ them in a voltage divider and then read the voltage change on the central tap,\
    \ as shown on the left in Figure 2.1. Others, such as the LM35 temperature sensor,\
    \ directly produce a voltage and in this section we show how to interface these\
    \ sensors to the Arduino. First, we want to measure a voltage from one of the\
    \ analog input pins; here we use A0. The left of Figure 4.6 shows how to connect\
    \ a potentiometer as a variable voltage divider to the Arduino. One end of the\
    \ potentiometer is connected to ground, the other end to the supply voltage, and\
    \ the wiper with the variable tap of the potentiometer is connected to pin A0.\
    \ Turning the axis of the potentiometer causes the voltage on the center tap to\
    \ vary between ground and the 5 V supply voltage. The sketch to read the voltage\
    \ and report it via the serial cable (that is connected to the USB port) to the\
    \ host computer is shown next.\n\n```cpp\n// Analog and serial communication,\
    \ V. Ziemann, 161130\nint inp,val;\nvoid setup() {\n  Serial.begin(9600);  //\
    \ baud rate\n}\nvoid loop() {\n  if (Serial.available()) {\n    inp=Serial.read();\
    \          // read character from serial\n    val=analogRead(0);          // read\
    \ analog\n    Serial.print(\"Value is \");  // and report back\n    Serial.println(val);\n\
    \  }\n  delay(50);                    // wait 50 ms\n}\n```\n\nSince we want to\
    \ temporarily store integer values, we have to allocate memory for the variables,\
    \ which is done in the line containing `int inp,val;` as it declares two integer\
    \ variables named `inp` and `val`. In the `setup()` function, we declare that\
    \ we want to use the built-in serial (RS-232) hardware port with a speed of 9600\
    \ baud, which is about 1000 characters per second. The receive (RX) and transmit\
    \ (TX) lines of the serial port are connected to pin 0 and pin 1, but also routed\
    \ to the RS232-USB converter on the UNO board that is connected to the host computer.\
    \ In the `loop()` function, we first check whether some communication from the\
    \ host computer has arrived, and if that is the case, we read the character with\
    \ the `Serial.read();` command, but do nothing further with it. In the next line\
    \ we read the analog pin A0 using the built-in ADC, and store the value in the\
    \ integer variable `val`. The value returned from the 10-bit ADC is a number between\
    \ 0 and 1023 (= 2^10 - 1) and *not* the voltage. Later we will show how to convert\
    \ this value to a voltage. The result of the measurement is then sent via the\
    \ serial line by `Serial.print()` and `Serial.println()` commands. The difference\
    \ between the two is that the former does not send a carriage return character\
    \ at the end of the message, and the latter does. After the `if() { }` statement\
    \ at the end of the loop, again a small delay is added. Now we can compile and\
    \ download the sketch to the Arduino, unless some syntax error crept in. If that\
    \ is the case, we need to check for missing semicolons or spelling errors, especially\
    \ the “camelHump-spelling” and capital letters in the middle of the commands.\
    \ Care is advisable, but the IDE uses syntax highlighting, which makes such errors\
    \ reasonably easy to spot. After all errors are corrected, we download the sketch\
    \ to the hardware.\n\nOnce the sketch is running on the Arduino, we want to test\
    \ it, and for that we need to have access to the other end of the serial communication\
    \ channel on the host computer. The easiest way is to open the “Serial Monitor”\
    \ by pressing the icon that looks like a looking glass at the top right in the\
    \ Arduino IDE. Clicking on it opens a simple terminal program that has an input\
    \ text box at the top. After ensuring that the baud rate in the text box agrees\
    \ with the one specified in the sketch, we enter any character and press “Enter.”\
    \ If all is well, the Arduino should report with a line `Value is nnnn` in the\
    \ text box below the entry box. Now turn the potentiometer and enter a character\
    \ followed by “Enter,” and see how the returned value changes.\n\nSo far, so good,\
    \ but would it not be nice if we could read out more analog ports and even ask\
    \ for which ones to read. This task is addressed in the following sketch. It is\
    \ rather similar to the previous one, so we only discuss the new features.\n\n\
    ```cpp\n// Analog and Serial communication, v2, V. Ziemann, 161130\nint inp,val;\n\
    void setup() {\n  Serial.begin(9600);  // baud rate\n}\nvoid loop() {\n  if (Serial.available())\
    \ {\n    inp=Serial.read();       // read serial line\n    if (inp=='s') {\n \
    \     val=analogRead(0);     // read analog\n      Serial.print(\"A0= \");  //\
    \ and report back\n      Serial.println(val);\n    } else if (inp=='t') {\n  \
    \    val=analogRead(1);\n      Serial.print(\"A1= \"); Serial.println(val);\n\
    \    } else {\n      Serial.println(\"unknown command\");\n    }\n  }\n  delay(50);\
    \              // wait 50 ms\n}\n```\n\nIn this sketch we actually test which\
    \ character was sent on the serial line, and depending on whether it is an “s”\
    \ or a “t” the value from analog pin A0 or A1 is returned. The characters sent\
    \ back to the host via the serial line contain both the pin read and the value.\
    \ If a character different from “s” or “t” is received by the Arduino, the string\
    \ “unknown command” is returned via the serial line. In this way, we build a simple\
    \ query-response protocol to make the Arduino do different things, depending on\
    \ the character we send.\n\nIn the next example we assume that an LM35 temperature\
    \ sensor is connected to analog pin A0 in the way shown on the right in Figure\
    \ 4.6. Note that we add a 100 nF capacitor across the positive supply voltage\
    \ and ground pins of the LM35, to increase the stability of the circuit. Note\
    \ that it is good practice to add such a decoupling or bypass capacitor close\
    \ to the power pins of each chip in a circuit. In the following, we often do not\
    \ show these capacitors on the circuit diagrams in order to make them less cluttered,\
    \ but the capacitors should be included in the hardware. The software to interface\
    \ the LM35 is slightly more elaborate than in previous examples. It allows us\
    \ to send somewhat descriptive multicharacter commands to the Arduino and receive\
    \ a response that echos the request followed by the value. The basic idea is that\
    \ we request a parameter, say A0, by sending the parameter name with a question-mark\
    \ appended, such that the request looks like this: A0?. The Arduino subsequently\
    \ replies with A0 <value>. In the following sketch we implement this, but also\
    \ that the Arduino first reads a full line, in the sense that it waits for a carriage-return\
    \ and a line-feed character before responding.\n\n```cpp\n// query-response, V.\
    \ Ziemann, 161013\nint val;\nfloat temp;\nchar line[30];\nvoid setup() {\n  analogReference(INTERNAL);\
    \  // 1.1V internal ADC reference\n  Serial.begin (9600);\n  while (!Serial) {;}\n\
    }\nvoid loop() {\n  if (Serial.available()) {\n    Serial.readStringUntil('\\\
    n').toCharArray(line,30);\n    if (strstr(line,\"A0?\")==line) {\n      val=analogRead(0);\n\
    \      Serial.print(\"A0 \"); Serial.println(val);\n    } else if (strstr(line,\"\
    A1?\")==line) {\n      val=analogRead(1);\n      Serial.print(\"A1 \"); Serial.println(val);\n\
    \    } else if (strstr(line,\"T?\")==line) {\n      temp=1.1*100*analogRead(0)/1023;\n\
    \      Serial.print(\"T \"); Serial.println(temp);\n    } else {\n      Serial.println(\"\
    unknown\");\n    }\n  }\n}\n```\n\nIn the first few lines, we declare the variables,\
    \ and in particular, a 30-character buffer `line` to hold the multicharacter query.\
    \ In the `setup()` function, we use the internal 1.1 V reference voltage for the\
    \ ADC and initialize the Serial communication channel to operate at 9600 baud.\
    \ The `while(!Serial)` statement waits for the initialization of the Serial library\
    \ to complete, and is only needed on some newer Arduinos. We include it just for\
    \ safety. In the `loop()` function, we wait for characters to be available before\
    \ reading an entire line until the end-of-line character `\\n`. The `readStringUntil`\
    \ returns a `String` but we want to use a character array instead, and need to\
    \ convert the type in the appended `toCharArray` method. At this point the character\
    \ array `line` contains the request that was sent from the host computer to the\
    \ Arduino; for example, `A0?`. The following construction of `if (strstr(line,\"\
    A0?\")==line)` and similar commands checks whether `line` starts with the characters\
    \ `A0?` by comparing the pointer to the first occurrence of `A0?` in the array\
    \ `line[]` to the pointer to the start of `line[]`. The commands that follow are\
    \ executed provided the result evaluates to true, or else the subsequent comparison\
    \ in the `else if` sequence is tested. In the example, we test for `\"A0?\"`,\
    \ `\"A1?\"`, and `\"T?\"` to reply with the raw values of the analog pins 0 and\
    \ 1 or with the value from analog pin 0 converted to degrees Celsius. Consult\
    \ the discussion in [Section 2.1.2](#) regarding the conversion coefficient. If\
    \ a command arrives, and it is not in the list, the Arduino replies with `unknown\
    \ command`. The way to specify the query with an appended question mark and the\
    \ reply to echo the query with value appended is borrowed from the SCPI [23] command-language\
    \ that is commonly used to remotely control measurement equipment via GPIB, also\
    \ known as IEEE-488, or VXI.\n\nAs a final example, we discuss a simple *temperature\
    \ logger* that again uses the hardware setup as shown on the right side of Figure\
    \ 4.6, but sends the temperature value continuously to the host computer via the\
    \ serial line. The sketch is shown here:\n\n```cpp\n// ultra-simple LM35 temperature\
    \ logger, V. Ziemann, 161201\nfloat temp;\nvoid setup() {\n  analogReference(INTERNAL);\
    \  // 1.1V internal ADC reference\n  Serial.begin(9600);\n  while (!Serial) {;}\
    \  // wait for serial to initialize\n}\nvoid loop() {\n  temp=1.1*100*analogRead(0)/1023.0;\n\
    \  Serial.println(temp);\n  delay(1000);\n}\n```\n\nwhere the `setup()` function\
    \ equals that from the previous example, but the `loop()` function measures the\
    \ analog pin and converts the digital word to the temperature, and sends that\
    \ to the host computer. Then it waits 1000 ms before repeating the same. In the\
    \ Serial Monitor, that can be started by clicking on the button at the top right\
    \ in the IDE; we see that the temperature value in Celsius is reported once per\
    \ second in the lower text box provided the baud rate selected in the selection\
    \ box at the lower right matches the baud rate specified in the sketch.\n\nIn\
    \ the Arduino IDE, however, there is also a graphical plotting tool available.\
    \ We select it by choosing the `Tools->Serial Plotter` menu item. This opens a\
    \ window and shows the values received on the serial line in graphic format, provided\
    \ the baud rate is selected to match the one specified in the sketch. Note that\
    \ the `Serial Plotter` can show several measurement values simultaneously as traces\
    \ in different colors. This functionality, built in to the Arduino IDE, may serve\
    \ as a simple logger for temperatures or other measured values, if a quick solution\
    \ to record some values as a function of time is needed."
  mdcn: "## 4.4.2 模拟输入\n\n在前面的章节中，我们了解到某些传感器需要我们测量模拟电压，因为它们会改变自身的电阻。我们将它们置于分压电路中，然后读取中心抽头上的电压变化，如图2.1左侧所示。其他传感器，如LM35温度传感器，则直接产生电压。在本节中，我们将展示如何将这些传感器连接到Arduino。首先，我们想从其中一个模拟输入引脚测量电压；这里我们使用A0。图4.6左侧展示了如何将电位器作为可变分压器连接到Arduino。电位器的一端接地，另一端接电源电压，而电位器的滑动端（可变抽头）连接到A0引脚。转动电位器的轴会使中心抽头上的电压在接地和5V电源电压之间变化。接下来是读取电压并通过串行电缆（连接到USB端口）将结果报告给主机计算机的程序代码。\n\
    \n```cpp\n// 模拟与串行通信，V. Ziemann, 161130\nint inp,val;\nvoid setup() {\n  Serial.begin(9600);\
    \  // 波特率\n}\nvoid loop() {\n  if (Serial.available()) {\n    inp=Serial.read();\
    \          // 从串行端口读取字符\n    val=analogRead(0);          // 读取模拟值\n    Serial.print(\"\
    Value is \");  // 并报告回来\n    Serial.println(val);\n  }\n  delay(50);         \
    \           // 等待50毫秒\n}\n```\n\n由于我们想临时存储整数值，必须为变量分配内存，这通过包含 `int inp,val;` 的行完成，它声明了两个名为\
    \ `inp` 和 `val` 的整型变量。在 `setup()` 函数中，我们声明要使用内置的串行（RS-232）硬件端口，速度为9600波特，大约每秒1000个字符。串行端口的接收（RX）和发送（TX）线连接到引脚0和引脚1，但也路由到UNO板上的RS232-USB转换器，该转换器连接到主机计算机。在\
    \ `loop()` 函数中，我们首先检查是否有来自主机计算机的通信到达，如果有，我们使用 `Serial.read();` 命令读取字符，但不做进一步处理。在下一行，我们使用内置的ADC读取模拟引脚A0，并将值存储在整型变量\
    \ `val` 中。10位ADC返回的值是0到1023（= 2^10 - 1）之间的数字，*而不是*电压。稍后我们将展示如何将此值转换为电压。然后通过 `Serial.print()`\
    \ 和 `Serial.println()` 命令将测量结果通过串行线发送出去。两者的区别在于，前者在消息末尾不发送回车符，而后者会发送。在循环末尾的 `if()\
    \ { }` 语句之后，再次添加了一个小的延迟。现在我们可以编译并将程序下载到Arduino，除非出现了语法错误。如果出现这种情况，我们需要检查是否缺少分号或拼写错误，特别是命令中间的“驼峰式拼写”和大写字母。需要小心，但IDE使用语法高亮，使得此类错误相当容易发现。所有错误修正后，我们将程序下载到硬件。\n\
    \n一旦程序在Arduino上运行，我们想测试它，为此我们需要访问主机计算机上串行通信通道的另一端。最简单的方法是通过点击Arduino IDE右上角看起来像放大镜的图标来打开“串行监视器”。点击它会打开一个简单的终端程序，顶部有一个输入文本框。确保文本框中的波特率与程序中指定的波特率一致后，我们输入任意字符并按“Enter”。如果一切正常，Arduino应该在输入框下方的文本框中报告一行\
    \ `Value is nnnn`。现在转动电位器，输入一个字符后按“Enter”，看看返回的值如何变化。\n\n到目前为止一切顺利，但如果我们能读取更多模拟端口，甚至可以请求读取哪些端口，岂不是更好？这个任务在下面的程序中解决。它与前一个程序非常相似，所以我们只讨论新特性。\n\
    \n```cpp\n// 模拟与串行通信，v2，V. Ziemann, 161130\nint inp,val;\nvoid setup() {\n  Serial.begin(9600);\
    \  // 波特率\n}\nvoid loop() {\n  if (Serial.available()) {\n    inp=Serial.read();\
    \       // 读取串行线\n    if (inp=='s') {\n      val=analogRead(0);     // 读取模拟值\n\
    \      Serial.print(\"A0= \");  // 并报告回来\n      Serial.println(val);\n    } else\
    \ if (inp=='t') {\n      val=analogRead(1);\n      Serial.print(\"A1= \"); Serial.println(val);\n\
    \    } else {\n      Serial.println(\"unknown command\");\n    }\n  }\n  delay(50);\
    \              // 等待50毫秒\n}\n```\n\n在这个程序中，我们实际上测试了串行线上发送的是哪个字符，并根据它是“s”还是“t”返回模拟引脚A0或A1的值。通过串行线发回主机的字符包含引脚读数和值。如果Arduino收到不同于“s”或“t”的字符，则通过串行线返回字符串“unknown\
    \ command”。通过这种方式，我们构建了一个简单的查询-响应协议，使Arduino根据我们发送的字符执行不同的操作。\n\n在下一个示例中，我们假设LM35温度传感器以图4.6右侧所示的方式连接到模拟引脚A0。注意，我们在LM35的正电源电压和接地引脚之间添加了一个100\
    \ nF电容，以提高电路的稳定性。请注意，在电路中，靠近每个芯片的电源引脚添加此类去耦或旁路电容是良好的实践。在下文中，我们通常不在电路图上显示这些电容，以使它们不那么杂乱，但电容应包含在硬件中。与LM35接口的软件比前面的示例稍微复杂一些。它允许我们向Arduino发送更具描述性的多字符命令，并接收一个回显请求后跟值的响应。基本思想是，我们通过发送参数名称后跟问号来请求一个参数，例如A0，使得请求看起来像这样：A0?。Arduino随后回复A0\
    \ <值>。在下面的程序中，我们实现了这一点，但也实现了Arduino首先读取一整行，即在响应之前等待回车符和换行符。\n\n```cpp\n// 查询-响应，V.\
    \ Ziemann, 161013\nint val;\nfloat temp;\nchar line[30];\nvoid setup() {\n  analogReference(INTERNAL);\
    \  // 1.1V内部ADC参考电压\n  Serial.begin (9600);\n  while (!Serial) {;}\n}\nvoid loop()\
    \ {\n  if (Serial.available()) {\n    Serial.readStringUntil('\\n').toCharArray(line,30);\n\
    \    if (strstr(line,\"A0?\")==line) {\n      val=analogRead(0);\n      Serial.print(\"\
    A0 \"); Serial.println(val);\n    } else if (strstr(line,\"A1?\")==line) {\n \
    \     val=analogRead(1);\n      Serial.print(\"A1 \"); Serial.println(val);\n\
    \    } else if (strstr(line,\"T?\")==line) {\n      temp=1.1*100*analogRead(0)/1023;\n\
    \      Serial.print(\"T \"); Serial.println(temp);\n    } else {\n      Serial.println(\"\
    unknown\");\n    }\n  }\n}\n```\n\n在前几行中，我们声明了变量，特别是用于保存多字符查询的30个字符的缓冲区 `line`。在\
    \ `setup()` 函数中，我们使用内部1.1V参考电压作为ADC，并将串行通信通道初始化为9600波特运行。`while(!Serial)` 语句等待串行库初始化完成，仅在某些较新的Arduino上需要。我们包含它只是为了安全。在\
    \ `loop()` 函数中，我们等待字符可用，然后读取整行直到行尾字符 `\\n`。`readStringUntil` 返回一个 `String`，但我们想使用字符数组，因此需要在附加的\
    \ `toCharArray` 方法中转换类型。此时，字符数组 `line` 包含从主机计算机发送到Arduino的请求；例如，`A0?`。接下来的 `if\
    \ (strstr(line,\"A0?\")==line)` 及类似命令通过比较数组 `line[]` 中首次出现 `A0?` 的指针与 `line[]`\
    \ 起始位置的指针，来检查 `line` 是否以字符 `A0?` 开头。如果结果为真，则执行后续命令，否则测试 `else if` 序列中的下一个比较。在示例中，我们测试\
    \ `\"A0?\"`、`\"A1?\"` 和 `\"T?\"` 以回复模拟引脚0和1的原始值，或从模拟引脚0转换为摄氏度的值。关于转换系数，请参阅[第2.1.2节](#)的讨论。如果收到一个命令，但不在列表中，Arduino会回复\
    \ `unknown command`。这种通过附加问号指定查询以及回复时回显查询后附加值的方式，借鉴了SCPI [23]命令语言，该语言通常用于通过GPIB（也称为IEEE-488）或VXI远程控制测量设备。\n\
    \n作为最后一个示例，我们讨论一个简单的*温度记录仪*，它再次使用图4.6右侧所示的硬件设置，但通过串行线将温度值连续发送到主机计算机。程序如下所示：\n\n\
    ```cpp\n// 超简单的LM35温度记录仪，V. Ziemann, 161201\nfloat temp;\nvoid setup() {\n  analogReference(INTERNAL);\
    \  // 1.1V内部ADC参考电压\n  Serial.begin(9600);\n  while (!Serial) {;}  // 等待串行初始化\n\
    }\nvoid loop() {\n  temp=1.1*100*analogRead(0)/1023.0;\n  Serial.println(temp);\n\
    \  delay(1000);\n}\n```\n\n其中 `setup()` 函数与前一个示例相同，但 `loop()` 函数测量模拟引脚并将数字字转换为温度，然后将其发送到主机计算机。然后等待1000毫秒后重复相同操作。在串行监视器中（可通过点击IDE右上角的按钮启动），只要右下角选择框中选择的波特率与程序中指定的波特率匹配，我们就会在下方的文本框中看到摄氏温度值每秒报告一次。\n\
    \n然而，在Arduino IDE中，还有一个图形绘制工具可用。我们通过选择 `工具->串行绘图仪` 菜单项来选择它。这会打开一个窗口，并以图形格式显示串行线上接收到的值，前提是波特率选择与程序中指定的波特率匹配。请注意，`串行绘图仪`\
    \ 可以同时显示多个测量值作为不同颜色的轨迹。如果需要快速记录一些随时间变化的值，这个内置于Arduino IDE的功能可以作为温度或其他测量值的简单记录仪。"
