    \ and write FSCAN 60 to the UNO. Then we wait a short time and start retrieving\
    \ the values from the serial line with the serialReadline() function we already\
    \ encountered in Chapter 12. It reads characters from the serial line until the\
    \ termination character is encountered, and returns the obtained characters as\
    \ a character string. But back to the main script. While retrieving data and copying\
    \ it to the array yy, we also fill the array xx with the properly scaled values\
    \ for the horizontal axis. Once the loop completes, we close the serial device\
    \ with clear s.\n\nAfter all data are available in the script, we start processing\
    \ it. Since we will calculate the derivative of the raw data later, which is a\
    \ process that is very sensitive to noise, we weakly smooth the sensor values\
    \ in array yy with the smooth() function. It averages three consecutive values\
    \ and replaces the central value with the average. The octave script for smooth3()\
    \ is\n\n```\n% smooth three consecutive points, V. Ziemann, 170628\nfunction out=smooth3(y);\n\
    y=[y(1),y(1:end),y(end)]; % add extremities\nf=ones(1,3)/3.0;          % filter\
    \ function\nout=conv(y,f);            % convolute\nout=out(3:end-2);         %\
    \ ensure same length\n```\n\nIt first creates a new array with the extreme points\
    \ doubled up to avoid ugly artefacts at the end points. In the next line we create\
    \ the filter function f that consists of three values 1/3 and use it to convolute\
    \ the data with the filter. Since the convolution creates an output array that\
    \ is longer than the original, we remove the extreme points before returning the\
    \ smoothed array as the value out. Once these initial preparations are complete,\
    \ we show the smoothed raw values on the upper plot in Figure 16.4 and add a label\
