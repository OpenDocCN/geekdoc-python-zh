    \                           /RTC_FAST_CLK_FREQ_APPROX));\n  SET_PERI_REG_MASK(SENS_SAR_DAC_CTRL1_REG,\
    \ SENS_SW_TONE_EN);\n  SET_PERI_REG_MASK(SENS_SAR_DAC_CTRL2_REG, SENS_DAC_CW_EN1_M);\n\
    \  SET_PERI_REG_BITS(SENS_SAR_DAC_CTRL2_REG, SENS_DAC_INV1, 2,\n             \
