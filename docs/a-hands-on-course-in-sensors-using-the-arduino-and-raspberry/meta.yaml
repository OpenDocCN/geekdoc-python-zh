    # CHAPTER 1


    # Introduction


    What is the path that the electrical signal from a sensor takes to end up in a
    report and how do we interface the different stages along the path? We address
    these questions because collecting sensor data, processing them, and deriving
    some understanding from the data plays an important role in many circumstances.
    One example is a utility company that gathers information about electricity, heating,
    and water in order to prepare statements for their customers and to estimate demand
    for their product in the future. Smart homes are another example; they measure
    temperatures or detect the presence of beverages in the refrigerator to adjust
    the thermostat in the first case, or to prepare a report for us to pick up some
    milk or beer on the way home in the second case. Quite generally, many Internet
    of Things (IoT) technologies share a common base with the topic of the book, but
    even large experimental collaborations such as the ATLAS [2] or CMS [3] that operate
    the huge detectors at the Large Hadron Collider (LHC) [4] at CERN [5] get their
    data from sensors that are buried deep inside the detectors. They sense currents
    from drift chambers where charged particles cause a discharge between wires at
    different potentials, or they cause electrical signals from semiconductor detectors,
    where they create electron–hole pairs that induce a current. Other examples are
    Hall sensors, to measure magnetic fields, and humidity sensors or barometric pressure
    sensors to detect variations in ambient conditions. All these sensors produce
    electrical signals that often need to be amplified or otherwise conditioned. This
    stage involves operational amplifiers and various filters to improve the signal-to-noise
    ratio. Once properly processed, the analog signals are passed on to analog-to-digital
    converters (ADC), where they are converted to a digital representation that is
    subsequently handled by computers. Often some of the computing power is located
    close to the sensor and is provided by microcontrollers that collect signals from
    nearby sensors and convert them to the underlying physical quantities, formatted
    to have a standardized output format. Thus they act as “communication glue” between
    the specific interface to the sensor and a more generic interface to a host computer
    that is usually located further away. The latter is the other end of the communication
    channel from the microcontroller and provides data storage and presentation, and
    sometimes also shows recent data for online monitoring. The host computer may
    run generic control-system software to provide a further abstraction layer towards
    higher-level software. Examples we discuss are MQTT [6], which is popular with
    IoT projects, the EPICS control system [7], commonly found in scientific laboratories,
    and websockets that allow us to use a web browser to communicate with data acquisition
    systems.


    In this book we will build a system that contains all the ingredients also found
    in large scientific or industrial installations. In a sense it is a simplified
    model of a large installation, yet containing all the hardware and logical building
    blocks. In particular, we use the Arduino [8], ESP8266-based [9], and ESP32-based
    [10] microcontroller boards as'
