    # 5.5.2 From the command line


    At this point we have established the Raspi as a development system for Arduino
    software and ensure it communicates via the USB-based serial line with the Arduino
    IDE. But normally we want to access the Arduino from self-written programs rather
    than always using the Arduino IDE. The first option is to use the `screen` program
    or any other terminal program to connect to the UNO. After closing the Arduino
    IDE, we therefore start the following program on the command line on the Raspi:


    ```

    screen /dev/ttyACM0 9600

    ```


    just as we did earlier when the UNO was connected to the Desktop computer. Bluetooth
    communication works exactly the same way as on the Desktop computer. Just follow
    the details described in [Section 4.6.2](Section 4.6.2) on page 110.


    In the next step, we use a NodeMCU and assume that the Router software from [Section
    5.4](Section 5.4) is installed on the Raspi. We change the variables `ssid` and
    `password` in the NodeMCU sketches from [Section 4.6.3](Section 4.6.3) to those
    used on `messnetz`. Two lines near the top of the sketches now need to read


    ```

    const char* ssid     = "messnetz";

    const char* password = "zxcvZXCV";

    ```


    where we need to make sure to enter the same password as the `wpa_passphrase`
    in the `hostapd.conf` file. We then connect the NodeMCU to a USB port on the Raspi
    and download the updated socket-based server to the NodeMCU. We can observe progress
    of the NodeMCU boot process with the `Serial Monitor` while it connects to the
    `messnetz` WLAN. After a while it should report the acquired IP number that the
    `hostapd` on the Raspi dished out. It lies in the `192.168.20.nn` network, which
    corresponds to the IP range we specified in [Section 5.4](Section 5.4), in the
    configuration files of `dnsmasq`. In my case the IP number received was `192.168.20.135`,
    but yours may be different. At this point we can connect to NodeMCU via WLAN by
    issuing the following command in a Raspi terminal window:


    ```

    telnet 192.168.20.135 1137

    ```


    where `1137` is the port number that is specified in the sketch that runs on the
    NodeMCU. The `telnet` program provides a prompt at which we can type commands
    to send to the NodeMCU. So, typing `A0?` on the telnet prompt should result in
    the reply `A0 nnn`, also displayed in the telnet window, as shown in [Figure 5.5](Figure
    5.5). We close the session by using the command `Ctrl-]` and then type `quit`
    at the telnet prompt.


    Instead of using `telnet`, we can also use `netcat` and type the following command
    in a terminal window:


    ```

    netcat -C 192.168.20.135 1137

    ```


    where the `-C` option ensures that `CR-LF` characters are sent after each line,
    which is required by the NodeMCU to recognize the end of a command. Otherwise
    the communication works in the same way as with `telnet`.'
