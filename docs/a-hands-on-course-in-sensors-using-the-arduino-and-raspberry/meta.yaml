- img_proc: true
  md: '+   - Be friendly to your reader and invite her into your intellectual world
    by more or less addressing her directly, using phrases such as “let us” or “we
    now return.” This helps to make the report more accessible by mimicking normal
    colloquial speaking patterns. The reader is not alienated by a stiff and abstract
    presentation but feels welcome to mentally participate in your exposé.

    - Commit yourself to what you write and avoid unnecessary hedging by conditionals.
    This is easily done by trying to replace any occurrence of “might be” or “could
    be” with “is.” Other hedging phrases to look out for are “may” and “could,” or
    anything that hints at you being scared of writing what you really mean.

    - If in doubt, use English instead of Latin phrases. In that sense, “first” is
    a better choice than “initial,” use “place” instead of “location.”

    - Avoid acronyms unless a long term with a commonly used acronym appears in several
    places throughout the report. In that case, introduce the acronym at the first
    occurrence by writing out the full term first and adding the acronym in brackets.
    Henceforth use the acronym consistently!

    - Avoid jargon! Someone uninitiated in the jargon specific to your particular
    project might want to read – and understand – your report.

    - Pay special attention to grammatical correctness and especially to agreement
    errors. Ask an English-speaking colleague to proofread your report.

    - Before releasing your report, make sure to run it through a spell-checker, and
    read it a final time to verify that all is correct!


    These guidelines are certainly incomplete, but hopefully will help you to write
    an interesting and readable report. I suggest you also read one of the more comprehensive
    style guides such as [40]. A further source of advice regarding writing and presenting
    scientific work in general is *Nature* publication’s web page, *English communication
    for scientists* [41]. A wonderful source of synonyms and antonyms is the *WordNet
    browser* [42]. You may consider using either the online version or a version installed
    on your computer in order to make your writing more lively.


    # 18.5 POSTSCRIPTUM


    And at this point we have reached the end of the book. In the process we talked
    about various sensors, both analog and digital, connected them to microcontrollers,
    massaged the data into a common format, and passed them on to a host computer.
    There we postprocessed the measurements, stored them in databases, and prepared
    them for a presentation or report. I hope that you found useful, interesting,
    and inspiring topics between Preface and Postscriptum that will help you in your
    projects that have a data-acquisition aspect.

    I tried out all circuitry and programming presented in the book, but the odd bug
    may have crept in. If you find one, please do not keep the bug, but share it with
    me so I can improve future versions of the book. Of course, the general disclaimer
    applies, namely that the code in the book is provided *as is* and users are advised
    to use caution, but are in any case responsible themselves for using the program
    code.'
