    多种设备通过异步 RS-232 协议发送测量值来报告数据。最初，通信信道的物理介质采用电流环，但如今大多数传感器工作在 3.3V 或 5V 电平。通信在双方约定好通信速率（通常为
    9600 波特或 115200 波特）的两个伙伴之间以点对点方式进行。最少需要三根线：一根用于接地电位，一根标记为 TX，用于从设备 A 向设备 B 发送数据；另一根标记为
    RX，用于反向传输。为建立通信，需将一个设备的 TX 引脚连接到另一个设备的 RX 引脚，反之亦然。当然，接地引脚也需要连接。


    我们之前讨论过的 LV-EZx 距离传感器就是一种支持 RS-232 通信的设备。它可以配置为将测得的距离作为 ASCII 字符串发送，以便在终端程序中读取。即使是图
    2.41 所示的 TFmini 距离传感器，也通过 RS-232 报告测量距离。它通过一个透镜发射调制红外光脉冲，通过第二个透镜接收，并确定反射信号相对于发射信号的相位偏移。由此，它计算出视线内最近障碍物的飞行时间。


    查询*全球定位系统*（GPS）的传感器使用传感器上的小型贴片天线，接收来自多个地球静止轨道卫星的信号。这些卫星以高精度广播其位置和定时信息。通常包含微控制器的机载电子设备使用三角测量法，以高精度确定传感器的位置，并将该信息转换为包含标准化格式（称为
    *NMEA*）位置信息的 ASCII 字符串。该字符串通常每秒写入一次 RS-232 串行线路，便于读取和解码。


    ## 2.3.6 其他传感器


    除了标准化协议外，设备厂商还制定了许多通信标准。此类设备的例子包括*相对湿度传感器* DHT22 和 DHT11；后者如图 2.42 右侧所示。为了确定相对湿度，必须已知温度，而温度由热敏电阻测定。测量湿度时，它们使用电容式湿度传感器。其工作原理基于使用一个小型电容器，其暴露的电介质对水有很强的亲和力，这会显著改变相对介电常数
    εr 和电容值。这通过一个带有两个电容分支的惠斯通电桥来测定。DHT 传感器内部集成了此电路以及模数转换器等其他电路板，用于计算相对湿度。它们使用一种非标准但有文档记录的数字接口提供数据，我们将在[第
    4.4.5 节](Section 4.4.5)中进一步讨论，届时我们将把 DHT11 连接到微控制器。


    DS18b20 温度传感器与之前讨论的 LM35 类似，基于带隙温度传感器。然而，这里在芯片上增加了辅助数字电子设备和信号处理电路，使得测量值经过后处理，并通过所谓的
    Dallas 单线总线协议提供。单线协议仅使用地线和一根额外的导线来向设备传输电力和信息，以及从设备接收信息。


    空气质量可以通过悬浮在空气中的微观颗粒密度来表征。在[图 2.43](Figure 2.43)中，我们展示了两个这样的传感器。左侧是一个 PPD42NS 颗粒传感器。在该检测器内部，一个电阻加热空气，导致含有悬浮尘埃颗粒的空气上升并通过红外二极管发出的光。在那里，尘埃颗粒将光散射到光电晶体管上，使其将输出引脚拉至低电位。经过信号调理和放大后，得到一个干净的信号。当颗粒散射光时信号为低，否则为高。该设备经过校准，使得低信号时间与总时间的比率可以转换为每升颗粒数。图
    2.43 右侧所示的 GP2Y1010AU0F 工作原理类似。它也检测尘埃颗粒散射的光，但它周期性地开启红外二极管，并对来自光电晶体管的信号进行积分，必须在
