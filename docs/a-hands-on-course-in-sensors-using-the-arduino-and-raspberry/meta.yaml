    passed on to the serial line. In this way we can send commands to the slave NANO.
    If the command starts with D0 we turn the built-in LED on and off. The SERVO command
    sets the angle of the model-servo, and BEEP nnn makes a sound of 440 Hz for the
    duration of nnn ms. The A0? command returns the analog value read from the analog
    pin on the NodeMCU to the serial line and to the remote controller, and the RANGE?
    command likewise returns the distance to an obstacle as determined by the HC-SR04
    sensor. The following command, SCANRANGE 1, starts the servo to move, which causes
    the distance sensor to point towards different directions, while the HC-SR04 scans
    the distance to an obstacle, and simultaneously records the direction and distance
    to the closest object. Finally, the servo is moved to point towards the minimum
    distance, and returns the direction at which the closest object is found. Calling
    SCANRANGE with argument 0 causes the servo to move to its middle position. The
    FINDFIRE command performs the same action, but scans the middle IR photodiode
    connected to analog pin A0 on the NodeMCU to determine the direction of a heat
    source. Note that the phototransistor pulls the signal line towards ground, which
    causes the voltage on pin A0 to approach zero, if a heat source is detected. The
    last two commands, NEXTEVENT and SLEEPTIME, allow us to set variables related
    to the state machine that governs the autonomous running of the robot. They are
    attached to buttons on the remote controller and can be changed by pressing these
    buttons.


    The next section of the code, following the yield() command, implements this very
    simple state machine to operate asynchronously with all other actions that the
    NodeMCU performs. First we test whether the current time exceeds the value for
    the next scheduled event, lasttime+sleeptime, has elapsed. If that is the case,
    we branch according to the value of the nextevent variable. If it is 1 we only
    determine the distance from the HC-SR04 sensor with the range() function and the
    reading of the middle phototransistor. Then we set nextevent=1, which will repeat
    the same action after sleeptime has elapsed. If nextevent is 2, we sweep the servo
    position back and forth across its range, one step at a time. The next two event
    codes, 3 and 4, implement the autonomous motion of the robot towards a heat source.
    If nextevent is 3, we first test whether an object is closer than 10 cm, stop
    the motors, and branch to event code 1 discussed above. If there is no close obstacle,
    the commands :A0? and :A1? are sent on the serial line. Here we employ the convention
    that a command prepended with a colon is interpreted by the slave NANO, which
    in this case is requested to read its analog pins A0 and A1, to which the two
    outer phototransistors on the small breadboard are connected. Since we have two
    transistors, the difference of the reading will provide information about the
    direction of the heat source. The command is only dispatched in event code 3,
    but by setting the sleeptime to 50 ms and nextevent=4, we will execute event code
    4 about 50 ms later. The response from the slave NANO is recorded asynchronously,
    and we discuss the sketch running on the NANO a little later. After 50 ms, event
    code 4 is executed, and there we test whether the phototransistors detected a
    valid signal, and whether one of the signals is sufficiently small to be interpreted
    as a heat source. In that case, the sensor readings are sent to the remote controller,
    and the motor speed of one motor is set to a constant, not-too-large value, here
    600, plus a small contribution proportional to the difference between the sensor
    readings. This small contribution is added to the speed of one motor and subtracted
    from the other. In this way we implement a very simple proportional control loop
    that feeds the error signal to the motors, to make the robot turn towards the
