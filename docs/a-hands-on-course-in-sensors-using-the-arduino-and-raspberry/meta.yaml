  - '[PAGE 224]


    variable `do_something` to one, because this variable is monitored in the `loop()`
    function and triggers some activity, if it is set. Next, we include the WiFi libraries,
    and declare a `WiFiClient` and the MQTT `PubSubClient` named `client`, before
    defining the `measure()` function, which is a straight copy from the previous
    example. The `setup()` function declares the mode of the pins, configures the
    serial line, connects to WLAN, configures the broker, and starts the ticker to
    call `tick_action` every 60 seconds, which triggers the measurements. In the `loop()`
    function, we first ensure that the NodeMCU is connected to the broker before calling
    `client.loop()` to service any background activities pertaining to MQTT. Then
    we test whether the variables `do_something` is set, and execute the measurement
    with the `measure()` function for each color, construct a string that contains
    the three values, and publish the measurement.


    Using this system, it is possible to submerge a sensor similar to the one shown
    in Figure 11.3 in a garden pond, place the NodeMCU in an enclosure next to the
