- md: '## 2.2.5 Supply voltage


    Of course, our sensors and also the microcontroller require electric power to
    operate, and that is normally supplied by a power source. A common type of power
    supply uses a transformer to step down the 220 V or 120 V AC voltage from the
    wall to a commonly used voltage range of around 5–20 V. This depends on the rating
    and winding ratio of primary to secondary winding of the transformer. Since most
    electronics circuits require DC voltages, we need to rectify the AC voltage from
    the secondary winding of the transformer. The simplest way to do this is to use
    a single rectifying diode with adequate power rating, as shown in Figure 2.29.


    Figure 2.29 The dashed signals s1 and s2 are the images aliased into the base
    band of the original signals S1 and S2 in higher Nyquist zones.


    Note that ADCs are often built into microcontrollers and sensors with digital
    interfaces, such as those discussed in later sections. After this treatment of
    the ADC, the workhorse of digital data-acquisition systems, we need to look at
    the task of providing power to our circuits.


    ## 2.2.4 Analog-to-digital converters


    The number of comparators with a single comparator and a digital-to-analog converter
    (DAC) to dynamically adjust the reference voltage to compare to. We discuss the
    operational principle of DACs in Section 3.13, but here we just mention that they
    are circuits that translate a digital word with $n$ bits to an analog voltage,
    and they can do this very quickly. They play a central role in the operation of
    a successive approximation ADC whose operating mechanism is illustrated in Figure
    2.26, where the input voltage is held constant during the conversion in a sample-and-hold
    circuit. Then the voltage is passed to a comparator whose negative input terminal
    is determined by the output voltage of the DAC. In the first comparison, the $n$-bit
    input word is set to the B''1000... which results in half the reference voltage
    $V_{ref}$, where we prepend the letter B to identify the binary representation
    of a number. If the input voltage $V_{in}$ is smaller, the output of the comparator
    is at ground level, or logically a low state. The first, most significant bit
    (MSB), is therefore “0.” The control logic then sets the DAC to B''0100... and
    compares again on the next clock cycle. If $V_{in}$ is larger than $(1/4)V_{ref}$,
    the comparator output will go to high-voltage level, and the next bit to pass
    to the output is therefore “1,” and the DAC receives the input B''0110... to compare
    the next step in the bisection sequence. If this is repeated $n$ times the ADC
    clocks out all bits of the conversion from MSB to least significant bit (LSB).
    We see that in this case we trade conversion speed for simpler hardware. Most
    ADCs we use later in this book are of the successive approximation type. We note
    in passing that often a multiplexer switch is placed before the sample-and-hold
    circuitry, which allows us to select different input voltages with a single ADC
    shared among the different channels. Only one channel can be converted at the
    highest conversion rate.


    It is possible to find a compromise between conversion speed and hardware complexity
    by combining, for example, two 4-bit flash ADCs, one additional DAC, and advanced
    control logic to a so-called pipelined flash ADC. They can sustain a continuous
    conversion-rate determined by the 4-bit ADC. Even though each conversion requires
    two clock cycles, the first ADC can already start converting the next sample while
    the second ADC still works on the four least significant bits of the previous
    sample. Most high-speed ADCs for radio-frequency applications with more than 8
    bits use this method.


    Instead of a very high conversion rate, it is often desirable to achieve high
    resolution; in other words, more bits, albeit at a lower conversion rate. Devices
    that fulfill this requirement are *delta-sigma* ADCs whose simplified operating
    principle is illustrated in Figure 2.27. It is based on adding quantized current
    pulses to the negative input terminal of the op-amp such that its output is forced
    to zero voltage. Note that this terminal is a virtual ground, because the positive
    input terminal is grounded, and operational amplifiers always strive to make their
    input voltages equal. The op-amp is configured as an integrator and sums the currents
    over time. Forcing the accumulated charge on the capacitor to zero is achieved
    by the feedback, shown as a dashed line from the non-inverting output of the flip-flop
    to the switch that either adds a positive or negative current of magnitude $V_{ref}/R$
    into the inverting input terminal of the op-amp. The purpose of the flip-flop
    is to produce well-defined time-steps, equal to the clock-frequency, for the injected
    current pulses. All we have to do in the end is to count the number of clock cycles
    when the output is high and divide by the total number of elapsed cycles. This
    results in a digitized word with the number of bits given by the time we chose
    to average. And that time can be quite long. Assume that we use a clock of 10
    MHz and sample for 0.1 s such that $10^6$ clock pulses happen, which results in
    a resolution of 20 bits because $10^6 \approx 2^{20}$. Delta-sigma ADCs derive
    their name because the small quantized difference (delta) current are summed (sigma),
    together with the current from the input voltage $V_{in}$, in the integrator.
    The high resolution makes delta-sigma ADC a good choice to measure the often small
    voltages in Wheatstone bridges. We need to keep in mind, however, that this increased
    resolution comes at the price of a rather low conversion rate; often only a few
    tens of conversions per second are possible.


    Despite having a large number of bits, ADCs add noise to the measurements, because
    they cannot measure voltage differences smaller than that corresponding to the
    least significant bit. Thus, they introduce a *quantization error*, which could
    be reduced by choosing an ADC with a larger number of bits. But even then the
    quantization causes a slightly inaccurate representation of the signal amplitudes.


    Sampling the signal at discrete instances in time causes a second potential misrepresentation,
    because signals of frequencies $f$ higher than half the sampling frequency $f_s/2$,
    also called the Nyquist frequency, cannot be distinguished from signals with frequency
    $nf_s - f$ or $nf_s + f$. The origin of this ambiguity is illustrated in Figure
    2.28. On the left we display a sinusoidal signal with frequency $f = 0.15f_s$
    (dashed) and $f = (1 - 0.15)f_s$ (solid), and on the right the solid line is a
    sine with frequency $f = (1 + 0.15)f_s$. We see that at the sampling instances,
    indicated by the squares, the curves have the same values, which makes them indistinguishable
    if only sampled at rate $f_s$. In the frequency domain, shown in Figure 2.29,
    we find that a signal $S_1$ that lies between the Nyquist frequency $f_s/2$ and
    $f_s$ is recorded by the ADC at frequency $s_1$, which is $S_1$ mirrored at the
    Nyquist boundary. The signal $S_2$ that lies above $f_s$ is observed as signal
    $s_2$. The zone between zero and $f_s/2$ is commonly called the base band or first
    Nyquist zone, and the appearance of higher-frequency signals in the base band
    is called *aliasing*. Since the original frequency of the aliased signals is unknown,
    they are often regarded as noise. A simple way to prevent aliasing is to use analog
    low-pass filters with cutoff frequencies below the Nyquist frequency before passing
    the signals to the ADC. Filters such as those discussed in Section 2.2.3 are often
    sufficient.


    Figure 2.26 The operating principle of a successive approximation ADC.


    Figure 2.27 The operating principle of a delta-sigma ADC.


    Figure 2.28 Sampling a signal in different Nyquist zones. The dashed line displays
    a frequency of 0.15 f_s and the solid lines show signals with frequency (1 - 0.15)
    f_s on the left and (1 + 0.15) f_s on the right. Note that at the times when the
    signal is sampled (indicated by boxes), the signals are indistinguishable.'
  mdcn: '## 2.2.5 供电电压


    当然，我们的传感器以及微控制器都需要电力才能工作，而这通常由电源提供。一种常见的电源类型使用变压器，将墙壁插座的220V或120V交流电压降至常用的5-20V电压范围。这取决于变压器的额定功率以及初级与次级绕组的匝数比。由于大多数电子电路需要直流电压，我们需要对变压器次级绕组输出的交流电压进行整流。最简单的方法是使用一个具有足够功率额定值的单个整流二极管，如图2.29所示。


    图2.29 虚线信号s1和s2是原始信号S1和S2在更高奈奎斯特区混叠到基带的图像。


    请注意，模数转换器通常内置于具有数字接口的微控制器和传感器中，例如后续章节将讨论的那些。在讨论了数字数据采集系统的核心部件——模数转换器之后，我们需要关注为电路供电的任务。


    ## 2.2.4 模数转换器


    使用单个比较器和一个数模转换器来动态调整参考电压以进行比较。我们在第3.13节讨论数模转换器的工作原理，但这里我们仅提及它们是将n位数字字转换为模拟电压的电路，并且转换速度非常快。它们在逐次逼近型模数转换器的操作中扮演核心角色，其工作原理如图2.26所示，其中输入电压在转换期间由采样保持电路保持恒定。然后，该电压被送入一个比较器，其负输入端由数模转换器的输出电压决定。在第一次比较中，n位输入字被设置为B''1000...，这产生参考电压V_ref的一半，其中我们在数字前加上字母B以标识其二进制表示。如果输入电压V_in较小，比较器的输出为地电平，或逻辑低电平。因此，第一个最高有效位为“0”。控制逻辑随后将数模转换器设置为B''0100...，并在下一个时钟周期再次进行比较。如果V_in大于(1/4)V_ref，比较器输出将变为高电平，因此传递到输出的下一位是“1”，数模转换器接收输入B''0110...以进行二分序列的下一步比较。如果重复此过程n次，模数转换器将从最高有效位到最低有效位输出转换的所有位。我们看到，在这种情况下，我们以转换速度换取了更简单的硬件。本书后续使用的大多数模数转换器都是逐次逼近型的。我们顺便注意到，通常在采样保持电路之前放置一个多路复用开关，这允许我们使用一个在不同通道间共享的模数转换器来选择不同的输入电压。只有一个通道能以最高的转换速率进行转换。


    通过组合，例如两个4位闪速模数转换器、一个额外的数模转换器和先进的控制逻辑，可以形成所谓的流水线闪速模数转换器，从而在转换速度和硬件复杂性之间找到折衷方案。它们可以维持由4位模数转换器决定的连续转换速率。尽管每次转换需要两个时钟周期，但第一个模数转换器可以在第二个模数转换器仍在处理前一个样本的四个最低有效位时，就已经开始转换下一个样本。大多数用于射频应用、超过8位的高速模数转换器都使用这种方法。


    与追求极高的转换速率相反，通常更希望实现高分辨率；换句话说，更多的位数，尽管转换速率较低。满足此要求的器件是*delta-sigma*模数转换器，其简化工作原理如图2.27所示。它基于将量化电流脉冲添加到运算放大器的负输入端，迫使其输出为零电压。请注意，该端是虚地，因为正输入端接地，而运算放大器总是力求使其输入电压相等。运算放大器被配置为积分器，并随时间对电流求和。通过反馈（如图中从触发器的非反相输出到开关的虚线所示）将电容器上的累积电荷强制为零，该开关要么向运算放大器的反相输入端注入大小为V_ref/R的正电流，要么注入负电流。触发器的目的是为注入的电流脉冲产生明确的时间步长，等于时钟频率。我们最终要做的只是计算输出为高电平的时钟周期数，并除以经过的总周期数。这将产生一个数字化字，其位数由我们选择的平均时间决定。而这个时间可以相当长。假设我们使用10
    MHz的时钟并采样0.1秒，这样就会发生10^6个时钟脉冲，这将产生20位的分辨率，因为10^6 ≈ 2^20。Delta-sigma模数转换器得名于小的量化差值电流与来自输入电压V_in的电流一起在积分器中求和。高分辨率使得delta-sigma模数转换器成为测量惠斯通电桥中通常很小的电压的良好选择。然而，我们需要记住，这种提高的分辨率是以相当低的转换速率为代价的；通常每秒只能进行几十次转换。


    尽管具有大量位数，模数转换器仍会给测量带来噪声，因为它们无法测量小于最低有效位对应的电压差。因此，它们引入了*量化误差*，这可以通过选择具有更多位数的模数转换器来减少。但即便如此，量化仍会导致信号幅度的表示略有不准确。


    在离散时间点对信号进行采样会导致第二种潜在的失真，因为频率f高于采样频率一半（f_s/2，也称为奈奎斯特频率）的信号，无法与频率为nf_s - f或nf_s
    + f的信号区分开来。这种模糊性的起源如图2.28所示。左侧显示了一个频率为f = 0.15f_s（虚线）和f = (1 - 0.15)f_s（实线）的正弦信号，右侧实线是频率为f
    = (1 + 0.15)f_s的正弦波。我们看到，在采样时刻（由方块标出），曲线具有相同的值，这使得如果仅以速率f_s采样，它们无法区分。在频域中，如图2.29所示，我们发现一个位于奈奎斯特频率f_s/2和f_s之间的信号S1被模数转换器记录为频率s1，即S1在奈奎斯特边界处的镜像。高于f_s的信号S2被观测为信号s2。零到f_s/2之间的区域通常称为基带或第一奈奎斯特区，而高频信号出现在基带中的现象称为*混叠*。由于混叠信号的原始频率未知，它们通常被视为噪声。防止混叠的一种简单方法是在将信号送入模数转换器之前，使用截止频率低于奈奎斯特频率的模拟低通滤波器。诸如第2.2.3节讨论的滤波器通常就足够了。


    图2.26 逐次逼近型模数转换器的工作原理。


