    We show a simplified version of the remote controller with less than all possible
    channels set up on a breadboard in Figure 17.2, where we see the NodeMCU on the
    right and the MCP3208 ADC on the left. The MCP3208 has the same pin assignment
    as the MCP3304 from Section 4.4.4, and is connected to the SPI port of the NodeMCU
    with CLK, MISO, MOSI, and CS lines, connected to D5, D6, D7, and D8, respectively.
    A joystick, visible immediately to the left of the breadboard, is connected to
    the power rails and the wiper to ADC channels A0 and A1. Likewise, the potentiometer,
    visible on the far left, is connected to ADC channel A5. Two buttons, visible
    near the bottom of Figure 17.2, connect voltage dividers consisting of a 10 kΩ
    resistor to the positive supply voltage, as well as 68 kΩ and 47 kΩ resistors.
    By using additional resistors to ground with different values, it is possible
    to detect more buttons – one at a time. Pressing the buttons supplies a definite
    voltage level to ADC channel A7. Finally, there is a switch connected to IO pin
    D4. To clarify the wiring, we also show the schematic corresponding to the breadboard
    layout in Figure 17.3.


    The sketch running on the remote controller that uses the hardware described in
