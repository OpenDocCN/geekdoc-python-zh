    \ /home/pi/rrdtool/readtemp.py`返回的温度值。请注意，Python解释器和`readtemp.py`脚本都使用了绝对路径。在最后一行，我们使用存储在变量DB中的数据库名称执行`rrdtool\
    \ update`命令，并用当前时间戳（由`N:`指示）和存储在变量TEMP中的温度值填充它。从命令行执行`filldb1.sh`会向数据库发送一个带有当前时间的数据点，但这相当不方便。更好的解决方案是每分钟自动运行一次`filldb1.sh`。因此，我们通过执行`crontab\
    \ -e`更新crontab文件，并在文件末尾添加行\n\n```\n* * * * * /home/pi/rrdtool/filldb1.sh\n```\n\
    \n这将每分钟向数据库发送一个新的数据点。\n\n最后，在第三步中，我们使用`rrdtool graph`命令检索数据并生成图表。以下是一个示例：\n\n\
    ```\nrrdtool graph db1.png -s -4h \\n    -t \"Temperature in my office\" -v \"\
    T [C]\" \\n    DEF:t0=db1.rrd:temp:AVERAGE \\n    LINE1:t0#FF0000:\"Temperature\"\
    ;\n```\n\n请注意，我们也可以将整个命令写在一行上。它创建一个图形文件`db1.png`，时间轴起点为4小时前（`-s -4h`），标题在`-t`选项后指定，垂直轴标签在`-v`选项后指定。在下一行中，句柄`t0`被定义为引用来自`db1.rrd`数据库的数据，并作为变量`temp`的`AVERAGE`。将其与`rrdtool\
    \ create`命令进行比较，其中`temp`在命令的`DS:`部分定义，`AVERAGE`在`RRA:`部分定义。最后，我们定义一条显示线使用句柄`t0`，通过十六进制RGB值指定颜色（此处为红色：`#FF0000`），并为其指定标签`Temperature`。在图5.9中，我们展示了由上述`rrdtool\
    \ graph`命令生成的图形。请注意，仅绘制了最后四个小时的数据，但第一部分缺失，因为当时cron作业未运行。因此，数据在数据库中被标记为*无效*，因此未打印。在前面的示例中，比例尺是自动调整的，但也可以显式指定。命令`man\
    \ rrdtool`及其提供的指针提供了关于如何微调输出的丰富信息。\n\n在能够测量、存储和检索测量值之后，我们希望将它们呈现在网页上，以便在线观察和持续检查。"
