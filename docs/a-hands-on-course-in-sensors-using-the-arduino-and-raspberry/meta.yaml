    # 2.2.4 Analog-to-digital conversion


    Normally we want to convert analog signals to a digital format in order to process
    them on a computer. The device that achieves this feat is an analog-to-digital
    converter (ADC), which can be conceptually understood as a very rapidly measuring
    voltmeter. It consists of a sample-and-hold circuit that keeps the voltage constant
    for a short time while it is measured and digitized using a number of different
    operational principles.


    In a *flash ADC* the voltmeter is based on large number of comparators that compare
    the voltage against a sequence of voltages derived from a resistor ladder. An
    additional circuit encodes the output from the comparators into a binary representation.
    Since all comparators operate in parallel, flash ADCs operate at the highest conversion
    rate, in excess of $10^9$ samples per second. This high conversion rate comes
    at a price, though, because for a resolution of $n$ bits, $2^n$ comparators are
    required. We illustrate the operating principle of a 3-bit flash ADC in Figure
    2.25. On the left there are inputs for the reference voltage $V_{ref}$, the voltage
    to be converted $V_{in}$, and a clock signal. First, the input voltage is held
    constant for the duration of the conversion in a sample-and-hold circuit, which
    consists of a switch and a small holding capacitor. The voltages to compare to
    are produced by a resistive voltage divider, shown on the top. The voltages from
