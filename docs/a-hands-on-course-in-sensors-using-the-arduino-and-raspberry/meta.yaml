- md: "## 4.5.3 Servos\n\nAs we discussed in Chapter 3, servos are used to carefully\
    \ change the position or orientation of some device, such as the rudder of a boat\
    \ or the steering system of a radio-controlled car. Servos only need three wires\
    \ to be connected: ground and the supply voltage as well as one wire that carries\
    \ the control information according to the timing shown in Figure 3.9. In Figure\
    \ 4.17 we show how to connect a small servo to an Arduino UNO. If the servo requires\
    \ more current or other voltages than the UNO provides, one can use a suitable\
    \ external power supply. The ground cables of the external supply and the UNO\
    \ need to be connected, and one wire from the servo, which is often red, needs\
    \ to be connected to the positive terminal of the external supply instead of the\
    \ 5 V power pin on the Arduino. Controlling a servo from the Arduino is rather\
    \ simple, and we use the following code to do that.\n\n```cpp\n// Servo controller,\
    \ V. Ziemann, 170614\n#include <Servo.h>\nServo myServo;\nchar line[30];\nvoid\
    \ setup() {\n  myServo.attach(9);   // pin D9\n  Serial.begin (9600);\n  while\
    \ (!Serial) {;}\n}\nvoid loop() {\n  if (Serial.available()) {\n    Serial.readStringUntil('\\\
    n').toCharArray(line,30);\n    if (strstr(line,\"SERVO \")==line) {\n      float\
    \ val=atof(&line[6]);\n      myServo.write((int) val);   // 0 to 180\n    }\n\
    \  }\n}\n```\n\nThe code follows the normal template with opening serial line\
    \ in the **setup()** function and the query-response construction in the **loop()**\
    \ function. Servo-specific means the inclusion of the <Servo.h> file and the declaration\
    \ of a **Servo** object that we call **myServo**. In the **setup()** function,\
    \ we attach the servo functionality to pin D9 on the Arduino and write new values\
    \ to the servo with the call to **myServo.attach()**. The latter function takes\
    \ a value between 0 and 180 as argument and moves the arm of the servo to the\
    \ desired position. Note that <Servo.h> is part of the standard Arduino distribution.\
    \ Note also that we can use any pin on the Arduino to control servos, even multiple\
    \ servos, but that using the servo functionality disables the pulse-width modulation\
    \ feature of the **analogWrite()** function on pin D9 and D10 because it uses\
    \ the same hardware timer.\n\nUsing servos in more advanced ways, such as scanning,\
    \ is also easy to implement. The following code fragment scans back and forth\
    \ through the entire range\n\n```c\n} else  if (strstr(line,\"SCAN\")==line) {\n\
    \  for (int pos=0;pos<180;pos+=1) {\n    myServo.write(pos); delay(10); // and\
    \ do a measurement\n  }\n  for (int pos=180;pos>=0;pos-=1) {\n    myServo.write(pos);\
    \ delay(10);\n  }\n}\n```\n\nand it is easy to envision including some measurement\
    \ inside the loops that perform the scanning. Imagine an HR-SR04 distance sensor\
    \ attached to the servo. Scanning in a semi-circular motion and continuously measuring\
    \ the distance to the closest object mimics the functionality of radar by using\
    \ a sonar-like device instead. This could serve as a collision detection system\
    \ for moving vehicles.\n\nThe last type of motors that we consider are stepper\
    \ motors, and they come next.\n\n## 4.5.4 Stepper motors\n\nAs we discussed before,\
    \ stepper motors can be very accurately controlled by a given pulse sequence that\
    \ turns the shaft by a desired number of discrete steps. The coils inside the\
    \ motors need to be excited in certain patterns, either by a unipolar or bipolar\
    \ power supply. We start with the unipolar type.\n\nIn Figure 4.18 we show the\
    \ connection of a unipolar stepper motor with the help of a ULN2003 Darlington\
    \ driver that is mounted on the small breadboard between the Arduino UNO and the\
    \ motor. The inner connection of the ULN2003 is very simple. Pins 1–7 on the left-hand\
    \ side are the bases of seven Darlington transistors with resistors built into\
    \ the chip. The facing pins on the right-hand side are the collectors of the respective\
    \ transistors. All emitters are wired to pin 8 on the lower left-hand side of\
    \ the chip, which is also ground. Pin 9 on the lower right-hand side is the terminal\
    \ for the motor power supply and is often connected to an external power supply\
    \ that provides adequate current and voltage to power the motor. In the figure\
    \ we assume that the stepper motor is small, and we connect pin 9 to the 5 V pin\
    \ on the Arduino. The upper two wires connect ground and the supply voltage to\
    \ the chip. Here we assume that the supply voltage is the same, and we connect\
    \ pin 8 of the L293D to the positive logic supply voltage. Moreover, we disable\
    \ the output on the right-hand side of the chip by pulling pin 9 to ground. Two\
    \ wires connect digital outputs D2 and D3 on the Arduino to the input of two half-bridges\
    \ on pins 2 and 7 on the L293D. The corresponding outputs from pins 3 and 6 are\
    \ connected to the motor cables. Finally, pin 1 on the L293D is connected to the\
    \ pulse-width modulated output pin D9 on the UNO.\n\nWe want control the motor\
    \ from the Arduino by sending commands via the serial line according to the protocol\
    \ that FW nnn sets the speed in the forward direction and BW nnn sets the speed\
    \ in the reverse direction. Anything else will stop the motors. This is easy to\
    \ do with the following sketch.\n\n```cpp\n// H bridge DC motor Controller, V.\
    \ Ziemann, 170614\nchar line[30];\nvoid setup() {\n  pinMode(2,OUTPUT);\n  pinMode(3,OUTPUT);\n\
    \  Serial.begin (9600);\n  while (!Serial) {;}\n}\nvoid loop() {\n  if (Serial.available())\
    \ {\n    Serial.readStringUntil('\\n').toCharArray(line,30);\n    if (strstr(line,\"\
    FW \")==line) {\n      digitalWrite(2,LOW);\n      digitalWrite(3,LOW);\n    \
    \  digitalWrite(3,HIGH);\n      float val=atof(&line[3]);\n      analogWrite(9,(int)val);\n\
    \    } else if (strstr(line,\"BW \")==line) {\n      digitalWrite(2,LOW);\n  \
    \    digitalWrite(3,LOW);\n      digitalWrite(2,HIGH);\n      float val=atof(&line[3]);\n\
    \      analogWrite(9,(int)val);\n    } else { // STOP in all other cases\n   \
    \   digitalWrite(2,LOW);\n      digitalWrite(3,LOW);\n      analogWrite(9,(int)0);\n\
    \    }\n  }\n}\n```\n\nThe setup() function only declares the pins used to control\
    \ the H bridge as outputs and initializes the serial line. In the loop() function\
    \ we employ the standard query-response mechanism. A command on the serial line\
    \ that starts with FW first turns the motor off as a precaution against having\
    \ both outputs positive, which might short the motor supply voltage. Then pin\
    \ D3 is pulled high, resulting in the motor turning one way. Finally we parse\
    \ the rest of the command line and write the value to set the motor speed by pulse-width\
    \ modulating the enable pin of the motor-driver. Any command received, apart from\
    \ FW n and BW n, will disable both outputs and sets the speed to zero. Of course,\
    \ we can easily implement other commands, such as STOP, that will cause the motor\
    \ to stop.\n\nEven more elaborate commands can be programmed into the controller,\
    \ such as turning one way at some time for a given time, then stopping and turning\
    \ backward for another time. The following code fragment may serve as an example.\n\
    \n```c\n} else if (strstr(line,\"BACKANDFORTH\")==line) {\n  digitalWrite(2,LOW);\
    \ // turn all off\n  digitalWrite(3,LOW);\n  digitalWrite(2,HIGH); // chose one\
    \ direction\n  analogWrite(9,255); // full speed\n  delay(500);\n  digitalWrite(2,LOW);\
    \ // stop\n  delay(1000);\n  digitalWrite(3,HIGH); // other direction\n  delay(500);\n\
    \  digitalWrite(3,LOW); // stop\n  analogWrite(9,0); // stop PWM\n} ...\n```\n\
    \nOther examples are to move for a short time, do some measurements, using code\
    \ examples from the previous section, and continue doing the same for a number\
    \ of steps. Yet another example is moving until a limit switch is engaged, which\
    \ will cause the motors to turn off, maybe do some measurement, and later return\
    \ to the parking position at a second limit switch.\n\nOr, what about continuously\
    \ reading a sensor and stopping once a certain value is achieved? This is actually\
    \ what a model-servo does. So, let us look at it more closely."
  mdcn: "## 4.5.3 舵机\n\n正如我们在第3章中讨论的，舵机用于精确地改变某些设备的位置或方向，例如船的舵或遥控车的转向系统。舵机只需要连接三根线：地线、电源线以及一根根据图3.9所示时序传输控制信息的信号线。在图4.17中，我们展示了如何将一个小型舵机连接到Arduino\
    \ UNO。如果舵机需要的电流或电压超过UNO所能提供的，可以使用合适的外部电源。外部电源的地线需要与UNO的地线连接，而舵机的一根线（通常是红色的）需要连接到外部电源的正极，而不是Arduino的5V电源引脚。从Arduino控制舵机相当简单，我们使用以下代码来实现。\n\
    \n```cpp\n// 舵机控制器，V. Ziemann, 170614\n#include <Servo.h>\nServo myServo;\nchar\
    \ line[30];\nvoid setup() {\n  myServo.attach(9);   // 引脚 D9\n  Serial.begin (9600);\n\
    \  while (!Serial) {;}\n}\nvoid loop() {\n  if (Serial.available()) {\n    Serial.readStringUntil('\\\
    n').toCharArray(line,30);\n    if (strstr(line,\"SERVO \")==line) {\n      float\
    \ val=atof(&line[6]);\n      myServo.write((int) val);   // 0 到 180\n    }\n \
    \ }\n}\n```\n\n该代码遵循标准模板，在**setup()**函数中打开串口，在**loop()**函数中实现查询-响应结构。舵机特定的部分包括引入<Servo.h>文件和声明一个名为**myServo**的**Servo**对象。在**setup()**函数中，我们将舵机功能附加到Arduino的D9引脚，并通过调用**myServo.write()**向舵机写入新值。后者接受一个0到180之间的值作为参数，并将舵机臂移动到所需位置。请注意，<Servo.h>是标准Arduino发行版的一部分。还要注意，我们可以使用Arduino上的任何引脚来控制舵机，甚至可以控制多个舵机，但使用舵机功能会禁用D9和D10引脚上**analogWrite()**函数的脉宽调制功能，因为它使用相同的硬件定时器。\n\
    \n以更高级的方式使用舵机，例如扫描，也很容易实现。以下代码片段在完整范围内来回扫描\n\n```c\n} else  if (strstr(line,\"\
    SCAN\")==line) {\n  for (int pos=0;pos<180;pos+=1) {\n    myServo.write(pos);\
    \ delay(10); // 并进行测量\n  }\n  for (int pos=180;pos>=0;pos-=1) {\n    myServo.write(pos);\
    \ delay(10);\n  }\n}\n```\n\n并且很容易设想在执行扫描的循环中加入一些测量。想象一个HR-SR04距离传感器连接到舵机上。以半圆周运动进行扫描并持续测量到最近物体的距离，这模仿了雷达的功能，只是使用了类似声纳的设备。这可以作为移动车辆的碰撞检测系统。\n\
    \n我们考虑的最后一种电机是步进电机，接下来介绍。\n\n## 4.5.4 步进电机\n\n正如我们之前讨论的，步进电机可以通过给定的脉冲序列非常精确地控制，该脉冲序列使轴转动所需的离散步数。电机内部的线圈需要以特定的模式激励，可以是单极性或双极性电源。我们从单极性类型开始。\n\
    \n在图4.18中，我们展示了使用安装在Arduino UNO和电机之间小面包板上的ULN2003达林顿驱动器连接单极性步进电机的方法。ULN2003的内部连接非常简单。左侧的引脚1-7是七个达林顿晶体管的基极，电阻内置在芯片中。右侧对应的引脚是相应晶体管的集电极。所有发射极都连接到芯片左下角的引脚8，该引脚也是地。右下角的引脚9是电机电源的端子，通常连接到提供足够电流和电压以驱动电机的外部电源。在图中，我们假设步进电机很小，因此将引脚9连接到Arduino的5V引脚。上面的两根线将地和电源电压连接到芯片。这里我们假设电源电压相同，并将L293D的引脚8连接到正逻辑电源电压。此外，我们通过将引脚9接地来禁用芯片右侧的输出。两根线将Arduino上的数字输出D2和D3连接到L293D上引脚2和7的两个半桥的输入端。引脚3和6的相应输出连接到电机电缆。最后，L293D的引脚1连接到UNO上的脉宽调制输出引脚D9。\n\
    \n我们希望通过串行线发送命令来从Arduino控制电机，根据协议，FW nnn设置正向速度，BW nnn设置反向速度。其他任何命令都会停止电机。使用以下草图可以轻松实现。\n\
    \n```cpp\n// H桥直流电机控制器，V. Ziemann, 170614\nchar line[30];\nvoid setup() {\n  pinMode(2,OUTPUT);\n\
    \  pinMode(3,OUTPUT);\n  Serial.begin (9600);\n  while (!Serial) {;}\n}\nvoid\
    \ loop() {\n  if (Serial.available()) {\n    Serial.readStringUntil('\\n').toCharArray(line,30);\n\
    \    if (strstr(line,\"FW \")==line) {\n      digitalWrite(2,LOW);\n      digitalWrite(3,LOW);\n\
    \      digitalWrite(3,HIGH);\n      float val=atof(&line[3]);\n      analogWrite(9,(int)val);\n\
    \    } else if (strstr(line,\"BW \")==line) {\n      digitalWrite(2,LOW);\n  \
    \    digitalWrite(3,LOW);\n      digitalWrite(2,HIGH);\n      float val=atof(&line[3]);\n\
    \      analogWrite(9,(int)val);\n    } else { // 在所有其他情况下停止\n      digitalWrite(2,LOW);\n\
    \      digitalWrite(3,LOW);\n      analogWrite(9,(int)0);\n    }\n  }\n}\n```\n\
    \nsetup()函数仅将用于控制H桥的引脚声明为输出并初始化串行线。在loop()函数中，我们采用标准的查询-响应机制。串行线上以FW开头的命令首先关闭电机作为预防措施，以防止两个输出都为正，这可能会使电机电源电压短路。然后将引脚D3拉高，导致电机向一个方向转动。最后，我们解析命令行的其余部分，并通过脉宽调制电机驱动器的使能引脚将值写入以设置电机速度。除了FW\
    \ n和BW n之外，接收到的任何命令都会禁用两个输出并将速度设置为零。当然，我们可以轻松实现其他命令，例如STOP，这将导致电机停止。\n\n甚至可以将更复杂的命令编程到控制器中，例如在一个方向上转动一定时间，然后停止并向另一个方向转动一段时间。以下代码片段可以作为示例。\n\
    \n```c\n} else if (strstr(line,\"BACKANDFORTH\")==line) {\n  digitalWrite(2,LOW);\
    \ // 关闭所有\n  digitalWrite(3,LOW);\n  digitalWrite(2,HIGH); // 选择一个方向\n  analogWrite(9,255);\
    \ // 全速\n  delay(500);\n  digitalWrite(2,LOW); // 停止\n  delay(1000);\n  digitalWrite(3,HIGH);\
    \ // 另一个方向\n  delay(500);\n  digitalWrite(3,LOW); // 停止\n  analogWrite(9,0); //\
    \ 停止PWM\n} ...\n```\n\n其他示例包括移动一小段时间，进行一些测量（使用上一节的代码示例），然后对多个步骤重复相同的操作。另一个示例是移动直到触发限位开关，这将导致电机关闭，可能进行一些测量，然后返回到第二个限位开关的停放位置。\n\
    \n或者，持续读取传感器并在达到某个值时停止怎么样？这实际上就是模型舵机所做的。所以，让我们更仔细地看看它。"
