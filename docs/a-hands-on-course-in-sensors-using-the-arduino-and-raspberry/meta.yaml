  md: "```\n;;\nstop)\n    echo \"Stopping epicsioc\"\n    kill $(pidof procServ)\n\
    \    ;;\nrestart)\n    $0 stop\n    sleep 10\n    $0 start\n    ;;\n*)\n    echo\
    \ \"Usage: /etc/init.d/epicsioc {start|stop|restart}\"\n    exit 1\n    ;;\nesac\n\
    exit 0\n```\n\nThe file contains some INIT INFO that is required by the init program,\
    \ which orchestrates the startup of the Raspios operating system. In the subsequent\
    \ case structure, three actions are specified: start, stop, and restart. The start\
    \ option reads the default EPICS environment variables and then changes to the\
    \ subdirectory with the st.cmd program. There it executes the procServ program\
    \ that in turn starts the st.cmd program. The purpose of procServ is to redirect\
    \ the input and output of st.cmd to the network socket 20000 to which we can connect\
    \ via telnet, and interact with the program in the same way we did earlier when\
    \ we started it in a terminal window. The advantage of using procServ is that\
    \ we can close the telnet program while st.cmd keeps running independently. The\
    \ other options give the running process the name IOC, write a log file, and ignore\
    \ the control sequences to close the process. The stop case determines the process\
    \ id of procServ with pidof and terminates the process with the kill command.\
    \ The restart case executes stop first, waits 10 seconds, and then executes start.\
    \ The default case, denoted by *), displays a brief usage note.\n\nBefore actually\
    \ running the program, we need to install the procServ and telnet packages with\
    \ the normal installation procedure:\n\n```\nsudo apt-get install procServ telnet\n\
    ```\n\nIn case one of the programs is already present in the current system, no\
    \ new software is installed. Once all required programs are installed and the\
    \ script is written, we copy it, using sudo, to the system directory /etc/init.d,\
    \ where all startup scripts for the operating system reside. We make it executable\
    \ using\n\n```\nsudo chmod 755 /etc/init.d/epicsioc\n```\n\nand start it by hand\
    \ in order to verify that the script works as intended with the command\n\n```\n\
    sudo systemctl start epicsioc\n```\n\nand if everything works we can install it\
    \ permanently by executing\n\n```\nsudo systemctl enable epicsioc\n```\n\nwhich\
    \ will automatically start the epicsioc service at boot time. Note that we can\
    \ also stop and disable the service. If we want to connect to the now-running-autonomously\
    \ process st.cmd, we use telnet when logged onto the Raspi"
