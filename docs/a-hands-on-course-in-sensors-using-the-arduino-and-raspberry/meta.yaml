    d: 10000011 10000011 1...


    where the period length is 8 time slots with a fundamental excitation pattern
    of 11100000. The excitation sequence of terminal b is the fundamental shifted
    by half the period length, or four time slots, or 180 degrees. Note that here,
    360 degrees, correspond to the eight time slots. And the sequence for terminals
    c and d are shifted by two and six time slots, respectively.


    Note the general pattern: terminals a and b are excited by a cosine-like sequence,
    which is evident by calculating the voltage applied to coils A and B, which is
    a-b


    a - b = 1 1 1 0 -1 -1 -1 0


    which admittedly is a poor approximation of a cosine. Likewise the voltage applied
    to coils C and D is c-d


    c - d = -1 0 1 1 1 0 -1 -1


    and that is an equally poor approximation of a sine. Apparently, the signals applied
    to the coil pairs roughly follow a cosine and a sine-like excitation. It is easy
    to see how we can generalize this and use better approximations of the cosine-
    and sine-like excitations of the coils, which is called *microstepping* the motors.


    In microstepping modes, the permanent magnets on the rotor are moved to several
    intermediate positions in between coils. This finer control comes at the expense
    of requiring a more advanced driver to control the output current in finer steps
    than turning it on and off. An example of such a driver is the DRV8825 circuit,
    which exposes very few control pins for direction and stepping as well as selecting
    which microstepping mode to use. Internally it generates the appropriate excitation
    pattern of the currents that are applied to the coils.


    In the above example, the stepper motor uses only six permanent magnets, resulting
    in an angular increment of 30 degrees per step, or 12 steps per revolution, but
    it is easy to see that we can increase the number of magnets to reduce the step
    size significantly. Typical step sizes for commercially available motors are 200
    or 400 steps per revolution.


    Here we need to point out that assigning one phase to coil terminals a and b and
    the other to terminals c and d is only a convention, and some vendors prefer to
    enumerate the coils and associated terminals sequentially when looking at the
    motor in Figure 3.10. This amounts to swapping the labels of terminals b and c
    and implies that we may have to swap two cables from the driver circuit to the
    motor in order to make it turn. It is best to check the datasheet for the motor
    to find out what convention is used for that particular motor.


    Furthermore, stepper motors come with different numbers of connecting cables that
    expose the terminals of the coils. On the left in Figure 3.11, the situation is
    depicted where all eight terminals are exposed. Sometimes the center taps are
    internally connected, in which case only four terminals are exposed, and this
    corresponds to the situation in the discussion earlier in this section. On the
    right, the center terminals are internally connected and are exposed, in which
    case the total number of exposed wires is six. If the two central connections
    are internally joined, five wires are exposed. Normally the exposed wires are
    color coded and identified in the datasheet, but measuring the resistance between
    the exposed wires allows us to determine the internal wiring of the motor experimentally.


    In the previous stepper motor examples, we always reverse the polarity of the
    coil excitation, which requires a drive circuit with an H bridge. Stepper motors,
