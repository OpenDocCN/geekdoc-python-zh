    \ websocket. The functions toStatus() and toReply() copy the text given as argument\
    \ to the respective lines at the bottom of the webpage. The functions start()\
    \ and stop() are callback functions for the respective buttons on the webpage.\
    \ They prepare JSON-formatted messages that instruct the ESP32 what to do.\n\n\
    ```\n<SCRIPT>\n  var sample_period=100, current_position=0;\n  var ipaddr=location.hostname\
    \ + \":81\";\n  document.getElementById('ip').innerHTML=ipaddr;\n  show_noconnect();\n\
    \  var websocket = new WebSocket('ws://' + ipaddr);\n  websocket.onerror = function(evt)\
