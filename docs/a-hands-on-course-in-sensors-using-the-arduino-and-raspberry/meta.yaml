    # APPENDIX A


    # Basic Circuit Theory


    As a reminder, we will briefly review the basic theory of electronic circuits.
    We start by considering *Ohm''s law*, which states that the current $I$ in a segment
    of a circuit is proportional to the voltage $U$ with the resistance $R$ as the
    proportionality constant, or $U = IR$. This is a consequence of the balance of
    the electric field accelerating electrons in the *resistor* and the friction force
    experienced by electrons due to scattering with vibration modes, phonons, of the
    ions that make up the material. The force pulling on the electrons is proportional
    to $U$ and the friction force is proportional to the electron''s drift velocity
    $v$, or by $-\alpha v$ where $\alpha$ is a material-dependent friction coefficient.
    Under stationary conditions, the two forces need to balance, and we have $v =
    U/\alpha$. But the current $I$ is proportional to the drift velocity $v$ and we
    find $I \propto v = U/\alpha$, which is the essence of Ohm''s law, and the friction
    coefficient $\alpha$ is proportional to the resistance $R$. In case the voltage
    is varying moderately slowly compared to the relaxation time of the electrons,
    the current directly follows the applied voltage; the current $I$ and the voltage
    $U$ are in phase.


    For *capacitors* the situation is different, because the two plates of a capacitor
    are electrically separated and do not allow constant transport of charges under
    stationary conditions. They can, however, store a charge $Q$ on the plates, and
    the capacitance $C$ is the proportionality constant between $Q$ and the applied
    voltage $U$, given by $Q = CU$. Since the charge $Q$ changes as a consequence
    of current $I$ flowing onto the plates, we have $U = (1/C) \int^t I dt''$, or
    by differentiation, $dU/dt = (1/C)I$. A sinusoidally oscillating voltage $U \propto
    e^{i\omega t}$ with frequency $\omega$ will therefore be related to the current
    by $U = (1/i\omega C)I$, and we can identify $Z_C = 1/i\omega C$ as the generalized
    resistance, the *impedance*, of the capacitor. Here $i$ is the imaginary unit.


    *Inductors* are made of coils that store energy in their magnetic field, and if
    we turn off the current, a voltage develops. Expressing this behavior in a formal
    way, we have $U \propto dI/dt$, with the inductance $L$ of the coil as the proportionality
    constant. If we again assume that the coil is excited by a sinusoidal current
    $I \propto e^{i\omega t}$ with frequency $\omega$, we find that we have $U = (i\omega
    L)I$ and identify $Z_L = i\omega L$ as the impedance of the inductor.


    Now that we have resistances and impedances of common elements found in simple
    circuits, we may ask how to combine them to networks. This question is answered
    by *Kirchhoff''s laws*, of which the first states that under stationary conditions,
    all currents flowing into a network node must add up to zero. This is a statement
    about the preservation of charges, and what comes in must also come out, because
    under stationary conditions piling up charges is not allowed. The second law states
    that the voltage differences around a loop in the network have to add up to zero,
    which is the requirement that the voltages at each node of the network with respect
    to a reference node are unique.


    We immediately use these laws to investigate the resistance or impedances connected
    in series, as shown on the left in Figure A.1. The currents in node B need to
    balance, and this'
  - '[PAGE 300]


    ![](img/8f23875c54d5b3177d5d2a5bba06b37e_300_0.png)


    Figure A.1 Two impedances connected in series (left) and in parallel (right).


    implies that the current $I_1$ passing through $Z_1$ is the same as the current
    $I_2 = I_1$ passing through $Z_2$. At the same time, the voltage $U$ provided
    by the battery is the same that is dropped across the two impedances. We thus
    find $U = I_1Z_1 + I_2Z_2 = I_1(Z_1 + Z_2)$, and we find that the total impedance
    of the circuit equals the sum of the impedances coupled in series.


    Considering the circuit on the right in Figure A.1, we know that the currents
    through the two branches have to add up: $I_t = U/Z_t = I_1 + I_2 = U/Z_1 + U/Z_2$.
    We can simplify this to $1/Z_t = 1/Z_1 + 1/Z_2$, which implies that the individual
    impedances add as reciprocals if the impedances are coupled in parallel.


    Note that the argument in the previous two paragraphs is valid for normal resistors
    and constant (DC) voltages and currents, but works as well for AC voltages if
    we use the complex frequency-dependent impedances for inductors and capacitances.
    We also note that all relations among currents and voltages are *linear*, such
    that we can use the super-position principle and analyze circuits for each voltage
    or current source independently and then add the contributions in the end.


    Apart from the linear circuit elements, the impedances, there are also nonlinear
    elements, and *diodes* are among them. Their voltage-current behavior follows
    an exponential dependence given by $I \propto \left(e^{(eU-E_g)/kT} - 1\right)$,
    where $E_g \approx 1.2\,V$ is the bandgap energy of the semiconductor material,
    here silicon. We see that for negative voltages the current is very small, while
    for positive currents it grows exponentially once the threshold of the bandgap
    voltage is passed. Practically, diodes conduct current in one direction and block
    current in the opposite direction. This makes them perfect to rectify voltages
    in the way we discussed in [Section 2.2.5](https://example.com). A diode is conducting
    if it is forward biased and the cathode is at a more negative voltage than the
    anode.


    *Transistors* are other nonlinear elements based on two diodes coupled antiparallel;
    they come in two types, dependent on whether the central tap, called the base
    terminal, is an anode or a cathode. Injecting an additional current into the base
    terminal enables a larger current flow through the two outer terminals, called
    collector and emitter. In the main body of the text we use transistors for switching
    applications, but with suitable ancillary circuitry they can be used as amplifiers
    as well. That goes beyond the scope of this appendix and is covered in books on
    electrical engineering, such as [17].'
- md: '## Least-Squares Fit


    In Chapter 12 we used the `linfit()` function on the Arduino to fit a straight
    line through a number $n$ of data points sampled at equidistant times. Here we
    briefly discuss the inner workings of that function that determines the slope
    $a$ and intercept $b$ by fitting data to a straight line. These parameters are
    determined by the requirement to minimize the sum of squared residuals $r_i =
    y_i - at_i - b$ for a number of data points $(t_i, y_i)$. We can restate the problem
    in the form of a linear equation that needs to be inverted in the least-squares
    sense


    $$\begin{pmatrix} \vdots \\ y_i \\ \vdots \end{pmatrix} = \begin{pmatrix} \vdots
    & \vdots \\ t_i & 1 \\ \vdots & \vdots \end{pmatrix} \begin{pmatrix} a \\ b \end{pmatrix}$$
    (B.1)


    which we write in abbreviated form


    $$y = Ax$$ (B.2)


    where $A$ is the $n \times 2$ matrix in the previous equation and $x = (a, b)^T$.
    Here the superscripted $T$ denotes the transpose, and for the squared sum of the
    residuals $\sum_{i=1}^n r_i^2$ we write $\chi^2$. The latter we express as


    $$\chi^2 = \sum_{i=1}^n r_i^2 = (y^T - x^T A^T)(y - Ax)$$

    $$= y^T y - x^T A^T y - y^T Ax + x^T A^T Ax.$$ (B.3)


    Minimizing this expression with respect to $x$ results in a condition for the
    sought solution vector $x$. The condition for a minimum is the requirement that
    the gradient with respect to the fit parameters $x^T$ is zero. We somewhat sloppily
    write it as


    $$0 = \frac{\partial \chi^2}{\partial x^T} = -2A^T y + 2A^T Ax$$ (B.4)


    where we used $x^T A y = y^T A^T x$ because the expressions are scalars and any
    matrix of the form $A^T A$ is symmetric. This allows us to combine terms and we
    arrive at the previous equation. For a more detailed derivation see [43]. Left-multiplying
    with the inverse of $(A^T A)$, provided the matrix is nonsingular, isolates the
    sought-after fit-parameter $x$ and we obtain


    $$\begin{pmatrix} a \\ b \end{pmatrix} = x = (A^T A)^{-1} A^T y.$$ (B.5)


    The right-hand side is often called pseudo-inverse of the matrix $A$, and we need
    to evaluate this expression in order to find $a$ and $b$. If the $t$ values are
    equidistant, we can absorb the step size in a redefinition of $a$, and the matrix
    $A$ obtains the form


    $$A = \begin{pmatrix} 1 & 1 \\ 2 & 1 \\ 3 & 1 \\ \vdots & \vdots \end{pmatrix}$$
    (B.6)


    such that $A^T A$ becomes


    $$A^T A = \begin{pmatrix} \sum_{k=1}^n k^2 & \sum_{k=1}^n k \\ \sum_{k=1}^n k
    & \sum_{k=1}^n 1 \end{pmatrix} = \begin{pmatrix} n(n+1)(2n+1)/6 & n(n+1)/2 \\
    n(n+1)/2 & n \end{pmatrix}$$ (B.7)


    which accounts for the definition of S0, S1, S2 in the linfit routine. Inverting
    this $2 \times 2$ matrix is trivial, and calculating $A^T y$ is done in the loop
    where ay0 and ay1 are calculated. The linfit function then returns the parameter
    $a$, the slope, and in the main program we need to rescale the result by multiplying
    the slope with the step size. It is easy to cross-check the results with octave,
    and the fitting is done with the polyfit() function, but if we want to do the
    calculation on the Arduino, we need methods like the one shown in this appendix.


    Note also that generalizing the method to higher-order polynomials is simple.
    We only need to add columns in Equation B.1 with $t_i^n$ and can rescale the fit
    parameters $a, b, \dots$ by the appropriate power of the step size, and we are
    left with adding powers of positive integers for which closed expressions exist.
    This means that the matrix $A^T A$ can always be calculated in closed form for
    any number of data points $n$. Only the inversion of a matrix with rank of the
    number of fit parameters remains. Being able to precompute most of the matrices
    and possibly inverting them on the host computer for fixed $n$ makes this method
    rather suitable for microcontrollers.


    ## QUESTIONS AND PROJECT IDEAS


    - 1. Fit a parabola given by $y = at^2 + bt + c$ to equally-spaced data points
    $(i\Delta t, y_i)$.


    ## APPENDIX C


    ## Where to Go from Here?


    After our tour-de-force through the world of sensors, electronics, microcontrollers,
    and computers I am sure you want to dig deeper. Here’s how.


    A great overview over sensors that are available on the market are websites of
    distributors for electronic components, such as [www.digikey.com](http://www.digikey.com),
    [www.rs-online.com](http://www.rs-online.com), [www.distrelec.com](http://www.distrelec.com),
    or [www.farnell.com](http://www.farnell.com). Just search for the word *sensor*
    on their sites. Typically a large number of subcategories appear with an even
    larger number of individual sensors beneath. On the pages for the specific sensors
    datasheets with detailed information invite further exploration. Just browsing
    around can be very inspiring.


    The classic reference for all things electronic is Horowitz’s and Hill’s *The
    Art of Electronics*. It goes into great depth on practically all aspects of electronics,
    including discussions of circuits that do *not* work. Make sure to get the most
    recent (third, at the time of writing) edition. It addresses a mature audience,
    whereas the companion book *Learning the Art of Electronics, a Hands-On Lab Course*
    by Hayes and Horowitz addresses students. After presenting components in quite
    some detail it goes step-by-step through many worked examples. I found the *ARRL
    Handbook for radio-communications* from the American Radio Relay League a great
    source of inspiration. It is a source book of solutions for the electronics that
    is relevant to ham-radio amateurs. An updated edition is released every other
    year.


    A first step towards exploring additional microcontrollers and their specific
    features is perusing [www.arduino.cc](http://www.arduino.cc) and, in particular
    [store.arduino.cc/collections/boards](http://store.arduino.cc/collections/boards).
    All those boards can be programmed with the Arduino IDE. Other microcontroller
    families, such as the ATtinys and PICs from Microchip or the MSP430s from Texas
    Instruments are often optimized for specific purposes, such as low-power consumption.
    Moreover, they come in a large variety of sizes and capabilities, such as number
    of IO pins, DAC and ADC channels, built-in op-amps, on-board WLAN or Bluetooth.
    Occasionally they must be programmed in assembler, but nowadays they often come
    with a software development kit (SDK) including controller-specific libraries
    for writing code and uploading programs to the controllers. Even the Raspis have
    gotten a smaller brethren in the form of Raspberry Pi Picos, available with and
    without built-in WiFi. They are based on the RP2040, a dual-core microcontroller
    that is also used on some of the Arduino boards mentioned on page 58. The Picos
    can be programmed using their native SDK or with MicroPython, a Python interpreter
    that runs on the Picos. Initial tests are usually described in “Getting started”
    guides, but mastering all features requires careful study of the datasheets, often
    many hundreds of pages long. Considering the recent shortage of components, the
    time to adapt a project to a different controller, however, might be well spent.


    Likewise the recent shortage of Raspberry Pis can be alleviated by moving projects
    to a different computer. Even desktop or laptop computers with common operating
    systems can be used as a substitute, as long as they have a working Python3 or
    Octave installation. Usually also databases and webservers, such as apache2 are
    open source and available for all common operating systems. Porting the software
    from this book should then work out-of-the-box or require only moderate effort
    to adapt it. But sometimes the small size of a Raspi is important and luckily
    there are other small boards on the market, such as the *ODROID-C4*, which has
    similar specifications as Raspis or the *Beagleboard*, which is geared more towards
    data acquisition and robotics than Raspis. Even more geared towards data acquisition
    is the *Red Pitaya*. It features two DACs and two ADCs that operate at speeds
    of up to 125 MHz and that are directly connected to a Field-Programmable Gate
    Array which itself is accessible from two general-purpose processor cores running
    Linux. The *NVIDIA Jetson Nano* is geared towards machine-learning applications.
    It features a dual-core processor running Linux that is connected to a 128-core
    Graphical Processing Unit, which supports the *CUDA* programming language that
    speeds up the machine-learning algorithms.


    Let me end on a lighter note and suggest sources for additional fun projects with
    Arduinos and Raspis. Apart from the many hobbyist magazines that feature Arduinos
    and Raspberry Pis, many cool projects can be found on [create.arduino.cc/projecthub](https://create.arduino.cc/projecthub)
    and in the more than 100 issues of the MagPi magazine [magpi.raspberrypi.com](https://magpi.raspberrypi.com)
    that are available online free of charge (though they appreciate a donation).
    Two final sources for inspiration of what else to do with Arduinos and Raspis
    are [www.instructables.com/circuits](https://www.instructables.com/circuits) and
    [hackaday.com](https://hackaday.com). Recreating some of these projects and realizing
    your own should put and end to boredom for the foreseeable future.'
  mdcn: '## 最小二乘拟合


    在第12章中，我们使用了Arduino上的`linfit()`函数，通过等间隔时间采样的$n$个数据点拟合出一条直线。这里我们简要讨论该函数的内部工作原理，它通过将数据拟合到一条直线来确定斜率$a$和截距$b$。这些参数的确定基于最小化残差平方和$r_i
    = y_i - at_i - b$的要求，其中包含多个数据点$(t_i, y_i)$。我们可以将问题重新表述为一个需要在最小二乘意义下求逆的线性方程：


    $$\begin{pmatrix} \vdots \\ y_i \\ \vdots \end{pmatrix} = \begin{pmatrix} \vdots
    & \vdots \\ t_i & 1 \\ \vdots & \vdots \end{pmatrix} \begin{pmatrix} a \\ b \end{pmatrix}$$
    (B.1)


    我们将其简写为：


    $$y = Ax$$ (B.2)


    其中$A$是上一个方程中的$n \times 2$矩阵，$x = (a, b)^T$。这里的上标$T$表示转置，残差平方和$\sum_{i=1}^n r_i^2$我们记为$\chi^2$。后者可表示为：


    $$\chi^2 = \sum_{i=1}^n r_i^2 = (y^T - x^T A^T)(y - Ax)$$

    $$= y^T y - x^T A^T y - y^T Ax + x^T A^T Ax.$$ (B.3)


    最小化这个关于$x$的表达式，会得到所求解向量$x$的条件。最小值的条件是要求关于拟合参数$x^T$的梯度为零。我们稍显随意地将其写为：


    $$0 = \frac{\partial \chi^2}{\partial x^T} = -2A^T y + 2A^T Ax$$ (B.4)


    这里我们使用了$x^T A y = y^T A^T x$，因为表达式是标量，并且任何形如$A^T A$的矩阵都是对称的。这允许我们合并项，从而得到前面的方程。更详细的推导请参见[43]。左乘$(A^T
    A)$的逆矩阵（假设该矩阵非奇异），可以分离出所求的拟合参数$x$，我们得到：


    $$\begin{pmatrix} a \\ b \end{pmatrix} = x = (A^T A)^{-1} A^T y.$$ (B.5)


    右边通常被称为矩阵$A$的伪逆，我们需要计算这个表达式来找到$a$和$b$。如果$t$值是等间隔的，我们可以将步长吸收到$a$的重新定义中，矩阵$A$就变成了如下形式：


    $$A = \begin{pmatrix} 1 & 1 \\ 2 & 1 \\ 3 & 1 \\ \vdots & \vdots \end{pmatrix}$$
    (B.6)


    这样$A^T A$就变成了：


    $$A^T A = \begin{pmatrix} \sum_{k=1}^n k^2 & \sum_{k=1}^n k \\ \sum_{k=1}^n k
    & \sum_{k=1}^n 1 \end{pmatrix} = \begin{pmatrix} n(n+1)(2n+1)/6 & n(n+1)/2 \\
    n(n+1)/2 & n \end{pmatrix}$$ (B.7)


    这解释了`linfit`程序中S0、S1、S2的定义。求这个$2 \times 2$矩阵的逆是平凡的，而计算$A^T y$则在计算ay0和ay1的循环中完成。`linfit`函数然后返回参数$a$（斜率），在主程序中我们需要通过将斜率乘以步长来重新缩放结果。使用octave可以很容易地交叉验证结果，拟合是用`polyfit()`函数完成的，但如果我们想在Arduino上进行计算，就需要像本附录中所示的方法。


    还要注意，将该方法推广到高阶多项式很简单。我们只需要在方程B.1中添加$t_i^n$列，并可以通过步长的适当幂次来重新缩放拟合参数$a, b, \dots$，剩下的就是对正整数的幂次求和，这些和存在封闭表达式。这意味着对于任意数量的数据点$n$，矩阵$A^T
    A$总是可以以封闭形式计算出来。只剩下对秩等于拟合参数数量的矩阵求逆。能够预计算大部分矩阵，并可能在主机计算机上对固定的$n$进行求逆，使得这种方法非常适合微控制器。


    ## 问题与项目构想


    - 1. 将由$y = at^2 + bt + c$给出的抛物线拟合到等间距的数据点$(i\Delta t, y_i)$。


    ## 附录 C


    ## 接下来该去哪里？


    在我们对传感器、电子学、微控制器和计算机的世界进行了一番深入探索之后，我相信你想要更深入地钻研。以下是一些建议。


    了解市场上可用传感器的一个绝佳途径是访问电子元器件分销商的网站，例如[www.digikey.com](http://www.digikey.com)、[www.rs-online.com](http://www.rs-online.com)、[www.distrelec.com](http://www.distrelec.com)或[www.farnell.com](http://www.farnell.com)。只需在他们的网站上搜索*sensor*（传感器）这个词。通常会出现大量子类别，其下还有数量更多的具体传感器。在特定传感器的页面上，包含详细信息的数据手册邀请你进一步探索。随意浏览就能带来很多灵感。


    所有电子学内容的经典参考书是Horowitz和Hill的*The Art of Electronics*（《电子学的艺术》）。它深入探讨了电子学的几乎所有方面，包括讨论那些*不*工作的电路。请务必获取最新版本（截至写作时为第三版）。它面向成熟的读者，而其配套书籍*Learning
    the Art of Electronics, a Hands-On Lab Course*（《学习电子学的艺术：动手实验课程》）则面向学生。在相当详细地介绍元器件之后，它逐步讲解了许多实例。我发现美国无线电中继联盟（ARRL）的*ARRL
    Handbook for radio-communications*（《ARRL无线电通信手册》）是一个很好的灵感来源。它是业余无线电爱好者相关电子学的解决方案汇编。每隔一年就会发布更新版本。


    探索其他微控制器及其特定功能的第一步是浏览[www.arduino.cc](http://www.arduino.cc)，特别是[store.arduino.cc/collections/boards](http://store.arduino.cc/collections/boards)。所有这些开发板都可以用Arduino
    IDE编程。其他微控制器系列，如Microchip的ATtinys和PICs，或Texas Instruments的MSP430s，通常针对特定目的进行了优化，例如低功耗。此外，它们有各种尺寸和功能，例如IO引脚数量、DAC和ADC通道、内置运算放大器、板载WLAN或蓝牙。偶尔它们必须用汇编语言编程，但如今它们通常附带软件开发工具包（SDK），包括用于编写代码和将程序上传到控制器的特定于控制器的库。即使是树莓派（Raspis）也有了更小的兄弟姐妹——Raspberry
    Pi Picos，有内置WiFi和不带WiFi的版本。它们基于RP2040，这是一个双核微控制器，也用于第58页提到的一些Arduino板。Picos可以使用其原生SDK或MicroPython（一种运行在Picos上的Python解释器）进行编程。初始测试通常在“入门”指南中描述，但要掌握所有功能需要仔细研究数据手册，这些手册通常长达数百页。考虑到最近的元器件短缺，将项目适配到不同控制器上的时间可能是值得的。


    同样，最近树莓派的短缺可以通过将项目转移到其他计算机上来缓解。即使是运行常见操作系统的台式机或笔记本电脑也可以作为替代品，只要它们有可用的Python3或Octave安装。通常，数据库和网络服务器（如apache2）也是开源的，并且适用于所有常见操作系统。那么，移植本书中的软件应该可以开箱即用，或者只需要适度的努力来适配。但有时树莓派的小尺寸很重要，幸运的是市场上还有其他小型开发板，例如*ODROID-C4*，其规格与树莓派相似，或者*Beagleboard*，它比树莓派更侧重于数据采集和机器人技术。更侧重于数据采集的是*Red
    Pitaya*。它具有两个DAC和两个ADC，运行速度高达125 MHz，并直接连接到一个现场可编程门阵列（FPGA），该FPGA本身可以从两个运行Linux的通用处理器核心访问。*NVIDIA
    Jetson Nano*则面向机器学习应用。它具有一个运行Linux的双核处理器，连接到一个128核图形处理单元（GPU），该GPU支持*CUDA*编程语言，可以加速机器学习算法。


    最后，让我以轻松的语气结束，并建议一些用Arduino和树莓派进行更多有趣项目的来源。除了许多以Arduino和树莓派为特色的业余爱好者杂志外，还可以在[create.arduino.cc/projecthub](https://create.arduino.cc/projecthub)和超过100期的MagPi杂志[magpi.raspberrypi.com](https://magpi.raspberrypi.com)上找到许多很酷的项目，这些杂志可以在线免费获取（尽管他们感谢捐赠）。关于用Arduino和树莓派还能做什么的最后两个灵感来源是[www.instructables.com/circuits](https://www.instructables.com/circuits)和[hackaday.com](https://hackaday.com)。重现其中一些项目并实现你自己的想法，应该能在可预见的未来终结无聊。'
