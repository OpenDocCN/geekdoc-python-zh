- md: "It starts by copying the first command line argument, which should contain\
    \ the start time of the display to the variable S, declares the database file\
    \ to use, and the location where the graphs are stored. For this we choose a directory\
    \ under /home/pi/public_html, which is accessible to the apache2 web server. The\
    \ first rrdtool graph produces the temperature plot. Note that the graph file\
    \ carries the time period appended to its name. The second rrdtool command produces\
    \ the pressure, the third the humidity graph, and the last one the air quality,\
    \ all in the way discussed in Section 5.6.3. In order to produce graphs with time\
    \ spans of 8 hours, 1 day, 1 week, 1 month, and 3 months, we call weathergraph.sh\
    \ with different starting dates as command line arguments, and place the five\
    \ commands in a separate script, called allweathergraph.sh. It is reproduced here.\n\
    \n```\n#!/bin/bash\n# /home/pi/rrdtool/allweathergraph.sh\n/home/pi/rrdtool/weathergraph.sh\
    \ -8h > /dev/null\n/home/pi/rrdtool/weathergraph.sh -1d > /dev/null\n/home/pi/rrdtool/weathergraph.sh\
    \ -1w > /dev/null\n/home/pi/rrdtool/weathergraph.sh -1m > /dev/null\n/home/pi/rrdtool/weathergraph.sh\
    \ -3m > /dev/null\n```\n\nThe call to weathergraph.sh uses the absolute path because\
    \ we want to run it from a cron job to create new graphs every 10 minutes. We\
    \ also redirect the output into the big bit-bucket /dev/null. We execute this\
    \ script regularly as a cron job with the command crontab -e in order to add the\
    \ line\n\n```\n*/10 * * * * /home/pi/rrdtool/allweathergraph.sh\n```\n\nin the\
    \ crontab file.\nIt remains to prepare the index.html file in the directory with\
    \ the graphs. The following HTML file presents the data as the simple web page\
    \ shown in Figure 9.2.\n\n```\n<!DOCTYPE HTML>\n<HTML>\n  <HEAD>\n    <TITLE>Raspi\
    \ Weather Station</TITLE>\n    <META http-equiv=\"refresh\" content=\"120\">\n\
    \  </HEAD>\n  <BODY>\n    <H1 ALIGN=CENTER>Raspi Weather Station (8 hours)</H1>\n\
    \    Display data for:\n    <A HREF=index.html>8 hours</A>\n    <A HREF=index-1d.html>1\
    \ day</A>\n    <A HREF=index-1w.html>1 week</A>\n    <A HREF=index-1m.html>1 month</A>\n\
    \    <A HREF=index-3m.html>3 months</A>\n    <HR>\n    <BR>\n    <IMG SRC=\"temperature-8h.png\"\
    \ ALT=\"Temperature\">\n    <IMG SRC=\"pressure-8h.png\" ALT=\"Pressure\">\n \
    \   <IMG SRC=\"humidity-8h.png\" ALT=\"Humidity\">\n    <IMG SRC=\"VOC-8h.png\"\
    \ ALT=\"Humidity\">\n  </BODY>\n</HTML>\n```\n\nThe file contains the already-known\
    \ header information with the title Raspi Weather Station, and the automatic refresh\
    \ rate of 120 seconds. Then a line with options of different time ranges follows.\
    \ Each entry points to a different web page residing in the same directory, but\
    \ serving the graphs for the other ranges. Remember, the graphs are automatically\
    \ updated by the cron job, but the different index-XX.html pages are constant.\
    \ We need to point out that the reported temperature is affected by the little\
    \ heater for the MQ-x sensor inside the BME680 and the reported value is therefore\
    \ too high by about four degrees. Moreover, I caused the small spikes in the humidity\
    \ and corresponding dips in air quality graphs by exhaling on the sensor.\n\n\
    Having the weather data displayed for different time ranges is certainly adequate\
    \ for home use, but in a laboratory we want to integrate the data from the sensor\
    \ nodes into the control system. If we already have the EPICS system running,\
    \ all we have to do is to prepare the protocol and database files for our weather\
    \ data. The former, written in a more compact way, is the following.\n\n```\n\
    # ./tempApp/Db/weather.proto\nTerminator = CR LF;\nget_T {out \"T?\"; in \"T %f\"\
    ; ExtraInput = Ignore; }\nget_P {out \"P?\"; in \"P %f\"; ExtraInput = Ignore;\
    \ }\nget_H {out \"H?\"; in \"H %f\"; ExtraInput = Ignore; }\nget_VOC {out \"VOC?\"\
    ; in \"VOC %f\"; ExtraInput = Ignore; }\n```\n\nIt follows the already-known pattern\
    \ of sending a query with a question mark appended, and then receives the query,\
    \ followed by the measurement value. To accompany this file, which orchestrates\
    \ the low-level communication, we need a data base file, named weather.db, with\
    \ the following contents.\n\n```\n# ./tempApp/Db/weather.db\nrecord(ai, \"$(USER):T\"\
    ) {\n    field(DESC, \"Temperature\")\n    field(SCAN, \"10 second\")\n    field(DTYP,\
    \ \"stream\")\n    field(INP, \"@weather.proto get_T $(PORT)\")\n}\nrecord(ai,\
    \ \"$(USER):P\") {\n    field(DESC, \"Pressure\")\n    field(SCAN, \"10 second\"\
    )\n    field(DTYP, \"stream\")\n    field(INP, \"@weather.proto get_P $(PORT)\"\
    )\n}\nrecord(ai, \"$(USER):H\") {\n    field(DESC, \"Humidity\")\n    field(SCAN,\
    \ \"10 second\")\n    field(DTYP, \"stream\")\n    field(INP, \"@weather.proto\
    \ get_H $(PORT)\")\n}\nrecord(ai, \"$(USER):VOC\") {\n    field(DESC, \"Air quality\"\
    )\n    field(SCAN, \"10 second\")\n    field(DTYP, \"stream\")\n    field(INP,\
    \ \"@weather.proto get_VOC $(PORT)\")\n}\n```\n\nHere we find analog input ai\
    \ records that define the process variables $(USER):XX, and link them to the respective\
    \ protocol functions. Moreover, we need to include the new database file in the\
    \ Makefile by adding the line\n\n```\nDB += weather.db\n```\n\nand add the following\
    \ two lines to the ./temp/iocBoot/ioctemp/st.cmd EPICS command file\n\n```\ndrvAsynIPPortConfigure(\"\
    SOCKET\",\"192.168.20.56:1137\",0,0,0)\ndbLoadRecords(\"db/weather.db\",\"PORT='SOCKET',USER='weather'\"\
    )\n```\n\nand finally, call make in the base directory of the temp hierarchy.\
    \ Then we execute st.cmd as before, either from the command line or automatically\
    \ with an init script as discussed at the end of Section 6.5. The process variables\
    \ are now accessible from any computer on the network. To access the barometric\
    \ pressure, we issue caget weather:P, and similarly for the other variables. In\
    \ this way, they can be seamlessly included in logging, monitoring, or other display\
    \ programs that EPICS provides. Adding more sensors is as simple as adding protocol\
    \ and database files as well as including them in the Makefile in the Db directory,\
    \ and adding two lines in the st.cmd program.\n\nWith its on-board USB connector\
    \ and many input-output pins, the NodeMCU is a very convenient development platform,\
    \ but in this example, we only use two pins for I2C and, once the NodeMCU is up\
    \ and running, we no longer need the USB interface or the serial line. All communication\
    \ can be done via the WLAN interface. It is therefore prudent to migrate the project\
    \ to the ESP-01, which is also less expensive, an attractive feature if we plan\
    \ to deploy multiple weathernodes. On the other hand, the absence of a USB interface\
    \ makes programming the ESP-01 a bit more tricky. We can, however, directly connect\
    \ the ESP-01 with its eight exposed pins to an USB-to-serial converter, often\
    \ they are referred to as FTDI converters, named after the company that initially\
    \ offered them. We need to ensure, however, that VCC from the converter is 3.3\
    \ V rather than the more common 5 V. If that is not the case, a voltage regulator,\
    \ as discussed in Section 2.2.5, will help.\n\nFigure 9.3 shows the ESP-01 on\
    \ the left-hand side. Its eight pins come in two columns of four each. The pins\
    \ on the left are labeled RXD, GP0, GP2, and GND from top to bottom. The pins\
    \ on the right are labeled VCC, RST, CH_PP, and TXD. In order to program the ESP-01,\
    \ we connect its GND and VCC to the corresponding pins of the USB-to-serial converter.\
    \ We also connect CH_PD and GP2 to VCC and GP0 to GND, which puts the ESP-01 into\
    \ programming mode. Finally, we connect the serial-receive pin RXD to the serial-transmit\
    \ pin TX on the converter and the TXD pin to RX. With the wiring in place we attach\
    \ the USB-to-serial converter to our desktop computer, select the port from the\
    \ *Tools→Port* menu, and select *Generic ESP8266 Module* in the *Tools→Board*\
    \ menu in the Arduino IDE.\n\nWe can essentially use the same program as for the\
    \ NodeMCU, shown earlier in this chapter. All we need to do is to remove all references\
    \ to `Serial`, because we will not use the Serial line. Moreover, we uncomment\
    \ the line with `Wire.begin(0,2);` in the function `setup()`, which is necessary,\
    \ because the default I2C pins that are used on the NodeMCU are not routed to\
    \ exposed pins on the ESP-01. Instead, we use pins GP0 and GP2 for the I2C lines\
    \ SDA and SCL, respectively. Finally, we compile and download the sketch the our\
    \ ESP-01.\n\nNow we disconnect the programmed ESP-01 from the USB-to-serial converter\
    \ and, following the wiring from Figure 9.4, connect it to the BME680 instead.\
    \ Ground and 3.3 V supply rails are connected to VCC and GND pins on both devices.\
    \ Note that also the pins labeled RST and CH_PD are connected to VCC. The I2C\
    \ lines connect GP0 on the ESP-01 to SCK in the BME680. Likewise, GP2 is connected\
    \ to SDI. Note that we must provide external pull-up resistors to the I2C lines;\
    \ we use 10 kΩ resistors, but their value is not critical. For good measure, we\
    \ should also provide 100 nF bypass capacitors (not shown) between GND and VCC.\
    \ Once we connect the supply voltage, this circuit will behave the same way as\
    \ the one shown in Figure 9.1, albeit with a smaller footprint.\n\n## QUESTIONS\
    \ AND PROJECT IDEAS\n\n1.  What is the average barometric pressure at sea level,\
    \ on a rainy day, in a heavy storm, in a hurricane, or in La Paz?\n2.  What is\
    \ the typical humidity where you live, in a rain forest, in Death Valley, or at\
    \ the La Silla Observatory in Chile?\n3.  Add a separate temperature sensor, for\
    \ example an LM35 or DS18b20, to crosscheck the value reported by the BME680.\n\
    4.  Add a separate humidity sensor such as the HYT221 or DHT11 to crosscheck the\
    \ value reported by the BME680.\n5.  Add a dust sensor to turn the weather station\
    \ into an environmental logging station."
  mdcn: "它首先将第一个命令行参数（应包含显示的起始时间）复制到变量 S 中，声明要使用的数据库文件以及图表的存储位置。为此，我们选择 `/home/pi/public_html`\
    \ 下的一个目录，该目录可被 apache2 Web 服务器访问。第一个 `rrdtool graph` 命令生成温度图。请注意，图表文件名中附加了时间段。第二个\
    \ `rrdtool` 命令生成气压图，第三个生成湿度图，最后一个生成空气质量图，所有这些都按照第 5.6.3 节讨论的方式进行。为了生成时间跨度为 8 小时、1\
    \ 天、1 周、1 个月和 3 个月的图表，我们使用不同的起始日期作为命令行参数调用 `weathergraph.sh`，并将这五个命令放在一个单独的脚本中，名为\
    \ `allweathergraph.sh`。其内容如下。\n\n```\n#!/bin/bash\n# /home/pi/rrdtool/allweathergraph.sh\n\
    /home/pi/rrdtool/weathergraph.sh -8h > /dev/null\n/home/pi/rrdtool/weathergraph.sh\
    \ -1d > /dev/null\n/home/pi/rrdtool/weathergraph.sh -1w > /dev/null\n/home/pi/rrdtool/weathergraph.sh\
    \ -1m > /dev/null\n/home/pi/rrdtool/weathergraph.sh -3m > /dev/null\n```\n\n调用\
    \ `weathergraph.sh` 时使用绝对路径，因为我们希望从 cron 作业运行它，以便每 10 分钟创建一次新图表。我们还将输出重定向到巨大的位桶\
    \ `/dev/null`。我们通过命令 `crontab -e` 将此脚本作为 cron 作业定期执行，以便在 crontab 文件中添加以下行\n\n\
    ```\n*/10 * * * * /home/pi/rrdtool/allweathergraph.sh\n```\n\n接下来需要在包含图表的目录中准备\
    \ `index.html` 文件。以下 HTML 文件将数据呈现为图 9.2 所示的简单网页。\n\n```\n<!DOCTYPE HTML>\n<HTML>\n\
    \  <HEAD>\n    <TITLE>Raspi Weather Station</TITLE>\n    <META http-equiv=\"refresh\"\
    \ content=\"120\">\n  </HEAD>\n  <BODY>\n    <H1 ALIGN=CENTER>Raspi Weather Station\
    \ (8 hours)</H1>\n    Display data for:\n    <A HREF=index.html>8 hours</A>\n\
    \    <A HREF=index-1d.html>1 day</A>\n    <A HREF=index-1w.html>1 week</A>\n \
    \   <A HREF=index-1m.html>1 month</A>\n    <A HREF=index-3m.html>3 months</A>\n\
    \    <HR>\n    <BR>\n    <IMG SRC=\"temperature-8h.png\" ALT=\"Temperature\">\n\
    \    <IMG SRC=\"pressure-8h.png\" ALT=\"Pressure\">\n    <IMG SRC=\"humidity-8h.png\"\
    \ ALT=\"Humidity\">\n    <IMG SRC=\"VOC-8h.png\" ALT=\"Humidity\">\n  </BODY>\n\
    </HTML>\n```\n\n该文件包含已知的标题信息，标题为 \"Raspi Weather Station\"，自动刷新率为 120 秒。然后是一行包含不同时间范围选项的内容。每个条目指向同一目录中的不同网页，但提供其他范围的图表。请记住，图表由\
    \ cron 作业自动更新，但不同的 `index-XX.html` 页面是固定的。我们需要指出，报告的温度受到 BME680 内部 MQ-x 传感器的小型加热器的影响，因此报告值高出约四度。此外，我通过向传感器呼气导致了湿度图中的小尖峰和空气质量图中的相应下降。\n\
    \n将天气数据显示为不同的时间范围当然足以满足家庭使用，但在实验室中，我们希望将传感器节点的数据集成到控制系统中。如果 EPICS 系统已经在运行，我们只需为天气数据准备协议和数据库文件。前者以更紧凑的方式编写，如下所示。\n\
    \n```\n# ./tempApp/Db/weather.proto\nTerminator = CR LF;\nget_T {out \"T?\"; in\
    \ \"T %f\"; ExtraInput = Ignore; }\nget_P {out \"P?\"; in \"P %f\"; ExtraInput\
    \ = Ignore; }\nget_H {out \"H?\"; in \"H %f\"; ExtraInput = Ignore; }\nget_VOC\
    \ {out \"VOC?\"; in \"VOC %f\"; ExtraInput = Ignore; }\n```\n\n它遵循已知的模式：发送一个附加问号的查询，然后接收查询，后跟测量值。为了配合这个协调底层通信的文件，我们需要一个名为\
    \ `weather.db` 的数据库文件，其内容如下。\n\n```\n# ./tempApp/Db/weather.db\nrecord(ai, \"\
    $(USER):T\") {\n    field(DESC, \"Temperature\")\n    field(SCAN, \"10 second\"\
    )\n    field(DTYP, \"stream\")\n    field(INP, \"@weather.proto get_T $(PORT)\"\
    )\n}\nrecord(ai, \"$(USER):P\") {\n    field(DESC, \"Pressure\")\n    field(SCAN,\
    \ \"10 second\")\n    field(DTYP, \"stream\")\n    field(INP, \"@weather.proto\
    \ get_P $(PORT)\")\n}\nrecord(ai, \"$(USER):H\") {\n    field(DESC, \"Humidity\"\
    )\n    field(SCAN, \"10 second\")\n    field(DTYP, \"stream\")\n    field(INP,\
    \ \"@weather.proto get_H $(PORT)\")\n}\nrecord(ai, \"$(USER):VOC\") {\n    field(DESC,\
    \ \"Air quality\")\n    field(SCAN, \"10 second\")\n    field(DTYP, \"stream\"\
    )\n    field(INP, \"@weather.proto get_VOC $(PORT)\")\n}\n```\n\n这里我们看到模拟输入 `ai`\
    \ 记录，它们定义了过程变量 `$(USER):XX`，并将其链接到相应的协议函数。此外，我们需要通过在 Makefile 中添加以下行来包含新的数据库文件\n\
    \n```\nDB += weather.db\n```\n\n并在 `./temp/iocBoot/ioctemp/st.cmd` EPICS 命令文件中添加以下两行\n\
    \n```\ndrvAsynIPPortConfigure(\"SOCKET\",\"192.168.20.56:1137\",0,0,0)\ndbLoadRecords(\"\
    db/weather.db\",\"PORT='SOCKET',USER='weather'\")\n```\n\n最后，在 temp 层次结构的基础目录中调用\
    \ `make`。然后，如前所述，从命令行或通过 init 脚本自动执行 `st.cmd`（如第 6.5 节末尾所述）。现在可以从网络上的任何计算机访问过程变量。要访问气压，我们发出\
    \ `caget weather:P`，其他变量类似。通过这种方式，它们可以无缝地包含在 EPICS 提供的日志记录、监控或其他显示程序中。添加更多传感器就像在\
    \ Db 目录中添加协议和数据库文件并在 Makefile 中包含它们，以及在 `st.cmd` 程序中添加两行一样简单。\n\n凭借其板载 USB 连接器和许多输入输出引脚，NodeMCU\
    \ 是一个非常方便的开发平台，但在这个例子中，我们只使用两个引脚用于 I2C，并且一旦 NodeMCU 启动并运行，我们就不再需要 USB 接口或串行线。所有通信都可以通过\
    \ WLAN 接口完成。因此，谨慎的做法是将项目迁移到 ESP-01，它也更便宜，如果我们计划部署多个天气节点，这是一个有吸引力的特点。另一方面，缺少 USB\
    \ 接口使得对 ESP-01 进行编程有点棘手。然而，我们可以将具有八个暴露引脚的 ESP-01 直接连接到 USB 转串行转换器（通常称为 FTDI 转换器，以最初提供它们的公司命名）。但是，我们需要确保转换器的\
    \ VCC 是 3.3 V，而不是更常见的 5 V。如果不是这种情况，如第 2.2.5 节讨论的电压调节器将有所帮助。\n\n图 9.3 左侧显示了 ESP-01。它的八个引脚分为两列，每列四个。左侧的引脚从上到下标记为\
    \ RXD、GP0、GP2 和 GND。右侧的引脚标记为 VCC、RST、CH_PP 和 TXD。为了对 ESP-01 进行编程，我们将其 GND 和 VCC\
    \ 连接到 USB 转串行转换器的相应引脚。我们还将 CH_PD 和 GP2 连接到 VCC，GP0 连接到 GND，这使 ESP-01 进入编程模式。最后，我们将串行接收引脚\
    \ RXD 连接到转换器上的串行发送引脚 TX，将 TXD 引脚连接到 RX。接线完成后，我们将 USB 转串行转换器连接到台式计算机，从 *Tools→Port*\
    \ 菜单中选择端口，并在 Arduino IDE 的 *Tools→Board* 菜单中选择 *Generic ESP8266 Module*。\n\n我们基本上可以使用与本章前面所示的\
    \ NodeMCU 相同的程序。我们需要做的就是移除所有对 `Serial` 的引用，因为我们不会使用串行线。此外，我们在 `setup()` 函数中取消注释\
    \ `Wire.begin(0,2);` 这一行，这是必要的，因为在 NodeMCU 上使用的默认 I2C 引脚没有路由到 ESP-01 的暴露引脚。相反，我们使用引脚\
    \ GP0 和 GP2 分别用于 I2C 线 SDA 和 SCL。最后，我们编译并将草图下载到我们的 ESP-01。\n\n现在，我们将编程好的 ESP-01\
    \ 从 USB 转串行转换器上断开，并按照图 9.4 的接线将其连接到 BME680。地线和 3.3 V 电源轨连接到两个设备上的 VCC 和 GND 引脚。请注意，标记为\
    \ RST 和 CH_PD 的引脚也连接到 VCC。I2C 线将 ESP-01 上的 GP0 连接到 BME680 上的 SCK。同样，GP2 连接到 SDI。请注意，我们必须为\
    \ I2C 线提供外部上拉电阻；我们使用 10 kΩ 电阻，但它们的值并不关键。为了保险起见，我们还应该在 GND 和 VCC 之间提供 100 nF 旁路电容（未显示）。一旦我们连接电源电压，该电路的行为将与图\
    \ 9.1 所示的电路相同，尽管占用空间更小。\n\n## 问题与项目构想\n\n1.  在海平面、雨天、强风暴、飓风中或在拉巴斯，平均气压是多少？\n2.\
    \  在你居住的地方、在热带雨林、在死亡谷或在智利的拉西拉天文台，典型的湿度是多少？\n3.  添加一个单独的温度传感器，例如 LM35 或 DS18b20，以交叉检查\
    \ BME680 报告的值。\n4.  添加一个单独的湿度传感器，例如 HYT221 或 DHT11，以交叉检查 BME680 报告的值。\n5.  添加一个粉尘传感器，将气象站转变为环境记录站。"
