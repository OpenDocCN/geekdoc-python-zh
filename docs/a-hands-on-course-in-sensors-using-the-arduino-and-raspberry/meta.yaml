    \ on the NodeMCU by sending quit.\n\nTo illustrate the usefulness of the octave\
    \ interface to serial line or networked devices, we write a simple temperature\
    \ logger that connects to the NodeMCU and produces a nice plot of the temperature\
    \ as a function of time. The following octave program achieves that.\n\n```\n\
    % temperature logger, V. Ziemann, 220930\nclear all\ns=tcpclient(\"192.168.20.184\"\
    ,1137);\npause(0.01)\nrunning=0;\nwhile running<1000\n  running=running+1;\n \
    \ reply=queryResponse(s,\"T?\\n\");\n  val(running)=str2double(reply(2:end));\n\
    \  x(running)=now;\n  plot(x,val,'*')\n  ylim([22,28])\n  datetick('x','ddd/HH:MM:SS')\n\
    \  ylabel('Temperature [C]')\n  xlabel('Time')\n  pause(1);\nend\nwrite(s,\"quit\\\
    n\");\nclear s\n```\n\nFirst, we clear all variables before we establish the TCP\
    \ connection to the server on the NodeMCU, on port 1137 and IP number 192.168.20.135.\
    \ Then we wait a short while and initialize a variable running to zero. We use\
    \ this variable as an iterator in the loop and check whether the limit has been\
    \ reached. In this simple example, we only iterate 10 times. In the loop, we increment\
    \ the running variable and then send the query to the NodeMCU and receive the\
    \ measurement in the string reply. Note that reply starts with a T, which we remove\
    \ in the following line by converting reply from position 2 to the end to a double\
    \ variable. The result we copy to the variable val at index position running.\
    \ In this way we use the iterator not only to count the loop iterations, but also\
    \ as an index of where to put the measurement values. In the variable x we copy\
    \ the current time, which is returned by the built-in function now(). Then we\
    \ plot the value versus the time using the plot() function, specify the vertical\
    \ temperature range with the ylim() function, and specify the axis labels."
  mdcn: "在宽度变量中，然后我们开始构建字符串 p，首先放置自 t0 以来经过的秒数和测量值，接着是一个竖线符号，表示 ASCII 图形的开始。然后我们遍历字符串\
    \ p 中所有后续位置，在对应于缩放后测量值 k 的位置放置一个 *，否则放置一个空格。最后，我们添加另一个竖线 | 并将字符串 p 打印到标准输出，然后等待一秒以开始下一次迭代。运行这个\
    \ Python 脚本会产生如图 5.7 所示的简单 ASCII 图形。\n\n前面的脚本适用于任何串行线路，包括隐藏在蓝牙链路后面的串口。我们需要在前面的脚本中做的唯一更改是将串口\
    \ /dev/ttyACM0 替换为通常称为 /dev/rfcomm0 或 /dev/rfcomm1 的蓝牙端口。\n\n但是如何连接到运行套接字服务器并监听端口\
    \ 1137 的 NodeMCU 呢？我们只展示了最基本的网络客户端，它发送查询并在标准输出上显示回复。一旦掌握了基本的网络通信设置，就可以相当容易地构建更复杂的示例，例如上面的简单\
    \ ASCII 图形。我们在以下示例中说明这些基础知识：\n\n```\n# socket_client.py, V. Ziemann, 220930\n\
    import socket, atexit, time\ndef cleanup():\n    sock.send(b\"quit\\n\")\n   \
    \ sock.close()\natexit.register(cleanup)\nsock=socket.socket(socket.AF_INET,socket.SOCK_STREAM)\n\
    sock.connect((\"192.168.20.184\",1137))\nsock.send(b\"T?\\n\")\ntime.sleep(0.1)\n\
    reply=sock.recv(1000).decode('utf-8');\nprint(reply.strip())\n```\n\n程序的结构与串行通信的程序非常相似。首先，导入必要的功能，然后我们定义一个\
    \ cleanup() 函数，该函数在程序关闭前执行。这是确保服务器正确关闭连接的最安全方式。在 cleanup() 函数内部，我们指示 Python 脚本发送字符串\
    \ quit，该字符串对 NodeMCU 未知，会导致其关闭连接，然后在客户端关闭套接字。请注意，我们使用了通过在字符串前加上字母 b 来编码文字字符串的简写表示法。然后，在调用\
    \ atexit.register() 时注册 cleanup() 函数。在下一行，使用普通 TCP/IP 套接字的规范创建套接字 sock，然后连接到运行在\
    \ IP 地址 192.168.20.184 和端口 1137 上的 NodeMCU 服务器。然后我们发送查询字符串 T? 并等待一小会儿，然后在去除空白字符后将收到的回复打印到标准输出。\n\
    \n在本节中，我们介绍了如何使用 Python 与传感器节点接口，甚至将它们呈现为简单的 ASCII 图形。这对于快速观察某些值随时间变化的临时解决方案可能已经足够，但对于更专业的结果，我们转向\
    \ Octave 来与传感器节点接口，并为演示和报告准备更漂亮的图表。\n\n## 5.5.4 Octave\n\n我们已经在第 5.3 节安装了 Octave，但为了使用串行通信和网络套接字，我们需要安装\
    \ octave-instrument-control 包：\n\n```\nsudo apt-get update\nsudo apt-get install\
    \ octave-instrument-control\n```\n\n安装完成后，我们将以下行添加到名为 .octaverc 的 Octave 启动文件中，该文件在大多数情况下位于树莓派的\
    \ /home/pi/ 目录中。这将导致每次启动 Octave 时都加载该工具箱。在编辑该文件时，我们还将以下行添加到 .octaverc 文件中：\n\n\
    ```\ngraphics_toolkit('gnuplot')\n```\n\n以避免使用 Octave plot 命令时出现错误。但这可能并非在所有情况下都需要。\n\
    \n安装完成后，我们就可以使用它与传感器节点通信了。首先，我们尝试与连接到树莓派 USB 端口的 UNO 通信，该端口可作为 /dev/ttyACM0 访问。为了从\
    \ UNO 读取一个测量值，我们从 Octave 提示符打开串行线路，提交查询，等待响应，并显示结果。以下程序实现了这一点。\n\n```\n% read_serial.m\n\
    s=serialport(\"/dev/ttyUSB0\",9600);  % open serial line\npause(3)           \
    \                 % wait for this to complete\nreply=queryResponse(s,\"A0?\\n\"\
    )     % send query and receive reply\nclear s                            % close\
    \ serial port\n```\n\n它实现了我们之前使用的简单查询-响应通信协议。在这里，我们将查询-响应交互的细节封装在函数 queryResponse()\
    \ 中，因为安装的 instrument-control 工具箱版本（0.6）不支持从串行设备读取直到终止字符。因此，我们自己实现了该功能。\n\n```\n\
    % send query string and return response up to termination character.\nfunction\
    \ out=queryResponse(dev,query,term_char)\nif (nargin==2) term_char=10; end  %\
    \ defaults to LF=0x0A\nwrite(dev,query);                 % send query to device\n\
    i=1;\nint_array=uint8(1);\nwhile true                        % loop forever\n\
    \  val=read(dev,1);               % and read one byte\n  if (val==term_char) break;\
    \ end % until term_char appears\n  int_array(i)=val;              % stuff byte\
    \ in output\n  i=i+1;\nend\nout=char(int_array);              % convert to characters\n\
    ```\n\n三个参数是串行设备 dev、查询字符串和可选的终止字符，默认为换行符（十六进制=0x0A，十进制=10）。在函数中，我们首先在 write()\
    \ 函数调用中发送查询字符串，在初始化一些变量后，我们使用 read() 函数重复读取一个字符，并将字符附加到 int_array 中，除非它等于终止字符。一旦接收到终止字符，while\
    \ true 循环退出，int_array 在最后一行转换为字符。转换后的数组返回给调用程序。不用说，我们也可以使用任何具有串行线路接口的蓝牙设备，只是设备文件是\
    \ /dev/rfcomm0 而不是普通的串行设备文件 /dev/ttyACM0 或 /dev/ttyUSB0。\n\n通过 WLAN 连接到 NodeMCU\
    \ 上的套接字进行读取的方式与从串行线路读取的方式非常相似。我们不是打开串行线路，而是使用 tcpclient() 函数打开 TCP 连接。实现这一点的基本代码片段如下所示：\n\
    \n```\n% read_tcp.m\ns=tcpclient(\"192.168.20.184\",1137);   % open connection\n\
    pause(0.1)                              % wait, not really needed\nreply=queryResponse(s,\"\
    A0?\\n\")         % send query and get reply\nwrite(s,\"quit\\n\");          \
    \           % close remote socket\nclear s                                 % close\
    \ local socket\n```\n\n它遵循上面串行通信示例的逻辑。函数 queryResponse() 与前面串行线路的示例相同。另请注意，我们需要通过发送\
    \ quit 来显式关闭 NodeMCU 上的远程套接字。\n\n为了说明 Octave 接口对串行线路或网络设备的实用性，我们编写了一个简单的温度记录器，它连接到\
    \ NodeMCU 并生成温度随时间变化的漂亮图表。以下 Octave 程序实现了这一点。\n\n```\n% temperature logger, V.\
    \ Ziemann, 220930\nclear all\ns=tcpclient(\"192.168.20.184\",1137);\npause(0.01)\n\
    running=0;\nwhile running<1000\n  running=running+1;\n  reply=queryResponse(s,\"\
    T?\\n\");\n  val(running)=str2double(reply(2:end));\n  x(running)=now;\n  plot(x,val,'*')\n\
    \  ylim([22,28])\n  datetick('x','ddd/HH:MM:SS')\n  ylabel('Temperature [C]')\n\
    \  xlabel('Time')\n  pause(1);\nend\nwrite(s,\"quit\\n\");\nclear s\n```\n\n首先，我们在建立与\
    \ NodeMCU 上服务器的 TCP 连接之前清除所有变量，服务器位于端口 1137 和 IP 地址 192.168.20.135。然后我们等待一小会儿，并将变量\
    \ running 初始化为零。我们使用此变量作为循环中的迭代器，并检查是否已达到限制。在这个简单的例子中，我们只迭代 10 次。在循环中，我们递增 running\
    \ 变量，然后向 NodeMCU 发送查询并在字符串 reply 中接收测量值。请注意 reply 以 T 开头，我们在下一行通过将 reply 从位置 2\
    \ 到末尾转换为 double 变量来移除它。我们将结果复制到索引位置为 running 的变量 val 中。通过这种方式，我们不仅使用迭代器来计算循环迭代次数，还将其用作放置测量值的索引。在变量\
    \ x 中，我们复制当前时间，该时间由内置函数 now() 返回。然后我们使用 plot() 函数绘制值与时间的关系图，使用 ylim() 函数指定垂直温度范围，并指定轴标签。"
