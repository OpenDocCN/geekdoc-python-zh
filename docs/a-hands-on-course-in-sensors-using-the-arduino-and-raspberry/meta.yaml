  md: "Now we are ready to specify how we want the websocket to react to requests\
    \ coming from the other end of the communication channel – the browser. Any activity\
    \ on the websocket, which is handled in the background, triggers the execution\
    \ of the function `webSocketEvent()`. As input this function receives the handle\
    \ `num`, which identifies the websocket, the `type` of the interaction, its `payload`,\
    \ and its size. Depending on the `type` we use a `switch-case` construction to\
    \ define the appropriate action. If the browser disconnects or connects, a short\
    \ message is printed to the serial line. Any JSON-formatted string from the browser\
    \ has type `WStype_TEXT` and the `payload` contains the command coming from the\
    \ browser. Using the function `deserializeJson()`, provided by the `ArduinoJSON`\
    \ library, we parse the `payload` and place the name-value pairs into the variable\
    \ `root` which is of type `DynamicJsonDocument`. Now we can access the value of\
    \ `cmd`, which specifies the command, as `root[\"cmd\"]` and access the value\
    \ of `val` as `root[\"val\"]`. For example, the string `{\"cmd\":\"START\",\"\
    val\":1}` contains the command `START` and the value 1. In the subsequent part\
    \ of the function, the reactions to the commands are coded. If a `START` command\
    \ is received, the value is interpreted as the `sample_period` and used to register\
    \ the `sampleslow_action` that is executed with the specified periodicity. Furthermore,\
    \ the `info_string` is filled with a text that we send back to the browser. A\
