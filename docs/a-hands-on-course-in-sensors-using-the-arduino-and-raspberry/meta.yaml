    we need to keep it alive by following a well-conceived *story line* that places
    the relevant topics – the subject matter of the seminar – in a logically coherent
    sequence where one detail follows the previous in a natural way. My suggestion
    is to start with easily understandable facts and then progressively increase the
    complexity of the discussed material. We must avoid situations where the audience
    starts wondering *why* we talk about a particular topic and loses track of our
    story line. Since the story line addresses the overall organization of the presentation
    it needs to be sorted out beforehand.


    A method to organize a presentation that I found useful is the following: I start
    by estimating the number of slides that fit into the allotted time. An average
    slide typically requires 2–3 minutes for the audience to absorb. Thus, for a 20-minute
    presentation I target about 8–10 slides as a rule of thumb. Then I prepare a title
    page with a catchy title that encapsulates the essential point of the seminar,
    followed by one slide that motivates the problem I intend to address. This I follow
    up with a brief and qualitative description of the idea of how to solve it that
    I will elaborate in the remainder of the seminar. At this point the audience should
    have a good idea about the scope of my seminar and should'
  - '[PAGE 294]


    be convinced that the idea I pursue has a decent chance of addressing the problem
    in a meaningful way. On the subsequent slides it is useful to concentrate on the
    *flow* of some quantity or some information from one stage to the next. In the
    example with the weather station, the information flows from the sensor via the
    microcontroller to the host computer where it is presented, either on a web page
    or accessible via control system. This flow of information we can mimic in the
    organization of the slides.


    For the bulk of the presentation, I recommend preparing the allotted number of
    empty slides and giving each slide a title. The title should address one key issue
    per slide and the sequence of slides should follow the logical flow we have identified
    beforehand. In the weather-station example we have the issues: hardware with sensors,
    microcontroller, host computer, then software running on the respective computing
    devices and protocols used to interface the devices. Once we have the slides with
    their titles, we can shuffle them around until we are satisfied with our story
    line.


    In the next step I place one or several pictures or graphs on each slide to illustrate
    the topic on the slide. Once all, or at least most, slides are equipped with a
    picture, I add a few bullet-points with keywords to each slide. They remind me
    of what I intend to say when presenting. They help me to understand my slides
    after 6 months, and those in the audience to remember what I said after 2 months.
    The slides are not a substitute for a self-contained report, but serve as illustrations
    for my presentation during a seminar.


    Once all slides contain a picture and a few keywords, it is time to review the
    story line again and see whether linking of the slides works. This addresses the
    flow from one slide to the next and whether it comes in a natural and well-motivated
    way. If many forward references are necessary, I consider reordering the slides
    to achieve a more natural flow where information required at some stage is already
    discussed on a previous slide. Sometimes forward references are difficult to avoid,
    but I try to minimize them.


    When almost all slides are completed, I suggest preparing a final slide with a
    clear synopsis of the main results and possibly some comments about how to extend
    the work. After a final pass through the slides, with a check for coherence to
    ensure that the title and final slides act as parentheses to enclose the subject
    matter, the presentation is ready.


    Just for convenience I summarize the above guidelines in a presentation cookbook:


    +   - Motivation: the problem and intended way to address it.

    - Think of a story line and the logical flow of a concept, preferably with increasing
    complexity.

    - Write a title on each slide and sort to follow the story line.

    - Add pictures to slides.

    - Add keywords to slides.

    - Add slide with conclusions and outlook.

    - Final check of coherence and linking. Done!


    Naturally, my presentation cookbook is subjective, and should not keep you from
    using a working way of preparing slides, but if you get stuck very early on in
    the process of preparing a seminar, my guidelines may help you to get started.


    Presenting one''s work in a seminar is the first step, and writing it up in a
    report or a thesis is the next.'
- md: '## 18.2 PREPARING A REPORT


    When preparing a report or a thesis in general, I follow the same guidelines used
    for the preparation of a presentation. I need to *motivate* what I am about to
    describe and then adhere to a *story line* that follows the *flow* of a concept.
    As a first step I normally try to formulate a catchy title and an abstract of
    100 to 200 words to explain to myself what I intend to write in the report. Often
    this is a reasonable starting point even for the final version of the abstract.


    For the main part of the report, instead of starting with empty slides and filling
    the title line, I start by identifying a logical sequence of chapters, sections,
    or subsections, and give each one a title before ordering them in a sequence that
    follows the flow of the argument. In the next step I add pictures or other illustrative
    material to the respective sections. This normally results in a valid skeleton
    for the report that I need to flesh out in the next step. I start this process
    by adding bullet lists to the sections with topics that are relevant in the respective
    section. I do this for all originally identified chapters or sections, and often
    in this stage I note that I need to split sections into two or more or that I
    can combine sections with similar contents into a single one. As a guideline I
    assume that each topic in the bullet list will require one paragraph with about
    200 words or so to discuss adequately. I also try to roughly balance the length
    of sections, but this is of minor concern. Once I know what contents should show
    up in the respective sections, I start writing the text and “fill in the blanks.”
    Since key components – images, graphs, or tables – are already in place, I start
    each section with a short description of how it fits into the flow and then describe
    the material. I also try to write each section from start to end, because that
    helps to maintain a logical flow. At other times, if I do not come up with a decent
    start, I just start at a place where I have a good idea about how to present it
    and retrofit the missing parts later. In that case, however, I need to pay special
    attention later to ensure the flow.


    A particularly important section is the *Introduction*, where I need to convince
    the reader that the report treats a relevant and interesting subject by stating
    the chosen problem and how to solve it. But ideally the problem should also be
    put into the context of previous work. What have other researchers done before
    on related problems? How does their work differ from mine? This section, typically
    one or two paragraphs long, requires a number of key references from the published
    literature. At the end of the introduction, I sometimes give a brief outline of
    the report in the fashion of a commented table of contents. By this time I have
    hopefully convinced the reader to continue with the remainder of my report. And
    this is the prime task of the introduction: a brief statement of the problem,
    the context, and a brief outline of things to come.


    The *main part* of the report should follow the story line and the flow I initially
    decided upon. I write one or two paragraphs for each topic in the bullet list
    and make sure that the paragraphs are well connected in the sense that the reader
    knows how the following paragraph links to the present one. I try to avoid having
    the reader wonder what the lines he is presently reading have to do with the overall
    story line. Placing crosslinks with references to topics addressed earlier and
    how they connect to the present paragraph are helpful to make the text denser,
    and creates additional associations for the reader. Phrases such as, “where we
    use the result from page…” or “as discussed in Section…” illustrate the idea.


    In the *Conclusions*, I give a synoptic review of the main part and the results
    of the report. I try to organize the introduction and summary jointly as an executive
    summary. Often, readers first read those two sections before deciding to spend
    time on the report in its entirety. The most important part of the conclusions
    is a concise summary of the key results. I sometimes follow this up with a number
    of questions that came up during the research and that may lead to further work,
    either by me or some other researcher.


    I like to point out that the organizational triplet of introduction, main body,
    and conclusion vaguely resembles the form of a sonata, where first the themes
    are introduced. In the main body of the sonata the themes are elaborated and in
    the coda they often reappear in the original form once again. In this section
    we discussed the structure of the report and my recommendations are again subjective,
    but may help in case you are stuck.


    After the discussion of the overall organization of the report, we now look at
    some of the ingredients and start with the presentation of data, often using graphics
    and plots.


    ## 18.3 PRESENTING DATA


    Many aspects of scientific work are presented with the help of figures describing
    the experimental setup, or graphs showing the data, sometimes with comparison
    to a model. In [33] E. Tufte names three guiding principles to achieve graphical
    excellence.


    *Clarity* is the first principle, and it requires carefully explaining the experiment
    from which the data originate, describing what quantities are plotted on a graph,
    and properly labeling the axes. Moreover, using a legible font of adequate font-size
    and avoiding low-contrast colors such as yellow or light green on white background,
    is mandatory.


    *Precision*, the second principle, dictates presenting data honestly and truthfully.
    If data points are excluded, the reason and method to select the discarded points
    need to be explained. The graphics data of a manuscript must be proofread in the
    same way as the main text. Make sure to catch all errors, such as omitted exponents
    or lost or incorrect axis labels. Choose axes adequately. A bad example is to
    display the average temperature on Earth in Kelvin with zero displayed. Global
    warming is invisible on such a plot.


    *Efficiency*, the third principle, aims at presenting information in a parsimonious
    way: to present the largest possible insight with the least effort. In particular,
    display only data that advance the main argument, but then explain *all* displayed
    features in the plot, either in the caption or in the text. If the plot is part
    of a seminar, the speaker may explain it as well. On the other hand, any unnecessary
    data, which Tufte calls “chart-junk,” should be omitted from a graph. A bad example
    is to present all available measurement data, even though a well-chosen subset
    suffices to make a point.


    In *The Elements of Graphing Data*, W. Cleveland discusses a large number of guidelines
    to produce graphical data, with many examples. He summarizes the guidelines in
    a concise list of “rules” such as


    - to make the data the most prominent feature and avoid cluttering the data area;

    - to keep the number of tick marks limited and preferably outside the data area;

    - to have compatible scales when comparing two data sets;


    and many more. Consulting the book is highly recommended in case of questions
    about graphing data.


    Scientific journals have a strong interest that their authors produce high-quality
    articles, and those often include graphical data. They often expand the general
    terms of Tufte and Cleveland and provide comprehensive style guides, both for
    written and for graphical material. One good example is [34], which inspired the
    following points.


    - Ensure your audience understands four things about the data points: what *quantity*
    they represent, their physical *unit*, their *magnitude*, and the *uncertainty*.

    - Explain the error bars: Are they standard errors or confidence limits?

    - Always label axes with quantity plotted and with units. I normally display units
    in square brackets. In journals, the use of title text is discouraged in favor
    of text in the caption.

    - If there are several plots in the same graph, preferably label them, use a legend,
    or explain them in the figure caption.

    - Choose the vertical scale such that at least 80% of the range is used.

    - If an axis covers more than 2 orders of magnitude, consider using logarithmic
    scale, if appropriate.

    - Avoid “eye-candy” such as 3-D bar-graphs or pie-charts.

    - When only a few data points need to be presented, say 10 or less, a table is
    often preferable to a plot.


    These basic guidelines should provide a starting point to produce presentable
    plots.


    The last point in the above list refers to data presented in *numerical form*
    in tables or in the main text. Under no circumstances should you state more than
    a sensible number of significant figures! If a measurement generates data that
    is accurate to 1%, two or maybe three significant figures are adequate. Just because
    a computer displays results in double precision with 10 or more figures, this
    does not mean all figures are significant. And finally, error bars in numeric
    form should never be displayed with more than one or sometimes two significant
    figures.


    And this brings us to writing the main text. Therefore, a few words about writing
    good English are in order.


    ## 18.4 GOOD ENGLISH


    There are a number of style guides for the English language available, from the
    classic *Elements of Style* [35], the MLA handbook [36], S. Pinker’s *Sense of
    Style* [37] to S. King’s *On Writing* [38]. Apart from these more general guides,
    several scientific journals such as *Nature* [39] or *Reviews of Modern Physics*
    [40] make style guides available for their authors. In particular, the latter
    style guide is very readable, and its Appendix A on “Writing a better scientific
    article,” is highly recommended. In this section I highlight some of the topics
    in more detail.


    - In one of the style guides [39] we find the sentence “Nature journals prefer
    authors to write in the active voice. . . .” The *active voice* usually makes
    the presentation clearer, more vigorous, and often more concise. Experiments are
    not done by themselves, but we, the experimenters, perform them. Moreover, often
    the subject matter is already difficult to understand, so we should make the presentation
    as clear as possible without obfuscating who does what. Science does not become
    more objective just because the person who did the experiment hides behind the
    passive voice.

    - Authors should strive for *economy* in their presentation and avoid unnecessarily
    complicated constructions such as “owing to the fact that,” which we can usually
    replace with “because.” Often replacing passive constructions with active ones
    helps to disentangle complex sentences.

    - Avoid overloading the reader with sentences containing a large number of subclauses
    to explain every conceivable exception in one sentence. At the end of the sentence,
    the reader may have forgotten the beginning and what the subject of the sentence
    is.'
  mdcn: '## 18.2 准备报告


    在准备报告或论文时，我通常遵循与准备演示文稿相同的指导原则。我需要*激发*读者对我即将描述内容的兴趣，并遵循一个符合概念*逻辑流*的*叙事线*。第一步，我通常会尝试拟定一个吸引人的标题和一段100到200字的摘要，以向自己阐明报告的写作意图。这通常也是最终版摘要的一个合理起点。


    对于报告的主体部分，我不会从空白幻灯片开始填充标题，而是首先确定章节、节或小节的逻辑顺序，并为每个部分拟定标题，然后按照论证的逻辑流进行排序。接下来，我会为相应的章节添加图片或其他说明性材料。这通常会形成一个有效的报告框架，我需要在下一步为其充实内容。我首先为各章节添加与主题相关的要点列表。我会对所有最初确定的章节或节都这样做，并且在这个阶段，我常常会注意到需要将某些节拆分为两个或更多，或者可以将内容相似的节合并为一个。作为指导原则，我假设要点列表中的每个主题都需要大约200字左右的一个段落来充分讨论。我也会尝试大致平衡各节的长度，但这并非首要考虑。一旦我明确了各节应包含的内容，我就开始撰写正文并“填补空白”。由于关键组件——图片、图表或表格——已经就位，我会以一段简短的描述开始每一节，说明其如何融入整体逻辑流，然后描述相关材料。我也尝试从头到尾撰写每一节，因为这有助于保持逻辑的连贯性。有时，如果我没有想到一个好的开头，我会从一个我知道如何呈现的地方开始写，之后再补充缺失的部分。不过，在这种情况下，我需要特别注意确保整体的逻辑流畅。


    一个特别重要的部分是*引言*，我需要通过阐述所选问题及其解决方法，来说服读者报告所探讨的是一个相关且有趣的主题。但理想情况下，这个问题也应置于前人工作的背景中。其他研究人员之前在相关问题上做了什么？他们的工作与我的有何不同？这一节通常有一到两段长，需要引用已发表文献中的若干关键参考文献。在引言的末尾，我有时会以带注释的目录形式，简要概述报告的结构。到此时，我希望已经说服读者继续阅读报告的其余部分。这就是引言的主要任务：简要陈述问题、背景，并概述后续内容。


    报告的*主体部分*应遵循我最初决定的叙事线和逻辑流。我为要点列表中的每个主题撰写一到两个段落，并确保段落之间衔接良好，让读者清楚下一段如何与当前段落关联。我尽量避免让读者疑惑当前阅读的内容与整体叙事线有何关联。通过交叉引用提及之前讨论过的主题及其与当前段落的联系，有助于使文本更紧凑，并为读者创造额外的联想。诸如“此处我们使用了第…页的结果”或“如第…节所讨论”之类的短语可以说明这一想法。


    在*结论*部分，我对报告的主体和结果进行综合评述。我尝试将引言和总结组织成一份执行摘要。通常，读者会先阅读这两个部分，然后再决定是否花时间通读整个报告。结论最重要的部分是对关键结果的简明总结。我有时会接着提出研究过程中产生的一些问题，这些问题可能引导我或其他研究人员进行进一步的工作。


    我想指出的是，引言、主体和结论这种三段式的组织结构，隐约类似于奏鸣曲的形式：首先引入主题，在奏鸣曲的主体部分对主题进行阐述，在尾声中主题常常会以原始形式再次出现。在本节中，我们讨论了报告的结构，我的建议再次带有主观性，但可能在你遇到困难时有所帮助。


    在讨论了报告的整体组织结构后，我们现在来看一些具体的组成部分，首先从数据的呈现开始，这通常涉及使用图形和图表。


    ## 18.3 呈现数据


    科学工作的许多方面都借助图表来呈现，这些图表描述实验装置，或展示数据，有时还会与模型进行比较。在文献[33]中，E. Tufte提出了实现卓越图形的三条指导原则。


    *清晰性*是第一条原则，它要求仔细解释数据来源的实验，描述图表中绘制的物理量，并正确标注坐标轴。此外，使用清晰可辨、字号合适的字体，避免在白色背景上使用黄色或浅绿色等低对比度颜色，是必须遵守的。


    *精确性*是第二条原则，要求诚实、真实地呈现数据。如果排除了某些数据点，需要解释排除的原因和方法。稿件中的图形数据必须像正文一样仔细校对。确保捕捉所有错误，例如遗漏的指数或丢失/错误的坐标轴标签。合理选择坐标轴。一个不好的例子是用开尔文显示地球平均温度，并且显示零点。在这种图上，全球变暖是不可见的。


    *高效性*是第三条原则，旨在以简洁的方式呈现信息：用最少的努力提供尽可能多的洞察。具体来说，只显示那些有助于推进主要论点的数据，但随后要在图注或正文中解释图中显示的*所有*特征。如果图表是研讨会的一部分，演讲者也可以进行解释。另一方面，任何不必要的数据（Tufte称之为“图表垃圾”）都应从图表中剔除。一个不好的例子是展示所有可用的测量数据，即使精心选择的一个子集就足以说明问题。


    在《图形数据的要素》一书中，W. Cleveland讨论了大量制作图形数据的指导原则，并附有许多示例。他将这些指导原则总结为一份简洁的“规则”清单，例如：


    - 让数据成为最突出的特征，避免数据区域杂乱无章；

    - 保持刻度线数量有限，最好置于数据区域之外；

    - 比较两个数据集时使用兼容的刻度；


    以及更多。如果对图形数据有疑问，强烈建议查阅此书。


    科学期刊非常希望其作者能产出高质量的文章，而这些文章通常包含图形数据。它们常常扩展Tufte和Cleveland的一般性原则，并为文字和图形材料提供全面的风格指南。一个很好的例子是文献[34]，它启发了以下几点。


    - 确保你的读者理解关于数据点的四件事：它们代表什么*物理量*、其物理*单位*、*量值*以及*不确定度*。

    - 解释误差棒：它们是标准误差还是置信限？

    - 始终用绘制的物理量和单位标注坐标轴。我通常将单位放在方括号中。在期刊中，不鼓励使用标题文本，而推荐使用图注文本。

    - 如果同一图表中有多个子图，最好给它们标号、使用图例，或在图注中进行解释。

    - 选择垂直刻度时，确保至少使用其80%的范围。

    - 如果一个坐标轴覆盖超过两个数量级，考虑在适当的情况下使用对数刻度。

    - 避免使用“视觉糖果”，如3D柱状图或饼图。

    - 当只需要呈现少量数据点（例如10个或更少）时，表格通常比图表更可取。


    这些基本指导原则应为制作可呈现的图表提供一个起点。


    上述列表中的最后一点指的是以*数值形式*呈现在表格或正文中的数据。在任何情况下，都不应给出超出合理数量的有效数字！如果一次测量产生的数据精确到1%，那么两位或三位有效数字就足够了。仅仅因为计算机以双精度显示10位或更多位数字，并不意味着所有数字都是有效的。最后，数值形式的误差棒永远不应显示超过一位或有时两位有效数字。


    这就引出了正文的写作。因此，有必要谈几句关于如何写好英语的问题。


    ## 18.4 优美的英语


    市面上有许多英语风格指南，从经典的《风格的要素》[35]、MLA手册[36]、S. Pinker的《风格的感觉》[37]到S. King的《写作这回事》[38]。除了这些更通用的指南外，一些科学期刊如《自然》[39]或《现代物理评论》[40]也为作者提供了风格指南。特别是，后者的风格指南非常易读，其附录A“撰写更好的科学文章”强烈推荐。在本节中，我将更详细地强调其中一些主题。


    - 在其中一份风格指南[39]中，我们发现这样一句话：“《自然》期刊更倾向于作者使用主动语态……”*主动语态*通常使表述更清晰、更有力，也常常更简洁。实验不会自己完成，而是我们，实验者，来执行它们。此外，主题内容本身往往就难以理解，因此我们应使表述尽可能清晰，而不应模糊谁做了什么。科学并不会因为实验者躲在被动语态后面而变得更加客观。

    - 作者应力求表述的*简洁*，避免使用不必要的复杂结构，例如“owing to the fact that”（由于……的事实），我们通常可以用“because”（因为）来替换。通常，用主动结构替换被动结构有助于理清复杂的句子。

    - 避免用包含大量从句的句子来解释每一个可以想象到的例外情况，从而给读者造成负担。到句子结尾时，读者可能已经忘记了开头以及句子的主语是什么。'
