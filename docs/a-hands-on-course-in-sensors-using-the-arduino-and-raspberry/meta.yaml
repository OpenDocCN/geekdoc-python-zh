  md: 'step size in a redefinition of $a$, and the matrix $A$ obtains the form


    $$A = \begin{pmatrix} 1 & 1 \ 2 & 1 \ 3 & 1 \ \vdots & \vdots \end{pmatrix}$$
    (B.6)


    such that $A^T A$ becomes


    $$A^T A = \begin{pmatrix} \sum_{k=1}^n k^2 & \sum_{k=1}^n k \ \sum_{k=1}^n k &
    \sum_{k=1}^n 1 \end{pmatrix} = \begin{pmatrix} n(n+1)(2n+1)/6 & n(n+1)/2 \ n(n+1)/2
    & n \end{pmatrix}$$ (B.7)


    which accounts for the definition of S0, S1, S2 in the linfit routine. Inverting
    this $2 \times 2$ matrix is trivial, and calculating $A^T y$ is done in the loop
    where ay0 and ay1 are calculated. The linfit function then returns the parameter
    $a$, the slope, and in the main program we need to rescale the result by multiplying
    the slope with the step size. It is easy to cross-check the results with octave,
    and the fitting is done with the polyfit() function, but if we want to do the
    calculation on the Arduino, we need methods like the one shown in this appendix.


    Note also that generalizing the method to higher-order polynomials is simple.
    We only need to add columns in Equation B.1 with $t_i^n$ and can rescale the fit
    parameters $a, b, \dots$ by the appropriate power of the step size, and we are
    left with adding powers of positive integers for which closed expressions exist.
    This means that the matrix $A^T A$ can always be calculated in closed form for
    any number of data points $n$. Only the inversion of a matrix with rank of the
    number of fit parameters remains. Being able to precompute most of the matrices
    and possibly inverting them on the host computer for fixed $n$ makes this method
    rather suitable for microcontrollers.


    # QUESTIONS AND PROJECT IDEAS


    +   1. Fit a parabola given by $y = at^2 + bt + c$ to equally-spaced data points
    $(i\Delta t, y_i)$.'
