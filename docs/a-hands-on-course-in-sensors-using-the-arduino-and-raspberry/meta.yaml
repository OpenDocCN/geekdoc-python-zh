    \ Edition\n\n```\n# ./tempApp/Db/mqtt.db\nrecord(ao, \"node1/fan\") {\n    field(DESC,\
    \ \"Fan on node1\")\n    field(DTYP, \"stream\")\n    field(OUT, \"@mqtt.proto\
    \ set_fan $(PORT)\")\n}\nrecord(stringout, \"SUBSCRIBE\") {\n    field(DESC, \"\
    subscribe to topic\")\n    field(DTYP, \"stream\")\n    field(OUT, \"@mqtt.proto\
    \ subscribe $(PORT)\")\n}\nrecord(stringout, \"UNSUBSCRIBE\") {\n    field(DESC,\
    \ \"unsubscribe from topic\")\n    field(DTYP, \"stream\")\n    field(OUT, \"\
    @mqtt.proto unsubscribe $(PORT)\")\n}\nrecord(ai, \"node1/temp\") {\n    field(DESC,\
    \ \"Temperature on node1\")\n    field(DTYP, \"stream\")\n    field(INP, \"@mqtt.proto\
    \ get_temp $(PORT)\")\n    field(SCAN,\"I/O Intr\")\n}\n```\n\nlinks the functions\
    \ defined in the protocol file to process variables where the MQTT variables have\
    \ the same name in EPICS, and we add two process variables handling subscription.\
    \ Since they register a name of a variable, their EPICS record type is `stringout`.\
    \ All variables that we receive from MQTT via the gateway arrive asynchronously,\
    \ at the rate they are published, and we therefore need to use the line `field(SCAN,\"\
    I/O Intr\")` in the database file, which handles data that arrive without explicitly\
    \ being requested. Note that we only need to subscribe to values we want to read\
    \ with `caget`. MQTT variables we want to set, such as turning on the fan, need\
    \ no subscription.\n\nAfter having defined the protocol and database file, we\
    \ need to edit `./temp/tempApp/Db/Makefile` and add the line `DB += mqtt.db`.\
    \ Finally, we add the following definition for the PORT in `st.cmd` in `./iocBoot/ioctemp/`.\n\
    \n```\ndrvAsynIPPortConfigure(\"SOCKET\",\"192.168.20.1:51883\",0,0,0)\ndbLoadRecords(\"\
    db/mqtt.db\",\"PORT='SOCKET',USER='mqtt'\")\n```\n\nThe IP address points to the\
    \ IP on which both broker and gateway run, and the port on which the gateway listens.\
    \ Once this is operational, we have access to MQTT topics from EPICS.\n\nWhereas\
    \ EPICS and MQTT provide frameworks to connect multiple sensors and actuators\
    \ as well as presentation and controlling computers, enable *websockets* point-to-point\
    \ communication between two partners with one of them running inside a web browser.\n\
    \n## QUESTIONS AND PROJECT IDEAS\n\n- 1. What is the purpose of the broker?\n\
    - 2. Find out about public brokers on the Internet.\n- 3. Connect the humidity\
    \ and barometric pressure sensor to a NodeMCU and have the data published via\
    \ MQTT.\n- 4. Control the brightness of a LED connected to a NodeMCU via MQTT.\n\
    - 5. Connect a DC motor with H bridge to a NodeMCU and control it via MQTT.\n\
    - 6. Connect a stepper motor with H bridge to a NodeMCU and control it via MQTT.\n\
    - 7. Connect a model-servo to a NodeMCU and control it via MQTT.\n- 8. Prepare\
    \ a boot script for the gateway following the example in [Section 6.5](Section\
    \ 6.5).\n- 9. Write gateway between MQTT and a MySQL database such that the database\
    \ is automatically filled with newly arriving data samples.\n- 10. Write gateway\
    \ that fills an RRDtool database with data from MQTT.\n- 11. Write a gateway to\
    \ interface octave to MQTT such that a plot is continuously updated with new data.\n\
    - 12. Find an MQTT client for your smartphone and use it to read the temperature\
    \ from the NodeMCU.\n- 13. Discuss the similarities and differences between EPICS\
    \ and MQTT. Under what circumstances do you prefer one or the other?\n- 14. Write\
    \ an MQTT client for the NodeMCU that mimics the query-response behavior: It receives\
    \ a query, does something, and publishes a response.\n\n![](img/8f23875c54d5b3177d5d2a5bba06b37e_192_0.png)\n\
    \n# Taylor & Francis\n\nTaylor & Francis Group\n\nhttp://taylorandfrancis.com\n\
    \n# CHAPTER 8\n\n## Websockets\n\nOccasionally, it is desirable to control the\
    \ data acquisition hardware directly from an internet browser where the user interface\
    \ is realized as an interactive webpage using *JavaScript*. In this way, even\
    \ smartphones connected to the network can control the acquisition and display\
    \ data in real time. Unfortunately, due to security concerns can normal sockets,\
    \ such as those used the second example in [Section 4.6.3](#), not be accessed\
    \ from a browser. Instead, however, we can use a simpler interface called *websockets*,\
    \ which allows us to exchange simple text-based messages between microcontrollers\
    \ and browsers.\n\nThe text-based messages are formatted using the *JavaScript\
    \ object notation* (JSON) where all data are specified by name-value pairs, enclosed\
    \ in curly brackets. For example, we send a single temperature value from the\
    \ microcontroller formatted as `{\"TEMP\":\"27.2\"}`. We can even add several\
    \ pairs in the same message, such as `{\"X\":\"17\", \"Y\":\"4\"}`, or send arrays\
    \ via `{\"DATA\":[\"17\", \"4\"]}`, where the array values are enclosed in square\
    \ brackets. We access the first value via `DATA[0]`, which evaluates to 17.\n\n\
    In order to illustrate the communication, we will use the hardware from [Section\
    \ 4.6.3](#) with the LM35 temperature sensor connected to the analog input of\
    \ a NodeMCU microcontroller. We program the NodeMCU to listen to JSON messages\
    \ coming from a controlling browser that instructs it to start or stop measuring\
    \ the temperature at regular intervals, pack the results in a JSON message, and\
    \ send it back to the browser as soon as new data is available. Moreover, we start\
    \ a regular webserver on the NodeMCU that serves the controlling webpage, shown\
    \ in [Figure 8.1](#), that any browser, here chromium, can access. On the top,\
    \ buttons to start and stop the acquisition are displayed together with a menu\
    \ to select the update rate of the measurements. A third button clears the logging\
    \ display shown below the buttons. Continuously arriving data points are added\
    \ to it until the screen is filled when the trace starts moving to the left as\
    \ new samples arrive. Below the logging display status information is shown, normally\
    \ the value of the most recent data.\n\nNow, let's see how to bring this system\
    \ to live; first we look at the code on the NodeMCU.\n\n### 8.1 ON THE NODEMCU\n\
    \nThe NodeMCU has to handle several tasks simultaneously. It must serve the HTML\
    \ file of webpage from [Figure 8.1](#), it has to listen to requests coming from\
    \ the same page once it is running in the browser, and it must measure the temperature\
    \ at regular intervals. We therefore add functionality, provided by additional\
    \ libraries, for these tasks and open the *Library manager* in the *Tools* menu\
    \ of the Arduino IDE to install the **WebSockets** and the **ArduinoJSON** libraries.\
    \ Since the program is rather long, we'll discuss it in smaller chunks."
  mdcn: "来自EPICS的请求在函数`sock.accept()`中处理。该函数会阻塞直到请求到达，此时它返回一个指向新连接的句柄`epics`以及连接计算机的IP地址`address`。一旦连接建立，网关进入第二个循环，等待`epics`套接字上的命令，并使用`.decode()`方法将其转换为字符串`msg`。如果`msg`格式无效，则关闭连接。否则，接收到的消息`msg`被分割成单词，并根据第一个单词进行分支处理。如果转换为大写后是`SUBSCRIBE`，网关将调用`mqttc.subscribe()`函数，并以主题作为参数。如果是`UNSUBSCRIBE`，则调用`mqttc.unsubscribe()`函数。在所有其他情况下，这两个单词被解释为主题和值，并使用`mqttc.publish()`函数发布。如果收到格式不正确的消息或调用的EPICS计算机断开连接，`epics`套接字将关闭并打印一条消息。此时，外层的`while\
    \ 1:`循环仍然活跃，网关将返回到`sock.accept()`函数并等待新的连接。\n\n我们通过执行以下命令来启动网关\n\n```\npython3\
    \ epics2mqtt.py\n```\n\n从命令行启动，并编写一个类似于[第6.5节](#)中EPICS的启动脚本，这留作练习。网关的基本功能可以使用`netcat`来模拟EPICS并发送字符串到网关进行轻松测试。如果[第7.1节](#)末尾的`mosquitto_sub`命令的终端窗口仍在运行，我们可以使用以下命令向其发送消息\n\
    \n```\necho \"dummy/value 57\" | netcat -C localhost 51883\n```\n\n该命令将`echo`后的字符串发送到本地计算机的套接字51883，这正是网关监听的位置，并代表我们在MQTT上发布此消息。\n\
    \n如果我们使用从命令行执行的命令`netcat -C localhost 51883`连接到网关，我们可以发出字符串`SUBSCRIBE node1/temp`来订阅主题`node1/temp`。在另一个终端窗口中执行以下命令\n\
    \n```\nmosquitto_pub -d -h localhost -i Pub1 -t node1/temp -m 23\n```\n\n将导致字符串`node1/temp\
    \ 23`出现在运行`netcat`的窗口中。在`netcat`中发出命令`UNSUBSCRIBE node1/temp`将停止订阅，消息将不再出现在`netcat`窗口中。\n\
    \n最后，我们准备实现以下行为的EPICS协议和数据库文件。执行`caput node1/fan 1`发布主题`node1/fan`，消息为1，而`caput\
    \ SUBSCRIBE node1/temp`订阅主题`node1/temp`，以便我们异步接收EPICS中的消息。前者打开风扇，后者报告NodeMCU上LM35测量的温度。实现此行为的协议文件存储在以下文件中，名为`mqtt.proto`：\n\
    \n```\n# ./tempApp/Db/mqtt.proto\nTerminator = CR LF;\nset_fan {out \"node1/fan\
    \ %i\";}\nsubscribe {out \"SUBSCRIBE %s\";}\nunsubscribe {out \"UNSUBSCRIBE %s\"\
    ;}\nget_temp {in \"node1/temp %f\";}\n```\n\n首先，我们定义与网关代码中使用的`\\r\\n`匹配的终止符，然后定义以与前一章相同的方式输入或输出值的函数。注意，函数中MQTT名称被硬编码为字符串，并且订阅和取消订阅的函数以字符串作为参数。相应的数据库文件名为`mqtt.db`，\n\
    \n172 ■ 使用Arduino和Raspberry Pi的传感器实践课程，第二版\n\n```\n# ./tempApp/Db/mqtt.db\nrecord(ao,\
    \ \"node1/fan\") {\n    field(DESC, \"Fan on node1\")\n    field(DTYP, \"stream\"\
    )\n    field(OUT, \"@mqtt.proto set_fan $(PORT)\")\n}\nrecord(stringout, \"SUBSCRIBE\"\
    ) {\n    field(DESC, \"subscribe to topic\")\n    field(DTYP, \"stream\")\n  \
    \  field(OUT, \"@mqtt.proto subscribe $(PORT)\")\n}\nrecord(stringout, \"UNSUBSCRIBE\"\
    ) {\n    field(DESC, \"unsubscribe from topic\")\n    field(DTYP, \"stream\")\n\
    \    field(OUT, \"@mqtt.proto unsubscribe $(PORT)\")\n}\nrecord(ai, \"node1/temp\"\
    ) {\n    field(DESC, \"Temperature on node1\")\n    field(DTYP, \"stream\")\n\
    \    field(INP, \"@mqtt.proto get_temp $(PORT)\")\n    field(SCAN,\"I/O Intr\"\
    )\n}\n```\n\n将协议文件中定义的函数链接到过程变量，其中MQTT变量在EPICS中具有相同的名称，我们添加了两个处理订阅的过程变量。由于它们注册变量名，其EPICS记录类型为`stringout`。我们通过网关从MQTT接收的所有变量都是异步到达的，速率取决于它们的发布速率，因此我们需要在数据库文件中使用`field(SCAN,\"\
    I/O Intr\")`行，该行处理未明确请求而到达的数据。注意，我们只需要订阅想要用`caget`读取的值。我们想要设置的MQTT变量，例如打开风扇，不需要订阅。\n\
    \n定义协议和数据库文件后，我们需要编辑`./temp/tempApp/Db/Makefile`并添加行`DB += mqtt.db`。最后，我们在`./iocBoot/ioctemp/`中的`st.cmd`中添加以下PORT定义。\n\
    \n```\ndrvAsynIPPortConfigure(\"SOCKET\",\"192.168.20.1:51883\",0,0,0)\ndbLoadRecords(\"\
    db/mqtt.db\",\"PORT='SOCKET',USER='mqtt'\")\n```\n\nIP地址指向代理和网关运行的IP，以及网关监听的端口。一旦此操作运行，我们就可以从EPICS访问MQTT主题。\n\
    \n虽然EPICS和MQTT提供了连接多个传感器和执行器以及展示和控制计算机的框架，但*websockets*允许两个合作伙伴之间进行点对点通信，其中一个在Web浏览器内运行。\n\
    \n## 问题与项目创意\n\n- 1. 代理的目的是什么？\n- 2. 查找互联网上的公共代理。\n- 3. 将湿度和气压传感器连接到NodeMCU，并通过MQTT发布数据。\n\
    - 4. 通过MQTT控制连接到NodeMCU的LED亮度。\n- 5. 将带有H桥的直流电机连接到NodeMCU，并通过MQTT控制它。\n- 6. 将带有H桥的步进电机连接到NodeMCU，并通过MQTT控制它。\n\
    - 7. 将模型伺服器连接到NodeMCU，并通过MQTT控制它。\n- 8. 按照[第6.5节](Section 6.5)中的示例为网关准备启动脚本。\n\
    - 9. 编写MQTT和MySQL数据库之间的网关，使数据库自动填充新到达的数据样本。\n- 10. 编写将MQTT数据填充到RRDtool数据库的网关。\n\
    - 11. 编写一个将octave与MQTT接口的网关，使绘图随新数据持续更新。\n- 12. 为您的智能手机找到一个MQTT客户端，并使用它从NodeMCU读取温度。\n\
    - 13. 讨论EPICS和MQTT之间的异同。在什么情况下您更倾向于使用其中一种？\n- 14. 为NodeMCU编写一个模拟查询-响应行为的MQTT客户端：它接收查询，执行某些操作，并发布响应。\n\
    \n![](img/8f23875c54d5b3177d5d2a5bba06b37e_192_0.png)\n\n# Taylor & Francis\n\n\
    Taylor & Francis Group\n\nhttp://taylorandfrancis.com\n\n# 第8章\n\n## Websockets\n\
    \n有时，希望直接从互联网浏览器控制数据采集硬件，其中用户界面使用*JavaScript*实现为交互式网页。这样，即使连接到网络的智能手机也可以控制采集并实时显示数据。不幸的是，由于安全考虑，普通套接字（如[第4.6.3节](#)中第二个示例使用的套接字）无法从浏览器访问。然而，我们可以使用一个更简单的接口，称为*websockets*，它允许我们在微控制器和浏览器之间交换简单的基于文本的消息。\n\
    \n基于文本的消息使用*JavaScript对象表示法*（JSON）格式化，其中所有数据通过名称-值对指定，用花括号括起来。例如，我们从微控制器发送一个格式为`{\"\
    TEMP\":\"27.2\"}`的单个温度值。我们甚至可以在同一消息中添加多个对，例如`{\"X\":\"17\", \"Y\":\"4\"}`，或通过`{\"\
    DATA\":[\"17\", \"4\"]}`发送数组，其中数组值用方括号括起来。我们通过`DATA[0]`访问第一个值，其计算结果为17。\n\n为了说明通信，我们将使用[第4.6.3节](#)中的硬件，其中LM35温度传感器连接到NodeMCU微控制器的模拟输入。我们将NodeMCU编程为监听来自控制浏览器的JSON消息，这些消息指示它开始或停止定期测量温度，将结果打包成JSON消息，并在新数据可用时立即将其发送回浏览器。此外，我们在NodeMCU上启动一个常规的Web服务器，该服务器提供控制网页，如[图8.1](#)所示，任何浏览器（此处为chromium）都可以访问。顶部显示了开始和停止采集的按钮，以及一个选择测量更新速率的菜单。第三个按钮清除按钮下方显示的日志显示。持续到达的数据点被添加到其中，直到屏幕填满，然后随着新样本的到达，轨迹开始向左移动。在日志显示下方显示状态信息，通常是最新数据的值。\n\
    \n现在，让我们看看如何使这个系统运行起来；首先我们查看NodeMCU上的代码。\n\n### 8.1 在NODEMCU上\n\nNodeMCU必须同时处理多个任务。它必须提供[图8.1](#)中网页的HTML文件，一旦在浏览器中运行，它必须监听来自同一页面的请求，并且必须定期测量温度。因此，我们为这些任务添加由额外库提供的功能，并在Arduino\
    \ IDE的*工具*菜单中打开*库管理器*以安装**WebSockets**和**ArduinoJSON**库。由于程序相当长，我们将分小块讨论它。"
