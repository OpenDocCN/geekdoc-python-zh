    # 3.2.3 Stepper motors


    Stepper motors change the angular position of a shaft in small discrete steps,
    such that counting the steps gives the position. In this way, no feedback or servomechanism
    is needed to achieve high repeatability, and the motor can be operated open loop.


    In Figure 3.10, we illustrate how this is accomplished in a permanent-magnet stepper
    motor. The static part of the motor consists of an iron yoke and four coils, of
    which two each are operated in series. Here the upper and lower coils, labeled
    A and B, and the right and left coils, labeled C and D, are two such pairs. On
    the rotor a moderately large number of permanent magnets are assembled. In the
    figure we only use six magnets, labeled 1 through 6, with the black end indicating
    the north pole. They are oriented radially and their polarity alternates.


    We assume that initially only coils A and B are excited in such a way that the
    upper coil behaves as a magnetic north pole and the lower as a south pole. In
    that case, the magnetic field lines pass through both upper and lower coils, pass
    through the magnets in the rotor, and return through the surrounding yoke. With
    this coil excitation the rotor is indeed oriented, as shown in Figure 3.10, because
    the upper coil behaves as a north pole and attracts the south pole of the upper
    permanent magnet, labeled 1. Consequently, they are as close as possible. The
    converse is true for the bottom coil and the magnet labeled 4. In order to turn
    the rotor by 30 degrees in the counterclockwise direction, we have to turn


    ![](img/8f23875c54d5b3177d5d2a5bba06b37e_67_1.png)'
