- md: "## CHAPTER 7\n\n## Messaging System: MQTT\n\nEPICS is not the only system to\
    \ integrate a large number of sensors and actuators in a common framework. Another\
    \ such system is the *message queue telemetry transport* (MQTT) [6] protocol that\
    \ was originally created by, among others, IBM, in order to collect information\
    \ from widely distributed infrastructures such as oil pipelines in a battery-saving\
    \ and energy-efficient as well as robust and secure way. Today it is commonly\
    \ used to pass messages between devices that constitute the Internet of Things\
    \ (IoT) and has become ISO-standard ISO/IEC 20922. MQTT uses a *broker* that passes\
    \ messages from clients publishing data to those that subscribe to the data. The\
    \ name of parameters – the data – that are passed around are referred to as “topic.”\
    \ They are organized hierarchically, such that the name\n\n```\nweatherstations/stationA/node1/temperature\n\
    ```\n\nrefers to the temperature sensor on a weather station, called station A\
    \ and connected to node 1. When subscribing to topics it is possible to use wildcards\
    \ such as the plus-sign “+”, which is a single-level wild-card, or the hash “#,”\
    \ which is a multi-level wild-card. Robustness and reliability of transmission\
    \ is guaranteed by specifying three levels of *quality of service* (QoS), where\
    \ the simplest level 0 implies that the sensor only publishes data without any\
    \ acknowledgment from the broker. Levels 1 and 2 implement increasingly advanced\
    \ levels of handshake signals that ensure the arrival of data. Even a *last will*\
    \ is available, which is transmitted to subscribing clients should a publishing\
    \ client disconnect. Normally the broker immediately transmits any received data\
    \ to the subscribing clients, but it is possible to specify that the broker retains\
    \ the last good data point and transmits it to subscribers in case the publisher\
    \ is offline, and to new subscribers upon their first connection. Since MQTT was\
    \ intended to operate across public networks, encryption and security are part\
    \ of the protocol.\n\nThe core functionality of MQTT resides on the broker, such\
    \ that clients can be very simple and connect and disconnect at will. This makes\
    \ it possible to use clients that only wake up from a battery-saving deep sleep\
    \ mode, perform a measurement, send it to the broker, and go back to sleep again.\
    \ This attractive feature makes MQTT very popular for IoT applications and we\
    \ therefore also discuss it as a complement to EPICS. In the following sections\
    \ we operate a broker on the Raspberry Pi and use NodeMCUs as clients that publish\
    \ and subscribe. In a final section we discuss a simple gateway that links MQTT\
    \ to EPICS in order to benefit from the best of both worlds. In this way we can\
    \ access lightweight clients connected over a public network across the gateway\
    \ from our EPICS control system.\n\nAfter this overview of MQTT, let us follow\
    \ the theme of the book and describe a working system that provides the basic\
    \ functionality.\n\n## 7.1 BROKER\n\nThe `mosquitto` broker is widely supported\
    \ on many platforms, and also on the Raspberry Pi. We install it, after bringing\
    \ the system up to date with `sudo apt-get update` and `sudo apt-get upgrade`,\
    \ using the command\n\n```\nsudo apt-get install mosquitto mosquitto-clients\n\
    ```\n\nwhere the `mosquitto` package contains the broker and the `mosquitto-clients`\
    \ package contains the command line executables `mosquitto_pub` and `mosquitto_sub`.\
    \ We use them to test the base functionality on the Raspi alone, without external\
    \ clients.\n\nImmediately after the installation, `mosquitto` is already running\
    \ and is registered as a service that starts after every reboot. During our initial\
    \ tests we inspect the logging output with the following command, which helps\
    \ to debug the problem in case something unexpected happens:\n\n```\nsudo tail\
    \ -f /var/log/mosquitto/mosquitto.log\n```\n\nwhere `tail -f` takes the filename\
    \ as argument and shows the last lines of the file, but, instead of stopping the\
    \ display at the end of the file, keeps appending newly generated messages. Now\
    \ we open a second terminal window and start publishing MQTT data using the `mosquitto_pub`\
    \ command-line client with\n\n```\nmosquitto_pub -d -h localhost -i Pub1 -t dummy/value\
    \ -m 42 -r\n```\n\nwhere `mosquitto_pub` is the executable, `-d` enables debugging\
    \ output, and `-h` specifies the IP address of the broker; here it is `localhost`,\
    \ because the broker runs on the same Raspi where we run the `mosquitto_pub` client.\
    \ The parameter specified after `-i` identifies the publisher, `-t` the topic,\
    \ and `-m` specifies the message, here the value 42. Appending `-r` instructs\
    \ the broker to retain the message and send it in case the publisher is offline.\
    \ The debugging output can be disabled by omitting the `-d` option. Running `mosquitto_pub\
    \ -h` gives a short overview of available commands, and the manual page, accessible\
    \ with `man mosquitto_pub`, provides more information.\n\nThe `mosquitto_sub`\
    \ executable provides the receiving end of MQTT message-passing. We run it in\
    \ another terminal window where we execute\n\n```\nmosquitto_sub -d -h localhost\
    \ -i Sub1 -t dummy/value\n```\n\nto subscribe to the topic `dummy/value` on the\
    \ broker running on `localhost`. We identify the subscribing client by Sub1 and\
    \ enable debugging with `-d`. After starting the executable, we are greeted with\
    \ either an empty line or with the last published message that has the retain\
    \ flag `-r` enabled. The `mosquitto_sub` keeps running, and if we publish new\
    \ messages in the second terminal with `mosquitto_pub`, they immediately appear\
    \ in the subscriber window.\n\nIn the default configuration, this only works if\
    \ both publisher and subscriber are on the same computer. In order to grant access\
    \ to the broker from the network, we need to edit the configuration file `/etc/mosquitto/mosquitto.conf`\
    \ and add the lines\n\n```\nlistener 1833\nallow_anonymous true\n```\n\nto the\
    \ end of the file. We can also restrict access to the wireless interface by adding\
    \ the IP number of that interface to the first line, which then reads `listener\
    \ 1833 192.168.20.1`, but then we always need to refer to this address when specifying\
    \ the broker. The command line arguments then contain `-h 192.168.20.1`, rather\
    \ than `-h localhost`. The second line enables access to the broker without a\
    \ password.\n\nAt this point we have a working broker whose functionality we verified\
    \ with the command-line programs `mosquitto_pub` and `mosquitto_sub` running on\
    \ the same Raspi as the broker. In the next section we replace these command-line\
    \ clients by external clients running on NodeMCUs that publish temperature data\
    \ and at the same time subscribe to another topic to turn a cooling fan on or\
    \ off.\n\n## 7.2 NODEMCU CLIENTS\n\nThe hardware connected to the NodeMCU is very\
    \ simple in this case. We connect ground and supply pins of an LM35 temperature-sensor\
    \ to the respective pins on the NodeMCU. The signal pin of the LM35 is connected\
    \ to the single analog input A0. Second, we connect a transistor to an output\
    \ pin as shown in previous chapters to turn the fan on and off. In order to use\
    \ MQTT functionality in the Arduino IDE, we need to install one of the many available\
    \ libraries. We select the “PubSubClient” library and install it from within the\
    \ IDE by going to the library manager located at `Tools→Manage Libraries`, enter\
    \ “PubSubClient” in the search field, find the one by author Nick O’Leary, and\
    \ install it. The following sketches are based on the `mqtt_esp8266` example that\
    \ is included in the installation.\n\nIt turns out that adapting the example code\
    \ to write a sketch that serves as both publisher and subscriber is straightforward,\
    \ and the following code fulfills that purpose.\n\n```\n// MQTT client, V. Ziemann,\
    \ 170816\nconst char* ssid = \"messnetz\";\nconst char* password = \"zxcvZXCV\"\
    ;\nconst char* broker = \"192.168.20.1\";\nconst int fan_pin=D4;\n#include <Ticker.h>\n\
    volatile uint8_t do_something=0;\nTicker tick;\nvoid tick_action() {do_something=1;}\
    \  // executed regularly\n#include <ESP8266WiFi.h>\n#include <PubSubClient.h>\n\
    WiFiClient espClient;\nPubSubClient client(espClient);\nvoid on_message(char*\
    \ topic, byte* msg, unsigned int length) {\n  char ch[30]; memcpy(ch,msg,length);\
    \ ch[length]='\\0';\n  if (strstr(topic,\"node1/fan\")==topic) {\n    int val=(int)atof(ch);\n\
    \    Serial.print(\" Fan=\"); Serial.println(val);\n    if (val==0) {\n      digitalWrite(fan_pin,HIGH);\n\
    \    } else {\n      digitalWrite(fan_pin,LOW);\n    }\n  } else if (strstr(topic,\"\
    node2/temp\")==topic) {\n    Serial.print(\"Temperature on node2 = \"); Serial.println(ch);\n\
    \  }\n}\nvoid setup() { //...........................................setup\n \
    \ pinMode(fan_pin,OUTPUT);\n  Serial.begin(115200);\n  WiFi.begin(ssid,password);\n\
    ```"
  mdcn: "## 第7章\n\n## 消息系统：MQTT\n\nEPICS并非唯一一个将大量传感器和执行器集成到通用框架中的系统。另一个这样的系统是*消息队列遥测传输*（MQTT）[6]协议，它最初由IBM等公司创建，旨在以节省电池、高效节能以及稳健安全的方式从广泛分布的基础设施（如石油管道）收集信息。如今，它通常用于在构成物联网（IoT）的设备之间传递消息，并已成为ISO标准ISO/IEC\
    \ 20922。MQTT使用一个*代理*（broker），它将发布数据的客户端的消息传递给订阅这些数据的客户端。传递的参数（即数据）的名称被称为“主题”（topic）。它们按层次结构组织，例如名称\n\
    \n```\nweatherstations/stationA/node1/temperature\n```\n\n指的是一个气象站（称为A站）上连接到节点1的温度传感器。订阅主题时，可以使用通配符，例如加号“+”（单级通配符）或井号“#”（多级通配符）。传输的稳健性和可靠性通过指定三个*服务质量*（QoS）级别来保证，其中最简单的级别0意味着传感器仅发布数据，无需代理的任何确认。级别1和2实现了越来越高级的握手信号，以确保数据到达。甚至还有一个*遗嘱*（last\
    \ will）功能，当发布客户端断开连接时，它会传输给订阅客户端。通常，代理会立即将接收到的任何数据传输给订阅客户端，但可以指定代理保留最后一个有效的数据点，并在发布者离线时将其传输给订阅者，以及在新订阅者首次连接时传输给他们。由于MQTT旨在跨公共网络运行，加密和安全性是该协议的一部分。\n\
    \nMQTT的核心功能位于代理上，因此客户端可以非常简单，并可以随意连接和断开。这使得可以使用仅从节省电池的深度睡眠模式唤醒、执行测量、将其发送到代理然后再次进入睡眠的客户端。这一有吸引力的特性使得MQTT在IoT应用中非常流行，因此我们也将其作为EPICS的补充进行讨论。在接下来的章节中，我们在树莓派上运行一个代理，并使用NodeMCU作为发布和订阅的客户端。在最后一节，我们讨论一个简单的网关，将MQTT链接到EPICS，以兼得两者的优势。通过这种方式，我们可以从EPICS控制系统通过网关访问通过公共网络连接的轻量级客户端。\n\
    \n在概述了MQTT之后，让我们遵循本书的主题，描述一个提供基本功能的工作系统。\n\n## 7.1 代理\n\n`mosquitto`代理在许多平台上得到广泛支持，包括树莓派。我们在使用`sudo\
    \ apt-get update`和`sudo apt-get upgrade`将系统更新到最新状态后，使用以下命令安装它：\n\n```\nsudo apt-get\
    \ install mosquitto mosquitto-clients\n```\n\n其中`mosquitto`包包含代理，`mosquitto-clients`包包含命令行可执行文件`mosquitto_pub`和`mosquitto_sub`。我们使用它们在树莓派上单独测试基本功能，无需外部客户端。\n\
    \n安装后立即，`mosquitto`已经在运行，并注册为每次重启后启动的服务。在我们的初始测试中，我们使用以下命令检查日志输出，这有助于在发生意外情况时调试问题：\n\
    \n```\nsudo tail -f /var/log/mosquitto/mosquitto.log\n```\n\n其中`tail -f`以文件名作为参数，显示文件的最后几行，但不会在文件末尾停止显示，而是持续追加新生成的消息。现在我们打开第二个终端窗口，使用`mosquitto_pub`命令行客户端开始发布MQTT数据：\n\
    \n```\nmosquitto_pub -d -h localhost -i Pub1 -t dummy/value -m 42 -r\n```\n\n\
    其中`mosquitto_pub`是可执行文件，`-d`启用调试输出，`-h`指定代理的IP地址；这里是`localhost`，因为代理运行在与`mosquitto_pub`客户端相同的树莓派上。`-i`之后指定的参数标识发布者，`-t`指定主题，`-m`指定消息，这里是值42。附加`-r`指示代理保留该消息，并在发布者离线时发送它。可以通过省略`-d`选项来禁用调试输出。运行`mosquitto_pub\
    \ -h`可提供可用命令的简要概述，而通过`man mosquitto_pub`访问的手册页提供更多信息。\n\n`mosquitto_sub`可执行文件提供了MQTT消息传递的接收端。我们在另一个终端窗口中运行它，执行：\n\
    \n```\nmosquitto_sub -d -h localhost -i Sub1 -t dummy/value\n```\n\n以订阅运行在`localhost`上的代理的主题`dummy/value`。我们通过Sub1标识订阅客户端，并使用`-d`启用调试。启动可执行文件后，我们会看到一个空行或最后发布的启用了保留标志`-r`的消息。`mosquitto_sub`会持续运行，如果我们在第二个终端中使用`mosquitto_pub`发布新消息，它们会立即出现在订阅者窗口中。\n\
    \n在默认配置下，这仅在发布者和订阅者位于同一台计算机上时有效。为了允许从网络访问代理，我们需要编辑配置文件`/etc/mosquitto/mosquitto.conf`，并在文件末尾添加以下行：\n\
    \n```\nlistener 1833\nallow_anonymous true\n```\n\n我们也可以通过将无线接口的IP地址添加到第一行来限制对该接口的访问，该行变为`listener\
    \ 1833 192.168.20.1`，但这样在指定代理时始终需要引用此地址。命令行参数则包含`-h 192.168.20.1`，而不是`-h localhost`。第二行允许无需密码即可访问代理。\n\
    \n此时，我们有了一个工作代理，其功能已通过在同一树莓派上运行的命令行程序`mosquitto_pub`和`mosquitto_sub`进行了验证。在下一节中，我们将这些命令行客户端替换为在NodeMCU上运行的外部客户端，这些客户端发布温度数据，同时订阅另一个主题以打开或关闭冷却风扇。\n\
    \n## 7.2 NODEMCU客户端\n\n在这种情况下，连接到NodeMCU的硬件非常简单。我们将LM35温度传感器的地线和电源引脚连接到NodeMCU上的相应引脚。LM35的信号引脚连接到单个模拟输入A0。其次，我们如前几章所示，将一个晶体管连接到输出引脚，以打开和关闭风扇。为了在Arduino\
    \ IDE中使用MQTT功能，我们需要安装众多可用库中的一个。我们选择“PubSubClient”库，并通过IDE中的库管理器（位于`Tools→Manage\
    \ Libraries`）安装它，在搜索字段中输入“PubSubClient”，找到作者Nick O'Leary的库并安装。以下草图基于安装中包含的`mqtt_esp8266`示例。\n\
    \n事实证明，将示例代码调整为编写一个同时作为发布者和订阅者的草图的草图是直接了当的，以下代码实现了这一目的。\n\n```\n// MQTT client,\
    \ V. Ziemann, 170816\nconst char* ssid = \"messnetz\";\nconst char* password =\
    \ \"zxcvZXCV\";\nconst char* broker = \"192.168.20.1\";\nconst int fan_pin=D4;\n\
    #include <Ticker.h>\nvolatile uint8_t do_something=0;\nTicker tick;\nvoid tick_action()\
    \ {do_something=1;}  // executed regularly\n#include <ESP8266WiFi.h>\n#include\
    \ <PubSubClient.h>\nWiFiClient espClient;\nPubSubClient client(espClient);\nvoid\
    \ on_message(char* topic, byte* msg, unsigned int length) {\n  char ch[30]; memcpy(ch,msg,length);\
    \ ch[length]='\\0';\n  if (strstr(topic,\"node1/fan\")==topic) {\n    int val=(int)atof(ch);\n\
    \    Serial.print(\" Fan=\"); Serial.println(val);\n    if (val==0) {\n      digitalWrite(fan_pin,HIGH);\n\
    \    } else {\n      digitalWrite(fan_pin,LOW);\n    }\n  } else if (strstr(topic,\"\
    node2/temp\")==topic) {\n    Serial.print(\"Temperature on node2 = \"); Serial.println(ch);\n\
    \  }\n}\nvoid setup() { //...........................................setup\n \
    \ pinMode(fan_pin,OUTPUT);\n  Serial.begin(115200);\n  WiFi.begin(ssid,password);\n\
    ```"
