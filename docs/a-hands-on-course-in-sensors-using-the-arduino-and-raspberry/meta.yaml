- md: "## Example: Impedance Measurements\n\nIn a later part of this chapter, we use\
    \ the AD5933 impedance analyzer circuit to determine impedances in the frequency\
    \ domain. We start, however, by measuring the unknown capacitance of a capacitor\
    \ by first charging it, then turning off the charging supply and discharging it\
    \ through a parallel resistor, while repeatedly measuring the voltage drop across\
    \ the capacitor. The voltage drops exponentially $U \\propto e^{-t/\\tau}$ with\
    \ time constant $\\tau = RC$, where $R$ is the discharging resistor and $C$ is\
    \ the unknown capacitance. Thus, from a linear least-squares fit to the logarithm\
    \ of the voltage, we can determine the time constant, and from the known resistor\
    \ value, also the unknown capacitance.\n\nFigure 12.1 shows the experimental setup.\
    \ The Arduino UNO is on the right and the small breadboard showing the capacitor\
    \ with the $R = 33\\text{ k}\\Omega$ resistor to discharge the capacitor connected\
    \ in parallel; both are connected to ground and analog pin A0 on the Arduino.\
    \ The capacitor can be charged by pulling digital pin D2 high; it is connected\
    \ by a wire and a $220\\Omega$ resistor. The latter resistor limits the initially\
    \ flowing current, when the capacitor is fully discharged.\n\nThe task of the\
    \ UNO is to first charge the capacitor, by configuring the digital output pin\
    \ D2 as OUTPUT and setting its value to HIGH. Once a measurement is requested,\
    \ the D2 is reconfigured as input with `pinMode(2,INPUT)`, and setting the output\
    \ nevertheless to LOW, to ensure that the internal pull-up resistors are *not\
    \ used*. Once the charging voltage is disconnected, we repeatedly read analog\
    \ pin A0 from an interrupt service routine until the required number of samples\
    \ is collected in memory. Once the raw data are collected, we make a linear least-squares\
    \ fit to the data and determine the capacitance from the slope. This plan of action\
    \ is realized in the following Arduino sketch.\n\n```\n// Capacitance measurement,\
    \ V. Ziemann, 170629\nconst int npts=100;\nvolatile int isamp=0,sample_buffer_ready=0;\n\
    uint16_t sample_buffer[npts],nsamp=npts,timestep=5;\nfloat R=33e3;  // 33 kOhm\n\
    #include <MsTimer2.h>\nvoid timer_action() {  //.....................timer_action\n\
    \  sample_buffer[isamp]=analogRead(A0);\n  isamp++;\n  if (nsamp == isamp) {\n\
    \    MsTimer2::stop();\n    isamp=0;\n    sample_buffer_ready=1;\n  }\n}\ndouble\
    \ linfit(int n, uint16_t y[]) {  //..........linfit\n  double ay0=0,ay1=0;\n \
    \ double S0=n;\n  double S1=0.5*n*(n+1);\n  double S2=n*(n+1.0)*(2.0*n+1)/6.0;\n\
    \  for (int k=0;k<n;k++) {\n    ay0+=(k+1)*log(y[k]);\n    ay1+=log(y[k]);\n \
    \ }\n  return (S0*ay0-S1*ay1)/(S2*S0-S1*S1);\n}\nvoid setup() {  //....................................setup\n\
    \  Serial.begin(9600);\n  while (!Serial) {delay(10);}\n  pinMode(2,OUTPUT);\n\
    \  digitalWrite(2,HIGH);\n}\nvoid loop() {  //....................................loop\n\
    \  if (Serial.available()) {\n    char line[30];\n    Serial.readStringUntil('\\\
    n').toCharArray(line,30);\n    if (strstr(line,\"CAP?\")) {\n      nsamp=(int)atof(&line[5]);\n\
    \      nsamp=min(nsamp,npts);\n      if (nsamp==0) nsamp=npts;\n      pinMode(2,INPUT);\n\
    \      digitalWrite(2,LOW); // disables internal pullup\n      MsTimer2::set(timestep,\
    \ timer_action);\n      MsTimer2::start();\n      sample_buffer[isamp]=analogRead(A0);\n\
    \      isamp++;\n    } else if (strstr(line,\"WF?\")) {\n      Serial.print(\"\
    WF \"); Serial.println(nsamp);\n      for (int i=0; i<nsamp; i++) Serial.println(sample_buffer[i]);\n\
    \    } else if (strstr(line,\"TIMESTEP \")) {\n      timestep=(int)atof(&line[9]);\n\
    \      Serial.print(\"TIMESTEP \"); Serial.println(timestep);\n    } else if (strstr(line,\"\
    TIMESTEP?\")) {\n      Serial.print(\"TIMESTEP \"); Serial.println(timestep);\n\
    \    } else if (strstr(line,\"RESISTOR \")) {\n      R=atof(&line[9]);\n     \
    \ Serial.print(\"RESISTOR \"); Serial.println(R);\n    } else if (strstr(line,\"\
    RESISTOR?\")) {\n      Serial.print(\"RESISTOR \"); Serial.println(R);\n    }\n\
    \  }\n  if (sample_buffer_ready==1) {\n    sample_buffer_ready=0;\n    pinMode(2,OUTPUT);\
    \  // start charging capacitor\n    digitalWrite(2,HIGH);\n    delay(100);\n \
    \   double slope=linfit(nsamp,(uint16_t)sample_buffer);\n    double capacitance=-1e6*timestep*1e-3/(slope*R);\
    \  // in uF\n    Serial.print(\"CAP \"); Serial.println(capacitance,4);\n    if\
    \ (sample_buffer[0] < 250*sample_buffer[nsamp-1]) {\n      Serial.println(\"***Time\
    \ too short, double TIMESTEP\");\n    }\n  }\n  delay(1);\n}\n```\n\nThe sketch\
    \ follows the usual format, where we first declare a number of variables in which\
    \ `npts` is the maximum number of points that can be acquired. The data samples\
    \ are stored in the `sample_buffer` once every `timestep` milliseconds. We also\
    \ declare the resistance R of the resistor used to discharge the capacitor. Since\
    \ the `Ticker.h` library we use in other chapters for the NodeMCU is unavailable\
    \ for the UNO, we include the `MsTimer2.h` header file and library instead. It\
    \ provides the functionality to repeatedly generate an interrupt and call an interrupt-service\
    \ routine called `timer_action()` in our sketch. This function is called every\
    \ `timestep` milliseconds. It first reads analog pin A0, then stores the value\
    \ in the `sample_buffer`, and increments `isamp`. If `isamp` reaches `nsamp`,\
    \ the timer is stopped to prevent the acquisition of further data points. Then\
    \ `isamp` is set to zero to prepare for the next acquisition and the variable\
    \ `sample_buffer_ready` is set to 1 to indicate that an acquisition is complete\
    \ and data is ready for further processing. Technically we can process the data\
    \ within the `timer_action` function, but normally this routine should contain\
    \ only time-critical actions, such as acquiring samples. It should be kept as\
    \ compact as possible, because it is called asynchronously to all other processing\
    \ and we should avoid excessive disturbances. The way to handle this problem is\
    \ to flag that the acquisition is ready, and in the main program, check for this\
    \ flag and perform the postprocessing. In this way, the time-critical and the\
    \ slower processes are efficiently decoupled. The `linfit()` function takes the\
    \ acquired data as well as the number of data points as input parameters, internally\
    \ performs the least-squares fit to the logarithm of the data points, and returns\
    \ the slope of the fit. The discussion of the algorithm is somewhat technical,\
    \ and is deferred to Appendix B.\n\nThe `setup()` function initializes the serial\
    \ line, declares digital pin D2 as output, and sets it to HIGH to start charging\
    \ the capacitor. The `loop()` function uses the standard query-response protocol,\
    \ and a capacitance measurement starts with the command `CAP? nnn`, where `nnn`\
    \ is the desired number of measurement points; per default the maximum number\
    \ `npts` is acquired. Then digital pin D2 is placed in high-impedance input mode.\
    \ We also ensure that the internal pull-up resistor is disabled, and start the\
    \ timer process with the `MsTimer::set()` function. It takes the time between\
    \ samples and the function to call as argument, and then we start the timer. Before\
    \ leaving this subroutine, we take the first data sample. The command `WF?` can\
    \ be used to retrieve the waveform data of the last acquisition. This is useful\
    \ for crosschecking the fitting in, for example, octave. The remaining commands\
    \ are used to set and read the `TIMESTEP` or the `RESISTOR` values. Once the handling\
    \ of the commands from the serial line is complete, we test whether the variable\
    \ `sample_buffer_ready` is set, which indicates that an acquisition is complete\
    \ and we can start postprocessing the raw data. First we reset the `sample_buffer_ready`\
    \ to zero, to prevent repeated calls, and then start charging the capacitor again\
    \ by configuring pin D2 as output, and wait a little while. Next we calculate\
    \ the `slope` from the samples. Since the slope is inversely proportional to the\
    \ time constant $\\tau = RC$, we can solve this for the capacitance $C$ with the\
    \ equation defining the `capacitance`. The factor `1e6` causes the displayed value\
    \ to be shown in $\\mu F$. Finally, we check whether the exponential decay of\
    \ the voltage actually extends over a sufficiently long time, and display a warning\
    \ if that is not the case.\n\nWe can measure capacitances by sending commands\
    \ from other programs that communicate over the serial line. From octave we use\
    \ the following program to initiate a measurement, and plot the data as shown\
    \ in Figure 12.2.\n\n```\n% capacitance_plot.m, V. Ziemann, 221103\n% pkg load\
    \ instrument-control\nclose all; clear all\ns=serialport('/dev/ttyACM0',9600);\n\
    pause(3);\nflush(s);\nwrite(s,\"CAP? 100\");\npause(1);\nreply=serialReadline(s);\n\
    capacitance=str2double(reply(4:end));\nwrite(s,\"TIMESTEP?\");\nreply=serialReadline(s);\n\
    if reply(1:8)==\"TIMESTEP\"\n    timestep=str2double(reply(9:end));\nelse\n  \
    \  disp(reply)\n    clear s;\n    return\nend\nwrite(s,\"WF?\");\nreply=serialReadline(s);\n\
    nsteps=str2num(reply(3:end));\nxx=zeros(nsteps,1); yy=xx;\n```"
  mdcn: "## 示例：阻抗测量\n\n在本章后续部分，我们将使用AD5933阻抗分析仪电路来确定频域中的阻抗。然而，我们首先通过测量电容器的未知电容来进行：先给电容器充电，然后关闭充电电源，通过并联电阻放电，同时反复测量电容器两端的电压降。电压随时间呈指数衰减\
    \ $U \\propto e^{-t/\\tau}$，时间常数为 $\\tau = RC$，其中 $R$ 是放电电阻，$C$ 是未知电容。因此，通过对电压的对数进行线性最小二乘拟合，我们可以确定时间常数，并根据已知的电阻值，求出未知电容。\n\
    \n图12.1展示了实验装置。右侧是Arduino UNO，小面包板上显示了电容器与 $R = 33\\text{ k}\\Omega$ 的放电电阻并联连接；两者都连接到地线和Arduino的模拟引脚A0。电容器可以通过将数字引脚D2置高来充电；它通过一根导线和一个\
    \ $220\\Omega$ 的电阻连接。后者电阻在电容器完全放电时限制初始流过的电流。\n\nUNO的任务是首先通过将数字输出引脚D2配置为OUTPUT并将其值设置为HIGH来给电容器充电。一旦请求测量，D2将通过\
    \ `pinMode(2,INPUT)` 重新配置为输入，但输出仍设置为LOW，以确保*不使用*内部上拉电阻。充电电压断开后，我们从中断服务程序反复读取模拟引脚A0，直到在内存中收集到所需数量的采样点。原始数据收集完毕后，我们对数据进行线性最小二乘拟合，并根据斜率确定电容。此行动计划在以下Arduino草图中实现。\n\
    \n```\n// Capacitance measurement, V. Ziemann, 170629\nconst int npts=100;\nvolatile\
    \ int isamp=0,sample_buffer_ready=0;\nuint16_t sample_buffer[npts],nsamp=npts,timestep=5;\n\
    float R=33e3;  // 33 kOhm\n#include <MsTimer2.h>\nvoid timer_action() {  //.....................timer_action\n\
    \  sample_buffer[isamp]=analogRead(A0);\n  isamp++;\n  if (nsamp == isamp) {\n\
    \    MsTimer2::stop();\n    isamp=0;\n    sample_buffer_ready=1;\n  }\n}\ndouble\
    \ linfit(int n, uint16_t y[]) {  //..........linfit\n  double ay0=0,ay1=0;\n \
    \ double S0=n;\n  double S1=0.5*n*(n+1);\n  double S2=n*(n+1.0)*(2.0*n+1)/6.0;\n\
    \  for (int k=0;k<n;k++) {\n    ay0+=(k+1)*log(y[k]);\n    ay1+=log(y[k]);\n \
    \ }\n  return (S0*ay0-S1*ay1)/(S2*S0-S1*S1);\n}\nvoid setup() {  //....................................setup\n\
    \  Serial.begin(9600);\n  while (!Serial) {delay(10);}\n  pinMode(2,OUTPUT);\n\
    \  digitalWrite(2,HIGH);\n}\nvoid loop() {  //....................................loop\n\
    \  if (Serial.available()) {\n    char line[30];\n    Serial.readStringUntil('\\\
    n').toCharArray(line,30);\n    if (strstr(line,\"CAP?\")) {\n      nsamp=(int)atof(&line[5]);\n\
    \      nsamp=min(nsamp,npts);\n      if (nsamp==0) nsamp=npts;\n      pinMode(2,INPUT);\n\
    \      digitalWrite(2,LOW); // disables internal pullup\n      MsTimer2::set(timestep,\
    \ timer_action);\n      MsTimer2::start();\n      sample_buffer[isamp]=analogRead(A0);\n\
    \      isamp++;\n    } else if (strstr(line,\"WF?\")) {\n      Serial.print(\"\
    WF \"); Serial.println(nsamp);\n      for (int i=0; i<nsamp; i++) Serial.println(sample_buffer[i]);\n\
    \    } else if (strstr(line,\"TIMESTEP \")) {\n      timestep=(int)atof(&line[9]);\n\
    \      Serial.print(\"TIMESTEP \"); Serial.println(timestep);\n    } else if (strstr(line,\"\
    TIMESTEP?\")) {\n      Serial.print(\"TIMESTEP \"); Serial.println(timestep);\n\
    \    } else if (strstr(line,\"RESISTOR \")) {\n      R=atof(&line[9]);\n     \
    \ Serial.print(\"RESISTOR \"); Serial.println(R);\n    } else if (strstr(line,\"\
    RESISTOR?\")) {\n      Serial.print(\"RESISTOR \"); Serial.println(R);\n    }\n\
    \  }\n  if (sample_buffer_ready==1) {\n    sample_buffer_ready=0;\n    pinMode(2,OUTPUT);\
    \  // start charging capacitor\n    digitalWrite(2,HIGH);\n    delay(100);\n \
    \   double slope=linfit(nsamp,(uint16_t)sample_buffer);\n    double capacitance=-1e6*timestep*1e-3/(slope*R);\
    \  // in uF\n    Serial.print(\"CAP \"); Serial.println(capacitance,4);\n    if\
    \ (sample_buffer[0] < 250*sample_buffer[nsamp-1]) {\n      Serial.println(\"***Time\
    \ too short, double TIMESTEP\");\n    }\n  }\n  delay(1);\n}\n```\n\n该草图遵循通常的格式，我们首先声明一些变量，其中\
    \ `npts` 是可获取的最大数据点数。数据采样点每隔 `timestep` 毫秒存储在 `sample_buffer` 中。我们还声明了用于放电电容器的电阻的阻值\
    \ R。由于我们在其他章节中用于NodeMCU的 `Ticker.h` 库在UNO上不可用，因此我们改为包含 `MsTimer2.h` 头文件和库。它提供了重复生成中断并调用我们草图中名为\
    \ `timer_action()` 的中断服务程序的功能。此函数每隔 `timestep` 毫秒被调用一次。它首先读取模拟引脚A0，然后将值存储在 `sample_buffer`\
    \ 中，并递增 `isamp`。如果 `isamp` 达到 `nsamp`，则停止计时器以防止获取更多数据点。然后将 `isamp` 设置为零，为下一次采集做准备，并将变量\
    \ `sample_buffer_ready` 设置为1，表示采集完成，数据已准备好进行进一步处理。从技术上讲，我们可以在 `timer_action` 函数内处理数据，但通常此例程应仅包含时间关键的操作，例如采集样本。它应尽可能紧凑，因为它异步于所有其他处理调用，我们应避免过度干扰。处理此问题的方法是标记采集已完成，然后在主程序中检查此标志并执行后处理。通过这种方式，时间关键的过程和较慢的过程被有效地解耦。`linfit()`\
    \ 函数以采集的数据以及数据点数量作为输入参数，内部对数据点的对数执行最小二乘拟合，并返回拟合的斜率。算法的讨论有些技术性，推迟到附录B。\n\n`setup()`\
    \ 函数初始化串行线路，将数字引脚D2声明为输出，并将其设置为HIGH以开始给电容器充电。`loop()` 函数使用标准的查询-响应协议，电容测量以命令 `CAP?\
    \ nnn` 开始，其中 `nnn` 是所需的测量点数；默认情况下获取最大数量 `npts`。然后将数字引脚D2置于高阻抗输入模式。我们还确保禁用内部上拉电阻，并使用\
    \ `MsTimer::set()` 函数启动计时器过程。它以采样间隔和要调用的函数作为参数，然后我们启动计时器。离开此子程序之前，我们获取第一个数据样本。命令\
    \ `WF?` 可用于检索上次采集的波形数据。这对于交叉检查拟合很有用，例如在octave中。其余命令用于设置和读取 `TIMESTEP` 或 `RESISTOR`\
    \ 值。一旦串行线路的命令处理完成，我们测试变量 `sample_buffer_ready` 是否被设置，这表示采集完成，我们可以开始后处理原始数据。首先，我们将\
    \ `sample_buffer_ready` 重置为零，以防止重复调用，然后通过将引脚D2配置为输出再次开始给电容器充电，并稍等片刻。接下来，我们根据样本计算\
    \ `slope`。由于斜率与时间常数 $\\tau = RC$ 成反比，我们可以用定义 `capacitance` 的方程解出电容 $C$。因子 `1e6`\
    \ 使显示的值以 $\\mu F$ 为单位。最后，我们检查电压的指数衰减是否确实持续了足够长的时间，如果不是，则显示警告。\n\n我们可以通过从其他通过串行线路通信的程序发送命令来测量电容。从octave中，我们使用以下程序启动测量，并绘制如图12.2所示的数据。\n\
    \n```\n% capacitance_plot.m, V. Ziemann, 221103\n% pkg load instrument-control\n\
    close all; clear all\ns=serialport('/dev/ttyACM0',9600);\npause(3);\nflush(s);\n\
    write(s,\"CAP? 100\");\npause(1);\nreply=serialReadline(s);\ncapacitance=str2double(reply(4:end));\n\
    write(s,\"TIMESTEP?\");\nreply=serialReadline(s);\nif reply(1:8)==\"TIMESTEP\"\
    \n    timestep=str2double(reply(9:end));\nelse\n    disp(reply)\n    clear s;\n\
    \    return\nend\nwrite(s,\"WF?\");\nreply=serialReadline(s);\nnsteps=str2num(reply(3:end));\n\
    xx=zeros(nsteps,1); yy=xx;\n```"
