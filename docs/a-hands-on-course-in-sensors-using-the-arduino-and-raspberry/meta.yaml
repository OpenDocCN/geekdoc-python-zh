    \      client.print(\"T \"); client.println(temp,1);\n    } else {\n      Serial.println(\"\
    unknown command, disconnecting\");\n      client.stop();\n    }\n    client.flush();\n\
    \    // client.stop();\n  }\n}\n```\n\n在这个程序中，我们首先定义了两个字符串 `ssid` 和 `password`，用于无线网络的名称和密码。在包含\
    \ ESP8266 设备的 WiFi 支持功能之前，我们还在下一行指定了端口号，这里是 1137。包含该功能后，我们定义了一个名为 `server` 的 WiFiServer，它监听指定的端口。在\
    \ `setup()` 函数中，我们启动了通过 USB 线进行的日志记录串口通信，然后使用 `WiFi.begin()` 函数连接到无线网络。一旦 NodeMCU\
    \ 连接到无线网络，我们就使用 `server.begin()` 命令启动服务器。在 `loop()` 函数中，我们使用了与之前通过串口线通信时相同的结构，但这次是通过客户端计算机连接到我们的服务器时动态打开的套接字进行通信。与请求计算机的连接会一直保持打开，直到一个未知命令关闭连接。但在连接打开期间，可以重复请求值。如果我们希望在发送回复后立即关闭连接，可以取消注释\
    \ `client.flush();` 行之后的 `client.stop();` 行。请注意，此服务器一次只能处理一个请求。如果一台计算机已经连接，而第二台计算机尝试建立连接，后者将被挂起，直到第一台计算机断开连接。这个\
    \ NodeMCU 上的程序允许我们通过端口 1137 上的自定义套接字查询 NodeMCU 可用的任何参数或测量值。如何从另一台计算机连接到它，我们将在下一章讨论。\n\
    \n除了标准通信协议外，还有其他几种可用协议。我们将在下一节中简要讨论它们。\n\n## 4.6.4 其他通信方式\n\n在前面的章节中，我们使用了标准且易于使用的协议（RS-232、USB、蓝牙和\
    \ WiFi）与微控制器通信。它们的优点是在许多主机计算机上都易于获得。然而，还有其他通信渠道，我们将在以下段落中列举几种。所有这些都由 Arduino 库支持。\n\
    \n另一种无线通信渠道是 *ZigBEE*，它与蓝牙相关，但使用更简单的协议开销，并针对尽可能低的功耗进行了优化，以实现长时间的电池供电运行。另一个选择是使用廉价的\
    \ *433 MHz 收发器*，它们可以通过简单的无线链路将从属微控制器连接到其主控器。\n\n*MIDI* 是一种为连接电子乐器而开发的协议。物理接口基于电流环，通过每个设备输入端的光耦合器实现电气隔离。在逻辑上，通信与波特率为\
    \ 31250 的 RS-232 非常相似。每条 MIDI 消息由三个（在某些情况下是两个）字节组成，这些字节具有标准化的解释，例如通道号、音调（对应于钢琴键盘上的特定按键）和力度（按键被按下的强度）。\n\
    \n可以使用红外（IR）光连接附近的硬件，红外光用于电视遥控器，将信息从遥控器发送到电视以更改频道或音量。顺便提一下，即使是第一代 Lego™ Mindstorm\
    \ 微控制器也是通过这种方式进行通信的。通信基于使用 940 nm 波长的红外二极管，并以 38 kHz 的速率调制光。发送调制光的脉冲代表低电平或高电平信号，并用于模拟低波特率（如\
    \ 2400 波特）的类 RS-232 协议。另一种协议是 RC-5，通常用于电视遥控器。像 TSOP2238 这样的接收器内置光学滤波器，仅对 940 nm\
    \ 附近的窄波长范围敏感。此外，它们解调 38 kHz 载波频率，并在其输出引脚上仅提供 3.3 V 或 5 V 信号，使其非常易于接口。\n\n请注意通用结构：通信通道基于底层硬件和协议栈，协议栈通常由硬件实现之上的多个层组成。在我们的示例中，我们使用发送以问号结尾的字符串来表示请求的约定。回复则由相同的字符串后跟一个值组成。这个约定定义了一个简单的通信协议。我们可以轻松地提出其他协议，并添加诸如校验和之类的功能来测试传输的完整性。此外，I2C\
    \ 和 MIDI 通信基于标准化协议，其中传输多个字节，每个字节表示某些特定信息，例如要寻址的寄存器或写入寄存器的值。当然，所有参与通信的设备必须就传输的比特和字节的解释达成一致，否则将一片混乱。\n\
    \n到目前为止，我们总是假设某个未指定的主机计算机（例如台式计算机）可用，并作为微控制器的通信伙伴。在下一章中，我们将考虑一种广泛可用、文档齐全且价格低廉的特定主机计算机——Raspberry\
    \ Pi。\n\n## 问题与项目创意\n\n1.  将十六进制数 0x5CA3 转换为 a) 二进制和 b) 十进制表示。\n2.  读取 NodeMCU\
    \ 上 A0 引脚的 ADC 不太可靠。例如，将 A0 连接到 GND 不一定得到零 ADC 读数。尝试对其进行校准。\n3.  你能将 MCP23017\
    \ IO 扩展器和 BME680 环境传感器连接到同一个 I2C 总线上吗？\n4.  在什么情况下使用中断是有利的？\n5.  你需要多达 128 个数字输入引脚。使用多个\
    \ MCP23017 并解释如何连接它们。\n6.  查看 MCP3304 的数据手册，找出如何配置它以读取八个单极性输入电压。你需要在软件中更改什么？\n\
    7.  如果你需要 128 个单极性模拟输入信号，如何将 MCP3304 连接到 Arduino？这是否可能，如果可能，如何实现？\n8.  将一个三色 LED\
    \ 连接到 Arduino，并通过串口线独立控制三种颜色的亮度。添加直接设置标准混合颜色（如橙色或品红色）的功能。"
