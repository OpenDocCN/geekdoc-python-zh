    # # Host Computer: Raspberry Pi


    The Raspberry Pi [11] is a small single-board computer that first appeared in
    2012, with the intention of providing an inexpensive platform to introduce students
    and other interested parties to computers in general and to programming in particular.


    # ## 5.1 HARDWARE


    Since its first appearance, the Raspi went through several hardware revisions.
    The smaller board on the bottom left in Figure 5.1 is a Pi Zero with 512 MB of
    RAM and no Ethernet port. This makes it too limited for our purpose. Instead we
    use the most recent incarnation, model 4, which appeared in February 2019. It
    is available in two form factors, the classical version 4B, shown on the bottom
    right in Figure 5.1 and the newer version 400, which has a built-in keyboard,
    shown on the top. Both feature quad-core ARM central-processing units (CPU) operating
    at speeds up to 1.8 GHz and have between 2 and 8 GB RAM memory on board. This
    hardware is sufficiently powerful to run a full-fledged Linux system. An external
    and replaceable micro-SDHC card (at least 16 GB and speed class 10) serves as
    a hard disk to hold the operating system and user files. For our purposes 2 or
    4 GB RAM are adequate; also the previous version 3B works fine.


    But beyond the CPU, the Raspberry Pi 4B and 400 sport a video processor that can
    display videos at 4k resolution (up to 3840 × 2160) via two built-in micro HDMI-connectors.
    Audio output is available either via the HDMI connectors or via a 3.5-mm headphone
    jack. Moreover, there are two USB-2 and two USB-3 ports on board to connect peripheral
    components, such as USB sticks, keyboard, mice, or web cameras. Communication
    with the outside world is feasible via a built-in wired Ethernet port, and since
    version 3, the Raspi has built-in Bluetooth and WiFi in the 2.4 GHz and on the
    4B even in 5 GHz frequency bands (802.11ac).


    The Raspis are very attractive due to their built-in low-level peripherals. There
    are 17 general-purpose input-output (GPIO) pins exposed on the board, some of
    which support I2C, SPI, and UART (RS-232-like) communication. Moreover, a specific
    audio bus (I2S) is available, as well as a high-speed CSI interface to connect
    the tailor-made Raspberry Pi camera, and a DSI interface to connect LCD panels.
    Some of these features can be used to implement the same functionality as on the
    Arduino, but we will not use that here, but rather use the Raspi as a standardized
    host computer system.'
