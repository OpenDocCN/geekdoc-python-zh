  md: "Output pins of a rotary encoder carry a sine-like and a cosine-like signal,\
    \ respectively. We can determine whether the shaft is turned clockwise or counterclockwise\
    \ depending on whether the two pins are equal or not while one of them changes\
    \ on a falling edge, going from a HIGH to a LOW state. The following code implements\
    \ this method using interrupts. Using interrupts has the advantage that the state\
    \ of the pins does not have to be measured continuously and compared, but an interrupt_handler\
    \ is registered with a certain action, in our case on a falling edge on the pin\
    \ connected to the interrupt. The Arduino has two pins, numbers 2 and 3, that\
    \ have the interrupt functionality. But let us look at the sketch first.\n\n```\n\
    // Rotary encoder, V. Ziemann, 161205\nconst int pinA=2,pinB=4;\nvolatile int\
    \ pos=0;\nvoid setup() {\n  Serial.begin(9600); while (!Serial) {;}\n  pinMode(pinA,INPUT_PULLUP);\n\
    \  pinMode(pinB,INPUT_PULLUP);\n  attachInterrupt(0,interrupt_handler,FALLING);//0=pin2,1=pin3\n\
    }\nvoid loop() {\n  Serial.println(pos);\n  delay(1000);\n}\nvoid interrupt_handler()\
    \ {\n  if (digitalRead(pinA)==digitalRead(pinB)){pos++;}else{pos--;}\n}\n```\n\
    \nThe sketch starts by declaring the used pins and a variable pos that contains\
    \ the encoder position. The variable is declared volatile, which instructs the\
    \ compiler that it can change asynchronously within the interrupt routine, and\
    \ prevents the compiler from optimizing it away, because it does not change in\
    \ the main program. In the setup() function we declare the serial line parameters\
    \ and the input pins with pull-up resistors enabled. One of the pins must be pin\
    \ 2 or 3, those with interrupt capability. The attachInterrupt() function is used\
    \ to connect a so-called callback function, here interrupt_handler. It is defined\
    \ at the end of the sketch. In our sketch we chose interrupt 0 (connected to pin\
    \ 2) to trigger the callback function interrupt_handler. We also specify that\
    \ the callback function is called on a FALLING edge on the interrupt pin. Instead\
    \ of hard coding the value 0 as the source of the interrupt, we can use the service\
    \ function digitalPinToInterrupt() that takes the pin number, 2 in our case, as\
    \ argument, such that the line reads\n\n```\nattachInterrupt(digitalPinToInterrupt(2),interrupt_handler,FALLING);\n\
    ```\n\ninstead. Using digitalPinToInterrupt() is the preferred way, because it\
    \ relieves the user of remembering which interrupt number is connected to which\
    \ pin. The loop() function is very simple and only writes the position of the\
    \ encoder shaft to the serial line once a second. Finally, we define the callback\
    \ function interrupt_handler, which increments the pos variable by one step if\
    \ the two encoder pins are equal and decrements otherwise. In this way, the sense\
    \ of rotation of the shaft is taken care of. We need to point out that we had\
    \ to use separate external pull-up resistors (10kΩ) to guarantee stable operation,\
    \ and in the sketch we may encounter a so-called race condition when the variable\
    \ pos changes while it is transmitted on the serial line.\n\nAfter the discussion\
    \ of interfacing the sensors, we now move on to investigate how to work with actuators,\
    \ such as switches, motors, or analog voltages."
