    And this brings us to the electronics on the robot. In Figure 17.4 we show the
    circuit diagram to implement the functionality discussed earlier in this chapter.
    Figure 17.5 shows the corresponding schematic. The central component is the NodeMCU
    microcontroller visible on the right of the solderless breadboard, with the L293D
    H-bridge motor driver and adjacent 7805 linear voltage regulator to its left.
    The voltage regulator receives power from the battery, whose negative pole is
    connected to system ground and the positive voltage to the input pin of the 7805.
    The positive battery voltage is also routed to the motor and logic power pins
    of the L293D motor driver. The 5 V output voltage of the 7805 voltage regulator
    is connected to the lower power rails from where it provides power to the Vin
    pin of the NodeMCU at its bottom right. The 5 V power is further routed to the
    model-servo and the HC-SR04 sonar sensor visible above the large breadboard. The
    3.3 V voltage regulator on the NodeMCU provides power to the upper power rail,
    which carries 3.3 V and is routed to the respective circuits. The respective power
    rails have large electrolytic capacitors of 470 μF connected, to buffer intermittent
    current requirements. Special care is needed to ensure that the three different
    voltages are routed correctly. Higher than permissible voltages can destroy some
    of the integrated circuits. The positive voltage from the battery only goes to
    the 7805 and L293D, and 5 V power the NodeMCU via its Vin pin, the servo, and
    the sonar. To facilitate the correct wiring, color images are made available on
    this book''s github repository at https://github.com/volkziem/HandsOnSensors2ed.git.


    Motor 1 is connected to the pins on the lower side of the L293D H-bridge motor
    driver, and the controlling input pins are connected to IO pins D3 and D4 on the
    NodeMCU. Likewise, motor 2 is connected to the upper half of the L293D, and the
    corresponding input pins are routed to pins D5 and D6 on the NodeMCU. The enable
    pins of the motor driver are permanently wired to 3.3 V. The model-servo is connected
    to the 5 V power rail, and its control wire connects to pin D7 on the NodeMCU,
    while the buzzer connects to pin D8. The HC-SR04 distance sonar is powered from
    the 5 V rail. It is triggered by a pulse from NodeMCU pin D1 and the echo is received
    on pin D2. Since the NodeMCU only operates on 3.3 V, we need to use a voltage
    divider made of a 10 kΩ and a 22 kΩ resistor to step the 5 V echo signal from
    the HC-SR04 to approximately 3.3 V. On the robot, the distance sensor is actually
    mounted on the small breadboard visible on the top left in Figure 17.4, which,
    in turn, is mounted on the movable axis of the model-servo that permits it to
    scan the surroundings for obstacles. Initially only the distance sensor and the
    middle BPX38 phototransistor with a pull-up resistor to the 3.3 V rail are mounted
    on the small breadboard to scan for both obstacles and sources of infrared radiation.
    The BPX38 is most sensitive around a photon wavelength of 880 nm, which is in
    the infrared part of the electromagnetic spectrum that is emitted as heat radiation
    by, for example, a fire or an old-fashioned light bulb. The emitter of the BPX38
    is connected to ground, and the collector connects to the analog input pin A0
    of the NodeMCU and via a 10 kΩ resistor to the 3.3 V power rail. In this configuration
    we need to continuously scan the IR and distance sensor with the servo'
