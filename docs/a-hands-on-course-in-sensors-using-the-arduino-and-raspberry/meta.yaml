    # 2.3 DIGITAL SENSORS


    We now address sensors that do not require an external ADC, but report their measurement
    values directly to the microcontroller in digital from. Some sensors already have
    ADCs built in, while others do not need one. We start with the latter, of which
    the most prominent examples are buttons and switches.


    # 2.3.1 Buttons and switches


    The simplest digital sensor is certainly a *switch* that is either closed or open,
    or a *button* where the open or close state is only activated temporarily. We
    use these terms interchangeably. Our task is to sense their state in a reliable
    way, and this is normally done with a pull-up resistor that is connected to the
    supply voltage in the way shown in Figure 2.32. In this way the sensing pin on
    the microcontroller can reliably detect the supply voltage. Only if the switch
    S1 is pressed does the voltage on the pin drop to zero or ground level. Only a
    small current, determined by the magnitude of the resistor, flows when the switch
    is closed. The actual value of the resistor is uncritical, but values around 10–30
    kΩ are usually reasonable. Without the pull-up resistor, the voltage potential
    on the pin is undefined when the switch is open, and determined by stray capacitances
    in the system. So, it is recommended to always use a pull-up resistor when sensing
    the state of a switch. Note that swapping the position of the resistor and the
    switch, the resistor functions as a pull-down resistor, and the sensing level
    is zero unless the switch is closed.


    We need to point out that mechanical switches have the undesirable characteristic
    of bouncing. Closing the switch is often accompanied by a fast on-off sequence.
    Fast microcontrollers or other computers act so rapidly that they are easily fooled
    by sensing multiple switch-closures instead of a single one. Sometimes a small
    time-delay is introduced after the first switch closure is detected. In this way,
    only a single closing event is accounted for, and others during the short timeout
    period are ignored. Optionally, an analog debouncer, which is a simple low-pass
    filter, as discussed in Section 2.2.3, may be used.


    There are a number of other sensors that act just like a switch and can be sensed
    in the same way. An example is a *reed switch*, which is sensitive to magnetic
    fields and closes a switch if some field level is exceeded. A further example
    is a *tilt switch*, which senses the position of a small conducting sphere that
    horizontally rolls back and forth, and closes a contact when it bumps into one
    of the extreme positions.


    A variation on the theme of switches are *rotary encoders*, which use two switches,
    A and B, that open and close periodically as an axis is turned. The direction
    of the rotation can'
