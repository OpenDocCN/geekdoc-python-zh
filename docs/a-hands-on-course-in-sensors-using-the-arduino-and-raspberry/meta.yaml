  - "[PAGE 86]\n\nSo far, we managed to read analog voltages, and even devised a simple\
    \ protocol to report the measurement values to the host computer. In the next\
    \ section, we interface I2C-based sensors to the microcontroller, and use the\
    \ same query-response protocol to communicate with the host.\n\n# 4.4.3 I2C\n\n\
    And we continue with another temperature sensor, but a special one that is used\
    \ by nurses in hospitals. It is based on a contact-free thermometer that takes\
    \ your temperature by pointing a gadget into your inner ear. An example is the\
    \ MLX90614 infrared thermometer shown on the right in Figure 2.9. It uses a thermopile\
    \ to deduce the temperature from the picked-up infrared radiation and it reports\
    \ the temperature to our Arduino via an I2C interface. Here we point out that\
    \ the MLX90614 comes in versions for 5 V and 3.3 V supply voltage. In this example\
    \ we use the 5 V version, labeled AAA. The device has four pins – check the datasheet\
    \ to find out which pin does what – for ground, supply voltage, and the I2C lines\
    \ SDA as SCL. The latter two are connected to pin A4 and A5 on the UNO because\
    \ the I2C data and clock lines are routed to the same output pins as the analog\
    \ pins A4 and A5. These pins cannot be used for analog measurements, in case they\
    \ are used for I2C connectivity. We show how to connect the sensor in Figure 4.7,\
    \ and illustrate how to talk to it in the following sketch.\n\n```\n// Read MLX90614\
    \ IRthermometer, V. Ziemann, 170717\n#include <Wire.h>\nconst int MLX90614=0x5A;\
    \   // I2C address\nfloat getTemperature(uint8_t addr) {  //.....getTemperature\n\
    \  uint16_t val;\n  uint8_t crc;\n  Wire.beginTransmission(MLX90614);\n  Wire.write(addr);\
    \        // address\n  Wire.endTransmission(false);\n  Wire.requestFrom(MLX90614,3);\n\
    \  val = Wire.read();\n  val |= (Wire.read()<<8);\n  crc=Wire.read();        \
    \ // not used\n  return -273.15+0.02*(float)val;\n}\nvoid setup() { //....................................setup\n\
    \  Serial.begin(9600);\n  Wire.begin();\n}\nvoid loop() {  //....................................loop\n\
    \  float Ta=getTemperature(0x06);  // address for ambient temp\n  float To=getTemperature(0x07);\
    \  // address for object temp\n  Serial.print(Ta); Serial.print(\"\\t\"); Serial.println(To);\n\
    \  delay(1000);\n}\n```\n\nFirst we have to include support for the I2C functionality\
    \ by including the Wire.h header file, which also causes the compiler and linker\
