    # 2.1.2 Voltage-based sensors


    An example of a sensor that directly produces a voltage at its output pin is the
    LM35 *temperature sensor*, which is a silicon-bandgap temperature sensor. The
    operating principle is based on passing known currents $I_n$ with $n = 1, 2$ with
    current densities $j_n$ across the base-emitter junctions of two bipolar transistors,
    and comparing their respective volt-


