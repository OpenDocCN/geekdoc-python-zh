    But we do not have enough analog input terminals on the NodeMCU, and have used
    almost all the IO pins. This significantly limits our ability add new functionality
    to the robot. We therefore add an Arduino-NANO to the large breadboard and program
    it to behave as a slave to the NodeMCU, and to communicate over the serial line.
    The wires that connect the respective TX and RX pins are crossed and behave similar
    to a null-modem cable. The NANO behaves almost like a UNO and is also programmed
    in the same way, by selecting *Arduino Nano* from the *Tools→Board* menu in the
    Arduino IDE. The only obviously visible difference is that the NANO has eight
    instead of six analog input pins, while there are also 13 digital IO pins. Since
    we power the NANO with 5 V supplied to the pin labeled “5 V”, all IO pins are
    operating on 5 V logic levels. In order not to damage the NodeMCU that operates
    at 3.3 V, we use a reverse-biased diode in the connection from the TX pin of the
    NANO to the RX pin of the NodeMCU. The diode blocks the 5 V from reaching the
    NodeMCU, but if the TX is pulled low, the signal on the input pin of the NodeMCU
    is also pulled low. The prototype circuit works with a normal switching 1N4148
    diode, but ideally one should use a Schottky diode, which has a smaller voltage
    drop. Once the essential communication between NodeMCU and the slave-NANO works,
    we connect the two additional phototransistors from the small breadboard to analog
    input pins A0 and A1 on the slave NANO. This completes the description of the
    hardware on the robot chassis, and we can turn to programming the NodeMCU.


