    # 2.2.3 Filters


    The task of filters is to remove certain frequencies from an electrical signal
    such as all high frequencies, in which case the filter is called a low-pass filter.
    An example is a low-pass filter that removes “hissing” in audio-signals. The converse
    filter is a high-pass filter that removes low frequencies. An example is an anti-rumble
    filter found in old vinyl record players. If we know that the desired signal contains
    only a certain range of frequencies, and we wish to remove all others, we use
    a band-pass filter. An example is the IF filter found in radios that are based
    on the super-heterodyne principle. And finally there are filters that remove only
    frequencies in a narrow band. They are called band-stop or notch filters. An example
    is a filter that removes the omnipresent 50 Hz or 60 Hz hum coming from the power
    grid.


    We first consider a *low-pass filter*, which in the simplest incarnation is a
    frequency-dependent voltage divider made of a resistor with resistance $R$ and
    a capacitor with capacitance $C$, as shown on the left of Figure 2.22. For a refresher
    of basic concepts circuit theory, such as impedance, please consult Appendix A.
    In our circuit, the capacitor has an impedance $1/i\omega C$, which gets smaller
    with increasing frequency $\omega = 2\pi f$. Intuitively, the higher frequencies
    are shorted to ground. If we build a voltage divider as shown on the left of Figure
    2.22, the output voltage $V_{out}$ is given by $V_{out} = (V_{in}/i\omega C)/(R
