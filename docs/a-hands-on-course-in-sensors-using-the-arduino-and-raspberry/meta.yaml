  - "[PAGE 102]\n\n84 ■ A Hands-On Course in Sensors Using the Arduino and Raspberry\
    \ Pi, Second Edition\n\n```\nreturn (float) data[0];  // humidity\n}\n*T=-100;\
    \   // only get here if bad reading\nreturn -1;\n}\nvoid setup() {  //........................................setup\n\
    \  Serial.begin(9600);\n  while (!Serial) {;}\n  pinMode(DHT,INPUT);\n  digitalWrite(DHT,HIGH);\n\
    \  delay(2000);     // wait for DHT to wake up\n}\nvoid loop() {  //........................................loop\n\
    \  float temperature,humidity;\n  humidity=read_dht11(&temperature);\n  Serial.print(humidity);\
    \ Serial.print(\"\\t\");\n  Serial.println(temperature);\n  delay(2000);\n}\n\
    ```\n\nIn this sketch we first define the pin to which the DHT11 is connected\
    \ and the function **read_dht11()** that encapsulates the communication with the\
    \ sensor. There we first declare a number of variables and then directly progress\
    \ to configuring the pin to which the sensor is connected as OUTPUT, and produce\
    \ a 20-ms-long LOW pulse before pulling the pin HIGH and reconfiguring it as INPUT.\
    \ Since the timing of the response from the DHT11 is critical, we briefly turn\
    \ interrupts off, which disables background processing of serial or WLAN activities.\
    \ Then we read the pin every 10 μs 500 times for a total duration of 5ms, which\
    \ is sufficient to read 40 bits, each having a maximum duration of 120 μs, into\
    \ the boolean array p[]. Once the acquisition is complete, we turn interrupts\
    \ on again. Now that we have the entire data set in memory we can decode it. The\
    \ variable ic steps through the received array p[] and searches for LOW to HIGH\
    \ transitions and HIGH to LOW transitions. First we take care of the acknowledge\
    \ pulse before looping over 5 bytes of 8 bits each. For each bit we measure the\
    \ separation from the time the signal goes up until it goes down again. If the\
    \ difference of the indices is more than four, which means that the temporal separation\
    \ is longer than 40 μs, we set the corresponding bit in the respective data byte.\
    \ Once 40 bits are decoded we calculate the checksum, which is the sum of the\
    \ first four data bytes, truncated to eight bits. If this equals the fifth byte,\
    \ the transmission is correct and the function returns data[0] as the humidity\
    \ and data[2] as the temperature, as specified in the datasheet. If the checksum\
    \ is incorrect, the function returns values that are obviously wrong to allow\
    \ checking in the calling program. Note that the DHT22/AM2302 sensors have a slightly\
    \ different interpretation of the data bytes. For these sensors, the humidity\
    \ and temperature are instead given by\n\n```\nhumidity=(0.1*(256*data[0]+data[1]));\n\
    *T=(float) (0.1*(256*data[2]+data[3]));\n```\n\nIn our version of the **read_dht11()**\
    \ function, we first read the entire time series of 500 points with a spacing\
    \ of 10 μs before decoding. This wastes a little memory, but is more robust than\
    \ waiting for transitions of the pin while decoding, as is done in other implementations\
    \ of the DHT libraries. Note also that sampling a pin in this way constitutes\
    \ a simple logic analyzer. This may come handy in other contexts as well."
  - "[PAGE 103]\n\n![](img/8f23875c54d5b3177d5d2a5bba06b37e_103_0.png)\n\nFigure 4.11\
    \ Connecting the DS18b20 sensor to the Arduino UNO†.\n\nAnother data bus, similar\
    \ to the one for the DHT sensors, but with additional error handling, is the Dallas\
    \ 1-wire protocol that is used by the popular DS18b20 temperature sensor, but\
    \ also by other devices, such as humidity sensors, memory circuits, or autonomous\
    \ data loggers. We will, however, focus on the DS18b20 and connect it to the Arduino\
    \ using the schematics shown in Figure 4.11 where we connect ground and supply\
    \ voltage and the single data pin to pin D2 on the UNO. We also added a 4.7 kΩ\
    \ pull-up resistor from the data pin to the supply voltage. This is needed for\
    \ a bare sensor only. If we use a breakout-board version of the DS18b20, the pull-up\
    \ can likely be omitted, because it is already mounted on the breakout board.\
    \ For interfacing to the Arduino, we use ready-made libraries that encapsulate\
    \ the low-level interaction. Before using the libraries, we need to install the\
    \ OneWire and DallasTemperature libraries. An easy way is to use the library manager\
    \ of the Arduino IDE, which is accessible from the Sketch→Include Library→Manage\
    \ Libraries, where we enter the keywords OneWire and DallasTemperature. This displays\
    \ a list of supported libraries that can be installed directly from the menu.\
    \ After installation, we enter the following code, which shows a simple example.\n\
    \n```\ncpp\n// DS18b20 1-wire temperature sensor, V. Ziemann, 170120\n#include\
    \ <OneWire.h>\n#include <DallasTemperature.h>\nOneWire oneWire(2); //use pin D2\n\
    DallasTemperature sensors(&oneWire);\nvoid setup() {\n  Serial.begin(9600); while\
    \ (!Serial) {;}\n  sensors.begin();\n}\nvoid loop() {\n  sensors.requestTemperatures();\n\
    \  float temp=sensors.getTempCByIndex(0);\n  Serial.println(temp);\n}\n```"
  - "[PAGE 104]\n\n```\ndelay(1000);\n}\n```\n\nIn the sketch, we first include support\
    \ for the Onewire and DallasTemperature devices, and initialize the OneWire bus\
    \ using pin number 2, followed by the initialization of the DallasTemperature\
    \ sensors, to use the bus initialized in the previous statement. Note that we\
    \ can connect several temperature sensors in parallel on the same bus. In the\
    \ setup() function we only initialize serial communication and the sensor. The\
    \ code in the loop() function sends out the query to the connected sensors, which\
    \ causes them to send back their measurement values. In our example we only connect\
    \ a single DS18b20 such that we only can read out the temperature in Celsius from\
    \ the device number zero, and print the result to the serial line. After waiting\
    \ a second we repeat the procedure.\n\nThe HC-SR04 distance sensor, shown in Figure\
    \ 2.35, determines the distance to the nearest obstacle by emitting a short high-frequency\
    \ (non-audible) acoustic pulse when its trigger pin receives a short 10-μs-long\
    \ trigger pulse. Then it pulls the echo pin to low voltage and only returns it\
    \ to the high state once the echo is received. We therefore need to connect the\
    \ sensor with four wires (GND, 5V, Trig, Echo) to the Arduino, and need to measure\
    \ the duration of the echo pulse. This is accomplished in the following sketch.\n\
    \n```\n// HC-SR04 distance logger, V. Ziemann, 161204\nconst int trig=2, echo=3;\n\
    void setup() {\n  Serial.begin(9600); while (!Serial) {;}\n  pinMode(trig,OUTPUT);\n\
    \  pinMode(echo,INPUT);\n}\nvoid loop() {\n  float duration,distance;\n  digitalWrite(trig,LOW);\
    \ // make a 10 us trigger pulse\n  delayMicroseconds(2);\n  digitalWrite(trig,HIGH);\n\
    \  delayMicroseconds(10);\n  digitalWrite(trig,LOW);\n  duration=pulseIn(echo,HIGH);\
    \     // wait for echo\n  distance=100*duration*340e-6/2;  // in cm\n  Serial.println(distance);\n\
    \  delay(1000);\n}\n```\n\nIn the sketch, we first declare the constants with\
    \ the pins used in this sketch. The trigger pin of the sensor is connected to\
    \ pin 2 on the Arduino and the echo pin on the sensor to pin 3. In the setup()\
    \ function, we declare the serial line and whether the respective pins are used\
    \ as input or output. In the loop() function, we first declare the variables for\
    \ distance and duration and then create a 10-μs-long trigger pulse by writing\
    \ HIGH and LOW to the trigger pin, and wait a short time in between. Once the\
    \ trigger pulse is dispatched, we use the pulseIn() function to wait for the echo\
    \ pin to return to the HIGH state. The pulseIn() function returns the elapsed\
    \ time in microseconds such that 1000 μs correspond to a distance of about 0.17m,\
    \ or 17cm if we assume a value for speed of sound of 340 m/s and note that the\
    \ sound has to go back and forth from the sensor to the first obstacle. Then the\
    \ measured value is sent over the serial line to the host computer, and the whole\
    \ process is repeated after some delay. We note in passing that we can use the\
    \ pulseIn() function to measure the duration of short pulses in general."
  - "[PAGE 105]\n\nOutput pins of a rotary encoder carry a sine-like and a cosine-like\
    \ signal, respectively. We can determine whether the shaft is turned clockwise\
    \ or counterclockwise depending on whether the two pins are equal or not while\
    \ one of them changes on a falling edge, going from a HIGH to a LOW state. The\
    \ following code implements this method using interrupts. Using interrupts has\
    \ the advantage that the state of the pins does not have to be measured continuously\
    \ and compared, but an interrupt_handler is registered with a certain action,\
    \ in our case on a falling edge on the pin connected to the interrupt. The Arduino\
    \ has two pins, numbers 2 and 3, that have the interrupt functionality. But let\
    \ us look at the sketch first.\n\n```\n// Rotary encoder, V. Ziemann, 161205\n\
    const int pinA=2,pinB=4;\nvolatile int pos=0;\nvoid setup() {\n  Serial.begin(9600);\
    \ while (!Serial) {;}\n  pinMode(pinA,INPUT_PULLUP);\n  pinMode(pinB,INPUT_PULLUP);\n\
    \  attachInterrupt(0,interrupt_handler,FALLING);//0=pin2,1=pin3\n}\nvoid loop()\
    \ {\n  Serial.println(pos);\n  delay(1000);\n}\nvoid interrupt_handler() {\n \
    \ if (digitalRead(pinA)==digitalRead(pinB)){pos++;}else{pos--;}\n}\n```\n\nThe\
    \ sketch starts by declaring the used pins and a variable pos that contains the\
    \ encoder position. The variable is declared volatile, which instructs the compiler\
    \ that it can change asynchronously within the interrupt routine, and prevents\
    \ the compiler from optimizing it away, because it does not change in the main\
    \ program. In the setup() function we declare the serial line parameters and the\
    \ input pins with pull-up resistors enabled. One of the pins must be pin 2 or\
    \ 3, those with interrupt capability. The attachInterrupt() function is used to\
    \ connect a so-called callback function, here interrupt_handler. It is defined\
    \ at the end of the sketch. In our sketch we chose interrupt 0 (connected to pin\
    \ 2) to trigger the callback function interrupt_handler. We also specify that\
    \ the callback function is called on a FALLING edge on the interrupt pin. Instead\
    \ of hard coding the value 0 as the source of the interrupt, we can use the service\
    \ function digitalPinToInterrupt() that takes the pin number, 2 in our case, as\
    \ argument, such that the line reads\n\n```\nattachInterrupt(digitalPinToInterrupt(2),interrupt_handler,FALLING);\n\
    ```\n\ninstead. Using digitalPinToInterrupt() is the preferred way, because it\
    \ relieves the user of remembering which interrupt number is connected to which\
    \ pin. The loop() function is very simple and only writes the position of the\
    \ encoder shaft to the serial line once a second. Finally, we define the callback\
    \ function interrupt_handler, which increments the pos variable by one step if\
    \ the two encoder pins are equal and decrements otherwise. In this way, the sense\
    \ of rotation of the shaft is taken care of. We need to point out that we had\
    \ to use separate external pull-up resistors (10kΩ) to guarantee stable operation,\
    \ and in the sketch we may encounter a so-called race condition when the variable\
    \ pos changes while it is transmitted on the serial line.\n\nAfter the discussion\
    \ of interfacing the sensors, we now move on to investigate how to work with actuators,\
    \ such as switches, motors, or analog voltages."
- md: "## 4.5 INTERFACING ACTUATORS\n\nIn this section we discuss how to interface\
    \ the actuators discussed in Chapter 3 to the Arduino, and start with the simplest\
    \ actuator, the LED.\n\n### 4.5.1 Switching devices\n\nIn Section 4.3 we used\
    \ the `digitalWrite()` function to turn an LED on and off. If we connect a transistor,\
    \ Darlington driver, or H bridge to an output pin, we can use the same function\
    \ to handle larger current than the 20 mA the Arduino can drive. Consult the circuits\
    \ shown in Section 3.1.2 for details.\n\nDynamically adjusting the brightness\
    \ of an LED is achieved by pulse-width modulation, and that feature is available\
    \ on pins D3, D5, D6, D9, D10, and D11 on the UNO, which indicated by a tilde\
    \ written next to the pin on the board. We use the `analogWrite(pin,value)` function\
    \ that takes the pin number and a value between 0 and 255 (0 to 1023 on the ESP8266)\
    \ to adjust the duty cycle of the pulse-width modulated signal from completely\
    \ off to completely on. The switching frequency is between 500 and 1000 Hz, and\
    \ in Figure 4.12, we show an oscilloscope trace of the result of `analogWrite()`\
    \ to pin D9 of a UNO with values 88 and 220, respectively. The frequency of the\
    \ signal is about 490 Hz, and we see the length of the signal differing from about\
    \ 1/3 of the time at 5 V on the left to 5 V almost all the time on the right.\n\
    \nIn order to be able to manipulate actuators in the same way as the sensors,\
    \ we use the same query-response protocol to communicate the required actions\
    \ to the microcontroller. We want to use the convention that DWx 0 turns digital\
    \ pin number x off and DWx 1 turns it on, and that sending AWx nnn sets pulse-width\
    \ modulation on pin number x to value nnn. The code that achieves this is the\
    \ following:\n\n```cpp\n// Switching_and_pwm, V. Ziemann, 170614\nchar line[30];\n\
    void setup() {\n  pinMode(2,OUTPUT);\n  Serial.begin (9600);\n  while (!Serial)\
    \ {;}\n}\nvoid loop() {\n  if (Serial.available()) {\n    Serial.readStringUntil('\\\
    n').toCharArray(line,30);\n    if (strstr(line,\"DW2 \")==line) {\n      int val=(int)atof(&line[4]);\n\
    \      digitalWrite(2,val);\n    } else if (strstr(line,\"AW9 \")==line) {\n \
    \     int val=(int)atof(&line[4]);\n      analogWrite(9,val);\n    } else {\n\
    \      Serial.println(\"unknown\");\n    }\n  }\n}\n```\n\nwhere we first declare\
    \ the variable `line` that contains the characters received on the serial line.\
    \ In the `setup()` function, we only declare pin 2 as output, and initialize the\
    \ serial communication, exactly as before. In the `loop()` function, we use the\
    \ previously seen construction to parse the message received on the serial line\
    \ and perform some action, depending on the command received. If the command starts\
    \ with `DW2` we read the characters following the first 4 into the variable `val`\
    \ and pass `val` to the `digitalWrite()` function. Here we employ the same method\
    \ of using the `atof()` function to decode the rest of the character array `line[]`\
    \ that we first used in the sketch to interface the MCP23017 IO extender. We immediately\
    \ encounter the `atof` construction again when parsing the value received after\
    \ `AW9`. We then use it to set pin D9 to the desired value with the `analogWrite()`\
    \ function. In this way we have a simple mechanism to instruct the Arduino to\
    \ turn pins on and off and adjust those that have pulse width capability to the\
    \ desired duty factor.\n\nWe note that the code above does not contain graceful\
    \ handling of errors. For example, passing any value `val` received from the Serial\
    \ line to the `digitalWrite()` function when handling the `DW2` command can result\
    \ in weird behavior if `val` is not 0 or 1. Even a negative number could be written\
    \ to the pin, which is meaningless. Replacing that line by the following construction\
    \ will only write meaningful values to the pin. Implicitly, we use the convention\
    \ that 0 turns the pin off, and anything else turns it on.\n\n```cpp\n// digitalWrite(2,(int)val);\n\
    if ((int)val == 0) {\n  digitalWrite(2,LOW);\n} else {\n  digitalWrite(2,HIGH);\n\
    }\n```\n\nOf course, other ways of catching errors can be implemented, but that\
    \ goes beyond the scope of our presentation.\n\nTesting the above program with\
    \ a UNO is quickly done. In Figure 4.13 we show an implementation on a small breadboard.\
    \ Two cables connect the power lines to the circuit, where the ground signal connects\
    \ to the emitter of the NPN transistor. Here we use a BC547, but any small-signal\
    \ NPN transistor will work. The collector of the transistor is directly connected\
    \ to the cathode of the LED, and the anode of the LED is connected via a 220Ω\
    \ to the positive supply voltage. The base of the transistor is connected via\
    \ a 1kΩ resistor to the controlling pin, here pin D9, on the Arduino.\n\nThis\
    \ example covers the basic functionality of turning on and off, as well as controlling\
    \ the power delivered to a load, the LED. In the next example we use very similar\
    \ circuitry to control speed and direction of motors.\n\n### 4.5.2 DC motors\n\
    \nIf we only want to control the speed of a very small motor, we can replace the\
    \ LED and the 220 Ω resistor in the previous example by the motor. We also need\
    \ to add flyback diodes to prevent the back-emf from damaging the transistor.\
    \ For slightly larger motors, we need to use a transistor with a higher power\
    \ rating, such as a TIP-120 Darlington power transistor. The TIP-120 has a flyback\
    \ diode from emitter to collector already built in. Note that the performance\
    \ of larger transistors normally degrades at higher frequency. Inspection of the\
    \ datasheet, however, shows that this only affects frequencies well above 10 kHz.\n\
    \nIn Figure 4.14 we show the setup with a UNO controlling a small motor. The terminals\
    \ of the transistor are base, collector, and emitter, from left to right, and\
    \ the motor is connected between the collector and the supply voltage. The emitter\
    \ is directly connected to ground, and we include an external flyback diode (horizontally\
    \ mounted) between the motor leads, with the cathode pointing towards the right.\
    \ The vertically mounted diode illustrates the connection of the built-in diode.\
    \ We control the speed of the motor by pulse width modulating the base of the\
    \ transistor that is connected to pin D9 on the UNO via a 1 kΩ resistor.\n\nControlling\
    \ the speed is useful, but often we also need to control the direction of rotation;\
    \ for example, to drive a vehicle not only forward but also backward. The standard\
    \ way to accomplish this feature is by using an H bridge, as discussed in Chapter\
    \ 3. Here we use an L293D H bridge driver, which is called a *quadruple half-bridge\
    \ driver*, a term that becomes clear by considering the pin layout of the 16-pin\
    \ chip, shown in Figure 4.15. There are ground pins and two supply voltages, one\
    \ for logic levels and one to supply power to the motor. Then there are four (quadruple)\
    \ inputs with corresponding outputs. The circuit works in such a way as to translate\
    \ the logic level on the input pins to the corresponding output pins, which in\
    \ turn deliver the voltage level from the motor power supply to the motor. Thus,\
    \ setting input 1 to HIGH and input 2 to LOW connects one motor lead to the motor\
    \ supply voltage and the other to ground, which causes the motor to turn in one\
    \ direction. Setting input 1 to LOW and input 2 to HIGH will cause the converse,\
    \ and the motor will turn in the other direction. Two inputs and outputs therefore\
    \ provide the functionality of a single H bridge. Since there are four inputs\
    \ and outputs, we can use the L293D to implement two H bridges. Moreover, pin\
    \ 1 on the L293D can be used to enable the outputs of input 1 and 2. Applying\
    \ a pulse-width modulated signal to this pin will therefore work as speed control\
    \ for the motor. Pin 9 provides the same functionality for inputs 3 and 4. Finally,\
    \ we remark that the character *D* in L293D indicates that flyback protection\
    \ diodes are already built into the integrated circuit.\n\nWith the theoretical\
    \ background covered we are ready to build a motor controller with an L293D on\
    \ a breadboard, and control it with an Arduino UNO. We show the circuit in Figure\
    \ 4.16. The DC motor is shown on the left and the L293D is the only component\
    \ on the small breadboard. The orientation of the chip is the same as in Figure\
    \ 4.15, making the functionality easy to understand. The pin numbering goes from\
    \ top left (pin 1) to bottom left (pin 8), continuing via bottom right (pin 9)\
    \ to the top right (pin 16), which is the standard for most integrated circuits."
  mdcn: "## 4.5 执行器接口\n\n本节我们将讨论如何将第3章讨论的执行器与Arduino连接，并从最简单的执行器——LED开始。\n\n### 4.5.1\
    \ 开关器件\n\n在4.3节中，我们使用了`digitalWrite()`函数来开关LED。如果我们将晶体管、达林顿驱动器或H桥连接到输出引脚，就可以使用相同的函数来处理比Arduino能驱动的20mA更大的电流。具体电路请参考3.1.2节。\n\
    \n动态调节LED亮度是通过脉宽调制实现的，该功能在UNO的D3、D5、D6、D9、D10和D11引脚上可用，这些引脚在电路板上用波浪号标记。我们使用`analogWrite(pin,value)`函数，它接受引脚号和一个0到255之间的值（ESP8266上为0到1023）来调节脉宽调制信号的占空比，从完全关闭到完全开启。开关频率在500到1000\
    \ Hz之间，在图4.12中，我们展示了对UNO的D9引脚分别使用值88和220调用`analogWrite()`的示波器波形。信号频率约为490 Hz，我们可以看到信号长度从左侧约1/3时间处于5V，到右侧几乎全部时间处于5V。\n\
    \n为了能够像操作传感器一样操作执行器，我们使用相同的查询-响应协议将所需动作传达给微控制器。我们希望采用这样的约定：DWx 0关闭数字引脚x，DWx 1打开它；发送AWx\
    \ nnn将引脚x的脉宽调制设置为值nnn。实现此功能的代码如下：\n\n```cpp\n// Switching_and_pwm, V. Ziemann,\
    \ 170614\nchar line[30];\nvoid setup() {\n  pinMode(2,OUTPUT);\n  Serial.begin\
    \ (9600);\n  while (!Serial) {;}\n}\nvoid loop() {\n  if (Serial.available())\
    \ {\n    Serial.readStringUntil('\\n').toCharArray(line,30);\n    if (strstr(line,\"\
    DW2 \")==line) {\n      int val=(int)atof(&line[4]);\n      digitalWrite(2,val);\n\
    \    } else if (strstr(line,\"AW9 \")==line) {\n      int val=(int)atof(&line[4]);\n\
    \      analogWrite(9,val);\n    } else {\n      Serial.println(\"unknown\");\n\
    \    }\n  }\n}\n```\n\n其中我们首先声明了变量`line`，用于存储串口接收到的字符。在`setup()`函数中，我们仅将引脚2声明为输出，并初始化串口通信，与之前完全一样。在`loop()`函数中，我们使用之前见过的结构来解析串口接收到的消息，并根据接收到的命令执行相应操作。如果命令以`DW2`开头，我们读取前4个字符之后的字符到变量`val`，并将`val`传递给`digitalWrite()`函数。这里我们采用了与之前在连接MCP23017\
    \ IO扩展器的示例中相同的方法，使用`atof()`函数来解码字符数组`line[]`的其余部分。在解析`AW9`之后接收到的值时，我们再次遇到了`atof`结构。然后我们使用它通过`analogWrite()`函数将引脚D9设置为所需的值。通过这种方式，我们有了一个简单的机制来指示Arduino开关引脚，并将具有脉宽调制能力的引脚调整到所需的占空比。\n\
    \n我们注意到上述代码没有包含优雅的错误处理。例如，在处理`DW2`命令时，将串口接收到的任何值`val`传递给`digitalWrite()`函数，如果`val`不是0或1，可能会导致奇怪的行为。甚至可能将负数写入引脚，这是没有意义的。将该行替换为以下结构将只向引脚写入有意义的值。我们隐式地使用这样的约定：0关闭引脚，其他任何值打开引脚。\n\
    \n```cpp\n// digitalWrite(2,(int)val);\nif ((int)val == 0) {\n  digitalWrite(2,LOW);\n\
    } else {\n  digitalWrite(2,HIGH);\n}\n```\n\n当然，可以实现其他错误捕获方法，但这超出了我们讨论的范围。\n\n\
    使用UNO测试上述程序很快就能完成。在图4.13中，我们展示了一个在小型面包板上的实现。两根电缆将电源线连接到电路，其中地线信号连接到NPN晶体管的发射极。这里我们使用BC547，但任何小信号NPN晶体管都可以工作。晶体管的集电极直接连接到LED的阴极，LED的阳极通过一个220Ω电阻连接到正电源电压。晶体管的基极通过一个1kΩ电阻连接到Arduino上的控制引脚，这里是引脚D9。\n\
    \n这个例子涵盖了开关以及控制负载（LED）功率的基本功能。在下一个例子中，我们将使用非常相似的电路来控制电机的速度和方向。\n\n### 4.5.2 直流电机\n\
    \n如果我们只想控制一个非常小的电机的速度，我们可以将前一个例子中的LED和220Ω电阻替换为电机。我们还需要添加续流二极管以防止反电动势损坏晶体管。对于稍大的电机，我们需要使用功率额定值更高的晶体管，例如TIP-120达林顿功率晶体管。TIP-120内部已经集成了从发射极到集电极的续流二极管。请注意，较大的晶体管性能通常在较高频率下会下降。然而，查阅数据手册显示，这只影响远高于10\
    \ kHz的频率。\n\n在图4.14中，我们展示了使用UNO控制小型电机的设置。晶体管的引脚从左到右依次是基极、集电极和发射极，电机连接在集电极和电源电压之间。发射极直接接地，我们在电机引线之间包含一个外部续流二极管（水平安装），阴极指向右侧。垂直安装的二极管说明了内置二极管的连接方式。我们通过脉宽调制连接到UNO引脚D9（通过1kΩ电阻）的晶体管基极来控制电机速度。\n\
    \n控制速度很有用，但通常我们还需要控制旋转方向；例如，驱动车辆不仅要前进，还要后退。实现此功能的标准方法是使用H桥，如第3章所述。这里我们使用L293D\
    \ H桥驱动器，它被称为*四路半桥驱动器*，这个术语通过考虑图4.15所示的16引脚芯片的引脚布局就变得清晰了。有接地引脚和两个电源电压，一个用于逻辑电平，一个为电机供电。然后有四个（四路）输入和相应的输出。电路的工作方式是将输入引脚上的逻辑电平转换为相应的输出引脚，输出引脚再将电机电源电压提供给电机。因此，将输入1设置为高电平，输入2设置为低电平，会将一个电机引线连接到电机电源电压，另一个接地，这会使电机向一个方向转动。将输入1设置为低电平，输入2设置为高电平会导致相反的情况，电机将向另一个方向转动。因此，两个输入和输出提供了单个H桥的功能。由于有四个输入和输出，我们可以使用L293D实现两个H桥。此外，L293D上的引脚1可用于使能输入1和2的输出。因此，向该引脚施加脉宽调制信号将作为电机的速度控制。引脚9为输入3和4提供相同的功能。最后，我们注意到L293D中的字符*D*表示续流保护二极管已经内置在集成电路中。\n\
    \n掌握了理论背景，我们就可以在面包板上使用L293D构建电机控制器，并用Arduino UNO控制它。我们在图4.16中展示了电路。直流电机显示在左侧，L293D是小型面包板上唯一的组件。芯片的方向与图4.15相同，使功能易于理解。引脚编号从左上角（引脚1）到左下角（引脚8），然后通过右下角（引脚9）到右上角（引脚16），这是大多数集成电路的标准。"
