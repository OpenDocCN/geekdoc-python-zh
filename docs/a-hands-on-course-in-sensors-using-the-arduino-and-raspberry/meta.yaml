- md: '## 2.2.3 滤波器


    滤波器的任务是从电信号中移除某些频率，例如所有高频，此时该滤波器称为低通滤波器。一个例子是移除音频信号中“嘶嘶”声的低通滤波器。相反的滤波器是高通滤波器，它移除低频。一个例子是老式黑胶唱片播放器中的抗隆隆声滤波器。如果我们知道所需信号只包含某个频率范围，并且我们希望移除所有其他频率，我们使用带通滤波器。一个例子是基于超外差原理的收音机中的中频滤波器。最后，还有只移除窄带频率的滤波器。它们称为带阻或陷波滤波器。一个例子是移除来自电网的无处不在的50
    Hz或60 Hz嗡嗡声的滤波器。


    我们首先考虑一个*低通滤波器*，其最简单的形式是由一个电阻（阻值为 $R$）和一个电容（电容值为 $C$）构成的频率相关分压器，如图2.22左侧所示。关于电路理论基本概念（如阻抗）的复习，请参阅附录A。在我们的电路中，电容的阻抗为
    $1/i\omega C$，它随着频率 $\omega = 2\pi f$ 的增加而减小。直观地说，较高的频率被短路到地。如果我们按照图2.22左侧所示构建一个分压器，输出电压
    $V_{out}$ 由 $V_{out} = (V_{in}/i\omega C)/(R + 1/i\omega C) = V_{in}/(1+i\omega
    RC)$ 给出，我们看到它随着频率 $\omega$ 的增加而衰减，反之，


    低频不受影响，因此得名低通滤波器。信号幅度衰减 $\sqrt{2}$ 倍的频率由 $\omega_c = 2\pi f_c = 1/RC$ 给出，虚数单位
    $i$ 表示输入和输出电压之间存在相位差，该相位差取决于频率。等效地，低通滤波器也可以用电感（阻抗为 $i\omega L$）和电阻 $R$ 构建，但在许多实际操作中，电感的值难以找到；因此滤波器通常由电阻和电容构成。滤波器的频率依赖性渐近表现为
    $\omega$ 的第一逆幂次，因此该滤波器称为单极点滤波器。级联两个这样的滤波器会产生双极点低通滤波器，其频率依赖性更陡峭，为 $1/\omega^2$。


    将低通滤波器中的电阻和电容互换，就得到了图2.22右侧所示的高通滤波器，其频率依赖性为 $i\omega RC/(1 + i\omega RC)$，由于分子中的
    $\omega$ 因子，它衰减低频，并且当 $\omega \gg \omega_c = 1/RC$ 时趋近于1。


    如果我们想滤除除一个小频率范围之外的所有内容，我们需要一个带通滤波器，我们可以通过组合一个低通和一个高通滤波器来最轻松地构建，如图2.23左侧所示。在这里，我们必须确保初始低通滤波器的截止频率
    $1/R_1C_1$ 高于高通滤波器的截止频率 $1/R_2C_2$。


    如果我们需要抑制某个干扰频率，我们实现一个带阻或陷波滤波器，如图2.23右侧所示。电感 $L$ 和电容 $C$ 的组合在频率 $\omega_c^2 = 1/LC$
    处发生谐振，此时它们的串联电阻


    消失，并且接近此频率的信号被短路到地，不会传递到输出。


    到目前为止讨论的滤波器是无源滤波器，仅依赖于电阻、电容和电感，并且只能衰减不需要的频率。然而，有时我们需要将信号的放大与滤波结合起来。最简单的解决方案是在滤波器之后立即放置一个运算放大器。或者，可以在放大器的反馈支路中包含一个电容，如图2.24所示。


    在滤波器设计方面有大量的专业知识，包括无源和有源滤波器，这些都记录在文献中。有关实用概述，请参见[20]。


    ## 2.2.4 模数转换


    通常我们希望将模拟信号转换为数字格式，以便在计算机上处理它们。实现这一功能的设备是模数转换器（ADC），它可以被概念化理解为一个非常快速的电压表。它由一个采样保持电路组成，该电路在电压被测量和数字化期间保持电压恒定，使用多种不同的工作原理。


    在*闪速ADC*中，电压表基于大量比较器，这些比较器将电压与从电阻梯形网络导出的一系列电压进行比较。一个额外的电路将比较器的输出编码为二进制表示。由于所有比较器并行工作，闪速ADC以最高的转换速率运行，超过每秒
    $10^9$ 个样本。然而，这种高转换速率是有代价的，因为对于 $n$ 位的分辨率，需要 $2^n$ 个比较器。我们在图2.25中说明了3位闪速ADC的工作原理。左侧有参考电压
    $V_{ref}$、待转换电压 $V_{in}$ 和时钟信号的输入。首先，输入电压在转换期间在采样保持电路中保持恒定，该电路由一个开关和一个小的保持电容组成。用于比较的电压由顶部的电阻分压器产生。来自分压器的电压被路由到比较器的负输入端。所有比较器随后同时比较采样保持的输入电压。比较器的输出连接到优先编码器的输入，优先编码器将其转换为输出引脚
    $A_0$、$A_1$ 和 $A_2$ 上的3位二进制表示。转换过程以及采样和编码的同步操作由外部提供的时钟信号协调。闪速ADC通常提供8位或更低的分辨率，并且相对昂贵。为了以较低的速率采样，我们可以使用更便宜的ADC，例如下一段讨论的那些。


    *逐次逼近ADC*以较低的成本提供更高的分辨率（更多位数），尽管转换速率较低。它们用更少的比较器取代了电阻梯形网络和大量的'
