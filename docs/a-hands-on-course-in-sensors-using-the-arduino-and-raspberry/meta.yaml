  md: "In the loop() function we first let the web server and the websocket interface\
    \ handle their events and then check whether the info_available flag is set, in\
    \ which case we send the JSON-formatted message that is stored in the info_buffer\
    \ to the browser. Likewise, if output_ready is set, we first clear and then assemble\
    \ a DynamicJsonDocument named doc. We call it ADC and add the measurement values\
    \ stored in samples before converting this JSON-formatted message into the character\
    \ array out that we send to the browser.\n\n```\nvoid loop() {\n  server2.handleClient();\n\
    \  webSocket.loop();\n  if (info_available==1) {\n    info_available=0;\n    webSocket.sendTXT(websock_num,info_buffer,strlen(info_buffer));\n\
    \  }\n  if (output_ready==1) {\n    output_ready=0;\n    doc.to<JsonObject>();\
    \  // clear DynamicJsonDocument doc\n    for (int k=0;k<3;k++) {doc[\"ADC\"][k]=samples[k];}\n\
    \    serializeJson(doc,out);\n    webSocket.sendTXT(websock_num,out,strlen(out));\n\
    \  }\n  yield();\n}\n```\n\nWith the ESP32 programmed, we now turn to the webpage\
