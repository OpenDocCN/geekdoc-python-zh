    # Host Computer: Raspberry Pi


    The Raspberry Pi [11] is a small single-board computer that first appeared in
    2012, with the intention of providing an inexpensive platform to introduce students
    and other interested parties to computers in general and to programming in particular.


    ## 5.1 HARDWARE


    Since its first appearance, the Raspi went through several hardware revisions.
    The smaller board on the bottom left in Figure 5.1 is a Pi Zero with 512 MB of
    RAM and no Ethernet port. This makes it too limited for our purpose. Instead we
    use the most recent incarnation, model 4, which appeared in February 2019. It
    is available in two form factors, the classical version 4B, shown on the bottom
    right in Figure 5.1 and the newer version 400, which has a built-in keyboard,
    shown on the top. Both feature quad-core ARM central-processing units (CPU) operating
    at speeds up to 1.8 GHz and have between 2 and 8 GB RAM memory on board. This
    hardware is sufficiently powerful to run a full-fledged Linux system. An external
    and replaceable micro-SDHC card (at least 16 GB and speed class 10) serves as
    a hard disk to hold the operating system and user files. For our purposes 2 or
    4 GB RAM are adequate; also the previous version 3B works fine.


    But beyond the CPU, the Raspberry Pi 4B and 400 sport a video processor that can
    display videos at 4k resolution (up to 3840 × 2160) via two built-in micro HDMI-connectors.
    Audio output is available either via the HDMI connectors or via a 3.5-mm headphone
    jack. Moreover, there are two USB-2 and two USB-3 ports on board to connect peripheral
    components, such as USB sticks, keyboard, mice, or web cameras. Communication
    with the outside world is feasible via a built-in wired Ethernet port, and since
    version 3, the Raspi has built-in Bluetooth and WiFi in the 2.4 GHz and on the
    4B even in 5 GHz frequency bands (802.11ac).


    The Raspis are very attractive due to their built-in low-level peripherals. There
    are 17 general-purpose input-output (GPIO) pins exposed on the board, some of
    which support I2C, SPI, and UART (RS-232-like) communication. Moreover, a specific
    audio bus (I2S) is available, as well as a high-speed CSI interface to connect
    the tailor-made Raspberry Pi camera, and a DSI interface to connect LCD panels.
    Some of these features can be used to implement the same functionality as on the
    Arduino, but we will not use that here, but rather use the Raspi as a standardized
    host computer system.


    ![](img/8f23875c54d5b3177d5d2a5bba06b37e_138_0.png)


    Figure 5.1 Raspberry Pi 400 (top), version 4B (bottom right), and version Pi Zero
    (bottom left).


    ## 5.2 GETTING STARTED


    The CPU and peripherals are adequate for using a Raspi as media center via the
    *LibreElec* distribution, which runs the *KODI* media center software and turns
    a dumb TV into a smart TV. There is the *OpenWRT* distribution that turns the
    Raspi into an Internet router including firewall functionality. Other software
    packages turn it into a retro-gaming console or into a network-addressed storage
    (NAS) server. Apart from these special-purpose uses, we can also install a general-purpose
    Linux operating system on the SDHC card from which we boot the Raspi. Different
    flavors of Linux are available, such as Ubuntu, Fedora, or OpenSuse, but the standard
    system that we use in the remainder of this book is based on the Debian distribution
    and is called *Raspberry Pi OS* or *Raspbios*. Over the years, a large number
    of books, such as [24], were published with recipes of how to use the Raspi in
    many circumstances. Use those and others to complement the discussion in this
    book.


    We find download instructions for the Raspberry Pi OS operating system on the
    [https://www.raspberrypi.org/software](https://www.raspberrypi.org/software) web
    page, from where the **rpi-imager** program can be downloaded for all common desktop
    operating systems. A link on the page points to a short video tutorial about using
    the imager. Follow the instructions and have a little patience while the imager
    downloads the selected image of the Raspi operating system and then copies it
    to the SD card. In most cases the 32-bit image with all recommended software is
    a good choice, though with a size of 2.7 GB the download is rather large. Optionally,
    on Linux systems, it is also possible to manually download the operating system
    image from a link further down on the web page, use the **unxz** program to unpack
    it, and then copy the image file to the SD card by issuing the command


    ```

    dd bs=4M if=2022-09-22-raspios-bullseye-armhf-full.img of=/dev/sdX

    ```


    as user **root**. We may have to prepend the dd (disk-duplicator) command by **sudo**
    depending on the flavor of Linux on the desktop computer. In the dd command, the
    destination, the output file /dev/sdX, must be the device file of the SD card.
    We can easily determine it by inspecting the system log file after inserting the
    SD card in the writer. Just before the end of the log file a recently inserted
    card is typically referenced as /dev/sdX, with X being c or d or e. We must make
    sure to use the correct drive! Picking the wrong one could erase the harddisk
    of our desktop system. If unsure, we carefully follow the instructions in the
    installation help, which are more extensive than those given here. Once the dd
    command completes, which can take up to 30 minutes, depending on the SD card writer,
    we insert the SD card into the slot on the Raspi, connect a monitor to the HDMI
    connector, mouse and keyboard to USB connectors, and apply power via the USB-C
    connector to boot the Raspi.


    When booting the first time the Raspi automatically expands the operating system
    image on the SD card to use all available space and it generates secret keys that
    are later used in encrypted communication before it reboots. During the second
    boot it asks about the localization, especially country, timezone, and keyboard
    layout as well as a username for the standard user. Here, in order to be consistent
    with the first edition of this book, I choose the username pi and a secret password.
    In later steps the WLAN is configured, the software is brought up to date, and
    finally it reboots.


    Once the Raspi comes up again we are directly logged into the desktop system,
    without a password being asked. We can change this behavior by starting the *Raspberry
    Pi Configuration* program which resides behind the Raspberry icon in the Menu
    list on the top of the screen and under *Preferences*. In the *System* tab we
    can change the login behavior though I usually keep the default if the Raspi is
    in a safe location. I usually change the *hostname* to something memorable, such
    as *sensorpi*. In the *Interface* tab I recommend to enable *ssh*. We later use
    this functionality to connect to our Raspi from other computers.


    At this point we have a running Raspios Linux system on our Raspi, and it is time
    to explore it by selecting the Menu button with the raspberry image on it. There
    we find all available programs, sorted according to groups such as *Programming*,
    with links to Java, Python, and Mathematica. The group *Office* contains links
    to the Libreoffice programs for word processing, spreadsheet, and presentation
    creation. Behind the *Internet* menu item, there are links to the Internet browser
    and mail client. Moreover, there are menu items for *Games*, *Accessories* and
    *Preferences*. The latter, shown in Figure 5.2, contains links to the *Raspberry
    Pi Configuration* and other configuration options. The *Accessory* menu contains
    a link to the *Terminal* program that provides a console to enter commands. We
    will use it extensively in later sections, but here are a few basic commands that
    are useful to know. When we open the terminal window, we are placed in the home
    directory of user pi, namely /home/pi, which we can verify by entering the command
    `pwd` to “print the working directory.” We can list its contents by entering the
    `ls` command, or its long form `ls -l`, which displays all files and subdirectories
    in the present directory. In order to enter a subdirectory we use the `cd <dirname>`
    command to change the working directory to <dirname>. The command `cd ..` takes
    us back to the directory where we started. If we want to navigate to a directory
    for which we only know the absolute name that starts with a slash, such as /usr/local,
    we use `cd /usr/local`. We should play around with the programs and test them
    to familiarize ourselves with the new Raspi system. Either type the commands on
    the command line or click on the programs in the menus and explore. Finally, there
    is the *Preferences* menu item with programs to customize the Raspi. It contains,
    among other programs, the *Raspberry Pi Configuration* we used earlier to enable
    *ssh*.


    In the menu list, next to the Menu button with the raspberry on it, there are
    quick-start buttons for several programs, such as an Internet browser, file manager,
    and a *Terminal*. Programs can be added to this area by right-clicking on the
    menu list and selecting *Add/Remove Panel Items*. In the window that appears,
    we highlight **Application Launch Bar** and click on *Preferences*. On the left-hand
    side of the window, the programs already present in the quick-launch area are
    listed. From the right-hand side we can add programs from a list of all applications
    installed on the computer. If the *Terminal* program is missing from the Quick
    launch area, we add it from the *Accessory* group, because we will use it a'
