    \ SPO2 live</OPTION>\n    <OPTION value=\"6\">AD5933 Calibrate</OPTION>\n    <OPTION\
    \ value=\"7\">AD5933 Frequency sweep</OPTION>\n    <OPTION value=\"8\">AD5933\
    \ at 50kHz</OPTION>\n    <OPTION value=\"100\">List directory</OPTION>\n    <OPTION\
    \ value=\"101\">Remove data file</OPTION>\n```"
  - "[PAGE 263]\n\n![](img/8f23875c54d5b3177d5d2a5bba06b37e_263_0.png)\n\nFigure 15.2\
    \ The raw signal of the IR diode from the pulse oximeter (left) and an electrocardiogram\
    \ (right) with the pulses generated by the simulator.\n\n```\n<OPTION value=\"\
    200\">Recording ON</OPTION>\n<OPTION value=\"201\">Recording OFF</OPTION>\n<OPTION\
    \ value=\"202\">Replay recording</OPTION>\n<OPTION value=\"300\">Start ECG output</OPTION>\n\
    <OPTION value=\"301\">Stop ECG output</OPTION>\n</SELECT>\n<A id='ip'>IP address</A>\n\
    :\n```\n\nAt the end of `<SCRIPT>` in `medisense.html` we define the function\
    \ `sendSpecialCommand()` with the following command that resembles the callback\
    \ function for the menu to select the time.\n\n```\nfunction sendSpecialCommand(v)\
    \ {\n  toStatus(\"Special Command \" + v + \" \");\n  websock.send(JSON.stringify({\
    \ \"cmd\" : \"MMODE\", \"val\" : v }));\n}\n```\n\nFinally, as a convenience,\
    \ we provide a JavaScript function that displays the pixel values where the mouse\
    \ is clicked on the `displayarea` that shows the traces of measurement values.\
    \ We use the method `addEventListener()` to register the callback function `showCoordinates()`,\
    \ which displays the mouse coordinates in the status line below `displayarea`.\
    \ Note that we use the lower-left corner as origin of the coordinate system.\n\
    \n```\ndocument.getElementById(\"displayarea\")\n    .addEventListener('mousedown',showCoordinates,\
    \ false);\nfunction showCoordinates(event) {\n  rect=document.getElementById(\"\
    displayarea\").getBoundingClientRect();\n  toStatus(\"Mouse position: \" + (event.clientX-rect.left)\
    \ + \" \"\n           + (rect.height-event.clientY+rect.top));\n}\n```\n\nThe\
    \ rest of `medisense.html` is a straight copy of `esp32-daq.html` from [Chapter\
    \ 13](#). Please inspect the complete file listing that is available from this\
    \ book's github site. Once the code is ready, we upload the sketch to the NodeMCU,\
    \ place `medisense.html` into the data subdirectory of the sketch, and upload\
    \ it to the NodeMCU with the command *ESP8266 Sketch Data Upload* that is available\
    \ under the *Tools* menu of the Arduino IDE. Please refer to [Chapter 8](#) about\
    \ installing the uploader."
- md: "Once the system is up and running, the NodeMCU connects to the **messnetz**\
    \ WLAN spanned by the Raspi such that we access its web page by starting a browser\
    \ on the Raspi or any other computer connected to **messnetz**. We then direct\
    \ the browser to the IP number of the NodeMCU and receive the **medisense.html**\
    \ page in return. After placing a finger on the pulse oximeter, we select **Oximeter\
    \ SP02** which causes the value of SPO2 and the heart rate to be shown on the\
    \ status line below the display area every few seconds. Observing the raw signals\
    \ from the phototransistor illuminated by the infrared diode, we select **Oximeter\
    \ IR live** from the selection menu on the right and then press the **Start**\
    \ button. This starts the acquisition and after a few seconds during which the\
    \ systems determines the pedestal, we see the signal appearing in the **displayarea**.\
    \ It is similar to the one shown on the left-hand side in **Figure 15.2**. Recording\
    \ the signals is accomplished by selecting **Recording ON** before selecting **Oximeter\
    \ IR live** and pressing **Start**. To stop recording, we first **Stop** the acquisition\
    \ before selecting **Recording OFF** and watch it with **Replay recording**. Note\
    \ that we minimized the section labeled **Input output** on the webpage by clicking\
    \ on the little triangle next to the text.\n\nAfter connecting the three electrodes\
    \ on the cable from the AD5933 to the corresponding wires (RL, RA, and LA) from\
    \ the simulator, selecting **ECG live**, and pressing the **Start** button, the\
    \ ECG shown on the right-hand side in **Figure 15.2** appears on the display.\
    \ We clearly see the narrow spike that signals the start of the heart's contraction\
    \ and two smaller pulses, one on its left and one on its right. They indicate\
    \ different stages of the complex process that a heart performs more than a billion\
    \ times in a lifetime. Analyzing the traces further is beyond the scope of this\
    \ book and requires special medical training.\n\nIn order to illustrate measurements\
    \ of bioimpedance we simulate the impedance of the human body – typically between\
    \ 500 Ω and 1 kΩ – with an electronic analog, called the *Cole model*, shown on\
    \ the bottom left in **Figure 15.1** and, in more detail, in **Figure 15.3**.\
    \ It consists of a 680 Ω resistor, which simulates the resistance of the extra-cellular\
    \ fluids in the body. Connected in parallel, a 1 kΩ resistor and a 2.2 nF capacitor\
    \ simulates the resistance of the intra-cellular fluids and the capacitance of\
    \ cell membranes, respectively. In order to limit the current though the “body”,\
    \ we place a 10 kΩ resistor in series with the output from pin 1 of the MCP6002\
    \ op-amp. Before measuring the impedance, we calibrate the system by shorting\
    \ the Cole circuit, such that only the 10 kΩ resistor connects the output of the\
    \ op-amp to the input on pin 5 of the AD5933. Then we reconnect the Cole circuit\
    \ as shown in **Figure 15.1** and sweep the AD5933, which results in the plot\
    \ shown in **Figure 15.4**. The horizontal scale covers the frequency range between\
    \ 10 kHz and 112.4 kHz. The vertical scale covers zero to 1 kΩ. We see that the\
    \ absolute value starts close to 680 Ω – click at the point and convert the pixel\
    \ value back to Ohm (Ω) – at low frequencies and drops to 460 Ω at high frequencies,\
    \ which is consistent with simple circuit analysis. The second trace\n\n![](img/8f23875c54d5b3177d5d2a5bba06b37e_264_0.png)\n\
    \nFigure 15.3 The schematics of the Cole model with the 680 Ω resistor modeling\
    \ the resistance of the extra-cellular fluids, the 2.2 nF capacitor modeling the\
    \ impedance of the cell membranes, and the 1 kΩ resistor modeling the resistance\
    \ of intra-cellular fluids. The dashed resistor limits the current through the\
    \ “body.”\n\n![](img/8f23875c54d5b3177d5d2a5bba06b37e_265_0.png)\n\nFigure 15.4\
    \ The measured impedance of the Cole model from [Figure 15.3](#).\n\nshows the\
    \ phase, which hardly changes, because it is dominated by the large real part\
    \ of the 10 kΩ current-limiting resistor. The front end with an op-amp wired as\
    \ a line buffer limits the resolution, which can be improved by using separate\
    \ connections to feed the current to the unknown impedance and for measuring the\
    \ voltage drop. A circuit with a so-called *Howland current source* and a separate\
    \ instrumentation amplifier, as discussed for example in [32], will help.\n\n\
    After this excursion into medical matters, let us get back to physics and measure\
    \ the width of a laser beam.\n\n## QUESTIONS AND PROJECT IDEAS\n\n1.  Find out\
    \ how features of electrocardiograms are related to actions of the heart.\n2.\
    \  Place colored but mostly transparent films between your finger and the MAX30102\
    \ pulse oximeter. Observe how it affects the raw signals and the SPO2 value.\n\
    3.  Use basic circuit theory to analyze the Cole model from [Figure 15.3](#).\n\
    4.  Find out the differences and benefits of a four-terminal impedance measurement\
    \ over a two-terminal impedance measurement using only two wires like we do in\
    \ this chapter.\n5.  Consult [32] and build a better analog front end for the\
    \ AD5933.\n6.  In order to reduce noise in the raw calibration data, fit a quadratic\
    \ polynomial to the calibration data (see Appendix B) and later use it like we\
    \ did in the octave script in [Chapter 12](#), instead of using the raw data points\
    \ at every frequency.\n7.  Add an MLX90614 thermometer to the circuit in order\
    \ to make contact-free measurements of the body’s temperature.\n8.  Measure the\
    \ impedance between the ends of a banana. Experiment with different types of electrodes.\n\
    9.  Determine the impedance of a piece of wood. How much does it change when the\
    \ wood gets wet?\n10. Port the software to the ESP32.\n11. Connect the AD5933\
    \ to an ESP-01 controller in order to make it the system portable.\n12. Likewise,\
    \ connect the MAX30102 and the MLX90614 to an ESP-01 controller.\n13. The ESP-01\
    \ does not expose the built-in ADC to an external pin. Discuss how to interface\
    \ the AD8232 anyway and then build the circuit.\n\n## Example: Profile of a Laser\
    \ Beam\n\nIn this example we measure the transverse profile of the laser beam\
    \ from a laser pointer by carefully moving an obstacle across the beam and observing\
    \ the change of the signal from a photoresistor. Figure 16.1 illustrates the method.\
    \ We use a laser module from a sensor kit that is mounted on a breadboard and\
    \ exposes two wires, one for ground and one for the positive supply voltage. In\
    \ order to adjust the intensity of the laser, we use pulse-width modulation of\
    \ the positive supply voltage. The sensor is a voltage divider consisting of a\
    \ light sensitive resistor (LDR) and a 10 kΩ resistor. The obstacle is made of\
    \ a piece of black plastic. As translation stage, we use the frame salvaged from\
    \ an old CD-ROM drive, which moves a small wagon with a stepper motor back and\
    \ forth over a distance of about 40 mm, which is approximately the width of the\
    \ readable area of a CD. The stepper motor drives a spindle, and that pulls and\
    \ pushes the wagon with good precision.\n\nFigure 16.2 shows the salvaged frame\
    \ from the CD drive. The frame has plenty of holes, which are convenient to add\
    \ screws that in turn are used to attach laser, sensor, and obstacle. The laser\
    \ on its small breakout board is located at the top right with the stepper motor\
    \ beneath and hidden from view, but the spindle is clearly visible, running right\
    \ to left near the top of the frame. There it engages the white plastic part that\
    \ is attached to the wagon and moves it, when the motor turns. On the wagon there\
    \ is a black piece of plastic visible that intercepts the laser beam and prevents\
    \ the laser from hitting the LDR on the lower right on the frame. The LDR is also\
    \ mounted on a small breakout board that is part of a sensor kit. We use it because\
    \ the mounting holes make assembly and attaching the LDR to the screws on the\
    \ frame easy. As controller we use an Arduino UNO that drives the motor\n\n![](img/8f23875c54d5b3177d5d2a5bba06b37e_267_0.png)\n\
    \n![](img/8f23875c54d5b3177d5d2a5bba06b37e_268_0.png)\n\nFigure 16.2 The chassis\
    \ from the CD-ROM drive with the laser mounted on the top right and the photoresistor\
    \ on the bottom right. The black obstacle is mounted on the carriage that can\
    \ be moved via the spindle on the top by a small stepper motor that is located\
    \ below the laser.\n\nwith an L293D H-bridge driver, uses pulse-width modulation\
    \ on pin D9 to control the laser power, and reads the signal from the voltage\
    \ divider with the LDR on analog input A0. Figure 16.3 shows the schematics. We\
    \ use an external power supply to provide the voltage for the stepper motor that\
    \ is connected to the terminals labeled PA,...,PD.\n\nThe next task is to program\
    \ the UNO to control the power of the laser, move the stepper motor, and read\
    \ the sensor, all in a well-orchestrated fashion. We base the sketch on the program\
    \ to drive a stepper motor with an H bridge from Section 4.5.4 and augment the\
    \ code with sections for the laser and the sensor, as shown below.\n\n```c\n//\
    \ Laser profile measurement, V. Ziemann, 170628\nchar line[30];\nint settle_time=2,\
    \ stepcounter=0;\nint laser_power=10;\nconst int PA=2,PB=3,PC=4,PD=5,ENABLE=6;\n\
    const int LASER=9;\nvoid set_coils_fullstep(int istep) { //........set_coils\n\
    \  bool patA[]={1,1,0,0};\n  int pat_length=4;\n  int ii;\n  istep=istep % pat_length;\n\
    \  if (istep < 0) istep+=pat_length;\n  digitalWrite(PA,patA[istep]);\n  ii=(istep+2)\
    \ % pat_length;\n  digitalWrite(PB,patA[ii]);\n  ii=(istep+3) % pat_length;\n\
    ```"
  mdcn: "一旦系统启动并运行，NodeMCU会连接到由树莓派建立的**messnetz**无线局域网，这样我们就可以通过在树莓派或任何其他连接到**messnetz**的计算机上启动浏览器来访问其网页。然后，我们将浏览器定向到NodeMCU的IP地址，并接收到**medisense.html**页面。将手指放在脉搏血氧仪上后，我们选择**Oximeter\
    \ SP02**，这将导致SPO2值和心率每隔几秒在显示区域下方的状态栏中显示。观察由红外二极管照射的光电晶体管的原始信号，我们从右侧的选择菜单中选择**Oximeter\
    \ IR live**，然后按下**Start**按钮。这将开始数据采集，在系统确定基线几秒钟后，我们看到信号出现在**displayarea**中。它类似于**图15.2**左侧所示的信号。通过在选择**Oximeter\
    \ IR live**并按下**Start**之前选择**Recording ON**来完成信号记录。要停止记录，我们首先**Stop**采集，然后选择**Recording\
    \ OFF**，并使用**Replay recording**进行回放。请注意，我们通过点击文本旁边的小三角形最小化了网页上标记为**Input output**的部分。\n\
    \n将AD5933电缆上的三个电极连接到模拟器对应的导线（RL、RA和LA）后，选择**ECG live**并按下**Start**按钮，**图15.2**右侧所示的心电图就会出现在显示屏上。我们清楚地看到表示心脏收缩开始的窄尖峰，以及其左右两侧的两个较小的脉冲。它们指示了心脏在其一生中执行超过十亿次的复杂过程的不同阶段。进一步分析这些轨迹超出了本书的范围，需要专门的医学培训。\n\
    \n为了说明生物阻抗的测量，我们使用一个称为*科尔模型*的电子模拟器来模拟人体的阻抗——通常在500 Ω到1 kΩ之间，如**图15.1**左下角所示，并在**图15.3**中更详细地展示。它由一个680\
    \ Ω电阻组成，模拟体细胞外液的电阻。并联连接的是一个1 kΩ电阻和一个2.2 nF电容，分别模拟细胞内液的电阻和细胞膜的电容。为了限制通过“身体”的电流，我们在MCP6002运算放大器引脚1的输出端串联一个10\
    \ kΩ电阻。在测量阻抗之前，我们通过短路科尔电路来校准系统，使得只有10 kΩ电阻将运算放大器的输出连接到AD5933的引脚5输入端。然后，我们按照**图15.1**所示重新连接科尔电路，并扫描AD5933，结果得到**图15.4**所示的图表。水平刻度覆盖10\
    \ kHz到112.4 kHz的频率范围。垂直刻度覆盖0到1 kΩ。我们看到绝对值在低频时接近680 Ω——点击该点并将像素值转换回欧姆（Ω）——在高频时降至460\
    \ Ω，这与简单的电路分析一致。第二条轨迹\n\n![](img/8f23875c54d5b3177d5d2a5bba06b37e_264_0.png)\n\
    \n图15.3 科尔模型的原理图，其中680 Ω电阻模拟细胞外液的电阻，2.2 nF电容模拟细胞膜的阻抗，1 kΩ电阻模拟细胞内液的电阻。虚线电阻限制通过“身体”的电流。\n\
    \n![](img/8f23875c54d5b3177d5d2a5bba06b37e_265_0.png)\n\n图15.4 从[图15.3](#)测量的科尔模型阻抗。\n\
    \n显示了相位，它几乎没有变化，因为它主要由10 kΩ限流电阻的大实部决定。使用运算放大器作为线路缓冲器的前端限制了分辨率，这可以通过使用单独的连接来向未知阻抗馈送电流和测量电压降来改善。一个带有所谓的*霍兰电流源*和单独仪表放大器的电路，例如在[32]中讨论的，将有所帮助。\n\
    \n在探讨了医学问题之后，让我们回到物理学，测量激光束的宽度。\n\n## 问题与项目构想\n\n1.  了解心电图的特征与心脏动作之间的关系。\n2. \
    \ 在你的手指和MAX30102脉搏血氧仪之间放置彩色但大部分透明的薄膜。观察它如何影响原始信号和SPO2值。\n3.  使用基本电路理论分析[图15.3](#)中的科尔模型。\n\
    4.  了解四端阻抗测量与本章中使用的仅使用两根导线的两端阻抗测量的区别和优势。\n5.  参考[32]并为AD5933构建一个更好的模拟前端。\n6. \
    \ 为了减少原始校准数据中的噪声，对校准数据拟合二次多项式（见附录B），并在之后像我们在[第12章](#)的octave脚本中那样使用它，而不是在每个频率使用原始数据点。\n\
    7.  在电路中添加一个MLX90614温度计，以便进行非接触式体温测量。\n8.  测量香蕉两端的阻抗。尝试不同类型的电极。\n9.  测定一块木头的阻抗。当木头变湿时，阻抗会改变多少？\n\
    10. 将软件移植到ESP32。\n11. 将AD5933连接到ESP-01控制器，使其成为便携式系统。\n12. 同样，将MAX30102和MLX90614连接到ESP-01控制器。\n\
    13. ESP-01没有将内置ADC暴露到外部引脚。讨论如何仍然连接AD8232，然后构建电路。\n\n## 示例：激光束的轮廓\n\n在这个例子中，我们通过小心地将障碍物移过激光束并观察来自光敏电阻的信号变化，来测量激光笔激光束的横向轮廓。图16.1说明了该方法。我们使用来自传感器套件的激光模块，该模块安装在面包板上，引出两根导线，一根用于接地，一根用于正电源电压。为了调节激光强度，我们使用正电源电压的脉宽调制。传感器是一个由光敏电阻（LDR）和一个10\
    \ kΩ电阻组成的分压器。障碍物由一块黑色塑料制成。作为平移台，我们使用从旧CD-ROM驱动器中抢救出的框架，该框架使用步进电机将一个小车来回移动约40 mm的距离，这大约是CD可读区域的宽度。步进电机驱动一个丝杠，该丝杠以良好的精度拉动和推动小车。\n\
    \n图16.2显示了从CD驱动器抢救出的框架。框架上有许多孔，方便添加螺丝，这些螺丝又用于固定激光器、传感器和障碍物。激光器位于其小型分线板上，位于右上角，步进电机在其下方并隐藏起来，但丝杠清晰可见，从右到左靠近框架顶部运行。在那里，它与连接到小车的白色塑料部件啮合，并在电机转动时移动它。在小车上可以看到一个黑色的塑料片，它拦截激光束，防止激光照射到框架右下角的LDR上。LDR也安装在一个小型分线板上，该分线板是传感器套件的一部分。我们使用它是因为安装孔使得组装和将LDR固定到框架上的螺丝变得容易。作为控制器，我们使用一个Arduino\
    \ UNO，它通过L293D H桥驱动器驱动电机\n\n![](img/8f23875c54d5b3177d5d2a5bba06b37e_267_0.png)\n\
    \n![](img/8f23875c54d5b3177d5d2a5bba06b37e_268_0.png)\n\n图16.2 来自CD-ROM驱动器的机箱，激光器安装在右上角，光敏电阻安装在右下角。黑色障碍物安装在滑架上，可以通过顶部的丝杠由位于激光器下方的小型步进电机移动。\n\
    \n使用引脚D9上的脉宽调制来控制激光功率，并在模拟输入A0上读取带有LDR的分压器的信号。图16.3显示了原理图。我们使用外部电源为步进电机提供电压，该电源连接到标记为PA,...,PD的端子。\n\
    \n下一个任务是编程UNO以控制激光功率、移动步进电机和读取传感器，所有这些都以精心协调的方式进行。我们基于第4.5.4节中使用H桥驱动步进电机的程序来编写草图，并添加激光器和传感器的部分代码，如下所示。\n\
    \n```c\n// Laser profile measurement, V. Ziemann, 170628\nchar line[30];\nint\
    \ settle_time=2, stepcounter=0;\nint laser_power=10;\nconst int PA=2,PB=3,PC=4,PD=5,ENABLE=6;\n\
    const int LASER=9;\nvoid set_coils_fullstep(int istep) { //........set_coils\n\
    \  bool patA[]={1,1,0,0};\n  int pat_length=4;\n  int ii;\n  istep=istep % pat_length;\n\
    \  if (istep < 0) istep+=pat_length;\n  digitalWrite(PA,patA[istep]);\n  ii=(istep+2)\
    \ % pat_length;\n  digitalWrite(PB,patA[ii]);\n  ii=(istep+3) % pat_length;\n\
    ```"
