  - "[PAGE 85]\n\nIn the first few lines, we declare the variables, and in particular,\
    \ a 30-character buffer `line` to hold the multicharacter query. In the `setup()`\
    \ function, we use the internal 1.1 V reference voltage for the ADC and initialize\
    \ the Serial communication channel to operate at 9600 baud. The `while(!Serial)`\
    \ statement waits for the initialization of the Serial library to complete, and\
    \ is only needed on some newer Arduinos. We include it just for safety. In the\
    \ `loop()` function, we wait for characters to be available before reading an\
    \ entire line until the end-of-line character `\\n`. The `readStringUntil` returns\
    \ a `String` but we want to use a character array instead, and need to convert\
    \ the type in the appended `toCharArray` method. At this point the character array\
    \ `line` contains the request that was sent from the host computer to the Arduino;\
    \ for example, `A0?`. The following construction of `if (strstr(line,\"A0?\")==line)`\
    \ and similar commands checks whether `line` starts with the characters `A0?`\
    \ by comparing the pointer to the first occurrence of `A0?` in the array `line[]`\
    \ to the pointer to the start of `line[]`. The commands that follow are executed\
    \ provided the result evaluates to true, or else the subsequent comparison in\
    \ the `else if` sequence is tested. In the example, we test for `\"A0?\"`, `\"\
    A1?\"`, and `\"T?\"` to reply with the raw values of the analog pins 0 and 1 or\
    \ with the value from analog pin 0 converted to degrees Celsius. Consult the discussion\
    \ in [Section 2.1.2](#) regarding the conversion coefficient. If a command arrives,\
    \ and it is not in the list, the Arduino replies with `unknown command`. The way\
    \ to specify the query with an appended question mark and the reply to echo the\
    \ query with value appended is borrowed from the SCPI [23] command-language that\
    \ is commonly used to remotely control measurement equipment via GPIB, also known\
    \ as IEEE-488, or VXI.\n\nAs a final example, we discuss a simple *temperature\
    \ logger* that again uses the hardware setup as shown on the right side of Figure\
    \ 4.6, but sends the temperature value continuously to the host computer via the\
    \ serial line. The sketch is shown here:\n\n```\ncpp\n// ultra-simple LM35 temperature\
    \ logger, V. Ziemann, 161201\nfloat temp;\nvoid setup() {\n  analogReference(INTERNAL);\
    \  // 1.1V internal ADC reference\n  Serial.begin(9600);\n  while (!Serial) {;}\
    \  // wait for serial to initialize\n}\nvoid loop() {\n  temp=1.1*100*analogRead(0)/1023.0;\n\
    \  Serial.println(temp);\n  delay(1000);\n}\n```\n\nwhere the `setup()` function\
    \ equals that from the previous example, but the `loop()` function measures the\
    \ analog pin and converts the digital word to the temperature, and sends that\
    \ to the host computer. Then it waits 1000 ms before repeating the same. In the\
    \ Serial Monitor, that can be started by clicking on the button at the top right\
    \ in the IDE; we see that the temperature value in Celsius is reported once per\
    \ second in the lower text box provided the baud rate selected in the selection\
    \ box at the lower right matches the baud rate specified in the sketch.\n\nIn\
    \ the Arduino IDE, however, there is also a graphical plotting tool available.\
    \ We select it by choosing the `Tools->Serial Plotter` menu item. This opens a\
    \ window and shows the values received on the serial line in graphic format, provided\
    \ the baud rate is selected to match the one specified in the sketch. Note that\
    \ the `Serial Plotter` can show several measurement values simultaneously as traces\
    \ in different colors. This functionality, built in to the Arduino IDE, may serve\
    \ as a simple logger for temperatures or other measured values, if a quick solution\
    \ to record some values as a function of time is needed."
- md: "So far, we managed to read analog voltages, and even devised a simple protocol\
    \ to report the measurement values to the host computer. In the next section,\
    \ we interface I2C-based sensors to the microcontroller, and use the same query-response\
    \ protocol to communicate with the host.\n\n## 4.4.3 I2C\n\nAnd we continue with\
    \ another temperature sensor, but a special one that is used by nurses in hospitals.\
    \ It is based on a contact-free thermometer that takes your temperature by pointing\
    \ a gadget into your inner ear. An example is the MLX90614 infrared thermometer\
    \ shown on the right in Figure 2.9. It uses a thermopile to deduce the temperature\
    \ from the picked-up infrared radiation and it reports the temperature to our\
    \ Arduino via an I2C interface. Here we point out that the MLX90614 comes in versions\
    \ for 5 V and 3.3 V supply voltage. In this example we use the 5 V version, labeled\
    \ AAA. The device has four pins – check the datasheet to find out which pin does\
    \ what – for ground, supply voltage, and the I2C lines SDA as SCL. The latter\
    \ two are connected to pin A4 and A5 on the UNO because the I2C data and clock\
    \ lines are routed to the same output pins as the analog pins A4 and A5. These\
    \ pins cannot be used for analog measurements, in case they are used for I2C connectivity.\
    \ We show how to connect the sensor in Figure 4.7, and illustrate how to talk\
    \ to it in the following sketch.\n\n```\n// Read MLX90614 IRthermometer, V. Ziemann,\
    \ 170717\n#include <Wire.h>\nconst int MLX90614=0x5A;   // I2C address\nfloat\
    \ getTemperature(uint8_t addr) {  //.....getTemperature\n  uint16_t val;\n  uint8_t\
    \ crc;\n  Wire.beginTransmission(MLX90614);\n  Wire.write(addr);        // address\n\
    \  Wire.endTransmission(false);\n  Wire.requestFrom(MLX90614,3);\n  val = Wire.read();\n\
    \  val |= (Wire.read()<<8);\n  crc=Wire.read();         // not used\n  return\
    \ -273.15+0.02*(float)val;\n}\nvoid setup() { //....................................setup\n\
    \  Serial.begin(9600);\n  Wire.begin();\n}\nvoid loop() {  //....................................loop\n\
    \  float Ta=getTemperature(0x06);  // address for ambient temp\n  float To=getTemperature(0x07);\
    \  // address for object temp\n  Serial.print(Ta); Serial.print(\"\\t\"); Serial.println(To);\n\
    \  delay(1000);\n}\n```\n\nFirst we have to include support for the I2C functionality\
    \ by including the Wire.h header file, which also causes the compiler and linker\
    \ to include the corresponding libraries. After we define the I2C address 0x5A\
    \ of the sensor, which we find in the datasheet, we encapsulate the I2C communication\
    \ in a separate function called getTemperature(). It receives the register address\
    \ of the I2C device as input parameter, reads values with the help of a number\
    \ of Wire.* function calls, and returns the associate temperature, properly scaled\
    \ to degrees Celsius. The device also returns a byte that allows us to determine\
    \ transmission errors, but we do not use that feature in this simple example.\
    \ In the setup() function we only initialize Serial line and I2C communication.\
    \ In the loop() function we use the getTemperature() function to retrieve the\
    \ ambient temperature from address 0x06 and the object temperature from address\
    \ 0x07, as described in the datasheet, and print both temperatures, separated\
    \ by a tabulator \\t, to the Serial line. The entire process is then repeated\
    \ after waiting 1000 ms. We can use the Serial monitor or plotter built into the\
    \ Arduino IDE in order to view or display the results.\n\nSeveral other sensors,\
    \ often related to environmental parameters such as humidity or barometric pressure,\
    \ also report the temperature as a by-product, because it is internally needed\
    \ to calibrate the reported primary measurement value. For the next sensor, the\
    \ HYT-221, this is the humidity. Connecting the sensor to the Arduino is illustrated\
    \ on the left in Figure 4.8. From the datasheet we know that the four pins of\
    \ the sensor, when looking towards the front of the sensor, are SDA, GND, VDD,\
    \ and SCL. The pins for GND and VDD are connected to the GND and 5 V pins on the\
    \ Arduino, and SDA to A4 and SCL to A5 in the same way we did for the temperature\
    \ sensor in the previous example. In the following sketch, we read the HYT sensor,\
    \ and send the measurement data of humidity and temperature via the serial line\
    \ to the host computer.\n\n```\n// HYT221 humidity sensor, V. Ziemann, 161203\n\
    #include <Wire.h>\nconst int HYT=0x28;  // I2C address\nvoid setup() {  //........................................setup\n\
    \  Serial.begin (9600); while (!Serial) {;}\n  Wire.begin();\n}\nvoid loop() {\
    \  //........................................loop\n  int b1,b2,b3,b4,raw;\n  double\
    \ humidity,temp;\n  Wire.beginTransmission(HYT);\n  Wire.requestFrom(HYT,4);\n\
    \  delay(50);\n  if (Wire.available()==4) {\n    b1=Wire.read(); b2=Wire.read();\
    \  // humidity rawdata\n    b3=Wire.read(); b4=Wire.read();  // temperature rawdata\n\
    \    Wire.endTransmission(true);\n  }\n  raw=(256*b1+b2) & 0x3FFF;        // humidity\n\
    \  humidity=100.0*raw/16384.0;\n  raw=((256*b3+b4) & 0xFFFC)/4;    // temperature\n\
    \  temp=165.0*raw/16384.0-40.0;\n  Serial.print(humidity); Serial.print(\"\\t\"\
    ); Serial.println(temp);\n  delay(1000);\n}\n```\n\nFirst we include the I2C functionality\
    \ with Wire.h, and define a variable HYT that contains the I2C address 0x28. In\
    \ the setup() function, we first initialize the serial communication and then\
    \ the I2C functionality with the call to the Wire.begin() function. In the loop()\
    \ function we first declare a number of auxiliary integer variables and double-precision\
    \ float variables to hold the measurement data before calling the Wire.beginTransmission()\
    \ function with the address HYT as argument, and tell the Arduino to fetch four\
    \ bytes as response from the sensor in the following line. After a short delay,\
    \ we check whether the four bytes have arrived, with the Wire.available() function,\
    \ and in case they are available, we read them into the variables b1,..,b4 before\
    \ closing the transmission. The first two bytes contain the raw data for the humidity,\
    \ and the next two for the temperature measurement. In the Arduino sketch, we\
    \ follow the instructions from the HYT-221 datasheet to convert the raw data to\
    \ the physical quantities. For the humidity, the datasheet tells us that the first\
    \ received byte b1 is the most significant byte of a two-byte word and b2 is the\
    \ least significant byte. Therefore, we can reconstruct the word by 256*b1+b2.\
    \ But we also have to throw away (mask) the two highest bits, which we do by a\
    \ logical and (&) with a binary value that has ones everywhere except at the two\
    \ highest bits, which is & 0x3FFF. Once we have the raw value, we again follow\
    \ the datasheet and scale by 100/16384 to obtain the humidity in percent. For\
    \ the temperature, we follow a similar procedure that is described in the HYT-221\
    \ datasheet. Finally, we send the humidity and temperature values to the host\
    \ computer via the serial line and wait a while before repeating the measurement.\
    \ On the right of Figure 4.8 we show the data using the Serial-plotter in the\
    \ Arduino IDE. The upper trace shows the humidity, and the three positive excursions\
    \ are due to exhaling on to the sensor.\n\nOften the concentration of CO2 is a\
    \ good proxy to judge the quality of indoor air in congested rooms. This is of\
    \ quite some concern, especially during the Covid pandemic. We measure the concentration\
    \ with a SCD30 CO2 sensor that is connected to an UNO via four cables for power,\
    \ ground and the two I2C lines for clock and data, shown on the right-hand side\
    \ on Figure 4.7. The circuit is brought to live with the code shown below. First\
    \ we include support for I2C and define the address of the sensor as well as additional\
    \ variables. Then we define the function data_ready() which reads the status of\
    \ the conversion and returns 1 if data from a new conversion is available and\
    \ 0 otherwise. The datasheet specifies that upon sending the two-byte command\
    \ 0x02 0x02, the SCD30 returns three bytes: the first two contain the status and\
    \ the last one is a checksum, which we do not use in this basic example. In the\
    \ setup() function, we only initialize the serial and I2C communication.\n\n```\n\
    // Sensirion SCD30 CO2 concentration, V. Ziemann, 221006\n#include <Wire.h>\n\
    const int SCD30=0x61;\nchar line[30];\nint running=0;\nint data_ready() {\n  byte\
    \ b1,b2,b3;\n  Wire.beginTransmission(SCD30);\n  Wire.write(0x02); Wire.write(0x02);\n\
    \  Wire.endTransmission();\n  Wire.requestFrom(SCD30, 3);\n  b1 = Wire.read();\
    \ b2 = Wire.read(); b3= Wire.read();\n  return  (b1<<8) | b2;\n}\nvoid setup()\
    \ {\n  Serial.begin(9600); while(!Serial){;}\n  Wire.begin();\n}\nvoid loop()\
    \ {\n  if (Serial.available()){\n    Serial.readStringUntil('\\n').toCharArray(line,30);\n\
    \    if (strstr(line,\"V?\")) { // Get firmware version\n      byte  b1,b2,b3;\n\
    \      Wire.beginTransmission(SCD30);\n      Wire.write(0xD1); Wire.write(0x00);\n\
    \      Wire.endTransmission();\n      Wire.requestFrom(SCD30,3);\n      b1 = Wire.read();\
    \ b2 = Wire.read(); b3=Wire.read();\n      Serial.print(\"V \"); Serial.print(b1);\n\
    \      Serial.print(\".\"); Serial.println(b2);\n    } else if (strstr(line,\"\
    Start\")) {  // Start data taking\n      Wire.beginTransmission(SCD30);\n    \
    \  Wire.write(0x00); Wire.write(0x10); // two command bytes\n      Wire.write(0x00);\
    \ Wire.write(0x00); // ambient pressure\n      Wire.write(0x81); //CRC\n     \
    \ Wire.endTransmission();\n```"
  mdcn: "到目前为止，我们已经成功读取了模拟电压，甚至设计了一个简单的协议来将测量值报告给主机计算机。在下一节中，我们将把基于I2C的传感器连接到微控制器，并使用相同的查询-响应协议与主机通信。\n\
    \n## 4.4.3 I2C\n\n我们将继续介绍另一种温度传感器，但这是一个特殊的传感器，被医院的护士使用。它基于一种非接触式温度计，通过将设备指向你的内耳来测量体温。例如，图2.9右侧所示的MLX90614红外温度计。它使用热电堆从接收到的红外辐射中推断温度，并通过I2C接口将温度报告给我们的Arduino。这里我们指出，MLX90614有5V和3.3V供电电压的版本。在本例中，我们使用5V版本，标记为AAA。该设备有四个引脚——请查阅数据手册以了解每个引脚的功能——分别用于接地、供电电压以及I2C线路SDA和SCL。后两个引脚连接到UNO上的A4和A5引脚，因为I2C数据和时钟线路被路由到与模拟引脚A4和A5相同的输出引脚。如果这些引脚用于I2C连接，则不能用于模拟测量。我们在图4.7中展示了如何连接该传感器，并在下面的示例代码中说明如何与之通信。\n\
    \n```\n// Read MLX90614 IRthermometer, V. Ziemann, 170717\n#include <Wire.h>\n\
    const int MLX90614=0x5A;   // I2C address\nfloat getTemperature(uint8_t addr)\
    \ {  //.....getTemperature\n  uint16_t val;\n  uint8_t crc;\n  Wire.beginTransmission(MLX90614);\n\
    \  Wire.write(addr);        // address\n  Wire.endTransmission(false);\n  Wire.requestFrom(MLX90614,3);\n\
    \  val = Wire.read();\n  val |= (Wire.read()<<8);\n  crc=Wire.read();        \
    \ // not used\n  return -273.15+0.02*(float)val;\n}\nvoid setup() { //....................................setup\n\
    \  Serial.begin(9600);\n  Wire.begin();\n}\nvoid loop() {  //....................................loop\n\
    \  float Ta=getTemperature(0x06);  // address for ambient temp\n  float To=getTemperature(0x07);\
    \  // address for object temp\n  Serial.print(Ta); Serial.print(\"\\t\"); Serial.println(To);\n\
    \  delay(1000);\n}\n```\n\n首先，我们必须通过包含Wire.h头文件来引入对I2C功能的支持，这也会导致编译器和链接器包含相应的库。在定义了传感器的I2C地址0x5A（我们在数据手册中找到）之后，我们将I2C通信封装在一个名为getTemperature()的独立函数中。该函数接收I2C设备的寄存器地址作为输入参数，借助一系列Wire.*函数调用读取数值，并返回相应的温度，已正确缩放为摄氏度。该设备还返回一个字节，允许我们确定传输错误，但在这个简单的示例中我们不使用该功能。在setup()函数中，我们只初始化串行通信和I2C通信。在loop()函数中，我们使用getTemperature()函数从地址0x06获取环境温度，从地址0x07获取物体温度（如数据手册所述），并将两个温度值（用制表符\\\
    t分隔）打印到串行线。然后等待1000毫秒后重复整个过程。我们可以使用Arduino IDE内置的串行监视器或绘图仪来查看或显示结果。\n\n其他几种传感器，通常与湿度或气压等环境参数相关，也会将温度作为副产品报告，因为内部需要它来校准报告的主要测量值。对于下一个传感器HYT-221，这个副产品是湿度。将传感器连接到Arduino的方法如图4.8左侧所示。从数据手册中我们知道，当面向传感器正面时，传感器的四个引脚分别是SDA、GND、VDD和SCL。GND和VDD引脚分别连接到Arduino上的GND和5V引脚，SDA连接到A4，SCL连接到A5，方式与我们在上一个示例中连接温度传感器相同。在下面的示例代码中，我们读取HYT传感器，并通过串行线将湿度和温度的测量数据发送到主机计算机。\n\
    \n```\n// HYT221 humidity sensor, V. Ziemann, 161203\n#include <Wire.h>\nconst\
    \ int HYT=0x28;  // I2C address\nvoid setup() {  //........................................setup\n\
    \  Serial.begin (9600); while (!Serial) {;}\n  Wire.begin();\n}\nvoid loop() {\
    \  //........................................loop\n  int b1,b2,b3,b4,raw;\n  double\
    \ humidity,temp;\n  Wire.beginTransmission(HYT);\n  Wire.requestFrom(HYT,4);\n\
    \  delay(50);\n  if (Wire.available()==4) {\n    b1=Wire.read(); b2=Wire.read();\
    \  // humidity rawdata\n    b3=Wire.read(); b4=Wire.read();  // temperature rawdata\n\
    \    Wire.endTransmission(true);\n  }\n  raw=(256*b1+b2) & 0x3FFF;        // humidity\n\
    \  humidity=100.0*raw/16384.0;\n  raw=((256*b3+b4) & 0xFFFC)/4;    // temperature\n\
    \  temp=165.0*raw/16384.0-40.0;\n  Serial.print(humidity); Serial.print(\"\\t\"\
    ); Serial.println(temp);\n  delay(1000);\n}\n```\n\n首先，我们通过Wire.h引入I2C功能，并定义一个变量HYT，其中包含I2C地址0x28。在setup()函数中，我们首先初始化串行通信，然后通过调用Wire.begin()函数初始化I2C功能。在loop()函数中，我们首先声明一些辅助整型变量和双精度浮点变量来保存测量数据，然后调用Wire.beginTransmission()函数，以地址HYT作为参数，并在下一行告诉Arduino从传感器获取四个字节作为响应。经过短暂延迟后，我们使用Wire.available()函数检查四个字节是否已到达，如果可用，我们将其读入变量b1,...,b4，然后关闭传输。前两个字节包含湿度的原始数据，接下来的两个字节包含温度测量的原始数据。在Arduino示例代码中，我们遵循HYT-221数据手册的说明，将原始数据转换为物理量。对于湿度，数据手册告诉我们，第一个接收到的字节b1是双字节字的最高有效字节，b2是最低有效字节。因此，我们可以通过256*b1+b2来重构这个字。但我们还必须丢弃（屏蔽）两个最高位，我们通过与一个二进制值进行逻辑与（&）来实现，该值除了两个最高位外所有位都是1，即&\
