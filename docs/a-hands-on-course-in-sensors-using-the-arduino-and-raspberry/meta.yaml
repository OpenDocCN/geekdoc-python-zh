    # 126 ■ A Hands-On Course in Sensors Using the Arduino and Raspberry Pi, Second
    Edition


    ![](img/8f23875c54d5b3177d5d2a5bba06b37e_144_0.png)


    Figure 5.4 The Synaptic package manager.


    Nowadays many software packages are available from so-called git repositories.
    This includes the software accompanying this book, which is hosted on https://github.com
    and can be downloaded with


    ```

    git clone https://github.com/volkziem/HandsOnSensors2ed.git

    ```


    where the command git clone creates a subdirectory HandsOnSensors2ed into which
    the contents of the repository is copied. Should the git program be missing, we
    install it with sudo apt-get install git or with synaptic. Again, the command
    man git provides a wealth of information about the many options git and man git
    clone about the specific options when downloading – also called cloning – a repository.


    So far, we have used the Raspi as a standalone computer with screen, keyboard,
    and mouse directly attached to the Raspi, but that ties up the peripheral hardware.
    So, now is the time to install software to allow logging onto the Raspi via the
    network, and receiving a virtual copy of the Raspi desktop on our regular desktop
    computer. Then we have a Raspi-desktop in a window that behaves just like the
    one on a regular monitor. There already is such a server from RealVNC installed
    on the raspi, which can be enabled in the Raspberry Pi Configuration program,
    but in order to use it you need to install the proprietary RealVNC viewer on your
    Desktop. If you are reluctant to do so, you can achieve the same functionality
    by installing the tightvncserver on the Raspi with the command


    ```

    sudo apt-get install tightvncserver

    ```


    or, alternatively, via synaptic. This command removes the pre-installed realvnc-server
    and replaces it by one that is supported by many open source vncviewer programs.
    Once the installation has finished, we run vncpasswd from the command line as
    user pi, answer the questions about passwords, and remember them.'
  - '[PAGE 145]


    On the desktop computer from which we want to log onto the Raspi via the network,
    we install the vncviewer software using the package manager of our Linux distribution.
    During the installation, the vncpasswd program should be installed as well, and
    we need to run it from the command prompt on our desktop computer. It prompts
    us to enter the same password for the VNC connection that we selected on the Raspi
    when running the vncserver program for the first time. Once that is done, the
    basic infrastructure to log onto the Raspi using VNC is in place. To simplify
    the entire process, we create a file named raspi.sh on the desktop computer with
    the following contents


    ```

    #!/bin/bash

    RASPI=192.168.10.nn

    ssh -X pi@${RASPI} vncserver -geometry 1280x960 &

    sleep 10

    vncviewer ${RASPI}:5901 -passwd ${HOME}/.vnc/passwd &

    ```


    and place that file in the "~/bin" directory. This little program remotely logs
    onto the Raspi with ssh, starts the vncserver program on the Raspi with the specified
    desktop geometry (we may use a smaller one such as 1024x768), then waits a few
    seconds and starts the vncviewer on the desktop computer using the credentials
    in the .vnc/passwd file in the home directory. After a few further seconds the
    desktop of the Raspi appears in a window on the desktop computer, and we seamlessly
    move the mouse and keyboard focus to the Raspi desktop, and execute commands on
    the Raspi. This is a very convenient way to use the Raspi, because it only requires
    a network connection and no other peripheral devices. In passing we mention that
    starting graphical programs that require administrator privileges, for example
    by sudo synaptic, on some systems do not have access to the display. In such cases
    we may grant authorization to all local users by first executing xhost localhost
    as normal user in a terminal window.


    At this point, we have a convenient setup to work on the Raspi, and are basically
    ready to communicate with all the microcontrollers with attached sensors. But
    using the hardware for both wired and wireless Ethernet on the Raspi is just too
    tempting to neglect, and in the next section we briefly describe how to use the
    wireless interface on the Raspi to span a private WLAN network to which we later
    connect the sensor nodes.


    # 5.4 RASPI AS A ROUTER


    In this setup we assume that the Raspi is connected to our normal network with
    its wired Ethernet RJ45 port, and we have access to it from our desktop computer
    to log on using ssh or vncviewer, as previously discussed. On the Raspi we need
    to install the following packages


    ```

    sudo apt-get update

    sudo apt-get install hostapd dnsmasq

    ```


    where we first update the repositories, and then download and install the hostapd
    and dnsmasq package. The former program is responsible for spanning the private
    wireless network, and turns the Raspi into a WLAN access point. The latter provides
    IP numbers on the private network via the DHCP protocol, and translates website
    names to IP numbers.


    As a first step we need to re-configure the network setup. In the default configuration
    there is a background process, a daemon called dhcpcd, that tries to obtain IP
    numbers for every network interface on the Raspi, including the wireless interface
    called wlan0. Instead, in order to operate the Raspi as an access point, we use
    for example nano to configure the interface ourselves by adding the following
    lines'
- md: "## 5.5 COMMUNICATION WITH THE ARDUINO\n\nAfter the basic network infrastructure\
    \ is set up, we connect the Arduino to the Raspi. Most programs on the Raspi work\
    \ in a similar way as on desktop computers, which is no surprise, because a modern\
    \ Raspi is about as powerful as a desktop computer from about a decade ago. We\
    \ start by communicating via the Arduino IDE first, but later we will also use\
    \ the Python programming language and octave.\n\n### 5.5.1 Arduino IDE\n\nWe can\
    \ install the Arduino IDE on the Raspi with `sudo apt-get install arduino`, but\
    \ the version 1.8.13 in the repositories is moderately old. We can install a more\
    \ recent version from https://www.arduino.cc. To do so, we open a browser on the\
    \ Raspi, direct it to the Arduino download website, choose the *Linux ARM 32 bit*\
    \ version, and download directly to the Raspi's download directory `/home/pi/Downloads/`.\
    \ At the time of writing the most recent version was 1.8.19. We suggest to use\
    \ the legacy version until the newer IDE version 2 supports all features such\
    \ as data upload that we later need.\n\nIf we chose to use the most recent version,\
    \ we install it, as is customary, under the `/usr/local` tree by executing the\
    \ following commands:\n\n```\ncd /usr/local\nsudo tar xvJf /home/pi/Downloads/arduino-1.8.19-linuxarm.tar.xz\n\
    cd /usr/local/bin\nsudo ln -s /usr/local/arduino-1.8.19/arduino arduino19\n```\n\
    \nwhere the `tar` command unpacks the downloaded archive into the subdirectory\
    \ named `/usr/local/arduino-1.8.19/`, and the `ln -s` creates a so-called soft\
    \ link with the alias `arduino19` for the `arduino` executable in the `/usr/local/bin/`\
    \ directory. In this way it is automatically found when typing `arduino19` at\
    \ the command line in a terminal window. Optionally, we can create a link in the\
    \ *Programming* menu by starting the *Main Menu Editor* in the *Preference* section\
    \ behind the *Menu* button with the image of a raspberry. In the left panel of\
    \ the *Main Menu Editor* we select *Programming*, and then click on *New Item*\
    \ on the right-side panel. In the opening window, we enter the name of the new\
    \ program, *Arduino*, and browse to the `arduino19` executable in `/usr/local/bin`\
    \ directory. Once these steps are completed, there is an *Arduino* entry in the\
    \ *Programming* section of the main menu. Selecting it opens the Arduino IDE on\
    \ the Raspi, and we could start programming the Arduino directly from the Raspi.\n\
    \nInstead of retyping all the programs for the Arduino on the Raspi, we copy the\
    \ files from our desktop computer to the Raspi with `scp`, which is part of the\
    \ secure-shell program suite if it is a Unix-based system such as Linux or Mac.\
    \ On a Windows system we use *WinSCP*. On a Linux Desktop computer we execute\n\
    \n```\nscp -r Arduino pi@192.168.10.nn:\n```\n\nwhich copies the Arduino subdirectory\
    \ and everything in it to the Raspi, including all hardware descriptions from\
    \ the `Arduino/hardware` directory. Now we need to restart the Arduino IDE, and\
    \ all our previously prepared sketches are available under the *File*→*Sketchbook*\
    \ menu in the Arduino IDE on the Raspi. Before starting to compile our examples\
    \ we add support for ESP8266 and ESP32-based microcontrollers by following the\
    \ steps outlined at the end of Section 4.2 on page 60. On the Raspi, the procedure\
    \ is just the same. Now we are ready to connect an Arduino UNO or NodeMCU to a\
    \ USB port on the Raspi and program them directly from the Raspi.\n\n128 ■ A Hands-On\
    \ Course in Sensors Using the Arduino and Raspberry Pi, Second Edition\n\n```\n\
    interface wlan0\n    static ip_address=192.168.20.1/24\n    nohook wpa_supplicant\n\
    ```\n\nat the end of the configuration file /etc/dhcpcd.conf. The first line indicates\
    \ that the following two lines relate to the built-in wireless interface. The\
    \ second line defines a static IP number to be 192.168.20.1 and the type of network\
    \ (class C) with the shorthand notation /24. The third line prevents the dhcp\
    \ daemon to take control of the interface.\n\nWe now enable network address translation,\
    \ also called masquerading, between the wireless network on wlan0 and the wired\
    \ network on interface eth0 by executing the following two commands in a terminal\
    \ window\n\n```\nsudo iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE\nsudo\
    \ sh -c \"iptables-save > /etc/iptables.ipv4.nat\"\n```\n\nThe first line uses\
    \ the built-in command iptables to establish the rules to apply and the second\
    \ line saves them to the file /etc/iptables.ipv4.nat such that they can be restored\
    \ after a reboot. During the next boot the system loads this configuration from\
    \ the automatically executed file /etc/rc.local. We simply add the following iptables-restore\
    \ command just before exit 0 at the end of /etc/rc.local.\n\n```\niptables-restore\
    \ < /etc/iptables.ipv4.nat\nexit 0\n```\n\nThis ensures that the network translation\
    \ is properly initiated after rebooting the system. Finally we allow network packages\
    \ to pass between the interfaces, which is disabled by default as a security measure.\
    \ We enable forwarding by removing the hash # from the line\n\n```\nnet.ipv4.ip_forward=1\n\
    ```\n\nin the file /etc/sysctl.conf. We omit this step if all sensor nodes should\
    \ only communicate with the Raspi, but no other computer on the local network\
    \ should be able to surf the outside Internet beyond the Raspi, which might not\
    \ be needed and poses a potential security risk. This last step completes the\
    \ basic network setup, and we turn to the configuration of the access point software.\n\
    \nThe configuration file for the hostapd daemon is /etc/hostapd/hostapd.conf.\
    \ It contains the following lines:\n\n```\n# /etc/hostapd/hostapd.conf\ncountry_code=SE\n\
    interface=wlan0\nssid=messnetz\nchannel=7\nmacaddr_acl=0\nauth_algs=1\nignore_broadcast_ssid=0\n\
    wpa=2\nwpa_passphrase=zxcvZXCV\nwpa_key_mgmt=WPA-PSK\nwpa_pairwise=TKIP\nrsn_pairwise=CCMP\n\
    hw_mode=g\n```\n\nThe file must be made readable for the owner only by executing\
    \ `sudo chmod 600 /etc/hostapd/hostapd.conf`. It specifies the country in which\
    \ we live – this is needed to determine the permissible WLAN frequencies, which\
    \ differ from country to country – and other definitions, such as the name of\
    \ the network, the details of the encryption, and the passphrase. Here we choose\
    \ a secret phrase to prevent others from misusing your wireless network. Moreover,\
    \ we need to ensure that `hostapd` finds its configuration file by verifying the\
    \ line\n\n```\nDAEMON_CONF=/etc/hostapd/hostapd.conf\n```\n\nappears near the\
    \ top of the file `/etc/init.d/hostapd`. Add it unless it is already there. Then\
    \ we instruct the system to start the `hostapd` daemon at boot time with the command\n\
    \n```\nsudo systemctl unmask hostapd\nsudo systemctl enable hostapd\n```\n\nAfter\
    \ rebooting the system, we should be able to see a new WLAN named `messnetz` from\
    \ a computer with a wireless network interface, but before we can connect to it\
    \ we need to start the `dnsmasq` daemon that provides DHCP services on the 192.168.20.xx\
    \ network and distributes IP numbers. The configuration file is called `/etc/dnsmasq.conf`\
    \ and it should contain the following lines:\n\n```\ndomain-needed\ninterface=wlan0\n\
    dhcp-range=192.168.20.100,192.168.20.200,12h\nlisten-address=192.168.20.1\n```\n\
    \nWe save the originally installed version under a new name because it contains\
    \ explanations of all parameters and is useful as a reference. For our system,\
    \ however, we only need those in the above example, and they are almost self-explanatory.\
    \ Finally, we register the `dnsmasq` daemon to start at boot time with the commands\n\
    \n```\nsudo systemctl unmask dnsmasq\nsudo systemctl enable dnsmasq\n```\n\nand\
    \ reboot the Raspi to ensure that all parts of the system are synchronized.\n\
    In order to figure out which computers are connected to our WLAN `messnetz` and\
    \ which services they offer on open ports, we install the program `nmap` with\
    \ `sudo apt-get install nmap`. The following call\n\n```\nnmap -sn 192.168.20.1/24\n\
    ```\n\nlists the IP numbers of all computers connected to `messnetz`. The option\
    \ `-sn` specifies the type of scan and `192.168.20.1/24` the range of IP numbers\
    \ to probe, where `/24` is a shorthand notation for the netmask 255.255.255.0.\
    \ This implies that all IP numbers of the form 192.168.20.nn are probed. If a\
    \ device with, for example, 192.168.20.56 appears, the command\n\n```\nnmap 192.168.20.56\n\
    ```\n\nlists its open ports. This is a convenient way to ensure that a server\
    \ started on the device is actually operational. Explore the many options of `nmap`\
    \ with `man nmap`.\nAt this point we have turned the Raspi into a WLAN access\
    \ point that spans the `messnetz` WLAN. If the IP forwarding is enabled, we can\
    \ even surf the web from any computer on `messnetz`. But we are mostly interested\
    \ in communicating with sensor nodes that are connected to `messnetz` and will\
    \ discuss how to use the Raspi as the spider in the center of a network of sensor\
    \ nodes connected by serial or WLAN links."
  mdcn: "## 5.5 与Arduino的通信\n\n在基础网络基础设施搭建完成后，我们将Arduino连接到树莓派。树莓派上的大多数程序运行方式与台式计算机类似，这并不奇怪，因为现代树莓派的性能大约相当于十年前的台式计算机。我们首先通过Arduino\
    \ IDE进行通信，但后续也会使用Python编程语言和Octave。\n\n### 5.5.1 Arduino IDE\n\n我们可以通过`sudo apt-get\
    \ install arduino`在树莓派上安装Arduino IDE，但软件仓库中的1.8.13版本相对较旧。我们可以从https://www.arduino.cc安装更新的版本。为此，我们在树莓派上打开浏览器，访问Arduino下载网站，选择*Linux\
    \ ARM 32位*版本，并直接下载到树莓派的下载目录`/home/pi/Downloads/`。在撰写本文时，最新版本是1.8.19。我们建议使用旧版，直到新版IDE\
    \ 2.0支持我们后续需要的所有功能（如数据上传）。\n\n如果我们选择使用最新版本，可以按照惯例将其安装在`/usr/local`目录树下，执行以下命令：\n\
    \n```\ncd /usr/local\nsudo tar xvJf /home/pi/Downloads/arduino-1.8.19-linuxarm.tar.xz\n\
    cd /usr/local/bin\nsudo ln -s /usr/local/arduino-1.8.19/arduino arduino19\n```\n\
    \n其中`tar`命令将下载的归档文件解压到名为`/usr/local/arduino-1.8.19/`的子目录中，而`ln -s`则在`/usr/local/bin/`目录中为`arduino`可执行文件创建一个名为`arduino19`的软链接。这样，在终端窗口中输入`arduino19`即可自动找到该程序。或者，我们可以通过点击带有树莓派图标的*Menu*按钮，在*Preference*部分启动*Main\
    \ Menu Editor*，在*Programming*菜单中创建一个链接。在*Main Menu Editor*的左侧面板中选择*Programming*，然后在右侧面板点击*New\
    \ Item*。在打开的窗口中，输入新程序的名称*Arduino*，并浏览到`/usr/local/bin`目录中的`arduino19`可执行文件。完成这些步骤后，主菜单的*Programming*部分会出现一个*Arduino*条目。选择它即可在树莓派上打开Arduino\
    \ IDE，我们可以直接从树莓派开始为Arduino编程。\n\n我们无需在树莓派上重新输入所有Arduino程序，而是使用`scp`从台式计算机复制文件到树莓派。如果台式计算机是基于Unix的系统（如Linux或Mac），`scp`是安全shell程序套件的一部分。在Windows系统上，我们使用*WinSCP*。在Linux台式计算机上，我们执行\n\
    \n```\nscp -r Arduino pi@192.168.10.nn:\n```\n\n这将Arduino子目录及其所有内容（包括`Arduino/hardware`目录中的所有硬件描述）复制到树莓派。现在我们需要重启Arduino\
    \ IDE，之前准备的所有程序草图都将在树莓派上的Arduino IDE的*File*→*Sketchbook*菜单下可用。在开始编译我们的示例之前，我们按照第4.2节（第60页）末尾概述的步骤，添加对基于ESP8266和ESP32微控制器的支持。在树莓派上，操作步骤完全相同。现在我们已准备好将Arduino\
    \ UNO或NodeMCU连接到树莓派的USB端口，并直接从树莓派对它们进行编程。\n\n128 ■ 使用Arduino和树莓派的传感器实践课程，第二版\n\
    \n```\ninterface wlan0\n    static ip_address=192.168.20.1/24\n    nohook wpa_supplicant\n\
    ```\n\n添加到配置文件`/etc/dhcpcd.conf`的末尾。第一行表示以下两行与内置无线接口相关。第二行定义了一个静态IP地址192.168.20.1和网络类型（C类），使用简写表示法`/24`。第三行阻止dhcp守护进程控制该接口。\n\
    \n现在，我们通过在终端窗口中执行以下两个命令，启用wlan0无线网络和eth0有线网络接口之间的网络地址转换（也称为伪装）：\n\n```\nsudo iptables\
    \ -t nat -A POSTROUTING -o eth0 -j MASQUERADE\nsudo sh -c \"iptables-save > /etc/iptables.ipv4.nat\"\
    \n```\n\n第一行使用内置命令`iptables`建立要应用的规则，第二行将它们保存到文件`/etc/iptables.ipv4.nat`中，以便在重启后可以恢复。在下次启动时，系统会从自动执行的文件`/etc/rc.local`加载此配置。我们只需在`/etc/rc.local`末尾的`exit\
    \ 0`之前添加以下`iptables-restore`命令。\n\n```\niptables-restore < /etc/iptables.ipv4.nat\n\
    exit 0\n```\n\n这确保了系统重启后网络转换能正确初始化。最后，我们允许网络数据包在接口之间传递，这作为安全措施默认是禁用的。我们通过删除文件`/etc/sysctl.conf`中以下行的井号`#`来启用转发：\n\
    \n```\nnet.ipv4.ip_forward=1\n```\n\n如果所有传感器节点只应与树莓派通信，而本地网络上的其他计算机不应能够通过树莓派访问外部互联网，我们可以省略此步骤，因为这可能不需要且存在潜在的安全风险。这最后一步完成了基本网络设置，接下来我们转向接入点软件的配置。\n\
    \nhostapd守护进程的配置文件是`/etc/hostapd/hostapd.conf`。它包含以下行：\n\n```\n# /etc/hostapd/hostapd.conf\n\
    country_code=SE\ninterface=wlan0\nssid=messnetz\nchannel=7\nmacaddr_acl=0\nauth_algs=1\n\
    ignore_broadcast_ssid=0\nwpa=2\nwpa_passphrase=zxcvZXCV\nwpa_key_mgmt=WPA-PSK\n\
    wpa_pairwise=TKIP\nrsn_pairwise=CCMP\nhw_mode=g\n```\n\n必须通过执行`sudo chmod 600\
    \ /etc/hostapd/hostapd.conf`将文件设置为仅所有者可读。它指定了我们居住的国家——这是确定允许的WLAN频率所必需的，不同国家的频率不同——以及其他定义，如网络名称、加密详情和密码短语。这里我们选择一个秘密短语以防止他人滥用您的无线网络。此外，我们需要确保`hostapd`能找到其配置文件，方法是验证以下行\n\
    \n```\nDAEMON_CONF=/etc/hostapd/hostapd.conf\n```\n\n出现在文件`/etc/init.d/hostapd`的顶部附近。如果尚未存在，请添加它。然后，我们使用以下命令指示系统在启动时启动`hostapd`守护进程：\n\
    \n```\nsudo systemctl unmask hostapd\nsudo systemctl enable hostapd\n```\n\n重启系统后，我们应该能够从具有无线网络接口的计算机上看到名为`messnetz`的新WLAN，但在连接之前，我们需要启动`dnsmasq`守护进程，它在192.168.20.xx网络上提供DHCP服务并分配IP地址。配置文件名为`/etc/dnsmasq.conf`，应包含以下行：\n\
    \n```\ndomain-needed\ninterface=wlan0\ndhcp-range=192.168.20.100,192.168.20.200,12h\n\
    listen-address=192.168.20.1\n```\n\n我们将原始安装版本保存为新名称，因为它包含所有参数的说明，可作为参考。然而，对于我们的系统，我们只需要上述示例中的内容，它们几乎是不言自明的。最后，我们使用以下命令注册`dnsmasq`守护进程在启动时启动：\n\
    \n```\nsudo systemctl unmask dnsmasq\nsudo systemctl enable dnsmasq\n```\n\n并重启树莓派以确保系统的所有部分同步。\n\
    \n为了找出哪些计算机连接到我们的WLAN `messnetz`以及它们在开放端口上提供哪些服务，我们使用`sudo apt-get install nmap`安装程序`nmap`。以下调用\n\
    \n```\nnmap -sn 192.168.20.1/24\n```\n\n列出了所有连接到`messnetz`的计算机的IP地址。选项`-sn`指定扫描类型，`192.168.20.1/24`指定要探测的IP地址范围，其中`/24`是子网掩码255.255.255.0的简写表示法。这意味着所有形式为192.168.20.nn的IP地址都会被探测。如果出现一个设备，例如IP地址为192.168.20.56，命令\n\
    \n```\nnmap 192.168.20.56\n```\n\n会列出其开放端口。这是确保设备上启动的服务器确实运行的一种便捷方式。使用`man nmap`探索`nmap`的众多选项。\n\
