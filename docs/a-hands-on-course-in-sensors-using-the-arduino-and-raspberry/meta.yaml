    This code runs on the NodeMCU on the robot, and first defines the `Max()` and
    `Min()` functions to determine the larger and smaller of two input values. Then
    it defines the name and passphrase of the WLAN as well as the used port number
    before including WiFi libraries for UDP and defining the `server`. We also include
    support for model-servos and declare one instance `myServo`, as well as variables
    needed for scanning the servo, reading the IR phototransistors, and the state
    machine. We then declare the convenience function `send_string()` to send a UDP
    package back to the remote controller. The `range()` function controls the HC-SR04
    distance sensor in the way we discussed in Section 4.4.5. It ensures that the
    trigger pin D1 is LOW before pulling it HIGH for 10 μs, and then waits for the
    echo to arrive on pin D2 with the `pulseIn()` function. The factor 0.017 converts
    the duration of the echo in microseconds to distance in cm. If an obstacle is
    closer than 10cm, the buzzer briefly beeps before returning the distance as the
    function value. The `motor_speed()` function receives the speed, with sign indicating
    the direction, for the motors as input values. First it clamps the values to be
    within ±1023, turns both motors briefly off, and then, depending on the sign,
    sets the pulse-width modulation period of one or the other control pin to the
    desired value with a call to `analogWrite()`. It first handles one motor controlled
    by pins D3 and D4, and then the other motor, controlled by D5 and D6. The `motor_stop()`
    function turns all relevant IO pins off.


    In the `setup()` function we mostly configure the IO pins as input or output according
    to their purpose. The `LED_BUILTIN` pin is actually D0 and controls an LED on
    the NodeMCU circuit board, which is convenient for debugging. Pulling D0 LOW lights
    the LED, and pulling it HIGH turns it off again. D1 and D2 are connected to the
    trigger and echo pin of the distance sensor, and D3 to D6 to control the motors.
    Then we initialize the serial line to communicate at 38400 baud to accommodate
    the capabilities of the slave NANO before starting to span the WLAN with the call
    to the `WiFi.softAP()` function, which configures the NodeMCU as an access point
    with the supplied name and passphrase. The call to `WiFi.softAPIP()` returns the
    IP number of the access point, normally 192.168.4.1. Next we start the server
    to listen on the selected port for packets to arrive from the remote controller.
    Finally, we attach a servo controller to pin D7, turn the LED off, sound a short
    tone, and remember the elapsed time in the variable `lasttime`, which is needed
    for scheduling the state machine; but more on that topic later.'
