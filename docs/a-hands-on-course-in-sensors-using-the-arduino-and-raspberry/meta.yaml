- md: '## CHAPTER 1


    ## Introduction


    What is the path that the electrical signal from a sensor takes to end up in a
    report and how do we interface the different stages along the path? We address
    these questions because collecting sensor data, processing them, and deriving
    some understanding from the data plays an important role in many circumstances.
    One example is a utility company that gathers information about electricity, heating,
    and water in order to prepare statements for their customers and to estimate demand
    for their product in the future. Smart homes are another example; they measure
    temperatures or detect the presence of beverages in the refrigerator to adjust
    the thermostat in the first case, or to prepare a report for us to pick up some
    milk or beer on the way home in the second case. Quite generally, many Internet
    of Things (IoT) technologies share a common base with the topic of the book, but
    even large experimental collaborations such as the ATLAS [2] or CMS [3] that operate
    the huge detectors at the Large Hadron Collider (LHC) [4] at CERN [5] get their
    data from sensors that are buried deep inside the detectors. They sense currents
    from drift chambers where charged particles cause a discharge between wires at
    different potentials, or they cause electrical signals from semiconductor detectors,
    where they create electron–hole pairs that induce a current. Other examples are
    Hall sensors, to measure magnetic fields, and humidity sensors or barometric pressure
    sensors to detect variations in ambient conditions. All these sensors produce
    electrical signals that often need to be amplified or otherwise conditioned. This
    stage involves operational amplifiers and various filters to improve the signal-to-noise
    ratio. Once properly processed, the analog signals are passed on to analog-to-digital
    converters (ADC), where they are converted to a digital representation that is
    subsequently handled by computers. Often some of the computing power is located
    close to the sensor and is provided by microcontrollers that collect signals from
    nearby sensors and convert them to the underlying physical quantities, formatted
    to have a standardized output format. Thus they act as “communication glue” between
    the specific interface to the sensor and a more generic interface to a host computer
    that is usually located further away. The latter is the other end of the communication
    channel from the microcontroller and provides data storage and presentation, and
    sometimes also shows recent data for online monitoring. The host computer may
    run generic control-system software to provide a further abstraction layer towards
    higher-level software. Examples we discuss are MQTT [6], which is popular with
    IoT projects, the EPICS control system [7], commonly found in scientific laboratories,
    and websockets that allow us to use a web browser to communicate with data acquisition
    systems.


    In this book we will build a system that contains all the ingredients also found
    in large scientific or industrial installations. In a sense it is a simplified
    model of a large installation, yet containing all the hardware and logical building
    blocks. In particular, we use the Arduino [8], ESP8266-based [9], and ESP32-based
    [10] microcontroller boards as the local intelligence to control switches and
    motors to move the sensors around and enable reading them out and translating
    the signals to a format that allows communication with a host computer using a
    standardized protocol. This comprises the hardware channels, which can be USB,
    RS-232, Bluetooth, or WiFi as well as the logical protocol, such as a simple query-response
    protocol. As host computer we use a Raspberry Pi [11] which, in its most recent
    incarnation, features four processing cores and runs a standard Linux system with
    a huge base of available software, including web servers, the MATLAB™-clone Octave,
    and even Mathematica™, all without license charges.


    The remainder of the book is organized as laid out in Figure 1.1. We first discuss
    a number of analog sensors and signal-conditioning methods, followed by a number
    of sensors that already provide their measurements in digital form, and the buses
    and protocols used. Next we discuss actuators. They switch things on and off,
    even those requiring large currents, and we learn how to control different types
    of motors that are sometimes needed as part of the measurement process. We then
    describe how to interface actuators and sensors with the Arduino, either by digitizing
    signals or by using the appropriate bus-interface. We go on to describe a program
    structure that permits the Arduino to support a simple query-response protocol
    in order to serve as a slave to a host computer. Next, we configure a Raspberry
    Pi as a standardized host computer. It will provide data storage in databases,
    and present the data in graphical form either using Octave and Python running
    locally on the Raspi or by publishing our measurement data with a web server,
    also running on the Raspi. We continue the discussion by installing the EPICS
    control system software and turn the Raspi into a full-blown control-system server
    that can join any other EPICS installation in a transparent way. We go on to discuss
    the MQTT message-passing system, which plays an important role in IoT applications.
    Websockets enable us to use web browsers, even on a smartphone, to directly communicate
    with the microcontrollers. Having assembled all the parts, we consider examples
    in which we build a weather station with distributed sensors, and systems to record
    ground vibrations, monitor the color of water, and measure the impedance of components.
    In more advanced examples, we build a data acquisition system that communicates
    directly with web browsers, then expand it to record electrocardiograms and other
    signals of medical relevance. Finally, we measure the width of the beam of a laser
    pointer, and a remote-controlled robot that also senses flames autonomously, moves
    to the fire, and sounds an alarm. We conclude by presenting guidelines about how
    to prepare a seminar presentation based on the examples and how to write a readable
    publication describing our data acquisition system using sensors, actuators, Arduino,
    and Raspberry Pi.


    ## Sensors


    A *sensor* is a device that converts a physical quantity to an electrical signal
    [12–15], and therefore either provides a voltage or a current, or causes a change
    of its resistance. More generally, the impedance of the sensor, which also comprises
    capacitive and inductive sensors, may change. We are thus faced with the task
    to measure either of these electrical quantities.


    Below we discuss examples of the different types of sensors, but only show a selection
    of those available on the market. Searching the Internet for the physical quantity
    one wants to measure jointly with the keyword “sensor” will give the reader an
    idea of what is available. Once the sensor is identified, careful reading of the
    datasheet to learn about how to interface the sensor is mandatory.


    ### 2.1 ANALOG SENSORS


    We start by considering resistance-based sensors.


    #### 2.1.1 Resistance-based sensors


    Our first resistance-based sensor is a *light-dependent resistor* or LDR, shown
    on the left of Figure 2.1. It changes its resistance depending on the exposure
    to light, where the range depends on the device and typically extends from a few
    100 Ω to MΩ. Let us spend a few lines to reconcile the electronic schematics with
    the fundamental physics on a microscopic


    Figure 2.1 Image of a light-dependent resistor (LDR) on the left and how to connect
    it in a plain voltage-divider configuration (center†) and in a Wheatstone bridge
    (right†). A superscripted dagger† in the caption indicates that the image was
    created with Fritzing.'
