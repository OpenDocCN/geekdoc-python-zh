    # CHAPTER 6

    Control System: EPICS


    It is not too farfetched to visualized the *Experimental Physics and Instrumental
    Control System* (EPICS) as a home automation system for scientific laboratories.
    It is used in a number of laboratories to control large particle accelerators,
    such as the Advanced Photon Source (APS) in the United States, the Swiss light
    source (SLS) in Zürich, or the European Spallation Source (ESS) in Sweden. Other
    users of EPICS are the fusion reactor International Thermonuclear Experimental
    Reactor (ITER) in France and the W. M. Keck astronomical observatory on Hawaii.


    EPICS is based on a number of independent computers called *input-output controllers*
    (IOC) that announce their capabilities on the network such that other computers
    can interact with them. Almost any type of computer can participate in an EPICS
    system, and support libraries for many programming languages, such as C, Python,
    and Octave, are available. So it is no surprise that a Raspi can also serve as
    an IOC and join an EPICS control system, no matter how big it is. We illustrate
    this by configuring the Raspi to communicate the measurements collected from locally
    attached microcontroller-based sensor nodes to EPICS. This makes the measurements
    accessible in a larger control system context.


    The first task is to install the EPICS software on the Raspi, and we follow [30]
    in doing so. The steps are somewhat arcane and the instructions resemble a cookbook.
    Normally these steps are done by an experienced system administrator.


    # 6.1 INSTALLATION


    First we need to download the EPICS Base package from `epics.anl.gov`. At the
    time of writing, the current release is 7.0.7 and the downloaded package is called
    `base-7.0.7.tar.gz`. In order to avoid excessive use of `sudo` we create a subdirectory
    `/home/pi/epics` where all the software resides, but we also create a soft link
    of that directory to `/usr/local/epics` where it is available to all users on
    the Raspi. The detailed sequence of commands is the following:


    ```

    cd /home/pi

    mkdir epics

    sudo ln -s /home/pi/epics /usr/local

    cd epics

    cp /home/pi/Downloads/base-7.0.7.tar.gz .

    tar xzf base-7.0.7.tar.gz

    ```


    where `tar` is an archiving program that unpacks (`x` option) compressed (`z`
    option) files (`f` option). Note the period `.` at the end of the `cp` command,
    which is the shorthand'
  - "[PAGE 174]\n\nnotation for the current directory, /home/pi/epics in this case.\
    \ The last command creates a subdirectory under /home/pi/epics with the name base-7.0.7.\
    \ In order to avoid writing the version number over and over again, we create\
    \ a soft link with the ln -s command, which essentially creates an alias in the\
    \ same directory by executing\n\n```\nln -s base-7.0.7 base\n```\n\nand we can\
    \ henceforth refer to the directory with the EPICS base package via /usr/local/epics/base\
    \ by virtue of the soft link from /home/pi/epics to /usr/local/epics. Now we have\
    \ the source code in place, but in order to use it we still need to compile it.\n\
    \nAnd for the compiler and later the executable programs to find the EPICS sources,\
    \ we need to copy the following lines into the file /home/pi/.bash_aliases:\n\n\
    ```\nexport EPICS_ROOT=/usr/local/epics\nexport EPICS_BASE=${EPICS_ROOT}/base\n\
    export EPICS_HOST_ARCH=`${EPICS_BASE}/startup/EpicsHostArch`\nexport EPICS_BASE_BIN=${EPICS_BASE}/bin/${EPICS_HOST_ARCH}\n\
    export EPICS_BASE_LIB=${EPICS_BASE}/lib/${EPICS_HOST_ARCH}\nif [ \"\" = \"${LD_LIBRARY_PATH}\"\
    \ ]; then\n    export LD_LIBRARY_PATH=${EPICS_BASE_LIB}\nelse\n    export LD_LIBRARY_PATH=${EPICS_BASE_LIB}:${LD_LIBRARY_PATH}\n\
    fi\nexport PATH=${PATH}:${EPICS_BASE_BIN}\n```\n\nIf the file does not exist,\
    \ just create a new copy with the above contents. Note that the environment variable\
    \ EPICS_ROOT points to the subdirectory /usr/local/epics, the one we created in\
    \ an earlier step. The other variables are defined relative to that and point\
    \ to the places where the libraries and executables reside. Once we complete this\
    \ step, we need to open a new command window, because this rereads the .bash_aliases\
    \ file and we need these definitions before compiling the base system with\n\n\
    ```\ncd /home/pi/epics/base\nmake distclean\nmake -j 4\n```\n\nwhich takes about\
    \ 20 minutes depending on the version of the Raspi. The option distclean makes\
    \ sure that the epics sources are in a pristine state and the option -j 4 causes\
    \ the compilation to start four jobs simultaneously, one for each CPU core. The\
    \ terminal window is filled with the information about what part of the base system\
    \ is currently compiled. Once the compilation completes without errors, we enter\
    \ the command caget at the command prompt. It should respond with “no pv name\
    \ specified...” and this indicates that the executables are available and located\
    \ in the PATH. The “pv” is the name of a quantity that EPICS deals with, and is\
    \ called a process variable. An example of such a name is the read-back current\
    \ of power supply PSabc that might be called PSabc:current. Reading or changing\
    \ the power supply current then refers to that process variable. Reading is done\
    \ by entering caget PSabc:current on the command line. More on that topic comes\
    \ in the next section. For the next test we start the softIoc program, and at\
    \ the epics> prompt that appears, we type iocInit. This step should result in\
    \ the response “iocrun: all initialization complete” and convinces us that we\
    \ have successfully installed EPICS on the Raspi and can proceed to investigate\
    \ it."
- md: "## 6.2 COMMUNICATING WITH EPICS\n\nBefore connecting the sensor nodes with\
    \ the microcontrollers to EPICS, we explain the basic EPICS functionality by reading\
    \ and controlling virtual parameters that only exist in the memory of the Raspi.\
    \ Again, based on examples from [30], we prepare the following EPICS database\
    \ file and name it simple2.db.\n\n```\n# simple2.db\nrecord(bo,\"raspi:trigger\"\
    ) {\n  field(DESC,\"trigger PV\")\n  field(ZNAM,\"off\")\n  field(ONAM,\"on\"\
    )\n}\nrecord(stringout,\"raspi:message\") {\n  field(DESC,\"message on the RPi\"\
    )\n  field(VAL,\"RPi default message\")\n}\nrecord(calc, \"raspi:random\") {\n\
    \  field(SCAN,\"1 second\")\n  field(CALC,\"RNDM\")\n}\nrecord(ao,\"raspi:A\"\
    ) {\n  field(DESC,\"variable A\")\n  field(VAL,\"0\")\n}\nrecord(ao,\"raspi:B\"\
    ) {\n  field(DESC,\"variable B\")\n  field(VAL,\"0\")\n}\nrecord(calc,\"raspi:C\"\
    ) {\n  field(DESC,\"sum of A and B\")\n  field(SCAN,\"1 second\")\n  field(INPA,\"\
    raspi:A\")\n  field(INPB,\"raspi:B\")\n  field(CALC,\"A+B\")\n}\n```\n\nThe file\
    \ contains definitions of six process variables: raspi:trigger, raspi:message,\
    \ raspi:random, raspi:A, raspi:B, and raspi:C in the record definitions. Each\
    \ record has a type, which might be bo, bi, ao, or ai, standing for binary or\
    \ analog input or output. Other types are stringout or calc. Let's describe the\
    \ records one at a time. The first record is a binary output, bo, called raspi:trigger,\
    \ which may be either 1 or 0 and contains three defining fields, a description,\
    \ a text string for state zero (ZNAM), and one for state one (ONAM). The second\
    \ record describes a string that is initialized in the VAL field. The third record\
    \ is of type calc and performs some calculation, in this case a rather trivial\
    \ one: It generates a new random number once per second as specified in the SCAN\
    \ field. The next two records define process variables raspi:A and raspi:B that\
    \ are initialized to zero. The sixth record is of type calc and calculates the\
    \ sum of raspi:A and raspi:B once per second. Once the file simple2.db is saved,\
    \ we start it with the following command:\n\n```\nsoftIoc -d simple2.db\n```\n\
    \nwhich will start an EPICS server and publishes our six process variables. The\
    \ latter we can verify by typing `dbl` (database list) at the `epics>` prompt,\
    \ which lists the process variables served from the running `softIoc` process.\n\
    \nWe interact with the EPICS server from a second terminal window and enter `caget\
    \ raspi:trigger` in it. The response is the name of the process variable and the\
    \ current state, which initially is off. We change the state by entering `caput\
    \ raspi:trigger on` and subsequently verify with `caget` that the state has indeed\
    \ changed. Note that we change process variables with `caput` and retrieve their\
    \ value with `caget`. We immediately try this with the `raspi:message` process\
    \ variable by entering `caget raspi:message`, which displays the message from\
    \ the `simple2.db` file. We change it with `caput raspi:message Blabla`, and the\
    \ next `caget raspi:message` should display Blabla instead. Figure 6.1 shows these\
    \ transactions. When reading a process variable with `caget`, we can suppress\
    \ the echo of the variable name by using the `-t` (for terse) option and use `caget\
    \ -t` instead. A companion program to `caget` is `camonitor`, which monitors one\
    \ or several process variables and reports whenever one of them changes its value.\
    \ We use it immediately to verify that the `raspi:random` process variable indeed\
    \ produces a new random number once every second, by entering `camonitor raspi:random`.\
    \ The last three records define process variables that are linked in such a way\
    \ that the third `raspi:C` calculates the sum of the other two process variables.\
    \ We test this functionality by using `caput` to enter the values 17 and 4 to\
    \ `raspi:A` and `raspi:B`, respectively. Subsequently reading `raspi:C` will report\
    \ 21. In passing we mention that a second computer on the same network, either\
    \ a second Raspi or a desktop computer that has the EPICS base package installed,\
    \ can access all process variables served by the first Raspi.\n\nWe already mentioned\
    \ the command-line programs `caget` and `caput` to read and write EPICS variables.\
    \ The same functionality is available from python after installing the `pyepics`\
    \ package with\n\n```\nsudo pip install pyepics\n```\n\nfrom the command line.\
    \ The following script\n\n```\n# read_write_epics.py, V. Ziemann, 221103\nimport\
    \ epics\nmsg=epics.caget(\"raspi:message\")\nprint(\"The message is: \", msg)\n\
    caput(\"raspi:message\",\"Krusiduller\")\n```\n\nfirst reads the epics variable\
    \ `raspi:message` and displays its value nicely formatted before replacing it\
    \ with the new message `Krusiduller`.\n\nThis dry run of EPICS worked without\
    \ interfacing hardware. In order to communicate with our sensor nodes, we need\
    \ two additional libraries that link EPICS to the hardware.\n\n## 6.3 ASYN AND\
    \ STREAM LIBRARIES\n\nThe external sensor nodes communicate with the Raspi via\
    \ serial RS-232 lines, Bluetooth, Ethernet, or WLAN. EPICS requires interface\
    \ libraries to be able to take over these communication channels. For this purpose\
    \ we install two additional packages, `asyn` and `StreamDevice` into the newly\
    \ created subdirectory `/home/pi/epics/modules/` with the following sequence of\
    \ commands.\n\n```\nmkdir /home/pi/epics/modules\ncd /home/pi/epics/modules\n\
    git clone https://github.com/epics-modules/asyn.git\n```\n\nHere we use `git`\
    \ to create the subdirectory `/usr/local/epics/modules/asyn` and copy all files\
    \ from the repository for the asyn package to it. At the time of writing release\
    \ 4-43 was the most recent one. Before compiling the package, we need to edit\
    \ the `./asyn/configure/RELEASE` file, change the `EPICS_BASE` variable to `/usr/local/epics/base`,\
    \ and make sure that the lines starting with `IPAC` and `SNCSEQ` are commented\
    \ out with a hash character in the first column. Once this is done we compile\
    \ by entering `make -j 4` in the directory `/usr/local/epics/modules/asyn` and\
    \ wait a few minutes for completion.\n\nThe second module we need to install is\
    \ the `StreamDevice` package. Inside the subdirectory `/home/pi/epics/modules/`\
    \ we directly download the source code with `git` by executing\n\n```\ngit clone\
    \ https://github.com/paulscherrerinstitute/StreamDevice.git\nln -s StreamDevice\
    \ stream\ncd stream\n```\n\nThis creates a subdirectory `StreamDevice` and makes\
    \ it known under the generic name `stream` before we use `cd` to enter it. To\
    \ make the build process compatible with the standard `make` system, we need to\
    \ remove the `GNUmakefile` – if it is present – from that subdirectory before\
    \ editing `./configure/RELEASE` to make sure that `EPICS_BASE` points to `/usr/local/epics/base`\
    \ and that the three line starting with `ASYN=` read\n\n```\nASYN=/usr/local/epics/modules/asyn\n\
    #CALC=$(SUPPORT)/calc-3-7\n#PCRE=$(SUPPORT)/pcre-7-2\n```\n\nHere, we added a\
    \ hash to prevent including support for the CALC and PCRE modules. Finally, we\
    \ initiate the compilation by running `make -j 4` in the `/home/pi/epics/modules/stream`\
    \ subdirectory. This completes the preparation of the basic libraries, and we\
    \ are ready to write IOCs that talk to our hardware, the microcontrollers with\
    \ the sensors and actuators attached.\n\n## 6.4 WRITING AN IOC\n\nAs examples,\
    \ we link the temperature measurement on the UNO, connected by serial line, and\
    \ on the NodeMCU, connected by WLAN, to EPICS, and publish the measurements as\
    \ process variables. For this purpose, we create a subdirectory /home/pi/epics/ioc\
    \ and a subdirectory temp in it. We change to the temp directory with the cd command\
    \ and execute the following commands:\n\n```\ncd /home/pi/epics/ioc/temp\nmakeBaseApp.pl\
    \ -t ioc temp\nmakeBaseApp.pl -i -t ioc temp\n```\n\nwhich creates the basic file\
    \ infrastructure under /home/pi/epics/ioc/temp. Then we add the two lines\n\n\
    ```\nASY=/usr/local/epics/modules/asyn\nSTREAM=/usr/local/epics/modules/stream\n\
    ```\n\nto the end of the file ./configure/RELEASE and make sure that EPICS_BASE\
    \ points to /usr/local/epics/base.\n\nNext, we prepare the protocol file that\
    \ describes the communication protocol we used earlier: send ‘T?’ and receive\
    \ ‘T 21.2’. The file resides in the subdirectory ./tempApp/Db under the temp base\
    \ directory for this IOC. Inside it we create the following file named temperature.proto\n\
    \n```\n# ./tempApp/Db/temperature.proto\nTerminator = CR LF;\nget_temp {\n   \
    \ out \"T?\";\n    in \"T %f\";\n    ExtraInput = Ignore;\n}\n```\n\nThe content\
    \ is rather straightforward to understand. First we define the terminating characters\
    \ that denote the end of a line, and a function get_temp that sends the string\
    \ T? to the device and expects T and a float (%f) number in return. Moreover,\
    \ any extra characters should be ignored. It is possible to have more than one\
    \ function defined in the same protocol file. The protocol file is the lowest\
    \ level to define the communication; the next higher level is the database file,\
    \ which we already encountered in Section 6.2. Here we use the following file\n\
    \n```\n# ./tempApp/Db/temperature.db\nrecord(ai, \"$(USER):temp\") {\n    field(DESC,\
    \ \"Temperature\")\n    field(SCAN, \"10 second\")\n    field(DTYP, \"stream\"\
    )\n    field(INP, \"@temperature.proto get_temp $(PORT)\")\n}\n```\n\nThis file\
    \ defines an analog input ai record for a process variable with the name $(USER):temp.\
    \ Here $(USER) will be defined in the calling program. The description and update\
    \ rate of 10 seconds are defined in the first two fields. The third field declares\
    \ the record to be of type stream, and as input function (INP) we use the function\
    \ get_temp from the protocol file temperature.proto. We use the communication\
    \ interface with the name supplied in the variable $(PORT). We then have to edit\
    \ ./tempApp/Db/Makefile and add the line"
  mdcn: "## 6.2 与 EPICS 通信\n\n在将带有微控制器的传感器节点连接到 EPICS 之前，我们先通过读取和控制仅存在于树莓派内存中的虚拟参数，来解释\
    \ EPICS 的基本功能。同样，基于文献 [30] 中的示例，我们准备以下 EPICS 数据库文件，并将其命名为 simple2.db。\n\n```\n\
    # simple2.db\nrecord(bo,\"raspi:trigger\") {\n  field(DESC,\"trigger PV\")\n \
