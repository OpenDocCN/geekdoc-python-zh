- md: '## 3.2 MOTORS


    Motors in general translate chemical or electrical energy into mechanical energy,
    normally by rotating an axle in order to provide torque. Here, and in subsequent
    sections, we address electrical motors only. They come in a wide variety of types
    and can be powered by both AC and DC voltages. One of the most common types, and
    the one we will use, is a conventional DC motor with a commutator.


    ### 3.2.1 DC motors


    The operating principle of a DC motor is most easily explained with the help of
    Figure 3.6. It is based on static magnetic field that is stationary in space,
    the *stator*, and one or more coils, electrically excited by an external voltage
    source. They are forced to rotate by reversing the polarity of the exciting voltage
    synchronously with the rotation. The rotating part is called the *rotor*, and
    the synchronous switch is the *commutator*. The torque on the rotor is provided
    by the Lorentz force that the electrons of the electric current experience in
    the external magnetic field. After half a turn, the external magnetic field has
    the “wrong” polarity to continue forcing the coil to rotate, and would brake the
    rotation. This is prevented by reversing the polarity of the current flowing at
    just that point in time which allows the rotation to continue. The polarity reversal
    is effected by the commutator, which is shown as the two D-shaped objects that
    rotate between externally fixed electrodes, called *brushes*. Moreover, reversing
    the supply voltage causes the motor to rotate in the opposite direction.


    The sliding contact between the brushes and the commutator sometimes causes sparking
    at the moment of polarity reversal, because the brushes briefly connect the two
    D-shaped objects and thereby short circuit the supply voltage. The sparks then
    cause electrical disturbances that may be partially alleviated by connecting the
    brushes with a small, say 100 nF, capacitor. This also reduces the creation of
    ozone with its distinct smell, which often accompanies the operation of DC motors.
    In commercially available motors these effects are minimized, and other motor
    designs are used that circumvent these deficiencies. For example, in some *brushless
    DC motors*, the magnetic field of the rotor is provided by permanent magnets whose
    position is continuously monitored with a Hall sensor. This information is used
    in an electronic control unit to periodically excite the current through the coils
    of the stator in order to maintain the rotation. The complexity of the control
    unit places these motors outside the scope of this book, and we use normal DC
    motors for our projects despite their shortcomings.


    We can adjust the torque and the speed of the motor by varying voltage applied
    to the coils. A higher voltage makes the motor turn faster, and reasonable voltages
    are determined by the resistance of the coils. Often, however, it is advantageous
    to limit the voltages and control the currents that flow through the coils instead.
    Moreover, since the rotor has a finite inertia due to its mass, we can use pulse-width
    modulation to control the total power delivered to the coils in order to adjust
    torque and speed. In the fleeting moments when no current flows, the inertia maintains
    the rotation.


    In case you have a model railway, you may know that in the early days the speed
    of the trains was regulated by a variable transformer, and it was very difficult
    to run the trains at very slow speeds with voltages too low to reliably excite
    the coils. Modern model-railway controllers use pulse-width modulation to regulate
    the speed. In that way, the full supply voltage and current are always flowing,
    which reliably excites the coil, just not all the time. Operating the trains at
    slow speed now works much more reliably.


    In this context we have to keep in mind that turning the coils rapidly on and
    off also rapidly changes the magnetic field, and this causes a voltage, the backward
    electromagnetic force, or *back-emf* that opposes the driving voltage. Thus, the
    faster the motor turns, the more the back-emf reduces the voltage, and thereby
    also the current flowing through the coils. This results in a reduced torque and
    for a given coil resistance we can either run at a slower speed or increase the
    driving voltage in order to maintain the required torque.


    As with the model trains, we also want to run the motor both forward and backward.
    Therefore we need to control the polarity of the supply voltage. Instead of reversing
    the supply cables by hand, which is not a very convenient option, we use an H
    bridge whose functionality is easily explained with the help of Figure 3.7. In
    the center of the figure a DC motor is located, with its supply leads extending
    to either side. The unipolar supply voltage is connected to the upper terminal
    labeled V+ and to ground. Depending on the position of the switches A, B, C, and
    D, the current flows through the motor. In case A and D are engaged, it flows
    from left to right, This is indicated by the dotted lines and the sense of rotation
    indicated by the small arrow in the motor. In case B and C are engaged, while
    A and D are open, the current flows in the opposite direction, causing the motor
    to turn in the opposite direction as well. Thus, by suitably toggling the four
    switches, we can adjust the sense of rotation of the motor at will. We only have
    to ensure that only one of the switches A and B is engaged at a given instance,
    because otherwise the supply voltage is short circuited.


    Of course, we can replace the switches with transistors and arrive at a system
    that is easily controllable by a microcontroller. And the situation is made even
    simpler, because ready-made integrated circuits that implement H bridges are available.
    The L293D is one of them, and we will use it in later chapters to control motors.
    Finally, we add speed control by pulse-width modulation. We either add a switching
    transistor between the upper terminal and the supply voltage, or we directly modulate
    the input terminals that control the switches A, B, C, and D.


    At this point we can adjust the speed and direction of a motor, which is essential
    for moving from one place to another, and the velocity at which this happens.
    On the other hand, if we only want to change the position or angle by a small
    amount, such as the rudder of a boat, we need means to directly adjust the position,
    rather than the velocity. Next we discuss two types of systems that do this, servomotors
    and stepper motors.'
  mdcn: '## 3.2 电机


    电机通常将化学能或电能转化为机械能，通常是通过旋转轴来提供扭矩。在此及后续章节中，我们仅讨论电动机。电动机种类繁多，可由交流或直流电压驱动。其中最常见的一种，也是我们将要使用的，是带有换向器的传统直流电机。


    ### 3.2.1 直流电机


    直流电机的工作原理最容易借助图3.6来解释。它基于一个在空间中静止的静磁场，即*定子*，以及一个或多个由外部电压源电激励的线圈。通过在旋转过程中同步反转激励电压的极性，迫使线圈旋转。旋转部分称为*转子*，同步开关则是*换向器*。转子上的扭矩由电流中的电子在外部磁场中受到的洛伦兹力提供。旋转半圈后，外部磁场的极性变得“错误”，无法继续推动线圈旋转，反而会阻碍旋转。通过在恰当时刻反转流经线圈的电流极性，可以防止这种情况发生，从而使旋转得以继续。极性反转由换向器实现，图中显示为两个在外部固定电极（称为*电刷*）之间旋转的D形物体。此外，反转供电电压会使电机向相反方向旋转。


    电刷与换向器之间的滑动接触有时会在极性反转瞬间产生火花，因为电刷会短暂地连接两个D形物体，从而造成供电电压短路。火花随后会引起电气干扰，通过在电刷两端连接一个小电容（例如100
    nF）可以部分缓解这种干扰。这也能减少伴随直流电机运行而产生的、具有特殊气味的臭氧的生成。在市售电机中，这些影响已被最小化，并且采用了其他电机设计来规避这些缺陷。例如，在一些*无刷直流电机*中，转子的磁场由永磁体提供，其位置通过霍尔传感器持续监测。该信息被用于电子控制单元，以周期性地激励定子线圈中的电流，从而维持旋转。控制单元的复杂性使得这类电机超出了本书的范围，尽管存在缺点，我们仍在项目中使用普通的直流电机。


    我们可以通过改变施加在线圈上的电压来调节电机的扭矩和转速。电压越高，电机转速越快，而合理的电压值由线圈的电阻决定。然而，通常限制电压并控制流经线圈的电流更为有利。此外，由于转子因其质量而具有有限的惯性，我们可以使用脉宽调制来控制输送到线圈的总功率，从而调节扭矩和转速。在电流不流动的短暂瞬间，惯性维持着旋转。


    如果你有模型铁路，你可能知道在早期，火车的速度是通过可变变压器调节的，当电压过低无法可靠地激励线圈时，让火车以非常慢的速度运行是非常困难的。现代模型铁路控制器使用脉宽调制来调节速度。这样，完整的供电电压和电流始终在流动，可靠地激励线圈，只是并非持续不断。现在以慢速运行火车要可靠得多。


    在此背景下，我们必须记住，快速开关线圈也会快速改变磁场，这会产生一个电压，即反向电磁力，或称*反电动势*，它与驱动电压相反。因此，电机转速越快，反电动势降低的电压就越多，从而也减少了流经线圈的电流。这导致扭矩减小，对于给定的线圈电阻，我们可以选择以较慢的速度运行，或者增加驱动电压以维持所需的扭矩。


    与模型火车一样，我们也希望电机能够正向和反向运行。因此，我们需要控制供电电压的极性。我们不采用手动反转供电线（这不太方便）的方式，而是使用H桥，其功能很容易借助图3.7来解释。图中央是一个直流电机，其供电引线向两侧延伸。单极性供电电压连接到标有V+的上端子和地。根据开关A、B、C和D的位置，电流流过电机。如果A和D接通，电流从左向右流动，如虚线和电机内小箭头所示的旋转方向所示。如果B和C接通，而A和D断开，电流则反向流动，导致电机也向相反方向旋转。因此，通过适当地切换四个开关，我们可以随意调整电机的旋转方向。我们只需确保在给定时刻只有A和B中的一个开关接通，否则供电电压会短路。


    当然，我们可以用晶体管代替开关，从而得到一个易于由微控制器控制的系统。情况变得更加简单，因为现成的实现H桥的集成电路已经可用。L293D就是其中之一，我们将在后续章节中使用它来控制电机。最后，我们通过脉宽调制添加速度控制。我们可以在上端子和供电电压之间添加一个开关晶体管，或者直接调制控制开关A、B、C和D的输入端子。


    至此，我们可以调节电机的速度和方向，这对于从一个地方移动到另一个地方以及移动的速度至关重要。另一方面，如果我们只想改变位置或角度一小部分，例如船的舵，我们需要的是直接调节位置而非速度的方法。接下来我们讨论两种实现此目的的系统：伺服电机和步进电机。'
