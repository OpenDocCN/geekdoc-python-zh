  - '[PAGE 31]


    ![](img/8f23875c54d5b3177d5d2a5bba06b37e_31_0.png)


    for ground, supply voltage, and output voltage. The latter is proportional to
    the magnetic field, with a sensitivity of 50 mV/mT centered at 2.5 V when no field
    is present.


    The ADXL335 is a three-axis integrated *acceleration* sensor based on micromachined
    structures on a silicon substrate where an inertial mass is suspended by springs
    [14]. The inertial mass is part of an assembly of capacitors driven by an AC voltage
    that is used to measure the imbalance of a capacitive voltage divider. As opposed
    to our simplified model with only one capacitor doublet, the real device uses
    a large number of interleaved capacitor doublets in order to increase the sensitivity.
    Figure 2.11 illustrates the principle of operation for a single direction. On
    the left in Figure 2.11 there is an AC-voltage generator that drives the light-grey
    capacitor plates. The dark-grey inertial mass is placed halfway between the driven
    plates, and in the absence of acceleration, the capacitances between the two light
    grey plates and the inertial mass are equal. Any acceleration introduces an imbalance
    in the capacitances that affects the voltage level on the inertial mass. Comparing
    the phase and amplitude of that signal with that of the driving AC signal yields
    direction and magnitude of the acceleration. After some signal processing, it
    is then made available as $U_{acc}$ on one of the output pins of the ADXL335 in
    the range from 0 to 3 V. This voltage is proportional to the acceleration in the
    range from -3g to +3g and is updated at a rate of about 100 times per second.


    The SM-24, shown in Figure 2.12, is another type of accelerometer called a *geophone*.
    It is based on a coil connected to the housing by springs embedded in a magnetic
    field generated by permanent magnets that are attached to the housing. If the
    housing moves, the coil remains stationary due to its inertia, and a voltage is
    induced in the coil, which is proportional to the velocity and can be measured.
    The sensitivity is 28.8 V/(m/s) and the device operates in the range of 10–240
    Hz.


    *Microphones* convert sound to electrical signals and can be classified as sensors.
    Two major classes are on the market. *Dynamic microphones* operate similarly to
    the geophones. A coil, attached to a membrane, is excited by sound, moves in a
    magnetic field, and induces an induction voltage in the coil that is amplified
    and measured. In *electret microphones*, the membrane constitutes one electrode
    of a capacitor. If it moves, the capacitance changes, and the amount of charge
    stored on the capacitor is pushed on and off the capacitor and creates a current
    that is amplified and measured.


    The electret microphone serves as a nice example with which to turn to current-based
    sensors.'
  - '[PAGE 32]


    ![](img/8f23875c54d5b3177d5d2a5bba06b37e_32_0.png)


    Figure 2.12 An SM-24 geophone with a diameter of about 30 mm.


    # 2.1.3 Current-based sensors


    The BPW34, shown on the left-hand side in Figure 2.14, is a *pin* diode that generates
    a current of up to 100 nA depending on the irradiance of up to mW/cm². Pin diodes
    are similar to conventional diodes and consist of a semiconductor with a *pn*
    junction. It is created by doping semiconductor material, often silicon based,
    with a material that has either five valence electrons, in which case it becomes
    *n*-doped, or three valence electrons, in which case it becomes *p*-doped. Pin
    diodes, however, have an additional layer of un-doped, intrinsically (‘*i*’) conducting
    silicon in order to increase the target area for the photons to produce additional
    charge carriers. One operational mode of the pin diode, called photoconductive,
    is illustrated on the left-hand side of Figure 2.13, which shows a simplified
    energy-band diagram of a reverse-biased diode. Note that by convention, the upwards
    energy axis corresponds to the potential energy of *electrons* that is lowest
    at the most positive voltage and that is found on the left-hand side. In the figure
    the cathode (*n* side) is therefore at higher voltage than the anode (*p* side)
    and results in all charge carriers being pulled out of the intermediate zone;
    electrons to the left and holes to the right. This results in the diode blocking
    any current flow. The extra layer of un-doped silicon provides extra potential
    charge carriers that act as targets for photons, having energy higher than the
    band-gap. These photons create electron–hole pairs by lifting electrons from the
    valence


    ![](img/8f23875c54d5b3177d5d2a5bba06b37e_32_1.png)


    Figure 2.13 Energy-band diagram (left) and circuit (right) of a reverse-biased
    pin diode in photoconductive mode.'
  - '[PAGE 33]


    ![](img/8f23875c54d5b3177d5d2a5bba06b37e_33_0.png)


    Figure 2.14 Image of a BPW34 pin diode on the left and two phototransistors on
    the right; an IR-sensitive BPX38 and an SFH3310, sensitive to visible light.


    band into the conduction band, as indicated in Figure 2.13. The applied voltage,
    which is more positive on the left-hand side, causes the electrons to move to
    the left and the holes move to the right. Combined, this constitutes a current
    $I_p$. Adding a colored film of plastic – a filter – in front of the diode makes
    the response color sensitive. Using red, green, and blue filters thus produces
    the color sensor used in the TCS34725 that we discuss below. We mention in passing
    that ionizing radiation, such as high-energy photons and gamma rays as well as
    charged particles with high energies, create electron-hole pairs. This makes pin-diodes
    suitable as radiation detectors. The circuit on the right-hand side of Figure
    2.13 shows an operational amplifier that converts the current $I_p$ flowing towards
    its negative input port into a voltage $V_o = -R_f I_p$ on its output port. This
    use of the op-amp is referred to as a *transimpedance amplifier*. We will cover
    this and other uses in more detail in the coming sections.


    *Phototransistors* such as the BPX38 or SFH3310, both shown on the right of Figure
    2.14, are similar to normal transistors, but their base-collector diode is a reverse-biased
    photo-diode, similar to the one described in the previous paragraph. It causes
    a current to flow as a consequence of impinging photons. The base-emitter diode
    is already forward biased and will ensure that the collector–emitter connection
    becomes conducting. Moreover, often there is a lens to increase the number of
    photons impinging onto the base terminal with the photosensitive area. Phototransistors
    sensitive to special spectral ranges such as infrared radiation, by suitably choosing
    their band gap, can be used as flame detectors.


    The sensors in imaging applications such as cameras are *charge-coupled devices*,
    or CCDs, which are similar to a pin diode attached to a small capacitor, one for
    each pixel of the camera. Exposure to light transfers a small charge to the capacitor.
    The often large number of pixels are read out sequentially by transferring the
    charge from on capacitor to the one closer to the external readout port. A bucket
    chain to transfer water that is emptied at the end point comes to mind. In a CCD,
    once the charge reaches the output port, it is passed through a resistor, where
    it creates a voltage drop that is measured.


    *Solar cells* operate in a similar fashion to photodiodes in photovoltaic mode
    where they provide a voltage to a load. They are, however, optimized to absorb
    as large a part of the spectrum as possible, and also to have a large absorbing
    area, in order to maximize the electric power available to the load.


    After this brief overview of different analog sensors, we need to address how
    to prepare the signals such that they can be easily interfaced. This preparatory
    stage is referred to as signal conditioning.'
  - '[PAGE 34]


    ![](img/8f23875c54d5b3177d5d2a5bba06b37e_34_0.png)


    Figure 2.15 On the left we have a voltage divider to reduce the input voltage
    of 0–5 V to 0–3.3 V. The right circuit shows the use of clamping diodes to protect
    the input of the microcontroller to lie between ground and 5 V†.


    # 2.2 SIGNAL CONDITIONING


    The analog signals from the sensors can be too high or too low. They can be too
    noisy or otherwise inadequate to directly feed to an analog-to-digital converter
    (ADC) or a microcontroller. In many cases some signal conditioning is needed,
    and we will discuss some common methods in the following sections.


    # 2.2.1 Voltage divider


    In case the input voltage of the sensor exceeds the input range of what the microcontroller
    can handle, we have to reduce the voltage by a *voltage divider*, which consists
    of two fixed-value resistors. A typical example is to reduce the range from 0–5
    V to 0–3.3 V, which is accomplished by a combining two resistors with a ratio
    of $R_1/(R_1 + R_2) = 3.3/5 = 0.66$. A close example is shown in Figure 2.15,
    with a 12 and a 22 kΩ resistor. The ratio is 22/34 = 0.65, which is close to the
    desired ratio. Other combinations with larger and smaller values will work as
    well, as long as the ratio is correct. The sum of both resistors should not be
    too small because that will draw a larger current from the 0–5 V voltage source,
    and, depending on the internal resistance of the source, may affect the measured
    values.


    In order to improve the measurement sensitivity, resistance-based sensors are
    often wired in a Wheatstone-bridge configuration. An example is shown on the right
    of Figure 2.1. Here the voltage divider on the left side of the breadboard provides
    half the supply voltage at its center tap (the lower-signal wire) because the
    two resistors are equal. The voltage divider on the right-hand side is the same
    one, we encountered previously, with the upper-signal wire connected to the point
    between the upper resistor and the LDR. Normally one would choose the resistance
    of the right resistor to be in the middle of the range of interest of the LDR,
    such that voltage-difference between the signal wires is close to zero, indicating
    mid-range. In this way, depending on the light exposure, the voltage difference
    between the wires varies around zero and the sign tells us whether the exposure
    is lower or higher than the expected mid-range value. Since we now deal with voltages
    that vary around zero, it is easier to amplify that voltage in order to increase
    the sensitivity. For example, when using a plain voltmeter, we can use a smaller
    voltage range.'
- md: '## 2.2.2 Amplifiers


    Very small electrical signals usually need to be amplified to reach levels adequate
    for further processing. The standard device to achieve this is an *operational
    amplifier* or op-amp, shown on the left of Figure 2.16. There are two input ports
    on the left, one labeled “plus,” one labeled “minus,” and one output port. The
    latter delivers a voltage that depends on the difference between the two input
    ports. In an ideal op-amp, the amplification factor is infinite and we usually
    use some feedback mechanism to obtain a deterministic behavior, as discussed below.
    Normally, op-amps require both positive and negative supply voltage, even though
    sometimes it is possible to tie the negative supply rail to ground, in which case
    only unipolar signals can be amplified.


    Before discussing different circuits, we need to describe three basic principles
    that characterize op-amps.


    - The input impedance of the input ports is “infinite,” which means that no current
    flows into the op-amp and it will not load the upstream circuitry.

    - The op-amp tries to reduce the difference between the input ports $V_+ - V_-$
    to zero.

    - The amplification without feedback is quasi-infinite, and the output has a very
    low impedance and can provide high output currents.


    These simple rules will help us to design and understand the following circuits,
    but consult for example [17–19] for a more extensive discussion.


    We start by considering a *line buffer*, which is typically used as an impedance
    converter to transform the output of a sensor with a high impedance to a low-impedance
    signal that is less susceptible to noise. We show the circuit on the right-hand
    side in Figure 2.16, where the output of the op-amp is fed back onto the negative
    input port. By using the second op-amp rule, we see that the op-amp tries to make
    the positive and negative input ports equal, but the negative is tied to the output,
    which forces the output to follow the positive input. Moreover, by the first rule,
    the input impedance is high and no current (or at least very small current) is
    drawn from the sensor, while the output impedance is low and can provide a high
    current. Note that we omitted the connections to the supply rails on the right
    of Figure 2.16 and will do so henceforth in order to avoid cluttering the schematics.


    Adding a resistor $R$ to the feedback branch, as shown on the left-hand side in
    Figure 2.17, forces a current $I$, entering the circuit from the left, to pass
    $R$ where it causes a voltage drop $V_- - V_{out} = IR$. Since the positive input
    terminal of the op-amp is tied to ground, we have $V_+ = 0$ and the second op-amp
    rule also forces $V_-$ to zero, such that we find that the output voltage $V_{out}$
    is given by $V_{out} = -IR$. The feedback resistor $R$ thus converts the input
    current $I$ to the output voltage $V_{out}$. This is the reason that the circuit
    is referred to as a *transimpedance amplifier*. Note that we already met one in
    Figure 2.13.


    Adding a resistor to the negative input terminal turns the previous circuit into
    a *voltage-controlled current source*, shown on the right-hand side in Figure
    2.17. The grounded positive input of the op-amp forces the voltage on its negative
    input terminal to be zero, which causes a current through the resistor to be $I
    = V_{in}/R$. And this current must pass through the load such as a PT100 temperature
    sensor discussed in Section 2.1.1.


    Let us consider this circuit a little further by calculating the voltage at the
    output of the op-amp, as shown on the right-hand side in Figure 2.18. The input
    current $I_{in}$ only flows through the input resistor $R_4$ and the feedback
    resistor $R_5$ because the input impedance of the op-amp is essentially infinite
    and no current flows into the input ports. But the equality of the current in
    the input and the feedback resistor implies $I = (V_{in} - V_-)/R_4 = (V_- - V_{out})/R_5$.
    Moreover, we observe that the positive input port is grounded, which forces the
    negative input port to be on ground potential as well. This implies $V_- = 0$,
    and the relation between input and output voltage becomes $V_{out} = -V_{in}R_5/R_4$,
    where the negative sign indicates that the amplifier is inverting. Note that we
    can add several input resistors $R_4$ in parallel with one end connected to the
    negative input port. This allows us to add the currents passing through the parallel
    copies of $R_4$, and we obtain a summing amplifier. The resistor values were simply
    chosen to be in a reasonable range. They need to be determined for each application.


    If we want to amplify a voltage without inverting it, we use the circuit shown
    on the left-hand side in Figure 2.18. The two resistors $R_1$ and $R_2$ constitute
    a voltage divider that forces the negative input voltage to be $V_- = V_{out}R_2/(R_1
    + R_2)$. But, at the same time, the op-amp forces $V_- = V_+$, which, after solving
    for $V_{out}$, leads to $V_{out} = V_+(R_1 + R_2)/R_2$, where $(R_1 + R_2)/R_2
    = 1 + R_1/R_2$ is the amplification factor. Since the output voltage $V_{out}$
    has the same sign as the input voltage $V_+$ on the positive input port, this
    configuration is called a non-inverting amplifier.


    Sometimes the signal one wants to measure changes around a non-zero baseline.
    Examples are the Hall sensor A1324 from the previous section, where zero magnetic
    field produces 2.5 V and the magnetic field added or subtracted from that value
    depending on its polarity. In order to increase the resolution, we want to amplify
    not the signal, but the difference of the signal to the baseline. In other words,
    we need a circuit to subtract the baseline and amplify the difference. A differential
    amplifier as shown in Figure 2.19 accomplishes this feat, provided that $R_2 =
    R_4$ and $R_1 = R_2$. The output voltage $V_{out}$ in that case is given by $V_{out}
    = (V_2 - V_1)R_2/R_1$. Adding a potentiometer that adjusts $V_1$ between the positive
    and negative supply rail subtracts it as baseline voltage.


    A circuit similar to the one in Figure 2.19 but with line buffers on the inputs
    is called an *instrumentation amplifier*, and an example is shown on the left
    of Figure 2.20. Normally it is not necessary to build instrumentation amplifiers
    from discrete components. There are ready-made circuits available such as the
    AD620 or INA131. Moreover, the AD8232 is a special-purpose instrumentation amplifier
    for *electrocardiography* applications. It amplifies and processes the weak signals
    picked up by electrodes attached to a patient''s chest and outputs the characteristic
    traces seen on heart-rate monitor screens. It provides signal-conditioning circuitry
    to filter out and to compensate external disturbances, such as the 50 Hz line
    frequency (60 Hz in the US).


    Often, sensors produce small voltages that vary around zero, but the analog-to-digital
    converter (ADC) requires an input range of 0 to 5 V. We thus face the problem
    of amplifying a bipolar signal and changing the baseline level to mid range of
    the ADC. We show a circuit that amplifies by approximately a factor of 10 in Figure
    2.21. The amplification is mainly determined by the ratio of the feedback resistor
    $R_3$ to the input resistors $R_1$ and $R_2$. The voltage divider of $R_6$ and
    $R_8$ provides the mid-range offset voltage. The average level of the output voltage
    crucially depends on the tolerances of the resistors, and in order to place the
    level safely in mid range, we use the capacitor $C_1$ to first remove the DC level
    of the output signal before adjusting it properly to mid-range, with the voltage
    divider consisting of $R_4$ and $R_5$.


    In case we need to amplify input signals that vary over a huge range of values,
    a *logarithmic amplifier* such as the one on the right of Figure 2.20 is a useful
    circuit. It can be shown that the relation between input and output voltage is
    $V_{out} = -V_t \ln(V_1/I_sR)$, where $V_t$ is the thermal voltage and $I_s$ the
    saturation current of the diode. Swapping the diode and the resistor results in
    an exponential amplifier.


    A close relative to the operational amplifier is the *comparator*. It can be visualized
    as an op-amp with very large, even infinite, amplification, whose output port
    saturates at the supply rails.'
  mdcn: '## 2.2.2 放大器


    非常微弱的电信号通常需要被放大到足以进行后续处理的电平。实现这一目标的标准器件是*运算放大器*（简称运放），如图2.16左侧所示。它左侧有两个输入端口，一个标有“+”，一个标有“-”，以及一个输出端口。输出端口提供的电压取决于两个输入端口之间的差值。在理想运放中，放大系数是无穷大的，我们通常使用某种反馈机制来获得确定的行为，如下所述。通常，运放需要正负电源电压，尽管有时可以将负电源轨接地，这种情况下只能放大单极性信号。


    在讨论不同的电路之前，我们需要描述表征运放的三个基本原则：


    - 输入端口的输入阻抗是“无穷大”的，这意味着没有电流流入运放，它不会对上游电路造成负载。

    - 运放试图将输入端口之间的差值 $V_+ - V_-$ 减小到零。

    - 无反馈时的放大是准无穷大的，输出阻抗非常低，可以提供大的输出电流。


    这些简单的规则将帮助我们设计和理解以下电路，但更广泛的讨论请参阅例如[17–19]。


    我们首先考虑一个*线性缓冲器*，它通常用作阻抗转换器，将高阻抗传感器的输出转换为对噪声不那么敏感的低阻抗信号。我们在图2.16右侧展示了该电路，其中运放的输出被反馈到负输入端口。利用运放的第二条规则，我们看到运放试图使正负输入端口相等，但负端口连接到输出，这迫使输出跟随正输入端口。此外，根据第一条规则，输入阻抗很高，不会从传感器汲取电流（或至少是非常小的电流），而输出阻抗很低，可以提供大电流。请注意，我们省略了图2.16右侧的电源轨连接，此后也将如此，以避免电路图过于杂乱。


    在反馈支路中添加一个电阻 $R$，如图2.17左侧所示，迫使从左侧进入电路的电流 $I$ 流过 $R$，从而产生电压降 $V_- - V_{out} = IR$。由于运放的正输入端接地，我们有
    $V_+ = 0$，运放的第二条规则也迫使 $V_-$ 为零，因此我们发现输出电压 $V_{out}$ 由 $V_{out} = -IR$ 给出。反馈电阻
    $R$ 因此将输入电流 $I$ 转换为输出电压 $V_{out}$。这就是该电路被称为*跨阻放大器*的原因。请注意，我们在图2.13中已经见过一个这样的电路。


    在负输入端添加一个电阻，将之前的电路变成了*压控电流源*，如图2.17右侧所示。运放接地的正输入端迫使负输入端的电压为零，这导致流过电阻的电流为 $I =
    V_{in}/R$。而这个电流必须流过负载，例如第2.1.1节讨论的PT100温度传感器。


    让我们进一步考虑这个电路，计算运放输出端的电压，如图2.18右侧所示。输入电流 $I_{in}$ 仅流过输入电阻 $R_4$ 和反馈电阻 $R_5$，因为运放的输入阻抗本质上是无穷大的，没有电流流入输入端口。但输入电阻和反馈电阻中的电流相等意味着
    $I = (V_{in} - V_-)/R_4 = (V_- - V_{out})/R_5$。此外，我们观察到正输入端口接地，这迫使负输入端口也处于地电位。这意味着
    $V_- = 0$，输入和输出电压之间的关系变为 $V_{out} = -V_{in}R_5/R_4$，其中负号表示放大器是反相的。请注意，我们可以添加多个输入电阻
    $R_4$ 并联，一端连接到负输入端口。这允许我们将流过并联 $R_4$ 的电流相加，从而得到一个求和放大器。电阻值只是选择在一个合理的范围内。它们需要根据每个应用来确定。


    如果我们想放大电压而不使其反相，我们使用图2.18左侧所示的电路。两个电阻 $R_1$ 和 $R_2$ 构成分压器，迫使负输入电压为 $V_- = V_{out}R_2/(R_1
    + R_2)$。但是，同时，运放迫使 $V_- = V_+$，解出 $V_{out}$ 后得到 $V_{out} = V_+(R_1 + R_2)/R_2$，其中
    $(R_1 + R_2)/R_2 = 1 + R_1/R_2$ 是放大系数。由于输出电压 $V_{out}$ 与正输入端口的输入电压 $V_+$ 符号相同，这种配置被称为同相放大器。


    有时，我们想要测量的信号围绕一个非零基线变化。例如上一节中的霍尔传感器A1324，零磁场产生2.5 V，磁场根据其极性在此值上增加或减少。为了提高分辨率，我们想要放大的不是信号本身，而是信号与基线的差值。换句话说，我们需要一个电路来减去基线并放大差值。如图2.19所示的差分放大器实现了这一功能，前提是
    $R_2 = R_4$ 且 $R_1 = R_2$。在这种情况下，输出电压 $V_{out}$ 由 $V_{out} = (V_2 - V_1)R_2/R_1$
    给出。添加一个电位器，在正负电源轨之间调节 $V_1$，可以将其作为基线电压减去。


    一个类似于图2.19但输入端带有线性缓冲器的电路称为*仪表放大器*，一个例子如图2.20左侧所示。通常不需要用分立元件构建仪表放大器。有现成的电路可用，例如AD620或INA131。此外，AD8232是一种用于*心电图*应用的专用仪表放大器。它放大并处理通过电极贴在患者胸部拾取的微弱信号，并输出在心率监测器屏幕上看到的特征性波形。它提供信号调理电路，以滤除和补偿外部干扰，例如50
    Hz的工频（在美国是60 Hz）。


    通常，传感器产生围绕零点变化的小电压，但模数转换器（ADC）需要0到5 V的输入范围。因此，我们面临放大双极性信号并将基线电平改变到ADC中间范围的问题。我们在图2.21中展示了一个大约放大10倍的电路。放大倍数主要由反馈电阻
    $R_3$ 与输入电阻 $R_1$ 和 $R_2$ 的比值决定。$R_6$ 和 $R_8$ 的分压器提供中间范围的偏移电压。输出电压的平均电平关键取决于电阻的公差，为了将电平安全地置于中间范围，我们使用电容
    $C_1$ 首先去除输出信号的直流电平，然后通过由 $R_4$ 和 $R_5$ 组成的分压器将其适当地调整到中间范围。


    如果我们需要放大在巨大数值范围内变化的输入信号，*对数放大器*（如图2.20右侧所示）是一个有用的电路。可以证明，输入和输出电压之间的关系是 $V_{out}
    = -V_t \ln(V_1/I_sR)$，其中 $V_t$ 是热电压，$I_s$ 是二极管的饱和电流。交换二极管和电阻的位置会产生一个指数放大器。


    运算放大器的一个近亲是*比较器*。它可以被看作是一个具有非常大、甚至无穷大放大倍数的运放，其输出端口在电源轨处饱和。'
