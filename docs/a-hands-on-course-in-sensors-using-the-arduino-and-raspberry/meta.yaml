    Figure 4.25 Connecting a speaker and a piezo buzzer to the Arduino†.


    LED or NeoPixel are not the only way to attract attention. Whereas they obviously
    address the eye we can also address our ears with acoustic signals. The simplest
    example is a small loudspeaker that we can either use as a simple buzzer, or even
    code with simple acoustic patterns to identify certain things. For instance, if
    a moving robot gets stuck in a corner, we may want it to sound like a siren.


    We interface a speaker to the UNO by connecting one terminal to ground on the
    Arduino and the other to a digital output pin, say pin 2, as shown in Figure 4.25.
    In order to produce a tone of 440 Hz for 1000 ms, we use the Arduino command


    ```

    tone(2, 440, 1000);

    ```


    placed anywhere in the Arduino sketch. Initialization of the pin as digital output
    is done automatically. Replacing the 2 by a 3 will sound the piezo buzzer shown
    in Figure 4.25.


    After being able to interface a number of sensors and actuators over the serial
    line, we need to take a closer look at the different ways to communicate to the
    host computer and how to receive the data there.


    # 4.6 COMMUNICATION TO HOST


    So far, we used only the serial monitor in the Arduino IDE to communicate with
    the Arduino, but normally we also want to communicate from other programs, and
    that is the topic of this section.


    # 4.6.1 RS-232 and USB


    The serial monitor in the Arduino IDE uses an RS-232 protocol that is transported
    over a USB line. The translation happens automatically, and plugging the USB cable
    into the host computer causes the latter to automatically create a device file
    (/dev/ttyUSBx or /dev/ttyACMx on Linux, COMx on Windows, and /dev/tty.usbserial-xxx
    on a Mac) that represents the other end of the communication channel from the
    UNO to the host computer. We can then use any terminal program on the host computer
    to connect to that device file, but have to keep in mind to use the same baud
    rate that we specify in the setup() function on the Arduino. To find out the device
    file to which the Arduino is connected, we can use the Arduino IDE and inspect
    the Tools→Port menu, and write the name of the device file down. In my case it
    was /dev/ttyACM0. After we close the Arduino IDE, we can use any terminal-emulator
    program, such as putty on Windows, or the very basic program screen on Linux or
    Mac, to connect to the UNO. In my case the command'
