    # 6.3 ASYN AND STREAM LIBRARIES


    The external sensor nodes communicate with the Raspi via serial RS-232 lines,
    Bluetooth, Ethernet, or WLAN. EPICS requires interface libraries to be able to
    take over these communication channels. For this purpose we install two additional
    packages, `asyn` and `StreamDevice` into the newly created subdirectory `/home/pi/epics/modules/`
    with the following sequence of commands.


    ```

    mkdir /home/pi/epics/modules

    cd /home/pi/epics/modules

    git clone https://github.com/epics-modules/asyn.git

    ```


    Here we use `git` to create the subdirectory `/usr/local/epics/modules/asyn` and
    copy all files from the repository for the asyn package to it. At the time of
    writing release 4-43 was the most recent one. Before compiling the package, we
    need to edit the `./asyn/configure/RELEASE` file, change the `EPICS_BASE` variable
    to `/usr/local/epics/base`, and make sure that the lines starting with `IPAC`
    and `SNCSEQ` are commented out with a hash character in the first column. Once
    this is done we compile by entering `make -j 4` in the directory `/usr/local/epics/modules/asyn`
    and wait a few minutes for completion.


    The second module we need to install is the `StreamDevice` package. Inside the
    subdirectory `/home/pi/epics/modules/` we directly download the source code with
    `git` by executing


    ```

    git clone https://github.com/paulscherrerinstitute/StreamDevice.git

    ln -s StreamDevice stream

    cd stream

    ```


    This creates a subdirectory `StreamDevice` and makes it known under the generic
    name `stream` before we use `cd` to enter it. To make the build process compatible
    with the standard `make` system, we need to remove the `GNUmakefile` – if it is
    present – from that subdirectory before editing `./configure/RELEASE` to make
    sure that `EPICS_BASE` points to `/usr/local/epics/base` and that the three line
    starting with `ASYN=` read


    ```

    ASYN=/usr/local/epics/modules/asyn

    #CALC=$(SUPPORT)/calc-3-7

    #PCRE=$(SUPPORT)/pcre-7-2

    ```


    Here, we added a hash to prevent including support for the CALC and PCRE modules.
    Finally, we initiate the compilation by running `make -j 4` in the `/home/pi/epics/modules/stream`
    subdirectory. This completes the preparation of the basic libraries, and we are
    ready to write IOCs that talk to our hardware, the microcontrollers with the sensors
    and actuators attached.'
