- md: '## 4. When do you need to use an H bridge driver to control a DC motor?


    5. Can you use a Darlington driver, such as the ULN2003, to control a DC motor
    with pulse-width modulation?


    6. When would you use a DC motor, and when is a model-servo the better option?
    Discuss!


    7. Use a multimeter to determine the resistance between the wires of a stepper
    motor and identify the internal wiring.


    8. Discuss the pros and cons of using unipolar versus bipolar stepper motors.


    9. Discuss microstepping and draw the currents in the coils as a function of time.


    10. We plan to control a device by low-pass filtering a pulse-width modulated
    signal. How does the ripple of the control voltage depend on the input impedance
    of the device? How does the capacitor enter the discussion? What happens if we
    plan to apply fast changes? Discuss!


    11. Investigate what a *thyristor* is and where it is used.


    12. Investigate what a *triac* is and where it is used.


    13. Investigate what an *IGBT* is and where it is used.


    14. Design a small crane to lift cargo from a model boat onto a quay. Which actuators
    and which sensors do you need? Motivate their use.


    15. Design a mechanism that wakes you up with almost certainty. Which actuators
    do you use and why?


    ## Microcontroller: Arduino


    The microcontrollers we use in this book come are all supported by the Arduino
    *integrated development environment* (IDE), which provides an easy-to-use programming
    environment that allows us to quickly start developing software. There are limitations,
    but it is a wonderful system to start learning about microcontrollers.


    ### 4.1 HARDWARE


    The original Arduinos are based on Atmel microcontrollers and we mostly discuss
    the Arduino UNO. Support for additional families of controllers, based on ESP8266
    and ESP32 microcontrollers with built-in WLAN support was later integrated into
    the Arduino IDE. These controllers can be therefore programmed in much the same
    way as UNOs. But let us start with the UNOs.


    #### 4.1.1 Arduino UNO


    An Arduino UNO is shown in Figure 4.1, where the main component is the ATmega328p
    microcontroller from Atmel (now Microchip™), which is the large chip with 28 legs
    in the image. It is a controller with 8-bit-wide registers, and operates at a
    clock frequency of 16 MHz. It has 32 kB RAM memory and 1 kB non-volatile EEPROM
    memory, which can be used to store persistent data that need to survive tuning
    off and on the supply voltage. There are three timers on board, which are basically
    counters that count clock cycles and are programmable to perform some action,
    once a counter reaches some value. The UNO interacts with its environment through
    13 digital input–output (IO) pins, of which most can be configured to be either
    input or output and have software-configurable pull-up resistors. Several of the
    pins are configurable to support I2C, SPI, and RS-232 communication. Moreover,
    there are six analog input pins. They measure voltages of up to the supply voltage
    of 5 V. Optionally, an internal reference voltage source provides a 1.1 V reference.
    All digital and analog pins are routed to pin headers that are visible on both
    sides of the Arduino printed circuit board (PCB) in Figure 4.1. Furthermore, the
    built-in hardware RS-232 port is connected to an RS-232-to-USB converter that
    allows communication and programming from a host computer. There is no WiFi, Bluetooth,
    or Ethernet support on the UNO board, but extension boards to provide this functionality,
    so-called *shields*, are available for mounting directly onto the pin headers.


    One can describe the Arduino UNO as having the intelligence of a washing machine.
    It keeps time with the timers, it can sense voltages from, for example, temperature
    sensors, and it can turn motors or pumps on or off, depending on whether some
    condition is met. In this way it can also provide the glue logic to interface
    sensors (analog, I2C, SPI, and other) to the host computer, and that is the mode
    in which we will use the UNO later on. In passing, we mention that there is a
    large selection of Arduino boards, from those with a smaller footprint, the *Micro*
    and the *Nano* over the *Mega* with its large number of IO pins to the *MKR*,
    *RP2040*, and *Portenta* boards with more powerful CPUs and built-in wireless
    interfaces.


    In the next section, however, we address a separate group of microcontrollers,
    the ESP8266 and the ESP32.


    ### 4.1.2 ESP8266, NodeMCU, and ESP32


    The ESP8266 was released by the Chinese company Espressif in 2014 followed by
    the ESP32 in 2016. These controllers quickly became one of the most exciting platforms
    for Internet of Things (IoT) projects because they have built-in and ready-to-use
    WiFi support, including a small patch antenna. The software development kit (SDK)
    from Espressif was soon integrated into the Arduino IDE, and today the ESP8266
    and ESP32 can be programmed using the Arduino ecosystem as easily as the original
    Arduinos.


    But let us now look at the ESP8266 hardware, which comes in different incarnations.
    We will not only focus on the more elaborate NodeMCU board but also mention the
    basic ESP-01 in this section. Images of the ESP-01 and NodeMCU hardware are shown
    at the left and center of Figure 4.2, respectively. The microcontroller on both
    chips is essentially the same, only the number of internal pins that are routed
    to pins on the circuit boards is different. Internally, the ESP8266 chips feature
    32-bit RISC CPUs that normally operate at 80 MHz or 160 MHz, and have 64 kB of
    RAM for instructions and 96 kB for data. There are 16 general-purpose IO (GPIO)
    pins that can be configured as input or output pin, as well as a single analog
    input with a 10-bit ADC. The controller supports I2C and SPI communication as
    well as RS-232. All this is similar to the Arduino, except it runs faster, and
    the internal registers are wider (32 instead of 8 bit in the ATmegas), but the
    really cool feature is the built-in WiFi support. It fulfills the specifications
    for IEEE 802.11 b/g/n with WPA authentication, which is what most wireless networks
    use today. So basically, we are able to connect an ESP8266 to any wireless network.


    Two years after the ESP8266, the more powerful dual-core ESP32 microcontroller
    was released. It has practically all the features, including WiFi, of the earlier
    model, but runs at higher clock speeds of up to 240 MHz, has 320 kB of RAM, and
    Bluetooth (BLE) support on board. Particularly attractive for data acquisition
    applications are up to eighteen 12-bit ADC channels and two eight-bit digital-to-analog
    converters (DAC). In recent years a number of variants of the ESP32 with different
    numbers of cores and other capabilities appeared.


    After having introduced the hardware, we need to move on and start programming.
    We therefore provide a quick-start guide for the Arduino IDE in the following
    section.


    ### 4.2 GETTING STARTED


    Despite the availability of the new Arduino IDE version 2, we suggest to use the
    most recent version 1, which is 1.8.19 at the time of writing, because some features
    needed in later chapters are not yet available in version 2. Both versions are
    available from [https://www.arduino.cc/en/software](https://www.arduino.cc/en/software)
    for the most common operating systems, including Linux, Mac, and Windows. Basically,
    we go to the webpage, select the version appropriate for our computer type, and
    download the software package. Then we install it by following the instructions
    given on the website. Once the installation completes, we start the IDE by clicking
    the icon, or start it from the command line by typing `arduino` followed by `Enter`,
    which should open the IDE and display a window similar to the one shown in Figure
    4.3. If not, create a “New” sketch, which is what Arduino programs are called,
    by selecting “New” from the “File” menu.


    Here we already see the general structure of Arduino programs (or synonymously
    “sketches”). There is a `setup()` function, which is *executed once*, immediately
    after power is turned on. In this routine all initialization housekeeping is done,
    such as defining a pin to be output or input, and configuring the serial line.
    Once the `setup()` function completes, the `loop()` function is called repetitively,
    such that once it completes, it is called again and so forth, until power is turned
    off. Note that the programming language supported by the Arduino IDE is very similar
    to the C language. There are, however, a number of extensions to provide access
    to the specific hardware, such as the ADC.'
