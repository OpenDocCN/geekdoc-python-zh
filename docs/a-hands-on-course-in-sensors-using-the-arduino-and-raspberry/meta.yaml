    \ side is a north pole that attracts the permanent magnet labeled 3, which has\
    \ a south pole pointing outwards. Again, the converse is true for coil D on the\
    \ left and magnet 6. The rotor will then move until magnet 6 faces coil D. We\
    \ continue turning the rotor by turning coils C and D off and reversing the polarity\
    \ of coils A and B, such that the upper coil acts as a south pole that attracts\
