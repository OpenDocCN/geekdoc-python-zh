    # 5.7 ONLINE PRESENTATION


    In this section we describe how to present the measured data on a web page that
    is published by a web server. It turns out that the Raspi is quite capable of
    running a web server on the side while doing all the other things such as acquiring
    and storing data. The basic software needed is a web server, and we chose apache2
    [29], which is installed by executing


    ```

    sudo apt-get install apache2

    ```


    on the command line of the Raspi. After the installation is complete, we use a
    browser on any computer connected to the network the Raspi is connected to and
    enter the IP number of the Raspi in the address line. This also works on the browser
    installed on the Raspi; enter localhost as the web address, and you should be
    greeted by the web page shown in Figure 5.10. This page instructs us to replace
    the file named index.html in the directory


    ![](img/8f23875c54d5b3177d5d2a5bba06b37e_166_1.png)


    Figure 5.10 Web page from the Raspi after installation of the Apache2 web server.'
  - "[PAGE 167]\n\n/var/www/html/ with our own copy. Note that the apache2 web server\
    \ is configured to present a file named index.html by default, if only the address\
    \ of the folder is given.\n\nSo, we need to prepare a simple web page, which is\
    \ a specially formatted text file in a format called HTML – an acronym for *Hyper-Text\
    \ Markup Language*. There are plenty of books on the subject, and tutorials can\
    \ be found on the web in abundance. Here we only use the most basic features.\
    \ We navigate to the directory /var/www/html/ and save index.html as a backup\
    \ with sudo mv index.html index.html.bak. Then we start our favorite editor as\
    \ superuser by prepending sudo, enter the following text, and save the contents\
    \ as index.html.\n\n```\n<!DOCTYPE HTML>\n<HTML>\n  <HEAD>\n    <TITLE>Raspi Web\
    \ Server</TITLE>\n  </HEAD>\n  <BODY>\n    <H1 ALIGN=CENTER>Raspi Web Server Main\
    \ Page</H1>\n    <HR SIZE=2 WIDTH=80%>\n    <H3>Available Goodies:</H3>\n    <UL>\n\
    \      <LI> <A HREF=\"temp/\">Temperature Graph</A> </LI>\n      <LI> <A HREF=\"\
    https://www.w3schools.com/html\">\n            HTML Tutorial</A> </LI>\n     \
    \ <LI> <A HREF=\"https://www.w3resource.com/\">\n            W3resource tutorials</A>\n\
    \      <LI> <A HREF=\"https://www.raspberrypi.org\">\n            Raspberry Pi\
    \ web site</A> </LI>\n      <LI> <A HREF=\"https://www.arduino.cc\">Arduino web\
    \ site</A> </LI>\n    </UL>\n  </BODY>\n</HTML>\n```\n\nIf no typos crept in,\
    \ by entering the address http://localhost on a browser running locally on the\
    \ Raspi we should see the page shown in Figure 5.11. This is how the web browser\
    \ renders the contents of the file we just entered and now briefly discuss. At\
    \ the top of the file we have the declaration of the document type; it is an HTML\
    \ file. Then we have the opening tag <HTML> and a matching closing tag </HTML>\
    \ at the end of the file. Anything between them describes the contents of the\
    \ web page. Note that HTML tags (almost) always come in pairs: the tag name in\
    \ angle brackets and a matching closing tag with the same name, but prepended\
    \ with a slash. The next tags we encounter in the file are HEAD and TITLE, which\
    \ describe things that do not show up on the page but appear in the title bar\
    \ of the web browser. Finally, we reach the BODY tags, where we find the description\
    \ of the web page proper. The <H1> tag declares a large headline, and the ALIGN\
    \ directive specifies it to be centered on the web page. There are different levels\
    \ of header tags, from H1 to H6. The next line defines a horizontal rule with\
    \ the <HR> tag that covers 80% of the width of the page. Then we add a smaller\
    \ header with <H3> and an unnumbered list between the <UL> tags, with each list\
    \ item described by <LI> tags. The <A> tag is called an anchor. It points to other\
    \ websites specified in the HREF directive. The first list item points to a local\
    \ directory temp/ under the directory where the file index.html resides. Since\
    \ this does not yet exist, we need to create it."
  - "[PAGE 168]\n\n150 ■ A Hands-On Course in Sensors Using the Arduino and Raspberry\
    \ Pi, Second Edition\n\n![](img/8f23875c54d5b3177d5d2a5bba06b37e_168_0.png)\n\n\
    Figure 5.11 The first self-made web page.\n\nIn the directory /var/www/html/,\
    \ we create the temp/ subdirectory and copy a file, also named index.html, with\
    \ the following contents into the newly created subdirectory /var/www/html/temp/:\n\
    \n```\n<!DOCTYPE HTML>\n<HTML>\n  <HEAD>\n    <TITLE>Raspi Web server</TITLE>\n\
    \  </HEAD>\n  <BODY>\n    <H1 ALIGN=CENTER>Temperature</H1>\n    <IMG SRC=\"db1.png\"\
    \ ALT=\"Temperature in my office\">\n  </BODY>\n</HTML>\n```\n\nThe file contents\
    \ follows the same general layout as before, with the DOCTYPE declared first,\
    \ followed by <HTML> tags. Next come the <HEAD> tags and then the <BODY> tags\
    \ bracketing the displayed contents of the page. Here we also find a header and\
    \ a new tag <IMG> to direct the web browser to display the image specified in\
    \ the SRC directive. To make this work, we copy the file db1.png, the one we created\
    \ with rrdtool graph in the previous section, to the directory /var/www/html/temp/.\
    \ We always need to use sudo to edit or copy files to the system areas to which\
    \ the files under /var/www/ belong. This we can avoid by enabling private web\
    \ pages.\n\nThe private web pages commonly reside in a subdirectory called public_html\
    \ under the user's home directory. As user pi we therefore create it by typing\
    \ mkdir /home/pi/public_html. In order to use it we have to enable the userdir\
    \ module by executing sudo a2enmod userdir at the command prompt, and restarting\
    \ apache2 with the command sudo systemctl restart apache2, such that the newly\
    \ enabled module is loaded. Then we copy the files index.html and db1.png from\
    \ /var/www/html/temp/ to /home/pi/public_html and are ready to access the same\
    \ web page as before, but now under the new address http://localhost/~pi. Any\
    \ file we copy to the subdi-"
  - "[PAGE 169]\n\nrectory /home/pi/public.html is then accessible from a browser\
    \ at the address http://localhost/~pi/ with the filename appended. For example,\
    \ http://localhost/~pi/db1.png only displays the graphics file in the browser\
    \ window, but nothing else.\n\nThe contents on the web page in the previous example\
    \ is static. We copy files to the public_html directory and then they are presented\
    \ as is. If we want to update, for example, the temperature graph, we have to\
    \ run rrdtool graph again and copy the new copy of the db1.png to public_html.\
    \ But this is a task that we easily automatize with the help of a cron job. We\
    \ prepare a file with the following contents:\n\n```\n#!/bin/bash\nDB=/home/pi/rrdtool/db1.rrd\n\
    /usr/bin/rrdtool graph /home/pi/public_html/db1.png -s -4h \\n    -t \"Temperature\
    \ in my office\" -v \"T [C]\" \\n    DEF:t0=$DB:temp:AVERAGE \\n    LINE1:t0#FF0000:\"\
    Temperature\";\n/usr/bin/rrdtool graph /home/pi/public_html/db2.png -s -2d \\\
    n    -t \"Temperature in my office\" -v \"T [C]\" \\n    DEF:t0=$DB:temp:AVERAGE\
    \ \\n    LINE1:t0#FF0000:\"Temperature\";\n```\n\nand name it makegraph.sh. Then\
    \ we place the file in the /home/pi/rrdtool/ subdirectory and make it executable\
    \ with chmod +x makegraph.sh. In the file, we first define the database to use\
    \ and then have two almost identical copies of the rrdtool graph command from\
    \ the previous section. But in the first case, we create db1.png for data from\
    \ the last 4 hours, and in the second case we create db2.png for data from the\
    \ last two days (-s -2d). Note that the graphics files db1.png and db2.png are\
    \ specified to reside in the public_html directory, where they are accessible\
    \ to the web server. Finally, we make the makegraph.sh script execute every 10\
    \ minutes by adding the following line to our crontab file with the command crontab\
    \ -e\n\n```\n*/10 * * * * /home/pi/rrdtool/makegraph.sh > /dev/null\n```\n\nwhere\
    \ */10 in the first column means every 10 minutes and the > /dev/null at the end\
    \ means to suppress any output from the makegraph.sh command. So now we can update\
    \ the to-be-displayed content, but we still need to coax the web browser to actually\
    \ re-read that content at some interval. For this purpose the <META http-equiv=..>\
    \ tag exists, and we include it between the HEAD tags, as shown in the following\
    \ updated version of the public.html/index.html file\n\n```\n<!DOCTYPE HTML>\n\
    <HTML>\n  <HEAD>\n    <TITLE>Raspi Web server</TITLE>\n    <META http-equiv=\"\
    refresh\" content=\"300\">\n  </HEAD>\n  <BODY>\n    <H1 ALIGN=CENTER>Temperature</H1>\n\
    \    <H3>The last 4 hours</H3>\n    <IMG SRC=\"db1.png\" ALT=\"Temperature over\
    \ 4 hours\">\n    <H3>The last 2 days</H3>\n    <IMG SRC=\"db2.png\" ALT=\"Temperature\
    \ over 2 days\">\n  </BODY>\n</HTML>\n```"
- md: "## 5.12 用户 pi 的主页，显示持续（但缓慢）更新的温度。\n\n该页面指示浏览器每 300 秒重新加载一次，如 META 标签所示。同时，我们添加了第二张图片，显示过去两天的温度。网页截图如图\
    \ 5.12 所示。如果我们在 crontab 文件和 META 标签中不耐烦，可以更改更新频率。它们不需要匹配。\n\n至此，我们可以获取、存储、检索并在一个主动更新的网页上显示测量数据。我们使用\
    \ cron 作业实现的更新机制非常基础，也有更好的解决方案；例如，cgi-bin 或 php 服务器端程序。它们在网页上按下按钮时按需执行代码，并即时更新显示的信息，但这超出了我们的介绍范围。\n\
    \n到目前为止，我们已经使用 Raspi 作为传感器网络的中心来查询传感器节点、存储和展示数据，但我们甚至可以将 Raspi 变成一个更大控制系统（如 EPICS）的节点。这是下一章的主题。\n\
    \n## 问题与项目想法\n\n- 1. 在哪里可以找到关于 Raspi 上安装程序的帮助？\n- 2. 如何在 Raspi 上复制文件？\n- 3. 如何在\
    \ Raspi 上重命名文件？\n- 4. 如何在 Raspi 和桌面计算机之间复制文件？\n- 5. 查找程序 `ping` 的作用。\n- 6. 查找程序\
    \ `touch` 的作用。\n- 7. 查找程序 `wireshark` 的作用。\n- 8. 什么是 `netmask`？\n- 9. 从 *Programming*\
    \ 菜单启动 *Mathematica* 并尝试使用它。了解它的功能。\n- 10. 从 [第 5.3 节](Section 5.3) 启动 `synaptic`\
    \ 软件安装程序，输入“games”作为搜索关键词并进行探索。\n- 11. 启动 `python3`，执行 `help()`，并按照说明操作。\n- 12.\
    \ 编写一个在 Python 中显示“Hello World”的程序。\n- 13. 在用户 `pi` 的主目录中创建一个名为 `look_at_me` 的文件，并指示\
    \ `cron` 守护进程在每月的第二个星期四 `touch` 它。\n- 14. 如何获取 `octave` 中命令的帮助？\n- 15. 将 USB 网络摄像头连接到\
    \ Raspi，并使用 `cheese` 程序拍照。使用 `imagemagick` 工具从图像中裁剪一小部分并将其转换为另一种格式，例如 gif。\n-\
    \ 16. 查找如何在 MariaDB 数据库中存储整数值。\n- 17. 查找如何在 MariaDB 数据库中存储图像。\n- 18. 使用连接到 NodeMCU\
    \ 的 LDR 测量亮度，并每小时在 MariaDB 数据库中记录一次。如果你有耐心，你可以看到随着季节的推移，白天变长和变短。\n- 19. 记录步进电机采取的步骤，并使用\
    \ RRDtool 在网页上可视化它们。\n- 20. 制作一个显示你的 Arduino 草图的网页。\n- 21. 查找如何在 HTML 中指定颜色。\n\
    - 22. 探索 [图 5.11](Figure 5.11) 中提到的网页。\n- 23. 准备一个关于你自己的网页，包含图片和你希望展示的所有其他信息。\n\
    \n## 第 6 章 控制系统：EPICS\n\n将 *实验物理与仪器控制系统* (EPICS) 可视化为科学实验室的家庭自动化系统并不太牵强。它被许多实验室用于控制大型粒子加速器，例如美国的先进光子源\
    \ (APS)、瑞士苏黎世的瑞士光源 (SLS) 或瑞典的欧洲散裂源 (ESS)。EPICS 的其他用户包括法国的国际热核聚变实验堆 (ITER) 和夏威夷的\
    \ W. M. Keck 天文台。\n\nEPICS 基于许多称为 *输入输出控制器* (IOC) 的独立计算机，它们在网络上宣布其功能，以便其他计算机可以与它们交互。几乎任何类型的计算机都可以参与\
    \ EPICS 系统，并且许多编程语言（如 C、Python 和 Octave）都有支持库。因此，Raspi 也可以作为 IOC 并加入 EPICS 控制系统，无论其规模多大，这并不奇怪。我们通过配置\
    \ Raspi 将从本地连接的基于微控制器的传感器节点收集的测量数据通信到 EPICS 来说明这一点。这使得测量数据可以在更大的控制系统上下文中访问。\n\n\
    第一个任务是在 Raspi 上安装 EPICS 软件，我们遵循 [30] 进行操作。步骤有些深奥，说明类似于食谱。通常这些步骤由经验丰富的系统管理员完成。\n\
    \n## 6.1 安装\n\n首先，我们需要从 `epics.anl.gov` 下载 EPICS Base 包。在撰写本文时，当前版本是 7.0.7，下载的包名为\
    \ `base-7.0.7.tar.gz`。为了避免过度使用 `sudo`，我们创建一个子目录 `/home/pi/epics`，所有软件都位于其中，但我们也在\
    \ `/usr/local/epics` 创建了一个软链接，以便 Raspi 上的所有用户都可以访问。详细的命令序列如下：\n\n```\ncd /home/pi\n\
    mkdir epics\nsudo ln -s /home/pi/epics /usr/local\ncd epics\ncp /home/pi/Downloads/base-7.0.7.tar.gz\
    \ .\ntar xzf base-7.0.7.tar.gz\n```\n\n其中 `tar` 是一个归档程序，用于解压缩（`x` 选项）压缩（`z` 选项）文件（`f`\
    \ 选项）。注意 `cp` 命令末尾的句点 `.`，它是当前目录（本例中为 /home/pi/epics）的简写表示。最后一条命令在 /home/pi/epics\
    \ 下创建一个名为 base-7.0.7 的子目录。为了避免反复输入版本号，我们使用 `ln -s` 命令创建一个软链接，该命令本质上在同一目录中创建一个别名，执行如下：\n\
    \n```\nln -s base-7.0.7 base\n```\n\n此后，我们可以通过 /usr/local/epics/base 引用包含 EPICS\
    \ base 包的目录，这得益于从 /home/pi/epics 到 /usr/local/epics 的软链接。现在我们已经拥有了源代码，但为了使用它，我们仍然需要编译它。\n\
    \n为了让编译器以及后来的可执行程序找到 EPICS 源代码，我们需要将以下行复制到文件 /home/pi/.bash_aliases 中：\n\n```\n\
    export EPICS_ROOT=/usr/local/epics\nexport EPICS_BASE=${EPICS_ROOT}/base\nexport\
    \ EPICS_HOST_ARCH=`${EPICS_BASE}/startup/EpicsHostArch`\nexport EPICS_BASE_BIN=${EPICS_BASE}/bin/${EPICS_HOST_ARCH}\n\
    export EPICS_BASE_LIB=${EPICS_BASE}/lib/${EPICS_HOST_ARCH}\nif [ \"\" = \"${LD_LIBRARY_PATH}\"\
    \ ]; then\n    export LD_LIBRARY_PATH=${EPICS_BASE_LIB}\nelse\n    export LD_LIBRARY_PATH=${EPICS_BASE_LIB}:${LD_LIBRARY_PATH}\n\
    fi\nexport PATH=${PATH}:${EPICS_BASE_BIN}\n```\n\n如果该文件不存在，只需创建一个包含上述内容的新副本即可。注意环境变量\
    \ EPICS_ROOT 指向子目录 /usr/local/epics，即我们在前面步骤中创建的目录。其他变量相对于该目录定义，并指向库和可执行文件所在的位置。完成此步骤后，我们需要打开一个新的命令窗口，因为它会重新读取\
    \ .bash_aliases 文件，我们需要在编译基础系统之前使用这些定义：\n\n```\ncd /home/pi/epics/base\nmake distclean\n\
    make -j 4\n```\n\n这大约需要 20 分钟，具体取决于 Raspi 的版本。选项 `distclean` 确保 epics 源代码处于原始状态，选项\
    \ `-j 4` 使编译同时启动四个作业，每个 CPU 核心一个。终端窗口将充满关于当前正在编译的基础系统部分的信息。一旦编译没有错误地完成，我们在命令提示符下输入命令\
    \ `caget`。它应该响应“no pv name specified...”，这表明可执行文件可用并位于 PATH 中。“pv”是 EPICS 处理的数量的名称，称为过程变量。例如，电源\
    \ PSabc 的读回电流可能称为 PSabc:current。读取或更改电源电流则引用该过程变量。读取是通过在命令行上输入 `caget PSabc:current`\
    \ 完成的。更多关于该主题的内容将在下一节中介绍。对于下一个测试，我们启动 `softIoc` 程序，并在出现的 `epics>` 提示符下，我们输入 `iocInit`。此步骤应导致响应“iocrun:\
    \ all initialization complete”，这使我们确信我们已成功在 Raspi 上安装了 EPICS，并可以继续对其进行研究。"
  mdcn: "## 5.12 用户 pi 的主页，显示持续（但缓慢）更新的温度。\n\n该页面指示浏览器每 300 秒重新加载一次，如 META 标签所示。同时，我们添加了第二张图片，显示过去两天的温度。网页截图如图\
