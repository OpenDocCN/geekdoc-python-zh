    The sensor chips are usually very small and difficult to work with, but luckily
    there are so-called breakout boards available that route the pins of the sensors
    to normally spaced (2.5 mm spacing) pins that can be attached, for example, to
    solderless breadboards. Figure 2.40 shows an MPU-6050, MAX30102, and a TCS34725
    mounted on breakout boards.


    # 2.3.4 SPI devices


    The SPI interface is a synchronous serial communication bus, similar to the I2C
    bus, but it can operate at much higher speed and is therefore often used for devices
    that require the continuous transfer of large amounts of data, such as displays
    or audio equipment. SPI communication requires one master on the bus, a role normally
    taken by a microcontroller. The sensors are typically slave devices. They need
    at least six wires to connect: ground and supply voltage, the clock CLK, one line
    to send information from the master to the slave (MOSI, for master-out slave-in),
    one line for the reverse direction (MISO for master-in slave-out), and a chip-select
    line CS to identify the currently active slave. CLK, MISO, and MOSI lines can
    be shared among many slaves, but each slave requires its individual CS line.


    Some of the devices in the I2C section support this interface as well, and the
    interface can normally be selected by setting a pin on the device high or low.
    Details can be found in the datasheets.


    In a later project we connect the analog-to-digital converter MCP3304 to a microcontroller
    via SPI communication. It has eight single-ended 12-bit input channels but can
    also be configured to use two input channels as differential input. This circuit
    detects whether one or the other input is larger and thereby provides an additional
    sign bit. Thus, it provides one extra bit to obtain a 13-bit resolution. At the
    same time, the input range is extended to plus or minus times the supply voltage,
    despite operating from a unipolar power supply.'
- md: '## 2.3.5 RS-232 devices


    Several devices report their measurement values by sending them via the asynchronous
    RS-232 protocol. Originally, the physical medium for the communication channel
    used a current loop, but nowadays most sensors operate on 3.3 or 5 V levels. The
    communication happens point-to-point between two partners who have agreed on a
    communication speed, which is often 9600 baud or 115200 baud. Three wires are
    required at the minimum, one for ground potential, one, labeled TX for transmitting
    from device A to device B, and another one, labeled RX, for transmitting in the
    reverse direction. To establish communication, cables connect the TX pin on one
    device to RX on the other and vice-versa. Naturally, ground pins need to be connected
    as well.


    One device that supports RS-232 communication is the LV-EZx distance sensor we
    discussed earlier. It can be configured to send the distance measured as an ASCII
    string that can be read in a terminal program. Even the TFmini distance sensor,
    shown in Figure 2.41, reports the measured distance via RS-232. It emits a modulated
    infra-red light pulse through one lens, records it through a second lens, and
    determines the phase shift of a reflected signal with respect to the emitted signal.
    From this it determines the time-of-flight to the nearest obstacle in the line
    of sight.


    Sensors that query the *global positioning system* (GPS) use a small patch antenna
    on the sensor to pick up signals from a number of satellites placed in geostationary
    orbits, which broadcast their position and timing information with high precision.
    On-board electronics that normally comprise a microcontroller use triangulation
    in order to determine the position of the sensor with high accuracy and convert
    that information to an ASCII string containing the position in a standardized
    format, called *NMEA*. The string is written, typically once per second, to an
    RS-232 serial line, where it is straightforward to read and decode.


    ## 2.3.6 Other sensors


    Apart from the standardized protocols, there exist a number of communication standards
    that device vendors come up with. Examples of such devices are the *relative humidity
    sensor*, DHT22, and the DHT11; the latter is shown on the right in Figure 2.42.
    In order to determine the relative humidity, the temperature must be known and
    it is determined with a thermistor. To measure the humidity they use a capacitive
    humidity sensor. The operational principle is based on using a small capacitor
    with an exposed dielectric that has a large affinity to attract water, which changes
    the relative dielectric constant εr and the capacitance by a large amount. This
    is determined in a Wheatstone bridge with capacitors in two branches. Internally,
    the DHT sensors have this, and further circuitry such as an analog-to-digital
    converter on board to calculate the relative humidity. They provide the data using
    a non-standard, though documented, digital interface that we discuss further in
    [Section 4.4.5](Section 4.4.5), where we connect a DHT11 to a microcontroller.


    The DS18b20 temperature sensor, as was the LM35 discussed earlier, is based on
    a bandgap temperature sensor. Here, however, ancillary digital electronics and
    signal processing circuitry is added on the chip such that the measurement value
    is postprocessed and made available using the so-called Dallas 1-wire bus protocol.
    The 1-wire protocol uses only ground and a single additional wire to transmit
    power and information to and from the device.


    The air quality can be characterized by the density of microscopic particles suspended
    in air. In [Figure 2.43](Figure 2.43) we show two such sensors. On the left we
    see a PPD42NS particle sensor. Inside this detector a resistor heats the air,
    which causes the air with the suspended dust particles to rise and pass through
    the light emitted by an infrared diode. There the dust particles scatter the light
