- md: "## 4.5.5 Analog voltages\n\nIn this section we connect an MCP4921 12-bit digital-to-analog\
    \ converter, which supports SPI-communication, to an Arduino UNO, and discuss\
    \ a sketch to set the output voltage of the DAC using our query-response protocol.\
    \ This could, for example, be used to set the control voltage of a power supply\
    \ or any other device that requires an analog voltage level as input. The circuit\
    \ that achieves this is shown in Figure 4.22, where we see the UNO on the left\
    \ and the supply and ground connections to the MCP4921. The bright wire from pin\n\
    \nFigure 4.20 Connecting a bipolar stepper motor to the UNO with a DRV8825 stepper\
    \ motor driver with microstep capability†.\n\n```\nbool patA[]={1,1,1,0,0,0,0,0};\n\
    int pat_length=8;\nint ii;\nistep=istep % pat_length;\nif (istep < 0) istep+=pat_length;\n\
    digitalWrite(PA,patA[istep]);\nii=(istep+4) % pat_length;\ndigitalWrite(PB,patA[ii]);\n\
    ii=(istep+6) % pat_length;\ndigitalWrite(PC,patA[ii]);\nii=(istep+2) % pat_length;\n\
    digitalWrite(PD,patA[ii]);\ndelay(settle_time);\n}\n```\n\nwhich is very similar\
    \ to the previously discussed full-step version. The only difference is the array\
    \ `patA`, which now contains the excitation pattern for the half-step mode. The\
    \ variable `pat_length` is increased correspondingly to eight, and the steps to\
    \ excite the other pins are 4, 2, and 6. Remember, this corresponds to 180, 90,\
    \ and 270 degrees of the eight time slots. Depending on the sense of wiring for\
    \ the coils, we may have to swap the cables, or, as an alternative, exchange the\
    \ step increment in the `set_coils()` function. Now we can full step and half\
    \ step the motors, even do so by hand, but for the micro-stepping modes we need\
    \ additional hardware to control the excitation of the coils more accurately.\n\
    \nA driver circuit that implements these microstepping modes is the DRV8825. Interfacing\
    \ a bipolar stepper motor with an Arduino using this driver is shown in Figure\
    \ 4.20. Before connecting the motor to the circuit, we need to match the driver\
    \ to the motor by adjusting the maximum current by which the coils are excited.\
    \ So we start from the configuration shown in Figure 4.20, but *without* the four\
    \ leads to the motor in place. The motor power supply must provide between 8.2\
    \ and 40 V, and we add a 100 μF capacitor to stabilize the supply voltage. We\
    \ then connect the, normally black, ground lead of a multimeter to digital ground\
    \ on the motor driver and connect the other, normally red, lead of the multimeter\
    \ to the tip of a screwdriver. We use the latter to adjust the potentiometer on\
    \ the top left of the driver breadboard until the voltage shown on the multimeter\
    \ is half the desired current limit for the motor, as specified in the datasheet\
    \ of the DRV8825. We illustrate this is Figure 4.21, where we see the multimeter\
    \ on the bottom left and the DRV8825 placed on a small breadboard with the screwdriver\
    \ touching the potentiometer on the driver board. The multimeter in this case\
    \ shows a voltage of 0.56 V, which implies that the current limit for the driver\
    \ is 1.12 A.\n\nFigure 4.21 Adjusting the maximum current on the DRV8825 breadboard.\n\
    \nOnce we have set the maximum current, we connect the motor to the terminals\
    \ labeled 1A, 1B and 2A, 2B on the driver circuit. Here we chose to connect the\
    \ first and third wires on the motor to the B-pins, and the second and fourth\
    \ to the A-pins, which accounts for the crossed wires on the lower motor coils.\
    \ Ground and positive voltage of the motor power supply are connected to the two\
    \ terminals on the top right, and the digital ground is connected to the Arduino\
    \ ground connector with the black wire. One wire connects UNO pin D2 to the direction\
    \ pin at the lower left of the DRV8825, and another wire connects D3 to the step\
    \ input. A wire, connected to pin D4, is used to select the microstepping mode.\
    \ Several modes such as full-step, half-step, 1/4, 1/8, 1/16, and 1/32 stepping\
    \ are available. See the datasheet for the details. Here we only implement two\
    \ modes. If the three mode pins M0, M1, and M2 are pulled to ground, the driver\
    \ operates in full-step mode. If the three mode pins are pulled to the logic supply\
    \ voltage, the microstepping mode with 32 microsteps is selected. Thus by toggling\
    \ UNO pin D4 we can switch between full- and micro-stepping mode. The enable pin\
    \ on the top left of the driver is left unconnected, because it is internally\
    \ pulled low to enable the driver by default. Moreover, one wire, connected to\
    \ the 5 V supply of the UNO, pulls the reset and sleep pins of the driver high,\
    \ thus permanently enabling the driver.\n\nIn order to move the motor, we use\
    \ a sketch for the Arduino UNO that suitably changes the states of the direction,\
    \ step, and mode pin. This is done with the following code.\n\n```\n// Stepper\
    \ controller with DRV8825, V. Ziemann, 170626\nchar line[30];\nint settle_time=30,stepcounter=0;\n\
    const int DIR=2;  // direction pin\nconst int STEP=3; // step pin\nconst int MODE=4;\
    \ // mode pin, LOW=FULLSTEP, HIGH=MICROSTEP\nvoid setup() {  //........................................setup\n\
    \  Serial.begin (9600);\n  while (!Serial) {;}\n  Serial.println(\"starting\"\
    );\n  pinMode(DIR,OUTPUT); digitalWrite(DIR,LOW);\n  pinMode(STEP,OUTPUT); digitalWrite(STEP,LOW);\n\
    \  pinMode(MODE,OUTPUT); digitalWrite(MODE,HIGH);\n}\nvoid loop() {  //........................................loop\n\
    \  if (Serial.available()) {\n    Serial.readStringUntil('\\n').toCharArray(line,30);\n\
    \    if (strstr(line,\"MOVE \")) {\n      int steps=(int)atof(&line[5]);\n   \
    \   if (steps > 0) {\n        digitalWrite(DIR,LOW);\n        for (int i=0;i<steps;i++)\
    \ {\n          stepcounter++;\n          digitalWrite(STEP,HIGH);\n          delayMicroseconds(settle_time);\n\
    \          digitalWrite(STEP,LOW);\n          delayMicroseconds(settle_time);\n\
    \        }\n      } else {\n        digitalWrite(DIR,HIGH);\n        for (int\
    \ i=0;i<abs(steps);i++) {\n          stepcounter--;\n          digitalWrite(STEP,HIGH);\n\
    \          delayMicroseconds(settle_time);\n          digitalWrite(STEP,LOW);\n\
    \          delayMicroseconds(settle_time);\n        }\n      }\n    } else if\
    \ (strstr(line,\"STEPS?\")) {\n      Serial.print(\"STEPS \"); Serial.println(stepcounter);\n\
    \    } else if (strstr(line,\"STEPS \")) {\n      stepcounter=(int)atof(&line[6]);\n\
    \    } else if (strstr(line,\"WAIT?\")) {\n      Serial.print(\"WAIT \"); Serial.println(settle_time);\n\
    \    } else if (strstr(line,\"WAIT \")) {\n      settle_time=(int)atof(&line[5]);\n\
    \    } else if (strstr(line,\"MICROSTEP\")) {\n      settle_time=30;\n      digitalWrite(MODE,HIGH);\n\
    \    } else if (strstr(line,\"FULLSTEP\")) {\n      settle_time=2000;\n      digitalWrite(MODE,LOW);\n\
    \    }\n  }\n}\n```\n\nFigure 4.22 Connecting an MCP4921 12-bit DAC to the Arduino\
    \ UNO†.\n\nAt the top of the sketch we declare a number of variables, such as\
    \ the `settle_time` and the `stepcounter`, but also the used pins. In the `setup()`\
    \ function we initialize serial communication, declare the control pins for the\
    \ stepper driver as output, and initialize their state. By pulling the mode pin\
    \ high, we select the microstepping mode. The `loop()` function uses the query-response\
    \ construction in which the first command deciphers the `MOVE` command and interprets\
    \ the characters following it as the number of `steps`. Then the code branches,\
    \ depending on the sign of `steps`. If it is positive, we pull the direction pin\
    \ `HIGH` and then increment the `stepcounter`. Then the `STEP` pin is pulled high\
    \ and low, with a small delay in between. Note that we use the `delayMicroseconds()`\
    \ function, because the rotor moves very little between the microsteps, and we\
    \ can afford to reduce the waiting time between steps to achieve smooth motion\
    \ of the motor. But in any case, the values for the waiting time should be adapted\
    \ to the actual motor connected. If `steps` is negative, we pull the direction\
    \ pin `LOW` and decrement the `stepcounter` before toggling the `STEP` pin first\
    \ `HIGH` and then `LOW`. After handling the `MOVE` command, we add the bookkeeping\
    \ commands to read and set both `stepcounter` and `settle_time`, and finally,\
    \ select the operation mode. If the command is `MICROSTEP`, the `settle_time`\
    \ is set to 30 μs and the `MODE` pin is pulled `HIGH`. If the command is `FULLSTEP`,\
    \ we choose a larger `settle_time` and pull the `MODE` pin `LOW`.\n\nAfter being\
    \ able to control various types of motors, we move on to controlling analog voltages."
  mdcn: "## 4.5.5 模拟电压\n\n在本节中，我们将一个支持SPI通信的MCP4921 12位数模转换器连接到Arduino UNO，并讨论一个使用我们的查询-响应协议来设置DAC输出电压的程序。例如，这可以用于设置电源的控制电压或任何其他需要模拟电压电平作为输入的设备。实现此功能的电路如图4.22所示，其中左侧是UNO，以及连接到MCP4921的电源和地线。从引脚引出的亮色导线\n\
