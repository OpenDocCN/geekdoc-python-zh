    \ with a web server showing the HTTP header.\n\nwith HTML forms. It allows the\
    \ user to enter text or select things from a list and then click a submit button\
    \ to send it to the server, where it causes some reaction, such as sending the\
    \ desired purchase – or to set the brightness of an LED.\n\nIn a second example,\
    \ we configure a NodeMCU to run a server listening for connections on port number\
    \ 1137, and once a connection is established, it waits for commands and then replies\
    \ appropriately using the previously discussed query-response protocol. The hardware\
    \ is the same as in the previous example, already shown in Figure 4.27. The code\
    \ that runs on the NodeMCU is the following.\n\n```cpp\n// Socket-based measurement\
    \ server, V. Ziemann, 161211\nconst char* ssid     = \"MyHomeNet\";\nconst char*\
    \ password = \".......\";\nconst int port = 1137;\n#include <ESP8266WiFi.h>\n\
    WiFiServer server(port);\nvoid setup() { //................................................setup\n\
    \  Serial.begin(115200);\n  WiFi.begin(ssid, password);\n  while (WiFi.status()\
    \ != WL_CONNECTED) {\n    delay(500); Serial.print(\".\");\n  }\n  Serial.println(\"\
    \");\n  Serial.print(\"WiFi connected to \"); Serial.println(ssid);\n  Serial.print(\"\
    Server IP address: \"); Serial.println(WiFi.localIP());\n  server.begin();\n \
    \ Serial.print(\"Server started on port \"); Serial.println(port);\n}\nvoid loop()\
    \ {  //................................................loop\n  char line[30];\n\
    \  float volt,temp;\n  WiFiClient client = server.available();\n  while (client)\
    \ {\n    while(!client.available()) {delay(1);}\n    client.readStringUntil('\\\
    n').toCharArray(line,30);\n    Serial.print(\"Request: \"); Serial.println(line);\n\
    \    if (strstr(line,\"A0?\")) {\n      volt=3.3*analogRead(0)/1023;\n      client.print(\"\
    A0 \"); client.println(volt);\n    } else if (strstr(line,\"T?\")) {\n      temp=100*3.3*analogRead(0)/1023;\n\
    \      client.print(\"T \"); client.println(temp,1);\n    } else {\n      Serial.println(\"\
    unknown command, disconnecting\");\n      client.stop();\n    }\n    client.flush();\n\
    \    // client.stop();\n  }\n}\n```\n\nIn this sketch we first define two character\
    \ strings, `ssid` and `password`, for the name and passphrase of the wireless\
    \ network. We also specify the port number, here 1137, in the following line before\
    \ including the functionality for WiFi support on the ESP8266 device. Once that\
    \ is included, we define a WiFiServer named `server` that listens on the specified\
    \ port. In the `setup()` function, we start up the serial communication via the\
    \ USB line that we use for logging, and then connect to the wireless network with\
    \ the `WiFi.begin()` function. Once the NodeMCU is connected to the wireless network,\
    \ we start the server with the `server.begin()` command. In the `loop()` function\
    \ we use the same structure that we used earlier for communication via the serial\
    \ line, but this time over the socket that is dynamically opened once a client\
    \ computer connects to our server. The connection to the requesting computer stays\
    \ open until an unknown command closes the connection. But while the connection\
    \ is open, values can be requested repeatedly. If we want the connection to close\
    \ immediately after the reply is sent, we can uncomment the line with `client.stop();`\
    \ immediately following the line with `client.flush()`. Note that this server\
    \ can only handle one request at a time. If one computer is already connected\
    \ and a second computer tries to establish contact, the latter is put on hold\
    \ until the first computer disconnects. This program on the NodeMCU allows us\
    \ to query via the custom socket on port 1137 any parameters or measurement values\
    \ that the NodeMCU has available. How to connect to it from another computer we\
    \ defer to the next chapter.\n\nBeyond the standard communication protocols there\
    \ are several others available. We discuss those only briefly in the following\
    \ section.\n\n## 4.6.4 Other communication\n\nIn the previous sections, we used\
    \ standard and easy-to-use protocols (RS-232, USB, Bluetooth, and WiFi) to communicate\
    \ with the microcontroller. They have the advantage that they are readily available\
    \ on many host computers. There are, however, other communication channels, of\
    \ which we name a few in the following paragraphs. All are supported by Arduino\
    \ libraries.\n\nOne other wireless communication channel is *ZigBEE*, which is\
    \ related to Bluetooth but uses a simpler protocol overhead and is optimized to\
    \ consume as little power as possible, to make long-lived battery operation possible.\
    \ Another option is using inexpensive *433 MHz transceivers*, which can be used\
    \ to connect slave microcontrollers to their master using a simple wireless link.\n\
    \n*MIDI* is a protocol developed to interface electronic musical instruments.\
    \ The physical interface is based on current loops that are galvanically decoupled\
    \ through optocouplers at the input of each device. Logically the communication\
    \ is very similar to RS-232 at a baud rate of 31250. Each MIDI message consists\
    \ of three (or in some cases, two) bytes that have standardized interpretation,\
    \ such as channel number, tone (corresponding to a specific key on a piano keyboard),\
    \ and velocity (the intensity with which the key is struck).\n\nIt is possible\
    \ to interface nearby hardware using infrared (IR) light, which is used in TV\
    \ remote controls to send information from the remote to the TV to change channel\
    \ or volume. Incidentally, even the first generation Lego™ Mindstorm microcontrollers\
    \ communicated in this way. The communication is based on an IR diode using a\
    \ wavelength of 940 nm and modulating the light at a rate of 38 kHz. Sending bursts\
    \ of modulated light represents either a LOW or a HIGH signal level and is used\
    \ to emulate an RS-232-like protocol at low baud rates such as 2400 baud. Another\
    \ protocol is RC-5, which is commonly used in TV remote controls. Receivers such\
    \ as the TSOP2238 have optical filters built in and are sensitive only to a narrow\
    \ band of wavelengths around 940 nm. Moreover, they demodulate the 38 kHz carrier\
    \ frequency and only deliver a 3.3 or 5 V signal on their output pin, making them\
    \ very easy to interface.\n\nNote the generic structure: A communication channel\
    \ is based on the low-level hardware and on a protocol stack that often consists\
    \ of several layers on top of the hardware implementation. In our examples we\
    \ use the convention to send a string, terminated with a question mark to signify\
    \ a request. The reply then consists of the same string followed by a value. This\
    \ convention defines a simple protocol for the communication. We can easily come\
    \ up with other protocols, and add features such as checksums to test the integrity\
    \ of the transmission. Also, I2C and MIDI communication are based on a standardized\
    \ protocol where a number of bytes is transmitted and each byte signifies some\
    \ particular information, such as the register to be addressed or the value that\
    \ is written to the register. Of course, it is mandatory that all participants\
    \ in a transaction agree on the interpretation of the bits and bytes that are\
    \ transmitted, otherwise confusion will reign supreme.\n\nSo far we always assumed\
    \ that some unspecified host computer, for example, a desktop computer, is available\
    \ and serves as the communication partner for the microcontroller. In the next\
    \ chapter we consider one specific host computer that is widely available, well\
    \ documented, and inexpensive – the Raspberry Pi.\n\n## QUESTIONS AND PROJECT\
    \ IDEAS\n\n1.  Convert the hex number 0x5CA3 to a) binary and b) decimal representation.\n\
    2.  The ADC that reads pin A0 on the NodeMCU is not very reliable. For example,\
    \ connecting A0 to GND will not necessarily give a zero ADC reading. Make an attempt\
    \ to calibrate it.\n3.  Can you connect an MCP23017 IO-extender and a BME680 environmental\
    \ sensor to the same I2C bus?\n4.  Under what circumstances is it advantageous\
    \ to use interrupts?\n5.  You need up to 128 digital input pins. Use multiple\
    \ copies of the MCP23017 and explain how to connect them.\n6.  Inspect the datasheet\
    \ of the MCP3304 and find out how to configure it to read eight unipolar input\
    \ voltages. What do you need to change in the software?\n7.  If you need 128 unipolar\
    \ analog input signals, how do you connect the MCP3304 to an Arduino? Is it possible\
    \ at all, and if so, how?\n8.  Connect a three-color LED to an Arduino and independently\
    \ control the brightness of the three colors via the serial line. Add features\
    \ to directly set standard mix-colors such as orange or magenta."
