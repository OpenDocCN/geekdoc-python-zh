  - "[PAGE 230]\n\n212 ■ A Hands-On Course in Sensors Using the Arduino and Raspberry\
    \ Pi, Second Edition\n\n```\nwhile true                     % loop forever\n \
    \   val=read(dev,1);           % and read one byte\n    if (val==term_char) break;\
    \ end % until term_char appears\n    int_array(i)=val;          % stuff byte in\
    \ output\n    i=i+1;\nend\nout=char(int_array);           % convert to characters\n\
    ```\n\nThis function reads characters one at a time until an end-of-line character\
    \ is found, and then returns the received characters to the calling program, where\
    \ the numerical value is extracted. For the plot, we need to know the TIMESTEP\
    \ used in the measurement, and request it from the UNO with the TIMESTEP? command.\
    \ If the reply starts with TIMESTEP, all is well, and we extract the numerical\
    \ value. If we retrieve something else from the serial input queue, the time window\
    \ for the measurements was too short, and the measurement is invalid. In that\
    \ case, the program closes the serial port and returns control to the octave command\
    \ prompt. If, on the other hand, we obtain the numerical value of the time step,\
    \ we request the waveform data with the WF? command. The first returned line contains\
    \ the number of points acquired. The following lines contain the data points.\
    \ Each new line is retrieved with a call to serialReadline() until all data points\
    \ are copied to the array yy. Finally, we plot the curves with linear and logarithmic\
    \ vertical scale. The latter shows a clear linear dependence, which indicates\
    \ the exponential dependence of the voltage on time with a well-defined time constant.\
    \ In the last line, we produce a png file shown in Figure 12.2 that can be used\
    \ to document our work.\n\nInstead of analyzing the behavior of a device in the\
    \ time domain, we can also analyze it in the frequency domain by driving with\
    \ a sinusoidal current whose frequency we vary through our device under test (DUT).\
    \ Simultaneously, we measure the voltage drop over the device as a function of\
    \ the frequency. This is the operating principle of a network analyzer, which\
    \ allows us to deduce the magnitude and phase of the device's impedance from the\
    \ ratio of voltage and current. For this task we use the AD5933 impedance network\
    \ analyzer, which features a direct digital synthesizer, already discussed in\
    \ Section 4.5.6, to generate frequencies f up to around 100 kHz that are passed\
    \ through the DUT. At the same time it measures the voltage-drop across the DUT\
    \ with a high-speed ADC. Internally it performs a digital Fourier transform at\
    \ the excitation frequency – both with cosine and with sine – and reports back\
    \ the two values, commonly referred to as IQ-data for in-phase (I) and quadrature\
    \ (Q) values. From these two values we can deduce the amplitude of the impedance\
    \ as √(I² + Q²) and the phase from arctan(I/Q).\n\nThe output current of the AD5933\
    \ is limited which in turn limits the smallest resistance we can measure. We therefore\
    \ add an op-amp wired as a line buffer to its output (pin 6 on the AD5933) as\
    \ shown in the schematics in the upper part of Figure 12.3. At the same time,\
    \ the two 47 kΩ resistors and the 47 nF capacitor adjust the bias voltage on the\
    \ DUT to half of the supply voltage, which matches the internally constrained\
    \ offset voltage of the input (pin 5) to the AD5933. The 1 kΩ resistor between\
    \ pin 4 and 5 is the feedback resistor of an op-amp inside the AD5933 that is\
    \ wired as a transimpedance amplifier. It converts the input current to a voltage\
    \ that is then digitized with an ADC inside the AD5933. This integrated circuit\
    \ is controlled via I2C lines that require 10 kΩ pullup resistors.\n\nThe lower\
    \ part of Figure 12.3 shows the realization of this circuit on a breadboard that\
    \ is controlled by an UNO. We recognize the AD5933 in the upper half of the breadboard\
    \ with the 10 kΩ pullup resistors to SDA on pin 15 and SCL on pin 16 on its right-hand\
    \ side and the 1 kΩ feedback resistor on its left-hand side. Pins 9 to 11 are\
    \ connected to the positive supply voltage and pins 12 to 14 are to ground. Here\
    \ we need to point out that we soldered the AD5933, which comes in a breadboard-incompatible\
    \ format (SSOP), onto a so-called"
