    \ this step, the reduced cell array `d` only contains strings of numerical values,\
    \ which we convert to type `double` with the built-in function `str2double()`.\
    \ We then plot the data and specify the tick marks on the horizontal axis to include\
    \ the day of the week, hours, and minutes. Finally, we add a legend.\n\nIn the\
    \ previous examples we always select all available data from the database. In\
    \ many circumstances we prefer to restrict the displayed data to a smaller range.\
    \ Instead of filtering in octave, we instruct the database to only return data\
    \ from the restricted time window. To achieve this we use the following SQL query\
    \ string:\n\n```\nrequest='select * from fdata where ts > \"2022-10-03 17:30\"\
    \n                and ts < \"2022-10-03 17:55\";'\n```\n\ninstead of the command\
    \ `select * from fdata;` used earlier. Note that the command needs to be written\
    \ onto a single line. This query string explains the restricted time window in\
    \ clear text. We require the timestamp `ts` to be larger than some date and less\
    \ than some other date. The values returned from the command `d=sql.query(request);`\
    \ thus only contain data from within the requested time window.\n\nHopefully this\
    \ short introduction to MySQL and its open-source pendent MariaDB helps you to\
    \ access them from Python and octave in case a SQL database is needed in a project.\
    \ But now we will turn to a second database, one that only stores values over\
    \ a finite time-horizon and also thins them out the further back in time the data\
    \ originate. This database is the round-robin database called `rrdtool` that we\
    \ discuss in the next section.\n\n# 5.6.3 RRDtool\n\nThe `rrdtool` [28] program\
    \ was initially conceived as a tool for allowing computer-network administrators\
    \ to present network traffic over different time horizons (last hour, day, week,\
    \ month, year) in a convenient and flexible way. It generates graphical representations\
    \ of data that can be shown in a web browser by automatically generating consolidated\
    \ data, such as average, minimum, or maximum over some period of time. Rrdtool\
    \ is particularly useful to generate plots of the measured data on the fly, and\
