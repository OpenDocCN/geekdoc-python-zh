    the upper coil behaves as a north pole and attracts the south pole of the upper
    permanent magnet, labeled 1. Consequently, they are as close as possible. The
    converse is true for the bottom coil and the magnet labeled 4. In order to turn
    the rotor by 30 degrees in the counterclockwise direction, we have to turn


