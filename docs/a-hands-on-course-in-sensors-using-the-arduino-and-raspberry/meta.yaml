    of the report. I try to organize the introduction and summary jointly as an executive
    summary. Often, readers first read those two sections before deciding to spend
    time on the report in its entirety. The most important part of the conclusions
    is a concise summary of the key results. I sometimes follow this up with a number
    of questions that came up during the research and that may lead to further work,
    either by me or some other researcher.'
