    #include <FS.h>

    #include <SPI.h>

    ESP8266WebServer server2(80);                // port 80

    WebSocketsServer webSocket = WebSocketsServer(81);  // port 81

    #include <Ticker.h>

    Ticker SampleSlow,ECGticker;

    #include <DFRobot_MAX30102.h>

    DFRobot_MAX30102 Sensor;

    ```'
