  - 12. 将一个HC-SR04距离传感器安装在模型舵机顶部，并扫描周围环境以测量到障碍物的距离。如果距离小于20厘米，则发出蜂鸣声。
- - '##'
  - 13. 通过快速重新编程图4.24中温度计上的NeoPixels，并在指定红、绿、蓝的值上添加一个随机数，使其闪烁。
- - '##'
  - 14. 使用 `tone()` 函数让Arduino发出像 *警报器* 一样的声音。
- - '##'
  - 15. 使用霍尔探头构建一个 *磁场传感器*。
