  md: '# CHAPTER 7


    # Messaging System: MQTT


    EPICS is not the only system to integrate a large number of sensors and actuators
    in a common framework. Another such system is the *message queue telemetry transport*
    (MQTT) [6] protocol that was originally created by, among others, IBM, in order
    to collect information from widely distributed infrastructures such as oil pipelines
    in a battery-saving and energy-efficient as well as robust and secure way. Today
    it is commonly used to pass messages between devices that constitute the Internet
    of Things (IoT) and has become ISO-standard ISO/IEC 20922. MQTT uses a *broker*
    that passes messages from clients publishing data to those that subscribe to the
    data. The name of parameters – the data – that are passed around are referred
    to as “topic.” They are organized hierarchically, such that the name


    ```

    weatherstations/stationA/node1/temperature

    ```


    refers to the temperature sensor on a weather station, called station A and connected
    to node 1. When subscribing to topics it is possible to use wildcards such as
    the plus-sign “+”, which is a single-level wild-card, or the hash “#,” which is
    a multi-level wild-card. Robustness and reliability of transmission is guaranteed
    by specifying three levels of *quality of service* (QoS), where the simplest level
    0 implies that the sensor only publishes data without any acknowledgment from
    the broker. Levels 1 and 2 implement increasingly advanced levels of handshake
    signals that ensure the arrival of data. Even a *last will* is available, which
    is transmitted to subscribing clients should a publishing client disconnect. Normally
    the broker immediately transmits any received data to the subscribing clients,
    but it is possible to specify that the broker retains the last good data point
    and transmits it to subscribers in case the publisher is offline, and to new subscribers
    upon their first connection. Since MQTT was intended to operate across public
    networks, encryption and security are part of the protocol.


    The core functionality of MQTT resides on the broker, such that clients can be
    very simple and connect and disconnect at will. This makes it possible to use
    clients that only wake up from a battery-saving deep sleep mode, perform a measurement,
    send it to the broker, and go back to sleep again. This attractive feature makes
    MQTT very popular for IoT applications and we therefore also discuss it as a complement
    to EPICS. In the following sections we operate a broker on the Raspberry Pi and
    use NodeMCUs as clients that publish and subscribe. In a final section we discuss
    a simple gateway that links MQTT to EPICS in order to benefit from the best of
    both worlds. In this way we can access lightweight clients connected over a public
    network across the gateway from our EPICS control system.


    After this overview of MQTT, let us follow the theme of the book and describe
    a working system that provides the basic functionality.'
