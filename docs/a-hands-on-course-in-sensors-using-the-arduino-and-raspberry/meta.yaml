- md: "## 7.3 GATEWAY TO EPICS\n\nWe want the gateway to seamlessly translate between\
    \ the systems and to achieve the following functionality: The gateway will listen\
    \ on a network socket on port 51883 to communicate with EPICS, and uses default\
    \ ports for anything else. On EPICS we intend to use stream-based protocol files\
    \ such that all strings that EPICS sends to our gateway will have the format `topic\
    \ value`, and we configure the gateway to publish this as topic `topic` with the\
    \ message contents `value`. This is all we need to do to publish MQTT topics from\
    \ EPICS. In order to receive MQTT messages on EPICS, we need to configure the\
    \ gateway to subscribe to the messages and pass any incoming messages on to EPICS.\
    \ For this we decide that any message from EPICS to the gateway having the format\
    \ `SUBSCRIBE topic` will instruct the gateway to subscribe to `topic`. We also\
    \ implement a command to `UNSUBSCRIBE` as a matter of order.\n\nWe chose to implement\
    \ the gateway using the Python language, because it has powerful support for both\
    \ conventional network sockets and for MQTT. The former is included in standard\
    \ installations, and for MQTT we use the `paho.mqtt` library that we install with\n\
    \n```\nsudo apt-get install python3-paho-mqtt\n```\n\nand are ready to write our\
    \ gateway. The powerful libraries make the following Python-program rather compact.\n\
    \n```python\n# Epics to MQTT gateway, V. Ziemann, 221027\nimport socket,atexit,paho.mqtt.client\n\
    def cleanup():\n    sock.close()\natexit.register(cleanup)\n\ndef on_message(c,u,msg):\n\
    \    print(\"msg = \",msg.topic,\" \",msg.payload,\" \",msg.qos)\n    outmsg=msg.topic\
    \ + \" \" + msg.payload.decode('utf-8') + \"\\r\\n\"\n    epics.send(outmsg.encode('utf-8'))\n\
    mqttc=paho.mqtt.client.Client()\nmqttc.connect(\"localhost\",1883)\nmqttc.on_message=on_message\n\
    mqttc.loop_start()\n\nsock=socket.socket(socket.AF_INET,socket.SOCK_STREAM)\n\
    sock.bind(('',51883))\nsock.listen(1)\nwhile 1:\n    epics,address = sock.accept()\n\
    \    print(\"Connected from \",address)\n    while 1:\n        msg=epics.recv(1024).decode('utf-8')\n\
    \        if not msg: break\n        words=msg.split()\n        if len(words)<2:\
    \ break;\n        if words[0].upper()==\"SUBSCRIBE\":\n            mqttc.subscribe(words[1],1)\n\
    \            print(\"Subscribing \", words[0], words[1])\n        elif words[0].upper()==\"\
    UNSUBSCRIBE\":\n            mqttc.unsubscribe(words[1])\n            print(\"\
    unsubscribing \", words[0], words[1])\n        else:\n            print(\"Publish:\"\
    ,words[0],words[1])\n            mqttc.publish(words[0],words[1])\n        pass\n\
    \    epics.close()\n    print(\"Disconnect from \",address)\n```\n\nAt the start\
    \ of the program, we import support for sockets, MQTT and atexit. The latter is\
    \ used to execute code asynchronously when terminating the program, by registering\
    \ the cleanup() function to close the network socket. Next we define the function\
    \ on_message, which is called when a subscribed MQTT message arrives. After printing\
    \ the message, which is useful for debugging, we compose the outmsg, which is\
    \ of type string. Note that we append both a carriage return \\r and a line feed\
    \ \\n in order to match the convention for line terminators used in EPICS. Since\
    \ the payload is transmitted in binary form, we first convert it to a string with\
    \ the .decode() method. Conversely, the message to send via the network socket\
    \ named epics must be binary, which we accomplish with the .encode() method. Now\
    \ we are ready to define the MQTT client mqttc, and connect it to the broker that\
    \ runs on the same computer as the gateway, namely on localhost, and to the standard\
    \ MQTT port 1883. On the following line we register the on_message function to\
    \ be executed at every on_message event of mqttc, and start the MQTT event-loop\
    \ with the mqttc.loop_start() function. Note that the sequence of connecting to\
    \ the broker, registering a call-back function for arriving messages, and starting\
    \ the event loop mimics the code in the sketch that runs on the NodeMCU. After\
    \ configuring the MQTT connections, we define a socket sock that uses the IPv4\
    \ (AF_INET) protocol and TCP (SOCK_STREAM). We bind the socket to port 51883 where\
    \ it listens for requests from EPICS. We instruct the socket to only accept one\
    \ connection at a time and enter into an infinite loop in which the socket waits\
    \ for an incoming connection.\n\nIn the first few lines of the sketch we define\
    \ the usual network credentials and the IP number of the broker as well as the\
    \ pin to which the fan is connected. Then we include the header for the Ticker\
    \ library, which provides a timer that is executed at regular intervals. After\
    \ declaring the variable **do_something**, we declare the **tick** object and\
    \ define the function **tick_action()** to be executed in regular intervals. All\
    \ this function does is to set the variable **do_something** to one. We declare\
    \ **do_something** volatile, because it changes asynchronously from the main loop.\
    \ Next we include the WiFi header, the MQTT PubSubClient functionality, and declare\
    \ both **WiFiClient** and a **PubSubClient** named **client**. The following function\
    \ named **on_message()** is executed every time a MQTT message arrives. Its arguments\
    \ are the topic, the message, and the length of the message. Within the function\
    \ we first convert the received message to a character string, because we want\
    \ to handle it using the same mechanism we used in previous chapters. Then we\
    \ enter the usual construction where we check which topic has arrived; if it is\
    \ **node1/fan** we convert the message to an integer value **val** and turn a\
    \ pin on or off, depending on whether **val** is zero or not. If the received\
    \ topic is **node2/temp** we only display it on the serial line, but could easily\
    \ add a test to turn the fan on or off, depending on the temperature received.\n\
    \nOnce variables and auxiliary functions are declared, we define the **setup()**\
    \ function and configure the mode of the used pins, the serial line, and WiFi.\
    \ The function **client.setServer()** connects to the broker on the default MQTT\
    \ port 1883, and the call to the **client.setCallback()** function registers the\
    \ function **on_message()** to be executed when a new message arrives. Finally,\
    \ we start the ticker process to execute the function **tick_action()** once every\
    \ 5 seconds. In the **loop()** function we first ensure that the connection to\
    \ the broker is up and running. If it is not running we connect to the broker\
    \ with the call to the `client.connect()` function and provide the identification\
    \ of the NodeMCU as PubSub1. In the above example using `mosquitto_sub`, this\
    \ corresponds to the parameter following the `-i` command line switch. The subsequent\
    \ calls to `client.subscribe()` register the strings used as argument with the\
    \ broker, which subsequently sends any updated values. If the connection with\
    \ the broker fails, a new attempt is made after 5 seconds. Once the connection\
    \ to the broker is established, we call the `client.loop()` function to service\
    \ any background activities related to MQTT, and finally check whether the variable\
    \ `do_something` was set, which happens every time the ticker fires. If `do_something`\
    \ was set, we reset it to zero and publish the parameter `node1/temp`.\n\nIn a\
    \ terminal window on the Raspi, we can start `mosquitto_sub` to subscribe to the\
    \ topic `node1/temp` and should see the updated temperature every 5 seconds. Furthermore,\
    \ in order to test multiple NodeMCU clients to communicate, we can program a second\
    \ NodeMCU with the same sketch, but swap the reference to `node1` and `node2`.\
    \ Moreover, if we only want to publish values from a NodeMCU client, all code\
    \ related to receiving messages can be removed from the sketch, such as the `on_message()`\
    \ function and the two calls to `client.subscribe()`. If we want to use a client\
    \ with subscription-only functionality, we can remove everything related to the\
    \ tick function and the variable `do_something`. In any case, using the above\
