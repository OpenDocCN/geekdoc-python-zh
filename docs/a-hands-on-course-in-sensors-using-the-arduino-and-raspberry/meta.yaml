    appears, shown in **Figure 5.4**. We use the *Search* button on the top to find
    programs. Just click on it, enter a keyword and peruse the list, install any interesting
    program, and try it out.


    We use that feature immediately, and install programs to access remote computers,
    such as the NodeMCU that provides server capabilities via sockets. For this we
    need one or both of the **netcat** and **telnet** (client) programs, and install
    them via **synaptic** by searching for the program name; we pick the required
    package from the list by right-clicking it and choosing *Mark for Installation*.
    Once all programs are selected, we press the *Apply* button near the top left
    of the **synaptic** user interface. Upon completion of the installation, we are
    ready to use the programs to connect to the NodeMCU running the socket-based server,
    which we discuss in detail later. Here we briefly illustrate the capabilities
    of the **netcat** program by opening an ad-hoc server in one terminal window.
    Running **netcat -l 11111** starts a server that listens (-l) on port 11111. Note
    that normal users can only use port numbers above 1023. We connect to that server
    by running **netcat localhost 11111** from a second terminal window, where **localhost**
    is the default name for *this computer* and the port number on which the server
    listens. Now anything written in one terminal automatically appears on the other.
    In this example, we only connected two running versions of **netcat** on the same
    computer. One is started as a server, the other as a client, but the same functionality
    works between any computer with a working network connection. Find out more about
    **netcat** by consulting its manual page with **man netcat**. Should we wish to
    remove a previously installed program, we select it in synaptic by right-clicking
    the program in the list and selecting *Mark for Removal*. Pressing *Apply* promptly
    removes it.'
