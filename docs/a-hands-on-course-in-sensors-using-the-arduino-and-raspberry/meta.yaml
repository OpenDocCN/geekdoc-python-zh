    LDR in a voltage divider. The upper graph illustrates dark conditions, and the
    lower graph shows conditions where the LDR is exposed to light. Note that the
    vertical axis by convention shows the energy of electrons. This causes the positive
    pole of the battery to have the most negative energy. See the text for a discussion.](img/8f23875c54d5b3177d5d2a5bba06b37e_25_0.png)


