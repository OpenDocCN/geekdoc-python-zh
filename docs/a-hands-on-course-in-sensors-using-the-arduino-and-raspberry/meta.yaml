    that is used when communicating with the NodeMCU. After adding `DB += geophone.db`
    to the Makefile, we recompile the EPICS IOC and then execute `st.cmd` from the
    command line, or, once we make sure that everything works as expected, we create
    an init file to start the IOC at boot time, following the procedure we discussed
    in [Section 6.5](https://example.com). At this point, with a running IOC continuously
    retrieving waveforms from the NodeMCU, we can obtain the most recent waveform
    with `caget geophone:wf`, which first returns the number of samples, here 1024,
    followed by the 1024 samples. Other EPICS programs, on any computer connected
    to the same network, can also obtain the same waveforms, a new one every 10 seconds,
    as specified in the `geophone.db` record file.


    In order to illustrate access to epics variables from python we now prepare python
    script that generates the plots shown in [Figure 10.2](https://example.com). First
    we execute `sudo pip install pyepics` to install the latest version of the `pyepics`
    package, which provides functions `epics.caget()` and `epics.caput()` to read
    and set epics process variables that we use in the following script.


    ```

    # show_epics_waveform.py, V. Ziemann, 221103

    import matplotlib.pyplot as plt  # for plotting

    import numpy as np               # for fft

    import epics                     # epics access

    data=epics.caget("geophone:wf");

    plt.subplot(2,1,1)

    plt.plot(data);

    plt.xlabel("Samples")

    plt.ylabel("Amplitude")

    plt.subplot(2,1,2)

    fftvals=np.fft.fft(data)

    plt.plot(abs(fftvals))

    plt.ylabel("FFT")

    plt.show()

    ```


    After importing support for plotting and numerical calculations, just as described
    in [Section 5.6](https://example.com), this script imports support for epics and
    uses it to retrieve the waveform, which is stored in the array `data`. The upper
    `subplot` shows the raw data trace and the lower `subplot` shows its Fourier transform,
    calculated with the `numpy` function `fft.fft()`. Adding scaling and further numerical
    calculations is straightforward.


