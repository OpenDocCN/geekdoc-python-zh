    \ pressing the OFF button on a Samsung TV remote controller. We observe that the\
    \ idle state is a high (3.3 V) signal level that is interrupted by a sequence\
    \ of pulses where"
  - '[PAGE 252]


    234 ■ A Hands-On Course in Sensors Using the Arduino and Raspberry Pi, Second
    Edition


    ![](img/8f23875c54d5b3177d5d2a5bba06b37e_252_0.png)


    Figure 14.2 The infra-red signal from a Samsung TV remote controller, recorded
    with a TSOP2238 receiver, whose output is sampled at 10 kS/s (left) and the start
    of the pulse sampled at 50 kS/s (right).


    the signal level is low (0V). The duration of the entire sequence is about 60
    ms. Increasing the sampling rate to 50 kS/s and trying a few times to catch the
    start of the pulse, we obtain the figure on the right-hand side. By clicking with
    the mouse on the transitions to determine the pixel values, we can easily measure
    the duration of signals. We find that the long negative-going pulse at the start
    is 4.6 ms long and is followed by a 4.4 ms long period where the level is high.
    The following short pulses approximately are low for 0.6 ms and high for 0.4 ms.
    Other parts of the pulse can be worked out with patience, but the lack of a trigger
    system makes this somewhat inconvenient. Adding one is therefore first on the
    list of project ideas.


    # QUESTIONS AND PROJECT IDEAS


    +   1. Add functionality to trigger the acquisition on a falling or rising edge.

    2. Change the code to read the fast ADC from pin 33 instead.

    3. Add a menu to select the frequency and pulse width of the generator for the
    rectangular signals on pin 27.

    4. Double the size of the array `buffer[]` supplied to the `i2s_read()` function
    and record longer waveforms. What else do you need to change in order to display
    them on the webpage?

    5. Add an amplifier to measure and then display the small voltages from a microphone.

    6. Discuss adding an op-amp, wired as a line buffer, to the DAC output and a transimpedance
    amplifier to the ADC input in order to measure the impedance of components like
    we did in Chapter 12.'
- md: "## CHAPTER 15\nExample: Medical Sensing\n\nIn this chapter, we measure electrocardiograms\
    \ (ECGs), the oxygen saturation level in our blood, and the bioimpedance with\
    \ a NodeMCU, which controls the three sensors and displays their measurements\
    \ using the web interface from Chapter 13, already shown in Figure 13.1. As an\
    \ added bonus, we add circuitry to simulate the impedance of the human body and\
    \ ECGs as well. Moreover, we provide the option to save measured values to the\
    \ internal flash disk on the NodeMCU and later replay them, which opens the possibility\
    \ to log data, for example, while exercising. Importantly, note that this project\
    \ only illustrates the measurement processes and is not suitable for medical diagnosis!\n\
    \nThe hardware with the NodeMCU on the right and the three sensors is shown in\
    \ Figure 15.1. Next to the controller we see the breakout board [31] with the\
    \ AD8232 to measure ECGs. It is accompanied by a cable that connects three electrodes\
    \ to a 3.5 mm jack, which is shown just below the symbol of the heart. The leads\
    \ to the electrodes are color-coded: the black electrode should be connected to\
    \ the right lower arm (RA), the blue one to the left lower arm (LA), and the red\
    \ one to the right leg (RL), though other placements are also possible. The breakout\
    \ board senses, amplifies, and cleans up the small voltage measured between the\
    \ black and the blue electrodes, uses the red one as reference, and provides an\
    \ analog voltage on its output pin. This output signal we route directly to the\
    \ analog input pin A0 of the NodeMCU. Furthermore, signals to indicate whether\
    \ the electrodes are connected are routed to digital input pins D3 and D4.\n\n\
    The small breadboard shown on the right contains an ECG simulator, which allows\
    \ us to test the AD8232 without connecting a patient. We store the voltages that\
    \ describe the ECG in tabular form on the NodeMCU and periodically pass values\
    \ to the MCP4921 digital-to-analog converter that we already discussed in Section\
    \ 4.5.5. Apart from the power rails, its SPI-control wires SCK, MOSI, and CS are\
    \ connected to pins D5, D7, and D8 on the NodeMCU, respectively. The three resistors\
    \ (10kΩ, 10Ω, and 10kΩ), also placed on the small breadboard, reduce the signal\
    \ between RL and RA to the level of mV, normally produced by the body. We directly\
    \ connect them to the corresponding electrodes at the end of the cable that is\
    \ attached to the jack on the AD8232 breakout board.\n\nThe MAX30102-based pulse\
    \ oximeter, already shown in Figure 2.40, is also mounted on a small breakout\
    \ board that is placed to the left of the AD8232. As already mentioned in Section\
    \ 2.3.3, it measures the saturation level of oxygen in blood (SPO2) by comparing\
    \ the reflection of red and infrared light measured with a photo-transistor at\
    \ the tip of a finger. The small optical sensor with photodiodes and transistor\
    \ operates similarly to the color measurements from Chapter 11. It is seen near\
    \ the center of the breakout board and is connected to the NodeMCU through the\
    \ two I2C lines SCL and SDA, attached to pins D1 and D2, respectively.\n\nThe\
    \ third sensor, shown on the far left, is the bioimpedance network analyzer AD5933\
    \ that we already encountered in Chapter 12. We use it to measure the impedance\
    \ between two electrodes attached to a circuit that models the impedance of a\
    \ human body, called *Cole model*. The circuit with the eight-pin op-amp is the\
    \ same we already used earlier; we only increase the value of the feedback resistor\
    \ between pin 4 and 5 of the AD5933 to 10 kΩ. At the same time, we add a 10 kΩ\
    \ resistor to pin 1 of the op-amp in order to limit the current delivered to the\
    \ “body” to around 100 μA. We daisy-chain the I2C lines coming from the oximeter\
    \ to interface the AD5933 and the controller.\n\nThis circuit is brought to life\
    \ with the following sketch that runs on the NodeMCU. It is a bit long, so we\
    \ discuss it one part at a time. The first part closely follows the data acquisition\
    \ system from Chapter 13 by providing WLAN credentials and loading the necessary\
    \ libraries, only here we need to use the ones that are appropriate for the ESP8266-based\
    \ NodeMCU. In order to control the MAX30102, we install the *DFRobot_MAX30102*\
    \ library by issuing the command `git clone https://github.com/DFRobot/DFRobot_MAX30102.git`\
    \ in the subdirectory ~/Arduino/libraries and subsequently use it in our sketch\
    \ by including its header file and creating an object `Sensor` to interact with\
    \ the device. We then include the support files for I2C from Section 4.4.3 and\
    \ for the AD5933 from Chapter 12. Then a number of variable declarations follow;\
    \ many were already used in Chapter 13. We only point out that `mmode` is used\
    \ to identify actions of the different sensors and `Rcal` specifies the value\
    \ of the current limiting resistor in kΩ.\n\n```cpp\n// MediSense, V. Ziemann,\
    \ 221106\nconst char* ssid     = \"messnetz\";\nconst char* password = \"zxcvZXCV\"\
    ;\n#include <ESP8266WiFi.h>\n#include <ESP8266WebServer.h>\n#include <WebSocketsServer.h>\n\
    #include <ArduinoJson.h>\n#include <FS.h>\n#include <SPI.h>\nESP8266WebServer\
    \ server2(80);                // port 80\nWebSocketsServer webSocket = WebSocketsServer(81);\
    \  // port 81\n#include <Ticker.h>\nTicker SampleSlow,ECGticker;\n#include <DFRobot_MAX30102.h>\n\
    DFRobot_MAX30102 Sensor;\n#include \"I2Crw.h\"\n#include \"AD5933.h\"\nint16_t\
    \ Ival[512],Qval[512]; float mag50=1, phase50=0;\nvolatile uint8_t websock_num=0,info_available=0,output_ready=0;\n\
    int mmode=0,sample_period=100,samples[3],icounter=0,recording=0;\nint ringbuf[50],ibuf=0,ped=0;\
    \  // pedestal subtraction for oximeter\nchar info_buffer[80];           // for\
    \ websock messages\nchar out[300];                  // space for websocket messages\n\
    DynamicJsonDocument doc(300);\nfloat Rcal=10.0;               // calibration resistor\n\
    uint16_t ecgtrace[200],ecg_counter=0;;\n#define CS D8                   // chip\
    \ select for SPI-DAC\n```\n\nIn the following section we define a function to\
    \ handle requests for unknown web pages. The function `cardio_action()` is the\
    \ callback routine that reads the IO ports with signals related to the AD8232\
    \ and places them in the array `samples[]`, much the same way we did in Chapter\
    \ 13. Likewise, in `oximeter_action()` we read the signals from the photo transistor\
    \ of the MAX30102 illuminated by the two photodiodes. Here we also determine the\
    \ pedestal of the raw signal, which varies widely. We then place the raw signal\
    \ with pedestal subtracted and suitably scaled in order to fit it in the vertical\
    \ range we can display. Note that every 200 samples we fill `sample[1]` with a\
    \ large value that is zero otherwise. This causes a spike to appear every 200\
    \ samples on the display that allows us to easily convert the horizontal axis\
    \ to time. In `impedance_action()` we program the AD5933 to produce a 50 kHz signal,\
    \ read the I and Q signals, convert them to amplitude and phase and place the\
    \ value, properly scaled into `samples[]`. You might want to adjust the scale\
    \ factors to fill the available vertical range on the graph, which is 512 pixels.\
    \ Moreover, the commented-out line stores the amplitude in logarithmic form and\
    \ allows us to explore four orders of magnitude for the resistance on the same\
    \ graph instead. Note that the three callback functions announce the availability\
    \ of new data by setting `output_ready` to unity. This variable is checked and\
    \ acted upon in the main program loop.\n\n```cpp\nvoid handle_notfound() {  //....................http\
    \ server error handling\n  server2.send(404,\"text/plain\",\"not found, use http://ip-address/\"\
    );\n}\n\nvoid cardio_action() {  //....................sampleslow_action\n  samples[0]=analogRead(0)/2;\
    \  // adjust scale\n  samples[1]=100*digitalRead(D3)+50*digitalRead(D4);\n  samples[2]=0;\n\
    \  output_ready=1;\n}\n\nvoid oximeter_action() {  //....................oximeter_action\n\
    \  float ir=0;\n  if (mmode==3) {ir=(float)Sensor.getIR();\n  } else if (mmode==4)\
    \ {ir=(float)Sensor.getRed();}\n  ringbuf[ibuf]=ir; ibuf++; if (ibuf>=50) {ibuf=0;}\n\
    \  ped=ringbuf[0]; for (int k=1;k<50;k++) {ped=min(ped,ringbuf[k]);}\n  samples[0]=100+(ir-ped)/4.0;\
    \  // adjust scale\n  icounter=icounter+1;\n  if (icounter==200){samples[1]=30000;\
    \ icounter=0;} else {samples[1]=0;}\n  samples[2]=0;\n  output_ready=1;\n}\n```"
  mdcn: "## 第15章\n示例：医疗传感\n\n在本章中，我们将使用NodeMCU测量心电图（ECG）、血氧饱和度以及生物阻抗。NodeMCU控制这三个传感器，并利用第13章（已在图13.1中展示）的Web界面显示其测量值。作为额外功能，我们还添加了模拟人体阻抗和心电图的电路。此外，我们提供了将测量值保存到NodeMCU内部闪存盘并稍后回放的选项，这为数据记录（例如在运动时）提供了可能性。重要的是，请注意本项目仅用于演示测量过程，不适用于医疗诊断！\n\
    \n图15.1展示了包含右侧NodeMCU和三个传感器的硬件。在控制器旁边，我们看到带有AD8232心电图测量模块的分线板[31]。它配有一根将三个电极连接到3.5毫米插孔的电缆，该插孔显示在心脏符号下方。通往电极的导线采用颜色编码：黑色电极应连接到右下臂（RA），蓝色电极连接到左下臂（LA），红色电极连接到右腿（RL），尽管其他放置方式也是可能的。该分线板感应、放大并清理在黑色和蓝色电极之间测量到的微小电压，使用红色电极作为参考，并在其输出引脚上提供模拟电压。我们将此输出信号直接路由到NodeMCU的模拟输入引脚A0。此外，用于指示电极是否连接的信号被路由到数字输入引脚D3和D4。\n\
    \n右侧显示的小面包板包含一个心电图模拟器，它允许我们在不连接患者的情况下测试AD8232。我们将描述心电图的电压以表格形式存储在NodeMCU上，并周期性地将值传递给我们在第4.5.5节中已讨论过的MCP4921数模转换器。除了电源轨，其SPI控制线SCK、MOSI和CS分别连接到NodeMCU的引脚D5、D7和D8。同样放置在小面包板上的三个电阻（10kΩ、10Ω和10kΩ）将RL和RA之间的信号降低到通常由人体产生的毫伏级。我们直接将它们连接到连接在AD8232分线板插孔上的电缆末端的相应电极。\n\
    \n基于MAX30102的脉搏血氧仪（已在图2.40中展示）也安装在一个小分线板上，该板放置在AD8232的左侧。如第2.3.3节所述，它通过比较在指尖用光电晶体管测量的红光和红外光的反射来测量血液中的氧饱和度（SPO2）。带有光电二极管和晶体管的小型光学传感器的工作原理类似于第11章的颜色测量。它位于分线板中心附近，并通过两条I2C线SCL和SDA分别连接到引脚D1和D2，从而连接到NodeMCU。\n\
    \n第三个传感器显示在最左侧，是我们在第12章中已经遇到的生物阻抗网络分析仪AD5933。我们用它来测量连接到模拟人体阻抗电路（称为*Cole模型*）的两个电极之间的阻抗。带有八引脚运算放大器的电路与我们之前使用的相同；我们只是将AD5933引脚4和5之间的反馈电阻值增加到10\
    \ kΩ。同时，我们在运算放大器的引脚1上添加一个10 kΩ电阻，以将提供给“身体”的电流限制在约100 μA。我们将来自血氧仪的I2C线菊花链连接，以连接AD5933和控制器。\n\
    \n该电路通过以下在NodeMCU上运行的草图（sketch）得以实现。它有点长，所以我们分部分讨论。第一部分紧密遵循第13章的数据采集系统，提供WLAN凭证并加载必要的库，只是这里我们需要使用适合基于ESP8266的NodeMCU的库。为了控制MAX30102，我们通过在子目录~/Arduino/libraries中执行命令`git\
    \ clone https://github.com/DFRobot/DFRobot_MAX30102.git`来安装*DFRobot_MAX30102*库，然后在我们的草图中通过包含其头文件并创建一个`Sensor`对象来与设备交互。然后我们包含第4.4.3节的I2C支持文件和第12章的AD5933支持文件。接着是一系列变量声明；许多已在第13章中使用过。我们仅指出`mmode`用于标识不同传感器的操作，`Rcal`指定限流电阻的值（单位为kΩ）。\n\
    \n```cpp\n// MediSense, V. Ziemann, 221106\nconst char* ssid     = \"messnetz\"\
    ;\nconst char* password = \"zxcvZXCV\";\n#include <ESP8266WiFi.h>\n#include <ESP8266WebServer.h>\n\
    #include <WebSocketsServer.h>\n#include <ArduinoJson.h>\n#include <FS.h>\n#include\
    \ <SPI.h>\nESP8266WebServer server2(80);                // port 80\nWebSocketsServer\
    \ webSocket = WebSocketsServer(81);  // port 81\n#include <Ticker.h>\nTicker SampleSlow,ECGticker;\n\
    #include <DFRobot_MAX30102.h>\nDFRobot_MAX30102 Sensor;\n#include \"I2Crw.h\"\n\
    #include \"AD5933.h\"\nint16_t Ival[512],Qval[512]; float mag50=1, phase50=0;\n\
    volatile uint8_t websock_num=0,info_available=0,output_ready=0;\nint mmode=0,sample_period=100,samples[3],icounter=0,recording=0;\n\
    int ringbuf[50],ibuf=0,ped=0;  // pedestal subtraction for oximeter\nchar info_buffer[80];\
    \           // for websock messages\nchar out[300];                  // space\
    \ for websocket messages\nDynamicJsonDocument doc(300);\nfloat Rcal=10.0;    \
    \           // calibration resistor\nuint16_t ecgtrace[200],ecg_counter=0;;\n\
    #define CS D8                   // chip select for SPI-DAC\n```\n\n在接下来的部分，我们定义一个函数来处理对未知网页的请求。函数`cardio_action()`是回调例程，它读取与AD8232相关的信号IO端口，并将它们放入数组`samples[]`中，这与我们在第13章中的做法非常相似。同样，在`oximeter_action()`中，我们读取MAX30102光电晶体管在两个光电二极管照射下的信号。这里我们还确定原始信号的基线（pedestal），该基线变化很大。然后我们将减去基线并适当缩放的原始信号放入数组，以适应我们可以显示的垂直范围。请注意，每200个样本，我们会用一个大值填充`sample[1]`，否则该值为零。这会导致在显示上每200个样本出现一个尖峰，使我们能够轻松地将水平轴转换为时间。在`impedance_action()`中，我们编程AD5933产生一个50\
    \ kHz的信号，读取I和Q信号，将它们转换为幅度和相位，并将适当缩放后的值放入`samples[]`。您可能需要调整比例因子以填充图表上可用的垂直范围（512像素）。此外，注释掉的行以对数形式存储幅度，允许我们在同一图表上探索四个数量级的电阻。请注意，这三个回调函数通过将`output_ready`设置为1来宣布新数据的可用性。该变量在主程序循环中被检查并据此执行操作。\n\
    \n```cpp\nvoid handle_notfound() {  //....................http server error handling\n\
    \  server2.send(404,\"text/plain\",\"not found, use http://ip-address/\");\n}\n\
    \nvoid cardio_action() {  //....................sampleslow_action\n  samples[0]=analogRead(0)/2;\
    \  // adjust scale\n  samples[1]=100*digitalRead(D3)+50*digitalRead(D4);\n  samples[2]=0;\n\
    \  output_ready=1;\n}\n\nvoid oximeter_action() {  //....................oximeter_action\n\
    \  float ir=0;\n  if (mmode==3) {ir=(float)Sensor.getIR();\n  } else if (mmode==4)\
