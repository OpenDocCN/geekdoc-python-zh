  - '[PAGE 193]


    # CHAPTER 8


    # Websockets


    Occasionally, it is desirable to control the data acquisition hardware directly
    from an internet browser where the user interface is realized as an interactive
    webpage using *JavaScript*. In this way, even smartphones connected to the network
    can control the acquisition and display data in real time. Unfortunately, due
    to security concerns can normal sockets, such as those used the second example
    in [Section 4.6.3](#), not be accessed from a browser. Instead, however, we can
    use a simpler interface called *websockets*, which allows us to exchange simple
    text-based messages between microcontrollers and browsers.


    The text-based messages are formatted using the *JavaScript object notation* (JSON)
    where all data are specified by name-value pairs, enclosed in curly brackets.
    For example, we send a single temperature value from the microcontroller formatted
    as `{"TEMP":"27.2"}`. We can even add several pairs in the same message, such
    as `{"X":"17", "Y":"4"}`, or send arrays via `{"DATA":["17", "4"]}`, where the
    array values are enclosed in square brackets. We access the first value via `DATA[0]`,
    which evaluates to 17.


    In order to illustrate the communication, we will use the hardware from [Section
    4.6.3](#) with the LM35 temperature sensor connected to the analog input of a
    NodeMCU microcontroller. We program the NodeMCU to listen to JSON messages coming
    from a controlling browser that instructs it to start or stop measuring the temperature
    at regular intervals, pack the results in a JSON message, and send it back to
    the browser as soon as new data is available. Moreover, we start a regular webserver
    on the NodeMCU that serves the controlling webpage, shown in [Figure 8.1](#),
    that any browser, here chromium, can access. On the top, buttons to start and
    stop the acquisition are displayed together with a menu to select the update rate
    of the measurements. A third button clears the logging display shown below the
    buttons. Continuously arriving data points are added to it until the screen is
    filled when the trace starts moving to the left as new samples arrive. Below the
    logging display status information is shown, normally the value of the most recent
    data.


    Now, let''s see how to bring this system to live; first we look at the code on
    the NodeMCU.


    # 8.1 ON THE NODEMCU


    The NodeMCU has to handle several tasks simultaneously. It must serve the HTML
    file of webpage from [Figure 8.1](#), it has to listen to requests coming from
    the same page once it is running in the browser, and it must measure the temperature
    at regular intervals. We therefore add functionality, provided by additional libraries,
    for these tasks and open the *Library manager* in the *Tools* menu of the Arduino
    IDE to install the **WebSockets** and the **ArduinoJSON** libraries. Since the
    program is rather long, we''ll discuss it in smaller chunks.'
- md: "## 8.1 NodeMCU上的网页服务\n\n![](img/8f23875c54d5b3177d5d2a5bba06b37e_194_0.png)\n\
    \n图 8.1 由NodeMCU提供的网页，用于控制数据采集并实时显示数据，图中显示的波动是由于手指放在温度传感器上造成的。\n\n在定义了网络凭证之后，我们为WiFi、Web服务器以及负责websocket的服务器添加了通用支持。此外，我们添加了一个用于解码JSON消息的库，以及另一个用于支持SPIFFS文件系统的库，该文件系统用于将网页存储在NodeMCU的闪存中。有了这些声明，我们就可以声明Web服务器\
    \ **server2** 监听通常用于HTML的80端口。同样，我们定义 **webSocket** 来处理81端口上的websocket通信。\n\n\
    ```cpp\n// Minimal websocket temperature server, V. Ziemann, 221017\nconst char*\
    \ ssid     = \"messnetz\";\nconst char* password = \"zxcvZXCV\";\n#include <ESP8266WiFi.h>\n\
    #include <ESP8266WebServer.h>\n#include <WebSocketsServer.h>\n#include <ArduinoJson.h>\n\
    #include \"FS.h\"                // SPIFFS filesystem\nESP8266WebServer server2(80);\
    \   // port 80\nWebSocketsServer webSocket = WebSocketsServer(81);  // port 81\n\
    ```\n\n在接下来的几行中，我们添加了对一个自动重复过程的支持，我们称之为 **SampleSlow**，定义了执行该过程的周期，以及两个标志，用于指示是否有内容可以发送到浏览器。函数\
    \ **sampleslow_action()** 只是设置其中一个标志，以便在主循环中处理温度测量。我们还分配了一个变量来保存发送到浏览器的信息，以及一个变量来记住在程序多个部分中需要的websocket句柄。\n\
    \n```cpp\n#include <Ticker.h>\nTicker SampleSlow;\nint sample_period=1,data_available=0,info_available=0;\n\
    void sampleslow_action() {data_available=1;}\nchar info_string[70];\nvolatile\
    \ uint8_t websock_num=0;\n```\n\n现在我们准备指定websocket如何响应来自通信通道另一端（即浏览器）的请求。websocket上的任何活动（在后台处理）都会触发函数\
    \ `webSocketEvent()` 的执行。该函数接收标识websocket的句柄 `num`、交互类型 `type`、其 `payload` 及其大小作为输入。根据\
    \ `type`，我们使用 `switch-case` 结构来定义适当的操作。如果浏览器断开或连接，会向串行线打印一条简短的消息。来自浏览器的任何JSON格式字符串的类型为\
    \ `WStype_TEXT`，`payload` 包含来自浏览器的命令。使用 `ArduinoJSON` 库提供的函数 `deserializeJson()`，我们解析\
    \ `payload` 并将名称-值对放入类型为 `DynamicJsonDocument` 的变量 `root` 中。现在我们可以将 `cmd` 的值（指定命令）作为\
    \ `root[\"cmd\"]` 访问，将 `val` 的值作为 `root[\"val\"]` 访问。例如，字符串 `{\"cmd\":\"START\"\
    ,\"val\":1}` 包含命令 `START` 和值1。在函数的后续部分中，编码了对命令的反应。如果收到 `START` 命令，该值被解释为 `sample_period`，并用于注册以指定周期执行的\
    \ `sampleslow_action`。此外，`info_string` 被填充了我们发送回浏览器的文本。`STOP` 命令只是停止周期性采集，任何未知命令都会显示在串行线上用于调试。\n\
    \n```cpp\nvoid webSocketEvent(uint8_t num, WStype_t type, uint8_t * payload,\n\
    \    size_t length) {\n  Serial.printf(\"webSocketEvent(%d, %d, ...)\\r\\n\",\
    \ num, type);\n  websock_num=num;\n  switch(type) {\n    case WStype_DISCONNECTED:\n\
    \      Serial.printf(\"[%u] Disconnected!\\r\\n\", num);\n      break;\n    case\
    \ WStype_CONNECTED:\n      {\n        IPAddress ip = webSocket.remoteIP(num);\n\
    \        Serial.printf(\"[%u] Connected from %d.%d.%d.%d url: %s\\r\\n\",\n  \
    \        num, ip[0], ip[1], ip[2], ip[3],payload);\n        strcpy(info_string,\"\
    Websocket opened on ESP8266\");\n        info_available=1;\n      }\n      break;\n\
    \    case WStype_TEXT:\n      {\n        Serial.printf(\"[%u] get Text: %s\\r\\\
    n\", num, payload);\n        DynamicJsonDocument root(300);      //.........parse\
    \ JSON\n        deserializeJson(root,payload);\n        const char *cmd = root[\"\
    cmd\"];\n        const int val = root[\"val\"];\n        if (strstr(cmd,\"START\"\
    )) {\n          sample_period=val;\n          SampleSlow.attach(sample_period,sampleslow_action);\n\
    \          strcpy(info_string,\"Acquisition started\"); info_available=1;\n  \
    \      } else if (strstr(cmd,\"STOP\")) {\n          SampleSlow.detach();\n  \
    \        strcpy(info_string,\"Acquisition stopped\"); info_available=1;\n    \
    \    } else {\n            Serial.println(\"Unknown command\");\n        }\n \
    \       break;\n      }\n    }\n  }\n}\n```\n\n此时，所有支持函数都已定义，我们在 `setup()` 函数中配置NodeMCU。在那里，我们首先初始化串行线，然后是WiFi。成功的连接随后通过串行线报告。接下来，我们调用\
    \ `webSocket.begin()` 来启动websocket服务器，并注册函数 `webSocketEvent()`，以便在websocket事件发生时执行。然后我们测试SPIFFS文件系统是否正常工作，如果是，则启动\
    \ `server2`，指示它提供文件 `webpage.html`，并将成功启动报告给串行线。我们稍后会回到如何将文件复制到文件系统的部分。\n\n```cpp\n\
    void setup() {\n    Serial.begin(115200); delay(1000);\n    WiFi.begin(ssid, password);\n\
    \    while (WiFi.status() != WL_CONNECTED) {delay(500); Serial.print(\".\");}\n\
    \    Serial.print(\"\\nConnected to \");  Serial.print(ssid);\n    Serial.print(\"\
    \ with IP address: \"); Serial.println(WiFi.localIP());\n    webSocket.begin();\n\
    \    webSocket.onEvent(webSocketEvent);\n    if (!SPIFFS.begin()) {\n        Serial.println(\"\
    ERROR: no SPIFFS filesystem found\");\n        return;\n    } else {\n       \
    \ server2.begin();\n        server2.serveStatic(\"/\", SPIFFS, \"/webpage.html\"\
    );\n        Serial.println(\"SPIFFS file system found and server started\");\n\
    \    }\n}\n```\n\nNodeMCU配置完成后，`loop()` 函数持续执行，首先将控制权交给 `server2` 以处理任何请求，然后对\
    \ `webSocket` 执行相同操作。如果 `data_available` 被设置为1（这只可能发生在 `sampleslow_action()` 函数内部），我们分配一些缓冲区，测量温度，使用\
    \ `dtostrf()` 将数值转换为字符串，并在变量 `out` 中组装JSON字符串，随后通过执行函数 `webSocket.sendTXT()` 将其发送回浏览器。同样，如果\
    \ `info_available` 被设置为1，`info_string` 被打包成一个名为 `INFO` 的JSON包并发送回浏览器。\n\n```cpp\n\
    void loop() {\n    server2.handleClient();  // handle webserver on port 80\n \
    \   webSocket.loop();        // handle websocket server on port 81\n    if (data_available==1)\
    \ {\n        data_available=0;\n        char buf[20],out[100];\n        float\
    \ temperature=analogRead(0)*100*3.3/1023.0;\n        dtostrf(temperature,7,1,buf);\n\
    \        (void) sprintf(out,\"{\"%s\":\"%s\"}\",\"TEMP\",buf);\n        webSocket.sendTXT(websock_num,out,strlen(out));\n\
    \    }\n    if (info_available==1) {\n        info_available=0;\n        char\
    \ out[100];\n        (void) sprintf(out,\"{\"%s\":\"%s\"}\",\"INFO\",info_string);\n\
    \        webSocket.sendTXT(websock_num,out,strlen(out));\n    }\n}\n```\n\n这个程序负责处理Web服务器、websocket和测量。配置好NodeMCU后，我们继续编程通信通道的另一端，即在浏览器窗口中运行的HTML文件\
    \ `webpage.html`。\n\n## 8.2 在浏览器中\n\n下面我们复制并注释负责图8.1的HTML文件 `webpage.html`。它包含HTML和JavaScript命令，用于协调浏览器和NodeMCU之间的通信。该文件包含通常的\
    \ `!DOCTYPE` 和HTML标签，这里指定语言为英语。在HEAD标签内，我们指定一些通用信息，如标题，然后为填充我们网页的几个项目提供样式信息。`#displayarea`\
    \ 将在用于显示测量数据的空间周围有一个黑色边框，显示为红色的 `#trace0`。`#ip` 实体将在显示的网页右侧显示连接的NodeMCU的IP地址。\n\
    \n```html\n<!DOCTYPE HTML>\n<HTML lang=\"en\">\n<HEAD><TITLE>Temperature server</TITLE>\n\
    \    <META charset=\"UTF-8\">\n    <STYLE>\n        #displayarea {border: 1px\
    \ solid black; }\n        #trace0 {fill: none; stroke: red; stroke-width: 1px;}\n\
    \        #ip {float: right;}\n    </STYLE>\n</HEAD>\n```\n\n以下部分定义了网页顶部的按钮和菜单。按钮用\
    \ `id=` 命名，并分配了一个所谓的回调函数 `onclick=`，该函数定义了按下按钮时引发的操作。用于选择采样周期的菜单用 `SELECT` 标签定义，其中不同的选择用\
    \ `OPTION` 标签定义。`id='ip'` 的项目会自动浮动到右边距，因为我们在STYLE声明中指定了该行为。图8.1中看到的图形区域夹在 `DETAILS`\
    \ 标签之间，这允许我们将其最小化。`id='displayarea'` 的项目是一个 *可缩放矢量图形*。在 `SVG` 标签内，我们定义了为图形保留的区域的宽度和高度。`PATH`\
    \ 标签名为 `trace0`，将用要显示的数据点填充。我们使用svg命令 `d=\"M0 256\"` 初始化它，该命令通过将显示线的起点移动到坐标 (0,256)\
    \ 来初始化 `trace0`。最后，我们将一些文本放入保留用于显示状态信息的行中。\n\n```html\n<BODY>\n<P> Temperature\
    \ server:\n```"
