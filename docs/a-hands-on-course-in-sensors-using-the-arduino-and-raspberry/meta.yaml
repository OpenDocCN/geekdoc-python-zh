    ![](img/8f23875c54d5b3177d5d2a5bba06b37e_291_0.png)


    Figure 17.6 The operational robot from the back (left) and from the front (right).


    it works equally well on the breadboard. On the right we see the front of the
    robot with the small breadboard slightly turned to the side. On it the distance
    sensor and below it the three phototransistors are visible. Owing to the breadboards,
    the wiring has a distinct “spaghetti-flavor,” which makes the robot rather fragile,
    but also very convenient for developing and testing new functionality.


    At this point we can control our simple robot with the remote controller and also
    make it follow a simple algorithm to find a heat source autonomously. We have
    to admit that the performance of the prototype system is less than impressive;
    the heat source has to be rather close to be detectable and the motion towards
    it is awkward. But our main purpose is to show how to implement all the functionality
    in a simple prototype system. Building a marketable system requires significantly
    more effort.


    The hardware with one large breadboard directly mounted on the robot chassis and
    a smaller one movable on the model-servo makes the system very versatile and extendable;
    for example, connecting other sensors or making the robot follow other algorithms.
    We use a slave NANO as an IO extender, but also other extenders are available,
    such as the MCP23017 that provides up to 16 digital IO pins, or the PCA9685 that
    controls up to 16 pulse-width modulated outputs or model-servos. Both extenders
    are controlled via the I2C-port on the NodeMCU and require two IO-pins only. The
    system is open for further experiments, and to expand the system. Other improvements
    comprise fine-tuning the algorithms to make the robot more robust, and whatever
    else come to mind.


    Now that we have discussed the hardware and software for our projects, we are
    ready to use the equipment in experiments, gather measurements, and interpret
    them. Once we reach firm conclusions, we want to present the results in a seminar
    and eventually write a report about the experiment. These two points, related
    to presenting our work, are the topic of the final chapter.'
