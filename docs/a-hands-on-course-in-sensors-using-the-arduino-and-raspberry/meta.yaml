  md: '# # Microcontroller: Arduino


    The microcontrollers we use in this book come are all supported by the Arduino
    *integrated development environment* (IDE), which provides an easy-to-use programming
    environment that allows us to quickly start developing software. There are limitations,
    but it is a wonderful system to start learning about microcontrollers.


    # ## 4.1 HARDWARE


    The original Arduinos are based on Atmel microcontrollers and we mostly discuss
    the Arduino UNO. Support for additional families of controllers, based on ESP8266
    and ESP32 microcontrollers with built-in WLAN support was later integrated into
    the Arduino IDE. These controllers can be therefore programmed in much the same
    way as UNOs. But let us start with the UNOs.


    # ### 4.1.1 Arduino UNO


    An Arduino UNO is shown in Figure 4.1, where the main component is the ATmega328p
    microcontroller from Atmel (now Microchip™), which is the large chip with 28 legs
    in the image. It is a controller with 8-bit-wide registers, and operates at a
    clock frequency of 16 MHz. It has 32 kB RAM memory and 1 kB non-volatile EEPROM
    memory, which can be used to store persistent data that need to survive tuning
    off and on the supply voltage. There are three timers on board, which are basically
    counters that count clock cycles and are programmable to perform some action,
    once a counter reaches some value. The UNO interacts with its environment through
    13 digital input–output (IO) pins, of which most can be configured to be either
    input or output and have software-configurable pull-up resistors. Several of the
    pins are configurable to support I2C, SPI, and RS-232 communication. Moreover,
    there are six analog input pins. They measure voltages of up to the supply voltage
    of 5 V. Optionally, an internal reference voltage source provides a 1.1 V reference.
    All digital and analog pins are routed to pin headers that are visible on both
    sides of the Arduino printed circuit board (PCB) in Figure 4.1. Furthermore, the
    built-in hardware RS-232 port is connected to an RS-232-to-USB converter that
    allows communication and programming from a host computer. There is no WiFi, Bluetooth,
    or Ethernet support on the UNO board, but extension boards to provide this functionality,
    so-called *shields*, are available for mounting directly onto the pin headers.


    One can describe the Arduino UNO as having the intelligence of a washing machine.
    It keeps time with the timers, it can sense voltages from, for example, temperature
    sensors, and it can turn motors or pumps on or off, depending on whether some
    condition is met. In this way it can also provide the glue logic to interface
    sensors (analog, I2C, SPI, and'
