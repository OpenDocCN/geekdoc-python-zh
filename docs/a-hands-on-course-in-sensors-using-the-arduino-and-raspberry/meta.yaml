  md: "```\n    }\n}\ndelay(50);              // wait 50 ms\n}\n```\n\nIn this sketch\
    \ we actually test which character was sent on the serial line, and depending\
    \ on whether it is an “s” or a “t” the value from analog pin A0 or A1 is returned.\
    \ The characters sent back to the host via the serial line contain both the pin\
    \ read and the value. If a character different from “s” or “t” is received by\
    \ the Arduino, the string “unknown command” is returned via the serial line. In\
    \ this way, we build a simple query-response protocol to make the Arduino do different\
    \ things, depending on the character we send.\n\nIn the next example we assume\
    \ that an LM35 temperature sensor is connected to analog pin A0 in the way shown\
    \ on the right in Figure 4.6. Note that we add a 100 nF capacitor across the positive\
    \ supply voltage and ground pins of the LM35, to increase the stability of the\
    \ circuit. Note that it is good practice to add such a decoupling or bypass capacitor\
    \ close to the power pins of each chip in a circuit. In the following, we often\
    \ do not show these capacitors on the circuit diagrams in order to make them less\
    \ cluttered, but the capacitors should be included in the hardware. The software\
    \ to interface the LM35 is slightly more elaborate than in previous examples.\
    \ It allows us to send somewhat descriptive multicharacter commands to the Arduino\
    \ and receive a response that echos the request followed by the value. The basic\
    \ idea is that we request a parameter, say A0, by sending the parameter name with\
    \ a question-mark appended, such that the request looks like this: A0?. The Arduino\
    \ subsequently replies with A0 <value>. In the following sketch we implement this,\
    \ but also that the Arduino first reads a full line, in the sense that it waits\
    \ for a carriage-return and a line-feed character before responding.\n\n```\n\
    // query-response, V. Ziemann, 161013\nint val;\nfloat temp;\nchar line[30];\n\
    void setup() {\n  analogReference(INTERNAL);  // 1.1V internal ADC reference\n\
    \  Serial.begin (9600);\n  while (!Serial) {;}\n}\nvoid loop() {\n  if (Serial.available())\
    \ {\n    Serial.readStringUntil('\\n').toCharArray(line,30);\n    if (strstr(line,\"\
    A0?\")==line) {\n      val=analogRead(0);\n      Serial.print(\"A0 \"); Serial.println(val);\n\
    \    } else if (strstr(line,\"A1?\")==line) {\n      val=analogRead(1);\n    \
    \  Serial.print(\"A1 \"); Serial.println(val);\n    } else if (strstr(line,\"\
    T?\")==line) {\n      temp=1.1*100*analogRead(0)/1023;\n      Serial.print(\"\
    T \"); Serial.println(temp);\n    } else {\n      Serial.println(\"unknown\");\n\
    \    }\n  }\n}\n```"
