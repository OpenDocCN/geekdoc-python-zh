  md: 'We see that it is rather similar to the previous scripts to read from the Arduino.
    It just acquires one measurement and prints the value with the timestamp to standard
    output. In order to make this program accessible for the cron software, it is
    convenient to encapsulate it in a shell script file /home/pi/bin/readA0.sh that
    contains the following lines:


    ```

    #!/bin/bash

    /usr/bin/python /home/pi/bin/single_request.py >> /home/pi/A0.dat

    ```


    We make the file executable with the chmod program by executing chmod +x readA0.sh
    in the /home/pi/bin directory. The first line instructs the operating system to
    interpret the following lines using the bash shell. The next line starts the single_request.py
    script using the /usr/bin/python3 program, and redirects the output to the file
    /home/pi/A0.dat. Here >> implies that new data is appended to an existing file.
    Note that absolute file names must be given, including the absolute path. We test
    the readA0.sh script to ensure that it creates the /home/pi/A0.dat file or appends
    a reasonable measurement value with timestamp to the file. Once we are satisfied,
    we register readA0.sh with the cron software and edit the configuration file for
    the cron program with the crontab program. We execute it from the command prompt
    by typing


    ```

    crontab -e

    ```


    The first time crontab -e is called it asks for an editor. We pick our favorite
    or follow the suggestion. Once the editor opens with the configuration file, we
    append the following line at the end of the file:


    ```

    * * * * * /home/pi/bin/readA0.sh

    ```


    and save the file. This automatically registers the readA0.sh script to execute
    once every minute whenever the Raspi is running. We check that the file is registered
    with the crontab -l command. It lists the contents of the crontab file for user
    pi provided we are logged on as user pi. The meaning of the six columns in the
    crontab file are minute, hour, day of month, month, day of week, and program to
    execute. Placing asterisks in the first five columns instructs cron to execute
    the program every time it wakes up. The output of the crontab -l command has some
    basic explanations, and more is available by executing man 5 crontab at the command
    prompt. So, now we have a background process that records a measurement once a
    minute and fills the file /home/pi/A0.dat until we remove the entry in the crontab
    file.


    Our next task is to produce plots with python3 and two packages. The first package,
    numpy, contains many numerical functions, but also a powerful function to load
    data files. The second package, matplotlib, contains functions to plot data. Unless
    already installed, we add the packages with


    ```

    sudo apt-get install python3-numpy python3-matplotlib

    ```


    and are ready to read and display the data recorded in the file /home/pi/A0.dat
    with the following script.


    ```

    # matplotlib_plotter.py, V. Ziemann, 221004

    import numpy as np

    import matplotlib.pyplot as plt

    d=np.loadtxt(''/home/pi/A0.dat'',delimiter='' '')

    plt.plot(d[:,0]-d[0,0],d[:,1])

    plt.xlabel(''Time [s]'')        # axis labels

    plt.ylabel(''A0'')

    plt.show()                    # make plot visible

    ```'
