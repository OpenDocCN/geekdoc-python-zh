    \ }\n    #trace0 { fill: none; stroke: red; stroke-width: 1px;}\n    #trace1 {\
    \ fill: none; stroke: blue; stroke-width: 1px;}\n    #ip {float: right;}\n  </STYLE>\n\
    </HEAD>\n```\n\nThe following section specifies the appearance of the web page\
    \ shown in Figure 13.1. The buttons on the top, the selection menu to choose the\
    \ sampling time, and the displayed IP number are defined analogously to Chapter\
    \ 8.\n\n```\n<BODY>\n<P> ESP-DAQ:\n  <button id=\"start\" type=\"button\" onclick=\"\
    start();\">Start</button>\n  <button id=\"stop\" type=\"button\" onclick=\"stop();\"\
    >Stop</button>\n  <SELECT onchange=\"setSamplePeriod(this.value);\">\n    <OPTGROUP\
    \ label=\"Roll mode\">\n      <OPTION value=\"5\">5 ms</OPTION>\n      <OPTION\
    \ value=\"10\">10 ms</OPTION>\n      <OPTION value=\"20\">20 ms</OPTION>\n   \
    \   <OPTION value=\"50\">50 ms</OPTION>\n      <OPTION selected=\"selected\" value=\"\
    100\">100 ms</OPTION>\n      <OPTION value=\"200\">200 ms</OPTION>\n      <OPTION\
    \ value=\"500\">500 ms</OPTION>\n      <OPTION value=\"1000\">1 s</OPTION>\n \
    \     <OPTION value=\"2000\">2 s</OPTION>\n      <OPTION value=\"5000\">5 s</OPTION>\n\
    \    </OPTGROUP>\n  </SELECT>\n  <button id=\"clear\" type=\"button\" onclick=\"\
    cleardisplay();\">\n    Clear</button>\n  <A id='ip'>IP address</A>\n</P>\n```\n\
    \nIn the next section we open a DETAIL which later enables us to hide the section\
    \ or make it visible by clicking on a little triangle next to the text specified\
    \ in the SUMMARY. Inside the DETAIL, the CANVAS named Din displays the state of\
    \ the input pin D21. It is followed by the definition of the checkbox that we\
    \ use to change the state of output pin DO18. The selection menu lets us choose\
    \ the period at which the pin is toggled by passing the selected value to the\
    \ callback function setDO(), which assembles a JSON message and sends it to the\
    \ ESP32. Then we define an INPUT slider that we use to set the output voltage\
    \ of DAC25 followed by two elements of type CANVAS that show the current value\
    \ reported by ADC32 and ADC33 before closing the DETAIL.\n\n```\n<P><DETAILS open>\
    \ <SUMMARY>Input output</SUMMARY>\n<CANVAS id=\"Din\" width=\"100\" height=\"\
    20\"> </CANVAS>\nDO18:<INPUT type=\"checkbox\" id=\"DO18\" onchange=\"setDO(18,this.checked)\"\
    />\n<Select onchange=\"pulsepin18(this.value);\">\n    <OPTION value=\"0\">Pulse\
