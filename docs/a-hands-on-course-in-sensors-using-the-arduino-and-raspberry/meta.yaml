  md: 'Once the system is up and running, the NodeMCU connects to the **messnetz**
    WLAN spanned by the Raspi such that we access its web page by starting a browser
    on the Raspi or any other computer connected to **messnetz**. We then direct the
    browser to the IP number of the NodeMCU and receive the **medisense.html** page
    in return. After placing a finger on the pulse oximeter, we select **Oximeter
    SP02** which causes the value of SPO2 and the heart rate to be shown on the status
    line below the display area every few seconds. Observing the raw signals from
    the phototransistor illuminated by the infrared diode, we select **Oximeter IR
    live** from the selection menu on the right and then press the **Start** button.
    This starts the acquisition and after a few seconds during which the systems determines
    the pedestal, we see the signal appearing in the **displayarea**. It is similar
    to the one shown on the left-hand side in **Figure 15.2**. Recording the signals
    is accomplished by selecting **Recording ON** before selecting **Oximeter IR live**
    and pressing **Start**. To stop recording, we first **Stop** the acquisition before
    selecting **Recording OFF** and watch it with **Replay recording**. Note that
    we minimized the section labeled **Input output** on the webpage by clicking on
    the little triangle next to the text.


    After connecting the three electrodes on the cable from the AD5933 to the corresponding
    wires (RL, RA, and LA) from the simulator, selecting **ECG live**, and pressing
    the **Start** button, the ECG shown on the right-hand side in **Figure 15.2**
    appears on the display. We clearly see the narrow spike that signals the start
    of the heart''s contraction and two smaller pulses, one on its left and one on
    its right. They indicate different stages of the complex process that a heart
    performs more than a billion times in a lifetime. Analyzing the traces further
    is beyond the scope of this book and requires special medical training.


    In order to illustrate measurements of bioimpedance we simulate the impedance
    of the human body – typically between 500 Ω and 1 kΩ – with an electronic analog,
    called the *Cole model*, shown on the bottom left in **Figure 15.1** and, in more
    detail, in **Figure 15.3**. It consists of a 680 Ω resistor, which simulates the
    resistance of the extra-cellular fluids in the body. Connected in parallel, a
    1 kΩ resistor and a 2.2 nF capacitor simulates the resistance of the intra-cellular
    fluids and the capacitance of cell membranes, respectively. In order to limit
    the current though the “body”, we place a 10 kΩ resistor in series with the output
    from pin 1 of the MCP6002 op-amp. Before measuring the impedance, we calibrate
    the system by shorting the Cole circuit, such that only the 10 kΩ resistor connects
    the output of the op-amp to the input on pin 5 of the AD5933. Then we reconnect
    the Cole circuit as shown in **Figure 15.1** and sweep the AD5933, which results
    in the plot shown in **Figure 15.4**. The horizontal scale covers the frequency
    range between 10 kHz and 112.4 kHz. The vertical scale covers zero to 1 kΩ. We
    see that the absolute value starts close to 680 Ω – click at the point and convert
    the pixel value back to Ohm (Ω) – at low frequencies and drops to 460 Ω at high
    frequencies, which is consistent with simple circuit analysis. The second trace


    ![](img/8f23875c54d5b3177d5d2a5bba06b37e_264_0.png)


    Figure 15.3 The schematics of the Cole model with the 680 Ω resistor modeling
    the resistance of the extra-cellular fluids, the 2.2 nF capacitor modeling the
    impedance of the cell membranes, and the 1 kΩ resistor modeling the resistance
    of intra-cellular fluids. The dashed resistor limits the current through the “body.”'
