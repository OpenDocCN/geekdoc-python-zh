    \ NodeMCU or the browser?\n2. Add a 10s sampling time to the SELECT menu.\n3.\
    \ Add a 100 ms sampling time to the SELECT menu. Note that you need to use `SampleSlow.attach_ms()`\
    \ on the NodeMCU to handle times shorter than a second.\n4. Add a button to the\
    \ webpage that turns a pin on the NodeMCU on and off.\n5. Display the state of\
    \ an input pin on the NodeMCU in a separate status line."
- md: "## Example: Weather Station with Distributed Sensors\n\nOur first project is\
    \ a weather station that measures barometric pressure, humidity, temperature,\
    \ and air quality at a number of locations inside and outside a building. We use\
    \ rrdtool to prepare plots of the measurements over periods of 4 hours, 2 days,\
    \ a week, and a month. Moreover, we prepare database files to enable integration\
    \ into an EPICS control system. We select the NodeMCUs as microcontrollers for\
    \ the sensor nodes because they are very easy to program, and flexible that they\
    \ may be deployed all over the place without having to pull wires. Later in this\
    \ chapter, we briefly show how to replace the NodeMCU by its smaller brethren,\
    \ the ESP-01, which requires a little extra attention. Note that in either case\
    \ we only show how to connect a single sensor node, but multiple copies only differ\
    \ by their IP number. We can duplicate any interfacing software by simply changing\
    \ the IP numbers appropriately.\n\nWe choose the BME680, already discussed in\
    \ Section 4.4.3, to measure the barometric pressure, humidity, temperature, and\
    \ air quality. Figure 9.1 shows the project assembled on a breadboard with NodeMCU\
    \ to the right of the BME680. The only connections are the power rails for ground\
    \ and 3.3 V, as well as two I2C lines for clock and data. The former connects\
    \ pin D1 on the NodeMCU to SCK on the sensor where as the latter connects pin\
    \ D2 to SDI. We also added a 100 nF decoupling capacitor to the power rails.\n\
    \nThe program running on the microcontroller follows the template we used earlier.\
    \ After defining the network credentials and including libraries for WiFi and\
    \ the sensor, we define the WiFiServer server listening on port 1137 and the bme\
    \ object, which allows us to communicate with the sensor. In the setup() function\
    \ we first open the Serial line and configure the WiFi to use a static IP address.\
    \ This is advantageous if we always want to find the weathernode at the same address\
    \ rather than depending on the DHCP server on the Raspi to always assign the same.\
    \ Then we establish the WLAN connection and then start the server, just as in\
    \ Section 4.6.3. At the end of the setup() function, we ensure that the sensor\
    \ is actually present before initializing it.\n\n```\n// Weathernode-BME680, V.\
    \ Ziemann, 221028\nconst char* ssid     = \"messnetz\";\nconst char* password\
    \ = \"zxcvZXCV\";\nconst int port=1137;\n#include <ESP8266WiFi.h>\nWiFiServer\
    \ server(port);\n#include <Adafruit_BME680.h>\nAdafruit_BME680 bme;\n```\n\n184\
    \ ■ A Hands-On Course in Sensors Using the Arduino and Raspberry Pi, Second Edition\n\
    \n![](img/8f23875c54d5b3177d5d2a5bba06b37e_202_0.png)\n\nFigure 9.1 The weathernode\
    \ circuit with the NodeMCU on the right and the BME680 sensor on the left†.\n\n\
    ```\nchar status[30] = \"OK\";\nvoid setup() {  //....................................................setup\n\
    \  Serial.begin(115200); delay(1000);\n  IPAddress ip(192, 168, 20, 56);     \
    \  // define static IP\n  IPAddress gw(192, 168, 20, 1);        // gateway\n \
    \ IPAddress subnet(255, 255, 255, 0);   // netmask\n  WiFi.config(ip,gw,subnet);\
    \            // configure static IP\n  WiFi.begin(ssid,password);\n  while (WiFi.status()\
    \ != WL_CONNECTED) {delay(500); Serial.print(\".\");}\n  Serial.print(\"\\nConnected\
    \ to \");  Serial.print(ssid);\n  Serial.print(\" with IP address: \"); Serial.println(WiFi.localIP());\n\
    \  server.begin();\n  // Wire.begin(0,2);  // for ESP-01 only\n  if (!bme.begin())\
    \ {  // default address\n    strcpy(status,\"Error: BME680 not found\");\n   \
    \ Serial.println(status);\n  }\n  bme.setTemperatureOversampling(BME680_OS_8X);\
    \ // configure BME680\n  bme.setHumidityOversampling(BME680_OS_2X);\n  bme.setPressureOversampling(BME680_OS_4X);\n\
    \  bme.setIIRFilterSize(BME680_FILTER_SIZE_3);\n  bme.setGasHeater(320, 150);\
    \ // 320*C for 150 ms\n}\nvoid loop() { //....................................................loop\n\
    \  char line[30];\n  WiFiClient client = server.available();\n```\n\n```\nwhile\
    \ (client) {\n  while(!client.available()) {\n    delay(5);\n    if (!client.connected())\
    \ {client.stop(); break;}\n  }\n  if (!client.connected()) {client.stop(); break;}\n\
    \  client.readStringUntil('\\n').toCharArray(line,30);\n  bme.performReading();\n\
    \  float T=bme.temperature;           // Celsius\n  float P=bme.pressure/100.0;\
    \        // hPa=mbar\n  float H=bme.humidity;              // percent\n  float\
    \ VOC=bme.gas_resistance/1000.0;  // kOhm\n  if (strstr(line,\"V?\")==line) {\n\
    \    client.print(\"WeatherNode-BME680, Status \");\n    client.println(status);\n\
    \  } else if (strstr(line,\"T?\")==line) {\n    client.print(\"T \"); client.println(T,2);\n\
    \  } else if (strstr(line,\"P?\")==line) {\n    client.print(\"P \"); client.println(P,2);\n\
    \  } else if (strstr(line,\"H?\")==line) {\n    client.print(\"H \"); client.println(H,2);\n\
    \  } else if (strstr(line,\"VOC?\")==line) {\n    client.print(\"VOC \"); client.println(VOC,2);\n\
    \  } else if (strstr(line,\"ALL?\")==line) {\n    sprintf(line,\"%.2f:%.2f:%.1f:%.2f\"\
    ,T,P,H,VOC);\n    client.print(line);  % no println!\n    client.flush(); client.stop();\n\
    \  } else {\n    client.println(\"Unknown command, disconnecting!\");\n    client.flush();\
    \ client.stop();\n  }\n  yield();\n}\n}\n```\n\nIn the loop() function, we first\
    \ wait for a client to connect and then for a request from the client, before\
    \ reading out the sensor and storing the measurement values in variables. The\
    \ previously-used query-response construction follows and is used to decode the\
    \ request for T?, P?, H?, and VOC?. We added an additional request for ALL? that\
    \ returns a all four values suitably formatted for rrdtool, sends the string without\
    \ newline character appended, and closes the socket unconditionally. Likewise,\
    \ any unknown command causes the network connection to be closed. Finally, the\
    \ yield() function permits the microcontroller to do internal bookkeeping.\n\n\
    On the Raspi, we use a cron job to query the microcontroller once every minute\
    \ to read the measurement values and place them into a rrdtool data base. Since\
    \ most of the formatting is already done on the NodeMCU, the following command\n\
    \n```\necho \"ALL?\" | netcat -C 192.168.20.56 1137\n```\n\nreturns a colon-separated\
    \ string, such as 26.55:1003.02:45.1:24.51 with the four measurement values for\
    \ temperature, pressure, humidity, and air quality. Note that we use the built-in\
    \ echo command to pipe the string ALL? to the netcat program that we had earlier\
    \ used to directly communicate with network sockets.\n\nThe following shell script\
    \ uses this construction with `echo` and `netcat` to store the colon-separated\
    \ string into the shell variable TEMP that is used to feed the measurement values\
    \ into the rrdtool database.\n\n```\n#!/bin/bash\n# fill_weather_db.sh\nDB=/home/pi/rrdtool/weather.rrd\n\
    TEMP=$(echo \"ALL?\" | netcat -C 192.168.20.56 1137)\n/usr/bin/rrdtool update\
    \ $DB N:$TEMP\n```\n\nAfter saving the script we need to make it executable with\
    \ the command `chmod +x fill_weather_db.sh`. But before we start to fill the database\
    \ with the `rrdtool update` command, we must create it, where we assume the following\
    \ command is executed in the `/home/pi/rrdtool` directory.\n\n```\nrrdtool create\
    \ weather.rrd --step 60 \\\n    DS:T:GAUGE:180:-20:100 \\\n    DS:P:GAUGE:180:900:1100\
    \ \\\n    DS:H:GAUGE:180:0:100 \\\n    DS:VOC:GAUGE:180:0:1000 \\\n    RRA:AVERAGE:0.5:1:2880\
    \ \\\n    RRA:AVERAGE:0.5:10:2880 \\\n    RRA:AVERAGE:0.5:60:2880\n```\n\nIt creates\
    \ the `weather.rrd` database file that expects values once every 60 seconds, and\
    \ contains four measurement columns (DS) for the temperature, pressure, humidity,\
    \ and air quality. Then it defines the archive (RRA), which is filled by single\
    \ averages for 2880 samples, which amounts to 2 days. The next two lines define\
    \ averages over 10 samples or 10 minutes, for a total of 2880 samples or 20 days,\
    \ and finally, hourly averages over 60 samples for 120 days. In order to automatically\
    \ fill the database, we start the crontab editor with `crontab -e` and add the\
    \ line\n\n```\n* * * * * /home/pi/rrdtool/fill_weather_db.sh\n```\n\nto the end\
    \ of the file, which causes the script to be executed once a minute and store\
    \ the values in the `weather.rrd` database.\n\nNow we just have to wait until\
    \ some measurements make it into the database, and then create graphs in the same\
    \ way we did in Section 5.6.3 using the `rrdtool graph` command. The command to\
    \ create one set of graphs for temperature, pressure, and humidity called `weathergraph.sh`,\
    \ is the following:\n\n```\n#!/bin/bash\nS=$1\nDB=/home/pi/rrdtool/weather.rrd\n\
    PICDIR=/home/pi/public_html/weather\n/usr/bin/rrdtool graph $PICDIR/temperature${S}.png\
    \ -s $S \\\n    -w 800 -h 200 \\\n    -t \"Temperature\" -v \"T [C]\" -l 16 -u\
    \ 32 -r \\\n    DEF:t0=$DB:T:AVERAGE LINE1:t0#FF0000:\"Temperature\";\n/usr/bin/rrdtool\
