  md: '# CHAPTER 13


    # Example: Data Acquisition System


    In this example we control both digital and analog signals produced and measured
    with an ESP32 microcontroller from a browser using websockets, a system similar
    to the temperature server in Chapter 8. We will control the digital output pin
    DO18, either to set its value or to automatically toggle it at a selectable repetition
    rate. We will also either set the DAC on pin 25 to a specified value or repeatedly
    ramp it between the minimum and maximum voltage to produce a simple sawtooth signal
    with selectable rate. In order to measure voltages, we read input pin DI21 and
    the two ADC channels on pins 32 and 33 at a selectable rate up to 200 samples
    per second. This provides the functionality of an, albeit slow, logic analyzer
    for the digital and oscilloscope for the analog channels.


    Figure 13.1 illustrates the user interface running in a browser window. The top
    row shows buttons to start and stop the acquisition, to select the time between
    samples and to clear the display. The color of the text field below shows the
    state of input pin DI21 – red for off and green for on. The checkbox turns output
    pin DO18 on or off and the selection menu on the right toggles DO18 at a selectable
    rate. The slider labeled DAC25 sets the output voltage of the DAC while the selection
    menu to its right selects a sawtooth signal with different rates. The two bars
    labeled ADC32 and ADC33 show the input voltage on the two ADCs. The graph window
    displays the corresponding traces, ADC32 in red and ADC33 in blue. When saving
    the image shown in Figure 13.1, the sawtooth-generating DAC25 output was connected
    to ADC32. About halfway through the acquisition, pin DO18 was turned on to toggle
    once per second. It was directly connected to ADC33 such that the second trace
    shows a toggling voltage. The first status line below the display shows information
    generated on the browser, and the second line shows information received from
    the ESP32.


    Now, let us turn to the code that brings the ESP32 to life. As in Chapter 8 we
    start with the credentials to connect to the WLAN and include support for WiFi,
    webserver, websockets, JSON, and the SPIFFS filesystem. Note that the latter has
    a different name from the one used earlier on the NodeMCU. Then we define the
    webserver to listen on port 80 and the websockets on port 81. The ticker is used
    to generate the repetitive actions for sampling the input pins and for controlling
    the output pins. After defining a number variables we define a several functions
    that are called by the tickers, here `sampleslow_action()` reads the input pins,
    stores their values in the array `samples`, and signals the availability of new
    data by setting the `output_ready` flag. The function `ramp25_action()` increments
    the 8-bit variable `dac25` and writes it to DAC25. We do not need to worry about
    values above 255, because the higher bits are automatically truncated. The function
    `pulse18_action()` simply toggles DO18.'
