    ## APPENDIX A


    ### Basic Circuit Theory


    As a reminder, we will briefly review the basic theory of electronic circuits.
    We start by considering *Ohm''s law*, which states that the current $I$ in a segment
    of a circuit is proportional to the voltage $U$ with the resistance $R$ as the
    proportionality constant, or $U = IR$. This is a consequence of the balance of
    the electric field accelerating electrons in the *resistor* and the friction force
    experienced by electrons due to scattering with vibration modes, phonons, of the
    ions that make up the material. The force pulling on the electrons is proportional
    to $U$ and the friction force is proportional to the electron''s drift velocity
    $v$, or by $-\alpha v$ where $\alpha$ is a material-dependent friction coefficient.
    Under stationary conditions, the two forces need to balance, and we have $v =
    U/\alpha$. But the current $I$ is proportional to the drift velocity $v$ and we
    find $I \propto v = U/\alpha$, which is the essence of Ohm''s law, and the friction
    coefficient $\alpha$ is proportional to the resistance $R$. In case the voltage
    is varying moderately slowly compared to the relaxation time of the electrons,
    the current directly follows the applied voltage; the current $I$ and the voltage
    $U$ are in phase.


    For *capacitors* the situation is different, because the two plates of a capacitor
    are electrically separated and do not allow constant transport of charges under
    stationary conditions. They can, however, store a charge $Q$ on the plates, and
    the capacitance $C$ is the proportionality constant between $Q$ and the applied
    voltage $U$, given by $Q = CU$. Since the charge $Q$ changes as a consequence
    of current $I$ flowing onto the plates, we have $U = (1/C) \int^t I dt''$, or
    by differentiation, $dU/dt = (1/C)I$. A sinusoidally oscillating voltage $U \propto
    e^{i\omega t}$ with frequency $\omega$ will therefore be related to the current
    by $U = (1/i\omega C)I$, and we can identify $Z_C = 1/i\omega C$ as the generalized
    resistance, the *impedance*, of the capacitor. Here $i$ is the imaginary unit.


    *Inductors* are made of coils that store energy in their magnetic field, and if
    we turn off the current, a voltage develops. Expressing this behavior in a formal
    way, we have $U \propto dI/dt$, with the inductance $L$ of the coil as the proportionality
    constant. If we again assume that the coil is excited by a sinusoidal current
    $I \propto e^{i\omega t}$ with frequency $\omega$, we find that we have $U = (i\omega
    L)I$ and identify $Z_L = i\omega L$ as the impedance of the inductor.


    Now that we have resistances and impedances of common elements found in simple
    circuits, we may ask how to combine them to networks. This question is answered
    by *Kirchhoff''s laws*, of which the first states that under stationary conditions,
    all currents flowing into a network node must add up to zero. This is a statement
    about the preservation of charges, and what comes in must also come out, because
    under stationary conditions piling up charges is not allowed. The second law states
    that the voltage differences around a loop in the network have to add up to zero,
    which is the requirement that the voltages at each node of the network with respect
    to a reference node are unique.


    We immediately use these laws to investigate the resistance or impedances connected
    in series, as shown on the left in Figure A.1. The currents in node B need to
    balance, and this implies that the current $I_1$ passing through $Z_1$ is the
    same as the current $I_2 = I_1$ passing through $Z_2$. At the same time, the voltage
    $U$ provided by the battery is the same that is dropped across the two impedances.
    We thus find $U = I_1Z_1 + I_2Z_2 = I_1(Z_1 + Z_2)$, and we find that the total
    impedance of the circuit equals the sum of the impedances coupled in series.


    ![Figure A.1 Two impedances connected in series (left) and in parallel (right).](img/8f23875c54d5b3177d5d2a5bba06b37e_300_0.png)


    Considering the circuit on the right in Figure A.1, we know that the currents
    through the two branches have to add up: $I_t = U/Z_t = I_1 + I_2 = U/Z_1 + U/Z_2$.
    We can simplify this to $1/Z_t = 1/Z_1 + 1/Z_2$, which implies that the individual
    impedances add as reciprocals if the impedances are coupled in parallel.


    Note that the argument in the previous two paragraphs is valid for normal resistors
    and constant (DC) voltages and currents, but works as well for AC voltages if
    we use the complex frequency-dependent impedances for inductors and capacitances.
    We also note that all relations among currents and voltages are *linear*, such
    that we can use the super-position principle and analyze circuits for each voltage
    or current source independently and then add the contributions in the end.


    Apart from the linear circuit elements, the impedances, there are also nonlinear
    elements, and *diodes* are among them. Their voltage-current behavior follows
    an exponential dependence given by $I \propto \left(e^{(eU-E_g)/kT} - 1\right)$,
    where $E_g \approx 1.2\,V$ is the bandgap energy of the semiconductor material,
    here silicon. We see that for negative voltages the current is very small, while
    for positive currents it grows exponentially once the threshold of the bandgap
    voltage is passed. Practically, diodes conduct current in one direction and block
    current in the opposite direction. This makes them perfect to rectify voltages
    in the way we discussed in [Section 2.2.5](https://example.com). A diode is conducting
    if it is forward biased and the cathode is at a more negative voltage than the
    anode.


    *Transistors* are other nonlinear elements based on two diodes coupled antiparallel;
    they come in two types, dependent on whether the central tap, called the base
    terminal, is an anode or a cathode. Injecting an additional current into the base
    terminal enables a larger current flow through the two outer terminals, called
    collector and emitter. In the main body of the text we use transistors for switching
    applications, but with suitable ancillary circuitry they can be used as amplifiers
    as well. That goes beyond the scope of this appendix and is covered in books on
    electrical engineering, such as [17].'
