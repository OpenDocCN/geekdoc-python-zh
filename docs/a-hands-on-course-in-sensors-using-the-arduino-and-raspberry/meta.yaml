    \nSo far we have a number of methods to control the amplitude and timing of voltages,\
    \ switches, and motors. Now we will wrap up this section by discussing a few means\
    \ to attract the attention of a user, which is useful in case of malfunction or\
    \ another event that requires human intervention.\n\n## 4.5.7 Human attention\
    \ actuators\n\nNeoPixel strips are a bit like LED on steroids. Units of a red,\
    \ a green, and a blue LED, together with a WS2811 controller, are assembled in\
    \ strips of eight or more individually addressable such units. Before using them,\
    \ we need to install the Adafruit_NeoPixel library from the Library manager in\
    \ the Tools menu. This library provides functions to set the intensity of all\
    \ individual LEDs. We illustrate its use by displaying the temperature, measured\
    \ with a DS18b20 as shown in Figure 4.11 and again in Figure 4.24 between 21 and\
    \ 28 degrees on an eight-unit NeoPixel strip. The DS18b20 is connected to 5 V\
    \ and ground on the UNO and is read out via pin D2. Likewise, the NeoPixel strip\
    \ is connected to the power rails and is controlled via pin D6. Since the strip\
    \ can suddenly draw large currents, we add capacitor with a few μF to the power\
    \ rails. The following sketch is based on the example from page 85; it only adds\
    \ code to initialize and use the NeoPixels. First we specify the number of pixels\
    \ and the pin the strip is connected to before creating an object pixel with standard\
    \ parameters. In the setup() function we only need to call pixels.begin() to initialize\
    \ the interface. In the loop() function, we first measure the temperature and\
    \ convert the real value to the temperature above 20 degrees, the integer imax."
