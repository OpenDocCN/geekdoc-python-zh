    # 2.3.5 RS-232 devices


    Several devices report their measurement values by sending them via the asynchronous
    RS-232 protocol. Originally, the physical medium for the communication channel
    used a current loop, but nowadays most sensors operate on 3.3 or 5 V levels. The
    communication happens point-to-point between two partners who have agreed on a
    communication speed, which is often 9600 baud or 115200 baud. Three wires are
    required at the minimum, one for ground potential, one, labeled TX for transmitting
    from device A to device B, and another one, labeled RX, for transmitting in the
    reverse direction. To establish communication, cables connect the TX pin on one
    device to RX on the other and vice-versa. Naturally, ground pins need to be connected
    as well.


    One device that supports RS-232 communication is the LV-EZx distance sensor we
    discussed earlier. It can be configured to send the distance measured as an ASCII
    string that can be read in a terminal program. Even the TFmini distance sensor,
    shown in Figure 2.41 reports the measured distance via RS-232. It emits a modulated
    infra-red light pulse through one lens, records it through a second lens, and
    determines the phase shift of a reflected signal with respect to the emitted signal.
    From this it determines the time-of-flight to the nearest obstacle in the line
    of sight.


    Sensors that query the *global positioning system* (GPS) use a small patch antenna
    on the sensor to pick up signals from a number of satellites placed in geostationary
    orbits, which broadcast their position and timing information with high precision.
    On-board electronics that normally comprise a microcontroller use triangulation
    in order to determine the position of the sensor with high accuracy and convert
    that information to an ASCII string containing the position in a standardized
    format, called *NMEA*. The string is written, typically once per second, to an
    RS-232 serial line, where it is straightforward to read and decode.


    # 2.3.6 Other sensors


    Apart from the standardized protocols, there exist a number of communication standards
    that device vendors come up with. Examples of such devices are the *relative humidity
    sensor*, DHT22, and the DHT11; the latter is shown on the right in Figure 2.42.
    In order to determine the relative humidity, the temperature must be known and
    it is determined with a thermistor. To measure the humidity they use a capacitive
    humidity sensor. The operational principle is based on using a small capacitor
    with an exposed dielectric that has a large affinity to attract water, which changes
    the relative dielectric constant εr and the'
