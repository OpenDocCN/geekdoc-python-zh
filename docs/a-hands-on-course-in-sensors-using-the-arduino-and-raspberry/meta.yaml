    by entering `caget raspi:message`, which displays the message from the `simple2.db`
    file. We change it with `caput raspi:message Blabla`, and the next `caget raspi:message`
    should display Blabla instead. Figure 6.1 shows these transactions. When reading
    a process variable with `caget`, we can suppress the echo of the variable name
    by using the `-t` (for terse) option and use `caget -t` instead. A companion program
    to `caget` is `camonitor`, which monitors one or several process variables and
    reports whenever one of them changes its value. We use it immediately to verify
    that the `raspi:random` process variable indeed produces a new random number once
    every second, by entering `camonitor raspi:random`. The last three records define
    process variables that are linked in such a way that the third `raspi:C` calculates
    the sum of the other two process variables. We test this functionality by using
    `caput` to enter the values 17 and 4 to `raspi:A` and `raspi:B`, respectively.
    Subsequently reading `raspi:C` will report 21. In passing we mention that a second
    computer on the same network, either a second Raspi or a desktop computer that
    has the EPICS base package installed, can access all process variables served
    by the first Raspi.


