    other) to the host computer, and that is the mode in which we will use the UNO
    later on. In passing, we mention that there is a large selection of Arduino boards,
    from those with a smaller footprint, the *Micro* and the *Nano* over the *Mega*
    with its large number of IO pins to the *MKR*, *RP2040*, and *Portenta* boards
    with more powerful CPUs and built-in wireless interfaces.


    In the next section, however, we address a separate group of microcontrollers,
    the ESP8266 and the ESP32.


    # 4.1.2 ESP8266, NodeMCU, and ESP32


    The ESP8266 was released by the Chinese company Espressif in 2014 followed by
    the ESP32 in 2016. These controllers quickly became one of the most exciting platforms
    for Internet of Things (IoT) projects because they have built-in and ready-to-use
    WiFi support, including a small patch antenna. The software development kit (SDK)
    from Espressif was soon integrated into the Arduino IDE, and today the ESP8266
    and ESP32 can be programmed using the Arduino ecosystem as easily as the original
    Arduinos.


    But let us now look at the ESP8266 hardware, which comes in different incarnations.
    We will not only focus on the more elaborate NodeMCU board but also mention the
    basic ESP-01 in this section. Images of the ESP-01 and NodeMCU hardware are shown
    at the left and center of Figure 4.2, respectively. The microcontroller on both
    chips is essentially the same, only the number of internal pins that are routed
    to pins on the circuit boards is different. Internally, the ESP8266 chips feature
    32-bit RISC CPUs that normally operate at 80 MHz or 160 MHz, and have 64 kB of
    RAM for instructions and 96 kB for data. There are 16 general-purpose IO (GPIO)
    pins that can be configured as input or output pin, as well as a single analog
    input with a 10-bit ADC. The controller supports I2C and SPI communication as
    well as RS-232. All this is similar to the Arduino, except it runs faster, and
    the internal registers are wider (32 instead of 8 bit in the ATmegas), but the
    really cool feature is the built-in WiFi support. It fulfills the specifications
    for IEEE 802.11 b/g/n with WPA authentication, which is what most wireless networks
    use today. So basically, we are able to connect an ESP8266 to any wireless network.'
