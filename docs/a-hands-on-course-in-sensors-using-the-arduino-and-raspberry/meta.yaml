    git clone https://github.com/epics-modules/asyn.git\n```\n\n这里我们使用 `git` 创建子目录\
    \ `/usr/local/epics/modules/asyn`，并将 asyn 包的所有文件从仓库复制到其中。在撰写本文时，版本 4-43 是最新的。在编译该包之前，我们需要编辑\
