- md: "void AD5933_sweep(float freq, float finc, int npts, byte mode,\n          \
    \         byte pga, int16_t *Ival, int16_t *Qval) {\n  AD5933_config(freq,finc,npts,mode,pga);\n\
    \  AD5933_standby();      // Standby\n  AD5933_init();         // Init\n  delay(200);\
    \            // Initial settle time\n  AD5933_command(0x20);  // Start sweep\n\
    \  int ic=0;\n  while (!sweep_done()) {\n    while (!valid_data()) {delay(10);}\
    \  // wait for data ready\n    int16_t Itmp=(I2Cread(AD5933,0x94) << 8) | I2Cread(AD5933,0x95);\n\
    \    int16_t Qtmp=(I2Cread(AD5933,0x96) << 8) | I2Cread(AD5933,0x97);\n    if\
    \ (Ival==NULL) {\n      float mag=sqrt((float)Itmp*(float)Itmp+(float)Qtmp*(float)Qtmp);\n\
    \      Serial.print(Itmp); Serial.print(\"\\t\"); Serial.print(Qtmp);\n      Serial.print(\"\
    \\t\"); Serial.println(mag);\n    } else {\n      Ival[ic]=Itmp; Qval[ic]=Qtmp;\
    \ ic++;\n    }\n    AD5933_increment();   // increment frequency\n  }\n}\n\nThe\
    \ function AD5933_sweep() performs the frequency sweep by following the sequence\
    \ laid out in the datasheet and as long as the sweep is not completed. It checks\
    \ the status bit whether a measurement is done, at which point the registers with\
    \ the values for I and Q are read out and either written to the serial line or\
    \ copied to the arrays IVAL[] and Qval[] before incrementing the frequency. Note\
    \ that Itmp, Qtmp, Ival[] and Qval[] must be specified as int16_t in order to\
    \ treat the sign bit correctly.\n\nInside AD5933.h we use the functions I2Cwrite()\
    \ and I2Cread() from I2Crw.h on page 74 in Section 4.4.3. Both I2Crw.h and AD5933.h\
    \ must reside in the same subdirectory as the sketch shown below. The setup()\
    \ function only initializes serial and I2C communication. The loop() function\
    \ follows the well-proven scheme of reacting to commands received via the serial\
    \ line. The command SWEEP starts a sweep with the current parameters whereas OUTON\
    \ produces a constant-frequency output and OUTOFF turns it off. All parameters\
    \ can be changed with the commands FREQ, FINC, NPTS, MODE, and PGA, followed by\
    \ a numerical value. Finally, STATE? returns the values of the current parameters.\n\
    \n```\n// AD5933Serial, V. Ziemann, 221118\n#include <Wire.h>\n#include \"I2Crw.h\"\
    \n#include \"AD5933.h\"\nvoid setup() {\n  Serial.begin(115200); delay(1000);\n\
    \  Wire.begin();\n}\nvoid loop() {\n  char line[30];\n  if (Serial.available())\
    \ {\n    Serial.readStringUntil('\\n').toCharArray(line,30);\n    if (strstr(line,\"\
    SWEEP\")) {\n      AD5933_sweep(freq,finc,npts,mode,pga);\n    } else if (strstr(line,\"\
    OUTON\")) {\n      AD5933_config(freq,finc,npts,mode,pga);\n      AD5933_standby();\n\
    \      AD5933_init();\n    } else if (strstr(line,\"OUTOFF\")) {\n      AD5933_power_down();\n\
    \    } else if (strstr(line,\"FREQ \")) {freq=atof(&line[5]);\n    } else if (strstr(line,\"\
    FINC \")) {finc=atof(&line[5]);\n    } else if (strstr(line,\"NPTS \")) {npts=atoi(&line[5]);\n\
    \    } else if (strstr(line,\"MODE \")) {mode=atoi(&line[5]);\n    } else if (strstr(line,\"\
    PGA \")) {pga=atoi(&line[4]);\n    } else if (strstr(line,\"STATE?\")) {\n   \
    \   char msg[80];\n      sprintf(msg,\"STATE %ld %ld %d %d %d\",\n           \
    \   (long)freq,(long)finc,npts,mode,pga);\n      Serial.println(msg);\n    }\n\
    \  }\n}\n```\n\nThis sketch now allows us to control the AD5933 via the serial\
    \ line for which we use octave. The following script opens the serial port s and\
    \ uses write() to write the desired parameters to the AD5933 before verifying\
    \ that they are properly set with STATE?. We then parse the reply to place the\
    \ values into the array p. Then we start the SWEEP, wait a little while to ensure\
    \ that some data has arrived, before checking its presence with f=fread(s) and\
    \ concatenating any arriving data in the string reply. If no more data arrives,\
    \ we close the serial line and reformat the text string reply into the array data\
    \ that has three columns with I, Q, and the magnitude for each of the frequency\
    \ points.\n\n```\n% AD5933nwa.m, V. Ziemann, 221202\nclear all; close all;\nwaiting_factor=1;\
    \    % increase for very low frequencies\ns=serialport(\"/dev/ttyUSB0\",115200)\
    \  % open serial line\npause(3); flush(s)\nwrite(s,\"MODE 3\\n\");\nwrite(s,\"\
    PGA 1\\n\");\nwrite(s,\"FREQ 10e3\\n\");\nwrite(s,\"FINC 300\\n\");\nwrite(s,\"\
    NPTS 200\\n\");\nwrite(s,\"STATE?\\n\"); reply=serialReadline(s)\np=sscanf(reply,\"\
    STATE %d %d %d %d %d\")\nwrite(s,\"SWEEP\\n\");\npause(2*waiting_factor);\nreply=\"\
    \";\nwhile length((r=fread(s))) != 0\n    reply=strcat(reply,char(r));\n    pause(0.5*waiting_factor);\n\
    endwhile\nclear s   % close serial line\n[a,count] = sscanf(reply,\"%g\");\ndata=reshape(a,[3,count/3])';\
    \    % I,Q,mag\n```\n\nNote that the raw measured data are returned in units of\
    \ ADC counts. In order to obtain the impedance in Ohms and the phase in degrees,\
    \ we need to calibrate the device for each chosen set of parameters with a known\
    \ resistor $\\hat{R}$ as DUT. For this purpose we typically chose $\\hat{R}$ to\
    \ be equal to the feedback resistor (1 k$\\Omega$ in Figure 12.3) and fit a second-order\
