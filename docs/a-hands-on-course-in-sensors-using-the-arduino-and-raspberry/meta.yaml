    }\nvoid loop() {\n  if (digitalRead(2)==LOW) {\n    digitalWrite(13,HIGH);\n \
    \ } else {\n    digitalWrite(13,LOW);\n  }\n  delay(10);\n}\n```\n\nThe program\
    \ follows the normal scheme of initializing the hardware in the **setup()** function.\
    \ We first declare that pin 2 is an input pin, and we enable the internal pull-up\
    \ resistor that causes a well-defined “high” state on the pin if no button is\
    \ pressed. Pin 13 with the LED is declared as output, so we can turn it on and\
    \ off from within the sketch. In the **loop()** function, we check the state of\
    \ the button by calling the **digitalRead(Pin)** function, and test whether pin\
    \ 2 is LOW. If this is the case (note the double equal sign == in the comparison),\
    \ the LED on pin 13 is turned on by calling **digitalWrite(13,HIGH)**. If pin\
    \ 2 is found not to be LOW, the LED on pin 13 is tuned off with **digitalWrite(13,LOW);**.\
    \ Note the braces { and } and their use to define blocks of code in the **if (..)\
    \ { } else { }** construction. After the **if** statement, a short **delay()**\
    \ ensures that mechanical button bounces are ignored and that the processor has\
    \ a little time for its internal affairs. This is not absolutely necessary, but\
    \ good style.\n\nSensing the state of switches that indicate open doors or windows\
    \ follows exactly the same scheme, and we can sense up to 13 different switches\
    \ (if we do not use the LED on pin 13) and react in some manner."
