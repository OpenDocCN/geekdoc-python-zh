    # 5.5.3 Python


    Python [26] in its current version 3 is a modern programming language that is
    installed on any Raspi by default. Actually, the *Pi* in Raspberry Pi stands for
    *Python Interpreter*. Unless you have some experience with Python, I suggest you
    have a look at some of the tutorials at


    https://wiki.python.org/moin/BeginnersGuide/Programmers


    or search the web for detailed explanations of some of the simple, often even
    self-explanatory, commands we use here. The purpose to access an Arduino or NodeMCU
    from Python is to show how to write customized programs on the Raspi that work
    hand-in-hand with sketches that run on the Arduino.


