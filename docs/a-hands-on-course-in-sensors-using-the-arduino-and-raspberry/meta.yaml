  - "[PAGE 279]\n\n```\nSerial.print(\"\\nConnected to \");  Serial.print(ssid);\n\
    Serial.print(\" with IP address: \");\nSerial.println(WiFi.localIP());\nclient.begin(port);\n\
    for (int k=0;k<8;k++) {\n  adccalib[k]=mcp3208_read_adc(k);\n}\ndigitalWrite(LED_BUILTIN,HIGH);\n\
    }\n```\n\nAt the top of the sketch, the WLAN name and passphrase are defined,\
    \ as well as the robot's IP number, which defaults to 192.168.4.1 for the WLAN\
    \ spanned by the robot. Then we include WiFi libraries and declare the client,\
    \ which is the socket that connects to the server. Note that we use a UDP connection\
    \ instead of TCP, because the latter uses extensive handshaking between server\
    \ and client and this makes the response of the robot to remote commands very\
    \ sluggish. UDP connections do not use handshaking, which makes the connection\
    \ less reliable, but much more responsive. Since we continuously send commands\
    \ to the robot, losing a single command is not very serious. Next we declare a\
    \ number of variables that we discuss later, and define the mcp3208_read_adc()\
    \ function to read a single channel from the ADC. It is very similar to the one\
    \ we discussed in Section 4.4.4, except that we request single-ended ADC measurements,\
    \ and we receive 12 data bits instead of 13. The function receives the requested\
