  md: "![](img/8f23875c54d5b3177d5d2a5bba06b37e_273_0.png)\n\nFigure 16.4 The raw\
    \ sensor value as a function of the position of the obstacle and the derived laser\
    \ beam profile, which shows a moderate asymmetry.\n\nIn this example, we use the\
    \ FWHM rather than the standard deviation of the profile, because the FWHM is\
    \ a rather robust measure and works more reliably with profiles that are non-Gaussian,\
    \ asymmetric, and have tails that are moderately populated. The standard deviation\
    \ is heavily biassed by the latter. The script for the FWHM is straightforward\
