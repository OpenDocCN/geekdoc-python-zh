    # 18.3 PRESENTING DATA


    Many aspects of scientific work are presented with the help of figures describing
    the experimental setup, or graphs showing the data, sometimes with comparison
    to a model. In [33] E. Tufte names three guiding principles to achieve graphical
    excellence.


    *Clarity* is the first principle, and it requires carefully explaining the experiment
    from which the data originate, describing what quantities are plotted on a graph,
    and properly labeling the axes. Moreover, using a legible font of adequate font-size
    and avoiding low-contrast colors such as yellow or light green on white background,
    is mandatory.


    *Precision*, the second principle, dictates presenting data honestly and truthfully.
    If data points are excluded, the reason and method to select the discarded points
    need to be explained. The graphics data of a manuscript must be proofread in the
    same way as the main text. Make sure to catch all errors, such as omitted exponents
    or lost or incorrect axis labels. Choose axes adequately. A bad example is to
    display the average temperature on Earth in Kelvin with zero displayed. Global
    warming is invisible on such a plot.


    *Efficiency*, the third principle, aims at presenting information in a parsimonious
    way: to present the largest possible insight with the least effort. In particular,
    display only data that advance the main argument, but then explain *all* displayed
    features in the plot, either in the caption or in the text. If the plot is part
    of a seminar, the speaker may explain it as well. On the other hand, any unnecessary
    data, which Tufte calls “chart-junk,” should be omitted from a graph. A bad example
    is to present all available measurement data, even though a well-chosen subset
    suffices to make a point.


    In *The Elements of Graphing Data*, W. Cleveland discusses a large number of guidelines
    to produce graphical data, with many examples. He summarizes the guidelines in
    a concise list of “rules” such as


    +   - to make the data the most prominent feature and avoid cluttering the data
    area;

    - to keep the number of tick marks limited and preferably outside the data area;

    - to have compatible scales when comparing two data sets;


    and many more. Consulting the book is highly recommended in case of questions
    about graphing data.


