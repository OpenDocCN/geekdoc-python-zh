  - 17. 构建一个 *旋转木马比较器*，并使用MPU6050测量你在旋转木马上体验到的加速度。使用电池供电的NodeMCU发布一个包含数据的网页。通过测量和显示角速度来增强系统。同时显示过去5分钟内的最大值和最小值。
- - '##'
  - 18. 使用MLX90614红外传感器和NodeMCU构建一个非接触式 *无线温度计*，使测量值可通过网页或基于套接字的服务器获取。
- - '##'
