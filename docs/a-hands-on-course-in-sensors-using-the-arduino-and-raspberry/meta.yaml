    SOCKET1\",\"192.168.20.135:1137\",0,0,0)\ndbLoadRecords(\"db/temperature.db\"\
    ,\"PORT='SOCKET1',USER='node'\")\n```\n\nThe first line defines a symbol SOCKET1\
    \ that points to the port on the NodeMCU, and the second line instructs EPICS\
    \ to use the same database file `temperature.db` as before, and link the communication\
    \ to the PORT corresponding to the one defined in the previous line. Once we add\
    \ the two lines, we need to compile the project again. This we do by issuing `make`\
    \ in the directory `/home/epics/ioc/temp/` and restarting `st.cmd` by executing\
    \ `./iocBoot/ioctemp/st.cmd` from the same directory. The result of this exercise\
    \ is that EPICS now publishes two process variables, `raspi:temp` from before\
    \ and `node:temp` from the NodeMCU connected by WLAN, which we can verify by entering\
    \ the command `dbl` at the `epics>` prompt that `st.cmd` provides.\n\nMost of\
    \ the above actions we only need to do once, and adding additional sensors to\
    \ the EPICS IOC is only moderately complex. It only requires writing the appropriate\
    \ protocol file, say `new.proto` and database file `new.db`, and copying both\
    \ to the `./tempApp/Db` directory. Then we need to add the database file to the\
    \ project by adding `DB += new.db` to the Makefile in the same directory. Finally,\
    \ we need to add `drvAsynXConfigure` to the `st.cmd` file and execute `dbLoadRecords`\
    \ to link the database file to the appropriate PORT. Finally, we compile once\
    \ again and and run the `st.cmd` command.\n\n# 6.5 STARTING THE IOC AT BOOT TIME\n\
    \nIn the description above we need to start the IOC `st.cmd` by hand and keep\
    \ a terminal window with the running program open all the time. To remedy this\
    \ inconvenience, we create a startup script named `epicsioc` that launches the\
    \ IOC when the system boots. The file contains the following lines:\n\n```\n#!/bin/sh\n\
    #/etc/init.d/epicsioc\n### BEGIN INIT INFO\n# Provides:          empicsioc\n#\
    \ Required-Start:    $remote_fs $syslog\n# Required-Stop:     $remote_fs $syslog\n\
    # Default-Start:     2 3 4 5\n# Default-Stop:      0 1 6\n# Short-Description:\
    \ Simple script to start a program at boot\n# Description:       Start and stop\
    \ epicsioc server\n### END INIT INFO\ncase \"$1\" in\n  start)\n    echo \"Starting\
    \ epicsioc\"\n    . /home/pi/.bash_aliases\n    cd /home/pi/epics/ioc/temp/iocBoot/ioctemp\n\
    \    /usr/bin/procServ -n \"IOC\" -L /tmp/epics.log -i ^D^C 20000 ./st.cmd\n```"
  - "[PAGE 181]\n\n```\n;;\nstop)\n    echo \"Stopping epicsioc\"\n    kill $(pidof\
    \ procServ)\n    ;;\nrestart)\n    $0 stop\n    sleep 10\n    $0 start\n    ;;\n\
    *)\n    echo \"Usage: /etc/init.d/epicsioc {start|stop|restart}\"\n    exit 1\n\
    \    ;;\nesac\nexit 0\n```\n\nThe file contains some INIT INFO that is required\
    \ by the init program, which orchestrates the startup of the Raspios operating\
    \ system. In the subsequent case structure, three actions are specified: start,\
    \ stop, and restart. The start option reads the default EPICS environment variables\
    \ and then changes to the subdirectory with the st.cmd program. There it executes\
    \ the procServ program that in turn starts the st.cmd program. The purpose of\
    \ procServ is to redirect the input and output of st.cmd to the network socket\
    \ 20000 to which we can connect via telnet, and interact with the program in the\
    \ same way we did earlier when we started it in a terminal window. The advantage\
    \ of using procServ is that we can close the telnet program while st.cmd keeps\
    \ running independently. The other options give the running process the name IOC,\
    \ write a log file, and ignore the control sequences to close the process. The\
    \ stop case determines the process id of procServ with pidof and terminates the\
    \ process with the kill command. The restart case executes stop first, waits 10\
    \ seconds, and then executes start. The default case, denoted by *), displays\
    \ a brief usage note.\n\nBefore actually running the program, we need to install\
    \ the procServ and telnet packages with the normal installation procedure:\n\n\
    ```\nsudo apt-get install procServ telnet\n```\n\nIn case one of the programs\
    \ is already present in the current system, no new software is installed. Once\
    \ all required programs are installed and the script is written, we copy it, using\
    \ sudo, to the system directory /etc/init.d, where all startup scripts for the\
    \ operating system reside. We make it executable using\n\n```\nsudo chmod 755\
    \ /etc/init.d/epicsioc\n```\n\nand start it by hand in order to verify that the\
    \ script works as intended with the command\n\n```\nsudo systemctl start epicsioc\n\
    ```\n\nand if everything works we can install it permanently by executing\n\n\
    ```\nsudo systemctl enable epicsioc\n```\n\nwhich will automatically start the\
    \ epicsioc service at boot time. Note that we can also stop and disable the service.\
    \ If we want to connect to the now-running-autonomously process st.cmd, we use\
    \ telnet when logged onto the Raspi"
