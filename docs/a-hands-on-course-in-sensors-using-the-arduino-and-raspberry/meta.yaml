    >277.777 kSamples/s</OPTION>\n  <OPTION value=\"-500000\">500 kSamples/s</OPTION>\n\
    \  <OPTION value=\"-1000000\">1 MSamples/s</OPTION>\n</OPTGROUP>\n</SELECT>\n\
    ```\n\nLikewise, we control the sinusoidal frequency generator with an additional\
    \ SELECT menu. Note that sending positive values specify the frequency and negative\
    \ values specify the output scale in steps that are hardcoded into the ESP32.\n\
    \n```\n<SELECT onchange=\"setDacFrequency(this.value);\">\n  <OPTGROUP label=\"\
    DAC frequency\">\n    <OPTION value=\"0\">DAC25 OFF</OPTION>\n    <OPTION value=\"\
    2000\">DAC25=2 kHz</OPTION>\n    <OPTION value=\"5000\">DAC25=5 kHz</OPTION>\n\
