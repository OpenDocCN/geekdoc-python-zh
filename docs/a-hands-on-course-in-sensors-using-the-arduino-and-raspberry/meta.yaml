  md: "request from EPICS in the function `sock.accept()`. This function blocks until\
    \ a request arrives, when it returns a handle `epics` to the new connection and\
    \ the IP number `address` of the connecting computer. Once the connection is established,\
    \ the gateway enters a second loop and waits for a command on the `epics` socket\
    \ that it converts to the string `msg` with the `.decode()` method. If `msg` has\
    \ an invalid format, the connection closes. Otherwise, the received message `msg`\
    \ is split into words, and branches depending on the first word. If, after conversion\
    \ to uppercase, it is `SUBSCRIBE`, the gateway calls the `mqttc.subscribe()` function\
    \ with the topic as argument. If it is `UNSUBSCRIBE` it calls the `mqttc.unsubscribe()`\
    \ function. In all other cases the two words are interpreted as topic and value,\
    \ and published using the `mqttc.publish()` function. If messages with incorrect\
    \ format are received or the calling EPICS computer disconnects, the `epics` socket\
