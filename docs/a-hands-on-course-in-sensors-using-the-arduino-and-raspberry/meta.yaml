    # 主机：树莓派


    树莓派 [11] 是一款小型单板计算机，于2012年首次亮相，旨在为学生和其他有兴趣的人士提供一个廉价的平台，以介绍计算机基础知识，特别是编程。


    ## 5.1 硬件


    自首次亮相以来，树莓派经历了多次硬件修订。图5.1左下角较小的板子是一款拥有512 MB内存且没有以太网端口的Pi Zero。这使其对于我们的目的来说过于受限。相反，我们使用的是最新的化身，即2019年2月推出的4型。它有两种外形尺寸：经典的4B版本（如图5.1右下角所示）和较新的400版本（内置键盘，如图顶部所示）。两者都采用四核ARM中央处理器（CPU），运行速度高达1.8
    GHz，并板载2到8 GB的RAM内存。这种硬件功能足够强大，可以运行完整的Linux系统。一个外部可更换的micro-SDHC卡（至少16 GB，速度等级10）用作硬盘来存储操作系统和用户文件。对于我们的目的，2或4
    GB的RAM就足够了；之前的3B版本也能很好地工作。


    但除了CPU之外，树莓派4B和400还配备了一个视频处理器，可以通过两个内置的micro HDMI连接器显示4k分辨率（最高3840 × 2160）的视频。音频输出可通过HDMI连接器或3.5毫米耳机插孔提供。此外，板载有两个USB-2和两个USB-3端口，用于连接外围设备，如USB闪存盘、键盘、鼠标或网络摄像头。与外界的通信可通过内置的有线以太网端口实现，并且从第3版开始，树莓派内置了蓝牙和WiFi，支持2.4
    GHz频段，4B版本甚至支持5 GHz频段（802.11ac）。


    树莓派因其内置的底层外设而极具吸引力。板上有17个通用输入输出（GPIO）引脚，其中一些支持I2C、SPI和UART（类似RS-232）通信。此外，还提供了一个特定的音频总线（I2S），一个用于连接定制树莓派摄像头的高速CSI接口，以及一个用于连接LCD面板的DSI接口。其中一些功能可用于实现与Arduino相同的功能，但我们在此不会使用，而是将树莓派用作标准化的主机系统。


    ![](img/8f23875c54d5b3177d5d2a5bba06b37e_138_0.png)


    图5.1 树莓派400（顶部）、4B版本（右下角）和Pi Zero版本（左下角）。


    ## 5.2 入门


    CPU和外设足以将树莓派用作媒体中心，通过 *LibreElec* 发行版运行 *KODI* 媒体中心软件，将普通电视变成智能电视。还有 *OpenWRT*
    发行版，可将树莓派变成包含防火墙功能的互联网路由器。其他软件包可将其变成复古游戏机或网络附加存储（NAS）服务器。除了这些特定用途外，我们还可以在SDHC卡上安装通用的Linux操作系统，从中启动树莓派。有不同风格的Linux可用，如Ubuntu、Fedora或OpenSuse，但我们在本书其余部分使用的标准系统基于Debian发行版，称为
    *Raspberry Pi OS* 或 *Raspbios*。多年来，出版了大量书籍，例如[24]，其中包含如何在许多情况下使用树莓派的配方。请使用这些以及其他资料来补充本书的讨论。


    我们可以在 [https://www.raspberrypi.org/software](https://www.raspberrypi.org/software)
    网页上找到Raspberry Pi OS操作系统的下载说明，从那里可以下载适用于所有常见桌面操作系统的 **rpi-imager** 程序。页面上的链接指向一个关于使用该烧录器的简短视频教程。请按照说明操作，并在烧录器下载选定的树莓派操作系统镜像并将其复制到SD卡时保持一点耐心。在大多数情况下，包含所有推荐软件的32位镜像是一个不错的选择，尽管其大小为2.7
    GB，下载量相当大。或者，在Linux系统上，也可以从网页下方的链接手动下载操作系统镜像，使用 **unxz** 程序解压它，然后通过以 **root**
    用户身份发出命令


    ```

    dd bs=4M if=2022-09-22-raspios-bullseye-armhf-full.img of=/dev/sdX

    ```


    将镜像文件复制到SD卡。根据桌面计算机上的Linux发行版，我们可能需要在dd（磁盘复制器）命令前加上 **sudo**。在dd命令中，目标，即输出文件/dev/sdX，必须是SD卡的设备文件。我们可以通过在将SD卡插入读卡器后检查系统日志文件来轻松确定它。在日志文件结束之前，最近插入的卡通常被引用为/dev/sdX，其中X是c或d或e。我们必须确保使用正确的驱动器！选择错误的驱动器可能会擦除桌面系统的硬盘。如果不确定，请仔细遵循安装帮助中的说明，这些说明比此处给出的更详细。一旦dd命令完成（根据SD卡读卡器的不同，可能需要长达30分钟），我们将SD卡插入树莓派的插槽，将显示器连接到HDMI连接器，将鼠标和键盘连接到USB连接器，并通过USB-C连接器接通电源以启动树莓派。


    首次启动时，树莓派会自动扩展SD卡上的操作系统镜像以使用所有可用空间，并生成用于后续加密通信的密钥，然后重新启动。在第二次启动期间，它会询问本地化设置，特别是国家、时区和键盘布局，以及标准用户的用户名。在这里，为了与本书第一版保持一致，我选择用户名pi和一个秘密密码。在后续步骤中，配置WLAN，更新软件，最后重新启动。


    当树莓派再次启动时，我们直接登录到桌面系统，无需输入密码。我们可以通过启动 *Raspberry Pi Configuration* 程序来更改此行为，该程序位于屏幕顶部菜单列表中的树莓图标后面，位于
    *Preferences* 下。在 *System* 选项卡中，我们可以更改登录行为，不过如果树莓派处于安全位置，我通常会保持默认设置。我通常将 *hostname*
    更改为易于记忆的内容，例如 *sensorpi*。在 *Interface* 选项卡中，我建议启用 *ssh*。我们稍后将使用此功能从其他计算机连接到我们的树莓派。


    此时，我们的树莓派上已经运行了一个Raspbios Linux系统，是时候通过选择带有树莓图像的Menu按钮来探索它了。在那里，我们可以找到所有可用的程序，按组分类，例如
    *Programming*，其中包含指向Java、Python和Mathematica的链接。*Office* 组包含指向Libreoffice程序的链接，用于文字处理、电子表格和演示文稿创建。在
    *Internet* 菜单项后面，有指向互联网浏览器和邮件客户端的链接。此外，还有 *Games*、*Accessories* 和 *Preferences*
    的菜单项。后者如图5.2所示，包含指向 *Raspberry Pi Configuration* 和其他配置选项的链接。*Accessory* 菜单包含指向
    *Terminal* 程序的链接，该程序提供了一个用于输入命令的控制台。我们将在后续章节中广泛使用它，但这里有一些基本命令值得了解。当我们打开终端窗口时，我们位于用户pi的主目录中，即/home/pi，我们可以通过输入命令
