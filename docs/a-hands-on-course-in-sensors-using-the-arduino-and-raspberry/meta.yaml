  md: 'In the `fwhm()` function we first locate the minimum and maximum of the data
    points as well as the location of the maximum. Then we search toward the left
    until the value is less than halfway between maximum and minimum. This results
    in the location `ileft` of that point. Then we repeat the process on the right-hand
    side and return the difference of the right and left halfway points as the FWHM.
    The minus one in the last equation accounts for the fact that both searches overshoot
    before terminating the respective `while` loops. This is partially compensated
    by subtracting one from the final result.


    In this example, we built a laser-beam profile monitor from scratch using a small
    stepper motor and an LDR to illustrate the basic steps and how to combine sensors
    and actuators to built an integrated system that is controlled from `octave` or
    any other language that communicates over serial devices, such as EPICS, LabView,
    or C. The system is far from perfect and many limitations and improvements come
    to mind. For example: Is diffraction on the edge of the obstacle a limitation?
    Is the step size adequate or should we use a better, microstepping motor-driver?
    Does the profile change with different laser intensities? Do we need to correct
    for intensity-related nonlinearities of the sensor system? This is actually the
    purpose of the `CALIBRATE` command to provide the base information. Does the profile
    show the same asymmetry when we scan from the other side? We may also want to
    know the vertical beam size and any cross-plane correlations to determine some
    basic aberrations. Is the profile the same after swapping position of LDR and
    10 kΩ resistor? We might want to add a second motor moving the obstacle longitudinally
    in the direction of the laser beam. Adding a lens and measuring the beam profile
    at several places allows us to determine the $M^2$ of the laser beam, which is
    a measure of the laser quality and is unity for a diffraction-limited beam. But
    these exercises we leave for the interested reader to do at home, while we move
    on to build a robot that detects fire.


