    \ function, we initialize I2C communication by calling Wire.begin(), and configure\
    \ the MCP23017. Setting register 0x00 to 0x00 configures all pins of port A (those\
    \ on the right-hand side with the LED attached to pin A7) as output. We do not\
    \ need to do that for port B, because we use the pins in their default configuration\
    \ as input. Next we enable the internal pull-up resistors on all pins of port\
    \ B, and reverse the polarity with which a change is reported. It is convenient\
    \ to invert the state, which normally is low if a button is pressed, to pull the\
    \ input pin low. We prefer, however, to have the state reported as high. Finally\
    \ we write 0xFF to register 0x05, which enables interrupts to be generated whenever\
    \ the state of an input pin of port B changes. This completes the configuration\
    \ of the MCP23017, but we still need to configure the UNO to listen to a change\
    \ of state on its pin 2. This pin is configured as an input pin with pull-up enabled,\
    \ and we attach the function `action()` to be executed if pin 2 changes state\
    \ from high to low; in other words, if it is FALLING. We complete the configuration\
    \ by initializing the serial line. In the `loop()` function, we first handle commands\
