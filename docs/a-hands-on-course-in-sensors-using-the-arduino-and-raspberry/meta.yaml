    a wavelength-selective optical filter, placed just before a phototransistor that
    detects the residual intensity; more CO₂ molecules simply absorb more light and
    reduce the intensity. The sensor, mounted on a small breadboard, is shown on the
    right-hand side in Figure 2.38. A small on-board microcontroller converts the
    intensity to the concentration in parts-per-million (ppm) that is accessible via
    I2C bus at address 0x61. Apart from the concentration, the SCD30 even measures
    the temperature and the humidity, both of which affect CO₂ sensing and are used
    to improve the resolution accuracy.


    The HYT221 and HYT939 are sensors that measure the *relative humidity* in the
    range from 0 to 100 %RH with a resolution of about 0.02 %RH. The operational principle
    of the measurement is based on a capacitor with a dielectric, made of a polymer
    as the sensing medium. The polymer is highly hygroscopic and easily absorbs water,
    which changes the relative dielectric constant ε_r by a large amount, because
    ε_r of the dry material is much smaller than that of water, which is about 80.
    Correspondingly, the capacitance C, being proportional to ε_r, changes by a large
    amount as well. This change of the capacitance is determined in a Wheatstone bridge
    with capacitors in two branches. For the calculation of the relative humidity,
    knowledge of the temperature is required, and provided by a built-in temperature
    sensor. On board, the raw data are compensated for a number of non-linearities,
    post-processed, and made available in registers that are accessible via an I2C
    interface. The I2C address of the sensor is hard-wired to 0x28 and a device is
    shown on the right-hand side in Figure 2.36.


    The HMC5883 is a three-axis magnetic field sensor that is based on the change
    of the resistance due to the *magnetoresistive* effect. The active material is
    a long meandering strip of a nickel-iron alloy on a nonconducting substrate. The
    change of resistance is due to the change of the spin–orbit coupling of valence
    electrons in the material. This affects the ease with which the conduction electrons
    propagate through the material and consequently the resistance. The active material
    is part of a Wheatstone bridge whose output voltage is conditioned and amplified
    before being digitized with an on-board ADC and made available on the I2C bus.
    The HMC5883L measures the field along three axes with a 12-bit (4192 steps) resolution
    in the range of ±8 gauss or ±800 μT. It is typically used in compass applications
    for mobile phones. The noise floor of the measurements is on the order of 0.2
    μT and up to 160 measurements/s can be taken.


