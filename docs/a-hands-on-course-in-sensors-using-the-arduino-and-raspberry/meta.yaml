    首先导入支持 MySQL 的库，然后我们连接到计算机 localhost 上的数据库 readA0，用户为 me，密码为 pwpw。MySQLdb.connect()
    函数返回一个数据库句柄 db，执行该函数相当于登录数据库并在 mysql 提示符下执行 `use readA0;` 命令。下一行创建一个游标 cur，它等同于
