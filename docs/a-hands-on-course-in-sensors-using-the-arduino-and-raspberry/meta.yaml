    junction. It is created by doping semiconductor material, often silicon based,
    with a material that has either five valence electrons, in which case it becomes
    *n*-doped, or three valence electrons, in which case it becomes *p*-doped. Pin
    diodes, however, have an additional layer of un-doped, intrinsically (‘*i*’) conducting
    silicon in order to increase the target area for the photons to produce additional
    charge carriers. One operational mode of the pin diode, called photoconductive,
    is illustrated on the left-hand side of Figure 2.13, which shows a simplified
    energy-band diagram of a reverse-biased diode. Note that by convention, the upwards
    energy axis corresponds to the potential energy of *electrons* that is lowest
    at the most positive voltage and that is found on the left-hand side. In the figure
    the cathode (*n* side) is therefore at higher voltage than the anode (*p* side)
    and results in all charge carriers being pulled out of the intermediate zone;
    electrons to the left and holes to the right. This results in the diode blocking
    any current flow. The extra layer of un-doped silicon provides extra potential
    charge carriers that act as targets for photons, having energy higher than the
    band-gap. These photons create electron–hole pairs by lifting electrons from the
    valence


