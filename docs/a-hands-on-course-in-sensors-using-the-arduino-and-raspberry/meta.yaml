    \n电机1连接到L293D H桥电机驱动器下侧的引脚，控制输入引脚连接到NodeMCU上的IO引脚D3和D4。同样，电机2连接到L293D的上半部分，相应的输入引脚路由到NodeMCU上的引脚D5和D6。电机驱动器的使能引脚永久连接到3.3V。模型舵机连接到5V电源轨，其控制线连接到NodeMCU上的引脚D7，而蜂鸣器连接到引脚D8。HC-SR04距离声纳由5V电源轨供电。它由NodeMCU引脚D1的脉冲触发，回波在引脚D2上接收。由于NodeMCU仅在3.3V下工作，我们需要使用由10kΩ和22kΩ电阻组成的分压器，将HC-SR04的5V回波信号降至约3.3V。在机器人上，距离传感器实际上安装在图17.4左上角可见的小面包板上，而该面包板又安装在模型舵机的可移动轴上，使其能够扫描周围环境以寻找障碍物。最初，只有距离传感器和带有上拉电阻到3.3V电源轨的中间BPX38光电晶体管安装在小面包板上，用于扫描障碍物和红外辐射源。BPX38在约880nm的光子波长附近最敏感，这属于电磁波谱的红外部分，例如由火焰或老式灯泡作为热辐射发射。BPX38的发射极接地，集电极连接到NodeMCU的模拟输入引脚A0，并通过10kΩ电阻连接到3.3V电源轨。在这种配置中，我们需要用舵机持续扫描红外和距离传感器。"
