    # 2.3 DIGITAL SENSORS


    We now address sensors that do not require an external ADC, but report their measurement
    values directly to the microcontroller in digital from. Some sensors already have
    ADCs built in, while others do not need one. We start with the latter, of which
    the most prominent examples are buttons and switches.


    # 2.3.1 Buttons and switches


    The simplest digital sensor is certainly a *switch* that is either closed or open,
    or a *button* where the open or close state is only activated temporarily. We
    use these terms interchangeably. Our task is to sense their state in a reliable
    way, and this is normally done with a pull-up resistor that is connected to the
    supply voltage in the way shown in Figure 2.32. In this way the sensing pin on
    the microcontroller can reliably detect the supply voltage. Only if the switch
    S1 is pressed does the voltage on the pin drop to zero or ground level. Only a
    small current, determined by the magnitude of the resistor, flows when the switch
    is closed. The actual value of the resistor is uncritical, but values around 10–30
    kΩ are usually reasonable. Without the pull-up resistor, the voltage potential
    on the pin is undefined when the switch is open, and determined by stray capacitances
    in the system. So, it is recommended to always use a pull-up resistor when sensing
    the state of a switch. Note that swapping the position of the resistor and the
    switch, the resistor functions as a pull-down resistor, and the sensing level
    is zero unless the switch is closed.


    We need to point out that mechanical switches have the undesirable characteristic
    of bouncing. Closing the switch is often accompanied by a fast on-off sequence.
    Fast microcontrollers or other computers act so rapidly that they are easily fooled
    by sensing multiple switch-closures instead of a single one. Sometimes a small
    time-delay is introduced after the first switch closure is detected. In this way,
    only a single closing event is accounted for, and others during the short timeout
    period are ignored. Optionally, an analog debouncer, which is a simple low-pass
    filter, as discussed in Section 2.2.3, may be used.


    There are a number of other sensors that act just like a switch and can be sensed
    in the same way. An example is a *reed switch*, which is sensitive to magnetic
    fields and closes a switch if some field level is exceeded. A further example
    is a *tilt switch*, which senses the position of a small conducting sphere that
    horizontally rolls back and forth, and closes a contact when it bumps into one
    of the extreme positions.


    A variation on the theme of switches are *rotary encoders*, which use two switches,
    A and B, that open and close periodically as an axis is turned. The direction
    of the rotation can'
- md: '## 2.3.2 On/off devices


    A number of sensors provide a *voltage level* to inform the microcontroller about
    their state or change of state. They can be thought of as a switch with a built-in
    pull-up resistor and can be sensed in the same way.


    A problem can occur if the operating voltage level of the sensor and the microcontroller
    do not agree. Nowadays many sensors operate on levels of 2.5–3.3 V, and microcontrollers
    on levels from 2.5 to 5 V. Sensing higher external voltages such as those used
    in cars (12 V) or industrial control applications (24 or 48 V) requires some adjustment
    of the voltage level, to prevent damaging either the sensor or the microcontroller.
    There are level-changing chips available, such as the 74LVC245, but in many cases
    a simple voltage divider with two resistors is adequate. Yet, it only works if
    there is signal flowing from the high to the low-voltage side. In case a bidirectional
    signal flow is necessary, such as on the data line of the I2C bus, the solution
    shown in Figure 2.33, based on an n-type MOSFET transistor, is easy to implement.
    In the first case, when both logic signals are high, the MOSFET is not conducting,
    because the voltage difference between gate and source is close to zero. In the
    second case, if the 3.3 V logic is controlling and the signal is pulled low, the
    difference between gate and source is positive and the MOSFET conducts, such that
    even the 5 V logic level is pulled low. In the third case, when the 5 V logic
    is controlling and the 5 V logic signal is pulled low, the built-in diode (visible
    in the schematics) conducts, and causes the voltage of the source to drop to about
    0.7 V. At this point the gate source voltage drop is sufficiently large to fully
    cause the MOSFET to conduct, which also pulls the 3.3 V logic level low.


    But let us return to the sensors. A prominent device that reports its state through
    a changing voltage level is a *PIR proximity sensor*, shown on the right of Figure
    2.34. It senses the change in the infrared radiation level, which announces the
    presence of living beings. The sensors are based on collecting the incident infrared
    radiation with a Fresnel lens, which is the dome visible in Figure 2.34, on a
    pyroelectric sensor. The lens is often made of polyethylene, a material chosen
    for its low absorption of IR radiation. One side of the sensor is consequently
    warmed up and expands, which causes buckling of the piezo- or pyroelectric material,
    often a polymer film. Two effects contribute to the voltage between the upper
    and lower plates. First, the buckling strains the material and causes a piezoelectric
    voltage. Second, heat flows from the hot to the cold side and adds a pyroelectric
    voltage. The schematic setup of the device is illustrated on the left of Figure
    2.34. The tiny voltage that is generated is subsequently amplified and exposed
    to the surrounding electronics on an output pin that goes from the low to the
    high voltage level once it is triggered by the presence of a person, and stays
    there for a programmable (usually by a small potentiometer) amount of time.


    Several sensors report their measurement value encoded as a voltage pulse, with
    the duration of the pulse proportional to the value. We therefore need to measure
    the duration of that pulse with adequate accuracy. One device that employs this
    mode is an HC-SR04 distance sensor, shown in Figure 2.35, which operates like
    a sonar. It emits a short ultrasonic (40 kHz) sound burst and records the duration
    until the echo arrives, which is the round-trip time $\Delta t$ of the sound burst.
    The distance $L$ is given by this duration, and the speed of sound (approximately
    $v = 340$ m/s) by $L = \Delta t/2v$, or, in convenient units, $L[\text{cm}] =
    0.017\Delta t[\mu\text{s}]$. A pin on the device goes high when the pulse is emitted,
    and returns to low once the echo arrives or some specified timeout expires. Somewhat
    more advanced models using the same method, but having a larger range, are the
    LV-EZx sensors. They support other modes of reporting the distance as well, such
    as an analog voltage proportional to the duration, or direct reporting as RS-232
    signals, but more on that below.


    Another sensor, often found in modern consumer electronics, detects the *infrared
    signals* from the remote control. It is not strictly a scientific sensor, but
    still an interesting device that works remarkably reliably, because it rejects
    disturbing environmental effects and changes the channel on the TV only when a
    button on the remote is pressed. Typically they operate at a wavelength of 940
    nm, which matches the light-emitting diode on the remote, and they have a built-in
    optical band-pass filter that lets only that wavelength pass. Then the signals
    are modulated by 38 kHz carrier frequency, which is demodulated on the sensor,
    such that only the base-band signal is reported on the output pin.


    Now we turn to sensors that directly report their measurement values in digital
    form, and start by discussing I2C devices.


    ## 2.3.3 I2C devices


    A large number of sensors have some logic built in and support a high-level communication
    protocol. An example is the *I2C* protocol operating on the I2C bus. The physical
    connection to devices supporting I2C only needs four wires: Ground, supply voltage
    Vcc, clock SCL, and data SDA. The latter two require a pull-up resistor, which
