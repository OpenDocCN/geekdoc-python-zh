    \ pattern:\n\n```\nterminal a: 1000 1000 1...\n           b: 0010 0010 0...\n\
    \           c: 0100 0100 0...\n           d: 0001 0001 0...\n```\n\nwhere time\
    \ runs from left to right. Here, 1 indicates that the terminal is connected to\
    \ the positive power supply voltage, and 0 indicates that the coil is connected\
    \ to ground potential. Stepping through the sequence backward causes the motor\
    \ to turn in the other direction. Observing that time slots 1 and 3 show reversed\
    \ polarity for the coils A and B implies that we need an H bridge to implement\
    \ the polarity reversal. We will return to this implementation in Section 4.5.\n\
    \nIt is instructive to analyze the excitation pattern of the four terminals a\
    \ through d a little more closely. The first observation is that a sequence of\
    \ four time slots repeats itself over and over again. Second, we observe that\
    \ a fundamental pattern is the excitation of terminal a with the sequence 1000.\
    \ The excitation of terminal b is shifted to the right by two time slots which\
    \ we may interpret as 180 degrees out of phase if we assume that 360 degrees corresponds\
    \ to the four time slots. Likewise, terminal c and d are 90 and 270 degrees out\
    \ of phase with the excitation of terminal a. This interpretation will prove useful\
    \ later when we write our own stepper motor driver and discuss other modes of\
    \ operating the motor, such as half- and microstepping modes.\n\nNote that in\
    \ the excitation pattern only one coil is excited at a time. But we can also operate\
    \ the motor with two coils excited simultaneously, one coil pulling one permanent\
    \ magnet and the other coil pushing another magnet. In this way the torque of\
    \ the motor can be increased by about 40 %, albeit at the expense of doubling\
    \ the required power, because there are two coils excited at the same time. The\
    \ pattern with increased torque is based on the fundamental sequence 1100. Applying\
    \ the appropriate phasing between the four terminals from above, we arrive at\
    \ the following pattern to excite the terminals:\n\n```\nterminal a: 1100 1100\
    \ 1...\n           b: 0011 0011 0...\n           c: 0110 0110 0...\n         \
    \  d: 1001 1001 1...\n```\n\nwhere we see that the excitation of terminals b through\
    \ d is shifted by 2, 1, and 3 time slots with respect to that of terminal a. A\
    \ special point to note is that exciting two coils simultaneously will cause the\
    \ positions towards which the permanent magnet will point to lie in between the\
    \ coils, rather than directly facing the coils. Since we now have the single-coil\
    \ excitation pattern where the magnets point at the coils and the double-coil\
    \ excitation pattern where it points in between the coils, we might consider a\
    \ combination of both patterns...\n\n...and find that by interleaving the steps\
    \ of the single-coil and double-coil excitation patterns, we obtain a sequence\
    \ where the step size is halved. This mode of operation is called half-step mode.\
    \ The pattern in which we have to excite the coils is the following:\n\n```\n\
    terminal a: 11100000 11100000 1...\n```"
