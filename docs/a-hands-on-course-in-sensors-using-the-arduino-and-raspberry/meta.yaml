    Figure 3.15 Sketch of a butterfly valve.


    The flow of liquids and gases can be controlled with pumps and valves. Pumps are
    usually based on motors driving paddle wheels, propellers, or turbines that move
    the liquid or gas from a region of low pressure to that of high pressure. The
    motors are controlled in the same way as discussed before. Flow rates are controlled
    by valves, which constrict the aperture through which the medium flows. An example
    is a butterfly valve, shown in Figure 3.15. The aperture can be restricted by
    the shaded aperture, which has the same diameter as the inner diameter of the
    pipe. Rotating the shaded aperture then adjusts the flow rate from fully closed,
    in which case the shaded aperture covers the entire inner diameter of the pipe,
    to fully open, in which case it stands perpendicular to the flow of the liquid
    or gas. To change its state we can either use a servo for smaller systems, a stepper
    motor, or a large servomotor, in case we need to constrict the flow in an oil
    pipeline.


    A common means for controlling large machinery uses hydraulics, based on controlling
    the flow of hydraulic oil. It uses pumps to move the oil into cylinders that cause
    a linear travel, or it is pumped through a turbine or propeller-based device to
    cause rotary motions. In either case the original pressure is provided by pumps,
    based on electric motors. The position of valves is also controlled by the same
    devices we discussed earlier in this chapter.


    And finally, we may consider humans as part of the larger system, and they need
    to be actuated. For this purpose we may use various attention-grabbing devices,
    such as piezoelectric buzzers, sirens, and loudspeakers, as well as optical devices
    comprising LEDs, NeoPixel color LEDs, liquid crystal displays, or small displays
    such as those found on printers or washing machines that report the current state
    of the apparatus.


    By now we have covered quite a selection of actuators and sensors and can turn
    things on, move them around, and measure a number of physical quantities. The
    next task is to interface this variety of sensors and actuators with their multitude
    of interfaces, and provide a standardized interface to communicate with the external
    world. This is the task of the microcontroller, and the flavors we will discuss
    in the following chapter are Arduinos and ESPs.


