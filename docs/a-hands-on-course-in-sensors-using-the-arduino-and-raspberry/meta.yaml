  md: '# Example: Geophones


    In the second example, we use the SM-24 geophone from Figure 2.12 to record ground
    vibration spectra. Our plan is to attach the SM-24 to a battery-powered microcontroller
    that samples 1024 values at a high rate and transmits the measurements via WLAN
    to the host computer, our Raspi. There we use octave to postprocess and Fourier-transform
    the samples, as well as present the results. Besides using octave, we also make
    the data available to EPICS, such that the standard EPICS programs for display
    and post-processing can be used.


    For the sensor node, we use the NodeMCU microcontroller and the Ticker.h library
    that allows sampling with a rate of 1000 times per second. Since the frequency
    range of the SM-24 sensor is from 10 to 240 Hz, the sampling rate of 1 kHz is
    four times the maximum frequency and should be adequate. The SM-24 sensor only
    produces a very small and bipolar output voltage in the mV range. We therefore
    need to amplify the voltage in order to match the input voltage range of 0 to
    3.3 V of the ADC on the NodeMCU.


    We base the amplifier on the circuit shown in Figure 2.21, but increase the amplification
    to ×100 and add a few components to adapt it to our sensor and arrive at the circuit
    shown in Figure 10.1. The amplification is mostly given by the ratio of $R_3$
    and $R_7$ to $R_1$ and $R_2$. We also add a 1.5 kΩ resistor $R_9$ across the input
    terminals in order to damp the resonant peak at 10 Hz, which the SM-24 sensor
    exhibits according to its datasheet. If we consider the internal coil resistance
    (375 Ω) of the sensor, mounting an additional 2.2 μF capacitor across the input
    terminals creates a low-pass filter with a cutoff frequency of around 200 Hz.
    As discussed in Section 2.2.4, this avoids aliasing of higher frequencies into
    the digitizing bandwidth from 0 Hz to the Nyquist frequency of 500 Hz. The other
    components have the same functionality as discussed in Section 2.2.2.


    After the signal from the geophone is amplified, we use the ADC on the NodeMCU
    microcontroller and collect 1024 samples: one sample every millisecond, and then
    pass the digitized samples to the host computer via WLAN.


    The code for this project first defines the credentials and port number for the
    WLAN, and then import support to create the `server()` in the next line. The constants
    `npts` and `sample_period` specify the number of samples to acquire and the number
    of milliseconds to wait between acquisitions, respectively. The `Ticker.h` library
    adds support for timed and interrupt-driven functions. The variables declared
    next are related to filling the `sample_buffer`. The function `samplefast_action()`
    is called automatically by the timer and is executed once a millisecond. In this
    function we first read the built-in ADC and place the value into the `sample_buffer`
    before incrementing the variable `isamp`, such that the next sample ends up in
    the following slot in the array. Once the desired number `npts` of samples are
    acquired, we disable the interrupt with the call to `SampleFast.detach()`, set
    the sample pointer `isamp` to zero, and set the `sample_buffer_ready` flag to
    signal the main'
