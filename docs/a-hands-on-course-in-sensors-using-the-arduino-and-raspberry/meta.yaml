    as a line buffer limits the resolution, which can be improved by using separate
    connections to feed the current to the unknown impedance and for measuring the
    voltage drop. A circuit with a so-called *Howland current source* and a separate
    instrumentation amplifier, as discussed for example in [32], will help.


    After this excursion into medical matters, let us get back to physics and measure
    the width of a laser beam.


    # QUESTIONS AND PROJECT IDEAS


    +   1. Find out how features of electrocardiograms are related to actions of the
    heart.

    2. Place colored but mostly transparent films between your finger and the MAX30102
    pulse oximeter. Observe how it affects the raw signals and the SPO2 value.

    3. Use basic circuit theory to analyze the Cole model from [Figure 15.3](#).

    4. Find out the differences and benefits of a four-terminal impedance measurement
    over a two-terminal impedance measurement using only two wires like we do in this
    chapter.

    5. Consult [32] and build a better analog front end for the AD5933.

    6. In order to reduce noise in the raw calibration data, fit a quadratic polynomial
    to the calibration data (see Appendix B) and later use it like we did in the octave
    script in [Chapter 12](#), instead of using the raw data points at every frequency.

    7. Add an MLX90614 thermometer to the circuit in order to make contact-free measurements
    of the body’s temperature.

    8. Measure the impedance between the ends of a banana. Experiment with different
    types of electrodes.

    9. Determine the impedance of a piece of wood. How much does it change when the
    wood gets wet?'
