  mdcn: "## 图 16.4 原始传感器值作为障碍物位置的函数，以及由此推导出的激光束轮廓，显示出中等程度的不对称性。\n\n在此示例中，我们使用半高全宽（FWHM）而非轮廓的标准差，因为FWHM是一个相当稳健的度量标准，对于非高斯、不对称且尾部有中等数量数据点的轮廓，其工作更为可靠。标准差受后者影响很大。FWHM的脚本很直接，此处复现如下。\n\
    \n```\n% FWHM, V. Ziemann, 170628\nfunction fwhm=fwhm(data)\nN=length(data);\n\
    xmax = -1e30;\nxmin=min(data);\nimax=-1;\nfor i=1:N\n  if (data(i) > xmax)\n \
    \   xmax=data(i);\n    imax=i;\n  end\nend\nileft=imax;\nwhile (data(ileft) >\
    \ (xmax+xmin)/2 && ileft>1)\n  ileft=ileft-1;\nend\niright=imax;\nwhile (data(iright)\
    \ > (xmax+xmin)/2 && iright<N-1)\n  iright=iright+1;\nend\nfwhm=iright-ileft-1;\n\
    ```\n\n在`fwhm()`函数中，我们首先定位数据点的最小值和最大值，以及最大值的位置。然后我们向左搜索，直到值小于最大值和最小值的中点。这得到了该点的位置`ileft`。然后我们在右侧重复此过程，并将右侧和左侧中点位置的差值作为FWHM返回。最后一个方程中的减一是为了考虑两次搜索在终止各自的`while`循环之前都超出了范围。这通过从最终结果中减去一得到了部分补偿。\n\
    \n在此示例中，我们使用一个小型步进电机和一个光敏电阻（LDR）从零开始构建了一个激光束轮廓监测器，以说明基本步骤以及如何组合传感器和执行器来构建一个由`octave`或任何其他通过串行设备通信的语言（如EPICS、LabView或C）控制的集成系统。该系统远非完美，可以想到许多局限性和改进之处。例如：障碍物边缘的衍射是否是一个限制？步长是否足够，或者我们应该使用更好的微步进电机驱动器？轮廓是否会随不同的激光强度而变化？我们是否需要校正传感器系统与强度相关的非线性？这实际上是`CALIBRATE`命令的目的，以提供基础信息。当我们从另一侧扫描时，轮廓是否显示出相同的不对称性？我们可能还想知道垂直光束尺寸以及任何跨平面相关性，以确定一些基本像差。交换LDR和10\
    \ kΩ电阻的位置后，轮廓是否相同？我们可能想添加第二个电机，使障碍物沿激光束方向纵向移动。添加透镜并在多个位置测量光束轮廓，可以让我们确定激光束的$M^2$，这是激光质量的度量，对于衍射极限光束其值为1。但这些练习我们留给感兴趣的读者在家完成，而我们继续构建一个检测火焰的机器人。\n\
    \n## 问题与项目构想\n\n- 1. 使用从旧CD-ROM驱动器上拆下的框架，来回移动一把勺子来搅拌你的咖啡或茶。\n\n## 示例：寻火机器人\n\n\
    在最后一个示例中，我们讨论一个检测火焰热辐射的小型机器人，它向热源移动，并在到达辐射源后开始发出哔哔声。当然，这是一个非常简单的自主灭火器原型。我们要求机器人要么自主移动，要么由遥控器手动控制。尽管描述简单，但该项目相当有雄心，需要我们解决以下子任务：\n\
    \n- 1. 检测热源及其位置；\n- 2. 控制电机的速度和方向；\n- 3. 检测碰撞，最好在碰撞发生前；\n- 4. 感知遥控器上的操纵杆和开关；\n\
    - 5. 在遥控器和机器人之间发送消息。\n\n我们将机器人的硬件基于一个现成的底盘，该底盘有两个直流电机和一个板载电池组，电池组包含五节AA电池，可提供高达7.5\
    \ V的电压。在该底盘上，我们安装了一个全尺寸面包板，用于容纳一个NodeMCU控制器、一个H桥电机驱动器和一些线性电压转换器，以提供5 V和3.3 V电压。为了提供额外的IO引脚，我们添加了第二个Arduino，它作为NodeMCU的从机。机器人底盘上有一个专门用于模型舵机的位置，我们在其上安装了一个非常小的面包板，用于放置我们用作火焰传感器的BPX38红外光电晶体管和HC-SR04距离传感器。图17.1显示了已经安装了舵机和两个面包板的底盘。将传感器安装在可移动的面包板上，可以通过转动模型舵机将它们指向不同的方向。我们将NodeMCU配置为接入点，建立自己的WLAN网络。我们还启动一个服务器来接收来自遥控器的命令。除了在控制器上监听遥控器外，我们还实现了一个简单的状态机，可以将机器人的控制权交给它，随后机器人将自主运行。\n\
