    # 5.6.2 MariaDB


    Among several databases available for the Raspi, we choose MariaDB [27] because
    internally it works just like MySQL and we keep referring to it as such. Moreover,
    MySQL-like databases are widely used and can be accessed reasonably easily from
    most programming languages. These include Python and, after some archaeology on
    the Internet, octave as well. We install the MariaDB database from the standard
    repositories with the following command:


    ```

    sudo apt-get install mariadb-server

    ```


    Despite installing the package mariadb-server, the name of the program to access
    the database is still mysql.


