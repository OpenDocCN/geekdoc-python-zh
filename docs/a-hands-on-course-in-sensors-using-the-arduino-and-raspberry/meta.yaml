    ![图2.3 NTC电阻是掺杂半导体，其施主能级刚好低于导电带。温度升高增加了电子的动能，使它们偶尔能跃迁到导电带，在那里它们对材料的电导率做出贡献。](img/8f23875c54d5b3177d5d2a5bba06b37e_26_0.png)


