    print('Average Temperature by City:\\n', avg_temp)\n```\n\nAverage Temperature\
    \ by City:\nCity\nChicago 69.0\nLos Angeles 76.0\nNew York 71.0\nName: Temperature,\
    \ dtype: float64\n\nTask: Group by City and find the maximum humidity.\n\n```python\n\
    max_humidity = df.groupby('City')['Humidity'].max()\nprint('Maximum Humidity by\
    \ City:\\n', max_humidity)\n```\n\nMaximum Humidity by City:\nCity\nChicago 62\n\
    Los Angeles 57\nNew York 52\nName: Humidity, dtype: int64\n\nTask: Group by City\
    \ and find the minimum wind speed.\n\n```python\nmin_wind_speed = df.groupby('City')['Wind_Speed'].min()\n\
    print('Minimum Wind Speed by City:\\n', min_wind_speed)\n```\n\nMinimum Wind Speed\
    \ by City:\nCity\nChicago 3\nLos Angeles 7\nNew York 5\nName: Wind_Speed, dtype:\
    \ int64\n\n## 12.6 HANDLING MISSING DATA\n\n### 12.6.1 Demonstration\n\nYou can\
