  md: '# 1.1.2 Real-life Examples


    For example, a class `Car` may have attributes, which are the data points that
    define a car, such as `make`, `model`, `year`, and `color`. The class `Car` may
    have functions, which are the actions a car can perform, such as `start()`, `stop()`,
    and `drive()`. The objects of `Car` are individual cars. Each car (object) will
    have specific values for the attributes defined in the `Car` class. For example,
    one object might represent a red 2020 Toyota Corolla, while another object might
    represent a blue 2019 Honda Civic.


    Let''s look at another example. A class `Employee` may have attributes that define
    an employee, such as `name`, `id`, `department`, and `salary`. The class may also
    have actions an employee can perform, such as `promote()`, `transfer()`, and `give_raise()`.
    The objects of `Employee` are individual employees in the company, and each employee
    (object) will have specific values for the attributes defined in the `Employee`
    class. For example, one object might represent an employee named John Doe in the
    IT department, while another object might represent an employee named Jane Smith
    in the HR department.


    We may have a class `Smartphone` that represents all smartphones. The class `Smartphone`
    may have attributes, such as `brand`, `model`, `storage`, `color`, and `price`.
    It may have methods that a smartphone can perform, such as `make_call()`, `send_message()`,
    and `apply_discount()`. The objects of `Smartphone` represent each smartphone,
    which has specific values for the attributes defined in the `Smartphone` class.
    For example, one object might represent an iPhone 16 with 256GB storage, while
    another object might represent a Samsung Galaxy S23 with 512GB storage.


