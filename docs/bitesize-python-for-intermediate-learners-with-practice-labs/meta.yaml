  mdcn: "## 11.4.3 检验你的理解\n\n任务：比较通过标签和通过索引访问DataFrame中的元素。它们各自的优缺点是什么？\n\n答案：访问DataFrame中的元素可以通过标签（使用`.loc[]`索引器）或通过索引（使用`.iloc[]`索引器）来完成。\n\
    \n通过标签访问：使用标签可以根据行和列的名称更直观地访问特定的行和列。标签可以是非数字的，并且可以表示有意义的标识符，使代码更具可读性。然而，与使用索引相比，通过标签访问元素可能更慢，尤其是在处理大型DataFrame时。此外，拼写错误或不正确的标签可能导致`KeyError`，使其更容易出错。\n\
    \n通过索引访问：通过索引访问元素通常比使用标签更快，尤其是在处理大型DataFrame时，因为它涉及基于整数的索引。使用索引可以清楚地表明元素在DataFrame中的位置。然而，索引是数字的，可能无法提供有意义的上下文，使代码不够直观。索引是顺序且固定的，因此DataFrame结构的更改（例如，重新排序行/列）可能会影响代码的可靠性。\n\
    \n总之，通过标签访问元素提供了直观性和灵活性，而通过索引访问则提供了更好的性能和明确性。选择哪种方法取决于DataFrame的大小、代码的可读性以及手头任务的具体要求等因素。\n\
    \n## 11.5 操作DataFrame中的行\n\n### 11.5.1 演示\n\n在DataFrame中添加、删除、更改标签以及修改行的值是数据操作中的常见操作。\n\
    \n要添加新行，可以使用`.loc[]`索引器并指定新的索引标签以及该行的数据。这允许灵活地添加具有自定义索引标签和相应值的行。\n\n要删除行，可以使用`.drop()`方法并指定要删除的行的索引标签。此方法提供了一种从DataFrame中消除不需要的行的直接方法。\n\
    \n要更改行的标签，可以使用`.rename()`方法，该方法允许在保持数据不变的情况下重命名索引标签。此方法对于更新行标签以更好地反映数据或保持一致性非常有用。\n\
    \n最后，要修改行中特定单元格的值，可以直接使用索引标签和列名访问DataFrame，然后为所需的单元格分配新值。\n\n```python\n# 创建一个示例DataFrame\n\
    data = {'A': [1, 2, 3],\n        'B': [4, 5, 6]}\ndf = pd.DataFrame(data, index=['X',\
    \ 'Y', 'Z'])\nprint('原始dataframe:')\nprint(df)\n```\n\n原始dataframe:\n   A  B\n\
    X  1  4\nY  2  5\nZ  3  6\n\n```python\n# 添加新行\ndf.loc['W'] = [7, 8]\nprint('添加新行后:')\n\
    print(df)\n```\n\n添加新行后:\n   A  B\nX  1  4\nY  2  5\nZ  3  6\nW  7  8\n\n```python\n\
    # 删除一行\ndf = df.drop('Y')\nprint('删除一行后:')\nprint(df)\n```\n\n删除一行后:\n    A  B\n\
    X  1  4\nZ  3  6\nW  7  8\n\n```python\n# 就地删除一行\ndf.drop('X', inplace = True)\n\
    print('删除一行后:')\nprint(df)\n```\n\n删除一行后:\n    A  B\nZ  3  6\nW  7  8\n\n```python\n\
    # 更改行的标签\ndf = df.rename(index={'Z': 'Z_new'})\nprint('更改行的标签后:')\nprint(df)\n\
