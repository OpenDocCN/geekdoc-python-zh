    d    40\ne    50\ndtype: int64\n```\n\n如果Series有重复索引，通过索引标签访问元素会返回所有匹配的元素。\n\n\
    ```python\n# 创建具有重复索引的Series\ndata = [10, 20, 30, 40, 50]\nindex = ['a', 'a',\
