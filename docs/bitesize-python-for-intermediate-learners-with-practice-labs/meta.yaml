    \ into simple, efficient operations.\n\nAre you excited? Let’s get started!\n\n\
    ## 9.1 UNIVERSAL FUNCTIONS\n\n### 9.1.1 Demonstration\n\nUniversal functions,\
    \ commonly known as ufuncs, are a core feature of NumPy that allow for efficient,\
    \ element-wise operations on arrays. These functions are designed to operate on\
    \ each element of the array independently and are implemented in C for high performance.\
    \ Universal functions support broadcasting, which enables operations between arrays\
    \ of different shapes. Universal functions apply the function to each element\
    \ of the array, making them highly efficient for array computations. Universal\
    \ functions support broadcasting, allowing operations on arrays of different shapes\
    \ without explicit loops. Implemented in C, universal functions are optimized\
    \ for speed, making array operations faster compared to Python loops. At last,\
    \ universal functions can handle arrays of different shapes and dimensions, provided\
    \ they adhere to broadcasting rules.\n\nAddition (np.add()): Adds corresponding\
    \ elements of two arrays or adds a scalar to every element of an array.\n\n```python\n\
    import numpy as np\n\narr1 = np.array([1, 2, 3])\narr2 = np.array([4, 5, 6])\n\
    result = np.add(arr1, arr2)\nprint(result)  # Output: [5 7 9]\n```\n\n[5 7 9]\n\
    \nSubtraction (np.subtract()): Subtracts corresponding elements of one array from\
    \ another or subtracts a scalar from every element.\n\n```python\narr1 = np.array([10,\
    \ 20, 30])\narr2 = np.array([1, 2, 3])\nresult = np.subtract(arr1, arr2)\nprint(result)\
    \  # Output: [ 9 18 27]\n```\n\n[ 9 18 27]\n\nMultiplication (np.multiply()):\
    \ Multiplies corresponding elements of two arrays or multiplies each element by\
    \ a scalar.\n\n```python\narr1 = np.array([2, 4, 6])\narr2 = np.array([1, 3, 5])\n\
    result = np.multiply(arr1, arr2)\nprint(result)  # Output: [ 2 12 30]\n```\n\n\
    [ 2 12 30]\n\nDivision (np.divide()): Divides corresponding elements of one array\
    \ by another or divides each element by a scalar.\n\n```python\narr1 = np.array([100,\
    \ 200, 300])\narr2 = np.array([10, 20, 30])\nresult = np.divide(arr1, arr2)\n\
    print(result)  # Output: [10. 10. 10.]\n```\n\n[10. 10. 10.]\n\nSine (np.sin()):\
    \ Computes the sine of each element in the array.\n\n```python\narr = np.array([0,\
    \ np.pi/2, np.pi])\nresult = np.sin(arr)\nprint(result)  # Output: [0. 1. 0.]\n\
    ```\n\n[0.0000000e+00 1.0000000e+00 1.2246468e-16]\n\nCosine (np.cos()): Computes\
    \ the cosine of each element in the array.\n\n```python\narr = np.array([0, np.pi/2,\
    \ np.pi])\nresult = np.cos(arr)\nprint(result)  # Output: [1. 0. -1.]\n```\n\n\
    [ 1.000000e+00  6.123234e-17 -1.000000e+00]\n\nTangent (np.tan()): Computes the\
    \ tangent of each element in the array.\n\n```python\narr = np.array([0, np.pi/4,\
    \ np.pi/2])\nresult = np.tan(arr)\nprint(result)  # Output: [0.         1.   \
    \      1.63312394e+16]\n```\n\n[0.00000000e+00 1.00000000e+00 1.63312394e+16]\n\
    \nNatural Logarithm (np.log()): Computes the natural logarithm (base e) of each\
