    # CHAPTER 13


    ## Matplotlib (Basic)


    DATA VISUALIZATION IS ESSENTIAL for effectively delivering information, making
    complex data easier to understand. Matplotlib, a widely used Python library, offers
    a simple and intuitive way to create visualizations. You will learn the basics
    of Matplotlib, from creating a simple plot to customize it to meet your specific
    needs. You''ll learn how to plot data points, adjust labels and titles, and modify
    visual elements to enhance clarity. By the end, you''ll have a solid foundation
    for using Matplotlib to present data more effectively. Are you ready? Let''s get
    started!


    ## 13.1 INTRODUCTION


    ### 13.1.1 Explanation


    Matplotlib is a powerful and widely used plotting library in Python, designed
    for creating static, animated, and interactive visualizations. It serves as a
    fundamental tool for data scientists and analysts, enabling them to convert complex
    datasets into comprehensible graphs and charts. The importance of Matplotlib lies
    in its versatility and ease of use; it can produce a wide range of plots, including
    line charts, bar charts, histograms, scatter plots, and more, with just a few
    lines of code. This makes it essential for exploratory data analysis and presenting
    findings effectively. Among its pros, Matplotlib offers extensive customization
    options, fine control over plot aesthetics, and integration with other libraries
    like NumPy and pandas. However, it has some cons, such as a steeper learning curve
    for beginners due to its vast array of functions and sometimes cumbersome syntax
    for complex visualizations. Despite these drawbacks, Matplotlib remains a cornerstone
    in the Python data visualization ecosystem, appreciated for its robustness and
    comprehensive capabilities.


    To utilize the Matplotlib package in Python, users need to import the `pyplot`
    module. The conventional way to do this is by using the alias `plt` for simplicity
    and convenience. This is done by including the following line at the beginning
    of your script: `import matplotlib.pyplot as plt`. This practice is widely adopted
    in the data science community, ensuring that your code is consistent with common
    conventions and easily understood by others.


    ```python

    import matplotlib.pyplot as plt

    ```


    ## 13.2 A SIMPLE PLOT


    ### 13.2.1 Demonstration


    Let’s start with creating a simple line plot (Figure 13.1) to get familiar with
    Matplotlib.


    **Syntax:** plt.plot(x, y)


    - x: The data for the x-axis.

    - y: The data for the y-axis.


    ```python

    # Sample data

    x = [1, 2, 3, 4]

    y = [1, 4, 9, 16]


    # Plotting the data

    plt.plot(x, y)


    # Display the plot

    plt.show()

    ```


    ### 13.2.2 Practice


    We use the following dummy datasets for the practices:


    ```python

    # Run this cell for all the practices

    import numpy as np


    d1 = np.linspace(0, 1, 10)

    d2 = d1 ** 2

    d3 = d1 ** 0.5

    ```


    Task: Make a simple plot for d1 vs d2 (Figure 13.2).


    ```python

    plt.plot(d1, d2)

    ```


    Task: Make a plot for d1 vs d3 (Figure 13.3).


    ```python

    plt.plot(d1, d3)

    ```


    ## 13.3 TITLES AND LABELS


    The plots we created previously are good, but too simple. They are missing key
    information, such as what are the labels of the x-axes and y-axes, and what is
    the title, etc. Let''s add some flavors.


    ### 13.3.1 Demonstration


    Adding titles and labels helps in understanding what the plot represents and the
    axes values. It makes the plot more informative and easier to read (Figure 13.4).


    Syntax:


    - plt.title(''Title''): Adds a title to the plot.

    - plt.xlabel(''Label''): Adds a label to the x-axis.

    - plt.ylabel(''Label''): Adds a label to the y-axis.


    ```python

    # Sample data

    x = [1, 2, 3, 4]

    y = [1, 4, 9, 16]


    # Plotting the data

    plt.plot(x, y)


    # Adding title and labels

    plt.title(''Simple Line Plot'')

    plt.xlabel(''X-axis'')

    plt.ylabel(''Y-axis'')


    # Display the plot

    plt.show()

    ```


    ### 13.3.2 Practice


    Task: Plot d1 vs d2, make title as ''Square'', x-label as ''x'', y-label as ''x
    square'' (Figure 13.5).


    ```python

    # Plotting d1 vs d2

    plt.plot(d1, d2)


    # Adding title to the plot

    plt.title(''Square'')


    # Adding label to the x-axis

    plt.xlabel(''x'')


    # Adding label to the y-axis

    plt.ylabel(''x square'')


    # Displaying the plot

    plt.show()

    ```


    Task: Plot d1 vs d3, make title as ''Square Root'', x-label as ''x'', y-label
    as ''x sqrt'' (Figure 13.6).


    ```python

    # Plotting d1 vs d3

    plt.plot(d1, d3)


    # Adding title to the plot

    plt.title(''Square Root'')


    # Adding label to the x-axis

    plt.xlabel(''x'')


    # Adding label to the y-axis

    plt.ylabel(''x sqrt'')


    # Displaying the plot

    plt.show()

    ```


    ## 13.4 LEGEND


    ### 13.4.1 Demonstration


    Legends help in identifying different data series in a plot, especially when multiple
    lines or datasets are plotted together (Figure 13.7).


    Syntax:


    - plt.plot(x, y, label=''Label''): Adds a label to the plot.

    - plt.legend(): Displays the legend on the plot.


    ```python

    # Sample data

    x = [1, 2, 3, 4]

    y1 = [1, 4, 9, 16]

    y2 = [1, 2, 3, 4]


    # Plotting the data

    plt.plot(x, y1, label=''Square'')

    ```'
