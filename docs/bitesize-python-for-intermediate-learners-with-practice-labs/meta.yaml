  md: '# TABLE 8.1 Comparison of Python Lists versus NumPy ndarrays


    | Feature | Python List | NumPy ndarray |

    | :--- | :--- | :--- |

    | Performance | Slow for numerical operations due to Python''s dynamic typing
    and lack of optimization | Optimized for speed, especially with large datasets
    and numerical computations |

    | Homogeneity | Supports mixed data types (e.g., integers, strings, objects) |
    Requires uniform data types for efficient memory usage and computation |

    | Indexing/Slicing | Basic single-element access and simple slicing | Advanced
    multidimensional slicing and Boolean indexing |

    | Structure | 1D collection (nested lists mimic multidimensionality) | Native
    support for N-dimensions (e.g., 2D matrices, 3D tensors) |

    | Operations | Limited to basic operations (append, remove, etc.) | Element-wise
    math operations (+, -, *, /) and linear algebra functions |

    | Memory Usage | Higher memory overhead for storing type information | Compact
    storage due to fixed data types (e.g., int32, float64) |

    | Broadcasting | Not supported (requires manual iteration) | Automatic alignment
    of arrays with different shapes |

    | Functionality | Minimal built-in math functions | Rich library of mathematical/statistical
    functions |

    | Data Handling | Better for general-purpose, heterogeneous data | Optimized for
    numerical/scientific homogeneous data |


