  mdcn: "## 10.4 数学运算\n\n### 10.4.1 演示\n\nPandas Series 支持广泛的数学运算，使其成为数据操作和分析的强大工具。这些运算可以逐元素应用，并且\
    \ pandas 会根据索引标签对齐 Series，从而便于数据处理。\n\n你可以对 Series 执行基本的算术运算，如加法、减法、乘法和除法。\n\n\
    ```python\ns1 = pd.Series([1, 2, 3, 4, 5])\ns2 = pd.Series([10, 20, 30, 40, 50])\n\
    \n# 加法\nprint(s1 + s2)  # 输出：\n# 0    11\n# 1    22\n# 2    33\n# 3    44\n# 4\
    \    55\n# dtype: int64\n\n# 减法\nprint(s1 - s2)  # 输出：\n# 0    -9\n# 1    -18\n\
    # 2    -27\n# 3    -36\n# 4    -45\n# dtype: int64\n\n# 乘法\nprint(s1 * s2)  #\
    \ 输出：\n# 0     10\n# 1     40\n# 2     90\n# 3    160\n# 4    250\n# dtype: int64\n\
    \n# 除法\nprint(s1 / s2)  # 输出：\n# 0    0.1\n# 1    0.1\n# 2    0.1\n# 3    0.1\n\
    # 4    0.1\n# dtype: float64\n```\n\nPandas Series 可以与 NumPy 函数无缝协作，从而进行复杂的数学运算。\n\
    \n```python\n# 应用 NumPy 函数\nprint(np.sqrt(s1))  # 输出：\n# 0    1.000000\n# 1  \
    \  1.414214\n# 2    1.732051\n# 3    2.000000\n# 4    2.236068\n# dtype: float64\n\
    \nprint(np.exp(s1))   # 输出：\n# 0      2.718282\n# 1      7.389056\n# 2     20.085537\n\
    # 3     54.598150\n# 4    148.413159\n# dtype: float64\n```\n\nPandas 提供了各种聚合函数来计算汇总统计信息。\n\
    \n```python\n# 求和\nprint(s1.sum())  # 输出：15\n\n# 均值\nprint(s1.mean())  # 输出：3.0\n\
    \n# 标准差\nprint(s1.std())  # 输出：1.5811388300841898\n\n# 最小值\nprint(s1.min())  #\
    \ 输出：1\n\n# 最大值\nprint(s1.max())  # 输出：5\n```\n\nPandas 在运算过程中会根据索引标签对齐 Series，你可以使用\
    \ `fillna()` 等方法处理缺失数据。\n\n```python\ns3 = pd.Series([1, 2, 3], index=['a', 'b',\
    \ 'c'])\ns4 = pd.Series([4, 5, 6], index=['b', 'c', 'd'])\n\n# 带对齐的加法\nprint(s3\
    \ + s4)  # 输出：\n# a    NaN\n# b    6.0\n# c    8.0\n# d    NaN\n# dtype: float64\n\
    \n# 填充缺失值\nprint((s3 + s4).fillna(0))  # 输出：\n# a    0.0\n# b    6.0\n# c    8.0\n\
    # d    0.0\n# dtype: float64\n```\n\n你可以使用 `apply()` 方法将自定义函数应用于 Series。\n\n```python\n\
    # 自定义函数：对每个元素求平方\ndef square(x):\n    return x * x\n\nprint(s1.apply(square))\
    \  # 输出：\n# 0     1\n# 1     4\n# 2     9\n# 3    16\n# 4    25\n# dtype: int64\n\
    ```\n\n### 10.4.2 练习\n\n```python\n# 给定以下两个 Series，完成下列任务\ns1 = pd.Series([1,\
    \ 2, 3, 4, 5], index = ['a', 'b', 'c', 'd', 'e'])\ns2 = pd.Series([10, 20, 30,\
    \ 40, 50], index = ['e', 'd', 'c', 'b', 'a'])\n```\n\n任务：将 s1 和 s2 相加，并将结果保存到\
    \ result。\n\n```python\nresult = s1 + s2\nresult\n```\n\n任务：从 s1 中减去 s2，并将结果保存到\
    \ result。\n\n```python\nresult = s1 - s2\nresult\n```\n\n任务：将 s1 和 s2 相乘，并将结果保存到\
    \ result。\n\n```python\nresult = s1 * s2\nresult\n```\n\n任务：将 s1 除以 s2，并将结果保存到\
    \ result。\n\n```python\nresult = s1 / s2\nresult\n```\n\n任务：对 s1 应用 NumPy 的 sqrt\
    \ 函数。\n\n```python\nresult = np.sqrt(s1)\nresult\n```\n\n任务：计算 s1 的总和。\n\n```python\n\
    # 计算 Series 的总和\nresult = s1.sum()\nresult\n```\n\n任务：计算 s1 的均值。\n\n```python\n\
    # 计算 Series 的均值\nresult = s1.mean()\nresult\n```\n\n任务：计算 s1 的标准差。\n\n```python\n\
    # 计算 Series 的标准差\nresult = s1.std()\nresult\n```\n\n任务：创建一个值为 [1, 2, None, 4,\
    \ 5] 的 Series s3，并用 0 填充缺失值。\n\n```python\n# 创建一个包含缺失数据的 Series\ns3 = pd.Series([1,\
    \ 2, None, 4, 5])\n\n# 用 0 填充缺失值\nresult = s3.fillna(0)\nresult\n```\n\n任务：创建两个\
    \ Series，s4 的值为 [1, 2, 3]，索引为 ['a', 'b', 'c']；s5 的值为 [4, 5, 6]，索引为 ['b', 'c',\
    \ 'd']，并将它们相加。\n\n```python\n# 创建具有不同索引的 Series\ns4 = pd.Series([1, 2, 3], index=['a',\
    \ 'b', 'c'])\ns5 = pd.Series([4, 5, 6], index=['b', 'c', 'd'])\n\n# 将具有不同索引的 Series\
    \ 相加\nresult = s4 + s5\nresult\n```\n\n任务：将上述 s4 和 s5 相加，并将缺失值填充为 0。\n\n```python\n\
    # 将具有不同索引的 Series 相加\nresult = (s4 + s5).fillna(0)\nresult\n```\n\n## 10.5 与生成式\
    \ AI 交互\n\n以下是一些你可以用来与生成式 AI 工具（包括 ChatGPT）交互的问题和提示。\n\n- 什么是 Pandas Series？它与\
