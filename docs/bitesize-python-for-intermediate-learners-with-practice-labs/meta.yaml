    \        print(\"I'm still working on it!\")\n\n# 类 'G3' 继承自 'G2' 并实现了抽象的 'done'\
    \ 方法\nclass G3(G2):\n    # 'done' 方法的实现\n    def done(self):\n        print(\"\
    I got it done!\")\n\n# G1 和 G2 的实例无法创建，因为它们是抽象的\n# 尝试创建 G1 或 G2 的实例会引发错误\n\n#\
    \ 无法创建 g1\n# g1 = G1()  # 取消注释会引发错误\n\n# 无法创建 g2\n# g2 = G2()  # 取消注释会引发错误\n\n\
    # G3 的实例可以创建，因为它实现了 'done' 方法\ng3 = G3()\ng3.work()  # 调用 G2 的 'work' 方法\ng3.done()\
    \  # 调用 G3 的 'done' 方法\n```\n\nI'm still working on it!\nI got it done!\n\n在这个演示中，**ABC**（抽象基类）是一个帮助你创建抽象类的基类，而\
