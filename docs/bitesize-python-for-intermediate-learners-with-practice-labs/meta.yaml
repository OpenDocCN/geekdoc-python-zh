    # 第 8 章


    # N 维数组


    在 Python 中，像 `list` 和 `tuple` 这样的基本数据结构可以存储项目的集合，使它们类似于数组。这些结构很灵活，因为它们可以容纳混合数据类型，但它们并未针对数值或科学操作进行优化。Numpy
    包提供的 `ndarray` 是处理大型数据集和数值计算的更高效替代方案。与列表或元组不同，ndarray 专门用于数值数据并支持多维数组，如矩阵。虽然列表和元组更通用，但
    ndarray 以牺牲通用性换取效率，尤其是在对大量数据执行数学计算时。


    你准备好了吗？让我们开始吧！


    # 8.1 什么是 N 维数组


    ## 8.1.1 解释


    在 Python 的 NumPy 包中，N 维数组通常称为 `ndarray`，是一种强大且灵活的结构，用于高效处理大型数据集和执行复杂数学运算。


    NumPy N 维数组 (`ndarray`) 具有以下主要特性：


    - **性能**：与 Python 列表相比，通常在数值操作上更快，尤其是对于大型数据集。

    - **同质性**：ndarray 中的所有元素都是相同的数据类型，这允许高效的计算和内存使用。

    - **索引/切片**：允许高级索引和切片，使得访问和操作子数组变得容易。

    - **结构**：一个 ndarray 可以有多个维度（轴）。例如，二维数组就像一个有行和列的矩阵，而三维数组可以看作是矩阵的堆栈。

    - **操作**：支持广泛的数学运算（例如，加法、乘法），这些运算针对性能进行了优化，并且可以逐元素应用。


    # 8.2 课程：比较 NDARRAY 与 LIST


    与 ndarray 相比，Python 列表在以下方面有所不同：


    - **性能**：由于 Python 动态类型的开销和缺乏优化的数值操作，通常在数值任务上比 NumPy 数组慢。

    - **同质性**：列表可以包含不同数据类型的元素，这可能导致计算效率低下，并且需要额外的处理来进行数学运算。

    - **索引/切片**：支持基本的索引和切片，但缺乏 NumPy 数组的高级功能。

    - **结构**：Python 列表是一维的项目集合。虽然列表可以包含嵌套列表（例如，列表的列表）来模拟多维数组，但这种方法对于数值计算来说不够直观且效率较低。

    - **操作**：提供基本操作，但它们并未针对数学计算进行优化。列表缺乏对逐元素操作的内置支持。


    ## 8.2.1 测试你的理解


    我们上面分别讨论了 ndarray 和 list。现在让我们从结构、操作、同质性、索引/切片和性能方面对它们进行并排比较。


    一个可能的解决方案如表 8.1 所示。


    # 8.3 性能比较


    ## 8.3.1 演示


    为了比较 ndarray 和 list 之间的效率，我们使用 %timeit 函数。Python 中的 %timeit 函数是 IPython（通常在 Jupyter
    notebooks 中使用）提供的一个魔法命令，用于测量代码片段的执行时间。它用于基准测试和优化代码性能。%timeit 多次运行代码片段（在循环中），以提供统计上可靠的执行时间测量。它报告最佳平均时间，最大限度地减少随机波动和系统负载的影响。它返回每次执行的平均时间，并可以帮助识别代码中的性能瓶颈。


