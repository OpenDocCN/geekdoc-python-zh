    extensions to RDF and semantic web, (2) applied data science, and (3) experiential
    learning and pedagogy in business education. He developed and taught courses including
    Strategic Management, Databases, Business Statistics, Management Decision Making,
    Programming Languages (C++, Java, and Python), Data Structures and Algorithms,
    Data Mining, Big Data, and Machine Learning.'
