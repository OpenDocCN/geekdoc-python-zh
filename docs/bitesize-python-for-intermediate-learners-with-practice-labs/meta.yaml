    ## 15.3 DISTRIBUTION PLOTS


    ### 15.3.1 Demonstration


    The displot() function in Seaborn is for visualizing the distribution of a dataset.
    Histogram (kind=''hist''): A histogram displays the distribution of a dataset
    by dividing the data into bins and counting the number of observations in each
    bin. The following histogram (Figure 15.7) shows the distribution of the total
    bill amounts in the ''tips'' dataset.


    ```

    # Create a histogram

    sns.displot(tips, x=''total_bill'', kind=''hist'')

