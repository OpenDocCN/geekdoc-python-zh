    \n### 12.3.1 演示\n\n让我们讨论数值列的描述性统计，重点关注集中趋势、离散程度、位置以及 `describe()` 方法。\n\n集中趋势：\n\
    \n1.  均值：代表数据的平均值，通过将所有值求和并除以观测数量来计算。\n2.  中位数：数据按升序排序后的中间值，表示将数据集的上半部分和下半部分分开的中心值。\n\
    \n```python\n# 表示不同产品月度销售额的示例 DataFrame\nsales_data = {\n    'Product A': [55000,\
