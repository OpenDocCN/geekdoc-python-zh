    \ 的任何子类都必须实现 **done** 方法才能被实例化。*G1* 继承自 *Idea* 但没有实现 **done** 方法，使其成为抽象的且不可实例化。*G2*\
    \ 继承自 *G1* 并重写了 **work** 方法。*G3* 继承自 *G2* 并实现了 **done** 方法，使其成为一个可以实例化的具体类。\n\n\
    因为 *G1* 和 *G2* 没有实现抽象的 **done** 方法，它们仍然是抽象类。*G1* 和 *G2* 的实例无法创建。只有 *G3* 可以被实例化，因为它提供了\
    \ **done** 的具体实现。\n\n这个例子演示了Python面向对象编程中抽象基类、方法重写和继承的使用。\n\n### 5.2 车辆\n\n让我们用一个涉及车辆的经典例子来演示抽象。当你开车时，你不需要知道发动机如何工作，燃料如何转化为能量，或者制动系统内部如何运作。你只需要使用提供的接口：方向盘、油门、刹车踏板和换挡杆。复杂的操作被隐藏了，你只接触到驾驶汽车所需的基本功能。\n\
    \n```python\n# 从 abc 模块导入 ABC 和 abstractmethod\nfrom abc import ABC, abstractmethod\n\
