- md: '## 9.5 MASKING


    ### 9.5.1 Demonstration


    Masking in NumPy is a powerful feature that allows you to perform operations on
    specific subsets of an array based on conditions. It enables you to filter and
    manipulate data efficiently without the need for explicit loops. This is particularly
    useful for handling and analyzing large datasets where you need to apply conditions
    to select or modify elements.


    Conditional masking involves applying conditions to create a mask directly from
    the array elements. This allows you to filter or modify elements based on specific
    criteria.


    ```

    mask = (array condition)

    ```


    ```

    # Create an array

    arr = np.array([1, 2, 3, 4, 5, 6])


    # Create a mask for even numbers

    even_mask = arr % 2 == 0


    print(even_mask)

    # Output: [False  True False  True False  True]


    # Use the mask to select even numbers

    even_numbers = arr[even_mask]

    print(even_numbers)

    # Output: [2 4 6]

    ```


    Advanced masking involves combining multiple masks or using masks with other NumPy
    functions for complex data operations.


    ```

    # Create an array

    arr = np.array([10, 20, 30, 40, 50])


    # Create masks for different conditions

    mask1 = arr > 20

    mask2 = arr < 50


    # Combine masks using logical operations

    combined_mask = mask1 & mask2


    print(combined_mask)

    # Output: [False False  True  True False]


    # Use the combined mask to filter values

    filtered_values = arr[combined_mask]

    print(filtered_values)

    # Output: [30 40]

    ```


    Handle NaN (Not a Number) values in arrays by creating masks to identify or replace
    NaNs.


    ```

    numpy.isnan(array)

    ```


    ```

    # Create an array with NaN values

    arr = np.array([1, 2, np.nan, 4, np.nan])


    # Create a mask for NaN values

    nan_mask = np.isnan(arr)


    print(nan_mask)

    # Output: [False False  True False  True]

    ```


    ### 9.5.2 Practice


    Task: Create a NumPy array with values ranging from -5 to 5. Create a mask to
    select only the positive values from this array.


    ```

    # Create the array

    arr = np.arange(-5, 6)


    # Create the mask for positive values

    mask = arr > 0


    # Select positive values

    positive_values = arr[mask]

    print(positive_values)  # Output: [1 2 3 4 5]

    ```


    Task: Create a NumPy array with random integers from −10 to 10. Replace all negative
    values with zero using masking.


    ```

    # Create the array with random integers

    arr = np.random.randint(-10, 11, size=10)


    # Create the mask for negative values

    mask = arr < 0


    # Replace negative values with zero

    arr[mask] = 0

    print(arr)

    ```


    Task: Create a NumPy array with values from 1 to 20. Create a mask to select values
    between 7 and 15 (inclusive).


    ```

    # Create the array

    arr = np.arange(1, 21)


    # Create the mask for values between 7 and 15

    mask = (arr >= 7) & (arr <= 15)


    # Select values within the range

    values_in_range = arr[mask]

    print(values_in_range)  # Output: [ 7  8  9 10 11 12 13 14 15]

    ```


    Task: Create a 3-by-3 NumPy array with values from 1 to 9. Create a mask to select
    values greater than 5.


    ```

    # Create a 3 by 3 array

    arr = np.arange(1, 10).reshape(3, 3)


    # Create the mask for values greater than 5

    mask = arr > 5


    # Select values greater than 5

    gt_5 = arr[mask]

    print(gt_5)  # Output: [6 7 8 9]

    ```


    Task: Create a NumPy array with the following values: [1, 2, 3, 4, 5]. Replace
    all occurrences of the number 3 with 0.


    ```

    # Create the array

    arr = np.array([1, 2, 3, 4, 5])


    # Create the mask for the value 3

    mask = arr == 3


    # Replace 3 with 0

    arr[mask] = 0

    print(arr)  # Output: [1 2 0 4 5]

    ```


    Task: Create a 4-by-4 NumPy array with values from 1 to 16. Create a mask to select
    elements where the value is even.


    ```

    # Create a 4 by 4 array

    arr = np.arange(1, 17).reshape(4, 4)


    # Create the mask for even values

    mask = arr % 2 == 0


    # Select even values

    even_values = arr[mask]

    print(even_values)  # Output: [ 2  4  6  8 10 12 14 16]

    ```


    Task: Create a NumPy array with values from 1 to 20. Create a mask to select values
    that are greater than 10 and also even.


    ```

    # Create the array

    arr = np.arange(1, 21)


    # Create the mask for values greater than 10 and even

    mask = (arr > 10) & (arr % 2 == 0)


    # Select values that meet both conditions

    filtered_values = arr[mask]

    print(filtered_values)  # Output: [12 14 16 18 20]

    ```


    Task: Create a 1D NumPy array with values from 1 to 10. Use a mask to increment
    all values greater than 5 by 10.


    ```

    # Create the array

    arr = np.arange(1, 11)


    # Create the mask for values greater than 5

    mask = arr > 5


    # Increment values greater than 5 by 10

    arr[mask] += 10

    print(arr)  # Output: [ 1  2  3  4  5 15 16 17 18 19]

    ```


