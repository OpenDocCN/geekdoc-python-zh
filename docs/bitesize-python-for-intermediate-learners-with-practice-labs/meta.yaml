- md: "## 7.2 EMPLOYEE\n\n### 7.2.1 Background\n\nA college hires hundreds of students\
    \ for various works, so students can get financial support and learning experience.\
    \ To manage the system, you are asked to write a Python program to manage the\
    \ record.\n\nYou are going to create five classes:\n\n1. Student, Student_Not_Working,\
    \ Student_Working, Student_Working_FT, Student_Working_PT.\n2. Student and Student_Working\
    \ are abstract classes.\n\n### 7.2.2 Implementation\n\n```python\n# Importing\
    \ libraries\nimport abc\nfrom abc import ABC\n\n# Defining student class\nclass\
    \ Student(ABC):\n    '''The abstract base class for all students'''\n\n    def\
    \ __init__(self, first_name, last_name, stu_ID):\n        '''Create a student\
    \ based on the first name, last name, and student ID\n\n        Keyword arguments:\n\
    \        first_name (str) -- the first name of the student\n        last_name\
    \ (str)  -- the last name of the student\n        stu_ID (str)     -- the string\
    \ ID of the student\n        '''\n        self.first_name = first_name\n     \
    \   self.last_name = last_name\n        self.stu_ID = stu_ID\n\n    def intro(self):\n\
    \        '''Introduction of Student using argument in format function'''\n   \
    \     return f'My name is {self.first_name} {self.last_name} ({self.stu_ID}).'\n\
    \n    @abc.abstractmethod\n    def pay(self):\n        '''Abstract method to be\
    \ implemented by subclasses'''\n        pass\n\n# Defining Student Not working\
    \ class\nclass Student_Not_Working(Student):\n    '''The class for students not\
    \ working'''\n\n    def pay(self):\n        return f'Payment will be {0}'\n\n\
    # Defining Student working class\nclass Student_Working(Student):\n    def __init__(self,\
    \ first_name, last_name, stu_ID,\n                 department, supervisor_full_name):\n\
    \        '''The abstract class for students working'''\n\n        super().__init__(first_name,\
    \ last_name, stu_ID)\n\n        if isinstance(department, str) and isinstance(supervisor_full_name,\
    \ str):\n            self.department = department\n            self.supervisor_full_name\
    \ = supervisor_full_name\n        else:\n            raise TypeError(\"Enter string\
    \ as value\")\n\n    @abc.abstractmethod\n    def pay(self):\n        '''Abstract\
    \ method to be implemented by subclasses'''\n        pass\n\n# Defining Student\
    \ Working fulltime class\nclass Student_Working_FT(Student_Working):\n    def\
    \ __init__(self, first_name, last_name, stu_ID,\n                 department,\
    \ supervisor_full_name, annual_rate):\n        '''Create a student working fulltime'''\n\
    \n        super().__init__(first_name, last_name, stu_ID,\n                  \
    \       department, supervisor_full_name)\n\n        if isinstance(annual_rate,\
    \ int):\n            self.annual_rate = annual_rate\n        else:\n         \
    \   raise TypeError(\"Enter integer as value\")\n\n    def pay(self):\n      \
    \  '''Calculate biweekly payment'''\n        return f'Payment will be {(self.annual_rate/365)*14:.2f}'\n\
    \n# Defining student working part time class\nclass Student_Working_PT(Student_Working):\n\
    \    '''The class for students working part time'''\n    def __init__(self, first_name,\
    \ last_name, stu_ID,\n                 department, supervisor_full_name, hourly_rate):\n\
    \        '''Create a student working part time'''\n\n        super().__init__(first_name,\
    \ last_name, stu_ID,\n                         department, supervisor_full_name)\n\
    \n        if isinstance(hourly_rate, int):\n            self.hourly_rate = hourly_rate\n\
    \        else:\n            raise TypeError(\"Enter integer as value\")\n\n  \
    \  def pay(self):\n        '''Calculate payment based on hours worked'''\n   \
    \     hours = int(input(\"Please Enter the hours worked: \"))\n        if isinstance(hours,\
    \ int):\n            return f'Payment will be {float(self.hourly_rate * hours):.2f}'\n\
    \        else:\n            raise TypeError(\"Enter integer as value\")\n```\n\
    \n### 7.2.3 Usage\n\n```python\n# Establishing an instance of Student class should\
    \ raise an error\n#stu0 = Student('Abby', 'Bolt', '0000')\n\n# Establishing an\
    \ instance of Student_Not_Working class\nstu1 = Student_Not_Working('Abby', 'Bolt',\
    \ '0001')\nprint(stu1.intro())\nprint(stu1.pay())\n\n# Establishing an instance\
    \ of Student_Working class should raise an error\n#stu2 = Student_Working('Abby',\
    \ 'Bolt', '0002', 'CS', 'Alan')\n\n# Establishing an instance of Student_Working_FT\
    \ class\nstu3 = Student_Working_FT('Abby', 'Bolt', '0003', 'CS', 'Alan Turing',\
    \ 50000)\nprint(stu3.intro())\nprint(stu3.pay())\n\n# Establishing an instance\
    \ of Student_Working_PT class\nstu4 = Student_Working_PT('Abby', 'Bolt', '0004',\
    \ 'CS', 'Alan Turing', 20)\nprint(stu4.intro())\nprint(stu4.pay())\n```\n\nMy\
    \ name is Abby Bolt (0001).\nPayment will be 0\nMy name is Abby Bolt (0003).\n\
    Payment will be 1917.81\nMy name is Abby Bolt (0004).\nPlease Enter the hours\
    \ worked: 28\nPayment will be 560.00\n\n## 7.3 UNIVERSITY SYSTEM\n\n### 7.3.1\
    \ Overview\n\nWe'll design a university system that manages different types of\
    \ people associated with the university: students, professors, and staff. This\
    \ system will demonstrate how these roles share common attributes and behaviors\
    \ while also having unique characteristics. The system should protect the personal\
    \ information of each individual (e.g., social security number), share common\
    \ attributes like `name` and `age` across different roles (students, professors,\
    \ staff), allow different roles to implement `get_role()` method differently,\
    \ and provide a general `Person` class that defines the common interface for all\
    \ roles.\n\n### 7.3.2 Implementation\n\n```python\n# Import ABC and abstractmethod\
    \ from the abc module\nfrom abc import ABC, abstractmethod\n\n# Define an abstract\
    \ class Person\nclass Person(ABC):\n    \"\"\"\n    Abstract class representing\
    \ a person at the university.\n\n    Attributes\n    ----------\n    name : str\n\
    \        The person's name.\n    age : int\n        The person's age.\n    \"\"\
    \"\n\n    # Constructor to initialize the Person class\n    def __init__(self,\
    \ name, age):\n        self._name = name\n        self._age = age\n        self.__ssn\
    \ = None  # Encapsulated attribute\n\n    # Abstract method to return the role\
    \ of the person\n    @abstractmethod\n    def get_role(self):\n        \"\"\"\n\
    \        Abstract method to return the role of the person.\n        \"\"\"\n \
    \       pass\n\n    # Method to set the Social Security Number\n    def set_ssn(self,\
    \ ssn):\n        \"\"\"\n        Sets the Social Security Number.\n\n        Parameters\n\
    \        ----------\n        ssn : str\n            The social security number.\n\
    \        \"\"\"\n        self.__ssn = ssn\n\n    # Method to get the Social Security\
    \ Number\n    def get_ssn(self):\n        \"\"\"\n        Gets the Social Security\
    \ Number.\n\n        Returns\n        -------\n        str\n            The social\
    \ security number.\n        \"\"\"\n        return f'SSN: {self.__ssn}'\n\n# Define\
    \ a concrete class Student inheriting from Person\nclass Student(Person):\n  \
    \  \"\"\"\n    Represents a student at the university.\n    \"\"\"\n\n    # Constructor\
    \ to initialize the Student class\n    def __init__(self, name, age, major):\n\
    \        super().__init__(name, age)\n        self.major = major\n\n    # Implementation\
    \ of the get_role abstract method\n    def get_role(self):\n        return f'Student\
    \ majoring in {self.major}'\n\n# Define a concrete class Professor inheriting\
    \ from Person\nclass Professor(Person):\n    \"\"\"\n    Represents a professor\
    \ at the university.\n    \"\"\"\n\n    # Constructor to initialize the Professor\
    \ class\n    def __init__(self, name, age, department):\n        super().__init__(name,\
    \ age)\n        self.department = department\n\n    # Implementation of the get_role\
    \ abstract method\n    def get_role(self):\n        return f'Professor in the\
    \ {self.department} department'\n\n# Define a concrete class Staff inheriting\
    \ from Person\nclass Staff(Person):\n    \"\"\"\n    Represents a staff member\
    \ at the university.\n    \"\"\"\n\n    # Constructor to initialize the Staff\
    \ class\n    def __init__(self, name, age, position):\n        super().__init__(name,\
    \ age)\n        self.position = position\n\n    # Implementation of the get_role\
    \ abstract method\n    def get_role(self):\n        return f'Staff member working\
    \ as {self.position}'\n```\n\n### 7.3.3 Usage\n\n```python\n# Usage\njohn = Student('John\
    \ Doe', 20, 'Computer Science')\njohn.set_ssn('123-45-6789')\nprint(john.get_role())\
    \  # Polymorphism\nprint(john.get_ssn())   # Encapsulation\n```"
