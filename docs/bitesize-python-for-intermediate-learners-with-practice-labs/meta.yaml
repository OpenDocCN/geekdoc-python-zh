    # 16.2 SETUP


    Plotly''s core plotting module is `plotly.graph_objects`, which provides a low-level
    API for building complex plots. However, for this chapter, we''ll use `plotly.express`,
    a high-level module that makes it easy to create simple but powerful visualizations
    with minimal code.


    # 16.2.1 Plotly Express


    Plotly Express, commonly imported as `px`, is a module within the Plotly library
    that simplifies the creation of complete figures with just a single function call.
    It is a recommended starting point for generating most standard plots due to its
    ease of use and efficiency.


    Plotly Express includes over 30 functions for various types of plots, with a consistent
    and easy-to-learn API. This consistency allows users to quickly switch between
    different types of visualizations, such as scatter plots, bar charts, histograms,
    and sunburst charts, during data exploration.


    The key features of the Plotly Express API include:


    +   - **Unified Interface**: By importing `plotly.express` as `px`, users can
    access all plotting functions and built-in demo datasets and color scales. Each
    function generates a `Figure` object that can be customized further.

    - **Smart Defaults with Flexibility**: The functions infer sensible defaults but
    allow for full customization.'
