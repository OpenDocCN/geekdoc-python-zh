  md: '# CHAPTER 1


    # Introduction to OOP


    OBJECT-ORIENTED PROGRAMMING (OOP) is a programming concept centered around the
    concept of objects. These objects are instances of classes, which can be thought
    of as blueprints for creating individual instances. OOP emphasizes the organization
    of code into reusable, modular units, making it easier to manage, maintain, and
    understand complex software systems. You might have noticed that all strings have
    the same basic functions, and different instances of the same data structure,
    like a list, can behave in similar ways. In this chapter, we are going to learn
    the concept of OOP in detail, including the four aspects: inheritance, polymorphism,
    encapsulation, and abstraction. We''ll also learn how to prepare clear and professional
    documentation, so other people can use our defined classes effectively.


    Are you ready? Let''s get started!


    # 1.1 THE IDEA


    # 1.1.1 Explanation


    The key idea of OOP is about classes, objects, and their relationships. Let''s
    summarize them here:


    +   - A class is a blueprint for creating objects. It defines a set of attributes
    and methods that the created object (instances) will have. Think of a class as
    a template.

    - An object is an instance of a class. It is a self-contained entity that contains
    both data (attributes, properties, fields) and functions (methods) that operate
    on the data.

    - The class defines the structure and behavior (in the form of attributes and
    methods), while objects are the concrete instances of the class. Multiple objects
    can be created from a single class, each with its own unique set of values for
    the attributes.'
