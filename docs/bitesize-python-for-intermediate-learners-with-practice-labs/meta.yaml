    print(df_dropped_columns)\n```\n\n```\n   Dallas\n0      56\n1      53\n2    \
    \  58\n3      65\n```\n\n## 12.7 处理重复值\n\n在数据预处理中，管理重复值是确保数据质量的关键步骤。pandas提供了多种方法来检测、筛选和删除重复值。\n\
    \n### 12.7.1 演示\n\n你可以使用`duplicated()`方法检测DataFrame中的重复行。此方法返回一个布尔序列，指示每一行是否为重复项。\n\
    \n```python\ndata = {\n    'A': [1, 2, 2, 2, 4],\n    'B': [1, 2, 2, 2, 4],\n\
    \    'C': [1, 2, 2, 3, 4]\n}\ndf = pd.DataFrame(data)\nprint(df)\n```\n\n```\n\
    \   A  B  C\n0  1  1  1\n1  2  2  2\n2  2  2  2\n3  2  2  3\n4  4  4  4\n```\n\
    \n```python\n# 检测重复项\nduplicates = df.duplicated()\nprint(duplicates)\n```\n\n\
    ```\n0    False\n1    False\n2     True\n3    False\n4    False\ndtype: bool\n\
    ```\n\n默认情况下，`duplicated()`会考虑所有列。你可以使用`subset`参数指定要检查重复项的列子集。\n\n```python\n\
    # 基于列'A'检测重复项\nduplicates_A = df.duplicated(subset='A')\nprint(duplicates_A)\n\
    ```\n\n```\n0    False\n1    False\n2     True\n3     True\n4    False\ndtype:\
    \ bool\n```\n\n```python\n# 基于列'C'检测重复项\nduplicates_C = df.duplicated(subset='C')\n\
    print(duplicates_C)\n```\n\n```\n0    False\n1    False\n2     True\n3    False\n\
    4    False\ndtype: bool\n```\n\n要筛选出重复行，你可以将`duplicated()`方法与布尔索引结合使用。`~`符号是`not`运算符，用于翻转布尔值。\n\
    \n```python\n# 筛选出重复行\nunique_rows = df[~df.duplicated()]\nprint(unique_rows)\n\
    ```\n\n```\n   A  B  C\n0  1  1  1\n1  2  2  2\n3  2  2  3\n4  4  4  4\n```\n\n\
    ```python\n# 基于列'A'筛选出重复行\nunique_rows_A = df[-df.duplicated(subset='A')]\nprint(unique_rows_A)\n\
    ```\n\n```\n   A  B  C\n0  1  1  1\n1  2  2  2\n4  4  4  4\n```\n\n`drop_duplicates()`方法从DataFrame中删除重复行。默认情况下，它保留每个重复行的第一次出现，并删除其余的。\n\
    \n```python\n# 删除重复行\ndf_unique = df.drop_duplicates()\nprint(df_unique)\n```\n\
    \n```\n   A  B  C\n0  1  1  1\n1  2  2  2\n3  2  2  3\n4  4  4  4\n```\n\n你也可以使用`subset`参数指定在识别重复项时要考虑哪些列。\n\
    \n```python\n# 基于列'A'删除重复项\ndf_unique_A = df.drop_duplicates(subset='A')\nprint(df_unique_A)\n\
    ```\n\n```\n   A  B  C\n0  1  1  1\n1  2  2  2\n4  4  4  4\n```\n\n要保留每个重复行的最后一次出现而不是第一次，请将`keep`参数设置为'last'。\n\
    \n```python\n# 删除重复项并保留最后一次出现\ndf_unique_last = df.drop_duplicates(keep='last')\n\
    print(df_unique_last)\n```\n\n```\n   A  B  C\n0  1  1  1\n2  2  2  2\n3  2  2\
    \  3\n4  4  4  4\n```\n\n此外，你可以通过将`inplace`参数设置为`True`来就地删除重复项，而无需创建新的DataFrame。\n\
    \n```python\n# 就地删除重复项\ndf.drop_duplicates(inplace=True)\nprint(df)\n```\n\n```\n\
    \   A  B  C\n0  1  1  1\n1  2  2  2\n3  2  2  3\n4  4  4  4\n```\n\n### 12.7.2\
