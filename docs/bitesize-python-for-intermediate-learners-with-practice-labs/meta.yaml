    \ 55000.0\nProduct B     5500.0\nProduct C    12000.0\ndtype: float64\n```\n\n\
    离散程度：\n\n1.  最小值和最大值：分别是数据中的最小值和最大值，提供了数据值范围的见解。\n2.  极差：最大值和最小值之间的差值，表示数据的分布或离散程度。\n\
    3.  标准差：衡量数据点围绕均值的离散程度，提供了数据集变异性的见解。\n4.  方差：与均值差的平方的平均值，提供了另一种衡量数据离散程度的方法。\n\n\
    ```python\n# 离散程度\nmin_sales = sales_df.min()\nmax_sales = sales_df.max()\nrange_sales\
