    \n你兴奋吗？让我们开始吧！\n\n## 7.1 IPHONE\n\n### 7.1.1 背景\n\n自从第一款iPhone问世以来，我们改变了日常生活的方式。让我们以iPhone为案例研究，向这项伟大的发明表示一点敬意。（别太当真，这是我编的）我们将iPhone家族分为三类：\n\
