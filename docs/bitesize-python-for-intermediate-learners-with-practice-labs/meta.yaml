  md: "# Abstraction\n\nABSTRACTION is another fundamental concept in object-oriented\
    \ programming (OOP). It refers to the process of hiding the internal implementation\
    \ details of an object and only exposing the necessary functionality. It allows\
    \ you to break down complex logic into manageable, understandable parts, define\
    \ a blueprint that derived classes must follow, and hide unnecessary details from\
    \ the user of the class. In simpler terms, abstraction helps to reduce complexity\
    \ by allowing programmers to focus on what an object does rather than how it does\
    \ it.\n\nAre you excited? Let’s get started!\n\n# 5.1 INTRODUCTION TO ABSTRACTION\n\
    \n# 5.1.1 Demonstration\n\nLet’s create a series of classes, Idea, G1, G2, and\
    \ G3, to demonstrate the idea of abstraction.\n\n```\n# Import the abstract base\
    \ class module\nimport abc\nfrom abc import ABC\n\n# Define an abstract base class\
    \ 'Idea' using inheritance from 'ABC' class\nclass Idea(ABC):\n    # Abstract\
    \ method 'done', which must be implemented by any subclass\n    @abc.abstractmethod\n\
    \    def done(self):\n        pass\n\n# Class 'G1' inherits from 'Idea', but does\
    \ not implement the 'done' method\nclass G1(Idea):\n    def work(self):\n    \
    \    print(\"I'm working on it!\")\n\n# Class 'G2' inherits from 'G1', overriding\
    \ the 'work' method\nclass G2(G1):\n```"
  merge: -1
  pgno: 73
- img_proc: true
  md: "```\npython\ndef work(self):\n    print(\"I'm still working on it!\")\n\n#\
    \ Class 'G3' inherits from 'G2' and implements the abstract 'done' method\nclass\
    \ G3(G2):\n    # 'done' method implementation\n    def done(self):\n        print(\"\
    I got it done!\")\n\n# Instances of G1 and G2 cannot be created because they are\
    \ abstract\n# Attempting to create an instance of G1 or G2 would raise an error\n\
    \n# Cannot create g1\n# g1 = G1()  # Uncommenting this would raise an error\n\n\
    # Cannot create g2\n# g2 = G2()  # Uncommenting this would raise an error\n\n\
    # Instance of G3 can be created since it implements the 'done' method\ng3 = G3()\n\
    g3.work()  # Calls the 'work' method from G2\ng3.done()  # Calls the 'done' method\
    \ from G3\n```\n\nI'm still working on it!\nI got it done!\n\nIn this demonstration,\
    \ the **ABC** (Abstract Base Class) is a base class that helps you create abstract\
    \ classes, and the **abstractmethod** is a decorator used to declare abstract\
    \ methods. The *Idea* class is an abstract class that declares the **done** method\
    \ as an abstract method. Any subclass of *Idea* must implement the **done** method\
    \ to be instantiated. *G1* inherits from *Idea* but doesn't implement the **done**\
    \ method, making it abstract and non-instantiable. *G2* inherits from *G1* and\
    \ overrides the **work** method. *G3* inherits from *G2* and implements the **done**\
    \ method, making it a concrete class that can be instantiated.\n\nBecause *G1*\
    \ and *G2* don't implement the abstract **done** method, they remain as abstract\
    \ classes. Instances of *G1* and *G2* cannot be created. Only *G3* can be instantiated\
    \ because it provides a concrete implementation of **done**.\n\nThis example demonstrates\
    \ the use of abstract base classes, method overriding, and inheritance in Python\
    \ OOP.\n\n# 5.2 VEHICLES\n\nLet's demonstrate abstraction using a classic example\
    \ involving vehicles. When you drive a car, you don't need to know how the engine\
    \ works, how fuel is converted into energy, or how the braking system functions\
    \ internally. All you need to do is use the interface provided: the steering wheel,\
    \ accelerator, brake pedals, and gear shift. The complex operations are hidden,\
    \ and you're only exposed to the essential functionality required to drive the\
    \ car."
