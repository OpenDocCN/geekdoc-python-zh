  md: '+   - Single Index: `arr[index]` returns the element at the specified position.

    - Negative Index: `arr[-index]` accesses elements from the end of the array.

    - Slicing: `arr[start:stop:step]` retrieves a subarray with optional start, stop,
    and step parameters.


    Accessing Single Elements: Retrieve a single element from the array using its
    index by using the index in square brackets [].


    ```

    arr = np.array([10, 20, 30, 40, 50])

    print(arr[2])  # Output: 30

    ```


    30


    Negative Indexing: Access elements from the end of the array using negative indices
    by using negative indices to count from the end of the array.


    ```

    arr = np.array([10, 20, 30, 40, 50])

    print(arr[-1])  # Output: 50 (last element)

    ```


    50


    Slicing: Retrieve a subarray or slice of the original array by using the colon
    : to specify the start, stop, and step.


    ```

    arr = np.array([10, 20, 30, 40, 50])

    print(''arr:'', arr)

    print(''arr[:3]:'', arr[:3]) # Output: [10 20 30]

    print(''arr[3:]:'', arr[3:]) # Output: [40 50]

    print(''arr[1:3]:'', arr[1:3]) # Output: [20 30]

    print(''arr[1:-1]:'', arr[1:-1]) # Output: [20 30 40]

    ```


    arr: [10 20 30 40 50]

    arr[:3]: [10 20 30]

    arr[3:]: [40 50]

    arr[1:3]: [20 30]

    arr[1:-1]: [20 30 40]


    Accessing with Step: Retrieve elements with a specific step size by using the
    step parameter in slicing to skip elements.


    ```

    arr = np.array([10, 20, 30, 40, 50])

    print(arr[::2])  # Output: [10 30 50]

    print(arr[::-1]) # Output: [50 40 30 20 10]

    print(arr[1::2]) # Output: [20 40]

    print(arr[:-1:2]) # Output: [10 30]

    ```


    [10 30 50]

    [50 40 30 20 10]

    [20 40]

    [10 30]


