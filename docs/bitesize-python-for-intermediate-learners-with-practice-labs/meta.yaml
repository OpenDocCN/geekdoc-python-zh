- md: "## 11.7 MERGING DATAFRAMES\n\n### 11.7.1 Demonstration\n\nMerging DataFrames\
    \ by columns involves combining them based on common keys present in their columns.\
    \ This operation is similar to joining tables in a database based on a common\
    \ column.\n\nDifferent Joining Methods:\n\n1.  Inner Join: This method returns\
    \ only the rows where the keys are present in both DataFrames.\n2.  Outer Join:\
    \ This method returns all rows from both DataFrames and fills in missing values\
    \ with NaN where keys are not present in both DataFrames.\n3.  Left Join: This\
    \ method returns all rows from the left DataFrame and fills in missing values\
    \ with NaN where keys are not present in the right DataFrame.\n4.  Right Join:\
    \ This method returns all rows from the right DataFrame and fills in missing values\
    \ with NaN where keys are not present in the left DataFrame.\n\n```python\n# Sample\
    \ DataFrames\ndf1 = pd.DataFrame({'Key': ['A', 'B', 'C'], 'Value1': [1, 2, 3]})\n\
    print('df1')\nprint(df1)\ndf2 = pd.DataFrame({'Key': ['B', 'C', 'D'], 'Value2':\
    \ [4, 5, 6]})\nprint('\\ndf2')\nprint(df2)\n```\n\ndf1\n\n| | Key | Value1 |\n\
    |---|---|---|\n| 0 | A | 1 |\n| 1 | B | 2 |\n| 2 | C | 3 |\n\ndf2\n\n| | Key |\
    \ Value2 |\n|---|---|---|\n| 0 | B | 4 |\n| 1 | C | 5 |\n| 2 | D | 6 |\n\n```python\n\
    # Inner Join\ninner_merged = pd.merge(df1, df2, on='Key', how='inner')\nprint('Inner\
    \ Join:')\nprint(inner_merged)\n```\n\nInner Join:\n\n| | Key | Value1 | Value2\
    \ |\n|---|---|---|---|\n| 0 | B | 2 | 4 |\n| 1 | C | 3 | 5 |\n\n```python\n# Outer\
    \ Join\nouter_merged = pd.merge(df1, df2, on='Key', how='outer')\nprint('Outer\
    \ Join:')\nprint(outer_merged)\n```\n\nOuter Join:\n\n| | Key | Value1 | Value2\
