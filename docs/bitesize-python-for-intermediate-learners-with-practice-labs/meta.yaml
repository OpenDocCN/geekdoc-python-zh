  - "[PAGE 352]\n\n# Basic 3D Line Plot\n\n![](img/3a52c3eb24252c71aa92bda44916f9e6_352_0.png)\n\
    \nFigure 16.60 A basic 3D line plot showing a line in three dimensions.\n\n```\n\
    # Create a basic 3D line plot\nfig = px.line_3d(df_line_3d, x='x_values', y='y_values',\
    \ z='z_values',\n                title='Basic 3D Line Plot')\nfig.show()\n```\n\
    \nLet’s create another 3D line plot with multiple lines, each representing a different\
    \ group or category (Figure 16.61). This example introduces a categorical variable\
    \ group, with each line representing a different group. The 3D line plot now shows\
    \ two trajectories, one for each group, which helps to compare the patterns across\
    \ different categories.\n\n```\n# Creating a dataset with multiple lines\ndf_line_3d['group']\
    \ = np.random.choice(['Group 1', 'Group 2'], size=100)\n\n# Create a 3D line plot\
    \ with multiple lines\nfig = px.line_3d(df_line_3d, x='x_values', y='y_values',\
    \ z='z_values',\n                color='group',\n                title='3D Line\
    \ Plot with Multiple Lines')\nfig.show()\n```\n\nWe summarize the plots using\
    \ Plotly in Table 16.2.\n\n# 16.13 INTERACT WITH GENAI\n\nHere are some questions\
    \ and prompts you can interact with generative AI tools, including ChatGPT.\n\n\
    +   - Why is Plotly preferred for creating interactive visualizations?"
