    # 15.4 CATEGORICAL PLOTS


    # 15.4.1 Demonstration


    The `catplot()` function in Seaborn visualizes the relationship between categorical
    data and other variables. By using the `kind` parameter, you can create strip
    plots, swarm plots, box plots, violin plots, bar plots, and point plots to explore
    the relationship between categorical variables and other data in your dataset.
    The ''tips'' dataset provides an excellent starting point for practicing these
    techniques.


    Strip Plot (`kind=''strip''`): A strip plot shows individual data points along
    an axis, which can be useful for visualizing the distribution of data points within
    categories. The following strip plot (Figure 15.17) displays the distribution
    of total bill amounts for each day of the week.


    ```

    # Create a strip plot

    sns.catplot(data=tips, x=''day'', y=''total_bill'', kind=''strip'')


    # Show the plot

    plt.show()

    ```


    Swarm Plot (`kind=''swarm''`): A swarm plot is similar to a strip plot but adjusts
    the positions of the data points to prevent them from overlapping, providing a
    clearer view of the distribution. The following swarm plot (Figure 15.18) shows
    the distribution of total bill amounts for each day of the week without overlapping
    points.'
