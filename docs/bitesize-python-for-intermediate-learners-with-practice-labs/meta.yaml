    \ 方法是公共的，提供了受控的访问来修改或查看余额。因此，`BankAccount` 对象的内部状态（`__balance`）受到保护，免受未经授权的更改，确保只有定义的方法才能修改它。\n\
    \n```python\n# 定义 BankAccount 类\nclass BankAccount:\n    def __init__(self, owner,\
    \ balance=0):\n        # 公共属性：owner\n        self.owner = owner\n\n        # 私有属性：balance（由双下划线表示）\n\
    \        self.__balance = balance\n\n    # 存款方法\n    def deposit(self, amount):\n\
    \        if amount > 0:\n            self.__balance += amount\n            print(f'{amount}\
    \ deposited. New balance: {self.__balance}')\n        else:\n            print('Deposit\
    \ amount must be positive')\n\n    # 取款方法\n    def withdraw(self, amount):\n \
    \       if 0 < amount <= self.__balance:\n            self.__balance -= amount\n\
    \            print(f'{amount} withdrawn. New balance: {self.__balance}')\n   \
    \     else:\n            print('Insufficient balance or invalid withdrawal amount')\n\
    \n    # 获取当前余额的方法\n    def get_balance(self):\n        return self.__balance\n\
    \n# 创建一个 BankAccount 对象\naccount = BankAccount('Alice', 1000)\n\n# 访问公共属性\nprint(account.owner)\
    \  # 输出：Alice\n\n# 尝试直接访问私有属性（引发 AttributeError）\n# print(account.__balance)\n\
    \n# 使用公共方法与私有属性交互\naccount.deposit(500)  # 输出：500 deposited. New balance: 1500\n\
    account.withdraw(200)  # 输出：200 withdrawn. New balance: 1300\n\n# 使用公共方法获取余额\n\
    print(f'Current balance: {account.get_balance()}')  # 输出：1300\n```\n\nAlice\n\
