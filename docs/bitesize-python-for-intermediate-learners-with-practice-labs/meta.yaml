  md: "# Different Joining Methods:\n\n+   1. Inner Join: This method returns only\
    \ the rows where the keys are present in both DataFrames.\n2. Outer Join: This\
    \ method returns all rows from both DataFrames and fills in missing values with\
    \ NaN where keys are not present in both DataFrames.\n3. Left Join: This method\
    \ returns all rows from the left DataFrame and fills in missing values with NaN\
    \ where keys are not present in the right DataFrame.\n4. Right Join: This method\
    \ returns all rows from the right DataFrame and fills in missing values with NaN\
    \ where keys are not present in the left DataFrame.\n\n```\n# Sample DataFrames\n\
    df1 = pd.DataFrame({'Key': ['A', 'B', 'C'], 'Value1': [1, 2, 3]})\nprint('df1')\n\
    print(df1)\ndf2 = pd.DataFrame({'Key': ['B', 'C', 'D'], 'Value2': [4, 5, 6]})\n\
    print('\\ndf2')\nprint(df2)\n```\n\ndf1\n  Key  Value1\n0   A        1\n1   B\
    \        2\n2   C        3\n\ndf2\n  Key  Value2\n0   B        4\n1   C      \
    \  5\n2   D        6\n\n```\n# Inner Join\ninner_merged = pd.merge(df1, df2, on='Key',\
    \ how='inner')\nprint('Inner Join:')\nprint(inner_merged)\n```\n\nInner Join:\n\
    \  Key  Value1  Value2\n0   B        2        4\n1   C        3        5\n\n```\n\
    # Outer Join\nouter_merged = pd.merge(df1, df2, on='Key', how='outer')\nprint('Outer\
    \ Join:')\nprint(outer_merged)\n```\n\nOuter Join:\n  Key  Value1  Value2\n0 \
    \  A      1.0      NaN\n1   B      2.0      4.0\n2   C      3.0      5.0\n3  \
    \ D      NaN      6.0"
