    # 1.3 FOUR ASPECTS


    OOP is a powerful concept in software development that helps in organizing and
    structuring code. There are four main OOP concepts: inheritance, polymorphism,
    encapsulation, and abstraction:


    +   - Inheritance allows a new class (child or subclass) to inherit the attributes
    and methods of an existing class (parent or superclass). This promotes code reuse
    and establishes a natural hierarchy between classes. We introduce inheritance
    in detail in Chapter 2.

    - Polymorphism allows objects of different classes to be treated as objects of
    a common superclass. The most common use of polymorphism in OOP is when a parent
    class reference is used to refer to a child class object and the method call is
    resolved at runtime. We introduce polymorphism in detail in Chapter 3.

    - Encapsulation is the practice of bundling the data and the methods that operate
    on the data into a single unit or class, and restricting access to some of the
    object’s components. This means that the internal state of an object is hidden
    from the outside world, and access is controlled via public methods (getters and
    setters). We introduce encapsulation in detail in Chapter 4.

    - Abstraction is the concept of hiding the complex implementation details and
    showing only the essential features of the object. It allows focusing on the object’s
    functionality without worrying about the intricate inner workings. We introduce
    abstraction in detail in Chapter 5.


    In summary, encapsulation protects data, inheritance promotes code reuse and establishes
    relationships between classes, polymorphism allows for flexibility and dynamic'
