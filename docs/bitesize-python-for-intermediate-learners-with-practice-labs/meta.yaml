    \ the 'is-a' relationship in inheritance.\n\n## CHAPTER 3\n\n## Polymorphism\n\
    \nPOLYMORPHISM IS A CORE concept in object-oriented programming (OOP) that allows\
    \ objects of different classes to be treated as objects of a common superclass.\
    \ It enables a single interface to represent different types, which can be particularly\
    \ powerful when working with inheritance.\n\nIn simpler terms, polymorphism allows\
    \ you to define methods in a base class and have those methods be overridden by\
    \ subclasses to provide specific behavior. This allows for flexibility and extensibility\
    \ in code, where the same method can behave differently depending on the object\
    \ calling it.\n\nAre you ready? Let's get started!\n\n### 3.1 WHAT IS POLYMORPHISM\n\
    \n#### 3.1.1 Demonstration\n\nLet's define some classes to demonstrate how the\
    \ general action `speak()` of all `Animal` objects behaves differently in the\
    \ specific objects of the subclasses: `Cat`, `Lion`, `LionBaby`.\n\n```python\n\
    # Base class Animal\nclass Animal:\n    # Method speak for the Animal class\n\
    \    def speak(self):\n        # Default behavior for speak method in Animal class\n\
    \        print('Make some noise and I don\\'t know what it sounds like...')\n\n\
    # Derived class Cat inheriting from Animal\nclass Cat(Animal):\n    # Method speak\
    \ overridden in Cat class\n    def speak(self):\n        # Specific behavior for\
    \ speak method in Cat class\n        print('Meo')\n\n# Derived class Lion inheriting\
    \ from Cat\n```"
