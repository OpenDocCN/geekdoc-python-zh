    \ 7, 9])\n\n减法（-）：从一个数组的对应元素中减去另一个数组的元素，或从数组的每个元素中减去标量。\n\n```\narr1 = np.array([10,\
    \ 20, 30])\narr2 = np.array([1, 2, 3])\nresult = arr1 - arr2 # 输出：array([ 9, 18,\
    \ 27])\nresult\n```\n\narray([ 9, 18, 27])\n\n乘法（*）：将两个数组的对应元素相乘，或将数组的每个元素乘以标量。\n\
    \n```\narr1 = np.array([1, 2, 3])\narr2 = np.array([4, 5, 6])\nresult = arr1 *\
    \ arr2 # 输出：array([ 4, 10, 18])\nresult\n```\n\narray([ 4, 10, 18])\n\n除法（/）：将一个数组的对应元素除以另一个数组的元素，或将数组的每个元素除以标量。\n\
    \n```\narr1 = np.array([10, 20, 30])\narr2 = np.array([1, 2, 3])\nresult = arr1\
    \ / arr2 # 输出：array([10., 10., 10.])\nresult\n```\n\narray([10., 10., 10.])\n\n\
    总之，对列表的操作本质上不是逐元素的。例如，将两个列表相加会连接它们，而不是执行逐元素加法。要执行逐元素操作，你需要使用循环或列表推导式：\n\n```\n\
    list1 = [1, 2, 3]\nlist2 = [4, 5, 6]\nresult = list1 + list2\nresult\n```\n\n\
    [1, 2, 3, 4, 5, 6]\n\n```\nlist1 = [1, 2, 3]\nlist2 = [4, 5, 6]\nresult = [x +\
    \ y for x, y in zip(list1, list2)] # 输出：[5, 7, 9]\nresult\n```\n\n[5, 7, 9]\n\n\
    另一方面，NumPy ndarray 支持直接的逐元素操作。这意味着加法、减法、乘法和除法等操作会自动且高效地应用于数组的每个元素。由于内部优化和编译代码，这种向量化方法比使用循环快得多。\n\
    \n```\narr1 = np.array([1, 2, 3])\narr2 = np.array([4, 5, 6])\nresult = arr1 +\
    \ arr2 # 输出：array([5, 7, 9])\nresult\n```\n\narray([5, 7, 9])\n\n### 8.8.2 练习\n\
