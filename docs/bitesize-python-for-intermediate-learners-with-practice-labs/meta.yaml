- md: "## 12.4 DESCRIPTIVE STATISTICS FOR CATEGORICAL COLUMNS\n\n### 12.4.1 Demonstration\n\
    \nDescriptive statistics for `DataFrame` categorical columns provide insights\
    \ into the distribution of categorical values within the dataset. Three commonly\
    \ used methods for analyzing categorical data are `value_counts()`, `unique()`,\
    \ and `nunique()`. Here's a brief explanation of each method:\n\n`value_counts()`:\
    \ This method returns a `Series` containing counts of unique values in the categorical\
    \ column. It helps identify the frequency of each unique value in the column,\
    \ providing insights into the distribution of categorical data.\n\n`unique()`:\
    \ The `unique()` method returns an array of unique values present in the categorical\
    \ column. It is useful for quickly identifying the distinct categories within\
    \ the column.\n\n`nunique()`: This method returns the number of unique values\
    \ in the categorical column. It provides a count of the distinct categories present,\
    \ allowing for easy determination of the cardinality of the categorical variable.\n\
    \n```python\n# Sample DataFrame representing student grades by subject\ngrades_data\
    \ = {\n    'StudentID': [1, 2, 3, 4, 5, 6],\n    'Subject': ['Math', 'Science',\
    \ 'Math',\n                'English', 'Science', 'English'],\n    'Grade': ['A',\
    \ 'B', 'B', 'C', 'A', 'B']\n}\n\n# Create DataFrame\ngrades_df = pd.DataFrame(grades_data)\n\
    ```\n\n```python\n# Count each unique value\nprint('Value Counts:')\nprint(grades_df['Subject'].value_counts())\n\
    print(grades_df['Grade'].value_counts())\n```\n\nValue Counts:\nMath       2\n\
    Science    2\nEnglish    2\nName: Subject, dtype: int64\nB    3\nA    2\nC   \
    \ 1\nName: Grade, dtype: int64\n\n```python\n# Display unique values\nprint('Unique\
    \ Values:')\nprint('Subject:', grades_df['Subject'].unique())\nprint('Grade:',\
    \ grades_df['Grade'].unique())\n```\n\nUnique Values:\nSubject: ['Math' 'Science'\
    \ 'English']\nGrade: ['A' 'B' 'C']\n\n```python\n# Count the number of unique\
    \ values\nprint('Number of Unique Values:')\nprint('Subject:', grades_df['Subject'].nunique())\n\
    print('Grade:', grades_df['Grade'].nunique())\n```\n\nNumber of Unique Values:\n\
    Subject: 3\nGrade: 3\n\n### 12.4.2 Practice\n\n```python\n# Creating a dummy dataset\n\
