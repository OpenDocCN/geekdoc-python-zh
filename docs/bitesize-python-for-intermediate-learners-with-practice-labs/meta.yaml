    they can hold mixed data types, but they aren''t optimized for numerical or scientific
    operations. The `ndarray`, provided by the Numpy package, is a more efficient
    alternative for handling large datasets and numerical computations. Unlike lists
    or tuples, ndarrays are specialized for numerical data and support multidimensional
    arrays, like matrices. While lists and tuples are more general-purpose, ndarrays
    trade that generality for efficiency, especially when performing mathematical
    calculations on large amounts of data.


    Are you ready? Let''s get started!


    # 8.1 WHAT IS A N-DIMENSIONAL ARRAY


    # 8.1.1 Explanation


    In Python''s NumPy package, an N-dimensional array, often called `ndarray`, is
    a powerful and flexible structure for handling large datasets and performing complex
    mathematical operations efficiently.


    NumPy N-dimensional Array (`ndarray`) has following major features:


    +   - **Performance**: Generally faster for numerical operations compared to Python
    lists, especially for large datasets.

    - **Homogeneity**: All elements in an ndarray are of the same data type, which
    allows for efficient computation and memory usage.

    - **Indexing/Slicing**: Allows for advanced indexing and slicing, making it easy
    to access and manipulate subarrays.

    - **Structure**: An ndarray can have multiple dimensions (axes). For example,
    a 2D array is like a matrix with rows and columns, while a 3D array could be thought
    of as a stack of matrices.

    - **Operations**: Supports a wide range of mathematical operations (e.g., addition,'
  - '[PAGE 106]


    multiplication) that are optimized for performance and can be applied element-wise.


    # 8.2 LESSON: COMPARE NDARRAY WITH LIST


    Comparing to ndarray, Python list differs in following ways:


    +   - **Performance**: Generally slower for numerical tasks compared to NumPy
    arrays due to the overhead of Python''s dynamic typing and the lack of optimized
    numerical operations.

    - **Homogeneity**: Lists can contain elements of different data types, which may
    lead to inefficiencies in computations and require additional handling for mathematical
    operations.

    - **Indexing/Slicing**: Supports basic indexing and slicing, but lacks the advanced
    capabilities of NumPy arrays.

    - **Structure**: A Python list is a one-dimensional collection of items. While
    lists can contain nested lists (e.g., lists of lists) to simulate multidimensional
    arrays, this approach is less intuitive and less efficient for numerical computations.

    - **Operations**: Basic operations are available, but they are not optimized for
    mathematical computations. Lists lack built-in support for element-wise operations.


