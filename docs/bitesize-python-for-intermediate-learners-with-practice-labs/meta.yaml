  mdcn: "## 11.7 合并数据框\n\n### 11.7.1 演示\n\n按列合并数据框涉及根据其列中存在的公共键来组合它们。此操作类似于基于公共列在数据库中连接表。\n\
    \n不同的连接方法：\n\n1.  **内连接**：此方法仅返回键在两个数据框中都存在的行。\n2.  **外连接**：此方法返回两个数据框的所有行，并在键在两个数据框中都不存在的位置用\
    \ NaN 填充缺失值。\n3.  **左连接**：此方法返回左数据框的所有行，并在键在右数据框中不存在的位置用 NaN 填充缺失值。\n4.  **右连接**：此方法返回右数据框的所有行，并在键在左数据框中不存在的位置用\
    \ NaN 填充缺失值。\n\n```python\n# 示例数据框\ndf1 = pd.DataFrame({'Key': ['A', 'B', 'C'],\
