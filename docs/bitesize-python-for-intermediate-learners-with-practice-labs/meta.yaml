- md: "## 15.6.2 Practice\n\nHere are some practice problems to help you understand\
    \ and apply the `style` and `size` parameters in Seaborn using the 'tips' dataset.\n\
    \nTask: Create a scatter plot (Figure 15.51) to visualize the relationship between\
    \ `total_bill` and `tip`, using different marker styles based on the `time` of\
    \ day and varying the marker sizes based on the day of the week.\n\n```\n# Create\
    \ a scatter plot with style and size\nsns.relplot(data=tips, x='total_bill', y='tip',\n\
    \            hue='time', style='time',\n            size='day', kind='scatter')\n\
    \n# Show the plot\nplt.show()\n```\n\nTask: Create a line plot (Figure 15.52)\
    \ to visualize the relationship between `size` of the party and `total_bill`,\
    \ using different line styles based on the `smoker` status.\n\n```\n# Create a\
    \ line plot with style\nsns.relplot(data=tips, x='size', y='total_bill',\n   \
    \         hue='smoker', style='smoker',\n            kind='line', markers=True,\
    \ dashes=True)\n\n# Show the plot\nplt.show()\n```\n\nTask: Create a scatter plot\
    \ (Figure 15.53) to visualize the relationship between `tip` and `size` of the\
    \ party, using different marker styles based on `sex` and varying the marker sizes\
    \ based on `total_bill`.\n\n```\n# Create a scatter plot with style and size\n\
    sns.relplot(data=tips, x='tip', y='size',\n            hue='sex', style='sex',\n\
    \            size='total_bill', kind='scatter')\n\n# Show the plot\nplt.show()\n\
    ```\n\n## 15.7 FACET GRIDS\n\n### 15.7.1 Demonstration\n\nFacet grids are a powerful\
    \ feature in Seaborn that allow you to create multiple subplots based on the values\
    \ of one or more categorical variables. This helps in visualizing complex datasets\
    \ by breaking down the data into smaller, more manageable plots, making it easier\
    \ to identify patterns and relationships within subsets of the data.\n\nIn Seaborn,\
    \ facet grids can be created using the `FacetGrid` class or higher-level functions\
    \ like `relplot()`, `catplot()`, and `displot()`.\n\nThe `relplot()` function\
    \ can create scatter and line plots with facet grids. We'll demonstrate a scatter\
    \ plot with facets based on `smoker` and `time`.\n\nIn the following scatter plot\
    \ (Figure 15.54):\n\n- `col='smoker'`: Creates separate columns for smokers and\
    \ non-smokers.\n- `row='time'`: Creates separate rows for lunch and dinner.\n\
    - `hue='sex'`: Colors the data points based on the customer's gender.\n\n```\n\
    # Create a scatter plot with facets based on smoker and time\nsns.relplot(data=tips,\
    \ x='total_bill', y='tip',\n            col='smoker', row='time',\n          \
    \  hue='sex', kind='scatter')\n\n# Show the plot\nplt.show()\n```\n\nThe `displot()`\
    \ function can create histograms, KDE plots, and ECDF plots with facet grids.\
    \ We'll demonstrate a histogram with facets based on smoker.\n\nIn the following\
    \ histogram (Figure 15.55):\n\n- `col='smoker'`: Creates separate columns for\
    \ smokers and non-smokers.\n- `kde=True`: Adds a KDE plot on top of the histograms.\n\
    \n```\n# Create a histogram with facets based on day\nsns.displot(data=tips, x='total_bill',\
    \ col='smoker', kde=True)\n\n# Show the plot\nplt.show()\n```\n\nThe `catplot()`\
    \ function can create various types of categorical plots with facet grids. We'll\
    \ demonstrate a box plot with facets based on time. In the following box plot\
    \ (Figure 15.56):\n\n- `col='time'`: Creates separate columns for lunch and dinner.\n\
    - `x='day'`: Shows the distribution of total_bill for each day of the week.\n\
    - `kind='box'`: Specifies the type of plot as a box plot.\n\n```\n# Create a box\
    \ plot with facets based on time\nsns.catplot(data=tips, x='day', y='total_bill',\
    \ col='time', kind='box')\n\n# Show the plot\nplt.show()\n```\n\n### 15.7.2 Practice\n\
    \nHere are some practice problems to help you understand and apply facet grids\
    \ in Seaborn using the 'tips' dataset. These problems use different attributes\
    \ that were not used in the demonstrations.\n\nTask: Create a scatter plot (Figure\
    \ 15.57) to visualize the relationship between total_bill and tip, using separate\
    \ facets for each day of the week and differentiating the data points by time.\n\
    \n```\n# Create a scatter plot with facets based on day and time\nsns.relplot(data=tips,\
    \ x='total_bill', y='tip',\n            col='day', hue='time', kind='scatter')\n\
    \n# Show the plot\nplt.show()\n```\n\nTask: Create a KDE plot (Figure 15.58) to\
    \ visualize the distribution of total_bill, using separate facets for each sex\
    \ and adding the KDE plot for each subset.\n\n```\n# Create a KDE plot with facets\
    \ based on sex\nsns.displot(data=tips, x='total_bill', col='sex', kind='kde',\
    \ fill=True)\n\n# Show the plot\nplt.show()\n```\n\nTask: Create a bar plot (Figure\
    \ 15.59) to visualize the average total_bill for each day, using separate facets\
    \ for time and differentiating the bars by smoker status.\n\n```\n# Create a bar\
    \ plot with facets based on time and smoker status\nsns.catplot(data=tips, x='day',\
    \ y='total_bill',\n            col='time', hue='smoker', kind='bar')\n\n# Show\
    \ the plot\nplt.show()\n```\n\nTask: Create a violin plot (Figure 15.60) to visualize\
    \ the distribution of tip for each day, using separate facets for smoker status\
    \ and sex.\n\n```\n# Create a violin plot with facets based on smoker status and\
    \ sex\nsns.catplot(data=tips, x='day', y='tip',\n            col='smoker', row='sex',\
    \ kind='violin')\n\n# Show the plot\nplt.show()\n```\n\nTask: Create a histogram\
    \ (Figure 15.61) to visualize the distribution of tip, using separate facets for\
    \ time and differentiating the bars by day.\n\n```\n# Create a histogram with\
    \ facets based on time and day\nsns.displot(data=tips, x='tip', col='time', hue='day',\
    \ multiple='stack')\n\n# Show the plot\nplt.show()\n```\n\n## 15.8 LESSON: LMPLOT\n\
    \n### 15.8.1 Demonstration\n\nlmplot is a powerful function in Seaborn designed\
    \ for visualizing linear relationships between variables. It combines the capabilities\
    \ of a scatter plot and a regression line plot, providing a simple and intuitive\
    \ way to explore and understand relationships in your data. The lmplot function\
    \ is particularly useful for performing linear regression analysis and visualizing\
    \ the results.\n\nKey Features of lmplot:\n\n- **Scatter Plot with Regression\
    \ Line**: Displays data points and fits a linear regression model, plotting the\
    \ regression line.\n- **Faceted Plots**: Easily create multiple plots based on\
    \ subsets of the data."
  mdcn: "## 15.6.2 练习\n\n以下是一些练习题，旨在帮助你理解并应用 Seaborn 中的 `style` 和 `size` 参数，使用 'tips'\
    \ 数据集。\n\n任务：创建一个散点图（图 15.51），以可视化 `total_bill` 和 `tip` 之间的关系，根据一天中的 `time` 使用不同的标记样式，并根据星期几改变标记大小。\n\
    \n```\n# 创建带有样式和大小的散点图\nsns.relplot(data=tips, x='total_bill', y='tip',\n    \
    \        hue='time', style='time',\n            size='day', kind='scatter')\n\n\
    # 显示图表\nplt.show()\n```\n\n任务：创建一个折线图（图 15.52），以可视化聚会 `size` 和 `total_bill` 之间的关系，根据\
    \ `smoker` 状态使用不同的线型。\n\n```\n# 创建带有样式的折线图\nsns.relplot(data=tips, x='size', y='total_bill',\n\
    \            hue='smoker', style='smoker',\n            kind='line', markers=True,\
    \ dashes=True)\n\n# 显示图表\nplt.show()\n```\n\n任务：创建一个散点图（图 15.53），以可视化 `tip` 和聚会\
    \ `size` 之间的关系，根据 `sex` 使用不同的标记样式，并根据 `total_bill` 改变标记大小。\n\n```\n# 创建带有样式和大小的散点图\n\
    sns.relplot(data=tips, x='tip', y='size',\n            hue='sex', style='sex',\n\
    \            size='total_bill', kind='scatter')\n\n# 显示图表\nplt.show()\n```\n\n\
    ## 15.7 分面网格\n\n### 15.7.1 演示\n\n分面网格是 Seaborn 中一个强大的功能，它允许你根据一个或多个分类变量的值创建多个子图。这有助于通过将数据分解为更小、更易于管理的图表来可视化复杂数据集，从而更容易识别数据子集中的模式和关系。\n\
    \n在 Seaborn 中，可以使用 `FacetGrid` 类或更高级的函数（如 `relplot()`、`catplot()` 和 `displot()`）来创建分面网格。\n\
    \n`relplot()` 函数可以创建带有分面网格的散点图和折线图。我们将演示一个基于 `smoker` 和 `time` 进行分面的散点图。\n\n在以下散点图（图\
    \ 15.54）中：\n\n- `col='smoker'`：为吸烟者和非吸烟者创建单独的列。\n- `row='time'`：为午餐和晚餐创建单独的行。\n\
    - `hue='sex'`：根据顾客性别为数据点着色。\n\n```\n# 创建基于吸烟者和时间的分面散点图\nsns.relplot(data=tips,\
    \ x='total_bill', y='tip',\n            col='smoker', row='time',\n          \
    \  hue='sex', kind='scatter')\n\n# 显示图表\nplt.show()\n```\n\n`displot()` 函数可以创建带有分面网格的直方图、KDE\
    \ 图和 ECDF 图。我们将演示一个基于吸烟者进行分面的直方图。\n\n在以下直方图（图 15.55）中：\n\n- `col='smoker'`：为吸烟者和非吸烟者创建单独的列。\n\
    - `kde=True`：在直方图上方添加 KDE 图。\n\n```\n# 创建基于日期的分面直方图\nsns.displot(data=tips, x='total_bill',\
    \ col='smoker', kde=True)\n\n# 显示图表\nplt.show()\n```\n\n`catplot()` 函数可以创建带有分面网格的各种类型的分类图。我们将演示一个基于时间进行分面的箱线图。在以下箱线图（图\
    \ 15.56）中：\n\n- `col='time'`：为午餐和晚餐创建单独的列。\n- `x='day'`：显示每周每天的 total_bill 分布。\n\
    - `kind='box'`：指定图表类型为箱线图。\n\n```\n# 创建基于时间的分面箱线图\nsns.catplot(data=tips, x='day',\
    \ y='total_bill', col='time', kind='box')\n\n# 显示图表\nplt.show()\n```\n\n### 15.7.2\
    \ 练习\n\n以下是一些练习题，旨在帮助你理解并应用 Seaborn 中的分面网格，使用 'tips' 数据集。这些问题使用了演示中未使用的不同属性。\n\
    \n任务：创建一个散点图（图 15.57），以可视化 total_bill 和 tip 之间的关系，为每周的每一天使用单独的分面，并通过时间区分数据点。\n\
    \n```\n# 创建基于日期和时间的分面散点图\nsns.relplot(data=tips, x='total_bill', y='tip',\n  \
    \          col='day', hue='time', kind='scatter')\n\n# 显示图表\nplt.show()\n```\n\
    \n任务：创建一个 KDE 图（图 15.58），以可视化 total_bill 的分布，为每个性别使用单独的分面，并为每个子集添加 KDE 图。\n\n\
    ```\n# 创建基于性别的分面KDE图\nsns.displot(data=tips, x='total_bill', col='sex', kind='kde',\
    \ fill=True)\n\n# 显示图表\nplt.show()\n```\n\n任务：创建一个条形图（图 15.59），以可视化每天的平均 total_bill，为时间使用单独的分面，并通过吸烟者状态区分条形。\n\
    \n```\n# 创建基于时间和吸烟者状态的分面条形图\nsns.catplot(data=tips, x='day', y='total_bill',\n\
    \            col='time', hue='smoker', kind='bar')\n\n# 显示图表\nplt.show()\n```\n\
    \n任务：创建一个小提琴图（图 15.60），以可视化每天 tip 的分布，为吸烟者状态和性别使用单独的分面。\n\n```\n# 创建基于吸烟者状态和性别的分面小提琴图\n\
    sns.catplot(data=tips, x='day', y='tip',\n            col='smoker', row='sex',\
    \ kind='violin')\n\n# 显示图表\nplt.show()\n```\n\n任务：创建一个直方图（图 15.61），以可视化 tip 的分布，为时间使用单独的分面，并通过日期区分条形。\n\
    \n```\n# 创建基于时间和日期的分面直方图\nsns.displot(data=tips, x='tip', col='time', hue='day',\
    \ multiple='stack')\n\n# 显示图表\nplt.show()\n```\n\n## 15.8 课程：LMPLOT\n\n### 15.8.1\
    \ 演示\n\nlmplot 是 Seaborn 中一个强大的函数，专门用于可视化变量之间的线性关系。它结合了散点图和回归线图的功能，提供了一种简单直观的方式来探索和理解数据中的关系。lmplot\
    \ 函数对于执行线性回归分析和可视化结果特别有用。\n\nlmplot 的主要特点：\n\n- **带有回归线的散点图**：显示数据点并拟合线性回归模型，绘制回归线。\n\
    - **分面图**：轻松地根据数据的子集创建多个图表。"
