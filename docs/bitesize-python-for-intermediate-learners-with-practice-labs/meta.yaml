    Kernel Density Estimate Plot (`kind=''kde''`): A kernel density estimate (KDE)
    plot is a smoothed version of the histogram, which estimates the probability density
    function of the data. The following KDE plot (Figure 15.9) shows the smoothed
    distribution of the total bill amounts in the ''tips'' dataset.


    ```

    # Create a KDE plot

    sns.displot(tips, x=''total_bill'', kind=''kde'')


    # Show the plot

    plt.show()

    ```


    Empirical Cumulative Distribution Function Plot (`kind=''ecdf''`): An ECDF plot
    shows the proportion of observations less than or equal to a particular value,
    providing a cumulative view of the data distribution. The following ECDF plot
    (Figure 15.10) displays the cumulative distribution of the total bill amounts
