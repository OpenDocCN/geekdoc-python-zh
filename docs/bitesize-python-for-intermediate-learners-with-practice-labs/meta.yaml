    \ controlled access to modify or view the balance. Thus, the internal state (`__balance`)\
    \ of the `BankAccount` object is protected from unauthorized changes, ensuring\
    \ that only the defined methods can modify it.\n\n```python\n# Define the BankAccount\
    \ class\nclass BankAccount:\n    def __init__(self, owner, balance=0):\n     \
    \   # Public attribute: owner\n        self.owner = owner\n\n        # Private\
