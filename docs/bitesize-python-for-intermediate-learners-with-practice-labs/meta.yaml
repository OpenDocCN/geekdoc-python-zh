    ### 15.5.1 演示


    Seaborn 中的 **hue** 参数通过颜色区分来添加一个分类维度，从而增强可视化效果。使用 **hue**，你可以创建信息更丰富、视觉上更具吸引力的可视化图表，帮助你从数据中发现更深层次的见解。本节将演示如何在
    `relplot()`、`displot()` 和 `catplot()` 函数中，结合 ''tips'' 数据集，将 **hue** 参数与各种类型的图表一起使用。提供的示例展示了如何将
    **hue** 与各种图表结合使用，以增强你的数据分析。


    在 `relplot()` 中使用 **hue**：`relplot()` 函数可以创建散点图和折线图。在下面的散点图（图 15.29）中，数据点根据顾客的性别进行着色，从而可以比较男性和女性在总账单与小费金额之间的关系。


    ```

    # 创建带有 hue 的散点图

    sns.relplot(data=tips, x=''total_bill'', y=''tip'', hue=''sex'', kind=''scatter'')


