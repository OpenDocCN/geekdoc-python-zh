- md: '## 15.8.2 Practice


    The `lmplot` function in Seaborn is used to create linear regression plots. It
    allows you to visualize the linear relationship between two variables, along with
    confidence intervals and various customizations. Here are some practice problems
    to help you understand and apply `lmplot` using the ''tips'' dataset with different
    attributes.


    Task: Create a linear regression plot (Figure 15.66) to visualize the relationship
    between `size` and `tip`.


    ```

    # Create a simple linear regression plot

    sns.lmplot(data=tips, x=''size'', y=''tip'')

    ```


    Task: Create a linear regression plot (Figure 15.67) to visualize the relationship
    between size and tip, differentiating the data points by sex.


    ```

    # Create a linear regression plot with hue based on sex

    sns.lmplot(data=tips, x=''size'', y=''tip'', hue=''sex'')


    # Show the plot

    plt.show()

    ```


    Task: Create a linear regression plot (Figure 15.68) to visualize the relationship
    between size and tip, using separate facets for each time of day.


    ```

    # Create a linear regression plot with facets based on time

    sns.lmplot(data=tips, x=''size'', y=''tip'', col=''time'')


    # Show the plot

    plt.show()

    ```


    Task: Create a linear regression plot (Figure 15.69) to visualize the relationship
    between size and tip, using separate facets for each day of the week and differentiating
    the data points by smoker status.


    ```

    # Create a linear regression plot with multiple facets

    sns.lmplot(data=tips, x=''size'', y=''tip'', col=''day'', hue=''smoker'')


    # Show the plot

    plt.show()

    ```


    Task: Create a linear regression plot (Figure 15.70) to visualize the relationship
    between **size** and **tip**, fitting a second-order polynomial regression.


    ```

    # Create a linear regression plot with polynomial order 2

    sns.lmplot(data=tips, x=''size'', y=''tip'', order=2)


    # Show the plot

    plt.show()

    ```


    ## 15.9 MULTIPLE PLOTS


    ### 15.9.1 Demonstration


    Multiplots in Seaborn are powerful tools for visualizing relationships between
    multiple variables in a dataset. They help in identifying patterns, correlations,
    and distributions in a comprehensive manner. In this section, we will introduce
    two key multiplot functions: `pairplot` and `jointplot`.


    The `pairplot` function creates a grid of plots, where each variable in the dataset
    is plotted against each other. It helps in visualizing the pairwise relationships
    and the distribution of each variable (Figure 15.71).


    ```

    # Create a pairplot with hue based on the ''sex'' attribute

    sns.pairplot(tips, hue=''sex'')

    ```


    The `jointplot` function creates a bivariate plot with marginal histograms or
    density plots. It helps in visualizing the relationship between two variables,
    along with their individual distributions (Figure 15.72).


    ```

    # Create a jointplot for the relationship between ''total_bill'' and ''tip''

    sns.jointplot(x=''total_bill'', y=''tip'', data=tips, kind=''scatter'')


    # Show the plot

    plt.show()

    ```


    We can do color differentiation using the hue in pairplot (Figure 15.73):


    ```

    # Create a pairplot with regression lines and hue based on ''sex''

    sns.pairplot(tips, hue=''sex'', kind=''reg'')


    # Show the plot

    plt.show()

    ```


    We can create a KDE jointplot using kind=''kde'' (Figure 15.74):


    ```

    # Show the relationship between ''total_bill'' and ''tip'' with KDE

    sns.jointplot(x=''total_bill'', y=''tip'', data=tips, kind=''kde'')


    # Show the plot

    plt.show()

    ```


    While we can create various plots using the `kind` parameter in the general plots,
    we can also create specific plots directly with different control over them. We
    summarize these specific plots in [Table 15.1](Table 15.1).


    ## 15.10 INTERACT WITH GENAI


    Here are some questions and prompts you can interact with generative AI tools,
    including ChatGPT.


    - Why is Seaborn considered a high-level data visualization library?

    - What types of plots are commonly used in Seaborn, and what are their purposes?

    - How to customize Seaborn plots with themes like `darkgrid` or `whitegrid`?

    - What is the main difference between a Matplotlib plot and a Seaborn plot?

    - How do you use the `hue` parameter in Seaborn to add a dimension to your plot?

    - Can Seaborn plots be customized further using Matplotlib? If so, how?

    - How can you adjust the color palettes in Seaborn for better visual appeal?

    - How can you use Seaborn to add confidence intervals to your visualizations?

    - Show how to use Seaborn to identify outliers in numerical data.

    - What should you do if a Seaborn plot appears difficult to interpret?


    ## 15.11 EXPLORE MORE SEABORN


    Here are the useful documentations you may refer to:


    - Overview: https://seaborn.pydata.org/tutorial/function_overview.html

    - Statistical relationships: https://seaborn.pydata.org/tutorial/relational.html

    - Distributions of data: https://seaborn.pydata.org/tutorial/distributions.html

    - Categorical data: https://seaborn.pydata.org/tutorial/categorical.html

    - Estimating regression fits: https://seaborn.pydata.org/tutorial/regression.html

    - Full API: https://seaborn.pydata.org/api.html'
  mdcn: '## 15.8.2 实践


    Seaborn 中的 `lmplot` 函数用于创建线性回归图。它允许你可视化两个变量之间的线性关系，同时包含置信区间和各种自定义选项。以下是一些实践问题，帮助你使用
    ''tips'' 数据集和不同属性来理解和应用 `lmplot`。


    任务：创建一个线性回归图（图 15.66），以可视化 `size` 和 `tip` 之间的关系。


    ```

    # 创建一个简单的线性回归图

    sns.lmplot(data=tips, x=''size'', y=''tip'')

    ```


    任务：创建一个线性回归图（图 15.67），以可视化 size 和 tip 之间的关系，并按性别区分数据点。


    ```

    # 创建一个基于性别的线性回归图

    sns.lmplot(data=tips, x=''size'', y=''tip'', hue=''sex'')


    # 显示图表

    plt.show()

    ```


    任务：创建一个线性回归图（图 15.68），以可视化 size 和 tip 之间的关系，并为一天中的每个时间段使用单独的分面。


    ```

    # 创建一个基于时间的线性回归图

    sns.lmplot(data=tips, x=''size'', y=''tip'', col=''time'')


    # 显示图表

    plt.show()

    ```


    任务：创建一个线性回归图（图 15.69），以可视化 size 和 tip 之间的关系，为一周的每一天使用单独的分面，并按吸烟者状态区分数据点。


    ```

    # 创建一个具有多个分面的线性回归图

    sns.lmplot(data=tips, x=''size'', y=''tip'', col=''day'', hue=''smoker'')


    # 显示图表

    plt.show()

    ```


    任务：创建一个线性回归图（图 15.70），以可视化 **size** 和 **tip** 之间的关系，并拟合二阶多项式回归。


    ```

    # 创建一个多项式阶数为2的线性回归图

    sns.lmplot(data=tips, x=''size'', y=''tip'', order=2)


    # 显示图表

    plt.show()

    ```


    ## 15.9 多图


    ### 15.9.1 演示


    Seaborn 中的多图是可视化数据集中多个变量之间关系的强大工具。它们有助于全面识别模式、相关性和分布。在本节中，我们将介绍两个关键的多图函数：`pairplot`
    和 `jointplot`。


    `pairplot` 函数创建一个图表网格，其中数据集中的每个变量都与其他变量进行绘图。它有助于可视化成对关系以及每个变量的分布（图 15.71）。


    ```

    # 创建一个基于 ''sex'' 属性的 pairplot

    sns.pairplot(tips, hue=''sex'')

    ```


    `jointplot` 函数创建一个带有边际直方图或密度图的双变量图。它有助于可视化两个变量之间的关系，以及它们各自的分布（图 15.72）。


    ```

    # 创建一个用于 ''total_bill'' 和 ''tip'' 之间关系的 jointplot

    sns.jointplot(x=''total_bill'', y=''tip'', data=tips, kind=''scatter'')


    # 显示图表

    plt.show()

    ```


    我们可以在 pairplot 中使用 hue 进行颜色区分（图 15.73）：


    ```

    # 创建一个带有回归线且基于 ''sex'' 的 pairplot

    sns.pairplot(tips, hue=''sex'', kind=''reg'')


    # 显示图表

    plt.show()

    ```


    我们可以使用 kind=''kde'' 创建 KDE jointplot（图 15.74）：


    ```

    # 使用 KDE 显示 ''total_bill'' 和 ''tip'' 之间的关系

    sns.jointplot(x=''total_bill'', y=''tip'', data=tips, kind=''kde'')


    # 显示图表

    plt.show()

    ```


    虽然我们可以使用通用绘图中的 `kind` 参数创建各种图表，但也可以直接创建特定图表并对其进行不同的控制。我们在 [表 15.1](Table 15.1)
    中总结了这些特定图表。


    ## 15.10 与生成式AI交互


    以下是一些你可以与生成式AI工具（包括 ChatGPT）交互的问题和提示。


    - 为什么 Seaborn 被认为是一个高级数据可视化库？

    - Seaborn 中常用哪些类型的图表，它们的用途是什么？

    - 如何使用 `darkgrid` 或 `whitegrid` 等主题自定义 Seaborn 图表？

    - Matplotlib 图表和 Seaborn 图表的主要区别是什么？

    - 如何在 Seaborn 中使用 `hue` 参数为图表添加一个维度？

    - Seaborn 图表是否可以使用 Matplotlib 进一步自定义？如果可以，如何操作？

    - 如何调整 Seaborn 中的调色板以获得更好的视觉效果？

    - 如何使用 Seaborn 为你的可视化添加置信区间？

    - 展示如何使用 Seaborn 识别数值数据中的异常值。

    - 如果 Seaborn 图表看起来难以解释，你应该怎么做？


    ## 15.11 探索更多 SeABORN


    以下是你可能参考的有用文档：


    - 概述：https://seaborn.pydata.org/tutorial/function_overview.html

    - 统计关系：https://seaborn.pydata.org/tutorial/relational.html

    - 数据分布：https://seaborn.pydata.org/tutorial/distributions.html

    - 分类数据：https://seaborn.pydata.org/tutorial/categorical.html

    - 估计回归拟合：https://seaborn.pydata.org/tutorial/regression.html

    - 完整 API：https://seaborn.pydata.org/api.html'
