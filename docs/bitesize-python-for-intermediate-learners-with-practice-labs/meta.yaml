    plt.xlabel(''x'')


    # 为 y 轴添加标签

    plt.ylabel(''x sqrt'')


    # 显示图表

    plt.show()

    ```


    ## 13.4 图例


    ### 13.4.1 演示


    图例有助于识别图表中的不同数据系列，尤其是在同时绘制多条线或多个数据集时（图 13.7）。


    语法：


    - plt.plot(x, y, label=''Label'')：为图表添加标签。

    - plt.legend()：在图表上显示图例。


    ```python

    # 示例数据

