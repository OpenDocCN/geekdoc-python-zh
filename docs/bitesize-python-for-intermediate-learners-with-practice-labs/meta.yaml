    图 16.58 一个数据点根据映射着色的 3D 散点图。\n\n```python\n# Adding a fourth variable for color\
    \ mapping\ndf_3d['color_variable'] = np.random.choice(['Group 1', 'Group 2'],\n\
    \                                            size=100)\n\n# Create a 3D scatter\
    \ plot with color mapping\nfig = px.scatter_3d(df_3d, x='x_values', y='y_values',\
    \ z='z_values',\n                    color='color_variable',\n               \
    \     title='3D Scatter Plot with Color Mapping')\nfig.show()\n```\n\n让我们创建一个\
    \ 3D 散点图，其中点的大小代表一个数值变量（图 16.59）。此示例引入了一个数值变量 **size_variable**，它控制 3D 散点图中点的大小。较大的值会产生更大的点，从而更容易识别与此变量相关的趋势。\n\
    \n```python\n# Adding a variable for size mapping\ndf_3d['size_variable'] = np.random.uniform(5,\
