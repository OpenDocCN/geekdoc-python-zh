  md: '# # Pandas


    PANDAS IS A PYTHON package designed for fast, flexible, and expressive data structures,
    making it easy and intuitive to work with relational or labeled data. It aims
    to be a fundamental tool for practical data analysis in Python, with the broader
    goal of being the most powerful and flexible open-source data analysis tool available
