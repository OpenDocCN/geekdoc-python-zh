- md: "## SECTION I: OBJECT-ORIENTED PROGRAMMING\n\nSECTION I: OBJECT-ORIENTED PROGRAMMING\
    \ introduces a powerful programming approach that organizes code into classes\
    \ and objects, to help manage and scale complex systems more effectively. In this\
    \ section, you’ll learn about the core concepts of OOP, including classes and\
    \ objects, which serve as the blueprint and instances of your code, respectively.\
    \ The section also explores the four fundamental principles of OOP: inheritance,\
    \ polymorphism, abstraction, and encapsulation, which help create flexible and\
    \ reusable code. Additionally, you’ll learn how to write clear class documentation,\
    \ making your code easier to read and work with. Even if you don’t plan to create\
    \ your own packages, understanding how OOP plays a key role in how they’re built\
    \ will help you use popular libraries like NumPy, Pandas, and Matplotlib more\
    \ effectively. This knowledge prepares you to work confidently with the tools\
    \ covered in this book.\n\nBy the end of this section, you will be able to:\n\n\
    - Understand the foundational concepts of object-oriented programming, including\
    \ classes and objects.\n- Apply inheritance to create hierarchical relationships\
    \ between classes.\n- Utilize polymorphism to design flexible and interchangeable\
    \ code components.\n- Implement abstraction and encapsulation to hide complexity\
    \ and protect data within your programs.\n- Professionally document class definitions\
    \ to improve code clarity and user efficiency.\n\n## CHAPTER 1\n\n### Introduction\
    \ to OOP\n\nOBJECT-ORIENTED PROGRAMMING (OOP) is a programming concept centered\
    \ around the concept of objects. These objects are instances of classes, which\
    \ can be thought of as blueprints for creating individual instances. OOP emphasizes\
    \ the organization of code into reusable, modular units, making it easier to manage,\
    \ maintain, and understand complex software systems. You might have noticed that\
    \ all strings have the same basic functions, and different instances of the same\
    \ data structure, like a list, can behave in similar ways. In this chapter, we\
    \ are going to learn the concept of OOP in detail, including the four aspects:\
    \ inheritance, polymorphism, encapsulation, and abstraction. We'll also learn\
    \ how to prepare clear and professional documentation, so other people can use\
    \ our defined classes effectively.\n\nAre you ready? Let's get started!\n\n###\
    \ 1.1 THE IDEA\n\n#### 1.1.1 Explanation\n\nThe key idea of OOP is about classes,\
    \ objects, and their relationships. Let's summarize them here:\n\n- A class is\
    \ a blueprint for creating objects. It defines a set of attributes and methods\
    \ that the created object (instances) will have. Think of a class as a template.\n\
    - An object is an instance of a class. It is a self-contained entity that contains\
    \ both data (attributes, properties, fields) and functions (methods) that operate\
    \ on the data.\n- The class defines the structure and behavior (in the form of\
    \ attributes and methods), while objects are the concrete instances of the class.\
