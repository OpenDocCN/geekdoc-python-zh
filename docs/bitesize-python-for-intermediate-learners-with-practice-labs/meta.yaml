    # 13.7 SUBPLOTS


    # 13.7.1 Demonstration


    Creating subplots allows you to display multiple plots in a single figure, which
    is useful for comparing different datasets or visualizations (Figure 13.12).


    Syntax: `fig, axs = plt.subplots(nrows, ncols)`


    +   - nrows: Number of rows of subplots.

    - ncols: Number of columns of subplots.


    ```

    # Sample data

    x = np.linspace(0, 1, 10)

    y1 = x*2

    y2 = x**2

    y3 = x**3

    y4 = np.sqrt(x)


    # Creating subplots

    fig, axs = plt.subplots(2, 2)


    # Plotting the data

    axs[0,0].plot(x, y1, color=''g'', linestyle=''--'', marker=''o'')

    axs[0,0].set_title(''Square'')


    axs[0,1].plot(x, y2, color=''b'', linestyle=''-'', marker=''x'')

    axs[0,1].set_title(''Linear'')


    axs[1,0].plot(x, y3, color=''r'', linestyle=''-'', marker=''D'')

    axs[1,0].set_title(''Cube'')


    axs[1,1].plot(x, y4, color=''y'', linestyle=''-'', marker=''d'')

    axs[1,1].set_title(''Sqrt'')


    # Display the plots

    plt.tight_layout(pad=0.4, w_pad=0.5, h_pad=1.0)

    plt.show()

    ```


    There is an alternative way of creating subplots using `plt.subplot(nrows, ncols,
    index)` (Figure 13.13).


    Syntax: `plt.subplot(nrows, ncols, index)`


    +   - nrows: Number of rows of subplots.

    - ncols: Number of columns of subplots.

    - index: The position of the subplot you are currently working on.


    Using `plt.subplot(nrows, ncols, index)` provides a flexible way to manage multiple
    plots in a single figure. You specify the total number of rows and columns of
    subplots, and the index indicates the position of the current subplot. This method
    is useful for creating more complex grid layouts of plots.'
