    # 10.4.1 Demonstration


    Pandas Series supports a wide range of mathematical operations, making it a powerful
    tool for data manipulation and analysis. These operations can be applied element-wise,
    and pandas aligns Series by their index labels, allowing for easy data handling.


    You can perform basic arithmetic operations such as addition, subtraction, multiplication,
    and division on Series.


    ```

    s1 = pd.Series([1, 2, 3, 4, 5])

    s2 = pd.Series([10, 20, 30, 40, 50])


