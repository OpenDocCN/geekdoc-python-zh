  md: 'You can use index labels to access elements. This is done using the `loc` attribute
    or directly using the square bracket notation if the `Series` has an explicit
    index.


    ```

    # Creating a Series with a custom index

    data = [10, 20, 30, 40, 50]

    index = [''a'', ''b'', ''c'', ''d'', ''e'']

    s = pd.Series(data, index=index)


    # Accessing elements using index labels

    print(s[''a''])  # Output: 10

    print(s.loc[''c''])  # Output: 30


    # Accessing a range of elements using index labels

    print(s[''b'':''d''])  # Output:

    # b    20

