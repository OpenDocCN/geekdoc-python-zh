    print(duplicates)\n```\n\n```\n0    False\n1    False\n2     True\n3    False\n\
    4    False\ndtype: bool\n```\n\nBy default, `duplicated()` considers all columns.\
    \ You can specify a subset of columns to check for duplicates using the `subset`\
    \ parameter.\n\n```python\n# Detecting duplicates based on column 'A'\nduplicates_A\
