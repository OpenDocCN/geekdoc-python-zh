    \n- Original one: with 1 camera, 1 sensor.\n- Old one: with 2 or more cameras\
    \ (user-input), and 2 sensors.\n- Recent one: with 2 or more cameras (user-input),\
    \ and 2 or more sensors (user-input).\n\n### 7.1.2 Implementation\n\n```python\n\
    import abc\nfrom abc import ABC\n\n# Abstract base class for all iPhones\nclass\
    \ iphone(ABC):\n    '''The wrapper class of all iphones'''\n\n    def __init__(self,\
    \ series, camera, sensor):\n        '''The initiator of all iphones\n\n      \
    \  Keyword arguments:\n        series (str) -- the series name of the iphone\n\
    \        camera (int) -- the number of cameras\n        sensor (int) -- the number\
    \ of sensors\n        '''\n        self.family = 'iPhone'\n        self.series\
    \ = series\n        self.camera = camera\n        self.sensor = sensor\n\n   \
    \ # Abstract method to be implemented by subclasses\n    @abc.abstractmethod\n\
    \    def __repr__(self):\n        '''\n        Abstract method\n        '''\n\
    \        pass\n\n# Concrete subclass for Original iPhones\nclass OriginaliPhone(iphone):\n\
    \    '''The class for Original iphones'''\n\n    def __init__(self, series):\n\
