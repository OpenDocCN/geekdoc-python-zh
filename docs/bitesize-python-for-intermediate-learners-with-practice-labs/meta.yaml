    \ 一个包含多条线的三维线图，每条线代表一个不同的组或类别。\n\n## 表 16.2 Plotly 图表类型总结\n\n| 类型 | 基本语法 | 场景\
    \ |\n|---|---|---|\n| 散点图 | `px.scatter()` | 显示两个变量之间的关系。示例：分析销售额与营销支出。 |\n| 折线图\
    \ | `px.line()` | 可视化随时间变化的趋势或变化。示例：跟踪每日温度变化。 |\n| 面积图 | `px.area()` | 突出折线图下方的面积以显示数量。示例：可视化随时间变化的累计销售额。\
    \ |\n| 柱状图 | `px.bar()` | 比较分类数据。示例：比较不同产品类别的月度收入。 |\n| 时间线图 | `px.timeline()`\
    \ | 在时间线上可视化事件。示例：项目管理以跟踪任务持续时间。 |\n| 漏斗图 | `px.funnel()` | 显示流程中的阶段和每个阶段的流失。示例：可视化从潜在客户到转化的销售管道。\
    \ |\n| 饼图 | `px.pie()` | 显示整体中的比例。示例：按产品类型可视化市场份额。 |\n| 直方图 | `px.histogram()`\
    \ | 显示单个变量的分布。示例：分析客户年龄的分布。 |\n| 三维散点图 | `px.scatter_3d()` | 可视化三个变量之间的关系。示例：绘制包含纬度、经度和海拔的地理数据。\
    \ |\n| 三维线图 | `px.line_3d()` | 在三维空间中跟踪移动或趋势。示例：可视化随时间变化的飞行路径和高度变化。 |\n\n## 下一步是什么？\n\
    \n恭喜！你已经成为一名 Python 大师！你现在对面向对象编程、NumPy 和 Pandas 中的高级数据结构，以及 Matplotlib、Seaborn\
    \ 和 Plotly 等数据可视化工具有了扎实的理解。这是一项巨大的成就！你现在能够使用 Python 进行基本的数据分析。\n\n庆祝之后，你可能想了解更多关于数据科学流程以及每个步骤中使用的工具。例如，如何进行数据整理？这包括数据收集、操作、理解、预处理和存储。此外，如何进行数据分析？这包括分类、回归、聚类、主成分分析、关联规则挖掘、异常值检测等等。我们有一本书，*《Python数据挖掘：理论、应用与案例研究》*，将通过理论、应用和真实案例研究的详尽解释来指导你学习每个主题。我们希望你能不断成长，在数据科学领域变得更加精通！\n\
    \n我很高兴能在那里与你相遇，并继续我们的旅程。\n\n![](img/3a52c3eb24252c71aa92bda44916f9e6_356_0.png)\n\
