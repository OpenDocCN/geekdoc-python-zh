    \n## 抽象\n\n抽象是面向对象编程（OOP）的另一个基本概念。它指的是隐藏对象的内部实现细节，只暴露必要功能的过程。它允许你将复杂逻辑分解为可管理、可理解的部分，定义派生类必须遵循的蓝图，并向类的用户隐藏不必要的细节。简单来说，抽象通过允许程序员关注对象做什么而不是如何做来帮助降低复杂性。\n\
    \n你准备好了吗？让我们开始吧！\n\n### 5.1 抽象简介\n\n### 5.1.1 演示\n\n让我们创建一系列类：`Idea`、`G1`、`G2`\
