    You can use index labels to access elements. This is done using the `loc` attribute
    or directly using the square bracket notation if the `Series` has an explicit
    index.


    ```

    # Creating a Series with a custom index

    data = [10, 20, 30, 40, 50]

    index = [''a'', ''b'', ''c'', ''d'', ''e'']

