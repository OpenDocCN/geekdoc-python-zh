  md: "Motorcycle engine stopped.\n\nIn this example, the `Vehicle` class is an abstract\
    \ class. It contains abstract methods (`start_engine()` and `stop_engine()`),\
    \ which are methods without any implementation. Subclasses are required to provide\
    \ concrete implementations for these methods. These methods are defined using\
    \ the `@abstractmethod` decorator. They serve as a template for subclasses, ensuring\
    \ that certain methods are implemented. The `honk()` method in the `Vehicle` class\
    \ is a concrete method with implementation. It can be used directly by subclasses\
    \ or overridden if needed. `Car` and `Motorcycle` inherit from `Vehicle`. They\
    \ provide specific implementations for the abstract methods, so they are concrete\
    \ classes.\n\n# 5.3 PAYMENT\n\nLet's consider another classic example, which is\
    \ a payment system where different types of payments (like credit card and PayPal)\
    \ need to be processed. We'll use abstraction to define a common interface for\
    \ all payment types.\n\n```\n# Import ABC and abstractmethod from the abc module\n\
    from abc import ABC, abstractmethod\n\n# Define an abstract base class Payment\n\
    class Payment(ABC):\n    # Abstract method must be implemented by any subclass\n\
    \    @abstractmethod\n    def process_payment(self, amount):\n        pass\n\n\
    # Define a concrete class CreditCardPayment inheriting from Payment\nclass CreditCardPayment(Payment):\n\
    \    # Implementation of the process_payment abstract method\n    def process_payment(self,\
    \ amount):\n        print(f'Processing credit card payment of {amount} dollars.')\n\
    \n# Define a concrete class PayPalPayment inheriting from Payment\nclass PayPalPayment(Payment):\n\
    \    # Implementation of the process_payment abstract method\n    def process_payment(self,\
    \ amount):\n        print(f'Processing PayPal payment of {amount} dollars.')\n\
    \n# Using the abstract interface\n# Create an instance of CreditCardPayment and\
