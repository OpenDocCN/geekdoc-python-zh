    位置：\n\n1.  百分位数：低于某个百分比数据点的值，提供了数据集分布的见解。\n2.  四分位数：将数据集分成四个相等部分的值，每个部分包含 25%\
    \ 的数据，表示数据集的分布情况。\n\n**describe()** 方法：\n\n1.  describe()：一个生成描述性统计的方法，总结数据集的集中趋势、离散程度和形状，包括计数、均值、标准差、最小值、最大值和百分位数。\n\
    \n```python\n# 位置\npercentiles_sales = sales_df.quantile([0.01, 0.1, 0.4, 0.99])\n\
