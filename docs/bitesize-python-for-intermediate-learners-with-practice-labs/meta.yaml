    # 10.3 ACCESSING A SERIES


    # 10.3.1 Demonstration


    Accessing elements in a Series is straightforward and can be done using several
    methods. Here, we''ll explore various techniques to access elements by position,
    index label, slicing, and Boolean indexing.


    You can use integer positions (similar to accessing elements in a list or NumPy
    array) to access elements in a Series. This is done using the iloc attribute.


    ```

    data = [10, 20, 30, 40, 50]

    s = pd.Series(data)


    # Accessing the first element (position 0)

    print(s.iloc[0])  # Output: 10


    # Accessing the last element (position -1)

    print(s.iloc[-1])  # Output: 50


    # Accessing a range of elements

    print(s.iloc[1:4])  # Output:

    # 1    20

    # 2    30

    # 3    40

    # dtype: int64

    ```


    10

    50

    1    20

    2    30

    3    40

