    # 15.5 ADDING COLORS


    # 15.5.1 Demonstration


    The **hue** parameter in Seaborn enhances visualizations by adding a categorical
    dimension through color differentiation. With hue, you can create more informative
    and visually appealing visualizations that help uncover deeper insights from your
    data. This lesson will demonstrate how to use the **hue** parameter with various
    types of plots in `relplot()`, `displot()`, and `catplot()` functions using the
    ''tips'' dataset. The examples provided demonstrate how to use **hue** with various
    kinds of plots to enhance your data analysis.


    Using **hue** with `relplot()`: The `relplot()` function can create scatter plots
    and line plots. In the following scatter plot (Figure 15.29), data points are
    colored based on the customer''s gender, allowing comparison of the relationship
    between total bill and tip amounts for males and females.


    ```

    # Create a scatter plot with hue

    sns.relplot(data=tips, x=''total_bill'', y=''tip'', hue=''sex'', kind=''scatter'')


    # Show the plot

    plt.show()

    ```


    In the following line plot (Figure 15.30), the lines are colored based on the
    customer''s gender, showing the trend of total bill amounts with party size for
    males and females.'
