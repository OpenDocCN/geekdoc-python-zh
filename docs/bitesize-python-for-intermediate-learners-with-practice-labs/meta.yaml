  md: "# CHAPTER 2\n\n# Inheritance\n\nINHERITANCE IS A FUNDAMENTAL concept in object-oriented\
    \ programming that enables a subclass (child class) to inherit attributes and\
    \ methods from a superclass (parent class). Inheritance improves code reuse by\
    \ allowing subclasses to have existing functionalities without duplication, while\
    \ also creating a structured hierarchy that organizes classes logically. Central\
    \ to inheritance is the *is-a* relationship, where a subclass represents a specialized\
    \ version of its parent (e.g., a Dog class is a specific type of the more general\
    \ Animal class). This relationship ensures clarity in design, promotes modularity,\
    \ and aligns real-world categorization with code structure. Are you ready? Let’s\
    \ get started!\n\n# 2.1 WHAT IS INHERITANCE?\n\nLet’s read the definition of four\
    \ classes, A, B, C, and D, and observe how subclasses inherit the attributes and\
    \ methods from their superclasses.\n\n# 2.1.1 Demonstration\n\n```\n# Defining\
    \ a class A, and two subclasses B and C of A\nclass A:\n    # Initialize an object\
    \ of class A with attributes att1 and att2\n    def __init__(self, att1, att2):\n\
    \        self.att1, self.att2 = att1, att2\n\n    # Method act defined in class\
    \ A\n    def act(self):\n        print('The act defined in Class A')\n\n# Defining\
    \ subclass B of A\nclass B(A):\n    # Initialize an object of class B with att1,\
    \ att2, and att3\n    def __init__(self, att1, att2, att3):\n        super().__init__(att1,\
    \ att2)  # Call the constructor of class A\n        self.att3 = att3\n```"
