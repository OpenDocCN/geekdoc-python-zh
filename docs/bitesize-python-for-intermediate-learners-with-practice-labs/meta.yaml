    \ for their purpose and examples, in Table 1.2 for readers' convenience.\n\n###\
    \ TABLE 1.2 Important Functions in Class Definition\n\n| Function | Explanation\
    \ | Examples |\n| :--- | :--- | :--- |\n| `__init__` | Initializes the object\
    \ with given attributes. | `__init__(self, make, model, year, color)` |\n| `__repr__`\
    \ | Returns a string representation of the object, often for developers. | `__repr__(self)`\
    \ |\n| `__str__` | Returns a user-friendly string representation of the object.\
    \ | `__str__(self)` |\n| `__eq__` | Compares two objects for equality. | `__eq__(self,\
    \ obj)` |\n| `__lt__` | Compares if one object is less than another. | `__lt__(self,\
    \ obj)` |\n| `__gt__` | Compares if one object is greater than another. | `__gt__(self,\
    \ obj)` |\n| Other methods | Define actions the object can perform (e.g., start,\
    \ drive, promote). | `start(self)`, `give_raise(self, amount)`, `make_call(self,\
    \ phone_number)` |\n\n## 1.3 FOUR ASPECTS\n\nOOP is a powerful concept in software\
    \ development that helps in organizing and structuring code. There are four main\
    \ OOP concepts: inheritance, polymorphism, encapsulation, and abstraction:\n\n\
    - Inheritance allows a new class (child or subclass) to inherit the attributes\
    \ and methods of an existing class (parent or superclass). This promotes code\
    \ reuse and establishes a natural hierarchy between classes. We introduce inheritance\
    \ in detail in Chapter 2.\n- Polymorphism allows objects of different classes\
    \ to be treated as objects of a common superclass. The most common use of polymorphism\
    \ in OOP is when a parent class reference is used to refer to a child class object\
    \ and the method call is resolved at runtime. We introduce polymorphism in detail\
    \ in Chapter 3.\n- Encapsulation is the practice of bundling the data and the\
    \ methods that operate on the data into a single unit or class, and restricting\
    \ access to some of the object’s components. This means that the internal state\
    \ of an object is hidden from the outside world, and access is controlled via\
    \ public methods (getters and setters). We introduce encapsulation in detail in\
    \ Chapter 4.\n- Abstraction is the concept of hiding the complex implementation\
    \ details and showing only the essential features of the object. It allows focusing\
    \ on the object’s functionality without worrying about the intricate inner workings.\
    \ We introduce abstraction in detail in Chapter 5.\n\nIn summary, encapsulation\
    \ protects data, inheritance promotes code reuse and establishes relationships\
    \ between classes, polymorphism allows for flexibility and dynamic"
