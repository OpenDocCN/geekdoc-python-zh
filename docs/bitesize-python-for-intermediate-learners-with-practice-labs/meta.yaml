    # 第 13 章


    ## Matplotlib（基础）


    数据可视化对于有效传递信息至关重要，它能使复杂数据更易于理解。Matplotlib 是一个广泛使用的 Python 库，提供了一种简单直观的方式来创建可视化图表。你将学习
    Matplotlib 的基础知识，从创建一个简单的图表到根据特定需求进行自定义。你将学习如何绘制数据点、调整标签和标题，以及修改视觉元素以增强清晰度。最后，你将为使用
    Matplotlib 更有效地呈现数据打下坚实的基础。准备好了吗？让我们开始吧！


    ## 13.1 简介


    ### 13.1.1 说明


    Matplotlib 是 Python 中一个功能强大且广泛使用的绘图库，旨在创建静态、动画和交互式可视化图表。它是数据科学家和分析师的基础工具，使他们能够将复杂的数据集转换为易于理解的图形和图表。Matplotlib
    的重要性在于其多功能性和易用性；只需几行代码，它就能生成各种图表，包括折线图、条形图、直方图、散点图等。这使得它对于探索性数据分析和有效呈现研究结果至关重要。其优点包括提供广泛的自定义选项、对图表美学的精细控制，以及与
    NumPy 和 pandas 等其他库的集成。然而，它也有一些缺点，例如由于其庞大的函数库，初学者的学习曲线较陡峭，有时对于复杂可视化的语法也略显繁琐。尽管存在这些缺点，Matplotlib
    仍然是 Python 数据可视化生态系统中的基石，因其稳健性和全面的功能而备受推崇。


    要在 Python 中使用 Matplotlib 包，用户需要导入 `pyplot` 模块。传统做法是使用别名 `plt` 以简化和方便。这可以通过在脚本开头包含以下行来实现：`import
    matplotlib.pyplot as plt`。这种做法在数据科学社区中被广泛采用，确保你的代码符合常见惯例，并易于他人理解。


    ```python

    import matplotlib.pyplot as plt

    ```


    ## 13.2 简单图表


    ### 13.2.1 演示


    让我们从创建一个简单的折线图（图 13.1）开始，以熟悉 Matplotlib。


    **语法：** plt.plot(x, y)


    - x：x 轴的数据。

    - y：y 轴的数据。


    ```python

    # 示例数据

    x = [1, 2, 3, 4]

    y = [1, 4, 9, 16]


    # 绘制数据

    plt.plot(x, y)


    # 显示图表

    plt.show()

    ```


    ### 13.2.2 练习


    我们使用以下虚拟数据集进行练习：


    ```python

