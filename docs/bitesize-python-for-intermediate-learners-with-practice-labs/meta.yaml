    \    -45\n# dtype: int64\n\n# Multiplication\nprint(s1 * s2)  # Output:\n# 0 \
    \    10\n# 1     40\n# 2     90\n# 3    160\n# 4    250\n# dtype: int64\n\n# Division\n\
    print(s1 / s2)  # Output:\n# 0    0.1\n# 1    0.1\n# 2    0.1\n# 3    0.1\n# 4\
    \    0.1\n# dtype: float64\n```\n\nPandas Series works seamlessly with NumPy functions,\
    \ allowing for complex mathematical operations.\n\n```python\n# Applying NumPy\
    \ functions\nprint(np.sqrt(s1))  # Output:\n# 0    1.000000\n# 1    1.414214\n\
    # 2    1.732051\n# 3    2.000000\n# 4    2.236068\n# dtype: float64\n\nprint(np.exp(s1))\
    \   # Output:\n# 0      2.718282\n# 1      7.389056\n# 2     20.085537\n# 3  \
    \   54.598150\n# 4    148.413159\n# dtype: float64\n```\n\nPandas provides various\
    \ aggregation functions to compute summary statistics.\n\n```python\n# Sum\nprint(s1.sum())\
    \  # Output: 15\n\n# Mean\nprint(s1.mean())  # Output: 3.0\n\n# Standard Deviation\n\
    print(s1.std())  # Output: 1.5811388300841898\n\n# Minimum\nprint(s1.min())  #\
    \ Output: 1\n\n# Maximum\nprint(s1.max())  # Output: 5\n```\n\nPandas aligns Series\
    \ by their index labels during operations, and you can handle missing data using\
    \ methods like fillna().\n\n```python\ns3 = pd.Series([1, 2, 3], index=['a', 'b',\
    \ 'c'])\ns4 = pd.Series([4, 5, 6], index=['b', 'c', 'd'])\n\n# Addition with alignment\n\
    print(s3 + s4)  # Output:\n# a    NaN\n# b    6.0\n# c    8.0\n# d    NaN\n# dtype:\
    \ float64\n\n# Filling missing values\nprint((s3 + s4).fillna(0))  # Output:\n\
    # a    0.0\n# b    6.0\n# c    8.0\n# d    0.0\n# dtype: float64\n```\n\nYou can\
    \ apply custom functions to Series using the apply() method.\n\n```python\n# Custom\
    \ function to square each element\ndef square(x):\n    return x * x\n\nprint(s1.apply(square))\
    \  # Output:\n# 0     1\n# 1     4\n# 2     9\n# 3    16\n# 4    25\n# dtype:\
    \ int64\n```\n\n### 10.4.2 Practice\n\n```python\n# Given two Series below, complete\
