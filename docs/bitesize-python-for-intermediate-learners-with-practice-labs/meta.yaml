    \ 1, 1)\n\n    def __repr__(self):\n        '''The string of the iphone'''\n \
    \       return f'''{self.family} family member,\n        Series {self.series},\n\
    \        with {self.camera} camera'''\n\n# Concrete subclass for Old iPhones\n\
    class OldiPhone(iphone):\n    def __init__(self, series, camera):\n        '''The\
    \ initiator of original iphones\n\n        Keyword arguments:\n        series\
    \ (str) -- the series name of the iphone\n        camera (int) -- the number of\
    \ cameras\n        # of sensors is 2\n        '''\n        super().__init__(series,\
    \ camera, 2)\n\n    def __repr__(self):\n        '''The string of the iphone'''\n\
    \        return f'''{self.family} family member,\n        Series {self.series},\n\
    \        with {self.camera} cameras and {self.sensor} sensors'''\n\n# Concrete\
    \ subclass for Recent iPhones\nclass RecentiPhone(iphone):\n    def __init__(self,\
    \ series, camera, sensor):\n        '''The initiator of all iphones\n\n      \
    \  Keyword arguments:\n        series (str) -- the series name of the iphone\n\
    \        camera (int) -- the number of cameras\n        sensor (int) -- the number\
    \ of sensors\n        '''\n        super().__init__(series, camera, sensor)\n\n\
    \    def __repr__(self):\n        '''The string of the iphone'''\n        return\
    \ f'''{self.family} family member,\n        Series {self.series},\n        with\
    \ {self.camera} cameras and {self.sensor} sensors'''\n\n    # Additional method\
    \ for Recent iPhones\n    def new_feature(self):\n        '''The new feature of\
    \ the iphone'''\n        print('I can report a car-crash!')\n```\n\n### 7.1.3\
    \ Usage\n\n```python\n# Raise TypeError\n#i = iphone()\n\nori_iphone = OriginaliPhone('4s')\n\
    print(ori_iphone)\n\nold_iphone = OldiPhone('10ProMax', 3)\nprint(old_iphone)\n\
