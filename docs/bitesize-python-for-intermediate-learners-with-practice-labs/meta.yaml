    ```\n\nLeo the Lion makes a sound.\nElla the Elephant is eating grass.\nLeo the\
    \ Lion is moving.\n\nHere we summarize the examples in the demonstration and practice\
    \ in Table 1.1.\n\n### TABLE 1.1 Examples of Classes, Attributes, and Instances\n\
    \n| Class | Attributes | Instances |\n|---|---|---|\n| Car | make, model, year,\
