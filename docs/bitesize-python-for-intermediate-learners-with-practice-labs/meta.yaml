  md: '210 ■ BiteSize Python for Intermediate Learners


    TABLE 14.1 Matplotlib Plot Types


    | Plot Type | Basic Syntax | Scenario |

    | :--- | :--- | :--- |

    | Line Plot | plt.plot(x, y) | Shows trends or changes over time. Ideal for continuous
    data. Example: Tracking daily temperature changes over a month. |

    | Bar Plot | plt.bar(x, y) | Compares categories or groups. Suitable for categorical
    data. Example: Comparing sales across different product categories. |

    | Horizontal Bar | plt.barh(x, y) | Compares categories horizontally, useful for
    long labels. Example: Visualizing the population of countries with long names.
    |

    | Histogram | plt.hist(data) | Displays the distribution of a dataset. Ideal for
    frequency analysis. Example: Analyzing the distribution of students'' test scores.
    |

    | Scatter Plot | plt.scatter(x, y) | Shows relationships between two variables.
    Example: Examining the relationship between hours studied and exam scores. |

    | Pie Chart | plt.pie(data) | Represents proportions of a whole. Best for percentage
    distribution. Example: Showing the market share of smartphone brands. |

    | Box Plot | plt.boxplot(data) | Displays data distribution, highlighting median
    and outliers. Example: Comparing monthly salaries across departments. |

    | Heatmap | plt.imshow(data) | Visualizes matrix-like data, often for correlation
    or intensity maps. Example: Representing the correlation between multiple economic
    indicators. |


