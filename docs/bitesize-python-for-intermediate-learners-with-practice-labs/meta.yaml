  md: "# Documentation\n\nDOCUMENTING YOUR CODE, especially when defining classes,\
    \ is crucial for ensuring that other developers (and your future self) can understand\
    \ how your code works. Proper documentation should describe the purpose of the\
    \ class, its methods, and its attributes. In Python, this is typically done using\
    \ docstrings, which are string literals that appear right after the class or function\
    \ definition. We use `'''documentation'''` in the class definition to automatically\
    \ generate DocStrings, which are similar to javadoc. The docstrings we used will\
    \ be reflected in `help()` function.\n\nAre you ready? Let’s get started!\n\n\
    # 6.1 INTRODUCTION\n\n# 6.1.1 Demonstration\n\nLet’s compare the definition of\
    \ two classes, NoDoc and Doc, and compare the result of `help()` function applied\
    \ to them.\n\n```\nclass NoDoc():\n    def __init__(self, att1):\n        self.att1\
    \ = att1\n\n    def method1(p1, p2, p3):\n        return f'{p1} {p2} {p3} are\
    \ something'\n```\n\n```\nhelp(NoDoc)\n```\n\n```\nHelp on class NoDoc in module\
    \ __main__:\n\nclass NoDoc(builtins.object)\n |  NoDoc(att1)\n |\n |  Methods\
    \ defined here:\n |\n |  __init__(self, att1)\n```"
  merge: -1
