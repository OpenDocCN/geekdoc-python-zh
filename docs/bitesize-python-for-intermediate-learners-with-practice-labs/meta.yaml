  md: 'TABLE 16.2 Summary of Plotly Plot Types


    | Type | Basic Syntax | Scenario |

    |---|---|---|

    | Scatter | `px.scatter()` | Shows the relationship between two variables. Example:
    Analyzing sales vs. marketing spend. |

    | Line | `px.line()` | Visualizes trends or changes over time. Example: Tracking
    daily temperature changes. |

    | Area | `px.area()` | Highlights the area under a line plot to show volume. Example:
    Visualizing cumulative sales over time. |

    | Bar | `px.bar()` | Compares categorical data. Example: Comparing monthly revenue
    across different product categories. |

    | Timeline | `px.timeline()` | Visualizes events over a timeline. Example: Project
    management to track task durations. |

    | Funnel | `px.funnel()` | Shows stages in a process and drop-offs at each stage.
    Example: Visualizing a sales pipeline from leads to conversions. |

    | Pie | `px.pie()` | Displays proportions within a whole. Example: Visualizing
    market share by product type. |

    | Histogram | `px.histogram()` | Shows the distribution of a single variable.
    Example: Analyzing the distribution of customer ages. |

    | 3D-Scatter | `px.scatter_3d()` | Visualizes relationships among three variables.
    Example: Mapping geographical data with latitude, longitude, and elevation. |

    | 3D-Line | `px.line_3d()` | Tracks movement or trends in three dimensions. Example:
    Visualizing flight paths with altitude changes over time. |'
