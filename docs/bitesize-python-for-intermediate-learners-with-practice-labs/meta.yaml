- md: "## 7.4 VEHICLE RENTAL SYSTEM\n\n### 7.4.1 Overview\n\nWe can design a vehicle\
    \ rental system where different types of vehicles (cars, trucks, motorcycles)\
    \ can be rented. This system will demonstrate how different vehicles share common\
    \ functionalities while also implementing their own specific behaviors. The system\
    \ protects sensitive vehicle data, such as engine number, shares common attributes\
    \ like `make`, `model`, and `year` across different vehicle types, allows different\
    \ vehicle types to implement a `rent()` method differently, and provides a general\
    \ `Vehicle` class that defines the common interface for all vehicles.\n\n### 7.4.2\
    \ Implementation\n\n```python\n# Import ABC and abstractmethod from the abc module\n\
    from abc import ABC, abstractmethod\n\n# Define an abstract class Vehicle\nclass\
    \ Vehicle(ABC):\n    \"\"\"\n    Abstract class representing a vehicle.\n\n  \
    \  Attributes\n    ----------\n    make : str\n        The vehicle's make.\n \
    \   model : str\n        The vehicle's model.\n    year : int\n        The vehicle's\
    \ manufacturing year.\n    \"\"\"\n\n    # Constructor to initialize the Vehicle\
    \ class\n    def __init__(self, make, model, year):\n        self.make = make\n\
    \        self.model = model\n        self.year = year\n        self.__engine_number\
    \ = None  # Encapsulated attribute\n\n    # Abstract method to rent the vehicle\n\
    \    @abstractmethod\n    def rent(self):\n        \"\"\"\n        Abstract method\
    \ to rent the vehicle.\n        \"\"\"\n        pass\n\n    # Method to set the\
    \ engine number\n    def set_engine_number(self, engine_number):\n        \"\"\
    \"\n        Sets the engine number.\n\n        Parameters\n        ----------\n\
    \        engine_number : str\n            The engine number.\n        \"\"\"\n\
    \        self.__engine_number = engine_number\n\n    # Method to get the engine\
    \ number\n    def get_engine_number(self):\n        \"\"\"\n        Gets the engine\
    \ number.\n\n        Returns\n        -------\n        str\n            The engine\
    \ number.\n        \"\"\"\n        return f'Engine Number: {self.__engine_number}'\n\
    \n# Define a concrete class Car inheriting from Vehicle\nclass Car(Vehicle):\n\
    \    \"\"\"\n    Represents a car.\n    \"\"\"\n\n    # Implementation of the\
    \ rent abstract method\n    def rent(self):\n        return f'Renting a car: {self.make}\
    \ {self.model}, {self.year}'\n\n# Define a concrete class Truck inheriting from\
    \ Vehicle\nclass Truck(Vehicle):\n    \"\"\"\n    Represents a truck.\n    \"\"\
    \"\n\n    # Implementation of the rent abstract method\n    def rent(self):\n\
    \        return f'Renting a truck: {self.make} {self.model}, {self.year}'\n\n\
    # Define a concrete class Motorcycle inheriting from Vehicle\nclass Motorcycle(Vehicle):\n\
    \    \"\"\"\n    Represents a motorcycle.\n    \"\"\"\n\n    # Implementation\
    \ of the rent abstract method\n    def rent(self):\n        return f'Renting a\
    \ motorcycle: {self.make} {self.model}, {self.year}'\n```\n\n### 7.4.3 Usage\n\
    \n```python\n# Usage\ntoyota_car = Car('Toyota', 'Corolla', 2020)\ntoyota_car.set_engine_number('ENG12345')\n\
    print(toyota_car.rent())  # Polymorphism\nprint(toyota_car.get_engine_number())\
    \  # Encapsulation\n\nford_truck = Truck('Ford', 'F-150', 2019)\nprint(ford_truck.rent())\
    \  # Polymorphism\n\nharley_motorcycle = Motorcycle('Harley-Davidson', 'Street\
    \ 750', 2018)\nprint(harley_motorcycle.rent())  # Polymorphism\n```\n\n```\nRenting\
    \ a car: Toyota Corolla, 2020\nEngine Number: ENG12345\nRenting a truck: Ford\
    \ F-150, 2019\nRenting a motorcycle: Harley-Davidson Street 750, 2018\n```\n\n\
    In this implementation, the `__engine_number` attribute in the `Vehicle` class\
    \ is private and can only be accessed or modified through getter and setter methods.\
    \ `Car`, `Truck`, and `Motorcycle` inherit from the `Vehicle` class, sharing common\
    \ attributes like `make`, `model`, and `year`. Each subclass (`Car`, `Truck`,\
    \ and `Motorcycle`) implements the `rent()` method differently. The `Vehicle`\
    \ class is an abstract class that defines the common interface (`rent()`) for\
    \ all subclasses.\n\n## 7.5 ONLINE MARKETPLACE\n\n### 7.5.1 Overview\n\nThe online\
    \ marketplace allows sellers to list products, and buyers to purchase them. Different\
    \ types of products (like electronics, clothing, and groceries) have their own\
    \ specific attributes and discount policies. The system manages product listings,\
    \ customer shopping carts, and checkouts. The marketplace system protects sensitive\
    \ data like product IDs and user IDs, shares common features between different\
    \ product types and user roles, allows actions like calculating discounts to behave\
    \ differently depending on the product type, and provides a generalized `Product`\
    \ and `User` class that defines common behaviors and attributes.\n\n### 7.5.2\
    \ Implementation\n\n```python\nfrom abc import ABC, abstractmethod\n\n# Abstract\
    \ base class representing a product in the marketplace\nclass Product(ABC):\n\
    \    \"\"\"\n    Abstract class representing a product in the marketplace.\n\n\
    \    Attributes\n    ----------\n    name : str\n        The name of the product.\n\
    \    price : float\n        The price of the product.\n    \"\"\"\n\n    def __init__(self,\
    \ name, price):\n        self.name = name\n        self.price = price\n      \
    \  self.__product_id = None  # Encapsulated attribute\n\n    # Method to set the\
    \ product ID\n    def set_product_id(self, product_id):\n        self.__product_id\
    \ = product_id\n\n    # Method to get the product ID\n    def get_product_id(self):\n\
    \        return f'Product ID: {self.__product_id}'\n\n    # Abstract method to\
    \ calculate the discount\n    @abstractmethod\n    def calculate_discount(self):\n\
    \        \"\"\"\n        Abstract method to calculate the discount.\n        \"\
    \"\"\n        pass\n\n# Class representing an electronic product\nclass Electronics(Product):\n\
    \    \"\"\"\n    Represents an electronic product.\n    \"\"\"\n\n    def __init__(self,\
    \ name, price, warranty_years):\n        super().__init__(name, price)\n     \
    \   self.warranty_years = warranty_years\n\n    # Implementation of the calculate_discount\
    \ abstract method\n    def calculate_discount(self):\n        return self.price\
    \ * 0.90  # 10% discount\n\n# Class representing a clothing product\nclass Clothing(Product):\n\
    \    \"\"\"\n    Represents a clothing product.\n    \"\"\"\n\n    def __init__(self,\
    \ name, price, size):\n        super().__init__(name, price)\n        self.size\
    \ = size\n\n    # Implementation of the calculate_discount abstract method\n \
    \   def calculate_discount(self):\n        return self.price * 0.80  # 20% discount\n\
    \n# Class representing a grocery item\nclass Grocery(Product):\n    \"\"\"\n \
    \   Represents a grocery item.\n    \"\"\"\n\n    def __init__(self, name, price,\
    \ expiration_date):\n        super().__init__(name, price)\n        self.expiration_date\
    \ = expiration_date\n\n    # Implementation of the calculate_discount abstract\
    \ method\n    def calculate_discount(self):\n        return self.price * 0.95\
    \  # 5% discount\n\n# Abstract base class representing a user in the marketplace\n\
    class User(ABC):\n    \"\"\"\n    Abstract class representing a user in the marketplace.\n\
    \n    Attributes\n    ----------\n    name : str\n        The name of the user.\n\
    \    \"\"\"\n\n    def __init__(self, name):\n        self.name = name\n     \
    \   self._user_id = None  # Encapsulated attribute\n\n    # Method to set the\
    \ user ID\n    def set_user_id(self, user_id):\n        self._user_id = user_id\n\
    \n    # Method to get the user ID\n    def get_user_id(self):\n        return\
    \ f'User ID: {self._user_id}'\n\n    # Abstract method to purchase a product\n\
    \    @abstractmethod\n    def purchase(self, product):\n        \"\"\"\n     \
    \   Abstract method to purchase a product.\n        \"\"\"\n        pass\n```"
  mdcn: "## 7.4 车辆租赁系统\n\n### 7.4.1 概述\n\n我们可以设计一个车辆租赁系统，其中可以租赁不同类型的车辆（汽车、卡车、摩托车）。该系统将展示不同车辆如何共享通用功能，同时实现各自特定的行为。系统保护敏感的车辆数据（如发动机号），在不同车辆类型间共享`make`、`model`和`year`等通用属性，允许不同车辆类型以不同方式实现`rent()`方法，并提供一个通用的`Vehicle`类，为所有车辆定义通用接口。\n\
