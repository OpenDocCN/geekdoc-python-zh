    \    def __init__(self, att1, att2, att4):\n        super().__init__(att1, att2)\
    \  # 调用类A的构造函数\n        self.att4 = att4\n\n# 定义C的子类D\nclass D(C):\n    # 使用att1、att2、att4和att5初始化类D的一个对象\n\
    \    def __init__(self, att1, att2, att4, att5):\n        super().__init__(att1,\
    \ att2, att4)  # 调用类C的构造函数\n        self.att5 = att5\n```\n\n`__init__()`之前的`super()`最常用于构造函数中。这是一种方便的方式来调用在超类中定义的方法，而无需重复构造函数的定义。现在，让我们创建一些对象来测试定义的类。\n\
    \n```python\na = A('Class A', 'SuperClass')\nprint(a.att1, a.att2)\na.act()\n\
