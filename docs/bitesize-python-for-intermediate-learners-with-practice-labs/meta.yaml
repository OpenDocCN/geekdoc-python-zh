    \ are much faster than Python loops or list comprehensions. Vectorized operations\
    \ simplify code by removing the need for explicit loops and making mathematical\
    \ operations more readable. NumPy operations are designed to handle large datasets\
    \ efficiently, leveraging low-level optimizations that improve performance for\
    \ numerical computations.\n\nAddition (+): Adds corresponding elements of two\
    \ arrays or adds a scalar to every element of an array.\n\n92 ■ BiteSize Python\
    \ for Intermediate Learners\n\n```\narr1 = np.array([1, 2, 3])\narr2 = np.array([4,\
    \ 5, 6])\nresult = arr1 + arr2 # Output: array([5, 7, 9])\nresult\n```\n\narray([5,\
    \ 7, 9])\n\nSubtraction (-): Subtracts corresponding elements of one array from\
    \ another or subtracts a scalar from every element of an array.\n\n```\narr1 =\
    \ np.array([10, 20, 30])\narr2 = np.array([1, 2, 3])\nresult = arr1 - arr2 # Output:\
    \ array([ 9, 18, 27])\nresult\n```\n\narray([ 9, 18, 27])\n\nMultiplication (*):\
    \ Multiplies corresponding elements of two arrays or multiplies each element of\
    \ an array by a scalar.\n\n```\narr1 = np.array([1, 2, 3])\narr2 = np.array([4,\
    \ 5, 6])\nresult = arr1 * arr2 # Output: array([ 4, 10, 18])\nresult\n```\n\n\
    array([ 4, 10, 18])\n\nDivision (/): Divides corresponding elements of one array\
    \ by another or divides each element of an array by a scalar.\n\n```\narr1 = np.array([10,\
    \ 20, 30])\narr2 = np.array([1, 2, 3])\nresult = arr1 / arr2 # Output: array([10.,\
    \ 10., 10.])\nresult\n```\n\narray([10., 10., 10.])\n\nIn summary, operations\
    \ on lists are not inherently element-wise. For example, adding two lists concatenates\
    \ them rather than performing element-wise addition. To perform element-wise operations,\
    \ you need to use loops or list comprehensions:\n\n```\nlist1 = [1, 2, 3]\nlist2\
    \ = [4, 5, 6]\nresult = list1 + list2\nresult\n```\n\n[1, 2, 3, 4, 5, 6]\n\n```\n\
