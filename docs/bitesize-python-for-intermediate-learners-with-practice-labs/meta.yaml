  md: 'TABLE 15.1 Summary of Seaborn Specific Plot Types


    | Type | Basic Syntax | Scenario |

    | :--- | :--- | :--- |

    | Scatter | sns.scatterplot() | Shows the relationship between two variables.
    Example: Analyzing the relationship between advertising budget and sales. |

    | Line | sns.lineplot() | Visualizes trends or changes over time. Example: Tracking
    monthly revenue over a year. |

    | Bar | sns.barplot() | Compares categorical data with aggregated values. Example:
    Comparing average customer ratings across product categories. |

    | Count | sns.countplot() | Counts occurrences of categorical data. Example: Counting
    the number of employees in each department. |

    | Histogram | sns.histplot() | Shows the distribution of a dataset. Example: Visualizing
    the distribution of exam scores in a class. |

    | KDE | sns.kdeplot() | Estimates the probability density of a continuous variable.
    Example: Understanding income distribution in a population. |

    | Box | sns.boxplot() | Displays distribution and highlights outliers. Example:
    Comparing salaries across different job roles. |

    | Violin | sns.violinplot() | Combines box plot and KDE to show distribution and
    probability. Example: Analyzing height distribution across different age groups.
    |

    | Heatmap | sns.heatmap() | Visualizes correlation or matrix-like data. Example:
    Examining the correlation between different financial metrics. |

    | LM | sns.lmplot() | Fits and visualizes linear regression models. Example: Modeling
    the relationship between study hours and exam scores. |'
