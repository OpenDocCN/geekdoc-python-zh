    \ values with NaN where keys are not present in both DataFrames.\n3. Left Join:\
    \ This method returns all rows from the left DataFrame and fills in missing values\
    \ with NaN where keys are not present in the right DataFrame.\n4. Right Join:\
    \ This method returns all rows from the right DataFrame and fills in missing values\
    \ with NaN where keys are not present in the left DataFrame.\n\n```\n# Sample\
