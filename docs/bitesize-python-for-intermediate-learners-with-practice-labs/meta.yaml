  md: "# 1.2 CREATE A CLASS\n\n# 1.2.1 Demonstration\n\nIn Python, defining a class\
    \ starts with the `class` keyword followed by the class name and a colon `:`.\
    \ The class name should follow the convention of being a meaningful noun, written\
    \ in PascalCase (each word starts with an uppercase letter).\n\nInside the class,\
    \ you can define attributes and methods to describe its behavior. Attributes are\
    \ variables to store data. They can be instance attributes (specific to each object)\
    \ or class attributes (shared across all objects of the class). For example, `self.name`\
    \ in a class stores information specific to an instance. Methods are functions\
    \ to define behaviors or actions that objects of the class can perform. Methods\
    \ often use `self` to access instance attributes or other methods.\n\nThe `self`\
    \ is a reference to the instance of the class currently being used. Think of `self`\
    \ as the way a method knows which object its working with. Together, attributes\
    \ represent what an object is and methods represent what an object can do. This\
    \ structure allows you to create reusable and organized blueprints for objects.\n\
    \nFor example, we can define a `Car` class and add attributes and methods. The\
    \ `__init__()` method initializes the car's attributes: `make`, `model`, `year`,\
    \ and `color`. The `self` refers to the object that this method is creating.\n\
    \nWe also define three methods: `start()`, `stop()`, and `drive()`, which represent\
    \ actions the car can perform. The `self` refers to the object that calls the\
    \ methods. We also define a special method: `__repr__()`. It returns a `str` that\
    \ represents the object.\n\n```\n# Defining the class Car\nclass Car:\n    # Initialize\
    \ the Car object with make, model, year, and color\n    def __init__(self, make,\
    \ model, year, color):\n        self.make = make  # Assign the make of the car\n\
