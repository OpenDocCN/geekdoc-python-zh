  md: "# # Encapsulation\n\nENCAPSULATION IS ONE of the fundamental principles of\
    \ object-oriented programming (OOP). Encapsulation involves restricting direct\
    \ access to some of an object’s components, which is a way of preventing accidental\
    \ interference and misuse of the data. In simpler terms, encapsulation helps to\
    \ hide the internal state of an object from the outside world and only expose\
    \ a controlled interface. This can be achieved through the use of access modifiers\
    \ like protected (_) and private (__).\n\nAre you ready? Let’s get started!\n\n\
    # ## 4.1 INTRODUCTION TO ENCAPSULATION\n\n# ### 4.1.1 Demonstration\n\nLet’s define\
    \ a class E to demonstrate how to use the protected (_) and private (__) modifiers.\n\
    \n```\n# Class E definition\nclass E:\n    def __init__(self):\n        # Public\
    \ attribute\n        self.att1 = 1\n\n        # Protected attribute (indicated\
    \ by a single underscore)\n        self._att2 = 2\n\n        # Private attribute\
    \ (indicated by double underscores)\n        self.__att3 = 3\n\n# Create an instance\
    \ of class E\ne = E()\n\n# Accessing public attribute\nprint(e.att1)  # Output:\
