    \ obj)` |\n| `__gt__` | 比较一个对象是否大于另一个。 | `__gt__(self, obj)` |\n| 其他方法 | 定义对象可以执行的操作（例如，启动、驾驶、晋升）。\
    \ | `start(self)`, `give_raise(self, amount)`, `make_call(self, phone_number)`\
    \ |\n\n## 1.3 四个方面\n\n面向对象编程是软件开发中的一个强大概念，有助于组织和构建代码。OOP有四个主要概念：继承、多态、封装和抽象：\n\
    \n-   继承允许一个新类（子类或派生类）继承现有类（父类或基类）的属性和方法。这促进了代码重用，并在类之间建立了自然的层次结构。我们将在第2章详细介绍继承。\n\
    -   多态允许将不同类的对象视为公共父类的对象。OOP中多态最常见的用法是，当使用父类引用来引用子类对象，并且方法调用在运行时解析。我们将在第3章详细介绍多态。\n\
    -   封装是将数据和操作数据的方法捆绑到单个单元或类中，并限制对对象某些组件的访问的实践。这意味着对象的内部状态对外部世界是隐藏的，并通过公共方法（getter和setter）控制访问。我们将在第4章详细介绍封装。\n\
    -   抽象是隐藏复杂实现细节，只显示对象基本特征的概念。它允许专注于对象的功能，而无需担心复杂的内部工作原理。我们将在第5章详细介绍抽象。\n\n总之，封装保护数据，继承促进代码重用并建立类之间的关系，多态允许灵活性和动态"
