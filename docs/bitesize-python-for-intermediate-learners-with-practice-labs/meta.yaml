    import pandas as pd

    ```


    # ### 12.1.2 Key Features of Pandas


    Pandas is ideal for various types of data:


    +   - Tabular Data: Similar to SQL tables or Excel spreadsheets with heterogeneously
    typed columns.

    - Time Series Data: Both ordered and unordered time series data.

    - Matrix Data: Homogeneous or heterogeneous matrix data with row and column labels.

    - Observational/Statistical Data: Any form of data, whether labeled or unlabeled.


    The primary data structures in pandas are:


    +   - Series: One-dimensional data.

    - DataFrame: Two-dimensional data, similar to R’s data.frame but more powerful.'
