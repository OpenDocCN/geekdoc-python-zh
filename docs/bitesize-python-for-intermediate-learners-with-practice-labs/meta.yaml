    plt.show()

    ```


    Line Plot (kind=''line''): A line plot is used to show the relationship between
    two numerical variables, with data points connected by lines. It is useful for
    visualizing trends over time or ordered categories.


    If there are multiple measurements for the same value of the x variable, the default
    behavior in seaborn is to aggregate the multiple measurements at each x value
    by plotting the mean and the 95% confidence interval around the mean (Figure 15.2).


    ```

    # Create a line plot

    sns.relplot(data=tips, x=''size'', y=''total_bill'', kind=''line'')

