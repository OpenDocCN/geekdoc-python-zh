    is used for benchmarking and optimizing code performance. %timeit runs the code
    snippet multiple times (in a loop) to provide a statistically reliable measurement
    of execution time. It reports the best average time taken, minimizing the impact
    of random fluctuations and system load. It returns the average time taken per
    execution and can help identify performance bottlenecks in your code.


