- md: '## Interactive Mode of Execution


    Let us execute some basic Python statements and interact with the Python shell.


    ## Launching the Python Shell


    To launch the IDLE application click [Windows Start Menu Button] -> [Python 3.9
    Folder] -> [IDLE (Python 3.9 64-bit)].


    ![](img/84256b7fa80e08517c2c7cbb96a2913c_11_0.png)


    The Python interpreter or the Python shell will pop-up on the screen.


    ![](img/84256b7fa80e08517c2c7cbb96a2913c_11_1.png)


    The version (3.9) of the Python interpreter is displayed at the top of the window
    followed by the `>>>` symbol which indicates that the interpreter is ready to
    take instructions.


    Python commands or statements can be input on this prompt. The input statements
    are executed instantaneously and any variable assignments are retained as long
    as the session is not terminated.


    ## Basic Arithmetic


    Let us perform some basic arithmetic operations in the interactive mode using
    an integer number (2) and a floating-point number (3.5):


    ```

    >>> 2 + 2

    4

    >>> 2 * 3.5

    7.0

    ```


    It can be observed that the results of each of the above computations are displayed
    immediately in the shell.


    ## Storing Values/Results


    Instead of immediately displaying the results, they can also be stored in variables
    using the assignment symbol (`=`) as shown below:


    ```

    >>> a = 2 + 2

    >>> b = 2 * 3.5

    ```


    The values of `a` and `b` can be accessed later for future calculations as shown
    below:


    ```

    >>> a

    4

    >>> b

    7.0

    >>> a * 5

    20

    >>> b / 3

    2.3333333333333335

    ```


    ## Basic String Operation


    Interactive mode is not just restricted to basic arithmetic or assignments. Let
    us join two strings - "Hello, " and "world!" .


    ```

    >>> "Hello, " + "world!"

    ''Hello, world!''

    ```


    The complete functionality of Python is easily accessible to a user via the **Interactive
    Mode**.


    This makes it convenient for testing and instant execution of small code snippets
    (single line or few lines of code), a feature not available in compiled languages
    like C, C++ and Java.


    But, the statements cannot be saved for future use and have to be retyped for
    re-execution. This disadvantage is overcome by the use of Python in **Script Mode**
    as described in the next section.


    ## Script Mode of Execution


    To write reusable codes, script mode is the most preferred mode of code execution.


    ## File Creation


    To create a new file using the IDLE application click `[File] -> [New File]`


    ![](img/84256b7fa80e08517c2c7cbb96a2913c_13_0.png)


    Create New File


    Write a simple Python program as shown below


    ```python

    a = 2 + 2

    a

    ```


    and save the script as `example.py` (`.py` file extension for all Python scripts)
    using `[File] -> [Save As...]`


    ![](img/84256b7fa80e08517c2c7cbb96a2913c_13_1.png)


    Save File


    ## Script Execution


    Now run this script using `[Run] -> [Run Module]`.


    ![](img/84256b7fa80e08517c2c7cbb96a2913c_14_0.png)


    Execute File


    It can be observed that the code has been executed, but no output is displayed
    on the console (or the standard output) as all outputs have to be explicitly specified
    when running a code in the script mode.


    This can be done by using the `print()` function which is used in Python scripts
    to display output on the output stream. Let us quickly add the `print()` function
    in the above code and execute it.


    ```python

    a = 2 + 2

    print(a)

    ```


    Now, when you run the script you will observe that the value of `a`, that is `4`,
    is now displayed on the console.


    # Python Fundamentals


    ## Tokens: Introduction


    When a Python code is executed, the Python interpreter reads each logical line
    and breaks it into a sequence of lexical units.


    These lexical units are better known as **tokens** - the smallest individual units
    of a program. They are the building blocks of a Python code and can be classified
    into one of the following categories:


    - **Keywords**: Reserved words that convey special meaning when processed by the
    Python interpreter.

    - **Identifiers**: Names defined by the programmer to refer to objects that can
    represent variables, functions, classes, etc.

    - **Literals**: Values specified in the program which belong to exactly one of
    the Python''s built-in data types.

    - **Delimiters**: Symbols that denote grouping, punctuation, and assignment/binding.

    - **Operators**: Symbols that can operate on data and compute results.


    ## Tokens: Keywords


    Keywords are reserved words that have special meaning when processed by the Python
    interpreter. They are case-sensitive and cannot be used for naming identifiers
    (class, function, variable or structure names).


    The list of keywords in Python are provided below:


    | | | |

    |---|---|---|

    | True | False | import |

    | from | as | None |

    | and | or | not |

    | in | is | try |

    | except | finally | raise |

    | del | global | nonlocal |

    | lambda | def | class |

    | with | if | elif |

    | else | pass | for |

    | while | continue | break |

    | assert | return | yield |

    | async | await | |


    ## Tokens: Identifiers


    Identifiers are used for defining the names of Python objects such as variables,
    functions, classes, modules, etc. The naming convention for identifiers is as
    follows:


    - Must begin with a lowercase character (a-z) or an uppercase character (A-Z)
    or underscore sign (`_`).

    - Followed by any number of letters (a-z, A-Z), digits (0-9), or underscores (`_`).

    - Should not be a keyword.

    - No special symbols are allowed like `!`, `@`, `#`, `$`, `%`, etc.


    Some points to keep in mind while naming identifiers:


    - Identifiers are case-sensitive in nature and any difference in case of any character
    refers to a different identifier. e.g., `length` and `Length` are different identifiers.

    - Identifiers differing by only underscores are different. e.g., `unitlength`
    and `unit_length` are different identifiers.


    It is also a good practice (although not compulsory) to follow the following procedure
    while naming identifiers:


    - Identifiers should be named carefully with an emphasis on clarity and readability.
    For example, in a program that calculates the area of a rectangle, a good choice
    for identifier names are - `length`, `breadth` and `area`.

    - Class names should start with uppercase character.

    - Identifiers starting with an underscore have special meaning in a program.

    - Variable, function and method names should be in lowercase characters, with
    underscores separating multiple words like `area_of_square`, `area_of_triangle`,
    etc.


    ## Tokens: Literals


    Literals are tokens in the source code which represent fixed or constant values.
    They are often used in assignment statements for initializing variables or in
    comparison expressions.


    The various types of literals available in Python are as follows:


    ### Numeric Literals


    Numeric literals are used for representing numeric values in the source code.
    They can be of three types - integers, float point numbers and imaginary numbers.


    ### Integer Literals


    Integer literals are numbers without any fractional component.


    In Python, integer literals can be written in four positional (base) numeral systems:


    #### i. Decimal or base-10 Integer


    A decimal integer literal consists of one or more digits (0-9) and cannot have
    any zeros preceding the first non-zero digit, except when the number is 0.


    Example base-10 integers:


    ```

    34

    3283298

    864

    0

    ```


    `092` is not a valid decimal integer literal as a zero precedes the first non-zero
    digit `9`.


    #### ii. Binary or base-2 Integer


    A binary integer or base-2 integer begins with `0b` or `0B` followed by binary
    digits `0-1`.


    #### iii. Octal or base-8 Integer


    An octal integer or base-8 integer begins with `0o` or `0O` followed by octal
    digits `0–7`.


    For example, `27` can be written as an octal integer literal `0o33`.


    #### iv. Hexadecimal or base-16 Integer


    A hexadecimal integer or base-16 integer begins with `0x` or `0X` followed by
    digits `0–9` or letters `A–F` (case insensitive).


    For example, `27` can be written as a hexadecimal integer literal `0x1B` or `0x1b`.


    Thus, it can be observed that number `27` can be written in the program as `27`
    (decimal), `0b11011` (binary), `0o33` (octal) or `0x1B` (hexadecimal).


    #### Underscores in Integer Literals


    An optional character `_` (underscore) is also allowed in an integer literal to
    group digits for enhanced readability.


    One underscore can occur between digits, and after base specifiers like `0o`.


    They are ignored while determining the actual numerical value of the literal.


    Some valid underscore usages are - `10_00_00_000`, `0b_1110_0101`, `0x23_123`.


    ### Floating Point Literals


    Floating point literals are real numbers present in the source code. They contain
    fractional component and/or exponential component.


    The fractional component includes the digits after the decimal point (`.`).


    Example floating point literals:


    ```

    3.4

    .4

    8.

    3.4E2

    3.4e-2

    ```


    In the above example, `.4` is equivalent to `0.4` and `8.` is equivalent to `8.0`.


    The exponential component can be identified by the letter `e` or `E` followed
    by an optional sign (`+` or `-`) and digits (`0–9`). This exponent is equivalent
    to multiplying the real number with the power of `10`.


    For example, `3.4E2` is equivalent to `3.4 x 10^2` or `340.0`, whereas `3.4e-2`
    is equivalent to `3.4 x 10^-2` or `.034`.


    ### Imaginary Literals


    To specify complex numbers and perform complex number mathematics, Python supports
    imaginary literals which are given by real or integer number followed by the letter
    `j` or `J` which represents the unit imaginary number.


    Example imaginary literals:


    ```

    3.5j

    15.j

    12j

    .005j

    3e100j

    3.5e-10j

    ```'
  mdcn: '## 交互式执行模式


    让我们执行一些基本的Python语句，并与Python shell进行交互。


    ## 启动Python Shell


    要启动IDLE应用程序，请点击 [Windows开始菜单按钮] -> [Python 3.9文件夹] -> [IDLE (Python 3.9 64-bit)]。


    ![](img/84256b7fa80e08517c2c7cbb96a2913c_11_0.png)


    Python解释器或Python shell将弹出显示在屏幕上。


    ![](img/84256b7fa80e08517c2c7cbb96a2913c_11_1.png)


    窗口顶部显示Python解释器的版本（3.9），其后是`>>>`符号，表示解释器已准备好接收指令。


    可以在此提示符下输入Python命令或语句。输入的语句会立即执行，只要会话未终止，任何变量赋值都会被保留。


    ## 基本算术运算


    让我们在交互模式下使用一个整数（2）和一个浮点数（3.5）执行一些基本的算术运算：


    ```

    >>> 2 + 2

    4

    >>> 2 * 3.5

    7.0

    ```


    可以观察到，上述每个计算的结果都立即显示在shell中。


    ## 存储值/结果


    除了立即显示结果外，还可以使用赋值符号（`=`）将它们存储在变量中，如下所示：


    ```

    >>> a = 2 + 2

    >>> b = 2 * 3.5

    ```


    `a`和`b`的值可以在以后访问，用于未来的计算，如下所示：


    ```

    >>> a

    4

    >>> b

    7.0

    >>> a * 5

    20

    >>> b / 3

    2.3333333333333335

    ```


    ## 基本字符串操作


    交互模式不仅限于基本算术或赋值。让我们连接两个字符串 - "Hello, " 和 "world!"。


    ```

    >>> "Hello, " + "world!"

    ''Hello, world!''

    ```


    通过**交互模式**，用户可以轻松访问Python的全部功能。


    这使得测试和即时执行小代码片段（单行或几行代码）变得非常方便，这是C、C++和Java等编译型语言所不具备的功能。


    但是，语句无法保存以供将来使用，重新执行时必须重新输入。这个缺点可以通过在下一节描述的**脚本模式**中使用Python来克服。


    ## 脚本式执行模式


    要编写可重用的代码，脚本模式是最受青睐的代码执行模式。


    ## 文件创建


    要使用IDLE应用程序创建新文件，请点击 `[File] -> [New File]`


    ![](img/84256b7fa80e08517c2c7cbb96a2913c_13_0.png)


    创建新文件


    编写一个简单的Python程序，如下所示


    ```python

    a = 2 + 2

    a

    ```


    并使用 `[File] -> [Save As...]` 将脚本保存为 `example.py`（所有Python脚本的文件扩展名均为`.py`）


    ![](img/84256b7fa80e08517c2c7cbb96a2913c_13_1.png)


    保存文件


    ## 脚本执行


    现在使用 `[Run] -> [Run Module]` 运行此脚本。


    ![](img/84256b7fa80e08517c2c7cbb96a2913c_14_0.png)


    执行文件


    可以观察到代码已经执行，但控制台（或标准输出）上没有显示任何输出，因为在脚本模式下运行代码时，所有输出都必须显式指定。


    这可以通过使用`print()`函数来实现，该函数在Python脚本中用于在输出流上显示输出。让我们快速在上面的代码中添加`print()`函数并执行它。


    ```python

    a = 2 + 2

    print(a)

    ```


    现在，当你运行脚本时，你会观察到`a`的值，即`4`，现在显示在控制台上。


    # Python基础


    ## 词法单元：简介


    当执行Python代码时，Python解释器会读取每个逻辑行，并将其分解为一系列词法单元。


    这些词法单元更广为人知的名称是**词法单元** - 程序中最小的独立单元。它们是Python代码的构建块，可以分为以下类别之一：


    - **关键字**：在Python解释器处理时具有特殊含义的保留字。

    - **标识符**：程序员定义的用于引用对象的名称，可以表示变量、函数、类等。

    - **字面量**：程序中指定的值，属于Python内置数据类型中的恰好一种。

    - **分隔符**：表示分组、标点符号和赋值/绑定的符号。

    - **运算符**：可以对数据进行操作并计算结果的符号。


    ## 词法单元：关键字


    关键字是保留字，在Python解释器处理时具有特殊含义。它们区分大小写，不能用于命名标识符（类、函数、变量或结构名称）。


    Python中的关键字列表如下：


    | | | |

    |---|---|---|

    | True | False | import |

    | from | as | None |

    | and | or | not |

    | in | is | try |

    | except | finally | raise |

    | del | global | nonlocal |

    | lambda | def | class |

    | with | if | elif |

    | else | pass | for |

    | while | continue | break |

    | assert | return | yield |

    | async | await | |


    ## 词法单元：标识符


    标识符用于定义Python对象的名称，如变量、函数、类、模块等。标识符的命名约定如下：


    - 必须以小写字母（a-z）或大写字母（A-Z）或下划线（`_`）开头。

    - 后跟任意数量的字母（a-z, A-Z）、数字（0-9）或下划线（`_`）。

    - 不应是关键字。

    - 不允许使用特殊符号，如`!`、`@`、`#`、`$`、`%`等。


    命名标识符时需要记住的一些要点：


    - 标识符本质上区分大小写，任何字符的大小写差异都指代不同的标识符。例如，`length`和`Length`是不同的标识符。

    - 仅以下划线不同的标识符是不同的。例如，`unitlength`和`unit_length`是不同的标识符。


    在命名标识符时，遵循以下做法也是一个好习惯（尽管不是强制性的）：


    - 应仔细命名标识符，强调清晰性和可读性。例如，在一个计算矩形面积的程序中，标识符名称的好选择是 - `length`、`breadth`和`area`。

    - 类名应以大写字母开头。

    - 以下划线开头的标识符在程序中具有特殊含义。

    - 变量、函数和方法名称应使用小写字母，多个单词之间用下划线分隔，如`area_of_square`、`area_of_triangle`等。


    ## 词法单元：字面量


    字面量是源代码中表示固定或常量值的词法单元。它们通常用于赋值语句中初始化变量或在比较表达式中使用。


    Python中可用的各种类型的字面量如下：


    ### 数值字面量


    数值字面量用于在源代码中表示数值。它们可以是三种类型 - 整数、浮点数和虚数。


    ### 整数字面量


    整数字面量是没有小数部分的数字。


    在Python中，整数字面量可以用四种位置（基数）数字系统编写：


    #### i. 十进制或基数-10整数


    十进制整数字面量由一个或多个数字（0-9）组成，除了数字为0的情况外，不能在第一个非零数字前有任何零。


    十进制整数示例：


    ```

    34

    3283298

    864

    0

    ```


    `092`不是有效的十进制整数字面量，因为零出现在第一个非零数字`9`之前。


    #### ii. 二进制或基数-2整数


    二进制整数或基数-2整数以`0b`或`0B`开头，后跟二进制数字`0-1`。


    #### iii. 八进制或基数-8整数


    八进制整数或基数-8整数以`0o`或`0O`开头，后跟八进制数字`0–7`。


    例如，`27`可以写成八进制整数字面量`0o33`。


    #### iv. 十六进制或基数-16整数


    十六进制整数或基数-16整数以`0x`或`0X`开头，后跟数字`0–9`或字母`A–F`（不区分大小写）。


    例如，`27`可以写成十六进制整数字面量`0x1B`或`0x1b`。


    因此，可以观察到数字`27`可以在程序中写成`27`（十进制）、`0b11011`（二进制）、`0o33`（八进制）或`0x1B`（十六进制）。


    #### 整数字面量中的下划线


    整数字面量中还允许使用可选字符`_`（下划线）来分组数字以增强可读性。


    一个下划线可以出现在数字之间，以及在基数说明符（如`0o`）之后。


    在确定字面量的实际数值时，它们会被忽略。


    一些有效的下划线用法是 - `10_00_00_000`、`0b_1110_0101`、`0x23_123`。


    ### 浮点数字面量


    浮点数字面量是源代码中存在的实数。它们包含小数部分和/或指数部分。


    小数部分包括小数点（`.`）后的数字。


    浮点数字面量示例：


    ```

    3.4

    .4

    8.

    3.4E2

    3.4e-2

    ```


    在上面的例子中，`.4`等同于`0.4`，`8.`等同于`8.0`。


    指数部分可以通过字母`e`或`E`后跟可选符号（`+`或`-`）和数字（`0–9`）来识别。这个指数等同于将实数乘以`10`的幂。


    例如，`3.4E2`等同于`3.4 x 10^2`或`340.0`，而`3.4e-2`等同于`3.4 x 10^-2`或`.034`。


    ### 虚数字面量


    为了指定复数并执行复数数学运算，Python支持虚数字面量，它们由实数或整数后跟字母`j`或`J`给出，表示单位虚数。


    虚数字面量示例：


    ```

    3.5j

    15.j

    12j

    .005j

    3e100j

    3.5e-10j

    ```'
