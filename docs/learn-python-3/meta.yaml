  md: '# # List


    # ## What is a Python List? How to Create a List?


    The most common and widely used collections in Python are **lists** which store
    an ordered group of objects (of any datatype) which might have some logical relation.
    This marks a considerable difference from arrays (in traditional languages) and
    makes Python an ideal language for handling real-life data which is not type-bound.


    Let us create a list of attributes of a particular vehicle available for sale
    in a car dealership:


    ```

    >>> l = ["BMW", "Z4", 2019,

    ...     4, "Red", True]

    ```


    In this list:


    +   - "BMW" is the make of the vehicle,

    - "Z4" is the model of the vehicle,

    - 2019 is the year when the vehicle was manufactured,

    - 4 represents the number of wheels,

    - "Red" is the color of the vehicle, and

    - True tells us that the vehicle up for sale is brand new.


    This method of creating a list from a collection of literals is known as **list
    display**.


    Notice, how this list contains items of multiple data types - `str`, `int` and
    `bool`.


    Apart from the list display shown above, the built-in `list()` function can also
    be used to create new lists.


    If no arguments are provided to the `list()` function, an empty list is created.


    ```

    >>> l = list()

    >>> l

    []

    ```


    If a string, tuple or set is passed as an argument, `list()` functions converts
    them into a list.


    ```

    >>> l = list("abcd")

    >>> l

    [''a'', ''b'', ''c'', ''d'']

    >>> l = list({1, 2, 3})

    >>> l

    [1, 2, 3]

    >>> l = list((1, 2, 3, 4))

    >>> l

    [1, 2, 3, 4]

    ```'
  merge: -1
  pgno: 87
- img_proc: true
  md: '# Accessing Items of a List


    Lists use zero-based indexing, where 0 is the index of the first element and `len(list)
    - 1` is the index of the last element.


    For example,


    ```

    >>> l = ["BMW", "Z4", 2019,

    ...     4, "Red", True]

    >>> l[0]

    ''BMW''

    >>> l[2]

    2019

    ```


    # Length of List


    The built-in `len()` function can be used to return the length of the list.


    ```

    >>> l = ["BMW", "Z4", 2019,

    ...     4, "Red", True]

    >>> len(l)

    6

    ```


    # Negative Indexing


    Just like `str`, sequence types like `list` support negative indexing, i.e., you
    can access the values of list from the end.


    Index of `-1` denotes the last item in the list, `-2` the second last item and
    so forth.


    ```

    >>> l = ["BMW", "Z4", 2019,

    ...     4, "Red", True]

    >>> l[-1]

    True

    >>> l[-3]

    4

    ```


    # Modifying a List


    As lists are mutable, the assignment operator can be used to modify or replace
    a single item in the list at a given index.


    ```

    >>> l = ["BMW", "Z4", "Red"]

    >>> l[2] = "Black"

    >>> l

    [''BMW'', ''Z4'', ''Black'']

    ```


    # Removing Item from a List


    `del` statement can be used to delete an item at a given index of a list.


    ```

    >>> l = ["BMW", "Z4", "Red"]

    >>> del l[1]

    >>> l

    [''BMW'', ''Red'']

    ```'
  merge: -1
  pgno: 88
