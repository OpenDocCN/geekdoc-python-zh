    >>> b / 3

    2.3333333333333335

    ```


    # Basic String Operation


    Interactive mode is not just restricted to basic arithmetic or assignments. Let
    us join two strings - "Hello, " and "world!" .


    ```

    >>> "Hello, " + "world!"

    ''Hello, world!''

    ```


    The complete functionality of Python is easily accessible to a user via the **Interactive
    Mode**.


    This makes it convenient for testing and instant execution of small code snippets
    (single line or few lines of code), a feature not available in compiled languages
    like C, C++ and Java.


    But, the statements cannot be saved for future use and have to retyped for re-execution.
    This disadvantage is overcome by the use of Python in **Script Mode** as described
    in the next section.


    # Script Mode of Execution


    To write reusable codes, script mode is the most preferred mode of code execution.


