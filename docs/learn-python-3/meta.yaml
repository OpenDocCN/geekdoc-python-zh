    \ an example of a set and add new item.\n\n```\n>>> s = {\"apple\", \"bat\"}\n\
    >>> id_s = id(s)\n>>> s.add(\"cat\")\n>>> s\n{'cat', 'apple', 'bat'}\n>>> id_s2\
    \ = id(s)\n>>> id_s == id_s2\nTrue\n```\n\nIn the above examples, the `id` of\
    \ the objects (`list`, `dict`, `set`) do not change, which implies that no new\
    \ objects are created and the original objects are modified.\n\n## Input / Output\n\
    \n### How to Accept User Input\n\n`input()` function is used to accept new input\
    \ data from the user.\n\nWhen this function is encountered in the code, the python\
    \ interpreter waits for the user to type a response which is read as a string\
