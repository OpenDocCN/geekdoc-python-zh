    \n>>> int_tuple = (1, )\n>>> type(int_tuple)\n<class 'tuple'>\n```\n\n## Accessing\
    \ Items of a Tuple\n\nTuples use zero-based indexing, where 0 is the index of\
    \ the first element and `len(tuple) - 1` is the index of the last element.\n\n\
    ```python\n>>> t = (\"BMW\", \"Z4\", 2019,\n...        4, \"Red\", True)\n>>>\
    \ t[0]\n'BMW'\n>>> t[2]\n2019\n```\n\n## Length of Tuple\n\nThe built-in `len()`\
    \ function can be used to return the length of the tuple.\n\n```python\n>>> t\
    \ = (\"BMW\", \"Z4\", 2019,\n...        4, \"Red\", True)\n>>> len(t)\n6\n```\n\
    \n## Negative Indexing\n\nJust like `list`, `tuple` supports negative indexing,\
