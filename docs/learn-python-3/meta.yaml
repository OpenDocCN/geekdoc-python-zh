    \nPython\n\nPython 中的代码块受此思想启发，因为它使 Python 代码更容易理解。\n代码块由行缩进表示，通常是 4 个空格（首选）或一个制表符。此缩进用于确定语句的逻辑分组，同一组内的所有语句具有相同的缩进级别。\n\
    \n下面是上述 C++/Java 示例对应的 Python 代码。\n\n注意代码块是如何根据逻辑进行缩进的。\n\n```\nif x < 10:\n \
