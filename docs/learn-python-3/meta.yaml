    # Unicode Support


    Python string objects support Unicode characters.


    A unicode character can be specified as `\u` followed by the 4 letter unicode
    ( `\uXXXX` ).


    ```

    >>> print("E = mc\u00B2")

    E = mc²

    ```


    In the above example, `\u00B2` is the unicode character which represents the ‘SUPERSCRIPT
    TWO’.


    # Other Types to String


    In case you want to create a string object from other data types, just use the
    built-in `str()` function as follows:


    ```

    >>> str(9)

    ''9''


    >>> str(10.0)

    ''10.0''

    ```


    # Accessing Characters of a String


    Python strings are “immutable”, i.e., the state (value) of the objects cannot
    be modified after they are created.


    Using the standard `[ ]` syntax and zero-based indexing, characters can be accessed
    in a string.


    If `s = "hello"` ,


    +   - `s[0]` will result in `h`

    - `s[2]` will result in `l`

    - `s[5]` will result in `IndexError: string index out of range` as the length
    of string is 5 (index 0 to 4 )

    - `s[2] = ''p''` will result in `TypeError: ''str'' object does not support item
    assignment` as `s` is immutable


    Python also supports negative indexing, i.e., you can access the values of a string
    from right to left.


    Index of `-1` denotes the last character of the string, `-2` is the second last
    character and so forth.


    If `s = "hello"` ,


    +   - `s[-1]` will result in `o`

    - `s[-4]` will result in `e`

    - `s[-6]` will result in `IndexError: string index out of range` as the length
    of string is 5 (negative index `-1` to `-5` )


    # Length of String


    The built-in function `len()` returns the length of a string which is useful during
    string traversal or other string operations.'
