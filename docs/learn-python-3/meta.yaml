    Copy box ''a'' contents


    Multiple boxes can exist, each containing an item having the same value.


    ```

    c

    int x = 3;

    int y = 3;

    int z = 3;

    ```


    ![](img/84256b7fa80e08517c2c7cbb96a2913c_26_1.png)


    Boxes ''x'', ''y'' & ''z''


    As shown above, the programming languages in which the variables (named boxes)
    are declared along with their types (size of the boxes) are known as **statically
    typed** languages.


    The size of these boxes cannot change later in the program until the variable
    is re-initialized with the same name and different type.


    **Python is a dynamically-typed language**, where every value or data item (of
    any type like numeric, string, etc.) is an object.


    The variable names are just name-tags pointing to the actual object containing
    data of any type.


    As there is no need of any variable declaration in Python before usage, there
    is no concept of default value (an empty box or `null`) which exists in other
    programming languages.


    Whenever a new object is created in Python, it is assigned a unique identity (ID)
    which remains the same throughout the lifetime of that object. This ID is the
    address of the object in memory and the built-in function `id()` returns the value
    of this address.


    ```

    python

    >>> a = 1

    >>> id(a)

    140407745943856

    >>> a = 2

    >>> id(a)

    140407745943888

    ```


    In the above example, the ID of `a` changes as it points to a new object ( 2 ).


    ```

    python

    >>> b = a

    >>> id(b)

    140407745943888

    ```


    Also, when `a` is assigned to `b`, instead of creating a new copy, `b` points
    to the same object as `a`.'
