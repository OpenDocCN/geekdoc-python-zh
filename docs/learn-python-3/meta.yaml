    # # Python Standard Library


    # ## Built-in Functions


    Python has a rich and extensive **Standard Library** which gives it an edge over
    traditional programming languages.


    **Python Standard Library** contains 69 built-in functions that are commonly used
    by programmers which saves a lot of time as they can be directly used in a program.


    We have already used some functions in the previous sections like `input()`, `output()`,
    `len()`, `sum()`, `min()`, `max()`, `list()`, `dict()`, etc.


    Some of the widely used functions can be categorized as follows:


    +   - Mathematical Functions

    - Type Functions

    - Input/Output Functions

    - Base/Unicode Functions


    # ## Mathematical Functions


    # ### abs()


    `abs(x)` returns the absolute value or magnitude of `x` of type `int`, `float`
    or `complex` number.


    ```

    >>> abs(-2.3)

    2.3

    >>> abs(-10)

    10

    >>> abs(2 + 2j)

    2.8284271247461903

    ```


    # ### round()


    `round(x [,ndigits])` rounds off `x` (`float`) to `ndigits` precision after the
    decimal point.


    In case `ndigits` is not provided, it rounds off to the nearest integer.


    ```

    >>> round(2.33462398)

    2

    >>> round(2.33462398, 3)

    2.335

    ```


    # ### sum()


    `sum(sequence [,start])` returns the sum of items in a `sequence` of type `list`,
    `tuple`, `range` or `set`.'
  - '[PAGE 120]


    If a second argument `start` is provided, it is added to the sum.


    ```

    >>> sum([1, 2, -1])

    2

    >>> sum((1, 2, -1))

    2

    >>> sum([1, 2, -1], 10)

    12

    ```


    # min()


    `min(sequence)` returns the minimum value of items in a `sequence` of type `list`,
    `tuple`, `range`, `str` or `set`.


    Apart from iterables, `min(arg1, arg2, ..)` also accepts multiple arguments `arg1`,
    `arg2` .. of numeric type and returns the smallest among these arguments.


    ```

    >>> min([1, 2, -1])

    -1

    >>> min(1, 2, -1)

    -1


    # character with minimum

    # ASCII value in a String

    >>> min("hello")

    ''e''

    ```


    # max()


    `max(sequence)` returns the maximum value of items in a `sequence` of type `list`,
    `tuple`, `range`, `str` or `set`.


    Apart from iterables, `max(arg1, arg2, ..)` also accepts multiple arguments `arg1`,
    `arg2` .. of numeric type and returns the largest among these arguments.


    ```

    >>> max([1, 2, -1])

    2

    >>> max(1, 2, -1)

    2


    # character with maximum

    # ASCII value in a String

    >>> max("hello")

    ''o''

    ```


    # pow()


    `pow(base, exp [,mod])` raises a `base` (`int`, `float`) to the power `exp` (`int`,
    `float`), i.e. `base**exp`.


    If `mod` (`int`) is provided `(base**exp) % mod` is returned.


    ```

    >>> pow(3, 2, 7)

    2

    >>> pow(1.4141, 2)

    1.9996788099999998

    ```'
