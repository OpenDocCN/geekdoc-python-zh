    # ## How to Accept User Input


    `input()` function is used to accept new input data from the user.


    When this function is encountered in the code, the python interpreter waits for
    the user to type a response which is read as a string and assigned to a variable.


    ```

    >>> name = input()

    edpunk

    >>> name

    ''edpunk''

    ```


    The function also has an optional string argument which is used as a prompt message
    for the user.


    ```

    >>> name2 = input("Enter name: ")

    Enter name: EdPunk

    >>> name2

    ''EdPunk''

    ```


    User input can be converted into integer or floating point numbers using the type
    conversion functions `int()` and `float()`.


    ```

    >>> num = int(input("Enter n: "))

    Enter n: 10

    >>> type(num)

    <class ''int''>

    >>> num

    10


    >>> pi = float(input("Enter pi: "))

    Enter pi: 3.14

    >>> type(pi)

    <class ''float''>

    >>> pi

    3.14

    ```


    # ## Displaying Output


    The built-in `print()` function is used to display an output (value of variables,
    expressions, etc.) on the standard output.


    Let us go through a program which computes the area of a rectangle and displays
    it:


    # ### Code


    ```

    length = 10

    breadth = 5

    ```'
