    \ int\nTrue\n```\n\nThe `in` operator can be used along with the `type()` function\
    \ to test if the data type is one of the mentioned types.\n\n```\n# count is of\
    \ type int or float\n>>> type(count) in (int, float)\nTrue\n```\n\n## Type Casting\n\
    \nThe process of converting the data type of an object from one type to another\
    \ is known as **Type Casting** or **Type Conversion**.\n\nThe two kinds of type\
    \ casting supported in Python are:\n\n### Implicit Type Casting\n\nThe Python\
    \ interpreter automatically converts the data type without the need of user intervention\
    \ when evaluating expressions to determine the final data type.\n\nIn the below\
    \ example the final type of `c` is automatically determined as `float` by the\
    \ Python interpreter.\n\n```\n>>> a = 1   # int\n>>> b = 2.0 # float\n>>> c =\
    \ a + b\n>>> c\n3.0\n>>> type(c)\n<class 'float'>\n```\n\n### Explicit Type Casting\n\
    \nWhen the type conversion is explicitly specified by the user using the various\
    \ built-in functions available in Python, it is known as explicit type casting.\n\
    \nThe built-in functions which can be used for explicit type casting are as follows:\n\
    \n1. `int()`\nCreates an `int` from a `bool`, `float` or `str` containing integer\
    \ characters (with or without sign).\n\n```\n>>> int(True)\n1\n>>> int(2.3)\n\
    2\n>>> int(\"2\")\n2\n```\n\n2. `float()`\nCreates a `float` from a `bool`, `int`\
    \ or `str` containing floating point literals (with or without sign).\n\n```\n\
    >>> float(True)\n1.0\n>>> float(2)\n2.0\n>>> float(\"2.3\")\n2.3\n```\n\n`float()`\
    \ also accepts the following string inputs -\n\n- \"Infinity\"\n- \"inf\"\n- \"\
    nan\" (not a number).\n\n```\n>>> float(\"Infinity\") > 1\nTrue\n>>> float(\"\
    nan\")\nnan\n```\n\nFloating point literals can also contain the following characters\
    \ -\n\n- `.` , which denotes the fractional part of a number.\n- `e` or `E` ,\
    \ which denotes the exponent part of a number.\n\n```\n>>> float(\"3.14\")\n3.14\n\
    >>> float(\"10.\")\n10.0\n>>> float(\"1e100\")\n1e+100\n>>> float(\"3.14e-10\"\
    )\n3.14e-10\n```\n\n3. `str()`\nConverts any object into a `str`.\n\n```\n>>>\
