- md: "## File Handling\n\n### File Handling in Python - Introduction & Overview\n\
    \nSo far we have written programs which accept input from the user via keyboard\
    \ and display the generated output on the standard output (console).\n\nThis activity\
    \ has the following disadvantages:\n\n- Feasible for small inputs, but cumbersome\
    \ in case of large inputs.\n- The entire input has to be entered every time the\
    \ program is executed.\n- The output generated is not saved for sharing or later\
    \ use.\n\nJust like words can be written on a piece of paper, information can\
    \ be stored on a computer disk as a named location or a file.\n\nPython comes\
    \ with the in-built ability to interact with files. Through file handling, Python\
    \ programs can read a file to provide input data and output the results into a\
    \ file for later use.\n\n### Text Files vs Binary Files - Use Case, File Formats,\
    \ Examples\n\nPrimarily, there are two types of files:\n\n#### Text File\n\nA\
    \ text file is the simplest way to store information in a human readable text\
    \ format (sequence of ASCII or Unicode characters), which includes numeric values.\n\
    \nIt is easy to view and modify the contents of a text file using any text editor\
    \ like notepad or even IDLE.\n\nEven the python script is stored as a text file\
    \ given by the extension `.py`. `.txt` is the most popular extension used for\
    \ a generic text file.\n\nAlthough text files do not have any structure, there\
    \ are international standards defining some rules for creating specialized text\
    \ files like:\n\n- `.csv`, where each row is a set of comma separated values.\
    \ This is the most popular data exchange format.\n- `.tsv`, similar to CSV but\
    \ the values are separated by tabs instead of commas.\n- `.xml` and `.json` are\
    \ popular web data exchange formats.\n- `.html` files are text files with contents\
    \ written in the Hypertext Markup Language designed to display contents in a web\
    \ browser.\n\n#### Binary File\n\nAlthough the contents of a text file is human\
    \ readable, in reality this information is stored on the disk in form of machine\
    \ readable bytes (1s and 0s) one character at a time. This makes the format simple\
    \ to be operated by any application, but it is less efficient and consumes more\
    \ memory (greater file size).\n\nIn a binary file, the contents are also stored\
    \ in form of bytes, but these bytes do not directly translate into ASCII or Unicode\
    \ characters.\n\nRather these bytes can represent anything like:\n\n- Complex\
    \ Data Structures\n- Image\n- Audio\n- Video\n\nand more.\n\nAs there is no simple\
    \ rule to determine the basic unit of information, so opening a binary file in\
    \ a text editor will display garbage values and even a single bit of change can\
    \ corrupt the entire file and make it unreadable. Hence, specialized softwares\
    \ are required to read and write binary files.\n\nPython has a built-in `pickle`\
    \ module which has implemented protocols to read and write binary files having\
    \ `.dat` or `.pickle` file extension. `pickle` is a Python specific binary file\
    \ format which can serialize any Python data structure (lists, dictionaries, etc)\
    \ or code object into a binary file. This byte-content of this file can then be\
    \ de-serialized and used later in any computer running Python.\n\n## File Opening\
    \ & Closing\n\nA text or binary file can be opened using the built-in `open(file_name,\
    \ mode='r')` function.\n\nThe parameters of the function are explained below:\n\
    \n`file_name`\n\n`file_name` is a required string parameter specifying the path\
    \ of the file to be opened.\n\nIt can either be an absolute path or a relative\
    \ path as shown below:\n\n- `'fname.txt'` is the relative path of a text file\
    \ residing in the current working directory from where the python script is being\
    \ executed.\n- `'../fname.txt'` is the relative path of a text file outside the\
    \ current directory where the python script is being executed.\n- `'/Users/edpunk/Documents/fname.txt'`\
    \ is the absolute path of a text file which can be opened by the python script\
    \ from any location as long as it is in the same system.\n\n`mode`\n\n`mode` is\
    \ an optional string parameter which specifies the mode in which the file has\
    \ to be opened. It defaults to `'r'` which means open for reading in text mode.\n\
    \nThe available modes are:\n\n| mode | purpose |\n| :--- | :--- |\n| `'r'` | Opens\
    \ the file for reading (default). |\n| `'t'` | Opens the file in text mode (default).\
    \ |\n| `'w'` | Opens the file for writing, truncating (emptying) the file if it\
    \ already exists. |\n| `'x'` | Same as `'w'`, but it fails if the file already\
    \ exists. |\n| `'a'` | Opens the file for writing, where any new data is added\
    \ at the end. It creates a new file if the file does not exist. |\n| `'b'` | Opens\
    \ the file in binary mode. |\n| `'rb'` | Opens the file in binary and read-only\
    \ mode. |\n| `'wb'` | Opens the file for writing in binary mode, truncating (emptying)\
    \ the file if it already exists. |\n| `'+'` | Allows both read and write operations\
    \ on a file. |\n| `'r+'` | Opens the file in read and write mode. It throws an\
    \ error in case the file does not exist. If the file already exists, new data\
    \ is overwritten on top of the existing data if the position of stream is not\
    \ moved to the end of the file. |\n| `'r+b'` | Opens the file in binary read and\
    \ write mode. It does not truncate the file if it already exists. |\n| `'w+'`\
    \ | Opens the file in read and write mode. It creates a new file or truncates\
    \ the contents of the file if it already exists. |\n| `'w+b'` | Opens the file\
    \ in binary read and write mode. It creates a new file or truncates the contents\
    \ of the file if it already exists. |\n| `'a+'` | Opens the file in read and append\
    \ mode. It creates a new file if it does not exist. If the file already exists,\
    \ new data is automatically added at the end of the file after existing data.\
    \ |\n| `'a+b'` | Opens the file in binary read and append mode. |\n\nAfter opening\
    \ a file and performing some file operations, it can be safely closed using the\
    \ `close()` method.\n\nFor example, let us write a program to open a file `data.txt`\
    \ in read and append mode and close the file object in the successive statement.\n\
    \n```\nf = open('data.txt', 'a+')\nf.close()\n```\n\n## File Reading\n\nOpening\
    \ a file using the `open()` function creates and returns a file object on which\
    \ the following activities can be performed:\n\n### Sequential Reading\n\nThe\
    \ following three methods can be used on a file object to sequentially read the\
    \ contents of a file:\n\n#### read()\n\n`read(size = -1)` method is used to read\
    \ `size` numbers of bytes of data from a file at a time.\n\nIn case `size` is\
    \ not specified, it reads and returns the entire content of the file.\n\n####\
    \ Example\n\nLet us consider a file named `info.txt` containing the below text:\n\
    \n```\nHello World\nThank You\n```\n\n#### Code\n\n```\n>>> f = open('info.txt',\
    \ 'r')\n>>> print(f.read(3))\nHel\n>>> print(f.read(4))\nlo W\n>>> f.close()\n\
    \n>>> f = open('info.txt', 'r')\n>>> print(f.read())\nHello World\nThank You\n\
    >>> f.close()\n```\n\n#### readline()\n\n`readline(size = -1)` method without\
    \ any arguments is used to read and return one line at a time from the given file.\n\
    \nIf `size` is specified, it returns at most `size` bytes of data or the data\
    \ until it encounters the newline character.\n\n#### Example\n\nLet us consider\
    \ a file named `info.txt` containing the below text:\n\n```\nHello World\nThank\
    \ You\n```\n\n#### Code\n\n```\n>>> f = open('info.txt', 'r')\n>>> f.readline(3)\n\
    'Hel'\n\n# Remaining data (byte size < 20)\n# until it encounters newline\n>>>\
    \ f.readline(20)\n'lo World\\n'\n>>> f.close()\n\n>>> f = open('info.txt', 'r')\n\
    >>> f.readline()\n'Hello World\\n'\n>>> f.close()\n```\n\nSince `readline()` returns\
    \ one row at a time, it can be used in a `while` statement to iterate over the\
    \ data row-wise. Once it reaches the end of file it returns an empty string.\n\
    \n#### Code\n\n```\nf = open('info.txt', 'r')\nline = f.readline()\nwhile line:\n\
    \    # Removes newline\n    # character from the\n    # end of the line\n    line\
    \ = line.strip()\n\n    print(line)\n\n    # read the next line\n    line = f.readline()\n\
    f.close()\n```\n\n#### Output\n\n```\nHello World\nThank You\n```\n\n`for` statement\
    \ can also be used to traverse the file row-wise without any requirement of the\
    \ `readline()` method. Simply iterating over the file object returns the data\
    \ one row at a time.\n\n#### Code\n\n```\nf = open('info.txt', 'r')\nfor line\
    \ in f:\n    # Removes newline\n```"
  mdcn: "## 文件处理\n\n### Python中的文件处理 - 简介与概述\n\n到目前为止，我们编写的程序都是通过键盘接收用户输入，并将生成的输出显示在标准输出（控制台）上。\n\
    \n这种活动存在以下缺点：\n\n-   对于少量输入是可行的，但在处理大量输入时则显得繁琐。\n-   每次执行程序时都必须重新输入全部输入。\n-  \
    \ 生成的输出不会被保存以供分享或后续使用。\n\n就像可以在纸上书写文字一样，信息也可以作为命名位置或文件存储在计算机磁盘上。\n\nPython内置了与文件交互的能力。通过文件处理，Python程序可以读取文件以提供输入数据，并将结果输出到文件中以供后续使用。\n\
    \n### 文本文件与二进制文件 - 用例、文件格式、示例\n\n文件主要分为两种类型：\n\n#### 文本文件\n\n文本文件是以人类可读的文本格式（ASCII或Unicode字符序列）存储信息的最简单方式，其中包含数值。\n\
    \n使用任何文本编辑器（如记事本甚至IDLE）都可以轻松查看和修改文本文件的内容。\n\n即使是Python脚本也以扩展名为`.py`的文本文件形式存储。`.txt`是通用文本文件最常用的扩展名。\n\
    \n尽管文本文件没有任何结构，但存在一些国际标准定义了创建专用文本文件的规则，例如：\n\n-   `.csv`，其中每行是一组逗号分隔的值。这是最流行的数据交换格式。\n\
    -   `.tsv`，类似于CSV，但值之间用制表符而不是逗号分隔。\n-   `.xml`和`.json`是流行的网络数据交换格式。\n-   `.html`文件是内容以超文本标记语言编写的文本文件，旨在Web浏览器中显示内容。\n\
    \n#### 二进制文件\n\n尽管文本文件的内容是人类可读的，但实际上这些信息是以机器可读的字节（1和0）形式存储在磁盘上的，一次一个字符。这使得该格式易于任何应用程序操作，但效率较低且消耗更多内存（文件大小更大）。\n\
    \n在二进制文件中，内容也以字节形式存储，但这些字节并不直接转换为ASCII或Unicode字符。\n\n相反，这些字节可以表示任何内容，例如：\n\n-\
