    # String Operations


    We can perform various operations on a string (sequence of characters) such as
    slicing, membership, concatenation and repetition.


    # Slicing


    In Python, a character in a string can be easily accessed using its index.


    ```

    >>> s = "Hello"

    >>> s[1]

    ''e''

    ```


    Python also provides a way to access a substring from a string. This substring
    is known as a **slice** and it can be obtained using the slice operator `[n:m]`
    which returns the part of the string from the start index (`n`) to the end index
    (`m`), including the first but excluding the last.


    ```

    >>> s = "Hello"

    >>> s[1:3]

    ''el''

    ```


    If the start index (`n`) is omitted, the default value of `n` is set as `0` which
    denotes the beginning of the string. If the end index (`m`) is omitted, the substring
    ends at the last character of the string.


    ```

    >>> s = "Hello"

    >>> s[:3]

    ''Hel''

    >>> s[3:]

    ''lo''

    >>> s[:]

    ''Hello''

    ```


    Negative indexing is also supported in the slice operator.


    ```

    >>> s = "Hello"

    >>> s[-4:-2]

    ''el''

    ```


    In the above example, `-4` is equivalent to `len(s) - 4 = 5 - 4 = 1` and `-2`
    is equivalent to `5 - 2 = 3`. Thus, `s[-4:-2]` is same as `s[1:3]`.


    The slice operator also allows the usage of a third index which is known as step
    as it allows a user to step over (skip) characters.


    ```

    >>> s = "Hello"

    >>> s[0:5:2]

    ''Hlo''

    ```'
