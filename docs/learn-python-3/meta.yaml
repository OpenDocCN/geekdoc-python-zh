    # # Strings


    # ## Strings: Introduction & Creation


    A String ( `str` ) is an **immutable** sequence of Unicode characters which is
    used to handle textual data in Python.


    They can be specified by enclosing within:


    +   - Single quotes: `''embedded "double" quotes are allowed''`

    - Double quotes: `"embedded ''single'' quotes are allowed"`

    - Triple quotes: `''''''Three single quotes''''''` , `"""Three double quotes"""`
    .


    Triple quoted strings can also span multiple lines.


    Some examples are provided below:


    ```

    s = "I am a String"


    s1 = """A

    multiline

    String"""


    s2 = ''''''Also a

    multiline

    String''''''

    ```


    # ## Escape Characters


    The backslash ( `\` ) character can be used in a string to escape characters that
    otherwise have a special meaning, such as newline, linefeed, or the quote character.


    | Escape Sequence | Meaning |

    | :--- | :--- |

    | `\` | Backslash ( `\` ) |

    | `\''` | Single quote ( `''` ) |

    | `"` | Double quote ( `"` ) |

    | `\a` | ASCII Bell (BEL) |

    | `\b` | ASCII Backspace (BS) |

    | `\f` | ASCII Formfeed (FF) |

    | `\n` | ASCII Linefeed (LF) |

    | `\r` | ASCII Carriage Return (CR) |

    | `\t` | ASCII Horizontal Tab (TAB) |

    | `\v` | ASCII Vertical Tab (VT) |


    Although `\''` and `"` can be used to specify quote characters, Python allows
    embedding double'
  - '[PAGE 76]


    quotes inside a single-quoted string ( ''My name is "Python".'' ) and single quotes
    inside a double-quoted string ( "Python''s World" ).


    # Unicode Support


    Python string objects support Unicode characters.


    A unicode character can be specified as `\u` followed by the 4 letter unicode
    ( `\uXXXX` ).


    ```

    >>> print("E = mc\u00B2")

    E = mc²

    ```


    In the above example, `\u00B2` is the unicode character which represents the ‘SUPERSCRIPT
    TWO’.


    # Other Types to String


    In case you want to create a string object from other data types, just use the
    built-in `str()` function as follows:


    ```

    >>> str(9)

    ''9''


    >>> str(10.0)

    ''10.0''

    ```


    # Accessing Characters of a String


    Python strings are “immutable”, i.e., the state (value) of the objects cannot
    be modified after they are created.


    Using the standard `[ ]` syntax and zero-based indexing, characters can be accessed
    in a string.


    If `s = "hello"` ,


    +   - `s[0]` will result in `h`

    - `s[2]` will result in `l`

    - `s[5]` will result in `IndexError: string index out of range` as the length
    of string is 5 (index 0 to 4 )

    - `s[2] = ''p''` will result in `TypeError: ''str'' object does not support item
    assignment` as `s` is immutable


    Python also supports negative indexing, i.e., you can access the values of a string
    from right to left.


    Index of `-1` denotes the last character of the string, `-2` is the second last
    character and so forth.


    If `s = "hello"` ,


    +   - `s[-1]` will result in `o`

    - `s[-4]` will result in `e`

    - `s[-6]` will result in `IndexError: string index out of range` as the length
    of string is 5 (negative index `-1` to `-5` )


    # Length of String


    The built-in function `len()` returns the length of a string which is useful during
    string traversal or other string operations.'
- md: '## String Operations


    We can perform various operations on a string (sequence of characters) such as
    slicing, membership, concatenation and repetition.


    ## Slicing


    In Python, a character in a string can be easily accessed using its index.


    ```python

    >>> s = "Hello"

    >>> s[1]

    ''e''

    ```


    Python also provides a way to access a substring from a string. This substring
    is known as a **slice** and it can be obtained using the slice operator `[n:m]`
    which returns the part of the string from the start index (`n`) to the end index
    (`m`), including the first but excluding the last.


    ```python

    >>> s = "Hello"

    >>> s[1:3]

    ''el''

    ```


    If the start index (`n`) is omitted, the default value of `n` is set as `0` which
    denotes the beginning of the string. If the end index (`m`) is omitted, the substring
    ends at the last character of the string.


    ```python

    >>> s = "Hello"

    >>> s[:3]

    ''Hel''

    >>> s[3:]

    ''lo''

    >>> s[:]

    ''Hello''

    ```


    Negative indexing is also supported in the slice operator.


    ```python

    >>> s = "Hello"

    >>> s[-4:-2]

    ''el''

    ```


    In the above example, `-4` is equivalent to `len(s) - 4 = 5 - 4 = 1` and `-2`
    is equivalent to `5 - 2 = 3`. Thus, `s[-4:-2]` is same as `s[1:3]`.


    The slice operator also allows the usage of a third index which is known as step
    as it allows a user to step over (skip) characters.


    ```python

    >>> s = "Hello"

    >>> s[0:5:2]

    ''Hlo''

    ```


    In the above example, the substring begins at the start of the string, takes a
    step size of 2 skipping e and ends at the last character again skipping the 4th
    character l.


    ## Membership


    `in` and `not in` operators can be used to determine whether a substring is present/not
    present in a string.


    ```python

    >>> s = "Hello"

    >>> "lo" in s

    True

    >>> "lp" not in s

    True

    ```


    ## Concatenation


    The `+` operator can be used to join two strings.


    ```python

    >>> s1 = "Hello"

    >>> s2 = "Python"

    >>> s1 + s2

    ''HelloPython''

    >>> s1 + "World"

    ''HelloWorld''

    ```


    ## Repetition


    The `*` operator repeats a string the number of times as specified by the integer
    operand.


    ```python

    >>> s = "Hello"

    >>> s*3

    ''HelloHelloHello''

    ```


    ## Introduction to String Methods


    Apart from the built-in function `len()` which returns the length of the string,
    String objects have access to several specialized functions (methods) that can:


    1. Convert Case of Strings

    2. Check Characters of a String

    3. Split a String

    4. Strip Characters from a String

    5. Checking for Prefix or Suffix in a String

    6. Find & Replace Characters in a String


    Let us discuss these methods in detail in the coming sections.


    ## Convert Case of Strings


    The following methods are useful in converting the case of the characters in a
    string:


    ### lower()


    All cased characters are converted into lowercase.


    ```python

    >>> "PYthon".lower()

    ''python''

    ```


    ### upper()


    All cased characters are converted into uppercase.


    ```python

    >>> "PYthon".upper()

    ''PYTHON''

    ```


    ### swapcase()


    Uppercase characters are converted into lowercase and lowercase characters are
    converted into uppercase.


    ```python

    >>> "PYthon".swapcase()

    ''pyTHON''

    ```


    ### capitalize()


    First character is capitalized and rest all characters are lowercased.


    ```python

    >>> "hello py".capitalize()

    ''Hello py''

    ```


    ### title()


    For each word present in the string, the first character is uppercased and the
    remaining characters are lowercased.


    ```python

    >>> "hello python".title()

    ''Hello Python''

    ```


    ## Check Characters of a String


    The following methods are used to check the type of characters in a string.


    ### isalpha()


    Returns `True` if all characters in the string are letters (A-Z a-z).


    ```python

    >>> "HelloPython".isalpha()

    True


    >>> "Hello Python".isalpha()

    False  # contains whitespace


    >>> "HelloPython2".isalpha()

    False  # contains digit

    ```


    ### isdigit()


    Returns `True` if all characters in the string are digits.


    ```python

    >>> "Hello24".isdigit()

    False  # contains alphabets

    >>> "24".isdigit()

    True

    ```


    ### isalnum()


    Returns `True` if all characters in the string are alphanumeric (Alphabets or
    Numeric).


    ```python

    >>> "02".isalnum()

    True

    >>> "HelloPython".isalnum()

    True

    >>> "Hello Python v2".isalnum()

    False  # contains whitespace

    >>> "HelloPythonv2".isalnum()

    True

    ```


    ### isascii()


    Returns `True` if the string is empty or all characters in the string are ASCII.


    ```python

    >>> "".isascii()

    True

    >>> "HelloPython".isascii()

    True

    >>> "Hello Py \u00B2".isascii()

    False

    >>> "पा से python".isascii()

    False

    ```


    ### islower()


    Returns `True` if all characters are lowercase.


    ```python

    >>> "hello".islower()

    True

    >>> "Hello".islower()

    False

    ```


    ### isupper()


    Returns `True` if all characters are uppercase.


    ```python

    >>> "HELLO".isupper()

    True

    >>> "Hello".isupper()

    False

    ```


    ### isspace()


    Returns `True` if there are only whitespace characters in the string. Some popular
    whitespace characters are ` ` (space), `\t` (tab), `\n` (newline), `\r` (carriage
    return), `\f` (form feed) and `\v` (vertical tab).


    ```python

    >>> " ".isspace()

    True

    ```


    ### istitle()


    Returns `True` if the string is title-cased, i.e., the first character of every
    word in the string is uppercased and the remaining characters are lowercased.


    ```python

    >>> "Hello World".istitle()

    True

    >>> "Hello world".istitle()

    False

    >>> "hello world".istitle()

    False

    ```


    ## Split a String


    Split methods help in splitting/partitioning a string.


    ### partition()


    `partition(sep)` method splits the string when the separator (`sep`) is encountered
    for the first time, and returns a tuple with three items (`string before separator`,
    `separator`, `string after separator`).


    ```python

    >>> "Hi|Ed|Punk".partition(''|'')

    (''Hi'', ''|'', ''Ed|Punk'')

    ```


    ### split()


    `split(sep=None, maxsplit=-1)` method splits a string into a list based on a string
    separator (`sep`).


    If `sep` is not specified, it defaults to `None`, where whitespace is regarded
    as separator, and the string is stripped of all leading and trailing whitespaces
    after which it is split into words contained in the string.


    ```python

    >>> "Hi|Ed|Punk".split(''|'')

    [''Hi'', ''Ed'', ''Punk'']

    >>> "Hi Ed Punk".split()

    [''Hi'', ''Ed'', ''Punk'']

    >>> "    Hi Ed Punk    ".split()

    [''Hi'', ''Ed'', ''Punk'']

    ```


    If `maxsplit` is provided, at most `maxsplit` number of splits are performed and
    the list will contain a maximum of `maxsplit+1` elements.


    `maxsplit` when not specified defaults to `-1`, which implies that there is no
    limit on the number of splits.


    ```python

    >>> "Hi|Ed|Punk|v2".split(''|'', 2)

    [''Hi'', ''Ed'', ''Punk|v2'']

    ```


    ## Strip Characters from a String


    Strip methods are useful in removing leading and/or trailing characters in a string.


    They accept an optional argument `chars` which specifies the set of characters
    which have to be removed.


    If no arguments are provided then `chars` defaults to ASCII whitespace and the
    method removes all leading and/or trailing spaces from the string.


    ### lstrip()


    All leading (on the left) characters are removed from the string.


    ```python

    >>> "   Hello|World   ".lstrip()

    ''Hello|World   ''

    >>> "www.edpunk.cc".lstrip(''w.'')

    ''edpunk.cc''

    ```


    ### rstrip()


    All trailing (on the right) characters are removed from the string.


    ```python

    >>> "   Hello|World   ".rstrip()

    ''   Hello|World''

    >>> "www.edpunk.cc".rstrip(''.c'')

    ''www.edpunk''

    ```


    ### strip()


    All leading and trailing characters are removed from the string.


    ```python

    >>> "   Hello|World   ".strip()

    ''Hello|World''

    >>> "www.edpunk.cc".strip(''cw.'')

    ''edpunk''

    ```


    ## Check Prefix or Suffix in a String


    `startswith()` and `endswith()` methods are used check whether a string starts
    or ends with the provided substring (or a tuple of substrings).


    ```python

    >>> "Hello Py".startswith("He")

    True

    >>> "Hello Py".startswith(("He","P"))

    True

    >>> "Py Hello".startswith(("He","P"))

    True

    >>> "Hello Py".endswith("y")

    True

    >>> "Hello Py".endswith(("p","y"))

    True

    >>> "Py Hello".endswith(("o","n"))

    True

    ```


    ## Find & Replace Characters in a String


    The following string methods are useful for locating substring in a string.


    ### count()


    `count(sub[, start[, end]])` returns the number of non-overlapping occurrences
    of a substring `sub` in the range `[start, end]`.


    `start` and `end` are optional parameters and they default to `0` and `len(string)`
    respectively.'
  mdcn: '## 字符串操作


    我们可以对字符串（字符序列）执行各种操作，例如切片、成员关系、连接和重复。


    ## 切片


    在 Python 中，可以使用索引轻松访问字符串中的字符。


    ```python

    >>> s = "Hello"

    >>> s[1]

    ''e''

    ```


    Python 还提供了一种从字符串中访问子字符串的方法。这个子字符串被称为**切片**，可以使用切片操作符 `[n:m]` 来获取，它返回从起始索引（`n`）到结束索引（`m`）的字符串部分，包括第一个但不包括最后一个。


    ```python

    >>> s = "Hello"

    >>> s[1:3]

    ''el''

    ```


    如果省略起始索引（`n`），`n` 的默认值设置为 `0`，表示字符串的开头。如果省略结束索引（`m`），子字符串将结束于字符串的最后一个字符。


    ```python

    >>> s = "Hello"

    >>> s[:3]

    ''Hel''

    >>> s[3:]

    ''lo''

    >>> s[:]

    ''Hello''

    ```


    切片操作符也支持负索引。


    ```python

    >>> s = "Hello"

    >>> s[-4:-2]

    ''el''

    ```


    在上面的例子中，`-4` 等同于 `len(s) - 4 = 5 - 4 = 1`，`-2` 等同于 `5 - 2 = 3`。因此，`s[-4:-2]` 与
    `s[1:3]` 相同。


    切片操作符还允许使用第三个索引，称为步长，因为它允许用户跳过（跳过）字符。


    ```python

    >>> s = "Hello"

    >>> s[0:5:2]

    ''Hlo''

    ```


    在上面的例子中，子字符串从字符串的开头开始，步长为 2，跳过 e，最后结束于最后一个字符，再次跳过第 4 个字符 l。


    ## 成员关系


    `in` 和 `not in` 运算符可用于确定子字符串是否存在于字符串中。


    ```python

    >>> s = "Hello"

    >>> "lo" in s

    True

    >>> "lp" not in s

    True

    ```


    ## 连接


    `+` 运算符可用于连接两个字符串。


    ```python

    >>> s1 = "Hello"

    >>> s2 = "Python"

    >>> s1 + s2

    ''HelloPython''

    >>> s1 + "World"

    ''HelloWorld''

    ```


    ## 重复


    `*` 运算符根据整数操作数指定的次数重复字符串。


    ```python

    >>> s = "Hello"

    >>> s*3

    ''HelloHelloHello''

    ```


    ## 字符串方法简介


    除了返回字符串长度的内置函数 `len()` 外，字符串对象还可以访问几个专用函数（方法），这些方法可以：


    1.  转换字符串大小写

    2.  检查字符串字符

    3.  分割字符串

    4.  去除字符串字符

    5.  检查字符串前缀或后缀

    6.  查找和替换字符串中的字符


    让我们在接下来的章节中详细讨论这些方法。


    ## 转换字符串大小写


    以下方法对于转换字符串中字符的大小写很有用：


    ### lower()


    所有有大小写的字符都转换为小写。


    ```python

    >>> "PYthon".lower()

    ''python''

    ```


    ### upper()


    所有有大小写的字符都转换为大写。


    ```python

    >>> "PYthon".upper()

    ''PYTHON''

    ```


    ### swapcase()


    大写字符转换为小写，小写字符转换为大写。


    ```python

    >>> "PYthon".swapcase()

    ''pyTHON''

    ```


    ### capitalize()


    第一个字符大写，其余所有字符小写。


    ```python

    >>> "hello py".capitalize()

    ''Hello py''

    ```


    ### title()


    对于字符串中的每个单词，第一个字符大写，其余字符小写。


    ```python

    >>> "hello python".title()

    ''Hello Python''

    ```


    ## 检查字符串字符


    以下方法用于检查字符串中字符的类型。


    ### isalpha()


    如果字符串中的所有字符都是字母（A-Z a-z），则返回 `True`。


    ```python

    >>> "HelloPython".isalpha()

    True


    >>> "Hello Python".isalpha()

    False  # 包含空格


    >>> "HelloPython2".isalpha()

    False  # 包含数字

    ```


    ### isdigit()


    如果字符串中的所有字符都是数字，则返回 `True`。


    ```python

    >>> "Hello24".isdigit()

    False  # 包含字母

    >>> "24".isdigit()

    True

    ```


    ### isalnum()


    如果字符串中的所有字符都是字母数字（字母或数字），则返回 `True`。


    ```python

    >>> "02".isalnum()

    True

    >>> "HelloPython".isalnum()

    True

    >>> "Hello Python v2".isalnum()

    False  # 包含空格

    >>> "HelloPythonv2".isalnum()

    True

    ```


    ### isascii()


    如果字符串为空或所有字符都是 ASCII，则返回 `True`。


    ```python

    >>> "".isascii()

    True

    >>> "HelloPython".isascii()

    True

    >>> "Hello Py \u00B2".isascii()

    False

    >>> "पा से python".isascii()

    False

    ```


    ### islower()


    如果所有字符都是小写，则返回 `True`。


    ```python

    >>> "hello".islower()

    True

    >>> "Hello".islower()

    False

    ```


    ### isupper()


    如果所有字符都是大写，则返回 `True`。


    ```python

    >>> "HELLO".isupper()

    True

    >>> "Hello".isupper()

    False

    ```


    ### isspace()


    如果字符串中只有空白字符，则返回 `True`。一些常见的空白字符是 ` `（空格）、`\t`（制表符）、`\n`（换行符）、`\r`（回车符）、`\f`（换页符）和
    `\v`（垂直制表符）。


    ```python

    >>> " ".isspace()

    True

    ```


    ### istitle()


    如果字符串是标题大小写，即字符串中每个单词的第一个字符大写，其余字符小写，则返回 `True`。


    ```python

    >>> "Hello World".istitle()

    True

    >>> "Hello world".istitle()

    False

    >>> "hello world".istitle()

    False

    ```


    ## 分割字符串


    分割方法有助于分割/分区字符串。


    ### partition()


    `partition(sep)` 方法在遇到分隔符（`sep`）时分割字符串，并返回一个包含三个项目的元组（`分隔符前的字符串`、`分隔符`、`分隔符后的字符串`）。


    ```python

    >>> "Hi|Ed|Punk".partition(''|'')

    (''Hi'', ''|'', ''Ed|Punk'')

    ```


    ### split()


    `split(sep=None, maxsplit=-1)` 方法根据字符串分隔符（`sep`）将字符串分割成列表。


    如果未指定 `sep`，则默认为 `None`，其中空白被视为分隔符，并且字符串会去除所有前导和尾随空白，然后分割成字符串中包含的单词。


    ```python

    >>> "Hi|Ed|Punk".split(''|'')

    [''Hi'', ''Ed'', ''Punk'']

    >>> "Hi Ed Punk".split()

    [''Hi'', ''Ed'', ''Punk'']

    >>> "    Hi Ed Punk    ".split()

    [''Hi'', ''Ed'', ''Punk'']

    ```


    如果提供了 `maxsplit`，则最多执行 `maxsplit` 次分割，列表将包含最多 `maxsplit+1` 个元素。


    `maxsplit` 未指定时默认为 `-1`，这意味着分割次数没有限制。


    ```python

    >>> "Hi|Ed|Punk|v2".split(''|'', 2)

    [''Hi'', ''Ed'', ''Punk|v2'']

    ```


    ## 去除字符串字符


    去除方法对于去除字符串中的前导和/或尾随字符很有用。


    它们接受一个可选参数 `chars`，该参数指定要删除的字符集。


    如果未提供参数，则 `chars` 默认为 ASCII 空白，该方法会从字符串中去除所有前导和/或尾随空格。


    ### lstrip()


    从字符串中去除所有前导（左侧）字符。


    ```python

    >>> "   Hello|World   ".lstrip()

    ''Hello|World   ''

    >>> "www.edpunk.cc".lstrip(''w.'')

    ''edpunk.cc''

    ```


    ### rstrip()


    从字符串中去除所有尾随（右侧）字符。


    ```python

    >>> "   Hello|World   ".rstrip()

    ''   Hello|World''

    >>> "www.edpunk.cc".rstrip(''.c'')

    ''www.edpunk''

    ```


    ### strip()


    从字符串中去除所有前导和尾随字符。


    ```python

    >>> "   Hello|World   ".strip()

    ''Hello|World''

    >>> "www.edpunk.cc".strip(''cw.'')

    ''edpunk''

    ```


    ## 检查字符串前缀或后缀


    `startswith()` 和 `endswith()` 方法用于检查字符串是否以提供的子字符串（或子字符串元组）开头或结尾。


