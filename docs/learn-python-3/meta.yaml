    \ it with something similar (same type).\n\n```\na = 2;\n```\n\n![](img/84256b7fa80e08517c2c7cbb96a2913c_25_1.png)\n\
    \nFilled box ‘a’\n\nThe contents of this box can be replicated and placed in a\
    \ similar (same type) box:\n\n```\nint b = a;\n```\n\n![](img/84256b7fa80e08517c2c7cbb96a2913c_26_0.png)\n\
    \nCopy box 'a' contents\n\nMultiple boxes can exist, each containing an item having\
    \ the same value.\n\n```\nint x = 3;\nint y = 3;\nint z = 3;\n```\n\n![](img/84256b7fa80e08517c2c7cbb96a2913c_26_1.png)\n\
    \nBoxes 'x', 'y' & 'z'\n\nAs shown above, the programming languages in which the\
    \ variables (named boxes) are declared along with their types (size of the boxes)\
    \ are known as **statically typed** languages.\n\nThe size of these boxes cannot\
    \ change later in the program until the variable is re-initialized with the same\
    \ name and different type.\n\n**Python is a dynamically-typed language**, where\
    \ every value or data item (of any type like numeric, string, etc.) is an object.\n\
    \nThe variable names are just name-tags pointing to the actual object containing\
    \ data of any type.\n\nAs there is no need of any variable declaration in Python\
    \ before usage, there is no concept of default value (an empty box or `null`)\
    \ which exists in other programming languages.\n\nWhenever a new object is created\
