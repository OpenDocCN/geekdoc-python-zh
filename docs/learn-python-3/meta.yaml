  md: '# Points to Note


    In Python,


    +   - there is no specialized literal such as a complex literal. A complex number
    is actually represented in the program using an expression comprising a real number
    (integer/float numeric literal) and an imaginary number (imaginary literal). For
    example, `1 + 2j` consists of an integer literal (`1`) and a imaginary literal
    (`2j`).

    - numeric literals do not include the minus sign (`-`). `-` is actually a unary
    operator it combines with a numeric literal to represent negative numbers. For
    example, in `-3.14` the numeric literal is `3.14` and `-` is an operator.


    # Boolean Literals


    The reserved words `True` and `False` are also boolean literals which can be used
    to specify the truth value in a program.


    # String Literals


    String literals are texts which can be specified in a variety of ways in Python:


    +   - Single quotes: `''python''`

    - Double quotes: `"python"`

    - Triple quoted: `''''''Triple python''''''`, `"""Three python"""`.


    Triple quoted strings can also span multiple lines.


    Example:


    ```

    s = "I am a String"


    s1 = """A

    multiline

    String"""


    s2 = ''''''Also a

    multiline

    String''''''

    ```


    The backslash (`\`) character can be used in a string literal to escape characters
    that otherwise have a special meaning, such as newline, linefeed, or the quote
    character.


    | Escape Sequence | Meaning |

    | :--- | :--- |

    | `\` | Backslash (`\`) |

    | `\''` | Single quote (`''`) |

    | `"` | Double quote (`"`) |

    | `\a` | ASCII Bell (BEL) |

    | `\b` | ASCII Backspace (BS) |

