  md: '# # Dictionary


    # ## What is a Dictionary?


    Python provides a mapping type collection which contains keys, and values corresponding
    to those keys.


    This collection is known as a `dictionary` (type `dict`), where each key is unique
    and can be used to easily store or retrieve values (any data-type including `string`,
    `int`, `float`, `list`).


    Dictionaries are indexed by keys (any immutable type - numbers, string, tuple)
    as compared to lists which are indexed by a range of numbers.


    # ## How to Create a Dictionary


    An empty dictionary can be created using a pair of braces - `{}` or using the
    built-in function `dict()` which is also a constructor.


    ```

    >>> d = {}

    >>> type(d)

    <class ''dict''>


    >>> d = dict()

    >>> d

    {}

    >>> type(d)

    <class ''dict''>

    ```


    To create a new dictionary with some initial values, one can use:


    # ### Key: Value Pairs


    A sequence of `key: value` pairs separated by commas in braces - `{}`.


    ```

    >>> d = {"yr": 20, "name": "Ed",

    ...         18: True}

    >>> d

    {''yr'': 20, ''name'': ''Ed'', 18: True}

    ```


    # ### Sequence of (key, value) Tuples


    A sequence of (key, value) tuples can be passed as an argument to the `dict()`
    function.


    ```

    >>> l = [("yr",20), ("name","Ed"),

    ...         (18,True)]

    >>> d = dict(l)

    >>> d

    {''yr'': 20, ''name'': ''Ed'', 18: True}

    ```'
  merge: -1
  pgno: 109
- img_proc: true
  md: '# Keyword/Named Arguments


    Keys and values can be passed as keyword arguments to the `dict()` function.


    ```

    >>> d = dict(yr=20, name="Ed",

    ...           is18=True)

    >>> d

    {''yr'': 20, ''name'': ''Ed'', ''is18'': True}

    ```


    One of the limitations of this method is that the keys of the dictionary are only
    of type string and their names must be within the namespace of an identifier.


    # Key and Value Lists


    There might cases when there is a need to combine two lists where keys are in
    one list and the corresponding values are available in another list.


    The built-in `zip()` function is useful for combining two lists into tuple pairs.


    The zipped iterator can be passed as an argument to the `dict()` to create a new
    mapping collection.


    ```

    >>> m = ["yr", "name", 18]

    >>> n = [20, "Ed", True]

    >>> list(zip(m, n))

    [(''yr'', 20), (''name'', ''Ed''), (18, True)]

    >>> dict(zip(m, n))

    {''yr'': 20, ''name'': ''Ed'', 18: True}

    ```


    # Keys with Default Value


    `dict.fromkeys(iterable[, value])` can be used to create new dictionary with items
    of an `iterable` as keys with an optional value (default - `None`) corresponding
    to the keys.


    ```

    >>> l = ["yr", "name", 18]

    >>> dict.fromkeys(l)

    {''yr'': None, ''name'': None, 18: None}

    >>> dict.fromkeys(l, 0)

    {''yr'': 0, ''name'': 0, 18: 0}

    ```


    # Accessing Items (Key:Value) of a Dictionary


    # Index Operator []


    `d[x]` can be used to access the value corresponding to a key `x` in a dictionary
    `d`.


    ```

    >>> d = {"yr": 20, "name": "Ed",

    ...      18: True}

    >>> d["yr"]

    20

    ```


    # get()


    `get(key[, default])` method can also be used to fetch the value for a key if
    key is in the dictionary, else a `default` value is returned.


    If `default` is not provided, `None` is the default value returned.'
