    Area: 50


    `print()` function can also be used to output the value of multiple objects when
    they are provided as arguments to the function.


    # Code


    ```

    a = 2 + 2

    b = 2 * 3.5

    print(a, b)

    ```


    # Output


    4 7.0


    In the above code, the values of `a` and `b` are separated by a blank space (the
    default value of `sep`).


    This property can be modified by providing any user defined separator using the
    `sep` option.


    Let us modify the code and provide `","` as the separator.


    # Code


    ```

    a = 2 + 2

    b = 2 * 3.5

    print(a, b, sep=",")

    ```


    # Output


    4,7.0


    When expressions are provided as arguments to the `print()` function, output is
    the evaluated value of those expressions.


    For example,


    # Code


    ```

    print(2 + 2)

    print(2 * 3.5)

    print("Hello, " + "world!")

    ```


    # Output


    4

