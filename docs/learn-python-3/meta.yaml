- md: "## Locating Items in a Tuple\n\nAs compared to a `list`, `tuple` supports only\
    \ methods that do not try to modify it.\n\nAn item `x` can be located in a tuple\
    \ using the `index(x[, i[, j]])` method which returns the first occurrence of\
    \ the item at or after index `i` and before index `j`. In case `i` and `j` are\
    \ not specified they default to `i=0` and `j=len(t)`.\n\n```\n>>> t = (34, 4,\
    \ 6, 23, 4)\n>>> t.index(4)\n1\n>>> t.index(4, 3)\n4\n>>> t.index(6, 1, 4)\n2\n\
    ```\n\n## Counting the Occurrence of an Item\n\n`count()` method can be used to\
    \ count the occurrence(s) of an item in a tuple.\n\n```\n>>> t = (34, 4, 6, 23,\
    \ 4)\n>>> t.count(4)\n2\n>>> t = (\"it\", \"is\", \"it\", \"I\")\n>>> t.count(\"\
    it\")\n2\n```\n\n## New Tuple with Reversed Items\n\nTo create a new tuple with\
    \ items in reverse order, use the built-in function `reversed()` nested in the\
    \ built-in `tuple()`.\n\n```\n>>> t = (\"T\", \"C\", 2, 4, \"S\")\n>>> new_t =\
    \ tuple(reversed(t))\n>>> new_t\n('S', 4, 2, 'C', 'T')\n>>> t\n('T', 'C', 2, 4,\
    \ 'S')\n```\n\n## New Tuple with Sorted Items\n\nTo create a new tuple with sorted\
    \ items, use the built-in `sorted(x, [key, reverse])` function which returns a\
    \ new sorted tuple.\n\nThe method optionally accepts 2 keyword (named) arguments:\n\
    - `key` which is used to specify a function which is called on each tuple element\
    \ prior to making the comparisons, and\n- `reverse` is a boolean which specifies\
    \ whether the tuple is to be sorted in descending order.\n\n```\n>>> t = (34,\
    \ 4, 6, 23, 9)\n>>> tuple(sorted(t))\n(4, 6, 9, 23, 34)\n>>> tuple(sorted(t, reverse=True))\n\
    (34, 23, 9, 6, 4)\n>>> t = (\"Oh\", \"Hi\", \"Py\", \"it\")\n>>> tuple(sorted(t))\n\
    ('Hi', 'Oh', 'Py', 'it')\n# lowercase the words before sorting\n>>> tuple(sorted(t,\
    \ key=str.lower))\n('Hi', 'it', 'Oh', 'Py')\n```\n\n## Nested Tuple\n\nA tuple\
    \ of tuples is also known as a nested tuple.\n\nLet us create a nested tuple containing\
    \ the details of all vehicles available for sale.\n\n```\n# Make Model Year No_of_wheels\n\
    t = (\n    (\"Kia\", \"Sonnet\", 2019, 4),\n    (\"Toyota\", \"Camry\", 2018,\
    \ 4),\n    (\"BMW\", \"Z4\", 2015, 4),\n    (\"BMW\", \"S1000\", 2016, 2),\n \
    \   (\"KTM\", \"390\", 2019, 2),\n)\n```\n\n`t[i][j]` is the syntax to fetch the\
    \ `j+1` th item of the tuple at index `i` of the nested tuple `t`.\n\n```\n>>>\
    \ t[2][1]\n'Z4'\n```\n\nAs compared to a nested list, a nested tuple is useful\
    \ in representing a dataset (such as a table fetched from a database) where it\
    \ is important to ensure the sanctity of data as the code cannot modify it because\
    \ tuples are immutable.\n\n## Understanding the Immutable Nature of Tuples\n\n\
    Just like lists, the `+=` operation works for a tuple and adds new item(s) to\
    \ it.\n\n```\n>>> t = (\"Hi\", \"Ed\", \"Punk\")\n>>> t += (1, 2)\n>>> t\n('Hi',\
    \ 'Ed', 'Punk', 1, 2)\n```\n\nBut tuples are immutable right?\nThen how are we\
    \ able to modify it.\n\nTo understand it better, let us revisit what happens when\
    \ we apply `+=` operator on a list.\n\n```\n>>> l = [\"Hi\", \"Ed\", \"Punk\"\
    ]\n>>> id_l = id(l)\n>>> l += [1, 2]\n>>> l\n['Hi', 'Ed', 'Punk', 1, 2]\n>>> id(l)\
    \ == id_l\nTrue\n```\n\nIn case of a list, the modified list `l` still points\
    \ at the same object.\n\nNow, let us add items to a tuple.\n\n```\n>>> t = (\"\
    Hi\", \"Ed\", \"Punk\")\n>>> id_t = id(t)\n>>> t += (1, 2)\n>>> t\n('Hi', 'Ed',\
    \ 'Punk', 1, 2)\n>>> id(t) == id_t\nFalse\n```\n\nIn case of a tuple, the modified\
    \ tuple is actually a completely new tuple with contents of the original tuple\
    \ and the extension.\n\nThe original tuple is not modified as it is immutable.\
    \ But, as `t` is no longer pointing to the original tuple, it is freed from memory.\n\
    \nThus, it is recommended that instead of `+=`, `append()` and `extend()` methods\
    \ should be employed to add new items programmatically as it will raise an error\
    \ in case the code is trying to modify a tuple.\n\n```\n>>> l = [\"Hi\", \"Ed\"\
    , \"Punk\"]\n>>> l.extend([1, 2])\n>>> l\n['Hi', 'Ed', 'Punk', 1, 2]\n\n>>> t\
    \ = (\"Hi\", \"Ed\", \"Punk\")\n>>> t.extend((1, 2))\nTraceback (most recent call\
    \ last):\n  File \"<stdin>\", line 1, in <module>\nAttributeError: 'tuple' object\
    \ has no attribute 'extend'\n```\n\n# Dictionary\n\n## What is a Dictionary?\n\
    \nPython provides a mapping type collection which contains keys, and values corresponding\
    \ to those keys.\n\nThis collection is known as a `dictionary` (type `dict`),\
    \ where each key is unique and can be used to easily store or retrieve values\
    \ (any data-type including `string`, `int`, `float`, `list`).\n\nDictionaries\
    \ are indexed by keys (any immutable type - numbers, string, tuple) as compared\
    \ to lists which are indexed by a range of numbers.\n\n## How to Create a Dictionary\n\
    \nAn empty dictionary can be created using a pair of braces - `{}` or using the\
    \ built-in function `dict()` which is also a constructor.\n\n```\n>>> d = {}\n\
    >>> type(d)\n<class 'dict'>\n\n>>> d = dict()\n>>> d\n{}\n>>> type(d)\n<class\
    \ 'dict'>\n```\n\nTo create a new dictionary with some initial values, one can\
    \ use:\n\n### Key: Value Pairs\n\nA sequence of `key: value` pairs separated by\
    \ commas in braces - `{}`.\n\n```\n>>> d = {\"yr\": 20, \"name\": \"Ed\",\n...\
    \         18: True}\n>>> d\n{'yr': 20, 'name': 'Ed', 18: True}\n```\n\n### Sequence\
    \ of (key, value) Tuples\n\nA sequence of (key, value) tuples can be passed as\
    \ an argument to the `dict()` function.\n\n```\n>>> l = [(\"yr\",20), (\"name\"\
    ,\"Ed\"),\n...         (18,True)]\n>>> d = dict(l)\n>>> d\n{'yr': 20, 'name':\
    \ 'Ed', 18: True}\n```\n\n### Keyword/Named Arguments\n\nKeys and values can be\
    \ passed as keyword arguments to the `dict()` function.\n\n```\n>>> d = dict(yr=20,\
    \ name=\"Ed\",\n...           is18=True)\n>>> d\n{'yr': 20, 'name': 'Ed', 'is18':\
    \ True}\n```\n\nOne of the limitations of this method is that the keys of the\
    \ dictionary are only of type string and their names must be within the namespace\
    \ of an identifier.\n\n### Key and Value Lists\n\nThere might cases when there\
    \ is a need to combine two lists where keys are in one list and the corresponding\
    \ values are available in another list.\n\nThe built-in `zip()` function is useful\
    \ for combining two lists into tuple pairs.\n\nThe zipped iterator can be passed\
    \ as an argument to the `dict()` to create a new mapping collection.\n\n```\n\
    >>> m = [\"yr\", \"name\", 18]\n>>> n = [20, \"Ed\", True]\n>>> list(zip(m, n))\n\
    [('yr', 20), ('name', 'Ed'), (18, True)]\n>>> dict(zip(m, n))\n{'yr': 20, 'name':\
    \ 'Ed', 18: True}\n```\n\n### Keys with Default Value\n\n`dict.fromkeys(iterable[,\
    \ value])` can be used to create new dictionary with items of an `iterable` as\
    \ keys with an optional value (default - `None`) corresponding to the keys.\n\n\
    ```\n>>> l = [\"yr\", \"name\", 18]\n>>> dict.fromkeys(l)\n{'yr': None, 'name':\
    \ None, 18: None}\n>>> dict.fromkeys(l, 0)\n{'yr': 0, 'name': 0, 18: 0}\n```\n\
    \n## Accessing Items (Key:Value) of a Dictionary\n\n### Index Operator []\n\n\
    `d[x]` can be used to access the value corresponding to a key `x` in a dictionary\
    \ `d`.\n\n```\n>>> d = {\"yr\": 20, \"name\": \"Ed\",\n...      18: True}\n>>>\
    \ d[\"yr\"]\n20\n```\n\n### get()\n\n`get(key[, default])` method can also be\
    \ used to fetch the value for a key if key is in the dictionary, else a `default`\
    \ value is returned.\n\nIf `default` is not provided, `None` is the default value\
    \ returned.\n\n```\n>>> d = {\"yr\": 20, \"name\": \"Ed\",\n...      18: True}\n\
    >>> d.get(\"name\")\n'Ed'\n>>> d.get(\"version\") is None\nTrue\n>>> d.get(\"\
    version\", \"1.0\")\n'1.0'\n```\n\nThis is an elegant method of fetching a value\
    \ from a dictionary and it should be used in real life software codes as it never\
    \ raises a `KeyError`.\n\n## Updating a Dictionary\n\n### Index Operator []\n\n\
    `d[x] = y` can be used to add the value `y` corresponding to a key `x` in a dictionary\
    \ `d`.\n\nIn case key `x` already exists, assignment updates or overwrites the\
    \ value corresponding to it.\n\n```\n>>> d = {\"yr\": 20, 18: True}\n>>> d[\"\
    name\"] = 'Ed'\n>>> d\n{'yr': 20, 18: True, 'name': 'Ed'}\n\n>>> d[\"name\"] =\
    \ 'Py'\n>>> d\n{'yr': 20, 18: True, 'name': 'Py'}\n```\n\n### update()\n\n`update()`\
    \ method can be used to add new items or update existing items in a `dict`.\n\n\
    This method accepts the following:\n\n#### 1. Dictionary\n\n```\n>>> d = {\"yr\"\
    : 20, 18: True}\n>>> d.update({\"name\": 'Ed'})\n>>> d\n{'yr': 20, 18: True, 'name':\
    \ 'Ed'}\n\n>>> d.update({\"yr\": 15, 18: False})\n>>> d\n{'yr': 15, 18: False,\
    \ 'name': 'Ed'}\n```\n\n#### 2. Sequence of (key, value) pairs\n\n```\n>>> d =\
    \ {\"yr\": 20, 18: True}\n>>> d.update([(\"name\", 'Ed'),\n...           ('yr',\
    \ 15)])\n>>> d\n{'yr': 15, 18: True, 'name': 'Ed'}\n```\n\n#### 3. Keyworded arguments\n\
    \n```\n>>> d = {\"yr\": 20, 18: True}\n>>> d.update(name=\"Ed\", yr=15)\n>>> d\n\
    {'yr': 15, 18: True, 'name': 'Ed'}\n```"
  mdcn: "## 在元组中定位元素\n\n与`list`相比，`tuple`仅支持那些不尝试修改它的方法。\n\n可以使用`index(x[, i[, j]])`方法在元组中定位元素`x`，该方法返回从索引`i`开始（包含）到索引`j`（不包含）之间该元素首次出现的位置。如果未指定`i`和`j`，则默认为`i=0`和`j=len(t)`。\n\
    \n```\n>>> t = (34, 4, 6, 23, 4)\n>>> t.index(4)\n1\n>>> t.index(4, 3)\n4\n>>>\
