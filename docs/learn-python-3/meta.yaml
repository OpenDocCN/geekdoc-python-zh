    \nNumeric data types are used for storing the following types of numbers:\n\n\
    ### Integer Numbers\n\nObjects holding integer numbers like `-1`, `0`, `200` are\
    \ of `int` data type.\n\n### Real or Floating-point Numbers\n\nObjects holding\
    \ real or floating point numbers like `-1.1`, `3e2`, `20.0` are of `float` data\
