- img_proc: true
  md: '# iii. Octal or base-8 Integer


    An octal integer or base-8 integer begins with `0o` or `0O` followed by octal
    digits `0–7`.


    For example, `27` can be written as an octal integer literal `0o33`.


    # iv. Hexadecimal or base-16 Integer


    A hexadecimal integer or base-16 integer begins with `0x` or `0X` followed by
    digits `0–9` or letters `A–F` (case insensitive).


    For example, `27` can be written as a hexadecimal integer literal `0x1B` or `0x1b`.


    Thus, it can be observed that number `27` can be written in the program as `27`
    (decimal), `0b11011` (binary), `0o33` (octal) or `0x1B` (hexadecimal).


    # Underscores in Integer Literals


    An optional character `_` (underscore) is also allowed in an integer literal to
    group digits for enhanced readability.


    One underscore can occur between digits, and after base specifiers like `0o`.


    They are ignored while determining the actual numerical value of the literal.


    Some valid underscore usages are - `10_00_00_000`, `0b_1110_0101`, `0x23_123`.


    # Floating Point Literals


    Floating point literals are real numbers present in the source code. They contain
    fractional component and/or exponential component.


    The fractional component includes the digits after the decimal point (`.`).


    Example floating point literals:


    ```

    3.4

    .4

    8.

    3.4E2

    3.4e-2

    ```


    In the above example, `.4` is equivalent to `0.4` and `8.` is equivalent to `8.0`.


    The exponential component can be identified by the letter `e` or `E` followed
    by an optional sign (`+` or `-`) and digits (`0–9`). This exponent is equivalent
    to multiplying the real number with the power of `10`.


    For example, `3.4E2` is equivalent to `3.4 x 10^2` or `340.0`, whereas `3.4e-2`
    is equivalent to `3.4 x 10^-2` or `.034`.


    # Imaginary Literals


    To specify complex numbers and perform complex number mathematics, Python supports
    imaginary literals which are given by real or integer number followed by the letter
    `j` or `J` which represents the unit imaginary number.


    Example imaginary literals:


    ```

    3.5j

    15.j

    12j

    .005j

    3e100j

    3.5e-10j

    ```'
