    \n## 更新字典\n\n### 索引运算符 []\n\n`d[x] = y`可用于在字典`d`中添加键`x`对应的值`y`。\n\n如果键`x`已存在，则赋值会更新或覆盖其对应的值。\n\
    \n```\n>>> d = {\"yr\": 20, 18: True}\n>>> d[\"name\"] = 'Ed'\n>>> d\n{'yr': 20,\
