    ```


    如果 `a`、`b`、`c`、...、`y`、`z` 是表达式，`op1`、`op2`、...、`opN` 是比较运算符，那么链式表达式 `a op1 b
    op2 c ... y opN z` 等价于 `a op1 b and b op2 c and ... y opN z`。


