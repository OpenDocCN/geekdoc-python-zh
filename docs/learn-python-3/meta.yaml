  md: '# # Errors & Exception Handling


    # ## Error Types


    A program contains “bug(s)” when it is unable to execute or produces an output
    which is different from what is expected. These bugs are generally introduced
    by a programmer unknowingly.


    The process of identifying and eliminating these bugs or errors is known as **debugging**.


    The three major types of errors are:


    +   - Syntax Error

    - Runtime Error

    - Logical Error


    # ## Syntax Error


    Syntax error occurs when the program contains any statement that does not follow
    the prescribed Python rules or syntax which makes it difficult for the Python
    interpreter to parse (understand) and execute it.


    Some common syntax errors are:


    +   - Missing/Misspelled keyword

    - Missing colon or brackets

    - Empty block

    - Incorrect position of keyword

    - Incorrect block indentation


    # ## Script Mode


    When a code containing syntactically incorrect statement is executed using script
    mode via IDLE, an error dialog box is displayed.


    ![](img/84256b7fa80e08517c2c7cbb96a2913c_53_0.png)


    Syntax Error Dialog'
  merge: -1
  pgno: 53
- img_proc: true
  md: "On closing the dialog box, the incorrect part of the code, the potential cause\
    \ of error, is highlighted in red.\n\n![](img/84256b7fa80e08517c2c7cbb96a2913c_54_0.png)\n\
    \nSyntax Error Highlighted\n\nThis error has to be rectified to execute the program\
    \ correctly.\n\n# Interactive Mode\n\nWhen a syntactically incorrect statement\
    \ is executed in the Python console (interactive mode), the Python interpreter\
    \ displays it and also adds a little arrow ( ^ ) pointing at the entry point or\
    \ token where the error was detected.\n\n# Example\n\n```\n>>> while True print('Hi!')\n\
    \  File \"<stdin>\", line 1\n    while True print('Hi!')\n          ^\nSyntaxError:\
    \ invalid syntax\n```\n\nIn the above example there is a syntax error with ^ pointing\
    \ to print function which the parser is unable to understand as there is a missing\
    \ : (colon) after True .\n\n# Runtime Error\n\nA runtime error occurs when the\
    \ program is terminated prematurely by the Python interpreter as it is unable\
    \ to execute a statement although it is correct syntactically.\n\nSome runtime\
    \ error examples are:\n\n+   - **ImportError**: Raised when the import statement\
    \ has trouble loading a module or any definition from a module.\n- **IOError**:\
    \ Raised when the interpreter is not able to open the file specified in the program.\n\
    - **ZeroDivisionError**: Raised when a number is divided or mod by zero.\n- **NameError**:\
    \ Raised when an identifier is encountered which has not been defined.\n- **ValueError**:\
    \ Raised when an argument or operand is of required data type, but has undesired\
    \ value.\n- **IndexError**: Raised when the provided index in a sequence (string,\
    \ list, tuple, etc.) is out of range.\n- **KeyError**: Raised when a dictionary\
    \ key is not found in the set of existing keys.\n- **TypeError**: Raised while\
    \ performing an operation on incompatible types.\n- **IndentationError**: Raised\
    \ when the indentation of a statement or code block is incorrect."
