    \n```python\nt = (\"BMW\", \"Z4\", 2019,\n    4, \"Red\", True)\nfor i in range(len(t)):\n\
    \    print(t[i])\n```\n\n```\nBMW\nZ4\n2019\n4\nRed\nTrue\n```\n\nA `while` statement\
    \ can be used to traverse a tuple by iterating on the value of index.\n\n```python\n\
    t = (\"BMW\", \"Z4\", 2019,\n    4, \"Red\", True)\nindex = 0\nwhile index < len(t):\n\
    \    print(t[index])\n    index += 1\n```\n\n```\nBMW\nZ4\n2019\n4\nRed\nTrue\n\
    ```\n\n## Built-in Functions that can be used for a Tuple\n\nBuilt-in functions\
