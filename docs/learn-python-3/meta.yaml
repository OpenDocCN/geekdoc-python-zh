    -1

    ```


    ## 运算符优先级及示例


    在中学学习数学时，我们遇到了 **BODMAS**（括号、乘方、除法、乘法、加法和减法）规则，它帮助我们理解在存在多个运算符（`of`、`x`、`/`、`+`、`-`）时如何计算数学表达式。


    在 Python 中，我们有大量的运算符，以及一个类似的规则来确定表达式的求值顺序。这被称为**运算符优先级**，其中优先级较高的运算符在表达式中先于优先级较低的运算符进行求值。


    下表列出了 Python 中运算符从高到低的优先级。同一行中的运算符具有相同的优先级，因此在这种情况下，表达式从左到右求值。


    | 运算符 | 描述 |

    |---|---|

    | `(expressions...)` | 括号表达式（分组） |

    | `**` | 幂运算 |

    | `+x`, `-x`, `~x` | 一元正号、一元负号、按位 NOT |

    | `*`, `@`, `/`, `//`, `%` | 乘法、矩阵乘法、除法、地板除、取余 |

    | `+`, `-` | 加法、减法 |

    | `<<`, `>>` | 移位 |

    | `&` | 按位 AND |

    | `^` | 按位 XOR |

    | `\|` | 按位 OR |

    | `in`, `not in`, `is`, `is not`, `<`, `<=`, `>`, `>=`, `!=`, `==` | 成员、同一性和比较
    |

    | `not x` | 布尔 NOT |

    | `and` | 布尔 AND |

    | `or` | 布尔 OR |

    | `:=` | 赋值表达式 |


    ## 练习


    ### 示例 1


    计算表达式


    ```

    15 - 2 * 4

    ```


    ### 解答


    步骤：`*` 的优先级高于 `-`


    ```

    15 - 2 * 4

    = 15 - 8

    = 7

    ```


    ### 示例 2


    计算表达式


    ```

    15 - 2 + 4

    ```


    ### 解答


    步骤：`-` 和 `+` 具有相同的优先级，因此表达式从左到右求值


    ```

    15 - 2 + 4

    = 13 + 4

    = 17

    ```


    ### 示例 3


    计算表达式


    ```

    15 - (2 + 4)

    ```


    ### 解答


    括号表达式 `(...)` 具有最高优先级，因此 `+` 首先被计算


    ```

    15 - (2 + 4)

    = 15 - 6

    = 9

    ```


    ### 示例 4


    计算表达式


    ```

    3 * 2 + 9 / 4 - 10 % 2 ** 2

    ```


    ### 步骤 1


    `**` 优先


    ```

    3 * 2 + 9 / 4 - 10 % 2 ** 2

    = 3 * 2 + 9 / 4 - 10 % 4

    ```


    ### 步骤 2


    `*`、`/` 和 `%` 具有相同的优先级，因此它们从左到右求值。


    ```

    3 * 2 + 9 / 4 - 10 % 4

    = 6 + 2.25 - 2

    ```


    ### 步骤 3


    `+` 和 `-` 求值


    ```

    6 + 2.25 - 2

    = 6.25

    ```


    ### 示例 5


    计算表达式


    ```

    20 / 4 // 2 * 2 - 4 + 20

    ```


    ### 步骤 1


    `*`、`/`、`//` 和 `%` 具有相同的优先级，因此它们从左到右求值。


    ```

    20 / 4 // 2 * 2 - 4 + 20

    = 5 // 2 * 2 - 4 + 20

    = 2 * 2 - 4 + 20

    = 4 - 4 + 20

    ```


    ### 步骤 2


    `+` 和 `-` 求值


    ```

    4 - 4 + 20

    = 20

    ```


    ### 示例 6


    计算表达式


    ```

    not 6 <= 4 and 3 ** 3 > 12 / 3

    ```


    ### 步骤 1


    `/` 是下一个优先级


    ```

    not 6 <= 4 and 27 > 12 / 3

    = not 6 <= 4 and 27 > 4

    ```


    ### 步骤 3


    比较运算符是下一个优先级


    ```

    not 6 <= 4 and 27 > 4

    = not False and True

    ```


    ### 步骤 4


    布尔 NOT 被计算


    ```

    not False and True

    = True and True

    ```


    ### 步骤 5


    布尔 AND 被计算


    ```

    True and True

    = True

    ```'
