  md: "# User Defined Functions, Modules & Packages\n\n# User Defined Functions\n\n\
    The built-in functions and modules of the Python Standard Library add tremendous\
    \ value by performing generic operations and can be utilised by developers for\
    \ any task.\n\nBut, at times a programmer needs to perform a set of operations\
    \ for a specific task multiple times. In such cases instead of rewriting the statements\
    \ again and again, the block of code can be wrapped into a function which can\
    \ be called anytime in the scope of the program.\n\n**User-defined functions**\
    \ make the program more:\n\n+   - **Organized**, as a block of code is now replaced\
    \ by a single function call which performs a specific task.\n- **Manageable**,\
    \ due to reduction of code length.\n- **Reusable**, as the user defined function\
    \ can be used anywhere in the current program or it can also be imported in another\
    \ program.\n\n# Function Structure\n\nLet us take a deep dive into a user defined\
    \ function (provided below) and understand its various components:\n\n```\ndef\
    \ adder(f, s, t = None):\n    \"\"\"\n    Returns the sum of f, s and t.\n   \
    \ If t is not provided,\n    return the sum of f and s.\n    \"\"\"\n    s = f\
    \ + s\n    if t:\n        s += t\n    return s\n```\n\n# Function Header\n\n```\n\
    def adder(f, s, t = None):\n```\n\nThe function header begins with the keyword\
    \ `def`.\n\nThe function name follows the `def` keyword. As it is an identifier,\
    \ the same nomenclature is followed while naming it. `adder` is the name of the\
    \ function in the above example.\n\nThe function name is followed by a pair of\
    \ parenthesis `( )`."
  merge: -1
  pgno: 139
- img_proc: true
  md: "In case any parameters are required by the function, they are enclosed inside\
    \ the parentheses. `f`, `s`, `t = None` are the three parameters of the function.\n\
    Finally, the function header ends with a colon.\n\n# Function Body\n\nThe body\
    \ of the function consists of one or more Python statements which have the same\
    \ amount of indentation (4 spaces) from the function header.\nIt is a good practice\
    \ to include the documentation string at the beginning of the function body that\
    \ briefly explains how it works. This docstring can either be a single-line or\
    \ a multiline string literal. In the above example the docstring is:\n\n```\n\"\
    \"\"\nReturns the sum of f, s and t.\nIf t is not provided,\nreturn the sum of\
    \ f and s.\n\"\"\"\n```\n\nThis docstring is followed by a series of statements\
    \ which represent the set of instructions to be executed. The set of instructions\
    \ in the above example are\n\n```\ns = f + s\nif t:\n    s += t\n```\n\nThe code\
    \ block finally ends with a `return` statement which returns one or more values.\n\
    \n```\nreturn s\n```\n\nIn the above example the value of `s` is returned which\
    \ is the sum.\nA missing `return` statement or a `return` statement returning\
    \ no value implies that the function returns `None`. These functions are known\
    \ as void functions which display the result of statements via `print()` function.\n\
    \n# Parameters and Arguments\n\n```\ndef adder(f, s, t = None):\n    \"\"\"\n\
    \    Returns the sum of f, s and t.\n    If t is not provided,\n    return the\
    \ sum of f and s.\n    \"\"\"\n    s = f + s\n    if t:\n        s += t\n    return\
    \ s\n```\n\nAfter defining the above function, let us now invoke or call the function:\n\
    \n```\nfst = 20\nsnd = 10\ntrd = 10\nsm1 = adder(fst, snd, trd)\nsm2 = adder(fst,\
    \ snd)\n```\n\n`f`, `s` and `t` are known as positional parameters as they have\
    \ a defined position in the function definition.\nAlso there is a provision to\
    \ assign a default value to a parameter using `=`."
  merge: -1
  pgno: 140
- img_proc: true
  md: "In the above example `t` has a default value of `None`.\n\nArguments are the\
    \ values passed to a function (or method) when it is called. In the above example\
    \ `fst`, `snd` and `trd` are the arguments. Since `t` has a default value, the\
    \ function can be invoked with or without the `trd` argument as shown for `sm2`.\n\
    \nArgument values are assigned to the corresponding function parameters that are\
    \ available as local variables inside the function.\n\nThus, value of `fst` is\
    \ assigned to `f` and `snd` is assigned to `s`. In case there is no third argument,\
    \ `t` has the default value `None`.\n\nThe values of `sm1` and `sm2` after executing\
    \ the script are:\n\n```\n>>> sm1\n40\n>>> sm2\n30\n```\n\n# Scope of Variables\n\
    \nIn Python, every variable has a well defined scope, i.e., it is accessible by\
    \ a part of the program and it cannot be accessed from outside its scope.\n\n\
    Based on their scope, there are two types of variables:\n\n# Local Variables\n\
    \nLocal variables are defined inside a function or a code block and can only be\
    \ accessed where they are defined.\n\nThey exist only during the execution of\
    \ the function or the code block.\n\n```\ndef triple(a):\n    result = 3*a\n \
    \   # variable result\n    # is accessible locally\n    print(\"local:\", result)\n\
    \n# Outputs value of result\n# inside the function\ntriple(3)\n\n# Throws an error\
    \ as result is\n# not accessible outside the scope\n# of function triple()\nprint(\"\
    outside:\", result)\n```\n\n```\nlocal: 9\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nNameError: name 'result' is not defined\n\
    ```\n\n# Global Variables\n\nVariables defined outside any function or code block\
    \ are known as global variables."
