  md: "# assert\n\nAn `assert` statement is often used during code development to\
    \ act like a safety valve which notifies the programmer in case the test expression\
    \ is evaluated as `False`.\n\nIf the test expression's value is `True`, the code\
    \ execution continues normally.\n\nAn `AssertionError` is raised if the value\
    \ is `False`.\n\n# Code\n\n```\na = 3\nb = 4\nassert a == b\nc = 5\n```\n\n# Output\n\
    \n```\nTraceback (most recent call last):\n  File \"/Users/name/test.py\",\n \
    \   line 3, in <module>\n      assert a == b\nAssertionError\n```\n\nThe statement\
    \ also allows for a message to be attached to the `AssertionError`.\n\n# Code\n\
    \n```\na = 3\nb = 4\nassert a == b, \"a is not equal to b\"\nc = 5\n```\n\n# Output:\n\
    \n```\nTraceback (most recent call last):\n  File \"/Users/name/test.py\",\n \
    \   line 3, in <module>\n      assert a == b, \"a is not equal to b\"\nAssertionError:\
    \ a is not equal to b\n```\n\n# Exception Handling\n\nException handling is the\
    \ process of properly handling an exception which can potentially crash a program\
    \ during execution.\n\nWhen an error occurs, the program throws an exception.\n\
    \nThe runtime system attempts to find an **exception handler**, a block of code\
    \ that can handle a particular type of error. Once located, the suitable exception\
    \ handler **catches the exception** and executes the code block which can attempt\
    \ to recover from the error. In case the error is unrecoverable, the handler provides\
    \ a way to gently exit the program.\n\nThe `try` statement in Python specifies\
    \ the exception handlers and/or cleanup code for a code block.\n\nThe various\
    \ parts of a try statement are:\n\n+   - `try` block: The block of statements\
    \ within which an exception might be thrown.\n- `except` clause(s): One or more\
    \ exception handlers. Each `except` clause handles a particular type of exception.\
    \ In case an exception of a particular type occurs in the `try` block, the corresponding\
    \ `except` clause code block is executed."
  merge: -1
  pgno: 58
- img_proc: true
  md: "+   - `else` clause: An optional `else` clause can also be included after the\
    \ last `except` block. In case no exception is raised, none of the `except` blocks\
    \ are executed. In this case, the `else` code block is executed.\n- `finally`\
    \ clause: An optional `finally` clause can be added at the end of the try statement\
    \ which includes a block of statements that are executed regardless of whether\
    \ or not any error occured inside the try block. This block is usually setup for\
    \ code cleanup and closing all open file objects.\n\nHere's the general form of\
    \ these statements:\n\n```\ntry:\n    [code block]\nexcept [exception1 [as identifier1]]:\n\
    \    [exception code block 1]\nexcept [exception2 [as identifier2]]:\n    [exception\
    \ code block 2]\n...\n...\nelse:\n    [code block executes if no error]\nfinally:\n\
    \    [code block always executed]\n```"
