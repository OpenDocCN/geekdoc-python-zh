    # Tuple Swapping


    In Python, a temporary variable is not required to swap values of two variables.
    Values can be directly swapped (tuple swapping) as shown below:


    ```

    >>> a = ''Hello''

    >>> b = ''World''

    >>> b, a = a, b

    >>> a

    ''World''

    >>> b

    ''Hello''

    ```


    # Built-in Data Types


    In Python, the `type` of a data (or value) is not linked to the variable, but
    to the actual object which contains it. This type is also known as the object''s
    data type and is used for identifying the operations that can be performed on
    the data.


    The following built-in data types are available in Python:


    +   - Numeric Types - `int`, `float`, `complex`, `bool`

    - Sequence Types - `list`, `tuple`, `str`

    - Set Type - `set`

    - Mapping Type - `dict`

    - Special Type - `None`


    Often sequence, set and mapping types are also collectively known as **iterables**
    as they are a collection of items on which a user can traverse (iterate).


    # Numeric Types - `int`, `float`, `complex`, `bool`


    Numeric data types are used for storing the following types of numbers:


    # Integer Numbers


    Objects holding integer numbers like `-1`, `0`, `200` are of `int` data type.


    # Real or Floating-point Numbers


    Objects holding real or floating point numbers like `-1.1`, `3e2`, `20.0` are
    of `float` data type.


    # Complex Numbers


    Objects storing complex numbers like `2 + 1j`, `-3j`, `-1 + 2J` are of type `complex`.


    Each complex number has two parts, the real part which is a numeric integer or
    floating point literal, and the imaginary part which is an imaginary literal.


    # Boolean


    The boolean data type (`bool`) is a subtype of `int`. It stores the evaluated
    value of expressions represented as keywords - `True` (integer value `1`) and
    `False` (integer value `0`).


    # Sequence Types - `str`, `list`, `tuple`


    An ordered collection of items where each item can be accessed using an integer
    index is known as a sequence. The following three sequence data types are available
    in Python:'
  - '[PAGE 29]


    A string ( `str` data type) is a sequence of zero or more unicode characters enclosed
    within a pair of single ( `''` ) or double ( `"` ) quotes.


    Some example strings are -


    ```

    "42"

    ''hello''

    "python"

    ```


    # List


    A `list` is sequence of items of same or different data types which are enclosed
    within brackets - `[ ]`.


    Some example lists are -


    ```

    [1, 2, 3]

    [''abc'', 23, 3.14]

    [''edpunk'', ''python'']

    ```


    # Tuple


    A `tuple` is an immutable sequence of items of same or different data types which
    are enclosed within parentheses - `( )`.


    Some example tuples are -


    ```

    (1, 2, 3)

    (''abc'', 23, 3.14)

    (''edpunk'', ''python'')

    ```


    # Set Type - `set`


    A `set` is an unordered collection of unique items of same of different data types
    which are enclosed in curly braces - `{ }`.


    Some example sets are -


    ```

    {1, 2, 3}

    {''abc'', 23, 3.14}

    {''edpunk'', ''python''}

    ```


    # Mapping Type - `dict`


    `dict` is a mapping data type which stores values in the form of key-value pairs.


    It is used for representing data where you can quickly access the value (any data
    type) corresponding to a key (any data type except `list`, `set` or `dict`), just
    like a dictionary where you can lookup the meaning of a given word.


    Keys and corresponding values are separated by colon ( `:` ).


    The key-value pairs are separated by comma ( `,` ) and enclosed within curly braces
    - `{ }`.


    Some example dictionaries are -


    ```

    {1: "a", 2: "b", 3: "c"}

    {"name": "edpunk", "language": "python"}

    ```


    # Special Type - `None`


    `None` is a special data type which is used to denote the absence of value in
    an object.'
