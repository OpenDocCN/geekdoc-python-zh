    >>> name

    ''edpunk''

    ```


    The function also has an optional string argument which is used as a prompt message
    for the user.


    ```

    >>> name2 = input("Enter name: ")

    Enter name: EdPunk

    >>> name2

    ''EdPunk''

    ```


    User input can be converted into integer or floating point numbers using the type
    conversion functions `int()` and `float()`.


    ```

    >>> num = int(input("Enter n: "))

    Enter n: 10

    >>> type(num)

    <class ''int''>

    >>> num

    10


    >>> pi = float(input("Enter pi: "))

    Enter pi: 3.14

    >>> type(pi)

    <class ''float''>

    >>> pi

    3.14

    ```


