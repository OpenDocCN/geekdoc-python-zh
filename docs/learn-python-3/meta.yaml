    \n### Mutable Data Types\n\nIn Python, the following data types are mutable, i.e.,\
    \ any modification does not create a new object but modifies the existing object:\n\
    \n- list\n- set\n- dict\n\nLet us take a list and modify its contents.\n\n```\n\
    >>> l = [1, 2, 3]\n>>> id_l = id(l)\n>>> l[0] = 0\n>>> l\n[0, 2, 3]\n>>> id_l2\
    \ = id(l)\n>>> id_l == id_l2\nTrue\n```\n\nLet us take an example of a dictionary\
    \ and add a new key:value pair.\n\n```\n>>> d = {\"a\": \"apple\", \"b\": \"boy\"\
    }\n>>> id_d = id(d)\n>>> d[\"c\"] = \"cat\"\n>>> d\n{'a': 'apple', 'b': 'boy',\
