- md: '## Operators & Expressions


    ### Introduction to Operators


    Operators are symbols that perform a single simple task or operation on one or
    more values resulting in a single evaluated value.


    The values on which these operators are applied are called **operands**.


    ### Unary Operators


    Unary operators are applied on a single operand positioned on right side of the
    operator.


    Following are some unary operators available in Python:


    - `+` (plus): The unary `+` operator does not change the value of the operand.

    - `-` (minus): The unary `-` operator changes the sign of the operand.

    - `~` (bitwise NOT): The unary `~` results in the bit-wise inversion of the integer
    operand. The bit-wise inversion of `x` is defined as `-(x+1)`.


    ```

    >>> x = 5

    >>> -x

    -5

    >>> +x

    5

    >>> ~x

    -6

    ```


    ### Binary Operators


    Binary operators are applied on two operands.


    For example, arithmetic operators ( `+` , `-` , `*` , `/` ) evaluate the result
    of mathematical computation of two values.


    ### Operators in Python


    A rich set of operators are available in Python which can be categorized as follows:


    - Arithmetic Operators - `+` , `-` , `*` , `/` , `%` , `**` , `//`

    - Relational Operators - `==` , `!=` , `>` , `>=` , `<` , `<=`

    - Assignment Operators - `+=` , `-=` , `*=` , `/=` , `%=` , `**=` , `//=`

    - Logical Operators - `not` , `or` , `and`

    - Identity Operators - `is` , `is not`

    - Membership Operators - `in` , `not in`

    - Bitwise and Shift Operators - `&` , `|` , `^` , `~` , `<<` , `>>`


    ## Arithmetic Operators


    Arithmetic operations can be performed in Python using the following arithmetic
    operators:


    ### Addition


    The `+` operator adds the values of numeric operands.


    ```

    >>> 2 + 3

    5

    >>> 2 + 3.0

    5.0

    ```


    In case the operands are of type `str`, `list` or `tuple`, the `+` operator concatenates
    these two sequences or strings.


    ```

    >>> ''edpunk'' + ''python''

    ''edpunkpython''

    >>> ["ed", "punk"] + ["python", ]

    [''ed'', ''punk'', ''python'']

    ```


    ### Subtraction


    The `-` operator subtracts the value of operand on right from the value of operand
    on left.


    ```

    >>> 2 - 3

    -1

    ```


    ### Multiplication


    The `*` operator multiplies the values of numeric operands.


    ```

    >>> 2 * 3

    6

    ```


    In case the operands are of type `str`, `list` or `tuple`, the `*` operator returns
    a sequence or string self-concatenated the specified number of times.


    ```

    >>> "python" * 3

    ''pythonpythonpython''

    >>> [''ed'', ''py''] * 3

    [''ed'', ''py'', ''ed'', ''py'', ''ed'', ''py'']

    ```


    ### Division


    The `/` operator divides the value of operand on left by the value of operand
    on right and returns the real number quotient.


    ```

    >>> 6 / 2

    3.0

    >>> 5 / 2

    2.5

    ```


    ### Floor Division


    The `//` operator divides the value of operand on left by the value of operand
    on right and returns the integer quotient.


    ```

    >>> 5 // 2

    2

    ```


    ### Modulus


    The `%` operator divides the value of operand on left by the value of operand
    on right and returns the remainder.


    ```

    >>> 5 % 2

    1

    ```


    ### Exponent


    The `**` operator raises the left operand to the power of the right operand.


    ```

    >>> 5 ** 2

    25

    ```


    ## Relational Operators


    Relational operators are useful for comparing the values of the operands to determine
    their relationship. Following relational operators are available in Python:


    ### Equals to


    The `==` operator returns `True` if the value of operand on left is same as the
    value of operand on right.


    ```

    >>> 2 == 2

    True

    >>> 2 == 3

    False

    ```


    In case of sequence operands like `str`, `list` or `tuple`, the result is `True`
    if both the sequences are exactly the same.


    ```

    >>> "python" == "python"

    True

    >>> "pypi" == "python"

    False

    >>> [1, 2, 3] == [1, 2, 3]

    True

    ```


    As a sequence is an ordered collection of items, so the order in which the items
    are positioned is very important.


    ```

    >>> [2, 1, 3] == [1, 2, 3]

    False

    ```


    ### Not equal to


    The `!=` operator returns `True` if the value of operand on left is not equal
    to the value of operand on right.


    ```

    >>> 2 != 2

    False

    >>> 2 != 3

    True

    >>> ''py'' != ''oy''

    True

    >>> [2, 1, 3] != [1, 2, 3]

    True

    >>> [1, 2, 3] != [1, 2, 3]

    False

    ```


    ### Greater than


    The `>` operator returns `True` if the value of operand on left is greater than
    the value of operand on right.


    ```

    >>> 3 > 2

    True

    >>> 2 > 2

    False

    ```


    In case of strings operands, `>` operator perform comparison according to the
    Unicode code point (integer) of each character one-by-one.


    The Unicode code point of a character can be obtained using the `ord()` function
    in Python.


    The code point of first character of both operands are compared. In case they
    are equal, the code point of next character of both operands are compared and
    the process continues.


    For example,


    ```

    >>> "python" > "Python"

    True

    ```


    The code point of `"p"` (112) is greater than the code point of `"P"` (80). As
    112 is greater than 80 the expression evaluates to `True`.


    Let us take another example:


    ```

    >>> "pYthon" > "python"

    False

    ```


    The code point of first character is same (112), so the next set of characters
    are compared. The code point of `"Y"` (89) is not greater than the code point
    of `"y"` (121) so the expression evaluates to `False`.


    If two string operands `p` and `q` are of unequal lengths (`len(p) < len(q)`)
    and `p` is a substring of `q` such that `q = pt` where `t` is any string of length
    greater than 0, then `q > p` returns `True`.


    ```

    >>> "python" > "py"

    True

    ```


    In case of sequence operands like `list` or `tuple`, the items are compared one-by-one
    starting from index 0.


    ```

    >>> ["p","py","PY"] > ["p","Py","PY"]

    True

    >>> [1, 3] > [1, 2]

    True

    >>> [1, 3, 4] > [1, 2]

    True

    ```


    In the above examples, `"py"` is greater than `"Py"` and 3 is greater than 2 respectively.


    If two sequences are of unequal lengths and the smaller sequence is the starting
    subsequence of the larger one, then the larger sequence is considered greater
    than the smaller one.


    ```

    >>> [1, 2, 4] > [1, 2]

    True

    ```


    ### Greater than or equal to


    The `>=` operator returns `True` if the value of operand on left is greater than
    or equal to the value of operand on right.


    ```

    >>> 3 >= 3

    True

    >>> 2 >= 3

    False

    ```


    In case of sequence operands (`str`, `list`, `tuple`), the comparison operation
    performed is along the same lines as the `>` operator discussed above.


    ```

    >>> "python" >= "Python"

    True

    >>> "python" >= "python"

    True

    >>> ["py", "py", "PY"] >= ["py", "Py", "PY"]

    True

    >>> [1, 2] >= [1, 2]

    True

    >>> [1, 2, 4] >= [1, 2]

    True

    ```


    ### Less than


    The `<` operator returns `True` if the value of operand on left is less than the
    value of operand on right.


    ```

    >>> 2 < 3

    True

    >>> 3 < 3

    False

    ```


    In case of sequence operands (`str`, `list`, `tuple`), the comparison operation
    performed is along the same lines as the `>` operator discussed above.


    ```

    >>> "file" < "Pile"

    False

    # f(102) is > P(80)

    >>> "py" < "python"

    True

    >>> ["Py", "PY"] < ["py", "PY"]

    True

    >>> [''a'', 2] < [''a'', 3]

    True

    >>> [1, 2] < [1, 2, 4]

    True

    ```


    ### Less than or equal to


    The `<=` operator returns `True` if the value of operand on left is lesser than
    or equal to the value of operand on right.


    ```

    >>> 2 <= 3

    True

    >>> 3 <= 3

    True

    ```


    In case of sequence operands (`str`, `list`, `tuple`), the comparison operation
    performed is along the same lines as the `>` operator discussed above.


    ```

    >>> "file" <= "Pile"

    False

    # f(102) is > P(80)

    >>> "py" <= "python"

    True

    >>> ["Py", "PY"] <= ["py", "PY"]

    True

    >>> [''a'', 3] <= [''b'', 2]

    True

    >>> [1, 2] <= [1, 2, 4]

    True

    ```


    ## Assignment Operators


    The assignment symbol ( `=` ) serves as a delimiter between the name and value
    in an assignment statement.


    It binds (or rebinds) a value (data, variable, expression) on the right to the
    target variable on the left.


    ```

    >>> x = 1

    >>> x

    1

    >>> y = x

    >>> y

    1

    >>> y = "python"

    >>> y

    ''python''

    ```


    Binary operators can be combined with the assignment symbol to create **Augmented
    Assignment Operators**.


    These operators perform the binary operation on the two operands and assign the
    result to the original target (left operand).


    If `<op>` is a binary operator, then the expression `a <op>= b` containing the
    augmented assignment operator is equivalent to `a = a <op> b`.


    ### `+=`


    The `+=` operator adds a value (right operand) to the variable (left operand)
    and assigns the result to that variable.


    ```

    >>> a = 2

    >>> a += 3

    >>> a

    5

    >>> x = "hello"

    >>> y = "world"

    >>> x += y

    >>> x

    ''helloworld''

    ```


    ### `-=`


    The `-=` operator subtracts a value (right operand) from the variable (left operand)
    and assigns the result to that variable.


    ```

    >>> a = 3

