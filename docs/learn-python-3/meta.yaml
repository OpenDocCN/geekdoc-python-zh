  - "[PAGE 139]\n\n# User Defined Functions, Modules & Packages\n\n# User Defined\
    \ Functions\n\nThe built-in functions and modules of the Python Standard Library\
    \ add tremendous value by performing generic operations and can be utilised by\
    \ developers for any task.\n\nBut, at times a programmer needs to perform a set\
    \ of operations for a specific task multiple times. In such cases instead of rewriting\
    \ the statements again and again, the block of code can be wrapped into a function\
    \ which can be called anytime in the scope of the program.\n\n**User-defined functions**\
    \ make the program more:\n\n+   - **Organized**, as a block of code is now replaced\
    \ by a single function call which performs a specific task.\n- **Manageable**,\
    \ due to reduction of code length.\n- **Reusable**, as the user defined function\
    \ can be used anywhere in the current program or it can also be imported in another\
    \ program.\n\n# Function Structure\n\nLet us take a deep dive into a user defined\
    \ function (provided below) and understand its various components:\n\n```\ndef\
    \ adder(f, s, t = None):\n    \"\"\"\n    Returns the sum of f, s and t.\n   \
    \ If t is not provided,\n    return the sum of f and s.\n    \"\"\"\n    s = f\
    \ + s\n    if t:\n        s += t\n    return s\n```\n\n# Function Header\n\n```\n\
    def adder(f, s, t = None):\n```\n\nThe function header begins with the keyword\
    \ `def`.\n\nThe function name follows the `def` keyword. As it is an identifier,\
    \ the same nomenclature is followed while naming it. `adder` is the name of the\
    \ function in the above example.\n\nThe function name is followed by a pair of\
    \ parenthesis `( )`."
  - "[PAGE 140]\n\nIn case any parameters are required by the function, they are enclosed\
    \ inside the parentheses. `f`, `s`, `t = None` are the three parameters of the\
    \ function.\nFinally, the function header ends with a colon.\n\n# Function Body\n\
    \nThe body of the function consists of one or more Python statements which have\
    \ the same amount of indentation (4 spaces) from the function header.\nIt is a\
    \ good practice to include the documentation string at the beginning of the function\
    \ body that briefly explains how it works. This docstring can either be a single-line\
    \ or a multiline string literal. In the above example the docstring is:\n\n```\n\
    \"\"\"\nReturns the sum of f, s and t.\nIf t is not provided,\nreturn the sum\
    \ of f and s.\n\"\"\"\n```\n\nThis docstring is followed by a series of statements\
    \ which represent the set of instructions to be executed. The set of instructions\
    \ in the above example are\n\n```\ns = f + s\nif t:\n    s += t\n```\n\nThe code\
    \ block finally ends with a `return` statement which returns one or more values.\n\
    \n```\nreturn s\n```\n\nIn the above example the value of `s` is returned which\
    \ is the sum.\nA missing `return` statement or a `return` statement returning\
    \ no value implies that the function returns `None`. These functions are known\
    \ as void functions which display the result of statements via `print()` function.\n\
    \n# Parameters and Arguments\n\n```\ndef adder(f, s, t = None):\n    \"\"\"\n\
    \    Returns the sum of f, s and t.\n    If t is not provided,\n    return the\
    \ sum of f and s.\n    \"\"\"\n    s = f + s\n    if t:\n        s += t\n    return\
    \ s\n```\n\nAfter defining the above function, let us now invoke or call the function:\n\
    \n```\nfst = 20\nsnd = 10\ntrd = 10\nsm1 = adder(fst, snd, trd)\nsm2 = adder(fst,\
    \ snd)\n```\n\n`f`, `s` and `t` are known as positional parameters as they have\
    \ a defined position in the function definition.\nAlso there is a provision to\
    \ assign a default value to a parameter using `=`."
  - "[PAGE 141]\n\nIn the above example `t` has a default value of `None`.\n\nArguments\
    \ are the values passed to a function (or method) when it is called. In the above\
    \ example `fst`, `snd` and `trd` are the arguments. Since `t` has a default value,\
    \ the function can be invoked with or without the `trd` argument as shown for\
    \ `sm2`.\n\nArgument values are assigned to the corresponding function parameters\
    \ that are available as local variables inside the function.\n\nThus, value of\
    \ `fst` is assigned to `f` and `snd` is assigned to `s`. In case there is no third\
    \ argument, `t` has the default value `None`.\n\nThe values of `sm1` and `sm2`\
    \ after executing the script are:\n\n```\n>>> sm1\n40\n>>> sm2\n30\n```\n\n# Scope\
    \ of Variables\n\nIn Python, every variable has a well defined scope, i.e., it\
    \ is accessible by a part of the program and it cannot be accessed from outside\
    \ its scope.\n\nBased on their scope, there are two types of variables:\n\n# Local\
    \ Variables\n\nLocal variables are defined inside a function or a code block and\
    \ can only be accessed where they are defined.\n\nThey exist only during the execution\
    \ of the function or the code block.\n\n```\ndef triple(a):\n    result = 3*a\n\
    \    # variable result\n    # is accessible locally\n    print(\"local:\", result)\n\
    \n# Outputs value of result\n# inside the function\ntriple(3)\n\n# Throws an error\
    \ as result is\n# not accessible outside the scope\n# of function triple()\nprint(\"\
    outside:\", result)\n```\n\n```\nlocal: 9\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nNameError: name 'result' is not defined\n\
    ```\n\n# Global Variables\n\nVariables defined outside any function or code block\
    \ are known as global variables."
  - "[PAGE 142]\n\nThey are often used to specify mathematical constants, file path\
    \ or other such values and can be accessed anywhere in the source code (by functions\
    \ or code blocks).\n\nBelow example demonstrates how the global variable `n` can\
    \ be accessed by all the functions.\n\n```\nn = 10\n\ndef uno():\n    print(n)\n\
    \ndef tres():\n    print(n*3)\n\nuno()\ntres()\n```\n\n```\n10\n30\n```\n\nIn\
    \ case a variable is defined inside a function with the same name as that of a\
    \ global variable, then the variable is considered as a local variable and all\
    \ references made to the variable point to this local variable.\n\n```\nn = 10\n\
    \n# local n inside the\n# function\ndef uno():\n    n = 5\n    print(n)\n\n# global\
    \ n inside the\n# function\ndef tres():\n    print(n*3)\n\nuno()\ntres()\n```\n\
    \n```\n5\n30\n```\n\nAny changes made to a global variable inside a code block\
    \ or a function can modify it for that session. This can have an impact on all\
    \ the code blocks/functions that access and use it.\n\nTo modify the value of\
    \ a global variable one can use the `global` keyword as shown in the example below.\n\
    \n```\nn = 10\n\n# function modifies the\n# value of global n\ndef uno():\n  \
    \  global n\n```"
- md: "## Passing Objects of Mutable Type to a Function\n\nWhen mutable objects (`list`,\
    \ `dict`) are provided as an argument to a function, any modification made to\
    \ the corresponding parameters in the body of the function leads to the modification\
    \ of the original object.\n\nHence, care should be taken while passing mutable\
    \ objects.\n\n## Passing a List\n\n**Code**\n\n```python\ndef repeat(l):\n   \
    \ for i in range(len(l)):\n        l[i] = l[i]*2\n\nl = [1, 2, 3]\nprint(l)\n\
    repeat(l)\n# l is modified\nprint(l)\n```\n\n**Output**\n```\n[1, 2, 3]\n[2, 4,\
    \ 6]\n```\n\n## Passing a Dictionary\n\n**Code**\n\n```python\ndef repeat(d):\n\
    \    for i in d.keys():\n        d[i] = d[i]*2\n\nd = {'a':1, 'b':2, 'c':3}\n\
    print(d)\nrepeat(d)\n# d is modified\nprint(d)\n```\n\n**Output**\n```\n{'a':\
    \ 1, 'b': 2, 'c': 3}\n{'a': 2, 'b': 4, 'c': 6}\n```\n\n## What is a Module? How\
    \ to Create a Module?\n\nOnce a function is defined in the Python interpreter,\
    \ it can be called any number of times. But, these function definitions are lost\
    \ upon exiting the interpreter.\n\nTo solve this problem we can create a python\
    \ script with the function definitions at the beginning of the file, followed\
    \ by the rest of the code which includes statements invoking the defined functions.\n\
    \nBut, this process is tedious and not manageable as what makes user-defined functions\
    \ powerful is that the programmer can - **Write once, and use many times.**\n\n\
    Instead of repeating the function definition again and again for each new program,\
    \ one can put all the function definitions in a file from which the required function\
    \ can be imported and invoked either in script mode or interactive mode.\n\nThis\
    \ file (`.py` extension) is known as a `module` and it is the most basic form\
    \ of reusable code accessible by other programs.\n\nLet us create a new file `basics.py`\
    \ containing the following functions:\n\n```python\ndef adder(f, s, t = None):\n\
    \    \"\"\"\n    Returns the sum of f, s and t.\n    If t is not provided,\n \
    \   return the sum of f and s.\n    \"\"\"\n    s = f + s\n    if t:\n       \
    \ s += t\n    return s\n\ndef tripler(a):\n    \"\"\"\n    Multiplies a by 3 and\n\
    \    returns it\n    \"\"\"\n    result = 3*a\n    return result\n```\n\nAfter\
    \ saving the `basics.py` file, reopen IDLE and create a new file `test.py` in\
    \ the same directory as basics.py.\n\nThe name of the file is the module name\
    \ which is also available as the value of the global variable `__name__` in the\
    \ module.\n\nImport the functions of the basics module in `test.py` by executing\
    \ the following statement.\n\n```python\nimport basics\n```\n\nThe above `import`\
    \ statement loads all the functions available in the `basics` module. To access\
    \ any function in the module, simply type the module name followed by a period\
    \ (`.`), followed by the function name.\n\n**Code**\n\n```python\nimport basics\n\
    sa = basics.adder(20, 10, 10)\nst = basics.tripler(20)\nprint(sa)\nprint(st)\n\
    ```\n\n**Output**\n```\n40\n60\n```\n\nThe `as` keyword can also be used to create\
    \ an alias which makes it easier and more manageable to use in the program.\n\n\
    **Code**\n\n```python\nimport basics as ba\nsa = ba.adder(20, 10, 10)\nst = ba.tripler(20)\n\
    print(sa)\nprint(st)\n```\n\n**Output**\n```\n40\n60\n```\n\nInstead of loading\
    \ all the functions in a module, the `from` statement can be used to access only\
    \ specified functions.\n\n**Code**\n\n```python\nfrom basics import adder\nsa\
    \ = adder(20, 10, 10)\nprint(sa)\n```\n\n**Output**\n```\n40\n```\n\nTo import\
    \ all functions and global variables in the module the `*` wildcard character\
    \ can be used.\n\n**Code**\n\n```python\nfrom basics import *\nsa = adder(20,\
    \ 10, 10)\nst = tripler(20)\n```\n\n**Output**\n```\n40\n60\n```\n\nThe above\
    \ method of using `*` to import the contents of a module is not recommended as\
    \ it can clutter the namespace and cause issues if there are conflicts between\
    \ the identifiers defined by the programmer and those defined in the module/package.\n\
    \n## Executable Scripts / Modules\n\nApart from containing definitions, a module\
    \ can also contain block of code which is executed whenever the stand-alone script\
    \ is run in script mode. The block has to be enclosed in an `if` statement as\
    \ shown below:\n\n```python\nif __name__ == '__main__':\n    ...code to be executed...\n\
    ```\n\nUsing the above pattern, a file can be imported or executed directly.\n\
    \nLet us undertake an example module (save it as `multi.py`) which multiplies\
    \ two numbers:\n\n```python\ndef multiply(a, b):\n    return a * b\n\nf = int(input(\"\
    Enter a: \"))\ns = int(input(\"Enter b: \"))\nprint(multiply(f, s))\n```\n\nNow\
    \ when we try to load all functions from the module it automatically executes\
    \ the input assignment statements and prints the output.\n\n```\n>>> from test\
    \ import *\nEnter a: 4\nEnter b: 5\n20\n>>>\n```\n\nLet us modify the code:\n\n\
    ```python\ndef multiply(a, b):\n    return a * b\n\nif __name__ == '__main__':\n\
    \    f = int(input(\"Enter a: \"))\n    s = int(input(\"Enter b: \"))\n    print(multiply(f,\
    \ s))\n```\n\nNow, the block will execute only if the script is executed directly\
    \ and not when the file is imported as a module.\n\n```\n>>> from test import\
    \ *\n>>> multiply(4, 5)\n20\n```\n\n## What is a Package? Introduction to PyPI.\
    \ How to Create a Python Package?\n\nA collection of modules which can work together\
    \ to provide a common functionality is known as a **package**.\n\nThese modules\
    \ are present in a folder along with the `__init__.py` file which tells Python\
    \ that this folder is a package.\n\nA package can also contain subfolders (sub-packages),\
    \ each containing their respective `__init__.py` files.\n\nLet us take the example\
    \ of a package called `restaurant` which consists of various modules to perform\
    \ activities such as order booking, reservation, staff attendance, etc.\n\nHere\
    \ is a possible structure for the package:\n\n```\nrestaurant/\n    __init__.py\n\
    \    orders.py\n    reservation.py\n    employee.py\n    inventory.py\n```\n\n\
    A package is simply the directory containing sub-packages and modules, but when\
    \ this package or a collection of packages are made available for others to use\
    \ (eg. via PyPI) it is known as a **library**.\n\nFor example, `restaurant` can\
    \ be called a library if it provides reusable codes to manage a restaurant and\
    \ is built using multiple packages which handle the various aspects of a restaurant\
    \ like human resource management, inventory management, order fulfilment and billing,\
    \ etc.\n\nOne should note that the above definition is not strict and often the\
    \ terms package and library are used interchangeably."
  mdcn: "## 将可变类型对象传递给函数\n\n当可变对象（`list`、`dict`）作为参数传递给函数时，函数体内对相应参数的任何修改都会导致原始对象被修改。\n\
    \n因此，在传递可变对象时应格外小心。\n\n## 传递列表\n\n**代码**\n\n```python\ndef repeat(l):\n    for\
    \ i in range(len(l)):\n        l[i] = l[i]*2\n\nl = [1, 2, 3]\nprint(l)\nrepeat(l)\n\
    # l is modified\nprint(l)\n```\n\n**输出**\n```\n[1, 2, 3]\n[2, 4, 6]\n```\n\n##\
    \ 传递字典\n\n**代码**\n\n```python\ndef repeat(d):\n    for i in d.keys():\n      \
    \  d[i] = d[i]*2\n\nd = {'a':1, 'b':2, 'c':3}\nprint(d)\nrepeat(d)\n# d is modified\n\
    print(d)\n```\n\n**输出**\n```\n{'a': 1, 'b': 2, 'c': 3}\n{'a': 2, 'b': 4, 'c':\
    \ 6}\n```\n\n## 什么是模块？如何创建模块？\n\n一旦在 Python 解释器中定义了一个函数，就可以多次调用它。但是，这些函数定义在退出解释器后就会丢失。\n\
    \n为了解决这个问题，我们可以创建一个 Python 脚本，将函数定义放在文件开头，后面是其余的代码，包括调用已定义函数的语句。\n\n但是，这个过程很繁琐且难以管理，因为用户自定义函数的强大之处在于程序员可以——**一次编写，多次使用**。\n\
    \n无需为每个新程序重复编写函数定义，可以将所有函数定义放在一个文件中，然后从该文件中导入所需的函数，并在脚本模式或交互模式下调用。\n\n这个文件（扩展名为\
    \ `.py`）被称为 `module`（模块），它是可供其他程序使用的最基本形式的可重用代码。\n\n让我们创建一个新文件 `basics.py`，包含以下函数：\n\
    \n```python\ndef adder(f, s, t = None):\n    \"\"\"\n    Returns the sum of f,\
    \ s and t.\n    If t is not provided,\n    return the sum of f and s.\n    \"\"\
    \"\n    s = f + s\n    if t:\n        s += t\n    return s\n\ndef tripler(a):\n\
    \    \"\"\"\n    Multiplies a by 3 and\n    returns it\n    \"\"\"\n    result\
    \ = 3*a\n    return result\n```\n\n保存 `basics.py` 文件后，重新打开 IDLE，并在同一目录下创建一个新文件\
    \ `test.py`。\n\n文件的名称就是模块名，它也作为模块中全局变量 `__name__` 的值。\n\n通过执行以下语句，在 `test.py`\
    \ 中导入 basics 模块的函数。\n\n```python\nimport basics\n```\n\n上面的 `import` 语句加载了 `basics`\
    \ 模块中所有可用的函数。要访问模块中的任何函数，只需输入模块名，后跟一个句点（`.`），再跟上函数名。\n\n**代码**\n\n```python\n\
    import basics\nsa = basics.adder(20, 10, 10)\nst = basics.tripler(20)\nprint(sa)\n\
    print(st)\n```\n\n**输出**\n```\n40\n60\n```\n\n`as` 关键字也可用于创建别名，这使得在程序中使用起来更简单、更易于管理。\n\
    \n**代码**\n\n```python\nimport basics as ba\nsa = ba.adder(20, 10, 10)\nst = ba.tripler(20)\n\
    print(sa)\nprint(st)\n```\n\n**输出**\n```\n40\n60\n```\n\n可以使用 `from` 语句仅访问模块中指定的函数，而不是加载模块中的所有函数。\n\
    \n**代码**\n\n```python\nfrom basics import adder\nsa = adder(20, 10, 10)\nprint(sa)\n\
    ```\n\n**输出**\n```\n40\n```\n\n要导入模块中的所有函数和全局变量，可以使用 `*` 通配符。\n\n**代码**\n\n```python\n\
    from basics import *\nsa = adder(20, 10, 10)\nst = tripler(20)\n```\n\n**输出**\n\
    ```\n40\n60\n```\n\n不推荐使用上述 `*` 方法导入模块内容，因为它可能会使命名空间变得混乱，并且如果程序员定义的标识符与模块/包中定义的标识符发生冲突，可能会导致问题。\n\
    \n## 可执行脚本 / 模块\n\n除了包含定义外，模块还可以包含代码块，当独立脚本在脚本模式下运行时，该代码块会被执行。该代码块必须包含在 `if` 语句中，如下所示：\n\
    \n```python\nif __name__ == '__main__':\n    ...code to be executed...\n```\n\n\
    使用上述模式，文件可以被导入或直接执行。\n\n让我们以一个示例模块（将其保存为 `multi.py`）为例，该模块用于将两个数字相乘：\n\n```python\n\
    def multiply(a, b):\n    return a * b\n\nf = int(input(\"Enter a: \"))\ns = int(input(\"\
    Enter b: \"))\nprint(multiply(f, s))\n```\n\n现在，当我们尝试从模块加载所有函数时，它会自动执行输入赋值语句并打印输出。\n\
    \n```\n>>> from test import *\nEnter a: 4\nEnter b: 5\n20\n>>>\n```\n\n让我们修改代码：\n\
    \n```python\ndef multiply(a, b):\n    return a * b\n\nif __name__ == '__main__':\n\
    \    f = int(input(\"Enter a: \"))\n    s = int(input(\"Enter b: \"))\n    print(multiply(f,\
    \ s))\n```\n\n现在，只有当脚本被直接执行时，该代码块才会执行，而当文件作为模块导入时则不会执行。\n\n```\n>>> from test\
    \ import *\n>>> multiply(4, 5)\n20\n```\n\n## 什么是包？PyPI 简介。如何创建 Python 包？\n\n\
    一组可以协同工作以提供共同功能的模块被称为 **package**（包）。\n\n这些模块与 `__init__.py` 文件一起存在于一个文件夹中，该文件告诉\
    \ Python 这个文件夹是一个包。\n\n一个包也可以包含子文件夹（子包），每个子文件夹都包含各自的 `__init__.py` 文件。\n\n让我们以一个名为\
    \ `restaurant` 的包为例，它由多个模块组成，用于执行订单预订、预订、员工考勤等活动。\n\n以下是该包的一个可能结构：\n\n```\nrestaurant/\n\
    \    __init__.py\n    orders.py\n    reservation.py\n    employee.py\n    inventory.py\n\
    ```\n\n包只是包含子包和模块的目录，但当这个包或一组包可供他人使用时（例如通过 PyPI），它就被称为 **library**（库）。\n\n例如，如果\
    \ `restaurant` 提供了用于管理餐厅的可重用代码，并且它使用多个包构建，这些包处理餐厅的各个方面，如人力资源管理、库存管理、订单履行和计费等，那么它可以被称为一个库。\n\
    \n需要注意的是，上述定义并不严格，包和库这两个术语经常可以互换使用。"
