  md: '```

    >>> s = "she sells sea shells"

    >>> s.count("she")

    2

    >>> s.count("she", 5)

    1

    >>> s.count("she", 5, 10)

    0

    >>> s.count("she", 5, 17)

    1

    ```


    It has to be noted that the method counts non-overlapping occurrences, so it does
    not start a new matching process until the current substring matching is complete.


    ```

    >>> s = "valhala alala"

    >>> s.count("al")

    4

    >>> s.count("ala")

    2

    ```


    In the above example, `ala` is counted twice as the first occurence is in `valh"ala"`
    and the next occurance is in `"ala"la`. Although `ala` can be located again in
    `al"ala"`, it overlaps with the occurance `"ala"la`, hence it is not counted.


    # find()


    `find(sub[, start[, end]])` returns the lowest index in the string where substring
    `sub` is located in the range `[start, end]`.


    `start` and `end` are optional parameters and they default to `0` and `len(string)`
    respectively.


    The method returns `-1` in case the substring is not present.


    ```

    >>> s = "she sells sea shells"

    >>> s.find("she")

    0

    >>> s.find("she", 5)

    14

    >>> s.find("see")

    -1

    >>> s.find("she", 5, 10)

