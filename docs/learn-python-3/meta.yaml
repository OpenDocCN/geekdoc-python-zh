    # Accessing Items of a List


    Lists use zero-based indexing, where 0 is the index of the first element and `len(list)
    - 1` is the index of the last element.


    For example,


    ```

    >>> l = ["BMW", "Z4", 2019,

    ...     4, "Red", True]

    >>> l[0]

    ''BMW''

    >>> l[2]

    2019

    ```


    # Length of List


    The built-in `len()` function can be used to return the length of the list.


    ```

    >>> l = ["BMW", "Z4", 2019,

    ...     4, "Red", True]

    >>> len(l)

    6

    ```


    # Negative Indexing


    Just like `str`, sequence types like `list` support negative indexing, i.e., you
    can access the values of list from the end.


    Index of `-1` denotes the last item in the list, `-2` the second last item and
    so forth.


    ```

    >>> l = ["BMW", "Z4", 2019,

    ...     4, "Red", True]

    >>> l[-1]

    True

    >>> l[-3]

    4

    ```


    # Modifying a List


    As lists are mutable, the assignment operator can be used to modify or replace
    a single item in the list at a given index.


    ```

    >>> l = ["BMW", "Z4", "Red"]

    >>> l[2] = "Black"

    >>> l

    [''BMW'', ''Z4'', ''Black'']

    ```


    # Removing Item from a List


    `del` statement can be used to delete an item at a given index of a list.


    ```

    >>> l = ["BMW", "Z4", "Red"]

    >>> del l[1]

    >>> l

    [''BMW'', ''Red'']

    ```'
