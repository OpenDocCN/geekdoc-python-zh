    # Split a String


    Split methods help in splitting/partitioning a string.


    # partition()


    `partition(sep)` method splits the string when the separator (`sep`) is encountered
    for the first time, and returns a tuple with three items (`string before separator`,
    `separator`, `string after separator`).


    ```

    >>> "Hi|Ed|Punk".partition(''|'')

    (''Hi'', ''|'', ''Ed|Punk'')

    ```


    # split()


    `split(sep=None, maxsplit=-1)` method splits a string into a list based on a string
    separator (`sep`).


    If `sep` is not specified, it defaults to `None`, where whitespace is regarded
    as separator, and the string is stripped of all leading and trailing whitespaces
    after which it is split into words contained in the string.


    ```

    >>> "Hi|Ed|Punk".split(''|'')

    [''Hi'', ''Ed'', ''Punk'']

    >>> "Hi Ed Punk".split()

    [''Hi'', ''Ed'', ''Punk'']

    >>> "    Hi Ed Punk    ".split()

    [''Hi'', ''Ed'', ''Punk'']

    ```


    If `maxsplit` is provided, at most `maxsplit` number of splits are performed and
    the list will contain a maximum of `maxsplit+1` elements.


    `maxsplit` when not specified defaults to `-1`, which implies that there is no
    limit on the number of splits.


    ```

    >>> "Hi|Ed|Punk|v2".split(''|'', 2)

    [''Hi'', ''Ed'', ''Punk|v2'']

    ```


