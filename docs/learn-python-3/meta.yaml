    Evaluate the expression


    ```

    3 * 2 + 9 / 4 - 10 % 2 ** 2

    ```


    # Step 1


    `**` takes precedence


    ```

    3 * 2 + 9 / 4 - 10 % 2 ** 2

    = 3 * 2 + 9 / 4 - 10 % 4

