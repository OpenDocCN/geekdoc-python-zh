    False\n```\n\n### 可变数据类型\n\n在 Python 中，以下数据类型是可变的，即任何修改都不会创建新对象，而是修改现有对象：\n\n\
    - list\n- set\n- dict\n\n让我们取一个列表并修改其内容。\n\n```\n>>> l = [1, 2, 3]\n>>> id_l =\
