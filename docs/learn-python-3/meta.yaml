    `divmod(a, b)` returns a tuple `(a // b, a % b)` consisting of the quotient and
    remainder when `a` (`int`, `float`) is divided by `b` (`int`, `float`).


    ```

    >>> divmod(23, 3.5)

    (6.0, 2.0)

    >>> divmod(-10, 7)

    (-2, 4)

    ```


    ## Type Functions


    Python has built-in functions to handle various aspects of datatypes such as checking
    and conversion.


    ## Type Checking


    `type()` and `isinstance()` builtin functions are used for checking the data type
    of objects.

    Check out the **Type Checking** section in the chapter **Variable, Objects & Data
    Types** to learn more about it in detail.


    ## Built-in Type Functions


    We have previously discussed the various built-in data types available in Python.

    The following functions are often used to assign a default value or create an
    empty collection when no arguments are provided:


    | Function | Default Value |

    | --- | --- |

    | `bool()` | `False` |

    | `int()` | `0` |

    | `float()` | `0.0` |

    | `complex()` | `0j` |

    | `str()` | `''''` |

    | `list()` | `[]` |

    | `tuple()` | `()` |

    | `set()` | `set()` |

    | `frozenset()` | `frozenset()` |

    | `dict()` | `{}` |


    The **Type Casting** section of the chapter **Variable, Objects & Data Types**
    covers these functions in detail in case any argument is passed.


    ## I/O Functions


    Python provides the following built-in functions to handle user input and result
    output:


    ### input()


    `input()` function can be used to accept a user input and assign it to a variable.

    When this function is encountered in the code, the python interpreter waits for
    the user to type a response which is read as a string.


    ### Code


    ```

    name = input("Enter name: ")

    print("Hello,", name)

    ```


    ### Output


    ```

    Enter name: Python

    Hello, Python

    ```


    ### print()


    The built-in `print()` function can be used to display an output (value of variables,
    expressions, etc.) on the standard output.


    For example, the below code computes the area of a rectangle and displays it:


    ### Code


    ```

    length = 10

    breadth = 5

    area = length * breadth

    print("Area:", area)

    ```


    ### Output


    ```

    Area: 50

    ```


    Both, `input()` and `print()` functions are covered in detail in the chapter **Input
    & Output**.


    ### open()


    `open()` function is used to open a file and return the corresponding file object.


    This function supports various modes useful for reading from a file and writing
    to a file.


    An example usage of `open()` function is shown below:


    ```

    f = open(''data.txt'', ''r+'')

    # f is the file object which

    # can perform read and write

    # operations on the file

    ```


    This function is covered in detail in the chapter **File Handling**.


    ## Base/Unicode Conversion Functions


    ### bin()


    Converts an `int` to a binary (base-2) string prefixed with `''0b''`.


    ```

    >>> bin(9)

    ''0b1001''

    ```


    ### oct()


    Converts an `int` to an octal (base-8) string prefixed with `''0o''`.


    ```

    >>> oct(9)

    ''0o11''

    ```


    ### hex()


    Converts an `int` to a lowercase hexadecimal (base-16) string prefixed with `"0x"`.


    ```

    >>> hex(29)

    ''0x1d''

    ```


    ### ord()


    Returns the integer Unicode code point for the given Unicode character `str`.


    ```

    >>> ord("a")

    97

    >>> ord("β")

    946

    ```


    ### chr()


    Converts the integer Unicode code point into the corresponding Unicode string.


    ```

    >>> chr(97)

    ''a''

    >>> chr(946)

    ''β''

    ```


    ## What are Built-in Modules?


    Apart from built-in functions, the **Python Standard Library** also contains a
    wide range of built-in modules which are a group of functions organized based
    on functionality.

    Some of the commonly used modules are mentioned below:


    - `math` - Mathematical functions

    - `random` - Generate pseudo-random numbers

    - `statistics` - Statistical functions


    ## Accessing Modules


    A module can be accessed in a program using the `import` statement.


    ```

    >>> import math

    ```


    The above `import` statement loads all the functions available in the `math` module.
    To access any function in the module, simply type the module name followed by
    a period ( `.` ), followed by the function name.


    ```

    >>> import math

    >>> math.pow(3, 2)

    9.0

    ```


    Instead of loading all the functions in a module, the `from` statement can be
    used to access only specified functions.


    ```

    >>> from math import pow

    >>> pow(3, 2)

    9.0

    ```


    ## math Module


    `math` module provides mathematical functions and constants as defined by the
    C standard.


    ### Constants


    The following frequently used mathematical constants are available in `math` module:


    - pi : π = 3.141592... (to available precision)

    - e : e = 2.718281... (to available precision)

    - tau : τ = 2π = 6.283185... (to available precision)


    ```

    >>> import math

    >>> math.pi

    3.141592653589793

    >>> math.e

    2.718281828459045

    >>> math.tau

    6.283185307179586

    ```


    ### Functions


    Following useful mathematical functions are available in the `math` module:


    #### fabs()


    `fabs(x)` returns the absolute value of `x`.


    ```

    >>> import math

    >>> math.fabs(-3.24)

    3.24

    ```


    #### gcd()


    `gcd(a, b)` returns the greatest common divisor of integers `a` and `b`.


    ```

    >>> import math

    >>> math.gcd(54, 24)

    6

    ```


    #### ceil()


    `ceil(x)` returns the smallest integer greater than or equal to `x`.


    ```

    >>> import math

    >>> math.ceil(2.13)

    3

    ```


    #### floor()


    `floor(x)` returns the largest integer less than or equal to `x`.


    ```

    >>> import math

    >>> math.floor(2.13)

    2

    ```


    #### fmod()


    `fmod(x, y)` returns the value of the expression `x - n*y` such that the result
    has the same sign as `x` and magnitude less than `|y|` for some integer `n`.


    This function should be preferred when working with floating point numbers as
    compared to `x % y` that should be used when working with integers.


    ```

    >>> import math

    >>> math.fmod(2.14, 0.5)

    0.14000000000000012

    >>> math.fmod(-2.14, 0.5)

    -0.14000000000000012

    ```


    #### pow()


    `pow(x, y)` raises `x` to the power of `y`.


    ```

    >>> import math

    >>> math.pow(5, 2)

    25.0

    ```


    #### sqrt()


    `sqrt(x)` returns the square root of `x`.


    ```

    >>> import math

    >>> math.sqrt(25)

    5.0

    ```


    #### sin(), cos() & tan()


    `sin(x)`, `cos(x)` and `tan(x)` return the sine, cosine and tangent of `x` (radians)
    respectively.


    ```

    >>> import math

    >>> math.cos(math.pi/3)

    0.5000000000000001

    >>> math.sin(math.pi/2)

    1.0

    >>> math.tan(math.pi/4)

    0.9999999999999999

    ```


    #### factorial()


    `factorial(n)` computes the factorial of a positive integer `n` which is the product
    of all positive integers less than or equal to `n`.

    `n! = n×(n-1)×(n-2)...3×2×1`,

    where `0! = 1`


    ```

    >>> import math

    >>> math.factorial(5)

    120

    ```


    ## random Module


    `random` module provides access to functions which can generate random numbers.


    ### random()


    `random()` function draws a random float in the half open interval `[0.0, 1.0)`
    with a uniform probability.


    ```

    >>> import random

    >>> random.random()

    0.6857133962949904

    ```


    ### Random Integer from Range


    `randrange(stop)` is used to randomly select an integer from a range `0` to `stop`
    (excluding).


    ```

    >>> import random

    >>> random.randrange(10)

    5

    ```


    `randrange(start, stop)` is used to randomly select an integer from a range `start`
    to `stop` (excluding).


    ```

    >>> import random

    >>> random.randrange(5, 10)

    8

    ```


    `randint(a, b)` is an alias for `randrange(a, b+1)`, provides an interface to
    generate a random integer `N` such that `a <= N <= b` (includes boundaries).


    ```

    >>> import random

    >>> random.randint(10, 20)

    12

    ```


    ## statistics Module


    `statistics` module provides functions that are useful for calculating mathematical
    statistics of numeric (Real-valued) data.


    ### Mean


    `mean(data)` returns the arithmetic mean or average value of `data` ( `list` or
    `tuple` of `int` or `float` ).


    ```

    >>> from statistics import mean

    >>> mean([1, 2, 3, 6])

    3

    ```


    ### Median


    `median(data)` returns the median or middle value of `data` ( `list` or `tuple`
    of `int` or `float` ) using the common “mean of middle two” method.


    ```

    >>> from statistics import median

    >>> median([1, 2, 3, 6])

    2.5

    ```


    ### Mode


    `mode(data)` returns the most commonly occurring value in the `data` ( `list`
    or `tuple` of `int` , `str` or `float` ).


    If there are multiple modes with the same count, the first occurrence in the sequence
    is returned.


    ```

    >>> from statistics import mode

    >>> mode([1, 2, 3, 6])

    1

    >>> mode([1, 2, 2, 3, 6])

    2

    >>> mode(["a", "b", "a", "c"])

    ''a''

    ```'
