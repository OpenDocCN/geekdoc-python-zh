    # Reading & Writing Binary Files using `pickle` Module


    In Python, the protocols to read and write binary files (`.dat` or `.pickle` file
    extension) have been implemented in the built-in `pickle` module.


    `pickle` is a Python specific binary file format which can not only be used to
    store binary data, but also store any Python object.


    This process of translating data structures (lists, dictionaries, etc.) and code
    objects (classes, functions, etc.) into bytes that can be stored in a binary file
    is known as **Serialization**. This binary file can be stored on disk or shared
    and it can be de-serialized and used later via Python.


    # Dumping Data


    The `dump()` function can be used to write the pickled representation of any data
    or object into a file.


    **Syntax:** `pickle.dump(obj, file)`


    where:


    +   - `obj` is the object to be written

    - `file` is an open file object (opened in binary write `wb` or append `ab` mode).


    ```

    >>> import pickle

    >>> l = [["Anita","Maths",83],

    ...     ["Amar","Maths",95],

    ...     ["Ani","Maths",90]]

    >>> f = open("marks.dat", "wb")

    >>> pickle.dump(l, f)

    >>> f.close()

    ```


    # Loading Data


    The `load()` function can be used to read the pickled representation of an object
    or data from a file.


    **Syntax:** `pickle.load(file)`


    where `file` is an open file object (opened in binary read mode `rb`).


    ```

    >>> import pickle

    >>> f = open("marks.dat", "rb")

    >>> l = pickle.load(f)

    >>> f.close()

    ```'
