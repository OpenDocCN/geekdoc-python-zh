    \ acts on information (data) provided by the user.\nThe process of creating, storing\
    \ and manipulating this data helps in the computation of new data or the end result.\n\
    \n**Variables are the fundamental building blocks of a program** which provide\
    \ a way to store, access and modify values during the life-cycle of a program.\n\
    \nEach variable has:\n\n- a name (handle),\n- a type or data-type (kind of data),\
    \ and\n- a value (actual data).\n\nIn traditional programming languages like Java\
    \ or C++, the type of the variable is pre-defined.\nFor example, if you want to\
    \ use the value `1` inside the program, you can store it in a variable named `a`\
    \ of type `int`.\n\n```\nint a = 1;\n```\n\nThis `a` is synonymous to a box of\
