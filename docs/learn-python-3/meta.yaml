    #### Output\n\nArea: 50\n\n`print()` function can also be used to output the value\
    \ of multiple objects when they are provided as arguments to the function.\n\n\
    #### Code\n\n```\na = 2 + 2\nb = 2 * 3.5\nprint(a, b)\n```\n\n#### Output\n\n\
    4 7.0\n\nIn the above code, the values of `a` and `b` are separated by a blank\
