    \ Contents of a List\n\nLet us discuss these methods in detail in the coming sections.\n\
    \n## Adding Items to a List\n\n`append()` method adds an item (passed as an argument)\
    \ to the end of a list.\n\n```\n>>> l = [\"T\", \"C\", 2, 4]\n>>> l.append(2.5)\n\
