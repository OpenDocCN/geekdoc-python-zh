    \ can be used to make a new list where each element is the result of some operations\
    \ applied to each member of another sequence or iterable.\n\nFor example, to create\
    \ a new list where each item is squared.\n\n```\n>>> l = [2, 3, 4, 5, 6, 8]\n\
    >>> l2 = [i**2 for i in l]\n>>> l2\n[4, 9, 16, 25, 36, 64]\n```\n\n## Filtering\
    \ or Subsequence\n\nList comprehension can also be used to create a subsequence\
    \ of those elements that satisfy a certain condition.\n\nFor example, to create\
    \ a new list where each item is divisible by 2.\n\n```\n>>> l = [2, 3, 4, 5, 6,\
    \ 8]\n>>> l2 = [i for i in l if i%2==0]\n>>> l2\n[2, 4, 6, 8]\n```\n\n## Sample\
