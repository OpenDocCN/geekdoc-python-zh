    \n当一个数据类型的对象的值无法被修改时，该数据类型被称为不可变的。\n以下数据类型是不可变的：\n\n- `int`\n- `float`\n- `complex`\n\
    - `bool`\n- `tuple`\n- `str`\n- `None`\n\n你可能想知道，如果上述某些类型是不可变的，那么我们如何能够修改变量的值呢？\n\
