    # Accessing Items of a Tuple


    Tuples use zero-based indexing, where 0 is the index of the first element and
    `len(tuple) - 1` is the index of the last element.


    ```

    >>> t = ("BMW", "Z4", 2019,

    ...        4, "Red", True)

    >>> t[0]

    ''BMW''

    >>> t[2]

    2019

    ```


    # Length of Tuple


    The built-in `len()` function can be used to return the length of the tuple.


    ```

    >>> t = ("BMW", "Z4", 2019,

    ...        4, "Red", True)

    >>> len(t)

    6

    ```


    # Negative Indexing


    Just like `list`, `tuple` supports negative indexing, i.e., you can access the
    values of tuple from the end. Index of -1 denotes the last item in the tuple,
    -2 is the second last item and so forth.


    ```

    >>> t = ("BMW", "Z4", 2019,

    ...        4, "Red", True)

    >>> t[-1]

    True

    >>> t[-3]

    4

    ```'
