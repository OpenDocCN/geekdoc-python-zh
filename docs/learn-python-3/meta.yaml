    3 - 2\n4 - 1\n5 - 1\n6 - 2\n```\n\n# Tuple\n\n## List vs Tuple\n\nTuples are like\
    \ lists, with a difference - they are immutable. This means that once initialized\
    \ a user cannot modify its value, which makes it a useful feature to ensure the\
    \ sanctity of data and guarantee that it is not being modified by the program.\n\
    \n## How to Create Tuple?\n\nTuples are declared using parentheses `( )`, with\
    \ successive items separated by a comma `,`.\n\n```python\n>>> l = (\"Hi\", \"\
    Ed\", \"Punk\")\n>>> type(l)\n<class 'tuple'>\n```\n\n### tuple()\n\nApart from\
    \ the method shown above, the built-in `tuple()` function can also be used to\
    \ create new tuples.\n\nIf no arguments are provided to the `tuple()` function,\
    \ an empty tuple is created.\n\n```python\n>>> t = tuple()\n>>> t\n()\n```\n\n\
