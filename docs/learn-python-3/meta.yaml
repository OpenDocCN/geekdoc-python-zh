  md: '# # Tuple


    # ## List vs Tuple


    Tuples are like lists, with a difference - they are immutable. This means that
    once initialized a user cannot modify its value, which makes it a useful feature
    to ensure the sanctity of data and guarantee that it is not being modified by
    the program.


    # ## How to Create Tuple?


    Tuples are declared using parentheses `( )`, with successive items separated by
    a comma `,`.


    ```

    >>> l = ("Hi", "Ed", "Punk")

    >>> type(l)

    <class ''tuple''>

    ```


    # ### tuple()


    Apart from the method shown above, the built-in `tuple()` function can also be
    used to create new tuples.


    If no arguments are provided to the `tuple()` function, an empty tuple is created.


    ```

    >>> t = tuple()

    >>> t

    ()

    ```


    If a string, tuple or set is passed as an argument, `tuple()` functions converts
    them into a tuple.


    ```

    >>> t = tuple("abcd")

    >>> t

    (''a'', ''b'', ''c'', ''d'')

    >>> t = tuple({1, 2, 3})

    >>> t

    (1, 2, 3)

    >>> t = tuple([1, 2, 3, 4])

    >>> t

    (1, 2, 3, 4)

    ```


    # ## What is a Singleton?


    In case a tuple has only 1 item, it is known as a singleton.


    It is a good practice to include a trailing comma to avoid the Python interpreter
    from treating it as a value inside regular parentheses as shown in the examples
    below.'
