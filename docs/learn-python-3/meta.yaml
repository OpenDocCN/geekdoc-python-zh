  md: "# What is a Module? How to Create a Module?\n\nOnce a function is defined in\
    \ the Python interpreter, it can be called any number of times. But, these function\
    \ definitions are lost upon exiting the interpreter.\n\nTo solve this problem\
    \ we can create a python script with the function definitions at the beginning\
    \ of teh file, followed by the rest of the code which includes statements invoking\
    \ the defined functions.\n\nBut, this process is tedious and not managable as\
    \ what makes user-defined functions powerful is that the programmer can - **Write\
    \ once, and use many times.**\n\nInstead of repeating the function definition\
    \ again and again for each new program, one can put all the function definitions\
    \ in a file from which the required function can be imported and invoked either\
    \ in script mode or interactive mode.\n\nThis file ( `.py` extension) is known\
    \ as a `module` and it is the most basic form of reusable code accessible by other\
    \ programs.\n\nLet us create a new file `basics.py` containing the following functions:\n\
    \n```\ndef adder(f, s, t = None):\n    \"\"\"\n    Returns the sum of f, s and\
    \ t.\n    If t is not provided,\n    return the sum of f and s.\n    \"\"\"\n\
    \    s = f + s\n    if t:\n        s += t\n    return s\n\ndef tripler(a):\n \
    \   \"\"\"\n    Multiplies a by 3 and\n    returns it\n    \"\"\"\n    result\
    \ = 3*a\n    return result\n```\n\nAfter saving the `basics.py` file, reopen IDLE\
    \ and create a new file `test.py` in the same directory as basics.py.\n\nThe name\
    \ of the file is the module name which is also available as the value of the global\
    \ variable `__name__` in the module.\n\nImport the functions of the basics module\
    \ in `test.py` by executing the following statement.\n\n```\nimport basics\n```\n\
    \nThe above `import` statement loads all the functions available in the `basics`\
    \ module. To access any function in the module, simply type the module name followed\
    \ by a period ( `.` ), followed by the function name.\n\n# Code\n\n```\nimport\
    \ basics\nsa = basics.adder(20, 10, 10)\nst = basics.tripler(20)\nprint(sa)\n\
    print(st)\n```\n\n# Output"
  merge: -1
  pgno: 144
- img_proc: true
  md: "40\n60\n\nThe `as` keyword can also be used to create an alias which makes\
    \ it easier and more manageable to use in the program.\n\n**Code**\n\n```\npython\n\
    import basics as ba\nsa = ba.adder(20, 10, 10)\nst = ba.tripler(20)\nprint(sa)\n\
    print(st)\n```\n\n**Output**\n\n40\n60\n\nInstead of loading all the functions\
    \ in a module, the `from` statement can be used to access only specified functions.\n\
    \n**Code**\n\n```\npython\nfrom basics import adder\nsa = adder(20, 10, 10)\n\
    print(sa)\n```\n\n**Output**\n\n40\n\nTo import all functions and global variables\
    \ in the module the `*` wildcard character can be used.\n\n**Code**\n\n```\npython\n\
    from basics import *\nsa = adder(20, 10, 10)\nst = tripler(20)\n```\n\n**Output**\n\
    \n40\n60\n\nThe above method of using `*` to import the contents of a module is\
    \ not recommended as it can clutter the namespace and cause issues if there are\
    \ conflicts between the identifiers defined by the programmer and those defined\
    \ in the module/package.\n\n# Executable Scripts / Modules\n\nApart from containing\
    \ definitions, a module can also contain block of code which is executed whenever\
    \ the stand-alone script is run in script mode. The block has to be enclosed in\
    \ an `if` statement as shown below:\n\n```\npython\nif __name__ == '__main__':\n\
    \    ...code to be executed...\n```\n\nUsing the above pattern, a file can be\
    \ imported or executed directly.\n\nLet us undertake an example module (save it\
    \ as `multi.py`) which multiplies two numbers:\n\n```\npython\ndef multiply(a,\
    \ b):\n    return a * b\n```"
  merge: -1
  pgno: 145
- img_proc: true
  md: "```\nf = int(input(\"Enter a: \"))\ns = int(input(\"Enter b: \"))\nprint(multiply(f,\
    \ s))\n```\n\nNow when we try to load all functions from the module it automatically\
    \ executes the input assignment statements and prints the output.\n\n```\n>>>\
    \ from test import *\nEnter a: 4\nEnter b: 5\n20\n>>>\n```\n\nLet us modify the\
    \ code:\n\n```\ndef multiply(a, b):\n    return a * b\n\nif __name__ == '__main__':\n\
    \    f = int(input(\"Enter a: \"))\n    s = int(input(\"Enter b: \"))\n    print(multiply(f,\
    \ s))\n```\n\nNow, the block will execute only if the script is executed directly\
    \ and not when the file is imported as a module.\n\n```\n>>> from test import\
    \ *\n>>> multiply(4, 5)\n20\n```\n\n# What is a Package? Introduction to PyPi.\
    \ How to Create a Python Package?\n\nA collection of modules which can work together\
    \ to provide a common functionality is known as a **package**.\n\nThese modules\
    \ are present in a folder along with the `__init__.py` file which tells Python\
    \ that this folder is a package.\n\nA package can also contain subfolders (sub-packages),\
    \ each containing their respective `__init__.py` files.\n\nLet us take the example\
    \ of a package called `restaurant` which consists of various modules to perform\
    \ activities such as order booking, reservation, staff attendance, etc.\n\nHere\
    \ is a possible structure for the package:\n\n```\nrestaurant/\n    __init__.py\n\
    \    orders.py\n    reservation.py\n    employee.py\n    inventory.py\n```\n\n\
    A package is simply the directory containing sub-packages and modules, but when\
    \ this package or a collection of packages are made available for others to use\
    \ (eg. via PyPI) it is known as a **library**.\n\nFor example, `restaurant` can\
    \ be called a library if it provides reusable codes to manage a restaurant and\
    \ is built using multiple packages which handle the various aspects of a restaurant\
    \ like human resource management, inventory management, order fulfilment and billing,\
    \ etc."
