    # Mapping Type - `dict`


    `dict` is a mapping data type which stores values in the form of key-value pairs.


    It is used for representing data where you can quickly access the value (any data
    type) corresponding to a key (any data type except `list`, `set` or `dict`), just
    like a dictionary where you can lookup the meaning of a given word.


    Keys and corresponding values are separated by colon ( `:` ).


    The key-value pairs are separated by comma ( `,` ) and enclosed within curly braces
    - `{ }`.


    Some example dictionaries are -


    ```

    {1: "a", 2: "b", 3: "c"}

    {"name": "edpunk", "language": "python"}

    ```


    # Special Type - `None`


    `None` is a special data type which is used to denote the absence of value in
    an object.'
