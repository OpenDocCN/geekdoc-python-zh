    \ vehicle,\n- 2019 is the year when the vehicle was manufactured,\n- 4 represents\
    \ the number of wheels,\n- \"Red\" is the color of the vehicle, and\n- True tells\
    \ us that the vehicle up for sale is brand new.\n\nThis method of creating a list\
    \ from a collection of literals is known as **list display**.\n\nNotice, how this\
    \ list contains items of multiple data types - `str`, `int` and `bool`.\n\nApart\
    \ from the list display shown above, the built-in `list()` function can also be\
    \ used to create new lists.\n\nIf no arguments are provided to the `list()` function,\
    \ an empty list is created.\n\n```\n>>> l = list()\n>>> l\n[]\n```\n\nIf a string,\
    \ tuple or set is passed as an argument, `list()` functions converts them into\
    \ a list.\n\n```\n>>> l = list(\"abcd\")\n>>> l\n['a', 'b', 'c', 'd']\n>>> l =\
    \ list({1, 2, 3})\n>>> l\n[1, 2, 3]\n>>> l = list((1, 2, 3, 4))\n>>> l\n[1, 2,\
    \ 3, 4]\n```\n\n## Accessing Items of a List\n\nLists use zero-based indexing,\
    \ where 0 is the index of the first element and `len(list) - 1` is the index of\
    \ the last element.\n\nFor example,\n\n```\n>>> l = [\"BMW\", \"Z4\", 2019,\n\
    ...     4, \"Red\", True]\n>>> l[0]\n'BMW'\n>>> l[2]\n2019\n```\n\n## Length of\
    \ List\n\nThe built-in `len()` function can be used to return the length of the\
    \ list.\n\n```\n>>> l = [\"BMW\", \"Z4\", 2019,\n...     4, \"Red\", True]\n>>>\
    \ len(l)\n6\n```\n\n## Negative Indexing\n\nJust like `str`, sequence types like\
    \ `list` support negative indexing, i.e., you can access the values of list from\
    \ the end.\n\nIndex of `-1` denotes the last item in the list, `-2` the second\
    \ last item and so forth.\n\n```\n>>> l = [\"BMW\", \"Z4\", 2019,\n...     4,\
    \ \"Red\", True]\n>>> l[-1]\nTrue\n>>> l[-3]\n4\n```\n\n## Modifying a List\n\n\
    As lists are mutable, the assignment operator can be used to modify or replace\
    \ a single item in the list at a given index.\n\n```\n>>> l = [\"BMW\", \"Z4\"\
    , \"Red\"]\n>>> l[2] = \"Black\"\n>>> l\n['BMW', 'Z4', 'Black']\n```\n\n## Removing\
    \ Item from a List\n\n`del` statement can be used to delete an item at a given\
    \ index of a list.\n\n```\n>>> l = [\"BMW\", \"Z4\", \"Red\"]\n>>> del l[1]\n\
    >>> l\n['BMW', 'Red']\n```\n\n# List Operations\n\nWe can perform various operations\
    \ on a list (collection of items) such as membership, concatenation, repetition\
    \ and slicing.\n\n## Membership\n\n`in` and `not in` can be used to detect the\
    \ membership of an item in a list.\n\n```\n>>> l = [\"BMW\", \"Z4\", \"Red\"]\n\
    >>> \"Red\" in l\nTrue\n>>> \"Gold\" in l\nFalse\n>>> \"Gold\" not in l\nTrue\n\
    ```\n\n## Concatenation\n\n`+` operator can be used to join two lists to create\
    \ a new list.\n\n```\n>>> l = [\"BMW\", \"Z4\"]\n>>> k = [2019, \"Red\"]\n>>>\
    \ l + k\n['BMW', 'Z4', 2019, 'Red']\n```\n\n`+=` operator joins two lists and\
    \ assigns it to the target list.\n\n```\n>>> l = [\"BMW\", \"Z4\"]\n>>> l += [2019,\
    \ \"Red\"]\n>>> l\n['BMW', 'Z4', 2019, 'Red']\n```\n\n## Repetition\n\nThe `*`\
    \ operator repeats the items of a list the number of times as specified by the\
    \ integer operand.\n\n```\n>>> l = [1, 2]\n>>> l*3\n[1, 2, 1, 2, 1, 2]\n```\n\n\
    ## Slicing\n\nA subset of list `l` can be obtained using the list slice notation\
    \ given as `l[i:j]`, where the item at start index `i` is included, but the item\
    \ at end index `j` is excluded.\n\nFor example, the slice notation `[1:4]` refers\
    \ to items from index `1` to index `3` (i.e. `4-1`).\n\n```\n>>> l = [\"BMW\"\
    , \"Z4\", 2019,\n...     4, \"Red\", True]\n>>> l[1:4]\n['Z4', 2019, 4]\n```\n\
    \nThe slice notation `l[i:j:k]` can also include a third number known as the stepper.\
    \ Here, a list is sliced from start index `i` to end index (`j`) - 1 with a step\
    \ of `k` items.\n\n```\n>>> l = [\"BMW\", \"Z4\", 2019,\n...     4, \"Red\", True]\n\
    >>> l[1:4:2]\n['Z4', 4]\n```\n\nSlice notations also have some useful defaults.\
    \ 0 is the default for the first number and size of the list is the default for\
    \ the second number.\n\n```\n>>> l = [\"BMW\", \"Z4\", 2019,\n...     4, \"Red\"\
    , True]\n>>> l[2:]\n[2019, 4, 'Red', True]\n>>> l[:4]\n['BMW', 'Z4', 2019, 4]\n\
    ```\n\nSlice notation also supports negative indexing.\n\n```\n>>> l = [\"BMW\"\
    , \"Z4\", 2019,\n...     4, \"Red\", True]\n>>> l[-4:]\n[2019, 4, 'Red', True]\n\
    >>> l[:-2]\n['BMW', 'Z4', 2019, 4]\n>>> l[-4:-1]\n[2019, 4, 'Red']\n```\n\nSlice\
    \ notation can be used to replace multiple items in a list.\n\n```\n>>> l = [\"\
    BMW\", \"Z4\", 2019,\n...     4, \"Red\", True]\n>>> l[:2] = [\"Kia\", \"Sonet\"\
    ]\n>>> l\n['Kia', 'Sonet', 2019, 4, 'Red', True]\n\n>>> l = [\"BMW\", \"Z4\",\
    \ 2019,\n...     4, \"Red\", True]\n>>> l[1:5:2] = [\"Sonet\", 2]\n>>> l\n['BMW',\
    \ 'Sonet', 2019, 2, 'Red', True]\n```\n\nSlice notation can also be used to delete\
    \ multiple items in a list.\n\n```\n>>> l = [\"BMW\", \"Z4\", 2019,\n...     4,\
    \ \"Red\", True]\n>>> del l[:2]\n>>> l\n[2019, 4, 'Red', True]\n\n>>> l = [\"\
