    ```

    >>> d = {"yr": 20, "name": "Ed",

    ...      18: True}

    >>> d.get("name")

    ''Ed''

    >>> d.get("version") is None

    True

    >>> d.get("version", "1.0")

    ''1.0''

    ```


    This is an elegant method of fetching a value from a dictionary and it should
    be used in real life software codes as it never raises a `KeyError`.


    # Updating a Dictionary


    # Index Operator []


    `d[x] = y` can be used to add the value `y` corresponding to a key `x` in a dictionary
    `d`.


    In case key `x` already exists, assignment updates or overwrites the value corresponding
    to it.


    ```

    >>> d = {"yr": 20, 18: True}

    >>> d["name"] = ''Ed''

    >>> d

    {''yr'': 20, 18: True, ''name'': ''Ed''}


    >>> d["name"] = ''Py''

    >>> d

    {''yr'': 20, 18: True, ''name'': ''Py''}

    ```


    # update()


    `update()` method can be used to add new items or update existing items in a `dict`.


    This method accepts the following:


    # 1. Dictionary


    ```

    >>> d = {"yr": 20, 18: True}

    >>> d.update({"name": ''Ed''})

    >>> d

    {''yr'': 20, 18: True, ''name'': ''Ed''}


    >>> d.update({"yr": 15, 18: False})

    >>> d

    {''yr'': 15, 18: False, ''name'': ''Ed''}

    ```


    # 2. Sequence of (key, value) pairs


    ```

    >>> d = {"yr": 20, 18: True}

    >>> d.update([("name", ''Ed''),

    ...           (''yr'', 15)])

    >>> d

    {''yr'': 15, 18: True, ''name'': ''Ed''}

    ```


    # 3. Keyworded arguments


    ```

    >>> d = {"yr": 20, 18: True}

    >>> d.update(name="Ed", yr=15)

    >>> d

    {''yr'': 15, 18: True, ''name'': ''Ed''}

    ```'
