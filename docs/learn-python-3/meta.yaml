    # Reversing Items


    `reverse()` method can be used to reverse a list in-place.


    ```

    >>> l = ["T", "C", 2, 4, "S"]

    >>> l.reverse()

    >>> l

    [''S'', 4, 2, ''C'', ''T'']

    ```


    If you do not wish to modify the existing list and create a new list with items
    in reverse order, use the built-in function `reversed()` nested in the built-in
    `list()`.


    ```

    >>> l = ["T", "C", 2, 4, "S"]

    >>> new_l = list(reversed(l))

    >>> new_l

    [''S'', 4, 2, ''C'', ''T'']

    >>> l

    [''T'', ''C'', 2, 4, ''S'']

    ```


    # Sorting a List


    Python lists have a built-in `sort()` method which sorts the items in-place using
    `<` comparisons between items.


    The method also accepts 2 keyworded arguments:

    - `key` is used to specify a function which is called on each list element prior
    to making the comparisons.

    - `reverse` is a boolean which specifies whether the list is to be sorted in descending
    order.


    ```

    >>> l = [34, 4, 6, 23]

    >>> l.sort()

    >>> l

    [4, 6, 23, 34]


    >>> l = [34, 4, 6, 23]

    >>> l.sort(reverse=True)

    >>> l

    [34, 23, 6, 4]


    >>> l = ["Oh", "Hi", "Py", "ed"]

    >>> l.sort()

    >>> l

    [''Hi'', ''Oh'', ''Py'', ''ed'']


    >>> l = ["Oh", "Hi", "Py", "ed"]

    # lowercase the words before sorting

    ```'
