    \n列表中的所有非字符串数据在写入前会自动转换为字符串。\n\n可以使用 `writerow(row)` 或 `writerows(rows)` 方法将一行（字符串列表）或行列表写入\
    \ CSV 文件。\n\n**示例 #3**\n\n编写一个程序，创建一个包含学生各科成绩的 CSV 文件，使用分号（ ; ）作为分隔符。\n\n**解决方案\
    \ #1：使用 writerow()**\n\n```python\nimport csv\n\nh = [\"Name\",\"Subject\",\"\
    Marks\"]\n\nmarks = [[\"Anita\",\"Maths\",83.0],\n         [\"Amar\",\"Maths\"\
    ,95.0],\n         [\"Akash\",\"Science\",92.0],\n         [\"Ira\",\"Science\"\
    ,99.0]]\n\nwith open('marks.csv', 'w',\n          newline='') as f:\n    writer\
    \ = csv.writer(f,\n                        delimiter=';')\n\n    # 写入表头\n    writer.writerow(h)\n\
    \n    # 写入数据\n    for row in marks:\n        writer.writerow(row)\n```\n\n**解决方案\
    \ #2：使用 writerows()**\n\n```python\nimport csv\n\nh = [\"Name\",\"Subject\",\"\
    Marks\"]\n\nmarks = [[\"Anita\",\"Maths\",83.0],\n        [\"Amar\",\"Maths\"\
    ,95.0],\n        [\"Akash\",\"Science\",92.0],\n        [\"Ira\",\"Science\",99.0]]\n\
    \nwith open('marks.csv', 'w',\n          newline='') as f:\n    writer = csv.writer(f,\n\
    \                        delimiter=';')\n\n    # 写入表头\n    writer.writerow(h)\n\
    \n    # 写入数据\n    writer.writerows(marks)\n```\n\n**输出** - marks.csv\n\n```\n\
    Name;Subject;Marks\nAnita;Maths;83.0\nAmar;Maths;95.0\nAkash;Science;92.0\nIra;Science;99.0\n\
    ```\n\n## 用户自定义函数、模块与包\n\n## 用户自定义函数\n\nPython 标准库的内置函数和模块通过执行通用操作为开发者提供了巨大价值，可用于任何任务。\n\
    \n但是，有时程序员需要为特定任务多次执行一组操作。在这种情况下，与其一遍又一遍地重写语句，不如将代码块包装成一个函数，该函数可以在程序的任何作用域内被调用。\n\
    \n**用户自定义函数**使程序更加：\n\n- **有组织性**，因为一个代码块现在被一个执行特定任务的单个函数调用所取代。\n- **易于管理**，因为代码长度减少了。\n\
    - **可重用**，因为用户定义的函数可以在当前程序的任何地方使用，也可以导入到另一个程序中。\n\n## 函数结构\n\n让我们深入探讨一个用户自定义函数（如下所示）并理解其各个组成部分：\n\
    \n```python\ndef adder(f, s, t = None):\n    \"\"\"\n    返回 f、s 和 t 的和。\n    如果未提供\
    \ t，\n    则返回 f 和 s 的和。\n    \"\"\"\n    s = f + s\n    if t:\n        s += t\n\
    \    return s\n```\n\n## 函数头\n\n```python\ndef adder(f, s, t = None):\n```\n\n\
    函数头以关键字 `def` 开始。\n\n函数名紧随 `def` 关键字之后。由于它是一个标识符，因此在命名时遵循相同的命名规则。`adder` 是上述示例中的函数名。\n\
    \n函数名后跟一对括号 `( )`。\n\n如果函数需要任何参数，它们被包含在括号内。`f`、`s`、`t = None` 是函数的三个参数。\n最后，函数头以冒号结束。\n\
    \n## 函数体\n\n函数体由一个或多个 Python 语句组成，这些语句与函数头具有相同的缩进量（4 个空格）。\n在函数体开头包含文档字符串是一个好习惯，它简要解释了函数的工作原理。这个文档字符串可以是单行或多行字符串字面量。在上面的示例中，文档字符串是：\n\
    \n```python\n\"\"\"\n返回 f、s 和 t 的和。\n如果未提供 t，\n则返回 f 和 s 的和。\n\"\"\"\n```\n\n\
    这个文档字符串之后是一系列表示要执行的指令集的语句。上面示例中的指令集是\n\n```python\ns = f + s\nif t:\n    s +=\
    \ t\n```\n\n代码块最终以一个 `return` 语句结束，该语句返回一个或多个值。\n\n```python\nreturn s\n```\n\n\
    在上面的示例中，返回了 `s` 的值，即总和。\n缺少 `return` 语句或 `return` 语句不返回任何值意味着函数返回 `None`。这些函数被称为\
    \ void 函数，它们通过 `print()` 函数显示语句的结果。\n\n## 参数与实参\n\n```python\ndef adder(f, s,\
    \ t = None):\n    \"\"\"\n    返回 f、s 和 t 的和。\n    如果未提供 t，\n    则返回 f 和 s 的和。\n\
    \    \"\"\"\n    s = f + s\n    if t:\n        s += t\n    return s\n```\n\n定义了上述函数后，现在让我们调用或调用该函数：\n\
    \n```python\nfst = 20\nsnd = 10\ntrd = 10\nsm1 = adder(fst, snd, trd)\nsm2 = adder(fst,\
    \ snd)\n```\n\n`f`、`s` 和 `t` 被称为位置参数，因为它们在函数定义中具有定义好的位置。\n此外，还可以使用 `=` 为参数分配默认值。\n\
    \n在上面的示例中，`t` 的默认值为 `None`。\n\n实参是在调用函数（或方法）时传递给函数的值。在上面的示例中，`fst`、`snd` 和 `trd`\
    \ 是实参。由于 `t` 有默认值，因此可以在有或没有 `trd` 实参的情况下调用函数，如 `sm2` 所示。\n\n实参值被分配给函数内部作为局部变量可用的相应函数参数。\n\
    \n因此，`fst` 的值被分配给 `f`，`snd` 的值被分配给 `s`。如果没有第三个参数，`t` 将具有默认值 `None`。\n\n执行脚本后，`sm1`\
    \ 和 `sm2` 的值为：\n\n```python\n>>> sm1\n40\n>>> sm2\n30\n```\n\n## 变量的作用域\n\n在 Python\
    \ 中，每个变量都有一个明确定义的作用域，即它只能被程序的一部分访问，而不能从其作用域外部访问。\n\n根据它们的作用域，变量有两种类型：\n\n## 局部变量\n\
    \n局部变量在函数或代码块内部定义，只能在其定义的位置访问。\n\n它们仅在函数或代码块执行期间存在。\n\n```python\ndef triple(a):\n\
    \    result = 3*a\n    # 变量 result\n    # 在局部可访问\n    print(\"local:\", result)\n\
    \n# 输出函数内部\n# result 的值\ntriple(3)\n\n# 抛出错误，因为 result 在\n# 函数 triple() 的作用域外不可访问\n\
    print(\"outside:\", result)\n```\n\n```\nlocal: 9\nTraceback (most recent call\
    \ last):\n  File \"<stdin>\", line 1, in <module>\nNameError: name 'result' is\
    \ not defined\n```\n\n## 全局变量\n\n在任何函数或代码块外部定义的变量称为全局变量。\n\n它们通常用于指定数学常量、文件路径或其他此类值，并且可以在源代码的任何地方（由函数或代码块）访问。\n\
    \n下面的示例演示了全局变量 `n` 如何被所有函数访问。\n\n```python\nn = 10\n\ndef uno():\n    print(n)\n\
    \ndef tres():\n    print(n*3)\n\nuno()\ntres()\n```\n\n```\n10\n30\n```\n\n如果在函数内部定义了一个与全局变量同名的变量，则该变量被视为局部变量，所有对该变量的引用都指向这个局部变量。\n\
    \n```python\nn = 10\n\n# 函数内部的\n# 局部 n\ndef uno():\n    n = 5\n    print(n)\n\n\
    # 函数内部的\n# 全局 n\ndef tres():\n    print(n*3)\n\nuno()\ntres()\n```\n\n```\n5\n\
    30\n```\n\n在代码块或函数内部对全局变量所做的任何更改都可能在该会话中修改它。这可能会影响所有访问和使用它的代码块/函数。\n\n要修改全局变量的值，可以使用\
    \ `global` 关键字，如下例所示。\n\n```python\nn = 10\n\n# 函数修改了\n# 全局 n 的值\ndef uno():\n\
    \    global n\n```"
