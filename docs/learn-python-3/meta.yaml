    # Copying a List


    In Python, we can create an object (data) and bind its reference to a variable
    using the assignment operator ( = ).


    As multiple collections or items in collections can point to the same mutable
    object, a copy is required so one can change one copy without changing the other.


    Let us take an example:


    ```

    >>> old_l = [1, 2, 3]


    # Copying old list into a new list

    >>> new_l = old_l


    # Checking if both lists are

    # pointing to the same object

    >>> id(new_l)==id(old_l)

    True


    # Adding element to new list

    >>> new_l.append(4)

    >>> new_l

    [1, 2, 3, 4]

    >>> old_l

    [1, 2, 3, 4]

    ```


    It can be seen how the assignment operator **does not create a new copy** of the
    list.


    The `copy()` method can be used to create a new `list` containing the items of
    the original list.


    ```

    >>> old_l = [1, 2, 3]


    # Copying old list into a new list

    >>> new_l = old_l.copy()


    # Checking if both lists are

    # pointing to the same object

    >>> id(new_l)==id(old_l)

    False


    # Adding element to new list

    >>> new_l.append(4)

    >>> new_l

    [1, 2, 3, 4]

    >>> old_l

    [1, 2, 3]

    ```'
