  md: '# # Variables, Objects & Data Types


    # ## What are Objects & Variables?


    A program is a sequence of instructions which often acts on information (data)
    provided by the user.

    The process of creating, storing and manipulating this data helps in the computation
    of new data or the end result.


    **Variables are the fundamental building blocks of a program** which provide a
    way to store, access and modify values during the life-cycle of a program.


    Each variable has:


    +   - a name (handle),

    - a type or data-type (kind of data), and

    - a value (actual data).


    In traditional programming languages like Java or C++, the type of the variable
    is pre-defined.

    For example, if you want to use the value `1` inside the program, you can store
    it in a variable named `a` of type `int`.


    ```

    int a = 1;

    ```


    This `a` is synonymous to a box of fixed dimensions (fixed type) holding something
    (value `1`) inside it.


    ![](img/84256b7fa80e08517c2c7cbb96a2913c_25_0.png)


    Box ‘a’


    In case we want to change the contents of the box, we can replace it with something
    similar (same type).


    ```

    a = 2;

    ```


    ![](img/84256b7fa80e08517c2c7cbb96a2913c_25_1.png)


    Filled box ‘a’


    The contents of this box can be replicated and placed in a similar (same type)
    box:


    ```

    int b = a;

    ```'
