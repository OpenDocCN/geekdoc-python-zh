    # readlines()


    `readlines()` method returns a list of strings representing the lines (along with
    the newline character) of text file content.


    # Example


    Let us consider a file named `info.txt` containing the below text:

    Hello World

    Thank You


    # Code


    ```

    >>> f = open(''info.txt'', ''r'')

    >>> f.readlines()

    [''Hello World\n'', ''Thank You'']

    ```


    # Ad-hoc Reading


    The following two methods can be used on a file object to randomly access contents
    of a file:


    # tell()


    `tell()` returns the current byte position (integer) of the file object in the
    file.


    Let us consider the same file `info.txt` for the below example:


    ```

    >>> f = open(''info.txt'', ''r'')

    >>> f.read(4)

    ''Hell''

    >>> f.tell()

    4

    ```


    # seek()


    `seek(offset, reference=0)` can be used to seek a location in the file object
    which is `offset` bytes from the provided `reference`.


    The default value for `reference` is `0` which stands for the beginning of the
    file. For this default `reference`, the `offset` has to be a whole number ( >=0
    ).


    Other allowed values of `reference` are:


    +   - 1, which denotes that the offset will be calculated from the current position
    of the file object (`offset` can be positive or negative)

    - 2, which denotes that the offset is calculated from the end of the file (`offset`
    is negative)'
  - '[PAGE 132]


    **Note:** In text files (those opened without a `b` in the mode string), only
    seek relative to the beginning of the file (`reference = 0`) is allowed. `reference
    = 1` or `2` is only valid when the file is opened in binary mode.


    Let us consider the same file `info.txt` for the below example:


    ```

    >>> f.seek(6)

    6


    # Hello World\nThank You

    #       ^

    # Position of file pointer

    # after seek.


    >>> f.read()

    ''World\nThank You''

    >>> f.tell()

    21


    >>> f.seek(12)

    12


    # Hello World\nThank You

    #             ^

    # Position of file pointer

    # after seek.


    >>> f.read()

    ''Thank You''

    ```


    # Writing a File


    The following modes support file writing:


    +   - Writing from the beginning of a file : `r+` , `r+b` , `w` , `x` , `wb` ,
    `w+` , `w+b` .

    - Appending at the end of an existing file : `a` , `ab` , `a+` , `a+b` .


    The following methods can be used to write data in a file:


    # write()


    `write(s)` method is useful for writing a string `s` into a file.


    ```

    >>> s = "Hi World\nThank You"

    >>> f = open("info.txt", "w")

    >>> f.write(s)

    21

