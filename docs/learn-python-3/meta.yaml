    The following string methods are useful for locating substring in a string.


    # count()


    `count(sub[, start[, end]])` returns the number of non-overlapping occurrences
    of a substring `sub` in the range `[start, end]`.


    `start` and `end` are optional parameters and they default to `0` and `len(string)`
    respectively.'
