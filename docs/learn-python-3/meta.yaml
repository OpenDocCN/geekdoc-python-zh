  md: '# Arithmetic Operators


    Arithmetic operations can be performed in Python using the following arithmetic
    operators:


    # Addition


    The `+` operator adds the values of numeric operands.


    ```

    >>> 2 + 3

    5

    >>> 2 + 3.0

    5.0

    ```


    In case the operands are of type `str`, `list` or `tuple`, the `+` operator concatenates
    these two sequences or strings.


    ```

    >>> ''edpunk'' + ''python''

    ''edpunkpython''

    >>> ["ed", "punk"] + ["python", ]

    [''ed'', ''punk'', ''python'']

    ```


    # Subtraction


    The `-` operator subtracts the value of operand on right from the value of operand
    on left.


    ```

    >>> 2 - 3

    -1

    ```


    # Multiplication


    The `*` operator multiplies the values of numeric operands.


    ```

    >>> 2 * 3

    6

    ```


    In case the operands are of type `str`, `list` or `tuple`, the `*` operator returns
    a sequence or string self-concatenated the specified number of times.


    ```

    >>> "python" * 3

    ''pythonpythonpython''

    >>> [''ed'', ''py''] * 3

    [''ed'', ''py'', ''ed'', ''py'', ''ed'', ''py'']

    ```


    # Division


    The `/` operator divides the value of operand on left by the value of operand
    on right and returns the real number quotient.


    ```

    >>> 6 / 2

    3.0

    >>> 5 / 2

    2.5

    ```


    # Floor Division


    The `//` operator divides the value of operand on left by the value of operand
    on right and returns the integer quotient.


    ```

    >>> 5 // 2

    2

    ```


    # Modulus


    The `%` operator divides the value of operand on left by the value of operand
    on right and returns the remainder.


    ```

    >>> 5 % 2

    1

    ```'
