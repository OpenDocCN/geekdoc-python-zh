  md: '# Explicit Type Casting


    When the type conversion is explicitly specified by the user using the various
    built-in functions available in Python, it is known as explicit type casting.


    The built-in functions which can be used for explicit type casting are as follows:


    +   1. `int()`

    Creates an `int` from a `bool`, `float` or `str` containing integer characters
    (with or without sign).


    ```

    >>> int(True)

    1

    >>> int(2.3)

    2

    >>> int("2")

    2

    ```


    +   2. `float()`

    Creates a `float` from a `bool`, `int` or `str` containing floating point literals
    (with or without sign).


    ```

    >>> float(True)

    1.0

    >>> float(2)

    2.0

    >>> float("2.3")

    2.3

    ```


    `float()` also accepts the following string inputs -


    +   - "Infinity"

    - "inf"

    - "nan" (not a number).


    ```

    >>> float("Infinity") > 1

    True

    >>> float("nan")

    nan

    ```


    Floating point literals can also contain the following characters -


    +   - `.` , which denotes the fractional part of a number.

    - `e` or `E` , which denotes the exponent part of a number.


    ```

    >>> float("3.14")

    3.14

    >>> float("10.")

    10.0

    >>> float("1e100")

    1e+100

    >>> float("3.14e-10")

    3.14e-10

    ```


    +   3. `str()`

    Converts any object into a `str`.


    ```

    >>> str(2)

    ''2''

    >>> str([1, 2, 3, 4])

    ''[1, 2, 3, 4]''

    ```'
