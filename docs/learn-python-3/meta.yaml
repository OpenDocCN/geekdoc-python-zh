    >>> list('hello')\n['h', 'e', 'l', 'l', 'o']\n>>> list({1, 2, 3, 4})\n[1, 2, 3,\
    \ 4]\n>>> list(range(6))\n[0, 1, 2, 3, 4, 5]\n```\n\n6. `set()`\nCreates a `set`\
