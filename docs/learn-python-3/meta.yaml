    name\": 'Ed'})\n>>> d\n{'yr': 20, 18: True, 'name': 'Ed'}\n\n>>> d.update({\"\
    yr\": 15, 18: False})\n>>> d\n{'yr': 15, 18: False, 'name': 'Ed'}\n```\n\n####\
    \ 2. (键, 值) 对序列\n\n```\n>>> d = {\"yr\": 20, 18: True}\n>>> d.update([(\"name\"\
    , 'Ed'),\n...           ('yr', 15)])\n>>> d\n{'yr': 15, 18: True, 'name': 'Ed'}\n\
    ```\n\n#### 3. 关键字参数\n\n```\n>>> d = {\"yr\": 20, 18: True}\n>>> d.update(name=\"\
    Ed\", yr=15)\n>>> d\n{'yr': 15, 18: True, 'name': 'Ed'}\n```"
