- md: "## Writing CSV File\n\n`csv.writer(csvfile, delimiter=',', quotechar='\"')`\
    \ function returns a writer object which converts data in form of a list into\
    \ delimited strings which is passed down to the file object for writing.\n\nAll\
    \ non-string data in the list are automatically converted into string before it\
    \ is written.\n\nThe methods `writerow(row)` or `writerows(rows)` can be used\
    \ to write a row (list of strings) or list of rows to a CSV file.\n\n**Example\
    \ #3**\n\nWrite a program to create a CSV file containing subject-wise marks of\
    \ students delimited by semi-colon ( ; ).\n\n**Solution #1: Using writerow()**\n\
    \n```python\nimport csv\n\nh = [\"Name\",\"Subject\",\"Marks\"]\n\nmarks = [[\"\
    Anita\",\"Maths\",83.0],\n         [\"Amar\",\"Maths\",95.0],\n         [\"Akash\"\
    ,\"Science\",92.0],\n         [\"Ira\",\"Science\",99.0]]\n\nwith open('marks.csv',\
    \ 'w',\n          newline='') as f:\n    writer = csv.writer(f,\n            \
    \            delimiter=';')\n\n    # Writing header\n    writer.writerow(h)\n\n\
    \    #Writing Data\n    for row in marks:\n        writer.writerow(row)\n```\n\
    \n**Solution #2: Using writerows()**\n\n```python\nimport csv\n\nh = [\"Name\"\
    ,\"Subject\",\"Marks\"]\n\nmarks = [[\"Anita\",\"Maths\",83.0],\n        [\"Amar\"\
    ,\"Maths\",95.0],\n        [\"Akash\",\"Science\",92.0],\n        [\"Ira\",\"\
    Science\",99.0]]\n\nwith open('marks.csv', 'w',\n          newline='') as f:\n\
    \    writer = csv.writer(f,\n                        delimiter=';')\n\n    # Writing\
    \ header\n    writer.writerow(h)\n\n    #Writing Data\n    writer.writerows(marks)\n\
    ```\n\n**Output** - marks.csv\n\n```\nName;Subject;Marks\nAnita;Maths;83.0\nAmar;Maths;95.0\n\
    Akash;Science;92.0\nIra;Science;99.0\n```\n\n## User Defined Functions, Modules\
    \ & Packages\n\n## User Defined Functions\n\nThe built-in functions and modules\
    \ of the Python Standard Library add tremendous value by performing generic operations\
    \ and can be utilised by developers for any task.\n\nBut, at times a programmer\
    \ needs to perform a set of operations for a specific task multiple times. In\
    \ such cases instead of rewriting the statements again and again, the block of\
    \ code can be wrapped into a function which can be called anytime in the scope\
    \ of the program.\n\n**User-defined functions** make the program more:\n\n- **Organized**,\
    \ as a block of code is now replaced by a single function call which performs\
    \ a specific task.\n- **Manageable**, due to reduction of code length.\n- **Reusable**,\
    \ as the user defined function can be used anywhere in the current program or\
    \ it can also be imported in another program.\n\n## Function Structure\n\nLet\
    \ us take a deep dive into a user defined function (provided below) and understand\
    \ its various components:\n\n```python\ndef adder(f, s, t = None):\n    \"\"\"\
    \n    Returns the sum of f, s and t.\n    If t is not provided,\n    return the\
    \ sum of f and s.\n    \"\"\"\n    s = f + s\n    if t:\n        s += t\n    return\
    \ s\n```\n\n## Function Header\n\n```python\ndef adder(f, s, t = None):\n```\n\
    \nThe function header begins with the keyword `def`.\n\nThe function name follows\
    \ the `def` keyword. As it is an identifier, the same nomenclature is followed\
    \ while naming it. `adder` is the name of the function in the above example.\n\
    \nThe function name is followed by a pair of parenthesis `( )`.\n\nIn case any\
    \ parameters are required by the function, they are enclosed inside the parentheses.\
    \ `f`, `s`, `t = None` are the three parameters of the function.\nFinally, the\
    \ function header ends with a colon.\n\n## Function Body\n\nThe body of the function\
    \ consists of one or more Python statements which have the same amount of indentation\
    \ (4 spaces) from the function header.\nIt is a good practice to include the documentation\
    \ string at the beginning of the function body that briefly explains how it works.\
    \ This docstring can either be a single-line or a multiline string literal. In\
    \ the above example the docstring is:\n\n```python\n\"\"\"\nReturns the sum of\
    \ f, s and t.\nIf t is not provided,\nreturn the sum of f and s.\n\"\"\"\n```\n\
    \nThis docstring is followed by a series of statements which represent the set\
    \ of instructions to be executed. The set of instructions in the above example\
    \ are\n\n```python\ns = f + s\nif t:\n    s += t\n```\n\nThe code block finally\
    \ ends with a `return` statement which returns one or more values.\n\n```python\n\
    return s\n```\n\nIn the above example the value of `s` is returned which is the\
    \ sum.\nA missing `return` statement or a `return` statement returning no value\
    \ implies that the function returns `None`. These functions are known as void\
    \ functions which display the result of statements via `print()` function.\n\n\
    ## Parameters and Arguments\n\n```python\ndef adder(f, s, t = None):\n    \"\"\
    \"\n    Returns the sum of f, s and t.\n    If t is not provided,\n    return\
    \ the sum of f and s.\n    \"\"\"\n    s = f + s\n    if t:\n        s += t\n\
    \    return s\n```\n\nAfter defining the above function, let us now invoke or\
    \ call the function:\n\n```python\nfst = 20\nsnd = 10\ntrd = 10\nsm1 = adder(fst,\
    \ snd, trd)\nsm2 = adder(fst, snd)\n```\n\n`f`, `s` and `t` are known as positional\
    \ parameters as they have a defined position in the function definition.\nAlso\
    \ there is a provision to assign a default value to a parameter using `=`.\n\n\
    In the above example `t` has a default value of `None`.\n\nArguments are the values\
    \ passed to a function (or method) when it is called. In the above example `fst`,\
    \ `snd` and `trd` are the arguments. Since `t` has a default value, the function\
    \ can be invoked with or without the `trd` argument as shown for `sm2`.\n\nArgument\
    \ values are assigned to the corresponding function parameters that are available\
    \ as local variables inside the function.\n\nThus, value of `fst` is assigned\
    \ to `f` and `snd` is assigned to `s`. In case there is no third argument, `t`\
    \ has the default value `None`.\n\nThe values of `sm1` and `sm2` after executing\
    \ the script are:\n\n```python\n>>> sm1\n40\n>>> sm2\n30\n```\n\n## Scope of Variables\n\
    \nIn Python, every variable has a well defined scope, i.e., it is accessible by\
    \ a part of the program and it cannot be accessed from outside its scope.\n\n\
    Based on their scope, there are two types of variables:\n\n## Local Variables\n\
    \nLocal variables are defined inside a function or a code block and can only be\
    \ accessed where they are defined.\n\nThey exist only during the execution of\
    \ the function or the code block.\n\n```python\ndef triple(a):\n    result = 3*a\n\
    \    # variable result\n    # is accessible locally\n    print(\"local:\", result)\n\
    \n# Outputs value of result\n# inside the function\ntriple(3)\n\n# Throws an error\
    \ as result is\n# not accessible outside the scope\n# of function triple()\nprint(\"\
    outside:\", result)\n```\n\n```\nlocal: 9\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nNameError: name 'result' is not defined\n\
    ```\n\n## Global Variables\n\nVariables defined outside any function or code block\
    \ are known as global variables.\n\nThey are often used to specify mathematical\
    \ constants, file path or other such values and can be accessed anywhere in the\
    \ source code (by functions or code blocks).\n\nBelow example demonstrates how\
    \ the global variable `n` can be accessed by all the functions.\n\n```python\n\
    n = 10\n\ndef uno():\n    print(n)\n\ndef tres():\n    print(n*3)\n\nuno()\ntres()\n\
    ```\n\n```\n10\n30\n```\n\nIn case a variable is defined inside a function with\
    \ the same name as that of a global variable, then the variable is considered\
    \ as a local variable and all references made to the variable point to this local\
    \ variable.\n\n```python\nn = 10\n\n# local n inside the\n# function\ndef uno():\n\
    \    n = 5\n    print(n)\n\n# global n inside the\n# function\ndef tres():\n \
    \   print(n*3)\n\nuno()\ntres()\n```\n\n```\n5\n30\n```\n\nAny changes made to\
    \ a global variable inside a code block or a function can modify it for that session.\
    \ This can have an impact on all the code blocks/functions that access and use\
    \ it.\n\nTo modify the value of a global variable one can use the `global` keyword\
    \ as shown in the example below.\n\n```python\nn = 10\n\n# function modifies the\n\
    # value of global n\ndef uno():\n    global n\n```"
