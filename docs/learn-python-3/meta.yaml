    # # File Handling


    # ## File Handling in Python - Introduction & Overview


    So far we have written programs which accept input from the user via keyboard
    and display the generated output on the standard output (console).


    This activity has the following disadvantages:


    +   - Feasible for small inputs, but cumbersome in case of large inputs.

    - The entire input has to be entered every time the program is executed.

    - The output generated is not saved for sharing or later use.


    Just like words can be written on a piece of paper, information can be stored
    on a computer disk as a named location or a file.


    Python comes with the in-built ability to interact with files. Through file handling,
    Python programs can read a file to provide input data and output the results into
    a file for later use.


    # ## Text Files vs Binary Files - Use Case, File Formats, Examples


    Primarily, there are two types of files:


    # ### Text File


    A text file is the simplest way to store information in a human readable text
    format (sequence of ASCII or Unicode characters), which includes numeric values.


    It is easy to view and modify the contents of a text file using any text editor
    like notepad or even IDLE.


    Even the python script is stored as a text file given by the extension `.py`.
    `.txt` is the most popular extension used for a generic text file.


    Although text files do not have any structure, there are international standards
    defining some rules for creating specialized text files like:


    +   - `.csv`, where each row is a set of comma separated values. This is the most
    popular data exchange format.

    - `.tsv`, similar to CSV but the values are separated by tabs instead of commas.

    - `.xml` and `.json` are popular web data exchange formats.

    - `.html` files are text files with contents written in the Hypertext Markup Language
    designed to display contents in a web browser.


    # ### Binary File


    Although the contents of a text file is human readable, in reality this information
    is stored on the disk in form of machine readable bytes (1s and 0s) one character
    at a time. This makes the format simple to be operated by any application, but
    it is less efficient and consumes more memory (greater file size).


    In a binary file, the contents are also stored in form of bytes, but these bytes
    do not directly translate into ASCII or Unicode characters.


    Rather these bytes can represent anything like:'
  - '[PAGE 128]


    +   - Complex Data Structures

    - Image

    - Audio

    - Video


    and more.


    As there is no simple rule to determine the basic unit of information, so opening
    a binary file in a text editor will display garbage values and even a single bit
    of change can corrupt the entire file and make it unreadable. Hence, specialized
    softwares are required to read and write binary files.


    Python has a built-in `pickle` module which has implemented protocols to read
    and write binary files having `.dat` or `.pickle` file extension. `pickle` is
    a Python specific binary file format which can serialize any Python data structure
    (lists, dictionaries, etc) or code object into a binary file. This byte-content
    of this file can then be de-serialized and used later in any computer running
    Python.


    # File Opening & Closing


    A text or binary file can be opened using the built-in `open(file_name, mode=''r'')`
    function.


    The parameters of the function are explained below:


    `file_name`


    `file_name` is a required string parameter specifying the path of the file to
    be opened.


    It can either be an absolute path or a relative path as shown below:


    +   - `''fname.txt''` is the relative path of a text file residing in the current
    working directory from where the python script is being executed.

    - `''../fname.txt''` is the relative path of a text file outside the current directory
    where the python script is being executed.

    - `''/Users/edpunk/Documents/fname.txt''` is the absolute path of a text file
    which can be opened by the python script from any location as long as it is in
    the same system.


    `mode`


    `mode` is an optional string parameter which specifies the mode in which the file
    has to be opened. It defaults to `''r''` which means open for reading in text
    mode.


    The available modes are:


    | mode | purpose |

    | :--- | :--- |

    | `''r''` | Opens the file for reading (default). |

    | `''t''` | Opens the file in text mode (default). |

    | `''w''` | Opens the file for writing, truncating (emptying) the file if it already
    exists. |

    | `''x''` | Same as `''w''`, but it fails if the file already exists. |

    | `''a''` | Opens the file for writing, where any new data is added at the end.
    It creates a new file if the file does not exist. |

    | `''b''` | Opens the file in binary mode. |

    | `''rb''` | Opens the file in binary and read-only mode. |

    | `''wb''` | Opens the file for writing in binary mode, truncating (emptying)
    the file if it already exists. |

    | `''+''` | Allows both read and write operations on a file. |

    | `''r+''` | Opens the file in read and write mode. It throws an error in case
    the file does not exists. If the file already exists, new data is overwritten
    on top of the existing data if the position of stream is not moved to the end
    of the file. |'
  - '[PAGE 129]


    | mode | purpose |

    | :--- | :--- |

    | ''r+b'' | Opens the file in binary read and write mode. It does not truncate
    the file if it already exists. |

    | ''w+'' | Opens the file in read and write mode. It creates a new file or truncates
    the contents of the file if it already exists. |

    | ''w+b'' | Opens the file in binary read and write mode. It creates a new file
    or truncates the contents of the file if it already exists. |

    | ''a+'' | Opens the file in read and append mode. It creates a new file if it
    does not exist. If the file already exists, new data is automatically added at
    the end of the file after existing data. |

    | ''a+b'' | Opens the file in binary read and append mode. |


    After opening a file and performing some file operations, it can be safely closed
    using the `close()` method.


    For example, let us write a program to open a file `data.txt` in read and append
    mode and close the file object in the successive statement.


    ```

    f = open(''data.txt'', ''a+'')

    f.close()

    ```


    # File Reading


    Opening a file using the `open()` function creates and returns a file object on
    which the following activities can be performed:


    # Sequential Reading


    The following three methods can be used on a file object to sequentially read
    the contents of a file:


    # read()


    `read(size = -1)` method is used to read `size` numbers of bytes of data from
    a file at a time.


    In case `size` is not specified, it reads and returns the entire content of the
    file.


    # Example


    Let us consider a file named `info.txt` containing the below text:


    ```

    Hello World

    Thank You

    ```


    # Code


    ```

    >>> f = open(''info.txt'', ''r'')

    >>> print(f.read(3))

    Hel

    >>> print(f.read(4))

    lo W

    >>> f.close()


    >>> f = open(''info.txt'', ''r'')

    >>> print(f.read())

    Hello World

    Thank You

    >>> f.close()

    ```'
