    \ by a name (identifier) and follows the same naming convention:\n\n+   - Must\
    \ begin with a lowercase character ( a-z ) or an uppercase character ( A-Z ) or\
    \ underscore sign ( _ ).\n- Followed by any number of letters ( a-z , A-Z ), digits\
    \ ( 0-9 ), or underscores ( _ ).\n- Should not be a keyword.\n- No special symbols\
    \ are allowed like ! , @ , # , $ , % , etc.\n\n# Assignment\n\nVariables can be\
    \ bound to a reference of an object (of any type) using assignment statements.\n\
    \nYou can create an object (data) and bind it's reference to a variable using\
    \ equal sign ( = ):\n\n```\ncount = 100    # integer\npi    = 3.141  # real number\n\
    name  = \"Python\" # string\n```\n\nHere, L-value refers to the assignable variables\
    \ ( count , pi , name ) on the left side of the assignment and R-value refers\
    \ to the expression on the right side of the assignment operator that has a value\
    \ ( 100 , 3.141 , \"Python\" ).\n\nAs variables are just references, you can rebind\
    \ them to another object of same or different type:\n\n```\na = 100       # integer\n\
    a = 3.141     # real number\na = \"Python\"  # string\n```\n\n# Deletion\n\nThe\
    \ `del` statement can be used to unbind the reference to an object.\n\n```\n>>>\
    \ a = 10\n>>> del a\n>>> a\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nNameError: name 'a' is not defined\n```\n\nAccessing `a`\
    \ results in a `NameError` as the reference (variable) to the object holding value\
    \ `10` is deleted.\n\nThe object is also automatically cleaned up from the memory\
    \ if there is no other variable referencing to it (garbage collection).\n\n# Multiple\
    \ Assignment\n\nIn Python, multiple assignment can be used to condense variables\
    \ which are set to the same value:\n\n```\n>>> x = y = z = 'foo'\n>>> x\n'foo'\n\
    >>> y\n'foo'\n>>> z\n'foo'\n```"
