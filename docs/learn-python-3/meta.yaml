    ```\n>>> t = (34, 4, 6, 23, 4)\n>>> t.count(4)\n2\n>>> t = (\"it\", \"is\", \"\
    it\", \"I\")\n>>> t.count(\"it\")\n2\n```\n\n## 创建元素顺序反转的新元组\n\n要创建一个元素顺序反转的新元组，可以使用内置函数`reversed()`嵌套在内置函数`tuple()`中。\n\
    \n```\n>>> t = (\"T\", \"C\", 2, 4, \"S\")\n>>> new_t = tuple(reversed(t))\n>>>\
    \ new_t\n('S', 4, 2, 'C', 'T')\n>>> t\n('T', 'C', 2, 4, 'S')\n```\n\n## 创建元素排序后的新元组\n\
    \n要创建一个元素排序后的新元组，可以使用内置函数`sorted(x, [key, reverse])`，它返回一个新的已排序元组。\n\n该方法可选地接受两个关键字（命名）参数：\n\
    - `key`，用于指定一个函数，该函数在比较之前会对每个元组元素进行调用。\n- `reverse`，是一个布尔值，指定元组是否按降序排序。\n\n```\n\
    >>> t = (34, 4, 6, 23, 9)\n>>> tuple(sorted(t))\n(4, 6, 9, 23, 34)\n>>> tuple(sorted(t,\
    \ reverse=True))\n(34, 23, 9, 6, 4)\n>>> t = (\"Oh\", \"Hi\", \"Py\", \"it\")\n\
    >>> tuple(sorted(t))\n('Hi', 'Oh', 'Py', 'it')\n# 在排序前将单词转换为小写\n>>> tuple(sorted(t,\
    \ key=str.lower))\n('Hi', 'it', 'Oh', 'Py')\n```\n\n## 嵌套元组\n\n元组的元组也称为嵌套元组。\n\
    \n让我们创建一个嵌套元组，包含所有待售车辆的详细信息。\n\n```\n# 品牌 型号 年份 轮子数量\nt = (\n    (\"Kia\", \"\
    Sonnet\", 2019, 4),\n    (\"Toyota\", \"Camry\", 2018, 4),\n    (\"BMW\", \"Z4\"\
    , 2015, 4),\n    (\"BMW\", \"S1000\", 2016, 2),\n    (\"KTM\", \"390\", 2019,\
    \ 2),\n)\n```\n\n`t[i][j]`是获取嵌套元组`t`中索引`i`处元组的第`j+1`个元素的语法。\n\n```\n>>> t[2][1]\n\
    'Z4'\n```\n\n与嵌套列表相比，嵌套元组在表示数据集（例如从数据库获取的表）时很有用，因为确保数据的完整性很重要，而代码无法修改它，因为元组是不可变的。\n\
    \n## 理解元组的不可变性\n\n与列表一样，`+=`操作也适用于元组，并向其添加新元素。\n\n```\n>>> t = (\"Hi\", \"Ed\"\
    , \"Punk\")\n>>> t += (1, 2)\n>>> t\n('Hi', 'Ed', 'Punk', 1, 2)\n```\n\n但元组是不可变的，对吧？\n\
    那我们怎么能修改它呢？\n\n为了更好地理解，让我们重新审视对列表应用`+=`运算符时会发生什么。\n\n```\n>>> l = [\"Hi\", \"\
    Ed\", \"Punk\"]\n>>> id_l = id(l)\n>>> l += [1, 2]\n>>> l\n['Hi', 'Ed', 'Punk',\
    \ 1, 2]\n>>> id(l) == id_l\nTrue\n```\n\n对于列表，修改后的列表`l`仍然指向同一个对象。\n\n现在，让我们向元组添加元素。\n\
    \n```\n>>> t = (\"Hi\", \"Ed\", \"Punk\")\n>>> id_t = id(t)\n>>> t += (1, 2)\n\
    >>> t\n('Hi', 'Ed', 'Punk', 1, 2)\n>>> id(t) == id_t\nFalse\n```\n\n对于元组，修改后的元组实际上是一个全新的元组，包含原始元组的内容和扩展部分。\n\
    \n原始元组没有被修改，因为它是不可变的。但是，由于`t`不再指向原始元组，它将从内存中释放。\n\n因此，建议使用`append()`和`extend()`方法以编程方式添加新元素，而不是使用`+=`，因为如果代码尝试修改元组，它会引发错误。\n\
    \n```\n>>> l = [\"Hi\", \"Ed\", \"Punk\"]\n>>> l.extend([1, 2])\n>>> l\n['Hi',\
