    # # Python Fundamentals


    # ## Tokens: Introduction


    When a Python code is executed, the Python interpreter reads each logical line
    and breaks it into a sequence of lexical units.


    These lexical units are better known as **tokens** - the smallest individual units
    of a program. They are the building blocks of a Python code and can be classified
    into one of the following categories:


    +   - **Keywords** : Reserved words that convey special meaning when processed
    by the Python interpreter.

    - **Identifiers** : Names defined by the programmer to refer to objects that can
    represent variables, functions, classes, etc.

    - **Literals** : Values specified in the program which belong to exactly one of
    the Python''s built-in data types.

    - **Delimiters** : Symbols that denote grouping, punctuation, and assignment/binding.

    - **Operators** : Symbols that can operate on data and compute results.


    # ## Tokens: Keywords


    Keywords are reserved words that have special meaning when processed by the Python
    interpreter. They are case-sensitive and cannot be used for naming identifiers
    (class, function, variable or structure names).


    The list of keywords in Python are provided below:


    | | | |

    |---|---|---|

    | True | False | import |

    | from | as | None |

    | and | or | not |

    | in | is | try |

    | except | finally | raise |

    | del | global | nonlocal |

    | lambda | def | class |

    | with | if | elif |

    | else | pass | for |

    | while | continue | break |

    | assert | return | yield |

    | async | await | |


    # ## Tokens: Identifiers


    Identifiers are used for defining the names of Python objects such as variables,
    functions, classes, modules, etc. The naming convention for identifiers is as
    follows:'
  - '[PAGE 16]


    +   - Must begin with a lowercase character ( a-z ) or an uppercase character
    ( A-Z ) or underscore sign ( _ ).

    - Followed by any number of letters ( a-z , A-Z ), digits ( 0-9 ), or underscores
    ( _ ).

    - Should not be a keyword.

    - No special symbols are allowed like ! , @ , # , $ , % , etc.


    Some points to keep in mind while naming identifiers:


    +   - Identifiers are case-sensitive in nature and any difference in case of any
    character refers to a different identifier. e.g., `length` and `Length` are different
    identifiers.

    - Identifiers differing by only underscores are different. e.g., `unitlength`
    and `unit_length` are different identifiers.


    It is also a good practice (although not compulsory) to follow the following procedure
    while naming identifiers:


    +   - Identifiers should be named carefully with an emphasis on clarity and readability.
    For example, in a program that calculates the area of a rectangle, a good choice
    for identifier names are - `length` , `breadth` and `area` .

    - Class names should start with uppercase character.

    - Identifiers starting with an underscore have special meaning in a program.

    - Variable, function and method names should be in lowercase characters, with
    underscores separating multiple words like `area_of_square` , `area_of_triangle`
    ,etc.


    # Tokens: Literals


    Literals are tokens in the source code which represent fixed or constant values.
    They are often used in assignment statements for initializing variables or in
    comparison expressions.


    The various types of literals available in Python are as follows:


    # Numeric Literals


    Numeric literals are used for representing numeric values in the source code.
    They can be of three types - integers, float point numbers and imaginary numbers.


    # Integer Literals


    Integer literals are numbers without any fractional component.


    In Python, integer literals can be written in four positional (base) numeral systems:


    # i. Decimal or base-10 Integer


    A decimal integer literal consists of one or more digits ( 0-9 ) and cannot have
    any zeros preceding the first non-zero digit, except when the number is 0 .


    Example base-10 integers:


    ```

    34

    3283298

    864

    0

    ```


    `092` is not a valid decimal integer literal as a zero precedes the first non-zero
    digit `9` .


    # ii. Binary or base-2 Integer


    A binary integer or base-2 integer begins with `0b` or `0B` followed by binary
    digits `0-1` .'
  - '[PAGE 17]


    # iii. Octal or base-8 Integer


    An octal integer or base-8 integer begins with `0o` or `0O` followed by octal
    digits `0–7`.


    For example, `27` can be written as an octal integer literal `0o33`.


    # iv. Hexadecimal or base-16 Integer


    A hexadecimal integer or base-16 integer begins with `0x` or `0X` followed by
    digits `0–9` or letters `A–F` (case insensitive).


    For example, `27` can be written as a hexadecimal integer literal `0x1B` or `0x1b`.


    Thus, it can be observed that number `27` can be written in the program as `27`
    (decimal), `0b11011` (binary), `0o33` (octal) or `0x1B` (hexadecimal).


    # Underscores in Integer Literals


    An optional character `_` (underscore) is also allowed in an integer literal to
    group digits for enhanced readability.


    One underscore can occur between digits, and after base specifiers like `0o`.


    They are ignored while determining the actual numerical value of the literal.


    Some valid underscore usages are - `10_00_00_000`, `0b_1110_0101`, `0x23_123`.


    # Floating Point Literals


    Floating point literals are real numbers present in the source code. They contain
    fractional component and/or exponential component.


    The fractional component includes the digits after the decimal point (`.`).


    Example floating point literals:


    ```

    3.4

    .4

    8.

    3.4E2

    3.4e-2

    ```


    In the above example, `.4` is equivalent to `0.4` and `8.` is equivalent to `8.0`.


    The exponential component can be identified by the letter `e` or `E` followed
    by an optional sign (`+` or `-`) and digits (`0–9`). This exponent is equivalent
    to multiplying the real number with the power of `10`.


    For example, `3.4E2` is equivalent to `3.4 x 10^2` or `340.0`, whereas `3.4e-2`
    is equivalent to `3.4 x 10^-2` or `.034`.


    # Imaginary Literals


    To specify complex numbers and perform complex number mathematics, Python supports
    imaginary literals which are given by real or integer number followed by the letter
    `j` or `J` which represents the unit imaginary number.


    Example imaginary literals:


    ```

    3.5j

    15.j

    12j

    .005j

    3e100j

    3.5e-10j

    ```'
- md: "## Points to Note\n\nIn Python,\n\n-   there is no specialized literal such\
    \ as a complex literal. A complex number is actually represented in the program\
    \ using an expression comprising a real number (integer/float numeric literal)\
    \ and an imaginary number (imaginary literal). For example, `1 + 2j` consists\
    \ of an integer literal (`1`) and an imaginary literal (`2j`).\n-   numeric literals\
    \ do not include the minus sign (`-`). `-` is actually a unary operator it combines\
    \ with a numeric literal to represent negative numbers. For example, in `-3.14`\
    \ the numeric literal is `3.14` and `-` is an operator.\n\n## Boolean Literals\n\
    \nThe reserved words `True` and `False` are also boolean literals which can be\
    \ used to specify the truth value in a program.\n\n## String Literals\n\nString\
    \ literals are texts which can be specified in a variety of ways in Python:\n\n\
    -   Single quotes: `'python'`\n-   Double quotes: `\"python\"`\n-   Triple quoted:\
    \ `'''Triple python'''`, `\"\"\"Three python\"\"\"`.\n\nTriple quoted strings\
    \ can also span multiple lines.\n\nExample:\n\n```\ns = \"I am a String\"\n\n\
    s1 = \"\"\"A\nmultiline\nString\"\"\"\n\ns2 = '''Also a\nmultiline\nString'''\n\
    ```\n\nThe backslash (`\\`) character can be used in a string literal to escape\
    \ characters that otherwise have a special meaning, such as newline, linefeed,\
    \ or the quote character.\n\n| Escape Sequence | Meaning |\n| :--- | :--- |\n\
    | `\\\\` | Backslash (`\\`) |\n| `\\'` | Single quote (`'`) |\n| `\\\"` | Double\
    \ quote (`\"`) |\n| `\\a` | ASCII Bell (BEL) |\n| `\\b` | ASCII Backspace (BS)\
    \ |\n| `\\f` | ASCII Formfeed (FF) |\n| `\\n` | ASCII Linefeed (LF) |\n| `\\r`\
    \ | ASCII Carriage Return (CR) |\n| `\\t` | ASCII Horizontal Tab (TAB) |\n| `\\\
    v` | ASCII Vertical Tab (VT) |\n\nAlthough `\\'` and `\\\"` can be used to specify\
    \ quote characters, Python allows embedding double quotes inside a single-quoted\
    \ string ( 'My name is \"Python\".' ) and single quotes inside a double-quoted\
    \ string ( \"Python's World\" ).\n\nString literals also support unicode characters\
    \ which can be specified using `\\u` escape sequence followed by the 4 letter\
    \ unicode.\n\n```\n>>> print(\"E = mc\\u00B2\")\nE = mc²\n```\n\nIn the above\
    \ example, `\\u00B2` is the unicode character which represents the ‘SUPERSCRIPT\
    \ TWO’.\n\n## Special Literal\n\n`None` is a special literal which is used to\
    \ denote the absence of value.\n\nIt should not be confused with `0` as `0` is\
    \ an integer literal with a defined finite value, whereas `None` implies nothingness.\n\
    \n```\n>>> a = None\n>>> a\n>>>\n```\n\nIn the above example, the Python shell\
    \ does not display any value of `a` as it is assigned as `None` which has no value.\n\
    \n## Collection of Literals\n\nPython has the provision for specifying a collection\
    \ of literals in the source code using a special syntax known as “**displays**”.\n\
    \nOne can create specialized containers like list, set and dictionary using this\
    \ syntax.\n\nSome example collection of literals (displays) are provided below:\n\
    \n-   List: `a = ['a', 'b', 'c']`\n-   Set: `a = {'a', 'b', 'c'}`\n-   Dictionary:\
    \ `a = {'a':1, 'b':2, 'c':3}`\n\nList, set and dictionary will be covered in detail\
    \ in later chapters.\n\n## Tokens: Operators\n\nOperators are tokens which can\
    \ be combined with values and variables to create expressions which evaluate to\
    \ a single value. Python supports a rich set of operators:\n\n```\n+       - \
    \      *       **\n/       //      %       @\n<<      >>\n&       |       ^  \
    \     ~\n:=      <       >\n<=      >=      ==      !=\n```\n\nEach of the above\
    \ operators are covered in detail in the chapter - Operators.\n\n## Tokens: Delimiters\n\
    \nDelimiters are tokens which are useful for organizing a program and are used\
    \ in statements, expressions, functions, literal collections, and various other\
    \ code structures.\n\nThey can be classified based on utility as follows:\n\n\
    ## Grouping\n\n`()` , `[]` and `{}` are delimiters used for:\n\n-   grouping expressions\
    \ which can be spread across multiple physical lines.\n-   creating collection\
    \ of literals like list display, dictionary display, set display.\n-   creating\
    \ parenthesized sub-expression having the highest operator precedence (evaluated\
    \ first) in a complex expression.\n\n## Example\n\n```\ndays = ['Sunday', 'Monday',\n\
    \        'Tuesday', 'Wednesday',\n        'Thursday', 'Friday',\n        'Saturday']\n\
    \nsum_6 = (1 + 2 +\n         3 + 4 +\n         5 + 6)\n\nis equivalent to\ndays\
    \ = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday']\n\
    \nsum_6 = (1 + 2 + 3 + 4 + 5 + 6)\n```\n\n## Punctuation, Decoration and Annotation\n\
    \nTokens in Python which are used for punctuation, decoration and annotation are:\n\
    \n```\n.       ,       :\n;       @       ->\n```\n\n## Assignment/Binding\n\n\
    The assignment or binding delimiters are used for binding objects to names via\
    \ assignment statements. The complete list of tokens are provided below:\n\n```\n\
    =       +=      -=      *=\n/=      //=     %=      **=\n@=      &=      |=  \
    \    ^=\n<<=     >>=\n```\n\nExcept `=` , the rest of the tokens have an operator\
    \ followed by `=` character.\n\nThese delimiters are also known as augmented assignment\
    \ operators as they perform an operation in combination with assignment.\n\n##\
    \ Character Set\n\nA set of valid characters that a programming language recognizes\
    \ is known as its **character set**.\n\nPython is a new age programming language\
    \ which supports Unicode encoding standard. The default encoding for Python source\
    \ code is UTF-8 (Unicode Transformation Format – 8-bit) which enables developers\
    \ to use Unicode characters not only as literals, but also as identifiers.\n\n\
    This makes Python one of the very few programming languages that support multiple\
