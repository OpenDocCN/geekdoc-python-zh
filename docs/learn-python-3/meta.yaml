    # popitem()


    popitem() can be used to destructively iterate over a dictionary removing and
    returning a (key, value) pair in LIFO (Last Item First Out) order.


    ```

    >>> d = {"yr": 20, "name": "Ed",

    ...       18: True}

    >>> d.popitem()

    (18, True)

    >>> d.popitem()

    (''name'', ''Ed'')

    >>> d.update({"name": "py"})

    >>> d

    {''yr'': 20, ''name'': ''py''}

    >>> d.popitem()

    (''name'', ''py'')

    >>> d.popitem()

    (''yr'', 20)

    >>> d

    {}

    ```


    # Dictionary Operations


    # Membership


    in keyword can be used to test the presence of a key in a dictionary.


    ```

    >>> d = {"yr": 20, 18: True}

    >>> "yr" in d

    True

    ```


    Similarly, not in can be used to determine the absence of a key.


    ```

    >>> "name" not in d

    True

    ```


    # Union


    The | (union) operator can be used to merge two dictionaries.


    ```

    >>> d = {"yr": 20, 18: True}

    >>> n = {"name": "Ed"}

    >>> d | n

    {''yr'': 20, 18: True, ''name'': ''Ed''}

    ```


    In case of common keys between the two operands (dictionaries), the values of
    the operand on the right takes priority.


    ```

    >>> d = {"yr": 20, 18: True}

    >>> n = {"yr": 15, "name": "Ed"}

    >>> d | n

    {''yr'': 15, 18: True, ''name'': ''Ed''}

    ```'
