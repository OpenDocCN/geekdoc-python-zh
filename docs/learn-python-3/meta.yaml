  md: "They are often used to specify mathematical constants, file path or other such\
    \ values and can be accessed anywhere in the source code (by functions or code\
    \ blocks).\n\nBelow example demonstrates how the global variable `n` can be accessed\
    \ by all the functions.\n\n```\nn = 10\n\ndef uno():\n    print(n)\n\ndef tres():\n\
    \    print(n*3)\n\nuno()\ntres()\n```\n\n```\n10\n30\n```\n\nIn case a variable\
    \ is defined inside a function with the same name as that of a global variable,\
    \ then the variable is considered as a local variable and all references made\
    \ to the variable point to this local variable.\n\n```\nn = 10\n\n# local n inside\
    \ the\n# function\ndef uno():\n    n = 5\n    print(n)\n\n# global n inside the\n\
    # function\ndef tres():\n    print(n*3)\n\nuno()\ntres()\n```\n\n```\n5\n30\n\
    ```\n\nAny changes made to a global variable inside a code block or a function\
    \ can modify it for that session. This can have an impact on all the code blocks/functions\
    \ that access and use it.\n\nTo modify the value of a global variable one can\
    \ use the `global` keyword as shown in the example below.\n\n```\nn = 10\n\n#\
    \ function modifies the\n# value of global n\ndef uno():\n    global n\n```"
