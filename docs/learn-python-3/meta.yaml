    # Locating Items in a Tuple


    As compared to a `list`, `tuple` supports only methods that do not try to modify
    it.


    An item `x` can be located in a tuple using the `index(x[, i[, j]])` method which
    returns the first occurrence of the item at or after index `i` and before index
    `j`. In case `i` and `j` are not specified they default to `i=0` and `j=len(t)`.


    ```

    >>> t = (34, 4, 6, 23, 4)

    >>> t.index(4)

    1

    >>> t.index(4, 3)

    4

    >>> t.index(6, 1, 4)

    2

    ```


    # Counting the Occurrence of an Item


    `count()` method can be used to count the occurrence(s) of an item in a tuple.


    ```

    >>> t = (34, 4, 6, 23, 4)

    >>> t.count(4)

    2

    >>> t = ("it", "is", "it", "I")

    >>> t.count("it")

    2

    ```


    # New Tuple with Reversed Items


    To create a new tuple with items in reverse order, use the built-in function `reversed()`
    nested in the built-in `tuple()`.


    ```

    >>> t = ("T", "C", 2, 4, "S")

    >>> new_t = tuple(reversed(t))

    >>> new_t

    (''S'', 4, 2, ''C'', ''T'')

    >>> t

    (''T'', ''C'', 2, 4, ''S'')

    ```


    # New Tuple with Sorted Items


    To create a new tuple with sorted items, use the built-in `sorted(x, [key, reverse])`
    function which returns a new sorted tuple.


    The method optionally accepts 2 keyword (named) arguments: - `key` which is used
    to specify a function which is called on each tuple element prior to making the
    comparisons, and - `reverse` is a boolean which specifies whether the tuple is
    to be sorted in descending order.


    ```

    >>> t = (34, 4, 6, 23, 9)

    >>> tuple(sorted(t))

    (4, 6, 9, 23, 34)

    >>> tuple(sorted(t, reverse=True))

    (34, 23, 9, 6, 4)

    >>> t = ("Oh", "Hi", "Py", "it")

    ```'
