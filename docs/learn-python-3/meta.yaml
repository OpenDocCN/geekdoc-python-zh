    \ first.\n\nWe can modify the code to get rid of the logical error.\n\n```\nn\
    \ = 10\nm = 20\navg = (n + m) / 2\nprint(\"Average:\", avg)\n```\n\nOn executing\
    \ the script, we now obtain the correct result\n\nAverage: 15.0\n\n# Exceptions\n\
    \nWe have witnessed that even if a program is syntactically correct, its execution\
    \ may lead to a run-time error.\n\nThis error detected during execution is known\
    \ as an **exception** which is an object created by the Python interpreter containing\
    \ information regarding the error like type of error, file name and the location\
    \ of the error (line number, token) in the program.\n\nSome of the built-in exceptions\
    \ that are raised by the Python interpreter are - `ImportError`, `ZeroDivisionError`,\
    \ `NameError`, `ValueError`, `IndexError`, `KeyError`, `TypeError` and `IndentationError`.\n\
    \nApart from the Python interpreter, a programmer can also trigger and raise an\
    \ exception (along with a custom message) in the code using `raise` or `assert`\
    \ statement.\n\n# raise\n\nThe `raise` statement can be used to throw an exception\
    \ in a program. The exception may or may not contain the custom error message\
