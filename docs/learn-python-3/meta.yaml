- md: "## Strings: Introduction & Creation\n\nA String ( `str` ) is an **immutable**\
    \ sequence of Unicode characters which is used to handle textual data in Python.\n\
    \nThey can be specified by enclosing within:\n\n- Single quotes: `'embedded \"\
    double\" quotes are allowed'`\n- Double quotes: `\"embedded 'single' quotes are\
    \ allowed\"`\n- Triple quotes: `'''Three single quotes'''` , `\"\"\"Three double\
    \ quotes\"\"\"` .\n\nTriple quoted strings can also span multiple lines.\n\nSome\
    \ examples are provided below:\n\n```\ns = \"I am a String\"\n\ns1 = \"\"\"A\n\
    multiline\nString\"\"\"\n\ns2 = '''Also a\nmultiline\nString'''\n```\n\n## Escape\
    \ Characters\n\nThe backslash ( `\\` ) character can be used in a string to escape\
    \ characters that otherwise have a special meaning, such as newline, linefeed,\
    \ or the quote character.\n\n| Escape Sequence | Meaning |\n| :--- | :--- |\n\
    | `\\\\` | Backslash ( `\\` ) |\n| `\\'` | Single quote ( `'` ) |\n| `\\\"` |\
    \ Double quote ( `\"` ) |\n| `\\a` | ASCII Bell (BEL) |\n| `\\b` | ASCII Backspace\
    \ (BS) |\n| `\\f` | ASCII Formfeed (FF) |\n| `\\n` | ASCII Linefeed (LF) |\n|\
    \ `\\r` | ASCII Carriage Return (CR) |\n| `\\t` | ASCII Horizontal Tab (TAB) |\n\
    | `\\v` | ASCII Vertical Tab (VT) |\n\nAlthough `\\'` and `\\\"` can be used to\
    \ specify quote characters, Python allows embedding double quotes inside a single-quoted\
    \ string ( `'My name is \"Python\".'` ) and single quotes inside a double-quoted\
    \ string ( `\"Python's World\"` ).\n\n## Unicode Support\n\nPython string objects\
    \ support Unicode characters.\n\nA unicode character can be specified as `\\u`\
    \ followed by the 4 letter unicode ( `\\uXXXX` ).\n\n```\n>>> print(\"E = mc\\\
    u00B2\")\nE = mc²\n```\n\nIn the above example, `\\u00B2` is the unicode character\
    \ which represents the ‘SUPERSCRIPT TWO’.\n\n## Other Types to String\n\nIn case\
    \ you want to create a string object from other data types, just use the built-in\
    \ `str()` function as follows:\n\n```\n>>> str(9)\n'9'\n\n>>> str(10.0)\n'10.0'\n\
    ```\n\n## Accessing Characters of a String\n\nPython strings are “immutable”,\
    \ i.e., the state (value) of the objects cannot be modified after they are created.\n\
    \nUsing the standard `[ ]` syntax and zero-based indexing, characters can be accessed\
    \ in a string.\n\nIf `s = \"hello\"` ,\n\n- `s[0]` will result in `h`\n- `s[2]`\
    \ will result in `l`\n- `s[5]` will result in `IndexError: string index out of\
    \ range` as the length of string is 5 (index 0 to 4 )\n- `s[2] = 'p'` will result\
    \ in `TypeError: 'str' object does not support item assignment` as `s` is immutable\n\
    \nPython also supports negative indexing, i.e., you can access the values of a\
    \ string from right to left.\n\nIndex of `-1` denotes the last character of the\
    \ string, `-2` is the second last character and so forth.\n\nIf `s = \"hello\"\
    ` ,\n\n- `s[-1]` will result in `o`\n- `s[-4]` will result in `e`\n- `s[-6]` will\
    \ result in `IndexError: string index out of range` as the length of string is\
    \ 5 (negative index `-1` to `-5` )\n\n## Length of String\n\nThe built-in function\
    \ `len()` returns the length of a string which is useful during string traversal\
    \ or other string operations.\n\n# Iteration: while\n\n`while` statement repeatedly\
    \ executes a code block as long as the test condition is satisfied.\n\nUsually\
    \ there is a statement at the end of the code block which updates the value of\
    \ the variable being used in the test expression, so the loop does not execute\
    \ infinitely.\n\nA flowchart of the process is provided below:\n\n![](img/84256b7fa80e08517c2c7cbb96a2913c_70_0.png)\n\
    \nwhile loop Iteration in Flow of Code\n\nFor example, let us traverse a list\
    \ and print the position(index) and value of each element until we reach the end\
    \ of the list.\n\n# Code\n\n```\ncars = [\"Hyundai\", \"Honda\",\n        \"Ford\"\
    , \"Toyota\",\n        \"BMW\", \"Volkswagen\"]\ni = 0\nwhile i<len(cars):\n \
    \   print(i, cars[i])\n    i+=1\n```\n\n# Output\n\n```\n0 Hyundai\n1 Honda\n\
    2 Ford\n3 Toyota\n4 BMW\n5 Volkswagen\n```\n\nIn the above example, the test condition\
    \ is `i<len(cars)` and the update statement is `i+=1`.\n\n# Exercises\n\nLet us\
    \ go through some programming problems which utilize the `while` iteration statement.\n\
    \n## 1. Compound Interest\n\nWrite a program to calculate the total compound interest\
    \ payable for given principal, interest rate (compounded annually) and total time\
    \ (in years).\n\n# Code\n\n```\nprin = float(input(\"Enter the principal amount:\
    \ \"))\nrate = float(input(\"Enter the annual interest rate: \"))\ntime = int(input(\"\
    Enter the loan duration (in years): \"))\n\namt = prin\nwhile time > 0:\n    amt\
    \ += rate*amt/100\n    time = time - 1\n\nprint(\"Total interest payable:\", amt\
    \ - prin)\n```\n\n**Output**\n```\nEnter the principal amount: 500000\nEnter the\
    \ annual interest rate: 5\nEnter the loan duration (in years): 3\nTotal interest\
    \ payable: 78812.5\n```\n\n## 2. Factorial\n\nThe factorial of a positive integer\
    \ `n`, denoted by `n!`, is the product of all positive integers less than or equal\
    \ to `n`.\n`n! = n×(n-1)×(n-2)...3×2×1`\nWrite a program to calculate `n!` for\
    \ a given `n` (assume `n` is greater than `0`).\n\n**Code**\n\n```\nn = int(input(\"\
    Enter n: \"))\n\nfactorial = 1\nwhile n > 0:\n    factorial *= n\n    n = n -\
    \ 1\n\nprint(\"n! :\", factorial)\n```\n\n**Output**\n```\nEnter n: 6\nn! : 720\n\
    ```\n\n# Jump Statements\n\nJump statements are used to (abruptly) alter the flow\
    \ of execution.\nSome of the jump statements available in Python are:\n\n## pass\n\
    \nA `pass` statement acts as a placeholder and performs null (no) operation.\n\
    Various reasons for using the keyword `pass` are provided below:\n\n### 1. Syntactical\
    \ Requirement\n\nUsing `pass` becomes a syntactical requirement for cases where\
    \ the Python interpreter can raise a `SyntaxError` due to missing statements.\n\
    The below code will execute successfully without any operation in the loop\n\n\
    ```\nfor i in range(6):\n    pass\n```\n\nwhereas without `pass`\n\n```\nfor i\
    \ in range(6):\n```\n\nwill throw the following `SyntaxError`\n\n```\nFile \"\
    <ipython-input-18-f2ba5099d499>\", line 1\n    for i in range(6):\n        ^\n\
    SyntaxError: unexpected EOF while parsing\n```\n\nSimilarly, inside an `if`\n\n\
    ```\nif 2 < 3:\n    pass\n```\n\nwhereas without `pass`\n\n```\nif 2 < 3:\n```\n\
    \nwill throw the following `SyntaxError`\n\n```\nFile \"<ipython-input-20-068861cce0a8>\"\
    , line 1\n    if 2 < 3:\n        ^\nSyntaxError: unexpected EOF while parsing\n\
    ```\n\n### 2. Skipping Code Execution\n\n`pass` can be used to skip code execution\
    \ for certain cases.\n\nFor example,\n\n# Code\n\n```\nl = [2, 3, 4, 5, 6]\nfor\
    \ i in l:\n    if i%3 == 0:\n        pass\n    else:\n        print(i, \"is not\
    \ divisible by 3\")\n```\n\n# Output\n\n```\n2 is not divisible by 3\n4 is not\
    \ divisible by 3\n5 is not divisible by 3\n```\n\n### 3. Placeholders\n\n`pass`\
    \ can be used to create valid empty functions and classes as placeholders which\
    \ can be modified in the future versions of code.\n\n```\ndef emptyFunction():\n\
    \    pass\n\nclass EmptyClass:\n    pass\n```\n\n## break\n\nThe `break` statement\
    \ is used to terminate the execution of immediately enclosing `for` or `while`\
    \ statement.\n\nThe below code will terminate the `for` loop when `i` is equal\
    \ to `4`\n\n```\nfor i in range(10):\n    print(i)\n    if i == 4:\n        break\n\
    ```\n\n```\n0\n1\n2\n3\n4\n```\n\nIn a while statement,\n\n```\ni =0\nwhile i\
    \ <10:\n    print(i)\n    if i == 4:\n        break\n    i+=1\n```\n\nbreak will\
    \ terminate the while loop when i is equal to 4\n\n```\n0\n1\n2\n3\n4\n```\n\n\
    ## continue\n\ncontinue statement is used to skip the execution of successive\
    \ statements and start the next iteration.\nThe below code will skip all candidates\
    \ for an interview who have less than 4 years of work experience.\n\n```\npeople\
    \ =  [{\"name\": \"ABC\", \"experience\": 6},\n           {\"name\": \"EFG\",\
    \ \"experience\": 2},\n           {\"name\": \"JKL\", \"experience\": 5},\n  \
    \         {\"name\": \"XYZ\", \"experience\": 3},]\nfor candidate in people:\n\
    \    if candidate[\"experience\"]<4:\n        continue\n    print(candidate[\"\
    name\"], \"is selected for interview\")\n```\n\nOutput:\n```\nABC is selected\
    \ for interview\nJKL is selected for interview\n```\n\n# Nested Loops\n\nWhen\
    \ a loop is present inside another loop, it is known as a nested loop.\nFor each\
    \ iteration of the outer loop, the inner loop undergoes complete iteration. Thus,\
    \ if the outer loop has to undergo n iterations and the inner loop has to undergo\
    \ m iterations, the code block inside the inner loop executes n x m times.\nLet\
    \ us go through a nested loop example:\n\n## Factorial\n\nWrite a program to print\
    \ the factorial of all numbers in the range 1 to 10 (inclusive).\n\n# Code\n\n\
    ```\nfor n in range(1, 11):\n    factorial = 1\n    for i in range(1, n+1):\n\
    \        factorial *= i\n    print(n,\"! =\", factorial)\n```\n\n# Output\n\n\
    ```\n1 ! = 1\n2 ! = 2\n3 ! = 6\n4 ! = 24\n5 ! = 120\n6 ! = 720\n7 ! = 5040\n8\
    \ ! = 40320\n9 ! = 362880\n10 ! = 3628800\n```\n\n## Nested Loop - break\n\nA\
    \ break statement inside the inner loop terminates only the inner loop whereas\
    \ the outer loop is not affected.\n\nTo develop a better understanding, let us\
    \ write a program to find all prime numbers between 2 and 40.\n\n# Code\n\n```\n\
    for n in range(2, 40):\n    i = 2\n    while i < n/2:\n        if n%i == 0:\n\
    \            break\n        i+=1\n    if i>n/2:\n        print(n,\"is prime\"\
    )\n```\n\n# Output\n\n```\n2 is prime\n3 is prime\n5 is prime\n7 is prime\n11\
    \ is prime\n13 is prime\n17 is prime\n19 is prime\n23 is prime\n29 is prime\n\
    31 is prime\n37 is prime\n```"
  mdcn: "## 字符串：简介与创建\n\n字符串（`str`）是**不可变**的 Unicode 字符序列，用于在 Python 中处理文本数据。\n\n\
    可以通过以下方式指定字符串：\n\n- 单引号：`'允许嵌入\"双引号\"'`\n- 双引号：`\"允许嵌入'单引号'\"`\n- 三引号：`'''三个单引号'''`，`\"\
    \"\"三个双引号\"\"\"`。\n\n三引号字符串也可以跨越多行。\n\n以下是一些示例：\n\n```\ns = \"I am a String\"\n\
    \ns1 = \"\"\"A\nmultiline\nString\"\"\"\n\ns2 = '''Also a\nmultiline\nString'''\n\
    ```\n\n## 转义字符\n\n反斜杠（`\\`）字符可用于字符串中，以转义那些原本具有特殊含义的字符，例如换行符、回车符或引号字符。\n\n| 转义序列\
    \ | 含义 |\n| :--- | :--- |\n| `\\\\` | 反斜杠（`\\`） |\n| `\\'` | 单引号（`'`） |\n| `\\\
    \"` | 双引号（`\"`） |\n| `\\a` | ASCII 响铃（BEL） |\n| `\\b` | ASCII 退格（BS） |\n| `\\\
    f` | ASCII 换页（FF） |\n| `\\n` | ASCII 换行（LF） |\n| `\\r` | ASCII 回车（CR） |\n| `\\\
    t` | ASCII 水平制表符（TAB） |\n| `\\v` | ASCII 垂直制表符（VT） |\n\n虽然可以使用 `\\'` 和 `\\\"`\
    \ 来指定引号字符，但 Python 允许在单引号字符串中嵌入双引号（`'My name is \"Python\".'`），以及在双引号字符串中嵌入单引号（`\"\
    Python's World\"`）。\n\n## Unicode 支持\n\nPython 字符串对象支持 Unicode 字符。\n\nUnicode\
    \ 字符可以指定为 `\\u` 后跟 4 位 Unicode 编码（`\\uXXXX`）。\n\n```\n>>> print(\"E = mc\\u00B2\"\
    )\nE = mc²\n```\n\n在上面的示例中，`\\u00B2` 是表示“上标二”的 Unicode 字符。\n\n## 其他类型转换为字符串\n\n\
    如果你想从其他数据类型创建字符串对象，只需使用内置的 `str()` 函数，如下所示：\n\n```\n>>> str(9)\n'9'\n\n>>> str(10.0)\n\
    '10.0'\n```\n\n## 访问字符串的字符\n\nPython 字符串是“不可变的”，即对象的状态（值）在创建后无法修改。\n\n使用标准的 `[\
    \ ]` 语法和从零开始的索引，可以访问字符串中的字符。\n\n如果 `s = \"hello\"`，\n\n- `s[0]` 的结果是 `h`\n- `s[2]`\
    \ 的结果是 `l`\n- `s[5]` 的结果是 `IndexError: string index out of range`，因为字符串长度为 5（索引\
    \ 0 到 4）\n- `s[2] = 'p'` 的结果是 `TypeError: 'str' object does not support item assignment`，因为\
    \ `s` 是不可变的\n\nPython 还支持负索引，即你可以从右到左访问字符串的值。\n\n索引 `-1` 表示字符串的最后一个字符，`-2` 是倒数第二个字符，依此类推。\n\
    \n如果 `s = \"hello\"`，\n\n- `s[-1]` 的结果是 `o`\n- `s[-4]` 的结果是 `e`\n- `s[-6]` 的结果是\
    \ `IndexError: string index out of range`，因为字符串长度为 5（负索引 `-1` 到 `-5`）\n\n## 字符串长度\n\
    \n内置函数 `len()` 返回字符串的长度，这在字符串遍历或其他字符串操作中很有用。\n\n# 迭代：while\n\n`while` 语句只要测试条件满足，就会重复执行一个代码块。\n\
    \n通常在代码块末尾有一个语句，用于更新测试表达式中使用的变量的值，因此循环不会无限执行。\n\n该过程的流程图如下：\n\n![](img/84256b7fa80e08517c2c7cbb96a2913c_70_0.png)\n\
    \n代码流程中的 while 循环迭代\n\n例如，让我们遍历一个列表并打印每个元素的位置（索引）和值，直到到达列表末尾。\n\n# 代码\n\n```\n\
    cars = [\"Hyundai\", \"Honda\",\n        \"Ford\", \"Toyota\",\n        \"BMW\"\
    , \"Volkswagen\"]\ni = 0\nwhile i<len(cars):\n    print(i, cars[i])\n    i+=1\n\
    ```\n\n# 输出\n\n```\n0 Hyundai\n1 Honda\n2 Ford\n3 Toyota\n4 BMW\n5 Volkswagen\n\
    ```\n\n在上面的示例中，测试条件是 `i<len(cars)`，更新语句是 `i+=1`。\n\n# 练习\n\n让我们通过一些利用 `while`\
    \ 迭代语句的编程问题。\n\n## 1. 复利\n\n编写一个程序，根据给定的本金、年利率（按年复利）和总时间（以年为单位）计算应付的总复利。\n\n#\
    \ 代码\n\n```\nprin = float(input(\"Enter the principal amount: \"))\nrate = float(input(\"\
    Enter the annual interest rate: \"))\ntime = int(input(\"Enter the loan duration\
    \ (in years): \"))\n\namt = prin\nwhile time > 0:\n    amt += rate*amt/100\n \
    \   time = time - 1\n\nprint(\"Total interest payable:\", amt - prin)\n```\n\n\
    **输出**\n```\nEnter the principal amount: 500000\nEnter the annual interest rate:\
    \ 5\nEnter the loan duration (in years): 3\nTotal interest payable: 78812.5\n\
    ```\n\n## 2. 阶乘\n\n正整数 `n` 的阶乘，记为 `n!`，是所有小于或等于 `n` 的正整数的乘积。\n`n! = n×(n-1)×(n-2)...3×2×1`\n\
    编写一个程序，计算给定 `n`（假设 `n` 大于 `0`）的 `n!`。\n\n**代码**\n\n```\nn = int(input(\"Enter\
    \ n: \"))\n\nfactorial = 1\nwhile n > 0:\n    factorial *= n\n    n = n - 1\n\n\
    print(\"n! :\", factorial)\n```\n\n**输出**\n```\nEnter n: 6\nn! : 720\n```\n\n\
    # 跳转语句\n\n跳转语句用于（突然）改变执行流程。\nPython 中可用的一些跳转语句是：\n\n## pass\n\n`pass` 语句充当占位符，执行空（无）操作。\n\
    使用关键字 `pass` 的各种原因如下：\n\n### 1. 语法要求\n\n在 Python 解释器可能因缺少语句而引发 `SyntaxError` 的情况下，使用\
    \ `pass` 成为语法要求。\n以下代码将在循环中不执行任何操作的情况下成功执行\n\n```\nfor i in range(6):\n    pass\n\
    ```\n\n而没有 `pass`\n\n```\nfor i in range(6):\n```\n\n将抛出以下 `SyntaxError`\n\n```\n\
    File \"<ipython-input-18-f2ba5099d499>\", line 1\n    for i in range(6):\n   \
    \     ^\nSyntaxError: unexpected EOF while parsing\n```\n\n类似地，在 `if` 语句中\n\n\
    ```\nif 2 < 3:\n    pass\n```\n\n而没有 `pass`\n\n```\nif 2 < 3:\n```\n\n将抛出以下 `SyntaxError`\n\
    \n```\nFile \"<ipython-input-20-068861cce0a8>\", line 1\n    if 2 < 3:\n     \
    \   ^\nSyntaxError: unexpected EOF while parsing\n```\n\n### 2. 跳过代码执行\n\n`pass`\
    \ 可用于在某些情况下跳过代码执行。\n\n例如，\n\n# 代码\n\n```\nl = [2, 3, 4, 5, 6]\nfor i in l:\n \
    \   if i%3 == 0:\n        pass\n    else:\n        print(i, \"is not divisible\
    \ by 3\")\n```\n\n# 输出\n\n```\n2 is not divisible by 3\n4 is not divisible by\
    \ 3\n5 is not divisible by 3\n```\n\n### 3. 占位符\n\n`pass` 可用于创建有效的空函数和类作为占位符，这些占位符可以在代码的未来版本中修改。\n\
    \n```\ndef emptyFunction():\n    pass\n\nclass EmptyClass:\n    pass\n```\n\n\
    ## break\n\n`break` 语句用于终止立即包含的 `for` 或 `while` 语句的执行。\n\n以下代码将在 `i` 等于 `4` 时终止\
    \ `for` 循环\n\n```\nfor i in range(10):\n    print(i)\n    if i == 4:\n       \
    \ break\n```\n\n```\n0\n1\n2\n3\n4\n```\n\n在 while 语句中，\n\n```\ni =0\nwhile i\
    \ <10:\n    print(i)\n    if i == 4:\n        break\n    i+=1\n```\n\n当 i 等于 4\
    \ 时，break 将终止 while 循环\n\n```\n0\n1\n2\n3\n4\n```\n\n## continue\n\ncontinue 语句用于跳过后续语句的执行并开始下一次迭代。\n\
    以下代码将跳过所有工作经验少于 4 年的面试候选人。\n\n```\npeople =  [{\"name\": \"ABC\", \"experience\"\
    : 6},\n           {\"name\": \"EFG\", \"experience\": 2},\n           {\"name\"\
    : \"JKL\", \"experience\": 5},\n           {\"name\": \"XYZ\", \"experience\"\
    : 3},]\nfor candidate in people:\n    if candidate[\"experience\"]<4:\n      \
    \  continue\n    print(candidate[\"name\"], \"is selected for interview\")\n```\n\
    \n输出：\n```\nABC is selected for interview\nJKL is selected for interview\n```\n\
