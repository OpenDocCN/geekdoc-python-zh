    # Mutable & Immutable Data Types


    # Immutable Data Types


    A data type is said to be immutable when the value of an object of that type cannot
    be modified.

    The following data types are immutable:


    +   - `int`

    - `float`

    - `complex`

    - `bool`

    - `tuple`

    - `str`

    - `None`


    You might be wondering if some of the above types are immutable then how are we
    able modify the values of variables?

    In case of variable re-assignment, the original objects are not modified, but
    new objects (with new values) are created in a new memory location and are bound
    to the variables. The object containing the old value is destroyed if no other
    variable references it.

    Let us take an example,


    ```

    >>> a = 1

    >>> id_a = id(a)

    >>> a = 2

    ```'
