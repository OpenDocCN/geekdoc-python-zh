    and assigns the result to that variable.


    ```

    >>> a = 4

    >>> a **= 2

    >>> a

    16

    ```


    %=


    The `%=` operator computes modulus of the variable (left operand) and a value
    (right operand) and assigns the result to that variable.


    ```

    >>> a = 4

    >>> a %= 3

    >>> a

    1

    ```


    # Logical Operators


    Expressions using logical operators evaluate to a boolean value ( `True` or `False`
    ) based on the logical state of the operands.


    # Logical State of Operands


    In Python, all values except `0` , `None` , `False` , `""` , `''''` , `()` , `[]`
    , `{}` have their logical state as `True` .


    `bool()` built-in function can be used to determine the logical state of literals,
    variables or expressions.


    The logical state of the following literals is `False` .


    ```

    >>> bool(False)

    False

    >>> bool(0)

    False

    >>> bool([])

    False

    >>> bool(None)

    False

    ```'
  - '[PAGE 46]


    ```

    >>> bool("")

    False

    >>> bool([])

    False

    >>> bool(())

    False

    >>> bool({})

    False

    ```


    Some example literals having boolean state as `True` are provided below.


    ```

    >>> bool(True)

    True

    >>> bool(1)

    True

    >>> bool(2.0)

    True

    >>> bool(100)

    True

    >>> bool("python")

    True

    >>> bool(["py", "thon"])

    True

    ```


    # not


    The logical state of an operand can be reversed (`False` to `True`, and vice versa)
    using the logical `not` operator.


    ```

    >>> n = 5

    >>> bool(n)

    True

    >>> bool(not n)

    False

    ```


    # or


    The logical `or` operator returns `True` if the logical state of any of the two
    operands is `True`.


    ```

    >>> True or False

    True

    >>> bool(1 or 0)

    True

    >>> False or False

    False

    ```


    # and


    The logical `and` operator returns `True` if the logical state of both the operands
    is `True`.


    ```

    >>> True and True

    True

    >>> True and False

    False

    >>> bool(10 and 20)

    True

    >>> bool(1 and 0)

    False

    ```'
  - '[PAGE 47]


    # Identity Operators


    We have already witnessed how Python treats every value or data item as an object.

    The relational operator `==` can be used to test whether the operands contain
    the same value.


    ```

    >>> n = 1

    >>> n2 = 1

    >>> n == n2

    True

    ```


    This operator however does not check if both the operands are referring to the
    same object or different objects.

    The identity operators `is` and `is not` are used to test whether two objects
    have the same or different identity (pointing to the same location in memory)
    respectively.

    `a is b` is equivalent to `id(a) == id(b)`, where `id()` is the built-in function
    which returns the identity of an object.


    ```

    >>> n = 1

    >>> n2 = 1

    >>> n is n2

    True

    ```


    In the above example, both variables `n` and `n2` point to that same memory location
    (same object).


    ```

    >>> l = [1, 2, 3]

    >>> l2 = [1, 2, 3]

    >>> l == l2

    True

    >>> l is l2

    False

    ```


    In the above example, both lists `l` and `l2` although contain items with same
    values, are actually two different objects occupying different memory locations.


    # Membership Operators


    The operators `in` and `not in` test whether a value is present or not present
    in an iterable (string, list, tuple, set, dictionary).


    ```

    >>> 1 in [1, 2, 3]

    True

    >>> "ed" in ["ed", "py", "hi"]

    True

    >>> "ed" in ("ed", "py", "hi")

    True

    >>> ''ed'' in {''ed'': 1, ''py'': 2}

    True

    >>> "pen" not in ["pencil", "ink"]

    True

    >>> "pen" not in ["pen", "ink"]

    False

    ```


    # Expressions


    Literals (constants), identifiers (variables) and operators can be combined to
    form an expression which always evaluates to a single value.'
  - '[PAGE 48]


    For example, `40 + marks` is an expression containing a literal (`40`), a variable
    (`marks`) and an operator (`+`).


    Some valid expressions are provided below:


    +   - `10`

    - `a`

    - `-a`

    - `a - 10`

    - `a + b`

    - `4.0 * 3.5`

    - `a == b`

    - `c in d`

    - `a is T`

    - `"Hello" + "World"`

    - `15 - a*4`

    - `3*num + 9/4 - 10%count**2`


    As shown above, standalone literals (like `10`) and variables (like `a`) are considered
    as expressions, but standalone operators are not expressions.


    # Chained Expression


    Comparison operators can be chained together in Python.


    For example, `lower <= age <= upper` is a valid chained expression which is equivalent
    to the expression -


    ```

    lower <= age and age <= upper

    ```


    If `a`, `b`, `c`, ..., `y`, `z` are expressions and `op1`, `op2`, ..., `opN` are
    comparison operators, then the chained expression `a op1 b op2 c ... y opN z`
    is equivalent to `a op1 b and b op2 c and ... y opN z`.


    # Conditional Expression


    Python does not have ternary operators (`?:`) like other programming languages.
    Hence, the keywords `if` and `else` are used to create conditional expressions
    which evaluates to a value based on the given condition.


    For example,


    ```

    var = t_val if cond else f_val

    ```


    If the above condition `cond` evaluates to `True`, then the variable `var` is
    assigned `t_val`, else it is assigned `f_val`.


    ```

    >>> value = 1 if 2 > 3 else -1

    >>> value

    -1

    ```


    # Operator Precedence with Examples


    While studying mathematics in middle school, we came across the **BODMAS** (Bracket,
    Of, Division, Multiplication, Addition, and Subtraction) rule which helps us in
    understanding how mathematical expressions are computed in the presence of multiple
    operators (`of`, `x`, `/`, `+`, `-`).'
  - '[PAGE 49]


    In Python, we have a large number of operators and a similar rule to determine
    the order of evaluation of an expression. This is known as **operator precedence**
    where the operator with higher precedence is evaluated before the operator with
    lower precedence in an expression.


    The table below presents the precedence of operators in Python from highest to
    lowest. Operators in the same row have the same precedence, so in such cases the
    expression is evaluated from left to right.


    | Operator | Description |

    |---|---|

    | `(expressions...)` | Parenthesized expression (Group) |

    | `**` | Exponentiation |

    | `+x`, `-x`, `~x` | Unary positive, Unary negative, Bitwise NOT |

    | `*`, `@`, `/`, `//`, `%` | Multiplication, Matrix multiplication, Division,
    Floor division, Remainder |

    | `+`, `-` | Addition, Subtraction |

    | `<<`, `>>` | Shifts |

    | `&` | Bitwise AND |

    | `^` | Bitwise XOR |

    | `|` | Bitwise OR |

    | `in`, `not in`, `is`, `is not`, `<`, `<=`, `>`, `>=`, `!=`, `==` | Membership,
    Identity & Comparisons |

    | `not x` | Boolean NOT |

    | `and` | Boolean AND |

    | `or` | Boolean OR |

    | `:=` | Assignment expression |


    # Exercises


    # Example 1


    Evaluate the expression


    ```

    15 - 2 * 4

    ```


    # Solution


    Step: `*` has higher precedence over `-`


    ```

    15 - 2 * 4

    = 15 - 8

    = 7

    ```


    # Example 2


    Evaluate the expression


    ```

    15 - 2 + 4

    ```


    # Solution


    Step: `-` and `+` have the same order of precedence so the expression is evaluated
    left to right


    ```

    15 - 2 + 4

    = 13 + 4

    = 17

    ```


    # Example 3


    Evaluate the expression


    ```

    15 - (2 + 4)

    ```


    # Solution'
  - '[PAGE 50]


    Parantesized expression `(...)` has the highest precedence so `+` is evaluated
    first


    ```

    15 - (2 + 4)

    = 15 - 6

    = 9

    ```


    # Example 4


    Evaluate the expression


    ```

    3 * 2 + 9 / 4 - 10 % 2 ** 2

    ```


    # Step 1


    `**` takes precedence


    ```

    3 * 2 + 9 / 4 - 10 % 2 ** 2

    = 3 * 2 + 9 / 4 - 10 % 4

    ```


    # Step 2


    `*`, `/` and `%` have the same precedence so they are evaluated left to right.


    ```

    3 * 2 + 9 / 4 - 10 % 4

    = 6 + 2.25 - 2

    ```


    # Step 3


    `+` and `-` evaluation


    ```

    6 + 2.25 - 2

    = 6.25

    ```


    # Example 5


    Evaluate the expression


    ```

    20 / 4 // 2 * 2 - 4 + 20

    ```


    # Step 1


    `*`, `/`, `//` and `%` have the same precedence so they are evaluated left to
    right.


    ```

    20 / 4 // 2 * 2 - 4 + 20

    = 5 // 2 * 2 - 4 + 20

    = 2 * 2 - 4 + 20

    = 4 - 4 + 20

    ```


    # Step 2


    `+` and `-` evaluation


    ```

    4 - 4 + 20

    = 20

    ```


    # Example 6


    Evaluate the expression


    ```

    not 6 <= 4 and 3 ** 3 > 12 / 3

    ```


    # Step 1'
  - '[PAGE 51]


    / is next in line of precedence


    ```

    not 6 <= 4 and 27 > 12 / 3

    = not 6 <= 4 and 27 > 4

    ```


    # Step 3


    Comparison operators are next in line of precedence


    ```

    not 6 <= 4 and 27 > 4

    = not False and True

    ```


    # Step 4


    Boolean NOT is evaluated


    ```

    not False and True

    = True and True

    ```


    # Step 5


    Boolean AND is evaluated


    ```

    True and True

    = True

    ```'
- md: "## Errors & Exception Handling\n\n### Error Types\n\nA program contains \"\
    bug(s)\" when it is unable to execute or produces an output which is different\
    \ from what is expected. These bugs are generally introduced by a programmer unknowingly.\n\
    \nThe process of identifying and eliminating these bugs or errors is known as\
    \ **debugging**.\n\nThe three major types of errors are:\n\n- Syntax Error\n-\
    \ Runtime Error\n- Logical Error\n\n### Syntax Error\n\nSyntax error occurs when\
    \ the program contains any statement that does not follow the prescribed Python\
    \ rules or syntax which makes it difficult for the Python interpreter to parse\
    \ (understand) and execute it.\n\nSome common syntax errors are:\n\n- Missing/Misspelled\
    \ keyword\n- Missing colon or brackets\n- Empty block\n- Incorrect position of\
    \ keyword\n- Incorrect block indentation\n\n### Script Mode\n\nWhen a code containing\
    \ syntactically incorrect statement is executed using script mode via IDLE, an\
    \ error dialog box is displayed.\n\n![](img/84256b7fa80e08517c2c7cbb96a2913c_53_0.png)\n\
    \nSyntax Error Dialog\n\nOn closing the dialog box, the incorrect part of the\
    \ code, the potential cause of error, is highlighted in red.\n\n![](img/84256b7fa80e08517c2c7cbb96a2913c_54_0.png)\n\
    \nSyntax Error Highlighted\n\nThis error has to be rectified to execute the program\
    \ correctly.\n\n### Interactive Mode\n\nWhen a syntactically incorrect statement\
    \ is executed in the Python console (interactive mode), the Python interpreter\
    \ displays it and also adds a little arrow ( ^ ) pointing at the entry point or\
    \ token where the error was detected.\n\n### Example\n\n```\n>>> while True print('Hi!')\n\
    \  File \"<stdin>\", line 1\n    while True print('Hi!')\n          ^\nSyntaxError:\
    \ invalid syntax\n```\n\nIn the above example there is a syntax error with ^ pointing\
    \ to print function which the parser is unable to understand as there is a missing\
    \ : (colon) after True .\n\n### Runtime Error\n\nA runtime error occurs when the\
    \ program is terminated prematurely by the Python interpreter as it is unable\
    \ to execute a statement although it is correct syntactically.\n\nSome runtime\
    \ error examples are:\n\n- **ImportError**: Raised when the import statement has\
    \ trouble loading a module or any definition from a module.\n- **IOError**: Raised\
    \ when the interpreter is not able to open the file specified in the program.\n\
    - **ZeroDivisionError**: Raised when a number is divided or mod by zero.\n- **NameError**:\
    \ Raised when an identifier is encountered which has not been defined.\n- **ValueError**:\
    \ Raised when an argument or operand is of required data type, but has undesired\
    \ value.\n- **IndexError**: Raised when the provided index in a sequence (string,\
    \ list, tuple, etc.) is out of range.\n- **KeyError**: Raised when a dictionary\
    \ key is not found in the set of existing keys.\n- **TypeError**: Raised while\
    \ performing an operation on incompatible types.\n- **IndentationError**: Raised\
    \ when the indentation of a statement or code block is incorrect.\n\n### Runtime\
    \ Error Examples\n\n**ZeroDivisionError**\n\n```\nn = 100\nd = 0\nprint(n/d)\n\
    ```\n\n```\nTraceback (most recent call last):\n  File \"/Users/name/Desktop/test.py\"\
    , line 3, in <module>\n    print(n/d)\nZeroDivisionError: division by zero\n```\n\
    \n**NameError**\n\n```\nn = 100\nprint(d)\n```\n\n```\nTraceback (most recent\
    \ call last):\n  File \"/Users/name/Desktop/test.py\", line 2, in <module>\n \
    \   print(d)\nNameError: name 'd' is not defined\n```\n\n**KeyError**\n\n```\n\
    d = {1: \"1st\", 2: \"2nd\"}\nprint(d[3])\n```\n\n```\nTraceback (most recent\
    \ call last):\n  File \"/Users/name/Desktop/test.py\", line 2, in <module>\n \
    \   print(d[3])\nKeyError: 3\n```\n\n**TypeError**\n\n```\nn =1\ns = \"a\"\ntot\
    \ = n + s\n```\n\n```\nTraceback (most recent call last):\n  File \"/Users/name/Desktop/test.py\"\
    , line 3, in <module>\n    tot = n + s\nTypeError: unsupported operand type(s)\
    \ for +: 'int' and 'str'\n```\n\n### Logical Error\n\nLogical error or Semantic\
    \ error is caused when the issue lies in the underlying meaning of the code which\
    \ leads to an incorrect output.\n\nAs compared to syntax or runtime error there\
    \ is no termination of the program.\n\nDebugging a logical error requires inspection\
    \ of the entire code as no guiding error message is displayed.\n\n**Example**\n\
    \nLet us write a program to calculate the average of two numbers\n\n```\nn = 10\n\
    m = 20\navg = n + m / 2\nprint(\"Average:\", avg)\n```\n\nOn executing the script\
    \ the result is\n\nAverage: 20.0\n\nThis is incorrect as there is a logical error\
    \ in the code.\n\nSince `/` has a higher precedence over `+`, `m / 2` is being\
    \ computed first.\n\nWe can modify the code to get rid of the logical error.\n\
    \n```\nn = 10\nm = 20\navg = (n + m) / 2\nprint(\"Average:\", avg)\n```\n\nOn\
    \ executing the script, we now obtain the correct result\n\nAverage: 15.0\n\n\
    ### Exceptions\n\nWe have witnessed that even if a program is syntactically correct,\
    \ its execution may lead to a run-time error.\n\nThis error detected during execution\
    \ is known as an **exception** which is an object created by the Python interpreter\
    \ containing information regarding the error like type of error, file name and\
    \ the location of the error (line number, token) in the program.\n\nSome of the\
    \ built-in exceptions that are raised by the Python interpreter are - `ImportError`,\
    \ `ZeroDivisionError`, `NameError`, `ValueError`, `IndexError`, `KeyError`, `TypeError`\
    \ and `IndentationError`.\n\nApart from the Python interpreter, a programmer can\
    \ also trigger and raise an exception (along with a custom message) in the code\
    \ using `raise` or `assert` statement.\n\n### raise\n\nThe `raise` statement can\
    \ be used to throw an exception in a program. The exception may or may not contain\
    \ the custom error message (recommended).\n\nLet us consider a program which accepts\
    \ two numbers (`a` and `b`) from the user and prints the result `a/b`.\n\n**Code**\n\
    \n```\na = int(input(\"Enter a: \"))\nb = int(input(\"Enter b: \"))\nprint(\"\
    a/b =\", a/b)\n```\n\n**Output**\n\n```\nEnter a: 10\nEnter b: 0\nTraceback (most\
    \ recent call last):\n  File \"/Users/name/test.py\",\n    line 3, in <module>\n\
    \      print(\"a/b =\", a/b)\nZeroDivisionError: division by zero\n```\n\nIt can\
    \ be observed that the Python interpreter raises a `ZeroDivisionError` when the\
    \ value of `b` is entered as `0`.\n\n**Code**\n\n```\na = int(input(\"Enter a:\
    \ \"))\nb = int(input(\"Enter b: \"))\nif b==0:\n    raise Exception()\nprint(\"\
    a/b =\", a/b)\n```\n\n**Output**\n\n```\nEnter a: 10\nEnter b: 0\nTraceback (most\
    \ recent call last):\n  File \"/Users/name/test.py\",\n    line 4, in <module>\n\
    \      raise Exception()\nException\n```\n\nAn exception is raised, but it is\
    \ not helpful.\n\nLet us add some custom error message.\n\n**Code**\n\n```\na\
    \ = int(input(\"Enter a: \"))\nb = int(input(\"Enter b: \"))\nif b==0:\n    raise\
    \ Exception(\"b is zero\")\nprint(\"a/b =\", a/b)\n```\n\n**Output**\n\n```\n\
    Enter a: 10\nEnter b: 0\nTraceback (most recent call last):\n  File \"/Users/name/test.py\"\
    ,\n    line 4, in <module>\n      raise Exception(\"b is zero\")\nException: b\
    \ is zero\n```\n\nWe can also raise any specific type of error as per the program\
    \ logic as shown below:\n\n**Code**\n\n```\na = int(input(\"Enter a: \"))\nb =\
    \ int(input(\"Enter b: \"))\nif b==0:\n    raise ValueError(\"The value of b cannot\
    \ be zero\")\nprint(\"a/b =\", a/b)\n```\n\n**Output**\n\n```\nEnter a: 10\nEnter\
    \ b: 0\nTraceback (most recent call last):\n  File \"/Users/name/test.py\",\n\
    \    line 4, in <module>\n      raise ValueError(\"The value of b cannot be zero\"\
    )\nValueError: The value of b cannot be zero\n```\n\n### assert\n\nAn `assert`\
    \ statement is often used during code development to act like a safety valve which\
    \ notifies the programmer in case the test expression is evaluated as `False`.\n\
    \nIf the test expression's value is `True`, the code execution continues normally.\n\
    \nAn `AssertionError` is raised if the value is `False`.\n\n**Code**\n\n```\n\
    a = 3\nb = 4\nassert a == b\nc = 5\n```\n\n**Output**\n\n```\nTraceback (most\
    \ recent call last):\n  File \"/Users/name/test.py\",\n    line 3, in <module>\n\
    \      assert a == b\nAssertionError\n```\n\nThe statement also allows for a message\
    \ to be attached to the `AssertionError`.\n\n**Code**\n\n```\na = 3\nb = 4\nassert\
    \ a == b, \"a is not equal to b\"\nc = 5\n```\n\n**Output**\n\n```\nTraceback\
    \ (most recent call last):\n  File \"/Users/name/test.py\",\n    line 3, in <module>\n\
    \      assert a == b, \"a is not equal to b\"\nAssertionError: a is not equal\
    \ to b\n```\n\n### Exception Handling\n\nException handling is the process of\
    \ properly handling an exception which can potentially crash a program during\
    \ execution.\n\nWhen an error occurs, the program throws an exception.\n\nThe\
    \ runtime system attempts to find an **exception handler**, a block of code that\
    \ can handle a particular type of error. Once located, the suitable exception\
    \ handler **catches the exception** and executes the code block which can attempt\
    \ to recover from the error. In case the error is unrecoverable, the handler provides\
    \ a way to gently exit the program.\n\nThe `try` statement in Python specifies\
    \ the exception handlers and/or cleanup code for a code block.\n\nThe various\
    \ parts of a try statement are:\n\n- `try` block: The block of statements within\
    \ which an exception might be thrown.\n- `except` clause(s): One or more exception\
    \ handlers. Each `except` clause handles a particular type of exception. In case\
    \ an exception of a particular type occurs in the `try` block, the corresponding\
    \ `except` clause code block is executed."
  mdcn: "## 错误与异常处理\n\n### 错误类型\n\n当程序无法执行或产生与预期不同的输出时，就说明程序中存在“缺陷”。这些缺陷通常是由程序员无意中引入的。\n\
    \n识别和消除这些缺陷或错误的过程被称为**调试**。\n\n三种主要的错误类型是：\n\n- 语法错误\n- 运行时错误\n- 逻辑错误\n\n### 语法错误\n\
    \n当程序包含任何不符合规定的 Python 规则或语法的语句时，就会发生语法错误，这使得 Python 解释器难以解析（理解）和执行它。\n\n一些常见的语法错误包括：\n\
    \n- 缺失/拼写错误的关键字\n- 缺少冒号或括号\n- 空代码块\n- 关键字位置不正确\n- 代码块缩进不正确\n\n### 脚本模式\n\n当通过\
    \ IDLE 使用脚本模式执行包含语法错误语句的代码时，会显示一个错误对话框。\n\n![](img/84256b7fa80e08517c2c7cbb96a2913c_53_0.png)\n\
    \n语法错误对话框\n\n关闭对话框后，代码中错误的部分（即错误的潜在原因）会以红色高亮显示。\n\n![](img/84256b7fa80e08517c2c7cbb96a2913c_54_0.png)\n\
    \n语法错误高亮显示\n\n必须纠正此错误才能正确执行程序。\n\n### 交互模式\n\n当在 Python 控制台（交互模式）中执行语法错误的语句时，Python\
    \ 解释器会显示该语句，并添加一个小箭头（ ^ ）指向检测到错误的入口点或标记。\n\n### 示例\n\n```\n>>> while True print('Hi!')\n\
    \  File \"<stdin>\", line 1\n    while True print('Hi!')\n          ^\nSyntaxError:\
    \ invalid syntax\n```\n\n在上面的示例中，存在一个语法错误，^ 指向 print 函数，解析器无法理解它，因为在 True 之后缺少一个\
    \ :（冒号）。\n\n### 运行时错误\n\n当程序被 Python 解释器过早终止时，就会发生运行时错误，因为尽管语句在语法上是正确的，但解释器无法执行它。\n\
    \n一些运行时错误示例包括：\n\n- **ImportError**：当 import 语句在加载模块或模块中的任何定义时遇到问题时引发。\n- **IOError**：当解释器无法打开程序中指定的文件时引发。\n\
    - **ZeroDivisionError**：当数字被零除或取模时引发。\n- **NameError**：当遇到未定义的标识符时引发。\n- **ValueError**：当参数或操作数具有所需的数据类型，但值不符合要求时引发。\n\
    - **IndexError**：当序列（字符串、列表、元组等）中提供的索引超出范围时引发。\n- **KeyError**：当在现有键集中找不到字典键时引发。\n\
    - **TypeError**：在对不兼容的类型执行操作时引发。\n- **IndentationError**：当语句或代码块的缩进不正确时引发。\n\n\
    ### 运行时错误示例\n\n**ZeroDivisionError**\n\n```\nn = 100\nd = 0\nprint(n/d)\n```\n\
    \n```\nTraceback (most recent call last):\n  File \"/Users/name/Desktop/test.py\"\
    , line 3, in <module>\n    print(n/d)\nZeroDivisionError: division by zero\n```\n\
    \n**NameError**\n\n```\nn = 100\nprint(d)\n```\n\n```\nTraceback (most recent\
    \ call last):\n  File \"/Users/name/Desktop/test.py\", line 2, in <module>\n \
    \   print(d)\nNameError: name 'd' is not defined\n```\n\n**KeyError**\n\n```\n\
    d = {1: \"1st\", 2: \"2nd\"}\nprint(d[3])\n```\n\n```\nTraceback (most recent\
    \ call last):\n  File \"/Users/name/Desktop/test.py\", line 2, in <module>\n \
    \   print(d[3])\nKeyError: 3\n```\n\n**TypeError**\n\n```\nn =1\ns = \"a\"\ntot\
    \ = n + s\n```\n\n```\nTraceback (most recent call last):\n  File \"/Users/name/Desktop/test.py\"\
    , line 3, in <module>\n    tot = n + s\nTypeError: unsupported operand type(s)\
    \ for +: 'int' and 'str'\n```\n\n### 逻辑错误\n\n逻辑错误或语义错误是由于代码的底层含义存在问题，导致输出不正确而引起的。\n\
    \n与语法或运行时错误相比，程序不会终止。\n\n调试逻辑错误需要检查整个代码，因为不会显示指导性的错误消息。\n\n**示例**\n\n让我们编写一个程序来计算两个数字的平均值。\n\
    \n```\nn = 10\nm = 20\navg = n + m / 2\nprint(\"Average:\", avg)\n```\n\n执行脚本后，结果是\n\
    \nAverage: 20.0\n\n这是不正确的，因为代码中存在逻辑错误。\n\n由于 `/` 的优先级高于 `+`，因此先计算 `m / 2`。\n\n\
    我们可以修改代码以消除逻辑错误。\n\n```\nn = 10\nm = 20\navg = (n + m) / 2\nprint(\"Average:\"\
    , avg)\n```\n\n执行脚本后，我们现在得到正确的结果\n\nAverage: 15.0\n\n### 异常\n\n我们已经看到，即使程序在语法上是正确的，其执行也可能导致运行时错误。\n\
    \n在执行期间检测到的错误被称为**异常**，它是由 Python 解释器创建的一个对象，包含有关错误的信息，如错误类型、文件名以及程序中错误的位置（行号、标记）。\n\
    \nPython 解释器引发的一些内置异常包括 - `ImportError`、`ZeroDivisionError`、`NameError`、`ValueError`、`IndexError`、`KeyError`、`TypeError`\
    \ 和 `IndentationError`。\n\n除了 Python 解释器，程序员也可以在代码中使用 `raise` 或 `assert` 语句来触发和引发异常（并附带自定义消息）。\n\
    \n### raise\n\n`raise` 语句可用于在程序中抛出异常。该异常可以包含也可以不包含自定义错误消息（推荐包含）。\n\n让我们考虑一个程序，它从用户那里接受两个数字（`a`\
    \ 和 `b`）并打印结果 `a/b`。\n\n**代码**\n\n```\na = int(input(\"Enter a: \"))\nb = int(input(\"\
    Enter b: \"))\nprint(\"a/b =\", a/b)\n```\n\n**输出**\n\n```\nEnter a: 10\nEnter\
    \ b: 0\nTraceback (most recent call last):\n  File \"/Users/name/test.py\",\n\
    \    line 3, in <module>\n      print(\"a/b =\", a/b)\nZeroDivisionError: division\
    \ by zero\n```\n\n可以观察到，当 `b` 的值输入为 `0` 时，Python 解释器会引发 `ZeroDivisionError`。\n\
    \n**代码**\n\n```\na = int(input(\"Enter a: \"))\nb = int(input(\"Enter b: \"))\n\
    if b==0:\n    raise Exception()\nprint(\"a/b =\", a/b)\n```\n\n**输出**\n\n```\n\
    Enter a: 10\nEnter b: 0\nTraceback (most recent call last):\n  File \"/Users/name/test.py\"\
    ,\n    line 4, in <module>\n      raise Exception()\nException\n```\n\n引发了一个异常，但它没有提供有用的信息。\n\
    \n让我们添加一些自定义错误消息。\n\n**代码**\n\n```\na = int(input(\"Enter a: \"))\nb = int(input(\"\
    Enter b: \"))\nif b==0:\n    raise Exception(\"b is zero\")\nprint(\"a/b =\",\
    \ a/b)\n```\n\n**输出**\n\n```\nEnter a: 10\nEnter b: 0\nTraceback (most recent\
    \ call last):\n  File \"/Users/name/test.py\",\n    line 4, in <module>\n    \
    \  raise Exception(\"b is zero\")\nException: b is zero\n```\n\n我们也可以根据程序逻辑引发任何特定类型的错误，如下所示：\n\
    \n**代码**\n\n```\na = int(input(\"Enter a: \"))\nb = int(input(\"Enter b: \"))\n\
    if b==0:\n    raise ValueError(\"The value of b cannot be zero\")\nprint(\"a/b\
    \ =\", a/b)\n```\n\n**输出**\n\n```\nEnter a: 10\nEnter b: 0\nTraceback (most recent\
    \ call last):\n  File \"/Users/name/test.py\",\n    line 4, in <module>\n    \
    \  raise ValueError(\"The value of b cannot be zero\")\nValueError: The value\
    \ of b cannot be zero\n```\n\n### assert\n\n`assert` 语句通常在代码开发期间用作安全阀，当测试表达式求值为\
    \ `False` 时通知程序员。\n\n如果测试表达式的值为 `True`，则代码执行正常继续。\n\n如果值为 `False`，则会引发 `AssertionError`。\n\
    \n**代码**\n\n```\na = 3\nb = 4\nassert a == b\nc = 5\n```\n\n**输出**\n\n```\nTraceback\
    \ (most recent call last):\n  File \"/Users/name/test.py\",\n    line 3, in <module>\n\
    \      assert a == b\nAssertionError\n```\n\n该语句还允许将消息附加到 `AssertionError`。\n\n\
    **代码**\n\n```\na = 3\nb = 4\nassert a == b, \"a is not equal to b\"\nc = 5\n```\n\
    \n**输出**\n\n```\nTraceback (most recent call last):\n  File \"/Users/name/test.py\"\
    ,\n    line 3, in <module>\n      assert a == b, \"a is not equal to b\"\nAssertionError:\
    \ a is not equal to b\n```\n\n### 异常处理\n\n异常处理是正确处理可能在执行期间导致程序崩溃的异常的过程。\n\n当发生错误时，程序会抛出一个异常。\n\
    \n运行时系统尝试查找一个**异常处理程序**，即一段可以处理特定类型错误的代码块。一旦找到，合适的异常处理程序就会**捕获异常**并执行可以尝试从错误中恢复的代码块。如果错误不可恢复，处理程序提供一种方式让程序优雅地退出。\n\
    \nPython 中的 `try` 语句为代码块指定异常处理程序和/或清理代码。\n\ntry 语句的各个部分是：\n\n- `try` 块：可能抛出异常的语句块。\n\
    - `except` 子句：一个或多个异常处理程序。每个 `except` 子句处理特定类型的异常。如果在 `try` 块中发生特定类型的异常，则执行相应的\
    \ `except` 子句代码块。"
