    # Type Checking


    The built-in `type()` function can be used to fetch the data type of an object.


    Examples:


    ```

    >>> count = 100

    >>> type(count)

    <class ''int''>


    >>> pi = 3.141

    >>> type(pi)

    <class ''float''>


    >>> name = "Python"

    >>> type(name)

    <class ''str''>

    ```


    This function can be used along with the `is` operator in an expression to test
    whether the object is of the given type.


    ```

    >>> count = 100

    >>> type(count) is int

    True

    ```


    The `in` operator can be used along with the `type()` function to test if the
    data type is one of the mentioned types.


    ```

    # count is of type int or float

    >>> type(count) in (int, float)

    True

    ```


    # Type Casting


    The process of converting the data type of an object from one type to another
    is known as **Type Casting** or **Type Conversion**.


    The two kinds of type casting supported in Python are:


    # Implicit Type Casting


    The Python interpreter automatically converts the data type without the need of
    user intervention when evaluating expressions to determine the final data type.


    In the below example the final type of `c` is automatically determined as `float`
    by the Python interpreter.


    ```

    >>> a = 1   # int

    >>> b = 2.0 # float

    >>> c = a + b

    >>> c

    3.0

    >>> type(c)

    <class ''float''>

    ```'
