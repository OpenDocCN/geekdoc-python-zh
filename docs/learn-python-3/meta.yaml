    # Accessing Modules


    A module can be accessed in a program using the `import` statement.


    ```

    >>> import math

    ```


    The above `import` statement loads all the functions available in the `math` module.
    To access any function in the module, simply type the module name followed by
    a period ( `.` ), followed by the function name.


    ```

    >>> import math

    >>> math.pow(3, 2)

    9.0

    ```


    Instead of loading all the functions in a module, the `from` statement can be
    used to access only specified functions.


    ```

    >>> from math import pow

    >>> pow(3, 2)

    9.0

    ```


