    \ used to specify a function which is called on each list element prior to making\
    \ the comparisons.\n- `reverse` is a boolean which specifies whether the list\
    \ is to be sorted in descending order.\n\n```\n>>> l = [34, 4, 6, 23]\n>>> l.sort()\n\
    >>> l\n[4, 6, 23, 34]\n\n>>> l = [34, 4, 6, 23]\n>>> l.sort(reverse=True)\n>>>\
    \ l\n[34, 23, 6, 4]\n\n>>> l = [\"Oh\", \"Hi\", \"Py\", \"ed\"]\n>>> l.sort()\n\
    >>> l\n['Hi', 'Oh', 'Py', 'ed']\n\n>>> l = [\"Oh\", \"Hi\", \"Py\", \"ed\"]\n\
    # lowercase the words before sorting\n>>> l.sort(key=str.lower)\n>>> l\n['ed',\
    \ 'Hi', 'Oh', 'Py']\n```\n\nIf you do not wish to modify the existing list and\
    \ create a new list with sorted items in, use the built-in `sorted()` function\
    \ which returns a new sorted list.\n\n```\n>>> l = [34, 4, 6, 23]\n>>> new_l =\
    \ sorted(l)\n>>> new_l\n[4, 6, 23, 34]\n```\n\n## Copying a List\n\nIn Python,\
    \ we can create an object (data) and bind its reference to a variable using the\
    \ assignment operator ( = ).\n\nAs multiple collections or items in collections\
    \ can point to the same mutable object, a copy is required so one can change one\
    \ copy without changing the other.\n\nLet us take an example:\n\n```\n>>> old_l\
    \ = [1, 2, 3]\n\n# Copying old list into a new list\n>>> new_l = old_l\n\n# Checking\
