    ```\n\n用户输入可以使用类型转换函数 `int()` 和 `float()` 转换为整数或浮点数。\n\n```\n>>> num = int(input(\"\
    Enter n: \"))\nEnter n: 10\n>>> type(num)\n<class 'int'>\n>>> num\n10\n\n>>> pi\
    \ = float(input(\"Enter pi: \"))\nEnter pi: 3.14\n>>> type(pi)\n<class 'float'>\n\
    >>> pi\n3.14\n```\n\n### 显示输出\n\n内置的 `print()` 函数用于在标准输出上显示输出（变量的值、表达式等）。\n\n\
