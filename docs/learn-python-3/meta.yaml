    # # Control Flow


    # ## Introduction to Control Flow


    A simple Python program can be treated as a block of code where each statement
    is executed by the Python interpreter in a sequential order from top to bottom.


    But, in real world we would like to have some control over the execution of code
    such as:


    +   - skip or execute a block (set of statements) based on certain conditions

    - execute a block repeatedly

    - redirect execution to another set of statements

    - breaking up the execution


    This control over the flow of execution is provided by **Control Flow Statements**.


    They can be categorized as:


    +   - Sequential

    - Selection

    - Iteration/Repetition

    - Jump

    - Procedural Abstraction - A sequence of statements are referenced as a single
    function or method call

    - Recursion - Calling a method/function in the same method/function

    - Exception Handling


    # ## Sequential Flow


    By default the code statements in Python are executed in Sequential order.


    The below flow chart demonstrates how 3 statements are executed in a sequential
    order.'
