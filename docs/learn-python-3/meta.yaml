    \ 'Ed', 18: True}\n```\n\n### 带有默认值的键\n\n`dict.fromkeys(iterable[, value])`可用于创建新字典，其中`iterable`的元素作为键，并为这些键分配一个可选的值（默认为`None`）。\n\
    \n```\n>>> l = [\"yr\", \"name\", 18]\n>>> dict.fromkeys(l)\n{'yr': None, 'name':\
    \ None, 18: None}\n>>> dict.fromkeys(l, 0)\n{'yr': 0, 'name': 0, 18: 0}\n```\n\
    \n## 访问字典的元素（键：值）\n\n### 索引运算符 []\n\n`d[x]`可用于访问字典`d`中键`x`对应的值。\n\n```\n>>> d\
