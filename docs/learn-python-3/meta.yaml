    TypeError: 'tuple' object does not support item assignment\n```\n\n# Tuple Operations\n\
    \nWe can perform various operations on a tuple such as membership, concatenation,\
    \ repetition and slicing.\n\n## Membership\n\n`in` and `not in` can be used to\
    \ detect the membership of an item in a tuple.\n\n```python\n>>> t = (\"BMW\"\
    , \"Z4\", 2019,\n...      4, \"Red\", True)\n>>> \"Red\" in t\nTrue\n>>> \"Gold\"\
    \ in t\nFalse\n>>> \"Gold\" not in t\nTrue\n```\n\n## Concatenation\n\n`+` operator\
    \ can be used to join two tuples to create a new tuple.\n\n```python\n>>> t =\
    \ (\"BMW\", \"Z4\")\n>>> u = (2019, \"Red\")\n>>> t+u\n('BMW', 'Z4', 2019, 'Red')\n\
    ```\n\n## Repetition\n\nThe `*` operator creates a new tuple with items of a tuple\
    \ repeated the number of times as specified by the integer operand.\n\n```python\n\
    >>> t = (1, 2)\n>>> t*3\n(1, 2, 1, 2, 1, 2)\n```\n\n## Tuple Slicing\n\nA subset\
    \ of tuple `t` can be obtained using the tuple slice notation given as `t[i:j]`,\
    \ where the item at index `i` is included, but the item at index `j` is excluded.\n\
    \nFor example, the slice notation `[1:4]` refers to items from index `1` to index\
    \ `3` (i.e. `4-1`).\n\n```python\n>>> t = (\"BMW\", \"Z4\", 2019,\n...      4,\
    \ \"Red\", True)\n>>> t[1:4]\n('Z4', 2019, 4)\n```\n\nThe slice notation `t[i:j:k]`\
    \ can also include a third number known as the step. Here, a tuple is sliced from\
    \ start index `i` to end index (`j`) - 1 with a step of `k` items.\n\n```python\n\
    >>> t = (\"BMW\", \"Z4\", 2019,\n...     4, \"Red\", True)\n>>> t[1:4:2]\n('Z4',\
    \ 4)\n```\n\nSlice notations also have some useful defaults.\n\n`0` is the default\
    \ for the first number and size of the tuple is the default for the second number.\n\
    \n```python\n>>> t = (\"BMW\", \"Z4\", 2019,\n...     4, \"Red\", True)\n>>> t[2:]\n\
    (2019, 4, 'Red', True)\n>>> t[:4]\n('BMW', 'Z4', 2019, 4)\n```\n\nSlice notation\
    \ also supports negative indexing.\n\n```python\n>>> t = (\"BMW\", \"Z4\", 2019,\n\
    ...     4, \"Red\", True)\n>>> t[-4:]\n(2019, 4, 'Red', True)\n>>> t[:-2]\n('BMW',\
    \ 'Z4', 2019, 4)\n>>> t[-4:-1]\n(2019, 4, 'Red')\n```\n\n## Traversing a Tuple\n\
    \nTuple Traversal is the process of visiting every item in a tuple, usually from\
    \ the first item to the last item, and executing some instruction on the accessed\
    \ item.\n\nPython provides 2 ways to traverse a tuple:\n\n### Direct Traversal\n\
    \nAs a tuple is an ordered collection of items, the `for` statement can be used\
    \ to directly and sequentially access each item.\n\n#### Code\n\n```python\nt\
    \ = (\"BMW\", \"Z4\", 2019,\n    4, \"Red\", True)\nfor item in t:\n    print(item)\n\
    ```\n\n#### Output\n\n```\nBMW\nZ4\n2019\n4\nRed\nTrue\n```\n\n### Location or\
    \ Index Based Traversal\n\nIn location based or index based traversal the value\
    \ of index starts at `0` and increments as long as it is lesser than the length\
    \ of the tuple.\n\nThis index value can be used to access the item at that index\
    \ in a tuple using the index operator `[]`.\n\n`for` statement can be used to\
