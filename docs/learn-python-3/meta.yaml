  md: '# # List Operations


    We can perform various operations on a list (collection of items) such as membership,
    concatenation, repetition and slicing.


    # ## Membership


    `in` and `not in` can be used to detect the membership of an item in a list.


    ```

    >>> l = ["BMW", "Z4", "Red"]

    >>> "Red" in l

    True

    >>> "Gold" in l

    False

    >>> "Gold" not in l

    True

    ```


    # ## Concatenation


    `+` operator can be used to join two lists to create a new list.


    ```

    >>> l = ["BMW", "Z4"]

    >>> k = [2019, "Red"]

    >>> l + k

    [''BMW'', ''Z4'', 2019, ''Red'']

    ```


    `+=` operator joins two lists and assigns it to the target list.


    ```

    >>> l = ["BMW", "Z4"]

    >>> l += [2019, "Red"]

    >>> l

    [''BMW'', ''Z4'', 2019, ''Red'']

    ```


    # ## Repetition


    The `*` operator repeats the items of a list the number of times as specified
    by the integer operand.


    ```

    >>> l = [1, 2]

    >>> l*3

    [1, 2, 1, 2, 1, 2]

    ```


    # ## Slicing


    A subset of list `l` can be obtained using the list slice notation given as `l[i:j]`,
    where the item at start index `i` is included, but the item at end index `j` is
    excluded.


    For example, the slice notation `[1:4]` refers to items from index `1` to index
    `3` (i.e. `4-1`).


    ```

    >>> l = ["BMW", "Z4", 2019,

    ...     4, "Red", True]

    >>> l[1:4]

    [''Z4'', 2019, 4]

    ```


    The slice notation `l[i:j:k]` can also include a third number known as the stepper.
    Here, a list is sliced from start index `i` to end index (`j`) - 1 with a step
    of `k` items.


    ```

    >>> l = ["BMW", "Z4", 2019,

    ...     4, "Red", True]

    ```'
  merge: -1
  pgno: 89
- img_proc: true
  md: '```

    >>> l[1:4:2]

    [''Z4'', 4]

    ```


    Slice notations also have some useful defaults. 0 is the default for the first
    number and size of the list is the default for the second number.


    ```

    >>> l = ["BMW", "Z4", 2019,

    ...     4, "Red", True]

    >>> l[2:]

    [2019, 4, ''Red'', True]

    >>> l[:4]

    [''BMW'', ''Z4'', 2019, 4]

    ```


    Slice notation also supports negative indexing.


    ```

    >>> l = ["BMW", "Z4", 2019,

    ...     4, "Red", True]

    >>> l[-4:]

    [2019, 4, ''Red'', True]

    >>> l[:-2]

    [''BMW'', ''Z4'', 2019, 4]

    >>> l[-4:-1]

    [2019, 4, ''Red'']

    ```


    Slice notation can be used to replace multiple items in a list.


    ```

    >>> l = ["BMW", "Z4", 2019,

    ...     4, "Red", True]

    >>> l[:2] = ["Kia", "Sonet"]

    >>> l

    [''Kia'', ''Sonet'', 2019, 4, ''Red'', True]


    >>> l = ["BMW", "Z4", 2019,

    ...     4, "Red", True]

    >>> l[1:5:2] = ["Sonet", 2]

    >>> l

    [''BMW'', ''Sonet'', 2019, 2, ''Red'', True]

    ```


    Slice notation can also be used to delete multiple items in a list.


    ```

    >>> l = ["BMW", "Z4", 2019,

    ...     4, "Red", True]

    >>> del l[:2]

    >>> l

    [2019, 4, ''Red'', True]


    >>> l = ["BMW", "Z4", 2019,

    ...     4, "Red", True]

    >>> del l[:5:2]

    >>> l

    [''Z4'', 4, True]

    ```


