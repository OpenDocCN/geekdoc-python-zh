    \ True}\n```\n\n这种方法的一个限制是字典的键只能是字符串类型，并且它们的名称必须在标识符的命名空间内。\n\n### 键和值列表\n\n有时可能需要组合两个列表，其中一个列表包含键，另一个列表包含对应的值。\n\
    \n内置的`zip()`函数对于将两个列表组合成元组对很有用。\n\n可以将压缩后的迭代器作为参数传递给`dict()`以创建新的映射集合。\n\n```\n\
