- md: '## Introduction


    ### Introduction to Programming Languages


    In today’s digital era, we depend on computers, smartphones and the internet to
    perform a plethora of tasks, like:


    - A mathematical task, such as finding the square root of a number or solving
    a set of simultaneous equations.

    - A text-based task such as reading a document and performing search/replace.

    - Streaming and playing multimedia files containing audio and video.

    - Using a search engine to find and visit a website.

    - Playing an online multiplayer game with friends.

    - and many more…


    Software plays an important role as it translates human activity into corresponding
    machine instructions which are executed to accomplish these tasks.


    A **software** is a collection of programs where each program provides a sequence
    of instructions specifying how the computer should act.


    These instructions have to be provided in **machine language** or **low level
    language** (0s and 1s) that is difficult to read or write for a human being.


    This led to the invention of **high-level programming languages** in which programs
    can be easily written and managed. The human-readable programs written using high-level
    languages are converted into computer-readable machine code or bytecode using
    **compilers** or **interpreters**.


    There are many high-level programming languages that are currently in wide use.


    Some of the popular languages are Java, C, C++, C#, Go, Swift, JavaScript, PHP,
    Dart, Kotlin and Python.


    ### Introduction to Python


    Guido van Rossum started the development of Python in December 1989. He released
    the first version (0.9.9) of Python for general public on February 20, 1991.


    The language evolved over the next few decades and so did its definition, the
    current version of which is stated below:


    > Python is a high-level, interpreted, object-oriented programming language with
    dynamic semantics.


    Let us break down and analyze the above definition to gain a better understanding
    of Python:


    #### High-level


    Python is a **high-level programming language** which can be used to write a program
    in natural language (English) making it readable, writable, shareable and manageable.


    While developing a Python program one is not required to handle the various components
    of computer architecture like registers, memory addresses and call stacks which
    have to be handled if an assembly language or a low-level language is used for
    development.


    Python includes high-level language features like variables, data structures (lists,
    dictionaries, etc.), objects, expressions, modules, classes, functions, loops,
    threads, file handling, string handling, error handling and other computer science
    abstraction concepts.


    #### Interpreted


    In traditional programming languages like C or C++, codes are compiled into computer-readable
    machine code before it can be executed.


    Python is an **interpreted language** where the Python interpreter reads and executes
    the program line by line.


    The process is more time consuming compared to compiled code execution, but allows
    faster development as one does not have to go through the entire compilation step
    during testing and debugging. Also, the code can run on any platform as long as
    it has a valid Python installation (which includes interpreter) as there is no
    generation of platform dependent binaries.


    #### Object-oriented


    Python does not enforce **Object-oriented programming (OOP)**, but completely
    supports it.


    A programmer can define Classes specifying the data in the form of attributes
    (or properties) and some programming logic in the form of member functions (or
    methods). Once a class is defined, the user can create an instance of that class
    which is known as an object.


    In Python, everything (`int`, `list`, `dict`, etc.) is an object. We will cover
    more about objects in detail in the later sections.


    #### Dynamic Semantics


    As Python is an interpreted language in which the code is executed line-by-line,
    a Python statement or expression is evaluated during run-time. This allows **dynamic
    typing** (type of a variable can change over its lifetime) and creation of dynamic
    objects during run-time, which provides more flexibility, usability and fewer
    lines of code as compared to statically-typed compiled languages like C/C++.


    ### Advantages of Python


    The key advantages of Python are as follows:


    #### 1. Easy to Learn


    The Python programming language is easy to learn with low technical and conceptual
    overhead. This makes it an ideal language for beginners to learn programming.


    #### 2. Clear Syntax & Fewer Lines of Code


    Python''s simple and easy to learn syntax increases code readability and leads
    to fewer lines of code. A typical task which requires an average of twenty lines
    of code in C and seven in Java can often be done with just one line in Python.


    Also, due to fewer lines of code the chances of making any error is significantly
    reduced.


    #### 3. Open Source


    Python is an open source programming language, so anyone can view and contribute
    to its source code.


    #### 4. Portable & Platform Independent


    The Python programming language is portable & platform independent as it can work
    on any Linux, MacOS or Windows device.


    #### 5. Standard Library & Python Packages


    Python has a rich and extensive Standard Library, a collection of predefined functions
    for various tasks.


    Python programmers also have at their disposal the vast ecosystem of more than
    250,000 community contributed libraries in the Python Package Index (PyPI), where
    one can find a solution to every conceivable task.


    #### 6. Web Application Development


    Some of the most popular web development frameworks (django, flask, etc.) are
    written in Python. This coupled with the availability of packages to connect to
    any database makes Python a great choice for web application development.


    ### Installing Python in Windows


    Let''s start with the Python 3 installation process on Windows operating system.


    #### Step 1: Download Installer


    Download the latest Windows installer from the Python Software Foundation website.


    ![](img/84256b7fa80e08517c2c7cbb96a2913c_7_0.png)


    #### Step 2: Install Python 3


    Once the download is complete double-click and run it.


    ![](img/84256b7fa80e08517c2c7cbb96a2913c_8_0.png)


    Select the checkbox ✅ Add Python 3.9 to PATH. This will enable you to install
    python packages and run python script via command-line.


    Hit 🛡️ Install Now and complete the setup.


    #### Step 3: Verify Installation


    Once the setup is complete, click on the Start menu and open Python 3.9 -> IDLE
    (Python 3.9 64 bit) to launch the Python interpreter.


    ![](img/84256b7fa80e08517c2c7cbb96a2913c_8_1.png)


    Python 3.9 is now successfully installed on your computer.


    ![](img/84256b7fa80e08517c2c7cbb96a2913c_9_0.png)


    ### Installing Python in macOS (Apple)


    Let''s start with the Python 3 installation process on macOS operating system.


    #### Step 1: Download Installer


    Download the latest macOS installer from the Python Software Foundation website.


    ![](img/84256b7fa80e08517c2c7cbb96a2913c_9_1.png)


    #### Step 2: Install Python 3


    Once the download is complete double-click and run it.


    ![](img/84256b7fa80e08517c2c7cbb96a2913c_10_0.png)


    Hit `Continue` and complete the setup.


    #### Step 3: Verify Installation


    Once the setup is complete, click on the `Launchpad -> IDLE` to launch the Python
    interpreter.


    ![](img/84256b7fa80e08517c2c7cbb96a2913c_10_1.png)


    Python 3.9 is now successfully installed on your computer.


    ### Execution Modes


    After installing the latest version of the Python interpreter, we can now write
    and execute some basic Python codes.


    There are two ways to execute a Python program:


    1. **Interactive Mode**: When the IDLE application is launched, the Python interpreter
    or the Python shell pops up on the screen. User can interact with the Python interpreter
    and execute statements (single line or multiline code snippets) directly in this
    Python shell.

    2. **Script Mode**: This is the most commonly used method for executing a Python
    program. The entire Python program is written and saved in a file (`.py` extension)
    which can be executed using the IDLE application.'
  mdcn: '## 引言


    ### 编程语言简介


    在当今的数字时代，我们依赖计算机、智能手机和互联网来执行大量任务，例如：


    -   数学任务，如计算一个数的平方根或求解一组联立方程。

    -   基于文本的任务，如阅读文档并执行查找/替换。

    -   流式传输和播放包含音频和视频的多媒体文件。

    -   使用搜索引擎查找并访问网站。

    -   与朋友一起玩在线多人游戏。

    -   以及更多…


    软件扮演着重要角色，它将人类活动转化为相应的机器指令，这些指令被执行以完成这些任务。


    **软件**是程序的集合，其中每个程序提供一系列指令，指定计算机应如何行动。


    这些指令必须以**机器语言**或**低级语言**（0和1）提供，这对人类来说难以读写。


    这导致了**高级编程语言**的发明，使用这些语言可以轻松编写和管理程序。使用高级语言编写的、人类可读的程序，通过**编译器**或**解释器**转换为计算机可读的机器码或字节码。


    目前有许多广泛使用的高级编程语言。


    一些流行的语言包括 Java、C、C++、C#、Go、Swift、JavaScript、PHP、Dart、Kotlin 和 Python。


    ### Python 简介


    Guido van Rossum 于 1989 年 12 月开始开发 Python。他于 1991 年 2 月 20 日发布了 Python 的第一个公开版本（0.9.9）。


    该语言在接下来的几十年中不断演进，其定义也随之发展，当前版本的定义如下：


    > Python 是一种高级、解释型、面向对象的编程语言，具有动态语义。


    让我们分解并分析上述定义，以更好地理解 Python：


    #### 高级


    Python 是一种**高级编程语言**，可以使用自然语言（英语）编写程序，使其易于阅读、编写、共享和管理。


    在开发 Python 程序时，无需处理计算机体系结构的各种组件，如寄存器、内存地址和调用栈，而如果使用汇编语言或低级语言进行开发，则必须处理这些组件。


    Python 包含高级语言特性，如变量、数据结构（列表、字典等）、对象、表达式、模块、类、函数、循环、线程、文件处理、字符串处理、错误处理以及其他计算机科学抽象概念。


    #### 解释型


    在像 C 或 C++ 这样的传统编程语言中，代码在执行前需要编译成计算机可读的机器码。


    Python 是一种**解释型语言**，Python 解释器逐行读取并执行程序。


    与编译代码执行相比，这个过程更耗时，但由于在测试和调试期间无需经历整个编译步骤，因此允许更快的开发。此外，只要平台安装了有效的 Python（包括解释器），代码就可以在任何平台上运行，因为不会生成平台相关的二进制文件。


    #### 面向对象


    Python 不强制**面向对象编程（OOP）**，但完全支持它。


    程序员可以定义类，以属性（或特性）的形式指定数据，并以成员函数（或方法）的形式指定一些编程逻辑。一旦定义了类，用户就可以创建该类的实例，这被称为对象。


    在 Python 中，一切（`int`、`list`、`dict` 等）都是对象。我们将在后续章节中更详细地介绍对象。


    #### 动态语义


    由于 Python 是一种解释型语言，代码逐行执行，因此 Python 语句或表达式在运行时进行求值。这允许**动态类型**（变量的类型在其生命周期内可以改变）以及在运行时创建动态对象，与像
    C/C++ 这样的静态类型编译语言相比，这提供了更多的灵活性、易用性和更少的代码行数。


    ### Python 的优势


    Python 的主要优势如下：


    #### 1. 易于学习


    Python 编程语言易于学习，技术和概念开销低。这使其成为初学者学习编程的理想语言。


    #### 2. 语法清晰 & 代码行数少


    Python 简单易学的语法提高了代码可读性，并导致更少的代码行数。一个在 C 中平均需要二十行代码、在 Java 中需要七行代码的典型任务，在 Python
    中通常只需一行即可完成。


    此外，由于代码行数较少，出错的可能性显著降低。


    #### 3. 开源


    Python 是一种开源编程语言，因此任何人都可以查看并为其源代码做出贡献。


    #### 4. 可移植 & 平台无关


    Python 编程语言是可移植且平台无关的，因为它可以在任何 Linux、MacOS 或 Windows 设备上运行。


    #### 5. 标准库 & Python 包


    Python 拥有丰富而广泛的标准库，这是一个包含各种任务预定义函数的集合。


    Python 程序员还可以使用 Python 包索引（PyPI）中超过 250,000 个社区贡献的库组成的庞大生态系统，在那里可以找到针对每种可想象任务的解决方案。


    #### 6. Web 应用程序开发


    一些最流行的 Web 开发框架（django、flask 等）是用 Python 编写的。再加上可用于连接任何数据库的包，使得 Python 成为 Web
    应用程序开发的绝佳选择。


    ### 在 Windows 中安装 Python


    让我们从 Windows 操作系统上的 Python 3 安装过程开始。


    #### 步骤 1：下载安装程序


    从 Python 软件基金会网站下载最新的 Windows 安装程序。


    ![](img/84256b7fa80e08517c2c7cbb96a2913c_7_0.png)


    #### 步骤 2：安装 Python 3


    下载完成后，双击运行它。


    ![](img/84256b7fa80e08517c2c7cbb96a2913c_8_0.png)


    选中复选框 ✅ Add Python 3.9 to PATH。这将使你能够通过命令行安装 Python 包并运行 Python 脚本。


    点击 🛡️ Install Now 并完成设置。


    #### 步骤 3：验证安装


    设置完成后，单击“开始”菜单并打开 Python 3.9 -> IDLE (Python 3.9 64 bit) 以启动 Python 解释器。


    ![](img/84256b7fa80e08517c2c7cbb96a2913c_8_1.png)


    Python 3.9 现已成功安装在你的计算机上。


    ![](img/84256b7fa80e08517c2c7cbb96a2913c_9_0.png)


    ### 在 macOS (Apple) 中安装 Python


    让我们从 macOS 操作系统上的 Python 3 安装过程开始。


    #### 步骤 1：下载安装程序


    从 Python 软件基金会网站下载最新的 macOS 安装程序。


    ![](img/84256b7fa80e08517c2c7cbb96a2913c_9_1.png)


    #### 步骤 2：安装 Python 3


    下载完成后，双击运行它。


    ![](img/84256b7fa80e08517c2c7cbb96a2913c_10_0.png)


    点击 `Continue` 并完成设置。


    #### 步骤 3：验证安装


    设置完成后，单击 `Launchpad -> IDLE` 以启动 Python 解释器。


    ![](img/84256b7fa80e08517c2c7cbb96a2913c_10_1.png)


    Python 3.9 现已成功安装在你的计算机上。


    ### 执行模式


    安装最新版本的 Python 解释器后，我们现在可以编写并执行一些基本的 Python 代码。


    执行 Python 程序有两种方式：


    1.  **交互模式**：当启动 IDLE 应用程序时，Python 解释器或 Python shell 会弹出在屏幕上。用户可以与 Python 解释器交互，并直接在此
    Python shell 中执行语句（单行或多行代码片段）。

    2.  **脚本模式**：这是执行 Python 程序最常用的方法。整个 Python 程序被编写并保存在一个文件中（`.py` 扩展名），可以使用 IDLE
    应用程序执行。'
