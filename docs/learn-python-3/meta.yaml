    {0, 1, 2, 3, 4, 5}\n```\n\n## Mutable & Immutable Data Types\n\n### Immutable\
    \ Data Types\n\nA data type is said to be immutable when the value of an object\
    \ of that type cannot be modified.\nThe following data types are immutable:\n\n\
    - `int`\n- `float`\n- `complex`\n- `bool`\n- `tuple`\n- `str`\n- `None`\n\nYou\
    \ might be wondering if some of the above types are immutable then how are we\
    \ able modify the values of variables?\nIn case of variable re-assignment, the\
    \ original objects are not modified, but new objects (with new values) are created\
    \ in a new memory location and are bound to the variables. The object containing\
    \ the old value is destroyed if no other variable references it.\nLet us take\
    \ an example,\n\n```\n>>> a = 1\n>>> id_a = id(a)\n>>> a = 2\n>>> id_a2 = id(a)\n\
    >>> id_a == id_a2\nFalse\n```\n\nYou can witness in the above example how the\
