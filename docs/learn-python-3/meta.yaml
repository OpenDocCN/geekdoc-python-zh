    \    if val > maxval:\n        maxval = val\n    s += val\n\nprint(\"Minimum :\"\
    , minval)\nprint(\"Maximum :\", maxval)\nprint(\"Mean :\", s/n)\n```\n\nOutput\n\
    \n```\nEnter length of list: 5\nEnter item: 3\n```"
