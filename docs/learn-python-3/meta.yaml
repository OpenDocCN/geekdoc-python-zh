    \ 'c': 'cat'}\n>>> id_d2 = id(d)\n>>> id_d == id_d2\nTrue\n```\n\n让我们以一个集合为例，添加一个新项。\n\
    \n```\n>>> s = {\"apple\", \"bat\"}\n>>> id_s = id(s)\n>>> s.add(\"cat\")\n>>>\
    \ s\n{'cat', 'apple', 'bat'}\n>>> id_s2 = id(s)\n>>> id_s == id_s2\nTrue\n```\n\
    \n在上面的例子中，对象（`list`、`dict`、`set`）的 `id` 没有改变，这意味着没有创建新对象，原始对象被修改了。\n\n## 输入 /\
    \ 输出\n\n### 如何接受用户输入\n\n`input()` 函数用于从用户那里接受新的输入数据。\n\n当代码中遇到此函数时，Python 解释器会等待用户输入响应，该响应作为字符串读取并分配给一个变量。\n\
