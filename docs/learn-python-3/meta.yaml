    True

    >>> "Hello Py".startswith(("He","P"))

    True

    >>> "Py Hello".startswith(("He","P"))

    True

    >>> "Hello Py".endswith("y")

    True

    >>> "Hello Py".endswith(("p","y"))

    True

    >>> "Py Hello".endswith(("o","n"))

    True

    ```


