  md: '# Learn to use Data Types


    Python is a dynamically typed language that supports several data types. A data
    type is a classification of data that determines the type of operations that can
    be performed on it. In this chapter, we will discuss the different data types
    supported by Python along with examples and illustrations.


    # Numeric Data Types


    Python supports various numeric data types such as integers, floating-point numbers,
    and complex numbers.


    # Integers


    An integer is a whole number, either positive or negative, without a decimal point.
    In Python, integers are represented by the int class. For example, 5, -10, and
    0 are all integers.


    ```

    x = 5

    y = -10

    print(x, y)

    ```


    Output:


    ```

    5 -10

    ```


    # Floating-Point Numbers


    A floating-point number is a number that has a decimal point. In Python, floating-point
    numbers are represented by the float class. For example, 3.14 and -2.5 are floating-point
    numbers.


    ```

    x = 3.14

    y = -2.5

    print(x, y)

    ```


    Output:


    ```

    3.14 -2.5

    ```'
  merge: -1
  pgno: 20
