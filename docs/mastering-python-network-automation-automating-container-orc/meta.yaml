    # Components of Network Automation Process


    The process of automating network operations in order to reduce the amount of
    manual labour required for network management is referred to as network automation.
    In order to test and develop network automation scripts and tools, it is absolutely
    necessary to have network automation labs. In this chapter, we will talk about
    the various components of a network automation lab, as well as how these components
    work together to provide a streamlined experience for network automation. In addition,
    we will discuss how these components work together to provide a streamlined experience
    for network automation.


    Network devices, a network emulator, an environment based on the Python programming
    language, and automation scripts are the standard elements that make up a network
    automation lab. When put together, these components produce a simulated network
    environment that can be put to use in the creation and testing of scripts for
    network automation. This environment can be used for a variety of purposes.


    # Network Devices


    The hardware components known as "network devices" are what make it possible for
    devices connected to a computer network to communicate with one another. They
    make it easier for devices on a network to communicate with one another and gain
    access to shared resources by facilitating the transmission of data between the
    various components of a network. There are many different kinds of network devices,
    each of which has its own particular function and part to play in the infrastructure
    of the network. Routers, switches, hubs, firewalls, and modems are just some of
    the devices that are used to create and maintain networks.


    Due to the fact that they are in charge of directing traffic between various networks,
    routers are widely considered to be the most essential networking devices. They
    make use of routing tables to determine the most efficient route for data packets
    to take, taking into account information such as IP addresses'
  - '[PAGE 54]


    and the topology of the network. Routers typically come equipped with a variety
    of interfaces, which enables them to connect to a wide variety of networks as
    well as devices. On the other hand, switches are what are used to connect different
    devices that are part of the same network. They use the MAC addresses to figure
    out where to send the data packets, which enables the devices to communicate directly
    with one another. Managed switches provide a higher level of control and more
    configuration options than unmanaged switches do. Switches can either be managed
    or unmanaged. Hubs are a different kind of networking device that are used to
    connect devices that are already part of the same network. Hubs, on the other
    hand, do not care about the final destination of the data packets they receive;
    rather, they simply transmit them to all of the devices to which they are connected.
    Because of this, there is a potential for increased network traffic and congestion,
    which may result in hubs being utilised less frequently in the future. Firewalls
    are devices that can be installed on a network to prevent unauthorised access
    and malicious traffic from entering the system. They can be based on either hardware
    or software, and in order to block unwanted traffic while allowing legitimate
    traffic to pass through, they typically use a combination of rules, policies,
    and filters. These can be implemented in either form.


    In order to connect a computer or other device to the internet, you will need
    to use a modem, which is a type of network device. They take the digital signals
    produced by a computer and convert them into analogue signals that can be sent
    over telephone lines or cable connections, thereby enabling users to connect to
    the internet through the medium of their internet service provider (ISP). Other
    types of network devices include access points, which are used to connect wireless
    devices to a network, and network interface cards, also known as NICs, which are
    used to connect devices to a network using a wired connection. Both of these types
    of devices are considered to be subtypes of network devices.


    In general, network devices are essential components of modern computer networks
    because they enable devices to communicate with one another and access resources
    that are shared by the network. Network administrators are able to design and
    maintain network infrastructures that are efficient, secure,'
- md: 'and reliable in order to meet the needs of their organisations if they have
    a thorough understanding of the various types of network devices and the functions
    they perform.


    ## Network Emulator


    A network emulator is a piece of software that gives developers and IT professionals
    the ability to simulate and test real-world network conditions within a simulated
    network environment. In order to test the performance of applications and network
    infrastructure under real-world conditions, it simulates various types of network
    connections, bandwidths, latencies, and packet loss rates. The performance of
    applications under varying network types and conditions can be tested using a
    network emulator, the impact of network changes can be verified, and service level
    agreements for network-dependent applications can be ensured using a network emulator.
    These are just some of the many possible applications of a network emulator (SLAs).


    A network emulator is typically made up of both software and hardware components
    that, when combined, serve the purpose of simulating the workings of a network.
    The software component is in charge of providing the tools necessary to configure
    and control the network conditions, while the hardware component is in charge
    of creating the actual physical environment in which the network emulation will
    take place.


    Users are granted the ability to configure various network parameters through
    the use of the software component of a network emulator. These parameters include
    bandwidth, latency, packet loss rate, and network topology. In addition to this,
    it offers tools that can generate traffic and measure performance metrics like
    throughput, latency, and jitter. When using a network emulator, developers and
    IT professionals are able to test their applications and infrastructure in an
    environment that is both safe and under their control. This is one of the most
    significant advantages of using a network emulator. This can help to identify
    potential problems before they occur in production environments, which can help
    to save time as well as reduce costs associated with downtime and lost revenue.


    The ability of users to replicate different network conditions, such as those
    that are present in environments that are remotely located or congested, is another
    advantage that comes with the utilisation of a network emulator. This can be helpful
    in identifying and fixing performance issues, some of which might not be obvious
    when the network conditions are ideal. Emulators of a network can also be used
    to test and optimise network infrastructure, such as routers, switches, and firewalls.
    This is another use for network simulators. Users are able to identify potential
    bottlenecks and optimise the configuration of network devices by simulating different
    network conditions and identifying potential bottlenecks.


    In a nutshell, a network emulator is a tool that gives programmers and IT professionals
    the ability to simulate various network conditions and test applications and infrastructure
    in an environment that is both safe and under their direct control. It is possible
    to use it to identify and resolve performance issues, optimise network infrastructure,
    and ensure that network-dependent applications meet service level agreements using
    this tool.


    ## Python Environment


    Python is a well-liked programming language for network automation because of
    its user-friendliness, adaptability, and extensive repository of libraries developed
    by third parties. A Python environment includes not only the Python programming
    language but also any additional libraries or tools that are necessary to create
    and execute Python scripts. The Python environment in a lab dedicated to network
    automation will typically consist of the Python interpreter, a package manager
    such as pip, and any third-party libraries that are necessary for performing tasks
    related to network automation.


    ## Automation Scripts


    Automation scripts are Python scripts that automate network tasks such as configuration
    management, network monitoring, and troubleshooting. These scripts use APIs and
    protocols such as NETCONF, RESTCONF, SNMP, and SSH to interact with network devices
    and retrieve or modify network configuration data. Automation scripts can be run
    on-demand or scheduled to run at specific intervals, providing continuous network
    monitoring and maintenance.


    ## Putting It All Together


    Choosing a network emulator should be the first thing you do when you''re getting
    ready to set up a network automation lab. Popular emulators include GNS3, EVE-NG,
    and VIRL. The emulator needs to be set up so that it can generate virtual network
    devices that can simulate the operating environment of the network. It is recommended
    that the simulated network topology be used to connect the virtual devices so
    that it accurately reflects the real-world network environment.


    After that, a Python environment needs to be created on the laboratory computer.
    Either by using a Python distribution like Anaconda or by manually installing
    Python and any necessary libraries, this can be accomplished. Anaconda is one
    example of a Python distribution. A package manager, such as pip, should be included
    in the Python environment in order to facilitate the installation of any necessary
    third-party libraries. Scripts for automation can be developed and tested in the
    lab environment once the Python environment has been set up. Text editors or integrated
    development environments (IDEs) like PyCharm or Visual Studio Code can be used
    to write automation scripts. Another option is to use a simple text editor. In
    order to interact with network devices, the scripts ought to make use of Python
    libraries such as Netmiko, Nornir, or PyEZ.


    Automation scripts can be executed by hand, or they can be programmed to execute
    at predetermined intervals using tools like cron or the Windows Task Scheduler.
    Scripts may be executed either on the system used in the laboratory or on a server
    specifically designated for automation.


    ## Benefits of Network Automation Lab


    Network engineers and administrators stand to gain from the establishment of a
    network automation lab in more ways than one.

    To begin, it enables the development and testing of automation scripts in an environment
    that is under controlled conditions. This decreases the likelihood of errors or
    disruptions occurring on the production network.

    Second, it offers a sandbox environment in which new network technologies and
    configurations can be tested before being introduced into the live network.


    Last but not least, it makes it possible to automate routine network tasks, which
    in turn reduces the amount of manual labour needed for network management and
    maintenance.


    Therefore, a network automation lab is a necessary piece of equipment for network
    engineers and administrators who have the goal of automating network tasks in
    order to reduce the amount of manual labour needed for network management. Virtual
    or emulated network devices, a network emulator, an environment running Python,
    and automation scripts are the standard components of the lab. Engineers and administrators
    can develop and test automation scripts in a controlled environment by establishing
    a network automation lab. This lowers the risk of errors or disruptions occurring
    on the production network and allows for the testing of new network technologies
    and configurations. Automating routine network tasks is also made possible by
    this setup.


    To get started with the process of establishing a network automation lab, select
    a network emulator that is able to simulate the network environment, establish
    a Python environment that contains all of the necessary libraries, and create
    automation scripts by making use of Python libraries like Netmiko, Nornir, or
    PyEZ. Overall, make use of applications like cron or the Windows Task Scheduler
    to automate mundane network tasks and set up scripts to run at predetermined intervals.'
