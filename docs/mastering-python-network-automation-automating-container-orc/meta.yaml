    secure, and it is compatible with a number of different cloud providers, operating
    systems, and orchestrators.


    # ## Characteristics of Calico


    Calico is designed for large-scale deployments and is capable of managing millions
    of endpoints in addition to thousands of nodes. It is both quick and scalable.
    Calico provides network security at scale by restricting network traffic between
    workloads using fine-grained access control lists (ACLs).


    Calico is compatible with a wide variety of cloud providers, operating systems,
