    \ TLS 证书并强制执行服务间的双向 TLS 认证。它确保不同服务之间的所有通信都是加密和安全的，并且只有受信任的服务才能访问敏感数据或资源。最后，Galley\
    \ 负责验证配置数据并将其分发给其他组件。它使管理员能够高效地管理和分发不同服务间的配置数据，确保所有服务配置正确并按照最佳实践运行。\n\n这些组件共同为一个分布式系统中管理服务间通信提供了强大而灵活的平台。Istio\
