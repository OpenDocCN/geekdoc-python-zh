    ```

    pip install docker

    ```


    # Create Dockerfile


    Docker images can be constructed by following the instructions provided in a configuration
    file known as a Dockerfile. It is made up of a series of instructions that detail
    how to install and configure software, as well as how to copy files and directories
    into the image, as well as which base image to use. The Docker engine will use
    the Dockerfile to create a reproducible and portable image that is easily runnable
    in a variety of different environments. This image can be easily shared with others.
    Developers can automate the process of creating an image by defining the build
    process in a Dockerfile, which enables them to ensure that the image that is produced
    is consistent and predictable.


    To create a Dockerfile, you can use a text editor to create a new file named "Dockerfile"
    (with no file extension) in an empty directory. In the file, you can specify the
    base image, copy files into the image, and run commands to install dependencies
    and configure the image.


    # Build Docker Image


    Once you have created the Dockerfile, you can build the Docker image by running
    the following command in your terminal from the directory containing the Dockerfile:


    ```

    docker build -t <image-name>

    ```


    Replace <image-name> with a name for your image. The . at the end specifies that
    the Dockerfile is in the current directory.


    # Run Docker Container'
