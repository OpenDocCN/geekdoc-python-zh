    to start the etcd server. Execution of the etcd binary or the use of a system
    service are both viable options for achieving this goal. Both options are discussed
    further below. By default, etcd will listen on two ports: port 2379 will handle
    client requests, and port 2380 will be used exclusively for peer-to-peer communication
    between nodes. It is important to note that the etcd configuration file allows
    for the modification of these default port numbers so that they can be tailored
    to specific requirements. After the etcd server has been installed and is operational,
    it can be put to use in a variety of contexts for distributed coordination, service
    discovery, and other purposes that are functionally equivalent.


