  md: '# # File Handling


    File handling is an important aspect of programming, and it refers to the various
    operations that can be performed on files such as reading from, writing to, and
    modifying files. In Python, you can perform file handling operations using the
    built-in file handling functions.


    There are three main file handling modes in Python: read, write, and append. In
    the read mode, you can read data from a file. In the write mode, you can create
    a new file or overwrite an existing file with new data. In the append mode, you
    can add new data to an existing file.


    # ## Opening and Closing Files


    To perform file handling operations, you need to open a file first. You can do
    this using the open() function, which takes two arguments: the name of the file
    and the mode in which you want to open the file.


    *Example#1: Opening a file in read mode*


    ```

    python

    file = open(''example.txt'', ''r'')

    ```


    *Example#2: Opening a file in write mode*


    ```

    python

    file = open(''example.txt'', ''w'')

    ```


    Once you have finished performing operations on the file, you should close the
    file using the close() function.


    *Example#3: Closing a file*


    ```

    python

    file.close()

    ```


    # ## Reading from Files


    In Python, you can read data from files using the read() function. This function
    reads the entire file and returns the contents of the file as a string.'
