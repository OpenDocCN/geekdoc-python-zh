    - Netmiko：用于通过 SSH 访问网络设备的库

    - Nornir：用于网络自动化和编排的库


    要安装这些库，请运行以下命令：


    ```

    sudo pip3 install paramiko netmiko nornir

    ```


    此命令将安装 paramiko、netmiko 和 nornir 库。


