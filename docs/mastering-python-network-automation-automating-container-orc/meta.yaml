    \n### Calico的特性\n\nCalico是为大规模部署而设计的，能够管理数百万个端点以及数千个节点。它既快速又可扩展。Calico通过使用细粒度的访问控制列表来限制工作负载之间的网络流量，从而提供大规模的网络安全性。\n\
    \nCalico由于其适应性和对底层基础设施的无关性，兼容各种云提供商、操作系统和编排器。它易于部署和管理。Calico提供了一个简单易用的API来管理网络策略，并且可以利用Kubernetes等知名工具在几分钟内部署完成。\n\
