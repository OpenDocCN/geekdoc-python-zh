    \n## 学习使用数据类型\n\nPython是一种动态类型语言，支持多种数据类型。数据类型是对数据的分类，它决定了可以对数据执行的操作类型。在本章中，我们将讨论Python支持的不同数据类型，并附上示例和说明。\n\
    \n### 数值数据类型\n\nPython支持多种数值数据类型，如整数、浮点数和复数。\n\n#### 整数\n\n整数是没有小数点的整数，可以是正数或负数。在Python中，整数由`int`类表示。例如，5、-10和0都是整数。\n\
