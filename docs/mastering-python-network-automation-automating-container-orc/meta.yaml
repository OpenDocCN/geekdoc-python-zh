  md: 'We can use the subprocess.run() method again to execute the timedatectl command
    with the status argument to verify that the timezone has been set correctly.


    ```

    result = subprocess.run(["timedatectl", "status"], capture_output=True, text=True)

    print(result.stdout)

    ```


    The capture_output=True argument captures the output of the command, while the
    text=True argument ensures that the output is returned as a string.


    Putting it all together, below is what the complete script looks like:


    ```

    import subprocess

    timezone = "America/New_York"

    subprocess.run(["timedatectl", "set-timezone", timezone], check=True)

