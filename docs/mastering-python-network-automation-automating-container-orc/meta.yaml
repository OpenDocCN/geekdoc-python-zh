    \ Python 程序至关重要。\n\n# 使用函数\n\nPython 中的函数是可重用的代码块，用于执行特定任务。它们用于减少代码重复，并使代码更易于阅读和维护。在本教程中，我们将通过实际示例讨论\
    \ Python 函数的基础知识。\n\n# 定义函数\n\n在 Python 中定义函数的语法如下：\n\n```\ndef function_name(parameters):\n\
    \    # 要执行的代码\n    return return_value\n```\n\n函数定义以 `def` 关键字开头，后跟函数名称，以及一组可能包含也可能不包含参数的圆括号。函数要执行的代码是缩进的，后面跟着一个可选的\
    \ `return` 语句，该语句指定函数要返回的值。\n\n*示例#1：一个简单的函数，用于将两个数字相加*\n\n```\ndef add_numbers(a,\
    \ b):\n    result = a + b\n    return result\n```\n\n*示例#2：一个打印问候消息的函数*\n\n```\n\
    def say_hello(name):\n    print(f'Hello, {name}!')\n```\n\n# 调用函数\n\n要在 Python\
    \ 中调用一个函数，你只需写出函数名称，后跟一组可能包含也可能不包含参数的圆括号。\n\n*示例#1：调用 add_numbers 函数*\n\n```\n\
    result = add_numbers(2, 3)\nprint(result)\n```\n\n输出：\n\n```\n5\n```\n\n*示例#2：调用\
    \ say_hello 函数*\n\n```\nsay_hello('John')\n```\n\n输出：\n\n```\nHello, John!\n```\n\
    \n# 默认参数\n\n在 Python 中，你可以为函数参数定义默认值。如果未传递某个参数的值，则使用默认值。\n\n示例#1：一个带有默认参数的函数\n\
    \n```\ndef say_hello(name='World'):\n    print(f'Hello, {name}!')\n```\n\n示例#2：使用默认参数调用\
    \ say_hello 函数\n\n```\nsay_hello()\nsay_hello('John')\n```\n\n输出：\n\n```\nHello,\
    \ World!\nHello, John!\n```\n\n# 可变长度参数\n\n在 Python 中，你可以定义接受可变数量参数的函数。有两种方式定义可变长度参数：使用\
    \ `*args` 语法传递可变数量的位置参数，或使用 `**kwargs` 语法传递可变数量的关键字参数。\n\n示例#1：一个带有可变长度位置参数的函数\n\
    \n```\ndef print_args(*args):\n    for arg in args:\n        print(arg)\n```\n\
    \n示例#2：使用可变长度位置参数调用 print_args 函数\n\n```\nprint_args(1, 2, 3)\n```\n\n输出：\n\n\
    ```\n1\n2\n3\n```\n\n示例#3：一个带有可变长度关键字参数的函数\n\n```\ndef print_kwargs(**kwargs):\n\
    \    for key, value in kwargs.items():\n        print(key, value)\n```\n\n示例#4：使用可变长度关键字参数调用\
    \ print_kwargs 函数\n\n```\nprint_kwargs(name='John', age=25)\n```\n\n输出：\n\n```\n\
    name John\nage 25\n```\n\n# Lambda 函数\n\nLambda 函数，也称为匿名函数，是小型的、单行的函数，无需命名即可定义。它们对于编写只使用一次的快速简单函数非常有用。\n\
    \n示例#1：一个将数字加倍的 lambda 函数\n\n```\ndouble = lambda x: x * 2\nresult = double(3)\n\
    print(result)\n```\n\n输出：\n\n```\n6\n```\n\n# 示例#2：一个按第二个元素对元组列表进行排序的 lambda 函数\n\
    \n```\nstudents = [('John', 25), ('Mary', 23), ('Tom', 27)]\nstudents.sort(key=lambda\
    \ x: x[1])\nprint(students)\n```\n\n输出：\n\n```\n[('Mary', 23), ('John', 25), ('Tom',\
    \ 27)]\n```\n\n# 递归\n\n在 Python 中，你可以定义调用自身的函数。这些函数称为递归函数，它们对于解决可以分解为更小子问题的问题非常有用。\n\
    \n# 示例#1：一个计算数字阶乘的递归函数\n\n```\ndef factorial(n):\n    if n == 0:\n        return\
    \ 1\n    else:\n        return n * factorial(n - 1)\n```\n\n# 示例#2：调用 factorial\
    \ 函数\n\n```\nresult = factorial(5)\nprint(result)\n```\n\n输出：\n\n```\n120\n```\n\
    \n# 全局变量和局部变量\n\n在 Python 中，在函数内部定义的变量是该函数的局部变量，无法在函数外部访问。在函数外部定义的变量是全局变量，可以在程序中的任何地方访问。\n\
    \n示例#1：一个修改全局变量的函数\n\n```\ncount = 0\ndef increment_count():\n    global count\n\
    \    count += 1\nincrement_count()\nincrement_count()\nincrement_count()\nprint(count)\n\
    ```\n\n输出：\n\n```\n3\n```\n\n示例#2：一个使用局部变量的函数\n\n```\ndef square(x):\n    result\
    \ = x ** 2\n    return result\nprint(square(5))\n```\n\n输出：\n\n```\n25\n```\n\n\
    # 函数参数\n\n在 Python 中，函数参数可以通过引用传递或通过值传递。当参数通过引用传递时，函数内部对参数所做的任何更改都会反映在函数外部。当参数通过值传递时，函数内部对参数所做的任何更改都不会反映在函数外部。\n\
    \n示例#1：一个修改通过引用传递的列表的函数\n\n```\ndef add_to_list(numbers, x):\n    numbers.append(x)\n\
    my_list = [1, 2, 3]\nadd_to_list(my_list, 4)\nprint(my_list)\n```\n\n输出：\n\n```\n\
    [1, 2, 3, 4]\n```\n\n示例#2：一个不修改通过值传递的整数的函数\n\n```\ndef square(x):\n    x = x **\
    \ 2\n    return x\nnumber = 5\nsquare(number)\nprint(number)\n```\n\n输出：\n\n```\n\
    5\n```\n\n# 嵌套函数\n\n在 Python 中，你可以在其他函数内部定义函数。这些函数称为嵌套函数，它们对于组织代码和限制变量作用域非常有用。\n\
    \n示例#1：一个定义嵌套函数的函数\n\n```\ndef outer_function():\n    def inner_function():\n\
    \        print('This is the inner function')\n    inner_function()\nouter_function()\n\
    ```\n\n输出：\n\n```\nThis is the inner function\n```\n\n示例#2：一个返回嵌套函数的函数\n\n```\n\
    def outer_function():\n    def inner_function():\n        print('This is the inner\
    \ function')\n    return inner_function\nfunction = outer_function()\nfunction()\n\
    ```\n\n输出：\n\n```\nThis is the inner function\n```\n\n总而言之，函数是 Python 编程的重要组成部分。它们允许我们编写可重用的代码，组织我们的程序，并更高效地解决问题。理解函数的基础知识对于任何\
    \ Python 开发者都至关重要，本教程中提供的示例应该能帮助你入门。"
