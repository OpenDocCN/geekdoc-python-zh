    application programming interface (API) that is simple to work with and abstracts
    away the complexity of interacting with various devices.


    # Architecture of Netmiko


    The architecture of Netmiko is centred on three primary components, which are
    as follows:


    # Driver for Device


    The driver for the device is in charge of managing the communication that takes
    place between Netmiko and the network device. It is a Python class that implements
    a set of methods for sending and receiving commands, parsing output, and handling
    errors. These methods can be found in the class''s documentation.


    # Connection Handler


    The connection handler is in charge of managing the SSH connection to the network
    device. This responsibility falls on the connection handler. It does this by establishing
    and maintaining the SSH connection with the help of the Paramiko library, which
    also provides methods for logging in and out of the SSH session as well as managing
    it.


    # Command Handler


    The command handler is in charge of managing the execution of commands on the
    network device, and its responsibilities include this oversight. It does this
    by utilising the connection handler so that commands can be sent to the device
    and the output can be received. It also provides methods for handling errors and
    parsing the output.'
