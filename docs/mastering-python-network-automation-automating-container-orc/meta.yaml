- md: '## Configure Hosts


    In order to successfully set up a network, one of the most important steps is
    to configure the hosts on the network. Assigning IP addresses, subnet masks, and
    default gateways to each host is a necessary step in the process. Because the
    network is configured in this manner, hosts are able to communicate with other
    devices on the network and access the internet.


    IP addresses are one-of-a-kind identifiers that are given to every device that
    is connected to a network. It makes it possible for different devices to communicate
    with one another over a network. The subnet mask both establishes the overall
    size of the network as well as partitions it into several more manageable sub-networks.
    The IP address of the router that is used to connect a local area network to the
    wider internet is known as the default gateway.


    The process of configuring hosts differs from one operating system to another
    and also depends on the configuration of the network. The following are some of
    the most common steps for configuring hosts on operating systems running Windows
    and Linux:


    ### Configuring Hosts on Windows


    Configuring hosts on Windows is an important task that is essential for network
    connectivity. A host is a computer or device that is connected to a network, and
    its IP address is used to identify and communicate with other devices on the same
    network.


    The process of configuring hosts on Windows involves several steps, which are
    outlined below:


    - Step 1: Open the Control Panel and select "Network and Sharing Center". The
    first step in configuring hosts on Windows is to open the Control Panel and select
    "Network and Sharing Center." The Control Panel is a central location in Windows
    where users can configure and manage various settings on their computer. The Network
    and Sharing Center is a tool in Windows that provides an overview of network connections
    and enables users to manage network-related settings.

    - Step 2: Click on "Change adapter settings" on the left-hand side of the screen.
    After opening the Network and Sharing Center, the next step is to click on "Change
    adapter settings" on the left-hand side of the screen. This will display a list
    of network adapters that are installed on the computer.

    - Step 3: Right-click on the network adapter to be configured and select "Properties".
    Once the list of network adapters is displayed, the user should right-click on
    the network adapter that they wish to configure and select "Properties." This
    will display the properties dialog box for the selected network adapter.

    - Step 4: Double-click on "Internet Protocol Version 4 (TCP/IPv4)" in the list
    of network protocols. In the properties dialog box for the selected network adapter,
    the user should double-click on "Internet Protocol Version 4 (TCP/IPv4)" in the
    list of network protocols. This will display the properties dialog box for the
    IPv4 protocol.

    - Step 5: Select "Use the following IP address" and enter the IP address, subnet
    mask, and default gateway for the host. In the properties dialog box for the IPv4
    protocol, the user should select "Use the following IP address" and enter the
    IP address, subnet mask, and default gateway for the host. The IP address is a
    unique identifier for the host on the network, and the subnet mask defines the
    network portion and the host portion of the IP address. The default gateway is
    the IP address of the router or gateway that is used to connect to other networks.

    - Step 6: Click "OK" to save the configuration. Finally, the user should click
    "OK" to save the configuration. Once the configuration is saved, the host will
    be able to communicate with other devices on the network using the specified IP
    address and network settings.


    In summary, configuring hosts on Windows involves opening the Control Panel, selecting
    "Network and Sharing Center," clicking on "Change adapter settings," right-clicking
    on the network adapter to be configured and selecting "Properties," double-clicking
    on "Internet Protocol Version 4 (TCP/IPv4)" in the list of network protocols,
    selecting "Use the following IP address" and entering the IP address, subnet mask,
    and default gateway for the host, and clicking "OK" to save the configuration.


    ### Configuring Hosts on Linux


    Configuring hosts on Linux involves setting up network connectivity on a computer
    or device running the Linux operating system. The process of configuring hosts
    on Linux can vary depending on the specific Linux distribution being used, but
    the general steps involved are as follows:


    - The first step in configuring hosts on Linux is to open a terminal and log in
    as the root user. The root user has administrative privileges and can perform
    system-level tasks, such as configuring network interfaces.

    - The next step is to locate and edit the network interface configuration file
    for the host. The location of this file can vary depending on the Linux distribution
    being used. For example, in Ubuntu, the file is located at /etc/network/interfaces.

    - To edit the configuration file, you can use a text editor such as vi or nano.
    For example, to edit the file using nano, you can run the following command:


    ```

    sudo nano /etc/network/interfaces

    ```


    - This will open the configuration file in the nano text editor. Add the following
    lines to the configuration file:


    ```

    auto eth0

