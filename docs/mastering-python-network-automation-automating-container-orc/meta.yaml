  - '[PAGE 178]


    # Running Containers


    The following is an example of a Python programme that runs a Docker container
    to show how it should be done. Using this programme, you will be able to specify
    the name of the container, the image, and the command that will run inside the
    container. It interacts with the Docker engine using the Docker SDK for Python,
    which then allows it to execute the container.


    ```

    import docker

    # Create a Docker client object

    client = docker.from_env()

    # Define the container image and command to run

    image = ''nginx''

    command = ''echo "Hello, World!"''

    # Run the container

    container = client.containers.run(image, command, detach=True)

    # Print the container ID

    print(f''Container ID: {container.id}'')

    ```


    This program uses the Docker SDK for Python to create a Docker client object,
    which is used to interact with the Docker engine running on the host machine.
    It then specifies the container image to use (nginx) and the command to run (echo
    "Hello, World!"). Finally, it starts the container in detached mode and prints
    the ID of the new container.


    To run this program, you will need to have Docker installed on your machine and
    have the docker Python package installed. You can install the package using pip:


    ```

    pip install docker

    ```


    Once the package is installed, save the code above in a Python file (e.g.'
