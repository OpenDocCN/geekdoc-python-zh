  md: '# Preface


    With "Mastering Python Network Automation," you can streamline container orchestration,
    configuration management, and resilient networking with Python and its libraries,
    allowing you to emerge as a skilled network engineer or a strong DevOps professional.


    From the ground up, this guide walks readers through setting up a network automation
    lab using the NS3 network simulator and Python programming. This includes the
    installation of NS3, as well as python libraries like nornir, paramiko, netmiko,
    and PyEZ, as well as the configuration of ports, hosts, and servers. This book
    will teach you the skills to become a proficient automation developer who can
    test and fix any bugs in automation scripts. This book examines the emergence
    of the service mesh as a solution to the problems associated with service-to-service
    communication over time.


    This book walks you through automating various container-related tasks in Python
    and its libraries, including container orchestration, service discovery, load
    balancing, container storage management, container performance monitoring, and
    rolling updates. Calico and Istio are two well-known service mesh tools, and you''ll
    find out how to set them up and configure them to manage traffic routing, security,
    and monitoring.


    Additional topics covered in this book include the automation of network policies,
    the routing of workloads, and the collection and monitoring of metrics, logs,
    and traces. You''ll also pick up some tips and tricks for collecting and visualising
    Istio metrics with the help of tools like Grafana.


    In this book you will learn how to:


    +   - Use of Istio for cluster traffic management, traffic routing, and service
    mesh implementation.

    - Utilizing Cilium and Calico to solve pod networking and automate network policy
    and workload routing.

    - Monitoring and managing Kubernetes clusters with etcd and HAProxy load balancers
    and container storage.

    - Establishing network automation lab with tools like NS3 emulator, Python, Virtual
    Environment, and VS Code.

    - Establishing connectivity between hosts, port connectivity, SSH'
