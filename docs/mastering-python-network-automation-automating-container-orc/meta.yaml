    \ of the device and store it in the config attribute of the host object.\n\n###\
    \ Define Playbook\n\nFinally, we need to define the playbook that combines the\
    \ tasks and devices that we want to run them on. Following is an example of how\
    \ to define a playbook that runs the get_config task on all devices in our inventory:\n\
    \n```\nfrom nornir.core.filter import F\ndef main():\n    ios = nr.filter(F(platform=\"\
    ios\"))\n    results = ios.run(task=get_config)\n    print_result(results)\n```\n\
    \nIn this script, we define a function called main that filters the devices in\
    \ our inventory that are running IOS. We then run the get_config task on those\
    \ devices and print the results.\n\n### Execute the Script\n\nOnce the script\
    \ has been written and saved, it can be executed using the command:\n\n```\npython\
    \ script_name.py\n```\n\nThis will run the script and perform the network automation\
    \ tasks that were defined in the script. The output of the script can be viewed\
    \ in the console.\n\n### Test and Validate the Script\n\nAfter the script has\
