    \ again and continues until the condition becomes false.\n\n# Example#1: Looping\
    \ until a condition is met\n\n```\ncount = 0\nwhile count < 5:\n    print(count)\n\
    \    count += 1\n```\n\nOutput:\n\n```\n0\n1\n2\n3\n4\n```\n\n# Example#2: Looping\
    \ until a user enters a valid input\n\n```\nvalid_input = False\nwhile not valid_input:\n\
    \    user_input = input('Enter a number: ')\n    if user_input.isdigit():\n  \
    \      print('You entered:', user_input)\n        valid_input = True\n    else:\n\
    \        print('Invalid input, please try again')\n```\n\nOutput:\n\n```\nEnter\
    \ a number: abc\nInvalid input, please try again\nEnter a number: 123\nYou entered:\
    \ 123\n```\n\n# Example#3: Looping until a user decides to quit\n\n```\nwhile\
    \ True:\n    user_input = input('Enter a number or type \"quit\" to exit: ')\n\
    \    if user_input == 'quit':\n        break\n    elif user_input.isdigit():\n\
    \        print('You entered:', user_input)\n    else:\n        print('Invalid\
    \ input, please try again')\n```\n\nOutput:\n\n```\nEnter a number or type \"\
    quit\" to exit: abc\nInvalid input, please try again\nEnter a number or type \"\
    quit\" to exit: 123\nYou entered: 123\nEnter a number or type \"quit\" to exit:\
    \ quit\n```\n\nOverall, loops in Python are essential for executing a set of instructions\
    \ repeatedly. The for loop is used to iterate over a sequence or iterable object,\
    \ while the while loop is used to execute a set of instructions repeatedly as\
    \ long as a certain condition is true. Understanding loops and their syntax is\
    \ essential for writing efficient and effective Python programs.\n\n# Working\
    \ with Functions\n\nFunctions in Python are reusable blocks of code that perform\
    \ a specific task. They are used to reduce code duplication and to make code easier\
    \ to read and maintain. In this tutorial, we will discuss the basics of functions\
    \ in Python with practical examples.\n\n# Defining Functions\n\nThe syntax for\
    \ defining a function in Python is as follows:\n\n```\ndef function_name(parameters):\n\
    \    # Code to be executed\n    return return_value\n```\n\nThe function definition\
    \ starts with the def keyword, followed by the name of the function, and a set\
    \ of parentheses that may or may not contain parameters. The code to be executed\
    \ by the function is indented and followed by an optional return statement that\
    \ specifies the value to be returned by the function.\n\n*Example#1: A simple\
    \ function that adds two numbers*\n\n```\ndef add_numbers(a, b):\n    result =\
    \ a + b\n    return result\n```\n\n*Example#2: A function that prints a greeting\
    \ message*\n\n```\ndef say_hello(name):\n    print(f'Hello, {name}!')\n```\n\n\
    # Calling Functions\n\nTo call a function in Python, you simply write the name\
    \ of the function followed by a set of parentheses that may or may not contain\
    \ arguments.\n\n*Example#1: Calling the add_numbers function*\n\n```\nresult =\
    \ add_numbers(2, 3)\nprint(result)\n```\n\nOutput:\n\n```\n5\n```\n\n*Example#2:\
    \ Calling the say_hello function*\n\n```\nsay_hello('John')\n```\n\nOutput:\n\n\
    ```\nHello, John!\n```\n\n# Default Arguments\n\nIn Python, you can define default\
    \ values for function parameters. If a value is not passed for a parameter, the\
    \ default value is used instead.\n\nExample#1: A function with default arguments\n\
    \n```\ndef say_hello(name='World'):\n    print(f'Hello, {name}!')\n```\n\nExample#2:\
    \ Calling the say_hello function with default arguments\n\n```\nsay_hello()\n\
    say_hello('John')\n```\n\nOutput:\n\n```\nHello, World!\nHello, John!\n```\n\n\
    # Variable-length Arguments\n\nIn Python, you can define functions that accept\
    \ a variable number of arguments. There are two ways to define variable-length\
    \ arguments: using the *args syntax to pass a variable number of positional arguments,\
    \ or using the **kwargs syntax to pass a variable number of keyword arguments.\n\
    \nExample#1: A function with variable-length positional arguments\n\n```\ndef\
    \ print_args(*args):\n    for arg in args:\n        print(arg)\n```\n\nExample#2:\
    \ Calling the print_args function with variable-length positional arguments\n\n\
    ```\nprint_args(1, 2, 3)\n```\n\nOutput:\n\n```\n1\n2\n3\n```\n\nExample#3: A\
    \ function with variable-length keyword arguments\n\n```\ndef print_kwargs(**kwargs):\n\
    \    for key, value in kwargs.items():\n        print(key, value)\n```\n\nExample#4:\
    \ Calling the print_kwargs function with variable-length keyword arguments\n\n\
    ```\nprint_kwargs(name='John', age=25)\n```\n\nOutput:\n\n```\nname John\nage\
    \ 25\n```\n\n# Lambda Functions\n\nLambda functions, also known as anonymous functions,\
    \ are small, one-line functions that can be defined without a name. They are useful\
    \ for writing quick and simple functions that are only used once.\n\nExample#1:\
    \ A lambda function that doubles a number\n\n```\ndouble = lambda x: x * 2\nresult\
    \ = double(3)\nprint(result)\n```\n\nOutput:\n\n```\n6\n```\n\n# Example#2: A\
    \ lambda function that sorts a list of tuples by the second element\n\n```\nstudents\
    \ = [('John', 25), ('Mary', 23), ('Tom', 27)]\nstudents.sort(key=lambda x: x[1])\n\
    print(students)\n```\n\nOutput:\n\n```\n[('Mary', 23), ('John', 25), ('Tom', 27)]\n\
    ```\n\n# Recursion\n\nIn Python, you can define functions that call themselves.\
    \ These functions are called recursive functions, and they are useful for solving\
    \ problems that can be broken down into smaller subproblems.\n\n# Example#1: A\
    \ recursive function that calculates the factorial of a number\n\n```\ndef factorial(n):\n\
    \    if n == 0:\n        return 1\n    else:\n        return n * factorial(n -\
    \ 1)\n```\n\n# Example#2: Calling the factorial function\n\n```\nresult = factorial(5)\n\
    print(result)\n```\n\nOutput:\n\n```\n120\n```\n\n# Global and Local Variables\n\
    \nIn Python, variables defined inside a function are local to that function and\
    \ cannot be accessed outside of it. Variables defined outside of a function are\
    \ global and can be accessed anywhere in the program.\n\nExample#1: A function\
    \ that modifies a global variable\n\n```\ncount = 0\ndef increment_count():\n\
    \    global count\n    count += 1\nincrement_count()\nincrement_count()\nincrement_count()\n\
    print(count)\n```\n\nOutput:\n\n```\n3\n```\n\nExample#2: A function that uses\
    \ a local variable\n\n```\ndef square(x):\n    result = x ** 2\n    return result\n\
    print(square(5))\n```\n\nOutput:\n\n```\n25\n```\n\n# Function Arguments\n\nIn\
    \ Python, function arguments can be passed by reference or by value. When an argument\
    \ is passed by reference, any changes made to the argument inside the function\
    \ are reflected outside the function. When an argument is passed by value, any\
    \ changes made to the argument inside the function are not reflected outside the\
    \ function.\n\nExample#1: A function that modifies a list passed by reference\n\
    \n```\ndef add_to_list(numbers, x):\n    numbers.append(x)\nmy_list = [1, 2, 3]\n\
    add_to_list(my_list, 4)\nprint(my_list)\n```\n\nOutput:\n\n```\n[1, 2, 3, 4]\n\
    ```\n\nExample#2: A function that does not modify an integer passed by value\n\
    \n```\ndef square(x):\n    x = x ** 2\n    return x\nnumber = 5\nsquare(number)\n\
    print(number)\n```\n\nOutput:\n\n```\n5\n```\n\n# Nested Functions\n\nIn Python,\
    \ you can define functions inside other functions. These functions are called\
    \ nested functions, and they are useful for organizing code and limiting the scope\
    \ of variables.\n\nExample#1: A function that defines a nested function\n\n```\n\
    def outer_function():\n    def inner_function():\n        print('This is the inner\
    \ function')\n    inner_function()\nouter_function()\n```\n\nOutput:\n\n```\n\
    This is the inner function\n```\n\nExample#2: A function that returns a nested\
    \ function\n\n```\ndef outer_function():\n    def inner_function():\n        print('This\
    \ is the inner function')\n    return inner_function\nfunction = outer_function()\n\
    function()\n```\n\nOutput:\n\n```\nThis is the inner function\n```\n\nOverall,\
    \ functions are an essential part of Python programming. They allow us to write\
    \ reusable code, organize our programs, and solve problems more efficiently. Understanding\
    \ the basics of functions is crucial for any Python developer, and the examples\
    \ provided in this tutorial should help you get started."
