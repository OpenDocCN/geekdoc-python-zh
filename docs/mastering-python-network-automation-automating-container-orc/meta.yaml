    issues that may arise thanks to the practise of tracking changes and configurations.
    This helps to minimise the impact that downtime has on network operations. In
    addition to this, configuration management helps to ensure that systems are properly
    updated and maintained, which in turn reduces the likelihood of failures occurring
    within the system.'
