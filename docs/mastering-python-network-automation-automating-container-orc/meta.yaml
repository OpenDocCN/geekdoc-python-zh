  md: '# Nornir


    The Nornir framework is a Python-based automation tool that was developed specifically
    for network automation tasks. It is a free and open-source library that offers
    a straightforward and adaptable method of automating network tasks. This makes
    it possible for network engineers to concentrate on the tasks at hand without
    being distracted by concerns regarding the underlying infrastructure.


    # Architecture of Nornir


    Architecture of Nornir: The architecture of Nornir is based on the idea of using
    plugins in various places. A framework''s functionality can be extended with the
    help of a small piece of code called a plugin. Plugins can either add new functionality
    or replace functionality that already exists.


    In Nornir, the following are the three primary categories of plugins:


    # Inventory Plugin


    This includes the hostname of the device, its IP address, and any other information
    that may be pertinent. YAML, CSV, and SQL are all formats that can be used as
    inventory plugins.


    # Processor Plugin


    A processor plugin''s job is to ensure that the tasks assigned to it are carried
    out successfully on the devices. The results are provided after a task and a list
    of devices have been provided to it. SSH, NETCONF, and REST are a few examples
    of processor plugins that are available.


    # Result Plugin


    It then saves the results in a location from which other plugins can quickly retrieve
    them in order to process them further. SQLite, JSON, and CSV are a few examples
    of different types of result plugins.


    The following are the primary elements that make up Nornir''s architecture:


    +   - A piece of code that carries out a particular operation on a device'
  merge: -1
  pgno: 74
- img_proc: true
  md: 'is referred to as a task. Any programming language may be used to create tasks,
    and a processor plugin is responsible for carrying out their instructions.


    +   - An inventory is a list of all of the different devices that are currently
    being managed. You have the option of manually creating the inventory, or you
    can use an inventory plugin to do it automatically.

    - A processor is the component of a device that is in charge of putting instructions
    into action. Nornir comes with a number of different processor plugins already
    installed, but users are also able to create their own bespoke processor plugins.

    - The output of a task that has been carried out on a device is referred to as
    the result of the task. The results are saved in a result plugin, and other plugins
    have the ability to access those results.


    # Significance of Nornir


    Nornir is an essential library for network automation for a number of reasons,
    including the following:


    # Simplifies Network Automation


    Nornir is able to simplify network automation because it offers a framework that
    is both straightforward and versatile for the automation of network tasks. Because
    of this, network engineers are able to concentrate on their primary responsibilities
    without being distracted by the infrastructure beneath them.


    # Multiple Platforms Are Supported


    Nornir is compatible with a wide variety of network platforms, including those
    developed by Cisco, Juniper, and Arista. Because of this, it is an excellent option
    for businesses that operate in a network environment that is highly diverse.


    # Open-Source


    Nornir is a library that is an open-source project, which means that it is freely
