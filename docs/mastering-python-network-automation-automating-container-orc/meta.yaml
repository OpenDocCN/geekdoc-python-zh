    \ retrieves the running configuration of a device using Netmiko:\n\n```\ndef get_config(task):\n\
    \    result = task.run(\n        task=netmiko_send_command,\n        command_string=\"\
    show running-config\",\n    )\n    task.host[\"config\"] = result.result\n```\n\
    \nIn this script, we define a function called get_config that takes a task as\
