    \n```\nx = True\ny = False\nprint(x, y)\n```\n\n输出：\n\n```\nTrue False\n```\n\n\
    ### 序列数据类型\n\nPython支持多种序列数据类型，如字符串、列表、元组和range对象。\n\n#### 字符串\n\n字符串是字符的序列。在Python中，字符串由`str`类表示。字符串可以用单引号（'...'）、双引号（\"\
