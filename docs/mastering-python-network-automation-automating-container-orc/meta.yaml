    \ 容器、镜像和网络。\n\n### 示例程序\n\n以下是使用 Python 及其库管理容器存储的步骤：\n\n安装 Docker SDK for Python：\n\
    \n```bash\npip install docker\n```\n\n导入 Docker SDK 模块：\n\n```python\nimport docker\n\
    ```\n\n创建一个 Docker 客户端对象：\n\n```python\nclient = docker.from_env()\n```\n\n创建一个容器：\n\
    \n```python\ncontainer = client.containers.create('ubuntu', command='/bin/bash',\
    \ tty=True, stdin_open=True)\n```\n\n启动容器：\n\n```python\ncontainer.start()\n```\n\
