    \n首先，我们需要确保 Istio 已安装并运行在我们的 Kubernetes 集群上。我们可以通过运行以下命令来做到这一点：\n\n```bash\n$\
    \ istioctl version\n```\n\n此命令将显示集群上安装的 Istio 版本。\n\n接下来，我们需要为我们的应用程序创建一个 Deployment\
