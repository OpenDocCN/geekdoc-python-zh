    # 第 4 章：配置库和实验室组件


    ## Nornir


    Nornir 框架是一个基于 Python 的自动化工具，专门为网络自动化任务开发。它是一个免费的开源库，提供了一种直接且灵活的方法来自动化网络任务。这使得网络工程师能够专注于手头的任务，而不必担心底层基础设施的问题。


    ## Nornir 的架构


    Nornir 的架构：Nornir 的架构基于在不同位置使用插件的思想。一个框架的功能可以通过一个称为插件的小代码片段来扩展。插件可以添加新功能或替换现有功能。


    在 Nornir 中，以下三个是主要的插件类别：


    ### Inventory 插件


    这包括设备的主机名、IP 地址以及任何其他可能相关的信息。YAML、CSV 和 SQL 都可以用作 Inventory 插件的格式。


    ### Processor 插件


    Processor 插件的工作是确保分配给它的任务在设备上成功执行。在向它提供任务和设备列表后，它会提供结果。SSH、NETCONF 和 REST 是可用的
    Processor 插件的一些示例。


    ### Result 插件


    它将结果保存在一个位置，其他插件可以快速检索这些位置以进行进一步处理。SQLite、JSON 和 CSV 是不同类型 Result 插件的一些示例。


    以下是构成 Nornir 架构的主要元素：


    -   在设备上执行特定操作的代码片段称为任务。任务可以使用任何编程语言创建，而 Processor 插件负责执行它们的指令。

    -   Inventory 是当前正在管理的所有不同设备的列表。你可以选择手动创建 Inventory，也可以使用 Inventory 插件自动创建。

    -   Processor 是设备上负责执行指令的组件。Nornir 自带多个不同的 Processor 插件，但用户也可以创建自己的定制 Processor
    插件。

    -   在设备上执行的任务的输出称为任务结果。结果保存在 Result 插件中，其他插件可以访问这些结果。


    ## Nornir 的重要性


    Nornir 是网络自动化的一个重要库，原因包括以下几点：


    ### 简化网络自动化


    Nornir 能够简化网络自动化，因为它提供了一个既简单又灵活的框架来自动化网络任务。因此，网络工程师能够专注于他们的主要职责，而不受底层基础设施的干扰。


    ### 支持多种平台


    Nornir 兼容多种网络平台，包括 Cisco、Juniper 和 Arista 开发的平台。因此，对于在高度多样化的网络环境中运营的企业来说，它是一个极好的选择。


    ### 开源


    Nornir 是一个开源项目库，这意味着它可以免费在线访问，并且可以修改以满足各种需求。因此，对于希望自动化其网络相关任务但又不想产生巨大成本的企业来说，它是一个极好的选择。


    ### 可扩展


    由于 Nornir 的架构围绕插件的思想构建，因此向框架添加新功能非常简单。此功能被称为“可扩展性”。因此，企业现在能够开发定制插件，用于自动化特定的网络任务。


    ### 与其他库集成


    Nornir 与其他 Python 库（如 Netmiko 和 Napalm）兼容，这使得自动化各种网络相关任务变得更加简单。例如，Netmiko 可用于自动化基于
    SSH 的网络设备，而 Napalm 可用于自动化基于 NETCONF 的网络设备。


    ### 集中访问点


    Nornir 为管理和自动化网络任务提供了一个集中访问点。这消除了网络工程师需要精通各种编程语言和框架来自动化网络流程的需要。


    简而言之，Nornir 是一个开源 Python 库，旨在通过提供一个灵活且可扩展的基础设施来自动化各种网络相关任务，从而使网络自动化更加用户友好。该框架的功能可以轻松扩展，这得益于其架构以插件思想为中心。Nornir
    兼容多种网络。


    ## Paramiko


    一个名为 Paramiko 的 Python 库提供了一种既简单又安全的方法来自动化 SSH（安全外壳）连接和文件传输。它是一个免费可用的库，在网络自动化领域被广泛用于各种任务，包括备份配置、升级软件以及在远程设备上执行命令。


    ## Paramiko 的架构


    Paramiko 的架构：Paramiko 的架构以以下两个主要组件为中心：


