    # Importing a Module


    Once you have created a module, you can import it into other Python scripts or
    modules. There are several ways to import a module:


    *import statement*


    Use the import statement followed by the name of the module to import the entire
    module.

    Example:


    ```

    import my_module

    my_module.hello("John")

    ```


    Output:


    ```

    Hello, John!

    ```


    *from statement*


    Use the from statement followed by the name of the module and the keyword import
    to import specific functions or variables from a module.

    Example:


    ```

    from my_module import hello

    hello("Jane")

    ```


    Output:


    ```

    Hello, Jane!

    ```


