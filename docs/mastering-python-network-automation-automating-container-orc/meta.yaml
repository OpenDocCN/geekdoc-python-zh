    \ is used to send the command to the device, and the output is printed to the\
    \ console using the print() function. Finally, the SSH connection is closed using\
    \ the close() method.\n\nTo run this script, save it as a .py file and execute\
    \ it using the command:\n\n```\npython script_name.py\n```\n\nThis will establish\
    \ an SSH connection to the device, send the specified command, and print the output\
    \ to the console.\n\nTo conclude, network automation using Python involves defining\
    \ variables, importing libraries, writing code to perform network automation tasks,\
    \ and testing and validating the results. By following these steps and using the\
    \ available tools and libraries, network engineers can automate repetitive tasks,\
    \ improve efficiency, and reduce errors in network management.\n\n## Testing Network\
    \ Automation Scripts\n\nDuring the development process, one of the most important\
