  md: '# Installing Istio


    The give below are the steps to install Istio:


    Download the Istio distribution: Go to the Istio release page on GitHub and download
    the Istio distribution for your operating system.


    Extract the Istio distribution: After downloading the Istio distribution, extract
    it to a local directory using the following command:


    ```

    tar -xzf istio-<version>-linux-amd64.tar.gz

    ```


    Add the Istio binary directory to your PATH: Navigate to the Istio directory you
    just extracted and add the bin subdirectory to your PATH environment variable
    using the following command:


    ```

    export PATH=$PWD/bin:$PATH

    ```


    Install Istio on your cluster: Use the istioctl command to install Istio on your
    Kubernetes cluster. The following command installs the Istio control plane components:


    ```

    istioctl install

    ```


    Verify the installation: Run the following command to ensure that all Istio components
    are running:


    ```

    kubectl get pods -n istio-system

    ```


