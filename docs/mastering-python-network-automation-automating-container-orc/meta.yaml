    \ Python 脚本\n\n```\nimport docker\n```\n\n创建一个 Docker 客户端对象\n\n```\nclient = docker.from_env()\n\
    ```\n\n这将创建一个 Docker 客户端对象，可用于与 Docker API 进行交互。\n\n创建一个新的容器网络\n\n```\nnetwork\
    \ = client.networks.create('my_network')\n```\n\n这将创建一个名为 \"my_network\" 的新容器网络。你可以通过向\
    \ `create()` 方法传递额外参数来配置网络设置。\n\n将容器连接到网络\n\n```\ncontainer = client.containers.get('my_container')\n\
    container.connect('my_network')\n```\n\n这将把名为 \"my_container\" 的容器连接到 \"my_network\"\
    \ 网络。你可以通过调用 `disconnect()` 方法来断开容器与网络的连接。\n\n## 列出所有容器网络\n\n```\nnetworks = client.networks.list()\n\
