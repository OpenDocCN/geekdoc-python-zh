    \ istio-system\n    ```\n    您应该会看到类似以下的输出：\n\n| NAME | READY | STATUS | RESTARTS\
    \ | AGE |\n|---|---|---|---|---|\n| istio-egressgateway-84bb7b48c4-qj6lh | 1/1\
    \ | Running | 0 | 4m47s |\n| istio-ingressgateway-659b64d86f-d7vlb | 1/1 | Running\
