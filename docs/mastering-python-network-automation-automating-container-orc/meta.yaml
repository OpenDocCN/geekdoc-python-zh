    ## 前言


    通过《精通 Python 网络自动化》，你可以利用 Python 及其库来简化容器编排、配置管理和弹性网络，从而成长为一名熟练的网络工程师或强大的 DevOps
    专业人员。


    本书从零开始，引导读者使用 NS3 网络模拟器和 Python 编程搭建网络自动化实验室。这包括安装 NS3，以及 nornir、paramiko、netmiko
    和 PyEZ 等 Python 库，还有端口、主机和服务器的配置。本书将教你成为熟练的自动化开发人员的技能，能够测试和修复自动化脚本中的任何错误。本书探讨了服务网格作为解决随时间推移而出现的服务间通信问题的方案。


    本书将引导你使用 Python 及其库自动化各种与容器相关的任务，包括容器编排、服务发现、负载均衡、容器存储管理、容器性能监控和滚动更新。Calico 和
    Istio 是两个知名的服务网格工具，你将了解如何设置和配置它们来管理流量路由、安全性和监控。


    本书涵盖的其他主题包括网络策略自动化、工作负载路由，以及指标、日志和追踪的收集与监控。你还将学习一些技巧，了解如何借助 Grafana 等工具收集和可视化
    Istio 指标。


    在本书中，你将学习如何：


    - 使用 Istio 进行集群流量管理、流量路由和服务网格实现。

    - 利用 Cilium 和 Calico 解决 Pod 网络问题，并实现网络策略和工作负载路由自动化。

    - 使用 etcd 和 HAProxy 负载均衡器以及容器存储来监控和管理 Kubernetes 集群。

    - 使用 NS3 模拟器、Python、虚拟环境和 VS Code 等工具建立网络自动化实验室。

    - 建立主机之间的连接、端口连接、SSH 连接、Python 库、NS3 和网络加密。


    ## GitforGits


    ## 先决条件


    《精通 Python 网络自动化》是网络工程师、DevOps 专业人员和开发人员的必备指南，他们希望借助 Terraform、Calico 和 Istio
    来简化容器编排和弹性网络。了解 Python 和网络基础知识就足以学习本书。


    ## 代码使用


    你需要一些有用的代码示例来辅助你的编程和文档编写吗？不必再找了！本书提供了丰富的补充材料，包括代码示例和练习。


