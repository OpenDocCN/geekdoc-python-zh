- md: 'The netcat command is another tool that can be used to test port connectivity.
    Unlike telnet, netcat allows you to send and receive data over the network. The
    netcat command is available on Linux and other Unix-like operating systems. To
    use netcat, you need to know the IP address or hostname of the remote host and
    the port number you want to connect to. For example, to test if port 22 is open
    on a remote server with IP address 192.168.0.2, you would use the following command:


    ```

    nc -vz 192.168.0.2 22

    ```


    The -v option makes the output more verbose, and the -z option makes netcat scan
    for listening daemons, without sending any data. The output of this command will
    indicate whether the port is open or not.


    To test port connectivity using the telnet command, use the following command:


    ```

    telnet <ip address or hostname> <port>

    ```


    For example, if you want to test port 80 on host2, you can use the following command:


    ```

    telnet host2 80

    ```


    To test port connectivity using the netcat command, use the following command:


    ```

    nc -vz <ip address or hostname> <port>

    ```


    For example, if you want to test port 80 on host2, you can use the following command:


    ```

    nc -vz host2 80

    ```


    ## Test SSH Connectivity


    SSH (Secure Shell) is a secure protocol used for remote login and other secure
    network services over an unsecured network. If you have configured SSH on your
    network, you can test SSH connectivity using the ssh command.


    The ssh command connects to a host using SSH and opens a shell on the remote host.
    This enables you to access the command-line interface of the remote host and execute
    commands as if you were physically present at the remote host.


    To test SSH connectivity using the ssh command, you need to have SSH client software
    installed on your local computer. Most modern operating systems, including Linux,
    macOS, and Windows, have SSH client software pre-installed, but if not, you can
    install it easily.


    To test SSH connectivity, use the following command:


    ```

    ssh <username>@<ip address or hostname>

    ```


    For example, if you want to test SSH connectivity to host2 as the user "user1",
    you can use the following command:


    ```

    ssh user1@host2

    ```


    ## Test Network Automation Libraries


    To test your network automation libraries, you can write a simple script that
    performs a basic task, such as retrieving the interface configuration of a network
    device. You can use the library documentation to determine the correct syntax
    and commands to use.


    For example, to test the PyEZ library, you can write a script that retrieves the
    interface configuration of a Juniper device. The script might look something like
    this:


    ```

    from jnpr.junos import Device

    dev = Device(host=<ip address or hostname>, user=<username>, password=<password>)

    dev.open()

    interfaces = dev.rpc.get_interface_information()

    print(interfaces)

    dev.close()

    ```


    ## Test NS3 Emulator


    To test the NS3 emulator, you can create a simple network topology and run a simulation.
    You can use the NS3 documentation to determine the correct syntax and commands
    to use.

    For example, to test the NS3 emulator, you can create a simple network topology
    with two nodes connected by a point-to-point link.


    The topology might look something like this:


    ```

    # Import NS3 modules

    import ns.applications

    import ns.core

    import ns.internet

    import ns.network

    ```


    ```

    # Create nodes

    node1 = ns.network.Node()

    node2 = ns.network.Node()

    ```


    ```

    # Create point-to-point link

    pointToPoint = ns.network.PointToPointHelper()

    pointToPoint.SetDeviceAttribute("DataRate",

    ns.core.StringValue("5Mbps"))

    pointToPoint.SetChannelAttribute("Delay",

    ns.core.StringValue("2ms"))

    ```


    ```

    # Create network interfaces

    device1 = pointToPoint.Install(node1)

    device2 = pointToPoint.Install(node2)

    address1 = ns.internet.Ipv4AddressHelper()

    address1.SetBase(ns.network.Ipv4Address("10.1.1.0"),

    ns.network.Ipv4Mask("255.255.255.0"))

    address2 = ns.internet.Ipv4AddressHelper()

    address2.SetBase(ns.network.Ipv4Address("10.1.2.0"),

    ns.network.Ipv4Mask("255.255.255.0"))

    ```


    ```

    # Assign IP addresses to interfaces

    interface1 = address1.Assign(device1)

    interface2 = address2.Assign(device2)

    ```


    ```

    # Create TCP sender and receiver applications

    packetSinkHelper =

    ns.applications.PacketSinkHelper("ns3::TcpSocketFactory",

    ns.network.InetSocketAddress(ns.network.Ipv4Address.GetAny(), 9))

    sink = packetSinkHelper.Install(node2)

    onOffHelper =

    ns.applications.OnOffHelper("ns3::TcpSocketFactory",

    ns.network.InetSocketAddress(interface2.GetAddress(0), 9))

    onOffHelper.SetAttribute("OnTime",

    ns.core.StringValue("ns3::ConstantRandomVariable[Constant=1.0]"))

    onOffHelper.SetAttribute("OffTime",

    ns.core.StringValue("ns3::ConstantRandomVariable[Constant=0.0]"))

    onOffHelper.SetAttribute("DataRate",

    ns.network.DataRateValue(ns.network.DataRate("5Mbps")))

    onOffHelper.SetAttribute("PacketSize",

    ns.core.UintegerValue(1000))

    ```


    ```

    source = onOffHelper.Install(node1)


    # Create simulation object and run

    simulator = ns.core.Simulator()

    simulator.Schedule(ns.core.Seconds(1.0), &source.Start)

    simulator.Schedule(ns.core.Seconds(10.0), &source.Stop)

    simulator.Run()

