    ## Install NS3 Network Simulator


    NS-3 is an open-source discrete-event network simulator that can be used to simulate
    and analyze various network protocols and scenarios. In this chapter, we will
    go through the practical steps to install NS-3 network simulator on Linux.


    ### System Requirements


    Before we start the installation, we need to ensure that the system meets the
    minimum requirements to run NS-3. The recommended system requirements are as follows:


    - Operating System: Linux (Ubuntu, Debian, Fedora, CentOS, other Linux distribution)

    - RAM: 2 GB

    - Processor: Dual-core or higher

    - Disk space: At least 5 GB free space


    ### Install Required Dependencies


    NS-3 has a number of dependencies that need to be installed before we can install
    NS-3. The following command will install the required dependencies:


    *For Ubuntu/Debian*


    ```

    sudo apt-get update

    sudo apt-get install gcc g++ python python-dev mercurial bzr gdb valgrind gsl-bin
    libgsl-dev libgsl23 libgslcblas0 python-pygraphviz python-kiwi python-pygoocanvas
    python-gnome2 python-rsvg ipython

    ```


    *For Fedora:*


    ```

    sudo dnf install gcc-c++ python python-devel mercurial bzr gdb valgrind gsl gsl-devel
    gsl-static pygtk2-devel pygobject2-devel graphviz graphviz-gd python-pygraphviz
    pygtk2 libxml2 libxml2-devel libxml2-python PyQt4 PyQt4-devel qt4-devel qt4 qt-devel
    python-qwt5-qt4 python-qwt5-qt4-devel python-qwt5-qt4-doc PyQt4-doc PyQt4-qscintilla
    PyQt4-qscintilla-devel PyQt4-qscintilla-python PyQt4-devel PyQt4-webkit PyQt4-webkit-devel
    qt-webkit-devel qtwebkit-devel gnome-python2-gnomevfs gnome-python2-gnomevfs-devel
    gnome-python2-gnomekeyring gnome-python2-gnomekeyring-devel gnome-python2-extras
    gnome-python2-extras-devel gnome-python2-bonobo gnome-python2-bonobo-devel gnome-python2-canvas
    gnome-python2-canvas-devel gnome-python2-gtkhtml2 gnome-python2-gtkhtml2-devel
    python-numeric python-numpy python-scipy python-matplotlib python-matplotlib-doc
    python-matplotlib-tk python-matplotlib-wx python-setuptools python-twisted python-zope-interface
    PyQt4-qsci-devel PyQt4-qsci

    ```


    ### Download NS-3


    NS-3 can be downloaded from the official website or cloned from the Git repository.
    We will use the Git repository to download NS-3.


    Open a terminal and navigate to the directory where you want to download NS-3.
    Then, run the following command to clone the Git repository:


    ```

    git clone https://gitlab.com/nsnam/ns-3-allinone.git

    ```


    ### Step 4: Build NS-3


    After downloading NS-3, we need to build it. Change the directory to the NS-3-allinone
    directory and run the following command:


    ```

    cd ns-3-allinone

    ./build.py --enable-examples --enable-tests

    ```


    The above command will build NS-3 with examples and tests. If you want to build
    NS-3 without examples and tests, use the following command:


    ```

    ./build.py

    ```


    Note: The build process may take some time depending on your system specifications.


    ### Step 5: Test NS-3


    After building NS-3, we can test it by running a sample program. Change the directory
    to the NS-3 directory and run the following command:


    ```

    cd ns-3-dev

    ./waf --run hello-simulator

    ```


    This command will run the "hello-simulator" program, which is a simple program
    that creates a simulation and runs it.


    If everything is working properly, you should see the following output:


    ```

    Running "build" task

    Running build

    No tests defined.

    Running "run" task

    Running run

    Hello Simulator

    Simulation completed successfully

    ```


    Congratulations! You have successfully installed NS-3 on Linux.


    ### Step 6: Using NS-3


    To use NS-3, you can start by exploring the example programs that come with the
    simulator. The examples are located in the "examples/" directory.


    For example, you can run the following command to simulate a simple point-to-point
    network:


    ```

    cd examples/tutorial/first

    ./waf --run scratch/first

    ```


    This will create a simulation of a point-to-point network with two nodes, and
    the output will show the packets being transmitted between the nodes.


    To create your own simulations, you can use the NS-3 API, which provides a rich
    set of classes and functions for creating and configuring network topologies,
    traffic generators, and protocol stacks.


    To conclude, NS-3 is a powerful network simulator that can be used to simulate
    and analyze various network scenarios. In this chapter, we went through the practical
    steps to install NS-3 on Linux. We also explored how to test NS-3 and use it to
    create simple simulations.


    ## Install Python


    Python is a popular programming language that is widely used for network automation.
    In this chapter, we will go through the practical steps to install Python for
    network automation on a Linux system.


    ### Update System


    Before installing Python, we need to update the system to ensure that we have
    the latest software packages. Open a terminal and run the following command to
    update the system:


    ```

    sudo apt-get update

    ```


    ### Install Python


    Python is pre-installed on most Linux distributions. However, we can install the
    latest version of Python by running the following command:


    ```

    sudo apt-get install python3

    ```


    This command will install Python 3, which is the latest version of Python.


    ### Install pip


    Pip is a package manager for Python that is used to install and manage Python
    packages. To install pip, run the following command:


    ```

    sudo apt-get install python3-pip

    ```


    ### Install paramiko, Netmiko and Nornir


    Python has a number of libraries that are specifically designed for network automation.
    Some of the popular libraries include:


    - paramiko: A library for SSH connectivity

    - Netmiko: A library for network device access over SSH

    - Nornir: A library for network automation and orchestration


    To install these libraries, run the following command:


    ```

    sudo pip3 install paramiko netmiko nornir

    ```


    This command will install the paramiko, netmiko, and nornir libraries.


    ### Install Virtual Environment


    Virtual environment is a tool that is used to create isolated Python environments.
    This is useful when working on multiple projects with different dependencies.
    To install virtual environment, run the following command:


    ```

    sudo pip3 install virtualenv

    ```


    ### Create Virtual Environment


    To create a virtual environment, run the following command:


    ```

    virtualenv myenv

    ```


    This command will create a virtual environment named "myenv" in the current directory.


    ### Activate the Virtual Environment


    To activate the virtual environment, run the following command:


    ```

    source myenv/bin/activate

    ```


    This command will activate the virtual environment, and you will see the name
    of the virtual environment in the command prompt.


    ### Install Python Libraries in Virtual Environment


    To install Python libraries in the virtual environment, run the following command:


    ```

    pip3 install paramiko netmiko nornir

    ```


    This command will install the paramiko, netmiko, and nornir libraries in the virtual
    environment.


    ### Deactivate the Virtual Environment


    To deactivate the virtual environment, run the following command:


    ```

    deactivate

    ```


    This command will deactivate the virtual environment.


    By following these steps, you can start developing network automation scripts
    using Python.


