    \ and mistakes that are associated with manually managing a network. This is the\
    \ goal of network automation.\n\nWhen it comes to network automation, unstable\
    \ and non-compliant configurations can lead to a variety of problems, including\
    \ downtime for the network, security breaches, and violations of compliance regulations.\
    \ A network configuration is said to have an unstable configuration if it is not\
    \ operating correctly or efficiently, which can result in performance issues,\
    \ network outages, and other issues. A configuration that does not adhere to industry\
    \ standards or best practices is referred to as having a non-compliant configuration.\
    \ This type of configuration can result in security flaws, compliance violations,\
    \ and other problems.\n\nThere are a few steps involved in the process of identifying\
    \ unstable and non-compliant configurations in network automation. The first thing\
    \ that needs to be done is to establish a baseline configuration for each network\
    \ device. This configuration should include the settings for the device that are\
    \ regarded as stable and compliant. Typically, the baseline configuration is established\
    \ based not only on the specific requirements of the network but also on the industry\
    \ standards and best practices that are currently in use.\n\nThe following step\
    \ is to compare the actual configuration of each network device to the configuration\
    \ that was used as a baseline for that device. This can be accomplished through\
    \ the utilisation of a wide range of tools and technologies, including network\
    \ management systems (NMS), configuration management databases (CMDB), and network\
    \ automation tools. The comparison has the ability to identify any differences\
    \ between the actual configuration and the baseline configuration, which can indicate\
    \ configurations that are unstable or do not comply with standards.\n\nThe unstable\
    \ and non-compliant configurations will need to be remedied after they have been\
    \ identified as the next step in the process. In order to restore the configuration\
    \ settings to their original, compliant and stable state, remediation requires\
    \ making the necessary adjustments. This can be accomplished in two ways: manually,\
    \ by making adjustments to the configuration settings; automatically, by utilising\
    \ tools that are designed for network automation.\n\nWhen it comes to network\
    \ automation, one of the most important tasks is finding unstable and non-compliant\
    \ configurations. This helps to ensure that the network infrastructure operates\
    \ as smoothly as possible. Network automation can improve the performance, reliability,\
    \ and security of a network while simultaneously lowering the risk of network\
    \ downtime, security breaches, and compliance violations. This is accomplished\
    \ by first establishing a baseline configuration, then comparing the actual configuration\
    \ to the baseline configuration, and finally remediating any unstable or non-compliant\
    \ configurations that are found.\n\nIn this section, we will explain how to automate\
    \ this process using Python with the help of the Netmiko library.\n\n## Establish\
    \ Connection with Device\n\nFirst, we need to establish a connection with the\
    \ device using the Netmiko library. Netmiko is a multi-vendor library that allows\
    \ you to automate network tasks on different types of devices. It supports SSH\
    \ and Telnet connections and provides a simple and consistent interface to manage\
    \ devices.\n\nFollowing is a sample code to connect to a device using Netmiko:\n\
    \n```\nfrom netmiko import ConnectHandler\n\ndevice = {\n    'device_type': 'cisco_ios',\n\
    \    'ip': '192.168.1.1',\n    'username': 'username',\n    'password': 'password',\n\
    }\nssh_conn = ConnectHandler(**device)\n```\n\n## Retrieve Running Configuration\n\
    \nOnce we have established a connection, we can execute show commands on the device\
    \ to retrieve information about its configuration. For example, we can execute\
    \ the \"show running-config\" command to retrieve the running configuration of\
