  md: '# Automated Rolling of Updates


    Automating rolling updates is an important part of maintaining a containerized
    application. It ensures that the application is always running on the latest version
    of the code while minimizing downtime. In this sample program illustration, we
    will use Python to automate rolling updates of a simple Flask application running
    in a Kubernetes cluster.


    We will assume that the Flask application is already deployed and running in the
    Kubernetes cluster, and that the Docker image for the application has been updated
    with new code.


    # Get Current Deployment Object


    We will use the kubernetes Python library to get the current deployment object
    for the Flask application.


    ```

    from kubernetes import client, config

    config.load_kube_config() # Use local kubeconfig

    v1 = client.AppsV1Api()

    deployment_name = "flask-app-deployment"

    namespace = "default"

    deployment = v1.read_namespaced_deployment(deployment_name, namespace)

    ```


