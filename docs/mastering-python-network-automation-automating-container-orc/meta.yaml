    \ {1, 2, 3, 4, 5}\ny = {4, 5, 6, 7, 8}\nprint(x, y)\n```\n\n输出：\n\n```\n{1, 2,\
    \ 3, 4, 5} {4, 5, 6, 7, 8}\n```\n\n### 二进制数据类型\n\nPython支持两种二进制数据类型：`bytes`和`bytearray`。\n\
