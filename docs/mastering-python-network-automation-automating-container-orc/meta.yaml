    ssh.connect(ip_address, username=username, password=password)\n# Send Command\n\
    stdin, stdout, stderr = ssh.exec_command(command)\n# Print Output\nprint(stdout.read().decode())\n\
    # Close Connection\nssh.close()\n```\n\nIn this script, the paramiko library is\
    \ imported and used to establish an SSH connection to a network device with the\
    \ specified IP address, username, and password. The command variable is defined\
