    ```

    sudo apt-get update

    ```


    ### 安装 Python


    Python 在大多数 Linux 发行版中是预装的。但是，我们可以通过运行以下命令安装最新版本的 Python：


    ```

    sudo apt-get install python3

    ```


    此命令将安装 Python 3，这是 Python 的最新版本。


    ### 安装 pip


    Pip 是一个 Python 包管理器，用于安装和管理 Python 包。要安装 pip，请运行以下命令：


    ```

    sudo apt-get install python3-pip

    ```


    ### 安装 paramiko、Netmiko 和 Nornir


