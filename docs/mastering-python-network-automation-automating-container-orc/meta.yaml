    secure, and it is compatible with a number of different cloud providers, operating
    systems, and orchestrators.


    # ## Characteristics of Calico


    Calico is designed for large-scale deployments and is capable of managing millions
    of endpoints in addition to thousands of nodes. It is both quick and scalable.
    Calico provides network security at scale by restricting network traffic between
    workloads using fine-grained access control lists (ACLs).


    Calico is compatible with a wide variety of cloud providers, operating systems,
    and orchestrators due to its adaptability and agnostic nature towards the underlying
    infrastructure. It is simple to deploy and manage. Calico offers a straightforward
    and user-friendly API for the management of network policies, and it can be deployed
    in a matter of minutes by utilising well-known tools such as Kubernetes.


    Calico makes use of a distributed architecture, which means that network policies
    are enforced at the endpoints (that is, on the nodes where the workloads are running),
    rather than on a central controller. This makes it possible to achieve greater
    scalability and resilience, in addition to improved performance.


