    \n```\nx = bytearray(b'Hello')\nx[0] = 72\nprint(x)\n```\n\n输出：\n\n```\nbytearray(b'Hello')\n\
    ```\n\n总的来说，Python支持多种数据类型，如数值、布尔、序列、映射、集合和二进制数据类型。理解这些数据类型及其特性对于编写高效且有效的Python程序至关重要。\n\
    \n## 探索循环\n\nPython中的循环用于重复执行一组指令。Python中有两种类型的循环：`for`循环和`while`循环。在本教程中，我们将通过实际示例讨论这两种循环。\n\
    \n### For循环\n\n`for`循环用于遍历序列（如列表、元组或字符串）或其他可迭代对象（如字典或文件）。`for`循环的语法如下：\n\n```\n\
    for variable in sequence:\n    # 要执行的代码\n```\n\n`for`循环首先用序列中的第一个值初始化变量。然后，它执行代码块，直到达到序列中的最后一个值。\n\
    \n示例#1：遍历列表\n\n```\nfruits = ['apple', 'banana', 'cherry']\nfor fruit in fruits:\n\
    \    print(fruit)\n```\n\n输出：\n\n```\napple\nbanana\ncherry\n```\n\n示例#2：遍历字符串\n\
    \n```\nname = 'John'\nfor character in name:\n    print(character)\n```"
