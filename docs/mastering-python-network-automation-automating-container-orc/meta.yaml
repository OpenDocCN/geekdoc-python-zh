  md: '# Complex Numbers


    A complex number is a number that has both a real and imaginary part. In Python,
    complex numbers are represented by the complex class. For example, 3 + 4j is a
    complex number where 3 is the real part and 4j is the imaginary part.


    ```

    x = 3 + 4j

    y = -2 - 3j

    print(x, y)

    ```


    Output:


    ```

    (3+4j) (-2-3j)

    ```


    # Boolean Data Type


    A boolean data type is a data type that can have one of two possible values: True
    or False. In Python, boolean values are represented by the bool class. Boolean
    values are used in conditional statements and loops to control program flow.


    ```

    x = True

    y = False

    print(x, y)

    ```


    Output:


    ```

    True False

    ```


    # Sequence Data Types


    Python supports several sequence data types such as strings, lists, tuples, and
    range objects.


    # Strings


    A string is a sequence of characters. In Python, strings are represented by the
    str class. Strings can be enclosed in single quotes (''...'') or double quotes
    ("...") or triple quotes ("""...""" or "''''''").'
