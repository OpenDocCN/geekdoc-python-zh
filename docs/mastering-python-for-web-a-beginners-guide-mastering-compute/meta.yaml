    \ built-in objects. Even if you can access all of these Python built-in objects\
    \ without importing anything, you can also explicitly import builtins and access\
    \ the names using the dot notation.\n\n## MODIFYING THE BEHAVIOR OF A PYTHON SCOPE\n\
    \nTo review, by now you should know how a Python scope works and how they restrict\
    \ the visibility of variables, functions, classes, and other Python objects to\
    \ certain items of your code. You now know that you can locate or reference global\
    \ names from any place in your code, but they could be modified or updated only\
    \ from within the global Python scope. You should also know that you can access\
    \ local names only from inside the local Python scope they were designed or inside\
    \ a nested function, but you will not be able to access them from the global Python\
    \ scope or other local scopes. In addition, you must have learned that nonlocal\
    \ names can be accessed from inside nested functions, but they cannot be modified\
    \ or updated from there.\n\nEven if Python scopes follow these general rules by\
    \ default, there are still ways to modify this standard behavior. Python has two\
    \ keywords that let you edit the content of global and nonlocal names. These two\
    \ keywords are: global and nonlocal.\n\n## The Global Statement\n\nIt must be\
    \ clear by now that when you try to assign a value to a global name inside a function,\
    \ you create a new local name in the function scope. To adjust this behavior,\
    \ you can use a global statement. With this statement, you can make up a list\
    \ of names that are going to be treated as global names. The statement includes\
    \ the global keyword followed by one or more names separated by commas. You can\
    \ also utilize multiple global statements with a name (or a list of names). All\
    \ the names that you list in a global statement will be marked in the global or\
    \ module scope in which you define them.\n\n## The Nonlocal Statement\n\nJust\
    \ like global names, nonlocal names can also be accessed from inner functions,\
    \ but not assigned or updated. In case you wish to modify them, then you need\
    \ to use a nonlocal statement. Applying a nonlocal statement will let you define\
    \ a list of names that are going to be treated as nonlocal.\n\nThe nonlocal statement\
    \ consists of the nonlocal keyword together with one or more names separated by\
    \ commas. These names will refer to the same names in the enclosing Python's scope.\
    \ The following example shows how you can use nonlocal to change a variable in\
    \ the enclosing or nonlocal scope:\n\n```python\n>>> def func():\n...     var\
    \ = 50  # A nonlocal variable\n...     def nested():\n...         nonlocal var\
    \  # Declare var as nonlocal\n...         var += 50\n...     nested()\n...   \
    \  print(var)\n...\n>>> func()\n100\n```\n\nUsing the statement `nonlocal var`,\
    \ you are telling Python that you need to modify `var` inside `nested()`. Then,\
    \ you implement `var` using an augmented assignment operation. This change is\
    \ presented in the nonlocal name `var`, which now has a value of 100. Unlike global,\
    \ you are not able to apply nonlocal outside of a nested or enclosed function.\
    \ To be more direct, you cannot use a nonlocal statement in either the global\
    \ scope or in a local scope. To illustrate with an example:\n\n```python\n>>>\
    \ nonlocal my_var  # Try to use nonlocal in the global scope\n  File \"<stdin>\"\
    , line 1\nSyntaxError: nonlocal declaration cannot be allowed at the module level\n\
    >>> def func():\n...     nonlocal var  # Try to use nonlocal in a local scope\n\
    ...     print(var)\n...\n  File \"<stdin>\", line 2\nSyntaxError: no binding for\
    \ nonlocal 'var' found\n```\n\nAt first, you tried to use a nonlocal statement\
    \ in the global Python scope, but since nonlocal only works inside an inner or\
    \ nested function, you end up getting a SyntaxError telling you that you cannot\
    \ apply nonlocal in a module scope. In-depth information on the nonlocal statement\
    \ operations could be found in PEP 3104 – Access to Names in Outer Scopes.\n\n\
    Unlike with global, you cannot use nonlocal to make up lazy nonlocal names. Names\
    \ should already exist in the enclosing Python scope if you want to apply them\
    \ as nonlocal names. This means that you cannot manage nonlocal names by declaring\
    \ them in a nonlocal statement in a nested function. Take a look at the following\
    \ code example:\n\n```python\n>>> def func():\n...     def nested():\n...    \
    \     nonlocal lazy_var  # Try to create a nonlocal lazy name\n...\n  File \"\
    <stdin>\", line 3\nSyntaxError: no binding for nonlocal 'lazy_var' found\n```\n\
    \nUsing this example you can see that when you try to define a nonlocal name using\
    \ `nonlocal lazy_var`, Python immediately raises a SyntaxError because `lazy_var`\
    \ is not executed in the enclosing scope of `nested()`.\n\n## Using Enclosing\
    \ Scopes as Closures\n\nClosures are of a specific use case for enclosing Python\
    \ scope. When you handle a nested function as data, the statements that create\
    \ that function are placed together with the environment in which they are implemented.\
    \ The resulting item is known as a closure. To be precise, a closure is an inner\
    \ or nested function that contains data about its enclosing scope, even if this\
    \ scope has completed its execution. In addition, closures also provide a way\
    \ to keep state information between function calls. This can be particularly useful\
    \ if you need to write code based on the concept of lazy or delayed evaluation.\n\
    \nSome also name this kind of function a factory, a factory function, or a closure\
    \ factory to specify that the function builds and returns closures, instead of\
    \ classes or instances.\n\n## Bringing Names to Scope with Import\n\nWhen it comes\
    \ to writing a Python program, it usually starts by organizing the code into several\
    \ modules. In order to manage your program, you would need to bring the names\
    \ in those separate modules to your `__main__` module. To do that, you should\
    \ import the modules or the names explicitly. This is the quickest way you can\
    \ use those names in your main global Python scope. The following code is an example\
    \ of what happens when you import some standard modules and names:\n\n```python\n\
    >>> dir()\n['__annotations__', '__builtins__',...,\n'__spec__']\n>>> import sys\n\
    >>> dir()\n['__annotations__', '__builtins__',...,\n'__spec__', 'sys']\n>>> import\
    \ os\n>>> dir()\n['__annotations__', '__builtins__',...,\n'__spec__', 'os', 'sys']\n\
    >>> from functools import partial\n>>> dir()\n['__annotations__', '__builtins__',...,\n\
    '__spec__', 'os', 'partial', 'sys']\n```\n\nYou start by importing `sys` and `os`\
    \ from the Python standard library. By calling `dir()` with no arguments, you\
    \ can observe that these modules are now available for you as names in your current\
    \ global scope. This way, you can add dot notation to get access to the names\
    \ that are defined in `sys` and `os`. In the next import operation, you use the\
    \ form `from <module> import <name>`. With that, you can use the imported name\
    \ directly in your code. To put it simply, there is no need to explicitly use\
    \ the dot notation.\n\n## Reviewing Unusual Python Scopes\n\nNot all Python structures\
    \ seem to fit into the LEGB rule for Python scopes. These structures include the\
    \ following:\n\n- Comprehensions\n- Exception blocks\n- Classes and instances\n\
    \nKnowing how Python scope works on these three structures will enable you to\
    \ avoid random errors related to the use of names in these types of Python structures.\n\
    \n## Comprehension Variables Scope\n\nA comprehension structure is a compact way\
    \ to operate with all or part of the items in a collection or sequence. You can\
    \ apply comprehensions to make lists, dictionaries, and sets. Comprehensions consist\
    \ of a couple of brackets (`[]`) or curly braces (`{}`) containing an expression,\
    \ followed by one or more `for` clauses and then zero or one `if` clause per `for`\
    \ clause. Nevertheless, the `for` clause in a comprehension runs in a similar\
    \ way with a traditional `for` loop. The loop variable in comprehension is local\
    \ to the structure. To demonstrate with the following code:\n\n```python\n>>>\
    \ [item for item in range(5)]\n[0, 1, 2, 3, 4]\n>>> item # Try to access the comprehension\
    \ variable\nTraceback (most recent call last):\n  File \"<stdin>\", line 1, in\
    \ <module>\n    item\nNameError: name 'item' is not defined\n```\n\nIf you run\
    \ the list comprehension, the variable `item` is deleted and you cannot access\
    \ its value anymore. It is unlikely that you would need to use the variable outside\
    \ of this comprehension, but anyway, Python makes sure that its value is no longer\
    \ accessible once the comprehension is completed.\n\n## Exception Variables Scope\n\
    \nAnother atypical case of Python scope that you'll encounter is the case of the\
