- md: "## Joining Two Strings\n\nThere are many ways to join string values in python.\
    \ Yet, the most simple way to combine two string values in python is to use the\
    \ ‘+’ operator. In this case, two string values are assigned in two variables,\
    \ and another variable is used to store the joined values that are printed later.\n\
    \n```python\nstring1 = \"Hello\"\nstring2 = \"World\"\njoined_string = string1\
    \ + string2\nprint(joined_string)\n```\n\nThe following output will appear after\
    \ running the script from the editor. As a result, two words, “Hello” and “World”\
    \ are joined, and “HelloWorld” is printed as output.\n\n## Format Floating Point\
    \ in the String\n\nFloating point number is required in programming for making\
    \ up fractional numbers, and sometimes it takes formatting the floating-point\
    \ number for programming purposes. String formatting and string interpolation\
    \ are used in the following script to format a floating-point number.\n\nformat()\
    \ method with format width is used in string formatting, and “%” symbol with the\
    \ format with width is used in string interpolation. According to the formatting\
    \ width, 5 digits are set before the decimal point, and 2 digits are set after\
    \ the decimal point.¹\n\n```python\n# Use of String Formatting\nfloat1 = 563.78453\n\
    print(\"{:5.2f}\".format(float1))\n\n# Use of String Interpolation\nfloat2 = 563.78453\n\
    print(\"%5.2f\" % float2)\n```\n\nThe following output will be available after\
    \ running the script from the editor.\n\n## Raise a Number To a Power\n\nIn the\
    \ following script, three ways are displayed to calculate the xn in Python. Double\
    \ ‘*’ operator, pow() method, and math.pow() method are used for calculating the\
    \ xn. The values of x and n are initialized with numeric values. Double ‘*’ and\
    \ pow() methods are used for calculating the power of integer values. math.pow()\
    \ can calculate the power of fractional numbers; also, that is shown in the last\
    \ part of the script.²\n\n```python\nimport math\n# Assign values to x and n\n\
    x = 4\nn = 3\n\n# Method 1\npower = x ** n\nprint(\"%d to the power %d is %d\"\
    \ %\n(x,n,power))\n\n# Method 2\npower = pow(x,n)\nprint(\"%d to the power %d\
    \ is %d\" %\n(x,n,power))\n\n# Method 3\npower = math.pow(2,6.5)\nprint(\"%d to\
    \ the power %d is %5.2f\" %\n(x,n,power))\n```\n\nThe following output will appear\
    \ after running the script. The first two outputs will have the result of 43,\
    \ and the third output will show the result of 26.5.\n\n## Working with Boolean\
    \ Types\n\nThe different uses of Boolean types are shown in the following script.\
    \ The first output will print the value of val1 that contains the Boolean value,\
    \ true. All positive are negative numbers return true as Boolean value and only\
    \ zero returns false as a Boolean value. Hence, the second and third outputs will\
    \ print true for positive and negative numbers. The fourth output will print false\
    \ for 0, and the fifth output will print false because the comparison operator\
    \ returns false.³\n\n```python\n# Boolean value\nval1 = True\nprint(val1)\n\n\
    # Number to Boolean\nnumber = 7\nprint(bool(number))\n\nnumber = -10\nprint(bool(number))\n\
    \nnumber = 0\nprint(bool(number))\n\n# Boolean from comparison operator\nval1\
    \ = 4\nval2 = 6\nprint(val1 < val2)\n```\n\nThe following output will appear after\
    \ running the script.\n\n## Use of If-Else Statement\n\nThe following script is\
    \ used to create a conditional statement in python. The declaration of the if-else\
    \ statement in python is different than other languages – no curly brackets are\
    \ required to define the if-else block in python like other languages, but the\
    \ indentation block must be added properly other the script will show an error.\
    \ A colon(:) is used after the ‘if’ and ‘else’ block to define the starting of\
    \ the block.\n\n```python\n# Assign a numeric value\nnumber = 77\n\n# Check the\
    \ is more than 77 or not\nif (number >= 77):\n    print(\"You have passed\")\n\
    else:\n    print(\"You have not passed\")\n```\n\nThe following output will appear\
    \ after running the script.\n\n## Use of AND and OR Operators\n\nThe following\
    \ script applied to AND and OR operators in the conditional statement. AND operator\
    \ returns true when the two conditions return true, and OR operator returns true\
    \ when any condition of two conditions returns true. Two floating-point numbers\
    \ will be taken as MCQ and theory marks.\n\n```python\n# Take MCQ marks\nmcq_marks\
    \ = float(input(\"Enter the MCQ marks: \"))\n# Take theory marks\ntheory_marks\
    \ = float(input(\"Enter the Theory marks: \"))\n\n# Check the passing condition\
    \ using AND and OR operator\nif (mcq_marks >= 20 and theory_marks >= 10) or (mcq_marks\
    \ + theory_marks) >=30:\n    print(\"\\nYou have passed\")\nelse:\n    print(\"\
    \\nYou have failed\")\n```\n\nModules or Modular programming stand for the process\
    \ of breaking a large, complex programming task into separate, smaller subtasks\
    \ or modules. Individual modules can then be piled together like building bricks\
    \ to create another application. There are multiple advantages to modularizing\
    \ code when it comes to larger application:\n\n- **Simplicity:** Rather than focusing\
    \ on the entire problem at hand, a module allows you to focus on one small portion\
    \ of the problem. And if you are working on a single module, you know you have\
    \ a smaller problem domain to tackle first. This makes overall development manageable\
    \ and less error-prone.\n- **Maintainability:** Modules are typically designed\
    \ to create logical boundaries between different problems and tasks. If modules\
    \ are written to minimize interdependency, there is a decreased possibility that\
    \ modifications to a single module will impact other bits of the program. This\
    \ way, you might even be able to make changes to a module without having any knowledge\
    \ of the script outside that module. This makes it more convenient for a team\
    \ of many developers to work in collaboration on a large application.\n- **Reusability:**\
    \ Functionality defined in a single module can be easily reused through an appropriately\
    \ defined interface. With that, there is no need to duplicate your codes.\n- **Organizing:**\
    \ Modules usually define a separate namespace, which helps prevent any collisions\
    \ between identifiers to happen.\n\nTypically, there are three different ways\
    \ to define a module in Python: a module can be written in Python itself; it can\
    \ be written in C and loaded dynamically at run-time, or a built-in module could\
    \ intrinsically be contained in the interpreter. Nevertheless, a module's contents\
    \ are accessed the same way in all three cases via the import statement. Module\
    \ contents are made available to the caller with the import statement as shown\
    \ below:\n\n```python\nimport <module_name>\n```\n\nThis is the simplest that\
    \ does not make the module contents directly accessible to the caller. Each module\
    \ has its own private symbol table, which also serves as the global symbol table\
    \ for all objects defined in the module. Thus, it also lets a module create a\
    \ separate namespace, as previously noted.\n\n## Locating Modules\n\nWhen you\
    \ import a module, the Python interpreter searches for the module in the current\
    \ directory. And in case the module is not found, Python then searches each directory\
    \ in the shell variable PYTHONPATH. If that fails too, Python checks the default\
    \ path. On UNIX, this default path is normally/usr/local/lib/python/.\nTo be precise,\
    \ the module search path is stored in the sys- tem module sys as the sys.path\
    \ variable. The sys.path vari- able contains the current directory, PYTHONPATH,\
    \ and the installation-dependent default. The PYTHONPATH is an environment variable,\
    \ consisting of a list of directories and the syntax of PYTHONPATH is similar\
    \ to that of the shell variable PATH.\nHere is the common PYTHONPATH from a Windows\
    \ system –\n\n```bash\nset PYTHONPATH = c:\\python20\\lib;\n```\n\nAnd here is\
    \ the basic PYTHONPATH from a UNIX system –\n\n```bash\nset PYTHONPATH = /usr/local/lib/python\n\
    ```\n\n## Standard Modules\n\nPython comes with a library of standard modules,\
    \ described in a separate document, also known as the Python Library\n\n---\n\
    ¹ https://linuxhint.com/python_scripts_beginners_guide/#post-67157-02, Python\n\
    ² https://linuxhint.com/python_scripts_beginners_guide/#post-67157-02, Python\n\
    ³ https://linuxhint.com/python_scripts_beginners_guide/#post-67157-02, Python"
  mdcn: "## 连接两个字符串\n\n在 Python 中连接字符串值的方法有很多。然而，连接两个字符串值最简单的方法是使用 ‘+’ 运算符。在这种情况下，两个字符串值被赋给两个变量，然后使用另一个变量来存储连接后的值，之后再打印出来。\n\
    \n```python\nstring1 = \"Hello\"\nstring2 = \"World\"\njoined_string = string1\
    \ + string2\nprint(joined_string)\n```\n\n运行脚本后，将出现以下输出。结果是，两个单词 “Hello” 和 “World”\
    \ 被连接起来，并打印出 “HelloWorld” 作为输出。\n\n## 格式化字符串中的浮点数\n\n编程中需要浮点数来构成小数，有时为了编程目的需要对浮点数进行格式化。以下脚本使用了字符串格式化和字符串插值来格式化浮点数。\n\
    \n字符串格式化使用了带格式宽度的 `format()` 方法，字符串插值使用了带格式宽度的 “%” 符号。根据格式宽度，小数点前设置 5 位数字，小数点后设置\
    \ 2 位数字。¹\n\n```python\n# 使用字符串格式化\nfloat1 = 563.78453\nprint(\"{:5.2f}\".format(float1))\n\
    \n# 使用字符串插值\nfloat2 = 563.78453\nprint(\"%5.2f\" % float2)\n```\n\n运行脚本后，将出现以下输出。\n\
    \n## 计算数字的幂\n\n以下脚本展示了在 Python 中计算 x 的 n 次幂的三种方法。使用了双星号 ‘*’ 运算符、`pow()` 方法和 `math.pow()`\
    \ 方法来计算 x 的 n 次幂。x 和 n 的值用数值初始化。双星号 ‘*’ 和 `pow()` 方法用于计算整数值的幂。`math.pow()` 可以计算小数的幂；这也在脚本的最后一部分中展示。²\n\
    \n```python\nimport math\n# 为 x 和 n 赋值\nx = 4\nn = 3\n\n# 方法 1\npower = x ** n\n\
    print(\"%d to the power %d is %d\" %\n(x,n,power))\n\n# 方法 2\npower = pow(x,n)\n\
    print(\"%d to the power %d is %d\" %\n(x,n,power))\n\n# 方法 3\npower = math.pow(2,6.5)\n\
    print(\"%d to the power %d is %5.2f\" %\n(x,n,power))\n```\n\n运行脚本后，将出现以下输出。前两个输出的结果将是\
    \ 4 的 3 次幂，第三个输出将显示 2 的 6.5 次幂的结果。\n\n## 使用布尔类型\n\n以下脚本展示了布尔类型的不同用法。第一个输出将打印包含布尔值\
    \ `true` 的 `val1` 的值。所有正数和负数作为布尔值返回 `true`，只有零作为布尔值返回 `false`。因此，第二个和第三个输出将为正数和负数打印\
    \ `true`。第四个输出将为 0 打印 `false`，第五个输出将打印 `false`，因为比较运算符返回 `false`。³\n\n```python\n\
    # 布尔值\nval1 = True\nprint(val1)\n\n# 数字转布尔值\nnumber = 7\nprint(bool(number))\n\
    \nnumber = -10\nprint(bool(number))\n\nnumber = 0\nprint(bool(number))\n\n# 来自比较运算符的布尔值\n\
    val1 = 4\nval2 = 6\nprint(val1 < val2)\n```\n\n运行脚本后，将出现以下输出。\n\n## 使用 If-Else\
    \ 语句\n\n以下脚本用于在 Python 中创建条件语句。Python 中 if-else 语句的声明与其他语言不同——在 Python 中定义 if-else\
    \ 块不需要像其他语言那样使用花括号，但必须正确添加缩进块，否则脚本将显示错误。在 ‘if’ 和 ‘else’ 块之后使用冒号(:) 来定义块的开始。\n\n\
    ```python\n# 赋值一个数值\nnumber = 77\n\n# 检查是否大于 77\nif (number >= 77):\n    print(\"\
    You have passed\")\nelse:\n    print(\"You have not passed\")\n```\n\n运行脚本后，将出现以下输出。\n\
    \n## 使用 AND 和 OR 运算符\n\n以下脚本在条件语句中应用了 AND 和 OR 运算符。当两个条件都返回 `true` 时，AND 运算符返回\
    \ `true`；当两个条件中的任何一个返回 `true` 时，OR 运算符返回 `true`。将取两个浮点数作为选择题和理论分数。\n\n```python\n\
    # 获取选择题分数\nmcq_marks = float(input(\"Enter the MCQ marks: \"))\n# 获取理论分数\ntheory_marks\
    \ = float(input(\"Enter the Theory marks: \"))\n\n# 使用 AND 和 OR 运算符检查及格条件\nif\
    \ (mcq_marks >= 20 and theory_marks >= 10) or (mcq_marks + theory_marks) >=30:\n\
    \    print(\"\\nYou have passed\")\nelse:\n    print(\"\\nYou have failed\")\n\
    ```\n\n模块或模块化编程代表将一个大型、复杂的编程任务分解成独立的、更小的子任务或模块的过程。然后，各个模块可以像积木一样堆叠在一起，创建另一个应用程序。在大型应用方面，模块化代码有多个优势：\n\
    \n- **简单性：** 模块允许你专注于问题的一小部分，而不是整个问题。如果你正在处理单个模块，你知道你有一个更小的问题领域需要首先解决。这使得整体开发易于管理且不易出错。\n\
    - **可维护性：** 模块通常旨在为不同的问题和任务创建逻辑边界。如果模块编写得最小化相互依赖，那么对单个模块的修改影响程序其他部分的可能性就会降低。这样，你甚至可以在不了解该模块外部脚本的情况下对模块进行更改。这使得许多开发人员团队在大型应用程序上协作工作更加方便。\n\
    - **可重用性：** 在单个模块中定义的功能可以通过适当定义的接口轻松重用。这样，就不需要复制你的代码。\n- **组织性：** 模块通常定义一个单独的命名空间，这有助于防止标识符之间发生任何冲突。\n\
    \n通常，在 Python 中定义模块有三种不同的方式：模块可以用 Python 本身编写；可以用 C 编写并在运行时动态加载；或者内置模块可能本质上包含在解释器中。然而，在所有三种情况下，模块的内容都通过\
    \ `import` 语句以相同的方式访问。模块内容通过 `import` 语句提供给调用者，如下所示：\n\n```python\nimport <module_name>\n\
    ```\n\n这是最简单的方式，它不会使模块内容直接对调用者可访问。每个模块都有自己的私有符号表，该符号表也用作模块中定义的所有对象的全局符号表。因此，它也允许模块创建一个单独的命名空间，如前所述。\n\
    \n## 定位模块\n\n当你导入一个模块时，Python 解释器会在当前目录中搜索该模块。如果找不到该模块，Python 会搜索 shell 变量 `PYTHONPATH`\
    \ 中的每个目录。如果这也失败了，Python 会检查默认路径。在 UNIX 上，这个默认路径通常是 `/usr/local/lib/python/`。\n\
    准确地说，模块搜索路径存储在系统模块 `sys` 中的 `sys.path` 变量中。`sys.path` 变量包含当前目录、`PYTHONPATH` 和与安装相关的默认路径。`PYTHONPATH`\
    \ 是一个环境变量，由目录列表组成，其语法与 shell 变量 `PATH` 的语法相似。\n以下是 Windows 系统中常见的 `PYTHONPATH`\
    \ –\n\n```bash\nset PYTHONPATH = c:\\python20\\lib;\n```\n\n以下是 UNIX 系统中的基本 `PYTHONPATH`\
    \ –\n\n```bash\nset PYTHONPATH = /usr/local/lib/python\n```\n\n## 标准模块\n\nPython\
    \ 自带一个标准模块库，在另一个文档中描述，也称为 Python 库\n\n---\n¹ https://linuxhint.com/python_scripts_beginners_guide/#post-67157-02,\
