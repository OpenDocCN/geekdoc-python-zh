  mdcn: '## 精通Python网络编程


    - 用Java编写的程序通过Jython运行。

    - 用.NET实现的程序，通常使用开源的IronPython解释器。


    上述示例中的解释器能够以两种不同方式运行Python代码：作为脚本或模块，或者作为交互式会话中编写的代码片段。然而，无论解释器采用何种形式，你编写的代码都必须由该程序运行。因此，能够运行Python脚本的首要条件是在你的系统上正确安装解释器。


    当你开始运行Python脚本时，一个多步骤的过程便启动了。在此过程中，解释器将：


    - 按顺序处理脚本的所有语句。

    - 将源代码编译为中间格式，也称为字节码。

    - 将代码发送出去执行。


    此处的字节码用作将代码翻译成更底层语言的工具，该语言可以是平台无关的。其主要目的是优化代码实现。因此，下次解释器运行你的代码时，它将跳过此编译过程。简单来说，这种代码优化仅对模块或其他导入文件是必要的，而对可执行脚本则不需要。


    在此步骤中，一个被称为Python虚拟机（PVM）的组件开始发挥作用。PVM是运行时引擎，用于遍历你的字节码指令并逐一测试和运行它们。PVM不仅仅是Python的一个独立组件，它是你需要安装在机器上的Python系统的重要组成部分。从技术上讲，PVM是所谓的Python解释器的最后一步。


    运行Python脚本的整个过程被称为Python执行模型。此外，还有许多其他方式可以运行Python脚本：


    ### 使用Python命令


    Python命令是运行Python脚本最基本、最实用的方式。使用python命令运行Python脚本，你只需打开命令行，输入单词python（如果你同时安装了两个版本，则输入python3），后跟脚本的路径。例如：


    ```

    $ python3 hello.py

    Hello There!

    ```


    如果一切正常，按下回车键后，你将在屏幕上看到短语“Hello There!”。通过这些简单的步骤，你就运行了一个Python脚本。但如果运行不正常，建议检查你的系统PATH、Python安装、创建hello.py脚本的方式以及保存它的位置。


    有时，保存脚本的输出以供后续分析也很有用。你可以通过以下方式实现：


    ```

    $ python3 hello.py > output.txt

    ```


    此操作将脚本的输出重定向到output.txt，而不是标准系统输出（stdout）。此过程也称为流重定向，在Windows和类Unix系统上均可用。如果output.txt不存在，则会自动创建。另一方面，如果文件已存在，则其内容将被新输出替换。


    因此，如果你想将连续执行的输出添加到output.txt的末尾，则必须使用两个尖括号（>>）而不是一个，如下所示：


    ```

    $ python3 hello.py >> output.txt

    ```


    ### 使用脚本文件名


    在最新版本的Windows上，只需在命令行输入包含代码的文件名即可方便地运行Python脚本：


    ```

    C:\devspace> hello.py

    Hello There!

    ```


    此过程之所以可行，是因为Windows具有系统注册表和文件关联，用于指定运行特定文件应使用的程序。在类Unix系统（如GNU/Linux）上，你可以通过添加第一行文本`#!/usr/bin/env
    python`来实现类似功能，就像你在hello.py中所做的那样。


    对于Python，这被解释为一个简单的注释，但此行指示操作系统必须激活哪个程序来运行文件。此行以`#!`字符组合开头，通常称为hashbang或shebang，后跟解释器的路径。指定解释器路径有两种方式：


    ```

    #!/usr/bin/python：用于指定绝对路径。


    #!/usr/bin/env python：当你使用操作系统的env命令时使用，该命令通过搜索PATH环境变量来定位并执行Python。

    ```


    最后一种选项对于类Unix系统在不同位置定位解释器很有用。最终，要执行这样的脚本，你需要为其分配执行权限，然后在命令行中输入文件名。


    ### 如何交互式运行Python脚本


    从交互式会话运行Python脚本和模块也是可行的。此可能性为你提供了多种选择。当你利用导入模块时，可以加载其内容以供后续访问和使用。此过程的有趣之处在于，import在最后一步运行代码。


    如果模块仅包含类、函数、变量和常量定义，你可能无法跟踪代码是否实际运行，但当模块包含对函数、方法或其他产生可见结果的语句的调用时，你将能够观察到其执行。这为你提供了运行Python脚本的另一种选择：


    ```

    >>> import hello

    Hello There!

    ```


    你应该注意，此选项在每个会话中仅工作一次。第一次导入后，后续的导入执行将无效，即使你修改了模块的内容。这是因为导入操作开销较大，只能运行一次。举例说明：


    ```

    >>> import hello  # 无操作

    >>> import hello  # 再次无操作

    ```


    这两个导入操作都不执行任何操作，因为Python知道hello已经被导入。然而，此方法要工作需要满足一些要求——首先，包含Python代码的文件必须位于当前工作目录中。其次，该文件应在Python模块搜索路径（PMSP）中，Python可以在此查找你导入的模块和包。


    ### 如何从IDE或文本编辑器运行Python脚本


    当编写更大、更复杂的应用程序时，建议使用集成开发环境（IDE）或高级文本编辑器。大多数此类程序能够从环境内部运行你的脚本。它们通常包含“运行”或“构建”命令，通常可从工具栏或主菜单访问。


    Python的标准发行包已包含IDLE作为默认IDE，你可以使用它来编写、调试、修改以及运行你的模块和脚本。其他IDE如Eclipse-PyDev、PyCharm、Eric和NetBeans也允许你从环境内部运行Python脚本。此外，你还有像Sublime
    Text和Visual Studio Code这样的高级文本编辑器，它们也允许你运行脚本。


    ### 如何从文件管理器运行Python脚本


    只需在文件管理器中双击其图标即可运行脚本，这是运行Python脚本的另一种简单方式。此选项在开发阶段可能不广泛流行，但当你准备发布代码用于生产时可能很有用。然而，为了能够通过双击运行脚本，你应该满足一些取决于操作系统的条件。


    例如，Windows将扩展名.py和.pyw与程序python.exe和pythonw.exe关联。这允许你通过双击运行脚本。当你的脚本具有命令行界面时，你可能只会在屏幕上看到黑色窗口的闪烁。为避免这种情况，你可以在脚本末尾添加类似`input(''Press
    Enter to Continue...'')`的语句。这样，程序在你按回车键之前不会继续处理。然而，如果脚本有任何错误，执行将在到达input()语句之前中止，你仍然无法查看结果。


    在类Unix系统上，通过应用我们之前提到的shebang变量，你可以在文件管理器中双击运行脚本。同样，对于命令行界面脚本，你可能不会在屏幕上注意到任何结果。


    由于通过双击执行脚本存在一些限制，并且通常依赖于许多'
