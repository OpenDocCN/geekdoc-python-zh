  - "[PAGE 59]\n\nA data type is basically just an internal construct that a programming\
    \ language uses to store and manipulate the rest of the data. Despite how well\
    \ Python works, at some point in data analysis processes, everyone will likely\
    \ need to explicitly convert data from one type to another. In this chapter, we\
    \ will discuss the basic Python data types, how they map, and what are the options\
    \ for converting from one data type to another. Simply said, data types are the\
    \ classification or categorization of data items. Python supports the following\
    \ built-in data types:\n\n+   - **Scalar types**\n  - **Int:** Integers stand\
    \ for positive or negative whole numbers (without a fractional part). Bitwise\
    \ operations that are used in bit-level programming, only make sense for integers.\
    \ The priorities of the binary bitwise operations are all lower than the numeric\
    \ operations and higher than the comparisons. And the unary operation ~ has the\
    \ same priority as the other unary numeric operations (+ and -).¹\n\nThis table\
    \ lists the bitwise operations sorted in ascending priority:\n\n| Operation |\
    \ Description |\n| :--- | :--- |\n| x \\| y | bitwise or of x and y |\n| x ^ y\
    \ | bitwise exclusive or of x and y |\n| x & y | bitwise and of x and y |\n| x\
    \ << n | x shifted left by n bits |\n| x >> n | x shifted right by n bits |\n\
    | ~x | the bits of x inverted |\n\n> ¹ https://docs.python.org/3/library/stdtypes.html,\
    \ Python"
  - '[PAGE 60]


    # Additional Methods on Integer Types


    The int type implements the numbers and integral abstract base class. In addition,
    it provides a few more operational methods:²


    +   1. **int.bit_length()**: Return the number of bits necessary to represent
    an integer in binary, excluding the sign and leading zeros.

    2. **int.to_bytes(length, byteorder, *, signed=False)**: Return an array of bytes
    representing an integer.

    3. **classmethod int.from_bytes(bytes, byteorder, *, signed=False)**: Return the
    integer represented by the given array of bytes.

    4. **int.as_integer_ratio()**: Return a pair of integers whose ratio is exactly
    equal to the original integer and with a positive denominator. The integer ratio
    of integers (whole numbers) is always the integer as the numerator and 1 as the
    denominator.


    i. **Float**: Represents real number with a floating-point representation in which
    a fractional component is denoted by a decimal symbol or scientific notation.
    The float type implements the numbers and real abstract base class. It also has
    the following additional methods:³


    +   1. **float.as_integer_ratio()**: Return a pair of integers whose ratio is
    exactly equal to the original float and with a positive denominator.'
  - '[PAGE 61]


    2. **float.is_integer()**: Return True if the float instance is finite with integral
    value, and False otherwise:


    ```

    >>>

    >>> (-2.0).is_integer()

    True

    >>> (3.2).is_integer()

    False

    ```


    Two methods support conversion to and from hexadecimal strings. Since Python''s
    floats are stored internally as binary numbers, converting a float to or from
    a decimal string usually involves a small rounding error. In contrast, hexadecimal
    strings allow exact representation and specification of floating-point numbers.
    This can be useful when debugging and in numerical work.


    3. **float.hex()**: Return a representation of a floating-point number as a hexadecimal
    string. For finite floating-point numbers, this representation will always include
    a leading 0x and a trailing p and exponent.


    4. **classmethod float.fromhex(s)**: Class method to return the float represented
    by a hexadecimal string s. The string s may have leading and trailing whitespace.
    Note that float.hex() is an instance method, while float.fromhex() is a class
    method.


