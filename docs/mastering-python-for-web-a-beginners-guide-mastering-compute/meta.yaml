    to as lambda abstractions, directly referring to the abstraction model of Alonzo
    Church’s original design.

    In general, functional languages get their origin in mathematical logic and lambda
    calculus, while imperative programming languages are following the state-based
    model of computation invented by Alan Turing. Lambda'
