    # DYNAMIC PROGRAMMING


    ![](img/25ba12f902f652c144ff96c17c35a084_179_0.png)


    Dynamic programming is a great approach that can be applied to a set of problems
    for finding an efficient and optimal solution. To put it simply, the idea behind
    dynamic programming is to divide the problems into sub-problems and store the
    result for the future so that you do not have to compute that same problem all
    over again. Such optimization of sub-problems that seeks the overall solution
    is known as optimal substructure property.


    Dynamic programming was designed as a problem-solving technique for resolving
    complex problems by recursively breaking them up into sub-problems, which then
    could be each solved one by one. Therefore, dynamic programming uses recursive
    programming and helps to save the time of re-computing inputs later. However,
    this approach differs from the Divide and Conquer paradigm in that sub-problems
    in dynamic programming solutions are intertwined, so some of the same identical
    steps needed to solve one sub-problem are also saved until needed for other sub-problems.
    This leads us to the main key point of dynamic programming. Instead of recomputing
    some'
  - '[PAGE 180]


    of the shared steps, dynamic programming lets us simply store those solutions
    of each step the first time and reuse them each subsequent time.


    At the same time, dynamic programming should not be confused with recursion. Recursion
    refers to a system of finding the solution by expressing the value of a function
    in terms of other values following a top-down approach. Dynamic programming, on
    the other hand, is nothing but recursion with memorization, or calculation and
    storing values that can be later accessed to solve re-occurring issues, therefore
    making your code faster and reducing the time complexity. Here, the underlining
    idea is to save time by efficient use of space. Recursion might take time but
    no does not need space while dynamic programming requires storage space to stock
    solutions to sub-problems for potential reference.


    And even though the two systems are closely connected, dynamic programming is
    still favored whenever possible. It mostly happens because brute force recursive
    programs tend to repeat work when faced with overlapping processes, spending precious
    time and resources for calculation. Dynamic programming prevents this issue by
    making sure each identical step is only completed once, storing that step''s results
    in a collector such as a hash table or an array. With that, dynamic programming
    ensures less repeated work and has a better runtime efficiency.


    There are two ways in which dynamic programming can be applied – using top-down
    or bottom-up approaches.


    With the top-down method, the problem is broken down and if some parts of the
    problem are solved already then the saved value is found and returned, otherwise,
    the'
