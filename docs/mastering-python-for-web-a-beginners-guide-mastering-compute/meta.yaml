    | 导入操作 | `import module` 或 `from module import name` |

    | 函数定义 | `def my_func(): ...` |

    | 函数上下文中的参数定义 | `def my_func(arg1, arg2,... argN): ...` |

    | 类定义 | `class MyClass: ...` |


