  md: '136 ■ Mastering Python for Web


    +   - A program written in Java operates with Jython.

    - A program implemented in .NET, usually use an open-source IronPython interpreter.


    Given examples of interpreters are able to run Python code in two different ways:
    as a script or module or alternatively as a piece of code scripted into an interactive
    session. Nevertheless, whatever form the interpreter can take, the code you write
    will have to be run by this program. Therefore, the first condition to be able
    to implement Python scripts is to have the interpreter correctly installed on
    your system.


    When you start to run Python scripts, a multi-step process sets in motion. In
    this process, the interpreter will:


    +   - Process all the statements of your script in sequential order.

    - Compile the source code to an intermediate format, also known as bytecode.

    - Send away the code for execution.


    This bytecode in this case is used as a translation tool of the code into a lower-level
    language that could be platform-independent. Its main purpose is to optimize code
    realization. So, the next time the interpreter runs your code, it will bypass
    this compilation process. To put it simply, this code optimization is only necessary
    to proceed with modules or other imported files, and not with executable scripts.


    At this step, something known as a Python Virtual Machine (PVM) comes into play.
    The PVM is the'
