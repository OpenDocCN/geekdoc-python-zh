  mdcn: "对这些工作单元发生顺序的限制。名称的作用域指的是执行模型中可以明确找到该名称的区域，例如变量、函数或对象。一个名称仅在其作用域内可见，并可通过该作用域内的代码访问。通常需要区分两种作用域：全局作用域（使在此作用域中定义的名称对所有代码可用）和局部作用域（使在此作用域中定义的名称仅对该作用域内的代码可见）。\n\
    \nPython 在 Web 开发中定位为后端语言，通常与另一种前端语言结合来构建完整的网站。同时，在 Web 开发中使用 Python 的原因如下：它是一种灵活、通用且高效的编程语言，具有动态类型能力。Python\
    \ 让开发者能够创建科学应用、带图形的复杂系统应用、游戏、命令行工具、Web 应用以及满足许多其他需求。使用 Python 的另一个重要原因是它可以免费使用和分发。由于它是一个开源产品，拥有广泛的库支持，所有编码信息都可在互联网上获取，这意味着在你的产品中复制、嵌入和分发\
    \ Python 是无限且不受限制的。这使其在数字系统领域非常有用，因为它在市场中提供了灵活性，并允许公司与许多行业领域进行互操作。还有其他因素简化了 Python\
    \ 在 Web 开发中的使用：\n\n- 编程算法的简单性使得在同一项目中工作的开发者之间的沟通更加顺畅。此外，一门易于学习的语言意味着新开发者或没有 Python\
    \ 经验的开发者可以更快地学习该语言并加入开发团队。\n- Python 是一种高级编码语言，使你能够完成后端的复杂任务，包括人工智能和数据科学，以及其他编程语言中的任何基础任务。\n\
    - 有许多 Python 库可用于推进应用程序的开发。这些库是预编写代码的包，对所有人开放，因此你无需重新发明核心。这些库还允许程序员管理和转换机器学习中持续数据处理所需的数据。有多种用于开发科学和数值应用的包和库可用。最常用的有：²\n\
    \  - SciPy（科学数值库）；\n  - Pandas（数据分析库）；\n  - IPython（命令行 Shell）；\n  - Numeric Python（基础数值包）；\n\
    \  - Natural Language Toolkit（数学和文本分析库）。\n\n² https://djangostars.com/blog/python-web-development/,\
    \ Djangostars\n\n274 ■ 评估\n\n- Python 拥有 Web 开发框架，包括 Django、Flask、Pyramid、Web2Py\
    \ 和 Turbogears。这些框架由标准化代码的包和模块组成，可在多个应用领域（URL 路由、数据库访问、HTTP 请求和响应）为你提供帮助。\n- Python\
    \ 是发展最快的编码语言之一，支持快速原型设计和迭代。这使得开发工作更轻松、更高效，为开发者提供了更大的竞争优势。\n- 面向对象编程（OOP）操作在 Python\
    \ 中相当简单，这使得开发成本更低、耗时更少。\n- Python 是企业软件应用的首选，主要是因为它与企业开发中常用的其他语言（如 Java、PHP 和\
    \ .NET）能够顺畅集成。\n\n如前所述，Python 拥有多种简化开发过程的框架。我们已经介绍了一些最知名的 Python 框架：\n\n- **Django：**\
    \ 该框架非常适合功能齐全的 Web 应用和中等规模的可扩展项目。它具有内置功能，允许代码重用、不同代码组件的连贯修改以及其他在 Web 开发中重视的功能。Django\
    \ 与 Oracle SQL、PostgreSQL 和 MySQL 数据库配合良好。\n- **Flask：** 该框架背后的理念是提供一个简单且易于定制的解决方案。Flask\
    \ 通常被描述为一个微框架，常用于优先考虑灵活功能的小型解决方案。该框架也用于创建原型。\n- **Falcon：** 通过在需要时提供额外的性能、可靠性和灵活性，为通用\
    \ Python Web 框架添加了更多功能。它具有许多优势，包括稳定的接口（强调向后兼容性）、高度优化的可扩展代码库，以及通过中间件组件和钩子实现的 DRY\
    \ 请求处理。\n\n使用像 Flask 或 Falcon 这样的流行 Python 框架，可以保证你能够节省大量时间和金钱，并保持安全性和功能性。然而，在决定选择哪个框架时，你应该考虑以下重要因素，它们将帮助你做出决定：\n\
    \n1. 技术变化\n2. 对 WSGI 的支持\n3. 对你的框架的支持\n4. 应用类型\n5. 数据库\n6. 选择开源\n7. 应用结构\n8. 路由\n\
    \nPython 的使用非常广泛，几乎所有代码编辑器在首次编写 Python 代码时都提供了某种形式的支持。如果你正在寻找一些额外的工具或特殊指南来管理 Python\
    \ 编码，你可以在“附加资源和开发者指南”中搜索：[https://devguide.python.org/#resources](https://devguide.python.org/#resources)。在那里，你可以找到关于探索\
    \ CPython 内部机制、修改 CPython 语法、CPython 编译器设计、CPython 垃圾收集器设计以及基本工具支持选项的优秀材料。Python.org\
    \ 的维护还包括使用 clang 进行动态分析以及使用配置文件的各种工具（如在 Misc 目录中找到的）。\n\n## 索引\n\n### A\n\nABC\
