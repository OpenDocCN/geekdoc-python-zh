- md: '## SET DATA TYPE


    Another Python’s built-in data type could be characterized in the following way:


    - The set data type has all its elements unique. It is not allowed to duplicate
    set elements.

    - A set itself can be modified, but the elements contained in the set still remain
    of an immutable type.

    - Sets are not ordered.


    Nevertheless, it is very easy to work with sets in Python. You can create a set
    in two ways. First, you can define a set with the built-in set() function, to
    illustrate:


    ```

    x = set(<iter>)

    ```


    Or alternately, a set can be defined with curly braces ({}):


    ```

    x = {<obj>, <obj>, ..., <obj>}

    ```


    Many of the standard data operations that can be used for Python’s other composite
    data types do not work the same way for sets. For example, sets cannot be indexed
    or sliced. But at the same time, Python provides a whole host of operations on
    set objects that generally imitate the operations that are defined for mathematical
    sets.


    ## Operators and Methods


    Most of the popularly requested set operations in Python can be performed in two
    different ways: by the operator or by a method. We can see how these operators
    and methods typically work, using set union as an example.


    Given two sets, x1 and x2, the union of x1 and x2 is a set consisting of all elements
    in either set.

    Consider these two sets:


    ```

    x1 = {''food'', ''bar'', ''bass''}

    x2 = {''bass'', ''mouse'', ''house''}

    ```


    The union of x1 and x2 is `{''food'', ''bar'', ''bass'', ''mouse'', ''house''}`.


    Make sure you notice that the element “bass,” which appears in both x1 and x2,
    appears only once in the union because, as we have mentioned earlier, sets never
    contain duplicate values.

    Another way set union can be performed in Python is with the `|` operator:


    ```

    >>> x1 = {''food'', ''bar'', ''bass''}

    >>> x2 = {''bass'', ''mouse'', ''house''}

    >>> x1 | x2

    {''bass'', ''mouse'', ''house'', ''bar'', ''food''}

    ```


    As an alternative, you can also obtain a set union with the `union()` method.
    The method is called on one of the sets, and the other is passed as an argument:


    ```

    >>> x1.union(x2)

    {''bass'', ''mouse'', ''house'', ''bar'', ''food''}

    ```


    As you might have observed from the examples above, the operator and method behave
    almost identically. However, there is still a subtle difference between them.
    When you use the `|` operator, both operands must be sets. But the `union()` method,
    on the other hand, will take any iterable as an argument, convert it to a set,
    and then perform the union.


    ## Modifying a Set


    And even though the elements contained in a set must be of the immutable type,
    sets themselves can indeed be modified. Like in the operations above, there is
    a mix of operators and methods that can be implemented to modify the contents
    of a set. Thus, each of the union, intersection, difference, and symmetric difference
    operators listed above has an augmented assignment form that can be applied to
    modify a set. And for each of them, there is a corresponding method as well:⁷


    1. **x1.update(x2[, x3 ...]); x1 |= x2 [| x3 ...]:** Modify a set by union.

    2. **x1.intersection_update(x2[, x3 ...]); x1 &= x2 [& x3 ...]:** Modify a set
    by intersection.

    3. **x1.difference_update(x2[, x3 ...]); x1 -= x2 [| x3 ...]:** Modify a set by
    difference.

    4. **x1.symmetric_difference_update(x2); x1 ^= x2:** Modify a set by symmetric
    difference.

    5. **x.add(<elem>):** Adds an element to a set.

    6. **x.remove(<elem>):** Removes an element from a set.

    7. **x.clear():** Clears a set.


    *Frozen sets* are also considered to be native data types in Python. And even
    if they have the same qualities of sets, including class methods, they are immutable
    like tuples. In order to use a frozen set, call the function `frozenset()` and
    pass an iterable as the argument. And in case you pass another data type such
    as a list or string, frozen set will treat it as an iterable. And this means the
    value will be deconstructed into its individual parts, and later reduced to a
    set of unique immutable elements. To demonstrate:


    ```

    myList = [1,1,2,3,4]

    myString = "Hello"

    frozenList = frozenset(myList)

    frozenString = frozenset(myString)

    print(frozenList) # frozenset({1, 2, 3, 4})

    print(frozenString) # frozenset({''e'', ''l'', ''H'', ''o''})

    ```


    As you can see, frozen sets cannot be declared with a character notation like
    sets with curly braces, lists with square brackets, or tuples with parentheses.
    So, if you want to use a frozen set, you would have to use the function to create
    it. One might think that there is not much benefit in terms of performance when
    deciding to apply frozen sets. However, they could be of great value to construct
    more clear, concise code. Thus, by defining a variable as a frozen set, you are
    signaling other readers that they cannot modify this.


    ⁷ https://realpython.com/python-sets/, Realpython


    ## NUMBERS DATA TYPE


    Python has many useful built-in data types that are extremely useful to understand
    if you want to write well-constructed code. Number data types store numeric values.
    They are also considered immutable data types, so when you wish to change the
    value of a number, the data type results in a newly allocated object. Python variables
    can store different types of data, without the need to explicitly define a data
    type when the variable is created. Simply put, number objects are created only
    when you assign a value to them. For example:


    ```

    var1 = 1

    var2 = 10

    ```


    Variable names in Python must stick to the following rules:


    - Variable names only contain letters, numbers and the underscore character _.

    - Variable names should start with a letter.

    - Variable names cannot contain spaces or punctuation.

    - Variable names should not be enclosed in any quotes or brackets.


    Typically, Python supports four different numerical types:


    - **int (integers)**: sometimes also marked as ints, integers stand for positive
    or negative whole numbers with no decimal point.

    - **long (long integers)**: Could be referred to as longs, they are integers of
    unlimited size, written like integers but followed by an uppercase or lowercase
    L.

    - **float (floating point real values)**: Or just floats, they represent real
    numbers and are written with a decimal point dividing the integer and fractional
    parts.

    - **complex (complex numbers)**: are of the form a + bJ, where a and b are floats
    and J (or j) represents the square root of -1 (which is an imaginary number).
    Might also be worth mentioning that complex numbers are not used much in Python
    programming.


    ## Integers


    As stated earlier, the integer is a whole number, negative, positive or zero.
    In Python, integer variables are decided by assigning a whole number to a variable.
    Python''s `type()` function can be used to define the data type of a variable:


    ```

    >>> a = 2

    >>> type(a)

    <class ''int''>

    ```


    The output `<class ''int''>` is the one that indicates the variable `a` is an
    integer. Integers can as well be negative or zero:


    ```

    >>> b = -1

    >>> type(b)

    <class ''int''>

    >>> z = 0

    >>> type(z)

    <class ''int''>

    ```


    ## Floating Point Numbers


    Floating-point numbers are another Python data type that is represented by decimals,
    positive, negative, and zero. In addition, floats can also be represented by numbers
    in scientific notation, which contain exponents. When writing, a float can be
    defined using a decimal point when a variable is assigned. But to define floats
    in scientific notation, either a lower case `e` or an upper case `E` can be used:


    ```

    >>> c = 6.2

    >>> type(c)

    <class ''float''>


    >>> d = -0.03

    >>> type(d)

    <class ''float''>


    >>> Na = 6.02e23

    >>> Na

    6.02e+23

    >>> type(Na)

    <class ''float''>

    ```


    In case you want to define a variable as a float instead of an integer, even though
    the variable is assigned a whole number, a trailing decimal point can be added.
    In this instance, however, a decimal point comes after a whole number:


    ```

    >>> g = 4

    >>> type(g)

    <class ''int''>

    >>> f = 4.

    >>> type(f)

    <class ''float''>

    ```


    ## Complex Numbers


    Complex numbers are another useful numeric data type for problem solvers that
    are defined by using a real'
  mdcn: '## 集合数据类型


    Python 的另一种内置数据类型可以这样描述：


    -   集合数据类型的所有元素都是唯一的。不允许重复集合元素。

    -   集合本身可以被修改，但集合中包含的元素仍然是不可变类型。

    -   集合是无序的。


    尽管如此，在 Python 中使用集合非常容易。你可以通过两种方式创建集合。首先，你可以使用内置的 `set()` 函数来定义一个集合，例如：


    ```

    x = set(<iter>)

    ```


    或者，也可以使用花括号（`{}`）来定义集合：


    ```

    x = {<obj>, <obj>, ..., <obj>}

    ```


    许多可用于 Python 其他复合数据类型的标准数据操作，对于集合的工作方式并不相同。例如，集合不能被索引或切片。但与此同时，Python 提供了大量针对集合对象的操作，这些操作通常模仿为数学集合定义的操作。


    ## 运算符和方法


    Python 中大多数常用的集合操作可以通过两种不同的方式执行：通过运算符或通过方法。我们可以以集合并集为例，看看这些运算符和方法通常是如何工作的。


    给定两个集合 x1 和 x2，x1 和 x2 的并集是一个包含两个集合中所有元素的集合。

    考虑这两个集合：


    ```

    x1 = {''food'', ''bar'', ''bass''}

    x2 = {''bass'', ''mouse'', ''house''}

    ```


    x1 和 x2 的并集是 `{''food'', ''bar'', ''bass'', ''mouse'', ''house''}`。


    请确保你注意到元素 "bass" 同时出现在 x1 和 x2 中，但在并集中只出现一次，因为正如我们之前提到的，集合从不包含重复的值。

    在 Python 中执行集合并集的另一种方式是使用 `|` 运算符：


    ```

    >>> x1 = {''food'', ''bar'', ''bass''}

    >>> x2 = {''bass'', ''mouse'', ''house''}

    >>> x1 | x2

    {''bass'', ''mouse'', ''house'', ''bar'', ''food''}

    ```


    作为替代方案，你也可以使用 `union()` 方法来获取集合并集。该方法在一个集合上调用，另一个集合作为参数传入：


    ```

    >>> x1.union(x2)

    {''bass'', ''mouse'', ''house'', ''bar'', ''food''}

    ```


    正如你可能从上面的例子中观察到的，运算符和方法的行为几乎完全相同。然而，它们之间仍然存在细微的差别。当你使用 `|` 运算符时，两个操作数都必须是集合。但另一方面，`union()`
    方法将接受任何可迭代对象作为参数，将其转换为集合，然后执行并集操作。


    ## 修改集合


    尽管集合中包含的元素必须是不可变类型，但集合本身确实可以被修改。就像上面的操作一样，有运算符和方法的混合使用可以用来修改集合的内容。因此，上面列出的并集、交集、差集和对称差集运算符中的每一个都有一个增强赋值形式，可以应用于修改集合。并且对于每一个运算符，都有一个相应的方法：⁷


    1.  **x1.update(x2[, x3 ...]); x1 |= x2 [| x3 ...]:** 通过并集修改集合。

    2.  **x1.intersection_update(x2[, x3 ...]); x1 &= x2 [& x3 ...]:** 通过交集修改集合。

    3.  **x1.difference_update(x2[, x3 ...]); x1 -= x2 [| x3 ...]:** 通过差集修改集合。

    4.  **x1.symmetric_difference_update(x2); x1 ^= x2:** 通过对称差集修改集合。

    5.  **x.add(<elem>):** 向集合中添加一个元素。

    6.  **x.remove(<elem>):** 从集合中移除一个元素。

    7.  **x.clear():** 清空一个集合。


    *冻结集合*也被认为是 Python 中的原生数据类型。即使它们具有与集合相同的特性，包括类方法，它们也像元组一样是不可变的。要使用冻结集合，请调用 `frozenset()`
    函数并传递一个可迭代对象作为参数。如果你传递另一种数据类型，如列表或字符串，冻结集合会将其视为可迭代对象。这意味着该值将被解构为其各个部分，然后归约为一组唯一的不可变元素。演示如下：


    ```

    myList = [1,1,2,3,4]

    myString = "Hello"

    frozenList = frozenset(myList)

    frozenString = frozenset(myString)

    print(frozenList) # frozenset({1, 2, 3, 4})

    print(frozenString) # frozenset({''e'', ''l'', ''H'', ''o''})

    ```


    如你所见，冻结集合不能像集合用花括号、列表用方括号或元组用圆括号那样用字符表示法声明。因此，如果你想使用冻结集合，你必须使用函数来创建它。人们可能会认为在决定应用冻结集合时，在性能方面没有太多好处。然而，它们对于构建更清晰、简洁的代码可能具有巨大价值。因此，通过将变量定义为冻结集合，你是在向其他读者发出信号，表明他们不能修改它。


    ⁷ https://realpython.com/python-sets/, Realpython


    ## 数字数据类型


    Python 有许多有用的内置数据类型，如果你想编写结构良好的代码，理解它们非常有用。数字数据类型存储数值。它们也被认为是不可变数据类型，因此当你希望更改数字的值时，数据类型会导致新分配的对象。Python
    变量可以存储不同类型的数据，无需在创建变量时显式定义数据类型。简单来说，数字对象仅在你为其赋值时才创建。例如：


    ```

    var1 = 1

    var2 = 10

    ```


    Python 中的变量名必须遵守以下规则：


    -   变量名仅包含字母、数字和下划线字符 _。

    -   变量名应以字母开头。

    -   变量名不能包含空格或标点符号。

    -   变量名不应被任何引号或括号括起来。


    通常，Python 支持四种不同的数字类型：


    -   **int（整数）**：有时也标记为 ints，整数代表没有小数点的正或负整数。

    -   **long（长整数）**：可以称为 longs，它们是大小无限制的整数，写法像整数但后面跟着大写或小写的 L。

    -   **float（浮点实数值）**：或简称为 floats，它们表示实数，书写时用小数点分隔整数部分和小数部分。

    -   **complex（复数）**：形式为 a + bJ，其中 a 和 b 是浮点数，J（或 j）表示 -1 的平方根（这是一个虚数）。可能值得一提的是，复数在
    Python 编程中并不常用。


    ## 整数


    如前所述，整数是整数，可以是负数、正数或零。在 Python 中，整数变量通过将整数赋值给变量来决定。Python 的 `type()` 函数可用于定义变量的数据类型：


    ```

    >>> a = 2

    >>> type(a)

    <class ''int''>

    ```


    输出 `<class ''int''>` 表明变量 `a` 是一个整数。整数也可以是负数或零：


    ```

    >>> b = -1

    >>> type(b)

    <class ''int''>

    >>> z = 0

    >>> type(z)

    <class ''int''>

    ```


    ## 浮点数


    浮点数是另一种 Python 数据类型，由小数表示，可以是正数、负数和零。此外，浮点数也可以用科学计数法表示，其中包含指数。书写时，可以在给变量赋值时使用小数点来定义浮点数。但要定义科学计数法中的浮点数，可以使用小写
    `e` 或大写 `E`：


    ```

    >>> c = 6.2

    >>> type(c)

    <class ''float''>


    >>> d = -0.03

    >>> type(d)

    <class ''float''>


    >>> Na = 6.02e23

    >>> Na

    6.02e+23

    >>> type(Na)

    <class ''float''>

    ```


    如果你想将变量定义为浮点数而不是整数，即使变量被赋予了一个整数，也可以添加一个小数点。然而，在这种情况下，小数点跟在整数后面：


    ```

    >>> g = 4

    >>> type(g)

    <class ''int''>

    >>> f = 4.

    >>> type(f)

    <class ''float''>

    ```


    ## 复数


    复数是另一种有用的数字数据类型，适用于问题解决者，它通过使用实数'
