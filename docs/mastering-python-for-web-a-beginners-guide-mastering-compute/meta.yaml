  md: '# PYTHON SCRIPTS AND MODULES


    In computing, the term script is used to refer to a file containing a logical
    sequence of orders or a set processing file. This usually comes as a simple program
    that is stored in a plain text file. Thus, a plain text file containing Python
    code that is designed to be directly executed by the user is called script, an
    informal term that means a top-level program file. On the other hand, a plain
    text file containing Python code that is created to be imported and used from
    another Python file is what we call a module. The main difference between a module
    and a script is that modules are meant to be imported, while scripts are made
    to be directly executed. In any case, the important thing is to learn how to run
    the Python code you write into your modules and scripts. And scripts are always
    processed by an interpreter, which is responsible for executing each command sequentially.


    # What’s the Python Interpreter?


    Python is an excellent programming tool that allows you to be productive in a
    wide variety of ways. Python also has a piece of software called an interpreter.
    The interpreter is the program you are going to need to run Python code and scripts
    properly. In technical terms, the interpreter is a layer of software that operates
    between your program and computer hardware to get your code running. Depending
    on the code implementation you use, the interpreter can be:


    +   - A program written in Python itself usually uses PyPy interpreter.

    - A program written in C run with CPython, which is the core implementation of
    the language.'
  merge: -1
