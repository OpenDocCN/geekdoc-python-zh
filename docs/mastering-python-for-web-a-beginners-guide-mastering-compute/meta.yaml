  md: '# Sorting Algorithms


    Sorting of data should be considered as a real-time problem that requires a number
    of sorting algorithms to be solved. And in this case, sorting algorithms are used
    to sort data into the requisite order. Sorting algorithms can be divided into
    five types that are:


    +   - Merge Sort

    - Bubble Sort

    - Insertion Sort

    - Selection Sort


    Merge Sort Merge Sort algorithm operates based on the Divide and Conquer rule.
    With that, the given list of items is first divided into smaller lists until it
    reaches a point where each list has exactly one item. By default, a list consisting
    of one item will be sorted, and the merge sort algorithm then compares lists and
    reorders them in the sequence. This process is done recursively until it reaches
    a stage where there is only one, sorted list. To simplify, the Merge Sort Algorithm
    might look like this:


    **Step 1:** Check if the list contains more than one items; if yes, divide the
    list into two lists, else the list is sorted


    **Step 2:** The list is to be divided repeatedly until there is only a single
    element left in each sub-list


    **Step 3:** Automatically merge the sub-lists by arranging them in the given order
    until you get a single sorted list.'
