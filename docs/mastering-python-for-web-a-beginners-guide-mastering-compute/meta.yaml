    ASCII 匹配）、`re.I`（忽略大小写）、`re.L`（依赖于区域设置）、`re.M`（多行）、`re.S`（点匹配所有）、`re.U`（Unicode
    匹配）和 `re.X`（详细模式）。（标志在模块内容中描述。）


    字母 ‘a’、‘L’ 和 ‘u’ 作为内联标志时是互斥的，因此不应组合或跟在 ‘-’ 后面。相反，当它们出现在内联组中时，它会覆盖外层组的匹配模式。在 Unicode
    模式中，`(?a:...)` 切换到仅 ASCII 匹配，`(?u:...)` 切换到 Unicode 匹配（默认）。在字节模式中，`(?L:...)` 切换到依赖于区域设置的匹配，`(?a:...)`
    切换到仅 ASCII 匹配（默认）。此覆盖仅在狭窄的内联组内有效，组外恢复原始匹配模式。


    ### (?P<name>...)


    类似于常规括号，但组匹配的子字符串可以通过符号组名访问。组名必须是有效的 Python 标识符，并且每个组名在正则表达式中只能定义一次。符号组也是编号组，就像组未命名一样。


    ### (?P=name)


    对命名组的反向引用；它匹配之前名为 name 的组匹配的任何文本。


    ### (?#...)


    注释；括号内的内容被简单地忽略。


    ### (?=...)


    如果 ... 匹配下一个，则匹配，但不消耗字符串的任何部分。这称为前瞻断言。例如，`Isaac (?=Newton)` 只有在 ‘Isaac’ 后跟 ‘Newton’
    时才匹配 ‘Isaac’。


    ### (?!...)


    如果 ... 不匹配下一个，则匹配。这是一个否定前瞻断言。例如，`Isaac (?!Newton)` 只有在 ‘Isaac’ 后不跟 ‘Newton’ 时才匹配
    ‘Isaac’。


    ### (?<=...)


    如果字符串中的当前位置之前有一个匹配 ... 的匹配项，且该匹配项在当前位置结束，则匹配。这称为正向后顾断言。`(?<=abc)def` 将在 ‘abcdef’
