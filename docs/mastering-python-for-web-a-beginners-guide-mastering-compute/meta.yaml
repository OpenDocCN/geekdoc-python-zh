    The application comes with the complete Python 3 standard library and also includes
    full documentation that you can browse'
- md: "## HOW TO INSTALL PYTHON ON ANDROID\n\nAnd if you are not Apple but an Android\
    \ fan, and want to practice Python from your tablet or phone, it has been taken\
    \ care of as well. Android app that reliably supports Python 3.8 is Pydroid 3.\
    \ Pydroid 3 features an interpreter that you can use for read–eval–print loop\
    \ (REPL), interactive language sessions, and it also allows you to edit, save,\
    \ and execute Python code. Additionally, it has built-in C, C++, and even Fortran\
    \ compiler specially for Pydroid 3. With it, you can build any library from pip,\
    \ as well as build and install dependencies from a command line.\n\nYou can download\
    \ and install Pydroid 3 free version and paid Premium version (supports code prediction\
    \ and code analysis) from the Google Play Store.\n\n## ONLINE PYTHON INTERPRETERS\n\
    \nIf you are looking for examples and live Python tutorials without actually having\
    \ to set it up on your machine, then there are several websites that can offer\
    \ that online Python interpretation. These cloud-based Python interpreters may\
    \ not be able to execute some of the more complex activities, but they are quite\
    \ adequate for running most of the code and maybe a nice way to get started if\
    \ you are a beginner.\n\n- **Python.org Online Console:** [https://www.python.org/shell/](https://www.python.org/shell/)\n\
    - **Repl.it:** [https://replit.com/](https://replit.com/)\n- **Trinket:** https://trinket.io/\n\
    - **Python Anywhere:** https://www.pythonanywhere.com/\n\n## REGENERATE CONFIGURE\n\
    \nIf a change is made to Python which relies on some Portable Operating System\
    \ Interface (POSIX) system-specific functionality, it is important to update the\
    \ configure script to test for its functionality.\n\nPython's configure script\
    \ is generated from configure.ac using Autoconf tool for producing scripts for\
    \ building and packaging software on computer systems. Instead of editing configure,\
    \ make sure you edit configure.ac and then run autoreconf to regenerate configure\
    \ and a number of other files.\n\nJust like with any other software, under some\
    \ rare instances, you may encounter Python errors in scripts like Parser/asdl_c.py\
    \ or Python/makeopcodetargets.py. Since Python auto-generates some of its own\
    \ code, you need a full build from scratch to run the auto-generation scripts.\
    \ To overcome this problem, auto-generated files are also checked into the virtual\
    \ storage, Git repository.\n\nPython is used widely enough that practically all\
    \ code editors have used some form of support when writing Python code for the\
    \ first time. And if you are looking for some additional tools or special guidelines\
    \ to administer coding in Python, you can search for those in Additional Resources\
    \ and Developer's Guide: https://devguide.python.org/#resources. There you can\
    \ find exceptional materials on exploring CPython's internals, changing CPython's\
    \ grammar, design of CPython's compiler, design of CPython's garbage collector\
    \ as well as basic Tool support option. Python.org maintenance also includes dynamic\
    \ analysis with clang and various tools with configuration files as found in the\
    \ Misc directory.\n\n# CHAPTER 2\n## Python Data Type\n\n## IN THIS CHAPTER\n\n\
    - Introducing main Python data types\n- Talking about each type’s in-built method\
    \ descriptions\n- Explaining how to access, update and modify Python data types\n\
    \nData analysis is a very important field at the moment. Most companies would\
    \ like to have a professional data analyst on board to take care of a massive\
    \ database and prevent any unexpected errors from happening. A good data analyst\
    \ is one who knows how to use various programming tools to manage large amounts\
    \ of complex data and find relevant information from it. In short, if you are\
    \ the one looking for a place in the ever-evolving IT area, potentially as a data\
    \ analyst, you need to start investing in skills in the following areas, in order\
    \ to be valued in the workplace:\n\n- **Domain Expertise:** You need to have domain\
    \ expertise to be able to process big data and come up with insights that are\
    \ relevant to their workplace.\n- **Programming Skills:** Data analysts should\
    \ possess programming skills to know the right libraries to use in order to clean\
    \ data, mine, and gain insights from it.\n- **Statistics:** An analyst will not\
    \ be able to derive full meaning from data without knowing how to use some basic\
    \ statistical tools.\n- **Visualization Skills:** A data analyst cannot present\
    \ raw data as a result of their work, he would need to have great data visualization\
    \ skills, in order to summarize and present comprehensive data to a third party.\n\
    - **Storytelling:** At last, an analyst needs to communicate their findings to\
    \ a stakeholder or client. This means that they will not only have to create a\
    \ data story but also have the ability to narrate it.\n\nA data type is basically\
    \ just an internal construct that a programming language uses to store and manipulate\
    \ the rest of the data. Despite how well Python works, at some point in data analysis\
    \ processes, everyone will likely need to explicitly convert data from one type\
    \ to another. In this chapter, we will discuss the basic Python data types, how\
    \ they map, and what are the options for converting from one data type to another.\
    \ Simply said, data types are the classification or categorization of data items.\
    \ Python supports the following built-in data types:\n\n- **Scalar types**\n \
    \ - **Int:** Integers stand for positive or negative whole numbers (without a\
    \ fractional part). Bitwise operations that are used in bit-level programming,\
    \ only make sense for integers. The priorities of the binary bitwise operations\
    \ are all lower than the numeric operations and higher than the comparisons. And\
    \ the unary operation ~ has the same priority as the other unary numeric operations\
    \ (+ and -).¹\n\nThis table lists the bitwise operations sorted in ascending priority:\n\
    \n| Operation | Description |\n| :--- | :--- |\n| x \\| y | bitwise or of x and\
    \ y |\n| x ^ y | bitwise exclusive or of x and y |\n| x & y | bitwise and of x\
    \ and y |\n| x << n | x shifted left by n bits |\n| x >> n | x shifted right by\
    \ n bits |\n| ~x | the bits of x inverted |\n\n> ¹ https://docs.python.org/3/library/stdtypes.html,\
    \ Python\n\n## Additional Methods on Integer Types\n\nThe int type implements\
    \ the numbers and integral abstract base class. In addition, it provides a few\
    \ more operational methods:²\n\n1. **int.bit_length()**: Return the number of\
    \ bits necessary to represent an integer in binary, excluding the sign and leading\
    \ zeros.\n2. **int.to_bytes(length, byteorder, *, signed=False)**: Return an array\
    \ of bytes representing an integer.\n3. **classmethod int.from_bytes(bytes, byteorder,\
    \ *, signed=False)**: Return the integer represented by the given array of bytes.\n\
    4. **int.as_integer_ratio()**: Return a pair of integers whose ratio is exactly\
    \ equal to the original integer and with a positive denominator. The integer ratio\
    \ of integers (whole numbers) is always the integer as the numerator and 1 as\
    \ the denominator.\n\n- **Float**: Represents real number with a floating-point\
    \ representation in which a fractional component is denoted by a decimal symbol\
    \ or scientific notation. The float type implements the numbers and real abstract\
    \ base class. It also has the following additional methods:³\n\n1. **float.as_integer_ratio()**:\
    \ Return a pair of integers whose ratio is exactly equal to the original float\
    \ and with a positive denominator.\n2. **float.is_integer()**: Return True if\
    \ the float instance is finite with integral value, and False otherwise:\n\n```\n\
    >>>\n>>> (-2.0).is_integer()\nTrue\n>>> (3.2).is_integer()\nFalse\n```\n\nTwo\
    \ methods support conversion to and from hexadecimal strings. Since Python's floats\
    \ are stored internally as binary numbers, converting a float to or from a decimal\
    \ string usually involves a small rounding error. In contrast, hexadecimal strings\
    \ allow exact representation and specification of floating-point numbers. This\
    \ can be useful when debugging and in numerical work.\n\n3. **float.hex()**: Return\
    \ a representation of a floating-point number as a hexadecimal string. For finite\
    \ floating-point numbers, this representation will always include a leading 0x\
    \ and a trailing p and exponent.\n4. **classmethod float.fromhex(s)**: Class method\
    \ to return the float represented by a hexadecimal string s. The string s may\
    \ have leading and trailing whitespace. Note that float.hex() is an instance method,\
    \ while float.fromhex() is a class method.\n\n- **Complex**: A number that consists\
    \ of a real and imaginary component represented as x + 2y.\n- **Bool**: Data that\
    \ has one of two built-in values True or False. Notice that “T” and “F” are capital."
  mdcn: "## 如何在安卓设备上安装Python\n\n如果你不是苹果用户而是安卓粉丝，并想通过平板或手机练习Python，这个问题也已得到解决。可靠支持Python\
    \ 3.8的安卓应用是Pydroid 3。Pydroid 3内置了解释器，可用于读取-求值-打印循环（REPL）、交互式语言会话，还允许你编辑、保存和执行Python代码。此外，它还内置了专为Pydroid\
    \ 3设计的C、C++甚至Fortran编译器。借助它，你可以从pip构建任何库，也可以从命令行构建和安装依赖项。\n\n你可以从Google Play商店下载并安装Pydroid\
    \ 3的免费版和付费高级版（支持代码预测和代码分析）。\n\n## 在线Python解释器\n\n如果你希望在不实际安装Python的情况下查看示例和实时Python教程，有几个网站可以提供在线Python解释。这些基于云的Python解释器可能无法执行一些更复杂的活动，但对于运行大多数代码来说已经足够，如果你是初学者，这或许是个不错的入门方式。\n\
    \n- **Python.org在线控制台：** [https://www.python.org/shell/](https://www.python.org/shell/)\n\
    - **Repl.it：** [https://replit.com/](https://replit.com/)\n- **Trinket：** https://trinket.io/\n\
    - **Python Anywhere：** https://www.pythonanywhere.com/\n\n## 重新生成配置\n\n如果对Python的修改依赖于某些特定于可移植操作系统接口（POSIX）系统的功能，则更新配置脚本以测试其功能非常重要。\n\
    \nPython的配置脚本是使用Autoconf工具从configure.ac生成的，该工具用于在计算机系统上生成构建和打包软件的脚本。请确保你编辑的是configure.ac，然后运行autoreconf来重新生成configure以及许多其他文件，而不是直接编辑configure。\n\
    \n就像任何其他软件一样，在极少数情况下，你可能会在Parser/asdl_c.py或Python/makeopcodetargets.py等脚本中遇到Python错误。由于Python会自动生成部分代码，你需要从头开始完整构建才能运行自动生成脚本。为了解决这个问题，自动生成的文件也被检入到虚拟存储库Git中。\n\
    \nPython的使用非常广泛，几乎所有代码编辑器在首次编写Python代码时都提供了某种形式的支持。如果你正在寻找一些额外的工具或特殊指南来管理Python编码，可以在“附加资源”和“开发者指南”中搜索：https://devguide.python.org/#resources。在那里，你可以找到关于探索CPython内部结构、修改CPython语法、CPython编译器设计、CPython垃圾收集器设计以及基本工具支持选项的优秀材料。Python.org的维护还包括使用clang进行动态分析，以及Misc目录中找到的各种工具和配置文件。\n\
    \n# 第2章\n## Python数据类型\n\n## 本章内容\n\n- 介绍主要的Python数据类型\n- 讨论每种类型的内置方法描述\n- 解释如何访问、更新和修改Python数据类型\n\
    \n数据分析是当前一个非常重要的领域。大多数公司都希望聘请专业的数据分析师来管理庞大的数据库，并防止任何意外错误的发生。一个好的数据分析师是懂得如何使用各种编程工具来管理大量复杂数据，并从中找到相关信息的人。简而言之，如果你正在寻找一个不断发展的IT领域中的位置，可能作为数据分析师，你需要开始投资以下领域的技能，以便在职场中获得认可：\n\
    \n- **领域专业知识：** 你需要具备领域专业知识，才能处理大数据并得出与其工作场所相关的见解。\n- **编程技能：** 数据分析师应具备编程技能，知道使用哪些合适的库来清理数据、挖掘数据并从中获得见解。\n\
    - **统计学：** 分析师如果不知道如何使用一些基本的统计工具，就无法从数据中得出全部意义。\n- **可视化技能：** 数据分析师不能将原始数据作为工作成果呈现，他需要具备出色的数据可视化技能，以便向第三方总结和呈现全面的数据。\n\
    - **讲故事能力：** 最后，分析师需要向利益相关者或客户传达他们的发现。这意味着他们不仅要创建数据故事，还要有能力讲述它。\n\n数据类型基本上只是编程语言用于存储和操作其余数据的内部构造。尽管Python运行良好，但在数据分析过程的某个阶段，每个人都可能需要显式地将数据从一种类型转换为另一种类型。在本章中，我们将讨论基本的Python数据类型、它们如何映射，以及从一种数据类型转换为另一种数据类型的选项。简单来说，数据类型就是数据项的分类或归类。Python支持以下内置数据类型：\n\
    \n- **标量类型**\n  - **整数（Int）：** 整数代表正或负的整数（没有小数部分）。用于位级编程的位运算仅对整数有意义。二进制位运算的优先级都低于数值运算，高于比较运算。一元运算符~与其他一元数值运算符（+和-）具有相同的优先级。¹\n\
    \n下表按优先级升序列出了位运算：\n\n| 运算 | 描述 |\n| :--- | :--- |\n| x \\| y | x和y的按位或 |\n| x\
    \ ^ y | x和y的按位异或 |\n| x & y | x和y的按位与 |\n| x << n | x左移n位 |\n| x >> n | x右移n位\
    \ |\n| ~x | x的按位取反 |\n\n> ¹ https://docs.python.org/3/library/stdtypes.html, Python\n\
    \n## 整数类型的附加方法\n\nint类型实现了numbers和Integral抽象基类。此外，它还提供了更多操作方法：²\n\n1. **int.bit_length()**：返回以二进制表示整数所需的位数，不包括符号和前导零。\n\
    2. **int.to_bytes(length, byteorder, *, signed=False)**：返回表示整数的字节数组。\n3. **classmethod\
    \ int.from_bytes(bytes, byteorder, *, signed=False)**：返回由给定字节数组表示的整数。\n4. **int.as_integer_ratio()**：返回一对整数，其比率恰好等于原始整数，且分母为正。整数（整数）的整数比总是以整数为分子，1为分母。\n\
    \n- **浮点数（Float）**：表示实数，采用浮点表示法，其中小数部分由十进制符号或科学记数法表示。float类型实现了numbers和Real抽象基类。它还具有以下附加方法：³\n\
    \n1. **float.as_integer_ratio()**：返回一对整数，其比率恰好等于原始浮点数，且分母为正。\n2. **float.is_integer()**：如果浮点数实例是有限的且具有整数值，则返回True，否则返回False：\n\
    \n```\n>>>\n>>> (-2.0).is_integer()\nTrue\n>>> (3.2).is_integer()\nFalse\n```\n\
    \n有两种方法支持与十六进制字符串的相互转换。由于Python的浮点数在内部以二进制数存储，将浮点数转换为十进制字符串或从十进制字符串转换通常会涉及小的舍入误差。相比之下，十六进制字符串允许精确表示和指定浮点数。这在调试和数值工作中很有用。\n\
    \n3. **float.hex()**：返回浮点数的十六进制字符串表示。对于有限浮点数，此表示始终包含前导0x和尾随p及指数。\n4. **classmethod\
    \ float.fromhex(s)**：返回由十六进制字符串s表示的浮点数的类方法。字符串s可以有前导和尾随空格。请注意，float.hex()是实例方法，而float.fromhex()是类方法。\n\
    \n- **复数（Complex）**：由实部和虚部组成的数字，表示为x + 2y。\n- **布尔值（Bool）**：具有两个内置值True或False之一的数据。注意“T”和“F”是大写的。"
