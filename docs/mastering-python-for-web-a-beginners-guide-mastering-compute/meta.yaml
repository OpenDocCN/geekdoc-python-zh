    ## 作用域


    在编程中，名称的作用域指的是程序中可以明确找到该名称的区域，例如变量、函数或对象。名称仅在其作用域内的代码中可见和可访问。一些编程语言利用作用域来防止名称冲突和不需要的行为。最典型的是，通常有两种通用作用域需要区分：


    - 全局作用域（使你在此作用域中定义的名称对所有代码可用）

