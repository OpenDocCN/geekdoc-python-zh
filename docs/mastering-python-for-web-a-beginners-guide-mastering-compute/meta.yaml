    - 土耳其语 (tr)\n\n使用Python，任何人都可以开始新的翻译。您只需订阅doc-sig邮件列表，向社区介绍自己，并让每个人知道您即将开始的翻译。之后，您应该创建GitHub账户并召集人员帮助您翻译；否则，您将无法独自完成。您可以使用任何工具进行翻译，只要您能通过Transifex或Github与Git版本控制系统同步。请确保通过邮件列表让您的Python同仁了解您的工作和进展。\n\
    \n## 第4章：程序、算法与函数\n\n### 本章内容\n\n- 回顾主要的Python算法\n- 讨论Python脚本与模块的区别\n- 描述Python基本函数和Lambda函数\n\
    \n标准数据结构课程介绍一系列基本数据结构和算法，可以在当今任何可用的编程语言基础上进行教学。然而，大多数大学和在线课程选择采用Python语言来向学生介绍编程和问题解决。Python相比C++和Java等其他语言具有多项优势，其中最重要的是其语法简单，更易于学习。在本章中，我们将通过提供以Python为中心的数据结构课程算法和函数来扩展Python的使用。我们将学习该语言在脚本编写中使用的简洁语法和强大功能，以及这些功能的底层机制及其整体效率。\n\
    \n重要的是要理解，算法的设计和分析是当今计算机科学和工程教育中的一个基本主题。不幸的是，传统的编程语言迫使许多人处理数据结构和辅助程序的细节，而不是算法设计。Python代表了一种在开发中急需的面向算法的语言。Python的优势包括其简单的语法、基本函数的灵活性以及鼓励实验的交互性。我们将毫不拖延地分析这些以及许多其他特性。\n\
    \n![](img/25ba12f902f652c144ff96c17c35a084_148_0.png)\n\n## PYTHON脚本与模块\n\n在计算中，术语“脚本”用于指包含逻辑指令序列或一组处理文件的文件。这通常是一个存储在纯文本文件中的简单程序。因此，包含Python代码并设计为由用户直接执行的纯文本文件称为脚本，这是一个非正式术语，意指顶层程序文件。另一方面，包含Python代码并创建为从另一个Python文件导入和使用的纯文本文件，我们称之为模块。模块和脚本之间的主要区别在于模块旨在被导入，而脚本旨在被直接执行。无论如何，重要的是学习如何运行您在模块和脚本中编写的Python代码。脚本总是由解释器处理，解释器负责按顺序执行每个命令。\n\
    \n### 什么是Python解释器？\n\nPython是一种出色的编程工具，允许您以多种方式高效工作。Python还有一段称为解释器的软件。解释器是您正确运行Python代码和脚本所需的程序。从技术上讲，解释器是一层软件，运行在您的程序和计算机硬件之间，以使您的代码运行。根据您使用的代码实现，解释器可以是：\n\
    \n- 一个用Python本身编写的程序，通常使用PyPy解释器。\n- 一个用C编写的程序，使用CPython运行，这是该语言的核心实现。"
