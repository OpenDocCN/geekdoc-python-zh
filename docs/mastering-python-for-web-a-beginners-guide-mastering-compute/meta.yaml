    following are just a few of them:


    +   - **Avoid unconcise comments:** Your comments should be right to the point.
    In the case, where everything is plain understandable, you do not need to add
    anything. The acronym many developers use is D.R.Y., which stands for the programming
    slogan “Do not Repeat Yourself.” This means that your code should'
  - '[PAGE 115]


    be concise to the maximum. You do not need to comment on a part of code that sufficiently
    explains itself, like this one:


    ```

    return x # Returns a

    ```


    We can clearly see that x is returned, so there is clearly no need to repeat the
    statement in a comment. Malpractice as such makes comments W.E.T., meaning a developer
    “wrote everything twice.” In addition, once you have set the code running, make
    sure to go back and remove comments that have become redundant.


    +   - **Avoid unnecessary comments:** Unruly, complex comments can be a sign indicating
    that there might be a deeper problem with your code. Sometimes code comments could
    be used to mask the underlying errors of a program. Ultimately, comments should
    support your code, not try to hide miscommunications away. It is worth reminding
    yourself that if your code is poorly written, no amount of commenting is going
    to resolve it.


    A comment before every line should be kept simple by assigning obvious names to
    variables, functions, and collections. Your comments should rarely be longer than
    the code they back up. If you find yourself spending too much time and line space
    explaining what you did, then you need to go back and redesign to get a clearer
    code. In addition, using obvious naming conventions and removing all unnecessary
    comments can help to reduce the length of the code altogether.'
