  md: '# PROGRAMMATICALLY ACCESSING DOCSTRINGS


    As already pointed out in a previous section, Python code documentation is a key
    and continuous course in the process of software development. The term docstring
    is an abbreviation that stands for documentation string and defines your source
    code – what your function, module, or class does. As a rule, it is added as a
    regular comment right below the head of a code function, module, or method. Docstrings
    is a great way to create documentation for your Python code from within the code.
    This in-code documentation works for all modules, and all functions and classes
    exported by a module should also have docstrings. Public methods such as the __init__
    constructor also have docstrings. A package may be documented in the module docstring
    of the __init__.py file in the package directory.


    In order to write a docstring correctly, it is recommended to follow the official
    Python convention. In this case, PEP 257 – Docstring Convention written by David
    Goodger and Guido van Rossum himself, would be a great guideline to reflect upon.
    The aim of this PEP is to “standardize the high-level structure of docstrings:
    what they should contain, and how to say it.”⁴


    # Single-Line Docstrings


    Due to Python simplicity, the docstring comes as a single-line comment. However,
    keep in mind to start the text of a docstring with a capital letter, and end it
    with a period. Based on the trend that code is typically read more often


