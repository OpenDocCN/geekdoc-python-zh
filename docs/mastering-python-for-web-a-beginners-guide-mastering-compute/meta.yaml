    ## SCOPES


    In programming, the scope of a name refers to the area of a program where you
    can unambiguously locate that name, such as variables, functions, or objects.
    A name will only be visible to and accessible through the code in its scope. Some
    programming languages take advantage of scope for preventing name collisions and
    unwanted behaviors. Most typically, there are two general scopes to distinguish:


    - global scope (making names that you define in this scope available to all your
    code)

    - local scope (making names that you define in this scope visible to the code
    only within the scope).


    Scope was introduced mainly because early programming languages like BASIC only
    had global names. And with this type of name, any part of the program could modify
    any variable at any time, so operating and debugging large programs might turn
    into real misery. In order to work with global names, you would need to monitor
    all the code in mind and know what the value of a given name is at any time. This
    was an important side-effect, and some languages like Python decided to implement
    scope to avoid these issues. When you use a language that implements scope, there
    is no way for you to locate all the variables in a program, and your ability to
    access a given name will depend on where you have defined that name. To be clear,
    the term name here refers to the identifiers of variables, constants, functions,
    classes, or any other object that can be assigned a name.


    The names in your programs can only have the scope of the block of code in which
    you define them. In case you access the value of a given name from someplace in
    your code, you will state that the name is in scope. If you cannot locate the
    name, then you might say that the name is out of scope. Due to the fact that Python
    is considered to be a dynamically typed language, variables in Python come into
    existence only when you first assign them a value. On the other hand, functions
    and classes are available after you define them using `def` or `class`. Lastly,
    modules exist after you import them. As a summary, you can create Python names
    through one of the following operations:¹


    | Operation | Statement |

    | :--- | :--- |

    | Assignments | `x = value` |

    | Import operations | `import module` or `from module import name` |

    | Function definitions | `def my_func(): ...` |

    | Argument definitions in the context of functions | `def my_func(arg1, arg2,...
    argN): ...` |

    | Class definitions | `class MyClass: ...` |


    All the operations above create or, in the case of assignments, optimize new Python
    names because all of them assign a name to a variable, constant, function, class,
    instance, or module. However, there is an important distinction between assignment
    operations and reference or access operations. Thus, if you reference a name,
    you are just trying to retrieve its content or value. But when you assign a name,
    you are either creating that name or updating it.


    Python utilizes the location of the name assignment or definition to associate
    it with a specific scope. To put it simply, where you assign or define a name
    in your code will determine the scope or visibility of that name. For instance,
    if you assign a value to a name inside a function, then that name will have a
    local Python scope. In reverse, if you choose to assign a value to a name outside
    of all functions at the top level of a module, then that name will have a global
    Python scope.


    > ¹ https://realpython.com/python-scope-legb-rule/, Real Python


    In Python, the concept of scope is closely connected to the concept of the namespace.
    As previously mentioned, a Python scope determines where in your program a name
    is visible. Python scopes are executed as dictionaries that map names to objects.
    These dictionaries are addressed as namespaces. These are the general mechanisms
    that Python uses to store names. They are saved in a special attribute called
    `.__dict__`.


