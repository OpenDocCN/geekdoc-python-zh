- md: "iii. **None:** The None represents the null object in Python or by functions\
    \ that do not explicitly return a value.\n\n- **Sequence type:** A sequence means\
    \ an ordered collection of similar or different data types. Python has the following\
    \ built-in sequence data types:\n    - **String:** a string value simply represents\
    \ a collection of one or more characters put in single, double, or triple quotes.\n\
    \    - **List:** a list here stands for an ordered collection of one or more data\
    \ items, not necessarily of the same type, but in square brackets.\n    - **Tuple:**\
    \ a Tuple object is an ordered collection of one or more data items, not necessarily\
    \ of the same type, put in parentheses.\n\n- **Mapping type**\n    - **Dictionary:**\
    \ A dictionary Dict() object is a collection of data in a key:value pair form.\
    \ Such pairs have to be enclosed in curly brackets. For example: {1:“Sam,” 2:“Ben,\
    \ 3:“Roy, 4:“Molly”}\n\n- **Set types**\n    - **set:** The set in Python is the\
    \ same as the implementation of the set in Mathematics. A set object has suitable\
    \ methods to perform mathematical set operations like union, intersection, difference,\
    \ etc. In scripting, it goes as a mutable, unordered collection of distinct hashable\
    \ objects.\n    - **frozenset:** frozen, unlike the ordinary set, is an immutable\
    \ version of sets whose elements are added from other data types.\n\n- **Mutable\
    \ and immutable types:** Mutable data objects of the above-mentioned data types\
    \ are stored in a computer's memory for processing. Some of these values can be\
    \ modified during processing, but once they are created in the memory, their content\
    \ cannot be altered. Numbers, strings, and Tuples are immutable, which means their\
    \ contents cannot be changed after creation.\n\n- **Iterator types:** Python supports\
    \ a concept of iteration over containers and is using container user-defined classes\
    \ to support iteration. Sequences, described below in more detail, always support\
    \ the iteration methods:\n\n    1. **container.__iter__():** Return an iterator\
    \ object. This process is required to support the iterator protocol described\
    \ below, and if a container supports different types of iteration, additional\
    \ methods can be provided to specifically request iterators for those iteration\
    \ types. This method corresponds to the tp_iter slot of the type structure for\
    \ Python objects in the Python/C application programming interface (API).\n  \
    \  The iterator objects themselves are required to support the following two methods,\
    \ which together form the iterator protocol:⁴\n    2. **iterator.__iter__():**\
    \ Return the iterator object itself. This is required to allow both containers\
    \ and iterators to be used with the for and in statements. This method corresponds\
    \ to the tp_iter slot of the type structure for Python objects in the Python/C\
    \ API.\n    3. **iterator.__next__()**: Return the next item from the container.\
    \ If there are no further items, raise the StopIteration exception. This method\
    \ corresponds to the tp_iternext slot of the type structure for Python objects\
    \ in the Python/C API. Once an iterator's __next__() method raises StopIteration,\
    \ it must continue to do so on subsequent calls. Implementations that do not obey\
    \ this property are deemed broken.\n\nPython defines several iterator objects\
    \ to support iteration over general and specific sequence types, dictionaries,\
    \ and other more specialized forms. The specific types are not important beyond\
    \ their implementation of the iterator protocol.\n\nAnother important scripting\
    \ item in Python is *Operators*. They are used to perform operations on variables\
    \ and values. Python divides the operators into the following groups:\n\n1. Assignment\
    \ operators\n2. Arithmetic operators\n3. Logical operators\n4. Comparison operators\n\
    5. Identity operators\n6. Bitwise operators\n7. Membership operators\n\nArithmetic\
    \ operators are used with numeric values to perform common mathematical operations:⁵\n\
    \n| Operator | Name | Example |\n| :--- | :--- | :--- |\n| + | Addition | x +\
    \ y |\n| - | Subtraction | x - y |\n| * | Multiplication | x * y |\n| / | Division\
    \ | x / y |\n| % | Modulus | x % y |\n| ** | Exponentiation | x ** y |\n| // |\
    \ Floor division | x // y |\n\n- **Python Assignment Operators:** Assignment operators\
    \ are used to assigning values to variables:\n\n| Operator | Example | Same As\
    \ |\n| :--- | :--- | :--- |\n| = | x = 5 | x = 5 |\n| += | x += 3 | x = x + 3\
    \ |\n| -= | x -= 3 | x = x - 3 |\n| *= | x *= 3 | x = x * 3 |\n| /= | x /= 3 |\
    \ x = x / 3 |\n| %= | x %= 3 | x = x % 3 |\n| //= | x //= 3 | x = x // 3 |\n|\
    \ **= | x **= 3 | x = x ** 3 |\n| &= | x &= 3 | x = x & 3 |\n| |= | x |= 3 | x\
    \ = x | 3 |\n| ^= | x ^= 3 | x = x ^ 3 |\n| >>= | x >>= 3 | x = x >> 3 |\n| <<=\
    \ | x <<= 3 | x = x << 3 |\n\n⁵ https://docs.python.org/3/library/stdtypes.html,\
    \ Python\n\n52 ■ Mastering Python for Web\n\n- **Python Comparison Operators:**\
    \ Comparison operators are used to comparing two values:\n\n| Operator | Name\
    \ | Example |\n| --- | --- | --- |\n| == | Equal | x == y |\n| != | Not equal\
    \ | x != y |\n| > | Greater than | x > y |\n| < | Less than | x < y |\n| >= |\
    \ Greater than or equal to | x >= y |\n| <= | Less than or equal to | x <= y |\n\
    \n- **Python Logical Operators:** Logical operators are used to combining conditional\
    \ statements:\n\n| Operator | Description | Example |\n| --- | --- | --- |\n|\
    \ and | Returns True if both statements are true | x < 5 and x < 10 |\n| or |\
    \ Returns True if one of the statements is true | x < 5 or x < 4 |\n| not | Reverse\
    \ the result, returns False if the result is true | not(x < 5 and x < 10) |\n\n\
    - **Python Identity Operators:** Identity operators are used to comparing the\
    \ objects, not if they are equal, but if they are actually the same object, with\
    \ the same memory location:\n\n| Operator | Description | Example |\n| --- | ---\
    \ | --- |\n| is | Returns True if both variables are the same object | x is y\
    \ |\n| is not | Returns True if both variables are not the same object | x is\
    \ not y |\n\n- **Python Membership Operators:** Membership operators are used\
    \ to testing if a sequence is presented in an object:\n\n| Operator | Description\
    \ | Example |\n| :--- | :--- | :--- |\n| in | Returns True if a sequence with\
    \ the specified value is present in the object | x in y |\n| not in | Returns\
    \ True if a sequence with the specified value is not present in the object | x\
    \ not in y |\n\n- **Python Bitwise Operators:** Bitwise operators are used to\
    \ comparing (binary) numbers:\n\n| Operator | Name | Description |\n| :--- | :---\
    \ | :--- |\n| & | AND | Sets each bit to 1 if both bits are 1 |\n| \\| | OR |\
    \ Sets each bit to 1 if one of two bits is 1 |\n| ^ | XOR | Sets each bit to 1\
    \ if only one of two bits is 1 |\n| ~ | NOT | Inverts all the bits |\n| << | Zero\
    \ fill left shift | Shift left by pushing zeros in from the right |\n| >> | Signed\
    \ right shift | Shift right by pushing copies of the leftmost |\n\nNonetheless,\
    \ in the next part, we will give you more insight into how data types can be used,\
    \ manipulated, and implemented in the Python world. We will also examine some\
    \ useful functions and modifications to manipulate data sets. So, without wasting\
    \ time, let’s start with String data type.\n\n## STRING DATA TYPE\n\nThe most\
    \ basic definition of string can be a sequence of characters, in which sequence\
    \ is a data type that is made up of several elements of the same type, i.e., integers,\
    \ float, characters, strings, etc. In Python, there is a unique code provided\
    \ to all existing characters. The coding convention had been labeled as a Unicode\
    \ format. It consists of characters of almost every possible language and emoticons\
    \ too. Hence, strings can be considered as a special type of sequence, where all\
    \ its elements are characters. For example, string “Hello, You” is basically a\
    \ sequence [‘H’, ‘e’, ‘l’, ‘l’, ‘o’, ‘, ‘Y’, ‘o’, ‘u’] and its length can be calculated\
    \ by counting number of characters inside the sequence.\n\nString handling in\
    \ python requires the least effort because most string operations have very low\
    \ complexity compared to other languages. There are several ways you can manage\
    \ strings:\n\n- **Concatenation:** Concatenation simply means to join two strings.\
    \ Like to join “Hello” with “You,” to make it “HelloYou.” This is how you write\
    \ it:\n\n    ```python\n    >>> print (\"Hello\" + \"You\");\n    ```\n\n    A\
    \ plus sign + is enough to complete the task. When used with strings, the + sign\
    \ joins the two strings. Another example with multiple strings would be:\n\n \
    \   ```python\n    >>> s1 = \"Name Python \"\n    >>> s2 = \"had been adapted\
    \ \"\n    >>> s3 = \"from Monty Python\"\n    >>> print (s1 + s2 + s3)\n    ```\n\
    \n    Result: Name Python had been adapted from Monty Python"
  mdcn: "iii. **None：** None 代表 Python 中的空对象，或由未显式返回值的函数返回。\n\n- **序列类型：** 序列是指由相同或不同数据类型组成的有序集合。Python\
    \ 具有以下内置序列数据类型：\n    - **字符串：** 字符串值简单地表示一个或多个字符的集合，这些字符被置于单引号、双引号或三引号中。\n   \
    \ - **列表：** 这里的列表代表一个或多个数据项的有序集合，这些数据项不一定是相同类型，但置于方括号中。\n    - **元组：** 元组对象是一个或多个数据项的有序集合，这些数据项不一定是相同类型，置于圆括号中。\n\
    \n- **映射类型**\n    - **字典：** 字典 `Dict()` 对象是以键值对形式存储的数据集合。这样的对必须用花括号括起来。例如：`{1:“Sam,”\
    \ 2:“Ben, 3:“Roy, 4:“Molly”}`\n\n- **集合类型**\n    - **集合：** Python 中的集合与数学中集合的实现相同。集合对象具有执行数学集合运算（如并集、交集、差集等）的合适方法。在脚本中，它被视为一个可变的、无序的、由不同可哈希对象组成的集合。\n\
    \    - **冻结集合：** 冻结集合与普通集合不同，它是集合的不可变版本，其元素从其他数据类型添加而来。\n\n- **可变与不可变类型：** 上述数据类型的可变数据对象存储在计算机内存中以供处理。其中一些值可以在处理过程中被修改，但一旦它们在内存中创建，其内容就无法更改。数字、字符串和元组是不可变的，这意味着它们的内容在创建后无法更改。\n\
    \n- **迭代器类型：** Python 支持对容器进行迭代的概念，并使用容器的用户定义类来支持迭代。下文将更详细描述的序列始终支持迭代方法：\n\n \
    \   1.  **`container.__iter__():`** 返回一个迭代器对象。此过程是支持下文所述迭代器协议所必需的，如果一个容器支持不同类型的迭代，可以提供额外的方法来专门请求这些迭代类型的迭代器。此方法对应于\
    \ Python/C 应用程序编程接口（API）中 Python 对象类型结构的 `tp_iter` 槽位。\n    迭代器对象本身需要支持以下两个方法，它们共同构成迭代器协议：⁴\n\
    \    2.  **`iterator.__iter__():`** 返回迭代器对象本身。这是允许容器和迭代器都能与 `for` 和 `in` 语句一起使用所必需的。此方法对应于\
    \ Python/C API 中 Python 对象类型结构的 `tp_iter` 槽位。\n    3.  **`iterator.__next__()`：**\
    \ 返回容器中的下一个项目。如果没有更多项目，则引发 `StopIteration` 异常。此方法对应于 Python/C API 中 Python 对象类型结构的\
    \ `tp_iternext` 槽位。一旦迭代器的 `__next__()` 方法引发 `StopIteration`，它必须在后续调用中继续这样做。不遵守此属性的实现被视为有缺陷。\n\
    \nPython 定义了多个迭代器对象，以支持对通用和特定序列类型、字典以及其他更专门形式的迭代。除了它们对迭代器协议的实现之外，具体类型并不重要。\n\n\
    Python 中另一个重要的脚本项目是 *运算符*。它们用于对变量和值执行操作。Python 将运算符分为以下几组：\n\n1.  赋值运算符\n2.  算术运算符\n\
    3.  逻辑运算符\n4.  比较运算符\n5.  身份运算符\n6.  位运算符\n7.  成员运算符\n\n算术运算符用于数值以执行常见的数学运算：⁵\n\
    \n| 运算符 | 名称 | 示例 |\n| :--- | :--- | :--- |\n| + | 加法 | x + y |\n| - | 减法 | x\
    \ - y |\n| * | 乘法 | x * y |\n| / | 除法 | x / y |\n| % | 取模 | x % y |\n| ** | 幂运算\
    \ | x ** y |\n| // | 整除 | x // y |\n\n- **Python 赋值运算符：** 赋值运算符用于为变量赋值：\n\n| 运算符\
    \ | 示例 | 等同于 |\n| :--- | :--- | :--- |\n| = | x = 5 | x = 5 |\n| += | x += 3 |\
    \ x = x + 3 |\n| -= | x -= 3 | x = x - 3 |\n| *= | x *= 3 | x = x * 3 |\n| /=\
    \ | x /= 3 | x = x / 3 |\n| %= | x %= 3 | x = x % 3 |\n| //= | x //= 3 | x = x\
    \ // 3 |\n| **= | x **= 3 | x = x ** 3 |\n| &= | x &= 3 | x = x & 3 |\n| |= |\
    \ x |= 3 | x = x | 3 |\n| ^= | x ^= 3 | x = x ^ 3 |\n| >>= | x >>= 3 | x = x >>\
    \ 3 |\n| <<= | x <<= 3 | x = x << 3 |\n\n⁵ https://docs.python.org/3/library/stdtypes.html,\
    \ Python\n\n52 ■ 精通 Python Web 开发\n\n- **Python 比较运算符：** 比较运算符用于比较两个值：\n\n| 运算符\
    \ | 名称 | 示例 |\n| --- | --- | --- |\n| == | 等于 | x == y |\n| != | 不等于 | x != y\
    \ |\n| > | 大于 | x > y |\n| < | 小于 | x < y |\n| >= | 大于或等于 | x >= y |\n| <= | 小于或等于\
    \ | x <= y |\n\n- **Python 逻辑运算符：** 逻辑运算符用于组合条件语句：\n\n| 运算符 | 描述 | 示例 |\n| ---\
    \ | --- | --- |\n| and | 如果两个语句都为真，则返回 True | x < 5 and x < 10 |\n| or | 如果其中一个语句为真，则返回\
    \ True | x < 5 or x < 4 |\n| not | 反转结果，如果结果为真，则返回 False | not(x < 5 and x < 10)\
    \ |\n\n- **Python 身份运算符：** 身份运算符用于比较对象，不是比较它们是否相等，而是比较它们是否是同一个对象，具有相同的内存位置：\n\n\
    | 运算符 | 描述 | 示例 |\n| --- | --- | --- |\n| is | 如果两个变量是同一个对象，则返回 True | x is y\
    \ |\n| is not | 如果两个变量不是同一个对象，则返回 True | x is not y |\n\n- **Python 成员运算符：** 成员运算符用于测试序列是否存在于对象中：\n\
    \n| 运算符 | 描述 | 示例 |\n| :--- | :--- | :--- |\n| in | 如果对象中存在具有指定值的序列，则返回 True |\
    \ x in y |\n| not in | 如果对象中不存在具有指定值的序列，则返回 True | x not in y |\n\n- **Python\
    \ 位运算符：** 位运算符用于比较（二进制）数字：\n\n| 运算符 | 名称 | 描述 |\n| :--- | :--- | :--- |\n| & |\
    \ 与 | 如果两个位都为 1，则将每个位设置为 1 |\n| \\| | 或 | 如果两个位中有一个为 1，则将每个位设置为 1 |\n| ^ | 异或\
    \ | 如果两个位中只有一个为 1，则将每个位设置为 1 |\n| ~ | 非 | 反转所有位 |\n| << | 零填充左移 | 通过从右侧推入零向左移动\
    \ |\n| >> | 有符号右移 | 通过复制最左侧位向右移动 |\n\n尽管如此，在下一部分中，我们将更深入地探讨数据类型如何在 Python 世界中被使用、操作和实现。我们还将研究一些用于操作数据集的有用函数和修改方法。那么，事不宜迟，让我们从字符串数据类型开始。\n\
    \n## 字符串数据类型\n\n字符串最基本的定义可以是一个字符序列，其中序列是由相同类型的多个元素（即整数、浮点数、字符、字符串等）组成的数据类型。在 Python\
    \ 中，为所有现有字符提供了唯一的代码。编码约定被标记为 Unicode 格式。它包含几乎所有可能语言的字符以及表情符号。因此，字符串可以被视为一种特殊类型的序列，其所有元素都是字符。例如，字符串\
    \ \"Hello, You\" 基本上是一个序列 `['H', 'e', 'l', 'l', 'o', ',', 'Y', 'o', 'u']`，其长度可以通过计算序列中的字符数来确定。\n\
    \nPython 中的字符串处理所需的工作量最少，因为大多数字符串操作与其他语言相比复杂度非常低。有几种方法可以管理字符串：\n\n- **连接：** 连接简单地意味着连接两个字符串。例如，将\
    \ \"Hello\" 与 \"You\" 连接，使其成为 \"HelloYou\"。这是它的写法：\n\n    ```python\n    >>> print\
    \ (\"Hello\" + \"You\");\n    ```\n\n    一个加号 `+` 就足以完成任务。当与字符串一起使用时，`+` 号连接两个字符串。另一个包含多个字符串的示例是：\n\
    \n    ```python\n    >>> s1 = \"Name Python \"\n    >>> s2 = \"had been adapted\
    \ \"\n    >>> s3 = \"from Monty Python\"\n    >>> print (s1 + s2 + s3)\n    ```\n\
    \n    结果：Name Python had been adapted from Monty Python"
