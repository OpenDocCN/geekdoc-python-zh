    \ ASCII 标志，则仅匹配字母 `'a'` 到 `'z'` 和 `'A'` 到 `'Z'`。\n\n## re.L\n\n使 `\\w`、`\\W`、`\\\
    b`、`\\B` 和不区分大小写的匹配依赖于当前区域设置。此标志只能与字节模式一起使用。不鼓励使用此标志，因为区域设置机制非常不可靠，它一次只处理一种“文化”，并且仅适用于\
