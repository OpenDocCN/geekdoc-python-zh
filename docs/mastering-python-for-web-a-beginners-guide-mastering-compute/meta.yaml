    \ 和 Mac OS X 上运行您的应用程序。此外，Django 得到了许多网络托管提供商的良好支持，他们通常为托管 Django 站点提供特定的基础设施和文档。\n\
    \nDjango 持续改进，从 2008 年 9 月的第一个里程碑版本（1.0）到最近发布的版本 3.1（2020）。每次发布，Django 都添加了新的功能和错误修复，范围从支持新的数据库类型、模板引擎和缓存，到添加视图函数和类。如今，Django\
    \ 是一个蓬勃发展的协作开源项目，拥有众多用户和贡献者。虽然它仍然保留了一些反映其起源的特性，但 Django 已经转变为一个通用的框架，能够开发像 Instagram、Mozilla、National\
    \ Geographic、Open、Pinterest 和 Open Stack 这样的知名网站。\n\n## Django 是有主见的吗？\n\nWeb\
    \ 框架通常可以被定义为“有主见的”或“无主见的”。有主见的框架是指对处理任何特定问题的“最佳方式”持有看法的框架。它们倾向于支持在特定领域内进行快速开发，因为做任何事情的最佳方式通常被很好地理解和记录。同时，它们在解决其主要领域之外的问题时可能不够灵活，并且倾向于为它们可以使用的组件和方法提供更少的选择。\n\
    \n另一方面，无主见的框架在如何将组件粘合在一起以实现目标，甚至应该使用哪些组件方面限制较少。它们使开发人员更容易使用最合适的工具以最合适的成本完成特定任务。\n\
    \n按照这个逻辑，我们可以说 Django 是“有主见的”，因此提供了一组组件来处理大多数 Web 开发任务以及使用它们的首选方式。然而，Django 的解耦架构意味着您通常可以从多个不同的选项中进行选择，或者在必要时添加对全新选项的支持。\n\
    \n## Django 代码是什么样的？\n\n在一个典型的数据驱动网站中，Web 应用程序等待来自 Web 浏览器的 HTTP 请求。当收到请求时，应用程序根据\
    \ URL 以及可能在 POST 数据或 GET 数据中的信息来计算所需内容。根据需要，它可能会从数据库中读取或编写信息，或执行完成请求所需的其他任务。然后，应用程序将向\
    \ Web 浏览器返回一个响应，通常通过将检索到的数据插入到 HTML 模板中的占位符中来动态创建 HTML 页面供浏览器操作。\n\nDjango Web\
    \ 应用程序通常将处理每个步骤的代码组合到单独的文件中：\n\n- **URLs：** 虽然可以通过单个函数处理来自每个 URL 的请求，但为每个资源编写一个单独的视图函数要方便得多。URL\
    \ 映射器用于根据请求 URL 将 HTTP 请求重定向到适当的视图。它还可以匹配 URL 中出现的特定字符串或数字模式，并将这些作为数据传递给视图函数。\n\
    - **视图：** 视图是一个请求处理函数，它定位 HTTP 请求并返回 HTTP 响应。视图通过模型访问完成请求所需的数据，并将响应的格式化转发给模板。\n\
    - **模型：** 模型是为应用程序数据提供结构的 Python 对象，并提供管理和存储数据库记录的机制。\n- **模板：** 模板是一个文本文件，它构建文件（如\
    \ HTML 页面）的布局，使用占位符来表示实际内容。\n\nDjango 将这种整体文件组织称为“模型视图模板（MVT）”架构。它在许多方面与更熟悉的模型视图控制器架构相似。URL\
    \ 映射器通常存储在名为 `urls.py` 的文件中。在下面的示例中，映射器（`urlpatterns`）定义了路由和相应视图函数之间的映射列表。当收到一个\
    \ URL 与指定模式匹配的 HTTP 请求时，将调用关联的视图函数并传递请求。\n\n```python\nurlpatterns = [\n    path('admin/',\
    \ admin.site.urls),\n    path('book/<int:id>/', views.book_detail, name='book_detail'),\n\
    \    path('catalog/', include('catalog.urls')),\n    re_path(r'^([0-9]+)/$', views.best),\n\
    ]\n```\n\n`urlpatterns` 对象是 `path()` 和/或 `re_path()` 函数的列表（Python 列表使用方括号添加，其中项目用逗号分隔，并且可能有一个可选的尾随逗号。例如：`[item1,\
    \ item2, item3,]`）。\n\n两种方法的第一个参数都是将被匹配的路由（模式）。`path()` 方法使用尖括号定义 URL 中将被捕获并作为命名参数传递给视图函数的部分。\n\
    \n`re_path()` 函数应用了一种称为正则表达式的灵活模式匹配方法。第二个参数是另一个函数，当模式匹配时将被调用。表示法 `views.book_detail`\
    \ 表示该函数名为 `book_detail()`，可以在名为 `views` 的模块中找到（即在名为 `views.py` 的文件中）。\n\n## 处理请求（views.py）\n\
    \n视图是 Web 应用程序的核心，它从 Web 客户端接收 HTTP 请求并返回 HTTP 响应。同时，它们维护框架的其他资源以访问数据库和渲染模板。\n\
    \n下面的示例显示了一个最小的视图函数 `index()`，我们的 URL 映射器在上一节中可能已经调用了它。像所有视图函数一样，它接收一个 `HttpRequest`\
    \ 对象作为参数（`request`）并返回一个 `HttpResponse` 对象。在这种情况下，我们不应该对请求做任何事情，我们的响应返回一个硬编码的字符串。举例说明：\n\
    \n```python\n# filename: views.py (Django view functions)\nfrom Django.HTTP import\
    \ HttpResponse\ndef index(request):\n    # Get an HttpRequest - the request parameter\n\
    \    # perform operations using information from the request.\n    # Return HttpResponse\n\
    \    return HttpResponse('Hello from Django!')\n```\n\n## 定义数据模型（models.py）\n\n\
    Django Web 应用程序通过称为模型的 Python 对象来管理数据。模型旨在构建存储的数据，包括字段类型、大小、默认值、选择列表选项、用于文档的帮助文本以及用于表单的标签文本。模型的定义不依赖于底层数据库——您可以根据项目需求选择其中一种。一旦决定了要使用的数据库，就完全不需要直接接触它——您只需编写模型结构，Django\
    \ 将为您完成与数据库的通信。\n\n下面的代码片段显示了一个用于 Team 对象的简单 Django 模型。它将团队名称和团队级别定义为字符字段，并指定每条记录要存储的最大字符数。`team_level`\
    \ 可以是几个值之一，因此我们将其描述为一个选择字段，并提供要显示的选择与要存储的数据之间的映射，以及一个默认值。\n\n```python\n# filename:\
    \ models.py\nfrom django.db import models\nclass Team(models.Model):\n    team_name\
    \ = models.CharField(max_length=40)\n    TEAM_LEVELS = (\n        ('U09', 'Under\
    \ 09s'),\n        ('U10', 'Under 10s'),\n        ('U11', 'Under 11s'),\n     \
    \   ... #list other team levels\n    )\n    team_level = models.CharField(max_length=3,\
    \ choices=TEAM_LEVELS, default='U11')\n```"
