    **rubric**\n此指令用于创建不包含在目录中的段落标题。目前用于“脚注”标题。\n\n**centered**\n使用此指令，您可以创建一个居中的粗体段落。\n\
    \n**substitutions**\n文档系统提供三个默认定义的替换。它们放置在构建配置文件conf.py中。\n\n**release**\n替换为文档所指的Python发行版。代表完整的版本字符串，包括alpha/beta/发布候选标签。\n\
