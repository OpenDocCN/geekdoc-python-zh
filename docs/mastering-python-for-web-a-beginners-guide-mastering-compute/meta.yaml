    \ `search()`（另请参阅 `search()` 与 `match()`）。\n\n## re.fullmatch(pattern, string,\
    \ flags=0)\n\n如果整个字符串匹配正则表达式模式，则返回相应的匹配对象。如果字符串不匹配该模式，则返回 `None`；请注意，这与零长度匹配不同。\n\
    \n## re.split(pattern, string, maxsplit=0, flags=0)\n\n按模式的出现分割字符串。如果模式中使用了捕获括号，则模式中所有组的文本也将作为结果列表的一部分返回。如果\
    \ maxsplit 不为零，则最多发生 maxsplit 次分割，字符串的剩余部分将作为列表的最后一个元素返回。\n\n## re.findall(pattern,\
