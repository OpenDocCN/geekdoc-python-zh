    \ open Terminal:\n\n1. Press the `Cmd` + `Space` keys\n2. Type Terminal\n3. Press\
    \ `Enter`\n\nAlternatively, you can go through opening Finder and navigating to\
    \ *Applications* → *Utilities* → *Terminal*. With the command line open, try typing\
    \ in the following commands:\n\n```\n# Check the system Python version\n$ python\
    \ –version\n\n# Check the Python 2 version\n$ python2 –version\n\n# Check the\
    \ Python 3 version\n$ python3 –version\n```\n\nAnd if you have Python on your\
    \ system, then one or more of these commands would automatically respond with\
    \ a version number. You might want to get the latest version of Python if any\
    \ of these conditions is true:\n\n- None of the above commands come up with a\
    \ version number.\n- The only version you see displayed is in the Python 2.X series.\n\
    - You have a version of Python 3 that is not the newest available.\n\nAs mentioned\
    \ earlier, there are two ways to install the official Python distribution on macOS:\n\
    \n1. **The official installer:** This method requires downloading the official\
    \ installer from the Python.org website.\n2. **The Homebrew package manager:**\
    \ This method involves first downloading and installing the Homebrew package manager\
    \ if you do not have it installed yet, and then typing a command into a terminal\
    \ application.\n\nBoth the official installer and the Homebrew package manager\
    \ are great to work with, but the Python Software Foundation supports only the\
    \ official installer. And since the distributions installed by the official installer\
    \ and the Homebrew package manager are not similar, installing from Homebrew comes\
    \ with a few limitations.\n\nThe Python distribution for macOS on Homebrew does\
    \ not include the Tcl/Tk dependency required by the standard Python interface,\
    \ Tkinter module. Tkinter is the customary library module for developing GUI in\
    \ Python and also an interface for the Tk GUI toolkit. And since Homebrew does\
    \ not install the Tk GUI toolkit dependency, it still relies on an existing version\
    \ installed on your system. The system version of Tcl/Tk may be outdated and could\
    \ eventually prevent you from importing the Tkinter module.\n\nThe Homebrew package\
    \ manager is a popular method because Homebrew is a command-line utility, and\
    \ can be automated with basic scripts. Additionally, installing Python on macOS\
    \ is preferable by many since it is easy to manage from the command line and easy\
    \ to upgrade without having to go to a website. At the same time, the Python distribution\
    \ offered by Homebrew is not supported by the Python Software Foundation and therefore\
    \ not fully reliable. The most secure method on macOS is still to use the official\
    \ installer, especially if you would need Python GUI programming with Tkinter.\n\
    \n## How to Install from the Official Installer\n\nAs stated before, installing\
    \ Python from the official installer is the most reliable installation method\
    \ on macOS. It offers all the system dependencies needed for developing applications\
    \ with Python. You can install from the official installer in two simple steps.\n\
    \n**Step 1: Download the Official Installer by following these steps:**\n\n1.\
    \ Open a browser window and navigate to the Python.org Downloads page for macOS.\n\
    2. Under the “Python Releases for Mac OS X” heading, click on the *Latest Python\
    \ 3 Release*. As of now, the latest version is Python 3.9.2.\n3. Scroll to the\
    \ bottom and click *macOS 64-bit installer* to start the download.\n\n**Step 2:\
    \ Run the Installer by double-clicking the downloaded file.** You should be able\
    \ to see the following window:\n\n1. Press *Continue* until you are asked to agree\
    \ to the software license agreement. Then click *Agree*.\n2. You will then see\
    \ a window that tells you the install destination and asks how much space you\
    \ want it to take. You most likely do not need to change the default location,\
    \ so go continue by clicking *Install* to start the installation.\n3. When the\
    \ installer is finished copying files, click *Close* to close the installer window.\n\
    \n## How to Install from Homebrew\n\nFor users who need to install from the command\
    \ line, and do not need to develop GUI with the Tkinter module, the Homebrew package\
    \ manager would be a perfect option. You can install it from the Homebrew package\
    \ manager in two steps.\n\n**Step 1: Install Homebrew (in case you already have\
    \ Homebrew installed, then you can skip this step) following this procedure:**\n\
    \n1. Open a browser and go to http://brew.sh/\n2. You should see a command for\
    \ installing Homebrew near the top of the page under the title “Install Homebrew.”\n\
    3. Highlight this command with your cursor and press Cmd + C to copy it to your\
    \ clipboard.\n4. Open a terminal window and paste the command, then press Enter.\
    \ This way you have started the Homebrew installation.\n5. Enter your macOS user\
    \ password when requested. It may take a few minutes to download all of Homebrew’s\
    \ required files, but it is done, you will end up back at the shell prompt in\
    \ your terminal window. If you are doing this on macOS for the first time, you\
    \ may get a pop-up alert asking you to install Apple’s command line developer\
    \ tools. These tools are a pre-requisite for installation, so you need to confirm\
    \ the dialog box by clicking Install. And after the developer tools are installed,\
    \ you should press Enter to continue the installation of Homebrew. And once Homebrew\
    \ is installed, you are ready to install Python.\n\n**Step 2: Install Python by\
    \ following these steps:**\n\n1. Open a terminal application.\n2. Type in the\
    \ following command to upgrade Homebrew: $brew update && brew upgrade\n    This\
    \ will download and set up the latest version of Python on your computer. You\
    \ can make sure everything went correctly by testing it through the Terminal:\n\
    \    1. Open a terminal.\n    2. Type pip3 and press Enter.\n3. You should see\
    \ the text from Python’s pip package manager. If you get an error message running\
    \ pip3, you should go through the install steps again to make sure you have not\
    \ missed any steps.\n\n## How to Install Python on Linux\n\nIn this section, you\
    \ are going to learn about Python installation methods on Linux and as a result,\
    \ will hopefully be able to complete it yourself. Usually, many Linux distributions\
    \ already come packaged with Python, but it probably will not be the latest version\
    \ or could even be Python 2 instead of Python 3. You will need to check the version\
    \ yourself just to make sure. In order to find out which version of Python you\
    \ have, proceed to open a terminal window and try the following commands:\n\n\
    ```\n# Check the system Python version\n$ python -version\n\n# Check the Python\
    \ 2 version\n$ python2 -version\n\n# Check the Python 3 version\n$ python3 -version\n\
    ```\n\nIf you already have Python on your computer, then one or more of these\
    \ commands should come up with a version number. Typically, there are two convenient\
    \ and comparatively fast ways to install the official Python distribution on Linux:\n\
    \n1. **Install from a package manager:** This is the most popular installation\
    \ method on most Linux distributions. It requires running a command from the command\
    \ line.\n2. **Build from source code:** This method is more complex than using\
    \ a package manager. It involves running a series of commands from the command\
    \ line and at the same time making sure you have the correct dependencies installed\
    \ to complete the Python source code.\n\nUnfortunately, not every Linux distribution\
    \ has a package manager, and not every package manager has Python in its set.\
    \ Judging by your operating system, building Python from source code could be\
    \ your only option. Which installation method you are going to use mainly depends\
    \ on whether your Linux OS has a package manager and whether you want to control\
    \ the details of the installation.\n\nThe most popular to this day way to install\
    \ Python on Linux is with your operating system's package manager. It is considered\
    \ to be a default choice by many expert developers. However, depending on your\
    \ Linux distribution, Python may not be available through a package manager. In\
    \ this case, you will have to build up Python from source code.\n\nThere are three\
    \ main reasons that could limit you into choosing to build Python from source\
    \ code:\n\n1. You will not be able to download Python from your operating system's\
    \ package manager.\n2. If you might need to lower the memory footprint on embedded\
    \ systems, you will want to control how Python gets compiled.\n3. You want to\
    \ be able to test beta versions and release candidates of the latest and most\
    \ advanced version before it becomes available."
  mdcn: "## 精通Python网络开发\n\n当前版本的macOS，从macOS Catalina开始。自然，在macOS上有两种声称的安装方法：\n\n\
    1.  官方安装程序\n2.  Homebrew包管理器\n\n首先，你可能需要检查你的Mac上安装了哪个Python版本。你可以通过打开命令行应用程序（如终端）来完成。以下是打开终端的方法：\n\
    \n1.  按下 `Cmd` + `Space` 键\n2.  输入 Terminal\n3.  按下 `Enter`\n\n或者，你也可以通过打开Finder并导航到\
    \ *应用程序* → *实用工具* → *终端* 来打开。打开命令行后，尝试输入以下命令：\n\n```\n# 检查系统Python版本\n$ python\
    \ –version\n\n# 检查Python 2版本\n$ python2 –version\n\n# 检查Python 3版本\n$ python3\
    \ –version\n```\n\n如果你的系统上安装了Python，那么这些命令中的一个或多个会自动返回一个版本号。如果满足以下任一条件，你可能需要获取最新版本的Python：\n\
    \n-   以上命令均未返回版本号。\n-   你看到的唯一版本是Python 2.X系列。\n-   你安装的Python 3版本不是最新的可用版本。\n\
    \n如前所述，在macOS上安装官方Python发行版有两种方法：\n\n1.  **官方安装程序：** 此方法需要从Python.org网站下载官方安装程序。\n\
    2.  **Homebrew包管理器：** 此方法涉及首先下载并安装Homebrew包管理器（如果你尚未安装），然后在终端应用程序中输入命令。\n\n官方安装程序和Homebrew包管理器都很好用，但Python软件基金会仅支持官方安装程序。并且由于官方安装程序和Homebrew包管理器安装的发行版并不相同，从Homebrew安装会有一些限制。\n\
    \nHomebrew上的macOS Python发行版不包含标准Python接口Tkinter模块所需的Tcl/Tk依赖项。Tkinter是Python中开发GUI的惯用库模块，也是Tk\
    \ GUI工具包的接口。由于Homebrew不安装Tk GUI工具包依赖项，它仍然依赖于你系统上已安装的现有版本。系统版本的Tcl/Tk可能已过时，最终可能阻止你导入Tkinter模块。\n\
    \nHomebrew包管理器是一种流行的方法，因为Homebrew是一个命令行实用程序，并且可以通过基本脚本实现自动化。此外，在macOS上安装Python是许多人的首选，因为它易于从命令行管理，并且无需访问网站即可轻松升级。同时，Homebrew提供的Python发行版不受Python软件基金会支持，因此并非完全可靠。在macOS上最安全的方法仍然是使用官方安装程序，特别是如果你需要使用Tkinter进行Python\
    \ GUI编程。\n\n## 如何从官方安装程序安装\n\n如前所述，从官方安装程序安装Python是macOS上最可靠的安装方法。它提供了使用Python开发应用程序所需的所有系统依赖项。你可以通过两个简单的步骤从官方安装程序安装。\n\
    \n**步骤1：按照以下步骤下载官方安装程序：**\n\n1.  打开浏览器窗口，导航到Python.org的macOS下载页面。\n2.  在“Python\
    \ Releases for Mac OS X”标题下，点击 *Latest Python 3 Release*。截至目前，最新版本是Python 3.9.2。\n\
    3.  滚动到底部，点击 *macOS 64-bit installer* 开始下载。\n\n**步骤2：双击下载的文件运行安装程序。** 你应该能看到以下窗口：\n\
    \n1.  按 *Continue* 直到被要求同意软件许可协议。然后点击 *Agree*。\n2.  然后你会看到一个窗口，告诉你安装目标位置并询问你想占用多少空间。你很可能不需要更改默认位置，因此点击\
    \ *Install* 继续开始安装。\n3.  当安装程序完成文件复制后，点击 *Close* 关闭安装程序窗口。\n\n## 如何从Homebrew安装\n\
    \n对于需要从命令行安装且不需要使用Tkinter模块开发GUI的用户，Homebrew包管理器将是一个完美的选择。你可以通过两个步骤从Homebrew包管理器安装。\n\
    \n**步骤1：安装Homebrew（如果你已经安装了Homebrew，则可以跳过此步骤），按照此过程操作：**\n\n1.  打开浏览器并访问 http://brew.sh/\n\
    2.  你应该能在页面顶部标题“Install Homebrew”下看到安装Homebrew的命令。\n3.  用光标突出显示此命令，然后按 Cmd + C\
    \ 将其复制到剪贴板。\n4.  打开终端窗口，粘贴命令，然后按 Enter。这样你就开始了Homebrew的安装。\n5.  在请求时输入你的macOS用户密码。下载所有Homebrew所需文件可能需要几分钟，但完成后，你将回到终端窗口的shell提示符。如果你是第一次在macOS上执行此操作，可能会弹出一个警报，要求你安装Apple的命令行开发人员工具。这些工具是安装的先决条件，因此你需要通过点击Install来确认对话框。开发人员工具安装完成后，你应该按Enter继续安装Homebrew。一旦Homebrew安装完毕，你就可以安装Python了。\n\
    \n**步骤2：按照以下步骤安装Python：**\n\n1.  打开一个终端应用程序。\n2.  输入以下命令升级Homebrew：$brew update\
    \ && brew upgrade\n    这将下载并在你的计算机上设置最新版本的Python。你可以通过在终端中测试来确保一切正常：\n    1. \
    \ 打开一个终端。\n    2.  输入pip3并按Enter。\n3.  你应该看到来自Python的pip包管理器的文本。如果运行pip3时收到错误消息，你应该重新执行安装步骤，以确保没有遗漏任何步骤。\n\
    \n## 如何在Linux上安装Python\n\n在本节中，你将了解Linux上的Python安装方法，并希望能够自己完成。通常，许多Linux发行版已经预装了Python，但它可能不是最新版本，甚至可能是Python\
    \ 2而不是Python 3。你需要自己检查版本以确保。为了找出你拥有的Python版本，请打开一个终端窗口并尝试以下命令：\n\n```\n# 检查系统Python版本\n\
    $ python -version\n\n# 检查Python 2版本\n$ python2 -version\n\n# 检查Python 3版本\n$ python3\
    \ -version\n```\n\n如果你的计算机上已经有Python，那么这些命令中的一个或多个应该会返回一个版本号。通常，在Linux上有两种方便且相对较快的方法来安装官方Python发行版：\n\
    \n1.  **从包管理器安装：** 这是大多数Linux发行版上最流行的安装方法。它需要从命令行运行一个命令。\n2.  **从源代码构建：** 此方法比使用包管理器更复杂。它涉及从命令行运行一系列命令，同时确保你已安装正确的依赖项以完成Python源代码。\n\
    \n不幸的是，并非每个Linux发行版都有包管理器，也并非每个包管理器都包含Python。根据你的操作系统，从源代码构建Python可能是你唯一的选择。你将使用哪种安装方法主要取决于你的Linux操作系统是否有包管理器以及你是否想控制安装的细节。\n\
    \n迄今为止，在Linux上安装Python最流行的方法是使用操作系统的包管理器。许多专家开发者将其视为默认选择。然而，根据你的Linux发行版，Python可能无法通过包管理器获得。在这种情况下，你将不得不从源代码构建Python。\n\
    \n有三个主要原因可能限制你选择从源代码构建Python：\n\n1.  你将无法从操作系统的包管理器下载Python。\n2.  如果你需要降低嵌入式系统的内存占用，你将希望控制Python的编译方式。\n\
    3.  你希望能够在最新、最先进的版本正式发布之前测试其测试版和发布候选版。"
