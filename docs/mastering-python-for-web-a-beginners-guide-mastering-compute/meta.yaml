  - '[PAGE 254]


    # REGULAR EXPRESSIONS


    Regular expressions, also called RE, regexes, or regex patterns are tiny, highly
    specialized programming language codes embedded inside Python and made available
    via re-modeling. Using this little language, you define the rules for the set
    of possible strings that you need to match; this set might consist of English
    sentences, or e-mail addresses, commands or anything else that you like.


    Regular expression patterns are compiled into sets of bytecodes which are then
    executed by a matching engine written in C. For professional expert use, it may
    be necessary to pay attention to how the engine will implement a given RE, and
    write the RE in a particular way in order to produce a byte-code that runs faster.
    The regular expression language is small and limited, so not all possible string
    processing tasks can be completed using regular expressions. There are some tasks
    that can be done with regular expressions, but the expressions turn out to be
    very complicated. In these instances, you may be better off writing Python code
    to do the processing; even if Python code will be slower than an elaborate regular
    expression, it will also probably be more understandable.


    A regular expression defines a set of strings that matches it. Ultimately, the
    functions in this module let you see if a particular string matches a given regular
    expression or if a given regular expression matches a particular string. Additionally,
    regular expressions can be applied to form new regular expressions; if A and B
    are both regular expressions, then AB is also a regular expression. By the same
    logic, if a string p matches A and another string q matches B, the string pq will
    match AB. Therefore, complex expressions can easily be constructed from simpler
    primitive expressions.'
  - '[PAGE 255]


    Regular expressions can consist of both special and ordinary characters. Most
    ordinary characters, like ‘A’, ‘a’, or ‘0’ are the simplest regular expressions;
    they simply match themselves. Some characters, like ‘|’ or ‘(’, are special. Special
    characters either stand for classes of ordinary characters or impact how the regular
    expressions around them are interpreted.


    Repetition qualifiers (*, +, ?, {m,n}, etc) cannot be directly nested. This avoids
    ambiguity with the non-greedy modifier suffix?, and with other modifiers in other
    implementations. To apply a second repetition to an inner repetition, parentheses
    may be needed. For instance, the expression (?:a{6})* matches any multiple of
    six ‘a’ characters.


    The special characters are:²


    .

    In the default mode, dot matches any character except a newline. If the DOTALL
    flag has been added, this matches any character, including a newline.


    ^

    Caret goes at the start of the string, and in MULTILINE mode also matches immediately
    after each newline.


    $

    Matches the end of the string or just before the newline at the end of the string,
    and in MULTILINE mode also matches before a newline.


    ² https://docs.python.org/3/library/re.html, Python'
  - '[PAGE 256]


    *


    Causes the resulting RE to match 0 or more repetitions of the preceding RE, as
    many repetitions as are possible. ab* will match ‘a’, ‘ab’, or ‘a’ followed by
    any number of ‘b’s.


    +


    Causes the resulting RE to match 1 or more repetitions of the preceding RE. ab+
    will match ‘a’ followed by any non-zero number of ‘b’s; it will not match just
    ‘a’.


    ?


    Causes the resulting RE to match 0 or 1 repetitions of the preceding RE. ab? will
    match either ‘a’ or ‘ab’.


    *?, +?, ??


    The ‘*’, ‘+’, and ‘?’ qualifiers match as much text as possible. For example,
    if the RE <.*> is matched against ‘<a> b <c>’, it will match the entire string,
    and not just ‘<a>’. Adding ? after the qualifier makes it perform the match in
    minimal fashion; as few characters as possible will be matched. Using the RE <.*?>
    will match only ‘<a>’.


    {m}


    Specifies that exactly m copies of the previous RE should be matched; fewer matches
    cause the entire RE not to match. For example, a{6} will match exactly six ‘a’
    characters, but not five.'
- md: '## {m,n}


    Causes the resulting RE to match from m to n repetitions of the preceding RE,
    attempting to match as many repetitions as possible. For example, a{3,5} will
    match from 3 to 5 “a” characters. Omitting m specifies a lower bound of zero,
    and omitting n specifies an infinite upper bound. As an example, a{4,}b will match
    ‘aaaab’ or a thousand ‘a’ characters followed by a ‘b’, but not ‘aaab’. The comma
    may not be omitted, or the modifier would be confused with the previously described
    form.


    ## {m,n}?


    Causes the resulting RE to match from m to n repetitions of the preceding RE,
    attempting to match as few repetitions as possible. This is the non-greedy version
    of the previous qualifier. For example, on the 6-character string ‘aaaaaa’, a{3,5}
    will match 5 ‘a’ characters, while a{3,5}? will only match 3 characters.


    ## \


    Either escapes special characters (permitting you to match characters like ‘*’,
    ‘?’), or signals a special sequence; special sequences are discussed below.


    It is also worth noting that special characters lose their special meaning inside
    sets. For example, [(+*)] will match any of the literal characters ‘(‘, ‘+’, ‘*’,
    or ‘)’. Character classes such as \w or \S (defined below) are also accepted inside
    a set, although the characters they match depends on whether ASCII or LOCALE mode
    is in force.


    Characters that are not within a range can be matched by complementing the set.
    If the first character of the set is ‘^’, all the characters that are not in the
    set will be matched. For instance, [^5] will match any character except ‘5’, and
    [^^] will match any character except ‘^’. ^ has no special meaning if it’s not
    the first character in the set.


    ## A|B


    A|B, where A and B can be arbitrary REs, creates a regular expression that will
    match either A or B. An arbitrary number of REs can be separated by the ‘|’ in
    this way. As the target string is scanned, REs separated by ‘|’ are tried from
    left to right. When one pattern completely matches, that branch is accepted. This
    means that once A matches, B will not be tested further, even if it would produce
    a longer overall match. In other words, the ‘|’ operator is never greedy. To match
    a literal ‘|’, use \|, or enclose it inside a character class, as in [|].


    ## (...)


    Matches whatever regular expression is inside the parentheses, and indicates the
    start and end of a group; the contents of a group can be retrieved after a match
    has been performed, and can be matched later in the string with the \number special
    sequence, described below. To match the literals ‘(’ or ‘)’, use \( or \), or
    enclose them inside a character class: [(], [)].


    ## (?...)


    This is an extension notation where the first character after the ''?'' determines
    what the meaning and further syntax of the construct is. Extensions usually do
    not create a new group; (?P<name>...) is the only exception to this rule. Following
    are the currently supported extensions.


    ### (?aiLmsux)


    (One or more letters from the set ''a'', ''i'', ''L'', ''m'', ''s'', ''u'', ''x''.)
    The group matches the empty string; the letters set the corresponding flags: re.A
    (ASCII-only matching), re.I (ignore case), re.L (locale-dependent), re.M (multi-line),
    re.S (dot matches all), re.U (Unicode matching), and re.X (verbose), for the entire
    regular expression. (The flags are described in Module Contents.) This is useful
    if you wish to include the flags as part of the regular expression, instead of
    passing a flag argument to the re.compile() function. Flags should be used first
    in the expression string.


    ### (?:...)


    A non-capturing version of regular parentheses. Matches whatever regular expression
    is inside the parentheses, but the substring matched by the group cannot be retrieved
    after performing a match or referenced later in the pattern.


    ### (?aiLmsux-imsx:...)


    (Zero or more letters from the set ‘a’, ‘i’, ‘L’, ‘m’, ‘s’, ‘u’, ‘x’, optionally
    followed by ‘-’ followed by one or more letters from the ‘i’, ‘m’, ‘s’, ‘x’.)
    The letters set or remove the corresponding flags: re.A (ASCII-only matching),
    re.I (ignore case), re.L (locale-dependent), re.M (multi-line), re.S (dot matches
    all), re.U (Unicode matching), and re.X (verbose), for the part of the expression.
    (The flags are described in Module Contents.)


    The letters ‘a’, ‘L’ and ‘u’ are mutually exclusive when used as inline flags,
    so they should not be combined or follow ‘-’. Instead, when one of them appears
    in an inline group, it overrides the matching mode in the enclosing group. In
    Unicode patterns (?a:...) switches to ASCII-only matching, and (?u:...) switches
    to Unicode matching (default). In byte pattern (?L....) switches to locale depending
    matching, and (?a:....) switches to ASCII-only matching (default). This override
    is only in effect for the narrow inline group, and the original matching mode
    is restored outside of the group.


    ### (?P<name>...)


    Similar to regular parentheses, but the substring matched by the group is accessible
    with the symbolic group name. Group names must be valid Python identifiers, and
    each group name must be defined only once within a regular expression. A symbolic
    group is also a numbered group, just as if the group were not named.


    ### (?P=name)


    A backreference to a named group; it matches whatever text was matched by the
    earlier group named name.


    ### (?#...)


    A comment; the contents of the parentheses are simply ignored.


    ### (?=...)


    Matches if ... matches next, but does not consume any of the string. This is called
    a lookahead assertion. For example, Isaac (?=Newton) will match ‘Isaac’ only if
    it’s followed by ‘Newton’.


    ### (?!...)


    Matches if ... does not match next. This is a negative lookahead assertion. For
    example, Isaac (?!Newton) will match ‘Isaac’ only if it is not followed by ‘Newton’.


    ### (?<=...)


    Matches if the current position in the string is preceded by a match for ... that
    ends at the current position. This is called a positive lookbehind assertion.
    (?<=abc)def will find a match in ‘abcdef’, since the lookbehind will back up 3
    characters and check if the contained pattern matches. The contained pattern must
    only match strings of some fixed length, meaning that abc or a|b are allowed,
    but a* and a{3,4} are not. Note that patterns that start with positive lookbehind
    assertions will not match at the beginning of the string being searched; you will
    most likely want to use the search() function rather than the match() function.


    ```python

    >>> import re

    >>> m = re.search(''(?<=abc)def'', ''abcdef'')

    >>> m.group(0)

    ''def''

    ```


    This example looks for a word following a hyphen:


    ```python

