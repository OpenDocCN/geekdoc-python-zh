  mdcn: "## 8 ■ 掌握 Python 进行 Web 开发\n\n- **Python 学习周期不长：** 尽管 Python 是一门功能强大且用途广泛的语言，但学习它并不需要数年时间或完成多个学位。大多数行业专业人士通过各种在线课程掌握了\
    \ Python 基础知识（包括 Python 的语法、关键字和数据类型），这些课程平均只需 6-8 周。而且，如果你有编程语言的学习经验，掌握 Python\
    \ 可能会更快。\n\n- **你可以免费学习 Python 基础知识：** Python 背后的组织——Python 软件基金会在其官方网站上提供免费的\
