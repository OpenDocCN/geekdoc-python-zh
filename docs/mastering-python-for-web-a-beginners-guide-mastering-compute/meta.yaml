  md: '# Additional Methods on Integer Types


    The int type implements the numbers and integral abstract base class. In addition,
    it provides a few more operational methods:²


    +   1. **int.bit_length()**: Return the number of bits necessary to represent
    an integer in binary, excluding the sign and leading zeros.

    2. **int.to_bytes(length, byteorder, *, signed=False)**: Return an array of bytes
    representing an integer.

    3. **classmethod int.from_bytes(bytes, byteorder, *, signed=False)**: Return the
    integer represented by the given array of bytes.

    4. **int.as_integer_ratio()**: Return a pair of integers whose ratio is exactly
    equal to the original integer and with a positive denominator. The integer ratio
    of integers (whole numbers) is always the integer as the numerator and 1 as the
    denominator.


    i. **Float**: Represents real number with a floating-point representation in which
    a fractional component is denoted by a decimal symbol or scientific notation.
    The float type implements the numbers and real abstract base class. It also has
    the following additional methods:³


