    ## decoratormethod


    与装饰器相同，但用于作为方法的装饰器。你可以使用 :meth: 角色来引用装饰器方法。


    ## staticmethod


    描述对象的静态方法。描述通常包含与函数描述类似的信息。此指令也应嵌套在类指令中。


    ## classmethod


    描述对象的类方法，使用与函数描述类似的信息。参数不应包含 cls 参数，且指令应嵌套在类指令中。


    ## abstractmethod


    描述对象的抽象方法，包含与函数描述类似的信息。此指令应嵌套在类指令中。


    **opcode**

    描述一个 Python 字节码指令。


    **cmdoption**

    代表一个 Python 命令行选项或开关。确保选项参数名称用尖括号括起来。


    ## 内联标记


    如前所述，Sphinx 使用解释文本角色在文档中插入语义标记。以下角色与模块中的对象相关，如果找到匹配的标识符，可能会生成超链接：¹⁰


    **mod**

    模块的名称。通常是点分隔的，用于包名。


    **func**

    Python 函数的名称；可以使用点分隔的名称。为了增强可读性，角色文本不应包含尾随括号。在搜索标识符时会去除括号。


    **data**

    模块级变量或常量的名称。


    **const**

    “已定义”常量的名称。这可以是 C 语言的 #define 或不可变的 Python 变量。


    **class**

    类名；可以使用点分隔的名称。


    **meth**

    对象方法的名称。角色文本应包含类型名和方法名。


    **attr**

    对象数据属性的名称。


    **exc**

    异常的名称。可以使用点分隔的名称。此标记中包含的名称可以包括模块名称和/或该名称的内置函数。


    以下角色如果在应用程序编程接口（API）文档中编码，则会创建对 C 语言的交叉引用：¹¹


    **c:data**

    C 语言变量的名称。


    **c:func**

    C 语言函数的名称，应包含尾随括号。


    **c:macro**

    如上所述的“简单”C 宏的名称。


    **c:type**

    C 语言类型的名称。


    **c:member**

    C 类型成员的名称。


    以下角色与对象无关，但用于创建交叉引用或内部链接：


    **envvar**

    一个环境变量，会生成索引条目。


    **keyword**

    Python 关键字的名称。使用此角色将生成指向该关键字文档的链接。


    **option**

    Python 的命令行选项。必须包含前导连字符。如果存在匹配的 cmdoption 指令，请使用简单的 ``code`` 标记。


    **token**

    语法标记的名称，主要用于参考手册中，在产生式显示之间创建链接。


    **term**

    对术语表中术语的引用。术语表是使用 glossary 指令创建的，该指令包含一个定义列表，其中包含术语和定义。它不必与术语标记位于同一文件中，但如果你使用了一个未在术语表中解释的术语，构建时会收到警告。


    **command**

    操作系统级命令的名称，例如 rm。除了以不同样式格式化文本外，它没有特殊功能。


    **dfn**

    用于在文本中标记术语的定义实例，而不生成索引条目。


    **file**

    文件或目录的名称。在构建过程中，你可以使用花括号表示内容的“变量”部分，例如：


    ```

    ``spam`` is installed in:file:`/usr/lib/python2.{x}/site-packages ...

    ```


    在文档的后续部分，x 将以不同方式显示，表示它将被 Python 次版本号替换。


    **guilabel**

    作为交互式用户界面一部分显示的标签必须使用 guilabel 标记。这包括来自基于文本的界面的标签，例如使用 curses 或其他基于文本内容创建的界面。基本上，界面中使用的任何标签都应使用此角色标记，即使是按钮标签、窗口标题、字段名称、菜单和选择列表中的值。


    **kbd**

    此角色用于标记按键序列。按键序列的形式通常取决于平台或应用程序特定的约定。如果没有相关约定，为了提高新用户的可访问性，应拼写出修饰键的名称。


    **mailheader**

    此标记并不意味着该标题用于电子邮件消息，它也用于各种媒体类型规范定义的标题。标题名称应以实践中通常出现的方式输入，如果有多种常见用法，则首选驼峰式命名约定。


    **makeover**

    make 变量的名称。


    **manpage**

    对 Unix 手册页的引用，也包括章节。


    **menuselection**

    菜单选择必须使用 menuselection 角色标记。这通常用于标记完整的菜单选择序列，包括选择子菜单和选择特定操作，或此类序列的任何子序列。各个选择的名称应使用
    -> 分隔。


    **mimetype**

    媒体类型或媒体主要或次要部分的名称。


    **newsgroup**

    代表 Usenet 新闻组的名称。


    **program**

    可执行程序的名称。对于某些平台，这可能与可执行文件的文件名不同。准确地说，对于 Windows 程序，应删除 .exe（或其他）扩展名。


    **regexp**

    不包含引号的正则表达式。


    **samp**

    一段文本，例如代码。在内容中，你可以使用花括号表示“变量”部分，如果你不需要“变量部分”指示，可以使用标准的 ``code`` 代替。


    现在我们转向用于生成外部链接的角色：¹²


    **pep**

    指 Python 增强提案。这会生成适当的索引条目。在 HTML 输出中，此文本是指定 PEP 在线副本的超链接。但是，此类超链接不应替代在手册中正确记录语言。


    **rfc**

    对互联网请求评论的引用。这会在 HTML 输出中生成适当的索引条目，并且此文本被视为指定 RFC 在线副本的超链接。请注意，没有特殊角色用于包含超链接，因为你可以使用标准的
    reST 标记来实现此目的。


    ¹⁰ https://devguide.python.org/documenting/, Python

    ¹¹ https://devguide.python.org/documenting/, Python

    ¹² https://devguide.python.org/documenting/, Python'
