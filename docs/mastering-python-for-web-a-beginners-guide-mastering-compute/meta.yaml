    \ will be a list of tuples if the pattern has more than one group. Empty matches\
    \ are included in the result and non-empty matches can start just after a previous\
    \ empty match.\n\n## re.finditer(pattern, string, flags=0)\n\nReturn an iterator\
    \ yielding match objects over all non-overlapping matches for the RE pattern in\
    \ string. The string is scanned left-to-right, and matches are returned in the\
    \ order found. Empty matches are included in the result and non-empty matches\
    \ can now start just after a previous empty match.\n\n## re.sub(pattern, repl,\
    \ string, count=0, flags=0)\n\nReturn the string obtained by replacing the leftmost\
    \ non-overlapping occurrences of pattern in string with the replacement repl.\
    \ If the pattern is not found, string is returned unchanged. repl can be a string\
    \ or a function; if it is a string, any backslash escapes in it are processed.\n\
    \n## Regular Expression Objects\n\nCompiled regular expression objects support\
    \ the following methods and attributes:⁵\n\n- **Pattern.search(string[, pos[,\
    \ endpos]])**: Scan through string looking for the first location where this regular\
