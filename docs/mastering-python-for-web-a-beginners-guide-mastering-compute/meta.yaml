    - **Grammar**: contains the EBNF grammar file for Python.'
  - '[PAGE 32]


    18 ■ Mastering Python for Web


    +   - **Include**: contains all interpreter-wide header files.

    - **Lib**: the part of the standard library implemented in pure Python.

    - **Mac**: Mac-specific code (e.g., using IDLE as an OS X application).

    - **Misc**: things that do not belong elsewhere. Typically, this is varying kinds
    of developer-specific documentation.

    - **Modules**: the part of the standard library (plus some other code) that is
    implemented in C.

    - **Objects**: code for all built-in types.

    - **PC**: Windows-specific code.

    - **PC build**: build files for the version of MSVC currently used for the Windows
    installers provided on python.org.

    - **Parser**: code related to the parser. The definition of the AST nodes is also
    kept here.

    - **Programs**: source code for C executables, including the main function for
    the CPython interpreter (in versions prior to Python 3.5, these files are in the
    Modules directory).

    - **Python**: the code that makes up the core CPython runtime. This includes the
    compiler, eval loop, and various built-in modules.

    - **Tools**: various tools that are (or have been) used to maintain Python.'
