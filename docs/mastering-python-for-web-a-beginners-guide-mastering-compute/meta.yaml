    value of the function is memorized or calculated for the first time.


    A top-down solution makes sure to reach the base case of every problem by breaking
    it into smaller sub-problems. By using such a style of recursive chain, top-down
    dynamic programming only solves sub-problems as they are needed rather than solving
    them all in order. In this case, memoization plays a great role as a tool to handle
    computationally expensive programs. Memoization could be defined as a process
    of saving sub-problem solutions in a top-down approach. And because top-down approaches
    solve problems as needed, memorization also stores data in a non-sequential way.
    For this, hashtables are the best collection type, as they store data in an unordered
    way. In Python, top-down is best completed using the dictionary data structure
    because it is a perfect suit to store unordered data with key/value pairs.


    Bottom-up is another operative way to avoid recursion by decreasing the time complexity
    that recursion leads to. In this case, the solutions to small problems are calculated
    in order to build up the solution to the overarching problem. Bottom-up dynamic
    programming solutions start by focusing on the smallest possible sub-problem,
    called the base case, and then work step-by-step up to each sub-problem. And as
    each sub-problem is completed, its solution is saved and used to solve the next
