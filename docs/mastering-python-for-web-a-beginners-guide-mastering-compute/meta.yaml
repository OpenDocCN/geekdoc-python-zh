    # Is Django Opinionated?


    Web frameworks can often be defined as “opinionated” or “unopinionated.” Opinionated
    frameworks are those with opinions about the “best way” to handle any particular
    issue. They tend to support rapid development in a particular domain because the
    best way to do anything is usually well-understood and well-documented. At the
    same time, they can be less flexible at solving problems outside their main domain
    and tend to offer fewer options for what components and approaches they can use.


    On the other hand, unopinionated frameworks have lesser restrictions on the best
    way to glue components together to achieve a goal, or even what components should
    be utilized. They make it easier for developers to use the most appropriate tools
    to complete a particular task, at the most suited cost.


    Following this logic, we could say that Django is “opinionated,” and therefore
    delivers a set of components to handle most web development tasks and preferred
    ways to use them. However, Django’s decoupled architecture means that you can
    usually choose from a number of different options, or add support for completely
    new ones if necessary.'
  - '[PAGE 246]


    # What Does Django Code Look Like?


    In a typical data-driven website, a web application waits for HTTP requests from
    the web browser. When a request is received, the application calculates what is
    needed based on the URL and possibly information in POST data or GET data. Depending
    on what is required, it may then read or script information from a database or
    perform other tasks required to complete the request. The application will then
    return a response to the web browser, often dynamically creating an HTML page
    for the browser to operate by inserting the retrieved data into placeholders in
    an HTML template.


    Django web applications typically combine the code that handles each of these
    steps into separate files:


    +   - **URLs:** While it is possible to process requests from every single URL
    via a single function, it is much more convenient to write a separate view function
    to handle each resource. A URL mapper is utilized to redirect HTTP requests to
    the appropriate view based on the request URL. It can also match specific patterns
    of strings or digits that appear in a URL and pass these to a view function as
    data.

    - **View:** A view is a request handler function, which locates HTTP requests
    and returns HTTP responses. Views access the data needed to complete requests
    via models and forward the formatting of the response to templates.

    - **Models:** Models are Python objects that give structure to an application''s
    data, and provide mechanisms to manage and store records in the database.'
