    \ | Returns the __dict__ property of an object |\n| zip() | Returns an iterator,\
    \ from two or more iterators |\n\n## DYNAMIC PROGRAMMING\n\nDynamic programming\
    \ is a great approach that can be applied to a set of problems for finding an\
    \ efficient and optimal solution. To put it simply, the idea behind dynamic programming\
    \ is to divide the problems into sub-problems and store the result for the future\
    \ so that you do not have to compute that same problem all over again. Such optimization\
    \ of sub-problems that seeks the overall solution is known as optimal substructure\
    \ property.\n\nDynamic programming was designed as a problem-solving technique\
    \ for resolving complex problems by recursively breaking them up into sub-problems,\
    \ which then could be each solved one by one. Therefore, dynamic programming uses\
    \ recursive programming and helps to save the time of re-computing inputs later.\
    \ However, this approach differs from the Divide and Conquer paradigm in that\
    \ sub-problems in dynamic programming solutions are intertwined, so some of the\
    \ same identical steps needed to solve one sub-problem are also saved until needed\
    \ for other sub-problems. This leads us to the main key point of dynamic programming.\
    \ Instead of recomputing some of the shared steps, dynamic programming lets us\
    \ simply store those solutions of each step the first time and reuse them each\
    \ subsequent time.\n\nAt the same time, dynamic programming should not be confused\
    \ with recursion. Recursion refers to a system of finding the solution by expressing\
    \ the value of a function in terms of other values following a top-down approach.\
    \ Dynamic programming, on the other hand, is nothing but recursion with memorization,\
    \ or calculation and storing values that can be later accessed to solve re-occurring\
    \ issues, therefore making your code faster and reducing the time complexity.\
    \ Here, the underlying idea is to save time by efficient use of space. Recursion\
    \ might take time but does not need space while dynamic programming requires storage\
    \ space to stock solutions to sub-problems for potential reference.\n\nAnd even\
    \ though the two systems are closely connected, dynamic programming is still favored\
    \ whenever possible. It mostly happens because brute force recursive programs\
    \ tend to repeat work when faced with overlapping processes, spending precious\
    \ time and resources for calculation. Dynamic programming prevents this issue\
    \ by making sure each identical step is only completed once, storing that step's\
    \ results in a collector such as a hash table or an array. With that, dynamic\
    \ programming ensures less repeated work and has a better runtime efficiency.\n\
    \nThere are two ways in which dynamic programming can be applied – using top-down\
    \ or bottom-up approaches.\n\nWith the top-down method, the problem is broken\
    \ down and if some parts of the problem are solved already then the saved value\
    \ is found and returned, otherwise, the value of the function is memorized or\
    \ calculated for the first time.\n\nA top-down solution makes sure to reach the\
    \ base case of every problem by breaking it into smaller sub-problems. By using\
    \ such a style of recursive chain, top-down dynamic programming only solves sub-problems\
    \ as they are needed rather than solving them all in order. In this case, memoization\
    \ plays a great role as a tool to handle computationally expensive programs. Memoization\
    \ could be defined as a process of saving sub-problem solutions in a top-down\
    \ approach. And because top-down approaches solve problems as needed, memorization\
    \ also stores data in a non-sequential way. For this, hashtables are the best\
    \ collection type, as they store data in an unordered way. In Python, top-down\
    \ is best completed using the dictionary data structure because it is a perfect\
    \ suit to store unordered data with key/value pairs.\n\nBottom-up is another operative\
    \ way to avoid recursion by decreasing the time complexity that recursion leads\
    \ to. In this case, the solutions to small problems are calculated in order to\
    \ build up the solution to the overarching problem. Bottom-up dynamic programming\
    \ solutions start by focusing on the smallest possible sub-problem, called the\
    \ base case, and then work step-by-step up to each sub-problem. And as each sub-problem\
    \ is completed, its solution is saved and used to solve the next smallest sub-problem.\
    \ As a result, these building solutions are expected to make up an answer to the\
    \ main problem. Tabulation ensures that this process goes with ease. Tabulation\
    \ can be defined as the process of storing results of sub-problems from a bottom-up\
    \ approach in an orderly manner. In tabulation, there is no need to choose which\
    \ sub-problems need to be solved first but instead go on to solving every sub-problem\
    \ between the base case and the main problem. And since the process is arranged\
    \ in sequential order, tabulation can use either lists or arrays, as those collections\
    \ organize information in a specific order.\n\nOne might gain a better understanding\
    \ of dynamic programming and its types with some examples. We shall examine the\
    \ concept through a basic calculation of the Fibonacci series. Fibonacci series\
    \ is a simple sequence of numbers arranged in a way that each number is the sum\
    \ of the two preceding ones, starting from 0 and 1: F(n) = F(n-1) + F(n-2)\n\n\
    ### Recursive Method\n\n```python\ndef r_fibo(n):\n    if n <= 1:\n        return\
    \ n\n    else:\n        return(r_fibo(n-1) + r_fibo(n-2))\n```\n\nWith this approach,\
    \ the program will call itself, over and over again, trying to calculate further\
    \ values. The calculation of the time complexity of the recursion-based approach\
    \ is going to be around O(2^N). The space complexity of this approach is O(N)\
    \ as recursion can go max to N.\n\nFor example- F(4) = F(3) + F(2) = ((F(2) +\
    \ F(1)) + F(2) = ((F(1) + F(0)) + F(1)) + (F(1) + F(0)) In this method, values\
    \ like F(2) will be computed twice and calls for F(1) and F(0)\n\n> 6 https://towardsdatascience.com/beginners-guide-to-dynamic-programming-8eff07195667,\
