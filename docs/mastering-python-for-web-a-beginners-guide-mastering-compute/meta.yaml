    - Pandas, NumPy and Matplotlib accelerate math and statistical operations, as
    well as create visualizations of data.


    With that said, it is also worth noting the tasks Python is not well suited for.
    To start with, Python is a high-level language, so it is not the best option for
    system-level programming—device drivers or OS kernels are inadmissible. It''s
    also not ideal for situations that call for cross-platform standalone binaries.
    And since everything in the language, including functions and modules themselves,
    are handled as objects coding comes at the expense of speed. Therefore, it is
    not the best choice when speed is an absolute priority in every aspect of the
    application. For that, it is recommended to opt for C/C++ or another language.


