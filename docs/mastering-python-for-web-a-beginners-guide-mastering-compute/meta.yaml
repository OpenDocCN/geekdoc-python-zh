    6\n>>> (lambda **kwargs: sum(kwargs.values()))(one=1, two=2, three=3)\n6\n>>>\
    \ (lambda x, *, y=0, z=0: x + y + z)(1, y=2, z=3)\n6\n```\n\n## Decorators\n\n\
    In Python, a decorator is the execution of a pattern that enables adding behavior\
    \ to a function or a class. It is typically expressed with the @decorator syntax\
    \ prefixing a function. To demonstrate with an example:⁸\n\n```python\ndef some_decorator(f):\n\
    \    def wraps(*args):\n        print(f\"Calling function '{f.__name__}'\")\n\
    \        return f(args)\n    return wraps\n\n@some_decorator\ndef decorated_function(x):\n\
    \    print(f\"With argument '{x}'\")\n```\n\nIn the example above, some_decorator()\
    \ is a function that builds on a behavior to decorated_function(), so that invoking\
