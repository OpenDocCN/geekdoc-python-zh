    \ `*?`、`(?:` 或 `(?P<...>` 这样的标记内。当一行包含一个不在字符类中且未被未转义反斜杠前导的 `#` 时，从最左边的此类 `#` 到行尾的所有字符都将被忽略。这意味着以下两个匹配十进制数字的正则表达式对象在功能上是相等的：\n\
