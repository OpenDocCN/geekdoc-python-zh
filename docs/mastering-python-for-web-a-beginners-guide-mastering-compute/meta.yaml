    up with Python releases. It is very much likely you already have the latest version
    installed by default. If not, you can use the following command to update Python:
    $ packman -S python. And once it is finished updating, you are all set to start
    scripting.


    # HOW TO BUILD PYTHON FROM SOURCE CODE


    In cases when your Linux distribution does not have the latest version of Python,
    or when you just want to be able to build the latest, fastest version yourself,
    you can take the following steps to be able to build Python from source:


    **Step 1: Download the source code**

    To start, you need to get the Python source code through the Python.org. All you
    have to do is go to the Downloads page and look for the latest source for Python
    3 at the top. Make sure you are searching for Python 3 and not Python 2.

    When you select the Python 3 version, you can see a “Files” section at the bottom
    of the page. Select *Gzipped source tarball* and download it to your machine.
    If you prefer a command-line method, you can use Wget program that retrieves content
    from web servers to download the file to your current directory:


    ```

    $ wget https://www.python.org/ftp/python/3.8.4/Python-3.8.4.tgz

    ```


    When the tarball completes downloading, you will then need to take care of other
    things to prepare your system for building Python.'
  - '[PAGE 51]


    # Step 2: Prepare your system


    There are a few fixed steps involved in building Python from scratch. The aim
    of each one of those steps is the same on all distros, but you might need to translate
    it to your distribution if it does not use apt-get:


    +   1. First, make sure you have updated your package manager and upgraded your
    packages:


    $ sudo apt-get update

    $ sudo apt-get upgrade


    2. Next, you need to have all of the build requirements installed:


    ```

    # For apt-based systems (like Debian, Ubuntu, and Mint)

    $ sudo apt-get install -y make build-essential libssl-dev zlib1g-dev\nlibbz2-dev
    libreadline-dev libsqlite3-dev wget curl llvm\nlibncurses5-dev libncursesw5-dev
    xz-utils tk-dev

    # For yum-based systems (like CentOS)

    $ sudo yum -y groupinstall "Development Tools"

    $ sudo yum -y install gcc openssl-devel bzip2-devel libffi-devel

    ```


    And if you already have some of the requirements installed on your system, it
    is not going to create any problem because you can execute the above commands
    and any existing packages will not be overwritten.'
  - '[PAGE 52]


    # Step 3: Build Python


    1. Once you have all the prerequisites and the Tape Archive (TAR) files, you can
    start unpacking the source into a directory. Please note that the following command
    will create a new directory called Python-3.9.1 under the one you''re in:


    ```

    $ tar xvf Python-3.9.2.tgz

    $ cd Python-3.9.2.

    ```


    2. Now, you need to run the ./configure tool to prepare the build:


    ```

    $ ./configure --enable-optimizations --with-ensurepip=install

    ```


    The enable-optimizations flag will enable some optimizations within Python to
    make it run about 10 percent faster. Doing this may add twenty or thirty minutes
    to the compilation time.


    3. Next, you build Python using the -j option that simply tells make to split
    the building into parallel steps to speed up the compilation. Even with the parallel
    builds, this step can take several minutes:


    ```

    $ make -j 8

    ```


    4. Finally, you will want to install your new version of Python. You can use the
    altinstall option here to avoid overwriting the system Python. Since you are installing
    into/usr/bin, you will need to run as root:


    ```

    $ sudo make altinstall

    ```


    The overall installation might take some time, but once it is done, you are advised
    to verify that Python is set up correctly.'
  - '[PAGE 53]


    # Step 4: Verify your installation


    You can test that the python3.9 –version command returns the latest version:


    ```

    $ python3.9 –version

    Python 3.9.2.

    And if you see Python 3.9.2., then

    your installation is fully verified

    ```


    In case you want to run extra testing, you might also choose the test suite to
    make sure everything is working properly and swiftly on your system. To run the
    test suite, you just have to type the following command:


    ```

    $ python3.8 -m test

    ```


    You do not need to rush this part because your computer will be running tests
    for some time. And if all the tests pass without an error, then you can be confident
    that your brand-new Python build is working as expected.


