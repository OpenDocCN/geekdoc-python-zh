    和 `a{3,4}`。请注意，以正向后顾断言开头的模式不会在被搜索字符串的开头匹配；你很可能需要使用 `search()` 函数而不是 `match()`
    函数。


    ```python

    >>> import re

    >>> m = re.search(''(?<=abc)def'', ''abcdef'')

    >>> m.group(0)

    ''def''

    ```


    此示例查找连字符后跟的单词：


    ```python

    >>> m = re.search(r''(?<=-)\w+'',

    ...              ''spam-egg'')

    >>> m.group(0)

    ''egg''

    ```


    ### (?<!...)


    这称为否定后顾断言。类似于正向后顾断言，包含的模式必须只匹配固定长度的字符串。以否定后顾断言开头的模式可能在被搜索字符串的开头匹配。


    ### (?(id/name)yes-pattern|no-pattern)


    如果给定名称的组存在，则尝试用 yes-pattern 匹配，如果不存在，则用 no-pattern 匹配。例如，`(<)?(\w+@\w+(?:\.\w+)+)(?(1)>|$)`
