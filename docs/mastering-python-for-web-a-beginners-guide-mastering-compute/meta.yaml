  md: '*


    Causes the resulting RE to match 0 or more repetitions of the preceding RE, as
    many repetitions as are possible. ab* will match ‘a’, ‘ab’, or ‘a’ followed by
    any number of ‘b’s.


    +


    Causes the resulting RE to match 1 or more repetitions of the preceding RE. ab+
    will match ‘a’ followed by any non-zero number of ‘b’s; it will not match just
    ‘a’.


    ?


    Causes the resulting RE to match 0 or 1 repetitions of the preceding RE. ab? will
    match either ‘a’ or ‘ab’.


    *?, +?, ??


    The ‘*’, ‘+’, and ‘?’ qualifiers match as much text as possible. For example,
    if the RE <.*> is matched against ‘<a> b <c>’, it will match the entire string,
    and not just ‘<a>’. Adding ? after the qualifier makes it perform the match in
    minimal fashion; as few characters as possible will be matched. Using the RE <.*?>
    will match only ‘<a>’.


    {m}


    Specifies that exactly m copies of the previous RE should be matched; fewer matches
    cause the entire RE not to match. For example, a{6} will match exactly six ‘a’
    characters, but not five.'
