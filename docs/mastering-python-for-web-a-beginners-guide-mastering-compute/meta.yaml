    # Updating Dictionary


    A dictionary can be updated by simply adding a new entry or a key-value pair,
    which is going to modify an existing entry or delete an existing entry as shown
    in the simple example below:


    ```

    Live Demo

    #!/usr/bin/python

    dict = {''Name'': ''Mary'', ''Age'': 10, ''Class'': ''First''}

    dict[''Age''] = 11; # update existing entry

    dict[''School''] = "High School"; # Add new entry

    print "dict[''Age'']: ", dict[''Age'']

    print "dict[''School'']: ", dict[''School'']

    ```


    When the above code is processed, it produces the following result:


    ```

    dict[''Age'']: 11

    dict[''School'']: High School

    ```


    # Delete Dictionary Elements


    There are two options: you can either remove an individual dictionary element
    or clear the entire contents of a dictionary (which can be executed in a single
