  - "[PAGE 249]\n\n# Defining Data Models (models.py)\n\nDjango web applications manage\
    \ data through Python objects referred to as models. Models are designed to structure\
    \ stored data, including the field types, size, default values, selection list\
    \ options, help text for documentation, and label text for forms. The definition\
    \ of the model is not dependent on the underlying database – you can choose one\
