    you would like to link with each other, you can use Python for this task.


    # PYTHON 2 VS. PYTHON 3


    Python is available in two different versions: Python 2 and Python 3. Python 2,
    the older branch, as of January 1, 2020, is no longer supported by its creators,
    the Python Software Foundation. Python 3, the current and future version of the
    language, has many updated features that were not included in Python 2, such as
    new concurrency controls, and a better interpreter. There used to be a lot of
    competition between the two, but since version 3 incorporated few important functions,
    it has won over all the Python fan base. Few of those changes in Python 3 included:¹


    +   - Text vs. Data instead of Unicode vs. 8-bit.

    - Print is now a function.


