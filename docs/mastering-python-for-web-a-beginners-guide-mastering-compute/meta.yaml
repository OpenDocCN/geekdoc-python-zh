    a single product named Dropbox. For the first time, Dropbox software enabled people
    to create a folder on their computer that''s automatically uploaded to service
    in the cloud, and it''s automatically synced to all the devices that the user
    has installed Dropbox on. The company reached a million users by April 2009. By
    the end of 2009, they had 3 million users. Dropbox was written in Python.


    Dropbox soon became a showcase of successful Python implementation. An interesting
    point is that Dropbox was originally written in Python 2. And in 2013, when Guido
    van Rossum joined Dropbox, he was mainly responsible for converting the software
    to newly Python 3. He worked for Dropbox until his retirement. After seeing Python
    scale so well with Dropbox, many other enterprises started considering it for
    their business.


