- md: "## HOW PYTHON MULTILINE COMMENT WORKS?\n\nComments in the program could be\
    \ viewed as a set of phrases meant to help users understand the program in the\
    \ English language, attempting to make it somewhat readable. In Python, hash character\
    \ (#) is used at the start of the line to make it a comment. There is no multiline\
    \ comment concept in Python PEP 8 guide, but still, there is some description\
    \ of triple quotes practice that could be declared as a multiline comment.\n\n\
    In Python, it is important to observe the alignment and the indentation method\
    \ instead of placing curly braces for defining a function. Therefore, while writing\
    \ the comments, we should be careful about indentation. For instance, if you add\
    \ a note before function body but inside the function, which is also known as\
    \ docstring, similar to multi-line comments that do not have any indentation.\
    \ But, the function could have sets of code indented for multiple layers. So,\
    \ you should properly indent comment indentation as well as function blocks.\n\
    \nIt is safe to say that Python treats multiline comments as an ambiguity between\
    \ online comments and docstring. As both multiline and docstring are applied within\
    \ the triple quotes (\"\"\" \"\"\"). In python, comments are declared starting\
    \ with the hash character (#) and ending with EOL – End of the line. And, docstring\
    \ can be declared within triple quotes but within the function or module or method\
    \ or class, which is similar to the multiline comment.\n\n## Block Comments\n\n\
    Block comments are generally applied to explain more complex code or sets of code\
    \ that you do not expect your readers to be familiar with. These longer-form comments\
    \ could be added to some or all of the code that follows, and are also indented\
    \ at the same line as the code. In block comments, each line opens with the hash\
    \ mark and a single space. In case you need to use more than one paragraph, they\
    \ should be separated by a line that contains a single hash mark.\n\nHere is an\
    \ example of a block comment that defines what is happening in the main() function\
    \ defined below:²\n\n```\n# The main function will parse arguments via the parser\
    \ variable. These\n# arguments will be defined by the user on the console. This\
    \ will pass\n# the word argument the user wants to parse along with the filename\
    \ the\n# user wants to use, and also provide help text if the user does not\n\
    # correctly pass the arguments.\n```\n\nYou should turn to block comments only\
    \ when operations do not seem straightforward and are therefore demanding a better\
    \ explanation. Otherwise, it is best to avoid over-commenting the code and try\
    \ trusting other programmers to understand Python unless you are writing for a\
    \ particular audience.\n\n## Shebang\n\nOnce you start reading Python scripts\
    \ on your own, you might see that on some of them the first line opens with the\
    \ #! characters and the path to the Python interpreter:\n\n```\n#!/usr/bin/env\
    \ python3\n```\n\nThis order of characters is called shebang and is used to tell\
    \ the operating system which interpreter should be applied to parse the rest of\
    \ the file. Scripts that start with shebang can be operated in the terminal without\
    \ typing python before the script name. And since the shebang line starts with\
    \ the hash character, it is also considered to be a comment and therefore is automatically\
    \ ignored by the Python interpreter.\n\n## PYTHON COMMENTING BEST PRACTICES\n\n\
    An essential part of knowing how to write comments in Python is making sure that\
    \ your comments are readable and easy to comprehend. We have collected a few tips\
    \ to help you write better comments that could really support your code.\n\n###\
    \ When Writing Code for Yourself\n\nYou can significantly make life easier for\
    \ yourself by just properly commenting on your own code. Even if no one else will\
    \ ever see it, you are going to work with it, and that is good enough reason to\
    \ make it right. As a developer, one extremely useful way to use comments would\
    \ be as an outline for your code. Especially when you are still halfway through\
    \ scripting and not exactly sure how your program is going to turn out, then you\
    \ can use comments as a tool to keep track of what is left to do, or even as a\
    \ way of keeping the high-level flow of your program. For instance, you can use\
    \ comments to outline a function in pseudo-code:\n\n```\nfrom collections import\
    \ defaultdict\n\ndef get_top_companies(prices):\n    top_companies = defaultdict(int)\n\
    \    # For each service range\n    # Get company searches in price range\n   \
    \ then\n    # Count num times company was searched\n    # Take top 3 companies\
    \ & add to dict\n    return dict(top_companies)\n```\n\nThese comments will help\
    \ you to plan get_top_companies(). And, once you know exactly what you want your\
    \ function to do, you can work on translating that to code.\n\nUsing comments\
    \ in this manner will help you to keep everything straight in your head. And as\
    \ you glance through your program, you will know what is there left to complete\
    \ in order to have a fully functional script. After translating the comments to\
    \ code, make sure you remove previous comments that have become irrelevant so\
    \ that your code stays clean and explicit.\n\nYou can also utilize the comments\
    \ option as part of the debugging process. Try commenting out one of your old\
    \ codes and see how that affects your overall output. If you agree with the change,\
    \ then do not leave the code commented out in your program, as it might decrease\
    \ readability. Instead, delete it and use version control in case you need to\
    \ bring it back.\n\nAt last, you can apply comments to describe problematic parts\
    \ of your own code. It usually happens that you put a project down and then have\
    \ to come back to it months or years later. In this case, you will spend a lot\
    \ of time trying to get reacquainted with what you scripted before. To avoid that,\
    \ the best thing you can do is mark your thoughts and plans down so that it will\
    \ be easier to get back up to speed later on.\n\n### When Writing Code for Others\n\
    \nPeople tend to skip and jump back and forth through text, the same applies to\
    \ reading code. The only time one might be forced to read through the code line\
    \ by line is when it is not working and you have to figure out what is the error\
    \ about. In most other cases, you will take a quick look at variables and function\
    \ definitions in order to get the idea. Having comments in simple English can\
    \ really assist a developer to realize what is happening.\n\nTherefore, try being\
    \ nice to your fellow developers and use comments to help them grasp the purpose\
    \ of your code. Inline comments should be used sparingly to clear up bits of code\
    \ that are not definite on their own. And shall you have a complicated method\
    \ or function that is not easily understandable; you may want to include a short\
    \ comment after the defline to give some context to it:\n\n```\ndef complicated_function(s):\n\
    \    # This function is executing something complicated\n```\n\nThis can help\
    \ other professionals who are skimming your code to get an idea of what the function\
    \ does. As for other public functions, you might want to include an associated\
