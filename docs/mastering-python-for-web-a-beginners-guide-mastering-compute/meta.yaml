    ## DICTIONARY DATA TYPE


    Dictionary in Python stands for an unordered collection of data values, used to
    store data values like a map. Unlike other data types that hold only a single
    value as an element, Dictionary holds key:value pair, which is added there mainly
    for optimization. However, keys in a dictionary do not allow Polymorphism (when
    the same method is declared multiple times, for multiple purposes, and different
    classes).


    ## Creating a Dictionary


    In Python, a Dictionary can be easily created by placing a sequence of elements
    within curly {} braces, separated by “comma.” Typically, dictionary holds a pair
    of values, one of which would be the Key and the other corresponding pair element
    being its Key:value. Values in a dictionary can be of any data type and can be
    duplicated, whereas keys cannot be repeated and should be immutable. Additionally,
    dictionary keys are quite case sensitive, same name but different cases of Key
    would be treated distinctly.


    ## Accessing Values in Dictionary


    To access dictionary items, you can use the familiar square brackets together
    with the key to obtaining its value. To explain with a simple example:


    ```

    Live Demo

    #!/usr/bin/python


    dict = {''Name'': ''Mary'', ''Age'': 10, ''Class'':

    ''First''}

    print "dict[''Name'']: ", dict[''Name'']

    print "dict[''Age'']: ", dict[''Age'']

    ```


    When the above code is processed, it produces the following result:


    ```

    dict[''Name'']: Mary

    dict[''Age'']: 10

    ```


    ## Updating Dictionary


    A dictionary can be updated by simply adding a new entry or a key-value pair,
    which is going to modify an existing entry or delete an existing entry as shown
    in the simple example below:


    ```

    Live Demo

    #!/usr/bin/python

    dict = {''Name'': ''Mary'', ''Age'': 10, ''Class'': ''First''}

    dict[''Age''] = 11; # update existing entry

    dict[''School''] = "High School"; # Add new entry

    print "dict[''Age'']: ", dict[''Age'']

    print "dict[''School'']: ", dict[''School'']

    ```


    When the above code is processed, it produces the following result:


    ```

    dict[''Age'']: 11

    dict[''School'']: High School

    ```


    ## Delete Dictionary Elements


    There are two options: you can either remove an individual dictionary element
    or clear the entire contents of a dictionary (which can be executed in a single
    operation). In order to explicitly remove an entire dictionary, you should use
    the del statement. Take a look at the following example:


    ```

    Live Demo

    #!/usr/bin/python

    dict = {''Name'': ''Mary'', ''Age'': 10, ''Class'': ''First''}

    del dict[''Name'']; # remove entry with key ''Name''

    dict.clear(); # remove all entries in dict

    del dict; # delete entire dictionary


    print "dict[''Age'']: ", dict[''Age'']

    print "dict[''School'']: ", dict[''School'']

    ```


    ## Properties of Dictionary Keys


    Normally, dictionary values have no restrictions – they can be of any arbitrary
    Python object, either standard objects or user-defined objects. Yet, the same
    is not true for the keys. There are two most important points to understand about
    dictionary keys:


    - 1. More than one entry per key is not permitted. That means no duplicate key
    is allowed. And if duplicate keys were encountered during the assignment, the
    last assignment would win.

    - 2. Keys must be immutable, meaning you can use strings, numbers, or tuples as
    dictionary keys, but something like [''key''] is not allowed.


    ## Built-in Dictionary Functions & Methods


    Python includes the following built-in dictionary functions:¹⁴


    - 1. **CMP(dict1, dict2)**: Compares elements of both dict.

    - 2. **len(dict)**: Gives the total length of the dictionary. This would be equal
    to the number of items in the dictionary.

    - 3. **str(dict)**: Produces a printable string representation of a dictionary.

    - 4. **type(variable)**: Returns the type of the passed variable. If a passed
    variable is dictionary, then it would return a dictionary type.


    It also includes following dictionary methods:¹⁵


    - 1. **dict.clear()**: Removes all elements of dictionary dict.

    - 2. **dict.copy()**: Returns a shallow copy of dictionary dict.

    - 3. **dict.fromkeys()**: Create a new dictionary with keys from seq and values
    set to value.

    - 4. **dict.get(key, default=None)**: For key key, returns value or default if
    key not in dictionary.

    - 5. **dict.has_key(key)**: Returns true if key in dictionary dict, false otherwise.

    - 6. **dict.items()**: Returns a list of dict’s (key, value) tuple pairs.

    - 7. **dict.keys()**: Returns list of dictionary dict’s keys.

    - 8. **dict.setdefault(key, default=None)**: Similar to get(), but will set dict[key]=default
    if key is not already in dict.

    - 9. **dict.update(dict2)**: Adds dictionary dict2''s key-values pairs to dict.

    - 10. **dict.values()**: Returns list of dictionary dict''s values.


    ¹⁴ https://www.tutorialspoint.com/python/python_dictionary.htm, Tutorialspoint

    ¹⁵ https://www.tutorialspoint.com/python/python_dictionary.htm, Tutorialspoint


    ## Tuple Data Type


    Tuples are identical to lists in all respects, except for the following properties:
    they are defined by enclosing the elements in parentheses (()) instead of square
    brackets ([]); And unlike lists Tuples are immutable.


    Tuple are usually preferred over lists in the following instances:


    - Program execution is faster when manipulating a tuple than list.

    - Tuple are used to prevent your data from being modified. If the values in the
    collection are meant to remain constant for the life of the program, using a tuple
    instead of a list secure the data type against accidental modification.

    - A tuple can be used for instances when you want to use a dictionary data type,
    which requires as one of its components a value that is of an immutable type.


    Creating a tuple only takes putting different comma-separated values. As an option,
    you can put these comma-separated values between parentheses also. To illustrate
    with an example:


    ```

    tup1 = (''history'', ''chemistry'', 1993, 2019);

    tup2 = (1, 2, 3, 4, 5) ;

    tup3 = "a", "b", "c", "d";

    ```


    The empty tuple is represented as two parentheses containing nothing –


    ```

    tup1 = ();

    ```


    To write a tuple containing a single value you need to add a comma, even though
    there is only one value:


    ```

    tup1 = (60,);

    ```


    Like string indices, tuple indices start at 0, and later can be sliced, concatenated,
    and modified.


    ## Accessing Values in Tuples


    To access values in tuple, you can use the square brackets for slicing along with
    the index or indices to get the value available at that index. For example:


    ```

    Live Demo

    #!/usr/bin/python

    tup1 = (''history'', ''chemistry'', 1993, 2019);

    tup2 = (1, 2, 3, 4, 5, 6, 7) ;

    print "tup1[0]: ", tup1[0];

    print "tup2[1:5]: ", tup2[1:5];

    ```


    When the above code is executed, it produces the following result:


    ```

    tup1[0]: history

    tup2[1:5]: [2, 3, 4, 5]

    ```


    ## Updating Tuples


    As previously mentioned, tuples are immutable, which means you cannot update or
    advance the values of tuple elements. What you can do is to take portions of existing
    tuples to create new tuples, as the following example demonstrates:


    ```

    Live Demo

    #!/usr/bin/python


    tup1 = (12, 34.56);

    tup2 = (''abc'', ''xyz'');


    # Following action is not valid for tuples

    # tup1[0] = 100;


    # So we shall create a new tuple as follows

    tup3 = tup1 + tup2;

    print tup3;

    ```


    When the above code is executed, it produces the following result:


    ```

    (12, 34.56, ''abc'', ''xyz'')

    ```


    ## Delete Tuple Elements


    It is not allowed to remove individual tuple elements. However, there seems to
    be nothing wrong with putting together another tuple with the undesired elements
    discarded. To explicitly remove an entire tuple, you should just use the del statement.
    For instance:


    ```

    Live Demo

    #!/usr/bin/python


    tup = (''history'', ''chemistry'', 1993, 2019);

    print tup;

    ```'
