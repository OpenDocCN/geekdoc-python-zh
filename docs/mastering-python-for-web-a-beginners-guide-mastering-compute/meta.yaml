    At first, Python 3 approval was slowed for some time due to a lack of third-party
    library support. Because most Python libraries supported only Python 2, it made
    the transaction to version 3 time consuming. But over the last couple of years,
    the number of libraries compatible with both Python 2 and Python 3 has increased.
    Today, Python 3 is the best, up-to-date choice for new projects.


    Due to its simplicity, top technology organizations like Dropbox, Google, Mozilla,
