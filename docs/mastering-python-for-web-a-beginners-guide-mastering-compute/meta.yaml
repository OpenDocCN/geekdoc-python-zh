    \ 'sys']\n>>> import os\n>>> dir()\n['__annotations__', '__builtins__',...,\n\
    '__spec__', 'os', 'sys']\n>>> from functools import partial\n>>> dir()\n['__annotations__',\
    \ '__builtins__',...,\n'__spec__', 'os', 'partial', 'sys']\n```\n\n你首先从Python标准库导入`sys`和`os`。通过调用不带参数的`dir()`，你可以观察到这些模块现在作为名称在你当前的全局作用域中可用。这样，你可以添加点号表示法来访问在`sys`和`os`中定义的名称。在下一个导入操作中，你使用`from\
    \ <module> import <name>`的形式。这样，你可以直接在代码中使用导入的名称。简单来说，不需要显式使用点号表示法。\n\n## 回顾不寻常的Python作用域\n\
    \n并非所有Python结构似乎都符合Python作用域的LEGB规则。这些结构包括以下内容：\n\n- 推导式\n- 异常块\n- 类和实例\n\n了解Python作用域如何在这三种结构上工作，将使你能够避免与在这些类型的Python结构中使用名称相关的随机错误。\n\
    \n## 推导式变量作用域\n\n推导式结构是一种紧凑的方式来操作集合或序列中的全部或部分项目。你可以应用推导式来创建列表、字典和集合。推导式由一对括号（`[]`）或花括号（`{}`）组成，其中包含一个表达式，后跟一个或多个`for`子句，然后每个`for`子句后跟零个或一个`if`子句。然而，推导式中的`for`子句以与传统`for`循环类似的方式运行。推导式中的循环变量对于该结构是局部的。用以下代码演示：\n\
    \n```python\n>>> [item for item in range(5)]\n[0, 1, 2, 3, 4]\n>>> item # Try\
    \ to access the comprehension variable\nTraceback (most recent call last):\n \
    \ File \"<stdin>\", line 1, in <module>\n    item\nNameError: name 'item' is not\
    \ defined\n```\n\n如果你运行列表推导式，变量`item`将被删除，你将无法再访问其值。你不太可能需要在此推导式之外使用该变量，但无论如何，Python确保一旦推导式完成，其值就不再可访问。\n\
    \n## 异常变量作用域\n\n你将遇到的另一个非典型Python作用域情况是异常变量的情况。异常变量是一个持有`try`语句引发的异常引用的变量。在Python\
    \ 3.x中，此类变量对于`except`块是局部的，并在块结束时被遗忘。\n\n## 类和实例属性作用域\n\n当你定义一个类时，你正在创建一个新的局部Python作用域。在类顶层分配的名称存在于这个局部作用域中。你在类语句内分配的名称不会与其他地方的名称混合。这是安全的"
