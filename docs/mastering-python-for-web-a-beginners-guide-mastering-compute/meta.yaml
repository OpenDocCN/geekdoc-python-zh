- md: '## class


    Classifies a class. The signature can include parentheses with parameters that
    will be displayed as the constructor arguments.


    ## attribute


    Describes an object data attribute. The description should include information
    about the type of data to be expected and whether it may be changed directly.
    This directive is usually nested in a class directive, like in the following example:


    ```

    .. class:: Primary

    ```


    However, it is also possible to document an attribute outside of a class directive,
    in case the documentation for different attributes and methods is split into multiple
    sections. The class name should then be included explicitly:


    ```

    .. attribute:: Primary.social

    ```


    ## method


    Describes an object method including similar information to that described for
    function. Nevertheless, the parameters should not include the self-parameter.
    This directive should be nested in a class directive, like in the previous directive
    above.


    ## coroutinemethod


    Describes an object coroutine method including similar information to that described
    for function. However, the parameters should not include the self-parameter. This
    directive should also be nested in a class directive.


    ## decoratormethod


    Same as a decorator, but for decorators that are methods. You may refer to a decorator
    method using the :meth: role.


    ## staticmethod


    Describes an object static method. The description typically includes similar
    information to that described for function. This directive should as well be nested
    in a class directive.


    ## classmethod


    Describes an object class method using similar information to that described for
    function. The parameters should not include the cls parameter and the directive
    should be nested in a class directive.


    ## abstractmethod


    Describes an object abstract method including similar information to that described
    for function. This directive should be nested in a class directive.


    **opcode**

    Describes a Python bytecode instruction.


    **cmdoption**

    Stands for a Python command-line option or switch. Make sure option argument names
    are enclosed in angle brackets.


    ## Inline Markup


    As previously mentioned, Sphinx uses interpreted text roles to insert semantic
    markup in documents. The following roles relate to objects in modules and are
    possibly hyperlinked if a matching identifier is found:¹⁰


    **mod**

    The name of a module. Normally is dotted and used for package names.


    **func**

    The name of a Python function; dotted names may be used. In order to enhance readability,
    the role text should not include trailing parentheses. The parentheses are stripped
    when searching for identifiers.


    **data**

    The name of a module-level variable or constant.


    **const**

    The name of a “defined” constant. This may be a C-language #define or an immutable
    Python variable.


    **class**

    A class name; a dotted name may be used.


    **meth**

    The name of a method of an object. The role text should include the type name
    and the method name.


    **attr**

    The name of a data attribute of an object.


    **exc**

    The name of an exception. A dotted name may be used. The name enclosed in this
    markup can include a module name and/or a built-in function of that name.


    The following roles create cross-references to C-language if they are coded in
    the application programming interface (API) documentation:¹¹


    **c:data**

    The name of a C-language variable.


    **c:func**

    The name of a C-language function should include trailing parentheses.


    **c:macro**

    The name of a “simple” C macro, as described above.


    **c:type**

    The name of a C-language type.


    **c:member**

    The name of a C type member.


    The following roles do not relate to objects, but are used to create cross-references
    or internal links:


    **envvar**

    An environment variable that is generated with index entries.


    **keyword**

    The name of a Python keyword. Using this role will result in generating a link
    to the documentation of the keyword.


    **option**

    A command-line option of Python. The leading hyphen(s) must be included. If a
    matching cmdoption directive exists, use simple ``code`` markup.


    **token**

    The name of a grammar token is mostly used in the reference manual to create links
    between production displays.


    **term**

    Reference to a term in the glossary. The glossary is created using the glossary
    directive containing a definition list with terms and definitions. It does not
    have to be in the same file as the term markup, but if you use a term that''s
    not explained in a glossary, you''ll get a warning during build.


    **command**

    The name of an OS-level command, such as rm. It does not do anything special except
    formatting the text in a different style.


    **dfn**

    Used to mark the defining instance of a term in the text without index entries
    generation.


    **file**

    The name of a file or directory. Within the building, you can use curly braces
    to indicate a “variable” part of content, for example:


    ```

    ``spam`` is installed in:file:`/usr/lib/python2.{x}/site-packages ...

    ```


    Later in the documentation, the x will be displayed differently to indicate that
    it is to be replaced by the Python minor version.


    **guilabel**

    Labels presented as part of an interactive user interface must be marked using
    guilabel. This includes labels from text-based interfaces such as those created
    using curses or other text-based contents. Basically, any label used in the interface
    should be marked with this role, even button labels, window titles, field names,
    menu, and values in selection lists.


    **kbd**

    This role is used to mark a sequence of keystrokes. What form the key sequence
    takes usually depends on the platform- or application-specific conventions. In
    case, there are no relevant conventions, the names of modifier keys should be
    spelled out, in order to improve accessibility for new users.


    **mailheader**

    This markup does not imply that the header is being used in an email message,
    it is also used for headers defined by the various media type specifications.
    The header name should be entered in the same way it would normally be found in
    practice, with the camel-casing conventions being preferred where there is more
    than one common usage.


    **makeover**

    The name of a make variable.


    **manpage**

    A reference to a Unix manual page that also includes the section.


    **menuselection**

    Menu selections must be marked using the menuselection role. This is typically
    used to mark a complete sequence of menu selections, including selecting sub-menus
    and choosing a specific operation, or any sub-sequence of such a sequence. The
    names of individual selections should be separated by ->.


    **mimetype**

    The name of a media type or a major or minor portion of the media.


    **newsgroup**

    Stands for the name of a Usenet newsgroup.


    **program**

    The name of an executable program. This may differ from the file name for the
    executable for some platforms. To be precise, you should drop the .exe (or other)
    extension for Windows programs.


    **regexp**

    A regular expression that does not include quotes.


    **samp**

    A piece of literal text, such as code. Within the contents, you can use curly
    braces to indicate a “variable” part, and if you don’t need the “variable part”
    indication, you can use the standard ``code`` instead.


    Now we are moving to the roles used to generate external links:¹²


    **pep**

    Refers to a Python Enhancement Proposal. This generates appropriate index entries.
    In the HTML output, this text is a hyperlink to an online copy of the specified
    PEP. However, such hyperlinks should not be a substitute for properly documenting
    the language in the manuals.


    **rfc**

    A reference to an Internet Request for Comments. This generates appropriate index
    entries in the HTML output, and this text is treated as a hyperlink to an online
    copy of the specified RFC. Note down that there are no special roles for including
    hyperlinks as you can use the standard reST markup for that purpose.


    ¹⁰ https://devguide.python.org/documenting/, Python

    ¹¹ https://devguide.python.org/documenting/, Python

    ¹² https://devguide.python.org/documenting/, Python'
