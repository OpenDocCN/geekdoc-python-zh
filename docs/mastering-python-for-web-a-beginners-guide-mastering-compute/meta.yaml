    A|B, where A and B can be arbitrary REs, creates a regular expression that will
    match either A or B. An arbitrary number of REs can be separated by the ‘|’ in
    this way. As the target string is scanned, REs separated by ‘|’ are tried from
    left to right. When one pattern completely matches, that branch is accepted. This
    means that once A matches, B will not be tested further, even if it would produce
    a longer overall match. In other words, the ‘|’ operator is never greedy. To match
