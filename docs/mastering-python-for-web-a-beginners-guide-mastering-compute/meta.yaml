    \ 和 [https://docs.python-guide.org/](https://docs.python-guide.org/) 这样的网站提供了额外的教程。大多数在线平台让你轻松学习编程基础，并且可以免费开始学习。你只需注册即可。\n\
    \n- **Python 拥有支持性的用户社区：** Python 是一种开源编程语言，这意味着任何人都可以修改或创建 Python 语言的变体。开源也意味着它是免费的，并允许形成库、框架和扩展工具，这些都有助于保持\
    \ Python 语言的适应性和兼容性。可以说，Python 之所以取得成功，是因为有一个如此支持性的用户社区参与其中。\n\n  此外，Python 软件基金会在其网站上有一个专门的社区页面，链接到多个社区小组和论坛。Python\
    \ 编程语言的用户定期在所谓的 Python 用户组中聚会，分享他们如何使用这门语言以及学习新技术。他们也为初学者提供极大的帮助，并提供一个平台，让用户与志趣相投的人交流。会议通常每月举行一次；非常随意，向所有人开放。根据目前的统计，全球约有\
    \ 1,637 个 Python 用户组，分布在近 191 个城市、37 个国家，拥有超过 860,333 名成员。² 你也可以通过这个链接找到你当地的 Python\
    \ 社区：https://wiki.python.org/moin/LocalUserGroups。\n\n  Python 软件基金会是一个非营利组织，为社区项目的实施提供资助计划。它每年处理超过\
    \ 300 个请求。因此，在 2019 年，资助计划为全球各地的倡议提供了 324,500 美元的支持。³\n\n  ² https://wiki.python.org/moin/LocalUserGroups,\
    \ wiki Python\n  ³ https://www.python.org/psf/annual-report/2020/, Python\n\n\
    ## Python 简介 ■ 9\n\n- **Python 很受欢迎：** 编程语言是否流行很重要。这很重要，因为如果你投资时间和金钱去学习一门使用不够广泛、无法帮助你实现求职目标的语言，那是错误的。\n\
    \n  根据*《经济学人》*⁴ 的报道，Python 在 2018 年成为世界上最受欢迎的编程语言。其他语言如 Fortran 和 Lisp 出现了急剧下降，而\
    \ C 和 C++ 等语言则保持稳定。文章预测，Python 普及的这一趋势将在相当长一段时间内持续下去。\n\n  ⁴ https://www.economist.com/graphic-detail/2018/07/26/python-is-becoming-the-worlds-most-popular-coding-language,\
    \ *The Economist*\n\n- **Python 用途广泛：** 作为通用语言，意味着 Python 可以用于构建不同软件解决方案的部分，这就是为什么像\
    \ Google 和 Facebook 这样的大型科技公司选择 Python 编程用于他们的项目。此外，Python 代码也可用于构建基础程序，作为开发者，你将拥有极其广泛的工作选择。无论你是想为科技巨头工作、构建自己的软件程序，还是作为自由职业的\
    \ Web 开发者工作，Python 编程知识都被认为是一种优势，可以使这些计划中的任何一个成为可能。\n\n- **Python 确保项目的前后端更好地协同工作：**\
    \ 如果你想成为一名优秀的开发者，了解你的目标可能是同步和平衡由数据库和 Web 服务器组成的前端和后端（这些服务器为网站应用程序的前端提供支持）会很有用。\n\
    \n  当我们称 Python 为“胶水语言”时，我们的意思是它用于编写后端操作脚本，让你的数字产品的前后端能够和谐地工作。因此，如果你想为你的前端开发者技能组合添加服务器端或后端技能，学习\
    \ Python 可能是一个完美的起点。\n\n- **Python 可定制：** 如果你需要一种可定制的编程语言，那么 Python 绝对是一个完美的选择。就像\
    \ JavaScript 一样，Python 不乏库和框架来塑造和满足你特定的编码需求。\n\n  像 Django 这样流行的、功能齐全的 Python\
    \ 服务器端 Web 框架，旨在使 Python 在调整 Web 应用程序方面更加实用，而 PyQt 是一个允许 Python 构建图形用户界面的框架，包括使用屏幕图标和图形来操作用户命令。\n\
    \n- **Python 是流程自动化的绝佳工具：** 在科技领域工作的一个基本但乏味的部分是管理所有重复的、耗时的、与技术相关的过程。像复制文件、拖动文件夹和重命名文件、管理资产到服务器这样的无聊任务——所有这些累积起来会占用大量宝贵时间。在这种情况下，通过\
    \ Python 实现自动化可能是你的救星。Python 编写系统脚本的能力使你能够创建简单的 Python 程序来自动化那些占用你大量生产力的日常任务。通过使用\
    \ Python 重新调整流程所能节省的时间，是学习这门语言的一个极具吸引力的方面。\n\n- **Python 为你提供在科技领域任何地方工作的工具：**\
    \ 学习 Python 代码不仅会巩固你在互联网开发方面的潜在专业知识——它还将为你未来的各种科技工作做好准备。Python 的用途远不止传统的 Web 开发。事实上，Python\
    \ 是数据分析、人工智能、机器学习和数据科学等热门新兴科学领域的首选语言。因此，掌握这门语言将帮助你保持选择的开放性，如果你决定精通 Python，你可能会有更多的科技相关机会。\n\
    \n# Python 简史\n\nPython 是一种通用的高级编程语言，最初由 Guido van Rossum 于 1991 年设计，并由 Python\
    \ 软件基金会开发。它主要是为了提高代码可读性而开发的，其语法允许程序员用更短的代码表达概念。\n\nPython 的官方工作始于 1980 年代末期。不久之后，Guido\
    \ van Rossum 于 1989 年 12 月在荷兰的 Centrum Wiskunde & Informatica (CWI) 开始了其基于应用的试验。最初，Python\
    \ 项目是作为一个爱好开始的，因为他想在圣诞节期间找点有趣的事情做。Python 编程语言基于 ABC 编程语言，该语言具有与基于微内核的 Amoeba 操作系统的接口，该操作系统将一组单板计算机变成了一个透明的分布式系统。Van\
    \ Rossum 在职业生涯早期曾帮助创建过 ABC，并发现了一些问题。因此，他采用了 ABC 的语法、一些最佳特性，并修复了其他未解决的属性。就这样，通过完全纠正这些问题，他创建了一种新的脚本语言。\n\
    \n该语言于 1991 年发布。发布时，它使用了许多代码，并具有独特的设计方法。其主要目标是提供代码可读性并提高开发者的整体生产力。\n\n但是“Python”这个名字呢？大多数人认为，由于标志描绘了两条蛇，这个名字的起源一定是受到了实际蟒蛇的启发。令人惊讶的是，事实远非如此。Python\
    \ 的创造者 Guido van Rossum 在 1996 年写道，关于"
