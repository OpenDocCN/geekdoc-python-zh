    \ Church’s original design. In general, functional languages get their origin\
    \ in mathematical logic and lambda calculus, while imperative programming languages\
    \ are following the state-based model of computation invented by Alan Turing.\
    \ Lambda calculus can encode any computation, but contrary to the concept of a\
    \ Turing machine, it does not keep any state. The two models of computation, lambda\
    \ calculus and Turing machines can be translated into each other. This equivalence\
    \ is mostly known as the Church-Turing hypothesis.\n\nIn addition, functional\
    \ languages directly derive from the lambda calculus philosophy, adopting a declarative\
    \ approach of programming that focuses on abstraction, data transformation, and\
    \ composition. On the other hand, the Turing Machine led to imperative programming\
    \ found in languages like Fortran, C, or Python. The imperative style involves\
    \ programming with statements, leading the flow of the program step by step with\
    \ detailed instructions. This approach has room for mutation and requires a full-on\
    \ managing state.\n\nThe separation in both foundations has some nuances, as some\
    \ functional languages incorporate imperative features, like OCaml, while functional\
    \ features have been mimicking the imperative family of languages in particular\
    \ with the introduction of lambda functions in Java or Python.\n\nPython is not\
    \ viewed as a functional language, but it adopted some functional concepts from\
    \ the beginning. Thus, as early as January 1994, map(), filter(), reduce(), and\
    \ the lambda operator was added to the language.\n\nTo make it clear, the following\
    \ terms may be used interchangeably depending on the programming language type\
    \ and culture:\n\n- Anonymous functions\n- Lambda functions\n- Lambda expressions\n\
    - Lambda abstractions\n- Lambda form\n- Function literals\n\nBut for the rest\
    \ of this section, you will only see the term lambda function. In Python, however,\
    \ we use the lambda keyword to declare an anonymous function, which refers to\
    \ a function declared with no name. Although syntactically they look different,\
    \ lambda functions operate in the same way as regular functions that are scripted\
    \ using the def keyword. The following are the main characteristics of Python\
    \ lambda functions:\n\n- A lambda function can take any number of arguments but\
    \ contain only a single expression. Technically, lambda functions are restricted\
    \ to only a single expression. An expression here stands for a piece of code executed\
    \ by the lambda function that might or might not return any value.\n- Lambda functions\
    \ can be applied to return function objects.\n- Lambda functions are useful when\
    \ you need a function for a short period of time. This is commonly applied when\
    \ you want to pass a function as an argument to higher-order functions, meaning\
    \ functions that take other functions as their arguments.\n\nOther programming\
    \ languages like JavaScript have adopted a pattern used to immediately execute\
    \ a Python lambda function. This is known as an Immediately Invoked Function Expression\
    \ (IIFE). To illustrate with an example:\n\n```python\n>>> (lambda x, y: x + y)(2,\
    \ 3)\n5\n```\n\nThe lambda function above is defined and then immediately called\
    \ with two arguments (2 and 3). It returns the value 5, which is the sum of the\
    \ arguments.\n\nPython does not encourage using immediately invoked lambda expressions.\
    \ It simply results from a lambda expression being callable, unlike the body of\
    \ a normal function. Lambda functions are frequently used with higher-order functions,\
    \ which take one or more functions as arguments or return one or more functions.\
    \ A lambda function can be a higher-order function by taking a function (normal\
    \ or lambda) as an argument like in the following example:\n\n```python\n>>> high_ord_func\
    \ = lambda x, func: x + func(x)\n>>> high_ord_func(2, lambda x: x * x)\n6\n>>>\
    \ high_ord_func(2, lambda x: x + 3)\n7\n```\n\nPython exposes higher-order functions\
    \ as built-in functions or in the standard library. Examples include map(), filter(),\
    \ functools.reduce(), as well as key functions like sort(), sorted(), min(), and\
    \ max().\n\n## Syntax\n\nAs mentioned previously, a lambda form presents syntactic\
    \ distinctions from a normal function. In particular, a lambda function has the\
    \ following characteristics:\n\n- It is scripted as a single line of execution.\n\
    - It does not support type annotations.\n- It can be immediately invoked (IIFE).\n\
    - A lambda function cannot contain any statements. In a lambda function, adding\
    \ statements like return, pass, assert, or raise will only result in a SyntaxError\
    \ exception.\n\nUnlike the normal function, a Python lambda function is a single\
    \ expression. Although in the body of a lambda, you are allowed to spread the\
    \ expression over several lines using parentheses or a multiline string, it still\
    \ remains as a single expression:\n\n```python\n>>> (lambda x:\n... (x % 4 and\
    \ 'odd' or 'even'))(3)\n'odd'\n```\n\nThe example above returns the string ‘odd’\
    \ when the lambda argument is odd, and ‘even’ when the argument is even. It goes\
    \ across two lines because it is contained in a set of parentheses, but it still\
    \ stays as a single expression. Similar to a normal function object defined with\
