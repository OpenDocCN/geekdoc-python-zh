    \ of a name in the program text refers to the binding of that name guided by the\
    \ following name resolution rules.\n\nA scope defines the visibility of a name\
    \ within a block. In case a local variable is defined in a block, its scope includes\
    \ that block. If the definition involves a function block, the scope extends to\
    \ any blocks contained within the defining one, unless a contained block introduces\
    \ a separate binding for the name. When a name is added to a code block, it is\
    \ resolved with the nearest enclosing scope. The set of all such scopes visible\
    \ to a code block is also known as the block's environment. When a name is not\
