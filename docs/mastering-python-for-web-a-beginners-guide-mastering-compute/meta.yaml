    ## \\Z\n\n仅在字符串末尾匹配。该模块定义了几个函数、常量和一个异常。其中一些函数是编译正则表达式的完整功能方法的简化版本。\n\n## re.compile(pattern,\
    \ flags=0)\n\n将正则表达式模式编译为正则表达式对象，该对象可用于使用其 `match()`、`search()` 和其他方法进行匹配，如下所述。\n\
