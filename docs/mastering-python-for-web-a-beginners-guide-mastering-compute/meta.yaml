    \n```\nsound/           Top-level package\n    __init__.py   Initialize the sound\
    \ package\n    formats/      Subpackage for file format conversions\n        __init__.py\n\
    \        wavread.py\n        wavwrite.py\n        aiffread.py\n        aiffwrite.py\n\
    \        auread.py\n        auwrite.py\n        ...\n    effects/       Subpackage\
