    ```


    Docstrings do appear in the bytecode, so you can access this through the `__doc__`
    attribute. A module-level docstring like this one has to contain any essential
    or practical information for the developer reading it. When writing one as such,
    it is recommended to include all classes, exceptions, and functions as well as
    a one-line summary for each.


    # PYTHON COMMENTING WORST PRACTICES


    Just as there are examples of good practices for writing Python comments, there
