  - "[PAGE 68]\n\n# STRING DATA TYPE\n\nThe most basic definition of string can be\
    \ a sequence of characters, in which sequence is a data type that is made up of\
    \ several elements of the same type, i.e., integers, float, characters, strings,\
    \ etc. In Python, there is a unique code provided to all existing characters.\
    \ The coding convention had been labeled as a Unicode format. It consists of characters\
    \ of almost every possible language and emoticons too. Hence, strings can be considered\
    \ as a special type of sequence, where all its elements are characters. For example,\
    \ string “Hello, You” is basically a sequence [‘H’, ‘e’, ‘l’, ‘l’, ‘o’, ‘, ‘Y’,\
    \ ‘o’, ‘u’] and its length can be calculated by counting number of characters\
    \ inside the sequence.\n\nString handling in python requires the least effort\
    \ because most string operations have very low complexity compared to other languages.\
    \ There are several ways you can manage strings:\n\n+   - **Concatenation:** Concatenation\
    \ simply means to join two strings. Like to join “Hello” with “You,” to make it\
    \ “HelloYou.” This is how you write it:\n\n    python\n    >>> print (\"Hello\"\
    \ + \"You\");\n    \n\n    A plus sign + is enough to complete the task. When\
    \ used with strings, the + sign joins the two strings. Another example with multiple\
    \ strings would be:\n\n    python\n    >>> s1 = \"Name Python \"\n    >>> s2 =\
    \ \"had been adapted \"\n    >>> s3 = \"from Monty Python\"\n    >>> print (s1\
    \ + s2 + s3)\n    \n\n    Result: Name Python had been adapted from Monty Python"
- md: "## Repetition\n\nIn case, you want to write the same text multiple times on\
    \ console, like repeat \"Hey!\" a 100 times you can always write it all manually,\
    \ like \"Hey!Hey!Hey!...\" a hundred times or just do the following:\n\n```python\n\
    >>> print (\"Hey!\"*100)\n```\n\nSo, if you want the user to input some number\
    \ and based on that you want a text to be printed on console n times you can just\
    \ create a variable n and use input() function to get a number from the user and\
    \ then just multiply the text:\n\n```python\n>>> n = input(\"Number of times you\
    \ want the text to repeat: \")\nNumber of times you want the text to repeat: 4\n\
    >>> print (\"Text\"*4);\n```\n\nResult: TextTextTextText\n\n## Converting String\
    \ to Int or Float datatype\n\nThis is also quite simple. There is a very common\
    \ doubt amongst Python beginners that a number, when enclosed in quotes, becomes\
    \ a string, and if you will try to perform mathematical operations on it, you\
    \ will get an error.\n\n```python\nnumStr = '123'\n```\n\nIn the statement above\
    \ 123 is not a number, but a string. Thus, in such situation, to convert a numeric\
    \ string into float or int datatype, we can use float() and int() functions.\n\
    \n```python\nnumStr = '123'\nnumFloat = float(numStr)\nnumInt = int(numFloat)\n\
    ```\n\nWith that, you can easily perform mathematical functions on the numeric\
    \ value. And similarly, to convert an int or float variable to string, we can\
    \ use the str() function.\n\n```python\nnum = 123\n# so simple\nnumStr = str(num)\n\
    ```\n\n## Slicing\n\n*Slicing* is another major string operation. Slicing allows\
    \ you to extract a part of any string based on a start index and an end index.\
    \ For instance, if we have a string and we want to extract a part of this string\
    \ or just a character, then we can use one of the following syntax:\n\n- **string_name[starting_index:\
    \ finishing_index: character_iterate]**\n    - **String_name:** stands for the\
    \ name of the variable holding the string.\n    - **starting_index:** is the index\
    \ of the beginning character which you want in your sub-string.\n    - **finishing_index:**\
    \ represents one more than the index of the last character that you want in your\
    \ substring.\n\n## Built-in String Methods\n\nPython has a set of built-in methods\
    \ that you can use on strings.⁶\n\n- **str.capitalize():** Returns the copy of\
    \ the string with its first character capitalized, and the rest of the letters\
    \ are in lowercased.\n- **string.casefold():** Returns a lowered case string.\
    \ It is similar to the lower() method, but the casefold() method converts more\
    \ characters into lower case.\n- **string.center():** Returns a new centered string\
    \ of the specified length, which is padded with the specified character. The default\
    \ character is space.\n- **string.count():** Searches (case-sensitive) the specified\
    \ substring in the given string and returns an integer indicating occurrences\
    \ of the substring.\n- **string.endswith():** Returns True if a string ends with\
    \ the specified suffix (case-sensitive), otherwise returns False.\n- **string.expandtabs():**\
    \ Returns a string with all tab characters\\t replaced with one or more space,\
    \ depending on the number of characters before\\t and the specified tab size.\n\
    - **string.find():** Returns the index of the first occurrence of a substring\
    \ in the given string (case-sensitive). If the substring is not found it returns\
    \ -1.\n- **string.index():** Returns the index of the first occurrence of a substring\
    \ in the given string.\n- **string.isalnum():** Returns True if all characters\
    \ in the string are alphanumeric (either alphabets or numbers). If not, it returns\
    \ False.\n- **string.isalpha():** Returns True if all characters in a string are\
    \ alphabetic (both lowercase and uppercase) and returns False if at least one\
    \ character is not an alphabet.\n- **string.isascii():** Returns True if the string\
    \ is empty or all characters in the string are ASCII.\n- **string.isdecimal():**\
    \ Returns True if all characters in a string are decimal characters. If not, it\
    \ returns False.\n- **string.isdigit():** Returns True if all characters in a\
    \ string are digits or Unicode char of a digit. If not, it returns False.\n- **string.isidentifier():**\
    \ Checks whether a string is valid identifier string or not. It returns True if\
    \ the string is a valid identifier otherwise returns False.\n- **string.islower():**\
    \ Checks whether all the characters of a given string are lowercased or not. It\
    \ returns True if all characters are lowercased and False even if one character\
    \ is uppercase.\n- **string.isnumeric():** Checks whether all the characters of\
    \ the string are numeric characters or not. It will return True if all characters\
    \ are numeric and will return False even if one character is non-numeric.\n- **string.isprintable():**\
    \ Returns True if all the characters of the given string are Printable. It returns\
    \ False even if one character is Non-Printable.\n- **string.isspace():** Returns\
    \ True if all the characters of the given string are whitespaces. It returns False\
    \ even if one character is not whitespace.\n- **string.istitle():** Checks whether\
    \ each word's first character is upper case and the rest are in lower case or\
    \ not. It returns True if a string is titlecased; otherwise, it returns False.\
    \ The symbols and numbers are ignored.\n- **string.isupper():** Returns True if\
    \ all characters are uppercase and False even if one character is not in uppercase.\n\
    - **string.join():** Returns a string, which is the concatenation of the string\
    \ (on which it is called) with the string elements of the specified iterable as\
    \ an argument.\n- **string.ljust():** Returns the left-justified string with the\
    \ specified width. If the specified width is more than the string length, then\
    \ the string's remaining part is filled with the specified fillchar.\n- **string.lower():**\
    \ Returns the copy of the original string wherein all the characters are converted\
    \ to lowercase.\n- **string.lstrip():** Returns a copy of the string by removing\
    \ leading characters specified as an argument.\n- **string.maketrans():** Returns\
    \ a mapping table that maps each character in the given string to the character\
    \ in the second string at the same position. This mapping table is used with the\
    \ translate() method, which will replace characters as per the mapping table.\n\
    - **string.partition():** Splits the string at the first occurrence of the specified\
    \ string separator sep argument and returns a tuple containing three elements,\
    \ the part before the separator, the separator itself, and the part after the\
    \ separator.\n- **string.replace():** Returns a copy of the string where all occurrences\
    \ of a substring are replaced with another substring.\n- **string.rfind():** Returns\
    \ the highest index of the specified substring (the last occurrence of the substring)\
    \ in the given string.\n- **string.rindex():** Returns the index of the last occurrence\
    \ of a substring in the given string.\n- **string.rjust():** Returns the right-justified\
    \ string with the specified width. If the specified width is more than the string\
    \ length, then the string's remaining part is filled with the specified fill char.\n\
    - **string.rpartition():** Splits the string at the last occurrence of the specified\
    \ string separator sep argument and returns a tuple containing three elements,\
    \ the part before the separator, the separator itself, and the part after the\
    \ separator.\n- **string.split():** Splits a string from the specified separator\
    \ and returns a list object with string elements.\n- **string.rstrip():** Returns\
    \ a copy of the string by removing the trailing characters specified as argument.\n\
    - **string.splitlines():** Splits the string at line boundaries and returns a\
    \ list of lines in the string.\n- **string.startswith():** Returns True if a string\
    \ starts with the specified prefix. If not, it returns False.\n- **string.strip():**\
    \ Returns a copy of the string by removing both the leading and the trailing characters.\n\
    - **string.swapcase():** Returns a copy of the string with uppercase characters\
    \ converted to lowercase and vice versa. Symbols and letters are ignored.\n- **string.title():**\
    \ Returns a string where each word starts with an uppercase character, and the\
    \ remaining characters are lowercase.\n- **string.translate():** Returns a string\
    \ where each character is mapped to its corresponding character in the translation\
    \ table.\n- **string.upper():** Returns a string in the upper case. Symbols and\
    \ numbers remain unaffected.\n- **string.zfill():** Returns a copy of the string\
    \ with ‘0’ characters padded to the left. It adds zeros (0) at the beginning of\
    \ the string until the length of a string equals the specified width parameter.\n\
    \n⁶ https://www.tutorialsteacher.com/python/python-string, Python tutorials"
  mdcn: "## 重复\n\n假设你想在控制台多次输出相同的文本，比如将“Hey!”重复100次，你可以手动输入全部内容，例如连续写一百次“Hey!Hey!Hey!...”，或者直接执行以下操作：\n\
    \n```python\n>>> print (\"Hey!\"*100)\n```\n\n因此，如果你想让用户输入一个数字，并根据该数字在控制台打印文本n次，只需创建一个变量n，使用`input()`函数获取用户输入的数字，然后将文本与该数字相乘即可：\n\
    \n```python\n>>> n = input(\"Number of times you want the text to repeat: \")\n\
    Number of times you want the text to repeat: 4\n>>> print (\"Text\"*4);\n```\n\
    \n结果：TextTextTextText\n\n## 将字符串转换为整数或浮点数数据类型\n\n这也非常简单。Python初学者中有一个常见的疑问：当一个数字被引号括起来时，它就变成了字符串，如果尝试对其进行数学运算，将会出错。\n\
    \n```python\nnumStr = '123'\n```\n\n在上面的语句中，123不是数字，而是字符串。因此，在这种情况下，要将数字字符串转换为浮点数或整数数据类型，我们可以使用`float()`和`int()`函数。\n\
    \n```python\nnumStr = '123'\nnumFloat = float(numStr)\nnumInt = int(numFloat)\n\
    ```\n\n这样，你就可以轻松地对数值执行数学函数。同样，要将整数或浮点数变量转换为字符串，我们可以使用`str()`函数。\n\n```python\n\
    num = 123\n# 就这么简单\nnumStr = str(num)\n```\n\n## 切片\n\n*切片*是另一个主要的字符串操作。切片允许你根据起始索引和结束索引提取字符串的任何部分。例如，如果我们有一个字符串，并且想提取该字符串的一部分或仅一个字符，那么可以使用以下语法之一：\n\
    \n- **string_name[starting_index: finishing_index: character_iterate]**\n    -\
    \ **String_name：** 代表保存字符串的变量名。\n    - **starting_index：** 是你希望在子字符串中出现的起始字符的索引。\n\
    \    - **finishing_index：** 表示你希望在子字符串中出现的最后一个字符的索引加一。\n\n## 内置字符串方法\n\nPython有一组内置方法，可用于字符串操作。⁶\n\
    \n- **str.capitalize()：** 返回字符串的副本，其首字母大写，其余字母小写。\n- **string.casefold()：** 返回小写字符串。它类似于`lower()`方法，但`casefold()`方法会将更多字符转换为小写。\n\
    - **string.center()：** 返回一个指定长度的新居中字符串，该字符串用指定字符填充。默认字符是空格。\n- **string.count()：**\
    \ 在给定字符串中搜索（区分大小写）指定的子字符串，并返回一个整数，表示该子字符串出现的次数。\n- **string.endswith()：** 如果字符串以指定的后缀结尾（区分大小写），则返回True，否则返回False。\n\
    - **string.expandtabs()：** 返回一个字符串，其中所有制表符`\\t`被替换为一个或多个空格，具体取决于`\\t`之前的字符数和指定的制表符大小。\n\
    - **string.find()：** 返回子字符串在给定字符串中首次出现的索引（区分大小写）。如果未找到子字符串，则返回-1。\n- **string.index()：**\
    \ 返回子字符串在给定字符串中首次出现的索引。\n- **string.isalnum()：** 如果字符串中的所有字符都是字母数字（字母或数字），则返回True。否则，返回False。\n\
    - **string.isalpha()：** 如果字符串中的所有字符都是字母（包括小写和大写），则返回True；如果至少有一个字符不是字母，则返回False。\n\
    - **string.isascii()：** 如果字符串为空或所有字符都是ASCII字符，则返回True。\n- **string.isdecimal()：**\
    \ 如果字符串中的所有字符都是十进制字符，则返回True。否则，返回False。\n- **string.isdigit()：** 如果字符串中的所有字符都是数字或Unicode数字字符，则返回True。否则，返回False。\n\
    - **string.isidentifier()：** 检查字符串是否为有效的标识符字符串。如果字符串是有效的标识符，则返回True，否则返回False。\n\
    - **string.islower()：** 检查给定字符串的所有字符是否都是小写。如果所有字符都是小写，则返回True；即使只有一个字符是大写，也返回False。\n\
    - **string.isnumeric()：** 检查字符串的所有字符是否都是数字字符。如果所有字符都是数字，则返回True；即使只有一个字符是非数字，也返回False。\n\
    - **string.isprintable()：** 如果给定字符串的所有字符都是可打印的，则返回True。即使只有一个字符是不可打印的，也返回False。\n\
    - **string.isspace()：** 如果给定字符串的所有字符都是空白字符，则返回True。即使只有一个字符不是空白字符，也返回False。\n\
    - **string.istitle()：** 检查每个单词的首字母是否大写，其余字母是否小写。如果字符串是标题格式，则返回True；否则，返回False。符号和数字被忽略。\n\
    - **string.isupper()：** 如果所有字符都是大写，则返回True；即使只有一个字符不是大写，也返回False。\n- **string.join()：**\
    \ 返回一个字符串，该字符串是调用它的字符串与作为参数指定的可迭代对象的字符串元素的连接。\n- **string.ljust()：** 返回左对齐的指定宽度的字符串。如果指定的宽度大于字符串长度，则字符串的剩余部分用指定的填充字符填充。\n\
    - **string.lower()：** 返回原始字符串的副本，其中所有字符都转换为小写。\n- **string.lstrip()：** 通过删除作为参数指定的前导字符，返回字符串的副本。\n\
    - **string.maketrans()：** 返回一个映射表，该表将给定字符串中的每个字符映射到第二个字符串中相同位置的字符。此映射表与`translate()`方法一起使用，该方法将根据映射表替换字符。\n\
    - **string.partition()：** 在指定的字符串分隔符`sep`参数首次出现的位置分割字符串，并返回一个包含三个元素的元组：分隔符之前的部分、分隔符本身以及分隔符之后的部分。\n\
    - **string.replace()：** 返回字符串的副本，其中所有出现的子字符串都被另一个子字符串替换。\n- **string.rfind()：**\
    \ 返回指定子字符串（子字符串的最后一次出现）在给定字符串中的最高索引。\n- **string.rindex()：** 返回子字符串在给定字符串中最后一次出现的索引。\n\
    - **string.rjust()：** 返回右对齐的指定宽度的字符串。如果指定的宽度大于字符串长度，则字符串的剩余部分用指定的填充字符填充。\n- **string.rpartition()：**\
    \ 在指定的字符串分隔符`sep`参数最后一次出现的位置分割字符串，并返回一个包含三个元素的元组：分隔符之前的部分、分隔符本身以及分隔符之后的部分。\n-\
    \ **string.split()：** 根据指定的分隔符分割字符串，并返回一个包含字符串元素的列表对象。\n- **string.rstrip()：**\
