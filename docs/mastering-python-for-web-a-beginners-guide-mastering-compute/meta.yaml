    \n动态类型是许多其他脚本语言（如 Perl 或 PHP）的特征。它确实可以让你免于编写“额外”的代码行，这反过来意味着编写代码所花费的时间更少。理解这个概念对于理解本书其余部分的大部分内容至关重要。\n\
    \n所以到现在，我们已经了解到数据类型很重要，因为统计方法和某些其他内容只能与特定的 Python 数据类型一起使用。你可能需要以不同的方式分析数据，然后对数据进行分类；否则，将导致错误的分析。本质上需要了解数据类型，以知道你的变量持有或可以持有哪种“类型”的数据。如果你提前知道这些信息，就可以避免许多运行时问题，并利用最小的内存空间。\n\
    \n# 第 3 章\n\n## Python 注释和文档\n\n### 本章内容\n\n- 介绍主要的 Python 数据类型\n- 讨论每种类型的内置方法描述\n\
    - 解释如何访问、更新和修改 Python 数据类型\n\n每种编程语言都有一个称为注释的概念。虽然注释不会改变程序的结果，但它们在编程中仍然扮演着重要角色。注释主要用作在运行时被解释器或编译器忽略的语句。然而，每种编码语言都有其语法，可以将注释与实际代码区分开来。注释是提高代码可读性的好方法，通过用简单的语言解释你可能希望在代码中完成的操作。\n\
    \n注释在编码过程中也可能有益，具有以下功能：\n\n- **未来参考：** 想象一下，你编写了一个包含数百行代码且没有任何注释的程序。如果你在一两个月后打开该程序，那么你会发现理解你的代码很有挑战性。此外，你甚至可能忘记代码块的作用，并被迫再次跟踪它以理解其意图。因此，在代码中添加注释可以节省大量时间，当你知道你将不得不重新回到这段代码时。\n\
    - **注释有助于理解他人的代码：** “没有人是一座孤岛”，大多数时候我们通常在团队结构中工作，由其他团队成员审查一位团队成员的代码。此外，你可能需要处理你的同事之前处理过的项目。在这两种情况下，你都需要理解其他人编写的代码。如果你在代码中使用了注释，它会使其他人查看你的代码的体验变得容易得多。他可以完成有用的审查，并且如果其他人编辑你的代码，缺陷的可能性也会大大降低。\n\
    - **代码调试：** 有时我们需要检查代码的一部分，看看它是否按预期工作。在这种情况下，我们可以在其余代码上留下注释。没有注释，我们将不得不通过删除代码来检查输出，并且必须再次输入相同的代码。通过应用注释可以避免这种耗时的过程。\n\
    \n## 单行、内联和多行注释\n\n注释是开发人员提供的有用信息，以确保读者能够理解源代码。它用于解释逻辑或代码的特定部分。当你不再在场回答有关代码的问题时，注释对于试图维护或增强你的代码的人特别有帮助。这些通常被引用为有用的编程技术，它们不参与程序的输出，但大大提高了整个程序的可读性。\n\
    \n按照惯例，Python 中的注释以井号（#）和空白字符开头，并持续到行尾。通常，注释应该看起来像这样：\n\n```\n# This is a comment\
    \ sample\n```\n\n因为注释对执行没有贡献，所以当你运行程序时，你不会在那里看到任何注释的迹象。注释旨在使代码对人类可理解，并被编译器忽略。在一个“Hello,\
    \ Reader!”程序中，注释可能看起来像这样：\n\n```\n# Print \"Hello, Reader!\" to console\nprint(\"\
    Hello, Reader!\")\n```\n\n由于 Python 会忽略井号之后直到行尾的所有内容，因此你可以随意在代码中的任何地方插入注释，甚至与其他代码内联：\n\
    \n```\nprint(\"It is great work.\") # There is a mistake\n```\n\n当你运行上面的代码时，你只会看到输出“It\
    \ is great work.”。其他所有内容都将被完全忽略。此外，强烈建议保持注释简短、简洁且切中要点。而且，虽然 Python 企业门户 8（PEP\
    \ 8）关于“Python 代码风格指南”建议每行编写 79 个字符或更少，但它也建议内联注释和文档字符串最多 72 个字符。如果你的注释将超过该长度，那么你将需要将其拆分到多行。在同一份\
    \ PEP 8 指南中，Guido van Rossum 对注释时的空白使用添加了一些说明。确切地说，他陈述了以下内容：¹\n\n- “避免在任何地方使用尾随空白。因为它通常是不可见的，所以可能会令人困惑：反斜杠后跟空格和换行符不算作行继续标记。一些编辑器不保留它，许多项目（如\
    \ CPython 本身）有预提交钩子会拒绝它。\n- 始终在这些二元运算符两侧用单个空格包围：赋值（=）、增强赋值（+=、-= 等）、比较（==、<、>、!=、<>、<=、>=、in、not\
    \ in、is、is not）、布尔值（and、or、not）。\n- 如果使用了具有不同优先级的运算符，请考虑在优先级最低的运算符周围添加空白。**使用你自己的判断**；但是，永远不要使用超过一个空格，并且始终在二元运算符两侧使用相同数量的空白。”\n\
    \n**内联注释**应用于与语句相同的行，紧跟在代码本身之后。就像其他注释一样，它们以井号和单个空白字符开头。通常，内联注释看起来像这样：[code] #\
    \ 关于代码的内联注释\n\n内联注释选项不应被滥用，但对于解释代码中复杂或不明显的部分可能很有效。如果你认为你可能不记得将来可能需要的一行代码，或者你正在与其他人协作，而你知道他们可能不完全了解代码的所有方面，它们也可能很有帮助。例如，如果你在\
    \ Python 程序中不使用很多数学，你或你的编码伙伴可能不知道以下内容会创建一个复数"
