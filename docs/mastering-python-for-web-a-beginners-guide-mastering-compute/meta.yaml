    \ |\n\n## 动态规划\n\n动态规划是一种强大的方法，可用于解决一系列问题以找到高效且最优的解决方案。简单来说，动态规划背后的思想是将问题分解为子问题，并将结果存储起来以备将来使用，这样你就无需重新计算相同的问题。这种寻求整体解决方案的子问题优化被称为最优子结构属性。\n\
    \n动态规划被设计为一种问题解决技术，通过递归地将复杂问题分解为子问题来解决，然后可以逐一解决这些子问题。因此，动态规划使用递归编程，并有助于节省稍后重新计算输入的时间。然而，这种方法与分而治之范式不同，因为动态规划解决方案中的子问题是相互交织的，因此解决一个子问题所需的一些相同步骤也会被保存，直到其他子问题需要时才使用。这引出了动态规划的主要关键点。动态规划不是重新计算一些共享步骤，而是让我们简单地存储每个步骤的解决方案，并在后续每次使用时重用它们。\n\
    \n同时，不应将动态规划与递归混淆。递归是指通过自顶向下方法将函数值表示为其他值来找到解决方案的系统。另一方面，动态规划不过是带有记忆化的递归，即计算并存储值，以便稍后访问以解决重复出现的问题，从而使你的代码更快并降低时间复杂度。这里的基本思想是通过高效利用空间来节省时间。递归可能需要时间但不需要空间，而动态规划需要存储空间来存储子问题的解决方案以供潜在参考。\n\
    \n尽管这两个系统密切相关，但动态规划在可能的情况下仍然更受青睐。这主要是因为暴力递归程序在面对重叠过程时往往会重复工作，浪费宝贵的时间和资源进行计算。动态规划通过确保每个相同的步骤只完成一次，并将该步骤的结果存储在哈希表或数组等收集器中来防止此问题。这样，动态规划确保了更少的重复工作，并具有更好的运行时效率。\n\
    \n动态规划可以通过两种方式应用——使用自顶向下或自底向上的方法。\n\n使用自顶向下方法时，问题被分解，如果问题的某些部分已经解决，则找到并返回保存的值，否则，函数的值被记忆化或首次计算。\n\
    \n自顶向下的解决方案通过将问题分解为更小的子问题来确保达到每个问题的基本情况。通过使用这种递归链风格，自顶向下的动态规划仅在需要时解决子问题，而不是按顺序解决所有子问题。在这种情况下，记忆化在处理计算成本高昂的程序方面发挥了重要作用。记忆化可以定义为在自顶向下方法中保存子问题解决方案的过程。由于自顶向下方法按需解决问题，记忆化也以非顺序方式存储数据。为此，哈希表是最佳的集合类型，因为它们以无序方式存储数据。在\
    \ Python 中，自顶向下最好使用字典数据结构完成，因为它是存储键/值对无序数据的完美选择。\n\n自底向上是另一种通过减少递归导致的时间复杂度来避免递归的有效方法。在这种情况下，计算小问题的解决方案以构建整体问题的解决方案。自底向上的动态规划解决方案从关注最小的子问题（称为基本情况）开始，然后逐步解决每个子问题。随着每个子问题的完成，其解决方案被保存并用于解决下一个最小的子问题。因此，这些构建的解决方案有望构成主要问题的答案。制表确保此过程顺利进行。制表可以定义为以有序方式存储自底向上方法中子问题结果的过程。在制表中，无需选择首先解决哪些子问题，而是继续解决基本情况和主要问题之间的每个子问题。由于过程是按顺序排列的，制表可以使用列表或数组，因为这些集合以特定顺序组织信息。\n\
    \n通过一些示例，人们可以更好地理解动态规划及其类型。我们将通过斐波那契数列的基本计算来研究这个概念。斐波那契数列是一个简单的数字序列，其排列方式是每个数字都是前两个数字的和，从\
    \ 0 和 1 开始：F(n) = F(n-1) + F(n-2)\n\n### 递归方法\n\n```python\ndef r_fibo(n):\n \
    \   if n <= 1:\n        return n\n    else:\n        return(r_fibo(n-1) + r_fibo(n-2))\n\
    ```\n\n使用这种方法，程序将一遍又一遍地调用自身，试图计算更进一步的值。基于递归方法的时间复杂度计算大约为 O(2^N)。这种方法的空间复杂度为 O(N)，因为递归最多可以达到\
    \ N。\n\n例如 - F(4) = F(3) + F(2) = ((F(2) + F(1)) + F(2) = ((F(1) + F(0)) + F(1))\
    \ + (F(1) + F(0))\n在这种方法中，像 F(2) 这样的值将被计算两次，并且对 F(1) 和 F(0) 的调用也会重复。\n\n> 6 https://towardsdatascience.com/beginners-guide-to-dynamic-programming-8eff07195667,\
    \ Towardsdatascience"
