  mdcn: "## Python 多行注释如何工作？\n\n程序中的注释可以被视为一组用英语编写的短语，旨在帮助用户理解程序，使其具有一定的可读性。在 Python\
    \ 中，使用井号（#）置于行首来表示注释。Python PEP 8 指南中没有多行注释的概念，但确实描述了使用三引号的实践，这可以被声明为多行注释。\n\n\
    在 Python 中，重要的是遵循对齐和缩进方法，而不是使用花括号来定义函数。因此，在编写注释时，我们应注意缩进。例如，如果你在函数体之前但在函数内部添加注释，这被称为文档字符串，类似于没有缩进的多行注释。但是，函数可以包含多层缩进的代码块。因此，你应该正确缩进注释以及函数块。\n\
    \n可以说，Python 将多行注释视为行内注释和文档字符串之间的一种模糊地带。因为多行注释和文档字符串都使用三引号（\"\"\" \"\"\"）来声明。在\
    \ Python 中，注释以井号（#）开头，以行尾（EOL）结束。而文档字符串可以在三引号内声明，但位于函数、模块、方法或类内部，这与多行注释类似。\n\n\
    ## 块注释\n\n块注释通常用于解释更复杂的代码或读者可能不熟悉的代码集。这些较长的注释可以添加到其后部分或全部代码的同一行，并与代码保持相同的缩进。在块注释中，每行以井号和一个空格开头。如果需要使用多个段落，它们应由仅包含一个井号的行分隔。\n\
    \n以下是一个块注释的示例，它定义了下面定义的 `main()` 函数中发生的事情：²\n\n```\n# 主函数将通过解析器变量解析参数。这些\n# 参数将由用户在控制台定义。这将传递\n\
    # 用户想要解析的单词参数以及用户想要使用的文件名，\n# 并在用户未正确传递参数时提供帮助文本。\n```\n\n只有当操作看起来不直观，因此需要更好的解释时，才应使用块注释。否则，最好避免过度注释代码，并尝试相信其他程序员能够理解\
    \ Python，除非你是为特定受众编写代码。\n\n## Shebang\n\n一旦你开始自己阅读 Python 脚本，你可能会看到其中一些脚本的第一行以\
    \ `#!` 字符和 Python 解释器的路径开头：\n\n```\n#!/usr/bin/env python3\n```\n\n这个字符序列被称为 shebang，用于告诉操作系统应该使用哪个解释器来解析文件的其余部分。以\
    \ shebang 开头的脚本可以在终端中直接运行，而无需在脚本名称前输入 `python`。由于 shebang 行以井号开头，它也被视为注释，因此会被\
    \ Python 解释器自动忽略。\n\n## Python 注释最佳实践\n\n了解如何在 Python 中编写注释的一个重要部分是确保你的注释可读且易于理解。我们收集了一些技巧，帮助你编写更好的注释，以真正支持你的代码。\n\
    \n### 为自己编写代码时\n\n通过正确注释自己的代码，你可以显著地让自己的生活更轻松。即使没有其他人会看到它，你也将与之打交道，这足以成为将其做好的理由。作为开发者，使用注释的一个极其有用的方式是将其作为代码的大纲。特别是当你仍在编写脚本的过程中，还不确定程序最终会是什么样子时，你可以使用注释作为工具来跟踪剩余的工作，或者作为保持程序高级流程的一种方式。例如，你可以使用注释以伪代码的形式勾勒一个函数：\n\
    \n```\nfrom collections import defaultdict\n\ndef get_top_companies(prices):\n\
    \    top_companies = defaultdict(int)\n    # 对于每个服务范围\n    # 获取价格范围内的公司搜索\n  \
    \  然后\n    # 计算公司被搜索的次数\n    # 取前3家公司并添加到字典中\n    return dict(top_companies)\n\
    ```\n\n这些注释将帮助你规划 `get_top_companies()`。一旦你确切知道你的函数要做什么，你就可以着手将其转化为代码。\n\n以这种方式使用注释将帮助你保持头脑清晰。当你浏览程序时，你会知道为了拥有一个功能完整的脚本，还剩下什么需要完成。将注释转化为代码后，请确保删除那些已变得无关的先前注释，以保持代码的整洁和明确。\n\
    \n你也可以将注释作为调试过程的一部分。尝试注释掉你的一段旧代码，看看这如何影响你的整体输出。如果你同意这个更改，那么不要让注释掉的代码留在你的程序中，因为它可能会降低可读性。相反，删除它并使用版本控制，以防你需要将其恢复。\n\
    \n最后，你可以使用注释来描述你自己代码中有问题的部分。通常会发生这样的情况：你放下一个项目，然后不得不在几个月或几年后重新回来处理它。在这种情况下，你将花费大量时间试图重新熟悉你之前编写的内容。为了避免这种情况，你能做的最好的事情就是记下你的想法和计划，以便以后更容易重新上手。\n\
    \n### 为他人编写代码时\n\n人们倾向于跳过和来回浏览文本，阅读代码也是如此。唯一可能被迫逐行阅读代码的情况是当代码无法工作时，你必须找出错误所在。在大多数其他情况下，你会快速浏览变量和函数定义以了解大致情况。使用简单英语编写的注释确实可以帮助开发者理解正在发生的事情。\n\
    \n因此，试着善待你的同行开发者，使用注释帮助他们理解你代码的目的。行内注释应谨慎使用，以澄清那些本身不明确的代码片段。如果你有一个复杂的方法或函数，不容易理解；你可能想在\
    \ `def` 行之后包含一个简短的注释，为其提供一些上下文：\n\n```\ndef complicated_function(s):\n    # 此函数正在执行一些复杂的操作\n\
    ```\n\n这可以帮助其他浏览你代码的专业人士了解该函数的作用。至于其他公共函数，无论其是否复杂，你可能都想包含一个相关的文档字符串：\n\n```\n\
    def sparsity_ratio(x: np.array) -> float:\n    \"\"\"返回一个浮点数\n```\n\n这个字符串将成为你函数的\
    \ `.__doc__` 属性，并将正式与该特定方法关联。Python PEP 257 文档字符串指南可以提供帮助。\n\n---\n² https://devguide.python.org/documenting/.\
    \ Python"
