    # moduleauthor


    The moduleauthor directive, which can appear multiple times, names the authors
    of the specific module code, just like sectionauthor names the author of a piece
    of documentation. It too does not result in any output.


    In addition, it would be beneficial to make the section title of a module-describing
    file meaningful since that value will be inserted in the table-of-content of overview
    files.


    # Information Units


    There is a variety of directives applied to describe specific features provided
    by modules. Each directive needs one or more signatures to provide basic information
    about what is being described, and the content should be the description. The
    standard version makes entries in the general index. However, if no index entry
    is desired, you can give the directive option flag: noindex:. The following example
    shows all of the features of this directive type:⁹


    # c:function


    Describes a C function. The signature should be given as in C, for instance:


    ```

    .. c:function:: PyObject* PyType_GenericAlloc(PyTypeObject *type, Py_ssize_t nitems)

    ```


    ⁹ https://devguide.python.org/documenting/. Python'
