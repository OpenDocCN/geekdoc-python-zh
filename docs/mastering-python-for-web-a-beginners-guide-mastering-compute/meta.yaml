    \ `(?L)`。\n\n## re.M\n\n指定时，模式字符 `'^'` 在字符串开头和每行开头（紧跟在每个换行符之后）匹配；模式字符 `'$'` 在字符串末尾和每行末尾（紧跟在每个换行符之前）匹配。默认情况下，`'^'`\
    \ 仅在字符串开头匹配，`'$'` 仅在字符串末尾和字符串末尾的换行符（如果有）之前匹配。对应于内联标志 `(?m)`。\n\n## re.S\n\n使 `'.'`\
