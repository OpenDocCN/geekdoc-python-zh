    \ in curly brackets. For example: {1:“Sam,” 2:“Ben, 3:“Roy, 4:“Molly”}\n\n+  \
    \ - **Set types**\n    - **set:** The set in Python is the same as the implementation\
    \ of the set in Mathematics. A set object has suitable methods to perform mathematical\
    \ set operations like union, intersection, difference, etc. In scripting, it goes\
    \ as a mutable, unordered collection of distinct hashable objects.\n    - **frozenset:**\
    \ frozen, unlike the ordinary set, is an immutable version of sets whose elements\
    \ are added from other data types."
  - "[PAGE 63]\n\n• **Mutable and immutable types:** Mutable data objects of the above-mentioned\
    \ data types are stored in a computer's memory for processing. Some of these values\
    \ can be modified during processing, but once they are created in the memory,\
    \ their content cannot be altered. Numbers, strings, and Tuples are immutable,\
    \ which means their contents cannot be changed after creation.\n\n• **Iterator\
    \ types:** Python supports a concept of iteration over containers and is using\
    \ container user-defined classes to support iteration. Sequences, described below\
    \ in more detail, always support the iteration methods:\n\n+   1. **container.__iter__():**\
    \ Return an iterator object. This process is required to support the iterator\
    \ protocol described below, and if a container supports different types of iteration,\
    \ additional methods can be provided to specifically request iterators for those\
    \ iteration types. This method corresponds to the tp_iter slot of the type structure\
    \ for Python objects in the Python/C application programming interface (API).\n\
    \   The iterator objects themselves are required to support the following two\
    \ methods, which together form the iterator protocol:⁴\n2. **iterator.__iter__():**\
    \ Return the iterator object itself. This is required to allow both containers\
    \ and iterators to be used with the for and in statements. This method\n\n> ⁴\
    \ https://docs.python.org/3/library/stdtypes.html, Python"
  - '[PAGE 64]


    corresponds to the tp_iter slot of the type structure for Python objects in the
    Python/C API.


    +   3. **iterator.__next__()**: Return the next item from the container. If there
    are no further items, raise the StopIteration exception. This method corresponds
    to the tp_iternext slot of the type structure for Python objects in the Python/C
    API. Once an iterator''s __next__() method raises StopIteration, it must continue
    to do so on subsequent calls. Implementations that do not obey this property are
    deemed broken.


    Python defines several iterator objects to support iteration over general and
    specific sequence types, dictionaries, and other more specialized forms. The specific
    types are not important beyond their implementation of the iterator protocol.


    Another important scripting item in Python is *Operators*. They are used to perform
    operations on variables and values. Python divides the operators into the following
    groups:


    +   1. Assignment operators

    2. Arithmetic operators

    3. Logical operators

    4. Comparison operators

    5. Identity operators

    6. Bitwise operators

    7. Membership operators'
  - '[PAGE 65]


    Arithmetic operators are used with numeric values to perform common mathematical
    operations:⁵


    | Operator | Name | Example |

    | :--- | :--- | :--- |

    | + | Addition | x + y |

    | - | Subtraction | x - y |

    | * | Multiplication | x * y |

    | / | Division | x / y |

    | % | Modulus | x % y |

    | ** | Exponentiation | x ** y |

    | // | Floor division | x // y |


    +   - **Python Assignment Operators:** Assignment operators are used to assigning
    values to variables:


    | Operator | Example | Same As |

    | :--- | :--- | :--- |

    | = | x = 5 | x = 5 |

    | += | x += 3 | x = x + 3 |

    | -= | x -= 3 | x = x - 3 |

    | *= | x *= 3 | x = x * 3 |

    | /= | x /= 3 | x = x / 3 |

    | %= | x %= 3 | x = x % 3 |

    | //= | x //= 3 | x = x // 3 |

    | **= | x **= 3 | x = x ** 3 |

    | &= | x &= 3 | x = x & 3 |

    | |= | x |= 3 | x = x | 3 |

    | ^= | x ^= 3 | x = x ^ 3 |

    | >>= | x >>= 3 | x = x >> 3 |

    | <<= | x <<= 3 | x = x << 3 |


    ⁵ https://docs.python.org/3/library/stdtypes.html, Python'
  - '[PAGE 66]


    52 ■ Mastering Python for Web


    • **Python Comparison Operators:** Comparison operators are used to comparing
    two values:


    | Operator | Name | Example |

    | --- | --- | --- |

    | == | Equal | x == y |

    | != | Not equal | x != y |

    | > | Greater than | x > y |

    | < | Less than | x < y |

    | >= | Greater than or equal to | x >= y |

    | <= | Less than or equal to | x <= y |


    • **Python Logical Operators:** Logical operators are used to combining conditional
    statements:


    | Operator | Description | Example |

    | --- | --- | --- |

    | and | Returns True if both statements are true | x < 5 and x < 10 |

    | or | Returns True if one of the statements is true | x < 5 or x < 4 |

    | not | Reverse the result, returns False if the result is true | not(x < 5 and
    x < 10) |


    • **Python Identity Operators:** Identity operators are used to comparing the
    objects, not if they are equal, but if they are actually the same object, with
    the same memory location:


    | Operator | Description | Example |

    | --- | --- | --- |

    | is | Returns True if both variables are the same object | x is y |

    | is not | Returns True if both variables are not the same object | x is not y
    |'
  - '[PAGE 67]


    • **Python Membership Operators:** Membership operators are used to testing if
    a sequence is presented in an object:


    | Operator | Description | Example |

    | :--- | :--- | :--- |

    | in | Returns True if a sequence with the specified value is present in the object
    | x in y |

    | not in | Returns True if a sequence with the specified value is not present
    in the object | x not in y |


    • **Python Bitwise Operators:** Bitwise operators are used to comparing (binary)
    numbers:


    | Operator | Name | Description |

    | :--- | :--- | :--- |

    | & | AND | Sets each bit to 1 if both bits are 1 |

    | | | OR | Sets each bit to 1 if one of two bits is 1 |

    | ^ | XOR | Sets each bit to 1 if only one of two bits is 1 |

    | ~ | NOT | Inverts all the bits |

    | << | Zero fill left shift | Shift left by pushing zeros in from the right |

    | >> | Signed right shift | Shift right by pushing copies of the leftmost |


