    \ – 2019年4月11日。\n\n## 翻译\n\n有单独的Python文档翻译，严格由PEP 545 – Python文档翻译操作。新版本由docsbuild-scripts构建并托管在docs.python.org上。已有多个文档翻译投入生产，许多其他翻译仍在进行中：¹⁴\n\
    \n- 阿拉伯语 (ar)\n- 印度使用的孟加拉语 (bn_IN)\n- 法语 (fr)\n- 印度使用的印地语 (hi_IN)\n- 匈牙利语 (hu)\n\
