    \\d+\\.\\d*\")\n```\n\nCorresponds to the inline flag `(?x)`.\n\n## re.search(pattern,\
    \ string, flags=0)\n\nScan through string looking for the first location where\
    \ the regular expression pattern produces a match, and return a corresponding\
    \ match object. Return `None` if no position in the string matches the pattern;\
    \ note that this is different from finding a zero-length match at some point in\
    \ the string.\n\n## re.match(pattern, string, flags=0)\n\nIf zero or more characters\
    \ at the beginning of string match the regular expression pattern, return a corresponding\
    \ match object. Return `None` if the string does not match the pattern; note that\
    \ this is different from a zero-length match.\n\nNote that even in MULTILINE mode,\
    \ `re.match()` will only match at the beginning of the string and not at the beginning\
    \ of each line.\n\nIf you want to locate a match anywhere in string, use `search()`\
    \ instead (see also `search()` vs. `match()`).\n\n## re.fullmatch(pattern, string,\
    \ flags=0)\n\nIf the whole string matches the regular expression pattern, return\
    \ a corresponding match object. Return `None`, if the string does not match the\
    \ pattern; note that this is different from a zero-length match.\n\n## re.split(pattern,\
    \ string, maxsplit=0, flags=0)\n\nSplit string by the occurrences of pattern.\
    \ If capturing parentheses are used in the pattern, then the text of all groups\
    \ in the pattern is also returned as part of the resulting list. If maxsplit is\
    \ nonzero, at most maxsplit splits occur, and the remainder of the string is returned\
    \ as the final element of the list.\n\n## re.findall(pattern, string, flags=0)\n\
    \nReturn all non-overlapping matches of pattern in a string as a list of strings.\
