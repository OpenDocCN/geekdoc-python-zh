    \n## re.finditer(pattern, string, flags=0)\n\n返回一个迭代器，该迭代器在字符串中为正则表达式模式的所有非重叠匹配生成匹配对象。字符串从左到右扫描，匹配按找到的顺序返回。空匹配包含在结果中，非空匹配现在可以在前一个空匹配之后立即开始。\n\
    \n## re.sub(pattern, repl, string, count=0, flags=0)\n\n返回通过将字符串中最左边的非重叠出现的模式替换为替换\
    \ repl 获得的字符串。如果未找到模式，则返回未更改的字符串。repl 可以是字符串或函数；如果是字符串，则其中的任何反斜杠转义都将被处理。\n\n##\
    \ 正则表达式对象\n\n编译的正则表达式对象支持以下方法和属性：⁵\n\n- **Pattern.search(string[, pos[, endpos]])**：扫描字符串，查找此正则表达式产生匹配的第一个位置，并返回相应的匹配对象。如果未找到匹配，则返回\
    \ `None`。\n\n---\n⁴ https://docs.python.org/3/library/re.html, Python"
