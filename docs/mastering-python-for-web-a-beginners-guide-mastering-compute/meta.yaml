    # Paragraphs


    The paragraph is the most basic block in a reST document. They are simply parts
    of text separated by one or more blank lines. In Python indentation is significant,
    so all lines of the same paragraph should be left-aligned to the same level of
    indentation.


    # Inline Markup<sup>7</sup>


    The standard reST inline markup is quite straight-forward:


    ```

    one asterisk: *text* for emphasis (italics),

    two asterisks: **text** for strong emphasis (boldface), and

    backquotes: ``text`` for code samples.

    ```


    # Sections


    Section headers are created by underlining or overlining the section title with
    a punctuation character. Generally, there should be no heading levels assigned
    to certain characters as the structure is determined from the succession of headings.
    But for the Python documentation, there is a suggested convention:<sup>8</sup>


    ```

    # with overline, for parts

    * with overline, for chapters

    ```


