- md: "Class definitions, just like function definitions (def statements) should be\
    \ executed before they have any effect, and for that, you can place a class definition\
    \ in a branch of an if statement, or inside a function. In practice, the statements\
    \ inside a class definition are usually scripted as function definitions, but\
    \ other statements are permitted nevertheless. Once a class definition is entered,\
    \ a new namespace is created, and executed as the local scope – therefore, all\
    \ assignments to local variables go into this new namespace. But if a class definition\
    \ is left normally (via the end), a class object is created. This is basically\
    \ a wrapper around the contents of the namespace created by the class definition.\
    \ The original local scope is reinstated, and the class object is bound here to\
    \ the class name given in the class definition header.\n\n## Class Objects\n\n\
    By default, class objects support two kinds of operations: attribute references\
    \ and instantiation.\n\nAttribute references utilize the standard syntax applied\
    \ for all attribute references in Python: obj.name. Definite attribute names are\
    \ all the names that were in the class’s namespace when the class object was created.\
    \ Thus, if the class definition looked like this:\n\n```\nclass MyClass:\n   \
    \ \"\"\"A simple example class\"\"\"\n    i = 12345\n\n    def f(self):\n    \
    \    return 'hello world'\n```\n\nthen MyClass.i and MyClass.f are valid attribute\
    \ references, able to return an integer and a function object. Class attributes\
    \ can also be assigned to, so you can change the value of MyClass.i by assignment.\
    \ __doc__ is also a valid attribute, returning the docstring belonging to the\
    \ class: “A simple example class.”\n\nClass instantiation uses function notation.\
    \ Just pretend that the class object is a parameterless function that returns\
    \ a new instance of the class. For instance:\n\n```\nx = MyClass()\ncreates a\
    \ new instance of the class and\nassigns this object to the local variable x.\n\
    ```\n\nThe instantiation operation creates an empty object. Most classes like\
    \ to create objects with instances customized to a specific initial state. Therefore\
    \ a class may describe a special method named __init__(), like this:\n\n```\n\
    def __init__(self):\n    self.data = []\n```\n\nIf a class defines an __init__()\
    \ method, class instantiation automatically invokes __init__() for the newly-created\
    \ class instance. So, in this example, a new, initialized instance can be achieved\
    \ by:\n\n```\nx = MyClass()\n```\n\nAt the same time, the __init__() method may\
    \ have arguments for greater flexibility. In that case, arguments given to the\
    \ class instantiation operator are passed on to __init__().\n\nObjects are individual,\
    \ but at the same time, multiple names (in multiple scopes) can be bound to the\
    \ same object. This is known as aliasing in other languages. This is usually not\
    \ positively recognized at the first glance at Python, and can possibly be ignored\
    \ when dealing with immutable basic types (numbers, strings, tuples). However,\
    \ aliasing has a potential surprising effect on the semantics of Python code involving\
    \ mutable objects such as lists, dictionaries, and many other types. This is usually\
    \ applied to the advantage of the program since aliases are treated like pointers\
    \ in some manner. For instance, passing an object is cheap since only a pointer\
    \ is passed by the implementation, and if a function modifies an object passed\
    \ as an argument, the caller will see the change – this eliminates the need for\
    \ two different argument passing mechanisms.\n\nApart from that, there are also\
    \ instance objects. And, the only operations that instance objects can manage\
    \ are attribute references. There are two types of valid attribute names: data\
    \ attributes and methods.\n\nData attributes have the same features as “instance\
    \ variables” in Smalltalk, and “data members” in C++. And similar to local variables,\
    \ data attributes do not need to be declared as they get activated when they are\
    \ first assigned to. The other type of instance attribute reference is a method.\
    \ A method is a function that is a part of an object. Additionally, in Python,\
    \ the term method is not exclusive to class instances: other object types can\
    \ have methods as well. For example, list objects have methods called append,\
    \ insert, remove, sort, and so on. Valid method names of an instance object are\
    \ based on its class. By default, all attributes of a class that are function\
    \ objects define corresponding methods of its instances.\n\n## Method Objects\n\
    \nNormally, a method is called right after it is bound:\n\n```\nx.f()\n```\n\n\
    In the MyClass standard case, this will return the string “hello world.” Nevertheless,\
    \ it is not necessary to call a method right away: x.f is a method object, and\
    \ can be stored away and called at a later time. For example:\n\n```\nxf = x.f\n\
    while True:\n    print(xf())\nwill keep printing hello world until the\nend of\
    \ time.\n```\n\nAt the same time, you may have noticed that x.f() was called without\
    \ an argument above, even though the function definition for f() specified an\
    \ argument. It is the special thing about methods that the instance object can\
    \ pass as the first argument of the function. In our case, the call x.f() is exactly\
    \ equivalent to MyClass.f(x). In general, calling a method with a list of n arguments\
    \ is equivalent to calling the corresponding function with an argument list that\
    \ is created by inserting the method’s instance object before the first argument.\
    \ Understanding how methods function might require actually working to implement\
    \ them. Practice will be useful for clarifying any questions you might still hold.\n\
    \n## Inheritance\n\nFor sure, a language feature would not be given the name of\
    \ a “class” without supporting inheritance. The syntax for a derived class definition\
    \ should look like this:\n\n```\nclass DerivedClassName(BaseClassName):\n    <statement-1>\n\
    \    .\n    .\n    .\n    <statement-N>\n```\n\nThe name BaseClassName must be\
    \ defined in a scope containing the derived class definition. In place of a base\
