    \n- 1. 默认安装路径位于当前 Windows 用户的 AppData/ 目录中。\n- 2. *自定义安装* 按钮通常用于自定义安装位置以及安装哪些附加功能，包括\
    \ pip 和 IDLE。\n- 3. *为所有用户安装启动程序* 复选框默认是选中的。这意味着机器上的每个用户都可以访问 py.exe 启动程序。你可以取消选中此框以将\
    \ Python 限制为当前 Windows 用户。\n- 4. *Add Python 3.9 to PATH* 复选框默认是未选中的。可能有几个缺点会让你改变主意，不想将\
    \ Python 添加到 PATH，因此在选中此框之前，请确保你理解其含义。\n\n完整安装程序让你完全掌控安装过程。你可以使用对话框中可用的选项来自定义安装以满足你的需求。之后你所要做的就是点击\
