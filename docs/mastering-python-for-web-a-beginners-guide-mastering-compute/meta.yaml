    A Priori Analysis (also known as Theoretical Analysis): tracks the efficiency
    of algorithms by presuming that all the other factors are constant and do not
    affect the implementation of the algorithm.


    A Posterior Analysis (also known as Empirical Analysis): analyze the algorithms
    after it was implemented using some programming language. So in this analysis,
    the actual values like time complexity or execution time of an algorithm, space
    complexity, or the space required by the algorithm for its full life cycle are
    gathered.


