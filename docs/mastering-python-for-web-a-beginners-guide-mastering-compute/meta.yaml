    # Characteristics of an Algorithm


    However, not all procedures can be treated as an algorithm. An algorithm should
    have the following characteristics:


    +   - **Unambiguous:** Algorithm should be clear and have transparent order of
    steps (or phases), with an understandable set of inputs/outputs that lead to only
    one meaning.

    - **Input:** An algorithm should have 0 or more well-established inputs.

    - **Output:** An algorithm should have 1 or more well-explained outputs and should
    match the desired output.

    - **Finiteness:** Algorithms must end after a certain number of steps.

    - **Feasibility:** Should be viable with the available resources.

    - **Independent:** An algorithm should have marked out step-by-step directions,
    which should not depend on any programming code.


    From the data structure point of view, there are certain categories of algorithms
    that are of utmost importance:


    +   - **Search:** Algorithm that helps to search an item in a data structure.

    - **Sort:** Algorithm that is used to sort items in a certain order.'
  - '[PAGE 168]


    154 ■ Mastering Python for Web


    +   - **Insert:** Algorithm to insert items in a data structure.

    - **Update:** Algorithm applied to update an existing item in a data structure.

    - **Delete:** Algorithm that deletes an existing item from a data structure.


    Algorithms may be perceived as paradigms or strategies for solving problems. There
    are two most common algorithmic paradigms are brute force and divide & conquer.


    # Brute Force


    Brute force algorithms are great methods of solving a problem through exercising
    computing power and testing all possibilities to find a solution rather than using
    a more advanced strategy to advance overall tactics efficiency.

    For instance, if you are trying to figure out a four-digit password combination
    application of the brute force approach would let you test every possible combination
    of four-digit numbers from 0000 to 9999. Linear search, a method to find a target
    value using a specific list, is an example of the brute force method. The search
    algorithm will pass through the array and check each element until a match is
    found. The advantage of using the brute force method is that you are definitely
    guaranteed to find the solution. It is also pretty straightforward and easy to
    implement compared to other more complicated algorithmic strategies. On the other
    hand, even though it is easy to implement, it is also the most inefficient solution.
    It makes it challenging to improve performance or find possible shortcuts with
    this strategy.'
