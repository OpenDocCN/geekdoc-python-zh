    • 内置作用域是一种 Python 作用域，当你运行脚本或打开交互式会话时，它会被创建或激活。此作用域包含诸如关键字、函数、异常以及其他已内置于 Python
    中的项目等名称。此 Python 作用域中的名称也可从代码中的任何位置访问。当你运行程序或脚本时，Python 会自动加载它。


    LEGB 规则是一个有用的查找过程，它决定了 Python 查找名称的顺序。例如，如果你引用一个给定的名称，那么 Python 将按顺序在局部、嵌套、全局和内置作用域中查找该名称。如果该名称存在，那么你将能够获取它的第一个出现位置。否则，你将得到一个错误。


    总结一下，当你使用嵌套函数时，名称的操作首先检查局部作用域或最内层函数的局部作用域。之后，Python 会从最内层作用域到最外层作用域，查看所有外部函数的嵌套作用域。如果未找到匹配项，Python
    开始在全局和内置作用域中查找。如果未找到名称，则你会得到一个错误。无论如何，在执行过程中的任何给定时间，你最多会有四个活动的 Python 作用域——局部、嵌套、全局和内置——具体取决于你在代码中的位置。另一方面，你始终可以访问至少两个活动作用域，即始终可用的全局和内置作用域。


    ## 函数：局部作用域


    局部作用域或函数作用域是在函数调用时生成的 Python 作用域。每次调用函数时，你也在创建一个新的局部作用域。同时，你可以将每个 `def` 语句和 `lambda`
    表达式视为下一个局部作用域的蓝图。这些局部作用域将在你调用相应函数时产生。按照标准设定，你在函数内分配的参数和名称仅存在于该函数或与函数调用对应的局部作用域内。当函数返回时，局部作用域结束，名称被遗忘。


    ## 嵌套函数：嵌套作用域


    嵌套或非局部作用域是在你将函数嵌套在其他函数内部时设计的。嵌套作用域最早在 Python 2.2 版本中添加。它可以采用任何外部函数的局部作用域的形式。你在嵌套
    Python 作用域中使用的名称通常被称为非局部名称。


    ## 模块：全局作用域


    从你访问 Python 程序的那一刻起，你就处于全局 Python 作用域中。在内部，Python 将你的程序主脚本转换为一个名为 `__main__` 的模块，以保存主程序的执行。此模块的命名空间将是你的程序的主要全局作用域。同样值得了解的是，在
    Python 中，全局作用域和全局名称的概念与模块文件紧密相连。举例来说，如果你在任何 Python 模块的顶层定义一个名称，那么该名称就被认为是该模块的全局名称。这也是为什么这种作用域被称为模块作用域的原因。


    一旦你开始在 Python 交互式会话中工作，你可能会注意到 `__main__` 也是其主模块的名称。要自己验证这一点，请打开一个交互式会话并输入以下内容：


    ```

    >>> __name__

    ''__main__''

    ```


    当你运行一个 Python 程序或像上面那样的交互式会话时，解释器会执行作为程序入口点的模块或脚本中的代码。此模块或脚本被赋予特殊名称 `__main__`。这意味着从现在开始，你可以说你的主要全局作用域就是
    `__main__` 的作用域。


    如果你想检查主要全局作用域中的名称，可以使用 `dir()`。如果你不带参数调用 `dir()`，那么你将获得当前全局作用域中存在的名称列表。


    但当你不带参数调用 `dir()` 时，你获得的是主要全局 Python 作用域中可用的名称列表。同时，如果你在模块的顶层（此处为 `__main__`）分配一个新名称（例如这里的
    `var`），那么该名称将被添加到 `dir()` 返回的列表中。


    需要注意的是，每次程序执行只有一个全局 Python 作用域。此作用域一直有效，直到程序终止并且其所有名称被遗忘。否则，下次运行程序时，名称会记住它们在上次运行中的值。你可以从代码中的任何位置访问或引用任何全局名称的值。这包括函数和类。为了阐明这些要点：


    ```

    >>> var = 10

    >>> def func():

    ...     return var # 你可以从 func() 内部访问 var

    ...

    >>> func()

    10

    >>> var # 保持不变

    10

    ```


    在 `func()` 内部，你可以轻松定位或引用 `var` 的值。这不会影响你的全局名称 `var`，但它向你展示了 `var` 可以从 `func()`
    内部自由访问。同时，你不能在函数内部分配全局名称，除非你使用 `global` 语句将它们声明为全局名称。然而，当你在 Python 中为一个名称赋值时，很可能会发生以下两种情况之一：你要么创建一个新名称，要么更新一个现有名称。


    整体行为将取决于你分配名称所在的 Python 作用域。如果你尝试在函数内为一个全局名称赋值，那么你最终会在函数的局部作用域中创建该名称，从而覆盖全局名称。这也可能意味着你无法从函数内部优化在函数外部确定的大多数变量。


    另一方面，全局名称可以从全局 Python 作用域中的任何位置更新或修改。此外，`global` 语句也可以应用于从代码中的几乎任何位置修改全局名称。

    修改全局名称通常不被认为是良好的编程实践，因为它可能导致代码：


    - **难以阅读：** 你需要了解并理解所有先前用于访问和修改全局名称的语句。

    - **无法重用：** 代码与特定程序特有的全局名称相关联。

    - **难以调试：** 程序中的大多数语句都可能改变全局名称的值。


    良好的编程实践通常使用局部名称而不是全局名称。一些技巧包括：


    - 在整个程序中尽量减少全局名称的修改。

    - 编写依赖于局部名称而非全局名称的自包含函数。

    - 无论处于何种作用域，都尝试使用唯一的对象名称。

    - 防止发生跨模块名称修改。

    - 将全局名称用作在程序执行期间无法优化的常量。


    ## 内置作用域


    内置作用域是 Python 作用域之一，在 Python 3 中作为名为 `builtins` 的标准库模块进行管理。所有 Python 的内置对象都位于此模块中。一旦你运行
    Python 解释器，它们就会自动上传到内置作用域。Python 在其 LEGB 查找中查找 `builtins`，因此你可以免费获得它定义的所有名称。这也意味着你可以使用它们而无需导入任何模块。


    你还可以注意到，`builtins` 中的名称通常以特殊名称 `__builtins__` 加载到你的全局 Python 作用域中，如以下代码所示：


    ```

    >>> dir()

    [''__annotations__'', ''__builtins__'',...,

    ''__package__'', ''__spec__'']

    >>> dir(__builtins__)

    [''ArithmeticError'', ''AssertionError'',...,

    ''tuple'', ''type'', ''vars'', ''zip'']

    ```


    在第一次调用 `dir()` 的输出中，你可以看到 `__builtins__` 始终存在于全局 Python 作用域中。如果你使用 `dir()` 搜索
    `__builtins__`，那么你将能够获得 Python 内置名称的完整列表。平均而言，内置作用域比你当前的全局 Python 作用域多出超过 150
    个名称。例如，在 Python 3.8 中，你可以通过以下方式了解确切的名称数量：


    ```

    >>> len(dir(__builtins__))

    152

    ```


    通过调用 `len()`，你可以获取 `dir()` 返回的列表中的项目数量。这返回了 152 个名称'
