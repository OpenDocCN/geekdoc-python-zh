  md: '# REGULAR EXPRESSIONS


    Regular expressions, also called RE, regexes, or regex patterns are tiny, highly
    specialized programming language codes embedded inside Python and made available
    via re-modeling. Using this little language, you define the rules for the set
    of possible strings that you need to match; this set might consist of English
    sentences, or e-mail addresses, commands or anything else that you like.


    Regular expression patterns are compiled into sets of bytecodes which are then
    executed by a matching engine written in C. For professional expert use, it may
    be necessary to pay attention to how the engine will implement a given RE, and
    write the RE in a particular way in order to produce a byte-code that runs faster.
    The regular expression language is small and limited, so not all possible string
    processing tasks can be completed using regular expressions. There are some tasks
    that can be done with regular expressions, but the expressions turn out to be
    very complicated. In these instances, you may be better off writing Python code
    to do the processing; even if Python code will be slower than an elaborate regular
    expression, it will also probably be more understandable.


    A regular expression defines a set of strings that matches it. Ultimately, the
    functions in this module let you see if a particular string matches a given regular
    expression or if a given regular expression matches a particular string. Additionally,
    regular expressions can be applied to form new regular expressions; if A and B
    are both regular expressions, then AB is also a regular expression. By the same
    logic, if a string p matches A and another string q matches B, the string pq will
    match AB. Therefore, complex expressions can easily be constructed from simpler
    primitive expressions.'
  merge: -1
  pgno: 254
- img_proc: true
  md: 'Regular expressions can consist of both special and ordinary characters. Most
    ordinary characters, like ‘A’, ‘a’, or ‘0’ are the simplest regular expressions;
    they simply match themselves. Some characters, like ‘|’ or ‘(’, are special. Special
    characters either stand for classes of ordinary characters or impact how the regular
    expressions around them are interpreted.


    Repetition qualifiers (*, +, ?, {m,n}, etc) cannot be directly nested. This avoids
    ambiguity with the non-greedy modifier suffix?, and with other modifiers in other
    implementations. To apply a second repetition to an inner repetition, parentheses
    may be needed. For instance, the expression (?:a{6})* matches any multiple of
    six ‘a’ characters.


    The special characters are:²


    .

    In the default mode, dot matches any character except a newline. If the DOTALL
    flag has been added, this matches any character, including a newline.


    ^

    Caret goes at the start of the string, and in MULTILINE mode also matches immediately
    after each newline.


    $

    Matches the end of the string or just before the newline at the end of the string,
    and in MULTILINE mode also matches before a newline.


    ² https://docs.python.org/3/library/re.html, Python'
  merge: -1
