    b = re.compile(r\"\\d+\\.\\d*\")\n```\n\n对应于内联标志 `(?x)`。\n\n## re.search(pattern,\
    \ string, flags=0)\n\n扫描字符串，查找正则表达式模式产生匹配的第一个位置，并返回相应的匹配对象。如果字符串中没有位置匹配该模式，则返回\
