- md: "As already mentioned, Python stands for object-oriented programming, a style\
    \ where you organize codes into objects, which include related data and functions\
    \ for operating on that data. Objects can also inherit/extend/derive from other\
    \ objects, sharing common behavior between related objects. It is also possible\
    \ to create multiple specific instances of the type of object based on the model\
    \ in the class.\n\n## Rendering Data (HTML Templates)\n\nTemplate systems let\
    \ you specify the structure of an output document, utilizing placeholders for\
    \ data that will be filled in when a page is generated. Templates are often applied\
    \ to form an HTML, but can also create other types of documents. Django supports\
    \ both its built-in templating system and another popular Python library called\
    \ Jinja2.\n\nThe code below shows what the HTML template called by the render()\
    \ function might look like. This template has been written under the direction\
    \ that it will have access to a list variable called very_old_teams when it is\
    \ rendered. Inside the HTML body, we have an expression that first checks if the\
    \ very_old_teams variable exists, and then iterates it in a for loop. On each\
    \ iteration the template displays each team's team_name value in an `<li>` element:\n\
    \n```\n## filename: go/templates/go/index.html\n<!DOCTYPE html>\n<html lang=\"\
    en\">\n<head>\n    <meta charset=\"utf-8\">\n    <title>Home page</title>\n</head>\n\
    <body>\n    {% if very_old_teams %}\n<ul>\n    {% for team in very_old_teams %}\n\
    \        <li>{{ team.team_name }}</li>\n    {% endfor %}\n</ul>\n{% else %}\n\
    \    <p>No teams are available.</p>\n{% endif %}\n</body>\n</html>\n```\n\nIn\
    \ the preceding sections, we displayed the main features that you use in almost\
    \ every web application: URL mapping, views, models, and templates. Just a few\
    \ other items provided by Django include:\n\n- **Forms:** HTML Forms are designed\
    \ to collect user data for processing on the server. Django has settings to simplify\
    \ form creation, validation, and processing.\n- **User authentication and permissions:**\
    \ Django has great user authentication and permission system that has been built\
    \ to ensure system security.\n- **Caching:** Creating content dynamically is much\
    \ more technically intensive than serving static content. Django provides flexible\
    \ caching that lets you store all or part of a rendered page so that it does not\
    \ get re-rendered except when needed.\n- **Administration site:** The Django administration\
    \ site is included by default when you create a website application. It makes\
    \ it much easier to provide an admin page for site administrators to create, edit,\
    \ and view any data models on your site.\n- **Serializing data:** With Django,\
    \ it is easy to serialize and serve your data as XML or JSON. This can be particularly\
    \ helpful when creating a web service that serves data to be consumed by other\
    \ applications and does not display anything itself, or when creating a website\
    \ in which the client-side code handles all the rendering of data.\n\nAdditionally,\
    \ Django provides a ready-to-use user interface for administrative activities\
    \ and automatically generates admin UI based on your project models. The Admin\
    \ interface depends on the `django.contrib` module. To have it working, you need\
    \ to make sure some modules are imported in the `INSTALLED_APPS` and `MIDDLEWARE_CLASSES`\
    \ tuples of the `myproject/settings.py` file.\n\nFor `INSTALLED_APPS` make sure\
    \ you have –\n\n```\nINSTALLED_APPS = (\n    'django.contrib.admin',\n    'django.contrib.auth',\n\
    \    'django.contrib.contenttypes',\n    'django.contrib.sessions',\n    'django.contrib.messages',\n\
    \    'django.contrib.staticfiles',\n    'myapp',\n)\n```\n\nFor `MIDDLEWARE_CLASSES`\
    \ –\n\n```\nMIDDLEWARE_CLASSES = (\n    'django.contrib.sessions.middleware.SessionMiddleware',\n\
    \    'django.middleware.common.CommonMiddleware',\n    'django.middleware.csrf.CsrfViewMiddleware',\n\
    \    'django.contrib.auth.middleware.AuthenticationMiddleware',\n    'django.contrib.messages.middleware.MessageMiddleware',\n\
    \    'django.middleware.clickjacking.XFrameOptionsMiddleware',\n)\n```\n\nBefore\
    \ launching your server, to access your Admin Interface, you need to initiate\
    \ the database and create the necessary tables or collections for the admin interface\
    \ to run. And in order to start the Admin Interface, we need to make sure we have\
    \ configured a URL for our admin interface. Open the `myproject/url.py` and you\
    \ should have something like:\n\n```\nfrom django.conf.urls import patterns,\n\
    include,\nurl\nfrom django.contrib import admin\nadmin.autodiscover()\n\nurlpatterns\
    \ = patterns('',\n    # Examples:\n    # url(r'^$', 'myproject.views.home', name='home'),\n\
    \    # url(r'^blog/', include('blog.urls')),\n    url(r'^admin/', include(admin.site.urls)),\n\
    )\n```\n\nNow just run the server: `$ python manage.py runserver`.\n\n## REGULAR\
    \ EXPRESSIONS\n\nRegular expressions, also called RE, regexes, or regex patterns\
    \ are tiny, highly specialized programming language codes embedded inside Python\
    \ and made available via the `re` module. Using this little language, you define\
    \ the rules for the set of possible strings that you need to match; this set might\
    \ consist of English sentences, or e-mail addresses, commands or anything else\
    \ that you like.\n\nRegular expression patterns are compiled into sets of bytecodes\
    \ which are then executed by a matching engine written in C. For professional\
    \ expert use, it may be necessary to pay attention to how the engine will implement\
    \ a given RE, and write the RE in a particular way in order to produce a byte-code\
    \ that runs faster. The regular expression language is small and limited, so not\
    \ all possible string processing tasks can be completed using regular expressions.\
    \ There are some tasks that can be done with regular expressions, but the expressions\
    \ turn out to be very complicated. In these instances, you may be better off writing\
    \ Python code to do the processing; even if Python code will be slower than an\
    \ elaborate regular expression, it will also probably be more understandable.\n\
    \nA regular expression defines a set of strings that matches it. Ultimately, the\
    \ functions in this module let you see if a particular string matches a given\
    \ regular expression or if a given regular expression matches a particular string.\
    \ Additionally, regular expressions can be applied to form new regular expressions;\
    \ if A and B are both regular expressions, then AB is also a regular expression.\
    \ By the same logic, if a string p matches A and another string q matches B, the\
    \ string pq will match AB. Therefore, complex expressions can easily be constructed\
    \ from simpler primitive expressions.\n\nRegular expressions can consist of both\
    \ special and ordinary characters. Most ordinary characters, like ‘A’, ‘a’, or\
    \ ‘0’ are the simplest regular expressions; they simply match themselves. Some\
    \ characters, like ‘|’ or ‘(’, are special. Special characters either stand for\
    \ classes of ordinary characters or impact how the regular expressions around\
    \ them are interpreted.\n\nRepetition qualifiers (`*`, `+`, `?`, `{m,n}`, etc)\
    \ cannot be directly nested. This avoids ambiguity with the non-greedy modifier\
    \ suffix `?`, and with other modifiers in other implementations. To apply a second\
    \ repetition to an inner repetition, parentheses may be needed. For instance,\
    \ the expression `(?:a{6})*` matches any multiple of six ‘a’ characters.\n\nThe\
    \ special characters are:\n\n- `.`: In the default mode, dot matches any character\
    \ except a newline. If the `DOTALL` flag has been added, this matches any character,\
    \ including a newline.\n- `^`: Caret goes at the start of the string, and in `MULTILINE`\
    \ mode also matches immediately after each newline.\n- `$`: Matches the end of\
    \ the string or just before the newline at the end of the string, and in `MULTILINE`\
    \ mode also matches before a newline.\n- `*`: Causes the resulting RE to match\
    \ 0 or more repetitions of the preceding RE, as many repetitions as are possible.\
    \ `ab*` will match ‘a’, ‘ab’, or ‘a’ followed by any number of ‘b’s.\n- `+`: Causes\
    \ the resulting RE to match 1 or more repetitions of the preceding RE. `ab+` will\
    \ match ‘a’ followed by any non-zero number of ‘b’s; it will not match just ‘a’.\n\
    - `?`: Causes the resulting RE to match 0 or 1 repetitions of the preceding RE.\
    \ `ab?` will match either ‘a’ or ‘ab’.\n- `*?`, `+?`, `??`: The ‘*’, ‘+’, and\
    \ ‘?’ qualifiers match as much text as possible. For example, if the RE `<.*>`\
    \ is matched against ‘<a> b <c>’, it will match the entire string, and not just\
    \ ‘<a>’. Adding `?` after the qualifier makes it perform the match in minimal\
    \ fashion; as few characters as possible will be matched. Using the RE `<.*?>`\
    \ will match only ‘<a>’.\n- `{m}`: Specifies that exactly m copies of the previous\
    \ RE should be matched; fewer matches cause the entire RE not to match. For example,\
    \ `a{6}` will match exactly six ‘a’ characters, but not five."
  mdcn: "正如前面提到的，Python 代表面向对象编程，这是一种将代码组织成对象的风格，对象包含相关数据以及用于操作这些数据的函数。对象也可以从其他对象继承/扩展/派生，从而在相关对象之间共享通用行为。还可以基于类中的模型创建该类型对象的多个具体实例。\n\
    \n## 渲染数据（HTML 模板）\n\n模板系统允许你指定输出文档的结构，利用占位符来填充页面生成时的数据。模板通常用于生成 HTML，但也可以创建其他类型的文档。Django\
    \ 既支持其内置的模板系统，也支持另一个流行的 Python 库——Jinja2。\n\n下面的代码展示了 `render()` 函数调用的 HTML 模板可能的样子。该模板的编写前提是，在渲染时它将能够访问一个名为\
    \ `very_old_teams` 的列表变量。在 HTML 主体内，我们有一个表达式，它首先检查 `very_old_teams` 变量是否存在，然后在一个\
    \ `for` 循环中对其进行迭代。每次迭代时，模板都会在一个 `<li>` 元素中显示每个团队的 `team_name` 值：\n\n```\n## filename:\
    \ go/templates/go/index.html\n<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  \
    \  <meta charset=\"utf-8\">\n    <title>Home page</title>\n</head>\n<body>\n \
    \   {% if very_old_teams %}\n<ul>\n    {% for team in very_old_teams %}\n    \
    \    <li>{{ team.team_name }}</li>\n    {% endfor %}\n</ul>\n{% else %}\n    <p>No\
    \ teams are available.</p>\n{% endif %}\n</body>\n</html>\n```\n\n在前面的章节中，我们展示了你在几乎每个\
    \ Web 应用程序中都会使用的主要功能：URL 映射、视图、模型和模板。Django 还提供了其他一些功能，包括：\n\n- **表单：** HTML 表单旨在收集用户数据以在服务器上进行处理。Django\
    \ 提供了简化表单创建、验证和处理的设置。\n- **用户认证和权限：** Django 拥有出色的用户认证和权限系统，旨在确保系统安全。\n- **缓存：**\
    \ 动态创建内容在技术上比提供静态内容要密集得多。Django 提供了灵活的缓存，允许你存储渲染页面的全部或部分内容，这样除非需要，否则它不会被重新渲染。\n\
    - **管理站点：** Django 管理站点在你创建网站应用程序时默认包含。它使得为站点管理员提供管理页面变得更加容易，以便在你的站点上创建、编辑和查看任何数据模型。\n\
    - **序列化数据：** 使用 Django，可以轻松地将数据序列化为 XML 或 JSON 并提供服务。当创建向其他应用程序提供数据而不自行显示任何内容的\
    \ Web 服务，或者创建客户端代码处理所有数据渲染的网站时，这尤其有用。\n\n此外，Django 提供了一个开箱即用的管理活动用户界面，并根据你的项目模型自动生成管理\
    \ UI。管理界面依赖于 `django.contrib` 模块。要使其正常工作，你需要确保在 `myproject/settings.py` 文件的 `INSTALLED_APPS`\
    \ 和 `MIDDLEWARE_CLASSES` 元组中导入了一些模块。\n\n对于 `INSTALLED_APPS`，确保你有：\n\n```\nINSTALLED_APPS\
    \ = (\n    'django.contrib.admin',\n    'django.contrib.auth',\n    'django.contrib.contenttypes',\n\
    \    'django.contrib.sessions',\n    'django.contrib.messages',\n    'django.contrib.staticfiles',\n\
    \    'myapp',\n)\n```\n\n对于 `MIDDLEWARE_CLASSES`：\n\n```\nMIDDLEWARE_CLASSES =\
    \ (\n    'django.contrib.sessions.middleware.SessionMiddleware',\n    'django.middleware.common.CommonMiddleware',\n\
    \    'django.middleware.csrf.CsrfViewMiddleware',\n    'django.contrib.auth.middleware.AuthenticationMiddleware',\n\
    \    'django.contrib.messages.middleware.MessageMiddleware',\n    'django.middleware.clickjacking.XFrameOptionsMiddleware',\n\
    )\n```\n\n在启动服务器之前，要访问你的管理界面，你需要初始化数据库并为管理界面运行创建必要的表或集合。为了启动管理界面，我们需要确保为管理界面配置了一个\
    \ URL。打开 `myproject/url.py`，你应该会有类似这样的内容：\n\n```\nfrom django.conf.urls import\
    \ patterns,\ninclude,\nurl\nfrom django.contrib import admin\nadmin.autodiscover()\n\
    \nurlpatterns = patterns('',\n    # Examples:\n    # url(r'^$', 'myproject.views.home',\
    \ name='home'),\n    # url(r'^blog/', include('blog.urls')),\n    url(r'^admin/',\
    \ include(admin.site.urls)),\n)\n```\n\n现在只需运行服务器：`$ python manage.py runserver`。\n\
    \n## 正则表达式\n\n正则表达式，也称为 RE、regexes 或 regex patterns，是嵌入在 Python 中并通过 `re` 模块提供的小型、高度专业化的编程语言代码。使用这种小语言，你可以定义需要匹配的可能字符串集合的规则；这个集合可能由英语句子、电子邮件地址、命令或任何你喜欢的东西组成。\n\
    \n正则表达式模式被编译成字节码集，然后由用 C 编写的匹配引擎执行。对于专业专家使用，可能需要注意引擎将如何实现给定的 RE，并以特定方式编写 RE，以生成运行更快的字节码。正则表达式语言小巧且有限，因此并非所有可能的字符串处理任务都可以使用正则表达式完成。有些任务可以用正则表达式完成，但表达式会变得非常复杂。在这些情况下，你最好编写\
    \ Python 代码来处理；即使 Python 代码比精心设计的正则表达式慢，它也可能更容易理解。\n\n正则表达式定义了一组与之匹配的字符串。最终，此模块中的函数让你查看特定字符串是否匹配给定的正则表达式，或者给定的正则表达式是否匹配特定字符串。此外，正则表达式可以用于形成新的正则表达式；如果\
    \ A 和 B 都是正则表达式，那么 AB 也是正则表达式。根据同样的逻辑，如果字符串 p 匹配 A，另一个字符串 q 匹配 B，那么字符串 pq 将匹配\
    \ AB。因此，复杂的表达式可以很容易地从更简单的原始表达式构建而成。\n\n正则表达式可以由特殊字符和普通字符组成。大多数普通字符，如 ‘A’、‘a’ 或\
    \ ‘0’，是最简单的正则表达式；它们只是匹配自身。有些字符，如 ‘|’ 或 ‘(’，是特殊的。特殊字符要么代表普通字符的类别，要么影响其周围正则表达式的解释方式。\n\
    \n重复限定符（`*`、`+`、`?`、`{m,n}` 等）不能直接嵌套。这避免了与非贪婪修饰符后缀 `?` 以及其他实现中的其他修饰符产生歧义。要将第二个重复应用于内部重复，可能需要使用括号。例如，表达式\
    \ `(?:a{6})*` 匹配任何六个 ‘a’ 字符的倍数。\n\n特殊字符包括：\n\n- `.`：在默认模式下，点匹配除换行符以外的任何字符。如果添加了\
    \ `DOTALL` 标志，则匹配任何字符，包括换行符。\n- `^`：脱字符位于字符串的开头，在 `MULTILINE` 模式下也匹配每个换行符之后的位置。\n\
    - `$`：匹配字符串的末尾或字符串末尾换行符之前的位置，在 `MULTILINE` 模式下也匹配换行符之前的位置。\n- `*`：导致生成的 RE 匹配前一个\
    \ RE 的 0 次或多次重复，尽可能多的重复。`ab*` 将匹配 ‘a’、‘ab’ 或 ‘a’ 后跟任意数量的 ‘b’。\n- `+`：导致生成的 RE\
    \ 匹配前一个 RE 的 1 次或多次重复。`ab+` 将匹配 ‘a’ 后跟任意非零数量的 ‘b’；它不会只匹配 ‘a’。\n- `?`：导致生成的 RE\
    \ 匹配前一个 RE 的 0 次或 1 次重复。`ab?` 将匹配 ‘a’ 或 ‘ab’。\n- `*?`、`+?`、`??`：‘*’、‘+’ 和 ‘?’\
    \ 限定符匹配尽可能多的文本。例如，如果正则表达式 `<.*>` 与 ‘<a> b <c>’ 匹配，它将匹配整个字符串，而不仅仅是 ‘<a>’。在限定符后添加\
    \ `?` 使其以最小方式执行匹配；将匹配尽可能少的字符。使用正则表达式 `<.*?>` 将只匹配 ‘<a>’。\n- `{m}`：指定应恰好匹配前一个 RE\
    \ 的 m 个副本；较少的匹配会导致整个 RE 不匹配。例如，`a{6}` 将恰好匹配六个 ‘a’ 字符，但不会匹配五个。"
