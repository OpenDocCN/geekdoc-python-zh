  - '[PAGE 120]


    # PROGRAMMATICALLY ACCESSING DOCSTRINGS


    As already pointed out in a previous section, Python code documentation is a key
    and continuous course in the process of software development. The term docstring
    is an abbreviation that stands for documentation string and defines your source
    code – what your function, module, or class does. As a rule, it is added as a
    regular comment right below the head of a code function, module, or method. Docstrings
    is a great way to create documentation for your Python code from within the code.
    This in-code documentation works for all modules, and all functions and classes
    exported by a module should also have docstrings. Public methods such as the __init__
    constructor also have docstrings. A package may be documented in the module docstring
    of the __init__.py file in the package directory.


    In order to write a docstring correctly, it is recommended to follow the official
    Python convention. In this case, PEP 257 – Docstring Convention written by David
    Goodger and Guido van Rossum himself, would be a great guideline to reflect upon.
    The aim of this PEP is to “standardize the high-level structure of docstrings:
    what they should contain, and how to say it.”⁴


    # Single-Line Docstrings


    Due to Python simplicity, the docstring comes as a single-line comment. However,
    keep in mind to start the text of a docstring with a capital letter, and end it
    with a period. Based on the trend that code is typically read more often


    ⁴ https://www.python.org/dev/peps/pep-0257/, Python'
  - '[PAGE 121]


    than it is written, it is highly advised to describe what the documented structure
    does as a command, instead of explaining how it is done. Additionally, mentioning
    which kind of value is returned to the caller would also help to understand the
    result of the function or method.


    And in regards to double-quotes, as long as both the beginning and the end quotes
    are similar, Python is quite progressive, and you are allowed to use three single
    quotes as well as three double-quotes. You just need to make sure that the closing
    quotes are in the same line as with the opening quotes. Besides, there is no need
    to add any empty lines before, or after the text of the docstring.


    # Multi-line Docstrings


    Moreover, a docstring can as well be written as a multi-line comment. If you choose
    to use multi-line comments, two things are going to change – the encapsulation
    of the docstring would be written in triple single- or double-quotes, and the
    structure of the docstring itself would get a deeper meaning assigned to the entire
    text.


    The docstring of a script documents the script’s function and command-line syntax
    together with other variables and files. You are allowed to be fairly elaborate
    (several screens full) when applying this docstring but at the same time make
    it as sufficient as possible for a new user to operate the command properly. It
    is also required to complete a quick reference to all options and arguments for
    an expert user.


    The docstring for a module should typically list the classes, exceptions, and
    functions that are requested by the module, with a one-line summary of each. At
    the same'
  - '[PAGE 122]


    time, docstring for a package `__init__.py` module is also expected to list the
    modules and sub-packages exported by the package.


    The docstring for a function or method should summarize its behavior and list
    its return values, side effects, exceptions raised, and restrictions on when it
    can be applied. Optional arguments should be indicated, and keyword arguments
    that are part of the interface must be documented.


    The docstring for a class should outline its behavior and list the public methods
    and other variables. If the class is supposed to be subclassed and has an additional
    interface for subclasses, this interface should be listed in the separate docstring.
    And, the class constructor should be documented in the docstring for its `__init__`
    method.


    If a class subclasses another class and its behavior is mostly obtained from that
    class, its docstring should mention this and outline the differences. You can
    use the verb "override" to indicate that a subclass method replaces a superclass
    method. And in addition to that, you can apply the verb "extend" to indicate that
    a subclass method calls the superclass method.


    # Docstring Formats


    When it comes to docstrin formats, there is not just one binding setup. To be
    clear, there is more than one, and all of these format variants are compatible
    with multi-line docstrings.


    +   - **reStructured Text (reST)/Sphinx**: This is considered to be the Official
    Python documentation standard'
