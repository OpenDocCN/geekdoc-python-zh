  md: '# Divide and Conquer


    Divide and conquer is another algorithmic paradigm that enables solving a problem
    by dividing it into smaller sub-problems. Once the sub-problems are small enough,
    they will each be solved separately. And in the end, the algorithm repeatedly
    combines the solved sub-solutions into a solution for the original problem. It''s
    very efficient and fast when dealing with general case solutions where the problem
    can easily be divided into sub-problems. It is also preferable in terms of memory
    usage, as dividing the problems into micro sub-problems allows the problem to
    be solved in the cache itself. However, due to its recursive approach, it may
    be quite slow. There is also a possibility that the approach might duplicate sub-problems
    leading to large recursive sets, which will consume extra space.


    Moving ahead with these Data Structures and Algorithms in Python, we should take
    a closer look at some of the important algorithms such as the Tree Traversal Algorithms,
    Searching Algorithms, and Sorting Algorithms.


    # Tree Traversal Algorithms


    Trees in Python are non-linear data structures that require visiting each node
    present in the tree exactly once in order to update or check them. Based on the
    order in which the nodes are visited, there can be three types of tree traversals:
    pre-order traversal (Root-Left-Right), in-order traversal (Left-Root-Right), and
    post-order traversal (Left-Right-Root).


    In-order Traversal In-order traversal stands for traversing the tree in such a
    way that you first visit the left nodes'
  merge: -1
  pgno: 169
- img_proc: true
  md: 'followed by the root and then right nodes. You start your traversal from all
    the nodes in the left subtree, moving towards the root and finally getting to
    the right subtree. The algorithm for In-order traversal looks like this:


    +   Step 1: Traverse through the nodes present in the left subtree

    Step 2: Check the root node

    Step 3: Traverse the right subtree.


    Pre-order Traversal In a Pre-Order traversal, the root node is visited first,
    followed by the left subtree and then the right subtree. The algorithm for Pre-order
    traversal will be the following:


    +   Step 1: Visit the root node

    Step 2: Traverse through the nodes present in the left subtree

    Step 3: Traverse the right subtree.


    Post-order Traversal Post-order traversal starts with the left then to the right,
    and only then, the root. The algorithm for Post-order traversal will be as follow:


    +   Step 1: Traverse through the nodes present in the left subtree

    Step 2: Traverse the right subtree

    Step 3: Visit the root node.'
