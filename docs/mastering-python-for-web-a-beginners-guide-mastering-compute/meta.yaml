    You will not have to backslash-escape asterisks in the signature; the names of
    the arguments should be given so they may be used in the description.


    # c:member


    Describes a C struct member. Make sure that the text of the description includes
    the range of values allowed, how the value should be interpreted, and whether
    the value can be changed. References to structure members in text can use the
    member role.


    # c:macro


    Stands for a “simple” C macro. To clarify, simple macros are macros that are used
    for code expansion, but which do not take arguments, therefore, cannot be described
    as functions. This is not to be used for simple constant definitions.


    # c:type


    Describes a C type. The signature should just be the type name.


    # c:var


    Describes a global C variable. The signature can as well include the type, such
    as:


    ```

    .. c:var:: PyObject* PyClass_Type

    ```


    # data


    Represents global data in a module, using both variables and values as “defined
    constants.” Please note that class and object attributes are not documented using
    this directive.'
