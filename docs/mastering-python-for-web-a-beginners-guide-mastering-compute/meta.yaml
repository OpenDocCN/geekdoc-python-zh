    \ no binding for nonlocal 'var' found\n```\n\n首先，你尝试在全局Python作用域中使用`nonlocal`语句，但由于`nonlocal`只在内部或嵌套函数内工作，你最终得到一个`SyntaxError`，告诉你不能在模块作用域中应用`nonlocal`。关于`nonlocal`语句操作的深入信息可以在PEP\
    \ 3104 – Access to Names in Outer Scopes中找到。\n\n与`global`不同，你不能使用`nonlocal`来创建惰性非局部名称。如果你想将它们用作非局部名称，名称应该已经存在于封闭的Python作用域中。这意味着你不能通过在嵌套函数中的`nonlocal`语句中声明它们来管理非局部名称。看看以下代码示例：\n\
    \n```python\n>>> def func():\n...     def nested():\n...         nonlocal lazy_var\
    \  # Try to create a nonlocal lazy name\n...\n  File \"<stdin>\", line 3\nSyntaxError:\
    \ no binding for nonlocal 'lazy_var' found\n```\n\n使用这个例子，你可以看到当你尝试使用`nonlocal\
    \ lazy_var`定义一个非局部名称时，Python立即引发一个`SyntaxError`，因为`lazy_var`没有在`nested()`的封闭作用域中执行。\n\
    \n## 将封闭作用域用作闭包\n\n闭包是封闭Python作用域的一个特定用例。当你将嵌套函数作为数据处理时，创建该函数的语句与其执行环境一起放置。生成的项目被称为闭包。准确地说，闭包是一个内部或嵌套函数，它包含关于其封闭作用域的数据，即使该作用域已经完成执行。此外，闭包还提供了一种在函数调用之间保持状态信息的方法。如果你需要基于惰性或延迟求值的概念编写代码，这可能特别有用。\n\
    \n有些人也将这种函数称为工厂、工厂函数或闭包工厂，以指定该函数构建并返回闭包，而不是类或实例。\n\n## 通过Import将名称引入作用域\n\n当涉及到编写Python程序时，通常从将代码组织成几个模块开始。为了管理你的程序，你需要将这些独立模块中的名称引入你的`__main__`模块。为此，你应该显式导入模块或名称。这是你可以在主全局Python作用域中使用这些名称的最快方式。以下代码是当你导入一些标准模块和名称时发生的情况的示例：\n\
    \n```python\n>>> dir()\n['__annotations__', '__builtins__',...,\n'__spec__']\n\
