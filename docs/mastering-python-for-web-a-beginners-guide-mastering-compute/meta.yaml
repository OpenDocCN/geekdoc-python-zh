    Any crash course on Python is likely to start with installing or updating Python
    on your computer. There are multiple methods of installation: you can download
    official Python distributions from Python.org, install from a package manager,
    and even install specialized distributions for scientific computing.


    If you are learning how to navigate Python on your own, the best option would
    be to start at Python.org. This platform represents the official distribution,
    and that kind of source is generally the safest option for learning to program
    in Python.


    On the platform, you can easily get access to a variety of useful tutorials and
    all sorts of learning materials:


    - How to check which version of Python is installed on our device.

    - How to install and update Python on Windows, macOS, and Linux.

    - How to use Python on mobile devices like phones or tablets.

    - How to use Python on the web with online interpreters.


    And before we go on covering each one of these points, it is important to get
    acquainted with few of top-level directories in the CPython source tree that are
    meant to help you find where a certain piece of functionality is implemented.⁷


    - **Doc**: the official documentation. This is what https://docs.python.org/ uses.

    - **Grammar**: contains the EBNF grammar file for Python.

    - **Include**: contains all interpreter-wide header files.

    - **Lib**: the part of the standard library implemented in pure Python.

    - **Mac**: Mac-specific code (e.g., using IDLE as an OS X application).

    - **Misc**: things that do not belong elsewhere. Typically, this is varying kinds
    of developer-specific documentation.

    - **Modules**: the part of the standard library (plus some other code) that is
    implemented in C.

