    # Divide and Conquer


    Divide and conquer is another algorithmic paradigm that enables solving a problem
    by dividing it into smaller sub-problems. Once the sub-problems are small enough,
    they will each be solved separately. And in the end, the algorithm repeatedly
    combines the solved sub-solutions into a solution for the original problem. It''s
    very efficient and fast when dealing with general case solutions where the problem
    can easily be divided into sub-problems. It is also preferable in terms of memory
    usage, as dividing the problems into micro sub-problems allows the problem to
    be solved in the cache itself. However, due to its recursive approach, it may
    be quite slow. There is also a possibility that the approach might duplicate sub-problems
    leading to large recursive sets, which will consume extra space.


    Moving ahead with these Data Structures and Algorithms in Python, we should take
    a closer look at some of the important algorithms such as the Tree Traversal Algorithms,
    Searching Algorithms, and Sorting Algorithms.


    # Tree Traversal Algorithms


    Trees in Python are non-linear data structures that require visiting each node
    present in the tree exactly once in order to update or check them. Based on the
    order in which the nodes are visited, there can be three types of tree traversals:
    pre-order traversal (Root-Left-Right), in-order traversal (Left-Root-Right), and
    post-order traversal (Left-Right-Root).


    In-order Traversal In-order traversal stands for traversing the tree in such a
    way that you first visit the left nodes'
- md: 'followed by the root and then right nodes. You start your traversal from all
    the nodes in the left subtree, moving towards the root and finally getting to
    the right subtree. The algorithm for In-order traversal looks like this:


    - Step 1: Traverse through the nodes present in the left subtree

    - Step 2: Check the root node

    - Step 3: Traverse the right subtree.


    Pre-order Traversal In a Pre-Order traversal, the root node is visited first,
    followed by the left subtree and then the right subtree. The algorithm for Pre-order
    traversal will be the following:


    - Step 1: Visit the root node

    - Step 2: Traverse through the nodes present in the left subtree

    - Step 3: Traverse the right subtree.


    Post-order Traversal Post-order traversal starts with the left then to the right,
    and only then, the root. The algorithm for Post-order traversal will be as follow:


    - Step 1: Traverse through the nodes present in the left subtree

    - Step 2: Traverse the right subtree

    - Step 3: Visit the root node.


    ## Sorting Algorithms


    Sorting of data should be considered as a real-time problem that requires a number
    of sorting algorithms to be solved. And in this case, sorting algorithms are used
    to sort data into the requisite order. Sorting algorithms can be divided into
    five types that are:


    - Merge Sort

    - Bubble Sort

    - Insertion Sort

    - Selection Sort


    Merge Sort Merge Sort algorithm operates based on the Divide and Conquer rule.
    With that, the given list of items is first divided into smaller lists until it
    reaches a point where each list has exactly one item. By default, a list consisting
    of one item will be sorted, and the merge sort algorithm then compares lists and
    reorders them in the sequence. This process is done recursively until it reaches
    a stage where there is only one, sorted list. To simplify, the Merge Sort Algorithm
    might look like this:


    **Step 1:** Check if the list contains more than one items; if yes, divide the
    list into two lists, else the list is sorted


    **Step 2:** The list is to be divided repeatedly until there is only a single
    element left in each sub-list


    **Step 3:** Automatically merge the sub-lists by arranging them in the given order
    until you get a single sorted list.


    Bubble Sort Bubble sort is also referred to as a comparison algorithm that first
    compares and then adjusts elements in the specified order. Bubble Sort Algorithm
    could be explained in the following manner:


    - Step 1: Beginning from the first element, the algorithm progressively compares
    elements of an array

    - Step 2: If the current element and the next element are not in the specified
    order, interchange the elements

    - Step 3: If the current element and the next element are in the specified order,
    you can move on to the next element.


    Insertion Sort Insertion sort algorithm picks one element of a given list at a
    time and places it at the exact spot where it is to be placed:


    - Step 1: Compare the first element with the next element and if the element to
    the left and the key element is not in order, swap them

    - Step 2: Take the next element and if the new key element should be repositioned,
    shift the elements of the list towards the right until an appropriate place is
    created for the element under consideration

    - Step 3: Go on with Step 2 until all elements of the given list are sorted.


    Selection Sort The selection sort algorithm is used to divide the given list into
    two halves where the first half will be the sorted list and the second is an unsorted
    list. To begin with, the sorted list is empty and all elements to be sorted are
    present in the unsorted list. The Selection sort algorithm will look at all the
    elements present in the unsorted list, choose the item that is supposed to come
    first, and then place it in the sorted list. It then repeats the searching process
    and places the next element to the right of the first element in the sorted list.


    For instance, if you have to sort the elements in ascending order, the selection
    sort algorithm will take a look at the complete list, select the smallest element,
    and then places that element as the first element in the sorted list:


    - **Step 1:** Pick the first element as the minimum and compare it with the next
    element. If the next element is less than the selected element, mark that as the
    minimum and compare it with the next element. Repeat the same process until you
    compare all the elements of the unsorted list.

    - **Step 2:** Locate the minimum in the sorted array.

    - **Step 3:** Increment the position of the counter to point at the first element
    of the unsorted array and repeat Steps 1 and 2 for all the elements of the unsorted
    array.


    ## Searching Algorithms


    Searching algorithms are used to search for or seek particular elements that are
    stored in some given dataset. There are many types of search algorithms such as
    Linear Search, Binary Search, Exponential Search, Interpolation search, etc. In
    this chapter, we shall cover Linear and Binary Search algorithms.


    Linear Search: The linear search algorithm is applied to search for a given element
    successively by comparing it with other items of the given array. It is one of
    the simplest, most basic searching algorithms but very important so as to understand
    other sorting algorithms. Linear search algorithm functions in the following way:


    - Step 1: Create a function that accepts the data list, the length of the list
    and its key elements

    - Step 2: If an element present in the given list matches the key element, return
    the corresponding index number

    - Step 3: If the element is not found, return -1.


    Binary Search: Binary search is used to search for a specific element in a sorted
    array by applying the Divide and Conquer Algorithm. Here, the algorithm starts
    with comparing the first element with the middle item and then dividing the array
    in half. The left half is searched if the element to be searched for is smaller
    than the middle element and vice versa. Then appropriate sub-arrays are again
    divided into half and the process is repeated again:


    - Step 1: Compare the key with the middle element

    - Step 2: If matched, return the middle index value

    - **Step 3:** If the key element is greater than the middle element, search for
    the key element towards the right of the middle element, else search to the left
    of it.


    ## Algorithm Analysis


    Algorithms can be observed and analyzed both before and after their implementation.
    These analyses are referred to as A Priori Analysis and A Posterior Analysis.


    A Priori Analysis (also known as Theoretical Analysis): tracks the efficiency
    of algorithms by presuming that all the other factors are constant and do not
    affect the implementation of the algorithm.


    A Posterior Analysis (also known as Empirical Analysis): analyze the algorithms
    after it was implemented using some programming language. So in this analysis,
    the actual values like time complexity or execution time of an algorithm, space
    complexity, or the space required by the algorithm for its full life cycle are
    gathered.


    ## BASIC FUNCTIONS


    A function is a set of organized, reusable code that is applied to perform a single
    action. As you already know, Python has many built-in functions like print(),
    but also lets you create your own functions or so-called user-defined functions.
    In general, functions not only provide better modularity for your application
    but also ensure a high degree of code reusing. There are simple rules on how to
    define a function in Python – function blocks begin with the keyword def followed
    by the function name and parentheses ( () ) and any input parameters or arguments
    you have, must be placed within these parentheses. You can also define parameters
    inside these parentheses.


    The first statement of a function could be an optional statement – the documentation
    string of the function or docstring. The code block within every function starts
    with a colon (:) and is indented. The statement return [expression] exits a function,
    optionally passing back an expression to the caller. A return statement with no
    arguments is the same as a return None. The following is Python set of built-in
    functions:⁵


    | Function | Description |

    | :--- | :--- |

    | abs() | Returns the absolute value of a number |

    | all() | Returns True if all items in an iterable object are true |

    | any() | Returns True if any item in an iterable object is true |

    | ascii() | Returns a readable version of an object. Replaces none-ascii characters
    with escape character |

    | bin() | Returns the binary version of a number |

    | bool() | Returns the boolean value of the specified object |

    | bytearray() | Returns an array of bytes |

    | bytes() | Returns a bytes object |

    | callable() | Returns True if the specified object is callable, otherwise False
    |

    | chr() | Returns a character from the specified Unicode code. |

    | classmethod() | Converts a method into a class method |

    | compile() | Returns the specified source as an object, ready to be executed
    |

    | complex() | Returns a complex number |

    | delattr() | Deletes the specified attribute (property or method) from the specified
    object |


