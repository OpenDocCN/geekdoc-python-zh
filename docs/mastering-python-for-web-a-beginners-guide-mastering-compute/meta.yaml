  mdcn: "类定义，就像函数定义（`def`语句）一样，必须在执行后才能生效。因此，你可以将类定义放在`if`语句的分支中，或放在函数内部。实际上，类定义内部的语句通常被编写为函数定义，但其他语句也是允许的。一旦进入类定义，就会创建一个新的命名空间，并作为局部作用域执行——因此，所有对局部变量的赋值都会进入这个新的命名空间。但如果类定义正常结束（通过末尾），则会创建一个类对象。这基本上是对类定义所创建的命名空间内容的封装。原始的局部作用域被恢复，类对象在此处绑定到类定义头部给出的类名。\n\
    \n## 类对象\n\n默认情况下，类对象支持两种操作：属性引用和实例化。\n\n属性引用使用Python中所有属性引用的标准语法：`obj.name`。确定的属性名是类对象创建时类命名空间中存在的所有名称。因此，如果类定义如下所示：\n\
    \n```\nclass MyClass:\n    \"\"\"A simple example class\"\"\"\n    i = 12345\n\
    \n    def f(self):\n        return 'hello world'\n```\n\n那么`MyClass.i`和`MyClass.f`是有效的属性引用，可以返回一个整数和一个函数对象。类属性也可以被赋值，因此你可以通过赋值来改变`MyClass.i`的值。`__doc__`也是一个有效的属性，返回属于该类的文档字符串：“A\
    \ simple example class.”\n\n类实例化使用函数表示法。只需将类对象视为一个无参数函数，该函数返回类的一个新实例。例如：\n\n```\n\
    x = MyClass()\ncreates a new instance of the class and\nassigns this object to\
    \ the local variable x.\n```\n\n实例化操作创建一个空对象。大多数类喜欢创建具有针对特定初始状态定制的实例的对象。因此，一个类可以描述一个名为`__init__()`的特殊方法，如下所示：\n\
    \n```\ndef __init__(self):\n    self.data = []\n```\n\n如果一个类定义了`__init__()`方法，类实例化会自动为新创建的类实例调用`__init__()`。因此，在这个例子中，可以通过以下方式获得一个新的、已初始化的实例：\n\
    \n```\nx = MyClass()\n```\n\n同时，`__init__()`方法可以有参数以提供更大的灵活性。在这种情况下，传递给类实例化运算符的参数会传递给`__init__()`。\n\
    \n对象是独立的，但与此同时，多个名称（在多个作用域中）可以绑定到同一个对象。这在其他语言中被称为别名。这在初次接触Python时通常不被积极看待，并且在处理不可变基本类型（数字、字符串、元组）时可能会被忽略。然而，别名对涉及可变对象（如列表、字典和许多其他类型）的Python代码语义具有潜在的惊人影响。这通常被应用于程序的优势，因为别名在某种程度上被视为指针。例如，传递对象是廉价的，因为实现只传递一个指针，并且如果函数修改了作为参数传递的对象，调用者将看到更改——这消除了对两种不同参数传递机制的需求。\n\
    \n除此之外，还有实例对象。而且，实例对象唯一能管理的操作是属性引用。有效的属性名称有两种类型：数据属性和方法。\n\n数据属性具有与Smalltalk中的“实例变量”和C++中的“数据成员”相同的特征。与局部变量类似，数据属性不需要声明，因为它们在第一次赋值时被激活。另一种类型的实例属性引用是方法。方法是对象的一部分的函数。此外，在Python中，术语“方法”并不局限于类实例：其他对象类型也可以有方法。例如，列表对象有名为`append`、`insert`、`remove`、`sort`等的方法。实例对象的有效方法名称基于其类。默认情况下，类的所有函数对象属性都定义了其实例的相应方法。\n\
    \n## 方法对象\n\n通常，方法在绑定后立即被调用：\n\n```\nx.f()\n```\n\n在`MyClass`的标准情况下，这将返回字符串“hello\
    \ world”。然而，没有必要立即调用方法：`x.f`是一个方法对象，可以存储起来并在以后调用。例如：\n\n```\nxf = x.f\nwhile True:\n\
    \    print(xf())\nwill keep printing hello world until the\nend of time.\n```\n\
    \n同时，你可能已经注意到`x.f()`在上面被调用时没有参数，即使`f()`的函数定义指定了一个参数。方法的特殊之处在于实例对象可以作为函数的第一个参数传递。在我们的例子中，调用`x.f()`完全等同于`MyClass.f(x)`。通常，用n个参数列表调用一个方法等同于用一个参数列表调用相应的函数，该参数列表是通过在第一个参数之前插入方法的实例对象创建的。理解方法的工作原理可能需要实际实现它们。实践将有助于澄清你可能仍然存在的任何问题。\n\
    \n## 继承\n\n当然，一个语言特性如果没有支持继承，就不会被赋予“类”这个名称。派生类定义的语法应该如下所示：\n\n```\nclass DerivedClassName(BaseClassName):\n\
    \    <statement-1>\n    .\n    .\n    .\n    <statement-N>\n```\n\n名称`BaseClassName`必须在包含派生类定义的作用域中定义。除了基类名称，你也可以放置其他任意表达式。这可能很有用，例如，当基类在另一个模块中定义时：\n\
    \n```\nclass DerivedClassName(modname.BaseClassName):\n```\n\n派生类定义的执行与基类相同。当类对象被构造时，基类被记住。这用于解析属性引用：如果请求的属性在类中未找到，则搜索会继续在基类中查找。如果基类本身是从某个其他类派生的，则此规则递归应用。\n\
    \n派生类没有什么特别困难的：`DerivedClassName()`创建类的一个新实例。方法引用按以下方式解析：搜索相应的类属性，如果需要，则沿着基类链向下搜索，如果这产生一个函数对象，则方法引用是有效的。\n\
    \n派生类可以覆盖其基类的方法。因为方法在调用同一对象的其他方法时没有特殊处理，所以基类中调用同一基类中定义的另一个方法的方法最终可能调用派生类中覆盖它的方法。派生类中的覆盖方法实际上可能想要扩展而不是简单地替换同名的基类方法。有一个简单的方法可以直接调用基类方法：只需调用`BaseClassName.methodname`。\n\
    \nPython还有两个内置函数与继承一起工作：\n\n- 1. 你可以应用`isinstance()`来检查实例的类型：`isinstance(obj,\
    \ int)`只有在`obj.__class__`是`int`或从`int`派生的某个类时才为`True`。\n- 2. 你可以使用`issubclass()`来检查类继承：`issubclass(bool,\
    \ int)`为`True`，因为`bool`是`int`的子类。然而，`issubclass(float, int)`为`False`，因为`float`不是`int`的子类。\n\
    \nPython也支持一种形式的多重继承。具有多个基类的类定义通常如下所示：\n\n```\nclass DerivedClassName(Base1, Base2,\
    \ Base3):\n    <statement-1>\n    .\n    .\n    .\n    <statement-N>\n```\n\n\
    对于大多数目的，你需要记住，从父类继承的属性的搜索是深度优先、从左到右的，并且在层次结构中存在重叠时不会在同一个类中搜索两次。因此，如果一个属性"
