    250 ■ Mastering Python for Web


    # \B


    Matches the empty string, but only when it is not at the beginning or end of a
    word. This means that r''py\B'' matches ''python'', ''py3'', ''py2'', but not
    ''py'', ''py.'', or ''py!''. \B is just the opposite of \b, so word characters
    in Unicode patterns are Unicode alphanumerics or the underscore, although this
    can be changed by using the ASCII flag. Word boundaries are determined by the
    current locale if the LOCALE flag is used.


    # \d


    Matches any Unicode decimal digit (any character in Unicode character category
    [Nd]). This includes [0-9], and also many other digit characters. If the ASCII
    flag is used only [0-9] is matched.


    # \D


    Matches any character which is not a decimal digit. This is the opposite of \d.
    If the ASCII flag is used, this becomes the equivalent of [^0-9].


    # \s


    Matches Unicode whitespace characters (which includes [\t\n\r\f\v], and also many
    other characters, for example, the non-breaking spaces mandated by typography
    rules in many languages). If the ASCII flag is used, only [\t\n\r\f\v] is matched.
    In case of 8-bit (bytes) patterns it matches characters considered whitespace
    in the ASCII character set; this is equivalent to [\t\n\r\f\v].'
