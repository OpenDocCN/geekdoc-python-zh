- md: "## Taylor & Francis\n\nTaylor & Francis Group\n\nhttp://taylorandfrancis.com\n\
    \n## About the Editor\n\n**Sufyan bin Uzayr** is a writer, coder, and entrepreneur\
    \ with more than a decade of experience in the industry. He has authored several\
    \ books in the past, pertaining to a diverse range of topics, ranging from History\
    \ to Computers/IT.\n\nSufyan is the Director of Parakozm, a multinational IT company\
    \ specializing in EdTech solutions. He also runs Zeba Academy, an online learning\
    \ and teaching vertical with a focus on STEM fields.\n\nSufyan specializes in\
    \ a wide variety of technologies, such as JavaScript, Dart, WordPress, Drupal,\
    \ Linux, and Python. He holds multiple degrees, including ones in management,\
    \ IT, literature, and political science.\n\nSufyan is a digital nomad, dividing\
    \ his time between four countries. He has lived and taught in universities and\
    \ educational institutions around the globe. Sufyan takes a keen interest in technology,\
    \ politics, literature, history, and sports, and in his spare time, he enjoys\
    \ teaching coding and English to young students.\n\nLearn more at sufyanism.com.\n\
    \n## Taylor & Francis\n\nTaylor & Francis Group\n\nhttp://taylorandfrancis.com\n\
    \n## CHAPTER 1\n\n## Introduction to Python\n\n### IN THIS CHAPTER\n\n- Introducing\
    \ Python coding language\n- Diving into the story of Python creation\n- Explaining\
    \ how to install and configure Python\n\nPython is a general-purpose coding language\
    \ that is used for other types of programming and software development. It is\
    \ considered a great force in web application creation and systems management\
    \ and a key driver of the explosion in big data analytics and machine intelligence.\n\
    \nTo put simply, Python is generally utilized for things like:\n\n- Writing system\
    \ scripts\n- Processing big data\n- Performing mathematical computations\n- Connecting\
    \ to database systems\n- Reading and modifying files\n- Creating web applications\
    \ on a server\n- Creating workflows\n- Rapid prototyping\n- Production-ready software\
    \ development\n- Back-end web and mobile app development\n\nHowever, the most\
    \ typical use case for Python is as a scripting and automation language. When\
    \ creating scripts, Python is not considered a replacement for shell scripts or\
    \ batch files but is used to automate interactions with web browsers or application\
    \ graphical user interfaces (GUI). Thus, with Python, you can create both command-line\
    \ and cross-platform GUI applications and deploy them as self-contained executables.\n\
    \nSophisticated data analysis has become one of the most flourishing areas of\
    \ IT, and the majority of popular software and data science libraries used for\
    \ machine learning have Python interfaces, making it the most popular high-level\
    \ command interface and numerical algorithms. Python’s third-party web frameworks\
    \ provide fast and convenient ways to create everything from simple lines of code\
    \ to full-functioning, data-driven sites. Python’s latest versions have strong\
    \ support for operations, enabling sites to handle tens of thousands of requests\
    \ per second. Python also works as a highly efficient code generator, making it\
    \ possible to write applications that manipulate their own functions that would\
    \ be difficult to implement in other languages. This coding is often described\
    \ as a “glue language,” meaning it can make disparate code interoperable again.\
    \ Thus, if you have applications or program domains that you would like to link\
    \ with each other, you can use Python for this task.\n\n### PYTHON 2 VS. PYTHON\
    \ 3\n\nPython is available in two different versions: Python 2 and Python 3. Python\
    \ 2, the older branch, as of January 1, 2020, is no longer supported by its creators,\
    \ the Python Software Foundation. Python 3, the current and future version of\
    \ the language, has many updated features that were not included in Python 2,\
    \ such as new concurrency controls, and a better interpreter. There used to be\
    \ a lot of competition between the two, but since version 3 incorporated few important\
    \ functions, it has won over all the Python fan base. Few of those changes in\
    \ Python 3 included:¹\n\n- Text vs. Data instead of Unicode vs. 8-bit.\n- Print\
    \ is now a function.\n- Views and iterators instead of lists.\n- The rules for\
    \ ordering comparisons have been simplified. So, a heterogeneous list cannot be\
    \ sorted, because all the elements of a list must be comparable to each other.\n\
    \n¹ https://learntowish.com/history-python-comedy-snake-programming-language/,\
    \ Learntowish blog\n\nAt first, Python 3 approval was slowed for some time due\
    \ to a lack of third-party library support. Because most Python libraries supported\
    \ only Python 2, it made the transaction to version 3 time consuming. But over\
    \ the last couple of years, the number of libraries compatible with both Python\
    \ 2 and Python 3 has increased. Today, Python 3 is the best, up-to-date choice\
    \ for new projects.\n\nDue to its simplicity, top technology organizations like\
    \ Dropbox, Google, Mozilla, Hewlett-Packard, IBM, and Cisco have implemented Python\
    \ for various purposes such as developing, scripting, generation, and software\
    \ testing. It has also been an inspiration for many other coding languages such\
    \ as Ruby, Cobra, Boo, CoffeeScript ECMAScript, Groovy, Swift Go, OCaml, and Julia.\n\
    \nThe success of Python rests on a strong standard library and a generous assortment\
    \ of easily obtained and readily used libraries from third-party developers. Python's\
    \ standard library provides modules for common programming tasks like math, string\
    \ handling, file and directory access, networking, asynchronous operations, threading,\
    \ and multi-process management. Additionally, it also includes modules that manage\
    \ common programming tasks such as reading and writing structured file formats,\
    \ manipulating compressed files, and working with internet protocols. The default\
    \ Python distribution also provides a cross-platform GUI library via Tkinter and\
    \ an embedded access to the SQLite 3 database.\n\nThere are thousands of third-party\
    \ libraries available through the Python Package Index. For example:\n\n- The\
    \ BeautifulSoup library provides an all-in-one toolbox for extracting HTML.\n\
    - Frameworks like Flask and Django allow rapid development of web services.\n\
    - Multiple cloud services can be managed through Python's model using Apache Libcloud.\n\
    - Pandas, NumPy and Matplotlib accelerate math and statistical operations, as\
    \ well as create visualizations of data.\n\nWith that said, it is also worth noting\
    \ the tasks Python is not well suited for. To start with, Python is a high-level\
    \ language, so it is not the best option for system-level programming—device drivers\
    \ or OS kernels are inadmissible. It's also not ideal for situations that call\
    \ for cross-platform standalone binaries. And since everything in the language,\
    \ including functions and modules themselves, are handled as objects coding comes\
    \ at the expense of speed. Therefore, it is not the best choice when speed is\
    \ an absolute priority in every aspect of the application. For that, it is recommended\
    \ to opt for C/C++ or another language.\n\nLike C#, Java, and Go, Python has garbage-collected\
    \ memory management, meaning there is no need to implement code to track objects.\
    \ Garbage collection happens automatically in the background and can pose a performance\
    \ problem, which is why it is advised to administer it manually or disable it\
    \ entirely to enhance the performance.\n\nAnother compromise comes with Python's\
    \ use of significant whitespace. As syntactical white space might cause noses\
    \ to wrinkle, some developers choose not to deal with Python. Another potential\
    \ turnoff might be the way Python handles variable typing. By default, Python\
    \ uses dynamic or “duck” typing that can be potentially problematic in large codebases.\n\
    \nWith that said, people still appreciate, accept, and simply love using Python.\
    \ And, there are number of reasons for that:\n\n- **Startups love python:** Startup\
    \ companies need flexible yet trustworthy programming tool when building their\
    \ websites, mobile apps, or software programs. The main two priorities then include\
    \ financial efficiency and capability to stay ahead of schedule. And, because\
    \ of its ability to be able to deliver on both these objectives, Python is a favored\
    \ programming language in the startup world.\n\n  Python's efficiency and ease\
    \ of use result in short development time; and a streamlined QA and debugging\
    \ process, promise greater return on investment. For someone who wants to become\
    \ part of the startup community and land a first job and start gaining industry\
    \ experience, knowing the basics of Python management will make you more attractive\
    \ as a potential candidate."
  mdcn: "## 泰勒与弗朗西斯出版社\n\n泰勒与弗朗西斯集团\n\nhttp://taylorandfrancis.com\n\n## 关于编辑\n\n\
    **苏夫扬·本·乌泽尔**是一位作家、程序员和企业家，在该行业拥有超过十年的经验。他过去曾撰写过多本书籍，涉及从历史到计算机/信息技术等广泛的主题。\n\n\
    苏夫扬是跨国信息技术公司Parakozm的董事，该公司专注于教育科技解决方案。他还运营着Zeba Academy，这是一个在线学习和教学平台，专注于STEM领域。\n\
    \n苏夫扬精通多种技术，例如JavaScript、Dart、WordPress、Drupal、Linux和Python。他拥有多个学位，包括管理学、信息技术、文学和政治学学位。\n\
    \n苏夫扬是一位数字游民，他的时间分布在四个国家。他曾在全球各地的大学和教育机构生活和教学。苏夫扬对技术、政治、文学、历史和体育有着浓厚的兴趣，在业余时间，他喜欢教年轻学生编程和英语。\n\
    \n更多信息请访问sufyanism.com。\n\n## 泰勒与弗朗西斯出版社\n\n泰勒与弗朗西斯集团\n\nhttp://taylorandfrancis.com\n\
    \n## 第一章\n\n## Python简介\n\n### 本章内容\n\n- 介绍Python编程语言\n- 深入了解Python的创建故事\n- 解释如何安装和配置Python\n\
    \nPython是一种通用编程语言，用于其他类型的编程和软件开发。它被认为是网络应用创建和系统管理的重要力量，也是大数据分析和机器智能爆发的关键驱动力。\n\
    \n简单来说，Python通常用于以下方面：\n\n- 编写系统脚本\n- 处理大数据\n- 执行数学计算\n- 连接数据库系统\n- 读取和修改文件\n\
    - 在服务器上创建网络应用\n- 创建工作流程\n- 快速原型设计\n- 生产就绪的软件开发\n- 后端网络和移动应用开发\n\n然而，Python最典型的用例是作为脚本和自动化语言。在创建脚本时，Python不被视为shell脚本或批处理文件的替代品，而是用于自动化与网络浏览器或应用程序图形用户界面（GUI）的交互。因此，使用Python，你可以创建命令行和跨平台GUI应用程序，并将它们部署为独立的可执行文件。\n\
    \n复杂的数据分析已成为信息技术领域最蓬勃发展的领域之一，大多数用于机器学习的流行软件和数据科学库都具有Python接口，使其成为最受欢迎的高级命令接口和数值算法。Python的第三方网络框架提供了快速便捷的方式来创建从简单的代码行到功能齐全、数据驱动的网站。Python的最新版本对操作有强大的支持，使网站能够处理每秒数万个请求。Python还充当高效的代码生成器，使得编写能够操作自身功能的应用程序成为可能，而这些功能在其他语言中很难实现。这种编码通常被描述为“胶水语言”，意味着它可以使不同的代码再次互操作。因此，如果你有希望相互链接的应用程序或程序领域，你可以使用Python来完成这项任务。\n\
    \n### PYTHON 2 与 PYTHON 3\n\nPython有两个不同的版本：Python 2和Python 3。Python 2是较旧的分支，自2020年1月1日起，其创建者Python软件基金会已不再提供支持。Python\
    \ 3是该语言的当前和未来版本，具有许多Python 2中未包含的更新功能，例如新的并发控制和更好的解释器。过去两者之间存在很多竞争，但由于版本3整合了一些重要功能，它已经赢得了所有Python粉丝的支持。Python\
    \ 3中的一些变化包括：¹\n\n- 文本与数据，而不是Unicode与8位。\n- Print现在是一个函数。\n- 视图和迭代器，而不是列表。\n- 排序比较的规则被简化了。因此，异构列表无法排序，因为列表中的所有元素必须彼此可比较。\n\
    \n¹ https://learntowish.com/history-python-comedy-snake-programming-language/,\
    \ Learntowish博客\n\n起初，由于缺乏第三方库的支持，Python 3的采用速度一度放缓。因为大多数Python库只支持Python 2，这使得向版本3的迁移耗时。但在过去几年中，同时兼容Python\
    \ 2和Python 3的库数量有所增加。如今，Python 3是新项目的最佳、最新选择。\n\n由于其简单性，像Dropbox、Google、Mozilla、Hewlett-Packard、IBM和Cisco这样的顶级技术组织已经将Python用于各种目的，例如开发、脚本编写、生成和软件测试。它也启发了许多其他编程语言，如Ruby、Cobra、Boo、CoffeeScript、ECMAScript、Groovy、Swift、Go、OCaml和Julia。\n\
    \nPython的成功建立在强大的标准库和来自第三方开发者的丰富、易于获取和使用的库之上。Python的标准库提供了用于常见编程任务的模块，如数学、字符串处理、文件和目录访问、网络、异步操作、线程和多进程管理。此外，它还包括管理常见编程任务的模块，如读写结构化文件格式、操作压缩文件以及处理互联网协议。默认的Python发行版还通过Tkinter提供了一个跨平台GUI库，并内置了对SQLite\
    \ 3数据库的访问。\n\n通过Python包索引可以获取数千个第三方库。例如：\n\n- BeautifulSoup库提供了一个用于提取HTML的一体化工具箱。\n\
    - Flask和Django等框架允许快速开发网络服务。\n- 可以通过Python的模型使用Apache Libcloud管理多个云服务。\n- Pandas、NumPy和Matplotlib加速了数学和统计操作，并创建了数据可视化。\n\
    \n话虽如此，也值得注意Python不太适合的任务。首先，Python是一种高级语言，因此它不是系统级编程的最佳选择——设备驱动程序或操作系统内核是不可接受的。它也不适合需要跨平台独立二进制文件的情况。而且，由于语言中的一切，包括函数和模块本身，都是作为对象处理的，编码是以速度为代价的。因此，当速度是应用程序每个方面的绝对优先事项时，它并不是最佳选择。为此，建议选择C/C++或另一种语言。\n\
    \n与C#、Java和Go一样，Python具有垃圾回收的内存管理，这意味着不需要实现代码来跟踪对象。垃圾回收在后台自动进行，可能会带来性能问题，这就是为什么建议手动管理或完全禁用它以提高性能。\n\
    \n另一个妥协在于Python对显著空白的使用。由于语法空白可能会让一些人皱眉，一些开发者选择不使用Python。另一个潜在的缺点可能是Python处理变量类型的方式。默认情况下，Python使用动态或“鸭子”类型，这在大型代码库中可能会带来问题。\n\
    \n话虽如此，人们仍然欣赏、接受并简单地热爱使用Python。而且，这有很多原因：\n\n- **初创公司热爱Python：**初创公司在构建网站、移动应用程序或软件程序时需要灵活且可靠的编程工具。主要的两个优先事项包括财务效率和按时完成的能力。而且，由于Python能够实现这两个目标，它在初创公司世界中成为一种受欢迎的编程语言。\n\
    \n  Python的效率和易用性导致了较短的开发时间；以及简化的质量保证和调试过程，承诺更高的投资回报率。对于那些希望加入初创公司社区、获得第一份工作并开始积累行业经验的人来说，掌握Python管理的基础知识将使你作为潜在候选人更具吸引力。"
