    \n- **`vars()`:** `vars()`是另一个内置函数，返回模块、类、实例或任何其他具有字典属性的对象的`.__dict__`属性。值得注意的是，`.__dict__`是Python用于实现命名空间的特殊字典。\n\
    \n- **`dir()`:** 你可以不带参数地应用`dir()`来获取当前Python作用域中的名称列表。如果你带参数调用`dir()`，那么该函数将尝试返回该对象的有效属性列表。你还可以使用`dir()`来检查不同对象的名称或属性列表，包括函数、模块、变量等。\n\
    \n尽管官方文档说`dir()`是为交互式使用而设计的，但你可以使用该函数来设置任何给定对象的全面属性列表。你甚至可以从函数内部调用`dir()`，并返回函数作用域中定义的名称列表。\n\
    \n总之，变量或名称的作用域决定了它在整个代码中的可见性。在Python中，作用域执行为局部、封闭、全局或内置作用域。当你应用一个变量或名称时，Python会按顺序查找这些作用域来解析它。在实例中，如果找不到该名称，你将得到一个错误。这是Python用于名称解析的基本机制，被称为LEGB规则。\n\
    \n为了充分利用Python的作用域来防止或最小化与名称冲突相关的问题，请确保在程序中使用全局和局部名称，以提高代码可维护性，并制定一个一致的策略来访问、优化或更新所有Python代码中的名称。此外，我们尝试提供Python提供的一些与作用域相关的工具和技术，并介绍如何使用它们来收集有关位于给定作用域中的名称的数据，或编辑Python作用域的标准行为。\n\
    \n## 对象和类\n\n![](img/25ba12f902f652c144ff96c17c35a084_222_0.png)\n\nPython是一种面向对象的编程语言，这意味着它提供了允许面向对象编程的功能。自20世纪80年代以来，面向对象编程已成为创建新软件时使用的主要编程范式。它被提出作为维护软件操作系统快速增长的规模和复杂性的解决方案，并使这些大型复杂系统更容易随时间变化。\n\
    \nPython中的类用于提供一个将数据和功能收集在一起的系统。定义一个新类会创建一种新的对象类型，允许添加该类型的新实例。每个类实例都可以添加属性以承载其状态。类实例还可以定义其类的方法来改变其状态。\n\
    \n如果你将Python与其他编程语言进行比较，Python的类机制以最少的新语法和语义添加了类。它是C++和Modula-3中发现的类机制的绝佳组合。Python类支持面向对象编程的所有标准功能：类继承机制提供多个基类，派生类可以覆盖其基类的任何方法，方法可以调用具有相同名称的基类方法。对象可以具有任意数量和种类的信息格式。与模块一样，类参与Python的动态特性：它们在运行时设计，并且可以在创建后进一步编辑。\n\
    \n根据C++术语，通常类成员连同数据成员都是公共的，所有成员函数都是虚拟的。类似于Modula-3，从其方法引用对象成员时没有简写：方法函数被调用时带有一个显式的第一参数表示该对象，该参数由调用隐式组成。就像在Smalltalk中一样，类被视为对象。这为导入和重命名提供了语义。然而，与C++和Modula-3不同，内置类型可以作为基类实现，供用户扩展。此外，就像在C++中一样，大多数具有特殊语法的内置运算符可以为类实例重新定义。\n\
    \n通常，最简单的类定义形式如下所示：\n\n```python\nclass ClassName:\n    <statement-1>\n    .\n\
    \    .\n    .\n    <statement-N>\n```"
