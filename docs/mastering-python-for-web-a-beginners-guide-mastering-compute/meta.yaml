    In this section, you are going to learn about Python installation methods on Linux
    and as a result, will hopefully be able to complete it yourself. Usually, many
    Linux distributions already come packaged with Python, but it probably will not
    be the latest version or could even be Python 2 instead of Python 3. You will
    need to check the version yourself just to make sure. In order to find out which
    version of Python you have, proceed to open a terminal window and try the following
    commands:


    ```

    # Check the system Python version

    $ python -version


    # Check the Python 2 version

    $ python2 -version


    # Check the Python 3 version

    $ python3 -version

    ```


    If you already have Python on your computer, then one or more of these commands
    should come up with a version number. Typically, there are two convenient and
    comparatively fast ways to install the official Python distribution on Linux:


    +   1. **Install from a package manager:** This is the most popular installation
    method on most Linux distributions. It requires running a command from the command
    line.'
  - '[PAGE 46]


    2. **Build from source code:** This method is more complex than using a package
    manager. It involves running a series of commands from the command line and at
    the same time making sure you have the correct dependencies installed to complete
    the Python source code.


    Unfortunately, not every Linux distribution has a package manager, and not every
    package manager has Python in its set. Judging by your operating system, building
    Python from source code could be your only option. Which installation method you
    are going to use mainly depends on whether your Linux OS has a package manager
    and whether you want to control the details of the installation.


    The most popular to this day way to install Python on Linux is with your operating
    system''s package manager. It is considered to be a default choice by many expert
    developers. However, depending on your Linux distribution, Python may not be available
    through a package manager. In this case, you will have to build up Python from
    source code.


    There are three main reasons that could limit you into choosing to build Python
    from source code:


    +   1. You will not be able to download Python from your operating system''s package
    manager.

    2. If you might need to lower the memory footprint on embedded systems, you will
    want to control how Python gets compiled.

    3. You want to be able to test beta versions and release candidates of the latest
    and most advanced version before it becomes available.'
- md: "In order to complete the installation on your Linux machine, find your Linux\
    \ distribution below and follow the steps provided.\n\n## How to Install on Ubuntu\
    \ and Linux Mint\n\nDepending on which version of the Ubuntu distribution you\
    \ have, the process for setting up Python on your system will vary accordingly.\
    \ You can determine your local Ubuntu version by typing the following command:\n\
    \n```\n$ lsb_release -a\nNo LSB modules are available.\nDistributor ID: Ubuntu\n\
    Description: Ubuntu 16.04.4 LTS\nRelease: 16.04\nCodename: xenial\n```\n\nFollow\
    \ the guideline below that match the version number you get under Release heading\
    \ in the console output:\n\n- **Ubuntu 18.04, Ubuntu 20.04 and above:** Python\
    \ 3.9 does not come by default on Ubuntu 18.04 and above, but it is available\
    \ in the Universe repository. To install version 3.9, you will need to open a\
    \ terminal application and type the following commands:\n  - $ sudo apt-get update\n\
    \  - $ sudo apt-get install python3.9 python3-pip\n\nAnd when the installation\
    \ is complete, you can now run Python 3.9 with the python3.9 command and pip with\
    \ the pip3 command.\n\n- **Linux Mint and Ubuntu 17 and below:** Python 3.9 is\
    \ not in the Universe repository, so you would have to get it from a Personal\
    \ Package Archive (PPA). For instance, to install from the \"deadsnakes\" PPA,\
    \ use the following commands:\n  - $ sudo add-apt-repository PPA:deadsnakes/ppa\n\
    \  - $ sudo apt-get update\n  - $ sudo apt-get install python3.9 python3-pip\n\
    \n## How to Install on Debian Linux\n\nBefore you can install Python 3.9 on Debian,\
    \ you will have to install the sudo command. In order to do that, you should execute\
    \ the following commands in a terminal:\n\n```\n$ su\n$ apt-get install sudo\n\
    $ sudo vim /etc/sudoers\n```\n\nRight after that, try opening the /etc/sudoers\
    \ file using the sudo vim command or your favorite text editor. Add the following\
    \ line of text to the end of the file, replacing your_username with your actual\
    \ username: your_username ALL=(ALL) ALL\n\nCompleting that, you can go ahead and\
    \ skip until you reach How to Build Python From Source Code section to finish\
    \ installing Python.\n\n## How to Install on openSUSE\n\nBuilding from the source\
    \ is the most reliable way to set up Python on openSUSE. To do that, you will\
    \ need to install the development tools, which can be done in YaST operating system\
    \ setup via the menus or by using Zipper, the command line package manager:\n\n\
    ```\n$ sudo zypper install -t pattern devel_C_C\n```\n\nAs it will have to install\
    \ more than 150 packages, it is considered a normal practice that might take a\
    \ while to complete. But once it is done, feel free to skip ahead to the How to\
    \ Build Python From Source Code section.\n\n## How to Install on CentOS and Fedora\n\
    \nUnfortunately, Python 3.9 is not available in the CentOS and Fedora repositories,\
    \ so you are expected to build Python from source code. Before you install Python,\
    \ though, you need to make sure your system is prepared beforehand. At first,\
    \ update the yum package manager through the following code: $ sudo yum -y update\n\
    \nAnd once yum finishes updating, you can freely install the necessary build dependencies\
    \ with the following line of commands:\n\n```\n$ sudo yum -y groupinstall \"Development\
    \ Tools\"\n$ sudo yum -y install gcc openssl-devel bzip2-devel libffi-devel\n\
    ```\n\nAnd when you see that everything is finished installing, you can skip ahead\
    \ to the How to Build Python From Source Code section.\n\n## How to Install on\
    \ Arch Linux\n\nArch Linux is popular for adhering to the KISS principle (\"Keep\
    \ It Simple, Stupid\") and mostly focused on modernity and pragmatism. That said,\
    \ Arch Linux is fairly diligent about keeping up with Python releases. It is very\
    \ much likely you already have the latest version installed by default. If not,\
    \ you can use the following command to update Python: $ pacman -S python. And\
    \ once it is finished updating, you are all set to start scripting.\n\n## How\
    \ to Build Python From Source Code\n\nIn cases when your Linux distribution does\
    \ not have the latest version of Python, or when you just want to be able to build\
    \ the latest, fastest version yourself, you can take the following steps to be\
    \ able to build Python from source:\n\n**Step 1: Download the source code**\n\
    To start, you need to get the Python source code through the Python.org. All you\
    \ have to do is go to the Downloads page and look for the latest source for Python\
    \ 3 at the top. Make sure you are searching for Python 3 and not Python 2.\nWhen\
    \ you select the Python 3 version, you can see a \"Files\" section at the bottom\
    \ of the page. Select *Gzipped source tarball* and download it to your machine.\
    \ If you prefer a command-line method, you can use Wget program that retrieves\
    \ content from web servers to download the file to your current directory:\n\n\
    ```\n$ wget https://www.python.org/ftp/python/3.8.4/Python-3.8.4.tgz\n```\n\n\
    When the tarball completes downloading, you will then need to take care of other\
    \ things to prepare your system for building Python.\n\n**Step 2: Prepare your\
    \ system**\n\nThere are a few fixed steps involved in building Python from scratch.\
    \ The aim of each one of those steps is the same on all distros, but you might\
    \ need to translate it to your distribution if it does not use apt-get:\n\n1.\
    \ First, make sure you have updated your package manager and upgraded your packages:\n\
    \n```\n$ sudo apt-get update\n$ sudo apt-get upgrade\n```\n\n2. Next, you need\
    \ to have all of the build requirements installed:\n\n```\n# For apt-based systems\
    \ (like Debian, Ubuntu, and Mint)\n$ sudo apt-get install -y make build-essential\
    \ libssl-dev zlib1g-dev libbz2-dev libreadline-dev libsqlite3-dev wget curl llvm\
    \ libncurses5-dev libncursesw5-dev xz-utils tk-dev\n# For yum-based systems (like\
    \ CentOS)\n$ sudo yum -y groupinstall \"Development Tools\"\n$ sudo yum -y install\
    \ gcc openssl-devel bzip2-devel libffi-devel\n```\n\nAnd if you already have some\
    \ of the requirements installed on your system, it is not going to create any\
    \ problem because you can execute the above commands and any existing packages\
    \ will not be overwritten.\n\n**Step 3: Build Python**\n\n1. Once you have all\
    \ the prerequisites and the Tape Archive (TAR) files, you can start unpacking\
    \ the source into a directory. Please note that the following command will create\
    \ a new directory called Python-3.9.1 under the one you're in:\n\n```\n$ tar xvf\
    \ Python-3.9.2.tgz\n$ cd Python-3.9.2\n```\n\n2. Now, you need to run the ./configure\
    \ tool to prepare the build:\n\n```\n$ ./configure --enable-optimizations --with-ensurepip=install\n\
    ```\n\nThe enable-optimizations flag will enable some optimizations within Python\
    \ to make it run about 10 percent faster. Doing this may add twenty or thirty\
    \ minutes to the compilation time.\n\n3. Next, you build Python using the -j option\
    \ that simply tells make to split the building into parallel steps to speed up\
    \ the compilation. Even with the parallel builds, this step can take several minutes:\n\
    \n```\n$ make -j 8\n```\n\n4. Finally, you will want to install your new version\
    \ of Python. You can use the altinstall option here to avoid overwriting the system\
    \ Python. Since you are installing into /usr/bin, you will need to run as root:\n\
    \n```\n$ sudo make altinstall\n```\n\nThe overall installation might take some\
    \ time, but once it is done, you are advised to verify that Python is set up correctly.\n\
    \n**Step 4: Verify your installation**\n\nYou can test that the python3.9 --version\
    \ command returns the latest version:\n\n```\n$ python3.9 --version\nPython 3.9.2\n\
    ```\n\nAnd if you see Python 3.9.2, then your installation is fully verified.\n\
    \nIn case you want to run extra testing, you might also choose the test suite\
    \ to make sure everything is working properly and swiftly on your system. To run\
    \ the test suite, you just have to type the following command:\n\n```\n$ python3.9\
    \ -m test\n```\n\nYou do not need to rush this part because your computer will\
    \ be running tests for some time. And if all the tests pass without an error,\
    \ then you can be confident that your brand-new Python build is working as expected.\n\
    \n## How to Install Python on iOS\n\nThe Pythonista software application for iOS\
    \ is a fully developed Python creative environment that you can run on your iPhone\
    \ or iPad. It has all the features including a Python editor, technical documentation,\
    \ and an interpreter, all integrated into a single app.\n\nPythonista could be\
    \ a great tool for someone who does not like to be stuck with just the laptop\
    \ and prefers working or polishing their Python skills on the go. The application\
    \ comes with the complete Python 3 standard library and also includes full documentation\
    \ that you can browse."
  mdcn: "为了在您的 Linux 机器上完成安装，请在下方找到您的 Linux 发行版并按照提供的步骤操作。\n\n## 如何在 Ubuntu 和 Linux\
    \ Mint 上安装\n\n根据您所使用的 Ubuntu 发行版版本，设置 Python 的过程会有所不同。您可以通过输入以下命令来确定本地 Ubuntu\
    \ 版本：\n\n```\n$ lsb_release -a\nNo LSB modules are available.\nDistributor ID:\
    \ Ubuntu\nDescription: Ubuntu 16.04.4 LTS\nRelease: 16.04\nCodename: xenial\n\
    ```\n\n请遵循与您在控制台输出中 Release 标题下获得的版本号相匹配的指南：\n\n- **Ubuntu 18.04、Ubuntu 20.04\
    \ 及以上版本：** Python 3.9 在 Ubuntu 18.04 及以上版本中并非默认安装，但它在 Universe 软件仓库中可用。要安装 3.9\
    \ 版本，您需要打开终端应用程序并输入以下命令：\n  - $ sudo apt-get update\n  - $ sudo apt-get install\
    \ python3.9 python3-pip\n\n安装完成后，您现在可以使用 `python3.9` 命令运行 Python 3.9，使用 `pip3`\
    \ 命令运行 pip。\n\n- **Linux Mint 和 Ubuntu 17 及以下版本：** Python 3.9 不在 Universe 软件仓库中，因此您需要从个人软件包存档（PPA）获取。例如，要从\
    \ \"deadsnakes\" PPA 安装，请使用以下命令：\n  - $ sudo add-apt-repository PPA:deadsnakes/ppa\n\
    \  - $ sudo apt-get update\n  - $ sudo apt-get install python3.9 python3-pip\n\
    \n## 如何在 Debian Linux 上安装\n\n在 Debian 上安装 Python 3.9 之前，您必须先安装 `sudo` 命令。为此，您应该在终端中执行以下命令：\n\
    \n```\n$ su\n$ apt-get install sudo\n$ sudo vim /etc/sudoers\n```\n\n之后，请尝试使用\
    \ `sudo vim` 命令或您喜欢的文本编辑器打开 `/etc/sudoers` 文件。将以下文本行添加到文件末尾，将 `your_username`\
    \ 替换为您的实际用户名：`your_username ALL=(ALL) ALL`\n\n完成此操作后，您可以继续并跳过直到到达“如何从源代码构建 Python”部分以完成\
    \ Python 的安装。\n\n## 如何在 openSUSE 上安装\n\n从源代码构建是在 openSUSE 上设置 Python 最可靠的方法。为此，您需要安装开发工具，这可以通过\
    \ YaST 操作系统设置中的菜单或使用命令行软件包管理器 Zipper 来完成：\n\n```\n$ sudo zypper install -t pattern\
    \ devel_C_C\n```\n\n由于它将需要安装超过 150 个软件包，因此这被认为是正常的做法，可能需要一段时间才能完成。但一旦完成，请随时跳到“如何从源代码构建\
    \ Python”部分。\n\n## 如何在 CentOS 和 Fedora 上安装\n\n不幸的是，Python 3.9 在 CentOS 和 Fedora\
    \ 的软件仓库中不可用，因此您需要从源代码构建 Python。不过，在安装 Python 之前，您需要确保您的系统已预先准备好。首先，通过以下代码更新 yum\
    \ 软件包管理器：`$ sudo yum -y update`\n\n一旦 yum 完成更新，您就可以使用以下命令行自由安装必要的构建依赖项：\n\n```\n\
    $ sudo yum -y groupinstall \"Development Tools\"\n$ sudo yum -y install gcc openssl-devel\
    \ bzip2-devel libffi-devel\n```\n\n当您看到所有内容都已安装完成时，您可以跳到“如何从源代码构建 Python”部分。\n\
    \n## 如何在 Arch Linux 上安装\n\nArch Linux 以遵循 KISS 原则（“保持简单，愚蠢”）而闻名，并且主要关注现代性和实用性。也就是说，Arch\
    \ Linux 在跟进 Python 版本方面相当勤勉。很可能您默认情况下已经安装了最新版本。如果没有，您可以使用以下命令更新 Python：`$ pacman\
    \ -S python`。一旦更新完成，您就可以开始编写脚本了。\n\n## 如何从源代码构建 Python\n\n当您的 Linux 发行版没有最新版本的\
    \ Python，或者您只是想自己构建最新、最快的版本时，您可以按照以下步骤从源代码构建 Python：\n\n**步骤 1：下载源代码**\n首先，您需要通过\
    \ Python.org 获取 Python 源代码。您只需转到下载页面，并在顶部查找 Python 3 的最新源代码。确保您搜索的是 Python 3 而不是\
    \ Python 2。\n当您选择 Python 3 版本时，您可以在页面底部看到一个“Files”部分。选择 *Gzipped source tarball*\
    \ 并将其下载到您的机器。如果您更喜欢命令行方法，您可以使用从 Web 服务器检索内容的 Wget 程序将文件下载到当前目录：\n\n```\n$ wget\
    \ https://www.python.org/ftp/python/3.8.4/Python-3.8.4.tgz\n```\n\n当 tarball 下载完成后，您需要处理其他事情以准备系统进行\
    \ Python 构建。\n\n**步骤 2：准备您的系统**\n\n从头构建 Python 涉及几个固定步骤。每个步骤的目标在所有发行版上都是相同的，但如果您的发行版不使用\
    \ `apt-get`，您可能需要将其转换为您的发行版对应的命令：\n\n1. 首先，确保您已更新软件包管理器并升级了软件包：\n\n```\n$ sudo\
    \ apt-get update\n$ sudo apt-get upgrade\n```\n\n2. 接下来，您需要安装所有构建要求：\n\n```\n\
    # 对于基于 apt 的系统（如 Debian、Ubuntu 和 Mint）\n$ sudo apt-get install -y make build-essential\
    \ libssl-dev zlib1g-dev libbz2-dev libreadline-dev libsqlite3-dev wget curl llvm\
    \ libncurses5-dev libncursesw5-dev xz-utils tk-dev\n# 对于基于 yum 的系统（如 CentOS）\n\
    $ sudo yum -y groupinstall \"Development Tools\"\n$ sudo yum -y install gcc openssl-devel\
    \ bzip2-devel libffi-devel\n```\n\n如果您系统上已经安装了一些要求，这不会造成任何问题，因为您可以执行上述命令，任何现有的软件包都不会被覆盖。\n\
    \n**步骤 3：构建 Python**\n\n1. 一旦您拥有了所有先决条件和 Tape Archive (TAR) 文件，您就可以开始将源代码解压到一个目录中。请注意，以下命令将在您当前所在的目录下创建一个名为\
    \ `Python-3.9.1` 的新目录：\n\n```\n$ tar xvf Python-3.9.2.tgz\n$ cd Python-3.9.2\n\
    ```\n\n2. 现在，您需要运行 `./configure` 工具来准备构建：\n\n```\n$ ./configure --enable-optimizations\
    \ --with-ensurepip=install\n```\n\n`enable-optimizations` 标志将启用 Python 内部的一些优化，使其运行速度提高约\
    \ 10%。这样做可能会使编译时间增加二十或三十分钟。\n\n3. 接下来，您使用 `-j` 选项构建 Python，该选项只是告诉 `make` 将构建分成并行步骤以加速编译。即使使用并行构建，此步骤也可能需要几分钟：\n\
    \n```\n$ make -j 8\n```\n\n4. 最后，您需要安装新版本的 Python。您可以在此处使用 `altinstall` 选项以避免覆盖系统\
    \ Python。由于您要安装到 `/usr/bin`，因此您需要以 root 身份运行：\n\n```\n$ sudo make altinstall\n\
    ```\n\n整个安装可能需要一些时间，但一旦完成，建议您验证 Python 是否已正确设置。\n\n**步骤 4：验证您的安装**\n\n您可以测试 `python3.9\
    \ --version` 命令是否返回最新版本：\n\n```\n$ python3.9 --version\nPython 3.9.2\n```\n\n\
    如果您看到 Python 3.9.2，那么您的安装就完全验证通过了。\n\n如果您想运行额外的测试，您也可以选择测试套件，以确保一切都在您的系统上正常且快速地运行。要运行测试套件，您只需输入以下命令：\n\
    \n```\n$ python3.9 -m test\n```\n\n您不需要急于完成这部分，因为您的计算机将运行测试一段时间。如果所有测试都通过且没有错误，那么您可以确信您全新的\
    \ Python 构建正在按预期工作。\n\n## 如何在 iOS 上安装 Python\n\niOS 上的 Pythonista 软件应用程序是一个完全开发的\
    \ Python 创作环境，您可以在 iPhone 或 iPad 上运行它。它具有所有功能，包括 Python 编辑器、技术文档和解释器，全部集成在一个应用程序中。\n\
    \nPythonista 对于那些不喜欢只局限于笔记本电脑、更喜欢在旅途中工作或提升 Python 技能的人来说，可能是一个很棒的工具。该应用程序附带完整的\
    \ Python 3 标准库，还包括您可以浏览的完整文档。"
