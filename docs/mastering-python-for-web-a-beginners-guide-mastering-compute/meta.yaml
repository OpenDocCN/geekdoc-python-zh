    \ func\nreturn decorator\n```\n\nthe descriptions should look like this:\n\n```\n\
    .. decorator:: removename\n\n    Remove name of the decorated\n    function.\n\
    ```\n\n```\n.. decorator:: setnewname(name)\n\n    Set name of the decorated function\n\
    \    to *name*.\n```\n\n# class\n\nClassifies a class. The signature can include\
    \ parentheses with parameters that will be displayed as the constructor arguments.\n\
    \n# attribute\n\nDescribes an object data attribute. The description should include\
    \ information about the type of data to be expected and whether it may be changed\
    \ directly. This directive is usually nested in a class directive, like in the\
    \ following example:\n\n```\n.. class:: Primary\n```\n\nHowever, it is also possible\
    \ to document an attribute outside of a class directive, in case the documentation\
    \ for different attributes and methods is split into multiple sections. The class\
    \ name should then be included explicitly:\n\n```\n.. attribute:: Primary.social\n\
    ```"
  - '[PAGE 135]


    # method


    Describes an object method including similar information to that described for
    function. Nevertheless, the parameters should not include the self-parameter.
    This directive should be nested in a class directive, like in the previous directive
    above.


    # coroutinemethod


    Describes an object coroutine method including similar information to that described
    for function. However, the parameters should not include the self-parameter. This
    directive should also be nested in a class directive.


    # decoratormethod


    Same as a decorator, but for decorators that are methods. You may refer to a decorator
    method using the :meth: role.


    # staticmethod


    Describes an object static method. The description typically includes similar
    information to that described for function. This directive should as well be nested
    in a class directive.


    # classmethod


    Describes an object class method using similar information to that described for
    function. The parameters should not include the cls parameter and the directive
    should be nested in a class directive.


    # abstractmethod


    Describes an object abstract method including similar information to that described
    for function. This directive should be nested in a class directive.'
  - '[PAGE 136]


    122 ■ Mastering Python for Web


    **opcode**

    Describes a Python bytecode instruction.


    **cmdoption**

    Stands for a Python command-line option or switch. Make sure option argument names
    are enclosed in angle brackets.


    # Inline Markup


    As previously mentioned, Sphinx uses interpreted text roles to insert semantic
    markup in documents. The following roles relate to objects in modules and are
    possibly hyperlinked if a matching identifier is found:¹⁰


    **mod**

    The name of a module. Normally is dotted and used for package names.


    **func**

    The name of a Python function; dotted names may be used. In order to enhance readability,
    the role text should not include trailing parentheses. The parentheses are stripped
    when searching for identifiers.


    **data**

    The name of a module-level variable or constant.


    **const**

    The name of a “defined” constant. This may be a C-language #define or an immutable
    Python variable.


    **class**

    A class name; a dotted name may be used.


    ¹⁰ https://devguide.python.org/documenting/, Python'
  - '[PAGE 137]


    **meth**

    The name of a method of an object. The role text should include the type name
    and the method name.


    **attr**

    The name of a data attribute of an object.


    **exc**

    The name of an exception. A dotted name may be used. The name enclosed in this
    markup can include a module name and/or a built-in function of that name.


    The following roles create cross-references to C-language if they are coded in
    the application programming interface (API) documentation:¹¹


    **c:data**

    The name of a C-language variable.


    **c:func**

    The name of a C-language function should include trailing parentheses.


    **c:macro**

    The name of a “simple” C macro, as described above.


    **c:type**

    The name of a C-language type.


    **c:member**

    The name of a C type member.


    ¹¹ https://devguide.python.org/documenting/, Python'
  - '[PAGE 138]


    The following roles do not relate to objects, but are used to create cross-references
    or internal links:


    **envvar**

    An environment variable that is generated with index entries.


    **keyword**

    The name of a Python keyword. Using this role will result in generating a link
    to the documentation of the keyword.


    **option**

    A command-line option of Python. The leading hyphen(s) must be included. If a
    matching cmdoption directive exists, use simple ``code`` markup.


    **token**

    The name of a grammar token is mostly used in the reference manual to create links
    between production displays.


    **term**

    Reference to a term in the glossary. The glossary is created using the glossary
    directive containing a definition list with terms and definitions. It does not
    have to be in the same file as the term markup, but if you use a term that''s
    not explained in a glossary, you''ll get a warning during build.


    **command**

    The name of an OS-level command, such as rm. It does not do anything special except
    formatting the text in a different style.'
  - '[PAGE 139]


    dfn


    Used to mark the defining instance of a term in the text without index entries
    generation.


    file


    The name of a file or directory. Within the building, you can use curly braces
    to indicate a “variable” part of content, for example:


    ```

    ``spam`` is installed in:file:`/usr/lib/python2.{x}/site-packages ...

    ```


    Later in the documentation, the x will be displayed differently to indicate that
    it is to be replaced by the Python minor version.


    guilabel


    Labels presented as part of an interactive user interface must be marked using
    guilabel. This includes labels from text-based interfaces such as those created
    using curses or other text-based contents. Basically, any label used in the interface
    should be marked with this role, even button labels, window titles, field names,
    menu, and values in selection lists.


    kbd


    This role is used to mark a sequence of keystrokes. What form the key sequence
    takes usually depends on the platform- or application-specific conventions. In
    case, there are no relevant conventions, the names of modifier keys should be
    spelled out, in order to improve accessibility for new users.'
  - '[PAGE 140]


    **mailheader**

    This markup does not imply that the header is being used in an email message,
    it is also used for headers defined by the various media type specifications.
    The header name should be entered in the same way it would normally be found in
    practice, with the camel-casing conventions being preferred where there is more
    than one common usage.


    **makeover**

    The name of a make variable.


    **manpage**

    A reference to a Unix manual page that also includes the section.


    **menuselection**

    Menu selections must be marked using the menuselection role. This is typically
    used to mark a complete sequence of menu selections, including selecting sub-menus
    and choosing a specific operation, or any sub-sequence of such a sequence. The
    names of individual selections should be separated by ->.


    **mimetype**

    The name of a media type or a major or minor portion of the media.


    **newsgroup**

    Stands for the name of a Usenet newsgroup.


    **program**

    The name of an executable program. This may differ from the file name for the
    executable for some'
  - '[PAGE 141]


    platforms. To be precise, you should drop the. exe (or other) extension for Windows
    programs.


    **regexp**

    A regular expression that does not include quotes.


    **samp**

    A piece of literal text, such as code. Within the contents, you can use curly
    braces to indicate a “variable” part, and if you don’t need the “variable part”
    indication, you can use the standard ``code`` instead.


    Now we are moving to the roles used to generate external links:¹²


    **pep**

    Refers to a Python Enhancement Proposal. This generates appropriate index entries.
    In the HTML output, this text is a hyperlink to an online copy of the specified
    PEP. However, such hyperlinks should not be a substitute for properly documenting
    the language in the manuals.


    **rfc**

    A reference to an Internet Request for Comments. This generates appropriate index
    entries in the HTML output, and this text is treated as a hyperlink to an online
    copy of the specified RFC. Note down that there are no special roles for including
    hyperlinks as you can use the standard reST markup for that purpose.


    ¹² https://devguide.python.org/documenting/, Python'
- md: "## Paragraph-Level Markup Directives\n\nThe following paragraph-level markup\
    \ directives are used to create short paragraphs and can be used inside information\
    \ units as well as normal text:¹³\n\n**note**\nUsed for an especially important\
    \ bit of information about an API that a user should be aware of when using whatever\
    \ bit of API the note is attached to. The content of this directive can be written\
    \ in complete sentences and include all the necessary punctuation.\n\n**warning**\n\
    An extremely important bit of information about an API that a user should be aware\
    \ of when using whatever bit of API the warning is attached to. The content of\
    \ the directive should also be written in complete sentences and include all appropriate\
    \ punctuation. In the interest of not frightening users away from pages that are\
    \ full of warnings as such, this directive should only be chosen over note for\
    \ information in regards to the possibility of crashes, security hacks, and data\
    \ losses.\n\n**versionadded**\nThis directive comes with the version of Python\
    \ that added the described feature, or a part of it, to the library or C API.\
    \ When it applies to an entire module, it should be placed at the top of the module\
    \ section before any prose.\n\n**versionchanged**\nSimilar to versionadded, this\
    \ directive describes when and precisely what changed in the named feature in\
    \ some way (new parameters, changed side effects, platform support).\n\n**deprecated**\n\
    Specifies the version from which the described feature is deprecated. Usually,\
    \ there is one required argument that stands for the version from which the feature\
    \ is deprecated. For example:\n```\n.. deprecated:: 3.8\n```\n\n**deprecated-removed**\n\
    Similar to deprecated, but it additionally indicates from which version the feature\
    \ is removed. With this directive, there are two required arguments: the version\
    \ from which the feature is deprecated, and the version in which the feature is\
    \ removed. For instance:\n```\n.. deprecated-removed:: 3.8 4.0\n```\n\n**seealso**\n\
    Usually, sections need to include a list of references to structure documentation\
    \ or external documents. These lists are created using the seealso directive.\
    \ The directive itself is typically placed in a section just before any sub-sections.\
    \ And for the HTML output, it is displayed boxed off from the main flow of the\
    \ text. The content of the seealso directive should be a reST definition list.\
    \ Example:\n```\n.. seealso::\n   Module :mod:`'zipfile'`\n   Documentation of\
    \ the :mod:`'zipfile'` standard module.\n\n   `'GNU tar manual, Basic Tar Format\
    \ <http://link>'_`\n   Documentation for tar archive files, including GNU tar\
    \ extensions.\n```\n\n**rubric**\nThis directive is used to create a paragraph\
    \ heading that are not included in the table of contents. It is currently used\
    \ for the “Footnotes” caption.\n\n**centered**\nUsing this directive, you can\
    \ create a centered bold-faced paragraph.\n\n**substitutions**\nThe documentation\
    \ system offers three substitutions that are defined by default. They are placed\
    \ in the build configuration file conf.py.\n\n**release**\nReplaced by the Python\
    \ release the documentation refers to. Stands for the full version string, including\
    \ alpha/beta/release candidate tags.\n\n**version**\nReplaced by the Python version\
    \ the documentation refers to. And consists only of the major and minor version\
    \ parts, e.g. 3.8\n\n**today**\nReplaced by today’s date, or by the date set in\
    \ the build configuration file. Normally has the following format – April 11,\
    \ 2019.\n\n## Translating\n\nThere are separate Python documentation for translations\
    \ that are strictly operated by the PEP 545 – Python Documentation Translations.\
    \ New versions are built by docsbuild-scripts and hosted on docs.python.org. There\
    \ are several documentation translations already in production, and many others\
    \ are still in progress:¹⁴\n\n- Arabic (ar)\n- Bengali as spoken in India (bn_IN)\n\
    - French (fr)\n- Hindi as spoken in India (hi_IN)\n- Hungarian (hu)\n- Indonesian\
    \ (id)\n- Italian (it)\n- Japanese (ja)\n- Korean (ko)\n- Lithuanian (lt)\n- Polish\
    \ (pl)\n- Portuguese (pt)\n- Portuguese as spoken in Brasil (pt-br)\n- Russian\
    \ (ru)\n- Simplified Chinese (zh-cn)\n- Spanish (es)\n- Traditional Chinese (zh-tw)\n\
    - Turkish (tr)\n\nWith Python, anyone can start a new translation. All you have\
    \ to do is subscribe to the doc-sig mailing list, introduce yourself to the community\
    \ and let everyone know about the translation you are starting. Afterwards, you\
    \ should create the GitHub account and gather people to help you translate; otherwise,\
    \ you will not be able to accomplish it on your own. You can use any tool to translate,\
    \ as long as you can synchronize with Git version control system through Transifex\
    \ or Github. Make sure you keep your fellow Pythonians updated about your work\
    \ and progress via mailing list.\n\n## CHAPTER 4: Programs, Algorithms, and Functions\n\
    \n### IN THIS CHAPTER\n\n- Reviewing main Python algorithms\n- Discussing differences\
    \ between Python Scripts and Modules\n- Characterizing Python basic functions\
    \ and Lambda functions\n\nThe standard data structures course, which introduces\
    \ a collection of fundamental data structures and algorithms, can be taught on\
    \ the basis of any programming languages available today. Nevertheless, most colleges\
    \ and e-courses out there choose to adopt the Python language for introducing\
    \ students to programming and problem-solving. Python provides several benefits\
    \ over other languages such as C++ and Java, the most important of which is that\
    \ it has a simple syntax that is easier to learn. In this chapter, we are going\
    \ to expand upon the use of Python by providing Python-centric algorithms and\
    \ functions for the data structures course. We shall learn about the clean syntax\
    \ and powerful features of the language used throughout scripting and the underlying\
    \ mechanisms of these features and their overall efficiency.\n\nIt is important\
    \ to understand that the design and analysis of algorithms are a fundamental topic\
    \ in computer science and engineering education nowadays. Unfortunately, traditional\
    \ programming languages force many to deal with details of data structures and\
    \ supporting routines, rather than algorithm design. Python represents an algorithm-oriented\
    \ language that has been sorely needed in development. The advantages of Python\
    \ include its uncomplicated syntax, the flexibility of basic functions, and interactivity\
    \ that encourages experimentation. These and many other features we are going\
    \ to analyze without further delay.\n\n![](img/25ba12f902f652c144ff96c17c35a084_148_0.png)\n\
    \n## PYTHON SCRIPTS AND MODULES\n\nIn computing, the term script is used to refer\
    \ to a file containing a logical sequence of orders or a set processing file.\
    \ This usually comes as a simple program that is stored in a plain text file.\
    \ Thus, a plain text file containing Python code that is designed to be directly\
    \ executed by the user is called script, an informal term that means a top-level\
    \ program file. On the other hand, a plain text file containing Python code that\
    \ is created to be imported and used from another Python file is what we call\
    \ a module. The main difference between a module and a script is that modules\
    \ are meant to be imported, while scripts are made to be directly executed. In\
    \ any case, the important thing is to learn how to run the Python code you write\
    \ into your modules and scripts. And scripts are always processed by an interpreter,\
    \ which is responsible for executing each command sequentially.\n\n### What’s\
    \ the Python Interpreter?\n\nPython is an excellent programming tool that allows\
    \ you to be productive in a wide variety of ways. Python also has a piece of software\
    \ called an interpreter. The interpreter is the program you are going to need\
    \ to run Python code and scripts properly. In technical terms, the interpreter\
    \ is a layer of software that operates between your program and computer hardware\
    \ to get your code running. Depending on the code implementation you use, the\
    \ interpreter can be:\n\n- A program written in Python itself usually uses PyPy\
    \ interpreter.\n- A program written in C run with CPython, which is the core implementation\
    \ of the language."
  mdcn: "## 段落级标记指令\n\n以下段落级标记指令用于创建简短段落，既可用于信息单元内，也可用于普通文本中：¹³\n\n**note**\n用于关于API的特别重要的信息，用户在使用该指令所附着的API部分时应予以注意。此指令的内容可以使用完整句子编写，并包含所有必要的标点符号。\n\
    \n**warning**\n关于API的极其重要的信息，用户在使用该指令所附着的API部分时应予以注意。此指令的内容也应使用完整句子编写，并包含所有适当的标点符号。为了避免因页面充满警告而吓跑用户，此指令应仅在涉及崩溃、安全漏洞和数据丢失可能性的信息时选用，而非note。\n\
    \n**versionadded**\n此指令附带添加了所描述功能（或其一部分）到库或C API的Python版本。当适用于整个模块时，应将其置于模块部分的顶部，在任何正文之前。\n\
    \n**versionchanged**\n类似于versionadded，此指令描述命名功能在某些方面（新参数、更改的副作用、平台支持）发生更改的时间和具体内容。\n\
    \n**deprecated**\n指定所描述功能已弃用的版本。通常有一个必需参数，代表功能开始弃用的版本。例如：\n```\n.. deprecated::\
    \ 3.8\n```\n\n**deprecated-removed**\n类似于deprecated，但它还额外指明功能被移除的版本。此指令有两个必需参数：功能开始弃用的版本，以及功能被移除的版本。例如：\n\
    ```\n.. deprecated-removed:: 3.8 4.0\n```\n\n**seealso**\n通常，章节需要包含指向结构化文档或外部文档的参考列表。这些列表使用seealso指令创建。该指令本身通常放置在章节中任何子章节之前。对于HTML输出，它会显示为与文本主流分开的方框。seealso指令的内容应是一个reST定义列表。示例：\n\
    ```\n.. seealso::\n   Module :mod:`'zipfile'`\n   Documentation of the :mod:`'zipfile'`\
    \ standard module.\n\n   `'GNU tar manual, Basic Tar Format <http://link>'_`\n\
