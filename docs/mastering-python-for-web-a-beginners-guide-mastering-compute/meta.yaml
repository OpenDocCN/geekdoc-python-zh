    as developing, scripting, generation, and software testing. It has also been an
    inspiration for many other coding languages such as Ruby, Cobra, Boo, CoffeeScript
    ECMAScript, Groovy, Swift Go, OCaml, and Julia.


    The success of Python rests on a strong standard library and a generous assortment
