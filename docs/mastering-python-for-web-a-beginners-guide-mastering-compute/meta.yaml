    和 ‘]’ 内，所有数字转义都被视为字符。


    ## \A


    仅在字符串的开头匹配。


    ## \b


    匹配空字符串，但仅在单词的开头或结尾。单词被定义为单词字符的序列。请注意，从形式上讲，`\b` 被定义为 `\w` 和 `\W` 字符之间（或反之）的边界，或
