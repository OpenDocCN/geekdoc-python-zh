- md: "## Build the HTML\n\nAfter you complete the configuration and rst files set\
    \ up, you should be able to run the make HTML command from the terminal in the\
    \ main directory to generate the HTML files. The HTML files will then be created\
    \ inside the build/HTML folder.\n\n## Advanced Sphinx Items\n\nMake sure to note\
    \ that there are additional Sphinx directives that can help your documentation\
    \ look and feel more modern and organized. Here are some of the key features that\
    \ can be useful for you to further customize the documentation. All examples are\
    \ generated with the sphinx_rtd_theme:\n\n- **Table of contents:** Sphinx uses\
    \ a custom directive, known as the toctree directive, to describe the relations\
    \ between different files in the form of a or table of contents.\n- **Warning\
    \ box:** A warning box can be applied using the warning directive.\n    For example:\
    \ `.. warning:: This is a **warning** box.`\n- **Image:** An image item can be\
    \ added using the image directive.\n- **Table:** Consequently, a table can be\
    \ added using the table directive.\n\n![](img/25ba12f902f652c144ff96c17c35a084_127_0.png)\n\
    \n# WRITE DOCUMENTATION VIA DOCSTRINGS\n\nPython's documentation has for a long\
    \ time been considered to be good for a free programming language. The reason\
    \ for that was an early commitment of Python's creator, Guido van Rossum, to provide\
    \ documentation on the language together with its libraries, to the user community.\
    \ So that they could actively participate in continuing involvement and assistance\
    \ for creating and maintaining Python documentation.\n\nUp to this day, community\
    \ involvement takes many forms, from modifying bug reports to just plain criticizing\
    \ when the documentation could be more polished or easier to use.\n\nMoreover,\
    \ there is a whole Index of Python Enhancement Proposals (PEPs) that go by the\
    \ following categories:⁶ Meta-PEPs (PEPs about PEPs or Processes), Other Informational\
    \ PEPs, Provisional PEPs (provisionally accepted; interface may still change),\
    \ Accepted PEPs (accepted; may not be implemented yet), Open PEPs (under consideration),\
    \ Finished PEPs (done, with a stable interface), Historical Meta-PEPs and Informational\
    \ PEPs, Deferred PEPs (postponed pending further research or updates) and finally,\
    \ Abandoned, Withdrawn, and Rejected PEPs.\n\nThese documents are aimed at authors\
    \ and potential authors of documentation for Python. More specifically, it is\
    \ for users contributing to the standard documentation and developing additional\
    \ documents using the same tools as the standard documents.\n\nAnd in case you\
    \ have an interest is in contributing to the Python documentation, but you do\
    \ not have the time to learn all the PEPs related to a format for textual data\
    \ and technical documentation – reStructuredText, then you can look it up further\
    \ in this section. We are going to briefly introduce documentation concepts and\
    \ syntax, intended to provide authors with enough information to write documents\
    \ productively.\n\n⁶ https://www.python.org/dev/peps/#id6, Python\n\n# Paragraphs\n\
    \nThe paragraph is the most basic block in a reST document. They are simply parts\
    \ of text separated by one or more blank lines. In Python indentation is significant,\
    \ so all lines of the same paragraph should be left-aligned to the same level\
    \ of indentation.\n\n# Inline Markup<sup>7</sup>\n\nThe standard reST inline markup\
    \ is quite straight-forward:\n\n```\none asterisk: *text* for emphasis (italics),\n\
    two asterisks: **text** for strong emphasis (boldface), and\nbackquotes: ``text``\
    \ for code samples.\n```\n\n# Sections\n\nSection headers are created by underlining\
    \ or overlining the section title with a punctuation character. Generally, there\
    \ should be no heading levels assigned to certain characters as the structure\
    \ is determined from the succession of headings. But for the Python documentation,\
    \ there is a suggested convention:<sup>8</sup>\n\n```\n# with overline, for parts\n\
    * with overline, for chapters\n=, for sections\n-, for subsections\n^, for subsubsections\n\
    \", for paragraphs\n```\n\nSphinx brings a lot of new directives and interpreted\
    \ text roles to standard reST markup. This section contains the reference material\
    \ for these facilities. However, this material should be treated as just an overview\
    \ of Sphinx's extended markup capabilities. Full coverage can be found in Python\
    \ PEP documentations.\n\n<sup>7</sup> https://devguide.python.org/documenting/,\
    \ Python\n<sup>8</sup> https://devguide.python.org/documenting/, Python\n\n# Meta-information\
    \ Markup\n\nThe markup that is going to be described in this section is used to\
    \ provide information about a documented module. Note that each module should\
    \ be documented in its own file.\n\n## sectionauthor\n\nStands for the author\
    \ of the current section. The element should include the author's name such that\
    \ it can be used for presentation and email address. The domain name part of the\
    \ address should be lower case. Example:\n\n```\nsectionauthor:Bill Gates <bill@gates.org>\n\
    ```\n\n## module\n\nThis mark stands for the beginning of the description of a\
    \ module, package, or submodule. The name should be fully qualified and have short\
    \ identifiers; examples that are in use include \"IRIX,\" \"Mac,\" \"Windows,\"\
    \ and \"Unix.\" It is important to use a synopsis option that usually consists\
    \ of one sentence describing the module's purpose – it is currently only used\
    \ in the Global Module Index.\n\n## moduleauthor\n\nThe moduleauthor directive,\
    \ which can appear multiple times, names the authors of the specific module code,\
    \ just like sectionauthor names the author of a piece of documentation. It too\
    \ does not result in any output.\n\nIn addition, it would be beneficial to make\
    \ the section title of a module-describing file meaningful since that value will\
    \ be inserted in the table-of-content of overview files.\n\n# Information Units\n\
    \nThere is a variety of directives applied to describe specific features provided\
    \ by modules. Each directive needs one or more signatures to provide basic information\
    \ about what is being described, and the content should be the description. The\
    \ standard version makes entries in the general index. However, if no index entry\
    \ is desired, you can give the directive option flag: noindex:. The following\
    \ example shows all of the features of this directive type:⁹\n\n## c:function\n\
    \nDescribes a C function. The signature should be given as in C, for instance:\n\
    \n```\n.. c:function:: PyObject* PyType_GenericAlloc(PyTypeObject *type, Py_ssize_t\
    \ nitems)\n```\n\nYou will not have to backslash-escape asterisks in the signature;\
    \ the names of the arguments should be given so they may be used in the description.\n\
    \n## c:member\n\nDescribes a C struct member. Make sure that the text of the description\
    \ includes the range of values allowed, how the value should be interpreted, and\
    \ whether the value can be changed. References to structure members in text can\
    \ use the member role.\n\n## c:macro\n\nStands for a “simple” C macro. To clarify,\
    \ simple macros are macros that are used for code expansion, but which do not\
    \ take arguments, therefore, cannot be described as functions. This is not to\
    \ be used for simple constant definitions.\n\n## c:type\n\nDescribes a C type.\
    \ The signature should just be the type name.\n\n## c:var\n\nDescribes a global\
    \ C variable. The signature can as well include the type, such as:\n\n```\n..\
    \ c:var:: PyObject* PyClass_Type\n```\n\n## data\n\nRepresents global data in\
    \ a module, using both variables and values as “defined constants.” Please note\
    \ that class and object attributes are not documented using this directive.\n\n\
    ## exception\n\nCharacterizes an exception class. This signature can include parentheses\
    \ with constructor arguments.\n\n## function\n\nDescribes a module-level function\
    \ with parameters, and optional parameters in brackets. Default values can be\
    \ given if it enhances clarity. For example:\n\n```\n.. function:: repeat([repeat=3[,\
    \ number=1000000]])\n```\n\nTypically, object methods as such are not documented\
    \ using this directive. Bound object methods are placed in the module namespace\
    \ as part of the public interface of the module and show information about side\
    \ effects and possible exceptions.\n\n## coroutinefunction\n\nDescribes a module-level\
    \ coroutine. A standard description is likely to include similar information to\
    \ that described for function.\n\n## decorator\n\nClassifies a decorator function.\
    \ The signature should not represent the signature of the actual function, but\
    \ the usage as a decorator. To illustrate with an example:\n\n```\ndef removename(func):\n\
    \    func.__name__ = ''\n    return func\n\ndef setnewname(name):\n    def decorator(func):\n\
    ```\n\n⁹ https://devguide.python.org/documenting/. Python"
  mdcn: "## 构建 HTML\n\n完成配置和 rst 文件设置后，你应该能够在主目录的终端中运行 `make HTML` 命令来生成 HTML 文件。生成的\
    \ HTML 文件将位于 `build/HTML` 文件夹内。\n\n## 高级 Sphinx 项目\n\n请注意，Sphinx 提供了额外的指令，可以帮助你的文档看起来更现代、更条理。以下是一些关键特性，可用于进一步自定义文档。所有示例均使用\
    \ `sphinx_rtd_theme` 生成：\n\n- **目录：** Sphinx 使用一个名为 `toctree` 的自定义指令，以目录或表格的形式描述不同文件之间的关系。\n\
    - **警告框：** 可以使用 `warning` 指令添加警告框。\n    例如：`.. warning:: 这是一个 **警告** 框。`\n- **图片：**\
    \ 可以使用 `image` 指令添加图片项。\n- **表格：** 因此，可以使用 `table` 指令添加表格。\n\n![](img/25ba12f902f652c144ff96c17c35a084_127_0.png)\n\
    \n# 通过文档字符串编写文档\n\n长期以来，Python 的文档一直被认为是免费编程语言中做得很好的。这得益于 Python 创始人 Guido van\
    \ Rossum 早期的承诺，即为用户提供语言及其库的文档，以便他们能够积极参与并持续协助创建和维护 Python 文档。\n\n时至今日，社区参与的形式多种多样，从修改错误报告到仅仅批评文档可以更完善或更易用。\n\
    \n此外，还有一个完整的 Python 增强提案（PEP）索引，分为以下几类：⁶ 元 PEP（关于 PEP 或流程的 PEP）、其他信息性 PEP、临时 PEP（临时接受；接口可能仍会更改）、已接受\
    \ PEP（已接受；可能尚未实现）、开放 PEP（审议中）、已完成 PEP（完成，接口稳定）、历史元 PEP 和信息性 PEP、推迟的 PEP（因需要进一步研究或更新而推迟），以及最终被放弃、撤回和拒绝的\
    \ PEP。\n\n这些文档面向 Python 文档的作者和潜在作者。更具体地说，它适用于为标准文档做出贡献并使用与标准文档相同的工具开发额外文档的用户。\n\
    \n如果你有兴趣为 Python 文档做出贡献，但没有时间学习所有与文本数据和技术文档格式相关的 PEP——reStructuredText，那么你可以进一步查阅本节。我们将简要介绍文档概念和语法，旨在为作者提供足够的信息，以便高效地编写文档。\n\
    \n⁶ https://www.python.org/dev/peps/#id6, Python\n\n# 段落\n\n段落是 reST 文档中最基本的块。它们只是由一个或多个空行分隔的文本部分。在\
    \ Python 中，缩进很重要，因此同一段落的所有行应左对齐到相同的缩进级别。\n\n# 内联标记<sup>7</sup>\n\n标准的 reST 内联标记非常简单：\n\
    \n```\n一个星号：*文本* 用于强调（斜体），\n两个星号：**文本** 用于强烈强调（粗体），\n反引号：``文本`` 用于代码示例。\n```\n\
    \n# 章节\n\n章节标题通过在标题下方或上方添加标点符号来创建。通常，不应为特定字符分配标题级别，因为结构是由标题的顺序决定的。但对于 Python 文档，有一个建议的约定：<sup>8</sup>\n\
    \n```\n# 带上划线，用于部分\n* 带上划线，用于章节\n=，用于节\n-，用于子节\n^，用于子子节\n\"，用于段落\n```\n\nSphinx\
    \ 为标准 reST 标记带来了许多新的指令和解释文本角色。本节包含这些功能的参考材料。然而，这些材料应仅被视为 Sphinx 扩展标记功能的概述。完整内容可在\
    \ Python PEP 文档中找到。\n\n<sup>7</sup> https://devguide.python.org/documenting/,\
    \ Python\n<sup>8</sup> https://devguide.python.org/documenting/, Python\n\n# 元信息标记\n\
    \n本节将描述的标记用于提供有关已记录模块的信息。请注意，每个模块应在自己的文件中记录。\n\n## sectionauthor\n\n代表当前章节的作者。该元素应包含作者的姓名（以便用于显示）和电子邮件地址。地址的域名部分应为小写。示例：\n\
    \n```\nsectionauthor:Bill Gates <bill@gates.org>\n```\n\n## module\n\n此标记代表模块、包或子模块描述的开始。名称应完全限定并使用简短标识符；正在使用的示例包括\
    \ \"IRIX\"、\"Mac\"、\"Windows\" 和 \"Unix\"。使用 `synopsis` 选项很重要，该选项通常由描述模块目的的一句话组成——目前仅在全局模块索引中使用。\n\
    \n## moduleauthor\n\n`moduleauthor` 指令可以出现多次，用于命名特定模块代码的作者，就像 `sectionauthor`\
    \ 命名文档片段的作者一样。它也不会产生任何输出。\n\n此外，使描述模块的文件的章节标题有意义将是有益的，因为该值将插入到概览文件的目录中。\n\n# 信息单元\n\
    \n有多种指令用于描述模块提供的特定功能。每个指令需要一个或多个签名来提供有关所描述内容的基本信息，内容应为描述。标准版本会在通用索引中创建条目。但是，如果不需要索引条目，可以给出指令选项标志：`noindex:`。以下示例展示了此指令类型的所有功能：⁹\n\
    \n## c:function\n\n描述一个 C 函数。签名应按 C 语言格式给出，例如：\n\n```\n.. c:function:: PyObject*\
    \ PyType_GenericAlloc(PyTypeObject *type, Py_ssize_t nitems)\n```\n\n你不必在签名中转义星号；参数的名称应给出，以便在描述中使用。\n\
    \n## c:member\n\n描述一个 C 结构体成员。确保描述文本包含允许的值范围、如何解释该值以及该值是否可以更改。文本中对结构体成员的引用可以使用\
    \ `member` 角色。\n\n## c:macro\n\n代表一个“简单”的 C 宏。需要澄清的是，简单宏是用于代码扩展但不接受参数的宏，因此不能描述为函数。这不适用于简单的常量定义。\n\
    \n## c:type\n\n描述一个 C 类型。签名应仅为类型名称。\n\n## c:var\n\n描述一个全局 C 变量。签名也可以包含类型，例如：\n\
    \n```\n.. c:var:: PyObject* PyClass_Type\n```\n\n## data\n\n表示模块中的全局数据，使用变量和值作为“定义的常量”。请注意，类和对象属性不使用此指令记录。\n\
    \n## exception\n\n描述一个异常类。此签名可以包含带有构造函数参数的括号。\n\n## function\n\n描述一个模块级函数，带有参数，可选参数放在括号中。如果有助于清晰，可以给出默认值。例如：\n\
    \n```\n.. function:: repeat([repeat=3[, number=1000000]])\n```\n\n通常，对象方法本身不使用此指令记录。绑定的对象方法作为模块公共接口的一部分放置在模块命名空间中，并显示有关副作用和可能异常的信息。\n\
    \n## coroutinefunction\n\n描述一个模块级协程。标准描述可能包含与 `function` 描述类似的信息。\n\n## decorator\n\
    \n分类一个装饰器函数。签名不应表示实际函数的签名，而是作为装饰器的用法。举例说明：\n\n```\ndef removename(func):\n   \
    \ func.__name__ = ''\n    return func\n\ndef setnewname(name):\n    def decorator(func):\n\
    ```\n\n⁹ https://devguide.python.org/documenting/. Python"
