    \n- **避免不简洁的注释：** 你的注释应该直截了当。在一切都显而易见的情况下，你不需要添加任何内容。许多开发者使用的缩写是 D.R.Y.，它代表编程口号“不要重复自己”。这意味着你的代码应尽可能简洁。你不需要为一段本身已充分解释自己的代码添加注释，比如这个：\n\
    \n```\nreturn x # Returns a\n```\n\n我们可以清楚地看到返回了 x，因此显然没有必要在注释中重复该语句。此类不良实践会使注释变得\
    \ W.E.T.，意味着开发者“把一切都写了两遍”。此外，一旦你让代码运行起来，务必回头删除那些已变得多余的注释。\n\n- **避免不必要的注释：** 杂乱、复杂的注释可能是一个迹象，表明你的代码可能存在更深层次的问题。有时代码注释可能被用来掩盖程序的潜在错误。归根结底，注释应该支持你的代码，而不是试图掩盖沟通不畅。值得提醒自己，如果你的代码写得很糟糕，再多的注释也无法解决它。\n\
    \n在每一行代码前都加注释应该保持简单，通过为变量、函数和集合赋予清晰的名称来实现。你的注释应该很少比它们所支持的代码更长。如果你发现自己花了太多时间和行数来解释你做了什么，那么你需要回头重新设计，以获得更清晰的代码。此外，使用清晰的命名约定并删除所有不必要的注释，有助于整体上减少代码的长度。\n\
    \n102 ■ 精通 Python Web 开发\n\n- **避免粗鲁的注释：** 在你人生的某个阶段，你很可能会参与一个开发团队项目。而且，当多个人都在处理同一段代码时，通常会鼓励其他人来审查你目前写的内容并给出诚实的反馈。有时，你可能会目睹有人胆敢添加这样的注释：\n\
    \n```\n# Re-write this one here to fix John's stupid f** mistake\n```\n\n简而言之，这样做是不好的。即使这是你朋友的代码，并且你确定他们不会因此被冒犯，这仍然是不可接受的。你永远不知道哪些片段会溜进生产环境，如果客户日后偶然发现它，那会是什么样子。在注释中包含不雅和粗鲁的词语，不是展示你专业素养的方式。\n\
    \n说到专业开发者的道德，值得一提的是，主要位于美国的科技组织和公司（工程师、设计师和商业高管）的员工选择签署“永不再来”（Never Again）承诺，以建立团结并为\
    \ IT 基础设施制定基本规则。通过签署该承诺，他们承诺：³\n\n- 我们拒绝参与为美国政府创建识别信息数据库，以便其基于种族、宗教或国籍来针对个人。\n\
    \n³ http://neveragain.tech/, 该承诺\n\n- 我们将在我们的组织内倡导：\n    - 尽量减少收集和保留可能助长种族或宗教针对性的数据。\n\
    \    - 缩减包含不必要种族、民族和国籍数据的现有数据集。\n    - 负责任地销毁高风险数据集和备份。\n    - 实施安全和隐私最佳实践，特别是尽可能将端到端加密设为默认选项。\n\
    \    - 如果政府要求我们交出我们组织收集的用户数据（即使是少量），要求其提供适当的法律程序。\n- 如果我们发现组织内存在我们认为非法或不道德的数据滥用行为：\n\
    我们将与同事和领导层合作予以纠正。\n    - 如果我们无法阻止这些行为，我们将行使我们的权利和责任，公开发声并进行负责任的举报，同时不危及用户。\n \
    \   - 如果我们有权这样做，我们将使用所有可用的法律辩护来阻止这些行为。\n    - 如果我们没有这样的权力，并且我们的组织强迫我们参与此类滥用，我们将辞去职位而不是服从。\n\
    \n- 我们将提高意识，并就数据和算法在我们组织和行业之外的负责任和公平使用提出关键问题。\n\n## 如何实践注释？\n\n开始编写更 Pythonic\
    \ 注释的最简单方法就是直接动手。\n\n你可以开始在自己的代码中为自己编写注释。从现在起，将包含简单注释作为一项任务，在合适的地方添加。看看它是否能为复杂函数增加更多清晰度，并尝试在所有脚本的顶部放置文档字符串。另一个好的练习方法是回头审查你之前编写的任何旧代码。观察哪些地方可能不合理，并整理代码。如果它仍然需要一些额外的解释，你可能想添加一个快速注释来帮助阐明代码的主要功能。\n\
    \n如果你的代码托管在像 GitHub 这样的互联网托管平台上（该平台用于软件开发和版本控制），这尤其是一个好主意。尝试审查你的旧作品，并通过引导其他人了解你已完成的工作来帮助他们。\n\
    \n使用同一个平台，你也可以通过评论其他人的代码来回馈社区。如果你曾发现自己从 GitHub 下载了某些东西，后来在理解时遇到困难，那么在你理解每段代码如何优化时添加注释。完成后，你可以用你的姓名首字母和日期签署你的注释，然后将你的更改作为拉取请求提交。如果你的更改被合并，你可能正在帮助数十甚至数百名像你一样的开发者获得他们项目的更好版本。\n\
    \n总之，学会写好注释应被视为一个极其宝贵的工具。你不仅能学会如何更清晰、更简洁地写作，而且无疑也会对 Python 产生更深的理解。知道如何在 Python\
    \ 中编写注释可以让许多开发者的生活更轻松，从你自己开始。恰到好处的注释有助于快速理解你的代码功能，也能帮助你重新熟悉自己的旧代码。\n\n通过注意你何时应用注释来试图支持写得不好的代码，你将能够审查和修改你的代码，使其更高效。注释先前编写的代码，无论是你自己的还是其他开发者的，对于那些刚开始练习编写清晰\
    \ Python 注释的人来说都是一个很好的选择。而且，随着你对代码文档化的了解加深，你可以考虑进入下一个层次，即代码文档化。\n\n![](img/25ba12f902f652c144ff96c17c35a084_119_0.png)"
