- md: "## PROGRAMMATICALLY ACCESSING DOCSTRINGS\n\nAs already pointed out in a previous\
    \ section, Python code documentation is a key and continuous course in the process\
    \ of software development. The term docstring is an abbreviation that stands for\
    \ documentation string and defines your source code – what your function, module,\
    \ or class does. As a rule, it is added as a regular comment right below the head\
    \ of a code function, module, or method. Docstrings is a great way to create documentation\
    \ for your Python code from within the code. This in-code documentation works\
    \ for all modules, and all functions and classes exported by a module should also\
    \ have docstrings. Public methods such as the `__init__` constructor also have\
    \ docstrings. A package may be documented in the module docstring of the `__init__.py`\
    \ file in the package directory.\n\nIn order to write a docstring correctly, it\
    \ is recommended to follow the official Python convention. In this case, PEP 257\
    \ – Docstring Convention written by David Goodger and Guido van Rossum himself,\
    \ would be a great guideline to reflect upon. The aim of this PEP is to “standardize\
    \ the high-level structure of docstrings: what they should contain, and how to\
    \ say it.”⁴\n\n## Single-Line Docstrings\n\nDue to Python simplicity, the docstring\
    \ comes as a single-line comment. However, keep in mind to start the text of a\
    \ docstring with a capital letter, and end it with a period. Based on the trend\
    \ that code is typically read more often than it is written, it is highly advised\
    \ to describe what the documented structure does as a command, instead of explaining\
    \ how it is done. Additionally, mentioning which kind of value is returned to\
    \ the caller would also help to understand the result of the function or method.\n\
    \nAnd in regards to double-quotes, as long as both the beginning and the end quotes\
    \ are similar, Python is quite progressive, and you are allowed to use three single\
    \ quotes as well as three double-quotes. You just need to make sure that the closing\
    \ quotes are in the same line as with the opening quotes. Besides, there is no\
    \ need to add any empty lines before, or after the text of the docstring.\n\n\
    ## Multi-line Docstrings\n\nMoreover, a docstring can as well be written as a\
    \ multi-line comment. If you choose to use multi-line comments, two things are\
    \ going to change – the encapsulation of the docstring would be written in triple\
    \ single- or double-quotes, and the structure of the docstring itself would get\
    \ a deeper meaning assigned to the entire text.\n\nThe docstring of a script documents\
    \ the script’s function and command-line syntax together with other variables\
    \ and files. You are allowed to be fairly elaborate (several screens full) when\
    \ applying this docstring but at the same time make it as sufficient as possible\
    \ for a new user to operate the command properly. It is also required to complete\
    \ a quick reference to all options and arguments for an expert user.\n\nThe docstring\
    \ for a module should typically list the classes, exceptions, and functions that\
    \ are requested by the module, with a one-line summary of each. At the same time,\
    \ docstring for a package `__init__.py` module is also expected to list the modules\
    \ and sub-packages exported by the package.\n\nThe docstring for a function or\
    \ method should summarize its behavior and list its return values, side effects,\
    \ exceptions raised, and restrictions on when it can be applied. Optional arguments\
    \ should be indicated, and keyword arguments that are part of the interface must\
    \ be documented.\n\nThe docstring for a class should outline its behavior and\
    \ list the public methods and other variables. If the class is supposed to be\
    \ subclassed and has an additional interface for subclasses, this interface should\
    \ be listed in the separate docstring. And, the class constructor should be documented\
    \ in the docstring for its `__init__` method.\n\nIf a class subclasses another\
    \ class and its behavior is mostly obtained from that class, its docstring should\
    \ mention this and outline the differences. You can use the verb \"override\"\
    \ to indicate that a subclass method replaces a superclass method. And in addition\
    \ to that, you can apply the verb \"extend\" to indicate that a subclass method\
    \ calls the superclass method.\n\n## Docstring Formats\n\nWhen it comes to docstring\
    \ formats, there is not just one binding setup. To be clear, there is more than\
    \ one, and all of these format variants are compatible with multi-line docstrings.\n\
    \n- **reStructured Text (reST)/Sphinx**: This is considered to be the Official\
    \ Python documentation standard that uses the syntax of the lightweight markup\
    \ language reStructured text (reST).\n- **Google Docstrings:** Google's style\
    \ of docstring.\n- **NumPy/SciPy Docstrings:** A combination of reStructured text\
    \ (reST) and Google Docstrings.\n\nAt the same time, there is a number of tools\
    \ that auto-generate documentation and HTML documents from docstrings, such as\
    \ Sphinx, Epydoc, Doxygen, PyDoc, pdoc, and the autodoc extension for Sphinx.\n\
    \nPyDoc, for instance, is a part of the Python distribution that gathers information\
    \ about a module for the console, a web browser, or as an HTML document. In order\
    \ to learn more about its module, function, class, or method, try looking inside\
    \ the Python shell and using the `help()` function.\n\nAs mentioned earlier, Sphinx\
    \ is the official Python documentation standard that is also used as a default\
    \ generator for JetBrains' PyCharm integrated development environment. Basically,\
    \ Sphinx style utilizes the syntax of a lightweight markup language reStructuredText\
    \ (reST), designed to be both processable by documentation-processing software\
    \ such as Docutils; and to remain easily accessible by human developers who are\
    \ reading and writing Python source code.\n\nFollowing PEP 257 guidelines for\
    \ documentation is going to help you to understand the source code. And by applying\
    \ the Sphinx tool, you would be able to automatically generate documentation from\
    \ the docstrings in your code. Below we offer a simple step-by-step guide on how\
    \ to easily auto-generate clean and well-organized documentation from Python code\
    \ using Sphinx.\n\n1. **Install Sphinx:** You can install Sphinx directly from\
    \ a clone of the Git repository – https://github.com/sphinx-doc/sphinx. You can\
    \ do it either by cloning the repo and installing from the local clone, or simply\
    \ installing directly via git:⁵\n\n    ```\n    git clone https://github.com/sphinx-doc/sphinx\n\
    \    cd sphinx\n    pip install .\n    ```\n\n2. **Initialize the Sphinx Configuration:**\
    \ In the root directory of your project, start `sphinx-quickstart` in order to\
    \ initialize the sphinx source directory that enables a default configuration.\
    \ Running this command will prompt you to fill out some basic configuration properties\
    \ such as creating separate source and building directories, as well as indicating\
    \ the project name, author name, and project version.\n\n3. **Update the conf.py\
    \ File:** The `conf.py` file located in the source folder describes the Sphinx\
    \ configuration and controls how Sphinx builds the documentation. If you want\
    \ to modify the theme, version, or module directory, you will need to insert these\
    \ changes here. Below are a few standard overrides:\n\n    - **Updating the Theme:**\
    \ If you want to change the default theme for sphinx which is alabaster, you will\
    \ find many other themes to choose from, and it is even possible to create your\
    \ own. One of the popular themes is `sphinx_rtd_theme`, which is a modern and\
    \ mobile-friendly theme. In order to install `sphinx_rtd_theme`, you will need\
    \ to install the `sphinx-rtd-theme` Python package by running `pip install sphinx-rtd-theme`\
    \ in the terminal.\n\n    - **Adding Extension Support for Autodoc:** The `extensions`\
    \ variable is assigned to a list of extensions needed to build the documentation.\
    \ For instance, if you're planning to include documentation from your doc using\
    \ the autodoc directives, you will have to activate it by adding `sphinx.ext.autodoc`\
    \ to the extension list. And if the documentation in your code follows the Google\
    \ Python Style Guide, you will be expected to append `sphinx.ext.napoleon` to\
    \ the extensions list.\n\n    In addition to that, during each new Sphinx version\
    \ release, it is recommended to update the documentation version to point to the\
    \ project release version, either manually or using an automated process.\n\n\
    4. **Auto-Generate the rst Files:** Sphinx generates the HTML documentation from\
    \ reStructuredText (rst) files. These rst files define each webpage and may contain\
    \ autodoc directives, which are used to generate the documentation from docstrings\
    \ in an automatic way. And since there is an automatic way to generate"
  mdcn: "## 以编程方式访问文档字符串\n\n正如前文所述，Python 代码文档是软件开发过程中一个关键且持续的环节。术语“文档字符串”是“documentation\
    \ string”的缩写，用于定义你的源代码——即你的函数、模块或类的功能。通常，它作为常规注释添加在代码函数、模块或方法的头部下方。文档字符串是从代码内部为\
    \ Python 代码创建文档的绝佳方式。这种代码内文档适用于所有模块，并且模块导出的所有函数和类也应包含文档字符串。公共方法（如 `__init__` 构造函数）同样需要文档字符串。一个包可以在其目录下的\
    \ `__init__.py` 文件的模块文档字符串中进行说明。\n\n为了正确编写文档字符串，建议遵循官方的 Python 约定。在这种情况下，由 David\
    \ Goodger 和 Guido van Rossum 本人编写的 PEP 257 – 文档字符串约定，将是一个极佳的参考指南。该 PEP 的目标是“标准化文档字符串的高级结构：它们应包含什么，以及如何表达。”⁴\n\
    \n## 单行文档字符串\n\n由于 Python 的简洁性，文档字符串可以作为单行注释。但请记住，文档字符串的文本应以大写字母开头，并以句号结尾。基于代码通常被阅读的次数远多于被编写的次数这一趋势，强烈建议以命令的形式描述被记录结构的功能，而不是解释它是如何实现的。此外，提及返回给调用者的值类型也有助于理解函数或方法的结果。\n\
    \n关于双引号，只要开头和结尾的引号一致，Python 是相当灵活的，你既可以使用三个单引号，也可以使用三个双引号。你只需确保结束引号与开始引号在同一行。此外，在文档字符串文本的前后无需添加任何空行。\n\
    \n## 多行文档字符串\n\n此外，文档字符串也可以写成多行注释。如果你选择使用多行注释，有两点会发生变化——文档字符串的封装将使用三个单引号或双引号编写，而文档字符串本身的结构将为整个文本赋予更深层的含义。\n\
    \n脚本的文档字符串记录了脚本的功能、命令行语法以及其他变量和文件。在应用此文档字符串时，你可以相当详尽（几屏内容），但同时也要使其足够充分，以便新用户能够正确操作该命令。同时，也需要为专家用户提供所有选项和参数的快速参考。\n\
    \n模块的文档字符串通常应列出模块所需的类、异常和函数，并对每个进行一行摘要。同时，包 `__init__.py` 模块的文档字符串也应列出包导出的模块和子包。\n\
    \n函数或方法的文档字符串应总结其行为，并列出其返回值、副作用、引发的异常以及适用限制。应指明可选参数，作为接口一部分的关键字参数必须记录在案。\n\n类的文档字符串应概述其行为，并列出公共方法和其他变量。如果该类旨在被子类化，并且为子类提供了额外的接口，则该接口应在单独的文档字符串中列出。此外，类构造函数应在其\
    \ `__init__` 方法的文档字符串中进行说明。\n\n如果一个类继承自另一个类，并且其行为主要来自该类，则其文档字符串应提及这一点并概述差异。你可以使用动词“override”来表示子类方法替换了超类方法。此外，你可以使用动词“extend”来表示子类方法调用了超类方法。\n\
    \n## 文档字符串格式\n\n关于文档字符串格式，并非只有一种固定的设置。明确地说，不止一种，并且所有这些格式变体都兼容多行文档字符串。\n\n- **reStructured\
    \ Text (reST)/Sphinx**：这被认为是官方的 Python 文档标准，使用轻量级标记语言 reStructured text (reST)\
    \ 的语法。\n- **Google 文档字符串：** Google 风格的文档字符串。\n- **NumPy/SciPy 文档字符串：** reStructured\
    \ text (reST) 和 Google 文档字符串的结合。\n\n同时，有许多工具可以从文档字符串自动生成文档和 HTML 文档，例如 Sphinx、Epydoc、Doxygen、PyDoc、pdoc\
    \ 以及 Sphinx 的 autodoc 扩展。\n\n例如，PyDoc 是 Python 发行版的一部分，它为控制台、Web 浏览器或 HTML 文档收集有关模块的信息。要了解更多关于其模块、函数、类或方法的信息，可以尝试在\
    \ Python shell 中查看并使用 `help()` 函数。\n\n如前所述，Sphinx 是官方的 Python 文档标准，也被用作 JetBrains\
    \ 的 PyCharm 集成开发环境的默认生成器。基本上，Sphinx 风格利用了轻量级标记语言 reStructuredText (reST) 的语法，旨在既能被文档处理软件（如\
    \ Docutils）处理，又能保持对阅读和编写 Python 源代码的人类开发者的易读性。\n\n遵循 PEP 257 的文档指南将帮助你理解源代码。通过应用\
    \ Sphinx 工具，你将能够从代码中的文档字符串自动生成文档。下面，我们提供一个简单的分步指南，介绍如何使用 Sphinx 轻松地从 Python 代码自动生成整洁且组织良好的文档。\n\
    \n1. **安装 Sphinx：** 你可以直接从 Git 仓库的克隆安装 Sphinx – https://github.com/sphinx-doc/sphinx。你可以通过克隆仓库并从本地克隆安装，或者直接通过\
    \ git 安装：⁵\n\n    ```\n    git clone https://github.com/sphinx-doc/sphinx\n  \
    \  cd sphinx\n    pip install .\n    ```\n\n2. **初始化 Sphinx 配置：** 在项目的根目录中，启动\
    \ `sphinx-quickstart` 以初始化启用默认配置的 sphinx 源目录。运行此命令将提示你填写一些基本配置属性，例如创建单独的源和构建目录，以及指定项目名称、作者姓名和项目版本。\n\
    \n3. **更新 conf.py 文件：** 位于源文件夹中的 `conf.py` 文件描述了 Sphinx 配置并控制 Sphinx 如何构建文档。如果你想修改主题、版本或模块目录，你需要在此处插入这些更改。以下是一些标准的覆盖项：\n\
    \n    - **更新主题：** 如果你想更改 Sphinx 的默认主题（即 alabaster），你会发现许多其他主题可供选择，甚至可以创建自己的主题。其中一个流行的主题是\
    \ `sphinx_rtd_theme`，这是一个现代且适合移动设备的主题。要安装 `sphinx_rtd_theme`，你需要通过在终端运行 `pip install\
    \ sphinx-rtd-theme` 来安装 `sphinx-rtd-theme` Python 包。\n\n    - **添加 Autodoc 的扩展支持：**\
    \ `extensions` 变量被赋值为构建文档所需的扩展列表。例如，如果你计划使用 autodoc 指令从文档中包含文档，你必须通过将 `sphinx.ext.autodoc`\
    \ 添加到扩展列表来激活它。如果你的代码中的文档遵循 Google Python 风格指南，则需要将 `sphinx.ext.napoleon` 附加到扩展列表中。\n\
    \n    此外，在每次发布新的 Sphinx 版本时，建议将文档版本更新为指向项目发布版本，可以手动操作或使用自动化流程。\n\n4. **自动生成 rst\
    \ 文件：** Sphinx 从 reStructuredText (rst) 文件生成 HTML 文档。这些 rst 文件定义了每个网页，并且可能包含 autodoc\
    \ 指令，这些指令用于以自动方式从文档字符串生成文档。由于存在一种自动生成"
