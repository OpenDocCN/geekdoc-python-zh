    \ the pattern is ignored, except when in a character class, or when preceded by\
    \ an unescaped backslash, or within tokens like `*?`, `(?:` or `(?P<...>`. When\
    \ a line contains a `#` that is not in a character class and is not preceded by\
    \ an unescaped backslash, all characters from the leftmost such `#` through the\
    \ end of the line are ignored. This means that the two following regular expression\
    \ objects that match a decimal number are functionally equal:\n\n```python\na\
    \ = re.compile(r\"\"\"\\d +  # the integral part\n          \\.    # the decimal\
