    \nEach and every programming language has a concept called comments. Although\
    \ comments do not change the outcome of a program, they still play an important\
    \ role in programming. Comments are mostly used as statements that are ignored\
    \ by the interpreter or compiler at runtime. Nevertheless, every coding language\
    \ has its syntax, which differentiates a comment from an actual code. Comments\
    \ are a great way to improve the readability of your code, by explaining what\
    \ you might want to be done in code in simple language.\n\nComments could also\
    \ be beneficial during coding as the following functions:\n\n- **Future reference:**\
    \ Imagine that you have written a program that contains a few more hundred lines\
    \ of code without any comments. If you open the program after one or two months,\
    \ then you will find it challenging to understand your code. Moreover, you might\
    \ even forget the role of a code block and would be forced to trace it again just\
    \ to understand its intent. So putting a comment in code saves a lot of time when\
    \ you know that you will have to come back to the code again.\n- **Comments help\
    \ to understand the code of others:** “No man is an island” and in most times\
    \ we usually work in a team structure, having others review the code of one team\
    \ member. Also, you might need to work on an item that was earlier worked on by\
    \ your colleague. In both those cases, you will need to understand the code that\
    \ someone else has scripted. If you have used comments in your code, it makes\
    \ the other person’s experience looking at your code much easier. He can complete\
    \ a useful review, and also chances of defects are much lesser if someone else\
    \ is editing your code.\n- **Code debugging:** It happens sometimes that we need\
    \ to check a part of the code to see whether it is working as expected or not.\
    \ In this case, we can leave a comment on the remaining code. Without comments,\
    \ we will have to go through removing the code to check the output and have to\
    \ enter the same code again. This time-consuming process could be avoided by applying\
    \ comments.\n\n## SINGLE LINE, INLINE, AND MULTILINE COMMENTS\n\nComments are\
    \ useful information that the developers provide to make sure the reader can understand\
    \ the source code. It is applied to explain the logic or a specific part of the\
    \ code. Comments are particularly helpful to someone who is trying to maintain\
    \ or enhance your code when you are no longer around to answer questions about\
    \ it. These are often cited as useful programming techniques that do not take\
    \ part in the output of the program but greatly improve the readability of the\
    \ whole program.\n\nAs a rule, comments in Python begin with a hash mark (#) and\
    \ whitespace character and continue to the end of the line. Typically, comments\
    \ should look something like this:\n\n```\n# This is a comment sample\n```\n\n\
    Because comments do not contribute to execution, when you run a program, you will\
    \ not see any indication of the comment there. Comments are meant to make code\
    \ understandable for humans and are ignored by compilers. In a “Hello, Reader!”\
    \ program, a comment may look like this:\n\n```\n# Print \"Hello, Reader!\" to\
    \ console\nprint(\"Hello, Reader!\")\n```\n\nAnd since Python ignores everything\
    \ after the hash mark and up to the end of the line, you can feel free to insert\
    \ comments anywhere in your code, even inline with other code:\n\n```\nprint(\"\
    It is great work.\") # There is a mistake\n```\n\nWhen you run the above code,\
    \ you will only see the output \"It is great work.\" Everything else would be\
    \ completely dismissed. Additionally, it is highly recommended to keep your comments\
    \ short, concise, and to the point. And, while Python Enterprise Portal 8 (PEP\
    \ 8) on “Style Guide for Python Code” advises writing code at 79 characters or\
    \ fewer per line, it also suggests a maximum of 72 characters for inline comments\
    \ and docstrings. In case your comment is going to exceed that length, then you\
    \ will want to split it out over multiple lines. In the same PEP 8 guide, Guido\
    \ van Rossum adds a few remarks in regards to whitespace usage when commenting.\
    \ To be precise, he states the following:¹\n\n- “Avoid trailing whitespace anywhere.\
    \ Because it’s usually invisible, it can be confusing: a backslash followed by\
    \ a space and a newline does not count as a line continuation marker. Some editors\
    \ don't preserve it and many projects (like CPython itself) have pre-commit hooks\
    \ that reject it.\n- Always surround these binary operators with a single space\
    \ on either side: assignment (=), augmented assignment (+=, -= etc.), comparisons\
    \ (==, <, >, !=, <>, <=, >=, in, not in, is, is not), Booleans (and, or, not).\n\
    - If operators with different priorities are used, consider adding whitespace\
    \ around the operators with the lowest priority. **Use your own judgment**; however,\
    \ never use more than one space, and always have the same amount of whitespace\
    \ on both sides of a binary operator.”\n\n**Inline comments** are applied on the\
