    # Locating Modules


    When you import a module, the Python interpreter searches for the module in the
    current directory. And in case the module is not found, Python then searches each
    directory in the shell variable PYTHONPATH. If that fails too, Python checks the
    default path. On UNIX, this default path is normally/usr/local/lib/python/.

    To be precise, the module search path is stored in the sys- tem module sys as
    the sys.path variable. The sys.path vari- able contains the current directory,
    PYTHONPATH, and the installation-dependent default. The PYTHONPATH is an environment
    variable, consisting of a list of directories and the syntax of PYTHONPATH is
    similar to that of the shell variable PATH.

    Here is the common PYTHONPATH from a Windows system –


    ```

    set PYTHONPATH = c:\python20\lib;

    ```


    And here is the basic PYTHONPATH from a UNIX system –


    ```

    set PYTHONPATH = /usr/local/lib/python

    ```


