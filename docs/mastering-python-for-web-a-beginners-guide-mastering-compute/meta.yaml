    processes. Corporations had plenty of data but no simple and clear way to access
    it. That is when they commenced performing quantitative analysis on financial
    data using Python. Other packages such as NumPy, scikit, and Matplotlib had a
    comparatively heavy development background, and Python soon became the top choice
    for data science.


    There was another driver for Python that made it the go-to language for data science,
    the boot camps. And as web development exploded, so did boot camps. Python has
    always been free to access, learning the language. And, consequently, the first
    language taught in many of these boot camp programs was Python. High schools and
    colleges all around the world started teaching coding as a core skill, and much
    of that was based on Python.


    Nowadays, if you want to become a full-stack developer, you usually need to start
