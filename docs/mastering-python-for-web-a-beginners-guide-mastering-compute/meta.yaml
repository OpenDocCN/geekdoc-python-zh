  - '[PAGE 149]


    # PYTHON SCRIPTS AND MODULES


    In computing, the term script is used to refer to a file containing a logical
    sequence of orders or a set processing file. This usually comes as a simple program
    that is stored in a plain text file. Thus, a plain text file containing Python
    code that is designed to be directly executed by the user is called script, an
    informal term that means a top-level program file. On the other hand, a plain
    text file containing Python code that is created to be imported and used from
    another Python file is what we call a module. The main difference between a module
    and a script is that modules are meant to be imported, while scripts are made
    to be directly executed. In any case, the important thing is to learn how to run
    the Python code you write into your modules and scripts. And scripts are always
    processed by an interpreter, which is responsible for executing each command sequentially.


    # What’s the Python Interpreter?


    Python is an excellent programming tool that allows you to be productive in a
    wide variety of ways. Python also has a piece of software called an interpreter.
    The interpreter is the program you are going to need to run Python code and scripts
    properly. In technical terms, the interpreter is a layer of software that operates
    between your program and computer hardware to get your code running. Depending
    on the code implementation you use, the interpreter can be:


    +   - A program written in Python itself usually uses PyPy interpreter.

    - A program written in C run with CPython, which is the core implementation of
    the language.'
- md: '## Mastering Python for Web


    - A program written in Java operates with Jython.

    - A program implemented in .NET, usually use an open-source IronPython interpreter.


    Given examples of interpreters are able to run Python code in two different ways:
    as a script or module or alternatively as a piece of code scripted into an interactive
    session. Nevertheless, whatever form the interpreter can take, the code you write
    will have to be run by this program. Therefore, the first condition to be able
    to implement Python scripts is to have the interpreter correctly installed on
    your system.


    When you start to run Python scripts, a multi-step process sets in motion. In
    this process, the interpreter will:


    - Process all the statements of your script in sequential order.

    - Compile the source code to an intermediate format, also known as bytecode.

    - Send away the code for execution.


    This bytecode in this case is used as a translation tool of the code into a lower-level
    language that could be platform-independent. Its main purpose is to optimize code
    realization. So, the next time the interpreter runs your code, it will bypass
    this compilation process. To put it simply, this code optimization is only necessary
    to proceed with modules or other imported files, and not with executable scripts.


    At this step, something known as a Python Virtual Machine (PVM) comes into play.
    The PVM is the runtime engine that is used for iteration over the instructions
    of your bytecode to test and run them one by one. The PVM is not just a separate
    component of Python, it is an essential part of the Python system you need to
    install on your machine. Technically, the PVM is the last step of what is called
    the Python interpreter.


    The whole course to run Python scripts is known as the Python Execution Model.
    In addition, there are many other ways to run Python scripts:


    ### Using the Python Command


    Python command is the most basic and practical way to run Python scripts. All
    you need to do to run Python scripts with the python command is to open a command-line
    and type in the word python, or python3 if you have both versions, followed by
    the path to your script. To illustrate:


    ```

    $ python3 hello.py

    Hello There!

    ```


    If everything works fine, then after you press Enter, you will be able to see
    the phrase Hello There! on your screen. With these simple steps, you have just
    run a Python script. But in case, if it does not work right, it is recommended
    to check your system PATH, your Python installation, the way you created the hello.py
    script, space where you saved it.


    At times, it is also useful to save the output of a script for later analysis.
    You can do it in the following manner:


    ```

    $ python3 hello.py > output.txt

    ```


    This operation redirects the output of your script to output.txt, rather than
    to the standard system output (stdout). The process is also known as stream redirection
    and is available on both Windows and Unix-like systems. If output.txt does not
    exist, then it''s automatically created. On the other hand, if the file already
    exists, then its contents will be replaced with the new output.


    Consequently, if you want to add the output of consecutive executions to the end
    of output.txt, then you must use two angle brackets (>>) instead of one, just
    like this:


    ```

    $ python3 hello.py >> output.txt

    ```


    ### Using the Script Filename


    On recent versions of Windows, it is convenient to run Python scripts by simply
    entering the name of the file containing the code at the command space:


    ```

    C:\devspace> hello.py

    Hello There!

    ```


    This procedure is possible because Windows has the system registry and the file
    association to assign which program to use for running a particular file. On Unix-like
    systems, such as GNU/Linux, you can achieve something similar by adding a first
    line with the text #!/usr/bin/env python, just as you do with hello.py.


    For Python, this translates as a simple comment, but this line indicates what
    program must be activated to run the file for the operating system. This line
    opens with the #! character combination, which is commonly called hashbang or
    shebang and continues with the path to the interpreter. There are two ways to
    specify the path to the interpreter:


    ```

    #!/usr/bin/python: used to script the absolute path.


    #!/usr/bin/env python: for when you are using the operating system env command,
    which locates and implements Python by searching the PATH environment variable.

    ```


    This last option is useful for Unix-like systems to locate the interpreter in
    different places. Eventually, to execute a script like this one, you need to assign
    execution permissions to it and then type in the filename at the command line.


    ### How to Run Python Scripts Interactively


    It is also feasible to run Python scripts and modules from an interactive session.
    This possibility offers you a variety of possibilities. When you take advantage
    of importing a module, you can load its contents for later access and use. The
    interesting point about this process is that import runs the code as its final
    step.


    If the module contains only classes, functions, variables, and constants definitions,
    you probably will not be able to track if the code was actually run, but when
    the module includes calls to functions, methods, or other statements that generate
    visible results, then you will be able to observe its execution. This provides
    you with another option to run Python scripts:


    ```

    >>> import hello

    Hello There!

    ```


    You should take note that this option works only once per session. After the first
    import, successive import executions will be of no use, even if you modify the
    content of the module. This is because import operations are expensive and could
    run only once. To illustrate with an example:


    ```

    >>> import hello  # Do nothing

    >>> import hello  # Do nothing again

    ```


    These two import operations do nothing because Python knows that hello has already
    been imported. However, there are some requirements for this method to work –
    firstly, the file with the Python code must be located in your current working
    directory. And secondly, the file should be in the Python Module Search Path (PMSP),
    where Python can look for the modules and packages you import.


    ### How to Run Python Scripts from an IDE or a Text Editor


    When scripting larger and more complicated applications, it is recommended that
    you use an integrated development environment (IDE) or an advanced text editor.
    Most of these programs have the capacity to run your scripts from inside the environment
    itself. It is common for them to include a Run or Build command, which is usually
    available from the toolbar or from the main menu.


    Python''s standard distribution package already includes IDLE as the default IDE,
    and you can use it to write, debug, modify, as well as to run your modules and
    scripts. Other IDEs such as Eclipse-PyDev, PyCharm, Eric, and NetBeans also let
    you run Python scripts from inside the environment. In addition, you also have
    advanced text editors like Sublime Text and Visual Studio Code that also allow
    you to run your scripts.


    ### How to Run Python Scripts from a File Manager


    Running a script simply by double-clicking on its icon in a file manager is another
    easy way to run your Python scripts. This option may not be widely popular in
    the development stage, but it may be useful when you are ready to release your
    code for production. However, in order to be able to run your scripts with a double-click;
    you should satisfy some conditions that will depend on your operating system.


    Windows, for instance, associates the extensions .py and .pyw with the programs
    python.exe and pythonw.exe. This allows you to run your scripts by double-clicking
    on them. And when you have a script with a command-line interface, it is likely
    that you only see the flash of a black window on your screen. To avoid this from
    happening, you can add a statement like input(''Press Enter to Continue...'')
    at the end of the script. And this way, the program will not process further until
    you press Enter. Nonetheless, if your script has any error, the execution will
    be aborted before reaching the input() statement, and you still will not be able
    to watch the result.


    On Unix-like systems, you will be able to run your scripts by double-clicking
    on them in your file manager by applying the shebang variable that we have mentioned
    before. Likewise, you may not notice any results on screen when it comes to command-line
    interface scripts.


    And since the execution of scripts through double-click has several limitations
