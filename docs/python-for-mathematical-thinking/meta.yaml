    \ G(x, \\xi) f(\\xi) \\, d\\xi.$$\n\n线性性确保了叠加原理；边界数据已内置于 $G$ 中。\n\n**自伴性与对称性**\
    \ 如果 $L$ 是形式自伴的（$q = p'$），则 $G$ 满足 $G(x, \\xi) = G(\\xi, x)$。\n\n## 在偏微分方程和边值问题中的应用\n\
    \n**矩形区域中的拉普拉斯方程** 求解 $\\nabla^2 \\phi = -\\rho(x, y)$ 在 $0 < x < L$，$0 < y <\
