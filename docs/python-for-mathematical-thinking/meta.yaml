    \sum_{m=-\ell}^\ell Q_\ell^m Y_\ell^m(\theta, \phi),$


    $Q_\ell^m = \int_{|\mathbf{r}''|<R} \rho(\mathbf{r}'') r''^\ell Y_\ell^{m*}(\theta'',
    \phi'') d^3\mathbf{r}''$.


