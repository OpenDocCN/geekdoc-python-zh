    # Multivariate Generating Functions and Applications


    **Definition** For bivariate sequence $a_{m,n}$,


    $$A(x, y) = \sum_{m,n \ge 0} a_{m,n} x^m y^n.$$


    If variables track distinct combinatorial statistics (e.g. size and weight), partial
    differentiation extracts moments.


    **Two-Variable Catalan Triangle** Dyck paths parameterised by number of peaks
    $k$: $C(x, y) = 1 + \sum_{n \ge 1} \sum_{k \ge 1} c_{n,k} x^n y^k$, satisfies
    quadratic functional equation $C = 1 + yxC^2$, solving to $C = \frac{1-\sqrt{1-4xy}}{2xy}$.
    Coefficient $c_{n,k} = \frac{k}{n} \binom{2n-k-1}{n-1}$.


    **Bivariate Lagrange Inversion** For implicit $A = x\Phi(A, y)$, coefficients
    derive from $[a^n]A^m = \frac{m}{n} [u^{n-m}]\Phi^n(u, y)$, enabling enumeration
    of $k$-ary trees with marked leaves or coloured edges.


    # Applications


    +   (a) Random walks in $\mathbb{Z}^2$ constrained to the quarter-plane; generating
    functions solve boundary value problems yielding harmonic functions for hitting
    probabilities.


    (b) Multivariate EGFs encode labelled graphs: exponential formula implies EGF
    of connected graphs $C(z)$ satisfies $\exp(C(z)) = G(z)$, where $G(z)$ counts
    all graphs.


    **Example 7.2.7 (Asymptotics via Singularity Analysis)** For partition OGF $P(z)
    = \prod_{m \ge 1} (1 - z^m)^{-1}$, singularity at $z = 1$ controls $p(n) \sim
    \frac{1}{4n\sqrt{3}} e^{\pi \sqrt{2n/3}}$ (Hardy–Ramanujan). Sage''s `asymptotic_expansion`
    numerically validates this against $p(1000)$.


    # 7.2.3 Advanced Topics in Combinatorics


    Combinatorics attains its full depth when algebra, topology, and probability intertwine
    with counting. In this final subsection we explore three paradigmatic viewpoints:
    symmetry-aware enumeration through group actions (Pólya theory); unavoidable patterns
    in large structures (Ramsey and extremal theory); and the non-constructive yet
    powerful *probabilistic method*. Python''s `sage` interface and `networkx` offer
    practical laboratories for each concept—although here we restrict ourselves to
    illustrative snippets.'
- md: "## Pólya’s Enumeration Theorem and Group Actions\n\nLet a finite group $G$\
    \ act on a set $X$ of “positions” by permutations. Colour each position with one\
    \ of $m$ colours. Two colourings are *equivalent* if a group element transforms\
    \ one into the other. The number of inequivalent colourings equals\n\n$$\\frac{1}{|G|}\
    \ \\sum_{g \\in G} m^{c(g)},$$\n\nwhere $c(g)$ is the number of cycles of $g$\
    \ acting on $X$—Burnside’s lemma. Pólya’s refinement records colour patterns via\
    \ the **cycle index**\n\n$$Z_G(s_1, s_2, \\ldots) = \\frac{1}{|G|} \\sum_{g \\\
    in G} \\prod_{j \\ge 1} s_j^{c_j(g)},$$\n\n$c_j(g) = \\text{\\# of } j\\text{-cycles\
    \ of } g$. Substituting $s_j \\mapsto \\sum_{k=1}^m x_k^j$ yields a multivariate\
    \ polynomial whose coefficients count colourings with specified colour multiplicities.\n\
    \n**Example: Necklaces of Length $n$ with $m$ Colours** Group $G = C_n$ acts by\
    \ rotation. Cycle type of rotation by $d$ positions decomposes into $\\gcd(d,\
    \ n)$ cycles of length $n / \\gcd(d, n)$. Hence\n\n$$Z_{C_n} = \\frac{1}{n} \\\
    sum_{d=0}^{n-1} s_{\\gcd(d,n)}^{n / \\gcd(d,n)}.$$\n\nFor binary necklaces of\
    \ length 6:\n\n$$\\text{ne}_2(6) = \\frac{1}{6}(2^6 + 2^3 + 2^2 + 2^3 + 2^2 +\
    \ 2^1) = 14.$$\n\n```python\nimport sageall as sg\ndef binary_necklaces(n):\n\
    \    M = sg.IntegerModRing(n)\n    return sg.NecklaceEnumerator(M, 2).count()\n\
    print(binary_necklaces(6)) # 14\n```\n\n**Chemical Isomers** For benzene derivatives,\
    \ $G = D_6$ acts on six labelled sites; substituting $s_j \\mapsto r_1^j + r_2^j$\
    \ distinguishes mono- and dichloro isomers vs. hydrogen.\n\n## Ramsey Theory and\
    \ Extremal Combinatorics\n\n**Ramsey Numbers** $R(s, t)$ is the least $n$ such\
    \ that any red/blue edge-colouring of $K_n$ contains a red $K_s$ or a blue $K_t$.\
    \ Basic bounds:\n\n$$\\binom{R(s, t)}{s} 2^{-\\binom{s}{2}} + \\binom{R(s, t)}{t}\
    \ 2^{-\\binom{t}{2}} < 1$$\n\n(yields Erdős–Szekeres upper bound), while probabilistic\
    \ method furnishes $R(k, k) > 2^{k/2}$.\n\n**Turán's Theorem** Let $\\text{ex}(n,\
    \ K_r)$ denote maximum edges in $n$-vertex graph without $K_r$ subgraph. The extremal\
    \ graph is the $(r-1)$-partite Turán graph $T_{r-1}(n)$, giving\n\n$$\\text{ex}(n,\
    \ K_r) = \\left(1 - \\frac{1}{r-1}\\right)\\frac{n^2}{2} + O(1).$$\n\n**Erdős–Stone\
    \ Theorem** For non-bipartite $H$, $\\lim_{n \\to \\infty} \\frac{\\text{ex}(n,\
    \ H)}{\\binom{n}{2}} = 1 - \\frac{1}{\\chi(H) - 1}$, reducing extremal densities\
    \ to chromatic numbers.\n\n**Example 7.2.8 (Ramsey $R(3, 3)$ via Brute Force)**\n\
    \n```python\nimport itertools, random\ndef has_monochromatic_triangle(edges):\n\
    \    for a,b,c in itertools.combinations(range(6), 3):\n        e = {(a,b), (a,c),\
    \ (b,c)}\n        colours = {edges[pair] for pair in e}\n        if len(colours)\
    \ == 1: return True\n    return False\n\nN=6\nfor _ in range(1000):\n    edges\
    \ = {(i,j): random.choice('RB') for i in range(N) for j in range(i)}\n    if not\
    \ has_monochromatic_triangle(edges):\n        break\nelse: print(\"All colourings\
    \ had a triangle\") # confirms R(3,3)=6\n```\n\n## Probabilistic Method in Combinatorics\n\
    \nThe probabilistic method proves existence of objects by showing that a suitably\
    \ defined probability space assigns positive probability to the desired property.\
    \ A **first-moment** argument bounds the expected number of “bad” configurations;\
    \ a **second-moment** or **Lovász Local Lemma (LLL)** yields stronger, often constructive,\
    \ results.\n\n**Erdős' Lower Bound for $R(k, k)$** Colour edges of $K_n$ red/blue\
    \ independently with probability 1/2. Expected monochromatic $K_k$ count is\n\n\
    $$\\mathbb{E} = 2\\binom{n}{k}2^{-\\binom{k}{2}}.$$\n\nIf $\\mathbb{E} < 1$, then\
    \ some colouring avoids monochromatic $K_k$. Choosing $n < 2^{k/2}$ achieves this—establishing\
    \ exponential growth of Ramsey numbers.\n\n**LLL (Symmetric)** If events $\\{A_i\\\
    }$ each satisfy $\\Pr(A_i) \\le p$ and each is mutually independent of all but\
    \ $d$ others, and $ep(d+1) \\le 1$, then $\\Pr(\\bigcap \\overline{A_i}) > 0$.\
    \ Example: a $k$-CNF Boolean formula with at most $2^{k-2}$ clauses per variable\
    \ is satisfiable.\n\n**Applications: Discrepancy and Hashing** Given $n$ vectors\
    \ in $\\{-1, 1\\}^m$, there exists a colouring with discrepancy $O(\\sqrt{m} \\\
    log n)$ (Beck–Fiala); randomised rounding plus LLL constructs such a colouring.\
    \ In hashing, $k$-wise independent families guarantee load $O(\\log n / \\log\
    \ \\log n)$ with high probability upon distributing $n$ balls into $n$ bins.\n\
    \n### Example 7.2.9 (Simple LLL via networkx)\n\n```python\nimport networkx as\
    \ nx, random\ndef lll_kcnf(k, vars, clauses):\n    assignment = {v: random.choice([True,\
    \ False]) for v in vars}\n    # Moser-Tardos resampling\n    bad = [c for c in\
    \ clauses if not any(lit(assignment) for lit in c)]\n    while bad:\n        clause\
    \ = random.choice(bad)\n        for lit in clause: assignment[lit.var] = random.choice([True,\
    \ False])\n        bad = [c for c in clauses if not any(lit(assignment) for lit\
    \ in c)]\n    return assignment\n```\n\n## 7.3 Graph Theory\n\nGraphs provide\
    \ an abstract language for pairwise relationships—from road networks to protein–protein\
    \ interactions. A *simple graph* $G = (V, E)$ consists of a finite vertex set\
    \ $V = \\{v_1, \\dots, v_n\\}$ and an edge set $E \\subseteq \\{\\{u, v\\} \\\
    mid u, v \\in V, u \\neq v\\}$. Unless stated otherwise graphs here are simple,\
    \ undirected, and finite. Python's `networkx` library wraps common data structures,\
    \ while `igraph` and `sagedata` scale to millions of edges.\n\n### 7.3.1 Basic\
    \ Concepts in Graph Theory\n\nKey parameters include the *order* $|V|$, the *size*\
    \ $|E|$, the *degree* $\\deg(v) = |\\{u \\in V \\mid \\{u, v\\} \\in E\\}|$, and\
    \ the *adjacency matrix* $A(G) = [a_{uv}]$ where $a_{uv} = 1$ if $\\{u, v\\} \\\
    in E$, else 0. Handshaking lemma: $\\sum_{v \\in V} \\deg(v) = 2|E|$.\n\nWalks,\
    \ paths, cycles, and connectedness follow their standard graph-theoretic definitions;\
    \ depth–first and breadth–first traversals generate spanning trees.\n\n## Graph\
    \ Representation in Python\n\n**Adjacency List vs. Matrix** Adjacency lists store\
    \ neighbours per vertex—optimal for sparse graphs ($O(|V| + |E|)$ memory); adjacency\
    \ matrices cost $|V|^2$ but allow $O(1)$ edge queries and vectorised linear-algebra\
    \ kernels.\n\n```python\nimport networkx as nx\n\n# Build a simple graph\nG =\
    \ nx.Graph()\nG.add_edges_from([(0,1), (0,2), (1,3), (2,3), (3,4)])\n\n# Adjacency\
    \ list\nprint(G.adj[0]) # neighbours of 0\n\n# Adjacency matrix (NumPy CSR)\n\
    A = nx.to_scipy_sparse_array(G, dtype=int)\nprint(A.todense())\n```\n\n**Edge\
    \ Attribute Dictionaries** NetworkX attaches weights/capacities:\n`G[0][1]['capacity']\
    \ = 15`\n\n**Algorithmic Primitives** Shortest path (Dijkstra), maximum flow (Edmonds–Karp),\
    \ and centrality scores are one-liners.\n\n```python\nlength = nx.shortest_path_length(G,\
    \ source=0, target=4, weight=None)\nflow_val, flow_dict = nx.maximum_flow(G, 0,\
    \ 4, capacity='capacity')\n```\n\n## Graph Isomorphism and Subgraph Isomorphism\n\
    \nTwo graphs $G = (V, E)$ and $G' = (V', E')$ are *isomorphic* if a bijection\
    \ $\\varphi : V \\to V'$ preserves adjacency ($\\{u, v\\} \\in E \\iff \\{\\varphi(u),\
    \ \\varphi(v)\\} \\in E'$). The decision problem GI lies in NP; Babai (2020) showed\
    \ quasi-polynomial time, yet full polynomial status is open.\n\nPractical solvers—nauty/traces,\
    \ `networkx.algorithms.isomorphism` (Weisfeiler–Lehman + VF2)—distinguish graphs\
    \ with thousands of vertices.\n\n```python\nfrom networkx.algorithms import isomorphism\n\
    GM = isomorphism.GraphMatcher(G, G.copy())\nprint(\"Isomorphic\" if GM.is_isomorphic()\
    \ else \"Different\")\n```\n\n**Subgraph Isomorphism** Given graphs $H$ and $G$,\
    \ decide whether $H$ embeds as an induced subgraph of $G$. The problem is NP-complete\
    \ (Karp, 1972). Nonetheless VF2 backtracking with feasibility pruning solves patterns\
    \ up to 30–40 nodes rapidly for sparse $G$.\n\n```python\nP = nx.path_graph(3)\n\
    matcher = isomorphism.GraphMatcher(G, P)\nprint(matcher.subgraph_is_isomorphic())\
    \ # any 3-path in G?\n```\n\n## Planar Graphs and Euler's Formula\n\nA graph is\
    \ *planar* if it admits an embedding in $\\mathbb{R}^2$ with no edge intersections.\
    \ Euler (1752) showed any connected planar embedding partitions the sphere into\
    \ $F$ faces satisfying\n\n$$|V| - |E| + F = 2$$\n\n**Proof** Induct on $|E|$.\
    \ A tree ($|E| = |V| - 1$) has $F = 1$. Removing a non-bridge edge reduces $|E|$\
    \ and $F$ by 1 while preserving planarity; the invariant holds.\n\n**Consequences**\
    \ For planar $G$ with $|V| \\ge 3$:\n\n$$|E| \\le 3|V| - 6, \\quad \\text{and\
    \ if } G \\text{ has no triangles } |E| \\le 2|V| - 4.$$\n\nHence $K_5$ ($10 >\
    \ 3 \\cdot 5 - 6$) and $K_{3,3}$ ($9 > 2 \\cdot 6 - 4$ after noting bipartiteness\
    \ implies triangle-free) are non-planar—Kuratowski's theorem states that these\
    \ are the *only* minimal obstructions.\n\n```python\nimport networkx as nx, networkx.algorithms.planarity\
    \ as plan\n\nK5 = nx.complete_graph(5)\nprint(plan.check_planarity(K5)[0]) # False\n\
    \nK33 = nx.complete_bipartite_graph(3,3)\nprint(plan.check_planarity(K33)[0])\
    \ # False\n```\n\n**Dual Graphs and Face Counting** In a planar embedding, each\
    \ face corresponds to a dual vertex; edges cross their primal counterparts, yielding\
    \ $|E^*| = |E|$ and $|V^*| = F$. Euler's formula in dual form: $|V^*| - |E^*|\
    \ + F^* = 2$. Self-duality of the cube and octahedron illustrates polyhedral symmetry.\n\
    \n### 7.3.2 Advanced Topics in Graph Theory\n\nThe minimalist definitions of graphs\
    \ belie the analytic depth hidden in their algebraic and probabilistic avatars.\
    \ In this final subsection we sample three pillars of modern graph theory—colourings,\
    \ spectra, and randomness—each connecting discrete structure with continuous mathematics\
    \ and algorithmic practice.\n\n## Graph Colouring and Chromatic Polynomials\n\n\
    A *proper $k$-colouring* of a graph $G = (V, E)$ is a map $\\kappa : V \\to \\\
    {1, \\dots, k\\}$ such that adjacent vertices receive distinct colours. The least\
    \ $k$ admitting a proper colouring"
