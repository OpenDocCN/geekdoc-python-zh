    # 6.1.2 Higher-Order ODEs


    Higher-order linear differential equations enrich the analytic repertoire with
    reduction techniques, systematic ansätze, and powerful integral kernels. Python''s
    sympy symbolic engine and scipy.integrate numerical solvers validate each step.


    # Reduction of Order and Method of Undetermined Coefficients


    Given a second-order homogeneous linear equation


    $$y'''' + P(x)y'' + Q(x)y = 0$$


    and one non-trivial solution $y_1(x)$, the *reduction-of-order* substitution $y_2
    = y_1 u$ with $u'' = v$ yields


    $$v'' + \left(2\frac{y_1''}{y_1} + P\right)v = 0 \implies v(x) = C \exp\left[-\int
    \left(2y_1''/y_1 + P\right) dx\right].$$


    Integrating twice delivers the second linearly independent solution.'
