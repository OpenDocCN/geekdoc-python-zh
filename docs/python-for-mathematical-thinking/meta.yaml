  md: '# 11.3 Topological Data Analysis


    # 11.3.1 Introduction to TDA


    Classical statistics pivots on moments, correlations, and low-order geometry;
    yet intricate data manifolds often hide structures that evade linear lenses. *Topological
    Data Analysis* (TDA) embraces the dictum that "shape matters", distilling invariant
    signatures of a point cloud that persist across scales. By constructing a filtered
    simplicial complex and tracking the birth and death of $k$-dimensional holes,
    TDA quantifies global organisational patterns while remaining agnostic to ambient
    dimension. The resulting summaries—*barcodes* and *persistence diagrams*—serve
    as coordinates in the space of shapes, amenable to statistical manipulation and
    machine learning pipelines.


    # Persistent Homology and Barcodes


    Let $X = \{x_1, \dots, x_n\} \subset \mathbb{R}^d$ be a point cloud endowed with
    Euclidean metric $d(\cdot, \cdot)$. For $\varepsilon \ge 0$ form the Vietoris–Rips
    complex


    $$\mathrm{VR}_{\varepsilon}(X) = \{\sigma \subseteq X : d(x_i, x_j) \le \varepsilon
    \; \forall x_i, x_j \in \sigma\},$$


    whose $k$-simplices encode all $(k+1)$-cliques of diameter $\le \varepsilon$.
    As $\varepsilon$ increases the family $\{\mathrm{VR}_{\varepsilon}\}_{\varepsilon
