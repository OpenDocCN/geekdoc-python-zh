    **Algebraic Connectivity** $\lambda_2(L) > 0$ iff $G$ is connected (Fiedler 1973).
    Moreover Cheeger''s inequality relates $\lambda_2$ to the edge-expansion $h(G)$:


    $$\frac{\lambda_2}{2} \leq h(G) \leq \sqrt{2\lambda_2}.$$


    Thus sparse graphs with large $\lambda_2$ (simultaneously small degree and strong
    connectivity) are *expanders*; they undergird network design and error-correcting
    codes.


    **Spectral Clustering** For weighted graph $W$, embed vertices into $\mathbb{R}^k$
    using the eigenvectors of $\mathcal{L}$ associated with the smallest non-zero
    eigenvalues; apply $k$-means. This approximates the NP-hard *normalised-cut* partition.


    # **Example 7.3.2 (Algebraic Connectivity of Random Geometric Graph)**


    ```

    python

    import networkx as nx, numpy as np, scipy.sparse.linalg as spla

    G = nx.random_geometric_graph(250, radius=0.16, seed=1)

    L = nx.normalized_laplacian_matrix(G)

    λ2 = spla.eigsh(L, k=2, which=''SM'', return_eigenvectors=False)[1]

    print(f"λ2 ≈ {λ2:.4f}")

    ```


    **Eigenvalue Interlacing** For induced subgraph $H$, eigenvalues interlace: $\lambda_i(L(G))
    \leq \lambda_i(L(H)) \leq \lambda_{i+|V|-|V_H|}(L(G))$, powerful in extremal problems
    (e.g. bounding independence number).


    **Graph Energy** Sum of absolute eigenvalues of $A$ models $\pi$-electron energies
    in chemistry; minimal energy graphs coincide with bipartite chains.


    # **Random Graphs and Erdős–Rényi Model**


    Let $G(n, p)$ denote a graph on vertex set $\{1, \ldots, n\}$ where each of the
    $\binom{n}{2}$ edges appears independently with probability $p$.


    **Threshold Phenomena** For a monotone property $\mathcal{P}$ there is a threshold
    function $p^*(n)$ such that $\Pr\{G(n, p) \in \mathcal{P}\} \to 0$ for $p \ll
    p^*$ and $\to 1$ for $p \gg p^*$. Examples:


    $$\text{Connectivity: } p^* \sim \frac{\log n}{n},$$


    $$\text{Hamiltonicity: } p^* \sim \frac{\log n + \log \log n}{n}.$$


    **Phase Transition of Giant Component** Set $p = c/n$. If $c < 1$ all components
    have size $O(\log n)$; if $c > 1$ there is w.h.p. a unique component of size $\Theta(n)$.'
