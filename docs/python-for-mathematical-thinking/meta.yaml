    - \boldsymbol{\mu})^\top \Sigma^{-1} (\mathbf{x} - \boldsymbol{\mu})$ exceeds
    $\chi^2_{p, 1-\alpha}$ quantile ($\alpha \sim 10^{-3}$).'
