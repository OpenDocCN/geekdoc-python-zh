    **RSA Outline** Choose distinct 1024-bit primes $p, q$, set $N = pq$ and $\varphi(N)
    = (p-1)(q-1)$. Public exponent $e$ satisfies $\gcd(e, \varphi(N)) = 1$. Private
    key $d \equiv e^{-1} \pmod{\varphi(N)}$. Encryption: $c \equiv m^e \pmod{N}$;
    decryption: $m \equiv c^d \pmod{N}$. Security rests on hardness of factoring $N$
    given only $(N, e)$.


    # Greatest Common Divisor (GCD) and Least Common Multiple (LCM)


    For $a, b \neq 0$:


    $$\text{lcm}(a, b) = \frac{|ab|}{\gcd(a, b)},$$


    since prime exponents in $ab$ split into max and min resp. Generalise to $n$ integers
    by associativity.


    **Example 7.1.2 (Chinese Remainder Theorem (CRT))** Pairwise coprime moduli $m_1,
    \dots, m_k$ yield a ring isomorphism $\mathbb{Z}/M\mathbb{Z} \cong \prod_i \mathbb{Z}/m_i\mathbb{Z}$,
    $M = \prod m_i$. Solve


    $$x \equiv 2 \pmod{3}, \quad x \equiv 3 \pmod{4}, \quad x \equiv 1 \pmod{5}.$$


    Compute $M_i = M/m_i$ and inverses $M_i^{-1} \pmod{m_i}$ to obtain $x \equiv \sum
    2 \cdot 20 \cdot 2 + 3 \cdot 15 \cdot 3 + 1 \cdot 12 \cdot 1 = 173 \equiv 23 \pmod{60}$.


    ```

    from sympy.ntheory.modular import crt

    print(crt([3,4,5], [2,3,1])) # (23, 60)

    ```


    # Fermat''s Little Theorem and Wilson''s Theorem


    **Fermat''s Little Theorem (FLT)** If $p$ is prime and $a \not\equiv 0 \pmod{p}$,
    then


    $$a^{p-1} \equiv 1 \pmod{p}.$$


    *Proof* Multiplication by $a$ permutes the non-zero residue classes.


    **Euler''s Theorem** Generalises FLT: $a^{\varphi(m)} \equiv 1 \pmod{m}$ for $\gcd(a,
    m) = 1$.


    **Example 7.1.3 (Modular Inverse via FLT)** For prime $p$, $a^{-1} \equiv a^{p-2}
    \pmod{p}$.


    ```

    def modinv_prime(a, p): return pow(a, p-2, p)

    ```


    # Wilson''s Theorem


    $$p \text{ prime} \iff (p-1)! \equiv -1 \pmod{p}.$$


    Though not computationally efficient for large $p$, it underpins proofs of FLT
    and provides primality certificates (e.g. for $p = 2, 3, 5$).'
