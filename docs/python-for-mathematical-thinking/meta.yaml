    text{val}}$ 视为黑盒；通过高斯过程 $\\mathcal{GP}(m, k)$ 建模，并通过最大化采集函数（期望改进）选择下一个点。以次线性遗憾收敛到最优解。\n\
    \n## 交叉验证\n\n$k$ 折交叉验证将数据分成 $k$ 个块；轮换验证折，平均风险。嵌套交叉验证：外层循环估计泛化能力，内层循环选择 $\\lambda$，防止乐观偏差。\n\
    \n## 实用步骤\n\n- (i) 调优前缩放输入（均值-方差或最小-最大）。\n- (ii) 固定架构族，运行*粗略*随机搜索（$\\sim 30$ 次试验），学习率对数范围\
