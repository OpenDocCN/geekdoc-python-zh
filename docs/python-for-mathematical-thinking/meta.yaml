    \ x*(ρ-z)-y, x*y-β*z]\nsol = solve_ivp(lor, [0, 200], [3,2,7], max_step=.02)\n\
    x = sol.y[0]\nϕ = false_nearest(x, τ=15, m_max=12)\nplt.plot(range(1,13), ϕ, 'o-');\
    \ plt.xlabel('m'); plt.ylabel('ϕ_m'); plt.show()\n```\n\nIn the Lorenz example\
    \ $\\phi_m$ falls below 1% at $m^* = 5$, matching the heuristic $m \\approx 2D_{KY}\
