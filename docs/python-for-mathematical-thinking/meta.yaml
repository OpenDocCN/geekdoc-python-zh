    text{Var}(\\hat{I}_N) = \\frac{\\sigma^2}{N},$$\n\n其均方根误差为 $O(N^{-1/2})$，与维度无关。\n\
    \n#### 方差缩减\n\n- (a) *重要性采样*：从概率密度函数 $p$ 采样并加权 $f/p$，最优的 $p^\\star \\propto |f|$\
