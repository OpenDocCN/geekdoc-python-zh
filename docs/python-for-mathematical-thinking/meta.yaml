    # 1.2.1 Installing Python and Essential Libraries


    # CPython and Anaconda Distributions


    The reference interpreter CPython compiles C source into bytecode executed by
    the CPython Virtual Machine. Installation via `python.org` ensures the latest
    stable release, but minimalists must subsequently `pip install numpy scipy matplotlib
    sympy`. The *Anaconda* distribution, by contrast, ships a curated set of $\approx
    250$ scientific packages—pre-compiled against Intel MKL—together with the `conda`
    package manager. This turnkey approach avoids the fragile compile chains required
    for LAPACK or OpenBLAS on Windows. Verify a clean install with:


    ```

    >>> import sys, numpy, sympy, scipy

