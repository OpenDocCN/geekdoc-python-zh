    # Immediate Consequences


    $\mathbb{P}(\varnothing) = 0, \quad \mathbb{P}(A^c) = 1 - \mathbb{P}(A), \quad
    \mathbb{P}(A \cup B) = \mathbb{P}(A) + \mathbb{P}(B) - \mathbb{P}(A \cap B)$.


    **Example 1 (Coin Tossing)** Let $\Omega = \{\text{H}, \text{T}\}^3$ be outcomes
    of 3 tosses of a fair coin. Then $\#\Omega = 8$ and $\mathbb{P}$ is uniform (1/8
    per outcome).


    $A = \{\text{exactly two heads}\}, \quad \mathbb{P}(A) = \frac{\binom{3}{2}}{8}
    = \frac{3}{8}$.


    ```

    import itertools, statistics

    $\Omega$ = list(itertools.product("HT", repeat=3))

    P = {$\omega$: 1/8 for $\omega$ in $\Omega$}

    A = [$\omega$ for $\omega$ in $\Omega$ if $\omega$.count("H") == 2]

    print(sum(P[$\omega$] for $\omega$ in A)) # 0.375

    ```


    **Example 2 (Inclusion–Exclusion)** Roll two fair dice. Let


    $A = \{\text{sum is even}\}, \quad B = \{\text{at least one die shows 6}\}$.


    Compute:


    $\mathbb{P}(A) = \frac{18}{36} = \frac{1}{2}, \quad \mathbb{P}(B) = \frac{11}{36},
    \quad \mathbb{P}(A \cap B) = \frac{5}{36}$.


    Hence $\mathbb{P}(A \cup B) = \frac{1}{2} + \frac{11}{36} - \frac{5}{36} = \frac{29}{36}$.


    **Boole’s Inequality** For any finite or countable $\{A_i\}$,


    $\mathbb{P}\left(\bigcup_i A_i\right) \leq \sum_i \mathbb{P}(A_i)$.


    **Example** Draw $n$ cards without replacement from a shuffled 52-card deck. Bound
    the probability that at least one ace appears when $n = 5$:


    $\mathbb{P}(\geq 1 \text{ ace}) \leq \sum_{k=1}^4 \mathbb{P}(\text{ace } k \text{
    appears}) = 4 \cdot \frac{5}{52} = \frac{5}{13} \approx 0.3846$,


    where the inequality is strict because events overlap.


    **Example 3 (Total Probability and Bayes)** Suppose a test for a disease has sensitivity
    0.95 and specificity 0.98. Prevalence is 0.01. Let $D$ be disease, $+$ positive
    result. Total probability:


    $\mathbb{P}(+) = 0.95 \cdot 0.01 + 0.02 \cdot 0.99 = 0.0293$.'
