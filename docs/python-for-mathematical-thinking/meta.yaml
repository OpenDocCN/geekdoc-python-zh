    \ < 0 \\rightarrow$ saddle (unstable),\n- $\\operatorname{Re} \\lambda_{1,2} =\
    \ 0 \\rightarrow$ centre or higher-order.\n\n### Example 6.1.9 (Lotka–Volterra\
    \ Predator–Prey)\n\n$$\\begin{cases} \\dot{x} = x(\\alpha - \\beta y), \\\\ \\\
    dot{y} = -y(\\gamma - \\delta x), \\end{cases} \\quad \\alpha, \\beta, \\gamma,\
