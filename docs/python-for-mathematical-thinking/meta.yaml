    \ = 0$ along all trajectories $\\implies$ cycles lie on level sets of $V$; no\
    \ convergence but boundedness.\n\n## 6.1.4 Numerical Solutions of ODEs\n\nAnalytical\
    \ formulae rarely exist for realistic models. Robust numerical integrators therefore\
    \ play an indispensable role in modern applied mathematics. We introduce the foundational\
    \ concepts of local/truncation error, global convergence, and stability, develop\
    \ explicit and implicit Runge–Kutta schemes, and illustrate practical modelling\
    \ workflows in NumPy/SciPy.\n\n## Euler's Method and Runge–Kutta Methods\n\n**Forward\
    \ (Explicit) Euler** For $\\dot{y} = f(t, y)$ and time step $h$,\n\n$$y_{n+1}\
    \ = y_n + h f(t_n, y_n).$$\n\nLocal truncation error $O(h^2)$; global error $O(h)$\
    \ (first order).\n\n**Example 6.1.20 (Exponential Decay)** $\\dot{y} = -3y$, $y(0)\
    \ = 1$. Take $h = 0.1$ on $0 \\leq t \\leq 1$; compare with exact $e^{-3}$.\n\n\
    ```python\nimport numpy as np\nh, N = .1, 10\ny = 1.0\nfor _ in range(N): y +=\
    \ h*(-3*y)\nprint(\"Euler y(1) =\", y, \" exact =\", np.exp(-3))\n```\n\n## Classical\
    \ RK4\n\n$$k_1 = f(t_n, y_n),$$\n$$k_2 = f(t_n + h/2, y_n + hk_1/2),$$\n$$k_3\
    \ = f(t_n + h/2, y_n + hk_2/2),$$\n$$k_4 = f(t_n + h, y_n + hk_3),$$\n$$y_{n+1}\
    \ = y_n + \\frac{h}{6}(k_1 + 2k_2 + 2k_3 + k_4).$$\n\nFourth-order: global error\
    \ $O(h^4)$."
