    $$H = \begin{pmatrix} 2 & 0 \ 0 & -2 \end{pmatrix} \Rightarrow \text{indefinite}
    \Rightarrow \text{saddle point}.$$


    **Example 3.3.7 (Constrained Optimisation: Lagrange Multipliers)** Maximise $f(x,
    y) = xy$ subject to $x^2 + y^2 = 1$.


