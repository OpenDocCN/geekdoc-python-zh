  md: "# Rendering the Mandelbrot Set in Python\n\nTo visualise $\\mathcal{M}$ we\
    \ exploit the *escape-time algorithm*: for each pixel centre $c \\in \\mathbb{C}$\
    \ iterate $z_{n+1} = z_n^2 + c$ with $z_0 = 0$; if $|z_n| > R$ (typically $R =\
    \ 2$) before $n \\le N_{\\max}$, the point lies outside $\\mathcal{M}$, and the\
    \ escape index $n$ colours the pixel. Points that never escape within the iteration\
    \ budget are deemed candidates for $\\mathcal{M}$ and coloured black (cf. Fig.\
    \ 9.10).\n\n```\nimport numpy as np, matplotlib.pyplot as plt\ndef mandelbrot(xmin,xmax,ymin,ymax,res=1000,\
    \ Nmax=200, R=2):\n    x = np.linspace(xmin,xmax,res)\n    y = np.linspace(ymin,ymax,res)\n\
    \    C = x[:,None] + 1j*y[None,:]\n    Z, M = np.zeros_like(C), np.full(C.shape,\
    \ Nmax, dtype=int)\n    for n in range(Nmax):\n        mask = np.less(np.abs(Z),\
    \ R)\n        Z[mask] = Z[mask]**2 + C[mask]\n        M[mask & (np.abs(Z)>=R)]\
    \ = n\n    return x, y, M\n\nx,y,M = mandelbrot(-2.5, 1, -1.5, 1.5, res=1600,\
    \ Nmax=500)\nplt.imshow(M.T, extent=[x.min(),x.max(),y.min(),y.max()],\n     \
    \      cmap='inferno', origin='lower'); plt.axis('off'); plt.show()\n```\n\n![](img/9724708489e3df346f9e31e3fa6e5746_370_0.png)\n\
    \n**Fig. 9.10** High-resolution escape-time rendering of the Mandelbrot set. Each\
    \ pixel represents a complex parameter $c = x + iy$; the colour encodes the iteration\
    \ count at which the orbit of 0 under $z \\mapsto z^2 + c$ escapes the disk of\
    \ radius 2 (black points never escape within the 500-step cutoff)"
