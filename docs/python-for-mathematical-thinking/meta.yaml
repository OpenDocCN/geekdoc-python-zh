    \ 应用牛顿法或通过重数估计修改迭代，可以恢复二次收敛阶。\n\n为了全局收敛，通常会嵌入一个*线搜索*：用 $\\lambda \\Delta x$（$0\
    \ < \\lambda \\leq 1$）替代完整的牛顿步长，选择 $\\lambda$ 以使 $|f(x)|$ 足够减小（*Armijo 规则*）；这可以防止当\
    \ $f'$ 很小或函数高度非线性时发生发散。\n\n## 多元牛顿法\n\n对于 $F : \\mathbb{R}^n \\to \\mathbb{R}^n$，其雅可比矩阵为\
    \ $J(\\mathbf{x}) = [\\partial F_i / \\partial x_j]$，\n$$\\mathbf{x}_{k+1} = \\\
    mathbf{x}_k - J(\\mathbf{x}_k)^{-1} F(\\mathbf{x}_k).$$\n\n求解线性系统 $J(\\mathbf{x}_k)\
    \ \\Delta \\mathbf{x}_k = -F(\\mathbf{x}_k)$ 得到 $\\Delta \\mathbf{x}_k$（通过 LU\
    \ 或 QR 分解），并令 $\\mathbf{x}_{k+1} = \\mathbf{x}_k + \\Delta \\mathbf{x}_k$。在类似条件下二次收敛成立：$J(\\\
    mathbf{r})$ 非奇异且 $F$ 连续可微。\n\n```python\nimport numpy as np\nfrom numpy.linalg\
    \ import solve, norm\n\ndef newton_multi(F, J, x0, *, atol=1e-12, rtol=1e-10,\
    \ max_iter=30):\n    x = np.array(x0, dtype=float)\n    for k in range(max_iter):\n\
    \        Fx = F(x)\n        if norm(Fx, np.inf) < atol: return x, k\n        Δx\
    \ = solve(J(x), -Fx)\n        x = x + Δx\n        if norm(Δx, np.inf) < atol +\
    \ rtol*norm(x, np.inf):\n            return x, k\n    raise RuntimeError(\"no\
    \ convergence\")\n```\n\n**示例 8.1.2（两个圆柱体的交线）** 从 $(0.7, 0.7, 0.1)$ 开始求解 $F(x,\
    \ y, z) = (x^2 + y^2 - 1, \\quad y^2 + z^2 - 1, \\quad x^2 + z^2 - 1) = \\mathbf{0}$。雅可比矩阵\
    \ $J = \\begin{pmatrix} 2x & 2y & 0 \\\\ 0 & 2y & 2z \\\\ 2x & 0 & 2z \\end{pmatrix}$\
    \ 在坐标轴外是非奇异的；迭代在四步内收敛到 $(\\frac{1}{\\sqrt{2}}, \\frac{1}{\\sqrt{2}}, 0)$，验证了轴线沿单位圆相交的几何事实。\n\
    \n*拟牛顿方法* 存储完整的雅可比矩阵需要 $O(n^2)$ 内存。布罗伊登更新从 $B_0 = I$ 开始，并迭代地改进 $B_k$，使得 $B_{k+1}\\\
    Delta x_k = \\Delta F_k$，以 $O(n)$ 的存储实现超线性收敛。\n\n## 实际使用注意事项\n\n- 始终将牛顿步长与区间套或线搜索保护措施结合使用。\n\
    - 缩放变量使雅可比矩阵条件良好；否则使用信赖域变体（列文伯格–马夸特方法）。\n- 在不适定问题中，有限差分雅可比矩阵会引入舍入误差；复步微分（$f'(x)\
    \ \\approx \\text{Im } f(x + i\\varepsilon)/\\varepsilon$）可以廉价地获得机器精度的导数。\n\n\
    ## 8.1.3 其他求根方法\n\n尽管当导数可用且初始猜测良好时，牛顿法在求根中占主导地位，但实际计算通常需要无导数或全局收敛的算法，以及在复平面上操作的方法。因此，我们概述三类互补的方法：割线型两点迭代、以布伦特算法为代表的保护性混合方法，以及用于多项式和解析函数的复域技术。\n\
    \n## 割线法与试位法\n\n**割线法（阶 $\\varphi \\approx 1.618$）**\n\n从不同的点 $x_{k-1}, x_k$ 开始，割线迭代\n\
    \n$$x_{k+1} = x_k - f(x_k) \\frac{x_k - x_{k-1}}{f(x_k) - f(x_{k-1})}$$\n\n用*割线斜率*近似\
    \ $f'(x_k)$。在与牛顿法相同的假设下（单根 $r$，$f'(r) \\neq 0$）且 $x_0, x_1$ 足够接近 $r$ 时，误差满足 $e_{k+1}\
    \ \\approx C e_k^{\\varphi}$，其中 $\\varphi = \\frac{1}{2}(1 + \\sqrt{5})$，超线性但亚二次。每次更新需要一次函数求值，因此其*渐近效率指数*\
    \ $p^{1/c}$（$p$ = 阶，$c$ = 求值次数）等于 $2^{1/1.618}$，在求值次数受限的情况下优于牛顿法的 $2^{1/2}$。\n\
    \n**试位法（regula falsi）**\n\n与二分法类似，试位法保持区间套，但只更新与 $f(x_{k+1})$ 符号相同的端点：\n\n$$x_{k+1}\
    \ = b_k - f(b_k) \\frac{b_k - a_k}{f(b_k) - f(a_k)}.$$\n\n尽管当一个端点“粘住”时它可能停滞，但*改进*变体（伊利诺伊、安德森–比约克）会缩放静止的函数值，以恢复与二分法相当的线性收敛，但迭代次数更少。\n\
    \n**示例 8.1.3（割线法 vs. 牛顿法）** 在 $(0, 1)$ 中求解 $f(x) = \\cos x - x$。取 $x_0 = 0$，$x_1\
    \ = 1$，割线法在 6 次迭代后收敛，牛顿法（从 $x_0 = 0.5$ 开始）在 4 次后收敛；两者都使用了六次函数求值。\n\n```python\n\
    import numpy as np\ndef secant(f, x0, x1, tol=1e-12, max_iter=30):\n    for k\
    \ in range(max_iter):\n        x2 = x1 - f(x1)*(x1-x0)/(f(x1)-f(x0))\n       \
    \ if abs(x2-x1) < tol: return x2, k+1\n        x0, x1 = x1, x2\n    raise RuntimeError\n\
    root, iters = secant(lambda x: np.cos(x)-x, 0.0, 1.0)\n```\n\n## 布伦特方法与混合技术\n\n\
    布伦特算法（`scipy.optimize.brentq`）融合了二分法、割线法和反二次插值：\n\n$$IQI: \\quad x_{k+1} = u f(b_k)f(c_k)\
    \ + v f(a_k)f(c_k) + w f(a_k)f(b_k),$$\n\n其中 $u, v, w$ 是重心权重，选择使得 $x \\mapsto\
    \ f(x)$ 被通过 $(a_k, b_k, c_k)$ 的二次函数插值。在每一步，布伦特\n\n1. 尝试一个 IQI 步\n2. 如果 IQI 超出区间套或区间缩减不够快，则回退到割线步\n\
    3. 在必要时回退到二分法以保证进展\n\n这种自适应策略保持了*全局*收敛性和超线性速度，无需用户调优即可为平滑函数实现接近最优的性能。最坏情况下的迭代次数等于二分法；典型的收敛阶近似为\
    \ 1.6。\n\n**示例 8.1.4（使用布伦特法计算债券到期收益率）**\n\n```python\nfrom scipy import optimize\n\
    C, F, T, P = 3.5, 100, 10, 95 # coupon %, face, years, price\ndef npv(y):\n  \
    \  k = np.arange(1, T+1)\n    return np.sum(C/100/(1+y)**k) + F/(1+y)**T - P\n\
    y, r = optimize.brentq(npv, 0.0, 0.2, full_output=True)\nprint(f\"Yield = {100*y:.2f}%\
    \ obtained in {r.iterations} iterations\")\n```\n\n## 混合牛顿-区间套方案\n\n诸如德克、里德以及*牛顿-二分法*等算法，将牛顿法的快速局部步长与二分法保护措施相结合，保持区间套和单调的残差进展。它们是库（gsl,\
    \ boost::math）中的标准选择。\n\n## 复域中的求根\n\n对于解析函数 $f : \\mathbb{C} \\to \\mathbb{C}$，自然的工具是多项式迭代方案和围道积分。\n\
    \n### 杜兰德–克纳（魏尔斯特拉斯）方法\n\n对于一个首一多项式 $p(z) = z^n + a_{n-1}z^{n-1} + \\cdots + a_0$，其（单）根为\
    \ $r_1, \\ldots, r_n$，初始化复数猜测 $z_i^{(0)}$（例如正 $n$ 边形的顶点）并迭代\n\n$$z_i^{(k+1)} =\
    \ z_i^{(k)} - \\frac{p(z_i^{(k)})}{\\prod_{j \\neq i} (z_i^{(k)} - z_j^{(k)})}.$$"
