    # Indefinite Integrals and Antiderivatives


    Given a function $f(x)$, its antiderivative is a function $F(x)$ such that $F''(x)
    = f(x)$. Symbolically,


    $$\int f(x)\,dx = F(x) + C,$$


    where $C$ is the constant of integration. In SymPy, one writes:


    ```

    import sympy as sp

    x = sp.Symbol("x")

    f = sp.exp(x) * sp.sin(x)

    F = sp.integrate(f, x)

    sp.pprint(F)

    ```


    The returned expression is:


    $$\int e^x \sin x\,dx = \frac{1}{2}e^x(\sin x - \cos x) + C.$$


