- md: "## Basin-Hopping\n\nAlternate random perturbations (temperature-controlled)\
    \ with local L-BFGS minimisation; the metastable basin-to-basin moves approximate\
    \ a global transition matrix, frequently locating the ground state of molecular\
    \ clusters (Lennard–Jones).\n\n## Comparative Strengths\n\nGA excels in discrete\
    \ or combinatorial encodings; SA better exploits local smoothness; particle swarm\
    \ and CMA–ES provide derivative-free multivariate adaptation. Hybridising with\
    \ quasi-Newton polishing (“memetic algorithms”) often improves speed and accuracy.\n\
    \n## 8.2.4 Direct Methods for Linear Systems\n\nConsider the linear system $Ax\
    \ = \\mathbf{b}$ with $A \\in \\mathbb{R}^{n \\times n}$ nonsingular. *Direct*\
    \ methods factorise $A$ into products of triangular or orthogonal matrices, solving\
    \ by forward/back substitution in $O(n^3)$ arithmetic (plus $O(n^2)$ storage).\
    \ Their predictability and high arithmetic intensity make them the method of choice\
    \ when $A$ is moderate in size, reused for many right-hand sides, or arises from\
    \ dense modelling.\n\n## LU Decomposition and Cholesky Decomposition\n\n### LU\
    \ Factorisation\n\nWhen Gaussian elimination proceeds without row exchanges, $A$\
    \ can be written\n\n$$A = LU,$$\n\nwhere $L$ is unit lower-triangular ($l_{ii}\
    \ = 1$) and $U$ is upper-triangular. For each column $k$ ($1 \\le k \\le n$) elimination\
    \ computes multipliers $l_{ik} = a_{ik}/u_{kk}$ for $i > k$ and updates the Schur\
    \ complement; the total work is $\\frac{1}{3}n^3$ multiplications plus lower-order\
    \ terms.\n\n### Partial Pivoting\n\nIf $|u_{kk}|$ is small, numerical error explodes.\
    \ Swapping the pivot row $k$ with row $p = \\arg \\max_{i \\ge k} |a_{ik}|$ forms\
    \ a permutation matrix $P$ such that $PA = LU$.\n\nPartial pivoting guarantees\
    \ $\\frac{|u_{ij}|}{|a_{ij}|} \\le 2^{n-1}$, constraining growth factors and yielding\
    \ backward stability for well-conditioned problems.\n\n### Cholesky Factorisation\n\
    \nIf $A$ is symmetric positive-definite (SPD), the Cholesky factorisation\n\n\
    $A = LL^T$, $l_{kk} = \\sqrt{a_{kk} - \\sum_{s<k} l_{ks}^2}$, $l_{ik} = \\frac{1}{l_{kk}}\
    \ \\left( a_{ik} - \\sum_{s<k} l_{is} l_{ks} \\right)$, $i > k$\n\nreduces work\
    \ to $\\frac{1}{6}n^3$ flops, halves storage, and inherits excellent numerical\
    \ properties: the computed factor $\\widehat{L}$ satisfies $A + \\Delta A = \\\
    widehat{L}\\widehat{L}^T$ with $\\|\\Delta A\\| \\lesssim u n \\|A\\|$ (machine\
    \ unit $u$).\n\n### Example 8.2.4 (Cholesky in Python)\n\n```python\nimport numpy\
    \ as np, scipy.linalg as la\nnp.random.seed(0)\nA = np.random.randn(5,5); A =\
    \ A @ A.T + 1e-3*np.eye(5) # SPD\nL = la.cholesky(A, lower=True)\nb = np.random.rand(5)\n\
    y = la.solve_triangular(L, b, lower=True)\nx = la.solve_triangular(L.T, y, lower=False)\n\
    assert np.allclose(A @ x, b)\n```\n\n### Band and Block Variants\n\nIf $A$ has\
    \ bandwidth $w$, band LU reduces to $O(nw^2)$ operations; tridiagonal SPD matrices\
    \ admit $O(n)$ Cholesky (a.k.a. *Thomas algorithm*). For matrices with $2 \\times\
    \ 2$ block pivots (e.g. saddle-point systems), block LU/LDL$^T$ maintains symmetry\
    \ while handling pivot sign issues.\n\n## Applications in Scientific Computing\n\
    \n### Finite-Difference Poisson Solver\n\nDiscretising $\\nabla^2 u = f$ on an\
    \ $m \\times m$ grid yields an $n = m^2$ five-point Laplacian matrix. Its sparsity\
    \ pattern is block tridiagonal with bandwidth $w = 2m - 1$; applying band LU costs\
    \ $O(n^{1.5})$ flops, outperforming dense algorithms and providing a deterministic\
    \ baseline for multigrid or conjugate-gradient verification.\n\n### Electrical\
    \ Circuit Analysis\n\nModified nodal analysis produces an SPD conductance matrix\
    \ $G$. Cholesky factorisation enables fast DC operating-point computation, while\
    \ reuse of $L$ over multiple right-hand sides allows AC small-signal sweeps with\
    \ negligible incremental cost.\n\n### Kalman Filtering\n\nThe measurement update\
    \ solves $(P_k^{-1} + H^T R^{-1} H)\\mathbf{x} = H^T R^{-1} \\mathbf{z}$. Since\
    \ $P_k$ and $R$ are SPD, sequential Cholesky downdate updates $L_k$ to $L_{k+1}$\
    \ in $O(n^2)$ time, maintaining filter stability over thousands of steps.\n\n\
    ### Pivoting Strategies and Numerical Stability\n\n**Complete pivoting** searches\
    \ both rows and columns for the maximal pivot, yielding $\\frac{|u_{ij}|}{|a_{ij}|}\
    \ \\le (1+u)^{n-1}$, but costs $O(n^3)$ comparisons and rarely improves accuracy\
    \ over partial pivoting.\n\n**Threshold pivoting** accepts a pivot $|u_{kk}| \\\
    ge \\tau \\max_{i \\ge k} |a_{ik}|$ ($\\tau \\in [0, 1]$) to minimise fill-in\
    \ for sparse matrices (Markowitz heuristic).\n\n**Scaled pivoting** rescales each\
    \ row by its largest element before the partial-pivot search, reducing the effect\
    \ of coefficient magnitude variation; incorporated in LAPACK routine dgesv.\n\n\
    **Growth factor and backward error.** Define $\\rho = \\max_{i,j} |u_{ij}| / \\\
    max_{i,j} |a_{ij}|$. For partial pivoting in random matrices $\\rho$ rarely exceeds\
    \ $n$, so the computed solution $\\widehat{\\mathbf{x}}$ satisfies $(A + \\Delta\
    \ A)\\widehat{\\mathbf{x}} = \\mathbf{b}$ with $\\|\\Delta A\\| \\le u \\rho \\\
