    引言\n\n**摘要** 本章阐述了选择Python作为数学工作台的理由，将其开源生态系统和丰富的数值库与MATLAB、R和Mathematica等传统工具进行了对比。在建立可复现的开发环境之后，本章为Python语言本身奠定了坚实的基础——涵盖核心语法与语义、基本与复合数据类型、控制流结构、函数式抽象、输入/输出、面向对象设计模式以及迭代器/生成器范式——同时强调数学化的编码风格、数值精度以及单元测试的最佳实践，这些内容将为后续每一章提供支撑。\n\
    \n**关键词** Python · 数学计算 · 编程基础 · 控制流 · 面向对象编程 · 迭代器与生成器\n\nPython已从一种面向系统管理员的脚本语言，演变为一个成熟的计算生态系统，其中数学思想作为一等公民被*嵌入*。其简洁的语法使得数学符号能够在源代码中得到紧密映射——对比单行推导式\
    \ {n² : n ≤ 10} 与教科书中的集合表示 {n² | n ≤ 10}。海量的开源库选择意味着，无论我们需要精确算术、符号运算，还是GPU加速的张量演算，相应的工具只需一个`import`即可获得。由于这些库通过Python的数据模型和对象协议统一起来，数值数组、符号表达式，乃至图这样的离散结构，都能无缝组合。实际上，Python变成了一个*富有表现力的数学笔记本*：一个交互式工作空间，定义、实验、猜想和证明在此共存——而计算反馈则能磨砺直觉。在本书中，我们充分利用这种协同效应：每一个概念阐述都配有可执行代码，每一个算法都以支撑形式化证明的同等严谨性进行剖析。\n\
    \n### 1.1 为何选择Python进行数学计算？\n\n#### 1.1.1 Python在数学计算中的优势\n\n**概述**\n\nPython的核心在于提供了五个特性，使其在数学工作中独具优势。\n\
    \n1. **富有表现力的语法。** 列表和字典推导式、多重赋值以及一等函数，直接在代码中复现了集合构造式、元组和λ演算结构。\n2. **多范式支持。**\
    \ 命令式、函数式、面向对象以及（通过sympy）符号式范式共存，允许为每个问题自然地选择抽象方式。\n3. **丰富的数值计算栈。** numpy、scipy和pandas等库利用了优化的C和Fortran后端；它们提供了$O(n^3)$的稠密矩阵算法、FFT和特殊函数，性能接近MATLAB，同时保持免费和开源。\n\
    4. **互操作性。** ctypes和cffi接口允许在没有编组开销的情况下调用低级数值内核或遗留的FORTRAN例程，从而保持精度和速度。\n5. **交互式计算。**\
    \ Jupyter笔记本和IPython shell提供了REPL驱动的探索、内联LaTeX渲染和丰富的可视化——非常适合猜想验证和教学演示。\n\n**实例**\n\
    \n**示例 1.1.1（$e^{\\pi\\sqrt{163}}$的高精度求值）** 表达式 $e^{\\pi\\sqrt{163}}$ 以几乎是一个整数而闻名（拉马努金）。使用Python的decimal模块，我们验证其精确到50位小数：\n\
    \n```python\nfrom decimal import Decimal, getcontext\nfrom math import pi, sqrt\n\
    \ngetcontext().prec = 50 # 50 significant digits\nx = Decimal(pi) * Decimal(163).sqrt()\n\
    y = x.exp()\nprint(y)\nprint(y - round(y))\n```\n\n残差约为 $7.4 \\times 10^{-40}$，这证实了Berndt\
    \ (1989)中讨论的近整数现象。\n\n**示例 1.1.2（求解线性方程组 $Ax = b$）** 设\n\n$$A = \\begin{pmatrix}\
    \ 2 & -1 & 0 \\\\ -1 & 2 & -1 \\\\ 0 & -1 & 2 \\end{pmatrix}, \\quad b = \\begin{pmatrix}\
    \ 1 \\\\ 0 \\\\ 1 \\end{pmatrix}.$$\n\n使用numpy.linalg，可以写成\n\n```python\nimport\
    \ numpy as np\nA = np.array([[2, -1, 0], [-1, 2, -1], [0, -1, 2]], dtype=float)\n\
    b = np.array([1, 0, 1], dtype=float)\nx = np.linalg.solve(A, b)\n```\n\n这将得到精确的有理数解\
    \ $(x_1, x_2, x_3) = (1, \\frac{3}{2}, 1)$，误差仅限于浮点误差。\n\n**常见陷阱**\n\nPython的易用性掩盖了一些微妙之处，可能会让不谨慎的数学家陷入困境。\n\
    \n1. **二进制浮点数舍入。** 在IEEE-754二进制中，等式 $0.1 + 0.2 = 0.3$ 是不成立的。¹ 精确算术需要使用decimal或fractions模块。\n\
    2. **可变默认参数。** 像这样的函数定义\n   ```python\n   def append_item(x, L=[]): L.append(x);\
    \ return L\n   ```\n   会在多次调用中累积状态，违反了数学的纯粹性。应改用None作为哨兵值。\n3. **算法性能。** 一个实现\
    \ $O(n^2)$ 矩阵乘法的朴素Python循环比numpy.dot慢数千倍；渐近分析必须与向量化相结合。\n4. **覆盖内置函数。** 将变量命名为sum或max会覆盖标准库中的版本，导致后续会话中出现令人困惑的错误。\n\
    \n这些陷阱将在本书中反复出现；我们将系统地处理它们，在适当的地方提供证明式的推理，并在有指导意义时提供实测的时间曲线。\n\n### 1.1.2 与其他数学工具的比较\n\
    \n**Python vs. MATLAB**\n\n尽管两个生态系统在数值线性代数方面都很出色，但它们的设计理念截然不同。MATLAB采用*以矩阵为中心*的世界观：每个数据默认都是一个\
    \ $m \\times n$ 数组，且基于1的索引与传统代数符号相匹配。相比之下，Python以抽象的方式处理对象，并使用基于0的索引，这与大多数现代编程语言一致，并允许使用诸如\
    \ `A[:, k]` 来获取第 $k$ 列的优雅切片惯用法。性能上的对等现在已很常见，因为numpy调用的是与MATLAB的 `mldivide` 相同的LAPACK/BLAS后端。决定性的优势在于Python的开放架构：C扩展、JIT工具（numba）和GPU绑定（cupy）都是*免费*可用的。此外，通过sympy进行的符号代数以及networkx等组合库与数值代码无缝集成，消除了对单独计算机代数系统（CAS）的需求。其代价是Python需要显式的数组广播（`np.newaxis`）来模拟MATLAB的隐式扩展规则；粗心的维度不匹配可能引入潜在的错误。\n\
    \n**示例 1.1.3（最小二乘拟合：MATLAB vs. Python）** 给定 $A \\in \\mathbb{R}^{m \\times n}$\
    \ 和 $b \\in \\mathbb{R}^m$，MATLAB的解 $x = A \\setminus b$ 在Python中对应为\n\n```python\n\
    import numpy as np\nx = np.linalg.lstsq(A, b, rcond=None)[0]\n```\n\n两者内部都调用QR分解，得到\
    \ $\\hat{x} = (A^\\top A)^{-1} A^\\top b$，具有相同的后向误差界（Golub and Van Loan 2013）。\n\
    \n**Python vs. R**\n\nR是为统计建模而生的；其语法反映了公式、因子和数据框作为基本概念。Python通过pandas和statsmodels栈获得了同等的表现力，同时增加了生成器和元类等通用构造。在时间序列分析中，R的xts/zoo对象对应于pandas.Series，但Python的迭代器协议支持对无限流的惰性求值——这在随机过程模拟中不可或缺。对于贝叶斯推断，R的rstan在pymc中找到了对应物；然而，Python能够将符号微分（通过jax）与马尔可夫链蒙特卡洛交织在一起，在单一代码路径中生成梯度\
    \ $\\nabla \\log p(\\theta \\mid D)$，从而减少了样板代码。\n\n**示例 1.1.4（核密度估计）** 单变量高斯核密度估计在每种语言中都只需一行代码。\n\
    \n```python\nfrom scipy.stats import gaussian_kde\npdf = gaussian_kde(samples)\n\
    ```\n\n该调用与R的 `density(samples)` 类似，但返回一个可调用对象，该对象在 $\\mathbb{R}^d$ 上向量化，从而能够与numpy的广播语义直接集成。"
