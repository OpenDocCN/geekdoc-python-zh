    # 11.4.2 Quantum Algorithms


    Quantum algorithms exploit superposition, entanglement, and interference to achieve
    computational speed-ups beyond classical limits. Their design typically follows
    a three-step template: prepare a suitable superposition, manipulate phase amplitudes
    via oracle or modular arithmetic, and extract the hidden structure by interference
    or measurement. This subsection formalises two flagship algorithms—Shor’s polynomial-time
    factoring and Grover’s square-root search—then demonstrates circuit simulation
    in Python, outlines the stabiliser blueprint for fault-tolerant computation, and
    surveys variational algorithms that marry quantum subroutines with classical optimisation.


    # Shor’s Algorithm and Grover’s Algorithm


    # Shor’s Factoring


    Let $N = pq$ with $p, q$ odd primes. Choose random $a \pmod{N}$, $\gcd(a, N) =
    1$, and seek the multiplicative order $r$ s.t. $a^r \equiv 1 \pmod{N}$. Quantum
    phase estimation (QPE) finds $r$ in $O(\log^2 N)$ modular-exponentiation gates.


    $U_a |x\rangle = |a^x \pmod{N}\rangle, \quad U_a^r = I.$


    Prepare $\frac{1}{Q} \sum_{x=0}^{Q-1} |x\rangle|1\rangle$ ($Q = 2^{2n}$). Controlled
    $U_a^x$ yields $\frac{1}{Q} \sum_x |x\rangle|a^x \pmod{N}\rangle$. Applying inverse
    QFT to the control register concentrates amplitude at integers close to $kQ/r$.
    Measuring gives $\bar{k}$, recovering $r$ via continued fractions. If $r$ even
    and $a^{r/2} \neq -1 \pmod{N}$, factors follow from $\gcd(a^{r/2} \pm 1, N)$.


    ```

    from qiskit.algorithms import Shor

    N = 221 # 13 × 17

    result = Shor().factor(N)

    print(result.factors) # [(13, 17)]

    ```'
