  md: '# Chapter 1

    Introduction


    **Abstract** This chapter motivates the choice of Python as a mathematical workbench,
    contrasting its open-source ecosystem and rich numerical libraries with legacy
    tools such as MATLAB, R, and Mathematica. After establishing a reproducible development
    environment, it builds a rigorous foundation in the language itself—covering core
    syntax and semantics, primitive and composite data types, control-flow constructs,
    functional abstraction, input/output, object-oriented design patterns, and iterator/generator
    paradigms—all while emphasising mathematically literate coding style, numerical
    precision, and unit-tested best practices that will underpin every subsequent
    chapter.


    **Keywords** Python · Mathematical computation · Programming fundamentals · Control
    flow · Object-oriented programming · Iterators and generators


    Python has evolved from a scripting language for system administrators into a
    mature computational ecosystem that *embeds* mathematical ideas as first-class
    citizens. Its clean syntax allows mathematical notation to be mirrored closely
    in source code—compare the one-line comprehension {n² : n ≤ 10} with the textbook
    set {n² | n ≤ 10}. The vast selection of open-source libraries means that whether
    we seek exact arithmetic, symbolic manipulation, or GPU-accelerated tensor calculus,
    the corresponding tools are only an `import` away. Because these libraries are
    unified by Python’s data-model and object protocol, numerical arrays, symbolic
    expressions, and even discrete structures like graphs can be composed seamlessly.
    In effect, Python becomes a *literate mathematical notebook*: an interactive workspace
    where definitions, experiments, conjectures, and proofs coexist—and where computational
    feedback sharpens intuition. Throughout this book we exploit that synergy: every
    conceptual exposition is paired with executable code, and every algorithm is dissected
    with the same rigour that underlies a formal proof.'
