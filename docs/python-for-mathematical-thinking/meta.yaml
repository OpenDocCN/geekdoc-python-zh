    ```

    g_down = np.array([[2, 1], [1, 2]])

    g_up = np.linalg.inv(g_down)

    v_up = np.array([3, 4])

    v_down = np.einsum("ij,j->i", g_down, v_up)

    v_raised = np.einsum("ij,j->i", g_up, v_down)

