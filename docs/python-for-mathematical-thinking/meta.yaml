    # Adaptive Quadrature Algorithms


    Fixed-step quadrature can be inefficient on functions with localised features
    (e.g. sharp peaks). Adaptive quadrature adjusts the step size based on local error
    estimates, allocating more points where the function varies rapidly.


    **Principle** Given interval $[a, b]$, compute coarse and fine approximations
    $I_1, I_2$. If $|I_2 - I_1| < \varepsilon$, accept $I_2$; else split $[a, b]$
    and recurse.


    **Example 3.2.4 (Adaptive Simpson''s Method)** Use `scipy.integrate.quad`, which
    implements adaptive quadrature:


    ```

    from scipy.integrate import quad


    f = lambda x: np.exp(-x**2)

    I, err = quad(f, 0, 1, epsabs=1e-10)

    print(f"Adaptive Simpson: {I:.10f}, estimated error: {err:.1e}")

    ```


    **Singular Integrands** Adaptive methods are crucial when the integrand has singularities
    or rapid oscillations. For example:


    $$\int_0^1 \frac{\log(x)}{\sqrt{x}} \, dx,$$


    which diverges at $x = 0$ but is integrable in the Lebesgue sense. Python''s `quad`
    handles this using weight functions.


    ```

    from scipy.integrate import quad

    f = lambda x: np.log(x) / np.sqrt(x)

    I, err = quad(f, 0, 1, weight=''alg'', wvar=-0.5)

    print(f"Result: {I}, error estimate: {err}")

    ```


