    \ $\\Phi(0) = I$ satisfies $\\dot{\\Phi} = \\mathbf{A}\\Phi$ and $\\Phi(t) = e^{\\\
    mathbf{A}t}$. Columns of $\\Phi$ form a basis of solutions.\n\n## Nonlinear Systems\
    \ and Stability\n\nFor $\\dot{\\mathbf{x}} = \\mathbf{F}(\\mathbf{x})$ an *equilibrium*\
    \ satisfies $\\mathbf{F}(\\mathbf{x}^*) = \\mathbf{0}$. Linearise via Jacobian\
    \ $\\mathbf{J}(\\mathbf{x}^*) = D\\mathbf{F}(\\mathbf{x}^*)$:\n\n$$\\dot{\\eta}\
    \ = \\mathbf{J}\\eta + O(\\|\\eta\\|^2), \\quad \\eta = \\mathbf{x} - \\mathbf{x}^*.$$\n\
    \n**Hartman–Grobman Theorem** (Grobman 1959; Perko 2013; Strogatz 2018) If $\\\
    mathbf{J}$ has no eigenvalues with zero real part, the nonlinear flow near $\\\
    mathbf{x}^*$ is topologically conjugate to its linearisation.\n\n**Example 6.1.17**\
    \ (Van der Pol Oscillator, $\\mu = 1$)\n\n$$\\dot{x} = y, \\quad \\dot{y} = (1\
    \ - x^2)y - x.$$\n\nOnly equilibrium $(0, 0)$; Jacobian $\\mathbf{J}(0, 0) = \\\
    begin{pmatrix} 0 & 1 \\\\ -1 & 1 \\end{pmatrix}$ has eigenvalues $\\frac{1}{2}(1\
    \ \\pm i\\sqrt{3}) \\implies$ unstable focus. Global dynamics feature a stable\
    \ limit cycle, verified by trajectory simulations (cf. Fig. 6.4).\n\n```python\n\
    import numpy as np, matplotlib.pyplot as plt\n$\\mu$=1\ndef F(t,z): x,y=z; return\
    \ [y, (1-x**2)*y - x]\nfrom scipy.integrate import solve_ivp\nfor (x0,y0) in [(2,0),(0.1,0.1),(-2,0)]:\n\
    \    sol=solve_ivp(F,[0,40],[x0,y0],t_eval=np.linspace(0,40,4000))\n    plt.plot(sol.y[0],\
    \ sol.y[1])\nplt.xlabel('x'); plt.ylabel('y'); plt.show()\n```\n\n**Centre Manifold\
    \ Reduction** If $\\mathbf{J}$ has eigenvalues with zero real part, flow is determined\
    \ by nonlinear terms on a lower-dimensional centre manifold; crucial in Hopf bifurcation\
    \ analysis.\n\n![Fig. 6.4 Phase-plane trajectories of the Van der Pol oscillator\
