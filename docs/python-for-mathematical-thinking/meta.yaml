    **Power Function** $\pi(\mu) = \mathbb{P}_{\mu}(\text{reject } H_0)$. Goal: choose
    $n$ s.t. $\pi(\mu_1) \geq 1 - \beta^*$ for desired effect size $\delta = \mu_1
    - \mu_0$.


    **Analytic Formula (z-test)** Known $\sigma$, two-sided, significance $\alpha$:


    $$n \geq \left(\frac{z_{1-\alpha/2} + z_{1-\beta}}{\delta/\sigma}\right)^2.$$


