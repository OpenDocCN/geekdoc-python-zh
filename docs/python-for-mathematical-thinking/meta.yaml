    \ 是 $n$ 步转移矩阵。\n\n**状态分类** 状态 $i$ 是\n\n- *常返的*，如果链以概率 1 返回到 $i$\n- *暂态的*，否则\n\
    - *周期的*，周期为 $d$，如果返回仅发生在 $d$ 的倍数时刻\n- *吸收的*，如果 $P_{ii} = 1$\n\n**平稳分布** 向量 $\\\
    boldsymbol{\\pi}$ 满足 $\\boldsymbol{\\pi} P = \\boldsymbol{\\pi}$ 且 $\\sum_i \\\
    pi_i = 1$。如果 $P$ 是*不可约*且*非周期*的，则\n\n$$\\lim_{n \\to \\infty} P^n = \\mathbf{1}\
    \ \\boldsymbol{\\pi},$$\n\n因此无论初始状态如何，$\\mathbb{P}(X_n = s_j) \\to \\pi_j$。\n\n\
    **示例 5.4.1（天气模型：晴天 (S)、多云 (C)、雨天 (R)）**\n\n$$P = \\begin{pmatrix} 0.7 & 0.2 &\
    \ 0.1 \\\\ 0.3 & 0.4 & 0.3 \\\\ 0.2 & 0.3 & 0.5 \\end{pmatrix}.$$\n\n```python\n\
    import numpy as np\nP = np.array([[0.7, 0.2, 0.1],\n              [0.3, 0.4, 0.3],\n\
    \              [0.2, 0.3, 0.5]])\n# 通过特征向量计算平稳分布\neigvals, eigvecs = np.linalg.eig(P.T)\n\
    pi = eigvecs[:, np.isclose(eigvals, 1)]\npi = pi/pi.sum()\nprint(pi.real.ravel())\
    \ # [0.476, 0.286, 0.238]\n```\n\n长时间后，晴天的概率稳定在约 47.6%。从初始状态 $S$ 计算 10 天预测：\n\n\
    ```python\np0 = np.array([1, 0, 0])\nprint(p0 @ np.linalg.matrix_power(P, 10))\n\
    ```\n\n**吸收链的基本矩阵** 如果状态 $1, \\ldots, r$ 是暂态的，$r+1, \\ldots, m$ 是吸收的，将 $P$ 写为\
    \ $P = \\begin{pmatrix} Q & R \\\\ 0 & I \\end{pmatrix}$，其中 $Q \\in \\mathbb{R}^{r\
    \ \\times r}$。**基本矩阵** $N = (I - Q)^{-1}$ 满足 $N_{ij} =$ 从状态 $i$ 出发访问暂态 $j$ 的期望次数；期望吸收时间\
