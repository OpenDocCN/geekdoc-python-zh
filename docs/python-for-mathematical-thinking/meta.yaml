    print(np.corrcoef(X,Y)[0,1]) # ≈ 0.8\nsns.scatterplot(x=X, y=Y, alpha=.3); plt.show()\n\
    ```\n\n一条紧密的对角线带证实了强烈的线性依赖关系。\n\n**示例 5.2.13（单调非线性变换下的斯皮尔曼 vs. 皮尔逊相关性）** $X \\\
    sim \\text{Uniform}(0, 1)$，$Y = X^2$。皮尔逊 $\\rho \\approx 0.97$（仍然很高），而斯皮尔曼 $\\\
    rho_s = 1$（完美单调）。\n\n```python\nX = np.random.rand(300)\nY = X**2\nfrom scipy.stats\
