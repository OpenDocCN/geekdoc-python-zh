    # 10.4.3 Generative Models


    Generative modelling seeks an estimator $\hat{p}(\mathbf{x})$ that faithfully
    approximates the data-generating distribution $p_{\text{data}}(\mathbf{x})$ on
    $\mathbb{R}^d$. Once learned, $\hat{p}$ enables (i) *sampling* realistic instances;
    (ii) *inference* of latent causes; (iii) *density evaluation* for anomaly detection;
    and (iv) *representation learning* that benefits downstream predictions. We survey
    three archetypes—latent-variable autoencoders, adversarial games, and probabilistic
    graphical models—highlighting their mathematical formulation and implementation
    idioms.


    # Autoencoders and Variational Autoencoders (VAEs)


