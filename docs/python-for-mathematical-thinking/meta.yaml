    # Short-Time Fourier Transform (STFT) and Spectrograms


    The STFT maps a non-stationary signal into a two-dimensional function:


    $$\text{STFT}_x(m, \omega) = \sum_{n=-\infty}^{\infty} x[n] g[n - m] e^{-i\omega
    n},$$


    where $g$ is a sliding window centred at $m$. The **spectrogram** is its squared
    magnitude, capturing local energy. Time-frequency resolution obeys $\Delta t \Delta
    f \geq 1/(4\pi)$; fixing window length enforces uniform tiling, unlike the scalogram''s
    logarithmic grid.


    ```

