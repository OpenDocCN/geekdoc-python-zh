    # Combinatorial Probability: Permutations and Combinations


    Counting arguments allow explicit probability computations in finite sample spaces.


    # Permutations


    $$P(n, k) = n^k = n(n-1) \cdots (n-k+1)$$


    counts ordered $k$-tuples from $n$ distinct objects.


    # Combinations


    $$C(n, k) = \binom{n}{k} = \frac{n!}{k!(n-k)!}$$


    counts unordered $k$-subsets.


    **Example 4 (Anagrams with Repeated Letters)** How many distinct rearrangements
    of “STATISTICS”? Letter multiplicities: S:3, T:3, A:1, I:2, C:1.


    $$N = \frac{10!}{3!3!2!} = 50400.$$


    **Example 5 (Poker Hand)** Probability of being dealt exactly two pairs in 5-card
    poker.


