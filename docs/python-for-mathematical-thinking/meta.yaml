  md: '# Grover''s Search


    Given oracle $O_w$ marking element $w$ in an unsorted list of size $N$, Grover''s
    iteration $G = (2|\psi\rangle\langle\psi| - I) O_w$, $|\psi\rangle = \frac{1}{\sqrt{N}}
    \sum_x |x\rangle$ rotates state vector in the two-dimensional span $\{|w\rangle,
    |\psi_\perp\rangle\}$ by angle $2\theta$, where $\sin\theta = 1/\sqrt{N}$. After
    $R = \lfloor \frac{\pi}{4} \sqrt{N} \rfloor$ iterations the success probability
    exceeds $1 - 1/N$.


    ```

    from qiskit.algorithms import Grover, amplifiers

    oracle = amplifiers.GroverOracle(logic_expression=''111'') # mark |111>

    grover = Grover(iterations=1) # 1 ≈ π/4√8

    result = grover.amplify(oracle)

    print(result.top_measurement) # ''111''

    ```


    Amplitude-amplification generalises Grover to amplify the probability of any subroutine
    finding a marked state with initial success $p$, achieving $O(1/\sqrt{p})$ repetitions.


