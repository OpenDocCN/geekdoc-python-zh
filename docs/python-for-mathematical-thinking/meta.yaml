    # 1.1.2 Comparison with Other Mathematical Tools


    # Python vs. MATLAB


    Although both ecosystems excel at numerical linear algebra, their design philosophies
    diverge sharply. MATLAB adopts a *matrix-centric* worldview: every datum is an
    $m \times n$ array by default, and one-based indexing matches traditional algebraic
    notation. Python, by contrast, treats objects abstractly and uses zero-based indexing,
    which aligns with most modern programming languages and allows elegant slicing
    idioms such as `A[:, k]` for the $k$-th column. Performance parity is now typical
    because numpy calls the same LAPACK/BLAS back-ends that underlie MATLAB''s `mldivide`.
    The decisive advantage is Python''s open architecture: C-extensions, JIT tooling
    (numba), and GPU bindings (cupy) are all available *gratis*. Moreover, symbolic
    algebra via sympy and combinatorial libraries such as networkx integrate seamlessly
    with numerical code, eliminating the need for a separate Computer Algebra System
    (CAS). The trade-off is that Python requires conscious array broadcasting (`np.newaxis`)
    to emulate MATLAB''s implicit expansion rules; careless dimension mismatches can
    introduce latent bugs.


    **Example 1.1.3 (Least-Squares Fit: MATLAB vs. Python)** Given $A \in \mathbb{R}^{m
    \times n}$ and $b \in \mathbb{R}^m$, MATLAB''s solution $x = A \setminus b$ is
    mirrored in Python as


    ```

    import numpy as np

    x = np.linalg.lstsq(A, b, rcond=None)[0]

    ```


    Both invoke QR decomposition internally, yielding $\hat{x} = (A^\top A)^{-1} A^\top
    b$ with identical backward-error bounds (Golub and Van Loan 2013).


    # Python vs. R


    R was conceived for statistical modelling; its syntax reflects formulas, factors,
    and data frames as primitive notions. Python acquires equivalent expressiveness
    through the pandas and statsmodels stacks while adding general-purpose constructs
    such as generators and metaclasses. In time-series analysis, R''s xts/zoo objects
    correspond to pandas.Series, but Python''s iterator protocol enables lazy evaluation
    of infinite streams—indispensable in stochastic process simulation. For Bayesian
    inference, R''s rstan finds a counterpart in pymc; however, Python''s ability
    to interleave symbolic differentiation (via jax) with Markov-chain Monte Carlo
    yields gradients $\nabla \log p(\theta \mid D)$ in a single code path, reducing
    boilerplate.


    **Example 1.1.4 (Kernel Density Estimation)** A univariate Gaussian KDE requires
    one line in each language.


    ```

    from scipy.stats import gaussian_kde

    pdf = gaussian_kde(samples)

    ```


    The call mirrors R''s `density(samples)` but returns a callable object that vectorises
    over $\mathbb{R}^d$, enabling direct integration with numpy broadcasting semantics.'
- md: "## Python vs. Mathematica\n\nMathematica's strength is its rule-based symbolic\
    \ engine capable of exact results such as $\\int e^{x^2} dx = \\frac{\\sqrt{\\\
    pi}}{2} \\text{erfi } x+C$. Python's sympy reproduces much of this functionality\
    \ with transparent algorithms—ideal for pedagogical deep dives. Python gains ground\
    \ in large-scale numeric–symbolic hybrids: calling `sympy.Matrix` methods inside\
    \ batched GPU code is possible because objects share the same runtime. Mathematica's\
    \ `notebook` paradigm is rivalled by Jupyter, whose Markdown+code cells also support\
    \ $\\LaTeX$ and interactive widgets via `ipywidgets`. Licensing costs and closed\
    \ source limit Mathematica's deployability on clusters, whereas Python scales\
    \ horizontally through containerisation and serverless functions.\n\n**Example\
    \ 1.1.5 (Automatic Differentiation vs. Symbolic Differentiation)**\nConsider $f(x)\
    \ = \\sin(\\sqrt{x^2 + 1})$. Mathematica symbolically returns $f'(x) = \\frac{x\
    \ \\cos(\\sqrt{x^2 + 1})}{\\sqrt{x^2 + 1}}$. Python offers a complementary *automatic*\
    \ route:\n\n```\nimport jax.numpy as jnp\nfrom jax import grad\nf = lambda x:\
    \ jnp.sin(jnp.sqrt(x**2 + 1))\ndf = grad(f)\n```\n\nHere `jax` propagates dual\
    \ numbers, computing $f'(x)$ at machine precision for any $x \\in \\mathbb{R}$\
    \ without explicit symbolic forms.\n\n## 1.2 Setting Up the Python Environment\n\
    \n### 1.2.1 Installing Python and Essential Libraries\n\n#### CPython and Anaconda\
    \ Distributions\n\nThe reference interpreter CPython compiles C source into bytecode\
    \ executed by the CPython Virtual Machine. Installation via `python.org` ensures\
    \ the latest stable release, but minimalists must subsequently `pip install numpy\
    \ scipy matplotlib sympy`. The *Anaconda* distribution, by contrast, ships a curated\
    \ set of $\\approx 250$ scientific packages—pre-compiled against Intel MKL—together\
    \ with the `conda` package manager. This turnkey approach avoids the fragile compile\
    \ chains required for LAPACK or OpenBLAS on Windows. Verify a clean install with:\n\
    \n```\n>>> import sys, numpy, sympy, scipy\n>>> print(sys.version)\n>>> print(numpy.__version__,\
    \ sympy.__version__, scipy.__version__)\n```\n\n#### Managing Virtual Environments\n\
    \nIsolating dependencies is crucial for reproducible research. Python offers three\
    \ mechanisms:\n\n1. venv (standard library):\n   ```\n   python3 -m venv env &&\
    \ source env/bin/activate\n   pip install numpy sympy\n   ```\n   This creates\
    \ a project-local copy of the interpreter and its site-packages.\n2. conda environments:\n\
    \   ```\n   conda create -n calculus python=3.12 numpy sympy\n   conda activate\
    \ calculus\n   ```\n   Useful when binary compatibility with MKL or CUDA is needed.\n\
    3. pipx for globally installing isolated command-line tools (e.g. jupyter).\n\n\
    A requirements.txt or environment.yml should accompany each chapter's source to\
    \ encode the exact package versions $(v_1, \\dots, v_k) \\in \\mathbb{N}^k$, making\
    \ the computational narrative portable across machines.\n\n### 1.2.2 Python Syntax\
    \ and Semantics\n\n#### Variables, Expressions, and Statements\n\nA variable in\
    \ Python is not a labelled memory cell but a binding from an identifier to an\
    \ object residing on the heap. The assignment statement\n\n```\nx = 3\n```\n\n\
    creates a reference from the name x to the singleton integer object whose value\
    \ is 3. Subsequent rebinding merely redirects the name—they do not mutate the\
    \ integer, which is immutable. Equality == invokes the object's __eq__ method,\
    \ whereas identity is compares memory addresses; thus, (2 is 1+1) may be True\
    \ for small integers because of CPython's internal integer pool.\n\nAn expression\
    \ is any syntactic form that yields a value. Every expression has a type τ drawn\
    \ from the lattice of built-in or user-defined classes. By contrast, a statement\
    \ performs an action—assignment, flow control, import—but evaluates to None. Consider\
    \ the list-comprehension identity\n\n$$[x^2]_{x=1}^n = [(x := k)^2]_{k=1}^n,$$\n\
    \nwhere the walrus operator := binds the target within the expression, melding\
    \ imperative and functional styles.\n\n**Example 1.2.1 (Law of Total Probability\
    \ in List Comprehension)** Given mutually exclusive events $E_1, \\dots, E_k$\
    \ with $\\sum p(E_i) = 1$, their probabilities can be sampled and normalised in\
    \ a single expression:\n\n```\nweights = [p(E_i) for E_i in events] # $\\sum$\
    \ weights = 1\nsamples = [w / sum(weights) for w in weights] # explicit normalisation\n\
    ```\n\nEach comprehension is an expression returning a new list; no intermediate\
    \ statements are required.\n\n#### Indentation, Blocks, and Style\n\nPython eschews\
    \ braces in favour of *semantic indentation*. A block begins immediately after\
    \ the colon `:` that terminates a compound statement. The interpreter enforces\
    \ a deterministic mapping from source code to parse tree: inconsistent indentation\
    \ triggers `IndentationError`, preventing syntactic ambiguities that plague languages\
    \ with optional braces.\n\nStyle guidelines are codified in **PEP 8**. Mathematical\
    \ scripts benefit from its clarity rules: variable names should mirror conventional\
    \ notation (`theta`, `lambda_max`), functions are `lower_snake_case`, and classes\
    \ are `CapWords`. Lines should seldom exceed 79 characters, ensuring $\\LaTeX$/PDF\
    \ listings do not overrun the page. Automatic formatters such as `black` enforce\
    \ a canonical style, making diffs behave like algebraic equalities: extraneous\
    \ whitespace is eliminated, and only semantic changes remain visible.\n\n### 1.2.3\
    \ Python as an Interpreted Language\n\n#### Bytecode and the CPython VM\n\nWhile\
    \ Python is colloquially “interpreted”, the CPython reference implementation performs\
    \ a two-phase translation. Source files are first parsed into an Abstract Syntax\
    \ Tree, optimised into stack-based *bytecode*, and cached as `.pyc` in the `__pycache__`\
    \ directory. Each bytecode instruction manipulates a virtual stack; for example,\
    \ the multiplication $a \\times b$ compiles into\n\n```\n>>> import dis\n>>> def\
    \ prod(a, b): return a * b\n...\n>>> dis.dis(prod)\n  1 0 LOAD_FAST 0 (a)\n  \
    \   2 LOAD_FAST 1 (b)\n     4 BINARY_MULTIPLY\n     6 RETURN_VALUE\n```\n\nThe\
    \ virtual machine executes these $n$ bytes in $O(n)$ time, dispatching each opcode\
    \ via a large `switch` table. Crucially, numeric heavy lifting is delegated to\
    \ C functions—Python orchestrates, while libraries compute.\n\n#### Interactive\
    \ vs. Script Mode\n\nInvoking python without arguments spawns a *Read–Eval–Print\
    \ Loop* (REPL). Each input line is compiled and executed immediately, returning\
    \ control to the user. This mirrors the mathematical habit of manipulating expressions\
    \ on a blackboard: conjecture, test, refine. In *script mode* (`python file.py`)\
    \ compilation precedes execution, and the module's global namespace becomes `__main__`.\
    \ Idempotence is enforced by the idiom\n\n```\nif __name__ == '__main__':\n  \
    \  main()\n```\n\nwhich prevents accidental side-effects when the file is imported\
    \ elsewhere—analogous to requiring lemmas but deferring theorem proving until\
    \ the main proof context.\n\n## 1.3 Data Types and Variables\n\n### 1.3.1 Primitive\
    \ Data Types\n\n#### Integers, Floats, and Complex Numbers\n\nPython's `int` implements\
    \ unbounded signed integers using a base $2^{30}$ (or $2^{15}$ on 16-bit builds)\
    \ limb representation; arithmetic thus respects the Peano axioms without modular\
    \ wrap-around. The expression\n\n![](img/9724708489e3df346f9e31e3fa6e5746_27_0.png)\n\
    \nis legal albeit memory-intensive.\nFloating-point numbers follow the IEEE-754\
    \ binary64 format: each value encodes sign $s$, exponent $e \\in [-1022, 1023]$,\
    \ and mantissa $m \\in [0, 2^{53})$, representing $(-1)^s m 2^{e-52}$. Rounding\
    \ mode defaults to “round half to even”. Mathematical purity is preserved by providing\
    \ the `decimal` module for arbitrary precision and `fractions.Fraction` for exact\
    \ rationals.\nA `complex` is a pair $(x, y) \\in \\mathbb{R}^2$ with arithmetic\n\
    \n$(x_1 + i y_1)(x_2 + i y_2) = (x_1 x_2 - y_1 y_2) + i(x_1 y_2 + x_2 y_1)$,\n\
    \nimplemented in C for speed. Euler's identity is verified numerically as:\n\n\
    ```\nimport cmath, math\nabs(cmath.exp(1j * math.pi) + 1) # ≈ 0\n```\n\nThe residual\
    \ is $<10^{-16}$, bounded by double precision.\n\n#### Booleans and NoneType\n\
    \nThe Boolean algebra $\\{\\bot, \\top\\}$ is represented by False and True, subclasses\
    \ of int with values 0 and 1. Logical operations satisfy De Morgan's laws; for\
    \ example\n\n$\\neg(A \\wedge B) \\equiv (\\neg A) \\vee (\\neg B)$\n\ntranslates\
    \ to\n\n```\nnot (A and B) == (not A) or (not B)\n```\n\nand returns True for\
    \ all truth assignments.\n\nThe singleton None of type NoneType denotes \"absence\
    \ of value\". It behaves as the unique null element: comparisons use identity\
    \ (is None), never equality. Attempting arithmetic with None raises TypeError,\
    \ mirroring the undefined nature of 0/0 in real analysis.\n\n**Example 1.3.1 (Short-Circuit\
    \ Semantics)** Given a lazy predicate $P(x)$ expensive to evaluate, the conjunction\n\
    \n```\nx is not None and P(x)\n```\n\nruns $P$ only if the first clause is True.\
    \ This mirrors the logical rule $(\\bot \\wedge \\varphi) = \\bot$, preventing\
    \ AttributeError when $x$ is absent.\n\nPrimitive types thus provide a formal\
    \ substrate mirroring $\\mathbb{Z}$, $\\mathbb{R}$, and $\\mathbb{C}$, while their\
    \ Pythonic implementations respect mathematical axioms to machine-precision limits.\
    \ Subsequent sections build composite structures—lists, tuples, arrays—on this\
    \ foundation, much as algebraic topology builds spaces from simplices.\n\n###\
    \ 1.3.2 Mathematical Operations on Data Types\n\n#### Arithmetic Operators\n\n\
    Python overloads the five classical field operations and augments them with integer-specific\
    \ variants. Addition $+$, subtraction $-$, and multiplication $*$ coincide with\
    \ the ring axioms on $\\mathbb{Z}$, and the power operator $**$ implements exponentiation\
    \ by"
