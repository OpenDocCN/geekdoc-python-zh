    # Convergence and Numerical Stability


    # Spectral Gap and Conditioning


    The power method converges iff λ₁ is dominant and isolated; otherwise deflation
    (Hotelling) or shifting improves behaviour. Inverse iteration inherits the conditioning
    of (A − σI)⁻¹—good when σ is close to λⱼ but risking numerical overflow if |λⱼ
    − σ| ≲ u‖A‖; iterative refinement or QZ updates stabilise the linear solves.


    # Orthogonality Loss


    Finite precision causes qₖᵀqₖ = 1 + O(u), but round-off in Aqₖ can inject components
    of other eigenvectors. Re-orthogonalising every few steps (Gram–Schmidt) mitigates
    contamination, though Krylov subspace methods (Lanczos, Arnoldi) with implicit
    restarts usually provide better robustness for multiple eigenvalues.


    # Stopping Criteria


    Use the residual norm rₖ = ‖Aqₖ − μₖqₖ‖₂. For the power method rₖ ≈ |λ₂/λ₁|ᵏ,
    so halt when rₖ ≤ ε‖A‖₂. For inverse iteration rₖ ≈ |λⱼ − σ| ‖sₖ‖, providing adaptive
    control on σ updates.


