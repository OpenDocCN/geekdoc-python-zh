    \ updates\n\n$$x_{k+1} = \\frac{1}{2}(x_k + \\alpha/x_k)$$"
  - "[PAGE 34]\n\nconverge quadratically. Implementation:\n\n```\ndef sqrt_newton(alpha:\
    \ float, tol: float = 1e-12) -> float:\n    x = alpha\n    while True:\n     \
    \   xn = 0.5 * (x + alpha / x)\n        if abs(xn - x) < tol:\n            return\
    \ xn\n        x = xn\n```\n\nThe invariant $x_k > 0$ maintains domain validity;\
    \ termination criterion $|x_{k+1} - x_k| < \\varepsilon$ embeds the Cauchy condition\
    \ for convergence.\n\n# 1.4.3 Comprehensions in Python\n\n# List Comprehensions\n\
    \nA list comprehension\n\n$[f(x) \\textbf{ for } x \\in S \\textbf{ if } P(x)]$\n\
    \nis the computational analogue of the set-builder expression $\\{f(x) \\mid x\
    \ \\in S, P(x)\\}$. Evaluation is left-to-right: the iterable $S$ is traversed\
    \ once, predicates $P(x)$ are short-circuited, and each surviving element is mapped\
    \ through $f$. The entire comprehension is an *expression*; its result can be\
    \ nested safely inside higher-order functions without leaking loop variables.\n\
    \n**Example 1.4.5 (Prime Sieve up to $N$)** Using the Sieve of Eratosthenes, the\
    \ set of primes $\\le N$ is\n\n$\\mathcal{P}(N) = \\{n \\mid 2 \\le n \\le N,\
    \ \\forall p \\le \\sqrt{n} \\; (p \\mid n \\Rightarrow p = n)\\}$.\n\n```\nfrom\
    \ math import sqrt\ndef primes(N: int) -> list[int]:\n    is_prime = [True] *\
    \ (N + 1)\n    for p in range(2, int(sqrt(N)) + 1):\n        if is_prime[p]:\n\
    \            is_prime[p*p:N+1:p] = [False] * len(range(p*p, N+1, p))\n    return\
    \ [q for q in range(2, N + 1) if is_prime[q]]\n```\n\nThe final line is a comprehension\
    \ filtering the Boolean mask `is_prime`, producing an ordered list of primes in\
    \ $O(N \\log \\log N)$ time.\n\n# Set and Dictionary Comprehensions\n\nReplacing\
    \ the brackets by curly braces yields a **set comprehension**; adding a colon\
    \ separates keys and values, giving a **dictionary comprehension**. Both evaluate\
    \ in"
- md: "## 1.4.4 Error Handling and Exceptions\n\n### try-except-finally\n\nPython\
    \ models runtime anomalies through the class hierarchy rooted at `BaseException`.\
    \ A `try` block establishes a guarded region; when an exception $\\varepsilon$\
    \ propagates, control transfers to the `except` clause whose parameter type is\
    \ a super-class of $\\varepsilon$. This corresponds to the logical rule\n\n$$\\\
    frac{\\Gamma \\vdash M : \\alpha \\quad \\varepsilon : \\beta \\in \\text{Exc}}{\\\
    Gamma \\vdash \\text{try } M \\text{ except } \\beta \\Rightarrow N : \\alpha}$$\n\
    \nensuring the overall expression still types as $\\alpha$.\n\n**Example 1.4.8\
    \ (Robust Numerical Integration)** Adaptive quadrature may raise `ZeroDivisionError`\
    \ if the integrand is singular. A protective wrapper records the failure and returns\
    \ `NaN`:\n\n```python\nimport math\ndef safe_integrate(f, a: float, b: float):\n\
    \    try:\n        return math.quad(f, a, b) # pseudo-call for illustration\n\
    \    except ZeroDivisionError:\n        return float('nan')\n    finally:\n  \
    \      log.info(\"integration attempted on [%g, %g]\", a, b)\n```\n\nThe finally\
    \ block executes unconditionally, mirroring the total probability rule: all execution\
    \ paths sum to one.\n\n### Custom Exception Classes\n\nWhen domain logic requires\
    \ finer granularity than the built-ins provide, define a subclass of Exception.\
    \ The new class should encapsulate an invariant breach or precondition failure,\
    \ making the error surface self-descriptive.\n\n**Example 1.4.9 (Non-convergence\
    \ in Newton Iteration)**\n\n```python\nclass ConvergenceError(Exception):\n  \
    \  \"\"\"Raised when an iterative method fails to converge.\"\"\"\n\ndef newton(f,\
    \ df, x0: float, tol: float = 1e-12, max_iter: int = 50):\n    for _ in range(max_iter):\n\
    \        x1 = x0 - f(x0) / df(x0)\n        if abs(x1 - x0) < tol:\n          \
    \  return x1\n        x0 = x1\n    raise ConvergenceError(\n        f\"Newton\
    \ failed after {max_iter} iterations; |Δ|={abs(x1 - x0):.2e}\"\n    )\n```\n\n\
    A calling routine may catch ConvergenceError selectively, leaving unrelated exceptions\
    \ to propagate. This mirrors the practice of isolating singularities when extending\
    \ analytic functions.\n\nStructured exception handling therefore provides a categorical\
    \ sum type—normal result ∪ error payload—allowing algorithms to advertise exceptional\
    \ conditions explicitly and enabling callers to compose reliable numerical pipelines.\n\
    \n## 1.5 Functions and Modular Programming\n\nProgramming mirrors mathematics\
    \ most closely when code is organised around the notion of a function—a mapping\
    \ that associates each element of a domain with exactly one element of a codomain.\
    \ Python preserves this abstraction by treating functions as first-class objects,\
    \ enabling composition, higher-order operators, and even runtime transformation\
    \ of function behaviour. Modular programming extends the idea to namespaces: a\
    \ module is the analogue of a mathematical theory, bundling definitions, lemmas,\
    \ and theorems so that they can be imported without polluting the surrounding\
    \ context. The following sections examine these constructs through both formal\
    \ lenses and executable demonstrations.\n\n### 1.5.1 Defining Functions\n\n####\
    \ Positional and Keyword Arguments\n\nA function header of the form\n\n```python\n\
    def f(x, y, /, z, *, w):\n    ...\n```\n\ndeclares two *positional-only* parameters\
    \ x, y; one flexible parameter z; and one *keyword-only* parameter w. The slash\
    \ and star delimiters were introduced in PEP 570 to enforce clarity and prevent\
    \ accidental name collisions. Mathematically, the call\n\n$f(a, b, z=c, w=d)$\n\
    \nis the evaluation $f(a, b, c, d)$ where the mapping from syntactic position\
    \ to formal parameter is bijective.\n\n**Example 1.5.1 (Bivariate Normal PDF)**\n\
    \n```python\nimport math\n\ndef bivariate_pdf(x, y, /, *, rho: float = 0.0):\n\
    \    σ = math.sqrt(1 - rho**2)\n    return math.exp(-(x**2 - 2*rho*x*y + y**2)\
    \ / (2*σ**2)) / (2*math.pi*σ)\n```\n\nThe correlation coefficient $\\rho$ is specified\
    \ as a keyword, obliging callers to document intent explicitly.\n\n#### Default\
    \ and Variable-Length Parameters\n\nDefaults turn a partial application into a\
    \ total function on a larger domain. The signature\n\n```python\ndef power(base,\
    \ exp=2):\n    return base ** exp\n```\n\nextends the map $x \\mapsto x^2$ to\
    \ $(x, n) \\mapsto x^n$. Variable-length parameters (*args, **kwargs) correspond\
    \ to the family of all finite tuples or finite maps, respectively:\n\n$\\{ f :\
    \ \\mathbb{N}^k \\to \\mathbb{R} \\mid k \\in \\mathbb{N} \\}$.\n\n**Example 1.5.2\
    \ (Generalised Mean)**\n\n$M_p(x_1, \\ldots, x_n) = \\left( \\frac{1}{n} \\sum_{i=1}^n\
    \ x_i^p \\right)^{1/p}$.\n\n```python\ndef mean(*values: float, p: float = 2.0)\
    \ -> float:\n    n = len(values)\n    return (sum(v**p for v in values) / n) **\
    \ (1 / p)\n```\n\nThe star collects the variable arity into a tuple, realising\
    \ the map $\\bigcup_{n \\geq 1} \\mathbb{R}^n \\to \\mathbb{R}$.\n\n### 1.5.2\
    \ Advanced Function Concepts\n\n#### First-Class Functions and Closures\n\nBecause\
    \ Python treats functions as objects, one may pass them as arguments, return them,\
    \ or store them in data structures. A *closure* arises when an inner function\
    \ retains bindings from its lexical environment, implementing the $\\lambda$-calculus\
    \ concept of *currying*.\n\n**Example 1.5.3 (Partial Evaluation of a Polynomial)**\
    \ Given coefficients $a_0, \\dots, a_k$, define\n\n$$p_a(x) = \\sum_{i=0}^k a_i\
    \ x^i.$$\n\n```python\nfrom typing import Sequence, Callable\n\ndef make_poly(a:\
    \ Sequence[float]) -> Callable[[float], float]:\n    def p(x: float) -> float:\n\
    \        return sum(c * x**i for i, c in enumerate(a))\n    return p\n```\n\n\
    The returned closure captures $a$, yielding a specialised function $p : \\mathbb{R}\
    \ \\to \\mathbb{R}$ without further overhead.\n\n#### Decorators and Higher-Order\
    \ Functions\n\nA *decorator* is a higher-order function $\\mathcal{D} : (A \\\
    to B) \\to (A \\to B)$ that transforms behaviour while preserving type signature.\
    \ Syntactic sugar\n\n```python\n@decor\ndef f(...):\n    ...\n```\n\nexpands to\
    \ $f = \\text{decor}(f)$, analogous to operator overloading in algebraic structures.\n\
    \n**Example 1.5.4 (Memoisation Decorator)**\n\n```python\ndef memoize(f):\n  \
    \  cache = {}\n    def g(*args):\n        return cache.setdefault(args, f(*args))\n\
    \    return g\n```\n\nApplying @memoize to a recursive definition turns exponential-time\
    \ evaluation of the Fibonacci sequence into linear time, paralleling dynamic programming\
    \ on DAGs.\n\n### 1.5.3 Modular Programming with Python\n\n#### Packages and __init__.py\n\
    \nA directory becomes a package when it contains an __init__.py file, establishing\
    \ a namespace object. The file may re-export selected symbols, enforcing an interface\
    \ akin to a signature in type theory:\n\n```python\n# __init__.py\nfrom .linalg\
    \ import det, eigvals # public API\n__all__ = ['det', 'eigvals']\n```\n\nOther\
    \ internals remain private, approximating the encapsulation of lemmas versus public\
    \ theorems.\n\n#### Import Mechanics and Namespaces\n\nThe import statement\n\n\
    `import M  ==>  Γ ∪ {M:N}`\n\nextends the current environment Γ with a binding\
    \ to module object N. During resolution, the interpreter searches sys.meta_path,\
    \ walking from built-ins through virtual file finders to local directories. Relative\
    \ imports (from .sub import s) trace the tree structure of the package, echoing\
    \ qualified names in logic such as Group.Hom.\n\n### 1.5.4 Recursive Functions\n\
    \n#### Mathematical Recurrence Relations\n\nRecursion translates structural induction\
    \ into executable semantics. Consider the Catalan numbers\n\n$C_n = \\sum_{i=0}^{n-1}\
    \ C_i C_{n-1-i}, \\quad C_0 = 1.$"
  mdcn: "## 1.4.4 错误处理与异常\n\n### try-except-finally\n\nPython 通过以 `BaseException`\
    \ 为根的类层次结构来建模运行时异常。`try` 代码块建立一个受保护区域；当异常 $\\varepsilon$ 传播时，控制权会转移到参数类型为 $\\\
    varepsilon$ 超类的 `except` 子句。这对应于逻辑规则\n\n$$\\frac{\\Gamma \\vdash M : \\alpha \\\
    quad \\varepsilon : \\beta \\in \\text{Exc}}{\\Gamma \\vdash \\text{try } M \\\
    text{ except } \\beta \\Rightarrow N : \\alpha}$$\n\n确保整个表达式的类型仍然是 $\\alpha$。\n\
    \n**示例 1.4.8（鲁棒数值积分）** 自适应求积法在被积函数奇异时可能引发 `ZeroDivisionError`。一个保护性包装器会记录失败并返回\
    \ `NaN`：\n\n```python\nimport math\ndef safe_integrate(f, a: float, b: float):\n\
    \    try:\n        return math.quad(f, a, b) # pseudo-call for illustration\n\
    \    except ZeroDivisionError:\n        return float('nan')\n    finally:\n  \
    \      log.info(\"integration attempted on [%g, %g]\", a, b)\n```\n\n`finally`\
    \ 代码块无条件执行，这反映了全概率法则：所有执行路径的概率之和为一。\n\n### 自定义异常类\n\n当领域逻辑需要比内置异常更细的粒度时，可以定义 `Exception`\
    \ 的子类。新类应封装一个不变量违反或前置条件失败，使错误表面具有自描述性。\n\n**示例 1.4.9（牛顿迭代中的不收敛）**\n\n```python\n\
    class ConvergenceError(Exception):\n    \"\"\"Raised when an iterative method\
    \ fails to converge.\"\"\"\n\ndef newton(f, df, x0: float, tol: float = 1e-12,\
    \ max_iter: int = 50):\n    for _ in range(max_iter):\n        x1 = x0 - f(x0)\
    \ / df(x0)\n        if abs(x1 - x0) < tol:\n            return x1\n        x0\
    \ = x1\n    raise ConvergenceError(\n        f\"Newton failed after {max_iter}\
    \ iterations; |Δ|={abs(x1 - x0):.2e}\"\n    )\n```\n\n调用程序可以选择性地捕获 `ConvergenceError`，让无关的异常继续传播。这类似于在解析延拓函数时隔离奇点的做法。\n\
    \n因此，结构化异常处理提供了一个范畴和类型——正常结果 ∪ 错误负载——允许算法显式地声明异常条件，并使调用者能够组合可靠的数值管道。\n\n## 1.5\
    \ 函数与模块化编程\n\n当代码围绕函数的概念组织时，编程最接近数学。函数是一种映射，它将定义域中的每个元素与陪域中的恰好一个元素相关联。Python 通过将函数视为一等对象来保留这种抽象，从而支持组合、高阶运算符，甚至函数行为的运行时转换。模块化编程将这一思想扩展到命名空间：模块类似于数学理论，它捆绑定义、引理和定理，以便可以导入它们而不污染周围环境。以下各节将通过形式化视角和可执行演示来考察这些构造。\n\
    \n### 1.5.1 定义函数\n\n#### 位置参数和关键字参数\n\n形式如下的函数头\n\n```python\ndef f(x, y, /, z,\
    \ *, w):\n    ...\n```\n\n声明了两个*仅位置*参数 x, y；一个灵活参数 z；以及一个*仅关键字*参数 w。斜杠和星号分隔符在\
    \ PEP 570 中引入，以强制清晰性并防止意外的名称冲突。从数学上讲，调用\n\n$f(a, b, z=c, w=d)$\n\n是求值 $f(a, b,\
    \ c, d)$，其中从语法位置到形式参数的映射是双射的。\n\n**示例 1.5.1（二元正态概率密度函数）**\n\n```python\nimport\
    \ math\n\ndef bivariate_pdf(x, y, /, *, rho: float = 0.0):\n    σ = math.sqrt(1\
    \ - rho**2)\n    return math.exp(-(x**2 - 2*rho*x*y + y**2) / (2*σ**2)) / (2*math.pi*σ)\n\
    ```\n\n相关系数 $\\rho$ 被指定为关键字参数，要求调用者明确记录其意图。\n\n#### 默认参数和可变长度参数\n\n默认参数将部分应用转变为更大定义域上的全函数。签名\n\
    \n```python\ndef power(base, exp=2):\n    return base ** exp\n```\n\n将映射 $x \\\
    mapsto x^2$ 扩展为 $(x, n) \\mapsto x^n$。可变长度参数（*args, **kwargs）分别对应于所有有限元组或有限映射的族：\n\
    \n$\\{ f : \\mathbb{N}^k \\to \\mathbb{R} \\mid k \\in \\mathbb{N} \\}$。\n\n**示例\
    \ 1.5.2（广义平均值）**\n\n$M_p(x_1, \\ldots, x_n) = \\left( \\frac{1}{n} \\sum_{i=1}^n\
    \ x_i^p \\right)^{1/p}$。\n\n```python\ndef mean(*values: float, p: float = 2.0)\
    \ -> float:\n    n = len(values)\n    return (sum(v**p for v in values) / n) **\
    \ (1 / p)\n```\n\n星号将可变元数收集到一个元组中，实现了映射 $\\bigcup_{n \\geq 1} \\mathbb{R}^n \\\
    to \\mathbb{R}$。\n\n### 1.5.2 高级函数概念\n\n#### 一等函数与闭包\n\n因为 Python 将函数视为对象，所以可以将它们作为参数传递、返回它们或存储在数据结构中。当内部函数保留其词法环境中的绑定时，就产生了*闭包*，这实现了\
    \ $\\lambda$-演算中的*柯里化*概念。\n\n**示例 1.5.3（多项式的部分求值）** 给定系数 $a_0, \\dots, a_k$，定义\n\
    \n$$p_a(x) = \\sum_{i=0}^k a_i x^i.$$\n\n```python\nfrom typing import Sequence,\
    \ Callable\n\ndef make_poly(a: Sequence[float]) -> Callable[[float], float]:\n\
    \    def p(x: float) -> float:\n        return sum(c * x**i for i, c in enumerate(a))\n\
    \    return p\n```\n\n返回的闭包捕获了 $a$，从而产生了一个特化的函数 $p : \\mathbb{R} \\to \\mathbb{R}$，无需额外开销。\n\
    \n#### 装饰器与高阶函数\n\n*装饰器*是一个高阶函数 $\\mathcal{D} : (A \\to B) \\to (A \\to B)$，它在保持类型签名的同时转换行为。语法糖\n\
    \n```python\n@decor\ndef f(...):\n    ...\n```\n\n展开为 $f = \\text{decor}(f)$，类似于代数结构中的运算符重载。\n\
    \n**示例 1.5.4（记忆化装饰器）**\n\n```python\ndef memoize(f):\n    cache = {}\n    def\
    \ g(*args):\n        return cache.setdefault(args, f(*args))\n    return g\n```\n\
    \n将 @memoize 应用于递归定义，可以将斐波那契数列的指数时间求值转变为线性时间，类似于在有向无环图上进行动态规划。\n\n### 1.5.3 使用\
    \ Python 进行模块化编程\n\n#### 包与 __init__.py\n\n当一个目录包含 `__init__.py` 文件时，它就成为一个包，建立一个命名空间对象。该文件可以重新导出选定的符号，强制执行类似于类型论中签名的接口：\n\
    \n```python\n# __init__.py\nfrom .linalg import det, eigvals # public API\n__all__\
    \ = ['det', 'eigvals']\n```\n\n其他内部实现保持私有，近似于引理与公共定理的封装。\n\n#### 导入机制与命名空间\n\n\
    导入语句\n\n`import M  ==>  Γ ∪ {M:N}`\n\n通过将模块对象 N 的绑定扩展到当前环境 Γ。在解析期间，解释器搜索 `sys.meta_path`，从内置模块遍历虚拟文件查找器到本地目录。相对导入（`from\
    \ .sub import s`）追溯包的树结构，呼应了逻辑中的限定名称，如 `Group.Hom`。\n\n### 1.5.4 递归函数\n\n####\
    \ 数学递推关系\n\n递归将结构归纳转化为可执行语义。考虑卡特兰数\n\n$C_n = \\sum_{i=0}^{n-1} C_i C_{n-1-i},\
    \ \\quad C_0 = 1.$"
