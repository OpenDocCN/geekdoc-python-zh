    # 5.3.2 Confidence Intervals


    A **confidence interval** (CI) for a parameter θ is a random interval C(X) = [L(X),
    U(X)] constructed from sample data X such that


    P(θ ∈ C(X)) = 1 − α,


    where 1−α is the *confidence level* (e.g. 95%). The probability statement refers
    to the long-run proportion of repeated samples whose intervals cover the true
    parameter.


    # Constructing Confidence Intervals in Python


    **Normal Mean, Unknown Variance (t-interval)** For i.i.d. X_i ~ N(μ, σ²),


    X̄ ± t_{1−α/2, n−1} * s/√n, s² = 1/(n−1) * Σ(X_i − X̄)².


    **Example 5.3.6 (Fuel-Efficiency Study)** Ten cars yield MPG measurements


