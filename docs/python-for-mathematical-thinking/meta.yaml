    \ and **principal component analysis** (PCA) for dimensionality reduction prior\
    \ to regression.\n\n## Ridge and Lasso Regression\n\nWhen predictor matrix $X\
    \ \\in \\mathbb{R}^{n \\times p}$ exhibits high inter-column correlation or $p\
    \ \\gg n$, OLS coefficients $\\hat{\\beta} = (X^T X)^{-1} X^T \\mathbf{y}$ become\
    \ unstable. Penalised least squares remedies this.\n\n### Ridge ($L_2$) Penalty\n\
    \n$$\\hat{\\beta}^{\\text{ridge}} = \\arg \\min_{\\beta} \\{\\|\\mathbf{y} - X\\\
    beta\\|_2^2 + \\lambda\\|\\beta\\|_2^2\\}, \\quad \\hat{\\beta}^{\\text{ridge}}\
    \ = (X^T X + \\lambda I_p)^{-1} X^T \\mathbf{y}.$$\n\nThe shrinkage parameter\
    \ $\\lambda \\ge 0$ trades bias for variance; cross-validation selects $\\lambda^*$\
    \ that minimises prediction error.\n\n### Lasso ($L_1$) Penalty\n\n$$\\hat{\\\
    beta}^{\\text{lasso}} = \\arg \\min_{\\beta} \\{\\|\\mathbf{y} - X\\beta\\|_2^2\
    \ + \\lambda\\|\\beta\\|_1\\}.$$\n\nThe $\\ell_1$ norm promotes sparsity: many\
    \ $\\hat{\\beta}_j = 0$, giving automatic variable selection.\n\n**Example 5.3.17\
    \ (Boston Housing, $p = 13$ (Harrison and Rubinfeld 1978))**\n\n```python\nimport\
