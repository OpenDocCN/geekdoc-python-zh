    Band-pass filter 5–15 Hz via fourth-order Butterworth IIR attenuates baseline
    wander and muscle artefacts; Hilbert envelope $h(t) = |x(t) + j\mathcal{H}[x](t)|$
    accentuates R-peaks. Adaptive threshold $\tau(t) = \mu_h(t) + k\sigma_h(t)$ (window
    150 ms) yields > 99% detection sensitivity on MIT–BIH arrhythmia database.


