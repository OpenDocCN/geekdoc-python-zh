    \n**示例 5.4.14（Beta-二项模型）** 硬币正面概率 $\\theta$ 未知。先验 $\\theta \\sim \\text{Beta}(\\\
    alpha, \\beta)$；数据 $x \\mid \\theta \\sim \\text{Binom}(n, \\theta)$。后验分布为：\n\n\
    $$\\theta \\mid x \\sim \\text{Beta}(\\alpha + x, \\beta + n - x).$$\n\n当 $\\\
    alpha = \\beta = 1$（均匀先验）且 $n = 10$ 次投掷中出现 $x = 7$ 次正面时，后验 Beta(8, 4) 的均值为 $8/12\
    \ \\approx 0.667$，95% 可信区间为 (0.39, 0.88)。\n\n```python\nimport scipy.stats as\
    \ st, numpy as np\nalpha, beta, x, n = 1, 1, 7, 10\nposterior = st.beta(alpha+x,\
    \ beta+n-x)\nprint(posterior.mean(), posterior.interval(.95))\n```\n\n**示例 5.4.15（均值未知的正态-正态模型）**\
    \ 观测值 $y_i \\sim \\mathcal{N}(\\mu, \\sigma^2)$；$\\sigma^2$ 已知；先验 $\\mu \\sim\
