    # Stability Considerations


    +   - Differencing operations are ill-conditioned: computing $f(x+h) - f(x)$ for
    small $h$ involves subtracting nearly equal quantities, potentially leading to
    catastrophic cancellation.

    - Choosing $h$ too small *increases* error due to finite machine precision; this
    trade-off must be balanced algorithmically.

    - Automatic differentiation is numerically stable by design but can be computationally
    intensive if nested gradients or loops are involved.


    Numerical differentiation enables the approximation of derivatives when analytic
    forms are unavailable, but its precision is limited by the structure of floating-point
    arithmetic. Automatic differentiation circumvents these limitations, providing
    exact gradients with the syntactic convenience of numerical code, and becomes
    indispensable in gradient-based optimisation and scientific computing.


    # 3.1.2 Symbolic Differentiation Using SymPy


    Symbolic differentiation manipulates expressions rather than numerical values.
    It rewrites a function $f(x)$ into its formal derivative $f''(x)$ by recursively
    applying differentiation rules. The Python library SymPy provides a powerful symbolic
    engine capable of performing exact calculus over expressions, polynomials, and
    even piecewise-defined functions. This subsection explores the core differentiation
    operators, rules for composition, and strategies for simplifying the resulting
    expressions.


    # Differentiation Rules and Operators


    Let $f, g : \mathbb{R} \to \mathbb{R}$ be differentiable functions and $c \in
    \mathbb{R}$. Symbolic differentiation applies the following basic rules:'
  - '[PAGE 75]


    $$\frac{d}{dx}(cf(x)) = cf''(x) \quad \text{(linearity)}$$

    $$\frac{d}{dx}(f(x) + g(x)) = f''(x) + g''(x) \quad \text{(sum rule)}$$

    $$\frac{d}{dx}(f(x)g(x)) = f''(x)g(x) + f(x)g''(x) \quad \text{(product rule)}$$

    $$\frac{d}{dx}\left(\frac{f(x)}{g(x)}\right) = \frac{f''(x)g(x) - f(x)g''(x)}{g(x)^2}
    \quad \text{(quotient rule)}$$

    $$\frac{d}{dx}f(g(x)) = f''(g(x)) \cdot g''(x) \quad \text{(chain rule)}$$


    In SymPy, differentiation is performed using the `diff()` function:


    ```

    python

    import sympy as sp

    x = sp.Symbol(''x'')

    f = sp.sin(x**2) * sp.exp(x)

    df = sp.diff(f, x)

    sp.pprint(df)

    ```


    The result is an exact symbolic expression:


    $$\frac{d}{dx}\left[\sin(x^2)e^x\right] = 2x\cos(x^2)e^x + \sin(x^2)e^x.$$


    **Partial Derivatives** Multivariate functions support symbolic partial differentiation:


    ```

    python

    x, y = sp.symbols("x y")

    f = sp.exp(x*y)

    df_dx = sp.diff(f, x)

    df_dy = sp.diff(f, y)

    ```


    returns:


    $$\frac{\partial}{\partial x}e^{xy} = ye^{xy}, \quad \frac{\partial}{\partial
    y}e^{xy} = xe^{xy}.$$


    **Higher-Order Derivatives**


    To compute $n$-th derivatives, pass the order as a second argument:


    ```

    python

    f = sp.log(sp.sin(x))

    d4 = sp.diff(f, x, 4)

    sp.pprint(d4)

    ```


    This returns a fourth-order derivative involving cotangent and cosecant functions,
    as expected from repeated application of the chain and product rules.'
