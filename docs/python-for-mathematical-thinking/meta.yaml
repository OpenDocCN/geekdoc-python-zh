  md: '# 5.2 Descriptive Statistics


    Descriptive statistics summarise the salient features of a dataset without recourse
    to a probabilistic model. Measures of *central tendency* describe the location
    of the bulk of observations, while measures of dispersion describe variability.
    In practice, these summaries are essential for sanity checking raw data, designing
    simulation inputs, and communicating empirical findings.


    # 5.2.1 Measures of Central Tendency


    **Mean, Median, Mode in Python**


    Let $\mathbf{x} = (x_1, x_2, \ldots, x_n) \in \mathbb{R}^n$ denote a sample of
    size $n$.


    **Arithmetic Mean**


    $$\bar{x} = \frac{1}{n} \sum_{i=1}^{n} x_i.$


    *Properties*: linear in data, sensitive to extreme values, unbiased estimator
    of the population mean under i.i.d. sampling.


    **Median** For the ordered sample $x_{(1)} \le \cdots \le x_{(n)}$,


    $$\text{med}(\mathbf{x}) = \begin{cases} x_{(\frac{n+1}{2})}, & n \text{ odd},
    \ \frac{x_{(\frac{n}{2})} + x_{(\frac{n}{2}+1)}}{2}, & n \text{ even}. \end{cases}$$


    *Robustness*: median has a 50% breakdown point.


    **Mode** For continuous data, the mode maximises the density estimate; for discrete
    data it is the most frequent value.


    **Example 5.2.1 (Compute Basic Statistics)**


    ```

    import numpy as np, statistics as st, scipy.stats as ss

    x = np.array([7, 3, 8, 2, 5, 8, 3, 9])


    mean = x.mean()

    median = np.median(x)

    mode = st.mode(x) # Python 3.8+ returns statistics._ModeResult

    print(mean, median, mode.mode[0])

    ```


    Output: 5.625 (mean), 6.0 (median), 8 (mode).'
