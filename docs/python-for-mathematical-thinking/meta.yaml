    \ 0$ implies $\\mathbf{x}^*$ is *stable*. If $\\dot{V} < 0$ for $\\mathbf{x} \\\
    ne \\mathbf{x}^*$, the equilibrium is *asymptotically stable*.\n\n**Quadratic\
    \ Candidate for Linear Systems** For $\\dot{\\mathbf{x}} = \\mathbf{A}\\mathbf{x}$\
    \ with $\\mathbf{A}$ Hurwitz, solve Lyapunov equation $\\mathbf{A}^T\\mathbf{P}\
    \ + \\mathbf{P}\\mathbf{A} = -\\mathbf{Q}$ (any $\\mathbf{Q} > 0$) and set $V\
    \ = \\mathbf{x}^T\\mathbf{P}\\mathbf{x}$.\n\n**Example 6.1.18 (2D System)** $\\\
    dot{\\mathbf{x}} = \\begin{pmatrix} -2 & -1 \\\\ 3 & -4 \\end{pmatrix}\\mathbf{x}$.\
    \ Choose $\\mathbf{Q} = \\mathbf{I}$; solve for $\\mathbf{P}$:\n\n```python\n\
    A = sp.Matrix([[-2,-1],[3,-4]])\nP = sp.Matrix(sp.symbols('p11 p12 p22')).reshape(2,2)\n\
    Q = sp.eye(2)\neq = A.T*P + P*A + Q\nsol = sp.solve(eq.reshape(4,1), list(P))\n\
    P = sp.Matrix([[sol[sp.symbols('p11')], sol[sp.symbols('p12')]],\n           \
    \    [sol[sp.symbols('p12')], sol[sp.symbols('p22')]]])\n```\n\n$\\mathbf{P}$\
    \ is positive-definite; $V = \\mathbf{x}^T\\mathbf{P}\\mathbf{x}$ strictly decreases\
    \ $\\implies$ global asymptotic stability.\n\n**LaSalle's Invariance Principle**\
    \ If $\\dot{V} \\leq 0$ and solutions remain in a compact set, trajectories approach\
    \ the largest invariant subset where $\\dot{V} = 0$. Used to prove global convergence\
    \ to limit cycles or equilibria when $\\dot{V}$ is only negative semi-definite.\n\
