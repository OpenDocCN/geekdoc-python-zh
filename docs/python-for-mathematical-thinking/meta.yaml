    # **3.3.3 Line Integrals and Surface Integrals**


    In multivariable calculus, integrals generalise from areas and volumes to curvilinear
    and surface domains. A **line integral** accumulates a function along a path,
    and a **surface integral** computes quantities such as flux through a surface.
    These integrals are essential in physics and engineering: work, circulation, and
    electric/magnetic flux are described using such integrals. This section covers
    scalar and vector line integrals, surface integrals, and their computation using
    Python and SymPy.


    # **Scalar Line Integrals**


    Given a scalar field $f : \mathbb{R}^n \to \mathbb{R}$ and a smooth path $\gamma
    : [a, b] \to \mathbb{R}^n$, the scalar line integral is:


    $$\int_{\gamma} f \, ds = \int_a^b f(\gamma(t)) \|\gamma''(t)\| \, dt.$$


    This represents the accumulated value of $f$ along the curve, weighted by arc
    length.'
  - '[PAGE 98]


    # Example 3.3.15 (Length of a Curve)


    Let $\gamma(t) = (t, t^2)$, $t \in [0, 1]$. Compute arc length:


    $$L = \int_0^1 \sqrt{(dx/dt)^2 + (dy/dt)^2} \, dt = \int_0^1 \sqrt{1 + 4t^2} \,
    dt.$$


    ```

    import sympy as sp

    t = sp.Symbol("t")

    $\gamma$ = [t, t**2]

    speed = sp.sqrt(sum([sp.diff(c, t)**2 for c in $\gamma$]))

    L = sp.integrate(speed, (t, 0, 1))

    sp.pprint(L)

    ```


    This yields an exact expression for arc length:


    $$\frac{1}{4}\left((1+4)^{3/2} - 1\right) = \frac{1}{4}(5^{3/2} - 1).$$


    # Example 3.3.16 (Integrating Temperature Along a Wire)


    Let $f(x, y) = x^2 + y^2$, and path $\gamma(t) = (\cos t, \sin t)$, $t \in [0,
    \pi/2]$. Then $f(\gamma(t)) = 1$, so:


    $$\int_{\gamma} f \, ds = \int_0^{\pi/2} 1 \cdot \|\gamma''(t)\| \, dt = \int_0^{\pi/2}
    1 \, dt = \frac{\pi}{2}.$$


    ```

    $\gamma$ = [sp.cos(t), sp.sin(t)]

    f = $\gamma$[0]**2 + $\gamma$[1]**2

    speed = sp.sqrt(sum([sp.diff(c, t)**2 for c in $\gamma$]))

    I = sp.integrate(f * speed, (t, 0, sp.pi/2))

    sp.pprint(I)

    ```


    # Vector Line Integrals


    Given a vector field $\vec{F} = (P, Q)$ and a path $\gamma(t) = (x(t), y(t))$,
    the line integral along the path is:


    $$\int_{\gamma} \vec{F} \cdot d\vec{r} = \int_a^b \left[ P(x(t), y(t)) \, x''(t)
    + Q(x(t), y(t)) \, y''(t) \right] dt.$$


    # Example 3.3.17 (Work Done by a Force Field)


    Let $\vec{F} = (x^2, y)$, and path $\gamma(t) = (t, t^2)$, $t \in [0, 1]$. Then:


    $$\int_{\gamma} \vec{F} \cdot d\vec{r} = \int_0^1 \left[ t^2 \cdot 1 + t^2 \cdot
    2t \right] dt = \int_0^1 t^2 + 2t^3 \, dt.$$'
