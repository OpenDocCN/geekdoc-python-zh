    \ on *held-out* test folds; training data explanations overstate significance.\n\
    -   *Causal fallacy.* High SHAP for feature $j$ implies predictive, not causal,\
    \ influence; causal inference requires interventions.\n\n## 10.4.2 Model Evaluation\
    \ and Validation Techniques\n\nReliable generalisation hinges on estimating out-of-sample\
    \ risk and selecting parsimonious models that balance bias and variance. This\
    \ subsection formalises risk estimation via resampling, addresses class imbalance\
    \ through synthetic minority oversampling, and leverages information criteria\
    \ grounded in maximum-likelihood theory for principled model comparison.\n\n##\
    \ Cross-Validation and Resampling Methods\n\nLet $\\widehat{R}_{\\mathcal{T},\\\
    mathcal{V}}(f) = \\frac{1}{|\\mathcal{V}|} \\sum_{i \\in \\mathcal{V}} \\ell(f_{\\\
    mathcal{T}}(\\mathbf{x}_i), y_i)$ be the validation error when the learner is\
    \ trained on $\\mathcal{T}$ and evaluated on $\\mathcal{V}$. Define partitions\
    \ $\\{\\mathcal{F}_k\\}_{k=1}^K$ of $\\{1, \\dots, n\\}$.\n\n### $K$-Fold Cross-Validation\n\
    \n$$\\widehat{R}_{\\text{CV}}(f) = \\frac{1}{K} \\sum_{k=1}^K \\widehat{R}_{\\\
    mathcal{F}_{-k}, \\mathcal{F}_k}(f).$$\n\nUnbiased for i.i.d. data; variance decreases\
    \ with $K$ but computational cost increases. Leave-one-out (LOO) sets $K = n$,\
    \ achieving minimal bias but high variance; $K = 5$ or $10$ typically balances.\n\
    \n**Repeated CV** resamples folds $B$ times, averaging errors $\\frac{1}{B} \\\
    sum_b \\widehat{R}_{\\text{CV}}^{(b)}$, stabilising variance estimate.\n\n###\
    \ Bootstrap\n\nResample indices with replacement to form $\\mathcal{T}_b^*$ of\
    \ size $n$, evaluate $\\widehat{R}_b^* = \\frac{1}{n_{\\text{oob}}} \\sum_{i \\\
    notin \\mathcal{T}_b^*} \\ell(f_{\\mathcal{T}_b^*}, y_i)$, where $n_{\\text{oob}}\
    \ \\approx 0.368n$ are *out-of-bag* observations. The $B$-bootstrap estimate $\\\
    widehat{R}^*$ approximates the .632 estimator\n\n$$\\widehat{R}_{.632} = 0.368\
    \ \\widehat{R}_{\\text{train}} + 0.632 \\widehat{R}^*,$$\n\nalleviating training\
    \ bias.\n\n```python\nfrom sklearn.model_selection import KFold, cross_val_score\n\
    cv10 = KFold(n_splits=10, shuffle=True, random_state=0)\ncv_score = cross_val_score(model,\
    \ X, y, cv=cv10, scoring='roc_auc').mean()\n```\n\n### Nested Cross-Validation\n\
    \nOuter folds estimate generalisation; inner folds tune hyperparameters $\\lambda$.\
    \ Avoids optimistic bias inherent in reusing validation data for both tuning and\
    \ assessment.\n\n```python\nfrom sklearn.model_selection import GridSearchCV,\
    \ cross_val_score\nparam = {'C': [.1,1,10]}\ngs = GridSearchCV(SVC(kernel='rbf'),\
    \ param, cv=5)\nnested = cross_val_score(gs, X, y, cv=5).mean()\n```\n\n## Handling\
    \ Imbalanced Datasets: SMOTE and ADASYN\n\nClass imbalance distorts empirical\
    \ risk and bias towards majority class. Let $p_+ = n_+/n \\ll 1$. Strategies:\
    \ resampling, cost-sensitive loss, synthetic sample generation.\n\n### SMOTE (Synthetic\
    \ Minority Over-sampling Technique)\n\nFor minority sample $\\mathbf{x}_i$, select\
    \ $k$ nearest minority neighbours; generate\n\n$$\\tilde{\\mathbf{x}} = \\mathbf{x}_i\
    \ + \\lambda(\\mathbf{x}_{\\text{nn}} - \\mathbf{x}_i), \\quad \\lambda \\sim\
    \ \\mathcal{U}(0, 1).$$\n\nCreates convex combinations, reduces overfitting vs.\
    \ simple duplication.\n\n### ADASYN\n\nAdaptive density: compute local ratio $r_i\
    \ = \\frac{\\text{\\#majority in } k\\text{-nn}(\\mathbf{x}_i)}{k}$, normalise\
    \ $p_i = r_i / \\sum r_j$, and synthesise $g_i = \\lceil p_i G \\rceil$ samples\
    \ (total $G$). Focuses on hard-to-learn regions near class boundary.\n\n```python\n\
    from imblearn.over_sampling import SMOTE, ADASYN\nX_sm, y_sm = SMOTE(k_neighbors=5,\
    \ random_state=0).fit_resample(X, y)\nX_ad, y_ad = ADASYN(random_state=0).fit_resample(X,\
    \ y)\n```\n\n## Evaluation with PR-AUC and MCC\n\nPrecision-recall AUC better\
    \ reflects minority performance than ROC when $p_+ \\ll 1$. Matthews correlation\
    \ coefficient $\\text{MCC} = \\frac{TP \\cdot TN - FP \\cdot FN}{\\sqrt{(TP+FP)(TP+FN)(TN+FP)(TN+FN)}}$\
    \ is a balanced measure for binary classifications.\n\n## Model Selection with\
    \ AIC, BIC, and Information Criteria\n\nAssume parametric likelihood $L(\\theta;\
    \ \\mathcal{D})$ with MLE $\\hat{\\theta}$. Information criteria penalise model\
    \ complexity $k = \\dim \\theta$.\n\n$$\\text{AIC} = 2k - 2 \\ln L(\\hat{\\theta}),\
    \ \\quad \\text{BIC} = k \\ln n - 2 \\ln L(\\hat{\\theta}).$$\n\nAIC minimises\
    \ expected Kullback–Leibler divergence to true model; BIC approximates Bayesian\
    \ model evidence under unit information prior. Lower value preferred.\n\n### Corrected\
    \ AIC\n\nFor small sample $n/k < 40$, $\\mathrm{AIC}_c = \\mathrm{AIC} + \\frac{2k(k+1)}{n-k-1}$.\n\
    \n### Elastic-Net Path Selection\n\nGeneralised linear model with penalty $\\\
    lambda(\\alpha\\|\\beta\\|_1 + \\frac{1}{2}(1-\\alpha)\\|\\beta\\|_2^2)$ evaluates\
    \ AIC along $\\lambda$ grid; choose $\\lambda^* = \\arg\\min_\\lambda \\mathrm{AIC}(\\\
    lambda)$. Efficient via `glmnet`:\n\n```python\nimport glmnet_python\nfit = glmnet_python.glmnet(x=X.values,\
    \ y=y.values, family='binomial')\naic = glmnet_python.glmnet_aic(fit)\nlambda_opt\
    \ = fit['lambdas'][aic.argmin()]\n```\n\n### Cross-Validated Information Criteria\n\
    \nWatanabe–Akaike (WAIC) and leave-one-out cross-validation (LOO-CV) approximate\
    \ Bayesian predictive accuracy; implemented in probabilistic frameworks (PyMC,\
    \ ArviZ).\n\n## 10.4.3 Generative Models\n\nGenerative modelling seeks an estimator\
    \ $\\hat{p}(\\mathbf{x})$ that faithfully approximates the data-generating distribution\
    \ $p_{\\text{data}}(\\mathbf{x})$ on $\\mathbb{R}^d$. Once learned, $\\hat{p}$\
    \ enables (i) *sampling* realistic instances; (ii) *inference* of latent causes;\
    \ (iii) *density evaluation* for anomaly detection; and (iv) *representation learning*\
    \ that benefits downstream predictions. We survey three archetypes—latent-variable\
    \ autoencoders, adversarial games, and probabilistic graphical models—highlighting\
    \ their mathematical formulation and implementation idioms.\n\n## Autoencoders\
    \ and Variational Autoencoders (VAEs)\n\n### Deterministic Autoencoder\n\nEncoder\
    \ $\\phi_\\theta : \\mathbf{x} \\mapsto \\mathbf{z} \\in \\mathbb{R}^k$, decoder\
    \ $\\psi_\\phi : \\mathbf{z} \\mapsto \\hat{\\mathbf{x}}$. Minimise reconstruction\n\
    \n$$\\mathcal{L}_{\\mathrm{AE}}(\\theta, \\phi) = \\frac{1}{n} \\sum_{i=1}^n \\\
    |\\mathbf{x}_i - \\psi_\\phi(\\phi_\\theta(\\mathbf{x}_i))\\|_2^2.$$\n\nReduction\
    \ $k < d$ forces information bottleneck; decoder smoothness encourages manifold\
    \ learning.\n\n### Variational Autoencoder (Kingma and Welling 2014)\n\nIntroduce\
    \ stochastic latent $\\mathbf{z} \\sim q_{\\theta}(\\mathbf{z} \\mid \\mathbf{x})$\
    \ (encoder) and likelihood $p_{\\phi}(\\mathbf{x} \\mid \\mathbf{z})$. Evidence\
    \ lower bound (ELBO) maximised:\n\n$\\mathcal{L}_{\\text{VAE}}(\\theta, \\phi)\
    \ = \\mathbb{E}_{q_{\\theta}(\\mathbf{z}|\\mathbf{x})}\\left[\\ln p_{\\phi}(\\\
    mathbf{x} \\mid \\mathbf{z})\\right] - \\text{KL}(q_{\\theta}(\\mathbf{z} \\mid\
    \ \\mathbf{x}) \\| p(\\mathbf{z})) \\leq \\ln p(\\mathbf{x})$.\n\n**Reparameterisation\
    \ Trick** With Gaussian encoder $q_{\\theta}(\\mathbf{z} \\mid \\mathbf{x}) =\
    \ \\mathcal{N}(\\boldsymbol{\\mu}_{\\theta}, \\text{diag } \\boldsymbol{\\sigma}_{\\\
    theta}^2)$, write $\\mathbf{z} = \\boldsymbol{\\mu}_{\\theta} + \\boldsymbol{\\\
    sigma}_{\\theta} \\odot \\boldsymbol{\\epsilon}, \\boldsymbol{\\epsilon} \\sim\
    \ \\mathcal{N}(0, I)$, rendering gradient path differentiable.\n\n```python\n\
    def reparameterise(mu, log_sigma):\n    epsilon = torch.randn_like(mu)\n    return\
    \ mu + epsilon * torch.exp(0.5 * log_sigma)\n\nrecon = decoder(z)\nreconL = F.mse_loss(recon,\
    \ x, reduction='sum')\nKLD = -0.5 * torch.sum(1 + log_sigma - mu.pow(2) - log_sigma.exp())\n\
    loss = reconL + KLD\n```\n\n### $\\beta$-VAE and Disentanglement\n\nELBO modified\
    \ to $\\mathbb{E} \\ln p_{\\phi} - \\beta \\text{ KL}; \\beta > 1$ emphasises\
    \ factorised latent priors, promoting disentangled representations that align\
    \ dimensions with semantic factors.\n\n## Generative Adversarial Networks (GANs)\
    \ and Applications\n\n### Minimax Game\n\nGenerator $G_{\\theta} : \\mathbf{z}\
    \ \\sim p_z \\mapsto \\tilde{\\mathbf{x}}$, discriminator $D_{\\phi} : \\mathbb{R}^d\
    \ \\rightarrow (0, 1)$. Objective:\n\n$\\min_{\\theta} \\max_{\\phi} \\mathcal{V}(\\\
    theta, \\phi) = \\mathbb{E}_{\\mathbf{x} \\sim p_{\\text{data}}}\\left[\\ln D_{\\\
    phi}(\\mathbf{x})\\right] + \\mathbb{E}_{\\mathbf{z} \\sim p_z}\\left[\\ln(1 -\
    \ D_{\\phi}(G_{\\theta}(\\mathbf{z})))\\right]$.\n\nOptimal discriminator $D^*(\\\
    mathbf{x}) = \\frac{p_{\\text{data}}}{p_{\\text{data}} + p_G}$ reduces to Jensen–Shannon\
    \ divergence $\\text{JSD}(p_{\\text{data}} \\| p_G)$ between distributions; generator\
    \ converges when $\\text{JSD} = 0$.\n\n**Training Heuristics** Replace $\\ln(1\
    \ - D)$ by $-\\ln D$ for stronger gradients; use feature matching loss $\\|\\\
    mathbb{E}_{\\text{data}} \\phi(\\mathbf{x}) - \\mathbb{E}_{\\mathbf{z}} \\phi(G(\\\
    mathbf{z}))\\|_2^2$ to stabilise. Wasserstein GAN minimises Earth-Mover distance\
    \ with 1-Lipschitz critic utilising gradient penalty $\\lambda(\\|\\nabla_{\\\
    tilde{\\mathbf{x}}} D\\|_2 - 1)^2$."
