    \n# 6.2 Partial Differential Equations (PDEs)\n\nWhile ordinary differential equations\
    \ govern systems depending on a single independent variable, **partial differential\
    \ equations** describe phenomena whose state $u = u(\\mathbf{x}, t)$ varies over\
    \ both *space* and *time*. Canonical physical laws—heat conduction, wave propagation,\
    \ fluid flow, quantum mechanics—are all phrased in the language of PDEs. This\
    \ subsection introduces the three archetypal second-order linear PDEs, formulates\
    \ initial- and boundary-value problems, and derives classical analytic solutions\
    \ via separation of variables and d'Alembert's principle. Python verification\
    \ proceeds with sympy's symbolic PDE module and numpy/matplotlib visualisation.\n\
    \n# Heat Equation, Wave Equation, and Laplace's Equation\n\n**Heat (Diffusion)\
    \ Equation** For temperature $u(x, t)$ on a rod $0 < x < L$:\n\n$$u_t = \\kappa\
    \ u_{xx}, \\quad \\kappa > 0.$$\n\nParabolic: information diffuses with infinite\
