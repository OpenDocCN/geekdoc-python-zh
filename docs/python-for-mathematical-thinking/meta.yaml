  md: 'Example (One-sided t) Test $H_0 : \mu = 0$ vs. $H_1 : \mu > 0$ with $n = 16$,
    $\sigma$ known $= 2$, $\alpha = 0.05$. Critical value:


    $$c = \frac{z_{0.95}\sigma}{\sqrt{n}} = 1.645 \cdot \frac{2}{4} = 0.823.$$


    If true mean $\mu_1 = 1$, power $= 1 - \beta$ where


    $$\beta = \Phi\left(\frac{c - \mu_1}{\sigma/\sqrt{n}}\right) = \Phi((0.823 - 1)
    \cdot 2) = \Phi(-0.354) \approx 0.362.$$


    Thus power 0.638.


    # Power of a Test and Sample Size Determination


    **Power Function** $\pi(\mu) = \mathbb{P}_{\mu}(\text{reject } H_0)$. Goal: choose
    $n$ s.t. $\pi(\mu_1) \geq 1 - \beta^*$ for desired effect size $\delta = \mu_1
    - \mu_0$.


    **Analytic Formula (z-test)** Known $\sigma$, two-sided, significance $\alpha$:


    $$n \geq \left(\frac{z_{1-\alpha/2} + z_{1-\beta}}{\delta/\sigma}\right)^2.$$


    Example 5.3.5 (Designing a Clinical Trial) Detect $\delta = 5$ mmHg BP drop, $\sigma
    = 12$ mmHg, $\alpha = 0.05$, power 0.9 ($\beta = 0.1$).


    $$n \geq \left(\frac{1.96 + 1.28}{5/12}\right)^2 = (3.24 \cdot 2.4)^2 \approx
    600.$$


    Hence $n = 61$ per group.


    ```

    from statsmodels.stats.power import TTestIndPower

    power_calc = TTestIndPower()

    n = power_calc.solve_power(effect_size=5/12, power=0.9, alpha=0.05)

    print(np.ceil(n)) # 61.0

    ```


    # Visualisation of Power Curve (cf. Fig. 5.7)


    ```

    delta = np.linspace(0, 8, 100)

    power = power_calc.power(effect_size=delta/12, nobs1=61, alpha=0.05)

    plt.plot(delta, power); plt.xlabel("Effect size $\Delta$"); plt.ylabel("Power");

    plt.show()

    ```


    **Effect Size Metrics** Cohen''s $d = \delta/\sigma$, Cramér''s $V$ for $\chi^2$
    tables, odds ratio for logistic tests; power increases with $n$ and with true
    effect size.'
