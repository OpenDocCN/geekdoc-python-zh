    # Data Compression


    For an image matrix $A \in \mathbb{R}^{m \times n}$, keep the leading $k$ singular
    triplets; memory drops from $mn$ to $k(m + n + 1)$. For $512 \times 512$ grayscale
    Lena, $k = 50$ compresses by $> 80\%$ while the peak-signal-to-noise ratio (PSNR)
    exceeds 35 dB (cf. Fig. 8.2).


    ```

    import imageio, matplotlib.pyplot as plt

    A = imageio.imread(''lena_gray.png'').astype(float)

    U, s, Vt = np.linalg.svd(A, full_matrices=False)

    k = 50

    Ak = (U[:,:k] * s[:k]) @ Vt[:k,:]

    plt.imshow(Ak, cmap=''gray''); plt.title(f''Rank-{k} approx'')

    plt.axis(''off''); plt.show()

    ```


