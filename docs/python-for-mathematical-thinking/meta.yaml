  md: '# Forward Difference (FD)


    Subtract $f(x)$ from $f(x+h)$:


    $$f''(x) \approx \frac{f(x+h) - f(x)}{h}$$ with truncation error $\frac{h}{2}
    f''''(x) + O(h^2)$.


    First-order accurate: $E_h^{\text{FD}} = O(h) + O(\varepsilon/h)$, where $\varepsilon$
    is machine unit (round-off).


    # Backward Difference (BD)


    Analogous with $f(x) - f(x-h)$; identical error behaviour.


    # Central Difference (CD)


    Combine forward and backward:


    $$f''(x) \approx \frac{f(x+h) - f(x-h)}{2h}$$ truncation $\frac{h^2}{6} f^{(3)}(x)
    + O(h^4)$,


    second-order accurate; optimal when evaluations flanking $x$ are allowed.


    # Higher-Order Stencils


    Solve linear systems for coefficients $c_i$ s.t. $f''(x) = \sum_{i=-m}^{m} c_i
    f(x+ih) + O(h^{2m})$.


    For $m=2$,


    $$f''(x) \approx \frac{-f(x+2h) + 8f(x+h) - 8f(x-h) + f(x-2h)}{12h} + O(h^4).$$


    # Richardson Extrapolation


    Given approximations $D(h)$ and $D(h/2)$ with error $Ch^p + O(h^{p+1})$, eliminate
    the leading term:


    $$D_{\text{rich}} = \frac{2^p D(h/2) - D(h)}{2^p - 1} = f''(x) + O(h^{p+1}),$$'
