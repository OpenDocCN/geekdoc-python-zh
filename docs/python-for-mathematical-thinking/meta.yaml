    mathbb{E}_{\\mathbf{x} \\sim p_{\\text{data}}}\\left[\\ln D_{\\phi}(\\mathbf{x})\\\
    right] + \\mathbb{E}_{\\mathbf{z} \\sim p_z}\\left[\\ln(1 - D_{\\phi}(G_{\\theta}(\\\
    mathbf{z})))\\right]$。\n\n最优判别器$D^*(\\mathbf{x}) = \\frac{p_{\\text{data}}}{p_{\\\
