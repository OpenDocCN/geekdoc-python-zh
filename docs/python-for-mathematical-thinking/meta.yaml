    \n# Integration (scipy.integrate)\n\n```\nfrom scipy.integrate import quad, solve_ivp\n\
    \nI, err = quad(lambda t: np.exp(-t**2), 0, np.inf) # √π/2\n\ndef f(t, y): return\
    \ [y[1], -y[0]] # SHO\nsol = solve_ivp(f, [0, 10], y0=[0, 1], method=\"RK45\"\
    ,\n                t_eval=np.linspace(0,10,200))\n```\n\n# Linear Algebra (scipy.linalg\
    \ and sparse scipy.sparse.linalg)\n\n```\nfrom scipy.linalg import solve_triangular,\
    \ svd\nfrom scipy.sparse import csr_matrix\nfrom scipy.sparse.linalg import cg,\
    \ eigs\n\nL = np.tril(A); x = solve_triangular(L, b, lower=True)\nU,S,Vh = svd(B,\
    \ full_matrices=False) # dense SVD\n\nA_sparse = csr_matrix(A_5point_stencil)\n\
    x_cg, info = cg(A_sparse, b, tol=1e-8) # Conjugate Gradient\nλmax, v = eigs(A_sparse,\
    \ k=1, which='LM') # largest eigenvalue\n```\n\n# Statistics (scipy.stats)\n\n\
    ```\nfrom scipy.stats import norm, ttest_ind\n\nμ, σ = 0, 2\np = norm.cdf(1.96,\
    \ loc=μ, scale=σ)\nci = norm.interval(0.95, loc=μ, scale=σ/np.sqrt(n))\n\nt, pval\
    \ = ttest_ind(X, Y, equal_var=False) # Welch's t-test\n```"
