    # Time Series Analysis and ARIMA Models


    A univariate time series $\{Y_t\}_{t \in \mathbb{Z}}$ often exhibits autocorrelation
    and non-stationarity. The **ARIMA**$(p, d, q)$ model combines autoregressive (AR),
    differencing (I for “integrated”), and moving-average (MA) components:


    $\Phi(B)(1 - B)^d Y_t = \Theta(B)\varepsilon_t, \quad B \text{ shift operator},
    \quad \varepsilon_t \sim \mathcal{N}(0, \sigma^2)$.


    # ARIMA Diagnostics


    +   1. Plot series, check stationarity via Augmented Dickey–Fuller (ADF) test.

    2. ACF/PACF suggest AR and MA orders (cf. Fig. 5.8).

    3. Fit competing $(p, d, q)$ via AIC.


