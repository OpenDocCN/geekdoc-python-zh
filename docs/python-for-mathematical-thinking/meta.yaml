- md: '## Independence and Dependence of Events


    **Definition** Events $A$, $B$ are **independent** if

    $$\mathbb{P}(A \cap B) = \mathbb{P}(A)\mathbb{P}(B),$$

    equivalently $\mathbb{P}(A \mid B) = \mathbb{P}(A)$ when $\mathbb{P}(B) > 0$.


    **Mutual vs. Pairwise Independence** Three events $A$, $B$, $C$ are *mutually
    independent* if every subcollection has product measure equality, i.e.

    $$\mathbb{P}(A \cap B \cap C) = \mathbb{P}(A)\mathbb{P}(B)\mathbb{P}(C)$$

    and pairwise conditions hold. Pairwise independence does *not* imply mutual independence.


    **Example 5.1.4 (Pairwise Independent But Not Mutually)** Toss two fair coins.
    Let

    $$A = \{\text{first coin H}\}, \quad B = \{\text{second coin H}\}, \quad C = \{\text{coins
    have same face}\}.$$

    Check $\mathbb{P}(A) = \mathbb{P}(B) = \mathbb{P}(C) = \frac{1}{2}$. Each pair
    multiplies correctly, yet $\mathbb{P}(A \cap B \cap C) = \frac{1}{4} \neq \frac{1}{8}$
    so not mutually independent.


    ```python

    Ω = list(itertools.product("HT", repeat=2))

    A = [ω for ω in Ω if ω[0]==''H'']

    B = [ω for ω in Ω if ω[1]==''H'']

    C = [ω for ω in Ω if ω[0]==ω[1]]

    print(len(set(A)&set(B)&set(C))/4) # 0.25

    ```


    **Example (Independence of Complements)** If $A$ and $B$ are independent, so are
    $A^c$ and $B$, $A$ and $B^c$, and $A^c$ and $B^c$. Proof follows by substituting
    $\mathbb{P}(A^c) = 1 - \mathbb{P}(A)$ and algebra.


    **Example (Dice Sums)** Roll two fair dice. Let $E = \{\text{sum is 7}\}$ and
    $F = \{\text{first die even}\}$. Compute:

    $$\mathbb{P}(E) = \frac{6}{36}, \quad \mathbb{P}(F) = \frac{18}{36}, \quad \mathbb{P}(E
    \cap F) = \frac{3}{36},$$

    so independence holds ($\frac{6}{36} \cdot \frac{18}{36} = \frac{108}{1296} =
    \frac{3}{36}$).


    ```python

    Ω=[(i,j) for i in range(1,7) for j in range(1,7)]

    E=[ω for ω in Ω if sum(ω)==7]

    F=[ω for ω in Ω if ω[0]%2==0]

    print(len(set(E)&set(F))/36) # 0.0833...

    ```


    **Example (Dependence via Conditioning)** Randomly draw one card from a standard
    deck. Events:


    $$A = \{\text{card is red}\}, \quad B = \{\text{card is king}\}.$$


    Because $\mathbb{P}(A \cap B) = \frac{2}{52}$ while $\mathbb{P}(A)\mathbb{P}(B)
    = \frac{1}{2} \cdot \frac{4}{52} = \frac{2}{52}$, $A, B$ are independent. However
    conditioning on $C = \{\text{card is face card}\}$ breaks independence:


    $$\mathbb{P}(A \mid C) = \frac{6}{12} = \frac{1}{2}, \quad \mathbb{P}(B \mid C)
    = \frac{4}{12} = \frac{1}{3}, \quad \mathbb{P}(A \cap B \mid C) = \frac{2}{12}
    = \frac{1}{6} \neq \frac{1}{6},$$


    so independence remains; but conditioning on suit $D = \{\text{card is hearts
    or diamonds}\}$ makes $\mathbb{P}(B \mid D) = \frac{2}{26}$ vs. $\mathbb{P}(B)
    = \frac{4}{52}$, altering probability—dependence revealed.


    **Conditional Independence** Events $A, B$ may be dependent marginally but independent
    given $C$:


    $$\mathbb{P}(A \cap B \mid C) = \mathbb{P}(A \mid C)\mathbb{P}(B \mid C).$$


    **Example 5.1.5 (Sensor Fusion)** Let $C$ be true location of a robot cell, $A,
    B$ be noisy sensor readings. Conditioned on $C$, sensors errors are independent;
    unconditionally they are correlated.


    ## 5.1.2 Random Variables and Distributions


    A **random variable** (r.v.) is a measurable function $X : (\Omega, \mathcal{F})
    \to (\mathbb{R}, \mathcal{B})$ that assigns a real number to every outcome $\omega
    \in \Omega$. The distribution of $X$ encodes how probability mass or density is
    spread across $\mathbb{R}$. We distinguish *discrete* and *continuous* r.v.s,
    each governed by characteristic formulae.


    ## Discrete and Continuous Distributions


    **Discrete Random Variable** $X$ is **discrete** if it takes countable values
    $\{x_1, x_2, \ldots\}$ with


    $$p_X(x_k) = \mathbb{P}(X = x_k), \quad \sum_k p_X(x_k) = 1.$$


    $p_X$ is the *probability mass function* (pmf).


    **Continuous Random Variable** $X$ is **continuous** if there exists a non-negative
    integrable function $f_X$ such that


    $$\mathbb{P}(a < X \leq b) = \int_a^b f_X(t) \, dt, \quad \int_{-\infty}^{\infty}
    f_X(t) \, dt = 1.$$


    $f_X$ is the *probability density function* (pdf).


    **Mixed Distributions** Some r.v.s combine discrete atoms with continuous density
    (e.g. a distribution with a point mass at 0 and exponential tail on $(0, \infty)$).


    **Example 5.1.6 (Bernoulli ($p$))** Let $X \in \{0, 1\}$ with $\mathbb{P}(X =
    1) = p$.


    $$p_X(x) = p^x(1-p)^{1-x}, \quad \mu = \mathbb{E}[X] = p, \quad \sigma^2 = p(1-p).$$


    **Example 5.1.7 (Poisson($\lambda$))** Counts arrivals in a homogeneous Poisson
    process.


    $$p_X(k) = e^{-\lambda} \frac{\lambda^k}{k!}, \quad k \in \mathbb{N}_0.$$


    Mean $= \lambda$, variance $= \lambda$.


    **Example 5.1.8 (Standard Normal)**


    $$f_X(x) = \frac{1}{\sqrt{2\pi}} e^{-x^2/2}, \quad \mu = 0, \quad \sigma^2 = 1.$$


    Though no elementary closed form exists for its cdf $\Phi(x)$, `scipy` provides
    high-precision evaluation.


    ## Probability Density Functions and Cumulative Distribution Functions


    ## Cumulative Distribution Function (CDF)


    $$F_X(x) = \mathbb{P}(X \leq x) = \begin{cases} \sum_{k: x_k \leq x} p_X(x_k)
    & (\text{discrete}), \\ \int_{-\infty}^x f_X(t) \, dt & (\text{continuous}). \end{cases}$$


    Properties: non-decreasing, right-continuous, $\lim_{x \to -\infty} F_X = 0$,
    $\lim_{x \to \infty} F_X = 1$.


    **Example 5.1.9 (Exponential ($\lambda$))**


    $$f_X(x) = \lambda e^{-\lambda x} \mathbf{1}_{\{x \geq 0\}}, \quad F_X(x) = 1
    - e^{-\lambda x}.$$


    Memoryless: $\mathbb{P}(X > s + t \mid X > s) = e^{-\lambda t}$.


