    \ 8, 2**12\nsob = qmc.Sobol(d); xq = sob.random(N)\nuni = np.random.rand(N, d)\n\
    Iq = f(xq).mean(); Ir = f(uni).mean()\nprint(\"Quasi-MC err:\", abs(Iq-1/(1+1)**d))\n\
    print(\"Plain MC err:\", abs(Ir-1/(1+1)**d))\n```\n\n## 8.3.3 Applications of\
    \ Numerical Integration\n\nIntegrals surface whenever one must aggregate infinitesimal\
    \ contributions—geometric, physical, probabilistic—into macroscopic quantities.\
