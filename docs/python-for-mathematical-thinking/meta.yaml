    **Example 6.4.1 (Geometric Brownian Motion (GBM) (cf. Fig. 6.14))** $dS_t = \alpha
    S_t dt + \beta S_t dW_t$. With $f(s) = \ln s$, Itō''s lemma gives


    $$d \ln S_t = (\alpha - \frac{1}{2}\beta^2) dt + \beta dW_t \implies S_t = S_0
    \exp\left((\alpha - \frac{1}{2}\beta^2)t + \beta W_t\right).$$


    ```

    python

    S0, alpha, beta, T, N = 100, .1, .2, 1, 252

    dt = T/N

    W = np.cumsum(np.sqrt(dt)*np.random.randn(N))

    t = np.linspace(dt, T, N)

    S = S0*np.exp((alpha-0.5*beta**2)*t + beta*W)

    plt.plot(t, S); plt.show()

    ```


    **Girsanov Theorem (Øksendal 2003)** Under new measure $\mathbb{Q}$ defined by
    Radon–Nikodym density $\frac{d\mathbb{Q}}{d\mathbb{P}} = \exp\left(-\int_0^T \theta
    dW_t - \frac{1}{2}\int_0^T \theta^2 dt\right)$, process $W_t^{\mathbb{Q}} = W_t
    + \int_0^t \theta ds$ is Brownian in $\mathbb{Q}$. Tool for risk-neutral evaluation
    in finance and change-of-drift reductions in filtering theory.


    **Moment Evolution via Itō** For OU process $dX_t = -\gamma X_t dt + \sigma dW_t$,
    choose $f(x) = x^2$ to obtain $d(X_t^2) = (\sigma^2 - 2\gamma X_t^2) dt + 2\sigma
    X_t dW_t$. Taking expectations gives ODE $\partial_t \mathbb{E}[X_t^2] = \sigma^2
    - 2\gamma \mathbb{E}[X_t^2] \implies$ stationary variance $\sigma^2/(2\gamma)$.


    **Stratonovich vs. Itō** Stratonovich integral uses midpoint sampling; chain rule
    matches classical calculus. Conversion: $dX_t^{\text{Strat}} = dX_t + \frac{1}{2}\sigma
    \sigma_x dt$. Physical models with white-noise limits of coloured noise often
    prefer Stratonovich; financial models favour Itō for martingale properties.'
  - "[PAGE 251]\n\n# 6.4.2 Numerical Solutions of SDEs\n\nExact solutions exist only\
    \ for a narrow family of SDEs. Monte Carlo simulation therefore becomes the primary\
    \ tool for estimating expectations, hitting probabilities, or path-dependent payoffs.\
    \ Discretisation error must now account for the distributional convergence of\
    \ random paths. We review two strong-order schemes—Euler–Maruyama and Milstein—and\
    \ outline higher-order extensions based on multiple stochastic integrals.\n\n\
    # Euler–Maruyama Method\n\nGiven Itô SDE\n\n$$dX_t = \\mu(X_t, t) dt + \\sigma(X_t,\
    \ t) dW_t, \\quad X_0 = x_0,$$\n\nand time partition $0 = t_0 < \\cdots < t_N\
    \ = T$ with $\\Delta t = t_{n+1} - t_n$, Euler–Maruyama (EM) sets\n\n$$X_{n+1}\
    \ = X_n + \\mu(X_n, t_n) \\Delta t + \\sigma(X_n, t_n) \\Delta W_n, \\quad \\\
    Delta W_n \\sim \\mathcal{N}(0, \\Delta t).$$\n\nStrong order 0.5: $\\mathbb{E}[|X_T\
    \ - X_N|^2] = O((\\Delta t)^1)$. Weak order 1: $|\\mathbb{E}[\\varphi(X_T)] -\
    \ \\mathbb{E}[\\varphi(X_N)]| = O(\\Delta t)$ for sufficiently smooth $\\varphi$.\n\
    \n**Example 6.4.2 (Ornstein–Uhlenbeck (OU) Convergence)** OU: $dX_t = -\\gamma\
    \ X_t dt + \\sigma dW_t$ with analytic solution $X_T = x_0 e^{-\\gamma T} + \\\
    sigma \\int_0^T e^{-\\gamma(T-s)} dW_s$. Simulate EM for $T = 1$, $\\gamma = 1$,\
    \ $\\sigma = 0.5$ and compare empirical mean $\\mathbb{E}[X_T]$ with exact $x_0\
    \ e^{-\\gamma T}$ across step sizes $\\Delta t = 2^{-k}$.\n\n```\nimport numpy\
    \ as np\ndef OU_EM(x0, gamma, sigma, T, N, M=10_000):\n    dt, sqdt = T/N, np.sqrt(T/N)\n\
    \    X = np.full(M, x0)\n    for _ in range(N):\n        X += -gamma*X*dt + sigma*sqdt*np.random.randn(M)\n\
    \    return X\nx0, gamma, sigma = 1.0, 1, 0.5\nfor k in range(6):\n    N = 2**k\n\
    \    samples = OU_EM(x0, gamma, sigma, 1, N)\n    print(N, samples.mean())\n```\n\
    \nEmpirical bias decays proportionally to $\\Delta t^{0.5}$, confirming strong-order\
    \ theory.\n\n**Mean-Square Stability** For the linear SDE $dX_t = \\lambda X_t\
    \ dt + \\eta X_t dW_t$, EM is stable iff $1 + 2\\lambda \\Delta t + \\eta^2 \\\
    Delta t < 1 \\implies \\lambda \\Delta t < -\\frac{1}{2}\\eta^2 \\Delta t$. Shrinking\
    \ $\\Delta t$ cannot stabilise if $\\lambda > 0$ with too large $\\eta$ (mean-square\
    \ instability); implicit EM variants or tamed schemes remedy this for stiff SDEs."
  - "[PAGE 252]\n\n# Milstein Method and Higher-Order Approximations\n\nMilstein augments\
    \ EM with a *Lévy area* correction capturing first-order terms of Itô–Taylor expansion:\n\
    \n$$X_{n+1} = X_n + \\mu_n \\Delta t + \\sigma_n \\Delta W_n + \\frac{1}{2} \\\
    sigma_n \\sigma'_n [(\\Delta W_n)^2 - \\Delta t],$$\n\nwhere $\\sigma'_n = \\\
    partial_x \\sigma(X_n, t_n)$.\n\n**Strong Order 1** Milstein doubles convergence\
    \ exponent for SDEs with scalar noise. Cost overhead is marginal (one extra derivative\
    \ evaluation per step).\n\n**Example 6.4.3 (GBM with Milstein)** $dS_t = \\alpha\
    \ S_t \\, dt + \\beta S_t \\, dW_t$ has $\\sigma(x) = \\beta x$, $\\sigma'(x)\
    \ = \\beta$. Milstein update simplifies to\n\n$$S_{n+1} = S_n + \\alpha S_n \\\
    Delta t + \\beta S_n \\Delta W_n + \\frac{1}{2} \\beta^2 S_n [(\\Delta W_n)^2\
    \ - \\Delta t].$$\n\nSimulate for $\\alpha = 0.05$, $\\beta = 0.2$, $T = 1$ and\
    \ verify root-mean-square error decays like $O(\\Delta t)$, whereas EM decays\
    \ like $O(\\Delta t^{1/2})$.\n\n```\ndef GBM_Milstein(S0, \\alpha, \\beta, T,\
    \ N, M=50_000):\n    dt, sqdt = T/N, np.sqrt(T/N)\n    S = np.full(M, S0)\n  \
    \  for _ in range(N):\n        dW = sqdt*np.random.randn(M)\n        S += \\alpha*S*dt\
    \ + \\beta*S*dW + .5*\\beta**2*S*(dW**2 - dt)\n    return S\n```\n\n**Multi-dimensional\
    \ Noise** When $\\mathbf{W}_t$ is $m$-dimensional, Milstein requires iterated\
    \ stochastic integrals $I_{ij} = \\int_{t_n}^{t_{n+1}} \\int_{t_n}^s dW^i \\,\
    \ dW^j$—computationally heavy. Stochastic Runge–Kutta (SRK) schemes of strong\
    \ order 1 sample approximate $I_{ij}$ via random variables with the same moments.\n\
    \n**Weak Order Schemes** If only expectations of functionals matter (e.g. option\
    \ pricing), weak Runge–Kutta methods achieve order 2 without iterated integrals\
    \ by antithetic or stratified random increments.\n\n**Tamed Euler for Super-Linear\
    \ Drift** For $\\mu(x) = x^3$ the moments explode for EM. Replace drift by $\\\
    mu_{\\text{tame}}(x) = \\mu(x)/(1 + \\Delta t|\\mu(x)|)$; retains strong order\
    \ 0.5 and preserves stability.\n\n# 6.4.3 Applications of SDEs\n\n**Financial\
    \ Modelling: Black–Scholes Equation**\n\nStock model $dS_t = \\mu S_t \\, dt +\
    \ \\sigma S_t \\, dW_t$ implies discounted price $e^{-rt} S_t$ is a martingale\
    \ under risk-neutral measure $\\mathbb{Q}$ with drift $r$. By Itô and no-arbitrage"
