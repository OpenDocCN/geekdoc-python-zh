    by inserting redundant implicants that smooth transitions.


    # 7.4.3 Advanced Topics in Logic


    Predicate (or *first-order*) logic extends propositional logic by permitting variables
    that range over a non-empty domain $\mathcal{D}$ together with *quantifiers*.
    Whereas the truth of a propositional formula is a function of finitely many Boolean
    assignments, the validity of a predicate formula depends on *all* interpretations
    of its symbols over *all* structures of the language. This leap in expressiveness
    amplifies deductive power—allowing one to formalise virtually the whole of classical
    mathematics—yet invites fundamental limitations captured by Gödel’s incompleteness
    theorems. Beyond the classical bivalent setting, alternative logics adapt the
    semantics or proof rules to model vagueness, modality, resource sensitivity, or
    inconsistency, thereby broadening the scope of logical analysis in computer science
    and philosophy.


    # Predicate Logic and Quantifiers


    A *signature* $\Sigma = \langle \mathcal{F}, \mathcal{P}, \text{ar} \rangle$ lists
    function symbols $\mathcal{F}$ and predicate symbols $\mathcal{P}$ with arities
    $\text{ar}(\cdot) \in \mathbb{N}$. The set of *terms* is generated from variables
    $\{x_1, x_2, \dots\}$ and function application; *atomic formulas* are $P(t_1,
    \dots, t_k)$ and $t_1 = t_2$. Formulas close under Boolean connectives and the
    quantifiers


    $\forall x \, \varphi$ and $\exists x \, \varphi$.


    *Semantics* fixes a structure $\mathcal{M} = \langle \mathcal{D}, (f^{\mathcal{M}})_{f
    \in \mathcal{F}}, (P^{\mathcal{M}})_{P \in \mathcal{P}} \rangle$ and an environment
    $\sigma$ mapping variables to elements of $\mathcal{D}$. Satisfaction $\mathcal{M},
    \sigma \models \varphi$ proceeds inductively; quantifiers take set–theoretic unions
    ($\forall$) or existential witnesses.


    **Prenex and Skolem Forms** Every formula is equivalent (in classical logic) to
    a *prenex* form $Q_1 x_1 \dots Q_n x_n \, \psi$ with quantifier block $Q_i \in
    \{\forall, \exists\}$ followed by quantifier-free $\psi$. Subsequently *Skolemisation*
    replaces existential variables with functional witnesses—preserving satisfiability
    and enabling automated theorem proving.'
