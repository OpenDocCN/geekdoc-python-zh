    seamlessly between analytic derivation, geometric insight, and computational experiment,
    culminating in a framework that'
  mdcn: '## 示例


    - *求和。* Kahan 补偿算法通过跟踪丢失的低位比特，将误差从 $O(n\varepsilon)$ 降低到 $O(\varepsilon)$。

    - *多项式求值。* Horner 法则是后向稳定的；直接计算 $p(x) = \sum_k a_k x^k$ 则不是。

    - *递推关系。* $y_{n+1} = (2n+1)y_n - n^2 y_{n-1}$ 的前向递推会使误差指数增长；逆转递推或使用渐近展开可恢复稳定性。


    ## 刚性常微分方程求解器


    显式欧拉法应用于 $\dot{y} = \lambda y$ 时，仅在 $k|\lambda| \le 1$ 时稳定。隐式欧拉法的绝对稳定区域覆盖整个左半平面，使得对刚性衰减问题可以采用任意大的步长。$A-$、$L-$
    和 $B-$ 稳定性层级根据时间积分器在不引起误差爆炸的情况下能覆盖多少 $\mathbb{C}_-$ 区域对其进行分类。


    ## 混合精度


    混合使用 16 位和 32 位算术的算法在更高精度下累加求和以确保稳定性：$\hat{\mathbf{x}} = \mathrm{fl}_{32}(\mathbf{A}^\top
    \mathrm{fl}_{16}(\mathbf{A}\mathbf{x}))$。后向误差分析表明，使用补偿内积时，低精度因子仅以二次方形式进入，从而在匹配半精度张量核心吞吐量的同时达到单精度精度。


    ## 实用检查清单


    - (a) 估计条件数以衡量内在难度。

    - (b) 优先选择后向稳定的算法（QR 优于幂法，Kahan 求和优于朴素求和）。

    - (c) 将输入缩放至单位量级以减小舍入误差。

    - (d) 监控残差；如果可行，进行迭代精化。


    ## 8.6 习题


    1.  设 $f(x) = x \exp(-x) - \frac{1}{4}$ 在 $[0, 2]$ 上。$(i)$ 证明 $f$ 在 $(0, 2)$ 内恰好有一个根
    $r$，并证明 $f''''(x) > 0$ 在 $[0, 2]$ 上成立。$(ii)$ 应用网格尺寸 $h = 10^{-2}$ 的复合梯形法则来界定 $f''(x)$
    的上下界，从而证明从 $x_0 = 1$ 开始的牛顿法收敛，并且最多需要四次迭代即可达到 $|x_k - r| \le 10^{-12}$。$(iii)$
    与达到相同容差的二分法最坏情况迭代次数进行比较；用 $\ln 2$ 明确表示该比率。


    2.  考虑三次多项式 $p(x) = x^3 - 9x + 1$。设计一个 *Brent 风格* 的算法，该算法每次迭代最多执行一次二分和一次割线步。用
    Python 实现它，并验证从初始区间 $[-4, 4]$ 出发，它在 $\le 6$ 次迭代内收敛，而纯割线法则发散。提供残差范数 $|p(x_k)|$
    的表格并讨论超线性段。


    3.  对于 $q(z) = z^5 - 1$，用网格 $\Delta = 0.01$ 划分正方形 $\{x + iy \mid -1.5 \le x, y
    \le 1.5\}$。迭代计算 $N(z) = z - q(z)/q''(z)$，直到 $|q(z)| < 10^{-6}$ 或 $k = 30$。根据到达的根为每个起点着色并绘制吸引域边界。*严格证明*
