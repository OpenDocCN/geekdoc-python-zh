    \n$\\pi : \\mathbb{N} \\times \\mathbb{N} \\to \\mathbb{N}, \\quad \\pi(x, y)\
    \ = \\frac{1}{2}(x + y)(x + y + 1) + y,$\n\n是双射，证明了 $\\mathbb{N}^2$ 是可数的。逆函数通过反转三角索引获得。\n\
