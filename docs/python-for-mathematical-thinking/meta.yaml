    import pytest\nfrom mylib import egcd\n\n@pytest.mark.parametrize(\"a,b\", [(55,\
    \ 34), (21, 13), (144, 89)])\ndef test_bezout_identity(a, b):\n    g, x, y = egcd(a,\
    \ b)\n    assert x * a + y * b == g\n```\n\nRunning `pytest` constitutes a proof\
