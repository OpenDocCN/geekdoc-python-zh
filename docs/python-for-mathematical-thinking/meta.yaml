  md: '# 7.2 Combinatorics


    Combinatorics quantifies “how many” rather than “how much”. Its results permeate
    probability, algebraic topology, and the analysis of algorithms. Python’s `itertools`
    and `sympy` libraries turn abstract counting into executable enumeration, fostering
    intuition alongside proof.


    # 7.2.1 Basic Counting Principles


    At the bedrock lies the *Addition Principle*: if two sets $A$, $B$ are disjoint,
    then $|A \cup B| = |A| + |B|$, and the *Multiplication Principle*: if a task decomposes
    into $k$ independent stages with $n_i$ choices at stage $i$, the total number
    of outcomes is $\prod_{i=1}^k n_i$. All sophisticated counts ultimately trace
    back to repeated applications of these axioms.


    # Permutations and Combinations


    The number of ways to arrange $k$ distinct objects selected from $n$ is the *falling
    factorial*


    $$P(n, k) = n^k = n(n-1) \cdots (n-k+1) = \frac{n!}{(n-k)!}.$$


    When order is irrelevant one instead counts subsets:


    $$\binom{n}{k} = \frac{n!}{k!(n-k)!}, \quad \sum_{k=0}^n \binom{n}{k} = 2^n.$$


    For multiset selections, stars-and-bars gives


    $$\binom{n+k-1}{k-1}$$


    ways to distribute $n$ identical balls into $k$ boxes.


    # Example 7.2.1 (Enumerating combinations in Python)


    ```

    import math, itertools

    n, k = 7, 3

    comb = list(itertools.combinations(range(n), k))

    assert len(comb) == math.comb(n, k)

    ```'
