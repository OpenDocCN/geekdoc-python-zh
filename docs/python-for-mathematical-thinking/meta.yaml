    \ *forward difference approximation*\n\n$$D_+f(x; h) := \\frac{f(x+h) - f(x)}{h},$$\n\
    \nwhich converges to $f'(x)$ as $h \\to 0$, provided $f$ is differentiable. However,\
    \ due to finite precision arithmetic, taking $h$ too small may introduce significant\
