    i.i.d. 𝒰(0, 1). According to the Central Limit Theorem this centred sum converges
    to 𝒩(0, 1); the bell-shaped empirical density already reflects the Gaussian limit](img/9724708489e3df346f9e31e3fa6e5746_168_0.png)


    **Example 5.1.20** Simulate n = 10⁵ fair-coin heads proportion (cf. Fig. 5.2):


    ```python

    import numpy as np

    n=100000

    mean = np.random.binomial(1, 0.5, n).mean()

    print(mean) # ≈ 0.5

    ```


    *Central Limit Theorem (CLT)* Let Sₙ = Σᵢ₌₁ⁿ Xᵢ with μ, σ² < ∞. Then


    $$\frac{S_n - n\mu}{\sigma\sqrt{n}} \xrightarrow{d} \mathcal{N}(0, 1).$$


    **Example 5.1.21** Sum of 12 Uniform(0, 1) r.v.s is approximately 𝒩(6, 1):


    ```python

    import matplotlib.pyplot as plt

    data = np.random.rand(20000, 12).sum(axis=1)

    plt.hist((data-6), bins=50, density=True); plt.show()

    ```


    **Berry–Esséen Bound** Provides explicit rate: supₓ |Fₙ(x) − Φ(x)| ≤ Cρ/σ³√n,
    where ρ = 𝔼|X − μ|³.


    **Example 5.1.22** For Bernoulli(1/2) we have ρ = 1/4, σ = 1/2, giving bound ≤
    C/√n.'
  mdcn: '## 方差、协方差与标准差


    ### 方差


    $$\text{Var}(X) = \mathbb{E}[(X - \mathbb{E}[X])^2] = \mathbb{E}[X^2] - (\mathbb{E}[X])^2.$$


    标准差 $\sigma_X = \sqrt{\text{Var}(X)}$。


    ### 协方差


    $$\text{Cov}(X, Y) = \mathbb{E}[(X - \mu_X)(Y - \mu_Y)] = \mathbb{E}[XY] - \mu_X
    \mu_Y.$$


    ### 性质


    $\text{Var}(aX + b) = a^2 \text{Var}(X), \quad \text{Var}\left(\sum_i X_i\right)
    = \sum_i \text{Var}(X_i) + 2\sum_{i<j} \text{Cov}(X_i, X_j).$


    **示例 4（泊松分布的方差）** $X \sim \text{Pois}(\lambda)$ 的期望为 $\mathbb{E}[X] = \lambda$，方差为
    $\text{Var}(X) = \lambda$。证明见下文矩母函数部分。


    ### 全方差公式


    $\text{Var}(X) = \mathbb{E}[\text{Var}(X \mid Y)] + \text{Var}(\mathbb{E}[X \mid
    Y]).$


    **示例 5.1.11（全方差，泊松-伽马混合（负二项分布））** 设 $N \mid \Lambda \sim \text{Pois}(\Lambda)$，$\Lambda
    \sim \text{Gamma}(r, \theta)$。则 $\mathbb{E}[N] = r\theta$，且


    $\text{Var}(N) = \mathbb{E}[\Lambda] + \text{Var}(\Lambda) = r\theta + r\theta^2,$


    这与 $\text{NegBin}(r, p)$ 的方差公式一致。


    **示例 5（骰子点数的协方差）** 投掷一个公平骰子两次：$X$ 为第一次点数，$Y$ 为第二次点数。独立性 $\Rightarrow \text{Cov}(X,
    Y) = 0$。但令 $S = X + Y$；则 $\text{Cov}(X, S) = \text{Var}(X) = \frac{35}{12}$。


    ```python

    import itertools, numpy as np

    Omega = np.array(list(itertools.product(range(1,7), repeat=2)))

    X, Y = Omega[:,0], Omega[:,1]; S = X+Y

    print(np.cov(X,S, bias=True)[0,1]) # 2.916...

    ```


    ### 矩母函数


    **定义** $X$ 的**矩母函数**（mgf）为


    $M_X(t) = \mathbb{E}[e^{tX}], \quad t \in (-h, h)$


    其中 $h > 0$ 为某个使期望存在的值。


    ### 矩的提取


    $M_X^{(k)}(0) = \mathbb{E}[X^k], \quad \mu = \mathbb{E}[X] = M_X''(0), \sigma^2
    = M_X''''(0) - \mu^2.$


    **唯一性** 如果矩母函数在 0 的某个开区间内存在，则它唯一地确定了分布。


    **独立随机变量和的矩母函数** 若 $X, Y$ 独立，


    $M_{X+Y}(t) = M_X(t)M_Y(t).$


    ### 示例 6（指数分布（$\lambda$）的矩母函数）


    $$M_X(t) = \int_0^\infty e^{tx} \lambda e^{-\lambda x} dx = \frac{\lambda}{\lambda
    - t}, \quad t < \lambda.$$


    矩：


    $$\mu = M''_X(0) = \frac{1}{\lambda}, \quad \sigma^2 = M''''_X(0) - \mu^2 = \frac{1}{\lambda^2}.$$


    ### 示例 7（正态分布）对于 $X \sim \mathcal{N}(\mu, \sigma^2)$，


    $$M_X(t) = \exp\left(\mu t + \frac{1}{2}\sigma^2 t^2\right).$$


    这一性质在中心极限定理的证明中至关重要；矩母函数是二次型 $\Rightarrow$ 独立同分布正态变量的和仍为正态分布。


    ### 示例 8（独立指数变量之和 $\to$ 伽马分布）若 $X_1, \dots, X_n \overset{\text{i.i.d.}}{\sim}
    \text{Exp}(\lambda)$，


    $$M_{S_n}(t) = \left(\frac{\lambda}{\lambda - t}\right)^n, \quad S_n \sim \text{Gamma}(n,
    \lambda).$$


    ### 示例 9（泊松分布的矩母函数法）$X \sim \text{Pois}(\lambda)$：


    $$M_X(t) = \sum_{k=0}^\infty e^{tk} e^{-\lambda} \frac{\lambda^k}{k!} = \exp(\lambda(e^t
    - 1)).$$


    求导：


    $$M''_X(0) = \lambda, \quad M''''_X(0) = \lambda^2 + \lambda \Rightarrow \text{Var}(X)
    = \lambda.$$


    **累积量生成函数** $K_X(t) = \ln M_X(t)$；其在 0 处的导数给出累积量（例如，第一累积量 = 均值，第二累积量 = 方差）。


    ### 示例 5.1.12（二项分布的累积量）$K_X(t) = n \ln(1 - p + pe^t)$；$\kappa_1 = K''(0) = np$，$\kappa_2
    = K''''(0) = np(1 - p)$。


    ### 矩不等式


    $$\text{Var}(X) \geq 0, \quad \mathbb{E}|X - \mu| \leq \sigma \sqrt{\frac{\pi}{2}}
    \text{（若为正态分布）}.$$


    切比雪夫不等式：$\mathbb{P}(|X - \mu| \geq k\sigma) \leq k^{-2}$。


    ### 示例 5.1.13（验证模拟泊松分布的切比雪夫不等式）


    ```python

    lam, N = 10, 10**5

    X = np.random.poisson(lam, N)

    k=3

    emp = np.mean(np.abs(X-lam)>=k*np.sqrt(lam))

    print(emp, 1/k**2) # 经验值 ≤ 理论界

    ```


    ## 5.1.4 常见概率分布


    ### 二项分布、泊松分布与几何分布


    *计数*分布自然地源于伯努利试验和泊松过程极限。


    *二项分布* 若 $X \sim \text{Bin}(n, p)$ 计数 $n$ 次独立伯努利($p$)试验中的成功次数，


    $$\mathbb{P}(X = k) = \binom{n}{k} p^k (1 - p)^{n-k}, \quad 0 \le k \le n.$$


    期望 $\mu = np$，方差 $\sigma^2 = np(1 - p)$，矩母函数 $M_X(t) = (1 - p + pe^t)^n$。


    **示例 5.1.14** 抛掷一枚公平硬币 $n = 10$ 次；恰好出现 $k = 4$ 次正面的概率为 $\binom{10}{4}/2^{10} =
    0.205$。


    ```python

    from math import comb

    print(comb(10,4)/2**10)

    ```


    *泊松分布* 二项分布在 $n \to \infty$，$p \to 0$ 且 $np = \lambda$ 固定时的极限：


    $$\mathbb{P}(X = k) = e^{-\lambda} \frac{\lambda^k}{k!}, \quad k \in \mathbb{N}_0.$$


    均值和方差均为 $\lambda$；矩母函数 $\exp(\lambda(e^t - 1))$。


    **示例 5.1.15** 放射性衰变平均每分钟发射 $\lambda = 3$ 个粒子。下一分钟内没有粒子发射的概率：$e^{-3} \approx 0.0498$。


    *几何分布* 伯努利($p$)试验中首次成功所需的试验次数 $X$（计入成功的那一次）：


    $$\mathbb{P}(X = k) = p(1 - p)^{k-1}, \quad k = 1, 2, \ldots$$


    无记忆性：$\mathbb{P}(X > m+n \mid X > m) = (1 - p)^n$。均值 $1/p$，方差 $(1 - p)/p^2$。


    ### 正态分布、指数分布与伽马分布


    正态分布 $X \sim \mathcal{N}(\mu, \sigma^2)$ 的密度函数为


    $$f(x) = \frac{1}{\sqrt{2\pi}\sigma} \exp\left(-\frac{(x-\mu)^2}{2\sigma^2}\right).$$


    线性变换保持正态性；独立正态变量的和仍为正态分布。


    **示例 5.1.17** 学生身高：$\mu = 170$ cm，$\sigma = 8$ cm。一名学生身高超过 185 cm 的概率：


    $$1 - \Phi\left(\frac{185 - 170}{8}\right) = 1 - \Phi(1.875) \approx 0.030.$$


    *指数分布* 等待时间 $X \sim \text{Exp}(\lambda)$：


    $$f(x) = \lambda e^{-\lambda x} \mathbf{1}_{\{x \ge 0\}}, \quad F(x) = 1 - e^{-\lambda
    x}.$$


    均值 $1/\lambda$，方差 $1/\lambda^2$；无记忆性：$\mathbb{P}(X > s + t \mid X > s) = e^{-\lambda
    t}$。


    **示例 5.1.18** Web 服务器请求以每秒 4 个的速率到达（$\lambda = 4$）。下一个请求在 0.5 秒后到达的概率：$e^{-4 \cdot
    0.5} \approx 0.135$。


    *伽马分布* $k$ 个独立同分布指数($\lambda$)变量的和：$X \sim \Gamma(k, \lambda)$，


    $$f(x) = \frac{\lambda^k x^{k-1} e^{-\lambda x}}{\Gamma(k)}, \quad x \ge 0.$$


    均值 $k/\lambda$，方差 $k/\lambda^2$。


    **示例 5.1.19** $k = 3$ 位客户的总通话时长，每位客户的通话时长服从指数($\lambda = 1/6$)小时分布，其总时长服从 $\Gamma(3,
    1/6)$ 分布，均值为 18 分钟，方差为 108 分钟$^2$。


    ### 中心极限定理与大数定律


    *弱大数定律 (WLLN)* 对于独立同分布的 $X_i$，具有有限均值 $\mu$ 和方差 $\sigma^2$，


    $$\frac{1}{n} \sum_{i=1}^n X_i \xrightarrow{\mathbb{P}} \mu \quad \text{当 } n
    \to \infty.$$


