    # Applications in Physics


    **Lagrangian Mechanics** The path of a physical system minimises the action:


    $$S[q] = \int_{t_0}^{t_1} L(q, \dot{q}, t) dt, \quad L = T - V.$$


    Euler–Lagrange equations yield Newton’s laws.


    **Example 3.4.12 (Simple Pendulum)** Let $\theta(t)$ be angular displacement.
    Lagrangian:


    $$L = \frac{1}{2}m\ell^2\dot{\theta}^2 - mg\ell(1 - \cos\theta).$$


    Then:


    $$\frac{d}{dt}(m\ell^2\dot{\theta}) + mg\ell\sin\theta = 0 \Rightarrow \theta''''
    + \frac{g}{\ell}\sin\theta = 0.$$


    ```

    python

    θ = sp.Function("θ")(x)

    g, l, m = sp.symbols("g l m")

    L = (1/2)*m*l**2 * sp.diff(θ, x)**2 - m*g*l*(1 - sp.cos(θ))

    EL = sp.diff(sp.diff(L, sp.diff(θ, x)), x) - sp.diff(L, θ)

    sp.pprint(sp.simplify(EL))

    ```


    **Optics: Fermat’s Principle** Light travels along a path that extremises optical
    path length:


    $$\mathcal{J}[y] = \int n(x, y)\sqrt{1 + y''^2} dx.$$


    In homogeneous media $n = \text{const}$, path is straight. In inhomogeneous media,
    calculus of variations leads to Snell’s law and bending of rays.


    **Electrostatics: Minimal Energy Configuration** The potential $u$ minimises:


    $$\int |\nabla u|^2 dx \quad \Rightarrow \quad \Delta u = 0.$$


    The Euler–Lagrange equation recovers Laplace’s equation—fundamental to potential
    theory.'
