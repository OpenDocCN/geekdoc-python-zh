  md: '# Weighted Mean and Percentiles


    **Weighted Mean** Given positive weights $\mathbf{w} = (w_1, \dots, w_n)$ with
    $\sum_i w_i = 1$,


    $$\bar{x}_w = \sum_{i=1}^n w_i x_i.$$


    When $\sum w_i \neq 1$, use $\bar{x}_w = \frac{\sum w_i x_i}{\sum w_i}$.


    **Percentiles** The $p$-th percentile ($0 < p < 100$) is the value $q_p$ such
    that


    $$\frac{\#\{i : x_i \leq q_p\}}{n} \geq \frac{p}{100} \quad \text{and} \quad \frac{\#\{i
    : x_i < q_p\}}{n} \leq \frac{p}{100}.$$


    Common percentiles: quartiles (25, 50, 75), deciles (10, 20, ..., 90).


    # Example 5.2.2 (Weighted Mean and Quartiles)


    ```

    w = np.array([2, 1, 3, 1, 2, 3, 1, 2]) # weights

    wmean = np.average(x, weights=w) # weighted mean

    q25, q75 = np.percentile(x, [25, 75]) # quartiles

    print(wmean, q25, q75)

    ```


    **Interpolated Percentiles** NumPy''s `percentile` offers methods `linear`, `midpoint`,
    etc. to resolve gaps between order statistics; consult the documentation for exact
    formulas.


    # Geometric Mean and Harmonic Mean


    **Geometric Mean** For positive data ($x_i > 0$),


    $$G = \left(\prod_{i=1}^n x_i\right)^{1/n} = e^{\frac{1}{n} \sum_i \ln x_i}.$$


    *Use cases*: multiplicative growth rates, log-normal data, portfolio returns.


    **Harmonic Mean**


    $$H = \frac{n}{\sum_{i=1}^n \frac{1}{x_i}}.$$


    *Use cases*: average speed, resistances in parallel, P/E ratio aggregation.'
