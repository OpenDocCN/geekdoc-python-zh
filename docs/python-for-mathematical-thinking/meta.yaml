    # Savitzky–Golay Smoothing


    Polynomial regression in a sliding window of length $2m+1$ fits $y[n] \approx
    \sum_{k=0}^d \beta_k(n-n_0)^k$; evaluate $\beta_0$ for low-pass smoothing that
    preserves peaks. Convolution coefficients pre-computed via pseudo-inverse; even
    order produces zero phase delay.


    # Butterworth, Chebyshev, and Elliptic Filters


    Let $\Omega_p$ (pass-band), $\Omega_s$ (stop-band), and tolerances $\delta_p,
    \delta_s$.


    # Butterworth


    Magnitude squared


    $$|H(j\Omega)|^2 = \frac{1}{1 + (\Omega/\Omega_c)^{2N}},$$


    maximally flat at $\Omega = 0$; order $N \ge \frac{\log(\delta_s^{-2}-1)-\log(\delta_p^{-2}-1)}{2\log(\Omega_s/\Omega_p)}$.


    # Chebyshev-I


    Pass-band ripple $\varepsilon$: $|H|^{-2} = 1 + \varepsilon^2 T_N^2(\Omega/\Omega_c)$,
    where $T_N$ Chebyshev polynomial. Stop-band monotonic. Chebyshev-II swaps ripple
    to the stop-band.'
