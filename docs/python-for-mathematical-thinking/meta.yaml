    # Applications in Digital Circuit Design


    **Combinational Logic Synthesis** Given a truth table, pipeline:


    +   (i) Derive canonical SoP from minterms.

    (ii) Simplify via Quine–McCluskey or ESPRESSO heuristic.

    (iii) Map literals to gates (NAND/NOR preferred in CMOS).

    (iv) Estimate propagation delay $T_{pd}$ and power; iterate with timing-driven
    optimization.


    # Example 7.4.5 (4-bit Parity Checker)


    $\text{PAR}(x_3 \dots x_0) = x_3 \oplus x_2 \oplus x_1 \oplus x_0$.


    SoP of even parity has eight minterms; Karnaugh grouping yields $\text{PAR} =
    (x_3 \oplus x_2) \oplus (x_1 \oplus x_0)$, requiring *only* two 2-input XOR gates
    plus one final XOR.


    **Finite-State Machines (FSMs)** State transition and output functions $g, h$
    are Boolean; their ROM or PLA realisations benefit from minimisation:


    $\mathbf{s}_{t+1} = g(\mathbf{s}_t, \mathbf{x}_t)$,


    $\mathbf{y}_t = h(\mathbf{s}_t, \mathbf{x}_t)$.


    State assignment (one-hot, Gray, balanced) affects gate complexity and jitter.


    **Programmable Logic Arrays (PLA) and FPGAs** SOP form maps naturally: product
    terms implement AND plane; summed outputs implement OR plane. Karnaugh/Quine-McCluskey
    minimise the number of product terms, reducing PLA area; FPGA LUTs (look-up tables)
    emulate small truth tables directly—low-literal minimisation reduces the depth
    of LUT cascades.'
