    # Cross-Validation and Resampling Methods


    Let $\widehat{R}_{\mathcal{T},\mathcal{V}}(f) = \frac{1}{|\mathcal{V}|} \sum_{i
    \in \mathcal{V}} \ell(f_{\mathcal{T}}(\mathbf{x}_i), y_i)$ be the validation error
    when the learner is trained on $\mathcal{T}$ and evaluated on $\mathcal{V}$. Define
    partitions $\{\mathcal{F}_k\}_{k=1}^K$ of $\{1, \dots, n\}$.


    # $K$-Fold Cross-Validation


    $$\widehat{R}_{\text{CV}}(f) = \frac{1}{K} \sum_{k=1}^K \widehat{R}_{\mathcal{F}_{-k},
    \mathcal{F}_k}(f).$$


    Unbiased for i.i.d. data; variance decreases with $K$ but computational cost increases.
    Leave-one-out (LOO) sets $K = n$, achieving minimal bias but high variance; $K
    = 5$ or $10$ typically balances.


    **Repeated CV** resamples folds $B$ times, averaging errors $\frac{1}{B} \sum_b
    \widehat{R}_{\text{CV}}^{(b)}$, stabilising variance estimate.


    # Bootstrap


    Resample indices with replacement to form $\mathcal{T}_b^*$ of size $n$, evaluate
    $\widehat{R}_b^* = \frac{1}{n_{\text{oob}}} \sum_{i \notin \mathcal{T}_b^*} \ell(f_{\mathcal{T}_b^*},
    y_i)$, where $n_{\text{oob}} \approx 0.368n$ are *out-of-bag* observations. The
    $B$-bootstrap estimate $\widehat{R}^*$ approximates the .632 estimator


    $$\widehat{R}_{.632} = 0.368 \widehat{R}_{\text{train}} + 0.632 \widehat{R}^*,$$


    alleviating training bias.


    ```

    from sklearn.model_selection import KFold, cross_val_score

    cv10 = KFold(n_splits=10, shuffle=True, random_state=0)

    cv_score = cross_val_score(model, X, y, cv=cv10, scoring=''roc_auc'').mean()

    ```


    # Nested Cross-Validation


    Outer folds estimate generalisation; inner folds tune hyperparameters $\lambda$.
    Avoids optimistic bias inherent in reusing validation data for both tuning and
    assessment.'
