    # **ECDSA Outline**


    KeyGen: $d \in \{1, \dots, n-1\}$, $P = dG$.


    Sign: $k \xleftarrow{\$} \{1, \dots, n-1\}$, $r = (kG)_x \bmod n$, $s \equiv k^{-1}(H(m)
    + dr) \pmod n$.


    Verify: $w = s^{-1}$, $u_1 = H(m)w$, $u_2 = rw$, $(x_v, y_v) = u_1G + u_2P$, accept
    iff $x_v \bmod n = r$.


    Security relies on elliptic-curve discrete log (ECDLP) and unpredictable nonce
    $k$; nonce reuse reveals private key via linear equations in $(r, s)$.


    # **7.1.3 Advanced Topics in Number Theory**


    Number theory attains a deeper and subtler flavour once one ventures beyond congruences
    and residues into the lands of integral solutions, automorphic symmetries, and
    analytic continuations. Diophantine equations lie at the heart of arithmetic geometry,
    modular forms encode hidden dualities between algebra and analysis, while the
    analytic behaviour of the Riemann zeta-function governs the fine spacing of primes.
    In this subsection we provide intuitive—but rigorous—gateways to each subject,
    illustrating every conceptual leap with Python experiments or short SageMath snippets
    that encourage active exploration.


    # **Diophantine Equations and Applications**


    A **Diophantine equation** asks for integer—or rational—solutions to a polynomial
    relation $F(x_1, \dots, x_n) = 0$. The classical linear case, $a_1x_1 + \cdots
    + a_nx_n = b$, is entirely controlled by the extended Euclidean algorithm, yet
    glimpses the delicate obstruction principle: solutions exist iff $\gcd(a_1, \dots,
    a_n) \mid b$. Quadratic forms'
