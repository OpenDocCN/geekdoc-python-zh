    text{sgn}(w)\\max\\{|w| - \\eta\\lambda, 0\\}$。\n\n**Dropout** 训练期间，以概率 $p$ 将激活值置零：$\\\
    tilde{\\mathbf{a}}^{(\\ell-1)} = \\mathbf{a}^{(\\ell-1)} \\odot \\mathbf{m}$，$m_j\
    \ \\sim \\text{Bernoulli}(1 - p)$，近似于 $2^n$ 个稀疏网络的集成；测试时将激活值缩放 $(1 - p)$ 倍。\n\n\
    **批归一化** 对于小批量 $\\mathcal{B}$，归一化激活前的值：\n$$\\hat{z} = \\frac{z - \\mu_{\\mathcal{B}}}{\\\
    sqrt{\\sigma_{\\mathcal{B}}^2 + \\varepsilon}}, \\quad \\bar{z} = \\gamma\\hat{z}\
    \ + \\beta,$$\n通过减少协变量偏移来加速训练；$\\gamma, \\beta$ 是可学习参数。\n\n*优化* SGD更新 $\\theta\
    \ \\leftarrow \\theta - \\eta\\nabla_{\\theta} L$ 在Robbins-Monro条件下期望收敛。动量加速：$v\
    \ \\leftarrow \\beta v + (1 - \\beta)\\nabla L$；$\\theta \\leftarrow \\theta -\
