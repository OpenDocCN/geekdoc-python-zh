  md: "# General Relativity Applications\n\nIn general relativity, the gravitational\
    \ field is encoded in the **metric tensor** $g_{\\mu\\nu}$, and spacetime geometry\
    \ replaces force. The dynamics of a free particle follow the **geodesic equation**:\n\
    \n$$\\frac{d^2 x^\\mu}{d\\tau^2} + \\Gamma^\\mu_{\\alpha\\beta} \\frac{dx^\\alpha}{d\\\
    tau} \\frac{dx^\\beta}{d\\tau} = 0.$\n\nHere $\\Gamma^\\mu_{\\alpha\\beta}$ are\
    \ the **Christoffel symbols**, defined as:\n\n$$\\Gamma^\\mu_{\\alpha\\beta} =\
    \ \\frac{1}{2} g^{\\mu\\nu} (\\partial_\\alpha g_{\\nu\\beta} + \\partial_\\beta\
    \ g_{\\nu\\alpha} - \\partial_\\nu g_{\\alpha\\beta}).$$\n\n# Example 3.4.18 (Compute\
    \ Christoffel Symbols in 2D) Let:\n\n$$ds^2 = dx^2 + (1 + x^2)dy^2 \\Rightarrow\
    \ g_{ij} = \\begin{pmatrix} 1 & 0 \\ 0 & 1 + x^2 \\end{pmatrix}.$\n\n```\nx, y\
    \ = sp.symbols(\"x y\")\ng = sp.Matrix([[1, 0], [0, 1 + x**2]])\ng_inv = g.inv()\n\
    n = 2\n\\tau = [[[0]*n for _ in range(n)] for _ in range(n)]\nfor \\mu in range(n):\n\
    \    for \\alpha in range(n):\n        for \\beta in range(n):\n            sum_\
    \ = 0\n            for \\nu in range(n):\n                sum_ += g_inv[\\mu,\
    \ \\nu] * (\n                    sp.diff(g[\\nu, \\beta], x if \\alpha == 0 else\
    \ y)\n                    + sp.diff(g[\\nu, \\alpha], x if \\beta == 0 else y)\n\
    \                    - sp.diff(g[\\alpha, \\beta], x if \\nu == 0 else y))\n \
    \           \\tau[\\mu][\\alpha][\\beta] = sp.simplify(1/2 * sum_)\nsp.pprint(\\\
    tau[1][0][1]) # Example: \\tau^1_{01}\n```\n\nThis yields:\n\n$$\\Gamma^1_{01}\
    \ = \\frac{x}{1 + x^2}.$\n\n# Example 3.4.19 (Geodesic in Polar Coordinates) Metric:\n\
    \n$$ds^2 = dr^2 + r^2 d\\theta^2, \\quad g_{ij} = \\begin{pmatrix} 1 & 0 \\ 0\
