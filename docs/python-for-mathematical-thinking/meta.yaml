    implementations exploit the broadband chaotic carrier for spread-spectrum transmission.'
- md: "## 9.3 Lyapunov Exponents\n\nDeterministic chaos is diagnosed by the sensitivity\
    \ of trajectories to initial conditions. Quantitatively, this sensitivity is measured\
    \ by **Lyapunov exponents**. They describe the asymptotic exponential growth (or\
    \ decay) rates of infinitesimal perturbations transported by the tangent flow\
    \ and, therefore, furnish a numerical spectrum summarising the system's intrinsic\
    \ instability. In a $d$-dimensional phase space the spectrum comprises $d$ real\
    \ numbers\n\n$$\\lambda_1 \\ge \\lambda_2 \\ge \\dots \\ge \\lambda_d,$$\n\nwhere\
    \ at least one positive exponent signifies chaos and the sum of the exponents\
    \ equals the average divergence of the vector field (Liouville's theorem).\n\n\
    ### 9.3.1 Definition and Interpretation\n\nLet $\\dot{\\mathbf{x}} = \\mathbf{F}(\\\
    mathbf{x})$ generate a flow $\\Phi^t$ on a compact, forward-invariant set $\\\
    mathcal{A}$. For a non-zero tangent vector $\\mathbf{v}_0 \\in T_{\\mathbf{x}_0}\\\
    mathcal{M}$, evolve $\\mathbf{v}(t) = D\\Phi^t_{\\mathbf{x}_0} \\mathbf{v}_0$\
    \ via the variational equation $\\dot{\\mathbf{v}} = D\\mathbf{F}(\\mathbf{x}(t))\\\
    mathbf{v}$. The **maximal Lyapunov exponent** at $\\mathbf{x}_0$ is\n\n$$\\lambda_{\\\
    max}(\\mathbf{x}_0) = \\limsup_{t \\to \\infty} \\frac{1}{t} \\ln \\frac{\\|\\\
    mathbf{v}(t)\\|}{\\|\\mathbf{v}_0\\|}.$$\n\nOseledec's multiplicative ergodic\
    \ theorem states that, for $\\mu$-almost every initial state with respect to an\
    \ invariant measure $\\mu$, the limit exists and equals one of $d$ Lyapunov exponents,\
    \ independent of the chosen $\\mathbf{v}_0$ within the associated *Oseledec subspace*.\n\
    \nThe *Kaplan–Yorke dimension* (or Lyapunov dimension) estimates attractor fractality:\n\
    \n$$D_{KY} = k + \\frac{\\sum_{i=1}^k \\lambda_i}{|\\lambda_{k+1}|}, \\quad \\\
    text{where } k = \\max \\left\\{ m : \\sum_{i=1}^m \\lambda_i \\ge 0 \\right\\\
    }.$$\n\n### Calculation Methods\n\n*Benettin–Wolf Algorithm* Integrate simultaneously\
    \ the state $\\mathbf{x}(t)$ and an orthonormal frame $\\{\\mathbf{e}_1, \\dots,\
    \ \\mathbf{e}_d\\}$ updated by the variational flow,\n\n```python\n# schematic\
    \ QR iteration every δt_qr\nfor step in range(N_steps):\n    state, vecs = rk4(flow,\
    \ state, vecs, δt)\n    if step % n_qr == 0:\n        Q,R = np.linalg.qr(vecs)\n\
    \        log_diag += np.log(np.abs(np.diag(R)))\n        vecs = Q\nλ = log_diag\
    \ / (total_time)\n```\n\nThe diagonal entries of $R$ accumulate the stretch factors;\
    \ their time-averaged logarithms converge to $\\{\\lambda_i\\}$ (Benettin et al.\
    \ 1980).\n\n*Rosenstein's Algorithm (Rosenstein et al. 1993) (Experimental Data)*\
    \ For a reconstructed trajectory $\\{\\mathbf{x}_n\\}$ find nearest neighbours\
    \ separated by at least the mean period, then average $\\ln d(\\tau)$ over pairs:\n\
    \n$$d(\\tau) = \\frac{1}{M} \\sum_{i=1}^{M} \\|\\mathbf{x}_{i+\\tau} - \\mathbf{x}_{\\\
    text{NN}(i)+\\tau}\\|, \\quad \\lambda_{\\text{max}} \\approx \\text{slope of\
    \ } \\ln d(\\tau) \\text{ vs. } \\tau.$$\n\n### Implications for System Behaviour\n\
    \n- $\\lambda_{\\text{max}} < 0$ implies all trajectories converge to an equilibrium;\
    \ the system is *exponentially contracting*.\n- $\\lambda_{\\text{max}} = 0$ with\
    \ remaining exponents negative indicates neutral stability (e.g., limit cycles,\
    \ quasiperiodic tori).\n- $\\lambda_{\\text{max}} > 0$ signals sensitive dependence\
    \ and yields the *predictability horizon* $\\tau_{\\text{pred}} \\sim \\lambda_{\\\
    text{max}}^{-1} \\ln(\\varepsilon/\\delta_0)$ for initial error $\\delta_0$ and\
    \ tolerance $\\varepsilon$.\n- Volume preservation in Hamiltonian systems sets\
    \ $\\sum_i \\lambda_i = 0$; typically exponents occur in $\\pm$ pairs plus zeros\
    \ associated with conserved quantities.\n\nFor the Lorenz attractor $(\\sigma,\
    \ \\rho, \\beta) = (10, 28, 8/3)$ one empirically obtains $(\\lambda_1, \\lambda_2,\
    \ \\lambda_3) \\approx (0.905, 0, -14.57)$; thus $D_{KY} \\approx 2.06$ matches\
    \ numerical fractal dimension estimates.\n\n### Local and Global Lyapunov Exponents\n\
    \nThe *finite-time Lyapunov exponent* (FTLE)\n\n$$\\lambda^T(\\mathbf{x}_0) =\
    \ \\frac{1}{T} \\ln \\frac{\\|D\\Phi_{\\mathbf{x}_0}^T \\mathbf{v}_0\\|}{\\|\\\
    mathbf{v}_0\\|}$$\n\ndepends on initial position and window length $T$. Plotting\
    \ the FTLE field illuminates *Lagrangian coherent structures*—material curves\
    \ acting as repelling or attracting transport barriers in fluid flows.\n\nAveraging\
    \ FTLE along trajectories yields the *global* (asymptotic) exponents: $\\lambda_i\
    \ = \\lim_{T \\to \\infty} \\lambda_i^T$. Nevertheless, local fluctuations persist:\
    \ in the Lorenz system, points near the saddle wings momentarily contract ($\\\
    lambda^T < 0$) before being ejected with large positive stretch.\n\n### Local\
    \ Lyapunov Dimension\n\nDefine $D_{\\text{loc}}(\\mathbf{x}_0; T) = k + \\frac{\\\
    sum_{i=1}^k \\lambda_i^T(\\mathbf{x}_0)}{|\\lambda_{k+1}^T(\\mathbf{x}_0)|}$.\
    \ Mapping $D_{\\text{loc}}$ across the attractor uncovers multifractal variability,\
    \ highlighting regions of vigorous stretching (hot spots) and mellow folding.\n\
    \n```python\n# FTLE field for Duffing oscillator on grid of ICs\ndef FTLE(IC,\
    \ T=50, δ=1e-8):\n    x0 = np.array(IC); v0 = np.array([δ, 0])\n    x1 = x0+v0\n\
    \    sol0 = solve_ivp(duffing, [0, T], x0, max_step=.01)\n    sol1 = solve_ivp(duffing,\
    \ [0, T], x1, max_step=.01)\n    δT = np.linalg.norm(sol1.y[:, -1]-sol0.y[:, -1])\n\
    \    return (1/T)*np.log(δT/δ)\n```\n\n## 9.4 Advanced Topics in Chaos Theory\n\
    \n### 9.4.1 Entropy and Chaos\n\nEntropy furnishes a quantitative bridge between\
    \ dynamical unpredictability and information theory. Where Lyapunov exponents\
    \ gauge the *rate* of exponential separation of nearby trajectories, entropy measures\
    \ the *information production* required to track an orbit to finite resolution.\
    \ For a probability-preserving transformation $T : (\\mathcal{X}, \\mathcal{B},\
    \ \\mu) \\circlearrowleft$ on a compact metric space, the *metric entropy* $h_\\\
    mu(T)$ gauges how quickly distinct initial conditions generate distinguishable\
    \ symbolic names.\n\n### Kolmogorov–Sinai Entropy\n\nLet $\\mathcal{P} = \\{P_1,\
    \ \\dots, P_k\\}$ be a finite measurable partition of $\\mathcal{X}$. Denote $\\\
    mathcal{P}^n = \\bigvee_{j=0}^{n-1} T^{-j} \\mathcal{P}$ the $n$-fold refinement\
    \ and\n\n$$H_\\mu(\\mathcal{P}) = -\\sum_{i=1}^k \\mu(P_i) \\log \\mu(P_i)$$\n\
    \nits Shannon entropy. The **Kolmogorov–Sinai (KS) entropy** is\n\n$$h_{\\mu}(T)\
    \ = \\sup_{\\mathcal{P}} \\left( \\lim_{n \\to \\infty} \\frac{1}{n} H_{\\mu}(\\\
    mathcal{P}^n) \\right),$$\n\nthe supremum taken over all finite partitions. A\
    \ system with $h_{\\mu}(T) = 0$ is *zero-entropy*; it may still be aperiodic (e.g.,\
    \ irrational circle rotation) yet displays no exponential growth of complexity.\
    \ Positive KS entropy signals chaotic orbit structure: the set of admissible symbolic\
    \ sequences under a generating partition contains exponentially many words of\
    \ length $n$, asymptotically $e^{h_{\\mu} n}$.\n\n**Example 9.4.1 (Bernoulli Shift)**\
    \ On the space $\\Sigma_2 = \\{0, 1\\}^{\\mathbb{N}}$ with product measure $\\\
    mu(p, 1-p)$, the left shift $\\sigma$ has partition $\\mathcal{P} = \\{\\{0\\\
    }, \\{1\\}\\}$ generating the whole $\\sigma$-algebra. Since $\\sigma^{-j} \\\
    mathcal{P} = \\mathcal{P}$, $H_{\\mu}(\\mathcal{P}^n) = n H_{\\mu}(\\mathcal{P})$\
    \ and $h_{\\mu}(\\sigma) = H_{\\mu}(\\mathcal{P}) = -p \\log p - (1-p) \\log(1-p)$.\n\
    \n### Relationship Between Entropy and Lyapunov Exponents\n\n**Pesin's identity**\
    \ links metric entropy to Lyapunov exponents for $C^{1+\\alpha}$ diffeomorphisms\
    \ preserving an *absolutely continuous* invariant measure (ACIM):\n\n$$h_{\\mu}(T)\
    \ = \\int_{\\mathcal{X}} \\sum_{\\lambda_i(\\mathbf{x}) > 0} \\lambda_i(\\mathbf{x})\
    \ \\, d\\mu(\\mathbf{x}).$$\n\nThus the entropy equals the phase-space average\
    \ of the *sum of positive exponents*. For volume-preserving systems in $\\mathbb{R}^d$\
    \ with spectrum $\\{\\lambda_1, \\dots, \\lambda_d\\}$ ordered by sign, Pesin's\
    \ identity implies $h_{\\mu}(T) \\le \\sum_{i=1}^{d/2} \\lambda_i$.\n\n**Example\
    \ 9.4.2 (Lorenz Attractor)** Empirical spectrum $(\\lambda_1, \\lambda_2, \\lambda_3)\
    \ \\approx (0.905, 0, -14.57)$ yields $h_{\\mu} \\approx \\lambda_1 \\approx 0.905$,\
    \ consistent with numerical estimates from symbolic partitions of vortex-wing\
    \ excursions. The information needed to specify the state doubles roughly every\
    \ 0.77 model time units ($\\ln 2 / \\lambda_1$).\n\n### Computational Recipe\n\
    \nGiven a time series $\\{x_n\\}_{n=0}^{N-1}$, choose an $\\epsilon$-radius covering\
    \ and compute $H_n = -\\sum_{C \\in \\mathcal{C}_n} \\mu(C) \\log \\mu(C)$, where\
    \ $\\mathcal{C}_n$ are cylinders of length $n$ on the reconstructed state. A least-squares\
    \ fit to $H_n$ versus $n$ over a scaling window estimates $h_{\\mu}$."
