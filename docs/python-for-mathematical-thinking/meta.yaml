    \mu, c)$，并确定最优超参数。在十个随机种子上进行验证，并报告均值 $\pm$ 标准差。


    8.  构造 $6 \times 6$ 矩阵 $A_{ij} = 10^{|i-j|} + (-1)^{i+j}$。(i) 执行带部分选主元和不带部分选主元的
    LU 分解，并计算增长因子 $\rho = \|U\|_\infty / \|A\|_\infty$。(ii) 为 Toeplitz 矩阵 $10^{|i-j|}$
    推导 $\rho$ 关于 $n$ 的解析上界，并评论观察到的值。(iii) 使用低精度 LU 因子在双精度下应用迭代精化，并报告 $\mathbf{b} =
    (1, \dots, 1)^T$ 的最终残差范数 $\|A\hat{\mathbf{x}} - \mathbf{b}\|_2$。


    9.  对于 $n = 1200$，均匀划分区间 $[0, 1]$ 并组装刚度矩阵 $K_{ij} = \int_0^1 \phi_i''(x)\phi_j''(x)\,dx$，其中
    $\{\phi_i\}$ 是连续的、分段线性的“帽子”函数。(i) 证明 $K$ 是带宽 $w = 2$ 的对称正定矩阵。(ii) 实现带状 Cholesky
    分解，并与稠密 Cholesky 分解比较浮点运算次数和内存使用。(iii) 对于 $f(x) = x$ 求解 $K\mathbf{u} = \mathbf{f}$，并验证
    $\|\mathbf{u} - \mathbf{u}_{\text{exact}}\|_2 = O(h^2)$。


    10. 给定 $\begin{pmatrix} A & B^\top \\ B & -C \end{pmatrix} \begin{pmatrix} \mathbf{u}
