    # 8.3 Numerical Integration and Differentiation


    # 8.3.1 Numerical Differentiation Techniques


    Derivatives—including gradients, Jacobians, and Hessians—govern stability, sensitivity,
    and optimisation. When $f$ is available only as a black-box routine, analytic
    differentiation is infeasible and automatic differentiation may be unavailable;
    one must approximate $f''(x)$ via *finite differences*. Two competing error sources
    dictate method choice: *truncation error* due to Taylor truncation and *round-off
    error* from finite precision. A successful scheme balances both by selecting an
    optimal step size $h$ that minimises the total error.


    # Finite Difference Approximations


    Let $f \in C^{p+1}$ on an interval containing $x$. Taylor expansions yield


    $$f(x \pm h) = f(x) \pm hf''(x) + \frac{h^2}{2} f''''(x) \pm \frac{h^3}{6} f^{(3)}(x)
    + \cdots + \frac{h^p}{p!} f^{(p)}(x) + R_{p+1}^{\pm},$$


    where $|R_{p+1}^{\pm}| = O(h^{p+1})$.'
