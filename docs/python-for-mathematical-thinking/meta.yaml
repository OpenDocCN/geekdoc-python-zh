    \ Carlo (QMC)\n\nReplace pseudorandom points by low-discrepancy sequences (Sobol',\
    \ Halton): $I_N^{\\text{QMC}} - I = O((\\log N)^d/N)$, observed error $O(1/N)$\
    \ in moderate dimensions.\n\n#### Applications\n\n- *High-dimensional finance.*\
    \ Price a 20-asset basket option with payoff $(\\sum w_i S_i - K)^+$. QMC with\
    \ Brownian bridge construction reduces variance ten-fold over pseudo-random.\n\
