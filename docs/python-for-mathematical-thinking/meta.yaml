    # 11.2.2 Digital Filtering in Python


    Digital filters reshape the spectral content of discrete-time signals, suppressing
    noise, extracting frequency bands, or imposing smoothness constraints. A filter
    is characterised by its impulse response $h[n]$ and transfer function $H(e^{j\omega})$.
    In practice, implementation fidelity rests on numerical stability, finite-word-length
    effects, and real-time throughput. Python''s `scipy.signal` module, augmented
    by numpy and numba, furnishes a comprehensive toolkit for both batch and streaming
    applications.


    # FIR vs. IIR Filters: Design and Stability


    FIR (Finite Impulse Response)


    $$y[n] = \sum_{k=0}^{M} h_k x[n-k], \quad H(z) = \sum_{k=0}^{M} h_k z^{-k}.$$


    Advantages: inherent BIBO stability ($\forall h \in \ell^1$), linear-phase achievable
    via symmetric coefficients ($h_k = h_{M-k}$), and convex least-squares design.
    Drawback: steep transition bands require large order $M$.


    IIR (Infinite Impulse Response)


    Difference equation


    $$y[n] + \sum_{k=1}^{N} a_k y[n-k] = \sum_{k=0}^{M} b_k x[n-k], \quad H(z) = \frac{\sum_{k=0}^{M}
    b_k z^{-k}}{1 + \sum_{k=1}^{N} a_k z^{-k}}.$$


    Poles inside unit circle ensure stability; sharper roll-off with fewer taps but
    possible nonlinear phase and risk of arithmetic overflow.


    # BIBO Stability Criterion


    IIR stable $\iff \max_i |z_i| < 1$ where $\{z_i\}$ are poles of $H(z)$. `scipy.signal.tf2zpk`
    extracts zeros/poles to verify.'
