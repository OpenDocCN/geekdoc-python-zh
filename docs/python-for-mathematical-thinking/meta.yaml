    \ = s_j \\mid X_n = s_i, X_{n-1} = s_k, \\dots) = \\mathbb{P}(X_{n+1} = s_j \\\
    mid X_n = s_i) = P_{ij}, \\quad \\forall i, j.$$\n\n矩阵 $P = (P_{ij})_{i,j=1}^m$\
    \ 是**转移矩阵**：每行元素之和为 1。\n\n### 转移矩阵与长期行为\n\n**查普曼-科尔莫戈罗夫方程** 对于 $n \\geq 0, k \\\
