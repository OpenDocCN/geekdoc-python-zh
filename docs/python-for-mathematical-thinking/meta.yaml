    \ and Concatenating Dataframes\n\nLet $\\mathcal{D}_1$ and $\\mathcal{D}_2$ be\
    \ two pandas data frames keyed by attribute set $K = \\{k_1, \\dots, k_m\\}$.\
    \ The inner join\n\n$$\\mathcal{D}_{\\text{in}} = \\mathcal{D}_1 \\bowtie_K \\\
    mathcal{D}_2 = \\{ d_1 \\cup d_2 \\mid d_i \\in \\mathcal{D}_i, \\; d_1|_K = d_2|_K\
    \ \\}$$\n\nimplements the set-intersection over $K$ with complexity $O((n_1 +\
    \ n_2) \\log n_2)$ under hashed indices. Outer joins augment rows lacking counterparts\
    \ with NaN placeholders, formally computing the symmetric difference.\n\n```python\n\
