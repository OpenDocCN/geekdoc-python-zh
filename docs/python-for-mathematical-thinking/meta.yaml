    lambda)$，且 $S_n = T_1 + \\dots + T_n$ 给出第 $n$ 次到达的时间（埃尔朗分布）。\n\n### 时间和空间中的事件建模\n\
    \n**时域性质** 对于任意 $t \\ge 0$ 和 $k \\in \\mathbb{N}_0$，\n$$\\mathbb{P}(N(t) = k)\
    \ = e^{-\\lambda t} \\frac{(\\lambda t)^k}{k!}, \\quad \\mathbb{E}[N(t)] = \\\
    lambda t, \\quad \\text{Var}(N(t)) = \\lambda t.$$\n\n**示例 5.4.4（探测器中的光子计数）**\
    \ 探测器平均每秒 $\\lambda = 350$ 个光子。在 $\\Delta t = 1$ 秒内观测到最多 330 个光子的概率：\n$$P = \\\
    sum_{k=0}^{330} e^{-350} \\frac{350^k}{k!}.$$\n\n数值计算，\n\n```python\nimport mpmath\
    \ as mp\nlam = 350\nP = mp.nsum(lambda k: mp.nsum(lambda i: 0, [0,0]) if k>330\
    \ else\n            mp.e**(-lam)*lam**k/mp.factorial(k), [0,330])\nprint(P) #\
    \ 0.081...\n```\n\n约为 8.1%。\n\n**顺序统计量** 在给定 $N(t) = n$ 的条件下，到达时间 $(S_1, \\ldots,\
    \ S_n)$ 是 $n$ 个独立同分布的 Unif(0, $t$) 变量的顺序统计量。\n\n**示例 5.4.5（首次事故前的时间）** 汽车以泊松($\\\
    lambda = 12 \\text{ h}^{-1}$) 过程通过检查点。首次到达时间 $S_1$ 的分布：\n\n$\\mathbb{P}(S_1 >\
