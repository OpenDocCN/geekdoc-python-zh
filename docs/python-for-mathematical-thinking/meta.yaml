    # 8.2 Optimisation Techniques


    Optimisation asks for the *best* element of a feasible set with respect to an
    objective function. In the smooth unconstrained setting one searches for a minimiser
    of $f : \mathbb{R}^d \to \mathbb{R}$ by iteratively descending along directions
    that locally promise the steepest decrease. The *gradient descent* family embodies
    this principle, spawning variants that accelerate convergence, tame noise, and
    adapt learning rates—techniques that lie at the heart of modern machine learning,
    inverse problems, and data fitting.


    # 8.2.1 Gradient Descent


    # Basic Gradient Descent and Variants


    For a differentiable $f$ with Lipschitz-continuous gradient ($\|\nabla f(x) -
    \nabla f(y)\| \le L\|x - y\|$), the basic iteration reads


    $$x_{k+1} = x_k - \eta_k \nabla f(x_k), \quad k = 0, 1, 2, \ldots,$$


    where $\eta_k > 0$ is the *step size*. If $f$ is convex and $\eta_k \in (0, 2/L)$,
    the sequence $\{f(x_k)\}$ monotonically decreases and obeys $f(x_k) - f^\star
    \le \frac{\|x_0 - x^\star\|^2}{2\eta k}$ (sublinear $O(1/k)$ rate). When $f$ is
    $\mu$-strongly convex, a fixed $\eta \le 2/(L + \mu)$ yields linear convergence:
    $\|x_k - x^\star\|^2 \le (1 - \eta \mu)^k \|x_0 - x^\star\|^2$.


    # Momentum (Polyak)


    Augment the update with velocity $v_k$:


    $$v_{k+1} = \beta v_k + \nabla f(x_k), \quad x_{k+1} = x_k - \eta v_{k+1},$$


    where $0 < \beta < 1$ averages past gradients, dampening oscillations in ravines.


    # Nesterov Accelerated Gradient (NAG)


    Forecast a point $y_k = x_k + \beta(x_k - x_{k-1})$, then evaluate the gradient
    at $y_k$:


    $$x_{k+1} = y_k - \eta \nabla f(y_k),$$


    achieving the optimal $O(1/k^2)$ rate for convex objectives.'
