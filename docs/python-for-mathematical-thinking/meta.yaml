    ```\n\n**异常值 Winsorization 处理** 将超出 $[\\mu \\pm 3\\sigma]$ 或超出 Tukey 围栏的值进行截断，以减少其影响。\n\
    \n```python\nfrom scipy.stats import mstats\ndata_wins = mstats.winsorize(salaries,\
    \ limits=[0.05,0.05])\n```\n\n**缩放** 标准化 $(x - \\bar{x})/s$ 或最小-最大缩放 $[0, 1]$\
