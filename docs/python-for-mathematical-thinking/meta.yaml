    # Flux Through Surfaces


    Given a vector field $\vec{F}(x, y, z)$, and a surface $S$ with normal vector
    $\vec{n}$, the surface integral is:


    $$\iint_S \vec{F} \cdot d\vec{S} = \iint_D \vec{F} \cdot \vec{n} \, dA.$$


    For a surface $z = g(x, y)$, we have:


    $$d\vec{S} = \left( -\frac{\partial g}{\partial x}, -\frac{\partial g}{\partial
    y}, 1 \right) \, dx \, dy.$$


    **Example 3.3.19 (Upward Flux Through a Paraboloid Cap)** Let $\vec{F}(x, y, z)
    = (0, 0, z)$, and surface $S$ be the cap $z = 4 - x^2 - y^2$ over disk $x^2 +
    y^2 \le 4$.

    Then:


    $$\iint_S \vec{F} \cdot \vec{n} \, dS = \iint_D (4 - x^2 - y^2) \, dx \, dy.$$


    ```

    r, theta = sp.symbols("r theta")

    z = 4 - r**2

    jacobian = r

    f = z * jacobian

    flux = sp.integrate(sp.integrate(f, (r, 0, 2)), (theta, 0, 2*sp.pi))

    sp.pprint(flux)

    ```'
