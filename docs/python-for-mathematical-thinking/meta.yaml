    its Shannon entropy. The **Kolmogorov–Sinai (KS) entropy** is


    $$h_{\mu}(T) = \sup_{\mathcal{P}} \left( \lim_{n \to \infty} \frac{1}{n} H_{\mu}(\mathcal{P}^n)
    \right),$$


    the supremum taken over all finite partitions. A system with $h_{\mu}(T) = 0$
    is *zero-entropy*; it may still be aperiodic (e.g., irrational circle rotation)
    yet displays no exponential growth of complexity. Positive KS entropy signals
    chaotic orbit structure: the set of admissible symbolic sequences under a generating
