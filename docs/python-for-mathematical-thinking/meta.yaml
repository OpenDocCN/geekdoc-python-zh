    \ pred)\nloss_adv = tf.keras.losses.binary_crossentropy(s_true, adv)\nloss = loss_pred\
    \ - λ*loss_adv # gradient reversal on adv\n```\n\n## 可视化\n\n差异影响比率 $\\frac{\\\
