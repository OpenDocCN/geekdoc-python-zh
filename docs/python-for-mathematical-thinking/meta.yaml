    # Inverse Laplace Transform


    Recovering $f$ from $F$ employs complex analysis. Let $\gamma > \sigma_0$; the
    **Bromwich inversion integral** states


    $$f(t) = \frac{1}{2\pi i} \int_{\gamma-i\infty}^{\gamma+i\infty} e^{st} F(s)\,
    ds.$$


    For rational $F$ (with distinct poles $s_k$ in $\text{Re}\, s < \gamma$) the residue
    theorem yields


    $$f(t) = \sum_k \text{Res}_{s=s_k}(e^{st} F(s)).$$


    **Partial-Fraction Algorithm** If $F(s) = \frac{P(s)}{(s-a_1)^{m_1}\cdots(s-a_r)^{m_r}}$,
    expand $F$ into elementary fractions; each term''s inverse is known:


    $$\mathcal{L}^{-1}\left\{\frac{1}{(s-a)^n}\right\} = \frac{t^{n-1}}{(n-1)!}\,
    e^{at}, \quad n \in \mathbb{N}.$$


    **Example 6.3.1 (Heaviside Step)** $F(s) = \frac{e^{-2s}}{s}$. Recognise shift
    theorem $f(t) = H(t-2)$, where $H$ is the unit step. Symbolic verification:


