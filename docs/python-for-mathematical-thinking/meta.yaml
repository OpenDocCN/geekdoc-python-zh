    \ sympy as sp\nx = sp.Symbol(\"x\")\ny = sp.Function(\"y\")(x)\node = sp.Eq(y.diff(x),\
    \ x*y)\nsol = sp.dsolve(ode, y, ics={y.subs(x, 0): 1})\nsp.pprint(sol)\n```\n\n\
    The solution is $y(x) = e^{x^2/2}$.\n\n### Example 3.4.2 (Integrating Factor Method)\
    \ Solve\n\n$$\\frac{dy}{dx} + y = e^x, \\quad y(0) = 0.$$\n\nMultiply by integrating\
    \ factor $e^x$ to obtain:\n\n$$\\frac{d}{dx}(ye^x) = e^{2x} \\Rightarrow y = e^x\
    \ - 1.$$\n\n```python\node = sp.Eq(y.diff(x) + y, sp.exp(x))\nsol = sp.dsolve(ode,\
