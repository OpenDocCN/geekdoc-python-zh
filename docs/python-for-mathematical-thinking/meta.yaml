    \n## 7.5.2 Algebraic Structures\n\nAlgebraic structures formalise the intuitive\
    \ idea of combining objects and studying the laws that govern those combinations.\
    \ They provide a unifying language in which arithmetic, symmetry, order, and logic\
    \ can all be expressed. Once cast in this abstract setting, theorems become portable:\
    \ a property proved for *any* group instantly applies to integers under addition,\
    \ permutations under composition, and invertible matrices under multiplication.\
    \ Python’s arbitrary precision arithmetic and its ecosystem of symbolic algebra\
    \ libraries (sympy, sagemath) create an ideal playground for verifying such universal\
    \ statements computationally.\n\n### Groups, Rings, and Fields\n\nA **group**\
    \ $\\langle G, *, e \\rangle$ consists of a non-empty set $G$ equipped with a\
    \ binary operation $*$ satisfying associativity, identity, and invertibility.\
    \ If $*$ is commutative the group is *abelian*. Classic examples range from $(\\\
    mathbb{Z}, +, 0)$ through $(\\mathbb{Z}_n, +_n, 0)$ to the symmetric group $S_n$\
    \ of permutations on $n$ letters.\nGroups act on sets via homomorphisms $G \\\
    to \\text{Sym}(X)$; orbits and stabilisers partition the action space, and the\
    \ orbit-stabiliser theorem $|G| = |G \\cdot x| \\cdot |G_x|$ feeds enumeration\
    \ (cf. Pólya theory).\nA **ring** $(R, +, \\cdot)$ augments an abelian group $(R,\
    \ +)$ with a second associative operation $\\cdot$ that distributes over $+$.\
    \ Rings may or may not have multiplicative identities (1). $\\mathbb{Z}$, $\\\
    mathbb{Z}_n$, and polynomial rings $\\mathbb{F}[x]$ are paradigmatic; Euclidean\
    \ domains admit a division algorithm, Bézout’s identity, and unique factorisation.\n\
    A **field** is a commutative ring where non-zero elements form an abelian multiplicative\
    \ group. Finite fields $\\mathbb{F}_{p^k}$ exist for prime-powers $p^k$ and are\
    \ unique up to isomorphism; they support polynomial arithmetic modulo irreducibles\
    \ and underpin most modern cryptosystems.\n\n### Example 7.5.4 (Fast Exponentiation\
    \ in the Field $\\mathbb{F}_p$)\n\n```python\nimport random\ndef modexp(a, e,\
    \ p):\n    res = 1\n    while e:\n        if e & 1: res = (res*a) % p\n      \
    \  a = (a*a) % p; e >>= 1\n    return res\n\np = 1_000_000_007\ng = random.randint(2,\
    \ p-2)\nassert modexp(g, p-1, p) == 1 # Fermat's little theorem\n```\n\n### Lattices\
    \ and Boolean Algebras\n\nA **lattice** is a partially ordered set $(L, \\leq)$\
    \ where every pair $(x, y)$ admits a least upper bound $x \\vee y$ (*join*) and\
    \ greatest lower bound $x \\wedge y$ (*meet*). Finite lattices can be visualised\
    \ via Hasse diagrams; distributive lattices satisfy $x \\wedge (y \\vee z) = (x\
    \ \\wedge y) \\vee (x \\wedge z)$.\n\nA **Boolean algebra** is a distributive\
    \ lattice with top $\\top$, bottom $\\bot$, and complementation $\\neg$ such that\
    \ $x \\vee \\neg x = \\top$ and $x \\wedge \\neg x = \\bot$. Stone duality links\
    \ Boolean algebras to Boolean spaces (totally disconnected compact Hausdorff),\
    \ revealing deep connections between logic and topology.\n\n### Example 7.5.5\
    \ (Lattice of Divisors)\n\n```python\nimport math, itertools\nn = 60\ndivs = {d\
    \ for d in range(1,n+1) if n%d==0}\nleq = lambda a,b: a|b == b # divisibility\
    \ order via bitwise OR\nfor a,b in itertools.combinations(divs, 2):\n    join\
    \ = math.lcm(a,b)\n    meet = math.gcd(a,b)\n    assert join in divs and meet\
    \ in divs\n```\n\n### Applications in Cryptography and Coding Theory\n\n**Public-Key\
    \ Cryptography** RSA exploits the multiplicative group $(\\mathbb{Z}_N^\\times,\
    \ \\cdot)$ where $N = pq$ is semiprime; difficulty of factoring $N$ protects the\
    \ private exponent. Elliptic-curve cryptography replaces $\\mathbb{Z}_N^\\times$\
