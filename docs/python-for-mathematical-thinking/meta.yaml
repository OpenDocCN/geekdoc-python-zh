    \ LU 分解求解；通过网格加倍和理查森外推进行细化以获得更高精度。\n\n## 6.2 偏微分方程（PDEs）\n\n常微分方程描述依赖于单个自变量的系统，而**偏微分方程**描述其状态\
    \ $u = u(\\mathbf{x}, t)$ 在*空间*和*时间*上都变化的现象。典型的物理定律——热传导、波传播、流体流动、量子力学——都是用偏微分方程的语言表述的。本小节介绍三种典型的二阶线性偏微分方程，建立初值和边值问题，并通过分离变量法和达朗贝尔原理推导经典解析解。Python\
    \ 验证使用 sympy 的符号偏微分方程模块以及 numpy/matplotlib 进行可视化。\n\n### 热方程、波动方程和拉普拉斯方程\n\n**热（扩散）方程**\
    \ 对于杆 $0 < x < L$ 上的温度 $u(x, t)$：\n\n$$u_t = \\kappa u_{xx}, \\quad \\kappa >\
    \ 0.$$\n\n抛物型：信息以无限速度扩散；具有平滑效应。\n\n**波动方程** 拉紧弦的位移 $u(x, t)$：\n\n$$u_{tt} = c^2\
    \ u_{xx}, \\quad c > 0.$$\n\n双曲型：有限速度传播 $c$；特征线 $x \\pm ct = \\text{const}$。\n\
    \n**拉普拉斯（势）方程** 二维稳态势 $\\phi(x, y)$：\n\n$$\\nabla^2 \\phi = \\phi_{xx} + \\phi_{yy}\
    \ = 0.$$\n\n椭圆型：边界数据唯一且光滑地确定内部。\n\n通过一般方程 $Au_{xx} + Bu_{xy} + Cu_{yy} = 0$ 的判别式\
