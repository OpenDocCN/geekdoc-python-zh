    \ (x+y+z) \\, dz \\, dy \\, dx, \\quad D = \\{0 \\le x \\le 1, \\ 0 \\le y \\\
    le 1-x, \\ 0 \\le z \\le 1-x-y\\}.$$\n\n```python\nf = x + y + z\nI = sp.integrate(\n\
