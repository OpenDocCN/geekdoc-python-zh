    ### 11.3.1 TDA简介


    经典统计学依赖于矩、相关性和低阶几何；然而，复杂的数据流形常常隐藏着线性视角无法捕捉的结构。*拓扑数据分析*（TDA）秉持“形状很重要”的信条，提炼出点云在不同尺度上保持不变的特征签名。通过构建过滤单纯复形并追踪
    $k$ 维孔洞的诞生与消亡，TDA量化了全局组织模式，同时对环境维度保持不可知。由此产生的摘要——*条形码*和*持久图*——作为空间中的坐标，适用于统计操作和机器学习流程。


    ### 持久同调与条形码


    令 $X = \{x_1, \dots, x_n\} \subset \mathbb{R}^d$ 为赋予欧几里得度量 $d(\cdot, \cdot)$ 的点云。对于
    $\varepsilon \ge 0$，构造Vietoris–Rips复形


    $$\mathrm{VR}_{\varepsilon}(X) = \{\sigma \subseteq X : d(x_i, x_j) \le \varepsilon
    \; \forall x_i, x_j \in \sigma\},$$


    其 $k$-单纯形编码了所有直径 $\le \varepsilon$ 的 $(k+1)$-团。随着 $\varepsilon$ 增加，族 $\{\mathrm{VR}_{\varepsilon}\}_{\varepsilon
    \ge 0}$ 产生一个过滤 $\mathrm{VR}_0 \subseteq \mathrm{VR}_{\varepsilon_1} \subseteq
    \cdots \subseteq \mathrm{VR}_{\varepsilon_m}$。同调函子 $H_k(-; \mathbb{k})$（系数在域 $\mathbb{k}$
    中）产生一系列由线性映射连接的向量空间；根据有限生成持久模的结构定理，每个 $k$-同调类对应一个区间 $(\varepsilon_{\text{birth}},
    \varepsilon_{\text{death}})$，可视化为一条水平线——*条形码*。稳定性定理（Cohen-Steiner et al. 2007）指出，条形码之间的瓶颈距离以点云之间的豪斯多夫距离为界，确保了对噪声的鲁棒性（参见图11.1）。


    ```python

    import numpy as np, matplotlib.pyplot as plt

    from ripser import ripser

    from persim import plot_diagrams

    X = np.random.randn(400, 2) # 后续为环形数据

    dgms = ripser(X, maxdim=2)[''dgms'']

    plot_diagrams(dgms, show=True, lifetime=True)

    ```


    ### 在数据分析与机器学习中的应用


    *流形假设检验* 对于手写数字，$H_1$ 在半径 $\varepsilon \approx 1.5$ 附近的持久性揭示了“0”的环状结构，将其与缺乏长1-循环的“1”区分开来。通过持久图像
    $P : \mathbb{R}^2 \to \mathbb{R}_{\ge 0}$ 对图进行特征化，使得卷积神经网络能够处理拓扑特征。


    *蛋白质折叠* α-碳坐标生成 $\alpha$-复形过滤；长的 $H_1$ 区间表示 $\beta$-桶中的稳定通道；$H_2$ 捕获与配体相关的空腔'
