  md: '+   - *Uniform matroid* $U_{n,k}$: $E = \{1, \dots, n\}$, $\mathcal{I} = \{I
    \subseteq E : |I| \leq k\}$. Rank of any subset is $\min\{|S|, k\}$.

    - *Graphic (cycle) matroid* $M(G)$ of a graph $G = (V, E)$: independent sets are
    forests (edge subsets with no cycles). Bases correspond to spanning trees; rank
    equals $|V| - c(G)$ where $c(G)$ is the number of connected components.

    - *Vector matroid* $M(V)$: $E$ is a finite set of vectors in a vector space, with
    independence defined linearly. Representable matroids connect linear algebra to
    combinatorics; e.g. $F_7$ (Fano plane) is representable over $\mathbb{F}_2$ but
    not over $\mathbb{R}$.

    - *Transversal matroid*: given a family of subsets $\mathcal{A} = \{A_1, \dots,
    A_m\}$ of $E$, a set $I \subseteq E$ is independent if it is contained in some
    system of distinct representatives for $\mathcal{A}$. Hall''s marriage theorem
    characterises bases.


    **Example 7.5.7 (Circuits of a Graphic Matroid)** Let $G$ be the square with a
    diagonal. Its edge set $E = \{e_1, \dots, e_5\}$ has three circuits: the two triangles
    and the 4-cycle. Deleting any edge from a circuit yields a forest; adding any
    external edge to a forest closes exactly one unique new circuit—reflecting the
    exchange axiom in graph form.


    Rank and closure define flats (closed sets), whose lattice encodes geometric properties;
    in the graphic case flats correspond to edge cuts.


    # Applications in Optimisation and Graph Theory


    Many classical optimisation problems conceal a matroid structure and hence admit
    polynomial-time greedy solutions.


    **Spanning Tree and Forests** Kruskal''s algorithm selects edges of minimum weight
    that do not form cycles—precisely the greedy algorithm for the graphic matroid
    with weights. By matroid theory the resulting set is a minimum-weight basis.


    **Branchings and Arborescences** The set of arcs forming acyclic subgraphs in
    a digraph forms a *gammoid*. Edmonds''s branching theorem extends matroid intersection
    to find minimum-cost rooted arborescences.


    **Matroid Intersection and Union** Given two matroids $\mathcal{M}_1, \mathcal{M}_2$
    on the same ground set, the maximum common independent set is found via augmenting-path
    algorithms in $O(|E|^{1.5})$ time; applications include edge-disjoint spanning
    trees and bipartite matchings (graphic $\cap$ partition matroid).


    **Cut, Flow, and Duality** For planar graphs, the cocycle matroid $M^*(G)$ is
    dual to $M(G^*)$, the cycle matroid of the planar dual $G^*$. This correspondence
    underpins planar flow-cut duality and explains why max-flow equals min-cut in
    planar networks under capacity–length interchanges.'
