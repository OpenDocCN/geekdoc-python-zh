    # Advanced Topics in Computational Topology


    # Zigzag Persistence


    Handles filtrations with insertions and deletions $K_0 \leftrightarrow K_1 \leftrightarrow
    \cdots \leftrightarrow K_m$. Interval decomposition generalises barcode; algorithm
    reduces a block matrix pair in $O(n^\omega \log n)$.


    # Multidimensional Persistence


    Filtration indexed by $\mathbb{R}^k$ ($k \ge 2$)—e.g., Rips along distance and
    density. No complete discrete invariant (multigraded Betti tables partially order
    diagrams). Algorithms approximate via rank invariants on cubical grids.


    # Discrete Morse Theory


    Reduces complex size while preserving homotopy: acyclic partial matching on Hasse
    diagram collapses non-critical cells, yielding boundary matrix with $\le$ critical
    cells. Typical $10\times$ speed-ups in VR complexes of $10^6$ simplices.


    # Sheaf Cohomology on Data


    Attach vector spaces to open sets obeying restriction maps; compute global sections
    via sheaf Laplacian—enabling multi-sensor data fusion and consistency checking.


    # Computational Challenges


    +   - Memory: storing $VR(n)$ requires $O(n^k)$ simplices for $k$ up to dimension;
    use witness, sparsified Rips, or edge collapsing.

    - Finite precision: large filtrations necessitate integer-preserving Smith normal
    forms or modular Chinese-remainder lifts.

    - Parallelisation: GPU reduction via chunked boundary matrices and atomic XOR
    in $\mathbb{Z}_2$ reduces 100 M simplex barcode to <30 s.'
- md: "## 11.4 Quantum Computing\n\n### 11.4.1 Mathematical Foundations of Quantum\
    \ Mechanics\n\nQuantum information lives in complex Hilbert spaces: a finite $n$-qubit\
    \ register is the $2^n$-dimensional vector space $\\mathcal{H} = (\\mathbb{C}^2)^{\\\
    otimes n}$ equipped with the inner product $\\langle \\psi \\mid \\varphi \\rangle\
    \ = \\sum_k \\overline{\\psi_k} \\varphi_k$. Dirac's bra–ket notation writes column\
    \ vectors as kets $|\\psi\\rangle$ and their conjugate transposes as bras $\\\
    langle \\psi|$. The Born rule assigns probability $|\\langle m \\mid \\psi \\\
    rangle|^2$ to outcome $|m\\rangle$ when measuring observable $M = \\sum_m m |m\\\
    rangle\\langle m|$. Time evolution of closed systems obeys Schrödinger's equation\
    \ $i\\hbar \\dot{\\psi} = H\\psi$ whose solution is a unitary $U(t) = e^{-itH/\\\
    hbar}$, hence every physically admissible gate must be unitary. Composite systems\
    \ are modelled by tensor products, and partial traces $\\rho_A = \\mathrm{Tr}_B\
    \ \\rho_{AB}$ capture reduced states. Density matrices $\\rho = \\sum_k p_k |\\\
    psi_k\\rangle\\langle \\psi_k|$ extend the formalism to mixed ensembles, furnishing\
    \ expectation $\\mathbb{E}[M] = \\mathrm{Tr}(\\rho M)$.\n\n### Linear Algebra\
    \ in Quantum Computing\n\nThe computational basis for a single qubit comprises\
    \ $|0\\rangle = (1, 0)^\\top$ and $|1\\rangle = (0, 1)^\\top$. Pauli matrices\n\
    \n$$X = \\begin{pmatrix} 0 & 1 \\\\ 1 & 0 \\end{pmatrix}, \\quad Y = \\begin{pmatrix}\
    \ 0 & -i \\\\ i & 0 \\end{pmatrix}, \\quad Z = \\begin{pmatrix} 1 & 0 \\\\ 0 &\
    \ -1 \\end{pmatrix}$$\n\nobey $X^2 = Y^2 = Z^2 = I$ and anticommute $XY = -YX$.\
    \ Any single-qubit unitary admits Euler decomposition $U = e^{i\\alpha} R_z(\\\
    beta) R_y(\\gamma) R_z(\\delta)$ where rotations $R_k(\\theta) = e^{-i\\theta\\\
    sigma_k/2}$. Tensor products satisfy $(A \\otimes B)(C \\otimes D) = AC \\otimes\
    \ BD$. Eigenvalue spectra govern measurement statistics: applying $Z^{\\otimes\
    \ n}$ to a stabiliser state yields $\\pm 1$ outcomes with equal amplitudes, explaining\
    \ parity checks in quantum error-correcting codes.\n\n### Quantum Gates and Circuits\n\
    \nElementary gates on one or two qubits form a universal generating set. The Hadamard\
    \ gate\n\n$$H = \\frac{1}{\\sqrt{2}} \\begin{pmatrix} 1 & 1 \\\\ 1 & -1 \\end{pmatrix}$$\n\
    \ncreates equal superpositions, and the phase gate $S = \\mathrm{diag}(1, i)$\
    \ introduces relative phase. The controlled-NOT (CNOT) is the $4 \\times 4$ unitary\
    \ $\\mathrm{CNOT} = |0\\rangle\\langle 0| \\otimes I + |1\\rangle\\langle 1| \\\
    otimes X$. Universal quantum computation is achieved by the Clifford set $\\{H,\
    \ S, \\text{CNOT}\\}$ plus the non-Clifford $T = \\text{diag}(1, e^{i\\pi/4})$\
    \ gate.\n\n```python\nfrom qiskit import QuantumCircuit, execute, Aer\nqc = QuantumCircuit(2,\
    \ 2)\nqc.h(0); qc.cx(0, 1) # Bell preparation\nqc.measure([0,1], [0,1])\ncounts\
    \ = execute(qc, Aer.get_backend('qasm_simulator'),\n                shots=1024).result().get_counts()\n\
    print(counts) # {'00': ~512, '11': ~512}\n```\n\nMulti-qubit circuits concatenate\
    \ gates; depth minimisation reduces decoherence errors. Graph-state formalisms\
    \ represent Clifford circuits as stabiliser tableaux enabling $O(n^2)$ simulation—vital\
    \ for fault-tolerance analysis.\n\n### Quantum Entanglement and Bell’s Theorem\n\
    \nA bipartite state $\\rho_{AB}$ is separable iff it can be written $\\sum_k p_k\
    \ \\rho_A^k \\otimes \\rho_B^k$. The Bell state $|\\Phi^+\\rangle = \\frac{1}{\\\
    sqrt{2}}(|00\\rangle+|11\\rangle)$ violates separability, evidenced by its reduced\
    \ density $\\rho_A = I/2$ being maximally mixed. Bell’s theorem considers local-hidden-variable\
    \ models $LHV(\\lambda)$ that predetermine outcomes; the CHSH inequality $|E(a,\
    \ b) + E(a, b') + E(a', b) - E(a', b')| \\le 2$ constrains classical correlations.\
    \ Quantum mechanics attains $2\\sqrt{2}$ using measurement settings aligned with\
    \ Pauli $X$ and $Z$, experimentally ruling out LHVs.\n\n**Example 11.4.1** For\
    \ $|\\Phi^+\\rangle$ choose $a = Z \\otimes Z$, $a' = X \\otimes X$, $b = Z \\\
    otimes X$, $b' = X \\otimes Z$. Expectation values $E = 1/\\sqrt{2}$ yield $\\\
    text{CHSH} = 2\\sqrt{2} > 2$.\n\n### Applications in Cryptography and Secure Communication\n\
    \nQuantum Key Distribution (QKD) exploits measurement disturbance. In BB84 Alice\
    \ sends qubits $|0\\rangle, |1\\rangle, |+\\rangle, |-\\rangle$ ($|\\pm\\rangle\
    \ = (|0\\rangle \\pm |1\\rangle)/\\sqrt{2}$); any eavesdropper induces a QBER\
    \ detectable above 11%, prompting abort. Security proofs use entropic uncertainty\
    \ relations $H(X) + H(Z) \\ge \\log 2$ linking complementary bases. Entanglement-based\
    \ Ekert-91 protocol employs Bell-pairs; violation of CHSH certifies secrecy even\
    \ against adversarial devices (device-independent QKD).\n\nPost-quantum cryptography\
    \ addresses Shor’s polynomial-time factoring and discrete-log algorithms. Lattice\
    \ schemes (CRYSTALS-Kyber) rely on Learning With Errors hardness, which withstands\
    \ quantum attacks under plausible complexity assumptions. Quantum teleportation\
    \ transmits an unknown qubit using one ebit plus two classical bits: applying\
    \ CNOT and $H$ on $|\\psi\\rangle \\otimes |\\Phi^+\\rangle$ followed by Pauli\
    \ correction reproduces $|\\psi\\rangle$ remotely, establishing a primitive for\
    \ quantum internetworking.\n\n```python\nqc = QuantumCircuit(3, 2) # |ψ⟩ on qubit\
    \ 0, Bell pair 1-2\nqc.cx(1,2); qc.h(1)\nqc.cx(0,1); qc.h(0); qc.measure([0,1],[0,1])\n\
    qc.x(2).c_if(1,1); qc.z(2).c_if(0,1) # Pauli corrections\n```\n\nQuantum authentication\
    \ schemes append tag qubits drawn from stabiliser codes; measurement yields syndrome\
    \ that flags tampering with probability $1 - 2^{-k}$. Entanglement-assisted protocols\
    \ underpin quantum money and position-based cryptography, though unconditional\
    \ security remains open.\n\n### 11.4.2 Quantum Algorithms\n\nQuantum algorithms\
    \ exploit superposition, entanglement, and interference to achieve computational\
    \ speed-ups beyond classical limits. Their design typically follows a three-step\
    \ template: prepare a suitable superposition, manipulate phase amplitudes via\
    \ oracle or modular arithmetic, and extract the hidden structure by interference\
    \ or measurement. This subsection formalises two flagship algorithms—Shor’s polynomial-time\
    \ factoring and Grover’s square-root search—then demonstrates circuit simulation\
    \ in Python, outlines the stabiliser blueprint for fault-tolerant computation,\
    \ and surveys variational algorithms that marry quantum subroutines with classical\
    \ optimisation.\n\n### Shor’s Algorithm and Grover’s Algorithm\n\n#### Shor’s\
    \ Factoring\n\nLet $N = pq$ with $p, q$ odd primes. Choose random $a \\pmod{N}$,\
    \ $\\gcd(a, N) = 1$, and seek the multiplicative order $r$ s.t. $a^r \\equiv 1\
    \ \\pmod{N}$. Quantum phase estimation (QPE) finds $r$ in $O(\\log^2 N)$ modular-exponentiation\
    \ gates.\n\n$U_a |x\\rangle = |a^x \\pmod{N}\\rangle, \\quad U_a^r = I.$\n\nPrepare\
