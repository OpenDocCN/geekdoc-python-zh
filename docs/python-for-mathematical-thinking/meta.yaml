    # Chapter 8

    Numerical Methods


    **Abstract** Error propagation, conditioning, and stability theory motivate root-finding
    (bisection, Newton, secant), polynomial and spline interpolation, numerical differentiation,
    adaptive quadrature, and matrix factorisations (LU, QR, SVD). Advanced topics
    include multigrid pre-conditioning and GPU-accelerated computation via Numba/JAX,
    arming the reader with industrial-grade techniques for high-fidelity simulation
    and data analysis.


    **Keywords** Numerical methods · Error analysis · Interpolation · Root finding
    · Multigrid techniques · GPU acceleration


    Computational mathematics stands at the intersection of theoretical analysis and
    practical engineering: while analytic closed-form solutions are prized for their
    elegance, real-world models seldom yield to pen-and-paper treatment. *Numerical
    methods* fill this gap by replacing infinite processes with carefully designed
    finite algorithms that run on digital hardware. The passage from the continuum
    to floating-point arithmetic is non-trivial—each numerical scheme must negotiate
    a balance between accuracy, stability, efficiency, and ease of implementation.


    Throughout this chapter we cast continuous problems (root-finding, interpolation,
    integration, differential equations, optimisation) into discrete procedures. Error
    analysis will dissect two complementary sources of inaccuracy: *truncation error*
    (how far a finite approximation deviates from the exact mathematical limit) and
    *round-off error* (how the IEEE 754 machine representation of real numbers perturbs
    arithmetic). The concept of *stability*—the algorithmic analogue of continuity—will
    guide us in distinguishing numerically trustworthy schemes from those that magnify
    perturbations beyond control.


    Python''s *numpy* and *scipy* libraries provide high-performance tensor algebra,
    while *numba* and *jax* unlock just-in-time compilation and automatic differentiation
    for tight numerical loops. Nevertheless, we will implement each core algorithm
    "from scratch" before delegating to these libraries, so that every line of performance-optimised
    code is grounded in a transparent mathematical rationale.'
  - "[PAGE 301]\n\n# 8.1 Root-Finding Algorithms\n\n# 8.1.1 Bisection Method\n\nThe\
    \ bisection method translates the *Intermediate Value Theorem*—if a continuous\
    \ function $f : [a, b] \\to \\mathbb{R}$ satisfies $f(a)f(b) < 0$, then $f$ has\
    \ at least one root in $(a, b)$—into an algorithm that locates a root by repeatedly\
    \ halving an interval that brackets a sign change. Because each iteration discards\
    \ half of the interval, the method is linearly convergent, robust against derivative\
    \ pathologies, and requires only two function evaluations per step. Its simplicity\
    \ and guaranteed convergence make it the workhorse for black-box root finding\
    \ when bracketing is straightforward.\n\n# Convergence and Implementation in Python\n\
    \nLet $(a_0, b_0)$ be the initial bracket with $f(a_0)f(b_0) < 0$. Define $m_k\
    \ = \\frac{1}{2}(a_k + b_k)$ and update\n\n$$(a_{k+1}, b_{k+1}) = \\begin{cases}\
    \ (a_k, m_k) & \\text{if } f(a_k) f(m_k) < 0, \\ (m_k, b_k) & \\text{otherwise.}\
    \ \\end{cases}$$\n\nThe length of the interval after $k$ steps is $|b_k - a_k|\
    \ = 2^{-k}|b_0 - a_0|$. Hence for the unique root $r \\in (a_0, b_0)$ one has\n\
    \n$$|r - m_k| \\le \\frac{|b_0 - a_0|}{2^{k+1}}, \\quad \\text{so } m_k \\xrightarrow{k\
    \ \\to \\infty} r \\text{ linearly.}$$\n\n```\ndef bisection(f, a, b, *, atol=1e-12,\
    \ rtol=1e-10, max_iter=100):\n    fa, fb = f(a), f(b)\n    if fa*fb > 0:\n   \
    \     raise ValueError(\"Root not bracketed\")\n    for k in range(max_iter):\n\
    \        m = 0.5*(a+b)\n        fm = f(m)\n        if abs(fm) < atol or 0.5*(b-a)\
    \ < rtol*abs(m):\n            return m, k\n        if fa*fm < 0: b, fb = m, fm\n\
    \        else: a, fa = m, fm\n    raise RuntimeError(\"no convergence\")\n```\n\
    \nCalling `bisection(lambda x: x*np.cos x - 1, 0.5, 2)` returns the first positive\
    \ root of $x \\cos x = 1$ to machine precision in $k = \\lceil \\log_2(|b_0 -\
    \ a_0|/\\varepsilon) \\rceil$ iterations."
