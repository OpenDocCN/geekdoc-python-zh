    \              [0.2, 0.3, 0.5]])\n# stationary distribution via eigenvector\n\
    eigvals, eigvecs = np.linalg.eig(P.T)\npi = eigvecs[:, np.isclose(eigvals, 1)]\n\
    pi = pi/pi.sum()\nprint(pi.real.ravel()) # [0.476, 0.286, 0.238]\n\n\nAfter long\
    \ time the probability of a sunny day stabilises near 47.6%. Compute 10-day forecast\
    \ from initial state $S$:\n\npython\np0 = np.array([1, 0, 0])\nprint(p0 @ np.linalg.matrix_power(P,\
