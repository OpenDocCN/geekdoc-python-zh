    **Modularity and the Louvain Heuristic** Modularity of a partition $\mathcal{C}$
    is


    $$Q(\mathcal{C}) = \frac{1}{2m} \sum_{u,v} \left( A_{uv} - \frac{\deg u \deg v}{2m}
    \right) \mathbf{1}_{\kappa(u)=\kappa(v)}, \quad m = |E|,$$


    where $\kappa : V \to \{1, \dots, k\}$ labels communities. Louvain iteratively
    optimises local modularity gains, aggregating communities into super-nodes; it
    scales near-linearly in $|E|$ and finds meaningful clusters in graphs with $\gtrsim
    10^7$ edges.


    ```

    import community as lv # python-louvain package

    part = lv.best_partition(G)

    Q = lv.modularity(part, G)

    print(Q)

    ```


    **Structural Balance and Signed Graphs** Edge signs $\sigma : E \to \{\pm 1\}$
    model friend–foe relations; a graph is structurally balanced iff every cycle has
    positive sign product. Such graphs are characterised as having a bipartition with
    all positive edges inside parts and all negative across.


    # Graph-Based Machine Learning Algorithms


    Graphs feed modern machine-learning pipelines in at least two ways: as kernels
    in classical models and as direct inputs to neural architectures.


    **Graph Kernels** Define $k(G, H) = \langle \phi(G), \phi(H) \rangle$ via random-walk
    or Weisfeiler–Lehman subtree features; SVMs on these kernels perform graph classification
    without explicit vectorisation.


    **Graph Neural Networks (GNNs)** A message-passing layer updates node embeddings:


    $$\mathbf{h}_v^{(\ell+1)} = \sigma\left( W_1 \mathbf{h}_v^{(\ell)} + \sum_{u \in
    \mathcal{N}(v)} W_2 \mathbf{h}_u^{(\ell)} + \mathbf{b} \right).$$


    Stack $L$ layers, apply global pooling for whole-graph embeddings. Theoretical
    expressiveness parallels the 1-Weisfeiler–Lehman test; injective aggregation (e.g.
    sum) is critical.'
