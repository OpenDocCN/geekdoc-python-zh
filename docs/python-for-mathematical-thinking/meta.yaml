    \n13. 证明对于素数 $p \\ge 5$\n    $$\\sum_{k=0}^{p-1} \\binom{2k}{k} \\equiv 0 \\pmod{p^2}.$$\n\
    \    提示：使用生成函数 $\\sum_{k \\ge 0} \\binom{2k}{k} z^k = (1 - 4z)^{-1/2}$ 和 $(1 +\
    \ u)^p$ 的 $p$ 进制展开。\n\n14. 定义 $6 \\times 6$ 矩阵\n    $$S = [S(n, k)]_{0 \\le n,\
    \ k \\le 5}, \\quad S(n, k) = \\text{第二类 Stirling 数}.$$\n    显式计算 $S^2$，并从组合学角度解释条目\
    \ $(S^2)_{5,3}$。\n\n15. 给定任务 $T = \\{1, \\dots, 7\\}$，处理时间 $\\tau = (2, 2, 4,\
    \ 6, 3, 1, 2)$ 和截止时间 $d = (4, 2, 4, 7, 3, 5, 4)$。子集 $I \\subseteq T$ 是*可行的*，如果任务可以排序使得累积时间从不超过相应的截止时间。证明可行集构成一个拟阵，然后使用任务权重\
    \ $w_i = 10 - \\tau_i$ 运行贪心算法以找到最优调度。显式展示所得的完成序列。\n\n16. 在 PYTHON 中生成 50 个 $G(100,\
    \ 0.08)$ 的实例。对于每个实例，计算最大的拉普拉斯特征值 $\\lambda_{\\max}$ 并绘制其经验累积分布函数 (ECDF)。将样本均值与渐近预测\
