    # Mapper Algorithm


    Cover data''s lens projection $\ell : X \to \mathbb{R}$ (e.g., first Laplacian
    eigenfunction) by intervals $\{U_i\}$ with overlap; cluster $\ell^{-1}(U_i)$ into
    connected components, nodes $\mathcal{N}_{ij}$, connect overlapping components.
    Resulting simplicial graph summarises high-dimensional shape; applied to gene
    expression (RNA-seq) reveals branching cell differentiation trajectories.


    # Topological Regularisation


    Given neural network $f_\theta$, encourage decision boundary to avoid creating
    spuriously tangled features by penalising long bars in class-conditional zero-level
    set persistence:


    $$\mathcal{L}_{\text{top}}(\theta) = \sum_{k=0}^{2} \sum_{(b,d) \in \text{Dgm}_k}
    \exp(-(d-b)/\tau),$$


    gradients computed via differentiable Vietoris–Rips (Hofer et al. 2019). Adding
    $\lambda \mathcal{L}_{\text{top}}$ improves adversarial robustness by $+6\%$.


    ```

    from torch_topological.nn import VietorisRips

    vr = VietorisRips(radius=0.8, homology_dimensions=[0,1])

    diag = vr(x) # differentiable barcode tensor

    loss_top = torch.exp(-(diag[:,1]-diag[:,0])/tau).sum()

