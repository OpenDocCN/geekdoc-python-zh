    # Transform Methods for PDEs


    **Fourier Transform on $\mathbb{R}$** For $u_t = \kappa u_{xx}$ on $-\infty <
    x < \infty$, $\hat{u}(k, t) = -\kappa k^2 \hat{u}(k, t)$. Solve $\hat{u}(k, t)
    = \hat{f}(k)e^{-\kappa k^2 t}$; inverse transform gives $u(x, t) = (4\pi \kappa
    t)^{-1/2} \int e^{-(x-\xi)^2/(4\kappa t)} f(\xi) d\xi$—the heat kernel.


    **Example 6.2.9 (Error-Function Similarity)** With impulsive data $f(x) = \delta(x)$,
    solution reduces to Gaussian kernel itself, verifying fundamental solution property.


    **Laplace Transform in Time** For $u_t = c^2 u_{xx}$, Laplace with respect to
    $t$ yields $(sU - f) = c^2 U_{xx}$. Solve ODE in $x$ and invert in $s$ via Bromwich
    integral or residue calculus.


    **Fourier-Sine Transform for Semi-infinite Rod** Heat equation on $x > 0$, Dirichlet
    at $x = 0$:


    $$\hat{u}_s(\omega, t) = \sqrt{\frac{2}{\pi}} \int_0^\infty u(x, t) \sin \omega
    x \, dx.$$


    Kernel: $e^{-\kappa \omega^2 t} \sin \omega x \sin \omega \xi$.


    **Example 6.2.10 (Heaviside Boundary Jolt)** Set $u(0, t) = H(t)$. Laplace in
    $t$ then sine in $x$ retrieves Carslaw''s solution $u(x, t) = \text{erfc}(x/\sqrt{4\kappa
    t})$.


    # Nonlinear PDEs and Soliton Solutions


    # Korteweg–de Vries (KdV) Equation


    $$u_t + 6uu_x + u_{xxx} = 0.$$


    Travelling-wave ansatz $u(x, t) = \phi(\xi)$, $\xi = x - ct$ reduces to ODE $-c\phi''
    + 6\phi\phi'' + \phi'''''' = 0$. First integral (twice) gives $\phi(\xi) = \frac{c}{2}
    \text{sech}^2\left(\frac{\sqrt{c}}{2} \xi\right)$—a **soliton**: retains shape
    and speed after interactions.


    **Inverse Scattering Transform (IST)** Maps initial profile $u(x, 0)$ to scattering
    data of associated Schrödinger operator; linear time evolution of data; inverse
    map reconstructs $u(x, t) \to$ integrable hierarchy.'
