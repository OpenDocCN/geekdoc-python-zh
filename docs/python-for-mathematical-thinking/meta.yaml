    \ H_1 \\text{ 为真}) \\quad (\\text{第二类错误}).$\n\n示例（单侧 t 检验）检验 $H_0 : \\mu = 0$\
    \ 对 $H_1 : \\mu > 0$，其中 $n = 16$，$\\sigma$ 已知 $= 2$，$\\alpha = 0.05$。临界值：\n\n\
    $$c = \\frac{z_{0.95}\\sigma}{\\sqrt{n}} = 1.645 \\cdot \\frac{2}{4} = 0.823.$$\n\
    \n若真实均值 $\\mu_1 = 1$，功效 $= 1 - \\beta$，其中\n\n$$\\beta = \\Phi\\left(\\frac{c -\
    \ \\mu_1}{\\sigma/\\sqrt{n}}\\right) = \\Phi((0.823 - 1) \\cdot 2) = \\Phi(-0.354)\
    \ \\approx 0.362.$$\n\n因此功效为 0.638。\n\n## 检验的功效与样本量确定\n\n**功效函数** $\\pi(\\mu)\
    \ = \\mathbb{P}_{\\mu}(\\text{拒绝 } H_0)$。目标：选择 $n$ 使得对于期望的效应量 $\\delta = \\mu_1\
    \ - \\mu_0$，满足 $\\pi(\\mu_1) \\geq 1 - \\beta^*$。\n\n**解析公式（z 检验）** 已知 $\\sigma$，双侧检验，显著性水平\
    \ $\\alpha$：\n\n$$n \\geq \\left(\\frac{z_{1-\\alpha/2} + z_{1-\\beta}}{\\delta/\\\
    sigma}\\right)^2.$$\n\n示例 5.3.5（设计临床试验）检测 $\\delta = 5$ mmHg 血压下降，$\\sigma = 12$\
    \ mmHg，$\\alpha = 0.05$，功效 0.9（$\\beta = 0.1$）。\n\n$$n \\geq \\left(\\frac{1.96\
    \ + 1.28}{5/12}\\right)^2 = (3.24 \\cdot 2.4)^2 \\approx 600.$$\n\n因此每组 $n = 61$。\n\
    \n```python\nfrom statsmodels.stats.power import TTestIndPower\npower_calc = TTestIndPower()\n\
    n = power_calc.solve_power(effect_size=5/12, power=0.9, alpha=0.05)\nprint(np.ceil(n))\
    \ # 61.0\n```\n\n## 功效曲线可视化（参见图 5.7）\n\n```python\ndelta = np.linspace(0, 8, 100)\n\
    power = power_calc.power(effect_size=delta/12, nobs1=61, alpha=0.05)\nplt.plot(delta,\
    \ power); plt.xlabel(\"效应量 $\\Delta$\"); plt.ylabel(\"功效\");\nplt.show()\n```\n\
    \n**效应量度量** Cohen's $d = \\delta/\\sigma$，用于 $\\chi^2$ 表的 Cramér's $V$，用于逻辑检验的比值比；功效随\
    \ $n$ 和真实效应量的增加而增加。\n\n![](img/9724708489e3df346f9e31e3fa6e5746_183_0.png)\n\n\
    图 5.7 双样本 t 检验的功效曲线，每组平衡样本量为 61，显著性水平 α = 0.05。水平虚线标记了设计目标功效 0.9，在之前计算的效应量 Δ ≈\
    \ 5 处达到。\n\n## 5.3.2 置信区间\n\n参数 θ 的**置信区间** (CI) 是一个基于样本数据 X 构建的随机区间 C(X) = [L(X),\
    \ U(X)]，满足\n\nP(θ ∈ C(X)) = 1 − α，\n\n其中 1−α 是*置信水平*（例如 95%）。该概率陈述指的是重复抽样中，其区间覆盖真实参数的样本所占的长期比例。\n\
    \n## 在 Python 中构建置信区间\n\n**正态总体均值，未知方差（t 区间）** 对于独立同分布的 X_i ~ N(μ, σ²)，\n\nX̄\
    \ ± t_{1−α/2, n−1} * s/√n, s² = 1/(n−1) * Σ(X_i − X̄)²。\n\n**示例 5.3.6（燃油效率研究）**\
    \ 十辆汽车的 MPG 测量值\n\nx = (31.2, 29.8, 30.5, 31.1, 32.0, 30.9, 29.6, 31.3, 30.4,\
    \ 31.0)。\n\n```python\nimport numpy as np, scipy.stats as st\nx = np.array([31.2,\
    \ 29.8, 30.5, 31.1, 32.0, 30.9, 29.6, 31.3, 30.4, 31.0])\nmean, sem = x.mean(),\
    \ x.std(ddof=1)/np.sqrt(len(x))\n```\n\n```python\nci = st.t.interval(confidence=.95,\
    \ df=len(x)-1, loc=mean, scale=sem)\nprint(mean, ci)\n```\n\n输出：$\\bar{x} = 30.78$,\
    \ 95% CI = (30.22, 31.34) MPG。\n\n**总体比例（Wald 和 Wilson）** 对于 $X \\sim \\text{Bin}(n,\
    \ p)$，Wald CI 为 $\\hat{p} \\pm z_{1-\\alpha/2}\\sqrt{\\hat{p}(1-\\hat{p})/n}$；对于小\
    \ $n$，Wilson (Agresti–Coull) 更优。\n\n**示例 5.3.7（缺陷率）** $n = 200$ 个部件中有 18 个缺陷品。\n\
    \n```python\nk,n = 18,200\np_hat = k/n\nz = st.norm.ppf(0.975)\nwald = p_hat +\
    \ np.array([-1,1])*z*np.sqrt(p_hat*(1-p_hat)/n)\nwilson_low = (2*k+z**2 - z*np.sqrt(z**2\
    \ + 4*k*(1-p_hat)))/(2*(n+z**2))\nwilson_hi = (2*k+z**2 + z*np.sqrt(z**2 + 4*k*(1-p_hat)))/(2*(n+z**2))\n\
    print(wald, (wilson_low,wilson_hi))\n```\n\n## 正态总体的方差\n\n$$\\frac{(n-1)s^2}{\\\
    chi^2_{1-\\alpha/2,n-1}} < \\sigma^2 < \\frac{(n-1)s^2}{\\chi^2_{\\alpha/2,n-1}}.$$\n\
    \n**示例 5.3.8（温度计精度）** 十次 $0^\\circ\\text{C}$ 冰浴读数给出 $s = 0.12^\\circ\\text{C}$。$\\\
    sigma$ 的 95% CI 为\n\n$(0.09, 0.20)^\\circ\\text{C}$。\n\n**相关系数（Fisher $z$）** 对于样本\
    \ $\\hat{\\rho}$，进行变换 $z = \\frac{1}{2}\\ln\\frac{1+\\hat{\\rho}}{1-\\hat{\\rho}}$；标准误\
    \ $= 1/\\sqrt{n-3}$。\n\n**示例 5.3.9（身高与体重）**\n\n```python\nheight = np.random.normal(170,\
    \ 8, 50)\nweight = 0.4*(height-170)+np.random.normal(0,4,50)\nrho = np.corrcoef(height,\
    \ weight)[0,1]\nz = np.arctanh(rho)\nz_ci = z + np.array([-1,1])*1.96/np.sqrt(47)\n\
    rho_ci = np.tanh(z_ci)\n```\n\n## 在科学研究中的应用\n\n**物理学：半衰期估计** 放射性衰变（每分钟计数）服从泊松($\\\
    lambda$)分布。若在 $\\Delta t = 30$ 分钟内观测到 $k = 642$ 次衰变，速率 $\\hat{\\lambda} = 21.4$。通过卡方分布获得精确\
    \ 95% CI：\n\n$$\\lambda \\in \\left[\\frac{1}{2}\\chi^2_{0.025;2k}, \\frac{1}{2}\\\
    chi^2_{0.975;2k+2}\\right]/\\Delta t.$$\n\n**生物学：基因表达倍数变化** 来自 n = 15 次重复的 Log₂\
    \ 比率假设服从正态分布；μ_log₂ FC 的 CI 转换为乘性尺度 2^(μ ± z_{1-α/2}/√n)。\n\n**临床试验** 通过对数方法计算风险比\
    \ CI：ln RR ± z_{1-α/2} √(1/a - 1/(a+b) + 1/c - 1/(c+d))，其中 (a, b; c, d) 为 2×2\
    \ 列联表计数。\n\n## 示例 5.3.10（疫苗效力）\n\n```python\nfrom statsmodels.stats.proportion\
    \ import proportion_confint\ncases_vac, n_vac = 6, 8000\ncases_ctr, n_ctr = 60,\
    \ 8000\nrr = cases_vac/n_vac / (cases_ctr/n_ctr)\nse = np.sqrt(1/cases_vac - 1/n_vac\
    \ + 1/cases_ctr - 1/n_ctr)\nci = np.exp(np.log(rr) + np.array([-1,1])*1.96*se)\n\
    print(rr, ci) # 效力 = 1-rr\n```\n\n## 用于置信区间的 Bootstrap 方法\n\n当解析形式难以处理时，bootstrap\
    \ 通过有放回重采样来近似抽样分布。\n\n## 算法（基本百分位数法）\n\n1.  抽取 B 个大小为 n 的 bootstrap 样本 x*^b。\n\
    2.  计算统计量 θ*_b = T(x*^b)。\n3.  CI [θ*_{(α/2)}, θ*_{(1-α/2)}]，其中下标表示百分位数。\n\n##\
    \ 示例 5.3.11（偏斜数据的中位数 CI）\n\n```python\nrng = np.random.default_rng(0)\nx = rng.lognormal(mean=0,\
    \ sigma=1, size=50)\nB=5000; stats = []\nfor _ in range(B):\n    sample = rng.choice(x,\
    \ size=len(x), replace=True)\n    stats.append(np.median(sample))\nlo, hi = np.percentile(stats,\
    \ [2.5, 97.5])\nprint(np.median(x), (lo, hi))\n```\n\n**BCa 区间（偏差校正，加速）** 调整偏差和偏度；scipy.stats.bootstrap(...,\
    \ method='BCa') 可自动完成。\n\n## 示例 5.3.12（截尾均值之差）\n\n```python\nfrom scipy.stats\
    \ import bootstrap, trim_mean\nctrl = rng.normal(0,1,size=40)\ntrt = rng.normal(0.4,1,size=38)\n\
    def stat(data, axis):\n    c,t = data\n    return trim_mean(t,0.1) - trim_mean(c,0.1)\n\
    res = bootstrap((ctrl, trt), stat, method='BCa', confidence_level=0.95)\nprint(res.confidence_interval)\n\
    ```\n\n**回归系数的 Bootstrap** 重采样 $(X_i, Y_i)$ 对，重新拟合线性模型，收集 $\\hat{\\beta}^*$ 以形成\
    \ CI——对异方差性稳健。\n\n**参数 Bootstrap** 当残差重采样不适用时，从拟合的参数模型（例如泊松 GLM）生成样本。\n\n## 5.3.3\
    \ 回归分析\n\n回归将一个或多个解释变量与响应变量联系起来，量化趋势，检验科学假设，并预测未来结果。在 Python 中，numpy 提供高效的线性代数运算，scipy.stats\
    \ 和 statsmodels 提供经典推断，scikit-learn 统一了机器学习风格的回归。我们通过计算密集型的现实示例来说明每种方法。\n\n##\
    \ 简单线性回归\n\n假设数据对 $(x_i, y_i)$ 满足\n\n$$y_i = \\beta_0 + \\beta_1 x_i + \\varepsilon_i,\
    \ \\quad \\varepsilon_i \\overset{\\text{i.i.d.}}{\\sim} \\mathcal{N}(0, \\sigma^2).$$\n\
    \n最小二乘估计量 $\\hat{\\beta} = (X^\\top X)^{-1} X^\\top \\mathbf{y}$ 使 $\\sum_i (y_i\
    \ - \\hat{y}_i)^2$ 最小化。\n\n**示例 5.3.13（物理学——胡克定律）** 八根弹簧在力 $F$ (N) 下被拉伸，并测量伸长量\
    \ $y$ (mm)。\n\n```python\nimport numpy as np, statsmodels.api as sm\nF = np.array([1,2,3,4,5,6,7,8])\n\
    y = np.array([0.9,2.1,3.0,4.1,4.9,6.2,6.8,8.1])\nX = sm.add_constant(F) # 添加截距列\n\
    model = sm.OLS(y, X).fit()\nprint(model.summary())\n```\n\n输出 $\\hat{\\beta}_0\
    \ = 0.05 \\pm 0.12$, $\\hat{\\beta}_1 = 1.01 \\pm 0.02$, $R^2 = 0.998$。残差标准误 $\\\
    hat{\\sigma} = 0.13$ mm。诊断：\n\n```python\nimport matplotlib.pyplot as plt\nplt.scatter(F,\
    \ y); plt.plot(F, model.fittedvalues, \"r\");\nplt.xlabel(\"力 (N)\"); plt.ylabel(\"\
    伸长量 (mm)\")\nplt.show()\nsm.qqplot(model.resid, line='45'); plt.show()\n```\n\n\
    Q-Q 图与 $45^\\circ$ 线对齐，验证了残差正态性的假设。\n\n对 $F = 9$ N 的预测使用\n\n$$\\hat{y}_9 = \\\
