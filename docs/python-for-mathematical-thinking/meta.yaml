  md: '# Higher-Order ODEs and Systems


    Second-order ODEs model systems with acceleration, curvature, or memory. General
    form:


    $a(x)y'''' + b(x)y'' + c(x)y = g(x)$.


    # Example 3.4.3 (Homogeneous Equation with Constant Coefficients) Solve


    $y'''' - 3y'' + 2y = 0, \quad y(0) = 1, \quad y''(0) = 0$.


    ```

    y = sp.Function("y")(x)

    ode = sp.Eq(y.diff(x,2) - 3*y.diff(x) + 2*y, 0)

    sol = sp.dsolve(ode, y, ics={y.subs(x, 0): 1, y.diff(x).subs(x, 0): 0})

    sp.pprint(sol)

    ```


    The solution is:


    $y(x) = e^x + e^{2x}(-1)$.


    # Example 3.4.4 (Forced Harmonic Oscillator)


    $y'''' + 4y = \cos(2x), \quad y(0) = 0, \quad y''(0) = 0$.


    This has resonance, and the particular solution grows linearly:


    $y(x) = \frac{x}{4} \sin(2x)$.


    ```

    ode = sp.Eq(y.diff(x,2) + 4*y, sp.cos(2*x))

    sol = sp.dsolve(ode, y, ics={y.subs(x, 0): 0, y.diff(x).subs(x, 0): 0})

    sp.pprint(sol)

    ```


    # Systems of ODEs Let


    $\frac{dx}{dt} = x + 2y, \quad \frac{dy}{dt} = 3x + 4y$.


    ```

    t = sp.Symbol("t")

    x = sp.Function("x")(t)

    y = sp.Function("y")(t)


    eq1 = sp.Eq(x.diff(t), x + 2*y)

    eq2 = sp.Eq(y.diff(t), 3*x + 4*y)

    sol = sp.dsolve([eq1, eq2])

    sp.pprint(sol)

    ```


    This solves the coupled system using matrix exponentials internally.'
