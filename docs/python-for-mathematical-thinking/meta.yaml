    ```\n\n#### 用例\n\n- 对于小型或近乎有序的数据效率高。\n- 用于混合算法，如 Timsort（Python 内置排序所使用的算法）。\n\
    \n### 4.3.2 分治技术\n\n**分治**是算法设计中一个强大的范式。其主要思想是将问题分解为更小的子问题，递归地解决它们，然后合并解决方案。这种方法通常导致对数级的递归深度和改进的渐近性能。在排序中，**归并排序**和**快速排序**是经典应用。\n\
    \n#### 归并排序\n\n**归并排序**递归地将输入数组分成两半，对每一半进行排序，然后合并已排序的两半。\n\n#### 算法步骤\n\n1. 分解：将数组\
    \ $A[0 \\dots n-1]$ 分成两半。\n2. 解决：递归地对每一半进行排序。\n3. 合并：将两个已排序的半部分合并成一个有序数组。\n\n\
    #### 时间复杂度\n\n$T(n) = 2T(n/2) + O(n) \\Rightarrow T(n) = O(n \\log n)$\n\n####\
    \ 空间复杂度\n\n$O(n)$（由于合并所需的临时数组）\n\n#### 稳定性\n\n是。原地排序：否。\n\n```python\ndef merge_sort(A):\n\
    \    if len(A) <= 1:\n        return A\n    mid = len(A) // 2\n    left = merge_sort(A[:mid])\n\
    \    right = merge_sort(A[mid:])\n    return merge(left, right)\n\ndef merge(L,\
    \ R):\n    result = []\n    i = j = 0\n    while i < len(L) and j < len(R):\n\
    \        if L[i] <= R[j]:\n            result.append(L[i])\n            i += 1\n\
    \        else:\n            result.append(R[j])\n            j += 1\n    result\
    \ += L[i:] + R[j:]\n    return result\n```\n\n#### 示例 4.3.6（使用归并排序对列表排序）\n\n```python\n\
    A = [38, 27, 43, 3, 9, 82, 10]\nsorted_A = merge_sort(A)\nprint(sorted_A) # [3,\
    \ 9, 10, 27, 38, 43, 82]\n```\n\n#### 示例 4.3.7（使用自定义比较器的归并排序）\n\n按第二个元素对元组列表排序："
