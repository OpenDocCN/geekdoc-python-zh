    quad D_cf(x; h) := \\frac{f(x+h) - f(x-h)}{2h}.$$\n\nTaylor expansions yield:\n\
    \n$$D_+f(x; h) = f'(x) + \\frac{h}{2}f''(x) + \\mathcal{O}(h^2),$$\n$$D_cf(x;\
    \ h) = f'(x) + \\frac{h^2}{6}f^{(3)}(x) + \\mathcal{O}(h^4),$$\n\nimplying that\
    \ the central difference is more accurate than either forward or backward difference\
    \ for small $h$.\n\n**Example 3.1.1 (Derivative of $f(x) = \\log(x)$)** Estimate\
    \ $f'(1)$ using central differences.\n\n```python\nimport numpy as np\n\ndef central_diff(f,\
