  md: '# 6.4 Stochastic Differential Equations (SDEs)


    A **stochastic differential equation** supplements an ordinary differential equation
    with a noise term—traditionally Brownian motion—capturing randomness intrinsic
    to thermal agitation, financial markets, or environmental fluctuations. Formally,
    an Itô SDE in $\mathbb{R}$ reads


    $$dX_t = \mu(t, X_t)\,dt + \sigma(t, X_t)\,dW_t, \quad X_0 = x_0,$$


    where $W_t$ is standard Brownian motion, $\mu$ the *drift*, and $\sigma$ the *diffusion
    coefficient*. Unlike deterministic ODEs, SDE solutions are *stochastic processes*—random
    functions of time—requiring a calculus that respects Brownian path roughness.


    # 6.4.1 Introduction to SDEs


    Classical Newtonian dynamics $dx/dt = v$ presumes differentiable trajectories;
    Brownian trajectories are almost surely nowhere differentiable. Einstein''s 1905
    model for pollen particles suggested the *mean square displacement* grows linearly:
    $\mathbb{E}[(X_t - X_0)^2] = 2Dt$. Langevin refined this via


    $$m\,dV_t = -\gamma V_t\,dt + \sqrt{2\gamma k_B T}\,dW_t,$$


    where the stochastic term models impulsive molecular kicks. Interpreting $dW_t$
    as the limit of symmetric, variance-$dt$ Gaussian increments motivate the modern
    Itô integral.


    # Brownian Motion and Stochastic Processes


    **Standard Brownian motion** $\{W_t\}_{t \ge 0}$ satisfies


    +   1. $W_0 = 0$ almost surely.

    2. Independent increments: $W_{t+s} - W_t$ is independent of $\mathcal{F}_t$.

    3. Gaussian increments: $W_{t+s} - W_t \sim \mathcal{N}(0, s)$.

    4. Continuous paths.


    Moments: $\mathbb{E}[W_t] = 0$, $\text{Var}(W_t) = t$, $\text{Cov}(W_s, W_t) =
    \min(s, t)$.


    **Quadratic Variation** Partition $[0, t]$ into $0 = t_0 < \cdots < t_n = t$;
    Brownian quadratic variation converges in probability:


    $$\sum_{k=0}^{n-1} (W_{t_{k+1}} - W_{t_k})^2 \xrightarrow{\mathbb{P}} t.$$


    This property underlies Itô''s formula.'
