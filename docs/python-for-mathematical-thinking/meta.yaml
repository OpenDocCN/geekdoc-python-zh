  md: '# 11.2.4 Time-Frequency Representations


    Time-frequency representations (TFRs) seek a joint description $T_x(t, \omega)$
    that obeys $\int_{-\infty}^{\infty} T_x(t, \omega) d\omega = |x(t)|^2$, $\int_{-\infty}^{\infty}
    T_x(t, \omega) dt = |X(\omega)|^2$, thus redistributing the signal''s energy without
    loss. The Wigner–Ville distribution attains perfect marginals but suffers interference
    terms; the present section surveys adaptive representations that alleviate such
    artefacts and sharpen localisation.


    # Continuous Wavelet Transform (CWT) Revisited


    Recalling $\mathcal{W}_{\psi}x(a, b) = \langle x, \psi_{a,b} \rangle$, $\psi_{a,b}(t)
    = |a|^{-1/2}\psi((t-b)/a)$, with admissible $\psi$ (zero mean), the scalogram
    $P(a, b) = |\mathcal{W}_{\psi}x(a, b)|^2$ visualises energy across scales $a$
    and translations $b$.


    # Analytic Morlet Wavelet


    $\psi(t) = \pi^{-1/4} e^{j\omega_0 t} e^{-t^2/2}$, $\widehat{\psi}(\omega) = \pi^{-1/4}
    e^{-(\omega-\omega_0)^2/2}$,


    with $\omega_0 = 6$ ensures admissibility ($C_{\psi} \approx 1$). Frequency mapping
    $f = \omega/(2\pi a)$ yields nearly constant-Q resolution $\Delta f/f \approx
    \text{const}$.


    # Cone of Influence (COI)


    For finite support length $T$, edge effects distort coefficients when the effective
    support of $\psi_{a,b}$ intersects the boundary. The COI boundary $b \pm d \cdot
    k$ (typically $k = 2$) delineates trustworthy region.


    # Ridge Extraction


    Instantaneous frequency approximated by ridge curve $\hat{f}(b) = \arg\max_a |\mathcal{W}_{\psi}x(a,
    b)| /a$. Differentiating the phase $\theta(a, b) = \arg \mathcal{W}_{\psi}x$ gives
    finer estimator $\omega_{\text{inst}}(b) = \partial_b \theta(a^*(b), b)$.


    ```

    import pywt, numpy as np

    scales = np.geomspace(1, 64, 128)

    coef, freqs = pywt.cwt(sig, scales, ''cmor6-1'')

    ridge_idx = np.argmax(np.abs(coef), axis=0)

    inst_freq = freqs[ridge_idx]

    ```'
