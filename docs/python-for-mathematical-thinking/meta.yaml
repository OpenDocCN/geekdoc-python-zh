    \ follow the IEEE-754 representation\n\n$x = (-1)^s (1.m_1 m_2 \\dots m_{p-1})_2\
    \ 2^{e-e_0}$\n\nwhere the unit round-off $\\varepsilon = 2^{-(p-1)}$ bounds relative\
