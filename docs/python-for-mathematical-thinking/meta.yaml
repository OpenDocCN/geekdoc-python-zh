    # Independence and Dependence of Events


    **Definition** Events $A$, $B$ are **independent** if

    $$\mathbb{P}(A \cap B) = \mathbb{P}(A)\mathbb{P}(B),$$

    equivalently $\mathbb{P}(A \mid B) = \mathbb{P}(A)$ when $\mathbb{P}(B) > 0$.


    **Mutual vs. Pairwise Independence** Three events $A$, $B$, $C$ are *mutually
    independent* if every subcollection has product measure equality, i.e.

    $$\mathbb{P}(A \cap B \cap C) = \mathbb{P}(A)\mathbb{P}(B)\mathbb{P}(C)$$

    and pairwise conditions hold. Pairwise independence does *not* imply mutual independence.


    **Example 5.1.4 (Pairwise Independent But Not Mutually)** Toss two fair coins.
    Let

    $$A = \{\text{first coin H}\}, \quad B = \{\text{second coin H}\}, \quad C = \{\text{coins
    have same face}\}.$$

    Check $\mathbb{P}(A) = \mathbb{P}(B) = \mathbb{P}(C) = \frac{1}{2}$. Each pair
    multiplies correctly, yet $\mathbb{P}(A \cap B \cap C) = \frac{1}{4} \neq \frac{1}{8}$
    so not mutually independent.


    ```

    python

    Ω = list(itertools.product("HT", repeat=2))

    A = [ω for ω in Ω if ω[0]==''H'']

    B = [ω for ω in Ω if ω[1]==''H'']

    C = [ω for ω in Ω if ω[0]==ω[1]]

    print(len(set(A)&set(B)&set(C))/4) # 0.25

    ```


    **Example (Independence of Complements)** If $A$ and $B$ are independent, so are
    $A^c$ and $B$, $A$ and $B^c$, and $A^c$ and $B^c$. Proof follows by substituting
    $\mathbb{P}(A^c) = 1 - \mathbb{P}(A)$ and algebra.


    **Example (Dice Sums)** Roll two fair dice. Let $E = \{\text{sum is 7}\}$ and
    $F = \{\text{first die even}\}$. Compute:

    $$\mathbb{P}(E) = \frac{6}{36}, \quad \mathbb{P}(F) = \frac{18}{36}, \quad \mathbb{P}(E
    \cap F) = \frac{3}{36},$$

    so independence holds ($\frac{6}{36} \cdot \frac{18}{36} = \frac{108}{1296} =
    \frac{3}{36}$).


