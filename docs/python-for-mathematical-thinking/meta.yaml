    # Handling Imbalanced Datasets: SMOTE and ADASYN


    Class imbalance distorts empirical risk and bias towards majority class. Let $p_+
    = n_+/n \ll 1$. Strategies: resampling, cost-sensitive loss, synthetic sample
    generation.


    # SMOTE (Synthetic Minority Over-sampling Technique)


    For minority sample $\mathbf{x}_i$, select $k$ nearest minority neighbours; generate


    $$\tilde{\mathbf{x}} = \mathbf{x}_i + \lambda(\mathbf{x}_{\text{nn}} - \mathbf{x}_i),
    \quad \lambda \sim \mathcal{U}(0, 1).$$


    Creates convex combinations, reduces overfitting vs. simple duplication.


    # ADASYN


    Adaptive density: compute local ratio $r_i = \frac{\text{\#majority in } k\text{-nn}(\mathbf{x}_i)}{k}$,
    normalise $p_i = r_i / \sum r_j$, and synthesise $g_i = \lceil p_i G \rceil$ samples
    (total $G$). Focuses on hard-to-learn regions near class boundary.


    ```

    from imblearn.over_sampling import SMOTE, ADASYN

    X_sm, y_sm = SMOTE(k_neighbors=5, random_state=0).fit_resample(X, y)

    X_ad, y_ad = ADASYN(random_state=0).fit_resample(X, y)

    ```


    # Evaluation with PR-AUC and MCC


    Precision-recall AUC better reflects minority performance than ROC when $p_+ \ll
    1$. Matthews correlation coefficient $\text{MCC} = \frac{TP \cdot TN - FP \cdot
    FN}{\sqrt{(TP+FP)(TP+FN)(TN+FP)(TN+FN)}}$ is a balanced measure for binary classifications.


    # Model Selection with AIC, BIC, and Information Criteria


    Assume parametric likelihood $L(\theta; \mathcal{D})$ with MLE $\hat{\theta}$.
    Information criteria penalise model complexity $k = \dim \theta$.


    $$\text{AIC} = 2k - 2 \ln L(\hat{\theta}), \quad \text{BIC} = k \ln n - 2 \ln
    L(\hat{\theta}).$$'
