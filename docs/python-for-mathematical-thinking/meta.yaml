    \nDisparate impact ratio $\\frac{\\Pr(\\hat{Y}=1|S=1)}{\\Pr(\\hat{Y}=1|S=0)}$\
    \ plotted with 95% Wilson intervals identifies uncertainty.\n\n## 10.5.2 Privacy–Preserving\
