    \ = \\exp z_k / \\sum_j \\exp z_j$，\n\n$$L_{\\text{CE}} = -\\sum_{k=1}^K y_k \\\
    ln \\hat{p}_k, \\quad \\partial_{z_k} L = \\hat{p}_k - y_k.$$\n\n源于经验标签分布与模型之间的KL散度。\n\
    \n自定义损失\n\n$$L_{\\text{Huber}} = \\begin{cases} \\frac{1}{2}r^2, & |r| \\le \\\
    delta, \\\\ \\delta(|r| - \\frac{1}{2}\\delta), & |r| > \\delta, \\end{cases}\
    \ \\quad r = y - \\hat{y}.$$\n\n结合了MSE在原点附近的敏感性和 $L^1$ 对异常值的鲁棒性。\n在不平衡分类中，焦点损失\
    \ $L_{\\text{focal}} = -(1 - \\hat{p}_t)^\\gamma \\ln \\hat{p}_t$，$\\hat{p}_t\
    \ = \\begin{cases} \\hat{p} & y = 1, \\\\ 1 - \\hat{p} & y = 0, \\end{cases}$\
    \ 降低简单样本的权重，调节 $\\gamma \\in [1, 3]$。\n\n```python\ndef focal_loss(pred, target,\
    \ gamma=2.0, eps=1e-7):\n    pt = np.where(target==1, pred, 1-pred)\n    return\
    \ -np.mean((1-pt)**gamma * np.log(pt+eps))\n```\n\n## 10.3.2 从零开始实现神经网络\n\n通过仅使用numpy构建网络，可以巩固对深度学习的教育性掌握。本节开发一个最小但功能完整的多层感知机（MLP），代数推导每个梯度，并用训练、评估和超参数搜索工具封装实现。阐述强调清晰的张量维度、广播安全性和数值稳定性——这些技能可迁移到高性能框架。\n\
    \n## Python中的前向与反向传播\n\n网络骨架\n\n对于输入维度 $d$，隐藏层宽度 $(h_1, \\dots, h_{L-1})$，和输出维度\
    \ $K$，定义\n\n$$Z^{(1)} = W_1 X + b_1, \\quad A^{(1)} = \\phi(Z^{(1)}),$$\n$$\\\
    vdots$$\n$$Z^{(L)} = W_L A^{(L-1)} + b_L, \\quad \\hat{Y} = g(Z^{(L)}),$$\n\n\
    其中 $\\phi = \\text{ReLU}$，$g$ 是依赖于层的输出非线性函数（softmax或恒等函数），$X \\in \\mathbb{R}^{d\
