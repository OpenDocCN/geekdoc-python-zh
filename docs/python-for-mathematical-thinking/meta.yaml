    # Applications in Signal Processing and Image Compression


    Time-frequency localisation begins with the short-time Fourier transform (STFT):


    $$\text{STFT}_f(t, \xi) = \int_{-\infty}^{\infty} f(\tau) g(\tau - t) e^{-2\pi
    i \xi \tau} d\tau,$$


    where $g$ is a window (Gaussian optimises time–bandwidth inequality). Spectrogram
    $|\text{STFT}|^2$ visualises chirps and modulations.


    JPEG compression applies $8 \times 8$ discrete cosine transform (DCT-II). Quantisation
    leverages psycho-visual masking: high-frequency coefficients are divided by larger
    integers, producing sparsity exploitable by run-length and Huffman coding.


    ```

    import cv2, numpy as np

    block = img[0:8,0:8] - 128 # level-shift

    coeff = cv2.dct(block.astype(float))

    mask = np.array([[16,11,10,16,24,40,51,61], ...]) # std. quant table

    qcoeff = np.rint(coeff / mask)

    ```


    # Fourier Analysis in Heat and Wave Equations


    For $u_t = \kappa u_{xx}$ on $\mathbb{R}$ with $u(x, 0) = f(x)$, take CFT:


    $$\partial_t \widehat{u} = -4\pi^2 \kappa \xi^2 \widehat{u}, \implies \widehat{u}(\xi,
    t) = e^{-4\pi^2 \kappa \xi^2 t} \widehat{f}(\xi).$$


    Inverse transform yields the Gaussian kernel


    $$u(x, t) = (G_{\kappa t} * f)(x), \quad G_{\sigma^2}(x) = \frac{1}{\sqrt{4\pi
    \sigma^2}} e^{-x^2/4\sigma^2},$$


    demonstrating instantaneous smoothing.


    For the 1-D wave equation $u_{tt} = c^2 u_{xx}$, $\partial_t^2 \widehat{u} = -(2\pi
    c \xi)^2 \widehat{u}$, giving $\widehat{u}(\xi, t) = \widehat{f}(\xi) \cos(2\pi
    c \xi t) + \frac{\widehat{g}(\xi)}{2\pi c \xi} \sin(2\pi c \xi t)$, and d''Alembert
    formula $u(x, t) = \frac{1}{2}[f(x - ct) + f(x + ct)] + \frac{1}{2c} \int_{x-ct}^{x+ct}
    g(s) ds$. Dispersionless propagation contrasts with parabolic diffusion.'
