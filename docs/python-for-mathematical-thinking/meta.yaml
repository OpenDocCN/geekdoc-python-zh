    \ Regulatory regimes (GDPR, HIPAA) impose strict constraints on data sharing,\
    \ motivating cryptographic and statistical frameworks that guarantee privacy *by\
    \ construction*. Two complementary paradigms dominate the research landscape:\
    \ *federated learning with differential privacy*, which leaves data in situ and\
    \ sanitises gradients, and *secure multi-party computation*, which performs joint\
    \ inference without revealing raw inputs.\n\n## Federated Learning and Differential\
    \ Privacy\n\n### Federated Optimisation\n\nSuppose $M$ clients each hold private\
    \ dataset $\\mathcal{D}_m$. Minimise global objective\n\n$$F(\\boldsymbol{\\theta})\
    \ = \\frac{1}{M} \\sum_{m=1}^{M} F_m(\\boldsymbol{\\theta}), \\quad F_m(\\boldsymbol{\\\
    theta}) = \\frac{1}{|\\mathcal{D}_m|} \\sum_{(x,y) \\in \\mathcal{D}_m} \\ell(\\\
    boldsymbol{\\theta}; x, y).$$\n\n**FedAvg** (Mahan et al. 2017) executes $E$ local\
    \ SGD steps at each client and then transmits parameter updates $\\Delta_m$ to\
    \ a server that averages $\\boldsymbol{\\theta}^{(t+1)} = \\boldsymbol{\\theta}^{(t)}\
    \ + \\frac{1}{M} \\sum_m \\Delta_m$. Communication cost $O(d)$ per round, mitigated\
    \ by sparsification or sketching.\n\n### Differential Privacy (DP)\n\nA mechanism\
    \ $\\mathcal{M}$ is $(\\varepsilon, \\delta)$-DP if for any neighbouring datasets\
    \ $\\mathcal{D}, \\mathcal{D}'$ differing in one record and any event $\\mathcal{S}$:\n\
    \n$$\\Pr[\\mathcal{M}(\\mathcal{D}) \\in \\mathcal{S}] \\leq e^{\\varepsilon}\
    \ \\Pr[\\mathcal{M}(\\mathcal{D}') \\in \\mathcal{S}] + \\delta.$$\n\n**DP-SGD**\
    \ (Abadi et al. 2016) for each mini-batch:\n\n- (i) Clip per-sample gradients:\
    \ $\\tilde{g}_i = g_i / \\max\\{1, \\|g_i\\|_2 / C\\}$.\n- (ii) Aggregate and\
    \ add Gaussian noise: $\\tilde{g} = \\frac{1}{B} \\left( \\sum_{i=1}^{B} \\tilde{g}_i\
    \ + \\mathcal{N}(0, \\sigma^2 C^2 I) \\right)$.\n- (iii) Update $\\boldsymbol{\\\
    theta} \\leftarrow \\boldsymbol{\\theta} - \\eta \\tilde{g}$.\n\nMoments accountant\
    \ bounds cumulative privacy loss: $\\varepsilon \\approx \\frac{q \\sqrt{2T \\\
    ln(1/\\delta)}}{\\sigma}$, $q = B/n$. In federated setting, each client clips\
    \ its local update and adds noise before transmission, ensuring *local DP*.\n\n\
    ```python\ndef dp_aggregate(updates, C=1.0, σ=0.5):\n    clipped = [u * min(1,\
    \ C/np.linalg.norm(u)) for u in updates]\n    mean = np.mean(clipped, axis=0)\n\
    \    noise = np.random.normal(scale=σ*C, size=mean.shape)\n    return mean + noise\
    \ / len(updates)\n```\n\n### Privacy-Utility Trade-Off\n\nNoise variance $\\sigma^2$\
    \ scales with clip norm $C$ and target $\\varepsilon$; smaller batches or adaptive\
    \ clipping (AdaClip) mitigates accuracy degradation.\n\n## Secure Multi-party\
    \ Computation\n\nLet $P_1, \\ldots, P_M$ possess private inputs $x_1, \\ldots,\
    \ x_M$. A secure protocol computes $f(x_1, \\ldots, x_M)$ such that no party learns\
    \ more than the output.\n\n### Additive Secret Sharing\n\nOver ring $\\mathbb{Z}_p$,\
    \ split value $v$ into random shares $v_1, \\ldots, v_M$ with $\\sum v_m \\equiv\
    \ v \\pmod{p}$. Addition and scalar multiplication are share-wise; multiplication\
    \ requires Beaver triples $(a, b, c)$ with $c = ab$. Protocol (SPDZ) evaluates\
    \ arithmetic circuits with $O(1)$ rounds per gate and pre-processed correlated\
    \ randomness.\n\n### Homomorphic Encryption (HE)\n\nGiven public key pk, ciphertexts\
