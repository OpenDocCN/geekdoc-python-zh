    # 11.1.2 Automated Theorem Proving


    Automated theorem proving (ATP) aspires to mechanise the deductive steps that
    underlie mathematical reasoning, transforming the informal "proof-sketch" of the
    human mathematician into a sequence of sound inferences that a computer can verify
    independently. Since the seminal work of Davis, Putnam, Logemann, and Loveland
    on the DPLL procedure and Robinson''s resolution calculus, ATP has grown into
    a vibrant discipline that interlaces proof theory, model theory, complexity theory,
    and symbolic computation. Today, SMT-solvers such as Z3 decide quantifier-free
    fragments of first-order logic with millions of clauses in seconds, while interactive
    proof assistants—e.g. Coq, Lean, Isabelle—blend automation with user guidance
    to formalise entire textbooks. This subsection traces the logical foundations,
    exhibits SymPy''s nascent proof engine, and illustrates applications to formal
    verification and cryptography where mechanical rigour is indispensable.


    # Introduction to Theorem Proving


    Let $\mathcal{L}$ be a first-order language with signature $\Sigma = (\mathcal{F},
    \mathcal{P})$ of function and predicate symbols. A *sequent* $\Gamma \vdash \Delta$
    encodes entailment "from premises $\Gamma$ derive conclusions $\Delta$". Gentzen''s
    natural deduction system equips $\mathcal{L}$ with introduction and elimination
    rules for $\wedge, \vee, \forall, \exists, \neg, \Rightarrow$ such that every
    valid formula $\varphi$ has a derivation $\vdash \varphi$.


    # Soundness and Completeness


    If $\Gamma \vdash \varphi$, then $\Gamma \models \varphi$ (soundness); conversely,
    if $\Gamma \models \varphi$, then $\Gamma \vdash \varphi$ (Gödel completeness).
    Proof search, however, is PSPACE-complete for propositional logic and undecidable
    for full first-order logic due to the Löwenheim–Skolem theorem. Practical provers
    therefore restrict to decidable fragments (EUF, linear arithmetic) or employ heuristics
    (term ordering, lemma learning).


    # Using SymPy for Automated Proofs


    SymPy implements a lightweight propositional engine based on the Davis–Putnam
    algorithm and a first-order unification module. Consider the tautology


    $(p \Rightarrow q) \wedge (q \Rightarrow r) \Longrightarrow (p \Rightarrow r)$.


    ```

    from sympy import symbols, Implies, satisfiable

    p,q,r = symbols(''p q r'')

    phi = Implies( Implies(p,q) & Implies(q,r)), Implies(p,r) )

    assert not satisfiable(~phi) # unsatisfiable ⟹ ϕ is valid

    ```'
- md: 'Resolution proof objects can be constructed by invoking


    ```

    from sympy.logic.algorithms import resolution

    steps = resolution(~phi) # returns derivation of contradiction

    ```


    The resulting clause sequence witnesses that $\phi$ is entailed by the empty set.


    ## First-Order Unification


    Given terms $t_1 = f(g(x), y)$ and $t_2 = f(z, g(z))$, SymPy computes the most
    general unifier (mgu) $\sigma = \{x \mapsto z, y \mapsto g(z)\}$.


    ```

    from sympy.unify import unify

    x,y,z = symbols(''x y z'')

    t1 = f(g(x), y)

    t2 = f(z, g(z))

    sigma = unify(t1, t2) # {x: z, y: g(z)}

    ```


    Although SymPy is not yet a full-fledged theorem prover, its symbolic backbone
    allows integration with external SMT engines through the `sympy.logic.inference`
    interface, providing a convenient bridge between high-level mathematics and low-level
    decision procedures.


    ## First-Order Logic and Quantifiers in Theorem Proving


    ### Skolemisation


    To refute $\Gamma \models \varphi$ one applies *reductio ad absurdum*: convert
    $\Gamma \wedge \neg\varphi$ to prenex conjunctive normal form (PCNF) and demonstrate
    unsatisfiability via resolution. Existential quantifiers are eliminated by Skolem
    functions:


    $\forall x \exists y \forall z P(x, y, z) \longmapsto \forall x \forall z P(x,
    f(x), z)$.


    Skolemisation preserves satisfiability but not equivalence; however, it is sound
    for refutation.


    ### Herbrand''s Theorem


    If a first-order set $\Phi$ is unsatisfiable, there exists a finite unsatisfiable
    subset of its Herbrand expansion—the set of ground instances over the term algebra.
    Modern provers enumerate Herbrand universes lazily, interleaving ground resolution
    with instantiation rules.


    ## Example: Proofs over Natural Numbers


    Peano arithmetic formulas like $\forall x\ (x + 0 = x)$ are handled by encoding
    the successor function $s$ and axioms into the solver. Encoding associative–commutative
    (AC) theories requires special matching; SymPy’s pattern engine supports AC unification
    for commutative groups, enabling automated verification of ring identities.


    ## Applications in Formal Verification and Cryptography


    ### Hardware Verification


    A combinational circuit with $n$ gates is modelled as a CNF formula $\Phi_{\text{spec}}
    \land \Phi_{\text{impl}}$. Equivalence checking reduces to satisfiability of $\Phi_{\text{spec}}
    \land \Phi_{\text{impl}} \land (\text{out}_{\text{spec}} \oplus \text{out}_{\text{impl}})$.
    State-of-the-art SAT engines solve $>10^6$ clauses within minutes; counterexample
    traces map to signal assignments revealing design flaws.


    ### Software Verification via Hoare Logic


    A loop invariant $I$ is synthesised by solving second-order constraints


    $\exists I\ \forall \mathbf{v}\ (\text{Pre} \to I) \land (I \land \neg\text{Guard}
    \to \text{Post}) \land (I \land \text{Guard} \to I'')$.


    Template-based synthesis chooses polynomial form $I(\mathbf{v}; \boldsymbol{\alpha})$
    and reduces validity to SMT queries over the reals; toolchains like Z3 + sympy
    automate this pipeline.


    ### Zero-Knowledge Proof (ZKP) Circuits


    Arithmetisation maps cryptographic statements to polynomial equalities over finite
    fields $\mathbb{F}_p$. Constraint system $\{(a_i, b_i, c_i) : a_i b_i = c_i\}$
    is verified by PLONK protocols. Automated generation of the Rank-1 Constraint
    System from high-level code employs symbolic differentiation and common-subexpression
    elimination, both available in SymPy, ensuring soundness of the compiled circuit.


    **Example 11.1.2 (Symbolic R1CS of SHA-256 Round)** Using `sympy.crypto` (custom
    module) one represents Boolean AND as multiplication in $\mathbb{F}_2$. The constraint
    $z = (x \land y)$ translates to $x \cdot y - z = 0$. Iterating over 64 rounds
    yields 15 360 constraints; SymPy simplifies polynomials before handing them to
    the proof system, reducing prover time by 12%.


    ## 11.1.3 Fourier Transforms


    Fourier analysis decomposes a function into harmonic constituents, converting
    convolution into multiplication and differential operators into algebraic multipliers.
    This spectral duality underpins signal processing, PDE theory, and numerical algorithms.


    ### Discrete and Continuous Fourier Transforms


    For $f \in L^1(\mathbb{R}^d) \cap L^2(\mathbb{R}^d)$ the **continuous Fourier
    transform (CFT)** is


    $$\mathcal{F}\{f\}(\xi) = \widehat{f}(\xi) = \int_{\mathbb{R}^d} f(x) e^{-2\pi
    i x \cdot \xi} \, dx, \quad \mathcal{F}^{-1}\{\widehat{f}\}(x) = \int_{\mathbb{R}^d}
    \widehat{f}(\xi) e^{2\pi i x \cdot \xi} \, d\xi.$$


    Plancherel theorem extends $\mathcal{F}$ to a unitary operator on $L^2$: $\|\widehat{f}\|_2
    = \|f\|_2$, implying Parseval''s identity.


    Sampling on a uniform lattice $x_n = n\Delta x, n = 0, \dots, N-1$, yields the
    **Discrete Fourier Transform (DFT)**


    $$\widehat{F}_k = \sum_{n=0}^{N-1} f_n e^{-2\pi i k n / N}, \quad f_n = \frac{1}{N}
    \sum_{k=0}^{N-1} \widehat{F}_k e^{2\pi i k n / N}.$$


    Nyquist–Shannon guarantees perfect reconstruction when $\Delta x < \frac{1}{2}
    f_{\max}^{-1}$.


    **Example 11.1.3 (Aliasing)** Let $f(t) = \sin(30\pi t)$ sampled at $f_s = 20$
    Hz. Since $f$ exceeds the Nyquist frequency $f_N = 10$ Hz, the discrete spectrum
    mistakenly contains $\sin(10\pi t)$, demonstrating frequency folding.


    ### Fast Fourier Transform (FFT) and Computational Efficiency


    Direct DFT costs $O(N^2)$. Cooley–Tukey radix-2 FFT exploits the divide–conquer
    factorisation:


    $$\widehat{F}_k = \sum_{m=0}^{N/2-1} f_{2m} e^{-2\pi i k m / (N/2)} + e^{-2\pi
    i k / N} \sum_{m=0}^{N/2-1} f_{2m+1} e^{-2\pi i k m / (N/2)},$$


    yielding $T(N) = 2T(N/2) + O(N) \Rightarrow T(N) = O(N \log N)$. Cache-friendly
    bit-reversed addressing and loop unrolling approach the memory bandwidth limit.


    ```

    import numpy as np, time

    N = 2**20

    x = np.random.rand(N) + 1j*np.random.rand(N)

    t0 = time.perf_counter(); X = np.fft.fft(x); t1 = time.perf_counter()

    print(f"FFT throughput: {N/(t1-t0):.2e} pts/sec")

    ```


    Bluestein and Rader algorithms handle prime sizes; mixed-radix libraries (FFTW,
    pocketfft) achieve ≤5 % of peak flops on modern CPUs.


    ### Applications in Signal Processing and Image Compression


    Time-frequency localisation begins with the short-time Fourier transform (STFT):


    $$\text{STFT}_f(t, \xi) = \int_{-\infty}^{\infty} f(\tau) g(\tau - t) e^{-2\pi
    i \xi \tau} d\tau,$$


    where $g$ is a window (Gaussian optimises time–bandwidth inequality). Spectrogram
