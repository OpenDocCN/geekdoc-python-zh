    \n## **Shortest Path Algorithms: Dijkstra's Algorithm**\n\nDijkstra's algorithm\
    \ finds the shortest path from a source to all other nodes in a weighted graph\
    \ with non-negative edge weights.\n\n## Time Complexity\n\n- With priority queue\
    \ (heap): $O((V + E) \\log V)$\n- Without heap: $O(V^2)$\n\n## Algorithm Idea\n\
    \n- Initialise distance to all vertices as $\\infty$ and source to 0.\n- Use a\
    \ min-priority queue to select the vertex with smallest tentative distance.\n\
    - Relax its neighbours.\n\n```python\nimport heapq\n\ndef dijkstra(graph, start):\n\
    \    dist = {v: float('inf') for v in graph}\n    dist[start] = 0\n    pq = [(0,\
    \ start)]\n\n    while pq:\n        d, u = heapq.heappop(pq)\n        if d > dist[u]:\
    \ continue\n        for v, w in graph[u].items():\n            if dist[u] + w\
    \ < dist[v]:\n                dist[v] = dist[u] + w\n                heapq.heappush(pq,\
    \ (dist[v], v))\n    return dist\n```\n\n## Example 4.4.13 (Weighted Graph with\
