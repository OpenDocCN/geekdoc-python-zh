    {j\\}} \\frac{|S|! (p - |S| - 1)!}{p!} \\left[ f_{S \\cup \\{j\\}}(\\mathbf{x})\
    \ - f_S(\\mathbf{x}) \\right],$$\n\n其中 $f_S$ 表示条件期望 $f_S(\\mathbf{x}) = \\mathbb{E}[f(\\\
    mathbf{x}_S, \\mathbf{X}_{\\bar{S}}) \\mid \\mathbf{x}_S]$。该加权确保了效率性 $\\sum_j\
    \ \\phi_j = f(\\mathbf{x}) - f_{\\emptyset}$、对称性、虚拟性和可加性。\n\n精确计算复杂度为 $O(2^p)$；树模型允许使用\
    \ $O(npD)$ 的动态规划（其中 $D$ 为深度，$n$ 为树的数量）。Kernel SHAP通过在 $2p + 1$ 个扰动样本上使用Lasso回归来近似积分。\n\
    \n```python\nimport shap, xgboost, pandas as pd\nX, y = df.drop('label', axis=1),\
    \ df['label']\nmodel = xgboost.XGBClassifier().fit(X, y)\nexplainer = shap.TreeExplainer(model)\n\
    phi = explainer.shap_values(X.iloc[0])\nshap.waterfall_plot(shap.Explanation(values=phi,\n\
    \    base_values=explainer.expected_value,\n    data=X.iloc[0]))\n```\n\n**LIME\
    \ (Local Interpretable Model-agnostic Explanations)**\n\n对于实例 $\\mathbf{x}_0$，通过随机掩码或噪声构建扰动邻域\
