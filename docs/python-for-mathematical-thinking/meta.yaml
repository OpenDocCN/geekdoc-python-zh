    \ high = 0, len(A) - 1\n    while low <= high:\n        mid = (low + high) //\
    \ 2\n        if A[mid] == x:\n            return mid\n        elif A[mid] < x:\n\
    \            low = mid + 1\n        else:\n            high = mid - 1\n    return\
