    # 5.4.3 Brownian Motion and Applications


    Brownian motion (a.k.a. Wiener process) is the cornerstone of continuous-time
    stochastic modelling. Its mathematical elegance and rich path properties make
    it indispensable in physics (diffusion), biology (random walks), and especially
    *finance*, where it drives the celebrated Black–Scholes model for asset prices.


    # Standard Brownian Motion $W_t$


    $W_0 = 0,$

    $W_{t+s} - W_t \sim \mathcal{N}(0, s)$ independent of $\mathcal{F}_t,$

    paths $t \mapsto W_t$ are a.s. continuous and nowhere differentiable.


    For any $0 = t_0 < t_1 < \cdots < t_n$, the vector $(W_{t_1}, \ldots, W_{t_n})$
    is multivariate normal with $\text{Cov}(W_{t_i}, W_{t_j}) = \min(t_i, t_j)$.


    # Simulating Brownian Motion in Python


    **Time-Discretisation Scheme** Fix grid $0 = t_0 < \cdots < t_N = T$, let $\Delta
    t_i = t_i - t_{i-1}$ and generate i.i.d. increments $\Delta W_i \sim \mathcal{N}(0,
    \Delta t_i)$. Set $W_{t_i} = W_{t_{i-1}} + \Delta W_i$.


    # Example 5.4.11 (Single Path and Distribution Check)


    ```

    import numpy as np, matplotlib.pyplot as plt

    T, N = 1.0, 252

    dt = T/N

    ΔW = np.random.normal(scale=np.sqrt(dt), size=N)

    W = np.insert(np.cumsum(ΔW), 0, 0)


    plt.plot(np.linspace(0,T,N+1), W); plt.xlabel("t"); plt.ylabel("W(t)")

    plt.title("Simulated Brownian path"); plt.show()


    # distribution at fixed t

    t_idx = int(0.6*N) # t=0.6

    samples = np.cumsum(np.random.normal(0, np.sqrt(dt), (10000,N)))[:, t_idx]

    print("Empirical mean≈", samples.mean(), "Var≈", samples.var())

    ```


    Expect $\mathbb{E}[W_{0.6}] = 0$, $\text{Var}(W_{0.6}) = 0.6$; simulation should
    concur.'
