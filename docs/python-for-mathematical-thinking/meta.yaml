    ## 第 9 章

    混沌理论与动力系统


    **摘要** 不动点理论、线性和非线性稳定性、分岔分析以及状态空间重构，为表现出对初始条件敏感依赖性的离散映射和连续流奠定了基础。计算了李雅普诺夫指数、熵率、奇怪吸引子和控制算法，而数据驱动方法——Koopman
    模分解和储备池计算——展示了在金融、气候和生物力学中对混沌时间序列的现代预测。


    **关键词** 混沌理论 · 动力系统 · 李雅普诺夫指数 · 分岔分析 · Koopman 算子 · 储备池计算


    在经典力学中，拉普拉斯设想了一个未来由现在唯一决定的宇宙，然而到了 19 世纪末，庞加莱已经察觉到这座决定论大厦的裂缝：简单的非线性定律可能使长期预测实际上变得不可能。*混沌理论*
    将这种张力形式化。它研究轨迹表现出对初始条件敏感依赖性、拓扑混合和稠密周期轨道的确定性动力系统，从而产生虽然由光滑方程生成但模仿随机性的行为。该学科的数学支柱是微分方程和差分方程的定性理论：不动点、周期轨道、不变流形、分岔、李雅普诺夫指数、熵和分形吸引子。连续时间流
    $\dot{\mathbf{x}} = \mathbf{F}(\mathbf{x})$ 和离散映射 $\mathbf{x}_{n+1} = G(\mathbf{x}_n)$
    共享这一术语，但各自贡献了独特的现象——流中的有限时间爆破，映射中的符号动力学和揉捏理论。现代算法，从伪弧长延拓到 GPU 加速的轨迹集合，使我们能够以前所未有的精度和规模在数值上探测这些结构，使
    Python 成为不可或缺的实验室。在接下来的篇幅中，我们将开发分类平衡点、跟踪其随参数变化的分岔以及诊断混沌开始所需的线性和非线性工具：我们将在解析推导、几何洞察和计算实验之间无缝过渡，最终形成一个框架'
