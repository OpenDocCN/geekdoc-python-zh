    \ = g(x) dx$。对两边积分得到*隐式*解\n\n$$\\int \\frac{dy}{h(y)} = \\int g(x) dx + C.$$\n\
    \n### 例 6.1.1 (逻辑斯谛增长)\n\n$$\\frac{dy}{dx} = ry\\left(1 - \\frac{y}{K}\\right),\
    \ \\quad r, K > 0.$$\n\n分离变量：\n\n$$\\int \\frac{dy}{y(1 - y/K)} = r \\int dx.$$\n\
    \n部分分式和积分给出显式解\n\n$$y(x) = \\frac{K}{1 + Ae^{-rx}}, \\quad A = \\frac{K - y_0}{y_0}.$$\n\
    \n```python\nimport sympy as sp\nx,r,K,y0 = sp.symbols('x r K y0', positive=True)\n\
