    For Max-Cut objective $C(z) = \sum_{(i,j)\in E} \frac{1-z_i z_j}{2}$, apply mixer
    $B = \sum_j X_j$ and cost unitaries alternately:


    $|\gamma, \beta\rangle = \prod_{p=1}^P e^{-i\beta_p B} e^{-i\gamma_p C} |+\rangle^{\otimes
    n}$.


    Choosing $P = O(\sqrt{m})$ yields approximation ratio $\approx 0.694$ on 3-regular
    graphs. Classical layer optimises angles $(\gamma_p, \beta_p)$ by SPSA or gradient-free
    Nelder-Mead.


    # Quantum Kernels


    Embed classical data $\mathbf{x}$ into Hilbert space via feature map $U_\phi(\mathbf{x})|0\rangle^{\otimes
    n}$; kernel $k(\mathbf{x}, \mathbf{x}'') = |\langle \psi(\mathbf{x})|\psi(\mathbf{x}'')\rangle|^2$
    estimated via SWAP test. Empirically, data re-uploading circuits achieve comparable
    accuracy to RBF SVM on MNIST-4-6 subset at $n=6$ qubits.


    # Quantum Annealing


    Time-dependent Hamiltonian $H(t) = A(t)H_0 + B(t)H_C$, start $H_0 = -\sum_i X_i$
    (easy ground state), end $H_C$ encodes Ising cost. Adiabatic theorem guarantees
    ground state fidelity if anneal time $T \gg \Delta_{\min}^{-2}$ where $\Delta_{\min}$
    is minimum spectral gap. Embedding combinatorial optimisation into D-Wave''s Chimera
    graph uses minor-embedding heuristics.


    # 11.4.3 Spectral Methods and Applications


    Spectral methods approximate a sufficiently smooth function $u$ on a bounded domain
    by a global expansion in an orthogonal polynomial or trigonometric basis. Truncating
    the series at $N$ terms converts differential or integro-differential equations
    into *algebraic* problems whose matrices are dense but extremely well-conditioned
    under suitable basis scaling. The hallmark of spectral discretisation is *exponential*
    (or *spectral*) convergence: the approximation error decays like $\mathcal{O}(e^{-\alpha
    N})$ when $u$ is analytic, in stark contrast to the algebraic rates $\mathcal{O}(h^p)$
    of finite-difference or finite-element schemes with mesh size $h$. In practice,
    high accuracy per degree of freedom offsets the dense linear-algebra cost, making
    spectral methods indispensable in direct numerical simulation (DNS) of turbulence
    and global spectral weather models.'
