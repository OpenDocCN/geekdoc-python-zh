    # Chapter 5

    Probability and Statistics


    **Abstract** Random variables are formalised on measure-theoretic grounds before
    discrete and continuous distributions, expectation, variance and covariance are
    simulated with `numpy.random`. Frequentist inference (MLE, hypothesis testing,
    confidence intervals) is paralleled with Bayesian updating, and resampling techniques
    such as bootstrap and permutation tests provide non-parametric robustness. The
    chapter closes with time-series basics and goodness-of-fit diagnostics, preparing
    the reader for stochastic modelling in later chapters.


    **Keywords** Probability · Statistics · Bayesian inference · Random variables
    · Hypothesis testing · Time-series analysis


    # 5.1 Probability Theory


    Probability provides a rigorous framework for quantifying uncertainty and randomness.
    Formally, a probability space is a triple $(\Omega, \mathcal{F}, \mathbb{P})$,
    where $\Omega$ is the sample space, $\mathcal{F}$ a $\sigma$-algebra of events,
    and $\mathbb{P}$ a probability measure. In practice, many problems reduce to finite
    sample spaces with the discrete $\sigma$-algebra and the counting measure scaled
    to unity.


    # 5.1.1 Basic Probability Concepts


    # Probability Axioms and Theorems


    **Kolmogorov Axioms** For any probability space $(\Omega, \mathcal{F}, \mathbb{P})$
    and events $A, B \in \mathcal{F}$:


    $(\text{A1})\ 0 \leq \mathbb{P}(A) \leq 1, \qquad (\text{A2})\ \mathbb{P}(\Omega)
    = 1, \qquad (\text{A3})\ \mathbb{P}\left(\bigcup_{i=1}^{\infty} A_i\right) = \sum_{i=1}^{\infty}
    \mathbb{P}(A_i)$


    for any countable collection $\{A_i\}$ of pairwise disjoint events.'
