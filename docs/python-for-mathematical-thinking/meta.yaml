    CWT presupposes a priori basis; empirical mode decomposition (Huang et al. 1998)
    adaptively extracts *intrinsic mode functions* (IMFs).


    ## Sifting Algorithm


    1.  Identify local extrema of $x(t)$; interpolate upper envelope $e_{\max}$ and
    lower envelope $e_{\min}$ (cubic splines).

    2.  Compute mean $m(t) = \frac{1}{2}(e_{\max} + e_{\min})$; update $h_1 = x -
    m$.

    3.  Iterate until $h_1$ satisfies IMF criteria: (i) number of extrema $\approx$
    number of zero crossings; (ii) mean envelope $\approx 0$ (tolerance $\varepsilon$).

    4.  Set $\text{IMF}_1 = h_1$; update residue $r_1 = x - \text{IMF}_1$ and repeat.


    Stop when residue $r_k$ is monotonic or has $< 2$ extrema. An $N$-point series
    decomposes as $x(t) = \sum_{k=1}^K \text{IMF}_k(t) + r_K(t)$.


    ## Hilbert Spectral Analysis


    Apply analytic signal $z_k(t) = \text{IMF}_k(t) + j\mathcal{H}[\text{IMF}_k](t)$;
    instantaneous amplitude $A_k(t) = |z_k|$ and frequency $\omega_k(t) = \partial_t
    \arg z_k(t)$. The Hilbert spectrum $H(t, \omega) = \sum_k A_k(t)\delta(\omega
    - \omega_k(t))$ provides high-resolution amplitude–frequency portrait free from
    pre-defined basis.


