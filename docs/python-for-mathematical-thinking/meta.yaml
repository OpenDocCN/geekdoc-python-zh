    \ y_b$。这在物理学（最小作用量原理）、几何学（测地线）和工程学（最优控制）中都有应用。\n\n### 欧拉-拉格朗日形式体系\n\n$\\mathcal{J}[y]$\
    \ 的临界点满足 **欧拉-拉格朗日方程**：\n\n$$\\frac{\\partial L}{\\partial y} - \\frac{d}{dx}\
    \ \\left( \\frac{\\partial L}{\\partial y'} \\right) = 0.$$\n\n**示例 3.4.8（最短路径：平面上的测地线）**\
    \ 设 $y(x)$ 连接两点 $(x_0, y_0)$ 和 $(x_1, y_1)$。弧长泛函为：\n\n$$\\mathcal{J}[y] = \\int_{x_0}^{x_1}\
