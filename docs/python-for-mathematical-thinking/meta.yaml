    = \lambda$ and $\text{Var}(X) = \lambda$. Proof via mgf below.


    # Law of Total Variance


    $\text{Var}(X) = \mathbb{E}[\text{Var}(X \mid Y)] + \text{Var}(\mathbb{E}[X \mid
    Y]).$


    **Example 5.1.11 (Total Variance, Poisson-Gamma Mixture (Negative Binomial))**
    Let $N \mid \Lambda \sim \text{Pois}(\Lambda)$, $\Lambda \sim \text{Gamma}(r,
    \theta)$. Then $\mathbb{E}[N] = r\theta$ and


    $\text{Var}(N) = \mathbb{E}[\Lambda] + \text{Var}(\Lambda) = r\theta + r\theta^2,$


    matching $\text{NegBin}(r, p)$ variance formula.


    **Example 5 (Covariance of Die Faces)** Roll a fair die twice: $X$ first face,
    $Y$ second. Independence $\Rightarrow \text{Cov}(X, Y) = 0$. But let $S = X +
    Y$; then $\text{Cov}(X, S) = \text{Var}(X) = \frac{35}{12}$.


