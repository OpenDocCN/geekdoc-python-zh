    \ + A.T) # symmetric part\nxsol = np.linalg.solve(A, y) # Ax = y\ncond = np.linalg.cond(A)\
    \ # κ₂(A)\ndetA = np.linalg.det(A) # determinant\n```\n\nUnderflows/overflows\
    \ are trapped by IEEE 754 rules; ill-conditioned solves warrant np.linalg.lstsq\
    \ or regularisation.\n\n**Random Sampling** NumPy's default_rng implements the\
    \ PCG64 bit-generator and supports parallel streams via bit_generator.jumped.\n\
    \n```\nrng = np.random.default_rng(seed=42)\nξ = rng.standard_normal(10**6)\n\
    B = rng.integers(0, 2, size=(128, 128), dtype=np.int8)\nθ = rng.uniform(0, 2*np.pi,\
    \ 5000)\n```\n\n**Common Mathematical Functions** NumPy vectors C99 intrinsics\
    \ and special functions from scipy.special.\n\n```\nu = np.linspace(-3, 3, 7)\n\
    sigmoid = 1/(1 + np.exp(-u))\nnormcdf = 0.5*(1 + np.erf(u/np.sqrt(2)))\nβ = np.abs(np.heaviside(u,\
    \ 0.5)) # unit step\nγ = np.where(u > 0, u**2, 0) # ReLU² via masking\n```\n\n\
    **Performance Tips**\n\n+   - Exploit stride tricks (np.lib.stride_tricks.as_strided)\
    \ for sliding windows without copying memory.\n- Fuse element-wise kernels with\
    \ numexpr or JIT them via numba.njit(parallel=True) for SIMD and thread parallelism.\n\
    - Prefer einsum for expressive tensor contractions that auto-optimise memory layout\
    \ and BLAS calls:\n  C = np.einsum('ij,jk,lk->il', A, B, B, optimize=True)\n-\
    \ Allocate contiguously (order='C') when interfacing with C/Fortran libraries;\
    \ use astype(np.float32, copy=False) to downcast without duplication.\n\nNumPy's\
    \ array semantics elevate vectorised Python into a concise DSL for numerical linear\
    \ algebra. Mastery of slicing, broadcasting, BLAS-backed operations, and random-number\
    \ generation equips practitioners to prototype sophisticated algorithms—spectral\
    \ solvers, Monte Carlo estimators, or machine-learning pipelines—within a few\
    \ expressive lines of code."
