  md: '# 11.1.4 Wavelet Transforms


    Classical Fourier analysis characterises global spectral content but obscures
    *when* a transient occurs. Wavelet analysis remedies this shortcoming by furnishing
    a family of dilations and translations of a prototype wavelet $\psi$ that simultaneously
    localise in time and frequency. Because the Heisenberg uncertainty principle forbids
    arbitrary precision in both domains, wavelets adopt a logarithmic tiling: fine
    temporal resolution at high frequencies and coarse resolution at low frequencies—the
    reverse of the short-time Fourier transform’s fixed window.


    # Introduction to Wavelets


    A function $\psi \in L^2(\mathbb{R})$ is an *admissible wavelet* if it has zero
    mean and finite energy, satisfying the admissibility condition


    $$C_{\psi} = 2\pi \int_{0}^{\infty} \frac{|\widehat{\psi}(\omega)|^2}{\omega}
    \, d\omega < \infty.$$


    The **continuous wavelet transform** (CWT) of a signal $f \in L^2$ is


    $$\mathcal{W}_{\psi} f(a, b) = \frac{1}{\sqrt{|a|}} \int_{-\infty}^{\infty} f(t)
    \overline{\psi\left(\frac{t - b}{a}\right)} \, dt, \quad a \in \mathbb{R}^{\times},
    \; b \in \mathbb{R}.$$


    Coefficient modulus encodes similarity of $f$ to $\psi_{a,b}$; inversion reads


    $$f(t) = \frac{1}{C_{\psi}} \int_{\mathbb{R}} \int_{\mathbb{R}} \mathcal{W}_{\psi}
    f(a, b) \frac{1}{|a|^{3/2}} \psi\left(\frac{t - b}{a}\right) \, da \, db.$$


    **Example 11.1.4 (Mexican Hat)** $\psi(t) = \frac{2}{\sqrt{3}} \pi^{-1/4} (1 -
    t^2) e^{-t^2/2}$ possesses vanishing first moment, making it sensitive to curvature
    changes; CWT detects ridge lines in edge maps.


    # Wavelet Transform vs. Fourier Transform


    For chirp $f(t) = \sin(\pi t^2)$, the instantaneous frequency $f''(t) = 2t$ increases
    linearly. The Fourier transform smears energy across the entire spectrum, whereas
    the scalogram $|\mathcal{W}_{\psi} f(a, b)|^2$ traces a parabola, revealing local
    frequency evolution. In quantitative terms, the joint time-frequency uncertainty
    obeys $\sigma_t \sigma_{\omega} \geq \frac{1}{2}$, with Gaussian $\phi$ attaining
    equality; Morlet wavelet $\psi(t) = e^{i\omega_0 t} e^{-t^2/2}$ trades marginally
    higher uncertainty for admissibility (zero mean).'
