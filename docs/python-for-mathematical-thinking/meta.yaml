    # 5.3.3 Regression Analysis


    Regression relates one or more explanatory variables to a response, quantifying
    trends, testing scientific hypotheses, and predicting future outcomes. In Python,
    numpy provides efficient linear algebra, scipy.stats and statsmodels furnish classical
    inference, and scikit-learn unifies machine-learning style regression. We illustrate
    each flavour with realistic, computation-heavy examples.


    # Simple Linear Regression


    Assume pairs $(x_i, y_i)$ satisfy


    $$y_i = \beta_0 + \beta_1 x_i + \varepsilon_i, \quad \varepsilon_i \overset{\text{i.i.d.}}{\sim}
    \mathcal{N}(0, \sigma^2).$$


    The least-squares estimator $\hat{\beta} = (X^\top X)^{-1} X^\top \mathbf{y}$
    minimises $\sum_i (y_i - \hat{y}_i)^2$.


    **Example 5.3.13 (Physics—Hooke''s Law)** Eight springs are stretched under force
    $F$ (N) and elongation $y$ (mm) measured.


    ```

    python

    import numpy as np, statsmodels.api as sm

    F = np.array([1,2,3,4,5,6,7,8])

    y = np.array([0.9,2.1,3.0,4.1,4.9,6.2,6.8,8.1])

    X = sm.add_constant(F) # adds intercept column

    model = sm.OLS(y, X).fit()

    print(model.summary())

    ```


    Output $\hat{\beta}_0 = 0.05 \pm 0.12$, $\hat{\beta}_1 = 1.01 \pm 0.02$, $R^2
    = 0.998$. Residual standard error $\hat{\sigma} = 0.13$ mm. Diagnostics:


    ```

    python

    import matplotlib.pyplot as plt

    plt.scatter(F, y); plt.plot(F, model.fittedvalues, "r");

    plt.xlabel("Force (N)"); plt.ylabel("Elongation (mm)")

    plt.show()

    sm.qqplot(model.resid, line=''45''); plt.show()

    ```


    Q-Q plot aligns with the $45^\circ$ line, validating normal residual assumption.


    Prediction for $F = 9$ N uses


    $$\hat{y}_9 = \hat{\beta}_0 + 9\hat{\beta}_1 \approx 9.14, \quad \text{SE}(\hat{y}_9)
    = \hat{\sigma} \sqrt{\frac{1}{n} + \frac{(9 - \bar{x})^2}{\sum (x_i - \bar{x})^2}}.$$'
