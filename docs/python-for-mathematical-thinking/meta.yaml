    Due to complexity, dedicated libraries (e.g. `xAct` in `Mathematica`) or symbolic\
    \ geometry packages may be more appropriate.\n\n## 3.4.4 Fractional Calculus\n\
    \n**Fractional calculus** generalises the notion of derivatives and integrals\
    \ to non-integer (fractional) orders. The $n$-th derivative is defined via repeated\
    \ application of differentiation, but what does it mean to take the derivative\
    \ of order $\\alpha \\in \\mathbb{R}$, or even $\\alpha \\in \\mathbb{C}$? Fractional\
    \ derivatives and integrals find applications in viscoelasticity, anomalous diffusion,\
    \ signal processing, and control systems. Python offers tools for symbolic and\
    \ numerical work in this area via packages like `sympy`, `mpmath`, and `fracdiff`.\n\
    \n## Fractional Derivatives\n\nOne popular definition is the **Riemann–Liouville\
    \ fractional derivative**:\n\n$$D^\\alpha f(x) = \\frac{1}{\\Gamma(n - \\alpha)}\
    \ \\frac{d^n}{dx^n} \\int_a^x \\frac{f(t)}{(x - t)^{\\alpha - n + 1}} \\, dt,\
    \ \\quad n - 1 < \\alpha < n.$$\n\nAnother is the **Caputo derivative**, which\
    \ is often preferred in physical modelling due to well-defined initial conditions:\n\
    \n$$^C D^\\alpha f(x) = \\frac{1}{\\Gamma(n - \\alpha)} \\int_a^x \\frac{f^{(n)}(t)}{(x\
    \ - t)^{\\alpha - n + 1}} dt.$$\n\n**Example 3.4.21 (Fractional Derivative of\
    \ a Power Function)** Let $f(x) = x^k$. Then:\n\n$$D^\\alpha x^k = \\frac{\\Gamma(k\
    \ + 1)}{\\Gamma(k - \\alpha + 1)} x^{k - \\alpha}.$$\n\n```python\nimport sympy\
    \ as sp\nx, alpha, k = sp.symbols(\"x alpha k\", positive=True)\nf = x**k\nDalpha_f\
    \ = sp.gamma(k+1) / sp.gamma(k - alpha + 1) * x**(k - alpha)\nsp.pprint(Dalpha_f)\n\
    ```\n\nThis expression reduces to standard derivatives when $\\alpha \\in \\mathbb{N}$.\n\
    \n**Example 3.4.22 (Numeric Approximation of Caputo Derivative)** Let $f(x) =\
    \ \\sin(x)$, approximate its Caputo derivative at $x = 1$ of order $\\alpha =\
    \ 0.5$. mpmath has support for fractional differintegrals.\n\n```python\nfrom\
    \ mpmath import *\nmp.dps = 15\n\ndef caputo_half_deriv(f, x, a=0, N=100):\n \
    \   h = (x - a) / N\n    t_vals = [a + i*h for i in range(N)]\n    f_prime = [diff(f,\
    \ t) for t in t_vals]\n    weights = [(x - t)**(-0.5) for t in t_vals]\n    return\
    \ (1/gamma(0.5)) * h * sum(w*w_ for w,w_ in zip(weights, f_prime))\n\nresult =\
    \ caputo_half_deriv(lambda t: sin(t), 1.0)\nprint(result)\n```\n\n## Fractional\
    \ Integrals\n\nThe **Riemann–Liouville fractional integral** of order $\\alpha\
    \ > 0$ is defined as:\n\n$$I^\\alpha f(x) = \\frac{1}{\\Gamma(\\alpha)} \\int_a^x\
    \ (x - t)^{\\alpha - 1} f(t) dt.$$\n\n**Example 3.4.23 (Fractional Integral of\
    \ $f(t) = 1$)**\n\n$$I^\\alpha 1 = \\frac{1}{\\Gamma(\\alpha)} \\int_0^x (x -\
    \ t)^{\\alpha - 1} dt = \\frac{x^\\alpha}{\\Gamma(\\alpha + 1)}.$$"
