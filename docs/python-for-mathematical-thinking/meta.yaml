    \ of a graph $G = (V, E)$: independent sets are forests (edge subsets with no\
    \ cycles). Bases correspond to spanning trees; rank equals $|V| - c(G)$ where\
    \ $c(G)$ is the number of connected components.\n- *Vector matroid* $M(V)$: $E$\
