    \n# 数据清洗与预处理技术\n\n脏数据会同时影响数值摘要和可视化。\n\n**缺失值** 策略：列表删除法、均值/中位数插补、回归插补、多重插补。\n\n\
    **示例 5.2.15（中位数插补）**\n\n```python\ndf = iris.copy()\ndf.iloc[5:10, 0] = np.nan\
