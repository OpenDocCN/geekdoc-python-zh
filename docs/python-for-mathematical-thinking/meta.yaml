    \ Functions and Boundary Value Problems\n\nFor linear operator $L[y] = y'' + p(x)y'\
    \ + q(x)y$ on $a \\le x \\le b$ with boundary conditions $y(a) = y(b) = 0$, the\
    \ **Green’s function** $G(x, \\xi)$ solves\n\n$L_x G(x, \\xi) = \\delta(x - \\\
    xi), \\quad G(a, \\xi) = G(b, \\xi) = 0$.\n\nThen $y(x) = \\int_a^b G(x, \\xi)\
    \ f(\\xi) \\, d\\xi$ solves $L[y] = f$.\n\n**Example 6.1.14 (Clamped String)**\
    \ $y''(x) = f(x)$, $y(0) = y(1) = 0$. Piecewise Green’s function\n\n$G(x, \\xi)\
    \ = \\begin{cases} x(1 - \\xi), & 0 \\le x \\le \\xi, \\\\ \\xi(1 - x), & \\xi\
    \ \\le x \\le 1. \\end{cases}$\n\nFor load $f(x) = 6x$, analytic convolution yields\
    \ $y(x) = x^3 - x$. Numerical check:\n\n```python\nx, \\xi = sp.symbols('x \\\
    xi')\nG = sp.Piecewise((x*(1-\\xi), x<=\\xi), (\\xi*(1-x), True))\nf = 6*\\xi\n\
    y = sp.integrate(G*f, (\\xi,0,1))\nsp.simplify(sp.diff(y,x,2) - 6*x) # 0\n```\n\
    \n## Series Solutions of ODEs: Frobenius Method\n\nFor regular singular point\
    \ $x = 0$ the Frobenius ansatz\n\n$y(x) = \\sum_{n=0}^{\\infty} a_n x^{n+r}, \\\
    quad a_0 \\ne 0,$\n\nleads to an indicial equation determining $r$.\n\n**Example\
    \ 6.1.15 (Bessel’s Equation)** $x^2y'' + xy' + (x^2 - \\nu^2)y = 0$. Indicial\
    \ equation $r^2 - \\nu^2 = 0 \\implies r = \\pm \\nu$. For $r = \\nu$ recursion\
    \ $a_n = -\\frac{1}{n(n+2\\nu)}a_{n-2}$ gives even series, $J_\\nu(x) = \\sum_{k=0}^{\\\
    infty} \\frac{(-1)^k}{k!\\Gamma(k+\\nu+1)}\\left(\\frac{x}{2}\\right)^{2k+\\nu}$.\n\
    \n```python\n\\nu = sp.symbols('\\nu', positive=True)\nk = sp.symbols('k', integer=True,\
    \ nonnegative=True)\nJv = sp.summation((-1)**k/(sp.factorial(k)*sp.gamma(k+v+1))\n\
    \    *(x/2)**(2*k+v), (k,0,4)).series(x, 0, 6)\n```\n\nCompare symbolic Bessel\
    \ $J_v$ with truncated series at $x=1$ for $v=0$.\n\n**Regular Points** If point\
    \ is ordinary, set $r=0$. Example: Legendre ODE $(1-x^2)y''-2xy'+\\ell(\\ell+1)y=0$\
    \ produces Legendre polynomials $P_\\ell(x)$ via terminating series when $\\ell\
    \ \\in \\mathbb{N}$.\n\n**Irregular Singularities** Modified Bessel or Airy functions\
    \ arise; formal series may diverge, requiring asymptotic matching or dominant-balance\
    \ (WKB) techniques—not covered here.\n\n## 6.1.3 Systems of ODEs\n\nReal-world\
    \ models rarely evolve in isolation; instead, several state variables interact.\
    \ A **system** of first-order equations is written compactly as\n\n$\\dot{\\mathbf{x}}\
    \ = \\mathbf{F}(t, \\mathbf{x}), \\quad \\mathbf{x}(t) \\in \\mathbb{R}^n$.\n\n\
    We treat linear systems in full generality, develop qualitative tools for nonlinear\
    \ systems, and conclude with Lyapunov's direct method—an energy-like criterion\
    \ that bypasses explicit solutions.\n\n## Linear Systems and Matrix Methods\n\n\
    Let $\\mathbf{A} \\in \\mathbb{R}^{n \\times n}$ be constant. The homogeneous\
    \ system\n\n$\\dot{\\mathbf{x}} = \\mathbf{A}\\mathbf{x}, \\quad \\mathbf{x}(0)\
    \ = \\mathbf{x}_0$\n\nhas solution $\\mathbf{x}(t) = e^{\\mathbf{A}t}\\mathbf{x}_0$,\
    \ where the **matrix exponential** $e^{\\mathbf{A}t} = \\sum_{k=0}^{\\infty} \\\
    frac{(\\mathbf{A}t)^k}{k!}$.\n\n**Diagonalisation** If $\\mathbf{A} = \\mathbf{V}\\\
    mathbf{\\Lambda}\\mathbf{V}^{-1}$ with eigenvalues $\\lambda_i$, $e^{\\mathbf{A}t}\
    \ = \\mathbf{V} e^{\\mathbf{\\Lambda}t} \\mathbf{V}^{-1}$, $e^{\\mathbf{\\Lambda}t}\
    \ = \\text{diag}(e^{\\lambda_1 t}, \\dots, e^{\\lambda_n t})$.\n\n**Jordan Form**\
    \ For defective matrices a Jordan block $J = \\lambda I + N$ ($N$ nilpotent) yields\
    \ $e^{Jt} = e^{\\lambda t} \\sum_{k=0}^{m-1} \\frac{(Nt)^k}{k!}$.\n\n## Example\
    \ 6.1.16 (Coupled Mass–Spring)\n\n$m\\ddot{x} = -2kx + ky, \\quad m\\ddot{y} =\
    \ kx - 2ky$.\n\nWrite $\\dot{\\mathbf{z}} = \\mathbf{A}\\mathbf{z}$ with $\\mathbf{z}\
    \ = (x, y, \\dot{x}, \\dot{y})$; eigenvalues $\\pm i\\sqrt{k/m}$, $\\pm i\\sqrt{3k/m}$.\
    \ Hence motion superposes two normal modes of frequencies $\\omega_1 = \\sqrt{k/m}$\
    \ and $\\omega_2 = \\sqrt{3k/m}$.\n\n```python\nimport sympy as sp\nk,m=sp.symbols('k\
    \ m', positive=True)\nA=sp.Matrix([[0,0,1,0],[0,0,0,1],[-2*k/m,k/m,0,0],[k/m,-2*k/m,0,0]])\n\
    A.eigenvects()\n```\n\n**Forced Linear System** $\\dot{\\mathbf{x}} = \\mathbf{A}\\\
    mathbf{x} + \\mathbf{f}(t)$ has variation-of-constants solution $\\mathbf{x}(t)\
    \ = e^{\\mathbf{A}t}\\mathbf{x}_0 + \\int_0^t e^{\\mathbf{A}(t-\\tau)}\\mathbf{f}(\\\
