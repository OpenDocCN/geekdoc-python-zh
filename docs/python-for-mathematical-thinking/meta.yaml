    # Planar Graphs and Euler''s Formula


    A graph is *planar* if it admits an embedding in $\mathbb{R}^2$ with no edge intersections.
    Euler (1752) showed any connected planar embedding partitions the sphere into
    $F$ faces satisfying


    $$|V| - |E| + F = 2$$


    **Proof** Induct on $|E|$. A tree ($|E| = |V| - 1$) has $F = 1$. Removing a non-bridge
    edge reduces $|E|$ and $F$ by 1 while preserving planarity; the invariant holds.


    **Consequences** For planar $G$ with $|V| \ge 3$:


    $$|E| \le 3|V| - 6, \quad \text{and if } G \text{ has no triangles } |E| \le 2|V|
    - 4.$$


    Hence $K_5$ ($10 > 3 \cdot 5 - 6$) and $K_{3,3}$ ($9 > 2 \cdot 6 - 4$ after noting
    bipartiteness implies triangle-free) are non-planar—Kuratowski''s theorem states
    that these are the *only* minimal obstructions.


    ```

    import networkx as nx, networkx.algorithms.planarity as plan


    K5 = nx.complete_graph(5)

    print(plan.check_planarity(K5)[0]) # False


    K33 = nx.complete_bipartite_graph(3,3)

    print(plan.check_planarity(K33)[0]) # False

    ```


    **Dual Graphs and Face Counting** In a planar embedding, each face corresponds
    to a dual vertex; edges cross their primal counterparts, yielding $|E^*| = |E|$
    and $|V^*| = F$. Euler''s formula in dual form: $|V^*| - |E^*| + F^* = 2$. Self-duality
    of the cube and octahedron illustrates polyhedral symmetry.


