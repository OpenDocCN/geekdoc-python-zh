    beta, \\lambda_{\\text{wd}}, p_{\\text{drop}})$。定义验证估计 $\\widehat{R}_{\\text{val}}(\\\
    lambda) = \\frac{1}{|V|} \\sum_{i \\in V} \\ell(h_{\\Theta^*(\\lambda)}(\\mathbf{x}_i),\
    \ y_i)$。\n\n## 网格搜索与随机搜索\n\n随机搜索从对数均匀先验中采样 $\\lambda$；实证研究（Bergstra and Bengio\
