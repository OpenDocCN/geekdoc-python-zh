  md: 'its Shannon entropy. The **Kolmogorov–Sinai (KS) entropy** is


    $$h_{\mu}(T) = \sup_{\mathcal{P}} \left( \lim_{n \to \infty} \frac{1}{n} H_{\mu}(\mathcal{P}^n)
    \right),$$


    the supremum taken over all finite partitions. A system with $h_{\mu}(T) = 0$
    is *zero-entropy*; it may still be aperiodic (e.g., irrational circle rotation)
    yet displays no exponential growth of complexity. Positive KS entropy signals
    chaotic orbit structure: the set of admissible symbolic sequences under a generating
    partition contains exponentially many words of length $n$, asymptotically $e^{h_{\mu}
    n}$.


    **Example 9.4.1 (Bernoulli Shift)** On the space $\Sigma_2 = \{0, 1\}^{\mathbb{N}}$
    with product measure $\mu(p, 1-p)$, the left shift $\sigma$ has partition $\mathcal{P}
    = \{\{0\}, \{1\}\}$ generating the whole $\sigma$-algebra. Since $\sigma^{-j}
    \mathcal{P} = \mathcal{P}$, $H_{\mu}(\mathcal{P}^n) = n H_{\mu}(\mathcal{P})$
    and $h_{\mu}(\sigma) = H_{\mu}(\mathcal{P}) = -p \log p - (1-p) \log(1-p)$.


    # Relationship Between Entropy and Lyapunov Exponents


    **Pesin''s identity** links metric entropy to Lyapunov exponents for $C^{1+\alpha}$
    diffeomorphisms preserving an *absolutely continuous* invariant measure (ACIM):


    $$h_{\mu}(T) = \int_{\mathcal{X}} \sum_{\lambda_i(\mathbf{x}) > 0} \lambda_i(\mathbf{x})
    \, d\mu(\mathbf{x}).$$


    Thus the entropy equals the phase-space average of the *sum of positive exponents*.
    For volume-preserving systems in $\mathbb{R}^d$ with spectrum $\{\lambda_1, \dots,
    \lambda_d\}$ ordered by sign, Pesin''s identity implies $h_{\mu}(T) \le \sum_{i=1}^{d/2}
    \lambda_i$.


    **Example 9.4.2 (Lorenz Attractor)** Empirical spectrum $(\lambda_1, \lambda_2,
    \lambda_3) \approx (0.905, 0, -14.57)$ yields $h_{\mu} \approx \lambda_1 \approx
    0.905$, consistent with numerical estimates from symbolic partitions of vortex-wing
    excursions. The information needed to specify the state doubles roughly every
    0.77 model time units ($\ln 2 / \lambda_1$).


    # Computational Recipe


    Given a time series $\{x_n\}_{n=0}^{N-1}$, choose an $\epsilon$-radius covering
    and compute $H_n = -\sum_{C \in \mathcal{C}_n} \mu(C) \log \mu(C)$, where $\mathcal{C}_n$
    are cylinders of length $n$ on the reconstructed state. A least-squares fit to
    $H_n$ versus $n$ over a scaling window estimates $h_{\mu}$.'
