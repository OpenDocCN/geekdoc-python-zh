    \ practice. We develop fixed-point and Newton-type solvers, then show how continuation\
    \ tracks solution branches through parameter space to uncover bifurcations in\
    \ engineering models.\n\n## Fixed-Point Iteration and Newton's Method\n\n### Fixed-Point\
    \ Maps\n\nRewrite $F(\\mathbf{x}) = \\mathbf{0}$ as $\\mathbf{x} = \\Phi(\\mathbf{x})$\
    \ and iterate\n\n$\\mathbf{x}^{(k+1)} = \\Phi(\\mathbf{x}^{(k)})$.\n\nIf $\\Phi$\
    \ is a contraction on a closed convex set ($\\|\\Phi(\\mathbf{u}) - \\Phi(\\mathbf{v})\\\
