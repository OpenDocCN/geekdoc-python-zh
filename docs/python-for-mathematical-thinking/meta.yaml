    ```\ndef standard_map(θ, p, K, N=10_000, h=1.0):\n    for _ in range(N):\n   \
    \     p += .5*K*np.sin(θ) # kick\n        θ += h*p # drift\n        p += .5*K*np.sin(θ)\
    \ # kick\n        θ %= 2*np.pi; p %= 2*np.pi\n    return θ, p\n```\n\nA non-symplectic\
    \ Euler update drifts energy and misplaces secondary KAM islands, whereas leapfrog\
    \ maintains correct invariant tori distribution even after $10^6$ iterations.\n\
    \n*Shadowing* In chaos, numerical trajectories diverge exponentially from true\
    \ ones, yet the *shadowing lemma* guarantees nearby exact orbits within $\\varepsilon$\
    \ of the computed path for hyperbolic systems. Hybrid continuous-discrete solvers\
    \ adjust initial conditions every $T \\approx \\lambda_{\\max}^{-1}$ to remain\
    \ within the shadowing tube, producing validated long-time averages of ergodic\
    \ observables like Lyapunov spectrum or KS entropy.\n\n# 9.6.5 Complex Networks\
    \ and Emergent Behaviour\n\nComplex systems often manifest as graphs whose vertices\
    \ represent dynamical agents and whose edges encode pairwise interactions of varying\
    \ strengths. The topology of these graphs mediates the emergence of large-scale\
