    \ = ik e^{ikx}$。快速傅里叶变换（FFT）可在等距节点$x_j$处的物理值$u(x_j)$与谱系数$\\hat{u}_k$之间以$O(N \\\
    log N)$复杂度相互转换，从而允许对例如一维Burgers方程$u_t + uu_x = \\nu u_{xx}$进行时间步进：\n\n```python\n\
    import numpy as np\nN, L = 1024, 2*np.pi\nx = np.linspace(0, L, N, endpoint=False)\n\
    k = np.fft.fftfreq(N, 1/N) # wavenumbers\nu = np.sin(x) # initial condition\n\
    dt, nu = 1e-3, 0.02\nfor n in range(2000):\n    û = np.fft.fft(u)\n    du = np.fft.ifft(1j*k*û).real\n\
    \    lap = np.fft.ifft(-(k**2)*û).real\n    u += dt*(-u*du + nu*lap) # RK1 for\
    \ brevity\n```\n\n必须注意混叠问题：非线性乘积$u u_x$会产生超出截止频率$K$的傅里叶模态。2/3*去混叠规则*在逆FFT前将高频系数置零，抑制混叠误差并保持谱收敛性。\n\
    \n## 在流体动力学和天气建模中的应用\n\n谱离散化是某些最精确的湍流直接数值模拟（DNS）的基础。对于三重周期盒中的不可压缩Navier–Stokes方程，涡度公式\n\
    \n$$\\partial_t \\widehat{\\mathbf{w}}(\\mathbf{k}) = \\widehat{\\mathbf{v}} \\\
    times (i\\mathbf{k} \\times \\widehat{\\mathbf{v}}) - \\nu k^2 \\widehat{\\mathbf{w}}(\\\
    mathbf{k}), \\quad \\widehat{\\mathbf{v}}(\\mathbf{k}) = \\frac{i\\mathbf{k} \\\
    times \\widehat{\\mathbf{w}}(\\mathbf{k})}{k^2}$$\n\n完全在傅里叶空间中演化；现代GPU上$2048^3$规模的FFT可在$\\\
    mathrm{Re}_\\lambda \\approx 1000$时将Kolmogorov标度律保持到Taylor微尺度。\n\n在全球数值天气预报中，球面上的正压涡度方程采用球谐谱方法。设$\\\
    zeta(\\lambda, \\phi, t)$为涡度；展开为\n\n$$\\zeta(\\lambda, \\phi, t) = \\sum_{n=0}^{N}\
    \ \\sum_{m=-n}^{n} \\widehat{\\zeta}_n^m(t) Y_n^m(\\lambda, \\phi),$$\n\n其中$Y_n^m$为连带勒让德谐函数。水平导数转换为代数乘子$-n(n+1)$，半隐式时间步进在不缩小全局库朗数的情况下稳定快速重力波。业务中心（ECMWF、NOAA）采用八边形约化高斯网格推进至$N\
    \ \\approx 1023$（谱T2046）；由此产生的$\\sim 9$公里网格能以最小色散误差解析急流蜿蜒和热带气旋生成。\n\n谱元法结合了有限元的几何灵活性与指数收敛性：每个单元映射到$[-1,\
    \ 1]$并使用高阶勒让德或切比雪夫基函数。它们构成了NCAR的MPAS和DOE的E3SM等高分辨率大气模型的计算核心。\n\n## 关键见解\n\n- 切比雪夫和傅里叶基将微分转换为简单矩阵运算或代数因子，为光滑解提供指数精度。\n\
    - 去混叠和对非线性项的谨慎处理在强非线性流动中保持谱收敛性。\n- 在大规模地球物理模型中，谱方法高效处理光滑、近似地转的流动，而混合谱-有限体积方案捕捉局地锋面和地形。\n\
    - Python的`numpy.fft`和`pyfftw`提供对高性能FFT后端的直接访问，而`pyshtools`等包提供球谐变换，连接研究原型与生产级模拟。\n\
    \n## 8.5.3 数值方法中的并行计算\n\n当矩阵维度或网格分辨率超出单个处理器的内存和浮点吞吐量时，就需要*并行数值算法*。指导原则是用冗余算术换取通信减少，因为在现代集群上，单次双精度浮点运算成本约为$\\\
    mathcal{O}(1\\text{ ns})$，而通过网络传输相同数据量则需要$\\mathcal{O}(100\\text{ ns})$或更长时间。两种典型的数据布局是*区域分解*（将物理区域（有限差分或有限元节点）划分到各进程）和*块循环分布*（循环散布稠密矩阵以使Level\
    \ 3 BLAS内核饱和本地缓存）。\n\n**并行Krylov求解器** 给定具有$|A| > 10^9$个非零元素的稀疏线性系统$A\\mathbf{x}\
    \ = \\mathbf{b}$，共轭梯度法或GMRES的每次迭代需要稀疏矩阵向量乘（SpMV）和几次全局点积。SpMV通过行划分自然并行化；每个进程存储其本地行并与邻居交换halo值。延迟瓶颈在于$(\\\
    mathbf{r}, \\mathbf{r})$和$(\\mathbf{p}, A\\mathbf{p})$的全局归约。*流水线化*Krylov变体将归约与SpMV重叠以隐藏通信；或者，s步方法以额外本地浮点运算为代价融合$s$次连续迭代，在百亿亿次架构上实现近乎完美的弱扩展性。\n\
    \n**分布式内存上的FFT** 三维铅笔分解将$N^3$数组分割为$P_x \\times P_y$支铅笔。三维FFT先沿$z$方向执行本地一维FFT，通过全对全通信重新分配铅笔，再沿$y$方向重复，最后沿$x$方向。每次转置移动$N^3/\\\
    sqrt{P}$个复数——这是最优的，因为表面积与体积之比随铅笔厚度减小而降低。通过CUDA感知MPI保持GPU驻留：设备指针直接传入MPI_Isend，省略主机暂存。\n\
    \n**示例8.5.4（MPI并行点积（mpi4py））**\n\n```python\nfrom mpi4py import MPI; import numpy\
    \ as np\ncomm = MPI.COMM_WORLD\nN = 4_000_000 # per rank\nx = np.random.randn(N)\n\
    y = np.random.randn(N)\nlocal = np.dot(x, y)\nglobal_dot = comm.allreduce(local,\
    \ op=MPI.SUM)\nif comm.rank == 0:\n    print(\"<x,y> =\", global_dot)\n```\n\n\
    **高性能数据分析** 图处理框架（GraphBLAS、Dask）将稀疏邻接矩阵建模为分布式CSR块；PageRank变为并行SpMV不动点迭代。在大语言模型训练中，数据并行随机梯度下降在每个GPU上复制网络，通过AllReduce聚合梯度，而流水线并行和张量并行分别按层和矩阵维度分割计算。\n\
    \n## 在高性能计算和大数据分析中的应用\n\n*气候与天气* 全球谱元模型在$10^{11}$自由度上离散化原始方程；强扩展至30,000个GPU可将预报延迟减半。*天体物理学*\
