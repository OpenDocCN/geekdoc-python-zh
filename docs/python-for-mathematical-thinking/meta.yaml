    \ (Homogeneous Equation with Constant Coefficients) Solve\n\n$y'' - 3y' + 2y =\
    \ 0, \\quad y(0) = 1, \\quad y'(0) = 0$.\n\n```python\ny = sp.Function(\"y\")(x)\n\
    ode = sp.Eq(y.diff(x,2) - 3*y.diff(x) + 2*y, 0)\nsol = sp.dsolve(ode, y, ics={y.subs(x,\
    \ 0): 1, y.diff(x).subs(x, 0): 0})\nsp.pprint(sol)\n```\n\nThe solution is:\n\n\
