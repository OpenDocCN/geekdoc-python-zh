- md: "## 9.2 Chaos and Fractals\n\n### 9.2.1 The Mandelbrot Set\n\nThe quadratic-family\
    \ parameter plane exhibits a boundary whose filigreed spirals, dendrites, and\
    \ cardioids have transfixed mathematicians and artists alike since Benoît Mandelbrot’s\
    \ seminal 1980 image. Behind its visual splendour lies a rigorous object in complex\
    \ dynamics: the **Mandelbrot set**\n\n$$\\mathcal{M} = \\{c \\in \\mathbb{C} :\
    \ \\text{the orbit of } 0 \\text{ under } f_c(z) = z^2 + c \\text{ is bounded}\\\
    }.$$\n\nEquivalently, $\\mathcal{M}$ is the connectedness locus of the quadratic\
    \ Julia sets: $c \\in \\mathcal{M} \\iff J(f_c)$ is connected (Douady–Hubbard).\
    \ This subsection analyses its fractal geometry, shows how to generate high-resolution\
    \ renderings in Python, and ties its structure to the iteration theory of $f_c$.\n\
    \n### Fractal Geometry and Self-Similarity\n\n### Hausdorff Dimension\n\nThe boundary\
    \ $\\partial\\mathcal{M}$ is conjectured to have Hausdorff dimension 2 (Shishikura\
    \ proved $\\dim_H \\partial\\mathcal{M} = 2$), even though its area is zero and\
    \ its interior is compact. Portions of $\\partial\\mathcal{M}$ replicate at arbitrarily\
    \ small scales, embodying *self-similarity*. Zooms near *Misiurewicz points* (pre-periodic\
    \ parameters) or *Feigenbaum points* (period-doubling cusps) reveal micro-copies\
    \ of the whole set connected by filamentary “tendrils” whose widths scale geometrically.\n\
    \n### Douady–Hubbard Rays\n\nExternal angles $\\theta \\in \\mathbb{Q}/\\mathbb{Z}$\
    \ parameterise *external rays* of the complement $\\hat{\\mathbb{C}} \\setminus\
    \ \\mathcal{M}$ via the Böttcher map $\\Phi_c(z) \\sim z + O(1)$ as $|z| \\to\
    \ \\infty$. Landing of rays at rational angles organises hyperbolic components\
    \ (bulbs) by their rotation numbers and encodes the infinite self-similar combinatorics\
    \ (the “pinched” disk model).\n\n### Feigenbaum Scaling\n\nLet $c_\\infty \\approx\
    \ -1.4011551890$ be the accumulation point of period-doubling bulbs along the\
    \ real axis. In the vicinity of $z = 0$ for the map $g(z) = z^2 - 1.401155\\ldots$,\
    \ the rescaling $\\phi(z) = \\lambda^{-1}g^2(\\lambda z)$, $\\lambda \\approx\
    \ -1.543689\\ldots$ is conjugate to $g$: $\\phi = g$. This functional equation\
    \ implies geometric scaling by $\\lambda$ and underpins the universal Feigenbaum\
    \ constant $\\delta \\approx 4.669201\\ldots$ encountered earlier.\n\n### Rendering\
    \ the Mandelbrot Set in Python\n\nTo visualise $\\mathcal{M}$ we exploit the *escape-time\
    \ algorithm*: for each pixel centre $c \\in \\mathbb{C}$ iterate $z_{n+1} = z_n^2\
    \ + c$ with $z_0 = 0$; if $|z_n| > R$ (typically $R = 2$) before $n \\le N_{\\\
    max}$, the point lies outside $\\mathcal{M}$, and the escape index $n$ colours\
    \ the pixel. Points that never escape within the iteration budget are deemed candidates\
    \ for $\\mathcal{M}$ and coloured black (cf. Fig. 9.10).\n\n```python\nimport\
    \ numpy as np, matplotlib.pyplot as plt\ndef mandelbrot(xmin,xmax,ymin,ymax,res=1000,\
    \ Nmax=200, R=2):\n    x = np.linspace(xmin,xmax,res)\n    y = np.linspace(ymin,ymax,res)\n\
    \    C = x[:,None] + 1j*y[None,:]\n    Z, M = np.zeros_like(C), np.full(C.shape,\
    \ Nmax, dtype=int)\n    for n in range(Nmax):\n        mask = np.less(np.abs(Z),\
    \ R)\n        Z[mask] = Z[mask]**2 + C[mask]\n        M[mask & (np.abs(Z)>=R)]\
    \ = n\n    return x, y, M\n\nx,y,M = mandelbrot(-2.5, 1, -1.5, 1.5, res=1600,\
    \ Nmax=500)\nplt.imshow(M.T, extent=[x.min(),x.max(),y.min(),y.max()],\n     \
    \      cmap='inferno', origin='lower'); plt.axis('off'); plt.show()\n```\n\n**Fig.\
    \ 9.10** High-resolution escape-time rendering of the Mandelbrot set. Each pixel\
    \ represents a complex parameter $c = x + iy$; the colour encodes the iteration\
    \ count at which the orbit of 0 under $z \\mapsto z^2 + c$ escapes the disk of\
    \ radius 2 (black points never escape within the 500-step cutoff).\n\n### Distance\
    \ Estimation\n\nTo produce smooth shading, compute the potential\n\n$$d(c) \\\
    approx \\frac{\\log |z_n| |z_n| \\log |z_n|}{2|z_n| \\left| \\frac{dz_n}{dc} \\\
    right|}, \\quad \\frac{dz_{n+1}}{dc} = 2z_n \\frac{dz_n}{dc} + 1,$$\n\nyielding\
    \ a smooth escape-time proxy; map $d(c)$ to colour via $\\frac{1}{2}[1 + \\sin(\\\
    alpha \\log d(c) + \\phi)]$ for aesthetic palettes.\n\n### High-Precision Zooms\n\
    \nNear $c \\approx -0.75 + 0.1i$ magnifications $> 10^{10}$ demand arbitrary precision\
    \ arithmetic. mpmath supports multi-precision complex numbers; increase working\
    \ precision proportionally to magnification scale.\n\n```python\nimport mpmath\
    \ as mp\nmp.mp.dps = 80\nc0 = mp.mpc('-0.74543+0.11264j')\nz, dzdc = mp.mpc(0),\
    \ mp.mpc(0)\nfor n in range(2000):\n    dzdc = 2*z*dzdc + 1\n    z = z*z + c0\n\
    \    if abs(z)>2: break\ndist = abs(z)*mp.log(abs(z))/abs(dzdc)\nprint(\"distance\
    \ ≈\", dist)\n```\n\n### Complex Dynamics and the Mandelbrot Set\n\n### Quadratic\
    \ Polynomials\n\nFor $f_c(z) = z^2 + c$, the filled Julia set $K_c$ comprises\
    \ points with bounded forward orbit; the Julia set $J_c$ is its boundary. If $c\
    \ \\in \\mathcal{M}$, then $J_c$ is connected; otherwise it is a Cantor dust of\
    \ disconnected filaments.\n\n### Hyperbolic Components\n\nEach interior bulb of\
    \ $\\mathcal{M}$ corresponds to a parameter where $f_c$ possesses an attracting\
    \ cycle. The primary cardioid ($|c - \\frac{1}{4}| < \\frac{1}{4}$) parameterises\
    \ fixed points with multiplier $e^{i\\theta}$; bulbs attached via “antennae” represent\
    \ attracting cycles of higher period. The multiplier map $\\lambda(c) = f_c^{\\\
    circ p}(z_{\\text{attr}})$ provides a conformal coordinate on each component.\n\
    \n---\n\nThe Lorenz system\n\n$\\dot{x} = \\sigma(y - x), \\quad \\dot{y} = x(\\\
    rho - z) - y, \\quad \\dot{z} = xy - \\beta z$\n\nwith $(\\sigma, \\rho, \\beta)\
    \ = (10, 28, \\frac{8}{3})$ is the flagship. Its largest Lyapunov exponent is\
    \ positive ($\\lambda_1 \\approx 0.905$), Hausdorff dimension $D_H \\approx 2.06$,\
    \ and the return map of maxima of $z(t)$ mimics the logistic map (cf. Fig. 9.7).\n\
    \n```python\nsigma, rho, beta = 10., 28., 8/3\ndef lor(t, w): x,y,z=w; return\
    \ [sigma*(y-x), x*(rho-z)-y, x*y-beta*z]\nsol = solve_ivp(lor,[0,40],[1,1,1],max_step=.01)\n\
    plt.plot(sol.y[0], sol.y[2], lw=.3); plt.xlabel('x'); plt.ylabel('z'); plt.show()\n\
    ```\n\nKaplan–Yorke dimension $D_{KY} = k + \\sum_{i=1}^k \\lambda_i / |\\lambda_{k+1}|$\
    \ (with $\\lambda_i$ ordered) estimates the attractor dimension from computed\
    \ exponents.\n\n## Poincaré Maps and Recurrence Plots\n\nA **Poincaré section**\
    \ $\\Sigma$ transverse to the flow reduces continuous dynamics to a discrete map\
    \ $P : \\Sigma \\to \\Sigma$ by successive intersections. Stability of periodic\
    \ orbits reduces to eigenvalues of $DP$ (Floquet multipliers). For the forced\
    \ Duffing equation\n\n$\\ddot{x} + 0.2\\dot{x} - x + x^3 = 0.3 \\cos \\omega t,\
    \ \\quad \\omega = 1,$\n\ntaking $\\Sigma$ at $t = n2\\pi$ generates a map whose\
    \ attractor becomes fractal for driving amplitudes $> 0.28$.\n\nA **recurrence\
    \ plot** visualises times $i, j$ where the trajectory revisits a neighbourhood:\
    \ $R_{ij} = \\Theta(\\varepsilon - \\|x_i - x_j\\|)$. Diagonal lines indicate\
    \ periodic motion; scattered points signal chaos (cf. Fig. 9.8).\n\n```python\n\
    epsilon = 0.2\nX = sol.y.T[::10,:2] # 2D projection\nD = np.linalg.norm(X[:,None]-X,\
    \ axis=2)\nR = (D<epsilon).astype(int)\nplt.imshow(R, cmap='Greys', origin='lower');\
    \ plt.show()\n```\n\n## Hamiltonian Systems and Chaos\n\nHamiltonian flows $\\\
    dot{q}_i = \\partial_{p_i}H$, $\\dot{p}_i = -\\partial_{q_i}H$ preserve phase-space\
    \ volume (Liouville) and energy $H$. In two degrees of freedom ($n = 2$) the energy\
    \ surface is three-dimensional; regular motion lies on invariant tori parameterised\
    \ by action-angle variables $(I, \\theta)$.\n\nWhen an integrable Hamiltonian\
    \ $H_0$ is perturbed: $H = H_0 + \\varepsilon H_1$, KAM theory states that non-resonant\
    \ tori survive for small $\\varepsilon$, while resonant tori break, creating *homoclinic\
    \ tangles*. The standard map\n\n$\\theta_{n+1} = \\theta_n + I_{n+1} \\pmod{2\\\
    pi}, \\quad I_{n+1} = I_n + K \\sin \\theta_n \\pmod{2\\pi}$\n\nis area-preserving\
    \ and arises from a kicked rotor. For $K > K_c \\approx 0.9716$ the last invariant\
    \ circle breaks, and the map displays global chaos (cf. Fig. 9.9).\n\n```python\n\
    def standard_map(K, theta0, I0, N=500):\n    theta, I = theta0, I0\n    thetas,\
    \ Is = [], []\n    for _ in range(N):\n        I = (I + K*np.sin(theta)) % (2*np.pi)\n\
    \        theta = (theta + I) % (2*np.pi)\n        thetas.append(theta); Is.append(I)\n\
    \    return thetas, Is\nK = 1.2; theta,I = standard_map(K, 0.1, 0.1, 10000)\n\
    plt.scatter(theta, I, s=.2); plt.axis('equal'); plt.show()\n```\n\nMelnikov integrals\
    \ quantify transversal intersection of stable and unstable manifolds, certifying\
    \ chaos via the Smale–Birkhoff homoclinic theorem."
