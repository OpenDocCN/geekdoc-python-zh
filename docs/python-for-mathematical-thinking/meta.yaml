    \ $1\\%$。\n\n## 10.4 机器学习高级主题\n\n### 10.4.1 模型可解释性与可说明性\n\n复杂的学习器——深度网络、梯度提升树、核集成——通常优于透明模型，但类似于*黑箱*。可解释性寻求人类可理解的原理：哪些特征驱动了预测，输出对扰动有多敏感，以及是否存在虚假相关性。我们通过公理化归因、局部代理展开和全局重要性度量来形式化这些问题，并用简洁的Python代码说明每个方法。\n\
    \n#### SHAP值、LIME和特征重要性\n\n**SHAP (SHapley Additive exPlanations)**\n\n设 $f :\
