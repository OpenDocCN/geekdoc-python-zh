    # Bifurcation Theory and Phase Plane Analysis


    A **bifurcation** occurs when varying a parameter $\lambda$ alters the topological
    structure of equilibrium sets or their stability. We sketch the three canonical
    codimension-1 bifurcations for scalar ODEs and then extend to two-dimensional
    phase-plane dynamics.


    # Saddle-Node (Fold) Bifurcation


    $$\frac{dy}{dx} = f_\lambda(y) = \lambda - y^2.$$

    Equilibria $y^*_\pm = \pm\sqrt{\lambda}$ exist only for $\lambda > 0$; they coalesce
    and annihilate at $\lambda = 0$.


    # Transcritical Bifurcation


    $$\frac{dy}{dx} = f_\lambda(y) = \lambda y - y^2.$$

    Equilibria $y^*_1 = 0$ and $y^*_2 = \lambda$ exchange stability as $\lambda$ passes
    through 0.


    # Pitchfork (Supercritical)


    $$\frac{dy}{dx} = f_\lambda(y) = \lambda y - y^3.$$

    Stable branch $y^*_\pm = \pm\sqrt{\lambda}$ emerges for $\lambda > 0$, while $y^*
    = 0$ switches from stable ($\lambda < 0$) to unstable ($\lambda > 0$).


    **Example 6.1.8 (Numerical Bifurcation Diagram)** Plot equilibrium values vs.
    $\lambda$ for the pitchfork ODE:


    ```

    python

    λ = np.linspace(-1, 1, 400)

    y_stable = np.where(λ>0, np.sqrt(λ), np.nan)

    plt.plot(λ, 0*λ, ''k--'') # central branch

    plt.plot(λ, y_stable, ''b''); plt.plot(λ, -y_stable, ''b'')

    plt.xlabel("λ"); plt.ylabel("Equilibria"); plt.show()

    ```'
