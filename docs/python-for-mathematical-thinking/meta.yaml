    \ import acorr_ljungbox\nprint(acorr_ljungbox(model.resid, lags=[12], return_df=True))\n\
    ```\n\n## Principal Component Analysis (PCA) for Dimensionality Reduction\n\n\
    Given normalised $X \\in \\mathbb{R}^{n \\times p}$, PCA diagonalises the covariance\
    \ matrix $\\Sigma = \\frac{1}{n-1} X^T X$ into $\\Sigma = V \\Lambda V^T$, providing\
    \ orthogonal directions (principal components, PCs) ordered by variance (eigenvalues).\n\
    \n**Explained Variance** $\\lambda_k / \\sum_j \\lambda_j$ quantifies the share\
    \ of total variance captured by PC$_k$. Retain first $m$ PCs with $\\sum_{k \\\
    le m} \\lambda_k / \\sum_j \\lambda_j \\ge \\eta$ (e.g. $\\eta = 0.9$)."
