    ell-1)} = (W_\\ell^{\\mathrm{T}} \\delta^{(\\ell)}) \\odot \\phi'(Z^{(\\ell-1)}).$$\n\
    \n```python\ndef backward(Y, Z, A, W):\n    n = Y.shape[1]\n    δ = [A[-1] - Y]\
