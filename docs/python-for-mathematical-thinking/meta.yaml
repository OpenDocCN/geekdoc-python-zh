    \ partially ordered set $(L, \\leq)$ where every pair $(x, y)$ admits a least\
    \ upper bound $x \\vee y$ (*join*) and greatest lower bound $x \\wedge y$ (*meet*).\
    \ Finite lattices can be visualised via Hasse diagrams; distributive lattices\
    \ satisfy $x \\wedge (y \\vee z) = (x \\wedge y) \\vee (x \\wedge z)$.\n\nA **Boolean\
    \ algebra** is a distributive lattice with top $\\top$, bottom $\\bot$, and complementation\
    \ $\\neg$ such that $x \\vee \\neg x = \\top$ and $x \\wedge \\neg x = \\bot$.\
    \ Stone duality links Boolean algebras to Boolean spaces (totally disconnected\
    \ compact Hausdorff), revealing deep connections between logic and topology.\n\
