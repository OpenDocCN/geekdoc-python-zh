    # 6.3.3 Special Functions in ODEs and PDEs


    Linear differential equations with variable coefficients frequently admit solutions
    expressible in terms of *special functions*. These functions occur so ubiquitously—in
    electromagnetism, quantum mechanics, elasticity, geodesy—that they warrant a place
    in every mathematical tool-kit. We review two classical families: Bessel functions,
    arising from separable problems in cylindrical coordinates, and Legendre polynomials
    (together with their surface generalisation, spherical harmonics), which solve
    Laplace''s equation in spherical geometry. Throughout, we highlight orthogonality
    relations, completeness, recurrence identities, and computational illustrations.


    # Bessel Functions and Their Applications


    # Bessel''s Differential Equation


    $$x^2 y'''' + xy'' + (x^2 - \nu^2)y = 0, \quad \nu \in \mathbb{R}.$'
  - '[PAGE 243]


    Via Frobenius (regular singular point at $x = 0$) one obtains two linearly independent
    solutions:


    $$J_{\nu}(x) = \sum_{k=0}^{\infty} \frac{(-1)^k}{k! \Gamma(k + \nu + 1)} \left(\frac{x}{2}\right)^{2k+\nu},
    \quad Y_{\nu}(x) = \frac{J_{\nu}(x) \cos(\nu \pi) - J_{-\nu}(x)}{\sin(\nu \pi)}
    \quad (\nu \notin \mathbb{Z}),$$


    where $J_{\nu}$ is *Bessel of the first kind*, $Y_{\nu}$ the *second kind*.


    # **Orthogonality on $[0, R]$** Zeros $j_{\nu,n}$ of $J_{\nu}$ satisfy


    $$\int_0^R x J_{\nu}\left(\frac{j_{\nu,m} x}{R}\right) J_{\nu}\left(\frac{j_{\nu,n}
    x}{R}\right) dx = \frac{R^2}{2} [J_{\nu+1}(j_{\nu,n})]^2 \delta_{mn}.$$


    Hence $\{J_{\nu}(j_{\nu,n} x/R)\}_{n=1}^{\infty}$ forms an orthogonal basis with
    weight $x$.


    # **Example 6.3.9 (Circular Membrane Eigenmodes)** Vibrations of a drum of radius
    $a$ obey $\nabla^2 u + \lambda u = 0$ with $u|_{r=a} = 0$. In polar coordinates,
    separation $u(r, \theta) = R(r)\Theta(\theta)$ leads to radial equation $R''''
    + r^{-1} R'' + (\lambda - \frac{m^2}{r^2}) R = 0$; boundedness at $r = 0$ selects
    $R(r) = J_m(k_{mn} r)$, where eigenvalues $k_{mn} = j_{m,n}/a$. Fundamental frequency
    corresponds to $m = 0, n = 1$.


    ```

    python

    import sympy as sp

    m,n,a = 0,1,1

    j01 = sp.nroots(sp.besselj(m, sp.symbols(''x'')), 5)[1] # first positive root

    \omega = j01/a

    print(f"Fundamental angular frequency \omega_{01} = {\omega:.6f}")

    ```


    # **Recurrence Relations**


    $$J_{\nu-1}(x) + J_{\nu+1}(x) = \frac{2\nu}{x} J_{\nu}(x), \quad 2 J_{\nu}''(x)
    = J_{\nu-1}(x) - J_{\nu+1}(x).$$


    These underlie fast upward/downward recursion schemes for high-order evaluations.


    # **Asymptotics** For $|x| \gg |\nu|^2$, $J_{\nu}(x) \sim \sqrt{\frac{2}{\pi x}}
    \cos(x - \frac{\nu \pi}{2} - \frac{\pi}{4})$. Uniform asymptotics render Bessel
    functions indispensable in WKB analysis.


    # **Heat Conduction in a Cylinder** Solution to $u_t = \kappa \nabla^2 u$ inside
    $r < a$, $u(a, t) = 0$, expands as


    $$u(r, t) = \sum_{m=0}^{\infty} \sum_{n=1}^{\infty} A_{mn} e^{-\kappa (j_{m,n}/a)^2
    t} J_m(j_{m,n} r/a) \cos(m \theta).$$


    Coefficients $A_{mn}$ follow from orthogonality. Time decay rate tied to smallest
    zero $j_{0,1}$.'
