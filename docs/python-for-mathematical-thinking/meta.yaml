    \ indices to attain $O(n \\log |D_j|)$ overall.\n\n### Working with Time Series\
    \ Data\n\nA univariate time series is a mapping $x : \\mathbb{T} \\to \\mathbb{R}$\
    \ where $\\mathbb{T}$ is totally ordered. Pandas embeds $\\mathbb{T}$ in the DatetimeIndex\
    \ object $\\mathcal{T} = (t_0, \\dots, t_n)$ that stores nanosecond resolution\
    \ integers. Resampling operator\n\n$$\\mathcal{R}_{\\uparrow \\downarrow}^{\\\
    Delta}[x](t) = \\begin{cases} x(t) & \\text{if } t \\in \\mathcal{T}, \\ \\text{agg\
    \ } x(t - \\Delta, t) & \\text{otherwise}, \\end{cases}$$\n\ncomputes period aggregates\
