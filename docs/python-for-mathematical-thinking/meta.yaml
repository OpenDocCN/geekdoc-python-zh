    # 8.4.3 Singular Value Decomposition (SVD)


    For any real $m \times n$ matrix $A$ there exist orthogonal matrices $U \in \mathbb{R}^{m
    \times m}$ and $V \in \mathbb{R}^{n \times n}$ together with a diagonal matrix
    $\Sigma = \text{diag}(\sigma_1, \dots, \sigma_r, 0, \dots)$ whose non-negative
    diagonal entries satisfy $\sigma_1 \ge \sigma_2 \ge \dots \ge \sigma_r > 0$ such
    that


    $$A = U \Sigma V^\top$$


    This *singular value decomposition* exposes the action of $A$ as an orthogonal
    rotation $V^\top$, a stretch by singular values $\sigma_i$ along mutually orthogonal
    directions, and a second rotation $U$. The rank $r$ equals the number of non-zero
    $\sigma_i$. Because $\sigma_i^2$ are the eigenvalues of $A^\top A$ and $\sigma_i
    \sigma_j = 0$ for $i \neq j$, the SVD inherits the numerical stability properties
    of orthogonal similarity.


    **Optimality of Low-Rank Truncation** For $k < r$ define $A_k = U_{:, 1:k} \Sigma_{1:k,
    1:k} V_{:, 1:k}^\top$. Eckart–Young–Mirsky gives


    $$\|A - A_k\|_2 = \sigma_{k+1}, \quad \|A - A_k\|_F = \left( \sum_{i=k+1}^r \sigma_i^2
    \right)^{1/2},$$


    so $A_k$ is the *best* rank–$k$ approximation in both spectral and Frobenius norms.


    # Applications in Data Compression and Principal Component Analysis (PCA)


    PCA via SVD


    Given data matrix $X \in \mathbb{R}^{m \times n}$ whose rows are centred observations,
    the covariance is $C = \frac{1}{m-1} X^\top X$. The right singular vectors $\mathbf{v}_i$
    of $X$ are the eigenvectors of $C$ and hence directions of maximal variance (principal
    components), while singular values relate to explained variance: $\text{Var}(\mathbf{x}
    \cdot \mathbf{v}_i) = \sigma_i^2 / (m - 1)$.'
