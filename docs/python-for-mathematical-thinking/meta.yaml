    \ and even piecewise-defined functions. This subsection explores the core differentiation\
    \ operators, rules for composition, and strategies for simplifying the resulting\
    \ expressions.\n\n### Differentiation Rules and Operators\n\nLet $f, g : \\mathbb{R}\
    \ \\to \\mathbb{R}$ be differentiable functions and $c \\in \\mathbb{R}$. Symbolic\
    \ differentiation applies the following basic rules:\n\n$$\\frac{d}{dx}(cf(x))\
    \ = cf'(x) \\quad \\text{(linearity)}$$\n$$\\frac{d}{dx}(f(x) + g(x)) = f'(x)\
