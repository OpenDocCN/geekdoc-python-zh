    \ methods · Stochastic DEs\n\n## 6.1 Ordinary Differential Equations (ODEs)\n\n\
    An **ordinary differential equation** relates an unknown function $y : I \\subseteq\
    \ \\mathbb{R} \\to \\mathbb{R}$ to its derivatives with respect to a single independent\
    \ variable, conventionally denoted $x$. A *first-order* ODE involves only $y$\
    \ and its first derivative $y'$. Throughout this section we assume all functions\
    \ are sufficiently smooth to justify the operations performed.\n\n### 6.1.1 First-Order\
    \ ODEs\n\nTypical physical examples arise from exponential growth, radioactive\
    \ decay, Newtonian cooling, and RC-circuit discharges, all of which are governed\
    \ by first-order laws. We concentrate on three analytic solution techniques: separability,\
    \ linearity, and exactness via integrating factors. Each subsection ends with\
    \ computational verifications in Python/SymPy to embed symbolic manipulation into\
    \ the theoretical workflow.\n\n## Separable and Linear ODEs\n\n**Separable Equations**\
    \ An ODE is *separable* if it can be written\n\n$$\\frac{dy}{dx} = g(x) h(y),$$\n\
    \nallowing variables to be separated: $\\frac{dy}{h(y)} = g(x) dx$. Integrating\
    \ both sides yields the *implicit* solution\n\n$$\\int \\frac{dy}{h(y)} = \\int\
    \ g(x) dx + C.$$\n\n### Example 6.1.1 (Logistic Growth)\n\n$$\\frac{dy}{dx} =\
    \ ry\\left(1 - \\frac{y}{K}\\right), \\quad r, K > 0.$$\n\nSeparate:\n\n$$\\int\
    \ \\frac{dy}{y(1 - y/K)} = r \\int dx.$$\n\nPartial fractions and integration\
    \ furnish the explicit solution\n\n$$y(x) = \\frac{K}{1 + Ae^{-rx}}, \\quad A\
    \ = \\frac{K - y_0}{y_0}.$$\n\n```python\nimport sympy as sp\nx,r,K,y0 = sp.symbols('x\
    \ r K y0', positive=True)\ny = K/(1+((K-y0)/y0)*sp.exp(-r*x))\nsp.diff(y, x).simplify()\n\
    ```\n\nSymbolic differentiation reconfirms the logistic ODE.\n\n### Linear First-Order\
    \ Equations\n\n$$\\frac{dy}{dx} + P(x) y = Q(x).$$\n\nMultiplying by the integrating\
    \ factor $\\mu(x) = e^{\\int P(x) dx}$ turns the left side into $\\frac{d}{dx}[\\\
    mu(x)y] = \\mu(x)Q(x)$, hence\n\n$$y(x) = \\mu(x)^{-1}\\left[\\int \\mu(x) Q(x)\
    \ dx + C\\right].$$\n\n**Example 6.1.2 (RC-Circuit Discharge)**\n\n$$\\frac{dV}{dt}\
    \ + \\frac{1}{RC}V = 0, \\quad V(0) = V_0.$$\n\nSet $P = 1/(RC)$, $Q = 0$, $\\\
    mu = e^{t/(RC)}$, yielding $V(t) = V_0 e^{-t/(RC)}$.\n\n**Example 6.1.3 (Inhomogeneous\
    \ Cooling)**\n\n$$\\frac{dT}{dt} + kT = kT_e, \\quad T(0) = T_0.$$\n\nHere $P\
    \ = k$, $Q = kT_e$, so $T(t) = T_e + (T_0 - T_e)e^{-kt}$. Plot for $T_e = 20^\\\
    circ\\text{C}$, $T_0 = 95^\\circ\\text{C}$, $k = 0.15 \\text{ min}^{-1}$ (cf.\
    \ Fig. 6.1):\n\n```python\nimport numpy as np, matplotlib.pyplot as plt\nTe, T0,\
    \ k = 20, 95, .15\nt = np.linspace(0, 40, 400)\nT = Te + (T0-Te)*np.exp(-k*t)\n\
    plt.plot(t, T); plt.xlabel(\"t (min)\"); plt.ylabel(\"Temperature (degree C)\"\
    )\nplt.show()\n```\n\n## Exact ODEs and Integrating Factors\n\nConsider an autonomous\
    \ differential relation\n\n$M(x, y) \\, dx + N(x, y) \\, dy = 0$.\n\nIf there\
    \ exists a scalar potential $F$ such that $dF = M \\, dx + N \\, dy$, the equation\
    \ is **exact** and the solution is given implicitly by $F(x, y) = C$.\n\n**Exactness\
    \ Test** $M \\, dx + N \\, dy$ is exact on a simply connected domain when\n\n\
    $\\frac{\\partial M}{\\partial y} = \\frac{\\partial N}{\\partial x}$.\n\n###\
    \ Example 6.1.4 (Exact Form)\n\n$(2xy + \\sin y) \\, dx + (x^2 + \\cos y) \\,\
    \ dy = 0$.\n\nSince $\\partial M/\\partial y = 2x+\\cos y$ and $\\partial N/\\\
    partial x = 2x+\\cos y$, the equation is exact. Integrate $M$ with respect to\
    \ $x$:\n\n$F(x, y) = x^2 y + x \\sin y + \\phi(y)$,\n\ndifferentiate $F$ wrt $y$\
    \ and match $N$ to find $\\phi'(y) = 0$. Solution: $x^2 y + x \\sin y = C$.\n\n\
    ```python\nx,y = sp.symbols('x y')\nM = 2*x*y + sp.sin(y)\nN = x**2 + sp.cos(y)\n\
    sp.integrate(M, x) # x**2*y + x*sin(y)\n```\n\n### Integrating Factors\n\nIf not\
    \ exact, find a function $\\mu(x, y)$ making $\\mu M \\, dx + \\mu N \\, dy$ exact.\n\
    \n### Example 6.1.5 (Linear Integrating Factor Revisited)\n\n$y \\, dx + x \\\
    , dy = 0$\n\nis not exact ($\\partial M/\\partial y = 1$, $\\partial N/\\partial\
    \ x = 1$—actually equal!) but trivial. Instead examine\n\n$(2xy - y^3) \\, dx\
    \ + (x^2 - 3xy^2) \\, dy = 0$.\n\nNot exact initially (compute cross-partials).\
    \ An integrating factor of the form $\\mu(y) = y^{-3}$ yields\n\n$(2x - y^2) \\\
    , dx + (x^2 y^{-3} - 3x/y) \\, dy = 0$,\n\nwhich is exact; integrating recovers\
    \ $x^2 y^{-3} - y^{-2} = C$."
