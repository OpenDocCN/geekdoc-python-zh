    \   环：起点和终点相同的路径。\n-   连通：每一对顶点都是可达的。\n-   树：连通的无环图。\n-   带权图：边具有关联的权重（成本）。\n\n\
    **示例 4.4.1（简单无向图）** 设 $V = \\{1, 2, 3\\}$，$E = \\{\\{1, 2\\}, \\{2, 3\\}\\}$。这可以可视化为一条路径：$1\
    \ \\leftrightarrow 2 \\leftrightarrow 3$。\n\n**示例 4.4.2（带权重的有向图）** 设 $V = \\{A,\
