  md: "# 8.2.6 Solving Nonlinear Systems\n\nSystems of nonlinear equations arise whenever\
    \ multiple coupled balances—mass, momentum, energy, chemical potential—must vanish\
    \ simultaneously. Let\n\n$F : \\mathbb{R}^n \\longrightarrow \\mathbb{R}^n, \\\
    quad \\mathbf{x}^* \\text{ satisfies } F(\\mathbf{x}^*) = \\mathbf{0}.$\n\nDirect\
    \ analytical solutions are rare; iterative schemes dominate practice. We develop\
    \ fixed-point and Newton-type solvers, then show how continuation tracks solution\
    \ branches through parameter space to uncover bifurcations in engineering models.\n\
    \n# Fixed-Point Iteration and Newton's Method\n\n# Fixed-Point Maps\n\nRewrite\
    \ $F(\\mathbf{x}) = \\mathbf{0}$ as $\\mathbf{x} = \\Phi(\\mathbf{x})$ and iterate\n\
    \n$\\mathbf{x}^{(k+1)} = \\Phi(\\mathbf{x}^{(k)})$.\n\nIf $\\Phi$ is a contraction\
    \ on a closed convex set ($\\|\\Phi(\\mathbf{u}) - \\Phi(\\mathbf{v})\\| \\le\
    \ \\lambda\\|\\mathbf{u} - \\mathbf{v}\\|$, $0 < \\lambda < 1$), Banach's theorem\
    \ guarantees unique fixed point and linear convergence $\\|\\mathbf{x}^{(k)} -\
    \ \\mathbf{x}^*\\| \\le \\lambda^k\\|\\mathbf{x}^{(0)} - \\mathbf{x}^*\\|$. The\
    \ practical difficulty is crafting $\\Phi$ so that the spectral radius $\\rho(J_{\\\
    Phi}(\\mathbf{x}^*)) < 1$.\n\n# Multivariate Newton\n\nThe Newton step solves\
    \ the linearised system $J(\\mathbf{x}_k)\\mathbf{s}_k = -F(\\mathbf{x}_k)$ and\
    \ sets $\\mathbf{x}_{k+1} = \\mathbf{x}_k + \\mathbf{s}_k$. Quadratic convergence\
    \ requires $J$ nonsingular at the root and a starting point sufficiently close;\
    \ a *damped* update $\\mathbf{x}_{k+1} = \\mathbf{x}_k + \\lambda_k\\mathbf{s}_k$\
    \ with $\\lambda_k \\in (0, 1]$ chosen by backtracking or line-search extends\
    \ global convergence.\n\n```\nimport numpy as np, scipy.linalg as la\n\ndef newton_system(F,\
    \ J, x0, tol=1e-12, max_iter=20):\n    x = np.array(x0, dtype=float)\n    for\
    \ k in range(max_iter):\n        Fx = F(x)\n        if la.norm(Fx, np.inf) < tol:\n\
    \            return x, k\n        s = la.solve(J(x), -Fx)\n        # Armijo backtracking\
    \ line-search\n        λ = 1.0\n        while la.norm(F(x + λ*s), np.inf) > (1-1e-4*λ)*la.norm(Fx,\
    \ np.inf):\n            λ *= 0.5\n        x += λ*s\n    raise RuntimeError(\"\
    no convergence\")\n```"
