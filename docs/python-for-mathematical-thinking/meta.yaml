    \ = central_diff(f, 1.0)\nexact = 1 / 1.0\nprint(f\"Approximation: {approx}, Error:\
    \ {abs(approx - exact)}\")\n```\n\nFor $h = 10^{-5}$, the result is accurate to\
    \ about 8 decimal places, depending on the stability of the surrounding code.\n\
    \n## Automatic Differentiation with autograd\n\nAutomatic differentiation (AD)\
    \ computes exact derivatives to machine precision by decomposing a function into\
    \ a sequence of primitive operations and applying the chain rule systematically.\
    \ Unlike symbolic differentiation, AD operates at the level of values rather than\
    \ expressions, and unlike numerical differentiation, it does not suffer from subtraction\
    \ cancellation.\n\nLet $f(x) = \\sin(x) \\cdot \\exp(x^2)$. To compute $f'(x)$\
    \ at $x = 1$, we can use the reverse-mode AD provided by autograd:\n\n```python\n\
    import autograd.numpy as np\nfrom autograd import grad\n\nf = lambda x: np.sin(x)\
    \ * np.exp(x**2)\ndf = grad(f)\nprint(df(1.0))\n```\n\n**How It Works** autograd\
    \ rewrites the computational graph at runtime and propagates dual values through\
    \ each operation. For a composition $f = f_n \\circ \\cdots \\circ f_1$, the reverse-mode\
    \ computes derivatives in reverse, applying the chain rule:\n\n$$\\frac{df}{dx}\
    \ = \\frac{df_n}{df_{n-1}} \\cdots \\frac{df_1}{dx}.$$\n\nReverse-mode is efficient\
    \ for scalar-valued functions with high-dimensional input, such as loss functions\
    \ in machine learning; forward-mode is better for high-dimensional outputs.\n\n\
    ## Error and Stability Analysis\n\nLet us model the total error in a finite-difference\
    \ scheme as\n\n$$E(h) = E_{\\text{trunc}}(h) + E_{\\text{round}}(h),$$\n\nwhere\
    \ $E_{\\text{trunc}}(h) = \\mathcal{O}(h^p)$ is the truncation error (due to Taylor\
    \ remainder) and $E_{\\text{round}}(h) = \\mathcal{O}(\\varepsilon / h)$ is the\
    \ round-off error (due to machine precision $\\varepsilon \\approx 2^{-52}$ in\
    \ double precision).\n\nThe optimal step size $h^*$ minimises the total error:\n\
    \n$$h^* = \\left( \\frac{p \\varepsilon}{C} \\right)^{1/(p+1)},$$\n\nwhere $C$\
    \ is the bound on the higher-order derivatives appearing in the truncation.\n\n\
    ### Example 3.1.2 (Stability of Forward Difference for $f(x) = \\sqrt{x}$)\n\n\
    ```python\nimport numpy as np\nimport matplotlib.pyplot as plt\n\nf = np.sqrt\n\
    df_exact = lambda x: 1 / (2 * np.sqrt(x))\nx0 = 1.0\nh_values = np.logspace(-16,\
    \ -1, 200)\nerrors = [abs((f(x0 + h) - f(x0)) / h - df_exact(x0)) for h in h_values]\n\
    \nplt.loglog(h_values, errors)\nplt.xlabel(\"h\")\nplt.ylabel(\"Absolute error\"\
    )\nplt.title(\"Forward difference error for $f(x) = \\sqrt{x}$ at $x = 1$\")\n\
    plt.grid(True)\nplt.show()\n```\n\nThis plot exhibits a characteristic U-shape:\
    \ error decreases with $h$ due to improved approximation, then increases due to\
    \ round-off. The minimum corresponds to the optimal step size $h^* \\sim \\varepsilon^{1/2}$\
    \ for forward differences (since $p = 1$).\n\n## Stability Considerations\n\n\
    - Differencing operations are ill-conditioned: computing $f(x+h) - f(x)$ for small\
    \ $h$ involves subtracting nearly equal quantities, potentially leading to catastrophic\
    \ cancellation.\n- Choosing $h$ too small *increases* error due to finite machine\
    \ precision; this trade-off must be balanced algorithmically.\n- Automatic differentiation\
    \ is numerically stable by design but can be computationally intensive if nested\
    \ gradients or loops are involved.\n\nNumerical differentiation enables the approximation\
    \ of derivatives when analytic forms are unavailable, but its precision is limited\
