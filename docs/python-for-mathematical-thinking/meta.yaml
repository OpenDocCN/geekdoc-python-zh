    \ numpy sympy\n   conda activate calculus\n   \n   Useful when binary compatibility\
    \ with MKL or CUDA is needed.\n3. pipx for globally installing isolated command-line\
    \ tools (e.g. jupyter).\n\nA requirements.txt or environment.yml should accompany\
    \ each chapter's source to encode the exact package versions $(v_1, \\dots, v_k)\
    \ \\in \\mathbb{N}^k$, making the computational narrative portable across machines.\n\
    \n# 1.2.2 Python Syntax and Semantics\n\n# Variables, Expressions, and Statements\n\
    \nA variable in Python is not a labelled memory cell but a binding from an identifier\
    \ to an object residing on the heap. The assignment statement\n\n```\nx = 3\n\
    ```\n\ncreates a reference from the name x to the singleton integer object whose\
    \ value is 3. Subsequent rebinding merely redirects the name—they do not mutate\
    \ the integer, which is immutable. Equality == invokes the object's __eq__ method,\
    \ whereas identity is compares memory addresses; thus, (2 is 1+1) may be True\
    \ for small integers because of CPython's internal integer pool.\n\nAn expression\
    \ is any syntactic form that yields a value. Every expression has a type τ drawn\
    \ from the lattice of built-in or user-defined classes. By contrast, a statement\
    \ performs an action—assignment, flow control, import—but evaluates to None. Consider\
    \ the list-comprehension identity\n\n$$[x^2]_{x=1}^n = [(x := k)^2]_{k=1}^n,$$\n\
    \nwhere the walrus operator := binds the target within the expression, melding\
    \ imperative and functional styles."
