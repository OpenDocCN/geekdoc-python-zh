    # Stability and Convergence of Numerical Methods


    **Von Neumann Analysis** Assume mode $e^{ikj\Delta x}$; amplification factor $G(k)$
    yields stability when $|G(k)| \le 1$ for all $k$. FTCS for heat: $G = 1 - 4\sigma
    \sin^2(k\Delta x/2) \implies \sigma \le \frac{1}{2}$.


    **Consistency + Stability** $\implies$ **Convergence (Lax Equivalence)** For linear
    initial-value PDEs with well-posedness, if truncation error $\tau = O((\Delta
    x)^p, (\Delta t)^q)$ and scheme is stable, global error $e = O((\Delta x)^{p-1},
    (\Delta t)^{q-1})$.


    **$L$-Stability for Stiff Parabolic Problems** Implicit $\theta$-scheme $u^{n+1}
    = u^n + h[(1 - \theta)Au^n + \theta Au^{n+1}]$ is $A$-stable for $\theta \ge \frac{1}{2}$
    and $L$-stable (damps high-frequency modes) iff $\theta = 1$ (backward Euler).


    **Dispersion and Dissipation** Wave equation discretisations trade phase error
    vs. numerical damping; spectral schemes have minimal dispersion but may require
    filtering to stabilise nonlinear shocks (e.g. 2/3 de-aliasing).


