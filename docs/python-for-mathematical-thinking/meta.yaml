  md: "# Secant Method and False Position Method\n\nSecant Method (Order $\\varphi\
    \ \\approx 1.618$)\n\nStarting with distinct points $x_{k-1}, x_k$, the secant\
    \ iteration\n\n$$x_{k+1} = x_k - f(x_k) \\frac{x_k - x_{k-1}}{f(x_k) - f(x_{k-1})}$$\n\
    \napproximates $f'(x_k)$ by the *secant slope*. Under the same hypotheses as Newton\
    \ (simple root $r$, $f'(r) \\neq 0$) and $x_0, x_1$ sufficiently close to $r$,\
    \ the error satisfies $e_{k+1} \\approx C e_k^{\\varphi}$ with $\\varphi = \\\
    frac{1}{2}(1 + \\sqrt{5})$, super-linear but sub-quadratic. Each update costs\
    \ one function evaluation, so its *asymptotic efficiency index* $p^{1/c}$ ($p$\
    \ = order, $c$ = evaluations) equals $2^{1/1.618}$, beating Newton's $2^{1/2}$\
    \ in evaluation-limited regimes.\n\nFalse Position (regula falsi)\n\nLike bisection,\
    \ false position preserves bracketing yet updates only the endpoint where the\
    \ sign agrees with $f(x_{k+1})$:\n\n$$x_{k+1} = b_k - f(b_k) \\frac{b_k - a_k}{f(b_k)\
    \ - f(a_k)}.$\n\nAlthough it can stagnate when one endpoint \"sticks\", *modified*\
    \ variants (Illinois, Anderson–Björck) scale the stationary function value to\
    \ restore linear convergence comparable to bisection but with fewer iterations.\n\
    \n**Example 8.1.3 (Secant vs. Newton)** Solve $f(x) = \\cos x - x$ in $(0, 1)$.\
    \ With $x_0 = 0$, $x_1 = 1$ the secant method converges in 6 iterations, Newton\
    \ (starting at $x_0 = 0.5$) in 4; each uses six function evaluations.\n\n```\n\
    import numpy as np\ndef secant(f, x0, x1, tol=1e-12, max_iter=30):\n    for k\
    \ in range(max_iter):\n        x2 = x1 - f(x1)*(x1-x0)/(f(x1)-f(x0))\n       \
    \ if abs(x2-x1) < tol: return x2, k+1\n        x0, x1 = x1, x2\n    raise RuntimeError\n\
    root, iters = secant(lambda x: np.cos(x)-x, 0.0, 1.0)\n```\n\n# Brent's Method\
    \ and Hybrid Techniques\n\nBrent's algorithm (`scipy.optimize.brentq`) melds bisection,\
    \ secant, and inverse-quadratic interpolation:\n\n$$IQI: \\quad x_{k+1} = u f(b_k)f(c_k)\
    \ + v f(a_k)f(c_k) + w f(a_k)f(b_k),$$"
