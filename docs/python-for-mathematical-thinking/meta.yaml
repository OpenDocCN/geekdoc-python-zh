    ratio and forecast-skill curves provide complementary diagnostics for selecting
    $(m, \tau)$.


    # False-Nearest-Neighbour Criterion


    A **false nearest neighbour** (FNN) is a point that appears close to a reference
    state in an $m$-dimensional embedding but separates to a large distance when the
    embedding dimension is increased to $m+1$. Formally, let $\mathbf{y}_n^{(m)}$
    be a reference and $\mathbf{y}_{\text{NN}}^{(m)}$ its nearest neighbour. Define
    the squeezing ratio


    $$R_n^{(m)} = \frac{\|x_{n-(m)\tau} - x_{\text{NN}-(m)\tau}\|}{\|\mathbf{y}_n^{(m)}
    - \mathbf{y}_{\text{NN}}^{(m)}\|}.$$


    If $R_n^{(m)} > \varepsilon_{\text{FNN}}$ (typically $\varepsilon_{\text{FNN}}
    \in [10, 15]$), the pair is deemed false. The *FNN fraction* $\phi_m = \frac{\#\text{false
    neighbours}}{\#\text{total neighbours}}$ plummets to $\approx 0$ at the minimal
    adequate dimension $m^*$ (cf. Fig. 9.14).'
- md: "## Predictability Horizons and Forecast Skill\n\nOnce $(m, \\tau)$ are fixed,\
    \ local predictors quantify skill and infer the *predictability horizon*. Given\
    \ a query vector $\\mathbf{y}_n$, locate its $k$ nearest neighbours and evolve\
    \ them forward $\\Delta t$ steps; the forecast is the average of their images.\
    \ Denote the forecast error\n\n$$\\varepsilon(\\Delta t) = \\left\\| x_{n+\\Delta\
    \ t} - \\frac{1}{k} \\sum_{j=1}^{k} x_{\\text{NN}(j)+\\Delta t} \\right\\|.$$\n\
    \nDefine the skill metric $S(\\Delta t) = 1 - \\varepsilon(\\Delta t)/\\sigma_x$,\
    \ where $\\sigma_x$ is the signal standard deviation. The **predictability horizon**\
    \ $T_p$ satisfies $S(T_p) = S_{\\text{crit}}$ (e.g., 0.5) (cf. Fig. 9.15).\n\n\
    ```python\ndef horizon(x, τ, m, k=10, Scrit=0.5):\n    N = len(x) - m*τ - 200\n\
    \    Y = np.column_stack([x[i:N+i] for i in range(0, m*τ, τ)])\n    σ = np.std(x)\n\
    \    tree = ss.cKDTree(Y)\n    Δmax, skill = 1000, []\n    for Δ in range(1, Δmax):\n\
    \        errs = []\n        for n in range(N-Δ):\n            dist, idx = tree.query(Y[n],\
    \ k+1)\n            nn = idx[1:] # exclude self\n            pred = np.mean(x[nn+Δ])\n\
    \            errs.append(np.abs(pred - x[n+Δ]))\n        skill.append(1 - np.mean(errs)/σ)\n\
    \        if skill[-1] < Scrit: return Δ, skill\n    return Δmax, skill\n```\n\n\
    ```python\nTp, S = horizon(x, τ=15, m=5, Scrit=0.5)\nplt.plot(S); plt.axhline(0.5,c='r');\
    \ plt.xlabel('Δt'); plt.ylabel('S'); plt.show()\n```\n\nFor the Lorenz data ($\\\
    Delta t = 0.02$ time unit per index) one finds $T_p \\approx 40$ steps, coinciding\
    \ with $\\lambda_{\\max}^{-1} \\ln(\\sigma/\\delta_0)$ where $\\lambda_{\\max}\
    \ \\approx 0.9$ and $\\delta_0$ is the neighbour radius.\n\n## Model Order vs.\
    \ Skill\n\nIncreasing $m$ beyond $m^*$ often *reduces* skill due to the curse\
    \ of dimensionality, despite topological correctness. Conversely, too small $m$\
    \ inflates false neighbours, corrupting forecasts. Empirical practice therefore\
    \ selects the smallest $m$ with $\\phi_m < \\phi_{\\text{tol}}$ and validates\
    \ via cross-validated skill curves.\n\n## Multi-step Shadows\n\nIterating one-step\
    \ local predictors compounds error; directly training $\\Delta$-step models can\
    \ extend skill up to twice the Lyapunov horizon. Reservoir-computing surrogates\
    \ (previous subsection) automate this by evolving hidden states without explicit\
    \ embedding, yet the embedding diagnostics remain invaluable for hyper-parameter\
    \ tuning.\n\n## 9.6 Complex Systems and Nonlinear Dynamics\n\n### 9.6.1 Lyapunov\
    \ Exponents and Strange Attractors\n\nThe defining signature of a complex deterministic\
    \ system is the coexistence of order and unpredictability: trajectories may evolve\
    \ on a geometrically thin invariant set—the *strange attractor*—yet small perturbations\
    \ grow exponentially fast as quantified by positive Lyapunov exponents. When the\
    \ largest exponent $\\lambda_{\\max} > 0$, the attractor cannot be a smooth manifold\
    \ of integer dimension; instead its fractal nature is exposed by the Kaplan–Yorke\
    \ relation $D_{KY} = k + \\frac{\\sum_{i=1}^k \\lambda_i}{|\\lambda_{k+1}|}$,\
    \ where $k$ is the maximal index such that the partial sum of ordered exponents\
    \ remains non-negative. For the canonical Lorenz flow at $(\\sigma, \\rho, \\\
    beta) = (10, 28, 8/3)$ one obtains $(\\lambda_1, \\lambda_2, \\lambda_3) \\approx\
    \ (0.905, 0, -14.57)$ and hence $D_{KY} \\approx 2.06$, corroborating box-counting\
    \ estimates. The attractor's unstable foliation stretches trajectories, while\
    \ a contracting foliation continually folds phase-space volume back into a bounded\
    \ region, yielding the characteristic butterfly geometry and broad-band power\
    \ spectrum that survive under $C^1$-small perturbations.\n\n### Example 9.6.1\
    \ (Global Lyapunov Spectrum by QR Integration)\n\n```python\nimport numpy as np,\
    \ scipy.linalg as la, scipy.integrate as ivp\nσ, ρ, β = 10., 28., 8/3\ndef f(t,X):\
    \ x,y,z=X; return [σ*(y-x), x*(ρ-z)-y, x*y-β*z]\ndef J(X): x,y,z=X;\n    return\
    \ np.array([[-σ, σ, 0], [ρ-z, -1, -x], [y, x, -β]])\nΔt, T = .01, 200\nX, Q =\
    \ np.array([1.,1.,1.]), np.eye(3)\nS = np.zeros(3)\nfor _ in range(int(T/Δt)):\n\
    \    X += np.array(f(0,X))*Δt # RK1 suffices for illustration\n    A = J(X) @\
    \ Q\n    Q, R= la.qr(Q + A*Δt)\n    S += np.log(np.abs(np.diag(R)))\nλ = S / T\n\
    print(λ) # -> [ 0.90, 0.00,-14.57]\n```\n\n### 9.6.2 Applications in Weather Forecasting\
    \ and Financial Markets\n\nNumerical weather prediction integrates the primitive\
    \ equations on grids exceeding $10^8$ degrees of freedom; nevertheless, bred-vector\
    \ ensembles show that the system's leading Lyapunov subspace is effectively $O(100)$-dimensional.\
    \ Assimilating observations along these directions postpones error amplification\
    \ and extends the deterministic predictability horizon to roughly 10 days in mid-latitudes.\
    \ In financial markets, log-volatility models with stochastic feedback exhibit\
    \ short-lived chaos where $\\lambda_{\\max} \\sim 0.02 \\text{ day}^{-1}$; the\
    \ horizon $\\tau_{\\text{pred}} \\approx \\lambda_{\\max}^{-1} \\ln(\\varepsilon/\\\
    delta_0)$ translates to six-week risk-control cycles for 5% VaR tolerance. Ensemble\
    \ forecasts conditioned on the leading covariant Lyapunov vectors outperform GARCH\
    \ benchmarks at intraday horizons yet degrade once macro-news shocks induce regime\
    \ switches, underscoring the fragile coexistence of deterministic chaos and exogenous\
    \ noise in econometric practice.\n\n### 9.6.3 Applications in Biological Systems\
    \ and Population Dynamics\n\nAt the cellular level, calcium-signalling pathways\
    \ display bursting and chaotic oscillations modelled by three-variable De Young–Keizer\
    \ ODEs; the experimental phase portraits embed on a fractal of dimension $D_2\
    \ \\approx 2.3$. Feedback control via Pyragas delay stabilises a desirable 1:1\
    \ burst rhythm by applying $u(t) = k[\\text{Ca}^{2+}](t - \\tau) - [\\text{Ca}^{2+}](t)]$\
    \ with $\\tau$ equal to the natural burst period, thereby reducing arrhythmic\
    \ cytotoxicity in $\\beta$-cells. In ecology, the discrete-time Hastings–Powell\
    \ top-predator chain\n\n$$x_{t+1} = x_t e^{r(1-x_t)-ay_t/(1+bx_t)},$$\n$$y_{t+1}\
    \ = y_t e^{cx_t/(1+bx_t)-d-ez_t/(1+fy_t)},$$\n$$z_{t+1} = z_t e^{gy_t/(1+fy_t)-m},$$\n\
    \nexhibits windows of positive Lyapunov exponent for $r > 2.1$, matching the irregular\
    \ amplitude envelopes observed in plankton-zooplankton-fish surveys and explaining\
    \ failure of linear harvesting policies.\n\n### 9.6.4 Numerical Methods for Nonlinear\
    \ Dynamics\n\nReliable simulation of stiff and chaotic systems demands integrators\
    \ that respect the geometric structure while controlling local truncation error.\n\
    \n*Time-Stepping* Symplectic Runge–Kutta schemes (e.g., implicit midpoint) preserve\
    \ Hamiltonian phase-volume, inhibiting spurious dissipation that would otherwise\
    \ distort Lyapunov spectra; adaptive embedded pairs (Dormand–Prince 5(4)) adjust\
    \ step size to bound global error yet track Lyapunov growth faithfully provided\
    \ the step is smaller than $0.1 \\lambda_{\\text{max}}^{-1}$.\n\n*Continuation*\
    \ Pseudo-arclength continuation solves $F(\\mathbf{x}, \\mu) = 0$ augmented by\
    \ tangent predictors, allowing traversal of fold and Hopf bifurcations without\
    \ step collapse. The extended system\n\n$$\\left[\\begin{array}{c} F(\\mathbf{x},\
    \ \\mu) \\\\ \\mathbf{v}^\\top(\\mathbf{x} - \\mathbf{x}_0) + \\beta(\\mu - \\\
    mu_0) - s \\end{array}\\right] = 0,$$\n\nis Newton-iterated at each step; $\\\
    mathbf{v}$ is previous tangent, $s$ the arclength increment. Standard packages\
    \ (AUTO-97p, pyCoCo) automate branch switching and Floquet multiplier tracking.\n\
    \n*Variational Integration* Simultaneous integration of the variational equations\
    \ $\\dot{\\mathbf{v}} = D\\mathbf{F}(\\mathbf{x})\\mathbf{v}$ alongside state\
    \ variables—using identical time grid and identical scheme—avoids artificial transverse\
    \ damping that would bias Lyapunov exponents. When Jacobians are unavailable,\
    \ automatic differentiation (jax.grad) supplies $D\\mathbf{F}$ at machine precision."
  mdcn: "## 可预测性时域与预报技巧\n\n一旦 $(m, \\tau)$ 固定，局部预测器即可量化技巧并推断*可预测性时域*。给定查询向量 $\\mathbf{y}_n$，定位其\
    \ $k$ 个最近邻并向前演化 $\\Delta t$ 步；预报值为这些邻居演化结果的平均值。定义预报误差\n\n$$\\varepsilon(\\Delta\
    \ t) = \\left\\| x_{n+\\Delta t} - \\frac{1}{k} \\sum_{j=1}^{k} x_{\\text{NN}(j)+\\\
    Delta t} \\right\\|.$$\n\n定义技巧度量 $S(\\Delta t) = 1 - \\varepsilon(\\Delta t)/\\\
    sigma_x$，其中 $\\sigma_x$ 是信号标准差。**可预测性时域** $T_p$ 满足 $S(T_p) = S_{\\text{crit}}$（例如，0.5）（参见图\
    \ 9.15）。\n\n```python\ndef horizon(x, τ, m, k=10, Scrit=0.5):\n    N = len(x)\
    \ - m*τ - 200\n    Y = np.column_stack([x[i:N+i] for i in range(0, m*τ, τ)])\n\
    \    σ = np.std(x)\n    tree = ss.cKDTree(Y)\n    Δmax, skill = 1000, []\n   \
    \ for Δ in range(1, Δmax):\n        errs = []\n        for n in range(N-Δ):\n\
    \            dist, idx = tree.query(Y[n], k+1)\n            nn = idx[1:] # exclude\
    \ self\n            pred = np.mean(x[nn+Δ])\n            errs.append(np.abs(pred\
    \ - x[n+Δ]))\n        skill.append(1 - np.mean(errs)/σ)\n        if skill[-1]\
    \ < Scrit: return Δ, skill\n    return Δmax, skill\n```\n\n```python\nTp, S =\
    \ horizon(x, τ=15, m=5, Scrit=0.5)\nplt.plot(S); plt.axhline(0.5,c='r'); plt.xlabel('Δt');\
    \ plt.ylabel('S'); plt.show()\n```\n\n对于洛伦兹数据（每个索引对应 $\\Delta t = 0.02$ 时间单位），可得\
    \ $T_p \\approx 40$ 步，这与 $\\lambda_{\\max}^{-1} \\ln(\\sigma/\\delta_0)$ 相吻合，其中\
    \ $\\lambda_{\\max} \\approx 0.9$，$\\delta_0$ 是邻居半径。\n\n## 模型阶数与技巧\n\n将 $m$ 增加到超过\
    \ $m^*$ 通常会*降低*技巧，这是由于维度灾难，尽管拓扑上是正确的。相反，过小的 $m$ 会增加虚假邻居，从而破坏预报。因此，经验做法是选择满足 $\\\
    phi_m < \\phi_{\\text{tol}}$ 的最小 $m$，并通过交叉验证的技巧曲线进行验证。\n\n## 多步影子\n\n迭代单步局部预测器会累积误差；直接训练\
    \ $\\Delta$ 步模型可以将技巧扩展到大约两倍的李雅普诺夫时域。储层计算替代模型（上一小节）通过演化隐状态而无需显式嵌入来自动化这一过程，但嵌入诊断对于超参数调优仍然非常宝贵。\n\
    \n## 9.6 复杂系统与非线性动力学\n\n### 9.6.1 李雅普诺夫指数与奇异吸引子\n\n复杂确定性系统的标志性特征是秩序与不可预测性的共存：轨迹可能在一个几何上很薄的不变集——*奇异吸引子*——上演化，但小扰动会以正李雅普诺夫指数所量化的指数速度增长。当最大指数\
    \ $\\lambda_{\\max} > 0$ 时，吸引子不可能是整数维的光滑流形；相反，其分形特性通过卡普兰-约克关系 $D_{KY} = k + \\\
    frac{\\sum_{i=1}^k \\lambda_i}{|\\lambda_{k+1}|}$ 揭示出来，其中 $k$ 是使得有序指数部分和保持非负的最大索引。对于参数为\
    \ $(\\sigma, \\rho, \\beta) = (10, 28, 8/3)$ 的标准洛伦兹流，可得 $(\\lambda_1, \\lambda_2,\
    \ \\lambda_3) \\approx (0.905, 0, -14.57)$，因此 $D_{KY} \\approx 2.06$，这与盒计数法的估计结果一致。吸引子的不稳定叶状结构拉伸轨迹，而收缩叶状结构则不断将相空间体积折叠回有界区域，从而产生特征性的蝴蝶几何形状和宽带功率谱，这些特征在\
    \ $C^1$ 小扰动下依然存在。\n\n### 示例 9.6.1（通过 QR 积分计算全局李雅普诺夫谱）\n\n```python\nimport numpy\
    \ as np, scipy.linalg as la, scipy.integrate as ivp\nσ, ρ, β = 10., 28., 8/3\n\
    def f(t,X): x,y,z=X; return [σ*(y-x), x*(ρ-z)-y, x*y-β*z]\ndef J(X): x,y,z=X;\n\
    \    return np.array([[-σ, σ, 0], [ρ-z, -1, -x], [y, x, -β]])\nΔt, T = .01, 200\n\
    X, Q = np.array([1.,1.,1.]), np.eye(3)\nS = np.zeros(3)\nfor _ in range(int(T/Δt)):\n\
    \    X += np.array(f(0,X))*Δt # RK1 suffices for illustration\n    A = J(X) @\
    \ Q\n    Q, R= la.qr(Q + A*Δt)\n    S += np.log(np.abs(np.diag(R)))\nλ = S / T\n\
    print(λ) # -> [ 0.90, 0.00,-14.57]\n```\n\n### 9.6.2 在天气预报与金融市场中的应用\n\n数值天气预报在超过\
    \ $10^8$ 自由度的网格上积分原始方程；然而，增长向量集合表明，系统的领先李雅普诺夫子空间实际上是 $O(100)$ 维的。沿这些方向同化观测数据可以推迟误差放大，并将中纬度地区的确定性可预测性时域大致延长至\
    \ 10 天。在金融市场中，具有随机反馈的对数波动率模型表现出短暂的混沌，其中 $\\lambda_{\\max} \\sim 0.02 \\text{ day}^{-1}$；时域\
    \ $\\tau_{\\text{pred}} \\approx \\lambda_{\\max}^{-1} \\ln(\\varepsilon/\\delta_0)$\
    \ 对于 5% 的 VaR 容忍度转化为六周的风险控制周期。以领先协变李雅普诺夫向量为条件的集合预报在日内时域优于 GARCH 基准，但一旦宏观新闻冲击引发状态切换，其性能就会下降，这凸显了计量经济学实践中确定性混沌与外生噪声之间脆弱的共存关系。\n\
    \n### 9.6.3 在生物系统与种群动力学中的应用\n\n在细胞水平上，钙信号通路表现出爆发和混沌振荡，可通过三变量 De Young–Keizer 常微分方程建模；实验相图嵌入在维度\
    \ $D_2 \\approx 2.3$ 的分形上。通过 Pyragas 延迟进行反馈控制，应用 $u(t) = k[\\text{Ca}^{2+}](t\
    \ - \\tau) - [\\text{Ca}^{2+}](t)]$（其中 $\\tau$ 等于自然爆发周期），可以稳定所需的 1:1 爆发节律，从而减少\
    \ $\\beta$ 细胞中的心律失常细胞毒性。在生态学中，离散时间 Hastings–Powell 顶级捕食者链\n\n$$x_{t+1} = x_t e^{r(1-x_t)-ay_t/(1+bx_t)},$$\n\
    $$y_{t+1} = y_t e^{cx_t/(1+bx_t)-d-ez_t/(1+fy_t)},$$\n$$z_{t+1} = z_t e^{gy_t/(1+fy_t)-m},$$\n\
    \n在 $r > 2.1$ 时表现出正李雅普诺夫指数窗口，这与浮游生物-浮游动物-鱼类调查中观察到的不规则振幅包络相吻合，并解释了线性捕捞政策失败的原因。\n\
    \n### 9.6.4 非线性动力学的数值方法\n\n对刚性和混沌系统进行可靠模拟，需要既能尊重几何结构又能控制局部截断误差的积分器。\n\n*时间步进*\
    \ 辛龙格-库塔格式（例如，隐式中点法）保持哈密顿相体积，抑制否则会扭曲李雅普诺夫谱的虚假耗散；自适应嵌入对（Dormand–Prince 5(4)）调整步长以限制全局误差，同时只要步长小于\
    \ $0.1 \\lambda_{\\text{max}}^{-1}$，就能忠实地跟踪李雅普诺夫增长。\n\n*延拓* 伪弧长延拓求解增广了切线预测器的 $F(\\\
    mathbf{x}, \\mu) = 0$，允许在不发生步长崩溃的情况下穿越折叠和霍普夫分岔。扩展系统\n\n$$\\left[\\begin{array}{c}\
    \ F(\\mathbf{x}, \\mu) \\\\ \\mathbf{v}^\\top(\\mathbf{x} - \\mathbf{x}_0) + \\\
    beta(\\mu - \\mu_0) - s \\end{array}\\right] = 0,$$\n\n在每一步进行牛顿迭代；$\\mathbf{v}$\
    \ 是前一步的切线，$s$ 是弧长增量。标准软件包（AUTO-97p, pyCoCo）可自动进行分支切换和弗洛凯乘子跟踪。\n\n*变分积分* 同时积分变分方程\
    \ $\\dot{\\mathbf{v}} = D\\mathbf{F}(\\mathbf{x})\\mathbf{v}$ 和状态变量——使用相同的时间网格和相同的格式——避免了会偏置李雅普诺夫指数的人工横向阻尼。当雅可比矩阵不可用时，自动微分（jax.grad）以机器精度提供\
    \ $D\\mathbf{F}$。"
