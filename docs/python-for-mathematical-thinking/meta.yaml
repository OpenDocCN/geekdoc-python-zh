    ![](img/9724708489e3df346f9e31e3fa6e5746_175_1.png)\n\n图 5.4 十个薪资的箱线图。四分位距箱体以蓝色高亮，深红色线标记中位数（已标注），两个高薪异常值在右侧清晰可见。\n\
