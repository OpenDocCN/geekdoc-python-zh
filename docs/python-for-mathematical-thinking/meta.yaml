    \ plt.grid(), plt.title(\"Robertson Problem\")\nplt.show()\n```\n\n## 3.4.2 变分法\n\
    \n**变分法**研究的是泛函（从函数到实数的映射）的优化问题。一个典型的变分问题是寻找使以下积分最小化的函数 $y(x)$：\n\n$$\\mathcal{J}[y]\
