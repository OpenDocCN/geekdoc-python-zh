    # 7.3.3 Applications of Graph Theory


    Real-world systems—from power grids to social platforms—manifest naturally as
    graphs. The ability to model such systems enables optimisation, inference, and
    learning tasks that would be opaque without a graph-theoretic lens. In what follows
    we survey three broad application domains and support each with concise but functional
    Python examples.


    # Applications in Network Analysis and Optimisation


    Classical optimisation problems are most transparent on graphs.


    **Shortest Paths and Flows** Let $G = (V, E, w)$ be a weighted digraph with non-negative
    edge costs $w : E \to \mathbb{R}_{\geq 0}$. Dijkstra''s algorithm computes $\text{dist}(s,
    v)$ for all $v$ in $O(|E| + |V| \log |V|)$ time. If $\sum_{e \in E} w(e) = C$,
    any $s$-$t$ path obeys $\text{dist}(s, t) \leq C$, furnishing a global upper bound
    used in heuristic pruning.


    Maximum flow $\max_f \sum_{e \in \delta^+(s)} f(e)$ subject to capacity constraints
    and conservation is solved by Edmonds–Karp $O(|V||E|^2)$ or by the push-relabel
    variant $O(|V|^3)$. Min-cut duality ($Max\text{-}Flow = Min\text{-}Cut$) underpins
    image segmentation and network reliability.


    ```

    import networkx as nx

    G = nx.DiGraph()

    edges = [(0,1,9),(0,2,5),(1,2,3),(1,3,7),(2,3,4)]

    G.add_weighted_edges_from(edges, capacity=''cap'')

    flow_val, _ = nx.maximum_flow(G, 0, 3, capacity=''cap'')

    print(flow_val) # 9 (max s-t flow)

    ```


    **Travelling Salesperson and Branch-and-Bound** Metric TSP admits a 1.5-approximation
    via Christofides'' algorithm: MST $\to$ minimum-weight perfect matching on odd-degree
    vertices $\to$ Euler tour $\to$ shortcutting. The approximation ratio follows
    from triangle inequality.


    **Network Robustness** Given adjacency matrix $A$, the algebraic connectivity
    $\lambda_2(L)$ quantifies how many edge failures the network can sustain before
    disconnecting: optimising $\lambda_2$ under a budget of extra edges is NP-hard,
    yet semidefinite relaxations yield near-optimal augmentations.


    # Social Network Analysis and Community Detection


    Social graphs are typically sparse, heavy-tailed, and homophilic.


    **Centrality Measures** Degree, betweenness, closeness, and eigenvector centralities
    identify influencers. For eigenvector centrality $\mathbf{c} = A\mathbf{c}$ up
    to scaling, Perron–Frobenius ensures a unique positive vector when $G$ is strongly
    connected.'
