    )\n    return W,b\n```\n\n## 评估指标\n\n准确率 acc = $\\frac{1}{n} \\sum \\mathbf{1}_{\\\
    arg \\max_k \\hat{y}_k = \\arg \\max_k y_k}$；混淆矩阵评估类别不平衡；图像网络使用top-k准确率。对于回归，报告\
    \ $R^2 = 1 - \\|\\hat{y} - y\\|^2 / \\|y - \\bar{y}\\|^2$ 和 RMSE。\n\n## 早停法\n\n\
    留出验证损失 $L_{\\text{val}}^{(r)}$ 监控过拟合；当 $L_{\\text{val}}$ 在 $p$ 个epoch内未能改善时停止。耐心值\
