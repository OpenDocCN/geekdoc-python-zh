  - '[PAGE 203]


    decision theory, and naturally quantifies uncertainty. A Bayesian workflow typically
    proceeds as: (i) choose a prior distribution for the parameter(s), (ii) compute
    or approximate the posterior given observed data, and (iii) draw inferences or
    make decisions using the posterior (e.g. point estimates, credible intervals,
    posterior predictive checks).


    # Bayesian Inference and Prior Distributions


    Let $\theta$ be an unknown parameter and $\mathcal{D}$ the data. Bayes'' theorem
    gives the **posterior**


    $$p(\theta \mid \mathcal{D}) = \frac{p(\mathcal{D} \mid \theta) \, p(\theta)}{\int
    p(\mathcal{D} \mid \theta) \, p(\theta) \, d\theta},$$


    where $p(\theta)$ is the *prior* and $p(\mathcal{D} \mid \theta)$ the *likelihood*.


    **Conjugate Priors** A prior $p(\theta)$ is *conjugate* to the likelihood if the
    posterior is in the same family.


    **Example 5.4.14 (Beta-Binomial Model)** Coin with unknown head probability $\theta$.
    Prior $\theta \sim \text{Beta}(\alpha, \beta)$; data $x \mid \theta \sim \text{Binom}(n,
    \theta)$. Posterior:


    $$\theta \mid x \sim \text{Beta}(\alpha + x, \beta + n - x).$$


    With $\alpha = \beta = 1$ (uniform prior) and $x = 7$ heads in $n = 10$ tosses,
    posterior Beta(8, 4) has mean $8/12 \approx 0.667$ and 95% credible interval (0.39,
    0.88).


    ```

    import scipy.stats as st, numpy as np

    alpha, beta, x, n = 1, 1, 7, 10

    posterior = st.beta(alpha+x, beta+n-x)

    print(posterior.mean(), posterior.interval(.95))

    ```


    **Example 5.4.15 (Normal–Normal with Unknown Mean)** Observations $y_i \sim \mathcal{N}(\mu,
    \sigma^2)$; known $\sigma^2$; prior $\mu \sim \mathcal{N}(\mu_0, \tau_0^2)$. Posterior:


    $$\mu \mid \mathbf{y} \sim \mathcal{N}\left(\frac{\tau_0^{-2} \mu_0 + n \sigma^{-2}
    \bar{y}}{\tau_0^{-2} + n \sigma^{-2}}, (\tau_0^{-2} + n \sigma^{-2})^{-1}\right).$$


    With $\mu_0 = 0, \tau_0 = 5, \sigma = 1, n = 20, \bar{y} = 0.8$:


    ```

    mu0, tau0, sigma, n, ybar = 0, 5, 1, 20, 0.8

    prec = 1/tau0**2 + n/sigma**2

    post_mean = (mu0/tau0**2 + n*ybar/sigma**2)/prec

    post_sd = np.sqrt(1/prec)

    print(post_mean, post_sd)

    ```


    **Hierarchical Priors** For multi-level data, treat group parameters as drawn
    from hyper-priors to share information ("partial pooling"). Example: batting averages'
