    **Keywords** Chaos theory · Dynamical systems · Lyapunov exponents · Bifurcation
    analysis · Koopman operator · Reservoir computing


    In classical mechanics Laplace envisioned a universe in which the future is uniquely
    determined by the present, yet by the late nineteenth-century Poincaré had already
    sensed cracks in this deterministic edifice: simple nonlinear laws can render
    long-term prediction practically impossible. *Chaos theory* formalises this tension.
    It studies deterministic dynamical systems whose trajectories exhibit sensitive
    dependence on initial conditions, topological mixing, and dense periodic orbits,
    thereby producing behaviour that, while generated by smooth equations, mimics
    randomness. The mathematical backbone of the subject is the qualitative theory
    of differential and difference equations: fixed points, periodic orbits, invariant
    manifolds, bifurcations, Lyapunov exponents, entropy, and fractal attractors.
    Continuous-time flows $\dot{\mathbf{x}} = \mathbf{F}(\mathbf{x})$ and discrete
    maps $\mathbf{x}_{n+1} = G(\mathbf{x}_n)$ share this vocabulary, yet each contributes
    unique phenomena—finite-time blow-up in flows, symbolic dynamics, and kneading
