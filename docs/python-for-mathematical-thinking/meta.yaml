    # 3.4.4 Fractional Calculus


    **Fractional calculus** generalises the notion of derivatives and integrals to
    non-integer (fractional) orders. The $n$-th derivative is defined via repeated
    application of differentiation, but what does it mean to take the derivative of
    order $\alpha \in \mathbb{R}$, or even $\alpha \in \mathbb{C}$? Fractional derivatives
    and integrals find applications in viscoelasticity, anomalous diffusion, signal
    processing, and control systems. Python offers tools for symbolic and numerical
    work in this area via packages like `sympy`, `mpmath`, and `fracdiff`.


    # Fractional Derivatives


    One popular definition is the **Riemann–Liouville fractional derivative**:


    $$D^\alpha f(x) = \frac{1}{\Gamma(n - \alpha)} \frac{d^n}{dx^n} \int_a^x \frac{f(t)}{(x
    - t)^{\alpha - n + 1}} \, dt, \quad n - 1 < \alpha < n.$'
