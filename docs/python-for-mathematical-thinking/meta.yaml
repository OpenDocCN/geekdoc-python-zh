    Example 10 (Boolean Algebra of Events) If $A, B, C$ are independent with $\mathbb{P}(A)
    = \mathbb{P}(B) = \mathbb{P}(C) = 1/2$, compute $\mathbb{P}(A \oplus B \oplus
    C)$ (exclusive-or).


    The event $A \oplus B \oplus C$ equals having an odd number of true events. Count
    outcomes: $\binom{3}{1} + \binom{3}{3} = 4$. Thus $\mathbb{P} = 4/8 = 1/2$.


    # Conditional Probability and Bayes'' Theorem


    Definition For events $A, B$ with $\mathbb{P}(B) > 0$, the **conditional probability**
    of $A$ given $B$ is


    $$\mathbb{P}(A \mid B) = \frac{\mathbb{P}(A \cap B)}{\mathbb{P}(B)}.$$


    Intuitively this rescales the sample space to $B$.


    Law of Total Probability If $\{B_i\}_{i=1}^n$ is a finite partition of $\Omega$
    with $\mathbb{P}(B_i) > 0$, then


    $$\mathbb{P}(A) = \sum_{i=1}^n \mathbb{P}(A \mid B_i) \mathbb{P}(B_i).$$


    # Bayes'' Theorem


    $$\mathbb{P}(B_j \mid A) = \frac{\mathbb{P}(A \mid B_j) \mathbb{P}(B_j)}{\sum_{i=1}^n
    \mathbb{P}(A \mid B_i) \mathbb{P}(B_i)}.$$


    Bayes'' theorem inverts conditional probabilities; the denominator is precisely
    the total-probability expansion.


    Example 5.1.1 (Medical Test Revisited with Confusion Matrix) A disease prevalence
    is 0.5% ($\mathbb{P}(D) = 0.005$). Sensitivity 0.97, specificity 0.99. Compute
    $\mathbb{P}(D \mid +)$, $\mathbb{P}(D^c \mid -)$.


    $$\mathbb{P}(+) = 0.97 \cdot 0.005 + 0.01 \cdot 0.995 = 0.0146,$$


    $$\mathbb{P}(D \mid +) = \frac{0.97 \cdot 0.005}{0.0146} \approx 0.332,$$


    $$\mathbb{P}(D^c \mid -) = \frac{0.99 \cdot 0.995}{1 - 0.0146} \approx 0.995.$$'
