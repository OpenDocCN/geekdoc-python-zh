    # Chapter 4

    Data Structures and Algorithms with Python


    **Abstract** Computer-science foundations meet mathematical rigour as asymptotic
    analysis guides the design of stacks, queues, linked lists, trees, and a deep
    dive into the hash-table machinery that powers Python’s `dict`. Classic search
    and sorting algorithms are implemented and benchmarked, while graph theory introduces
    BFS, DFS, and Dijkstra’s shortest-path—laying algorithmic cornerstones for later
    numerical and data-science pipelines.


    **Keywords** Data structures · Algorithms · Hash tables · Search and sorting ·
    Graph algorithms · Complexity analysis


    Modern mathematical computation depends critically on efficient representation
    and manipulation of data. **Data structures** provide a formal framework to store,
    organise, and retrieve data in a way that aligns with algorithmic goals. Whether
    we’re solving linear systems, implementing symbolic manipulation, or analysing
    graphs, the choice of data structure directly impacts the computational complexity
    and memory usage. This chapter introduces the foundational data structures, explores
    their mathematical and algorithmic underpinnings, and demonstrates their implementation
    and usage in Python.


    ## 4.1 Introduction to Data Structures


    ### 4.1.1 Overview of Data Structures


    A **data structure** is a mathematical or logical model for organising information.
    The primary aim is to optimise one or more of the following: insertion, deletion,
    lookup, traversal, or transformation. Underlying each data structure is an abstract
    data type (ADT), such as a set, list, or mapping.'
