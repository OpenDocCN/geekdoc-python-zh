    \ 2x & 2y & 0 \\\\ 0 & 2y & 2z \\\\ 2x & 0 & 2z \\end{pmatrix}$ is nonsingular\
    \ off the coordinate axes; the iteration converges in four steps to $(\\frac{1}{\\\
