  md: "# 7.1.1 Divisibility and Modular Arithmetic\n\nDivisibility creates a partial\
    \ order on $\\mathbb{Z}$ and enables a refined notion of equivalence: $a \\equiv\
    \ b \\pmod{m}$ iff $m \\mid (a - b)$. The quotient ring $\\mathbb{Z}/m\\mathbb{Z}$\
    \ inherits addition and multiplication, forming the stage on which theorems by\
    \ Euclid, Fermat, and Euler unfold.\n\nGiven $m \\geq 2$, each residue class $[a]_m$\
    \ has a canonical representative $\\text{rem}(a, m) \\in \\{0, \\dots, m-1\\}$.\
    \ Python's `%` operator returns this representative, while `divmod(a, m)` returns\
    \ $(q, r)$ such that $a = qm + r$ with $0 \\leq r < m$, matching the Euclidean\
    \ Division Theorem.\n\n# Prime Numbers and the Euclidean Algorithm\n\nAn integer\
    \ $p > 1$ is *prime* if its only positive divisors are 1 and $p$. Euclid's proof\
    \ of infinitude hinges on constructing $N = p_1 p_2 \\dots p_k + 1$, showing any\
    \ finite list of primes is incomplete.\n\nThe *Euclidean algorithm* computes $\\\
    gcd(a, b)$ by repeated division:\n\n$$\\gcd(a, b) = \\gcd(b, \\text{rem}(a, b)),\
    \ \\quad \\gcd(a, 0) = |a|.$$\n\nIts runtime is $O(\\log \\min\\{a, b\\})$. Extended\
    \ Euclid additionally finds integers $x, y$ such that $ax + by = \\gcd(a, b)$—central\
    \ to modular inversion and Diophantine equations.\n\n# Example 7.1.1 (Extended\
    \ Euclid in Python)\n\n```\ndef egcd(a, b):\n    if b == 0: return (a, 1, 0)\n\
    \    g, x1, y1 = egcd(b, a % b)\n    return (g, y1, x1 - (a // b) * y1)\n\ng,\
    \ x, y = egcd(252, 105)\nprint(g, x, y) # 21, -2, 5  ==>  252(-2)+105(5)=21\n\
    ```\n\n# Modular Exponentiation and Applications in Cryptography\n\nFast exponentiation\
    \ exploits binary expansion of the exponent:\n\n$$a^e \\bmod m \\quad \\text{via}\
    \ \\quad e = \\sum_k e_k 2^k, \\quad a^e \\equiv \\prod_k (a^{2^k})^{e_k} \\pmod{m}.$$\n\
    \nThis \"square-and-multiply\" algorithm is $O(\\log e)$, vital when $e \\approx\
    \ 2^{1024}$ in RSA.\n\n```\npow(a, e, m) # built-in modular exponentiation (Python\
    \ >= 3.8)\n```"
