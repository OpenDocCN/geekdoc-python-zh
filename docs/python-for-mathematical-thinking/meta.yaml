    # Booleans and NoneType


    The Boolean algebra $\{\bot, \top\}$ is represented by False and True, subclasses
    of int with values 0 and 1. Logical operations satisfy De Morgan''s laws; for
    example


    $\neg(A \wedge B) \equiv (\neg A) \vee (\neg B)$


    translates to


    ```

    not (A and B) == (not A) or (not B)

    ```


    and returns True for all truth assignments.


    The singleton None of type NoneType denotes "absence of value". It behaves as
    the unique null element: comparisons use identity (is None), never equality. Attempting
    arithmetic with None raises TypeError, mirroring the undefined nature of 0/0 in
    real analysis.


