    for LAPACK or OpenBLAS on Windows. Verify a clean install with:


    ```

    >>> import sys, numpy, sympy, scipy

    >>> print(sys.version)

    >>> print(numpy.__version__, sympy.__version__, scipy.__version__)

    ```'
