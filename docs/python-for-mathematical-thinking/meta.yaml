    \ [0, 1e4], [1, 0, 0], method='BDF')\nplt.semilogx(sol.t, sol.y[0], label='y1')\n\
    plt.semilogx(sol.t, sol.y[1], label='y2')\nplt.semilogx(sol.t, sol.y[2], label='y3')\n\
    plt.legend(), plt.grid(), plt.title(\"Robertson Problem\")\nplt.show()\n```\n\n\
    ## 3.4.2 Calculus of Variations\n\nThe **calculus of variations** concerns the\
    \ optimisation of functionals—mappings from functions to real numbers. A typical\
    \ variational problem seeks the function $y(x)$ that minimises an integral:\n\n\
    $$\\mathcal{J}[y] = \\int_{a}^{b} L(x, y(x), y'(x)) \\, dx,$$\n\nsubject to boundary\
    \ conditions $y(a) = y_a$, $y(b) = y_b$. This arises in physics (least action),\
    \ geometry (geodesics), and engineering (optimal control).\n\n### Euler–Lagrange\
    \ Formalism\n\nThe critical points of $\\mathcal{J}[y]$ satisfy the **Euler–Lagrange\
    \ equation**:\n\n$$\\frac{\\partial L}{\\partial y} - \\frac{d}{dx} \\left( \\\
    frac{\\partial L}{\\partial y'} \\right) = 0.$$\n\n**Example 3.4.8 (Shortest Path:\
    \ Geodesic in the Plane)** Let $y(x)$ connect two points $(x_0, y_0)$, $(x_1,\
    \ y_1)$. The arc length functional is:\n\n$$\\mathcal{J}[y] = \\int_{x_0}^{x_1}\
    \ \\sqrt{1 + y'(x)^2} \\, dx.$$\n\nHere $L(y, y') = \\sqrt{1 + y'^2}$, so:\n\n\
    $$\\frac{d}{dx} \\left( \\frac{y'}{\\sqrt{1 + y'^2}} \\right) = 0 \\Rightarrow\
    \ \\frac{y'}{\\sqrt{1 + y'^2}} = C.$$\n\nSolving yields $y' = \\text{const} \\\
    Rightarrow y(x) = mx + c$—a straight line.\n\n```python\nimport sympy as sp\n\
    x = sp.Symbol(\"x\")\ny = sp.Function(\"y\")(x)\nL = sp.sqrt(1 + sp.diff(y, x)**2)\n\
    EL = sp.diff(sp.diff(L, sp.diff(y, x)), x) - sp.diff(L, y)\nsp.pprint(sp.simplify(EL))\
    \ # Returns 0\n```\n\n**Example 3.4.9 (Brachistochrone Curve)** Minimise time\
    \ of descent under gravity between points. The functional is:\n\n$$\\mathcal{J}[y]\
    \ = \\int_{x_0}^{x_1} \\sqrt{\\frac{1 + y'^2}{2gy}} \\, dx.$$\n\nThis yields a\
    \ cycloidal path. Deriving Euler–Lagrange leads to a nonlinear ODE solved via\
    \ parametric substitution. Due to complexity, this is often approached numerically\
    \ or via known solution forms.\n\n### Constraints and Lagrange Multipliers\n\n\
    In variational problems with integral constraints:\n\nMinimise $\\mathcal{J}[y]\
    \ = \\int_{a}^{b} L(x, y, y') \\, dx, \\quad \\text{subject to} \\quad \\int_{a}^{b}\
    \ g(x, y) \\, dx = C,$\n\none introduces a Lagrange multiplier $\\lambda$ and\
    \ forms:\n\n$$\\tilde{L} = L(x, y, y') + \\lambda g(x, y).$$\n\nThen apply the\
    \ Euler-Lagrange equation to $\\tilde{L}$.\n\n### Example 3.4.10 (Isoperimetric\
    \ Problem: Enclosed Area Maximisation)\n\nAmong all curves of fixed perimeter\
    \ enclosing a fixed area, which one maximises area? Answer: the circle.\n\nThis\
    \ requires maximising:\n\n$$\\mathcal{J}[y] = \\int y \\, dx \\quad \\text{subject\
    \ to} \\quad \\int \\sqrt{1 + y'^2} \\, dx = \\text{const}.$$\n\nSet up:\n\n$$\\\
    tilde{L} = y + \\lambda \\sqrt{1 + y'^2}.$$\n\nApply Euler-Lagrange:\n\n$$\\frac{d}{dx}\
    \ \\left( \\frac{\\lambda y'}{\\sqrt{1 + y'^2}} \\right) = 1.$$\n\n### Example\
    \ 3.4.11 (Constrained Extremal Temperature Profile)\n\nFind $y(x)$ that minimises:\n\
    \n$$\\mathcal{J}[y] = \\int_0^1 (y')^2 \\, dx, \\quad \\text{with} \\quad \\int_0^1\
    \ y(x) \\, dx = 1, \\quad y(0) = y(1) = 0.$$\n\nForm augmented functional:\n\n\
    $$\\tilde{L} = (y')^2 + \\lambda y.$$\n\nEuler-Lagrange:\n\n$$\\frac{d}{dx}(2y')\
    \ = \\lambda \\Rightarrow y'' = \\lambda/2.$$\n\n```python\nlam = sp.Symbol(\"\
    lambda\")\ny = sp.Function(\"y\")(x)\nL = sp.diff(y, x)**2 + lam * y\nEL = sp.diff(sp.diff(L,\
    \ sp.diff(y, x)), x) - sp.diff(L, y)\nsp.pprint(EL)\n```"
