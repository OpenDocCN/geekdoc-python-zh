    pi H}{L}} \\sinh \\frac{m \\pi \\min\\{y, \\eta\\}}{L}.$$\n\n势：$\\phi(x, y) =\
    \ \\iint_{\\Omega} G \\rho \\, d\\xi d\\eta$。\n\n**$\\mathbb{R}$ 上的热方程** 基本解 $G(x,\
    \ \\xi; t) = \\frac{1}{\\sqrt{4 \\pi \\kappa t}} \\exp\\left(-\\frac{(x - \\xi)^2}{4\
    \ \\kappa t}\\right)$ 满足 $\\partial_t G = \\kappa \\partial_x^2 G$，$G|_{t=0} =\
    \ \\delta$。卷积给出经典解 $u(x, t) = G * f$。对于具有狄利克雷边界的半无限杆，使用*镜像法*：$G_+ = G(x, \\xi;\
    \ t) - G(x, -\\xi; t)$。\n\n## 格林恒等式（边界积分）\n\n对于区域 $\\Omega$，\n$$u(\\mathbf{x})\
    \ = \\int_{\\Omega} G(\\mathbf{x}, \\boldsymbol{\\xi}) f(\\boldsymbol{\\xi}) \\\
    , d\\boldsymbol{\\xi} - \\int_{\\partial\\Omega} \\left[ u \\, \\partial_{n_{\\\
    boldsymbol{\\xi}}} G - G \\, \\partial_{n_{\\boldsymbol{\\xi}}} u \\right] \\\
    , dS_{\\boldsymbol{\\xi}}.$$\n边界元方法（BEM）利用此表示对 $\\partial\\Omega$ 进行离散化，将维度降低一维。\n\
    \n## 例 6.3.13（二维外部势）\n\n对于圆外的拉普拉斯方程，选择自由空间格林函数 $G = -\\frac{1}{2\\pi} \\ln |\\\
    mathbf{x} - \\boldsymbol{\\xi}|$；施加诺伊曼边界积分以求解圆形障碍物的散射问题。\n\n## 积分方程与弗雷德霍姆理论\n\n\
    ## 第二类弗雷德霍姆积分方程\n\n$$u(x) - \\lambda \\int_a^b K(x, \\xi) u(\\xi) \\, d\\xi =\
    \ f(x).$$\n若 $K$ 连续，弗雷德霍姆择一定理指出以下两种情况必居其一：\n1. $\\det(I - \\lambda K) \\neq 0$：对每个\
    \ $f$ 存在唯一解。\n2. $\\det(I - \\lambda K) = 0$：存在非平凡的齐次解，且非齐次问题的可解性要求与伴随零空间正交。\n\
    \n## 预解核级数\n\n$$R(x, \\xi; \\lambda) = K + \\lambda K^{(2)} + \\lambda^2 K^{(3)}\
    \ + \\dots, \\quad K^{(n)}(x, \\xi) = \\int_a^b K(x, s) K^{(n-1)}(s, \\xi) \\\
    , ds,$$\n对于小的 $|\\lambda|$ 收敛；解为 $u = f + \\lambda f * R$。\n\n## 与格林函数的联系\n\n\
    经过微分，许多边值问题可以映射为核为 $K(x, \\xi) = G(x, \\xi)$ 的弗雷德霍姆方程。数值上：Nyström 方法对积分进行采样，将其转化为线性系统\
    \ $(I - \\lambda A)u = f$。\n\n## 例 6.3.14（由初值问题导出的沃尔泰拉方程）\n\n常微分方程 $y'(x) = \\\
