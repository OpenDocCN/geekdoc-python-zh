    \ hypotheses, converges quadratically to a simple root $r$ of $f$. The geometric\
    \ intuition is simple: the tangent at $(x_k, f(x_k))$ intersects the $x$-axis\
    \ closer to the root than $x_k$ provided the graph is locally monotone and not\
    \ too curved. Its algebraic power, however, derives from viewing the step $\\\
    Delta x_k = x_{k+1} - x_k$ as the first term of the Newton series expansion, thereby\
    \ accelerating error reduction from linear (bisection) to quadratic.\n\n```\n\
    def newton(f, df, x0, *, atol=1e-14, rtol=1e-10, max_iter=50):\n    x = x0\n \
    \   for k in range(max_iter):\n        fx, dfx = f(x), df(x)\n        step = -fx/dfx\n\
    \        x = x + step\n        if abs(step) < atol + rtol*abs(x):\n          \
    \  return x, k\n    raise RuntimeError(\"no convergence\")\n```\n\n# Derivative-Free\
    \ Variants\n\nWhen $f'$ is unavailable or expensive one replaces it with a finite-difference\
