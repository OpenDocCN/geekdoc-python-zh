    \n图形上，关系对应于顶点集 $A$ 上的有向图；自反性添加自环，对称性产生无向边，传递性表现为路径闭包。在 `networkx` 中，可以通过计算传递闭包并检查包含关系来测试传递性。\n\
    \n```python\nimport networkx as nx\nA = range(4)\nR = [(0,0),(1,1),(2,2),(3,3),(0,1),(1,2),(0,2)]\n\
