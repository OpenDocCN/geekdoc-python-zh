    $$u_{tt} + 2au_t = c^2 u_{xx}, \quad u(x, 0) = f(x), \ u_t(x, 0) = g(x).$$


    Laplace in $t$ $\to$ Helmholtz equation $(s^2 + 2as)U = c^2 U_{xx} + sf(x) + g(x)$.
    Fourier in $x$ completes diagonalisation; inverse transforms produce damped wave
    superposition.


