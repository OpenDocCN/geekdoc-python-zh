    # Green’s Functions and Boundary Value Problems


    For linear operator $L[y] = y'''' + p(x)y'' + q(x)y$ on $a \le x \le b$ with boundary
    conditions $y(a) = y(b) = 0$, the **Green’s function** $G(x, \xi)$ solves


    $L_x G(x, \xi) = \delta(x - \xi), \quad G(a, \xi) = G(b, \xi) = 0$.


    Then $y(x) = \int_a^b G(x, \xi) f(\xi) \, d\xi$ solves $L[y] = f$.


    **Example 6.1.14 (Clamped String)** $y''''(x) = f(x)$, $y(0) = y(1) = 0$. Piecewise
    Green’s function


    $G(x, \xi) = \begin{cases} x(1 - \xi), & 0 \le x \le \xi, \ \xi(1 - x), & \xi
    \le x \le 1. \end{cases}$


    For load $f(x) = 6x$, analytic convolution yields $y(x) = x^3 - x$. Numerical
    check:


    ```

    x, \xi = sp.symbols(''x \xi'')

    G = sp.Piecewise((x*(1-\xi), x<=\xi), (\xi*(1-x), True))

    f = 6*\xi

    y = sp.integrate(G*f, (\xi,0,1))

    sp.simplify(sp.diff(y,x,2) - 6*x) # 0

    ```


    # Series Solutions of ODEs: Frobenius Method


    For regular singular point $x = 0$ the Frobenius ansatz


    $y(x) = \sum_{n=0}^{\infty} a_n x^{n+r}, \quad a_0 \ne 0,$


    leads to an indicial equation determining $r$.


    **Example 6.1.15 (Bessel’s Equation)** $x^2y'''' + xy'' + (x^2 - \nu^2)y = 0$.
    Indicial equation $r^2 - \nu^2 = 0 \implies r = \pm \nu$. For $r = \nu$ recursion
    $a_n = -\frac{1}{n(n+2\nu)}a_{n-2}$ gives even series, $J_\nu(x) = \sum_{k=0}^{\infty}
    \frac{(-1)^k}{k!\Gamma(k+\nu+1)}\left(\frac{x}{2}\right)^{2k+\nu}$.


