    P{X = k} = (20 choose k) * 0.3^k * 0.7^(20-k) 的高度一致性验证了蒙特卡洛实验](img/9724708489e3df346f9e31e3fa6e5746_161_0.png)


    **分位数** $\alpha$-分位数 $q_\alpha = \inf\{x : F_X(x) \geq \alpha\}$；中位数是 $q_{0.5}$。


    **例 5.1.10（正态分位数）** $q_{0.975} = 1.96$ 满足 $\Phi(1.96) \approx 0.975$，构成了双侧 95%
    置信区间 $\mu \pm 1.96\sigma$。


