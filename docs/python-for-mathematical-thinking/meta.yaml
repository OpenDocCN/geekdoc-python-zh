    # Applications in Engineering and Finance


    **Engineering—Nonlinear Beam Deflection** For a cantilever of length $L$ with
    end load $P$, the elastic line obeys $EI y''''''''(x) = 0$ except for the concentrated
    load which introduces a slope discontinuity at $x = L$. The tip deflection $y(L)
    = \frac{PL^3}{3EI}$ leads, after rearrangement, to the transcendental frequency
    equation $\cosh \beta \cos \beta + 1 = 0$ for mode shape parameter $\beta$. Bisection
    on $f(\beta) = \cosh \beta \cos \beta + 1$ with bracket $(1.5, 3.0)$ isolates
    the first eigenvalue $\beta_1$ required to compute natural frequencies.


    **Finance—Internal Rate of Return (IRR)** Given cash-flows $(C_0, C_1, \ldots,
    C_n)$, IRR is the discount rate $r$ satisfying $\sum_{k=0}^{n} \frac{C_k}{(1+r)^k}
    = 0$. The net present value is continuous and strictly decreasing in $r > -1$,
    so one brackets a sign change between a near-zero rate and a high rate (e.g. $r
    = 1$) and applies bisection. Because the function is well behaved and evaluation
    inexpensive, linear convergence suffices in practice.


    # Error Analysis and Stopping Criteria


    Let $e_k = |r - m_k|$ be the absolute error. The deterministic bound

    $$e_k \le \frac{|b_0 - a_0|}{2^{k+1}}$$

    serves as a priori stopping condition: choose $k$ such that $2^{-k-1}|b_0 - a_0|
    \le \varepsilon_{\text{abs}}$. In floating point arithmetic round-off accumulates
    once $|b_k - a_k| \approx 2u|m_k|$ (machine unit $u$), so one supplements with
    a *relative* tolerance $\varepsilon_{\text{rel}}|m_k|$ and/or an *auxiliary* test
    $|f(m_k)| \le \varepsilon_f$.

    A practical criterion is therefore

    $$|b_k - a_k| < \varepsilon_{\text{abs}} \lor |b_k - a_k| < \varepsilon_{\text{rel}}|m_k|
    \lor |f(m_k)| < \varepsilon_f.$$

    With $\varepsilon_{\text{abs}} = 10^{-12}$, $\varepsilon_{\text{rel}} = 10^{-10}$,
    and $\varepsilon_f = 10^{-13}$ one typically achieves full double precision without
    incurring unnecessary iterations.


    **Example 8.1.1** For $f(x) = x - e^{-x}$ with bracket $(0, 1)$, the true root
    is $r \approx 0.567\,143\,290$. The algorithm above stops at $m_{44}$ with $e_{44}
    < 2^{-45} \approx 2.8 \times 10^{-14}$, exceeding double precision—confirm $|f(m_{44})|
    \approx 1.3 \times 10^{-16}$.


    **Remark** Although other methods (Newton–Raphson, secant) achieve quadratic or
    super-linear convergence, they lack the unconditional guarantee of bisection.
    A hybrid strategy—several Newton steps with fall-back to bisection when the iterate
    exits the bracket—often combines speed and robustness, a pattern revisited later
    in the chapter on *Nonlinear Systems*.'
- md: "## 8.1.2 Newton–Raphson Method\n\nNewton's method refines a crude root approximation\
    \ by locally replacing a nonlinear function with its tangent line. Given a differentiable\
    \ $f : \\mathbb{R} \\to \\mathbb{R}$ and an initial guess $x_0$, the iteration\n\
    \n$$x_{k+1} = x_k - \\frac{f(x_k)}{f'(x_k)}, \\quad k = 0, 1, 2, \\dots$$\n\n\
    generates a sequence $\\{x_k\\}$ that, under mild hypotheses, converges quadratically\
    \ to a simple root $r$ of $f$. The geometric intuition is simple: the tangent\
    \ at $(x_k, f(x_k))$ intersects the $x$-axis closer to the root than $x_k$ provided\
    \ the graph is locally monotone and not too curved. Its algebraic power, however,\
    \ derives from viewing the step $\\Delta x_k = x_{k+1} - x_k$ as the first term\
    \ of the Newton series expansion, thereby accelerating error reduction from linear\
    \ (bisection) to quadratic.\n\n```python\ndef newton(f, df, x0, *, atol=1e-14,\
    \ rtol=1e-10, max_iter=50):\n    x = x0\n    for k in range(max_iter):\n     \
    \   fx, dfx = f(x), df(x)\n        step = -fx/dfx\n        x = x + step\n    \
    \    if abs(step) < atol + rtol*abs(x):\n            return x, k\n    raise RuntimeError(\"\
    no convergence\")\n```\n\n## Derivative-Free Variants\n\nWhen $f'$ is unavailable\
    \ or expensive one replaces it with a finite-difference or secant approximation.\n\
    \n*Secant Method* Starting from $x_0$ and $x_1$,\n\n$$x_{k+1} = x_k - f(x_k) \\\
    frac{x_k - x_{k-1}}{f(x_k) - f(x_{k-1})},$$\n\nrequires one function evaluation\
    \ per iteration and converges with order $\\phi = \\frac{1}{2}(1 + \\sqrt{5})\
    \ \\approx 1.618$ (super-linear) provided $f \\in C^1$ near the root.\n\n*Steffensen's\
    \ Method* Accelerates fixed-point iteration $\\varphi(x)$ via\n\n$$x_{k+1} = x_k\
    \ - \\frac{(\\varphi(x_k) - x_k)^2}{\\varphi(\\varphi(x_k)) - 2\\varphi(x_k) +\
    \ x_k},$$\n\nachieving quadratic convergence without derivative evaluation; it\
    \ amounts to applying the secant method to $g(x) = \\varphi(x) - x$ with an automatically\
    \ generated second point.\n\n*Aitken $\\Delta^2$ Process* Given a linearly convergent\
    \ sequence $\\{x_k\\}$, $\\hat{x}_k = x_k - \\frac{(x_{k+1}-x_k)^2}{x_{k+2}-2x_{k+1}+x_k}$\
    \ produces an accelerated sequence often approaching quadratic behaviour; used\
    \ as a post-processing step for simple iteration.\n\n## Convergence Analysis\n\
    \nLet $r$ satisfy $f(r) = 0$ and $f'(r) \\neq 0$ (simple root). Assuming $f \\\
    in C^2$ on an open interval containing $r$ and the initial guess $x_0$ is sufficiently\
    \ close to $r$, the error evolves as\n\n$$e_{k+1} = x_{k+1} - r = -\\frac{f(r\
    \ + e_k)}{f'(r + e_k)} = -\\frac{f'(r)e_k + \\frac{1}{2}f''(r)e_k^2 + O(e_k^3)}{f'(r)\
    \ + f''(r)e_k + O(e_k^2)}$$\n$$= -\\frac{f'(r)e_k}{f'(r)} + \\frac{f''(r)}{2f'(r)}e_k^2\
    \ + O(e_k^3) = Ce_k^2 + O(e_k^3),$$\n\nwith $C = -\\frac{f''(r)}{2f'(r)}$. Thus\
    \ $|e_{k+1}| \\approx |C|e_k^2$, so the number of correct digits roughly *doubles*\
    \ each iteration. If $f'(r) = 0$ but $f''(r) \\neq 0$ (a multiple root), the convergence\
    \ drops to linear; one restores quadratic order by applying Newton to $g(x) =\
    \ \\frac{f(x)}{f'(x)}$ or by modifying the iteration with a multiplicity estimate.\n\
    \nFor global convergence one often embeds a *line-search*: replace the full Newton\
    \ step by $\\lambda \\Delta x$, $0 < \\lambda \\leq 1$, chosen to decrease $|f(x)|$\
    \ sufficiently (*Armijo rule*); this prevents divergence when $f'$ is small or\
    \ the function is highly nonlinear.\n\n## Multivariate Newton's Method\n\nFor\
    \ $F : \\mathbb{R}^n \\to \\mathbb{R}^n$ with Jacobian $J(\\mathbf{x}) = [\\partial\
    \ F_i / \\partial x_j]$,\n$$\\mathbf{x}_{k+1} = \\mathbf{x}_k - J(\\mathbf{x}_k)^{-1}\
    \ F(\\mathbf{x}_k).$$\n\nOne solves the linear system $J(\\mathbf{x}_k) \\Delta\
    \ \\mathbf{x}_k = -F(\\mathbf{x}_k)$ for $\\Delta \\mathbf{x}_k$ (via LU or QR)\
    \ and sets $\\mathbf{x}_{k+1} = \\mathbf{x}_k + \\Delta \\mathbf{x}_k$. Quadratic\
    \ convergence holds under analogous conditions: $J(\\mathbf{r})$ nonsingular and\
    \ $F$ continuously differentiable.\n\n```python\nimport numpy as np\nfrom numpy.linalg\
    \ import solve, norm\n\ndef newton_multi(F, J, x0, *, atol=1e-12, rtol=1e-10,\
    \ max_iter=30):\n    x = np.array(x0, dtype=float)\n    for k in range(max_iter):\n\
    \        Fx = F(x)\n        if norm(Fx, np.inf) < atol: return x, k\n        Δx\
    \ = solve(J(x), -Fx)\n        x = x + Δx\n        if norm(Δx, np.inf) < atol +\
