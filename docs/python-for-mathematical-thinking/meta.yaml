    \              [1,0,1,0,1,1,0]], dtype=int)\ns = H @ r % 2 # syndrome\nprint(s)\
    \ # identifies position 7\n```\n\n**基于格的密码学** 多项式环模分圆多项式中的理想实现了配备困难*最近向量*问题（NTRU，Ring-LWE）的格。据推测，这些结构能抵抗量子攻击，使其成为后量子标准的主要候选者。\n\
    \n## 7.5.3 拟阵及其应用\n\n拟阵理论抽象了线性代数、图论和集合系统中出现的“独立性”概念，并将其提炼为一种组合结构，该结构具有强大的优化保证。一个*拟阵*是一个对\
    \ $\\mathcal{M} = \\langle E, \\mathcal{I} \\rangle$，其中 $E$ 是一个有限的基础集，$\\mathcal{I}\
    \ \\subseteq 2^E$ 是一个非空的*独立*子集集合，满足\n\n(I1) 遗传性：$I \\in \\mathcal{I}$，$J \\subseteq\
    \ I \\Rightarrow J \\in \\mathcal{I}$，(I2) 交换性：$I, J \\in \\mathcal{I}$，$|I| <\
    \ |J| \\implies \\exists e \\in J \\setminus I : I \\cup \\{e\\} \\in \\mathcal{I}$。\n\
    \n交换公理使拟阵与向量空间保持一致：每个独立集都可以扩展为一个*基*，所有基具有相同的基数 $\\operatorname{rk} \\mathcal{M}$，并且贪心扩展永远不会卡住。等价的定义使用一个*秩函数*\
    \ $r : 2^E \\to \\mathbb{N}$，该函数是单调的、次模的，并且受包含关系约束，或者使用*回路*（极小相关集）的集合，这些回路满足回路消除性质。\n\
    \n## 拟阵简介与示例\n\n典型的例子揭示了拟阵如何统一不同的背景。\n\n- *均匀拟阵* $U_{n,k}$：$E = \\{1, \\dots,\
    \ n\\}$，$\\mathcal{I} = \\{I \\subseteq E : |I| \\leq k\\}$。任何子集的秩为 $\\min\\{|S|,\
    \ k\\}$。\n- 图 $G = (V, E)$ 的*图（圈）拟阵* $M(G)$：独立集是森林（无圈的边子集）。基对应于生成树；秩等于 $|V| -\
    \ c(G)$，其中 $c(G)$ 是连通分量的数量。\n- *向量拟阵* $M(V)$：$E$ 是向量空间中的一个有限向量集，独立性按线性方式定义。可表示的拟阵将线性代数与组合学联系起来；例如，$F_7$（法诺平面）在\
    \ $\\mathbb{F}_2$ 上可表示，但在 $\\mathbb{R}$ 上不可表示。\n- *横拟阵*：给定 $E$ 的一个子集族 $\\mathcal{A}\
    \ = \\{A_1, \\dots, A_m\\}$，一个集合 $I \\subseteq E$ 是独立的，如果它包含在 $\\mathcal{A}$ 的某个相异代表系中。霍尔婚姻定理刻画了基。\n\
    \n**示例 7.5.7（图拟阵的回路）** 设 $G$ 是一个带对角线的正方形。其边集 $E = \\{e_1, \\dots, e_5\\}$ 有三个回路：两个三角形和一个\
    \ 4-圈。从回路中删除任何一条边都会得到一个森林；向森林中添加任何外部边都会恰好闭合一个唯一的新回路——这反映了图形式的交换公理。\n\n秩和闭包定义了平面（闭集），其格编码了几何性质；在图的情况下，平面对应于边割。\n\
    \n## 在优化和图论中的应用\n\n许多经典的优化问题隐藏着拟阵结构，因此允许多项式时间的贪心解。\n\n**生成树与森林** 克鲁斯卡尔算法选择不形成圈的最小权重边——这正是带权重的图拟阵的贪心算法。根据拟阵理论，所得集合是最小权重基。\n\
    \n**分支与树形图** 有向图中形成无圈子图的弧集构成一个*伽莫伊德*。埃德蒙兹分支定理将拟阵交扩展到寻找最小代价有根树形图。\n\n**拟阵交与并**\
    \ 给定同一基础集上的两个拟阵 $\\mathcal{M}_1, \\mathcal{M}_2$，最大公共独立集可以通过增广路径算法在 $O(|E|^{1.5})$\
    \ 时间内找到；应用包括边不相交生成树和二部匹配（图拟阵 $\\cap$ 分划拟阵）。\n\n**割、流与对偶性** 对于平面图，余圈拟阵 $M^*(G)$\
    \ 与 $M(G^*)$ 对偶，其中 $G^*$ 是平面的对偶图。这种对应关系是平面流-割对偶性的基础，并解释了为什么在容量-长度互换下，平面网络中的最大流等于最小割。\n\
    \n## 示例 7.5.8（Python 中的拟阵并编码）\n\n```python\nimport networkx as nx, itertools\n\
    G = nx.cycle_graph(4) # C_4\nE = list(G.edges())\ndef is_forest(S): # independence\
    \ oracle\n    H = nx.Graph(); H.add_edges_from(S)\n    return nx.is_forest(H)\n\
    # union of two graphic matroids: two edge-disjoint forests\nbest = set()\nfor\
    \ S in itertools.chain.from_iterable(\n        itertools.combinations(E, k) for\
    \ k in range(len(E)+1)):\n    F1, F2 = set(S[:len(S)//2]), set(S[len(S)//2:])\n\
    \    if is_forest(F1) and is_forest(F2) and len(S)>len(best):\n        best =\
    \ set(S)\nprint(best) # maximum size 4 on C_4\n```\n\n## 贪心算法与拟阵理论\n\n*拟阵贪心算法*按非递减权重对元素\
    \ $e_1, \\dots, e_m$ 排序，并在保持独立性的情况下依次添加 $e_i$。**埃德蒙兹-拉多定理**指出，对于任何权重函数 $w : E\
    \ \\to \\mathbb{R}_{\\ge 0}$，该算法都能产生一个总权重最小的基。反之，如果一个集合系统对于每个权重分配都允许最优的贪心选择，那么它的独立集构成一个拟阵（Edmonds\
    \ 1971; Rado 1957）。\n\n**定理 7.5.1（贪心最优性 Edmonds 1971）** *设 $\\langle E, \\mathcal{I}\
    \ \\rangle$ 满足遗传性和交换公理。对于任何权重函数 $w$，贪心算法返回一个基 $B_{\\text{greedy}}$，满足*\n$$w(B_{\\\
    text{greedy}}) = \\min\\{w(B) : B \\text{ basis}\\}.$$\n**证明** 将 $E$ 排序使得 $w(e_1)\
    \ \\le \\cdots \\le w(e_m)$。归纳地，设 $B_k$ 是检查前 $k$ 个元素后的贪心集，$O$ 是任意最优基。交换性质产生一个单射映射，用\
    \ $B_k$ 中较轻（或相等）的元素替换 $O$ 中较重的元素而不增加权重，因此 $w(B_{\\text{greedy}}) \\le w(O)$。\n\
    \n## 示例 7.5.9（向量拟阵上的贪心）\n\n```python\nimport numpy as np, random\nE = [np.random.randint(0,\
    \ 7, 4) for _ in range(10)]\nw = np.random.rand(10)\nidx = np.argsort(w) # ascending\
    \ weights\nB = []\nfor i in idx:\n    v = E[i]\n    if np.linalg.matrix_rank(B+[v])\
    \ > np.linalg.matrix_rank(B):\n        B.append(v)\nprint(len(B)) # dimension\
    \ of span\n```\n\n加权拟阵交将贪心推广到两个拟阵；该算法沿着“交换图”迭代增广，并在强多项式时间内运行，构成了分配和调度问题的算法基础。\n\
    \n## 7.6 练习\n\n1. 对于多项式序列 $P_n = 6n^3 + 11n^2 - 21n$，证明对于每个 $n \\in \\mathbb{N}$，$P_{n+1}\
    \ - P_n$ 可被 30 整除，并确定最大的整数 $M$，使得对于所有 $n$，$\\frac{P_n}{M} \\in \\mathbb{Z}$。使用欧几里得算法将\
    \ $M$ 表示为不同素数的乘积，并说明它为何是最大的。\n2. 给定素数 $p = 550,201$ 和 $q = 627,161$，公钥指数 $e =\
    \ 65,537$，以及密文 $c = 2,214,367$，执行以下操作：\n    (a) 计算 $N = pq$ 和 $\\varphi(N)$。\n\
    \    (b) 通过扩展欧几里得算法找到私钥指数 $d \\equiv e^{-1} \\pmod{\\varphi(N)}$。\n    (c) 通过模幂运算解密\
    \ $c$ 以获得明文整数 $m$。\n    通过单次模幂运算验证 $m^e \\equiv c \\pmod{N}$ 以确认正确性。\n3. 设 $p\
    \ = 991$。计算二次剩余集 $Q = \\{a^2 \\bmod p : 1 \\le a \\le p - 1\\}$ 并证明 $\\sum_{q\
    \ \\in Q} q \\equiv 0 \\pmod{p}$。使用欧拉判别法，确定对于哪些 $k \\in \\{1, \\dots, 40\\}$，整数\
    \ $a_k = k^2 + 14k + 9$ 是模 $p$ 的二次剩余。\n4. 找到所有同时满足以下条件的整数 $x$：\n    $x \\equiv\
    \ 17 \\pmod{34}$，$x \\equiv 19 \\pmod{51}$，$x \\equiv 23 \\pmod{85}$。\n    解释为什么模数不是两两互素的，展示如何将系统简化为两两互素的同余式，并将解集表示为\
    \ $x \\equiv x_0 \\pmod{m_0}$，其中 $m_0$ 是最小可能的模数。\n5. 考虑曲线 $E : y^2 = x^3 + 75x\
    \ + 123$ 在 $\\mathbb{F}_p$ 上，其中 $p = 593$。\n    (a) 使用勒让德符号 $(\\frac{\\cdot}{p})$，实现一个\
    \ PYTHON 程序，通过对二次剩余指示器求和来计算 $N_p = |E(\\mathbb{F}_p)|$。\n    (b) 验证哈塞界 $|N_p -\
    \ (p + 1)| \\le 2\\sqrt{p}$。\n    (c) 计算群的阶并判断 $E(\\mathbb{F}_p)$ 是否是循环群。\n6.\
    \ 对于一个固定的正非平方数 $D < 100$，$x^2 - Dy^2 = 1$ 的基本解是 $(x_1, y_1)$。证明\n    $x_n + y_n\\\
    sqrt{D} = (x_1 + y_1\\sqrt{D})^n$"
