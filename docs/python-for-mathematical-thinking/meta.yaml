  md: '# Metrics


    Accuracy acc = $\frac{1}{n} \sum \mathbf{1}_{\arg \max_k \hat{y}_k = \arg \max_k
    y_k}$; confusion matrix evaluates class imbalance; top-k accuracy for image nets.
    For regression, report $R^2 = 1 - \|\hat{y} - y\|^2 / \|y - \bar{y}\|^2$ and RMSE.


    # Early Stopping


    Hold-out validation loss $L_{\text{val}}^{(r)}$ monitors overfitting; stop when
    $L_{\text{val}}$ fails to improve for $p$ epochs. Patience $p$ chosen by nested
    cross-validation.


    # Hyperparameter Tuning and Model Selection


    Let hyperparameter vector $\lambda = (\text{learning rate, widths, } \beta, \lambda_{\text{wd}},
    p_{\text{drop}})$. Define validation estimate $\widehat{R}_{\text{val}}(\lambda)
    = \frac{1}{|V|} \sum_{i \in V} \ell(h_{\Theta^*(\lambda)}(\mathbf{x}_i), y_i)$.


    # Grid and Random Search


    Random search samples $\lambda$ from log-uniform priors; empirical study (Bergstra
    and Bengio 2012) shows $\approx 60 \times$ faster than exhaustive grids in high
    dimension.


    # Bayesian Optimisation


    Treat $f(\lambda) = \widehat{R}_{\text{val}}$ as black box; model via Gaussian
    process $\mathcal{GP}(m, k)$ and choose next point by maximising acquisition function
    (expected improvement). Converges to optimum with sub-linear regret.


    # Cross-Validation


    $k$-fold CV splits data into $k$ blocks; rotate validation fold, average risks.
    Nested CV: outer loop estimates generalisation, and inner loop selects $\lambda$,
    preventing optimistic bias.


    # Practical Recipe


    +   (i) Scale inputs (mean–variance or min–max) before tuning.

    (ii) Fix architecture family, run *coarse* random search ( $\sim 30$ trials) for
    learning rate log-range $10^{-4}$–$10^{-1}$, width $2^{[5,9]}$, dropout $p \in
    [0.0, 0.5]$.'
