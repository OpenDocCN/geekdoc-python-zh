    \ s, t)\n```\n\nThe result is $f(t) = 1 - \\cos t$, confirming manual residue\
    \ calculus.\n\n### 11.1.2 Automated Theorem Proving\n\nAutomated theorem proving\
    \ (ATP) aspires to mechanise the deductive steps that underlie mathematical reasoning,\
    \ transforming the informal \"proof-sketch\" of the human mathematician into a\
    \ sequence of sound inferences that a computer can verify independently. Since\
    \ the seminal work of Davis, Putnam, Logemann, and Loveland on the DPLL procedure\
    \ and Robinson's resolution calculus, ATP has grown into a vibrant discipline\
    \ that interlaces proof theory, model theory, complexity theory, and symbolic\
    \ computation. Today, SMT-solvers such as Z3 decide quantifier-free fragments\
    \ of first-order logic with millions of clauses in seconds, while interactive\
    \ proof assistants—e.g. Coq, Lean, Isabelle—blend automation with user guidance\
    \ to formalise entire textbooks. This subsection traces the logical foundations,\
    \ exhibits SymPy's nascent proof engine, and illustrates applications to formal\
    \ verification and cryptography where mechanical rigour is indispensable.\n\n\
    ### Introduction to Theorem Proving\n\nLet $\\mathcal{L}$ be a first-order language\
    \ with signature $\\Sigma = (\\mathcal{F}, \\mathcal{P})$ of function and predicate\
    \ symbols. A *sequent* $\\Gamma \\vdash \\Delta$ encodes entailment \"from premises\
    \ $\\Gamma$ derive conclusions $\\Delta$\". Gentzen's natural deduction system\
    \ equips $\\mathcal{L}$ with introduction and elimination rules for $\\wedge,\
    \ \\vee, \\forall, \\exists, \\neg, \\Rightarrow$ such that every valid formula\
    \ $\\varphi$ has a derivation $\\vdash \\varphi$.\n\n### Soundness and Completeness\n\
    \nIf $\\Gamma \\vdash \\varphi$, then $\\Gamma \\models \\varphi$ (soundness);\
    \ conversely, if $\\Gamma \\models \\varphi$, then $\\Gamma \\vdash \\varphi$\
    \ (Gödel completeness). Proof search, however, is PSPACE-complete for propositional\
    \ logic and undecidable for full first-order logic due to the Löwenheim–Skolem\
    \ theorem. Practical provers therefore restrict to decidable fragments (EUF, linear\
    \ arithmetic) or employ heuristics (term ordering, lemma learning).\n\n### Using\
    \ SymPy for Automated Proofs\n\nSymPy implements a lightweight propositional engine\
    \ based on the Davis–Putnam algorithm and a first-order unification module. Consider\
    \ the tautology\n\n$(p \\Rightarrow q) \\wedge (q \\Rightarrow r) \\Longrightarrow\
    \ (p \\Rightarrow r)$.\n\n```python\nfrom sympy import symbols, Implies, satisfiable\n\
    p,q,r = symbols('p q r')\nphi = Implies( Implies(p,q) & Implies(q,r)), Implies(p,r)\
    \ )\nassert not satisfiable(~phi) # unsatisfiable ⟹ ϕ is valid\n```"
