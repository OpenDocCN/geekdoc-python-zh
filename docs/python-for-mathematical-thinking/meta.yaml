    \ via a small least-squares problem. Memory grows with $k$; *restarted* GMRES($m$)\
    \ limits basis size at the cost of slower convergence.\n\n## Preconditioning\n\
    \nTransform $M^{-1}A\\mathbf{x} = M^{-1}\\mathbf{b}$ with inexpensive $M \\approx\
    \ A$. For SPD, incomplete Cholesky (IC($\\tau$)) maintains sparsity; for nonsymmetric\
