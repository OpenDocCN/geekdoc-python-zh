    \ R \\ 0 & I \\end{pmatrix}$ with $Q \\in \\mathbb{R}^{r \\times r}$. The **fundamental\
    \ matrix** $N = (I - Q)^{-1}$ satisfies $N_{ij} =$ expected visits to transient\
    \ $j$ starting from $i$; expected absorption time $\\mathbf{t} = N \\mathbf{1}$."
