    # 5.1.4 Common Probability Distributions


    # Binomial, Poisson, and Geometric Distributions


    The *counting* distributions arise naturally from Bernoulli trials and Poisson-process
    limits.


    *Binomial.* If $X \sim \text{Bin}(n, p)$ counts successes in $n$ independent Bernoulli($p$)
    trials,


    $$\mathbb{P}(X = k) = \binom{n}{k} p^k (1 - p)^{n-k}, \quad 0 \le k \le n.$$


    Expectation $\mu = np$, variance $\sigma^2 = np(1 - p)$, mgf $M_X(t) = (1 - p
    + pe^t)^n$.


    **Example 5.1.14** Toss a fair coin $n = 10$ times; probability of exactly $k
    = 4$ heads is $\binom{10}{4}/2^{10} = 0.205$.


    ```

    from math import comb

    print(comb(10,4)/2**10)

    ```


    *Poisson* Limit of binomial with $n \to \infty$, $p \to 0$ while $np = \lambda$
    fixed:


    $$\mathbb{P}(X = k) = e^{-\lambda} \frac{\lambda^k}{k!}, \quad k \in \mathbb{N}_0.$$


    Mean and variance equal $\lambda$; mgf $\exp(\lambda(e^t - 1))$.


    **Example 5.1.15** Radioactive decay emits on average $\lambda = 3$ particles
    per minute. Probability of no particles in the next minute: $e^{-3} \approx 0.0498$.


    *Geometric* Number $X$ of Bernoulli($p$) trials until first success (counting
    the success):


    $$\mathbb{P}(X = k) = p(1 - p)^{k-1}, \quad k = 1, 2, \ldots$$


    Memoryless: $\mathbb{P}(X > m+n \mid X > m) = (1 - p)^n$. Mean $1/p$, variance
    $(1 - p)/p^2$.'
  - '[PAGE 167]


    # Normal, Exponential, and Gamma Distributions


    Normal $X \sim \mathcal{N}(\mu, \sigma^2)$ possesses density


    $$f(x) = \frac{1}{\sqrt{2\pi}\sigma} \exp\left(-\frac{(x-\mu)^2}{2\sigma^2}\right).$$


    Linear transformations preserve normality; sums of independent normals remain
    normal.


    **Example 5.1.17** Heights of students: $\mu = 170$ cm, $\sigma = 8$ cm. Probability
    a student is taller than 185 cm:


    $$1 - \Phi\left(\frac{185 - 170}{8}\right) = 1 - \Phi(1.875) \approx 0.030.$$


    *Exponential* Waiting time $X \sim \text{Exp}(\lambda)$:


    $$f(x) = \lambda e^{-\lambda x} \mathbf{1}_{\{x \ge 0\}}, \quad F(x) = 1 - e^{-\lambda
    x}.$$


    Mean $1/\lambda$, variance $1/\lambda^2$; memoryless: $\mathbb{P}(X > s + t \mid
    X > s) = e^{-\lambda t}$.


    **Example 5.1.18** Web-server requests arrive at 4 per second ($\lambda = 4$).
    Probability next request arrives after 0.5s: $e^{-4 \cdot 0.5} \approx 0.135$.


    *Gamma* Sum of $k$ i.i.d. exponential($\lambda$) variables: $X \sim \Gamma(k,
    \lambda)$,


    $$f(x) = \frac{\lambda^k x^{k-1} e^{-\lambda x}}{\Gamma(k)}, \quad x \ge 0.$$


    Mean $k/\lambda$, variance $k/\lambda^2$.


    **Example 5.1.19** Total phone-call duration of $k = 3$ customers, each exponential($\lambda
    = 1/6$) hours, follows $\Gamma(3, 1/6)$ with mean 18 min and variance 108 min$^2$.


    # Central Limit Theorem and Law of Large Numbers


    *Weak Law of Large Numbers (WLLN)* For i.i.d. $X_i$ with finite mean $\mu$ and
    variance $\sigma^2$,


    $$\frac{1}{n} \sum_{i=1}^n X_i \xrightarrow{\mathbb{P}} \mu \quad \text{as } n
    \to \infty.$$'
