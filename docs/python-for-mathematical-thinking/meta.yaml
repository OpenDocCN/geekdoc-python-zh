    # Covariant and Contravariant Tensors


    Contravariant components $V^i$ transform via:


    $V''^{i} = \frac{\partial x''^{i}}{\partial x^j} V^j$.


    Covariant components $W_i$ transform as:


    $W''_i = \frac{\partial x^j}{\partial x''^i} W_j$.


    The transformation law ensures tensorial consistency under coordinate change.


    **Example 3.4.16 (Raising and Lowering Indices)** Given $g_{ij}$ and $g^{ij}$
    (inverse metric), convert between:


    $v_i = g_{ij} v^j$, $v^i = g^{ij} v_j$.


    ```

    g_down = np.array([[2, 1], [1, 2]])

    g_up = np.linalg.inv(g_down)

    v_up = np.array([3, 4])

    v_down = np.einsum("ij,j->i", g_down, v_up)

    v_raised = np.einsum("ij,j->i", g_up, v_down)

    print(v_raised) # Recovers original [3 4]

    ```


    **Example 3.4.17 (Transformation Under Rotation)** Rotate a vector $v^i$ under
    angle $\theta$. Transformation matrix:


    $R^i_j = \begin{pmatrix} \cos\theta & -\sin\theta \ \sin\theta & \cos\theta \end{pmatrix}$


    ```

    theta = np.pi / 4

    R = np.array([[np.cos(theta), -np.sin(theta)], [np.sin(theta), np.cos(theta)]])

    v = np.array([1, 0])

    v_rot = np.einsum("ij,j->i", R, v)

    print(v_rot) # Output: [0.707..., 0.707...]

    ```'
