    # 5.4.4 Bayesian Statistics


    Bayesian statistics interprets probability as a degree of belief, updating that
    belief in light of data via Bayes'' theorem. The paradigm unifies estimation,
    prediction, and'
- md: "decision theory, and naturally quantifies uncertainty. A Bayesian workflow\
    \ typically proceeds as: (i) choose a prior distribution for the parameter(s),\
    \ (ii) compute or approximate the posterior given observed data, and (iii) draw\
    \ inferences or make decisions using the posterior (e.g. point estimates, credible\
    \ intervals, posterior predictive checks).\n\n## Bayesian Inference and Prior\
    \ Distributions\n\nLet $\\theta$ be an unknown parameter and $\\mathcal{D}$ the\
    \ data. Bayes' theorem gives the **posterior**\n\n$$p(\\theta \\mid \\mathcal{D})\
    \ = \\frac{p(\\mathcal{D} \\mid \\theta) \\, p(\\theta)}{\\int p(\\mathcal{D}\
    \ \\mid \\theta) \\, p(\\theta) \\, d\\theta},$$\n\nwhere $p(\\theta)$ is the\
    \ *prior* and $p(\\mathcal{D} \\mid \\theta)$ the *likelihood*.\n\n**Conjugate\
    \ Priors** A prior $p(\\theta)$ is *conjugate* to the likelihood if the posterior\
    \ is in the same family.\n\n**Example 5.4.14 (Beta-Binomial Model)** Coin with\
    \ unknown head probability $\\theta$. Prior $\\theta \\sim \\text{Beta}(\\alpha,\
    \ \\beta)$; data $x \\mid \\theta \\sim \\text{Binom}(n, \\theta)$. Posterior:\n\
    \n$$\\theta \\mid x \\sim \\text{Beta}(\\alpha + x, \\beta + n - x).$$\n\nWith\
    \ $\\alpha = \\beta = 1$ (uniform prior) and $x = 7$ heads in $n = 10$ tosses,\
    \ posterior Beta(8, 4) has mean $8/12 \\approx 0.667$ and 95% credible interval\
    \ (0.39, 0.88).\n\n```python\nimport scipy.stats as st, numpy as np\nalpha, beta,\
    \ x, n = 1, 1, 7, 10\nposterior = st.beta(alpha+x, beta+n-x)\nprint(posterior.mean(),\
    \ posterior.interval(.95))\n```\n\n**Example 5.4.15 (Normal–Normal with Unknown\
    \ Mean)** Observations $y_i \\sim \\mathcal{N}(\\mu, \\sigma^2)$; known $\\sigma^2$;\
    \ prior $\\mu \\sim \\mathcal{N}(\\mu_0, \\tau_0^2)$. Posterior:\n\n$$\\mu \\\
    mid \\mathbf{y} \\sim \\mathcal{N}\\left(\\frac{\\tau_0^{-2} \\mu_0 + n \\sigma^{-2}\
    \ \\bar{y}}{\\tau_0^{-2} + n \\sigma^{-2}}, (\\tau_0^{-2} + n \\sigma^{-2})^{-1}\\\
    right).$$\n\nWith $\\mu_0 = 0, \\tau_0 = 5, \\sigma = 1, n = 20, \\bar{y} = 0.8$:\n\
    \n```python\nmu0, tau0, sigma, n, ybar = 0, 5, 1, 20, 0.8\nprec = 1/tau0**2 +\
    \ n/sigma**2\npost_mean = (mu0/tau0**2 + n*ybar/sigma**2)/prec\npost_sd = np.sqrt(1/prec)\n\
    print(post_mean, post_sd)\n```\n\n**Hierarchical Priors** For multi-level data,\
    \ treat group parameters as drawn from hyper-priors to share information (\"partial\
    \ pooling\"). Example: batting averages across players $\\theta_j \\sim \\text{Beta}(\\\
    alpha, \\beta)$ with hyper-prior on $(\\alpha, \\beta)$ promotes shrinkage towards\
    \ league mean.\n\n## Markov Chain Monte Carlo (MCMC) Methods\n\nWhen the normalising\
    \ constant in Bayes’ theorem is intractable, approximate the posterior via sampling.\n\
    \n**Metropolis–Hastings** Given proposal $q(\\theta' \\mid \\theta)$, accept $\\\
    theta'$ with probability $\\alpha = \\min\\left(1, \\frac{p(\\theta')p(\\mathcal{D}\\\
    mid\\theta')q(\\theta\\mid\\theta')}{p(\\theta)p(\\mathcal{D}\\mid\\theta)q(\\\
    theta'\\mid\\theta)}\\right)$.\n\n### Example 5.4.16 (Mixture of Normals, Bimodal\
    \ Posterior)\n\n```python\nimport numpy as np, matplotlib.pyplot as plt, scipy.stats\
    \ as st\nnp.random.seed(0)\ndef logpost(θ): # unnormalised log posterior\n   \
    \ return np.log(0.3*st.norm.pdf(θ,-3,1) + 0.7*st.norm.pdf(θ,2,0.5))\nθ0, samples,\
    \ burn = 0.0, [], 3_000\nθ = θ0\nfor i in range(20_000):\n    θ_prop = θ + np.random.normal(scale=1)\n\
    \    if np.random.rand() < np.exp(logpost(θ_prop)-logpost(θ)):\n        θ = θ_prop\n\
    \    if i >= burn: samples.append(θ)\nplt.hist(samples, bins=60, density=True);\
    \ plt.show()\n```\n\nThe histogram recovers two modes near $-3$ and $2$ (cf. Fig.\
    \ 5.14).\n\n## Gibbs Sampling\n\nIf full-conditional distributions are available,\
    \ sample each parameter sequentially.\n\n![](img/9724708489e3df346f9e31e3fa6e5746_204_0.png)\n\
    \nExample 5.4.17 (Gaussian–Gaussian Conjugate Hierarchical Model) Posterior full\
    \ conditionals: $\\mu \\mid \\sigma^2, \\mathbf{y} \\sim \\mathcal{N}(\\dots)$,\
    \ $\\sigma^2 \\mid \\mu, \\mathbf{y} \\sim \\text{Inv-}\\chi^2(\\dots)$. Alternating\
    \ draws converge to joint posterior; pymc automates.\n\n**Hamiltonian Monte Carlo\
