    converges linearly with rate $\rho_{\text{GD}} = 1 - \mu/L$, $\mu = 2$. (ii) Derive
    the characteristic polynomial of the Nesterov iteration with parameter $\beta
    = 1 - \sqrt{\mu/L}$ and prove that $\rho_{\text{NAG}} = \sqrt{1 - \mu/L}$. (iii)
    Numerically confirm the theoretical rates from $\mathbf{x}_0 = (1, 1, 1)^T$ and
    report the number of iterations to reach $\|\nabla f\|_2 \le 10^{-8}$.


    5. Minimise $z = -4x_1 - 3x_2$ subject to


    $$2x_1 + x_2 + x_3 = 8,$$

    $$x_1 + x_2 + x_4 = 5,$$

    $$x_1, x_2, x_3, x_4 \ge 0.$$


    *(i)* Write the initial simplex tableau with slack variables $(x_3, x_4)$ basic.
    *(ii)* Apply Bland''s rule to avoid cycling and hand-compute all pivots until
    optimality; list the sequence of bases. *(iii)* Perform a sensitivity study: if
    the RHS of the first constraint changes to $8 + \delta$, determine the allowable
    interval of $\delta$ that leaves the optimal basis unchanged and compute $\partial
    z^*/\partial \delta$.


    6. Consider Rosenbrock''s function $f(x, y) = (1-x)^2 + 100(y-x^2)^2$. Implement
    (a) L-BFGS-B with backtracking line search, (b) Powell''s dogleg trust-region.
    Run both from $(-1.2, 1)$, record iterations, Jacobian evaluations, and final
    $\|\nabla f\|_2$. Explain with curvature arguments why the dogleg method escapes
    the valley more directly.


    7. Maximise $g(\mathbf{x}) = \sum_{i=1}^{20} \sin x_i + \sin^2 x_{i+1}$ over $[0,
    2\pi]^{20}$. Tune population size $P$, mutation rate $\mu$, and crossover rate
    $c$ via Latin hypercube sampling (32 design points). Fit a quadratic response
    surface predicting best-of-run fitness $\hat{g}(P, \mu, c)$ and identify the optimal
    hyperparameters. Validate on ten random seeds and report mean $\pm$ standard deviation.


    8. Construct the $6 \times 6$ matrix $A_{ij} = 10^{|i-j|} + (-1)^{i+j}$. (i) Perform
