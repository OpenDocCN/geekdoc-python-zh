    # Predicting Weather Patterns and Stock-Market Dynamics


    Meteorology


    Lorenz’s 1963 model


    ```

    $$\dot{x} = \sigma(y - x), \quad \dot{y} = x(\rho - z) - y, \quad \dot{z} = xy
    - \beta z$$

    ```


    with $(\sigma, \rho, \beta) = (10, 28, 8/3)$ exhibits a dominant positive Lyapunov
    exponent $\lambda_1 \approx 0.905 \text{ s}^{-1}$ in nondimensional units. The
    *predictability horizon* for an initial uncertainty $\delta_0$ is $\tau \approx
    \lambda_1^{-1} \ln(\varepsilon/\delta_0)$, where $\varepsilon$ is the admissible
    forecast error. Assimilation schemes (e.g., 4D-Var) repeatedly re-initialise ensembles
    using partial observations to postpone exponential growth. Modern global circulation
    models show local Lyapunov times ranging from 2 to 10 days; hence *deterministic*
    long-range forecasts cede to *probabilistic* climate projections.


    Finance


    Asset returns $r_t$ often display *volatility clustering*. The Heston stochastic-volatility
    SDE


    ```

    $$dS_t = \mu S_t \, dt + \sqrt{V_t} \, S_t \, dW_t^{(1)},$$

    $$dV_t = \kappa(\theta - V_t) \, dt + \sigma \sqrt{V_t} \, dW_t^{(2)}, \quad dW^{(1)}
    dW^{(2)} = \rho \, dt,$$

    ```


    augmented by a tiny deterministic feedback $cV_t^2$, can generate chaotic variance
    oscillations for realistic parameters $(\kappa, \theta, \sigma, \rho)$. Embedding
    the daily closing-price volatility series via Takens’ delay coordinates reveals
    a correlation dimension $D_2 \approx 2.2$ for several equity indices, hinting
    at low-dimensional deterministic structure beneath stochastic forcing. However,
    surrogate data tests underscore that noise and regime switching may masquerade
    as chaos; rigorous prediction advantage over stochastic benchmarks remains elusive.'
