    # Chi-square Goodness-of-fit


    Observed counts $\{O_i\}$ vs. expected $\{E_i\}$ under $H_0$:


    $$\chi^2 = \sum_{i=1}^k \frac{(O_i - E_i)^2}{E_i} \sim \chi^2_{k-1-r},$$


    where $r$ parameters estimated from data.


    # Example 5.3.3 (Die Fairness)


    Counts (14, 18, 16, 15, 17, 20) in 100 rolls. $E_i = 100/6 \approx 16.67$.


    $$\chi^2 = 2.3, \quad p = 0.804 \ (k=6, r=0) \implies \text{no evidence of bias.}$$


    ```

    obs = np.array([14,18,16,15,17,20])

    chi2, p = st.chisquare(obs)

