  md: "# 7.1.2 Congruences and Number Theoretic Functions\n\nCongruences allow one\
    \ to *localise* arithmetic modulo a positive integer and, when combined with multiplicative\
    \ arithmetic functions, unlock a rich algebraic toolbox. Central actors include\
    \ Euler's totient function, quadratic residue characters, and—in modern cryptography—group\
    \ laws on elliptic curves defined over finite fields. We proceed from general\
    \ structure theorems (Chinese remainder) to concrete algorithms used in error-correcting\
    \ codes and public-key cryptosystems.\n\n# Chinese Remainder Theorem and Euler's\
    \ Totient Function\n\n**CRT Revisited** For pairwise coprime moduli $m_1, \\dots,\
    \ m_k$, the ring isomorphism\n\n$$\\mathbb{Z}/M\\mathbb{Z} \\cong \\mathbb{Z}/m_1\\\
    mathbb{Z} \\times \\dots \\times \\mathbb{Z}/m_k\\mathbb{Z}, \\quad M = \\prod_i\
    \ m_i,$$\n\nis given explicitly by $x \\mapsto (x \\bmod m_1, \\dots, x \\bmod\
    \ m_k)$, with inverse map $x \\equiv \\sum_{i=1}^k a_i M_i M_i^{-1} \\pmod{M}$,\
    \ $M_i = M/m_i$, $M_i^{-1} \\equiv M_i^{-1} \\pmod{m_i}$.\n\n**Euler's Totient**\n\
    \n$$\\varphi(n) = |\\{1 \\le a \\le n \\mid \\gcd(a, n) = 1\\}| = n \\prod_{p|n}\
    \ \\left(1 - \\frac{1}{p}\\right),$$\n\nmultiplicative with respect to coprime\
    \ arguments. CRT implies $(\\mathbb{Z}/n\\mathbb{Z})^\\times \\cong \\prod_{p^e\
    \ \\parallel n} (\\mathbb{Z}/p^e\\mathbb{Z})^\\times$, yielding $|(\\mathbb{Z}/n\\\
    mathbb{Z})^\\times| = \\varphi(n)$.\n\n# Example 7.1.4 (Fast Totient by Factorisation)\n\
    \n```\nfrom sympy import factorint\ndef phi(n):\n    f = factorint(n) # {p:e}\n\
    \    out = n\n    for p in f: out //= p; out *= p-1\n    return out\n```\n\n#\
    \ Applications in Coding Theory and Cryptanalysis\n\n**Linear Feedback Shift Registers\
    \ (LFSR)** Binary LFSRs output sequences whose period divides $2^m - 1$. A characteristic\
    \ polynomial $p(x) \\in \\mathbb{F}_2[x]$ is *primitive* iff $p$ is irreducible\
    \ and $x$ is a generator of $(\\mathbb{F}_{2^m})^\\times$; then the output has\
    \ maximal period $2^m - 1 = \\varphi(2^m)$. Decimation attacks exploit the fact\
    \ that $\\varphi(2^m - 1)$ counts the number of primitive roots."
