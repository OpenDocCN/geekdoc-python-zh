    \ = \\beta v_k + \\nabla f(x_k), \\quad x_{k+1} = x_k - \\eta v_{k+1},$$\n\nwhere\
    \ $0 < \\beta < 1$ averages past gradients, dampening oscillations in ravines.\n\
