  md: '# Quantum Error Correction and Fault Tolerance


    Stabiliser Codes


    An $[[n, k, d]]$ stabiliser code encodes $k$ logical qubits into $n$ physical
    via stabiliser group $\mathcal{S} \subset \mathcal{P}_n$ (Pauli group) with $|\mathcal{S}|
    = 2^{n-k}$. The code space is the simultaneous $+1$ eigenspace of all $S \in \mathcal{S}$.
    Distance $d$ equals minimal weight of Pauli hopping logical subspace. Example:
    $[[7, 1, 3]]$ Steane code with stabiliser generators $XXXXIII$, $IIXXXX$, $\dots$


    Syndrome Extraction


    Measure each stabiliser via ancilla prepared in $|+\rangle$; CNOT interactions
    propagate parity into ancilla''s $Z$ basis. Lookup table or MWPM (minimum-weight
    perfect matching) decoders map syndromes to Pauli corrections.


    Fault-Tolerant Thresholds


    Under depolarising noise rate $p$, surface codes achieve threshold $p_c \approx
    1.1\%$. Logical error probability decays $p_L \sim (p/p_c)^{(d+1)/2}$ where $d
    = 2D + 1$ for distance-$d$ code of lattice size $D$. Magic-state distillation
    injects non-Clifford $T$ gates at overhead $O(\log^c 1/\epsilon)$.


    # Quantum Machine Learning and Optimisation


    Variational Quantum Eigensolver (VQE)


    Minimise $\langle \psi(\boldsymbol{\theta})|H|\psi(\boldsymbol{\theta})\rangle$
    with parameterised ansatz $U(\boldsymbol{\theta})$. Classical optimiser updates
    $\boldsymbol{\theta}$ via stochastic gradient


    $$\partial_{\theta_i} \langle H \rangle = \frac{1}{2} \left( \langle H \rangle_{\theta_i^+}
    - \langle H \rangle_{\theta_i^-} \right),$$


    requiring two circuit evaluations (parameter-shift rule).


    ```

    from qiskit_nature.algorithms import VQE

    ansatz = TwoLocal(num_qubits, ''ry'', ''cz'', entanglement=''linear'')

    optimizer = SPSA(maxiter=200)

    vqe = VQE(ansatz, optimizer, quantum_instance=Aer.get_backend(''qasm_simulator''))

    energy = vqe.compute_minimum_eigenvalue(qubit_op).eigenvalue

    ```'
