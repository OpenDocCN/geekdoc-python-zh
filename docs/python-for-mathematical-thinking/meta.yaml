    \ set(S)\nprint(best) # maximum size 4 on C_4\n```\n\n# Greedy Algorithms and\
    \ Matroid Theory\n\nThe *matroid greedy algorithm* orders elements $e_1, \\dots,\
    \ e_m$ by non-decreasing weight and sequentially adds $e_i$ if it preserves independence.\
    \ The **Edmonds–Rado theorem** states that this algorithm yields a basis of minimum\
    \ total weight for any weight function $w : E \\to \\mathbb{R}_{\\ge 0}$. Conversely,\
    \ if a set system admits optimal greedy selection for every weight assignment,\
    \ its independent sets form a matroid (Edmonds 1971; Rado 1957).\n\n**Theorem\
    \ 7.5.1 (Greedy Optimality Edmonds 1971)** *Let $\\langle E, \\mathcal{I} \\rangle$\
    \ satisfy heredity and the exchange axiom. For any weight function $w$, the greedy\
    \ algorithm returns a basis $B_{\\text{greedy}}$ with*\n$$w(B_{\\text{greedy}})\
    \ = \\min\\{w(B) : B \\text{ basis}\\}.$$\n**Proof** Order $E$ so that $w(e_1)\
    \ \\le \\cdots \\le w(e_m)$. Inductively let $B_k$ be the greedy set after inspecting\
    \ the first $k$ elements and let $O$ be any optimal basis. Exchange property yields\
    \ an injective map replacing heavier elements in $O$ with lighter (or equal) elements\
    \ in $B_k$ without increasing weight, hence $w(B_{\\text{greedy}}) \\le w(O)$.\n\
    \n# Example 7.5.9 (Greedy on a Vector Matroid)\n\n```\nimport numpy as np, random\n\
