    **LaSalle''s Invariance Principle** If $\dot{V} \leq 0$ and solutions remain in
    a compact set, trajectories approach the largest invariant subset where $\dot{V}
    = 0$. Used to prove global convergence to limit cycles or equilibria when $\dot{V}$
    is only negative semi-definite.


    **Example 6.1.19 (Lotka–Volterra via Lyapunov)** For predator–prey system choose
    $V(x, y) = \delta x - \gamma \ln x + \beta y - \alpha \ln y$; $\dot{V} = 0$ along
    all trajectories $\implies$ cycles lie on level sets of $V$; no convergence but
    boundedness.


    # 6.1.4 Numerical Solutions of ODEs


    Analytical formulae rarely exist for realistic models. Robust numerical integrators
    therefore play an indispensable role in modern applied mathematics. We introduce
    the foundational concepts of local/truncation error, global convergence, and stability,
    develop explicit and implicit Runge–Kutta schemes, and illustrate practical modelling
    workflows in NumPy/SciPy.


    # Euler''s Method and Runge–Kutta Methods


    **Forward (Explicit) Euler** For $\dot{y} = f(t, y)$ and time step $h$,


    $$y_{n+1} = y_n + h f(t_n, y_n).$$


    Local truncation error $O(h^2)$; global error $O(h)$ (first order).


    **Example 6.1.20 (Exponential Decay)** $\dot{y} = -3y$, $y(0) = 1$. Take $h =
    0.1$ on $0 \leq t \leq 1$; compare with exact $e^{-3}$.


    ```

    import numpy as np

    h, N = .1, 10

    y = 1.0

    for _ in range(N): y += h*(-3*y)

    print("Euler y(1) =", y, " exact =", np.exp(-3))

    ```


    # Classical RK4


    $$k_1 = f(t_n, y_n),$$

    $$k_2 = f(t_n + h/2, y_n + hk_1/2),$$

    $$k_3 = f(t_n + h/2, y_n + hk_2/2),$$

    $$k_4 = f(t_n + h, y_n + hk_3),$$

    $$y_{n+1} = y_n + \frac{h}{6}(k_1 + 2k_2 + 2k_3 + k_4).$$


    Fourth-order: global error $O(h^4)$.'
