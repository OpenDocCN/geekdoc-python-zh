    \ (1752) 证明，任何连通的平面嵌入将球面划分为 $F$ 个面，满足\n\n$$|V| - |E| + F = 2$$\n\n**证明** 对 $|E|$\
    \ 进行归纳。一棵树（$|E| = |V| - 1$）有 $F = 1$。移除一条非桥边会使 $|E|$ 和 $F$ 各减少 1，同时保持平面性；该不变式成立。\n\
    \n**推论** 对于 $|V| \\ge 3$ 的平面图 $G$：\n\n$$|E| \\le 3|V| - 6, \\quad \\text{且若 }\
