    ∧ x = x), absorption (x ∨ x ∧ y = x), distributivity (x ∧ (y ∨ z) = (x ∧ y) ∨
    (x ∧ z)), and De Morgan’s laws (x ∧ y = x ∨ y). From these axioms one derives
    normal forms:


    +   (a) **Sum-of-Products** (SoP)/Disjunctive Normal Form: f = ∨_{m∈M} (∧_{x_i=0}
    x̄_i) (∧_{x_j=1} x_j), where M lists minterms evaluating to 1;

    (b) **Product-of-Sums** (PoS)/Conjunctive Normal Form, dual to SoP.


    # Example 7.4.4 (SoP Simplification in sympy)


    ```

    import sympy as sp

    a,b,c = sp.symbols(''a b c'')

    expr = (a & ~b) | (~a & b & c) | (a & b & c)

    print(sp.simplify_logic(expr, form=''dnf'')) # a & ~b | b & c

    ```


    The simplifier factors out common sub-terms, saving one AND gate and one input.

    Prime implicants (minimal products that still imply f) form the backbone of systematic
    simplification; the next subsubsection formalises their extraction.


    # Karnaugh Maps and Quine–McCluskey Method


    **Karnaugh Maps (K-maps)** For n ≤ 4 variables a K-map arranges 2^n minterms on
    a Gray-code grid so that adjacent cells differ in a single literal. Grouping 2^k
    adjacent 1’s yields an implicant covering those minterms; overlapping groups minimise
    literal count.


    | | bc = 00 | bc = 01 | bc = 11 | bc = 10 |

    |---|---|---|---|---|

    | a = 0 | 0 | 1 | 1 | 0 |

    | a = 1 | 1 | 1 | 0 | 0 |


    ⟹ f = ā b ∨ b̄ c̄.


    **Quine–McCluskey Algorithm** A tabular, deterministic analogue of K-maps for
    arbitrary n:


    +   1. *Initial grouping*: partition minterms by Hamming weight.

    2. *Iterative merging*: combine terms differing in one literal, marking absorbed
    terms; record prime implicants.'
- md: '## 3. Prime Implicant Chart


    Cover remaining minterms with minimum subset—an NP-hard set cover instance, but
    small in practice.


    ```python

    from pyeda.boolalg.expr import exprvars, SOPform

    from pyeda.boolalg.minimization import espresso_exprs

    a,b,c,d = exprvars(''a'', 4)

    on = [0b0001, 0b0100, 0b1101, 0b1110] # minterms

    dc = [] # don''t cares

    f = SOPform([a,b,c,d], on, dc)

    fmin = espresso_exprs(f)[0]

    print(fmin) # a & ~b & ~c & ~d | b & c & d

    ```


    **Don''t-Care Conditions** Input combinations never encountered in operation can
    be assigned either value, enlarging grouping possibilities and further reducing
    gate count.


    ## Applications in Digital Circuit Design


    **Combinational Logic Synthesis** Given a truth table, pipeline:


    - (i) Derive canonical SoP from minterms.

    - (ii) Simplify via Quine–McCluskey or ESPRESSO heuristic.

    - (iii) Map literals to gates (NAND/NOR preferred in CMOS).

    - (iv) Estimate propagation delay $T_{pd}$ and power; iterate with timing-driven
    optimization.


    ## Example 7.4.5 (4-bit Parity Checker)


    $\text{PAR}(x_3 \dots x_0) = x_3 \oplus x_2 \oplus x_1 \oplus x_0$.


    SoP of even parity has eight minterms; Karnaugh grouping yields $\text{PAR} =
    (x_3 \oplus x_2) \oplus (x_1 \oplus x_0)$, requiring *only* two 2-input XOR gates
    plus one final XOR.


    **Finite-State Machines (FSMs)** State transition and output functions $g, h$
    are Boolean; their ROM or PLA realisations benefit from minimisation:


    $\mathbf{s}_{t+1} = g(\mathbf{s}_t, \mathbf{x}_t)$,


    $\mathbf{y}_t = h(\mathbf{s}_t, \mathbf{x}_t)$.


    State assignment (one-hot, Gray, balanced) affects gate complexity and jitter.


    **Programmable Logic Arrays (PLA) and FPGAs** SOP form maps naturally: product
    terms implement AND plane; summed outputs implement OR plane. Karnaugh/Quine-McCluskey
    minimise the number of product terms, reducing PLA area; FPGA LUTs (look-up tables)
    emulate small truth tables directly—low-literal minimisation reduces the depth
    of LUT cascades.


    **Arithmetic Circuits** Carry-look-ahead adders exploit Boolean identities: $c_{i+1}
    = g_i \lor (p_i \land c_i)$, with generate $g_i = a_i b_i$ and propagate $p_i
    = a_i \oplus b_i$; expanding recursively yields $O(\log n)$ carry depth.


    **Hazards** Static hazard arises when two implicants cover a minterm but their
    adjacency is absent, causing glitches. Karnaugh maps reveal and neutralise hazards
    by inserting redundant implicants that smooth transitions.


    ## 7.4.3 Advanced Topics in Logic


    Predicate (or *first-order*) logic extends propositional logic by permitting variables
    that range over a non-empty domain $\mathcal{D}$ together with *quantifiers*.
    Whereas the truth of a propositional formula is a function of finitely many Boolean
    assignments, the validity of a predicate formula depends on *all* interpretations
    of its symbols over *all* structures of the language. This leap in expressiveness
    amplifies deductive power—allowing one to formalise virtually the whole of classical
    mathematics—yet invites fundamental limitations captured by Gödel’s incompleteness
    theorems. Beyond the classical bivalent setting, alternative logics adapt the
    semantics or proof rules to model vagueness, modality, resource sensitivity, or
    inconsistency, thereby broadening the scope of logical analysis in computer science
    and philosophy.


    ## Predicate Logic and Quantifiers


    A *signature* $\Sigma = \langle \mathcal{F}, \mathcal{P}, \text{ar} \rangle$ lists
    function symbols $\mathcal{F}$ and predicate symbols $\mathcal{P}$ with arities
    $\text{ar}(\cdot) \in \mathbb{N}$. The set of *terms* is generated from variables
    $\{x_1, x_2, \dots\}$ and function application; *atomic formulas* are $P(t_1,
    \dots, t_k)$ and $t_1 = t_2$. Formulas close under Boolean connectives and the
    quantifiers


    $\forall x \, \varphi$ and $\exists x \, \varphi$.


    *Semantics* fixes a structure $\mathcal{M} = \langle \mathcal{D}, (f^{\mathcal{M}})_{f
    \in \mathcal{F}}, (P^{\mathcal{M}})_{P \in \mathcal{P}} \rangle$ and an environment
    $\sigma$ mapping variables to elements of $\mathcal{D}$. Satisfaction $\mathcal{M},
    \sigma \models \varphi$ proceeds inductively; quantifiers take set–theoretic unions
    ($\forall$) or existential witnesses.


    **Prenex and Skolem Forms** Every formula is equivalent (in classical logic) to
    a *prenex* form $Q_1 x_1 \dots Q_n x_n \, \psi$ with quantifier block $Q_i \in
    \{\forall, \exists\}$ followed by quantifier-free $\psi$. Subsequently *Skolemisation*
    replaces existential variables with functional witnesses—preserving satisfiability
    and enabling automated theorem proving.


    ## Example 7.4.6 (Model Checking in sympy)


    ```python

    import sympy as sp

    x,y = sp.symbols(''x y'')

    φ = sp.ForAll(x, sp.Exists(y, x < y)) # ℕ with < is infinite

    M = sp.Domain(''Naturals'')

    print(sp.ask(φ, sp.Q.real)) # True

    ```


    **Completeness** Gödel (1930) showed that first-order logic is *semantically complete*:
    if ⊨ φ then ⊢ φ in any sound and sufficiently rich deductive calculus (e.g. natural
    deduction). Compactness and Löwenheim–Skolem theorems follow: a set of sentences
    is satisfiable iff every finite subset is, and any infinite model has countable
    submodels.


    ## Gödel’s Incompleteness Theorems


    Let T be a consistent, recursively enumerable theory extending Peano arithmetic
    PA. Gödel assigned natural numbers to symbols, formulas, and proofs—*Gödel numbering*—to
    express meta-mathematical statements *inside* T.


    ## Theorem 7.4.1 (Gödel 1931)


    - 1. **(First incompleteness)** There exists a sentence G such that T ⊬ G and
    T ⊬ ¬G. In fact G is true in the standard model ℕ.

    - 2. **(Second incompleteness)** T cannot prove its own consistency Con(T).


    **Sketch** Define Prf_T(p, q) meaning “p codes a proof in T of the formula with
    code q”, representable in arithmetic. The diagonal lemma yields G ≡ ∀p ¬Prf_T(p,
    ⌈G⌉), i.e. “G is unprovable”. If T ⊢ G, there is a proof code p̂ contradicting
    G; if T ⊢ ¬G, then T would prove its own inconsistency—a contradiction.


    ## Implications


    - (a) No algorithm enumerates exactly the truths of arithmetic.

    - (b) Any proof assistant founded on PA cannot internally assert its consistency.

    - (c) There are true but unprovable statements, e.g. the Paris–Harrington combinatorial
    principle.


    ## Non-classical Logics and Their Applications


    **Intuitionistic Logic** Rejects the law of excluded middle φ∨¬φ unless constructed;
    proof objects correspond to λ-terms via the Curry–Howard isomorphism. *Constructive
    type theory* (e.g. in Coq, Lean) rests on intuitionistic foundations, enabling
    program extraction from proofs.


    **Modal Logic** Augments propositional cores with □ (necessarily) and ◇ (possibly).
    Kripke semantics interprets □φ as “φ holds in all accessible worlds”. System S4
    corresponds to provability (□φ → □□φ) and underlies temporal logics used in model
    checking (LTL, CTL).


    **Temporal and Dynamic Logics** Propositional Linear Temporal Logic (LTL) adds
    operators ○ (next), ◇ (eventually), and □ (always); Büchi automata translate LTL
    specifications into ω-automata for hardware verification. Dynamic logic reason
    about program execution paths; ⟨π⟩φ asserts existence of run of program π leading
    to state satisfying φ.


    **Fuzzy and Many-Valued Logics** Truth values take continuum [0, 1] with t-norms
    modelling conjunction. Used in control systems where sensor data is imprecise.
    *Łukasiewicz logic* defines x → y = min(1, 1 − x + y), capturing graded implications.


    **Paraconsistent Logics** Allow controlled reasoning in presence of contradictions
    without explosion (φ, ¬φ ⊢ ψ in classical logic). Useful in knowledge bases with
    inconsistent data. *LP* (Priest’s Logic of Paradox) designates both ⊤ and ⊥ as
    truth values.


    ## Applications Snapshot


    **Example 7.4.7** *Model checking.* Given a Kripke structure *M* for a traffic-light
    controller, verify □(green → ○yellow) with LTL-to-Büchi translation and the spot
    library.


    *Type systems.* Intuitionistic λ-calculus plus dependent types captures proofs
    in Agda; total functional programs correspond to constructive proofs.


    *Policy languages.* Modal deontic logic expresses obligations (□) and permissions
    (◇) in access control systems; runtime monitors enforce these via temporal-logic
    model checking.


    ## 7.5 Discrete Structures and Applications


    Mathematical thinking frequently begins with the act of *collecting* objects into
    well-defined groups, and then exploring the relations and mappings between such
    collections. Sets, relations, and functions provide a language concise enough
    to encode subtle logical dependencies yet concrete enough to be manipulated computationally.
    In this subsection we recall their foundational properties, demonstrate typical
    reasoning patterns, and illustrate each concept with short *Python* snippets that
    mirror the algebraic laws in executable form.'
