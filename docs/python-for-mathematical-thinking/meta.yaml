    ```\n\n## 11.3.2 计算拓扑\n\n计算拓扑通过将代数不变量——同调、上同调、持久模——转化为稀疏矩阵上的线性代数操作来使其可操作化。双重目标是算法效率（在单纯复形数量上接近线性时间）和有限域上的数值鲁棒性。本小节将该机制建立在单纯复形的基础上，概述受生物学启发和以网络为中心的应用，阐明\
    \ Mapper 算法作为人类可解释的拓扑透镜，并勾勒出诸如锯齿形持久性和离散莫尔斯理论等前沿领域。\n\n## 单纯复形与同调群\n\n### 抽象单纯复形\n\
    \n给定有限顶点集 $V$，一个*抽象单纯复形*是一个在包含关系下封闭的族 $K \\subseteq 2^V$：$\\sigma \\in K$ 且 $\\\
    tau \\subseteq \\sigma \\Rightarrow \\tau \\in K$。一个 $k$-单纯形是大小为 $k+1$ 的子集，其*面*是所有真子集。\n\
    \n### 链群与边界映射\n\n固定系数域 $\\mathbb{k} = \\mathbb{Z}_2$（因此方向符号消失）。$k$-链群\n\n$$C_k(K;\
    \ \\mathbb{k}) = \\left\\{ \\sum_{\\sigma^k \\in K_k} a_\\sigma \\sigma^k \\;\\\
    middle|\\; a_\\sigma \\in \\mathbb{k} \\right\\} \\cong \\mathbb{k}^{|K_k|}.$$\n\
    \n边界算子 $\\partial_k : C_k \\to C_{k-1}$ 的作用为 $\\partial_k([v_0, \\dots, v_k])\
    \ = \\sum_{i=0}^k [v_0, \\dots, \\widehat{v_i}, \\dots, v_k]$（其中 $\\widehat{\\\
    cdot}$ 表示省略），并满足 $\\partial_{k-1} \\circ \\partial_k = 0$。同调群 $H_k(K) = \\ker\
    \ \\partial_k / \\operatorname{im} \\partial_{k+1}$ 编码 $k$ 维“洞”；贝蒂数 $\\beta_k\
    \ = \\dim H_k$。\n\n### 示例：边界矩阵\n\n四面体壳：顶点 $\\{0, 1, 2, 3\\}$；四个面 $[012], [013],\
    \ [023], [123]$。在 $\\mathbb{Z}_2$ 上\n\n```python\nimport numpy as np\nB2 = np.array([\n\
    \    [1,1,1,0], # edge 01 in faces 012,013\n    [1,0,0,1], # edge 02 in faces\
    \ 012,023\n    [0,1,0,1], # edge 03 in faces 013,123\n    [1,0,1,0], # edge 12\
    \ in faces 012,123\n    [0,1,1,0], # edge 13 in faces 013,123\n    [0,0,1,1] #\
    \ edge 23 in faces 023,123\n])\nrkB2 = np.linalg.matrix_rank(B2 % 2) # rank =\
    \ 3\nβ1 = 6 - rkB2 # β1 = 3 edges - rank = 3-? calculate\n```\n\n模 2 高斯消元法揭示 $\\\
    beta_2 = 1, \\beta_1 = 0, \\beta_0 = 1$——一个空心的 2-球面。\n\n### 算法说明\n\n对于 $n$ 个单纯复形，在过滤顺序下边界矩阵是上三角的；列归约在最坏情况下为\
    \ $O(n^3)$，但使用快速矩阵乘法 $(\\omega \\approx 2.373)$ 时为 $O(n^\\omega)$，或在稀疏 Vietoris–Rips\
    \ 上通过流式算法（Bauer 2021）为 $O(n\\alpha(n))$。\n\n## 在生物学和传感器网络中的应用\n\n*蛋白质口袋* 基于原子中心构建的\
    \ Alpha-复形编码范德华半径；长寿命的 $H_1$ 环对应于隧道，$H_2$ 对应于空腔。结合位点检测的 ROC AUC 达到 0.87，而几何哈希法为\
    \ 0.71。\n\n*基因组重组检测* 在病毒单倍型的汉明距离上持久的 $H_1$ 捕捉了网状进化；出生尺度与最小重组事件数相关。\n\n*传感器覆盖*\
    \ 位于位置 $\\{p_i\\}$、通信半径为 $r$ 的节点形成 Rips 复形；非平凡的 $H_1$ 表示覆盖空洞。边界环的边多重性返回最小重定位集。算法通过稀疏化见证复形以\
    \ $O(n \\log n)$ 运行。\n\n## 用于数据可视化的 Mapper 算法\n\nMapper 构建一个单纯复形摘要图 $\\mathcal{M}$，捕捉拓扑骨架。\n\
    \n- (i) **透镜。** 选择函数 $\\ell : X \\to \\mathbb{R}^d$（例如，PCA 1,2，离心率）。\n- (ii) **覆盖。**\
    \ 定义带重叠 $\\tau$ 的区间或超立方体 $\\{U_\\alpha\\}$。\n- (iii) **聚类。** 对于每个 $\\alpha$，将\
    \ $\\ell^{-1}(U_\\alpha)$（单链接 $\\varepsilon$）聚类为分量 $C_{\\alpha,j}$。\n- (iv) **神经。**\
    \ 节点是聚类；当底层点集相交时连接节点。\n\n```python\nimport kmapper as km\nmapper = km.KeplerMapper()\n\
    lens = mapper.fit_transform(X, projection='l2norm') # step (i)\nG = mapper.map(lens,\
    \ X, cover=km.Cover(10, 0.3),\n               clusterer=km.cluster.DBSCAN(eps=.5))\n\
    km.draw_matplotlib(G, layout=\"kk\")\n```\n\n*案例研究* 乳腺癌基因表达（$d = 20\\,000$）。透镜\
    \ = PCA（2）；Mapper 图揭示了与 PAM50 亚型一致的分支拓扑；末端分支富含基底样肿瘤，有助于亚型分层。\n\n## 计算拓扑的高级主题\n\
    \n### 锯齿形持久性\n\n处理带有插入和删除的过滤 $K_0 \\leftrightarrow K_1 \\leftrightarrow \\cdots\
    \ \\leftrightarrow K_m$。区间分解推广了条形码；算法在 $O(n^\\omega \\log n)$ 内约化一个块矩阵对。\n\n###\
    \ 多维持久性\n\n由 $\\mathbb{R}^k$（$k \\ge 2$）索引的过滤——例如，沿距离和密度的 Rips。没有完整的离散不变量（多分次贝蒂数表部分排序图表）。算法通过立方网格上的秩不变量进行近似。\n\
    \n### 离散莫尔斯理论\n\n在保持同伦的同时减小复形大小：在哈斯图上进行无环部分匹配，折叠非临界单元，产生具有 $\\le$ 临界单元的边界矩阵。在\
    \ $10^6$ 个单纯复形的 VR 复形中通常有 $10\\times$ 的加速。\n\n### 数据上的层上同调\n\n将向量空间附加到开集上，遵循限制映射；通过层拉普拉斯算子计算整体截面——实现多传感器数据融合和一致性检查。\n\
    \n### 计算挑战\n\n- 内存：存储 $VR(n)$ 对于高达维度的 $k$ 需要 $O(n^k)$ 个单纯复形；使用见证、稀疏化 Rips 或边折叠。\n\
    - 有限精度：大型过滤需要整数保持的 Smith 标准形或模中国剩余提升。\n- 并行化：通过分块边界矩阵和 $\\mathbb{Z}_2$ 中的原子 XOR\
    \ 进行 GPU 归约，可将 1 亿个单纯复形的条形码减少到 <30 秒。"
