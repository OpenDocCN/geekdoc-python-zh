    $$r_t = \sigma_t \varepsilon_t, \quad \varepsilon_t \sim \mathcal{N}(0, 1), \quad
    \sigma_t^2 = \omega + \sum_{i=1}^p \alpha_i r_{t-i}^2 + \sum_{j=1}^q \beta_j \sigma_{t-j}^2,$$


    with stationarity if $\sum \alpha_i + \sum \beta_j < 1$. Leverage effect captured
    by EGARCH or GJR-GARCH introduces asymmetric terms $\gamma_i r_{t-i} \mathbf{1}_{\{r_{t-i}
    < 0\}}$.


