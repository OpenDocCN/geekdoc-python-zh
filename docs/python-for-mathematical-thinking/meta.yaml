    \ $\\mu$\n- (d) *精英主义*：原样复制最佳个体\n\n模式定理指出，短的、低阶的、高于平均水平的模式会获得指数增长的试验次数；实际成功取决于编码、多样性保持和惩罚函数。\n\
    \n```python\nimport pygad, math\ndef rastrigin(x): return 10*len(x) + sum(v**2\
    \ - 10*math.cos(2*math.pi*v)\n    for v in x)\nga = pygad.GA(num_generations=200,\
    \ num_parents_mating=20,\n    sol_per_pop=50, num_genes=5, gene_space={'low':-5.12,'high':5.12},\n\
    \    fitness_func=lambda sol,idx: -rastrigin(sol))\nga.run(); print(\"Best:\"\
    , ga.best_solution()[0])\n```\n\n### 模拟退火 (SA)\n\n借鉴统计力学，SA 通过马尔可夫链探索能量景观 $E(\\\
    mathbf{x}) = f(\\mathbf{x})$，接受概率为 $P(\\mathbf{x} \\to \\mathbf{x}') = \\min\\\
    {1, \\exp(-(f(\\mathbf{x}') - f(\\mathbf{x}))/T_k)\\}$。温度 $T_k$ 衰减（例如对数衰减）$T_k\
    \ = T_0/\\log(k+2)$；理论上 SA 全局收敛但速度较慢。*自适应* SA 调整步长以达到目标接受率。"
