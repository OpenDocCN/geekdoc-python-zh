    # 10.3.3 Convolutional and Recurrent Neural Networks


    Deep learning''s modern ascendancy can largely be attributed to architectures
    that exploit *inductive bias*: convolutional neural networks (CNNs) encode translational
    equivariance for grid-structured inputs, while recurrent neural networks (RNNs)
    embody causal ordering for sequences. Subsequent refinements—gated recurrence,
    attention, and large-scale pretraining—broaden the modelling capacity without
    sacrificing statistical efficiency.


    # CNNs for Image Recognition


    # Discrete Convolution


    For image $X \in \mathbb{R}^{C_{\text{in}} \times H \times W}$ and kernel $K \in
    \mathbb{R}^{C_{\text{out}} \times C_{\text{in}} \times k \times k}$, the $(c'',
    h, w)$ output entry is


    $$Y_{c''hw} = \sum_{c=1}^{C_{\text{in}}} \sum_{i=0}^{k-1} \sum_{j=0}^{k-1} K_{c''cij}
    X_{c, h+i, w+j}.$$


    Padding $p$ and stride $s$ adjust spatial resolution: $H_{\text{out}} = \lfloor
    \frac{H-k+2p}{s} \rfloor + 1$.

    **Weight sharing** reduces parameters from $O(C_{\text{out}}C_{\text{in}}HW)$
    to $O(C_{\text{out}}C_{\text{in}}k^2)$, imposing translation equivariance $X \mapsto
    \tau_{\Delta} X \implies Y \mapsto \tau_{\Delta} Y$.


    # Backpropagation


    Denote input gradient $\partial \mathcal{L} / \partial X$ by $\delta X$. Correlation
    identity yields


    $$\delta K_{c''c} = \sum_{h,w} \delta Y_{c''hw} (X_c)_{h:h+k, w:w+k}, \quad \delta
    X = \text{pad}_{k-1}(\delta Y) * \text{flip}(K),$$


    where $*$ denotes convolution and $\text{flip}(K)$ mirrors kernel.


    # Pooling


    Max-pool implements $Y_{hw} = \max_{i,j \in [0,k)} X_{h+i, w+j}$, extracting translation
    invariants. Average-pool preserves energy for globally average pooling (GAP) prior
    to dense classifier.'
  - '[PAGE 429]


    # Architecture Example (VGG-Like)


    $[\text{conv}_{3\times3}\text{-ReLU}]^2 \rightarrow \text{maxpool}_2 \rightarrow
    [\text{conv}^2] \rightarrow \text{maxpool} \rightarrow \text{GAP} \rightarrow
    \text{FC}_{10}$.


    On CIFAR-10, 3.1 M parameters reach > 93% test accuracy after 200 epochs with
    SGD($\eta = 0.1$, momentum = 0.9), cosine learning-rate decay, weight decay $5
    \cdot 10^{-4}$, and random crop + horizontal flip augmentation.


    # Batch Norm in conv Layers


    Normalise across mini-batch and spatial dims: $\mu_c = \frac{1}{mHW} \sum_i X_{cij}$,
    $\sigma_c^2 = \frac{1}{mHW} \sum_i (X_{cij} - \mu_c)^2$. Learnable ($\gamma_c,
    \beta_c$) restore representation capacity.


    # RNNs for Sequential Data Analysis


    Given sequence $\{\mathbf{x}_t\}_{t=1}^T$, standard RNN cell computes


    $\mathbf{h}_t = \phi(W_h \mathbf{h}_{t-1} + W_x \mathbf{x}_t + \mathbf{b})$


    with $\phi = \tanh$. Output $\mathbf{y}_t = W_y \mathbf{h}_t$.


    # Backpropagation Through Time (BPTT)


    Unroll network, accumulate gradients


    $\delta \mathbf{h}_t = (W_h^\top \delta \mathbf{h}_{t+1} + \delta \mathbf{y}_t)
    \odot \phi''(\mathbf{h}_t)$


    risking vanishing/exploding norms $\propto \|W_h\|^T$. Gradient clipping $\delta
    \leftarrow \delta \cdot \min\{1, \tau / \|\delta\|\}$ with $\tau = 5$ mitigates
    explosions.


    # Advanced Architectures: LSTM, GRU, and Transformers


    # Long Short-Term Memory (LSTM)


    State equations


    $\mathbf{i} = \sigma(W_{ix} \mathbf{x}_t + W_{ih} \mathbf{h}_{t-1} + b_i)$,

    $\mathbf{f} = \sigma(W_{fx} \mathbf{x}_t + W_{fh} \mathbf{h}_{t-1} + b_f)$,

    $\mathbf{o} = \sigma(W_{ox} \mathbf{x}_t + W_{oh} \mathbf{h}_{t-1} + b_o)$,

    $\tilde{\mathbf{c}} = \tanh(W_{cx} \mathbf{x}_t + W_{ch} \mathbf{h}_{t-1} + b_c)$,

    $\mathbf{c}_t = \mathbf{f} \odot \mathbf{c}_{t-1} + \mathbf{i} \odot \tilde{\mathbf{c}}$,

    $\mathbf{h}_t = \mathbf{o} \odot \tanh(\mathbf{c}_t)$'
  - '[PAGE 430]


    where gates $\mathbf{i}, \mathbf{f}, \mathbf{o} \in [0, 1]^d$ modulate memory
    $\mathbf{c}_t$. Constant error flow through $\mathbf{c}_t$ alleviates vanishing
    gradients.


    # Gated Recurrent Unit (GRU)


    Combines input and forget gates:


    ```

    $\mathbf{z} = \sigma(W_z \mathbf{x} + U_z \mathbf{h}_{t-1}), \quad \mathbf{r}
    = \sigma(W_r \mathbf{x} + U_r \mathbf{h}_{t-1}), \quad \tilde{\mathbf{h}} = \tanh(W
    \mathbf{x} + U(\mathbf{r} \odot \mathbf{h}_{t-1})),$

    $\mathbf{h}_t = (1 - \mathbf{z}) \odot \mathbf{h}_{t-1} + \mathbf{z} \odot \tilde{\mathbf{h}}.$

    ```


    Fewer parameters, comparable accuracy on language tasks.


    # Transformer (Vaswani et al. 2017)


    Dispenses with recurrence, using multi-head self-attention


    ```

    $\text{Att}(Q, K, V) = \text{softmax}\left(\frac{QK^\top}{\sqrt{d_k}}\right)V,$

    ```


    with queries/keys/values linearly projected from inputs. Positional encodings
    $\mathbf{p}_t^{(2i)} = \sin(t/10000^{2i/d_{\text{model}}})$ inject sequence order.
    Feed-forward block and residual layer-norm yield ODE-like stable depth. Complexity
    $O(T^2d)$ vs. $O(Td^2)$ for RNN BPTT; parallelisation dominates modern GPU pipelines.


    ```

    $\text{Layer}(X) = X + \text{Sublayer}(\text{LayerNorm}(X)).$

    ```


    # Transfer Learning and Fine-Tuning Pretrained Models


    Large models pretrained on expansive corpora encode universal priors, drastically
    reducing downstream sample complexity.


    # Feature Extractor


    Freeze convolutional base (e.g. ResNet-50 trained on ImageNet); append task-specific
    dense head; train only last layers. Effective for few-shot datasets ( $\leq 1000$
    labelled images).'
