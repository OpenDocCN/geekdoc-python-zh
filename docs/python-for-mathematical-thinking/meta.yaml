    # 5.1.3 Expectation, Variance, and Moments


    Moments summarise the quantitative features of a random variable''s distribution.
    The *first moment* (expectation) measures location, the *second central moment*
    (variance) spreads, while higher moments capture skewness, kurtosis, and beyond.
    Moment generating functions (mgf) provide a compact analytic device for encoding
    all moments simultaneously.


    # Mathematical Expectation and Properties


    **Definition** For an integrable random variable $X$,


    $$

    \mathbb{E}[X] = \begin{cases} \sum_k x_k p_X(x_k), & (\text{discrete}) \ \int_{-\infty}^{\infty}
    x f_X(x) dx, & (\text{continuous}). \end{cases}

    $$


    **Linearity** For constants $a, b$ and r.v.s $X, Y$,


    $$

    \mathbb{E}[aX + bY] = a\mathbb{E}[X] + b\mathbb{E}[Y].

    $$'
- md: '## Variance, Covariance, and Standard Deviation


    ### Variance


    $$\text{Var}(X) = \mathbb{E}[(X - \mathbb{E}[X])^2] = \mathbb{E}[X^2] - (\mathbb{E}[X])^2.$$


    Standard Deviation $\sigma_X = \sqrt{\text{Var}(X)}$.


    ### Covariance


    $$\text{Cov}(X, Y) = \mathbb{E}[(X - \mu_X)(Y - \mu_Y)] = \mathbb{E}[XY] - \mu_X
    \mu_Y.$$


    ### Properties


    $\text{Var}(aX + b) = a^2 \text{Var}(X), \quad \text{Var}\left(\sum_i X_i\right)
    = \sum_i \text{Var}(X_i) + 2\sum_{i<j} \text{Cov}(X_i, X_j).$


    **Example 4 (Variance of Poisson)** $X \sim \text{Pois}(\lambda)$ has $\mathbb{E}[X]
    = \lambda$ and $\text{Var}(X) = \lambda$. Proof via mgf below.


    ### Law of Total Variance


    $\text{Var}(X) = \mathbb{E}[\text{Var}(X \mid Y)] + \text{Var}(\mathbb{E}[X \mid
    Y]).$


    **Example 5.1.11 (Total Variance, Poisson-Gamma Mixture (Negative Binomial))**
    Let $N \mid \Lambda \sim \text{Pois}(\Lambda)$, $\Lambda \sim \text{Gamma}(r,
    \theta)$. Then $\mathbb{E}[N] = r\theta$ and


    $\text{Var}(N) = \mathbb{E}[\Lambda] + \text{Var}(\Lambda) = r\theta + r\theta^2,$


    matching $\text{NegBin}(r, p)$ variance formula.


    **Example 5 (Covariance of Die Faces)** Roll a fair die twice: $X$ first face,
    $Y$ second. Independence $\Rightarrow \text{Cov}(X, Y) = 0$. But let $S = X +
    Y$; then $\text{Cov}(X, S) = \text{Var}(X) = \frac{35}{12}$.


    ```python

    import itertools, numpy as np

    Omega = np.array(list(itertools.product(range(1,7), repeat=2)))

    X, Y = Omega[:,0], Omega[:,1]; S = X+Y

    print(np.cov(X,S, bias=True)[0,1]) # 2.916...

    ```


    ### Moment Generating Functions


    **Definition** The **moment generating function** (mgf) of $X$ is


    $M_X(t) = \mathbb{E}[e^{tX}], \quad t \in (-h, h)$


    for some $h > 0$ where the expectation exists.


    ### Moment Extraction


    $M_X^{(k)}(0) = \mathbb{E}[X^k], \quad \mu = \mathbb{E}[X] = M_X''(0), \sigma^2
    = M_X''''(0) - \mu^2.$


    **Uniqueness** If mgf exists in an open interval around 0, it uniquely determines
    the distribution.


    **MGF of Sum of Independent r.v.s** If $X, Y$ independent,


    $M_{X+Y}(t) = M_X(t)M_Y(t).$


    ### Example 6 (MGF of Exponential($\lambda$))


    $$M_X(t) = \int_0^\infty e^{tx} \lambda e^{-\lambda x} dx = \frac{\lambda}{\lambda
    - t}, \quad t < \lambda.$$


    Moments:


    $$\mu = M''_X(0) = \frac{1}{\lambda}, \quad \sigma^2 = M''''_X(0) - \mu^2 = \frac{1}{\lambda^2}.$$


    ### Example 7 (Normal) For $X \sim \mathcal{N}(\mu, \sigma^2)$,


    $$M_X(t) = \exp\left(\mu t + \frac{1}{2}\sigma^2 t^2\right).$$


    This property is key in proofs of the Central Limit Theorem; mgf is quadratic
    $\Rightarrow$ sums of i.i.d. normals remain normal.


    ### Example 8 (Sum of Independent Exponentials $\to$ Erlang) If $X_1, \dots, X_n
    \overset{\text{i.i.d.}}{\sim} \text{Exp}(\lambda)$,


    $$M_{S_n}(t) = \left(\frac{\lambda}{\lambda - t}\right)^n, \quad S_n \sim \text{Gamma}(n,
    \lambda).$$


    ### Example 9 (MGF Method for Poisson) $X \sim \text{Pois}(\lambda)$:


    $$M_X(t) = \sum_{k=0}^\infty e^{tk} e^{-\lambda} \frac{\lambda^k}{k!} = \exp(\lambda(e^t
    - 1)).$$


    Differentiate:


    $$M''_X(0) = \lambda, \quad M''''_X(0) = \lambda^2 + \lambda \Rightarrow \text{Var}(X)
    = \lambda.$$


    **Cumulant Generating Function** $K_X(t) = \ln M_X(t)$; its derivatives at 0 yield
    cumulants (e.g. first cumulant = mean, second = variance).


    ### Example 5.1.12 (Cumulant of Binomial) $K_X(t) = n \ln(1 - p + pe^t)$; $\kappa_1
    = K''(0) = np$, $\kappa_2 = K''''(0) = np(1 - p)$.


    ### Moment Inequalities


    $$\text{Var}(X) \geq 0, \quad \mathbb{E}|X - \mu| \leq \sigma \sqrt{\frac{\pi}{2}}
    \text{ (if normal)}.$$


    Chebyshev''s inequality: $\mathbb{P}(|X - \mu| \geq k\sigma) \leq k^{-2}$.


    ### Example 5.1.13 (Verify Chebyshev for Simulated Poisson)


    ```python

    lam, N = 10, 10**5

    X = np.random.poisson(lam, N)

    k=3

    emp = np.mean(np.abs(X-lam)>=k*np.sqrt(lam))

    print(emp, 1/k**2) # empirical ≤ theoretical bound

    ```


    ## 5.1.4 Common Probability Distributions


    ### Binomial, Poisson, and Geometric Distributions


    The *counting* distributions arise naturally from Bernoulli trials and Poisson-process
    limits.


    *Binomial.* If $X \sim \text{Bin}(n, p)$ counts successes in $n$ independent Bernoulli($p$)
    trials,


    $$\mathbb{P}(X = k) = \binom{n}{k} p^k (1 - p)^{n-k}, \quad 0 \le k \le n.$$


    Expectation $\mu = np$, variance $\sigma^2 = np(1 - p)$, mgf $M_X(t) = (1 - p
    + pe^t)^n$.


    **Example 5.1.14** Toss a fair coin $n = 10$ times; probability of exactly $k
    = 4$ heads is $\binom{10}{4}/2^{10} = 0.205$.


    ```python

    from math import comb

    print(comb(10,4)/2**10)

    ```


    *Poisson* Limit of binomial with $n \to \infty$, $p \to 0$ while $np = \lambda$
    fixed:


    $$\mathbb{P}(X = k) = e^{-\lambda} \frac{\lambda^k}{k!}, \quad k \in \mathbb{N}_0.$$


    Mean and variance equal $\lambda$; mgf $\exp(\lambda(e^t - 1))$.


    **Example 5.1.15** Radioactive decay emits on average $\lambda = 3$ particles
    per minute. Probability of no particles in the next minute: $e^{-3} \approx 0.0498$.


    *Geometric* Number $X$ of Bernoulli($p$) trials until first success (counting
    the success):


    $$\mathbb{P}(X = k) = p(1 - p)^{k-1}, \quad k = 1, 2, \ldots$$


    Memoryless: $\mathbb{P}(X > m+n \mid X > m) = (1 - p)^n$. Mean $1/p$, variance
    $(1 - p)/p^2$.


    ### Normal, Exponential, and Gamma Distributions


    Normal $X \sim \mathcal{N}(\mu, \sigma^2)$ possesses density


    $$f(x) = \frac{1}{\sqrt{2\pi}\sigma} \exp\left(-\frac{(x-\mu)^2}{2\sigma^2}\right).$$


    Linear transformations preserve normality; sums of independent normals remain
    normal.


    **Example 5.1.17** Heights of students: $\mu = 170$ cm, $\sigma = 8$ cm. Probability
    a student is taller than 185 cm:


    $$1 - \Phi\left(\frac{185 - 170}{8}\right) = 1 - \Phi(1.875) \approx 0.030.$$


    *Exponential* Waiting time $X \sim \text{Exp}(\lambda)$:


    $$f(x) = \lambda e^{-\lambda x} \mathbf{1}_{\{x \ge 0\}}, \quad F(x) = 1 - e^{-\lambda
    x}.$$


    Mean $1/\lambda$, variance $1/\lambda^2$; memoryless: $\mathbb{P}(X > s + t \mid
    X > s) = e^{-\lambda t}$.


    **Example 5.1.18** Web-server requests arrive at 4 per second ($\lambda = 4$).
    Probability next request arrives after 0.5s: $e^{-4 \cdot 0.5} \approx 0.135$.


    *Gamma* Sum of $k$ i.i.d. exponential($\lambda$) variables: $X \sim \Gamma(k,
    \lambda)$,


    $$f(x) = \frac{\lambda^k x^{k-1} e^{-\lambda x}}{\Gamma(k)}, \quad x \ge 0.$$


    Mean $k/\lambda$, variance $k/\lambda^2$.


    **Example 5.1.19** Total phone-call duration of $k = 3$ customers, each exponential($\lambda
    = 1/6$) hours, follows $\Gamma(3, 1/6)$ with mean 18 min and variance 108 min$^2$.


    ### Central Limit Theorem and Law of Large Numbers


    *Weak Law of Large Numbers (WLLN)* For i.i.d. $X_i$ with finite mean $\mu$ and
    variance $\sigma^2$,


    $$\frac{1}{n} \sum_{i=1}^n X_i \xrightarrow{\mathbb{P}} \mu \quad \text{as } n
    \to \infty.$$


