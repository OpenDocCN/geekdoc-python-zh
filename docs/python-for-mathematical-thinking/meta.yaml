  md: "# Implementation in Python\n\nThe following minimalist implementation takes\
    \ a feasible initial basis $(B, N)$ and performs Bland's anti-cycling pivot rule.\n\
    \n```\nimport numpy as np\n\ndef simplex(A, b, c, B):\n    m, n = A.shape\n  \
    \  N = [j for j in range(n) if j not in B]\n    while True:\n        Bmat, Nmat\
    \ = A[:, B], A[:, N]\n        xB = np.linalg.solve(Bmat, b)\n        π = np.linalg.solve(Bmat.T,\
    \ c[B]) # dual price\n        rc = c[N] - Nmat.T @ π # reduced costs\n       \
    \ if (rc >= 0).all(): # optimal\n            x = np.zeros(n); x[B] = xB\n    \
    \        return x, c @ x\n        q = N[np.where(rc < 0)[0][0]] # Bland\n    \
    \    d = np.linalg.solve(Bmat, A[:, q])\n        if (d <= 0).all(): raise ValueError(\"\
    Unbounded\")\n        ratios = [xB[i]/d[i] if d[i] > 0 else np.inf for i in range(m)]\n\
    \        p = B[np.argmin(ratios)] # leaving\n        B[B.index(p)], N[N.index(q)]\
    \ = q, p # pivot\n```\n\n**Example** Minimise $c^T\\mathbf{x} = -3x_1 - x_2$ subject\
    \ to $\\begin{pmatrix} 1 & 1 \\ 2 & 1 \\end{pmatrix}\\mathbf{x} = \\begin{pmatrix}\
    \ 4 \\ 5 \\end{pmatrix}$, $\\mathbf{x} \\geq 0$. With slack variables and initial\
    \ basis $B = \\{3, 4\\}$ the code converges in two pivots to $\\mathbf{x}^* =\
    \ (3, 1, 0, 0)$ with optimal value $-10$.\n\n# Dual Simplex Method and Sensitivity\
    \ Analysis\n\nThe **dual LP**\n$$\\max_{\\mathbf{y} \\in \\mathbb{R}^m} \\mathbf{b}^T\\\
    mathbf{y} \\quad \\text{s.t.} \\quad A^T\\mathbf{y} \\leq \\mathbf{c}$$\nadmits\
    \ its own simplex procedure that pivots on infeasible primal but dual-feasible\
    \ bases. Starting with $x_B < 0$ yet $\\bar{c}_N \\geq 0$, select the most negative\
    \ basic variable to leave, then choose the entering non-basic index $q$ that preserves\
    \ dual feasibility: $q = \\arg \\min_{a_{iq}<0} \\frac{\\bar{c}_q}{a_{iq}}$. Dual\
    \ simplex excels when constraints are added or right-hand sides change, reoptimising\
    \ without restoring primal feasibility.\n\n# Shadow Prices and Reduced Costs\n\
    \nAt an optimal basis $B$ the dual vector $\\boldsymbol{\\pi} = c_B^T A_B^{-1}$\
    \ has entries $\\pi_i = \\frac{\\partial z^*}{\\partial b_i}$ (*marginal value\
    \ of resource $i$*), while $\\bar{c}_j = \\frac{\\partial z^*}{\\partial c_j}$\
    \ measures cost sensitivity of a non-basic activity."
