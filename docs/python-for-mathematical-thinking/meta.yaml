    # Example 5.2.7 (Compute Shape Statistics)


    ```

    from scipy.stats import skew, kurtosis

    x_norm = np.random.normal(size=5000)

    x_exp = np.random.exponential(size=5000)


    print("Normal:", skew(x_norm), kurtosis(x_norm))

    print("Exp :", skew(x_exp), kurtosis(x_exp))

    ```


    Typical output Normal: $\gamma_1 \approx 0$, $\gamma_2 \approx 0$ (baseline).
    Exponential: $\gamma_1 \approx 2$, $\gamma_2 \approx 6$ (heavy right tail).


    **Jarque–Bera Test** $JB = \frac{n}{6}(\gamma_1^2 + \frac{1}{4}\gamma_2^2)$ asymptotically
    $\chi_2^2$; used to test normality.


    # Example 5.2.8 (JB on Sample of Size $n = 200$)


    ```

    from scipy.stats import jarque_bera

    data = np.random.lognormal(size=200)

    stat,p = jarque_bera(data)

    print(stat, p) # p-value << 0.05 ⟹ reject normality

    ```


    **Relation to CLT** Under i.i.d. sampling from a finite-variance population, $\gamma_1
    \sim \mathcal{N}(0, \frac{6}{n})$ and $\gamma_2 \sim \mathcal{N}(0, \frac{24}{n})$
    asymptotically. Thus skewness and kurtosis converge to 0 when data truly originate
    from a normal distribution.


    # 5.2.3 Data Visualisation and Analysis


    Visualisation transforms raw arrays of numbers into patterns comprehensible to
    the eye, allowing humans to detect structure, anomalies, and relationships that
    summary statistics can miss. Python''s matplotlib, seaborn, and pandas plotting
    backends make publication-quality graphics almost effortless. This subsection
    explores canonical univariate, bivariate, and multivariate plots, illustrates
    how measures such as correlation and covariance tie into those plots, and demonstrates
    indispensable data-cleaning steps to avoid “garbage in, garbage out”.


    # Histograms, Box Plots, and Scatter Plots


    **Histogram** Given a sample $\mathbf{x}$, the histogram partitions the real line
    into bins $I_j$ and counts $n_j = \#\{x_i \in I_j\}$. For density-normalised histograms
    the bar height is $\hat{f}_n(x) = n_j / (n|I_j|)$, a crude kernel density estimator
    (cf. Fig. 5.3).


    # Example 5.2.9 (Simulated $\mathcal{N}(0, 1)$ vs. Exponential($\lambda = 1$))


    ```

    import numpy as np, matplotlib.pyplot as plt, seaborn as sns

    np.random.seed(0)

    norm = np.random.randn(1000)

    expo = np.random.exponential(scale=1, size=1000)

    ```'
- md: "## 5.3 Inferential Statistics\n\nDescriptive statistics summarise data; **inferential\
    \ statistics** draw conclusions about a population based on a sample. Central\
    \ to inference is *hypothesis testing*, the formal procedure for deciding, with\
    \ controlled error rates, whether random evidence supports or contradicts a quantitative\
    \ statement about the population.\n\n### 5.3.1 Hypothesis Testing\n\n#### Null\
    \ and Alternative Hypotheses\n\nAny test begins with two mutually exclusive claims:\n\
    \n$$H_0 : \\text{“status quo” (null hypothesis)}$$\n$$H_1 : \\text{“new claim”\
    \ (alternative hypothesis)}$$\n\n**Example 1 (Manufacturing)** A supplier guarantees\
    \ the mean diameter of ball bearings is $\\mu_0 = 10$ mm. You suspect the process\
    \ has drifted.\n\n$$H_0 : \\mu = 10 \\quad \\text{vs.} \\quad H_1 : \\mu \\neq\
    \ 10.$$\n\nSampling $n$ bearings and measuring diameters produces evidence to\
    \ reject or fail to reject $H_0$.\n\n**Test Statistic** A scalar function $T(\\\
    mathbf{X})$ of the sample whose distribution under $H_0$ is known or approximable;\
    \ large or small values of $T$ favour $H_1$.\n\n#### p-values, t-tests, and Chi-square\
    \ Tests\n\n**p-value** Observed $t_{obs}$ is converted to a $p$-value:\n\n$$p\
    \ = \\mathbb{P}_{H_0}(T \\text{ at least as extreme as } t_{obs}).$$\n\nDecision\
    \ rule (fixed $\\alpha$): reject $H_0$ if $p < \\alpha$.\n\n**One-sample t-test**\
    \ For unknown $\\sigma$, test $H_0 : \\mu = \\mu_0$ with\n\n$$t = \\frac{\\bar{X}\
    \ - \\mu_0}{s / \\sqrt{n}} \\sim t_{n-1} \\quad (H_0).$$\n\n**Example 5.3.1 (Diameter\
    \ Test)**\n\n```python\nimport numpy as np, scipy.stats as st\nx = np.array([10.1,\
    \ 9.9, 9.8, 10.2, 10.0, 10.3, 9.7, 10.1, 10.2, 9.9])\nt_stat, p = st.ttest_1samp(x,\
    \ popmean=10)\nprint(t_stat, p)\n```\n\nOutput: $t \\approx 0.42$, $p \\approx\
    \ 0.683 \\implies$ fail to reject at $\\alpha = 0.05$.\n\n**Two-sample t-test\
    \ (Unequal Variances, Welch)**\n\n$$t = \\frac{\\bar{X} - \\bar{Y}}{\\sqrt{s_X^2/n_X\
    \ + s_Y^2/n_Y}}, \\quad \\nu \\approx \\frac{(s_X^2/n_X + s_Y^2/n_Y)^2}{\\frac{s_X^4}{n_X^2(n_X-1)}\
    \ + \\frac{s_Y^4}{n_Y^2(n_Y-1)}}.$$\n\n# Data Cleaning and Preprocessing Techniques\n\
    \nDirty data bias both numerical summaries and visualisations.\n\n**Missing Values**\
    \ Strategies: listwise deletion, mean/median imputation, regression imputation,\
    \ multiple imputation.\n\n**Example 5.2.15 (Median Imputation)**\n\n```python\n\
    df = iris.copy()\ndf.iloc[5:10, 0] = np.nan # inject NaNs\ndf[\"sepal_length\"\
    ].fillna(df[\"sepal_length\"].median(), inplace=True)\n```\n\n**Outlier Winsorisation**\
    \ Clamp values outside $[\\mu \\pm 3\\sigma]$ or outside Tukey's fences to reduce\
    \ influence.\n\n```python\nfrom scipy.stats import mstats\ndata_wins = mstats.winsorize(salaries,\
    \ limits=[0.05,0.05])\n```\n\n**Scaling** Standardisation $(x - \\bar{x})/s$ or\
    \ min-max scaling $[0, 1]$ is prerequisite for PCA, $k$-means, neural nets.\n\n\
    **Categorical Encoding** One-hot for nominal; target or ordinal encoding for high-cardinality\
    \ categorical features.\n\n# Pipeline Example\n\n```python\nfrom sklearn.preprocessing\
    \ import StandardScaler, OneHotEncoder\nfrom sklearn.compose import ColumnTransformer\n\
    from sklearn.pipeline import Pipeline\n\nnum_cols = [\"sepal_length\",\"sepal_width\"\
    ,\"petal_length\",\"petal_width\"]\ncat_cols = [] # none in iris\n\npre = ColumnTransformer([\n\
    \    (\"scale\", StandardScaler(), num_cols),\n    (\"cat\", OneHotEncoder(),\
    \ cat_cols)\n])\nX = pre.fit_transform(iris)\n```\n\n# Data-Quality Checklist\n\
    \n- 1. *Consistency*: units, variable types, naming\n- 2. *Completeness*: missing\
    \ values, unexpected NULL markers\n- 3. *Validity*: range checks, regex validation\
    \ for IDs\n- 4. *Uniqueness*: duplicate rows/keys\n- 5. *Accuracy*: cross-verify\
    \ with trusted external sources\n\n# Heatmaps and Pair Plots for Multivariate\
    \ Data\n\n**Covariance Heatmap** For data matrix $M \\in \\mathbb{R}^{n \\times\
    \ d}$,\n\n$$\\Sigma = \\frac{1}{n-1}(M - \\mathbf{1}\\bar{M})^\\top(M - \\mathbf{1}\\\
    bar{M})$$\n\nis displayed via colour intensity.\n\n**Example 5.2.14 (Iris Data)**\n\
    \n```python\niris = sns.load_dataset(\"iris\").drop(\"species\", axis=1)\ncorr\
    \ = iris.corr()\nsns.heatmap(corr, annot=True, cmap=\"coolwarm\"); plt.show()\n\
    ```\n\nPetal length/width show $\\rho > 0.95$, sepal dimensions correlate weakly\
    \ $\\rho \\approx 0.12$.\n\n**Pair Plot** Plots every bivariate projection plus\
    \ univariate KDEs (cf. Fig. 5.6).\n\n```python\nsns.pairplot(iris, diag_kind=\"\
    kde\"); plt.show()\n```\n\n![](img/9724708489e3df346f9e31e3fa6e5746_178_0.png)\n\
    \nFig. 5.6 Pairwise scatter plots and kernel-density estimates for the four numeric\
    \ iris features. The lower-triangle layout reduces redundancy, while KDE traces\
    \ on the diagonal highlight univariate distributions. Clear linear trends and\
    \ clustered clouds foreshadow effective low-dimensional projections\n\n**High-Dimensional\
    \ Tip** For $d > 10$, pair plots explode combinatorially; use PCA or t-SNE first.\n\
    \n# Correlation and Covariance\n\nPearson correlation $\\rho_{XY} = \\text{Cov}(X,\
    \ Y)/(\\sigma_X \\sigma_Y)$ measures linear association. Spearman's $\\rho_s$\
    \ and Kendall's $\\tau$ capture monotone dependence.\n\n**Example 5.2.12 (Empirical\
    \ vs. Theoretical Correlation)** Let $X \\sim \\mathcal{N}(0, 1)$, $Y = 0.8X +\
    \ 0.6Z$ with $Z \\perp X$, $Z \\sim \\mathcal{N}(0, 1)$. Then $\\rho_{XY} = 0.8$.\n\
    \n```python\nn=2000\nX = np.random.randn(n)\nY = 0.8*X + 0.6*np.random.randn(n)\n\
    print(np.corrcoef(X,Y)[0,1]) # ≈ 0.8\nsns.scatterplot(x=X, y=Y, alpha=.3); plt.show()\n\
    ```\n\nA tight diagonal band attests to strong linear dependence.\n\n**Example\
    \ 5.2.13 (Spearman vs. Pearson Under Monotone Nonlinear Transform)** $X \\sim\
    \ \\text{Uniform}(0, 1)$, $Y = X^2$. Pearson $\\rho \\approx 0.97$ (still high),\
    \ while Spearman $\\rho_s = 1$ (perfect monotone).\n\n```python\nX = np.random.rand(300)\n\
    Y = X**2\nfrom scipy.stats import spearmanr\nprint(np.corrcoef(X,Y)[0,1], spearmanr(X,Y).correlation)\n\
    ```\n\n# Scatter Plot\n\nFor paired data $(x_i, y_i)$, points reveal functional\
    \ form, clusters, and heteroscedasticity.\n\n**Example 5.2.11 (Anscombe’s Quartet—Same\
    \ Statistics, Different Shapes (cf. Fig. 5.5))**\n\n```python\nimport seaborn\
    \ as sns, pandas as pd\ndf = sns.load_dataset(\"anscombe\")\ng = sns.FacetGrid(df,\
    \ col=\"dataset\")\ng.map_dataframe(sns.scatterplot, x=\"x\", y=\"y\")\ng.map(plt.plot,\
    \ [4,14], [4,14], color=\"red\")\nplt.show()\n```\n\n![](img/9724708489e3df346f9e31e3fa6e5746_176_0.png)\n\
    \nFig. 5.5 Anscombe’s quartet: four datasets that share identical univariate statistics\
    \ yet differ markedly in shape. Plotting reveals structure—linear, nonlinear,\
    \ and outlier-driven—that summary measures alone would conceal, underscoring the\
    \ diagnostic value of visualisation\n\nAll four panels share $\\bar{x}$, $\\bar{y}$,\
    \ $\\text{SD}_x$, $\\text{SD}_y$, and Pearson $r = 0.816$, yet visual inspection\
    \ reveals a linear cloud, a nonlinear curve, a high-leverage point, and a vertical\
    \ strip plus an outlier.\n\n# Box Plot (Tukey)\n\nDisplays median $Q_2$, quartiles\
    \ $Q_1$, $Q_3$, whiskers at $[L, U]$ with $L = Q_1 - 1.5 \\text{IQR}$, $U = Q_3\
    \ + 1.5 \\text{IQR}$.\n\n**Example 5.2.10 (Salary Distribution with Outliers (cf.\
    \ Fig. 5.4))**\n\n```python\nsalaries = np.array([45,47,50,48,46,49,51,52,100,120])\n\
    sns.boxplot(x=salaries, orient=\"h\"); plt.show()\n```\n\nThe plot flags $100k\
    \ and $120k as outliers, matching the analytic fence computation.\n\n![](img/9724708489e3df346f9e31e3fa6e5746_175_1.png)\n\
    \nFig. 5.4 Box-and-whisker plot of ten salaries. The interquartile box is highlighted\
    \ in blue, the crimson line marks the median (annotated), and two high-salary\
    \ outliers are clearly visible on the right\n\nComparing the symmetric bell curve\
    \ on the left with the heavy-tailed right-skewed histogram on the right visually\
    \ reinforces the numeric skewness/kurtosis computed earlier.\n\n```python\nfig,\
    \ ax = plt.subplots(1,2,figsize=(10,3))\nsns.histplot(norm, bins=30, kde=True,\
    \ ax=ax[0]); ax[0].set_title(\"Normal\")\nsns.histplot(expo, bins=30, kde=True,\
    \ ax=ax[1]); ax[1].set_title(\"Exponential\")\nplt.tight_layout(); plt.show()\n\
    ```\n\n![](img/9724708489e3df346f9e31e3fa6e5746_175_0.png)\n\nFig. 5.3 Side-by-side\
    \ histograms (with kernel-density overlays) for $10^3$ samples from the standard\
    \ normal distribution (left) and the unit-rate exponential distribution (right).\
    \ The comparison highlights the symmetry and light tails of the Gaussian versus\
    \ the heavy, one-sided decay of the exponential law"
  mdcn: "## 5.3 推断统计\n\n描述性统计总结数据；**推断统计**则基于样本对总体做出结论。推断的核心是*假设检验*，这是一种在控制错误率的前提下，判断随机证据是否支持或反驳关于总体的定量陈述的正式程序。\n\
    \n### 5.3.1 假设检验\n\n#### 原假设与备择假设\n\n任何检验都始于两个互斥的陈述：\n\n$$H_0 : \\text{“现状”（原假设）}$$\n\
    $$H_1 : \\text{“新主张”（备择假设）}$$\n\n**示例 1（制造业）** 一家供应商保证滚珠轴承的平均直径为 $\\mu_0 = 10$\
    \ 毫米。你怀疑该过程发生了漂移。\n\n$$H_0 : \\mu = 10 \\quad \\text{vs.} \\quad H_1 : \\mu \\\
    neq 10.$$\n\n抽取 $n$ 个轴承并测量其直径，产生的证据可用于拒绝或未能拒绝 $H_0$。\n\n**检验统计量** 一个关于样本的标量函数\
    \ $T(\\mathbf{X})$，其在 $H_0$ 下的分布是已知或可近似的；$T$ 的值偏大或偏小都支持 $H_1$。\n\n#### p值、t检验与卡方检验\n\
    \n**p值** 观测到的 $t_{obs}$ 被转换为一个 $p$ 值：\n\n$$p = \\mathbb{P}_{H_0}(T \\text{ 至少与\
    \ } t_{obs} \\text{ 一样极端}).$$\n\n决策规则（固定 $\\alpha$）：如果 $p < \\alpha$，则拒绝 $H_0$。\n\
    \n**单样本 t 检验** 当 $\\sigma$ 未知时，使用以下公式检验 $H_0 : \\mu = \\mu_0$：\n\n$$t = \\frac{\\\
