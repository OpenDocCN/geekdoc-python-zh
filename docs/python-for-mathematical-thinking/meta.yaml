  md: "# Time Complexity\n\n+   - With priority queue (heap): $O((V + E) \\log V)$\n\
    - Without heap: $O(V^2)$\n\n# Algorithm Idea\n\n+   - Initialise distance to all\
    \ vertices as $\\infty$ and source to 0.\n- Use a min-priority queue to select\
    \ the vertex with smallest tentative distance.\n- Relax its neighbours.\n\n```\n\
    import heapq\n\ndef dijkstra(graph, start):\n    dist = {v: float('inf') for v\
    \ in graph}\n    dist[start] = 0\n    pq = [(0, start)]\n\n    while pq:\n   \
    \     d, u = heapq.heappop(pq)\n        if d > dist[u]: continue\n        for\
    \ v, w in graph[u].items():\n            if dist[u] + w < dist[v]:\n         \
    \       dist[v] = dist[u] + w\n                heapq.heappush(pq, (dist[v], v))\n\
    \    return dist\n```\n\n# Example 4.4.13 (Weighted Graph with Adjacency Map)\n\
    \n```\ngraph = {\n    'A': {'B': 1, 'C': 4},\n    'B': {'C': 2, 'D': 5},\n   \
    \ 'C': {'D': 1},\n    'D': {}\n}\nprint(dijkstra(graph, 'A')) # {'A':0, 'B':1,\
    \ 'C':3, 'D':4}\n```\n\n# Example 4.4.14 (Track Actual Shortest Paths)\n\n```\n\
    def dijkstra_path(graph, start):\n    dist = {v: float('inf') for v in graph}\n\
    \    prev = {}\n    dist[start] = 0\n    pq = [(0, start)]\n\n    while pq:\n\
    \        d, u = heapq.heappop(pq)\n        for v, w in graph[u].items():\n   \
    \         if dist[u] + w < dist[v]:\n                dist[v] = dist[u] + w\n \
    \               prev[v] = u\n                heapq.heappush(pq, (dist[v], v))\n\
    ```"
