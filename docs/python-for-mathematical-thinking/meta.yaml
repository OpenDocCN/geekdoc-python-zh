    \n### 约束条件与拉格朗日乘子\n\n对于带有积分约束的变分问题：\n\n最小化 $\\mathcal{J}[y] = \\int_{a}^{b} L(x,\
    \ y, y') \\, dx, \\quad \\text{满足} \\quad \\int_{a}^{b} g(x, y) \\, dx = C,$\n\
    \n引入拉格朗日乘子 $\\lambda$ 并构造：\n\n$$\\tilde{L} = L(x, y, y') + \\lambda g(x, y).$$\n\
    \n然后对 $\\tilde{L}$ 应用欧拉-拉格朗日方程。\n\n### 示例 3.4.10（等周问题：最大化封闭面积）\n\n在所有周长固定且围成固定面积的曲线中，哪一条能最大化面积？答案是：圆。\n\
    \n这需要最大化：\n\n$$\\mathcal{J}[y] = \\int y \\, dx \\quad \\text{满足} \\quad \\int\
    \ \\sqrt{1 + y'^2} \\, dx = \\text{常数}.$$\n\n构造：\n\n$$\\tilde{L} = y + \\lambda\
    \ \\sqrt{1 + y'^2}.$$\n\n应用欧拉-拉格朗日方程：\n\n$$\\frac{d}{dx} \\left( \\frac{\\lambda\
    \ y'}{\\sqrt{1 + y'^2}} \\right) = 1.$$\n\n### 示例 3.4.11（约束极值温度分布）\n\n求使以下泛函最小化的\
