    \ RDD分片，$>10^6 \\times 10^5$ SNP矩阵的分布式SVD在几分钟内检测出群体结构。\n\n## 8.5.4 数值方法中的误差分析与稳定性\n\
    \n数值算法继承了两个不可避免的缺陷：有限精度算术和数据扰动的传播。稳健的方法必须在两者下保持可靠。\n\n## 舍入误差与机器精度\n\n浮点数遵循IEEE-754表示\n\
    \n$x = (-1)^s (1.m_1 m_2 \\dots m_{p-1})_2 2^{e-e_0}$\n\n其中单位舍入$\\varepsilon =\
    \ 2^{-(p-1)}$限制相对误差：\n\n$\\mathrm{fl}(x \\circ y) = (x \\circ y)(1 + \\delta),\
    \ \\quad |\\delta| \\le \\varepsilon,$\n\n对于$\\circ \\in \\{+, -, \\times, \\\
    div\\}$。*灾难性抵消*发生在减去近似相等的数时：有效高位数字相消，将$\\varepsilon$放大为操作数与其差值的比值。一个典型表现是二次公式求值：\n\
    \n$x_2 = \\frac{2c}{-b - \\mathrm{sign}(b)\\sqrt{b^2 - 4ac}}$\n\n即使在$b^2 \\gg\
    \ 4ac$时也能保持相对精度。\n\n### 示例8.5.5（有效数字损失）\n\n```python\nimport numpy as np\ndef\
    \ bad_erf(x):\n    return 2/np.sqrt(np.pi) * (x - x**3/3 + x**5/10)\nprint(bad_erf(1e-8))\
    \ # underflows to zero\n```\n\n在$x = 10^{-8}$处计算erf的零点展开会迫使每项低于双精度粒度；使用`math.erf`或缩放Dawson积分可避免此陷阱。\n\
    \n## 数值算法的稳定性\n\n算法$\\mathcal{A}$是*向后稳定*的，如果其输出等于某个邻近问题的精确解：\n\n$\\widehat{y}\
    \ = \\mathcal{A}(x) = f(x + \\Delta x), \\quad \\frac{\\|\\Delta x\\|}{\\|x\\\
    |} = O(\\varepsilon).$\n\n带部分主元选取的高斯消元法满足此条件；长向量的朴素求和则不满足。*条件数*$\\kappa(x) = \\\
    |x\\| \\|f'(x)\\| / \\|f(x)\\|$与稳定性结合以限制前向误差：\n\n$\\frac{\\|\\widehat{y} - y\\\
    |}{\\|y\\|} \\le \\kappa(x) \\underbrace{\\frac{\\|\\Delta x\\|}{\\|x\\|}}_{\\\
    text{backward error}}$"
