    \ $L[y] = y'' + p(x)y' + q(x)y$，边界条件为 $y(a) = y(b) = 0$，**格林函数** $G(x, \\xi)$\
    \ 满足\n\n$L_x G(x, \\xi) = \\delta(x - \\xi), \\quad G(a, \\xi) = G(b, \\xi) =\
    \ 0$。\n\n则 $y(x) = \\int_a^b G(x, \\xi) f(\\xi) \\, d\\xi$ 是 $L[y] = f$ 的解。\n\n\
    **例 6.1.14（固定弦）** $y''(x) = f(x)$，$y(0) = y(1) = 0$。分段格林函数\n\n$G(x, \\xi) = \\\
    begin{cases} x(1 - \\xi), & 0 \\le x \\le \\xi, \\\\ \\xi(1 - x), & \\xi \\le\
    \ x \\le 1. \\end{cases}$\n\n对于载荷 $f(x) = 6x$，解析卷积得到 $y(x) = x^3 - x$。数值验证：\n\n\
    ```python\nx, \\xi = sp.symbols('x \\xi')\nG = sp.Piecewise((x*(1-\\xi), x<=\\\
    xi), (\\xi*(1-x), True))\nf = 6*\\xi\ny = sp.integrate(G*f, (\\xi,0,1))\nsp.simplify(sp.diff(y,x,2)\
    \ - 6*x) # 0\n```\n\n## 常微分方程的级数解：弗罗贝尼乌斯方法\n\n对于正则奇点 $x = 0$，弗罗贝尼乌斯试探解\n\n$y(x)\
    \ = \\sum_{n=0}^{\\infty} a_n x^{n+r}, \\quad a_0 \\ne 0,$\n\n导出一个确定 $r$ 的指标方程。\n\
    \n**例 6.1.15（贝塞尔方程）** $x^2y'' + xy' + (x^2 - \\nu^2)y = 0$。指标方程 $r^2 - \\nu^2\
    \ = 0 \\implies r = \\pm \\nu$。对于 $r = \\nu$，递推关系 $a_n = -\\frac{1}{n(n+2\\nu)}a_{n-2}$\
    \ 给出偶数级数，$J_\\nu(x) = \\sum_{k=0}^{\\infty} \\frac{(-1)^k}{k!\\Gamma(k+\\nu+1)}\\\
    left(\\frac{x}{2}\\right)^{2k+\\nu}$。\n\n```python\n\\nu = sp.symbols('\\nu',\
    \ positive=True)\nk = sp.symbols('k', integer=True, nonnegative=True)\nJv = sp.summation((-1)**k/(sp.factorial(k)*sp.gamma(k+v+1))\n\
    \    *(x/2)**(2*k+v), (k,0,4)).series(x, 0, 6)\n```\n\n在 $x=1$ 处比较符号贝塞尔函数 $J_v$\
    \ 与截断级数（$v=0$）。\n\n**正则点** 如果点是常点，设 $r=0$。例如：勒让德方程 $(1-x^2)y''-2xy'+\\ell(\\ell+1)y=0$\
    \ 在 $\\ell \\in \\mathbb{N}$ 时通过终止级数产生勒让德多项式 $P_\\ell(x)$。\n\n**非正则奇点** 出现修正贝塞尔函数或艾里函数；形式级数可能发散，需要渐近匹配或主导平衡（WKB）技术——此处不涉及。\n\
    \n## 6.1.3 常微分方程组\n\n现实世界的模型很少孤立演化；相反，多个状态变量相互作用。一阶方程**组**可紧凑地写为\n\n$\\dot{\\\
    mathbf{x}} = \\mathbf{F}(t, \\mathbf{x}), \\quad \\mathbf{x}(t) \\in \\mathbb{R}^n$。\n\
    \n我们全面处理线性系统，为非线性系统开发定性工具，并以李雅普诺夫直接法作为结论——这是一种绕过显式解的能量型判据。\n\n## 线性系统与矩阵方法\n\n\
    设 $\\mathbf{A} \\in \\mathbb{R}^{n \\times n}$ 为常数矩阵。齐次系统\n\n$\\dot{\\mathbf{x}}\
    \ = \\mathbf{A}\\mathbf{x}, \\quad \\mathbf{x}(0) = \\mathbf{x}_0$\n\n的解为 $\\\
    mathbf{x}(t) = e^{\\mathbf{A}t}\\mathbf{x}_0$，其中**矩阵指数** $e^{\\mathbf{A}t} = \\\
    sum_{k=0}^{\\infty} \\frac{(\\mathbf{A}t)^k}{k!}$。\n\n**对角化** 若 $\\mathbf{A} =\
    \ \\mathbf{V}\\mathbf{\\Lambda}\\mathbf{V}^{-1}$，特征值为 $\\lambda_i$，则 $e^{\\mathbf{A}t}\
    \ = \\mathbf{V} e^{\\mathbf{\\Lambda}t} \\mathbf{V}^{-1}$，$e^{\\mathbf{\\Lambda}t}\
    \ = \\text{diag}(e^{\\lambda_1 t}, \\dots, e^{\\lambda_n t})$。\n\n**若尔当标准形** 对于亏损矩阵，若尔当块\
    \ $J = \\lambda I + N$（$N$ 幂零）给出 $e^{Jt} = e^{\\lambda t} \\sum_{k=0}^{m-1} \\\
    frac{(Nt)^k}{k!}$。\n\n## 例 6.1.16（耦合质量-弹簧系统）\n\n$m\\ddot{x} = -2kx + ky, \\quad\
    \ m\\ddot{y} = kx - 2ky$。\n\n写成 $\\dot{\\mathbf{z}} = \\mathbf{A}\\mathbf{z}$，其中\
    \ $\\mathbf{z} = (x, y, \\dot{x}, \\dot{y})$；特征值为 $\\pm i\\sqrt{k/m}$，$\\pm i\\\
    sqrt{3k/m}$。因此运动是频率为 $\\omega_1 = \\sqrt{k/m}$ 和 $\\omega_2 = \\sqrt{3k/m}$ 的两个正则模态的叠加。\n\
    \n```python\nimport sympy as sp\nk,m=sp.symbols('k m', positive=True)\nA=sp.Matrix([[0,0,1,0],[0,0,0,1],[-2*k/m,k/m,0,0],[k/m,-2*k/m,0,0]])\n\
    A.eigenvects()\n```\n\n**受迫线性系统** $\\dot{\\mathbf{x}} = \\mathbf{A}\\mathbf{x}\
    \ + \\mathbf{f}(t)$ 的常数变易法解为 $\\mathbf{x}(t) = e^{\\mathbf{A}t}\\mathbf{x}_0 +\
    \ \\int_0^t e^{\\mathbf{A}(t-\\tau)}\\mathbf{f}(\\tau)\\,d\\tau$。\n\n**基本矩阵**\
    \ $\\Phi(t)$ 是满足 $\\Phi(0) = I$ 的任意矩阵解，满足 $\\dot{\\Phi} = \\mathbf{A}\\Phi$ 且\
    \ $\\Phi(t) = e^{\\mathbf{A}t}$。$\\Phi$ 的列构成解空间的一组基。\n\n## 非线性系统与稳定性\n\n对于 $\\\
    dot{\\mathbf{x}} = \\mathbf{F}(\\mathbf{x})$，*平衡点*满足 $\\mathbf{F}(\\mathbf{x}^*)\
    \ = \\mathbf{0}$。通过雅可比矩阵 $\\mathbf{J}(\\mathbf{x}^*) = D\\mathbf{F}(\\mathbf{x}^*)$\
    \ 线性化：\n\n$$\\dot{\\eta} = \\mathbf{J}\\eta + O(\\|\\eta\\|^2), \\quad \\eta =\
    \ \\mathbf{x} - \\mathbf{x}^*.$$\n\n**哈特曼-格罗布曼定理**（Grobman 1959; Perko 2013; Strogatz\
    \ 2018）如果 $\\mathbf{J}$ 没有实部为零的特征值，则 $\\mathbf{x}^*$ 附近的非线性流与其线性化是拓扑共轭的。\n\n**例\
    \ 6.1.17**（范德波尔振荡器，$\\mu = 1$）\n\n$$\\dot{x} = y, \\quad \\dot{y} = (1 - x^2)y\
    \ - x.$$\n\n唯一的平衡点 $(0, 0)$；雅可比矩阵 $\\mathbf{J}(0, 0) = \\begin{pmatrix} 0 & 1\
    \ \\\\ -1 & 1 \\end{pmatrix}$ 的特征值为 $\\frac{1}{2}(1 \\pm i\\sqrt{3}) \\implies$\
    \ 不稳定焦点。全局动力学特征是一个稳定的极限环，通过轨迹模拟验证（参见图 6.4）。\n\n```python\nimport numpy as np,\
    \ matplotlib.pyplot as plt\n$\\mu$=1\ndef F(t,z): x,y=z; return [y, (1-x**2)*y\
    \ - x]\nfrom scipy.integrate import solve_ivp\nfor (x0,y0) in [(2,0),(0.1,0.1),(-2,0)]:\n\
    \    sol=solve_ivp(F,[0,40],[x0,y0],t_eval=np.linspace(0,40,4000))\n    plt.plot(sol.y[0],\
    \ sol.y[1])\nplt.xlabel('x'); plt.ylabel('y'); plt.show()\n```\n\n**中心流形约化** 如果\
    \ $\\mathbf{J}$ 有实部为零的特征值，则流由低维中心流形上的非线性项决定；这在霍普夫分岔分析中至关重要。\n\n![图 6.4 μ = 1 时范德波尔振荡器的相平面轨迹。每个解都螺旋趋向唯一的极限环，展示了非线性阻尼项如何迫使收敛，与初始状态无关](img/9724708489e3df346f9e31e3fa6e5746_222_0.png)\n\
    \n## 李雅普诺夫直接法\n\n**李雅普诺夫函数** 一个标量函数 $V : D \\to \\mathbb{R}$，满足 $V(\\mathbf{x}^*)\
    \ = 0$，对于 $\\mathbf{x} \\ne \\mathbf{x}^*$ 有 $V(\\mathbf{x}) > 0$，且沿轨迹的导数 $\\\
    dot{V} = \\nabla V \\cdot \\mathbf{F} \\le 0$，则意味着 $\\mathbf{x}^*$ 是*稳定的*。如果对于\
    \ $\\mathbf{x} \\ne \\mathbf{x}^*$ 有 $\\dot{V} < 0$，则平衡点是*渐近稳定的*。\n\n**线性系统的二次型候选函数**\
    \ 对于 $\\dot{\\mathbf{x}} = \\mathbf{A}\\mathbf{x}$，其中 $\\mathbf{A}$ 是赫尔维茨矩阵，求解李雅普诺夫方程\
    \ $\\mathbf{A}^T\\mathbf{P} + \\mathbf{P}\\mathbf{A} = -\\mathbf{Q}$（任意 $\\mathbf{Q}\
    \ > 0$）并设 $V = \\mathbf{x}^T\\mathbf{P}\\mathbf{x}$。\n\n**例 6.1.18（二维系统）** $\\\
    dot{\\mathbf{x}} = \\begin{pmatrix} -2 & -1 \\\\ 3 & -4 \\end{pmatrix}\\mathbf{x}$。选择\
    \ $\\mathbf{Q} = \\mathbf{I}$；求解 $\\mathbf{P}$：\n\n```python\nA = sp.Matrix([[-2,-1],[3,-4]])\n\
    P = sp.Matrix(sp.symbols('p11 p12 p22')).reshape(2,2)\nQ = sp.eye(2)\neq = A.T*P\
    \ + P*A + Q\nsol = sp.solve(eq.reshape(4,1), list(P))\nP = sp.Matrix([[sol[sp.symbols('p11')],\
    \ sol[sp.symbols('p12')]],\n               [sol[sp.symbols('p12')], sol[sp.symbols('p22')]]])\n\
    ```\n\n$\\mathbf{P}$ 是正定的；$V = \\mathbf{x}^T\\mathbf{P}\\mathbf{x}$ 严格递减 $\\implies$\
    \ 全局渐近稳定。\n\n**拉萨尔不变性原理** 如果 $\\dot{V} \\leq 0$ 且解保持在一个紧集中，则轨迹趋近于 $\\dot{V} =\
    \ 0$ 的最大不变子集。当 $\\dot{V}$ 仅为半负定时，用于证明全局收敛到极限环或平衡点。\n\n**例 6.1.19（通过李雅普诺夫函数分析洛特卡-沃尔泰拉方程）**\
    \ 对于捕食者-猎物系统，选择 $V(x, y) = \\delta x - \\gamma \\ln x + \\beta y - \\alpha \\\
    ln y$；沿所有轨迹 $\\dot{V} = 0 \\implies$ 轨道位于 $V$ 的等值集上；不收敛但有界。\n\n## 6.1.4 常微分方程的数值解\n\
    \n对于现实模型，解析公式很少存在。因此，稳健的数值积分器在现代应用数学中扮演着不可或缺的角色。我们介绍局部/截断误差、全局收敛性和稳定性的基础概念，发展显式和隐式龙格-库塔格式，并在\
    \ NumPy/SciPy 中说明实际建模工作流程。\n\n## 欧拉方法与龙格-库塔方法\n\n**前向（显式）欧拉法** 对于 $\\dot{y} =\
    \ f(t, y)$ 和时间步长 $h$，\n\n$$y_{n+1} = y_n + h f(t_n, y_n).$$\n\n局部截断误差 $O(h^2)$；全局误差\
    \ $O(h)$（一阶）。\n\n**例 6.1.20（指数衰减）** $\\dot{y} = -3y$，$y(0) = 1$。在 $0 \\leq t \\\
    leq 1$ 上取 $h = 0.1$；与精确值 $e^{-3}$ 比较。\n\n```python\nimport numpy as np\nh, N =\
    \ .1, 10\ny = 1.0\nfor _ in range(N): y += h*(-3*y)\nprint(\"Euler y(1) =\", y,\
    \ \" exact =\", np.exp(-3))\n```\n\n## 经典 RK4\n\n$$k_1 = f(t_n, y_n),$$\n$$k_2\
    \ = f(t_n + h/2, y_n + hk_1/2),$$\n$$k_3 = f(t_n + h/2, y_n + hk_2/2),$$\n$$k_4\
    \ = f(t_n + h, y_n + hk_3),$$\n$$y_{n+1} = y_n + \\frac{h}{6}(k_1 + 2k_2 + 2k_3\
    \ + k_4).$$\n\n四阶方法：全局误差 $O(h^4)$。"
