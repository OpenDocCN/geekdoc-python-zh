- md: "## Encapsulation and Abstraction\n\nEncapsulation hides internal representation,\
    \ exposing only the public API—mirroring the abstract-data-type notion where operations,\
    \ not data layout, define semantics. Python enforces *convention* rather than\
    \ strict visibility: attributes prefixed by `_` are considered private; double-underscore\
    \ names trigger name-mangling to avoid accidental clashes in subclasses. Abstraction\
    \ enables replacement of the underlying implementation (array vs. sparse storage)\
    \ without altering client code, analogous to replacing $\\mathbb{R}$ by $\\mathbb{Q}_p$\
    \ in an algebraic proof while retaining field axioms.\n\n## 1.7.2 Advanced OOP\
    \ Concepts\n\n### Inheritance and Polymorphism\n\nA subclass $\\mathcal{D}$ *inherits*\
    \ the attribute-method signature of its parent $\\mathcal{B}$, establishing an\
    \ *is-a* relationship $\\mathcal{D} \\subseteq \\mathcal{B}$. Polymorphism lets\
    \ a single interface operate on any element of the union $\\bigcup \\text{Obj}(\\\
    mathcal{B}_i)$.\n\n### Example 1.7.2 (Abstract Matrix and Concrete Variants)\n\
    \n```python\nfrom abc import ABC, abstractmethod\nimport numpy as np, scipy.sparse\
    \ as sp\n\nclass Matrix(ABC):\n    @abstractmethod\n    def matvec(self, x: np.ndarray)\
    \ -> np.ndarray: ...\n\nclass Dense(Matrix):\n    def __init__(self, A: np.ndarray):\
    \ self._A = A\n    def matvec(self, x): return self._A @ x\n\nclass Sparse(Matrix):\n\
    \    def __init__(self, A: sp.spmatrix): self._A = A\n    def matvec(self, x):\
    \ return self._A @ x\n```\n\nA Krylov solver can accept any `Matrix`; run-time\
    \ dispatch selects the appropriate `matvec`, analogous to choosing a field completion\
    \ when proving convergence of series.\n\n### Mixins and Multiple Inheritance\n\
    \nPython supports multiple inheritance, enabling *mixins*: classes that contribute\
    \ reusable behaviour without constituting a full type hierarchy. Let $\\mathcal{M}$\
    \ provide differentiation, $\\mathcal{B}$ provide base evaluation; their composite\
    \ $\\mathcal{B} \\cap \\mathcal{M}$ gains both abilities via the C3 linearised\
    \ Method Resolution Order (MRO).\n\n### Example 1.7.3 (Differentiable Function\
    \ Mixin)\n\n```python\nclass Differentiable:\n    def derivative(self, x: float,\
    \ h: float = 1e-8):\n        f = self.__call__\n        return (f(x + h) - f(x\
    \ - h)) / (2 * h)\n\nclass Gaussian(Differentiable):\n    def __init__(self, μ=0.0,\
    \ σ=1.0): self.μ, self.σ = μ, σ\n    def __call__(self, x): # evaluate Φ(x)\n\
    \        from math import exp, sqrt, pi\n        z = (x - self.μ) / self.σ\n \
    \       return exp(-0.5 * z**2) / (self.σ * sqrt(2 * pi))\n```\n\nNow `Gaussian(0,\
    \ 1).derivative(0)` yields 0 with machine precision, while any class that defines\
    \ `__call__` inherits a centred finite-difference derivative for free.\n\nMixins\
    \ must avoid state conflicts; they are best limited to stateless utility or orthogonal\
    \ facets (serialization, logging). When diamond inheritance arises, the MRO ensures\
    \ each ancestor's `__init__` executes exactly once, akin to ensuring that overlapping\
    \ lemmas are not double-counted in a proof.\n\nThrough classes, inheritance, and\
    \ mixins, Python offers a formal yet flexible calculus for modelling mathematical\
    \ structures, allowing algorithms to be written generically while retaining the\
    \ performance of specialised implementations.\n\n## 1.7.3 Special Methods and\
    \ Operator Overloading\n\n`__str__`, `__repr__`, etc.\n\nEvery Python object inherits\
    \ a catalogue of dunder (double-underscore) hooks that mediate its interaction\
    \ with built-in syntax. The pair\n\n`(__repr__, __str__)`\n\nserves distinct audiences:\
    \ `repr(x)` should emit an unambiguous, often evaluable specification of `x`,\
    \ whereas `str(x)` targets human readability. A canonical rule is\n\n`eval(repr(x))\
    \ = x`\n\nwhenever feasible.\n\n### Example 1.7.4 (Rational Number Class)\n\n\
    ```python\nfrom math import gcd\n\nclass Fraction:\n    __slots__ = (\"p\", \"\
    q\")\n\n    def __init__(self, p: int, q: int = 1):\n        g = gcd(p, q)\n \
    \       self.p, self.q = p // g, q // g\n\n    # string conversions\n    def __repr__(self):\
    \ # eval-able\n        return f\"Fraction({self.p}, {self.q})\"\n\n    def __str__(self):\
    \ # pretty\n        return f\"{self.p}/{self.q}\"\n```\n\nA REPL prints `Fraction(3,2)`\
    \ for debugging yet `3/2` in end-user logs.\n\n### Arithmetic and Comparison Overloads\n\
    \nBy implementing `__add__`, `__sub__`, ..., an object behaves like a field element;\
    \ comparison hooks realise an ordered set. Python guarantees fall-back to reflected\
    \ methods (`__radd__`) when the left operand lacks an implementation, mirroring\
    \ the commutativity of ℝ.\n\n```python\ndef __add__(self, other: \"Fraction\"\
    ) -> \"Fraction\":\n    p = self.p * other.q + other.p * self.q\n    q = self.q\
    \ * other.q\n    return Fraction(p, q)\n\ndef __mul__(self, other: \"Fraction\"\
    ) -> \"Fraction\":\n    return Fraction(self.p * other.p, self.q * other.q)\n\n\
    def __eq__(self, other: object) -> bool: # total ordering via (p, q)\n    return\
    \ isinstance(other, Fraction) and \\\n        self.p * other.q == self.q * other.p\n\
    \ndef __lt__(self, other: \"Fraction\") -> bool:\n    return self.p * other.q\
    \ < self.q * other.p\n```\n\nThese methods fulfil field axioms (associativity,\
    \ distributivity); unit tests can treat them as algebraic lemmas.\n\n## 1.7.4\
    \ Working with Mathematical Structures in OOP\n\n### Vectors and Matrices as Classes\n\
    \nEncapsulating linear-algebraic entities as classes affords dimensionality checks\
    \ and algorithm dispatch:\n\n```python\nimport numpy as np\n\nclass Matrix:\n\
    \    def __init__(self, data: np.ndarray):\n        assert data.ndim == 2, \"\
    Matrix must be 2-D\"\n        self.A = data\n\n    def __matmul__(self, x: \"\
    Matrix|np.ndarray\"):\n        return Matrix(self.A @ x.A) if isinstance(x, Matrix)\
    \ else self.A @ x\n\n    def det(self) -> float:\n        return float(np.linalg.det(self.A))\n\
    \n    def eig(self):\n        vals, vecs = np.linalg.eig(self.A)\n        return\
    \ vals, [Vector(v) for v in vecs.T]\n\nclass Vector(np.ndarray): # NumPy subclass\n\
    \    def norm(self, p: float = 2) -> float:\n        return np.linalg.norm(self,\
    \ ord=p)\n```\n\nOperator `@` maps to `__matmul__`, closely matching textbook\
    \ AB.\n\n### Symbolic Algebra Objects\n\nA minimalist CAS can be expressed through\
    \ an expression tree whose nodes overload arithmetic:\n\n```python\nclass Symbol:\
    \ # leaf node\n    def __init__(self, name): self.name = name\n    def __repr__(self):\
    \ return self.name\n\nclass Expr: # internal node\n    def __init__(self, op,\
    \ *args):\n        self.op, self.args = op, args\n\n    def __add__(self, other):\
    \ return Expr(\"+\", self, other)\n    def __mul__(self, other): return Expr(\"\
    *\", self, other)\n    def diff(self, s):\n        if self == s: return 1\n  \
    \      op, a, b = self.op, *self.args\n        if op == \"+\": return a.diff(s)\
    \ + b.diff(s)\n        if op == \"*\": return a.diff(s)*b + a*b.diff(s)\n\nx,\
    \ y = map(Symbol, \"xy\")\nf = (x + y) * x * x\nprint(f.diff(x)) # -> ((1 + 0)\
    \ * x * x) + ((x + y) * 1 * x) + ...\n```\n\nAlthough naïve, the structure demonstrates\
    \ how method overloading can encode algebraic differentiation rules; simplification\
    \ passes then reduce the expression.\n\n## 1.8 Iterators and Generators\n\nLazy\
    \ evaluation converts potentially infinite mathematical objects into finite memory\
    \ representations. Python realises laziness via the iterator protocol and generator\
    \ syntax, enabling constructions such as an unending stream of primes or Fibonacci\
    \ numbers.\n\n### 1.8.1 Understanding Iterators in Python\n\n#### Iterator Protocol\n\
    \nAn *iterator* implements\n\n```python\n__iter__(): self,    __next__(): elem\n\
    ```\n\nso that `for x in it:` repeatedly calls `next(it)` until `StopIteration`.\
    \ Formally, an iterator is a partial function $N \\to S \\cup \\{\\bot\\}$ with\
    \ at most one $\\bot$.\n\n#### Custom Iterators\n\n```python\nclass Fibonacci:\n\
    \    def __init__(self): self.a, self.b = 0, 1\n    def __iter__(self): return\
    \ self # iterator is iterable\n    def __next__(self):\n        self.a, self.b\
    \ = self.b, self.a + self.b\n        return self.a\n```\n\nThe sequence $(F_n)$\
    \ emerges lazily; complexity per term is $O(1)$ space.\n\n### 1.8.2 Generators\
    \ and Lazy Evaluation\n\n#### Generator Functions\n\nA function containing `yield`\
    \ suspends execution, storing its frame; each subsequent `next()` resumes where\
    \ it left off, akin to coroutines. This is an external representation of coinductive\
    \ streams.\n\n```python\ndef primes():\n    yield 2\n    seq, p = [], 3\n    while\
    \ True:\n        if all(p % q for q in seq):\n            yield p\n          \
    \  seq.append(p)\n        p += 2\n```"
  mdcn: "## 封装与抽象\n\n封装隐藏内部表示，仅暴露公共 API——这体现了抽象数据类型的概念，即操作而非数据布局定义了语义。Python 强制执行的是*约定*而非严格的可见性：以\
    \ `_` 为前缀的属性被视为私有；双下划线名称会触发名称修饰，以避免在子类中意外冲突。抽象使得底层实现（数组 vs. 稀疏存储）可以在不改变客户端代码的情况下被替换，类似于在代数证明中将\
    \ $\\mathbb{R}$ 替换为 $\\mathbb{Q}_p$ 同时保留域公理。\n\n## 1.7.2 高级面向对象概念\n\n### 继承与多态\n\
    \n子类 $\\mathcal{D}$ *继承*其父类 $\\mathcal{B}$ 的属性-方法签名，建立了一个 *is-a* 关系 $\\mathcal{D}\
    \ \\subseteq \\mathcal{B}$。多态允许单个接口操作联合集 $\\bigcup \\text{Obj}(\\mathcal{B}_i)$\
    \ 中的任何元素。\n\n### 示例 1.7.2（抽象矩阵与具体变体）\n\n```python\nfrom abc import ABC, abstractmethod\n\
    import numpy as np, scipy.sparse as sp\n\nclass Matrix(ABC):\n    @abstractmethod\n\
    \    def matvec(self, x: np.ndarray) -> np.ndarray: ...\n\nclass Dense(Matrix):\n\
    \    def __init__(self, A: np.ndarray): self._A = A\n    def matvec(self, x):\
    \ return self._A @ x\n\nclass Sparse(Matrix):\n    def __init__(self, A: sp.spmatrix):\
    \ self._A = A\n    def matvec(self, x): return self._A @ x\n```\n\n一个 Krylov 求解器可以接受任何\
    \ `Matrix`；运行时分派会选择合适的 `matvec`，类似于在证明级数收敛时选择域的完备化。\n\n### Mixins 与多重继承\n\nPython\
    \ 支持多重继承，从而实现了 *mixins*：这些类贡献可复用的行为，但不构成完整的类型层次结构。设 $\\mathcal{M}$ 提供微分能力，$\\\
    mathcal{B}$ 提供基础求值能力；它们的组合 $\\mathcal{B} \\cap \\mathcal{M}$ 通过 C3 线性化的方法解析顺序（MRO）同时获得这两种能力。\n\
    \n### 示例 1.7.3（可微函数 Mixin）\n\n```python\nclass Differentiable:\n    def derivative(self,\
    \ x: float, h: float = 1e-8):\n        f = self.__call__\n        return (f(x\
    \ + h) - f(x - h)) / (2 * h)\n\nclass Gaussian(Differentiable):\n    def __init__(self,\
    \ μ=0.0, σ=1.0): self.μ, self.σ = μ, σ\n    def __call__(self, x): # evaluate\
    \ Φ(x)\n        from math import exp, sqrt, pi\n        z = (x - self.μ) / self.σ\n\
    \        return exp(-0.5 * z**2) / (self.σ * sqrt(2 * pi))\n```\n\n现在 `Gaussian(0,\
    \ 1).derivative(0)` 在机器精度下得到 0，而任何定义了 `__call__` 的类都可以免费继承一个中心差分导数。\n\nMixins\
    \ 必须避免状态冲突；最好将它们限制在无状态的工具或正交方面（序列化、日志记录）。当出现菱形继承时，MRO 确保每个祖先的 `__init__` 恰好执行一次，类似于确保证明中重叠的引理不被重复计算。\n\
    \n通过类、继承和 mixins，Python 提供了一种形式化但灵活的演算来建模数学结构，允许以泛型方式编写算法，同时保留专门实现的性能。\n\n## 1.7.3\
    \ 特殊方法与运算符重载\n\n`__str__`、`__repr__` 等。\n\n每个 Python 对象都继承了一系列双下划线（dunder）钩子，这些钩子调解其与内置语法的交互。这对\n\
    \n`(__repr__, __str__)`\n\n服务于不同的受众：`repr(x)` 应该输出一个明确的、通常可求值的 `x` 的规范，而 `str(x)`\
    \ 则面向人类可读性。一个典型的规则是\n\n`eval(repr(x)) = x`\n\n只要可行。\n\n### 示例 1.7.4（有理数类）\n\n\
    ```python\nfrom math import gcd\n\nclass Fraction:\n    __slots__ = (\"p\", \"\
    q\")\n\n    def __init__(self, p: int, q: int = 1):\n        g = gcd(p, q)\n \
    \       self.p, self.q = p // g, q // g\n\n    # string conversions\n    def __repr__(self):\
    \ # eval-able\n        return f\"Fraction({self.p}, {self.q})\"\n\n    def __str__(self):\
    \ # pretty\n        return f\"{self.p}/{self.q}\"\n```\n\nREPL 在调试时打印 `Fraction(3,2)`，但在最终用户日志中打印\
    \ `3/2`。\n\n### 算术与比较重载\n\n通过实现 `__add__`、`__sub__` 等，对象的行为类似于域元素；比较钩子实现了有序集。Python\
    \ 保证当左操作数缺少实现时回退到反射方法（`__radd__`），这反映了 ℝ 的交换性。\n\n```python\ndef __add__(self,\
    \ other: \"Fraction\") -> \"Fraction\":\n    p = self.p * other.q + other.p *\
    \ self.q\n    q = self.q * other.q\n    return Fraction(p, q)\n\ndef __mul__(self,\
    \ other: \"Fraction\") -> \"Fraction\":\n    return Fraction(self.p * other.p,\
    \ self.q * other.q)\n\ndef __eq__(self, other: object) -> bool: # total ordering\
    \ via (p, q)\n    return isinstance(other, Fraction) and \\\n        self.p *\
    \ other.q == self.q * other.p\n\ndef __lt__(self, other: \"Fraction\") -> bool:\n\
    \    return self.p * other.q < self.q * other.p\n```\n\n这些方法满足域公理（结合律、分配律）；单元测试可以将它们视为代数引理。\n\
    \n## 1.7.4 在面向对象中处理数学结构\n\n### 向量与矩阵作为类\n\n将线性代数实体封装为类可以提供维度检查和算法分派：\n\n```python\n\
    import numpy as np\n\nclass Matrix:\n    def __init__(self, data: np.ndarray):\n\
    \        assert data.ndim == 2, \"Matrix must be 2-D\"\n        self.A = data\n\
    \n    def __matmul__(self, x: \"Matrix|np.ndarray\"):\n        return Matrix(self.A\
    \ @ x.A) if isinstance(x, Matrix) else self.A @ x\n\n    def det(self) -> float:\n\
    \        return float(np.linalg.det(self.A))\n\n    def eig(self):\n        vals,\
    \ vecs = np.linalg.eig(self.A)\n        return vals, [Vector(v) for v in vecs.T]\n\
    \nclass Vector(np.ndarray): # NumPy subclass\n    def norm(self, p: float = 2)\
    \ -> float:\n        return np.linalg.norm(self, ord=p)\n```\n\n运算符 `@` 映射到 `__matmul__`，与教科书中的\
    \ AB 紧密匹配。\n\n### 符号代数对象\n\n一个极简的计算机代数系统（CAS）可以通过一个表达式树来表达，其节点重载算术运算：\n\n```python\n\
    class Symbol: # leaf node\n    def __init__(self, name): self.name = name\n  \
    \  def __repr__(self): return self.name\n\nclass Expr: # internal node\n    def\
    \ __init__(self, op, *args):\n        self.op, self.args = op, args\n\n    def\
    \ __add__(self, other): return Expr(\"+\", self, other)\n    def __mul__(self,\
    \ other): return Expr(\"*\", self, other)\n    def diff(self, s):\n        if\
    \ self == s: return 1\n        op, a, b = self.op, *self.args\n        if op ==\
    \ \"+\": return a.diff(s) + b.diff(s)\n        if op == \"*\": return a.diff(s)*b\
    \ + a*b.diff(s)\n\nx, y = map(Symbol, \"xy\")\nf = (x + y) * x * x\nprint(f.diff(x))\
    \ # -> ((1 + 0) * x * x) + ((x + y) * 1 * x) + ...\n```\n\n尽管简单，但该结构展示了方法重载如何编码代数微分规则；然后通过化简过程来简化表达式。\n\
    \n## 1.8 迭代器与生成器\n\n惰性求值将潜在的无限数学对象转换为有限的内存表示。Python 通过迭代器协议和生成器语法实现惰性，从而支持诸如无限素数流或斐波那契数列等构造。\n\
    \n### 1.8.1 理解 Python 中的迭代器\n\n#### 迭代器协议\n\n一个*迭代器*实现\n\n```python\n__iter__():\
    \ self,    __next__(): elem\n```\n\n因此 `for x in it:` 会重复调用 `next(it)` 直到 `StopIteration`。形式上，迭代器是一个偏函数\
    \ $N \\to S \\cup \\{\\bot\\}$，其中 $\\bot$ 至多出现一次。\n\n#### 自定义迭代器\n\n```python\n\
    class Fibonacci:\n    def __init__(self): self.a, self.b = 0, 1\n    def __iter__(self):\
    \ return self # iterator is iterable\n    def __next__(self):\n        self.a,\
    \ self.b = self.b, self.a + self.b\n        return self.a\n```\n\n序列 $(F_n)$ 惰性生成；每项的空间复杂度为\
    \ $O(1)$。\n\n### 1.8.2 生成器与惰性求值\n\n#### 生成器函数\n\n包含 `yield` 的函数会挂起执行，保存其帧；每次后续的\
    \ `next()` 会从上次中断的地方恢复，类似于协程。这是共归纳流的外部表示。\n\n```python\ndef primes():\n    yield\
    \ 2\n    seq, p = [], 3\n    while True:\n        if all(p % q for q in seq):\n\
    \            yield p\n            seq.append(p)\n        p += 2\n```"
