    # 9.6.4 Numerical Methods for Nonlinear Dynamics


    Reliable simulation of stiff and chaotic systems demands integrators that respect
    the geometric structure while controlling local truncation error.


    *Time-Stepping* Symplectic Runge–Kutta schemes (e.g., implicit midpoint) preserve
    Hamiltonian phase-volume, inhibiting spurious dissipation that would otherwise
    distort Lyapunov spectra; adaptive embedded pairs (Dormand–Prince 5(4)) adjust
    step size to bound global error yet track Lyapunov growth faithfully provided
    the step is smaller than $0.1 \lambda_{\text{max}}^{-1}$.


    *Continuation* Pseudo-arclength continuation solves $F(\mathbf{x}, \mu) = 0$ augmented
    by tangent predictors, allowing traversal of fold and Hopf bifurcations without
    step collapse. The extended system


    $$\left[\begin{array}{c} F(\mathbf{x}, \mu) \ \mathbf{v}^\top(\mathbf{x} - \mathbf{x}_0)
    + \beta(\mu - \mu_0) - s \end{array}\right] = 0,$$


    is Newton-iterated at each step; $\mathbf{v}$ is previous tangent, $s$ the arclength
    increment. Standard packages (AUTO-97p, pyCoCo) automate branch switching and
    Floquet multiplier tracking.


    *Variational Integration* Simultaneous integration of the variational equations
    $\dot{\mathbf{v}} = D\mathbf{F}(\mathbf{x})\mathbf{v}$ alongside state variables—using
    identical time grid and identical scheme—avoids artificial transverse damping
    that would bias Lyapunov exponents. When Jacobians are unavailable, automatic
    differentiation (jax.grad) supplies $D\mathbf{F}$ at machine precision.'
