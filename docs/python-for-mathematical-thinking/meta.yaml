    Augment inputs with label $y$: $G(\mathbf{z}, y)$, $D(\mathbf{x}, y)$. Enables
    class-conditional synthesis (e.g. MNIST digits). Projection discriminator computes
    $D(\mathbf{x}, y) = \mathbf{v}^\top \phi(\mathbf{x}) + \phi_c(y)^\top \phi(\mathbf{x})
    + b$.


    # Applications


    Image-to-image translation (pix2pix, CycleGAN), super-resolution (SRGAN), data
    augmentation for medical imaging, tabular synthesis preserving privacy (DP-GAN
    with noised gradients).


    # Bayesian Networks and Probabilistic Graphical Models


    # Directed Acyclic Graph (DAG)


    Nodes $\{X_1, \dots, X_p\}$, edges encode conditional independence: $X_i \perp
    X_j \mid \mathbf{Pa}(X_i)$ for non-descendants $X_j$. Joint factorises as


    $$p(\mathbf{x}) = \prod_{i=1}^p p(x_i \mid \mathbf{pa}(x_i)).$$


    Inference via variable elimination in $O(|\mathcal{E}|)$ for treewidth-bounded
    graphs; junction tree algorithm triangulates dense graphs for exact marginalisation.


    # Parameter Learning


    For discrete variables, maximum-likelihood counts: $\hat{p}(x_i \mid \mathbf{pa})
    = \frac{N(x_i, \mathbf{pa})}{\sum_{x_i} N(x_i, \mathbf{pa})}$. Bayesian parameter
    learning uses Dirichlet-multinomial conjugacy; predictive distribution integrates
    over parameters.


    # Structure Learning


    Score-and-search: maximise BIC score over DAGs using greedy equivalence search;
    constraint-based (PC algorithm) tests conditional independencies; hybrid methods
    combine. NP-hard, but tractable for $p \lesssim 20$.'
