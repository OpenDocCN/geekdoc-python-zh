    # Hierarchical Agglomerative Clustering (HAC)


    Start with $n$ singleton clusters; iteratively merge pair $(A, B)$ of clusters
    that minimises linkage criterion:


    $d_{\text{single}}(A, B) = \min_{\mathbf{x} \in A, \mathbf{y} \in B} \|\mathbf{x}
    - \mathbf{y}\|, \quad d_{\text{complete}} = \max, \quad d_{\text{average}} = \frac{|A||B|}{|A|+|B|}
    \|\bar{\mathbf{x}}_A - \bar{\mathbf{x}}_B\|$.


    Produces dendrogram; cut at height $\tau$ to obtain flat clusters. Complexity
    $O(n^2 \log n)$ with heap linkage cache.


    ```

    from sklearn.cluster import KMeans, AgglomerativeClustering

    km = KMeans(n_clusters=4, init=''k-means++'', n_init=20).fit(X)

    hac = AgglomerativeClustering(n_clusters=4, linkage=''ward'').fit(X)

    ```


    # Dimensionality Reduction: PCA, t-SNE


    PCA Recap


    Projection $\mathbf{z}_i = V^\top(\mathbf{x}_i - \boldsymbol{\mu})$ maximises
    variance; reconstruction error $\sum_i \|\mathbf{x}_i - VV^\top\mathbf{x}_i\|^2
    = \sum_{j>k} \lambda_j$ equals discarded eigenvalue tail.


    t-SNE (van der Maaten and Hinton 2008)


    Transforms Euclidean distances to conditional probabilities $p_{j|i} \propto \exp(-\|\mathbf{x}_i
    - \mathbf{x}_j\|^2 / 2\sigma_i^2)$, perplexity $\mathcal{P} = 2^{H(P_i)}$ selects
    $\sigma_i$. Embedding $\mathbf{y}_i \in \mathbb{R}^2$ minimises KL divergence


    $\text{KL}(P \parallel Q) = \sum_{i \neq j} p_{ij} \log \frac{p_{ij}}{q_{ij}},
    \quad q_{ij} = \frac{(1 + \|\mathbf{y}_i - \mathbf{y}_j\|^2)^{-1}}{\sum_{k \neq
    \ell} (1 + \|\mathbf{y}_k - \mathbf{y}_\ell\|^2)^{-1}}$.


    Gradient updates $\Delta \mathbf{y}_i \propto 4 \sum_j (p_{ij} - q_{ij})(\mathbf{y}_i
    - \mathbf{y}_j)(1 + \|\mathbf{y}_i - \mathbf{y}_j\|^2)^{-1}$. Barnes–Hut approximation
    yields $O(n \log n)$ runtime.


    ```

    from sklearn.manifold import TSNE

    Z = TSNE(n_components=2, perplexity=30, init=''pca'').fit_transform(X)

    ```


