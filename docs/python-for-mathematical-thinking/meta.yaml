  md: "# 2.1.4 Inequalities and Absolute Values\n\nChain and Triangle Inequalities\n\
    \nDenote $|\\cdot|$ the Euclidean absolute value on $\\mathbb{R}$. Two foundational\
    \ properties guide error analysis:\n\nChain Inequality If $|x - y| \\le \\varepsilon$\
    \ and $|y - z| \\le \\delta$ then\n\n$$|x - z| \\le \\varepsilon + \\delta.$$\n\
    \nThis is the metric version of the transitive closure for bounded error.\n\n\
    Triangle Inequality For all $x, y \\in \\mathbb{R}$,\n\n$$|x + y| \\le |x| + |y|.$$\n\
    \nVerification in Floating Point Numerical experiments corroborate the inequalities\
    \ within rounding tolerance:\n\n```\nimport random, math\ndef triangle_trials(N=10**5):\n\
    \    return all(abs(x + y) <= abs(x) + abs(y) + 1e-15\n               for x, y\
    \ in ((random.uniform(-1,1), random.uniform(-1,1))\n                         \
    \   for _ in range(N)))\nprint(triangle_trials()) # True with overwhelming probability\n\
    ```\n\nThe $10^{-15}$ slack accounts for machine epsilon $\\varepsilon$; without\
    \ it, rare violations stem from rounding, not algebraic failure.\n\nApplication:\
    \ Forward Error in Numerical Differentiation For the forward difference\n\n$$D_h\
    \ f(x) = \\frac{f(x+h) - f(x)}{h}$$\n\nwith true derivative $f'(x)$, the total\
    \ error decomposes into *truncation* $T \\sim \\frac{h}{2} f''(x)$ and *round-off*\
    \ $R \\sim \\frac{\\varepsilon f(x)}{h}$. The chain inequality yields\n\n$$|D_h\
    \ f(x) - f'(x)| \\le |T| + |R|,$$\n\nidentifying the optimal $h = \\sqrt{\\frac{2\\\
    varepsilon f(x)}{f''(x)}}$ that equilibrates errors."
