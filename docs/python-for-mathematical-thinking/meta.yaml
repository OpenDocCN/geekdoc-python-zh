    \n#### 缩进、代码块和风格\n\nPython 摒弃了花括号，转而采用*语义缩进*。代码块在复合语句结尾的冒号 `:` 之后立即开始。解释器强制执行从源代码到解析树的确定性映射：不一致的缩进会触发\
    \ `IndentationError`，从而防止困扰那些使用可选花括号的语言的语法歧义。\n\n风格指南在 **PEP 8** 中进行了规范。数学脚本受益于其清晰度规则：变量名应反映常规表示法（`theta`、`lambda_max`），函数使用\
    \ `lower_snake_case`，类使用 `CapWords`。行长度应很少超过 79 个字符，以确保 $\\LaTeX$/PDF 列表不会超出页面范围。自动格式化程序如\
    \ `black` 强制执行规范风格，使差异比较像代数等式一样：多余的空白被消除，只有语义更改保持可见。\n\n### 1.2.3 Python 作为解释型语言\n\
    \n#### 字节码和 CPython 虚拟机\n\n虽然 Python 通常被口语化地称为“解释型语言”，但 CPython 参考实现执行两阶段翻译。源文件首先被解析为抽象语法树，优化为基于栈的*字节码*，并缓存为\
    \ `__pycache__` 目录中的 `.pyc` 文件。每条字节码指令操作一个虚拟栈；例如，乘法 $a \\times b$ 被编译为\n\n```\n\
    >>> import dis\n>>> def prod(a, b): return a * b\n...\n>>> dis.dis(prod)\n  1\
    \ 0 LOAD_FAST 0 (a)\n     2 LOAD_FAST 1 (b)\n     4 BINARY_MULTIPLY\n     6 RETURN_VALUE\n\
