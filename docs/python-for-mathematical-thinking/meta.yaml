  md: '# Conjugate Gradient (CG)


    Applies to SPD $A$. At iteration $k$ finds $\mathbf{x}^{(k)}$ minimising $\|\mathbf{x}
    - \mathbf{x}^*\|_A$ over $\mathbf{x}^{(0)} + \mathcal{K}_k$, using a short three-term
    recurrence:


    $\mathbf{p}_k = \mathbf{r}_k + \beta_{k-1}\mathbf{p}_{k-1}, \quad \alpha_k = \frac{\mathbf{r}_k^T
    \mathbf{r}_k}{\mathbf{p}_k^T A \mathbf{p}_k}, \quad \mathbf{x}_{k+1} = \mathbf{x}_k
    + \alpha_k \mathbf{p}_k, \quad \mathbf{r}_{k+1} = \mathbf{r}_k - \alpha_k A \mathbf{p}_k.$


    Error bound $\|\mathbf{e}_k\|_A \le 2\left(\frac{\sqrt{\kappa}-1}{\sqrt{\kappa}+1}\right)^k
    \|\mathbf{e}_0\|_A$ depends on condition number $\kappa = \lambda_{\max}/\lambda_{\min}$.


    # GMRES


    For general non-symmetric $A$, GMRES seeks $\mathbf{x}^{(k)} \in \mathbf{x}^{(0)}
    + \mathcal{K}_k$ minimising residual norm; Arnoldi orthogonalisation produces
    $AV_k = V_{k+1}\bar{H}_k$ and reduces $\|\mathbf{r}^{(k)}\|_2$ via a small least-squares
    problem. Memory grows with $k$; *restarted* GMRES($m$) limits basis size at the
    cost of slower convergence.


    # Preconditioning


    Transform $M^{-1}A\mathbf{x} = M^{-1}\mathbf{b}$ with inexpensive $M \approx A$.
    For SPD, incomplete Cholesky (IC($\tau$)) maintains sparsity; for nonsymmetric
    $A$, ILU($k$) or algebraic multigrid serve as effective preconditioners, drastically
    lowering $\kappa$ and eigenvalue clustering.


    # Example 8.2.7 (CG vs. GMRES on 2-D Poisson)


    ```

    from scipy.sparse.linalg import cg, gmres, spilu, LinearOperator

    A = ... # 5-point Laplacian (CSR sparse)

    b = np.ones(A.shape[0])

    M = spilu(A.tocsc(), drop_tol=1e-3)

    P = LinearOperator(A.shape, lambda x: M.solve(x))

    x_cg, info_cg = cg(A, b, M=P, tol=1e-8)

    x_gm, info_gm = gmres(A, b, M=P, restart=50, tol=1e-8)

    ```


    With IC preconditioning CG converges in $\sim 70$ iterations, GMRES(50) in two
    restarts; unpreconditioned variants exceed 400 iterations.


    # Theoretical Spectra


    If $A$''s eigenvalues cluster into a few tight intervals, polynomial filtering
    intrinsic to Krylov methods damps errors rapidly. Chebyshev semi-iterative methods
    exploit known spectral bounds to avoid inner products, beneficial on GPUs.'
