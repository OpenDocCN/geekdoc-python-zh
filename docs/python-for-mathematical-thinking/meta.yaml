    \ 和肯德尔 $\\tau$ 则捕捉单调依赖关系。\n\n**示例 5.2.12（经验相关性 vs. 理论相关性）** 设 $X \\sim \\mathcal{N}(0,\
    \ 1)$，$Y = 0.8X + 0.6Z$，其中 $Z \\perp X$，$Z \\sim \\mathcal{N}(0, 1)$。则 $\\rho_{XY}\
