    # ### 3.4.2 Calculus of Variations\n\nThe **calculus of variations** concerns\
    \ the optimisation of functionals—mappings from functions to real numbers. A typical\
    \ variational problem seeks the function $y(x)$ that minimises an integral:\n\n\
    $$\\mathcal{J}[y] = \\int_{a}^{b} L(x, y(x), y'(x)) \\, dx,$$\n\nsubject to boundary\
    \ conditions $y(a) = y_a$, $y(b) = y_b$. This arises in physics (least action),\
    \ geometry (geodesics), and engineering (optimal control)."
  - '[PAGE 106]


    # Euler–Lagrange Formalism


    The critical points of $\mathcal{J}[y]$ satisfy the **Euler–Lagrange equation**:


    $$\frac{\partial L}{\partial y} - \frac{d}{dx} \left( \frac{\partial L}{\partial
    y''} \right) = 0.$$


    **Example 3.4.8 (Shortest Path: Geodesic in the Plane)** Let $y(x)$ connect two
    points $(x_0, y_0)$, $(x_1, y_1)$. The arc length functional is:


    $$\mathcal{J}[y] = \int_{x_0}^{x_1} \sqrt{1 + y''(x)^2} \, dx.$$


    Here $L(y, y'') = \sqrt{1 + y''^2}$, so:


    $$\frac{d}{dx} \left( \frac{y''}{\sqrt{1 + y''^2}} \right) = 0 \Rightarrow \frac{y''}{\sqrt{1
    + y''^2}} = C.$$


    Solving yields $y'' = \text{const} \Rightarrow y(x) = mx + c$—a straight line.


    ```

    import sympy as sp

    x = sp.Symbol("x")

    y = sp.Function("y")(x)

    L = sp.sqrt(1 + sp.diff(y, x)**2)

    EL = sp.diff(sp.diff(L, sp.diff(y, x)), x) - sp.diff(L, y)

    sp.pprint(sp.simplify(EL)) # Returns 0

    ```


    **Example 3.4.9 (Brachistochrone Curve)** Minimise time of descent under gravity
    between points. The functional is:


    $$\mathcal{J}[y] = \int_{x_0}^{x_1} \sqrt{\frac{1 + y''^2}{2gy}} \, dx.$$


    This yields a cycloidal path. Deriving Euler–Lagrange leads to a nonlinear ODE
    solved via parametric substitution. Due to complexity, this is often approached
    numerically or via known solution forms.


    # Constraints and Lagrange Multipliers


    In variational problems with integral constraints:


    Minimise $\mathcal{J}[y] = \int_{a}^{b} L(x, y, y'') \, dx, \quad \text{subject
    to} \quad \int_{a}^{b} g(x, y) \, dx = C,$'
