    ## To the Thinkers and Dreamers


    ## Preface


    Mathematics is the language in which the laws of the cosmos are most succinctly
    expressed, while computation furnishes the dialects that make these laws tractable
    for modern inquiry. In the twenty-first century, the scientist, engineer, or economist
    who commands both rigorous mathematical reasoning and algorithmic craftsmanship
    can interrogate problems of a scale and subtlety that would have been inconceivable
    only a generation ago. *Python for Mathematical Thinking* has been conceived to
    cultivate precisely this dual fluency. Its guiding conviction is that proofs and
    programs are not competing modes of explanation but complementary lenses through
    which the same structure may be rendered transparent.


    Python''s ascendancy in the scientific world is no accident. Its minimalist syntax,
    large standard library, and a constellation of domain-specific packages—such as
    **NumPy**, **SymPy**, and **SciPy**—make it a laboratory in which abstract ideas
    can be prototyped with the same ease that numerical experiments are conducted.
    Yet fluency in a language is hollow without a rigorous grammar. Accordingly, each
    concept in this volume is introduced as a mathematically precise statement, motivated
    by exemplars from classical analysis, algebra, geometry, probability, or the theory
    of computation, and only then translated into idiomatic Python.


    The narrative unfolds in steadily deepening strata. You will first revisit foundational
    structures—integers, rational fields, Euclidean spaces—before ascending to vector
    calculus, spectral theory, and measure-theoretic probability. From there the text
    journeys through numerical linear algebra, dynamical systems, and stochastic simulation,
    culminating in chapters that interface with contemporary research topics such
    as compressed sensing and quantum information. Throughout, special attention is
    paid to the computational complexity that shadows every mathematical algorithm;
    big-O analyses accompany theorems, and efficient data structures are derived,
    not merely quoted.


    While this work presumes familiarity with undergraduate calculus and basic programming,
    it aspires to be a companion from novice to researcher. For the student, it provides
    a bridge between chalkboard proofs and executable experiments. For the seasoned
    mathematician, it offers an extensible platform for computational exploration.
    And for the practitioner, it supplies principled algorithms whose correctness
    is certified by theorem, not folklore.


    Ultimately, the craft of mathematics is less about arriving at an answer than
    about inhabiting a mode of thought that relentlessly interrogates *why* a statement
    should hold. By weaving together deductive rigor and executable insight, we invite
    you to cultivate that habit of mind. May the pages that follow sharpen your analytical
    instincts, broaden your computational arsenal, and reveal anew the harmony that
    binds symbol to silicon.


    ## **Welcome to *Python for Mathematical Thinking*.**


    Roorkee, India

    July 5, 2025


    Pradeep Singh

    Balasubramanian Raman


    **Acknowledgements** The preparation of *Python for Mathematical Thinking* has
    been sustained by a constellation of institutions, colleagues, and communities
    to whom we owe an incalculable debt of gratitude. Foremost, we thank our home
    institution, the **Indian Institute of Technology Roorkee**, for nurturing an
    environment where rigorous mathematics and cutting-edge computation flourish side
    by side. The infrastructural and intellectual resources furnished by the Department
    of Computer Science and Engineering have been indispensable in transforming tentative
    ideas into executable code and, ultimately, into the pages you now hold.


    Our work has been buoyed by generous support from the **Anusandhan National Research
    Foundation (ANRF)** and the **Department of Science and Technology (DST)**, Government
    of India, as well as by fellowships and grants from the **National Board of Higher
    Mathematics (NBHM)**, Department of Atomic Energy. Their sustained commitment
    to fundamental research provided the freedom to explore the fertile intersection
    of mathematics and computation that lies at the heart of this book.


    We are profoundly grateful to our colleagues—faculty, research scholars, and interns
    alike—whose questions, critiques, and encouragement sharpened every chapter. The
    daily intellectual ferment within our laboratories turned solitary writing into
    dialogue, and dialogue into discovery. Special thanks are due to the interns of
    the MV and MI Labs, whose curiosity continually reminded us to keep explanations
    both rigorous and accessible.


    A book devoted to the computational realization of mathematics is inconceivable
    without the open-source ecosystem that embodies the very ethos of collaborative
    inquiry. We salute the global **Python** community and the maintainers of NumPy,
    SciPy, SymPy, Matplotlib, Jupyter, and countless ancillary packages; their volunteer
    labour made it possible to test, benchmark, and visualize every example herein.
    Likewise, we acknowledge the indispensable role of **GitHub** for version control
    and collaboration, **Stack Exchange** for its crowdsourced wisdom, and **Google
    Search** for accelerating fact-checking and literature review.


    The first author (P.S.) records a personal debt to **Prof. Anima Nagar** (IIT
    Delhi) for revealing the elegance latent in abstract structures, and to **Prof.
    R. Balasubramanian** (IIT Roorkee) for a steadfast confidence that transformed
    aspiration into achievement. Their mentorship instilled both the patience to prove
    and the audacity to program.


    Finally, to our families and friends: your unwavering patience and faith were
    the quiet constants behind every page. Your support turned late-night debugging
    sessions and early-morning proof revisions into a shared undertaking. This volume
    is as much a testament to your belief as to our labour.


    **Competing Interests** The authors declare that they have no competing interests
    relevant to the content of this manuscript.'
