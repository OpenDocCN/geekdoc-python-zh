    **Example 3.3.20 (Electric Flux Through a Plane)** Let $\vec{F}(x, y, z) = (x,
    y, z)$, and surface $S$ be the unit square in the $xy$-plane, i.e., $z = 0$, $0
    \le x, y \le 1$.

    Then:

    $$\vec{n} = (0, 0, 1), \quad \vec{F} \cdot \vec{n} = z = 0 \Rightarrow \text{flux}
    = 0.$$

    Now shift the surface to $z = 3$:

    $$\vec{F} \cdot \vec{n} = 3 \Rightarrow \iint_S 3 \, dx \, dy = 3.$$


    ```

    x, y = sp.symbols("x y")

    flux = sp.integrate(sp.integrate(3, (x, 0, 1)), (y, 0, 1))

    sp.pprint(flux)

    ```


    **Example 3.3.21 (Flux of Rotating Field Through Cylinder)** Let $\vec{F} = (-y,
    x, 0)$ and surface be the side of cylinder $x^2 + y^2 = 1$, $0 \le z \le 1$.

    Parameterise:

    $$\vec{r}(\theta, z) = (\cos \theta, \sin \theta, z), \quad \vec{n} = (\cos \theta,
    \sin \theta, 0), \quad dS = dz \, d\theta.$$

    Then:

    $$\vec{F} \cdot \vec{n} = -\sin \theta \cos \theta + \cos \theta \sin \theta =
    0.$$

    Flux is zero due to orthogonality of field and surface normals.


    ```

    theta, z = sp.symbols("theta z")

    Fx, Fy = -sp.sin(theta), sp.cos(theta)

    n_dot_F = Fx*sp.cos(theta) + Fy*sp.sin(theta)

    flux = sp.integrate(sp.integrate(n_dot_F, (z, 0, 1)), (theta, 0, 2*sp.pi))

    sp.pprint(flux)

    ```


    # 3.4 Advanced Topics in Calculus


    Many phenomena in physics, biology, and economics are governed not by algebraic
    relations but by differential laws: relationships between functions and their
    derivatives. Differential equations express how a quantity evolves with respect
    to change in another (usually time or space). We explore analytic and numerical
    methods for ordinary differential equations (ODEs) using SymPy and SciPy.'
