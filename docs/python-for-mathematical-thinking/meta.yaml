    \ statistical efficiency.\n\n## CNNs for Image Recognition\n\n### Discrete Convolution\n\
    \nFor image $X \\in \\mathbb{R}^{C_{\\text{in}} \\times H \\times W}$ and kernel\
    \ $K \\in \\mathbb{R}^{C_{\\text{out}} \\times C_{\\text{in}} \\times k \\times\
    \ k}$, the $(c', h, w)$ output entry is\n\n$$Y_{c'hw} = \\sum_{c=1}^{C_{\\text{in}}}\
    \ \\sum_{i=0}^{k-1} \\sum_{j=0}^{k-1} K_{c'cij} X_{c, h+i, w+j}.$$\n\nPadding\
    \ $p$ and stride $s$ adjust spatial resolution: $H_{\\text{out}} = \\lfloor \\\
    frac{H-k+2p}{s} \\rfloor + 1$.\n**Weight sharing** reduces parameters from $O(C_{\\\
    text{out}}C_{\\text{in}}HW)$ to $O(C_{\\text{out}}C_{\\text{in}}k^2)$, imposing\
    \ translation equivariance $X \\mapsto \\tau_{\\Delta} X \\implies Y \\mapsto\
    \ \\tau_{\\Delta} Y$.\n\n### Backpropagation\n\nDenote input gradient $\\partial\
    \ \\mathcal{L} / \\partial X$ by $\\delta X$. Correlation identity yields\n\n\
    $$\\delta K_{c'c} = \\sum_{h,w} \\delta Y_{c'hw} (X_c)_{h:h+k, w:w+k}, \\quad\
    \ \\delta X = \\text{pad}_{k-1}(\\delta Y) * \\text{flip}(K),$$\n\nwhere $*$ denotes\
    \ convolution and $\\text{flip}(K)$ mirrors kernel.\n\n### Pooling\n\nMax-pool\
    \ implements $Y_{hw} = \\max_{i,j \\in [0,k)} X_{h+i, w+j}$, extracting translation\
    \ invariants. Average-pool preserves energy for globally average pooling (GAP)\
    \ prior to dense classifier.\n\n### Architecture Example (VGG-Like)\n\n$[\\text{conv}_{3\\\
    times3}\\text{-ReLU}]^2 \\rightarrow \\text{maxpool}_2 \\rightarrow [\\text{conv}^2]\
    \ \\rightarrow \\text{maxpool} \\rightarrow \\text{GAP} \\rightarrow \\text{FC}_{10}$.\n\
    \nOn CIFAR-10, 3.1 M parameters reach > 93% test accuracy after 200 epochs with\
    \ SGD($\\eta = 0.1$, momentum = 0.9), cosine learning-rate decay, weight decay\
    \ $5 \\cdot 10^{-4}$, and random crop + horizontal flip augmentation.\n\n### Batch\
    \ Norm in conv Layers\n\nNormalise across mini-batch and spatial dims: $\\mu_c\
    \ = \\frac{1}{mHW} \\sum_i X_{cij}$, $\\sigma_c^2 = \\frac{1}{mHW} \\sum_i (X_{cij}\
    \ - \\mu_c)^2$. Learnable ($\\gamma_c, \\beta_c$) restore representation capacity.\n\
    \n## RNNs for Sequential Data Analysis\n\nGiven sequence $\\{\\mathbf{x}_t\\}_{t=1}^T$,\
    \ standard RNN cell computes\n\n$\\mathbf{h}_t = \\phi(W_h \\mathbf{h}_{t-1} +\
    \ W_x \\mathbf{x}_t + \\mathbf{b})$\n\nwith $\\phi = \\tanh$. Output $\\mathbf{y}_t\
    \ = W_y \\mathbf{h}_t$.\n\n### Backpropagation Through Time (BPTT)\n\nUnroll network,\
    \ accumulate gradients\n\n$\\delta \\mathbf{h}_t = (W_h^\\top \\delta \\mathbf{h}_{t+1}\
    \ + \\delta \\mathbf{y}_t) \\odot \\phi'(\\mathbf{h}_t)$\n\nrisking vanishing/exploding\
    \ norms $\\propto \\|W_h\\|^T$. Gradient clipping $\\delta \\leftarrow \\delta\
    \ \\cdot \\min\\{1, \\tau / \\|\\delta\\|\\}$ with $\\tau = 5$ mitigates explosions.\n\
    \n### Advanced Architectures: LSTM, GRU, and Transformers\n\n#### Long Short-Term\
    \ Memory (LSTM)\n\nState equations\n\n$\\mathbf{i} = \\sigma(W_{ix} \\mathbf{x}_t\
    \ + W_{ih} \\mathbf{h}_{t-1} + b_i)$,\n$\\mathbf{f} = \\sigma(W_{fx} \\mathbf{x}_t\
    \ + W_{fh} \\mathbf{h}_{t-1} + b_f)$,\n$\\mathbf{o} = \\sigma(W_{ox} \\mathbf{x}_t\
    \ + W_{oh} \\mathbf{h}_{t-1} + b_o)$,\n$\\tilde{\\mathbf{c}} = \\tanh(W_{cx} \\\
    mathbf{x}_t + W_{ch} \\mathbf{h}_{t-1} + b_c)$,\n$\\mathbf{c}_t = \\mathbf{f}\
    \ \\odot \\mathbf{c}_{t-1} + \\mathbf{i} \\odot \\tilde{\\mathbf{c}}$,\n$\\mathbf{h}_t\
    \ = \\mathbf{o} \\odot \\tanh(\\mathbf{c}_t)$\n\nwhere gates $\\mathbf{i}, \\\
    mathbf{f}, \\mathbf{o} \\in [0, 1]^d$ modulate memory $\\mathbf{c}_t$. Constant\
    \ error flow through $\\mathbf{c}_t$ alleviates vanishing gradients.\n\n#### Gated\
    \ Recurrent Unit (GRU)\n\nCombines input and forget gates:\n\n$\\mathbf{z} = \\\
    sigma(W_z \\mathbf{x} + U_z \\mathbf{h}_{t-1}), \\quad \\mathbf{r} = \\sigma(W_r\
    \ \\mathbf{x} + U_r \\mathbf{h}_{t-1}), \\quad \\tilde{\\mathbf{h}} = \\tanh(W\
    \ \\mathbf{x} + U(\\mathbf{r} \\odot \\mathbf{h}_{t-1})),$\n$\\mathbf{h}_t = (1\
    \ - \\mathbf{z}) \\odot \\mathbf{h}_{t-1} + \\mathbf{z} \\odot \\tilde{\\mathbf{h}}.$\n\
    \nFewer parameters, comparable accuracy on language tasks.\n\n#### Transformer\
    \ (Vaswani et al. 2017)\n\nDispenses with recurrence, using multi-head self-attention\n\
    \n$\\text{Att}(Q, K, V) = \\text{softmax}\\left(\\frac{QK^\\top}{\\sqrt{d_k}}\\\
    right)V,$\n\nwith queries/keys/values linearly projected from inputs. Positional\
    \ encodings $\\mathbf{p}_t^{(2i)} = \\sin(t/10000^{2i/d_{\\text{model}}})$ inject\
    \ sequence order. Feed-forward block and residual layer-norm yield ODE-like stable\
    \ depth. Complexity $O(T^2d)$ vs. $O(Td^2)$ for RNN BPTT; parallelisation dominates\
    \ modern GPU pipelines.\n\n$\\text{Layer}(X) = X + \\text{Sublayer}(\\text{LayerNorm}(X)).$\n\
    \n## Transfer Learning and Fine-Tuning Pretrained Models\n\nLarge models pretrained\
    \ on expansive corpora encode universal priors, drastically reducing downstream\
    \ sample complexity.\n\n### Feature Extractor\n\nFreeze convolutional base (e.g.\
    \ ResNet-50 trained on ImageNet); append task-specific dense head; train only\
    \ last layers. Effective for few-shot datasets ( $\\leq 1000$ labelled images).\n\
    \n### Full Fine-Tuning\n\nUnfreeze last $k$ layers; apply discriminative learning\
    \ rates $\\eta_\\ell = \\eta_0 \\alpha^{L-\\ell}$ (Howard, Ruder, 2018) with $\\\
    alpha \\in [0.7, 0.9]$. For BERT, AdamW with warm-up $\\sim 10$.\n\n### Domain\
    \ Adaptation\n\nMinimise combined objective $\\mathcal{L} = \\mathcal{L}_{\\text{task}}\
    \ + \\lambda \\mathcal{L}_{\\text{domain}}$, where $\\mathcal{L}_{\\text{domain}}$\
    \ is Jensen–Shannon distance between source and target feature alignments; adversarial\
    \ gradient reversal layers implement minimax.\n\n### Few-Shot Prompt Tuning (LLMs)\n\
    \nKeep transformer frozen; learn soft prompts $\\mathbf{p} \\in \\mathbb{R}^{m\
    \ \\times d}$ prefixed to token embeddings—only $md$ parameters vs. $\\sim 10^9$\
    \ in full model. Empirically matches full fine-tune on GLUE while training $<\
    \ 1\\%$ weights.\n\n## 10.4 Advanced Topics in Machine Learning\n\n### 10.4.1\
    \ Model Interpretability and Explainability\n\nComplex learners—deep networks,\
    \ gradient-boosted trees, kernel ensembles—often outperform transparent models\
    \ yet resemble *black boxes*. Interpretability seeks human-intelligible rationales:\
    \ which features drive predictions, how sensitive are outputs to perturbations,\
    \ and whether spurious correlations lurk. We formalise these questions with axiomatic\
    \ attributions, local surrogate expansions, and global importance measures, illustrating\
    \ each with concise Python code.\n\n#### SHAP Values, LIME, and Feature Importance\n\
    \n**SHAP (SHapley Additive exPlanations)**\n\nLet $f : \\mathbb{R}^p \\to \\mathbb{R}$\
    \ be a trained predictor, $\\mathbf{x} \\in \\mathbb{R}^p$ an instance, and $N\
    \ = \\{1, \\dots, p\\}$ the feature set. A **Shapley value** $\\phi_j(f, \\mathbf{x})$\
    \ attributes contribution of feature $j$ via cooperative game theory:\n\n$$\\\
    phi_j(f, \\mathbf{x}) = \\sum_{S \\subseteq N \\setminus \\{j\\}} \\frac{|S|!\
    \ (p - |S| - 1)!}{p!} \\left[ f_{S \\cup \\{j\\}}(\\mathbf{x}) - f_S(\\mathbf{x})\
    \ \\right],$$\n\nwhere $f_S$ denotes the conditional expectation $f_S(\\mathbf{x})\
    \ = \\mathbb{E}[f(\\mathbf{x}_S, \\mathbf{X}_{\\bar{S}}) \\mid \\mathbf{x}_S]$.\
    \ The weighting ensures efficiency $\\sum_j \\phi_j = f(\\mathbf{x}) - f_{\\emptyset}$,\
    \ symmetry, dummy, and additivity properties.\n\nExact computation is $O(2^p)$;\
    \ tree models admit $O(npD)$ dynamic-programming (where $D$ depth, $n$ trees).\
    \ Kernel SHAP approximates integral via Lasso regression on $2p + 1$ perturbed\
    \ samples.\n\n```python\nimport shap, xgboost, pandas as pd\nX, y = df.drop('label',\
    \ axis=1), df['label']\nmodel = xgboost.XGBClassifier().fit(X, y)\nexplainer =\
    \ shap.TreeExplainer(model)\nphi = explainer.shap_values(X.iloc[0])\nshap.waterfall_plot(shap.Explanation(values=phi,\n\
    \    base_values=explainer.expected_value,\n    data=X.iloc[0]))\n```\n\n**LIME\
    \ (Local Interpretable Model-agnostic Explanations)**\n\nFor instance $\\mathbf{x}_0$\
    \ construct perturbed neighbourhood $\\{\\mathbf{z}_i\\}$ via random masking or\
    \ noise; weight samples by $\\pi_0(\\mathbf{z}_i) = \\exp(-\\|\\mathbf{z}_i -\
    \ \\mathbf{x}_0\\|_2^2 / \\sigma^2)$. Fit sparse linear surrogate $g_{\\mathbf{w}}(\\\
    mathbf{z}) = \\mathbf{w}^\\top \\mathbf{z}$ minimising\n\n$$\\mathcal{L}(f, g)\
    \ = \\sum_i \\pi_0(\\mathbf{z}_i) (f(\\mathbf{z}_i) - g(\\mathbf{z}_i))^2 \\quad\
    \ \\text{subject to } \\|\\mathbf{w}\\|_0 \\le K.$$\n\nWeights $\\mathbf{w}$ reveal\
    \ local feature influence; stability depends on $\\sigma$, sampling scheme, regularisation\
    \ $K$.\n\n```python\nimport lime.lime_tabular\nlime_exp = lime.lime_tabular.LimeTabularExplainer(X_train.values,\n\
    \    feature_names=X.columns, mode='classification')\nexplanation = lime_exp.explain_instance(X.iloc[0],\
    \ model.predict_proba,\n    num_features=6)\nexplanation.as_pyplot_figure()\n\
    ```\n\n**Permuted and Intrinsic Feature Importance**\n\n*Permutation importance*\
    \ gauges drop in accuracy when column $j$ is permuted:\n\n$$\\text{PI}_j = \\\
    frac{1}{B} \\sum_{b=1}^B \\left[ \\text{Perf}(f; \\mathcal{D}) - \\text{Perf}(f;\
    \ \\mathcal{D}^{\\pi_j^{(b)}}) \\right],$$\n\nwhere $\\mathcal{D}^{\\pi_j^{(b)}}$\
    \ shuffles feature $j$ alone and keeps target fixed; variance $\\text{Var}(\\\
    text{PI}_j)/B$ estimates uncertainty."
