    ## 10.2.3 强化学习


    强化学习（RL）将序贯决策形式化为不确定性下的*反馈控制*问题。智能体反复观察环境，选择一个动作，获得一个数值奖励，并转移到一个新状态；其目标是最大化长期回报。与监督学习不同，数据分布是*策略依赖*的，需要在探索与利用之间进行权衡，并且延迟的后果使得决策在时间上相互耦合。


    ### 马尔可夫决策过程（MDP）


    一个**MDP**是五元组 $\mathcal{M} = (\mathcal{S}, \mathcal{A}, P, R, \gamma)$，其中


    - $\mathcal{S}$ 是有限（或可数）状态空间

    - $\mathcal{A}$ 是有限动作集

    - $P(s''|s, a) = \Pr(S_{t+1} = s'' \mid S_t = s, A_t = a)$ 是转移核

    - $R(s, a) = \mathbb{E}[r_t \mid S_t = s, A_t = a]$ 是期望单步奖励

    - $\gamma \in [0, 1)$ 是折扣因子


    对于策略 $\pi : \mathcal{S} \to \Delta(\mathcal{A})$，定义*值函数*


    $$V^{\pi}(s) = \mathbb{E}_{\pi}\left[\sum_{t=0}^{\infty} \gamma^t r_t \mid S_0
    = s\right],$$


    以及动作值（Q值）$Q^{\pi}(s, a) = R(s, a) + \gamma \sum_{s''} P(s''|s, a) V^{\pi}(s'')$。贝尔曼期望方程：


    $$V^{\pi} = T^{\pi} V^{\pi}, \quad T^{\pi} f(s) = \sum_{a} \pi(a|s)\left[R(s,
    a) + \gamma \sum_{s''} P_{sas''} f(s'')\right].$$


    最优值满足贝尔曼*最优算子*


    $$V^*(s) = \max_{a} \left[R(s, a) + \gamma \sum_{s''} P_{sas''} V^*(s'')\right],$$


    其贪婪最优策略为 $\pi^*(s) = \arg\max_a Q^*(s, a)$。


    ### 动态规划


    值迭代：$V_{k+1} = T^* V_k$，在 $\ell_\infty$ 范数下以模量 $\gamma$ 收缩，因此 $V_k$ 以几何速率收敛到 $V^*$。


    ### Q学习与深度Q网络（DQN）


    表格型Q学习（Watkins and Dayan 1992）


    在线更新


    $Q_{t+1}(s_t, a_t) \leftarrow Q_t(s_t, a_t) + \alpha_t \left[ r_t + \gamma \max_{a''}
    Q_t(s_{t+1}, a'') - Q_t(s_t, a_t) \right]$


    如果 $\sum \alpha_t = \infty$，$\sum \alpha_t^2 < \infty$ 且所有状态-动作对都被无限次访问（GLIE），则以概率1收敛到
    $Q^*$。通过 $\epsilon$-贪婪进行探索：以概率 $\epsilon$ 选择随机动作，否则选择贪婪动作。


    函数逼近：深度Q网络（Mnih et al. 2015）


    用神经网络参数化 $Q_\theta(s, a)$；最小化*时序差分损失*


    $\mathcal{L}(\theta) = \mathbb{E}_{(s,a,r,s'') \sim \mathcal{D}} \left[ \left(
    r + \gamma \max_{a''} Q_{\theta^-}(s'', a'') - Q_\theta(s, a) \right)^2 \right]$


    其中目标网络参数 $\theta^-$ 定期更新。大小为 $N$ 的经验回放缓冲区 $\mathcal{D}$ 打破了数据相关性，使得随机梯度下降成为可能。双重DQN通过使用在线网络进行argmax，使用目标网络进行评估，从而缓解了过估计问题。


    ### 策略梯度方法与演员-评论家算法


    随机策略 $\pi_\theta(a|s)$


    目标 $J(\theta) = \mathbb{E}_{\pi_\theta}[G_0]$，其中 $G_0 = \sum_t \gamma^t r_t$。**策略梯度定理**


    $\nabla_\theta J(\theta) = \mathbb{E}_{\pi_\theta} \left[ \nabla_\theta \log \pi_\theta(A_t|S_t)
    Q^{\pi_\theta}(S_t, A_t) \right]$


    REINFORCE使用蒙特卡洛回报 $G_t$；通过基线 $b(s)$ 减小方差：


    $\nabla J = \mathbb{E} \left[ \nabla \log \pi(A|S)(G_t - b(S_t)) \right]$


    演员-评论家


    *演员*更新策略参数；*评论家*估计值函数。TD($\lambda$) 评论家更新参数 $w$：$\delta_t = r_t + \gamma V_w(S_{t+1})
    - V_w(S_t)$，$w \leftarrow w + \beta \delta_t \nabla_w V_w(S_t)$。演员更新：$\theta \leftarrow
    \theta + \alpha \delta_t \nabla_\theta \log \pi_\theta(A_t|S_t)$。


    ### 优势演员-评论家（A2C）


    用优势 $A_t = Q_w(S_t, A_t) - V_w(S_t)$ 替换 $\delta_t$。广义优势估计（GAE）融合多步回报：$\hat{A}_t^\lambda
    = \sum_{k=0}^\infty (\gamma\lambda)^k \delta_{t+k}$。


    ### 软演员-评论家（SAC）


    最大化熵正则化目标


    $J(\pi) = \sum_t \mathbb{E}_{\pi}[r(S_t, A_t) + \alpha \mathcal{H}(\pi(\cdot|S_t))]$


    这导致了使用目标Q网络和自动温度调节的异策略更新。


    ### 强化学习在游戏AI与机器人学中的应用


    #### 游戏AI


    - **Atari 2600。** 深度Q网络在57款游戏中达到人类水平分数，输入原始像素堆叠 $84 \times 84 \times 4$。

    - **AlphaZero。** 结合蒙特卡洛树搜索与策略-价值网络；自我对弈强化学习最小化交叉熵 + 价值损失。

    - **OpenAI Five。** 使用PPO（截断代理）和LSTM策略处理部分可观测性；通过*奖励塑形*进行多智能体信用分配。


    #### 机器人学


    - **仿真到现实迁移。** 域随机化在仿真中使用随机纹理和物理训练SAC/DDPG；部署到真实机械臂时只需最少微调。

    - **基于模型的RL。** 学习概率动力学 $p_\phi(\mathbf{s}_{t+1}|\mathbf{s}_t, \mathbf{a}_t)$；通过模型预测控制（MPC）结合轨迹采样进行规划；PETS和Dreamer达到了分钟级的样本效率。

    - **残差RL。** 将经典控制器 $u_{\text{PID}}$ 与学习到的残差 $\Delta u_\theta$ 结合，在保持稳定裕度的同时提高了敏捷性。


    ## 10.3 深度学习


    *深度神经网络*组合了有限个非线性仿射映射序列，$f_{\Theta} = f^{(L)} \circ \cdots \circ f^{(1)}$，$f^{(\ell)}(\mathbf{z})
    = \phi(W_{\ell}\mathbf{z} + \mathbf{b}_{\ell})$，以逼近 $\mathbb{R}^p$ 上的未知目标函数。万能逼近定理保证足够大的网络可以以任意精度逼近紧集上的任何连续函数；实际的艺术在于选择架构
    $\Theta = \{W_{\ell}, \mathbf{b}_{\ell}\}_{\ell=1}^L$ 和算法，使其在计算预算内收敛，同时能够泛化到训练样本之外。


    ### 10.3.1 神经网络的数学基础


    #### 感知机、激活函数与反向传播


    单层感知机计算


    $\hat{y} = \phi(\mathbf{w}^\top \mathbf{x} + b), \quad \phi : \mathbb{R} \to \mathbb{R}.$


    对于线性可分的二元数据 $\{(\mathbf{x}_i, y_i)\}$，Rosenblatt的更新规则 $\mathbf{w} \leftarrow \mathbf{w}
    + \eta(y_i - \hat{y}_i)\mathbf{x}_i$ 在有限步内收敛；然而，非凸目标促使了多层感知机（MLP）的出现。


    **激活函数设计** 常见的 $\phi$：


    $\text{sigmoid}(z) = \frac{1}{1 + e^{-z}}, \quad \tanh z = \frac{e^z - e^{-z}}{e^z
    + e^{-z}}, \quad \text{ReLU}(z) = \max(0, z).$


