    # Correlation and Covariance


    Pearson correlation $\rho_{XY} = \text{Cov}(X, Y)/(\sigma_X \sigma_Y)$ measures
    linear association. Spearman''s $\rho_s$ and Kendall''s $\tau$ capture monotone
    dependence.


    **Example 5.2.12 (Empirical vs. Theoretical Correlation)** Let $X \sim \mathcal{N}(0,
    1)$, $Y = 0.8X + 0.6Z$ with $Z \perp X$, $Z \sim \mathcal{N}(0, 1)$. Then $\rho_{XY}
    = 0.8$.


    ```

    n=2000

    X = np.random.randn(n)

    Y = 0.8*X + 0.6*np.random.randn(n)

