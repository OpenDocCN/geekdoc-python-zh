  md: "The residual is about $7.4 \\times 10^{-40}$, corroborating the near-integer\
    \ phenomenon discussed in Berndt (1989).\n\n**Example 1.1.2 (Solving a Linear\
    \ System $Ax = b$)** Let\n\n$$A = \\begin{pmatrix} 2 & -1 & 0 \\ -1 & 2 & -1 \\\
    \ 0 & -1 & 2 \\end{pmatrix}, \\quad b = \\begin{pmatrix} 1 \\ 0 \\ 1 \\end{pmatrix}.$$\n\
    \nUsing numpy.linalg one writes\n\n```\npython\nimport numpy as np\nA = np.array([[2,\
    \ -1, 0], [-1, 2, -1], [0, -1, 2]], dtype=float)\nb = np.array([1, 0, 1], dtype=float)\n\
    x = np.linalg.solve(A, b)\n```\n\nwhich yields the exact rational solution $(x_1,\
    \ x_2, x_3) = (1, \\frac{3}{2}, 1)$ up to floating-point error.\n\n# Common Pitfalls\n\
    \nPython's accessibility conceals subtleties that can entrap the unwary mathematician.\n\
    \n+   1. **Binary Floating-Point Rounding.** The identity $0.1 + 0.2 = 0.3$ is\
    \ false in IEEE-754 binary.¹ Exact arithmetic requires decimal or fractions.\n\
    2. **Mutable Default Parameters.** A function definition like\n   python\n   def\
    \ append_item(x, L=[]): L.append(x); return L\n   \n   accumulates state across\
    \ calls, violating mathematical purity. Use None sentinels instead.\n3. **Algorithmic\
    \ Performance.** A naive Python loop implementing $O(n^2)$ matrix multiplication\
    \ is thousands of times slower than numpy.dot; asymptotic reasoning must be coupled\
