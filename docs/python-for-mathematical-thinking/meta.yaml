    \ model.\n\nCustom Losses\n\n$$L_{\\text{Huber}} = \\begin{cases} \\frac{1}{2}r^2,\
    \ & |r| \\le \\delta, \\ \\delta(|r| - \\frac{1}{2}\\delta), & |r| > \\delta,\
    \ \\end{cases} \\quad r = y - \\hat{y}.$$\n\nCombines MSE sensitivity near origin\
    \ with $L^1$ robustness to outliers.\nIn imbalanced classification, focal loss\
