    ```\n\n# 5.4 Stochastic Processes and Applications\n\nA **stochastic process**\
    \ is a collection $\\{X_t\\}_{t \\in T}$ of random variables defined on a common\
    \ probability space and indexed by (usually) time. When the future evolution depends\
    \ only on the present state—not on the full history—the process enjoys the *Markov\
    \ property*. Markov chains, Brownian motion, Poisson processes, and branching\
    \ processes are canonical examples. This section focuses on *discrete-time, discrete-state*\
    \ Markov chains, emphasising transition-matrix algebra, convergence theorems,\
    \ and hands-on Python simulations.\n\n# 5.4.1 Markov Chains\n\nLet $\\mathcal{S}\
    \ = \\{s_1, \\dots, s_m\\}$ be a finite state space. A process $\\{X_n\\}_{n \\\
    ge 0}$ is a (time-homogeneous) **Markov chain** if\n\n$\\mathbb{P}(X_{n+1} = s_j\
    \ \\mid X_n = s_i, X_{n-1} = s_k, \\dots) = \\mathbb{P}(X_{n+1} = s_j \\mid X_n\
    \ = s_i) = P_{ij}, \\quad \\forall i, j.$\n\nThe matrix $P = (P_{ij})_{i,j=1}^m$\
    \ is the **transition matrix**: each row sums to 1."
  - "[PAGE 194]\n\n# Transition Matrices and Long-Term Behaviour\n\n**Chapman–Kolmogorov**\
    \ For $n \\geq 0, k \\geq 1$,\n\n$$P^{(n+k)} = P^{(n)} P^{(k)}, \\quad P^{(n)}\
    \ = P^n,$$\n\nwhere $P^n$ is the $n$-step transition matrix.\n\n**Classification\
    \ of States** A state $i$ is\n\n+   - *Recurrent* if the chain returns to $i$\
    \ with probability 1\n- *Transient* otherwise\n- *Periodic* with period $d$ if\
    \ returns occur only at multiples of $d$\n- *Absorbing* if $P_{ii} = 1$\n\n**Stationary\
    \ Distribution** Vector $\\boldsymbol{\\pi}$ with $\\boldsymbol{\\pi} P = \\boldsymbol{\\\
    pi}$ and $\\sum_i \\pi_i = 1$. If $P$ is *irreducible* and *aperiodic*, then\n\
    \n$$\\lim_{n \\to \\infty} P^n = \\mathbf{1} \\boldsymbol{\\pi},$$\n\nso $\\mathbb{P}(X_n\
    \ = s_j) \\to \\pi_j$ regardless of initial state.\n\n**Example 5.4.1 (Weather\
    \ Model: Sunny (S), Cloudy (C), Rainy (R))**\n\n$$P = \\begin{pmatrix} 0.7 & 0.2\
    \ & 0.1 \\ 0.3 & 0.4 & 0.3 \\ 0.2 & 0.3 & 0.5 \\end{pmatrix}.$$\n\npython\nimport\
    \ numpy as np\nP = np.array([[0.7, 0.2, 0.1],\n              [0.3, 0.4, 0.3],\n\
    \              [0.2, 0.3, 0.5]])\n# stationary distribution via eigenvector\n\
    eigvals, eigvecs = np.linalg.eig(P.T)\npi = eigvecs[:, np.isclose(eigvals, 1)]\n\
    pi = pi/pi.sum()\nprint(pi.real.ravel()) # [0.476, 0.286, 0.238]\n\n\nAfter long\
    \ time the probability of a sunny day stabilises near 47.6%. Compute 10-day forecast\
    \ from initial state $S$:\n\npython\np0 = np.array([1, 0, 0])\nprint(p0 @ np.linalg.matrix_power(P,\
    \ 10))\n\n**Fundamental Matrix for Absorbing Chains** If states $1, \\ldots, r$\
    \ are transient, $r+1, \\ldots, m$ absorbing, write $P = \\begin{pmatrix} Q &\
    \ R \\ 0 & I \\end{pmatrix}$ with $Q \\in \\mathbb{R}^{r \\times r}$. The **fundamental\
    \ matrix** $N = (I - Q)^{-1}$ satisfies $N_{ij} =$ expected visits to transient\
    \ $j$ starting from $i$; expected absorption time $\\mathbf{t} = N \\mathbf{1}$."
