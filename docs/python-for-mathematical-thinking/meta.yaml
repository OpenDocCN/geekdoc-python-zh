  - '[PAGE 51]


    # 1.9.1 Regular Expressions and String Matching


    # Basic Pattern Syntax


    Let Σ be a finite alphabet. A *regular expression* is an inductively defined term
    that denotes a regular language L ⊆ Σ*; operations include union (+), concatenation
    (juxtaposition), and Kleene star (*). Python''s `re` module implements this formalism
    with additional syntactic sugar:


    | Regex | Mathematical meaning |

    |---|---|

    | a|b | L = {a} ∪ {b} (union) |

    | ab | L = {ab} (concatenation) |

    | a* | L = {a^k | k ≥ 0} (Kleene closure) |

    | [0-9] | L = {0, ..., 9} (character class) |

    | . | L = Σ (wildcard) |


    # Example 1.9.1 (Detecting Palindromic Binary Strings of Length Four)


    The language L = {0000, 0110, 1001, 1111} admits the regex


    ```

    import re

    pattern = re.compile(r"(0|1)(0|1)\2\1")

    bool(pattern.fullmatch("1001")) # → True

    ```


    Groups `(0|1)` capture bits b₁, b₂; backreferences \2 and \1 enforce the reverse
    order, mirroring the automaton that recognises w = wᴿ.


    # Advanced Regex Features


    Python extends classical regular expressions with constructs that exceed pure
    regular power (backreferences yield context-sensitive languages) yet remain tractable
    for practical pattern matching:


    +   1. **Non-capturing groups** `(?: ... )` group subpatterns without storing
    them, reducing memory overhead.

    2. **Lookahead/lookbehind** assertions `(?:=...)`, `(?:<=...)` implement zero-width
    predicates, akin to logical guards in a DFA without tape movement.

    3. **Named groups** `(?P<name>pattern)` enhance readability and enable dictionary-style
    access to submatches.


    Advanced features should be employed judiciously: lookbehinds complicate the underlying
    automaton, and catastrophic backtracking may inflate complexity to O(2ⁿ) in pathological
    cases (Friedl 2006). Profiling with `re.compile(..., re.DEBUG)` reveals the state
    machine, guiding optimisations.'
  - '[PAGE 52]


    # 1.9.2 Working with Dates and Times


    # datetime Module


    Calendrical computations form a semi-group under addition of timedeltas. Python
    models this with immutable classes:


    | Class | Domain | Example |

    |---|---|---|

    | date | Z-triple (Y, M, D) | 2025-07-03 |

    | time | [0, 24 h) | 16:00:00 |

    | datetime | Cartesian product | 2025-07-03 16:00 |

    | timedelta | Z days × seconds | 10⁶ s |


    Arithmetic is component-wise but observes leap rules codified in the proleptic
    Gregorian calendar:


    ```

    from datetime import datetime, timedelta

    launch = datetime(2025, 7, 3, 16) # UTC+05:30 implicit if naive

    horizon = launch + timedelta(days=30)

    ```


    # Time-Zone Handling


    Prior to Python 3.9, robust zone support required pytz. The modern solution is
    zoneinfo, which loads the IANA database (Olson corpus) and attaches a fixed-offset
    or dynamic rule set to a datetime:


    ```

    from datetime import datetime

    from zoneinfo import ZoneInfo


    fmt = "%Y-%m-%d %H:%M %Z%z"

    utc = datetime(2025, 7, 3, 10, tzinfo=ZoneInfo("UTC"))

    local = utc.astimezone(ZoneInfo("Asia/Kolkata"))

    print(utc.strftime(fmt)) # 2025-07-03 10:00 UTC+0000

    print(local.strftime(fmt)) # 2025-07-03 15:30 IST+0530

    ```


    Naïve datetimes (with tzinfo=None) are ambiguous under daylight-saving transitions;
    always prefer aware objects when arithmetic crosses zone boundaries. Duration
    algebra follows


    $d_{\text{UTC}} = d_{\text{local}} - \Delta_{\text{offset}}$


    ensuring consistency across conversions.


    Regular expressions and temporal arithmetic exemplify Python''s philosophy: high-level
    declarative interfaces grounded in rigorous formalism (finite automata, calendrical
    algorithms) yet rendered with syntax that invites experimentation. Mastery of
    these tools equips the mathematical programmer to parse complex'
