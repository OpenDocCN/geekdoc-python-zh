    # Basin-Hopping


    Alternate random perturbations (temperature-controlled) with local L-BFGS minimisation;
    the metastable basin-to-basin moves approximate a global transition matrix, frequently
    locating the ground state of molecular clusters (Lennard–Jones).


    # Comparative Strengths


    GA excels in discrete or combinatorial encodings; SA better exploits local smoothness;
    particle swarm and CMA–ES provide derivative-free multivariate adaptation. Hybridising
    with quasi-Newton polishing (“memetic algorithms”) often improves speed and accuracy.


    # 8.2.4 Direct Methods for Linear Systems


    Consider the linear system $Ax = \mathbf{b}$ with $A \in \mathbb{R}^{n \times
    n}$ nonsingular. *Direct* methods factorise $A$ into products of triangular or
    orthogonal matrices, solving by forward/back substitution in $O(n^3)$ arithmetic
    (plus $O(n^2)$ storage). Their predictability and high arithmetic intensity make
    them the method of choice when $A$ is moderate in size, reused for many right-hand
    sides, or arises from dense modelling.


    # LU Decomposition and Cholesky Decomposition


    # LU Factorisation


    When Gaussian elimination proceeds without row exchanges, $A$ can be written


    $$A = LU,$$


    where $L$ is unit lower-triangular ($l_{ii} = 1$) and $U$ is upper-triangular.
    For each column $k$ ($1 \le k \le n$) elimination computes multipliers $l_{ik}
    = a_{ik}/u_{kk}$ for $i > k$ and updates the Schur complement; the total work
    is $\frac{1}{3}n^3$ multiplications plus lower-order terms.


    # Partial Pivoting


    If $|u_{kk}|$ is small, numerical error explodes. Swapping the pivot row $k$ with
    row $p = \arg \max_{i \ge k} |a_{ik}|$ forms a permutation matrix $P$ such that
    $PA = LU$.'
  - '[PAGE 318]


    Partial pivoting guarantees $\frac{|u_{ij}|}{|a_{ij}|} \le 2^{n-1}$, constraining
    growth factors and yielding backward stability for well-conditioned problems.


    # Cholesky Factorisation


    If $A$ is symmetric positive-definite (SPD), the Cholesky factorisation


    $A = LL^T$, $l_{kk} = \sqrt{a_{kk} - \sum_{s<k} l_{ks}^2}$, $l_{ik} = \frac{1}{l_{kk}}
    \left( a_{ik} - \sum_{s<k} l_{is} l_{ks} \right)$, $i > k$


    reduces work to $\frac{1}{6}n^3$ flops, halves storage, and inherits excellent
    numerical properties: the computed factor $\widehat{L}$ satisfies $A + \Delta
    A = \widehat{L}\widehat{L}^T$ with $\|\Delta A\| \lesssim u n \|A\|$ (machine
    unit $u$).


    # Example 8.2.4 (Cholesky in Python)


    ```

    import numpy as np, scipy.linalg as la

    np.random.seed(0)

    A = np.random.randn(5,5); A = A @ A.T + 1e-3*np.eye(5) # SPD

    L = la.cholesky(A, lower=True)

    b = np.random.rand(5)

    y = la.solve_triangular(L, b, lower=True)

    x = la.solve_triangular(L.T, y, lower=False)

    assert np.allclose(A @ x, b)

    ```


    # Band and Block Variants


    If $A$ has bandwidth $w$, band LU reduces to $O(nw^2)$ operations; tridiagonal
    SPD matrices admit $O(n)$ Cholesky (a.k.a. *Thomas algorithm*). For matrices with
    $2 \times 2$ block pivots (e.g. saddle-point systems), block LU/LDL$^T$ maintains
    symmetry while handling pivot sign issues.


    # Applications in Scientific Computing


    # Finite-Difference Poisson Solver


    Discretising $\nabla^2 u = f$ on an $m \times m$ grid yields an $n = m^2$ five-point
    Laplacian matrix. Its sparsity pattern is block tridiagonal with bandwidth $w
    = 2m - 1$; applying band LU costs $O(n^{1.5})$ flops, outperforming dense algorithms
    and providing a deterministic baseline for multigrid or conjugate-gradient verification.'
