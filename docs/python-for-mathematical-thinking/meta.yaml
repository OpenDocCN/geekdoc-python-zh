    the CPython Virtual Machine. Installation via `python.org` ensures the latest
    stable release, but minimalists must subsequently `pip install numpy scipy matplotlib
    sympy`. The *Anaconda* distribution, by contrast, ships a curated set of $\approx
    250$ scientific packages—pre-compiled against Intel MKL—together with the `conda`
