    # Viscoelasticity: Fractional Maxwell Model


    Stress-strain relation:


    $$\sigma(t) + \tau^\alpha D^\alpha \sigma(t) = E D^\alpha \varepsilon(t),$$


    where $\tau$, $E$ are material constants, and $D^\alpha$ models hereditary memory.


    # Example 3.4.25 (Fractional Response to a Step Input)


    Use Laplace transforms and symbolic calculus to express the stress response in
    time domain:


    $$\sigma(s) = \frac{E}{1 + \tau^\alpha s^\alpha} \cdot \frac{1}{s}.$$


    The inverse Laplace involves a Mittag–Leffler function.


    ```

    python

    s = sp.Symbol("s")

    E, tau, alpha = sp.symbols("E tau alpha")

    sigma_s = (E / (1 + tau**alpha * s**alpha)) * (1 / s)

    # Inverse Laplace transform is symbolic; numerical inversion preferred

    ```'
