    # Trend-Seasonality Decomposition and Stationarity Tests


    # Additive Decomposition


    Assume $x_t = T_t + S_t + R_t$ where $T_t$ is trend (low-frequency), $S_t$ is
    periodic with known period k, and $R_t$ is remainder. STL (Seasonal-Trend decomposition
    via Loess) alternates:


    +   (i) Smooth k subsequences $x_{t+k\ell}$ to estimate $S_t$.

    (ii) Subtract $S_t$, apply LOESS to residual for $T_t$.

    (iii) Update remainder, iterate until convergence.


    ```

