    \ np\n\ndef relu(z): return np.maximum(0, z)\ndef relu_grad(z): return (z > 0).astype(z.dtype)\n\
    def softmax(z):\n    z -= z.max(axis=0, keepdims=True) # 稳定性\n    exp = np.exp(z)\n\
    \    return exp / exp.sum(axis=0, keepdims=True)\n\ndef forward(X, W, b):\n  \
