    \nPython 类定义了一个命名空间，其成员通过属性运算符 `.` 解析。形式上，如果 $C$ 是一个类，其实例集\n\n$$\\text{Obj}(C)\
    \ = \\{c : c \\text{ is created by } C\\}$$\n\n携带一个映射 $\\sigma : \\text{Attr}(C)\
    \ \\to D$，其中 $D$ 是属性值的定义域。实例化调用 `__init__`，建立类似于代数定律的不变式（例如向量加法的结合律）。\n\n####\
    \ 示例 1.7.1（不可变二维向量）\n\n```python\nfrom __future__ import annotations\nfrom math\
    \ import hypot\n\nclass Vec2:\n    \"\"\"$\\mathbb{R}^2$ vector with Euclidean\
    \ norm.\"\"\"\n    __slots__ = (\"_x\", \"_y\") # memory optimisation\n\n    def\
    \ __init__(self, x: float, y: float):\n        self._x, self._y = float(x), float(y)\n\
    \n    def __add__(self, other: Vec2) -> Vec2:\n        return Vec2(self._x + other._x,\
    \ self._y + other._y)\n\n    def __rmul__(self, k: float) -> Vec2: # scalar product\
    \ k.v\n        return Vec2(k * self._x, k * self._y)\n\n    def norm(self) ->\
    \ float:\n        return hypot(self._x, self._y)\n\n    def __repr__(self) ->\
    \ str:\n        return f\"<{self._x},{self._y}>\"\n```\n\n实例满足向量空间公理；例如 $(u +\
    \ v).\\text{norm}() \\le u.\\text{norm}() + v.\\text{norm}()$ 具体化了三角不等式。"
