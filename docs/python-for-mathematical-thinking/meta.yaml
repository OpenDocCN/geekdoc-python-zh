  md: '# 1.1.2 Comparison with Other Mathematical Tools


    # Python vs. MATLAB


    Although both ecosystems excel at numerical linear algebra, their design philosophies
    diverge sharply. MATLAB adopts a *matrix-centric* worldview: every datum is an
    $m \times n$ array by default, and one-based indexing matches traditional algebraic
    notation. Python, by contrast, treats objects abstractly and uses zero-based indexing,
    which aligns with most modern programming languages and allows elegant slicing
    idioms such as `A[:, k]` for the $k$-th column. Performance parity is now typical
    because numpy calls the same LAPACK/BLAS back-ends that underlie MATLAB''s `mldivide`.
    The decisive advantage is Python''s open architecture: C-extensions, JIT tooling
    (numba), and GPU bindings (cupy) are all available *gratis*. Moreover, symbolic
    algebra via sympy and combinatorial libraries such as networkx integrate seamlessly
    with numerical code, eliminating the need for a separate Computer Algebra System
    (CAS). The trade-off is that Python requires conscious array broadcasting (`np.newaxis`)
    to emulate MATLAB''s implicit expansion rules; careless dimension mismatches can
    introduce latent bugs.


    **Example 1.1.3 (Least-Squares Fit: MATLAB vs. Python)** Given $A \in \mathbb{R}^{m
    \times n}$ and $b \in \mathbb{R}^m$, MATLAB''s solution $x = A \setminus b$ is
    mirrored in Python as


    ```

    import numpy as np

    x = np.linalg.lstsq(A, b, rcond=None)[0]

    ```


    Both invoke QR decomposition internally, yielding $\hat{x} = (A^\top A)^{-1} A^\top
    b$ with identical backward-error bounds (Golub and Van Loan 2013).


    # Python vs. R


    R was conceived for statistical modelling; its syntax reflects formulas, factors,
    and data frames as primitive notions. Python acquires equivalent expressiveness
    through the pandas and statsmodels stacks while adding general-purpose constructs
    such as generators and metaclasses. In time-series analysis, R''s xts/zoo objects
    correspond to pandas.Series, but Python''s iterator protocol enables lazy evaluation
    of infinite streams—indispensable in stochastic process simulation. For Bayesian
    inference, R''s rstan finds a counterpart in pymc; however, Python''s ability
    to interleave symbolic differentiation (via jax) with Markov-chain Monte Carlo
    yields gradients $\nabla \log p(\theta \mid D)$ in a single code path, reducing
    boilerplate.


    **Example 1.1.4 (Kernel Density Estimation)** A univariate Gaussian KDE requires
    one line in each language.


    ```

    from scipy.stats import gaussian_kde

    pdf = gaussian_kde(samples)

    ```


    The call mirrors R''s `density(samples)` but returns a callable object that vectorises
    over $\mathbb{R}^d$, enabling direct integration with numpy broadcasting semantics.'
