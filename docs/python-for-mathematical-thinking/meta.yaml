    is the *chromatic number* $\chi(G)$. Determining $\chi(G)$ is NP-complete (Karp
    1972), yet algebraic encodings illuminate structure.


    **Chromatic Polynomial** $P_G(k)$ For each integer $k \ge 0$, $P_G(k)$ counts
    proper $k$-colourings; it is a monic polynomial of degree $|V|$ satisfying the
    deletion–contraction recurrence


    $$P_G(k) = P_{G-e}(k) - P_{G/e}(k),$$


    where $G - e$ deletes edge $e$ and $G/e$ contracts $e$. Consequences:


    +   (a) $P_G(1) = 0$ unless $G$ has no edges.

    (b) $(-1)^{|V|} P_G(-1)$ equals the number of acyclic orientations of $G$ (Stanley).

    (c) Real roots satisfy $\lambda \le 0$ (by Whitney''s broken-circuit theorem).


    # **Example 7.3.1 (Chromatic Polynomial of $C_4$)**


    $$P_{C_4}(k) = k(k - 1)(k^2 - 3k + 3).$$


    Verify via NetworkX + SymPy:


    ```

    import networkx as nx, sympy as sp

    G = nx.cycle_graph(4)

    P = nx.algorithms.coloring.chromatic_polynomial(G)

    sp.factor(P) # k*(k - 1)*(k**2 - 3*k + 3)

    ```


    **Upper Bounds** By greedy ordering, $\chi(G) \le \Delta(G) + 1$ where $\Delta$
    is maximum degree. Brooks'' theorem refines to $\chi(G) \le \Delta$ except for
    cliques and odd cycles.


    **Four-Colour Theorem** Every planar graph is 4-colourable (Appel–Haken 1976).
    The proof relies on an unavoidable set of reducible configurations checked by
    exhaustive computer enumeration; modern Coq formalisation (Gonthier 2008) yields
    a fully verified proof.


    # **Spectral Graph Theory and Applications**


    Let $A$ be the adjacency matrix and $D = \text{diag}(\deg v)$. The *unnormalised
    Laplacian* is $L = D - A$, while the *normalised Laplacian* is $\mathcal{L} =
    D^{-1/2}LD^{-1/2}$. Eigenvalues


    $$0 = \lambda_1 \le \lambda_2 \le \cdots \le \lambda_n \le 2$$


    encode combinatorial data.'
