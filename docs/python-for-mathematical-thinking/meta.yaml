    / \|A\|_\infty$. (ii) Derive an analytic upper bound for $\rho$ in terms of $n$
    for Toeplitz matrices $10^{|i-j|}$ and comment on the observed value. (iii) Apply
    iterative refinement in double precision using the low-precision LU factors and
    report the final residual norm $\|A\hat{\mathbf{x}} - \mathbf{b}\|_2$ for $\mathbf{b}
    = (1, \dots, 1)^T$.


    9. For $n = 1200$ partition the interval $[0, 1]$ uniformly and assemble the stiffness
    matrix $K_{ij} = \int_0^1 \phi_i''(x)\phi_j''(x)\,dx$, where $\{\phi_i\}$ are
    continuous, piecewise linear "hat" functions. (i) Show that $K$ is SPD with bandwidth
    $w = 2$. (ii) Implement band Cholesky and compare flop counts and memory with
    dense Cholesky. (iii) Solve $K\mathbf{u} = \mathbf{f}$ for $f(x) = x$ and verify
    $\|\mathbf{u} - \mathbf{u}_{\text{exact}}\|_2 = O(h^2)$.


    10. Given $\begin{pmatrix} A & B^\top \\ B & -C \end{pmatrix} \begin{pmatrix}
    \mathbf{u} \\ \mathbf{p} \end{pmatrix} = \begin{pmatrix} \mathbf{f} \\ \mathbf{g}
    \end{pmatrix}$ with $A \in \mathbb{R}^{n \times n}$ SPD, $C \succeq 0$, derive
