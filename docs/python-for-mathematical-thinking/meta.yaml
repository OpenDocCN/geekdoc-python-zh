    \n## 6.2 Partial Differential Equations (PDEs)\n\nWhile ordinary differential\
    \ equations govern systems depending on a single independent variable, **partial\
    \ differential equations** describe phenomena whose state $u = u(\\mathbf{x},\
    \ t)$ varies over both *space* and *time*. Canonical physical laws—heat conduction,\
    \ wave propagation, fluid flow, quantum mechanics—are all phrased in the language\
    \ of PDEs. This subsection introduces the three archetypal second-order linear\
    \ PDEs, formulates initial- and boundary-value problems, and derives classical\
    \ analytic solutions via separation of variables and d'Alembert's principle. Python\
    \ verification proceeds with sympy's symbolic PDE module and numpy/matplotlib\
    \ visualisation.\n\n### Heat Equation, Wave Equation, and Laplace's Equation\n\
    \n**Heat (Diffusion) Equation** For temperature $u(x, t)$ on a rod $0 < x < L$:\n\
    \n$$u_t = \\kappa u_{xx}, \\quad \\kappa > 0.$$\n\nParabolic: information diffuses\
    \ with infinite speed; smoothing effect.\n\n**Wave Equation** Displacement $u(x,\
    \ t)$ of a taut string:\n\n$$u_{tt} = c^2 u_{xx}, \\quad c > 0.$$\n\nHyperbolic:\
    \ finite-speed propagation $c$; characteristic lines $x \\pm ct = \\text{const}$.\n\
    \n**Laplace (Potential) Equation** Steady-state potential $\\phi(x, y)$ in 2-D:\n\
    \n$$\\nabla^2 \\phi = \\phi_{xx} + \\phi_{yy} = 0.$$\n\nElliptic: boundary data\
    \ determine interior uniquely and smoothly.\n\nClassification via the sign of\
    \ the discriminant $B^2 - 4AC$ for general $Au_{xx} + Bu_{xy} + Cu_{yy} = 0$.\n\
    \n### Boundary Conditions and Initial Conditions\n\n**Boundary Value Problem (BVP)**\
    \ For $u(x, t)$ on $0 < x < L$ and $t > 0$:\n\n1. Dirichlet (fixed): $u(0, t)\
    \ = 0$, $u(L, t) = 0$.\n2. Neumann (flux): $u_x(0, t) = q_0(t)$, $u_x(L, t) =\
    \ q_L(t)$.\n3. Robin (mixed): $u_x + hu = 0$ at boundaries; convective heat loss.\n\
    \n**Initial Value Problem (IVP)** Parabolic and hyperbolic PDEs require initial\
    \ profile(s):\n\n$u(x, 0) = f(x)$ (heat); $u(x, 0) = f(x)$, $u_t(x, 0) = g(x)$\
    \ (wave).\n\nWell-posedness: existence, uniqueness, continuous dependence on data\
    \ (Hadamard).\n\n### Separation of Variables\n\nAssume $u(x, t) = X(x)T(t)$. Substitute\
    \ into the heat equation:\n\n$$\\frac{T'}{\\kappa T} = \\frac{X''}{X} = -\\lambda.$$\n\
    \nEigenvalue problem $X'' + \\lambda X = 0$, $X(0) = X(L) = 0 \\implies X_n =\
    \ \\sin \\frac{n\\pi x}{L}$, $\\lambda_n = \\left(\\frac{n\\pi}{L}\\right)^2$.\
    \ Temporal factor $T_n(t) = \\exp(-\\kappa \\lambda_n t)$. Superpose to match\
    \ initial data:\n\n$$u(x, t) = \\sum_{n=1}^{\\infty} b_n e^{-\\kappa (\\frac{n\\\
    pi}{L})^2 t} \\sin \\frac{n\\pi x}{L}, \\quad b_n = \\frac{2}{L} \\int_0^L f(x)\
    \ \\sin \\frac{n\\pi x}{L} \\, dx.$$\n\n### Example 6.2.1 (Hot Bar Cooling)\n\n\
    $L = 1$, $\\kappa = 0.1$, $f(x) = x(1 - x)$. Plot $u(x, t)$ at $t = \\{0, 0.05,\
    \ 0.2\\}$ (cf. Fig. 6.8):"
