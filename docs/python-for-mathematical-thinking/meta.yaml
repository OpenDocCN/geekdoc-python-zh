    \ global convergence.\n\n```python\nimport numpy as np, scipy.linalg as la\n\n\
    def newton_system(F, J, x0, tol=1e-12, max_iter=20):\n    x = np.array(x0, dtype=float)\n\
    \    for k in range(max_iter):\n        Fx = F(x)\n        if la.norm(Fx, np.inf)\
