    # Simplification and Optimisation


    Differentiated expressions can often be structurally complex. Simplification reduces
    redundancy and transforms expressions into more readable forms.


    **Algebraic Simplification** The general `simplify()` function tries a broad set
    of rules:


    ```

    f = sp.diff(sp.exp(x) * sp.sin(x), x)

    simplified = sp.simplify(f)

    ```


    returns:


    $$\frac{d}{dx}(e^x \sin x) = e^x(\sin x + \cos x).$$


    **Targeted Simplification** Other tools include:


    +   - `expand()` — distributes products and powers.

    - `factor()` — extracts common symbolic factors.

    - `trigsimp()` — applies trigonometric identities.

    - `collect()` — groups terms with common powers or factors.


    **Example 3.1.3 (Trigonometric Simplification)** Let


    $$f(x) = \cos^2 x + \sin^2 x.$$


    ```

    f = sp.cos(x)**2 + sp.sin(x)**2

    print(sp.simplify(f)) # 1

    ```


    Here, `simplify()` internally uses the identity $\cos^2 x + \sin^2 x = 1$.


