    # 7.5.1 Sets, Relations, and Functions


    # Set Theory Basics and Venn Diagrams


    A *set* is an unordered collection of distinct elements; membership is recorded
    by the predicate $x \in A$. Standard constructions derive new sets from old: the
    *union* $A \cup B = \{x \mid x \in A \lor x \in B\}$ and the *intersection* $A
    \cap B = \{x \mid x \in A \land x \in B\}$ satisfy the distributive law


    $A \cap (B \cup C) = (A \cap B) \cup (A \cap C)$, and dually $A \cup (B \cap C)
    = (A \cup B) \cap (A \cup C)$.


    The *power set* $\mathcal{P}(A)$ contains all subsets of $A$ and has cardinality
    $2^{|A|}$; Cantor''s theorem $|A| < |\mathcal{P}(A)|$ establishes infinite hierarchies
    of cardinalities.


    # Example 7.5.1 (Boolean Algebra of Sets)


    ```

    A, B, C = {1,2,3}, {2,3,4}, {3,4,5}

    lhs = A & (B | C) # ∩ and ∪ via operators

    rhs = (A & B) | (A & C)

    print(lhs == rhs) # distributive law -> True

    ```


    Venn diagrams visualise the inclusion–exclusion principle. For finite sets


    $|A \cup B| = |A| + |B| - |A \cap B|$, $|A \cup B \cup C| = |A| + |B| + |C| -
    |A \cap B| - |B \cap C| - |C \cap A| + |A \cap B \cap C|$.


    In probability theory the same formula converts overlapping probabilities into
    additive ones.


    # Relations: Reflexivity, Symmetry, and Transitivity


    A *binary relation* on $A$ is a subset $R \subseteq A \times A$. It is


    $\text{reflexive} \iff \forall a \in A, (a, a) \in R$,

    $\text{symmetric} \iff \forall a, b, (a, b) \in R \Rightarrow (b, a) \in R$,

    $\text{transitive} \iff \forall a, b, c, (a, b), (b, c) \in R \Rightarrow (a,
    c) \in R$.


    An *equivalence relation* satisfies all three properties and partitions $A$ into
    disjoint equivalence classes; a *partial order* is reflexive, antisymmetric, and
    transitive.


    # Example 7.5.2 (Congruence Modulo $n$)


    Define $a \equiv_n b$ iff $n \mid (a - b)$. Reflexivity holds since $n \mid 0$,
    symmetry from $n \mid (a - b) \Rightarrow n \mid (b - a)$, and transitivity from
    divisibility chains. Thus $\mathbb{Z}$ splits into $n$ congruence classes $[0],
    \dots, [n-1]$ each visualised on the circle group $\mathbb{Z}/n\mathbb{Z}$.'
