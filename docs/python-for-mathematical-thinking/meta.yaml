  md: '**Algebraic Connectivity** $\lambda_2(L) > 0$ iff $G$ is connected (Fiedler
    1973). Moreover Cheeger''s inequality relates $\lambda_2$ to the edge-expansion
    $h(G)$:


    $$\frac{\lambda_2}{2} \leq h(G) \leq \sqrt{2\lambda_2}.$$


    Thus sparse graphs with large $\lambda_2$ (simultaneously small degree and strong
    connectivity) are *expanders*; they undergird network design and error-correcting
    codes.


    **Spectral Clustering** For weighted graph $W$, embed vertices into $\mathbb{R}^k$
    using the eigenvectors of $\mathcal{L}$ associated with the smallest non-zero
    eigenvalues; apply $k$-means. This approximates the NP-hard *normalised-cut* partition.


