    \ Surjective, and Bijective Mappings\n\nA function $f : A \\to B$ assigns each\
    \ $a \\in A$ a unique $b = f(a) \\in B$. The mapping is\n\ninjective (one-to-one)\
    \ $\\Longleftrightarrow$ $(\\forall a_1 \\neq a_2)\\ f(a_1) \\neq f(a_2)$;\n\n\
    surjective (onto) $\\Longleftrightarrow$ $(\\forall b \\in B)\\ \\exists a \\\
    in A,\\ f(a) = b$;\n\nbijective $\\Longleftrightarrow$ injective and surjective.\n\
    \nCategorically, bijections are isomorphisms in **Set**; they admit inverses $f^{-1}\
    \ : B \\to A$. Cantor–Bernstein–Schröder states: if there exist injections $A\
    \ \\hookrightarrow B$ and $B \\hookrightarrow A$, then a bijection $A \\leftrightarrow\
    \ B$ exists.\n\n# Example 7.5.3 (Cantor Pairing Function)\n\n$\\pi : \\mathbb{N}\
    \ \\times \\mathbb{N} \\to \\mathbb{N}, \\quad \\pi(x, y) = \\frac{1}{2}(x + y)(x\
    \ + y + 1) + y,$\n\nis bijective, proving $\\mathbb{N}^2$ is countable. Inverse\
    \ obtained by reversing triangular indexing.\n\n```\nimport math\ndef pair(x,\
    \ y): return (x+y)*(x+y+1)//2 + y\ndef unpair(z):\n    w = math.floor((math.sqrt(8*z+1)-1)/2)\n\
    \    t = w*(w+1)//2\n    y = z - t\n    return (w - y, y)\nassert unpair(pair(17,\
    \ 23)) == (17, 23)\n```\n\nFunction composition is associative; identity functions\
    \ act as units, forming the *category* of sets. In computer science, *partial*\
    \ functions arise naturally—total functions on bounded domains extended with a\
    \ *None* placeholder mirror them in Python."
