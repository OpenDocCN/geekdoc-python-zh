    Let $\{r_t\}$ denote log-returns of an asset sampled at daily cadence; empirical
    stylised facts include leptokurtosis, volatility clustering, and leverage asymmetry.
    An ARMA–GARCH model augmented with exogenous regressors (ARMAX) captures both
    conditional mean and heteroskedastic variance:'
