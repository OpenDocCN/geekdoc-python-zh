    \ general framework for modelling emergent behaviour through coarse-grained order\
    \ parameters.\n\n# Network Theory and Small-World Phenomena\n\nThe degree distribution\
    \ $P(k)$, clustering coefficient $C$, and average path length $L$ constitute canonical\
    \ observables. A graph exhibits the *small-world* property when $C \\gg C_{\\\
    text{rand}}$ yet $L \\approx L_{\\text{rand}}$, where rand denotes a degree-matched\
    \ Erdős–Rényi surrogate. In the Watts–Strogatz model start from a ring of $N$\
    \ nodes, rewire each edge with probability $p$ to a random destination; for $p\
    \ \\in [0.01, 0.1]$ one observes\n\n$$C(p) \\approx \\frac{3}{4}(1-p)^3, \\quad\
    \ L(p) \\approx \\frac{N}{2k}\\left[1 + \\frac{p}{2}\\right].$$\n\nyielding $C/C_{\\\
    text{rand}} \\gg 1$ while $L/L_{\\text{rand}} \\to 1$. The network Laplacian spectrum\
    \ satisfies $\\lambda_2^{\\text{WS}} \\approx \\lambda_2^{\\text{ring}} + \\mathcal{O}(pk)$,\
    \ where $\\lambda_2$ (algebraic connectivity) controls the synchronisation threshold\
    \ of coupled oscillators."
