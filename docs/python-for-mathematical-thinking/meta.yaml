    ## Probability and Expectation


    Let $X$ be a continuous random variable with probability density function (PDF)
    $p(x)$ such that $\int_{-\infty}^{\infty} p(x) \, dx = 1$.


    **Expectation** The expected value of a function $f(X)$ is


    $$\mathbb{E}[f(X)] = \int_{-\infty}^{\infty} f(x) \, p(x) \, dx.$$


    **Example 3.2.14 (Expectation of a Uniform Distribution)** Let $X \sim \text{Unif}(a,
    b)$. Then


    $$p(x) = \frac{1}{b - a}, \quad x \in [a, b].$$


    The expected value is:


    $$\mathbb{E}[X] = \int_a^b \frac{x}{b - a} \, dx = \frac{a + b}{2}.$$


    ```

    a, b = sp.symbols("a b", real=True)

    pdf = 1 / (b - a)

    EX = sp.integrate(x * pdf, (x, a, b)).simplify()

    sp.pprint(EX) # prints (a + b)/2

    ```


    **Example 3.2.15 (Moment of a Normal Distribution)** Let $X \sim \mathcal{N}(0,
    1)$. Then


    $$p(x) = \frac{1}{\sqrt{2\pi}} e^{-x^2/2}, \quad \mathbb{E}[X^2] = 1.$$


    ```

    pdf = sp.exp(-x**2 / 2) / sp.sqrt(2 * sp.pi)

    EX2 = sp.integrate(x**2 * pdf, (x, -sp.oo, sp.oo))

    sp.pprint(EX2)

    ```


    This confirms the second moment of the standard normal is 1.


    ## Cumulative Distribution Function (CDF)


    $$F(x) = \int_{-\infty}^x p(t) \, dt$$


    ### Example 3.2.16 (CDF of Exponential Distribution)


    Let $p(x) = \lambda e^{-\lambda x}$ for $x \geq 0$. Then


    $$F(x) = \int_0^x \lambda e^{-\lambda t} dt = 1 - e^{-\lambda x}.$$


    ```

    λ = sp.Symbol("λ", positive=True)

    p = λ * sp.exp(-λ * x)

    F = sp.integrate(p, (x, 0, x))

    sp.pprint(F.simplify())

    ```


    ## Solving Differential Equations


    Integration is the central mechanism for solving ordinary differential equations
    (ODEs). Given $\frac{dy}{dx} = f(x)$, the general solution is:


    $$y(x) = \int f(x) dx + C.$$


    ### Separable Equations


    If the ODE has the form $\frac{dy}{dx} = g(x)h(y)$, one may write:


    $$\int \frac{1}{h(y)} dy = \int g(x) dx.$$


    ### Example 3.2.17 (Logistic Equation)


    $$\frac{dy}{dx} = ry(1 - y/K), \quad y(0) = y_0.$$


    Separate and integrate:


    $$\int \frac{dy}{y(1 - y/K)} = \int r dx.$$


    ```

    y = sp.Function("y")(x)

    r, K = sp.symbols("r K", positive=True)

    ode = sp.Eq(y.diff(x), r * y * (1 - y / K))

    sol = sp.dsolve(ode, y)

    sp.pprint(sol)

    ```


    The solution is:


    $$y(x) = \frac{K}{1 + Ce^{-rx}}.$$


    ### Integrating Factor


    The linear ODE


    $$\frac{dy}{dx} + P(x)y = Q(x)$$


    has solution


    $$y(x) = e^{-\int P(x)dx} \left[ \int Q(x)e^{\int P(x)dx}dx + C \right].$$


    ### Example 3.2.18 (First-Order Linear Equation)


    Solve $y'' - y = e^x$, with $y(0) = 0$.


    ```

    y = sp.Function("y")(x)

    ode = sp.Eq(sp.diff(y, x) - y, sp.exp(x))

    sol = sp.dsolve(ode, y, ics={y.subs(x, 0): 0})

    sp.pprint(sol)

    ```


    Solution:


    $$y(x) = \frac{1}{2}e^x(x).$$


    ## 3.3 Multivariable Calculus


    While single-variable calculus describes how a function $f : \mathbb{R} \to \mathbb{R}$
    changes along a line, multivariable calculus generalises these ideas to functions
    $f : \mathbb{R}^n \to \mathbb{R}$, enabling analysis over surfaces, hypersurfaces,
    and manifolds. Partial derivatives, gradients, and directional derivatives provide
    local linear approximations, while level sets and optimisation encode geometric
    and extremal behaviour in higher dimensions. This section develops these tools,
    supported by symbolic and numerical examples in Python.


    ### 3.3.1 Partial Derivatives and Gradients


    Let $f(x_1, \ldots, x_n)$ be a scalar-valued function. Its **partial derivative**
    with respect to $x_i$ is defined as


    $$\frac{\partial f}{\partial x_i}(x_1, \ldots, x_n) = \lim_{h \to 0} \frac{f(x_1,
    \ldots, x_i + h, \ldots, x_n) - f(x_1, \ldots, x_i, \ldots, x_n)}{h}.$$


    The **gradient** of $f$, denoted $\nabla f$, is the vector of all partial derivatives:


    $$\nabla f = \begin{pmatrix} \partial f/\partial x_1 \\ \vdots \\ \partial f/\partial
    x_n \end{pmatrix}.$$


    **Example 3.3.1 (Gradient of a Quadratic Function)** Let $f(x, y) = 3x^2 + 2xy
    + y^2$. Compute $\frac{\partial f}{\partial x}$, $\frac{\partial f}{\partial y}$,
    and $\nabla f$.


    ```

    import sympy as sp

    x, y = sp.symbols("x y")

    f = 3*x**2 + 2*x*y + y**2

    df_dx = sp.diff(f, x)

    df_dy = sp.diff(f, y)

    grad_f = [df_dx, df_dy]

    sp.pprint(grad_f)

    ```


    We find:


    $$\nabla f = \begin{pmatrix} 6x + 2y \\ 2x + 2y \end{pmatrix}.$$


    ### Directional Derivatives


    The **directional derivative** of $f$ at point $\mathbf{a}$ in direction $\mathbf{v}
    \in \mathbb{R}^n$ is:


    $$D_{\mathbf{v}}f(\mathbf{a}) = \nabla f(\mathbf{a}) \cdot \frac{\mathbf{v}}{\|\mathbf{v}\|}.$$


    This gives the rate of change of $f$ along $\mathbf{v}$, scaled by its unit length.


    **Example 3.3.2 (Directional Derivative at a Point)** Let $f(x, y) = x^2y + y^3$.
    Compute the directional derivative at $(1, 2)$ in direction $\mathbf{v} = (3,
    4)$.


    ```

    f = x**2 * y + y**3

    grad = [sp.diff(f, var) for var in (x, y)]

    a = {x: 1, y: 2}

    grad_val = [df.subs(a) for df in grad] # [2*1*2 = 4, 1**2 + 3*4 = 13]

    v = sp.Matrix([3, 4])

    v_unit = v / sp.sqrt(sum([vi**2 for vi in v]))

    D_v = sum([g * vu for g, vu in zip(grad_val, v_unit)])

    sp.pprint(D_v.evalf())

    ```


    The result is the scalar rate of change of $f$ along $\mathbf{v}$, numerically
    approximated.


    ### Gradient Fields and Level Sets


    The gradient $\nabla f$ points in the direction of steepest ascent. The **level
    set** of a function $f : \mathbb{R}^2 \to \mathbb{R}$ at level $c$ is:


    $$L_c = \{(x, y) \in \mathbb{R}^2 : f(x, y) = c\}.$$


    Gradients are orthogonal to level sets:


    $$\nabla f(x, y) \perp \text{ level curve at } (x, y).$$


    **Example 3.3.3 (Visualising Level Sets and Gradients)** Let $f(x, y) = x^2 +
    y^2$. Then level sets are circles, and gradients point radially outward (cf. Fig.
    3.1).


    ```

    import numpy as np

    import matplotlib.pyplot as plt

    ```


    ![](img/9724708489e3df346f9e31e3fa6e5746_92_0.png)


    **Fig. 3.1** Level sets of the quadratic form $f(x, y) = x^2 + y^2$ (solid contours)
    together with its gradient field $\nabla f = (2x, 2y)$. Each gradient vector is
    orthogonal to the corresponding contour line and points radially outwards, visualising
    the direction of steepest ascent and the radial symmetry of $f$


    ```

    X, Y = np.meshgrid(np.linspace(-2, 2, 20), np.linspace(-2, 2, 20))

    F = X**2 + Y**2

    gradX = 2*X

    gradY = 2*Y


    plt.contour(X, Y, F, levels=10, cmap=''viridis'')

    plt.quiver(X, Y, gradX, gradY)

    plt.title("Level Sets and Gradient Field of $f(x, y) = x^2 + y^2$")

    plt.axis("equal")

    plt.show()

    ```


    **Example 3.3.4 (Gradient Perpendicular to Level Curves)** For $f(x, y) = x^2
    - y^2$, level sets are hyperbolas. Verify that the gradient $\nabla f = (2x, -2y)$
    is perpendicular to the level set at a given point.


    Choose point $(1, 1)$. At this point, level set is $x^2 - y^2 = 0 \Rightarrow
    x = y$. The tangent vector is $(1, 1)$. Dot product:


    $$\nabla f \cdot \langle 1, 1 \rangle = 2 \cdot 1 + (-2) \cdot 1 = 0.$$


    ### Multivariate Optimisation


    Let $f : \mathbb{R}^n \to \mathbb{R}$. Critical points satisfy $\nabla f = \mathbf{0}$.
    The **Hessian matrix** $H_f \in \mathbb{R}^{n \times n}$ is defined by:


    $$(H_f)_{ij} = \frac{\partial^2 f}{\partial x_i \partial x_j}.$$


    The nature of a critical point is determined by the eigenvalues of $H$:


    - Positive definite $\Rightarrow$ local minimum

    - Negative definite $\Rightarrow$ local maximum

    - Indefinite $\Rightarrow$ saddle point


    **Example 3.3.5 (Optimising a Multivariate Function)** Let $f(x, y) = x^2 + y^2
    - 4x - 6y$. Find and classify critical points.


    ```

    f = x**2 + y**2 - 4*x - 6*y

    grad = [sp.diff(f, var) for var in (x, y)]

    critical = sp.solve(grad)

    H = sp.hessian(f, (x, y))

    eigenvals = H.subs(critical).eigenvals()

    sp.pprint(critical)

    sp.pprint(eigenvals)

    ```


    Gradient vanishes at $x = 2$, $y = 3$. Hessian is $2I$, positive definite $\Rightarrow$
    local minimum at $(2, 3)$.


    **Example 3.3.6 (Saddle Point)** Let $f(x, y) = x^2 - y^2$. Then $\nabla f = (2x,
    -2y) \Rightarrow (0, 0)$ is critical. Hessian:


    $$H = \begin{pmatrix} 2 & 0 \\ 0 & -2 \end{pmatrix} \Rightarrow \text{indefinite}
    \Rightarrow \text{saddle point}.$$


    **Example 3.3.7 (Constrained Optimisation: Lagrange Multipliers)** Maximise $f(x,
    y) = xy$ subject to $x^2 + y^2 = 1$.


    ```

    λ = sp.Symbol("λ")

    g = x**2 + y**2 - 1

    L = x*y - λ*g

    sol = sp.solve([sp.diff(L, v) for v in (x, y, λ)])

    sp.pprint(sol)

    ```


    The maximum value is at $x = y = \frac{1}{\sqrt{2}} \Rightarrow f = \frac{1}{2}$.


    ### 3.3.2 Multiple Integrals


    When a function depends on multiple variables, integration generalises to higher
    dimensions. A **double integral** computes volume under a surface, and a **triple
    integral** accumulates values over a three-dimensional region. SymPy supports
    both symbolic and numerical computation of such integrals and allows coordinate
    transformations via Jacobians.


    #### Double Integrals


    Given $f(x, y)$ defined over a rectangle $R = [a, b] \times [c, d]$, the double
    integral is


    $$\iint_R f(x, y) \, dx \, dy = \int_c^d \left( \int_a^b f(x, y) \, dx \right)
    dy.$$


    If the region is not rectangular, the limits of the inner integral depend on the
    outer variable.


    **Example 3.3.8 (Rectangular Domain)** Evaluate:


    $$\iint_{[0,1] \times [0,2]} (x^2 + y) \, dx \, dy.$$


    ```

    import sympy as sp

    x, y = sp.symbols("x y")

    f = x**2 + y

    I = sp.integrate(sp.integrate(f, (x, 0, 1)), (y, 0, 2))

    sp.pprint(I)

    ```


    Inner integral: $\int_0^1 x^2 + y \, dx = \frac{1}{3} + y$. Outer: $\int_0^2 \left(
    \frac{1}{3} + y \right) dy = \frac{2}{3} + 2 = \frac{8}{3}$.'
