  - '[PAGE 228]


    **Wave Equation** Displacement $u(x, t)$ of a taut string:


    $$u_{tt} = c^2 u_{xx}, \quad c > 0.$$


    Hyperbolic: finite-speed propagation $c$; characteristic lines $x \pm ct = \text{const}$.


    **Laplace (Potential) Equation** Steady-state potential $\phi(x, y)$ in 2-D:


    $$\nabla^2 \phi = \phi_{xx} + \phi_{yy} = 0.$$


    Elliptic: boundary data determine interior uniquely and smoothly.


    Classification via the sign of the discriminant $B^2 - 4AC$ for general $Au_{xx}
    + Bu_{xy} + Cu_{yy} = 0$.


    # Boundary Conditions and Initial Conditions


    **Boundary Value Problem (BVP)** For $u(x, t)$ on $0 < x < L$ and $t > 0$:


    +   1. Dirichlet (fixed): $u(0, t) = 0$, $u(L, t) = 0$.

    2. Neumann (flux): $u_x(0, t) = q_0(t)$, $u_x(L, t) = q_L(t)$.

    3. Robin (mixed): $u_x + hu = 0$ at boundaries; convective heat loss.


    **Initial Value Problem (IVP)** Parabolic and hyperbolic PDEs require initial
    profile(s):


    $u(x, 0) = f(x)$ (heat); $u(x, 0) = f(x)$, $u_t(x, 0) = g(x)$ (wave).


    Well-posedness: existence, uniqueness, continuous dependence on data (Hadamard).


    # Separation of Variables


    Assume $u(x, t) = X(x)T(t)$. Substitute into the heat equation:


    $$\frac{T''}{\kappa T} = \frac{X''''}{X} = -\lambda.$$


    Eigenvalue problem $X'''' + \lambda X = 0$, $X(0) = X(L) = 0 \implies X_n = \sin
    \frac{n\pi x}{L}$, $\lambda_n = \left(\frac{n\pi}{L}\right)^2$. Temporal factor
    $T_n(t) = \exp(-\kappa \lambda_n t)$. Superpose to match initial data:


    $$u(x, t) = \sum_{n=1}^{\infty} b_n e^{-\kappa (\frac{n\pi}{L})^2 t} \sin \frac{n\pi
    x}{L}, \quad b_n = \frac{2}{L} \int_0^L f(x) \sin \frac{n\pi x}{L} \, dx.$$


    **Example 6.2.1 (Hot Bar Cooling)** $L = 1$, $\kappa = 0.1$, $f(x) = x(1 - x)$.
    Plot $u(x, t)$ at $t = \{0, 0.05, 0.2\}$ (cf. Fig. 6.8):'
- md: "## D'Alembert's Solution for the Wave Equation\n\nOn the entire line $-\\infty\
    \ < x < \\infty$ with initial data $u(x, 0) = f(x), u_t(x, 0) = g(x)$,\n\n> $$u(x,\
    \ t) = \\frac{1}{2}[f(x - ct) + f(x + ct)] + \\frac{1}{2c} \\int_{x-ct}^{x+ct}\
    \ g(s) ds.$$\n\nInterpretation: waves propagate left/right at speed $c$ without\
    \ distortion; initial velocity $g$ contributes via travelling integrals.\n\n##\
    \ Example 6.2.2 (Plucked String)\n\n$f(x) = 0$, $g(x) = \\sin \\pi x$ (compact\
    \ support in $[0, 1]$ by zero-extension).\n\n$$u(x, t) = \\frac{1}{2c} \\int_{x-ct}^{x+ct}\
    \ \\sin \\pi s \\, ds = \\frac{1}{2c\\pi} [\\cos \\pi(x - ct) - \\cos \\pi(x +\
    \ ct)]$$\n$$= \\frac{1}{c} \\sin(\\pi ct) \\sin(\\pi x).$$\n\nHence fixed-shape\
    \ sine mode oscillates with frequency $\\pi c$. Python visualisation:\n\n```python\n\
    x = np.linspace(0, 1, 300)\nc = 1\nfor t in (0., .1, .2, .3):\n    plt.plot(x,\
    \ np.sin(np.pi*c*t)*np.sin(np.pi*x), label=f\"t={t}\")\nplt.legend(); plt.xlabel(\"\
    x\"); plt.ylabel(\"u\"); plt.show()\n```\n\n## Finite String, Dirichlet Ends\n\
    \nUse eigen-expansion identical to heat equation but with oscillatory time factors\
    \ $\\cos(\\omega_n t)$, $\\sin(\\omega_n t)$, $\\omega_n = n\\pi c/L$.\n\n## Energy\
    \ Conservation\n\nFor wave equation, $E(t) = \\frac{1}{2} \\int (u_t^2 + c^2 u_x^2)\
    \ dx$ remains constant; verify numerically via spectral coefficients.\n\n## 6.2.1\
    \ Numerical Methods for Solving PDEs\n\nThe analytic solutions derived in the\
    \ previous subsection presuppose simple geometries and homogeneous coefficients.\
    \ Realistic models—air-flow over an aerofoil, heat diffusion in composite materials,\
    \ quantum dynamics in a semiconductor heterostructure—demand discretisation schemes\
    \ that transform a PDE into a finite algebraic system amenable to computation.\
    \ We present three pillars: finite differences, finite elements, and spectral\
    \ collocation, emphasising accuracy, stability, and illustrative Python prototypes.\n\
    \n## Finite Difference Method and Finite Element Method\n\n### Finite Differences\
    \ (FDM)\n\nReplace derivatives by local polynomial interpolants on a uniform grid\
    \ $x_j = j \\, \\Delta x$, $t^n = n \\, \\Delta t$.\n\n$$u_{xx}(x_j, t^n) \\approx\
    \ \\frac{u_{j+1}^n - 2u_j^n + u_{j-1}^n}{(\\Delta x)^2}, \\quad \\text{trunc.\
    \ error} = O((\\Delta x)^2).$$\n\n### Example 6.2.3 (1-D Heat Equation, Explicit\
    \ FTCS)\n\n$$u_j^{n+1} = u_j^n + \\sigma(u_{j+1}^n - 2u_j^n + u_{j-1}^n), \\quad\
    \ \\sigma = \\frac{\\kappa \\, \\Delta t}{(\\Delta x)^2}.$$\n\nStability (von\
    \ Neumann) requires $\\sigma \\le \\frac{1}{2}$ (cf. Fig. 6.9).\n\n**Fig. 6.9**\
    \ Finite-difference approximation of the heat equation $\\partial_t u = \\kappa\
    \ \\partial_{xx} u$ on $(0, 1)$ with $u_0(x) = x(1-x)$. The explicit FTCS scheme\
    \ uses $\\sigma = \\kappa \\Delta t / \\Delta x^2 = 0.4$ (safely below the stability\
    \ limit 0.5) on a 100-cell grid and evolves the solution to $T = 0.3$. Diffusion\
    \ smooths the initial parabola towards the zero equilibrium.\n\n```python\nimport\
    \ numpy as np, matplotlib.pyplot as plt\nkappa, L, T = .1, 1, .3\nNx, Nt = 100,\
    \ 300\ndx, dt = L/Nx, T/Nt\nsigma = kappa*dt/dx**2\nx = np.linspace(0, L, Nx+1)\n\
    u = x*(1-x) # initial\nfor n in range(Nt):\n    u[1:-1] = u[1:-1] + sigma*(u[2:]-2*u[1:-1]+u[:-2])\n\
    plt.plot(x,u); plt.show()\n```\n\n### Finite Elements (FEM)\n\nProject $u$ onto\
    \ piecewise-polynomial basis $\\{\\varphi_i\\}$ on possibly unstructured meshes.\
    \ For Poisson $-\\Delta u = f$ with $u|_{\\partial \\Omega} = 0$, seek $u_h =\
    \ \\sum U_i \\varphi_i$ such that\n\n> $$\\int_{\\Omega} \\nabla u_h \\cdot \\\
    nabla v_h \\, d\\mathbf{x} = \\int_{\\Omega} f v_h \\, d\\mathbf{x} \\quad \\\
    forall v_h \\in V_h.$$\n\nThis yields sparse linear system $\\mathbf{KU} = \\\
    mathbf{F}$ with stiffness matrix $K_{ij} = \\int_{\\Omega} \\nabla \\varphi_i\
    \ \\cdot \\nabla \\varphi_j \\, d\\mathbf{x}$.\n\n### Example 6.2.4 (Poisson on\
    \ a Square, $f(x, y) = 1$)\n\nUsing mesh-generator *meshzoo* and *scipy.sparse*:\n\
    \n```python\nimport meshzoo, numpy as np, scipy.sparse as sp, scipy.sparse.linalg\
    \ as spla\npoints, cells = meshzoo.rectangle_quad(\n    np.linspace(0,1,41), np.linspace(0,1,41))\n\
    N = len(points)\nrows, cols, data, F = [],[],[],np.zeros(N)\nfor tri in cells:\
    \ # loop triangles\n    idx = tri\n    verts = points[idx]\n    area = .5*np.abs(np.linalg.det(\n\
    \        np.vstack((verts[1]-verts[0], verts[2]-verts[0]))))\n    B = np.linalg.inv(np.vstack((verts[1]-verts[0],\n\
    \        verts[2]-verts[0])).T)\n    grad = np.array([B[:,0], B[:,1], -B[:,0]-B[:,1]])\n\
    \    for i in range(3):\n        for j in range(3):\n            rows.append(idx[i]);\
    \ cols.append(idx[j])\n            data.append(area*np.dot(grad[i],grad[j]))\n\
    \    F[idx] += area/3 # f=1\nK = sp.csr_matrix((data,(rows,cols)), shape=(N,N))\n\
    free = (-((points[:,0]==0)|(points[:,0]==1)\n    |(points[:,1]==0)|(points[:,1]==1)))\n\
    u = np.zeros(N)\nu[free] = spla.spsolve(K[free][:,free], F[free])\n```\n\nSolver\
    \ complexity $\\tilde{O}(N)$ with multigrid pre-conditioning.\n\n### Spectral\
    \ Methods for PDEs\n\nExpand $u$ in global orthogonal basis (Fourier for periodic,\
    \ Chebyshev for bounded intervals):\n\n$$u(x, t) = \\sum_{k=-N}^{N} \\hat{u}_k(t)\
    \ e^{ikx}, \\quad \\widehat{u_{xxk}} = -(k^2)\\hat{u}_k.$$\n\nExponential convergence\
    \ for analytic solutions.\n\n### Example 6.2.5 ($2$-$\\pi$ Periodic Heat Equation)\n\
    \nODEs for coefficients: $\\hat{u}_k = -\\kappa k^2 \\hat{u}_k$. Exact in spectral\
    \ space; transform back via FFT:\n\n```python\nimport numpy as np\nN=128; x=np.linspace(0,2*np.pi,2*N,endpoint=False)\n\
    u0 = np.sin(3*x)+.5*np.cos(7*x)\nu_hat = np.fft.fft(u0)\nk = np.fft.fftfreq(2*N,\
    \ 1/N)\nkappa, t = .1, .2\nu_hat_t = u_hat*np.exp(-kappa*(k**2)*t)\nu = np.real(np.fft.ifft(u_hat_t))\n\
    ```\n\nRelative $L^2$ error decays as $e^{-cN}$.\n\n**Chebyshev Collocation for\
    \ Poisson** Use differentiation matrices $D$, $D^2$ at Gauss–Lobatto points; solve\
    \ $-u'' = f$ via linear system $D^2 u = f$ with boundary rows replaced.\n\n##\
    \ 6.2 Partial Differential Equations (PDEs)\n\n## Applications in Engineering\
    \ and Physics\n\n**Example 6.2.6 (Beam Deflection (Euler–Bernoulli))** $EI y''''(x)\
    \ = q(x)$, $0 < x < L$, $y(0) = y'(0) = y''(L) = y'''(L) = 0$. Discretise with\
    \ fourth-order finite differences ($O((\\Delta x)^4)$) or Hermite $C^1$ FEM basis;\
    \ simulate for $q(x) = w_0$.\n\n**Example 6.2.7 (Time-Dependent Schrödinger)**\n\
    Split-step FFT method $\\psi(x, t + h) = e^{-ihV/2h} \\mathcal{F}^{-1}\\left[e^{-ihhk^2/2m}\
    \ \\mathcal{F}\\left\\{e^{-ihV/2h} \\psi(x, t)\\right\\}\\right]$. Implement for\
    \ a Gaussian wave-packet in a harmonic potential; verify norm preservation and\
    \ compare with analytic coherent-state solution.\n\n## Stability and Convergence\
    \ of Numerical Methods\n\n**Von Neumann Analysis** Assume mode $e^{ikj\\Delta\
    \ x}$; amplification factor $G(k)$ yields stability when $|G(k)| \\le 1$ for all\
    \ $k$. FTCS for heat: $G = 1 - 4\\sigma \\sin^2(k\\Delta x/2) \\implies \\sigma\
    \ \\le \\frac{1}{2}$.\n\n**Consistency + Stability** $\\implies$ **Convergence\
    \ (Lax Equivalence)** For linear initial-value PDEs with well-posedness, if truncation\
    \ error $\\tau = O((\\Delta x)^p, (\\Delta t)^q)$ and scheme is stable, global\
    \ error $e = O((\\Delta x)^{p-1}, (\\Delta t)^{q-1})$.\n\n**$L$-Stability for\
    \ Stiff Parabolic Problems** Implicit $\\theta$-scheme $u^{n+1} = u^n + h[(1 -\
    \ \\theta)Au^n + \\theta Au^{n+1}]$ is $A$-stable for $\\theta \\ge \\frac{1}{2}$\
    \ and $L$-stable (damps high-frequency modes) iff $\\theta = 1$ (backward Euler).\n\
    \n**Dispersion and Dissipation** Wave equation discretisations trade phase error\
    \ vs. numerical damping; spectral schemes have minimal dispersion but may require\
    \ filtering to stabilise nonlinear shocks (e.g. 2/3 de-aliasing).\n\n## 6.2.2\
    \ Advanced Topics in PDEs\n\nHaving covered the classical analytic and numerical\
    \ arsenal, we now turn to deep ideas that unlock entire classes of boundary- and\
    \ initial-value problems: global Fourier expansions, integral transforms, integrability\
    \ of certain nonlinear equations, and the extension from one to several spatial\
    \ dimensions. Each subsection weaves rigorous derivations with illustrative computations,\
    \ demonstrating how elegant mathematics translates into concrete algorithms in\
    \ Python/SciPy.\n\n### Fourier Series Solutions\n\n**General Framework** For linear\
    \ PDEs on a bounded interval $[0, L]$ with homogeneous boundary conditions, separation\
    \ of variables reduces the spatial dependence."
