    P = (1-alpha)*A/deg[:,None] + alpha/m\npi = np.ones(m)/m\nfor _ in range(100):\
    \ # 幂迭代\n    pi = pi @ P\nprint(pi) # 排名之和为 1\n```\n\n**隐马尔可夫模型（HMM）解码** 状态（天气）隐藏，观测（雨伞）可见。维特比算法大量使用转移矩阵；使用\
