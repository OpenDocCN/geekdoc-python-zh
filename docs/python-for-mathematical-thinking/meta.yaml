    # Legendre Polynomials and Spherical Harmonics


    # Legendre Equation


    $(1-x^2)y'''' - 2xy'' + \ell(\ell+1)y = 0, \quad \ell \in \mathbb{N}_0.$


    Regular solutions at $[-1, 1]$ endpoints are **Legendre polynomials** $P_\ell(x)$,
    obtainable via Rodrigues'' formula


    $P_\ell(x) = \frac{1}{2^\ell \ell!} \frac{d^\ell}{dx^\ell}[(x^2-1)^\ell].$


    **Orthogonality** $\int_{-1}^1 P_\ell(x) P_m(x) dx = \frac{2}{2\ell+1} \delta_{\ell
    m}$. Completeness on $[-1, 1]$ enables Legendre series $f(x) = \sum a_\ell P_\ell(x)$.


    **Example 6.3.10 (Legendre Expansion of Sawtooth)** $f(x) = x$ on $[-1, 1]$: coefficients
    $a_\ell = \frac{2\ell+1}{2} \int_{-1}^1 x P_\ell(x) dx$ vanish for even $\ell$,
    $a_1 = 2/3$, $a_3 = 0$, etc. Confirm via symbolic integration:


    ```

    ℓ = sp.symbols(''ℓ'', integer=True, nonnegative=True)

    aℓ = (2*ℓ+1)/2*sp.integrate(sp.symbols(''x'')*sp.legendre(ℓ, sp.symbols(''x'')),
    (sp.symbols(''x''), -1, 1))

    print([aℓ.subs(ℓ,i) for i in range(5)])

    ```


    # Spherical Harmonics


    Define on $S^2$:


    $Y_\ell^m(\theta, \phi) = \sqrt{\frac{2\ell+1}{4\pi} \frac{(\ell-m)!}{(\ell+m)!}}
    P_\ell^m(\cos \theta) e^{im\phi}, \quad -\ell \le m \le \ell,$


    where $P_\ell^m$ are *associated Legendre functions*. They satisfy $\nabla_{S^2}^2
    Y_\ell^m = -\ell(\ell+1) Y_\ell^m$ and form a complete orthonormal basis of $L^2(S^2)$.


    **Example 6.3.11 (Multipole Expansion of Potential)** For a charge distribution
    $\rho(\mathbf{r}'')$ confined to sphere of radius $R$, potential outside ($r >
    R$) is


