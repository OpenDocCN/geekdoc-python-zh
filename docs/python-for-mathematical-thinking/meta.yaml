    ## Modelling with Fractional Dynamics


    Fractional derivatives allow us to model **memory effects** and **non-local dynamics**,
    commonly found in biological systems, viscoelastic materials, and anomalous diffusion.


    ## Fractional Relaxation Equation


    $$D^\alpha y(t) = -\lambda y(t), \quad 0 < \alpha < 1.$$


    Solution: $y(t) = E_\alpha(-\lambda t^\alpha)$, where $E_\alpha$ is the Mittag–Leffler
    function (cf. Fig. 3.5).


    ```python

    from mpmath import *

    mp.dps = 15


    λ = 1.0

    α = 0.5

    t = mp.linspace(0, 10, 100)

    y = [mittaggleich(α, -λ * ti**α) for ti in t]


    import matplotlib.pyplot as plt

    plt.plot(t, y)

    plt.title("Fractional Relaxation: $D^{0.5}y = -y$")

    plt.xlabel("t")

    plt.ylabel("y(t)")

    plt.grid()

    plt.show()

    ```


    ![](img/9724708489e3df346f9e31e3fa6e5746_115_0.png)


    Fig. 3.5 Solution $y(t) = E_{0.5}(-t^{0.5})$ of the Caputo fractional relaxation
    equation $D^{0.5}y(t) = -y(t)$ with $\lambda = 1$. The Mittag-Leffler decay displays
    a slow power-law tail, highlighting the long-memory effects characteristic of
    fractional-order dynamics


    ## Anomalous Diffusion Equation


    $$\frac{\partial^\alpha u}{\partial t^\alpha} = D \frac{\partial^2 u}{\partial
    x^2}, \quad 0 < \alpha \le 1.$$


    This models subdiffusive behavior in heterogeneous media.


    ## Viscoelasticity: Fractional Maxwell Model


    Stress-strain relation:


    $$\sigma(t) + \tau^\alpha D^\alpha \sigma(t) = E D^\alpha \varepsilon(t),$$


    where $\tau$, $E$ are material constants, and $D^\alpha$ models hereditary memory.


    ### Example 3.4.25 (Fractional Response to a Step Input)


    Use Laplace transforms and symbolic calculus to express the stress response in
    time domain:


    $$\sigma(s) = \frac{E}{1 + \tau^\alpha s^\alpha} \cdot \frac{1}{s}.$$


    The inverse Laplace involves a Mittag–Leffler function.


    ```python

    s = sp.Symbol("s")

    E, tau, alpha = sp.symbols("E tau alpha")

    sigma_s = (E / (1 + tau**alpha * s**alpha)) * (1 / s)

    # Inverse Laplace transform is symbolic; numerical inversion preferred

    ```


