    \ Shooting)\n\n+   1. Guess slopes $s_0, s_1$.\n2. Integrate IVP to obtain $F(s)\
    \ = y(b; s) - \\beta$.\n3. Update $s_{k+1} = s_k - F(s_k) \\frac{s_k - s_{k-1}}{F(s_k)\
    \ - F(s_{k-1})}$.\n4. Repeat until $|F(s_k)| < \\text{tol}$.\n\n**Example 6.1.23\
    \ (Thermal Fin)** $y'' = 0.01(100 - y)$, $y(0) = 0$, $y(10) = 50$. Implement shooting:\n\
    \n```\nfrom scipy.optimize import root_scalar\nf = lambda x,y: [y[1], 0.01*(100-y[0])]\n\
    def F(s):\n    sol=solve_ivp(f,[0,10],[0,s], t_eval=[10])\n    return sol.y[0,-1]-50\n\
    s = root_scalar(F, x0=5,x1=20).root\nprint(\"Slope=\",s)\n```\n\nCompare with\
    \ finite-difference BVP solver `scipy.integrate.solve_bvp`.\n\n**Green's Function\
    \ View** For linear BVP $y'' = q(x)$ on $[0, 1]$ with $y(0) = y(1) = 0$, the discrete\
    \ second-difference matrix leads to a tridiagonal linear system solvable via banded\
