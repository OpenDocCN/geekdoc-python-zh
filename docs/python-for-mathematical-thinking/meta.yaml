    beta(x_k - x_{k-1})$, then evaluate the gradient at $y_k$:\n\n$$x_{k+1} = y_k\
    \ - \\eta \\nabla f(y_k),$$\n\nachieving the optimal $O(1/k^2)$ rate for convex\
