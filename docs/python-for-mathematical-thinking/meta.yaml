  md: '# 9.3 Lyapunov Exponents


    Deterministic chaos is diagnosed by the sensitivity of trajectories to initial
    conditions. Quantitatively, this sensitivity is measured by **Lyapunov exponents**.
    They describe the asymptotic exponential growth (or decay) rates of infinitesimal
    perturbations transported by the tangent flow and, therefore, furnish a numerical
    spectrum summarising the system''s intrinsic instability. In a $d$-dimensional
    phase space the spectrum comprises $d$ real numbers


    $$\lambda_1 \ge \lambda_2 \ge \dots \ge \lambda_d,$$


    where at least one positive exponent signifies chaos and the sum of the exponents
    equals the average divergence of the vector field (Liouville''s theorem).


    # 9.3.1 Definition and Interpretation


    Let $\dot{\mathbf{x}} = \mathbf{F}(\mathbf{x})$ generate a flow $\Phi^t$ on a
    compact, forward-invariant set $\mathcal{A}$. For a non-zero tangent vector $\mathbf{v}_0
    \in T_{\mathbf{x}_0}\mathcal{M}$, evolve $\mathbf{v}(t) = D\Phi^t_{\mathbf{x}_0}
    \mathbf{v}_0$ via the variational equation $\dot{\mathbf{v}} = D\mathbf{F}(\mathbf{x}(t))\mathbf{v}$.
    The **maximal Lyapunov exponent** at $\mathbf{x}_0$ is


    $$\lambda_{\max}(\mathbf{x}_0) = \limsup_{t \to \infty} \frac{1}{t} \ln \frac{\|\mathbf{v}(t)\|}{\|\mathbf{v}_0\|}.$$


    Oseledec''s multiplicative ergodic theorem states that, for $\mu$-almost every
    initial state with respect to an invariant measure $\mu$, the limit exists and
    equals one of $d$ Lyapunov exponents, independent of the chosen $\mathbf{v}_0$
    within the associated *Oseledec subspace*.


    The *Kaplan–Yorke dimension* (or Lyapunov dimension) estimates attractor fractality:


    $$D_{KY} = k + \frac{\sum_{i=1}^k \lambda_i}{|\lambda_{k+1}|}, \quad \text{where
    } k = \max \left\{ m : \sum_{i=1}^m \lambda_i \ge 0 \right\}.$$


    # Calculation Methods


    *Benettin–Wolf Algorithm* Integrate simultaneously the state $\mathbf{x}(t)$ and
    an orthonormal frame $\{\mathbf{e}_1, \dots, \mathbf{e}_d\}$ updated by the variational
    flow,'
