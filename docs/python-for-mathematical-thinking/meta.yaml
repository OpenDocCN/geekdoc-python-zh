    # 3.4.1 Differential Equations


    # First-Order ODEs


    A **first-order ODE** has the form


    $$\frac{dy}{dx} = f(x, y),$$


    with initial condition $y(x_0) = y_0$. Analytic techniques include separation
    of variables, integrating factors, and exact equations.


    # Example 3.4.1 (Separable Equation) Solve


    $$\frac{dy}{dx} = xy, \quad y(0) = 1.$


    Separate variables:


    $$\frac{dy}{y} = x \, dx \Rightarrow \ln|y| = \frac{x^2}{2} + C.$


    ```

    import sympy as sp

    x = sp.Symbol("x")

    y = sp.Function("y")(x)

    ode = sp.Eq(y.diff(x), x*y)

    sol = sp.dsolve(ode, y, ics={y.subs(x, 0): 1})

    sp.pprint(sol)

    ```


    The solution is $y(x) = e^{x^2/2}$.


    # Example 3.4.2 (Integrating Factor Method) Solve


    $$\frac{dy}{dx} + y = e^x, \quad y(0) = 0.$


    Multiply by integrating factor $e^x$ to obtain:


    $$\frac{d}{dx}(ye^x) = e^{2x} \Rightarrow y = e^x - 1.$


    ```

    ode = sp.Eq(y.diff(x) + y, sp.exp(x))

    sol = sp.dsolve(ode, y, ics={y.subs(x, 0): 0})

    sp.pprint(sol)

    ```'
