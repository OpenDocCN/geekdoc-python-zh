    \ in $O(\\log n)$ per insertion.\n\n### Hash-Based Structures\n\n- **Dictionaries\
    \ (maps):** key-value pairs with average $O(1)$ access.\n\n**Example 4.1.9 (Frequency\
    \ Count of Characters)**\n```python\nfrom collections import Counter\nfreq = Counter(\"\
    abracadabra\")\n```\n\n### Graph Structures\n\n- **Adjacency list:** stores neighbours\
