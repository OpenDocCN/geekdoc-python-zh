    Maximise log-likelihood $\ell(\boldsymbol{\beta}) = \sum_i [y_i \ln \sigma(z_i)
    + (1 - y_i) \ln(1 - \sigma(z_i))]$, solved via Newton–Raphson: $\boldsymbol{\beta}^{(k+1)}
