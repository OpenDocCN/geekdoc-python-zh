    \ Method\n\n**Lyapunov Function** A scalar $V : D \\to \\mathbb{R}$ with $V(\\\
    mathbf{x}^*) = 0$, $V(\\mathbf{x}) > 0$ for $\\mathbf{x} \\ne \\mathbf{x}^*$ and\
