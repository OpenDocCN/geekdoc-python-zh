    **Pradeep Singh** 是印度理工学院鲁尔基分校计算机科学与工程系机器智能实验室的国家博士后研究员兼首席研究员。他的研究涵盖几何深度学习、神经符号人工智能和动力系统，由印度科技部Anusandhan国家研究基金会资助。他的研究成果发表在IEEE
