    Basins of attraction for coexisting orbits form fractal boundaries, explaining
    erratic outcomes in micro-electro-mechanical resonators (MEMS) with weak manufacturing
    tolerances.


    # Chua''s Circuit


    Minimal electronic circuit—comprising two capacitors, an inductor, and a piecewise
    linear resistor—implements


    $\dot{v}_1 = \alpha(v_2 - v_1 - h(v_1))$,


    $\dot{v}_2 = v_1 - v_2 + i_L$,


