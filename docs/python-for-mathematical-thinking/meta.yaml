  md: '# Applications in Automated Theorem Proving


    Modern theorem provers reduce logical validity to satisfiability.


    **SAT and SMT** Propositional satisfiability (SAT) was the first NP-complete problem
    (Cook 1971). Yet conflict-driven clause learning (CDCL) solves million-variable
    instances. Satisfiability modulo theories (SMT) extend SAT with arithmetic, arrays,
    and uninterpreted functions; tools like Z3 discharge verification conditions generated
    by compilers and proof assistants.


    **Resolution and DPLL** The Davis–Putnam–Logemann–Loveland (DPLL) algorithm systematically
    assigns variables, backtracking on conflicts; resolution derives the empty clause
    to refute unsatisfiable sets. CDCL augments DPLL with non-chronological backtracking
    and clause learning.


    **Formal Verification** Boolean encodings verify hardware (combinational equivalence
    checking), software (bounded model checking), and security protocols. Example:
    detecting arithmetic overflow by asserting $\neg(\text{carry\_out} \oplus \text{sign\_bit})$
    and querying SAT for a counterexample.


    # Example 7.4.3 (Bit-vector Reasoning with z3)


    ```

    from z3 import *

    a, b = BitVecs(''a b'', 32)

    s = Solver()

    prod = a * b

    s.add(a == 0xFFFF_FFFF, b == 0x2, prod == (a * b) & 0xFFFF_FFFF) # overflow check

    print(s.check()) # sat ==> overflow possible

    print(s.model())

    ```


    **Proof Assistants** Interactive theorem provers (Coq, Lean, Isabelle) encode
    logic via type theory; tactics discharge propositional subgoals with SAT/SMT back-ends,
    leaving higher-order reasoning to the user.


    # 7.4.2 Boolean Algebra and Circuit Design


    Boolean algebra refines propositional logic by restricting variables to $\{0,
    1\}$ and interpreting conjunction, disjunction, and negation as algebraic operations
    in the ring $\mathbb{F}_2[x_1, \dots, x_n]/\langle x_i^2 - x_i \rangle$. Because
    $x^2 = x$ in this ring, every polynomial reduces to a multilinear form, which
    we read as a *Boolean function*


    $$f : \{0, 1\}^n \longrightarrow \{0, 1\}, \quad f(x_1, \dots, x_n) = \sum_{S
    \subseteq [n]} a_S \left( \prod_{i \in S} x_i \right), \quad a_S \in \{0, 1\},$$'
