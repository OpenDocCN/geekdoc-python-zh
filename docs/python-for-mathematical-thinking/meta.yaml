    which exploit second-order structure to achieve rapid convergence from a good
    initial guess, and *global* meta-heuristics, which explore the landscape stochastically
    to escape local traps. A sophisticated workflow typically combines them: a global
    phase produces a promising basin; a local phase polishes the solution to high
    precision.


