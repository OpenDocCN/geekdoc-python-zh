  md: "# 8.2.5 Iterative Methods for Linear Systems\n\nWhen $Ax = \\mathbf{b}$ is\
    \ so large or so sparse that direct factorisations become prohibitive in time\
    \ or memory, one resorts to *iterative* solvers. Starting from an initial guess\
    \ $\\mathbf{x}^{(0)}$ they generate a sequence $\\{\\mathbf{x}^{(k)}\\}$ converging\
    \ (ideally) to the exact solution while accessing $A$ only through sparse matrix–vector\
    \ products. Convergence hinges on the spectral properties of iteration matrices\
    \ or Krylov subspaces; preconditioning often transforms the problem so that these\
    \ properties become favourable.\n\n# Jacobi Method, Gauss–Seidel Method\n\nWrite\
    \ $A = D - L - U$ where $D = \\text{diag}(a_{ii})$, $-L$ the strict lower-triangular\
    \ part, and $-U$ the strict upper. Splitting $A$ suggests the stationary iterations\n\
    \n$Jacobi: \\quad \\mathbf{x}^{(k+1)} = D^{-1}[(L+U)\\mathbf{x}^{(k)} + \\mathbf{b}]\
    \ = G_J \\mathbf{x}^{(k)} + \\mathbf{c}_J, \\quad G_J = D^{-1}(L+U).$\n\n$Gauss\\\
    text{--}Seidel: \\quad \\mathbf{x}^{(k+1)} = (D - L)^{-1}[U\\mathbf{x}^{(k)} +\
    \ \\mathbf{b}], \\quad G_{GS} = (D - L)^{-1}U.$\n\n# Convergence Criterion\n\n\
    Both schemes converge iff $\\rho(G) < 1$ where $\\rho$ denotes the spectral radius.\
    \ Sufficient conditions:\n\n+   (a) $A$ is strictly (or irreducibly) diagonally\
    \ dominant.\n(b) $A$ is symmetric positive-definite (SPD) and one uses Gauss–Seidel.\n\
    \n# Error Propagation\n\nLet $\\mathbf{e}^{(k)} = \\mathbf{x}^{(k)} - \\mathbf{x}^*$,\
    \ then $\\mathbf{e}^{(k+1)} = G\\mathbf{e}^{(k)}$ and $\\|\\mathbf{e}^{(k)}\\\
    | \\leq \\|G\\|^k \\|\\mathbf{e}^{(0)}\\|$; linear convergence rate is governed\
    \ by $\\rho(G)$.\n\n# Example 8.2.6 (Jacobi on Poisson Stencil)\n\n```\nimport\
    \ numpy as np, scipy.sparse as sp, scipy.sparse.linalg as spla\nm = 40\ndiag =\
    \ 4*np.ones(m**2)\noff = -1*np.ones(m**2-1)\nA = sp.diags([off, off, diag, off,\
    \ off], [-m, -1, 0, 1, m], format='csr')\nb = np.ones(m**2)\nD = sp.diags(A.diagonal())\n\
    R = A - D\nx = np.zeros_like(b)\nfor _ in range(2000):\n    x_new = (b - R @ x)\
    \ / D.diagonal() # Jacobi\n    if np.linalg.norm(x_new-x)/np.linalg.norm(x_new)\
    \ < 1e-8: break\n    x = x_new\n```"
