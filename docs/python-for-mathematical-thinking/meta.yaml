    # Multivariate Optimisation


    Let $f : \mathbb{R}^n \to \mathbb{R}$. Critical points satisfy $\nabla f = \mathbf{0}$.
    The **Hessian matrix** $H_f \in \mathbb{R}^{n \times n}$ is defined by:


    $$(H_f)_{ij} = \frac{\partial^2 f}{\partial x_i \partial x_j}.$$


    The nature of a critical point is determined by the eigenvalues of $H$:


    +   - Positive definite $\Rightarrow$ local minimum

    - Negative definite $\Rightarrow$ local maximum

    - Indefinite $\Rightarrow$ saddle point


    **Example 3.3.5 (Optimising a Multivariate Function)** Let $f(x, y) = x^2 + y^2
    - 4x - 6y$. Find and classify critical points.


    ```

    f = x**2 + y**2 - 4*x - 6*y

    grad = [sp.diff(f, var) for var in (x, y)]

    critical = sp.solve(grad)

    H = sp.hessian(f, (x, y))

    eigenvals = H.subs(critical).eigenvals()

    sp.pprint(critical)

    sp.pprint(eigenvals)

    ```


    Gradient vanishes at $x = 2$, $y = 3$. Hessian is $2I$, positive definite $\Rightarrow$
    local minimum at $(2, 3)$.


