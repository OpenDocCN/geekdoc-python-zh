    import numpy as np, matplotlib.pyplot as plt, scipy.stats as st\nnp.random.seed(0)\n\
    def logpost(θ): # unnormalised log posterior\n    return np.log(0.3*st.norm.pdf(θ,-3,1)\
    \ + 0.7*st.norm.pdf(θ,2,0.5))\nθ0, samples, burn = 0.0, [], 3_000\nθ = θ0\nfor\
    \ i in range(20_000):\n    θ_prop = θ + np.random.normal(scale=1)\n    if np.random.rand()\
    \ < np.exp(logpost(θ_prop)-logpost(θ)):\n        θ = θ_prop\n    if i >= burn:\
    \ samples.append(θ)\nplt.hist(samples, bins=60, density=True); plt.show()\n```\n\
