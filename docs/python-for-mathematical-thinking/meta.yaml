    JPEG2000 employs integer lifting wavelets (Cohen–Daubechies–Feauveau 9/7) followed
    by embedded block coding with optimal truncation; achieves ≈2× higher PSNR at
    equal bitrate relative to DCT.


    # 11.2 Time-Series and Signal Processing


    # 11.2.1 Statistical Time-Series Models


    Time-series analysis presumes observations $\{x_t\}_{t=0}^T$ recorded at equally
    spaced instants. The principal objective is to isolate deterministic components
    (trend, seasonality) from stochastic fluctuations, then build parsimonious stochastic
    models that predict future values and quantify uncertainty. Classical Box–Jenkins
    methodology frames the stochastic part as a linear filter driven by white noise;
    state-space theory recasts dynamics in recursive form amenable to Kalman filtering;
    GARCH-type models capture conditional heteroskedasticity pervasive in finance.
    We start with linear ARIMA processes, proceed to state-space representation, then
    treat volatility, and finally discuss decomposition and stationarity diagnostics.


    # Autoregressive (AR), Moving-Average (MA), and ARIMA Models


    Let $\{\varepsilon_t\} \sim \text{i.i.d. } \mathcal{N}(0, \sigma^2)$.


    # AR($p$) Model


    $$x_t - \mu = \sum_{i=1}^p \varphi_i (x_{t-i} - \mu) + \varepsilon_t, \quad \Phi(L)x_t
    = \varepsilon_t,$$


    with lag operator $L^k x_t = x_{t-k}$ and characteristic polynomial $\Phi(z) =
    1 - \varphi_1 z - \cdots - \varphi_p z^p$. Stationarity requires all roots of
    $\Phi$ lie outside the unit disk. The $k$-step predictor is $\widehat{x}_{t+k}
    = \mu + \sum_{i=1}^p \varphi_i \widehat{x}_{t+k-i}$ with MSE computed from Yule–Walker
    equations.


    # MA($q$) Model


    $$x_t = \mu + \varepsilon_t + \sum_{i=1}^q \theta_i \varepsilon_{t-i} = \Theta(L)\varepsilon_t.$$
    Invertibility demands zeros of $\Theta(z) = 1 + \theta_1 z + \cdots + \theta_q
    z^q$ lie outside unit circle, guaranteeing a convergent AR($\infty$) representation
    and identifiability.'
