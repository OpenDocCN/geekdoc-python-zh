    # Stationarity Diagnostics


    **Augmented Dickey-Fuller (ADF)** tests $H_0: \varphi = 1$ in $\Delta x_t = \rho
    x_{t-1} + \sum_{i=1}^k \gamma_i \Delta x_{t-i} + \varepsilon_t$. Reject $H_0$
    at level α if $\tau = \hat{\rho} / \text{se}(\hat{\rho})$ is less than critical
    value $c_\alpha$. **KPSS** reverses $H_0$ (trend-stationary) and uses LM-statistic.'
