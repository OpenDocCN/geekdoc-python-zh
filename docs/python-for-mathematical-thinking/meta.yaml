    \ ...\n    scheduler.step() # η <- 0.95 η\n```\n\n# 8.2.2 Simplex Method\n\nThe\
    \ simplex algorithm converts the geometric intuition that an optimal solution\
    \ of a linear programme occurs at an extreme point of the feasible polytope into\
    \ an algebraic pivot procedure that walks from vertex to vertex along improving\
    \ edges. Although the worst-case complexity is exponential, its empirical speed—rooted\
    \ in the sparsity of practical constraint matrices and good pivot rules—has made\
    \ it the backbone of operations research for decades.\n\n# Linear Programming\
    \ Problems\n\nA linear programme (LP) in *standard form* is\n\n$$\\min_{\\mathbf{x}\
    \ \\in \\mathbb{R}^n} \\mathbf{c}^\\top \\mathbf{x} \\quad \\text{s.t.} \\quad\
    \ A\\mathbf{x} = \\mathbf{b}, \\quad \\mathbf{x} \\geq \\mathbf{0}, \\qquad (\\\
    text{LP})$$\n\nwith $A \\in \\mathbb{R}^{m \\times n}$, full row rank $m \\leq\
    \ n$. A subset $B \\subseteq \\{1, \\dots, n\\}$ of indices with $|B| = m$ is\
    \ a *basis* if the columns $A_B$ are linearly independent. Setting $\\mathbf{x}_N\
    \ = \\mathbf{0}$ for the non-basic indices and $\\mathbf{x}_B = A_B^{-1}\\mathbf{b}$\
    \ yields a **basic feasible solution (BFS)** provided $A_B^{-1}\\mathbf{b} \\\
    geq \\mathbf{0}$. The simplex method iteratively exchanges one basic and one non-basic\
    \ variable (*pivot*) to obtain an adjacent BFS with lower objective value until\
    \ no further improvement is possible (*optimality condition*).\n\nAfter partitioning\
    \ $A = (A_B \\ A_N)$ and $\\mathbf{c}^\\top = (\\mathbf{c}_B^\\top \\ \\mathbf{c}_N^\\\
    top)$, the *reduced costs* are\n\n$$\\bar{\\mathbf{c}}_N^\\top = \\mathbf{c}_N^\\\
    top - \\mathbf{c}_B^\\top A_B^{-1} A_N,$$\n\nand the current BFS is optimal iff\
    \ $\\bar{\\mathbf{c}}_N \\geq \\mathbf{0}$ (*minimisation*). Otherwise choose\
    \ an entering index $q$ with $\\bar{c}_q < 0$, compute the search direction $\\\
    mathbf{d} = A_B^{-1} A_q$, and perform a ratio test $\\theta^* = \\min_{d_i >\
    \ 0} \\frac{x_{B,i}}{d_i}$ to keep feasibility, selecting the *leaving basic*\
    \ index $p$ attaining the minimum. The new basis $B \\leftarrow B \\setminus \\\
    {p\\} \\cup \\{q\\}$ defines the next BFS."
