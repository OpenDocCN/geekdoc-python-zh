    \ \\mathbf{r}_k + \\beta_{k-1}\\mathbf{p}_{k-1}, \\quad \\alpha_k = \\frac{\\\
    mathbf{r}_k^T \\mathbf{r}_k}{\\mathbf{p}_k^T A \\mathbf{p}_k}, \\quad \\mathbf{x}_{k+1}\
    \ = \\mathbf{x}_k + \\alpha_k \\mathbf{p}_k, \\quad \\mathbf{r}_{k+1} = \\mathbf{r}_k\
    \ - \\alpha_k A \\mathbf{p}_k.$\n\nError bound $\\|\\mathbf{e}_k\\|_A \\le 2\\\
    left(\\frac{\\sqrt{\\kappa}-1}{\\sqrt{\\kappa}+1}\\right)^k \\|\\mathbf{e}_0\\\
    |_A$ depends on condition number $\\kappa = \\lambda_{\\max}/\\lambda_{\\min}$.\n\
