    \ coordinates by accumulated squared gradients: for Adam\n\n$m_{k+1} = \\beta_1\
    \ m_k + (1 - \\beta_1)g_k, \\quad v_{k+1} = \\beta_2 v_k + (1 - \\beta_2)g_k^2,$\n\
    \nwith bias-corrected $\\hat{m}_k = m_k / (1 - \\beta_1^k)$, $\\hat{v}_k = v_k\
