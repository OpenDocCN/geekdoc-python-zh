    \ ≥ 0 not both zero.\n    Postconditions: divides(gcd, a) ∧ divides(gcd, b).\n\
    \    Complexity: O(log min(a, b)).\n    \"\"\"\n```\n\n# Unit Testing with pytest\n\
    \n`pytest` provides the scaffolding to encode lemmas that guarantee function correctness.\
