    # Electrical Circuit Analysis


    Modified nodal analysis produces an SPD conductance matrix $G$. Cholesky factorisation
    enables fast DC operating-point computation, while reuse of $L$ over multiple
    right-hand sides allows AC small-signal sweeps with negligible incremental cost.


    # Kalman Filtering


    The measurement update solves $(P_k^{-1} + H^T R^{-1} H)\mathbf{x} = H^T R^{-1}
    \mathbf{z}$. Since $P_k$ and $R$ are SPD, sequential Cholesky downdate updates
    $L_k$ to $L_{k+1}$ in $O(n^2)$ time, maintaining filter stability over thousands
    of steps.


    # Pivoting Strategies and Numerical Stability


    **Complete pivoting** searches both rows and columns for the maximal pivot, yielding
    $\frac{|u_{ij}|}{|a_{ij}|} \le (1+u)^{n-1}$, but costs $O(n^3)$ comparisons and
    rarely improves accuracy over partial pivoting.


    **Threshold pivoting** accepts a pivot $|u_{kk}| \ge \tau \max_{i \ge k} |a_{ik}|$
    ($\tau \in [0, 1]$) to minimise fill-in for sparse matrices (Markowitz heuristic).


    **Scaled pivoting** rescales each row by its largest element before the partial-pivot
    search, reducing the effect of coefficient magnitude variation; incorporated in
    LAPACK routine dgesv.


    **Growth factor and backward error.** Define $\rho = \max_{i,j} |u_{ij}| / \max_{i,j}
    |a_{ij}|$. For partial pivoting in random matrices $\rho$ rarely exceeds $n$,
    so the computed solution $\widehat{\mathbf{x}}$ satisfies $(A + \Delta A)\widehat{\mathbf{x}}
    = \mathbf{b}$ with $\|\Delta A\| \le u \rho \|A\|$. Ill-conditioned problems ($\kappa(A)
    \gg 1$) require iterative refinement: solve $A\mathbf{e}_k = \mathbf{r}_k$ in
    extended precision, $\mathbf{x}_{k+1} = \mathbf{x}_k + \mathbf{e}_k$, achieving
    near-double precision from single-precision LU.


    # Example 8.2.5 (Pivot Growth)


