    # Exact ODEs and Integrating Factors


    Consider an autonomous differential relation


    $M(x, y) \, dx + N(x, y) \, dy = 0$.


    If there exists a scalar potential $F$ such that $dF = M \, dx + N \, dy$, the
    equation is **exact** and the solution is given implicitly by $F(x, y) = C$.


    **Exactness Test** $M \, dx + N \, dy$ is exact on a simply connected domain when


    $\frac{\partial M}{\partial y} = \frac{\partial N}{\partial x}$.


    # Example 6.1.4 (Exact Form)


    $(2xy + \sin y) \, dx + (x^2 + \cos y) \, dy = 0$.


    Since $\partial M/\partial y = 2x+\cos y$ and $\partial N/\partial x = 2x+\cos
    y$, the equation is exact. Integrate $M$ with respect to $x$:


    $F(x, y) = x^2 y + x \sin y + \phi(y)$,


    differentiate $F$ wrt $y$ and match $N$ to find $\phi''(y) = 0$. Solution: $x^2
    y + x \sin y = C$.


    ```

    x,y = sp.symbols(''x y'')

    M = 2*x*y + sp.sin(y)

    N = x**2 + sp.cos(y)

    sp.integrate(M, x) # x**2*y + x*sin(y)

    ```


    # Integrating Factors


    If not exact, find a function $\mu(x, y)$ making $\mu M \, dx + \mu N \, dy$ exact.


    # Example 6.1.5 (Linear Integrating Factor Revisited)


    $y \, dx + x \, dy = 0$


    is not exact ($\partial M/\partial y = 1$, $\partial N/\partial x = 1$—actually
    equal!) but trivial. Instead examine


    $(2xy - y^3) \, dx + (x^2 - 3xy^2) \, dy = 0$.


    Not exact initially (compute cross-partials). An integrating factor of the form
    $\mu(y) = y^{-3}$ yields


    $(2x - y^2) \, dx + (x^2 y^{-3} - 3x/y) \, dy = 0$,


    which is exact; integrating recovers $x^2 y^{-3} - y^{-2} = C$.'
