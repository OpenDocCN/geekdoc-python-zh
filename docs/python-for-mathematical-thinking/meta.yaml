    \ 通过行进积分贡献。\n\n## 示例 6.2.2（拨弦）\n\n$f(x) = 0$，$g(x) = \\sin \\pi x$（在 $[0, 1]$\
    \ 上具有紧支集，通过零延拓）。\n\n$$u(x, t) = \\frac{1}{2c} \\int_{x-ct}^{x+ct} \\sin \\pi s\
    \ \\, ds = \\frac{1}{2c\\pi} [\\cos \\pi(x - ct) - \\cos \\pi(x + ct)]$$\n$$=\
    \ \\frac{1}{c} \\sin(\\pi ct) \\sin(\\pi x).$$\n\n因此，固定形状的正弦模态以频率 $\\pi c$ 振荡。Python\
    \ 可视化：\n\n```python\nx = np.linspace(0, 1, 300)\nc = 1\nfor t in (0., .1, .2,\
    \ .3):\n    plt.plot(x, np.sin(np.pi*c*t)*np.sin(np.pi*x), label=f\"t={t}\")\n\
    plt.legend(); plt.xlabel(\"x\"); plt.ylabel(\"u\"); plt.show()\n```\n\n## 有限弦，狄利克雷边界条件\n\
    \n使用与热方程相同的本征展开，但时间因子为振荡形式 $\\cos(\\omega_n t)$，$\\sin(\\omega_n t)$，其中 $\\omega_n\
    \ = n\\pi c/L$。\n\n## 能量守恒\n\n对于波动方程，$E(t) = \\frac{1}{2} \\int (u_t^2 + c^2 u_x^2)\
    \ dx$ 保持恒定；可通过谱系数进行数值验证。\n\n## 6.2.1 求解偏微分方程的数值方法\n\n上一小节推导的解析解预设了简单的几何形状和齐次系数。实际模型——如翼型上方的气流、复合材料中的热扩散、半导体异质结构中的量子动力学——需要将偏微分方程转化为可计算的有限代数系统的离散化方案。我们介绍三大支柱：有限差分法、有限元法和谱配置法，重点阐述精度、稳定性，并提供说明性的\
    \ Python 原型。\n\n## 有限差分法与有限元法\n\n### 有限差分法 (FDM)\n\n在均匀网格 $x_j = j \\, \\Delta\
    \ x$，$t^n = n \\, \\Delta t$ 上，用局部多项式插值近似导数。\n\n$$u_{xx}(x_j, t^n) \\approx \\\
    frac{u_{j+1}^n - 2u_j^n + u_{j-1}^n}{(\\Delta x)^2}, \\quad \\text{截断误差} = O((\\\
    Delta x)^2).$$\n\n### 示例 6.2.3（一维热方程，显式 FTCS 格式）\n\n$$u_j^{n+1} = u_j^n + \\sigma(u_{j+1}^n\
    \ - 2u_j^n + u_{j-1}^n), \\quad \\sigma = \\frac{\\kappa \\, \\Delta t}{(\\Delta\
    \ x)^2}.$$\n\n稳定性（冯·诺依曼分析）要求 $\\sigma \\le \\frac{1}{2}$（参见图 6.9）。\n\n**图 6.9**\
    \ 在 $(0, 1)$ 上，热方程 $\\partial_t u = \\kappa \\partial_{xx} u$ 的有限差分近似，初始条件 $u_0(x)\
    \ = x(1-x)$。显式 FTCS 格式在 100 个单元的网格上使用 $\\sigma = \\kappa \\Delta t / \\Delta x^2\
    \ = 0.4$（安全低于稳定性极限 0.5），并将解演化至 $T = 0.3$。扩散过程使初始抛物线平滑趋向零平衡态。\n\n```python\nimport\
    \ numpy as np, matplotlib.pyplot as plt\nkappa, L, T = .1, 1, .3\nNx, Nt = 100,\
    \ 300\ndx, dt = L/Nx, T/Nt\nsigma = kappa*dt/dx**2\nx = np.linspace(0, L, Nx+1)\n\
    u = x*(1-x) # initial\nfor n in range(Nt):\n    u[1:-1] = u[1:-1] + sigma*(u[2:]-2*u[1:-1]+u[:-2])\n\
    plt.plot(x,u); plt.show()\n```\n\n### 有限元法 (FEM)\n\n将 $u$ 投影到可能非结构化网格上的分段多项式基函数\
    \ $\\{\\varphi_i\\}$ 上。对于泊松方程 $-\\Delta u = f$，边界条件 $u|_{\\partial \\Omega} =\
    \ 0$，寻求 $u_h = \\sum U_i \\varphi_i$ 使得\n\n> $$\\int_{\\Omega} \\nabla u_h \\\
    cdot \\nabla v_h \\, d\\mathbf{x} = \\int_{\\Omega} f v_h \\, d\\mathbf{x} \\\
    quad \\forall v_h \\in V_h.$$\n\n这产生一个稀疏线性系统 $\\mathbf{KU} = \\mathbf{F}$，其中刚度矩阵\
    \ $K_{ij} = \\int_{\\Omega} \\nabla \\varphi_i \\cdot \\nabla \\varphi_j \\, d\\\
    mathbf{x}$。\n\n### 示例 6.2.4（正方形上的泊松方程，$f(x, y) = 1$）\n\n使用网格生成器 *meshzoo* 和 *scipy.sparse*：\n\
    \n```python\nimport meshzoo, numpy as np, scipy.sparse as sp, scipy.sparse.linalg\
    \ as spla\npoints, cells = meshzoo.rectangle_quad(\n    np.linspace(0,1,41), np.linspace(0,1,41))\n\
    N = len(points)\nrows, cols, data, F = [],[],[],np.zeros(N)\nfor tri in cells:\
    \ # loop triangles\n    idx = tri\n    verts = points[idx]\n    area = .5*np.abs(np.linalg.det(\n\
    \        np.vstack((verts[1]-verts[0], verts[2]-verts[0]))))\n    B = np.linalg.inv(np.vstack((verts[1]-verts[0],\n\
    \        verts[2]-verts[0])).T)\n    grad = np.array([B[:,0], B[:,1], -B[:,0]-B[:,1]])\n\
    \    for i in range(3):\n        for j in range(3):\n            rows.append(idx[i]);\
    \ cols.append(idx[j])\n            data.append(area*np.dot(grad[i],grad[j]))\n\
    \    F[idx] += area/3 # f=1\nK = sp.csr_matrix((data,(rows,cols)), shape=(N,N))\n\
    free = (-((points[:,0]==0)|(points[:,0]==1)\n    |(points[:,1]==0)|(points[:,1]==1)))\n\
    u = np.zeros(N)\nu[free] = spla.spsolve(K[free][:,free], F[free])\n```\n\n求解器复杂度为\
    \ $\\tilde{O}(N)$，使用多重网格预条件。\n\n### 偏微分方程的谱方法\n\n将 $u$ 在全局正交基（周期函数用傅里叶基，有界区间用切比雪夫基）上展开：\n\
    \n$$u(x, t) = \\sum_{k=-N}^{N} \\hat{u}_k(t) e^{ikx}, \\quad \\widehat{u_{xxk}}\
    \ = -(k^2)\\hat{u}_k.$$\n\n对于解析解，具有指数收敛速度。\n\n### 示例 6.2.5（$2$-$\\pi$ 周期热方程）\n\
    \n系数的常微分方程：$\\hat{u}_k = -\\kappa k^2 \\hat{u}_k$。在谱空间中精确求解；通过 FFT 变换回物理空间：\n\n\
    ```python\nimport numpy as np\nN=128; x=np.linspace(0,2*np.pi,2*N,endpoint=False)\n\
    u0 = np.sin(3*x)+.5*np.cos(7*x)\nu_hat = np.fft.fft(u0)\nk = np.fft.fftfreq(2*N,\
    \ 1/N)\nkappa, t = .1, .2\nu_hat_t = u_hat*np.exp(-kappa*(k**2)*t)\nu = np.real(np.fft.ifft(u_hat_t))\n\
    ```\n\n相对 $L^2$ 误差以 $e^{-cN}$ 衰减。\n\n**泊松方程的切比雪夫配置法** 在 Gauss–Lobatto 点上使用微分矩阵\
    \ $D$，$D^2$；通过线性系统 $D^2 u = f$ 求解 $-u'' = f$，其中边界行被替换。\n\n## 6.2 偏微分方程 (PDEs)\n\
    \n## 工程与物理中的应用\n\n**示例 6.2.6（梁的挠度（欧拉-伯努利））** $EI y''''(x) = q(x)$，$0 < x < L$，$y(0)\
    \ = y'(0) = y''(L) = y'''(L) = 0$。使用四阶有限差分（$O((\\Delta x)^4)$）或 Hermite $C^1$\
    \ 有限元基进行离散化；对 $q(x) = w_0$ 进行模拟。\n\n**示例 6.2.7（含时薛定谔方程）**\n分步 FFT 方法 $\\psi(x,\
    \ t + h) = e^{-ihV/2h} \\mathcal{F}^{-1}\\left[e^{-ihhk^2/2m} \\mathcal{F}\\left\\\
    {e^{-ihV/2h} \\psi(x, t)\\right\\}\\right]$。对谐振子势中的高斯波包实现该方法；验证范数守恒并与解析相干态解进行比较。\n\
    \n## 数值方法的稳定性与收敛性\n\n**冯·诺依曼分析** 假设模态 $e^{ikj\\Delta x}$；放大因子 $G(k)$ 在 $|G(k)|\
    \ \\le 1$ 对所有 $k$ 成立时给出稳定性。热方程的 FTCS 格式：$G = 1 - 4\\sigma \\sin^2(k\\Delta x/2)\
    \ \\implies \\sigma \\le \\frac{1}{2}$。\n\n**一致性 + 稳定性** $\\implies$ **收敛性（Lax\
    \ 等价定理）** 对于适定的线性初值偏微分方程，如果截断误差 $\\tau = O((\\Delta x)^p, (\\Delta t)^q)$ 且格式稳定，则全局误差\
    \ $e = O((\\Delta x)^{p-1}, (\\Delta t)^{q-1})$。\n\n**刚性抛物问题的 $L$-稳定性** 隐式 $\\\
    theta$-格式 $u^{n+1} = u^n + h[(1 - \\theta)Au^n + \\theta Au^{n+1}]$ 在 $\\theta\
    \ \\ge \\frac{1}{2}$ 时是 $A$-稳定的，且当且仅当 $\\theta = 1$（向后欧拉）时是 $L$-稳定的（阻尼高频模态）。\n\
    \n**色散与耗散** 波动方程的离散化在相位误差与数值阻尼之间权衡；谱方法具有最小色散，但可能需要滤波来稳定非线性激波（例如 2/3 去混叠）。\n\n\
    ## 6.2.2 偏微分方程的高级主题\n\n在介绍了经典的解析和数值工具箱之后，我们现在转向能够解锁整类边值和初值问题的深层思想：全局傅里叶展开、积分变换、某些非线性方程的可积性，以及从一维到多维空间的扩展。每个小节都将严谨的推导与说明性的计算相结合，展示优雅的数学如何转化为\
    \ Python/SciPy 中的具体算法。\n\n### 傅里叶级数解\n\n**通用框架** 对于定义在有界区间 $[0, L]$ 上、具有齐次边界条件的线性偏微分方程，分离变量法可以简化空间依赖性。"
