    ## 7.1.3 Advanced Topics in Number Theory


    Number theory attains a deeper and subtler flavour once one ventures beyond congruences
    and residues into the lands of integral solutions, automorphic symmetries, and
    analytic continuations. Diophantine equations lie at the heart of arithmetic geometry,
    modular forms encode hidden dualities between algebra and analysis, while the
    analytic behaviour of the Riemann zeta-function governs the fine spacing of primes.
    In this subsection we provide intuitive—but rigorous—gateways to each subject,
    illustrating every conceptual leap with Python experiments or short SageMath snippets
    that encourage active exploration.


    ### Diophantine Equations and Applications


    A **Diophantine equation** asks for integer—or rational—solutions to a polynomial
    relation $F(x_1, \dots, x_n) = 0$. The classical linear case, $a_1x_1 + \cdots
    + a_nx_n = b$, is entirely controlled by the extended Euclidean algorithm, yet
    glimpses the delicate obstruction principle: solutions exist iff $\gcd(a_1, \dots,
    a_n) \mid b$. Quadratic forms already yield rich structures; for instance, $x^2
    - Dy^2 = 1$ (Pell''s equation) has infinitely many solutions for non-square $D
    > 1$, generated from the fundamental unit in $\mathbb{Z}[\sqrt{D}]$ via continued
    fractions.


    ### Example 7.1.7 (Solving Pell with Continued Fractions)


    ```python

    import sympy as sp

    D = 61

    x, y = sp.nint_bernoulli_pell(D) # (1766319049, 226153980)

    print(x**2 - D*y**2) # 1

    ```


    Higher-degree problems such as Fermat''s Last Theorem or Catalan''s conjecture
    were settled only with sophisticated tools like elliptic curves and modularity
    lifting. Modern cryptosystems exploit hardness of certain Diophantine problems:
    the *knapsack* or *subset sum* problem embeds $a_1x_1 + \cdots + a_nx_n = b$ but
    over $\{0, 1\}^n$; lattice-basis reduction (LLL) cracks weak instances and underpins
    attacks.


    ### Modular Forms and Their Applications


    A **modular form** of weight $k$ for the congruence subgroup $\Gamma \subset \mathrm{SL}_2(\mathbb{Z})$
    is a holomorphic function $f : \mathbb{H} \to \mathbb{C}$ on the upper half-plane
    satisfying the transformation law


    $$f\left(\frac{az+b}{cz+d}\right) = (cz+d)^k f(z), \quad \begin{pmatrix} a & b
    \\ c & d \end{pmatrix} \in \Gamma,$$


    and a suitable growth condition at the cusps. Fourier expansion at $i\infty$ reads
    $f(z) = \sum_{n=0}^\infty a_n q^n$, $q = e^{2\pi i z}$, where the arithmetic of
    coefficients $a_n$ encodes deep information: for the discriminant $\Delta(z) =
    q \prod_{n \ge 1} (1 - q^n)^{24}$, Ramanujan conjectured (proved by Deligne) $|a_p|
    \le 2p^{11/2}$.


    The modularity theorem (formerly Taniyama–Shimura–Weil) asserts that every rational
    elliptic curve corresponds to a weight-2 modular form: $L(E, s) = L(f, s)$. Andrew
    Wiles exploited this bridge to prove Fermat''s Last Theorem, transforming an intractable
    Diophantine statement into the non-existence of a certain Galois representation
    inconsistent with modularity.


    ### Example 7.1.8 (Numerical Verification of $q$-expansion)


    ```python

    from sympy import qexp

    q = sp.Symbol(''q'')

    \Delta = q*sp.product((1-q**n)**24, (n,1,10)) # truncate

    print(sp.series(\Delta.expand(), q, 0, 6))

    ```


    In coding theory, modular forms supply *theta series* of lattices; the extremal
    properties of the Leech lattice hinge on the non-existence of low-weight cusp
    forms, which in turn bounds sphere-packing densities.


    ### Analytic Number Theory and the Riemann Hypothesis


    Analytic number theory studies arithmetic functions via generating Dirichlet series.
    The prime number theorem emerges from non-vanishing of $\zeta(s)$ on $\text{Re
    } s = 1$: $\pi(x) \sim x / \log x$. The **Riemann Hypothesis** (RH) sharpens this
    by predicting all non-trivial zeros of $\zeta(s)$ lie on the critical line $\text{Re
    } s = \frac{1}{2}$. Assuming RH, the error term improves to $\pi(x) = \text{Li}(x)
    + O(x^{1/2} \log x)$; unconditionally one currently has $\pi(x) = \text{Li}(x)
    + O(x e^{-c\sqrt{\log x}})$.


    **Explicit Formula** For smooth test $w$, one expresses weighted prime sums in
    terms of zeros $\rho$:


    $$\sum_{n=1}^{\infty} \Lambda(n)w(n) = -\sum_{\rho} \widehat{w}(\rho) - \frac{\zeta''(0)}{\zeta(0)}w(0)
    + \dots$$


    RH thus governs the oscillation magnitude of primes via the distribution of $\rho$.


    **Mertens Conjecture and Extremal Sums** RH implies $|M(x)| < x^{1/2+\epsilon}$
    for the Mertens function $M(x) = \sum_{n \le x} \mu(n)$; conversely strong bounds
    on $M(x)$ would prove (or disprove) RH.


    ### Example 7.1.9 (Empirical Zero Statistics)


    Using Odlyzko tables, pair-correlation of high Riemann zeros matches GUE random
    matrix eigenvalue statistics up to $10^{-3}$.


    ```python

