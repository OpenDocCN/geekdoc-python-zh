  md: 'Statistical significance follows from $t$-test $T = \rho \sqrt{\frac{n-2}{1-\rho^2}}
    \sim t_{n-2}$ under $H_0: \rho = 0$. Spearman rank $\rho_s$ or Kendall $\tau$
    preserves monotone but nonlinear dependence.


    High-magnitude collinearity ($|\rho_{jk}| > 0.9$) inflates variance of regression
    coefficients: remedy via (i) deleting one variable, (ii) summarising by principal
    components (below), or (iii) partial residualising: create transformed predictor
    $\tilde{X}_j = X_j - \beta X_k, \beta = \Sigma_{jk}/\Sigma_{kk}$.


    Domain engineering concocts composite features that linearise relations: ratio,
    difference, interaction, and polynomial terms. For physical laws $y \propto x_1^\alpha
    x_2^\beta$, log-transform linearises into $\ln y = \alpha \ln x_1 + \beta \ln
    x_2 + \varepsilon$, estimable by multivariate regression.


    # Dimensionality Reduction for EDA


    Let $\mathbf{C} = \frac{1}{n-1}(X - \mathbf{1}\mu^\top)^\top(X - \mathbf{1}\mu^\top)$
    be the covariance. Eigen-decomposition $\mathbf{C} = V \Lambda V^\top$ with $\lambda_1
    \ge \lambda_2 \ge \cdots \ge \lambda_p$ and $V = [\mathbf{v}_1 \dots \mathbf{v}_p]$
    defines **principal component analysis (PCA)**. The $k$-dimensional projection
    $Z = XV_{[:,1:k]}$ maximises explained variance $\text{Var}(Z) = \sum_{j=1}^k
    \lambda_j$. Scree plot of $\lambda_j$ vs. $j$ guides cutoff: retain smallest $k$
    with $\sum_{j \le k} \lambda_j / \sum \lambda_j \ge 0.9$. Loadings $\mathbf{v}_j$
    reveal latent factors; biplot $(Z_{\cdot 1}, Z_{\cdot 2})$ with arrows for original
    axes exposes clusters and leverage points.


    Nonlinear manifolds benefit from t-distributed stochastic neighbour embedding
    (t-SNE) and Uniform Manifold Approximation and Projection (UMAP), which preserve
    local topologies by minimising Kullback–Leibler and cross-entropy objectives,
    respectively—useful for visualising high-dimensional images or genomic SNP data.


    ```

    from sklearn.decomposition import PCA

    pca = PCA(n_components=0.9) # retain $\ge 90\%$ variance

    Z = pca.fit_transform(df_scaled)

    print(pca.explained_variance_ratio_)

    ```


