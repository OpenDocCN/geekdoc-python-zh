    \ is a pair $\\mathcal{M} = \\langle E, \\mathcal{I} \\rangle$ where $E$ is a\
    \ finite ground set and $\\mathcal{I} \\subseteq 2^E$ is a non-empty collection\
    \ of *independent* subsets satisfying\n\n(I1) heredity: $I \\in \\mathcal{I}$,\
    \ $J \\subseteq I \\Rightarrow J \\in \\mathcal{I}$, (I2) exchange: $I, J \\in\
    \ \\mathcal{I}$, $|I| < |J| \\implies \\exists e \\in J \\setminus I : I \\cup\
    \ \\{e\\} \\in \\mathcal{I}$.\n\nThe exchange axiom aligns matroids with vector\
    \ spaces: every independent set can be extended to a *basis*, all bases share\
    \ the same cardinality $\\operatorname{rk} \\mathcal{M}$, and greedy augmentation\
    \ never gets stuck. Equivalent definitions employ a *rank function* $r : 2^E \\\
    to \\mathbb{N}$ that is monotone, submodular, and bounded by inclusion, or the\
    \ set of *circuits* (minimal dependent sets) which satisfy a circuit elimination\
    \ property.\n\n## Introduction to Matroids and Examples\n\nThe prototypical examples\
    \ reveal how matroids unify disparate contexts.\n\n- *Uniform matroid* $U_{n,k}$:\
