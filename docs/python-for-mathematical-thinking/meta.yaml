  md: "# 10.1.2 Exploratory Data Analysis (EDA)\n\nExploratory data analysis is the\
    \ *mathematical reconnaissance* phase: before hypothesising formal models one\
    \ must interrogate the distributional geometry of the variables, unearth latent\
    \ heterogeneity, and expose coding errors camouflaged as anomalies. Numerical\
    \ summaries sketch a high-level cartography, while graphical displays reveal subtleties\
    \ invisible to aggregates. Every statistician should recall Tukey’s maxim that\
    \ “numerical recipes are not a substitute for wise eyes”.\n\n# Descriptive Statistics\
    \ and Visualisation Techniques\n\nLet the cleaned matrix be $X \\in \\mathbb{R}^{n\
    \ \\times p}$ with rows $\\mathbf{x}_i^\\top$ and columns $X_{\\cdot j}$. The\
    \ univariate *five-number summary*\n\n$\\{\\min, Q_1, \\bar{x}, Q_3, \\max\\}_j,\
    \ \\quad Q_k = k\\text{-th empirical quartile},$\n\ntogether with mean $\\mu_j$,\
    \ variance $\\sigma_j^2$, skewness $\\gamma_{1j} = \\frac{1}{n} \\sum_i ((x_{ij}\
    \ - \\mu_j)/\\sigma_j)^3$, and excess kurtosis $\\gamma_{2j}$, constitutes the\
    \ baseline diagnostics. Heavy positive skew ($\\gamma_{1j} > 1$) may indicate\
    \ multiplicative mechanisms, suggesting log-transform; heavy tails ($\\gamma_{2j}\
    \ > 3$) warn ordinary least squares may underestimate uncertainty.\n\n```\nsummary\
    \ = df_scaled.agg(['min','quantile','median','mean','std','skew','kurt'],\n  \
    \  quantile=lambda s: s.quantile([.25,.75]))\ndisplay(summary.T) # interactive\
    \ table in Jupyter\n```\n\nHistograms approximate density with bias $O(h^2)$ and\
    \ variance $O((nh)^{-1})$, where $h$ is bin width; Scott’s rule $h = 3.49\\sigma\
    \ n^{-1/3}$ minimises integrated mean-square error for Gaussian kernels. Kernel\
    \ density estimates (KDE) supersede histograms via continuous convolution\n\n\
    $\\hat{f}_h(x) = \\frac{1}{nh} \\sum_{i=1}^n K\\left(\\frac{x - x_i}{h}\\right),\
    \ \\quad K(u) = \\frac{1}{\\sqrt{2\\pi}} e^{-u^2/2},$\n\nwhich attains $O(n^{-4/5})$\
    \ mean-square convergence in one dimension.\n\n# Correlation Analysis and Feature\
    \ Engineering\n\nPairwise linear association employs Pearson matrix $\\Sigma \\\
    in \\mathbb{R}^{p \\times p}$ with entries\n\n$\\rho_{jk} = \\frac{\\text{Cov}(X_{\\\
    cdot j}, X_{\\cdot k})}{\\sigma_j \\sigma_k} = \\frac{1}{n-1} \\sum_{i=1}^n \\\
    frac{(x_{ij} - \\mu_j)(x_{ik} - \\mu_k)}{\\sigma_j \\sigma_k}.$"
