  md: '**Inequality Chain** For any positive sample,


    $$\min x_i \leq H \leq G \leq \bar{x} \leq \max x_i.$$


    Equality holds iff $x_1 = x_2 = \cdots = x_n$.


    **Example 5.2.3 (Compute $G$ and $H$)**


    ```

    from scipy.stats import gmean, hmean

    x_pos = np.array([12.5, 15.0, 20.0, 10.0])

    print(gmean(x_pos), hmean(x_pos))

    ```


    Compared with arithmetic mean 14.375, we have $G \approx 14.28$, $H \approx 14.01$—all
    within the inequality chain.


    **Log-space Stability** For very small/large values, compute $\ln G = \overline{\ln
    x}$ to avoid under/overflow.


    ```

    lg = np.mean(np.log(x_pos))

    G = np.exp(lg)

    ```


    **Weighted Geometric Mean** With weights $w_i$ as above,


    $$G_w = \exp\left(\sum_i w_i \ln x_i\right).$$


    **Example 5.2.4 (Annualised Return)** Investment yields yearly multipliers (1.06,
    1.02, 0.97, 1.10, 1.04). Annualised mean growth:


    $$G - 1 = \left(\prod_i m_i\right)^{1/5} - 1 \approx 0.036.$$


    python

    m = np.array([1.06, 1.02, 0.97, 1.10, 1.04])

    annual = gmean(m) - 1

    print(f"{annual:.3%}") # 3.6% CAGR


    # 5.2.2 Measures of Dispersion


    Dispersion quantifies the spread or “variability” inherent in a dataset or random
    variable. Where central-tendency statistics pin down a typical value, dispersion
    indicates how far observations stray from that centre. Three complementary families
    are explored: *moment-based* (variance, standard deviation), *order-statistic-based*
    (range, inter-quartile range), and *shape-based* (skewness, kurtosis).'
