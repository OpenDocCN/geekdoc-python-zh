    $\alpha = \mathbb{P}(\text{reject } H_0 \mid H_0 \text{ true}) \quad (\text{Type
    I}), \quad \beta = \mathbb{P}(\text{fail to reject } H_0 \mid H_1 \text{ true})
    \quad (\text{Type II}).$'
