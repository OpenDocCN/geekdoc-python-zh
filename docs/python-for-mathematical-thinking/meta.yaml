    \n### 示例 4.2.1（数学恒等式检查）在列表中搜索第一个完全平方数。\n\n```python\nimport math\n\ndef is_square(n):\n\
    \    return int(math.sqrt(n))**2 == n\n\ndef linear_search_predicate(A, predicate):\n\
