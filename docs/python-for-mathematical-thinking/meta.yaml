    one introduces a Lagrange multiplier $\lambda$ and forms:


    $$\tilde{L} = L(x, y, y'') + \lambda g(x, y).$$


    Then apply the Euler-Lagrange equation to $\tilde{L}$.


    # **Example 3.4.10 (Isoperimetric Problem: Enclosed Area Maximisation)**


    Among all curves of fixed perimeter enclosing a fixed area, which one maximises
    area? Answer: the circle.


    This requires maximising:


    $$\mathcal{J}[y] = \int y \, dx \quad \text{subject to} \quad \int \sqrt{1 + y''^2}
    \, dx = \text{const}.$$


    Set up:


    $$\tilde{L} = y + \lambda \sqrt{1 + y''^2}.$$


    Apply Euler-Lagrange:


    $$\frac{d}{dx} \left( \frac{\lambda y''}{\sqrt{1 + y''^2}} \right) = 1.$$


    # **Example 3.4.11 (Constrained Extremal Temperature Profile)**


    Find $y(x)$ that minimises:


    $$\mathcal{J}[y] = \int_0^1 (y'')^2 \, dx, \quad \text{with} \quad \int_0^1 y(x)
    \, dx = 1, \quad y(0) = y(1) = 0.$$


    Form augmented functional:


    $$\tilde{L} = (y'')^2 + \lambda y.$$


    Euler-Lagrange:


    $$\frac{d}{dx}(2y'') = \lambda \Rightarrow y'''' = \lambda/2.$$


    ```

    python

    \lambda = sp.Symbol("\lambda")

    y = sp.Function("y")(x)

    L = sp.diff(y, x)**2 + \lambda * y

    EL = sp.diff(sp.diff(L, sp.diff(y, x)), x) - sp.diff(L, y)

    sp.pprint(EL)

    ```'
