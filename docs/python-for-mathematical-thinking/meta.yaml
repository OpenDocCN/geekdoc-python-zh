    frac{j_{\\nu,n} x}{R}\\right) dx = \\frac{R^2}{2} [J_{\\nu+1}(j_{\\nu,n})]^2 \\\
    delta_{mn}.$$\n\nHence $\\{J_{\\nu}(j_{\\nu,n} x/R)\\}_{n=1}^{\\infty}$ forms\
