    \ neutral cycles around the interior equilibrium $(x^*, y^*) = (\\gamma/\\delta,\
    \ \\alpha/\\beta) = (4, 2.75)$, marked in red. The figure illustrates how initial\
    \ populations determine amplitude while the orbit period is governed by system\
    \ parameters.\n\n## 6.1.2 Higher-Order ODEs\n\nHigher-order linear differential\
    \ equations enrich the analytic repertoire with reduction techniques, systematic\
    \ ansätze, and powerful integral kernels. Python's sympy symbolic engine and scipy.integrate\
    \ numerical solvers validate each step.\n\n## Reduction of Order and Method of\
    \ Undetermined Coefficients\n\nGiven a second-order homogeneous linear equation\n\
    \n$$y'' + P(x)y' + Q(x)y = 0$$\n\nand one non-trivial solution $y_1(x)$, the *reduction-of-order*\
    \ substitution $y_2 = y_1 u$ with $u' = v$ yields\n\n$$v' + \\left(2\\frac{y_1'}{y_1}\
    \ + P\\right)v = 0 \\implies v(x) = C \\exp\\left[-\\int \\left(2y_1'/y_1 + P\\\
    right) dx\\right].$$\n\nIntegrating twice delivers the second linearly independent\
    \ solution.\n\n### Example 6.1.10 (Air Resistance, Exponential Solution)\n\n$y''\
    \ - y = 0$ admits $y_1 = e^x$. Apply reduction: $v' - 2v = 0 \\implies v = Ce^{2x},\
    \ u = \\frac{1}{2}e^{2x} + C_0$. Thus $y_2 = y_1 u = \\frac{1}{2}e^{3x}$; but\
    \ linear independence dictates $y_2 = e^{-x}$ (choose $C = -e^{-2x}$). General\
    \ solution $y = C_1 e^x + C_2 e^{-x}$.\n\n```python\nimport sympy as sp\nx = sp.symbols('x')\n\
