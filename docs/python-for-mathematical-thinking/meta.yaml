    # Separable and Linear ODEs


    **Separable Equations** An ODE is *separable* if it can be written


    $$\frac{dy}{dx} = g(x) h(y),$$


    allowing variables to be separated: $\frac{dy}{h(y)} = g(x) dx$. Integrating both
    sides yields the *implicit* solution


    $$\int \frac{dy}{h(y)} = \int g(x) dx + C.$$


    # Example 6.1.1 (Logistic Growth)


    $$\frac{dy}{dx} = ry\left(1 - \frac{y}{K}\right), \quad r, K > 0.$$


    Separate:


    $$\int \frac{dy}{y(1 - y/K)} = r \int dx.$$


    Partial fractions and integration furnish the explicit solution


    $$y(x) = \frac{K}{1 + Ae^{-rx}}, \quad A = \frac{K - y_0}{y_0}.$$


    ```

    python

    import sympy as sp

    x,r,K,y0 = sp.symbols(''x r K y0'', positive=True)

    y = K/(1+((K-y0)/y0)*sp.exp(-r*x))

    sp.diff(y, x).simplify()

    ```


    Symbolic differentiation reconfirms the logistic ODE.


    # Linear First-Order Equations


    $$\frac{dy}{dx} + P(x) y = Q(x).$$


    Multiplying by the integrating factor $\mu(x) = e^{\int P(x) dx}$ turns the left
    side into $\frac{d}{dx}[\mu(x)y] = \mu(x)Q(x)$, hence


    $$y(x) = \mu(x)^{-1}\left[\int \mu(x) Q(x) dx + C\right].$$'
