    While single-variable calculus describes how a function $f : \mathbb{R} \to \mathbb{R}$
    changes along a line, multivariable calculus generalises these ideas to functions
    $f : \mathbb{R}^n \to \mathbb{R}$, enabling analysis over surfaces, hypersurfaces,
    and manifolds. Partial derivatives, gradients, and directional derivatives provide
    local linear approximations, while level sets and optimisation encode geometric
    and extremal behaviour in higher dimensions. This section develops these tools,
