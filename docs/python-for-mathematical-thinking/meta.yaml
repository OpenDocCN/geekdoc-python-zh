    \ n+1)\n    h = (b-a)/n\n    return h/3*(f(x[0])+f(x[-1])\n               +4*f(x[1:-1:2]).sum()\n\
    \               +2*f(x[2:-2:2]).sum())\n```\n\n### Extrapolation\n\nApplying Richardson\
    \ to $Q_T(h)$ and $Q_T(h/2)$ cancels the $O(h^2)$ term, producing Simpson's rule;\
    \ iterating yields Romberg integration with $O(h^{2k})$ convergence.\n\n### Gaussian\
    \ Quadrature and Adaptive Methods\n\n#### Gaussian Quadrature\n\nFor weight function\
    \ $w(x)$ on $(a, b)$, $n$-point Gauss rules choose nodes $x_k$ as the roots of\
    \ the orthogonal polynomial $P_n(x)$ ($\\deg P_n = n$) and weights $w_k = \\int_a^b\
    \ \\frac{L_k(x) w(x)}{P_n'(x_k)(x - x_k)} dx$, achieving exactness for *all polynomials\
    \ up to degree $2n - 1$*: an exponential accuracy gain over Newton-Cotes.\n\n\
    > $$Q_G[f] = \\sum_{k=1}^n w_k f(x_k), \\quad E_G[f] = \\frac{f^{(2n)}(\\xi)}{(2n)!}\
    \ \\left( \\int_a^b w(x) dx \\right) \\left( \\frac{P_n(x)}{2^n n!} \\right)^2.$$\n\
    \nIn practice tabulate Legendre nodes for $w(x) \\equiv 1$ on $[-1, 1]$ and affine-scale\
    \ to $[a, b]$.\n\n```python\nimport numpy as np, numpy.polynomial.legendre as\
    \ leg\ndef gauss(f, a, b, n):\n    x, w = leg.leggauss(n)\n    y = 0.5*(b-a)*x\
    \ + 0.5*(b+a) # map to [a,b]\n    return 0.5*(b-a)*(w*f(y)).sum()\n```\n\n####\
    \ Adaptive Quadrature\n\nRecursively apply Simpson or Gauss on subintervals until\
    \ $|Q_1 - Q_2| < \\varepsilon(|I| + 1)$, where $Q_1$ is the coarse and $Q_2$ the\
    \ refined estimate. Depth-first recursion with a stack avoids excessive memory;\
    \ integrate singularities by splitting near poles and carrying weight factors\
    \ analytically.\n\n#### Error Equidistribution\n\nAdaptive rules aim for local\
    \ error $\\approx \\varepsilon/(b - a)$. A posteriori error estimates drive mesh\
    \ refinement, forming the basis of QUADPACK's DQAGS routine (Gauss–Kronrod–Patterson\
    \ embedded pairs).\n\n### Monte Carlo Integration and Applications\n\n#### Plain\
    \ Monte Carlo\n\nFor multidimensional integrals $I = \\int_{\\Omega} f(\\mathbf{x})\
    \ \\, d\\mathbf{x}$, sample $\\mathbf{x}_i \\sim \\mathcal{U}(\\Omega)$:\n\n$$\\\
    hat{I}_N = \\frac{\\text{vol}(\\Omega)}{N} \\sum_{i=1}^N f(\\mathbf{x}_i), \\\
    quad \\text{Var}(\\hat{I}_N) = \\frac{\\sigma^2}{N},$$\n\nyielding root-mean-square\
    \ error $O(N^{-1/2})$, independent of dimension.\n\n#### Variance Reduction\n\n\
    - (a) *Importance sampling*: sample from pdf $p$ and weight $f/p$, optimal $p^\\\
    star \\propto |f|$ minimises variance.\n- (b) *Control variates*: use known integral\
    \ of $g$: $\\hat{I}_N^{\\text{cv}} = \\bar{f} + \\beta(\\mu_g - \\bar{g})$, choosing\
    \ $\\beta = -\\text{Cov}(f, g)/\\text{Var}(g)$.\n- (c) *Antithetic pairs*: average\
