    # Examples


    +   - *Summation.* The Kahan compensated algorithm reduces error from $O(n\varepsilon)$
    to $O(\varepsilon)$ by tracking lost low-order bits.

    - *Polynomial evaluation.* Horner''s rule is backward-stable; evaluating $p(x)
    = \sum_k a_k x^k$ directly is not.

    - *Recurrence relations.* Forward recursion of $y_{n+1} = (2n+1)y_n - n^2 y_{n-1}$
    grows errors exponentially; reversing the recurrence or using asymptotics restores
    stability.


    # Stiff ODE Solvers


    Explicit Euler applied to $\dot{y} = \lambda y$ is stable only if $k|\lambda|
    \le 1$. Implicit Euler''s region of absolute stability covers the entire left
    half-plane, enabling arbitrarily large steps for stiff decay. The $A-$, $L-$,
    and $B-$ stability hierarchy classifies time integrators by how much of $\mathbb{C}_-$
    is swallowed without error explosion.


    # Mixed Precision


    Algorithms mixing 16-bit and 32-bit arithmetic accumulate sums in higher precision
    to ensure stability: $\hat{\mathbf{x}} = \mathrm{fl}_{32}(\mathbf{A}^\top \mathrm{fl}_{16}(\mathbf{A}\mathbf{x}))$.
    Backward error analysis shows that, with compensated inner products, the low-precision
    factor enters only quadratically, matching half-precision tensor-core throughput
    with single-precision accuracy.


