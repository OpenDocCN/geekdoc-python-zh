    Chebyshev polynomials of the first kind,


    $T_n(x) = \cos(n \arccos x), \quad x \in [-1, 1], \quad n \geq 0,$


    satisfy the three-term recurrence $T_0 = 1$, $T_1 = x$, $T_{n+1} = 2xT_n - T_{n-1}$
