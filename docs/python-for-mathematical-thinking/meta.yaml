    # 7.2.2 Generating Functions


    Generating functions encode infinite sequences as analytic objects—power series—so
    that algebraic or differential manipulations of the series translate into closed-form
    or asymptotic information about the sequence. When fused with Python''s **sympy.series**
    and **sageall**, they provide both symbolic and numerical leverage for solving
    recurrences, proving identities, and enumerating combinatorial classes.


    # Ordinary and Exponential Generating Functions


    **Definitions** For a sequence $\{a_n\}_{n\ge0}$, the **ordinary generating function**
    (OGF) is


    $$A(z) = \sum_{n=0}^{\infty} a_n z^n,$$


    whereas the **exponential generating function** (EGF) weights by factorials:


    $$\widehat{A}(z) = \sum_{n=0}^{\infty} a_n \frac{z^n}{n!}.$$


    OGFs excel for unlabelled discrete structures, EGFs for labelled ones because
    disjoint unions and products preserve exponential series via the exponential formula.


    # Basic Operations


    Shift: $z^k A(z) \Longleftrightarrow a_{n-k}$;


    Differentiation: $A''(z) = \sum n a_n z^{n-1}$;


    Cauchy product: $A(z)B(z) = \sum (a * b)_n z^n$, $(a * b)_n = \sum_{k=0}^n a_k
    b_{n-k}$.


    Convolution translates to sequence sum, mirroring the multiplication principle
    for combinatorial classes.


    **Example 7.2.6 (Fibonacci via OGF)** $F_n = F_{n-1} + F_{n-2}$, $F_0 = 0$, $F_1
    = 1$. Let $F(z) = \sum_{n\ge0} F_n z^n$. Multiply recurrence by $z^n$ and sum:
    $F(z) - z = zF(z) + z^2 F(z) \Longrightarrow F(z) = \frac{z}{1-z-z^2}$. Partial
    fractions and Lagrange inversion recover Binet''s formula.


    ```

    import sympy as sp

    z=sp.symbols(''z'')

    F= z/(1-z-z**2)

    coeff10 = sp.series(F, z, 0, 12).coeff(z, 10)

    print(coeff10) # 55

    ```'
