  md: '# Periodogram and Power Spectral Density Estimation


    For a real zero-mean signal $\{x_n\}_{n=0}^{N-1}$ sampled with rate $f_s$, define
    the **periodogram**


    $$\hat{S}_{xx}^{\text{per}}(f) = \frac{\Delta t}{N} \left| \sum_{n=0}^{N-1} x_n
    e^{-2\pi i f n \Delta t} \right|^2, \quad f \in [0, f_s),$$


    where $\Delta t = 1/f_s$. The periodogram is asymptotically unbiased but *inconsistent*,
    as its variance does not decrease with $N$. Windowing by $w_n$ produces the *Bartlett*
    estimate


    $$\hat{S}_{xx}^B(f) = \frac{\Delta t}{N U} \left| \sum_{n=0}^{N-1} w_n x_n e^{-2\pi
    i f n \Delta t} \right|^2, \quad U = \frac{1}{N} \sum_{n=0}^{N-1} w_n^2,$$


    which reduces sidelobes at the expense of main-lobe broadening.


    ```

    from scipy.signal import periodogram, get_window

    f, Pxx = periodogram(x, fs=fs, window=''blackman'', scaling=''density'')

    ```


    # Welch''s Method and Multi-taper Spectral Estimates


    Welch


    Partition the record into $K$ overlapped segments of length $L$, apply a window
    $w$, compute each segment periodogram, then average:


    $$\hat{S}_{xx}^W(f) = \frac{1}{K} \sum_{k=0}^{K-1} \hat{S}_{xx,k}^{\text{per}}(f),
    \quad \text{Var}[\hat{S}^W] = \frac{1}{K} \text{Var}(\hat{S}^{\text{per}}),$$


    achieving $\sqrt{K}$ variance reduction. Overlap $50\%$ and Hanning window balance
    independence and data usage.


    Multi-taper (MTM)


    Choose $K = 2NW_b$ orthogonal Slepian tapers $v_k$ optimally concentrated in bandwidth
    $W_b$. The eigenspectra $\hat{S}_k(f) = |\sum_n v_k[n] x_n e^{-2\pi i f n}|^2$
    form a minimum-variance unbiased estimator


    $$\hat{S}^{\text{MTM}}(f) = \frac{1}{K} \sum_{k=0}^{K-1} \hat{S}_k(f).$$'
