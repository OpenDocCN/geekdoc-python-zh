    在 $[0, 1] \\times [0, 0.1]$ 平方度内模拟坐标：\n\n```python\nimport numpy as np\nlam, area\
    \ = 40, 0.1\nk = np.random.poisson(lam*area)\nxy = np.random.rand(k,2)*np.array([1,0.1])\n\
    ```\n\n**叠加与稀疏化** 如果 $N_1, N_2$ 是独立的泊松($\\lambda_1$)、泊松($\\lambda_2$) 过程，则 $N\
    \ = N_1 + N_2$ 是泊松($\\lambda_1 + \\lambda_2$) 过程。*稀疏化*：以概率 $p$ 独立保留每个事件 $\\implies$\
    \ 泊松($p\\lambda$) 过程。\n\n**示例 5.4.7（过滤后的宇宙射线）** 入射宇宙射线 $\\lambda = 120$ 次/分钟；探测器效率\
