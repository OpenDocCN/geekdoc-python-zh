    # 10.3.3 Convolutional and Recurrent Neural Networks


    Deep learning''s modern ascendancy can largely be attributed to architectures
    that exploit *inductive bias*: convolutional neural networks (CNNs) encode translational
    equivariance for grid-structured inputs, while recurrent neural networks (RNNs)
    embody causal ordering for sequences. Subsequent refinements—gated recurrence,
    attention, and large-scale pretraining—broaden the modelling capacity without
    sacrificing statistical efficiency.


    # CNNs for Image Recognition


    # Discrete Convolution


    For image $X \in \mathbb{R}^{C_{\text{in}} \times H \times W}$ and kernel $K \in
    \mathbb{R}^{C_{\text{out}} \times C_{\text{in}} \times k \times k}$, the $(c'',
    h, w)$ output entry is


    $$Y_{c''hw} = \sum_{c=1}^{C_{\text{in}}} \sum_{i=0}^{k-1} \sum_{j=0}^{k-1} K_{c''cij}
    X_{c, h+i, w+j}.$$


    Padding $p$ and stride $s$ adjust spatial resolution: $H_{\text{out}} = \lfloor
    \frac{H-k+2p}{s} \rfloor + 1$.

    **Weight sharing** reduces parameters from $O(C_{\text{out}}C_{\text{in}}HW)$
    to $O(C_{\text{out}}C_{\text{in}}k^2)$, imposing translation equivariance $X \mapsto
    \tau_{\Delta} X \implies Y \mapsto \tau_{\Delta} Y$.


    # Backpropagation


    Denote input gradient $\partial \mathcal{L} / \partial X$ by $\delta X$. Correlation
    identity yields


    $$\delta K_{c''c} = \sum_{h,w} \delta Y_{c''hw} (X_c)_{h:h+k, w:w+k}, \quad \delta
    X = \text{pad}_{k-1}(\delta Y) * \text{flip}(K),$$


    where $*$ denotes convolution and $\text{flip}(K)$ mirrors kernel.


    # Pooling


    Max-pool implements $Y_{hw} = \max_{i,j \in [0,k)} X_{h+i, w+j}$, extracting translation
    invariants. Average-pool preserves energy for globally average pooling (GAP) prior
    to dense classifier.'
