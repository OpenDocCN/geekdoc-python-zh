    # Quantum Chaos Sensing


    Noise-adaptive variational quantum eigensolvers can detect onset of chaos in parameterised
    Hamiltonians by tracking fidelity susceptibility $\chi_F(\lambda) = \sum_{n \neq
    0} \frac{|\langle 0 | \partial_{\lambda} H | n \rangle|^2}{(E_n - E_0)^2}$. Sharp
    growth of $\chi_F$ flags a mobility edge or delocalisation transition, guiding
    adiabatic schedules away from chaotic bottlenecks.


    # 9.5 Data-Driven Dynamics and Modern Tools


    When physical laws are incompletely known or high-dimensional, modern data-centric
    techniques infer governing structures directly from measurements. Two complementary
    paradigms dominate current practice. *Koopman operator theory* lifts nonlinear
    evolution into an infinite-dimensional linear setting whose spectral decomposition
    is estimable through *dynamic mode decomposition*. *Reservoir computing* converts
    short chaotic histories into long-range forecasts by embedding them inside randomly
    connected recurrent networks operating at the edge of stability. This section
    introduces both frameworks with mathematical precision and executable Python prototypes.


    # 9.5.1 Koopman Operator Theory


    Let $\Phi^t : \mathcal{M} \to \mathcal{M}$ be a continuous-time flow on a compact
    phase space and $g : \mathcal{M} \to \mathbb{C}$ an observable. The **Koopman
    operator** is the linear map


    $$\mathcal{K}^t g := g \circ \Phi^t, \quad (\mathcal{K}^{t_1} \circ \mathcal{K}^{t_2})
    = \mathcal{K}^{t_1 + t_2}.$$


    Although defined on an infinite-dimensional function space (e.g., $L^2(\mathcal{M},
    \mu)$), $\mathcal{K}^t$ admits spectral objects (eigenvalues $\lambda_j$, eigenfunctions
    $\varphi_j$) whose finite truncations approximate nonlinear dynamics via


    $$g(\mathbf{x}(t)) = \sum_{j=1}^r a_j e^{\lambda_j t} \varphi_j(\mathbf{x}(0))
    + \epsilon_r(t).$$


    Eigenfunctions propagate multiplicatively, rendering hidden invariant sets visible
    and enabling modal reduction.'
