    # Example 6 (MGF of Exponential($\lambda$))


    $$M_X(t) = \int_0^\infty e^{tx} \lambda e^{-\lambda x} dx = \frac{\lambda}{\lambda
    - t}, \quad t < \lambda.$$


    Moments:


    $$\mu = M''_X(0) = \frac{1}{\lambda}, \quad \sigma^2 = M''''_X(0) - \mu^2 = \frac{1}{\lambda^2}.$$


    # Example 7 (Normal) For $X \sim \mathcal{N}(\mu, \sigma^2)$,


    $$M_X(t) = \exp\left(\mu t + \frac{1}{2}\sigma^2 t^2\right).$$


    This property is key in proofs of the Central Limit Theorem; mgf is quadratic
    $\Rightarrow$ sums of i.i.d. normals remain normal.


    # Example 8 (Sum of Independent Exponentials $\to$ Erlang) If $X_1, \dots, X_n
    \overset{\text{i.i.d.}}{\sim} \text{Exp}(\lambda)$,


    $$M_{S_n}(t) = \left(\frac{\lambda}{\lambda - t}\right)^n, \quad S_n \sim \text{Gamma}(n,
    \lambda).$$


    # Example 9 (MGF Method for Poisson) $X \sim \text{Pois}(\lambda)$:


    $$M_X(t) = \sum_{k=0}^\infty e^{tk} e^{-\lambda} \frac{\lambda^k}{k!} = \exp(\lambda(e^t
    - 1)).$$


    Differentiate:


    $$M''_X(0) = \lambda, \quad M''''_X(0) = \lambda^2 + \lambda \Rightarrow \text{Var}(X)
    = \lambda.$$


    **Cumulant Generating Function** $K_X(t) = \ln M_X(t)$; its derivatives at 0 yield
    cumulants (e.g. first cumulant = mean, second = variance).


    # Example 5.1.12 (Cumulant of Binomial) $K_X(t) = n \ln(1 - p + pe^t)$; $\kappa_1
    = K''(0) = np$, $\kappa_2 = K''''(0) = np(1 - p)$.


    # Moment Inequalities


    $$\text{Var}(X) \geq 0, \quad \mathbb{E}|X - \mu| \leq \sigma \sqrt{\frac{\pi}{2}}
    \text{ (if normal)}.$$


    Chebyshev''s inequality: $\mathbb{P}(|X - \mu| \geq k\sigma) \leq k^{-2}$.'
