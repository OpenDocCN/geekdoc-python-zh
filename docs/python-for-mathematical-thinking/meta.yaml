    y1 = sp.exp(x)\ny2 = sp.dsolve(sp.Eq(sp.diff(sp.Function('y')(x), x, 2) - sp.Function('y')(x),\
    \ 0),\n    ics={sp.Function('y')(x).subs(x,0):y1.subs(x,0),\n         sp.diff(sp.Function('y')(x),x).subs(x,0):sp.diff(y1,x).subs(x,0)})\n\
    ```\n\n**Undetermined Coefficients** For constant-coefficient $L[y] = f(x)$ with\
    \ $f$ a linear combination of $e^{\\alpha x}$, $x^k e^{\\alpha x}$, $\\sin \\\
