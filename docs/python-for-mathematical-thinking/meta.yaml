    # Principal Component Analysis (PCA) for Dimensionality Reduction


    Given normalised X ∈ ℝⁿˣᵖ, PCA diagonalises the covariance matrix Σ = 1/(n-1)
    XᵀX into Σ = VΛVᵀ, providing orthogonal directions (principal components, PCs)
    ordered by variance (eigenvalues).


    **Explained Variance** λₖ / Σⱼ λⱼ quantifies the share of total variance captured
    by PCₖ. Retain first m PCs with Σₖ≤ₘ λₖ / Σⱼ λⱼ ≥ η (e.g. η = 0.9).'
