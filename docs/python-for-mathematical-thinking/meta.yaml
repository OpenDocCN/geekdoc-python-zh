    # 6.3 Special Functions and Transform Techniques


    # 6.3.1 Laplace Transforms and Applications


    The **Laplace transform** converts differentiation in the time domain into algebraic
    multiplication in the complex $s$-plane, thereby linearising initial-value problems
    with piecewise or impulsive forcing. For an almost everywhere locally integrable
    function $f : [0, \infty) \to \mathbb{R}$ of exponential order $e^{\sigma_0 t}$,
    its Laplace transform is


    $$\mathcal{L}\{f\}(s) = F(s) = \int_0^\infty e^{-st} f(t)\,dt, \quad \text{Re}\,s
    > \sigma_0.$'
