    \ + 1)xP_\\ell(x) - \\ell P_{\\ell-1}(x)$.\n\nStable three-term recursions facilitate\
    \ high-order computations.\n\n**Gauss–Legendre Quadrature** Nodes $x_k$ = zeros\
    \ of $P_n$; weights $w_k = 2/[(1 - x_k^2)(P_n'(x_k))^2]$. Integrates polynomials\
    \ of degree $2n - 1$ exactly; routine in numpy.polynomial.legendre.leggauss.\n\
    \n```\nimport numpy.polynomial.legendre as lg\nxk,wk = lg.leggauss(6)\nI = (wk*\
    \ np.exp(xk)).sum() # ∫_{-1}^{1} e^{x}dx ≈ 2.3504\n```\n\n# 6.3.4 Green’s Functions\
    \ and Integral Equations\n\nGreen’s functions recast linear differential operators\
    \ into convolution-like integral kernels, transforming boundary-value problems\
    \ (BVPs) into *a priori* solvable integral equations. They are the continuous\
    \ analogue of matrix inverses: if $L$ is a linear operator acting on a function\
    \ space and $G$ satisfies $LG = \\delta$ under specified boundary conditions,\
    \ then the solution of $Lu = f$ is $u = G * f$. This section first develops the\
    \ method for ordinary differential equations (ODEs), extends the construction\
    \ to partial differential equations (PDEs), and finally relates Green kernels\
    \ to Fredholm integral equations of the second kind.\n\n# Green’s Function for\
    \ ODEs\n\n**Definition (Two-Point BVP)** For a regular, linear, second-order operator\n\
    \n$L[y] := p(x)y'' + q(x)y' + r(x)y, \\quad p(x) \\neq 0 \\text{ on } [a, b]$\n\
    \nwith boundary conditions $B_1y(a) = 0$, $B_2y(b) = 0$ (Dirichlet, Neumann, or\
    \ Robin), the **Green’s function** $G(x, \\xi)$ is the unique solution of\n\n\
    $L_xG(x, \\xi) = \\delta(x - \\xi), \\quad B_1G(a, \\xi) = 0, \\quad B_2G(b, \\\
    xi) = 0,$\n\nviewed as a function of $x$ for fixed $\\xi$."
  - '[PAGE 246]


    **Constructive Recipe** Let $y_1, y_2$ be a fundamental set of homogeneous solutions
    with $B_1 y_1(a) = 0$, $B_2 y_2(b) = 0$. Wronskian $W(y_1, y_2) = p^{-1} W_0 \neq
    0$. Then


    $$G(x, \xi) = \begin{cases} \frac{y_1(x) y_2(\xi)}{W_0}, & a \leq x \leq \xi \leq
    b, \ \frac{y_1(\xi) y_2(x)}{W_0}, & a \leq \xi < x \leq b. \end{cases}$$


    **Example 6.3.12 (Clamped Beam)** $y''''''''(x) = f(x)$ on $0 < x < 1$ with $y(0)
    = y''(0) = y''''(1) = y''''''(1) = 0$. Integrate twice to reduce to second-order
    form, apply recipe, and recover classical cubic-spline kernel $G(x, \xi) = \frac{1}{6}
    \begin{cases} (1 - \xi) x^3 - x^2 \xi^2 / 2, & x < \xi, \ (1 - x) \xi^3 - x^2
    \xi^2 / 2, & x > \xi. \end{cases}$ Verify $L_x G = \delta$ by symbolic differentiation
    in SymPy.


    **Solution Representation** For inhomogeneity $f$,


    $$y(x) = \int_a^b G(x, \xi) f(\xi) \, d\xi.$$


    Linearity ensures superposition; boundary data are built into $G$.


    **Self-adjointness and Symmetry** If $L$ is formally self-adjoint ($q = p''$),
    $G$ satisfies $G(x, \xi) = G(\xi, x)$.


    # Applications to PDEs and Boundary Value Problems


    **Laplace Equation in a Rectangle** Solve $\nabla^2 \phi = -\rho(x, y)$ on $0
    < x < L$, $0 < y < H$ with $\phi|_{\partial \Omega} = 0$. Separation in $x$ yields
    eigenfunctions $\sin \frac{m \pi x}{L}$ and Green kernel


    $$G((x, y), (\xi, \eta)) = \frac{2}{L} \sum_{m=1}^{\infty} \sin \frac{m \pi x}{L}
    \sin \frac{m \pi \xi}{L} \frac{\sinh \frac{m \pi (H - \max\{y, \eta\})}{L}}{\frac{m
    \pi}{L} \sinh \frac{m \pi H}{L}} \sinh \frac{m \pi \min\{y, \eta\}}{L}.$$


    Potential: $\phi(x, y) = \iint_{\Omega} G \rho \, d\xi d\eta$.


    **Heat Equation on $\mathbb{R}$** Fundamental solution $G(x, \xi; t) = \frac{1}{\sqrt{4
    \pi \kappa t}} \exp\left(-\frac{(x - \xi)^2}{4 \kappa t}\right)$ satisfies $\partial_t
    G = \kappa \partial_x^2 G$, $G|_{t=0} = \delta$. Convolution gives classical solution
    $u(x, t) = G * f$. For semi-infinite rod with Dirichlet boundary use *method of
    images*: $G_+ = G(x, \xi; t) - G(x, -\xi; t)$.'
  - '[PAGE 247]


    6.3 Special Functions and Transform Techniques 231


    # Green’s Identity (Boundary Integral)


    For region $\Omega$,

    $$u(\mathbf{x}) = \int_{\Omega} G(\mathbf{x}, \boldsymbol{\xi}) f(\boldsymbol{\xi})
    \, d\boldsymbol{\xi} - \int_{\partial\Omega} \left[ u \, \partial_{n_{\boldsymbol{\xi}}}
    G - G \, \partial_{n_{\boldsymbol{\xi}}} u \right] \, dS_{\boldsymbol{\xi}}.$$

    Boundary element methods (BEM) discretise $\partial\Omega$ using this representation,
    reducing dimensionality by one.


    # Example 6.3.13 (2-D Exterior Potential)


    For Laplace outside a circle, choose free-space Green $G = -\frac{1}{2\pi} \ln
    |\mathbf{x} - \boldsymbol{\xi}|$; impose Neumann boundary integral to solve scattering
    by circular obstacles.


    # Integral Equations and Fredholm Theory


    # Fredholm Integral Equation of the Second Kind


    $$u(x) - \lambda \int_a^b K(x, \xi) u(\xi) \, d\xi = f(x).$$

    With $K$ continuous, Fredholm alternative states either:

    1. $\det(I - \lambda K) \neq 0$: unique solution exists for every $f$.

    2. $\det(I - \lambda K) = 0$: non-trivial homogeneous solutions exist and solvability
    of inhomogeneous problem requires orthogonality to adjoint null-space.


    # Resolvent Kernel Series


    $$R(x, \xi; \lambda) = K + \lambda K^{(2)} + \lambda^2 K^{(3)} + \dots, \quad
    K^{(n)}(x, \xi) = \int_a^b K(x, s) K^{(n-1)}(s, \xi) \, ds,$$

    converges for small $|\lambda|$; solution $u = f + \lambda f * R$.


    # Link to Green’s Functions


    After differentiation, many BVPs map to Fredholm equations with kernel $K(x, \xi)
    = G(x, \xi)$. Numerically: Nyström method samples integral, converting to linear
    system $(I - \lambda A)u = f$.


    # Example 6.3.14 (Volterra Equation from IVP)


    ODE $y''(x) = \lambda y(x) + g(x)$, $y(0) = y_0$ integrates to $y(x) = y_0 + \int_0^x
    \lambda y(s) + g(s) \, ds$: a Volterra equation of the second kind solvable by
    successive substitution (Neumann series), always convergent for finite $x$.


    # Quadrature Approach


    Choose nodes $\{x_j\}$, weights $\{w_j\}$: $u(x_i) - \lambda \sum_j w_j K(x_i,
    x_j) u(x_j) = f(x_i)$. Matrix $(I - \lambda W \circ K)$ inverted by LU or GMRES.
    Spectral Nyström with Gauss–Legendre nodes attains exponential convergence for
    smooth $K$.'
- md: "## 6.4 Stochastic Differential Equations (SDEs)\n\nA **stochastic differential\
    \ equation** supplements an ordinary differential equation with a noise term—traditionally\
    \ Brownian motion—capturing randomness intrinsic to thermal agitation, financial\
    \ markets, or environmental fluctuations. Formally, an Itô SDE in $\\mathbb{R}$\
    \ reads\n\n$$dX_t = \\mu(t, X_t)\\,dt + \\sigma(t, X_t)\\,dW_t, \\quad X_0 = x_0,$$\n\
    \nwhere $W_t$ is standard Brownian motion, $\\mu$ the *drift*, and $\\sigma$ the\
    \ *diffusion coefficient*. Unlike deterministic ODEs, SDE solutions are *stochastic\
    \ processes*—random functions of time—requiring a calculus that respects Brownian\
    \ path roughness.\n\n### 6.4.1 Introduction to SDEs\n\nClassical Newtonian dynamics\
    \ $dx/dt = v$ presumes differentiable trajectories; Brownian trajectories are\
    \ almost surely nowhere differentiable. Einstein's 1905 model for pollen particles\
    \ suggested the *mean square displacement* grows linearly: $\\mathbb{E}[(X_t -\
    \ X_0)^2] = 2Dt$. Langevin refined this via\n\n$$m\\,dV_t = -\\gamma V_t\\,dt\
    \ + \\sqrt{2\\gamma k_B T}\\,dW_t,$$\n\nwhere the stochastic term models impulsive\
    \ molecular kicks. Interpreting $dW_t$ as the limit of symmetric, variance-$dt$\
    \ Gaussian increments motivates the modern Itô integral.\n\n### Brownian Motion\
    \ and Stochastic Processes\n\n**Standard Brownian motion** $\\{W_t\\}_{t \\ge\
    \ 0}$ satisfies\n\n1.  $W_0 = 0$ almost surely.\n2.  Independent increments: $W_{t+s}\
    \ - W_t$ is independent of $\\mathcal{F}_t$.\n3.  Gaussian increments: $W_{t+s}\
    \ - W_t \\sim \\mathcal{N}(0, s)$.\n4.  Continuous paths.\n\nMoments: $\\mathbb{E}[W_t]\
    \ = 0$, $\\text{Var}(W_t) = t$, $\\text{Cov}(W_s, W_t) = \\min(s, t)$.\n\n**Quadratic\
    \ Variation** Partition $[0, t]$ into $0 = t_0 < \\cdots < t_n = t$; Brownian\
    \ quadratic variation converges in probability:\n\n$$\\sum_{k=0}^{n-1} (W_{t_{k+1}}\
    \ - W_{t_k})^2 \\xrightarrow{\\mathbb{P}} t.$$\n\nThis property underlies Itô's\
    \ formula.\n\n![Fig. 6.13 One realisation of standard Brownian motion $W(t)$ on\
    \ the interval $0 \\le t \\le 1$, generated via $\\Delta W_k \\sim \\mathcal{N}(0,\
    \ \\Delta t)$ with $\\Delta t = 1/500$. The path is continuous but nowhere differentiable,\
    \ exhibiting the characteristic jaggedness of Wiener processes](img/9724708489e3df346f9e31e3fa6e5746_249_0.png)\n\
    \n**Simulating Brownian Paths** Discretise $t_k = k \\Delta t$; increments $\\\
    Delta W_k \\sim \\mathcal{N}(0, \\Delta t)$ (cf. Fig. 6.13).\n\n```python\nimport\
    \ numpy as np, matplotlib.pyplot as plt\nT,N = 1.0, 500\ndt = T/N\nΔW = np.sqrt(dt)*np.random.randn(N)\n\
    W = np.insert(np.cumsum(ΔW), 0, 0)\nplt.plot(np.linspace(0, T, N+1), W); plt.show()\n\
    ```\n\n### Itô’s Lemma and Stochastic Calculus\n\n**Itô Integral** For an adapted\
    \ process $H_t$ with $\\int_0^T \\sigma_H^2(t) \\, dt < \\infty$, define\n\n$$\\\
    int_0^T H_t \\, dW_t := \\text{L}^2 - \\lim_{n \\to \\infty} \\sum_{k=0}^{n-1}\
    \ H_{t_k} (W_{t_{k+1}} - W_{t_k}),$$\n\nwhere the integrand is *left point sampled*,\
    \ crucial for martingale preservation.\n\n**Itô’s lemma** (1-d). Let $X_t$ satisfy\
    \ $dX_t = \\mu(t, X_t) \\, dt + \\sigma(t, X_t) \\, dW_t$ and $f(t, x) \\in C^{1,2}$.\
    \ Then\n\n$$df(t, X_t) = \\left( f_t + \\mu f_x + \\frac{1}{2} \\sigma^2 f_{xx}\
    \ \\right) dt + \\sigma f_x \\, dW_t.$$\n\nObserve the $\\frac{1}{2} \\sigma^2\
    \ f_{xx}$ term stemming from quadratic variation.\n\n![Fig. 6.14 Single realisation\
    \ of geometric Brownian motion $S(t) = S_0 \\exp\\left[(\\alpha - \\frac{1}{2}\\\
    beta^2)t + \\beta W(t)\\right]$ with $S_0 = 100$, $\\alpha = 0.10$, $\\beta =\
    \ 0.20$ over one year ($N = 252$). The multiplicative noise produces a log-normal\
    \ trajectory whose expected growth rate equals $\\alpha$](img/9724708489e3df346f9e31e3fa6e5746_250_0.png)\n\
    \n**Example 6.4.1 (Geometric Brownian Motion (GBM) (cf. Fig. 6.14))** $dS_t =\
    \ \\alpha S_t dt + \\beta S_t dW_t$. With $f(s) = \\ln s$, Itô's lemma gives\n\
    \n$$d \\ln S_t = (\\alpha - \\frac{1}{2}\\beta^2) dt + \\beta dW_t \\implies S_t\
    \ = S_0 \\exp\\left((\\alpha - \\frac{1}{2}\\beta^2)t + \\beta W_t\\right).$$\n\
    \n```python\nS0, alpha, beta, T, N = 100, .1, .2, 1, 252\ndt = T/N\nW = np.cumsum(np.sqrt(dt)*np.random.randn(N))\n\
    t = np.linspace(dt, T, N)\nS = S0*np.exp((alpha-0.5*beta**2)*t + beta*W)\nplt.plot(t,\
    \ S); plt.show()\n```\n\n**Girsanov Theorem (Øksendal 2003)** Under new measure\
    \ $\\mathbb{Q}$ defined by Radon–Nikodym density $\\frac{d\\mathbb{Q}}{d\\mathbb{P}}\
    \ = \\exp\\left(-\\int_0^T \\theta dW_t - \\frac{1}{2}\\int_0^T \\theta^2 dt\\\
    right)$, process $W_t^{\\mathbb{Q}} = W_t + \\int_0^t \\theta ds$ is Brownian\
    \ in $\\mathbb{Q}$. Tool for risk-neutral evaluation in finance and change-of-drift\
    \ reductions in filtering theory.\n\n**Moment Evolution via Itô** For OU process\
    \ $dX_t = -\\gamma X_t dt + \\sigma dW_t$, choose $f(x) = x^2$ to obtain $d(X_t^2)\
    \ = (\\sigma^2 - 2\\gamma X_t^2) dt + 2\\sigma X_t dW_t$. Taking expectations\
    \ gives ODE $\\partial_t \\mathbb{E}[X_t^2] = \\sigma^2 - 2\\gamma \\mathbb{E}[X_t^2]\
    \ \\implies$ stationary variance $\\sigma^2/(2\\gamma)$.\n\n**Stratonovich vs.\
    \ Itô** Stratonovich integral uses midpoint sampling; chain rule matches classical\
    \ calculus. Conversion: $dX_t^{\\text{Strat}} = dX_t + \\frac{1}{2}\\sigma \\\
    sigma_x dt$. Physical models with white-noise limits of coloured noise often prefer\
    \ Stratonovich; financial models favour Itô for martingale properties.\n\n###\
    \ 6.4.2 Numerical Solutions of SDEs\n\nExact solutions exist only for a narrow\
    \ family of SDEs. Monte Carlo simulation therefore becomes the primary tool for\
    \ estimating expectations, hitting probabilities, or path-dependent payoffs. Discretisation\
    \ error must now account for the distributional convergence of random paths. We\
    \ review two strong-order schemes—Euler–Maruyama and Milstein—and outline higher-order\
    \ extensions based on multiple stochastic integrals.\n\n### Euler–Maruyama Method\n\
    \nGiven Itô SDE\n\n$$dX_t = \\mu(X_t, t) dt + \\sigma(X_t, t) dW_t, \\quad X_0\
    \ = x_0,$$\n\nand time partition $0 = t_0 < \\cdots < t_N = T$ with $\\Delta t\
    \ = t_{n+1} - t_n$, Euler–Maruyama (EM) sets\n\n$$X_{n+1} = X_n + \\mu(X_n, t_n)\
    \ \\Delta t + \\sigma(X_n, t_n) \\Delta W_n, \\quad \\Delta W_n \\sim \\mathcal{N}(0,\
    \ \\Delta t).$$\n\nStrong order 0.5: $\\mathbb{E}[|X_T - X_N|^2] = O((\\Delta\
    \ t)^1)$. Weak order 1: $|\\mathbb{E}[\\varphi(X_T)] - \\mathbb{E}[\\varphi(X_N)]|\
    \ = O(\\Delta t)$ for sufficiently smooth $\\varphi$.\n\n**Example 6.4.2 (Ornstein–Uhlenbeck\
    \ (OU) Convergence)** OU: $dX_t = -\\gamma X_t dt + \\sigma dW_t$ with analytic\
    \ solution $X_T = x_0 e^{-\\gamma T} + \\sigma \\int_0^T e^{-\\gamma(T-s)} dW_s$.\
    \ Simulate EM for $T = 1$, $\\gamma = 1$, $\\sigma = 0.5$ and compare empirical\
    \ mean $\\mathbb{E}[X_T]$ with exact $x_0 e^{-\\gamma T}$ across step sizes $\\\
    Delta t = 2^{-k}$.\n\n```python\nimport numpy as np\ndef OU_EM(x0, gamma, sigma,\
    \ T, N, M=10_000):\n    dt, sqdt = T/N, np.sqrt(T/N)\n    X = np.full(M, x0)\n\
    \    for _ in range(N):\n        X += -gamma*X*dt + sigma*sqdt*np.random.randn(M)\n\
    \    return X\nx0, gamma, sigma = 1.0, 1, 0.5\nfor k in range(6):\n    N = 2**k\n\
    \    samples = OU_EM(x0, gamma, sigma, 1, N)\n    print(N, samples.mean())\n```\n\
    \nEmpirical bias decays proportionally to $\\Delta t^{0.5}$, confirming strong-order\
    \ theory.\n\n**Mean-Square Stability** For the linear SDE $dX_t = \\lambda X_t\
    \ dt + \\eta X_t dW_t$, EM is stable iff $1 + 2\\lambda \\Delta t + \\eta^2 \\\
    Delta t < 1 \\implies \\lambda \\Delta t < -\\frac{1}{2}\\eta^2 \\Delta t$. Shrinking\
    \ $\\Delta t$ cannot stabilise if $\\lambda > 0$ with too large $\\eta$ (mean-square\
    \ instability); implicit EM variants or tamed schemes remedy this for stiff SDEs.\n\
    \n### Milstein Method and Higher-Order Approximations\n\nMilstein augments EM\
    \ with a *Lévy area* correction capturing first-order terms of Itô–Taylor expansion:\n\
    \n$$X_{n+1} = X_n + \\mu_n \\Delta t + \\sigma_n \\Delta W_n + \\frac{1}{2} \\\
    sigma_n \\sigma'_n [(\\Delta W_n)^2 - \\Delta t],$$\n\nwhere $\\sigma'_n = \\\
    partial_x \\sigma(X_n, t_n)$.\n\n**Strong Order 1** Milstein doubles convergence\
    \ exponent for SDEs with scalar noise. Cost overhead is marginal (one extra derivative\
    \ evaluation per step).\n\n**Example 6.4.3 (GBM with Milstein)** $dS_t = \\alpha\
    \ S_t \\, dt + \\beta S_t \\, dW_t$ has $\\sigma(x) = \\beta x$, $\\sigma'(x)\
    \ = \\beta$. Milstein update simplifies to\n\n$$S_{n+1} = S_n + \\alpha S_n \\\
    Delta t + \\beta S_n \\Delta W_n + \\frac{1}{2} \\beta^2 S_n [(\\Delta W_n)^2\
    \ - \\Delta t].$$\n\nSimulate for $\\alpha = 0.05$, $\\beta = 0.2$, $T = 1$ and\
    \ verify root-mean-square error decays like $O(\\Delta t)$, whereas EM decays\
    \ like $O(\\Delta t^{1/2})$.\n\n```python\ndef GBM_Milstein(S0, alpha, beta, T,\
    \ N, M=50_000):\n    dt, sqdt = T/N, np.sqrt(T/N)\n    S = np.full(M, S0)\n  \
    \  for _ in range(N):\n        dW = sqdt*np.random.randn(M)\n        S += alpha*S*dt\
    \ + beta*S*dW + .5*beta**2*S*(dW**2 - dt)\n    return S\n```\n\n**Multi-dimensional\
    \ Noise** When $\\mathbf{W}_t$ is $m$-dimensional, Milstein requires iterated\
    \ stochastic integrals $I_{ij} = \\int_{t_n}^{t_{n+1}} \\int_{t_n}^s dW^i \\,\
    \ dW^j$—computationally heavy. Stochastic Runge–Kutta (SRK) schemes of strong\
    \ order 1 sample approximate $I_{ij}$ via random variables with the same moments.\n\
    \n**Weak Order Schemes** If only expectations of functionals matter (e.g. option\
    \ pricing), weak Runge–Kutta methods achieve order 2 without iterated integrals\
    \ by antithetic or stratified random increments.\n\n**Tamed Euler for Super-Linear\
    \ Drift** For $\\mu(x) = x^3$ the moments explode for EM. Replace drift by $\\\
    mu_{\\text{tame}}(x) = \\mu(x)/(1 + \\Delta t|\\mu(x)|)$; retains strong order\
    \ 0.5 and preserves stability.\n\n### 6.4.3 Applications of SDEs\n\n**Financial\
    \ Modelling: Black–Scholes Equation**\n\nStock model $dS_t = \\mu S_t \\, dt +\
    \ \\sigma S_t \\, dW_t$ implies discounted price $e^{-rt} S_t$ is a martingale\
    \ under risk-neutral measure $\\mathbb{Q}$ with drift $r$. By Itô and no-arbitrage"
  mdcn: "## 6.4 随机微分方程（SDEs）\n\n**随机微分方程**在常微分方程的基础上增加了一个噪声项——传统上是布朗运动——用以捕捉热扰动、金融市场或环境波动中固有的随机性。形式上，一个在\
    \ $\\mathbb{R}$ 中的伊藤随机微分方程写作\n\n$$dX_t = \\mu(t, X_t)\\,dt + \\sigma(t, X_t)\\\
    ,dW_t, \\quad X_0 = x_0,$$\n\n其中 $W_t$ 是标准布朗运动，$\\mu$ 是*漂移项*，$\\sigma$ 是*扩散系数*。与确定性常微分方程不同，随机微分方程的解是*随机过程*——时间的随机函数——需要一种尊重布朗路径粗糙性的微积分。\n\
    \n### 6.4.1 随机微分方程简介\n\n经典牛顿动力学 $dx/dt = v$ 假设轨迹是可微的；而布朗轨迹几乎必然处处不可微。爱因斯坦1905年对花粉颗粒的模型表明*均方位移*呈线性增长：$\\\
    mathbb{E}[(X_t - X_0)^2] = 2Dt$。朗之万通过以下方程对此进行了改进\n\n$$m\\,dV_t = -\\gamma V_t\\\
    ,dt + \\sqrt{2\\gamma k_B T}\\,dW_t,$$\n\n其中随机项模拟了分子的脉冲式撞击。将 $dW_t$ 解释为对称、方差为\
    \ $dt$ 的高斯增量的极限，这启发了现代伊藤积分。\n\n### 布朗运动与随机过程\n\n**标准布朗运动** $\\{W_t\\}_{t \\ge\
    \ 0}$ 满足\n\n1.  $W_0 = 0$ 几乎必然成立。\n2.  独立增量：$W_{t+s} - W_t$ 与 $\\mathcal{F}_t$\
    \ 独立。\n3.  高斯增量：$W_{t+s} - W_t \\sim \\mathcal{N}(0, s)$。\n4.  连续路径。\n\n矩：$\\\
    mathbb{E}[W_t] = 0$，$\\text{Var}(W_t) = t$，$\\text{Cov}(W_s, W_t) = \\min(s, t)$。\n\
    \n**二次变差** 将区间 $[0, t]$ 划分为 $0 = t_0 < \\cdots < t_n = t$；布朗运动的二次变差依概率收敛：\n\n\
    $$\\sum_{k=0}^{n-1} (W_{t_{k+1}} - W_{t_k})^2 \\xrightarrow{\\mathbb{P}} t.$$\n\
    \n这一性质是伊藤公式的基础。\n\n![图 6.13 标准布朗运动 $W(t)$ 在区间 $0 \\le t \\le 1$ 上的一次实现，通过 $\\\
    Delta W_k \\sim \\mathcal{N}(0, \\Delta t)$ 生成，其中 $\\Delta t = 1/500$。路径连续但处处不可微，表现出维纳过程特有的锯齿状](img/9724708489e3df346f9e31e3fa6e5746_249_0.png)\n\
    \n**模拟布朗路径** 将时间离散化为 $t_k = k \\Delta t$；增量 $\\Delta W_k \\sim \\mathcal{N}(0,\
    \ \\Delta t)$（参见图 6.13）。\n\n```python\nimport numpy as np, matplotlib.pyplot as\
    \ plt\nT,N = 1.0, 500\ndt = T/N\nΔW = np.sqrt(dt)*np.random.randn(N)\nW = np.insert(np.cumsum(ΔW),\
    \ 0, 0)\nplt.plot(np.linspace(0, T, N+1), W); plt.show()\n```\n\n### 伊藤引理与随机微积分\n\
    \n**伊藤积分** 对于一个适应过程 $H_t$，若满足 $\\int_0^T \\sigma_H^2(t) \\, dt < \\infty$，则定义\n\
    \n$$\\int_0^T H_t \\, dW_t := \\text{L}^2 - \\lim_{n \\to \\infty} \\sum_{k=0}^{n-1}\
    \ H_{t_k} (W_{t_{k+1}} - W_{t_k}),$$\n\n其中被积函数采用*左端点采样*，这对于保持鞅性质至关重要。\n\n**伊藤引理**（一维情形）。设\
    \ $X_t$ 满足 $dX_t = \\mu(t, X_t) \\, dt + \\sigma(t, X_t) \\, dW_t$，且 $f(t, x)\
    \ \\in C^{1,2}$。则\n\n$$df(t, X_t) = \\left( f_t + \\mu f_x + \\frac{1}{2} \\sigma^2\
    \ f_{xx} \\right) dt + \\sigma f_x \\, dW_t.$$\n\n注意其中的 $\\frac{1}{2} \\sigma^2\
    \ f_{xx}$ 项源于二次变差。\n\n![图 6.14 几何布朗运动 $S(t) = S_0 \\exp\\left[(\\alpha - \\frac{1}{2}\\\
    beta^2)t + \\beta W(t)\\right]$ 的一次实现，其中 $S_0 = 100$，$\\alpha = 0.10$，$\\beta\
    \ = 0.20$，时间跨度为一年（$N = 252$）。乘性噪声产生了一个对数正态轨迹，其期望增长率等于 $\\alpha$](img/9724708489e3df346f9e31e3fa6e5746_250_0.png)\n\
    \n**例 6.4.1（几何布朗运动（GBM）（参见图 6.14））** $dS_t = \\alpha S_t dt + \\beta S_t dW_t$。取\
    \ $f(s) = \\ln s$，由伊藤引理得\n\n$$d \\ln S_t = (\\alpha - \\frac{1}{2}\\beta^2) dt\
    \ + \\beta dW_t \\implies S_t = S_0 \\exp\\left((\\alpha - \\frac{1}{2}\\beta^2)t\
    \ + \\beta W_t\\right).$$\n\n```python\nS0, alpha, beta, T, N = 100, .1, .2, 1,\
    \ 252\ndt = T/N\nW = np.cumsum(np.sqrt(dt)*np.random.randn(N))\nt = np.linspace(dt,\
    \ T, N)\nS = S0*np.exp((alpha-0.5*beta**2)*t + beta*W)\nplt.plot(t, S); plt.show()\n\
    ```\n\n**吉尔萨诺夫定理（Øksendal 2003）** 在由 Radon–Nikodym 密度 $\\frac{d\\mathbb{Q}}{d\\\
    mathbb{P}} = \\exp\\left(-\\int_0^T \\theta dW_t - \\frac{1}{2}\\int_0^T \\theta^2\
    \ dt\\right)$ 定义的新测度 $\\mathbb{Q}$ 下，过程 $W_t^{\\mathbb{Q}} = W_t + \\int_0^t \\\
    theta ds$ 在 $\\mathbb{Q}$ 下是布朗运动。这是金融中风险中性估值和滤波理论中漂移变换的工具。\n\n**通过伊藤引理推导矩演化**\
    \ 对于奥恩斯坦-乌伦贝克（OU）过程 $dX_t = -\\gamma X_t dt + \\sigma dW_t$，选择 $f(x) = x^2$ 可得\
    \ $d(X_t^2) = (\\sigma^2 - 2\\gamma X_t^2) dt + 2\\sigma X_t dW_t$。取期望得到常微分方程\
    \ $\\partial_t \\mathbb{E}[X_t^2] = \\sigma^2 - 2\\gamma \\mathbb{E}[X_t^2] \\\
    implies$ 稳态方差为 $\\sigma^2/(2\\gamma)$。\n\n**斯特拉托诺维奇积分与伊藤积分** 斯特拉托诺维奇积分采用中点采样；其链式法则与经典微积分一致。转换关系：$dX_t^{\\\
    text{Strat}} = dX_t + \\frac{1}{2}\\sigma \\sigma_x dt$。具有色噪声白噪声极限的物理模型通常偏好斯特拉托诺维奇形式；金融模型则因其鞅性质而偏好伊藤形式。\n\
    \n### 6.4.2 随机微分方程的数值解\n\n精确解仅存在于一小类随机微分方程中。因此，蒙特卡洛模拟成为估计期望值、首达概率或路径依赖收益的主要工具。离散化误差现在必须考虑随机路径的分布收敛性。我们回顾两种强收敛格式——欧拉-丸山法和米尔斯坦法——并概述基于多重随机积分的高阶扩展。\n\
    \n### 欧拉-丸山法\n\n给定伊藤随机微分方程\n\n$$dX_t = \\mu(X_t, t) dt + \\sigma(X_t, t) dW_t,\
    \ \\quad X_0 = x_0,$$\n\n以及时间划分 $0 = t_0 < \\cdots < t_N = T$，其中 $\\Delta t =\
    \ t_{n+1} - t_n$，欧拉-丸山（EM）格式设定\n\n$$X_{n+1} = X_n + \\mu(X_n, t_n) \\Delta t +\
    \ \\sigma(X_n, t_n) \\Delta W_n, \\quad \\Delta W_n \\sim \\mathcal{N}(0, \\Delta\
    \ t).$$\n\n强收敛阶为 0.5：$\\mathbb{E}[|X_T - X_N|^2] = O((\\Delta t)^1)$。弱收敛阶为 1：对于足够光滑的\
    \ $\\varphi$，有 $|\\mathbb{E}[\\varphi(X_T)] - \\mathbb{E}[\\varphi(X_N)]| = O(\\\
    Delta t)$。\n\n**例 6.4.2（奥恩斯坦-乌伦贝克（OU）过程收敛性）** OU过程：$dX_t = -\\gamma X_t dt + \\\
    sigma dW_t$，其解析解为 $X_T = x_0 e^{-\\gamma T} + \\sigma \\int_0^T e^{-\\gamma(T-s)}\
    \ dW_s$。对 $T = 1$，$\\gamma = 1$，$\\sigma = 0.5$ 模拟EM格式，并在不同步长 $\\Delta t = 2^{-k}$\
    \ 下比较经验均值 $\\mathbb{E}[X_T]$ 与精确值 $x_0 e^{-\\gamma T}$。\n\n```python\nimport numpy\
    \ as np\ndef OU_EM(x0, gamma, sigma, T, N, M=10_000):\n    dt, sqdt = T/N, np.sqrt(T/N)\n\
    \    X = np.full(M, x0)\n    for _ in range(N):\n        X += -gamma*X*dt + sigma*sqdt*np.random.randn(M)\n\
    \    return X\nx0, gamma, sigma = 1.0, 1, 0.5\nfor k in range(6):\n    N = 2**k\n\
    \    samples = OU_EM(x0, gamma, sigma, 1, N)\n    print(N, samples.mean())\n```\n\
    \n经验偏差以 $\\Delta t^{0.5}$ 的比例衰减，证实了强收敛阶理论。\n\n**均方稳定性** 对于线性随机微分方程 $dX_t = \\\
    lambda X_t dt + \\eta X_t dW_t$，EM格式稳定的充要条件是 $1 + 2\\lambda \\Delta t + \\eta^2\
    \ \\Delta t < 1 \\implies \\lambda \\Delta t < -\\frac{1}{2}\\eta^2 \\Delta t$。如果\
    \ $\\lambda > 0$ 且 $\\eta$ 过大（均方不稳定），缩小 $\\Delta t$ 无法使其稳定；隐式EM变体或驯化格式可解决刚性随机微分方程的这一问题。\n\
    \n### 米尔斯坦法与高阶近似\n\n米尔斯坦法在EM格式基础上增加了一个*莱维面积*修正项，以捕捉伊藤-泰勒展开的一阶项：\n\n$$X_{n+1} =\
    \ X_n + \\mu_n \\Delta t + \\sigma_n \\Delta W_n + \\frac{1}{2} \\sigma_n \\sigma'_n\
    \ [(\\Delta W_n)^2 - \\Delta t],$$\n\n其中 $\\sigma'_n = \\partial_x \\sigma(X_n,\
    \ t_n)$。\n\n**强收敛阶 1** 对于具有标量噪声的随机微分方程，米尔斯坦法将收敛指数提高了一倍。计算开销很小（每步增加一次导数计算）。\n\n\
    **例 6.4.3（使用米尔斯坦法的GBM）** $dS_t = \\alpha S_t \\, dt + \\beta S_t \\, dW_t$，其中\
    \ $\\sigma(x) = \\beta x$，$\\sigma'(x) = \\beta$。米尔斯坦更新简化为\n\n$$S_{n+1} = S_n\
    \ + \\alpha S_n \\Delta t + \\beta S_n \\Delta W_n + \\frac{1}{2} \\beta^2 S_n\
    \ [(\\Delta W_n)^2 - \\Delta t].$$\n\n对 $\\alpha = 0.05$，$\\beta = 0.2$，$T = 1$\
    \ 进行模拟，并验证均方根误差以 $O(\\Delta t)$ 的速度衰减，而EM格式以 $O(\\Delta t^{1/2})$ 的速度衰减。\n\n```python\n\
    def GBM_Milstein(S0, alpha, beta, T, N, M=50_000):\n    dt, sqdt = T/N, np.sqrt(T/N)\n\
    \    S = np.full(M, S0)\n    for _ in range(N):\n        dW = sqdt*np.random.randn(M)\n\
    \        S += alpha*S*dt + beta*S*dW + .5*beta**2*S*(dW**2 - dt)\n    return S\n\
    ```\n\n**多维噪声** 当 $\\mathbf{W}_t$ 是 $m$ 维时，米尔斯坦法需要迭代随机积分 $I_{ij} = \\int_{t_n}^{t_{n+1}}\
    \ \\int_{t_n}^s dW^i \\, dW^j$——计算量很大。强收敛阶为 1 的随机龙格-库塔（SRK）格式通过具有相同矩的随机变量来近似采样\
    \ $I_{ij}$。\n\n**弱收敛格式** 如果只关心泛函的期望值（例如期权定价），弱龙格-库塔方法通过对偶或分层随机增量，在不使用迭代积分的情况下达到二阶收敛。\n\
    \n**针对超线性漂移的驯化欧拉法** 对于 $\\mu(x) = x^3$，EM格式的矩会发散。将漂移项替换为 $\\mu_{\\text{tame}}(x)\
    \ = \\mu(x)/(1 + \\Delta t|\\mu(x)|)$；这保持了强收敛阶 0.5 并维持了稳定性。\n\n### 6.4.3 随机微分方程的应用\n\
    \n**金融建模：布莱克-斯科尔斯方程**\n\n股票模型 $dS_t = \\mu S_t \\, dt + \\sigma S_t \\, dW_t$\
    \ 意味着折现价格 $e^{-rt} S_t$ 在风险中性测度 $\\mathbb{Q}$ 下是一个鞅，其漂移为 $r$。根据伊藤引理和无套利原理"
