  md: '# 4.4 Graph Theory and Algorithms


    Graph theory studies discrete structures consisting of nodes (vertices) connected
    by links (edges). Graphs model networks in mathematics, computer science, biology,
    and social sciences—ranging from road maps and electrical circuits to social connections
    and neural networks. A **graph algorithm** is any procedure that operates on such
    structures: searching, traversing, finding shortest paths, or detecting cycles.


    # 4.4.1 Introduction to Graph Theory


    # Graphs as Mathematical Structures


    Formally, a (simple) graph $G$ is a pair $G = (V, E)$, where:


    +   - $V$ is a finite set of vertices $\{v_1, v_2, \dots, v_n\}$.

    - $E \subseteq \{\{u, v\} \mid u, v \in V, u \neq v\}$ is the set of undirected
    edges.


    A **directed graph** (or digraph) uses ordered pairs: $E \subseteq V \times V$.


    # Terminology


    +   - Degree: number of edges incident to a vertex.

    - Path: sequence of vertices connected by edges.

    - Cycle: path that starts and ends at the same vertex.

    - Connected: every pair of vertices is reachable.

    - Tree: connected acyclic graph.

    - Weighted graph: edges have associated weights (costs).


    **Example 4.4.1 (Simple Undirected Graph)** Let $V = \{1, 2, 3\}$, $E = \{\{1,
    2\}, \{2, 3\}\}$. This can be visualised as a path: $1 \leftrightarrow 2 \leftrightarrow
    3$.


    **Example 4.4.2 (Directed Graph with Weights)** Let $V = \{A, B, C\}$, and:


    $$E = \{(A, B, 3), (B, C, 2), (A, C, 10)\}$$


    This represents a weighted digraph with paths and costs.


    **Example 4.4.3 (Adjacency Matrix and Degree Sequence)** For the graph


    $$G = (V, E), \quad V = \{0, 1, 2\}, \quad E = \{(0, 1), (1, 2), (0, 2)\},$$'
