    **Example 5.2.13 (Spearman vs. Pearson Under Monotone Nonlinear Transform)** $X
    \sim \text{Uniform}(0, 1)$, $Y = X^2$. Pearson $\rho \approx 0.97$ (still high),
    while Spearman $\rho_s = 1$ (perfect monotone).


    ```

    X = np.random.rand(300)

