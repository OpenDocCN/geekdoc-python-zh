    $$\nabla f = \begin{pmatrix} 6x + 2y \ 2x + 2y \end{pmatrix}.$


    # Directional Derivatives


    The **directional derivative** of $f$ at point $\mathbf{a}$ in direction $\mathbf{v}
    \in \mathbb{R}^n$ is:


    $$D_{\mathbf{v}}f(\mathbf{a}) = \nabla f(\mathbf{a}) \cdot \frac{\mathbf{v}}{\|\mathbf{v}\|}.$


    This gives the rate of change of $f$ along $\mathbf{v}$, scaled by its unit length.


    **Example 3.3.2 (Directional Derivative at a Point)** Let $f(x, y) = x^2y + y^3$.
