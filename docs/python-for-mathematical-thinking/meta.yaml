    \ costs $O(n^2)$ memory. Broyden's update starts with $B_0 = I$ and iteratively\
    \ refines $B_k$ so that $B_{k+1}\\Delta x_k = \\Delta F_k$, achieving super-linear\
    \ convergence with $O(n)$ storage.\n\n## Remarks on Practical Use\n\n- Always\
    \ pair Newton steps with a bracketing or line-search safeguard.\n- Scale variables\
    \ so the Jacobian is well-conditioned; otherwise use trust-region variants (Levenberg–Marquardt).\n\
    - In ill-posed problems finite-difference Jacobians introduce cancellation error;\
    \ complex-step differentiation ($f'(x) \\approx \\text{Im } f(x + i\\varepsilon)/\\\
    varepsilon$) yields machine-precision derivatives cheaply.\n\n## 8.1.3 Other Root-Finding\
    \ Methods\n\nEven though Newton's method dominates root-finding when derivatives\
    \ are available and good initial guesses are known, practical computing often\
    \ demands derivative-free or globally convergent algorithms, as well as methods\
    \ that operate in the complex plane. We therefore survey three complementary classes:\
    \ secant-type two-point iterations, safeguarded hybrids epitomised by Brent's\
    \ algorithm, and complex-domain techniques for polynomials and analytic functions.\n\
    \n## Secant Method and False Position Method\n\n**Secant Method (Order $\\varphi\
    \ \\approx 1.618$)**\n\nStarting with distinct points $x_{k-1}, x_k$, the secant\
    \ iteration\n\n$$x_{k+1} = x_k - f(x_k) \\frac{x_k - x_{k-1}}{f(x_k) - f(x_{k-1})}$$\n\
    \napproximates $f'(x_k)$ by the *secant slope*. Under the same hypotheses as Newton\
    \ (simple root $r$, $f'(r) \\neq 0$) and $x_0, x_1$ sufficiently close to $r$,\
    \ the error satisfies $e_{k+1} \\approx C e_k^{\\varphi}$ with $\\varphi = \\\
    frac{1}{2}(1 + \\sqrt{5})$, super-linear but sub-quadratic. Each update costs\
    \ one function evaluation, so its *asymptotic efficiency index* $p^{1/c}$ ($p$\
    \ = order, $c$ = evaluations) equals $2^{1/1.618}$, beating Newton's $2^{1/2}$\
    \ in evaluation-limited regimes.\n\n**False Position (regula falsi)**\n\nLike\
    \ bisection, false position preserves bracketing yet updates only the endpoint\
    \ where the sign agrees with $f(x_{k+1})$:\n\n$$x_{k+1} = b_k - f(b_k) \\frac{b_k\
    \ - a_k}{f(b_k) - f(a_k)}.$$\n\nAlthough it can stagnate when one endpoint \"\
    sticks\", *modified* variants (Illinois, Anderson–Björck) scale the stationary\
    \ function value to restore linear convergence comparable to bisection but with\
    \ fewer iterations.\n\n**Example 8.1.3 (Secant vs. Newton)** Solve $f(x) = \\\
    cos x - x$ in $(0, 1)$. With $x_0 = 0$, $x_1 = 1$ the secant method converges\
    \ in 6 iterations, Newton (starting at $x_0 = 0.5$) in 4; each uses six function\
    \ evaluations.\n\n```python\nimport numpy as np\ndef secant(f, x0, x1, tol=1e-12,\
    \ max_iter=30):\n    for k in range(max_iter):\n        x2 = x1 - f(x1)*(x1-x0)/(f(x1)-f(x0))\n\
    \        if abs(x2-x1) < tol: return x2, k+1\n        x0, x1 = x1, x2\n    raise\
    \ RuntimeError\nroot, iters = secant(lambda x: np.cos(x)-x, 0.0, 1.0)\n```\n\n\
    ## Brent's Method and Hybrid Techniques\n\nBrent's algorithm (`scipy.optimize.brentq`)\
    \ melds bisection, secant, and inverse-quadratic interpolation:\n\n$$IQI: \\quad\
    \ x_{k+1} = u f(b_k)f(c_k) + v f(a_k)f(c_k) + w f(a_k)f(b_k),$$\n\nwhere $u, v,\
    \ w$ are barycentric weights chosen so $x \\mapsto f(x)$ is interpolated by a\
    \ quadratic through $(a_k, b_k, c_k)$. At each step Brent\n\n1. Attempts an IQI\
    \ step\n2. Falls back to a secant step if IQI exits the bracket or does not decrease\
    \ the interval fast enough\n3. Reverts to bisection when necessary to guarantee\
    \ progress\n\nThis adaptive strategy retains *global* convergence and super-linear\
    \ speed, achieving near-optimal performance for smooth functions without user\
    \ tuning. The worst-case iteration count equals that of bisection; typical convergence\
    \ order approximates 1.6.\n\n**Example 8.1.4 (Bond Yield to Maturity with Brent)**\n\
    \n```python\nfrom scipy import optimize\nC, F, T, P = 3.5, 100, 10, 95 # coupon\
    \ %, face, years, price\ndef npv(y):\n    k = np.arange(1, T+1)\n    return np.sum(C/100/(1+y)**k)\
    \ + F/(1+y)**T - P\ny, r = optimize.brentq(npv, 0.0, 0.2, full_output=True)\n\
    print(f\"Yield = {100*y:.2f}% obtained in {r.iterations} iterations\")\n```\n\n\
    ## Hybrid Newton-Bracketing Schemes\n\nAlgorithms such as Dekker's, Ridder's,\
    \ and the *Newton-bisection* combine Newton's rapid local steps with bisection\
    \ safeguards, maintaining bracketing and monotone residual progress. They are\
    \ standard choices in libraries (gsl, boost::math).\n\n## Root-Finding in Complex\
    \ Domains\n\nFor analytic functions $f : \\mathbb{C} \\to \\mathbb{C}$ the natural\
    \ tools are polynomial iteration schemes and contour integrals.\n\n### Durand–Kerner\
    \ (Weierstrass) Method\n\nFor a monic polynomial $p(z) = z^n + a_{n-1}z^{n-1}\
    \ + \\cdots + a_0$ with (simple) roots $r_1, \\ldots, r_n$, initialise complex\
    \ guesses $z_i^{(0)}$ (e.g. vertices of a regular $n$-gon) and iterate\n\n$$z_i^{(k+1)}\
    \ = z_i^{(k)} - \\frac{p(z_i^{(k)})}{\\prod_{j \\neq i} (z_i^{(k)} - z_j^{(k)})}.$$"
  mdcn: "## 8.1.2 牛顿–拉弗森方法\n\n牛顿法通过在局部用切线近似非线性函数，来改进一个粗糙的根近似值。给定一个可微函数 $f : \\mathbb{R}\
    \ \\to \\mathbb{R}$ 和一个初始猜测 $x_0$，迭代公式\n\n$$x_{k+1} = x_k - \\frac{f(x_k)}{f'(x_k)},\
