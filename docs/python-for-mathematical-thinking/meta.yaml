  md: '# 1.1 Why Python for Mathematics?


    # 1.1.1 Advantages of Python in Mathematical Computation


    # Overview


    At its core, Python furnishes five features that render it uniquely suitable for
    mathematical work.


    +   1. **Expressive Syntax.** List and dictionary comprehensions, multiple assignment,
    and first-class functions replicate set-builder notation, tuples, and λ-calculus
    constructs directly in code.

    2. **Multi-Paradigm Support.** Imperative, functional, object-oriented, and (via
    sympy) symbolic paradigms coexist, allowing the natural choice of abstraction
    for each problem.

    3. **Rich Numerical Stack.** Libraries such as numpy, scipy, and pandas leverage
    optimised C and Fortran back-ends; they provide $O(n^3)$ dense-matrix algorithms,
    FFTs, and special functions with performance close to MATLAB while remaining free
    and open.

    4. **Interoperability.** The ctypes and cffi interfaces allow low-level numerical
    kernels or legacy FORTRAN routines to be called without marshalling overhead,
    preserving accuracy and speed.

    5. **Interactive Computing.** Jupyter notebooks and IPython shells offer REPL-driven
    exploration, inline LaTeX rendering, and rich visualisation—ideal for conjecture
    testing and pedagogical exposition.


    # Worked Examples


    **Example 1.1.1 (High-Precision Evaluation of $e^{\pi\sqrt{163}}$)** The expression
    $e^{\pi\sqrt{163}}$ is famously almost an integer (Ramanujan). Using Python''s
    decimal module we verify this to 50 decimal places:


    ```

    from decimal import Decimal, getcontext

    from math import pi, sqrt


    getcontext().prec = 50 # 50 significant digits

    x = Decimal(pi) * Decimal(163).sqrt()

    y = x.exp()

    print(y)

    print(y - round(y))

    ```'
