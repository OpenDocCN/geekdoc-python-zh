    \ + log$\\sigma$ - $\\mu$.pow(2) - log$\\sigma$.exp())\nloss = reconL + KLD\n\
    ```\n\n# $\\beta$-VAE and Disentanglement\n\nELBO modified to $\\mathbb{E} \\\
    ln p_{\\phi} - \\beta \\text{ KL}; \\beta > 1$ emphasises factorised latent priors,\
    \ promoting disentangled representations that align dimensions with semantic factors.\n\
    \n# Generative Adversarial Networks (GANs) and Applications\n\n# Minimax Game\n\
    \nGenerator $G_{\\theta} : \\mathbf{z} \\sim p_z \\mapsto \\tilde{\\mathbf{x}}$,\
    \ discriminator $D_{\\phi} : \\mathbb{R}^d \\rightarrow (0, 1)$. Objective:\n\n\
    $\\min_{\\theta} \\max_{\\phi} \\mathcal{V}(\\theta, \\phi) = \\mathbb{E}_{\\\
    mathbf{x} \\sim p_{\\text{data}}}\\left[\\ln D_{\\phi}(\\mathbf{x})\\right] +\
    \ \\mathbb{E}_{\\mathbf{z} \\sim p_z}\\left[\\ln(1 - D_{\\phi}(G_{\\theta}(\\\
    mathbf{z})))\\right]$.\n\nOptimal discriminator $D^*(\\mathbf{x}) = \\frac{p_{\\\
    text{data}}}{p_{\\text{data}} + p_G}$ reduces to Jensen–Shannon divergence $\\\
    text{JSD}(p_{\\text{data}} \\| p_G)$ between distributions; generator converges\
    \ when $\\text{JSD} = 0$.\n\n**Training Heuristics** Replace $\\ln(1 - D)$ by\
    \ $-\\ln D$ for stronger gradients; use feature matching loss $\\|\\mathbb{E}_{\\\
    text{data}} \\phi(\\mathbf{x}) - \\mathbb{E}_{\\mathbf{z}} \\phi(G(\\mathbf{z}))\\\
    |_2^2$ to stabilise. Wasserstein GAN minimises Earth-Mover distance with 1-Lipschitz\
    \ critic utilising gradient penalty $\\lambda(\\|\\nabla_{\\tilde{\\mathbf{x}}}\
    \ D\\|_2 - 1)^2$."
- md: "## Conditional GANs (cGAN)\n\nAugment inputs with label $y$: $G(\\mathbf{z},\
    \ y)$, $D(\\mathbf{x}, y)$. Enables class-conditional synthesis (e.g. MNIST digits).\
    \ Projection discriminator computes $D(\\mathbf{x}, y) = \\mathbf{v}^\\top \\\
    phi(\\mathbf{x}) + \\phi_c(y)^\\top \\phi(\\mathbf{x}) + b$.\n\n## Applications\n\
    \nImage-to-image translation (pix2pix, CycleGAN), super-resolution (SRGAN), data\
    \ augmentation for medical imaging, tabular synthesis preserving privacy (DP-GAN\
    \ with noised gradients).\n\n## Bayesian Networks and Probabilistic Graphical\
    \ Models\n\n### Directed Acyclic Graph (DAG)\n\nNodes $\\{X_1, \\dots, X_p\\}$,\
    \ edges encode conditional independence: $X_i \\perp X_j \\mid \\mathbf{Pa}(X_i)$\
    \ for non-descendants $X_j$. Joint factorises as\n\n$$p(\\mathbf{x}) = \\prod_{i=1}^p\
    \ p(x_i \\mid \\mathbf{pa}(x_i)).$$\n\nInference via variable elimination in $O(|\\\
    mathcal{E}|)$ for treewidth-bounded graphs; junction tree algorithm triangulates\
    \ dense graphs for exact marginalisation.\n\n### Parameter Learning\n\nFor discrete\
    \ variables, maximum-likelihood counts: $\\hat{p}(x_i \\mid \\mathbf{pa}) = \\\
    frac{N(x_i, \\mathbf{pa})}{\\sum_{x_i} N(x_i, \\mathbf{pa})}$. Bayesian parameter\
    \ learning uses Dirichlet-multinomial conjugacy; predictive distribution integrates\
    \ over parameters.\n\n### Structure Learning\n\nScore-and-search: maximise BIC\
    \ score over DAGs using greedy equivalence search; constraint-based (PC algorithm)\
    \ tests conditional independencies; hybrid methods combine. NP-hard, but tractable\
    \ for $p \\lesssim 20$.\n\n### Undirected Models\n\nMarkov random field (MRF)\
    \ with potentials $\\psi_C(\\mathbf{x}_C)$ over cliques $C$:\n\n$$p(\\mathbf{x})\
    \ = \\frac{1}{Z} \\prod_C \\psi_C(\\mathbf{x}_C), \\quad Z = \\sum_{\\mathbf{x}}\
    \ \\prod_C \\psi_C(\\mathbf{x}_C).$$\n\nPairwise Ising ($x_i \\in \\{-1, 1\\}$):\
    \ $p(\\mathbf{x}) \\propto \\exp(\\sum_{i<j} J_{ij} x_i x_j + \\sum_i h_i x_i)$.\
    \ Parameter estimation via pseudolikelihood maximisation avoids $Z$.\n\n### Approximate\
    \ Inference\n\nLoopy belief propagation iterates messages\n\n$$m_{i \\to j}(x_j)\
    \ = \\sum_{x_i} \\psi_{ij} \\psi_i \\prod_{k \\in \\mathcal{N}(i) \\setminus j}\
    \ m_{k \\to i}(x_i);$$\n\nconverges on trees, heuristic on graphs. Variational\
    \ mean-field minimises KL between factorised $q$ and true posterior; EP refines\
    \ by moment matching.\n\n```python\nimport pgmpy\nbn = pgmpy.models.BayesianModel([('A','C'),('B','C'),('C','D')])\n\
    bn.fit(df, estimator=pgmpy.estimators.BayesianEstimator, prior_type='BDeu')\n\
    infer = pgmpy.inference.VariableElimination(bn)\nposterior = infer.query(variables=['D'],\
    \ evidence={'A':1,'B':0})\n```\n\n## 10.4.4 Big Data and Scalable Machine Learning\n\
    \nIndustrial-scale learning integrates statistical algorithms with distributed\
    \ systems engineering. Storage is sharded across commodity clusters, gradients\
    \ propagate through network fabrics, and predictions must often be delivered within\
    \ millisecond latencies. This subsection develops the mathematical throughput\
    \ models that underlie distributed optimisation, details the orchestration primitives\
    \ that containerise models at web scale, and illustrates streaming pipelines whose\
    \ concept-drift detectors update parameters on the fly.\n\n### Distributed Machine\
    \ Learning with Apache Spark\n\nLet $\\mathcal{D}$ be partitioned across $M$ worker\
    \ nodes, $\\mathcal{D} = \\bigsqcup_{m=1}^M \\mathcal{D}_m$, with $|\\mathcal{D}_m|\
    \ = n/M$. Consider minimising the empirical risk\n\n$$F(\\boldsymbol{\\theta})\
    \ = \\frac{1}{n} \\sum_{(\\mathbf{x}, y) \\in \\mathcal{D}} \\ell(\\boldsymbol{\\\
    theta}; \\mathbf{x}, y) + \\lambda \\|\\boldsymbol{\\theta}\\|_2^2.$$\n\nSpark's\
    \ *Resilient Distributed Dataset* (RDD) abstraction applies the map-reduce paradigm:\n\
    \n$$map : \\mathcal{D}_m \\mapsto \\nabla F_m(\\theta) = \\frac{M}{n} \\sum_{(\\\
    mathbf{x},y) \\in \\mathcal{D}_m} \\nabla_\\theta \\ell(\\theta; \\mathbf{x},\
    \ y), \\quad reduce: \\nabla F = \\frac{1}{M} \\sum_{m=1}^M \\nabla F_m.$$\n\n\
    Under synchronous gradient descent the wall-time per iteration is\n\n$$T_{\\text{iter}}\
    \ = T_{\\text{compute}} + T_{\\text{shuffle}} = \\max_m t_m^{\\text{CPU}} + \\\
    alpha \\log_2 M + \\beta d,$$\n\nwhere $\\alpha, \\beta$ are network latency and\
    \ inverse bandwidth, and $d$ is parameter dimension. Speed-up saturates when $T_{\\\
    text{shuffle}} \\approx T_{\\text{compute}}$; Spark's `treeAggregate` attains\
    \ $\\log M$ communication depth.\n\n```python\nfrom pyspark.sql import SparkSession\n\
    from pyspark.ml.classification import LogisticRegression\nspark = SparkSession.builder.appName(\"\
    logreg\").getOrCreate()\ndf = spark.read.parquet(\"hdfs:///clicks\")\ntrain, test\
    \ = df.randomSplit([0.8, 0.2], seed=0)\nlr = (LogisticRegression(featuresCol=\"\
    features\", labelCol=\"label\",\n                        maxIter=10, regParam=1e-3,\
    \ elasticNetParam=0.0)\n      .setAggregationDepth(2) ) # log_2 tree reduce\n\
    model = lr.fit(train)\nprint(\"AUC =\", model.evaluate(test).areaUnderROC)\n```\n\
    \n### Asynchronous Variants\n\nParameter-server architecture distributes parameter\
    \ shards; each worker pushes gradients and pulls updated weights without barriers.\
    \ Given staleness bound $\\tau$, convergence occurs when step size $\\eta_t \\\
    propto 1/\\sqrt{t+\\tau}$; empirical linear scaling holds up to $\\tau \\approx\
    \ 5$ on 10 Gb networks.\n\n### Scaling ML Models with Kubernetes and Docker\n\n\
    A trained model $f_{\\theta^*}$ becomes a stateless microservice *container* encapsulating\
    \ runtime, dependencies, and binaries. Let $\\lambda(t)$ denote request arrival\
    \ rate (Poisson approximation). Little's law yields average queue length $L =\
    \ \\rho/(1-\\rho)$ for utilisation $\\rho = \\lambda/\\mu$, where $\\mu$ is per-pod\
    \ service rate. Kubernetes ($k8s$) horizontal pod autoscaler maintains $\\rho\
    \ \\le \\rho_{\\text{max}}$ by scaling replica count $N \\ge \\lceil \\lambda/\\\
    rho_{\\text{max}}\\mu \\rceil$; cluster capacity constraint $\\sum_i N_i \\text{cpu}_i\
    \ \\le \\text{CPU}_{\\text{node}}$ defines bin-packing via `kubectl`.\n\n```dockerfile\n\
    # Dockerfile snippet\nFROM python:3.11-slim\nCOPY model.pkl server.py /app/\n\
    RUN pip install --no-cache-dir fastapi uvicorn joblib\nCMD [\"uvicorn\", \"server:app\"\
    , \"--host\", \"0.0.0.0\", \"--port\", \"80\"]\n```\n\n```yaml\napiVersion: apps/v1\n\
    kind: Deployment\nmetadata: { name: ml-inference }\nspec:\n  replicas: 3\n  selector:\
    \ { matchLabels: { app: ml } }\n  template:\n    metadata: { labels: { app: ml\
    \ } }\n    spec:\n      containers:\n      - name: api\n        image: registry.io/ml-infer:v1\n\
    \        resources: { requests: { cpu: \"500m\" }, limits: { cpu: \"1\" } }\n\
    ```\n\n```yaml\napiVersion: autoscaling/v2\nkind: HorizontalPodAutoscaler\nmetadata:\
    \ { name: ml-hpa }\nspec:\n  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment,\n\
    \    name: ml-inference }\n  minReplicas: 3\n  maxReplicas: 15\n  metrics:\n \
    \ - type: Resource\n    resource: { name: cpu, target: { type: Utilization,\n\
    \        averageUtilization: 60 } }\n```\n\nRolling updates (maxSurge=25%) satisfy\
    \ blue–green safety; canary pods route ε fraction of traffic to validate drift.\
    \ GPU models exploit nvidia-device plugin exposing extended resource type nvidia.com/gpu.\n\
    \n### Real-Time Machine Learning with Streaming Data\n\nLet data stream $\\{(x_t,\
    \ y_t)\\}_{t=1}^\\infty$ arrive at rate $\\lambda_s$. A window operator aggregates\
    \ events within horizon $W$ producing micro-batch $B_t = \\{(x_\\tau, y_\\tau)\
    \ : t - W < \\tau \\le t\\}$. Spark Structured Streaming ensures exactly-once\
    \ semantics via checkpointed offsets:\n\n```python\nfrom pyspark.sql.functions\
    \ import *\nstream = (spark.readStream.format(\"kafka\")\n          .option(\"\
    subscribe\", \"clicks\").load()\n          .selectExpr(\"CAST(value AS STRING)\
    \ json\"))\nparsed = (stream.select(from_json(\"json\", schema).alias(\"r\"))\n\
    \          .select(\"r.*\") # features & label\n          .withWatermark(\"timestamp\"\
    ,\"5 minutes\"))\nagg = (parsed.groupBy(window(\"timestamp\",\"1 minute\"))\n\
    \       .agg(avg(\"label\").alias(\"ctr\")))\nquery = (agg.writeStream.outputMode(\"\
    update\")\n         .format(\"console\").start())\n```\n\nOnline learners update\
    \ parameters per instance:\n\n$$\\boldsymbol{\\theta}_{t+1} = \\boldsymbol{\\\
    theta}_t - \\eta_t \\nabla_{\\theta} \\ell\\left(f_{\\boldsymbol{\\theta}_t}\\\
    left(\\mathbf{x}_t\\right), y_t\\right), \\quad \\eta_t = \\eta_0(1 + t / \\tau)^{-0.5}.$$\n\
    \nHoeffding tree guarantees that with probability $1 - \\delta$ the chosen split's\
    \ information gain differs from the optimal by $\\leq \\varepsilon = \\sqrt{\\\
    frac{\\ln (1 / \\delta)}{2 n}}$ after $n$ observations, enabling single-pass decision\
    \ trees (River library).\n\nWhen concept drift occurs (distribution shift at $t^*$),\
    \ ADWIN maintains two sub-windows and runs sequential $t$-tests to trigger model\
    \ reset when mean difference exceeds $\\sqrt{\\frac{1}{2} \\ln \\frac{4}{\\epsilon}\\\
    left(\\frac{1}{n_0}+\\frac{1}{n_1}\\right)}$ at confidence $1 - \\epsilon$.\n\n\
    ## 10.5 Ethics and Fairness in Machine Learning\n\nAlgorithmic decisions increasingly\
    \ influence credit approval, bail, hiring, and healthcare triage. If a learning\
    \ system inherits societal biases present in historical data, it can amplify injustice\
    \ at scale. *Fairness* research therefore formalises group and individual notions\
    \ of equity, devises diagnostic metrics, and designs mitigation mechanisms that\
    \ minimise disparate impact while preserving predictive utility. This section\
    \ introduces the mathematical foundation of bias detection and presents practical\
    \ Python tool-chains for auditing and correcting unfair models.\n\n### 10.5.1\
    \ Bias and Fairness in AI\n\nLet $S \\in \\{0, 1\\}$ denote a binary sensitive\
    \ attribute (e.g. *gender*, *race*) and $\\hat{Y} = f_{\\theta}(X)$ be a classifier\
    \ output. Define true label $Y$; the joint distribution $p(X, S, Y)$ governs observed\
    \ data. Bias arises when $\\hat{Y}$ exhibits disparate performance across $S$\
    \ due to dataset imbalance, proxy variables, or label noise.\n\n### Identifying\
    \ and Mitigating Bias in Machine Learning Models\n\n#### Group Fairness Criteria\n\
    \n##### Statistical Parity Difference (SPD)\n\n$$\\Delta_{\\mathrm{SPD}} = \\\
    operatorname{Pr}(\\hat{Y}=1 \\mid S=1) - \\operatorname{Pr}(\\hat{Y}=1 \\mid S=0).$$\n\
    \n$\\Delta_{\\mathrm{SPD}}=0$ implies protected, and reference groups receive\
    \ positive outcome equally often; $|\\Delta_{\\mathrm{SPD}}| \\leq 0.02$ is a\
    \ common threshold."
  mdcn: "## 条件生成对抗网络（cGAN）\n\n通过标签 $y$ 增强输入：$G(\\mathbf{z}, y)$，$D(\\mathbf{x}, y)$。这使得类别条件合成成为可能（例如\
    \ MNIST 数字）。投影判别器计算 $D(\\mathbf{x}, y) = \\mathbf{v}^\\top \\phi(\\mathbf{x})\
    \ + \\phi_c(y)^\\top \\phi(\\mathbf{x}) + b$。\n\n## 应用\n\n图像到图像翻译（pix2pix，CycleGAN）、超分辨率（SRGAN）、医学影像数据增强、保留隐私的表格数据合成（使用噪声梯度的\
    \ DP-GAN）。\n\n## 贝叶斯网络与概率图模型\n\n### 有向无环图（DAG）\n\n节点 $\\{X_1, \\dots, X_p\\}$，边编码条件独立性：对于非后代节点\
    \ $X_j$，有 $X_i \\perp X_j \\mid \\mathbf{Pa}(X_i)$。联合分布可分解为\n\n$$p(\\mathbf{x})\
    \ = \\prod_{i=1}^p p(x_i \\mid \\mathbf{pa}(x_i)).$$\n\n对于树宽有界的图，通过变量消除进行推断，复杂度为\
    \ $O(|\\mathcal{E}|)$；对于稠密图，连接树算法通过三角化进行精确边缘化。\n\n### 参数学习\n\n对于离散变量，最大似然计数：$\\\
    hat{p}(x_i \\mid \\mathbf{pa}) = \\frac{N(x_i, \\mathbf{pa})}{\\sum_{x_i} N(x_i,\
    \ \\mathbf{pa})}$。贝叶斯参数学习使用狄利克雷-多项式共轭性；预测分布通过对参数积分得到。\n\n### 结构学习\n\n评分搜索：使用贪心等价搜索在\
    \ DAG 上最大化 BIC 评分；基于约束的方法（PC 算法）检验条件独立性；混合方法结合两者。这是 NP 难问题，但对于 $p \\lesssim 20$\
    \ 是可处理的。\n\n### 无向模型\n\n马尔可夫随机场（MRF），其势函数 $\\psi_C(\\mathbf{x}_C)$ 定义在团 $C$ 上：\n\
    \n$$p(\\mathbf{x}) = \\frac{1}{Z} \\prod_C \\psi_C(\\mathbf{x}_C), \\quad Z =\
    \ \\sum_{\\mathbf{x}} \\prod_C \\psi_C(\\mathbf{x}_C).$$\n\n成对伊辛模型（$x_i \\in \\\
    {-1, 1\\}$）：$p(\\mathbf{x}) \\propto \\exp(\\sum_{i<j} J_{ij} x_i x_j + \\sum_i\
    \ h_i x_i)$。通过伪似然最大化进行参数估计，可以避免计算 $Z$。\n\n### 近似推断\n\n环路置信传播迭代消息\n\n$$m_{i \\\
    to j}(x_j) = \\sum_{x_i} \\psi_{ij} \\psi_i \\prod_{k \\in \\mathcal{N}(i) \\\
    setminus j} m_{k \\to i}(x_i);$$\n\n在树上收敛，在图上是启发式的。变分平均场最小化分解的 $q$ 与真实后验之间的 KL\
    \ 散度；期望传播（EP）通过矩匹配进行精炼。\n\n```python\nimport pgmpy\nbn = pgmpy.models.BayesianModel([('A','C'),('B','C'),('C','D')])\n\
    bn.fit(df, estimator=pgmpy.estimators.BayesianEstimator, prior_type='BDeu')\n\
    infer = pgmpy.inference.VariableElimination(bn)\nposterior = infer.query(variables=['D'],\
    \ evidence={'A':1,'B':0})\n```\n\n## 10.4.4 大数据与可扩展机器学习\n\n工业级学习将统计算法与分布式系统工程相结合。存储在商用集群上分片，梯度通过网络结构传播，预测通常必须在毫秒级延迟内完成。本小节将阐述支撑分布式优化的数学吞吐量模型，详细说明在\
    \ Web 规模上容器化模型的编排原语，并展示其概念漂移检测器能实时更新参数的流处理管道。\n\n### 基于 Apache Spark 的分布式机器学习\n\
    \n设数据集 $\\mathcal{D}$ 被划分到 $M$ 个工作节点上，$\\mathcal{D} = \\bigsqcup_{m=1}^M \\mathcal{D}_m$，其中\
    \ $|\\mathcal{D}_m| = n/M$。考虑最小化经验风险\n\n$$F(\\boldsymbol{\\theta}) = \\frac{1}{n}\
    \ \\sum_{(\\mathbf{x}, y) \\in \\mathcal{D}} \\ell(\\boldsymbol{\\theta}; \\mathbf{x},\
    \ y) + \\lambda \\|\\boldsymbol{\\theta}\\|_2^2.$$\n\nSpark 的*弹性分布式数据集*（RDD）抽象应用了\
    \ map-reduce 范式：\n\n$$map : \\mathcal{D}_m \\mapsto \\nabla F_m(\\theta) = \\\
    frac{M}{n} \\sum_{(\\mathbf{x},y) \\in \\mathcal{D}_m} \\nabla_\\theta \\ell(\\\
    theta; \\mathbf{x}, y), \\quad reduce: \\nabla F = \\frac{1}{M} \\sum_{m=1}^M\
    \ \\nabla F_m.$$\n\n在同步梯度下降下，每次迭代的墙钟时间为\n\n$$T_{\\text{iter}} = T_{\\text{compute}}\
    \ + T_{\\text{shuffle}} = \\max_m t_m^{\\text{CPU}} + \\alpha \\log_2 M + \\beta\
    \ d,$$\n\n其中 $\\alpha, \\beta$ 分别是网络延迟和带宽的倒数，$d$ 是参数维度。当 $T_{\\text{shuffle}}\
    \ \\approx T_{\\text{compute}}$ 时，加速比趋于饱和；Spark 的 `treeAggregate` 实现了 $\\log M$\
    \ 的通信深度。\n\n```python\nfrom pyspark.sql import SparkSession\nfrom pyspark.ml.classification\
    \ import LogisticRegression\nspark = SparkSession.builder.appName(\"logreg\").getOrCreate()\n\
    df = spark.read.parquet(\"hdfs:///clicks\")\ntrain, test = df.randomSplit([0.8,\
    \ 0.2], seed=0)\nlr = (LogisticRegression(featuresCol=\"features\", labelCol=\"\
    label\",\n                        maxIter=10, regParam=1e-3, elasticNetParam=0.0)\n\
    \      .setAggregationDepth(2) ) # log_2 tree reduce\nmodel = lr.fit(train)\n\
    print(\"AUC =\", model.evaluate(test).areaUnderROC)\n```\n\n### 异步变体\n\n参数服务器架构分发参数分片；每个工作节点推送梯度并拉取更新后的权重，无需同步屏障。给定过时性界限\
    \ $\\tau$，当步长 $\\eta_t \\propto 1/\\sqrt{t+\\tau}$ 时收敛；在 10 Gb 网络上，经验线性缩放关系在 $\\\
    tau \\approx 5$ 之前成立。\n\n### 使用 Kubernetes 和 Docker 扩展机器学习模型\n\n训练好的模型 $f_{\\\
    theta^*}$ 变成一个无状态的微服务*容器*，封装了运行时、依赖项和二进制文件。设 $\\lambda(t)$ 表示请求到达率（泊松近似）。根据利特尔定律，对于利用率\
    \ $\\rho = \\lambda/\\mu$（其中 $\\mu$ 是每个 Pod 的服务速率），平均队列长度为 $L = \\rho/(1-\\rho)$。Kubernetes（$k8s$）的水平\
    \ Pod 自动伸缩器通过扩展副本数 $N \\ge \\lceil \\lambda/\\rho_{\\text{max}}\\mu \\rceil$ 来维持\
    \ $\\rho \\le \\rho_{\\text{max}}$；集群容量约束 $\\sum_i N_i \\text{cpu}_i \\le \\text{CPU}_{\\\
    text{node}}$ 通过 `kubectl` 定义了装箱问题。\n\n```dockerfile\n# Dockerfile 片段\nFROM python:3.11-slim\n\
    COPY model.pkl server.py /app/\nRUN pip install --no-cache-dir fastapi uvicorn\
    \ joblib\nCMD [\"uvicorn\", \"server:app\", \"--host\", \"0.0.0.0\", \"--port\"\
    , \"80\"]\n```\n\n```yaml\napiVersion: apps/v1\nkind: Deployment\nmetadata: {\
    \ name: ml-inference }\nspec:\n  replicas: 3\n  selector: { matchLabels: { app:\
    \ ml } }\n  template:\n    metadata: { labels: { app: ml } }\n    spec:\n    \
    \  containers:\n      - name: api\n        image: registry.io/ml-infer:v1\n  \
    \      resources: { requests: { cpu: \"500m\" }, limits: { cpu: \"1\" } }\n```\n\
    \n```yaml\napiVersion: autoscaling/v2\nkind: HorizontalPodAutoscaler\nmetadata:\
    \ { name: ml-hpa }\nspec:\n  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment,\n\
    \    name: ml-inference }\n  minReplicas: 3\n  maxReplicas: 15\n  metrics:\n \
    \ - type: Resource\n    resource: { name: cpu, target: { type: Utilization,\n\
    \        averageUtilization: 60 } }\n```\n\n滚动更新（maxSurge=25%）满足蓝绿部署的安全性；金丝雀 Pod\
    \ 将 $\\epsilon$ 比例的流量路由到新版本以验证漂移。GPU 模型利用 nvidia-device 插件暴露的扩展资源类型 nvidia.com/gpu。\n\
    \n### 基于流数据的实时机器学习\n\n设数据流 $\\{(x_t, y_t)\\}_{t=1}^\\infty$ 以速率 $\\lambda_s$ 到达。窗口算子在时间范围\
    \ $W$ 内聚合事件，产生微批次 $B_t = \\{(x_\\tau, y_\\tau) : t - W < \\tau \\le t\\}$。Spark\
    \ 结构化流通过检查点偏移量确保精确一次语义：\n\n```python\nfrom pyspark.sql.functions import *\nstream\
    \ = (spark.readStream.format(\"kafka\")\n          .option(\"subscribe\", \"clicks\"\
    ).load()\n          .selectExpr(\"CAST(value AS STRING) json\"))\nparsed = (stream.select(from_json(\"\
    json\", schema).alias(\"r\"))\n          .select(\"r.*\") # features & label\n\
    \          .withWatermark(\"timestamp\",\"5 minutes\"))\nagg = (parsed.groupBy(window(\"\
    timestamp\",\"1 minute\"))\n       .agg(avg(\"label\").alias(\"ctr\")))\nquery\
    \ = (agg.writeStream.outputMode(\"update\")\n         .format(\"console\").start())\n\
    ```\n\n在线学习器逐实例更新参数：\n\n$$\\boldsymbol{\\theta}_{t+1} = \\boldsymbol{\\theta}_t\
