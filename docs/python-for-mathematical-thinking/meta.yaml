    Markdown+code cells also support $\LaTeX$ and interactive widgets via `ipywidgets`.
    Licensing costs and closed source limit Mathematica''s deployability on clusters,
    whereas Python scales horizontally through containerisation and serverless functions.


    **Example 1.1.5 (Automatic Differentiation vs. Symbolic Differentiation)**

    Consider $f(x) = \sin(\sqrt{x^2 + 1})$. Mathematica symbolically returns $f''(x)
    = \frac{x \cos(\sqrt{x^2 + 1})}{\sqrt{x^2 + 1}}$. Python offers a complementary
    *automatic* route:


    ```

    import jax.numpy as jnp

    from jax import grad

    f = lambda x: jnp.sin(jnp.sqrt(x**2 + 1))

    df = grad(f)

    ```


    Here `jax` propagates dual numbers, computing $f''(x)$ at machine precision for
    any $x \in \mathbb{R}$ without explicit symbolic forms.


