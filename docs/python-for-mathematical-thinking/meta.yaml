    A *tautology* evaluates to $\top$ under every assignment; e.g. $p \lor \neg p$.
    A *contradiction* is always $\bot$; a *contingent* formula is neither. The set
    $\{\neg, \lor\}$ is functionally complete (every Boolean function can be expressed).


    # Example 7.4.1 (SymPy Verification of De Morgan)


    ```

    import sympy as sp

    p, q = sp.symbols(''p q'')

    expr = ~(p & q)

    dm = ~p | ~q

    print(sp.simplify_logic(expr ^ dm, form=''cnf'')) # 0 ⟹ tautologically equal

    ```


    Truth tables scale exponentially; normal forms compress reasoning: the *conjunctive
    normal form* (CNF) of a formula is a conjunction of clauses (disjunctions of literals)
    and underpins SAT solvers.


    # Proof Techniques: Direct, Indirect, and Contradiction


    **Direct Proof** To show $P \to Q$, assume $P$ and derive $Q$ step by step. Example:
    from $n$ even ($\exists k\ n = 2k$) deduce $n^2$ even via $n^2 = 4k^2$.


    **Proof by Contraposition** $P \to Q$ is equivalent to $\neg Q \to \neg P$. Often
    $\neg Q$ is more tractable. Example: if $n^2$ odd $\Rightarrow n$ odd.


    **Proof by Contradiction** Assume $P$ and $\neg Q$; derive contradiction $\bot$,
    thereby establishing $P \to Q$. Classic: irrationality of $\sqrt{2}$ assuming
    $\sqrt{2} = p/q$ with coprime integers.


    Natural-deduction rules encode these strategies; sequent calculus makes structural
    properties explicit, enabling proof search algorithms.


    # Example 7.4.2 (Resolution Refutation in CNF)


    Clause set $\{\{p, q\}, \{\neg p\}, \{\neg q\}\}$ is unsatisfiable: $\{p, q\},
    \{\neg p\} \xrightarrow{\text{res}} \{q\}; \{q\}, \{\neg q\} \Longrightarrow \emptyset$.


    ```

    from sympy.logic.inference import satisfiable

    P = sp.symbols(''P'')

    cnf = sp.And(P|~P, ~P, P) # contradictory

    print(satisfiable(cnf)) # {}

    ```'
