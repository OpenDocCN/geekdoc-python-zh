    # 2.2.3 Analysing Function Properties


    # Limits and Continuity


    **Limit** For $f : D \to \mathbb{R}$ with accumulation point $a \in \overline{D}$,


    $$\lim_{x \to a} f(x) = L \iff \forall \varepsilon > 0 \exists \delta > 0 \left(
    0 < |x - a| < \delta \implies |f(x) - L| < \varepsilon \right).$$


    Symbolic evaluation in sympy automates $\varepsilon$-$\delta$ reasoning:


    ```

    import sympy as sp

    x = sp.Symbol("x")

    f = sp.sin(x) / x

    L = sp.limit(f, x, 0)

    print(L) # 1

    ```


    The result reaffirms the classic limit $\lim_{x \to 0} \frac{\sin x}{x} = 1$.


    **Continuity** A function is continuous at $a$ iff the limit equals the value:
    $\lim_{x \to a} f(x) = f(a)$. Piecewise definitions require checking continuity
    at breakpoints.


    # Example 2.2.3 (Piecewise Function)


    $$g(x) = \begin{cases} x^2 \sin \frac{1}{x}, & x \neq 0, \ 0, & x = 0. \end{cases}$$


    ```

    g = sp.Function("g")

    expr = sp.Piecewise((x**2 * sp.sin(1/x), sp.Ne(x, 0)), (0, True))

    is_cont = sp.limit(expr, x, 0) == expr.subs(x, 0)

    print(is_cont) # True

    ```


    Because the factor $x^2$ suppresses the oscillation, $g$ is continuous but not
    differentiable at 0.


