- md: "## Chapter 7\nDiscrete Mathematics and Combinatorics\n\n**Abstract** This chapter\
    \ develops the essential machinery of discrete mathematics—sets, relations, functions,\
    \ propositional and predicate logic, combinatorial counting, generating functions,\
    \ recurrence relations, elementary number theory, and graph theory—through a computational\
    \ lens. Each concept is introduced with formal definitions and proof techniques\
    \ (induction, contradiction, pigeonhole), then translated into idiomatic Python\
    \ using `itertools`, `sympy`, and `networkx`. Counting problems are solved via\
    \ explicit enumeration and analytic combinatorics, while recurrence relations\
    \ are automated with linear-operator methods and closed-form solutions verified\
    \ symbolically. Modular arithmetic and primitive roots lay a foundation for cryptographic\
    \ primitives such as RSA, and graph algorithms (connectivity, Eulerian and Hamiltonian\
    \ paths, planar embeddings) are implemented and empirically analysed. Throughout,\
    \ rigorous mathematical reasoning is coupled with executable code, demonstrating\
    \ how discrete structures underpin algorithm design and complexity analysis in\
    \ modern scientific computing.\n\n**Keywords** Discrete mathematics · Combinatorics\
    \ · Graph theory · Number theory · Logical reasoning · Recurrence relations\n\n\
    ## 7.1 Number Theory\n\nNumber theory, sometimes heralded as the “Queen of Mathematics”,\
    \ lies at the confluence of pure logic and practical computation. Its fundamental\
    \ objects—integers and their arithmetic—appear humble, yet underpin cryptographic\
    \ protocols, error-correcting codes, and hashing algorithms that secure the digital\
    \ age. Python’s arbitrary-precision integers, together with libraries such as\
    \ `sympy`, make it effortless to experiment with primality, modular inverses,\
    \ and large-scale exponentiation. Throughout this section we blend rigorous proofs\
    \ with hands-on code so that every abstract result is accompanied by a computational\
    \ verification.\n\n### 7.1.1 Divisibility and Modular Arithmetic\n\nDivisibility\
    \ creates a partial order on $\\mathbb{Z}$ and enables a refined notion of equivalence:\
    \ $a \\equiv b \\pmod{m}$ iff $m \\mid (a - b)$. The quotient ring $\\mathbb{Z}/m\\\
    mathbb{Z}$ inherits addition and multiplication, forming the stage on which theorems\
    \ by Euclid, Fermat, and Euler unfold.\n\nGiven $m \\geq 2$, each residue class\
    \ $[a]_m$ has a canonical representative $\\text{rem}(a, m) \\in \\{0, \\dots,\
    \ m-1\\}$. Python's `%` operator returns this representative, while `divmod(a,\
    \ m)` returns $(q, r)$ such that $a = qm + r$ with $0 \\leq r < m$, matching the\
    \ Euclidean Division Theorem.\n\n### Prime Numbers and the Euclidean Algorithm\n\
    \nAn integer $p > 1$ is *prime* if its only positive divisors are 1 and $p$. Euclid's\
    \ proof of infinitude hinges on constructing $N = p_1 p_2 \\dots p_k + 1$, showing\
    \ any finite list of primes is incomplete.\n\nThe *Euclidean algorithm* computes\
    \ $\\gcd(a, b)$ by repeated division:\n\n$$\\gcd(a, b) = \\gcd(b, \\text{rem}(a,\
    \ b)), \\quad \\gcd(a, 0) = |a|.$$\n\nIts runtime is $O(\\log \\min\\{a, b\\})$.\
    \ Extended Euclid additionally finds integers $x, y$ such that $ax + by = \\gcd(a,\
    \ b)$—central to modular inversion and Diophantine equations.\n\n### Example 7.1.1\
    \ (Extended Euclid in Python)\n\n```python\ndef egcd(a, b):\n    if b == 0: return\
    \ (a, 1, 0)\n    g, x1, y1 = egcd(b, a % b)\n    return (g, y1, x1 - (a // b)\
    \ * y1)\n\ng, x, y = egcd(252, 105)\nprint(g, x, y) # 21, -2, 5  ==>  252(-2)+105(5)=21\n\
    ```\n\n### Modular Exponentiation and Applications in Cryptography\n\nFast exponentiation\
    \ exploits binary expansion of the exponent:\n\n$$a^e \\bmod m \\quad \\text{via}\
    \ \\quad e = \\sum_k e_k 2^k, \\quad a^e \\equiv \\prod_k (a^{2^k})^{e_k} \\pmod{m}.$$\n\
    \nThis \"square-and-multiply\" algorithm is $O(\\log e)$, vital when $e \\approx\
    \ 2^{1024}$ in RSA.\n\n```python\npow(a, e, m) # built-in modular exponentiation\
    \ (Python >= 3.8)\n```\n\n**RSA Outline** Choose distinct 1024-bit primes $p,\
    \ q$, set $N = pq$ and $\\varphi(N) = (p-1)(q-1)$. Public exponent $e$ satisfies\
    \ $\\gcd(e, \\varphi(N)) = 1$. Private key $d \\equiv e^{-1} \\pmod{\\varphi(N)}$.\
    \ Encryption: $c \\equiv m^e \\pmod{N}$; decryption: $m \\equiv c^d \\pmod{N}$.\
    \ Security rests on hardness of factoring $N$ given only $(N, e)$.\n\n### Greatest\
    \ Common Divisor (GCD) and Least Common Multiple (LCM)\n\nFor $a, b \\neq 0$:\n\
    \n$$\\text{lcm}(a, b) = \\frac{|ab|}{\\gcd(a, b)},$$\n\nsince prime exponents\
    \ in $ab$ split into max and min resp. Generalise to $n$ integers by associativity.\n\
    \n**Example 7.1.2 (Chinese Remainder Theorem (CRT))** Pairwise coprime moduli\
    \ $m_1, \\dots, m_k$ yield a ring isomorphism $\\mathbb{Z}/M\\mathbb{Z} \\cong\
    \ \\prod_i \\mathbb{Z}/m_i\\mathbb{Z}$, $M = \\prod m_i$. Solve\n\n$$x \\equiv\
    \ 2 \\pmod{3}, \\quad x \\equiv 3 \\pmod{4}, \\quad x \\equiv 1 \\pmod{5}.$$\n\
    \nCompute $M_i = M/m_i$ and inverses $M_i^{-1} \\pmod{m_i}$ to obtain $x \\equiv\
    \ \\sum 2 \\cdot 20 \\cdot 2 + 3 \\cdot 15 \\cdot 3 + 1 \\cdot 12 \\cdot 1 = 173\
    \ \\equiv 23 \\pmod{60}$.\n\n```python\nfrom sympy.ntheory.modular import crt\n\
    print(crt([3,4,5], [2,3,1])) # (23, 60)\n```\n\n### Fermat's Little Theorem and\
    \ Wilson's Theorem\n\n**Fermat's Little Theorem (FLT)** If $p$ is prime and $a\
    \ \\not\\equiv 0 \\pmod{p}$, then\n\n$$a^{p-1} \\equiv 1 \\pmod{p}.$$\n\n*Proof*\
    \ Multiplication by $a$ permutes the non-zero residue classes.\n\n**Euler's Theorem**\
    \ Generalises FLT: $a^{\\varphi(m)} \\equiv 1 \\pmod{m}$ for $\\gcd(a, m) = 1$.\n\
    \n**Example 7.1.3 (Modular Inverse via FLT)** For prime $p$, $a^{-1} \\equiv a^{p-2}\
    \ \\pmod{p}$.\n\n```python\ndef modinv_prime(a, p): return pow(a, p-2, p)\n```\n\
    \n### Wilson's Theorem\n\n$$p \\text{ prime} \\iff (p-1)! \\equiv -1 \\pmod{p}.$$\n\
    \nThough not computationally efficient for large $p$, it underpins proofs of FLT\
    \ and provides primality certificates (e.g. for $p = 2, 3, 5$).\n\n### 7.1.2 Congruences\
    \ and Number Theoretic Functions\n\nCongruences allow one to *localise* arithmetic\
    \ modulo a positive integer and, when combined with multiplicative arithmetic\
    \ functions, unlock a rich algebraic toolbox. Central actors include Euler's totient\
    \ function, quadratic residue characters, and—in modern cryptography—group laws\
    \ on elliptic curves defined over finite fields. We proceed from general structure\
    \ theorems (Chinese remainder) to concrete algorithms used in error-correcting\
    \ codes and public-key cryptosystems.\n\n### Chinese Remainder Theorem and Euler's\
    \ Totient Function\n\n**CRT Revisited** For pairwise coprime moduli $m_1, \\dots,\
    \ m_k$, the ring isomorphism\n\n$$\\mathbb{Z}/M\\mathbb{Z} \\cong \\mathbb{Z}/m_1\\\
    mathbb{Z} \\times \\dots \\times \\mathbb{Z}/m_k\\mathbb{Z}, \\quad M = \\prod_i\
    \ m_i,$$\n\nis given explicitly by $x \\mapsto (x \\bmod m_1, \\dots, x \\bmod\
    \ m_k)$, with inverse map $x \\equiv \\sum_{i=1}^k a_i M_i M_i^{-1} \\pmod{M}$,\
    \ $M_i = M/m_i$, $M_i^{-1} \\equiv M_i^{-1} \\pmod{m_i}$.\n\n**Euler's Totient**\n\
    \n$$\\varphi(n) = |\\{1 \\le a \\le n \\mid \\gcd(a, n) = 1\\}| = n \\prod_{p|n}\
    \ \\left(1 - \\frac{1}{p}\\right),$$\n\nmultiplicative with respect to coprime\
    \ arguments. CRT implies $(\\mathbb{Z}/n\\mathbb{Z})^\\times \\cong \\prod_{p^e\
