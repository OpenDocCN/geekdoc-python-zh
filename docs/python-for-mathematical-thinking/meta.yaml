    print(\"stacked AUC =\", roc_auc_score(y_test, pred))\n```\n\n### 10.2.2 无监督学习\n\
    \n在*无监督*范式中，我们观察到 $\\{\\mathbf{x}_1, \\dots, \\mathbf{x}_n\\} \\subset \\mathbb{R}^p$\
    \ 但没有标签。目标是提取潜在结构：分区（聚类）、低维结构（流形学习）、罕见事件位点（异常检测）或共现规则（购物篮分析）。数学上，无监督学习最小化一个由距离或熵而非预测损失构建的能量泛函\
    \ $\\mathscr{E}(\\theta)$。\n\n### 聚类：$k$-均值与层次聚类\n\n**$k$-均值 (Lloyd 2006)**\n\n\
    给定 $k$，最小化簇内平方和 (WCSS)：\n\n$$\\mathscr{E}(C, \\boldsymbol{\\mu}) = \\sum_{i=1}^n\
    \ \\|\\mathbf{x}_i - \\boldsymbol{\\mu}_{C(i)}\\|^2,$$\n\n其中 $C : \\{1, \\dots,\
    \ n\\} \\to \\{1, \\dots, k\\}$ 将点分配给质心 $\\boldsymbol{\\mu}_j$。Lloyd算法交替进行：\n\n\
    1. 分配步骤：$C(i) \\leftarrow \\arg \\min_j \\|\\mathbf{x}_i - \\boldsymbol{\\mu}_j\\\
    |^2$；\n2. 更新步骤：$\\boldsymbol{\\mu}_j \\leftarrow \\frac{1}{|C^{-1}(j)|} \\sum_{i:C(i)=j}\
    \ \\mathbf{x}_i$。\n\n每一步都减少 $\\mathscr{E}$；每次迭代在 $O(nkp)$ 时间内收敛到局部最优。通过 $k$-means++\
    \ 初始化，以与平方距离成比例的概率采样质心，提供 $O(\\log k)$ 的期望近似比。\n\n### 层次聚合聚类 (HAC)\n\n从 $n$ 个单点簇开始；迭代合并使链接准则最小化的簇对\
    \ $(A, B)$：\n\n$d_{\\text{single}}(A, B) = \\min_{\\mathbf{x} \\in A, \\mathbf{y}\
    \ \\in B} \\|\\mathbf{x} - \\mathbf{y}\\|, \\quad d_{\\text{complete}} = \\max,\
    \ \\quad d_{\\text{average}} = \\frac{|A||B|}{|A|+|B|} \\|\\bar{\\mathbf{x}}_A\
    \ - \\bar{\\mathbf{x}}_B\\|$。\n\n生成树状图；在高度 $\\tau$ 处切割以获得扁平簇。使用堆链接缓存，复杂度为 $O(n^2\
    \ \\log n)$。\n\n```python\nfrom sklearn.cluster import KMeans, AgglomerativeClustering\n\
    km = KMeans(n_clusters=4, init='k-means++', n_init=20).fit(X)\nhac = AgglomerativeClustering(n_clusters=4,\
    \ linkage='ward').fit(X)\n```\n\n### 降维：PCA，t-SNE\n\n**PCA回顾**\n\n投影 $\\mathbf{z}_i\
    \ = V^\\top(\\mathbf{x}_i - \\boldsymbol{\\mu})$ 最大化方差；重构误差 $\\sum_i \\|\\mathbf{x}_i\
    \ - VV^\\top\\mathbf{x}_i\\|^2 = \\sum_{j>k} \\lambda_j$ 等于被丢弃的特征值尾部。\n\n**t-SNE\
    \ (van der Maaten and Hinton 2008)**\n\n将欧氏距离转换为条件概率 $p_{j|i} \\propto \\exp(-\\\
    |\\mathbf{x}_i - \\mathbf{x}_j\\|^2 / 2\\sigma_i^2)$，困惑度 $\\mathcal{P} = 2^{H(P_i)}$\
    \ 选择 $\\sigma_i$。嵌入 $\\mathbf{y}_i \\in \\mathbb{R}^2$ 最小化KL散度\n\n$\\text{KL}(P\
    \ \\parallel Q) = \\sum_{i \\neq j} p_{ij} \\log \\frac{p_{ij}}{q_{ij}}, \\quad\
    \ q_{ij} = \\frac{(1 + \\|\\mathbf{y}_i - \\mathbf{y}_j\\|^2)^{-1}}{\\sum_{k \\\
    neq \\ell} (1 + \\|\\mathbf{y}_k - \\mathbf{y}_\\ell\\|^2)^{-1}}$。\n\n梯度更新 $\\\
    Delta \\mathbf{y}_i \\propto 4 \\sum_j (p_{ij} - q_{ij})(\\mathbf{y}_i - \\mathbf{y}_j)(1\
    \ + \\|\\mathbf{y}_i - \\mathbf{y}_j\\|^2)^{-1}$。Barnes-Hut近似使得运行时间为 $O(n \\log\
    \ n)$。\n\n```python\nfrom sklearn.manifold import TSNE\nZ = TSNE(n_components=2,\
    \ perplexity=30, init='pca').fit_transform(X)\n```\n\n### 异常检测技术\n\n**统计阈值**\n\
    \n假设高斯分布；当马氏距离 $D^2 = (\\mathbf{x} - \\boldsymbol{\\mu})^\\top \\Sigma^{-1} (\\\
    mathbf{x} - \\boldsymbol{\\mu})$ 超过 $\\chi^2_{p, 1-\\alpha}$ 分位数（$\\alpha \\sim\
    \ 10^{-3}$）时，标记 $\\mathbf{x}$ 为异常。"
