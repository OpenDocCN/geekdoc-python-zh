    point of $f : \mathbb{R} \to \mathbb{R}$ occurs at $x^*$ such that $f''(x^*) =
    0$; second-order conditions determine the nature of the extremum:


    If $f''''(x^*) > 0$, then $f$ has a local minimum at $x^*$,

    $f''''(x^*) < 0 \Rightarrow$ local maximum.


