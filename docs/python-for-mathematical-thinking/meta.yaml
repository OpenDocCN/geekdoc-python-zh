    ### 丢番图方程及其应用


    **丢番图方程**寻求多项式关系 $F(x_1, \dots, x_n) = 0$ 的整数或有理数解。经典的线性情况 $a_1x_1 + \cdots +
    a_nx_n = b$ 完全由扩展欧几里得算法控制，但也揭示了微妙的障碍原理：解存在的充要条件是 $\gcd(a_1, \dots, a_n) \mid b$。二次型已经产生了丰富的结构；例如，$x^2
