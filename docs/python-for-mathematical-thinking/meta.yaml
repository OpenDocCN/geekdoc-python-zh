- md: "## Chapter 8\nNumerical Methods\n\n**Abstract** Error propagation, conditioning,\
    \ and stability theory motivate root-finding (bisection, Newton, secant), polynomial\
    \ and spline interpolation, numerical differentiation, adaptive quadrature, and\
    \ matrix factorisations (LU, QR, SVD). Advanced topics include multigrid pre-conditioning\
    \ and GPU-accelerated computation via Numba/JAX, arming the reader with industrial-grade\
    \ techniques for high-fidelity simulation and data analysis.\n\n**Keywords** Numerical\
    \ methods · Error analysis · Interpolation · Root finding · Multigrid techniques\
    \ · GPU acceleration\n\nComputational mathematics stands at the intersection of\
    \ theoretical analysis and practical engineering: while analytic closed-form solutions\
    \ are prized for their elegance, real-world models seldom yield to pen-and-paper\
    \ treatment. *Numerical methods* fill this gap by replacing infinite processes\
    \ with carefully designed finite algorithms that run on digital hardware. The\
    \ passage from the continuum to floating-point arithmetic is non-trivial—each\
    \ numerical scheme must negotiate a balance between accuracy, stability, efficiency,\
    \ and ease of implementation.\n\nThroughout this chapter we cast continuous problems\
    \ (root-finding, interpolation, integration, differential equations, optimisation)\
    \ into discrete procedures. Error analysis will dissect two complementary sources\
    \ of inaccuracy: *truncation error* (how far a finite approximation deviates from\
    \ the exact mathematical limit) and *round-off error* (how the IEEE 754 machine\
    \ representation of real numbers perturbs arithmetic). The concept of *stability*—the\
    \ algorithmic analogue of continuity—will guide us in distinguishing numerically\
    \ trustworthy schemes from those that magnify perturbations beyond control.\n\n\
    Python's *numpy* and *scipy* libraries provide high-performance tensor algebra,\
    \ while *numba* and *jax* unlock just-in-time compilation and automatic differentiation\
    \ for tight numerical loops. Nevertheless, we will implement each core algorithm\
    \ \"from scratch\" before delegating to these libraries, so that every line of\
    \ performance-optimised code is grounded in a transparent mathematical rationale.\n\
    \n### 8.1 Root-Finding Algorithms\n\n#### 8.1.1 Bisection Method\n\nThe bisection\
    \ method translates the *Intermediate Value Theorem*—if a continuous function\
    \ $f : [a, b] \\to \\mathbb{R}$ satisfies $f(a)f(b) < 0$, then $f$ has at least\
    \ one root in $(a, b)$—into an algorithm that locates a root by repeatedly halving\
    \ an interval that brackets a sign change. Because each iteration discards half\
    \ of the interval, the method is linearly convergent, robust against derivative\
    \ pathologies, and requires only two function evaluations per step. Its simplicity\
    \ and guaranteed convergence make it the workhorse for black-box root finding\
    \ when bracketing is straightforward.\n\n#### Convergence and Implementation in\
    \ Python\n\nLet $(a_0, b_0)$ be the initial bracket with $f(a_0)f(b_0) < 0$. Define\
    \ $m_k = \\frac{1}{2}(a_k + b_k)$ and update\n\n$$(a_{k+1}, b_{k+1}) = \\begin{cases}\
    \ (a_k, m_k) & \\text{if } f(a_k) f(m_k) < 0, \\\\ (m_k, b_k) & \\text{otherwise.}\
    \ \\end{cases}$$\n\nThe length of the interval after $k$ steps is $|b_k - a_k|\
    \ = 2^{-k}|b_0 - a_0|$. Hence for the unique root $r \\in (a_0, b_0)$ one has\n\
    \n$$|r - m_k| \\le \\frac{|b_0 - a_0|}{2^{k+1}}, \\quad \\text{so } m_k \\xrightarrow{k\
    \ \\to \\infty} r \\text{ linearly.}$$\n\n```python\ndef bisection(f, a, b, *,\
    \ atol=1e-12, rtol=1e-10, max_iter=100):\n    fa, fb = f(a), f(b)\n    if fa*fb\
    \ > 0:\n        raise ValueError(\"Root not bracketed\")\n    for k in range(max_iter):\n\
    \        m = 0.5*(a+b)\n        fm = f(m)\n        if abs(fm) < atol or 0.5*(b-a)\
    \ < rtol*abs(m):\n            return m, k\n        if fa*fm < 0: b, fb = m, fm\n\
    \        else: a, fa = m, fm\n    raise RuntimeError(\"no convergence\")\n```\n\
    \nCalling `bisection(lambda x: x*np.cos(x) - 1, 0.5, 2)` returns the first positive\
    \ root of $x \\cos x = 1$ to machine precision in $k = \\lceil \\log_2(|b_0 -\
    \ a_0|/\\varepsilon) \\rceil$ iterations.\n\n#### Applications in Engineering\
    \ and Finance\n\n**Engineering—Nonlinear Beam Deflection** For a cantilever of\
    \ length $L$ with end load $P$, the elastic line obeys $EI y''''(x) = 0$ except\
    \ for the concentrated load which introduces a slope discontinuity at $x = L$.\
    \ The tip deflection $y(L) = \\frac{PL^3}{3EI}$ leads, after rearrangement, to\
    \ the transcendental frequency equation $\\cosh \\beta \\cos \\beta + 1 = 0$ for\
    \ mode shape parameter $\\beta$. Bisection on $f(\\beta) = \\cosh \\beta \\cos\
    \ \\beta + 1$ with bracket $(1.5, 3.0)$ isolates the first eigenvalue $\\beta_1$\
    \ required to compute natural frequencies.\n\n**Finance—Internal Rate of Return\
    \ (IRR)** Given cash-flows $(C_0, C_1, \\ldots, C_n)$, IRR is the discount rate\
    \ $r$ satisfying $\\sum_{k=0}^{n} \\frac{C_k}{(1+r)^k} = 0$. The net present value\
    \ is continuous and strictly decreasing in $r > -1$, so one brackets a sign change\
    \ between a near-zero rate and a high rate (e.g. $r = 1$) and applies bisection.\
    \ Because the function is well behaved and evaluation inexpensive, linear convergence\
    \ suffices in practice.\n\n#### Error Analysis and Stopping Criteria\n\nLet $e_k\
    \ = |r - m_k|$ be the absolute error. The deterministic bound\n$$e_k \\le \\frac{|b_0\
    \ - a_0|}{2^{k+1}}$$\nserves as a priori stopping condition: choose $k$ such that\
    \ $2^{-k-1}|b_0 - a_0| \\le \\varepsilon_{\\text{abs}}$. In floating point arithmetic\
    \ round-off accumulates once $|b_k - a_k| \\approx 2u|m_k|$ (machine unit $u$),\
    \ so one supplements with a *relative* tolerance $\\varepsilon_{\\text{rel}}|m_k|$\
    \ and/or an *auxiliary* test $|f(m_k)| \\le \\varepsilon_f$.\n\nA practical criterion\
    \ is therefore\n$$|b_k - a_k| < \\varepsilon_{\\text{abs}} \\lor |b_k - a_k| <\
    \ \\varepsilon_{\\text{rel}}|m_k| \\lor |f(m_k)| < \\varepsilon_f.$$\n\nWith $\\\
    varepsilon_{\\text{abs}} = 10^{-12}$, $\\varepsilon_{\\text{rel}} = 10^{-10}$,\
    \ and $\\varepsilon_f = 10^{-13}$ one typically achieves full double precision\
    \ without incurring unnecessary iterations.\n\n**Example 8.1.1** For $f(x) = x\
    \ - e^{-x}$ with bracket $(0, 1)$, the true root is $r \\approx 0.567\\,143\\\
    ,290$. The algorithm above stops at $m_{44}$ with $e_{44} < 2^{-45} \\approx 2.8\
    \ \\times 10^{-14}$, exceeding double precision—confirm $|f(m_{44})| \\approx\
    \ 1.3 \\times 10^{-16}$.\n\n**Remark** Although other methods (Newton–Raphson,\
    \ secant) achieve quadratic or super-linear convergence, they lack the unconditional\
    \ guarantee of bisection. A hybrid strategy—several Newton steps with fall-back\
    \ to bisection when the iterate exits the bracket—often combines speed and robustness,\
    \ a pattern revisited later in the chapter on *Nonlinear Systems*.\n\n---\n\n\
    7. For $n = 10$ guests randomly seated at their labelled places, compute the probability\
    \ that no guest sits in his own seat and exactly four guests sit in the seat of\
    \ a friend who sits in theirs (a “mutual exchange”). Express your answer as a\
    \ reduced fraction.\n\n8. A Dyck path of semilength $n$ has an associated weight\
    \ $w(\\pi) = \\prod_{k=1}^n (2k-1)^{h_k}$, where $h_k$ is the height of the $k$-th\
    \ up-step. Evaluate $\\sum_{\\pi} w(\\pi)$ for $n = 3$ and conjecture a closed\
    \ form in terms of Catalan numbers.\n\n9. Let $p_o(n)$ be the number of partitions\
    \ of $n$ into odd parts and $p_d(n)$ into distinct parts.\n\n    (a) Prove $p_o(n)\
    \ = p_d(n)$ using ordinary generating functions.\n    (b) Compute $p_o(100)$ numerically\
    \ (a Python script is acceptable) and verify equality.\n\n10. Let $a_{n,k}$ count\
    \ labelled graphs on $n$ vertices with exactly $k$ edges. Show that the bivariate\
    \ EGF is\n\n    $$A(z, y) = \\exp\\left(\\frac{1}{2}yz^2\\right) \\exp\\left(\\\
    frac{1}{3}yz^3\\right) \\exp\\left(\\frac{1}{4}yz^4\\right) \\cdots,$$\n\n   \
    \ and use it to extract $a_{4,3}$.\n\n11. Let $R(3, 3)$ denote the smallest $n$\
    \ such that any red/blue colouring of the edges of $K_n$ contains a monochromatic\
    \ triangle. Use a first-moment argument to show $R(3, 3) > 5$ and explain why\
    \ the probabilistic estimate fails to rule out $n = 6$.\n\n12. The molecule $\\\
    text{C}_4\\text{H}_{10}$ has a carbon skeleton in the shape of a tree with four\
    \ labelled vertices (carbons) and three edges. Hydrogen atoms occupy valence sites;\
    \ suppose one substitutes two hydrogens by chlorine atoms. Using Pólya’s enumeration\
    \ with the automorphism group of the tree, determine how many distinct dichloro\
    \ isomers exist.\n\n13. Show that for a prime $p \\ge 5$\n\n    $$\\sum_{k=0}^{p-1}\
    \ \\binom{2k}{k} \\equiv 0 \\pmod{p^2}.$$\n\n    Hint: use the generating function\
    \ $\\sum_{k \\ge 0} \\binom{2k}{k} z^k = (1 - 4z)^{-1/2}$ and the $p$-adic expansion\
    \ of $(1 + u)^p$.\n\n14. Define the $6 \\times 6$ matrix\n\n    $$S = [S(n, k)]_{0\
    \ \\le n, k \\le 5}, \\quad S(n, k) = \\text{Stirling number of the second kind}.$$\n\
    \n    Compute $S^2$ explicitly and interpret the entry $(S^2)_{5,3}$ combinatorially.\n\
    \n15. You are given tasks $T = \\{1, \\dots, 7\\}$ with processing times $\\tau\
    \ = (2, 2, 4, 6, 3, 1, 2)$ and deadlines $d = (4, 2, 4, 7, 3, 5, 4)$. A subset\
    \ $I \\subseteq T$ is *feasible* if tasks can be ordered so that the cumulative\
    \ time never exceeds the corresponding deadlines. Prove that feasible sets form\
    \ a matroid, then run the greedy algorithm with task weights $w_i = 10 - \\tau_i$\
    \ to find an optimal schedule. Show the resulting completion sequence explicitly.\n\
    \n16. Generate 50 instances of $G(100, 0.08)$ in PYTHON. For each instance, compute\
    \ the largest Laplacian eigenvalue $\\lambda_{\\max}$ and plot their empirical\
    \ cumulative distribution function (ECDF). Compare the sample mean with the asymptotic\
    \ prediction $2np(1-p)$ and comment on the variance."
  mdcn: "## 第8章\n数值方法\n\n**摘要** 误差传播、条件数与稳定性理论引出了求根方法（二分法、牛顿法、弦截法）、多项式与样条插值、数值微分、自适应积分以及矩阵分解（LU、QR、SVD）。高级主题包括多重网格预条件和通过Numba/JAX实现的GPU加速计算，为读者提供用于高保真仿真和数据分析的工业级技术。\n\
    \n**关键词** 数值方法 · 误差分析 · 插值 · 求根 · 多重网格技术 · GPU加速\n\n计算数学处于理论分析与实际工程的交叉点：虽然解析的封闭形式解因其优雅而备受推崇，但现实世界的模型很少能通过纸笔推导解决。*数值方法*填补了这一空白，它们用精心设计的、可在数字硬件上运行的有限算法来替代无限过程。从连续体到浮点算术的过渡并非易事——每种数值方案都必须在精度、稳定性、效率和实现简便性之间取得平衡。\n\
    \n在本章中，我们将连续问题（求根、插值、积分、微分方程、优化）转化为离散过程。误差分析将剖析两种互补的不精确来源：*截断误差*（有限近似与精确数学极限的偏差程度）和*舍入误差*（实数的IEEE\
    \ 754机器表示如何扰动算术运算）。*稳定性*的概念——连续性的算法类比——将指导我们区分数值可信的方案与那些会放大扰动直至失控的方案。\n\nPython的*numpy*和*scipy*库提供了高性能的张量代数，而*numba*和*jax*则为紧凑的数值循环解锁了即时编译和自动微分。尽管如此，我们将在委托给这些库之前“从零开始”实现每个核心算法，以便每一行性能优化的代码都建立在透明的数学原理之上。\n\
    \n### 8.1 求根算法\n\n#### 8.1.1 二分法\n\n二分法将*介值定理*——如果连续函数 $f : [a, b] \\to \\mathbb{R}$\
    \ 满足 $f(a)f(b) < 0$，则 $f$ 在 $(a, b)$ 内至少有一个根——转化为一种通过反复平分包含符号变化的区间来定位根的算法。由于每次迭代都丢弃一半区间，该方法是线性收敛的，对导数异常具有鲁棒性，并且每步只需两次函数求值。其简单性和保证收敛性使其成为当区间界定简单时黑箱求根的主力工具。\n\
    \n#### 收敛性与Python实现\n\n设 $(a_0, b_0)$ 为初始区间，满足 $f(a_0)f(b_0) < 0$。定义 $m_k = \\\
    frac{1}{2}(a_k + b_k)$ 并更新\n\n$$(a_{k+1}, b_{k+1}) = \\begin{cases} (a_k, m_k)\
    \ & \\text{若 } f(a_k) f(m_k) < 0, \\\\ (m_k, b_k) & \\text{否则。} \\end{cases}$$\n\
    \n$k$ 步后区间的长度为 $|b_k - a_k| = 2^{-k}|b_0 - a_0|$。因此，对于唯一根 $r \\in (a_0, b_0)$，有\n\
    \n$$|r - m_k| \\le \\frac{|b_0 - a_0|}{2^{k+1}}, \\quad \\text{故 } m_k \\xrightarrow{k\
    \ \\to \\infty} r \\text{ 线性收敛。}$$\n\n```python\ndef bisection(f, a, b, *, atol=1e-12,\
    \ rtol=1e-10, max_iter=100):\n    fa, fb = f(a), f(b)\n    if fa*fb > 0:\n   \
    \     raise ValueError(\"Root not bracketed\")\n    for k in range(max_iter):\n\
    \        m = 0.5*(a+b)\n        fm = f(m)\n        if abs(fm) < atol or 0.5*(b-a)\
    \ < rtol*abs(m):\n            return m, k\n        if fa*fm < 0: b, fb = m, fm\n\
    \        else: a, fa = m, fm\n    raise RuntimeError(\"no convergence\")\n```\n\
    \n调用 `bisection(lambda x: x*np.cos(x) - 1, 0.5, 2)` 可在 $k = \\lceil \\log_2(|b_0\
    \ - a_0|/\\varepsilon) \\rceil$ 次迭代内，以机器精度返回 $x \\cos x = 1$ 的第一个正根。\n\n#### 在工程与金融中的应用\n\
    \n**工程——非线性梁挠度** 对于端部受载荷 $P$ 的长度为 $L$ 的悬臂梁，弹性线满足 $EI y''''(x) = 0$，但在集中载荷作用点 $x\
    \ = L$ 处引入斜率不连续。尖端挠度 $y(L) = \\frac{PL^3}{3EI}$ 经过整理后，得到关于模态参数 $\\beta$ 的超越频率方程\
    \ $\\cosh \\beta \\cos \\beta + 1 = 0$。在区间 $(1.5, 3.0)$ 上对 $f(\\beta) = \\cosh\
    \ \\beta \\cos \\beta + 1$ 应用二分法，可分离出计算固有频率所需的第一特征值 $\\beta_1$。\n\n**金融——内部收益率\
    \ (IRR)** 给定现金流 $(C_0, C_1, \\ldots, C_n)$，IRR 是满足 $\\sum_{k=0}^{n} \\frac{C_k}{(1+r)^k}\
    \ = 0$ 的折现率 $r$。净现值在 $r > -1$ 时连续且严格递减，因此可以在一个接近零的利率和一个高利率（例如 $r = 1$）之间界定符号变化，并应用二分法。由于函数行为良好且求值成本低，线性收敛在实践中已足够。\n\
    \n#### 误差分析与停止准则\n\n设 $e_k = |r - m_k|$ 为绝对误差。确定性界限\n$$e_k \\le \\frac{|b_0 -\
    \ a_0|}{2^{k+1}}$$\n可作为先验停止条件：选择 $k$ 使得 $2^{-k-1}|b_0 - a_0| \\le \\varepsilon_{\\\
    text{abs}}$。在浮点算术中，一旦 $|b_k - a_k| \\approx 2u|m_k|$（机器单位 $u$），舍入误差就会累积，因此需要补充一个*相对*容差\
    \ $\\varepsilon_{\\text{rel}}|m_k|$ 和/或一个*辅助*测试 $|f(m_k)| \\le \\varepsilon_f$。\n\
    \n因此，一个实用的准则是\n$$|b_k - a_k| < \\varepsilon_{\\text{abs}} \\lor |b_k - a_k| <\
    \ \\varepsilon_{\\text{rel}}|m_k| \\lor |f(m_k)| < \\varepsilon_f.$$\n\n取 $\\\
    varepsilon_{\\text{abs}} = 10^{-12}$、$\\varepsilon_{\\text{rel}} = 10^{-10}$ 和\
    \ $\\varepsilon_f = 10^{-13}$，通常可以达到完整的双精度，而不会产生不必要的迭代。\n\n**例 8.1.1** 对于 $f(x)\
    \ = x - e^{-x}$，区间为 $(0, 1)$，真实根为 $r \\approx 0.567\\,143\\,290$。上述算法在 $m_{44}$\
    \ 处停止，此时 $e_{44} < 2^{-45} \\approx 2.8 \\times 10^{-14}$，超过双精度——验证 $|f(m_{44})|\
    \ \\approx 1.3 \\times 10^{-16}$。\n\n**注** 尽管其他方法（牛顿-拉弗森法、弦截法）能达到二次或超线性收敛，但它们缺乏二分法的无条件保证。一种混合策略——执行若干步牛顿法，当迭代点超出区间时回退到二分法——通常能结合速度和鲁棒性，这种模式将在本章后面的*非线性系统*部分再次讨论。\n\
    \n---\n\n7.  对于 $n = 10$ 位随机坐在其指定座位上的客人，计算没有客人坐在自己座位上且恰好有四位客人坐在其朋友座位上（该朋友坐在自己的座位上）（一种“相互交换”）的概率。将答案表示为最简分数。\n\
    \n8.  半长度为 $n$ 的 Dyck 路径具有相关联的权重 $w(\\pi) = \\prod_{k=1}^n (2k-1)^{h_k}$，其中 $h_k$\
    \ 是第 $k$ 个上步的高度。对 $n = 3$ 计算 $\\sum_{\\pi} w(\\pi)$，并猜想一个用 Catalan 数表示的封闭形式。\n\
    \n9.  设 $p_o(n)$ 是将 $n$ 划分为奇数部分的划分数，$p_d(n)$ 是划分为不同部分的划分数。\n    (a) 使用普通生成函数证明\
