    mathcal{D} \\mid \\theta) \\, p(\\theta)}{\\int p(\\mathcal{D} \\mid \\theta)\
    \ \\, p(\\theta) \\, d\\theta},$$\n\n其中 $p(\\theta)$ 是*先验分布*，$p(\\mathcal{D} \\\
