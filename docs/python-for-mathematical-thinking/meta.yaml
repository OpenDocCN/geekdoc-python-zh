    \n```python\nclass Node:\n    def __init__(self, val, left=None, right=None):\n\
    \        self.val, self.left, self.right = val, left, right\n\ndef inorder(root):\n\
    \    if root:\n        inorder(root.left)\n        print(root.val, end=\" \")\n\
    \        inorder(root.right)\n\n# 构造树：2\n#                / \\\n#            \
    \   1   3\nroot = Node(2, Node(1), Node(3))\ninorder(root) # 输出：1 2 3\n```\n\n\
    ### 示例 4.1.23（用于符号计算的表达式树）解析并求值表达式 (3 + 4) × 5。\n\n```python\nroot = Node(\"*\"\
    , Node(\"+\", Node(\"3\"), Node(\"4\")), Node(\"5\"))\n\ndef eval_tree(node):\n\
    \    if node.val.isdigit():\n        return int(node.val)\n    a = eval_tree(node.left)\n\
    \    b = eval_tree(node.right)\n    return eval(f\"{a}{node.val}{b}\")\n\nprint(eval_tree(root))\
    \ # 输出：35\n```\n\n## 二叉搜索树（BST）\n\nBST 维护以下不变式：\n\n左子树 < 根 < 右子树。\n\n### 示例 4.1.24（向\
    \ BST 插入）\n\n```python\ndef insert(node, key):\n    if not node:\n        return\
    \ Node(key)\n    if key < node.val:\n        node.left = insert(node.left, key)\n\
    \    else:\n        node.right = insert(node.right, key)\n    return node\n```\n\
    \n## 树的遍历\n\n- 中序：左 → 根 → 右（BST 产生排序顺序）。\n- 前序：根 → 左 → 右。\n- 后序：左 → 右 → 根。\n-\
    \ 层序：使用队列（BFS）。\n\n### 示例 4.1.25（高度平衡树）如果每个节点的左子树和右子树的高度差最多为 1，则该树是平衡的。\n\n检查高度平衡：\n\
    \n```python\ndef height(node):\n    if not node: return 0\n    return 1 + max(height(node.left),\
    \ height(node.right))\n\ndef is_balanced(node):\n    if not node: return True\n\
    \    h1 = height(node.left)\n    h2 = height(node.right)\n    return abs(h1 -\
    \ h2) <= 1 and is_balanced(node.left) and is_balanced(\n        node.right)\n\
    ```\n\n## 用例\n\n- 表达式解析（AST）\n- 堆（优先队列）\n- 平衡搜索树（AVL，红黑树）\n- 机器学习中的决策树\n\n## 哈希表与字典内部原理\n\
    \n**哈希表**使用哈希函数 $h : \\mathcal{K} \\rightarrow [0, m - 1]$ 将键映射到值，以计算大小为 $m$ 的表中的索引。\n\
    \n## Python dict\n\n`dict` 实现为一个*动态哈希表*，具有：\n\n- 开放寻址（线性探测 + 扰动）\n- 负载因子阈值 $\\\
