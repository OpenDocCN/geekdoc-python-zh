  md: '# Advanced Topics in Computational Topology


    # Zigzag Persistence


    Handles filtrations with insertions and deletions $K_0 \leftrightarrow K_1 \leftrightarrow
    \cdots \leftrightarrow K_m$. Interval decomposition generalises barcode; algorithm
    reduces a block matrix pair in $O(n^\omega \log n)$.


    # Multidimensional Persistence


    Filtration indexed by $\mathbb{R}^k$ ($k \ge 2$)—e.g., Rips along distance and
    density. No complete discrete invariant (multigraded Betti tables partially order
    diagrams). Algorithms approximate via rank invariants on cubical grids.


    # Discrete Morse Theory


    Reduces complex size while preserving homotopy: acyclic partial matching on Hasse
    diagram collapses non-critical cells, yielding boundary matrix with $\le$ critical
    cells. Typical $10\times$ speed-ups in VR complexes of $10^6$ simplices.


    # Sheaf Cohomology on Data


    Attach vector spaces to open sets obeying restriction maps; compute global sections
    via sheaf Laplacian—enabling multi-sensor data fusion and consistency checking.


    # Computational Challenges


    +   - Memory: storing $VR(n)$ requires $O(n^k)$ simplices for $k$ up to dimension;
    use witness, sparsified Rips, or edge collapsing.

    - Finite precision: large filtrations necessitate integer-preserving Smith normal
    forms or modular Chinese-remainder lifts.

    - Parallelisation: GPU reduction via chunked boundary matrices and atomic XOR
    in $\mathbb{Z}_2$ reduces 100 M simplex barcode to <30 s.'
