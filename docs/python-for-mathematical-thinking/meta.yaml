    # Feature Encoding: One-Hot Encoding and Label Encoding


    Categorical predictor $\mathbf{c} \in \{\kappa_1, \dots, \kappa_m\}$ injects into
    $\mathbb{R}^m$ via *one-hot* map $e : \kappa_k \mapsto \mathbf{e}_k$, preserving
    Hamming metric and avoiding spurious ordinal relations. For tree-based models
    that tolerate integer surrogates, *label encoding* replaces $\kappa_k$ by index
    $k$; beware of inadvertently imposing monotonicity in linear regressions.


    $$\mathrm{OH} : \kappa_3 \longmapsto (0, 0, 1, 0, \dots, 0), \quad \mathrm{Lab}
    : \kappa_3 \longmapsto 3.$$


    ```

    from sklearn.preprocessing import OneHotEncoder, OrdinalEncoder

    enc_oh = OneHotEncoder(sparse=False, drop=''first'') # reduce collinearity

    enc_lab = OrdinalEncoder()

    X_oh = enc_oh.fit_transform(df[[''city'']])

    X_lab = enc_lab.fit_transform(df[[''city'']])

    ```


    High-cardinality features ($m > 100$) impair memory and increase variance; hashing
    trick or $\ell_1$-regularised target encoding mitigates explosion without losing
    predictive signal.'
