    # Dynamic Mode Decomposition (DMD)


    Given snapshots $\mathbf{X}_0 = [\mathbf{x}_0, \dots, \mathbf{x}_{m-1}]$ and shifted
    matrix $\mathbf{X}_1 = [\mathbf{x}_1, \dots, \mathbf{x}_m]$, classical **DMD**
    finds the best-fit linear map $\mathbf{A}$ minimising $\|\mathbf{X}_1 - \mathbf{A}\mathbf{X}_0\|_F$.
    Truncating the SVD $\mathbf{X}_0 = \mathbf{U}\mathbf{\Sigma}\mathbf{V}^*$ produces


    $$\widetilde{\mathbf{A}} = \mathbf{U}^*\mathbf{X}_1\mathbf{V}\mathbf{\Sigma}^{-1},
    \quad \widetilde{\mathbf{A}}\mathbf{w}_j = \mu_j\mathbf{w}_j, \quad \mathbf{\Phi}_j
    = \mathbf{X}_1\mathbf{V}\mathbf{\Sigma}^{-1}\mathbf{w}_j,$$


    where $\mu_j = e^{\lambda_j \Delta t}$ are discrete Koopman eigenvalues and $\mathbf{\Phi}_j$
    the *DMD modes*. Reconstruction reads $\mathbf{x}(t) \approx \sum_j \mathbf{\Phi}_j
    e^{\lambda_j t} b_j$, with coefficients $b$ fitted from the first snapshot.


    ```

    import numpy as np, matplotlib.pyplot as plt

    from scipy.linalg import svd, eig

    # snapshots of the cylinder wake velocity field $U \in \mathbb{R}^{N \times m}$

    X0, X1 = U[:, :-1], U[:, 1:]

    U, $\Sigma$, Vh = svd(X0, full_matrices=False)

    r = 30

    Ur, $\Sigma$r, Vr = U[:, :r], np.diag($\Sigma$[:r]), Vh[:r, :]

    A_tilde = Ur.T @ X1 @ Vr.T @ np.linalg.inv($\Sigma$r)

    $\mu$, W = eig(A_tilde)

    $\phi$ = X1 @ Vr.T @ np.linalg.inv($\Sigma$r) @ W

    $\lambda$ = np.log($\mu$)/$\Delta$t

    ```


    # Koopman Spectral Analysis in Python


    # Example 9.5.1 (Duffing Oscillator)


    $$\ddot{x} + 0.15\dot{x} + x^3 - x = 0.2 \cos 1.2t.$$


    Simulate over $t \in [0, 400]$ with $\Delta t = 0.05$, stack $(x, \dot{x})$ snapshots,
    and compute DMD. The dominant eigenvalues cluster near the imaginary axis at $\pm
    i 1.2$, exposing the forced frequency; subdominant eigenvalues have real part
    $\approx -0.075$, matching analytical damping $\zeta \omega_n$. Koopman modes
    reconstruct phase portraits with error <3% over $t \leq 50$.


    For high-dimensional data, *extended DMD* augments the observable space with nonlinear
    dictionary functions (polynomials, sines) to capture spectral features beyond
    the linear basis, at the cost of solving a compressed-sensing regression.


    # 9.5.2 Reservoir Computing for Chaotic Time Series


    Reservoir computing seeds a large, fixed recurrent network (the *reservoir*) with
    random weights and trains only a linear readout layer, sidestepping vanishing-gradient
    issues of fully trained RNNs.'
