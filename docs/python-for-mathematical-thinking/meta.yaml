    11. 二极管电路遵循


    $$I_s(e^{V_D/nV_T} - 1) = \frac{V_{in} - V_D}{R}, \quad V_{in} = 1\,\text{V},
    \; I_s = 10^{-12}\,\text{A}, \; n = 1.6,$$


    $$V_T = 25.8\,\text{mV}, \quad R = 10^3\,\Omega.$$


    (i) 为 $V_D$ 建立牛顿迭代；计算从 $0\,\text{V}$ 开始保证单调收敛的阻尼因子。(ii) 描述自适应时间步长和线法如何将求解器扩展到瞬态
