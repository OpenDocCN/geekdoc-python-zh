  md: "# Transition Matrices and Long-Term Behaviour\n\n**Chapman–Kolmogorov** For\
    \ $n \\geq 0, k \\geq 1$,\n\n$$P^{(n+k)} = P^{(n)} P^{(k)}, \\quad P^{(n)} = P^n,$$\n\
    \nwhere $P^n$ is the $n$-step transition matrix.\n\n**Classification of States**\
    \ A state $i$ is\n\n+   - *Recurrent* if the chain returns to $i$ with probability\
    \ 1\n- *Transient* otherwise\n- *Periodic* with period $d$ if returns occur only\
    \ at multiples of $d$\n- *Absorbing* if $P_{ii} = 1$\n\n**Stationary Distribution**\
    \ Vector $\\boldsymbol{\\pi}$ with $\\boldsymbol{\\pi} P = \\boldsymbol{\\pi}$\
    \ and $\\sum_i \\pi_i = 1$. If $P$ is *irreducible* and *aperiodic*, then\n\n\
    $$\\lim_{n \\to \\infty} P^n = \\mathbf{1} \\boldsymbol{\\pi},$$\n\nso $\\mathbb{P}(X_n\
    \ = s_j) \\to \\pi_j$ regardless of initial state.\n\n**Example 5.4.1 (Weather\
    \ Model: Sunny (S), Cloudy (C), Rainy (R))**\n\n$$P = \\begin{pmatrix} 0.7 & 0.2\
    \ & 0.1 \\ 0.3 & 0.4 & 0.3 \\ 0.2 & 0.3 & 0.5 \\end{pmatrix}.$$\n\npython\nimport\
