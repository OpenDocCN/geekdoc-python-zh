  md: "# Lyapunov Exponents and Their Calculation\n\nFor map $x_{n+1} = f(x_n)$, the\
    \ **Lyapunov exponent**\n\n$$\\lambda = \\lim_{N \\to \\infty} \\frac{1}{N} \\\
    sum_{n=0}^{N-1} \\ln |f'(x_n)|$$\n\nmeasures the exponential rate of separation\
    \ of nearby orbits. Positive $\\lambda$ indicates chaos; $\\lambda = 0$ marginal\
    \ stability; negative $\\lambda$ contraction.\n\nFor the logistic map, $\\lambda(r)$\
    \ can be computed efficiently (cf. Fig. 9.4):\n\n```\ndef lyapunov(r, N=5000,\
    \ discard=1000):\n    x = 0.5\n    lsum = 0\n    for n in range(N+discard):\n\
    \        x = logistic(r,x)\n        if n>=discard: lsum += np.log(abs(r*(1-2*x)))\n\
    \    return lsum/N\nrs = np.linspace(2.5,4,800)\n\\u03bbs = np.array([lyapunov(r)\
    \ for r in rs])\nplt.plot(rs, \\u03bbs); plt.hlines(0,2.5,4,'k'); plt.xlabel('r');\
    \ plt.show()\n```\n\nAt $r = 4$, theoretical $\\lambda = \\ln 2 \\approx 0.6931$\
    \ since $|F_4'(x)| = |4 - 8x|$ has mean 2 under the invariant density $\\rho(x)\
    \ = 1/(\\pi \\sqrt{x(1-x)})$.\n\n![](img/9724708489e3df346f9e31e3fa6e5746_361_0.png)\n\
    \n**Fig. 9.4** Lyapunov exponent $\\lambda(r)$ of the logistic map $x_{n+1} =\
