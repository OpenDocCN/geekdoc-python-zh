    $$\\begin{cases} \\dot{S} = -\\beta S I + \\gamma I - v S, \\\\ \\dot{I} = \\\
    beta S I - \\gamma I, \\end{cases}$$\n\nwhere $S + I = 1$. Reducing to one dimension,\
    \ $\\dot{I} = \\beta(1 - I)I - \\gamma I$. Analyse equilibria $I^* = 0$ and $I^*\
    \ = 1 - \\gamma/\\beta$ (if positive). Vaccination rate $v$ effectively lowers\
    \ $\\beta$; bifurcation at basic reproduction number $R_0 = \\beta/\\gamma = 1$.\n\
    \n![](img/9724708489e3df346f9e31e3fa6e5746_217_0.png)\n\n**Fig. 6.3** Phase-plane\
