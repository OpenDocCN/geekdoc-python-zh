    ```\n\n## Müller’s Method\n\nUsing quadratic extrapolation through three complex\
    \ points $(x_{k-2}, x_{k-1}, x_k)$, Müller attains order 1.84 and naturally handles\
    \ complex roots even if started with real seeds. Beneficial when the derivative\
    \ is unstable.\n\n## Argument Principle and Contour Counts\n\nIf $f$ is analytic\
    \ inside simple closed contour $\\Gamma$ and non-zero on $\\Gamma$, then\n\n$$\\\
    frac{1}{2\\pi i} \\oint_{\\Gamma} \\frac{f'(z)}{f(z)} dz$$\n\nequals the number\
    \ of zeros (minus poles) inside $\\Gamma$. Combined with subdivision (*quad-tree*)\
    \ one localises roots and seeds Newton iterations; packages like `mpmath.polyroots`\
    \ automate this.\n\n## Complex Newton Fractals\n\nThe Newton map $N(z) = z - \\\
    frac{p(z)}{p'(z)}$ partition $\\mathbb{C}$ into basins of attraction, revealing\
    \ intricate fractal boundaries. Visualising $N$ highlights regions where initial\
    \ guesses converge to distinct roots, informing robust seed placement.\n\n## 8.2\
    \ Optimisation Techniques\n\nOptimisation asks for the *best* element of a feasible\
    \ set with respect to an objective function. In the smooth unconstrained setting\
    \ one searches for a minimiser of $f : \\mathbb{R}^d \\to \\mathbb{R}$ by iteratively\
    \ descending along directions that locally promise the steepest decrease. The\
    \ *gradient descent* family embodies this principle, spawning variants that accelerate\
    \ convergence, tame noise, and adapt learning rates—techniques that lie at the\
    \ heart of modern machine learning, inverse problems, and data fitting.\n\n###\
    \ 8.2.1 Gradient Descent\n\n#### Basic Gradient Descent and Variants\n\nFor a\
    \ differentiable $f$ with Lipschitz-continuous gradient ($\\|\\nabla f(x) - \\\
    nabla f(y)\\| \\le L\\|x - y\\|$), the basic iteration reads\n\n$$x_{k+1} = x_k\
    \ - \\eta_k \\nabla f(x_k), \\quad k = 0, 1, 2, \\ldots,$$\n\nwhere $\\eta_k >\
    \ 0$ is the *step size*. If $f$ is convex and $\\eta_k \\in (0, 2/L)$, the sequence\
    \ $\\{f(x_k)\\}$ monotonically decreases and obeys $f(x_k) - f^\\star \\le \\\
    frac{\\|x_0 - x^\\star\\|^2}{2\\eta k}$ (sublinear $O(1/k)$ rate). When $f$ is\
    \ $\\mu$-strongly convex, a fixed $\\eta \\le 2/(L + \\mu)$ yields linear convergence:\
    \ $\\|x_k - x^\\star\\|^2 \\le (1 - \\eta \\mu)^k \\|x_0 - x^\\star\\|^2$.\n\n\
