  md: '# Graph Representation in Python


    **Adjacency List vs. Matrix** Adjacency lists store neighbours per vertex—optimal
    for sparse graphs ($O(|V| + |E|)$ memory); adjacency matrices cost $|V|^2$ but
    allow $O(1)$ edge queries and vectorised linear-algebra kernels.


    ```

    import networkx as nx


    # Build a simple graph

    G = nx.Graph()

    G.add_edges_from([(0,1), (0,2), (1,3), (2,3), (3,4)])


    # Adjacency list

    print(G.adj[0]) # neighbours of 0


    # Adjacency matrix (NumPy CSR)

    A = nx.to_scipy_sparse_array(G, dtype=int)

    print(A.todense())

    ```


    **Edge Attribute Dictionaries** NetworkX attaches weights/capacities:

    `G[0][1][''capacity''] = 15`


    **Algorithmic Primitives** Shortest path (Dijkstra), maximum flow (Edmonds–Karp),
    and centrality scores are one-liners.


    ```

    length = nx.shortest_path_length(G, source=0, target=4, weight=None)

    flow_val, flow_dict = nx.maximum_flow(G, 0, 4, capacity=''capacity'')

    ```


    # Graph Isomorphism and Subgraph Isomorphism


    Two graphs $G = (V, E)$ and $G'' = (V'', E'')$ are *isomorphic* if a bijection
    $\varphi : V \to V''$ preserves adjacency ($\{u, v\} \in E \iff \{\varphi(u),
    \varphi(v)\} \in E''$). The decision problem GI lies in NP; Babai (2020) showed
    quasi-polynomial time, yet full polynomial status is open.


    Practical solvers—nauty/traces, `networkx.algorithms.isomorphism` (Weisfeiler–Lehman
    + VF2)—distinguish graphs with thousands of vertices.


    ```

    from networkx.algorithms import isomorphism

    GM = isomorphism.GraphMatcher(G, G.copy())

    print("Isomorphic" if GM.is_isomorphic() else "Different")

    ```


    **Subgraph Isomorphism** Given graphs $H$ and $G$, decide whether $H$ embeds as
    an induced (subgraph of $G$. The problem is NP-complete (Karp, 1972). Nonetheless
    VF2 backtracking with feasibility pruning solves patterns up to 30–40 nodes rapidly
    for sparse $G$.


    ```

    P = nx.path_graph(3)

    matcher = isomorphism.GraphMatcher(G, P)

    print(matcher.subgraph_is_isomorphic()) # any 3-path in G?

    ```'
