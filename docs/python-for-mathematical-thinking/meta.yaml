    # 11.3.2 Computational Topology


    Computational topology operationalises algebraic invariants—homology, cohomology,
    persistent modules—by translating them into linear-algebraic manipulations on
    sparse matrices. The dual imperatives are algorithmic efficiency (near-linear
    time in the number of simplices) and numerical robustness over finite fields.
    This subsection grounds the machinery in simplicial complexes, surveys biologically
    inspired and network-centric applications, elucidates the Mapper algorithm as
    a human-interpretable topological lens, and sketches frontiers such as zigzag
    persistence and discrete Morse theory.'
  - "[PAGE 479]\n\n# Simplicial Complexes and Homology Groups\n\n# Abstract Simplicial\
    \ Complex\n\nGiven finite vertex set $V$, an *abstract simplicial complex* is\
    \ a family $K \\subseteq 2^V$ closed under inclusion: $\\sigma \\in K$ and $\\\
    tau \\subseteq \\sigma \\Rightarrow \\tau \\in K$. A $k$-simplex is a subset of\
    \ size $k+1$, its *faces* all proper subsets.\n\n# Chain Groups and Boundary Maps\n\
    \nFix coefficient field $\\mathbb{k} = \\mathbb{Z}_2$ (so orientation signs disappear).\
    \ The $k$-chain group\n\n$$C_k(K; \\mathbb{k}) = \\left\\{ \\sum_{\\sigma^k \\\
    in K_k} a_\\sigma \\sigma^k \\;\\middle|\\; a_\\sigma \\in \\mathbb{k} \\right\\\
    } \\cong \\mathbb{k}^{|K_k|}.$$\n\nBoundary operator $\\partial_k : C_k \\to C_{k-1}$\
    \ acts $\\partial_k([v_0, \\dots, v_k]) = \\sum_{i=0}^k [v_0, \\dots, \\widehat{v_i},\
    \ \\dots, v_k]$ (where $\\widehat{\\cdot}$ denotes omission) and satisfies $\\\
    partial_{k-1} \\circ \\partial_k = 0$. Homology groups $H_k(K) = \\ker \\partial_k\
    \ / \\operatorname{im} \\partial_{k+1}$ encode $k$-dimensional “holes”; Betti\
    \ numbers $\\beta_k = \\dim H_k$.\n\n# Example: Boundary Matrices\n\nTetrahedron\
    \ shell: vertices $\\{0, 1, 2, 3\\}$; four faces $[012], [013], [023], [123]$.\
    \ Over $\\mathbb{Z}_2$\n\n```\nimport numpy as np\nB2 = np.array([\n    [1,1,1,0],\
    \ # edge 01 in faces 012,013\n    [1,0,0,1], # edge 02 in faces 012,023\n    [0,1,0,1],\
    \ # edge 03 in faces 013,123\n    [1,0,1,0], # edge 12 in faces 012,123\n    [0,1,1,0],\
    \ # edge 13 in faces 013,123\n    [0,0,1,1] # edge 23 in faces 023,123\n])\nrkB2\
    \ = np.linalg.matrix_rank(B2 % 2) # rank = 3\nβ1 = 6 - rkB2 # β1 = 3 edges - rank\
    \ = 3-? calculate\n```\n\nGaussian elimination mod 2 reveals $\\beta_2 = 1, \\\
    beta_1 = 0, \\beta_0 = 1$—a hollow 2-sphere.\n\n# Algorithmic Note\n\nFor $n$\
    \ simplices, boundary matrices are upper-triangular under filtration order; column-reduction\
    \ in $O(n^3)$ worst-case, but $O(n^\\omega)$ with fast matrix multiplication"
