    from "1" whose barcode lacks long 1-cycles. Featurising diagrams via persistence
    images $P : \mathbb{R}^2 \to \mathbb{R}_{\ge 0}$ enables convolutional nets to
    ingest topological signatures.


    *Protein Folding* Alpha-carbon coordinates generate $\alpha$-complex filtration;
    long $H_1$ intervals indicate stable tunnels in $\beta$-barrels; $H_2$ captures
    cavities relevant to ligand'
