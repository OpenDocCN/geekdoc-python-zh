    \n### 4.2.2 二分搜索\n\n**二分搜索**是一种分治算法，用于在有序数组中查找目标值的位置。它通过将搜索区间反复减半来工作，在每一步中消除一半剩余的元素。这种指数级的剪枝赋予了二分搜索其对数时间复杂度，使其成为计算机科学中最基本和最高效的算法之一。\n\
