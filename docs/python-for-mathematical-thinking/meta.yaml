    # Ensemble Methods: Bagging, Boosting, and Stacking


    Bagging (Bootstrap Aggregating)


    Given base learner $h$, form $B$ bootstrapped replicas $h_b$. Aggregated estimator
    reduces variance: $\text{Var}\left[\frac{1}{B} \sum h_b\right] = \frac{\rho \sigma^2}{B}
    + (1-\rho)\sigma^2$, where $\rho$ is pairwise correlation.


    AdaBoost (Freund and Schapire 1997)


    Exponential loss:


    $F_M(\mathbf{x}) = \sum_{m=1}^M \alpha_m h_m(\mathbf{x}), \quad \alpha_m = \frac{1}{2}
    \ln \frac{1-\varepsilon_m}{\varepsilon_m},$


    weights updated $w_i \leftarrow w_i e^{-\alpha_m y_i h_m(\mathbf{x}_i)}$ and renormalised.
    Minimises empirical risk under margin-exponential cost; can overfit noisy labels.


    Gradient Boosting


    For differentiable loss $L(y, F)$ fit base learner to negative gradient $g_i^{(m)}
    = -\partial_F L(y_i, F_{m-1}(\mathbf{x}_i))$, update $F_m = F_{m-1} + \eta \gamma_m
    h_m$, with step size $\gamma_m$ from line search. XGBoost adds shrinkage, column
    subsampling, and $\ell_2$ regularisation on leaves.


    Stacking


    Level-0 models $\{h_k\}$ generate meta-features $z_{ik} = h_k(\mathbf{x}_i)$;
    level-1 learner $\tilde{h}$ trained on $\mathbf{z}_i$ predicts. Use $K$-fold split
    to avoid target leakage. Theoretically, stacking approximates convex combination
    envelope when $\tilde{h}$ is linear; nonlinear meta may capture interaction among
    base predictors.


