    # Heat Equation on Half-Line (Laplace in Time)


    $$u_t = \kappa u_{xx}, \quad x > 0, \ t > 0, \quad u(x, 0) = 0, \ u(0, t) = g(t).$$


    Laplace transform in $t$ gives $sU = \kappa U_{xx}$ with $U(x, s) = A(s)e^{-\sqrt{s/\kappa}
    x}$ (decaying branch). Boundary condition $U(0, s) = G(s) \implies A(s) = G(s)$.
    Invert:


    $$u(x, t) = \mathcal{L}^{-1}\left\{G(s)e^{-\sqrt{s/\kappa} x}\right\}(t) = \frac{x}{2\sqrt{\pi
    \kappa t^3}} \int_0^t g(\tau) \exp\left(-\frac{x^2}{4\kappa(t - \tau)}\right)
    \sqrt{t - \tau} \, d\tau.$$


    For impulsive boundary $g(t) = \delta(t - t_0)$, solution reduces to translated
    heat kernel.


