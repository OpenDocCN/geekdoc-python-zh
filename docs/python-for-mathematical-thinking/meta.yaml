    \n**Example 3.4.13 (Dot Product Using Einstein Summation)** Let $a^i = (1, 2,\
    \ 3)$, $b_i = (4, 5, 6)$. Then $a^i b_i = 1 \\cdot 4 + 2 \\cdot 5 + 3 \\cdot 6\
    \ = 32$.\n\n```python\nimport numpy as np\na = np.array([1, 2, 3])\nb = np.array([4,\
