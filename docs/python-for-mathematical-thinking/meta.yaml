    The *Rulkov map* for paced sinoatrial nodal tissue,


    $$x_{n+1} = \frac{\alpha}{1 + x_n^2} + y_n, \quad y_{n+1} = y_n - \beta x_n -
    \gamma,$$


    with $(\alpha, \beta, \gamma) = (4.1, 0.001, 0.1)$ mimics the alternans rhythm
    preceding ventricular fibrillation. Bifurcation diagrams reveal a period-doubling
    route to chaos as $\alpha$ crosses 4.0. Feedback pacing algorithms that reset
    $x_n$ when it exceeds a threshold can annihilate chaotic episodes, suggesting
    implantable-device protocols for arrhythmia suppression.


    Population Ecology


    The discrete predator-prey Hasting–Powell model


    $$\begin{cases} x_{n+1} = x_n e^{r(1-x_n) - \frac{a y_n}{1+b x_n}}, \ y_{n+1}
    = y_n e^{-d + \frac{c x_n}{1+b x_n} - \frac{e z_n}{1+f y_n}}, \ z_{n+1} = z_n
    e^{-m + \frac{g y_n}{1+f y_n}}, \end{cases}$$


    exhibits chaotic attractors for $r \gtrsim 2.0$. The resulting broad distribution
    of inter-outbreak intervals matches field data for boreal hare-lynx cycles better
    than purely stochastic Lotka–Volterra models.


    # Applications in Secure Communications


    Chaotic Masking


    Let $s(t)$ be a plaintext analogue signal. Transmitter embeds $s$ into a drive
    Lorenz system


    $$\dot{x}_T = \sigma(y_T - x_T), \quad \dot{y}_T = \rho x_T - y_T - x_T z_T +
    k s(t), \quad \dot{z}_T = x_T y_T - \beta z_T,$$


    and broadcasts $x_T(t)$. A synchronised receiver obeys identical dynamics without
    the $k s(t)$ term; subtracting its $x_R$ recovers $s(t)$. Security stems from
    the difficulty of parameter identification under noise; however, adaptive observers
    and spectral filtering can compromise low-dimensional schemes. Modern *chaos-shift-keying*
    employs high-order piecewise linear maps (dimension $\ge 10$) cascaded with digital
    scramblers to withstand reconstruction attacks.'
