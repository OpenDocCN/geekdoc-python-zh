  md: '# Example 8.5.3 (Amplification Factor of Crank–Nicolson)


    $$G(\xi) = \frac{1 - \lambda(1 - \cos \xi h)}{1 + \lambda(1 - \cos \xi h)}, \quad
    |G(\xi)| = 1.$$


    Hence Crank–Nicolson is *A-stable*: unconditional magnitude stability, though
    dispersive oscillations may arise for large $k$ without sufficient temporal damping.


    When nonlinearity enters, linearised stability or energy methods step in:


    +   1. *Energy estimate* multiply PDE by numerical solution, integrate.

    2. *Discrete Grönwall* bounds growth $\|u^n\| \le C e^{\alpha t_n}$.

    3. *Total-variation-diminishing* (TVD) schemes limit numerical oscillations for
    conservation laws (*Godunov*, *MUSCL*).


    **Synthesis** Finite-difference discretisations translate calculus into algebra;
    the method of lines recasts space-time problems into stiff ODEs ripe for adaptive
    solvers; stability criteria—Courant bounds, von Neumann spectra, A-stability—police
    step sizes and stencil choices, ensuring that the numerical imitation shadows
    the continuous reality.


    # 8.5.2 Spectral Methods


    Spectral methods approximate the solution of differential equations by expanding
    the unknown function in terms of globally supported basis functions—typically
    orthogonal polynomials or trigonometric functions—and enforcing the governing
    equations to hold exactly at a discrete set of collocation points. Because the
    basis functions are infinitely differentiable, the resulting convergence for smooth
    data is often *exponential*: each additional mode roughly doubles the number of
    correct digits until the error approaches machine precision. Unlike finite differences,
    where accuracy is obtained by shrinking the mesh, spectral accuracy exploits the
    *analyticity* of the solution; when singularities are distant from the real axis,
    only a handful of modes can resolve vortical structures that would require millions
    of grid points in low-order schemes.


    # Chebyshev Polynomials and Fourier Spectral Methods


    Chebyshev polynomials $T_n(x) = \cos(n \arccos x)$ form an orthogonal basis on
    $[-1, 1]$ with weight $(1 - x^2)^{-1/2}$. Expanding $u(x) = \sum_{n=0}^N a_n T_n(x)$
    and enforcing a differential equation at the Chebyshev–Gauss–Lobatto nodes


    $$x_j = \cos\left(\frac{\pi j}{N}\right), \quad 0 \le j \le N,$$'
