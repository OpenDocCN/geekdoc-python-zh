    # Using Pandas for Data Cleaning


    Let the raw table be a matrix $X \in \mathbb{R}^{n \times p}$ indexed by $i =
    1, \ldots, n$ observations and $j = 1, \ldots, p$ attributes. pandas abstracts
    $X$ as a DataFrame $\mathcal{D}$, augmenting numerical entries by heterogeneous
    types (timestamps, categories, objects).


    ```

    import pandas as pd

    df = pd.read_csv("meteorological.csv") # sample: temp, humidity, wind, ...

    df.info(show_counts=True)

    df.describe(include="all").T # summary statistics

    ```


    Key operations mirror linear algebra:


    $\mathcal{D}_S = \text{df.loc}[:, S], \quad \mathcal{D}^{(k)} = \text{df.iloc}[k],$

    $\mathcal{D} \cup \mathcal{E} = \text{pd.concat}([df, \text{other}], \text{axis}=0)$.


    Vectorised boolean masks execute set-theoretic filters at $O(n)$ complexity, avoiding
    quadratic Python loops.


    # Handling Missing Data and Outliers


    Let $M = \{(i, j) : \mathcal{D}_{ij} = \text{NaN}\}$. Define the missing-indicator
    matrix $\mathbf{1}_M \in \{0, 1\}^{n \times p}$. Two canonical imputation rules:


    $\hat{x}_{ij} = \begin{cases} x_{ij}, & (i, j) \notin M, \ \frac{1}{|\mathcal{N}(j)|}
    \sum_{k \in \mathcal{N}(j)} x_{kj}, & \text{mean/mode}, \ \mu_j + Z_i \sigma_j,
    & \text{stochastic imputation}, \end{cases}$


    where $\mathcal{N}(j)$ indexes valid rows in column $j$ and $Z_i \sim \mathcal{N}(0,
    1)$.


    ```

    from sklearn.impute import KNNImputer

    imputer = KNNImputer(n_neighbors=5, weights="distance")

    df_imputed = pd.DataFrame(imputer.fit_transform(df), columns=df.columns)

    ```


    *Outliers* For univariate series $x_{1:n}$, flag $x_i$ when


    $|x_i - \bar{x}| > k \sigma \quad \text{or} \quad x_i \notin [Q_1 - 1.5 IQR, Q_3
    + 1.5 IQR]$.


    where $\bar{x}$ is the median and $IQR = Q_3 - Q_1$. Robust Z-scores with median
    absolute deviation (MAD) retain 95.'
