    \n## 6.3 特殊函数与变换技术\n\n### 6.3.1 拉普拉斯变换及其应用\n\n**拉普拉斯变换** 将时域中的微分转换为复 $s$ 平面中的代数乘法，从而将具有分段或脉冲强迫的初值问题线性化。对于一个几乎处处局部可积、指数阶为\
