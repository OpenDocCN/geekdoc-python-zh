    \ ODE。\n\n### 线性一阶方程\n\n$$\\frac{dy}{dx} + P(x) y = Q(x).$$\n\n乘以积分因子 $\\mu(x)\
    \ = e^{\\int P(x) dx}$ 将左边变为 $\\frac{d}{dx}[\\mu(x)y] = \\mu(x)Q(x)$，因此\n\n$$y(x)\
