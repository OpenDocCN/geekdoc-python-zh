    \ b)\n            dW,db = backward(Y[:,j], Z, A, W)\n            for ℓ in range(len(W)):\n\
    \                dW[ℓ] += weight_decay*W[ℓ] # 岭回归\n                Vw[ℓ] = β*Vw[ℓ]\
    \ + (1-β)*dW[ℓ]\n                Vb[ℓ] = β*Vb[ℓ] + (1-β)*db[ℓ]\n             \
    \   W[ℓ] -= lr*Vw[ℓ]; b[ℓ] -= lr*Vb[ℓ]\n        if epoch%10==0:\n            acc\
