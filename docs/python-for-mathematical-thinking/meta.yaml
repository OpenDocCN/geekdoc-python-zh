    **Population Proportion (Wald and Wilson)** For $X \sim \text{Bin}(n, p)$, Wald
    CI is $\hat{p} \pm z_{1-\alpha/2}\sqrt{\hat{p}(1-\hat{p})/n}$; Wilson (Agresti–Coull)
    is preferred for small $n$.


    **Example 5.3.7 (Defect Rate)** 18 defective widgets in $n = 200$.


    ```

    k,n = 18,200

    p_hat = k/n

    z = st.norm.ppf(0.975)

    wald = p_hat + np.array([-1,1])*z*np.sqrt(p_hat*(1-p_hat)/n)

    wilson_low = (2*k+z**2 - z*np.sqrt(z**2 + 4*k*(1-p_hat)))/(2*(n+z**2))

    wilson_hi = (2*k+z**2 + z*np.sqrt(z**2 + 4*k*(1-p_hat)))/(2*(n+z**2))

