  md: '# Online Resources


    +   - **SciPy documentation**—https://docs.scipy.org/doc/ (HTML, PDF)

    - **SymPy documentation**—https://docs.sympy.org/

    - **NumPy & SciPy mailing lists**—peer support and development discussion

    - **Project-Jupyter**—interactive notebooks for reproducible mathematics

    - **Stack Overflow** tag [python-numpy], [scipy], [sympy] for community Q&A

    - **arXiv e-prints** (cs.MS, math.NA) for cutting-edge numerical algorithms implemented
    in Python


    # Python Libraries and Documentation


    | Package | Import | Scope/highlights |

    | :--- | :--- | :--- |

    | NumPy | import numpy as np | Core n-D arrays, BLAS & LAPACK wraps, random RNG,
    broadcasting |

    | SciPy | import scipy as sp | Optimisation, ODEs, FFTs, stats, sparse LA |

    | Matplotlib | import matplotlib.pyplot as plt | 2-D & 3-D plotting, LaTeX text
    rendering |

    | SymPy | import sympy as sp | CAS: algebra, calculus, logic, physics, code generation
    |

    | pandas | import pandas as pd | Data frames, time series, CSV/SQL/Parquet IO
    |

    | Numba | import numba as nb | LLVM JIT for array loops, parallel & GPU targets
    |

    | mpi4py | from mpi4py import MPI | MPI bindings: distributed linear algebra,
    PDE solvers |

    | CuPy / PyTorch / TensorFlow | import cupy, torch, tensorflow | GPU tensors,
    automatic differentiation, deep nets |

    | JAX | import jax.numpy as jnp | XLA-optimised NumPy with automatic differentiation
    |


    **Licence Reminders** Most libraries above are BSD or MIT-licensed; verify GPL/L-GPL
    dependencies (e.g. GNU GSL) when distributing closed-source binaries.'
