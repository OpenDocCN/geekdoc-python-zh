  md: '# 3.4.3 Tensor Calculus


    **Tensor calculus** generalises vector calculus to multilinear functions and curved
    spaces. It underlies differential geometry, continuum mechanics, and Einstein’s
    theory of general relativity. Tensors extend the concept of scalars (rank-0),
    vectors (rank-1), and matrices (rank-2) to arbitrary rank $(r, s)$, representing
    multilinear maps with $r$ contravariant (upper) and $s$ covariant (lower) indices.
    Python, via SymPy’s tensor module and NumPy for numerical index manipulation,
    enables symbolic and numerical tensor computation.


    # Index Notation and Einstein Summation


    In *index notation*, a tensor equation is written using indices to denote components,
    e.g.:


    $A^i_j, \quad T^{\mu\nu}_\lambda$.


    The **Einstein summation convention** states: *sum over any repeated index appearing
    once up and once down*:


    $a^i b_i = \sum_i a^i b_i$.


    **Example 3.4.13 (Dot Product Using Einstein Summation)** Let $a^i = (1, 2, 3)$,
    $b_i = (4, 5, 6)$. Then $a^i b_i = 1 \cdot 4 + 2 \cdot 5 + 3 \cdot 6 = 32$.


    ```

    import numpy as np

    a = np.array([1, 2, 3])

    b = np.array([4, 5, 6])

    dot = np.einsum("i,i->", a, b)

    print(dot) # Output: 32

    ```


    **Example 3.4.14 (Matrix-Vector Multiplication as a Contraction)** Let $A^i_j$
    be a matrix and $v^j$ a vector:


    $w^i = A^i_j v^j$.


    ```

    A = np.array([[1,2], [3,4]])

    v = np.array([5,6])

    w = np.einsum("ij,j->i", A, v)

    print(w) # Output: [17 39]

    ```


    **Example 3.4.15 (Metric Contraction)** Given a metric $g_{ij}$ and contravariant
    vector $v^i$, compute covariant $v_j = g_{ij} v^i$.'
