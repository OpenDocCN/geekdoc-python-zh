    \ mathematical objects into finite memory representations. Python realises laziness\
    \ via the iterator protocol and generator syntax, enabling constructions such\
    \ as an unending stream of primes or Fibonacci numbers.\n\n# 1.8.1 Understanding\
    \ Iterators in Python\n\n# Iterator Protocol\n\nAn *iterator* implements\n\n```\n\
    __iter__(): self,    __next__(): elem\n```\n\nso that `for x in it:` repeatedly\
    \ calls `next(it)` until `StopIteration`. Formally, an iterator is a partial function\
    \ $N \\to S \\cup \\{\\bot\\}$ with at most one $\\bot$.\n\n# Custom Iterators\n\
    \n```\nclass Fibonacci:\n    def __init__(self): self.a, self.b = 0, 1\n    def\
    \ __iter__(self): return self # iterator is iterable\n    def __next__(self):\n\
    \        self.a, self.b = self.b, self.a + self.b\n        return self.a\n```\n\
    \nThe sequence $(F_n)$ emerges lazily; complexity per term is $O(1)$ space.\n\n\
    # 1.8.2 Generators and Lazy Evaluation\n\n# Generator Functions\n\nA function\
    \ containing `yield` suspends execution, storing its frame; each subsequent `next()`\
    \ resumes where it left off, akin to coroutines. This is an external representation\
    \ of coinductive streams.\n\n```\ndef primes():\n    yield 2\n    seq, p = [],\
    \ 3\n    while True:\n        if all(p % q for q in seq):\n            yield p\n\
    \            seq.append(p)\n        p += 2\n```"
