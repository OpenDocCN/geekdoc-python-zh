    }$ defines spheres; the Gilbert–Varshamov bound and Singleton bound constrain\
    \ achievable code parameters $(n, k, d)$. Cyclic codes"
  mdcn: "## 7.5.1 集合、关系与函数\n\n### 集合论基础与韦恩图\n\n一个*集合*是不同元素的无序集合；成员关系由谓词 $x \\in A$\
