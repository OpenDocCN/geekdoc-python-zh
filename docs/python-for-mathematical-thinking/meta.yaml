    \n# 9.4.1 Entropy and Chaos\n\nEntropy furnishes a quantitative bridge between\
    \ dynamical unpredictability and information theory. Where Lyapunov exponents\
    \ gauge the *rate* of exponential separation of nearby trajectories, entropy measures\
    \ the *information production* required to track an orbit to finite resolution.\
    \ For a probability-preserving transformation $T : (\\mathcal{X}, \\mathcal{B},\
    \ \\mu) \\circlearrowleft$ on a compact metric space, the *metric entropy* $h_\\\
    mu(T)$ gauges how quickly distinct initial conditions generate distinguishable\
    \ symbolic names.\n\n# Kolmogorov–Sinai Entropy\n\nLet $\\mathcal{P} = \\{P_1,\
    \ \\dots, P_k\\}$ be a finite measurable partition of $\\mathcal{X}$. Denote $\\\
    mathcal{P}^n = \\bigvee_{j=0}^{n-1} T^{-j} \\mathcal{P}$ the $n$-fold refinement\
    \ and\n\n$$H_\\mu(\\mathcal{P}) = -\\sum_{i=1}^k \\mu(P_i) \\log \\mu(P_i)$$"
