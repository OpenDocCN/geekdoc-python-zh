    \ return self._A @ x\n\nclass Sparse(Matrix):\n    def __init__(self, A: sp.spmatrix):\
    \ self._A = A\n    def matvec(self, x): return self._A @ x\n```\n\nA Krylov solver\
    \ can accept any `Matrix`; run-time dispatch selects the appropriate `matvec`,\
