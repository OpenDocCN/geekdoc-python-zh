    \n### Private Set Intersection\n\nBloom-filter-based PSI enables two hospitals\
    \ to find common patients in $O(n \\log n)$ bandwidth with differential privacy\
    \ on cardinality leakage.\n\n### Application: Secure Federated Logistic Regression\n\
    \nEach client secret-shares gradient $g_m$; servers aggregate via SPDZ, add DP\
    \ noise, and return encrypted global gradient. Guarantees: computational privacy\
    \ against semi-honest adversaries and $(\\varepsilon, \\delta)$-DP.\n\n## 10.5.3\
    \ Responsible AI and Ethical Considerations\n\nBeyond technical safeguards, AI\
    \ systems must align with societal values, legal norms, and environmental constraints.\n\
    \n### Ethical Frameworks and Guidelines for AI Development\n\n**Principle Taxonomies**\n\
    \n- **OECD (2019)**: inclusiveness, transparency, robustness, accountability,\
    \ and human-centred values.\n- **EU AI Act (draft 2024)**: four-tier risk classification;\
