    # Full Fine-Tuning


    Unfreeze last $k$ layers; apply discriminative learning rates $\eta_\ell = \eta_0
    \alpha^{L-\ell}$ (Howard, Ruder, 2018) with $\alpha \in [0.7, 0.9]$. For BERT,
    AdamW with warm-up $\sim 10$.


    # Domain Adaptation


    Minimise combined objective $\mathcal{L} = \mathcal{L}_{\text{task}} + \lambda
    \mathcal{L}_{\text{domain}}$, where $\mathcal{L}_{\text{domain}}$ is Jensen–Shannon
    distance between source and target feature alignments; adversarial gradient reversal
    layers implement minimax.


    # Few-Shot Prompt Tuning (LLMs)


    Keep transformer frozen; learn soft prompts $\mathbf{p} \in \mathbb{R}^{m \times
    d}$ prefixed to token embeddings—only $md$ parameters vs. $\sim 10^9$ in full
    model. Empirically matches full fine-tune on GLUE while training $< 1\%$ weights.


    # 10.4 Advanced Topics in Machine Learning


    # 10.4.1 Model Interpretability and Explainability


    Complex learners—deep networks, gradient-boosted trees, kernel ensembles—often
    outperform transparent models yet resemble *black boxes*. Interpretability seeks
    human-intelligible rationales: which features drive predictions, how sensitive
    are outputs to perturbations, and whether spurious correlations lurk. We formalise
    these questions with axiomatic attributions, local surrogate expansions, and global
    importance measures, illustrating each with concise Python code.


    # SHAP Values, LIME, and Feature Importance


    SHAP (SHapley Additive exPlanations)


    Let $f : \mathbb{R}^p \to \mathbb{R}$ be a trained predictor, $\mathbf{x} \in
    \mathbb{R}^p$ an instance, and $N = \{1, \dots, p\}$ the feature set. A **Shapley
    value** $\phi_j(f, \mathbf{x})$ attributes contribution of feature $j$ via cooperative
    game theory:


    $$\phi_j(f, \mathbf{x}) = \sum_{S \subseteq N \setminus \{j\}} \frac{|S|! (p -
    |S| - 1)!}{p!} \left[ f_{S \cup \{j\}}(\mathbf{x}) - f_S(\mathbf{x}) \right],$$'
