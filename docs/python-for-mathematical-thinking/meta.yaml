    # Itô’s Lemma and Stochastic Calculus


    **Itô Integral** For an adapted process $H_t$ with $\int_0^T \sigma_H^2(t) \,
    dt < \infty$, define


    $$\int_0^T H_t \, dW_t := \text{L}^2 - \lim_{n \to \infty} \sum_{k=0}^{n-1} H_{t_k}
    (W_{t_{k+1}} - W_{t_k}),$$


    where the integrand is *left point sampled*, crucial for martingale preservation.


    **Itô’s lemma** (1-d). Let $X_t$ satisfy $dX_t = \mu(t, X_t) \, dt + \sigma(t,
    X_t) \, dW_t$ and $f(t, x) \in C^{1,2}$. Then


    $$df(t, X_t) = \left( f_t + \mu f_x + \frac{1}{2} \sigma^2 f_{xx} \right) dt +
    \sigma f_x \, dW_t.$$


    Observe the $\frac{1}{2} \sigma^2 f_{xx}$ term stemming from quadratic variation.'
