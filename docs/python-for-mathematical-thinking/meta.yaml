    \ (W[ℓ].T @ δ[0]) * relu_grad(Z[ℓ-1]))\n    dW = [δ[ℓ] @ A[ℓ].T for ℓ, δℓ in enumerate(δ)]\n\
    \    db = [δℓ.sum(axis=1, keepdims=True) for δℓ in δ]\n    return dW, db\n```\n\
    \n## 训练与评估神经网络\n\n带动量的小批量SGD\n\n$$v^{(t+1)} = \\beta v^{(t)} + (1 - \\beta) \\\
