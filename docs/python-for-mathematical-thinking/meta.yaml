    Encoder $\phi_\theta : \mathbf{x} \mapsto \mathbf{z} \in \mathbb{R}^k$, decoder
    $\psi_\phi : \mathbf{z} \mapsto \hat{\mathbf{x}}$. Minimise reconstruction


    $$\mathcal{L}_{\mathrm{AE}}(\theta, \phi) = \frac{1}{n} \sum_{i=1}^n \|\mathbf{x}_i
    - \psi_\phi(\phi_\theta(\mathbf{x}_i))\|_2^2.$'
