    # Secure Multi-party Computation


    Let $P_1, \ldots, P_M$ possess private inputs $x_1, \ldots, x_M$. A secure protocol
    computes $f(x_1, \ldots, x_M)$ such that no party learns more than the output.


    # Additive Secret Sharing


    Over ring $\mathbb{Z}_p$, split value $v$ into random shares $v_1, \ldots, v_M$
    with $\sum v_m \equiv v \pmod{p}$. Addition and scalar multiplication are share-wise;
    multiplication requires Beaver triples $(a, b, c)$ with $c = ab$. Protocol (SPDZ)
    evaluates arithmetic circuits with $O(1)$ rounds per gate and pre-processed correlated
    randomness.


    # Homomorphic Encryption (HE)


    Given public key pk, ciphertexts $\llbracket x \rrbracket$, one can compute $\llbracket
    x + y \rrbracket$ and $\llbracket x \cdot y \rrbracket$ without decryption (BFV
    scheme). Inference pipelines encode neural layers as polynomial approximations
    (Chebyshev) to circumvent non-polynomial activations; latency remains $\sim 10\text{--}100\times$
    plaintext.


    # Private Set Intersection


    Bloom-filter-based PSI enables two hospitals to find common patients in $O(n \log
    n)$ bandwidth with differential privacy on cardinality leakage.


    # Application: Secure Federated Logistic Regression


    Each client secret-shares gradient $g_m$; servers aggregate via SPDZ, add DP noise,
    and return encrypted global gradient. Guarantees: computational privacy against
    semi-honest adversaries and $(\varepsilon, \delta)$-DP.'
