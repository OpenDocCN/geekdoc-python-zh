    \ convergence\")\n```\n\n**Example 8.1.2 (Intersection of Two Cylinders)** Solve\
    \ $F(x, y, z) = (x^2 + y^2 - 1, \\quad y^2 + z^2 - 1, \\quad x^2 + z^2 - 1) =\
