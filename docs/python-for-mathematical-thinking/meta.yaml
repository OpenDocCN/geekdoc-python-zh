    # Multiple Steady States in CSTR


    The energy and material balances yield two equations in temperature $T$ and concentration
    $c$: $0 = F_1(T, c)$, $0 = F_2(T, c)$. Continuation in the Damköhler number $Da$
    discovers ignition/extinction points; Newton solves each continuation step.


    # Continuation Methods and Bifurcation Analysis


    Let $F(\mathbf{x}, \lambda) = \mathbf{0}$ depend on scalar parameter $\lambda$.
    Continuation traces the solution curve $\mathcal{C} = \{(\mathbf{x}(s), \lambda(s))
    : F(\mathbf{x}(s), \lambda(s)) = \mathbf{0}\}$.


    # Pseudo-arclength Continuation


    Predictor: advance a small step $\Delta s$ along tangent $(\dot{\mathbf{x}}, \dot{\lambda})$
    obtained from


    $$[J(\mathbf{x}, \lambda) \; \partial_{\lambda} F] \begin{bmatrix} \dot{\mathbf{x}}
    \ \dot{\lambda} \end{bmatrix} = \mathbf{0}.$


    Corrector: solve the augmented system


    $$\begin{cases} F(\mathbf{x}, \lambda) = \mathbf{0}, \ (\mathbf{x} - \mathbf{x}_p)^T
    \dot{\mathbf{x}}_p + (\lambda - \lambda_p) \dot{\lambda}_p - \Delta s = 0 \end{cases}$$


    with Newton, where $(\mathbf{x}_p, \lambda_p)$ is the predictor point. The extra
    equation fixes parameterisation, allowing traversal through turning points where
    $\det J = 0$.


    # Detecting Bifurcations


    At a saddle-node (fold) bifurcation $\det J = 0$, but $\mathbf{w}^T \partial_{\lambda}
    F \neq 0$ for left null vector $\mathbf{w}$. A Hopf bifurcation occurs when a
    complex-conjugate pair of Jacobian eigenvalues crosses the imaginary axis; tracking
    eigenvalues of $J(\mathbf{x}(s), \lambda(s))$ along $\mathcal{C}$ diagnoses the
    event.


