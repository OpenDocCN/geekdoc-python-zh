    \ represents an equation as a structured tree and rewrites it through algebraic\
    \ identities; Fourier and wavelet analysis represent a function as a superposition\
    \ of orthogonal or localised bases; time-series models represent temporal dependencies\
    \ through state-space or spectral poles; topological data analysis represents\
    \ a point cloud by homology classes that persist across scales; quantum circuits\
    \ represent linear maps on Hilbert spaces through tensor products of elementary\
    \ gates; and"
