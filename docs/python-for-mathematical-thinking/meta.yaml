    \ lr=0.05, momentum=0.9)\nlossf = nn.CrossEntropyLoss()\nfor imgs, lbls in loader:\
    \  # mini-batch iterator\n    opt.zero_grad()\n    out = net(imgs)\n    loss =\
    \ lossf(out, lbls)\n    loss.backward()\n    opt.step()\n```\n\n##### Stochastic\
    \ Gradient Descent and Mini-Batch Methods\n\nWhen $f(\\theta) = \\frac{1}{N} \\\
    sum_{i=1}^N \\ell_i(\\theta)$ with $N \\gg 1$, computing the full gradient each\
