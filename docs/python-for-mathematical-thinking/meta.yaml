  md: '# Role of Data Structures in Computational Efficiency


    The same algorithm can exhibit dramatically different time and space complexities
    depending on the data structures employed.


    **Example 4.1.1 (Linear Search vs. Binary Search)** Let $A \subset \mathbb{Z}$
    be a list of $n$ integers.


    **Case 1** $A$ is unordered. To test membership:

    `x in A # O(n) in worst case`


    **Case 2** $A$ is a sorted list:

    `import bisect`

    `bisect.bisect_left(A, x) # O(log n)`


    This improvement from linear to logarithmic time is made possible by maintaining
    sorted structure, trading insertion complexity for query speed.


    **Example 4.1.2 (Set Membership vs. List Membership)** Python set uses a hash
    table internally.


    ```

    S = set(range(10**6))

    print(999999 in S) # O(1)


    In contrast:


    L = list(range(10**6))

    print(999999 in L) # O(n)

    ```


    This demonstrates how structure choice alters asymptotic performance.


    **Example 4.1.3 (Sparse vs. Dense Matrices)** Consider solving $Ax = b$ where
    $A \in \mathbb{R}^{n \times n}$ is sparse.


    ```

    Using dense storage:

    import numpy as np

    A = np.eye(1000)


    Memory usage is $O(n^2)$.


    Using sparse storage:

    from scipy.sparse import eye

    A_sparse = eye(1000)

    ```


    Here, only non-zero entries are stored, yielding $O(n)$ storage and enabling fast
    multiplication with vectors.


