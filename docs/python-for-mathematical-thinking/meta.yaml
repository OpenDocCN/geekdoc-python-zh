    # Solving Complex Equations and Systems Symbolically


    Polynomial systems of high degree often defy closed-form radicals yet admit Gröbner
    basis decomposition that reveals geometric multiplicity and solution components.


    **Example 11.1.1** Solve the nonlinear system


    $$\begin{cases} x^3 + y^3 + z^3 - 3xyz = 1, \ x + y + z = 1, \ x^2 + y^2 + z^2
    = 1. \end{cases}$$


    We employ Lex order Gröbner basis over Q to eliminate $y, z$ and reduce to a univariate
    polynomial in $x$. SymPy returns three rational roots, from which $y, z$ follow
    by elementary symmetric relations.


    ```

    import sympy as sp

    x,y,z = sp.symbols(''x y z'')

    F = [x**3+y**3+z**3-3*x*y*z-1, x+y+z-1, x**2+y**2+z**2-1]

    G = sp.groebner(F, x, y, z, order=''lex'')

    univar = G.eliminate(y,z)[0] # cubic in x

