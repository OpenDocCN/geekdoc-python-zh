    $A \in \mathbb{R}^{n \times n}$ 对称正定，$C \succeq 0$，推导 Schur 补公式 $(A + B^\top C^{-1}
    B)\mathbf{u} = \mathbf{f} + B^\top C^{-1}\mathbf{g}$。对于自由度 $n = 128^2$ 的 Stokes
