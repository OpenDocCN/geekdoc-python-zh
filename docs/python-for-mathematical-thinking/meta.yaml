    mathcal{D} \\cup \\mathcal{E} = \\text{pd.concat}([df, \\text{other}], \\text{axis}=0)$.\n\
    \nVectorised boolean masks execute set-theoretic filters at $O(n)$ complexity,\
    \ avoiding quadratic Python loops.\n\n### Handling Missing Data and Outliers\n\
    \nLet $M = \\{(i, j) : \\mathcal{D}_{ij} = \\text{NaN}\\}$. Define the missing-indicator\
    \ matrix $\\mathbf{1}_M \\in \\{0, 1\\}^{n \\times p}$. Two canonical imputation\
    \ rules:\n\n$\\hat{x}_{ij} = \\begin{cases} x_{ij}, & (i, j) \\notin M, \\\\ \\\
    frac{1}{|\\mathcal{N}(j)|} \\sum_{k \\in \\mathcal{N}(j)} x_{kj}, & \\text{mean/mode},\
    \ \\\\ \\mu_j + Z_i \\sigma_j, & \\text{stochastic imputation}, \\end{cases}$\n\
    \nwhere $\\mathcal{N}(j)$ indexes valid rows in column $j$ and $Z_i \\sim \\mathcal{N}(0,\
    \ 1)$.\n\n```python\nfrom sklearn.impute import KNNImputer\nimputer = KNNImputer(n_neighbors=5,\
    \ weights=\"distance\")\ndf_imputed = pd.DataFrame(imputer.fit_transform(df),\
    \ columns=df.columns)\n```\n\n*Outliers* For univariate series $x_{1:n}$, flag\
    \ $x_i$ when\n\n$|x_i - \\bar{x}| > k \\sigma \\quad \\text{or} \\quad x_i \\\
    notin [Q_1 - 1.5 IQR, Q_3 + 1.5 IQR]$.\n\nwhere $\\bar{x}$ is the median and $IQR\
    \ = Q_3 - Q_1$. Robust Z-scores with median absolute deviation (MAD) retain 95.\n\
    \n### Data Transformation and Normalisation Techniques\n\nMachine-learning algorithms\
    \ often assume homoskedastic, centred features. Let column $j$ have empirical\
    \ mean $\\mu_j$ and standard deviation $\\sigma_j$. The *standard score*\n\n$$z_{ij}\
    \ = \\frac{x_{ij} - \\mu_j}{\\sigma_j}$$\n\nrenders each feature dimensionless\
