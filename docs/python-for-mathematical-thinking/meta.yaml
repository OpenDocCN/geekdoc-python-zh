  md: 'achieving quadratic convergence without derivative evaluation; it amounts to
    applying the secant method to $g(x) = \varphi(x) - x$ with an automatically generated
    second point.


    *Aitken $\Delta^2$ Process* Given a linearly convergent sequence $\{x_k\}$, $\hat{x}_k
    = x_k - \frac{(x_{k+1}-x_k)^2}{x_{k+2}-2x_{k+1}+x_k}$ produces an accelerated
    sequence often approaching quadratic behaviour; used as a post-processing step
    for simple iteration.


    # Convergence Analysis


    Let $r$ satisfy $f(r) = 0$ and $f''(r) \neq 0$ (simple root). Assuming $f \in
    C^2$ on an open interval containing $r$ and the initial guess $x_0$ is sufficiently
    close to $r$, the error evolves as


    $$e_{k+1} = x_{k+1} - r = -\frac{f(r + e_k)}{f''(r + e_k)} = -\frac{f''(r)e_k
    + \frac{1}{2}f''''(r)e_k^2 + O(e_k^3)}{f''(r) + f''''(r)e_k + O(e_k^2)}$$

    $$= -\frac{f''(r)e_k}{f''(r)} + \frac{f''''(r)}{2f''(r)}e_k^2 + O(e_k^3) = Ce_k^2
    + O(e_k^3),$$


    with $C = -\frac{f''''(r)}{2f''(r)}$. Thus $|e_{k+1}| \approx |C|e_k^2$, so the
    number of correct digits roughly *doubles* each iteration. If $f''(r) = 0$ but
    $f''''(r) \neq 0$ (a multiple root), the convergence drops to linear; one restores
    quadratic order by applying Newton to $g(x) = \frac{f(x)}{f''(x)}$ or by modifying
    the iteration with a multiplicity estimate.


    For global convergence one often embeds a *line-search*: replace the full Newton
    step by $\lambda \Delta x$, $0 < \lambda \leq 1$, chosen to decrease $|f(x)|$
    sufficiently (*Armijo rule*); this prevents divergence when $f''$ is small or
    the function is highly nonlinear.


    # Multivariate Newton''s Method


    For $F : \mathbb{R}^n \to \mathbb{R}^n$ with Jacobian $J(\mathbf{x}) = [\partial
    F_i / \partial x_j]$,

    $$\mathbf{x}_{k+1} = \mathbf{x}_k - J(\mathbf{x}_k)^{-1} F(\mathbf{x}_k).$$


    One solves the linear system $J(\mathbf{x}_k) \Delta \mathbf{x}_k = -F(\mathbf{x}_k)$
    for $\Delta \mathbf{x}_k$ (via LU or QR) and sets $\mathbf{x}_{k+1} = \mathbf{x}_k
    + \Delta \mathbf{x}_k$. Quadratic convergence holds under analogous conditions:
    $J(\mathbf{r})$ nonsingular and $F$ continuously differentiable.'
