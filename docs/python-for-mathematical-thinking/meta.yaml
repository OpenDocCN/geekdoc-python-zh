    A = np.eye(4)

    A[0,-1] = 1e-9

    A[-1,0] = 1e9

    P, L, U = la.lu(A) # partial pivoting

    growth = abs(U).max() / abs(A).max()

    print(f"Growth factor rho = {growth:.2e}") # rho approx 1e9

