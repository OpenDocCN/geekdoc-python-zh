    # 9.1.3 Continuous Dynamical Systems


    The qualitative theory of flows $\dot{\mathbf{x}} = \mathbf{F}(\mathbf{x})$ in
    $\mathbb{R}^n$ concerns the geometry of trajectories, the asymptotic sets they
    approach, and the invariant quantities that constrain motion. Beyond equilibria,
    continuous systems exhibit recurrent orbits (limit cycles), aperiodic yet bounded
    motion on fractal sets (strange attractors), and, in the Hamiltonian setting,
    intricate interleavings of regular tori and stochastic layers produced by homoclinic
    tangles. The visual language of phase portraits, Poincaré sections, and recurrence
    plots turns analytic deductions into tangible pictures; numerical integration
    powered by SciPy and matplotlib turns them into experiments.


    # Phase Portraits and Limit Cycles


    A **phase portrait** is the image of vector field arrows and integral curves in
    state space. In $\mathbb{R}^2$, any closed trajectory $\Gamma$ encloses an area
    where the divergence $\nabla \cdot \mathbf{F}$ decides its fate: by Bendixson’s
    criterion, no limit cycle can exist in a simply connected region where the divergence
    is of one sign.


    The planar *van der Pol oscillator*


    ```

    $$\dot{x} = y, \quad \dot{y} = \mu(1 - x^2)y - x$$

    ```'
  - "[PAGE 365]\n\n350\n\n9 Chaos Theory and Dynamical Systems\n\nFig. 9.6 Phase-plane\
    \ trajectories of the Van der Pol oscillator $\\ddot{x} - \\mu(1 - x^2)\\dot{x}\
    \ + x = 0$ with $\\mu = 1.5$. All solutions spiral toward the unique limit cycle,\
    \ illustrating the self-sustained relaxation oscillations characteristic of the\
    \ nonlinear damping term\n\n![](img/9724708489e3df346f9e31e3fa6e5746_365_0.png)\n\
    \nhas $\\nabla \\cdot \\mathbf{F} = \\mu(1 - x^2)$, changing sign across $|x|\
    \ = 1$. For $\\mu > 0$ trajectories spiral outwards inside the separatrix and\
    \ inwards outside, globally converging to a unique, stable limit cycle (cf. Fig.\
    \ 9.6).\n\n```\npython\nimport numpy as np, matplotlib.pyplot as plt\n$\\mu =\
    \ 1.5$\ndef vdp(t, z): x,y = z; return [y, $\\mu$*(1-x**2)*y - x]\nfrom scipy.integrate\
    \ import solve_ivp\nfor ic in [(2,0),(0.1,0.1),(-3,4)]:\n    sol = solve_ivp(vdp,[0,30],ic,t_eval=np.linspace(0,30,4000))\n\
    \    plt.plot(sol.y[0], sol.y[1])\nplt.xlabel('x'); plt.ylabel('y'); plt.axis('equal');\
    \ plt.show()\n```\n\nFloquet theory linearises near a periodic orbit $\\gamma(t)$\
    \ via the monodromy matrix $M = \\Phi(T)$, where $\\Phi$ is the variational flow\
    \ over one period $T$. A limit cycle is asymptotically stable if its Floquet multipliers\
    \ lie inside the unit disk, except for the trivial multiplier 1 along the tangent.\n\
