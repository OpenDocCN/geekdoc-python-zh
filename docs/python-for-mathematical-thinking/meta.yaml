    \ # raises if cycles present\nprint(set(tc.edges()).issubset(R)) # transitivity?\n\
    ```\n\n# Functions: Injective, Surjective, and Bijective Mappings\n\nA function\
    \ $f : A \\to B$ assigns each $a \\in A$ a unique $b = f(a) \\in B$. The mapping\
    \ is\n\ninjective (one-to-one) $\\Longleftrightarrow$ $(\\forall a_1 \\neq a_2)\\\
    \ f(a_1) \\neq f(a_2)$;\n\nsurjective (onto) $\\Longleftrightarrow$ $(\\forall\
    \ b \\in B)\\ \\exists a \\in A,\\ f(a) = b$;\n\nbijective $\\Longleftrightarrow$\
    \ injective and surjective.\n\nCategorically, bijections are isomorphisms in **Set**;\
    \ they admit inverses $f^{-1} : B \\to A$. Cantor–Bernstein–Schröder states: if\
    \ there exist injections $A \\hookrightarrow B$ and $B \\hookrightarrow A$, then\
    \ a bijection $A \\leftrightarrow B$ exists.\n\n# Example 7.5.3 (Cantor Pairing\
    \ Function)\n\n$\\pi : \\mathbb{N} \\times \\mathbb{N} \\to \\mathbb{N}, \\quad\
    \ \\pi(x, y) = \\frac{1}{2}(x + y)(x + y + 1) + y,$\n\nis bijective, proving $\\\
    mathbb{N}^2$ is countable. Inverse obtained by reversing triangular indexing.\n\
    \n```\nimport math\ndef pair(x, y): return (x+y)*(x+y+1)//2 + y\ndef unpair(z):\n\
    \    w = math.floor((math.sqrt(8*z+1)-1)/2)\n    t = w*(w+1)//2\n    y = z - t\n\
    \    return (w - y, y)\nassert unpair(pair(17, 23)) == (17, 23)\n```\n\nFunction\
    \ composition is associative; identity functions act as units, forming the *category*\
    \ of sets. In computer science, *partial* functions arise naturally—total functions\
    \ on bounded domains extended with a *None* placeholder mirror them in Python."
  - '[PAGE 292]


    **Synthesis** Set-theoretic algebra supplies precise language; relations organise
    elements into structured classes; functions transport structure between sets.
    These three pillars support the later chapters on graph morphisms, automata transitions,
    and measure-theoretic probability, showing that seemingly humble definitions propagate
    far-reaching consequences across discrete mathematics.


    # 7.5.2 Algebraic Structures


    Algebraic structures formalise the intuitive idea of combining objects and studying
    the laws that govern those combinations. They provide a unifying language in which
    arithmetic, symmetry, order, and logic can all be expressed. Once cast in this
    abstract setting, theorems become portable: a property proved for *any* group
    instantly applies to integers under addition, permutations under composition,
    and invertible matrices under multiplication. Python’s arbitrary precision arithmetic
    and its ecosystem of symbolic algebra libraries (sympy, sagemath) create an ideal
    playground for verifying such universal statements computationally.


    # Groups, Rings, and Fields


    A **group** $\langle G, *, e \rangle$ consists of a non-empty set $G$ equipped
    with a binary operation $*$ satisfying associativity, identity, and invertibility.
    If $*$ is commutative the group is *abelian*. Classic examples range from $(\mathbb{Z},
    +, 0)$ through $(\mathbb{Z}_n, +_n, 0)$ to the symmetric group $S_n$ of permutations
    on $n$ letters.

    Groups act on sets via homomorphisms $G \to \text{Sym}(X)$; orbits and stabilisers
    partition the action space, and the orbit-stabiliser theorem $|G| = |G \cdot x|
    \cdot |G_x|$ feeds enumeration (cf. Pólya theory).

    A **ring** $(R, +, \cdot)$ augments an abelian group $(R, +)$ with a second associative
    operation $\cdot$ that distributes over $+$. Rings may or may not have multiplicative
    identities (1). $\mathbb{Z}$, $\mathbb{Z}_n$, and polynomial rings $\mathbb{F}[x]$
    are paradigmatic; Euclidean domains admit a division algorithm, Bézout’s identity,
    and unique factorisation.

    A **field** is a commutative ring where non-zero elements form an abelian multiplicative
    group. Finite fields $\mathbb{F}_{p^k}$ exist for prime-powers $p^k$ and are unique
    up to isomorphism; they support polynomial arithmetic modulo irreducibles and
    underpin most modern cryptosystems.'
