    \ Chapter 1\nIntroduction\n\n**Abstract** This chapter motivates the choice of\
    \ Python as a mathematical workbench, contrasting its open-source ecosystem and\
    \ rich numerical libraries with legacy tools such as MATLAB, R, and Mathematica.\
    \ After establishing a reproducible development environment, it builds a rigorous\
    \ foundation in the language itself—covering core syntax and semantics, primitive\
    \ and composite data types, control-flow constructs, functional abstraction, input/output,\
    \ object-oriented design patterns, and iterator/generator paradigms—all while\
    \ emphasising mathematically literate coding style, numerical precision, and unit-tested\
    \ best practices that will underpin every subsequent chapter.\n\n**Keywords**\
    \ Python · Mathematical computation · Programming fundamentals · Control flow\
    \ · Object-oriented programming · Iterators and generators\n\nPython has evolved\
    \ from a scripting language for system administrators into a mature computational\
    \ ecosystem that *embeds* mathematical ideas as first-class citizens. Its clean\
    \ syntax allows mathematical notation to be mirrored closely in source code—compare\
    \ the one-line comprehension {n² : n ≤ 10} with the textbook set {n² | n ≤ 10}.\
    \ The vast selection of open-source libraries means that whether we seek exact\
    \ arithmetic, symbolic manipulation, or GPU-accelerated tensor calculus, the corresponding\
    \ tools are only an `import` away. Because these libraries are unified by Python’s\
    \ data-model and object protocol, numerical arrays, symbolic expressions, and\
    \ even discrete structures like graphs can be composed seamlessly. In effect,\
    \ Python becomes a *literate mathematical notebook*: an interactive workspace\
    \ where definitions, experiments, conjectures, and proofs coexist—and where computational\
    \ feedback sharpens intuition. Throughout this book we exploit that synergy: every\
    \ conceptual exposition is paired with executable code, and every algorithm is\
    \ dissected with the same rigour that underlies a formal proof.\n\n### 1.1 Why\
    \ Python for Mathematics?\n\n#### 1.1.1 Advantages of Python in Mathematical Computation\n\
    \n**Overview**\n\nAt its core, Python furnishes five features that render it uniquely\
    \ suitable for mathematical work.\n\n1. **Expressive Syntax.** List and dictionary\
    \ comprehensions, multiple assignment, and first-class functions replicate set-builder\
    \ notation, tuples, and λ-calculus constructs directly in code.\n2. **Multi-Paradigm\
    \ Support.** Imperative, functional, object-oriented, and (via sympy) symbolic\
    \ paradigms coexist, allowing the natural choice of abstraction for each problem.\n\
    3. **Rich Numerical Stack.** Libraries such as numpy, scipy, and pandas leverage\
    \ optimised C and Fortran back-ends; they provide $O(n^3)$ dense-matrix algorithms,\
    \ FFTs, and special functions with performance close to MATLAB while remaining\
    \ free and open.\n4. **Interoperability.** The ctypes and cffi interfaces allow\
    \ low-level numerical kernels or legacy FORTRAN routines to be called without\
    \ marshalling overhead, preserving accuracy and speed.\n5. **Interactive Computing.**\
    \ Jupyter notebooks and IPython shells offer REPL-driven exploration, inline LaTeX\
    \ rendering, and rich visualisation—ideal for conjecture testing and pedagogical\
    \ exposition.\n\n**Worked Examples**\n\n**Example 1.1.1 (High-Precision Evaluation\
    \ of $e^{\\pi\\sqrt{163}}$)** The expression $e^{\\pi\\sqrt{163}}$ is famously\
    \ almost an integer (Ramanujan). Using Python's decimal module we verify this\
    \ to 50 decimal places:\n\n```python\nfrom decimal import Decimal, getcontext\n\
    from math import pi, sqrt\n\ngetcontext().prec = 50 # 50 significant digits\n\
    x = Decimal(pi) * Decimal(163).sqrt()\ny = x.exp()\nprint(y)\nprint(y - round(y))\n\
    ```\n\nThe residual is about $7.4 \\times 10^{-40}$, corroborating the near-integer\
    \ phenomenon discussed in Berndt (1989).\n\n**Example 1.1.2 (Solving a Linear\
    \ System $Ax = b$)** Let\n\n$$A = \\begin{pmatrix} 2 & -1 & 0 \\\\ -1 & 2 & -1\
    \ \\\\ 0 & -1 & 2 \\end{pmatrix}, \\quad b = \\begin{pmatrix} 1 \\\\ 0 \\\\ 1\
    \ \\end{pmatrix}.$$\n\nUsing numpy.linalg one writes\n\n```python\nimport numpy\
    \ as np\nA = np.array([[2, -1, 0], [-1, 2, -1], [0, -1, 2]], dtype=float)\nb =\
    \ np.array([1, 0, 1], dtype=float)\nx = np.linalg.solve(A, b)\n```\n\nwhich yields\
    \ the exact rational solution $(x_1, x_2, x_3) = (1, \\frac{3}{2}, 1)$ up to floating-point\
    \ error.\n\n**Common Pitfalls**\n\nPython's accessibility conceals subtleties\
    \ that can entrap the unwary mathematician.\n\n1. **Binary Floating-Point Rounding.**\
    \ The identity $0.1 + 0.2 = 0.3$ is false in IEEE-754 binary.¹ Exact arithmetic\
    \ requires decimal or fractions.\n2. **Mutable Default Parameters.** A function\
    \ definition like\n   ```python\n   def append_item(x, L=[]): L.append(x); return\
    \ L\n   ```\n   accumulates state across calls, violating mathematical purity.\
    \ Use None sentinels instead.\n3. **Algorithmic Performance.** A naive Python\
    \ loop implementing $O(n^2)$ matrix multiplication is thousands of times slower\
    \ than numpy.dot; asymptotic reasoning must be coupled with vectorisation.\n4.\
    \ **Shadowing Built-ins.** Naming a variable sum or max overrides the standard\
    \ library versions, leading to perplexing errors later in the session.\n\nEach\
    \ of these pitfalls will recur throughout the text; we address them systematically,\
    \ providing proof-style reasoning where appropriate and empirical timing curves\
    \ when instructive.\n\n### 1.1.2 Comparison with Other Mathematical Tools\n\n\
    **Python vs. MATLAB**\n\nAlthough both ecosystems excel at numerical linear algebra,\
    \ their design philosophies diverge sharply. MATLAB adopts a *matrix-centric*\
    \ worldview: every datum is an $m \\times n$ array by default, and one-based indexing\
    \ matches traditional algebraic notation. Python, by contrast, treats objects\
    \ abstractly and uses zero-based indexing, which aligns with most modern programming\
    \ languages and allows elegant slicing idioms such as `A[:, k]` for the $k$-th\
    \ column. Performance parity is now typical because numpy calls the same LAPACK/BLAS\
    \ back-ends that underlie MATLAB's `mldivide`. The decisive advantage is Python's\
    \ open architecture: C-extensions, JIT tooling (numba), and GPU bindings (cupy)\
    \ are all available *gratis*. Moreover, symbolic algebra via sympy and combinatorial\
    \ libraries such as networkx integrate seamlessly with numerical code, eliminating\
    \ the need for a separate Computer Algebra System (CAS). The trade-off is that\
    \ Python requires conscious array broadcasting (`np.newaxis`) to emulate MATLAB's\
    \ implicit expansion rules; careless dimension mismatches can introduce latent\
    \ bugs.\n\n**Example 1.1.3 (Least-Squares Fit: MATLAB vs. Python)** Given $A \\\
    in \\mathbb{R}^{m \\times n}$ and $b \\in \\mathbb{R}^m$, MATLAB's solution $x\
    \ = A \\setminus b$ is mirrored in Python as\n\n```python\nimport numpy as np\n\
    x = np.linalg.lstsq(A, b, rcond=None)[0]\n```\n\nBoth invoke QR decomposition\
    \ internally, yielding $\\hat{x} = (A^\\top A)^{-1} A^\\top b$ with identical\
    \ backward-error bounds (Golub and Van Loan 2013).\n\n**Python vs. R**\n\nR was\
    \ conceived for statistical modelling; its syntax reflects formulas, factors,\
    \ and data frames as primitive notions. Python acquires equivalent expressiveness\
    \ through the pandas and statsmodels stacks while adding general-purpose constructs\
    \ such as generators and metaclasses. In time-series analysis, R's xts/zoo objects\
    \ correspond to pandas.Series, but Python's iterator protocol enables lazy evaluation\
    \ of infinite streams—indispensable in stochastic process simulation. For Bayesian\
    \ inference, R's rstan finds a counterpart in pymc; however, Python's ability\
    \ to interleave symbolic differentiation (via jax) with Markov-chain Monte Carlo\
    \ yields gradients $\\nabla \\log p(\\theta \\mid D)$ in a single code path, reducing\
    \ boilerplate.\n\n**Example 1.1.4 (Kernel Density Estimation)** A univariate Gaussian\
    \ KDE requires one line in each language.\n\n```python\nfrom scipy.stats import\
    \ gaussian_kde\npdf = gaussian_kde(samples)\n```\n\nThe call mirrors R's `density(samples)`\
    \ but returns a callable object that vectorises over $\\mathbb{R}^d$, enabling\
    \ direct integration with numpy broadcasting semantics."
