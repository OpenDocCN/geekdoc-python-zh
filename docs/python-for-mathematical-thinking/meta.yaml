    # Characteristic Polynomials


    The characteristic polynomial is


    $$p_{\mathbf{A}}(\lambda) = \det(\lambda \mathbf{I} - \mathbf{A}) = \lambda^n
    + c_{n-1}\lambda^{n-1} + \cdots + c_0.$$


    By the *Cayley–Hamilton Theorem* $\mathbf{A}$ annihilates its own polynomial $p_{\mathbf{A}}$
    (Gantmacher 2000). Symbolically:


    ```

    import sympy as sp

    M = sp.Matrix([[2, -1], [-1, 2]])

    $\lambda$ = sp.symbols("$\lambda$")

    p = M.charpoly($\lambda$)

    print(p.as_expr()) # $\lambda$**2 - 4*$\lambda$ + 3

    print(p.as_expr().subs($\lambda$, M).simplify()) # zero matrix

    ```


