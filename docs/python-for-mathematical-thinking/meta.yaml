    \ \\mathcal{B}$. Polymorphism lets a single interface operate on any element of\
    \ the union $\\bigcup \\text{Obj}(\\mathcal{B}_i)$.\n\n# Example 1.7.2 (Abstract\
    \ Matrix and Concrete Variants)\n\n```\nfrom abc import ABC, abstractmethod\n\
    import numpy as np, scipy.sparse as sp\n\nclass Matrix(ABC):\n    @abstractmethod\n\
    \    def matvec(self, x: np.ndarray) -> np.ndarray: ...\n\nclass Dense(Matrix):\n\
