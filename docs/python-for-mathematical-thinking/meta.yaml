    ## 10.5.2 隐私保护机器学习\n\n机器学习部署通常处理敏感数据，如医疗记录、金融交易或对话日志。监管制度（GDPR、HIPAA）对数据共享施加严格限制，这促使了通过*设计*保证隐私的密码学和统计框架。两种互补的范式主导着研究领域：*带差分隐私的联邦学习*，它将数据留在原地并净化梯度；以及*安全多方计算*，它在不泄露原始输入的情况下执行联合推理。\n\
    \n## 联邦学习与差分隐私\n\n### 联邦优化\n\n假设 $M$ 个客户端各自持有私有数据集 $\\mathcal{D}_m$。最小化全局目标\n\n\
    $$F(\\boldsymbol{\\theta}) = \\frac{1}{M} \\sum_{m=1}^{M} F_m(\\boldsymbol{\\\
    theta}), \\quad F_m(\\boldsymbol{\\theta}) = \\frac{1}{|\\mathcal{D}_m|} \\sum_{(x,y)\
    \ \\in \\mathcal{D}_m} \\ell(\\boldsymbol{\\theta}; x, y).$$\n\n**FedAvg** (Mahan\
    \ et al. 2017) 在每个客户端执行 $E$ 个本地 SGD 步骤，然后将参数更新 $\\Delta_m$ 传输到服务器，服务器对 $\\boldsymbol{\\\
    theta}^{(t+1)} = \\boldsymbol{\\theta}^{(t)} + \\frac{1}{M} \\sum_m \\Delta_m$\
    \ 进行平均。每轮通信成本为 $O(d)$，可通过稀疏化或草图法缓解。\n\n### 差分隐私 (DP)\n\n如果对于任何相差一条记录的相邻数据集 $\\\
    mathcal{D}, \\mathcal{D}'$ 和任何事件 $\\mathcal{S}$，机制 $\\mathcal{M}$ 满足：\n\n$$\\\
    Pr[\\mathcal{M}(\\mathcal{D}) \\in \\mathcal{S}] \\leq e^{\\varepsilon} \\Pr[\\\
    mathcal{M}(\\mathcal{D}') \\in \\mathcal{S}] + \\delta,$$\n\n则称其为 $(\\varepsilon,\
    \ \\delta)$-DP。\n\n**DP-SGD** (Abadi et al. 2016) 对于每个小批量：\n\n- (i) 裁剪每个样本的梯度：$\\\
    tilde{g}_i = g_i / \\max\\{1, \\|g_i\\|_2 / C\\}$。\n- (ii) 聚合并添加高斯噪声：$\\tilde{g}\
    \ = \\frac{1}{B} \\left( \\sum_{i=1}^{B} \\tilde{g}_i + \\mathcal{N}(0, \\sigma^2\
    \ C^2 I) \\right)$。\n- (iii) 更新 $\\boldsymbol{\\theta} \\leftarrow \\boldsymbol{\\\
    theta} - \\eta \\tilde{g}$。\n\n矩会计法限制了累积隐私损失：$\\varepsilon \\approx \\frac{q \\\
    sqrt{2T \\ln(1/\\delta)}}{\\sigma}$，其中 $q = B/n$。在联邦设置中，每个客户端在传输前裁剪其本地更新并添加噪声，确保*本地\
    \ DP*。\n\n```python\ndef dp_aggregate(updates, C=1.0, σ=0.5):\n    clipped = [u\
    \ * min(1, C/np.linalg.norm(u)) for u in updates]\n    mean = np.mean(clipped,\
    \ axis=0)\n    noise = np.random.normal(scale=σ*C, size=mean.shape)\n    return\
    \ mean + noise / len(updates)\n```\n\n### 隐私-效用权衡\n\n噪声方差 $\\sigma^2$ 与裁剪范数 $C$\
    \ 和目标 $\\varepsilon$ 成正比；更小的批量或自适应裁剪 (AdaClip) 可缓解精度下降。\n\n## 安全多方计算\n\n令 $P_1,\
    \ \\ldots, P_M$ 持有私有输入 $x_1, \\ldots, x_M$。一个安全协议计算 $f(x_1, \\ldots, x_M)$，使得任何一方除了输出外学不到更多信息。\n\
    \n### 加法秘密共享\n\n在环 $\\mathbb{Z}_p$ 上，将值 $v$ 拆分为随机份额 $v_1, \\ldots, v_M$，满足 $\\\
    sum v_m \\equiv v \\pmod{p}$。加法和标量乘法是按份额进行的；乘法需要 Beaver 三元组 $(a, b, c)$，其中 $c\
    \ = ab$。协议 (SPDZ) 评估算术电路，每个门 $O(1)$ 轮通信，并使用预处理的相关随机性。\n\n### 同态加密 (HE)\n\n给定公钥\
    \ pk，密文 $\\llbracket x \\rrbracket$，可以在不解密的情况下计算 $\\llbracket x + y \\rrbracket$\
    \ 和 $\\llbracket x \\cdot y \\rrbracket$ (BFV 方案)。推理管道将神经层编码为多项式近似 (切比雪夫) 以规避非多项式激活函数；延迟仍比明文高\
    \ $\\sim 10\\text{--}100\\times$。\n\n### 私有集合交集\n\n基于布隆过滤器的 PSI 使两家医院能够在 $O(n\
    \ \\log n)$ 带宽内找到共同患者，并对基数泄露提供差分隐私保护。\n\n### 应用：安全联邦逻辑回归\n\n每个客户端秘密共享梯度 $g_m$；服务器通过\
    \ SPDZ 聚合，添加 DP 噪声，并返回加密的全局梯度。保证：针对半诚实对手的计算隐私和 $(\\varepsilon, \\delta)$-DP。\n\
    \n## 10.5.3 负责任的 AI 与伦理考量\n\n除了技术保障，AI 系统还必须与社会价值观、法律规范和环境约束保持一致。\n\n### AI 开发的伦理框架与指南\n\
    \n**原则分类法**\n\n- **OECD (2019)**：包容性、透明度、稳健性、问责制和以人为本的价值观。\n- **欧盟 AI 法案 (2024\
    \ 年草案)**：四级风险分类；*高风险*应用需强制进行合规性评估；禁止的做法（社会评分、实时生物识别监控）。\n- **IEEE 7000-2021**：基于价值的工程流程，整合利益相关者需求获取、可追溯性工件和影响评估。\n\
    \n**操作化**\n\n模型卡片记录预期用途、按人口群体细分的评估指标以及伦理考量；数据表提供来源、许可和获取背景。持续监控管道计算公平性指标、漂移统计和每次推理的碳足迹\
    \ (gCO₂ e)。\n\n### AI 对社会的影响及未来启示\n\n**劳动力与经济**\n\n基于任务的模型估计替代弹性；GPT-4 级别的系统使约\
    \ 19% 的美国职业面临 50% 的暴露风险。政策应对：再技能培训基金、全民基本收入试点、为算法管理透明度进行集体谈判。\n\n**环境足迹**\n\n\
    训练一个具有 300 PFlop·s 天的 1000 亿参数模型消耗约 10⁶ kWh；可再生能源调度和混合精度 GPU 可将排放量减少 35%。生命周期评估包括电子废物和冷却水使用。"
