    ### Shooting Method and Boundary Value Problems\n\nGiven a second-order BVP\n\n\
    $$y'' = f(x, y, y'), \\quad y(a) = \\alpha, \\quad y(b) = \\beta,$$\n\nconvert\
    \ to IVP with unknown slope $s$: solve $y(a) = \\alpha$, $y'(a) = s$ and adjust\
    \ $s$ until $y(b; s) = \\beta$.\n\n### Algorithm (Secant Shooting)\n\n1. Guess\
    \ slopes $s_0, s_1$.\n2. Integrate IVP to obtain $F(s) = y(b; s) - \\beta$.\n\
    3. Update $s_{k+1} = s_k - F(s_k) \\frac{s_k - s_{k-1}}{F(s_k) - F(s_{k-1})}$.\n\
    4. Repeat until $|F(s_k)| < \\text{tol}$.\n\n### Example 6.1.23 (Thermal Fin)\n\
