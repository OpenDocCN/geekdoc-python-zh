    # ARCH/GARCH and Volatility Modelling


    Financial returns r_t often exhibit uncorrelated levels but serially correlated
    squared returns. The **GARCH(p, q)** model posits


    $$r_t = \sigma_t \varepsilon_t, \quad \varepsilon_t \sim \mathcal{N}(0, 1), \quad
