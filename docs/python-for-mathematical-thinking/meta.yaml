    \ $r$。其几何直观很简单：在 $(x_k, f(x_k))$ 处的切线与 $x$ 轴的交点比 $x_k$ 更接近根，前提是函数图像在局部是单调的且曲率不太大。然而，其代数威力源于将步长\
    \ $\\Delta x_k = x_{k+1} - x_k$ 视为牛顿级数展开的第一项，从而将误差的收敛速度从线性（二分法）加速到二次。\n\n```python\n\
    def newton(f, df, x0, *, atol=1e-14, rtol=1e-10, max_iter=50):\n    x = x0\n \
    \   for k in range(max_iter):\n        fx, dfx = f(x), df(x)\n        step = -fx/dfx\n\
    \        x = x + step\n        if abs(step) < atol + rtol*abs(x):\n          \
    \  return x, k\n    raise RuntimeError(\"no convergence\")\n```\n\n## 无导数变体\n\n\
    当 $f'$ 不可用或计算代价高昂时，可以用有限差分或割线近似来替代它。\n\n*割线法* 从 $x_0$ 和 $x_1$ 开始，\n\n$$x_{k+1}\
    \ = x_k - f(x_k) \\frac{x_k - x_{k-1}}{f(x_k) - f(x_{k-1})},$$\n\n每次迭代需要一次函数求值，并且在\
    \ $f$ 在根附近属于 $C^1$ 的条件下，以阶 $\\phi = \\frac{1}{2}(1 + \\sqrt{5}) \\approx 1.618$（超线性）收敛。\n\
    \n*斯蒂芬森方法* 通过以下方式加速不动点迭代 $\\varphi(x)$：\n\n$$x_{k+1} = x_k - \\frac{(\\varphi(x_k)\
    \ - x_k)^2}{\\varphi(\\varphi(x_k)) - 2\\varphi(x_k) + x_k},$$\n\n无需导数求值即可实现二次收敛；这相当于对\
    \ $g(x) = \\varphi(x) - x$ 应用割线法，并自动生成第二个点。\n\n*艾特肯 $\\Delta^2$ 过程* 给定一个线性收敛的序列\
    \ $\\{x_k\\}$，$\\hat{x}_k = x_k - \\frac{(x_{k+1}-x_k)^2}{x_{k+2}-2x_{k+1}+x_k}$\
    \ 产生一个加速序列，通常接近二次行为；用作简单迭代的后处理步骤。\n\n## 收敛性分析\n\n设 $r$ 满足 $f(r) = 0$ 且 $f'(r)\
    \ \\neq 0$（单根）。假设 $f$ 在包含 $r$ 的开区间上属于 $C^2$，且初始猜测 $x_0$ 足够接近 $r$，误差的演化为\n\n$$e_{k+1}\
    \ = x_{k+1} - r = -\\frac{f(r + e_k)}{f'(r + e_k)} = -\\frac{f'(r)e_k + \\frac{1}{2}f''(r)e_k^2\
    \ + O(e_k^3)}{f'(r) + f''(r)e_k + O(e_k^2)}$$\n$$= -\\frac{f'(r)e_k}{f'(r)} +\
    \ \\frac{f''(r)}{2f'(r)}e_k^2 + O(e_k^3) = Ce_k^2 + O(e_k^3),$$\n\n其中 $C = -\\\
    frac{f''(r)}{2f'(r)}$。因此 $|e_{k+1}| \\approx |C|e_k^2$，所以每次迭代正确数字的位数大致*翻倍*。如果\
