    \ Q_k = Q_k^T A_k Q_k$. Orthogonality preserves the spectrum, while cyclically\
    \ permuting the factors recycles the costly factorisation. Convergence is *quadratic*\
    \ for symmetric matrices; for general $A$ the Hessenberg reduction $A = Q_0 H_0\
    \ Q_0^T$ confines fill-in, and Wilkinson's double-shift accelerates deflation\
    \ with cubic local speed. Because each similarity step is backward-stable, the\
    \ computed $\\widehat{A}_k$ satisfies $(A + \\Delta A_0)$ similarity with $\\\
    |\\Delta A_0\\| \\lesssim u \\|A\\|$.\n\nAn orthogonally similar limit $T = Q^T\
    \ A Q$ that is upper-triangular is a *real Schur form*; its diagonal contains\
    \ the (real) eigenvalues, while $2 \\times 2$ blocks encode complex-conjugate\
    \ pairs. Existence follows from the QR algorithm; uniqueness up to orthonormal\
    \ reordering renders the Schur decomposition a numerically preferred representation\
    \ compared to the Jordan form, which is ill-conditioned under perturbation. If\
    \ $A$ is symmetric, $T$ reduces further to a diagonal $\\Lambda = \\text{diag}(\\\
    lambda_1, \\dots, \\lambda_n)$, recovering the spectral theorem.\n\n## Eigenvalue\
    \ Computation in Python\n\nThe following compact script implements one Francis\
    \ double-shift step on an unreduced Hessenberg matrix; wrapping it in a for-loop\
    \ reproduces the implicit QR algorithm that underlies `numpy.linalg.eig`:\n\n\
    ```python\nimport numpy as np, scipy.linalg as la\n\ndef francis_step(H):\n  \
    \  n = H.shape[0]\n    mu = la.eigvals(H[-2:, -2:]) # Wilkinson shift\n    sigma\
    \ = mu[np.argmin(abs(mu - H[-1, -1]))]\n    x, y = H[0, 0] - sigma, H[1, 0]\n\
    \    for k in range(n-1):\n        # Householder to zero y\n        v = la.householder_vec(np.array([x,\
    \ y]))\n        H[k:k+2, k:] = H[k:k+2, k:] - 2 * np.outer(v, v @ H[k:k+2, k:])\n\
    \        H[:, k:k+2] = H[:, k:k+2] - 2 * np.outer(H[:, k:k+2] @ v, v)\n      \
    \  if k < n-2:\n            x, y = H[k+1, k], H[k+2, k]\n\ndef eigvals_qr(A, max_iter=60):\n\
    \    H = la.hessenberg(A) # similarity to Hessenberg\n    for _ in range(max_iter):\n\
    \        francis_step(H)\n    return np.diag(H) # approximate eigenvalues\n```\n\
    \n```python\nnp.random.seed(4)\nA = np.random.randn(6, 6)\nprint(np.sort_complex(eigvals_qr(A)))\
    \ # compare with np.linalg.eigvals\n```\n\nFor production code one defers to the\
    \ highly tuned `scipy.linalg.schur`, which automatically falls back to LAPACK's\
    \ blocked and multishift QR routines:\n\n```python\nT, Q = la.schur(A, output='real')\
    \ # real Schur form\nlam = np.diag(T) # eigenvalues (real or block)\n```\n\n**Example\
    \ 8.4.2** Diagonalise the symmetric tridiagonal Toeplitz matrix $T_n$ with 2 on\
    \ the diagonal and $-1$ on the sub/super-diagonals. The QR algorithm converges\
    \ in $\\lceil \\log_2(n) \\rceil$ iterations; the analytical eigenvalues are $\\\
    lambda_k = 2(1 - \\cos \\frac{k\\pi}{n+1})$.\n\n## Applications in Quantum Mechanics\
    \ and Control Theory\n\nIn non-relativistic quantum mechanics the stationary Schrödinger\
    \ equation reduces after spatial discretisation to the Hermitian eigenproblem\
    \ $H\\psi = E\\psi$. For a particle in a one-dimensional potential well $V(x)$,\
    \ finite-difference discretisation with mesh size $h$ yields a tridiagonal Hamiltonian\
    \ whose extremal eigenvalues approximate bound-state energies $E$. A few QR iterations\
    \ after the tridiagonal reduction ($O(n)$ memory) deliver all low-lying states\
    \ to machine accuracy; the orthonormal eigenvectors $\\{\\psi_k\\}$ support spectral\
    \ time evolution $e^{-iHt/\\hbar}$ via diagonal exponentiation in the Schur basis.\n\
    \nIn linear control theory the stability of the continuous-time system $\\dot{\\\
    mathbf{x}} = A\\mathbf{x}$ hinges on the eigenvalues of $A$. The real Schur form\
    \ $A = Q T Q^T$ directly reveals $\\operatorname{Re} \\lambda_k$; to place poles\
    \ within a desired left-half-plane one selects a feedback $K$ such that $A - BK$\
    \ has shifted Schur spectrum. Moreover, solving the Lyapunov equation $A^T P +\
    \ PA = -Q$ via the Schur method—transforming to $T^T P' + P' T = -Q'$ then triangulating—is\
    \ $O(n^3)$ but numerically stable, undergirding LQR controllers and $\\mathcal{H}_\\\
    infty$ synthesis.\n\n**Example 8.4.3 (Vibration Control)** A mass-spring chain\
    \ linearised about equilibrium gives the second-order ODE $M\\ddot{\\mathbf{q}}\
    \ + K\\mathbf{q} = 0$. Converting to first-order form with state vector $\\mathbf{x}\
    \ = (\\mathbf{q}, \\dot{\\mathbf{q}})$ yields system matrix $\\begin{pmatrix}\
    \ 0 & I \\\\ -M^{-1}K & 0 \\end{pmatrix}$. Real Schur decomposition of the $2n\
    \ \\times 2n$ matrix clusters purely imaginary eigenvalues in $2 \\times 2$ blocks;\
    \ proportional damping modifies $M^{-1}K$ and shifts blocks leftwards, providing\
    \ immediate visual confirmation of modal damping ratios.\n\n## Takeaways\n\nThe\
    \ implicit QR algorithm plus truncation to Schur form constitutes the default\
    \ dense eigen-engine: cubic in time, quadratic in memory, and backward-stable.\
    \ Its seamless implementation in SciPy/NumPy unlocks accurate spectral analysis\
    \ in quantum chemistry, structural dynamics, and feedback control with only a\
    \ handful of Python lines.\n\n## 8.4.3 Singular Value Decomposition (SVD)\n\n\
    For any real $m \\times n$ matrix $A$ there exist orthogonal matrices $U \\in\
    \ \\mathbb{R}^{m \\times m}$ and $V \\in \\mathbb{R}^{n \\times n}$ together with\
    \ a diagonal matrix $\\Sigma = \\text{diag}(\\sigma_1, \\dots, \\sigma_r, 0, \\\
    dots)$ whose non-negative diagonal entries satisfy $\\sigma_1 \\ge \\sigma_2 \\\
    ge \\dots \\ge \\sigma_r > 0$ such that\n\n$$A = U \\Sigma V^\\top$$\n\nThis *singular\
    \ value decomposition* exposes the action of $A$ as an orthogonal rotation $V^\\\
    top$, a stretch by singular values $\\sigma_i$ along mutually orthogonal directions,\
    \ and a second rotation $U$. The rank $r$ equals the number of non-zero $\\sigma_i$.\
    \ Because $\\sigma_i^2$ are the eigenvalues of $A^\\top A$ and $\\sigma_i \\sigma_j\
    \ = 0$ for $i \\neq j$, the SVD inherits the numerical stability properties of\
    \ orthogonal similarity.\n\n**Optimality of Low-Rank Truncation** For $k < r$\
    \ define $A_k = U_{:, 1:k} \\Sigma_{1:k, 1:k} V_{:, 1:k}^\\top$. Eckart–Young–Mirsky\
    \ gives\n\n$$\\|A - A_k\\|_2 = \\sigma_{k+1}, \\quad \\|A - A_k\\|_F = \\left(\
    \ \\sum_{i=k+1}^r \\sigma_i^2 \\right)^{1/2},$$\n\nso $A_k$ is the *best* rank–$k$\
    \ approximation in both spectral and Frobenius norms.\n\n## Applications in Data\
    \ Compression and Principal Component Analysis (PCA)\n\n### PCA via SVD\n\nGiven\
    \ data matrix $X \\in \\mathbb{R}^{m \\times n}$ whose rows are centred observations,\
    \ the covariance is $C = \\frac{1}{m-1} X^\\top X$. The right singular vectors\
    \ $\\mathbf{v}_i$ of $X$ are the eigenvectors of $C$ and hence directions of maximal\
    \ variance (principal components), while singular values relate to explained variance:\
    \ $\\text{Var}(\\mathbf{x} \\cdot \\mathbf{v}_i) = \\sigma_i^2 / (m - 1)$.\n\n\
    ```python\nimport numpy as np, sklearn.datasets as ds\nX, _ = ds.load_digits(return_X_y=True)\
    \ # 1797×64\nX -= X.mean(axis=0, keepdims=True)\nU, s, Vt = np.linalg.svd(X, full_matrices=False)\n\
    explained = s**2 / s.sum()**2 # variance ratios\npc2d = X @ Vt[:2].T # 2-D projection\n\
    ```\n\nStoring only the first $k \\ll n$ columns of $V^\\top$ yields a low-dimensional\
    \ embedding:\nchoosing $k$ so that $\\sum_{i=1}^{k} \\sigma_i^2 / \\sum_{i=1}^{r}\
    \ \\sigma_i^2 \\geq 0.95$ retains 95% of the variance.\n\n### Data Compression\n\
    \nFor an image matrix $A \\in \\mathbb{R}^{m \\times n}$, keep the leading $k$\
    \ singular triplets; memory drops from $mn$ to $k(m + n + 1)$. For $512 \\times\
    \ 512$ grayscale Lena, $k = 50$ compresses by $> 80\\%$ while the peak-signal-to-noise\
    \ ratio (PSNR) exceeds 35 dB (cf. Fig. 8.2).\n\n```python\nimport imageio, matplotlib.pyplot\
    \ as plt\nA = imageio.imread('lena_gray.png').astype(float)\nU, s, Vt = np.linalg.svd(A,\
    \ full_matrices=False)\nk = 50\nAk = (U[:,:k] * s[:k]) @ Vt[:k,:]\nplt.imshow(Ak,\
    \ cmap='gray'); plt.title(f'Rank-{k} approx')\nplt.axis('off'); plt.show()\n```\n\
    \n![Fig. 8.2 Rank-100 SVD approximation of a 1024x1024 brain image (right) compared\
    \ with the original (left). Storing only the first 100 singular triplets reduces\
    \ memory by roughly an order of magnitude while retaining the main anatomical\
    \ structures, illustrating the power of low-rank matrix compression](img/9724708489e3df346f9e31e3fa6e5746_342_0.png)\n\
    \nFig. 8.2 Rank-100 SVD approximation of a $1024 \\times 1024$ brain image (right)\
    \ compared with the original (left). Storing only the first 100 singular triplets\
    \ reduces memory by roughly an order of magnitude while retaining the main anatomical\
    \ structures, illustrating the power of low-rank matrix compression"
