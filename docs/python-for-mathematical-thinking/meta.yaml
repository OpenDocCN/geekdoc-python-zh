    ## 5.1.3 Expectation, Variance, and Moments


    Moments summarise the quantitative features of a random variable''s distribution.
    The *first moment* (expectation) measures location, the *second central moment*
    (variance) spreads, while higher moments capture skewness, kurtosis, and beyond.
    Moment generating functions (mgf) provide a compact analytic device for encoding
    all moments simultaneously.


    ## Mathematical Expectation and Properties


    **Definition** For an integrable random variable $X$,


    $$

    \mathbb{E}[X] = \begin{cases} \sum_k x_k p_X(x_k), & (\text{discrete}) \\ \int_{-\infty}^{\infty}
    x f_X(x) dx, & (\text{continuous}). \end{cases}

    $$


    **Linearity** For constants $a, b$ and r.v.s $X, Y$,


    $$

    \mathbb{E}[aX + bY] = a\mathbb{E}[X] + b\mathbb{E}[Y].

    $$'
