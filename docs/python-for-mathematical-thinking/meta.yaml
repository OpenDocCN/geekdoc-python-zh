    # 5.3.1 Hypothesis Testing


    # Null and Alternative Hypotheses


    Any test begins with two mutually exclusive claims:


    $$H_0 : \text{“status quo” (null hypothesis)}$$

    $$H_1 : \text{“new claim” (alternative hypothesis)}$$


    **Example 1 (Manufacturing)** A supplier guarantees the mean diameter of ball
    bearings is $\mu_0 = 10$ mm. You suspect the process has drifted.


    $$H_0 : \mu = 10 \quad \text{vs.} \quad H_1 : \mu \neq 10.$$


    Sampling $n$ bearings and measuring diameters produces evidence to reject or fail
    to reject $H_0$.


    **Test Statistic** A scalar function $T(\mathbf{X})$ of the sample whose distribution
    under $H_0$ is known or approximable; large or small values of $T$ favour $H_1$.


    # p-values, t-tests, and Chi-square Tests


    **p-value** Observed $t_{obs}$ is converted to a $p$-value:


    $$p = \mathbb{P}_{H_0}(T \text{ at least as extreme as } t_{obs}).$$


    Decision rule (fixed $\alpha$): reject $H_0$ if $p < \alpha$.


    **One-sample t-test** For unknown $\sigma$, test $H_0 : \mu = \mu_0$ with


    $$t = \frac{\bar{X} - \mu_0}{s / \sqrt{n}} \sim t_{n-1} \quad (H_0).$$


    # Example 5.3.1 (Diameter Test)


    ```

    import numpy as np, scipy.stats as st

    x = np.array([10.1, 9.9, 9.8, 10.2, 10.0, 10.3, 9.7, 10.1, 10.2, 9.9])

    t_stat, p = st.ttest_1samp(x, popmean=10)

    print(t_stat, p)

    ```


    Output: $t \approx 0.42$, $p \approx 0.683 \implies$ fail to reject at $\alpha
    = 0.05$.


    # Two-sample t-test (Unequal Variances, Welch)


    $$t = \frac{\bar{X} - \bar{Y}}{\sqrt{s_X^2/n_X + s_Y^2/n_Y}}, \quad \nu \approx
    \frac{(s_X^2/n_X + s_Y^2/n_Y)^2}{\frac{s_X^4}{n_X^2(n_X-1)} + \frac{s_Y^4}{n_Y^2(n_Y-1)}}.$$'
