    Differential Equations


    **Abstract** Ordinary, partial, and stochastic differential equations are derived
    from conservation laws and dynamical principles; analytical methods (separation,
    integrating factors, Green’s functions) are juxtaposed with numerical solvers
    (Runge–Kutta, multistep, shooting, finite-difference, finite-element), all tied
    together through stability, stiffness, and convergence proofs. Real-world case
    studies—oscillators, reaction–diffusion, and epidemiological SIR models—are integrated
    as executable Python notebooks.


    **Keywords** Differential equations · Numerical solvers · Stability analysis ·
    Finite-difference methods · Finite-element methods · Stochastic DEs


    # 6.1 Ordinary Differential Equations (ODEs)


    An **ordinary differential equation** relates an unknown function $y : I \subseteq
    \mathbb{R} \to \mathbb{R}$ to its derivatives with respect to a single independent
    variable, conventionally denoted $x$. A *first-order* ODE involves only $y$ and
    its first derivative $y''$. Throughout this section we assume all functions are
    sufficiently smooth to justify the operations performed.


    # 6.1.1 First-Order ODEs


    Typical physical examples arise from exponential growth, radioactive decay, Newtonian
    cooling, and RC-circuit discharges, all of which are governed by first-order laws.
    We concentrate on three analytic solution techniques: separability, linearity,
    and exactness via integrating factors. Each subsection ends with computational
    verifications in Python/SymPy to embed symbolic manipulation into the theoretical
    workflow.'
