    \ n)。\n\n## 4.2 搜索算法\n\n搜索是数学计算和算法逻辑中的基本操作。**搜索算法**在给定的集合中定位一个项目，例如列表中的元素、字典中的键或序列中的模式。搜索算法的效率根据时间复杂度、最坏情况性能以及对数据的结构假设（例如，已排序与未排序）来评估。我们从最简单的方法开始：**线性搜索**。\n\
    \n### 4.2.1 线性搜索\n\n线性搜索是一种顺序检查集合中每个元素的方法，直到找到目标或序列结束。\n\n#### 算法与复杂度分析\n\n设 $A\
