    10, 50)$。(i) 证明固定步长 $\eta = 1/L$（$L = 50$）的梯度下降法以速率 $\rho_{\text{GD}} = 1 - \mu/L$
    线性收敛，其中 $\mu = 2$。(ii) 推导参数 $\beta = 1 - \sqrt{\mu/L}$ 的 Nesterov 迭代的特征多项式，并证明
