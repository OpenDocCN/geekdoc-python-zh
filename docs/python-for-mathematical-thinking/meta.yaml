    \ # 从状态 0 开始收敛\n```\n\n### 5.4.2 泊松过程\n\n**泊松过程** $\\{N(t)\\}_{t \\ge 0}$ 计算到时间\
    \ $t$ 为止发生的随机事件的累积数量。它由以下公理刻画：\n\n1. $N(0) = 0$ 几乎必然成立。\n2. 该过程具有*独立增量*：不相交区间内的计数是独立的。\n\
    3. 它具有*平稳增量*：对于 $s, t \\ge 0$，$N(t+s) - N(s) \\sim \\text{Pois}(\\lambda t)$，其中\
