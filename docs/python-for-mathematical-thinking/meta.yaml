  md: '# Data Transformation and Normalisation Techniques


    Machine-learning algorithms often assume homoskedastic, centred features. Let
    column $j$ have empirical mean $\mu_j$ and standard deviation $\sigma_j$. The
    *standard score*


    $$z_{ij} = \frac{x_{ij} - \mu_j}{\sigma_j}$$


    renders each feature dimensionless with unit variance; whitening further orthogonalises
    covariances via eigen-decomposition of the sample covariance matrix.


    For strictly positive variables displaying log-normal tails, log-transform $x
    \mapsto \ln(x + \varepsilon)$ stabilises variance. Box–Cox generalises to power
    $\lambda$:


    $$\mathrm{BC}_{\lambda}(x) = \begin{cases} \frac{x^{\lambda} - 1}{\lambda}, &
    \lambda \neq 0, \ \ln x, & \lambda = 0, \end{cases}$$


    with $\lambda$ selected by maximum log-likelihood over Gaussianised residuals.


    ```

    from sklearn.preprocessing import PowerTransformer, StandardScaler

    power = PowerTransformer(method="box-cox")

    df_bc = pd.DataFrame(power.fit_transform(df_imputed+1e-3), columns=df.columns)

    df_scaled = pd.DataFrame(StandardScaler().fit_transform(df_bc), columns=df.columns)

    ```


    # Feature Encoding: One-Hot Encoding and Label Encoding


    Categorical predictor $\mathbf{c} \in \{\kappa_1, \dots, \kappa_m\}$ injects into
    $\mathbb{R}^m$ via *one-hot* map $e : \kappa_k \mapsto \mathbf{e}_k$, preserving
    Hamming metric and avoiding spurious ordinal relations. For tree-based models
    that tolerate integer surrogates, *label encoding* replaces $\kappa_k$ by index
    $k$; beware of inadvertently imposing monotonicity in linear regressions.


    $$\mathrm{OH} : \kappa_3 \longmapsto (0, 0, 1, 0, \dots, 0), \quad \mathrm{Lab}
    : \kappa_3 \longmapsto 3.$$


    ```

    from sklearn.preprocessing import OneHotEncoder, OrdinalEncoder

    enc_oh = OneHotEncoder(sparse=False, drop=''first'') # reduce collinearity

    enc_lab = OrdinalEncoder()

    X_oh = enc_oh.fit_transform(df[[''city'']])

    X_lab = enc_lab.fit_transform(df[[''city'']])

    ```


    High-cardinality features ($m > 100$) impair memory and increase variance; hashing
    trick or $\ell_1$-regularised target encoding mitigates explosion without losing
    predictive signal.'
