    # **3.3.3 Line Integrals and Surface Integrals**


    In multivariable calculus, integrals generalise from areas and volumes to curvilinear
    and surface domains. A **line integral** accumulates a function along a path,
    and a **surface integral** computes quantities such as flux through a surface.
    These integrals are essential in physics and engineering: work, circulation, and
    electric/magnetic flux are described using such integrals. This section covers
    scalar and vector line integrals, surface integrals, and their computation using
    Python and SymPy.


    # **Scalar Line Integrals**


    Given a scalar field $f : \mathbb{R}^n \to \mathbb{R}$ and a smooth path $\gamma
    : [a, b] \to \mathbb{R}^n$, the scalar line integral is:


    $$\int_{\gamma} f \, ds = \int_a^b f(\gamma(t)) \|\gamma''(t)\| \, dt.$$


    This represents the accumulated value of $f$ along the curve, weighted by arc
    length.'
