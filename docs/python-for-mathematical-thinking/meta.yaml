    mathbf{z}_i) (f(\\mathbf{z}_i) - g(\\mathbf{z}_i))^2 \\quad \\text{subject to\
    \ } \\|\\mathbf{w}\\|_0 \\le K.$$\n\n权重 $\\mathbf{w}$ 揭示了局部特征影响；稳定性取决于 $\\sigma$、采样方案和正则化\
