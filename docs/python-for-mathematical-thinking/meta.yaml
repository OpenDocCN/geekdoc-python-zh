  - '[PAGE 499]


    # Fast Transforms (scipy.fft)


    ```

    from scipy.fft import fftn, ifftn, dct


    F = fftn(u) # N-dimensional FFT

    u0 = ifftn(F, workers=-1).real # inverse with multithreading


    c = dct(f, type=2, norm="ortho")# DCT-II (JPEG)

    ```


    # Symbolic Computation in SymPy


    # Core Manipulation


    ```

    import sympy as sp

    x,y = sp.symbols(''x y'')

    expr = sp.sin(x)**2 + sp.cos(x)**2

    sp.simplify(expr) # -> 1


    sp.series(sp.log(1+x), x, 0, 6) # Taylor

    sp.expand((x+y)**4)

    ```


    # Calculus


    ```

    f = sp.Function(''f'')(x)

    sp.diff(sp.exp(x)*sp.sin(x), x, 2)


    sp.integrate(sp.sin(x)/x, (x, 0, sp.oo)) # π/2

    sp.limit((sp.sin(x)/x)**(1/x**2), x, 0)

    ```


    # Algebra and Linear Systems


    ```

    A = sp.Matrix([[1, 2], [3, 4]])

    λ = A.eigenvals() # {-0.372...:1, 5.372...:1}

    A.inv()

    sp.solve([x + 2*y - 1, x - y - 3], (x, y))

    ```


    # Differential Equations


    ```

    y = sp.Function(''y'')

    ode = sp.Eq( sp.diff(y(x), x, 2) - y(x), sp.exp(x) )

    sol = sp.dsolve(ode)

    ```


    # Logic and Proof


    ```

    p,q = sp.symbols(''p q'')

    ϕ = sp.Implies(p, q) & sp.Implies(q, p)

    sp.is_tautology(ϕ) # -> True

    ```'
