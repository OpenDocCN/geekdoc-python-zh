    $$V_T = 25.8\,\text{mV}, \quad R = 10^3\,\Omega.$$


    (i) Formulate a Newton iteration for $V_D$; compute the damping factor that guarantees
    monotone convergence from $0\,\text{V}$. (ii) Describe how adaptive time-stepping
    and the method of lines would extend the solver to the transient R–C–diode network.


