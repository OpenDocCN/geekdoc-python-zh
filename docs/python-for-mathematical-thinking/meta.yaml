    # 9.1.2 Discrete Dynamical Systems


    Discrete-time iterates constitute the simplest laboratory for the emergence of
    order, bifurcation cascades, and full-blown chaos. Because iteration is composition,
    the $n$th iterate $f^{\circ n}$ is a high-degree nonlinear expression even when
    $f$ itself is elementary, quickly magnifying sensitive dependence on initial conditions.
    We cover the paradigmatic logistic map, quantify instability through Lyapunov
    exponents, trace the period-doubling scenario, introduce symbolic coding of trajectories,
    and finish with Takens'' reconstruction theorem that extracts geometry from a
    single observable.


    Logistic Map and Cobweb Diagrams


    The logistic family


    $$x_{n+1} = F_r(x_n) = r x_n(1 - x_n), \quad 0 < r \le 4, \quad x_n \in [0, 1],$$


    models population growth with reproduction rate $r$. Fixed points solve $x = F_r(x)$:
    $x_0 = 0$ and $x_1 = 1 - 1/r$. Linear stability follows from $|F_r''(x^*)|$; $x_1$
    loses stability at $r = 3$ ($F_r''(x_1) = -1$).'
- md: "## Cobweb Construction\n\nPlot $y = F_r(x)$ and $y = x$. Starting at $(x_0,\
    \ 0)$, alternately project to the curve and reflect to the diagonal. Convergence\
    \ to a fixed point appears as a shrinking staircase; 2-cycles or chaos manifest\
    \ as cycles that never settle (cf. Fig. 9.3).\n\n```python\nimport numpy as np,\
    \ matplotlib.pyplot as plt\ndef logistic(r, x): return r*x*(1-x)\ndef cobweb(r,\
    \ x0, N=50):\n    x, xs, ys = x0, [], []\n    for _ in range(N):\n        xs +=\
    \ [x, x]\n        y = logistic(r, x)\n        ys += [x, y]\n        x = y\n  \
    \  return xs, ys\nr = 3.2; x0 = .2\ngrid = np.linspace(0,1,400)\nplt.plot(grid,\
    \ logistic(r,grid)); plt.plot(grid, grid, 'k')\nxs, ys = cobweb(r, x0)\nplt.plot(xs,\
    \ ys, 'r'); plt.show()\n```\n\n## Lyapunov Exponents and Their Calculation\n\n\
    For map $x_{n+1} = f(x_n)$, the **Lyapunov exponent**\n\n$$\\lambda = \\lim_{N\
    \ \\to \\infty} \\frac{1}{N} \\sum_{n=0}^{N-1} \\ln |f'(x_n)|$$\n\nmeasures the\
    \ exponential rate of separation of nearby orbits. Positive $\\lambda$ indicates\
    \ chaos; $\\lambda = 0$ marginal stability; negative $\\lambda$ contraction.\n\
    \nFor the logistic map, $\\lambda(r)$ can be computed efficiently (cf. Fig. 9.4):\n\
    \n```python\ndef lyapunov(r, N=5000, discard=1000):\n    x = 0.5\n    lsum = 0\n\
    \    for n in range(N+discard):\n        x = logistic(r,x)\n        if n>=discard:\
    \ lsum += np.log(abs(r*(1-2*x)))\n    return lsum/N\nrs = np.linspace(2.5,4,800)\n\
    lambdas = np.array([lyapunov(r) for r in rs])\nplt.plot(rs, lambdas); plt.hlines(0,2.5,4,'k');\
    \ plt.xlabel('r'); plt.show()\n```\n\nAt $r = 4$, theoretical $\\lambda = \\ln\
    \ 2 \\approx 0.6931$ since $|F_4'(x)| = |4 - 8x|$ has mean 2 under the invariant\
    \ density $\\rho(x) = 1/(\\pi \\sqrt{x(1-x)})$.\n\n**Fig. 9.4** Lyapunov exponent\
    \ $\\lambda(r)$ of the logistic map $x_{n+1} = rx_n(1-x_n)$ for $r \\in [2.5,\
    \ 4]$. Negative values (below the dashed line) indicate stable dynamics, while\
    \ $\\lambda > 0$ marks chaotic behaviour beginning just past the accumulation\
    \ point of the period-doubling cascade.\n\n## Period-Doubling Route to Chaos\n\
    \nAs $r$ increases, a cascade of pitchfork bifurcations produces stable $2^k$-cycles\
    \ at parameters $r_1, r_2, \\dots$ accumulating geometrically:\n\n$$\\delta =\
    \ \\lim_{k \\to \\infty} \\frac{r_{k-1} - r_{k-2}}{r_k - r_{k-1}} \\approx 4.669201\\\
    dots$$\n\n*(Feigenbaum constant)* universal for one-dimensional maps with a quadratic\
    \ maximum.\n\n**Example 9.1.7 (Numeric Estimation of $\\delta$)** Find $r_k$ where\
    \ $2^k$-cycle first becomes stable via bisection; estimate ratios:\n\n```python\n\
    def find_rk(k, tol=1e-10):\n    a,b = 3.0, 4.0 if k==1 else rk[k-1], rk[k-1]+0.05\n\
    \    while b-a>tol:\n        m = (a+b)/2\n        x = .2\n        for _ in range(2**(k+4)):\
    \ x = logistic(m,x)\n        stable = max(abs(logistic(m,x)-x) for _ in range(2**k))<1e-6\n\
    \        (b if stable else a), a = (a if stable else b), a\n    return b\nrk =\
    \ {1:3.0}\nfor k in range(2,6): rk[k]=find_rk(k)\ndelta = [(rk[k-1]-rk[k-2])/(rk[k]-rk[k-1])\
    \ for k in range(3,6)]\nprint(delta)\n```\n\nValues converge toward Feigenbaum's\
    \ $\\delta$.\n\n## Symbolic Dynamics and Subshifts of Finite Type\n\nEncoding\
    \ an orbit by the itinerary of a partition converts complex geometry into a sequence\
    \ space with the shift $\\sigma((s_n)) = (s_{n+1})$.\n\nFor the tent map $T(x)\
    \ = 2 \\min\\{x, 1-x\\}$ on $[0, 1]$, label left/right halves by symbols 0, 1.\
    \ The map is topologically conjugate to the full shift $\\Sigma_2: x \\mapsto\
    \ (s_n)$ where $s_n = 0$ if $T^n x < \\frac{1}{2}$, else 1.\n\n## Subshift of\
    \ Finite Type (SFT)\n\nGiven a $k \\times k$ adjacency matrix $A \\in \\{0, 1\\\
    }^{k \\times k}$, the SFT\n\n$$\\Sigma_A = \\{(s_n)_{n \\ge 0} \\mid A_{s_n s_{n+1}}\
    \ = 1\\}$$\n\nwith left shift $\\sigma$ captures kneading sequences when critical\
    \ points map onto repelling orbits. Topological entropy equals $\\ln \\rho(A)$,\
    \ $\\rho$ spectral radius.\n\n**Example 9.1.8 (Golden Mean Shift)** $A = \\begin{pmatrix}\
    \ 1 & 1 \\\\ 1 & 0 \\end{pmatrix}$ forbids consecutive 1's. Entropy $\\ln \\phi$\
    \ with $\\phi = (1+\\sqrt{5})/2$. Code length-$N$ admissible words and verify\
    \ growth rate:\n\n```python\nimport itertools, numpy as np\ndef words(N):\n  \
    \  count=0\n    for w in itertools.product('01', repeat=N):\n        if '11' not\
    \ in ''.join(w): count+=1\n    return count\nN = np.arange(2,14)\nh = np.log([words(n)\
    \ for n in N])/N\nprint(h[-1], np.log((1+np.sqrt(5))/2))\n```\n\n## State-Space\
    \ Reconstruction (Takens Embedding)\n\nFor smooth deterministic dynamics $\\mathbf{x}_t$\
    \ on a compact manifold $\\mathcal{M}$ and a generic $C^2$ observable $h : \\\
    mathcal{M} \\to \\mathbb{R}$, **Takens' theorem** states the delay map\n\n$$\\\
    Phi_h^{(m)}(t) = (h(\\mathbf{x}_t), h(\\mathbf{x}_{t-\\tau}), \\dots, h(\\mathbf{x}_{t-(m-1)\\\
    tau}))$$\n\nembeds $\\mathcal{M}$ diffeomorphically in $\\mathbb{R}^m$ for $m\
    \ \\ge 2d + 1$ ($d$ box dimension). Hence reconstructed clouds preserve invariants\
    \ such as attractor dimension and Lyapunov exponents (Packard et al. 1980; Takens\
    \ 1981).\n\n## Practical Choices\n\nDelay $\\tau$: first zero of the autocorrelation\
    \ or first minimum of mutual information. Embedding dimension $m$: false-nearest-neighbours\
    \ algorithm; increase $m$ until fraction of neighbours that unfold under $m+1$\
    \ drops below threshold.\n\n**Example 9.1.9 (Lorenz Attractor Reconstruction (cf.\
    \ Fig. 9.5))** Sample $x(t)$ of Lorenz system; reconstruct with $\\tau = 10 \\\
    Delta t, m = 3$:\n\n```python\nfrom scipy.integrate import solve_ivp\nsigma, rho,\
    \ beta = 10, 28, 8/3\ndef Lor(t, y): x,y_,z=y; return [sigma*(y_-x), x*(rho-z)-y_,\
    \ x*y_- beta*z]\nsol = solve_ivp(Lor,[0,80],[1,1,1],max_step=.01)\nx = sol.y[0];\
    \ tau = 10\nembed = np.column_stack([x[:-2*tau], x[tau:-tau], x[2*tau:]])\nfrom\
    \ mpl_toolkits.mplot3d import Axes3D\nfig = plt.figure(); ax = fig.add_subplot(111,projection='3d')\n\
    ax.plot(*embed.T, lw=.3); plt.show()\n```\n\nFractal dimension via correlation\
    \ sum $C(r) \\sim r^{D_2}$ recovers $D_2 \\approx 2.05$, matching canonical Lorenz\
    \ attractor.\n\n**Fig. 9.5** Three-dimensional time-delay embedding $(x(t), x(t\
    \ + \\tau), x(t + 2\\tau))$ of the $x$-coordinate of the Lorenz system with $\\\
    sigma = 10$, $\\rho = 28$, $\\beta = 8/3$. The resulting “twisted ribbon” reconstructs\
    \ the strange attractor in delay space, illustrating Takens’ embedding theorem.\n\
    \n## 9.1.3 Continuous Dynamical Systems\n\nThe qualitative theory of flows $\\\
    dot{\\mathbf{x}} = \\mathbf{F}(\\mathbf{x})$ in $\\mathbb{R}^n$ concerns the geometry\
    \ of trajectories, the asymptotic sets they approach, and the invariant quantities\
    \ that constrain motion. Beyond equilibria, continuous systems exhibit recurrent\
    \ orbits (limit cycles), aperiodic yet bounded motion on fractal sets (strange\
    \ attractors), and, in the Hamiltonian setting, intricate interleavings of regular\
    \ tori and stochastic layers produced by homoclinic tangles. The visual language\
    \ of phase portraits, Poincaré sections, and recurrence plots turns analytic deductions\
    \ into tangible pictures; numerical integration powered by SciPy and matplotlib\
    \ turns them into experiments.\n\n## Phase Portraits and Limit Cycles\n\nA **phase\
    \ portrait** is the image of vector field arrows and integral curves in state\
    \ space. In $\\mathbb{R}^2$, any closed trajectory $\\Gamma$ encloses an area\
    \ where the divergence $\\nabla \\cdot \\mathbf{F}$ decides its fate: by Bendixson’s\
    \ criterion, no limit cycle can exist in a simply connected region where the divergence\
    \ is of one sign.\n\nThe planar *van der Pol oscillator*\n\n$$\\dot{x} = y, \\\
    quad \\dot{y} = \\mu(1 - x^2)y - x$$\n\nhas $\\nabla \\cdot \\mathbf{F} = \\mu(1\
    \ - x^2)$, changing sign across $|x| = 1$. For $\\mu > 0$ trajectories spiral\
    \ outwards inside the separatrix and inwards outside, globally converging to a\
    \ unique, stable limit cycle (cf. Fig. 9.6).\n\n```python\nimport numpy as np,\
    \ matplotlib.pyplot as plt\nmu = 1.5\ndef vdp(t, z): x,y = z; return [y, mu*(1-x**2)*y\
    \ - x]\nfrom scipy.integrate import solve_ivp\nfor ic in [(2,0),(0.1,0.1),(-3,4)]:\n\
    \    sol = solve_ivp(vdp,[0,30],ic,t_eval=np.linspace(0,30,4000))\n    plt.plot(sol.y[0],\
    \ sol.y[1])\nplt.xlabel('x'); plt.ylabel('y'); plt.axis('equal'); plt.show()\n\
    ```\n\nFloquet theory linearises near a periodic orbit $\\gamma(t)$ via the monodromy\
    \ matrix $M = \\Phi(T)$, where $\\Phi$ is the variational flow over one period\
    \ $T$. A limit cycle is asymptotically stable if its Floquet multipliers lie inside\
    \ the unit disk, except for the trivial multiplier 1 along the tangent.\n\n##\
    \ Strange Attractors and Chaos in Continuous Systems\n\nChaotic flows possess\
    \ a strange attractor: A compact invariant set $\\mathcal{A}$ that attracts an\
    \ open set of initial conditions has sensitive dependence on initial data and\
    \ possesses a fractal structure."
  mdcn: "## 蛛网图构造\n\n绘制 $y = F_r(x)$ 和 $y = x$ 的图像。从 $(x_0, 0)$ 出发，交替投影到曲线上并反射到对角线。收敛到不动点表现为逐渐缩小的阶梯；2-周期或混沌则表现为永不稳定的循环（参见图\
    \ 9.3）。\n\n```python\nimport numpy as np, matplotlib.pyplot as plt\ndef logistic(r,\
    \ x): return r*x*(1-x)\ndef cobweb(r, x0, N=50):\n    x, xs, ys = x0, [], []\n\
    \    for _ in range(N):\n        xs += [x, x]\n        y = logistic(r, x)\n  \
    \      ys += [x, y]\n        x = y\n    return xs, ys\nr = 3.2; x0 = .2\ngrid\
    \ = np.linspace(0,1,400)\nplt.plot(grid, logistic(r,grid)); plt.plot(grid, grid,\
    \ 'k')\nxs, ys = cobweb(r, x0)\nplt.plot(xs, ys, 'r'); plt.show()\n```\n\n## 李雅普诺夫指数及其计算\n\
    \n对于映射 $x_{n+1} = f(x_n)$，**李雅普诺夫指数**\n\n$$\\lambda = \\lim_{N \\to \\infty} \\\
    frac{1}{N} \\sum_{n=0}^{N-1} \\ln |f'(x_n)|$$\n\n衡量了邻近轨道的指数分离速率。正的 $\\lambda$\
    \ 表示混沌；$\\lambda = 0$ 表示临界稳定；负的 $\\lambda$ 表示收缩。\n\n对于逻辑斯蒂映射，$\\lambda(r)$ 可以高效计算（参见图\
    \ 9.4）：\n\n```python\ndef lyapunov(r, N=5000, discard=1000):\n    x = 0.5\n  \
    \  lsum = 0\n    for n in range(N+discard):\n        x = logistic(r,x)\n     \
    \   if n>=discard: lsum += np.log(abs(r*(1-2*x)))\n    return lsum/N\nrs = np.linspace(2.5,4,800)\n\
    lambdas = np.array([lyapunov(r) for r in rs])\nplt.plot(rs, lambdas); plt.hlines(0,2.5,4,'k');\
    \ plt.xlabel('r'); plt.show()\n```\n\n在 $r = 4$ 时，理论值 $\\lambda = \\ln 2 \\approx\
    \ 0.6931$，因为 $|F_4'(x)| = |4 - 8x|$ 在不变密度 $\\rho(x) = 1/(\\pi \\sqrt{x(1-x)})$\
    \ 下的平均值为 2。\n\n**图 9.4** 逻辑斯蒂映射 $x_{n+1} = rx_n(1-x_n)$ 在 $r \\in [2.5, 4]$ 时的李雅普诺夫指数\
    \ $\\lambda(r)$。负值（虚线下方）表示稳定动力学，而 $\\lambda > 0$ 标志着混沌行为的开始，它恰好出现在倍周期级联的累积点之后。\n\
    \n## 通向混沌的倍周期路径\n\n随着 $r$ 增加，一系列叉式分岔在参数 $r_1, r_2, \\dots$ 处产生稳定的 $2^k$-周期，这些参数按几何级数累积：\n\
    \n$$\\delta = \\lim_{k \\to \\infty} \\frac{r_{k-1} - r_{k-2}}{r_k - r_{k-1}}\
    \ \\approx 4.669201\\dots$$\n\n*(费根鲍姆常数)* 对于具有二次极大值的一维映射是普适的。\n\n**例 9.1.7 ($\\\
    delta$ 的数值估计)** 通过二分法找到 $2^k$-周期首次变得稳定的 $r_k$；估计比值：\n\n```python\ndef find_rk(k,\
    \ tol=1e-10):\n    a,b = 3.0, 4.0 if k==1 else rk[k-1], rk[k-1]+0.05\n    while\
    \ b-a>tol:\n        m = (a+b)/2\n        x = .2\n        for _ in range(2**(k+4)):\
    \ x = logistic(m,x)\n        stable = max(abs(logistic(m,x)-x) for _ in range(2**k))<1e-6\n\
    \        (b if stable else a), a = (a if stable else b), a\n    return b\nrk =\
    \ {1:3.0}\nfor k in range(2,6): rk[k]=find_rk(k)\ndelta = [(rk[k-1]-rk[k-2])/(rk[k]-rk[k-1])\
    \ for k in range(3,6)]\nprint(delta)\n```\n\n数值收敛到费根鲍姆的 $\\delta$。\n\n## 符号动力学与有限型子移位\n\
    \n通过对轨道进行分区编码，将其转化为序列空间，其中移位映射为 $\\sigma((s_n)) = (s_{n+1})$。\n\n对于帐篷映射 $T(x)\
    \ = 2 \\min\\{x, 1-x\\}$ 在 $[0, 1]$ 上，用符号 0, 1 标记左/右半区。该映射与满移位 $\\Sigma_2: x \\\
    mapsto (s_n)$ 拓扑共轭，其中若 $T^n x < \\frac{1}{2}$ 则 $s_n = 0$，否则为 1。\n\n## 有限型子移位\
    \ (SFT)\n\n给定一个 $k \\times k$ 邻接矩阵 $A \\in \\{0, 1\\}^{k \\times k}$，有限型子移位\n\n\
    $$\\Sigma_A = \\{(s_n)_{n \\ge 0} \\mid A_{s_n s_{n+1}} = 1\\}$$\n\n带有左移位 $\\\
    sigma$，当临界点映射到排斥轨道时，它捕捉了揉捏序列。拓扑熵等于 $\\ln \\rho(A)$，其中 $\\rho$ 是谱半径。\n\n**例 9.1.8\
    \ (黄金分割移位)** $A = \\begin{pmatrix} 1 & 1 \\\\ 1 & 0 \\end{pmatrix}$ 禁止连续的 1。熵为\
    \ $\\ln \\phi$，其中 $\\phi = (1+\\sqrt{5})/2$。编码长度为 $N$ 的允许词并验证增长率：\n\n```python\n\
    import itertools, numpy as np\ndef words(N):\n    count=0\n    for w in itertools.product('01',\
    \ repeat=N):\n        if '11' not in ''.join(w): count+=1\n    return count\n\
    N = np.arange(2,14)\nh = np.log([words(n) for n in N])/N\nprint(h[-1], np.log((1+np.sqrt(5))/2))\n\
    ```\n\n## 状态空间重构 (Takens 嵌入)\n\n对于紧流形 $\\mathcal{M}$ 上的光滑确定性动力学 $\\mathbf{x}_t$\
    \ 和一个通用的 $C^2$ 可观测量 $h : \\mathcal{M} \\to \\mathbb{R}$，**Takens 定理**指出延迟映射\n\n\
    $$\\Phi_h^{(m)}(t) = (h(\\mathbf{x}_t), h(\\mathbf{x}_{t-\\tau}), \\dots, h(\\\
    mathbf{x}_{t-(m-1)\\tau}))$$\n\n当 $m \\ge 2d + 1$ ($d$ 为盒维数) 时，将 $\\mathcal{M}$\
    \ 微分同胚地嵌入到 $\\mathbb{R}^m$ 中。因此，重构的点云保留了诸如吸引子维数和李雅普诺夫指数等不变量 (Packard et al. 1980;\
    \ Takens 1981)。\n\n## 实际选择\n\n延迟 $\\tau$：自相关函数的第一个零点或互信息的第一个极小值。嵌入维数 $m$：假近邻算法；增加\
    \ $m$ 直到在 $m+1$ 下展开的近邻比例低于阈值。\n\n**例 9.1.9 (Lorenz 吸引子重构 (参见图 9.5))** 采样 Lorenz\
    \ 系统的 $x(t)$；使用 $\\tau = 10 \\Delta t, m = 3$ 进行重构：\n\n```python\nfrom scipy.integrate\
    \ import solve_ivp\nsigma, rho, beta = 10, 28, 8/3\ndef Lor(t, y): x,y_,z=y; return\
    \ [sigma*(y_-x), x*(rho-z)-y_, x*y_- beta*z]\nsol = solve_ivp(Lor,[0,80],[1,1,1],max_step=.01)\n\
    x = sol.y[0]; tau = 10\nembed = np.column_stack([x[:-2*tau], x[tau:-tau], x[2*tau:]])\n\
    from mpl_toolkits.mplot3d import Axes3D\nfig = plt.figure(); ax = fig.add_subplot(111,projection='3d')\n\
    ax.plot(*embed.T, lw=.3); plt.show()\n```\n\n通过关联和 $C(r) \\sim r^{D_2}$ 计算的分形维数得到\
    \ $D_2 \\approx 2.05$，与标准 Lorenz 吸引子相符。\n\n**图 9.5** Lorenz 系统 $x$ 坐标的三维时间延迟嵌入\
    \ $(x(t), x(t + \\tau), x(t + 2\\tau))$，其中 $\\sigma = 10$, $\\rho = 28$, $\\beta\
    \ = 8/3$。由此产生的“扭曲丝带”在延迟空间中重构了奇异吸引子，阐释了 Takens 嵌入定理。\n\n## 9.1.3 连续动力系统\n\n$\\\
    mathbb{R}^n$ 中流 $\\dot{\\mathbf{x}} = \\mathbf{F}(\\mathbf{x})$ 的定性理论关注轨迹的几何形状、它们趋近的渐近集以及约束运动的不变量。除了平衡点，连续系统还表现出周期轨道（极限环）、在分形集上的非周期但有界运动（奇异吸引子），以及在哈密顿设置中，由同宿纠缠产生的规则环面与随机层之间复杂的交织。相图、Poincaré\
    \ 截面和回归图的视觉语言将分析推导转化为有形的图像；由 SciPy 和 matplotlib 驱动的数值积分则将它们转化为实验。\n\n## 相图与极限环\n\
    \n**相图**是状态空间中向量场箭头和积分曲线的图像。在 $\\mathbb{R}^2$ 中，任何闭合轨迹 $\\Gamma$ 都包围一个区域，其中的散度\
    \ $\\nabla \\cdot \\mathbf{F}$ 决定了它的命运：根据 Bendixson 判据，在散度符号单一的单连通区域内不可能存在极限环。\n\
    \n平面 *van der Pol 振荡器*\n\n$$\\dot{x} = y, \\quad \\dot{y} = \\mu(1 - x^2)y - x$$\n\
    \n的散度为 $\\nabla \\cdot \\mathbf{F} = \\mu(1 - x^2)$，在 $|x| = 1$ 处变号。对于 $\\mu >\
    \ 0$，轨迹在分界线内向外螺旋，在分界线外向内螺旋，全局收敛到一个唯一的、稳定的极限环（参见图 9.6）。\n\n```python\nimport numpy\
    \ as np, matplotlib.pyplot as plt\nmu = 1.5\ndef vdp(t, z): x,y = z; return [y,\
    \ mu*(1-x**2)*y - x]\nfrom scipy.integrate import solve_ivp\nfor ic in [(2,0),(0.1,0.1),(-3,4)]:\n\
    \    sol = solve_ivp(vdp,[0,30],ic,t_eval=np.linspace(0,30,4000))\n    plt.plot(sol.y[0],\
    \ sol.y[1])\nplt.xlabel('x'); plt.ylabel('y'); plt.axis('equal'); plt.show()\n\
    ```\n\nFloquet 理论通过单值矩阵 $M = \\Phi(T)$ 在周期轨道 $\\gamma(t)$ 附近线性化，其中 $\\Phi$ 是一个周期\
    \ $T$ 上的变分流。如果极限环的 Floquet 乘子位于单位圆盘内（除了沿切方向的平凡乘子 1），则该极限环是渐近稳定的。\n\n## 连续系统中的奇异吸引子与混沌\n\
    \n混沌流具有一个奇异吸引子：一个紧不变集 $\\mathcal{A}$，它吸引一个开集的初始条件，对初始数据具有敏感依赖性，并具有分形结构。"
