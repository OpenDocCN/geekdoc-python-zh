    python

    import sympy as sp

    s,t = sp.symbols(''s t'', positive=True)

    F = sp.exp(-2*s)/s

    f = sp.inverse_laplace_transform(F, s, t)

    sp.simplify(f)

    ```


    **Convolution Theorem** $\mathcal{L}\{f*g\}(s) = F(s)G(s)$, $(f*g)(t) = \int_0^t
