    # 8.5.3 Parallel Computing in Numerical Methods


    When matrix dimensions or grid resolutions exceed the memory and floating-point
    throughput of a single processor, one turns to *parallel numerical algorithms*.
    The guiding principle is to trade redundant arithmetic for reduced communication,
    because on modern clusters a single double-precision flop costs $\mathcal{O}(1\text{
    ns})$ whereas shipping the same number across a network costs $\mathcal{O}(100\text{
    ns})$ or more. The two canonical data layouts are *domain decomposition*, which
    partitions the physical domain (finite-difference or finite-element nodes) across
    ranks, and *block-cyclic* distribution, which scatters dense matrices cyclically
    so that Level 3 BLAS kernels saturate local caches.


    **Parallel Krylov Solvers** Given a sparse linear system $A\mathbf{x} = \mathbf{b}$
    with $|A| > 10^9$ non-zeros, each iteration of Conjugate Gradient or GMRES requires
    a sparse matrix-vector product (SpMV) and a few global dot products. SpMV parallelises
    naturally through row partitioning; each process stores its local rows and exchanges
    halo values with neighbours. The latency bottleneck lies in the global reductions
    for $(\mathbf{r}, \mathbf{r})$ and $(\mathbf{p}, A\mathbf{p})$. *Pipelined* Krylov
    variants overlap reductions with SpMV and hide communication; alternatively, s-step
    methods fuse $s$ consecutive iterations'
