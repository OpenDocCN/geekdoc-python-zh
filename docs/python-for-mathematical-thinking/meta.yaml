    **Bernoulli to Exact via Factor** Equation $y'' + P(x)y = Q(x)y^n$ with $n \neq
    0, 1$ is nonlinear but becomes linear after substitution $v = y^{1-n}$, whose
    derivative satisfies a first-order linear ODE solvable by integrating factors.


    # **Example 6.1.6 (Population with Quadratic Harvesting)**


    $$\frac{dy}{dx} = ry - ay^2, \quad r, a > 0$$


    is Bernoulli with $n = 2$. Substitute $v = y^{-1}$, giving $\frac{dv}{dx} - rv
    = a$. Apply integrating factor $\mu = e^{-rx}$ to obtain explicit logistic-type
    solution $y(x) = \frac{r}{a} \frac{1}{1 + Ce^{-rx}}$.


    ```

    x,r,a,C = sp.symbols(''x r a C'', positive=True)

    y = r/a/(1+C*sp.exp(-r*x))

    sp.diff(y, x) - r*y + a*y**2

    ```


    # **Autonomous Equations and Stability Analysis**


    An ODE is **autonomous** when the independent variable does not appear explicitly:


    $$\frac{dy}{dx} = f(y), \quad f : \mathbb{R} \to \mathbb{R}.$$


    Equilibrium (or *critical*) points satisfy $f(y^*) = 0$. Linearisation near $y^*$
    distinguishes local behaviour:


    $$y(x) = y^* + \eta(x), \quad \eta'' = f''(y^*)\eta + O(\eta^2).$$


    Hence


    +   $$\begin{cases} f''(y^*) < 0 \implies y^* \text{ locally asymptotically stable},
    \ f''(y^*) > 0 \implies y^* \text{ unstable}, \ f''(y^*) = 0 \implies \text{higher-order
    terms decide (centre/semistable)}. \end{cases}$$


    # **Example 2 (Cubic Dynamics)**


    $$\frac{dy}{dx} = y - y^3.$$


    Critical points $y^* \in \{-1, 0, 1\}$. Since $f''(y) = 1 - 3y^2$, $f''(-1) =
    -2 < 0$, $f''(0) = 1 > 0$, $f''(1) = -2 < 0$. Thus $-1$ and $1$ are stable, $0$
    unstable. The *phase line*—arrows on the $y$-axis pointing according to $\text{sgn
    } f(y)$—visualises global dynamics.'
