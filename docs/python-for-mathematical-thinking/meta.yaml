    # 11.4.1 Mathematical Foundations of Quantum Mechanics


    Quantum information lives in complex Hilbert spaces: a finite $n$-qubit register
    is the $2^n$-dimensional vector space $\mathcal{H} = (\mathbb{C}^2)^{\otimes n}$
    equipped with the inner product $\langle \psi \mid \varphi \rangle = \sum_k \overline{\psi_k}
    \varphi_k$. Dirac''s bra–ket notation writes column vectors as kets $|\psi\rangle$
    and their conjugate transposes as bras $\langle \psi|$. The Born rule assigns
    probability $|\langle m \mid \psi \rangle|^2$ to outcome $|m\rangle$ when measuring
    observable $M = \sum_m m |m\rangle\langle m|$. Time evolution of closed systems
    obeys Schrödinger''s equation $i\hbar \dot{\psi} = H\psi$ whose solution is a
    unitary $U(t) = e^{-itH/\hbar}$, hence every physically admissible gate must be
    unitary. Composite systems are modelled by tensor products, and partial traces
    $\rho_A = \mathrm{Tr}_B \rho_{AB}$ capture reduced states. Density matrices $\rho
    = \sum_k p_k |\psi_k\rangle\langle \psi_k|$ extend the formalism to mixed ensembles,
    furnishing expectation $\mathbb{E}[M] = \mathrm{Tr}(\rho M)$.


    # Linear Algebra in Quantum Computing


    The computational basis for a single qubit comprises $|0\rangle = (1, 0)^\top$
    and $|1\rangle = (0, 1)^\top$. Pauli matrices


    $$X = \begin{pmatrix} 0 & 1 \ 1 & 0 \end{pmatrix}, \quad Y = \begin{pmatrix} 0
    & -i \ i & 0 \end{pmatrix}, \quad Z = \begin{pmatrix} 1 & 0 \ 0 & -1 \end{pmatrix}$$


    obey $X^2 = Y^2 = Z^2 = I$ and anticommute $XY = -YX$. Any single-qubit unitary
    admits Euler decomposition $U = e^{i\alpha} R_z(\beta) R_y(\gamma) R_z(\delta)$
    where rotations $R_k(\theta) = e^{-i\theta\sigma_k/2}$. Tensor products satisfy
    $(A \otimes B)(C \otimes D) = AC \otimes BD$. Eigenvalue spectra govern measurement
    statistics: applying $Z^{\otimes n}$ to a stabiliser state yields $\pm 1$ outcomes
    with equal amplitudes, explaining parity checks in quantum error-correcting codes.


    # Quantum Gates and Circuits


    Elementary gates on one or two qubits form a universal generating set. The Hadamard
    gate


    $$H = \frac{1}{\sqrt{2}} \begin{pmatrix} 1 & 1 \ 1 & -1 \end{pmatrix}$$


    creates equal superpositions, and the phase gate $S = \mathrm{diag}(1, i)$ introduces
    relative phase. The controlled-NOT (CNOT) is the $4 \times 4$ unitary $\mathrm{CNOT}
    = |0\rangle\langle 0| \otimes I + |1\rangle\langle 1| \otimes$'
