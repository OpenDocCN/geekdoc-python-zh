    ```\n\n## 4.1.2 Basic Data Structures\n\nThis section introduces three fundamental\
    \ data structures that form the backbone of algorithmic design: **stacks, queues,\
    \ and linked lists**. They differ in the order in which elements are inserted\
    \ and removed—this impacts algorithm design in parsing, graph traversal, simulation,\
    \ and dynamic memory allocation.\n\n### Stacks\n\nA **stack** is a Last-In, First-Out\
    \ (LIFO) structure. The most recent element added is the first to be removed.\n\
    \n**Operations**\n\n- push(x): insert element x on top.\n- pop(): remove and return\
    \ top element.\n- peek(): return top element without removing.\n- is_empty():\
    \ check if stack is empty.\n\n**Example 4.1.12 (Check for Balanced Parentheses)**\n\
    ```python\ndef is_balanced(expr):\n    stack = []\n    for ch in expr:\n     \
    \   if ch == '(':\n            stack.append(ch)\n        elif ch == ')':\n   \
    \         if not stack:\n                return False\n            stack.pop()\n\
    \    return not stack\n```\n```python\nassert is_balanced(\"(()())\") == True\n\
    assert is_balanced(\"(()\") == False\n```\n\nThis uses the stack to track nested\
    \ structure—a common parsing technique.\n\n**Example 4.1.13 (Reverse a String\
    \ Using a Stack)**\n```python\ndef reverse_string(s):\n    stack = list(s)\n \
    \   return ''.join(stack.pop() for _ in s)\n```\n```python\nassert reverse_string(\"\
    python\") == \"nohtyp\"\n```\n\n**Example 4.1.14 (Evaluate Postfix (RPN) Expression)**\
    \ Given \"3 4 + 2 *\", evaluate to get (3 + 4) × 2 = 14.\n```python\ndef eval_postfix(expr):\n\
    \    stack = []\n    for token in expr.split():\n        if token.isdigit():\n\
    \            stack.append(int(token))\n        else:\n            b, a = stack.pop(),\
    \ stack.pop()\n            stack.append(eval(f\"{a}{token}{b}\"))\n    return\
    \ stack[0]\n```\n```python\nassert eval_postfix(\"3 4 + 2 *\") == 14\n```\n\n\
    ### Queues\n\nA queue is a First-In, First-Out (FIFO) structure. The first element\
    \ inserted is the first to be removed.\n\n**Operations**\n\n- enqueue(x): add\
    \ x to rear.\n- dequeue(): remove from front.\n- peek(): return front element.\n\
    - is_empty(): check emptiness.\n\n**Example 4.1.15 (Customer Service Simulation)**\
    \ Simulate a queue of requests:\n```python\nfrom collections import deque\n\n\
    Q = deque()\nQ.append(\"Alice\")\nQ.append(\"Bob\")\nQ.append(\"Carol\")\nwhile\
    \ Q:\n    print(\"Serving:\", Q.popleft())\n```\nThis prints: Alice, Bob, Carol—in\
    \ that order.\n\n**Example 4.1.16 (Breadth-First Search (BFS) in a Graph)**\n\
    ```python\ndef bfs(graph, start):\n    from collections import deque\n    visited\
    \ = set()\n    Q = deque([start])\n    while Q:\n        node = Q.popleft()\n\
    \        if node not in visited:\n            visited.add(node)\n            Q.extend(graph[node])\n\
    \    return visited\n```\n\n**Example 4.1.17 (Round-Robin Scheduling Using a Queue)**\
    \ Each process gets a time-slice in order:\n```python\nQ = deque([\"A\", \"B\"\
    , \"C\"])\nfor _ in range(6):\n    process = Q.popleft()\n    print(\"Running:\"\
    , process)\n    Q.append(process)\n```\n\n### Linked Lists\n\nA **linked list**\
    \ consists of nodes where each node contains data and a reference (pointer) to\
    \ the next node. This allows efficient insertion and deletion without shifting\
    \ elements.\n\n**Types**\n\n- **Singly linked list**: each node points to next.\n\
    - **Doubly linked list**: nodes point to both previous and next.\n- **Circular\
    \ linked list**: last node points back to head.\n\n**Example 4.1.18 (Singly Linked\
    \ List Class)**\n```python\nclass Node:\n    def __init__(self, data, next=None):\n\
    \        self.data, self.next = data, next\n\nclass LinkedList:\n    def __init__(self):\n\
    \        self.head = None\n\n    def push_front(self, value):\n        self.head\
    \ = Node(value, self.head)\n\n    def pop_front(self):\n        if not self.head:\
    \ return None\n        val, self.head = self.head.data, self.head.next\n     \
    \   return val\n\n    def print_all(self):\n        node = self.head\n       \
    \ while node:\n            print(node.data, end=\"->\")\n            node = node.next\n\
    \        print(\"None\")\n```\n\n**Example 4.1.19 (Reverse a Linked List In-Place)**\n\
    ```python\ndef reverse(head):\n    prev, curr = None, head\n    while curr:\n\
    \        nxt = curr.next\n        curr.next = prev\n        prev, curr = curr,\
    \ nxt\n    return prev\n```\n\n**Example 4.1.20 (Detect a Cycle Using Floyd's\
    \ Algorithm)**\n```python\ndef has_cycle(head):\n    slow = fast = head\n    while\
    \ fast and fast.next:\n        slow = slow.next\n        fast = fast.next.next\n\
    \        if slow == fast:\n            return True\n    return False\n```"
