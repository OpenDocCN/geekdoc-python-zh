    ## 5.1.3 期望、方差与矩


    矩概括了随机变量分布的定量特征。*一阶矩*（期望）衡量位置，*二阶中心矩*（方差）衡量离散程度，而更高阶矩捕捉偏度、峰度等。矩生成函数（mgf）提供了一种紧凑的解析工具，可以同时编码所有矩。


