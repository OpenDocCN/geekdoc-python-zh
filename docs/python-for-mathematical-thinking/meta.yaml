  md: "# Pólya’s Enumeration Theorem and Group Actions\n\nLet a finite group $G$ act\
    \ on a set $X$ of “positions” by permutations. Colour each position with one of\
    \ $m$ colours. Two colourings are *equivalent* if a group element transforms one\
    \ into the other. The number of inequivalent colourings equals\n\n$$\\frac{1}{|G|}\
    \ \\sum_{g \\in G} m^{c(g)},$$\n\nwhere $c(g)$ is the number of cycles of $g$\
    \ acting on $X$—Burnside’s lemma. Pólya’s refinement records colour patterns via\
    \ the **cycle index**\n\n$$Z_G(s_1, s_2, \\ldots) = \\frac{1}{|G|} \\sum_{g \\\
    in G} \\prod_{j \\ge 1} s_j^{c_j(g)},$$\n\n$c_j(g) = \\text{\\# of } j\\text{-cycles\
    \ of } g$. Substituting $s_j \\mapsto \\sum_{k=1}^m x_k^j$ yields a multivariate\
    \ polynomial whose coefficients count colourings with specified colour multiplicities.\n\
    \n**Example: Necklaces of Length $n$ with $m$ Colours** Group $G = C_n$ acts by\
    \ rotation. Cycle type of rotation by $d$ positions decomposes into $\\gcd(d,\
    \ n)$ cycles of length $n / \\gcd(d, n)$. Hence\n\n$$Z_{C_n} = \\frac{1}{n} \\\
    sum_{d=0}^{n-1} s_{\\gcd(d,n)}^{n / \\gcd(d,n)}.$$\n\nFor binary necklaces of\
    \ length 6:\n\n$$\\text{ne}_2(6) = \\frac{1}{6}(2^6 + 2^3 + 2^2 + 2^3 + 2^2 +\
    \ 2^1) = 14.$$\n\n```\npython\nimport sageall as sg\ndef binary_necklaces(n):\n\
    \    M = sg.IntegerModRing(n)\n    return sg.NecklaceEnumerator(M, 2).count()\n\
    print(binary_necklaces(6)) # 14\n```\n\n**Chemical Isomers** For benzene derivatives,\
    \ $G = D_6$ acts on six labelled sites; substituting $s_j \\mapsto r_1^j + r_2^j$\
    \ distinguishes mono- and dichloro isomers vs. hydrogen.\n\n# Ramsey Theory and\
    \ Extremal Combinatorics\n\n**Ramsey Numbers** $R(s, t)$ is the least $n$ such\
    \ that any red/blue edge-colouring of $K_n$ contains a red $K_s$ or a blue $K_t$.\
    \ Basic bounds:\n\n$$\\binom{R(s, t)}{s} 2^{-\\binom{s}{2}} + \\binom{R(s, t)}{t}\
    \ 2^{-\\binom{t}{2}} < 1$$"
