    ```


    # Cross-Spectral Density and Coherence Analysis


    Given two processes $x_t, y_t$ with CSD


    $$S_{xy}(f) = \lim_{N \to \infty} \mathbb{E}\left[X_N(f) \overline{Y_N(f)}\right],$$


    the **magnitude-squared coherence**


    $$C_{xy}(f) = \frac{|S_{xy}(f)|^2}{S_{xx}(f) S_{yy}(f)} \in [0, 1]$$


    measures linear correlation at frequency $f$. Welch''s method extends: compute
    segment CSDs $\hat{S}_{xy,k}$ and PSDs $\hat{S}_{xx,k}, \hat{S}_{yy,k}$; average
    numerators and denominators separately.


    ```

