    AIC minimises expected Kullback–Leibler divergence to true model; BIC approximates
    Bayesian model evidence under unit information prior. Lower value preferred.


    # Corrected AIC


    For small sample $n/k < 40$, $\mathrm{AIC}_c = \mathrm{AIC} + \frac{2k(k+1)}{n-k-1}$.


    # Elastic-Net Path Selection


    Generalised linear model with penalty $\lambda(\alpha\|\beta\|_1 + \frac{1}{2}(1-\alpha)\|\beta\|_2^2)$
    evaluates AIC along $\lambda$ grid; choose $\lambda^* = \arg\min_\lambda \mathrm{AIC}(\lambda)$.
    Efficient via `glmnet`:


