    Pre-periodic parameters where 0 lands exactly on a repelling cycle are dense in
    $\partial \mathcal{M}$. Near such points the local scaling is governed by the
    multiplier of the repelling orbit, yielding *conformal self-similarity*.


    # External Angles and Kneading Sequences


    Douady–Hubbard showed that combinatorial data of the critical orbit encodes the
    external rays landing at a parameter $c$; the kneading sequence (symbolic itinerary
    of the critical value) orders the bulbs via parabolic wakes and yields an algorithm
    to compute the “address” of any decoration.


    # Quasi-Conformal Surgery


    Hybrid equivalence classes of quadratic polynomials glue smooth deformations to
    produce new maps; applying surgery constructs Siegel disks (irrationally indifferent
    cycles) by inserting a rigid rotation into an attracting basin. The resulting
    parameter values lie on $\partial \mathcal{M}$ and exhibit “baby” Mandelbrot copies
    with rotation number $\theta$.


    # 9.2.2 Julia Sets


    For each parameter $c \in \mathbb{C}$, the quadratic polynomial

    $$f_c(z) = z^2 + c$$

    induces a dynamical partition of the complex plane into the *filled Julia set*

    $$K_c = \left\{ z \in \mathbb{C} : \sup_{n \ge 0} |f_c^{\circ n}(z)| < \infty
    \right\}$$

    and its complement, whose points escape to $\infty$. The **Julia set** $J_c =
    \partial K_c$ is the locus of chaotic dynamics—sensitive dependence, dense periodic
    points, and perfect self-similarity. Although $K_c$ is bounded by the escape radius
    $R = 2$, its topological nature changes dramatically with $c$: it is connected
    when $c$ lies in the Mandelbrot set $\mathcal{M}$ and totally discontinuous (a
    Cantor dust) when $c \notin \mathcal{M}$.


    # Relationship with the Mandelbrot Set


    Douady–Hubbard’s *connectedness theorem*

    $$c \in \mathcal{M} \iff K_c \text{ is connected}$$'
