    # Example 7.4.6 (Model Checking in sympy)


    ```

    import sympy as sp

    x,y = sp.symbols(''x y'')

    φ = sp.ForAll(x, sp.Exists(y, x < y)) # ℕ with < is infinite

    M = sp.Domain(''Naturals'')

    print(sp.ask(φ, sp.Q.real)) # True

    ```


    **Completeness** Gödel (1930) showed that first-order logic is *semantically complete*:
    if ⊨ φ then ⊢ φ in any sound and sufficiently rich deductive calculus (e.g. natural
    deduction). Compactness and Löwenheim–Skolem theorems follow: a set of sentences
    is satisfiable iff every finite subset is, and any infinite model has countable
    submodels.


    # Gödel’s Incompleteness Theorems


    Let T be a consistent, recursively enumerable theory extending Peano arithmetic
    PA. Gödel assigned natural numbers to symbols, formulas, and proofs—*Gödel numbering*—to
    express meta-mathematical statements *inside* T.


    # Theorem 7.4.1 (Gödel 1931)


    +   1. **(First incompleteness)** There exists a sentence G such that T ⊬ G and
    T ⊬ ¬G. In fact G is true in the standard model ℕ.

    2. **(Second incompleteness)** T cannot prove its own consistency Con(T).


    **Sketch** Define Prf_T(p, q) meaning “p codes a proof in T of the formula with
    code q”, representable in arithmetic. The diagonal lemma yields G ≡ ∀p ¬Prf_T(p,
    ⌈G⌉), i.e. “G is unprovable”. If T ⊢ G, there is a proof code p̂ contradicting
    G; if T ⊢ ¬G, then T would prove its own inconsistency—a contradiction.


    # Implications


    +   (a) No algorithm enumerates exactly the truths of arithmetic.

    (b) Any proof assistant founded on PA cannot internally assert its consistency.

    (c) There are true but unprovable statements, e.g. the Paris–Harrington combinatorial
    principle.


    # Non-classical Logics and Their Applications


    **Intuitionistic Logic** Rejects the law of excluded middle φ∨¬φ unless constructed;
    proof objects correspond to λ-terms via the Curry–Howard isomorphism. *Constructive
    type theory* (e.g. in Coq, Lean) rests on intuitionistic foundations, enabling
    program extraction from proofs.'
  - '[PAGE 289]


    **Modal Logic** Augments propositional cores with □ (necessarily) and ◇ (possibly).
    Kripke semantics interprets □φ as “φ holds in all accessible worlds”. System S4
    corresponds to provability (□φ → □□φ) and underlies temporal logics used in model
    checking (LTL, CTL).


    **Temporal and Dynamic Logics** Propositional Linear Temporal Logic (LTL) adds
    operators ○ (next), ◇ (eventually), and □ (always); Büchi automata translate LTL
    specifications into ω-automata for hardware verification. Dynamic logic reason
    about program execution paths; ⟨π⟩φ asserts existence of run of program π leading
    to state satisfying φ.


    **Fuzzy and Many-Valued Logics** Truth values take continuum [0, 1] with t-norms
    modelling conjunction. Used in control systems where sensor data is imprecise.
    *Łukasiewicz logic* defines x → y = min(1, 1 − x + y), capturing graded implications.


    **Paraconsistent Logics** Allow controlled reasoning in presence of contradictions
    without explosion (φ, ¬φ ⊢ ψ in classical logic). Useful in knowledge bases with
    inconsistent data. *LP* (Priest’s Logic of Paradox) designates both ⊤ and ⊥ as
    truth values.


    # Applications Snapshot


    **Example 7.4.7** *Model checking.* Given a Kripke structure *M* for a traffic-light
    controller, verify □(green → ○yellow) with LTL-to-Büchi translation and the spot
    library.


    *Type systems.* Intuitionistic λ-calculus plus dependent types captures proofs
    in Agda; total functional programs correspond to constructive proofs.


    *Policy languages.* Modal deontic logic expresses obligations (□) and permissions
    (◇) in access control systems; runtime monitors enforce these via temporal-logic
    model checking.


    # 7.5 Discrete Structures and Applications


    Mathematical thinking frequently begins with the act of *collecting* objects into
    well-defined groups, and then exploring the relations and mappings between such
    collections. Sets, relations, and functions provide a language concise enough
    to encode subtle logical dependencies yet concrete enough to be manipulated computationally.
    In this subsection we recall their foundational properties, demonstrate typical
    reasoning patterns, and illustrate each concept with short *Python* snippets that
    mirror the algebraic laws in executable form.'
- md: "## 7.5.1 Sets, Relations, and Functions\n\n### Set Theory Basics and Venn Diagrams\n\
    \nA *set* is an unordered collection of distinct elements; membership is recorded\
    \ by the predicate $x \\in A$. Standard constructions derive new sets from old:\
    \ the *union* $A \\cup B = \\{x \\mid x \\in A \\lor x \\in B\\}$ and the *intersection*\
    \ $A \\cap B = \\{x \\mid x \\in A \\land x \\in B\\}$ satisfy the distributive\
    \ law\n\n$A \\cap (B \\cup C) = (A \\cap B) \\cup (A \\cap C)$, and dually $A\
    \ \\cup (B \\cap C) = (A \\cup B) \\cap (A \\cup C)$.\n\nThe *power set* $\\mathcal{P}(A)$\
    \ contains all subsets of $A$ and has cardinality $2^{|A|}$; Cantor's theorem\
    \ $|A| < |\\mathcal{P}(A)|$ establishes infinite hierarchies of cardinalities.\n\
    \n### Example 7.5.1 (Boolean Algebra of Sets)\n\n```python\nA, B, C = {1,2,3},\
    \ {2,3,4}, {3,4,5}\nlhs = A & (B | C) # ∩ and ∪ via operators\nrhs = (A & B) |\
    \ (A & C)\nprint(lhs == rhs) # distributive law -> True\n```\n\nVenn diagrams\
    \ visualise the inclusion–exclusion principle. For finite sets\n\n$|A \\cup B|\
    \ = |A| + |B| - |A \\cap B|$, $|A \\cup B \\cup C| = |A| + |B| + |C| - |A \\cap\
    \ B| - |B \\cap C| - |C \\cap A| + |A \\cap B \\cap C|$.\n\nIn probability theory\
    \ the same formula converts overlapping probabilities into additive ones.\n\n\
    ### Relations: Reflexivity, Symmetry, and Transitivity\n\nA *binary relation*\
    \ on $A$ is a subset $R \\subseteq A \\times A$. It is\n\n$\\text{reflexive} \\\
    iff \\forall a \\in A, (a, a) \\in R$,\n$\\text{symmetric} \\iff \\forall a, b,\
    \ (a, b) \\in R \\Rightarrow (b, a) \\in R$,\n$\\text{transitive} \\iff \\forall\
    \ a, b, c, (a, b), (b, c) \\in R \\Rightarrow (a, c) \\in R$.\n\nAn *equivalence\
    \ relation* satisfies all three properties and partitions $A$ into disjoint equivalence\
    \ classes; a *partial order* is reflexive, antisymmetric, and transitive.\n\n\
    ### Example 7.5.2 (Congruence Modulo $n$)\n\nDefine $a \\equiv_n b$ iff $n \\\
    mid (a - b)$. Reflexivity holds since $n \\mid 0$, symmetry from $n \\mid (a -\
    \ b) \\Rightarrow n \\mid (b - a)$, and transitivity from divisibility chains.\
    \ Thus $\\mathbb{Z}$ splits into $n$ congruence classes $[0], \\dots, [n-1]$ each\
    \ visualised on the circle group $\\mathbb{Z}/n\\mathbb{Z}$.\n\nGraphically, relations\
    \ correspond to directed graphs on vertex set $A$; reflexivity adds self-loops,\
    \ symmetry yields undirected edges, and transitivity appears as path closure.\
    \ In `networkx` one tests transitivity by computing the transitive closure and\
    \ checking inclusion.\n\n```python\nimport networkx as nx\nA = range(4)\nR = [(0,0),(1,1),(2,2),(3,3),(0,1),(1,2),(0,2)]\n\
    G = nx.DiGraph(); G.add_nodes_from(A); G.add_edges_from(R)\ntc = nx.transitive_closure_dag(G)\
    \ # raises if cycles present\nprint(set(tc.edges()).issubset(R)) # transitivity?\n\
    ```\n\n### Functions: Injective, Surjective, and Bijective Mappings\n\nA function\
    \ $f : A \\to B$ assigns each $a \\in A$ a unique $b = f(a) \\in B$. The mapping\
    \ is\n\ninjective (one-to-one) $\\Longleftrightarrow$ $(\\forall a_1 \\neq a_2)\\\
    \ f(a_1) \\neq f(a_2)$;\n\nsurjective (onto) $\\Longleftrightarrow$ $(\\forall\
    \ b \\in B)\\ \\exists a \\in A,\\ f(a) = b$;\n\nbijective $\\Longleftrightarrow$\
    \ injective and surjective.\n\nCategorically, bijections are isomorphisms in **Set**;\
    \ they admit inverses $f^{-1} : B \\to A$. Cantor–Bernstein–Schröder states: if\
    \ there exist injections $A \\hookrightarrow B$ and $B \\hookrightarrow A$, then\
    \ a bijection $A \\leftrightarrow B$ exists.\n\n### Example 7.5.3 (Cantor Pairing\
    \ Function)\n\n$\\pi : \\mathbb{N} \\times \\mathbb{N} \\to \\mathbb{N}, \\quad\
    \ \\pi(x, y) = \\frac{1}{2}(x + y)(x + y + 1) + y,$\n\nis bijective, proving $\\\
    mathbb{N}^2$ is countable. Inverse obtained by reversing triangular indexing.\n\
    \n```python\nimport math\ndef pair(x, y): return (x+y)*(x+y+1)//2 + y\ndef unpair(z):\n\
    \    w = math.floor((math.sqrt(8*z+1)-1)/2)\n    t = w*(w+1)//2\n    y = z - t\n\
    \    return (w - y, y)\nassert unpair(pair(17, 23)) == (17, 23)\n```\n\nFunction\
    \ composition is associative; identity functions act as units, forming the *category*\
    \ of sets. In computer science, *partial* functions arise naturally—total functions\
    \ on bounded domains extended with a *None* placeholder mirror them in Python.\n\
    \n**Synthesis** Set-theoretic algebra supplies precise language; relations organise\
    \ elements into structured classes; functions transport structure between sets.\
    \ These three pillars support the later chapters on graph morphisms, automata\
    \ transitions, and measure-theoretic probability, showing that seemingly humble\
