    \n## 10.2 Machine Learning Algorithms\n\nPredictive modelling seeks a measurable\
    \ mapping $\\mathcal{X} \\to \\mathcal{Y}$ that generalises from a finite sample\
    \ to unseen data. **Supervised learning** assumes an i.i.d. training set $\\mathcal{S}\
    \ = \\{(\\mathbf{x}_i, y_i)\\}_{i=1}^n$ drawn from joint law $\\mathbb{P}_{XY}$.\
    \ The learner selects a hypothesis $h_\\theta \\in \\mathcal{H}$ by minimising\
    \ empirical risk $\\widehat{R}_n(\\theta) = \\frac{1}{n} \\sum_i \\ell(h_\\theta(\\\
    mathbf{x}_i), y_i)$. Statistical learning theory bounds the expected risk $R(\\\
    theta) = \\mathbb{E}_{XY} \\ell(h_\\theta(X), Y)$ via VC dimension or Rademacher\
    \ complexity; practical algorithms complement these guarantees with regularisation\
    \ that controls model capacity.\n\n### 10.2.1 Supervised Learning\n\n### Linear\
    \ Regression, Logistic Regression\n\n**Ordinary Least Squares (OLS)**\n\nGiven\
    \ design matrix $X \\in \\mathbb{R}^{n \\times p}$ and target $\\mathbf{y} \\\
    in \\mathbb{R}^n$,\n\n$$\\hat{\\beta} = \\arg \\min_\\beta \\|X\\beta - \\mathbf{y}\\\
    |_2^2 = (X^\\top X)^{-1} X^\\top \\mathbf{y},$$\n\nassuming $X^\\top X$ invertible.\
    \ If $\\text{rank}(X) < p$, replace by Moore–Penrose pseudo-inverse or apply ridge\
    \ penalty $\\lambda \\|\\beta\\|_2^2$ yielding $(X^\\top X + \\lambda I)^{-1}\
    \ X^\\top \\mathbf{y}$.\n\n```python\nimport numpy as np\nβ_hat = np.linalg.inv(X.T\
    \ @ X) @ X.T @ y # OLS\nλ = 1e-2\nβ_ridge = np.linalg.inv(X.T @ X + λ*np.eye(p))\
    \ @ X.T @ y\n```\n\n### Logistic Regression\n\nBinary labels $y \\in \\{0, 1\\\
    }$. Model\n\n$$\\Pr(Y = 1 \\mid \\mathbf{x}) = \\sigma(\\mathbf{x}^\\top \\beta),\
    \ \\quad \\sigma(z) = \\frac{1}{1 + e^{-z}}.$$\n\nMaximise log-likelihood $\\\
    ell(\\boldsymbol{\\beta}) = \\sum_i [y_i \\ln \\sigma(z_i) + (1 - y_i) \\ln(1\
    \ - \\sigma(z_i))]$, solved via Newton–Raphson: $\\boldsymbol{\\beta}^{(k+1)}\
    \ = \\boldsymbol{\\beta}^{(k)} - (H)^{-1}\\nabla \\ell$. Add $\\ell_1$ term $\\\
    lambda \\|\\boldsymbol{\\beta}\\|_1$ for sparsity (lasso logistic) using coordinate\
    \ descent.\n\n### Decision Trees and Random Forests\n\n**CART Algorithm**\n\n\
    Partition feature space recursively; at node $t$ choose split $(j, s)$ minimising\
    \ impurity decrease\n\n$$\\Delta \\mathcal{I} = \\mathcal{I}(t) - \\frac{n_L}{n_t}\
    \ \\mathcal{I}(L) - \\frac{n_R}{n_t} \\mathcal{I}(R),$$\n\nwith Gini index $\\\
    mathcal{I}(t) = 1 - \\sum_k p_k^2$ for classification or mean-squared error for\
    \ regression. Prune tree by cost-complexity $C_{\\alpha}(T) = R(T) + \\alpha |T|$.\n\
    \n**Random Forest (Breiman 2001)**\n\nEnsemble of $B$ bootstrap trees $\\{T_b\\\
    }$ grown to full depth with $m$ random candidate features per split. Prediction:\
    \ $\\hat{y} = \\frac{1}{B} \\sum_b T_b(\\mathbf{x})$ (regression) or majority\
    \ vote (classification). Out-of-bag error approximates generalisation. Variance\
    \ reduction $1/B$ while bias remains; feature importance via mean decrease in\
    \ impurity.\n\n### Support Vector Machines (SVM) and Kernel Methods\n\nHard-margin\
    \ SVM seeks hyperplane $\\mathbf{w}^\\top \\mathbf{x} + b = 0$ maximising margin\
    \ $2/\\|\\mathbf{w}\\|$:\n\n$$\\min_{\\mathbf{w}, b} \\frac{1}{2} \\|\\mathbf{w}\\\
    |_2^2 \\quad \\text{s.t.} \\ y_i (\\mathbf{w}^\\top \\mathbf{x}_i + b) \\geq 1.$$\n\
    \nSoft margin introduces slack $\\xi_i$ and penalty $C \\sum \\xi_i$. Dual optimisation\n\
    \n$$\\max_{\\boldsymbol{\\alpha}} \\sum_i \\alpha_i - \\frac{1}{2} \\sum_{i,j}\
    \ \\alpha_i \\alpha_j y_i y_j K(\\mathbf{x}_i, \\mathbf{x}_j), \\quad 0 \\leq\
    \ \\alpha_i \\leq C, \\ \\sum_i \\alpha_i y_i = 0,$$\n\nwhere kernel $K(\\mathbf{x},\
    \ \\mathbf{x}') = \\phi(\\mathbf{x})^\\top \\phi(\\mathbf{x}')$. Common choices:\
    \ polynomial, RBF $K = \\exp(-\\gamma \\|\\mathbf{x} - \\mathbf{x}'\\|^2)$, sigmoid\
    \ (neural tangent). Prediction uses support vectors with $\\alpha_i > 0$.\n\n\
    ### Ensemble Methods: Bagging, Boosting, and Stacking\n\n**Bagging (Bootstrap\
    \ Aggregating)**\n\nGiven base learner $h$, form $B$ bootstrapped replicas $h_b$.\
    \ Aggregated estimator reduces variance: $\\text{Var}\\left[\\frac{1}{B} \\sum\
    \ h_b\\right] = \\frac{\\rho \\sigma^2}{B} + (1-\\rho)\\sigma^2$, where $\\rho$\
    \ is pairwise correlation.\n\n**AdaBoost (Freund and Schapire 1997)**\n\nExponential\
    \ loss:\n\n$F_M(\\mathbf{x}) = \\sum_{m=1}^M \\alpha_m h_m(\\mathbf{x}), \\quad\
    \ \\alpha_m = \\frac{1}{2} \\ln \\frac{1-\\varepsilon_m}{\\varepsilon_m},$\n\n\
    weights updated $w_i \\leftarrow w_i e^{-\\alpha_m y_i h_m(\\mathbf{x}_i)}$ and\
    \ renormalised. Minimises empirical risk under margin-exponential cost; can overfit\
    \ noisy labels.\n\n**Gradient Boosting**\n\nFor differentiable loss $L(y, F)$\
    \ fit base learner to negative gradient $g_i^{(m)} = -\\partial_F L(y_i, F_{m-1}(\\\
    mathbf{x}_i))$, update $F_m = F_{m-1} + \\eta \\gamma_m h_m$, with step size $\\\
    gamma_m$ from line search. XGBoost adds shrinkage, column subsampling, and $\\\
    ell_2$ regularisation on leaves.\n\n**Stacking**\n\nLevel-0 models $\\{h_k\\}$\
    \ generate meta-features $z_{ik} = h_k(\\mathbf{x}_i)$; level-1 learner $\\tilde{h}$\
    \ trained on $\\mathbf{z}_i$ predicts. Use $K$-fold split to avoid target leakage.\
    \ Theoretically, stacking approximates convex combination envelope when $\\tilde{h}$\
    \ is linear; nonlinear meta may capture interaction among base predictors.\n\n\
    **Illustrative Code Snippet**\n\n```python\nfrom sklearn.model_selection import\
    \ train_test_split, GridSearchCV\nfrom sklearn.ensemble import RandomForestClassifier,\
    \ GradientBoostingClassifier\nfrom sklearn.svm import SVC\nfrom sklearn.metrics\
    \ import roc_auc_score\nX_train, X_test, y_train, y_test = train_test_split(X,\
    \ y, test_size=.2, stratify=y)\n\npipe = SVC(kernel='rbf', probability=True)\n\
    param = {'C':[1,10],'gamma':[.1,.01]}\nsvm = GridSearchCV(pipe, param, cv=5, scoring='roc_auc').fit(X_train,\
    \ y_train)\n\nrf = RandomForestClassifier(n_estimators=300, max_features='sqrt').fit(X_train,\
    \ y_train)\ngb = GradientBoostingClassifier(n_estimators=400, learning_rate=.05).fit(X_train,\
    \ y_train)\n\npred = (0.3*svm.predict_proba(X_test)[:,1]\n        + 0.4*rf .predict_proba(X_test)[:,1]\n\
    \        + 0.3*gb .predict_proba(X_test)[:,1])\nprint(\"stacked AUC =\", roc_auc_score(y_test,\
    \ pred))\n```\n\n### 10.2.2 Unsupervised Learning\n\nIn the *unsupervised* paradigm\
    \ we observe $\\{\\mathbf{x}_1, \\dots, \\mathbf{x}_n\\} \\subset \\mathbb{R}^p$\
    \ without labels. The aim is to extract latent organisation: partitions (clustering),\
    \ low-dimensional structure (manifold learning), rare-event loci (anomaly detection),\
    \ or co-occurrence rules (market baskets). Mathematically, unsupervised learning\
    \ minimises an energy functional $\\mathscr{E}(\\theta)$ constructed from distances\
    \ or entropies rather than predictive loss.\n\n### Clustering: $k$-Means and Hierarchical\
    \ Clustering\n\n**$k$-Means (Lloyd 2006)**\n\nGiven $k$, minimise within-cluster\
    \ sum of squares (WCSS):\n\n$$\\mathscr{E}(C, \\boldsymbol{\\mu}) = \\sum_{i=1}^n\
    \ \\|\\mathbf{x}_i - \\boldsymbol{\\mu}_{C(i)}\\|^2,$$\n\nwhere $C : \\{1, \\\
    dots, n\\} \\to \\{1, \\dots, k\\}$ assigns points to centroids $\\boldsymbol{\\\
    mu}_j$. Lloyd's algorithm alternates:\n\n1. Assignment step: $C(i) \\leftarrow\
    \ \\arg \\min_j \\|\\mathbf{x}_i - \\boldsymbol{\\mu}_j\\|^2$;\n2. Update step:\
    \ $\\boldsymbol{\\mu}_j \\leftarrow \\frac{1}{|C^{-1}(j)|} \\sum_{i:C(i)=j} \\\
    mathbf{x}_i$.\n\nEach step decreases $\\mathscr{E}$; convergence to local optimum\
    \ in $O(nkp)$ per iteration. Initialisation via $k$-means++ samples centroids\
    \ with probability proportional to squared distance, providing $O(\\log k)$ expected\
    \ approximation ratio.\n\n### Hierarchical Agglomerative Clustering (HAC)\n\n\
    Start with $n$ singleton clusters; iteratively merge pair $(A, B)$ of clusters\
    \ that minimises linkage criterion:\n\n$d_{\\text{single}}(A, B) = \\min_{\\mathbf{x}\
    \ \\in A, \\mathbf{y} \\in B} \\|\\mathbf{x} - \\mathbf{y}\\|, \\quad d_{\\text{complete}}\
    \ = \\max, \\quad d_{\\text{average}} = \\frac{|A||B|}{|A|+|B|} \\|\\bar{\\mathbf{x}}_A\
    \ - \\bar{\\mathbf{x}}_B\\|$.\n\nProduces dendrogram; cut at height $\\tau$ to\
    \ obtain flat clusters. Complexity $O(n^2 \\log n)$ with heap linkage cache.\n\
    \n```python\nfrom sklearn.cluster import KMeans, AgglomerativeClustering\nkm =\
    \ KMeans(n_clusters=4, init='k-means++', n_init=20).fit(X)\nhac = AgglomerativeClustering(n_clusters=4,\
    \ linkage='ward').fit(X)\n```\n\n### Dimensionality Reduction: PCA, t-SNE\n\n\
    **PCA Recap**\n\nProjection $\\mathbf{z}_i = V^\\top(\\mathbf{x}_i - \\boldsymbol{\\\
    mu})$ maximises variance; reconstruction error $\\sum_i \\|\\mathbf{x}_i - VV^\\\
    top\\mathbf{x}_i\\|^2 = \\sum_{j>k} \\lambda_j$ equals discarded eigenvalue tail.\n\
    \n**t-SNE (van der Maaten and Hinton 2008)**\n\nTransforms Euclidean distances\
    \ to conditional probabilities $p_{j|i} \\propto \\exp(-\\|\\mathbf{x}_i - \\\
    mathbf{x}_j\\|^2 / 2\\sigma_i^2)$, perplexity $\\mathcal{P} = 2^{H(P_i)}$ selects\
    \ $\\sigma_i$. Embedding $\\mathbf{y}_i \\in \\mathbb{R}^2$ minimises KL divergence\n\
    \n$\\text{KL}(P \\parallel Q) = \\sum_{i \\neq j} p_{ij} \\log \\frac{p_{ij}}{q_{ij}},\
    \ \\quad q_{ij} = \\frac{(1 + \\|\\mathbf{y}_i - \\mathbf{y}_j\\|^2)^{-1}}{\\\
    sum_{k \\neq \\ell} (1 + \\|\\mathbf{y}_k - \\mathbf{y}_\\ell\\|^2)^{-1}}$.\n\n\
    Gradient updates $\\Delta \\mathbf{y}_i \\propto 4 \\sum_j (p_{ij} - q_{ij})(\\\
    mathbf{y}_i - \\mathbf{y}_j)(1 + \\|\\mathbf{y}_i - \\mathbf{y}_j\\|^2)^{-1}$.\
    \ Barnes–Hut approximation yields $O(n \\log n)$ runtime.\n\n```python\nfrom sklearn.manifold\
