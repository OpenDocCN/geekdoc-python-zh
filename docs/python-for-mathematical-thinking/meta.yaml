    \ = load_boston(return_X_y=True)\nridge = make_pipeline(StandardScaler(),\n  \
    \                    RidgeCV(alphas=np.logspace(-3,3,100), cv=10))\nlasso = make_pipeline(StandardScaler(),\n\
    \                      LassoCV(alphas=np.logspace(-3,3,100), cv=10, max_iter=5000))\n\
    \nridge.fit(X,y); lasso.fit(X,y)\nprint(\"Ridge $R^2$ =\", ridge.score(X,y))\n\
    print(\"Non-zero lasso coeffs:\", np.count_nonzero(lasso[-1].coef_))\n```\n\n\
    Typical output: Ridge $R^2 = 0.74$, lasso retains 6/13 predictors—pruning irrelevant\
    \ variables without severe accuracy loss.\n\nCoefficient Paths Plot $\\hat{\\\
    beta}_j(\\lambda)$ to visualise shrinkage:\n\n```python\nfrom sklearn.linear_model\
    \ import lasso_path\nalphas, coefs, _ = lasso_path(StandardScaler().fit_transform(X),\
    \ y, alphas=np.logspace(-3,2,50))\nplt.semilogx(alphas, coefs.T); plt.gca().invert_xaxis();\
    \ plt.show()\n```\n\n## Time Series Analysis and ARIMA Models\n\nA univariate\
    \ time series $\\{Y_t\\}_{t \\in \\mathbb{Z}}$ often exhibits autocorrelation\
    \ and non-stationarity. The **ARIMA**$(p, d, q)$ model combines autoregressive\
    \ (AR), differencing (I for “integrated”), and moving-average (MA) components:\n\
    \n$\\Phi(B)(1 - B)^d Y_t = \\Theta(B)\\varepsilon_t, \\quad B \\text{ shift operator},\
    \ \\quad \\varepsilon_t \\sim \\mathcal{N}(0, \\sigma^2)$.\n\n### ARIMA Diagnostics\n\
    \n- 1. Plot series, check stationarity via Augmented Dickey–Fuller (ADF) test.\n\
    - 2. ACF/PACF suggest AR and MA orders (cf. Fig. 5.8).\n- 3. Fit competing $(p,\
    \ d, q)$ via AIC.\n\n**Example 5.3.18 (Monthly Airline Passengers (Box–Jenkins\
    \ Classic))**\n\n```python\nimport statsmodels.api as sm\ndata = sm.datasets.get_rdataset(\"\
    AirPassengers\").data['value']\nts = np.log(data) # stabilize variance\ndiff =\
    \ ts.diff(1).dropna() # d=1\nsm.tsa.graphics.plot_acf(diff, lags=24); plt.show()\n\
    sm.tsa.graphics.plot_pacf(diff, lags=24); plt.show()\n```\n\n![](img/9724708489e3df346f9e31e3fa6e5746_190_0.png)\n\
    \n![](img/9724708489e3df346f9e31e3fa6e5746_191_0.png)\n\nFig. 5.9 Three-year ahead\
    \ forecast for log airline passenger counts using the fitted SARIMA model. The\
    \ widening 95% confidence band reflects compounding uncertainty, while the seasonal\
    \ pattern persists beyond the estimation window\n\n```python\nmodel = sm.tsa.ARIMA(ts,\
    \ order=(0,1,1), seasonal_order=(1,1,1,12)).fit()\nprint(model.summary())\nforecast\
    \ = model.get_forecast(steps=36)\nforecast_ci = forecast.conf_int()\nforecast.predicted_mean.plot()\n\
    plt.fill_between(forecast_ci.index, forecast_ci.iloc[:,0], forecast_ci.iloc[:,1],\
    \ alpha=.3)\nplt.show()\n```\n\nThe (0, 1, 1) × (1, 1, 1)₁₂ SARIMA captures trend\
    \ and seasonality; 3-year forecast envelope widens due to accumulated uncertainty\
