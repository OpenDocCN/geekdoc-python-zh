    # 6.3 Special Functions and Transform Techniques


    # 6.3.1 Laplace Transforms and Applications


    The **Laplace transform** converts differentiation in the time domain into algebraic
    multiplication in the complex $s$-plane, thereby linearising initial-value problems
    with piecewise or impulsive forcing. For an almost everywhere locally integrable
    function $f : [0, \infty) \to \mathbb{R}$ of exponential order $e^{\sigma_0 t}$,
    its Laplace transform is


    $$\mathcal{L}\{f\}(s) = F(s) = \int_0^\infty e^{-st} f(t)\,dt, \quad \text{Re}\,s
    > \sigma_0.$'
  - '[PAGE 237]


    The mapping is injective on suitably restricted classes—the *initial value theorem*
    $\lim_{t\to 0^+} f(t) = \lim_{s\to\infty} sF(s)$ and the *final value theorem*
    $\lim_{t\to\infty} f(t) = \lim_{s\to 0} sF(s)$ provide physical checks on transforms.


    # Inverse Laplace Transform


    Recovering $f$ from $F$ employs complex analysis. Let $\gamma > \sigma_0$; the
    **Bromwich inversion integral** states


    $$f(t) = \frac{1}{2\pi i} \int_{\gamma-i\infty}^{\gamma+i\infty} e^{st} F(s)\,
    ds.$$


    For rational $F$ (with distinct poles $s_k$ in $\text{Re}\, s < \gamma$) the residue
    theorem yields


    $$f(t) = \sum_k \text{Res}_{s=s_k}(e^{st} F(s)).$$


    **Partial-Fraction Algorithm** If $F(s) = \frac{P(s)}{(s-a_1)^{m_1}\cdots(s-a_r)^{m_r}}$,
    expand $F$ into elementary fractions; each term''s inverse is known:


    $$\mathcal{L}^{-1}\left\{\frac{1}{(s-a)^n}\right\} = \frac{t^{n-1}}{(n-1)!}\,
    e^{at}, \quad n \in \mathbb{N}.$$


    **Example 6.3.1 (Heaviside Step)** $F(s) = \frac{e^{-2s}}{s}$. Recognise shift
    theorem $f(t) = H(t-2)$, where $H$ is the unit step. Symbolic verification:


    ```

    python

    import sympy as sp

    s,t = sp.symbols(''s t'', positive=True)

    F = sp.exp(-2*s)/s

    f = sp.inverse_laplace_transform(F, s, t)

    sp.simplify(f)

    ```


    **Convolution Theorem** $\mathcal{L}\{f*g\}(s) = F(s)G(s)$, $(f*g)(t) = \int_0^t
    f(\tau)g(t-\tau)\, d\tau$. Useful when $F$ or $G$ is simple but their product
    complicates direct inversion.


    **Example 6.3.2 (Signal Smoothing Kernel)** $F(s) = \frac{1}{s} \cdot \frac{1}{s+1}
    \implies f(t) = 1 - e^{-t} = (1 * e^{-t})$.'
