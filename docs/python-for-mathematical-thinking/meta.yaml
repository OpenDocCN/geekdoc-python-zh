    \ partition(A, low, high):\n    pivot = A[high]\n    i = low\n    for j in range(low,\
    \ high):\n        if A[j] <= pivot:\n            A[i], A[j] = A[j], A[i]\n   \
    \         i += 1\n    A[i], A[high] = A[high], A[i]\n    return i\n\ndef quick_sort_inplace(A,\
    \ low=0, high=None):\n    if high is None:\n        high = len(A) - 1\n    if\
    \ low < high:\n        pi = partition(A, low, high)\n        quick_sort_inplace(A,\
    \ low, pi - 1)\n        quick_sort_inplace(A, pi + 1, high)\n```\n\nExample 4.3.9\
    \ (Visualise Pivot Effect) Try sorting [5,4,3,2,1] and observe $O(n^2)$ behaviour\
