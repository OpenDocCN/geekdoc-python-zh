    # Empirical Mode Decomposition and Hilbert–Huang Transform


    CWT presupposes a priori basis; empirical mode decomposition (Huang et al. 1998)
    adaptively extracts *intrinsic mode functions* (IMFs).


    # Sifting Algorithm


    +   (1) Identify local extrema of $x(t)$; interpolate upper envelope $e_{\max}$
    and lower envelope $e_{\min}$ (cubic splines).

    (2) Compute mean $m(t) = \frac{1}{2}(e_{\max} + e_{\min})$; update $h_1 = x -
    m$.

    (3) Iterate until $h_1$ satisfies IMF criteria: (i) number of extrema $\approx$
    number of zero crossings; (ii) mean envelope $\approx 0$ (tolerance $\varepsilon$).

    (4) Set $\text{IMF}_1 = h_1$; update residue $r_1 = x - \text{IMF}_1$ and repeat.


    Stop when residue $r_k$ is monotonic or has $< 2$ extrema. An $N$-point series
    decomposes as $x(t) = \sum_{k=1}^K \text{IMF}_k(t) + r_K(t)$.


    # Hilbert Spectral Analysis


    Apply analytic signal $z_k(t) = \text{IMF}_k(t) + j\mathcal{H}[\text{IMF}_k](t)$;
    instantaneous amplitude $A_k(t) = |z_k|$ and frequency $\omega_k(t) = \partial_t
    \arg z_k(t)$. The Hilbert spectrum $H(t, \omega) = \sum_k A_k(t)\delta(\omega
    - \omega_k(t))$ provides high-resolution amplitude–frequency portrait free from
    pre-defined basis.


    ```

    from PyEMD import EMD

    imfs = EMD().emd(signal)

    inst_freq = np.diff(np.unwrap(np.angle(sp.signal.hilbert(imfs, axis=1))), axis=1)

    ```


    # Mode Mixing Mitigation


    Ensemble EMD (EEMD) adds white-noise trials $\varepsilon_j(t)$ (std $\sigma =
    0.2\text{SD}$), averages IMFs, exploiting noise-assisted separation; complete
    EEMD (CEEMD) improves reconstruction by opposite-phase cancellation.


    # Synchrosqueezed and High-Resolution Methods


    # Synchrosqueezed Wavelet Transform (SWT)


    Given CWT coefficients $W(a, b)$, compute reassignment


    $\omega(a, b) = \frac{\partial_b \arg W(a, b)}{2\pi}, \quad T_x(b, \omega) = \int_A
    W(a, b)\,\delta(\omega - \omega(a, b))\,a^{-3/2}da.$'
  - '[PAGE 473]


    Energy is “squeezed” from scale dimension into sharpened frequency bins, achieving
    resolution beyond Heisenberg limit of CWT while preserving invertibility. The
    inverse reconstruction uses $x(t) = \Re \int T_x(t, \omega) \, d\omega$.


    # Reassigned Spectrogram


    For STFT $S(t, \omega)$, instantaneous frequency and group delay:


    $$\hat{\omega} = \omega + \Im \frac{\partial_t S}{S}, \quad \hat{t} = t - \Re
    \frac{\partial_\omega S}{S},$$


    reposition energy to $(\hat{t}, \hat{\omega})$, reducing spectral leakage.


    # S-Transform


    Hybrid of CWT and STFT:


    $$S_x(t, f) = \int x(\tau) \frac{1}{\sqrt{2\pi} \sigma(f)} e^{-(t-\tau)^2 / 2\sigma^2(f)}
    e^{-2\pi i f \tau} \, d\tau, \quad \sigma(f) = 1/|f|.$$


    Gaussian window width inversely proportional to frequency ensures constant-Q;
    S-transform is invertible and admits FFT-based $O(N \log N)$ algorithm.


    # 11.2.5 Applications


    The mathematical machinery developed in the preceding sections finds concrete
    expression across an impressive breadth of real-world domains. Whether forecasting
    volatile markets, decoding the faint whispers of neuronal firings, detecting planetary
    warming trends, or sculpting sound into art, time-frequency analysis and statistical
    modelling operate as the analytical backbone. Each domain imposes distinctive
    noise structures, sampling idiosyncrasies, and domain-specific constraints, yet
    the unifying signal-processing principles remain remarkably stable.


