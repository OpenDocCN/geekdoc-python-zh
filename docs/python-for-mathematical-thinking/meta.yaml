    # Decision Trees and Random Forests


    CART Algorithm


    Partition feature space recursively; at node $t$ choose split $(j, s)$ minimising
    impurity decrease


    $$\Delta \mathcal{I} = \mathcal{I}(t) - \frac{n_L}{n_t} \mathcal{I}(L) - \frac{n_R}{n_t}
    \mathcal{I}(R),$$


    with Gini index $\mathcal{I}(t) = 1 - \sum_k p_k^2$ for classification or mean-squared
    error for regression. Prune tree by cost-complexity $C_{\alpha}(T) = R(T) + \alpha
    |T|$.


    Random Forest (Breiman 2001)


    Ensemble of $B$ bootstrap trees $\{T_b\}$ grown to full depth with $m$ random
    candidate features per split. Prediction: $\hat{y} = \frac{1}{B} \sum_b T_b(\mathbf{x})$
    (regression) or majority vote (classification). Out-of-bag error approximates
    generalisation. Variance reduction $1/B$ while bias remains; feature importance
    via mean decrease in impurity.


    # Support Vector Machines (SVM) and Kernel Methods


    Hard-margin SVM seeks hyperplane $\mathbf{w}^\top \mathbf{x} + b = 0$ maximising
    margin $2/\|\mathbf{w}\|$:


    $$\min_{\mathbf{w}, b} \frac{1}{2} \|\mathbf{w}\|_2^2 \quad \text{s.t.} \ y_i
    (\mathbf{w}^\top \mathbf{x}_i + b) \geq 1.$$


    Soft margin introduces slack $\xi_i$ and penalty $C \sum \xi_i$. Dual optimisation


    $$\max_{\boldsymbol{\alpha}} \sum_i \alpha_i - \frac{1}{2} \sum_{i,j} \alpha_i
    \alpha_j y_i y_j K(\mathbf{x}_i, \mathbf{x}_j), \quad 0 \leq \alpha_i \leq C,
    \ \sum_i \alpha_i y_i = 0,$$


    where kernel $K(\mathbf{x}, \mathbf{x}'') = \phi(\mathbf{x})^\top \phi(\mathbf{x}'')$.
    Common choices: polynomial, RBF $K = \exp(-\gamma \|\mathbf{x} - \mathbf{x}''\|^2)$,
    sigmoid (neural tangent). Prediction uses support vectors with $\alpha_i > 0$.'
