  md: '**Tukey''s Fences** Define *lower fence* $L = Q_1 - 1.5 \text{ IQR}$ and *upper
    fence* $U = Q_3 + 1.5 \text{ IQR}$. Observations outside $[L, U]$ are flagged
    as *moderate outliers*; replace 1.5 by 3 for *extreme outliers*.


    **Example 5.2.6 (Box-Plot Diagnostics)** Dataset (synthetic salaries, $k$):


    $\mathbf{s} = \langle 45, 47, 50, 48, 46, 49, 51, 52, 100, 120 \rangle$.


    ```

    python

    import numpy as np

    s = np.array([45,47,50,48,46,49,51,52,100,120])

    q1,q3 = np.percentile(s, [25,75])

    iqr = q3 - q1

    L,U = q1 - 1.5*iqr, q3 + 1.5*iqr

    outliers = s[(s<L)|(s>U)]

    print(q1, q3, iqr, L, U, outliers)

    ```


    Results: $Q_1 = 46.5$, $Q_3 = 51.25$, $\text{IQR} = 4.75$, $L = 39.375$, $U =
    58.375$. Values 100, 120 exceed $U \Rightarrow$ flagged as outliers; a box-plot
    would show whiskers up to $58.4k$ with individual points beyond.


    # **Robust Coefficient of Variation (RCV)**


    $$\text{RCV} = \frac{\text{IQR}}{Q_2},$$


    a scale-free robust counterpart to SD/mean, especially under heavy tails.


    # **Skewness and Kurtosis**


    **Sample Moments** Third and fourth *central* sample moments:


    $$m_3 = \frac{1}{n} \sum_i (x_i - \bar{x})^3, \quad m_4 = \frac{1}{n} \sum_i (x_i
    - \bar{x})^4.$$


    # **Skewness**


    $$\gamma_1 = \frac{m_3}{s^3}$$


    measures asymmetry ($\gamma_1 > 0$ right-tailed, $\gamma_1 < 0$ left-tailed).


    # **Excess kurtosis**


    $$\gamma_2 = \frac{m_4}{s^4} - 3$$


    quantifies tail heaviness; $\gamma_2 = 0$ for normal distribution, positive for
    leptokurtic, negative for platykurtic.'
