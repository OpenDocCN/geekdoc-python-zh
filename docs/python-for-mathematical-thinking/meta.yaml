    \ < target:\n            low = mid + 1\n        else:\n            high = mid\
    \ - 1\n    return False\n```\n\n## 4.3 Sorting Algorithms\n\nSorting algorithms\
    \ reorder a collection of elements into a prescribed order—typically ascending\
    \ or descending. They are foundational in algorithmic design, used in searching,\
    \ data normalisation, optimisation, and more. The efficiency of a sorting algorithm\
    \ is judged by its time complexity, space usage, and stability. We begin with\
    \ the elementary sorting algorithms: selection sort, bubble sort, and insertion\
    \ sort. While inefficient for large datasets, these algorithms are conceptually\
    \ simple and valuable for teaching algorithmic thinking.\n\n### 4.3.1 Basic Sorting\
    \ Algorithms\n\n#### Selection Sort\n\n**Selection sort** sorts a list by repeatedly\
    \ selecting the smallest remaining unsorted element and swapping it to its correct\
    \ position.\n\n#### Algorithm\n\nFor $A = [a_0, a_1, \\dots, a_{n-1}]$, iterate:\n\
    \n- for $i = 0$ to $n - 2$:\n- find index $j \\ge i$ such that $A[j]$ is minimal\n\
    - swap $A[i] \\leftrightarrow A[j]$\n\n#### Time Complexity\n\nWorst-case: $O(n^2)$\
    \  Best-case: $O(n^2)$  In-place, not stable\n\n```python\ndef selection_sort(A):\n\
    \    n = len(A)\n    for i in range(n):\n        min_idx = i\n        for j in\
    \ range(i + 1, n):\n            if A[j] < A[min_idx]:\n                min_idx\
    \ = j\n        A[i], A[min_idx] = A[min_idx], A[i]\n    return A\n```\n\n####\
    \ Example 4.3.1 (Sort a List of Integers)\n\n```python\nA = [64, 25, 12, 22, 11]\n\
    print(selection_sort(A)) # [11, 12, 22, 25, 64]\n```\n\n#### Example 4.3.2 (Selection\
    \ Sort on Strings)\n\n```python\nnames = [\"Bob\", \"Alice\", \"Eve\"]\nprint(selection_sort(names))\
    \ # ['Alice', 'Bob', 'Eve']\n```\n\n#### Bubble Sort\n\n**Bubble sort** repeatedly\
    \ compares adjacent pairs and swaps them if they are out of order.\n\n#### Algorithm\n\
    \n- For $i = 0$ to $n - 1$:\n- Traverse from $j = 0$ to $n - i - 2$ and swap $A[j]$\
    \ and $A[j+1]$ if $A[j] > A[j+1]$.\n\n#### Time Complexity\n\n$O(n^2)$ in all\
    \ cases without optimisation. Stable and in-place\n\n```python\ndef bubble_sort(A):\n\
    \    n = len(A)\n    for i in range(n):\n        for j in range(0, n - i - 1):\n\
    \            if A[j] > A[j + 1]:\n                A[j], A[j + 1] = A[j + 1], A[j]\n\
    \    return A\n```\n\n**Example 4.3.3 (Trace Bubble Sort on [5,1,4,2,8])**\nEach\
    \ pass bubbles the largest element to the end:\n\n[5, 1, 4, 2, 8] → [1, 4, 2,\
    \ 5, 8] → [1, 2, 4, 5, 8]\n\n#### Early Termination\n\nTrack whether any swaps\
    \ occurred:\n\n```python\ndef bubble_sort_optimized(A):\n    n = len(A)\n    for\
    \ i in range(n):\n        swapped = False\n        for j in range(0, n - i - 1):\n\
    \            if A[j] > A[j + 1]:\n                A[j], A[j + 1] = A[j + 1], A[j]\n\
    \                swapped = True\n        if not swapped:\n            break\n\
    \    return A\n```\n\n#### Insertion Sort\n\n**Insertion sort** builds the sorted\
    \ list one element at a time, inserting each new element into the correct position.\n\
    \n#### Algorithm\n\n- For $i = 1$ to $n - 1$:\n- Set key = A[i] and compare backwards\
    \ A[j] with key.\n- Shift A[j] right if A[j] > key.\n- Insert key at correct position.\n\
    \n#### Time Complexity\n\nBest-case (already sorted): $O(n)$ Worst-case (reverse\
    \ sorted): $O(n^2)$ Stable and in-place\n\n```python\ndef insertion_sort(A):\n\
    \    for i in range(1, len(A)):\n        key = A[i]\n        j = i - 1\n     \
    \   while j >= 0 and A[j] > key:\n            A[j + 1] = A[j]\n            j -=\
    \ 1\n        A[j + 1] = key\n    return A\n```\n\n#### Example 4.3.4 (Insertion\
    \ Sort on Small Array)\n\n[3, 1, 4, 2] ⇒ [1, 3, 4, 2] ⇒ [1, 3, 4, 2] ⇒ [1, 2,\
    \ 3, 4]\n\n#### Example 4.3.5 (Sorting List of Tuples by Second Element)\n\n```python\n\
    data = [(1, \"b\"), (3, \"a\"), (2, \"c\")]\ndata.sort(key=lambda x: x[1]) # built-in\
    \ uses Timsort (stable)\nprint(data) # [(3, 'a'), (1, 'b'), (2, 'c')]\n```\n\n\
    #### Use Cases\n\n- Efficient for small or nearly sorted data.\n- Used in hybrid\
    \ algorithms like Timsort (used in Python's built-in sort).\n\n### 4.3.2 Divide\
    \ and Conquer Techniques\n\n**Divide and conquer** is a powerful paradigm in algorithm\
    \ design. The main idea is to divide the problem into smaller subproblems, solve\
    \ them recursively, and then combine the solutions. This approach often leads\
    \ to logarithmic recursion depth and improved asymptotic performance. In sorting,\
    \ **merge sort** and **quick sort** are classic applications.\n\n#### Merge Sort\n\
    \n**Merge sort** recursively divides the input array into halves, sorts each half,\
    \ and then merges the sorted halves.\n\n#### Algorithm Steps\n\n1. Divide: Split\
    \ array $A[0 \\dots n-1]$ into two halves.\n2. Conquer: Recursively sort each\
    \ half.\n3. Combine: Merge two sorted halves into a sorted array.\n\n#### Time\
    \ Complexity\n\n$T(n) = 2T(n/2) + O(n) \\Rightarrow T(n) = O(n \\log n)$\n\n####\
    \ Space Complexity\n\n$O(n)$ (due to temporary arrays for merging)\n\n#### Stable\n\
    \nYes. In-place: No.\n\n```python\ndef merge_sort(A):\n    if len(A) <= 1:\n \
    \       return A\n    mid = len(A) // 2\n    left = merge_sort(A[:mid])\n    right\
    \ = merge_sort(A[mid:])\n    return merge(left, right)\n\ndef merge(L, R):\n \
    \   result = []\n    i = j = 0\n    while i < len(L) and j < len(R):\n       \
    \ if L[i] <= R[j]:\n            result.append(L[i])\n            i += 1\n    \
    \    else:\n            result.append(R[j])\n            j += 1\n    result +=\
    \ L[i:] + R[j:]\n    return result\n```\n\n#### Example 4.3.6 (Sort a List Using\
    \ Merge Sort)\n\n```python\nA = [38, 27, 43, 3, 9, 82, 10]\nsorted_A = merge_sort(A)\n\
    print(sorted_A) # [3, 9, 10, 27, 38, 43, 82]\n```\n\n#### Example 4.3.7 (Merge\
    \ Sort with Custom Comparator)\n\nSort list of tuples by second element:"
