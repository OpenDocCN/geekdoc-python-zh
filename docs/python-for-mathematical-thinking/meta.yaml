    # Method of Lines and Applications


    The *method of lines* (MoL) discretises *space* while leaving *time* continuous,
    thereby converting a PDE into a large-dimensional ODE system


    $\dot{\mathbf{u}}(t) = \mathbf{A}\mathbf{u}(t) + \mathbf{g}(t)$.


    One then integrates in time with sophisticated ODE solvers (adaptive Runge–Kutta,
    implicit BDF) that automatically adjust the temporal mesh based on local truncation
    error.


    # Example 8.5.2 (Advection-Diffusion)


    $u_t + c u_x = D u_{xx}, \quad x \in [0, 1]$.


    Central differences for $u_{xx}$ and upwind for $u_x$ yield sparse $A$. Passing
    $A$ to `scipy.integrate.solve_ivp` with `method=''BDF''` efficiently handles stiffness
    when $D \ll c$.


    Applications include:


    +   - *Combustion modelling*: stiff reaction-diffusion systems with Arrhenius
    kinetics

    - *Electromagnetic waveguides*: Maxwell curl equations discretised by Yee grids
    in space, integrated by leap-frog schemes in time

    - *Financial derivatives*: Black–Scholes equation semi-discretised to meet non-uniform
    strike grids, then marched by implicit–explicit (IMEX) Runge–Kutta pairs


    # Stability and Convergence Analysis


    For linear constant–coefficient schemes $u^{n+1} = G(\xi) u^n$, *von Neumann analysis*
    inspects amplification factor $G(\xi) = \sum_m a_m e^{im\xi h}$, demanding $|G(\xi)|
    \le 1$ for all wave numbers $\xi$. For FTCS on $u_t = u_{xx}$ this yields the
    renowned Courant constraint $\lambda \le \frac{1}{2}$; violating it provokes blow-up
    even though the continuous equation is parabolic.


    A scheme is *consistent* if its local truncation error tends to 0 as $(h, k) \to
    0$, *stable* if its amplification boundedly propagates perturbations, and *convergent*
    if numerical solutions approach analytic ones. The **Lax equivalence theorem**
    states that, for well-posed linear initial-value problems, consistency + stability
    $\Longrightarrow$ convergence.'
