    **Explained Variance** λₖ / Σⱼ λⱼ quantifies the share of total variance captured
    by PCₖ. Retain first m PCs with Σₖ≤ₘ λₖ / Σⱼ λⱼ ≥ η (e.g. η = 0.9).'
