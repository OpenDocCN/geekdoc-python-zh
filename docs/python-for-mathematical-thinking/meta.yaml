    Task-based models estimate substitution elasticity; GPT-4–level systems place
    ≈19% of US occupations at 50% exposure. Policy responses: reskilling funds, universal
    basic income pilots, collective bargaining for algorithmic management transparency.


    Environmental Footprint


    Training a 100-billion-parameter model with 300 PFlop·s days consumes ~10⁶ kWh;
    renewable-energy scheduling and mixed-precision GPUs cut emissions by 35%. Lifecycle
    assessment incorporates e-waste and cooling water usage.'
