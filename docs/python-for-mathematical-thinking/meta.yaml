    # 10.5 Ethics and Fairness in Machine Learning


    Algorithmic decisions increasingly influence credit approval, bail, hiring, and
    healthcare triage. If a learning system inherits societal biases present in historical
    data, it can amplify injustice at scale. *Fairness* research therefore formalises
    group and individual notions of equity, devises diagnostic metrics, and designs
    mitigation mechanisms that minimise disparate impact while preserving predictive
    utility. This section introduces the mathematical foundation of bias detection
    and presents practical Python tool-chains for auditing and correcting unfair models.


    # 10.5.1 Bias and Fairness in AI


    Let $S \in \{0, 1\}$ denote a binary sensitive attribute (e.g. *gender*, *race*)
    and $\hat{Y} = f_{\theta}(X)$ be a classifier output. Define true label $Y$; the
    joint distribution $p(X, S, Y)$ governs observed data. Bias arises when $\hat{Y}$
    exhibits disparate performance across $S$ due to dataset imbalance, proxy variables,
    or label noise.


    # Identifying and Mitigating Bias in Machine Learning Models


    Group Fairness Criteria


    # Statistical Parity Difference (SPD)


    $$\Delta_{\mathrm{SPD}} = \operatorname{Pr}(\hat{Y}=1 \mid S=1) - \operatorname{Pr}(\hat{Y}=1
    \mid S=0).$$


    $\Delta_{\mathrm{SPD}}=0$ implies protected, and reference groups receive positive
    outcome equally often; $|\Delta_{\mathrm{SPD}}| \leq 0.02$ is a common threshold.'
