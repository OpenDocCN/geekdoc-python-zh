    # Window Functions and Smoothing Techniques


    Least-squares ideal low-pass response $h_{\infty}[n] = \frac{\sin \omega_c(n-M/2)}{\pi(n-M/2)}$
    truncation introduces Gibbs ripples. Multiply by window $w[n] \in [0, 1]$ to taper
    edges:


