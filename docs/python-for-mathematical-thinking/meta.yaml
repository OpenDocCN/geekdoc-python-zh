    already yield rich structures; for instance, $x^2 - Dy^2 = 1$ (Pell''s equation)
    has infinitely many solutions for non-square $D > 1$, generated from the fundamental
    unit in $\mathbb{Z}[\sqrt{D}]$ via continued fractions.


    # Example 7.1.7 (Solving Pell with Continued Fractions)


    ```

    import sympy as sp

    D = 61

    x, y = sp.nint_bernoulli_pell(D) # (1766319049, 226153980)

    print(x**2 - D*y**2) # 1

    ```


    Higher-degree problems such as Fermat''s Last Theorem or Catalan''s conjecture
    were settled only with sophisticated tools like elliptic curves and modularity
    lifting. Modern cryptosystems exploit hardness of certain Diophantine problems:
    the *knapsack* or *subset sum* problem embeds $a_1x_1 + \cdots + a_nx_n = b$ but
    over $\{0, 1\}^n$; lattice-basis reduction (LLL) cracks weak instances and underpins
    attacks.


    # Modular Forms and Their Applications


    A **modular form** of weight $k$ for the congruence subgroup $\Gamma \subset \mathrm{SL}_2(\mathbb{Z})$
    is a holomorphic function $f : \mathbb{H} \to \mathbb{C}$ on the upper half-plane
    satisfying the transformation law


    $$f\left(\frac{az+b}{cz+d}\right) = (cz+d)^k f(z), \quad \begin{pmatrix} a & b
    \ c & d \end{pmatrix} \in \Gamma,$$


    and a suitable growth condition at the cusps. Fourier expansion at $i\infty$ reads
    $f(z) = \sum_{n=0}^\infty a_n q^n$, $q = e^{2\pi i z}$, where the arithmetic of
    coefficients $a_n$ encodes deep information: for the discriminant $\Delta(z) =
    q \prod_{n \ge 1} (1 - q^n)^{24}$, Ramanujan conjectured (proved by Deligne) $|a_p|
    \le 2p^{11/2}$.


    The modularity theorem (formerly Taniyama–Shimura–Weil) asserts that every rational
    elliptic curve corresponds to a weight-2 modular form: $L(E, s) = L(f, s)$. Andrew
    Wiles exploited this bridge to prove Fermat''s Last Theorem, transforming an intractable
    Diophantine statement into the non-existence of a certain Galois representation
    inconsistent with modularity.


    # Example 7.1.8 (Numerical Verification of $q$-expansion)


    ```

    from sympy import qexp

    q = sp.Symbol(''q'')

    \Delta = q*sp.product((1-q**n)**24, (n,1,10)) # truncate

    print(sp.series(\Delta.expand(), q, 0, 6))

    ```


    In coding theory, modular forms supply *theta series* of lattices; the extremal
    properties of the Leech lattice hinge on the non-existence of low-weight cusp
    forms, which in turn bounds sphere-packing densities.'
