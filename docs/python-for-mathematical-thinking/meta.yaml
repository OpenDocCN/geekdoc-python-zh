    # Moment Generating Functions


    **Definition** The **moment generating function** (mgf) of $X$ is


    $M_X(t) = \mathbb{E}[e^{tX}], \quad t \in (-h, h)$


    for some $h > 0$ where the expectation exists.


    # Moment Extraction


    $M_X^{(k)}(0) = \mathbb{E}[X^k], \quad \mu = \mathbb{E}[X] = M_X''(0), \sigma^2
    = M_X''''(0) - \mu^2.$


    **Uniqueness** If mgf exists in an open interval around 0, it uniquely determines
    the distribution.


    **MGF of Sum of Independent r.v.s** If $X, Y$ independent,


    $M_{X+Y}(t) = M_X(t)M_Y(t).$'
