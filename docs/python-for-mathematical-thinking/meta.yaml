  md: '# Quasi-Newton (Broyden)


    Updating $B_k \approx J(\mathbf{x}_k)$ by rank-one secant corrections avoids Jacobian
    recomputation; super-linear convergence follows if initial $B_0$ is reasonable
    and exact Jacobian-vector products are expensive.


    # Convergence Diagnostics


    Monitor both residual norm $\|F(\mathbf{x}^{(k)})\|$ and step norm $\|\mathbf{s}_k\|$;
    stagnation in one but not the other signals ill-conditioning or poor scaling.
    Scaling matrices $D = \text{diag}(d_i)$ with $d_i \approx \max(|x_i|, 1)$ improve
    Jacobian conditioning.


    # Applications in Fluid Dynamics and Chemical Engineering


    # Steady Navier–Stokes Cavity Flow (Stream-Vorticity)


    Discretise on a $50 \times 50$ grid using second-order finite differences, yielding
    $n \approx 2\,500$ coupled nonlinear algebraic equations $F(\omega, \psi) = \mathbf{0}$.
    A damped Newton–Krylov approach:


    +   (a) Jacobian-free GMRES applies $Jv$ via finite differences.

    (b) ILU(0) preconditioner accelerates Krylov solves.

    (c) Line search ensures physical bounds on vorticity.


    Python''s `petsc4py` with SNES solves the system to $10^{-8}$ residual in $\sim
    6$ Newton iterations, each requiring $\sim 15$ GMRES iterations.


    # Flash Equilibrium in Chemical Reactors


    Given feed composition $\mathbf{z}$ and $K$-values $K_i(T, P)$, solve the Rachford–Rice
    equation


    $$F(\beta) = \sum_{i=1}^{n} \frac{z_i(K_i - 1)}{1 + \beta(K_i - 1)} = 0$$


    for vapour fraction $\beta \in (0, 1)$. Because $F''''(\beta) > 0$, the function
    is strictly convex: bisect for bracketing, then Newton with analytical derivative
    $F''(\beta) = -\sum_i \frac{z_i(K_i-1)^2}{[1+\beta(K_i-1)]^2} < 0$ converges quadratically.'
