  md: '# 8.3.2 Numerical Integration Methods


    Given a (sufficiently) smooth scalar function $f : [a, b] \to \mathbb{R}$, the
    *definite integral* $I = \int_a^b f(x)\,dx$ rarely admits an elementary antiderivative.
    Numerical quadrature approximates $I$ by finite weighted sums of function evaluations,


    $$Q[f] = \sum_{k=0}^m w_k f(x_k), \quad a \le x_0 < x_1 < \cdots < x_m \le b,$$


    choosing nodes $\{x_k\}$ and weights $\{w_k\}$ so that the *error* $E[f] = I -
    Q[f]$ decays rapidly with respect to the number of points $m + 1$. We review the
    classical equispaced Newton–Cotes family, the orthogonal-polynomial based Gaussian
    rules, adaptive refinement, and stochastic Monte Carlo techniques, emphasising
    error analysis and implementation trade-offs.


    # Trapezoidal Rule, Simpson’s Rule


    # Composite Trapezoidal Rule


    Partition $a = x_0 < x_1 < \cdots < x_n = b$ with step $h = (b - a)/n$. Applying
    the linear interpolant on each subinterval,


    $$Q_{\mathrm{T}}[f] = \frac{h}{2} \left( f(x_0) + 2 \sum_{k=1}^{n-1} f(x_k) +
    f(x_n) \right).$$


    If $f \in C^2$, the local truncation error on $(x_{k-1}, x_k)$ is $-\frac{h^3}{12}
    f''''(\xi_k)$ for some $\xi_k$, so


    $$E_{\mathrm{T}}[f] = -\frac{(b - a)h^2}{12} f''''(\xi), \quad \xi \in (a, b).$$


    Hence the method is *second-order* ($O(h^2)$).


    # Composite Simpson’s Rule


    Requiring even $n$, approximate $f$ by parabolas on pairs of intervals,


    $$Q_{\mathrm{S}}[f] = \frac{h}{3} \left( f(x_0) + 4 \sum_{k \text{ odd}}^{n-1}
    f(x_k) + 2 \sum_{k \text{ even}}^{n-2} f(x_k) + f(x_n) \right).$$'
