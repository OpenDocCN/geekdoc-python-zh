    # 11.4.4 Parallel and Distributed Computing for Numerical Methods


    # Parallel Algorithms for Large-Scale Systems


    In large-scale scientific computing the limiting resource is rarely arithmetic
    throughput but rather *communication latency*. A parallel algorithm should therefore
    (i) maximise independent flops per byte moved, (ii) overlap computation with communication,
    and (iii) degrade gracefully when faced with load imbalance. Consider the sparse
    linear system $A\mathbf{x} = \mathbf{b}$ where $A \in \mathbb{R}^{N \times N}$
    arises from a $d$-dimensional PDE discretised on a structured grid. Domain decomposition
    partitions the lattice into subdomains $\{\Omega_p\}_{p=1}^P$ assigned to distinct
    ranks; the halo exchange pattern couples only nearest-neighbour faces, yielding
    $\mathcal{O}(N/P)$ local work and $\mathcal{O}(N^{(d-1)/d} / P^{(d-1)/d})$ surface
    messages. The parallel *Jacobi* preconditioner operates on block-diagonal $B =
    \text{diag}(A_{\Omega_1}, \dots, A_{\Omega_P})$; one iteration of the Conjugate
    Gradient method then costs a sparse matrix-vector multiply (halo exchange) and
    three global dot products (all-reduce). The strong-scaling efficiency satisfies


    $$\eta_{\text{strong}}(P) = \frac{T_1}{P T_P} = \frac{1}{1 + \frac{P}{N} (\alpha
    \, n_{\text{halo}} + \beta \, v_{\text{halo}}) + \frac{P}{N} \gamma \, \ell}.$$


    where $\alpha$ is message latency, $\beta$ inverse bandwidth, $v_{\text{halo}}$
    halo volume, and $\gamma \, \ell$ the cost of the all-reduce (often $\log P$ communication
    steps). Block Krylov solvers such as *pipelined CG* hide the latency of dot products
    behind the sparse SpMV, mitigating the $\log P$ penalty.'
