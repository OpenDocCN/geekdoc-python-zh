  - "[PAGE 49]\n\n# 1.8 Iterators and Generators\n\nLazy evaluation converts potentially\
    \ infinite mathematical objects into finite memory representations. Python realises\
    \ laziness via the iterator protocol and generator syntax, enabling constructions\
    \ such as an unending stream of primes or Fibonacci numbers.\n\n# 1.8.1 Understanding\
    \ Iterators in Python\n\n# Iterator Protocol\n\nAn *iterator* implements\n\n```\n\
    __iter__(): self,    __next__(): elem\n```\n\nso that `for x in it:` repeatedly\
    \ calls `next(it)` until `StopIteration`. Formally, an iterator is a partial function\
    \ $N \\to S \\cup \\{\\bot\\}$ with at most one $\\bot$.\n\n# Custom Iterators\n\
    \n```\nclass Fibonacci:\n    def __init__(self): self.a, self.b = 0, 1\n    def\
    \ __iter__(self): return self # iterator is iterable\n    def __next__(self):\n\
    \        self.a, self.b = self.b, self.a + self.b\n        return self.a\n```\n\
    \nThe sequence $(F_n)$ emerges lazily; complexity per term is $O(1)$ space.\n\n\
    # 1.8.2 Generators and Lazy Evaluation\n\n# Generator Functions\n\nA function\
    \ containing `yield` suspends execution, storing its frame; each subsequent `next()`\
    \ resumes where it left off, akin to coroutines. This is an external representation\
    \ of coinductive streams.\n\n```\ndef primes():\n    yield 2\n    seq, p = [],\
    \ 3\n    while True:\n        if all(p % q for q in seq):\n            yield p\n\
    \            seq.append(p)\n        p += 2\n```"
- md: "# Generator Expressions\n\nSyntax `(f(x) for x in S)` builds a generator without\
    \ the overhead of a full list; it represents $\\lambda n. f(s_n)$ over the enumeration\
    \ $s_0, s_1, \\dots$.\n\n## 1.8.3 Combinatorics with Iterators and Generators\n\
    \n### Cartesian Products and Permutations\n\nModule `itertools` offers memory-efficient\
    \ combinatorial generators:\n\n```python\nfrom itertools import product, permutations\n\
    \nΩ = list(product(range(2), repeat=3)) # 2³ binary vectors\nΠ = list(permutations(\"\
    abc\")) # 3! permutations\n```\n\nBoth execute in $O(|\\Omega|)$ time but $O(1)$\
    \ additional space beyond the yielded tuple.\n\n### Infinite Sequences\n\nInfinite\
    \ mathematical objects become feasible through generators with convergence guards:\n\
    \n```python\ndef pi_leibniz():\n    k, s = 0, 0.0\n    while True:\n        s\
    \ += (-1)**k / (2*k + 1)\n        yield 4 * s\n        k += 1\n```\n\nTruncating\
    \ after $n$ iterations gives the Leibniz approximation $\\pi_n$; analysis of the\
    \ error term $O(1/n)$ guides practical stopping criteria.\n\nIterators and generators\
    \ thus furnish the machinery to traverse finite and infinite sets alike, preserving\
    \ the declarative clarity of mathematics while exploiting the operational efficiency\
    \ of lazy evaluation.\n\n## 1.9 Advanced Topics in Python\n\nPython's standard\
    \ library contains modules whose expressive power rivals specialised domain tools.\
    \ Two such modules—`re` for regular expressions and `datetime` for temporal arithmetic—translate\
    \ ideas from formal language theory and calendrical astronomy into concise, executable\
    \ constructs. We survey each module with an eye towards the underlying mathematics\
    \ and the subtle edge cases that arise in practical computation.\n\n### 1.9.1\
    \ Regular Expressions and String Matching\n\n#### Basic Pattern Syntax\n\nLet\
    \ Σ be a finite alphabet. A *regular expression* is an inductively defined term\
    \ that denotes a regular language L ⊆ Σ*; operations include union (+), concatenation\
    \ (juxtaposition), and Kleene star (*). Python's `re` module implements this formalism\
    \ with additional syntactic sugar:\n\n| Regex | Mathematical meaning |\n|---|---|\n\
    | a\\|b | L = {a} ∪ {b} (union) |\n| ab | L = {ab} (concatenation) |\n| a* | L\
    \ = {a^k \\| k ≥ 0} (Kleene closure) |\n| [0-9] | L = {0, ..., 9} (character class)\
    \ |\n| . | L = Σ (wildcard) |\n\n#### Example 1.9.1 (Detecting Palindromic Binary\
    \ Strings of Length Four)\n\nThe language L = {0000, 0110, 1001, 1111} admits\
    \ the regex\n\n```python\nimport re\npattern = re.compile(r\"(0|1)(0|1)\\2\\1\"\
    )\nbool(pattern.fullmatch(\"1001\")) # → True\n```\n\nGroups `(0|1)` capture bits\
    \ b₁, b₂; backreferences \\2 and \\1 enforce the reverse order, mirroring the\
    \ automaton that recognises w = wᴿ.\n\n#### Advanced Regex Features\n\nPython\
    \ extends classical regular expressions with constructs that exceed pure regular\
    \ power (backreferences yield context-sensitive languages) yet remain tractable\
    \ for practical pattern matching:\n\n1. **Non-capturing groups** `(?: ... )` group\
    \ subpatterns without storing them, reducing memory overhead.\n2. **Lookahead/lookbehind**\
    \ assertions `(?:=...)`, `(?:<=...)` implement zero-width predicates, akin to\
    \ logical guards in a DFA without tape movement.\n3. **Named groups** `(?P<name>pattern)`\
    \ enhance readability and enable dictionary-style access to submatches.\n\nAdvanced\
    \ features should be employed judiciously: lookbehinds complicate the underlying\
    \ automaton, and catastrophic backtracking may inflate complexity to O(2ⁿ) in\
    \ pathological cases (Friedl 2006). Profiling with `re.compile(..., re.DEBUG)`\
    \ reveals the state machine, guiding optimisations.\n\n### 1.9.2 Working with\
    \ Dates and Times\n\n#### datetime Module\n\nCalendrical computations form a semi-group\
    \ under addition of timedeltas. Python models this with immutable classes:\n\n\
    | Class | Domain | Example |\n|---|---|---|\n| date | Z-triple (Y, M, D) | 2025-07-03\
    \ |\n| time | [0, 24 h) | 16:00:00 |\n| datetime | Cartesian product | 2025-07-03\
    \ 16:00 |\n| timedelta | Z days × seconds | 10⁶ s |\n\nArithmetic is component-wise\
    \ but observes leap rules codified in the proleptic Gregorian calendar:\n\n```python\n\
    from datetime import datetime, timedelta\nlaunch = datetime(2025, 7, 3, 16) #\
    \ UTC+05:30 implicit if naive\nhorizon = launch + timedelta(days=30)\n```\n\n\
    #### Time-Zone Handling\n\nPrior to Python 3.9, robust zone support required pytz.\
    \ The modern solution is zoneinfo, which loads the IANA database (Olson corpus)\
    \ and attaches a fixed-offset or dynamic rule set to a datetime:\n\n```python\n\
    from datetime import datetime\nfrom zoneinfo import ZoneInfo\n\nfmt = \"%Y-%m-%d\
    \ %H:%M %Z%z\"\nutc = datetime(2025, 7, 3, 10, tzinfo=ZoneInfo(\"UTC\"))\nlocal\
    \ = utc.astimezone(ZoneInfo(\"Asia/Kolkata\"))\nprint(utc.strftime(fmt)) # 2025-07-03\
    \ 10:00 UTC+0000\nprint(local.strftime(fmt)) # 2025-07-03 15:30 IST+0530\n```\n\
    \nNaïve datetimes (with tzinfo=None) are ambiguous under daylight-saving transitions;\
    \ always prefer aware objects when arithmetic crosses zone boundaries. Duration\
    \ algebra follows\n\n$d_{\\text{UTC}} = d_{\\text{local}} - \\Delta_{\\text{offset}}$\n\
    \nensuring consistency across conversions.\n\nRegular expressions and temporal\
    \ arithmetic exemplify Python's philosophy: high-level declarative interfaces\
    \ grounded in rigorous formalism (finite automata, calendrical algorithms) yet\
    \ rendered with syntax that invites experimentation. Mastery of these tools equips\
    \ the mathematical programmer to parse complex data streams and timestamp results\
    \ with precision—a prerequisite for reproducible computational research.\n\n##\
    \ 1.10 Exercises\n\n1. Let $\\mu : \\mathbb{N} \\to \\{-1, 0, 1\\}$ denote the\
    \ Möbius function. Write a Python function `mobius_array(N)` that returns the\
    \ list $[\\mu(1), \\mu(2), \\dots, \\mu(N)]$ using *only* list- and set-comprehensions\
    \ (no explicit `for` loops). Verify numerically for $N = 10^5$ the classical identity\n\
    \n$$\n\\sum_{d|n} \\mu(d) = \\begin{cases} 1, & n = 1 \\\\ 0, & n > 1 \\end{cases}\
    \ \\quad \\text{for all } n \\le N,\n$$\n\nand report the largest $n \\le N$ for\
    \ which any floating-point round-off causes the computed summatory value to deviate\
    \ from the exact integer.\n\n2. Define the $4 \\times 4$ matrix\n\n$$\nA = \\\
    begin{pmatrix} 2 & -1 & 0 & 0 \\\\ -1 & 2 & -1 & 0 \\\\ 0 & -1 & 2 & -1 \\\\ 0\
    \ & 0 & -1 & 2 \\end{pmatrix}.\n$$\n\nUsing only `numpy` primitives (no `scipy.linalg.expm`),\
    \ approximate $e^A$ via the truncated Taylor series\n\n$$\ne^A = \\sum_{k=0}^m\
