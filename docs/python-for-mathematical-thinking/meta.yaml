  md: '# 9.2 Chaos and Fractals


    # 9.2.1 The Mandelbrot Set


    The quadratic-family parameter plane exhibits a boundary whose filigreed spirals,
    dendrites, and cardioids have transfixed mathematicians and artists alike since
    Benoît Mandelbrot’s seminal 1980 image. Behind its visual splendour lies a rigorous
    object in complex dynamics: the **Mandelbrot set**


    $$\mathcal{M} = \{c \in \mathbb{C} : \text{the orbit of } 0 \text{ under } f_c(z)
    = z^2 + c \text{ is bounded}\}.$$


    Equivalently, $\mathcal{M}$ is the connectedness locus of the quadratic Julia
    sets: $c \in \mathcal{M} \iff J(f_c)$ is connected (Douady–Hubbard). This subsection
    analyses its fractal geometry, shows how to generate high-resolution renderings
    in Python, and ties its structure to the iteration theory of $f_c$.


    # Fractal Geometry and Self-Similarity


    # Hausdorff Dimension


    The boundary $\partial\mathcal{M}$ is conjectured to have Hausdorff dimension
    2 (Shishikura proved $\dim_H \partial\mathcal{M} = 2$), even though its area is
    zero and its interior is compact. Portions of $\partial\mathcal{M}$ replicate
    at arbitrarily small scales, embodying *self-similarity*. Zooms near *Misiurewicz
    points* (pre-periodic parameters) or *Feigenbaum points* (period-doubling cusps)
    reveal micro-copies of the whole set connected by filamentary “tendrils” whose
    widths scale geometrically.


    # Douady–Hubbard Rays


    External angles $\theta \in \mathbb{Q}/\mathbb{Z}$ parameterise *external rays*
    of the complement $\hat{\mathbb{C}} \setminus \mathcal{M}$ via the Böttcher map
    $\Phi_c(z) \sim z + O(1)$ as $|z| \to \infty$. Landing of rays at rational angles
    organises hyperbolic components (bulbs) by their rotation numbers and encodes
    the infinite self-similar combinatorics (the “pinched” disk model).


    # Feigenbaum Scaling


    Let $c_\infty \approx -1.4011551890$ be the accumulation point of period-doubling
    bulbs along the real axis. In the vicinity of $z = 0$ for the map $g(z) = z^2
    - 1.401155\ldots$, the rescaling $\phi(z) = \lambda^{-1}g^2(\lambda z)$, $\lambda
    \approx -1.543689\ldots$ is conjugate to $g$: $\phi = g$. This functional equation
    implies geometric scaling by $\lambda$ and underpins the universal Feigenbaum
    constant $\delta \approx 4.669201\ldots$ encountered earlier.'
