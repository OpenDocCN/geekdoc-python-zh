    degree in Data Science from IIT Madras. He secured All-India Rank 1 in GATE 2020,
    JAM 2015, and CSIR-NET 2019. He has also received highly competitive awards, including
    the National Board for Higher Mathematics (NBHM) Master’s, Doctoral, and Post-Doctoral
    Fellowships awarded by the Department of Atomic Energy, India. In 2019, he was
