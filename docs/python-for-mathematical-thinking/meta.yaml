- md: "## Chapter 5\nProbability and Statistics\n\n**Abstract** Random variables are\
    \ formalised on measure-theoretic grounds before discrete and continuous distributions,\
    \ expectation, variance and covariance are simulated with `numpy.random`. Frequentist\
    \ inference (MLE, hypothesis testing, confidence intervals) is paralleled with\
    \ Bayesian updating, and resampling techniques such as bootstrap and permutation\
    \ tests provide non-parametric robustness. The chapter closes with time-series\
    \ basics and goodness-of-fit diagnostics, preparing the reader for stochastic\
    \ modelling in later chapters.\n\n**Keywords** Probability · Statistics · Bayesian\
    \ inference · Random variables · Hypothesis testing · Time-series analysis\n\n\
    ## 5.1 Probability Theory\n\nProbability provides a rigorous framework for quantifying\
    \ uncertainty and randomness. Formally, a probability space is a triple $(\\Omega,\
    \ \\mathcal{F}, \\mathbb{P})$, where $\\Omega$ is the sample space, $\\mathcal{F}$\
    \ a $\\sigma$-algebra of events, and $\\mathbb{P}$ a probability measure. In practice,\
    \ many problems reduce to finite sample spaces with the discrete $\\sigma$-algebra\
    \ and the counting measure scaled to unity.\n\n### 5.1.1 Basic Probability Concepts\n\
    \n### Probability Axioms and Theorems\n\n**Kolmogorov Axioms** For any probability\
    \ space $(\\Omega, \\mathcal{F}, \\mathbb{P})$ and events $A, B \\in \\mathcal{F}$:\n\
    \n$(\\text{A1})\\ 0 \\leq \\mathbb{P}(A) \\leq 1, \\qquad (\\text{A2})\\ \\mathbb{P}(\\\
    Omega) = 1, \\qquad (\\text{A3})\\ \\mathbb{P}\\left(\\bigcup_{i=1}^{\\infty}\
    \ A_i\\right) = \\sum_{i=1}^{\\infty} \\mathbb{P}(A_i)$\n\nfor any countable collection\
    \ $\\{A_i\\}$ of pairwise disjoint events.\n\n### Immediate Consequences\n\n$\\\
    mathbb{P}(\\varnothing) = 0, \\quad \\mathbb{P}(A^c) = 1 - \\mathbb{P}(A), \\\
    quad \\mathbb{P}(A \\cup B) = \\mathbb{P}(A) + \\mathbb{P}(B) - \\mathbb{P}(A\
    \ \\cap B)$.\n\n**Example 1 (Coin Tossing)** Let $\\Omega = \\{\\text{H}, \\text{T}\\\
    }^3$ be outcomes of 3 tosses of a fair coin. Then $\\#\\Omega = 8$ and $\\mathbb{P}$\
    \ is uniform (1/8 per outcome).\n\n$A = \\{\\text{exactly two heads}\\}, \\quad\
    \ \\mathbb{P}(A) = \\frac{\\binom{3}{2}}{8} = \\frac{3}{8}$.\n\n```python\nimport\
    \ itertools, statistics\nΩ = list(itertools.product(\"HT\", repeat=3))\nP = {ω:\
    \ 1/8 for ω in Ω}\nA = [ω for ω in Ω if ω.count(\"H\") == 2]\nprint(sum(P[ω] for\
    \ ω in A)) # 0.375\n```\n\n**Example 2 (Inclusion–Exclusion)** Roll two fair dice.\
    \ Let\n\n$A = \\{\\text{sum is even}\\}, \\quad B = \\{\\text{at least one die\
    \ shows 6}\\}$.\n\nCompute:\n\n$\\mathbb{P}(A) = \\frac{18}{36} = \\frac{1}{2},\
    \ \\quad \\mathbb{P}(B) = \\frac{11}{36}, \\quad \\mathbb{P}(A \\cap B) = \\frac{5}{36}$.\n\
    \nHence $\\mathbb{P}(A \\cup B) = \\frac{1}{2} + \\frac{11}{36} - \\frac{5}{36}\
    \ = \\frac{29}{36}$.\n\n**Boole’s Inequality** For any finite or countable $\\\
    {A_i\\}$,\n\n$\\mathbb{P}\\left(\\bigcup_i A_i\\right) \\leq \\sum_i \\mathbb{P}(A_i)$.\n\
    \n**Example** Draw $n$ cards without replacement from a shuffled 52-card deck.\
    \ Bound the probability that at least one ace appears when $n = 5$:\n\n$\\mathbb{P}(\\\
    geq 1 \\text{ ace}) \\leq \\sum_{k=1}^4 \\mathbb{P}(\\text{ace } k \\text{ appears})\
    \ = 4 \\cdot \\frac{5}{52} = \\frac{5}{13} \\approx 0.3846$,\n\nwhere the inequality\
    \ is strict because events overlap.\n\n**Example 3 (Total Probability and Bayes)**\
    \ Suppose a test for a disease has sensitivity 0.95 and specificity 0.98. Prevalence\
    \ is 0.01. Let $D$ be disease, $+$ positive result. Total probability:\n\n$\\\
    mathbb{P}(+) = 0.95 \\cdot 0.01 + 0.02 \\cdot 0.99 = 0.0293$.\n\nPosterior probability\
    \ via Bayes’ theorem:\n\n$$\\mathbb{P}(D|+) = \\frac{0.95 \\cdot 0.01}{0.0293}\
    \ \\approx 0.324.$$\n\n```python\nsens, spec, prev = 0.95, 0.98, 0.01\nppos =\
    \ sens*prev + (1-spec)*(1-prev)\nprint((sens*prev)/ppos) # 0.323860...\n```\n\n\
    ### Combinatorial Probability: Permutations and Combinations\n\nCounting arguments\
    \ allow explicit probability computations in finite sample spaces.\n\n### Permutations\n\
    \n$$P(n, k) = n^k = n(n-1) \\cdots (n-k+1)$$\n\ncounts ordered $k$-tuples from\
    \ $n$ distinct objects.\n\n### Combinations\n\n$$C(n, k) = \\binom{n}{k} = \\\
    frac{n!}{k!(n-k)!}$$\n\ncounts unordered $k$-subsets.\n\n**Example 4 (Anagrams\
    \ with Repeated Letters)** How many distinct rearrangements of “STATISTICS”? Letter\
    \ multiplicities: S:3, T:3, A:1, I:2, C:1.\n\n$$N = \\frac{10!}{3!3!2!} = 50400.$$\n\
    \n**Example 5 (Poker Hand)** Probability of being dealt exactly two pairs in 5-card\
    \ poker.\n\nChoose ranks: $\\binom{13}{2}$ for the pair ranks and $\\binom{11}{1}$\
    \ for the 5th card rank. Choose suits: $\\binom{4}{2}$ per pair, $\\binom{4}{1}$\
    \ for singleton.\n\n$$N_{2\\text{pair}} = \\binom{13}{2}\\binom{4}{2}^2\\binom{11}{1}\\\
    binom{4}{1}, \\quad N_{\\text{total}} = \\binom{52}{5}.$$\n\nProbability $\\approx\
    \ 0.0475$.\n\n```python\nfrom math import comb\nnum = comb(13,2)*comb(4,2)**2*comb(11,1)*comb(4,1)\n\
    den = comb(52,5)\nprint(num/den) # 0.047539...\n```\n\n**Example 6 (Derangements)**\
    \ For $n$ distinct letters mis-addressed to $n$ distinct envelopes, the probability\
    \ that no letter is in the correct envelope is\n\n$$\\frac{!n}{n!} \\approx \\\
    frac{1}{e}$$\n\nFor $n = 6$, $!6 = 265$ gives probability $265/720 \\approx 0.368$.\n\
    \n**Example 7 (Birthday Paradox)** In a group of $k$ people, probability of *no*\
    \ shared birthday (assuming 365 equally likely days):\n\n$$\\mathbb{P}(\\text{unique})\
    \ = \\frac{365^k}{365^k}$$\n\nFind the smallest $k$ s.t. $\\mathbb{P}(\\text{unique})\
    \ < \\frac{1}{2}$.\n\n```python\nimport math\np = 1\nk = 0\nwhile p > 0.5:\n \
    \   k += 1\n    p *= (365 - k + 1)/365\nprint(k) # 23\n```\n\n**Example 8 (Occupancy\
    \ Problem)** Randomly distribute $r = 10$ identical balls into $n = 4$ distinct\
    \ boxes. Probability that no box is empty:\n\n$$\\frac{\\binom{r-1}{n-1}^*}{\\\
    binom{r+n-1}{n-1}} = \\frac{\\binom{9}{3}^*}{\\binom{13}{3}}$$\n\nwhere $\\binom{9}{3}^*$\
    \ counts compositions with positive parts. Enumerate all such compositions in\
    \ Python and validate.\n\n```python\ndef compositions(n, k):\n    if k == 1: yield\
    \ [n]; return\n    for i in range(1, n-k+2):\n        for tail in compositions(n-i,\
    \ k-1):\n            yield [i] + tail\n\npositive = list(compositions(10,4))\n\
    print(len(positive)) # 84\nfrom math import comb\nprint(84/comb(13,3)) # 0.307692...\n\
    ```\n\n**Example 9 (Hypergeometric Distribution)** Urn contains 7 red and 8 blue\
    \ balls. Draw $k = 5$ without replacement. Probability that exactly 3 are red:\n\
    \n$$\\mathbb{P}(X = 3) = \\frac{\\binom{7}{3}\\binom{8}{2}}{\\binom{15}{5}} \\\
    approx 0.278.$$\n\n**Example 10 (Boolean Algebra of Events)** If $A, B, C$ are\
    \ independent with $\\mathbb{P}(A) = \\mathbb{P}(B) = \\mathbb{P}(C) = 1/2$, compute\
    \ $\\mathbb{P}(A \\oplus B \\oplus C)$ (exclusive-or).\n\nThe event $A \\oplus\
    \ B \\oplus C$ equals having an odd number of true events. Count outcomes: $\\\
    binom{3}{1} + \\binom{3}{3} = 4$. Thus $\\mathbb{P} = 4/8 = 1/2$.\n\n### Conditional\
    \ Probability and Bayes' Theorem\n\n**Definition** For events $A, B$ with $\\\
    mathbb{P}(B) > 0$, the **conditional probability** of $A$ given $B$ is\n\n$$\\\
    mathbb{P}(A \\mid B) = \\frac{\\mathbb{P}(A \\cap B)}{\\mathbb{P}(B)}.$$\n\nIntuitively\
    \ this rescales the sample space to $B$.\n\n**Law of Total Probability** If $\\\
    {B_i\\}_{i=1}^n$ is a finite partition of $\\Omega$ with $\\mathbb{P}(B_i) > 0$,\
    \ then\n\n$$\\mathbb{P}(A) = \\sum_{i=1}^n \\mathbb{P}(A \\mid B_i) \\mathbb{P}(B_i).$$\n\
    \n### Bayes' Theorem\n\n$$\\mathbb{P}(B_j \\mid A) = \\frac{\\mathbb{P}(A \\mid\
    \ B_j) \\mathbb{P}(B_j)}{\\sum_{i=1}^n \\mathbb{P}(A \\mid B_i) \\mathbb{P}(B_i)}.$$\n\
    \nBayes' theorem inverts conditional probabilities; the denominator is precisely\
    \ the total-probability expansion.\n\n**Example 5.1.1 (Medical Test Revisited\
    \ with Confusion Matrix)** A disease prevalence is 0.5% ($\\mathbb{P}(D) = 0.005$).\
    \ Sensitivity 0.97, specificity 0.99. Compute $\\mathbb{P}(D \\mid +)$, $\\mathbb{P}(D^c\
    \ \\mid -)$.\n\n$$\\mathbb{P}(+) = 0.97 \\cdot 0.005 + 0.01 \\cdot 0.995 = 0.0146,$$\n\
    \n$$\\mathbb{P}(D \\mid +) = \\frac{0.97 \\cdot 0.005}{0.0146} \\approx 0.332,$$\n\
    \n$$\\mathbb{P}(D^c \\mid -) = \\frac{0.99 \\cdot 0.995}{1 - 0.0146} \\approx\
    \ 0.995.$$\n\n```python\nsens, spec, prev = .97, .99, .005\np_plus = sens*prev\
    \ + (1-spec)*(1-prev)\npost = sens*prev / p_plus\nprint(post) # 0.331...\n```\n\
    \n**Example 5.1.2 (Monty Hall Problem)** Doors {1, 2, 3}, prize behind 1. Player\
    \ picks #1, host opens #2. Let $P$ be prize door, $H$ host door.\n\n$\\mathbb{P}(P\
    \ = 1 \\mid H = 2) = \\frac{\\frac{1}{3} \\cdot \\frac{1}{2}}{\\frac{1}{3} \\\
    cdot \\frac{1}{2} + \\frac{1}{3} \\cdot 1} = \\frac{1}{3}, \\quad \\mathbb{P}(P\
    \ = 3 \\mid H = 2) = \\frac{\\frac{1}{3} \\cdot 1}{\\dots} = \\frac{2}{3}$.\n\n\
    Hence switching doubles winning chance.\n\n```python\nimport random\nN=100000\n\
    win_switch=0\nfor _ in range(N):\n    prize=random.randint(1,3)\n    choice=1\n\
    \    door=[d for d in (2,3) if d!=prize][0] if choice==prize else \\\n       \
    \ [d for d in (2,3) if d not in (choice,prize)][0]\n    switch={1,2,3}-{choice,door}\n\
    \    if prize in switch: win_switch+=1\nprint(win_switch/N) # ≈ 0.667\n```\n\n\
    **Example 5.1.3 (Spam-Filter Using Naive Bayes)** Vocabulary: {free, win, hello}.\
    \ Training data yields likelihoods:\n\n| | free | win | hello |\n|---|---|---|---|\n\
    | Spam | 0.7 | 0.6 | 0.1 |\n| Ham | 0.05 | 0.02 | 0.4 |\n\n$\\mathbb{P}(\\text{Spam})\
    \ = 0.2$.\n\nIncoming mail contains *free* and *win*. Assuming word independence:\n\
    \n$\\mathbb{P}(\\text{Spam} \\mid \\text{free,win}) \\propto 0.7 \\cdot 0.6 \\\
    cdot 0.2, \\quad \\mathbb{P}(\\text{Ham} \\mid \\dots) \\propto 0.05 \\cdot 0.02\
    \ \\cdot 0.8$.\n\nNormalise to find posterior $\\approx 0.9996$ (almost certainly\
    \ spam).\n\n```python\nnum_spam = .7*.6*.2\nnum_ham = .05*.02*.8\npost = num_spam/(num_spam+num_ham)\n\
    print(post) # 0.9996\n```"
  mdcn: "## 第5章\n概率与统计\n\n**摘要** 本章首先在测度论基础上形式化随机变量，然后使用`numpy.random`模拟离散与连续分布、期望、方差和协方差。频率派推断（极大似然估计、假设检验、置信区间）与贝叶斯更新并行介绍，而自助法和置换检验等重采样技术则提供了非参数稳健性。本章最后介绍时间序列基础和拟合优度诊断，为后续章节的随机建模做好准备。\n\
    \n**关键词** 概率 · 统计 · 贝叶斯推断 · 随机变量 · 假设检验 · 时间序列分析\n\n## 5.1 概率论\n\n概率为量化不确定性和随机性提供了一个严格的框架。形式上，概率空间是一个三元组\
    \ $(\\Omega, \\mathcal{F}, \\mathbb{P})$，其中 $\\Omega$ 是样本空间，$\\mathcal{F}$ 是事件的\
    \ $\\sigma$-代数，$\\mathbb{P}$ 是概率测度。在实践中，许多问题可以简化为具有离散 $\\sigma$-代数和归一化计数测度的有限样本空间。\n\
    \n### 5.1.1 基本概率概念\n\n### 概率公理与定理\n\n**柯尔莫哥洛夫公理** 对于任意概率空间 $(\\Omega, \\mathcal{F},\
    \ \\mathbb{P})$ 和事件 $A, B \\in \\mathcal{F}$：\n\n$(\\text{A1})\\ 0 \\leq \\mathbb{P}(A)\
    \ \\leq 1, \\qquad (\\text{A2})\\ \\mathbb{P}(\\Omega) = 1, \\qquad (\\text{A3})\\\
    \ \\mathbb{P}\\left(\\bigcup_{i=1}^{\\infty} A_i\\right) = \\sum_{i=1}^{\\infty}\
    \ \\mathbb{P}(A_i)$\n\n其中 $\\{A_i\\}$ 是任意可数个两两不相交的事件。\n\n### 直接推论\n\n$\\mathbb{P}(\\\
    varnothing) = 0, \\quad \\mathbb{P}(A^c) = 1 - \\mathbb{P}(A), \\quad \\mathbb{P}(A\
    \ \\cup B) = \\mathbb{P}(A) + \\mathbb{P}(B) - \\mathbb{P}(A \\cap B)$.\n\n**示例\
    \ 1（抛硬币）** 设 $\\Omega = \\{\\text{H}, \\text{T}\\}^3$ 为一枚均匀硬币抛掷3次的结果。则 $\\#\\\
    Omega = 8$，且 $\\mathbb{P}$ 是均匀分布（每个结果概率为1/8）。\n\n$A = \\{\\text{恰好两次正面朝上}\\},\
    \ \\quad \\mathbb{P}(A) = \\frac{\\binom{3}{2}}{8} = \\frac{3}{8}$.\n\n```python\n\
    import itertools, statistics\nΩ = list(itertools.product(\"HT\", repeat=3))\n\
    P = {ω: 1/8 for ω in Ω}\nA = [ω for ω in Ω if ω.count(\"H\") == 2]\nprint(sum(P[ω]\
    \ for ω in A)) # 0.375\n```\n\n**示例 2（容斥原理）** 掷两枚均匀骰子。设\n\n$A = \\{\\text{点数之和为偶数}\\\
    }, \\quad B = \\{\\text{至少一枚骰子显示6点}\\}$。\n\n计算：\n\n$\\mathbb{P}(A) = \\frac{18}{36}\
    \ = \\frac{1}{2}, \\quad \\mathbb{P}(B) = \\frac{11}{36}, \\quad \\mathbb{P}(A\
    \ \\cap B) = \\frac{5}{36}$。\n\n因此 $\\mathbb{P}(A \\cup B) = \\frac{1}{2} + \\\
    frac{11}{36} - \\frac{5}{36} = \\frac{29}{36}$。\n\n**布尔不等式** 对于任意有限或可数个 $\\{A_i\\\
    }$，\n\n$\\mathbb{P}\\left(\\bigcup_i A_i\\right) \\leq \\sum_i \\mathbb{P}(A_i)$。\n\
    \n**示例** 从一副洗好的52张牌中无放回地抽取 $n$ 张牌。当 $n = 5$ 时，至少出现一张A的概率上界为：\n\n$\\mathbb{P}(\\\
    geq 1 \\text{ 张A}) \\leq \\sum_{k=1}^4 \\mathbb{P}(\\text{第 } k \\text{ 张A出现})\
    \ = 4 \\cdot \\frac{5}{52} = \\frac{5}{13} \\approx 0.3846$，\n\n由于事件重叠，该不等式是严格的。\n\
    \n**示例 3（全概率公式与贝叶斯定理）** 假设一种疾病的检测灵敏度为0.95，特异度为0.98。患病率为0.01。设 $D$ 表示患病，$+$ 表示检测结果阳性。全概率公式：\n\
    \n$\\mathbb{P}(+) = 0.95 \\cdot 0.01 + 0.02 \\cdot 0.99 = 0.0293$。\n\n通过贝叶斯定理计算后验概率：\n\
    \n$$\\mathbb{P}(D|+) = \\frac{0.95 \\cdot 0.01}{0.0293} \\approx 0.324.$$\n\n\
    ```python\nsens, spec, prev = 0.95, 0.98, 0.01\nppos = sens*prev + (1-spec)*(1-prev)\n\
    print((sens*prev)/ppos) # 0.323860...\n```\n\n### 组合概率：排列与组合\n\n计数方法允许在有限样本空间中进行显式的概率计算。\n\
    \n### 排列\n\n$$P(n, k) = n^k = n(n-1) \\cdots (n-k+1)$$\n\n计算从 $n$ 个不同对象中取出的有序\
    \ $k$ 元组数量。\n\n### 组合\n\n$$C(n, k) = \\binom{n}{k} = \\frac{n!}{k!(n-k)!}$$\n\n\
    计算无序 $k$ 子集的数量。\n\n**示例 4（含重复字母的变位词）** “STATISTICS”有多少种不同的重排？字母重复次数：S:3, T:3,\
    \ A:1, I:2, C:1。\n\n$$N = \\frac{10!}{3!3!2!} = 50400.$$\n\n**示例 5（扑克手牌）** 在5张牌的扑克中，恰好拿到两对的概率。\n\
    \n选择点数：$\\binom{13}{2}$ 种方式选择两对的点数，$\\binom{11}{1}$ 种方式选择第五张牌的点数。选择花色：每对 $\\binom{4}{2}$\
    \ 种，单张 $\\binom{4}{1}$ 种。\n\n$$N_{2\\text{对}} = \\binom{13}{2}\\binom{4}{2}^2\\\
    binom{11}{1}\\binom{4}{1}, \\quad N_{\\text{总}} = \\binom{52}{5}.$$\n\n概率 $\\\
    approx 0.0475$。\n\n```python\nfrom math import comb\nnum = comb(13,2)*comb(4,2)**2*comb(11,1)*comb(4,1)\n\
    den = comb(52,5)\nprint(num/den) # 0.047539...\n```\n\n**示例 6（错排问题）** 对于 $n$ 个不同的信件误寄给\
    \ $n$ 个不同的信封，没有一封信在正确信封中的概率为\n\n$$\\frac{!n}{n!} \\approx \\frac{1}{e}$$\n\n当\
    \ $n = 6$ 时，$!6 = 265$，概率为 $265/720 \\approx 0.368$。\n\n**示例 7（生日悖论）** 在一个 $k$\
    \ 人的群体中，*没有*人生日相同的概率（假设一年有365天，且每天等可能）：\n\n$$\\mathbb{P}(\\text{唯一}) = \\frac{365^k}{365^k}$$\n\
    \n求最小的 $k$ 使得 $\\mathbb{P}(\\text{唯一}) < \\frac{1}{2}$。\n\n```python\nimport math\n\
    p = 1\nk = 0\nwhile p > 0.5:\n    k += 1\n    p *= (365 - k + 1)/365\nprint(k)\
    \ # 23\n```\n\n**示例 8（占位问题）** 将 $r = 10$ 个相同的球随机放入 $n = 4$ 个不同的盒子中。没有盒子为空的概率：\n\
    \n$$\\frac{\\binom{r-1}{n-1}^*}{\\binom{r+n-1}{n-1}} = \\frac{\\binom{9}{3}^*}{\\\
    binom{13}{3}}$$\n\n其中 $\\binom{9}{3}^*$ 计算正整数部分的组合数。在Python中枚举所有此类组合并验证。\n\n```python\n\
