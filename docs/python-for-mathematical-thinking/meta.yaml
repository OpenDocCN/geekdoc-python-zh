  mdcn: "# 生成器表达式\n\n语法 `(f(x) for x in S)` 构建了一个生成器，避免了完整列表的开销；它表示枚举 $s_0, s_1, \\\
    dots$ 上的 $\\lambda n. f(s_n)$。\n\n## 1.8.3 使用迭代器和生成器的组合数学\n\n### 笛卡尔积与排列\n\n模块\
    \ `itertools` 提供了内存高效的组合生成器：\n\n```python\nfrom itertools import product, permutations\n\
    \nΩ = list(product(range(2), repeat=3)) # 2³ 二进制向量\nΠ = list(permutations(\"abc\"\
    )) # 3! 排列\n```\n\n两者都在 $O(|\\Omega|)$ 时间内执行，但除了产出的元组外，仅需 $O(1)$ 的额外空间。\n\n###\
    \ 无限序列\n\n通过带有收敛保护的生成器，无限数学对象变得可行：\n\n```python\ndef pi_leibniz():\n    k, s =\
    \ 0, 0.0\n    while True:\n        s += (-1)**k / (2*k + 1)\n        yield 4 *\
    \ s\n        k += 1\n```\n\n在 $n$ 次迭代后截断可得到莱布尼茨近似 $\\pi_n$；对误差项 $O(1/n)$ 的分析指导了实际的停止准则。\n\
    \n因此，迭代器和生成器提供了遍历有限集和无限集的机制，在保持数学声明式清晰性的同时，利用了惰性求值的操作效率。\n\n## 1.9 Python 高级主题\n\
    \nPython 的标准库包含一些模块，其表达能力可与专业领域工具相媲美。其中两个模块——用于正则表达式的 `re` 和用于时间算术的 `datetime`——将形式语言理论和历法天文学中的思想转化为简洁、可执行的结构。我们将考察每个模块，关注其背后的数学原理以及在实际计算中出现的微妙边界情况。\n\
    \n### 1.9.1 正则表达式与字符串匹配\n\n#### 基本模式语法\n\n设 Σ 为一个有限字母表。一个*正则表达式*是一个归纳定义的项，表示一个正则语言\
    \ L ⊆ Σ*；操作包括并集 (+)、连接（并置）和克莱尼星号 (*)。Python 的 `re` 模块实现了这一形式体系，并添加了额外的语法糖：\n\n\
    | 正则表达式 | 数学含义 |\n|---|---|\n| a\\|b | L = {a} ∪ {b} (并集) |\n| ab | L = {ab} (连接)\
    \ |\n| a* | L = {a^k \\| k ≥ 0} (克莱尼闭包) |\n| [0-9] | L = {0, ..., 9} (字符类) |\n\
    | . | L = Σ (通配符) |\n\n#### 示例 1.9.1（检测长度为四的回文二进制字符串）\n\n语言 L = {0000, 0110, 1001,\
    \ 1111} 可以用正则表达式表示\n\n```python\nimport re\npattern = re.compile(r\"(0|1)(0|1)\\\
    2\\1\")\nbool(pattern.fullmatch(\"1001\")) # → True\n```\n\n分组 `(0|1)` 捕获位 b₁,\
    \ b₂；反向引用 \\2 和 \\1 强制执行逆序，镜像了识别 w = wᴿ 的自动机。\n\n#### 高级正则表达式特性\n\nPython 扩展了经典正则表达式，增加了超出纯正则能力的结构（反向引用产生上下文相关语言），但对于实际模式匹配仍然易于处理：\n\
    \n1.  **非捕获组** `(?: ... )` 对子模式进行分组而不存储它们，减少了内存开销。\n2.  **前瞻/后顾**断言 `(?:=...)`,\
    \ `(?:<=...)` 实现了零宽度谓词，类似于 DFA 中不移动磁带的逻辑保护。\n3.  **命名组** `(?P<name>pattern)` 增强了可读性，并支持对子匹配的字典式访问。\n\
    \n高级特性应谨慎使用：后顾断言使底层自动机复杂化，并且在病态情况下，灾难性回溯可能将复杂度膨胀到 O(2ⁿ)（Friedl 2006）。使用 `re.compile(...,\
    \ re.DEBUG)` 进行性能分析可以揭示状态机，从而指导优化。\n\n### 1.9.2 处理日期和时间\n\n#### datetime 模块\n\n\
    历法计算在 timedelta 加法下构成一个半群。Python 使用不可变类对此建模：\n\n| 类 | 定义域 | 示例 |\n|---|---|---|\n\
    | date | Z-三元组 (Y, M, D) | 2025-07-03 |\n| time | [0, 24 h) | 16:00:00 |\n| datetime\
    \ | 笛卡尔积 | 2025-07-03 16:00 |\n| timedelta | Z 天 × 秒 | 10⁶ s |\n\n算术运算是按分量进行的，但遵循前推格里高利历中编纂的闰年规则：\n\
    \n```python\nfrom datetime import datetime, timedelta\nlaunch = datetime(2025,\
    \ 7, 3, 16) # 如果是朴素时间，则隐含 UTC+05:30\nhorizon = launch + timedelta(days=30)\n```\n\
    \n#### 时区处理\n\n在 Python 3.9 之前，健壮的时区支持需要 pytz。现代解决方案是 zoneinfo，它加载 IANA 数据库（Olson\
    \ 语料库）并将固定偏移或动态规则集附加到 datetime：\n\n```python\nfrom datetime import datetime\n\
    from zoneinfo import ZoneInfo\n\nfmt = \"%Y-%m-%d %H:%m %Z%z\"\nutc = datetime(2025,\
    \ 7, 3, 10, tzinfo=ZoneInfo(\"UTC\"))\nlocal = utc.astimezone(ZoneInfo(\"Asia/Kolkata\"\
    ))\nprint(utc.strftime(fmt)) # 2025-07-03 10:00 UTC+0000\nprint(local.strftime(fmt))\
    \ # 2025-07-03 15:30 IST+0530\n```\n\n朴素 datetime（tzinfo=None）在夏令时转换时是模糊的；当算术运算跨越时区边界时，始终优先使用感知对象。持续时间代数遵循\n\
    \n$d_{\\text{UTC}} = d_{\\text{local}} - \\Delta_{\\text{offset}}$\n\n确保跨转换的一致性。\n\
    \n正则表达式和时间算术体现了 Python 的哲学：基于严格形式体系（有限自动机、历法算法）的高级声明式接口，却以鼓励实验的语法呈现。掌握这些工具使数学程序员能够精确地解析复杂数据流并为结果添加时间戳——这是可重复计算研究的前提。\n\
    \n## 1.10 练习\n\n1.  设 $\\mu : \\mathbb{N} \\to \\{-1, 0, 1\\}$ 表示莫比乌斯函数。编写一个 Python\
    \ 函数 `mobius_array(N)`，*仅*使用列表推导和集合推导（不使用显式 `for` 循环）返回列表 $[\\mu(1), \\mu(2),\
    \ \\dots, \\mu(N)]$。对 $N = 10^5$ 数值验证经典恒等式\n\n$$\n\\sum_{d|n} \\mu(d) = \\begin{cases}\
    \ 1, & n = 1 \\\\ 0, & n > 1 \\end{cases} \\quad \\text{对所有 } n \\le N,\n$$\n\n\
    并报告最大的 $n \\le N$，使得任何浮点舍入导致计算的求和值偏离精确整数。\n\n2.  定义 $4 \\times 4$ 矩阵\n\n$$\nA\
    \ = \\begin{pmatrix} 2 & -1 & 0 & 0 \\\\ -1 & 2 & -1 & 0 \\\\ 0 & -1 & 2 & -1\
    \ \\\\ 0 & 0 & -1 & 2 \\end{pmatrix}.\n$$\n\n仅使用 `numpy` 原语（不使用 `scipy.linalg.expm`），通过截断泰勒级数\n\
    \n$$\ne^A = \\sum_{k=0}^m \\frac{A^k}{k!} + R_m,\n$$\n\n其中 $m = 15$，来近似 $e^A$。解析地界定\
    \ $\\|R_m\\|_2$，实现该近似，并计算相对于 `scipy.linalg.expm` 结果的 Frobenius 范数误差。根据 $A$ 的谱半径\
    \ $\\rho(A)$ 讨论收敛速度。\n\n3.  实现一个 Python 类 `Polynomial`，其实例表示 $p(x) = \\sum_{i=0}^n\
    \ a_i x^i$。重载 `__add__`、`__mul__` 和 `__call__`，使得 `p+q`、`p*q` 和 `p(x)` 按预期工作。使用你的类计算贝祖恒等式\n\
    \n$$\nx^{13} - 1 = (x^4 + x^3 + x^2 + x + 1)(x^9 - x^8 + x^7 - x^5 + x^4 - x^2\
    \ + x - 1) + r(x)\n$$\n\n并验证余式 $r(x)$ 恒等于零。\n\n4.  设 $(C_n)_{n\\geq 0}$ 是由 $C_0\
    \ = 1$ 和 $C_{n+1} = \\frac{2(2n+1)}{n+2} C_n$ 定义的卡特兰数列。编写一个生成器 `catalan()`，以 $O(1)$\
    \ 的增量成本产出连续的 $C_n$。绘制 $n \\leq 500$ 时的 $\\frac{C_n}{4^n/\\sqrt{\\pi n^3}}$，并观察其收敛到\
    \ 1（中心极限类比）；讨论你的递推关系的数值稳定性。\n\n5.  使用正则表达式模块 `re`，编写一个解析器，接受如下形式的字符串\n\n\"$(3+4i)(1-2i)-(7+i)^2/(2-i)$\"\
    ,\n\n提取每个复数字面量 $a+bi$（可选的空白和符号），并返回找到的 `complex` 数字列表。在提供的文件 `exprs.txt`（20 行表达式）上测试你的模式，并统计有多少个字面量对应高斯素数。\n\
    \n6.  设计一个 `Fraction3D` 类，其实例是存储为最简形式的三元组 $(x, y, z) \\in \\mathbb{Q}^3$。使用运算符重载（`+`,\
    \ `@`, `^`）实现向量加法、点积和叉积。给定向量\n\n$u = (\\frac{2}{3}, -\\frac{5}{4}, 1)$, $v = (\\\
    frac{7}{9}, 0, -\\frac{11}{6})$, $w = (\\frac{1}{3}, \\frac{5}{8}, -\\frac{7}{12})$,\n\
    \n精确计算有向体积 $\\det[u \\ v \\ w]$，并验证 $u \\cdot (v \\times w) = \\det[u \\ v \\\
    \ w]$ 在 $\\mathbb{Q}$ 中恒成立。\n\n7.  实现一个内存高效的迭代器 `prime_factors(n)`，按非递减顺序产出 $n$\
    \ 的质因数。使用它，列出满足高度合数条件\n\n$d(k) > d(m)$ 对所有 $m < k$\n\n的索引 $k \\leq 10^6$，其中 $d(k)$\
    \ 是除数函数。绘制这些 $k$ 的 $\\log k$ 与 $\\log d(k)$ 的关系图，并评论相对于拉马努金界 $d(k) = O(k^\\epsilon)$（对任意\
    \ $\\epsilon > 0$）的经验斜率。\n\n8.  编写一个上下文管理类 `Timer`，记录在嵌套的 `with Timer():` 块中花费的累计挂钟时间。对\
    \ $n=35$ 测量本章中的递归和迭代斐波那契实现，并报告它们的运行时间比率。根据递推关系的主定理解释观察到的加速。\n\n9.  使用 Kronecker\
    \ 积 $H_{2^{k+1}} = \\begin{pmatrix} H_{2^k} & H_{2^k} \\\\ H_{2^k} & -H_{2^k}\
    \ \\end{pmatrix}$ 递归生成 $n = 2^k \\leq 512$ 的 $n \\times n$ 哈达玛矩阵 $H_n$。数值验证 $H_n\
    \ H_n^\\top = n I_n$。使用 `matplotlib` 绘制 $H_{512}$ 的稀疏模式，并估计其分形（盒计数）维数。\n\n10.\
    \ 使用 `zoneinfo` 编写一个函数 `count_friday_13(start, end, zone)`，返回在指定时区 `zone` 内，从\
    \ `start` 到 `end`（含）的日期范围内，落在 13 号的星期五的数量。"
