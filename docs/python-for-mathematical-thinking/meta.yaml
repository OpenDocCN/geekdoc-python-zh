    the level of values rather than expressions, and unlike numerical differentiation,
    it does not suffer from subtraction cancellation.


    Let $f(x) = \sin(x) \cdot \exp(x^2)$. To compute $f''(x)$ at $x = 1$, we can use
    the reverse-mode AD provided by autograd:


    ```

    import autograd.numpy as np

    from autograd import grad


    f = lambda x: np.sin(x) * np.exp(x**2)

    df = grad(f)

    print(df(1.0))

    ```


    **How It Works** autograd rewrites the computational graph at runtime and propagates
    dual values through each operation. For a composition $f = f_n \circ \cdots \circ
    f_1$, the reverse-mode computes derivatives in reverse, applying the chain rule:


    $$\frac{df}{dx} = \frac{df_n}{df_{n-1}} \cdots \frac{df_1}{dx}.$


    Reverse-mode is efficient for scalar-valued functions with high-dimensional input,
