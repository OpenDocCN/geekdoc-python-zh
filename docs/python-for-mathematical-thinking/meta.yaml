  md: '**Modal Logic** Augments propositional cores with □ (necessarily) and ◇ (possibly).
    Kripke semantics interprets □φ as “φ holds in all accessible worlds”. System S4
    corresponds to provability (□φ → □□φ) and underlies temporal logics used in model
    checking (LTL, CTL).


    **Temporal and Dynamic Logics** Propositional Linear Temporal Logic (LTL) adds
    operators ○ (next), ◇ (eventually), and □ (always); Büchi automata translate LTL
    specifications into ω-automata for hardware verification. Dynamic logic reason
    about program execution paths; ⟨π⟩φ asserts existence of run of program π leading
    to state satisfying φ.


    **Fuzzy and Many-Valued Logics** Truth values take continuum [0, 1] with t-norms
    modelling conjunction. Used in control systems where sensor data is imprecise.
    *Łukasiewicz logic* defines x → y = min(1, 1 − x + y), capturing graded implications.


    **Paraconsistent Logics** Allow controlled reasoning in presence of contradictions
    without explosion (φ, ¬φ ⊢ ψ in classical logic). Useful in knowledge bases with
    inconsistent data. *LP* (Priest’s Logic of Paradox) designates both ⊤ and ⊥ as
    truth values.


    # Applications Snapshot


    **Example 7.4.7** *Model checking.* Given a Kripke structure *M* for a traffic-light
    controller, verify □(green → ○yellow) with LTL-to-Büchi translation and the spot
    library.


    *Type systems.* Intuitionistic λ-calculus plus dependent types captures proofs
    in Agda; total functional programs correspond to constructive proofs.


    *Policy languages.* Modal deontic logic expresses obligations (□) and permissions
    (◇) in access control systems; runtime monitors enforce these via temporal-logic
    model checking.


    # 7.5 Discrete Structures and Applications


    Mathematical thinking frequently begins with the act of *collecting* objects into
    well-defined groups, and then exploring the relations and mappings between such
    collections. Sets, relations, and functions provide a language concise enough
    to encode subtle logical dependencies yet concrete enough to be manipulated computationally.
    In this subsection we recall their foundational properties, demonstrate typical
    reasoning patterns, and illustrate each concept with short *Python* snippets that
    mirror the algebraic laws in executable form.'
