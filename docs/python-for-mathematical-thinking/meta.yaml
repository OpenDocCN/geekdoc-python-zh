    Powell 的狗腿信赖域法。从 $(-1.2, 1)$ 开始运行两者，记录迭代次数、雅可比矩阵求值次数和最终的 $\|\nabla f\|_2$。用曲率论证解释为什么狗腿法能更直接地逃离山谷。


    7.  在 $[0, 2\pi]^{20}$ 上最大化 $g(\mathbf{x}) = \sum_{i=1}^{20} \sin x_i + \sin^2
