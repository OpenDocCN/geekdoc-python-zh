    Indicator Trick For event $A$, $\mathbf{1}_A$ is 1 on $A$ else 0. Then $\mathbb{E}[\mathbf{1}_A]
    = \mathbb{P}(A)$ and


    $$\mathbb{E}[X] = \sum_k k \, \mathbb{P}(X = k) = \sum_k \mathbb{P}(X \ge k).$$


    Law of Iterated Expectation (Tower Rule) For $\sigma$-fields $\mathcal{G} \subset
    \mathcal{F}$,


    $$\mathbb{E}[\mathbb{E}[X \mid \mathcal{G}]] = \mathbb{E}[X].$$


    Special case: $\mathbb{E}[X] = \mathbb{E}[\mathbb{E}[X \mid Y]]$.


    Example 3 (Dice Conditioning) Let $X$ be sum of two dice, $Y$ first die. Then


    $$\mathbb{E}[X] = \mathbb{E}[\mathbb{E}[X \mid Y]] = \mathbb{E}[Y + 3.5] = \mathbb{E}[Y]
    + 3.5 = 3.5 + 3.5 = 7.$$


    # Variance, Covariance, and Standard Deviation


    # Variance


    $$\text{Var}(X) = \mathbb{E}[(X - \mathbb{E}[X])^2] = \mathbb{E}[X^2] - (\mathbb{E}[X])^2.$$


    Standard Deviation $\sigma_X = \sqrt{\text{Var}(X)}$.


    # Covariance


    $$\text{Cov}(X, Y) = \mathbb{E}[(X - \mu_X)(Y - \mu_Y)] = \mathbb{E}[XY] - \mu_X
    \mu_Y.$$'
