    # Boolean Functions and Simplification Techniques


    **Algebraic Identities** The Boolean operations obey idempotence (x ∨ x = x, x
    ∧ x = x), absorption (x ∨ x ∧ y = x), distributivity (x ∧ (y ∨ z) = (x ∧ y) ∨
    (x ∧ z)), and De Morgan’s laws (x ∧ y = x ∨ y). From these axioms one derives
    normal forms:


    +   (a) **Sum-of-Products** (SoP)/Disjunctive Normal Form: f = ∨_{m∈M} (∧_{x_i=0}
    x̄_i) (∧_{x_j=1} x_j), where M lists minterms evaluating to 1;

    (b) **Product-of-Sums** (PoS)/Conjunctive Normal Form, dual to SoP.


    # Example 7.4.4 (SoP Simplification in sympy)


    ```

    import sympy as sp

    a,b,c = sp.symbols(''a b c'')

    expr = (a & ~b) | (~a & b & c) | (a & b & c)

    print(sp.simplify_logic(expr, form=''dnf'')) # a & ~b | b & c

    ```


    The simplifier factors out common sub-terms, saving one AND gate and one input.

    Prime implicants (minimal products that still imply f) form the backbone of systematic
    simplification; the next subsubsection formalises their extraction.


    # Karnaugh Maps and Quine–McCluskey Method


    **Karnaugh Maps (K-maps)** For n ≤ 4 variables a K-map arranges 2^n minterms on
    a Gray-code grid so that adjacent cells differ in a single literal. Grouping 2^k
    adjacent 1’s yields an implicant covering those minterms; overlapping groups minimise
    literal count.


    | | bc = 00 | bc = 01 | bc = 11 | bc = 10 |

    |---|---|---|---|---|

    | a = 0 | 0 | 1 | 1 | 0 |

    | a = 1 | 1 | 1 | 0 | 0 |


    ⟹ f = ā b ∨ b̄ c̄.


    **Quine–McCluskey Algorithm** A tabular, deterministic analogue of K-maps for
    arbitrary n:


    +   1. *Initial grouping*: partition minterms by Hamming weight.

    2. *Iterative merging*: combine terms differing in one literal, marking absorbed
    terms; record prime implicants.'
