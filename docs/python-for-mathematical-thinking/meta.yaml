    } < 10^7$ records; otherwise shuffle sort-merge.\n\n```python\nfrom pyspark.sql\
    \ import SparkSession\nspark = SparkSession.builder.appName(\"ETL\").getOrCreate()\n\
    df_sales = spark.read.csv(\"sales.csv\", header=True, inferSchema=True)\ndf_region\
