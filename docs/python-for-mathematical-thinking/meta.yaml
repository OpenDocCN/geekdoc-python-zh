    \ $-10.8$，通过重新运行求解器得到确认。\n\n## 8.2.3 非线性优化\n\n当物理、经济或统计系统对决策变量做出非线性响应时，线性模型就显得不足。在这种情况下，凸性通常消失，多个局部极小值激增，导数计算变得昂贵或充满噪声。两类互补的算法主导着实践：*局部*牛顿型方法，利用二阶结构从良好的初始猜测实现快速收敛；以及*全局*元启发式方法，随机探索地形以逃离局部陷阱。一个复杂的工作流程通常将它们结合起来：全局阶段产生一个有希望的盆地；局部阶段将解决方案精炼到高精度。\n\
    \n## 信赖域方法与拟牛顿方法\n\n### 信赖域哲学\n\n在迭代点 $\\mathbf{x}_k$ 处，用二次模型 $m_k(\\mathbf{s})\
    \ = f(\\mathbf{x}_k) + \\mathbf{g}_k^\\top \\mathbf{s} + \\frac{1}{2} \\mathbf{s}^\\\
    top B_k \\mathbf{s}$ 近似 $f(\\mathbf{x})$，该模型仅在球 $\\|\\mathbf{s}\\| \\le \\Delta_k$\
    \ 内被信任。求解\n\n$$\\min_{\\|\\mathbf{s}\\| \\le \\Delta_k} m_k(\\mathbf{s})$$\n\n\
    以获得 $\\mathbf{s}_k$：如果 $\\rho_k = \\frac{f(\\mathbf{x}_k) - f(\\mathbf{x}_k +\
    \ \\mathbf{s}_k)}{m_k(\\mathbf{0}) - m_k(\\mathbf{s}_k)}$ 超过阈值则接受该步长，否则缩小 $\\\
    Delta_k$。*柯西步*与 $-\\mathbf{g}_k$ 对齐，而*狗腿*策略以低计算成本融合最速下降方向和牛顿方向。\n\n### 拟牛顿更新\n\
    \n精确海森矩阵 $H_k = \\nabla^2 f(\\mathbf{x}_k)$ 的形成和分解成本为 $O(d^2)$。拟牛顿方案仅使用梯度和步长更新\
    \ $B_k \\approx H_k$；割线条件 $B_{k+1}\\mathbf{s}_k = \\mathbf{y}_k, \\mathbf{y}_k\
    \ = \\mathbf{g}_{k+1} - \\mathbf{g}_k$ 确定了一个秩二修正。BFGS 公式保持正定性和超线性收敛：\n\n$$B_{k+1}\
    \ = B_k - \\frac{B_k \\mathbf{s}_k \\mathbf{s}_k^\\top B_k}{\\mathbf{s}_k^\\top\
    \ B_k \\mathbf{s}_k} + \\frac{\\mathbf{y}_k \\mathbf{y}_k^\\top}{\\mathbf{y}_k^\\\
    top \\mathbf{s}_k}.$$\n\n*有限内存 BFGS (L-BFGS)* 存储最近的 $m$ 对 $(\\mathbf{s}_i, \\\
    mathbf{y}_i)$，使得 $d \\sim 10^5$ 个变量仅需 $O(md)$ 内存。双循环递归以 $O(md)$ 时间应用 $B_k^{-1}$，使其成为大规模机器学习中的默认选择（`scipy.optimize.fmin_lbfgs`，`torch.optim.lbfgs`）。\n\
    \n```python\nimport numpy as np, scipy.optimize as opt\nrosen = lambda x: (1-x[0])**2\
    \ + 100*(x[1]-x[0]**2)**2\nx0 = np.array([-1.2, 1.0])\nres = opt.minimize(rosen,\
    \ x0, method='trust-constr',\n                  options={'gtol':1e-12})\nprint(res.x,\
    \ res.niter) # [1,1] 41 iterations\n```\n\n### 收敛性保证\n\n在利普希茨梯度和有界海森矩阵 $B_k \\\
    succ 0$ 的条件下，信赖域方法全局收敛到稳定点；一旦 $B_k = H$，二次终止发生。对于有噪声的梯度，概率信赖域框架 (MSP-TR) 以 $\\\
    tilde{O}(\\varepsilon^{-2})$ 的复杂度实现期望的一阶稳定性。\n\n### 在经济学和工程学中的应用\n\n#### 经济均衡（柯布-道格拉斯）\n\
    \n效用最大化 $\\max_{x_i \\ge 0} \\prod_i x_i^{\\alpha_i}$ 约束条件为 $\\sum_i p_i x_i =\
    \ w$，通过对数变换为 $f(\\mathbf{x}) = -\\sum_i \\alpha_i \\log x_i$ 并带有线性约束；KKT 条件可以显式求解，然而带有障碍函数的\
    \ L-BFGS 重现了 $x_i^* = \\alpha_i w / p_i$，说明了约束拟牛顿法的实用性。\n\n## 8.2 优化技术\n\n###\
    \ 结构工程设计\n\n最小化桁架的重量 $W(\\mathbf{t}) = \\rho \\sum_e A_e L_e$，约束条件为应力约束 $\\sigma_e(\\\
    mathbf{t}) \\le \\sigma_{\\max}$ 和位移限制。梯度评估需要有限元求解；因此 $d \\approx 1000$，导数通过伴随法计算，而带有廉价盒约束的\
    \ L-BFGS-B 在内存方面优于内点法。\n\n### 超参数调优\n\n高斯过程的贝叶斯对数边际似然 $f(\\theta) = -\\log|K_\\\
