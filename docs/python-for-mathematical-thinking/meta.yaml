    def vdp(t, y, mu=1.0):\n    y1, y2 = y\n    return [y2, mu*(1 - y1**2)*y2 - y1]\n\
    \nsol = solve_ivp(vdp, [0, 20], [2, 0], t_eval=np.linspace(0, 20, 1000))\nplt.plot(sol.t,\
