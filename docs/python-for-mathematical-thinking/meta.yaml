    \  low = mid + 1\n        else:\n            high = mid - 1\n    return False\n\
    ```\n\n## 4.3 排序算法\n\n排序算法将一组元素重新排列成规定的顺序——通常是升序或降序。它们是算法设计的基础，用于搜索、数据规范化、优化等。排序算法的效率由其时间复杂度、空间使用和稳定性来评判。我们从基础排序算法开始：选择排序、冒泡排序和插入排序。虽然对于大型数据集效率不高，但这些算法概念简单，对于教授算法思维很有价值。\n\
    \n### 4.3.1 基础排序算法\n\n#### 选择排序\n\n**选择排序**通过反复选择剩余未排序元素中的最小值，并将其交换到正确位置来对列表进行排序。\n\
    \n#### 算法\n\n对于 $A = [a_0, a_1, \\dots, a_{n-1}]$，迭代：\n\n- 对于 $i = 0$ 到 $n - 2$：\n\
    - 找到索引 $j \\ge i$，使得 $A[j]$ 最小\n- 交换 $A[i] \\leftrightarrow A[j]$\n\n#### 时间复杂度\n\
    \n最坏情况：$O(n^2)$  最佳情况：$O(n^2)$  原地排序，不稳定\n\n```python\ndef selection_sort(A):\n\
    \    n = len(A)\n    for i in range(n):\n        min_idx = i\n        for j in\
    \ range(i + 1, n):\n            if A[j] < A[min_idx]:\n                min_idx\
    \ = j\n        A[i], A[min_idx] = A[min_idx], A[i]\n    return A\n```\n\n####\
    \ 示例 4.3.1（对整数列表排序）\n\n```python\nA = [64, 25, 12, 22, 11]\nprint(selection_sort(A))\
    \ # [11, 12, 22, 25, 64]\n```\n\n#### 示例 4.3.2（对字符串进行选择排序）\n\n```python\nnames\
    \ = [\"Bob\", \"Alice\", \"Eve\"]\nprint(selection_sort(names)) # ['Alice', 'Bob',\
    \ 'Eve']\n```\n\n#### 冒泡排序\n\n**冒泡排序**反复比较相邻元素对，如果它们顺序错误则交换。\n\n#### 算法\n\n- 对于\
    \ $i = 0$ 到 $n - 1$：\n- 从 $j = 0$ 遍历到 $n - i - 2$，如果 $A[j] > A[j+1]$ 则交换 $A[j]$\
    \ 和 $A[j+1]$。\n\n#### 时间复杂度\n\n未优化时所有情况均为 $O(n^2)$。稳定且原地排序。\n\n```python\ndef\
    \ bubble_sort(A):\n    n = len(A)\n    for i in range(n):\n        for j in range(0,\
    \ n - i - 1):\n            if A[j] > A[j + 1]:\n                A[j], A[j + 1]\
    \ = A[j + 1], A[j]\n    return A\n```\n\n**示例 4.3.3（对 [5,1,4,2,8] 进行冒泡排序的追踪）**\n\
    每一趟都将最大的元素“冒泡”到末尾：\n\n[5, 1, 4, 2, 8] → [1, 4, 2, 5, 8] → [1, 2, 4, 5, 8]\n\n\
    #### 提前终止\n\n跟踪是否发生了任何交换：\n\n```python\ndef bubble_sort_optimized(A):\n    n =\
    \ len(A)\n    for i in range(n):\n        swapped = False\n        for j in range(0,\
    \ n - i - 1):\n            if A[j] > A[j + 1]:\n                A[j], A[j + 1]\
    \ = A[j + 1], A[j]\n                swapped = True\n        if not swapped:\n\
    \            break\n    return A\n```\n\n#### 插入排序\n\n**插入排序**逐个构建已排序的列表，将每个新元素插入到正确的位置。\n\
    \n#### 算法\n\n- 对于 $i = 1$ 到 $n - 1$：\n- 设置 key = A[i]，并从后向前比较 A[j] 与 key。\n- 如果\
    \ A[j] > key，则将 A[j] 右移。\n- 将 key 插入到正确位置。\n\n#### 时间复杂度\n\n最佳情况（已排序）：$O(n)$ \
    \ 最坏情况（逆序）：$O(n^2)$  稳定且原地排序\n\n```python\ndef insertion_sort(A):\n    for i in\
    \ range(1, len(A)):\n        key = A[i]\n        j = i - 1\n        while j >=\
    \ 0 and A[j] > key:\n            A[j + 1] = A[j]\n            j -= 1\n       \
    \ A[j + 1] = key\n    return A\n```\n\n#### 示例 4.3.4（对小数组进行插入排序）\n\n[3, 1, 4,\
    \ 2] ⇒ [1, 3, 4, 2] ⇒ [1, 3, 4, 2] ⇒ [1, 2, 3, 4]\n\n#### 示例 4.3.5（按第二个元素对元组列表排序）\n\
    \n```python\ndata = [(1, \"b\"), (3, \"a\"), (2, \"c\")]\ndata.sort(key=lambda\
