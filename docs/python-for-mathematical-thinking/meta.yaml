    \ ...\n    scheduler.step() # η <- 0.95 η\n```\n\n# 8.2.2 Simplex Method\n\nThe\
    \ simplex algorithm converts the geometric intuition that an optimal solution\
    \ of a linear programme occurs at an extreme point of the feasible polytope into\
    \ an algebraic pivot procedure that walks from vertex to vertex along improving\
    \ edges. Although the worst-case complexity is exponential, its empirical speed—rooted\
    \ in the sparsity of practical constraint matrices and good pivot rules—has made\
    \ it the backbone of operations research for decades.\n\n# Linear Programming\
    \ Problems\n\nA linear programme (LP) in *standard form* is\n\n$$\\min_{\\mathbf{x}\
    \ \\in \\mathbb{R}^n} \\mathbf{c}^\\top \\mathbf{x} \\quad \\text{s.t.} \\quad\
    \ A\\mathbf{x} = \\mathbf{b}, \\quad \\mathbf{x} \\geq \\mathbf{0}, \\qquad (\\\
    text{LP})$$\n\nwith $A \\in \\mathbb{R}^{m \\times n}$, full row rank $m \\leq\
    \ n$. A subset $B \\subseteq \\{1, \\dots, n\\}$ of indices with $|B| = m$ is\
    \ a *basis* if the columns $A_B$ are linearly independent. Setting $\\mathbf{x}_N\
    \ = \\mathbf{0}$ for the non-basic indices and $\\mathbf{x}_B = A_B^{-1}\\mathbf{b}$\
    \ yields a **basic feasible solution (BFS)** provided $A_B^{-1}\\mathbf{b} \\\
    geq \\mathbf{0}$. The simplex method iteratively exchanges one basic and one non-basic\
    \ variable (*pivot*) to obtain an adjacent BFS with lower objective value until\
    \ no further improvement is possible (*optimality condition*).\n\nAfter partitioning\
    \ $A = (A_B \\ A_N)$ and $\\mathbf{c}^\\top = (\\mathbf{c}_B^\\top \\ \\mathbf{c}_N^\\\
    top)$, the *reduced costs* are\n\n$$\\bar{\\mathbf{c}}_N^\\top = \\mathbf{c}_N^\\\
    top - \\mathbf{c}_B^\\top A_B^{-1} A_N,$$\n\nand the current BFS is optimal iff\
    \ $\\bar{\\mathbf{c}}_N \\geq \\mathbf{0}$ (*minimisation*). Otherwise choose\
    \ an entering index $q$ with $\\bar{c}_q < 0$, compute the search direction $\\\
    mathbf{d} = A_B^{-1} A_q$, and perform a ratio test $\\theta^* = \\min_{d_i >\
    \ 0} \\frac{x_{B,i}}{d_i}$ to keep feasibility, selecting the *leaving basic*\
    \ index $p$ attaining the minimum. The new basis $B \\leftarrow B \\setminus \\\
    {p\\} \\cup \\{q\\}$ defines the next BFS."
- md: "## Implementation in Python\n\nThe following minimalist implementation takes\
    \ a feasible initial basis $(B, N)$ and performs Bland's anti-cycling pivot rule.\n\
    \n```python\nimport numpy as np\n\ndef simplex(A, b, c, B):\n    m, n = A.shape\n\
    \    N = [j for j in range(n) if j not in B]\n    while True:\n        Bmat, Nmat\
    \ = A[:, B], A[:, N]\n        xB = np.linalg.solve(Bmat, b)\n        π = np.linalg.solve(Bmat.T,\
    \ c[B]) # dual price\n        rc = c[N] - Nmat.T @ π # reduced costs\n       \
    \ if (rc >= 0).all(): # optimal\n            x = np.zeros(n); x[B] = xB\n    \
    \        return x, c @ x\n        q = N[np.where(rc < 0)[0][0]] # Bland\n    \
    \    d = np.linalg.solve(Bmat, A[:, q])\n        if (d <= 0).all(): raise ValueError(\"\
    Unbounded\")\n        ratios = [xB[i]/d[i] if d[i] > 0 else np.inf for i in range(m)]\n\
    \        p = B[np.argmin(ratios)] # leaving\n        B[B.index(p)], N[N.index(q)]\
    \ = q, p # pivot\n```\n\n**Example** Minimise $c^T\\mathbf{x} = -3x_1 - x_2$ subject\
    \ to $\\begin{pmatrix} 1 & 1 \\\\ 2 & 1 \\end{pmatrix}\\mathbf{x} = \\begin{pmatrix}\
    \ 4 \\\\ 5 \\end{pmatrix}$, $\\mathbf{x} \\geq 0$. With slack variables and initial\
    \ basis $B = \\{3, 4\\}$ the code converges in two pivots to $\\mathbf{x}^* =\
    \ (3, 1, 0, 0)$ with optimal value $-10$.\n\n## Dual Simplex Method and Sensitivity\
    \ Analysis\n\nThe **dual LP**\n$$\\max_{\\mathbf{y} \\in \\mathbb{R}^m} \\mathbf{b}^T\\\
    mathbf{y} \\quad \\text{s.t.} \\quad A^T\\mathbf{y} \\leq \\mathbf{c}$$\nadmits\
    \ its own simplex procedure that pivots on infeasible primal but dual-feasible\
    \ bases. Starting with $x_B < 0$ yet $\\bar{c}_N \\geq 0$, select the most negative\
    \ basic variable to leave, then choose the entering non-basic index $q$ that preserves\
    \ dual feasibility: $q = \\arg \\min_{a_{iq}<0} \\frac{\\bar{c}_q}{a_{iq}}$. Dual\
    \ simplex excels when constraints are added or right-hand sides change, reoptimising\
    \ without restoring primal feasibility.\n\n## Shadow Prices and Reduced Costs\n\
    \nAt an optimal basis $B$ the dual vector $\\boldsymbol{\\pi} = c_B^T A_B^{-1}$\
    \ has entries $\\pi_i = \\frac{\\partial z^*}{\\partial b_i}$ (*marginal value\
    \ of resource $i$*), while $\\bar{c}_j = \\frac{\\partial z^*}{\\partial c_j}$\
    \ measures cost sensitivity of a non-basic activity.\n\nGiven perturbation $\\\
    Delta\\mathbf{b}$, the optimal value changes $\\Delta z^\\star \\approx \\boldsymbol{\\\
    pi}^\\top \\Delta\\mathbf{b}$ as long as the basis remains optimal; analogous\
    \ bounds exist for $\\Delta\\mathbf{c}$ when reduced costs maintain sign.\n\n\
    ## Allowable Ranges\n\nLet $\\underline{\\sigma} = -\\min_{i;d_i>0} \\frac{x_{B,i}}{d_i}$\
    \ and $\\overline{\\sigma} = \\min_{i;d_i<0} \\frac{x_{B,i}}{d_i}$, where $\\\
    mathbf{d} = A_B^{-1}\\mathbf{e}_r$ is the column of $A_B^{-1}$ associated with\
    \ RHS row $r$. Then $b_r$ can vary within $(b_r - \\underline{\\sigma},\\; b_r\
    \ + \\overline{\\sigma})$ without changing the optimal basis; corresponding shadow\
    \ price persists.\n\n### Example 8.2.3 (Sensitivity via SciPy)\n\n```python\n\
    from scipy.optimize import linprog\nc = [-3, -1] # minimise\nA = [[1,1],[2,1]]\n\
    b = [4,5]\nres = linprog(c, A_eq=A, b_eq=b, method='highs')\nprint(res.x, res.reduced_cost,\
    \ res.eqlin.dual)\n# x* = [3,1], reduced costs of slacks positive, dual = [-1,-2]\n\
    ```\n\nIf the second RHS rises from 5 to 5.4, the objective improves by $\\Delta\
    \ z = \\pi_2 \\Delta b = -2 \\times 0.4 = -0.8$, predicting new optimum $-10.8$,\
    \ confirmed by re-running the solver.\n\n## 8.2.3 Nonlinear Optimisation\n\nLinear\
    \ models are insufficient when physical, economic, or statistical systems respond\
    \ nonlinearly to decision variables. In such settings convexity often disappears,\
    \ multiple local minima proliferate, and derivatives become costly or noisy. Two\
    \ complementary classes of algorithms dominate practice: *local* Newton-type methods,\
    \ which exploit second-order structure to achieve rapid convergence from a good\
    \ initial guess, and *global* meta-heuristics, which explore the landscape stochastically\
    \ to escape local traps. A sophisticated workflow typically combines them: a global\
    \ phase produces a promising basin; a local phase polishes the solution to high\
    \ precision.\n\n## Trust-Region Methods and Quasi-Newton Methods\n\n### Trust-Region\
    \ Philosophy\n\nAt iterate $\\mathbf{x}_k$ approximate $f(\\mathbf{x})$ by a quadratic\
    \ model $m_k(\\mathbf{s}) = f(\\mathbf{x}_k) + \\mathbf{g}_k^\\top \\mathbf{s}\
    \ + \\frac{1}{2} \\mathbf{s}^\\top B_k \\mathbf{s}$ that is trusted only inside\
    \ a ball $\\|\\mathbf{s}\\| \\le \\Delta_k$. Solve\n\n$$\\min_{\\|\\mathbf{s}\\\
    | \\le \\Delta_k} m_k(\\mathbf{s})$$\n\nto obtain $\\mathbf{s}_k$: accept the\
    \ step if $\\rho_k = \\frac{f(\\mathbf{x}_k) - f(\\mathbf{x}_k + \\mathbf{s}_k)}{m_k(\\\
    mathbf{0}) - m_k(\\mathbf{s}_k)}$ exceeds a threshold, otherwise shrink $\\Delta_k$.\
    \ *Cauchy step* aligns with $-\\mathbf{g}_k$, while the *dogleg* strategy blends\
    \ the steepest-descent and Newton directions for low computational cost.\n\n###\
    \ Quasi-Newton Updates\n\nExact Hessians $H_k = \\nabla^2 f(\\mathbf{x}_k)$ cost\
    \ $O(d^2)$ to form and factor. Quasi-Newton schemes update $B_k \\approx H_k$\
    \ using only gradients and steps; the secant condition $B_{k+1}\\mathbf{s}_k =\
    \ \\mathbf{y}_k, \\mathbf{y}_k = \\mathbf{g}_{k+1} - \\mathbf{g}_k$, identifies\
    \ a rank-two correction. The BFGS formula maintains positive-definiteness and\
    \ super-linear convergence:\n\n$$B_{k+1} = B_k - \\frac{B_k \\mathbf{s}_k \\mathbf{s}_k^\\\
    top B_k}{\\mathbf{s}_k^\\top B_k \\mathbf{s}_k} + \\frac{\\mathbf{y}_k \\mathbf{y}_k^\\\
    top}{\\mathbf{y}_k^\\top \\mathbf{s}_k}.$$\n\n*Limited-memory BFGS (L-BFGS)* stores\
    \ the most recent $m$ pairs $(\\mathbf{s}_i, \\mathbf{y}_i)$, enabling $d \\sim\
    \ 10^5$ variables with $O(md)$ memory. The two-loop recursion applies $B_k^{-1}$\
    \ in $O(md)$ time, making it the default in large-scale machine learning (`scipy.optimize.fmin_lbfgs`,\
    \ `torch.optim.lbfgs`).\n\n```python\nimport numpy as np, scipy.optimize as opt\n\
    rosen = lambda x: (1-x[0])**2 + 100*(x[1]-x[0]**2)**2\nx0 = np.array([-1.2, 1.0])\n\
    res = opt.minimize(rosen, x0, method='trust-constr',\n                  options={'gtol':1e-12})\n\
    print(res.x, res.niter) # [1,1] 41 iterations\n```\n\n### Convergence Guarantees\n\
    \nUnder Lipschitz gradient and bounded Hessian $B_k \\succ 0$, trust-region methods\
    \ converge globally to stationary points; quadratic termination occurs once $B_k\
    \ = H$. For noisy gradients, probabilistic trust-region frameworks (MSP-TR) achieve\
    \ expected first-order stationarity with $\\tilde{O}(\\varepsilon^{-2})$ complexity.\n\
    \n### Applications in Economics and Engineering\n\n#### Economic Equilibria (Cobb–Douglas)\n\
    \nUtility maximisation $\\max_{x_i \\ge 0} \\prod_i x_i^{\\alpha_i}$ s.t. $\\\
    sum_i p_i x_i = w$ transforms via log to $f(\\mathbf{x}) = -\\sum_i \\alpha_i\
    \ \\log x_i$ with linear constraint; the KKT conditions solve explicitly, yet\
    \ L-BFGS with barriers reproduces $x_i^* = \\alpha_i w / p_i$, illustrating constrained\
    \ quasi-Newton practicality.\n\n## 8.2 Optimisation Techniques\n\n### Structural\
    \ Engineering Design\n\nMinimise weight $W(\\mathbf{t}) = \\rho \\sum_e A_e L_e$\
    \ of a truss subject to stress constraints $\\sigma_e(\\mathbf{t}) \\le \\sigma_{\\\
    max}$ and displacement limits. Gradient evaluations require finite-element solves;\
    \ thus $d \\approx 1000$, derivatives via adjoint method, and L-BFGS-B with inexpensive\
    \ box constraints outperforms interior point in memory.\n\n### Hyperparameter\
    \ Tuning\n\nBayesian log-marginal likelihood of a Gaussian process $f(\\theta)\
    \ = -\\log|K_\\theta| - \\mathbf{y}^\\top K_\\theta^{-1} \\mathbf{y}$ is non-convex;\
    \ trust-region Newton with exact Hessian via matrix derivatives refines initial\
    \ random seeds and avoids over-confident length-scale collapse.\n\n## Global Optimisation\
    \ Techniques: Genetic Algorithms and Simulated Annealing\n\n### Genetic Algorithms\
    \ (GA)\n\nRepresent candidate solution $\\mathbf{x}^{(k)}$ as a chromosome. At\
    \ each generation:\n\n- (a) *Selection*: roulette or tournament based on fitness\n\
    - (b) *Crossover*: single-point or uniform recombination of parents\n- (c) *Mutation*:\
    \ Gaussian jitter or bit flip with rate $\\mu$\n- (d) *Elitism*: copy best individuals\
    \ untouched\n\nSchema theorem states that short, low-order, above-average schemas\
    \ receive exponentially increasing trials; practical success depends on encoding,\
    \ diversity preservation, and penalty functions.\n\n```python\nimport pygad, math\n\
    def rastrigin(x): return 10*len(x) + sum(v**2 - 10*math.cos(2*math.pi*v)\n   \
    \ for v in x)\nga = pygad.GA(num_generations=200, num_parents_mating=20,\n   \
    \ sol_per_pop=50, num_genes=5, gene_space={'low':-5.12,'high':5.12},\n    fitness_func=lambda\
    \ sol,idx: -rastrigin(sol))\nga.run(); print(\"Best:\", ga.best_solution()[0])\n\
    ```\n\n### Simulated Annealing (SA)\n\nBorrowing statistical mechanics, SA explores\
    \ the energy landscape $E(\\mathbf{x}) = f(\\mathbf{x})$ via a Markov chain with\
    \ acceptance probability $P(\\mathbf{x} \\to \\mathbf{x}') = \\min\\{1, \\exp(-(f(\\\
    mathbf{x}') - f(\\mathbf{x}))/T_k)\\}$. Temperature $T_k$ decays (e.g. logarithmically)\
    \ $T_k = T_0/\\log(k+2)$; in theory SA converges globally but slowly. *Adaptive*\
    \ SA tunes step sizes to achieve a target acceptance rate."
