    # Finite Difference Methods for ODEs and PDEs


    For a two-point boundary value problem (BVP)


    $$-u''''(x) = f(x), \quad x \in (0, 1), \qquad u(0) = \alpha, \; u(1) = \beta,$$


    replace $u''''(x_j) \approx (u_{j-1} - 2u_j + u_{j+1})/h^2$, obtaining the tridiagonal
    linear system


    $$\frac{1}{h^2} \begin{bmatrix} -2 & 1 & & \ 1 & -2 & 1 & \ & \ddots & \ddots
    & \ddots \ & & 1 & -2 \end{bmatrix} \mathbf{u} = \begin{bmatrix} -f_1 \ \vdots
    \ -f_{N-1} \end{bmatrix} - \frac{1}{h^2} \begin{bmatrix} \alpha \ 0 \ \vdots \
    \beta \end{bmatrix}.$$


    Because the coefficient matrix is symmetric positive-definite, Cholesky factorisation
    costs $O(N)$ operations; truncation error is $O(h^2)$ by Taylor''s theorem.


    # Example 8.5.1 (Dirichlet Poisson Solver)


    ```

    import numpy as np, scipy.sparse as sp, scipy.sparse.linalg as spla

    N, h = 100, 1/100

    e = np.ones(N-1)

    A = sp.diags([e, -2*e, e], [-1, 0, 1]) / h**2

    x = np.linspace(h, 1-h, N-1)

    f = np.sin(np.pi*x)

    b = -f

    b[0] -= 0/h**2 # \alpha=0

    b[-1] -= 0/h**2 # \beta=0

    u = spla.spsolve(A, b)

    ```


    *Extension to 2-D* The five-point Laplacian on a square lattice gives a block
    tridiagonal system with $O(N^3)$ unknowns for $N \times N$ grid; band LU or multigrid
    accelerates the solution.


    For time-dependent PDEs, e.g. the heat equation $u_t = u_{xx}$, explicit and implicit
    difference schemes emerge:


    FTCS: $u_j^{n+1} = u_j^n + \lambda(u_{j-1}^n - 2u_j^n + u_{j+1}^n), \qquad \lambda
    = \frac{k}{h^2}.$


    Crank–Nicolson: $u_j^{n+1} - \frac{\lambda}{2}\delta_{xx}u_j^{n+1} = u_j^n + \frac{\lambda}{2}\delta_{xx}u_j^n,$'
