    \    return (w - y, y)\nassert unpair(pair(17, 23)) == (17, 23)\n```\n\n函数复合是结合的；恒等函数充当单位元，构成集合的*范畴*。在计算机科学中，*部分*函数自然出现——有界域上的全函数通过添加\
    \ *None* 占位符在 Python 中得到镜像。\n\n**综合** 集合论代数提供了精确的语言；关系将元素组织成结构化类；函数在集合之间传递结构。这三大支柱支撑了后续关于图态射、自动机转换和测度论概率的章节，表明看似简单的定义在离散数学中产生了深远的影响。\n\
    \n## 7.5.2 代数结构\n\n代数结构形式化了组合对象并研究支配这些组合的法则的直观想法。它们提供了一种统一的语言，算术、对称性、序和逻辑都可以在其中表达。一旦置于这种抽象设定中，定理就变得可移植：为*任何*群证明的性质立即适用于加法下的整数、复合下的置换和乘法下的可逆矩阵。Python\
    \ 的任意精度算术及其符号代数库生态系统（sympy, sagemath）为计算验证此类普遍陈述创造了理想的试验场。\n\n### 群、环与域\n\n**群**\
    \ $\\langle G, *, e \\rangle$ 由一个非空集合 $G$ 和一个满足结合律、单位元和可逆性的二元运算 $*$ 组成。如果 $*$\
    \ 是交换的，则该群是*阿贝尔的*。经典例子从 $(\\mathbb{Z}, +, 0)$ 到 $(\\mathbb{Z}_n, +_n, 0)$ 再到 $n$\
    \ 个字母上的对称群 $S_n$。\n群通过同态 $G \\to \\text{Sym}(X)$ 作用于集合；轨道和稳定子划分了作用空间，轨道-稳定子定理\
