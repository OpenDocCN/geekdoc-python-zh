    # Modelling with Fractional Dynamics


    Fractional derivatives allow us to model **memory effects** and **non-local dynamics**,
    commonly found in biological systems, viscoelastic materials, and anomalous diffusion.


    # Fractional Relaxation Equation


    $$D^\alpha y(t) = -\lambda y(t), \quad 0 < \alpha < 1.$$


    Solution: $y(t) = E_\alpha(-\lambda t^\alpha)$, where $E_\alpha$ is the Mittag–Leffler
    function (cf. Fig. 3.5).


    ```

    from mpmath import *

    mp.dps = 15


    λ = 1.0

    α = 0.5

    t = mp.linspace(0, 10, 100)

    y = [mittaggleich(α, -λ * ti**α) for ti in t]


    import matplotlib.pyplot as plt

    plt.plot(t, y)

    plt.title("Fractional Relaxation: $D^{0.5}y = -y$")

    plt.xlabel("t")

    plt.ylabel("y(t)")

    plt.grid()

    plt.show()

    ```'
