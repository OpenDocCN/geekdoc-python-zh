  md: '# Physics Applications: Langevin Equation


    **Overdamped Langevin** Colloidal particle in potential $U(x)$ at temperature
    $T$:


    $$\gamma \, dX_t = -\nabla U(X_t) \, dt + \sqrt{2\gamma k_B T} \, dW_t.$$


    Equilibrium density $\rho(x) \propto e^{-U(x)/(k_B T)}$. Milstein with reflecting
    boundaries simulates confinement and tunnelling events.


    **Kramers Escape Rate** Mean first-passage time over barrier height $U_b$ approximates
    $\tau \sim \frac{2\pi \gamma}{\sqrt{|U''''(x_m)U''''(x_b)|}} e^{U_b/(k_B T)}$.
    Estimate $\tau$ via Monte Carlo and compare with asymptotic formula.


    **Stochastic Energetics** Incremental work $dW = -U''(X_t) \circ dX_t$ (Stratonovich)
    and heat $dQ = \gamma \dot{X}_t^2 dt$ satisfy first law: $dU = dQ - dW$. Numerically
    integrate with Heun (strong order 1 Stratonovich scheme) to verify energy balance.


    # 6.5 Exercises


    1. Consider the differential form


    $$(3x^2y - 2y^3 + 1) \, dx + (x^3 - 6xy^2 + e^x) \, dy = 0.$$


    (a) Verify that the form is not exact on $\mathbb{R}^2$.


    (b) Show that the integrating factor $\mu(y) = y^{-3}$ makes it exact on the punctured
    plane $y \neq 0$.


    (c) Obtain an implicit solution $F(x, y) = C$ and find the unique explicit solution
    that satisfies $y(1) = 1$.


    2. Study the population model


