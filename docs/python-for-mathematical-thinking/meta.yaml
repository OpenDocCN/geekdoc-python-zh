    \ stage minimises bias, preserves variance, and guards against spurious correlations,\
    \ laying a stable groundwork for subsequent inference.\n\n### Using Pandas for\
    \ Data Cleaning\n\nLet the raw table be a matrix $X \\in \\mathbb{R}^{n \\times\
    \ p}$ indexed by $i = 1, \\ldots, n$ observations and $j = 1, \\ldots, p$ attributes.\
    \ pandas abstracts $X$ as a DataFrame $\\mathcal{D}$, augmenting numerical entries\
    \ by heterogeneous types (timestamps, categories, objects).\n\n```python\nimport\
