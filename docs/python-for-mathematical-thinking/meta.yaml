    ## Association Rule Mining: Apriori and FP-Growth


    ### Transaction Database


    Let $\mathcal{T} = \{T_1, \dots, T_N\}$ with items from $\mathcal{I}$. Support
    $\text{supp}(A) = \frac{1}{N} |\{T : A \subseteq T\}|$.

    Rule $A \Rightarrow B$ ($A \cap B = \emptyset$) has confidence $\text{conf}(A
    \Rightarrow B) = \frac{\text{supp}(A \cup B)}{\text{supp}(A)}$ and lift $\text{lift}
    = \frac{\text{conf}}{\text{supp}(B)}$.


    ### Apriori Principle


    If itemset $A$ is frequent ($\text{supp} \geq \sigma$), all subsets are frequent.
    Level-wise breadth-first search generates $k$-item candidates from $(k-1)$-frequent
    sets; prune those with infrequent subsets; scan database to count supports. Complexity
    $O(|\mathcal{I}|^k)$ in worst case; reduces drastically under large $\sigma$.


    ### FP-Growth


    Compress database into FP-tree: sort items in each transaction by global frequency;
    insert path, increment counters. Mine tree recursively: conditional pattern base
    of suffix item $i$ forms subtree; avoids candidate explosion and needs two passes.


    ```python

    from mlxtend.frequent_patterns import apriori, association_rules

    df_bin = df_basket.astype(bool).astype(int) # one-hot transactions

    freq = apriori(df_bin, min_support=0.03, use_colnames=True)

    rules = association_rules(freq, metric="confidence", min_threshold=0.6)

    rules = rules[rules[''lift'']>1.2].sort_values(''lift'', ascending=False)

    ```


    ## 10.2.3 Reinforcement Learning


    Reinforcement learning (RL) formalises sequential decision-making as a *feedback
    control* problem under uncertainty. An agent repeatedly observes the environment,
    chooses an action, receives a numerical reward, and transitions to a new state;
    its objective is to maximise long-run return. Unlike supervised learning, the
    data distribution is *policy-dependent*, requiring exploration versus exploitation
    trade-offs, and delayed consequences couple decisions across time.


    ### Markov Decision Processes (MDPs)


    An **MDP** is the quintuple $\mathcal{M} = (\mathcal{S}, \mathcal{A}, P, R, \gamma)$
    where


    - $\mathcal{S}$ is finite (or countable) state space

    - $\mathcal{A}$ is finite action set

    - $P(s''|s, a) = \Pr(S_{t+1} = s'' \mid S_t = s, A_t = a)$ is transition kernel

    - $R(s, a) = \mathbb{E}[r_t \mid S_t = s, A_t = a]$ is expected one-step reward

    - $\gamma \in [0, 1)$ is discount factor


    For policy $\pi : \mathcal{S} \to \Delta(\mathcal{A})$ define *value function*


    $$V^{\pi}(s) = \mathbb{E}_{\pi}\left[\sum_{t=0}^{\infty} \gamma^t r_t \mid S_0
    = s\right],$$


    and action-value (Q-value) $Q^{\pi}(s, a) = R(s, a) + \gamma \sum_{s''} P(s''|s,
    a) V^{\pi}(s'')$. Bellman expectation equation:


    $$V^{\pi} = T^{\pi} V^{\pi}, \quad T^{\pi} f(s) = \sum_{a} \pi(a|s)\left[R(s,
    a) + \gamma \sum_{s''} P_{sas''} f(s'')\right].$$


    Optimal value satisfies Bellman *optimality operator*


    $$V^*(s) = \max_{a} \left[R(s, a) + \gamma \sum_{s''} P_{sas''} V^*(s'')\right],$$


    with greedy optimal policy $\pi^*(s) = \arg\max_a Q^*(s, a)$.


    ### Dynamic Programming


    Value iteration: $V_{k+1} = T^* V_k$, contracts in $\ell_\infty$ norm with modulus
    $\gamma$, hence $V_k \to V^*$ geometrically.


    ### Q-Learning and Deep Q-Networks (DQN)


    Tabular Q-Learning (Watkins and Dayan 1992)


    Online update


    $Q_{t+1}(s_t, a_t) \leftarrow Q_t(s_t, a_t) + \alpha_t \left[ r_t + \gamma \max_{a''}
    Q_t(s_{t+1}, a'') - Q_t(s_t, a_t) \right]$


    converges to $Q^*$ w.p.1 if $\sum \alpha_t = \infty$, $\sum \alpha_t^2 < \infty$
    and all state–action pairs are visited infinitely often (GLIE). Exploration via
    $\epsilon$-greedy: choose random action w.p. $\epsilon$, greedy otherwise.


    Function Approximation: Deep Q-Network (Mnih et al. 2015)


    Parameterise $Q_\theta(s, a)$ by neural network; minimise *temporal-difference
    loss*


    $\mathcal{L}(\theta) = \mathbb{E}_{(s,a,r,s'') \sim \mathcal{D}} \left[ \left(
    r + \gamma \max_{a''} Q_{\theta^-}(s'', a'') - Q_\theta(s, a) \right)^2 \right]$


    with target network parameters $\theta^-$ updated periodically. Replay buffer
    $\mathcal{D}$ of size $N$ breaks correlation, enabling stochastic-gradient descent.
    Double DQN mitigates overestimation by using online network for argmax and target
    network for evaluation.


    ### Policy Gradient Methods and Actor–Critic Algorithms


    Stochastic Policy $\pi_\theta(a|s)$


    Objective $J(\theta) = \mathbb{E}_{\pi_\theta}[G_0]$ where $G_0 = \sum_t \gamma^t
    r_t$. **Policy gradient theorem**


    $\nabla_\theta J(\theta) = \mathbb{E}_{\pi_\theta} \left[ \nabla_\theta \log \pi_\theta(A_t|S_t)
    Q^{\pi_\theta}(S_t, A_t) \right]$


    REINFORCE uses Monte Carlo return $G_t$; variance reduction via baseline $b(s)$:


    $\nabla J = \mathbb{E} \left[ \nabla \log \pi(A|S)(G_t - b(S_t)) \right]$


    Actor–Critic


    *Actor* updates policy parameters; *critic* estimates value. TD($\lambda$) critic
    update for parameters $w$: $\delta_t = r_t + \gamma V_w(S_{t+1}) - V_w(S_t)$,
    $w \leftarrow w + \beta \delta_t \nabla_w V_w(S_t)$. Actor update: $\theta \leftarrow
    \theta + \alpha \delta_t \nabla_\theta \log \pi_\theta(A_t|S_t)$.


    ### Advantage Actor–Critic (A2C)


    Replace $\delta_t$ by advantage $A_t = Q_w(S_t, A_t) - V_w(S_t)$. Generalised
    advantage estimation (GAE) blends multi-step returns: $\hat{A}_t^\lambda = \sum_{k=0}^\infty
    (\gamma\lambda)^k \delta_{t+k}$.


    ### Soft Actor–Critic (SAC)


    Maximises entropy-regularised objective


    $J(\pi) = \sum_t \mathbb{E}_{\pi}[r(S_t, A_t) + \alpha \mathcal{H}(\pi(\cdot|S_t))]$


    leading to off-policy updates with target Q networks and automatic temperature
    tuning.


    ### Applications of Reinforcement Learning in Game AI and Robotics


    #### Game AI


    - **Atari 2600.** Deep Q-Networks achieve human-level score on 57 games, input
    raw pixel stacks $84 \times 84 \times 4$.

    - **AlphaZero.** Combines Monte Carlo tree search with a policy-value network;
    self-play reinforcement minimises cross-entropy + value loss.

    - **OpenAI Five.** Uses PPO (clip surrogate) and LSTM policy for partial observability;
    multi-agent credit assignment via *reward-shaping*.


    #### Robotics


    - **Sim-to-Real Transfer.** Domain randomisation trains SAC/DDPG in simulation
    with stochastic textures and physics; deploys to real manipulators with minimal
    fine-tuning.

    - **Model-Based RL.** Learn probabilistic dynamics $p_\phi(\mathbf{s}_{t+1}|\mathbf{s}_t,
    \mathbf{a}_t)$; plan via model-predictive control (MPC) with trajectory sampling;
    PETS and Dreamer achieve minutes-level sample efficiency.

    - **Residual RL.** Combine classical controller $u_{\text{PID}}$ with learned
    residual $\Delta u_\theta$, improving agility while preserving stability margins.


    ## 10.3 Deep Learning


    A *deep neural network* composes a finite sequence of nonlinear affine maps, $f_{\Theta}
    = f^{(L)} \circ \cdots \circ f^{(1)}$, $f^{(\ell)}(\mathbf{z}) = \phi(W_{\ell}\mathbf{z}
    + \mathbf{b}_{\ell})$, to approximate an unknown target function on $\mathbb{R}^p$.
    Universal approximation theorems guarantee that sufficiently large networks can
    approximate any continuous function on compact sets to arbitrary precision; the
    practical art lies in selecting architectures $\Theta = \{W_{\ell}, \mathbf{b}_{\ell}\}_{\ell=1}^L$
    and algorithms that converge within computational budgets while generalising beyond
    the training sample.


    ### 10.3.1 Mathematical Foundations of Neural Networks


    #### Perceptrons, Activation Functions, and Backpropagation


    A single-layer perceptron computes


    $\hat{y} = \phi(\mathbf{w}^\top \mathbf{x} + b), \quad \phi : \mathbb{R} \to \mathbb{R}.$


    For linearly separable binary data $\{(\mathbf{x}_i, y_i)\}$, Rosenblatt''s update
    $\mathbf{w} \leftarrow \mathbf{w} + \eta(y_i - \hat{y}_i)\mathbf{x}_i$ converges
    in finite steps; however, non-convex targets motivate multilayer perceptrons (MLPs).


    **Activation Design** Common $\phi$:


    $\text{sigmoid}(z) = \frac{1}{1 + e^{-z}}, \quad \tanh z = \frac{e^z - e^{-z}}{e^z
    + e^{-z}}, \quad \text{ReLU}(z) = \max(0, z).$


    ReLU mitigates vanishing gradients by piecewise linearity; its subgradient $\partial
    \text{ReLU}(z) = \mathbf{1}_{z>0}$ almost everywhere suffices for stochastic gradient
    descent (SGD).


    **Backpropagation** Define layer outputs $\mathbf{a}^{(0)} = \mathbf{x}$, $\mathbf{z}^{(\ell)}
    = W_{\ell}\mathbf{a}^{(\ell-1)} + \mathbf{b}_{\ell}$, $\mathbf{a}^{(\ell)} = \phi(\mathbf{z}^{(\ell)})$.
    Given loss $L(\hat{\mathbf{y}}, \mathbf{y})$, backward pass:


    $\delta^{(L)} = \nabla_{\hat{\mathbf{y}}} L \odot \phi''(\mathbf{z}^{(L)}), \quad
    \delta^{(\ell)} = (W_{\ell+1}^\top \delta^{(\ell+1)}) \odot \phi''(\mathbf{z}^{(\ell)}),$


    $\frac{\partial L}{\partial W_{\ell}} = \delta^{(\ell)} \mathbf{a}^{(\ell-1)\top},
    \quad \frac{\partial L}{\partial \mathbf{b}_{\ell}} = \delta^{(\ell)}.$'
