  md: "# Round-Off Errors and Machine Precision\n\nFloating-point numbers follow the\
    \ IEEE-754 representation\n\n$x = (-1)^s (1.m_1 m_2 \\dots m_{p-1})_2 2^{e-e_0}$\n\
    \nwhere the unit round-off $\\varepsilon = 2^{-(p-1)}$ bounds relative error:\n\
    \n$\\mathrm{fl}(x \\circ y) = (x \\circ y)(1 + \\delta), \\quad |\\delta| \\le\
    \ \\varepsilon,$\n\nfor $\\circ \\in \\{+, -, \\times, \\div\\}$. *Catastrophic\
    \ cancellation* occurs when subtracting nearly equal numbers: the leading significant\
    \ bits annihilate, magnifying $\\varepsilon$ by the ratio of operands to their\
    \ difference. A classic manifestation is quadratic-formula evaluation:\n\n$x_2\
    \ = \\frac{2c}{-b - \\mathrm{sign}(b)\\sqrt{b^2 - 4ac}}$\n\nmaintains relative\
    \ accuracy even when $b^2 \\gg 4ac$.\n\n# Example 8.5.5 (Loss of Significance)\n\
    \n```\nimport numpy as np\ndef bad_erf(x):\n    return 2/np.sqrt(np.pi) * (x -\
    \ x**3/3 + x**5/10)\nprint(bad_erf(1e-8)) # underflows to zero\n```\n\nExpanding\
    \ erf about zero while evaluating at $x = 10^{-8}$ forces each term below double-precision\
    \ granularity; using `math.erf` or scaled Dawson integrals avoids the pitfall.\n\
    \n# Stability in Numerical Algorithms\n\nAn algorithm $\\mathcal{A}$ is *backward-stable*\
    \ if its output equals the exact solution to a nearby problem:\n\n$\\widehat{y}\
    \ = \\mathcal{A}(x) = f(x + \\Delta x), \\quad \\frac{\\|\\Delta x\\|}{\\|x\\\
    |} = O(\\varepsilon).$\n\nGaussian elimination with partial pivoting satisfies\
    \ this; naive summation of a long vector does not. The *condition number* $\\\
    kappa(x) = \\|x\\| \\|f'(x)\\| / \\|f(x)\\|$ couples with stability to bound forward\
    \ error:\n\n$\\frac{\\|\\widehat{y} - y\\|}{\\|y\\|} \\le \\kappa(x) \\underbrace{\\\
    frac{\\|\\Delta x\\|}{\\|x\\|}}_{\\text{backward error}}$"
