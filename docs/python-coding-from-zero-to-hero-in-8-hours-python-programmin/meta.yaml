    +   02. split(separator)

    +   03. capitalize()

    +   04. str.zfill(length)

    +   05. [^0-9]


    # Chapter 6


    ## Format Value


    A value can be formatted before outputted, then the output result will be a specified
    value that has been formatted.


    The syntax to a format value is:


    ```

    ("......%formatted" %original)

    ```


    The %original value is the same as %formatted value, but


    - "original" is a primitive value.

    - "formatted" is a formatted value.


    The outputted value can be formatted by these specifiers:


    | 符号 | 类型说明 |

    |------|----------|

    | %d   | digit integer |

    | %f   | float |

    | %s   | string |

    | %o   | octal value |

    | %x   | hexadecimal value |

    | %e   | exponential |


    # Example 6.1


    ```

    num = 100

    print ("String value is: %s" %num)   # string format

    print ("Float value is: %.3f" %num)  # three decimal places

    print ("Exponential value is: %e" %num)  # exponential format

    print ("Octal value is: %o" %num)    # octal format

    print ("Hexadecimal value is: %x" %num)  # hexadecimal

    print ("Integer value is: %d" %num)  # digit format

    ```


    # Output:


    String value is: 100

    Float value is: 100.000

    Exponential value is: 1.000000e+02

    Octal value is: 144

    Hexadecimal value is: 64

    Integer value is: 100


    ## Explanation:


    In ("......%yyy" %xxx),


    %xxx is a primitive value.


    %yyy is a formatted value.


    ## File Directory


    To handle the file directory, we need to import an os module.


    The syntax to handle the file directory is:


    ```python

    path = os.getcwd()  # return the current working directory


    os.listdir(path)    # list anything in the current directory


    os.chdir(path)      # change path as the current directory


    os.getcwd()         # return the current working directory

    ```


    ### Example 6.2


    ```python

    import os


    print(os.getcwd())  # return the current working directory


    path = os.getcwd()

    print (os.listdir(path)) # return files and subdirectories

    ```


    # Output:


    C:\Python35

    [''DLLs'', ''Doc'', ''include'', ''Lib'', ''libs'', ''LICENSE.txt'', ''myFile.txt'',
    ''NEWS.txt'', ''python.exe'', ''pythonw.exe'', ......]


    # Explanation:


    "os.listdir(path)" returns all files and subdirectories in the current directory.


    ## Open File


    The syntax to open a file is as follows:


    ```

    open(filename, "argument")

    ```


    The arguments are listed as follows:


    | arguments | actions |

    |------------|----------|

    | r | open file for reading (default) |

    | w | open file for writing |

    | a | open file for appending |

    | + | open file for reading & writing |

    | b | open file in binary mode |

    | t | open file in text mode |


    We will study how to use "open()" function in the subsequent several pages.


    # File Name


    The syntax to open a file and get the file name is:


    ```

    f = open("fileName")   # open a file, define a file object

    f.name   # get the file name

    ```


    # Example 6.3


    Assume that there is a file "myFile.txt" in the D: disk.

    The content of "D:\myFile.txt" is:

    "Hallo ! This is D : \myFile . txt . Welcome ! "


    ```

    f = open("D:\myFile.txt")   # open D:\myFile.txt

    print(f.name)   # print the filename

    ```


    # Output:


    D:\myFile.txt


    # Explanation:


    "f = open("D:\myFile.txt")" opens D:\myFile.txt, and defines a file object "f".


    "f.name" returns the path and file name.


    ## Read file


    The syntax to read a file is:


    ```

    f = open("fileName", "r")  # open a file with "r" mode

    f.read()  # read the contents of the file

    ```


    ### Example 6.4


    Assume that the content of "D:\myFile.txt" is:

    "Hallo ! This is D : \myFile . txt . Welcome ! "


    ```

    f = open("D:\myFile.txt", "r")  # use "r" mode

    print(f.name)  # return the filename

    print(f.read())  # read the contents of the file

    f.close()  # close file

    ```


    ### Output:


    D:\myFile.txt


    Hello! This is D:\myFile.txt. Welcome!


    ## Explanation:


    f = open("D:\myFile.txt", "r")

    f.read()" reads the contents of the file.


    ## Write File


    The syntax to write a file is:


    ```

    f = open("fileName", "w")   # open the file with "w" mode

    f.write( "text" )   # write text to the file

    ```


    # Example 6.5


    ```

    f = open("D:\myFile.txt", "w")   # use "w" mode

    print (f.name)   # return the filename

    f.write("I write something to the file.")   # write the file

    f.close()   # close file

    ```


    # Output:


    D:\myFile.txt

    ( Please check the file "D:\myFile.txt", you can see the contents:

    "I write something to the file.").


    # Explanation:


    "f = open("D:\myFile.txt", "w")" opens a file with "w" mode for writing the file.


    "f.write("I write something to the file.")" writes new content to the file, and
    removes original content.


    ## Append Content to File


    The syntax to append content to a file is:


    ```

    f = open("fileName", "a")   # open a file with "a" mode

    f.write( "text" )   # append content to the file

    ```


    Example 6.6


    ```

    f = open("D:\myFile.txt", "a")   # use "a" mode

    print (f.name)   # print the filename

    f.write(" This is the appended text.")   # append content

    f.close()

    ```


    Output:


    D:\myFile.txt

    ( Please check D:\myFile.txt, you can see the content as follows:

    I write something to the file. This is the appended text.)


    # Explanation:


    open("D:\myFile.txt", "a") uses "a" mode to open the file for appending new content
    to the end of the original text.


    "a" mode can keep the original text.


    ## Read the Contents


    ```python

    f = open("fileName", "r+")  # use "r+" mode for reading & writing

    print(f.read())  # read and print the content of the file

    ```


    ### Example 6.7


    Assume that the contents of D:\myFile.txt are: "I write something to the file.
    This is the appended text".


    ```python

    f = open("D:\myFile.txt", "r+")  # use "r+" mode

    print(f.name)  # print the filename

    print(f.read())  # read and print the contents of D:\myFile.txt

    f.close()  # close file

    ```


    ### Output:


    D:\myFile.txt


    I write something to the file. This is the appended text.


    # Explanation:


    "open("D:\myFile.txt", "r+")" uses "r+" mode for reading & writing.


    "print (f.read())" reads and prints the contents of the file.


    ## Open Web Page


    Python programming can open a web page.


    ```python

    import webbrowser  # import webbrowser


    webbrowser.open("URL")  # open a specified web page

    ```


    The above codes are very useful for accessing to a website.


    ### Example 6.8


    ```python

    import webbrowser


    url = "http://www.amazon.com"


    webbrowser.open(url)


    print ("You are visiting "+ url)

    ```


    ### Output:


    You are visiting http://www.amazon.com


    ( You can see Amazon home page appearing in a few seconds. )


    # Explanation:


    "webbrowser.open(url)" opens a specified web page.


    ## Hands-on Project : Process a File


    ### Write & Read File


    Please click "Start > Programs > Python3.5 > IDLE (Python 3.5)".


    Input the following code to the IDLE editor:


    ```python

    f = open("D:\\ourFile.txt", "w")  # open ourFile with "w" mode

    f.write("I am learning Python programming!")

    f.close()

    f = open("D:\\ourFile.txt", "r")  # open ourFile with "r" mode

    print (f.read())

    f.close()

    ```


    Save the file, and run the program by pressing **F5** key.


    # Output:


    I am learning Python programming!


    # Explanation:


    "open(\"D:\\ourFile.txt\", \"w\")" opens D:\ourFile.txt in "w" mode.

    "w" mode opens a file for writing.

    "f.write(\"I am learning Python programming!\")" writes the specified content
    to file object "f".

    "f = open(\"D:\\ourFile.txt\", \"r\")" opens D:\ourFile.txt in "r" mode.

    f.read() reads the content in file object "f".'
