  md: '# # Variables


    A "variable" is a container that stores a data value. The variable value may change
    when the program is running.


    The syntax to define variable is as follows:


    ```


    variableName = value


    variableName1 = variableName2 = value


    variableName1, variableName2 = value1, value2

    ```


    "variableName" is a variable name.


    # ## Example 1.3


    ```


    var = 100


    var1 = var2 = var3 = 100


    var1, var2, var3 = 100, 200, 300

    ```


    # ### Explanation:'
  merge: -1
  pgno: 34
- img_proc: true
  md: '"var = 100" defines a variable named "var", whose value is 100.


    "var1 = var2 = var3 = 100" assigns "100" to "var1", var2", "var3".


    "var1, var2, var3 = 100, 200, 300" respectively assigns the three values "100,
    200, 300" to "var1", var2", "var3".'
  merge: -1
