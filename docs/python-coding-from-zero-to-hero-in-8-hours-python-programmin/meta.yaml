    如果你想导入指定的函数 \"c\" 和 \"e\"，你应该使用这样的代码：\"**from support import c, e**\"。\n\n## 内置模块\n\
    \nPython 提供了许多内置模块供导入，例如 math 模块（用于数学运算）、cgi 模块（用于脚本）、datetime 模块（用于日期和时间）以及 re\
    \ 模块（用于正则表达式）......\n\n### 示例 7.4\n\n```python\nimport math\nfrom datetime import\
    \ *\n# 将所有 datetime 模块成员导入当前文件\n\nprint(math.sqrt(100))    # 获取 100 的平方根\n\nd\
    \ = datetime.today()    # 获取当前日期\nprint(d)\n```\n\n### 输出：\n\n10.0\n\n2016-02-21\
    \ 23:20:29.818000\n\n### 解释：\n\n\"import math\" 导入内置模块 \"math\"。\n\n\"from datetime\
    \ import *\" 导入所有 \"datetime\" 模块成员。\n\n## 异常\n\n当异常发生且未被程序本身捕获时，Python 会立即终止程序并输出\
    \ \"traceback\"，显示错误信息。\n\n### 示例 7.5\n\n```python\n100 / 0   # 发生异常！\n```\n\n\
    ### 输出：\n\n```\nTraceback (most recent call last):\n  File \"C:/Python35/exception.py\"\
    , line 1, in <module>\n    100/0\nZeroDivisionError: integer division or modulo\
    \ by zero.\n```\n\n### 解释：\n\n\"Traceback......\" 是异常信息。\n\n异常信息可能因不同原因而异。其他错误可能是\
    \ \"SyntaxError\"、\"IOError\" 和 \"ValueError\"......\n\n## 捕获异常\n\ntry...except...\
    \ 的语法是：\n\n```python\ntry:\n    ......\nexcept XxxError as message:\n    ......\n\
    ```\n\n\"try 块\" 包含可能导致异常的代码。\n\n\"except 块\" 捕获并处理异常。\n\n### 示例 7.6\n\n```python\n\
    try:\n    int(\"ten\")  # \"ten\" 是一个字符串，无法转换为 int\nexcept ValueError as message:\n\
    \    print(\"Exception occurs!\", message)\n```\n\n### 输出：\n\n```python\n('Exception\
