    import module  # 将模块导入当前文件\n\nmoduleName.function()  # 调用模块文件中的函数\n```\n\n模块文件应与主文件放在同一目录中。函数将通过模块名称进行调用。\n\
    \n### 示例 7.2\n\n```python\nimport support  # 导入模块 \"support.py\"\n\nsupport.a()\
    \  # 调用 support.py 中的函数 \"a\"\n\nsupport.d()  # 调用 support.py 中的函数 \"d\"\n```\n\
