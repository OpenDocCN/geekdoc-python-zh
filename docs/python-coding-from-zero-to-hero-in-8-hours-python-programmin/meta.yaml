    \ 三引号 ““ ””\n- 04. >>>\n- 05. //\n\n## 第2章\n\n## If 语句\n\n`\"if 语句\"` 仅在指定条件为真时执行语句，如果条件为假则不执行任何语句。\n\
    \nIf 语句的语法是：\n\n```python\nif test-expression:\n    statements\n```\n\n### 示例\
