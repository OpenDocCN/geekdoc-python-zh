    \ and 150\")\nelse:\n    print(\"num is greater than 150\")\n```\n\n**输出：**\n\n\
    num is greater than 150\n\n**解释：**\n\n`\"elif\"` 是 `\"else if\"` 的缩写。\n\n## For-In\
    \ 循环\n\nfor-in 循环根据指定的次数重复执行给定的代码块。\n\n```python\nfor <variable> in <sequence>:\n\
    \    <statements>\n```\n\n`\"variable\"` 存储每个项目的值。\n\n`\"sequence\"` 可以是字符串、集合或\
    \ `range()`，后者表示循环的次数。\n\n## 示例 2.4\n\n```python\nfor str in 'good':  # 遍历这4个字符\n\
