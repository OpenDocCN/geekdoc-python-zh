    # Conditional Operator


    The syntax of conditional operator is as follows:


    ```

    (if-true-do-this) **if** (test-expression) **else** (if-false-do-this)

    ```


    ( test-expression) looks like a<b, x!=y, m==n. etc.


    Note:

    The syntax of the conditional operator in Python is different from the " ? : "
    ternary operator in C++ or Java.


    # Example 1.11


    ```

    x = 100

    y = 200

    result = "apple" **if** ( x < y ) **else** "banana"

    print ( result )    # (x<y) is x test-expression

    ```


    # Output:'
  - '[PAGE 52]


    apple


    # Explanation:


    The conditional operator uses (x<y) to test the "x" and "y", because "x" is less
    than "y", it returns true. Therefore, the output is "apple".'
