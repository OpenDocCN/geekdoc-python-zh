    ## Chapter 1


    ## What is Python?


    Python is a general-purpose, object-oriented and open source computer programming
    language, it is a high-level, human-readable and a corresponding set of software
    tools and libraries.


    **Python features:**


    - Python is an interpreted language

    - Python is an interactive language

    - Python is an object-oriented language

    - Python is a beginner''s language


    **Python can do:**


    - Web development

    - Data analysis

    - Artificial intelligence

    - Machine Learning

    - Data visualization

    - Scripts that automatically execute tasks

    ......


    ## Download & Install Python


    ### Download Python


    Python installer is available for free download:

    https://www.python.org/downloads/


    ### Install Python


    When the download finishes, please run the installer by double-clicking it, and
    install Python to your local computer.

    For example: at **C:\Python35**. Click "Next".


    # Select Destination Directory


    Please select a directory for the Python 3.5.1 files.


    C:\Python35


    Make sure to select the option "Add Python.exe to Path".


    ![](img/2564b41d602fc30374470cb8c2489de4_22_0.png)


    Please complete the installation of Python.


    # Run & Setup Python Editor


    After the installation, you need to set up the Python editor.


    Please click "Start > Programs > Python3.5 > IDLE (Python 3.5)".


    Let us set up the Python Editor.


    ## Configure Editor


    There are two edit windows to run the Python code. You can select one of them
    as your editor.


    ### Set "Open Edit Window"


    In order to run the whole Python program instead of line by line, or you want
    to easily copy or paste whole program code, you need to configure the Python editor.


    1. Click "Start > Programs > Python3.5 > IDLE (Python 3.5)".

    2. Click "Option > Configure IDLE > General > Open Edit Window" > OK.'
