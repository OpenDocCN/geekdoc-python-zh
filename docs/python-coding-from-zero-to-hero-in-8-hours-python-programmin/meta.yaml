    ## for variable in range()\n\n`\"for\" variable in range()` 可以生成一个序列数字。\n\n```python\n\
    for var in range(n)\nfor var in range(n1, n2)\n```\n\n`range(n)` 生成一个从 0 到 n-1\
    \ 的序列。\n\n`range(n1, n2)` 生成一个从 n1 到 n2-1 的序列。\n\n## 示例 2.5\n\n- (1)\n```python\n\
    for var in range(6):  # 遍历从 0 到 5\n    print(var)\n```\n输出：0,1,2,3,4,5.\n\n- (2)\n\
    ```python\nfor num in range(3, 10):  # 遍历从 3 到 9\n    print(num)\n```\n\n**输出：**\
    \ 3,4,5,6,7,8,9.\n\n**解释：** for variable in range() 可以生成一个序列数字。\n\n## While 循环\n\
    \n`\"while\"` 循环用于重复运行一段代码块。\n\nwhile 循环的语法是：\n\n```python\nwhile <test-expression>:\n\
    \    <statement>\n```\n\n`<test-expression>` 类似于 `a<100`, `b!=200`, `c==d` 等。\n\
    \n### 示例 2.6\n\n```python\nn = 0\nwhile n < 9:  # 从 0 循环到 8\n    print(n)\n  \
    \  n = n + 1\n```\n\n### 输出：\n\n012345678\n\n### 解释：\n\n`\"n < 9\"` 测试 `\"n\"\
    ` 的值，如果 `\"n\"` 小于9，`\"while\"` 循环将执行 `\"print(n)\"`，并继续运行下一次循环。直到 `\"n\"` 大于或等于9，`\"\
    while\"` 循环才会终止。\n\n`\"n = n + 1\"` 在每次循环中将 n 加1。\n\n## Continue\n\n`\"continue\"\
