    \ absolute value of n |\n| round(n) | round off a floating number n |\n| ceil(n)\
    \ | ceiling of n |\n| floor(n) | flooring of n |\n| max(n, m) | largest of n and\
    \ m |\n| min(n, m) | smallest of n and m |\n| degrees(n) | convert n from radians\
    \ to degrees |\n| log(n) | base e logarithm of n |\n| log(n, m) | base m logarithm\
    \ of n |\n| pow(n, m) | n to the power of m |\n| sqrt(n) | square root of n |\n\
    | sin(n) | sine of n |\n| cos(n) | cosine of n |\n| tan(n) | tangent of x |\n\n\
    ### List Functions\n\n| Functions | Operation |\n|---|---|\n| list.append(n) |\
    \ Append n to the end of list |\n| list.count(n) | Count how many n |\n| list.index(n)\
    \ | Return the index of n |\n| list.insert(i,n) | Insert n before index i |\n\
    | list.pop(i) | Remove & return the item at index i |\n| list.remove(n) | Remove\
    \ the n |\n| list.reverse() | Reverse the sequence of list |\n| list.sort() |\
    \ Sort the element of list increasingly |\n| list.extend(lst) | Append each item\
    \ of lst to list |\n\n### Tuple Functions\n\n| Functions | Operation |\n|-----------|------------|\n\
    | x in tpl | return true if x is in the tuple |\n| len(tpl) | return the length\
    \ of the tuple |\n| tpl.count(x) | count how many x in tuple |\n| tpl.index(x)\
    \ | return the index of x |\n\n### Set Functions\n\n| Functions | Operation |\n\
    |-----------|------------|\n| set.add(n) | Add x to the set |\n| set.update(a,\
    \ b, c) | Add a, b, c to the set |\n| set.copy() | Copy the set |\n| set.remove(n)\
    \ | Remove the item n |\n| set.pop() | Remove one random item |\n| set1.intersection(set2)\
    \ | Return items in both sets |\n| set1.difference(set2) | Return items in set1\
