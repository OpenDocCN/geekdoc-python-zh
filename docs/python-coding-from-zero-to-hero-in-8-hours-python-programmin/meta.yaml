    f.close()

    ```


    保存文件，然后按 **F5** 键运行程序。


    # 输出：


    I am learning Python programming!


    # 解释：


    "open(\"D:\\ourFile.txt\", \"w\")" 以 "w" 模式打开 D:\ourFile.txt。

    "w" 模式用于打开文件进行写入。

    "f.write(\"I am learning Python programming!\")" 将指定内容写入文件对象 "f"。

    "f = open(\"D:\\ourFile.txt\", \"r\")" 以 "r" 模式打开 D:\ourFile.txt。

    f.read() 读取文件对象 "f" 中的内容。'
