    ## Set "Open Shell Window"


    The "Open Shell Window" runs the Python code line by line, and executes the one
    line code by pressing **Enter** key.


    1. Click "Start > Programs > Python3.5 > IDLE (Python 3.5)".

    2. Click "Option > Configure IDLE > General > Open Shell Window" > OK.


    ![](img/2564b41d602fc30374470cb8c2489de4_26_0.png)


    3. Restart the Python editor, you can see the command prompt ">>>", which means
    that you are in the Shell Window of Python. The ">>>" is the command prompt to
    input Python code.


    ## First Python Code


    Let''s use "Shell Window" to run the Python code first.


    The syntax to print the output is:


    ```

    print()

    ```


    "print()" is used to print the output to the screen.


    ### Example 1.1


    ```

    >>> print("Hello World!")

    ```


    Output: Hello World!


    ### Example 1.2


    ```

    >>> print("Python is a very good language!")

    ```


    Output: Python is a very good language!


    ```

    >>> print("Learn Python in 8 Hours!")

    ```


    Output: Learn Python in 8 hours.


    ### Explanation:


    ">>>" is a Python command prompt.


    "print()" displays the result.


    ## The Shell Prompt


    ```

    >>>

    ```


    ">>>" is the shell prompt for Python interactive command, requests the input from
    the user.


    ### For example:


    ```

    >>> 10 + 8

    18

    >>> 100 - 2

    98

    >>> " Hello " + " World! "

    ''Hello World!''

    >>> " Very Good! " * 3

    ''Very Good! Very Good! Very Good!''

    ```


    ### Explanation:


    ">>>" prompts that you can input data, and press Enter. The lines without >>>
    are responded message by Python.


    ### For example:


    ```

    >>> 100 * 2

    200

    >>> 72 / 9

    8

    >>> ( 2 + 3 ) * 4

    20

    >>> 10 % 3

    1

    >>> 2 ** 3

    8

    ```


    ### Explanation:


    | Operator | Operation |

    | :--- | :--- |

    | * | multiplication |

    | / | division |

    | % | remainder |

    | ** | exponentiation |


    ### Note:


    Now, please set the Python editor to "**Open Edit Window**", we are going to run
    the whole program instead of the single code line by line.


    ## Variables


    A "variable" is a container that stores a data value. The variable value may change
    when the program is running.


    The syntax to define variable is as follows:


    ```

    variableName = value


    variableName1 = variableName2 = value


    variableName1, variableName2 = value1, value2

    ```


    "variableName" is a variable name.


    ### Example 1.3


    ```

    var = 100


    var1 = var2 = var3 = 100


    var1, var2, var3 = 100, 200, 300

    ```


    ### Explanation:


    "var = 100" defines a variable named "var", whose value is 100.


    "var1 = var2 = var3 = 100" assigns "100" to "var1", "var2", "var3".


    "var1, var2, var3 = 100, 200, 300" respectively assigns the three values "100,
    200, 300" to "var1", "var2", "var3".


    ## Comment


    Comment is used to explain the code, makes the program more readable. Python compiler
    always ignores the comment.


    The syntax of the Python comment is:


    ```

    # comment

    ```


    "#" is a comment symbol in Python.


    ### Example 1.4


    ```

    var01 = 100

    print(var01)    # Output: 100

    ```


    ### Example 1.5


    ```

    var02 = "Python is very good!"

    print(var02)    # Output: Python is very good!

    ```


    ### Explanation:


    "print()" is used to display content.


    "#" is a symbol of comment, which is used to explain the code.


    "`# Output: 100`" is a comment.


    "`# Output: Python is very good!`" is a comment.


    ## Arithmetic Operator


    | Operator | Operation |

    | :--- | :--- |

    | + | Addition |

    | - | Subtraction |

    | * | Multiplication |

    | / | Division |

    | % | Remainder |

    | // | Integer Division |

    | ** | Exponentiation |


    ### Explanation:


    "%" modulus operator divides the first operand by the second operand, returns
    the remainder.


    "//" works like "/", but returns an integer.


    "**" returns the result of the first operand raised to the power of the second
    operand.


    ### Example 1.6


    ```

    a = 100 + 200

    b = 72/9

    c = 25 % 7

    d = 7 // 3    # integer divide

    e = 8 ** 2    # Exponentiation

    print(a, b, c, d, e)

    ```


    ### Output:


    300, 8, 4, 2, 64


    ### Explanation:


    "100 + 200" returns 300


    "72/9" returns 8


    "25 % 7" returns 4.


    "7 // 3" returns 2.


    "8 ** 2" returns 64.


    ## Assignment Operators


    "x += y" equals "x = x + y", please see the following chart:


    | Operators | Examples: | Equivalent: |

    | :--- | :--- | :--- |

    | += | x+=y | x=x+y |

    | -= | x-=y | x=x-y |

    | *= | x*=y | x=x*y |

    | /= | x/=y | x=x/y |

    | %= | x%=y | x=x%y |

    | //= | x//=y | x=x//y |

    | **= | x**=y | x=x**y |


    ### Example 1.7


    ```

    x=20

    y=2

    ```


    ```

    x /= y   # same as "x = x / y"


    print(x)

    ```


    ### Output:


    10.0


    ### Explanation:


    "x /= y" is the same as "x = x / y"


    ### Example 1.8


    ```

    m=100

    n=18

    m %= n   # same as "m = m % n"

    print (m)

    ```


    ### Output:


    10


    ### Explanation:


    "m %= n" is the same as "m = m % n".


    ## Comparison Operators


    | Operators | Running |

    | :--- | :--- |

    | > | greater than |

    | < | less than |

    | >= | greater than or equal |

    | <= | less than or equal |

    | == | equal |

    | != | not equal |


    The result of the comparison operation is true or false.


    ### Example 1.9


    ```

    a = 100

    b = 200

    result1 = ( a > b )

    print( result1 )

    ```


    ```

    result2 = ( a == b )

    print( result2 )

    result3 = ( a != b )

    print( result3 )

    ```


    ### Output:


    1. False

    2. False

    3. True


    ### Explanation:


    ```

    result = (a>b)   # test 100>200   outputs false.

    result = (a==b)  # test 100==200  outputs false.

    result = (a!=b)  # test 100!=200  outputs true.

    ```


    ## Logical Operators


    | Operators | Equivalent |

    | :--- | :--- |

    | and | logical AND |

    | or | logical OR |

    | not | logical NOT |


    The result of the logical operation is True or False.


    ### Example 1.10


    ```

    x = True

    y = False

    a = x and y

    print(a)

    b = x or y

    print(b)

    ```


    ```

    c = not x

    print(c)

    ```


    ### Output:


    False


    True


    False


    ### Explanation:


    | True and True returns True | True and False returns False | False and False
    returns False |

    | :--- | :--- | :--- |

    | True or True returns True | True or False returns True | False or False returns
    False |

    | not False returns True | not True returns False | |


    ## Conditional Operator


    The syntax of conditional operator is as follows:


    ```

    (if-true-do-this) if (test-expression) else (if-false-do-this)

    ```


    (test-expression) looks like a<b, x!=y, m==n. etc.


    Note:

    The syntax of the conditional operator in Python is different from the " ? : "
    ternary operator in C++ or Java.


    ### Example 1.11


    ```

    x = 100

    y = 200

    result = "apple" if ( x < y ) else "banana"

    print ( result )    # (x<y) is test-expression

    ```


    ### Output:


    apple


    ### Explanation:


    The conditional operator uses (x<y) to test the "x" and "y", because "x" is less
    than "y", it returns true. Therefore, the output is "apple".


    ## Convert Data Type


    | Function | Operation |

    | :--- | :--- |

    | int(x) | convert x to an integer number |

    | str(x) | convert x to a string |

    | chr(x) | convert x to a character |

    | float(x) | convert x to a floating point number |

    | hex(x) | convert x to a hexadecimal string |

    | oct(x) | convert x to an octal string |

    | round(x) | round a floating-point number x. |

    | type(x) | detect x data type |


    ### Example 1.12


    ```

    num1 = int(8.67)

    print(num1)  # returns 8

    num2 = round(8.67)

    print(num2)  # returns 9.0

    ```


    ```

    num3 = float(5)

    print(num3) # returns 5.0

    ```


    ### Explanation:


    "int(8.67), float(5)" converts 8.67 and 5 to integer and float types.


    "round(8.67)" rounds the floating-point number 8.67.


    ## Triple Quotes


    Triple Quotes are used to display multiple lines of text.


    ```

    """

    ```


    ### For example:


    ```

    multiString = """

    Python

    is a very

    good language!"""

    print (multiString)

    ```


    ### Output:


    Python

    is a very

    good language!


    ### Explanation:


    String inside triple quotes " ... " can span multiple lines of text.'
