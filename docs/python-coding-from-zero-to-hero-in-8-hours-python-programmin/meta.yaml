    # About This Book


    "Python Programming" is a textbook for high school and college students; it covers
    all essential Python language knowledge. You can learn complete primary skills
    of Python programming fast and easily.


    The textbook includes a lot of practical examples for beginners and includes exercises
    for the college final exam, the engineer certification exam, and the job interview
    exam.


    "Python Programming" is a useful textbook for beginners. The straightforward definitions,
    the plain examples, the elaborate explanations and the neat layout feature this
    helpful and educative book. You will be impressed by its distinctive and tidy
    writing style. Reading this book is a great enjoyment!


