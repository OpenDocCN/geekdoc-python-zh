- md: "## Overriding Method\n\nWhen a method name in the derived class is the same\
    \ as the method name in base class, but each method performs different tasks,\
    \ this is known as \"method overriding\".\nThe syntax of the method overriding\
    \ is:\n\n```\nclass BaseClass\n    def methodName():    # base method\n......\n\
    class DerivedClass(BaseClass):\n    def methodName():    # derived method\n......\n\
    ```\n\nBecause the derived method name is the same as the base method name, and\
    \ their arguments are the same too, the derived method will override the base\
    \ method, and executes the derived method instead of base method.\n\n## Example\
    \ 8.5\n\n```python\nclass Computer:    # define a base class\n    def __init__(self,\
    \ name):  # define a constructor\n        self.name = name\n    def capacity(self,\
    \ harddrive, memory):  # base method\n        self.harddrive = harddrive\n   \
    \     self.memory = memory\nclass Laptop(Computer):    # define a derived class\n\
    \    def capacity(self, harddrive, memory):  # derived method\n        print (self.name)\n\
    \        print (\"Harddrive capacity: \" + str(harddrive))\n        print (\"\
    Memory capacity: \"+ str(memory))\nL = Laptop(\"Laptop\")    # creates an object\
    \ \"L\"\nL.capacity( 8000, 6 )  # call the derived method capacity( )\n```\n\n\
    ### Output:\n\nLaptop\n\nHarddrive capacity: 8000\n\nMemory capacity: 6\n\n###\
    \ Explanation:\n\nL.capacity(8000, 6) calls the method capacity(), because the\
    \ derived method name is the same as the base method name, and their arguments\
    \ are the same too, the derived method overrides the base method, executes the\
    \ derived method instead of base method, and print out the result. \"Overriding\"\
    \ always happens between the base class and derived class.\n\n## Polymorphism\n\
    \nPolymorphism means that the different object executes different methods in different\
    \ classes, but all methods use the same name.\n\n### Example 8.6\n\n```python\n\
    class Dog:           # define a class\n    def cry(self):    # define a cry()\
    \ method\n        print (\"Dog cries: Wou! Wou!\")\nclass Cat:           # define\
    \ a class\n    def cry(self):    # define a cry() method\n        print (\"Cat\
    \ cries: Meo! Meo!\")\nd = Dog()    # create an object \"d\" of the Dog class\n\
    d.cry()\nc = Cat()    # create an object \"c\" of the Cat class\nc.cry()\n```\n\
    \n### Output:\n\nDog cries: Wou! Wou!\n\nCat cries: Meo! Meo!\n\n### Explanation:\n\
    \n\"d.cry()\" calls the cry() method in class Dog.\n\n\"c.cry()\" calls the cry()\
    \ method in class Cat.\n\n## Hands-on Project : Rose is Red\n\n### Class & Object\n\
    \nPlease click \"Start > Programs > Python3.5 > IDLE (Python 3.5)\".\n\nInput\
    \ the following code to the IDLE editor:\n\n```python\nclass Flower:    # define\
    \ a class\n    def __init__(self, name, color ):    # constructor\n        self.name\
    \ = name    # initialization\n        self.color = color\n\nf = Flower(\"rose\"\
    , \"red\")    # create an object\nprint (\"The flower's name is \" + f.name)\n\
    print (\"The flower's color is \" + f.color)\n```\n\nSave the file, and run the\
    \ program by pressing **F5** key.\n\n### Output:\n\nThe flower's name is rose\n\
    \nThe flower's color is red\n\n### Explanation:\n\n\"class Flower\" creates a\
    \ class \"Flower\".\n\n\"def __init__(self):\" defines a constructor.\n\nThe constructor\
    \ is used to initialize the variables.\n\n\"self\" is a variable that represents\
    \ the current object \"f\".\n\n\"f = Flower(\"rose\", \"red\")\" creates an object\
    \ \"f\", automatically calls def __init__(self, name, color ), and passes two\
    \ parameters \"rose, red\" to \"name, color\", initializes the variables \"name\"\
    \ and \"color\".\n\n\" f.name \" means that the object \"f\" references the \"\
    name\".\n\n\" f.color \" means that the object \"f\" references the \"color\"\
    .\n\n## Summary\n\n```python\nclass ClassName:    # define a class\n    classVariable\
    \ = value    # declare a class variable\n    def __init__(self):    # declare\
    \ a constructor,\n    def classMethod(self):    # define a class method\n```\n\
    \n```python\nobjectName = ClassName( args )    # create an object\n```\n\n```python\n\
    from anotherFile import*    # import anything from another file\nobj = className(args)\
    \    # create a new object\n```\n\nA base class can derive a new subclass. The\
    \ derived class inherits all members of the base class.\n\nThe syntax of inheritance\
    \ is:\n\n```python\nclass BaseClass:    # define a base class\n......\nclass DerivedClass\
    \ (BaseClass):    # define a derived class\n......\n```\n\nWhen a method name\
    \ in the derived class is the same as the method name in base class, but each\
    \ method performs different tasks, this is known as \"method overriding\".\nThe\
    \ syntax of method overriding is:\n\n```\nclass BaseClass\n    def methodName():\n\
    ......\nclass DerivedClass(BaseClass):\n    def methodName():    # override the\
    \ base method\n......\n```\n\nPolymorphism means that the different object performs\
    \ different method if a program has one more classes.\n\n## Chapter 8 Questions:\n\
    \n1. _____ defines a class\n2. _____ declares a constructor\n3. _____ defines\
    \ a class method\n4. _____ creates an object\n5. _____ defines a derived class\
    \ that inherits the base class\n\n### Answers:\n\n01.\nclass ClassName:\n\n02.\n\
    def __init__(self):\n\n03.\ndef classMethod(self):\n\n04.\nobjectName = ClassName(args)\n\
    \n05.\nclass DerivedClass(BaseClass):\n\n## Python Charts\n\n### Python Keywords\
    \ Chart\n\n| False | await | else | import | pass |\n| None | break | except |\
    \ in | raise |\n| True | class | finally | is | return |\n| and | continue | for\
    \ | lambda | try |\n| as | def | from | nonlocal | while |\n| assert | del | global\
    \ | not | with |\n| async | elif | if | or | yield |\n\n### Data Types Chart\n\
    \n| Data Types | Description |\n| --- | --- |\n| Numeric | holds numeric values\
    \ |\n| String | holds sequence of characters |\n| Sequence | holds collection\
