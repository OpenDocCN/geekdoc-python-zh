    support.d()\" 调用模块 support.py 中的函数 \"d\"。\n\n## 导入模块 (2)\n\n导入模块的语法是：\n\n```python\n\
    from module import *  # 导入所有模块成员\nfunction()  # 调用模块文件中的函数\n```\n\n模块文件应与主文件放在同一目录中。函数可以不带模块名称直接调用。\n\
    \n### 示例 7.3\n\n```python\nfrom support import *  # 导入所有函数\nc()  # 调用 support.py\
