  md: '# # Fun with Spreadsheets


    Spreadsheets are one of the most versatile and omnipresent tools in the world
    of computing. Their intuitive approach of sheets and cells is used by virtually
    everyone that uses a computer as part of their day-to-day operations. But they
    allow you to apply complex operations, including the use of macro languages. There''s
    even a running joke that whole complex businesses are managed and described within
    a single spreadsheet, somewhere. They are incredibly powerful tools.


    This makes the ability to automate reading from and writing to spreadsheets so
    interesting. We''ll see in this chapter how to process spreadsheets, mainly in
    the most common format, Excel. The final recipe will cover a free alternative,
    LibreOffice, and in particular, how to use Python as a scripting language inside
    it.


    > Python presents advantages over using specific tools included in spreadsheet
    suites. First, it is more versatile than custom tools like VBA, which only work
    on a single suite of applications. You can also take advantage of its vast available
    library to perform operations, both in terms of capacity (for example, using a
    statistical library or a specialized mathematical library) and in terms of performance.
    Also, in Python, the code is readable and easy to understand compared to other
    alternatives. In *Chapter 7, Cleaning and Processing Data*, we''ll go through
    some techniques that can help you increase the productivity of dealing with spreadsheet
    files and processes.


    In this chapter, we will cover the following recipes:


    +   - Writing a CSV spreadsheet

    - Updating CSV files'
