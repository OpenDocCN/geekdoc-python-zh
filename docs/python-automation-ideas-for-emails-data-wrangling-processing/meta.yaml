  - '[PAGE 423]


    Machine Learning for Automation


    The two most important parameters here are `precision` and `recall`.


    > precision is the ability of the model to predict the correct label, while recall
    is the ability to not assign an incorrect label. A model with low precision will
    have more false positives – results with labels attached that are not correct.
    For example, it will detect a smile when there isn''t one. A model with low recall
    will produce false negatives – results that should have a label attached will
    not have one. For example, it won''t detect a smile when there is one.


    The confusion matrix displays the detection patterns based on the training data.
    A perfect matrix will show a 100% diagonal, which will mean that the data is properly
    categorized and there are no mistaken elements. You can see that''s not the case
    here.


    > Our precision and recall parameters of 66.67% are not fantastic. This is in
    part due to the small number of samples generated. In real life, aim to have around
    90% or higher.


    The next tab, **TEST & USE**, has all the information that we require to use it,
