    \ data)\nreturn resp.json()['form']\n```\n\nIn step 3, the test file is defined.\
    \ Note the import of the `responses` module. The first test, `test_order_pizza`,\
    \ starts by activating the `responses` module with the decorator `@responses.activate`:\n\
    \n```\n@responses.activate\ndef test_order_pizza():\n    body = {\n        'form':\
    \ {\n            'size': 'small',\n            'topping': ['bacon', 'onion']\n\
    \        }\n    }\n    responses.add(responses.POST, 'https://httpbin.org/post',\n\
    \                   json=body, status=200)\n\n    result = order_pizza()\n   \
    \ assert result['size'] == 'small'\n    # Decode the sent data\n    encoded_body\
