    # How it works...


    The basics of a Word document is that it is divided into paragraphs, and each
    of the paragraphs is divided into runs. A run is a part of a paragraph that shares
    the same style.'
  - '[PAGE 163]


    Generating Fantastic Reports


    Steps 1 and 2 in the *How to do it...* section are preparation for importing and
    defining the data that''s going to be stored in the report.


    In *step 3*, the document is created and a heading with the proper title is added.
    This automatically styles the text.


    Dealing with paragraphs is introduced in *step 4*. A new paragraph is created
    based on the text with the default style, but new runs can be added to change
    it. Here, we added the first run with the text *Date*, but another run is added
    after that with the specific time and the format changed to *italics*.


    In *steps 5* and *6*, we can see information about the movies. The first part
    stores the number of movies, in a similar format to *step 4*. After that, the
    movies are added to the report one by one, and the style is set up to be bullet
    points with the style "*List Bullet*".


    Finally, *step 7* stores the total run time of all movies, in a similar way to
    *step 4*, and stores the document in a file.


    # There''s more...


    If you need to introduce extra lines in the document for formatting purposes,
    add empty paragraphs.


    Due to the way that the MS Word format works, there''s no easy way of determining
    how many pages a document will have. You may need to run some tests on sizes,
    especially if you''re generating dynamic documents.


    > Even if you generate docx files, having MS Office is not necessary. There are
    other applications that can open and deal with these files, including free alternatives
    such as LibreOffice.


    The whole python-docx documentation is available here: https://python-docx.readthedocs.io/en/latest/.


    # See also


    +   - The *Styling a Word document* recipe, later in this chapter, to learn how
    format a document.

    - The *Generating structure in Word documents* recipe, later in this chapter,
    to learn how to create sections and other separators in Word documents.'
