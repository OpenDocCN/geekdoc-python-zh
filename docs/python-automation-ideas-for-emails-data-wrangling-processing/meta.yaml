    \    >>> mail.login(USER, PASSWORD)\n\n4. Select the inbox folder:\n    >>> mail.select('inbox')\n\
    \n5. Read all email UIDs and retrieve the latest received email:\n    >>> result,\
    \ data = mail.uid('search', None, 'ALL')\n    >>> latest_email_uid = data[0].split()[-1]\n\
    \    >>> result, data = mail.uid('fetch', latest_email_uid, '(RFC822)')\n    >>>\
    \ raw_email = data[0][1]\n\n6. Parse the email into a Python object:\n    >>>\
    \ email_message = BytesParser(policy=default).parsebytes(raw_email)\n\n7. Display\
    \ the subject and sender of the email:\n    >>> email_message['subject']\n   \
    \ '[Ref ABCDEF] Subject: Product A'\n    >>> email.utils.parseaddr(email_message['From'])\n\
    \    ('Sender name', 'sender@gmail.com')\n\n8. Retrieve the payload of the text:\n\
    \    >>> email_type = email_message.get_content_maintype()\n    >>> if email_type\
    \ == 'multipart':\n    ...     for part in email_message.get_payload():\n    ...\
    \         if part.get_content_type() == 'text/plain':"
  - "[PAGE 322]\n\n```\n...\n    payload = part.get_payload()\n... elif email_type\
    \ == 'text':\n...     payload = email_message.get_payload()\n>>> print(payload)\n\
    Hi:\n\nI'm having difficulties getting into my account. What was the URL, again?\n\
    \nThanks!\n    A confused customer\n```\n\n# How it works...\n\nAfter importing\
    \ the modules that will be used and defining the credentials, we connect to the\
    \ server in *step 3*.\n\n*Step 4* connects to `inbox`. This is a default folder\
    \ in Gmail that contains the received email.\n\n> Of course, you may need to read\
    \ a different folder. You can get a list of all folders by calling `mail.list()`.\n\
    \nIn *step 5*, first, a list of UIDs is retrieved for all the emails in the inbox\
    \ by calling `.uid('search', None, \"ALL\")`. The last email received is then\
    \ retrieved again from the server through a `fetch` action with `.uid('fetch',\
    \ latest_email_uid, '(RFC822)')`. This retrieves the email in RFC822 format, which\
    \ is the standard. Note that retrieving the email marks it as read.\n\n> The `.uid`\
    \ command allows us to call IMAP4 commands, returning a tuple with the result\
    \ (OK or NO) and the data. If there's an error, it will raise the proper exception.\n\
    \nThe `BytesParser` module is used to transform the raw RFC822 email into a Python\
    \ object. This is done in *step 6*."
- md: "## Dealing with Communication Channels\n\nThe metadata, including details such\
    \ as the subject, the sender, and the timestamp, can be accessed like a dictionary,\
    \ as shown in *step 7*. The addresses can be parsed from raw text format to separate\
    \ the part with `email.utils.parseaddr`.\n\nFinally, the content can be unfolded\
    \ and extracted. If the type of the email is multipart, each of the parts can\
    \ be extracted by iterating through `.get_payload()`. The one that's easier to\
    \ deal with is `plain/text`, so assuming it is present, the code in *step 8* will\
    \ extract it.\n\nThe email's body is stored in the `payload` variable.\n\n###\
    \ There's more...\n\nIn *step 5*, we retrieved all the emails from the inbox,\
    \ but that's not necessary. The search command can be parameterized with filter\
    \ criteria, for example, by retrieving only the last day's emails:\n\n```python\n\
    import datetime\nsince = (datetime.date.today() - datetime.timedelta(days=1)).strftime(\"\
    %d-%b-%Y\")\nresult, data = mail.uid('search', None, f'(SENTSINCE {since})')\n\
    ```\n\nThis will search according to the date of the email. Notice that the resolution\
    \ is in days.\n\nThere are more actions that can be done through `IMAP4`. Check\
    \ RFC 3501 at https://tools.ietf.org/html/rfc3501 and RFC 6851 at https://tools.ietf.org/html/rfc6851\
    \ for further details.\n\n> The preceding RFCs describe the IMAP4 protocol and\
    \ can be a little arid. Checking the available commands in the RFCs' indexes will\
    \ give you an idea of the capabilities of the protocol, and then you can search\
    \ for examples on how to implement the specific command.\n\nThe subject and body\
    \ of the email, as well as other metadata such as date, to, from, and so on, can\
    \ be parsed and processed. For example, the subject retrieved in this recipe can\
    \ be processed in the following way:\n\n```python\n>>> import re\n>>> re.search(r'\\\
    [Ref (\\w+)\\] Subject: (\\w+)', '[Ref ABCDEF] Subject: Product A').groups()\n\
    ('ABCDEF', 'Product')\n```\n\n### See also\n\n- *Chapter 1, Let's Begin Our Automation\
    \ Journey*, for more information about regular expressions and other ways of parsing\
    \ information.\n\n## Adding subscribers to an email newsletter\n\nA common marketing\
    \ tool is email newsletters. They are convenient ways of sending information to\
    \ multiple targets. A good newsletter system is difficult to implement, and the\
    \ recommended way is to use ones available on the market. A well-known one is\
    \ **MailChimp** (https://mailchimp.com/).\n\nMailChimp has a lot of possibilities,\
    \ but the interesting one in regard to this book is its API, which can be scripted\
    \ to automate tools. This RESTful API can be accessed through Python. In this\
    \ recipe, we will see how to add more subscribers to an existing list.\n\n###\
    \ Getting ready\n\nAs we will use MailChimp, we need to have an account with them.\
    \ You can create a free account at https://login.mailchimp.com/signup/.\n\nAfter\
    \ creating the account, be sure to at least have a list that we can add subscribers\
    \ to. As part of the registration process, it may have been created for you. It\
    \ will appear under **Audience -> Manage Audience -> View Audience**:\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_324_0.png)\n\
    \nThe **Audience** will contain the subscribed users.\n\nFor the API, we'll need\
    \ an API key. Go to **Account -> Extras -> API keys** and create a new one:\n\n\
    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_325_0.png)\n\nFigure 9.4: A screenshot\
    \ of API keys in MailChimp\n\nWe will use the `requests` module to access the\
    \ API. Add it to your virtual environment:\n\n```\n$ echo \"requests==2.23\" >>\
    \ requirements.txt\n$ pip install -r requirements.txt\n```\n\nThe MailChimp API\
    \ uses the concept of the **data center (DC)** that your account uses. This can\
    \ be obtained from the last 4 digits of your API key or from the start of the\
    \ URL from the MailChimp admin site. For example, us19.\n\n### How to do it...\n\
    \n1. Import the `requests` module:\n\n```python\n>>> import requests\n```\n\n\
    2. Define the authentication and base URLs. The base URL requires your dc at the\
    \ start (such as us19):\n\n```python\n>>> API_KEY = 'your secret key'\n>>> BASE\
    \ = 'https://<dc>.api.mailchimp.com/3.0'\n>>> auth = ('user', API_KEY)\n```\n\n\
    3. Obtain all your lists:\n\n```python\n>>> url = f'{BASE}/lists'\n>>> response\
    \ = requests.get(url, auth=auth)\n>>> result = response.json()\n```\n\n4. Filter\
    \ your lists to obtain the href for the required list:\n\n```python\n>>> LIST_NAME\
    \ = 'Your list name'\n>>> this_list = [l for l in result['lists'] if l['name']\
    \ == LIST_NAME][0]\n>>> list_url = [l['href'] for l in this_list['_links'] if\
    \ l['rel'] == 'self'][0]\n```\n\n5. With the list URL, you can obtain the URL\
    \ for the members of the list:\n\n```python\n>>> response = requests.get(list_url,\
    \ auth=auth)\n>>> result = response.json()\n>>> result['stats']\n{'member_count':\
    \ 1, 'unsubscribe_count': 0, 'cleaned_count': 0, ...}\n>>> members_url = [l['href']\
    \ for l in result['_links'] if l['rel'] == 'members'][0]\n```\n\n6. The list of\
    \ members can be retrieved through a GET request to members_url:\n\n```python\n\
    >>> response = requests.get(members_url, auth=auth)\n>>> result = response.json()\n\
    >>> len(result['members'])\n1\n```\n\n7. Append a new member to the list:\n\n\
    ```python\n>>> new_member = {\n    'email_address': 'test@test.com',\n    'status':\
    \ 'subscribed',\n}\n>>> response = requests.post(members_url, json=new_member,\
    \ auth=auth)\n```\n\n8. Retrieving the list of users with a GET obtains both users:\n\
    \n```python\n>>> response = requests.get(members_url, auth=auth)\n>>> result =\
    \ response.json()\n>>> len(result['members'])\n2\n```\n\n### How it works...\n\
    \nAfter importing the requests module in step 1, we define the basic values to\
    \ connect in step 2: the base URL and the credentials. Note that for authentication,\
    \ we only require the API key as the password, and any user (as described by the\
    \ MailChimp documentation: https://developer.mailchimp.com/documentation/mailchimp/guides/get-started-with-mailchimp-api-3/).\n\
    \nStep 3 retrieves all the lists, calling the proper URL. The result is returned\
    \ in JSON format. The call includes the auth parameter with the defined credentials.\
    \ All subsequent calls will be made with this auth parameter for authentication\
    \ purposes.\n\nStep 4 shows how to filter the returned list to grab the URL of\
    \ the list of interest. Each of the returned calls includes a list of _links with\
    \ related information, making it possible to walk through the API.\n\nThe URL\
    \ for the list is called in step 5. This returns information for the list, including\
    \ the basic stats. By applying a similar filtering to step 4, we retrieve the\
    \ URL for the members.\n\n> Due to size constraints and to show relevant data,\
    \ not all of the retrieved elements have been displayed. Feel free to analyze\
    \ them interactively and find out about them. The data is well constructed and\
    \ follows the RESTful principles of discoverability. Python's introspection makes\
    \ it quite readable and understandable.\n\nStep 6 retrieves the list of members,\
    \ making a GET request to members_url, which can be seen as a single user. This\
    \ can be seen in the Getting ready section, in the web interface.\n\nStep 7 creates\
    \ a new user and posts on members_url with the information passed in the json\
    \ parameter so that it gets translated into JSON format. The updated data is retrieved\
    \ in step 7, showing that there's a new user in the list.\n\n### There's more...\n\
    \nThe full MailChimp API is quite powerful and can perform a large number of tasks.\
    \ Go to the full MailChimp documentation to discover all the possibilities: https://developer.mailchimp.com/.\n\
    \n> As a brief note, and a little out of scope of this book, please be aware of\
    \ the legal implications of adding subscribers to an automated list. Spam is a\
    \ serious concern and there are new regulations in place to protect the rights\
    \ of customers, such as GDPR. Ensure that you have the permission of users to\
    \ email them. The good thing is that MailChimp automatically implements tools\
    \ to help with this, such as automatic unsubscribe buttons.\n\nThe general MailChimp\
    \ documentation is also quite interesting and shows a lot of possibilities. MailChimp\
    \ is capable of managing newsletter and general distribution lists, but it can\
    \ also be tailored to generate flows, schedule the sending of emails, and automatically\
    \ send messages to your audience based on parameters such as their birthday.\n\
    \n### See also\n\n- The *Sending an individual email* recipe, earlier in this\
    \ chapter, to see the differences between sending an email directly without this\
    \ kind of tool\n- The *Sending notification emails* recipe, next, to learn how\
    \ to send emails tailored to a specific user for an action\n\n## Sending notifications\
    \ via email\n\nIn this recipe, we will cover how to send emails to customers.\
    \ Transactional emails are sent in response to an action by a user, such as confirmation\
    \ or alert emails. Due to spam protection and other limitations, it is better\
    \ to implement this kind of email with the help of external tools.\n\nIn this\
    \ recipe, we will use **Mailgun** (https://www.mailgun.com), which is able to\
    \ send these kinds of emails, as well as communicate responses.\n\n### Getting\
    \ ready\n\nWe'll need to create an account with Mailgun. Go to https://signup.mailgun.com\
    \ to create one. Notice that the credit card information is optional."
  mdcn: "## 处理通信渠道\n\n元数据（包括主题、发件人和时间戳等详细信息）可以像字典一样访问，如*步骤7*所示。地址可以从原始文本格式中解析出来，使用\
    \ `email.utils.parseaddr` 分离出相应部分。\n\n最后，可以展开并提取内容。如果邮件类型是 multipart，则可以通过遍历 `.get_payload()`\
    \ 来提取每个部分。其中较容易处理的是 `plain/text`，因此假设存在该类型，*步骤8*中的代码将提取它。\n\n邮件正文存储在 `payload`\
    \ 变量中。\n\n### 更多内容...\n\n在*步骤5*中，我们从收件箱检索了所有邮件，但这并非必要。搜索命令可以通过过滤条件进行参数化，例如，只检索最近一天的邮件：\n\
    \n```python\nimport datetime\nsince = (datetime.date.today() - datetime.timedelta(days=1)).strftime(\"\
    %d-%b-%Y\")\nresult, data = mail.uid('search', None, f'(SENTSINCE {since})')\n\
    ```\n\n这将根据邮件日期进行搜索。请注意，分辨率是以天为单位的。\n\n通过 `IMAP4` 还可以执行更多操作。有关更多详细信息，请查看 RFC 3501（https://tools.ietf.org/html/rfc3501）和\
    \ RFC 6851（https://tools.ietf.org/html/rfc6851）。\n\n> 前述 RFC 描述了 IMAP4 协议，可能有些枯燥。查看\
    \ RFC 索引中的可用命令，可以了解该协议的功能，然后你可以搜索如何实现特定命令的示例。\n\n邮件的主题和正文，以及其他元数据（如日期、收件人、发件人等），都可以被解析和处理。例如，本配方中检索到的主题可以按以下方式处理：\n\
    \n```python\n>>> import re\n>>> re.search(r'\\[Ref (\\w+)\\] Subject: (\\w+)',\
    \ '[Ref ABCDEF] Subject: Product A').groups()\n('ABCDEF', 'Product')\n```\n\n\
    ### 另请参阅\n\n- *第1章，开始我们的自动化之旅*，了解有关正则表达式和其他信息解析方式的更多信息。\n\n## 向电子邮件通讯添加订阅者\n\n\
    一种常见的营销工具是电子邮件通讯。它们是向多个目标发送信息的便捷方式。一个好的通讯系统难以实现，推荐的方式是使用市场上可用的系统。一个著名的是 **MailChimp**（https://mailchimp.com/）。\n\
    \nMailChimp 有很多可能性，但与本书相关的是它的 API，可以通过脚本自动化工具。这个 RESTful API 可以通过 Python 访问。在本配方中，我们将看到如何向现有列表添加更多订阅者。\n\
    \n### 准备工作\n\n由于我们将使用 MailChimp，我们需要拥有一个账户。你可以在 https://login.mailchimp.com/signup/\
    \ 创建一个免费账户。\n\n创建账户后，请确保至少有一个我们可以添加订阅者的列表。作为注册过程的一部分，它可能已经为你创建。它将出现在 **Audience\
    \ -> Manage Audience -> View Audience** 下：\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_324_0.png)\n\
    \n**Audience** 将包含已订阅的用户。\n\n对于 API，我们需要一个 API 密钥。转到 **Account -> Extras -> API\
    \ keys** 并创建一个新的：\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_325_0.png)\n\n图\
    \ 9.4：MailChimp 中 API 密钥的截图\n\n我们将使用 `requests` 模块来访问 API。将其添加到你的虚拟环境中：\n\n```\n\
    $ echo \"requests==2.23\" >> requirements.txt\n$ pip install -r requirements.txt\n\
    ```\n\nMailChimp API 使用你的账户所使用的 **数据中心（DC）** 概念。这可以从你的 API 密钥的最后 4 位数字或 MailChimp\
    \ 管理站点 URL 的开头获取。例如，us19。\n\n### 如何操作...\n\n1. 导入 `requests` 模块：\n\n```python\n\
    >>> import requests\n```\n\n2. 定义认证和基础 URL。基础 URL 需要在开头包含你的 dc（例如 us19）：\n\n```python\n\
    >>> API_KEY = 'your secret key'\n>>> BASE = 'https://<dc>.api.mailchimp.com/3.0'\n\
    >>> auth = ('user', API_KEY)\n```\n\n3. 获取你所有的列表：\n\n```python\n>>> url = f'{BASE}/lists'\n\
    >>> response = requests.get(url, auth=auth)\n>>> result = response.json()\n```\n\
    \n4. 过滤你的列表以获取所需列表的 href：\n\n```python\n>>> LIST_NAME = 'Your list name'\n>>>\
    \ this_list = [l for l in result['lists'] if l['name'] == LIST_NAME][0]\n>>> list_url\
    \ = [l['href'] for l in this_list['_links'] if l['rel'] == 'self'][0]\n```\n\n\
    5. 使用列表 URL，你可以获取列表成员的 URL：\n\n```python\n>>> response = requests.get(list_url,\
    \ auth=auth)\n>>> result = response.json()\n>>> result['stats']\n{'member_count':\
    \ 1, 'unsubscribe_count': 0, 'cleaned_count': 0, ...}\n>>> members_url = [l['href']\
    \ for l in result['_links'] if l['rel'] == 'members'][0]\n```\n\n6. 可以通过向 members_url\
    \ 发送 GET 请求来检索成员列表：\n\n```python\n>>> response = requests.get(members_url, auth=auth)\n\
    >>> result = response.json()\n>>> len(result['members'])\n1\n```\n\n7. 向列表追加一个新成员：\n\
    \n```python\n>>> new_member = {\n    'email_address': 'test@test.com',\n    'status':\
    \ 'subscribed',\n}\n>>> response = requests.post(members_url, json=new_member,\
    \ auth=auth)\n```\n\n8. 使用 GET 检索用户列表，将获取到两个用户：\n\n```python\n>>> response = requests.get(members_url,\
    \ auth=auth)\n>>> result = response.json()\n>>> len(result['members'])\n2\n```\n\
    \n### 工作原理...\n\n在步骤1导入 requests 模块后，我们在步骤2定义了连接的基本值：基础 URL 和凭据。请注意，对于认证，我们只需要\
    \ API 密钥作为密码，以及任何用户（如 MailChimp 文档所述：https://developer.mailchimp.com/documentation/mailchimp/guides/get-started-with-mailchimp-api-3/）。\n\
    \n步骤3通过调用适当的 URL 检索所有列表。结果以 JSON 格式返回。调用包含带有定义凭据的 auth 参数。所有后续调用都将使用此 auth 参数进行认证。\n\
    \n步骤4展示了如何过滤返回的列表以获取感兴趣列表的 URL。每个返回的调用都包含一个带有相关信息的 _links 列表，使得遍历 API 成为可能。\n\n\
    步骤5调用列表的 URL。这返回列表的信息，包括基本统计信息。通过应用类似于步骤4的过滤，我们检索成员的 URL。\n\n> 由于大小限制并为了显示相关数据，并非所有检索到的元素都已显示。请随意交互式地分析它们并了解它们。数据结构良好，遵循\
    \ RESTful 的可发现性原则。Python 的内省使其相当可读和易于理解。\n\n步骤6通过向 members_url 发送 GET 请求检索成员列表，这可以被视为单个用户。这可以在“准备工作”部分的\
    \ Web 界面中看到。\n\n步骤7创建一个新用户，并通过 json 参数传递信息向 members_url 发送 POST 请求，以便将其转换为 JSON\
    \ 格式。更新后的数据在步骤7中检索，显示列表中有一个新用户。\n\n### 更多内容...\n\n完整的 MailChimp API 功能非常强大，可以执行大量任务。请访问完整的\
    \ MailChimp 文档以发现所有可能性：https://developer.mailchimp.com/。\n\n> 简要说明一下，这有点超出本书范围，请注意向自动化列表添加订阅者的法律影响。垃圾邮件是一个严重的问题，并且有新的法规来保护客户的权利，例如\
    \ GDPR。确保你有用户允许你向他们发送邮件的许可。好消息是 MailChimp 自动实现了工具来帮助解决这个问题，例如自动退订按钮。\n\n通用的 MailChimp\
    \ 文档也很有趣，展示了很多可能性。MailChimp 能够管理通讯和通用分发列表，但它也可以定制以生成流程、安排发送电子邮件，并根据参数（如生日）自动向你的受众发送消息。\n\
    \n### 另请参阅\n\n- 本章前面的 *发送单个电子邮件* 配方，了解直接发送电子邮件与此类工具之间的区别\n- 接下来的 *发送通知电子邮件* 配方，了解如何为特定用户的操作发送定制电子邮件\n\
    \n## 通过电子邮件发送通知\n\n在本配方中，我们将介绍如何向客户发送电子邮件。事务性电子邮件是响应用户操作而发送的，例如确认或警报电子邮件。由于垃圾邮件保护和其他限制，最好借助外部工具来实现此类电子邮件。\n\
    \n在本配方中，我们将使用 **Mailgun**（https://www.mailgun.com），它能够发送此类电子邮件以及通信响应。\n\n### 准备工作\n\
    \n我们需要在 Mailgun 创建一个账户。访问 https://signup.mailgun.com 创建一个。请注意，信用卡信息是可选的。"
