  md: "Dealing with Communication Channels\n\n# How it works...\n\nStep 1 sets the\
    \ token to use for your specific channel. In step 2, we start the bot locally.\n\
    \nLet's see how the code in `telegram_bot.py` is structured:\n\n```\n# IMPORTS\n\
    \n# TOKEN\n\n# Define the information to return per command\ndef get_help():\n\
    def get_offers():\ndef get_events():\nCOMMANDS = {\n    'help': get_help,\n  \
    \  'offers': get_offers,\n    'events': get_events,\n}\n\nclass MarketingBot(telepot.helper.ChatHandler):\n\
    \    ...\n\n# Create and start the bot\n```\n\nThe `MarketingBot` class creates\
    \ an interface to handle the communication with Telegram:\n\n+   - When the channel\
    \ is started, the `open` method will be called\n- When a message is received,\
    \ the `on_chat_message` method will be called\n- If there's no answer in a while,\
    \ `on_idle` will be called\n\nIn each case, the `self.sender.sendMessage` method\
    \ is used to send a message back to the user. Most of the interesting bits happen\
    \ in `on_chat_message`:\n\n```\ndef on_chat_message(self, msg):\n    # If the\
    \ data sent is not test, return an error\n    content_type, chat_type, chat_id\
    \ = telepot.glance(msg)\n    if content_type != 'text':\n        self.sender.sendMessage(\"\
    I don't understand you. \"\n                               \"Please type 'help'\
    \ for options\")\n        return\n```"
  merge: -1
  pgno: 349
- img_proc: true
  md: "```\n# Make the commands case insensitive\ncommand = msg['text'].lower()\n\n\
    if command not in COMMANDS:\n    self.sender.sendMessage(\"I don't understand\
    \ you. \"\n                           \"Please type 'help' for options\")\n  \
    \  return\n\nmessage = COMMANDS[command]()\nself.sender.sendMessage(message)\n\
    ```\n\nFirst, it checks whether the received message is text and returns an error\
    \ message if it's not. It analyzes the received text, and if it's one of the defined\
    \ commands, it executes the corresponding function to retrieve the text to return.\n\
    \nThen, it sends the message back to the user.\n\n*Step 3* shows how this works\
    \ from the user's point of view, who is interacting with the bot.\n\n# There's\
    \ more...\n\nYou can add more information, an avatar picture, and so on to your\
    \ Telegram channel using the `BotFather` interface.\n\nTo simplify our interface,\
    \ we can create a custom keyboard to simplify the bot. Create it after defining\
    \ the commands, around line 44 of the script:\n\n```\nfrom telepot.namedtuple\
    \ import ReplyKeyboardMarkup, KeyboardButton\nkeys = [[KeyboardButton(text=text)]\
    \ for text in COMMANDS]\nKEYBOARD = ReplyKeyboardMarkup(keyboard=keys)\n```\n\n\
    Notice it is creating a keyboard with three rows, each with one of the commands.\
