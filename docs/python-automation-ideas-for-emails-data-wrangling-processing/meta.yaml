    of the image needs to be calculated if it changes. The resizing may end up not
    being perfect if done by approximation, as in *step 5* from the *How to do it...*
    section.


    > Notice that the image does not have a perfect ratio of 10:14. Instead, it is
    10:13.33. For a photograph, that may be good enough, but for images sensitive
    to proportion changes, such as a chart, it may require extra care.


    To obtain the proper ratio, divide the height by the width and then scale properly:


    ```

    >>> image = document.add_picture(''photo-dublin-a1.jpg'')

    >>> image.height / image.width

    0.75

    >>> RELATION = image.height / image.width

    >>> image.width = Cm(12)

    >>> image.height = Cm(12 * RELATION)

    ```


    If you need to transform the values to a particular size, you can use the `cm`,
    `inches`, `mm`, or `pt` attributes:


    ```

    >>> image.width.cm

    12.0

    >>> image.width.mm

    120.0

    >>> image.width.inches

    ```'
