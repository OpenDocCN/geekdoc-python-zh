    The usage of the `assert` keyword in Python is very flexible and easy to understand.
    The test needs to be defined in a way that it asserts that something evaluates
    as True.


    `pytest` will not only show the line that''s failing but also give some context,
    as shown in our example, making it easy to see the problem.


    > Try to fix the error to make all the tests pass.


    You can access the full `pytest` documentation at the following link: https://docs.pytest.org/.


    # See also


    +   - The *Running tests selectively* recipe, later in this chapter, to learn
    how to run only a subsection of the tests.

    - The *Testing external code* recipe, next up in this chapter, to learn how to
    test code in other modules.


    # Testing external code


    The main objective of testing is to be able to check code that''s out of the boundaries
    of the test files. We can import code easily in the tests, and then verify whether
    it is working as expected. Let''s see how to do it.


    # Getting ready


    We will use the `pytest` module. We should install the module, adding it to our
    `requirements.txt` file as follows:


    ```

    $ echo "pytest==5.4.1" >> requirements.txt

    $ pip install -r requirements.txt

    ```


    We will use the test files `tests/test_external.py` and `code/external.py`. You
    can download them from the GitHub repository at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter12,
    under the subdirectories `tests` and `code`.'
