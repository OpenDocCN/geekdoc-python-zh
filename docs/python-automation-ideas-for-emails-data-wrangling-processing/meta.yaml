    <BarContainer object of 4 artists>

    >>> plt.ylabel(''Sales'')

    Text(0, 0.5, ''Sales'')

    >>> plt.xticks(POS, LABELS)

    <REDACTED>

    ```


    5. Add an annotation displaying the maximum growth in the chart:


    ```

    >>> plt.annotate(''400% growth'', xy=(1.2, 18), xytext=(1.3, 40),

