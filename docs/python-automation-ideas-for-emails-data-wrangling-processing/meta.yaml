  md: "Automatic Testing Routines\n\nThe `responses` library keeps track of all the\
    \ captured requests. We retrieve the body of the first request and store it in\
    \ the `encoded_body` variable. This data has been encoded and sent as part of\
    \ the `POST` into `application/x-www-form-urlencoded` format, which is the default\
    \ for `POST` requests. We decode it using the default library, `urllib`, and `parse_qs()`\
    \ to transform it into a dictionary.\n\n> The full documentation for `urllib.parse`\
    \ can be found in the Python official documentation: https://docs.python.org/3/library/urllib.parse.html.\n\
    \nThe second test, `test_order_pizza_timeout`, shows how to raise an exception\
    \ when requesting a particular URL:\n\n```\n@responses.activate\ndef test_order_pizza_timeout():\n\
    \    responses.add(responses.POST, 'https://httpbin.org/post',\n             \
    \     body=requests.exceptions.Timeout())\n\n    with pytest.raises(requests.exceptions.Timeout):\n\
    \        order_pizza()\n```\n\nThe `responses.add` call, in this case, specifies\
    \ an `Exception` in the body that will be raised when the URL is requested with\
    \ the defined method.\n\n> Because the exception is raised instantly when the\
    \ request is done, this speeds up the generation of a `Timeout` exception, which\
    \ normally would require seconds or minutes to be generated.\n\nStep 4 runs the\
    \ tests to check that the code works as expected.\n\n# There's more...\n\nThe\
    \ `responses` library is very useful for generating error conditions and preparing\
    \ your code for them. The `STATUS` argument can be used to generate error codes\
    \ in external systems, such as \"403 Forbidden,\" \"404 Not Found,\" \"500 Internal\
    \ Server error,\" and \"503 Service Unavailable.\" Properly handling the different\
    \ situations that can be produced and reacting to them will improve the reliability\
    \ of your code."
