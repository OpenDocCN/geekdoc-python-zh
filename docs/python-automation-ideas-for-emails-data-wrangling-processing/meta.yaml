    \ Practitioner, for a medical doctor) can end up capturing eggplant and bagpipe!\
    \ Similarly, `things\\b` won't capture things. Be sure to test and make the proper\
    \ adjustments, such as capturing `\\bGP\\b` for just the word GP.\n\nThe specific\
