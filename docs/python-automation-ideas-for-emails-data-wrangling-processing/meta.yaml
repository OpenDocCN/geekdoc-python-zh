  - '[PAGE 180]


    # How it works...


    The `fpdf` module creates a PDF document and allows us to write in it.


    > Due to the peculiarities of a PDF, the best way to think about it is to imagine
    a cursor writing in the document and moving to the next position, similar to a
    typewriter.


    The first operations are to specify the font and size to use, and then add the
    first page. This is done in *step 3*. The first font is in bold (second argument,
    ''B'') and in a bigger font than the rest of the document. This makes it a title.
    The color is also set up with `.set_text_color`, in RGB components.


    > The text can also be styled in italics with *I* and underlined with <u>U</u>.
    You can combine them, so **BI** will produce text in both bold and italic.


    The `.cell` call creates a box of text with the specified text. The first couple
    of parameters are the width and height. Width 0 uses the whole space up to the
    right margin. Height 5 (mm) is adequate for a size 12 font. The call to `.ln`
    introduces a new line.


    To write a multiline paragraph, we use the `.multi_cell` method. Its parameters
    are the same as `.cell`. Two paragraphs are written in *steps 5* and *6*. Notice
    the change in font previously, to distinguish the title from the body of the report.
    `.set_text_color` is called with a single argument to set up the color in grayscale.
    In this case, it is in black using 0.


    > Using `cell` for long text will make it go over the margin and off the page.
    Use it only for text that will fit in a single line. You can find the size of
    a string with `.get_string_width`.


    The document is saved to disk in *step 7*.


    # There''s more...


    Pages are added automatically if a `multi_cell` operation occupies all space available
    in a page. Calling `.add_page` will move to a new page.'
