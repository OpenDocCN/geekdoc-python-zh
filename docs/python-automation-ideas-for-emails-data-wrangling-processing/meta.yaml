    # How it works...


    pytest allows you to define tests simply as functions.


    > Not every function will be interpreted as a test. By default, only functions
    starting with "test" will be treated as such. This is a very handy default configuration,
    but it can be changed if needed. The documentation can be found at https://docs.pytest.org/en/latest/goodpractices.html#test-discovery.


    Each function in `tests/test_case.py` defines a test, as we see in *step 1*.


    The four tests defined in the file `tests/test_case.py` define the basis of a
    pytest test: code that executes and contains one or more assertions verifying
    the code is correct. Note that these first tests are very simple. We will see
    more complicated tests later in the chapter:


    +   - `test_one` doesn''t have any assertions, so it can only pass.

    - `test_two` checks that the addition is correct with an == operator.

    - `test_three` uses the `in` operator to check whether a value is contained in
    a list.

    - `test_fails` uses the `in` operator to check whether a value is contained in
    a list. It is not, so this test will fail, as seen in *step 2*.


    In *step 2*, pytest collects all the tests at the start and then runs them:


    ```

    collected 4 items


    tests/test_case.py ...F

    [100%]

    ```


    Each passing test is represented by a dot, while each failed test shows an F.


    > If color is available in the terminal, the failures will be marked in red and
    passes marked in green.'
