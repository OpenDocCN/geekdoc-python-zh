    \ >> requirements.txt\n$ pip install -r requirements.txt\n```\n\nIn the GitHub\
    \ repository, there is a template file called `markdown_template.md` with a template\
    \ of the report to generate.\n\n# How to do it...\n\n+   1. Import `mistune` and\
    \ `datetime`:\n   python\n   >>> import mistune\n   >>> from datetime import datetime\n\
    \   \n2. Read the template from the file:\n   python\n   >>> with open('markdown_template.md')\
