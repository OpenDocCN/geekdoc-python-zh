    \ the exact point to annotate and where to locate the text will require a bit\
    \ of testing. The text was also positioned by looking for the best place to not\
    \ overlap the text with the bars. The font size and color can be changed using\
    \ the fontsize and color parameters in both the .legend and .annotate calls.\n\
    \nApplying all these elements, the graph may look similar to the following graph.\
    \ This graph can be replicated by calling the adding_legend_and_annotation.py\
