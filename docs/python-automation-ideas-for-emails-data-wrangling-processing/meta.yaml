- md: "## Setting up a cron job\n\nCron is an old-fashioned but reliable way of executing\
    \ commands. It has been around since the 1970s in Unix, and it's an old favorite\
    \ in system administration to perform maintenance tasks such as freeing up disk\
    \ space, rotating log files, making backups, and other common, repetitive operations.\n\
    \nThis recipe is Unix and Unix-like operating systems specific, so it will work\
    \ in Linux and macOS. While it's possible to schedule a task in Windows, it's\
    \ very different and uses Task Scheduler, which won't be described here. If you\
    \ have access to a Linux server, this can be a good way of scheduling periodic\
    \ tasks.\n\nThe main advantages are as follows:\n\n- It's present in virtually\
    \ all Unix or Linux systems and configured to run automatically.\n- It's easy\
    \ to use, although a little deceptive at first.\n- It's well known. Almost anyone\
    \ involved with admin tasks will have a general idea of how to use it.\n- It allows\
    \ for easy periodic commands, with good precision.\n\nHowever, it also has some\
    \ disadvantages, including the following:\n\n- By default, it may not give much\
    \ feedback. Retrieving the output, logging execution, and errors are critical.\n\
    - The task should be as self-contained as possible to avoid problems with environment\
    \ variables, such as using the wrong Python interpreter, or what path should execute.\n\
    - It is Unix-specific.\n- Only fixed periodic times are available.\n- It doesn't\
    \ control how many tasks run at the same time. Each time the countdown goes off,\
    \ it creates a new task. For example, a task that takes 1 hour to complete, and\
    \ that is scheduled to run once every 45 minutes, will have 15 minutes of overlap\
    \ where two tasks will be running.\n\nDon't underestimate the latest effect. Running\
    \ multiple expensive tasks at the same time can have a bad effect on performance.\
    \ Having expensive tasks overlapping may result in a race condition where each\
    \ task stops the others from ever finishing! Allow ample time for your tasks to\
    \ finish and keep an eye on them. Keep in mind that any other program running\
    \ in the same host may have their performance affected, which can include any\
    \ service, such as web servers, databases, and email. Check how loaded the host\
    \ where the task will execute is so as to avoid surprises.\n\n## Getting ready\n\
    \nWe will produce a script, called cron.py:\n\n```python\nimport argparse\nimport\
    \ sys\nfrom datetime import datetime\nimport configparser\n\ndef main(number,\
    \ other_number, output):\n    result = number * other_number\n    print(f'[{datetime.utcnow().isoformat()}]\
    \ The result is {result}',\n          file=output)\n\nif __name__ == '__main__':\n\
    \    parser = argparse.ArgumentParser(formatter_class=argparse.\nArgumentDefaultsHelpFormatter)\n\
    \    parser.add_argument('--config', '-c', type=argparse.\nFileType('r'),\n  \
    \                      help='config file',\n                        default='/etc/automate.ini')\n\
    \    parser.add_argument('-o', dest='output', type=argparse.\nFileType('w'),\n\
    \                        help='output file',\n                        default=sys.stdout)\n\
    \n    args = parser.parse_args()\n    if args.config:\n        config = configparser.ConfigParser()\n\
    \        config.read_file(args.config)\n        # Transforming values into integers\n\
    \        args.n1 = int(config['ARGUMENTS']['n1'])\n        args.n2 = int(config['ARGUMENTS']['n2'])\n\
    \n    main(args.n1, args.n2, args.output)\n```\n\nNote the following details:\n\
    \n1. The config file is, by default, /etc/automate.ini. Reuse config.ini from\
    \ the previous recipe.\n2. A timestamp has been added to the output. This will\
    \ make it explicit when the task is run.\n3. The result is being added to the\
    \ file, as shown with the a mode where the file is open.\n4. The ArgumentDefaultsHelpFormatter\
    \ parameter automatically adds information about default values when printing\
    \ the help using the -h argument.\n\nCheck that the task is producing the expected\
    \ result and that you can log to a known file:\n\n```\n$ python3 cron.py\n[2020-01-15\
    \ 22:22:31.436912] The result is 35\n$ python3 cron.py -o /path/automate.log\n\
    $ cat /path/automate.log\n[2020-01-15 22:28:08.833272] The result is 35\n```\n\
    \n## How to do it...\n\n1. Obtain the full path of the Python interpreter. This\
    \ is the interpreter that's in your virtual environment:\n   ```\n   $ which python\n\
    \   /your/path/.venv/bin/python\n   ```\n\n2. Prepare the cron job to be executed.\
    \ Get the full path and check that it can be executed without any problems. Execute\
    \ it a couple of times:\n   ```\n   $ /your/path/.venv/bin/python /your/path/cron.py\
    \ -o /path/automate.log\n   $ /your/path/.venv/bin/python /your/path/cron.py -o\
    \ /path/automate.log\n   ```\n\n3. Check that the result is being added correctly\
    \ to the result file:\n   ```\n   $ cat /path/automate.log\n   [2020-01-15 22:28:08.833272]\
    \ The result is 35\n   [2020-01-15 22:28:10.510743] The result is 35\n   ```\n\
    \n4. Edit the crontab file to run the task once every 5 minutes:\n   ```\n   $\
    \ crontab -e\n   ```\n   ```\n   */5 * * * * /your/path/.venv/bin/python /your/path/cron.py\
    \ -o /path/automate.log\n   ```\n\n   Note that this opens an editing terminal\
    \ with your default command-line editor.\n\n   If you haven't set up your default\
    \ command-line editor, then, by default, it is likely to be Vim. This can be disconcerting\
    \ if you don't have experience with Vim. Press *I* to start inserting text and\
    \ *Esc* when you're done. Then, exit after saving the file with *wq*. For more\
    \ information about Vim, refer to this introduction: https://null-byte.wonderhowto.com/how-to/intro-vim-unix-text-editor-every-hacker-should-be-familiar-with-0174674.\n\
    \n   For information on how to change the default command-line editor, refer to\
    \ the following link: https://www.a2hosting.com/kb/developer-corner/linux/setting-the-default-text-editor-in-linux.\n\
    \n5. Check the crontab contents. Note that this displays the crontab contents,\
    \ but doesn't set it to edit:\n   ```\n   $ crontab -l\n   */5 * * * * /your/path/.venv/bin/python\
    \ /your/path/cron.py -o /path/automate.log\n   ```\n\n6. Wait and check the result\
    \ file to see how the task is being executed:\n   ```\n   $ tail -F /path/automate.log\n\
    \   [2020-01-17 21:20:00.611540] The result is 35\n   [2020-01-17 21:25:01.174835]\
    \ The result is 35\n   [2020-01-17 21:30:00.886452] The result is 35\n   ```\n\
    \n## How it works...\n\nThe crontab line consists of a line describing how often\
    \ to run the task (the first six elements), plus the task. Each of the initial\
    \ six elements means a different unit of time to execute. Most of them are stars,\
    \ meaning *any*:\n\n```\n* * * * * *\n| | | | | |\n| | | | | +-- Year        \
    \        (range: 1900-3000)\n| | | | +---- Day of the Week     (range: 1-7, 1\
    \ standing for Monday)\n| | | +------ Month of the Year   (range: 1-12)\n| | +--------\
    \ Day of the Month    (range: 1-31)\n| +---------- Hour                (range:\
    \ 0-23)\n+------------ Minute              (range: 0-59)\n```\n\nTherefore, our\
    \ line, `*/5 * * * * *`, means every time the minute is divisible by 5, in all\
    \ hours, all days... all years.\n\nHere are some examples:\n\n```\n30 15 * * *\
    \ * means \"every day at 15:30\"\n30 * * * * * means \"every hour, at 30 minutes\"\
    \n0,30 * * * * * means \"every hour, at 0 minutes and 30 minutes\"\n*/30 * * *\
    \ * * means \"every half hour\"\n0 0 * * 1 * means \"every Monday at 00:00\"\n\
    ```\n\n## See also\n\n- The *Command-line arguments* recipe in *Chapter 1, Let's\
    \ Begin Our Automation Journey*, to get more information about command-line arguments.\n\
    - The *Sending email notifications* recipe, covered later in this chapter, to\
    \ see a more fleshed-out example of an automated task.\n- The *Debugging with\
    \ breakpoints* recipe in *Chapter 13, Debugging Techniques*, to learn how to debug\
    \ the code before executing it automatically."
  mdcn: "## 设置定时任务\n\nCron 是一种古老但可靠的命令执行方式。自 20 世纪 70 年代在 Unix 中出现以来，它一直是系统管理中执行维护任务的常用工具，例如释放磁盘空间、轮转日志文件、进行备份以及其他常见的重复性操作。\n\
    \n本方案专门针对 Unix 和类 Unix 操作系统，因此适用于 Linux 和 macOS。虽然在 Windows 中也可以安排任务，但其方式非常不同，使用的是任务计划程序，此处不作介绍。如果你能访问\
    \ Linux 服务器，这将是安排周期性任务的好方法。\n\n其主要优点如下：\n\n-   它几乎存在于所有 Unix 或 Linux 系统中，并且配置为自动运行。\n\
    -   它易于使用，尽管一开始可能有点令人困惑。\n-   它广为人知。几乎所有参与管理任务的人都对其使用方法有大致了解。\n-   它允许轻松执行周期性命令，且精度良好。\n\
    \n然而，它也有一些缺点，包括：\n\n-   默认情况下，它可能不会提供太多反馈。检索输出、记录执行情况和错误至关重要。\n-   任务应尽可能自包含，以避免环境变量问题，例如使用错误的\
    \ Python 解释器或执行路径错误。\n-   它是 Unix 特有的。\n-   仅支持固定的周期性时间。\n-   它不控制同时运行多少个任务。每次倒计时结束时，它都会创建一个新任务。例如，一个需要\
    \ 1 小时完成的任务，如果安排每 45 分钟运行一次，将会有 15 分钟的重叠时间，此时两个任务将同时运行。\n\n不要低估最后一点的影响。同时运行多个耗时任务可能会对性能产生不良影响。耗时任务重叠可能导致竞态条件，使每个任务都阻止其他任务完成！请为任务留出充足的完成时间并密切关注它们。请记住，在同一主机上运行的任何其他程序的性能都可能受到影响，这可能包括任何服务，例如\
    \ Web 服务器、数据库和电子邮件。检查任务将执行的主机的负载情况，以避免意外情况。\n\n## 准备工作\n\n我们将创建一个名为 `cron.py`\
    \ 的脚本：\n\n```python\nimport argparse\nimport sys\nfrom datetime import datetime\n\
    import configparser\n\ndef main(number, other_number, output):\n    result = number\
    \ * other_number\n    print(f'[{datetime.utcnow().isoformat()}] The result is\
    \ {result}',\n          file=output)\n\nif __name__ == '__main__':\n    parser\
    \ = argparse.ArgumentParser(formatter_class=argparse.\nArgumentDefaultsHelpFormatter)\n\
    \    parser.add_argument('--config', '-c', type=argparse.\nFileType('r'),\n  \
    \                      help='config file',\n                        default='/etc/automate.ini')\n\
    \    parser.add_argument('-o', dest='output', type=argparse.\nFileType('w'),\n\
    \                        help='output file',\n                        default=sys.stdout)\n\
    \n    args = parser.parse_args()\n    if args.config:\n        config = configparser.ConfigParser()\n\
    \        config.read_file(args.config)\n        # Transforming values into integers\n\
    \        args.n1 = int(config['ARGUMENTS']['n1'])\n        args.n2 = int(config['ARGUMENTS']['n2'])\n\
    \n    main(args.n1, args.n2, args.output)\n```\n\n请注意以下细节：\n\n1.  配置文件默认为 `/etc/automate.ini`。请重用上一个方案中的\
    \ `config.ini`。\n2.  输出中添加了时间戳。这将明确显示任务何时运行。\n3.  结果被添加到文件中，如文件以 `a` 模式打开所示。\n\
    4.  `ArgumentDefaultsHelpFormatter` 参数在使用 `-h` 参数打印帮助信息时，会自动添加有关默认值的信息。\n\n检查任务是否产生预期结果，以及是否可以记录到已知文件：\n\
    \n```\n$ python3 cron.py\n[2020-01-15 22:22:31.436912] The result is 35\n$ python3\
    \ cron.py -o /path/automate.log\n$ cat /path/automate.log\n[2020-01-15 22:28:08.833272]\
    \ The result is 35\n```\n\n## 操作步骤...\n\n1.  获取 Python 解释器的完整路径。这是你虚拟环境中的解释器：\n\
    \    ```\n    $ which python\n    /your/path/.venv/bin/python\n    ```\n\n2. \
    \ 准备要执行的 cron 任务。获取完整路径并检查是否可以无任何问题地执行。执行几次：\n    ```\n    $ /your/path/.venv/bin/python\
    \ /your/path/cron.py -o /path/automate.log\n    $ /your/path/.venv/bin/python\
    \ /your/path/cron.py -o /path/automate.log\n    ```\n\n3.  检查结果是否已正确添加到结果文件：\n\
    \    ```\n    $ cat /path/automate.log\n    [2020-01-15 22:28:08.833272] The result\
    \ is 35\n    [2020-01-15 22:28:10.510743] The result is 35\n    ```\n\n4.  编辑\
    \ crontab 文件，设置任务每 5 分钟运行一次：\n    ```\n    $ crontab -e\n    ```\n    ```\n  \
    \  */5 * * * * /your/path/.venv/bin/python /your/path/cron.py -o /path/automate.log\n\
    \    ```\n\n    请注意，这将使用你的默认命令行编辑器打开一个编辑终端。\n\n    如果你尚未设置默认命令行编辑器，则默认情况下很可能是\
    \ Vim。如果你没有 Vim 经验，这可能会令人困惑。按 *I* 开始插入文本，完成后按 *Esc*。然后，使用 *wq* 保存文件并退出。有关 Vim\
    \ 的更多信息，请参阅此介绍：https://null-byte.wonderhowto.com/how-to/intro-vim-unix-text-editor-every-hacker-should-be-familiar-with-0174674。\n\
    \n    有关如何更改默认命令行编辑器的信息，请参阅以下链接：https://www.a2hosting.com/kb/developer-corner/linux/setting-the-default-text-editor-in-linux。\n\
    \n5.  检查 crontab 内容。请注意，这会显示 crontab 内容，但不会设置为编辑：\n    ```\n    $ crontab -l\n\
    \    */5 * * * * /your/path/.venv/bin/python /your/path/cron.py -o /path/automate.log\n\
    \    ```\n\n6.  等待并检查结果文件，查看任务执行情况：\n    ```\n    $ tail -F /path/automate.log\n\
    \    [2020-01-17 21:20:00.611540] The result is 35\n    [2020-01-17 21:25:01.174835]\
    \ The result is 35\n    [2020-01-17 21:30:00.886452] The result is 35\n    ```\n\
    \n## 工作原理...\n\ncrontab 行由描述任务运行频率的部分（前六个元素）加上任务本身组成。前六个元素中的每一个代表不同的时间单位。其中大多数是星号，表示\
    \ *任意*：\n\n```\n* * * * * *\n| | | | | |\n| | | | | +-- 年                (范围:\
    \ 1900-3000)\n| | | | +---- 星期几             (范围: 1-7, 1 代表星期一)\n| | | +------\
    \ 月份               (范围: 1-12)\n| | +-------- 日期               (范围: 1-31)\n| +----------\
    \ 小时               (范围: 0-23)\n+------------ 分钟               (范围: 0-59)\n```\n\
    \n因此，我们的行 `*/5 * * * * *` 表示在所有小时、所有天……所有年份中，每当分钟数能被 5 整除时执行。\n\n以下是一些示例：\n\n\
    ```\n30 15 * * * * 表示“每天 15:30”\n30 * * * * * 表示“每小时的 30 分钟”\n0,30 * * * * * 表示“每小时的\
    \ 0 分钟和 30 分钟”\n*/30 * * * * * 表示“每半小时”\n0 0 * * 1 * 表示“每周一 00:00”\n```\n\n##\
    \ 另请参阅\n\n-   *第 1 章，开始我们的自动化之旅* 中的 *命令行参数* 方案，以获取有关命令行参数的更多信息。\n-   本章稍后介绍的 *发送电子邮件通知*\
    \ 方案，以查看更完整的自动化任务示例。\n-   *第 13 章，调试技术* 中的 *使用断点调试* 方案，以学习如何在自动执行代码之前对其进行调试。"
