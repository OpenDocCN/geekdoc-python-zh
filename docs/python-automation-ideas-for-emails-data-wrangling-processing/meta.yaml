  md: '> Calling .show blocks the execution of the program. The program will resume
    when the window is closed.


    # There''s more...


    Pie charts are a little overused in business graphs. Most of the time, a bar chart
    with percentages or values will be a better way of visualizing the data, especially
    if more than two or three options are displayed. Try to limit the use of pie charts
    in your reports and data presentations.


    Rotating the start of the wedges is possible with the `startangle` parameter,
    and the direction to set up the wedges is defined by `counterclock` (defaults
    to `True`):


    ```

    >>> plt.pie(VALUES, labels=LABELS, startangle=90, counterclock=False)

    ```


    The format inside the label can be set by a function. As the value inside the
    pie is defined as a percentage, finding the original value can be a little tricky.
    The following snippet creates a dictionary indexing by its percentage as an integer,
    so we can retrieve the referenced value. Please note that this assumes that no
    percentage gets repeated. If that''s the case, the labels may be slightly incorrect.
    In that case, we may need to use up to the first decimal place for better precision:


    ```

    >>> from matplotlib.ticker import FuncFormatter


    >>> total = sum(value for label, value in DATA)

    >>> BY_VALUE = {int(100 * value / total): value for label, value in DATA}


    >>> def value_format(percent, **kwargs):

    ...     value = BY_VALUE[int(percent)]

    ...     return ''{}''.format(value)

    ```


    One or more wedges can also be separated using the `explode` parameter. This specifies
    how separated the wedge is from the center:


