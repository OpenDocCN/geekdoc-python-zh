- md: "## Automatic Testing Routines\n\nStep 5 shows how to specify a single test,\
    \ using the full file path and descriptor. This is easy to copy from the output\
    \ when using the -v argument:\n\n```\n$ pytest -v tests/test_requests_time.py::test_order_time\n\
    ...\ncollected 1 item\n```\n\nFinally, in step 6, a different argument is used,\
    \ --lf. This runs only the last failed tests:\n\n```\n$ pytest -v --lf\n...\n\
    collected 11 items / 10 deselected / 1 selected\nrun-last-failure: rerun previous\
    \ 1 failure (skipped 3 files)\n```\n\nIf no test has failed in the last run, --lf\
    \ will run all the tests.\n\n### There's more...\n\nKeep in mind that all these\
    \ parameters can be combined. For example, --collect-only can be used with -k\
    \ to check whether the selected tests are correct.\n\nIn the same way, multiple\
    \ file paths and tests can be added. For example:\n\n```\n$ pytest -v tests/test_external.py::test_int_division\
    \ tests/test_requests.py\n============================= test session starts =============================\n\
    platform darwin -- Python 3.8.2, pytest-5.4.1, py-1.8.1, pluggy-0.13.1 -- /usr/local/opt/python@3.8/bin/python3.8\n\
    cachedir: .pytest_cache\nrootdir: /Python-Automation-Cookbook-Second-Edition/Chapter12\n\
    collected 3 items\ntests/test_external.py::test_int_division PASSED          \
    \             [ 33%]\ntests/test_requests.py::test_order_pizza PASSED        \
    \                [ 66%]\ntests/test_requests.py::test_order_pizza_timeout PASSED\
    \                [100%]\n============================== 3 passed in 0.11s ===============================\n\
    ```\n\nCollecting tests, when the number of tests grows, can take a significant\
    \ amount of time. When the number of tests is in the hundreds or thousands, collecting\
    \ and filtering using -k can take so much time as to delay the execution of tests\
    \ (by half a minute or more). This makes it important to know how to reduce the\
    \ number of collected tests by specifying the files to collect tests from.\n\n\
    To stop the execution of tests when a failure is detected, use the parameter -x:\n\
    \n```\n$ pytest -v -x\n============================= test session starts =============================\n\
    platform darwin -- Python 3.8.2, pytest-5.4.1, py-1.8.1, pluggy-0.13.1 -- /usr/local/opt/python@3.8/bin/python3.8\n\
    cachedir: .pytest_cache\nrootdir: /Python-Automation-Cookbook-Second-Edition/Chapter12\n\
    collected 18 items\n\ntests/test_case.py::test_one PASSED                    \
    \               [  5%]\ntests/test_case.py::test_two PASSED                  \
    \                 [ 11%]\ntests/test_case.py::test_three PASSED              \
    \                   [ 16%]\ntests/test_case.py::test_fail FAILED             \
    \                     [ 22%]\n\n============================== FAILURES =================____________\n\
    ______________________________ test_fail _______________________________\n\n \
    \   def test_fail():\n>       assert 4 in LIST\nE       assert 4 in [1, 2, 3]\n\
    \ntests/test_case.py:18: AssertionError\n========================= short test\
    \ summary info ======================\nFAILED tests/test_case.py::test_fail -\
    \ assert 4 in [1, 2, 3]\n!!!!!!!!!!!!!!!!!!!!!!!!!!! stopping after 1 failures\
    \ !!!!!!!!!!!!!!!!!!!!!!!!!!!\n======================== 1 failed, 3 passed in\
    \ 0.38s =========================\n```\n\nWhen developing, it's common to iterate\
    \ through a test or a small number of tests to fix them. In these situations,\
    \ --lf can greatly help to run the whole test suite at once, and then repeat with\
    \ only the failing tests. As the code is fixed, tests that pass will be removed\
    \ from the execution group, until finally the last test passes. Then, --lf will\
    \ run all the tests again.\n\n> With small numbers of tests in a test suite, most\
    \ of this advice won't be necessary, as tests will be very quick. As the number\
    \ of tests increases, using these parameters becomes more important so as to not\
    \ waste time executing tests that are not directly related to the specific part\
    \ of the code being developed. Just remember to run the whole suite once at the\
    \ end to ensure that your changes didn't have a disruptive effect on an unexpected\
    \ part of the code. This is actually something that happens more times than developers\
    \ would like!\n\n### See also\n\n- The *Writing and executing test cases*, earlier\
    \ in this chapter, to learn the basics of how to define tests.\n- The *Testing\
    \ external code*, earlier in this chapter, to learn how to test code in other\
    \ modules.\n\n# 13 Debugging Techniques\n\nIn this chapter, we will cover the\
    \ following recipes:\n\n- Learning Python interpreter basics\n- Debugging through\
    \ logging\n- Debugging with breakpoints\n- Improving your debugging skills\n\n\
    ## Introduction\n\nWriting code is not easy. Actually, it is very hard. Even the\
    \ best programmer in the world can't foresee every possible alternative and flow\
    \ of the code.\n\nThis means that executing our code will always produce surprises\
    \ and unexpected behaviors. Some will be very evident, while others will be very\
    \ subtle, but the ability to identify and remove these defects in the code is\
    \ critical to building solid software.\n\nThese defects in software are known\
    \ as **bugs**, and therefore removing them is called **debugging**.\n\nInspecting\
    \ the code just by reading it and reasoning about its execution image will never\
    \ be enough to cover all the possible outcomes on non-trivial code. There are\
    \ always surprises, and complex code is difficult to follow. That's why the ability\
    \ to debug by stopping execution and taking a look at the current state of things\
    \ is important.\n\n> Everyone, and I mean EVERYONE, introduces bugs in the code,\
    \ only to be surprised by them later. Some people have described debugging as\
    \ being the detective in a crime movie where you are also the murderer.\n\nAny\
    \ debugging process roughly follows this path:\n\n1. You realize there's a problem.\n\
    2. You understand what the correct behavior should be.\n3. You discover why the\
    \ current code produces the bug.\n4. You change the code to produce the proper\
    \ result.\n\n95% of the time, everything but *step 3* is straightforward. *Step\
    \ 3* is the bulk of the debugging process.\n\nRealizing the *why* of a bug, at\
    \ its core, follows a scientific methodology:\n\n1. Measure and observe what the\
    \ code is doing.\n2. Produce a hypothesis on why that is.\n3. Validate or disprove\
    \ the hypothesis, through either a specifically designed experiment (for example,\
    \ a test) or the examination of the execution of a test (which can be considered\
    \ a natural experiment).\n4. Use the resulting information to fix the bug or to\
    \ iterate the process.\n\nDebugging is a skill, and as such, it will improve over\
    \ time. Practice plays an important role in developing intuition on what paths\
    \ look promising to identify an error, but there are some general ideas that may\
    \ help you:\n\n- **Divide and conquer:** Isolate small parts of the code so that\
    \ it is possible to understand the code. Simplify the problem as much as possible.\n\
    \n> There's a format of this method called the **Wolf fence algorithm**, described\
    \ by Eduard Gauss:\n>\n> \"There's one wolf in Alaska; how do you find it? First,\
    \ build a fence down the middle of the state, wait for the wolf to howl, and determine\
    \ which side of the fence it is on. Repeat this process on that side only, until\
    \ you get to the point where you can see the wolf.\"\n\n- **Move backward from\
    \ the error:** If there's a clear error at a specific point, the bug is likely\
    \ located in the surroundings. Move progressively backward from the error, following\
    \ the track until the source of the error is found.\n\n- **You can assume anything\
    \ you want, as long as you prove your assumption is true:** Code is very complex\
    \ to keep in your head all at once. You need to validate small assumptions that,\
    \ when combined, will provide solid ground to move forward with detecting and\
    \ fixing the problem. Make small experiments that allow you to rule out parts\
    \ of the code that work and focus on untested ones.\n\n> Or, in the words of Sherlock\
    \ Holmes:\n> *\"Once you eliminate the impossible, whatever remains, no matter\
    \ how improbable, must be the truth.\"*\n\nRemember to prove any assumption you\
    \ make. Avoid unproven assumptions, as they'll distract you from the location\
    \ of the bug. It's very easy to think that the error happens in one part of the\
    \ code and look at another.\n\n> This may sound a bit scary, but most bugs are\
    \ pretty evident. Maybe a typo, or a piece of code not ready for a particular\
    \ value. Try to keep things simple. Simple code is easier to analyze and debug.\n\
    \nCheck out *Chapter 12, Automatic Testing Routines*, to learn how to work with\
    \ tests. Tests are excellent tools to help you debug, find problems, and add validation\
    \ points. Debugging the code in a defined test allows you to create a small environment\
    \ where you can focus on the expected inputs and outputs and search for bugs.\n\
    \nIn this chapter, we will look at several tools and techniques for debugging\
    \ and apply them specifically to Python scripts. The scripts will contain some\
    \ bugs that we will fix as part of the recipe.\n\n## Learning Python interpreter\
    \ basics\n\nIn this recipe, we'll cover some of Python's built-in capabilities\
    \ to examine code, investigate what's going on, and detect when things are not\
    \ behaving properly.\n\n> We can also verify when things are working as expected.\
    \ Remember that being able to rule out part of the code as the source of a bug\
    \ is incredibly important."
  mdcn: "## 自动化测试流程\n\n第5步展示了如何使用完整文件路径和描述符来指定单个测试。当使用 `-v` 参数时，这很容易从输出中复制：\n\n```\n\
    $ pytest -v tests/test_requests_time.py::test_order_time\n...\ncollected 1 item\n\
    ```\n\n最后，在第6步中，使用了不同的参数 `--lf`。这只会运行上次失败的测试：\n\n```\n$ pytest -v --lf\n...\n\
    collected 11 items / 10 deselected / 1 selected\nrun-last-failure: rerun previous\
    \ 1 failure (skipped 3 files)\n```\n\n如果上次运行没有测试失败，`--lf` 将运行所有测试。\n\n### 更多内容...\n\
    \n请记住，所有这些参数都可以组合使用。例如，`--collect-only` 可以与 `-k` 一起使用，以检查所选测试是否正确。\n\n同样，可以添加多个文件路径和测试。例如：\n\
    \n```\n$ pytest -v tests/test_external.py::test_int_division tests/test_requests.py\n\
    ============================= test session starts =============================\n\
    platform darwin -- Python 3.8.2, pytest-5.4.1, py-1.8.1, pluggy-0.13.1 -- /usr/local/opt/python@3.8/bin/python3.8\n\
    cachedir: .pytest_cache\nrootdir: /Python-Automation-Cookbook-Second-Edition/Chapter12\n\
    collected 3 items\ntests/test_external.py::test_int_division PASSED          \
    \             [ 33%]\ntests/test_requests.py::test_order_pizza PASSED        \
    \                [ 66%]\ntests/test_requests.py::test_order_pizza_timeout PASSED\
    \                [100%]\n============================== 3 passed in 0.11s ===============================\n\
    ```\n\n当测试数量增长时，收集测试可能需要相当长的时间。当测试数量达到数百或数千个时，使用 `-k` 进行收集和过滤可能需要很长时间，以至于延迟测试的执行（半分钟或更长时间）。因此，了解如何通过指定要收集测试的文件来减少收集的测试数量非常重要。\n\
    \n要在检测到失败时停止测试执行，请使用参数 `-x`：\n\n```\n$ pytest -v -x\n=============================\
    \ test session starts =============================\nplatform darwin -- Python\
    \ 3.8.2, pytest-5.4.1, py-1.8.1, pluggy-0.13.1 -- /usr/local/opt/python@3.8/bin/python3.8\n\
    cachedir: .pytest_cache\nrootdir: /Python-Automation-Cookbook-Second-Edition/Chapter12\n\
    collected 18 items\n\ntests/test_case.py::test_one PASSED                    \
    \               [  5%]\ntests/test_case.py::test_two PASSED                  \
    \                 [ 11%]\ntests/test_case.py::test_three PASSED              \
    \                   [ 16%]\ntests/test_case.py::test_fail FAILED             \
    \                     [ 22%]\n\n============================== FAILURES =================____________\n\
    ______________________________ test_fail _______________________________\n\n \
    \   def test_fail():\n>       assert 4 in LIST\nE       assert 4 in [1, 2, 3]\n\
    \ntests/test_case.py:18: AssertionError\n========================= short test\
    \ summary info ======================\nFAILED tests/test_case.py::test_fail -\
    \ assert 4 in [1, 2, 3]\n!!!!!!!!!!!!!!!!!!!!!!!!!!! stopping after 1 failures\
    \ !!!!!!!!!!!!!!!!!!!!!!!!!!!\n======================== 1 failed, 3 passed in\
    \ 0.38s =========================\n```\n\n在开发过程中，通常会对一个或少数几个测试进行迭代以修复它们。在这些情况下，`--lf`\
    \ 可以极大地帮助一次性运行整个测试套件，然后仅重复运行失败的测试。随着代码的修复，通过的测试将从执行组中移除，直到最后一个测试通过。然后，`--lf` 将再次运行所有测试。\n\
    \n> 当测试套件中的测试数量较少时，这些建议大多没有必要，因为测试会非常快。随着测试数量的增加，使用这些参数变得更加重要，以避免浪费时间执行与正在开发的代码特定部分没有直接关系的测试。只需记住在最后运行一次整个套件，以确保您的更改没有对代码的意外部分产生破坏性影响。实际上，这种情况发生的次数比开发者希望的要多！\n\
    \n### 另请参阅\n\n- 本章前面的 *编写和执行测试用例*，了解如何定义测试的基础知识。\n- 本章前面的 *测试外部代码*，了解如何测试其他模块中的代码。\n\
    \n# 13 调试技术\n\n在本章中，我们将介绍以下内容：\n\n- 学习 Python 解释器基础\n- 通过日志记录进行调试\n- 使用断点进行调试\n\
    - 提高您的调试技能\n\n## 简介\n\n编写代码并不容易。实际上，它非常困难。即使是世界上最好的程序员也无法预见代码的所有可能替代方案和流程。\n\n\
    这意味着执行我们的代码总会产生意外和意想不到的行为。有些会非常明显，而有些则非常微妙，但识别和消除代码中这些缺陷的能力对于构建可靠的软件至关重要。\n\n\
    软件中的这些缺陷被称为 **bug**，因此消除它们被称为 **debugging**。\n\n仅仅通过阅读代码并推理其执行图像来检查代码，永远不足以涵盖非平凡代码的所有可能结果。总会有意外，复杂的代码很难跟踪。这就是为什么通过停止执行并查看当前状态来进行调试的能力很重要。\n\
    \n> 每个人，我是说每个人，都会在代码中引入 bug，然后在之后对它们感到惊讶。有些人将调试描述为在犯罪电影中扮演侦探，而你自己也是凶手。\n\n任何调试过程大致遵循以下路径：\n\
    \n1.  你意识到有一个问题。\n2.  你理解正确的行为应该是什么。\n3.  你发现为什么当前代码会产生 bug。\n4.  你更改代码以产生正确的结果。\n\
    \n95% 的时间里，除了 *第3步* 之外的一切都很直接。*第3步* 是调试过程的主体。\n\n理解 bug 的 *为什么*，其核心遵循科学方法：\n\n\
    1.  测量和观察代码正在做什么。\n2.  对为什么会产生这种情况提出假设。\n3.  通过专门设计的实验（例如，测试）或检查测试的执行（可视为自然实验）来验证或反驳假设。\n\
    4.  使用所得信息来修复 bug 或迭代该过程。\n\n调试是一项技能，因此它会随着时间的推移而提高。实践在培养识别错误的直觉方面起着重要作用，但有一些通用的想法可能对你有所帮助：\n\
    \n-   **分而治之：** 隔离代码的小部分，以便能够理解代码。尽可能简化问题。\n\n> 这种方法有一种形式叫做 **Wolf fence 算法**，由\
    \ Eduard Gauss 描述：\n>\n> “阿拉斯加有一只狼；你怎么找到它？首先，在该州中间建一道围栏，等待狼嚎叫，然后确定它在围栏的哪一边。仅在该侧重复此过程，直到你能看到狼。”\n\
    \n-   **从错误向后追溯：** 如果在特定点有一个明确的错误，那么 bug 很可能位于其周围。从错误开始逐步向后追溯，沿着轨迹直到找到错误的来源。\n\
    \n-   **你可以假设任何你想要的东西，只要证明你的假设是正确的：** 代码非常复杂，无法一次性全部记在脑子里。你需要验证小的假设，当它们组合在一起时，将为检测和修复问题提供坚实的基础。进行小实验，让你能够排除代码中工作的部分，并专注于未测试的部分。\n\
    \n> 或者，用 Sherlock Holmes 的话说：\n> *“一旦你排除了不可能，剩下的无论多么不可能，都一定是真相。”*\n\n记住要证明你做出的任何假设。避免未经证实的假设，因为它们会使你偏离\
    \ bug 的位置。很容易认为错误发生在代码的一部分，却去看另一部分。\n\n> 这听起来可能有点吓人，但大多数 bug 都相当明显。也许是一个拼写错误，或者一段代码没有为特定值做好准备。尽量保持事情简单。简单的代码更容易分析和调试。\n\
    \n查看 *第12章，自动化测试流程*，了解如何使用测试。测试是帮助你调试、发现问题和添加验证点的绝佳工具。在定义的测试中调试代码允许你创建一个小型环境，你可以专注于预期的输入和输出，并搜索\
    \ bug。\n\n在本章中，我们将研究几种调试工具和技术，并将其专门应用于 Python 脚本。这些脚本将包含一些 bug，我们将在本教程中修复它们。\n\
    \n## 学习 Python 解释器基础\n\n在本教程中，我们将介绍 Python 的一些内置功能，用于检查代码、调查发生了什么以及检测何时行为不正常。\n\
    \n> 我们也可以验证事情是否按预期工作。请记住，能够排除代码的一部分作为 bug 的来源是极其重要的。"
