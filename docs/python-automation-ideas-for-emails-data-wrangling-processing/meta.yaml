  md: "# Cleaning and Processing Data\n\nIt uses the CSV `DictReader` class to transform\
    \ each of the rows into a dictionary. The dictionary is then passed for processing.\
    \ The resulting rows are stored in the output CSV file using a `DictWriter` class.\
    \ The header for the fields of the output file is obtained from the keys in the\
    \ dictionary of the first output row.\n\nThe usage of `DictReader` and `DictWriter`\
    \ was already described in *Chapter 6, Fun with Spreadsheets*.\n\nThe most interesting\
    \ code is in `add_price_by_location`. This code will detect the country (USA or\
    \ Canada) based on their location code. Let's take a look:\n\n```\nUS_LOCATIONS\
    \ = ['AL', 'AK', ..., 'WY', 'DC']\nCAD_LOCATIONS = ['AB', 'BC', ..., 'NU', 'YT']\n\
    CAD_TO_USD = Decimal(0.76)\n\ndef add_price_by_location(row):\n    location =\
    \ row['LOCATION']\n    if location in US_LOCATIONS:\n        row['COUNTRY'] =\
    \ 'USA'\n        row['CURRENCY'] = 'USD'\n        row['USD'] = Decimal(row['PRICE'])\n\
    \    elif location in CAD_LOCATIONS:\n        row['COUNTRY'] = 'CANADA'\n    \
    \    row['CURRENCY'] = 'CAD'\n        row['USD'] = Decimal(row['PRICE']) * CAD_TO_USD\n\
    \    else:\n        raise Exception('Location not found')\n\n    return row\n\
    ```\n\nBased on the location, it derives the currency. Note that the two-letter\
    \ codes for Canadian provinces and territories and for US states are described\
    \ in two lists. The full description of each is in the `CAD_LOCATIONS` and `US_LOCATIONS`\
    \ arrays. If the detected location is a US state, the currency is set to US dollars,\
    \ and it's set to Canadian dollars for all the provinces and territories in Canada.\n\
    \n> It's very convenient that US states and Canadian provinces have different\
    \ unique codes, making them easy to distinguish. In other systems, this may be\
    \ more complicated."
