  md: '# Building Your First Web Scraping Application


    At its core, RSS is a way of presenting a succession of ordered references (typically
    articles, but also other elements such as podcast episodes or YouTube publications)
    and publishing times. This makes for a very natural way of learning what articles
    are new since the last check, as well as presenting some structured data about
    them, such as the title and a summary.


    In this recipe, we will present the `feedparser` module and determine how to obtain
    data from an RSS feed.


    > RSS is not the only available feed format. There''s also a format called Atom,
    but Atom and RSS are more or less the same. `feedparser` is also capable of parsing
    Atom, so both formats can be processed in the same way.


    # Getting ready


    We need to add the `feedparser` dependency to our `requirements.txt` file and
    reinstall it:


    ```

    $ echo "feedparser==5.2.1" >> requirements.txt

    $ pip install -r requirements.txt

    ```


    Feed URLs can be found on almost all pages that deal with publications, including
    blogs, news, podcasts, and so on. Sometimes they are very easy to find, but sometimes
    they are a little bit hidden. Search for `feed` or `RSS`.


    Most newspapers and news agencies have their RSS feeds divided by themes. For
    our example, we''ll parse the **New York Times** main page feed, `https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml`.
    There are more feeds available on the main feed page: `https://archive.nytimes.com/www.nytimes.com/services/xml/rss/index.html`.


    > Please note that the feeds may be subject to terms and conditions of use. In
    the case of the New York Times, the terms and conditions are described at the
    end of the main feed page.'
