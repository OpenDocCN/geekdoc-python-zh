  - '[PAGE 16]


    # How it works...


    Each step performs a specific transformation of the text:


    +   - The first step splits the text into the default separators, whitespaces,
    and new lines. This splits it into individual words with no lines or multiple
    spaces for separation.

    - To replace the digits, we go through every character of each word. For each
    one, if it''s a digit, an ''x'' is returned instead. This is done with two list
    comprehensions, one to run on the list, and another on each word, replacing them
    only if there''s a digit - [''x'' if w.isdigit() else w for w in word]. Note that
    the words are joined together again.

    - Each of the words is encoded into an ASCII byte sequence and decoded back again
    into the Python string type. Note the use of the errors parameter to force the
    replacement of unknown characters such as ñ.


    > The difference between strings and bytes is not very intuitive at first, especially
    if you never have to worry about multiple languages or encoding transformations.
    In Python 3, there''s a strong separation between strings (internal Python representation)
    and bytes. So most of the tools applicable to strings won''t be available in byte
    objects. Unless you have a good idea of why you need a byte object, always work
    with Python strings. If you need to perform transformations like the one in this
    task, encode and decode in the same line so that you keep your objects within
    the comfortable realm of Python strings. If you are interested in learning more
    about encodings, you can refer to this brief article: https://eli.thegreenplace.net/2012/01/30/the-bytesstr-dichotomy-in-python-3
    and this other, longer and more detailed one: http://www.diveintopython3.net/strings.html.


    +   - The next step adds an extra newline character (the \n character) for all
    words ending with a period. This marks the different paragraphs. After that, it
    creates a line and adds the words one by one. If an extra word will make it go
    over 80 characters, it finishes the line and starts a new one. If the line already
    ends with a new line, it finishes it and starts another one as well. Note that
    there''s an extra space added to separate the words.

    - Finally, each of the lines is capitalized as a Title (the first letter of each
    word is uppercased) and all the lines are joined through new lines.'
  - "[PAGE 17]\n\n# There's more...\n\nSome other useful operations that can be performed\
    \ on strings are as follows:\n\n+   - Strings can be sliced like any other list.\
    \ This means that `\"word\"[0:2]` will return `\"wo\"`.\n- Use `.splitlines()`\
    \ to separate lines with a newline character.\n- There are `.upper()` and `.lower()`\
    \ methods, which return a copy with all of the characters set to uppercase or\
    \ lowercase. Their use is very similar to `.title()`:\n  python\n  >>> 'UPPERCASE'.lower()\n\
    \  'uppercase'\n  \n- For easy replacements (for example, changing all *As to\
    \ Bs* or *changing mine \\ to ours*), use `.replace()`. This method is useful\
    \ for very simple cases, but replacements can get tricky easily. Be careful with\
    \ the order of replacements to avoid collisions and case sensitivity issues. Note\
    \ the wrong replacement in the following example:\n  python\n  >>> 'One ring to\
    \ rule them all, one ring to find them, One ring to bring them all and in the\
    \ darkness bind them.'.replace('ring', 'necklace')\n  'One necklace to rule them\
    \ all, one necklace to find them, One necklace to bnecklace them all and in the\
    \ darkness bind them.'\n  \n\nThis is similar to the issues we'll encounter with\
    \ regular expressions matching unexpected parts of your code. There are more examples\
    \ to follow later. Refer to the regular expressions recipes for more information.\n\
    \n> To wrap text lines, you can use the `textwrap` module included in the standard\
    \ library, instead of manually counting characters. View the documentation here:\
    \ https://docs.python.org/3/library/textwrap.html.\n\nIf you work with multiple\
    \ languages, or with any kind of non-English input, it is very useful to learn\
    \ the basics of Unicode and encodings. In a nutshell, given the vast amount of\
    \ characters in all the different languages in the world, including alphabets\
    \ not related to the Latin one, such as Chinese or Arabic, there's a standard\
    \ to try and cover all of them so that computers can properly understand them.\
    \ Python 3 greatly improved this situation, making the internal objects of the\
    \ strings can deal with all of those characters. The default encoding that Python\
    \ uses, and the most common and compatible one, is currently UTF-8."
- md: "A good article to learn about the basics of UTF-8 is this blog post: https://www.joelonsoftware.com/2003/10/08/the-absolute-minimum-every-software-developer-absolutely-positively-must-know-about-unicode-and-character-sets-no-excuses/.\n\
    \nDealing with encodings is still relevant when reading from external files that\
    \ can be encoded in different encodings (for example, CP-1252 or windows-1252,\
    \ which is a common encoding produced by legacy Microsoft systems, or ISO 8859-15,\
    \ which is the industry standard).\n\n## See also\n\n- The *Creating strings with\
    \ formatted values* recipe, covered earlier in the chapter, to learn the basics\
    \ of string creation.\n- The *Introducing regular expressions* recipe, covered\
    \ later in the chapter, to learn how to detect and extract patterns in text.\n\
    - The *Going deeper into regular expressions* recipe, covered later in the chapter,\
    \ to further your knowledge of regular expressions.\n- The *Dealing with encodings*\
    \ recipe in *Chapter 4, Searching and Reading Local Files*, to learn about different\
    \ kinds of encodings.\n\n## Extracting data from structured strings\n\nIn a lot\
    \ of automated tasks, we'll need to treat input text structured in a known format\
    \ and extract the relevant information. For example, a spreadsheet may define\
    \ a percentage in a piece of text (such as 37.4%) and we want to retrieve it in\
    \ a numerical format to apply it later (0.374, as a float).\n\nIn this recipe,\
    \ we'll learn how to process sale logs that contain inline information about a\
    \ product, such as whether it has been sold, its price, profit made, and other\
    \ information.\n\n## Getting ready\n\nImagine that we need to parse information\
    \ stored in sales logs. We'll use a sales log with the following structure:\n\n\
    ```\n[<Timestamp in iso format>] - SALE - PRODUCT: <product id> - PRICE: $<price\
    \ of the sale>\n```\n\nLet's Begin Our Automation Journey\n\nFor example, a specific\
    \ log may look like this:\n\n```\n[2018-05-05T10:58:41.504054] - SALE - PRODUCT:\
    \ 1345 - PRICE: $09.99\n```\n\nNote that the price has a leading zero. All prices\
    \ will have two digits for the dollars and two for the cents.\n\n> The standard\
    \ ISO 8601 defines standard ways of representing the time and date. It is widely\
    \ used in the computing world and can be parsed and generated by virtually any\
    \ computer language.\n\nWe need to activate our virtual environment before we\
    \ start:\n\n```\n$ source .venv/bin/activate\n```\n\n## How to do it...\n\n1.\
    \ In the Python interpreter, make the following imports. Remember to activate\
    \ your virtualenv, as described in the Creating a virtual environment recipe:\n\
    \    ```python\n    >>> import delorean\n    >>> from decimal import Decimal\n\
    \    ```\n\n2. Enter the log to parse:\n    ```python\n    >>> log = '[2018-05-05T11:07:12.267897]\
    \ - SALE - PRODUCT: 1345 - PRICE: $09.99'\n    ```\n\n3. Split the log into its\
    \ parts, which are divided by ` - ` (note the space before and after the dash).\
    \ We ignore the SALE part as it doesn't add any relevant information:\n    ```python\n\
    \    >>> divide_it = log.split(' - ')\n    >>> timestamp_string, _, product_string,\
    \ price_string = divide_it\n    ```\n\n4. Parse the timestamp into a datetime\
    \ object:\n    ```python\n    >>> timestamp = delorean.parse(timestamp_string.strip('[]'))\n\
    \    ```\n\n5. Parse the product_id into an integer:\n    ```python\n    >>> product_id\
    \ = int(product_string.split(':')[-1])\n    ```\n\n6. Parse the price into a Decimal\
    \ type:\n    ```python\n    >>> price = Decimal(price_string.split('$')[-1])\n\
    \    ```\n\n7. Now you have all of the values in native Python format:\n    ```python\n\
    \    >>> timestamp, product_id, price\n    (Delorean(datetime=datetime.datetime(2018,\
    \ 5, 5, 11, 7, 12, 267897), timezone='UTC'), 1345, Decimal('9.99'))\n    ```\n\
    \n## How it works...\n\nThe basic working of this is to isolate each of the elements\
    \ and then parse them into the proper type. The first step is to split the full\
    \ log into smaller parts. The ` - ` string is a good divider, as it splits it\
    \ into four parts—a timestamp one, one with just the word SALE, the product, and\
    \ the price.\n\nIn the case of the timestamp, we need to isolate the ISO format,\
    \ which is in brackets in the log. That's why the timestamp has the brackets stripped\
    \ from it. We use the delorean module (introduced earlier) to parse it into a\
    \ datetime object.\n\nThe word SALE is ignored. There's no relevant information\
    \ there.\n\nTo isolate the product ID, we split the product part at the colon.\
    \ Then, we parse the last element as an integer:\n```python\n>>> product_string.split(':')\n\
    ['PRODUCT', ' 1345']\n>>> int(' 1345')\n1345\n```\n\nTo divide the price, we use\
    \ the dollar sign as a separator, and parse it as a Decimal character:\n```python\n\
    >>> price_string.split('$')\n['PRICE: ', '09.99']\n>>> Decimal('09.99')\nDecimal('9.99')\n\
    ```\n\nAs described in the next section, do not parse this value into a float\
    \ type, as it will change the precision.\n\n## There's more...\n\nThese log elements\
    \ can be combined together into a single object, helping to parse and aggregate\
    \ them. For example, we could define a class in Python code in the following way:\n\
    ```python\nclass PriceLog(object):\n    def __init__(self, timestamp, product_id,\
    \ price):\n        self.timestamp = timestamp\n        self.product_id = product_id\n\
    \        self.price = price\n    def __repr__(self):\n        return '<PriceLog\
    \ ({}, {}, {})>'.format(self.timestamp,\n                                    \
    \           self.product_id,\n                                               self.price)\n\
    \n    @classmethod\n    def parse(cls, text_log):\n        '''\n        Parse\
    \ from a text log with the format\n        [<Timestamp>] - SALE - PRODUCT: <product\
    \ id> - PRICE: $<price>\n        to a PriceLog object\n        '''\n        divide_it\
    \ = text_log.split(' - ')\n        tmp_string, _, product_string, price_string\
    \ = divide_it\n        timestamp = delorean.parse(tmp_string.strip('[]'))\n  \
    \      product_id = int(product_string.split(':')[-1])\n        price = Decimal(price_string.split('$')[-1])\n\
    \        return cls(timestamp=timestamp, product_id=product_id,\n            \
    \       price=price)\n```\n\nSo, the parsing can be done as follows:\n```python\n\
    >>> log = '[2018-05-05T12:58:59.998903] - SALE - PRODUCT: 897 - PRICE: $17.99'\n\
    >>> PriceLog.parse(log)\n<PriceLog (Delorean(datetime=datetime.datetime(2018,\
    \ 5, 5, 12, 58, 59, 998903), timezone='UTC'), 897, 17.99)>\n```\n\nAvoid using\
    \ float types for prices. Floats numbers have precision problems that may produce\
    \ strange errors when aggregating multiple prices, for example:\n```python\n>>>\
    \ 0.1 + 0.1 + 0.1\n0.30000000000000004\n```\n\nTry these two options to avoid\
    \ any problems:\n\n- **Use integer cents as the base unit:** This means multiplying\
    \ currency inputs by 100 and transforming them into Integers (or whatever fractional\
    \ unit is correct for the currency used). You may still want to change the base\
    \ when displaying them.\n- **Parse into the decimal type:** The Decimal type keeps\
    \ the fixed precision and works as you'd expect. You can find further information\
    \ about the Decimal type in the Python documentation at https://docs.python.org/3.8/library/decimal.html.\n\
    \nIf you use the Decimal type, parse the results directly into Decimal from the\
    \ string. If transforming it first into a float, you can carry the precision errors\
    \ to the new type.\n\n## See also\n\n- The *Creating a virtual environment* recipe,\
    \ covered earlier in the chapter, to learn how to start a virtual environment\
    \ with installed modules.\n- The *Using a third-party tool – parse* recipe, covered\
    \ later in the chapter, to further your knowledge of how to use third-party tools\
    \ to deal with text.\n- The *Introducing regular expressions* recipe, covered\
    \ later in the chapter, to learn how to detect and extract patterns from text.\n\
    - The *Going deeper into regular expressions* recipe, covered later in the chapter,\
    \ to further your knowledge of regular expressions.\n\n## Using a third-party\
    \ tool—parse\n\nWhile manually parsing data, as seen in the previous recipe, works\
    \ very well for small strings, it can be very laborious to tweak the exact formula\
    \ to work with a variety of inputs. What if the input has an extra dash sometimes?\
    \ Or it has a variable length header depending on the size of one of the fields?\n\
    \nA more advanced option is to use regular expressions, as we'll see in the next\
    \ recipe. But there's a great module in Python called parse (https://github.com/richardj0n3s/parse),\
    \ which allows us to reverse format strings. It is a fantastic tool that's powerful,\
    \ easy to use, and greatly improves the readability of code."
  mdcn: "一篇关于 UTF-8 基础知识的好文章是这篇博客文章：https://www.joelonsoftware.com/2003/10/08/the-absolute-minimum-every-software-developer-absolutely-positively-must-know-about-unicode-and-character-sets-no-excuses/。\n\
    \n处理编码在从外部文件读取时仍然很重要，因为这些文件可能采用不同的编码（例如，CP-1252 或 windows-1252，这是旧版 Microsoft\
    \ 系统常见的编码，或者 ISO 8859-15，这是行业标准）。\n\n## 另请参阅\n\n- 本章前面介绍的*使用格式化值创建字符串*方法，以了解字符串创建的基础知识。\n\
    - 本章后面介绍的*正则表达式简介*方法，以学习如何检测和提取文本中的模式。\n- 本章后面介绍的*深入正则表达式*方法，以进一步了解正则表达式。\n- *第\
    \ 4 章，搜索和读取本地文件*中的*处理编码*方法，以了解不同类型的编码。\n\n## 从结构化字符串中提取数据\n\n在许多自动化任务中，我们需要处理以已知格式结构化的输入文本，并提取相关信息。例如，电子表格可能在一段文本中定义了一个百分比（例如\
    \ 37.4%），我们希望以数字格式检索它，以便稍后应用（0.374，作为浮点数）。\n\n在这个方法中，我们将学习如何处理包含产品内联信息的销售日志，例如产品是否已售出、其价格、获得的利润以及其他信息。\n\
    \n## 准备工作\n\n假设我们需要解析存储在销售日志中的信息。我们将使用具有以下结构的销售日志：\n\n```\n[<ISO 格式的时间戳>] - SALE\
    \ - PRODUCT: <产品 ID> - PRICE: $<销售价格>\n```\n\n让我们开始我们的自动化之旅\n\n例如，一个特定的日志可能如下所示：\n\
    \n```\n[2018-05-05T10:58:41.504054] - SALE - PRODUCT: 1345 - PRICE: $09.99\n```\n\
    \n请注意，价格有一个前导零。所有价格都将有两位美元和两位美分。\n\n> 标准 ISO 8601 定义了表示时间和日期的标准方式。它在计算领域被广泛使用，几乎任何计算机语言都可以解析和生成它。\n\
    \n在开始之前，我们需要激活虚拟环境：\n\n```\n$ source .venv/bin/activate\n```\n\n## 如何操作...\n\n\
    1. 在 Python 解释器中，进行以下导入。请记住按照*创建虚拟环境*方法中描述的那样激活您的虚拟环境：\n    ```python\n    >>>\
    \ import delorean\n    >>> from decimal import Decimal\n    ```\n\n2. 输入要解析的日志：\n\
    \    ```python\n    >>> log = '[2018-05-05T11:07:12.267897] - SALE - PRODUCT:\
    \ 1345 - PRICE: $09.99'\n    ```\n\n3. 将日志拆分为其各个部分，这些部分由 ` - ` 分隔（注意破折号前后的空格）。我们忽略\
    \ SALE 部分，因为它不提供任何相关信息：\n    ```python\n    >>> divide_it = log.split(' - ')\n\
    \    >>> timestamp_string, _, product_string, price_string = divide_it\n    ```\n\
    \n4. 将时间戳解析为 datetime 对象：\n    ```python\n    >>> timestamp = delorean.parse(timestamp_string.strip('[]'))\n\
    \    ```\n\n5. 将 product_id 解析为整数：\n    ```python\n    >>> product_id = int(product_string.split(':')[-1])\n\
    \    ```\n\n6. 将价格解析为 Decimal 类型：\n    ```python\n    >>> price = Decimal(price_string.split('$')[-1])\n\
    \    ```\n\n7. 现在您拥有了所有原生 Python 格式的值：\n    ```python\n    >>> timestamp, product_id,\
    \ price\n    (Delorean(datetime=datetime.datetime(2018, 5, 5, 11, 7, 12, 267897),\
    \ timezone='UTC'), 1345, Decimal('9.99'))\n    ```\n\n## 工作原理...\n\n其基本工作原理是隔离每个元素，然后将它们解析为适当的类型。第一步是将完整日志拆分为更小的部分。`\
    \ - ` 字符串是一个很好的分隔符，因为它将其拆分为四个部分——一个时间戳部分、一个仅包含单词 SALE 的部分、产品部分和价格部分。\n\n对于时间戳，我们需要隔离\
    \ ISO 格式，它在日志中位于方括号内。这就是为什么时间戳需要去除方括号。我们使用 delorean 模块（前面已介绍）将其解析为 datetime 对象。\n\
    \n单词 SALE 被忽略。那里没有相关信息。\n\n要隔离产品 ID，我们在冒号处分割产品部分。然后，我们将最后一个元素解析为整数：\n```python\n\
    >>> product_string.split(':')\n['PRODUCT', ' 1345']\n>>> int(' 1345')\n1345\n\
    ```\n\n要分割价格，我们使用美元符号作为分隔符，并将其解析为 Decimal 字符：\n```python\n>>> price_string.split('$')\n\
    ['PRICE: ', '09.99']\n>>> Decimal('09.99')\nDecimal('9.99')\n```\n\n如下一节所述，不要将此值解析为\
    \ float 类型，因为它会改变精度。\n\n## 更多内容...\n\n这些日志元素可以组合成一个单一对象，有助于解析和聚合它们。例如，我们可以在 Python\
    \ 代码中以以下方式定义一个类：\n```python\nclass PriceLog(object):\n    def __init__(self, timestamp,\
    \ product_id, price):\n        self.timestamp = timestamp\n        self.product_id\
    \ = product_id\n        self.price = price\n    def __repr__(self):\n        return\
    \ '<PriceLog ({}, {}, {})>'.format(self.timestamp,\n                         \
    \                      self.product_id,\n                                    \
    \           self.price)\n\n    @classmethod\n    def parse(cls, text_log):\n \
    \       '''\n        从格式为\n        [<时间戳>] - SALE - PRODUCT: <产品 ID> - PRICE:\
    \ $<价格>\n        的文本日志解析为 PriceLog 对象\n        '''\n        divide_it = text_log.split('\
    \ - ')\n        tmp_string, _, product_string, price_string = divide_it\n    \
    \    timestamp = delorean.parse(tmp_string.strip('[]'))\n        product_id =\
    \ int(product_string.split(':')[-1])\n        price = Decimal(price_string.split('$')[-1])\n\
    \        return cls(timestamp=timestamp, product_id=product_id,\n            \
    \       price=price)\n```\n\n因此，解析可以如下进行：\n```python\n>>> log = '[2018-05-05T12:58:59.998903]\
    \ - SALE - PRODUCT: 897 - PRICE: $17.99'\n>>> PriceLog.parse(log)\n<PriceLog (Delorean(datetime=datetime.datetime(2018,\
    \ 5, 5, 12, 58, 59, 998903), timezone='UTC'), 897, 17.99)>\n```\n\n避免对价格使用 float\
    \ 类型。浮点数存在精度问题，在聚合多个价格时可能会产生奇怪的错误，例如：\n```python\n>>> 0.1 + 0.1 + 0.1\n0.30000000000000004\n\
    ```\n\n尝试以下两个选项以避免任何问题：\n\n- **使用整数美分作为基本单位：** 这意味着将货币输入乘以 100 并将其转换为整数（或所用货币的任何正确分数单位）。在显示时，您可能仍希望更改基本单位。\n\
    - **解析为 Decimal 类型：** Decimal 类型保持固定精度，并按预期工作。您可以在 Python 文档 https://docs.python.org/3.8/library/decimal.html\
    \ 中找到有关 Decimal 类型的更多信息。\n\n如果您使用 Decimal 类型，请直接从字符串将结果解析为 Decimal。如果先将其转换为 float，您可能会将精度错误带入新类型。\n\
    \n## 另请参阅\n\n- 本章前面介绍的*创建虚拟环境*方法，以了解如何启动具有已安装模块的虚拟环境。\n- 本章后面介绍的*使用第三方工具——parse*方法，以进一步了解如何使用第三方工具处理文本。\n\
    - 本章后面介绍的*正则表达式简介*方法，以学习如何检测和提取文本中的模式。\n- 本章后面介绍的*深入正则表达式*方法，以进一步了解正则表达式。\n\n\
    ## 使用第三方工具——parse\n\n虽然手动解析数据（如前一个方法所示）对于小字符串非常有效，但要调整精确公式以适应各种输入可能非常费力。如果输入有时多了一个破折号怎么办？或者它有一个可变长度的头部，取决于其中一个字段的大小怎么办？\n\
    \n一个更高级的选项是使用正则表达式，正如我们将在下一个方法中看到的那样。但 Python 中有一个很棒的模块叫做 parse (https://github.com/richardj0n3s/parse)，它允许我们反转格式字符串。这是一个强大的工具，易于使用，并大大提高了代码的可读性。"
