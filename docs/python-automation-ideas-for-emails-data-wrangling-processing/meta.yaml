  - '[PAGE 22]


    Try these two options to avoid any problems:


    +   - **Use integer cents as the base unit:** This means multiplying currency
    inputs by 100 and transforming them into Integers (or whatever fractional unit
    is correct for the currency used). You may still want to change the base when
    displaying them.

    - **Parse into the decimal type:** The Decimal type keeps the fixed precision
    and works as you''d expect. You can find further information about the Decimal
    type in the Python documentation at https://docs.python.org/3.8/library/decimal.html.


    If you use the Decimal type, parse the results directly into Decimal from the
    string. If transforming it first into a float, you can carry the precision errors
    to the new type.


    # See also


    +   - The *Creating a virtual environment* recipe, covered earlier in the chapter,
    to learn how to start a virtual environment with installed modules.

    - The *Using a third-party tool – parse* recipe, covered later in the chapter,
    to further your knowledge of how to use third-party tools to deal with text.

    - The *Introducing regular expressions* recipe, covered later in the chapter,
    to learn how to detect and extract patterns from text.

    - The *Going deeper into regular expressions* recipe, covered later in the chapter,
    to further your knowledge of regular expressions.


    # Using a third-party tool—parse


    While manually parsing data, as seen in the previous recipe, works very well for
    small strings, it can be very laborious to tweak the exact formula to work with
    a variety of inputs. What if the input has an extra dash sometimes? Or it has
    a variable length header depending on the size of one of the fields?


    A more advanced option is to use regular expressions, as we''ll see in the next
    recipe. But there''s a great module in Python called parse (https://github.com/richardj0n3s/parse),
    which allows us to reverse format strings. It is a fantastic tool that''s powerful,
    easy to use, and greatly improves the readability of code.'
- md: "## Getting ready\n\nAdd the `parse` module to the `requirements.txt` file in\
    \ our virtual environment and reinstall the dependencies, as shown in the *Creating\
    \ a virtual environment* recipe.\n\nThe `requirements.txt` file should look like\
    \ this:\n\n```\ndelorean==1.0.0\nrequests==2.22.0\nparse==1.14.0\n```\n\nThen,\
    \ reinstall the modules in the virtual environment:\n\n```\n$ pip install -r requirements.txt\n\
    ...\nCollecting parse==1.14.0\n  Downloading https://files.pythonhosted.org/packages/4a/ea/9a16ff916752241aa80f1a5ec56dc6c6defc5d0e70af2d16904a9573367f/parse-1.14.0.tar.gz\n\
    ...\nInstalling collected packages: parse\n  Running setup.py install for parse\
    \ ... done\nSuccessfully installed parse-1.14.0\n```\n\n## How to do it...\n\n\
    1. Import the `parse` function:\n   ```python\n   >>> from parse import parse\n\
    \   ```\n\n2. Define the log to parse, in the same format as in the *Extracting\
    \ data from structured strings* recipe:\n   ```python\n   >>> LOG = '[2018-05-06T12:58:00.714611]\
    \ - SALE - PRODUCT: 1345 - PRICE: $09.99'\n   ```\n\n3. Analyze it and describe\
    \ it as you would do when trying to print it, like this:\n   ```python\n   >>>\
    \ FORMAT = '[{date}] - SALE - PRODUCT: {product} - PRICE: ${price}'\n   ```\n\n\
    4. Run `parse` and check the results:\n   ```python\n   >>> result = parse(FORMAT,\
    \ LOG)\n   >>> result\n   <Result () {'date': '2018-05-06T12:58:00.714611', 'product':\
    \ '1345', 'price': '09.99'}>\n   >>> result['date']\n   '2018-05-06T12:58:00.714611'\n\
    \   >>> result['product']\n   '1345'\n   >>> result['price']\n   '09.99'\n   ```\n\
    \n5. Note the results are all strings. Define the types to be parsed:\n   ```python\n\
    \   >>> FORMAT = '[{date:ti}] - SALE - PRODUCT: {product:d} - PRICE: ${price:05.2f}'\n\
    \   ```\n\n6. Parse once again:\n   ```python\n   >>> result = parse(FORMAT, LOG)\n\
    \   >>> result\n   <Result () {'date': datetime.datetime(2018, 5, 6, 12, 58, 0,\
    \ 714611), 'product': 1345, 'price': 9.99}>\n   >>> result['date']\n   datetime.datetime(2018,\
    \ 5, 6, 12, 58, 0, 714611)\n   >>> result['product']\n   1345\n   >>> result['price']\n\
    \   9.99\n   ```\n\n7. Define a custom type for the price to avoid issues with\
    \ the float type:\n   ```python\n   >>> from decimal import Decimal\n   >>> def\
    \ price(string):\n   ...     return Decimal(string)\n   ...\n   >>> FORMAT = '[{date:ti}]\
    \ - SALE - PRODUCT: {product:d} - PRICE: ${price:price}'\n   >>> parse(FORMAT,\
    \ LOG, {'price': price})\n   <Result () {'date': datetime.datetime(2018, 5, 6,\
    \ 12, 58, 0, 714611), 'product': 1345, 'price': Decimal('9.99')}>\n   ```\n\n\
    ## How it works...\n\nThe parse module allows us to define a format, as a string,\
    \ that reverses the format method when parsing values. A lot of the concepts that\
    \ we discussed when creating strings apply here—put values in brackets, define\
    \ the type after a colon, and so on.\n\nBy default, as seen in *step 4*, the values\
    \ are parsed as strings. This is a good starting point when analyzing text. The\
    \ values can be parsed into more useful native types, as shown in *steps 5 and\
    \ 6* in the *How to do it* section. Please note that while most of the parsing\
    \ types are the same as the ones in the Python Format Specification mini-language,\
    \ there are some others available, such as `ti` for timestamps in ISO format.\n\
    \n> Though we are using timestamp in this book in a more liberal way as a replacement\
    \ for \"Date and time,\" in the strictest sense, it should only be used for numeric\
    \ formats, such as *Unix timestamp* or *epoch*, defined as the number of seconds\
    \ since a particular time.\n\nThe usage of a timestamp that includes other formats\
    \ is common anyway as it's a clear and understandable concept, but be sure to\
    \ agree to formats when sharing information with others.\n\nIf native types are\
    \ not enough, our own parsing can be defined, as demonstrated in *step 7* of the\
    \ *How to do it* section. Note that the definition of the `price` function gets\
    \ a string and returns the proper format, in this case, a `Decimal` type.\n\n\
    All the issues about floats and price information described in the *There's more*\
    \ section of the *Extracting data from structured strings* recipe apply here as\
    \ well.\n\n## There's more...\n\nThe timestamp can also be translated into a `delorean`\
    \ object for consistency. Also, `delorean` objects carry over time zone information.\
    \ Adding the same structure as in the previous recipe gives the following object,\
    \ which is capable of parsing logs:\n\n```python\nimport parse\nfrom decimal import\
    \ Decimal\nimport delorean\n\nclass PriceLog(object):\n    def __init__(self,\
    \ timestamp, product_id, price):\n        self.timestamp = timestamp\n       \
    \ self.product_id = product_id\n        self.price = price\n\n    def __repr__(self):\n\
    \        return '<PriceLog ({}, {}, {})>'.format(self.timestamp,\n           \
    \                                    self.product_id,\n                      \
    \                         self.price)\n\n    @classmethod\n    def parse(cls,\
    \ text_log):\n        '''\n        Parse from a text log with the format\n   \
    \     [<Timestamp>] - SALE - PRODUCT: <product id> - PRICE: $<price>\n       \
    \ to a PriceLog object\n        '''\n        def price(string):\n            return\
    \ Decimal(string)\n        def isodate(string):\n            return delorean.parse(string)\n\
    \        FORMAT = ('[{timestamp:isodate}] - SALE - PRODUCT: {product:d}'\n   \
    \               ' - PRICE: ${price:price}')\n        formats = {'price': price,\
    \ 'isodate': isodate}\n        result = parse.parse(FORMAT, text_log, formats)\n\
    \        return cls(timestamp=result['timestamp'],\n                   product_id=result['product'],\n\
    \                   price=result['price'])\n```\n\nSo, parsing it returns similar\
    \ results:\n\n```python\n>>> log = '[2018-05-06T14:58:59.051545] - SALE - PRODUCT:\
    \ 827 - PRICE: $22.25'\n>>> PriceLog.parse(log)\n<PriceLog (Delorean(datetime=datetime.datetime(2018,\
    \ 6, 5, 14, 58, 59, 51545), timezone='UTC')), 827, 22.25)>\n```\n\nThis code is\
    \ contained in the GitHub file, https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter01/price_log.py\n\
    \nAll supported parse types can be found in the documentation at https://github.com/r1chardj0n3s/parse#format-specification.\n\
    \n## See also\n\n- The *Extracting data from structured strings* recipe, covered\
    \ earlier in this chapter, to learn how to use simple processes to get information\
    \ from text.\n- The *Introducing regular expressions* recipe, covered later in\
    \ this chapter, to learn how to detect and extract patterns from text.\n- The\
    \ *Going deeper into regular expressions* recipe, covered later in this chapter,\
    \ to further your knowledge of regular expressions.\n\n## Introducing regular\
    \ expressions\n\nA **regular expression**, or **regex**, is a pattern to *match*\
    \ text. In other words, it allows us to define an **abstract string** (typically,\
    \ the definition of a structured kind of text) to check with other strings to\
    \ see if they match or not.\n\nIt is better to describe them with an example.\
    \ Think of defining a pattern of text as *a word that starts with an uppercase\
    \ A and contains only lowercase \"n\"s and \"a\"s after that.* Let's show some\
    \ possible comparisons and results:\n\n| Text to compare | Result |\n|---|---|\n\
    | Anna | Match |\n| Bob | No match (No initial A) |\n| Alice | No match (I is\
    \ not n or a after initial A) |\n| James | No match (No initial A) |\n| Aaan |\
    \ Match |\n| Ana | Match |\n| Annnn | Match |\n| Aaaan | Match |\n| ANNA | No\
    \ match (N is not n or a) |\n\nTable 1.1: A pattern matching example\n\nIf this\
    \ sounds complicated, that's because it is. Regexes can be notoriously complicated\
    \ because they may be incredibly intricate and difficult to follow. But they are\
    \ also very useful because they allow us to perform incredibly powerful pattern\
    \ matching.\n\nSome common uses of regexes are:\n\n- **Validating input data:**\
    \ For example, a phone number that is only numbers, dashes, and brackets.\n- **String\
    \ parsing:** Retrieve data from structured strings, such as logs or URLs. This\
    \ is similar to what's described in the previous recipe.\n- **Scrapping:** Find\
    \ the occurrences of something in a long piece of text. For example, find all\
    \ of the emails in a web page.\n- **Replacement:** Find and replace a word or\
    \ words with others. For example, replace *the owner* with *John Smith*."
  mdcn: "## 准备工作\n\n将 `parse` 模块添加到我们虚拟环境中的 `requirements.txt` 文件，并重新安装依赖项，如 *创建虚拟环境*\
    \ 配方中所示。\n\n`requirements.txt` 文件应如下所示：\n\n```\ndelorean==1.0.0\nrequests==2.22.0\n\
    parse==1.14.0\n```\n\n然后，在虚拟环境中重新安装模块：\n\n```\n$ pip install -r requirements.txt\n\
    ...\nCollecting parse==1.14.0\n  Downloading https://files.pythonhosted.org/packages/4a/ea/9a16ff916752241aa80f1a5ec56dc6c6defc5d0e70af2d16904a9573367f/parse-1.14.0.tar.gz\n\
    ...\nInstalling collected packages: parse\n  Running setup.py install for parse\
    \ ... done\nSuccessfully installed parse-1.14.0\n```\n\n## 如何做...\n\n1. 导入 `parse`\
    \ 函数：\n   ```python\n   >>> from parse import parse\n   ```\n\n2. 定义要解析的日志，格式与\
    \ *从结构化字符串中提取数据* 配方中的相同：\n   ```python\n   >>> LOG = '[2018-05-06T12:58:00.714611]\
    \ - SALE - PRODUCT: 1345 - PRICE: $09.99'\n   ```\n\n3. 分析它，并像尝试打印它时那样进行描述，如下所示：\n\
    \   ```python\n   >>> FORMAT = '[{date}] - SALE - PRODUCT: {product} - PRICE:\
    \ ${price}'\n   ```\n\n4. 运行 `parse` 并检查结果：\n   ```python\n   >>> result = parse(FORMAT,\
    \ LOG)\n   >>> result\n   <Result () {'date': '2018-05-06T12:58:00.714611', 'product':\
    \ '1345', 'price': '09.99'}>\n   >>> result['date']\n   '2018-05-06T12:58:00.714611'\n\
    \   >>> result['product']\n   '1345'\n   >>> result['price']\n   '09.99'\n   ```\n\
    \n5. 注意结果都是字符串。定义要解析的类型：\n   ```python\n   >>> FORMAT = '[{date:ti}] - SALE -\
    \ PRODUCT: {product:d} - PRICE: ${price:05.2f}'\n   ```\n\n6. 再次解析：\n   ```python\n\
    \   >>> result = parse(FORMAT, LOG)\n   >>> result\n   <Result () {'date': datetime.datetime(2018,\
    \ 5, 6, 12, 58, 0, 714611), 'product': 1345, 'price': 9.99}>\n   >>> result['date']\n\
    \   datetime.datetime(2018, 5, 6, 12, 58, 0, 714611)\n   >>> result['product']\n\
    \   1345\n   >>> result['price']\n   9.99\n   ```\n\n7. 为价格定义一个自定义类型，以避免浮点类型的问题：\n\
    \   ```python\n   >>> from decimal import Decimal\n   >>> def price(string):\n\
    \   ...     return Decimal(string)\n   ...\n   >>> FORMAT = '[{date:ti}] - SALE\
    \ - PRODUCT: {product:d} - PRICE: ${price:price}'\n   >>> parse(FORMAT, LOG, {'price':\
    \ price})\n   <Result () {'date': datetime.datetime(2018, 5, 6, 12, 58, 0, 714611),\
    \ 'product': 1345, 'price': Decimal('9.99')}>\n   ```\n\n## 工作原理...\n\n`parse`\
    \ 模块允许我们定义一个格式字符串，该字符串在解析值时反转 `format` 方法。我们在创建字符串时讨论的许多概念都适用——将值放在括号中，在冒号后定义类型，等等。\n\
    \n默认情况下，如 *步骤 4* 所示，值被解析为字符串。这是分析文本时的一个良好起点。值可以被解析为更有用的原生类型，如 *如何做* 部分的 *步骤 5\
    \ 和 6* 所示。请注意，虽然大多数解析类型与 Python 格式规范迷你语言中的类型相同，但也有一些其他可用类型，例如用于 ISO 格式时间戳的 `ti`。\n\
    \n> 虽然我们在本书中更宽泛地使用时间戳作为“日期和时间”的替代，但在最严格的意义上，它应该只用于数字格式，例如 *Unix 时间戳* 或 *纪元*，定义为自特定时间以来的秒数。\n\
    \n无论如何，使用包含其他格式的时间戳是很常见的，因为它是一个清晰易懂的概念，但在与他人共享信息时，请务必就格式达成一致。\n\n如果原生类型不够用，我们可以定义自己的解析，如\
    \ *如何做* 部分的 *步骤 7* 所示。请注意，`price` 函数的定义接收一个字符串并返回适当的格式，在本例中是 `Decimal` 类型。\n\n\
    *从结构化字符串中提取数据* 配方的 *更多内容* 部分中描述的所有关于浮点数和价格信息的问题也适用于此。\n\n## 更多内容...\n\n时间戳也可以转换为\
    \ `delorean` 对象以保持一致性。此外，`delorean` 对象携带时区信息。添加与前一个配方相同的结构，得到以下对象，该对象能够解析日志：\n\
    \n```python\nimport parse\nfrom decimal import Decimal\nimport delorean\n\nclass\
    \ PriceLog(object):\n    def __init__(self, timestamp, product_id, price):\n \
    \       self.timestamp = timestamp\n        self.product_id = product_id\n   \
    \     self.price = price\n\n    def __repr__(self):\n        return '<PriceLog\
    \ ({}, {}, {})>'.format(self.timestamp,\n                                    \
    \           self.product_id,\n                                               self.price)\n\
    \n    @classmethod\n    def parse(cls, text_log):\n        '''\n        Parse\
    \ from a text log with the format\n        [<Timestamp>] - SALE - PRODUCT: <product\
    \ id> - PRICE: $<price>\n        to a PriceLog object\n        '''\n        def\
    \ price(string):\n            return Decimal(string)\n        def isodate(string):\n\
    \            return delorean.parse(string)\n        FORMAT = ('[{timestamp:isodate}]\
    \ - SALE - PRODUCT: {product:d}'\n                  ' - PRICE: ${price:price}')\n\
    \        formats = {'price': price, 'isodate': isodate}\n        result = parse.parse(FORMAT,\
    \ text_log, formats)\n        return cls(timestamp=result['timestamp'],\n    \
    \               product_id=result['product'],\n                   price=result['price'])\n\
    ```\n\n因此，解析它会返回类似的结果：\n\n```python\n>>> log = '[2018-05-06T14:58:59.051545] -\
    \ SALE - PRODUCT: 827 - PRICE: $22.25'\n>>> PriceLog.parse(log)\n<PriceLog (Delorean(datetime=datetime.datetime(2018,\
    \ 6, 5, 14, 58, 59, 51545), timezone='UTC')), 827, 22.25)>\n```\n\n此代码包含在 GitHub\
    \ 文件中，https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter01/price_log.py\n\
    \n所有支持的解析类型可以在文档中找到：https://github.com/r1chardj0n3s/parse#format-specification。\n\
    \n## 另请参阅\n\n- 本章前面介绍的 *从结构化字符串中提取数据* 配方，了解如何使用简单过程从文本中获取信息。\n- 本章后面介绍的 *正则表达式简介*\
    \ 配方，了解如何从文本中检测和提取模式。\n- 本章后面介绍的 *深入正则表达式* 配方，以进一步了解正则表达式。\n\n## 正则表达式简介\n\n**正则表达式**，或\
    \ **regex**，是一种用于 *匹配* 文本的模式。换句话说，它允许我们定义一个 **抽象字符串**（通常是一种结构化文本的定义），以检查其他字符串是否匹配。\n\
    \n最好用一个例子来描述它们。想象定义一个文本模式，即 *一个以大写 A 开头，之后仅包含小写 \"n\" 和 \"a\" 的单词。* 让我们展示一些可能的比较和结果：\n\
    \n| 要比较的文本 | 结果 |\n|---|---|\n| Anna | 匹配 |\n| Bob | 不匹配（没有初始 A） |\n| Alice |\
    \ 不匹配（初始 A 后的 I 不是 n 或 a） |\n| James | 不匹配（没有初始 A） |\n| Aaan | 匹配 |\n| Ana | 匹配\
    \ |\n| Annnn | 匹配 |\n| Aaaan | 匹配 |\n| ANNA | 不匹配（N 不是 n 或 a） |\n\n表 1.1：模式匹配示例\n\
    \n如果这听起来很复杂，那是因为它确实如此。正则表达式可能非常复杂，因为它们可能极其错综复杂且难以理解。但它们也非常有用，因为它们允许我们执行极其强大的模式匹配。\n\
    \n正则表达式的一些常见用途包括：\n\n- **验证输入数据：** 例如，一个仅包含数字、破折号和括号的电话号码。\n- **字符串解析：** 从结构化字符串中检索数据，例如日志或\
    \ URL。这与前面配方中描述的内容类似。\n- **抓取：** 在长文本中查找某些内容的出现。例如，查找网页中的所有电子邮件。\n- **替换：** 查找并用其他内容替换一个或多个单词。例如，将\
    \ *the owner* 替换为 *John Smith*。"
