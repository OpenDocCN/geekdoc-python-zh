- md: "## How it works...\n\nThe use of the Twilio client to send messages is very\
    \ straightforward.\n\nIn *step 1*, we import `Client`. We prepare the credentials\
    \ and configure the phone number in *step 2*.\n\n*Step 3* creates the client with\
    \ the proper authentication, and the message is sent in *step 4*.\n\nDealing with\
    \ Communication Channels\n\n> Note that the to number needs to be one of the authenticated\
    \ numbers while you're working in a trial account, or it will produce an error.\
    \ You can add more authenticated numbers; check the Twilio documentation.\n\n\
    All the messages that are sent from a trial account will include that detail in\
    \ the SMS, as you can see in step 5.\n\n## There's more...\n\nIn certain regions\
    \ (US and Canada, at the time of writing this), SMS numbers have the ability to\
    \ send MMS messages, including images. To attach images to the message, add the\
    \ media_url parameter and the URL of the image to send:\n\n```\nclient.messages.create(body='An\
    \ MMS message',\n                     media_url='http://my.image.com/image.png',\n\
    \                     from_=FROM,\n                     to='+your authorised number')\n\
    ```\n\nThe client is based on a RESTful API, and allows you to perform multiple\
    \ operations, such as creating a new phone number or obtaining an available number\
    \ first and then purchasing it:\n\n```\navailable_numbers = client.available_phone_numbers(\"\
    IE\").local.list()\nnumber = available_numbers[0]\nnew_number = client.incoming_phone_numbers.create(phone_number=number.phone_number)\n\
    ```\n\nCheck the documentation for more available actions; most of the dashboard\
    \ point-and-click actions can be performed programmatically.\n\n> Twilio is also\
    \ capable of performing other phone services, such as phone calls and text-to-speech.\
    \ Check it out in the full documentation.\n\nThe full Twilio documentation is\
    \ available here: https://www.twilio.com/docs/.\n\n## See also\n\n- The *Receiving\
    \ SMS* recipe, next, to learn how to receive messages, as well as send them\n\
    - The *Creating a Telegram bot* recipe, later in this chapter, to further your\
    \ knowledge\n\n## Receiving SMS\n\nSMS can also be received and processed automatically.\
    \ This enables services such as delivering information on request (for instance,\
    \ send INFO GOALS to receive the results from the Soccer League), but also more\
    \ complex flows such as in bots, which can have simple conversations with users\
    \ that enable rich services such as remotely configuring a thermostat.\n\n> Each\
    \ time Twilio receives an SMS to one of your registered phone numbers, it performs\
    \ a request to a publicly available URL. This is configured in the Twilio service,\
    \ meaning the code to execute when accessing the URL should be under your control.\
    \ This creates the problem of having this URL available on the internet. That\
    \ means that just your local computer won't work, as it's very unlikely that it\
    \ is addressable externally from your local network. We will use Heroku (http://heroku.com)\
    \ to deliver an available service, but there are other alternatives. The Twilio\
    \ documentation provides examples of using ngrok, which allows for local development\
    \ by creating a tunnel between a public address and your local development environment.\
    \ See here for more details: https://www.twilio.com/blog/2013/10/test-your-webhooks-locally-with-ngrok.html.\n\
    \nThis way of operating is common in communication APIs. It should be noted that\
    \ Twilio has a beta API for WhatsApp, which works in a similar way. Check the\
    \ docs for more information at https://www.twilio.com/docs/sms/whatsapp/quickstart/python.\n\
    \nDealing with Communication Channels\n\n## Getting ready\n\nWe need to create\
    \ an account for Twilio at https://www.twilio.com/. Refer to the *Getting ready*\
    \ section in the *Producing SMS* recipe for detailed instructions.\n\nFor this\
    \ recipe, we will also need to set up a web service in Heroku (https://www.heroku.com/)\
    \ to be able to create a webhook capable of receiving SMS addressed to Twilio.\
    \ Because the main objective of this recipe is the SMS part, we will be concise\
    \ when setting up Heroku, but you can refer to its excellent documentation. It\
    \ is quite easy to use:\n\n1. Create an account in Heroku.\n2. You'll need to\
    \ install the command-line interface for Heroku (instructions for all platforms\
    \ can be found at https://devcenter.heroku.com/articles/getting-started-with-python#set-up)\
    \ and then log in to the command line:\n\n   ```\n   $ heroku login\n   Enter\
    \ your Heroku credentials.\n   Email: your.user@server.com\n   Password:\n   ```\n\
    \n3. Download a basic Heroku template from https://github.com/datademofun/heroku-basic-flask.\
    \ We will use it as a base for our server.\n4. Add the `twilio` client to the\
    \ `requirements.txt` file:\n\n   ```\n   $ echo \"twilio\" >> requirements.txt\n\
    \   ```\n\n5. Replace `app.py` with the one in GitHub at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter09/app.py.\
    \ The key part of this is to obtain the body of the request and send it back with\
    \ some extra information. The code is displayed later in the *How it works...*\
    \ section.\n\n> Replace the python interpreter with the newest supported version\
    \ of python in the file `runtime.txt`. At the time of the writing, this was 3.8.3.\
    \ Check the heroku documentation https://devcenter.heroku.com/articles/python-support#specifying-a-python-version\n\
    \n> You can keep the existing app.py to check the template example and how Heroku\
    \ works. Check out the README at https://github.com/datademofun/heroku-basic-flask.\n\
    \n6. Once done, commit the changes to Git:\n\n   ```\n   $ git add .\n   $ git\
    \ commit -m 'first commit'\n   ```\n\n7. Create a new service in Heroku. It will\
    \ generate a new service name randomly (we used service-name-12345 here). This\
    \ URL is accessible:\n\n   ```\n   $ heroku create\n   Creating app... done, ●\
    \ SERVICE-NAME-12345\n   https://service-name-12345.herokuapp.com/ | https://git.heroku.com/service-name-12345.git\n\
    \   ```\n\n8. Deploy the service. In Heroku, deploying a service pushes the code\
    \ to the remote Git server:\n\n   ```\n   $ git push heroku master\n   ...\n \
    \  remote: Verifying deploy... done.\n   To https://git.heroku.com/service-name-12345.git\n\
    \   b6cd95a..367a994 master -> master\n   ```\n\n9. Check that the service is\
    \ up and running at the webhook URL. Note it is displayed as output in the previous\
    \ step. You can also check it in a browser:\n\n   ```\n   $ curl https://service-name-12345.herokuapp.com/\n\
    \   All working!\n   ```\n\nDealing with Communication Channels\n\n## How to do\
    \ it...\n\n1. Go to Twilio and access the **PHONE NUMBER** section. Configure\
    \ the webhook URL. This will make the URL be called on each received SMS. Go to\
    \ the **Active Numbers** section in **All Products** and **Services** -> **Phone\
    \ Numbers** and fill in the webhook. Note `/sms` at the end of the webhook. Click\
    \ on **Save**:\n\n   ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_341_0.png)\n\n \
    \  Figure 9.10: Configuring phone numbers in Twilio\n\n2. The service is now up\
    \ and running and can be used. Send an SMS to your Twilio phone number; you should\
    \ get an automated response:\n\n   ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_342_0.png)\n\
    \n   Figure 9.11: SMS from Twilio trial account\n\n   Note the blurred parts should\
    \ be replaced with your information.\n\n> If you have a trial account, you can\
    \ only send messages back to one of your authorized phone numbers, so you'll need\
    \ to send the text from them.\n\nDealing with Communication Channels\n\n## How\
    \ it works...\n\nStep 1 sets up the webhook, so Twilio calls your Heroku app when\
    \ receiving an SMS on the phone line.\n\nLet's take a look at the code in `app.py`\
    \ to see how this works. Here it is, redacted for clarity; check the full file\
    \ at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter09/app.py:\n\
    \n```\nfrom flask import Flask, request\nfrom twilio.twiml.messaging_response\
    \ import MessagingResponse\n\napp = Flask(__name__)\n\n@app.route('/')\ndef homepage():\n\
    \    return 'All working!'\n\n@app.route(\"/sms\", methods=['GET', 'POST'])\n\
    def sms_reply():\n    from_number = request.form['From']\n    body = request.form['Body']\n\
    \    resp = MessagingResponse()\n    msg = (f'Awwwww! Thanks so much for your\
    \ message {from_number}, '\n           f'\"{body}\" to you too.')\n    resp.message(msg)\n\
    \    return str(resp)\n\nif __name__ == '__main__':\n    app.run()\n```\n\napp.py\
    \ can be divided into three parts:\n\n- The Python imports at the start of the\
    \ file and startup of the Flask app at the end, which is just setting up Flask\n\
    - The call to homepage, which is generated to test that the server is working\n\
    - sms_reply, which is where the magic happens"
  mdcn: "## 工作原理...\n\n使用 Twilio 客户端发送消息非常直接。\n\n在*步骤 1*中，我们导入 `Client`。在*步骤 2*中，我们准备凭据并配置电话号码。\n\
    \n*步骤 3*使用正确的身份验证创建客户端，然后在*步骤 4*中发送消息。\n\n处理通信渠道\n\n> 请注意，在试用账户下工作时，目标号码必须是已验证的号码之一，否则会产生错误。您可以添加更多已验证的号码；请查阅\
    \ Twilio 文档。\n\n所有从试用账户发送的消息都会在短信中包含该详情，如步骤 5 所示。\n\n## 还有更多...\n\n在某些地区（撰写本文时为美国和加拿大），短信号码能够发送包含图片的\
    \ MMS 消息。要将图片附加到消息中，请添加 `media_url` 参数和要发送的图片 URL：\n\n```\nclient.messages.create(body='An\
    \ MMS message',\n                     media_url='http://my.image.com/image.png',\n\
    \                     from_=FROM,\n                     to='+your authorised number')\n\
    ```\n\n该客户端基于 RESTful API，允许您执行多种操作，例如创建新电话号码或先获取一个可用号码然后购买它：\n\n```\navailable_numbers\
    \ = client.available_phone_numbers(\"IE\").local.list()\nnumber = available_numbers[0]\n\
    new_number = client.incoming_phone_numbers.create(phone_number=number.phone_number)\n\
    ```\n\n查阅文档以获取更多可用操作；大多数仪表板上的点击操作都可以通过编程方式执行。\n\n> Twilio 还能够执行其他电话服务，例如电话呼叫和文本转语音。请在完整文档中查看。\n\
    \n完整的 Twilio 文档可在此处获取：https://www.twilio.com/docs/.\n\n## 另请参阅\n\n- 接下来的*接收短信*食谱，了解如何接收消息以及发送消息\n\
    - 本章后面的*创建 Telegram 机器人*食谱，以进一步扩展您的知识\n\n## 接收短信\n\n短信也可以被接收和自动处理。这使得按需提供信息等服务成为可能（例如，发送\
    \ INFO GOALS 以接收足球联赛的结果），以及更复杂的流程，例如在机器人中，可以与用户进行简单对话，从而实现远程配置恒温器等丰富服务。\n\n> 每次\
    \ Twilio 向您注册的电话号码之一接收短信时，它都会向一个公开可用的 URL 发起请求。这在 Twilio 服务中进行配置，意味着访问该 URL 时执行的代码应由您控制。这带来了该\
    \ URL 需要在互联网上可用的问题。这意味着仅使用您的本地计算机是行不通的，因为它很可能无法从您的本地网络外部寻址。我们将使用 Heroku (http://heroku.com)\
    \ 来提供可用服务，但也有其他替代方案。Twilio 文档提供了使用 ngrok 的示例，它通过在公共地址和您的本地开发环境之间创建隧道来允许本地开发。更多详情请见此处：https://www.twilio.com/blog/2013/10/test-your-webhooks-locally-with-ngrok.html.\n\
    \n这种操作方式在通信 API 中很常见。值得注意的是，Twilio 有一个用于 WhatsApp 的 beta API，其工作方式类似。更多信息请查阅文档：https://www.twilio.com/docs/sms/whatsapp/quickstart/python.\n\
    \n处理通信渠道\n\n## 准备工作\n\n我们需要在 https://www.twilio.com/ 创建一个 Twilio 账户。有关详细说明，请参阅*发送短信*食谱中的*准备工作*部分。\n\
    \n对于本食谱，我们还需要在 Heroku (https://www.heroku.com/) 上设置一个 Web 服务，以便能够创建一个能够接收发送给 Twilio\
    \ 的短信的 webhook。因为本食谱的主要目标是短信部分，我们在设置 Heroku 时会保持简洁，但您可以参考其出色的文档。它使用起来相当简单：\n\n\
    1. 在 Heroku 创建一个账户。\n2. 您需要安装 Heroku 的命令行界面（所有平台的说明可在 https://devcenter.heroku.com/articles/getting-started-with-python#set-up\
    \ 找到），然后登录命令行：\n\n   ```\n   $ heroku login\n   Enter your Heroku credentials.\n\
    \   Email: your.user@server.com\n   Password:\n   ```\n\n3. 从 https://github.com/datademofun/heroku-basic-flask\
    \ 下载一个基本的 Heroku 模板。我们将用它作为服务器的基础。\n4. 将 `twilio` 客户端添加到 `requirements.txt` 文件中：\n\
    \n   ```\n   $ echo \"twilio\" >> requirements.txt\n   ```\n\n5. 用 GitHub 上 https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter09/app.py\
    \ 中的文件替换 `app.py`。其关键部分是获取请求的正文并将其与一些额外信息一起发回。代码将在后面的*工作原理...*部分显示。\n\n> 在文件 `runtime.txt`\
    \ 中将 python 解释器替换为最新支持的 python 版本。撰写本文时，该版本为 3.8.3。请查阅 heroku 文档 https://devcenter.heroku.com/articles/python-support#specifying-a-python-version\n\
    \n> 您可以保留现有的 app.py 以查看模板示例以及 Heroku 的工作方式。请查看 https://github.com/datademofun/heroku-basic-flask\
    \ 上的 README。\n\n6. 完成后，将更改提交到 Git：\n\n   ```\n   $ git add .\n   $ git commit\
    \ -m 'first commit'\n   ```\n\n7. 在 Heroku 中创建一个新服务。它将随机生成一个新的服务名称（此处我们使用 service-name-12345）。此\
    \ URL 可访问：\n\n   ```\n   $ heroku create\n   Creating app... done, ● SERVICE-NAME-12345\n\
    \   https://service-name-12345.herokuapp.com/ | https://git.heroku.com/service-name-12345.git\n\
    \   ```\n\n8. 部署服务。在 Heroku 中，部署服务会将代码推送到远程 Git 服务器：\n\n   ```\n   $ git push\
    \ heroku master\n   ...\n   remote: Verifying deploy... done.\n   To https://git.heroku.com/service-name-12345.git\n\
    \   b6cd95a..367a994 master -> master\n   ```\n\n9. 检查服务是否在 webhook URL 处正常运行。请注意，它在上一步的输出中显示。您也可以在浏览器中检查：\n\
    \n   ```\n   $ curl https://service-name-12345.herokuapp.com/\n   All working!\n\
    \   ```\n\n处理通信渠道\n\n## 操作步骤...\n\n1. 转到 Twilio 并访问 **PHONE NUMBER** 部分。配置 webhook\
    \ URL。这将使每次收到短信时都会调用该 URL。转到 **All Products** 和 **Services** -> **Phone Numbers**\
    \ 中的 **Active Numbers** 部分，并填写 webhook。注意 webhook 末尾的 `/sms`。点击 **Save**：\n\n\
    \   ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_341_0.png)\n\n   图 9.10：在 Twilio\
    \ 中配置电话号码\n\n2. 服务现在已启动并运行，可以使用了。向您的 Twilio 电话号码发送一条短信；您应该会收到自动回复：\n\n   ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_342_0.png)\n\
    \n   图 9.11：来自 Twilio 试用账户的短信\n\n   请注意，模糊的部分应替换为您的信息。\n\n> 如果您有试用账户，您只能将消息发回给您授权的电话号码之一，因此您需要从这些号码发送文本。\n\
    \n处理通信渠道\n\n## 工作原理...\n\n步骤 1 设置了 webhook，因此当 Twilio 在电话线上收到短信时，它会调用您的 Heroku\
    \ 应用程序。\n\n让我们看看 `app.py` 中的代码，了解它是如何工作的。以下是代码，为清晰起见进行了删减；完整文件请查看 https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter09/app.py：\n\
    \n```\nfrom flask import Flask, request\nfrom twilio.twiml.messaging_response\
    \ import MessagingResponse\n\napp = Flask(__name__)\n\n@app.route('/')\ndef homepage():\n\
    \    return 'All working!'\n\n@app.route(\"/sms\", methods=['GET', 'POST'])\n\
    def sms_reply():\n    from_number = request.form['From']\n    body = request.form['Body']\n\
    \    resp = MessagingResponse()\n    msg = (f'Awwwww! Thanks so much for your\
    \ message {from_number}, '\n           f'\"{body}\" to you too.')\n    resp.message(msg)\n\
    \    return str(resp)\n\nif __name__ == '__main__':\n    app.run()\n```\n\napp.py\
    \ 可以分为三个部分：\n\n- 文件开头的 Python 导入和 Flask 应用程序的启动，这只是设置 Flask\n- 对 homepage 的调用，这是为了测试服务器是否正常工作而生成的\n\
    - sms_reply，这是魔法发生的地方"
