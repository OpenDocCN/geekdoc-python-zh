    # How it works...


    Once the document is open, as shown in *step 1* and *step 2* in the *How to do
    it...* section, the `document` object provides access to the document.


    Some useful properties are the number of pages, available in `.numPages`, and
    each of the pages, available in `.pages`, which can be accessed like a list.


    Other data that''s accessible is stored in `.documentInfo`, which stores metadata
    on the creator and when it was created.


    > The information in `.documentInfo` is optional and sometimes not up to date.
    It depends greatly on the tool used to generate the PDF.


    Each of the `page` objects can get its text by calling `.extractText()`, which
    will return all the text contained in the page, as done in *step 5* and *step
    6*. This method tries to extract all text, but it has some limitations. For well-structured
    texts, such as our example, it works quite well, and the resulting text can be
    processed cleanly. When dealing with text in multiple columns or located in strange
    positions, it may complicate working with it.


    > Notice that the PDF file needs to be open for the whole operation, instead of
    using a `with` context operator. After leaving the `with` block, the file is closed.


    *Step 8* and *step 9* show how to deal with encrypted files. You can detect whether
    a file is encrypted or not with `.isEncrypted`, and then decrypt it with the `.decrypt`
    method, providing the correct password.'
  - '[PAGE 141]


    Searching and Reading Local Files


    # There''s more...


    PDF is such a flexible format that it is widely used for a variety of purposes,
    but that also means that it can be difficult to parse and process.


    While most PDF files contain text information, it is not uncommon that they contain
    images of text. This happens when a document has been scanned. In this case, the
    information is stored as a collection of images, instead of in structured text.
    This makes it difficult to extract the textual data; we may end up having to resort
    to methods such as OCR to parse the images into text.


    PyPDF2 does not provide a good interface to deal with images. You may need to
    transform the PDF into a collection of images and then process the images with
    other tools like Pillow. See the Reading images recipe for ideas about OCR and
    the usage of Pillow. Most PDF readers can do it, or you can use a command-line
    tool such as pdftoppm (https://linux.die.net/man/1/pdftoppm) or QPDF (see the
    following).


    Some methods of encrypting files may not be understood by PyPDF2. It will generate
    NotImplementedError: only algorithm code 1 and 2 are supported. If that happens,
    you need to decrypt the PDF externally and open it once it is decrypted. You can
    use QPDF to create a copy without the password, as follows:


    ```

    $ qpdf --decrypt --password=PASSWORD encrypted.pdf output-decrypted.pdf

    ```


    The full documentation for QPDF is available here: http://qpdf.sourceforge.net/files/qpdf-manual.html.
    QPDF is available in most package managers as well.


    > QPDF is capable of doing a lot of transformations and analyzing PDFs in depth.
    There are also bindings in Python on a library called pikepdf (https://pikepdf.readthedocs.io/en/stable/).
    This package is more complicated to use than PyPDF2 and it''s not as straightforward
    for text extraction, but it can be useful for other operations such as extracting
    images from a PDF.


    # See also


    +   - The Reading text files recipe, earlier in this chapter, to learn the basics
    of opening and reading files.

    - The Crawling and searching directories recipe, earlier in this chapter, to learn
    how to search and find files in directories.'
  - "[PAGE 142]\n\n# Reading Word documents\n\nWord documents (.docx) are another\
    \ common kind of document that stores mainly text. They are typically generated\
    \ with Microsoft Office, but other tools also produce compatible files. They are\
    \ probably the most common format to share files that need to be editable, but\
    \ they are also common for distributing documents.\n\nWe'll see in this recipe\
    \ how to extract text information from a Word document.\n\n# Getting ready\n\n\
    We'll use the python-docx module to read and process Word documents:\n\n```\n\
    $ echo \"python-docx==0.8.10\" >> requirements.txt\n$ pip install -r requirements.txt\n\
    ```\n\nWe have prepared a test file, available in the GitHub Chapter04/documents\
    \ directory, called document-1.docx, which we'll use in this recipe. Note that\
    \ this document follows the same Lorem Ipsum pattern that was described in the\
    \ test document for the Reading PDF files recipe.\n\n# How to do it...\n\n+  \
    \ 1. Import python-docx:\n   >> import docx\n\n2. Open the document-1.docx file:\n\
    \   >>> doc = docx.Document('document-1.docx')\n\n3. Check some of the metadata\
    \ properties stored in core_properties:\n   >>> doc.core_properties.title\n  \
    \ 'A very important document'\n   >>> doc.core_properties.keywords\n   'lorem\
    \ ipsum'\n   >>> doc.core_properties.modified\n   datetime.datetime(2018, 6, 24,\
    \ 15, 1, 7)\n\n4. Check the number of paragraphs:\n   >>> len(doc.paragraphs)\n\
    \   58"
- md: "## Searching and Reading Local Files\n\n5. Walk through the paragraphs to detect\
    \ the ones that contain text. Notice not all text is displayed here:\n\n```python\n\
    >>> for index, paragraph in enumerate(doc.paragraphs):\n...     if paragraph.text:\n\
    ...         print(index, paragraph.text)\n...\n30 A VERY IMPORTANT DOCUMENT\n\
    31 By James McCormac\n32 CEO Loose Seal Inc\n34\n...\n56 TITLE 2\n57 ...\n```\n\
    \n6. Obtain the text for paragraphs 30 and 31, which correspond to the title and\
    \ subtitle on the first page:\n\n```python\n>>> doc.paragraphs[30].text\n'A VERY\
    \ IMPORTANT DOCUMENT'\n>>> doc.paragraphs[31].text\n'By James McCormac'\n```\n\
    \n7. Each of the paragraphs has runs, which are sections of the text with different\
    \ properties. Check that the first text paragraph and run is in bold and the second\
    \ is in italics:\n\n```python\n>>> doc.paragraphs[30].runs[0].italic\n>>> doc.paragraphs[30].runs[0].bold\n\
    True\n>>> doc.paragraphs[31].runs[0].bold\n>>> doc.paragraphs[31].runs[0].italic\n\
    True\n```\n\n8. In this document, most of the paragraphs have only one run, but\
    \ we have a good example of different runs in paragraph 48. Display its text and\
    \ the different styles. For example, the word Word is in bold, and ipsum is in\
    \ italics:\n\n```python\n>>> [run.text for run in doc.paragraphs[48].runs]\n['This\
    \ is an example of a test document that is stored in ',\n'Word', ' format', '.\
    \ It contains some ', 'sentences', ' to\ndescribe what it is and it has ', 'lore',\
    \ 'm', ' ipsum', ' text.']\n>>> run1 = doc.paragraphs[48].runs[1]\n>>> run1.text\n\
    'Word'\n>>> run1.bold\nTrue\n>>> run2 = doc.paragraphs[48].runs[8]\n>>> run2.text\n\
    ' ipsum'\n>>> run2.italic\nTrue\n```\n\n## How it works...\n\nThe most important\
    \ peculiarity of Word documents is that the data is structured in paragraphs,\
    \ instead of in pages. The size of the font, line size, and other considerations\
    \ may make the number of pages change.\n\nMost of the paragraphs are also typically\
    \ empty, or contain only new lines, tabs, or other whitespace characters. It is\
    \ a good idea to check when a paragraph is empty and skip it.\n\nIn the *How to\
    \ do it...* section, *step 2* opens the file and *step 3* shows how to access\
    \ the core properties. These are properties that are defined in Word as document\
    \ metadata, such as the author or creation date.\n\n> This information needs to\
    \ be taken with a grain of salt, as a lot of tools that produce Word documents\
    \ (but not Microsoft Office) won't necessarily fill it. Double-check before using\
    \ that information.\n\nThe paragraphs of the document can be iterated and have\
    \ their text extracted in raw format, as shown in *step 6*. This is information\
    \ that doesn't include styling information and is typically the most useful format\
    \ for processing the data automatically.\n\nIf the styling information is required,\
    \ the runs can be used, as in *step 7* and *step 8*. Each paragraph can contain\
    \ one or more runs, which are smaller text units that share the same styling.\
    \ For example, if a sentence is *Word1* *word2* **word3**, there will be three\
    \ runs, one with italicized text (Word1), another with underline (word2), and\
    \ another with bold (word3). Furthermore, there can be intermediate runs with\
    \ regular text that contain just whitespaces, making a total of five runs.\n\n\
    The styling can be detected individually for properties such as bold, italic,\
    \ or underline.\n\n> The division in runs can be quite complicated. Due to the\
    \ way editors work, it is not uncommon to have half-words, a word split into two\
    \ runs, sometimes with the same properties. Do not rely on the number of runs\
    \ and analyze the content. In particular, double-check if you're trying to ensure\
    \ if a part with a particular style is divided in two or more runs. A good example\
    \ is the words lore and m (it should be a single word, lorem) in step 8.\n\nBe\
    \ aware that because Word documents are produced by so many sources, a lot of\
    \ properties may not be set up, leaving it to the tool to specify the specifics\
    \ to use. For example, it is very common to keep the default font, which may mean\
    \ that the font information on the runs is left empty.\n\n## There's more...\n\
    \nFurther style information can be found under the font attribute, such as small_caps\
    \ or size:\n\n```python\n>>> run2.font.cs_italic\nTrue\n>>> run2.font.size\n152400\n\
    >>> run2.font.small_caps\n```\n\nNormally, focusing on the raw text, without paying\
    \ attention to the style information, is the correct way of parsing. But sometimes,\
    \ a bold word in a paragraph will have special significance. It may be the header\
    \ or some particularly meaningful text. Because it's highlighted, it likely is\
    \ what you're looking for! Keep that in mind when analyzing documents.\n\nYou\
    \ can find the whole python-docx documentation here: https://python-docx.readthedocs.io/en/latest/.\n\
    \n## See also\n\n- The Reading text files recipe, earlier in this chapter, to\
    \ learn the basics of opening and reading text files.\n- The Reading PDF files\
    \ recipe, earlier in this chapter, to learn how to process other kinds of document\
    \ files.\n\n## Scanning documents for a keyword\n\nIn this recipe, we will apply\
    \ all the lessons from the previous recipes and search all the files in the directory\
    \ for a particular keyword. This is a recap of the rest of the recipes in this\
    \ chapter and includes a script that searches different kinds of files.\n\n###\
    \ Getting ready\n\nBe sure to include the following modules in the `requirements.txt`\
    \ file and install them into your virtual environment:\n\n```\nbeautifulsoup4==4.8.2\n\
    Pillow==7.0.0\nPyPDF2==1.26.0\npython-docx==0.8.10\n```\n\nCheck that the directory\
    \ to search has the following files (all are available in https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter04/documents/).\
    \ Note that `file5.pdf` and `file6.pdf` are copies of `document-1.pdf`, for simplicity.\
    \ `file1.txt` to `file4.txt` are empty files:\n\n```\n├── dir\n│   ├── file1.txt\n\
    │   ├── file2.txt\n│   ├── file6.pdf\n│   └── subdir\n│       ├── file3.txt\n\
    │       ├── file4.txt\n│       └── file5.pdf\n├── document-1.docx\n├── document-1.pdf\n\
    ├── document-2-1.pdf\n├── document-2.pdf\n├── example_iso.txt\n├── example_output_iso.txt\n\
    ├── example_utf8.txt\n├── top_films.csv\n└── zen_of_python.txt\n```\n\nWe've prepared\
    \ a script, `scan.py`, that will search for a word in all the `.txt`, `.csv`,\
    \ `.pdf`, and `.docx` files. The script is available in the `Chapter04` directory\
    \ of the GitHub repository.\n\n### How to do it...\n\n1. Refer to help `-h` for\
    \ how to use the `scan.py` script:\n\n   ```\n   $ python scan.py -h\n   usage:\
    \ scan.py [-h] [-w W]\n\n   optional arguments:\n     -h, --help show this help\
    \ message and exit\n     -w W Word to search\n   ```\n\n2. Search for the word\
    \ `the`, which is present in most of the files:\n\n   ```\n   $ python scan.py\
    \ -w the\n   >>> Word found in ./documents/top_films.csv\n   >>> Word found in\
    \ ./documents/zen_of_python.txt\n   >>> Word found in ./documents/document-1.pdf\n\
    \   >>> Word found in ./documents/dir/file6.pdf\n   >>> Word found in ./documents/dir/subdir/file5.pdf\n\
    \   ```\n\n3. Search for the word `lorem`, only present in the PDF and `.docx`\
    \ files:\n\n   ```\n   $ python scan.py -w lorem\n   >>> Word found in ./documents/document-1.pdf\n\
    \   >>> Word found in ./documents/document-1.docx\n   >>> Word found in ./documents/dir/file6.pdf\n\
    \   >>> Word found in ./documents/dir/subdir/file5.pdf\n   ```\n\n4. Search for\
    \ the word `20€`, only present in the two ISO files, with different encodings,\
    \ and in the UTF8 file:\n\n   ```\n   $ python scan.py -w 20€\n   >>> Word found\
    \ in ./documents/example_iso.txt\n   >>> Word found in ./documents/example_output_iso.txt\n\
    \   >>> Word found in ./documents/example_utf8.txt\n   ```\n\n5. The search is\
    \ case-insensitive. Search for the word `BETTER`, only present in the `zen_of_python.txt`\
    \ file:\n\n   ```\n   $ python scan.py -w BETTER\n   >>> Word found in ./documents/zen_of_python.txt\n\
    \   ```\n\n### How it works...\n\nThe `scan.py` file has the following elements:\n\
    \n1. An entry point that parses the input parameters and creates the help for\
    \ the command line.\n2. A main function that walks through the directory and analyzes\
    \ each of the files found. Based on their extension, it decides whether there's\
    \ an available function to process and search it.\n3. An `EXTENSION` dictionary,\
    \ which pairs the extensions with the function to search them.\n4. The `search_txt`,\
    \ `search_csv`, `search_pdf`, and `search_docx` functions, which process and search\
    \ for the required word for each kind of file.\n\nKeep in mind that file extensions\
    \ are just file name endings and only a hint of the format of a file. So, they\
    \ should be taken with a pinch of salt. In the Python standard library, there's\
    \ the function `mimetypes.guess_type`, which can give an educated guess as to\
    \ the type of a file. Check the Python documentation here: https://docs.python.org/3.8/library/mimetypes.html.\n\
    \nThe comparison is case-insensitive, so the search word is transformed into lowercase\
    \ and, in all comparisons, the text is transformed into lowercase.\n\nEach of\
    \ the search functions has its own peculiarities:\n\n1. `search_txt` first opens\
    \ the file to determine its encoding, using `UnicodeDammit`, then it opens the\
    \ file and reads it line by line. As soon as the word is found, it stops and returns\
    \ success.\n2. `search_csv` opens the file in CSV, and iterates not only line\
    \ by line, but also column by column. As soon as the word is found, it returns.\n\
    3. `search_pdf` opens the file and exits if it is encrypted. If not, it goes page\
    \ by page, extracting the text and comparing it with the word. It returns as soon\
    \ as it finds a match.\n4. `search_docx` opens the file and iterates through all\
    \ its paragraphs for a match. As soon as a match is found, the function returns.\n\
    \n### There's more...\n\nThere are some extra ideas that could be implemented:\n\
    \n- More search functions could be added. In this chapter, we went through log\
    \ files and images, as well as text files."
