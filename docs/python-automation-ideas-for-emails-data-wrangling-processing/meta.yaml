  md: "Dealing with Communication Channels\n\n# How it works...\n\nStep 1 sets up\
    \ the webhook, so Twilio calls your Heroku app when receiving an SMS on the phone\
    \ line.\n\nLet's take a look at the code in `app.py` to see how this works. Here\
    \ it is, redacted for clarity; check the full file at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter09/app.py:\n\
    \n```\nfrom flask import Flask, request\nfrom twilio.twiml.messaging_response\
    \ import MessagingResponse\n\napp = Flask(__name__)\n\n@app.route('/')\ndef homepage():\n\
    \    return 'All working!'\n\n@app.route(\"/sms\", methods=['GET', 'POST'])\n\
    def sms_reply():\n    from_number = request.form['From']\n    body = request.form['Body']\n\
    \    resp = MessagingResponse()\n    msg = (f'Awwwww! Thanks so much for your\
    \ message {from_number}, '\n           f'\"{body}\" to you too.')\n    resp.message(msg)\n\
    \    return str(resp)\n\nif __name__ == '__main__':\n    app.run()\n```\n\napp.py\
    \ can be divided into three parts:\n\n+   - The Python imports at the start of\
    \ the file and startup of the Flask app at the end, which is just setting up Flask\n\
    - The call to homepage, which is generated to test that the server is working\n\
    - sms_reply, which is where the magic happens"
