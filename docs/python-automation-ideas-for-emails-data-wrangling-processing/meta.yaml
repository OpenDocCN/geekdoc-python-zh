    isotimestamp = time_with_tz.isoformat()


    return isotimestamp

    ```


    The timestamp is parsed using the standard Python library with `datetime.strptime`
    with the format "%m-%d-%Y %H:%M:%S", which corresponds to MM-DD-YYYY HH:MM:SS.
    The resulting `datetime` object is then added to the UTC time zone, transformed
    into an ISO 8601 valid string, and then returned.


    > Remember that since Python 3.7, the dictionaries keep the insertion order.


    The resulting file allows us to compare times in the same format.


    # There''s more...


    In some cases, the detection of the timestamp format may not be dependent on other
    parameters such as the country and will require you to try several formats to
    see which one fits. When working with many sources, this can actually become a
    problem, as a single row may not contain enough information. For example, a date
    05-06-2019 could be June 5th in international format, or May 6th in US format.
    An analysis of the whole file may be required or even taking a guess and validating
    it afterward.


    The time in all the log files for the recipe is stored in UTC time, but that''s
    not necessarily true in every case. It can be stored in different time zones.


    In our example, the time zones in Ohio and Ontario are the same, but the time
    zones may be different depending on the location. Depending on the logs, this
    may require an adjustment.'
  - '[PAGE 244]


    > The ISO 8601 format may include the time zone. For example, the ending in +00:00
    shows the time zone is UTC. Don''t assume that the time format will always include
    time zone information. If it''s not present, it may lead to inconsistent times
    in your data. Always include the time zone, or use the times in UTC when combining
    different sources to avoid confusion.


    If different time zones are used, the `delorean` module, introduced in *Chapter
    1, Let''s Begin Our Automation Journey*, helps define the times and match equivalent
    times in an easy way:


    ```

    >>> import delorean

    >>> timestamp = delorean.parse(''2018-08-28 20:05:55+00:00'')

    >>> timestamp_EST = timestamp.shift(''US/Eastern'')

    >>> timestamp_EST.datetime.isoformat()

    ''2018-08-28T16:05:55-04:00''

    ```


    The full Delorean documentation can be found online at https://delorean.readthedocs.io/.


    Notice how the old timestamps are still present in the CSV file, instead of being
    overwritten by the new timestamp column. Unless there''s a clear need to save
    space, it''s best to keep it for reference and to detect possible problems later.
    It also allows us to know easily when this stage has been applied to the given
    CSV file.


    # See also


    +   - The *Appending currency based on location* recipe in the previous section.

    - The *Reading CSV files* recipe in *Chapter 4, Searching and Reading Local Files*.

    - The *Preparing a task* recipe in *Chapter 2, Automating Tasks Made Easy*.


    # Aggregating results


    Once the data is cleaned, we can process the results. For our example, we will
    calculate the average sale price by both location and day, as well as the total
    sales by both location and day in the data range. As our data is stored by location,
    this will be done in two steps. First, we''ll create the files per location, and
    then by date, using the date on the location results.'
- md: "## Cleaning and Processing Data\n\n### Getting ready\n\nWe will use the resulting\
    \ CSV file from the previous recipe that receives and transforms logs in the following\
    \ format:\n\n```\n[<Timestamp>] - SALE - PRODUCT: <product id> - PRICE: <price>\n\
    ```\n\nEach line will represent a sale log.\n\nWe will use the `parse` module\
    \ and the `delorean` module. We should install the modules, adding them to our\
    \ `requirements.txt` file as follows:\n\n```\n$ echo \"parse==1.14.0\" >> requirements.txt\n\
    $ echo \"delorean==1.0.0\" >> requirements.txt\n$ pip install -r requirements.txt\n\
    ```\n\nIn the GitHub repository, there are some log files to process with the\
    \ following structure:\n\n```\nsale_logs/\n  OH\n    logs.txt\n  ON\n    logs.txt\n\
    ```\n\nThe code can be found in the GitHub repository, at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter07.\n\
    \n### How to do it...\n\n1. Import the data and transform it into a CSV file using\
    \ the `logs_to_csv.py` script. The script adds the location as input. Create the\
    \ files for both the OH and ON logs:\n\n   ```\n   $ python logs_to_csv.py sale_logs/OH/logs.txt\
    \ output_1_OH.csv -l OH\n   $ python logs_to_csv.py sale_logs/ON/logs.txt output_1_ON.csv\
    \ -l ON\n   ```\n\n2. Process both resulting files using the `location_price.py`\
    \ script:\n\n   ```\n   $ python location_price.py output_1_OH.csv output_2_OH.csv\n\
    \   $ python location_price.py output_1_ON.csv output_2_ON.csv\n   ```\n\n3. Process\
    \ both files using the `standard_date.py` script:\n\n   ```\n   $ python standard_date.py\
    \ output_2_OH.csv output_3_OH.csv\n   $ python standard_date.py output_2_ON.csv\
    \ output_3_ON.csv\n   ```\n\n4. Process both resulting files using the `aggregate_by_location.py`\
    \ script:\n\n   ```\n   $ python aggregate_by_location.py output_3_ON.csv aggregate_ON.csv\n\
    \   $ python aggregate_by_location.py output_3_OH.csv aggregate_OH.csv\n   ```\n\
    \n5. Check the resulting CSV files in a spreadsheet. In the following screenshots,\
    \ the files are displayed using the LibreOffice software:\n\n| DATE | TOTAL USD\
    \ | NUMBER | AVERAGE |\n|---|---|---|---|\n| 2019-08-27 | 32.93 | 7 | 4.7 |\n\
    | 2019-08-28 | 114.76 | 24 | 4.78 |\n| 2019-08-29 | 111.76 | 24 | 4.66 |\n| 2019-08-30\
    \ | 113.76 | 24 | 4.74 |\n| 2019-08-31 | 135.76 | 24 | 5.66 |\n| 2019-09-01 |\
    \ 112.76 | 24 | 4.7 |\n| 2019-09-02 | 126.76 | 24 | 5.28 |\n| 2019-09-03 | 114.76\
    \ | 24 | 4.78 |\n| 2019-09-04 | 115.76 | 24 | 4.82 |\n| 2019-09-05 | 100.76 |\
    \ 24 | 4.2 |\n| 2019-09-06 | 119.76 | 24 | 4.99 |\n\n| DATE | TOTAL USD | NUMBER\
    \ | AVERAGE |\n|---|---|---|---|\n| 2018-08-27 | 20 | 5 | 4 |\n| 2018-08-28 |\
    \ 113 | 24 | 4.71 |\n| 2018-08-29 | 120 | 24 | 5 |\n| 2018-08-30 | 120 | 24 |\
    \ 5 |\n| 2018-08-31 | 115 | 24 | 4.79 |\n| 2018-09-01 | 106 | 24 | 4.42 |\n| 2018-09-02\
    \ | 126 | 24 | 5.25 |\n| 2018-09-03 | 159 | 24 | 6.62 |\n| 2018-09-04 | 114 |\
    \ 24 | 4.75 |\n| 2018-09-05 | 134 | 24 | 5.58 |\n| 2018-09-06 | 94 | 24 | 3.92\
    \ |\n\nFigure 7.4: Screenshots of aggregated results\n\n### How it works...\n\n\
    Let's take a look at the `aggregate_by_location.py` script, used in *step 6*.\n\
    \nThe final part of the script file deals with the parsing of arguments, which\
    \ was described in detail in *Chapter 2, Automating Tasks Made Easy*.\n\nThe `main`\
    \ function reads the input CSV and calls the `calculate_results` function to generate\
    \ the aggregated reports. It then writes the results in the output file. The usage\
    \ of `DictReader` and `DictWriter` was already described in *Chapter 6, Fun with\
    \ Spreadsheets*.\n\nIn the `calculate_results` function, the aggregation takes\
    \ place. Each line is analyzed to check its date, and all the entries with the\
    \ same date are aggregated:\n\n```python\ndef calculate_results(reader):\n   \
    \ result = []\n    last_date = None\n    total_usd = 0\n    number = 0\n\n   \
    \ for row in reader:\n        date = parse_iso(row['STD_TIMESTAMP'])\n       \
    \ if not last_date:\n            last_date = date\n\n        if last_date < date:\n\
    \            # New day!\n            result.append(line(date, total_usd, number))\n\
    \            total_usd = 0\n            number = 0\n            last_date = date\n\
    \n        number += 1\n        total_usd += Decimal(row['USD'])\n\n    # Final\
    \ results\n    result.append(line(date, total_usd, number))\n    return result\n\
    ```\n\nThe code takes note of the latest date and keeps aggregating until it changes.\
    \ Every time there's a change in date, the line is appended to the `result` array.\n\
    \n> Note that this takes advantage of the fact that the data is sorted by timestamp.\
    \ In this example, the timestamps in the logs are sorted by origin, but there\
    \ may be scenarios where it is necessary to perform some ordering and/or filtering.\
    \ Use the same techniques we described in this chapter, and create an extra step\
    \ with the sorting process if necessary.\n\nTo obtain the date, the input ISO\
    \ format is parsed using the `delorean` module:\n\n```python\ndef parse_iso(timestamp):\n\
    \    # Parse the ISO format\n    total = delorean.parse(timestamp, dayfirst=False)\n\
    \    # Keep only the date\n    return total.date\n```\n\nThe `dayfirst=False`\
    \ parameter ensures that the timestamp is correctly interpreted.\n\n> The new\
    \ (as yet unreleased) version of `delorean` will include a specific `isofirst`\
    \ parameter to explicitly parse ISO 8601. This version hasn't been released at\
    \ the time of writing, but it's displayed in the documentation.\n\nEach new line\
    \ is configured in dictionary format on the `line` function, which is as follows:\n\
    \n```python\ndef line(date, total_usd, number):\n    data = {\n        'DATE':\
    \ date,\n        'TOTAL USD': total_usd,\n        'NUMBER': number,\n        #\
    \ Round to two decimal places\n        'AVERAGE': round(total_usd / number, 2),\n\
    \    }\n    return data\n```\n\nEach of the lines has the date, the total USD\
    \ from sales, the number of sales, and an average price per item.\n\n> Storing\
    \ the aggregated total and the number of events that comprise this total allows\
    \ us to aggregate the values further and calculate the average. Just the average\
    \ on its own cannot be aggregated further, but the aggregated total and the number\
    \ of events can, and the average can easily be calculated from them.\n\nThe aggregated\
    \ file is stored in CSV format, after `calculate_results` returns the value to\
    \ `main`.\n\n### There's more...\n\nA careful examination of the input dates will\
    \ show that they are not exactly identical. While the format in the `output_3_OH.csv`\
    \ file is `YYYY-MM-DDTHH:MM:SS+00:00`, the format in the file `output_3_ON.csv`\
    \ is `YYYY-MM-DD HH:MM:SS+00:00`. Note the space where the T is. The ISO 8601\
    \ format uses the T character to separate the date from the time, but it's quite\
    \ common to see it separated with a space, as described in RFC3339 (https://tools.ietf.org/html/rfc3339),\
    \ so most software tools will be able to parse it, including `delorean`.\n\n>\
    \ Noticing at a later stage that the data is not completely standardized is actually\
    \ a common problem. Be forgiving with the input data and try to be as strict as\
    \ possible with the data output.\n\nThe full `delorean` documentation can be found\
    \ online at https://delorean.readthedocs.io/.\n\nThe average price per sale is\
    \ rounded to two decimal places, which keeps it up to the penny and makes sense\
    \ in this specific case. This is done through the built-in `round` function that\
    \ accepts an extra parameter with the number of decimal places to round to:\n\n\
    ```python\n>>> round(3.14159)\n3\n>>> round(3.14159, 4)\n3.1416\n```\n\nIf you\
    \ need more control to round either up or down to the next integer, you can use\
    \ the `math.ceil` and `math.floor` functions:\n\n```python\n>>> import math\n\
    >>> math.ceil(3.14159)\n4\n>>> math.floor(3.14159)\n3\n```\n\nFor more general\
    \ statistical operators other than the average, the Python module in the `statistics`\
    \ standard library has functions such as `median()` and `quantiles()`. Check the\
    \ documentation at https://docs.python.org/3/library/statistics.html.\n\nWhile\
    \ not required for the average, some of these measurements (such as the mode or\
    \ median) may require working with the full data set in memory. This limits the\
    \ amount of data that can be processed, especially for very big sets of data.\n\
    \n> The debate over what exactly is *big data* is difficult, as there's not a\
    \ single point where regular data becomes big. While an in-depth discussion about\
    \ big data is out of scope for this book, its main characteristic is that it is\
    \ data that cannot be contained in a single computer, requiring distributed processing\
    \ in different computers. This complicates the operation a lot, to the point of\
    \ requiring specialized skills to deal with it. Before moving to that area, think\
    \ about whether the data could fit on a specific server with as much memory as\
    \ possible and if that could be helpful. This approach of \"throwing hardware\
    \ at a problem\" can go a long way, and it's typically cheaper than the work involved\
