    \ output_3_OH.csv\n   $ python standard_date.py output_2_ON.csv output_3_ON.csv\n\
    \   ```\n4. Process all the files in a single call to `aggregate_by_location_pandas.py`,\
    \ specifying the files to process:\n   ```\n   $ python aggregate_by_location_by_pandas.py\
    \ output_3_OH.csv aggregate_pd_OH.csv\n   $ python aggregate_by_location_by_pandas.py\
    \ output_3_ON.csv aggregate_pd_ON.csv\n   ```\n5. Check the resulting CSV files,\
