  md: 'Generating Fantastic Reports


    Step 6 checks that the file has been created with the proper data.


    # There''s more...


    The filename is created with a dynamic date to minimize the probability of overwriting
    existing files. The date format starting with the year and ending with the day
    has been selected so that the files are sorted in the correct order.


    > The format YYYY-MM-DD for dates is covered in the ISO 8601 standard, which describes
    different ways to format dates and times. It is a standard format that''s easily
    parsed and supported in Python.


    The `with` context manager will close the file, even if there''s an exception.
    In case of an error, the `write` call will raise an `IOError` exception.


    > Some of the common problems when writing to disk are problems with permissions,
    no space left on the hard drive, or a path problem (for instance, trying to write
    in a non-existent directory).


    Note that a file may not be fully committed to disk until it is closed or explicitly
    flushed. Generally, the operating system will take care of it, but keep this in
    mind if you''re trying to open a file twice, one for read and one for write.


    > This can produce an error if the program ends abruptly before being able to
    flush the data into the hard drive, making data apparently disappear. If required,
    call `file.flush()` to force the data to be committed to disk. This is useful
    when writing several times into the same file. Note that at the end of the `with`
    block, the file will be flushed and closed automatically.


