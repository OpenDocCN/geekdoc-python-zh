  md: "Why Not Automate Your Marketing Campaign?\n\n# How it works...\n\nSteps 1 and\
    \ 2 show how the data is structured. Step 3 calls `parse_sales_log.py` to read\
    \ all the log files and parse them, and then stores them in an Excel spreadsheet.\
    \ The contents of the spreadsheet are displayed in step 4.\n\nLet's see how `parse_sales_log.py`\
    \ is structured:\n\n```\n# IMPORTS\nfrom sale_log import SaleLog\n\ndef get_logs_from_file(shop,\
    \ log_filename):\n    with open(log_filename) as logfile:\n        logs = [SaleLog.parse(shop=shop,\
    \ text_log=log)\n                for log in logfile]\n    return logs\n\ndef main(log_dir,\
    \ output_filename):\n    logs = []\n    for dirpath, dirnames, filenames in os.walk(log_dir):\n\
    \        for filename in filenames:\n            # The shop is the last directory\n\
    \            shop = os.path.basename(dirpath)\n            fullpath = os.path.join(dirpath,\
    \ filename)\n            logs.extend(get_logs_from_file(shop, fullpath))\n\n \
    \   # Create and save the Excel sheet\n    xlsfile = openpyxl.Workbook()\n   \
    \ sheet = xlsfile['Sheet']\n    sheet.append(SaleLog.row_header())\n    for log\
    \ in logs:\n        sheet.append(log.row())\n    xlsfile.save(output_filename)\n\
    \nif __name__ == '__main__':\n    # PARSE COMMAND LINE ARGUMENTS AND CALL main()\n\
    ```\n\nThe command-line arguments are explained in Chapter 1, Let's Begin Our\
    \ Automation Journey. Note that the imports include `SaleLog`.\n\nThe main function\
    \ walks through the whole directory and grabs all the files through `os.walk`.\
    \ You can find out more about `os.walk` in Chapter 2, Automating Tasks Made Easy.\
    \ Each file is then passed to `get_logs_from_file` to parse their logs and add\
    \ them to the global `logs` list."
