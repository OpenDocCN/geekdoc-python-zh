  md: 'We''ll begin by going over how we ought to prepare a task before we automate
    it.


    # Preparing a task


    It all starts with defining precisely the work that needs to be executed, and
    designing it in a way that doesn''t require human intervention to run.


    Some ideal characteristic points are as follows:


    +   1. **Single, clear entry point**: No confusion on how to start the task.

    2. **Clear parameters**: If there are any parameters, they should be as explicit
    as possible.

    3. **No interactivity**: Stopping the execution to request information from the
    user is not possible.

    4. **The result should be stored**: In order to be checked at a different time
    than when it runs.

    5. **Clear result**: When we oversee the execution of a program ourselves, we
    can accept more verbose results, such as unlabeled data or extra debugging information.
    However, for an automated task, the final result should be as concise and to the
    point as possible.

    6. **Errors should be logged**: To analyze what went wrong.


    A command-line program has a lot of those characteristics already. It always has
    a clear entry point, with defined parameters, and the result can be stored, even
    if just in text format. And it can be improved ensuring a config file that clarifies
    the parameters, and an output file.


    Note that point 6 is the objective of the *Capturing errors and problems* recipe,
    and will be covered there.


    To avoid interactivity, do not use any function that waits for user input, such
    as `input`. Remember to delete debugger breakpoints!


    # Getting ready


    We''ll start by following a structure in which a main function will serve as the
    entry point, and all parameters are supplied to it.


    This is the same basic structure that was presented in the *Adding command-line
    arguments* recipe in *Chapter 1, Let''s Begin Our Automation Journey*.'
