    \ or Notepad++, they're also present in more general tools, such as MS Office,\
    \ Open Office, or Google Documents. But be careful, as the particular syntax may\
    \ be slightly different.\n\nYou can check your regexes interactively with some\
    \ tools. A good one that's freely available online is https://regex101.com/, which\
    \ displays each of the elements and explains the regex. Double-check that you're\
    \ using the Python flavor:\n\n## Chapter 1\n\n![Figure 1.1: An example using RegEx101](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_32_0.png)\n\
    \nFigure 1.1: An example using RegEx101\n\nNote that the **EXPLANATION** box in\
