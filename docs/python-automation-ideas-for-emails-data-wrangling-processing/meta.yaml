    \ you're happy with any confidence level, you can directly call the text with\
    \ `response.full_text_annotation.text`, though this may return spurious results\
    \ if there are elements in the image that could add noise to the text, like in\
    \ the `photo-dublin-a-text.jpg` image.\n\nThe symbols get aggregated as words,\
    \ and then into paragraphs. Each paragraph is printed independently.\n\n# There's\
