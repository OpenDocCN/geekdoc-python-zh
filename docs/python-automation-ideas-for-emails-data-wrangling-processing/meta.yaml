    Pillow also has a lot of functionality around modifying pictures. It is very easy
    to resize or make simple modifications to a file, such as rotating it. You can
    find the complete Pillow documentation here: https://pillow.readthedocs.io.


    > Pillow allows a lot of operations with images. Not only simple operations such
    as resizing or transforming one format into another, but also things like cropping
    the image, applying color filters, or generating animated GIFs. If you''re interested
    in image processing using Python, it is definitely the module to master.


    The GPS coordinates in the recipe are stated in **DMS (Degrees, Minutes, Seconds)**
    and **DDM (Degrees, Decimal, Minutes)**, and transformed into **DD (Decimal, Degrees)**.
    You can find out more about the different GPS formats here: http://www.ubergizmo.com/how-to/read-gps-coordinates/.
    You''ll also find out how to search the exact locations of the pictures there,
    in case you''re curious.


    A more advanced use of reading image files is to try to process them for **OCR
    (Optical Character Recognition)**. This means automatically detecting text in
    an image and extracting and processing it. The open source module `tesseract`
    allows you to do this, and it can be used with Python and Pillow.


    You need to install `tesseract` on your system (https://github.com/tesseract-ocr/tesseract/wiki),
    and the `pytesseract` Python module (using `pip install pytesseract`).'
  - '[PAGE 137]


    Searching and Reading Local Files


    You can download a file with clear text, called photo-text.jpg, from the GitHub
    repository at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter04/images/photo-text.jpg:


    ```

    >>> from PIL import Image

    >>> import pytesseract

    >>> pytesseract.image_to_string(Image.open(''photo-text.jpg''))

    ''Automate!''

    ```


    OCR can be difficult if the text is not very clear in the image, or it is mixed
    with images, or it uses a distinctive font. There''s an example of that in the
    photo-dublin-a-text.jpg file, (available in the GitHub repository at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter04/images/photo-dublin-a-text.jpg),
    which includes text over the picture:


    ```

    >>> >>> pytesseract.image_to_string(Image.open(''photo-dublin-a-text.jpg''))

    ''fl\n\nAutomat''

    ```


    More information about Tesseract is available at the following links:


    https://github.com/tesseract-ocr/tesseract


    https://github.com/madmaze/pytesseract


    > Properly importing files to OCR may require initial image processing for better
    results. Image processing is out of scope for the objectives of this book, but
    you may use OpenCV, which is more powerful than Pillow. You can process a file
    and then open it with Pillow: http://opencv-python-tutroals.readthedocs.io/en/latest/py_tutorials/py_tutorials.html.


    # See also


    +   - The Reading text files recipe, earlier in this chapter, to learn the basics
    of opening and reading files.

    - The Reading file metadata recipe, earlier in this chapter, to learn how to get
    extra information from files.

    - The Crawling and searching directories recipe, earlier in this chapter, to learn
    how to search and find files in directories.'
- md: "## Reading PDF files\n\nA common format for documents is **PDF (Portable Document\
    \ Format)**. It started as a format to describe a document for any printer, so\
    \ PDF is a format that ensures that the document will be printed exactly as shown.\
    \ It has become a powerful standard for sharing documents, especially documents\
    \ that are final and intended to be read-only.\n\n### Getting ready\n\nFor this\
    \ recipe, we are going to use the `PyPDF2` module. We need to add it to our virtual\
    \ environment:\n\n```\n$ echo \"PyPDF2==1.26.0\" >> requirements.txt\n$ pip install\
    \ -r requirements.txt\n```\n\nIn the GitHub directory `Chapter03/documents`, we\
    \ have prepared two documents, `document-1.pdf` and `document-2.pdf`, to use in\
    \ this recipe. Note they contain mostly Lorem Ipsum text, which is just placeholder.\n\
    \n> Lorem Ipsum text is commonly used in design to show text without needing to\
    \ create the content before the design. You can learn more about it here: https://loremipsum.io/.\n\
    \nThey are both the same test document, but the second one can only be opened\
    \ with a password. The password is `automate`.\n\n### How to do it...\n\n1. Import\
    \ the module:\n   ```python\n   >>> from PyPDF2 import PdfFileReader\n   ```\n\
    \n2. Open the `document-1.pdf` file and create a PDF document object. Notice the\
    \ file needs to be open for the whole reading:\n   ```python\n   >>> file = open('document-1.pdf',\
    \ 'rb')\n   >>> document = PdfFileReader(file)\n   ```\n\n3. Get the number of\
    \ pages of the document and check it is not encrypted:\n   ```python\n   >>> document.numPages\n\
    \   3\n\n   >>> document.isEncrypted\n   False\n   ```\n\n4. Get the creation\
    \ date from the document info (2018-Jun-24 11:15:18) and discover that it has\
    \ been created with a Mac Quartz PDFContext:\n   ```python\n   >>> document.documentInfo['/CreationDate']\n\
    \   'D:20180624111518Z00\\'00\\''\n   >>> document.documentInfo['/Producer']\n\
    \   'Mac OS X 10.13.5 Quartz PDFContext'\n   ```\n\n5. Get the first page and\
    \ read the text on it:\n   ```python\n   >>> document.pages[0].extractText()\n\
    \   '!A VERY IMPORTANT DOCUMENT \\nBy James McCormac CEO Loose Seal Inc '\n  \
    \ ```\n\n6. Do the same operation for the second page (redacted here):\n   ```python\n\
    \   >>> document.pages[1].extractText()\n   '\"!This is an example of a test document\
    \ that is stored in PDF format. It contains some \\nsentences to describe what\
    \ it is and the it has lore ipsum text.\\n!\"\\nLorem ipsum dolor sit amet, consectetur\
    \ adipiscing elit. ...$'\n   ```\n\n7. Close the file and open document-2.pdf:\n\
    \   ```python\n   >>> file.close()\n   >>> file = open('document-2.pdf', 'rb')\n\
    \   >>> document = PdfFileReader(file)\n   ```\n\n8. Check the document is encrypted\
    \ (it requires a password) and raise an error if we try to access its content:\n\
    \   ```python\n   >>> document.isEncrypted\n   True\n   >>> document.numPages\n\
    \   ...\n   PyPDF2.utils.PdfReadError: File has not been decrypted\n   ```\n\n\
    9. Decrypt the file and access its content:\n   ```python\n   >>> document.decrypt('automate')\n\
    \   1\n   >>> document.numPages\n   3\n   >>> document.pages[0].extractText()\n\
    \   'A VERY IMPORTANT DOCUMENT \\nBy James McCormac CEO Loose Seal Inc\\n'\n \
    \  ```\n\n10. Close the file to clean up:\n    ```python\n    >>> file.close()\n\
    \    ```\n\n### How it works...\n\nOnce the document is open, as shown in *step\
    \ 1* and *step 2* in the *How to do it...* section, the `document` object provides\
    \ access to the document.\n\nSome useful properties are the number of pages, available\
    \ in `.numPages`, and each of the pages, available in `.pages`, which can be accessed\
    \ like a list.\n\nOther data that's accessible is stored in `.documentInfo`, which\
    \ stores metadata on the creator and when it was created.\n\n> The information\
    \ in `.documentInfo` is optional and sometimes not up to date. It depends greatly\
    \ on the tool used to generate the PDF.\n\nEach of the `page` objects can get\
    \ its text by calling `.extractText()`, which will return all the text contained\
    \ in the page, as done in *step 5* and *step 6*. This method tries to extract\
    \ all text, but it has some limitations. For well-structured texts, such as our\
    \ example, it works quite well, and the resulting text can be processed cleanly.\
    \ When dealing with text in multiple columns or located in strange positions,\
    \ it may complicate working with it.\n\n> Notice that the PDF file needs to be\
    \ open for the whole operation, instead of using a `with` context operator. After\
    \ leaving the `with` block, the file is closed.\n\n*Step 8* and *step 9* show\
    \ how to deal with encrypted files. You can detect whether a file is encrypted\
    \ or not with `.isEncrypted`, and then decrypt it with the `.decrypt` method,\
    \ providing the correct password.\n\n### There's more...\n\nPDF is such a flexible\
    \ format that it is widely used for a variety of purposes, but that also means\
    \ that it can be difficult to parse and process.\n\nWhile most PDF files contain\
    \ text information, it is not uncommon that they contain images of text. This\
    \ happens when a document has been scanned. In this case, the information is stored\
    \ as a collection of images, instead of in structured text. This makes it difficult\
    \ to extract the textual data; we may end up having to resort to methods such\
    \ as OCR to parse the images into text.\n\nPyPDF2 does not provide a good interface\
    \ to deal with images. You may need to transform the PDF into a collection of\
    \ images and then process the images with other tools like Pillow. See the Reading\
    \ images recipe for ideas about OCR and the usage of Pillow. Most PDF readers\
    \ can do it, or you can use a command-line tool such as pdftoppm (https://linux.die.net/man/1/pdftoppm)\
    \ or QPDF (see the following).\n\nSome methods of encrypting files may not be\
    \ understood by PyPDF2. It will generate NotImplementedError: only algorithm code\
    \ 1 and 2 are supported. If that happens, you need to decrypt the PDF externally\
    \ and open it once it is decrypted. You can use QPDF to create a copy without\
    \ the password, as follows:\n\n```\n$ qpdf --decrypt --password=PASSWORD encrypted.pdf\
    \ output-decrypted.pdf\n```\n\nThe full documentation for QPDF is available here:\
    \ http://qpdf.sourceforge.net/files/qpdf-manual.html. QPDF is available in most\
    \ package managers as well.\n\n> QPDF is capable of doing a lot of transformations\
    \ and analyzing PDFs in depth. There are also bindings in Python on a library\
    \ called pikepdf (https://pikepdf.readthedocs.io/en/stable/). This package is\
    \ more complicated to use than PyPDF2 and it's not as straightforward for text\
    \ extraction, but it can be useful for other operations such as extracting images\
    \ from a PDF.\n\n### See also\n\n- The Reading text files recipe, earlier in this\
    \ chapter, to learn the basics of opening and reading files.\n- The Crawling and\
    \ searching directories recipe, earlier in this chapter, to learn how to search\
    \ and find files in directories.\n\n## Reading Word documents\n\nWord documents\
    \ (.docx) are another common kind of document that stores mainly text. They are\
    \ typically generated with Microsoft Office, but other tools also produce compatible\
    \ files. They are probably the most common format to share files that need to\
    \ be editable, but they are also common for distributing documents.\n\nWe'll see\
    \ in this recipe how to extract text information from a Word document.\n\n###\
    \ Getting ready\n\nWe'll use the python-docx module to read and process Word documents:\n\
    \n```\n$ echo \"python-docx==0.8.10\" >> requirements.txt\n$ pip install -r requirements.txt\n\
    ```\n\nWe have prepared a test file, available in the GitHub Chapter04/documents\
    \ directory, called document-1.docx, which we'll use in this recipe. Note that\
    \ this document follows the same Lorem Ipsum pattern that was described in the\
    \ test document for the Reading PDF files recipe.\n\n### How to do it...\n\n1.\
    \ Import python-docx:\n   ```python\n   >>> import docx\n   ```\n\n2. Open the\
    \ document-1.docx file:\n   ```python\n   >>> doc = docx.Document('document-1.docx')\n\
    \   ```\n\n3. Check some of the metadata properties stored in core_properties:\n\
    \   ```python\n   >>> doc.core_properties.title\n   'A very important document'\n\
    \   >>> doc.core_properties.keywords\n   'lorem ipsum'\n   >>> doc.core_properties.modified\n\
    \   datetime.datetime(2018, 6, 24, 15, 1, 7)\n   ```\n\n4. Check the number of\
    \ paragraphs:\n   ```python\n   >>> len(doc.paragraphs)\n   58\n   ```"
  mdcn: "## 读取 PDF 文件\n\n文档的一种常见格式是 **PDF（便携式文档格式）**。它最初是一种为任何打印机描述文档的格式，因此 PDF 是一种确保文档打印效果与显示完全一致的格式。它已成为共享文档的强大标准，尤其是那些最终版本且旨在只读的文档。\n\
    \n### 准备工作\n\n在本节中，我们将使用 `PyPDF2` 模块。我们需要将其添加到虚拟环境中：\n\n```\n$ echo \"PyPDF2==1.26.0\"\
    \ >> requirements.txt\n$ pip install -r requirements.txt\n```\n\n在 GitHub 的 `Chapter03/documents`\
    \ 目录中，我们准备了两个文档 `document-1.pdf` 和 `document-2.pdf`，用于本节。请注意，它们主要包含 Lorem Ipsum\
    \ 文本，这只是一个占位符。\n\n> Lorem Ipsum 文本通常用于设计中，以便在设计前无需创建内容即可展示文本。你可以在此处了解更多相关信息：https://loremipsum.io/。\n\
    \n它们都是相同的测试文档，但第二个文档只能使用密码打开。密码是 `automate`。\n\n### 如何操作...\n\n1. 导入模块：\n   ```python\n\
    \   >>> from PyPDF2 import PdfFileReader\n   ```\n\n2. 打开 `document-1.pdf` 文件并创建一个\
    \ PDF 文档对象。请注意，文件需要在整个读取过程中保持打开状态：\n   ```python\n   >>> file = open('document-1.pdf',\
    \ 'rb')\n   >>> document = PdfFileReader(file)\n   ```\n\n3. 获取文档的页数并检查其是否加密：\n\
    \   ```python\n   >>> document.numPages\n   3\n\n   >>> document.isEncrypted\n\
    \   False\n   ```\n\n4. 从文档信息中获取创建日期（2018年6月24日 11:15:18），并发现它是使用 Mac Quartz PDFContext\
    \ 创建的：\n   ```python\n   >>> document.documentInfo['/CreationDate']\n   'D:20180624111518Z00\\\
    '00\\''\n   >>> document.documentInfo['/Producer']\n   'Mac OS X 10.13.5 Quartz\
    \ PDFContext'\n   ```\n\n5. 获取第一页并读取其上的文本：\n   ```python\n   >>> document.pages[0].extractText()\n\
    \   '!A VERY IMPORTANT DOCUMENT \\nBy James McCormac CEO Loose Seal Inc '\n  \
    \ ```\n\n6. 对第二页执行相同操作（此处已编辑）：\n   ```python\n   >>> document.pages[1].extractText()\n\
    \   '\"!This is an example of a test document that is stored in PDF format. It\
    \ contains some \\nsentences to describe what it is and the it has lore ipsum\
    \ text.\\n!\"\\nLorem ipsum dolor sit amet, consectetur adipiscing elit. ...$'\n\
    \   ```\n\n7. 关闭文件并打开 document-2.pdf：\n   ```python\n   >>> file.close()\n   >>>\
    \ file = open('document-2.pdf', 'rb')\n   >>> document = PdfFileReader(file)\n\
    \   ```\n\n8. 检查文档是否加密（它需要密码），如果我们尝试访问其内容，则会引发错误：\n   ```python\n   >>> document.isEncrypted\n\
    \   True\n   >>> document.numPages\n   ...\n   PyPDF2.utils.PdfReadError: File\
    \ has not been decrypted\n   ```\n\n9. 解密文件并访问其内容：\n   ```python\n   >>> document.decrypt('automate')\n\
    \   1\n   >>> document.numPages\n   3\n   >>> document.pages[0].extractText()\n\
    \   'A VERY IMPORTANT DOCUMENT \\nBy James McCormac CEO Loose Seal Inc\\n'\n \
    \  ```\n\n10. 关闭文件以进行清理：\n    ```python\n    >>> file.close()\n    ```\n\n###\
    \ 工作原理...\n\n一旦文档打开，如 *如何操作...* 部分的 *步骤 1* 和 *步骤 2* 所示，`document` 对象提供了对文档的访问。\n\
    \n一些有用的属性是页数（在 `.numPages` 中可用）和每一页（在 `.pages` 中可用），可以像列表一样访问。\n\n其他可访问的数据存储在\
    \ `.documentInfo` 中，其中存储了关于创建者和创建时间的元数据。\n\n> `.documentInfo` 中的信息是可选的，有时不是最新的。它在很大程度上取决于用于生成\
    \ PDF 的工具。\n\n每个 `page` 对象都可以通过调用 `.extractText()` 来获取其文本，这将返回页面中包含的所有文本，如 *步骤\
    \ 5* 和 *步骤 6* 中所示。此方法尝试提取所有文本，但它有一些限制。对于结构良好的文本，例如我们的示例，它效果很好，并且生成的文本可以干净地处理。当处理多列文本或位于奇怪位置的文本时，可能会使处理变得复杂。\n\
    \n> 请注意，PDF 文件需要在整个操作过程中保持打开状态，而不是使用 `with` 上下文运算符。离开 `with` 块后，文件将被关闭。\n\n*步骤\
    \ 8* 和 *步骤 9* 展示了如何处理加密文件。你可以使用 `.isEncrypted` 检测文件是否加密，然后使用 `.decrypt` 方法提供正确的密码进行解密。\n\
    \n### 更多内容...\n\nPDF 是一种非常灵活的格式，广泛用于各种目的，但这也意味着它可能难以解析和处理。\n\n虽然大多数 PDF 文件包含文本信息，但它们包含文本图像的情况并不少见。当文档被扫描时，就会发生这种情况。在这种情况下，信息存储为图像集合，而不是结构化文本。这使得提取文本数据变得困难；我们可能最终不得不求助于\
    \ OCR 等方法将图像解析为文本。\n\nPyPDF2 没有提供处理图像的良好接口。你可能需要将 PDF 转换为图像集合，然后使用其他工具（如 Pillow）处理图像。有关\
    \ OCR 和 Pillow 使用的想法，请参阅读取图像部分。大多数 PDF 阅读器都可以做到这一点，或者你可以使用命令行工具，如 pdftoppm (https://linux.die.net/man/1/pdftoppm)\
    \ 或 QPDF（见下文）。\n\n某些文件加密方法可能不被 PyPDF2 理解。它将生成 NotImplementedError: only algorithm\
    \ code 1 and 2 are supported。如果发生这种情况，你需要在外部解密 PDF，然后在解密后打开它。你可以使用 QPDF 创建一个没有密码的副本，如下所示：\n\
    \n```\n$ qpdf --decrypt --password=PASSWORD encrypted.pdf output-decrypted.pdf\n\
    ```\n\nQPDF 的完整文档可在此处获取：http://qpdf.sourceforge.net/files/qpdf-manual.html。QPDF\
    \ 在大多数包管理器中也可用。\n\n> QPDF 能够进行大量转换和深入分析 PDF。Python 中也有一个名为 pikepdf (https://pikepdf.readthedocs.io/en/stable/)\
    \ 的库的绑定。这个包比 PyPDF2 更复杂，对于文本提取来说不那么直接，但它对于其他操作（如从 PDF 中提取图像）可能很有用。\n\n### 另请参阅\n\
    \n- 本章前面的读取文本文件部分，了解打开和读取文件的基础知识。\n- 本章前面的爬取和搜索目录部分，了解如何在目录中搜索和查找文件。\n\n## 读取\
    \ Word 文档\n\nWord 文档（.docx）是另一种常见的文档类型，主要存储文本。它们通常由 Microsoft Office 生成，但其他工具也可以生成兼容文件。它们可能是共享需要编辑的文件的最常见格式，但它们也常用于分发文档。\n\
    \n我们将在本节中了解如何从 Word 文档中提取文本信息。\n\n### 准备工作\n\n我们将使用 python-docx 模块来读取和处理 Word\
    \ 文档：\n\n```\n$ echo \"python-docx==0.8.10\" >> requirements.txt\n$ pip install\
    \ -r requirements.txt\n```\n\n我们准备了一个测试文件，可在 GitHub 的 Chapter04/documents 目录中找到，名为\
    \ document-1.docx，我们将在本节中使用它。请注意，此文档遵循与读取 PDF 文件部分测试文档中描述的相同 Lorem Ipsum 模式。\n\
    \n### 如何操作...\n\n1. 导入 python-docx：\n   ```python\n   >>> import docx\n   ```\n\
    \n2. 打开 document-1.docx 文件：\n   ```python\n   >>> doc = docx.Document('document-1.docx')\n\
    \   ```\n\n3. 检查存储在 core_properties 中的一些元数据属性：\n   ```python\n   >>> doc.core_properties.title\n\
    \   'A very important document'\n   >>> doc.core_properties.keywords\n   'lorem\
    \ ipsum'\n   >>> doc.core_properties.modified\n   datetime.datetime(2018, 6, 24,\
    \ 15, 1, 7)\n   ```\n\n4. 检查段落数量：\n   ```python\n   >>> len(doc.paragraphs)\n\
    \   58\n   ```"
