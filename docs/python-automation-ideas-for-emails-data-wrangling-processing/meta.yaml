    work.


    We have some text prepared for training the model. It is available on GitHub:
    `https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter11`.


    In the `shop_training` subdirectory, there are three subdirectories (`appliances`,
    `furniture`, and `others`), each containing ten text files with email content.
    Each of the subdirectories corresponds to a label, so all the emails in each subdirectory
    should be qualified on that label.


    The data is zipped in a file called `shop.zip`. This contains the same information,
    but Google requires it to be uploaded in zip format.


    > Each email text is simulating a request to the shop for either two departments
    or other stuff. You can take a look at them.


    We need to create a new model. Go to `https://console.cloud.google.com/natural-language`
    and select **AutoML text and document classification**:


