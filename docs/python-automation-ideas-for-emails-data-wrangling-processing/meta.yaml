    Preface


    # Who this book is for


    This book is for Python beginners, not necessarily developers, that want to use
    and expand their knowledge to automate tasks. Most of the examples in the book
    are aimed at marketing, sales, and other non-tech areas. The reader needs to know
    a little of the Python language, including its basic concepts.


    # What this book covers


    Chapter 1, *Let''s Begin Our Automation Journey*, presents some basic content
    that will be used all through the book. It describes how to install and manage
    third-party tools through virtual environments, how to do effective string manipulation,
    how to use command-line arguments, and introduces you to regular expressions and
    other methods of text processing.


    Chapter 2, *Automating Tasks Made Easy*, shows how to prepare and automatically
    run tasks. It covers how to program tasks to be executed when they should, instead
    of running them manually; how to be notified of the result of a task that''s run
    automatically; and how to be notified if there has been an error in an automated
    process.


    Chapter 3, *Building Your First Web Scraping Application*, explores sending web
    requests to communicate with external websites in different formats, such as raw
    HTML content; structured feeds; RESTful APIs; and even automating a browser to
    execute steps without manual intervention. It also covers how to process results
    to extract relevant information.


    Chapter 4, *Searching and Reading Local Files*, explains how to search through
    local files and directories and analyze the information stored there. You will
    learn how to filter through relevant files in different encodings and read files
    in several common formats, such as CSVs, PDFs, Word documents, and even images.


    Chapter 5, *Generating Fantastic Reports*, looks at how to display information
    given in text format in multiple formats. This includes creating templates to
    produce text files, as well as creating richly formatted and properly styled Word
    and PDF documents.


    Chapter 6, *Fun with Spreadsheets*, explores how to read and write spreadsheets
    in the CSV format; in rich Microsoft Excel, including with formatting and charts;
    and in LibreOffice, a free alternative to Microsoft Excel.


    Chapter 7, *Cleaning and Processing Data*, presents techniques to deal with multiple
    sources of information and cleanup of data before processing it. You will learn
    how to batch process to speed up working with big amounts of data, including using
    specific data analysis libraries like Pandas.


