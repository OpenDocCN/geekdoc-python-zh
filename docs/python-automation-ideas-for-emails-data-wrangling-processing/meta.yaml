    \n## See also\n\n- The *Downloading web pages* recipe, earlier in this chapter,\
    \ to learn the basics of requesting web pages.\n- The *Parsing HTML* recipe, earlier\
    \ in this chapter, to learn how to parse elements in HTML.\n\n## Subscribing to\
    \ feeds\n\nRSS is probably the biggest secret of the internet. Its time in the\
    \ spotlight seemed to be during the 2000s, and it enables easy subscription to\
    \ websites. It is present in lots of websites and it's incredibly useful.\n\n\
    At its core, RSS is a way of presenting a succession of ordered references (typically\
    \ articles, but also other elements such as podcast episodes or YouTube publications)\
    \ and publishing times. This makes for a very natural way of learning what articles\
    \ are new since the last check, as well as presenting some structured data about\
    \ them, such as the title and a summary.\n\nIn this recipe, we will present the\
    \ `feedparser` module and determine how to obtain data from an RSS feed.\n\n>\
    \ RSS is not the only available feed format. There's also a format called Atom,\
    \ but Atom and RSS are more or less the same. `feedparser` is also capable of\
    \ parsing Atom, so both formats can be processed in the same way.\n\n## Getting\
    \ ready\n\nWe need to add the `feedparser` dependency to our `requirements.txt`\
    \ file and reinstall it:\n\n```bash\n$ echo \"feedparser==5.2.1\" >> requirements.txt\n\
    $ pip install -r requirements.txt\n```\n\nFeed URLs can be found on almost all\
    \ pages that deal with publications, including blogs, news, podcasts, and so on.\
    \ Sometimes they are very easy to find, but sometimes they are a little bit hidden.\
    \ Search for `feed` or `RSS`.\n\nMost newspapers and news agencies have their\
    \ RSS feeds divided by themes. For our example, we'll parse the **New York Times**\
    \ main page feed, `https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml`.\
    \ There are more feeds available on the main feed page: `https://archive.nytimes.com/www.nytimes.com/services/xml/rss/index.html`.\n\
    \n> Please note that the feeds may be subject to terms and conditions of use.\
    \ In the case of the New York Times, the terms and conditions are described at\
    \ the end of the main feed page.\n\nPlease note that this feed changes quite often,\
    \ meaning that the linked entries will be different than the examples in this\
    \ book.\n\n## How to do it...\n\n1. Import the `feedparser` module, as well as\
    \ `datetime`, `delorean`, and `requests`:\n\n    ```python\n    >>> import feedparser\n\
    \    >>> import datetime\n    >>> import delorean\n    >>> import requests\n \
    \   ```\n\n2. Parse the feed (it will be downloaded automatically) and check when\
    \ it was last updated. Feed information, like the title of the feed, can be obtained\
    \ in the `feed` attribute:\n\n    ```python\n    >>> rss = feedparser.parse('http://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml')\n\
    \    >>> rss.channel.updated\n    'Friday, 24 Jan 2020 19:42:27 +0000'\n    ```\n\
    \n3. Get the entries that are less or equal to 6 hours old:\n\n    ```python\n\
    \    >>> time_limit = delorean.parse(rss.channel.updated) - datetime.timedelta(hours=6)\n\
    \    >>> entries = [entry for entry in rss.entries if delorean.parse(entry.published)\
    \ > time_limit]\n    ```\n\n4. Some of the returned entries will be older than\
