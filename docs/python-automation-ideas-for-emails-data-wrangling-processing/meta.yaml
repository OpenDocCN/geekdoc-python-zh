  - '[PAGE 128]


    # How it works...


    As each entry is a single line, we open the file and go one by one, parsing each
    of them. The parsing code is available in `price_log.py`. Check it for more details
    on the parsing process.


    In *step 2* in the *How to do it...* section, we open the file and process each
    of the lines to create a log list with all our processed logs. Then, we can produce
    aggregation operations, as in the next steps.


    *Step 3* shows how to aggregate all values. In this case, summing the price of
    all items sold over the log file to get the total revenue.


    *Step 4* uses `Counter` to determine the amount of each item in the file log.
    This returns a dictionary-like object with the values to count and the number
    of times they appear.


    Filtering can also be done in a line-by-line approach, as shown in *step 5*. This
    is similar to the other filtering we''ve done in the recipes of this chapter.


    # There''s more...


    Remember that you can stop processing a file as soon as you have all the data
    you need. This may be a good strategy if the file is very big, as is usually the
    case with log files.


    `Counter` is a great tool to quickly count a list. See the Python documentation
    here for more details: `https://docs.python.org/3/library/collections.html#counter-objects`.
    You can get the ordered items by calling the following:


    ```

    >>> counter.most_common()

    [(1489, 2), (4508, 1), (8597, 1), (3086, 1)]

    ```


    # See also


    +   - The *Using a third-party tool—parse* recipe in *Chapter 1, Let''s Begin
    Our Automation Journey*.

    - The *Reading text files* recipe, earlier in this chapter, to learn more about
    opening and reading files.'
  - "[PAGE 129]\n\nSearching and Reading Local Files\n\n# Reading file metadata\n\n\
    File metadata is everything associated with a particular file that is not the\
    \ data content itself. The most obvious is the file name, but there are more parameters\
    \ available such as the size of the file, the creation date, or its permissions.\n\
    \nBrowsing through that data is important, for example, to filter files older\
    \ than a date, or to find all files bigger than a value in KBs. In this recipe,\
    \ we'll see how to access the file metadata in Python.\n\n# Getting ready\n\n\
    We'll use the `zen_of_python.txt` file, available in the GitHub repository (https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter04/documents/zen_of_python.txt).\
    \ As you can see, by using the `ls` command, the file is 856 bytes, and, in this\
    \ example, it was created on June 14:\n\n```\n$ ls -lrt zen_of_python.txt\n-rw-r--r--@\
    \ 1 jaime staff 856 14 Jun 21:22 zen_of_python.txt\n```\n\nOn your computer, the\
    \ dates may vary, based on when you downloaded the code.\n\n# How to do it...\n\
    \n+   1. Import `os` and `datetime`:\n   python\n   >>> import os\n   >>> from\
    \ datetime import datetime\n   \n2. Retrieve the stats of the `zen_of_python.txt`\
    \ file:\n   python\n   >>> stats = os.stat(('zen_of_python.txt'))\n   >>> stats\n\
    \   os.stat_result(st_mode=33188, st_ino=15822537, st_dev=16777224, st_nlink=1,\
    \ st_uid=501, st_gid=20, st_size=856, st_atime=1529461935, st_mtime=1529007749,\
    \ st_ctime=1529007757)\n   \n3. Get the size of the file, in bytes:\n   python\n\
    \   >>> stats.st_size\n   856\n   \n4. Obtain when the file was last modified:\n\
    \   python\n   >>> datetime.fromtimestamp(stats.st_mtime)\n   datetime.datetime(2018,\
    \ 6, 14, 21, 22, 29)"
  - "[PAGE 130]\n\n5. Obtain when the file was last accessed:\n    >>> datetime.fromtimestamp(stats.st_atime)\n\
    \    datetime.datetime(2018, 6, 20, 3, 32, 15)\n\n# How it works...\n\nos.stats\
    \ returns a stats object that represents the metadata stored in the filesystem.\
    \ The metadata includes:\n\n+   - The size of the file, in bytes, as shown in\
    \ step 3 in the How to do it... section, using st_size.\n- When the file content\
    \ was last modified, as shown in step 4, using st_mtime.\n- When the file was\
    \ last read (accessed), as shown in step 5, using st_atime.\n\nThe times are returned\
    \ as timestamps, so in step 4 and step 5, we create a datetime object from the\
    \ timestamps to better access the data.\n\nAll these values can be used to filter\
    \ the files and access the meaningful ones.\n\n> Notice you don't need to open\
    \ the file with open() to read its metadata. Detecting whether a file has been\
    \ changed after a known time by reading the modification time will be quicker\
    \ than comparing its content, so you can take advantage of that for comparison.\n\
    \n# There's more...\n\nTo obtain the stats one by one, there are also convenience\
    \ functions available in os.path, which follow the pattern get<value>:\n\n```\n\
    >>> os.path.getsize('zen_of_python.txt')\n856\n>>> os.path.getmtime('zen_of_python.txt')\n\
    1529531584.0\n>>> os.path.getatime('zen_of_python.txt')\n1529531669.0\n```\n\n\
    The value is specified in the UNIX timestamp format (seconds since January 1,\
