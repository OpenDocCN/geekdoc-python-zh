  md: 'Building Your First Web Scraping Application


    # How it works...


    The first step is to download the page. Then, the raw text can be parsed, as in
    *step 3*. The resulting `page` object contains the parsed information.


    > The `html.parser` parser is the default one, but for certain operations, it
    can have problems. For example, for big pages it can be slow, and it can have
    issues rendering highly dynamic web pages. You can use other parsers, such as
    `lxml`, which is much faster, or `html5lib`, which will be closer to how a browser
    operates. They are external modules that will need to be added to the `requirements.txt`
    file.


    `BeautifulSoup` allows us to search for HTML elements. It can search for the first
    occurrence of an HTML element with `.find()` or return a list with `.find_all()`.
    In *step 5*, it searched for a specific tag, `<a>`, that had a particular attribute,
    `id=chars`. After that, it kept iterating on `.next_elements` until it found the
    next `h3` tag, which marks the end of the section.


    The text of each element is extracted and finally composed into a single text.
    Note the `or` that avoids storing `None`, returned when an element has no text.


    > HTML is highly versatile and can have multiple structures. The case presented
    in this recipe is typical, but other options on dividing sections can be grouping
    related sections inside a big `<div>` tag or other elements, or even raw text.
    Some experimentation will be required until you find the specific process to extract
    the juicy bits on a web page. Don''t be afraid to try!


    # There''s more...


    Regexes can be used as input in the `.find()` and `.find_all()` methods. For example,
    this search uses the `h2` and `h3` tags:


    ```

    >>> page.find_all(re.compile(''^h(2|3)''))

    [<h2>Sample Web Page</h2>, <h3 id="contents">CONTENTS</h3>, <h3 id="basics">1.
    Creating a Web Page</h3>, <h3 id="syntax">2. HTML Syntax</h3>, <h3 id="chars">3.
    Special Characters</h3>, <h3 id="convert">4. Converting Plain Text to HTML</h3>,
    <h3 id="effects">5. Effects</h3>, <h3 id="lists">6. Lists</h3>, <h3 id="links">7.
    Links</h3>, <h3 id="tables">8. Tables</h3>, <h3 id="viewing">9. Viewing Your Web
    Page</h3>, <h3 id="install">10. Installing Your Web Page on the Internet</h3>,
    <h3 id="more">11. Where to go from here</h3>]

    ```'
