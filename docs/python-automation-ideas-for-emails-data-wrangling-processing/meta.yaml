    ...     (''Pentium'', 3_100_000, 1993),

    ...     (''Core i7'', 731_000_000, 2008),

    ... )

    ```


    Draw a line with markers to display those points at the proper places. The ''v''
    mark will display a triangle:


    ```python

    >>> data_x = [x for label, y, x in DATA]

    >>> data_y = [y for label, y, x in DATA]

    >>> plt.plot(data_x, data_y, ''v'')

    [<matplotlib.lines.Line2D object at 0x12b7c2d60>]

    ```


    For each data point, append a label in the proper place with the name of the CPU:


    ```python

    >>> for label, y, x in DATA:

    ...     plt.text(x, y, label)

    Text(1971, 2300, ''Intel 4004'')

    Text(1979, 68000, ''Motorola 68000'')

    Text(1993, 3100000, ''Pentium'')

    Text(2008, 731000000, ''Core i7'')

    ```


    Finally, growth doesn''t make sense displayed in a linear graph, so we change
    the scale to be logarithmic, which makes exponential growth look like a straight
    line. But to keep the sense of dimension, we add a grid. Call .show to display
    the graph:


    ```python

    >>> plt.gca().grid()

    >>> plt.yscale(''log'')

    ```


    The resulting graph will be displayed when calling plt.show():


    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_284_0.png)


    Note how the straight line follows the duplication of transistors in the logarithmic
    scale and the processors are close. You can see that the real processors look
    pretty similar to the prediction done by Moore!


    The full `matplotlib` documentation can be found here: https://matplotlib.org/.
    In particular, check the available formats for the lines (solid, dashed, dotted,
    and so on) and markers (dot, circle, triangle, star, and so on) here: https://matplotlib.org/api/_as_gen/matplotlib.pyplot.plot.html.


    ## See also


    - The *Adding legends and annotations* recipe, later in this chapter, to learn
    how to add context information to a graph.

    - The *Combining graphs* recipe, later in this chapter, to learn how to add multiple
    plots to a single graph.


    ## Drawing a scatter plot


    A scatter plot is one where the information is displayed as dots with X and Y
    values. They are very useful when presenting data with two dimensions (as opposed
    to a temporal series seen previously) and to see whether there''s any relationship
    between two variables. In this recipe, we''ll display a graph plotting time spent
    on a website against money spent to see whether we can see a pattern.


    ## Getting ready


    We need to install matplotlib in our virtual environment:


    ```bash

    $ echo "matplotlib==3.2.1" >> requirements.txt

    $ pip install -r requirements.txt

    ```


    If you are using macOS, you may get an error like this: **RuntimeError: Python
    is not installed as a framework**. See the matplotlib documentation on how to
    fix it: https://matplotlib.org/faq/osx_framework.html.


    As we''re going to be working with data points, we''ll use the `scatter.csv` file
    to read the data. This file is available on GitHub at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter08/scatter.csv.


    ## How to do it...


    1. Import matplotlib, csv, and FuncFormatter (to format the axes later):


    ```python

    >>> import csv

    >>> import matplotlib.pyplot as plt

    >>> from matplotlib.ticker import FuncFormatter

    ```


    2. Prepare the data, reading from the file using the csv module:


    ```python

    >>> with open(''scatter.csv'') as fp:

    ...     reader = csv.reader(fp)

    ...     data = list(reader)

    ```


    3. Prepare the data for plotting, and then plot it:


    ```python

    >>> data_x = [float(x) for x, y in data]

    >>> data_y = [float(y) for x, y in data]

    >>> plt.scatter(data_x, data_y)

    <matplotlib.collections.PathCollection object at 0x11ccbda30>

    ```


    4. Improve the context by formatting the axes:


    ```python

    >>> def format_minutes(value, pos):

    ...     return ''{}m''.format(int(value))

    >>> def format_dollars(value, pos):

    ...     return ''${}''.format(value)

    >>> plt.gca().xaxis.set_major_formatter(FuncFormatter(format_minutes))

    >>> plt.xlabel(''Time in website'')

    Text(0.5, 0, ''Time in website'')

    >>> plt.gca().yaxis.set_major_formatter(FuncFormatter(format_dollars))

    >>> plt.ylabel(''Spending'')

    Text(0, 0.5, ''Spending'')

    ```


    5. Show the graph:


    ```python

    >>> plt.show()

    ```


    6. The result will be displayed in a new window:


    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_286_0.png)


    ## How it works...


    Step 1 of the *How to do it...* section imports the modules we''ll use later.


    Step 2 reads the data from the CSV file. The data is transformed into a list to
    allow us to iterate through it several times, as that''s necessary for *step 3*.


    Step 3 prepares the data in two arrays and then uses `.scatter` to plot them.
    The parameters for `.scatter`, as with other methods of `matplotlib`, require
    an array of X and Y values. They both need to be the same size. The data is converted
    into a `float` from the file format to ensure the number format.


    Step 4 refines the way the data is presented on each axis. For each axis, a function
    is created that defines how the values on that axis should be displayed (in dollars
    or in minutes). The function accepts the value to display and the position as
    inputs. Typically, the position will be ignored. The axis formatter will be overwritten
    with `.set_major_formatter`. Notice that both axes are returned with `.gca` (get
    current axes).


    A label is added to the axes with `.xlabel` and `.ylabel`.


    Finally, *step 5* displays the graph in a new window. Analyzing the result, we
    can say that there seems to be two kinds of users, ones who spend less than 10
    minutes and never spend more than $10, and users who spend more time and also
    have a higher chance of spending up to $100.


    > Note that the data presented is synthetic, and it has been generated with the
    result in mind. Real-life data will probably look more spread out. Statistical
    analysis can be used to determine trends and patterns with a higher degree of
    sophistication.


    ## There''s more...


    A scatter plot can display not only points in two dimensions, but also add a third
    (area) and even a fourth dimension (color).


    To add those elements, use the parameters `s` for `size` and `c` for `color`.


    > `size` is defined as the diameter of a ball in points squared. So, for a ball
    of diameter 10, 100 will be used. `color` can use any of the usual definitions
    of color in `matplotlib`, such as hex color, RGB, and so on. See the documentation
    for more details: https://matplotlib.org/users/colors.html.


    For example, we can generate a random graph using the four dimensions in the following
    way:


    ```python

    >>> import matplotlib.pyplot as plt

    >>> import random

    >>> NUM_POINTS = 100

    >>> COLOR_SCALE = [''#FF0000'', ''#FFFF00'', ''#FFFF00'', ''#7FFF00'', ''#00FF00'']

    >>> data_x = [random.random() for _ in range(NUM_POINTS)]

    >>> data_y = [random.random() for _ in range(NUM_POINTS)]

    >>> size = [(50 * random.random()) ** 2 for _ in range(NUM_POINTS)]

    >>> color = [random.choice(COLOR_SCALE) for _ in range(NUM_POINTS)]

    >>> plt.scatter(data_x, data_y, s=size, c=color, alpha=0.5)

    <matplotlib.collections.PathCollection object at 0x123552ee0>

    >>> plt.show()

    ```


    COLOR_SCALE goes from green to red, and the size of each of the points will be
    between 0 and 50 points in diameter. The result should be something like this:


    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_288_0.png)


    Note that the values are random, so each time the code is run it will generate
    a different graph.


    The `alpha` value makes each of the points semitransparent, allowing us to see
    where they overlap. The higher this value is, the less transparent the points
    will be. This parameter will affect the displayed color as it will blend the point
    in with the background.


    > Even though it''s possible to display two independent values in terms of size
    and color, they can also be related to any of the other values. For example, making
    the color dependent on the size will make all the points of the same size the
    same color, which may help us distinguish between the data. Remember that the
    ultimate goal of a graph is to make data easy to understand. Try different approaches
    to improve this.


    The full `matplotlib` documentation can be found here: https://matplotlib.org/.


    ## See also


    - The *Displaying multiple lines* recipe, earlier in this chapter, to learn how
    to plot multiple lines that follow a temporal series.

    - The *Adding legends and annotations* recipe, later in this chapter, to learn
    how to add context information to a graph.


    ## Visualizing maps


    To best way to show information that changes from region to region is to create
    a map that presents the information, while at the same time giving a regional
    sense of location for the data.


    In this recipe, we''ll make use of the `Fiona` module to import GIS information,
    as well as `matplotlib` to display the information. We will display a map of Western
    Europe and display the population of each country with a color grade. The darker
    the color, the larger the population.


    ## Getting ready


    We need to install `matplotlib` and `Fiona` in our virtual environment:


    ```bash

    $ echo "matplotlib==3.2.1" >> requirements.txt

    $ echo "Fiona==1.8.13" >> requirements.txt

    $ pip install -r requirements.txt

    ```'
