    Cleaning and Processing Data


    > Storing the aggregated total and the number of events that comprise this total
    allows us to aggregate the values further and calculate the average. Just the
    average on its own cannot be aggregated further, but the aggregated total and
    the number of events can, and the average can easily be calculated from them.


    The aggregated file is stored in CSV format, after `calculate_results` returns
    the value to `main`.


    # There''s more...


    A careful examination of the input dates will show that they are not exactly identical.
    While the format in the `output_3_OH.csv` file is `YYYY-MM-DDTHH:MM:SS+00:00`,
    the format in the file `output_3_ON.csv` is `YYYY-MM-DD HH:MM:SS+00:00`. Note
    the space where the T is. The ISO 8601 format uses the T character to separate
    the date from the time, but it''s quite common to see it separated with a space,
    as described in RFC3339 (https://tools.ietf.org/html/rfc3339), so most software
    tools will be able to parse it, including `delorean`.


    > Noticing at a later stage that the data is not completely standardized is actually
    a common problem. Be forgiving with the input data and try to be as strict as
    possible with the data output.


    The full `delorean` documentation can be found online at https://delorean.readthedocs.io/.


    The average price per sale is rounded to two decimal places, which keeps it up
    to the penny and makes sense in this specific case. This is done through the built-in
    `round` function that accepts an extra parameter with the number of decimal places
    to round to:


    ```

    >>> round(3.14159)

    3

    >>> round(3.14159, 4)

    3.1416

    ```


    If you need more control to round either up or down to the next integer, you can
    use the `math.ceil` and `math.floor` functions:


    ```

    >>> import math

    >>> math.ceil(3.14159)

    ```'
