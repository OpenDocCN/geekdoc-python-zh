    \ in performing numerical operations, machine learning, and network communications,\
    \ to command-line convenience tools, database access, image processing, and much\
    \ more!\n\nMost of them are available on the official Python Package Index (https://pypi.org/),\
    \ which has more than 200,000 packages ready to use. In this book, we'll install\
    \ some of them. In general, it's worth spending a little time researching external\
    \ tools when trying to solve a problem. It's very likely that someone else has\
    \ already created a tool that solves all, or at least part, of the problem.\n\n\
    More important than finding and installing a package is keeping track of which\
    \ packages are being used. This greatly helps with **replicability**, meaning\
    \ the ability to start the whole environment from scratch in any situation.\n\n\
    # Getting ready\n\nThe starting point is to find a package that will be of use\
    \ in our project.\n\nA great one is `requests`, a module that deals with HTTP\
    \ requests and is known for its easy and intuitive interface, as well as its great\
    \ documentation. Take a look at the documentation, which can be found here: https://requests.readthedocs.io/en/master/.\n\
    \nWe'll use `requests` throughout this book when dealing with HTTP connections.\n\
    \nThe next step will be to choose the version to use. In this case, the latest\
    \ (2.22.0, at the time of writing) will be perfect. If the version of the module\
    \ is not specified, by default it will install the latest version, which can lead\
    \ to inconsistencies in different environments as newer versions are released.\n\
    \nWe'll also use the great `delorean` module for time handling (version 1.0.0:\
    \ http://delorean.readthedocs.io/en/latest/).\n\n# How to do it...\n\n+   1. Create\
    \ a `requirements.txt` file in our `main` directory, which will specify all the\
    \ requirements for our project. Let's start with `delorean` and `requests`:\n\
    \    \n    delorean==1.0.0\n    requests==2.22.0"
