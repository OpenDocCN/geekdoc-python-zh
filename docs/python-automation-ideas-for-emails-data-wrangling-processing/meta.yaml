    # Crawling the web


    Given the nature of hyperlink pages, starting from a known place and following
    links to other pages is a very important tool in your arsenal when scraping the
    web.


    To do so, we crawl a page looking for a short phrase, and we print any paragraph
    that contains it. We will search only in pages that belong to a single site, for
    example: only URLs starting with www.somesite.com. We won''t follow links to external
    sites.


