    # How it works...


    The most important peculiarity of Word documents is that the data is structured
    in paragraphs, instead of in pages. The size of the font, line size, and other
    considerations may make the number of pages change.


    Most of the paragraphs are also typically empty, or contain only new lines, tabs,
    or other whitespace characters. It is a good idea to check when a paragraph is
    empty and skip it.


    In the *How to do it...* section, *step 2* opens the file and *step 3* shows how
    to access the core properties. These are properties that are defined in Word as
    document metadata, such as the author or creation date.


    > This information needs to be taken with a grain of salt, as a lot of tools that
    produce Word documents (but not Microsoft Office) won''t necessarily fill it.
    Double-check before using that information.


    The paragraphs of the document can be iterated and have their text extracted in
    raw format, as shown in *step 6*. This is information that doesn''t include styling
    information and is typically the most useful format for processing the data automatically.


    If the styling information is required, the runs can be used, as in *step 7* and
    *step 8*. Each paragraph can contain one or more runs, which are smaller text
    units that share the same styling. For example, if a sentence is *Word1* *word2*
    **word3**, there will be three runs, one with italicized text (Word1), another
    with underline (word2), and another with bold (word3). Furthermore, there can
    be intermediate runs with regular text that contain just whitespaces, making a
    total of five runs.'
