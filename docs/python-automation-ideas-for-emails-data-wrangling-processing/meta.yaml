  - "[PAGE 247]\n\n# How it works...\n\nLet's take a look at the `aggregate_by_location.py`\
    \ script, used in *step 6*.\n\nThe final part of the script file deals with the\
    \ parsing of arguments, which was described in detail in *Chapter 2, Automating\
    \ Tasks Made Easy*.\n\nThe `main` function reads the input CSV and calls the `calculate_results`\
    \ function to generate the aggregated reports. It then writes the results in the\
    \ output file. The usage of `DictReader` and `DictWriter` was already described\
    \ in *Chapter 6, Fun with Spreadsheets*.\n\nIn the `calculate_results` function,\
    \ the aggregation takes place. Each line is analyzed to check its date, and all\
    \ the entries with the same date are aggregated:\n\n```\ndef calculate_results(reader):\n\
    \    result = []\n    last_date = None\n    total_usd = 0\n    number = 0\n\n\
    \    for row in reader:\n        date = parse_iso(row['STD_TIMESTAMP'])\n    \
    \    if not last_date:\n            last_date = date\n\n        if last_date <\
    \ date:\n            # New day!\n            result.append(line(date, total_usd,\
    \ number))\n            total_usd = 0\n            number = 0\n            last_date\
    \ = date\n\n        number += 1\n        total_usd += Decimal(row['USD'])\n\n\
    \    # Final results\n    result.append(line(date, total_usd, number))\n    return\
    \ result\n```\n\nThe code takes note of the latest date and keeps aggregating\
    \ until it changes. Every time there's a change in date, the line is appended\
    \ to the `result` array."
