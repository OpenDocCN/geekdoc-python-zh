- md: "## Automatic Testing Routines\n\nA Mock object will create another mock automatically\
    \ if any attribute is accessed or called. For example:\n\n```\n>>> from unittest.mock\
    \ import Mock\n>>> mock = Mock()\n>>> mock.attribute\n<Mock name='mock.attribute'\
    \ id='4337292000'>\n>>> mock.other_attribute\n<Mock name='mock.other_attribute'\
    \ id='4337292144'>\n>>> mock.other_attribute()\n<Mock name='mock.other_attribute()'\
    \ id='4337353728'>\n```\n\nThis means mocks have a flexible API that adapts easily\
    \ to most calls of a module.\n\nIn our example, we mocked a function and a constant\
    \ in our code, but you can also mock any library, either in the Python standard\
    \ library or any other installed package.\n\n> Keep in mind that you need to mock\
    \ in the correct path. You need to mock the object where it's imported to, not\
    \ where it's originally defined. For example, if you're importing from extpck\
    \ import extfunction into your package code.module, you need to mock it as follows:\n\
    \n@mock.patch('code.module.extfunction')\n\nIt's an easy mistake to make, even\
    \ for seasoned mocking users. Remember that you need to mock where it's used,\
    \ not where it's defined.\n\nIf you need to raise an exception when a mock is\
    \ called, you can do so using the .side_effect attribute. This is very useful\
    \ for testing error conditions in external libraries and making sure your code\
    \ can correctly handle them:\n\n```\n>>> from unittest.mock import Mock\n>>> mock\
    \ = Mock()\n>>> mock.side_effect = Exception('Custom error')\n>>> mock()\nTraceback\
    \ (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n  File \"\
    /usr/local/Cellar/python@3.8/3.8.2/Frameworks/Python.framework/Versions/3.8/lib/python3.8/unittest/mock.py\"\
    , line 1081, in __call__\n    return self._mock_call(*args, **kwargs)\n  File\
    \ \"/usr/local/Cellar/python@3.8/3.8.2/Frameworks/Python.framework/Versions/3.8/lib/python3.8/unittest/mock.py\"\
    , line 1085, in _mock_call\n    return self._execute_mock_call(*args, **kwargs)\n\
    \  File \"/usr/local/Cellar/python@3.8/3.8.2/Frameworks/Python.framework/Versions/3.8/lib/python3.8/unittest/mock.py\"\
    , line 1140, in _execute_mock_call\n    raise effect\nException: Custom error\n\
    ```\n\nThe same `.side_effect` attribute, assigning an iterator, can be used if\
    \ the mock needs to return different results for multiple calls:\n\n```\n>>> from\
    \ unittest.mock import Mock\n>>> mock = Mock()\n>>> mock.side_effect = (1, 2,\
    \ 3)\n>>> mock()\n1\n>>> mock()\n2\n>>> mock()\n3\n```\n\nWe mentioned that `mock.patch`\
    \ can be used as a decorator. This is a Python concept that, in essence, modifies\
    \ the function it is decorating, usually by adding extra functionality before\
    \ and/or after the function process.\n\nDecorators are a very useful concept and,\
    \ in essence, they replace the function with a modified version. You can gain\
    \ a deeper understanding of how decorators work from this article: https://medium.com/hasgeek/python-decorators-demystified-5ab4081fd0fe.\n\
    \n`patch` can also be used as a `with` block. If that's the case, the module is\
    \ mocked while inside the block:\n\n```\n>>> from unittest.mock import patch\n\
    >>> from code.dependencies import circle\n>>> with patch('code.dependencies.PI',\
    \ 2):\n...     print(circle(2))\n...\n8\n>>> circle(2)\n12.56636\n```\n\nYou can\
    \ read the full documentation for mocks at https://docs.python.org/3/library/unittest.mock.html.\n\
    \n## See also\n\n- The *Testing external code* recipe, earlier in this chapter,\
    \ to learn how to test code in other modules.\n- The *Testing using HTTP call\
    \ mocking* recipe, up next, to learn how to use testing modules that mock specific\
    \ libraries.\n\n## Testing using HTTP call mocking\n\nWorking with mocks is a\
    \ common operation when testing. Some dependencies are typically mocked in most\
    \ tests.\n\nOne common dependency to be mocked is external HTTP calls. Performing\
    \ these calls while running tests is costly, slow, and can produce unreliable\
    \ results if the network connection fails.\n\nThough external calls can be mocked\
    \ through the library `mock` in the Python standard library, as shown in the previous\
    \ recipe, *Testing using dependency mocking*, there are specific testing modules\
    \ that allow you to simulate HTTP calls and responses. Also, there are specific\
    \ libraries that mock other specific libraries. This produces easier and better\
    \ mocks, as they are adapted to the behavior of the mock.\n\nWe have previously\
    \ used the fantastic `requests` library (introduced in the *Installing third-party\
    \ packages* recipe from *Chapter 1, Let's Begin Our Automation Journey*, but also\
    \ used throughout the book). We will look at how to mock this library specifically.\
    \ We will use the testing library `responses`, which allows us to generate expected\
    \ requests and their responses.\n\n> Note that this testing library doesn't mock\
    \ general HTTP access, but specifically the `requests` module.\n\n## Getting ready\n\
    \nWe will use the `pytest` module, along with the `requests` and `responses` libraries.\
    \ We should install the modules, adding them to our `requirements.txt` file as\
    \ follows:\n\n```\n$ echo \"pytest==5.4.1\" >> requirements.txt\n$ echo \"requests==2.23.0\"\
    \ >> requirements.txt\n$ echo \"responses==0.10.12\" >> requirements.txt\n$ pip\
    \ install -r requirements.txt\n```\n\nWe will use the test files tests/test_requests.py\
    \ and code/code_requests.py. You can download them from the GitHub repository\
    \ at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter12/tests,\
    \ under the subdirectories tests and code.\n\nThe tree should look like this:\n\
    \n```\n├── code\n│   ├── __init__.py\n│   └── code_requests.py\n├── conftest.py\n\
    └── tests\n    └── test_requests.py\n```\n\n## How to do it...\n\n1. The __init__.py\
    \ file and conftest.py are empty, but define the structure of the modules.\n2.\
    \ Check the file code/code_requests.py, which contains a call to an external form\
    \ in https://httpbin.org/post to order a pizza:\n\n```\nimport requests\nfrom\
    \ datetime import datetime, timedelta\n\nRECIPES = {\n    'DEFAULT': {\n     \
    \   'size': 'small',\n        'topping': ['bacon', 'onion'],\n    },\n    'SPECIAL':\
    \ {\n        'size': 'large',\n        'topping': ['bacon', 'mushroom', 'onion'],\n\
    \    }\n}\n\ndef order_pizza(recipe='DEFAULT'):\n    delivery_time = datetime.now()\
    \ + timedelta(hours=1)\n    delivery = delivery_time.strftime('%H:%M')\n\n   \
    \ data = {\n        'custname': \"Sean O'Connell\",\n        'custtel': '123-456-789',\n\
    \        'custemail': 'sean@oconnell.ie',\n        # Indicate the time\n     \
    \   'delivery': delivery,\n        'comments': ''\n    }\n\n    extra_info = RECIPES[recipe]\n\
    \    data.update(extra_info)\n    resp = requests.post('https://httpbin.org/post',\
    \ data)\n    return resp.json()['form']\n```\n\n3. Check the tests in the file\
    \ tests/test_requests.py, checking that the code behaves correctly:\n\n```\nimport\
    \ pytest\nimport requests\nimport responses\nimport urllib.parse\nfrom code.code_requests\
    \ import order_pizza\n\n\n@responses.activate\ndef test_order_pizza():\n    body\
    \ = {\n        'form': {\n            'size': 'small',\n            'topping':\
    \ ['bacon', 'onion']\n        }\n    }\n    responses.add(responses.POST, 'https://httpbin.org/post',\n\
    \                  json=body, status=200)\n    result = order_pizza()\n    assert\
    \ result['size'] == 'small'\n    # Decode the sent data\n    encoded_body = responses.calls[0].request.body\n\
    \    sent_data = urllib.parse.parse_qs(encoded_body)\n    assert sent_data['size']\
    \ == ['small']\n\n\n@responses.activate\ndef test_order_pizza_timeout():\n   \
    \ responses.add(responses.POST, 'https://httpbin.org/post',\n                \
    \  body=requests.exceptions.Timeout())\n\n    with pytest.raises(requests.exceptions.Timeout):\n\
    \        order_pizza()\n```\n\n4. Run pytest to run the test file:\n\n```\n$ pytest\
    \ tests/test_requests.py\n============================= test session starts =============================\n\
    platform darwin -- Python 3.8.2, pytest-5.4.1, py-1.8.1,\npluggy-0.13.1\nrootdir:\
    \ Python-Automation-Cookbook-Second-Edition/Chapter12\ncollected 2 items\n\ntests/test_requests.py\
    \ ..                                                [100%]\n\n==============================\
    \ 2 passed in 0.12s ===============================\n```\n\n## How it works...\n\
    \nThe code module content is defined in step 1. The file code_requests.py contains\
    \ the following elements:\n\n- A section of imports.\n- The definition of two\
    \ kinds of pizzas in the RECIPES constant.\n- The order_pizza function selects\
    \ the pizza, composes the form data, and then POSTS it to https://httpbin.org/post."
  mdcn: "## 自动化测试流程\n\n当访问或调用任何属性时，Mock对象会自动创建另一个模拟对象。例如：\n\n```\n>>> from unittest.mock\
    \ import Mock\n>>> mock = Mock()\n>>> mock.attribute\n<Mock name='mock.attribute'\
    \ id='4337292000'>\n>>> mock.other_attribute\n<Mock name='mock.other_attribute'\
    \ id='4337292144'>\n>>> mock.other_attribute()\n<Mock name='mock.other_attribute()'\
    \ id='4337353728'>\n```\n\n这意味着模拟对象拥有灵活的API，能够轻松适应模块的大多数调用方式。\n\n在我们的示例中，我们模拟了代码中的一个函数和一个常量，但你也可以模拟任何库，无论是Python标准库还是其他已安装的包。\n\
    \n> 请记住，你需要在正确的路径进行模拟。你需要模拟对象被导入的位置，而不是其原始定义的位置。例如，如果你在代码模块中使用 `from extpck import\
    \ extfunction` 导入，你需要按如下方式模拟：\n\n@mock.patch('code.module.extfunction')\n\n这是一个容易犯的错误，即使是经验丰富的模拟用户也不例外。请记住，你需要模拟的是使用的位置，而不是定义的位置。\n\
    \n如果你需要在模拟对象被调用时引发异常，可以使用 `.side_effect` 属性来实现。这对于测试外部库的错误条件以及确保你的代码能正确处理这些错误非常有用：\n\
    \n```\n>>> from unittest.mock import Mock\n>>> mock = Mock()\n>>> mock.side_effect\
    \ = Exception('Custom error')\n>>> mock()\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\n  File \"/usr/local/Cellar/python@3.8/3.8.2/Frameworks/Python.framework/Versions/3.8/lib/python3.8/unittest/mock.py\"\
    , line 1081, in __call__\n    return self._mock_call(*args, **kwargs)\n  File\
    \ \"/usr/local/Cellar/python@3.8/3.8.2/Frameworks/Python.framework/Versions/3.8/lib/python3.8/unittest/mock.py\"\
    , line 1085, in _mock_call\n    return self._execute_mock_call(*args, **kwargs)\n\
    \  File \"/usr/local/Cellar/python@3.8/3.8.2/Frameworks/Python.framework/Versions/3.8/lib/python3.8/unittest/mock.py\"\
    , line 1140, in _execute_mock_call\n    raise effect\nException: Custom error\n\
    ```\n\n同样的 `.side_effect` 属性，通过赋值一个迭代器，可以在模拟对象需要为多次调用返回不同结果时使用：\n\n```\n>>> from\
    \ unittest.mock import Mock\n>>> mock = Mock()\n>>> mock.side_effect = (1, 2,\
    \ 3)\n>>> mock()\n1\n>>> mock()\n2\n>>> mock()\n3\n```\n\n我们提到过 `mock.patch` 可以用作装饰器。这是Python的一个概念，本质上是修改它所装饰的函数，通常是在函数处理之前和/或之后添加额外的功能。\n\
    \n装饰器是一个非常有用的概念，本质上，它们用修改后的版本替换了原函数。你可以从这篇文章中更深入地了解装饰器的工作原理：https://medium.com/hasgeek/python-decorators-demystified-5ab4081fd0fe。\n\
    \n`patch` 也可以用作 `with` 代码块。如果是这种情况，模块在代码块内部会被模拟：\n\n```\n>>> from unittest.mock\
    \ import patch\n>>> from code.dependencies import circle\n>>> with patch('code.dependencies.PI',\
    \ 2):\n...     print(circle(2))\n...\n8\n>>> circle(2)\n12.56636\n```\n\n你可以在\
    \ https://docs.python.org/3/library/unittest.mock.html 阅读关于模拟对象的完整文档。\n\n## 另请参阅\n\
    \n- 本章前面的 *测试外部代码* 配方，了解如何测试其他模块中的代码。\n- 接下来的 *使用HTTP调用模拟进行测试* 配方，了解如何使用模拟特定库的测试模块。\n\
    \n## 使用HTTP调用模拟进行测试\n\n在测试中使用模拟对象是一项常见操作。一些依赖项通常在大多数测试中被模拟。\n\n一个常见的需要模拟的依赖项是外部HTTP调用。在运行测试时执行这些调用成本高、速度慢，并且如果网络连接失败，可能会产生不可靠的结果。\n\
    \n虽然可以通过Python标准库中的 `mock` 库来模拟外部调用，如前面的 *使用依赖模拟进行测试* 配方所示，但也有特定的测试模块允许你模拟HTTP调用和响应。此外，还有特定的库可以模拟其他特定库。这会产生更简单、更好的模拟，因为它们适应了被模拟对象的行为。\n\
    \n我们之前使用过出色的 `requests` 库（在 *第1章，开始我们的自动化之旅* 的 *安装第三方包* 配方中介绍，但也在全书中使用）。我们将研究如何专门模拟这个库。我们将使用测试库\
    \ `responses`，它允许我们生成预期的请求及其响应。\n\n> 请注意，这个测试库不是模拟通用的HTTP访问，而是专门模拟 `requests`\
    \ 模块。\n\n## 准备工作\n\n我们将使用 `pytest` 模块，以及 `requests` 和 `responses` 库。我们应该安装这些模块，将它们添加到我们的\
    \ `requirements.txt` 文件中，如下所示：\n\n```\n$ echo \"pytest==5.4.1\" >> requirements.txt\n\
    $ echo \"requests==2.23.0\" >> requirements.txt\n$ echo \"responses==0.10.12\"\
    \ >> requirements.txt\n$ pip install -r requirements.txt\n```\n\n我们将使用测试文件 tests/test_requests.py\
    \ 和 code/code_requests.py。你可以从GitHub仓库 https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter12/tests\
    \ 下载它们，位于 tests 和 code 子目录下。\n\n目录结构应如下所示：\n\n```\n├── code\n│   ├── __init__.py\n\
    │   └── code_requests.py\n├── conftest.py\n└── tests\n    └── test_requests.py\n\
    ```\n\n## 操作步骤...\n\n1. __init__.py 文件和 conftest.py 文件是空的，但定义了模块的结构。\n2. 查看文件\
    \ code/code_requests.py，其中包含一个对外部表单 https://httpbin.org/post 的调用，用于订购披萨：\n\n```\n\
    import requests\nfrom datetime import datetime, timedelta\n\nRECIPES = {\n   \
    \ 'DEFAULT': {\n        'size': 'small',\n        'topping': ['bacon', 'onion'],\n\
    \    },\n    'SPECIAL': {\n        'size': 'large',\n        'topping': ['bacon',\
    \ 'mushroom', 'onion'],\n    }\n}\n\ndef order_pizza(recipe='DEFAULT'):\n    delivery_time\
    \ = datetime.now() + timedelta(hours=1)\n    delivery = delivery_time.strftime('%H:%M')\n\
    \n    data = {\n        'custname': \"Sean O'Connell\",\n        'custtel': '123-456-789',\n\
    \        'custemail': 'sean@oconnell.ie',\n        # Indicate the time\n     \
    \   'delivery': delivery,\n        'comments': ''\n    }\n\n    extra_info = RECIPES[recipe]\n\
    \    data.update(extra_info)\n    resp = requests.post('https://httpbin.org/post',\
    \ data)\n    return resp.json()['form']\n```\n\n3. 查看文件 tests/test_requests.py\
    \ 中的测试，检查代码行为是否正确：\n\n```\nimport pytest\nimport requests\nimport responses\n\
    import urllib.parse\nfrom code.code_requests import order_pizza\n\n\n@responses.activate\n\
    def test_order_pizza():\n    body = {\n        'form': {\n            'size':\
    \ 'small',\n            'topping': ['bacon', 'onion']\n        }\n    }\n    responses.add(responses.POST,\
    \ 'https://httpbin.org/post',\n                  json=body, status=200)\n    result\
    \ = order_pizza()\n    assert result['size'] == 'small'\n    # Decode the sent\
    \ data\n    encoded_body = responses.calls[0].request.body\n    sent_data = urllib.parse.parse_qs(encoded_body)\n\
    \    assert sent_data['size'] == ['small']\n\n\n@responses.activate\ndef test_order_pizza_timeout():\n\
    \    responses.add(responses.POST, 'https://httpbin.org/post',\n             \
    \     body=requests.exceptions.Timeout())\n\n    with pytest.raises(requests.exceptions.Timeout):\n\
    \        order_pizza()\n```\n\n4. 运行 pytest 来执行测试文件：\n\n```\n$ pytest tests/test_requests.py\n\
    ============================= test session starts =============================\n\
    platform darwin -- Python 3.8.2, pytest-5.4.1, py-1.8.1,\npluggy-0.13.1\nrootdir:\
    \ Python-Automation-Cookbook-Second-Edition/Chapter12\ncollected 2 items\n\ntests/test_requests.py\
    \ ..                                                [100%]\n\n==============================\
    \ 2 passed in 0.12s ===============================\n```\n\n## 工作原理...\n\n代码模块的内容在步骤1中定义。文件\
    \ code_requests.py 包含以下元素：\n\n- 一部分导入语句。\n- 在 RECIPES 常量中定义了两种披萨。\n- order_pizza\
    \ 函数选择披萨，组合表单数据，然后将其POST到 https://httpbin.org/post。"
