  - "[PAGE 62]\n\n```\nresult = number / other_number\nZeroDivisionError: division\
    \ by zero\n```\n\n# How it works...\n\nTo properly capture any unexpected exceptions,\
    \ the main function should be wrapped in a `try-except` block, as implemented\
    \ in step 4 of the *How to do it...* section. Compare this to how step 1 does\
    \ not wrap the code:\n\n```\ntry:\n    main(...)\nexcept Exception as exc:\n \
    \   # Something went wrong\n    logging.exception(\"Error running task\")\n  \
    \  exit(1)\n```\n\nNote that logging the exception is important for getting information\
    \ on what went wrong.\n\nThis kind of exception is nicknamed Pokémon Exception\
    \ because it can catch 'em all. It will capture any unexpected error at the highest\
    \ level. Do not use it in other areas of the code, as capturing everything can\
    \ hide unexpected errors. At the very least, any unexpected exception should be\
    \ logged to allow for further analysis.\n\nThe extra step, to exit with status\
    \ 1 by using the `exit(1)` call, informs the operating system that something went\
    \ wrong with our script.\n\nThe `logging` module allows us to log. Note the basic\
    \ configuration, which includes an optional file to store the logs, the format,\
    \ and the level of the logs to display.\n\nThe available levels for logs are—from\
    \ less critical to more critical—DEBUG, INFO, WARNING, ERROR, and CRITICAL. The\
    \ logging level will set the minimum severity required to log the message. For\
    \ example, an INFO log won't be stored if the severity is set to WARNING.\n\n\
    Creating logs is easy. You can do this by making a call to the `logging.<logging\
    \ level>` method (where the logging level is DEBUG, INFO, and so on). For example:\n\
    \n```\n>>> import logging\n>>> logging.basicConfig(level=logging.INFO)\n>>> logging.warning('a\
    \ warning message')\nWARNING:root:a warning message\n>>> logging.info('an info\
    \ message')\nINFO:root:an info message\n```"
- md: "## Automating Tasks Made Easy\n\n```python\n>>> logging.debug('a debug message')\n\
    >>>\n```\n\nNote how logs with a severity lower than INFO are not displayed. Use\
    \ the level definition to tweak how much information to display. This may change,\
    \ for example, how DEBUG logs may be used only while developing the task, but\
    \ not be displayed when running it. Notice that `task_with_error_handling_step4.py`\
    \ defines the logging level to be DEBUG, by default.\n\nA good definition of log\
    \ levels is key to displaying relevant information while reducing noise. It is\
    \ not easy to set up sometimes, but especially if more than one person is involved,\
    \ try to agree on exactly what WARNING versus ERROR means to avoid misinterpretations.\n\
    \n`logging.exception()` is a special case that will create an ERROR log, but it\
    \ will also include information about the exception, such as the stack trace.\n\
    \nRemember to check logs to discover errors. A useful reminder is to add a note\
    \ to the results file, like this:\n\n```python\ntry:\n    main(args.n1, args.n2,\
    \ args.output)\nexcept Exception as exc:\n    logging.exception(exc)\n    print('There\
    \ has been an error. Check the logs', file=args.output)\n```\n\n## There's more...\n\
    \nThe Python logging module has many capabilities, including the following:\n\n\
    - It provides further tweaks to the format of the log, for example, including\
    \ the file and line number of the log that was produced.\n- It defines different\
    \ logger objects, each one with its own configuration, such as logging level and\
    \ format. This allows us to publish logs to different systems in different ways,\
    \ though, normally, a single logger object is used to keep things simple.\n- It\
    \ sends logs to multiple places, such as the standard output and file, or even\
    \ a remote logger.\n- It automatically rotates logs, creating new log files after\
    \ a certain time or size. This is handy for keeping logs organized by day or week.\
    \ It also allows for the compression or removal of old logs. Logs take up space\
    \ when they accumulate.\n- It reads standard logging configurations from files.\n\
    \nInstead of creating complex rules on what to log, try to log extensively using\
    \ the proper level for each, and then filter by level.\n\nFor comprehensive details,\
    \ refer to the Python documentation of the module at https://docs.python.org/3.8/library/logging.html,\
    \ or the tutorial at https://docs.python.org/3.8/howto/logging.html.\n\n## See\
    \ also\n\n- The *Adding command-line options* recipe in *Chapter 1, Let's Begin\
    \ Our Automation Journey*, to describe the basic elements of the command-line\
    \ options.\n- The *Preparing a task* recipe, covered earlier in the chapter, to\
    \ learn about the strategy to follow when designing an automated task.\n\n## Sending\
    \ email notifications\n\nEmail has become an inescapable tool for everyday use.\
    \ It's arguably the best place to send a notification if an automated task has\
    \ detected something. On the other hand, email inboxes are already too full up\
    \ with spam messages, so be careful.\n\nSpam filters are also a reality. Be careful\
    \ with whom to send emails to and the number of emails to be sent. An email server\
    \ or address can be labeled as a spam source, and all emails may be quietly dropped\
    \ by the internet.\n\nThis recipe will show you how to send a single email using\
    \ an existing email account.\n\nThis approach is viable for spare emails sent\
    \ to a couple of people, as a result of an automated task, but no more than that.\
    \ Refer to *Chapter 9, Dealing with Communication Channels*, for more ideas on\
    \ how to send emails, including groups.\n\n## Getting ready\n\nFor this recipe,\
    \ we require a valid email account set up, which includes the following:\n\n-\
    \ A valid email server using SMTP; SMTP is the standard email protocol\n- A port\
    \ to connect to\n- An address\n- A password\n\nThese four elements should be enough\
    \ to be able to send an email.\n\nSome email services, for example, Gmail, will\
    \ encourage you to set up 2FA, meaning that a password is not enough to send an\
    \ email. Typically, they'll allow you to create a specific password for apps to\
    \ use, bypassing the 2FA request. Check your email provider's information for\
    \ options.\n\nThe email service you use should indicate what the SMTP server is\
    \ and what port to use in their documentation. This can be retrieved from email\
    \ clients as well, as they are the same parameters. Check your provider documentation.\
    \ In the following example, we will use a Gmail account.\n\n## How to do it...\n\
    \n1. Create the `email_task.py` file, as follows:\n\n```python\nimport argparse\n\
    import configparser\n\nimport smtplib\nfrom email.message import EmailMessage\n\
    \ndef main(to_email, server, port, from_email, password):\n    print(f'With love,\
    \ from {from_email} to {to_email}')\n\n    # Create the message\n    subject =\
    \ 'With love, from ME to YOU'\n    text = '''This is an example test'''\n    msg\
    \ = EmailMessage()\n    msg.set_content(text)\n    msg['Subject'] = subject\n\
    \    msg['From'] = from_email\n    msg['To'] = to_email\n\n    # Open communication\
    \ and send\n    server = smtplib.SMTP_SSL(server, port)\n    server.login(from_email,\
    \ password)\n    server.send_message(msg)\n    server.quit()\n\nif __name__ ==\
    \ '__main__':\n    parser = argparse.ArgumentParser()\n    parser.add_argument('email',\
    \ type=str, help='destination email')\n    parser.add_argument('-c', dest='config',\
    \ type=argparse.FileType('r'),\n                        help='config file', default=None)\n\
    \n    args = parser.parse_args()\n    if not args.config:\n        print('Error,\
    \ a config file is required')\n        parser.print_help()\n        exit(1)\n\n\
    \    config = configparser.ConfigParser()\n    config.read_file(args.config)\n\
    \n    main(args.email,\n         server=config['DEFAULT']['server'],\n       \
    \  port=config['DEFAULT']['port'],\n         from_email=config['DEFAULT']['email'],\n\
    \         password=config['DEFAULT']['password'])\n```\n\n2. Create a configuration\
    \ file called `email_conf.ini` with the specifics of your email account. For example,\
    \ for a Gmail account, fill in the following template. The template is available\
    \ in GitHub at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter02/email_conf.ini\
    \ but be sure to fill it in with your data:\n\n```ini\n[DEFAULT]\nemail = EMAIL@gmail.com\n\
    server = smtp.gmail.com\nport = 465\npassword = PASSWORD\n```\n\n3. Ensure that\
    \ the file cannot be read or written by other users on the system, setting the\
    \ permissions of the file to allow only our user. 600 permissions mean read and\
    \ write access for the file owner, and no access to anyone else:\n   ```\n   $\
    \ chmod 600 email_conf.ini\n   ```\n4. Run the script to send a test email:\n\
    \   ```\n   $ python3 email_task.py -c email_conf.ini destination_email@server.com\n\
    \   ```\n5. Check the inbox of the destination email; an email should be received\
    \ with the subject With love, from ME to YOU.\n\n## How it works...\n\nThere are\
    \ two key steps in the preceding scripts—the generation of the message and the\
    \ sending.\n\nThe message needs to contain mainly the To and From email addresses,\
    \ as well as the Subject. If the content is pure text, as in this case, calling\
    \ `.set_content()` is enough. The whole message can then be sent.\n\nIt is technically\
    \ possible to send an email that is tagged as coming from a different email address\
    \ than the one you used to send it. This is discouraged, though, as it can be\
    \ considered by your email provider as trying to impersonate a different email.\
    \ You can use the reply-to header to allow answering to a different account.\n\
    \nSending the email requires you to connect to the specified server and start\
    \ an SMTP connection. SMTP is the standard for email communication.\n\nThe steps\
    \ are quite straightforward—configure the server, log into it, send the prepared\
    \ message, and quit.\n\nIf you need to send more than one message, you can log\
    \ in, send multiple emails, and then quit, instead of connecting each time.\n\n\
    ## There's more...\n\nIf the objective is a bigger operation, such as a marketing\
    \ campaign, or even production emails, such as confirming a user's email, please\
    \ refer to Chapter 9, Dealing with Communication Channels."
