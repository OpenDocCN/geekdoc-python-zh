    - The *Preparing a task* recipe in *Chapter 2, Automating Tasks Made Easy*.\n\
    - The *Speeding up web scraping* recipe in *Chapter 3, Building Your First Web\
    \ Scraping Application*.\n\n## Process data with Pandas\n\nFor some operations,\
    \ simple calculations are not enough. Sometimes, operations may have some nuances\
    \ in the way they are calculated and have problems with precision due to using\
    \ certain kinds of types.\n\n> Python allows us to use big numbers automatically,\
    \ but in certain languages, adjusting to big numbers could be a challenge. Numbers\
    \ in computing have limitations such as limited precision or ranges where they\
    \ are accurate. These limitations may not be obvious at first glance.\n\nEven\
    \ more so, Python is known not to have an amazing number-crunching performance.\
    \ Complicated mathematical operations will take longer compared to a compiled\
    \ language such as C++ or even Java.\n\nThat's why using a specialized package\
    \ can greatly help. They deal with a lot of complexities of the treatment of data,\
    \ and also produce better performance, as they're optimized for that.\n\nIn this\
    \ recipe, we will see how to process the files using the Pandas library, which\
    \ is an easy-to-use data analysis library for Python that's widely used by the\
    \ scientific community.\n\n### Getting ready\n\nWe will use the resulting CSV\
    \ file from the previous recipe that receives and transforms logs in the following\
    \ format:\n\n`[<Timestamp>] - SALE - PRODUCT: <product id> - PRICE: <price>`\n\
    \nEach line will represent a sale log.\n\nWe will use the pandas module. We should\
    \ install the module, adding it to our requirements.txt file as follows:\n\n```\n\
    $ echo \"pandas==1.0.1\" >> requirements.txt\n$ pip install -r requirements.txt\n\
    ```\n\nIn the GitHub repository, there are some log files to process with the\
    \ following structure:\n\n```\nsale_logs/\n  OH\n    logs.txt\n  ON\n    logs.txt\n\
    ```\n\nThe code can be found in the GitHub repository at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter07.\n\
    \n### How to do it...\n\n1. Import the data and transform it into a CSV file using\
    \ the logs_to_csv.py script. The script adds the location as input. Create the\
    \ files for both the OH and ON logs:\n   ```\n   $ python logs_to_csv.py sale_logs/OH/logs.txt\
    \ output_1_OH.csv -l OH\n   $ python logs_to_csv.py sale_logs/ON/logs.txt output_1_ON.csv\
    \ -l ON\n   ```\n2. Process both resulting files using the location_price.py script:\n\
    \   ```\n   $ python location_price.py output_1_OH.csv output_2_OH.csv\n   $ python\
    \ location_price.py output_1_ON.csv output_2_ON.csv\n   ```\n3. Process both files\
