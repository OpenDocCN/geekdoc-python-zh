    # There''s more...


    The code presented stores the data in the default CSV dialect. The CSV dialect
    defines what character divides the data on each row (commas or other characters),
    how to escape characters, newline characters (also known as line terminators)
    defining a new entry, and so on.


    > Escape is the process of storing characters that could be interpreted as part
    of the syntax; for example, storing a column with a text that includes a comma
    or a quote. The dialect will determine how to store it in that case, normally
    by adding a special character, for example, \, for a verbatim comma.


    In case the dialect needs to be tweaked, each of these parameters can be defined
    in the writer call. Refer to the following link for a list of all the parameters
    that can be defined: https://docs.python.org/3/library/csv.html#dialects-and-formatting-parameters.


    > CSV files are better when simple. If the data to be stored is complicated, maybe
    the best alternative is not a CSV file. But CSV files are extremely useful when
    dealing with tabular data. They can be understood by virtually all programs, and
    even dealing with them at a low level is easy.


