    # Extracting data from structured strings


    In a lot of automated tasks, we''ll need to treat input text structured in a known
    format and extract the relevant information. For example, a spreadsheet may define
    a percentage in a piece of text (such as 37.4%) and we want to retrieve it in
    a numerical format to apply it later (0.374, as a float).


    In this recipe, we''ll learn how to process sale logs that contain inline information
    about a product, such as whether it has been sold, its price, profit made, and
    other information.


    # Getting ready


    Imagine that we need to parse information stored in sales logs. We''ll use a sales
    log with the following structure:


    ```

    [<Timestamp in iso format>] - SALE - PRODUCT: <product id> - PRICE: $<price of
    the sale>

    ```'
  - '[PAGE 19]


    Let''s Begin Our Automation Journey


    For example, a specific log may look like this:


    ```

    [2018-05-05T10:58:41.504054] - SALE - PRODUCT: 1345 - PRICE: $09.99

    ```


    Note that the price has a leading zero. All prices will have two digits for the
    dollars and two for the cents.


    > The standard ISO 8601 defines standard ways of representing the time and date.
    It is widely used in the computing world and can be parsed and generated by virtually
    any computer language.


    We need to activate our virtual environment before we start:


    ```

    $ source .venv/bin/activate

    ```


    # How to do it...


    +   1. In the Python interpreter, make the following imports. Remember to activate
    your virtualenv, as described in the Creating a virtual environment recipe:

    >>> import delorean

    >>> from decimal import Decimal


    2. Enter the log to parse:

    >>> log = ''[2018-05-05T11:07:12.267897] - SALE - PRODUCT: 1345 - PRICE: $09.99''


    3. Split the log into its parts, which are divided by - (note the space before
    and after the dash). We ignore the SALE part as it doesn''t add any relevant information:

    >>> divide_it = log.split('' - '')

    >>> timestamp_string, _, product_string, price_string = divide_it


    4. Parse the timestamp into a datetime object:

    >>> timestamp = delorean.parse(timestamp_string.strip(''[]''))


    5. Parse the product_id into an integer:

    >>> product_id = int(product_string.split('':'')[-1])


    6. Parse the price into a Decimal type:

    >>> price = Decimal(price_string.split(''$'')[-1])'
  - '[PAGE 20]


    7. Now you have all of the values in native Python format:


    ```

    >> timestamp, product_id, price

    (Delorean(datetime=datetime.datetime(2018, 5, 5, 11, 7, 12, 267897), timezone=''UTC''),
    1345, Decimal(''9.99''))

    ```


    # How it works...


    The basic working of this is to isolate each of the elements and then parse them
    into the proper type. The first step is to split the full log into smaller parts.
    The - string is a good divider, as it splits it into four parts—a timestamp one,
    one with just the word SALE, the product, and the price.


    In the case of the timestamp, we need to isolate the ISO format, which is in brackets
    in the log. That''s why the timestamp has the brackets stripped from it. We use
    the delorean module (introduced earlier) to parse it into a datetime object.


    The word SALE is ignored. There''s no relevant information there.


    To isolate the product ID, we split the product part at the colon. Then, we parse
    the last element as an integer:


    ```

    >>> product_string.split('':'')

    [''PRODUCT'', '' 1345'']

    >>> int('' 1345'')

    1345

    ```


    To divide the price, we use the dollar sign as a separator, and parse it as a
    Decimal character:


    ```

    >>> price_string.split(''$'')

    [''PRICE: '', ''09.99'']

    >>> Decimal(''09.99'')

    Decimal(''9.99'')

    ```


    As described in the next section, do not parse this value into a float type, as
    it will change the precision.'
