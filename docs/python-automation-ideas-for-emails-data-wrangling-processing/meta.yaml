    full `VALUESA` bar on top of the `VALUESB` bar.


    > Notice that we stack the second value, `VALUESB`, first. The second value represents
    a new product that was introduced to the market. `VALUESA` represents the established
    product and is more stable. This graph shows the growth of the new product better.


    Each of the periods is labeled on the *x-axis* with `.xticks`. To clarify the
    meaning, we add a label with `.ylabel`.


    To display the resulting graph, *step 5* calls `.show`, which opens a new window
