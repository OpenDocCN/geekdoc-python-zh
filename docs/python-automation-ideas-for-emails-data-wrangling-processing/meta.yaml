    \ used in *step 2*.\n\nThe end of the script file deals with the parsing of arguments,\
    \ which was described in detail in *Chapter 2, Automating Tasks Made Easy*.\n\n\
    The `main` function reads the input CSV and calls the `add_price_by_location`\
    \ function for each of the rows. It then saves the file:\n\n```python\ndef main(input_file,\
    \ output_file):\n    reader = csv.DictReader(input_file)\n    result = [add_price_by_location(row)\
    \ for row in reader]\n\n    # Save into csv format\n    header = result[0].keys()\n\
    \    writer = csv.DictWriter(output_file, fieldnames=header)\n    writer.writeheader()\n\
    \    writer.writerows(result)\n```\n\n## Cleaning and Processing Data\n\nIt uses\
    \ the CSV `DictReader` class to transform each of the rows into a dictionary.\
    \ The dictionary is then passed for processing. The resulting rows are stored\
    \ in the output CSV file using a `DictWriter` class. The header for the fields\
    \ of the output file is obtained from the keys in the dictionary of the first\
    \ output row.\n\nThe usage of `DictReader` and `DictWriter` was already described\
    \ in *Chapter 6, Fun with Spreadsheets*.\n\nThe most interesting code is in `add_price_by_location`.\
    \ This code will detect the country (USA or Canada) based on their location code.\
    \ Let's take a look:\n\n```python\nUS_LOCATIONS = ['AL', 'AK', ..., 'WY', 'DC']\n\
    CAD_LOCATIONS = ['AB', 'BC', ..., 'NU', 'YT']\nCAD_TO_USD = Decimal(0.76)\n\n\
    def add_price_by_location(row):\n    location = row['LOCATION']\n    if location\
    \ in US_LOCATIONS:\n        row['COUNTRY'] = 'USA'\n        row['CURRENCY'] =\
    \ 'USD'\n        row['USD'] = Decimal(row['PRICE'])\n    elif location in CAD_LOCATIONS:\n\
    \        row['COUNTRY'] = 'CANADA'\n        row['CURRENCY'] = 'CAD'\n        row['USD']\
    \ = Decimal(row['PRICE']) * CAD_TO_USD\n    else:\n        raise Exception('Location\
    \ not found')\n\n    return row\n```\n\nBased on the location, it derives the\
    \ currency. Note that the two-letter codes for Canadian provinces and territories\
    \ and for US states are described in two lists. The full description of each is\
    \ in the `CAD_LOCATIONS` and `US_LOCATIONS` arrays. If the detected location is\
    \ a US state, the currency is set to US dollars, and it's set to Canadian dollars\
    \ for all the provinces and territories in Canada.\n\n> It's very convenient that\
    \ US states and Canadian provinces have different unique codes, making them easy\
    \ to distinguish. In other systems, this may be more complicated.\n\nIt adds a\
    \ new key to the dictionary for the country, the currency, and the US-dollar equivalent\
    \ of the price. These three keys are then added as columns to the output CSV.\n\
    \n> Since Python 3.7, the dictionaries keep the insertion order. This means that\
    \ the last added key to the dictionary will be retrieved last when keys are presented.\
    \ This wasn't the case in previous versions, where we had to rely on OrderedDict,\
    \ a specific kind of dictionary that preserves key order. We take advantage of\
    \ this behavior regarding the generation of the header, as any new element introduced\
    \ will be stored as a new column at the end, keeping the order of the old ones.\n\
    \nThe resulting file provides information on each sale log in a common currency,\
    \ making comparisons easier.\n\n## There's more...\n\nAs we commented before,\
    \ processing and distinguishing location and currency may not be as straightforward\
    \ as presented here. Different countries may have different ways of presenting\
    \ places, and in some cases, codes used to represent locations from different\
    \ countries may overlap.\n\nThe country is added as a column to have available\
    \ later on.\n\nThe currency exchange rate is defined as a constant, but that's\
    \ only an approximation. It may be necessary to obtain it from an external source.\
    \ For example, www.exchangerate-api.com offers a free API to integrate exchange\
    \ rate conversions, as follows:\n\n```python\n>>> import requests\n>>> result\
    \ = requests.get('https://api.exchangerate-api.com/v4/latest/CAD')\n>>> result.json()['rates']['USD']\n\
    0.755081\n```\n\nMore complicated setups may require access to specific exchange\
    \ rate sources or to be able to retrieve the historic information on rates.\n\n\
    > Most exchange rate sources have a limit on the number of calls, or charge per\
    \ access. Be sure to avoid constant polling for data and store the rates for local\
    \ usage.\n\n## See also\n\n- The *Preparing a CSV spreadsheet* recipe from the\
    \ previous section.\n- The *Reading CSV files* recipe in *Chapter 4, Searching\
    \ and Reading Local Files*.\n- The *Preparing a task* recipe in *Chapter 2, Automating\
    \ Tasks Made Easy*.\n\n## Standardizing the date format\n\nThe date time format\
    \ in the logs is different depending on the location. In the Canadian logs, the\
    \ format is the standard ISO 8601 in the format YYYY-MM-DD. The logs coming from\
    \ the USA use the format MM-DD-YYYY. In this recipe, we will append a new column\
    \ with a standard format to unify both dates.\n\n## Getting ready\n\nWe will use\
    \ the resulting CSV file from the previous recipe that receives and transforms\
    \ logs in the following format:\n\n```\n[<Timestamp>] - SALE - PRODUCT: <product\
    \ id> - PRICE: <price>\n```\n\nEach line will represent a sale log.\n\nWe will\
    \ use the `parse` module. We should install the module, adding it to our `requirements.txt`\
    \ file as follows:\n\n```\n$ echo \"parse==1.14.0\" >> requirements.txt\n$ pip\
    \ install -r requirements.txt\n```\n\nIn the GitHub repository, there are some\
    \ log files to process with the following structure:\n\n```\nsale_logs/\n  OH\n\
    \    logs.txt\n  ON\n    logs.txt\n```\n\nThe code can be found in the GitHub\
    \ repository at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter07.\n\
    \n## How to do it...\n\n1. Import the data and transform it into a CSV file using\
    \ the `logs_to_csv.py` script. The script adds the location as input. Create the\
    \ files for both the OH and OT logs:\n\n```\n$ python logs_to_csv.py sale_logs/OH/logs.txt\
    \ output_1_OH.csv -l OH\n$ python logs_to_csv.py sale_logs/ON/logs.txt output_1_ON.csv\
    \ -l ON\n```\n\n2. Process both resulting files using the `location_price.py`\
    \ script:\n\n```\n$ python location_price.py output_1_OH.csv output_2_OH.csv\n\
    $ python location_price.py output_1_ON.csv output_2_ON.csv\n```\n\n3. Process\
    \ both files using the `standard_date.py` script:\n\n```\n$ python standard_date.py\
    \ output_2_OH.csv output_3_OH.csv\n$ python standard_date.py output_2_ON.csv output_3_ON.csv\n\
    ```\n\n4. Check the resulting CSV files in a spreadsheet. In the following screenshots,\
    \ the files are displayed using the LibreOffice software:\n\n| | A | B | C | D\
    \ | E | F | G | H |\n|---|---|---|---|---|---|---|---|---|\n| 1 | LOCATION | TIMESTAMP\
    \ | PRODUCT | PRICE | COUNTRY | CURRENCY | USD | STD_TIMESTAMP |\n| 2 | OH | 08-27-2019\
    \ 18:39:41 | 12346 | 2.99 | USA | USD | 2.99 | 2019-08-27T17:39:41+00:00 |\n|\
