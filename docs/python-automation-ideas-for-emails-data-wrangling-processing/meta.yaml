  - '[PAGE 480]


    # Debugging through logging


    Debugging is, after all, detecting what''s going on inside our program and finding
    out what unexpected or incorrect effects may be happening. A simple, yet very
    effective, approach is to output variables and other information at strategic
    parts of your code to allow the programmer to follow the flow of the program.


    The simplest form of this approach is called **print debugging**. This technique
    consists of inserting print statements at certain points to print the value of
    variables or points while debugging.


    But taking this technique a little further and combining it with the logging techniques
    presented in *Chapter 2, Automating Tasks Made Easy*, allows us to create a trace
    of the execution of the program. This tracing information can be really useful
    when detecting issues in a running program. Logs are also typically displayed
    when running tests using a test framework.


    > pytest, introduced in *Chapter 12, Automatic Testing Routines*, automatically
    shows logs of failed tests. Other test frameworks may need to be configured. Logging
    is presented in this book in *Chapter 2, Automating Tasks Made Easy*.


    # Getting ready


    Download the `debug_logging.py` file from GitHub: https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter13/debug_logging.py.


    This contains an implementation of the bubble sort algorithm (https://www.studytonight.com/data-structures/bubble-sort),
    which is one of the simplest ways to sort a list of elements. It iterates several
    times over the list, and within each iteration, two adjacent values are checked
    and interchanged, so the bigger one comes after the smaller. This makes the bigger
    values ascend like bubbles in the list.


    > Bubble sort is a simple but naive way of implementing a sort, and there are
    better alternatives. Unless you have an extremely good reason not to, rely on
    the standard `.sort` method in lists.


    When run, it checks the following list to verify that it is correct:


    ```

    assert [1, 2, 3, 4, 7, 10] == bubble_sort([3, 7, 10, 2, 4, 1])

    ```'
