  md: "# Creating a simple report in plain text\n\nThe simplest possible way to create\
    \ a report is to generate plain text and store it in a file. Though this may seem\
    \ simplistic in comparison with other formats that we will see later, don't underestimate\
    \ its utility. Plain text is the easiest format to share as it will work in virtually\
    \ all environments, and textual information can go a long way in representing\
    \ information.\n\n# Getting ready\n\nFor this recipe, we will generate a brief\
    \ report in text format about the number of watched movies in the last month and\
    \ total time. Internally, the original data to be represented will be in the shape\
    \ of a Python dictionary. The report will include the generation date as well,\
    \ for reference.\n\n# How to do it...\n\n+   1. Import datetime:\n   python\n\
    \   >>> from datetime import datetime\n   \n2. Create the template with the report\
    \ in text format:\n   python\n   >>> TEMPLATE = '''\n   Movies report\n   --------------\n\
    \n   Date: {date}\n   Movies seen in the last 30 days: {num_movies}\n   Total\
    \ minutes: {total_minutes}\n   '''\n   \n3. Create a dictionary with the values\
    \ to store. Note that this is the data to be presented in the report:\n   python\n\
    \   >>> data = {\n   ...     'date': datetime.utcnow(),\n   ...     'num_movies':\
    \ 3,\n   ...     'total_minutes': 376,\n   ... }\n   \n4. Compose the text of\
    \ the report, adding the data to the template:\n   python\n   >>> report = TEMPLATE.format(**data)"
  merge: -1
