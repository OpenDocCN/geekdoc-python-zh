    \ `USD` 列呈现。\n\n第二行以三种不同的方式聚合结果：`Sum` 用于获取总计结果，`count` 用于获取事件数量，`mean` 用于获取平均值。它们都引用之前选择的\
    \ `USD` 列。\n\n`calculate_results` 函数的其余部分更直接。它首先使用 `.round(2)` 将结果四舍五入到两位小数。然后更改列名以与前面的方法保持一致。`.rename`\
