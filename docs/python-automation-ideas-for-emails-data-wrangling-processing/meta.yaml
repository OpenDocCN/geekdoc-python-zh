    \nIn *step 6* of the *How to do it* section, the `r'[0123456789-]+'` pattern is\
    \ composed of two parts. The first one is between square brackets, and matches\
    \ any single character between 0 and 9 (any number) and the dash (`-`) character.\
    \ The `+` sign after that means that this character can be present one or more\
    \ times. This is called a **quantifier** in regexes. This makes a match on any\
