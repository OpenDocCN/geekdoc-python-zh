    pretty much standard. MS Excel is probably the most common spreadsheet application
    and the Excel format is the most common spreadsheet format, mirrored by many other
    spreadsheet applications.


    In this recipe, we''ll see how to obtain information from an Excel spreadsheet
    using the `openpyxl` module in Python.


    # Getting ready


