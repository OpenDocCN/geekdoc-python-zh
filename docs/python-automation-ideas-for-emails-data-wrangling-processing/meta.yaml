    \ score:')\n\n    for label in labels:\n        print(label.description, label.score)\n\
    \        if(label.description == 'Landmark'):\n            landmark(client, image)\n\
    \n    if response.error.message:\n        raise Exception(\n            '{}\\\
    nFor more info on error messages, check: '\n            'https://cloud.google.com/apis/design/errors'.format(\n\
    \                response.error.message))\n\nif __name__ == '__main__':\n    parser\
    \ = argparse.ArgumentParser()\n    parser.add_argument(dest='input', type=argparse.FileType('rb'),\n\
    \                        help='input image')\n    args = parser.parse_args()\n\
    \    main(args.input)\n```\n\nThe script uses `argparse` to open and pass the\
    \ file as described in the call. Then, it calls `main`, which uses the Google\
    \ Cloud Vision API to retrieve the labels for the image. The core of the process\
    \ is this:\n\n```python\ncontent = image_file.read()\n\nclient = vision.ImageAnnotatorClient()\n\
    image = vision.types.Image(content=content)\n\nresponse = client.label_detection(image=image)\n\
    labels = response.label_annotations\nprint('Labels for the image and score:')\n\
    \nfor label in labels:\n    print(label.description, label.score)\n```\n\nIt first\
    \ extracts the content from the file. Note this is binary content as extracted\
    \ by the configuration of `argparse` with `rb`.\n\nThe content is then sent to\
    \ `ImageAnnotatorClient` to perform `label_detection`. The image first needs to\
    \ be properly converted into `vision.types.Image`.\n\nThe response label description\
    \ and score are then printed. Note how they are sorted by score. A high score\
    \ means that the API considers the label a good match.\n\n## There's more...\n\
    \nOther than the `score` of a particular label, the interface will return the\
    \ `topicality` of it. While the `score` reflects the confidence that the label\
    \ is applicable to the image, the `topicality` reflects how representative the\
