    # How it works...


    In the *How to do it...* section, after making the imports in *step 1* and reading
    the spreadsheet in *step 2*, we select the cell to be changed in *step 3*.


    Updating the value is done in *step 4* with an assignment. A comment in the cell
    is added, overwriting the `.comment` attribute with a new `Comment` class instance.
    Note that the name of the user making the comment is required.


    Values can also include descriptions of formulas. In *step 6*, we add a new formula
    to cell *B12*. The value is calculated and displayed when the file is opened in
    *step 8*.


    > The value of a formula is not calculated in Python, but in Excel. This means
    that the formula could contain errors or display unexpected results through bugs
    in the resulting spreadsheet. Be sure to double-check that the formulas are correct.


    Finally, in *step 7*, the spreadsheet is saved to disk by calling the `.save`
    method of the XLSX file object. The name of the resulting file can be the same
    one as the input file to overwrite it.


    The comment and values can be viewed by externally accessing the file.


    # There''s more...


    You can store data as multiple data types, and it will be translated into the
    proper types for Excel. For example, storing `datetime` will store it in the proper
    date format. The same is true with `float` or other numeric formats.


    If you don''t need to change any value in the spreadsheet, you can open it in
    read-only mode:


    ```

    >>> xlsfile = openpyxl.load_workbook(''movies.xlsx'', read_only=True)

    >>> xlsfile[''Sheet1''][''A1''].value = ''37%''

    ...

    AttributeError: Cell is read only

    ```


    Adding comments to automatically generated cells can help review the resulting
    file, making it clear how each specific value was generated.


    While it is possible to add formulas to automatically generate Excel files, debugging
    the results can be tricky. When generating a result, generally, it''s better to
    make the calculations in Python and store the result in a raw format.'
