- md: "## How to do it...\n\n1. Use the `include_macro.py` script to attach the `libreoffice_script.py`\
    \ file to the `movies.ods` macro file:\n\n```\n$ python include_macro.py -h\n\
    usage: It inserts the macro file \"script\" into the file\n\"spreadsheet\" in\
    \ .ods format. The resulting file is located in the\nmacro_file directory, that\
    \ will be created\n[-h] spreadsheet script\n\npositional arguments:\nspreadsheet\
    \ File to insert the script\nscript Script to insert in the file\n\noptional arguments:\n\
    -h, --help show this help message and exit\n```\n\n```\n$ python include_macro.py\
    \ movies.ods libreoffice_script.py\n```\n\n2. Open the resulting file, `macro_file/movies.ods`,\
    \ in LibreOffice. Notice that it shows a warning to enable the macros (click on\
    \ **Enable**). Go to **Tools | Macros | Run Macro**:\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_222_0.png)\n\
    \n3. Select ObtainAggregated under movies.ods | libreoffice_script and click on\
    \ Run. This calculates the aggregated admissions and stores them in cell B12.\
    \ It adds a Total label in A15:\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_223_0.png)\n\
    \nFigure 6.10: Aggregated admissions calculated in cell B12\n\n4. Repeat steps\
    \ 2 and 3 to run it again. Now it runs all the aggregations, but adds B12 and\
    \ gets the result in B13:\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_223_1.png)\n\
    \nFigure 6.11: Running the macro again sums all the cells in column B, this time\
    \ including cell B12\n\n## How it works...\n\nThe main work in step 1 is done\
    \ in the `include_macro.py` script. It copies the file into the `macro_file` subdirectory\
    \ to avoid modifying the input.\n\nInternally, an .ods file is a zip file with\
    \ a certain structure. The script takes advantage of the zip file Python module\
    \ to add the script to the proper subdirectory internally. It also modifies the\
    \ `manifest.xml` file to allow LibreOffice to know there's a script inside the\
    \ file.\n\nThe macro that is executed in step 3 is defined in `libreoffice_script.py`\
    \ and contains a single function:\n\n```\ndef ObtainAggregated(*args):\n    #\
    \ get the doc from the scripting context\n    # which is made available to all\
    \ scripts\n    desktop = XSCRIPTCONTEXT.getDesktop()\n    model = desktop.getCurrentComponent()\n\
    \    # get the first sheet\n    sheet = model.Sheets.getByIndex(0)\n\n    # Find\
    \ the admissions column\n    MAX_ELEMENT = 20\n    for column in range(0, MAX_ELEMENT):\n\
    \        cell = sheet.getCellByPosition(column, 0)\n        if 'Admissions' in\
    \ cell.String:\n            break\n    else:\n        raise Exception('Admissions\
    \ not found')\n\n    accumulator = 0.0\n    for row in range(1, MAX_ELEMENT):\n\
    \        cell = sheet.getCellByPosition(column, row)\n        value = cell.getValue()\n\
    \        if value:\n            accumulator += cell.getValue()\n        else:\n\
    \            break\n\n    cell = sheet.getCellByPosition(column, row)\n    cell.setValue(accumulator)\n\
    \    cell = sheet.getCellRangeByName(\"A15\")\n    cell.String = 'Total'\n   \
    \ return None\n```\n\nThe XSCRIPTCONTEXT variable is created automatically and\
    \ allowed to get the current component, and from there, the first Sheet. After\
    \ that, the sheet is iterated to find the Admissions column through .getCellByPosition\
    \ and obtain the string value with the .String attribute. With the same method,\
    \ it aggregates all the values in the column, extracting them through .getValue\
    \ to get their numerical values.\n\n> As the loop iterates through the column\
    \ until finding an empty cell, the second time it's executed, it will aggregate\
    \ the value in B12, which is the aggregated value in the previous execution. This\
    \ is done on purpose to show that macros can be executed multiple times, with\
    \ different results.\n\nCells can also be referenced by their string position\
    \ through .getCellRangeByName, to store Total in cell A15.\n\n## There's more...\n\
    \nThe Python interpreter is embedded into LibreOffice, meaning that the specific\
    \ version can change if LibreOffice changes. In the latest version of LibreOffice\
    \ at the time of writing this book (6.4.0), the version included was Python 3.7.6.\n\
    \nThe UNO interface is very complete and allows you to access a lot of advanced\
    \ elements. Unfortunately, the documentation is not great, and achieving it can\
    \ be complicated and time consuming. The documentation is defined in Java or C++,\
    \ and there are examples in LibreOffice BASIC or other languages, but few for\
    \ Python. The full documentation can be found at https://api.libreoffice.org/,\
    \ and the reference is here: https://api.libreoffice.org/docs/idl/ref/index.html.\n\
    \n> For example, it is possible to create complex charts or even interactive dialogs\
    \ that ask for and process responses from the user. There's a lot of information\
    \ in forums and old answers. The code in BASIC is also adaptable to Python most\
    \ of the time.\n\nLibreOffice is a fork of a previous project called OpenOffice.\
    \ UNO is already available at the time of forking, meaning that some references\
    \ will be found when searching for OpenOffice on the Internet.\n\nRemember that\
    \ LibreOffice is capable of reading and writing Excel files. Some features may\
    \ not be 100% compatible. For example, there may be formatting issues.\n\n> For\
    \ the same reason, it is totally possible to generate a file in Excel format with\
    \ the tools described in other recipes of this chapter and open it with LibreOffice.\
    \ That can be a good approach as the documentation is better for openpyxl.\n\n\
    Debugging can also be tricky on occasion. Remember to ensure that a file is fully\
    \ closed before reopening it with new code.\n\nUNO is also capable of working\
    \ with other parts of the LibreOffice suite, such as for creating other kinds\
    \ of documents such as text documents in writer (analogous to MS Word).\n\n##\
    \ See also\n\n- The *Writing a CSV spreadsheet* recipe earlier in the chapter.\n\
    - The *Updating an Excel spreadsheet* recipe earlier in the chapter.\n\n# 7 Cleaning\
    \ and Processing Data\n\nSome automated tasks will require dealing with large\
    \ amounts of data. As data grows, two new and distinct problems appear. Processing\
    \ the task takes too long and input data quality issues cause more problems.\n\
    \nBoth problems are well known in the realm of data science dealing with big quantities\
    \ of data, but the problems can appear even at a smaller scale.\n\nThe quality\
    \ of input data is highly related to the number of sources of the data. In general,\
    \ data from a single source will be more consistent, but using a single source\
    \ is limiting. Even if the data comes from the same source, it could still contain\
    \ inconsistencies or errors.\n\n> Some examples of differences could be regional,\
    \ such as date formats or currencies, extra information, different names for the\
    \ same concept (including spelling differences), typos, general bad quality of\
    \ data with errors... The list is huge!\n\nTo compare apples with apples, the\
    \ input data will probably need to be cleaned. This can be a difficult task and\
    \ require multiple iterations until the process is refined, particularly if the\
    \ data changes over time. We will look at some techniques to approach this task.\n\
    \nRegarding time, for some automated cases, this is not a problem. It makes no\
    \ difference if an automated background emailer, composing and sending a daily\
    \ update email during the night hours to be read as people come into the office,\
    \ takes two hours or two minutes. But if someone is waiting for timely results,\
    \ this can be highly inefficient.\n\nIn particular, the waiting time during actual\
    \ code development and testing is critical as it will not only use up time that\
    \ could be spent on developing features but also destroys your focus and concentration,\
    \ which are key to the development process.\n\nThere are several tips and techniques\
    \ to speed up code execution. The main two are: avoid performing the same operation\
    \ multiple times; and parallelize the task by dividing it into smaller chunks.\n\
    \n> The best general advice on to reduce time for your computer tasks is to learn\
    \ computer science, in particular, algorithms and data structures. This is out\
    \ of scope for this book, and it can be a long journey. But don't be afraid to\
    \ ask a fellow programmer for help! Even online!\n\nChapter 3, Building Your First\
    \ Web Scraping Application, introduced parallelization of code as part of the\
    \ Speeding up web scraping recipe. We will continue with the concept during this\
    \ chapter.\n\nIn this chapter, we will cover the following recipes:\n\n- Preparing\
    \ a CSV spreadsheet\n- Appending currency based on location\n- Standardizing the\
    \ date format\n- Aggregating results\n- Processing data in parallel\n- Processing\
    \ data with Pandas\n\nLet's start by getting the base information ready in a tabular\
    \ file.\n\n## Preparing a CSV spreadsheet\n\nAs we saw in the previous chapter,\
    \ CSV files are files containing tabular data defined as a collection of rows\
    \ with defined columns, separated by commas. They are a very common format for\
    \ all kinds of data. We will see in this recipe how to extract data from log files\
    \ and store the information in a CSV file."
  mdcn: "## 如何操作...\n\n1.  使用 `include_macro.py` 脚本将 `libreoffice_script.py` 文件附加到\
    \ `movies.ods` 宏文件：\n\n```\n$ python include_macro.py -h\nusage: It inserts the\
    \ macro file \"script\" into the file\n\"spreadsheet\" in .ods format. The resulting\
    \ file is located in the\nmacro_file directory, that will be created\n[-h] spreadsheet\
    \ script\n\npositional arguments:\nspreadsheet File to insert the script\nscript\
    \ Script to insert in the file\n\noptional arguments:\n-h, --help show this help\
    \ message and exit\n```\n\n```\n$ python include_macro.py movies.ods libreoffice_script.py\n\
    ```\n\n2.  在 LibreOffice 中打开生成的文件 `macro_file/movies.ods`。注意它会显示一个启用宏的警告（点击 **启用**）。转到\
    \ **工具 | 宏 | 运行宏**：\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_222_0.png)\n\n\
    3.  在 movies.ods | libreoffice_script 下选择 ObtainAggregated，然后点击运行。这将计算总入场人次并将其存储在单元格\
    \ B12 中。它在 A15 中添加了一个“总计”标签：\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_223_0.png)\n\
    \n图 6.10：在单元格 B12 中计算的总入场人次\n\n4.  重复步骤 2 和 3 再次运行。现在它运行所有聚合，但将 B12 相加并在 B13 中得到结果：\n\
    \n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_223_1.png)\n\n图 6.11：再次运行宏会将 B 列中的所有单元格求和，这次包括单元格\
    \ B12\n\n## 工作原理...\n\n步骤 1 中的主要工作由 `include_macro.py` 脚本完成。它将文件复制到 `macro_file`\
    \ 子目录中，以避免修改输入文件。\n\n在内部，.ods 文件是一个具有特定结构的 zip 文件。该脚本利用 Python 的 zip 文件模块将脚本添加到内部的适当子目录中。它还修改了\
    \ `manifest.xml` 文件，以便 LibreOffice 知道文件内部有一个脚本。\n\n步骤 3 中执行的宏定义在 `libreoffice_script.py`\
    \ 中，包含一个函数：\n\n```\ndef ObtainAggregated(*args):\n    # get the doc from the scripting\
    \ context\n    # which is made available to all scripts\n    desktop = XSCRIPTCONTEXT.getDesktop()\n\
    \    model = desktop.getCurrentComponent()\n    # get the first sheet\n    sheet\
    \ = model.Sheets.getByIndex(0)\n\n    # Find the admissions column\n    MAX_ELEMENT\
    \ = 20\n    for column in range(0, MAX_ELEMENT):\n        cell = sheet.getCellByPosition(column,\
    \ 0)\n        if 'Admissions' in cell.String:\n            break\n    else:\n\
    \        raise Exception('Admissions not found')\n\n    accumulator = 0.0\n  \
    \  for row in range(1, MAX_ELEMENT):\n        cell = sheet.getCellByPosition(column,\
    \ row)\n        value = cell.getValue()\n        if value:\n            accumulator\
    \ += cell.getValue()\n        else:\n            break\n\n    cell = sheet.getCellByPosition(column,\
    \ row)\n    cell.setValue(accumulator)\n    cell = sheet.getCellRangeByName(\"\
    A15\")\n    cell.String = 'Total'\n    return None\n```\n\nXSCRIPTCONTEXT 变量是自动创建的，允许获取当前组件，并从中获取第一个工作表。之后，遍历工作表以通过\
    \ .getCellByPosition 查找“入场人次”列，并使用 .String 属性获取字符串值。使用相同的方法，通过 .getValue 提取数值来聚合该列中的所有值。\n\
    \n> 由于循环会遍历该列直到找到空单元格，因此第二次执行时，它将聚合 B12 中的值，即上一次执行的聚合值。这样做是为了展示宏可以多次执行并产生不同的结果。\n\
    \n也可以通过 .getCellRangeByName 按字符串位置引用单元格，将“总计”存储在单元格 A15 中。\n\n## 更多内容...\n\nPython\
    \ 解释器嵌入在 LibreOffice 中，这意味着如果 LibreOffice 发生变化，特定版本也可能改变。在撰写本书时的最新版 LibreOffice（6.4.0）中，包含的版本是\
    \ Python 3.7.6。\n\nUNO 接口非常完整，允许你访问许多高级元素。不幸的是，文档并不完善，获取和使用它可能既复杂又耗时。文档以 Java\
    \ 或 C++ 定义，有 LibreOffice BASIC 或其他语言的示例，但 Python 的示例很少。完整文档可在 https://api.libreoffice.org/\
    \ 找到，参考手册在这里：https://api.libreoffice.org/docs/idl/ref/index.html。\n\n> 例如，可以创建复杂的图表，甚至是交互式对话框来询问和处理用户的响应。论坛和旧答案中有大量信息。BASIC\
    \ 代码在大多数情况下也可以适配到 Python。\n\nLibreOffice 是之前名为 OpenOffice 项目的分支。UNO 在分叉时已经可用，这意味着在互联网上搜索\
    \ OpenOffice 时会找到一些相关参考。\n\n请记住，LibreOffice 能够读取和写入 Excel 文件。某些功能可能不是 100% 兼容。例如，可能存在格式问题。\n\
    \n> 出于同样的原因，完全有可能使用本章其他配方中描述的工具生成 Excel 格式的文件，然后用 LibreOffice 打开它。这可能是一个好方法，因为\
    \ openpyxl 的文档更好。\n\n调试有时也可能很棘手。请记住在使用新代码重新打开文件之前，确保文件已完全关闭。\n\nUNO 还能够与 LibreOffice\
    \ 套件的其他部分协同工作，例如在 Writer 中创建其他类型的文档，如文本文档（类似于 MS Word）。\n\n## 另请参阅\n\n-   本章前面的\
    \ *编写 CSV 电子表格* 配方。\n-   本章前面的 *更新 Excel 电子表格* 配方。\n\n# 7 清理和处理数据\n\n一些自动化任务需要处理大量数据。随着数据量的增长，会出现两个新的、不同的问题：处理任务耗时过长，以及输入数据质量问题导致更多问题。\n\
    \n这两个问题在处理大量数据的数据科学领域广为人知，但即使在较小规模下也可能出现。\n\n输入数据的质量与数据源的数量密切相关。通常，来自单一来源的数据会更一致，但使用单一来源是有限制的。即使数据来自同一来源，它仍可能包含不一致或错误。\n\
    \n> 差异的一些例子可能是区域性的，例如日期格式或货币、额外信息、同一概念的不同名称（包括拼写差异）、拼写错误、数据质量普遍较差且有错误……这个列表很长！\n\
    \n为了进行公平比较，输入数据可能需要清理。这可能是一项艰巨的任务，需要多次迭代才能完善流程，特别是如果数据随时间变化的话。我们将探讨一些处理此任务的技术。\n\
    \n关于时间，对于某些自动化情况，这不是问题。如果一个自动化的后台邮件程序在夜间编写并发送每日更新邮件，以便人们上班时阅读，那么它花费两小时还是两分钟没有区别。但如果有人在等待及时的结果，这可能会非常低效。\n\
    \n特别是在实际代码开发和测试期间，等待时间至关重要，因为它不仅会占用本可用于开发功能的时间，还会破坏你的专注力和注意力，而这些是开发过程的关键。\n\n\
    有几种技巧和技术可以加速代码执行。主要的两个是：避免多次执行相同的操作；以及通过将任务分成更小的块来并行化任务。\n\n> 关于如何减少计算机任务时间的最佳通用建议是学习计算机科学，特别是算法和数据结构。这超出了本书的范围，而且可能是一个漫长的过程。但不要害怕向程序员同行寻求帮助！甚至可以在线求助！\n\
    \n第 3 章“构建你的第一个网络爬虫应用程序”介绍了代码并行化作为“加速网络爬虫”配方的一部分。我们将在本章中继续探讨这个概念。\n\n在本章中，我们将涵盖以下配方：\n\
    \n-   准备 CSV 电子表格\n-   根据位置追加货币\n-   标准化日期格式\n-   聚合结果\n-   并行处理数据\n-   使用 Pandas\
    \ 处理数据\n\n让我们从在表格文件中准备基础信息开始。\n\n## 准备 CSV 电子表格\n\n正如我们在上一章中看到的，CSV 文件是包含表格数据的文件，这些数据被定义为具有定义列的行集合，以逗号分隔。它们是所有类型数据的一种非常常见的格式。我们将在本配方中了解如何从日志文件中提取数据并将信息存储在\
    \ CSV 文件中。"
