  - '[PAGE 148]


    # How it works...


    The `scan.py` file has the following elements:


    +   1. An entry point that parses the input parameters and creates the help for
    the command line.

    2. A main function that walks through the directory and analyzes each of the files
    found. Based on their extension, it decides whether there''s an available function
    to process and search it.

    3. An `EXTENSION` dictionary, which pairs the extensions with the function to
    search them.

    4. The `search_txt`, `search_csv`, `search_pdf`, and `search_docx` functions,
    which process and search for the required word for each kind of file.


    Keep in mind that file extensions are just file name endings and only a hint of
    the format of a file. So, they should be taken with a pinch of salt. In the Python
    standard library, there''s the function `mimetypes.guess_type`, which can give
    an educated guess as to the type of a file. Check the Python documentation here:
    https://docs.python.org/3.8/library/mimetypes.html.


    The comparison is case-insensitive, so the search word is transformed into lowercase
    and, in all comparisons, the text is transformed into lowercase.


    Each of the search functions has its own peculiarities:


    +   1. `search_txt` first opens the file to determine its encoding, using `UnicodeDammit`,
    then it opens the file and reads it line by line. As soon as the word is found,
    it stops and returns success.

    2. `search_csv` opens the file in CSV, and iterates not only line by line, but
    also column by column. As soon as the word is found, it returns.

    3. `search_pdf` opens the file and exits if it is encrypted. If not, it goes page
    by page, extracting the text and comparing it with the word. It returns as soon
    as it finds a match.

    4. `search_docx` opens the file and iterates through all its paragraphs for a
    match. As soon as a match is found, the function returns.


    # There''s more...


    There are some extra ideas that could be implemented:


    +   - More search functions could be added. In this chapter, we went through log
    files and images, as well as text files.'
- md: "Searching and Reading Local Files\n\n- A similar structure could work for searching\
    \ for files and returning only the last 10.\n- `search_csv` is not sniffing to\
    \ detect the dialect. This could be added as well.\n- Reading is quite sequential.\
    \ It should be possible to read the files in parallel, analyzing them for faster\
    \ returns. Be aware that reading files in parallel can lead to sorting issues,\
    \ as the files won't always be processed in the same order.\n\n## See also\n\n\
    - The *Crawling and searching directories* recipe, earlier in this chapter, to\
    \ learn how to search and find files in directories.\n- The *Reading text files*\
    \ recipe, earlier in this chapter, to learn the basics of opening and reading\
    \ basic text files.\n- The *Dealing with encodings* recipe, earlier in this chapter,\
    \ to learn how to open files in different encodings.\n- The *Reading CSV files*\
    \ recipe, earlier in this chapter, to learn how to read CSV files.\n- The *Reading\
    \ PDF files* recipe, earlier in this chapter, to learn how to open and read PDF\
    \ documents.\n- The *Reading Word documents* recipe, earlier in this chapter,\
    \ to learn the basics of reading Word documents.\n\n## 5 Generating Fantastic\
    \ Reports\n\nWe'll see in this chapter how to write automated documents and perform\
    \ associated operations, such as dealing with templates in different formats.\
    \ We will cover simple options like plain text and also options that include richer\
    \ possibilities, such as Markdown. We'll also cover standard formats such as Word\
    \ and PDF. These two formats are arguably the most common way of sharing documents\
    \ and reports across the globe.\n\nIn this chapter, we will cover the following\
    \ recipes:\n\n- Creating a simple report in plain text\n- Using templates for\
    \ reports\n- Formatting text in Markdown\n- Writing a basic Word document\n- Styling\
    \ a Word document\n- Generating structure in Word documents\n- Adding pictures\
    \ to Word documents\n- Writing a simple PDF document\n- Structuring a PDF\n- Aggregating\
    \ PDF reports\n- Watermarking and encrypting a PDF\n\nWe will start our report\
    \ generation with a minimal text-only one.\n\n## Creating a simple report in plain\
    \ text\n\nThe simplest possible way to create a report is to generate plain text\
    \ and store it in a file. Though this may seem simplistic in comparison with other\
    \ formats that we will see later, don't underestimate its utility. Plain text\
    \ is the easiest format to share as it will work in virtually all environments,\
    \ and textual information can go a long way in representing information.\n\n###\
    \ Getting ready\n\nFor this recipe, we will generate a brief report in text format\
    \ about the number of watched movies in the last month and total time. Internally,\
    \ the original data to be represented will be in the shape of a Python dictionary.\
    \ The report will include the generation date as well, for reference.\n\n### How\
    \ to do it...\n\n1. Import datetime:\n   ```python\n   >>> from datetime import\
    \ datetime\n   ```\n\n2. Create the template with the report in text format:\n\
    \   ```python\n   >>> TEMPLATE = '''\n   Movies report\n   --------------\n\n\
    \   Date: {date}\n   Movies seen in the last 30 days: {num_movies}\n   Total minutes:\
    \ {total_minutes}\n   '''\n   ```\n\n3. Create a dictionary with the values to\
    \ store. Note that this is the data to be presented in the report:\n   ```python\n\
    \   >>> data = {\n   ...     'date': datetime.utcnow(),\n   ...     'num_movies':\
    \ 3,\n   ...     'total_minutes': 376,\n   ... }\n   ```\n\n4. Compose the text\
    \ of the report, adding the data to the template:\n   ```python\n   >>> report\
    \ = TEMPLATE.format(**data)\n   ```\n\n5. Create a new file with the current date\
    \ and store the report:\n   ```python\n   >>> FILENAME_TMPL = \"{date}_report.txt\"\
    \n   >>> filename = FILENAME_TMPL.format(date=data['date'].strftime('%Y-%m-%d'))\n\
    \   >>> filename\n   2020-01-26_report.txt\n   >>> with open(filename, 'w') as\
    \ file:\n   ...     file.write(report)\n   ```\n\n6. Check the newly created report:\n\
    \   ```\n   $ cat 2020-01-26_report.txt\n   Movies report\n   -----------------\n\
    \n   Date: 2020-01-26 23:40:08.737671\n   Movies seen in the last 30 days: 3\n\
    \   Total minutes: 376\n   ```\n\n### How it works...\n\nStep 2 and step 3 in\
    \ the *How to do it...* section set up a simple template and add a dictionary\
    \ with all the data. Then, in *step 4*, those two are combined into the specific\
    \ report.\n\n> In *step 4*, the dictionary is combined with a template. Notice\
    \ that the keys on the dictionary correspond to the parameters on the template.\
    \ The trick here is to use the double star in the `format` call to unpack the\
    \ dictionary, passing each of the keys as a parameter to `format()`.\n\nIn *step\
    \ 5*, the resulting report, a string, is stored in a newly created file. We use\
    \ the `with` context manager paired with `open()`, as introduced in previous chapters.\
    \ In this case, we generate a new file to write the data. After closing the `with`\
    \ block, the file is properly closed and the data is stored on the disk.\n\n>\
    \ The open modes determine how to open a file, whether it is to read or write,\
    \ and whether the file is in text or binary. The `w` mode opens the file to write\
    \ it, overwriting it if it already exists. Be careful not to delete an existing\
    \ file by mistake!\n\nStep 6 checks that the file has been created with the proper\
    \ data.\n\n### There's more...\n\nThe filename is created with a dynamic date\
    \ to minimize the probability of overwriting existing files. The date format starting\
    \ with the year and ending with the day has been selected so that the files are\
    \ sorted in the correct order.\n\n> The format YYYY-MM-DD for dates is covered\
    \ in the ISO 8601 standard, which describes different ways to format dates and\
    \ times. It is a standard format that's easily parsed and supported in Python.\n\
    \nThe `with` context manager will close the file, even if there's an exception.\
    \ In case of an error, the `write` call will raise an `IOError` exception.\n\n\
    > Some of the common problems when writing to disk are problems with permissions,\
    \ no space left on the hard drive, or a path problem (for instance, trying to\
    \ write in a non-existent directory).\n\nNote that a file may not be fully committed\
    \ to disk until it is closed or explicitly flushed. Generally, the operating system\
    \ will take care of it, but keep this in mind if you're trying to open a file\
    \ twice, one for read and one for write.\n\n> This can produce an error if the\
    \ program ends abruptly before being able to flush the data into the hard drive,\
    \ making data apparently disappear. If required, call `file.flush()` to force\
    \ the data to be committed to disk. This is useful when writing several times\
    \ into the same file. Note that at the end of the `with` block, the file will\
    \ be flushed and closed automatically.\n\n### See also\n\n- The *Using templates\
    \ for reports* recipe, later in this chapter, to learn about HTML templates.\n\
    - The *Formatting text in Markdown* recipe, later in this chapter, to learn about\
    \ Markdown.\n- The *Aggregating PDF reports* recipe, later in this chapter, to\
    \ learn how to produce PDF reports.\n\n## Using templates for reports\n\nWhile\
    \ plain text can convey a lot of information, to generate better reports, we need\
    \ a system where styling can be added to the text. Details such as bold text,\
    \ bullet points, and images can make a difference. As all browsers work with HTML,\
    \ generating reports in this format is a good option. Everyone is familiar with\
    \ a browser rendering text.\n\nHTML is a very flexible format that can be used\
    \ to render rich text and reports. While an HTML template can be managed as pure\
    \ plain text, doing so is very error prone and tedious. There are tools that allow\
    \ you to add better handling of structured text and define templates.\n\nThis\
    \ also detaches the template from the code, separating the generation of the data\
    \ from the representation of that data. The styling of the template can be done\
    \ separately by specialized designers, making it look great.\n\n### Getting ready\n\
    \nThe tool used in this recipe, Jinja2, reads a file that contains the template\
    \ and applies the context to it. The context contains the data to be displayed.\n\
    \nWe should start by installing the module:\n\n```\n$ echo \"jinja2==2.11.1\"\
    \ >> requirements.txt\n$ pip install -r requirements.txt\n```\n\nJinja2 uses its\
    \ own syntax, which is a mixture of HTML and Python. It is aimed at HTML documents,\
    \ so it easily performs operations such as correctly escaping special characters.\n\
    \nIn the GitHub repository, https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter05,\
    \ we've included a template file called jinja_template.html with the template\
    \ to use.\n\n### How to do it...\n\n1. Import the Jinja2 Template and datetime:\n\
    \   ```python\n   >>> from jinja2 import Template\n   >>> from datetime import\
    \ datetime\n   ```\n\n2. Read the template from the files into memory:\n   ```python\n\
    \   >>> with open('jinja_template.html') as file:\n   ...     template = Template(file.read())\n\
    \   ```"
  mdcn: "搜索与读取本地文件\n\n- 类似的结构也可用于搜索文件并仅返回最近的10个。\n- `search_csv` 未进行方言嗅探检测。此功能也可添加。\n\
    - 读取过程是相当顺序化的。应能并行读取文件，通过分析它们来加快返回速度。请注意，并行读取文件可能导致排序问题，因为文件处理顺序可能不一致。\n\n## 另请参阅\n\
    \n- 本章前面的 *爬取与搜索目录* 配方，了解如何在目录中搜索和查找文件。\n- 本章前面的 *读取文本文件* 配方，了解打开和读取基本文本文件的基础知识。\n\
    - 本章前面的 *处理编码* 配方，了解如何以不同编码打开文件。\n- 本章前面的 *读取CSV文件* 配方，了解如何读取CSV文件。\n- 本章前面的 *读取PDF文件*\
    \ 配方，了解如何打开和读取PDF文档。\n- 本章前面的 *读取Word文档* 配方，了解读取Word文档的基础知识。\n\n## 5 生成精彩报告\n\n\
    本章将介绍如何编写自动化文档并执行相关操作，例如处理不同格式的模板。我们将涵盖从纯文本等简单选项到Markdown等更丰富可能性的选项。我们还将介绍Word和PDF等标准格式。这两种格式可以说是全球范围内共享文档和报告最常用的方式。\n\
    \n本章将涵盖以下配方：\n\n- 创建纯文本简单报告\n- 使用报告模板\n- Markdown格式化文本\n- 编写基础Word文档\n- Word文档样式设置\n\
    - Word文档结构生成\n- Word文档添加图片\n- 编写简单PDF文档\n- PDF结构化\n- PDF报告聚合\n- PDF水印与加密\n\n我们将从最简单的纯文本报表生成开始。\n\
    \n## 创建纯文本简单报告\n\n创建报告最简单的方式是生成纯文本并将其存储在文件中。尽管与我们稍后将看到的其他格式相比，这可能显得过于简单，但请不要低估其实用性。纯文本是最容易共享的格式，因为它几乎适用于所有环境，并且文本信息在表示信息方面可以发挥很大作用。\n\
    \n### 准备工作\n\n在本配方中，我们将生成一份关于上月观看电影数量和总时长的简短文本格式报告。内部，待表示的原始数据将以Python字典的形式存在。报告还将包含生成日期以供参考。\n\
    \n### 操作步骤...\n\n1. 导入datetime：\n   ```python\n   >>> from datetime import datetime\n\
    \   ```\n\n2. 创建包含文本格式报告的模板：\n   ```python\n   >>> TEMPLATE = '''\n   Movies report\n\
    \   --------------\n\n   Date: {date}\n   Movies seen in the last 30 days: {num_movies}\n\
    \   Total minutes: {total_minutes}\n   '''\n   ```\n\n3. 创建包含待存储值的字典。请注意，这是要在报告中呈现的数据：\n\
    \   ```python\n   >>> data = {\n   ...     'date': datetime.utcnow(),\n   ...\
    \     'num_movies': 3,\n   ...     'total_minutes': 376,\n   ... }\n   ```\n\n\
    4. 组合报告文本，将数据添加到模板中：\n   ```python\n   >>> report = TEMPLATE.format(**data)\n\
    \   ```\n\n5. 创建以当前日期命名的新文件并存储报告：\n   ```python\n   >>> FILENAME_TMPL = \"{date}_report.txt\"\
    \n   >>> filename = FILENAME_TMPL.format(date=data['date'].strftime('%Y-%m-%d'))\n\
    \   >>> filename\n   2020-01-26_report.txt\n   >>> with open(filename, 'w') as\
    \ file:\n   ...     file.write(report)\n   ```\n\n6. 检查新创建的报告：\n   ```\n   $ cat\
    \ 2020-01-26_report.txt\n   Movies report\n   -----------------\n\n   Date: 2020-01-26\
    \ 23:40:08.737671\n   Movies seen in the last 30 days: 3\n   Total minutes: 376\n\
    \   ```\n\n### 工作原理...\n\n*操作步骤...* 部分的步骤2和步骤3设置了一个简单的模板并添加了包含所有数据的字典。然后，在*步骤4*中，这两者被组合成特定的报告。\n\
    \n> 在*步骤4*中，字典与模板结合。请注意，字典中的键对应于模板中的参数。这里的技巧是在`format`调用中使用双星号来解包字典，将每个键作为参数传递给`format()`。\n\
    \n在*步骤5*中，生成的报告（一个字符串）被存储在新创建的文件中。我们使用`with`上下文管理器配合`open()`，如前面章节所述。在这种情况下，我们生成一个新文件来写入数据。关闭`with`块后，文件被正确关闭，数据被存储在磁盘上。\n\
    \n> 打开模式决定了如何打开文件，是读取还是写入，以及文件是文本还是二进制。`w`模式打开文件以进行写入，如果文件已存在则覆盖它。请小心不要误删现有文件！\n\
    \n步骤6检查文件是否已用正确的数据创建。\n\n### 更多内容...\n\n文件名使用动态日期创建，以最小化覆盖现有文件的概率。选择从年份开始到日期结束的日期格式，以便文件按正确顺序排序。\n\
    \n> 日期格式YYYY-MM-DD在ISO 8601标准中有介绍，该标准描述了不同的日期和时间格式化方式。这是一种易于解析且在Python中受支持的标准格式。\n\
    \n`with`上下文管理器将关闭文件，即使发生异常。如果出现错误，`write`调用将引发`IOError`异常。\n\n> 写入磁盘时的一些常见问题包括权限问题、硬盘空间不足或路径问题（例如，尝试写入不存在的目录）。\n\
    \n请注意，文件可能在关闭或显式刷新之前不会完全提交到磁盘。通常，操作系统会处理这个问题，但如果您尝试两次打开同一个文件，一次用于读取，一次用于写入，请记住这一点。\n\
    \n> 如果程序在将数据刷新到硬盘之前突然结束，这可能会导致错误，使数据似乎消失。如果需要，调用`file.flush()`强制将数据提交到磁盘。这在多次写入同一文件时很有用。请注意，在`with`块结束时，文件将自动刷新并关闭。\n\
    \n### 另请参阅\n\n- 本章后面的 *使用报告模板* 配方，了解HTML模板。\n- 本章后面的 *Markdown格式化文本* 配方，了解Markdown。\n\
    - 本章后面的 *PDF报告聚合* 配方，了解如何生成PDF报告。\n\n## 使用报告模板\n\n虽然纯文本可以传达大量信息，但要生成更好的报告，我们需要一个可以为文本添加样式的系统。粗体文本、项目符号和图像等细节可以产生很大差异。由于所有浏览器都使用HTML，因此以这种格式生成报告是一个不错的选择。每个人都熟悉浏览器渲染文本。\n\
    \nHTML是一种非常灵活的格式，可用于渲染富文本和报告。虽然HTML模板可以作为纯纯文本管理，但这样做非常容易出错且繁琐。有一些工具允许您更好地处理结构化文本并定义模板。\n\
    \n这还将模板与代码分离，将数据的生成与数据的表示分开。模板的样式可以由专业设计师单独完成，使其看起来很棒。\n\n### 准备工作\n\n本配方中使用的工具Jinja2读取包含模板的文件并应用上下文。上下文包含要显示的数据。\n\
    \n我们应该首先安装模块：\n\n```\n$ echo \"jinja2==2.11.1\" >> requirements.txt\n$ pip install\
    \ -r requirements.txt\n```\n\nJinja2使用自己的语法，这是HTML和Python的混合体。它针对HTML文档，因此可以轻松执行正确转义特殊字符等操作。\n\
    \n在GitHub仓库中，https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter05，我们包含了一个名为jinja_template.html的模板文件，其中包含要使用的模板。\n\
    \n### 操作步骤...\n\n1. 导入Jinja2 Template和datetime：\n   ```python\n   >>> from jinja2\
    \ import Template\n   >>> from datetime import datetime\n   ```\n\n2. 将模板从文件读入内存：\n\
    \   ```python\n   >>> with open('jinja_template.html') as file:\n   ...     template\
    \ = Template(file.read())\n   ```"
