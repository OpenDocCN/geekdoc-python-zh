    \ tools when trying to solve a problem. It's very likely that someone else has\
    \ already created a tool that solves all, or at least part, of the problem.\n\n\
    More important than finding and installing a package is keeping track of which\
    \ packages are being used. This greatly helps with **replicability**, meaning\
    \ the ability to start the whole environment from scratch in any situation.\n\n\
    # Getting ready\n\nThe starting point is to find a package that will be of use\
    \ in our project.\n\nA great one is `requests`, a module that deals with HTTP\
