    The PDF writer is finally saved into a new file. Notice that the file needs to
    be open to write in binary mode (wb).


    # There''s more...


    .appendPagesFromReader is very convenient for adding all pages, but it''s also
    possible to add a number of pages one by one with .addPage. For example, to add
    the third page, the code would look like this:


    ```

