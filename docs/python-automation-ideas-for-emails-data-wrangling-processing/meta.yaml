  md: '# How it works...


    The `scan.py` file has the following elements:


    +   1. An entry point that parses the input parameters and creates the help for
    the command line.

    2. A main function that walks through the directory and analyzes each of the files
    found. Based on their extension, it decides whether there''s an available function
    to process and search it.

    3. An `EXTENSION` dictionary, which pairs the extensions with the function to
    search them.

    4. The `search_txt`, `search_csv`, `search_pdf`, and `search_docx` functions,
    which process and search for the required word for each kind of file.


    Keep in mind that file extensions are just file name endings and only a hint of
    the format of a file. So, they should be taken with a pinch of salt. In the Python
    standard library, there''s the function `mimetypes.guess_type`, which can give
    an educated guess as to the type of a file. Check the Python documentation here:
    https://docs.python.org/3.8/library/mimetypes.html.


    The comparison is case-insensitive, so the search word is transformed into lowercase
    and, in all comparisons, the text is transformed into lowercase.


    Each of the search functions has its own peculiarities:


    +   1. `search_txt` first opens the file to determine its encoding, using `UnicodeDammit`,
    then it opens the file and reads it line by line. As soon as the word is found,
    it stops and returns success.

    2. `search_csv` opens the file in CSV, and iterates not only line by line, but
    also column by column. As soon as the word is found, it returns.

    3. `search_pdf` opens the file and exits if it is encrypted. If not, it goes page
    by page, extracting the text and comparing it with the word. It returns as soon
    as it finds a match.

    4. `search_docx` opens the file and iterates through all its paragraphs for a
    match. As soon as a match is found, the function returns.


    # There''s more...


    There are some extra ideas that could be implemented:


    +   - More search functions could be added. In this chapter, we went through log
    files and images, as well as text files.'
