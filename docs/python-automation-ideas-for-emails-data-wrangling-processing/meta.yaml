- md: "Generating Fantastic Reports\n\n> The input files need to remain open until\
    \ the result is saved. This is due to the way the copy of the pages works. If\
    \ the file is open, the resulting file may be stored as an empty file.\n\nThe\
    \ PDF writer is finally saved into a new file. Notice that the file needs to be\
    \ open to write in binary mode (wb).\n\n## There's more...\n\n`.appendPagesFromReader`\
    \ is very convenient for adding all pages, but it's also possible to add a number\
    \ of pages one by one with `.addPage`. For example, to add the third page, the\
    \ code would look like this:\n\n```\n>>> page = pdf1.getPage(3)\n>>> output_pdf.addPage(page)\n\
    ```\n\nThe full documentation for PyPDF2 can be found here: https://pythonhosted.org/PyPDF2/.\n\
    \n## See also\n\n- The *Writing a simple PDF document* recipe, earlier in this\
    \ chapter, to learn the basics of how to work with PDF documents.\n- The *Structuring\
    \ a PDF* recipe, earlier in this chapter, to learn how to add separators to a\
    \ PDF document.\n- The *Watermarking and encrypting a PDF* recipe, later in this\
    \ chapter, to learn how to add security measures to the document.\n\n## Watermarking\
    \ and encrypting a PDF\n\nPDF files have some interesting security measures to\
    \ limit the distribution of a document. We can encrypt the content, requiring\
    \ users to input a password in order to be able to read it. We'll also see how\
    \ to add a watermark to label the document clearly as not for public distribution\
    \ and, if leaked, to know its origin.\n\n## Getting ready\n\nWe'll use the `pdf2image`\
    \ module to transform PDF documents to PIL images. Pillow is a prerequisite. We'll\
    \ also use PyPDF2:\n\n```\n$ echo \"pdf2image==1.11.0\" >> requirements.txt\n\
    $ echo \"Pillow==7.0.0\" >> requirements.txt\n$ echo \"PyPDF2==1.26.0\" >> requirements.txt\n\
    $ pip install -r requirements.txt\n```\n\nFor `pdf2image` to work properly, it\
    \ needs to install `pdftoppm`, so check here for instructions on how to install\
    \ it for different platforms: https://github.com/Belval/pdf2image#.\n\nWe also\
    \ need a PDF file to watermark and encrypt. We'll use a `report.pdf` file generated\
    \ by the `structuring_pdf.py` script, described in the *Structuring a PDF* recipe,\
    \ which is available on GitHub: https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter05/structuring_pdf.py.\n\
    \n## How to do it...\n\n1. The script, `watermarking_pdf.py`, is available on\
    \ GitHub here: https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter05/watermarking_pdf.py.\
    \ The most relevant bits are displayed here:\n\n```\ndef encrypt(out_pdf, password):\n\
    \    output_pdf = PyPDF2.PdfFileWriter()\n\n    in_file = open(out_pdf, \"rb\"\
    )\n    input_pdf = PyPDF2.PdfFileReader(in_file)\n    output_pdf.appendPagesFromReader(input_pdf)\n\
    \    output_pdf.encrypt(password)\n\n    # Intermediate file\n    with open(INTERMEDIATE_ENCRYPT_FILE,\
    \ \"wb\") as out_file:\n        output_pdf.write(out_file)\n\n    in_file.close()\n\
    \n    # Rename the intermediate file\n    os.rename(INTERMEDIATE_ENCRYPT_FILE,\
    \ out_pdf)\n\ndef create_watermark(watermarked_by):\n    mask = Image.new('L',\
    \ WATERMARK_SIZE, 0)\n    draw = ImageDraw.Draw(mask)\n    font = ImageFont.load_default()\n\
    \    text = 'WATERMARKED BY {}\\n{}'.format(watermarked_by, datetime.now())\n\
    \    draw.multiline_text((0, 100), text, 55, font=font)\n\n    watermark = Image.new('RGB',\
    \ WATERMARK_SIZE)\n    watermark.putalpha(mask)\n    watermark = watermark.resize((1950,\
    \ 1950))\n    watermark = watermark.rotate(45)\n    # Crop to only the watermark\n\
    \    bbox = watermark.getbbox()\n    watermark = watermark.crop(bbox)\n\n    return\
    \ watermark\n```\n\n```\ndef apply_watermark(watermark, in_pdf, out_pdf):\n  \
    \  # Transform from PDF to images\n    images = convert_from_path(in_pdf)\n  \
    \  ...\n    # Paste the watermark in each page\n    for image in images:\n   \
    \     image.paste(watermark, position, watermark)\n\n    # Save the resulting\
    \ PDF\n    images[0].save(out_pdf, save_all=True, append_images=images[1:])\n\
    ```\n\n2. Watermark the PDF file with the following command:\n\n```\n$ python\
    \ watermarking_pdf.py report.pdf -u automate_user -o out.pdf\nCreating a watermark\n\
    Watermarking the document\n```\n\n3. Check that the document added a watermark\
    \ with `automate_user` and a timestamp to all the pages of `out.pdf`.\n\n4. Watermark\
    \ and encrypt with the following command. Note that encrypting may take a little\
    \ bit of time:\n\n```\n$ python watermarking_pdf.py report.pdf -u automate_user\
    \ -o out.pdf -p secretpassword\nCreating a watermark\nWatermarking the document\n\
    Encrypting the document\n```\n\n5. Open the resulting `out.pdf` file and check\
    \ that it requires you to input the `secretpassword` password. The timestamp will\
    \ also be new.\n\n## How it works...\n\nThe `watermarking_pdf.py` script first\
    \ obtains the parameters from the command line using `argparse`, and then passes\
    \ it to a main function that calls the other three functions, `create_watermark`,\
    \ `apply_watermark`, and, if a password is used, `encrypt`.\n\n`create_watermark`\
    \ generates an image with the watermark. It uses the Pillow `Image` class to create\
    \ a gray image (mode L) and draw the text. Then, this image gets applied as an\
    \ alpha channel to a new image, making the image semi-transparent so that it will\
    \ show the text to watermark.\n\n> The alpha channel makes fully transparent anything\
    \ in white (color 0) and fully opaque anything in black (color 255). In this case,\
    \ the background is white (fully transparent) and the color of the text is 55,\
    \ making it semi-transparent.\n\nThe image is then rotated 45 degrees and cropped\
    \ to reduce the transparent background that may have appeared. This centers the\
    \ image and allows for better positioning.\n\nIn the next step, `apply_watermark`\
    \ transforms the PDF into a sequence of PIL Images using the `pdf2image` module.\
    \ It calculates the position to apply the watermark, and then pastes the watermark.\n\
    \n> The image needs to be located by its top-left corner. This is located in the\
    \ half of the document, minus half of the watermark, in both height and width.\
    \ Note that the script assumes that all the pages of the document have the same\
    \ size.\n\nFinally, the result is saved to a PDF. Notice the `save_all` parameter,\
    \ which allows us to save a multipage PDF.\n\nIf a password is passed, the `encrypt`\
    \ function is called. It opens the output PDF using `PdfFileReader` and creates\
    \ a new intermediate PDF with `PdfFileWriter`. All the pages of the output PDF\
    \ are added to the new PDF, the PDF is encrypted, and then the intermediate PDF\
    \ is renamed as the output PDF using `os.rename`.\n\n## There's more...\n\nAs\
    \ part of the watermarking process, notice that the pages are transformed, from\
    \ text into image. This adds extra protection as the text won't be extractable\
    \ directly as text. When protecting a file, this is a good idea, as it will stop\
    \ copying/pasting directly.\n\n> This is not a huge security measure, though,\
    \ as the text may be extracted through OCR tools. But it protects against casual\
    \ extraction of the text. The output file size is also much bigger, about 30 MB.\
    \ This also makes it slower to encrypt and decrypt.\n\nThe default font from PIL\
    \ can be a little rough. Another font, if the TrueType or OpenType file is available,\
    \ can be added and used by calling the following:\n\n```\nfont = ImageFont.truetype('my_font.ttf',\
    \ SIZE)\n```\n\nNote that this may require installing the FreeType libraries,\
    \ normally available as part of the `libfreetype` package. Further documentation\
    \ is available at https://www.freetype.org/. Depending on the font and size, you\
    \ may need to adjust the sizes.\n\nThe full `pdf2image` documentation can be found\
    \ at https://github.com/Belval/pdf2image, the full documentation for PyPDF2 at\
    \ https://pythonhosted.org/PyPDF2/, and the full documentation for Pillow at https://pillow.readthedocs.io/en/5.2.x/.\n\
    \n## See also\n\n- The *Writing a simple PDF document* recipe, earlier in this\
    \ chapter, to learn how to add separators to a PDF document.\n- The *Structuring\
    \ a PDF* recipe, earlier in this chapter, to learn how to add separators to a\
    \ PDF document.\n- The *Aggregating PDF reports* recipe, earlier in this chapter,\
    \ to learn how to merge multiple documents into a single one."
