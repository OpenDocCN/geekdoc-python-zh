    # Chapter 5


    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_192_0.png)


    4. Watermark and encrypt with the following command. Note that encrypting may
    take a little bit of time:


    ```

    $ python watermarking_pdf.py report.pdf -u automate_user -o out.pdf -p secretpassword

    Creating a watermark

    Watermarking the document

    Encrypting the document

    ```


    5. Open the resulting out.pdf file and check that it requires you to input the
