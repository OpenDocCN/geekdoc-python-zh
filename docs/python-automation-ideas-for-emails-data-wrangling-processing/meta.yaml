    Let''s Begin Our Automation Journey


    # Introducing regular expressions


    A **regular expression**, or **regex**, is a pattern to *match* text. In other
    words, it allows us to define an **abstract string** (typically, the definition
    of a structured kind of text) to check with other strings to see if they match
    or not.


    It is better to describe them with an example. Think of defining a pattern of
    text as *a word that starts with an uppercase A and contains only lowercase "n"s
    and "a"s after that.* Let''s show some possible comparisons and results:


    | Text to compare | Result |

    |---|---|

    | Anna | Match |

    | Bob | No match (No initial A) |

    | Alice | No match (I is not n or a after initial A) |

    | James | No match (No initial A) |

    | Aaan | Match |

    | Ana | Match |

    | Annnn | Match |

    | Aaaan | Match |

    | ANNA | No match (N is not n or a) |


    Table 1.1: A pattern matching example


    If this sounds complicated, that''s because it is. Regexes can be notoriously
    complicated because they may be incredibly intricate and difficult to follow.
    But they are also very useful because they allow us to perform incredibly powerful
    pattern matching.


    Some common uses of regexes are:


    +   - **Validating input data:** For example, a phone number that is only numbers,
    dashes, and brackets.

    - **String parsing:** Retrieve data from structured strings, such as logs or URLs.
    This is similar to what''s described in the previous recipe.

    - **Scrapping:** Find the occurrences of something in a long piece of text. For
    example, find all of the emails in a web page.

    - **Replacement:** Find and replace a word or words with others. For example,
    replace *the owner* with *John Smith*.'
- md: "## Getting ready\n\nThe python module to deal with regexes is called `re`.\
    \ The main function we'll cover is `re.search()`, which returns a `match` object\
    \ with information about what matched the pattern.\n\n> As regex patterns are\
    \ also defined as strings, we'll differentiate them by prefixing them with an\
    \ `r`, such as `r'pattern'`. This is the Python way of labeling a text as raw\
    \ string literals, meaning that the string within is taken literally, without\
    \ any escaping. This means that a `\\` is used as a backslash instead of an escaping\
    \ sequence. For example, without the `r` prefix, `\\n` means a newline character.\n\
    \nSome characters are special and refer to concepts such as *the end of the string*,\
    \ *any digit*, *any character*, *any whitespace character*, and so on.\n\nThe\
    \ simplest form is just a literal string. For example, the regex pattern `r'LOG'`\
    \ matches the string `'LOGS'`, but not the string `'NOT A MATCH'`. If there's\
    \ no match, `re.search` returns `None`. If there is, it returns a special `Match`\
    \ object:\n\n```\n>>> import re\n>>> re.search(r'LOG', 'LOGS')\n<_sre.SRE_Match\
    \ object; span=(0, 3), match='LOG'>\n>>> re.search(r'LOG', 'NOT A MATCH')\n>>>\n\
    ```\n\n## How to do it...\n\n1. Import the `re` module:\n   ```python\n   >>>\
    \ import re\n   ```\n\n2. Then, match a pattern that is not at the start of the\
    \ string:\n   ```python\n   >>> re.search(r'LOG', 'SOME LOGS')\n   <_sre.SRE_Match\
    \ object; span=(5, 8), match='LOG'>\n   ```\n\n3. Match a pattern that is only\
    \ at the start of the string. Note the `^` character:\n   ```python\n   >>> re.search(r'^LOG',\
    \ 'LOGS')\n   <_sre.SRE_Match object; span=(0, 3), match='LOG'>\n   >>> re.search(r'^LOG',\
    \ 'SOME LOGS')\n   >>>\n   ```\n\n4. Match a pattern only at the end of the string.\
    \ Note the `$` character:\n   ```python\n   >>> re.search(r'LOG$', 'SOME LOG')\n\
    \   <_sre.SRE_Match object; span=(5, 8), match='LOG'>\n   >>> re.search(r'LOG$',\
    \ 'SOME LOGS')\n   >>>\n   ```\n\n5. Match the word 'thing' (not excluding things),\
    \ but not something or anything. Note the `\\b` at the start of the second pattern:\n\
    \   ```python\n   >>> STRING = 'something in the things she shows me'\n   >>>\
    \ match = re.search(r'thing', STRING)\n   >>> STRING[:match.start()], STRING[match.start():match.end()],\
    \ STRING[match.end():]\n   ('some', 'thing', ' in the things she shows me')\n\
    \   >>> match = re.search(r'\\bthing', STRING)\n   >>> STRING[:match.start()],\
    \ STRING[match.start():match.end()], STRING[match.end():]\n   ('something in the\
