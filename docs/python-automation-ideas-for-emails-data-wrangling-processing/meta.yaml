  md: "# Searching and Reading Local Files\n\nWhile Pillow understands how JPG files\
    \ store the EXIF info directly, PNG files store XMP info, a more generic standard\
    \ that can contain EXIF data inside.\n\n> More info about XMP can be obtained\
    \ here: https://www.adobe.com/devnet/xmp.html. For the most part, it defines an\
    \ XML tree structure that's relatively readable in raw.\n\nTo further complicate\
    \ matters, XMP is encoded using RDF, which is a standard describing how to encode\
    \ an XML tree.\n\n> If EFIX, XMP, and RDF sound confusing, well, it's because\
    \ they are. XMP stores the EXIF information using RDF. Ultimately, the differences\
    \ between them are not very relevant, and the best approach is to find out the\
    \ interesting bits and pieces. We can inspect the specifics of the names using\
    \ Python introspection tools and check exactly how the data is structured, and\
    \ what the name of the parameter we are looking for is.\n\nAs the GPS information\
    \ is stored in different formats, we've included in the GitHub repository a file\
    \ called gps_conversion.py: https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter04/gps_conversion.py.\
    \ This includes the functions exif_to_decimal and rdf_to_decimal, which will transform\
    \ both formats into decimals to compare them.\n\n# How to do it...\n\n+   1. Import\
    \ the modules and functions to use in this recipe:\n    >>> from PIL import Image\n\
    \    >>> from PIL.ExifTags import TAGS, GPSTAGS\n    >>> import xmltodict\n  \
    \  >>> from gps_conversion import exif_to_decimal, rdf_to_decimal\n2. Open the\
    \ first photo:\n    >>> image1 = Image.open('images/photo-dublin-a1.jpg')\n3.\
    \ Get the width, height, and format of the file:\n    >>> image1.height\n    3024\n\
    \    >>> image1.width"
