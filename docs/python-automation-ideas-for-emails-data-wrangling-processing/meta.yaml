  - '[PAGE 314]


    Step 3 defines the data that will render in `email_template.md`. It is a very
    simple template that only requires a parameter called `name`.


    In step 4, the Markdown template gets rendered with the `data`. This produces
    the plain text version of the email.


    The HTML version is rendered in step 5. The plain text version is rendered to
    HTML using `mistune`, and then wrapped in `email_styling.html` using a `jinja2`
    template. The final version is a self-contained HTML document.


    Finally, we save both versions, plain text (as `text`) and HTML (as `html`), to
    a file in step 6. Steps 7 and 8 check the stored values. The information is the
    same, but in the HTML version, it is better styled.


    # There''s more...


    Using Markdown makes emails that contain a version in both plain text and HTML
    easy to generate. Markdown is quite readable in text format, and renders very
    naturally into HTML. That said, it is possible to generate a totally different
    HTML version, which will allow for more customization and taking advantage of
    HTML''s features.


    The full Markdown syntax can be found at `https://daringfireball.net/projects/markdown/syntax`,
    and a good cheat sheet with the most commonly used elements can be found at `https://www.markdownguide.org/cheat-sheet`.


    > While making a plain text version of an email is not strictly necessary, it
    is a good practice and shows you care about who reads the email. Most email clients
    accept HTML, but it''s not totally universal.


    For an HTML email, note that the whole stylesheet information should be contained
    in the email. This means that the CSS needs to be embedded into the HTML. Avoid
    making external references to resources that could lead the email to not render
    properly in some email clients, or even be qualified as spam.


    The styling in `email_styling.html` is based on the modest stylesheet, which can
    be found here: `http://markdowncss.github.io/`. There are more CSS stylesheets
    that can be used, and a search using Google should find more. Remember to remove
    any external references, as discussed previously.'
