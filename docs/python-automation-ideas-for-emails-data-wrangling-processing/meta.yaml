    \ 40),\n             horizontalalignment='center',\n             arrowprops={'facecolor':\
    \ 'black',\n                         'arrowstyle': \"fancy\",\n              \
    \           'connectionstyle': \"angle3\",\n                         })\n```\n\
    \nIn our recipe, we did not annotate to the end of the bar (point (1.2, 15)),\
