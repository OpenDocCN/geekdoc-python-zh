    You can use any of the default fonts (Courier, Helvetica, and Times), or add an
    extra font using `.add_font`. Check the documentation for more details: http://pyfpdf.readthedocs.io/en/latest/reference/add_font/index.html.


    > The Symbol and ZapfDingbats fonts are also available, but represent symbols.
    This could be useful if you need to display special characters, but be sure to
    test the result before using them. The rest of the default fonts should include
    your necessities for serif, sans serif, and fixed-width cases. In PDFs, the fonts
    used will be embedded in the document, so they''ll always be displayed correctly.


    Keep the height consistent throughout the document, at least between text of the
    same size. Define a constant you''re comfortable with, and use it for the whole
    content:


    ```

    >>> BODY_TEXT_HEIGHT = 5

    >>> document.multi_cell(0, BODY_TEXT_HEIGHT, text)

    ```


    By default, the text will be justified, but that can be changed. Use the align
    argument with J (justified), C (center), R (right), or L (left). For example,
    this produces text aligned to the left:


    ```

    >>> document.multi_cell(0, BODY_TEXT_HEIGHT, text, align=''L'')

    ```


    The full FPDF documentation can be found here: http://pyfpdf.readthedocs.io/en/latest/index.html.


