    \ so later, in *step 4*, it can skip all the references to external sources. `urlparse`\
    \ divides a URL into its constituent elements:\n\n```python\n>>> from urllib.parse\
    \ import urlparse\n>>> urlparse('http://localhost:8000/files/b93bec5d9681df87e6e8d5703ed7cd81-2.html')\n\
    ParseResult(scheme='http', netloc='localhost:8000', path='/files/b93bec5d9681df87e6e8d5703ed7cd81-2.html',\
    \ params='', query='', fragment='')\n```\n\n3. The code finds the text to search,\
    \ in the `search_text` function:\n\n```python\ndef search_text(source_link, page,\
    \ text):\n    '''Search for an element with the searched text and print it'''\n\
    \    for element in page.find_all(text=re.compile(text, flags=re.IGNORECASE)):\n\
    \        print(f'Link {source_link}: --> {element}')\n```\n\nThis searches the\
    \ parsed object for the specified text. Note that the search is done as a `regex`\
    \ and only in the text of the page. It prints the resulting matches, including\
