  md: "Debugging Techniques\n\nAfter checking the general execution in *step 1*, in\
    \ *step 2*, we introduced a `breakpoint` in the code.\n\nWhen you execute the\
    \ code in *step 3*, it will stop at the `breakpoint` position, entering an interactive\
    \ mode.\n\nIn the interactive mode, we can inspect the values of any variable,\
    \ as well as perform any kind of operation. As demonstrated in *step 4*, sometimes,\
    \ a line of code can be better analyzed by reproducing its parts.\n\nThe code\
    \ can be inspected and regular operations can be executed in the command line.\
    \ The next line of code can be executed by calling `n` (`next`), as implemented\
    \ in *step 5* several times, to see the flow of the code.\n\n*Step 6* shows how\
    \ to resume the execution with the `c` (`continue`) command, in order to stop\
    \ in the next breakpoint. All these operations can be iterated to see the flow\
    \ and values, and to understand what the code is doing at any point.\n\nThe execution\
    \ can be stopped with `q` (`quit`), as demonstrated in *step 7*.\n\n# There's\
    \ more...\n\nTo see all the available operations, you can call `h` (`help`) at\
    \ any point.\n\nYou can check the surrounding code at any point using the `l`\
    \ (`list`) command. For example, in *step 4*:\n\n```\n(Pdb) l\n  3     return\
    \ False\n  4\n  5     lower = candidate - 1\n  6     while lower > 1:\n  7   \
    \      breakpoint()\n  8  ->     if candidate / lower == candidate // lower:\n\
    \  9             return False\n 10         lower -= 1\n 11\n 12     return True\n\
    ```\n\nThe other two main debugger commands are `s` (`step`), which will execute\
    \ the next step, including entering a new call (as in *stepping into*), and `r`\
    \ (`return`), which will continue the execution of the current function until\
    \ it executes a `return` statement, and then stops. Note that at the end of any\
    \ Python function, there's an implicit `return None`."
