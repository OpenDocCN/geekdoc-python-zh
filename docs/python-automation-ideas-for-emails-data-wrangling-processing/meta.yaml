- md: "## How it works...\n\nAfter importing the module, the data is presented in\
    \ *step 2* of the *How to do it...* section in a useable structure.\n\n## Developing\
    \ Stunning Graphs\n\nBecause of the way `matplotlib` works, it requires an X component,\
    \ as well as a Y component. In this case, our X component is just a sequence of\
    \ increasing numbers, as many as there are data points. We store that in the variable\
    \ `POS`. This positions each of the Y values and works as a temporal series. In\
    \ `VALUES`, we store the numeric value of the sales as a sequence, and in `LABELS`,\
    \ we store the associated label for each data point. All that preparation work\
    \ is done in *step 3*.\n\n*Step 4* creates the bar graph with the sequences X\
    \ (`POS`) and Y (`VALUES`). These define our bars. To specify the period it refers\
    \ to, we put labels on the *x-axis* for each value with `.xticks` in the same\
    \ way. To clarify the meaning, we add a label with `.ylabel`.\n\nTo display the\
    \ resulting graph, *step 5* calls `.show`, which opens a new window with the result.\n\
    \n> Calling `.show` blocks the execution of the program. The program will resume\
    \ when the window is closed.\n\n## There's more...\n\nYou may want to change the\
    \ format in which the values are presented. In our example, maybe the numbers\
    \ represent millions of dollars. To do so, you can add a formatter to the *y-axis*,\
    \ so the values represented there will have it applied to them:\n\n```python\n\
    >>> from matplotlib.ticker import FuncFormatter\n\n>>> def value_format(value,\
    \ position):\n...     return '$ {}M'.format(int(value))\n\n>>> axes = plt.gca()\n\
    >>> axes.yaxis.set_major_formatter(FuncFormatter(value_format))\n```\n\n`value_format`\
    \ is a function that returns a value based on the value and position of the data.\
    \ Here, it will return the value 100 as $100M.\n\n> Values will be retrieved as\
    \ floats, requiring you to transform them into integers for display.\n\nTo apply\
    \ the formatter, we need to retrieve the `axis` object with `.gca` (get current\
    \ axes). Then, the `.yaxis` attribute sets up the formatter for the *y-axis* labels.\n\
    \nThe color of the bars can also be determined with the `color` parameter. Colors\
    \ can be specified in multiple formats, as described at https://matplotlib.org/api/colors_api.html,\
    \ but my favorite is following the XKCD color survey using the `xkcd:` prefix\
    \ (no space after the colon):\n\n```python\n>>> plt.bar(POS, VALUES, color='xkcd:moss\
    \ green')\n```\n\nThe full survey can be found here: https://xkcd.com/color/rgb/.\n\
    \n> Most common colors, such as blue and red, are also available for quick tests.\
    \ They tend to be a little bright and harsh to be used in good-looking reports,\
    \ though.\n\nCombining the color with formatting the axis gives us the following\
    \ result:\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_270_0.png)\n\n## Developing\
    \ Stunning Graphs\n\nBar graphs don't need to display information in a temporal\
    \ way. As we've seen, `matplotlib` requires us to specify the X parameter of each\
    \ bar. It's a powerful tool used to generate all kinds of graphs.\n\n> For example,\
    \ the bars can be arranged to display a histogram, such as for displaying people\
    \ of a certain height. The bars will start at a low height, increase to the average\
    \ size, and then drop back. Don't limit yourself to just spreadsheet charts!\n\
    \nThe full `matplotlib` documentation can be found here: https://matplotlib.org/.\n\
    \n## See also\n\n- The *Drawing stacked bars* recipe, next in this chapter, to\
    \ learn how to plot more accumulated information on each bar.\n- The *Adding legends\
    \ and annotations* recipe, later in this chapter, to learn how to add context\
    \ information to a graph.\n- The *Combining graphs* recipe, later in this chapter,\
    \ to learn how to combine multiple plots into a single graph.\n\n## Drawing stacked\
    \ bars\n\nA powerful way of displaying different categories is to present them\
    \ as stacked bars so that each of the categories and the total are displayed.\
    \ We'll see how to do that in this recipe.\n\n## Getting ready\n\nWe need to install\
    \ `matplotlib` in our virtual environment:\n\n```bash\n$ echo \"matplotlib==3.2.1\"\
    \ >> requirements.txt\n$ pip install -r requirements.txt\n```\n\nIf you are using\
    \ macOS, you may get an error like this: **RuntimeError: Python is not installed\
    \ as a framework**. See the `matplotlib` documentation on how to fix it: https://matplotlib.org/faq/osx_framework.html.\n\
    \n## How to do it...\n\n1. Import matplotlib:\n    ```python\n    >>> import matplotlib.pyplot\
    \ as plt\n    ```\n\n2. Prepare the data. This represents two products' sales;\
    \ an established one and a new one:\n    ```python\n    >>> DATA = (\n    ...\
    \     ('Q1 2017', 100, 0),\n    ...     ('Q2 2017', 105, 15),\n    ...     ('Q3\
    \ 2017', 125, 40),\n    ...     ('Q4 2017', 115, 80),\n    ... )\n    ```\n\n\
    3. Process the data to prepare the expected format:\n    ```python\n    >>> POS\
    \ = list(range(len(DATA)))\n    >>> VALUESA = [valueA for label, valueA, valueB\
    \ in DATA]\n    >>> VALUESB = [valueB for label, valueA, valueB in DATA]\n   \
    \ >>> LABELS = [label for label, value1, value2 in DATA]\n    ```\n\n4. Create\
    \ the bar plot. Two plots are required:\n    ```python\n    >>> plt.bar(POS, VALUESB)\n\
    \    <BarContainer object of 4 artists>\n    >>> plt.bar(POS, VALUESA, bottom=VALUESB)\n\
    \    <BarContainer object of 4 artists>\n    >>> plt.ylabel('Sales')\n    Text(0,\
    \ 0.5, 'Sales')\n    >>> plt.xticks(POS, LABELS)\n    <REDACTED>\n    ```\n\n\
    5. Display the graph:\n    ```python\n    >>> plt.show()\n    ```\n\n6. The result\
    \ will be displayed in a new window, as follows:\n\n    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_273_0.png)\n\
    \n## How it works...\n\nAfter importing the module, the data is presented in *step\
    \ 2* in a useable structure.\n\nIn *step 3*, the data is prepared in three sequences,\
    \ `VALUESA`, `VALUESB`, and `LABELS`. A `POS` increasing sequence is added so\
    \ that the bars are positioned over the *x-axis*, one after the other.\n\n*Step\
    \ 4* creates the bar graph with the sequences *X* (`POS`) and *Y* (`VALUESB`).\
    \ The second bar sequence, `VALUESA`, is added on top of the previous one using\
    \ the `bottom=VALUESB` argument. This process stacks both bars, positioning the\
    \ full `VALUESA` bar on top of the `VALUESB` bar.\n\n> Notice that we stack the\
    \ second value, `VALUESB`, first. The second value represents a new product that\
    \ was introduced to the market. `VALUESA` represents the established product and\
    \ is more stable. This graph shows the growth of the new product better.\n\nEach\
    \ of the periods is labeled on the *x-axis* with `.xticks`. To clarify the meaning,\
    \ we add a label with `.ylabel`.\n\nTo display the resulting graph, *step 5* calls\
    \ `.show`, which opens a new window with the result.\n\n> Calling `.show` blocks\
    \ the execution of the program. The program will resume when the window is closed.\n\
    \n## There's more...\n\nAnother way of presenting stacked bars is by adding them\
    \ as percentages so that the total doesn't change, only the relative sizes compared\
    \ to each other.\n\nTo do that, VALUESA and VALUESB need to be calculated relative\
    \ to the percentages in this way:\n\n```python\n>>> VALUESA = [100 * valueA /\
    \ (valueA + valueB) for label, valueA, valueB in DATA]\n>>> VALUESB = [100 * valueB\
    \ / (valueA + valueB) for label, valueA, valueB in DATA]\n```\n\nThis makes each\
    \ value equal to the percentage of the total, and the total always adds up to\
    \ 100. This produces the following graphic:\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_274_0.png)\n\
    \nThe bars don't necessarily need to be stacked. Sometimes, it may be interesting\
    \ to present the bars one against the other for comparison.\n\n## Developing Stunning\
    \ Graphs\n\nTo do that, we need to move the position of the second bar sequence.\
    \ We'll also need to set thinner bars to allow spaces:\n\n```python\n>>> WIDTH\
    \ = 0.3\n>>> plt.bar([p - WIDTH / 2 for p in POS], VALUESA, width=WIDTH)\n>>>\
    \ plt.bar([p + WIDTH / 2 for p in POS], VALUESB, width=WIDTH)\n```\n\nNote how\
    \ the width of the bar is set to a third of the space since our reference space\
    \ is 1 between the bars. The first bar is moved to the left, while the second\
    \ bar is moved to the right to center them. The `bottom` argument has been deleted\
    \ so that the bars aren't stacked:\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_275_0.png)\n\
    \nThe full `matplotlib` documentation can be found here: https://matplotlib.org/.\n\
    \n## See also\n\n- The *Plotting a simple sales graph* recipe, earlier in this\
    \ chapter, to learn the basics of drawing bar graphs.\n- The *Adding legends and\
    \ annotations* recipe, later in this chapter, to learn how to add context information\
    \ to a graph.\n- The *Combining graphs* recipe, later in this chapter, to learn\
    \ how to add multiple plots to a single graph."
  mdcn: "## 工作原理...\n\n导入模块后，数据将在*如何操作...*部分的*步骤 2*中以可用的结构呈现。\n\n## 开发惊艳图表\n\n由于 `matplotlib`\
    \ 的工作方式，它需要一个 X 分量和一个 Y 分量。在这种情况下，我们的 X 分量只是一个递增的数字序列，其数量与数据点的数量相同。我们将其存储在变量 `POS`\
    \ 中。这为每个 Y 值定位，并作为时间序列工作。在 `VALUES` 中，我们以序列形式存储销售额的数值，在 `LABELS` 中，我们存储每个数据点的关联标签。所有这些准备工作都在*步骤\
    \ 3*中完成。\n\n*步骤 4*使用序列 X (`POS`) 和 Y (`VALUES`) 创建条形图。这些定义了我们的条形。为了指定其引用的时间段，我们使用\
    \ `.xticks` 以相同的方式在 *x 轴*上为每个值添加标签。为了阐明含义，我们使用 `.ylabel` 添加标签。\n\n要显示生成的图表，*步骤\
    \ 5*调用 `.show`，这将打开一个包含结果的新窗口。\n\n> 调用 `.show` 会阻塞程序的执行。关闭窗口后，程序将恢复。\n\n## 更多内容...\n\
    \n您可能希望更改值呈现的格式。在我们的示例中，也许数字代表数百万美元。为此，您可以向 *y 轴*添加一个格式化器，这样那里表示的值将应用该格式化器：\n\n\
    ```python\n>>> from matplotlib.ticker import FuncFormatter\n\n>>> def value_format(value,\
    \ position):\n...     return '$ {}M'.format(int(value))\n\n>>> axes = plt.gca()\n\
    >>> axes.yaxis.set_major_formatter(FuncFormatter(value_format))\n```\n\n`value_format`\
    \ 是一个根据数据的值和位置返回值的函数。在这里，它将把值 100 返回为 $100M。\n\n> 值将以浮点数形式检索，需要您将其转换为整数以进行显示。\n\
    \n要应用格式化器，我们需要使用 `.gca`（获取当前坐标轴）检索 `axis` 对象。然后，`.yaxis` 属性为 *y 轴*标签设置格式化器。\n\n\
    条形的颜色也可以通过 `color` 参数确定。颜色可以以多种格式指定，如 https://matplotlib.org/api/colors_api.html\
    \ 中所述，但我最喜欢的是遵循 XKCD 颜色调查，使用 `xkcd:` 前缀（冒号后无空格）：\n\n```python\n>>> plt.bar(POS,\
    \ VALUES, color='xkcd:moss green')\n```\n\n完整的调查可以在这里找到：https://xkcd.com/color/rgb/。\n\
    \n> 大多数常见颜色，如蓝色和红色，也可用于快速测试。不过，它们往往有点亮和刺眼，不适合用于美观的报告。\n\n将颜色与格式化坐标轴结合，我们得到以下结果：\n\
    \n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_270_0.png)\n\n## 开发惊艳图表\n\n条形图不需要以时间方式显示信息。正如我们所看到的，`matplotlib`\
    \ 要求我们指定每个条形的 X 参数。它是一个强大的工具，用于生成各种图表。\n\n> 例如，条形可以排列以显示直方图，例如显示特定身高的人群。条形将从低身高开始，增加到平均大小，然后回落。不要将自己局限于电子表格图表！\n\
    \n完整的 `matplotlib` 文档可以在这里找到：https://matplotlib.org/。\n\n## 另请参阅\n\n- 本章接下来的*绘制堆叠条形*食谱，了解如何在每个条形上绘制更多累积信息。\n\
    - 本章后面的*添加图例和注释*食谱，了解如何向图表添加上下文信息。\n- 本章后面的*组合图表*食谱，了解如何将多个绘图组合成一个图表。\n\n## 绘制堆叠条形\n\
    \n显示不同类别的一种强大方式是将它们呈现为堆叠条形，以便显示每个类别和总计。我们将在本食谱中了解如何做到这一点。\n\n## 准备工作\n\n我们需要在虚拟环境中安装\
    \ `matplotlib`：\n\n```bash\n$ echo \"matplotlib==3.2.1\" >> requirements.txt\n\
    $ pip install -r requirements.txt\n```\n\n如果您使用 macOS，可能会遇到如下错误：**RuntimeError:\
