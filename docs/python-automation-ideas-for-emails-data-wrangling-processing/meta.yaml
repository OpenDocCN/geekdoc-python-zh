    \   [<matplotlib.lines.Line2D object at 0x12e78a2b0>]\n   >>> plt.plot(POS, VALUESB,\
    \ 'o-')\n   [<matplotlib.lines.Line2D object at 0x12e7afcd0>]\n   >>> plt.ylabel('Sales')\n\
