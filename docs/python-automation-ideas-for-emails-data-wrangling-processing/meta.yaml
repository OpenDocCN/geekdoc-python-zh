    # How it works...


    Once the document is open, as shown in *step 1* and *step 2* in the *How to do
    it...* section, the `document` object provides access to the document.


    Some useful properties are the number of pages, available in `.numPages`, and
    each of the pages, available in `.pages`, which can be accessed like a list.


    Other data that''s accessible is stored in `.documentInfo`, which stores metadata
    on the creator and when it was created.


    > The information in `.documentInfo` is optional and sometimes not up to date.
    It depends greatly on the tool used to generate the PDF.


    Each of the `page` objects can get its text by calling `.extractText()`, which
    will return all the text contained in the page, as done in *step 5* and *step
    6*. This method tries to extract all text, but it has some limitations. For well-structured
    texts, such as our example, it works quite well, and the resulting text can be
    processed cleanly. When dealing with text in multiple columns or located in strange
    positions, it may complicate working with it.


    > Notice that the PDF file needs to be open for the whole operation, instead of
    using a `with` context operator. After leaving the `with` block, the file is closed.


    *Step 8* and *step 9* show how to deal with encrypted files. You can detect whether
    a file is encrypted or not with `.isEncrypted`, and then decrypt it with the `.decrypt`
    method, providing the correct password.'
