    \ texts/category_example.txt\nText: This text talks about literature and different\
    \ authors from the XIX century. It discusses the different styles from different\
    \ authors in different languages, analysing and comparing them with their historical\
    \ context.\n\nCategories\nCategory: /Books & Literature\nConfidence: 0.9300000071525574\n\
    ```\n\nLet's take a look at the `text_analysis_categories.py` script, which is\
    \ very similar to `text_analysis.py`:\n\n```python\nimport argparse\nfrom google.cloud\
    \ import language\nfrom google.cloud.language import enums\nfrom google.cloud.language\
    \ import types\n\ndef main(image_file):\n    content = image_file.read()\n   \
    \ print(f'Text: {content}')\n    document = types.Document(content=content,\n\
    \                              type=enums.Document.Type.PLAIN_TEXT)\n\n    client\
    \ = language.LanguageServiceClient()\n\n    print('Categories')\n    response\
