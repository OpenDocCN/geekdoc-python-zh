  - '[PAGE 9]


    # How it works...


    The `requirements.txt` file specifies the module and version, and pip performs
    a search on `pypi.org`.


    Note that creating a new virtual environment from scratch and running the following
    will completely recreate your environment, which makes replicability very straightforward:


    ```

    $ pip install -r requirements.txt

    ```


    Note that step 2 of the *How to do it* section automatically installs other modules
    that are dependencies, such as `urllib3`.


    # There''s more...


    If any of the modules need to be changed to a different version because a new
    version is available, change them using `requirements` and run the `install` command
    again:


    ```

    $ pip install -r requirements.txt

    ```


    This is also applicable when a new module needs to be included.


    At any point, the `freeze` command can be used to display all of the installed
    modules. `freeze` returns the modules in a format compatible with `requirements.txt`,
    making it possible to generate a file with our current environment:


    ```

    $ pip freeze > requirements.txt

    ```


    This will include dependencies, so expect a lot more modules in the file.


    Finding great third-party modules is sometimes not easy. Searching for specific
    functionality can work well, but, sometimes, there are great modules that are
    a surprise because they do things you never thought of. A great curated list is
    Awesome Python (https://awesome-python.com/), which covers a lot of great tools
    for common Python use cases, such as cryptography, database access, date and time
    handling, and more.


    In some cases, installing packages may require additional tools, such as compilers
    or a specific library that supports some functionality (for example, a particular
    database driver). If that''s the case, the documentation will explain the dependencies.'
  - '[PAGE 10]


    # See also


    +   - The *Activating a virtual environment* recipe, covered earlier in this chapter.

    - The *Using a third-party tool – parse* recipe, covered later in this chapter,
    to learn how to use one installed third-party module.


    # Creating strings with formatted values


    One of the basic abilities when dealing with creating text and documents is to
    be able to properly format values into structured strings. Python is smart at
    presenting good defaults, such as properly rendering a number, but there are a
    lot of options and possibilities.


    We''ll discuss some of the common options when creating formatted text using the
    example of a table.


    # Getting ready


    The main tool to format strings in Python is the `format` method. It works with
    a defined mini-language to render variables this way:


    ```

    result = template.format(*parameters)

    ```


    The `template` is a string that is interpreted based on the mini-language. At
    its simplest, templating replaces the values between the curly brackets with the
    parameters. Here are a couple of examples:


    ```

    >>> ''Put the value of the string here: {}''.format(''STRING'')

    "Put the value of the string here: STRING"

    >>> ''It can be any type ({}) and more than one ({})''.format(1.23, ''STRING'')

    "It can be any type (1.23) and more than one (STRING)"

    >>> ''Specify the order: {1}, {0}''.format(''first'', ''second'')

    ''Specify the order: second, first''

    >>> ''Or name parameters: {first}, {second}''.format(second=''SECOND'', first=''FIRST'')

    ''Or name parameters: FIRST, SECOND''

    ```


    In 95% of cases, this formatting will be all that''s required; keeping things
    simple is great! But for complicated times, such as when aligning strings automatically
    and creating good looking text tables, the mini-language `format` has more options.'
  - "[PAGE 11]\n\n# How to do it...\n\n1. Write the following script, `recipe_format_strings_step1.py`,\
    \ to print an aligned table:\n\n```\n# INPUT DATA\ndata = [\n    (1000, 10),\n\
    \    (2000, 17),\n    (2500, 170),\n    (2500, -170),\n]\n\n# Print the header\
    \ for reference\nprint('REVENUE | PROFIT | PERCENT')\n\n# This template aligns\
    \ and displays the data in the proper format\nTEMPLATE = '{revenue:>7,} | {profit:>+6}\
    \ | {percent:>7.2%}'\n\n# Print the data rows\nfor revenue, profit in data:\n\
    \    row = TEMPLATE.format(revenue=revenue, profit=profit,\n                 \
    \         percent=profit / revenue)\n    print(row)\n```\n\n2. Run it to display\
    \ the following aligned table. Note that `PERCENT` is correctly displayed as a\
    \ percentage:\n\n```\nREVENUE | PROFIT | PERCENT\n  1,000 |    +10 |   1.00%\n\
    \  2,000 |    +17 |   0.85%\n  2,500 |   +170 |   6.80%\n  2,500 |   -170 |  -6.80%\n\
    ```\n\n# How it works...\n\nThe `TEMPLATE` constant defines three columns, each\
    \ one defined by a parameter named `revenue`, `profit`, and `percent`. This makes\
    \ it explicit and straightforward to apply the template to the `format` call."
  - '[PAGE 12]


    After the name of the parameter, there''s a colon that separates the format definition.
    Note that everything is inside the curly brackets. In all columns, the format
    specification sets the width to seven characters, to make sure all the columns
    have the same width, and aligns the values to the right with the > symbol:


    +   - `revenue` adds a thousands separator with the `,` symbol — `[{revenue:>7,}]`.

    - `profit` adds a `+` sign for positive values. A `-` sign for negatives is added
    automatically — `[{profit:>+7}]`.

    - `percent` displays a percent value with a precision of two decimal places —
    `[{percent:>7.2%}]`. This is done through `.2` (precision) and adding a `%` symbol
    for the percentage.


    # There''s more...


    You may have also seen the available Python formatting with the `%` operator.
    While it works for simple formatting, it is less flexible than the formatted mini-language,
    and it is not recommended for use.


    A great new feature since Python 3.6 is to use f-strings, which perform a format
    action using defined variables:


    ```

    >>> param1 = ''first''

    >>> param2 = ''second''

    >>> f''Parameters {param1}:{param2}''

    ''Parameters first:second''

    ```


    This simplifies a lot of the code and allows us to create very descriptive and
    readable code.


    Be careful when using f-strings to ensure that the string is replaced at the proper
    time. A common problem is that the variable defined to be rendered is not yet
    defined. For example, `TEMPLATE`, defined previously, won''t be defined as an
    f-string, as `revenue` and the rest of the parameters are not available at that
    point. All variables defined at the scope of the string definition will be available,
    both local and global.


    If you need to write a curly bracket, you''ll need to repeat it twice. Note that
    each duplication will be displayed as a single curly bracket, plus a curly bracket
    for the value replacement, making a total of three brackets:


    ```

    >>> value = ''VALUE''

    >>> f''This is the value, in curly brackets {{{value}}}''

    ''This is the value, in curly brackets {VALUE}''

    ```'
- md: '## Let''s Begin Our Automation Journey


    This allows us to create meta templates—templates that produce templates. In some
    cases, this will be useful, but they get complicated very quickly. Use with care,
    as it''s easy to produce code that will be difficult to read.


    > Representing characters that have a special meaning usually requires some sort
    of special way to define them, for example, by duplicating the curly bracket like
    we see here. This is called "escaping" and it''s a common process in any code
    representation.


    The Python Format Specification mini-language has more options than the ones shown
    here.


    As the language tries to be quite concise, sometimes it can be difficult to determine
    the position of the symbols. You may sometimes ask yourself questions, like "is
    the + symbol before or after the width parameters?" Read the documentation with
    care and remember to always include a colon before the format specification.


    Please refer to the full documentation and examples on the Python website: https://docs.python.org/3/library/string.html#formatspec
    or at this fantastic web page—https://pyformat.info—that shows lots of examples.


    ## See also


    - The Template Reports recipe in Chapter 5, Generating Fantastic Reports, to learn
    more advanced template techniques.

    - The Manipulating strings recipe, covered later in this chapter, to learn more
    about working with text.


    ## Manipulating strings


    When dealing with text, it''s often necessary to manipulate and process it; that
    is, to be able to join it, split it into regular chunks, or change it to be uppercase
    or lowercase. We''ll discuss more advanced methods for parsing text and separating
    it later; however, in lots of cases, it is useful to divide a paragraph into lines,
    sentences, or even words. Other times, words will require some characters to be
    removed or a word will need to be replaced with a canonical version to be able
    to compare it with a predetermined value.


    ## Getting ready


    We''ll define a basic piece of text and transform it into its main components;
    then, we''ll reconstruct it. As an example, a report needs to be transformed into
    a new format to be sent via email.


    The input format we''ll use in this example will be this:


    > AFTER THE CLOSE OF THE SECOND QUARTER, OUR COMPANY, CASTAÑACORP HAS ACHIEVED
    A GROWTH IN THE REVENUE OF 7.47%. THIS IS IN LINE WITH THE OBJECTIVES FOR THE
    YEAR. THE MAIN DRIVER OF THE SALES HAS BEEN THE NEW PACKAGE DESIGNED UNDER THE
    SUPERVISION OF OUR MARKETING DEPARTMENT. OUR EXPENSES HAS BEEN CONTAINED, INCREASING
    ONLY BY 0.7%, THOUGH THE BOARD CONSIDERS IT NEEDS TO BE FURTHER REDUCED. THE EVALUATION
    IS SATISFACTORY AND THE FORECAST FOR THE NEXT QUARTER IS OPTIMISTIC. THE BOARD
    EXPECTS AN INCREASE IN PROFIT OF AT LEAST 2 MILLION DOLLARS.


    We need to redact the text to eliminate any references to numbers. It needs to
    be properly formatted by adding a new line after each period, justified with 80
    characters, and transformed into ASCII for compatibility reasons.


    The text will be stored in the `INPUT_TEXT` variable in the interpreter.


    ## How to do it...


    1. After entering the text, split it into individual words:


    ```

    >>> INPUT_TEXT = ''''''

    ...     AFTER THE CLOSE OF THE SECOND QUARTER, OUR COMPANY,

    ...     CASTAÑACORP

    ...     HAS ACHIEVED A GROWTH IN THE REVENUE OF 7.47%. THIS IS IN

    ...     LINE

    ...     ...

    ...     ''''''

    >>> words = INPUT_TEXT.split()

    ```


    2. Replace any numerical digits with an ''X'' character:


    ```

    >>> redacted = [''''.join(''X'' if w.isdigit() else w for w in word)

    for word in words]

    ```


    3. Transform the text into pure ASCII (note that the name of the company contains
    the letter ñ, which is not ASCII):


    ```

    >>> ascii_text = [word.encode(''ascii'', errors=''replace'').

    decode(''ascii'')

    ...                 for word in redacted]

    ```


    4. Group the words into 80-character lines:


    ```

    >>> newlines = [word + ''\n'' if word.endswith(''.'') else word for

    word in ascii_text]

    >>> LINE_SIZE = 80

    >>> lines = []

    >>> line = ''''

    >>> for word in newlines:

    ...     if line.endswith(''\n'') or len(line) + len(word) + 1 >

    LINE_SIZE:

    ...         lines.append(line)

    ...         line = ''''

    ...     line = line + '' '' + word

    ```


    5. Format all of the lines as titles and join them as a single piece of text:


    ```

    >>> lines = [line.title() for line in lines]

    >>> result = ''\n''.join(lines)

    ```


    6. Print the result:


    ```

    >>> print(result)

    ```


    After The Close Of The Second Quarter, Our Company, Casta?Acorp

    Has Achieved A Growth In The Revenue Of X.Xx%. This Is In Line

    With The Objectives For The Year. The Main Driver Of The Sales

    Has Been The New Package Designed Under The Supervision Of Our

    Marketing Department. Our Expenses Has Been Contained, Increasing

    Only By X.X%, Though The Board Considers It Needs To Be Further

    Reduced. The Evaluation Is Satisfactory And The Forecast For The

    Next Quarter Is Optimistic.


    ## How it works...


    Each step performs a specific transformation of the text:


    - The first step splits the text into the default separators, whitespaces, and
    new lines. This splits it into individual words with no lines or multiple spaces
    for separation.

    - To replace the digits, we go through every character of each word. For each
    one, if it''s a digit, an ''x'' is returned instead. This is done with two list
    comprehensions, one to run on the list, and another on each word, replacing them
    only if there''s a digit - [''x'' if w.isdigit() else w for w in word]. Note that
    the words are joined together again.

    - Each of the words is encoded into an ASCII byte sequence and decoded back again
    into the Python string type. Note the use of the errors parameter to force the
    replacement of unknown characters such as ñ.


    > The difference between strings and bytes is not very intuitive at first, especially
    if you never have to worry about multiple languages or encoding transformations.
    In Python 3, there''s a strong separation between strings (internal Python representation)
    and bytes. So most of the tools applicable to strings won''t be available in byte
    objects. Unless you have a good idea of why you need a byte object, always work
    with Python strings. If you need to perform transformations like the one in this
    task, encode and decode in the same line so that you keep your objects within
    the comfortable realm of Python strings. If you are interested in learning more
    about encodings, you can refer to this brief article: https://eli.thegreenplace.net/2012/01/30/the-bytesstr-dichotomy-in-python-3
    and this other, longer and more detailed one: http://www.diveintopython3.net/strings.html.


    - The next step adds an extra newline character (the \n character) for all words
    ending with a period. This marks the different paragraphs. After that, it creates
    a line and adds the words one by one. If an extra word will make it go over 80
    characters, it finishes the line and starts a new one. If the line already ends
    with a new line, it finishes it and starts another one as well. Note that there''s
    an extra space added to separate the words.

    - Finally, each of the lines is capitalized as a Title (the first letter of each
    word is uppercased) and all the lines are joined through new lines.


    ## There''s more...


    Some other useful operations that can be performed on strings are as follows:


    - Strings can be sliced like any other list. This means that `"word"[0:2]` will
    return `"wo"`.

    - Use `.splitlines()` to separate lines with a newline character.

    - There are `.upper()` and `.lower()` methods, which return a copy with all of
    the characters set to uppercase or lowercase. Their use is very similar to `.title()`:


    ```python

    >>> ''UPPERCASE''.lower()

    ''uppercase''

    ```


    - For easy replacements (for example, changing all *As to Bs* or *changing mine
    \ to ours*), use `.replace()`. This method is useful for very simple cases, but
    replacements can get tricky easily. Be careful with the order of replacements
    to avoid collisions and case sensitivity issues. Note the wrong replacement in
    the following example:


    ```python

    >>> ''One ring to rule them all, one ring to find them, One ring to bring them
    all and in the darkness bind them.''.replace(''ring'', ''necklace'')

    ''One necklace to rule them all, one necklace to find them, One necklace to bnecklace
    them all and in the darkness bind them.''

    ```


    This is similar to the issues we''ll encounter with regular expressions matching
    unexpected parts of your code. There are more examples to follow later. Refer
    to the regular expressions recipes for more information.


    > To wrap text lines, you can use the `textwrap` module included in the standard
    library, instead of manually counting characters. View the documentation here:
    https://docs.python.org/3/library/textwrap.html.


    If you work with multiple languages, or with any kind of non-English input, it
    is very useful to learn the basics of Unicode and encodings. In a nutshell, given
    the vast amount of characters in all the different languages in the world, including
    alphabets not related to the Latin one, such as Chinese or Arabic, there''s a
    standard to try and cover all of them so that computers can properly understand
    them. Python 3 greatly improved this situation, making the internal objects of
    the strings can deal with all of those characters. The default encoding that Python
    uses, and the most common and compatible one, is currently UTF-8.'
  mdcn: '## 让我们开始自动化之旅


    这使我们能够创建元模板——即生成模板的模板。在某些情况下，这很有用，但它们会很快变得复杂。请谨慎使用，因为很容易生成难以阅读的代码。


    > 表示具有特殊含义的字符通常需要某种特殊的定义方式，例如，像我们在这里看到的那样，通过重复花括号。这被称为“转义”，它是任何代码表示中的常见过程。


    Python 格式规范迷你语言比这里显示的选项更多。


    由于该语言力求非常简洁，有时可能难以确定符号的位置。你有时可能会问自己这样的问题，比如“+符号是在宽度参数之前还是之后？”请仔细阅读文档，并记住始终在格式规范前包含冒号。


    请参阅 Python 网站上的完整文档和示例：https://docs.python.org/3/library/string.html#formatspec
    或这个精彩的网页——https://pyformat.info——其中展示了大量示例。


    ## 另请参阅


    - 第5章《生成精彩报告》中的“模板报告”食谱，以了解更多高级模板技术。

    - 本章稍后介绍的“操作字符串”食谱，以了解更多关于处理文本的内容。


    ## 操作字符串


    处理文本时，通常需要对其进行操作和处理；即，能够将其连接、分割成规则的块，或将其更改为大写或小写。我们稍后将讨论更高级的文本解析和分离方法；然而，在许多情况下，将段落分成行、句子甚至单词是很有用的。其他时候，单词可能需要删除某些字符，或者需要将单词替换为规范版本，以便能够将其与预定值进行比较。


    ## 准备工作


    我们将定义一段基本文本并将其转换为其主要组成部分；然后，我们将重建它。例如，一份报告需要转换为新格式才能通过电子邮件发送。


    本例中我们将使用的输入格式如下：


    > 第二季度结束后，我们公司 CASTAÑACORP 的收入增长了 7.47%。这符合年度目标。销售的主要驱动力是在我们市场部监督下设计的新包装。我们的支出得到了控制，仅增长了
    0.7%，尽管董事会认为需要进一步削减。评估结果令人满意，对下一季度的预测是乐观的。董事会预计利润至少增加 200 万美元。


    我们需要编辑文本以消除任何对数字的引用。它需要通过在每个句点后添加新行、以 80 个字符对齐，并出于兼容性原因转换为 ASCII 来进行适当格式化。


    文本将存储在解释器中的 `INPUT_TEXT` 变量中。


    ## 如何操作...


    1. 输入文本后，将其分割成单个单词：


    ```

    >>> INPUT_TEXT = ''''''

    ...     AFTER THE CLOSE OF THE SECOND QUARTER, OUR COMPANY,

    ...     CASTAÑACORP

    ...     HAS ACHIEVED A GROWTH IN THE REVENUE OF 7.47%. THIS IS IN

    ...     LINE

    ...     ...

    ...     ''''''

    >>> words = INPUT_TEXT.split()

    ```


    2. 将任何数字替换为 ''X'' 字符：


    ```

    >>> redacted = [''''.join(''X'' if w.isdigit() else w for w in word)

    for word in words]

    ```


    3. 将文本转换为纯 ASCII（注意公司名称包含字母 ñ，它不是 ASCII）：


    ```

    >>> ascii_text = [word.encode(''ascii'', errors=''replace'').

    decode(''ascii'')

    ...                 for word in redacted]

    ```


    4. 将单词分组为 80 个字符的行：


    ```

    >>> newlines = [word + ''\n'' if word.endswith(''.'') else word for

    word in ascii_text]

    >>> LINE_SIZE = 80

    >>> lines = []

    >>> line = ''''

    >>> for word in newlines:

    ...     if line.endswith(''\n'') or len(line) + len(word) + 1 >

    LINE_SIZE:

    ...         lines.append(line)

    ...         line = ''''

    ...     line = line + '' '' + word

    ```


    5. 将所有行格式化为标题，并将它们连接成单个文本：


    ```

    >>> lines = [line.title() for line in lines]

    >>> result = ''\n''.join(lines)

    ```


    6. 打印结果：


    ```

    >>> print(result)

    ```


    After The Close Of The Second Quarter, Our Company, Casta?Acorp

    Has Achieved A Growth In The Revenue Of X.Xx%. This Is In Line

    With The Objectives For The Year. The Main Driver Of The Sales

    Has Been The New Package Designed Under The Supervision Of Our

    Marketing Department. Our Expenses Has Been Contained, Increasing

    Only By X.X%, Though The Board Considers It Needs To Be Further

    Reduced. The Evaluation Is Satisfactory And The Forecast For The

    Next Quarter Is Optimistic.


    ## 工作原理...


    每个步骤都对文本执行特定的转换：


    - 第一步将文本按默认分隔符（空格和换行符）分割。这将其分割成单个单词，没有行或多空格作为分隔。

    - 要替换数字，我们遍历每个单词的每个字符。对于每个字符，如果它是数字，则返回 ''x'' 代替。这是通过两个列表推导式完成的，一个用于运行列表，另一个用于每个单词，仅在存在数字时替换它们
    - [''x'' if w.isdigit() else w for w in word]。注意单词被重新连接在一起。

    - 每个单词被编码为 ASCII 字节序列，然后解码回 Python 字符串类型。注意使用 errors 参数来强制替换未知字符，例如 ñ。


    > 字符串和字节之间的区别起初并不直观，特别是如果你从不需要担心多种语言或编码转换。在 Python 3 中，字符串（内部 Python 表示）和字节之间有很强的分离。因此，适用于字符串的大多数工具在字节对象中不可用。除非你清楚为什么需要字节对象，否则始终使用
    Python 字符串。如果需要执行像本任务中的转换，请在同一行中编码和解码，以便将对象保持在舒适的 Python 字符串领域内。如果你有兴趣了解更多关于编码的知识，可以参考这篇简短的文章：https://eli.thegreenplace.net/2012/01/30/the-bytesstr-dichotomy-in-python-3
    以及这篇更长、更详细的文章：http://www.diveintopython3.net/strings.html。


    - 下一步为所有以句点结尾的单词添加一个额外的换行符（\n 字符）。这标记了不同的段落。之后，它创建一行并逐个添加单词。如果额外的单词使其超过 80 个字符，它将完成该行并开始新行。如果该行已经以换行符结尾，它也会完成该行并开始另一行。注意添加了一个额外的空格来分隔单词。

    - 最后，每行都被格式化为标题（每个单词的首字母大写），所有行通过换行符连接。


    ## 更多内容...


    可以在字符串上执行的其他一些有用操作如下：


    - 字符串可以像任何其他列表一样进行切片。这意味着 `"word"[0:2]` 将返回 `"wo"`。

    - 使用 `.splitlines()` 用换行符分隔行。

    - 有 `.upper()` 和 `.lower()` 方法，它们返回一个副本，其中所有字符都设置为大写或小写。它们的使用与 `.title()` 非常相似：


    ```python

    >>> ''UPPERCASE''.lower()

    ''uppercase''

    ```


    - 对于简单的替换（例如，将所有 *A 替换为 B* 或 *将 mine \ 替换为 ours*），使用 `.replace()`。此方法对于非常简单的情况很有用，但替换可能很容易变得棘手。注意替换的顺序以避免冲突和大小写敏感性问题。注意以下示例中的错误替换：


    ```python

    >>> ''One ring to rule them all, one ring to find them, One ring to bring them
    all and in the darkness bind them.''.replace(''ring'', ''necklace'')

    ''One necklace to rule them all, one necklace to find them, One necklace to bnecklace
    them all and in the darkness bind them.''

    ```


    这类似于我们在正则表达式匹配代码中意外部分时会遇到的问题。稍后会有更多示例。有关更多信息，请参阅正则表达式食谱。


    > 要换行文本，可以使用标准库中包含的 `textwrap` 模块，而不是手动计算字符。在此处查看文档：https://docs.python.org/3/library/textwrap.html。


    如果你处理多种语言或任何非英语输入，学习 Unicode 和编码的基础知识非常有用。简而言之，鉴于世界上所有不同语言中存在大量字符，包括与拉丁字母无关的字母，例如中文或阿拉伯文，有一个标准试图涵盖所有这些字符，以便计算机能够正确理解它们。Python
    3 大大改善了这种情况，使字符串的内部对象能够处理所有这些字符。Python 使用的默认编码，也是最常见和兼容的编码，目前是 UTF-8。'
