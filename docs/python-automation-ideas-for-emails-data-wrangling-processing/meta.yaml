- md: "## Why Not Automate Your Marketing Campaign?\n\n### How it works...\n\nSteps\
    \ 1 and 2 show how the data is structured. Step 3 calls `parse_sales_log.py` to\
    \ read all the log files and parse them, and then stores them in an Excel spreadsheet.\
    \ The contents of the spreadsheet are displayed in step 4.\n\nLet's see how `parse_sales_log.py`\
    \ is structured:\n\n```python\n# IMPORTS\nfrom sale_log import SaleLog\n\ndef\
    \ get_logs_from_file(shop, log_filename):\n    with open(log_filename) as logfile:\n\
    \        logs = [SaleLog.parse(shop=shop, text_log=log)\n                for log\
    \ in logfile]\n    return logs\n\ndef main(log_dir, output_filename):\n    logs\
    \ = []\n    for dirpath, dirnames, filenames in os.walk(log_dir):\n        for\
    \ filename in filenames:\n            # The shop is the last directory\n     \
    \       shop = os.path.basename(dirpath)\n            fullpath = os.path.join(dirpath,\
    \ filename)\n            logs.extend(get_logs_from_file(shop, fullpath))\n\n \
    \   # Create and save the Excel sheet\n    xlsfile = openpyxl.Workbook()\n   \
    \ sheet = xlsfile['Sheet']\n    sheet.append(SaleLog.row_header())\n    for log\
    \ in logs:\n        sheet.append(log.row())\n    xlsfile.save(output_filename)\n\
    \nif __name__ == '__main__':\n    # PARSE COMMAND LINE ARGUMENTS AND CALL main()\n\
    ```\n\nThe command-line arguments are explained in Chapter 1, Let's Begin Our\
    \ Automation Journey. Note that the imports include `SaleLog`.\n\nThe main function\
    \ walks through the whole directory and grabs all the files through `os.walk`.\
    \ You can find out more about `os.walk` in Chapter 2, Automating Tasks Made Easy.\
    \ Each file is then passed to `get_logs_from_file` to parse their logs and add\
    \ them to the global `logs` list.\n\nNote that the specific shop is stored in\
    \ the last subdirectory, so it is extracted with `os.path.basename`.\n\nOnce the\
    \ list of logs has been completed, a new Excel sheet is created using the `openpyxl`\
    \ module. The `SaleLog` module has a `.row_header` method to add the first row,\
    \ and then all the logs are converted into row format using `.row`. Finally, the\
    \ file is saved.\n\nTo parse the logs, we make a module called `sale_log.py`,\
    \ which abstracts parsing and dealing with rows. Most of it is straightforward\
    \ and structures each of the different parameters properly, but the `parse` method\
    \ requires a bit of attention:\n\n```python\n@classmethod\ndef parse(cls, shop,\
    \ text_log):\n    '''\n    Parse from a text log with the format\n    ...\n  \
    \  to a SaleLog object\n    '''\n    def price(string):\n        return Decimal(string)\n\
    \n    def isodate(string):\n        return delorean.parse(string)\n\n    FORMAT\
    \ = ('[{timestamp:isodate}] - SALE - PRODUCT: '\n              '{product:d} '\n\
    \              '- PRICE: ${price:price} - NAME: {name:D} '\n              '- DISCOUNT:\
    \ {discount:d}%')\n\n    formats = {'price': price, 'isodate': isodate}\n    result\
    \ = parse.parse(FORMAT, text_log, formats)\n\n    return cls(timestamp=result['timestamp'],\n\
    \               product_id=result['product'],\n               price=result['price'],\n\
    \               name=result['name'],\n               discount=result['discount'],\n\
    \               shop=shop)\n```\n\n`sale_log.py` is a `classmethod`, meaning that\
    \ it can be used by calling `SaleLog.parse`. It returns a new element of the class.\n\
    \n> Classmethods are called with a first argument that stores the class, instead\
    \ of the object normally stored in self. The convention is to use cls to represent\
    \ it. Calling cls(...) at the end is equivalent to SaleFormat(...), so it calls\
    \ the __init__ method.\n\nThe method uses the parse module to retrieve the values\
    \ from the template. Note how two elements, timestamp and price, have custom parsing.\
    \ The delorean module helps us with parsing the date, and the price is better\
    \ described as a Decimal to keep the proper resolution. The custom filters are\
    \ applied in the formats argument.\n\n### There's more...\n\nThe Decimal type\
    \ is described in detail in the Python documentation here: https://docs.python.org/3/library/decimal.html.\n\
    \nThe full openpyxl can be found here: https://openpyxl.readthedocs.io/en/stable/.\
    \ Also, check Chapter 6, Fun with Spreadsheets, for more examples on how to use\
    \ the module.\n\nThe full parse documentation can be found here: https://github.com/richardj0n3s/parse.\
    \ Chapter 1, Let's Begin Our Automation Journey, also describes this module in\
    \ greater detail.\n\n### See also\n\n- The Using a third-party tool – parse recipe\
    \ in Chapter 1, Let's Begin Our Automation Journey, to learn more about the parse\
    \ module.\n- The Crawling and searching directories recipe in Chapter 4, Searching\
    \ and Reading Local Files, to learn about how to walk and find all the files in\
    \ a directory.\n- The Reading text files recipe in Chapter 4, Searching and Reading\
    \ Local Files, to learn how to open text files.\n- The Updating an Excel spreadsheet\
    \ recipe in Chapter 6, Fun with Spreadsheets, to learn how to write Excel spreadsheets\
    \ using Python.\n\n## Generating a sales report\n\nIn this chapter, we are presenting\
    \ a marketing campaign divided into several tasks:\n\n1. Detect the best moment\
    \ to launch the campaign\n2. Generate individual codes to be sent to potential\
    \ customers\n3. Send the codes directly to users over their preferred channel,\
    \ text message or email\n4. Collect the results of the campaign\n5. Generate a\
    \ sales report with an analysis of the results\n\nThis recipe shows *task 5* of\
    \ the campaign.\n\nAs the final step, all the information about each of the sales\
    \ is aggregated and displayed in a sales report.\n\nIn this recipe, we'll see\
    \ how to read from spreadsheets, create PDFs, and produce graphs to generate a\
    \ comprehensive report automatically in order to analyze the performance of our\
    \ campaign.\n\n### Getting ready\n\nIn this recipe, we'll require the following\
    \ modules in our virtual environment:\n\n```bash\n$ echo \"openpyxl==3.0.3\" >>\
    \ requirements.txt\n$ echo \"fpdf==1.7.2\" >> requirements.txt\n$ echo \"delorean==1.0.0\"\
    \ >> requirements.txt\n$ echo \"PyPDF2==1.26.0\" >> requirements.txt\n$ echo \"\
    matplotlib==3.2.1\" >> requirements.txt\n$ pip install -r requirements.txt\n```\n\
    \nWe'll need the `sale_log.py` module, which is available on GitHub at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter10/sale_log.py.\n\
    \n> The input spreadsheet was generated in the previous recipe, *Preparing sales\
    \ information*. Refer to this recipe for more information.\n\nYou can download\
    \ the script to generate the input spreadsheet, `parse_sales_log.py`, from GitHub\
    \ at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter10/parse_sales_log.py.\n\
    \nDownload the raw log files from GitHub at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter10/sales.\
    \ Please download the full `sales` directory.\n\nDownload the `generate_sales_report.py`\
    \ script from GitHub at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter10/generate_sales_report.py.\n\
    \n### How to do it...\n\n1. Call the `parse_sales_log.py` script to generate the\
    \ input file:\n\n   ```bash\n   $ python parse_sales_log.py sales -o report.xlsx\n\
    \   ```\n\n2. Check the input file and the use of `generate_sales_report.py`:\n\
    \n   ```bash\n   $ ls report.xlsx\n   report.xlsx\n   $ python generate_sales_report.py\
    \ --help\n   usage: generate_sales_report.py [-h] input_file output_file\n\n \
    \  positional arguments:\n     input_file\n     output_file\n\n   optional arguments:\n\
    \     -h, --help show this help message and exit\n   ```\n\n3. Call the `generate_sales_report.py`\
    \ script with the input file and an output file:\n\n   ```bash\n   $ python generate_sales_report.py\
    \ report.xlsx output.pdf\n   ```\n\n4. Check the `output.pdf` output file. It\
    \ will contain three pages, the first a brief summary and the second and third\
    \ with graphs showing the sales by day and by shop.\n\n### How it works\n\nStep\
    \ 1 shows how to use the script and step 2 calls it on the input file. Let's take\
    \ a look at the basic structure of the generate_sales_report.py script:\n\n```python\n\
    # IMPORTS\n\ndef generate_summary(logs):\n\ndef aggregate_by_day(logs):\ndef aggregate_by_shop(logs):\n\
    \ndef graph(...):\n\ndef create_summary_brief(...):\n\ndef main(input_file, output_file):\n\
    \    # open and read input file\n    # Generate each of the pages calling the\
    \ other calls\n    # Group all the pdfs into a single file\n    # Write the resulting\
    \ PDF\n\nif __name__ == '__main__':\n    # Compile the input and output files\
    \ from the command line\n    # call main\n```\n\nThere are two key elements—the\
    \ aggregation of the logs in different ways (by shop and by day) and the generation\
    \ of a summary in each case. The summary is generated with generate_summary, which,\
    \ from a list of logs, generates a dictionary with its aggregated information.\
    \ The aggregation of the logs is done in different styles in the aggregate_by\
    \ functions.\n\n> generate_summary produces a dictionary with the aggregated information,\
    \ including start and end time, total income of all logs, total units, average\
    \ discount, and a breakdown of the same data by product.\n\nThe script is better\
    \ understood by starting at the end. The main functions join all the different\
    \ operations. Read each of the logs and transform them into native SaleLog objects."
  mdcn: "## 为何不将你的营销活动自动化？\n\n### 工作原理...\n\n步骤1和2展示了数据的结构。步骤3调用 `parse_sales_log.py`\
    \ 来读取所有日志文件并进行解析，然后将它们存储到一个Excel电子表格中。电子表格的内容在步骤4中显示。\n\n让我们看看 `parse_sales_log.py`\
    \ 的结构：\n\n```python\n# IMPORTS\nfrom sale_log import SaleLog\n\ndef get_logs_from_file(shop,\
    \ log_filename):\n    with open(log_filename) as logfile:\n        logs = [SaleLog.parse(shop=shop,\
    \ text_log=log)\n                for log in logfile]\n    return logs\n\ndef main(log_dir,\
    \ output_filename):\n    logs = []\n    for dirpath, dirnames, filenames in os.walk(log_dir):\n\
    \        for filename in filenames:\n            # The shop is the last directory\n\
    \            shop = os.path.basename(dirpath)\n            fullpath = os.path.join(dirpath,\
    \ filename)\n            logs.extend(get_logs_from_file(shop, fullpath))\n\n \
    \   # Create and save the Excel sheet\n    xlsfile = openpyxl.Workbook()\n   \
    \ sheet = xlsfile['Sheet']\n    sheet.append(SaleLog.row_header())\n    for log\
    \ in logs:\n        sheet.append(log.row())\n    xlsfile.save(output_filename)\n\
    \nif __name__ == '__main__':\n    # PARSE COMMAND LINE ARGUMENTS AND CALL main()\n\
    ```\n\n命令行参数在第1章《让我们开始自动化之旅》中有解释。请注意，导入部分包含了 `SaleLog`。\n\n主函数遍历整个目录，并通过 `os.walk`\
    \ 获取所有文件。你可以在第2章《轻松实现任务自动化》中了解更多关于 `os.walk` 的信息。然后，每个文件都被传递给 `get_logs_from_file`\
    \ 来解析其日志，并将它们添加到全局 `logs` 列表中。\n\n请注意，特定的商店存储在最后一个子目录中，因此使用 `os.path.basename`\
    \ 来提取它。\n\n一旦日志列表完成，就使用 `openpyxl` 模块创建一个新的Excel工作表。`SaleLog` 模块有一个 `.row_header`\
    \ 方法来添加第一行，然后所有日志都使用 `.row` 转换为行格式。最后，保存文件。\n\n为了解析日志，我们创建了一个名为 `sale_log.py`\
    \ 的模块，它抽象了解析和处理行的过程。大部分内容都很直接，并正确地构建了每个不同的参数，但 `parse` 方法需要特别注意：\n\n```python\n\
    @classmethod\ndef parse(cls, shop, text_log):\n    '''\n    Parse from a text\
    \ log with the format\n    ...\n    to a SaleLog object\n    '''\n    def price(string):\n\
    \        return Decimal(string)\n\n    def isodate(string):\n        return delorean.parse(string)\n\
    \n    FORMAT = ('[{timestamp:isodate}] - SALE - PRODUCT: '\n              '{product:d}\
    \ '\n              '- PRICE: ${price:price} - NAME: {name:D} '\n             \
    \ '- DISCOUNT: {discount:d}%')\n\n    formats = {'price': price, 'isodate': isodate}\n\
    \    result = parse.parse(FORMAT, text_log, formats)\n\n    return cls(timestamp=result['timestamp'],\n\
    \               product_id=result['product'],\n               price=result['price'],\n\
    \               name=result['name'],\n               discount=result['discount'],\n\
    \               shop=shop)\n```\n\n`sale_log.py` 是一个 `classmethod`，这意味着可以通过调用\
    \ `SaleLog.parse` 来使用它。它返回该类的一个新元素。\n\n> 类方法被调用时，第一个参数存储的是类，而不是通常存储在self中的对象。惯例是使用\
    \ `cls` 来表示它。在末尾调用 `cls(...)` 等同于调用 `SaleFormat(...)`，因此它调用了 `__init__` 方法。\n\n\
    该方法使用 `parse` 模块从模板中检索值。请注意，有两个元素 `timestamp` 和 `price` 具有自定义解析。`delorean` 模块帮助我们解析日期，而价格最好描述为\
    \ `Decimal` 以保持适当的精度。自定义过滤器在 `formats` 参数中应用。\n\n### 还有更多...\n\n`Decimal` 类型在Python文档中有详细描述，地址为：https://docs.python.org/3/library/decimal.html。\n\
    \n完整的 `openpyxl` 文档可以在这里找到：https://openpyxl.readthedocs.io/en/stable/。另外，请查看第6章《电子表格的乐趣》，获取更多关于如何使用该模块的示例。\n\
    \n完整的 `parse` 文档可以在这里找到：https://github.com/richardj0n3s/parse。第1章《让我们开始自动化之旅》也更详细地描述了这个模块。\n\
    \n### 另请参阅\n\n-   第1章《让我们开始自动化之旅》中的“使用第三方工具 – parse”配方，以了解更多关于 `parse` 模块的信息。\n\
    -   第4章《搜索和读取本地文件》中的“爬取和搜索目录”配方，以了解如何遍历和查找目录中的所有文件。\n-   第4章《搜索和读取本地文件》中的“读取文本文件”配方，以了解如何打开文本文件。\n\
    -   第6章《电子表格的乐趣》中的“更新Excel电子表格”配方，以了解如何使用Python写入Excel电子表格。\n\n## 生成销售报告\n\n在本章中，我们介绍一个分为几个任务的营销活动：\n\
    \n1.  检测启动活动的最佳时机\n2.  生成要发送给潜在客户的个人代码\n3.  通过用户偏好的渠道（短信或电子邮件）直接将代码发送给用户\n4. \
