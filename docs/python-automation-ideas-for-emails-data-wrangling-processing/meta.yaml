    # # 4 Searching and Reading Local Files


    In this chapter, we will introduce the basic operations to read information from
    files, starting with searching and opening files stored in different directories
    and subdirectories. Then, we''ll describe some of the most common file types and
    how to read them, including formats such as raw text files, PDFs, and Word documents.


    The last recipe will search for a word inside different kinds of files, recursively
    in a directory tree.


    In this chapter, we''ll cover the following recipes:


    +   - Crawling and searching directories

    - Reading text files

    - Dealing with encodings

    - Reading CSV files

    - Reading log files

    - Reading file metadata

    - Reading images

    - Reading PDF files

    - Reading Word documents

    - Scanning documents for a keyword


    We will start by accessing all the files in a directory tree.'
  - "[PAGE 113]\n\nSearching and Reading Local Files\n\n# Crawling and searching directories\n\
    \nIn this recipe, we'll learn how to scan a directory recursively to get all the\
    \ files contained there. That will include all the files in subdirectories. The\
    \ matched files can be of a particular kind, like text files, or every single\
    \ one of them.\n\nThis is normally a starting operation when dealing with files,\
    \ to detect all the existing ones.\n\n# Getting ready\n\nLet's start by creating\
    \ a test directory with some file information:\n\n```\n$ mkdir dir\n$ touch dir/file1.txt\n\
    $ touch dir/file2.txt\n$ mkdir dir/subdir\n$ touch dir/subdir/file3.txt\n$ touch\
    \ dir/subdir/file4.txt\n$ touch dir/subdir/file5.pdf\n$ touch dir/file6.pdf\n\
    ```\n\nAll the files will be empty; we will use them in this recipe only to discover\
    \ them. Notice there are four files that have a `.txt` extension, and two that\
    \ have a `.pdf` extension.\n\n> The files are also available in the GitHub repository\
    \ here:\nhttps://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter04/documents/dir.\n\
    \nEnter the created `dir` directory\n\n```\n$ cd dir\n```\n\n# How to do it...\n\
    \n+   1. Print all the filenames in the `dir` directory and subdirectories:\n\
    \    python\n    >>> import os\n    >>> for root, dirs, files in os.walk('.'):\n\
    \    ...     for file in files:"
  - "[PAGE 114]\n\n```\n...\n    print(file)\n...\nfile1.txt\nfile2.txt\nfile6.pdf\n\
    file3.txt\nfile4.txt\nfile5.pdf\n```\n\n2. Print the full path of the files, joining\
    \ with the root:\n\n```\n>>> for root, dirs, files in os.walk('.'):\n...     for\
    \ file in files:\n...         full_file_path = os.path.join(root, file)\n... \
    \        print(full_file_path)\n...\n./dir/file1.txt\n./dir/file2.txt\n./dir/file6.pdf\n\
    ./dir/subdir/file3.txt\n./dir/subdir/file4.txt\n./dir/subdir/file5.pdf\n```\n\n\
    3. Print only the .pdf files:\n\n```\n>>> for root, dirs, files in os.walk('.'):\n\
    ...     for file in files:\n...         if file.endswith('.pdf'):\n...       \
    \      full_file_path = os.path.join(root, file)\n...             print(full_file_path)\n\
    ...\n./dir/file6.pdf\n./dir/subdir/file5.pdf\n```\n\n4. Print only files that\
    \ contain an even number:\n\n```\n>>> import re\n>>> for root, dirs, files in\
    \ os.walk('.'):\n...     for file in files:\n...         if re.search(r'[13579]',\
    \ file):\n```"
  - "[PAGE 115]\n\nSearching and Reading Local Files\n\n```\n...\n    full_file_path\
    \ = os.path.join(root, file)\n...\n    print(full_file_path)\n...\n./dir/file1.txt\n\
    ./dir/subdir/file3.txt\n./dir/subdir/file5.pdf\n```\n\n# How it works...\n\nos.walk()\
    \ goes through a whole directory and all subdirectories under it, returning all\
    \ the files. For each directory, it returns a tuple with the directory, any subdirectories\
    \ under it, and all the files:\n\n```\n>>> for root, dirs, files in os.walk('.'):\n\
    ...     print(root, dirs, files)\n...\n. ['dir'] []\n./dir ['subdir'] ['file1.txt',\
    \ 'file2.txt', 'file6.pdf']\n./dir/subdir [] ['file3.txt', 'file4.txt', 'file5.pdf']\n\
    ```\n\nThe os.path.join() function allows us to join two paths, such as the base\
    \ path and the file.\n\nAs paths are returned as pure strings, any kind of filtering\
    \ can be done, as in step 3. In step 4, the full power of regular expressions\
    \ can be used to filter.\n\nIn the next recipe, we'll deal with the content of\
    \ the files, and not just the filename.\n\n# There's more...\n\nIn this recipe,\
    \ the returned files are not opened or modified in any way. This operation is\
    \ read-only. Files can be opened as described in the following recipes.\n\n> Be\
    \ aware that changing the structure of the directory while walking over it may\
    \ affect the results. If you need to carry out some file maintenance while walking\
    \ through the tree, like copying or moving a file, it's a good idea to store it\
    \ in a different directory."
- md: "## os.path 模块\n\n`os.path` 模块还有其他有趣的函数。我们讨论了 `.join()`，但其他包含的实用工具包括：\n\n- `os.path.abspath()`，返回文件的绝对路径。\n\
    - `os.path.split()`，在目录和文件之间分割路径：\n  ```python\n  >>> os.path.split('/a/very/long/path/file.txt')\n\
    \  ('/a/very/long/path', 'file.txt')\n  ```\n- `os.path.exists()`，返回文件在文件系统上是否存在。\n\
    \n关于 `os.path` 的完整文档可以在这里找到：https://docs.python.org/3/library/os.path.html。另一个模块\
    \ `pathlib` 可以用于更高级的、面向对象的访问：https://docs.python.org/3/library/pathlib.html。\n\
    \n如 *步骤 4* 所示，可以使用多种过滤方式。*第 1 章，让我们开始自动化之旅* 中展示的所有字符串操作和技巧都可用。\n\n## 另请参阅\n\n\
    - *第 1 章，让我们开始自动化之旅* 中的 *介绍正则表达式* 配方，学习如何使用正则表达式进行过滤。\n- 本章后面的 *读取文本文件* 配方，用于打开找到的文件并读取其内容。\n\
    \n## 读取文本文件\n\n在搜索特定文件后，下一个典型操作是打开它并读取其内容。文本文件非常简单但功能强大。它们以纯文本形式存储数据，没有复杂的二进制格式。\n\
    \nPython 原生提供文本文件支持，很容易将其视为可以用 Python 字符串表示的行的集合。\n\n## 准备工作\n\n我们将读取 `zen_of_python.txt`\
    \ 文件，其中包含 Tim Peters 的 *Python 之禅*，这是一系列非常恰当地描述了 Python 设计原则的格言。\n\n它在 GitHub\
    \ 仓库中可用：https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter04/documents/zen_of_python.txt：\n\
    \nBeautiful is better than ugly.\nExplicit is better than implicit.\nSimple is\
    \ better than complex.\nComplex is better than complicated.\nFlat is better than\
    \ nested.\nSparse is better than dense.\nReadability counts.\nSpecial cases aren't\
    \ special enough to break the rules.\nAlthough practicality beats purity.\nErrors\
    \ should never pass silently.\nUnless explicitly silenced.\nIn the face of ambiguity,\
    \ refuse the temptation to guess.\nThere should be one-- and preferably only one\
    \ --obvious way to do it.\nAlthough that way may not be obvious at first unless\
    \ you're Dutch.\nNow is better than never.\nAlthough never is often better than\
    \ *right* now.\nIf the implementation is hard to explain, it's a bad idea.\nIf\
    \ the implementation is easy to explain, it may be a good idea.\nNamespaces are\
    \ one honking great idea -- let's do more of those!\n\nPython 之禅在 PEP-20 中有描述：https://www.python.org/dev/peps/pep-0020/。\n\
    \n> 在任何 Python 解释器中输入 `import this` 都会显示 Python 之禅。\n\n## 如何做...\n\n1. 打开并逐行打印整个文件（结果未显示）：\n\
    \   ```python\n   >>> with open('zen_of_python.txt') as file:\n   ...     for\
    \ line in file:\n   ...         print(line)\n   ...\n   [RESULT NOT DISPLAYED]\n\
    \   ```\n\n2. 打开文件并打印任何包含字符串 `should` 的行：\n   ```python\n   >>> with open('zen_of_python.txt',\
    \ 'r') as file:\n   ...     for line in file:\n   ...         if 'should' in line.lower():\n\
    \   ...             print(line)\n   ...\n   Errors should never pass silently.\n\
    \n   There should be one-- and preferably only one --obvious way to do it.\n \
    \  ```\n\n3. 打开文件并打印包含单词 `better` 的第一行：\n   ```python\n   >>> with open('zen_of_python.txt',\
    \ 'rt') as file:\n   ...     for line in file:\n   ...         if 'better' in\
    \ line.lower():\n   ...             print(line)\n   ...             break\n  \
    \ ...\n   Beautiful is better than ugly.\n   ```\n\n## 工作原理...\n\n要打开文件，请使用 `open()`\
    \ 函数。这返回一个 `file` 对象，然后可以对其进行迭代以逐行返回，如 *如何做...* 部分的 *步骤 1* 所示。注意它以文本模式打开文件。\n\n\
    `with` 上下文管理器是处理文件的一种非常方便的方式。它会在使用完毕（离开代码块）后关闭文件。即使引发异常，它也会这样做。\n\n*步骤 2* 展示了如何根据对我们任务适用的行来迭代和过滤这些行。这些行作为字符串返回，可以按照\
    \ *第 1 章，让我们开始自动化之旅* 和 *第 3 章，构建你的第一个网页抓取应用* 中的配方所述的多种方式进行过滤。\n\n如 *步骤 3* 所示，可能不需要读取整个文件。因为逐行迭代文件时会边读边处理，所以你可以随时停止，避免读取文件的其余部分。对于像我们示例这样的小文件，这不太相关，但对于长文件，这可以减少内存使用和时间。\n\
    \n## 更多内容...\n\n`with` 上下文管理器是处理文件的首选方式，但不是唯一的方式。你也可以像这样手动打开和关闭它们：\n\n```python\n\
    >>> file = open('zen_of_python.txt')\n>>> content = file.read()\n>>> file.close()\n\
    ```\n\n注意 `.close()` 方法，以确保文件关闭并释放与打开文件相关的资源。`.read()` 方法一次性读取整个文件，而不是逐行读取。\n\n\
    > `.read()` 方法还接受一个以字节为单位的 `size` 参数，该参数限制读取的数据大小。例如，`file.read(1024)` 将返回最多 1KB\
    \ 的信息。下一次调用 `.read()` 将从该点继续。\n\n文件以特定模式打开。模式定义了读/写的组合，以及是将数据视为文本还是二进制数据。默认情况下，文件以只读和文本模式打开，分别描述为\
    \ \"r\"（步骤 2）或 \"rt\"（步骤 3）。\n\n更多模式将在其他配方中探讨。\n\n## 另请参阅\n\n- 本章前面的 *爬取和搜索目录*\
    \ 配方，用于查找稍后将被读取的文件。\n- 本章后面的 *处理编码* 配方，学习如何处理以非标准方式编码的文件。\n\n## 处理编码\n\n文本文件可以以不同的编码存在。近年来，情况已大大改善，因为有几种编码相当标准，但在处理不同系统时仍然存在兼容性问题。\n\
    \n> 文件中的原始数据和 Python 中的字符串对象之间存在差异。字符串对象已从文件包含的任何编码转换为本机 Unicode 字符串。一旦处于此格式，它可能需要以不同的编码存储。默认情况下，Python\
    \ 使用操作系统定义的编码，在现代操作系统中是 UTF-8。这是一种高度兼容的编码，但根据你的具体要求，你可能需要以不同的编码保存文件。\n\n## 准备工作\n\
    \n我们在 GitHub 仓库中准备了两个文件，它们以两种不同的编码存储字符串 20£：一种是常用的 UTF-8，另一种是 ISO 8859-1，一种不同的常见编码。这些准备好的文件在\
    \ GitHub 的 Chapter04/documents 目录下可用，文件名为 example_iso.txt 和 example_utf8.txt：https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter04/documents。\n\
    \n我们将使用 Beautiful Soup 模块，该模块在第 3 章，构建你的第一个网页抓取应用的 *解析 HTML* 配方中已介绍过。\n\n## 如何做...\n\
    \n1. 打开 example_utf8.txt 文件并显示其内容：\n   ```python\n   >>> with open('example_utf8.txt')\
    \ as file:\n   ...     print(file.read())\n   ...\n   20£\n   ```\n\n2. 尝试打开 example_iso.txt\
    \ 文件，这将引发异常：\n   ```python\n   >>> with open('example_iso.txt') as file:\n   ...\
    \     print(file.read())\n   ...\n   Traceback (most recent call last):\n    \
    \ ...\n   UnicodeDecodeError: 'utf-8' codec can't decode byte 0xa3 in position\
    \ 2: invalid start byte\n   ```\n\n3. 使用正确的编码打开 example_iso.txt 文件：\n   ```python\n\
    \   >>> with open('example_iso.txt', encoding='iso-8859-1') as file:\n   ... \
    \    print(file.read())\n   ```"
