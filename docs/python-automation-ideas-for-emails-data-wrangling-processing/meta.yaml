  md: "In Python 3, the `venv` tool is installed as part of the standard library.\
    \ This was not the case in the previous version where you had to install the external\
    \ `virtualenv` package.\n\n# Getting ready\n\nTo create a new virtual environment,\
    \ do the following:\n\n+   1. Go to the main directory that contains the project:\n\
    \   \n   $ cd my-directory\n   \n2. Type the following command:\n   \n   $ python3\
    \ -m venv .venv\n   \n   This creates a subdirectory called `.venv` that contains\
    \ the virtual environment.\n   The directory containing the virtual environment\
    \ can be located anywhere. Keeping it on the same root keeps it handy, and adding\
    \ a dot in front of it avoids it being displayed when running `ls` or other commands.\n\
    3. Before activating the virtual environment, check the version installed in `pip`.\
    \ This is different depending on your operating system and installed packages.\
    \ It may be upgraded later. Also, check the referenced Python interpreter, which\
    \ will be the main operating system one:\n   \n   $ pip --version\n   pip 10.0.1\
    \ from /usr/local/lib/python3.7/site-packages/pip (python 3.7)\n   $ which python3\n\
    \   /usr/local/bin/python3\n   \n\n> Note that `which` may not be available in\
    \ your shell. In Windows, for example, `where` can be used.\n\nNow your virtual\
    \ environment is ready to go.\n\n# How to do it...\n\n+   1. Activate the virtual\
    \ environment if you use Linux or macOS by running:\n   \n   $ source .venv/bin/activate"
