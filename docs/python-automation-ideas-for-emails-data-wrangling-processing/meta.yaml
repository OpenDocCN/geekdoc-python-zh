    The styling can be detected individually for properties such as bold, italic,
    or underline.


    > The division in runs can be quite complicated. Due to the way editors work,
    it is not uncommon to have half-words, a word split into two runs, sometimes with
    the same properties. Do not rely on the number of runs and analyze the content.
    In particular, double-check if you''re trying to ensure if a part with a particular
    style is divided in two or more runs. A good example is the words lore and m (it
    should be a single word, lorem) in step 8.


    Be aware that because Word documents are produced by so many sources, a lot of
    properties may not be set up, leaving it to the tool to specify the specifics
    to use. For example, it is very common to keep the default font, which may mean
    that the font information on the runs is left empty.


    # There''s more...


    Further style information can be found under the font attribute, such as small_caps
    or size:


    ```

    >>> run2.font.cs_italic

    True

    >>> run2.font.size

    152400

    >>> run2.font.small_caps

    ```


    Normally, focusing on the raw text, without paying attention to the style information,
    is the correct way of parsing. But sometimes, a bold word in a paragraph will
    have special significance. It may be the header or some particularly meaningful
    text. Because it''s highlighted, it likely is what you''re looking for! Keep that
    in mind when analyzing documents.


    You can find the whole python-docx documentation here: https://python-docx.readthedocs.io/en/latest/.


    # See also


    +   - The Reading text files recipe, earlier in this chapter, to learn the basics
    of opening and reading text files.

    - The Reading PDF files recipe, earlier in this chapter, to learn how to process
    other kinds of document files.'
