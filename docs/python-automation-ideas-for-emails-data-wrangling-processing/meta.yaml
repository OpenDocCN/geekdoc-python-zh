    \ 'r') as zipfile:\n    assert zipfile.namelist() == EXPECTED_LIST\n```\n\n# There's\
    \ more...\n\nFixtures can be shared across multiple test files. You don't need\
    \ to import them. Add them instead to the `conftest.py` file. You can generate\
    \ local `conftest.py` files in the subdirectory for fixtures that are local to\
    \ that directory only.\n\n> To use a fixture, the name of the parameter in the\
    \ test needs to have the name of the fixture. Be careful not to overwrite these\
    \ names unintentionally.\n\n`pytest` provides some built-in fixtures available\
    \ for common operations. For example, the fixture `caplog` captures the logs emitted\
    \ while running tests, and `tmp_path` creates a temporary subdirectory that's\
    \ unique to each test. Go to the fixture documentation for more details.\n\nThere\
    \ are a lot of `pytest` plugins that include fixtures to deal with a lot of common\
    \ scenarios or tools; for example, connecting to databases, web frameworks, external\
    \ APIs, and so on. It's worth running a search on `pypi.org` before creating a\
    \ fixture, or checking the non-exhaustive list of `pytest` plugins at `http://plugincompat.herokuapp.com/`.\n\
    \n`pytest` also adds context for the specific data on fixtures when there's a\
    \ failing test. This helps with understanding behavior and debugging problems,\
    \ either on the fixture or in the code that's being tested:\n\n```\n$ pytest tests/test_fixtures.py\n\
    ============================= test session starts =============================\n\
    platform darwin -- Python 3.8.2, pytest-5.4.1, py-1.8.1, pluggy-0.13.1\nrootdir:\
