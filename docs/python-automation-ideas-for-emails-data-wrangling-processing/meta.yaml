- md: "Generating Fantastic Reports\n\n3. Create a context with the data to be displayed:\n\
    \n```python\n>>> context = {\n...     'date': datetime.now(),\n...     'movies':\
    \ ['Casablanca', 'The Sound of Music', 'Vertigo'],\n...     'total_minutes': 404,\n\
    ... }\n```\n\n4. Render the template and write a new file, `report.html`, with\
    \ the following result:\n\n```python\n>>> with open('report.html', 'w') as file:\n\
    ...     file.write(template.render(context))\n```\n\n5. Exit the Python interpreter\
    \ and open the `report.html` file in a browser:\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_155_0.png)\n\
    \nFigure 5.1: The rendered report.html\n\n## How it works...\n\nSteps 2 and 4\
    \ in the *How to do it...* section are very straightforward: they read the template\
    \ and render and save the resulting report.\n\nAs seen in steps 3 and 4, the main\
    \ task is to create a context dictionary with the information to be displayed.\
    \ The template then renders that information, as shown in step 5. Let's take a\
    \ look at `jinja_template.html`:\n\n```html\n<!DOCTYPE html>\n<html lang=\"en\"\
    >\n<head>\n    <title> Movies Report</title>\n</head>\n<body>\n    <h1>Movies\
    \ Report</h1>\n    <p>Date {{date}}</p>\n    <p>Movies seen in the last 30 days:\
    \ {{movies|length}}</p>\n    <ol>\n        {% for movie in movies %}\n       \
    \ <li>{{movie}}</li>\n        {% endfor %}\n    </ol>\n    <p>Total minutes: {{total_minutes}}\
    \ </p>\n</body>\n</html>\n```\n\nMost of it is replacing the context values defined\
    \ between curly brackets, such as `{{total_minutes}}`.\n\nNote the tag, `{% for\
    \ ... %}` / `{% endfor %}`, which defines a loop. That allows for a very Pythonic\
    \ way to generate multiple rows or elements in a list.\n\nFilters can be applied\
    \ to the variables to modify them. In this case, the `length` filter is applied\
    \ to the `movies` list to obtain the size using the pipe symbol, as shown in `{{movies|length}}`.\n\
    \n## There's more...\n\nOther than the `{% for %}` tag, there's also an `{% if\
    \ %}` tag, allowing it to display conditionally:\n\n```jinja\n{% if movies|length\
    \ > 5 %}\n    Wow, so many movies this month!\n{% else %}\n    Regular number\
    \ of movies\n{% endif %}\n```\n\nThere are a good number of defined filters already\
    \ (see the whole list here: http://jinja.pocoo.org/docs/2.11/templates/#list-of-builtin-filters).\
    \ It is also possible to define custom ones.\n\n> Note that you can add a lot\
    \ of processing and logic to the template using filters. While a little bit is\
    \ fine, try to limit the amount of logic in the template. Most of the calculations\
    \ for data to be displayed should be done beforehand, leaving the template to\
    \ just display values. This makes the context very straightforward and simplifies\
    \ the template, allowing for changes.\n\nWhen dealing with HTML files, it is good\
    \ to auto-escape the variables. This means that special characters could be interpreted\
    \ as part as the HTML syntax instead of verbatim text; for example, the < character\
    \ will be replaced by the equivalent HTML code to be properly displayed on an\
    \ HTML page. To do so, create the template with the `autoescape` parameter. Check\
    \ the difference here:\n\n```python\n>>> Template('{{variable}}', autoescape=False).render({'variable':\
    \ '<'})\n'<'\n>>> Template('{{variable}}', autoescape=True).render({'variable':\
    \ '<'})\n'&lt;'\n```\n\nEscaping can be applied to each variable with the `e`\
    \ filter (meaning *escape*) and unapplied with the `safe` filter (meaning it is\
    \ safe to render as it is).\n\nJinja2 templates are extensible, meaning that you\
    \ can create a `base_template.html` file and then extend it, changing some of\
    \ the elements. You can include other files as well, partitioning and separating\
    \ different sections. Refer to the full documentation for further details.\n\n\
    > Jinja2 is very powerful and allows us to create complex HTML templates, and\
    \ also in other formats such as LaTeX or JavaScript, though this requires configuring.\
    \ I encourage you to read the whole documentation and have a look at all its capabilities!\n\
    \nThe whole Jinja2 documentation can be found here: http://jinja.pocoo.org/docs/2.11/.\n\
    \n## See also\n\n- The *Creating a simple report in plain text* recipe, earlier\
    \ in this chapter, to learn the basics of creating plain text reports.\n- The\
    \ *Formatting text in Markdown* recipe, later in this chapter, to learn Markdown,\
    \ an alternative template format.\n\n# Formatting text in Markdown\n\nMarkdown\
    \ is a very popular markup language used to create plain text that can be converted\
    \ into styled HTML. It is a good way of structuring documents in a way that they\
    \ are still easy to read in plain text format, while being able to properly style\
    \ them in HTML.\n\nIn this recipe, we'll see how to transform a Markdown document\
    \ into styled HTML using Python.\n\n## Getting ready\n\nWe should start by installing\
    \ the `mistune` module, which will compile Markdown documents into HTML:\n\n```bash\n\
    $ echo \"mistune==0.8.4\" >> requirements.txt\n$ pip install -r requirements.txt\n\
    ```\n\nIn the GitHub repository, there is a template file called `markdown_template.md`\
    \ with a template of the report to generate.\n\n## How to do it...\n\n1. Import\
    \ `mistune` and `datetime`:\n\n```python\n>>> import mistune\n>>> from datetime\
    \ import datetime\n```\n\n2. Read the template from the file:\n\n```python\n>>>\
    \ with open('markdown_template.md') as file:\n...     template = file.read()\n\
    ```\n\n3. Set up the context of the data to be included in the report:\n\n```python\n\
    >>> context = {\n...     'date': datetime.now(),\n...     'pmovies': ['Casablanca',\
    \ 'The Sound of Music', 'Vertigo'],\n...     'total_minutes': 404,\n... }\n```\n\
    \n4. As movies need to be displayed as bullet points, we will transform the list\
    \ into a suitable Markdown bullet list. Also, we will store the number of movies:\n\
    \n```python\n>>> context['num_movies'] = len(context['pmovies'])\n>>> context['movies']\
    \ = '\\n'.join('* {}'.format(movie) for movie in context['pmovies'])\n```\n\n\
    5. Render the template and compile the resulting Markdown into HTML:\n\n```python\n\
    >>> md_report = template.format(**context)\n>>> report = mistune.markdown(md_report)\n\
    ```\n\n6. Finally, store the resulting report in the `report.html` file:\n\n```python\n\
    >>> with open('report.html', 'w') as file:\n...     file.write(report)\n```\n\n\
    7. Open the `report.html` file in a browser to check the result:\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_159_0.png)\n\
    \n## How it works...\n\nSteps 2 and 3 in the *How do it...* section prepare the\
    \ template and the data to be displayed. In step 4, extra information is produced—the\
    \ number of movies, which is derivative from the `movies` element. The `movies`\
    \ element is then transformed into a valid Markdown element from a Python list.\
    \ Note the new lines and the initial `*`, which will be rendered as a bullet point:\n\
    \n```python\n>>> '\\n'.join('* {}'.format(movie) for movie in context['pmovies'])\n\
    '* Casablanca\\n* The Sound of Music\\n* Vertigo'\n```\n\nIn step 5, the template\
    \ is generated in Markdown format. The format is very readable in this raw form,\
    \ which is the strong point of Markdown:\n\n```markdown\n# Movies Report\n======\n\
    \nDate: 2018-06-29 20:47:18.930655\n\nMovies seen in the last 30 days: 3\n\n*\
    \ Casablanca\n* The Sound of Music\n* Vertigo\n\nTotal minutes: 404\n```\n\nThen,\
    \ using mistune, the report is transformed into HTML and stored in a file in step\
    \ 6.\n\n## There's more...\n\nLearning Markdown is extremely useful, as it is\
    \ supported by many common web pages as a way of enabling text input that is easy\
    \ to read and write and can render to a styled format. Some examples are GitHub,\
    \ Stack Overflow, and most blogging platforms.\n\n> There is actually more than\
    \ one kind of Markdown. This is because the official definition was limited or\
    \ ambiguous, and there was little interest in clarifying or extending it. This\
    \ led to several implementations that are slightly different, such as GitHub Flavored\
    \ Markdown, MultiMarkdown, and CommonMark.\n\nThe text in Markdown is quite readable,\
    \ but in case you need to interactively see how it will look, you can use the\
    \ Dillinger online editor at https://dillinger.io/.\n\nMistune full docs are available\
    \ here: http://mistune.readthedocs.io/en/latest/.\n\nThe full Markdown syntax\
    \ can be found at https://daringfireball.net/projects/markdown/syntax, and a good\
    \ cheat sheet with the most frequently used elements can be found at https://www.markdownguide.org/cheat-sheet/."
  mdcn: "生成出色的报告\n\n3.  创建包含要显示数据的上下文：\n\n```python\n>>> context = {\n...     'date':\
    \ datetime.now(),\n...     'movies': ['Casablanca', 'The Sound of Music', 'Vertigo'],\n\
    ...     'total_minutes': 404,\n... }\n```\n\n4.  渲染模板并将结果写入新文件 `report.html`：\n\
    \n```python\n>>> with open('report.html', 'w') as file:\n...     file.write(template.render(context))\n\
    ```\n\n5.  退出 Python 解释器，并在浏览器中打开 `report.html` 文件：\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_155_0.png)\n\
    \n图 5.1：渲染后的 report.html\n\n## 工作原理...\n\n*如何操作...* 部分中的步骤 2 和 4 非常直接：它们读取模板，然后渲染并保存生成的报告。\n\
    \n如步骤 3 和 4 所示，主要任务是创建一个包含要显示信息的上下文字典。然后模板会渲染这些信息，如步骤 5 所示。让我们来看一下 `jinja_template.html`：\n\
    \n```html\n<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <title> Movies Report</title>\n\
    </head>\n<body>\n    <h1>Movies Report</h1>\n    <p>Date {{date}}</p>\n    <p>Movies\
    \ seen in the last 30 days: {{movies|length}}</p>\n    <ol>\n        {% for movie\
    \ in movies %}\n        <li>{{movie}}</li>\n        {% endfor %}\n    </ol>\n\
    \    <p>Total minutes: {{total_minutes}} </p>\n</body>\n</html>\n```\n\n其中大部分是替换花括号之间定义的上下文值，例如\
    \ `{{total_minutes}}`。\n\n注意标签 `{% for ... %}` / `{% endfor %}`，它定义了一个循环。这允许以一种非常\
    \ Pythonic 的方式生成列表中的多行或多个元素。\n\n可以对变量应用过滤器来修改它们。在这个例子中，`length` 过滤器应用于 `movies`\
    \ 列表，通过管道符号 `|` 获取其大小，如 `{{movies|length}}` 所示。\n\n## 更多内容...\n\n除了 `{% for %}`\
    \ 标签外，还有一个 `{% if %}` 标签，允许条件显示：\n\n```jinja\n{% if movies|length > 5 %}\n   \
    \ Wow, so many movies this month!\n{% else %}\n    Regular number of movies\n\
    {% endif %}\n```\n\n已经定义了许多过滤器（完整列表请参见此处：http://jinja.pocoo.org/docs/2.11/templates/#list-of-builtin-filters）。也可以定义自定义过滤器。\n\
    \n> 请注意，你可以使用过滤器在模板中添加大量处理和逻辑。虽然少量使用没问题，但请尽量限制模板中的逻辑量。大多数用于显示数据的计算都应事先完成，让模板只负责显示值。这使得上下文非常直接，并简化了模板，便于进行更改。\n\
    \n处理 HTML 文件时，最好对变量进行自动转义。这意味着特殊字符可能会被解释为 HTML 语法的一部分，而不是纯文本；例如，`<` 字符将被替换为等效的\
    \ HTML 代码，以便在 HTML 页面上正确显示。为此，请使用 `autoescape` 参数创建模板。查看此处的区别：\n\n```python\n\
    >>> Template('{{variable}}', autoescape=False).render({'variable': '<'})\n'<'\n\
    >>> Template('{{variable}}', autoescape=True).render({'variable': '<'})\n'&lt;'\n\
    ```\n\n转义可以使用 `e` 过滤器（表示 *escape*）应用于每个变量，也可以使用 `safe` 过滤器（表示可以安全地按原样渲染）来取消应用。\n\
    \nJinja2 模板是可扩展的，这意味着你可以创建一个 `base_template.html` 文件，然后扩展它，更改其中的一些元素。你也可以包含其他文件，对不同部分进行分区和分离。更多详细信息请参阅完整文档。\n\
    \n> Jinja2 非常强大，允许我们创建复杂的 HTML 模板，也可以用于其他格式，如 LaTeX 或 JavaScript，尽管这需要进行配置。我鼓励你阅读完整文档，了解其所有功能！\n\
    \n完整的 Jinja2 文档可在此处找到：http://jinja.pocoo.org/docs/2.11/.\n\n## 另请参阅\n\n-   本章前面的\
    \ *创建纯文本文本报告* 配方，了解创建纯文本文本报告的基础知识。\n-   本章后面的 *在 Markdown 中格式化文本* 配方，了解 Markdown，一种替代的模板格式。\n\
    \n# 在 Markdown 中格式化文本\n\nMarkdown 是一种非常流行的标记语言，用于创建可以转换为样式化 HTML 的纯文本。这是一种很好的结构化文档的方式，使得文档在纯文本格式下仍然易于阅读，同时又能在\
    \ HTML 中正确设置样式。\n\n在这个配方中，我们将看到如何使用 Python 将 Markdown 文档转换为样式化的 HTML。\n\n## 准备工作\n\
    \n我们应该首先安装 `mistune` 模块，它将把 Markdown 文档编译成 HTML：\n\n```bash\n$ echo \"mistune==0.8.4\"\
    \ >> requirements.txt\n$ pip install -r requirements.txt\n```\n\n在 GitHub 仓库中，有一个名为\
    \ `markdown_template.md` 的模板文件，其中包含要生成的报告模板。\n\n## 如何操作...\n\n1.  导入 `mistune`\
    \ 和 `datetime`：\n\n```python\n>>> import mistune\n>>> from datetime import datetime\n\
    ```\n\n2.  从文件中读取模板：\n\n```python\n>>> with open('markdown_template.md') as file:\n\
    ...     template = file.read()\n```\n\n3.  设置要包含在报告中的数据的上下文：\n\n```python\n>>>\
    \ context = {\n...     'date': datetime.now(),\n...     'pmovies': ['Casablanca',\
    \ 'The Sound of Music', 'Vertigo'],\n...     'total_minutes': 404,\n... }\n```\n\
    \n4.  由于电影需要以项目符号列表的形式显示，我们将把列表转换为合适的 Markdown 项目符号列表。同时，我们将存储电影的数量：\n\n```python\n\
    >>> context['num_movies'] = len(context['pmovies'])\n>>> context['movies'] = '\\\
    n'.join('* {}'.format(movie) for movie in context['pmovies'])\n```\n\n5.  渲染模板并将生成的\
    \ Markdown 编译为 HTML：\n\n```python\n>>> md_report = template.format(**context)\n\
    >>> report = mistune.markdown(md_report)\n```\n\n6.  最后，将生成的报告存储在 `report.html`\
    \ 文件中：\n\n```python\n>>> with open('report.html', 'w') as file:\n...     file.write(report)\n\
    ```\n\n7.  在浏览器中打开 `report.html` 文件以检查结果：\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_159_0.png)\n\
    \n## 工作原理...\n\n*如何操作...* 部分中的步骤 2 和 3 准备了模板和要显示的数据。在步骤 4 中，生成了额外的信息——电影数量，这是从\
    \ `movies` 元素派生出来的。然后，`movies` 元素从 Python 列表转换为有效的 Markdown 元素。注意换行符和开头的 `*`，它们将被渲染为项目符号：\n\
    \n```python\n>>> '\\n'.join('* {}'.format(movie) for movie in context['pmovies'])\n\
    '* Casablanca\\n* The Sound of Music\\n* Vertigo'\n```\n\n在步骤 5 中，生成了 Markdown\
    \ 格式的模板。这种原始形式的格式非常易读，这是 Markdown 的优点：\n\n```markdown\n# Movies Report\n======\n\
    \nDate: 2018-06-29 20:47:18.930655\n\nMovies seen in the last 30 days: 3\n\n*\
    \ Casablanca\n* The Sound of Music\n* Vertigo\n\nTotal minutes: 404\n```\n\n然后，在步骤\
    \ 6 中，使用 mistune 将报告转换为 HTML 并存储到文件中。\n\n## 更多内容...\n\n学习 Markdown 非常有用，因为它被许多常见网页支持，作为一种启用易于读写且可以渲染为样式化格式的文本输入方式。一些例子包括\
    \ GitHub、Stack Overflow 和大多数博客平台。\n\n> 实际上不止一种 Markdown。这是因为官方定义有限或模糊，并且人们对其澄清或扩展的兴趣不大。这导致了几种略有不同的实现，例如\
    \ GitHub Flavored Markdown、MultiMarkdown 和 CommonMark。\n\nMarkdown 中的文本相当易读，但如果你需要交互式地查看其外观，可以使用\
    \ Dillinger 在线编辑器：https://dillinger.io/。\n\nMistune 的完整文档可在此处找到：http://mistune.readthedocs.io/en/latest/。\n\
    \n完整的 Markdown 语法可在 https://daringfireball.net/projects/markdown/syntax 找到，一个包含最常用元素的优秀备忘单可在\
    \ https://www.markdownguide.org/cheat-sheet/ 找到。"
