  - '[PAGE 14]


    # Getting ready


    We''ll define a basic piece of text and transform it into its main components;
    then, we''ll reconstruct it. As an example, a report needs to be transformed into
    a new format to be sent via email.


    The input format we''ll use in this example will be this:


    > AFTER THE CLOSE OF THE SECOND QUARTER, OUR COMPANY, CASTAÑACORP HAS ACHIEVED
    A GROWTH IN THE REVENUE OF 7.47%. THIS IS IN LINE WITH THE OBJECTIVES FOR THE
    YEAR. THE MAIN DRIVER OF THE SALES HAS BEEN

    THE NEW PACKAGE DESIGNED UNDER THE SUPERVISION OF OUR MARKETING DEPARTMENT.

    OUR EXPENSES HAS BEEN CONTAINED, INCREASING ONLY BY 0.7%, THOUGH THE BOARD CONSIDERS
    IT NEEDS TO BE FURTHER REDUCED. THE EVALUATION IS SATISFACTORY

    AND THE FORECAST FOR THE NEXT QUARTER IS OPTIMISTIC. THE BOARD EXPECTS AN INCREASE
    IN PROFIT OF AT LEAST 2 MILLION DOLLARS.


