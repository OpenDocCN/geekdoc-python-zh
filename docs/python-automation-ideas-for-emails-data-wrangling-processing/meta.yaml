    \ datetime.now())\n    draw.multiline_text((0, 100), text, 55, font=font)\n\n\
    \    watermark = Image.new('RGB', WATERMARK_SIZE)\n    watermark.putalpha(mask)\n\
    \    watermark = watermark.resize((1950, 1950))\n    watermark = watermark.rotate(45)\n\
    \    # 裁剪至仅水印部分\n    bbox = watermark.getbbox()\n    watermark = watermark.crop(bbox)\n\
    \n    return watermark\n```\n\n```\ndef apply_watermark(watermark, in_pdf, out_pdf):\n\
    \    # 从 PDF 转换为图像\n    images = convert_from_path(in_pdf)\n    ...\n    # 在每一页上粘贴水印\n\
    \    for image in images:\n        image.paste(watermark, position, watermark)\n\
    \n    # 保存生成的 PDF\n    images[0].save(out_pdf, save_all=True, append_images=images[1:])\n\
    ```\n\n2. 使用以下命令为 PDF 文件添加水印：\n\n```\n$ python watermarking_pdf.py report.pdf\
    \ -u automate_user -o out.pdf\nCreating a watermark\nWatermarking the document\n\
    ```\n\n3. 检查文档是否在 `out.pdf` 的所有页面上添加了带有 `automate_user` 和时间戳的水印。\n\n4. 使用以下命令进行水印和加密。请注意，加密可能需要一些时间：\n\
    \n```\n$ python watermarking_pdf.py report.pdf -u automate_user -o out.pdf -p\
    \ secretpassword\nCreating a watermark\nWatermarking the document\nEncrypting\
    \ the document\n```\n\n5. 打开生成的 `out.pdf` 文件，检查是否需要输入 `secretpassword` 密码。时间戳也将是新的。\n\
    \n## 工作原理...\n\n`watermarking_pdf.py` 脚本首先使用 `argparse` 从命令行获取参数，然后将其传递给一个主函数，该函数调用其他三个函数：`create_watermark`、`apply_watermark`，以及如果使用了密码，则调用\
    \ `encrypt`。\n\n`create_watermark` 生成带有水印的图像。它使用 Pillow 的 `Image` 类创建一个灰度图像（模式\
    \ L）并绘制文本。然后，此图像作为 alpha 通道应用于新图像，使图像半透明，从而显示要水印的文本。\n\n> Alpha 通道使白色（颜色 0）完全透明，黑色（颜色\
    \ 255）完全不透明。在这种情况下，背景是白色（完全透明），文本颜色为 55，使其半透明。\n\n然后将图像旋转 45 度并裁剪，以减少可能出现的透明背景。这使图像居中并允许更好的定位。\n\
    \n在下一步中，`apply_watermark` 使用 `pdf2image` 模块将 PDF 转换为一系列 PIL 图像。它计算应用水印的位置，然后粘贴水印。\n\
    \n> 图像需要通过其左上角定位。这位于文档的一半减去水印的一半处，高度和宽度均如此。请注意，脚本假设文档的所有页面大小相同。\n\n最后，将结果保存为 PDF。注意\
    \ `save_all` 参数，它允许我们保存多页 PDF。\n\n如果传递了密码，则调用 `encrypt` 函数。它使用 `PdfFileReader`\
    \ 打开输出 PDF，并使用 `PdfFileWriter` 创建一个新的中间 PDF。输出 PDF 的所有页面都添加到新 PDF 中，PDF 被加密，然后使用\
    \ `os.rename` 将中间 PDF 重命名为输出 PDF。\n\n## 更多内容...\n\n作为水印过程的一部分，请注意页面从文本转换为图像。这增加了额外的保护，因为文本无法直接作为文本提取。在保护文件时，这是一个好主意，因为它将阻止直接复制/粘贴。\n\
    \n> 然而，这不是一个巨大的安全措施，因为文本可能通过 OCR 工具提取。但它可以防止随意提取文本。输出文件大小也大得多，约 30 MB。这也使得加密和解密速度变慢。\n\
    \nPIL 的默认字体可能有点粗糙。如果 TrueType 或 OpenType 文件可用，可以通过调用以下命令添加和使用另一种字体：\n\n```\nfont\
    \ = ImageFont.truetype('my_font.ttf', SIZE)\n```\n\n请注意，这可能需要安装 FreeType 库，通常作为\
    \ `libfreetype` 包的一部分提供。更多文档可在 https://www.freetype.org/ 获取。根据字体和大小，您可能需要调整尺寸。\n\
    \n`pdf2image` 的完整文档可在 https://github.com/Belval/pdf2image 找到，PyPDF2 的完整文档在 https://pythonhosted.org/PyPDF2/，Pillow\
    \ 的完整文档在 https://pillow.readthedocs.io/en/5.2.x/。\n\n## 另请参阅\n\n- 本章前面的 *编写简单\
    \ PDF 文档* 配方，了解如何向 PDF 文档添加分隔符。\n- 本章前面的 *构建 PDF 结构* 配方，了解如何向 PDF 文档添加分隔符。\n-\
    \ 本章前面的 *聚合 PDF 报告* 配方，了解如何将多个文档合并为一个。"
