  - "[PAGE 263]\n\nCleaning and Processing Data\n\nThe resulting CSV file is equivalent\
    \ to the one presented in the *Aggregating results* recipe, except for minimal\
    \ format differences.\n\n# There's more...\n\nThe pattern shown in `calculate_results`\
    \ when applying changes and overwriting the results is very common in Pandas:\n\
    \n```\nresult = by_usd.agg(['sum', 'count', 'mean'])\nresult = result.round(2)\n\
    result = result.rename(...)\n```\n\nThis process can also be concatenated easily\
    \ into the following:\n\n```\nresult = by_usd.agg(['sum', 'count', 'mean']).round(2).rename(...)\n\
    ```\n\nThis way of working means that for each operation, a copy of the data is\
    \ generated. For very big collections of data, this may not be efficient. You\
    \ can perform most operations without making a copy by using the `inplace` argument.\
    \ This will mutate them without using extra memory space or copying data around.\n\
    \nConsider the following, for example:\n\n```\nresult.rename(columns={\n    'sum':\
    \ 'TOTAL USD',\n    'count': 'NUMBER',\n    'mean': 'AVERAGE',\n}, inplace=True)\n\
    ```\n\nThe preceding code will replace the columns without making a copy. It will\
    \ return `None` instead. This doesn't allow us to use chained operations and it's\
    \ generally considered bad practice. Use this only when having problems with memory."
  - '[PAGE 264]


    Pandas is a big, complex package that has a lot of usages, from statistical analysis
    to plotting to complex mathematical applications. It is widely used in the data
    science community. Pandas uses the approach of describing the desired result,
    instead of the operations to perform.


    > This approach is known as *declarative*, as opposed to imperative. *Declarative*
    languages aim at describing the result, the *WHAT*, while imperative languages
    describe the *HOW*. The most common example of a declarative language is the SQL
    language, used to interact with databases. Python is mainly an imperative language,
    but as we see in Pandas, the declarative approach can be used as well.


    Pandas is very commonly used with Jupyter Notebook. This application allows users
    to create rich Python sessions that mix code execution, documentation, and graphs
    for a rich environment in the form of notebooks that can be accessed via a web
    browser. It''s capable of automatically presenting data from modules such as Pandas
    or Matplotlib.


    The aim of this project is to allow the exploration of data, instead of following
    a more repetitive process as when using an automated tool, but it''s a fantastic
    tool to know how to use.


    The notebook can be tested online at `https://jupyter.org/try`. Go to the main
    web page at `https://jupyter.org/` to check how to install it locally and read
    the whole documentation.'
