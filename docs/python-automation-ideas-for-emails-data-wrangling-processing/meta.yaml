    \ 3.99 | CANADA | CAD | 3 | 2018-08-27 23:05:55+00:00 |\n| 7 | ON | 2018-08-28\
    \ 00:05:55+00:00 | 12346 | 3.99 | CANADA | CAD | 3 | 2018-08-28 00:05:55+00:00\
    \ |\n| 8 | ON | 2018-08-28 01:05:55+00:00 | 12346 | 3.99 | CANADA | CAD | 3 |\
    \ 2018-08-28 01:05:55+00:00 |\n| 9 | ON | 2018-08-28 02:05:55+00:00 | 12346 |\
    \ 3.99 | CANADA | CAD | 3 | 2018-08-28 02:05:55+00:00 |\n| 10 | ON | 2018-08-28\
    \ 03:05:55+00:00 | 12346 | 3.99 | CANADA | CAD | 3 | 2018-08-28 03:05:55+00:00\
    \ |\n| 11 | ON | 2018-08-28 04:05:55+00:00 | 12346 | 3.99 | CANADA | CAD | 3 |\
    \ 2018-08-28 04:05:55+00:00 |\n| 12 | ON | 2018-08-28 05:05:55+00:00 | 12345 |\
    \ 10.5 | CANADA | CAD | 8 | 2018-08-28 05:05:55+00:00 |\n| 13 | ON | 2018-08-28\
    \ 06:05:55+00:00 | 12346 | 3.99 | CANADA | CAD | 3 | 2018-08-28 06:05:55+00:00\
    \ |\n| 14 | ON | 2018-08-28 07:05:55+00:00 | 12346 | 3.99 | CANADA | CAD | 3 |\
    \ 2018-08-28 07:05:55+00:00 |\n| 15 | ON | 2018-08-28 08:05:55+00:00 | 12345 |\
    \ 13.5 | CANADA | CAD | 10 | 2018-08-28 08:05:55+00:00 |\n| 16 | ON | 2018-08-28\
    \ 09:05:55+00:00 | 12346 | 3.99 | CANADA | CAD | 3 | 2018-08-28 09:05:55+00:00\
    \ |\n| 17 | ON | 2018-08-28 10:05:55+00:00 | 12345 | 10.5 | CANADA | CAD | 8 |\
    \ 2018-08-28 10:05:55+00:00 |\n| 18 | ON | 2018-08-28 11:05:55+00:00 | 12346 |\
    \ 3.99 | CANADA | CAD | 3 | 2018-08-28 11:05:55+00:00 |\n| 19 | ON | 2018-08-28\
    \ 12:05:55+00:00 | 12346 | 3.99 | CANADA | CAD | 3 | 2018-08-28 12:05:55+00:00\
    \ |\n| 20 | ON | 2018-08-28 13:05:55+00:00 | 12346 | 3.99 | CANADA | CAD | 3 |\
    \ 2018-08-28 13:05:55+00:00 |\n| 21 | ON | 2018-08-28 14:05:55+00:00 | 12346 |\
    \ 3.99 | CANADA | CAD | 3 | 2018-08-28 14:05:55+00:00 |\n| 22 | ON | 2018-08-28\
    \ 15:05:55+00:00 | 12346 | 3.99 | CANADA | CAD | 3 | 2018-08-28 15:05:55+00:00\
    \ |\n\nFigure 7.3: Screenshots of consistent standardized timestamps\n\nNotice\
    \ how the times in the **STD_TIMESTAMP** column are formatted in the same way,\
    \ while those in the **TIMESTAMP** column are not.\n\n## How it works...\n\nLet's\
    \ take a look at the `standard_date.py` script, used in *step 3*.\n\nThe end of\
    \ the script file deals with the parsing of arguments, which was described in\
    \ detail in *Chapter 2, Automating Tasks Made Easy*.\n\nThe main function reads\
    \ the input CSV and calls the `add_std_timestamp` function for each of the rows.\
    \ It then writes the results in the output file:\n\n```\ndef main(input_file,\
    \ output_file):\n    reader = csv.DictReader(input_file)\n    result = [add_price_by_location(row)\
    \ for row in reader]\n\n    # Save into csv format\n    header = result[0].keys()\n\
    \    writer = csv.DictWriter(output_file, fieldnames=header)\n    writer.writeheader()\n\
    \    writer.writerows(result)\n```\n\nIt uses the CSV `DictReader` class to transform\
    \ each of the rows into a dictionary, which is then passed for processing. The\
    \ output CSV file stores the resulting rows using `DictWriter`. The output file\
    \ field headers are obtained from the keys in the dictionary of the first output\
    \ row.\n\nThe usage of `DictReader` and `DictWriter` was already described in\
    \ *Chapter 6, Fun with Spreadsheets*.\n\nEach of the rows is modified in the `add_std_timestamp`\
    \ function, depending on the country the log was written in. Let's take a look:\n\
    \n```\ndef add_std_timestamp(row):\n    country = row['COUNTRY']\n    if country\
    \ == 'USA':\n        # No change\n        row['STD_TIMESTAMP'] = american_format(row['TIMESTAMP'])\n\
    \    elif country == 'CANADA':\n        # No change\n        row['STD_TIMESTAMP']\
    \ = row['TIMESTAMP']\n    else:\n        raise Exception('Country not found')\n\
    \n    return row\n```\n\nBased on the country of origin, this function transforms\
    \ the date and creates a new standardized timestamp.\n\n> Note that the country\
    \ has been inserted into the data in the previous recipe, having been derived\
    \ from the location codes. Storing the country explicitly in the previous stage\
    \ of processing allows us to simplify the script for the date, as the data has\
    \ been already calculated. This may look straightforward in this example, but\
    \ duplicating operations in different stages while processing data is quite common\
    \ as the focus while developing is generally only on a small part of the code,\
    \ and not the code as a whole.\n\nThe function adds a new key to the dictionary\
    \ with a standard timestamp in ISO 8601 format. The logs produced in Canada already\
    \ have this format, but the ones generated in the United States need to be translated.\
    \ The translation is done in the `american_format` function:\n\n```\ndef american_format(timestamp):\n\
    \    ...\n    '''\n    Transform from MM-DD-YYYY HH:MM:SS to iso 8601\n    '''\n\
    \    FORMAT = '%m-%d-%Y %H:%M:%S'\n\n    parsed_tmp = datetime.strptime(timestamp,\
    \ FORMAT)\n    time_with_tz = parsed_tmp.astimezone(timezone.utc)\n    isotimestamp\
    \ = time_with_tz.isoformat()\n\n    return isotimestamp\n```\n\nThe timestamp\
    \ is parsed using the standard Python library with `datetime.strptime` with the\
    \ format \"%m-%d-%Y %H:%M:%S\", which corresponds to MM-DD-YYYY HH:MM:SS. The\
    \ resulting `datetime` object is then added to the UTC time zone, transformed\
    \ into an ISO 8601 valid string, and then returned.\n\n> Remember that since Python\
    \ 3.7, the dictionaries keep the insertion order.\n\nThe resulting file allows\
    \ us to compare times in the same format.\n\n## There's more...\n\nIn some cases,\
    \ the detection of the timestamp format may not be dependent on other parameters\
    \ such as the country and will require you to try several formats to see which\
    \ one fits. When working with many sources, this can actually become a problem,\
    \ as a single row may not contain enough information. For example, a date 05-06-2019\
    \ could be June 5th in international format, or May 6th in US format. An analysis\
    \ of the whole file may be required or even taking a guess and validating it afterward.\n\
    \nThe time in all the log files for the recipe is stored in UTC time, but that's\
    \ not necessarily true in every case. It can be stored in different time zones.\n\
    \nIn our example, the time zones in Ohio and Ontario are the same, but the time\
    \ zones may be different depending on the location. Depending on the logs, this\
    \ may require an adjustment.\n\n> The ISO 8601 format may include the time zone.\
    \ For example, the ending in +00:00 shows the time zone is UTC. Don't assume that\
    \ the time format will always include time zone information. If it's not present,\
    \ it may lead to inconsistent times in your data. Always include the time zone,\
    \ or use the times in UTC when combining different sources to avoid confusion.\n\
    \nIf different time zones are used, the `delorean` module, introduced in *Chapter\
    \ 1, Let's Begin Our Automation Journey*, helps define the times and match equivalent\
    \ times in an easy way:\n\n```\n>>> import delorean\n>>> timestamp = delorean.parse('2018-08-28\
    \ 20:05:55+00:00')\n>>> timestamp_EST = timestamp.shift('US/Eastern')\n>>> timestamp_EST.datetime.isoformat()\n\
    '2018-08-28T16:05:55-04:00'\n```\n\nThe full Delorean documentation can be found\
    \ online at https://delorean.readthedocs.io/.\n\nNotice how the old timestamps\
    \ are still present in the CSV file, instead of being overwritten by the new timestamp\
    \ column. Unless there's a clear need to save space, it's best to keep it for\
    \ reference and to detect possible problems later. It also allows us to know easily\
    \ when this stage has been applied to the given CSV file.\n\n## See also\n\n-\
    \ The *Appending currency based on location* recipe in the previous section.\n\
    - The *Reading CSV files* recipe in *Chapter 4, Searching and Reading Local Files*.\n\
    - The *Preparing a task* recipe in *Chapter 2, Automating Tasks Made Easy*.\n\n\
    ## Aggregating results\n\nOnce the data is cleaned, we can process the results.\
    \ For our example, we will calculate the average sale price by both location and\
    \ day, as well as the total sales by both location and day in the data range.\
    \ As our data is stored by location, this will be done in two steps. First, we'll\
    \ create the files per location, and then by date, using the date on the location\
    \ results."
