    \        main(args.n1, args.n2)\n    ```\n    运行 `prepare_task_step1.py` 来计算两个数的乘积：\n\
    \    ```bash\n    $ python3 prepare_task_step1.py -n1 3 -n2 7\n    The result\
    \ is 21\n    ```\n\n2. 更新文件，定义一个包含两个参数的配置文件，并将其保存为 `prepare_task_step3.py`。请注意，定义配置文件会覆盖任何命令行参数：\n\
    \    ```python\n    import argparse\n    import configparser\n\n    def main(number,\
    \ other_number):\n        result = number * other_number\n        print(f'The\
    \ result is {result}')\n\n    if __name__ == '__main__':\n        parser = argparse.ArgumentParser()\n\
    \        parser.add_argument('-n1', type=int, help='A number', default=1)\n  \
    \      parser.add_argument('-n2', type=int, help='Another number', default=1)\n\
    \n        parser.add_argument('--config', '-c', type=argparse.FileType('r'),\n\
    \                            help='config file')\n\n        args = parser.parse_args()\n\
    \        if args.config:\n            config = configparser.ConfigParser()\n \
    \           config.read_file(args.config)\n            # Transforming values into\
    \ integers\n            args.n1 = int(config['ARGUMENTS']['n1'])\n           \
    \ args.n2 = int(config['ARGUMENTS']['n2'])\n\n        main(args.n1, args.n2)\n\
    \    ```\n\n3. 创建配置文件 `config.ini`。查看 `ARGUMENTS` 部分以及 `n1` 和 `n2` 的值：\n    ```ini\n\
    \    [ARGUMENTS]\n    n1=5\n    n2=7\n    ```\n\n4. 使用配置文件运行命令。请注意，如步骤2所述，配置文件会覆盖命令行参数：\n\
    \    ```bash\n    $ python3 prepare_task_step3.py -c config.ini\n    The result\
    \ is 35\n    $ python3 prepare_task_step3.py -c config.ini -n1 2 -n2 3\n    The\
    \ result is 35\n    ```\n\n5. 添加一个参数以将结果存储到文件中，并将其保存为 `prepare_task_step6.py`：\n\
    \    ```python\n    import argparse\n    import sys\n    import configparser\n\
    \n    def main(number, other_number, output):\n        result = number * other_number\n\
    \        print(f'The result is {result}', file=output)\n\n    if __name__ == '__main__':\n\
    \        parser = argparse.ArgumentParser()\n        parser.add_argument('-n1',\
    \ type=int, help='A number', default=1)\n        parser.add_argument('-n2', type=int,\
    \ help='Another number', default=1)\n\n        parser.add_argument('--config',\
    \ '-c', type=argparse.FileType('r'),\n                            help='config\
    \ file')\n        parser.add_argument('-o', dest='output', type=argparse.FileType('w'),\n\
    \                            help='output file',\n                           \
    \ default=sys.stdout)\n\n        args = parser.parse_args()\n        if args.config:\n\
    \            config = configparser.ConfigParser()\n            config.read_file(args.config)\n\
    \            # Transforming values into integers\n            args.n1 = int(config['ARGUMENTS']['n1'])\n\
    \            args.n2 = int(config['ARGUMENTS']['n2'])\n\n        main(args.n1,\
    \ args.n2, args.output)\n    ```\n\n6. 运行结果以检查其是否将输出发送到定义的文件。请注意，结果文件之外没有输出：\n\
    \    ```bash\n    $ python3 prepare_task_step6.py -n1 3 -n2 5 -o result.txt\n\
    \    $ cat result.txt\n    The result is 15\n    $ python3 prepare_task_step6.py\
    \ -c config.ini -o result2.txt\n    $ cat result2.txt\n    The result is 35\n\
    \    ```\n\n## 工作原理...\n\n请注意，`argparse` 模块允许我们使用 `argparse.FileType` 类型将文件定义为参数，并自动打开它们。这非常方便，如果文件路径指向无效位置，将会引发错误。\n\
    \n请记住以正确的模式打开文件。在*步骤5*中，配置文件以读取模式（`r`）打开，输出文件以写入模式（`w`）打开，如果文件存在，这将覆盖该文件。你可能会发现追加模式（`a`）很有用，它会将下一段数据添加到现有文件的末尾。\n\
    \n`configparser` 模块使我们能够轻松使用配置文件。如*步骤2*所示，文件的解析很简单，如下所示：\n```python\nconfig =\
    \ configparser.ConfigParser()\nconfig.read_file(file)\n```\n然后，`config` 将可以像字典一样访问。它将配置文件的节作为键，内部是另一个包含每个配置值的字典。因此，`ARGUMENTS`\
    \ 节中的值 `n2` 可以通过 `config['ARGUMENTS']['n2']` 访问。\n\n请注意，值始终以字符串形式存储，需要转换为其他类型，例如整数。\n\
    \n如果你需要获取布尔值，请不要执行 `value = bool(config[raw_value])`，因为无论是什么，任何字符串都会被转换为 `True`；例如，字符串\
    \ `False` 是一个真字符串，因为它不是空的。使用空字符串也是一个糟糕的选择，因为它们非常令人困惑。请改用 `.getboolean` 方法，例如 `value\
    \ = config.getboolean(raw_value)`。对于整数和浮点值，有类似的 `getint()` 和 `getfloat()` 方法。\n\
    \nPython 3 允许我们向 `print` 函数传递一个 `file` 参数，该参数将写入该文件。*步骤5*展示了将所有打印信息重定向到文件的用法。\n\
    \n请注意，默认参数是 `sys.stdout`，它会将值打印到终端（标准输出）。这意味着在不使用 `-o` 参数的情况下调用脚本将在屏幕上显示信息，这在开发和调试脚本时很有帮助：\n\
    ```bash\n$ python3 prepare_task_step6.py -c config.ini\nThe result is 35\n$ python3\
    \ prepare_task_step6.py -c config.ini -o result.txt\n$ cat result.txt\nThe result\
    \ is 35\n```\n\n## 更多内容...\n\n请参阅 Python 官方文档中 `configparser` 的完整文档：https://docs.python.org/3/library/configparser.html。\n\
    \n在大多数情况下，这个配置解析器应该足够了，但如果需要更强大的功能，你可以使用 YAML 文件作为配置文件。YAML 文件（https://learn.getgrav.org/advanced/yaml）作为配置文件非常常见。它们结构良好，可以直接解析，并考虑各种数据类型：\n\
    \n1. 将 PyYAML 添加到 `requirements.txt` 文件中：\n   `PyYAML==5.3`\n2. 在虚拟环境中安装依赖项：\n\
    \   `$ pip install -r requirements.txt`\n3. 创建 `prepare_task_yaml.py` 文件：\n  \
    \  ```python\n    import yaml\n    import argparse\n    import sys\n\n    def\
    \ main(number, other_number, output):\n        result = number * other_number\n\
    \        print(f'The result is {result}', file=output)\n\n    if __name__ == '__main__':\n\
    \        parser = argparse.ArgumentParser()\n        parser.add_argument('-n1',\
    \ type=int, help='A number', default=1)\n        parser.add_argument('-n2', type=int,\
    \ help='Another number', default=1)\n        parser.add_argument('-c', dest='config',\
    \ type=argparse.FileType('r'),\n                            help='config file\
    \ in YAML format', default=None)\n        parser.add_argument('-o', dest='output',\
    \ type=argparse.FileType('w'),\n                            help='output file',\
    \ default=sys.stdout)\n\n        args = parser.parse_args()\n        if args.config:\n\
    \            config = yaml.load(args.config, Loader=yaml.FullLoader)\n       \
    \     # No need to transform values\n            args.n1 = config['ARGUMENTS']['n1']\n\
    \            args.n2 = config['ARGUMENTS']['n2']\n\n        main(args.n1, args.n2,\
    \ args.output)\n    ```\n    > 请注意，PyYAML 的 `yaml.load()` 函数需要一个 `Loader` 参数。这是为了避免在\
    \ YAML 文件来自不受信任的来源时执行任意代码。除非你需要一组 YAML 语言特性，否则请始终使用 `yaml.SafeLoader`。如果来自 YAML\
    \ 文件的任何部分数据来自不受信任的来源（例如用户输入），切勿使用 `yaml.SafeLoader` 以外的加载器。有关更多信息，请参阅本文：https://github.com/yaml/pyyaml/wiki/PyYAML-yaml.load(input)-Deprecation。\n\
    \n4. 定义配置文件 `config.yaml`：\n    ```yaml\n    ARGUMENTS:\n      n1: 7\n      n2:\
    \ 4\n    ```"
