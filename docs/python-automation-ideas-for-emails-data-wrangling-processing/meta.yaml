    567-890''>

    >>> _.group(1)

    ''1234-567-890''

    >>> re.search(r''[0123456789-]+'', ''37: the phone number is 1234-567-890'')

    <_sre.SRE_Match object; span=(0, 2), match=''37''>

    >>> _.group()

    ''37''

    ```


    Remember that group 0 (.group() or .group(0)) is always the whole match. The rest
    of the groups are ordered as they appear.


    Patterns can be compiled as well. This saves some time if the pattern needs to
    be matched over and over. To use it that way, compile the pattern and then use
    that object to perform searches, as shown in steps 3 and 4. Some extra flags can
    be added, such as making the pattern case insensitive.


    Step 4''s pattern requires a little bit of information. It''s composed of two
    groups, separated by a single character. The special character "." (dot) means
    it matches everything. In our example, it matches a period, a whitespace, and
    a comma. The second group is a straightforward selection of defined options, in
    this case, US state abbreviations.


    The first group starts with an uppercase letter ([A-Z]) and accepts any combination
    of letters or spaces ([\w\s]+?), but not punctuation marks such as periods or
    commas. This matches the cities, including those that are composed of more than
    one word.


    The final +? makes the match of letters non-greedy, matching as few characters
    as possible. This avoids some problems such as when there are no punctuation symbols
    between the cities. Take a look at the result where we don''t include the non-greedy
    qualifier for the second match and how it includes two elements:


    ```

    >>> PATTERN = re.compile(r''([A-Z][\w\s]+?).(TX|OR|OH|MI)'')

    >>> TEXT = ''the jackalopes are the team of Odessa,TX while the knights are native
    of Corvallis OR and the mud hens come from Toledo,OH; the whitecaps have their
    base in Grand Rapids,MI''

    >>> list(PATTERN.finditer(TEXT))[1]

    <re.Match object; span=(73, 122), match=''Corvallis OR and the mud hens come from
    Toledo,OH>

    ```


    Note that this pattern starts on any uppercase letter and keeps matching until
    it finds a state, unless separated by a punctuation mark, which may not be what''s
    expected, for example:'
  - '[PAGE 36]


    ```

    >>> re.search(r''([A-Z][\w\s]+?).(TX|OR|OH|MI)'', ''This is a test, Escanaba MI'')

    <_sre.SRE_Match object; span=(16, 27), match=''Escanaba MI''>

    >>> re.search(r''([A-Z][\w\s]+?).(TX|OR|OH|MI)'', ''This is a test with Escanaba
    MI'')

    <_sre.SRE_Match object; span=(0, 31), match=''This is a test with Escanaba MI''>

    ```


    Step 4 also shows you how to find more than one occurrence in a long text. While
    the .findall() method exists, it doesn''t return the full match object, while
    .findalliter() does. As is common now in Python 3, .findalliter() returns an iterator
    that can be used in a for loop or list comprehension. Note that .search() returns
    only the first occurrence of the pattern, even if more matches appear:


    ```

    >>> PATTERN.search(TEXT)

    <_sre.SRE_Match object; span=(31, 40), match=''Odessa,TX''>

    >>> PATTERN.findall(TEXT)

    [(''Odessa'', ''TX''), (''Corvallis'', ''OR''), (''Toledo'', ''OH'')]

    ```


    # There''s more...


    The special characters can be reversed if they are case swapped. For example,
    the reverse of the ones we used are as follows:


    +   - \D: Marks any non-digit.

    - \W: Marks any non-letter.

    - \B: Marks a position that''s not at the start or end of a word. For example,
    r''thing\B'' will match things but not thing.


    > The most commonly used special characters are typically \d (digits) and \w (letters
    and digits), as they mark common patterns to search for.


    Groups can be assigned names as well. This makes them more explicit at the expense
    of making the group more verbose in the following shape—(?P<groupname>PATTERN).
    Groups can be referred to by name with .group(groupname) or by calling .groupdict()
    while maintaining its numeric position.'
  - '[PAGE 37]


    Let''s Begin Our Automation Journey


    For example, the step 4 pattern can be described as follows:


    ```

    >>> PATTERN = re.compile(r''(?P<city>[A-Z][\w\s]+?). (?P<state>TX|OR|OH|MN)'')

    >>> match = PATTERN.search(TEXT)

    >>> match.groupdict() {''city'': ''Odessa'', ''state'': ''TX''}

    >>> match.group(''city'') ''Odessa''

    >>> match.group(''state'') ''TX''

    >>> match.group(1), match.group(2) (''Odessa'', ''TX'')

    ```


    Regular expressions are a very extensive topic. There are whole technical books
    devoted to them and they can be notoriously deep. The Python documentation is
    a good reference to use (https://docs.python.org/3/library/re.html) and to learn
    more.


    If you feel a little intimidated at the start, it''s a perfectly natural feeling.
    Analyze each of the patterns with care, dividing them into smaller parts, and
    they will start to make sense. Don''t be afraid to run a regex interactive analyzer!


    Regexes can be really powerful and generic, but they may not be the proper tool
    for what you are trying to achieve. We''ve seen some caveats and patterns that
    have subtleties. As a rule of thumb, if a pattern starts to feel complicated,
    it''s time to search for a different tool. Remember the previous recipes as well
    and the options they presented, such as parse.


    # See also


    +   - The Introducing regular expressions recipe, covered earlier in the chapter,
    to learn the basics of using regular expressions.

    - The Using a third-party tool – parse recipe, covered earlier in the chapter,
    to learn a different technique to extract information from text.


    # Adding command-line arguments


    A lot of tasks can be best structured as a command-line interface that accepts
    different parameters to change the way it works, for example, scraping a web page
    from a provided URL or other URL. Python includes a powerful argparse module in
    the standard library to create rich command-line argument parsing with minimal
    effort.'
  - "[PAGE 38]\n\n# Getting ready\n\nThe basic use of `argparse` in a script can be\
    \ shown in three steps:\n\n+   1. Define the arguments that your script is going\
    \ to accept, generating a new parser.\n2. Call the defined parser, returning an\
    \ object with all of the resulting arguments.\n3. Use the arguments to call the\
    \ entry point of your script, which will apply the defined behavior.\n\nTry to\
    \ use the following general structure for your scripts:\n\n```\nIMPORTS\ndef main(main\
    \ parameters):\n    DO THINGS\n\nif __name__ == '__main__':\n    DEFINE ARGUMENT\
    \ PARSER\n    PARSE ARGS\n    VALIDATE OR MANIPULATE ARGS, IF NEEDED\n    main(arguments)\n\
    ```\n\nThe `main` function makes it easy to know what the entry point for the\
    \ code is. The section under the `if` statement is only executed if the file is\
    \ called directly, but not if it's imported. We'll follow this for all the steps.\n\
    \n# How to do it...\n\n+   1. Create a script that will accept a single integer\
    \ as a positional argument, and will print a hash symbol that amount of times.\
    \ The `recipe_cli_step1.py` script is as follows, but note that we are following\
    \ the structure presented previously, and the `main` function is just printing\
    \ the argument:\n\n```\nimport argparse\n\ndef main(number):\n    print('#' *\
    \ number)\n\nif __name__ == '__main__':\n    parser = argparse.ArgumentParser()\n\
    \    parser.add_argument('number', type=int, help='A number')\n```"
- md: "## Let's Begin Our Automation Journey\n\n```python\nargs = parser.parse_args()\n\
    \nmain(args.number)\n```\n\n2. Call the script and check how the parameter is\
    \ presented. Calling the script with no arguments displays the automatic help.\
    \ Use the automatic argument -h to display the extended help:\n\n```bash\n$ python3\
    \ recipe_cli_step1.py\nusage: recipe_cli_step1.py [-h] number\nrecipe_cli_step1.py:\
    \ error: the following arguments are required: number\n\n$ python3 recipe_cli_step1.py\
    \ -h\nusage: recipe_cli_step1.py [-h] number\n\npositional arguments:\n  number\
    \      A number\n\noptional arguments:\n  -h, --help  show this help message and\
    \ exit\n```\n\n3. Calling the script with the extra parameters works as expected:\n\
    \n```bash\n$ python3 recipe_cli_step1.py 4\n####\n\n$ python3 recipe_cli_step1.py\
    \ not_a_number\nusage: recipe_cli_step1.py [-h] number\nrecipe_cli_step1.py: error:\
    \ argument number: invalid int value: 'not_a_number'\n```\n\n4. Change the script\
    \ to accept an optional argument for the character to print. The default will\
    \ be \"#\". The recipe_cli_step2.py script will look like this:\n\n```python\n\
    import argparse\n\ndef main(character, number):\n    print(character * number)\n\
    \nif __name__ == '__main__':\n    parser = argparse.ArgumentParser()\n    parser.add_argument('number',\
    \ type=int, help='A number')\n    parser.add_argument('-c', type=str, help='Character\
    \ to print',\n                        default='#')\n\n    args = parser.parse_args()\n\
    \    main(args.c, args.number)\n```\n\n5. The help is updated, and using the -c\
    \ flag allows us to print different characters:\n\n```bash\n$ python3 recipe_cli_step2.py\
    \ -h\nusage: recipe_cli_step2.py [-h] [-c C] number\n\npositional arguments:\n\
    \  number    A number\n\noptional arguments:\n  -h, --help show this help message\
    \ and exit\n  -c C Character to print\n\n$ python3 recipe_cli_step2.py 4\n####\n\
    \n$ python3 recipe_cli_step2.py 5 -c m\nmmmmm\n```\n\n6. Add a flag that changes\
    \ the behavior when present. The recipe_cli_step3.py script is as follows:\n\n\
    ```python\nimport argparse\n\ndef main(character, number):\n    print(character\
    \ * number)\n\nif __name__ == '__main__':\n    parser = argparse.ArgumentParser()\n\
    \    parser.add_argument('number', type=int, help='A number')\n    parser.add_argument('-c',\
    \ type=str, help='Character to print',\n                        default='#')\n\
    \    parser.add_argument('-U', action='store_true', default=False,\n         \
    \               dest='uppercase',\n                        help='Uppercase the\
    \ character')\n    args = parser.parse_args()\n\n    if args.uppercase:\n    \
    \    args.c = args.c.upper()\n    main(args.c, args.number)\n```\n\n7. Calling\
    \ it uppercases the character if the -U flag is added:\n\n```bash\n$ python3 recipe_cli_step3.py\
    \ 4 -c f\nffff\n$ python3 recipe_cli_step3.py 4 -c f -U\nFFFF\n```\n\n## How it\
    \ works...\n\nAs described in step 1 of the How to do it section, the arguments\
    \ are added to the parser through .add_arguments. Once all of the arguments are\
    \ defined, calling parse_args() returns an object that contains the results (or\
    \ exits if there's an error).\n\nEach argument should add a help description,\
    \ but their behavior can change greatly:\n\n- If an argument starts with a -,\
    \ it is considered an optional parameter, like the -c argument in step 4. If not,\
    \ it's a positional argument, like the number argument in step 1.\n- For clarity,\
    \ always define a default value for optional parameters. It will be None if you\
    \ don't, but this may be confusing.\n- Remember to always add a help parameter\
    \ with a description of the parameter; help is automatically generated, as shown\
    \ in step 2.\n- If a type is present, it will be validated, for example, number\
    \ in step 3. By default, the type will be a string.\n- The actions store_true\
    \ and store_false can be used to generate flags, arguments that don't require\
    \ any extra parameters. Set the corresponding default value as the opposite Boolean.\
    \ This is demonstrated in the U argument in steps 6 and 7.\n- The name of the\
    \ property in the args object will be, by default, the name of the argument (without\
    \ the dash, if it's present). You can change it with dest. For example, in step\
    \ 6, the command-line argument -U is described as uppercase.\n\nChanging the name\
    \ of an argument for internal usage is very useful when using short arguments,\
    \ such as single letters. A good command-line interface will use -c, but, internally,\
    \ it's probably a good idea to use a more verbose label, such as configuration_file.\
    \ Remember, explicit is better than implicit!\n\n- Some arguments can work in\
    \ coordination with others, as shown in *step 3*. Perform all of the required\
    \ operations to pass the `main` function as clear and concise parameters. For\
    \ example, in *step 3*, only two parameters are passed, but one may have been\
    \ modified.\n\n## There's more...\n\nYou can create long arguments as well with\
    \ double dashes, for example:\n\n```python\nparser.add_argument('-v', '--verbose',\
    \ action='store_true',\n                    default=False,\n                 \
    \   help='Enable verbose output')\n```\n\nThis will accept both `-v` and `--verbose`,\
    \ and it will store the name `verbose`.\n\nAdding long names is a good way of\
    \ making the interface more intuitive and easy to remember. It's easy to remember\
    \ after a couple of times that there's a verbose option, and it starts with a\
    \ v.\n\nThe main inconvenience when dealing with command-line arguments may be\
    \ that you end up with too many of them. This creates confusion. Try to make your\
    \ arguments as independent as possible and don't make too many dependencies between\
    \ them; otherwise, handling the combinations can be tricky.\n\nIn particular,\
    \ try to not create more than a couple of positional arguments, as they won't\
    \ have mnemonics. Positional arguments also accept default values, but most of\
    \ the time, that won't be the expected behavior.\n\nFor advanced details, refer\
    \ to the Python documentation of `argparse` (https://docs.python.org/3/library/argparse.html).\n\
    \n## See also\n\n- The *Creating a virtual environment* recipe, covered earlier\
    \ in this chapter, to learn how to create an environment installing third-party\
    \ modules.\n- The *Installing third-party packages* recipe, covered earlier in\
    \ this chapter, to learn how to install and use external modules in the virtual\
    \ environment.\n\n# 2\n## Automating Tasks Made Easy\n\nTo properly automate tasks,\
    \ we need a way to make them execute automatically at the proper times. A task\
    \ that needs to be started manually is not really fully automated.\n\nHowever,\
    \ in order to be able to leave them running in the background while worrying about\
    \ more pressing issues, the task will need to be adequate to run in *fire-and-forget*\
    \ mode. We should be able to monitor that it executes correctly, be sure that\
    \ we capture relevant information (such as receiving notifications if something\
    \ interesting arises), and know whether there have been any errors while running\
    \ it.\n\nEnsuring that a piece of software runs consistently with high reliability\
    \ is actually a very big deal. It is one area that, in order to be done properly,\
    \ requires specialized knowledge and staff, who typically go by the names of sysadmin,\
    \ operations, or **SRE (Site Reliability Engineering)**. Big operations, such\
    \ as Amazon and Google, require huge investment in ensuring that everything works\
    \ 24/7.\n\nThe objective for this book is way more modest than that, as most software\
    \ doesn't require this kind of high availability. Designing systems with downtimes\
    \ of less than a few seconds per year is challenging, but executing a task with\
    \ reasonable reliability is a much easier thing to do. However, be aware that\
    \ there's maintenance to be done, and plan accordingly.\n\nIn this chapter, we'll\
    \ cover the following recipes:\n\n- Preparing a task\n- Setting up a cron job\n\
    - Capturing errors and problems\n- Sending email notifications\n\nWe'll begin\
    \ by going over how we ought to prepare a task before we automate it.\n\n## Preparing\
    \ a task\n\nIt all starts with defining precisely the work that needs to be executed,\
    \ and designing it in a way that doesn't require human intervention to run.\n\n\
    Some ideal characteristic points are as follows:\n\n1. **Single, clear entry point**:\
    \ No confusion on how to start the task.\n2. **Clear parameters**: If there are\
    \ any parameters, they should be as explicit as possible.\n3. **No interactivity**:\
    \ Stopping the execution to request information from the user is not possible.\n\
    4. **The result should be stored**: In order to be checked at a different time\
    \ than when it runs.\n5. **Clear result**: When we oversee the execution of a\
    \ program ourselves, we can accept more verbose results, such as unlabeled data\
    \ or extra debugging information. However, for an automated task, the final result\
    \ should be as concise and to the point as possible.\n6. **Errors should be logged**:\
    \ To analyze what went wrong.\n\nA command-line program has a lot of those characteristics\
    \ already. It always has a clear entry point, with defined parameters, and the\
    \ result can be stored, even if just in text format. And it can be improved ensuring\
    \ a config file that clarifies the parameters, and an output file.\n\nNote that\
    \ point 6 is the objective of the *Capturing errors and problems* recipe, and\
    \ will be covered there.\n\nTo avoid interactivity, do not use any function that\
    \ waits for user input, such as `input`. Remember to delete debugger breakpoints!\n\
    \n## Getting ready\n\nWe'll start by following a structure in which a main function\
    \ will serve as the entry point, and all parameters are supplied to it.\n\nThis\
    \ is the same basic structure that was presented in the *Adding command-line arguments*\
    \ recipe in *Chapter 1, Let's Begin Our Automation Journey*."
  mdcn: "## 让我们开始自动化之旅\n\n```python\nargs = parser.parse_args()\n\nmain(args.number)\n\
    ```\n\n2.  调用脚本并检查参数是如何呈现的。不带参数调用脚本会显示自动帮助信息。使用自动参数 `-h` 可以显示扩展帮助：\n\n```bash\n\
