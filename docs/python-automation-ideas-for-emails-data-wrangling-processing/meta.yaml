- img_proc: true
  md: 'It adds a new key to the dictionary for the country, the currency, and the
    US-dollar equivalent of the price. These three keys are then added as columns
    to the output CSV.


    > Since Python 3.7, the dictionaries keep the insertion order. This means that
    the last added key to the dictionary will be retrieved last when keys are presented.
    This wasn''t the case in previous versions, where we had to rely on OrderedDict,
    a specific kind of dictionary that preserves key order. We take advantage of this
    behavior regarding the generation of the header, as any new element introduced
    will be stored as a new column at the end, keeping the order of the old ones.


    The resulting file provides information on each sale log in a common currency,
    making comparisons easier.


    # There''s more...


    As we commented before, processing and distinguishing location and currency may
    not be as straightforward as presented here. Different countries may have different
    ways of presenting places, and in some cases, codes used to represent locations
    from different countries may overlap.


    The country is added as a column to have available later on.


    The currency exchange rate is defined as a constant, but that''s only an approximation.
    It may be necessary to obtain it from an external source. For example, www.exchangerate-api.com
    offers a free API to integrate exchange rate conversions, as follows:


    ```

    >>> import requests

    >>> result = requests.get(''https://api.exchangerate-api.com/v4/latest/CAD'')

    >>> result.json()[''rates''][''USD'']

    0.755081

    ```


    More complicated setups may require access to specific exchange rate sources or
    to be able to retrieve the historic information on rates.


    > Most exchange rate sources have a limit on the number of calls, or charge per
    access. Be sure to avoid constant polling for data and store the rates for local
    usage.'
