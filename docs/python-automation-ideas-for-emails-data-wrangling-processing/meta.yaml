  md: '# 3

    Building Your First Web Scraping Application


    The internet, and the **World Wide Web (WWW)**, is probably the most prominent
    source of information today. Most of that information is retrievable through HTTP.
    HTTP was invented originally to share pages of hypertext (hence the name **HyperText
    Transfer Protocol**), which started the WWW.


    This process happens each time that we request a web page, so it should be familiar
    to almost everyone. But we can also perform these operations programmatically
    to retrieve and process information automatically. Python has in its standard
    library an HTTP client, but the fantastic `requests` module makes obtaining web
    pages very easy. In this chapter, we will see how.


    In this chapter, we''ll cover the following recipes:


    +   - Downloading web pages

    - Parsing HTML

    - Crawling the web

    - Subscribing to feeds

    - Accessing web APIs

    - Interacting with forms

    - Using Selenium for advanced interaction

    - Accessing password-protected pages

    - Speeding up web scraping'
  merge: -1
  pgno: 70
- img_proc: true
  md: 'Building Your First Web Scraping Application


    Let''s start with the basics of how to programmatically obtain an existing web
    page.


    # Downloading web pages


    The basic ability to download a web page involves making an HTTP GET request against
    a URL. This is the basic operation of any web browser.


    Let''s quickly recap the different parts of this operation, as it has three distinct
    elements:


    +   1. Using the HTTP protocol. This deals with the way the request is structured.

    2. Using the GET method, which is the most common HTTP method. We''ll see more
    in the Accessing web APIs recipe.

    3. A full URL describing the address of the page, including the server (for example:
    mypage.com) and the path (for example: /page).


    That request will be routed toward the server by the internet and processed by
    the server, then a response will be sent back. This response will contain a status
    code, typically 200 if everything went fine, and a body with the result, which
    will normally be text with an HTML page.


    Most of this is handled automatically by the HTTP client used to perform the request.
    We''ll see in this recipe how to make a simple request to obtain a web page.


    > HTTP requests and responses can also contain headers. Headers contain important
    information about the request itself, such as the total size of the request, the
    format of the content, the date of the request, and what browser or server is
    used.


    # Getting ready


    Using the fantastic requests module, getting web pages is super simple. Install
    the module:


    ```

    $ echo "requests==2.23.0" >> requirements.txt

    $ source .venv/bin/activate

    (.venv) $ pip install -r requirements.txt

    ```


    We''ll download the page at http://www.columbia.edu/~fdc/sample.html because it
    is a straightforward HTML page that is easy to read in text mode.'
