  md: '> You can set up (and disable) more breakpoints using the `pdb` command (`break`).
    You need to specify the file and line for the breakpoint, but it''s actually more
    straightforward and less error-prone to just change the code and run it again.


    You can overwrite variables as well as read them. Or create new variables. Or
    make extra calls. Or anything else you can imagine. The full power of the Python
    interpreter is at your service! Use it to check how something works or verify
    whether something is happening.


    > Avoid creating variables with names that are reserved for the debugger, such
    as calling a list `l`. It will make things confusing and interfere with `pdb`
    commands, sometimes in non-obvious ways.


    The `breakpoint()` function was introduced in Python 3.7 and is highly recommended
    if you''re using a compatible version. In previous versions, you need to replace
    it with the following:


    ```

    import pdb;

    pdb.set_trace()

    ```


    They work in exactly the same way. Note the two statements in the same line, which
    is not recommended in Python in general, but it''s a great way of keeping the
    breakpoint in a single line.


    > Remember to remove any `breakpoints` once debugging is done! Especially when
    committing to a version control system such as Git.


    You can read more about the new `breakpoint` call in the official PEP at https://www.python.org/dev/peps/pep-0553/.


