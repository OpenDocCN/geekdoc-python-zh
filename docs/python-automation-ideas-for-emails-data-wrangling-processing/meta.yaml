    \n## 另请参阅\n\n- *第 1 章，开始我们的自动化之旅* 中的 *添加命令行选项* 配方，描述命令行选项的基本元素。\n- 本章前面介绍的 *准备任务*\
    \ 配方，了解设计自动化任务时应遵循的策略。\n\n## 发送电子邮件通知\n\n电子邮件已成为日常生活中不可或缺的工具。可以说，如果自动化任务检测到某些内容，这是发送通知的最佳场所。另一方面，电子邮件收件箱已经充斥着垃圾邮件，因此请小心。\n\
    \n垃圾邮件过滤器也是现实。请注意向谁发送电子邮件以及要发送的电子邮件数量。电子邮件服务器或地址可能会被标记为垃圾邮件来源，所有电子邮件可能会被互联网悄悄丢弃。\n\
    \n本配方将向您展示如何使用现有电子邮件帐户发送单个电子邮件。\n\n这种方法适用于作为自动化任务结果发送给少数人的备用电子邮件，但仅限于此。有关发送电子邮件（包括群组）的更多想法，请参阅\
    \ *第 9 章，处理通信渠道*。\n\n## 准备工作\n\n对于此配方，我们需要一个有效的电子邮件帐户设置，包括以下内容：\n\n- 使用 SMTP 的有效电子邮件服务器；SMTP\
    \ 是标准电子邮件协议\n- 要连接的端口\n- 地址\n- 密码\n\n这四个元素应该足以发送电子邮件。\n\n一些电子邮件服务，例如 Gmail，会鼓励您设置\
    \ 2FA，这意味着仅凭密码不足以发送电子邮件。通常，它们会允许您创建一个特定的应用程序密码，绕过 2FA 请求。请查看您的电子邮件提供商信息以获取选项。\n\
    \n您使用的电子邮件服务应在其文档中说明 SMTP 服务器是什么以及使用哪个端口。这也可以从电子邮件客户端中检索，因为它们是相同的参数。请查看您的提供商文档。在以下示例中，我们将使用\
    \ Gmail 帐户。\n\n## 操作步骤...\n\n1. 创建 `email_task.py` 文件，如下所示：\n\n```python\nimport\
    \ argparse\nimport configparser\n\nimport smtplib\nfrom email.message import EmailMessage\n\
    \ndef main(to_email, server, port, from_email, password):\n    print(f'With love,\
    \ from {from_email} to {to_email}')\n\n    # Create the message\n    subject =\
    \ 'With love, from ME to YOU'\n    text = '''This is an example test'''\n    msg\
    \ = EmailMessage()\n    msg.set_content(text)\n    msg['Subject'] = subject\n\
    \    msg['From'] = from_email\n    msg['To'] = to_email\n\n    # Open communication\
    \ and send\n    server = smtplib.SMTP_SSL(server, port)\n    server.login(from_email,\
    \ password)\n    server.send_message(msg)\n    server.quit()\n\nif __name__ ==\
    \ '__main__':\n    parser = argparse.ArgumentParser()\n    parser.add_argument('email',\
    \ type=str, help='destination email')\n    parser.add_argument('-c', dest='config',\
    \ type=argparse.FileType('r'),\n                        help='config file', default=None)\n\
    \n    args = parser.parse_args()\n    if not args.config:\n        print('Error,\
    \ a config file is required')\n        parser.print_help()\n        exit(1)\n\n\
    \    config = configparser.ConfigParser()\n    config.read_file(args.config)\n\
    \n    main(args.email,\n         server=config['DEFAULT']['server'],\n       \
    \  port=config['DEFAULT']['port'],\n         from_email=config['DEFAULT']['email'],\n\
    \         password=config['DEFAULT']['password'])\n```\n\n2. 创建一个名为 `email_conf.ini`\
    \ 的配置文件，其中包含您电子邮件帐户的详细信息。例如，对于 Gmail 帐户，请填写以下模板。模板可在 GitHub 上找到 https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter02/email_conf.ini，但请务必用您的数据填写：\n\
    \n```ini\n[DEFAULT]\nemail = EMAIL@gmail.com\nserver = smtp.gmail.com\nport =\
    \ 465\npassword = PASSWORD\n```\n\n3. 确保该文件不能被系统上的其他用户读取或写入，将文件权限设置为仅允许我们的用户。600\
    \ 权限意味着文件所有者具有读写访问权限，其他人没有访问权限：\n   ```\n   $ chmod 600 email_conf.ini\n   ```\n\
    4. 运行脚本发送测试电子邮件：\n   ```\n   $ python3 email_task.py -c email_conf.ini destination_email@server.com\n\
    \   ```\n5. 检查目标电子邮件的收件箱；应收到一封主题为 \"With love, from ME to YOU\" 的电子邮件。\n\n## 工作原理...\n\
    \n前面的脚本中有两个关键步骤——消息的生成和发送。\n\n消息主要需要包含收件人和发件人电子邮件地址，以及主题。如果内容是纯文本，如本例所示，调用 `.set_content()`\
    \ 就足够了。然后可以发送整个消息。\n\n从技术上讲，可以发送一封标记为来自与您用于发送的电子邮件地址不同的电子邮件。但不建议这样做，因为您的电子邮件提供商可能会认为这是试图冒充其他电子邮件。您可以使用回复标头允许回复到不同的帐户。\n\
    \n发送电子邮件需要您连接到指定的服务器并启动 SMTP 连接。SMTP 是电子邮件通信的标准。\n\n步骤非常简单——配置服务器、登录、发送准备好的消息，然后退出。\n\
    \n如果您需要发送多条消息，您可以登录、发送多封电子邮件，然后退出，而不是每次都连接。\n\n## 更多内容...\n\n如果目标是更大的操作，例如营销活动，甚至是生产电子邮件，例如确认用户电子邮件，请参阅第\
    \ 9 章，处理通信渠道。"
