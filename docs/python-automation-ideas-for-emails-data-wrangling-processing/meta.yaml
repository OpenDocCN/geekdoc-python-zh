  md: "# Using templates for reports\n\nWhile plain text can convey a lot of information,\
    \ to generate better reports, we need a system where styling can be added to the\
    \ text. Details such as bold text, bullet points, and images can make a difference.\
    \ As all browsers work with HTML, generating reports in this format is a good\
    \ option. Everyone is familiar with a browser rendering text.\n\nHTML is a very\
    \ flexible format that can be used to render rich text and reports. While an HTML\
    \ template can be managed as pure plain text, doing so is very error prone and\
    \ tedious. There are tools that allow you to add better handling of structured\
    \ text and define templates.\n\nThis also detaches the template from the code,\
    \ separating the generation of the data from the representation of that data.\
    \ The styling of the template can be done separately by specialized designers,\
    \ making it look great.\n\n# Getting ready\n\nThe tool used in this recipe, Jinja2,\
    \ reads a file that contains the template and applies the context to it. The context\
    \ contains the data to be displayed.\n\nWe should start by installing the module:\n\
    \n```\n$ echo \"jinja2==2.11.1\" >> requirements.txt\n$ pip install -r requirements.txt\n\
    ```\n\nJinja2 uses its own syntax, which is a mixture of HTML and Python. It is\
    \ aimed at HTML documents, so it easily performs operations such as correctly\
    \ escaping special characters.\n\nIn the GitHub repository, https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter05,\
    \ we've included a template file called jinja_template.html with the template\
    \ to use.\n\n# How to do it...\n\n+   1. Import the Jinja2 Template and datetime:\n\
    \    >>> from jinja2 import Template\n    >>> from datetime import datetime\n\
    2. Read the template from the files into memory:\n    >>> with open('jinja_template.html')\
    \ as file:\n    ...     template = Template(file.read())"
