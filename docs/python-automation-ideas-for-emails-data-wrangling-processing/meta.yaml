    # There''s more...


    Plots with multiple axes are complicated to read as a general rule. Use them only
    when there''s a good reason to do so and the data is highly correlated.


    > By default, the y-axis in line plots will try to present information between
    the minimum and maximum Y values. Truncating the axis is normally not the best
    way to present information, as it can distort the perceived differences. For example,
    changing values in the range from 10 to 11 can look like a huge deal if the graph
    goes from 10 to 11, but this is less than 10%. Setting the y-axis minimum to 0
    with plt.gca().set_ylim(ymin=0) is a good idea, especially with two different
    axes.


    The call to select the subplot will first go by row, then by column, so .subplot(2,
    2, 3) will select the subplot in the first column, second row.


    The divided subplot grid can be changed. A first call to .subplot(2, 2, 1) and
    .subplot(2, 2, 2), and then calling .subplot(2, 1, 2), will create a structure
    with two small plots in the first row and a wider one in the second. Going back
    will overwrite previously drawn subplots.


