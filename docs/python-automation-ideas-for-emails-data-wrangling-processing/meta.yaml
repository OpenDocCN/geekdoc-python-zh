    \n这个过程也可以轻松地连接成以下形式：\n\n```python\nresult = by_usd.agg(['sum', 'count', 'mean']).round(2).rename(...)\n\
    ```\n\n这种工作方式意味着对于每个操作，都会生成数据的副本。对于非常大的数据集，这可能效率不高。你可以通过使用 `inplace` 参数来执行大多数操作而不创建副本。这将修改它们而不使用额外的内存空间或复制数据。\n\
