    # How it works...


    The tree structure allows `pytest` to detect the different modules in the structure:


    +   - The `__init__.py` file defines that the subdirectory `code` contains a Python
    module. This is a standard Python definition.

    - The file `conftest.py` contains specific information for `pytest`. Even if it''s
    empty, it defines the root directory for the tests.

    - The files starting with `test` are detected as containing tests. Inside these
    files, the functions prefixed with `test` are detected and run.


    The `code` module content is defined in *step 1*. The file `external.py` contains
    the function `division`.


    In *step 3*, the test file is defined. Note the import:


    ```

    from code.external import division

    ```


    That allows you to use external code defined outside of the boundaries of the
    test file. The function is then verified in three situations:


    +   - `test_int_division` checks that `division` divides two integers and returns
    the correct integer result.

    - `test_float_division` verifies that dividing two integers can produce a float
    result.

    - `test_division_by_zero` checks that the correct exception is raised if trying
    to divide by zero.'
- md: "## Automatic Testing Routines\n\nThe first two tests contain a simple assertion\
    \ checking the result of the function call, but `test_division_by_zero` requires\
    \ that you verify that the code raises an exception. This is done through a `with`\
    \ block using `pytest.raises`:\n\n```python\ndef test_division_by_zero():\n  \
    \  with pytest.raises(ZeroDivisionError):\n        division(1, 0)\n```\n\nThis\
    \ block will generate an assertion error if the call doesn't generate the exception,\
    \ allowing you to check the behavior. Note that the specific exception needs to\
    \ be passed as an argument.\n\nStep 4 runs the tests, checking that all tests\
    \ are correct and the code does what it is supposed to do.\n\n## There's more...\n\
    \nTo be able to define the exceptions to be captured, you'll need to import the\
    \ exception definitions from the module code or the relevant library.\n\nRaising\
    \ an exception in any part inside of the `with` block will capture it. Try to\
    \ include the smallest possible call that is expected to raise the exception,\
    \ to avoid capturing spurious exceptions. For the same reason, the most precise\
    \ exception should be declared.\n\nWhen running `pytest` without specifying a\
    \ file, it will try to detect possible test files and capture all the tests in\
    \ the subdirectory. Be sure that the modules are properly defined as defined by\
    \ `__init__.py` and `conftest.py`.\n\n> We will see more of `conftest.py` later\
    \ in this chapter.\n\n## See also\n\n- The *Writing and executing test cases*\
    \ recipe, in the previous section, to learn the basics of how to define tests.\n\
    - The *Testing using HTTP call mocking* recipe, later in this chapter, to learn\
    \ how to use testing modules that mock specific libraries.\n\n## Testing using\
    \ dependency mocking\n\nOne of the biggest advantages of using Python is having\
    \ a rich library of resources at our disposal. That includes modules in the standard\
    \ library, like the `csv` module to read and write CSV files or the `re` library\
    \ to use regexes.\n\nOthers can be external, like `Beautiful Soup` to parse HTML\
    \ or `matplotlib` to generate graphs. We can also create our own libraries or\
    \ structure our code in different files and encapsulate the functionality in a\
    \ way that's reusable and improves readability.\n\nWhen creating tests, sometimes\
    \ using external elements and library calls to the core of the test is not advisable.\
    \ For example, to test that a report is correctly processed, it may be necessary\
    \ to read a CSV file that contains the report. But preparing the test by preparing\
    \ a file, in this case, becomes cumbersome and can lose focus on the actual objective\
    \ of the test.\n\nIn these cases, it can be convenient to simulate those dependencies\
    \ to simplify the tests or to avoid external calls such as calls to network access\
    \ or other kinds of hardware. This kind of simulation, which replaces the external\
    \ dependencies during testing, is known as a `mock`.\n\n> Mocks are closely related\
    \ to unit tests, in that they are small focused tests that cover a single unit\
    \ of code, like a function, a class, or even a small module. This allows you to\
    \ test such units of code in isolation from external elements, or, more precisely,\
    \ fully controlling the external elements the code accesses. Keep in mind that\
    \ exactly how big a unit test can get before it is no longer a unit test is up\
    \ for debate.\n\nThis can be done through the library `mock` in the Python standard\
    \ library, which allows you to replace the behavior of external dependencies.\n\
    \n## Getting ready\n\nWe will use the `pytest` module. We should install the module,\
    \ adding it to our `requirements.txt` file as follows:\n\n```\n$ echo \"pytest==5.4.1\"\
    \ >> requirements.txt\n$ pip install -r requirements.txt\n```\n\nWe will use the\
    \ test files `tests/test_dependencies.py` and `code/dependencies.py`. You can\
    \ download them from the GitHub repository at `https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter12`,\
    \ under the subdirectories `tests` and `code`.\n\nThe tree should look like this:\n\
    \n```\n├── code\n│   ├── __init__.py\n│   └── dependencies.py\n├── conftest.py\n\
    └── tests\n    └── test_dependencies.py\n```\n\n## How to do it...\n\n1. The `__init__.py`\
    \ file and `conftest.py` are empty, but define the structure of the modules.\n\
    2. Check the file `code/dependencies.py`, which contains the definition of calculating\
    \ areas for certain shapes:\n\n```python\nPI = 3.14159\n\ndef rectangle(sideA,\
    \ sideB):\n    return sideA * sideB\n\ndef circle(radius):\n    return 2 * PI\
    \ * radius\n\ndef calculate_area(shape, sizeA, sizeB=0):\n    if sizeA <= 0:\n\
    \        raise ValueError('sizeA needs to be positive')\n\n    if sizeB < 0:\n\
    \        raise ValueError('sizeB needs to be positive')\n\n    if shape == 'SQUARE':\n\
    \        return rectangle(sizeA, sizeA)\n\n    if shape == 'RECTANGLE':\n    \
    \    return rectangle(sizeA, sizeB)\n\n    if shape == 'CIRCLE':\n        return\
    \ circle(sizeA)\n\n    raise Exception(f'Shape {shape} not defined')\n```\n\n\
    3. Check the tests in the file `tests/test_dependencies.py`, validating the calculations\
    \ of `calculate_area`:\n\n```python\nfrom unittest import mock\nfrom code.dependencies\
    \ import calculate_area\n\ndef test_square():\n    result = calculate_area('SQUARE',\
    \ 2)\n    assert result == 4\n\ndef test_rectangle():\n    result = calculate_area('RECTANGLE',\
    \ 2, 3)\n    assert result == 6\n\ndef test_circle_with_proper_pi():\n    result\
    \ = calculate_area('CIRCLE', 2)\n    assert result == 12.56636\n\n@mock.patch('code.dependencies.PI',\
    \ 3)\ndef test_circle_with_mocked_pi():\n    result = calculate_area('CIRCLE',\
    \ 2)\n    assert result == 12\n\n@mock.patch('code.dependencies.rectangle')\n\
    def test_circle_with_mocked_rectangle(mocked_rectangle):\n    mocked_rectangle.return_value\
    \ = 12\n    result = calculate_area('SQUARE', 2)\n    assert result == 12\n  \
    \  mocked_rectangle.assert_called()\n```\n\n4. Run pytest to run the test file:\n\
    \n```\n$ pytest tests/test_dependencies.py\n============================= test\
    \ session starts =============================\nplatform darwin -- Python 3.8.2,\
    \ pytest-5.4.1, py-1.8.1,\npluggy-0.13.1\nrootdir: Python-Automation-Cookbook/Chapter12\n\
    collected 5 items\n\ntests/test_dependencies.py .....\n[100%]\n\n==============================\
    \ 5 passed in 0.10s ===============================\n```\n\n## How it works...\n\
    \nThe code module content is defined in step 1. The file `dependencies.py` contains\
    \ the following elements:\n\n- The definition of the variable `PI`.\n- Two internal\
    \ functions that calculate the areas of rectangles (based on two sides) and circles\
    \ (based on the radius).\n- The `calculate_area` function, which accepts several\
    \ kinds of shapes and channels the request to the correct internal one. It understands\
    \ that a square is a kind of rectangle with four equal sides, for example.\n\n\
    In step 3, the test file is defined. Note the imports, both of the `mock` module\
    \ and the function to test:\n\n```python\nfrom unittest import mock\nfrom code.dependencies\
    \ import calculate_area\n```\n\nThe first three tests (`test_square`, `test_rectangle`,\
    \ and `test_circle_with_proper_pi`) are straightforward.\n\nThe test `test_circle_with_mocked_pi`\
    \ uses a `mock.patch` decorator to replace the `PI` variable with `3` in the `code.dependencies`\
    \ module:\n\n```python\n@mock.patch('code.dependencies.PI', 3)\ndef test_circle_with_mocked_pi():\n\
    \    result = calculate_area('CIRCLE', 2)\n\n    assert result == 12\n```\n\n\
    This changes the `PI` constant while the test is running, affecting the result.\
    \ Once the test is done, the mock is disabled and the variable is again the previously\
    \ defined value.\n\nThe test `test_circle_with_mocked_rectangle` mocks the `rectangle`\
    \ function. As a replacement is not defined in the decorator, it is passed as\
    \ a parameter to the function `mocked_rectangle`:\n\n```python\n@mock.patch('code.dependencies.rectangle')\n\
    def test_circle_with_mocked_rectangle(mocked_rectangle):\n    mocked_rectangle.return_value\
    \ = 12\n\n    result = calculate_area('SQUARE', 2)\n\n    assert result == 12\n\
    \    mocked_rectangle.assert_called()\n```\n\nThe function, during the test, is\
    \ replaced with a `MagicMock` object. To specify the value returned when this\
    \ object is called as a function, use the attribute `.return_value`. As we see\
    \ in the result, it replaces the area calculation. The mock can also be checked\
    \ to see whether it has been called with `.assert_called()`.\n\nIn step 4, the\
    \ tests are called to see that all tests are working as expected.\n\n## There's\
    \ more...\n\nMocks are very flexible and there are different ways of checking\
    \ whether they have been called and how. A few possibilities are listed here:\n\
    \n- `.assert_called_once()`: Raises an error if not called or called more than\
    \ once.\n- `.assert_called_with(args)`: Raises an error if not called or called\
    \ with different arguments. The arguments will be checked against the last call\
    \ of the mock.\n- `.call_count`: Counts the number of times it has been called."
  mdcn: "## 自动化测试流程\n\n前两个测试包含一个简单的断言来检查函数调用的结果，但 `test_division_by_zero` 要求你验证代码是否引发了一个异常。这通过一个使用\
    \ `pytest.raises` 的 `with` 代码块来实现：\n\n```python\ndef test_division_by_zero():\n\
    \    with pytest.raises(ZeroDivisionError):\n        division(1, 0)\n```\n\n如果调用没有产生异常，这个代码块将生成一个断言错误，从而让你检查其行为。请注意，需要将特定的异常作为参数传递。\n\
    \n步骤 4 运行测试，检查所有测试是否正确以及代码是否按预期执行。\n\n## 更多内容...\n\n为了能够定义要捕获的异常，你需要从模块代码或相关库中导入异常定义。\n\
    \n在 `with` 代码块内的任何部分引发异常都会被捕获。请尝试包含尽可能小的、预期会引发异常的调用，以避免捕获无关的异常。出于同样的原因，应声明最精确的异常。\n\
    \n当运行 `pytest` 而不指定文件时，它将尝试检测可能的测试文件并捕获子目录中的所有测试。请确保模块已按照 `__init__.py` 和 `conftest.py`\
    \ 的定义正确设置。\n\n> 我们将在本章后面更多地了解 `conftest.py`。\n\n## 另请参阅\n\n- 上一节的 *编写和执行测试用例*\
    \ 配方，以了解定义测试的基础知识。\n- 本章后面的 *使用 HTTP 调用模拟进行测试* 配方，以了解如何使用模拟特定库的测试模块。\n\n## 使用依赖模拟进行测试\n\
    \n使用 Python 的最大优势之一是拥有丰富的可用资源库。这包括标准库中的模块，例如用于读写 CSV 文件的 `csv` 模块或用于使用正则表达式的 `re`\
    \ 库。\n\n其他可能是外部的，例如用于解析 HTML 的 `Beautiful Soup` 或用于生成图表的 `matplotlib`。我们也可以创建自己的库，或者将代码组织在不同的文件中，并以可重用且提高可读性的方式封装功能。\n\
    \n在创建测试时，有时不建议在测试核心中使用外部元素和库调用。例如，为了测试一个报告是否被正确处理，可能需要读取一个包含该报告的 CSV 文件。但通过准备文件来准备测试，在这种情况下会变得繁琐，并且可能偏离测试的实际目标。\n\
    \n在这些情况下，模拟这些依赖项以简化测试或避免外部调用（如网络访问或其他硬件调用）可能是方便的。这种在测试期间替换外部依赖项的模拟被称为 `mock`。\n\
    \n> Mock 与单元测试密切相关，因为它们是小型、专注的测试，覆盖单个代码单元，如一个函数、一个类，甚至一个小模块。这允许你将这些代码单元与外部元素隔离测试，或者更准确地说，完全控制代码访问的外部元素。请记住，一个单元测试在不再是单元测试之前可以有多大，这是有争议的。\n\
    \n这可以通过 Python 标准库中的 `mock` 库来完成，它允许你替换外部依赖项的行为。\n\n## 准备工作\n\n我们将使用 `pytest`\
    \ 模块。我们应该安装该模块，将其添加到我们的 `requirements.txt` 文件中，如下所示：\n\n```\n$ echo \"pytest==5.4.1\"\
    \ >> requirements.txt\n$ pip install -r requirements.txt\n```\n\n我们将使用测试文件 `tests/test_dependencies.py`\
    \ 和 `code/dependencies.py`。你可以从 GitHub 仓库 `https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter12`\
    \ 下载它们，位于 `tests` 和 `code` 子目录下。\n\n目录结构应如下所示：\n\n```\n├── code\n│   ├── __init__.py\n\
    │   └── dependencies.py\n├── conftest.py\n└── tests\n    └── test_dependencies.py\n\
    ```\n\n## 操作步骤...\n\n1. `__init__.py` 文件和 `conftest.py` 是空的，但定义了模块的结构。\n2. 查看文件\
    \ `code/dependencies.py`，其中包含计算某些形状面积的定义：\n\n```python\nPI = 3.14159\n\ndef rectangle(sideA,\
    \ sideB):\n    return sideA * sideB\n\ndef circle(radius):\n    return 2 * PI\
    \ * radius\n\ndef calculate_area(shape, sizeA, sizeB=0):\n    if sizeA <= 0:\n\
    \        raise ValueError('sizeA needs to be positive')\n\n    if sizeB < 0:\n\
    \        raise ValueError('sizeB needs to be positive')\n\n    if shape == 'SQUARE':\n\
    \        return rectangle(sizeA, sizeA)\n\n    if shape == 'RECTANGLE':\n    \
    \    return rectangle(sizeA, sizeB)\n\n    if shape == 'CIRCLE':\n        return\
    \ circle(sizeA)\n\n    raise Exception(f'Shape {shape} not defined')\n```\n\n\
    3. 查看文件 `tests/test_dependencies.py` 中的测试，验证 `calculate_area` 的计算：\n\n```python\n\
    from unittest import mock\nfrom code.dependencies import calculate_area\n\ndef\
    \ test_square():\n    result = calculate_area('SQUARE', 2)\n    assert result\
    \ == 4\n\ndef test_rectangle():\n    result = calculate_area('RECTANGLE', 2, 3)\n\
    \    assert result == 6\n\ndef test_circle_with_proper_pi():\n    result = calculate_area('CIRCLE',\
    \ 2)\n    assert result == 12.56636\n\n@mock.patch('code.dependencies.PI', 3)\n\
    def test_circle_with_mocked_pi():\n    result = calculate_area('CIRCLE', 2)\n\
    \    assert result == 12\n\n@mock.patch('code.dependencies.rectangle')\ndef test_circle_with_mocked_rectangle(mocked_rectangle):\n\
    \    mocked_rectangle.return_value = 12\n    result = calculate_area('SQUARE',\
    \ 2)\n    assert result == 12\n    mocked_rectangle.assert_called()\n```\n\n4.\
    \ 运行 pytest 来执行测试文件：\n\n```\n$ pytest tests/test_dependencies.py\n=============================\
    \ test session starts =============================\nplatform darwin -- Python\
    \ 3.8.2, pytest-5.4.1, py-1.8.1,\npluggy-0.13.1\nrootdir: Python-Automation-Cookbook/Chapter12\n\
    collected 5 items\n\ntests/test_dependencies.py .....\n[100%]\n\n==============================\
    \ 5 passed in 0.10s ===============================\n```\n\n## 工作原理...\n\n代码模块的内容在步骤\
    \ 1 中定义。文件 `dependencies.py` 包含以下元素：\n\n- 变量 `PI` 的定义。\n- 两个内部函数，分别计算矩形（基于两条边）和圆形（基于半径）的面积。\n\
    - `calculate_area` 函数，它接受多种形状并将请求传递给正确的内部函数。例如，它理解正方形是一种四条边相等的矩形。\n\n在步骤 3 中，定义了测试文件。注意导入，包括\
    \ `mock` 模块和要测试的函数：\n\n```python\nfrom unittest import mock\nfrom code.dependencies\
    \ import calculate_area\n```\n\n前三个测试（`test_square`、`test_rectangle` 和 `test_circle_with_proper_pi`）是直接了当的。\n\
    \n测试 `test_circle_with_mocked_pi` 使用 `mock.patch` 装饰器将 `code.dependencies` 模块中的\
    \ `PI` 变量替换为 `3`：\n\n```python\n@mock.patch('code.dependencies.PI', 3)\ndef test_circle_with_mocked_pi():\n\
    \    result = calculate_area('CIRCLE', 2)\n\n    assert result == 12\n```\n\n\
    这在测试运行期间更改了 `PI` 常量，从而影响了结果。一旦测试完成，模拟被禁用，变量恢复为之前定义的值。\n\n测试 `test_circle_with_mocked_rectangle`\
    \ 模拟了 `rectangle` 函数。由于装饰器中没有定义替代品，它作为参数 `mocked_rectangle` 传递给函数：\n\n```python\n\
    @mock.patch('code.dependencies.rectangle')\ndef test_circle_with_mocked_rectangle(mocked_rectangle):\n\
    \    mocked_rectangle.return_value = 12\n\n    result = calculate_area('SQUARE',\
    \ 2)\n\n    assert result == 12\n    mocked_rectangle.assert_called()\n```\n\n\
    在测试期间，该函数被一个 `MagicMock` 对象替换。要指定此对象作为函数被调用时返回的值，请使用属性 `.return_value`。正如我们在结果中看到的，它替换了面积计算。也可以检查模拟是否已被调用，使用\
    \ `.assert_called()`。\n\n在步骤 4 中，调用测试以查看所有测试是否按预期工作。\n\n## 更多内容...\n\nMock 非常灵活，有多种方法可以检查它们是否被调用以及如何被调用。这里列出了一些可能性：\n\
    \n- `.assert_called_once()`：如果未被调用或被调用超过一次，则引发错误。\n- `.assert_called_with(args)`：如果未被调用或使用不同的参数调用，则引发错误。参数将根据模拟的最后一次调用进行检查。\n\
    - `.call_count`：计算被调用的次数。"
