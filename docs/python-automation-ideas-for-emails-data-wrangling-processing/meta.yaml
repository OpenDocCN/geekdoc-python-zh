    When dealing with large numbers of files, to repeat the execution of the script
    without starting from the beginning is a great advantage. A common problem is
    to process a gigantic amount of data, to have an error when processing is 80%
    complete, and then to restart the script from the beginning, having to redo all
    the work.


    If possible, invest a bit of time in saving partial results to disk or other storage
    places, so they can be skipped over, thereby speeding up the processing.


    > Keep the working dataset small for the purpose of development. It will allow
    you to iterate quickly and limits distractions. Also, store already processed
    data on disk.


    One of the `print` statements to produce feedback adds the `flush` parameter:


    ```

    print(f''Done with {filename} => {output_file}'', flush=True)

    ```


    The `flush` parameter will use the `print` statement to display the message immediately.
    If `flush` is not set, or if it''s set to `False`, the message won''t be printed
    instantly on screen, but goes to an intermediate buffer. The buffer will be printed
    when the operating system decides to do it, usually after a newline.


    This may cause a small delay. That delay can be noticeable in certain cases, such
    as in the last task executed. In that case, the print buffer might hold information,
    but the program exits before the information is printed. In a single-task program,
    before exiting, the buffer is printed, but that''s not guaranteed in multitask
    applications.


    The parallel nature of the multitask application may also mean that the order
    of the files being processed is not consistent from one run to the next. To avoid
    problems, each of the tasks should be independent of each other to avoid introducing
    dependencies.


    To learn more about `futures` and `executors`, check the Python documentation
    at https://docs.python.org/3/library/concurrent.futures.html.'
