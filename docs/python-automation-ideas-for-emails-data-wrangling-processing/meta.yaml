    While not required for the average, some of these measurements (such as the mode
    or median) may require working with the full data set in memory. This limits the
    amount of data that can be processed, especially for very big sets of data.


    > The debate over what exactly is *big data* is difficult, as there''s not a single
    point where regular data becomes big. While an in-depth discussion about big data
    is out of scope for this book, its main characteristic is that it is data that
    cannot be contained in a single computer, requiring distributed processing in
    different computers. This complicates the operation a lot, to the point of requiring
    specialized skills to deal with it. Before moving to that area, think about whether
    the data could fit on a specific server with as much memory as possible and if
    that could be helpful. This approach of "throwing hardware at a problem" can go
    a long way, and it''s typically cheaper than the work involved in re-architecting
    the code.


    Please note that calculating statistics can be a difficult challenge requiring
    specific knowledge to avoid problems such as outliers modifying the average, or
    more subtle issues such as unrepresentative sampling of the data. When calculating
    something complicated, double check your assumptions and verify that the result
    correctly represents the desired measure. This may seem like an easy task to do,
    but it can be trickier than expected.


