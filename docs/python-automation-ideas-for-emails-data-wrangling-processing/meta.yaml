  md: "Dealing with Communication Channels\n\nWe will start by understanding how to\
    \ use templates to generate good emails.\n\n# Working with email templates\n\n\
    To send an email, we first need to generate its content. In this recipe, we'll\
    \ see how to generate a proper template, in both text-only style and HTML.\n\n\
    # Getting ready\n\nWe should start by installing the mistune module, which will\
    \ compile Markdown documents into HTML. We will also use the jinja2 module to\
    \ combine HTML with our text:\n\n```\n$ echo \"mistune==0.8.4\" >> requirements.txt\n\
    $ echo \"jinja2==2.11.1\" >> requirements.txt\n$ pip install -r requirements.txt\n\
    ```\n\nIn this book's GitHub repository, there are a couple of templates we will\
    \ use—email_template.md at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter09/email_template.md\
    \ and a template for styling, email_styling.html, at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter09/email_styling.html.\n\
    \n# How to do it...\n\n+   1. Import the modules:\n    >>> import mistune\n  \
    \  >>> import jinja2\n2. Read both templates from disk:\n    >>> with open('email_template.md')\
    \ as md_file:\n    ...     markdown = md_file.read()\n\n    >>> with open('email_styling.html')\
    \ as styling_file:\n    ...     styling = styling_file.read()"
