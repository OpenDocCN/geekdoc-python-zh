  - '[PAGE 298]


    8. The result will be displayed in a new window:


    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_298_0.png)


    # How it works...


    Steps 1 and 2 of the *How to do it...* section prepare the imports and the data
    that will be displayed by the bar chart. In *step 3*, the data is split into different
    arrays to prepare the input for `matplotlib`. Basically, each data sequence is
    stored in a different array.


    *Step 4* draws the data. Each data sequence gets a call to `.bar`, specifying
    its position and values. Labels do the same as `.xticks`. To separate each of
    the bars around the labels, the first one is displaced to the left and the third
    to the right.


    An annotation is added above the bar for `ProductC` in the second quarter. Note
    that the annotation includes the point in `xy` and the text location in `xytext`.


    In *step 6*, the legend is added. Notice that the labels need to be added to the
    data in the same order as the data was inputted. The legend is located automatically
    in an area that doesn''t cover any data. `Arrowprops` tells the arrow to point
    to the data.'
  - '[PAGE 299]


    Developing Stunning Graphs


    Finally, the graph is drawn in step 7 by calling .show.


    > Calling .show blocks the execution of the program. The program will resume when
    the window is closed.


    # There''s more...


    Legends will be displayed automatically in most cases with just a call to .legend.
    If you need to customize the order in which they appear, you may refer each label
    to a specific element. For example, this way (note it calls ProductA the valueC
    series):


    ```

    >>> valueA = plt.bar([p - WIDTH for p in POS], VALUESA, width=WIDTH)

    >>> valueB = plt.bar([p for p in POS], VALUESB, width=WIDTH)

    >>> valueC = plt.bar([p + WIDTH for p in POS], VALUESC, width=WIDTH)

    >>> plt.legend((valueC, valueB, valueA), LEGEND)

    <matplotlib.legend.Legend object at 0x112273fa0>

    ```


    The location of the legend can also be changed manually, through the loc parameter.
    By default, it is best and it will draw the legend over an area where there''s
    the least overlap of data (ideally none). But values such as right, upper, left,
    and so on can be used, or a specific (X, Y) tuple.


    Another option is to plot the legend outside of the graph using the bbox_to_anchor
    option. In this case, the legend is attached to the (X, Y) of the bounding box,
    where 0 is the bottom-left corner of the graph and 1 is the upper-right corner.
    This may cause the legend to be clipped by the external border, so you may need
    to adjust where the graph starts and ends with .subplots_adjust:


    ```

    >>> plt.legend(LEGEND, title=''Products'', bbox_to_anchor=(1, 0.8))

    <matplotlib.legend.Legend object at 0x11963b910>

    >>> plt.subplots_adjust(right=0.80)

    ```


    Adjusting the bbox_to_anchor and .subplots_adjust parameters requires a little
    bit of trial and error in producing the expected result.'
  - "[PAGE 300]\n\n.subplots_adjust references the positions as the position of the\
    \ axis where it will be displayed. This means that right=0.80 will leave 20% of\
    \ the screen on the right of the plot, while the default for left is 0.125, meaning\
    \ it leaves 12.5% of the space on the left of the plot. See the documentation\
    \ for further details: https://matplotlib.org/api/_as_gen/matplotlib.pyplot.subplots_adjust.html.\n\
    \nThe annotations can be done in different styles and can be tweaked with different\
    \ options regarding the way to connect and so on. For example, this code will\
    \ create an arrow with the fancy style connecting with a curve. The result is\
