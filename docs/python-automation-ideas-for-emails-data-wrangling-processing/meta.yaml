    \ thing\n    3. Some extra detail\n\n    Best regards,\n\n    *The email team*\n\
    \    ```\n8. 在浏览器中检查 HTML 版本：\n\n    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_313_0.png)\n\
    \n    图 9.1：HTML 文件的渲染图像\n\n### 工作原理...\n\n步骤 1 导入了稍后将使用的模块，步骤 2 读取了将要渲染的两个模板。`email_template.md`\
    \ 是内容的基础，它是一个 Markdown 模板。`email_styling.html` 是一个 HTML 模板，包含基本的 HTML 外围结构和 CSS\
