  md: '# Developing Stunning Graphs


    Because of the way `matplotlib` works, it requires an X component, as well as
    a Y component. In this case, our X component is just a sequence of increasing
    numbers, as many as there are data points. We store that in the variable `POS`.
    This positions each of the Y values and works as a temporal series. In `VALUES`,
    we store the numeric value of the sales as a sequence, and in `LABELS`, we store
    the associated label for each data point. All that preparation work is done in
    *step 3*.


    *Step 4* creates the bar graph with the sequences X (`POS`) and Y (`VALUES`).
    These define our bars. To specify the period it refers to, we put labels on the
    *x-axis* for each value with `.xticks` in the same way. To clarify the meaning,
    we add a label with `.ylabel`.


    To display the resulting graph, *step 5* calls `.show`, which opens a new window
    with the result.


    > Calling `.show` blocks the execution of the program. The program will resume
    when the window is closed.


    # There''s more...


    You may want to change the format in which the values are presented. In our example,
    maybe the numbers represent millions of dollars. To do so, you can add a formatter
    to the *y-axis*, so the values represented there will have it applied to them:


    ```

    >>> from matplotlib.ticker import FuncFormatter


    >>> def value_format(value, position):

    ...     return ''$ {}M''.format(int(value))


    >>> axes = plt.gca()

    >>> axes.yaxis.set_major_formatter(FuncFormatter(value_format))

    ```


    `value_format` is a function that returns a value based on the value and position
    of the data. Here, it will return the value 100 as $100M.'
