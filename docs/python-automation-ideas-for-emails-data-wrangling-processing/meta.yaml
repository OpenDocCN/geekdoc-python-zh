    the difference with the step 6 pattern in the previous recipe. In this case, the
    pattern is not only the number, but it includes the prefix text, even if we then
    extract only the number:


    ```

    >>> re.search(r''the phone number is ([\d-]+)'', ''37: the phone number is 1234-567-890'')

    <_sre.SRE_Match object; span=(4, 36), match=''the phone number is 1234-

    ```'
