- md: "Developing Stunning Graphs\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_301_0.png)\n\
    \nThe full matplotlib documentation can be found here: https://matplotlib.org/.\
    \ In particular, the guide for legends can be found here: https://matplotlib.org/users/legend_guide.html#plotting-guide-legend.\
    \ The guide for annotations can be found here: https://matplotlib.org/users/annotations.html.\n\
    \n## See also\n\n- The *Drawing stacked bars* recipe, earlier in this chapter,\
    \ to learn how to plot accumulated values as bars that will benefit from a legend.\n\
    - The *Combining graphs* recipe, next in this chapter, to learn how to add multiple\
    \ plots to a single graph.\n\n## Combining graphs\n\nMore than one plot can be\
    \ combined in the same graph. In this recipe, we'll see how to present data in\
    \ the same plot, on two different axes, and how to add more plots to the same\
    \ graph.\n\n## Getting ready\n\nWe need to install matplotlib in our virtual environment:\n\
    \n```\n$ echo \"matplotlib==3.2.1\" >> requirements.txt\n$ pip install -r requirements.txt\n\
    ```\n\nIf you are using macOS, you may get an error like this: **RuntimeError:\
    \ Python is not installed as a framework**. See the matplotlib documentation on\
    \ how to fix it: https://matplotlib.org/faq/osx_framework.html.\n\n## How to do\
    \ it...\n\n1. Import matplotlib:\n    ```python\n    >>> import matplotlib.pyplot\
    \ as plt\n    ```\n\n2. Prepare the data to be displayed on the graph and the\
    \ legends that should be displayed. Each of the lines is composed of the time\
    \ label, sales of ProductA, and sales of ProductB. Notice how ProductB has a much\
    \ higher value than A:\n    ```python\n    >>> DATA = (\n    ...     ('Q1 2017',\
    \ 100, 3000, 3),\n    ...     ('Q2 2017', 105, 3200, 5),\n    ...     ('Q3 2017',\
    \ 125, 2900, 7),\n    ...     ('Q4 2017', 115, 3100, 3),\n    ... )\n    ```\n\
    \n3. Prepare the data in independent arrays:\n    ```python\n    >>> POS = list(range(len(DATA)))\n\
    \    >>> VALUESA = [valueA for label, valueA, valueB, valueC in DATA]\n    >>>\
    \ VALUESB = [valueB for label, valueA, valueB, valueC in DATA]\n    >>> VALUESC\
    \ = [valueC for label, valueA, valueB, valueC in DATA]\n    >>> LABELS = [label\
    \ for label, valueA, valueB, valueC in DATA]\n    ```\n    Note that this expands\
    \ and creates a list for each of the values.\n\n    > The values can also be expanded\
    \ with this: `LABELS, VALUESA, VALUESB, VALUESC = ZIP(*DATA)`.\n\n4. Create the\
    \ first subplot:\n    ```python\n    >>> plt.subplot(2, 1, 1)\n    <matplotlib.axes._subplots.AxesSubplot\
    \ object at 0x115a91cd0>\n    ```\n\n5. Create a bar graph with information about\
    \ VALUESA:\n    ```python\n    >>> valueA = plt.bar(POS, VALUESA)\n    >>> plt.ylabel('Sales\
    \ A')\n    Text(0, 0.5, 'Sales A')\n    ```\n\n6. Create a different y-axis, and\
    \ add information about VALUESB as a line plot:\n    ```python\n    >>> plt.twinx()\n\
    \    <matplotlib.axes._subplots.AxesSubplot object at 0x118b0c160>\n    >>> valueB\
    \ = plt.plot(POS, VALUESB, 'o-', color='red')\n    >>> plt.ylabel('Sales B')\n\
    \    Text(0, 0.5, 'Sales B')\n    >>> plt.xticks(POS, LABELS)\n    <REDACTED>\n\
    \    ```\n\n7. Create another subplot and fill it with VALUESC:\n    ```python\n\
    \    >>> plt.subplot(2, 1, 2)\n    <matplotlib.axes._subplots.AxesSubplot object\
    \ at 0x115abdfd0>\n    >>> plt.plot(POS, VALUESC)\n    [<matplotlib.lines.Line2D\
    \ object at 0x118c7c0d0>]\n    >>> plt.gca().set_ylim(ymin=0)\n    (0.0, 7.2)\n\
    \    >>> plt.xticks(POS, LABELS)\n    <REDACTED>\n    ```\n\n8. Display the graph:\n\
    \    ```python\n    >>> plt.show()\n    ```\n\n9. The result will be displayed\
    \ in a new window:\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_304_0.png)\n\n\
    ## How it works...\n\nIn *Step 1* of the *How to do it...* section, all the required\
    \ imports for the module are called.\n\n*Step 2* presents the data in a useable\
    \ format.\n\n*Step 3* is a preparation step that splits the data into different\
    \ arrays for the next steps.\n\n*Step 4* creates a new `.subplot`. This splits\
    \ the full drawing into two elements. The parameters are number of rows, columns,\
    \ and the selected subplot. So, we create two subplots in a column and draw in\
    \ the first one.\n\nStep 5 prints a `.bar` plot in this subplot using VALUESA\
    \ data, and labels the y-axis with Sales A using `.ylabel`.\n\nStep 6 creates\
    \ a new y-axis with `.twinx`, drawing VALUESB as a line plot through `.plot`.\
    \ The label is marked with `.ylabel` as Sales B. The x-axis is labeled using `.xticks`.\n\
    \n> The VALUESB plot is set to red to avoid both plots having the same color.\
    \ By default, the first color is the same in both cases, and that will lead to\
    \ confusion. The data points are marked with the 'o' option.\n\nIn step 7, we\
    \ changed to the second subplot using `.subplot`. The plot prints VALUESC as a\
    \ line, and again puts the labels on the x-axis with `.xticks` and sets the minimum\
    \ of the y-axis to 0. The graph is then displayed in step 8.\n\n## There's more...\n\
    \nPlots with multiple axes are complicated to read as a general rule. Use them\
    \ only when there's a good reason to do so and the data is highly correlated.\n\
    \n> By default, the y-axis in line plots will try to present information between\
    \ the minimum and maximum Y values. Truncating the axis is normally not the best\
    \ way to present information, as it can distort the perceived differences. For\
    \ example, changing values in the range from 10 to 11 can look like a huge deal\
    \ if the graph goes from 10 to 11, but this is less than 10%. Setting the y-axis\
    \ minimum to 0 with `plt.gca().set_ylim(ymin=0)` is a good idea, especially with\
    \ two different axes.\n\nThe call to select the subplot will first go by row,\
    \ then by column, so `.subplot(2, 2, 3)` will select the subplot in the first\
    \ column, second row.\n\nThe divided subplot grid can be changed. A first call\
    \ to `.subplot(2, 2, 1)` and `.subplot(2, 2, 2)`, and then calling `.subplot(2,\
    \ 1, 2)`, will create a structure with two small plots in the first row and a\
    \ wider one in the second. Going back will overwrite previously drawn subplots.\n\
    \nThe full matplotlib documentation can be found here: https://matplotlib.org/.\
    \ In particular, the guide for legends can be found here: https://matplotlib.org/users/legend_guide.html#plotting-guide-legend.\
    \ The guide for annotations can be found here: https://matplotlib.org/users/annotations.html.\n\
    \n## See also\n\n- The *Drawing multiple lines* recipe, earlier in this chapter,\
    \ which shows alternatives to displaying multiple values in a single graph.\n\
    - The *Visualizing maps* recipe, earlier in this chapter, to learn how to display\
    \ other kinds of rich graphs with multiple data.\n\n## Saving charts\n\nOnce a\
    \ chart is ready, we can store it on the hard drive so it can be referenced in\
    \ other documents. In this recipe, we'll see how to save charts in different formats.\n\
    \n## Getting ready\n\nWe need to install `matplotlib` in our virtual environment:\n\
    \n```\n$ echo \"matplotlib==3.2.1\" >> requirements.txt\n$ pip install -r requirements.txt\n\
    ```\n\nIf you are using macOS, you may get an error like this: **RuntimeError:\
    \ Python is not installed as a framework**. See the `matplotlib` documentation\
    \ on how to fix it: https://matplotlib.org/faq/osx_framework.html.\n\n## How to\
    \ do it...\n\n1. Import `matplotlib`:\n    ```python\n    >>> import matplotlib.pyplot\
    \ as plt\n    ```\n\n2. Prepare the data to be displayed on the graph and split\
    \ it into different arrays:\n    ```python\n    >>> DATA = (\n    ...     ('Q1\
    \ 2017', 100),\n    ...     ('Q2 2017', 150),\n    ...     ('Q3 2017', 125),\n\
    \    ...     ('Q4 2017', 175),\n    ... )\n    >>> POS = list(range(len(DATA)))\n\
    \    >>> VALUES = [value for label, value in DATA]\n    >>> LABELS = [label for\
    \ label, value in DATA]\n    ```\n\n3. Create a bar graph with the data:\n   \
    \ ```python\n    >>> plt.bar(POS, VALUES)\n    <BarContainer object of 4 artists>\n\
    \    >>> plt.xticks(POS, LABELS)\n    <REDACTED>\n    >>> plt.ylabel('Sales')\n\
    \    Text(0, 0.5, 'Sales')\n    ```\n\n4. Save the graph to the hard drive:\n\
    \    ```python\n    >>> plt.savefig('data.png')\n    ```\n\n5. Open the new file\
    \ data.png to show the graph, as follows:\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_307_0.png)\n\
    \nFigure 8.17: Graph saved in PNG format\n\n## How it works...\n\nAfter importing\
    \ and preparing the data in steps 1 and 2 in the *How to do it...* section, the\
    \ graph is generated in step 3 by calling `.bar`. A `.ylabel` is added and the\
    \ x-axis is labelled with the proper time description through `.xticks`.\n\nStep\
    \ 4 saves the file to the hard drive with the name `data.png`.\n\n## There's more...\n\
    \nThe resolution of the image can be determined through the `dpi` parameter. This\
    \ will affect the size of the file. Use resolutions between 72 and 300. Lower\
    \ ones will be difficult to read, while higher ones won't make sense unless the\
    \ size of the graph is humongous:\n\n```python\n>>> plt.savefig('data.png', dpi=72)\n\
    ```\n\n`matplotlib` understands how to store the most common file formats, such\
    \ as JPEG, PDF, and PNG. It will be used automatically when the filename has the\
    \ proper extension.\n\n> Unless you have a specific requirement, use PNG. It is\
    \ very efficient at storing graphs with limited colors compared to other formats.\
    \ If you need to find all the supported files, you can call `plt.gcf().canvas.get_supported_filetypes()`.\n\
    \nThe full `matplotlib` documentation can be found here: https://matplotlib.org/.\
    \ In particular, the guide for legends can be found here: https://matplotlib.org/users/legend_guide.html#plotting-guide-legend.\
    \ The guide for annotations can be found here: https://matplotlib.org/users/annotations.html.\n\
    \n## See also\n\n- The *Plotting a simple sales graph* recipe, earlier in this\
    \ chapter, to learn the basics of plotting a bar graph.\n- The *Adding legends\
    \ and annotations* recipe, earlier in this chapter, to learn how to add context\
    \ information to graphs."
  mdcn: "绘制精美图表\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_301_0.png)\n\n完整的 matplotlib\
    \ 文档可在此处找到：https://matplotlib.org/。特别是，图例指南可在此处找到：https://matplotlib.org/users/legend_guide.html#plotting-guide-legend。注释指南可在此处找到：https://matplotlib.org/users/annotations.html。\n\
    \n## 另请参阅\n\n- 本章前面的*绘制堆叠条形图*食谱，了解如何绘制受益于图例的累积值条形图。\n- 本章接下来的*组合图表*食谱，了解如何向单个图表添加多个绘图。\n\
    \n## 组合图表\n\n多个绘图可以组合在同一个图表中。在这个食谱中，我们将看到如何在同一个绘图中、两个不同的坐标轴上呈现数据，以及如何向同一个图表添加更多绘图。\n\
    \n## 准备工作\n\n我们需要在虚拟环境中安装 matplotlib：\n\n```\n$ echo \"matplotlib==3.2.1\" >>\
    \ requirements.txt\n$ pip install -r requirements.txt\n```\n\n如果你使用的是 macOS，可能会遇到这样的错误：**RuntimeError:\
    \ Python is not installed as a framework**。请参阅 matplotlib 文档了解如何修复：https://matplotlib.org/faq/osx_framework.html。\n\
    \n## 操作步骤...\n\n1. 导入 matplotlib：\n    ```python\n    >>> import matplotlib.pyplot\
    \ as plt\n    ```\n\n2. 准备要在图表上显示的数据以及应显示的图例。每一行由时间标签、产品 A 的销售额和产品 B 的销售额组成。注意产品\
    \ B 的值比 A 高得多：\n    ```python\n    >>> DATA = (\n    ...     ('Q1 2017', 100,\
    \ 3000, 3),\n    ...     ('Q2 2017', 105, 3200, 5),\n    ...     ('Q3 2017', 125,\
    \ 2900, 7),\n    ...     ('Q4 2017', 115, 3100, 3),\n    ... )\n    ```\n\n3.\
    \ 将数据准备成独立的数组：\n    ```python\n    >>> POS = list(range(len(DATA)))\n    >>> VALUESA\
    \ = [valueA for label, valueA, valueB, valueC in DATA]\n    >>> VALUESB = [valueB\
    \ for label, valueA, valueB, valueC in DATA]\n    >>> VALUESC = [valueC for label,\
    \ valueA, valueB, valueC in DATA]\n    >>> LABELS = [label for label, valueA,\
    \ valueB, valueC in DATA]\n    ```\n    注意，这会展开并为每个值创建一个列表。\n\n    > 也可以使用以下方式展开值：`LABELS,\
    \ VALUESA, VALUESB, VALUESC = ZIP(*DATA)`。\n\n4. 创建第一个子图：\n    ```python\n   \
    \ >>> plt.subplot(2, 1, 1)\n    <matplotlib.axes._subplots.AxesSubplot object\
    \ at 0x115a91cd0>\n    ```\n\n5. 创建一个包含 VALUESA 信息的条形图：\n    ```python\n    >>>\
    \ valueA = plt.bar(POS, VALUESA)\n    >>> plt.ylabel('Sales A')\n    Text(0, 0.5,\
    \ 'Sales A')\n    ```\n\n6. 创建一个不同的 y 轴，并将 VALUESB 的信息添加为折线图：\n    ```python\n\
    \    >>> plt.twinx()\n    <matplotlib.axes._subplots.AxesSubplot object at 0x118b0c160>\n\
    \    >>> valueB = plt.plot(POS, VALUESB, 'o-', color='red')\n    >>> plt.ylabel('Sales\
    \ B')\n    Text(0, 0.5, 'Sales B')\n    >>> plt.xticks(POS, LABELS)\n    <REDACTED>\n\
    \    ```\n\n7. 创建另一个子图并用 VALUESC 填充：\n    ```python\n    >>> plt.subplot(2, 1,\
    \ 2)\n    <matplotlib.axes._subplots.AxesSubplot object at 0x115abdfd0>\n    >>>\
    \ plt.plot(POS, VALUESC)\n    [<matplotlib.lines.Line2D object at 0x118c7c0d0>]\n\
    \    >>> plt.gca().set_ylim(ymin=0)\n    (0.0, 7.2)\n    >>> plt.xticks(POS, LABELS)\n\
    \    <REDACTED>\n    ```\n\n8. 显示图表：\n    ```python\n    >>> plt.show()\n    ```\n\
    \n9. 结果将显示在一个新窗口中：\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_304_0.png)\n\n\
    ## 工作原理...\n\n在*操作步骤...*部分的*步骤 1*中，调用了模块所需的所有导入。\n\n*步骤 2*以可用的格式呈现数据。\n\n*步骤 3*是一个准备步骤，将数据拆分为不同的数组以供后续步骤使用。\n\
    \n*步骤 4*创建一个新的 `.subplot`。这将整个绘图分成两个元素。参数是行数、列数和选定的子图。因此，我们在一列中创建两个子图并在第一个中绘图。\n\
    \n步骤 5 使用 VALUESA 数据在此子图中打印一个 `.bar` 图，并使用 `.ylabel` 将 y 轴标记为 Sales A。\n\n步骤 6\
    \ 使用 `.twinx` 创建一个新的 y 轴，通过 `.plot` 将 VALUESB 绘制为折线图。标签使用 `.ylabel` 标记为 Sales\
    \ B。x 轴使用 `.xticks` 标记。\n\n> VALUESB 绘图设置为红色，以避免两个绘图具有相同的颜色。默认情况下，第一种颜色在两种情况下是相同的，这会导致混淆。数据点用\
    \ 'o' 选项标记。\n\n在步骤 7 中，我们使用 `.subplot` 切换到第二个子图。该绘图将 VALUESC 打印为一条线，并再次使用 `.xticks`\
    \ 将标签放在 x 轴上，并将 y 轴的最小值设置为 0。然后在步骤 8 中显示图表。\n\n## 更多内容...\n\n通常，具有多个轴的图表阅读起来比较复杂。仅在有充分理由且数据高度相关时才使用它们。\n\
    \n> 默认情况下，折线图中的 y 轴将尝试在最小和最大 Y 值之间呈现信息。截断轴通常不是呈现信息的最佳方式，因为它会扭曲感知的差异。例如，如果图表从 10\
    \ 到 11，那么 10 到 11 范围内的值变化看起来可能很重要，但这不到 10%。使用 `plt.gca().set_ylim(ymin=0)` 将 y\
    \ 轴最小值设置为 0 是一个好主意，尤其是在有两个不同轴的情况下。\n\n选择子图的调用将首先按行，然后按列进行，因此 `.subplot(2, 2, 3)`\
    \ 将选择第一列、第二行的子图。\n\n划分的子图网格可以更改。首先调用 `.subplot(2, 2, 1)` 和 `.subplot(2, 2, 2)`，然后调用\
    \ `.subplot(2, 1, 2)`，将创建一个结构，第一行有两个小图，第二行有一个更宽的图。返回将覆盖先前绘制的子图。\n\n完整的 matplotlib\
    \ 文档可在此处找到：https://matplotlib.org/。特别是，图例指南可在此处找到：https://matplotlib.org/users/legend_guide.html#plotting-guide-legend。注释指南可在此处找到：https://matplotlib.org/users/annotations.html。\n\
    \n## 另请参阅\n\n- 本章前面的*绘制多条线*食谱，展示了在单个图表中显示多个值的替代方法。\n- 本章前面的*可视化地图*食谱，了解如何显示具有多种数据的其他类型的丰富图表。\n\
    \n## 保存图表\n\n图表准备好后，我们可以将其存储在硬盘上，以便在其他文档中引用。在这个食谱中，我们将看到如何以不同格式保存图表。\n\n## 准备工作\n\
    \n我们需要在虚拟环境中安装 `matplotlib`：\n\n```\n$ echo \"matplotlib==3.2.1\" >> requirements.txt\n\
    $ pip install -r requirements.txt\n```\n\n如果你使用的是 macOS，可能会遇到这样的错误：**RuntimeError:\
    \ Python is not installed as a framework**。请参阅 `matplotlib` 文档了解如何修复：https://matplotlib.org/faq/osx_framework.html。\n\
    \n## 操作步骤...\n\n1. 导入 `matplotlib`：\n    ```python\n    >>> import matplotlib.pyplot\
    \ as plt\n    ```\n\n2. 准备要在图表上显示的数据并将其拆分为不同的数组：\n    ```python\n    >>> DATA\
    \ = (\n    ...     ('Q1 2017', 100),\n    ...     ('Q2 2017', 150),\n    ... \
    \    ('Q3 2017', 125),\n    ...     ('Q4 2017', 175),\n    ... )\n    >>> POS\
    \ = list(range(len(DATA)))\n    >>> VALUES = [value for label, value in DATA]\n\
    \    >>> LABELS = [label for label, value in DATA]\n    ```\n\n3. 使用数据创建条形图：\n\
    \    ```python\n    >>> plt.bar(POS, VALUES)\n    <BarContainer object of 4 artists>\n\
    \    >>> plt.xticks(POS, LABELS)\n    <REDACTED>\n    >>> plt.ylabel('Sales')\n\
    \    Text(0, 0.5, 'Sales')\n    ```\n\n4. 将图表保存到硬盘：\n    ```python\n    >>> plt.savefig('data.png')\n\
    \    ```\n\n5. 打开新文件 data.png 以显示图表，如下所示：\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_307_0.png)\n\
    \n图 8.17：以 PNG 格式保存的图表\n\n## 工作原理...\n\n在*操作步骤...*部分的步骤 1 和 2 中导入和准备数据后，步骤 3 通过调用\
    \ `.bar` 生成图表。添加了 `.ylabel`，并通过 `.xticks` 用适当的时间描述标记 x 轴。\n\n步骤 4 将文件以名称 `data.png`\
    \ 保存到硬盘。\n\n## 更多内容...\n\n图像的分辨率可以通过 `dpi` 参数确定。这将影响文件的大小。使用 72 到 300 之间的分辨率。较低的分辨率将难以阅读，而较高的分辨率除非图表尺寸巨大，否则没有意义：\n\
    \n```python\n>>> plt.savefig('data.png', dpi=72)\n```\n\n`matplotlib` 知道如何存储最常见的文件格式，例如\
    \ JPEG、PDF 和 PNG。当文件名具有正确的扩展名时，它将自动使用。\n\n> 除非有特定要求，否则请使用 PNG。与其他格式相比，它在存储颜色有限的图表方面非常高效。如果需要查找所有支持的文件，可以调用\
    \ `plt.gcf().canvas.get_supported_filetypes()`。\n\n完整的 `matplotlib` 文档可在此处找到：https://matplotlib.org/。特别是，图例指南可在此处找到：https://matplotlib.org/users/legend_guide.html#plotting-guide-legend。注释指南可在此处找到：https://matplotlib.org/users/annotations.html。\n\
    \n## 另请参阅\n\n- 本章前面的*绘制简单销售图表*食谱，了解绘制条形图的基础知识。\n- 本章前面的*添加图例和注释*食谱，了解如何向图表添加上下文信息。"
