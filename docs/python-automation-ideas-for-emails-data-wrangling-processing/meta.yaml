  - '[PAGE 331]


    Dealing with Communication Channels


    3. Prepare the email to be sent. Here, there is an HTML version and an alternative
    plain text one:


    ```

    >>> text = "Hi!\nThis is the text version linking to https://www.packtpub.com/\nCheers!"

    >>> html = ''''''<html><head></head><body>

    ...     <p>Hi!<br>

    ...         This is the HTML version linking to <a href="https://www.packtpub.com/">Packt</a><br>

    ...     </p>

    ... </body></html>''''''

    ```


    4. Set up the data to send to Mailgun:


    ```

    >>> data = {

    ...     ''from'': f''Sender <{FROM}>'',

    ...     ''to'': f''Jaime Buelta <{TO}>'',

    ...     ''subject'': ''An interesting email!'',

    ...     ''text'': text,

    ...     ''html'': html,

    ... }

    ```


    5. Make the call to the API:


    ```

    >>> response = requests.post(f"https://api.mailgun.net/v3/{DOMAIN}/messages",
    auth=auth, data=data)

    >>> response.json()

    {''id'': ''<YOUR-ID.mailgun.org>'', ''message'': ''Queued. Thank you.''}

    ```


    6. Retrieve the events and check the email has been delivered:


    ```

    >>> response_events = requests.get(f''https://api.mailgun.net/v3/{DOMAIN}/events'',
    auth=auth)

    >>> response_events.json()[''items''][0][''recipient''] == TO

    True

    >>> response_events.json()[''items''][0][''event'']

    ''delivered''

    ```


    7. The email should appear in your inbox. As it was sent through the sandbox environment,
    be sure to check your spam folder if it doesn''t show up directly.'
  - "[PAGE 332]\n\n# How it works...\n\nStep 1 imports the requests module to be used\
    \ later. The credentials and the basic information in the message are defined\
    \ in step 2, and should be extracted from the Mailgun web interface, as shown\
    \ previously.\n\nStep 3 defines the email that will be sent. Step 4 structures\
    \ the information in the way Mailgun expects. Notice the html and text fields.\
    \ By default, it will set HTML as the preferred option and the plain text option\
    \ as an alternative. The format for TO and FROM should be in the Name <address>\
    \ format. You can use commas to separate multiple recipients in TO.\n\nThe call\
    \ to the API is made in step 5. It is a POST call to the messages endpoint. The\
    \ data is transferred in the standard way, and basic authentication is used with\
    \ the auth parameter. Notice the definition in step 2. All calls to Mailgun should\
    \ include this auth parameter. It returns a message, notifying you that it was\
    \ successful, and then the message is queued.\n\nIn step 6, a call to retrieve\
    \ the events through a GET request is made. This will show the latest actions\
    \ performed, the last of which will be the recent send. Information about delivery\
    \ status can also be found here.\n\n# There's more...\n\nTo send emails, you'll\
    \ need to set up the domain with which to send it, instead of using the sandbox\
    \ environment. You can find the instructions on how to do this here: https://documentation.mailgun.com/en/latest/quickstart-sending.html#verify-your-domain.\
    \ This requires you to change your DNS records to verify that you are the legitimate\
    \ owner of the domain. This also increases the deliverability of emails.\n\nThe\
