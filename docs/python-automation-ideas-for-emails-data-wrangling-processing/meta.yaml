    # See also


    +   - *Chapter 1, Let''s Begin Our Automation Journey*, for more information about
    regular expressions and other ways of parsing information.


    # Adding subscribers to an email newsletter


    A common marketing tool is email newsletters. They are convenient ways of sending
    information to multiple targets. A good newsletter system is difficult to implement,
    and the recommended way is to use ones available on the market. A well-known one
    is **MailChimp** (https://mailchimp.com/).


    MailChimp has a lot of possibilities, but the interesting one in regard to this
    book is its API, which can be scripted to automate tools. This RESTful API can
    be accessed through Python. In this recipe, we will see how to add more subscribers
    to an existing list.


    # Getting ready


    As we will use MailChimp, we need to have an account with them. You can create
    a free account at https://login.mailchimp.com/signup/.


    After creating the account, be sure to at least have a list that we can add subscribers
    to. As part of the registration process, it may have been created for you. It
    will appear under **Audience -> Manage Audience -> View Audience**:


    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_324_0.png)'
  - "[PAGE 325]\n\nDealing with Communication Channels\n\nThe **Audience** will contain\
    \ the subscribed users.\n\nFor the API, we'll need an API key. Go to **Account\
    \ -> Extras -> API keys** and create a new one:\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_325_0.png)\n\
    \nFigure 9.4: A screenshot of API keys in MailChimp\n\nWe will use the `requests`\
    \ module to access the API. Add it to your virtual environment:\n\n```\n\n$ echo\
    \ \"requests==2.23\" >> requirements.txt\n$ pip install -r requirements.txt\n\
    ```\n\nThe MailChimp API uses the concept of the **data center (DC)** that your\
    \ account uses. This can be obtained from the last 4 digits of your API key or\
    \ from the start of the URL from the MailChimp admin site. For example, us19.\n\
    \n# How to do it...\n\n+   1. Import the `requests` module:\n   python\n   >>>\
    \ import requests"
  - "[PAGE 326]\n\n2. Define the authentication and base URLs. The base URL requires\
    \ your dc at the start (such as us19):\n\n```\n>>> API_KEY = 'your secret key'\n\
    >>> BASE = 'https://<dc>.api.mailchimp.com/3.0'\n>>> auth = ('user', API_KEY)\n\
    ```\n\n3. Obtain all your lists:\n\n```\n>>> url = f'{BASE}/lists'\n>>> response\
    \ = requests.get(url, auth=auth)\n>>> result = response.json()\n```\n\n4. Filter\
    \ your lists to obtain the href for the required list:\n\n```\n>>> LIST_NAME =\
    \ 'Your list name'\n>>> this_list = [l for l in result['lists'] if l['name'] ==\
    \ LIST_NAME][0]\n>>> list_url = [l['href'] for l in this_list['_links'] if l['rel']\
    \ == 'self'][0]\n```\n\n5. With the list URL, you can obtain the URL for the members\
    \ of the list:\n\n```\n>>> response = requests.get(list_url, auth=auth)\n>>> result\
    \ = response.json()\n>>> result['stats']\n{'member_count': 1, 'unsubscribe_count':\
    \ 0, 'cleaned_count': 0, ...}\n>>> members_url = [l['href'] for l in result['_links']\
    \ if l['rel'] == 'members'][0]\n```\n\n6. The list of members can be retrieved\
    \ through a GET request to members_url:\n\n```\n>>> response = requests.get(members_url,\
    \ auth=auth)\n>>> result = response.json()\n>>> len(result['members'])\n1\n```\n\
    \n7. Append a new member to the list:\n\n```\n>>> new_member = {\n    'email_address':\
    \ 'test@test.com',\n    'status': 'subscribed',\n}\n>>> response = requests.post(members_url,\
    \ json=new_member, auth=auth)\n```"
  - '[PAGE 327]


    Dealing with Communication Channels


    8. Retrieving the list of users with a GET obtains both users:


    ```

    >>> response = requests.get(members_url, auth=auth)

    >>> result = response.json()

    >>> len(result[''members''])

    2

    ```


    # How it works...


    After importing the requests module in step 1, we define the basic values to connect
    in step 2: the base URL and the credentials. Note that for authentication, we
    only require the API key as the password, and any user (as described by the MailChimp
    documentation: https://developer.mailchimp.com/documentation/mailchimp/guides/get-started-with-mailchimp-api-3/).


    Step 3 retrieves all the lists, calling the proper URL. The result is returned
    in JSON format. The call includes the auth parameter with the defined credentials.
    All subsequent calls will be made with this auth parameter for authentication
    purposes.


    Step 4 shows how to filter the returned list to grab the URL of the list of interest.
    Each of the returned calls includes a list of _links with related information,
    making it possible to walk through the API.


    The URL for the list is called in step 5. This returns information for the list,
    including the basic stats. By applying a similar filtering to step 4, we retrieve
    the URL for the members.


    > Due to size constraints and to show relevant data, not all of the retrieved
    elements have been displayed. Feel free to analyze them interactively and find
    out about them. The data is well constructed and follows the RESTful principles
    of discoverability. Python''s introspection makes it quite readable and understandable.


    Step 6 retrieves the list of members, making a GET request to members_url, which
    can be seen as a single user. This can be seen in the Getting ready section, in
    the web interface.


    Step 7 creates a new user and posts on members_url with the information passed
    in the json parameter so that it gets translated into JSON format. The updated
    data is retrieved in step 7, showing that there''s a new user in the list.'
