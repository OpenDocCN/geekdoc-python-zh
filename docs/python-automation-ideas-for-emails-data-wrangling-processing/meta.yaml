- md: "## Debugging Techniques\n\n### How it works...\n\nStep 1 presents the script\
    \ and shows that the code is faulty, as it's not sorting the list properly.\n\n\
    The script already has some logs to show the start and end result, as well as\
    \ some debug logs that show each intermediate step. In step 2, we activate the\
    \ display of the DEBUG logs, as in step 1, only the INFO ones were shown.\n\n\
    > Note that the logs are displayed by default in the standard error output. This\
    \ is displayed by default in the terminal. If you need to direct the logs somewhere\
    \ else, such as a file, you can configure a different handler. See the logging\
    \ configuration in Python for more details: https://docs.python.org/3/howto/logging.html.\n\
    \nStep 3 runs the script again, this time displaying extra information, showing\
    \ that the last element in the list is not sorted.\n\nThe bug is an off-by-one\
    \ error, a very common kind of error, as it should iterate to the whole size of\
    \ the list. This is fixed in step 4.\n\n> Check the code to understand why there's\
    \ an error. The whole list should be compared, but we made the mistake of reducing\
    \ the size by one.\n\nStep 5 shows that the fixed script runs correctly.\n\n###\
    \ There's more...\n\nIn this recipe, we have strategically located the debug logs\
    \ beforehand, but that may not be the case in a real-life debugging exercise.\
    \ You may need to add more or change the location as part of the bug investigation.\n\
    \nThe biggest advantage of this technique is that we're able to see the flow of\
    \ the program, being able to inspect the output of one block of the code execution\
    \ to the next and make sense of the flow. The disadvantage is that we can end\
    \ up with a wall of text that doesn't provide specific information about our problem.\
    \ You need to find a balance between too much and too little information.\n\n\
    Be verbose if you have to, but to reduce clutter, try to avoid long and confusing\
    \ logs. Keep the text as short and as descriptive as possible. Keep each log concise,\
    \ as you can always create more logs if you have to.\n\nRemember to turn down\
    \ the logging level after fixing the bug. You may need to delete some logs afterward\
    \ as they won't be useful in the long term.\n\n> The quick and dirty version of\
    \ this technique is to add print statements instead of debug logs. While some\
    \ people are resistant to this, it is a valuable technique to use for debugging\
    \ purposes. But remember to clean them up when you're done.\n\nAll the introspection\
    \ tools are available while generating logs, so you can create logs that display,\
    \ for example, all the results of a call to a `dir(object)` object:\n\n```\nlogging.debug(f'object\
    \ {dir(object)}')\n```\n\nAnything that can be displayed as a string can be presented\
    \ in a log.\n\n### See also\n\n- The *Learning Python interpreter basics* recipe,\
    \ earlier in this chapter, to learn the basics of Python introspection tools.\n\
    - The *Improving your debugging skills* recipe, later in this chapter, to see\
    \ a whole example of debugging covering different problems.\n\n## Debugging with\
    \ breakpoints\n\nPython has a built-in debugger called `pdb`. Stopping the execution\
    \ of the code at any point is possible by setting a breakpoint. A breakpoint will\
    \ jump into command-line mode. From the command line, the current status can be\
    \ analyzed. Given that Python is interpreted, any new code can be executed from\
    \ this stage. This is very flexible and allows you to create flexible breakpoints\
    \ and change the current state to analyze the behavior of the program.\n\nLet's\
    \ see how to do it.\n\n### Getting ready\n\nDownload the `debug_algorithm.py`\
    \ script, available from GitHub: https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter13/debug_algorithm.py.\n\
    \nIn the next section, we will analyze the execution of the code in detail. The\
    \ code checks whether numbers fulfil certain criteria:\n\n```\ndef valid(candidate):\n\
    \    if candidate <= 1:\n        return False\n\n    lower = candidate - 1\n \
    \   while lower > 1:\n        if candidate / lower == candidate // lower:\n  \
    \          return False\n        lower -= 1\n    return True\n\nassert not valid(1)\n\
    assert valid(3)\nassert not valid(15)\nassert not valid(18)\nassert not valid(50)\n\
    assert valid(53)\n```\n\nIt is possible that you recognize what the code is doing,\
    \ but bear with me so that we can analyze it interactively.\n\n### How to do it...\n\
    \n1. Run the code to see that all the assertions are valid:\n   ```\n   $ python\
    \ debug_algorithm.py\n   ```\n2. Add `breakpoint()`, after the `while` statement,\
    \ just before line 7, resulting in the following:\n   ```\n   while lower > 1:\n\
    \       breakpoint()\n       if candidate / lower == candidate // lower:\n   ```\n\
    3. Execute the code again, and see that it stops at the breakpoint, entering into\
    \ the interactive Pdb mode:\n   ```\n   $ python debug_algorithm.py\n   > .../debug_algorithm.py(8)valid()\n\
    \   -> if candidate / lower == candidate // lower:\n   (Pdb)\n   ```\n4. Check\
    \ the value of the `candidate` and the two operations. This line is checking whether\
    \ dividing `candidate` by `lower` is an integer (float and integer division is\
    \ the same):\n   ```\n   (Pdb) candidate\n   3\n   (Pdb) candidate / lower\n \
    \  1.5\n   (Pdb) candidate // lower\n   1\n   ```\n5. Continue to the next instruction\
    \ with `n`. Check that it ends the `while` loop and returns `True`:\n   ```\n\
    \   (Pdb) n\n   > ...debug_algorithm.py(10)valid()\n   -> lower -= 1\n   (Pdb)\
    \ n\n   > ...debug_algorithm.py(6)valid()\n   -> while lower > 1:\n   (Pdb) n\n\
    \   > ...debug_algorithm.py(12)valid()\n   -> return True\n   (Pdb) n\n   --Return--\n\
    \   > ...debug_algorithm.py(12)valid()->True\n   -> return True\n   ```\n6. Continue\
    \ the execution until another breakpoint is found with `c`. Note that this is\
    \ the next call to `valid()`, which has 15 as an input:\n   ```\n   (Pdb) c\n\
    \   > ...debug_algorithm.py(8)valid()\n   -> if candidate / lower == candidate\
    \ // lower:\n   (Pdb) candidate\n   15\n   (Pdb) lower\n   14\n   ```\n7. Continue\
    \ running and inspecting the numbers until what the `valid` function is doing\
    \ makes sense. Are you able to find out what the code does? (If you can't, don't\
    \ worry and check the next section.) When you're done, exit with `q`. This stops\
    \ the execution:\n   ```\n   (Pdb) q\n   ...\n   bdb.BdbQuit\n   ```\n\n### How\
    \ it works...\n\nThe code is, as you probably know already, checking whether a\
    \ number is a prime number. It tries to divide the number by all integers lower\
    \ than it. If, at any point, the number is exactly divisible by any of them, it\
    \ returns `False`, because it's not a prime number.\n\n> This is actually a very\
    \ inefficient way of checking for a prime number, as it will take a very long\
    \ time to deal with big numbers. It is fast enough for our teaching purposes,\
    \ though. If you're interested in finding primes, you can take a look at math\
    \ packages such as SymPy (https://docs.sympy.org/latest/modules/ntheory.html?highlight=prime#sympy.ntheory.primetest.isprime).\n\
    \nAfter checking the general execution in *step 1*, in *step 2*, we introduced\
    \ a `breakpoint` in the code.\n\nWhen you execute the code in *step 3*, it will\
    \ stop at the `breakpoint` position, entering an interactive mode.\n\nIn the interactive\
    \ mode, we can inspect the values of any variable, as well as perform any kind\
    \ of operation. As demonstrated in *step 4*, sometimes, a line of code can be\
    \ better analyzed by reproducing its parts.\n\nThe code can be inspected and regular\
    \ operations can be executed in the command line. The next line of code can be\
    \ executed by calling `n` (`next`), as implemented in *step 5* several times,\
    \ to see the flow of the code.\n\n*Step 6* shows how to resume the execution with\
    \ the `c` (`continue`) command, in order to stop in the next breakpoint. All these\
    \ operations can be iterated to see the flow and values, and to understand what\
    \ the code is doing at any point.\n\nThe execution can be stopped with `q` (`quit`),\
    \ as demonstrated in *step 7*.\n\n### There's more...\n\nTo see all the available\
    \ operations, you can call `h` (`help`) at any point.\n\nYou can check the surrounding\
    \ code at any point using the `l` (`list`) command. For example, in *step 4*:\n\
    \n```\n(Pdb) l\n  3     return False\n  4\n  5     lower = candidate - 1\n  6\
    \     while lower > 1:\n  7         breakpoint()\n  8  ->     if candidate / lower\
    \ == candidate // lower:\n  9             return False\n 10         lower -= 1\n\
    \ 11\n 12     return True\n```\n\nThe other two main debugger commands are `s`\
    \ (`step`), which will execute the next step, including entering a new call (as\
    \ in *stepping into*), and `r` (`return`), which will continue the execution of\
    \ the current function until it executes a `return` statement, and then stops.\
    \ Note that at the end of any Python function, there's an implicit `return None`."
  mdcn: "## 调试技术\n\n### 工作原理...\n\n步骤1展示了脚本，并指出代码存在缺陷，因为它未能正确排序列表。\n\n该脚本已包含一些日志，用于显示起始和最终结果，以及一些调试日志，用于显示每个中间步骤。在步骤2中，我们激活了DEBUG日志的显示，因为在步骤1中只显示了INFO日志。\n\
    \n> 请注意，日志默认显示在标准错误输出中。这在终端中默认显示。如果需要将日志定向到其他位置，例如文件，可以配置不同的处理程序。有关更多详细信息，请参阅Python中的日志记录配置：https://docs.python.org/3/howto/logging.html。\n\
    \n步骤3再次运行脚本，这次显示了额外信息，表明列表中的最后一个元素未排序。\n\n该错误是一个差一错误，这是一种非常常见的错误，因为它应该迭代到列表的整个大小。这在步骤4中得到了修复。\n\
    \n> 检查代码以理解为什么会出现错误。应该比较整个列表，但我们错误地将大小减小了1。\n\n步骤5显示修复后的脚本运行正确。\n\n### 更多内容...\n\
    \n在本教程中，我们预先战略性地放置了调试日志，但在实际调试练习中可能并非如此。作为错误调查的一部分，你可能需要添加更多日志或更改位置。\n\n这种技术的最大优势在于，我们能够看到程序的流程，能够检查从一个代码执行块到下一个块的输出，并理解流程。缺点是我们最终可能会得到一堆文本，而这些文本并未提供关于问题的具体信息。你需要在信息过多和过少之间找到平衡。\n\
    \n如果需要，可以详细记录，但为了减少混乱，尽量避免冗长且令人困惑的日志。保持文本尽可能简短且具有描述性。保持每个日志简洁，因为如果需要，你总是可以创建更多日志。\n\
    \n记得在修复错误后降低日志级别。之后你可能需要删除一些日志，因为它们从长远来看不会有用。\n\n> 这种技术的快速而粗糙的版本是添加打印语句而不是调试日志。虽然有些人对此持保留态度，但它是一种用于调试目的的有价值的技术。但请记住在完成后清理它们。\n\
    \n所有内省工具在生成日志时都可用，因此你可以创建显示例如调用`dir(object)`对象所有结果的日志：\n\n```\nlogging.debug(f'object\
    \ {dir(object)}')\n```\n\n任何可以显示为字符串的内容都可以在日志中呈现。\n\n### 另请参阅\n\n- 本章前面的*学习Python解释器基础*教程，了解Python内省工具的基础知识。\n\
    - 本章后面的*提高调试技能*教程，查看涵盖不同问题的完整调试示例。\n\n## 使用断点调试\n\nPython有一个内置的调试器，称为`pdb`。通过设置断点，可以在任何点停止代码的执行。断点将跳转到命令行模式。从命令行，可以分析当前状态。鉴于Python是解释型的，可以从这个阶段执行任何新代码。这非常灵活，允许你创建灵活的断点并更改当前状态以分析程序的行为。\n\
    \n让我们看看如何操作。\n\n### 准备工作\n\n从GitHub下载`debug_algorithm.py`脚本：https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter13/debug_algorithm.py。\n\
    \n在下一节中，我们将详细分析代码的执行。该代码检查数字是否满足某些条件：\n\n```\ndef valid(candidate):\n    if candidate\
    \ <= 1:\n        return False\n\n    lower = candidate - 1\n    while lower >\
    \ 1:\n        if candidate / lower == candidate // lower:\n            return\
    \ False\n        lower -= 1\n    return True\n\nassert not valid(1)\nassert valid(3)\n\
    assert not valid(15)\nassert not valid(18)\nassert not valid(50)\nassert valid(53)\n\
    ```\n\n你可能已经认出代码的功能，但请耐心等待，以便我们可以交互式地分析它。\n\n### 操作步骤...\n\n1. 运行代码以查看所有断言是否有效：\n\
    \   ```\n   $ python debug_algorithm.py\n   ```\n2. 在`while`语句之后，第7行之前添加`breakpoint()`，结果如下：\n\
    \   ```\n   while lower > 1:\n       breakpoint()\n       if candidate / lower\
    \ == candidate // lower:\n   ```\n3. 再次执行代码，看到它在断点处停止，进入交互式Pdb模式：\n   ```\n  \
    \ $ python debug_algorithm.py\n   > .../debug_algorithm.py(8)valid()\n   -> if\
    \ candidate / lower == candidate // lower:\n   (Pdb)\n   ```\n4. 检查`candidate`的值和两个操作。此行检查将`candidate`除以`lower`是否为整数（浮点数和整数除法相同）：\n\
    \   ```\n   (Pdb) candidate\n   3\n   (Pdb) candidate / lower\n   1.5\n   (Pdb)\
    \ candidate // lower\n   1\n   ```\n5. 使用`n`继续到下一条指令。检查它是否结束`while`循环并返回`True`：\n\
    \   ```\n   (Pdb) n\n   > ...debug_algorithm.py(10)valid()\n   -> lower -= 1\n\
    \   (Pdb) n\n   > ...debug_algorithm.py(6)valid()\n   -> while lower > 1:\n  \
    \ (Pdb) n\n   > ...debug_algorithm.py(12)valid()\n   -> return True\n   (Pdb)\
    \ n\n   --Return--\n   > ...debug_algorithm.py(12)valid()->True\n   -> return\
    \ True\n   ```\n6. 使用`c`继续执行直到找到另一个断点。注意这是下一次调用`valid()`，输入为15：\n   ```\n   (Pdb)\
    \ c\n   > ...debug_algorithm.py(8)valid()\n   -> if candidate / lower == candidate\
    \ // lower:\n   (Pdb) candidate\n   15\n   (Pdb) lower\n   14\n   ```\n7. 继续运行并检查数字，直到理解`valid`函数的功能。你能找出代码的功能吗？（如果不能，请不要担心，查看下一节。）完成后，使用`q`退出。这会停止执行：\n\
    \   ```\n   (Pdb) q\n   ...\n   bdb.BdbQuit\n   ```\n\n### 工作原理...\n\n正如你可能已经知道的，该代码正在检查一个数字是否为质数。它尝试将该数字除以所有小于它的整数。如果在任何点，该数字能被其中任何一个整除，则返回`False`，因为它不是质数。\n\
    \n> 这实际上是一种非常低效的检查质数的方法，因为它处理大数字时会花费很长时间。不过，对于我们的教学目的来说，它足够快。如果你对寻找质数感兴趣，可以查看数学包，如SymPy（https://docs.sympy.org/latest/modules/ntheory.html?highlight=prime#sympy.ntheory.primetest.isprime）。\n\
    \n在*步骤1*中检查了总体执行后，在*步骤2*中，我们在代码中引入了一个`breakpoint`。\n\n当你在*步骤3*中执行代码时，它将在`breakpoint`位置停止，进入交互模式。\n\
    \n在交互模式下，我们可以检查任何变量的值，以及执行任何类型的操作。如*步骤4*所示，有时通过重现代码行的部分可以更好地分析它。\n\n可以在命令行中检查代码并执行常规操作。可以通过调用`n`（`next`）来执行下一行代码，如*步骤5*中多次实现的，以查看代码的流程。\n\
    \n*步骤6*展示了如何使用`c`（`continue`）命令恢复执行，以便在下一个断点处停止。所有这些操作都可以迭代以查看流程和值，并理解代码在任何点的功能。\n\
    \n执行可以使用`q`（`quit`）停止，如*步骤7*所示。\n\n### 更多内容...\n\n要查看所有可用操作，可以在任何点调用`h`（`help`）。\n\
    \n你可以使用`l`（`list`）命令在任何点检查周围的代码。例如，在*步骤4*中：\n\n```\n(Pdb) l\n  3     return False\n\
    \  4\n  5     lower = candidate - 1\n  6     while lower > 1:\n  7         breakpoint()\n\
    \  8  ->     if candidate / lower == candidate // lower:\n  9             return\
    \ False\n 10         lower -= 1\n 11\n 12     return True\n```\n\n另外两个主要的调试器命令是`s`（`step`），它将执行下一步，包括进入新的调用（如*单步进入*），以及`r`（`return`），它将继续执行当前函数直到执行`return`语句，然后停止。请注意，在任何Python函数的末尾，都有一个隐式的`return\
    \ None`。"
