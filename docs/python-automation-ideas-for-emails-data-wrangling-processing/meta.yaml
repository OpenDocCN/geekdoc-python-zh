    \ either in the Python standard library or any other installed package.\n\n> Keep\
    \ in mind that you need to mock in the correct path. You need to mock the object\
    \ where it's imported to, not where it's originally defined. For example, if you're\
    \ importing from extpck import extfunction into your package code.module, you\
    \ need to mock it as follows:\n\n@mock.patch('code.module.extfunction')\n\nIt's\
    \ an easy mistake to make, even for seasoned mocking users. Remember that you\
