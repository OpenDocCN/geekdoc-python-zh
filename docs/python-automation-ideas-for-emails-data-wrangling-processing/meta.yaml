- md: "Generating Fantastic Reports\n\n## See also\n\n- The *Creating a simple report\
    \ in plain text* recipe, earlier in this chapter, to learn the basics of creating\
    \ plain text reports.\n- The *Using templates for reports* recipe, earlier in\
    \ this chapter, to learn how to create templates directly in HTML.\n\n## Writing\
    \ a basic Word document\n\nMicrosoft (MS) Office is one of the most common pieces\
    \ of software, and MS Word in particular is almost the de facto standard for editable\
    \ documents. Generating docx documents is possible with automated scripts, which\
    \ may help distribute reports in a format that's easily shared in many businesses.\n\
    \nIn this recipe, we will learn how to generate a full Word document programmatically.\n\
    \n## Getting ready\n\nWe'll use the python-docx module to process Word documents:\n\
    \n```\n$ echo \"python-docx==0.8.10\" >> requirements.txt\n$ pip install -r requirements.txt\n\
    ```\n\n## How to do it...\n\n1. Import python-docx and datetime:\n   ```python\n\
    \   >>> import docx\n   >>> from datetime import datetime\n   ```\n\n2. Define\
    \ the context with the data to be stored in the report:\n   ```python\n   >>>\
    \ context = {\n   ...     'date': datetime.now(),\n   ...     'movies': ['Casablanca',\
    \ 'The Sound of Music', 'Vertigo'],\n   ...     'total_minutes': 404,\n   ...\
    \ }\n   ```\n\n3. Create a new docx document and include a heading, Movies Report:\n\
    \   ```python\n   >>> document = docx.Document()\n   >>> document.add_heading('Movies\
    \ Report', 0)\n   ```\n\n4. Add a paragraph describing the date, with the date\
    \ in italics:\n   ```python\n   >>> paragraph = document.add_paragraph('Date:\
    \ ')\n   >>> paragraph.add_run(str(context['date'])).italic = True\n   ```\n\n\
    5. Add information about the number of movies seen in a different paragraph:\n\
    \   ```python\n   >>> paragraph = document.add_paragraph('Movies seen in the last\
    \ 30 days: ')\n   >>> paragraph.add_run(str(len(context['movies']))).italic =\
    \ True\n   ```\n\n6. Add each of the movies as a bullet point:\n   ```python\n\
    \   >>> for movie in context['movies']:\n   ...     document.add_paragraph(movie,\
    \ style='List Bullet')\n   ```\n\n7. Add the total minutes and save the file,\
    \ as follows:\n   ```python\n   >>> paragraph = document.add_paragraph('Total\
    \ minutes: ')\n   >>> paragraph.add_run(str(context['total_minutes'])).italic\
    \ = True\n   >>> document.save('word-report.docx')\n   ```\n\n8. Close the interpreter\
    \ and open the `word-report.docx` file to check it:\n\n    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_162_0.png)\n\
    \n    Figure 5.3: The content of word-report.docx\n\n## How it works...\n\nThe\
    \ basics of a Word document is that it is divided into paragraphs, and each of\
    \ the paragraphs is divided into runs. A run is a part of a paragraph that shares\
    \ the same style.\n\nSteps 1 and 2 in the *How to do it...* section are preparation\
    \ for importing and defining the data that's going to be stored in the report.\n\
    \nIn *step 3*, the document is created and a heading with the proper title is\
    \ added. This automatically styles the text.\n\nDealing with paragraphs is introduced\
    \ in *step 4*. A new paragraph is created based on the text with the default style,\
    \ but new runs can be added to change it. Here, we added the first run with the\
    \ text *Date*, but another run is added after that with the specific time and\
    \ the format changed to *italics*.\n\nIn *steps 5* and *6*, we can see information\
    \ about the movies. The first part stores the number of movies, in a similar format\
    \ to *step 4*. After that, the movies are added to the report one by one, and\
    \ the style is set up to be bullet points with the style \"*List Bullet*\".\n\n\
    Finally, *step 7* stores the total run time of all movies, in a similar way to\
    \ *step 4*, and stores the document in a file.\n\n## There's more...\n\nIf you\
    \ need to introduce extra lines in the document for formatting purposes, add empty\
    \ paragraphs.\n\nDue to the way that the MS Word format works, there's no easy\
    \ way of determining how many pages a document will have. You may need to run\
    \ some tests on sizes, especially if you're generating dynamic documents.\n\n\
    > Even if you generate docx files, having MS Office is not necessary. There are\
    \ other applications that can open and deal with these files, including free alternatives\
    \ such as LibreOffice.\n\nThe whole python-docx documentation is available here:\
    \ https://python-docx.readthedocs.io/en/latest/.\n\n## See also\n\n- The *Styling\
    \ a Word document* recipe, later in this chapter, to learn how to format a document.\n\
    - The *Generating structure in Word documents* recipe, later in this chapter,\
    \ to learn how to create sections and other separators in Word documents.\n\n\
    ## Styling a Word document\n\nA Word document can contain text with almost no\
    \ format, but we can also add styling to help us understand the displayed content.\
    \ Word has a set of predefined styles that can be used to variate the document\
    \ and highlight the important parts of it.\n\n## Getting ready\n\nWe'll use the\
    \ python-docx module to process Word documents:\n\n```\n$ echo \"python-docx==0.8.10\"\
    \ >> requirements.txt\n$ pip install -r requirements.txt\n```\n\n## How to do\
    \ it...\n\n1. Import the python-docx module:\n   ```python\n   >>> import docx\n\
    \   ```\n\n2. Create a new document:\n   ```python\n   >>> document = docx.Document()\n\
    \   ```\n\n3. Add a paragraph that highlights some words in different ways (Italics,\
    \ bold, and underline):\n   ```python\n   >>> p = document.add_paragraph('This\
    \ shows different kinds of emphasis: ')\n   >>> p.add_run('bold').bold = True\n\
    \   >>> p.add_run(', ')\n   <docx.text.run.Run object at ...>\n   >>> p.add_run('italics').italic\
    \ = True\n   >>> p.add_run(' and ')\n   <docx.text.run.Run object at ...>\n  \
    \ >>> p.add_run('underline').underline = True\n   >>> p.add_run('.')\n   <docx.text.run.Run\
    \ object at ...>\n   ```\n\n4. Create some paragraphs and style them with default\
    \ styles, such as List Bullet, List Number, or Quote:\n   ```python\n   >>> document.add_paragraph('a\
    \ few', style='List Bullet')\n   <docx.text.paragraph.Paragraph object at ...>\n\
    \   >>> document.add_paragraph('bullet', style='List Bullet')\n   <docx.text.paragraph.Paragraph\
    \ object at ...>\n   >>> document.add_paragraph('points', style='List Bullet')\n\
    \   <docx.text.paragraph.Paragraph object at ...>\n   >>>\n   >>> document.add_paragraph('Or\
    \ numbered', style='List Number')\n   <docx.text.paragraph.Paragraph object at\
    \ ...>\n   >>> document.add_paragraph('that will', style='List Number')\n   <docx.text.paragraph.Paragraph\
    \ object at ...>\n   >>> document.add_paragraph('that keep', style='List Number')\n\
    \   <docx.text.paragraph.Paragraph object at ...>\n   >>> document.add_paragraph('count',\
    \ style='List Number')\n   <docx.text.paragraph.Paragraph object at ...>\n   >>>\n\
    \   >>> document.add_paragraph('And finish with a quote', style='Quote')\n   <docx.text.paragraph.Paragraph\
    \ object at 0x10d2336d8>\n   ```\n\n5. Create a paragraph in a different font\
    \ and size. We'll use Arial font and a point size of 25. The paragraph will be\
    \ aligned to the right:\n   ```python\n   >>> from docx.shared import Pt\n   >>>\
    \ from docx.enum.text import WD_ALIGN_PARAGRAPH\n   >>> p = document.add_paragraph('This\
    \ paragraph will have a manual styling and right alignment')\n   >>> p.runs[0].font.name\
    \ = 'Arial'\n   >>> p.runs[0].font.size = Pt(25)\n   >>> p.alignment = WD_ALIGN_PARAGRAPH.RIGHT\n\
    \   ```\n\n6. Save the document:\n   ```python\n   >>> document.save('word-report-style.docx')\n\
    \   ```\n\n7. Open the word-report-style.docx document to verify its content:\n\
    \n    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_166_0.png)\n\n    Figure 5.4: The\
    \ final word-report-style.docx document\n\n## How it works...\n\nAfter creating\
    \ the document in *step 1*, *step 2* from the *How to do it*... section adds a\
    \ paragraph with several runs. In Word, a paragraph can contain multiple runs,\
    \ which are smaller parts that may have different styles. In general, any format\
    \ change related to individual words will be applied to a run, while a change\
    \ that affects the whole paragraph will be applied to the `paragraph` object.\n\
    \nEach of the runs are created, by default, with the `Normal` style. Any attribute\
    \ of `.bold`, `.italic`, or `.underline` can be changed to `True` to set up whether\
    \ the run should be in a proper style or a combination of these. A value of `False`\
    \ will deactivate it, while a `None` value will apply the configured default.\n\
    \n> Note that the proper word in this protocol is *italic*, and not *italics*.\
    \ Setting the property to italics won't have any effect, but won't display an\
    \ error either.\n\n*Step 4* shows how to apply some of the default styles for\
    \ paragraphs; in this case, to show bullet points, numbered lists, and quotes.\
    \ There are more included styles, and these can be found on this page of the following\
    \ documentation: https://python-docx.readthedocs.io/en/latest/user/styles-understanding.html?highlight=List%20Bullet#paragraph-styles-in-default-template.\
    \ Try to find out which ones work best for your document."
  mdcn: "生成出色的报告\n\n## 另请参阅\n\n-   本章前面的*在纯文本中创建简单报告*方法，了解创建纯文本报告的基础知识。\n-   本章前面的*使用模板生成报告*方法，了解如何直接在HTML中创建模板。\n\
    \n## 编写基本的Word文档\n\n微软（MS）Office是最常见的软件之一，其中MS Word几乎是可编辑文档的事实标准。通过自动化脚本可以生成docx文档，这有助于以易于在许多企业中共享的格式分发报告。\n\
    \n在本方法中，我们将学习如何通过编程方式生成完整的Word文档。\n\n## 准备工作\n\n我们将使用python-docx模块来处理Word文档：\n\
    \n```\n$ echo \"python-docx==0.8.10\" >> requirements.txt\n$ pip install -r requirements.txt\n\
    ```\n\n## 操作步骤...\n\n1.  导入python-docx和datetime：\n    ```python\n    >>> import\
    \ docx\n    >>> from datetime import datetime\n    ```\n\n2.  定义包含要存储在报告中的数据的上下文：\n\
    \    ```python\n    >>> context = {\n    ...     'date': datetime.now(),\n   \
    \ ...     'movies': ['Casablanca', 'The Sound of Music', 'Vertigo'],\n    ...\
    \     'total_minutes': 404,\n    ... }\n    ```\n\n3.  创建一个新的docx文档并添加一个标题，电影报告：\n\
    \    ```python\n    >>> document = docx.Document()\n    >>> document.add_heading('Movies\
    \ Report', 0)\n    ```\n\n4.  添加一个描述日期的段落，日期使用斜体：\n    ```python\n    >>> paragraph\
    \ = document.add_paragraph('Date: ')\n    >>> paragraph.add_run(str(context['date'])).italic\
    \ = True\n    ```\n\n5.  在另一个段落中添加关于观看电影数量的信息：\n    ```python\n    >>> paragraph\
    \ = document.add_paragraph('Movies seen in the last 30 days: ')\n    >>> paragraph.add_run(str(len(context['movies']))).italic\
    \ = True\n    ```\n\n6.  将每部电影添加为项目符号：\n    ```python\n    >>> for movie in context['movies']:\n\
    \    ...     document.add_paragraph(movie, style='List Bullet')\n    ```\n\n7.\
    \  添加总分钟数并保存文件，如下所示：\n    ```python\n    >>> paragraph = document.add_paragraph('Total\
    \ minutes: ')\n    >>> paragraph.add_run(str(context['total_minutes'])).italic\
    \ = True\n    >>> document.save('word-report.docx')\n    ```\n\n8.  关闭解释器并打开`word-report.docx`文件进行检查：\n\
    \n    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_162_0.png)\n\n    图5.3：word-report.docx的内容\n\
    \n## 工作原理...\n\nWord文档的基础是它被划分为段落，每个段落又被划分为文本块。文本块是段落中共享相同样式的一部分。\n\n*操作步骤...*部分中的步骤1和步骤2是导入和定义将要存储在报告中的数据的准备工作。\n\
    \n在*步骤3*中，创建了文档并添加了带有适当标题的标题。这会自动设置文本样式。\n\n*步骤4*介绍了处理段落的方法。基于文本创建了一个具有默认样式的新段落，但可以添加新的文本块来更改它。在这里，我们添加了第一个包含文本*Date*的文本块，但之后又添加了另一个包含具体时间的文本块，并将格式更改为*斜体*。\n\
    \n在*步骤5*和*步骤6*中，我们可以看到关于电影的信息。第一部分存储电影数量，格式与*步骤4*类似。之后，电影被逐一添加到报告中，并将样式设置为项目符号，样式为\"\
    *List Bullet*\"。\n\n最后，*步骤7*以与*步骤4*类似的方式存储所有电影的总运行时间，并将文档保存到文件中。\n\n## 更多内容...\n\
    \n如果需要在文档中引入额外的行用于格式化目的，请添加空段落。\n\n由于MS Word格式的工作方式，没有简单的方法来确定文档将有多少页。你可能需要对尺寸进行一些测试，尤其是在生成动态文档时。\n\
    \n> 即使你生成docx文件，也不一定需要MS Office。还有其他应用程序可以打开和处理这些文件，包括免费的替代品，如LibreOffice。\n\n\
    完整的python-docx文档可在此处获取：https://python-docx.readthedocs.io/en/latest/.\n\n## 另请参阅\n\
    \n-   本章后面的*设置Word文档样式*方法，了解如何格式化文档。\n-   本章后面的*在Word文档中生成结构*方法，了解如何在Word文档中创建节和其他分隔符。\n\
    \n## 设置Word文档样式\n\nWord文档可以包含几乎没有格式的文本，但我们也可以添加样式来帮助我们理解显示的内容。Word有一组预定义的样式，可用于变化文档并突出显示其重要部分。\n\
    \n## 准备工作\n\n我们将使用python-docx模块来处理Word文档：\n\n```\n$ echo \"python-docx==0.8.10\"\
    \ >> requirements.txt\n$ pip install -r requirements.txt\n```\n\n## 操作步骤...\n\n\
    1.  导入python-docx模块：\n    ```python\n    >>> import docx\n    ```\n\n2.  创建一个新文档：\n\
    \    ```python\n    >>> document = docx.Document()\n    ```\n\n3.  添加一个段落，以不同方式突出显示一些单词（斜体、粗体和下划线）：\n\
    \    ```python\n    >>> p = document.add_paragraph('This shows different kinds\
    \ of emphasis: ')\n    >>> p.add_run('bold').bold = True\n    >>> p.add_run(',\
    \ ')\n    <docx.text.run.Run object at ...>\n    >>> p.add_run('italics').italic\
    \ = True\n    >>> p.add_run(' and ')\n    <docx.text.run.Run object at ...>\n\
    \    >>> p.add_run('underline').underline = True\n    >>> p.add_run('.')\n   \
    \ <docx.text.run.Run object at ...>\n    ```\n\n4.  创建一些段落并使用默认样式设置它们的样式，例如List\
    \ Bullet、List Number或Quote：\n    ```python\n    >>> document.add_paragraph('a\
    \ few', style='List Bullet')\n    <docx.text.paragraph.Paragraph object at ...>\n\
    \    >>> document.add_paragraph('bullet', style='List Bullet')\n    <docx.text.paragraph.Paragraph\
    \ object at ...>\n    >>> document.add_paragraph('points', style='List Bullet')\n\
    \    <docx.text.paragraph.Paragraph object at ...>\n    >>>\n    >>> document.add_paragraph('Or\
    \ numbered', style='List Number')\n    <docx.text.paragraph.Paragraph object at\
    \ ...>\n    >>> document.add_paragraph('that will', style='List Number')\n   \
    \ <docx.text.paragraph.Paragraph object at ...>\n    >>> document.add_paragraph('that\
    \ keep', style='List Number')\n    <docx.text.paragraph.Paragraph object at ...>\n\
    \    >>> document.add_paragraph('count', style='List Number')\n    <docx.text.paragraph.Paragraph\
    \ object at ...>\n    >>>\n    >>> document.add_paragraph('And finish with a quote',\
    \ style='Quote')\n    <docx.text.paragraph.Paragraph object at 0x10d2336d8>\n\
    \    ```\n\n5.  创建一个具有不同字体和大小的段落。我们将使用Arial字体和25磅的大小。该段落将右对齐：\n    ```python\n\
    \    >>> from docx.shared import Pt\n    >>> from docx.enum.text import WD_ALIGN_PARAGRAPH\n\
    \    >>> p = document.add_paragraph('This paragraph will have a manual styling\
    \ and right alignment')\n    >>> p.runs[0].font.name = 'Arial'\n    >>> p.runs[0].font.size\
    \ = Pt(25)\n    >>> p.alignment = WD_ALIGN_PARAGRAPH.RIGHT\n    ```\n\n6.  保存文档：\n\
    \    ```python\n    >>> document.save('word-report-style.docx')\n    ```\n\n7.\
    \  打开word-report-style.docx文档以验证其内容：\n\n    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_166_0.png)\n\
    \n    图5.4：最终的word-report-style.docx文档\n\n## 工作原理...\n\n在*步骤1*创建文档后，*操作步骤...*部分的*步骤2*添加了一个包含多个文本块的段落。在Word中，一个段落可以包含多个文本块，这些文本块是可能具有不同样式的较小部分。通常，与单个单词相关的任何格式更改都将应用于文本块，而影响整个段落的更改将应用于`paragraph`对象。\n\
    \n每个文本块默认使用`Normal`样式创建。`.bold`、`.italic`或`.underline`的任何属性都可以更改为`True`以设置文本块是否应采用适当的样式或这些样式的组合。`False`值将停用它，而`None`值将应用配置的默认值。\n\
    \n> 请注意，此协议中的正确单词是*italic*，而不是*italics*。将属性设置为italics不会有任何效果，但也不会显示错误。\n\n*步骤4*展示了如何应用一些段落的默认样式；在这种情况下，用于显示项目符号、编号列表和引号。还有更多包含的样式，可以在以下文档的此页面上找到：https://python-docx.readthedocs.io/en/latest/user/styles-understanding.html?highlight=List%20Bullet#paragraph-styles-in-default-template。尝试找出哪些最适合你的文档。"
