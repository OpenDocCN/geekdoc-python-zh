- md: "## PYTHON\n\n### AUTOMATION:\n\nIdeas For Emails, Data Wrangling, Processing\
    \ Excel, Reports, Web Scraping And More\n\nLLOYD OCHOA\n\nLet's Begin Our Automation\
    \ Journey\n\n- Using a third-party tool – parse\n- Introducing regular expressions\n\
    - Going deeper into regular expressions\n- Adding command-line arguments\n\nWe\
    \ will start by creating our own self-contained environment to work in.\n\n###\
    \ Activating a virtual environment\n\nAs a first step when working with Python,\
    \ it is a good practice to explicitly define the working environment.\n\nThis\
    \ helps you to detach from the operating system interpreter and environment and\
    \ properly define the dependencies that will be used. Not doing so tends to generate\
    \ chaotic scenarios. Remember, *explicit is better than implicit!*\n\n> ![icon](icon.png)\
    \ *Explicit is better than implicit* is one of the most quoted parts of the Zen\
    \ of Python. The Zen of Python is a list of general guidelines for Python, to\
    \ provide clarity on what is considered Pythonic. The full Zen of Python can be\
    \ invoked from the Python interpreter by calling `import this`.\n\nThis is especially\
    \ important in two scenarios:\n\n- When dealing with multiple projects on the\
    \ same computer, as they can have different dependencies that clash at some point.\
    \ For example, two versions of the same module cannot be installed in the same\
    \ environment.\n- When working on a project that will be used on a different computer,\
    \ for example, developing some code on a personal laptop that will ultimately\
    \ run in a remote server.\n\nA common joke among developers is responding to a\
    \ bug with \"it runs on my machine,\" meaning that it appears to work on their\
    \ laptop, but not on the production servers. Although a huge number of factors\
    \ can produce this error, a good practice is to produce an automatically replicable\
    \ environment, reducing uncertainty over what dependencies are really being used.\n\
    \nThis is easy to achieve using the `venv` module, which sets up a local virtual\
    \ environment. None of the installed dependencies will be shared with the Python\
    \ interpreter installed on the machine, creating an isolated environment.\n\n\
    In Python 3, the `venv` tool is installed as part of the standard library. This\
    \ was not the case in the previous version where you had to install the external\
    \ `virtualenv` package.\n\n### Getting ready\n\nTo create a new virtual environment,\
    \ do the following:\n\n1. Go to the main directory that contains the project:\n\
    \n   ```\n   $ cd my-directory\n   ```\n\n2. Type the following command:\n\n \
    \  ```\n   $ python3 -m venv .venv\n   ```\n\n   This creates a subdirectory called\
    \ `.venv` that contains the virtual environment.\n   The directory containing\
    \ the virtual environment can be located anywhere. Keeping it on the same root\
    \ keeps it handy, and adding a dot in front of it avoids it being displayed when\
    \ running `ls` or other commands.\n\n3. Before activating the virtual environment,\
    \ check the version installed in `pip`. This is different depending on your operating\
    \ system and installed packages. It may be upgraded later. Also, check the referenced\
    \ Python interpreter, which will be the main operating system one:\n\n   ```\n\
    \   $ pip --version\n   pip 10.0.1 from /usr/local/lib/python3.7/site-packages/pip\
    \ (python 3.7)\n   $ which python3\n   /usr/local/bin/python3\n   ```\n\n> Note\
    \ that `which` may not be available in your shell. In Windows, for example, `where`\
    \ can be used.\n\nNow your virtual environment is ready to go.\n\n### How to do\
    \ it...\n\n1. Activate the virtual environment if you use Linux or macOS by running:\n\
    \n   ```\n   $ source .venv/bin/activate\n   ```\n\n   Depending on your operating\
    \ system (for example, Windows) and shell (for example, fish), you may need a\
    \ different command. View the documentation of venv in the Python documentation\
    \ here: https://docs.python.org/3/library/venv.html.\n   You'll notice that the\
    \ shell prompt will display (.venv), showing that the virtual environment is active.\n\
    \n2. Notice that the Python interpreter used is the one inside the virtual environment,\
    \ and not the general operating system one from step 3 of the Getting ready section.\
    \ Check the location within a virtual environment:\n\n   ```\n   (.venv) $ which\
    \ python\n   /root_dir/.venv/bin/python\n   (.venv) $ which pip\n   /root_dir/.venv/bin/pip\n\
    \   ```\n\n3. Upgrade the version of pip and then check the version:\n\n   ```\n\
    \   (.venv) $ pip install --upgrade pip\n   ...\n   Successfully installed pip-20.0.2\n\
    \   (.venv) $ pip --version\n   pip 20.0.2 from /root_dir/.venv/lib/python3.8/site-packages/pip\
    \ (python 3.8)\n   ```\n\n> An alternative is to run `python -m ensurepip -U`,\
    \ which will ensure that pip is installed.\n\n4. Get out of the environment and\
    \ run pip to check the version, which will return the previous environment. Check\
    \ the pip version and the Python interpreter to show the existing directories\
    \ before activating the virtual environment directories, as shown in step 3 of\
    \ the Getting ready section. Note that they are different pip versions:\n\n  \
    \ ```\n   (.venv) $ deactivate\n   $ which python3\n   /usr/local/bin/python3\n\
    \   $ pip --version\n   pip 10.0.1 from /usr/local/lib/python3.8/site-packages/pip\
    \ (python 3.8)\n   ```\n\n### How it works...\n\nNotice that inside the virtual\
    \ environment you can use `python` instead of `python3`, although `python3` is\
    \ available as well. This will use the Python interpreter defined in the environment.\n\
    \nIn some systems, like Linux, it's possible that you'll need to use `python3.8`\
    \ instead of `python3`. Verify that the Python interpreter you're using is 3.8\
    \ or higher.\n\nInside the virtual environment, *step 3* of the *How to do it*\
    \ section installs the most recent version of `pip`, without affecting the external\
    \ installation.\n\nThe virtual environment contains all the Python data in the\
    \ `.venv` directory, and the `activate` script points all the environment variables\
    \ there. The best thing about it is that it can be deleted and recreated very\
    \ easily, removing the fear of experimenting in a self-contained sandbox.\n\n\
    Remember that the directory name is displayed in the prompt. If you need to differentiate\
    \ the environment, use a descriptive directory name, such as `.my_automate_recipe`,\
    \ or use the `-prompt` option.\n\n### There's more...\n\nTo remove a virtual environment,\
    \ deactivate it and remove the directory:\n\n```\n(.venv) $ deactivate\n$ rm -rf\
    \ .venv\n```\n\nThe `venv` module has more options, which can be shown with the\
    \ `-h` flag:\n\n```\n$ python3 -m venv -h\nusage: venv [-h] [--system-site-packages]\n\
    \            [--symlinks | --copies] [--clear]\n            [--upgrade] [--without-pip]\n\
    \            [--prompt PROMPT]\n            ENV_DIR [ENV_DIR ...]\n\nCreates virtual\
    \ Python environments in one or more target directories.\n\npositional arguments:\n\
    \  ENV_DIR               A directory to create the\n                        environment\
    \ in.\n```\n\noptional arguments:\n\n| 参数 | 描述 |\n| --- | --- |\n| -h, --help\
    \ | show this help message and exit |\n| --system-site-packages | Give the virtual\
    \ environment access to the system site-packages dir. |\n| --symlinks | Try to\
    \ use symlinks rather than copies, when symlinks are not the default for the platform.\
    \ |\n| --copies | Try to use copies rather than symlinks, even when symlinks are\
    \ the default for the platform. |\n| --clear | Delete the contents of the environment\
    \ directory if it already exists, before environment creation. |\n| --upgrade\
    \ | Upgrade the environment directory to use this version of Python, assuming\
    \ Python has been upgraded in-place. |\n| --without-pip | Skips installing or\
    \ upgrading pip in the virtual environment (pip is bootstrapped by default) |\n\
    | --prompt PROMPT | Provides an alternative prompt prefix for this environment.\
    \ |\n\nOnce an environment has been created, you may wish to activate it, e.g.\
    \ by sourcing an activate script in its bin directory.\n\nA convenient way of\
    \ dealing with virtual environments, especially if you often have to swap between\
    \ them, is to use the `virtualenvwrapper` module:\n\n1. To install it, run this:\n\
    \n   ```bash\n   $ pip install virtualenvwrapper\n   ```\n\n2. Then, add the following\
    \ variables to your shell startup script, these are normally `.bashrc` or `.bash_profile`.\
    \ The virtual environments will be installed under the `WORKON_HOME` directory\
    \ instead of the same directory as the project, as shown previously:\n\n   ```bash\n\
    \   export WORKON_HOME=~/.virtualenvs\n   source /usr/local/bin/virtualenvwrapper.sh\n\
    \   ```\n\nSourcing the startup script or opening a new terminal will allow you\
    \ to create new virtual environments:\n\n```\n$ mkvirtualenv automation_cookbook\n\
    ...\nInstalling setuptools, pip, wheel...done.\n(automation_cookbook) $ deactivate\n\
    $ workon automation_cookbook\n(automation_cookbook) $\n```\n\nFor more information,\
    \ view the documentation of `virtualenvwrapper` at https://virtualenvwrapper.readthedocs.io/en/latest/index.html.\n\
    \n> An alternative tool for defining environments is Poetry (https://python-poetry.org/).\
    \ This tool is designed for creating consistent environments with clear dependencies,\
    \ and provides commands for upgrades and managing dependency packages. Check it\
    \ out to see whether it's useful in your use case.\n\nHitting the `Tab` key after\
    \ `workon` autocompletes the command with the available environments.\n\n### See\
    \ also\n\n- The *Installing third-party packages* recipe, covered later in the\
    \ chapter.\n- The *Using a third-party tool – parse* recipe, covered later in\
    \ the chapter."
  mdcn: "## PYTHON\n\n### 自动化：\n\n电子邮件、数据整理、Excel处理、报告生成、网络爬虫等创意方案\n\n劳埃德·奥乔亚\n\n\
    让我们开启自动化之旅\n\n- 使用第三方工具——parse\n- 介绍正则表达式\n- 深入了解正则表达式\n- 添加命令行参数\n\n我们将从创建一个独立的工作环境开始。\n\
    \n### 激活虚拟环境\n\n使用Python时，第一步最好是明确定义工作环境。\n\n这有助于你脱离操作系统解释器和环境，并正确定义将要使用的依赖项。不这样做往往会导致混乱的局面。记住，*显式优于隐式！*\n\
    \n> ![icon](icon.png) *显式优于隐式*是《Python之禅》中被引用最多的部分之一。《Python之禅》是Python的一系列通用准则，旨在阐明何为Pythonic风格。完整的《Python之禅》可以通过在Python解释器中调用`import\
    \ this`来查看。\n\n这在两种情况下尤为重要：\n\n- 当在同一台计算机上处理多个项目时，因为它们可能具有在某个时刻冲突的不同依赖项。例如，同一模块的两个版本无法安装在同一环境中。\n\
    - 当在一个将在不同计算机上使用的项目上工作时，例如，在个人笔记本电脑上开发一些代码，最终将在远程服务器上运行。\n\n开发者之间的一个常见笑话是，对bug的回应是“它在我的机器上运行”，意思是它在他们的笔记本电脑上似乎可以工作，但在生产服务器上却不行。尽管大量因素可能导致此错误，但一个好的做法是创建一个可自动复制的环境，减少对实际使用哪些依赖项的不确定性。\n\
    \n使用`venv`模块可以轻松实现这一点，它设置了一个本地虚拟环境。安装的依赖项都不会与机器上安装的Python解释器共享，从而创建一个隔离的环境。\n\n\
    在Python 3中，`venv`工具作为标准库的一部分安装。在之前的版本中并非如此，你必须安装外部的`virtualenv`包。\n\n### 准备工作\n\
    \n要创建一个新的虚拟环境，请执行以下操作：\n\n1. 转到包含项目的主目录：\n\n   ```\n   $ cd my-directory\n   ```\n\
    \n2. 输入以下命令：\n\n   ```\n   $ python3 -m venv .venv\n   ```\n\n   这将创建一个名为`.venv`的子目录，其中包含虚拟环境。\n\
    \   包含虚拟环境的目录可以位于任何位置。将其保留在同一根目录下便于管理，并在前面添加一个点可以避免在运行`ls`或其他命令时显示它。\n\n3. 在激活虚拟环境之前，检查`pip`中安装的版本。这因你的操作系统和已安装的包而异。稍后可能会升级。同时，检查引用的Python解释器，它将是主要的操作系统解释器：\n\
    \n   ```\n   $ pip --version\n   pip 10.0.1 from /usr/local/lib/python3.7/site-packages/pip\
    \ (python 3.7)\n   $ which python3\n   /usr/local/bin/python3\n   ```\n\n> 请注意，`which`可能在你的shell中不可用。例如，在Windows中，可以使用`where`。\n\
    \n现在你的虚拟环境已准备就绪。\n\n### 操作步骤...\n\n1. 如果你使用Linux或macOS，通过运行以下命令激活虚拟环境：\n\n   ```\n\
    \   $ source .venv/bin/activate\n   ```\n\n   根据你的操作系统（例如Windows）和shell（例如fish），你可能需要不同的命令。请在此处查看Python文档中venv的文档：https://docs.python.org/3/library/venv.html。\n\
    \   你会注意到shell提示符将显示(.venv)，表明虚拟环境已激活。\n\n2. 注意，使用的Python解释器是虚拟环境内的那个，而不是“准备工作”部分步骤3中的通用操作系统解释器。检查虚拟环境内的位置：\n\
    \n   ```\n   (.venv) $ which python\n   /root_dir/.venv/bin/python\n   (.venv)\
    \ $ which pip\n   /root_dir/.venv/bin/pip\n   ```\n\n3. 升级pip的版本，然后检查版本：\n\n \
    \  ```\n   (.venv) $ pip install --upgrade pip\n   ...\n   Successfully installed\
    \ pip-20.0.2\n   (.venv) $ pip --version\n   pip 20.0.2 from /root_dir/.venv/lib/python3.8/site-packages/pip\
    \ (python 3.8)\n   ```\n\n> 另一种方法是运行`python -m ensurepip -U`，这将确保pip已安装。\n\n4.\
    \ 退出环境并运行pip以检查版本，这将返回之前的环境。检查pip版本和Python解释器，以显示激活虚拟环境目录之前的现有目录，如“准备工作”部分步骤3所示。请注意，它们是不同的pip版本：\n\
    \n   ```\n   (.venv) $ deactivate\n   $ which python3\n   /usr/local/bin/python3\n\
    \   $ pip --version\n   pip 10.0.1 from /usr/local/lib/python3.8/site-packages/pip\
    \ (python 3.8)\n   ```\n\n### 工作原理...\n\n请注意，在虚拟环境中，你可以使用`python`而不是`python3`，尽管`python3`也可用。这将使用环境中定义的Python解释器。\n\
    \n在某些系统（如Linux）中，你可能需要使用`python3.8`而不是`python3`。请验证你使用的Python解释器是3.8或更高版本。\n\n\
    在虚拟环境中，“操作步骤”部分的*步骤3*安装了最新版本的`pip`，而不会影响外部安装。\n\n虚拟环境包含`.venv`目录中的所有Python数据，`activate`脚本将所有环境变量指向那里。最棒的是，它可以非常容易地删除和重新创建，消除了在独立沙箱中进行实验的恐惧。\n\
    \n请记住，目录名称会显示在提示符中。如果你需要区分环境，请使用描述性的目录名称，例如`.my_automate_recipe`，或使用`-prompt`选项。\n\
    \n### 更多内容...\n\n要删除虚拟环境，请停用它并删除目录：\n\n```\n(.venv) $ deactivate\n$ rm -rf .venv\n\
    ```\n\n`venv`模块有更多选项，可以通过`-h`标志显示：\n\n```\n$ python3 -m venv -h\nusage: venv [-h]\
    \ [--system-site-packages]\n            [--symlinks | --copies] [--clear]\n  \
    \          [--upgrade] [--without-pip]\n            [--prompt PROMPT]\n      \
    \      ENV_DIR [ENV_DIR ...]\n\nCreates virtual Python environments in one or\
    \ more target directories.\n\npositional arguments:\n  ENV_DIR               A\
    \ directory to create the\n                        environment in.\n```\n\n可选参数：\n\
    \n| 参数 | 描述 |\n| --- | --- |\n| -h, --help | 显示此帮助信息并退出 |\n| --system-site-packages\
    \ | 允许虚拟环境访问系统site-packages目录。 |\n| --symlinks | 尝试使用符号链接而不是复制，当符号链接不是平台的默认设置时。\
    \ |\n| --copies | 尝试使用复制而不是符号链接，即使符号链接是平台的默认设置。 |\n| --clear | 如果环境目录已存在，则在创建环境之前删除其内容。\
    \ |\n| --upgrade | 升级环境目录以使用此版本的Python，假设Python已就地升级。 |\n| --without-pip | 跳过在虚拟环境中安装或升级pip（默认情况下pip是引导安装的）\
    \ |\n| --prompt PROMPT | 为此环境提供替代的提示符前缀。 |\n\n一旦创建了环境，你可能希望激活它，例如通过在其bin目录中source一个activate脚本。\n\
    \n处理虚拟环境的一种便捷方式，特别是如果你经常需要在它们之间切换，是使用`virtualenvwrapper`模块：\n\n1. 要安装它，请运行：\n\n\
    \   ```bash\n   $ pip install virtualenvwrapper\n   ```\n\n2. 然后，将以下变量添加到你的shell启动脚本中，这些通常是`.bashrc`或`.bash_profile`。虚拟环境将安装在`WORKON_HOME`目录下，而不是与项目相同的目录，如前所示：\n\
    \n   ```bash\n   export WORKON_HOME=~/.virtualenvs\n   source /usr/local/bin/virtualenvwrapper.sh\n\
    \   ```\n\nSource启动脚本或打开一个新终端将允许你创建新的虚拟环境：\n\n```\n$ mkvirtualenv automation_cookbook\n\
    ...\nInstalling setuptools, pip, wheel...done.\n(automation_cookbook) $ deactivate\n\
    $ workon automation_cookbook\n(automation_cookbook) $\n```\n\n更多信息，请查看`virtualenvwrapper`的文档：https://virtualenvwrapper.readthedocs.io/en/latest/index.html。\n\
    \n> 另一个定义环境的工具是Poetry (https://python-poetry.org/)。此工具旨在创建具有清晰依赖项的一致环境，并提供用于升级和管理依赖包的命令。查看它是否对你的用例有用。\n\
    \n在`workon`后按`Tab`键会自动补全可用环境的命令。\n\n### 另请参阅\n\n- 本章稍后介绍的*安装第三方包*方案。\n- 本章稍后介绍的*使用第三方工具——parse*方案。"
