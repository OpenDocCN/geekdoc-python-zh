  md: "Others can be external, like `Beautiful Soup` to parse HTML or `matplotlib`\
    \ to generate graphs. We can also create our own libraries or structure our code\
    \ in different files and encapsulate the functionality in a way that's reusable\
    \ and improves readability.\n\nWhen creating tests, sometimes using external elements\
    \ and library calls to the core of the test is not advisable. For example, to\
    \ test that a report is correctly processed, it may be necessary to read a CSV\
    \ file that contains the report. But preparing the test by preparing a file, in\
    \ this case, becomes cumbersome and can lose focus on the actual objective of\
    \ the test.\n\nIn these cases, it can be convenient to simulate those dependencies\
    \ to simplify the tests or to avoid external calls such as calls to network access\
    \ or other kinds of hardware. This kind of simulation, which replaces the external\
    \ dependencies during testing, is known as a `mock`.\n\n> Mocks are closely related\
    \ to unit tests, in that they are small focused tests that cover a single unit\
    \ of code, like a function, a class, or even a small module. This allows you to\
    \ test such units of code in isolation from external elements, or, more precisely,\
    \ fully controlling the external elements the code accesses. Keep in mind that\
    \ exactly how big a unit test can get before it is no longer a unit test is up\
    \ for debate.\n\nThis can be done through the library `mock` in the Python standard\
    \ library, which allows you to replace the behavior of external dependencies.\n\
