    \ 'html.parser')\n    search_text(source_link, page, text)\n\n    return get_links(parsed_source,\
    \ page)\n```\n\n这里的代码下载文件并检查状态是否正确，以跳过诸如断开链接之类的错误。此代码还检查类型（如 `Content-Type` 中所述）是否为HTML页面，以跳过PDF和其他格式。最后，它将原始HTML解析为一个\
    \ `BeautifulSoup` 对象。\n代码还使用 `urlparse` 解析源链接，以便稍后在*步骤4*中，它可以跳过所有对外部源的引用。`urlparse`\
    \ 将URL分解为其组成元素：\n\n```python\n>>> from urllib.parse import urlparse\n>>> urlparse('http://localhost:8000/files/b93bec5d9681df87e6e8d5703ed7cd81-2.html')\n\
    ParseResult(scheme='http', netloc='localhost:8000', path='/files/b93bec5d9681df87e6e8d5703ed7cd81-2.html',\
    \ params='', query='', fragment='')\n```\n\n3. 代码在 `search_text` 函数中查找要搜索的文本：\n\
    \n```python\ndef search_text(source_link, page, text):\n    '''Search for an element\
    \ with the searched text and print it'''\n    for element in page.find_all(text=re.compile(text,\
    \ flags=re.IGNORECASE)):\n        print(f'Link {source_link}: --> {element}')\n\
    ```\n\n这会在解析后的对象中搜索指定的文本。请注意，搜索是作为 `regex` 进行的，并且仅在页面的文本中进行。它会打印出匹配的结果，包括 `source_link`，引用找到匹配项的URL：\n\
    \n```python\nfor element in page.find_all(text=re.compile(text)):\n    print(f'Link\
    \ {source_link}: --> {element}')\n```\n\n4. `get_links` 函数检索页面上的所有链接：\n\n```python\n\
    def get_links(parsed_source, page):\n    '''Retrieve the links on the page'''\n\
    \    links = []\n    for element in page.find_all('a'):\n        link = element.get('href')\n\
    \        if not link:\n            continue\n\n        # Avoid internal, same\
    \ page links\n        if link.startswith('#'):\n            continue\n\n     \
    \   if link.startswith('mailto:'):\n            # Ignore other links like mailto\n\
    \            # More cases like ftp or similar may be included\n            continue\n\
    \n        # Always accept local links\n        if not link.startswith('http'):\n\
    \            netloc = parsed_source.netloc\n            scheme = parsed_source.scheme\n\
    \            path = urljoin(parsed_source.path, link)\n            link = f'{scheme}://{netloc}{path}'\n\
    \n        # Only parse links in the same domain\n        if parsed_source.netloc\
    \ not in link:\n            continue\n\n        links.append(link)\n\n    return\
    \ links\n```\n\n这会在解析后的页面中搜索所有 `<a>` 元素并检索 `href` 元素，但仅限于具有此类 `href` 元素且是完整URL（以\
    \ `http` 开头）或本地链接的元素。这会移除不是URL的链接，例如 `#` 链接或页面内部的链接。\n\n> 请记住，某些引用可能具有其他效果，例如\
    \ `mailto:` 协议。有一个检查可以避免 `mailto:` 协议，但也可能存在像 `ftp` 或 `irc` 这样的情况，尽管在实践中很少见。\n\
