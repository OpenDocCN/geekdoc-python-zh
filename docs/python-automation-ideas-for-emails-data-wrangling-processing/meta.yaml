  - '[PAGE 122]


    # There''s more...


    This recipe assumes that we know the encoding a file is in. But sometimes, we''re
    not sure about that. `Beautiful Soup`, a module used to parse HTML, can try to
    detect what encoding a particular file has.


    > Automatically detecting what encoding a file has may be, well, impossible. There
    are potentially an infinite number of encodings! But a subset of usual encodings
    should cover 90% of real-world cases. Just remember that the easiest way of knowing
    for sure is to ask whomever created the file in the first place.


    To do so, we''ll need to open the file to read in binary format with the `''rb''`
    parameter. And then, we''ll pass the binary content to the `UnicodeDammit` module
    of `Beautiful Soup`, like this:


    ```

    >>> from bs4 import UnicodeDammit

    >>> with open(''example_output_iso.txt'', ''rb'') as file:

    ...     content = file.read()

    ...

    >>> suggestion = UnicodeDammit(content)

    >>> suggestion.original_encoding

    ''iso-8859-1''

    >>> suggestion.unicode_markup

    ''20£\n''

    ```


    The encoding can then be inferred. Though `.unicode_markup` returns the decoded
    string, it''s better to use this suggestion only to obtain the encoding, and then
    reopen the file in text mode with the proper encoding.


    # See also


    +   - The *Manipulating strings* recipe in *Chapter 1, Let''s Begin Our Automation
    Journey*, to learn more about how to edit strings.

    - The *Parsing HTML* recipe in *Chapter 3, Building Your First Web Scraping Application*,
    to learn more about Beautiful Soup.'
