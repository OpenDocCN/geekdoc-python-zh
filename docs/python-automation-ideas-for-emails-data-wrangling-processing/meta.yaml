- md: "The email message content used in this recipe is very simple, but emails can\
    \ be much more complicated than that.\n\nThe To field can contain multiple recipients.\
    \ Separate them with commas, like this:\n\n```\nmessage['To'] = ','.join(recipients)\n\
    ```\n\nEmails can be defined in HTML, with an alternative plain text, and have\
    \ attachments. The basic operation is to set up a MIMEMultipart and then attach\
    \ each of the MIME parts that compose the email:\n\n```\nfrom email.mime.multipart\
    \ import MIMEMultipart\nfrom email.mime.text import MIMEText\nfrom email.mime.image\
    \ import MIMEImage\n\nmessage = MIMEMultipart()\npart1 = MIMEText('some text',\
    \ 'plain')\nmessage.attach(part1)\nwith open('path/image', 'rb') as image:\n \
    \   part2 = MIMEImage(image.read())\nmessage.attach(part2)\n```\n\nThe most common\
    \ SMTP connection is SMTP_SSL, which is more secure, as all communication with\
    \ the server is encrypted and always requires a login and password. However, plain,\
    \ unauthenticated SMTP exists—check your email provider documentation.\n\nRemember\
    \ that this recipe is aimed toward simple notifications. Emails can grow quite\
    \ complex if attaching different information. If your objective is an email for\
    \ customers or any general group, try to use the ideas in Chapter 9, Dealing with\
    \ Communication Channels.\n\n## See also\n\n- The *Adding command-line options*\
    \ recipe in *Chapter 1, Let's Begin Our Automation Journey*, to understand the\
    \ basic concepts of command-line options.\n- The *Preparing a task* recipe, covered\
    \ earlier in this chapter, to learn about the strategy to follow when designing\
    \ an automated task.\n\n## 3 Building Your First Web Scraping Application\n\n\
    The internet, and the **World Wide Web (WWW)**, is probably the most prominent\
    \ source of information today. Most of that information is retrievable through\
    \ HTTP. HTTP was invented originally to share pages of hypertext (hence the name\
    \ **HyperText Transfer Protocol**), which started the WWW.\n\nThis process happens\
    \ each time that we request a web page, so it should be familiar to almost everyone.\
    \ But we can also perform these operations programmatically to retrieve and process\
    \ information automatically. Python has in its standard library an HTTP client,\
    \ but the fantastic `requests` module makes obtaining web pages very easy. In\
    \ this chapter, we will see how.\n\nIn this chapter, we'll cover the following\
    \ recipes:\n\n- Downloading web pages\n- Parsing HTML\n- Crawling the web\n- Subscribing\
    \ to feeds\n- Accessing web APIs\n- Interacting with forms\n- Using Selenium for\
    \ advanced interaction\n- Accessing password-protected pages\n- Speeding up web\
    \ scraping\n\n### Downloading web pages\n\nThe basic ability to download a web\
    \ page involves making an HTTP GET request against a URL. This is the basic operation\
    \ of any web browser.\n\nLet's quickly recap the different parts of this operation,\
    \ as it has three distinct elements:\n\n1. Using the HTTP protocol. This deals\
    \ with the way the request is structured.\n2. Using the GET method, which is the\
    \ most common HTTP method. We'll see more in the Accessing web APIs recipe.\n\
    3. A full URL describing the address of the page, including the server (for example:\
    \ mypage.com) and the path (for example: /page).\n\nThat request will be routed\
    \ toward the server by the internet and processed by the server, then a response\
    \ will be sent back. This response will contain a status code, typically 200 if\
    \ everything went fine, and a body with the result, which will normally be text\
    \ with an HTML page.\n\nMost of this is handled automatically by the HTTP client\
    \ used to perform the request. We'll see in this recipe how to make a simple request\
    \ to obtain a web page.\n\n> HTTP requests and responses can also contain headers.\
    \ Headers contain important information about the request itself, such as the\
    \ total size of the request, the format of the content, the date of the request,\
    \ and what browser or server is used.\n\n### Getting ready\n\nUsing the fantastic\
    \ requests module, getting web pages is super simple. Install the module:\n\n\
    ```\n$ echo \"requests==2.23.0\" >> requirements.txt\n$ source .venv/bin/activate\n\
    (.venv) $ pip install -r requirements.txt\n```\n\nWe'll download the page at http://www.columbia.edu/~fdc/sample.html\
    \ because it is a straightforward HTML page that is easy to read in text mode.\n\
    \n### How to do it...\n\n1. Import the requests module:\n    ```python\n    >>>\
    \ import requests\n    ```\n\n2. Make a request to the server using the following\
    \ URL, which will take a second or two:\n    ```python\n    >>> url = 'http://www.columbia.edu/~fdc/sample.html'\n\
    \    >>> response = requests.get(url)\n    ```\n\n3. Check the returned object\
    \ status code:\n    ```python\n    >>> response.status_code\n    200\n    ```\n\
    \n4. Check the content of the result:\n    ```python\n    >>> response.text\n\
    \    '<!DOCTYPE HTML PUBLIC \"-//W3C//DTD HTML 4.01 Transitional//EN\">\\n<html>\\\
    n<head>\\n\n    ...\n\n    FULL BODY\n\n    ...\n\n    <!-- close the <html> begun\
    \ above -->\\n'\n    ```\n\n5. Check the ongoing and returned headers:\n    ```python\n\
    \    >>> response.request.headers\n    {'User-Agent': 'python-requests/2.22.0',\
    \ 'Accept-Encoding': 'gzip, deflate', 'Accept': '*/*', 'Connection': 'keep-alive'}\n\
    \    >>> response.headers\n    {'Date': 'Fri, 24 Jan 2020 19:04:12 GMT', 'Server':\
    \ 'Apache', 'Last-Modified': 'Wed, 11 Dec 2019 12:46:44 GMT', 'Accept-Ranges':\
    \ 'bytes', 'Vary': 'Accept-Encoding,User-Agent', 'Content-Encoding': 'gzip', 'Content-Length':\
    \ '10127', 'Keep-Alive': 'timeout=15, max=100', 'Connection': 'Keep-Alive', 'Content-Type':\
    \ 'text/html', 'Set-Cookie': 'BIGipServer-CUIT-www.columbia.edu-80-pool=1311259520.20480.0000;\
    \ expires=Sat, 25-Jan-2020 01:04:12 GMT; path=/; HttpOnly'}\n    ```\n\n### How\
    \ it works...\n\nThe operation of `requests` is very simple; perform the request,\
    \ using the `GET` method in this case, over the URL. This returns a `result` object\
    \ that can be analyzed. The main elements are the `status_code` and the body content,\
    \ which can be presented as `text`.\n\nThe full request can be inspected in the\
    \ `request` attribute:\n\n```\n>>> response.request\n<PreparedRequest [GET]>\n\
    >>> response.request.url\n'http://www.columbia.edu/~fdc/sample.html'\n```\n\n\
    The full `requests` module documentation can be found here: `https://requests.readthedocs.io/en/master/`.\n\
    \nOver the course of the chapter, we'll be showing more features of the `requests`\
    \ library.\n\n### There's more...\n\nAll HTTP status codes can be seen at this\
    \ web page: `https://httpstatuses.com/`. They are also described in the `http.HTTPStatus`\
    \ enum with convenient constant names, such as `OK`, `NOT_FOUND`, or `FORBIDDEN`.\n\
    \n> The most famous error status code is arguably 404, which is returned when\
    \ the resource described by a URL is not found. Try it out by doing `requests.get('http://www.columbia.edu/invalid')`.\n\
    \nThe general structure of the status code is:\n\n1. 1XX - Information on specifics\
    \ about the protocol.\n2. 2XX - Success.\n3. 3XX - Redirection. For example: The\
    \ URL is no longer valid and is available somewhere else. The new URL should be\
    \ included.\n4. 4XX - Client error. There's some error in the information sent\
    \ to the server (like a bad format) or in the client (for example, authentication\
    \ is required to be able to access the URL).\n5. 5XX – Server error. There's an\
    \ error on the server side; for example, the server might be unavailable or there\
    \ might be a bug processing the request.\n\nA request can use the **HTTPS (secure\
    \ HTTP)** protocol. It is the same as HTTP but ensures that the contents of the\
    \ request and response are private. `requests` handles it transparently.\n\n>\
    \ Any website that handles any private information should use HTTPS to ensure\
    \ that the information has not leaked out. HTTP is vulnerable to someone eavesdropping.\
    \ Use HTTPS where available.\n\n### See also\n\n- The *Installing third-party\
    \ packages* recipe in *Chapter 1, Let's Begin Our Automation Journey*, to learn\
    \ the basics of installing external modules.\n- The *Parsing HTML* recipe, later\
    \ in this chapter, to find out how to treat the information returned from the\
    \ server.\n\n### Parsing HTML\n\nDownloading raw text or a binary file is a good\
    \ starting point, but the main language of the web is HTML.\n\nHTML is a structured\
    \ language, defining different parts of a document such as headings and paragraphs.\
    \ HTML is also hierarchical, defining sub-elements. The ability to parse raw text\
    \ into a structured document is basically the ability to extract information automatically\
    \ from a web page. For example, some text can be relevant if enclosed in certain\
    \ HTML elements, such as a `class div` or after a heading `h3` tag.\n\n### Getting\
    \ ready\n\nWe'll use the excellent `Beautiful Soup` module to parse HTML text\
    \ into a memory object that can be analyzed. We need to use the latest version\
    \ of the `beautifulsoup4` package to be compatible with Python 3. Add the package\
    \ to your `requirements.txt` and install the dependencies in the virtual environment:\n\
    \n```\n$ echo \"beautifulsoup4==4.8.2\" >> requirements.txt\n$ pip install -r\
    \ requirements.txt\n```"
  mdcn: "本示例中使用的电子邮件消息内容非常简单，但实际邮件可以比这复杂得多。\n\n收件人字段可以包含多个收件人。用逗号分隔，如下所示：\n\n```\n\
    message['To'] = ','.join(recipients)\n```\n\n邮件可以定义为HTML格式，同时提供纯文本替代版本，并可包含附件。基本操作是设置一个`MIMEMultipart`对象，然后附加构成邮件的各个MIME部分：\n\
    \n```\nfrom email.mime.multipart import MIMEMultipart\nfrom email.mime.text import\
    \ MIMEText\nfrom email.mime.image import MIMEImage\n\nmessage = MIMEMultipart()\n\
    part1 = MIMEText('some text', 'plain')\nmessage.attach(part1)\nwith open('path/image',\
    \ 'rb') as image:\n    part2 = MIMEImage(image.read())\nmessage.attach(part2)\n\
    ```\n\n最常见的SMTP连接是SMTP_SSL，它更安全，因为与服务器的所有通信都是加密的，并且始终需要登录名和密码。但是，也存在普通的、未经身份验证的SMTP——请查阅您的电子邮件提供商文档。\n\
    \n请记住，本示例旨在用于简单通知。如果附加不同的信息，邮件可能会变得相当复杂。如果您的目标是向客户或任何普通群体发送电子邮件，请尝试使用第9章“处理通信渠道”中的思路。\n\
    \n## 另请参阅\n\n- *第1章，开始我们的自动化之旅*中的*添加命令行选项*示例，以了解命令行选项的基本概念。\n- 本章前面介绍的*准备任务*示例，以了解设计自动化任务时应遵循的策略。\n\
    \n## 3 构建您的第一个网络爬虫应用\n\n互联网和**万维网（WWW）**可能是当今最突出的信息来源。其中大部分信息可以通过HTTP获取。HTTP最初是为了共享超文本页面而发明的（因此得名**超文本传输协议**），这开启了万维网。\n\
    \n这个过程在我们每次请求网页时都会发生，因此几乎每个人都应该很熟悉。但我们也可以通过编程方式执行这些操作，以自动检索和处理信息。Python在其标准库中有一个HTTP客户端，但出色的`requests`模块使得获取网页变得非常容易。在本章中，我们将了解如何操作。\n\
    \n在本章中，我们将涵盖以下示例：\n\n- 下载网页\n- 解析HTML\n- 爬取网络\n- 订阅源\n- 访问Web API\n- 与表单交互\n-\
    \ 使用Selenium进行高级交互\n- 访问受密码保护的页面\n- 加速网络爬取\n\n### 下载网页\n\n下载网页的基本能力涉及对URL发起HTTP\
    \ GET请求。这是任何网络浏览器的基本操作。\n\n让我们快速回顾一下此操作的不同部分，因为它有三个不同的元素：\n\n1. 使用HTTP协议。这涉及请求的结构方式。\n\
    2. 使用GET方法，这是最常见的HTTP方法。我们将在访问Web API示例中看到更多内容。\n3. 一个完整的URL，描述页面的地址，包括服务器（例如：mypage.com）和路径（例如：/page）。\n\
    \n该请求将通过互联网路由到服务器并由服务器处理，然后将发回响应。此响应将包含一个状态码（如果一切正常，通常为200）和一个包含结果的主体，通常是一个包含HTML页面的文本。\n\
    \n大部分操作由用于执行请求的HTTP客户端自动处理。我们将在本示例中了解如何发出简单请求以获取网页。\n\n> HTTP请求和响应也可以包含头部。头部包含有关请求本身的重要信息，例如请求的总大小、内容的格式、请求的日期以及使用的浏览器或服务器。\n\
    \n### 准备工作\n\n使用出色的`requests`模块，获取网页非常简单。安装该模块：\n\n```\n$ echo \"requests==2.23.0\"\
    \ >> requirements.txt\n$ source .venv/bin/activate\n(.venv) $ pip install -r requirements.txt\n\
    ```\n\n我们将下载位于http://www.columbia.edu/~fdc/sample.html的页面，因为它是一个简单的HTML页面，在文本模式下易于阅读。\n\
    \n### 操作步骤...\n\n1. 导入requests模块：\n    ```python\n    >>> import requests\n  \
    \  ```\n\n2. 使用以下URL向服务器发出请求，这将花费一两秒钟：\n    ```python\n    >>> url = 'http://www.columbia.edu/~fdc/sample.html'\n\
    \    >>> response = requests.get(url)\n    ```\n\n3. 检查返回对象的状态码：\n    ```python\n\
    \    >>> response.status_code\n    200\n    ```\n\n4. 检查结果的内容：\n    ```python\n\
    \    >>> response.text\n    '<!DOCTYPE HTML PUBLIC \"-//W3C//DTD HTML 4.01 Transitional//EN\"\
    >\\n<html>\\n<head>\\n\n    ...\n\n    完整主体\n\n    ...\n\n    <!-- 关闭上面开始的 <html>\
    \ -->\\n'\n    ```\n\n5. 检查发送和返回的头部：\n    ```python\n    >>> response.request.headers\n\
    \    {'User-Agent': 'python-requests/2.22.0', 'Accept-Encoding': 'gzip, deflate',\
    \ 'Accept': '*/*', 'Connection': 'keep-alive'}\n    >>> response.headers\n   \
    \ {'Date': 'Fri, 24 Jan 2020 19:04:12 GMT', 'Server': 'Apache', 'Last-Modified':\
    \ 'Wed, 11 Dec 2019 12:46:44 GMT', 'Accept-Ranges': 'bytes', 'Vary': 'Accept-Encoding,User-Agent',\
    \ 'Content-Encoding': 'gzip', 'Content-Length': '10127', 'Keep-Alive': 'timeout=15,\
    \ max=100', 'Connection': 'Keep-Alive', 'Content-Type': 'text/html', 'Set-Cookie':\
    \ 'BIGipServer-CUIT-www.columbia.edu-80-pool=1311259520.20480.0000; expires=Sat,\
    \ 25-Jan-2020 01:04:12 GMT; path=/; HttpOnly'}\n    ```\n\n### 工作原理...\n\n`requests`的操作非常简单；使用`GET`方法（本例中）对URL执行请求。这将返回一个可以分析的`result`对象。主要元素是`status_code`和主体内容，后者可以表示为`text`。\n\
    \n完整的请求可以在`request`属性中检查：\n\n```\n>>> response.request\n<PreparedRequest [GET]>\n\
    >>> response.request.url\n'http://www.columbia.edu/~fdc/sample.html'\n```\n\n\
    完整的`requests`模块文档可以在此处找到：`https://requests.readthedocs.io/en/master/`。\n\n在本章中，我们将展示`requests`库的更多功能。\n\
    \n### 更多内容...\n\n所有HTTP状态码可以在此网页查看：`https://httpstatuses.com/`。它们也在`http.HTTPStatus`枚举中用方便的常量名称描述，例如`OK`、`NOT_FOUND`或`FORBIDDEN`。\n\
    \n> 最著名的错误状态码可以说是404，当URL描述的资源未找到时返回。尝试执行`requests.get('http://www.columbia.edu/invalid')`来体验一下。\n\
    \n状态码的一般结构是：\n\n1. 1XX - 关于协议具体信息。\n2. 2XX - 成功。\n3. 3XX - 重定向。例如：URL不再有效，可在其他地方找到。应包含新的URL。\n\
    4. 4XX - 客户端错误。发送到服务器的信息存在某些错误（如格式错误）或客户端存在错误（例如，需要身份验证才能访问URL）。\n5. 5XX – 服务器错误。服务器端出现错误；例如，服务器可能不可用或处理请求时可能存在错误。\n\
    \n请求可以使用**HTTPS（安全HTTP）**协议。它与HTTP相同，但确保请求和响应的内容是私密的。`requests`透明地处理它。\n\n> 任何处理私人信息的网站都应使用HTTPS，以确保信息没有泄露。HTTP容易受到窃听。在可用的地方使用HTTPS。\n\
    \n### 另请参阅\n\n- *第1章，开始我们的自动化之旅*中的*安装第三方包*示例，以了解安装外部模块的基础知识。\n- 本章后面的*解析HTML*示例，以了解如何处理从服务器返回的信息。\n\
    \n### 解析HTML\n\n下载原始文本或二进制文件是一个良好的起点，但网络的主要语言是HTML。\n\nHTML是一种结构化语言，定义文档的不同部分，如标题和段落。HTML也是分层的，定义子元素。将原始文本解析为结构化文档的能力基本上就是从网页自动提取信息的能力。例如，如果某些文本包含在特定的HTML元素中，如`class\
    \ div`或标题`h3`标签之后，则可能是相关的。\n\n### 准备工作\n\n我们将使用出色的`Beautiful Soup`模块将HTML文本解析为可分析的内存对象。我们需要使用最新版本的`beautifulsoup4`包以兼容Python\
    \ 3。将该包添加到您的`requirements.txt`并在虚拟环境中安装依赖项：\n\n```\n$ echo \"beautifulsoup4==4.8.2\"\
    \ >> requirements.txt\n$ pip install -r requirements.txt\n```"
