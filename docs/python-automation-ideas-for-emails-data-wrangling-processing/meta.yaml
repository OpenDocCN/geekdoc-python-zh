  - '[PAGE 410]


    In *Chapter 4, Searching and Reading Local Files*, we introduced the `pytesseract`
    module as another way of extracting text from images and applying OCR. Both methods
    have their advantages and disadvantages. Calling the Google Cloud Vision API is
    likely to return a better result in worse conditions (noise, background images,
    handwriting), but at the same time, the access to an external API is slower and
    less safe. There''s also a cost associated with using the Vision API, especially
    if it''s used for bulk text extraction, while `pytesseract` is open source and
    free to use. The method you choose depends on the data and security requirements.


    You can access the full Vision API documentation at https://cloud.google.com/vision/docs/.
    The Python client documentation is at https://googleapis.dev/python/vision/latest/index.html.


    # See also


    +   - The *Analyzing images with Google Cloud Vision AI* recipe, earlier in this
    chapter, to learn how to create an account for Google Cloud interfaces.


