- md: "## Plotting pie charts\n\nPie charts! A Business 101 favorite, and a common\
    \ way of presenting percentages. We'll see in this recipe how to plot a pie chart,\
    \ with different slices representing proportions.\n\n### Getting ready\n\nWe need\
    \ to install `matplotlib` in our virtual environment using the following commands:\n\
    \n```\n$ echo \"matplotlib==3.2.1\" >> requirements.txt\n$ pip install -r requirements.txt\n\
    ```\n\nIf you are using macOS, you may get an error like this: **RuntimeError:\
    \ Python is not installed as a framework**. See the `matplotlib` documentation\
    \ on how to fix it: https://matplotlib.org/faq/osx_framework.html.\n\n### How\
    \ to do it...\n\n1. Import `matplotlib`:\n   ```python\n   >>> import matplotlib.pyplot\
    \ as plt\n   ```\n\n2. Prepare the data. This represents several lines of products:\n\
    \   ```python\n   >>> DATA = (\n   ...     ('Common', 100),\n   ...     ('Premium',\
    \ 75),\n   ...     ('Luxurious', 50),\n   ...     ('Extravagant', 20),\n   ...\
    \ )\n   ```\n\n3. Process the data to prepare the expected format:\n   ```python\n\
    \   >>> VALUES = [value for label, value in DATA]\n   >>> LABELS = [label for\
    \ label, value in DATA]\n   ```\n\n4. Create the pie chart:\n   ```python\n  \
    \ >>> plt.pie(VALUES, labels=LABELS, autopct='%1.1f%%')\n   <REDACTED>\n   >>>\
    \ plt.gca().axis('equal')\n   (-1.1113861431510297, 1.1005422098873965, -1.125031021533458,\
    \ 1.1221350517711501)\n   ```\n\n5. Display the graph:\n   ```python\n   >>> plt.show()\n\
    \   ```\n\n6. The result will be displayed in a new window, as follows:\n\n  \
    \ ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_277_0.png)\n\n### How it works...\n\
    \nThe module is imported in step 1 of the How to do it... section, and the data\
    \ to present is imported in step 2. The data is separated into two components,\
    \ a list of VALUES and a list of LABELS, in step 3.\n\nThe chart is created in\
    \ step 4 by adding VALUES and LABELS. The autopct parameter formats the value\
    \ so it displays it as a percentage to a single decimal place.\n\nThe call to\
    \ axis('equal') ensures the pie chart will look round, instead of having a bit\
    \ of perspective and appearing as an oval.\n\nTo display the resulting graph,\
    \ step 5 calls .show, which opens a new window with the result.\n\n> Calling .show\
    \ blocks the execution of the program. The program will resume when the window\
    \ is closed.\n\n### There's more...\n\nPie charts are a little overused in business\
    \ graphs. Most of the time, a bar chart with percentages or values will be a better\
    \ way of visualizing the data, especially if more than two or three options are\
    \ displayed. Try to limit the use of pie charts in your reports and data presentations.\n\
    \nRotating the start of the wedges is possible with the `startangle` parameter,\
    \ and the direction to set up the wedges is defined by `counterclock` (defaults\
    \ to `True`):\n\n```python\n>>> plt.pie(VALUES, labels=LABELS, startangle=90,\
    \ counterclock=False)\n```\n\nThe format inside the label can be set by a function.\
    \ As the value inside the pie is defined as a percentage, finding the original\
    \ value can be a little tricky. The following snippet creates a dictionary indexing\
    \ by its percentage as an integer, so we can retrieve the referenced value. Please\
    \ note that this assumes that no percentage gets repeated. If that's the case,\
    \ the labels may be slightly incorrect. In that case, we may need to use up to\
    \ the first decimal place for better precision:\n\n```python\n>>> from matplotlib.ticker\
    \ import FuncFormatter\n\n>>> total = sum(value for label, value in DATA)\n>>>\
    \ BY_VALUE = {int(100 * value / total): value for label, value in DATA}\n\n>>>\
    \ def value_format(percent, **kwargs):\n...     value = BY_VALUE[int(percent)]\n\
    ...     return '{}'.format(value)\n```\n\nOne or more wedges can also be separated\
    \ using the `explode` parameter. This specifies how separated the wedge is from\
    \ the center:\n\n```python\n>>> explode = (0, 0, 0.1, 0)\n>>> plt.pie(VALUES,\
    \ labels=LABELS, explode=explode, autopct=value_format,\n...         startangle=90,\
    \ counterclock=False)\n```\n\nBy combining all these options, we get the following\
    \ result when calling `plt.show()`:\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_279_0.png)\n\
    \nFigure 8.7: Highlighting a wedge by separating it\n\nThe full `matplotlib` documentation\
    \ can be found here: `https://matplotlib.org/`.\n\n### See also\n\n- The *Plotting\
    \ a simple sales graph* recipe, earlier in this chapter, to learn the basics of\
    \ plotting bar graphs.\n- The *Drawing stacked bars* recipe, from the previous\
    \ section, to learn how to plot accumulated values as bars.\n\n## Displaying multiple\
    \ lines\n\nThis recipe will show you how to display multiple lines in a graph.\n\
    \n### Getting ready\n\nWe need to install matplotlib in our virtual environment:\n\
    \n```\n$ echo \"matplotlib==3.2.1\" >> requirements.txt\n$ pip install -r requirements.txt\n\
    ```\n\nIf you are using macOS, you may get an error like this: **RuntimeError:\
    \ Python is not installed as a framework**. See the matplotlib documentation on\
    \ how to fix it: https://matplotlib.org/faq/osx_framework.html.\n\n### How to\
    \ do it...\n\n1. Import matplotlib:\n   ```python\n   >>> import matplotlib.pyplot\
    \ as plt\n   ```\n\n2. Prepare the data. This represents two products' sales:\n\
    \   ```python\n   >>> DATA = (\n   ...     ('Q1 2017', 100, 5),\n   ...     ('Q2\
    \ 2017', 105, 15),\n   ...     ('Q3 2017', 125, 40),\n   ...     ('Q4 2017', 115,\
    \ 80),\n   ... )\n   ```\n\n3. Process the data to prepare the expected format:\n\
    \   ```python\n   >>> POS = list(range(len(DATA)))\n   >>> VALUESA = [valueA for\
    \ label, valueA, valueB in DATA]\n   >>> VALUESB = [valueB for label, valueA,\
    \ valueB in DATA]\n   >>> LABELS = [label for label, value1, value2 in DATA]\n\
    \   ```\n\n4. Create the line plot. Two lines are required:\n   ```python\n  \
    \ >>> plt.plot(POS, VALUESA, 'o-')\n   [<matplotlib.lines.Line2D object at 0x12e78a2b0>]\n\
    \   >>> plt.plot(POS, VALUESB, 'o-')\n   [<matplotlib.lines.Line2D object at 0x12e7afcd0>]\n\
    \   >>> plt.ylabel('Sales')\n   Text(0, 0.5, 'Sales')\n   >>> plt.xticks(POS,\
    \ LABELS)\n   <REDACTED>\n   ```\n\n5. Display the graph:\n   ```python\n   >>>\
    \ plt.show()\n   ```\n\n6. The result will be displayed in a new window:\n\n \
    \  ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_281_0.png)\n\n### How it works...\n\
    \nIn the *How to do it...* section, *step 1* imports the module and *step 2* shows\
    \ the data to be plotted in a formatted way.\n\nIn *step 3*, the data is prepared\
    \ in three sequences, `VALUESA`, `VALUESB`, and `LABELS`. A `POS` increasing sequence\
    \ is used to locate each of the points along the *x-axis*.\n\n*Step 4* creates\
    \ the graph with the sequences *X* (`POS`) and *Y* (`VALUESA`), and then `POS`\
    \ and `VALUESB`. The value `'o-'` is added to draw a circle on each of the data\
    \ points and a full line between them.\n\n> By default, the plot will display\
    \ a solid line, with no marker on each point. If only the marker is used (that\
    \ is, 'o'), there'll be no line.\n\nEach of the periods is labeled on the x-axis\
    \ with .xticks. To clarify the meaning, we add a label with .ylabel.\n\nTo display\
    \ the resulting graph, step 5 calls .show, which opens a new window with the result.\n\
    \n> Calling .show blocks the execution of the program. The program will resume\
    \ when the window is closed.\n\n### There's more...\n\nGraphs with lines are deceptively\
    \ simple and able to create a lot of interesting representations. It is probably\
    \ the most convenient when showing mathematical graphs. For example, we can display\
    \ a graph showing Moore's Law in a few lines of code.\n\n> Moore's Law is an observation\
    \ by Gordon Moore that the number of components in an integrated circuit doubles\
    \ every 2 years. It was first described in 1965 and then corrected in 1975. It\
    \ seems to be quite close to the historic rate of technological advancement over\
    \ the last 40 years.\n\nWe first create a line describing the theoretical line,\
    \ with data points from 1970 to 2013. Starting with 1,000 transistors, we double\
    \ it every 2 years, up to 2013:\n\n```python\n>>> POS = [year for year in range(1970,\
    \ 2013)]\n>>> MOORES = [1000 * (2 ** (i * 0.5)) for i in range(len(POS))]\n>>>\
    \ plt.plot(POS, MOORES)\n[<matplotlib.lines.Line2D object at 0x12b7c27c0>]\n```\n\
    \nFollowing some documentation, we extract a few examples of commercial CPUs,\
    \ their year of release, and their number of integrated components from here:\
    \ http://mercury.pr.erau.edu/~siewerts/cec320/documents/Papers/AHistoryofMicroprocessorTransistorCount.pdf."
  mdcn: "## 绘制饼图\n\n饼图！这是商业入门课程的最爱，也是展示百分比的常用方式。本节将介绍如何绘制饼图，其中不同的扇区代表不同的比例。\n\n###\
    \ 准备工作\n\n我们需要在虚拟环境中安装 `matplotlib`，使用以下命令：\n\n```\n$ echo \"matplotlib==3.2.1\"\
    \ >> requirements.txt\n$ pip install -r requirements.txt\n```\n\n如果你使用的是 macOS，可能会遇到如下错误：**RuntimeError:\
    \ Python is not installed as a framework**。请参阅 `matplotlib` 文档了解如何修复：https://matplotlib.org/faq/osx_framework.html。\n\
    \n### 操作步骤...\n\n1. 导入 `matplotlib`：\n   ```python\n   >>> import matplotlib.pyplot\
    \ as plt\n   ```\n\n2. 准备数据。这代表了几条产品线：\n   ```python\n   >>> DATA = (\n   ...\
    \     ('Common', 100),\n   ...     ('Premium', 75),\n   ...     ('Luxurious',\
    \ 50),\n   ...     ('Extravagant', 20),\n   ... )\n   ```\n\n3. 处理数据以准备所需的格式：\n\
    \   ```python\n   >>> VALUES = [value for label, value in DATA]\n   >>> LABELS\
    \ = [label for label, value in DATA]\n   ```\n\n4. 创建饼图：\n   ```python\n   >>>\
    \ plt.pie(VALUES, labels=LABELS, autopct='%1.1f%%')\n   <REDACTED>\n   >>> plt.gca().axis('equal')\n\
    \   (-1.1113861431510297, 1.1005422098873965, -1.125031021533458, 1.1221350517711501)\n\
    \   ```\n\n5. 显示图表：\n   ```python\n   >>> plt.show()\n   ```\n\n6. 结果将显示在一个新窗口中，如下所示：\n\
    \n   ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_277_0.png)\n\n### 工作原理...\n\n在操作步骤...的第1步中导入了模块，第2步导入了要展示的数据。在第3步中，数据被分离为两个部分：一个\
    \ `VALUES` 列表和一个 `LABELS` 列表。\n\n在第4步中，通过添加 `VALUES` 和 `LABELS` 创建了图表。`autopct`\
    \ 参数格式化数值，使其显示为保留一位小数的百分比。\n\n调用 `axis('equal')` 确保饼图看起来是圆形的，而不是带有一点透视效果而呈现椭圆形。\n\
    \n为了显示生成的图表，第5步调用了 `.show`，这会打开一个包含结果的新窗口。\n\n> 调用 `.show` 会阻塞程序的执行。关闭窗口后，程序将继续运行。\n\
    \n### 更多内容...\n\n饼图在商业图表中有点被过度使用了。大多数情况下，使用带有百分比或数值的条形图会是更好的数据可视化方式，尤其是在显示超过两三个选项时。请尽量限制在报告和数据展示中使用饼图。\n\
    \n可以通过 `startangle` 参数旋转扇区的起始角度，扇区的排列方向由 `counterclock` 定义（默认为 `True`）：\n\n```python\n\
    >>> plt.pie(VALUES, labels=LABELS, startangle=90, counterclock=False)\n```\n\n\
    标签内的格式可以通过函数设置。由于饼图内的值定义为百分比，找到原始值可能有点棘手。以下代码片段创建了一个以整数百分比为索引的字典，这样我们就可以检索到对应的值。请注意，这假设没有百分比重复。如果出现这种情况，标签可能会略有不准确。在这种情况下，我们可能需要使用到小数点后第一位以获得更好的精度：\n\
    \n```python\n>>> from matplotlib.ticker import FuncFormatter\n\n>>> total = sum(value\
    \ for label, value in DATA)\n>>> BY_VALUE = {int(100 * value / total): value for\
    \ label, value in DATA}\n\n>>> def value_format(percent, **kwargs):\n...     value\
    \ = BY_VALUE[int(percent)]\n...     return '{}'.format(value)\n```\n\n也可以使用 `explode`\
