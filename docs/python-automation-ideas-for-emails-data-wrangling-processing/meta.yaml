  md: "# Automatic Testing Routines\n\nA Mock object will create another mock automatically\
    \ if any attribute is accessed or called. For example:\n\n```\n>>> from unittest.mock\
    \ import Mock\n>>> mock = Mock()\n>>> mock.attribute\n<Mock name='mock.attribute'\
    \ id='4337292000'>\n>>> mock.other_attribute\n<Mock name='mock.other_attribute'\
    \ id='4337292144'>\n>>> mock.other_attribute()\n<Mock name='mock.other_attribute()'\
    \ id='4337353728'>\n```\n\nThis means mocks have a flexible API that adapts easily\
    \ to most calls of a module.\n\nIn our example, we mocked a function and a constant\
    \ in our code, but you can also mock any library, either in the Python standard\
    \ library or any other installed package.\n\n> Keep in mind that you need to mock\
    \ in the correct path. You need to mock the object where it's imported to, not\
    \ where it's originally defined. For example, if you're importing from extpck\
    \ import extfunction into your package code.module, you need to mock it as follows:\n\
    \n@mock.patch('code.module.extfunction')\n\nIt's an easy mistake to make, even\
    \ for seasoned mocking users. Remember that you need to mock where it's used,\
    \ not where it's defined.\n\nIf you need to raise an exception when a mock is\
    \ called, you can do so using the .side_effect attribute. This is very useful\
    \ for testing error conditions in external libraries and making sure your code\
    \ can correctly handle them:\n\n```\n>>> from unittest.mock import Mock\n>>> mock\
    \ = Mock()\n>>> mock.side_effect = Exception('Custom error')\n>>> mock()\nTraceback\
    \ (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n  File \"\
    /usr/local/Cellar/python@3.8/3.8.2/Frameworks/Python.framework/Versions/3.8/lib/python3.8/unittest/mock.py\"\
    , line 1081, in __call__\n```"
