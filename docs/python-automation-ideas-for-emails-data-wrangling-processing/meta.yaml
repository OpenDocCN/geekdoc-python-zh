    \    图 5.8：恢复为纵向方向后的新页面\n\n## 工作原理...\n\n在*如何操作...*部分的*步骤 2*中创建文档后，我们为第一个节添加一个段落。请注意，文档以一个节开始。该段落在段落中间引入了一个换行符。\n\
