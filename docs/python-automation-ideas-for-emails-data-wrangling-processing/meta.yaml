    $ echo "selenium==3.141.0" >> requirements.txt

    $ pip install -r requirements.txt

    ```


    # How to do it...


    +   1. Import Selenium, start a browser and load the form page. A page will open
    reflecting the operations:


    ```

    >>> from selenium import webdriver

    >>> browser = webdriver.Chrome()

    >>> browser.get(''https://httpbin.org/forms/post'')

    ```


    > Note the banner in Chrome showing it is being controlled by automated test software.'
  - '[PAGE 99]


    Building Your First Web Scraping Application


    2. Add a value in the **Customer name** field. Remember that it is called custname:


    ```

    >>> custname = browser.find_element_by_name("custname")

    >>> custname.clear()

    >>> custname.send_keys("Sean O''Connell")

    ```


    The form will update:


    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_99_0.png)


    3. Set the pizza size to medium:


    ```

    >>> for size_element in browser.find_elements_by_name("size"):

    ...     if size_element.get_attribute(''value'') == ''medium'':

    ...         size_element.click()

    ...

    >>>

    ```


    This will set the **Pizza Size** radio button.


    4. Add bacon and cheese:


    ```

    >>> for topping in browser.find_elements_by_name(''topping''):

    ...     if topping.get_attribute(''value'') in [''bacon'', ''cheese'']:

    ...         topping.click()

    ...

    >>>

    ```


    Finally, the checkboxes will appear as marked:'
  - '[PAGE 100]


    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_100_0.png)


    5. Submit the form. The page will submit and the result will be displayed:


    ```

    >>> browser.find_element_by_tag_name(''form'').submit()

    ```


    The form will be submitted and the result from the server will be displayed:


    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_100_1.png)'
  - "[PAGE 101]\n\nBuilding Your First Web Scraping Application\n\n+   6. Close the\
    \ browser:\n    >>> browser.quit()\n\n# How it works...\n\nStep 1 in the *How\
    \ to do it...* section shows how to create a Selenium page and go to a particular\
    \ URL.\n\nSelenium works in a similar way to Beautiful Soup: you select an element\
    \ and then manipulate it. The selectors in Selenium work in a similar way to those\
    \ in Beautiful Soup, with the most common ones being `find_element_by_id`, `find_element_by_class_name`,\
    \ `find_element_by_name`, `find_element_by_tag_name`, and `find_element_by_css_selector`.\n\
    \nThere are equivalent `find_elements_by_x` actions that return lists by other\
    \ attributes other than the first found element (such as `find_elements_by_tag_name`,\
    \ `find_elements_by_name`, and more). This is also useful when checking whether\
    \ an element is there or not. If there are no elements, `find_element` will raise\
    \ an error while `find_elements` will return an empty list.\n\nData on the elements\
    \ can be obtained through `.get_attribute()` for HTML attributes (such as the\
    \ values on the form elements) or `.text`.\n\nElements can be manipulated by simulating\
    \ sending keystrokes to input text with the method `.send_keys()`, sending clicks\
    \ with `.click()`, or submitting the form with `.submit()`. Note that `.click()`\
    \ will select/deselect in the same way that a click of the mouse will.\n\nFinally,\
    \ step 6 closes the browser.\n\n# There's more...\n\nHere is the Python Selenium\
    \ documentation: http://selenium-python.readthedocs.io/.\n\nFor each of the elements,\
    \ there's extra information that can be extracted, such as `.is_displayed()` or\
    \ `.is_selected()`. Text can be searched using `.find_element_by_link_text()`\
    \ and `.find_element_by_partial_link_text()`.\n\nSometimes, opening a browser\
    \ can be inconvenient. An alternative is to start the browser in headless mode\
    \ and manipulate it from there, like this:\n\n```\n>>> from selenium.webdriver.chrome.options\
    \ import Options\n>>> chrome_options = Options()\n```\n\n[102]"
- md: "## Accessing password-protected pages\n\nSometimes a web page is not open to\
    \ the public but protected in some way. The simplest aspect of protection is to\
    \ use basic HTTP authentication, which is integrated into virtually every web\
    \ server and implements a user/password schema.\n\n### Getting ready\n\nWe can\
    \ test this kind of authentication in `https://httpbin.org`.\n\nIt has a path,\
    \ `/basic-auth/{user}/{password}`, which forces authentication, with the user\
    \ and password stated. This is very handy for understanding how authentication\
    \ works.\n\n### How to do it...\n\n1. Import `requests`:\n   ```python\n   >>>\
    \ import requests\n   ```\n\n2. Make a GET request to the URL with the wrong credentials.\
    \ Notice that we set the credentials on the URL to be `user` and `psswd`:\n  \
    \ ```python\n   >>> requests.get('https://httpbin.org/basic-auth/user/psswd',\n\
    \                    auth=('user', 'psswd'))\n   <Response [200]>\n   ```\n\n\
    3. Use the wrong credentials to return a 401 status code (unauthorized):\n   ```python\n\
    \   >>> requests.get('https://httpbin.org/basic-auth/user/psswd',\n          \
    \          auth=('user', 'wrong'))\n   <Response [401]>\n   ```\n\n4. The credentials\
    \ can also be passed directly as part of the URL, separated by a colon and an\
    \ @ symbol before the server, like this:\n   ```python\n   >>> requests.get('https://user:psswd@httpbin.org/basic-auth/user/psswd')\n\
    \   <Response [200]>\n   >>> requests.get('https://user:wrong@httpbin.org/basic-auth/user/psswd')\n\
    \   <Response [401]>\n   ```\n\n### How it works...\n\nAs HTTP basic authentication\
    \ is supported everywhere, support from requests is very easy.\n\nSteps 2 and\
    \ 4 in the How to do it... section show how to provide the proper password. Step\
    \ 3 shows what happens when the password is wrong.\n\n> Remember to always use\
    \ HTTPS to ensure that the sending of the password is kept secret. If you use\
    \ HTTP, the password will be sent in the open over the internet, allowing it to\
    \ be captured by listening elements.\n\n### There's more...\n\nAdding the user\
    \ and password to the URL works on the browser as well. Try to access the page\
    \ directly to see a box asking for the username and password:\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_104_0.png)\n\
    \nFigure 3.9: User credentials page\n\nWhen using a URL containing the user and\
    \ password, `https://user:psswd@httpbin.org/basic-auth/user/psswd`, the dialog\
    \ does not appear, and it authenticates automatically.\n\nIf you need to access\
    \ multiple pages, you can create a session in `requests` and set the authentication\
    \ parameters to avoid having to input them everywhere:\n\n```python\n>>> s = requests.Session()\n\
    >>> s.auth = ('user', 'psswd')\n>>> s.get('https://httpbin.org/basic-auth/user/psswd')\n\
    <Response [200]>\n```\n\n### See also\n\n- The *Downloading web pages* recipe,\
    \ earlier in this chapter, to learn the basics of requesting web pages.\n- The\
    \ *Accessing web APIs* recipe, earlier in this chapter, to learn how to access\
    \ APIs that are behind an authentication wall.\n\n## Speeding up web scraping\n\
    \nMost of the time spent downloading information from web pages is usually spent\
    \ waiting. A request goes from our computer to the remote server to process it,\
    \ and until the response is composed and comes back to our computer, we cannot\
    \ do much about it.\n\nDuring the execution of the recipes in the book, you'll\
    \ notice there's a wait involved in `requests` calls, normally of around one or\
    \ two seconds. But computers can do other stuff while waiting, including making\
    \ more requests at the same time. In this recipe, we will see how to download\
    \ a list of pages in parallel and wait until they are all ready. We will use an\
    \ intentionally slow server to show why it's worth getting this right.\n\n###\
    \ Getting ready\n\nWe'll get code to crawl and search for keywords, making use\
    \ of the `futures` capabilities of Python 3 to download multiple pages at the\
    \ same time.\n\nA `future` is an object that represents the promise of a value.\
    \ This means that you immediately receive an object while the code is being executed\
    \ in the background - only, when specifically requesting its `.result()`, the\
    \ code waits until the result is available.\n\n> If the result is already available\
    \ at that point, that makes it faster. Think of the operation as putting something\
    \ in the washing machine while doing other tasks. There's a chance that the laundry\
    \ will be done by the time we finish the rest of our chores.\n\nTo generate a\
    \ `future`, you need a background engine, called an **executor**. Once created,\
    \ `submit` a function and parameters to it to retrieve a `future`. The retrieval\
    \ of the result can be delayed as long as necessary, allowing the generation of\
    \ several `futures` in a row; then we can wait until all are finished and execute\
    \ them in parallel. This is an alternative to creating one, waiting until it finishes,\
    \ creating another, and so on.\n\nThere are several ways to create an executor;\
    \ in this recipe, we'll use `ThreadPoolExecutor`, which uses threads.\n\nWe'll\
    \ use a prepared example, available at the following GitHub repo: https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter03/test_site.\
    \ Download the whole site and run the included script:\n\n```\n$ python simple_delay_server.py\
    \ -d 2\n```\n\nThis serves the site at the URL http://localhost:8000. You can\
    \ see it in a browser. It's a simple blog with three entries. Most of it is uninteresting,\
    \ but we added a couple of paragraphs that contain the keyword python. The parameter\
    \ -d 2 makes the server intentionally slow, simulating a bad connection.\n\n###\
    \ How to do it...\n\n1. Write the following script, speed_up_step1.py. The full\
    \ code is available on GitHub at the Chapter03 directory (https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter03/speed_up_step1.py).\
    \ Here are only the most relevant parts. It is based on crawling_web_step1.py:\n\
    \n```python\n...\ndef process_link(source_link, text):\n    ...\n    return source_link,\
    \ get_links(parsed_source, page)\n...\n\ndef main(base_url, to_search, workers):\n\
    \    checked_links = set()\n    to_check = [base_url]\n    max_checks = 10\n\n\
    \    with concurrent.futures.ThreadPoolExecutor(max_workers=workers) as executor:\n\
    \        while to_check:\n            futures = [executor.submit(process_link,\
    \ url, to_search)\n                      for url in to_check]\n            to_check\
    \ = []\n            for data in concurrent.futures.as_completed(futures):\n  \
    \              link, new_links = data.result()\n\n                checked_links.add(link)\n\
    \                for link in new_links:\n                    if link not in checked_links\
    \ and link not in to_check:\n                        to_check.append(link)\n\n\
    \            max_checks -= 1\n            if not max_checks:\n               \
    \ return\n\nif __name__ == '__main__':\n    parser = argparse.ArgumentParser()\n\
    \    ...\n    parser.add_argument('-w', type=int, help='Number of workers',\n\
    \                        default=4)\n    args = parser.parse_args()\n\n    main(args.u,\
    \ args.p, args.w)\n```\n\n2. Notice the differences in the `main` function. Also,\
    \ there's an extra parameter added (number of concurrent workers), and the function\
    \ `process_link` now returns the source link.\n\n3. Run the `crawling_web_step1.py`\
    \ script to get a time baseline. Notice that the output has been removed here\
    \ for clarity:\n\n```\n$ time python crawling_web_step1.py http://localhost:8000/\n\
    ... REMOVED OUTPUT\nreal    0m12.221s\nuser    0m0.160s\nsys     0m0.034s\n```\n\
    \n4. Run the new script with one worker, which will make it slower than the original\
    \ one:\n\n```\n$ time python speed_up_step1.py -w 1\n... REMOVED OUTPUT\nreal\
    \    0m16.403s\nuser    0m0.181s\nsys     0m0.068s\n```\n\n5. Increase the number\
    \ of workers:\n\n```\n$ time python speed_up_step1.py -w 2\n... REMOVED OUTPUT\n\
    real    0m10.353s\n```"
  mdcn: "## 访问受密码保护的页面\n\n有时网页并非对公众开放，而是以某种方式受到保护。最简单的保护形式是使用基本HTTP身份验证，它几乎集成到所有Web服务器中，并实现了用户/密码模式。\n\
    \n### 准备工作\n\n我们可以在 `https://httpbin.org` 测试这种身份验证。\n\n它有一个路径 `/basic-auth/{user}/{password}`，该路径强制进行身份验证，并指定了用户名和密码。这对于理解身份验证的工作原理非常方便。\n\
    \n### 如何操作...\n\n1. 导入 `requests`：\n   ```python\n   >>> import requests\n   ```\n\
    \n2. 使用错误的凭据向URL发起GET请求。注意，我们将URL中的凭据设置为 `user` 和 `psswd`：\n   ```python\n   >>>\
    \ requests.get('https://httpbin.org/basic-auth/user/psswd',\n                \
    \    auth=('user', 'psswd'))\n   <Response [200]>\n   ```\n\n3. 使用错误的凭据会返回401状态码（未授权）：\n\
    \   ```python\n   >>> requests.get('https://httpbin.org/basic-auth/user/psswd',\n\
    \                    auth=('user', 'wrong'))\n   <Response [401]>\n   ```\n\n\
    4. 凭据也可以直接作为URL的一部分传递，在服务器之前用冒号和@符号分隔，如下所示：\n   ```python\n   >>> requests.get('https://user:psswd@httpbin.org/basic-auth/user/psswd')\n\
    \   <Response [200]>\n   >>> requests.get('https://user:wrong@httpbin.org/basic-auth/user/psswd')\n\
    \   <Response [401]>\n   ```\n\n### 工作原理...\n\n由于HTTP基本身份验证无处不在，`requests` 对其的支持非常简单。\n\
    \n“如何操作...”部分的步骤2和4展示了如何提供正确的密码。步骤3展示了密码错误时会发生什么。\n\n> 请记住始终使用HTTPS，以确保密码的发送是保密的。如果使用HTTP，密码将在互联网上明文发送，可能被监听元素捕获。\n\
    \n### 更多内容...\n\n将用户名和密码添加到URL中在浏览器中也有效。尝试直接访问页面，会看到一个要求输入用户名和密码的对话框：\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_104_0.png)\n\
    \n图3.9：用户凭据页面\n\n当使用包含用户名和密码的URL（`https://user:psswd@httpbin.org/basic-auth/user/psswd`）时，对话框不会出现，并且会自动进行身份验证。\n\
    \n如果需要访问多个页面，可以在 `requests` 中创建一个会话并设置身份验证参数，以避免在每个地方都输入它们：\n\n```python\n>>>\
    \ s = requests.Session()\n>>> s.auth = ('user', 'psswd')\n>>> s.get('https://httpbin.org/basic-auth/user/psswd')\n\
    <Response [200]>\n```\n\n### 另请参阅\n\n- 本章前面的 *下载网页* 食谱，了解请求网页的基础知识。\n- 本章前面的 *访问Web\
    \ API* 食谱，了解如何访问位于身份验证墙后面的API。\n\n## 加速网络爬取\n\n从网页下载信息所花费的大部分时间通常是在等待。一个请求从我们的计算机发送到远程服务器进行处理，在响应生成并返回到我们的计算机之前，我们对此无能为力。\n\
    \n在执行本书中的食谱时，你会注意到 `requests` 调用中存在等待，通常是一到两秒钟。但计算机在等待时可以做其他事情，包括同时发出更多请求。在这个食谱中，我们将看到如何并行下载一组页面，并等待它们全部完成。我们将使用一个故意设置得很慢的服务器来展示为什么值得正确处理这个问题。\n\
    \n### 准备工作\n\n我们将获取代码来爬取和搜索关键词，利用Python 3的 `futures` 功能同时下载多个页面。\n\n`future` 是一个表示值承诺的对象。这意味着你在代码在后台执行时立即收到一个对象——只有在专门请求其\
    \ `.result()` 时，代码才会等待结果可用。\n\n> 如果结果在那时已经可用，那会更快。可以将此操作想象成在做其他任务时把东西放进洗衣机。有可能在我们完成其他家务时，洗衣已经完成了。\n\
    \n要生成一个 `future`，你需要一个后台引擎，称为 **执行器**。创建后，向其 `submit` 一个函数和参数以获取一个 `future`。获取结果可以尽可能延迟，允许连续生成多个\
    \ `futures`；然后我们可以等待所有任务完成并并行执行它们。这是创建一个、等待其完成、再创建另一个等操作的替代方案。\n\n有几种方法可以创建执行器；在这个食谱中，我们将使用\
    \ `ThreadPoolExecutor`，它使用线程。\n\n我们将使用一个准备好的示例，可在以下GitHub仓库中找到：https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter03/test_site。下载整个站点并运行包含的脚本：\n\
    \n```\n$ python simple_delay_server.py -d 2\n```\n\n这将在URL http://localhost:8000\
    \ 上提供该站点。你可以在浏览器中查看它。这是一个简单的博客，有三个条目。大部分内容并不有趣，但我们添加了几个包含关键词python的段落。参数 -d 2\
    \ 使服务器故意变慢，模拟不良连接。\n\n### 如何操作...\n\n1. 编写以下脚本，speed_up_step1.py。完整代码可在GitHub的Chapter03目录中找到（https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter03/speed_up_step1.py）。这里只展示最相关的部分。它基于\
    \ crawling_web_step1.py：\n\n```python\n...\ndef process_link(source_link, text):\n\
    \    ...\n    return source_link, get_links(parsed_source, page)\n...\n\ndef main(base_url,\
    \ to_search, workers):\n    checked_links = set()\n    to_check = [base_url]\n\
    \    max_checks = 10\n\n    with concurrent.futures.ThreadPoolExecutor(max_workers=workers)\
    \ as executor:\n        while to_check:\n            futures = [executor.submit(process_link,\
    \ url, to_search)\n                      for url in to_check]\n            to_check\
    \ = []\n            for data in concurrent.futures.as_completed(futures):\n  \
    \              link, new_links = data.result()\n\n                checked_links.add(link)\n\
    \                for link in new_links:\n                    if link not in checked_links\
    \ and link not in to_check:\n                        to_check.append(link)\n\n\
    \            max_checks -= 1\n            if not max_checks:\n               \
    \ return\n\nif __name__ == '__main__':\n    parser = argparse.ArgumentParser()\n\
    \    ...\n    parser.add_argument('-w', type=int, help='Number of workers',\n\
    \                        default=4)\n    args = parser.parse_args()\n\n    main(args.u,\
    \ args.p, args.w)\n```\n\n2. 注意 `main` 函数中的差异。此外，添加了一个额外的参数（并发工作线程数），并且 `process_link`\
    \ 函数现在返回源链接。\n\n3. 运行 `crawling_web_step1.py` 脚本以获取时间基准。注意，为了清晰起见，此处已移除输出：\n\n\
    ```\n$ time python crawling_web_step1.py http://localhost:8000/\n... REMOVED OUTPUT\n\
    real    0m12.221s\nuser    0m0.160s\nsys     0m0.034s\n```\n\n4. 使用一个工作线程运行新脚本，这将使其比原始脚本更慢：\n\
    \n```\n$ time python speed_up_step1.py -w 1\n... REMOVED OUTPUT\nreal    0m16.403s\n\
    user    0m0.181s\nsys     0m0.068s\n```\n\n5. 增加工作线程数：\n\n```\n$ time python speed_up_step1.py\
    \ -w 2\n... REMOVED OUTPUT\nreal    0m10.353s\n```"
