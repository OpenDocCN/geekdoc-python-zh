- md: "## Automatic Testing Routines\n\n> The form rendered in https://httpbin.org/forms/post\
    \ and its POSTing url https://httpbin.org/post were introduced in the *Interacting\
    \ with forms* recipe from Chapter 3, *Building Your First Web Scraping Application*.\
    \ It presents a form to order a pizza and returns the same information that is\
    \ posted in the form in JSON format.\n\nLet's take a closer look at the `order_pizza`\
    \ function.\n\nThe code uses the current time to calculate the delivery time,\
    \ adding an hour. The time is described in the format HH:MM using `delivery_time.strftime('%H:%M')`.\
    \ The function `strftime` formats the time and the string '%H:%M' prints only\
    \ the hours and minutes of the time:\n\n```\ndelivery_time = datetime.now() +\
    \ timedelta(hours=1)\ndelivery = delivery_time.strftime('%H:%M')\n```\n\nThe full\
