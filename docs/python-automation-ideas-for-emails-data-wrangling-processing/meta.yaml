    \ 使用描述所需结果的方法，而不是执行操作的方法。\n\n> 这种方法被称为*声明式*，与命令式相对。*声明式*语言旨在描述结果，即*是什么*，而命令式语言描述*如何做*。声明式语言最常见的例子是\
