    # # 2

    ## Automating Tasks Made Easy


    To properly automate tasks, we need a way to make them execute automatically at
    the proper times. A task that needs to be started manually is not really fully
    automated.


    However, in order to be able to leave them running in the background while worrying
    about more pressing issues, the task will need to be adequate to run in *fire-and-forget*
    mode. We should be able to monitor that it executes correctly, be sure that we
    capture relevant information (such as receiving notifications if something interesting
    arises), and know whether there have been any errors while running it.


    Ensuring that a piece of software runs consistently with high reliability is actually
    a very big deal. It is one area that, in order to be done properly, requires specialized
    knowledge and staff, who typically go by the names of sysadmin, operations, or
    **SRE (Site Reliability Engineering)**. Big operations, such as Amazon and Google,
    require huge investment in ensuring that everything works 24/7.


    The objective for this book is way more modest than that, as most software doesn''t
    require this kind of high availability. Designing systems with downtimes of less
    than a few seconds per year is challenging, but executing a task with reasonable
    reliability is a much easier thing to do. However, be aware that there''s maintenance
    to be done, and plan accordingly.


    In this chapter, we''ll cover the following recipes:


    +   - Preparing a task

    - Setting up a cron job

    - Capturing errors and problems

    - Sending email notifications'
  - '[PAGE 45]


    We''ll begin by going over how we ought to prepare a task before we automate it.


    # Preparing a task


    It all starts with defining precisely the work that needs to be executed, and
    designing it in a way that doesn''t require human intervention to run.


    Some ideal characteristic points are as follows:


    +   1. **Single, clear entry point**: No confusion on how to start the task.

    2. **Clear parameters**: If there are any parameters, they should be as explicit
    as possible.

    3. **No interactivity**: Stopping the execution to request information from the
    user is not possible.

    4. **The result should be stored**: In order to be checked at a different time
    than when it runs.

    5. **Clear result**: When we oversee the execution of a program ourselves, we
    can accept more verbose results, such as unlabeled data or extra debugging information.
    However, for an automated task, the final result should be as concise and to the
    point as possible.

    6. **Errors should be logged**: To analyze what went wrong.


    A command-line program has a lot of those characteristics already. It always has
    a clear entry point, with defined parameters, and the result can be stored, even
    if just in text format. And it can be improved ensuring a config file that clarifies
    the parameters, and an output file.


    Note that point 6 is the objective of the *Capturing errors and problems* recipe,
    and will be covered there.


    To avoid interactivity, do not use any function that waits for user input, such
    as `input`. Remember to delete debugger breakpoints!


    # Getting ready


    We''ll start by following a structure in which a main function will serve as the
    entry point, and all parameters are supplied to it.


    This is the same basic structure that was presented in the *Adding command-line
    arguments* recipe in *Chapter 1, Let''s Begin Our Automation Journey*.'
- md: "The definition of a main function with all of the explicit arguments covers\
    \ points 1 (single, clear entry point) and 2 (clear parameters). Point 3 (no interactivity)\
    \ is not difficult to achieve.\n\nTo improve points 2 (clear parameters) and 5\
    \ (clear result), we'll look at retrieving the configuration from a file and storing\
    \ the result in another. Another option is to send a notification, such as an\
    \ email, which will be covered later in this chapter.\n\n## How to do it...\n\n\
    1. Prepare the following command-line program by multiplying two numbers, and\
    \ save it as `prepare_task_step1.py`:\n    ```python\n    import argparse\n\n\
    \    def main(number, other_number):\n        result = number * other_number\n\
    \        print(f'The result is {result}')\n\n    if __name__ == '__main__':\n\
    \        parser = argparse.ArgumentParser()\n        parser.add_argument('-n1',\
    \ type=int, help='A number', default=1)\n        parser.add_argument('-n2', type=int,\
    \ help='Another number', default=1)\n\n        args = parser.parse_args()\n\n\
    \        main(args.n1, args.n2)\n    ```\n    Run `prepare_task_step1.py` by multiplying\
    \ two numbers:\n    ```bash\n    $ python3 prepare_task_step1.py -n1 3 -n2 7\n\
    \    The result is 21\n    ```\n\n2. Update the file to define a config file that\
    \ contains both arguments, and save it as `prepare_task_step3.py`. Note that defining\
    \ a config file overwrites any command-line parameters:\n    ```python\n    import\
    \ argparse\n    import configparser\n\n    def main(number, other_number):\n \
    \       result = number * other_number\n        print(f'The result is {result}')\n\
    \n    if __name__ == '__main__':\n        parser = argparse.ArgumentParser()\n\
    \        parser.add_argument('-n1', type=int, help='A number', default=1)\n  \
    \      parser.add_argument('-n2', type=int, help='Another number', default=1)\n\
    \n        parser.add_argument('--config', '-c', type=argparse.FileType('r'),\n\
    \                            help='config file')\n\n        args = parser.parse_args()\n\
    \        if args.config:\n            config = configparser.ConfigParser()\n \
    \           config.read_file(args.config)\n            # Transforming values into\
    \ integers\n            args.n1 = int(config['ARGUMENTS']['n1'])\n           \
    \ args.n2 = int(config['ARGUMENTS']['n2'])\n\n        main(args.n1, args.n2)\n\
    \    ```\n\n3. Create the config file, config.ini. See the ARGUMENTS section and\
    \ the n1 and n2 values:\n    ```ini\n    [ARGUMENTS]\n    n1=5\n    n2=7\n   \
    \ ```\n\n4. Run the command with the config file. Note that the config file overwrites\
    \ the command-line parameters, as described in step 2:\n    ```bash\n    $ python3\
    \ prepare_task_step3.py -c config.ini\n    The result is 35\n    $ python3 prepare_task_step3.py\
    \ -c config.ini -n1 2 -n2 3\n    The result is 35\n    ```\n\n5. Add a parameter\
    \ to store the result in a file, and save it as `prepare_task_step6.py`:\n   \
    \ ```python\n    import argparse\n    import sys\n    import configparser\n\n\
    \    def main(number, other_number, output):\n        result = number * other_number\n\
    \        print(f'The result is {result}', file=output)\n\n    if __name__ == '__main__':\n\
    \        parser = argparse.ArgumentParser()\n        parser.add_argument('-n1',\
    \ type=int, help='A number', default=1)\n        parser.add_argument('-n2', type=int,\
    \ help='Another number', default=1)\n\n        parser.add_argument('--config',\
    \ '-c', type=argparse.FileType('r'),\n                            help='config\
    \ file')\n        parser.add_argument('-o', dest='output', type=argparse.FileType('w'),\n\
    \                            help='output file',\n                           \
    \ default=sys.stdout)\n\n        args = parser.parse_args()\n        if args.config:\n\
    \            config = configparser.ConfigParser()\n            config.read_file(args.config)\n\
    \            # Transforming values into integers\n            args.n1 = int(config['ARGUMENTS']['n1'])\n\
    \            args.n2 = int(config['ARGUMENTS']['n2'])\n\n        main(args.n1,\
    \ args.n2, args.output)\n    ```\n\n6. Run the result to check that it's sending\
    \ the output to the defined file. Note that there's no output outside the result\
    \ files:\n    ```bash\n    $ python3 prepare_task_step6.py -n1 3 -n2 5 -o result.txt\n\
    \    $ cat result.txt\n    The result is 15\n    $ python3 prepare_task_step6.py\
    \ -c config.ini -o result2.txt\n    $ cat result2.txt\n    The result is 35\n\
    \    ```\n\n## How it works...\n\nNote that the `argparse` module allows us to\
    \ define files as parameters, with the `argparse.FileType` type, and opens them\
    \ automatically. This is very handy and will raise an error if the file path leads\
    \ to an invalid location.\n\nRemember to open the file in the correct mode. In\
    \ *step 5*, the config file is opened in read mode (`r`) and the output file in\
    \ write mode (`w`), which will overwrite the file if it exists. You may find the\
    \ append mode (`a`) useful, which will add the next piece of data at the end of\
    \ an existing file.\n\n`configparser` module allows us to use config files with\
    \ ease. As demonstrated in *step 2*, the parsing of the file is simple, as follows:\n\
    ```python\nconfig = configparser.ConfigParser()\nconfig.read_file(file)\n```\n\
    The `config` will then be accessible as a dictionary. This will have the sections\
    \ of the config file as the keys, and inside another dictionary with each of the\
    \ config values. So, the value `n2` in the `ARGUMENTS` section is accessed as\
    \ `config['ARGUMENTS']['n2']`.\n\nNote that the values are always stored as strings,\
    \ which are required to be transformed into other types, such as integers.\n\n\
    If you need to obtain Boolean values, do not perform `value = bool(config[raw_value])`,\
    \ as any string will be transformed into `True` no matter what; for instance,\
    \ the string `False` is a true string, as it's not empty. Using an empty string\
    \ is a bad option as well, as they are very confusing. Use the `.getboolean` method\
    \ instead, for example, `value = config.getboolean(raw_value)`. There are similar\
    \ `getint()` and `getfloat()` for integers and float values.\n\nPython 3 allows\
    \ us to pass a `file` parameter to the `print` function, which will write to that\
    \ file. *Step 5* shows the usage to redirect all of the printed information to\
    \ a file.\n\nNote that the default parameter is `sys.stdout`, which will print\
    \ the value to the terminal (standard output). This means that calling the script\
    \ without an `-o` parameter will display the information on the screen, which\
    \ is helpful when developing and debugging the script:\n```bash\n$ python3 prepare_task_step6.py\
    \ -c config.ini\nThe result is 35\n$ python3 prepare_task_step6.py -c config.ini\
    \ -o result.txt\n$ cat result.txt\nThe result is 35\n```\n\n## There's more...\n\
    \nPlease refer to the full documentation of `configparser` in the official Python\
    \ documentation: https://docs.python.org/3/library/configparser.html.\n\nIn most\
    \ cases, this configuration parser should be good enough, but if more power is\
    \ needed, you can use YAML files as configuration files. YAML files (https://learn.getgrav.org/advanced/yaml)\
    \ are very common as configuration files. They are well structured and can be\
    \ parsed directly, taking into account of various data types:\n\n1. Add PyYAML\
    \ to the `requirements.txt` file:\n   `PyYAML==5.3`\n2. Install the requirements\
    \ in the virtual environment:\n   `$ pip install -r requirements.txt`\n3. Create\
    \ the `prepare_task_yaml.py` file:\n    ```python\n    import yaml\n    import\
    \ argparse\n    import sys\n\n    def main(number, other_number, output):\n  \
    \      result = number * other_number\n        print(f'The result is {result}',\
    \ file=output)\n\n    if __name__ == '__main__':\n        parser = argparse.ArgumentParser()\n\
    \        parser.add_argument('-n1', type=int, help='A number', default=1)\n  \
    \      parser.add_argument('-n2', type=int, help='Another number', default=1)\n\
    \        parser.add_argument('-c', dest='config', type=argparse.FileType('r'),\n\
    \                            help='config file in YAML format', default=None)\n\
    \        parser.add_argument('-o', dest='output', type=argparse.FileType('w'),\n\
    \                            help='output file', default=sys.stdout)\n\n     \
    \   args = parser.parse_args()\n        if args.config:\n            config =\
    \ yaml.load(args.config, Loader=yaml.FullLoader)\n            # No need to transform\
    \ values\n            args.n1 = config['ARGUMENTS']['n1']\n            args.n2\
    \ = config['ARGUMENTS']['n2']\n\n        main(args.n1, args.n2, args.output)\n\
    \    ```\n    > Note that the PyYAML yaml.load() function requires a Loader parameter.\
    \ This is to avoid arbitrary code execution if the YAML file comes from an untrusted\
    \ source. Always use yaml.SafeLoader unless you need a set of YAML language features.\
    \ Never use loaders other than yaml.SafeLoader if any part of the data coming\
    \ from a YAML file comes from an untrusted source (for example, user input). Refer\
    \ to this article for more information: https://github.com/yaml/pyyaml/wiki/PyYAML-yaml.load(input)-Deprecation.\n\
    \n4. Define the config file, config.yaml:\n    ```yaml\n    ARGUMENTS:\n     \
    \ n1: 7\n      n2: 4\n    ```"
