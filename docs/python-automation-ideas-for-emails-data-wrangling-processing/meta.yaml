    from pytest import fixture\n\n@fixture\ndef fzipfile():\n    content_length =\
    \ 50\n    content = ''.join(random.choices(string.ascii_lowercase,\n         \
    \                            k=content_length))\n    fnumber = ''.join(random.choices(string.digits,\
    \ k=3))\n\n    filename = f'file{fnumber}.zip'\n\n    write_zipfile(filename,\
    \ content)\n    yield filename, content\n\n    os.remove(filename)\n```\n\nThe\
    \ fixture generates some random content in the shape of a string of 50 lowercase\
    \ characters. It also generates a random filename. It then writes this file and\
    \ yields both the generated filename and the content. Finally, it removes the\
    \ file with a call to `os.remove`.\n\n## Automatic Testing Routines\n\nThe `yield`\
    \ keyword in Python allows us to pause the execution of code, return a value,\
    \ and then resume the code. In a fixture, everything that goes before `yield`\
    \ will be executed before the start of a test, and everything after `yield` will\
    \ be executed at the end of the test.\n\n> `yield` is typically used within generator\
    \ functions that act as iterators, but each time a new value is requested, the\
    \ code keeps executing until another `yield` is found; for example:\n\n```python\n\
    >>> def generator():\n...     yield 1\n...     yield 2\n...     for _ in range(3):\n\
    ...         yield 3\n...\n>>> list(generator())\n[1, 2, 3, 3, 3]\n```\n\nYou can\
    \ learn more about generators at https://realpython.com/introduction-to-python-generators/.\n\
    \nThe fixture then performs some setup (creates a zip file), returns the values\
    \ (randomly generated name and content) to work with, and finally cleans up (deletes\
    \ the file).\n\nThe other two tests use this fixture to set up the test. `test_readwrite_zipfile`\
    \ is very straightforward; it reads the file created by the fixture:\n\n```python\n\
    def test_readwrite_zipfile(fzipfile):\n    filename, expected_content = fzipfile\n\
    \    content = read_zipfile(filename)\n\n    assert content == expected_content\n\
    ```\n\nNote that the value returned by the fixture `fzipfile` is a tuple with\
    \ two elements, the filename and the content.\n\n`test_internal_zipfile` uses\
    \ the fixture to then check that there's only one file inside the zip file and\
    \ that it has the correct name. It opens the zip file and uses `.namelist()` to\
    \ get a list of the files inside to verify them:\n\n```python\ndef test_internal_zipfile(fzipfile):\n\
    \    filename, expected_content = fzipfile\n    EXPECTED_LIST = ['internal.txt']\n\
    \n    # Verify only a single file exist in the zipfile\n    with ZipFile(filename,\
    \ 'r') as zipfile:\n        assert zipfile.namelist() == EXPECTED_LIST\n```\n\n\
    ## There's more...\n\nFixtures can be shared across multiple test files. You don't\
    \ need to import them. Add them instead to the `conftest.py` file. You can generate\
    \ local `conftest.py` files in the subdirectory for fixtures that are local to\
    \ that directory only.\n\n> To use a fixture, the name of the parameter in the\
    \ test needs to have the name of the fixture. Be careful not to overwrite these\
    \ names unintentionally.\n\n`pytest` provides some built-in fixtures available\
    \ for common operations. For example, the fixture `caplog` captures the logs emitted\
    \ while running tests, and `tmp_path` creates a temporary subdirectory that's\
    \ unique to each test. Go to the fixture documentation for more details.\n\nThere\
