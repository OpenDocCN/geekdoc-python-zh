  md: 'Searching and Reading Local Files


    # There''s more...


    PDF is such a flexible format that it is widely used for a variety of purposes,
    but that also means that it can be difficult to parse and process.


    While most PDF files contain text information, it is not uncommon that they contain
    images of text. This happens when a document has been scanned. In this case, the
    information is stored as a collection of images, instead of in structured text.
    This makes it difficult to extract the textual data; we may end up having to resort
    to methods such as OCR to parse the images into text.


    PyPDF2 does not provide a good interface to deal with images. You may need to
    transform the PDF into a collection of images and then process the images with
    other tools like Pillow. See the Reading images recipe for ideas about OCR and
    the usage of Pillow. Most PDF readers can do it, or you can use a command-line
    tool such as pdftoppm (https://linux.die.net/man/1/pdftoppm) or QPDF (see the
    following).


    Some methods of encrypting files may not be understood by PyPDF2. It will generate
    NotImplementedError: only algorithm code 1 and 2 are supported. If that happens,
    you need to decrypt the PDF externally and open it once it is decrypted. You can
    use QPDF to create a copy without the password, as follows:


    ```

    $ qpdf --decrypt --password=PASSWORD encrypted.pdf output-decrypted.pdf

    ```


    The full documentation for QPDF is available here: http://qpdf.sourceforge.net/files/qpdf-manual.html.
    QPDF is available in most package managers as well.


    > QPDF is capable of doing a lot of transformations and analyzing PDFs in depth.
    There are also bindings in Python on a library called pikepdf (https://pikepdf.readthedocs.io/en/stable/).
    This package is more complicated to use than PyPDF2 and it''s not as straightforward
    for text extraction, but it can be useful for other operations such as extracting
    images from a PDF.


    # See also


    +   - The Reading text files recipe, earlier in this chapter, to learn the basics
    of opening and reading files.

    - The Crawling and searching directories recipe, earlier in this chapter, to learn
    how to search and find files in directories.'
