    \n## 另请参阅\n\n- 本章前面的 *编写和执行测试用例* 配方，以了解定义测试的基础知识。\n- 本章前面的 *测试外部代码* 配方，以了解如何测试其他模块中的代码。\n\
    \n## 选择性运行测试\n\n检测并运行项目中所有定义的测试对于验证一切是否正常工作是很好的。但在处理测试时完成的大部分开发工作，仅执行所有测试的一个子集会更有益。\n\
    \n在添加新代码或新测试时，快速迭代测试和代码的特定部分以缩小关注范围至关重要。\n\n在本配方中，我们将了解如何使用 `pytest` 运行可用测试的一个子集，以及在不同场景下应使用哪些参数。\n\
    \n## 准备工作\n\n我们将使用 `pytest` 模块以及其他模块。我们应该通过将它们添加到我们的 `requirements.txt` 文件中来安装模块，如下所示：\n\
    \n```\n$ echo \"pytest==5.4.1\" >> requirements.txt\n$ echo \"requests==2.23.0\"\
    \ >> requirements.txt\n$ echo \"responses==0.10.12\" >> requirements.txt\n$ echo\
    \ \"freezegun==0.3.15\" >> requirements.txt\n$ pip install -r requirements.txt\n\
    ```\n\n我们将使用本章前面配方中介绍的测试文件。你可以从 GitHub 仓库 https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter12\
    \ 下载它们，位于 tests 和 code 子目录下：\n\n```\n├── code\n│   ├── __init__.py\n│   ├── code_fixtures.py\n\
    │   ├── code_requests.py\n│   ├── dependencies.py\n│   └── external.py\n├── conftest.py\n\
    └── tests\n    ├── test_case.py\n    ├── test_dependencies.py\n    ├── test_external.py\n\
    \    ├── test_fixtures.py\n    ├── test_requests.py\n    └── test_requests_time.py\n\
    ```\n\n## 如何操作...\n\n1. 使用 pytest 运行所有测试：\n\n```\n$ pytest\n=============================\
    \ test session starts ==============================\nplatform darwin -- Python\
    \ 3.8.2, pytest-5.4.1, py-1.8.1, pluggy-0.13.1\nrootdir: /Python-Automation-Cookbook-second-Edition/Chapter12\n\
    collected 18 items\n\ntests/test_case.py ...F\n[ 22%]\ntests/test_dependencies.py\
