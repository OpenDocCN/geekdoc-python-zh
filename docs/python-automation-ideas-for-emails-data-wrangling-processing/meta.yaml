    # Receiving SMS


    SMS can also be received and processed automatically. This enables services such
    as delivering information on request (for instance, send INFO GOALS to receive
    the results from the Soccer League), but also more complex flows such as in bots,
    which can have simple conversations with users that enable rich services such
    as remotely configuring a thermostat.


    > Each time Twilio receives an SMS to one of your registered phone numbers, it
    performs a request to a publicly available URL. This is configured in the Twilio
    service, meaning the code to execute when accessing the URL should be under your
    control. This creates the problem of having this URL available on the internet.
    That means that just your local computer won''t work, as it''s very unlikely that
    it is addressable externally from your local network. We will use Heroku (http://heroku.com)
    to deliver an available service, but there are other alternatives. The Twilio
    documentation provides examples of using ngrok, which allows for local development
    by creating a tunnel between a public address and your local development environment.
    See here for more details: https://www.twilio.com/blog/2013/10/test-your-webhooks-locally-with-ngrok.html.


    This way of operating is common in communication APIs. It should be noted that
    Twilio has a beta API for WhatsApp, which works in a similar way. Check the docs
    for more information at https://www.twilio.com/docs/sms/whatsapp/quickstart/python.'
