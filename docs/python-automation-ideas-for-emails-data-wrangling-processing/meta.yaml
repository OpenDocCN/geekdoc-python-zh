    \nFigure 11.26: Service account list\n\nCopy the name of the service account and\
    \ go back to the **IAM** tab to create a new user with that name. Use the **ADD**\
    \ button at the top. Put the service account name and add the extra role of **AutoML\
    \ Editor**:\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_425_0.png)\n\nFigure 11.27:\
    \ Add a role to the member\n\nOnce saved, the model is ready to use authentication\
    \ with the `credentials.json` file. Remember to annotate the `REFERENCE` for the\
    \ model, as it will be used later.\n\nWe will use the `google-cloud-automl` module.\
    \ We should install the module, adding it to our `requirements.txt` file as follows:\n\
    \n```\n$ echo \"google-cloud-automl==0.10.0\" >> requirements.txt\n$ pip install\
    \ -r requirements.txt\n```\n\nThe code can be found in the GitHub repository:\
    \ https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter11.\
    \ There are some text examples with the name `example_shopX.txt`. The script we\
    \ will use is `text_predict.py`. Remember the training data is in the `shop_training`\
    \ subdirectory and compressed as `shop.zip`.\n\n`precision` and `recall` oppose\
    \ each other and can be tweaked to a certain extent.\n\n## How to do it...\n\n\
    1. Check the message from `example_shop1.txt` and categorize it using `text_predict.py`,\
    \ `credentials.json`, and `REFERENCE` for the model:\n\n```\n$ cat example_shop1.txt\n\
    Hello:\n\nAre there any offers in fridges? I'm searching to replace mine.\nI live\
    \ in a fifth floor and the lift is broken, would that be a\nproblem? I'll be fine\
    \ with paying an extra.\n\nThanks a lot,\nCarrie\n$ GOOGLE_APPLICATION_CREDENTIALS=credentials.json\
    \ python text_\npredict.py -m projects/<project_id>/locations/us-central1/\nmodels/<id>\
    \ example_shop1.txt\nLabel: appliances : 0.99986\nLabel: furniture : 0.00014\n\
    Label: others : 0.00000\n```\n\nCheck the result is correctly labelled as appliances.\n\
    \n2. Look at the message from `example_shop2.txt` and categorize it using `text_predict.py`,\
    \ `credentials.json`, and `REFERENCE` for the model:\n\n```\n$ cat example_shop2.txt\n\
    Hello:\n\nAre there any offers in fridges? I'm looking to replace mine\nthat is\
    \ old. I live in a fifth floor and the lift is broken, would\nthat be a problem?\
    \ I'll be fine with paying an extra.\nI think you also have a furniture department,\
    \ right? What are\nthe prices for mattresses?\n\nThanks a lot,\nCarrie\n$ GOOGLE_APPLICATION_CREDENTIALS=credentials.json\
    \ python text_\npredict.py -m projects/<project_id>/locations/us-central1/\nmodels/<id>\
    \ example_shop2.txt\nLabel: furniture : 0.99995\nLabel: appliances : 0.00005\n\
    Label: others : 0.00000\n```\n\nCheck the result is correctly labeled as furniture.\n\
    \n3. Look at the message from `example_shop3.txt` and categorize it using `text_predict.py`,\
    \ `credentials.json`, and `REFERENCE` for the model:\n\n```\n$ cat example_shop3.txt\n\
    Hello:\n\n    I need your full details including your address and phone for an\
    \ invoice. Can you please send them to me?\n\n    Thanks a lot,\n        Carrie\n\
    $ GOOGLE_APPLICATION_CREDENTIALS=credentials.json python text_predict.py -m projects/<project_id>/locations/us-central1/models/<id>\
    \ example_shop3.txt\nLabel: others : 1.00000\nLabel: furniture : 0.00000\nLabel:\
    \ appliances : 0.00000\n```\n\nCheck the result is correctly labelled as others.\n\
    \n## How it works...\n\nLet's take a look at the `text_predict.py` script, used\
    \ in all steps:\n\n```\nimport argparse\n\nfrom google.api_core.client_options\
    \ import ClientOptions\nfrom google.cloud import automl_v1\n\ndef main(content,\
    \ model_name):\n    content = args.input.read()\n    options = ClientOptions(api_endpoint='automl.googleapis.com')\n\
    \    prediction_client = automl_v1.PredictionServiceClient(\n        client_options=options\n\
    \    )\n    payload = {'text_snippet': {\n        'content': content,\n      \
    \  'mime_type': 'text/plain'}\n    }\n    params = {}\n    request = prediction_client.predict(model_name,\
    \ payload, params)\n    for result in request.payload:\n        label = result.display_name\n\
    \        match = result.classification.score\n        print(f'Label: {label} :\
    \ {match:.5f}')\n\nif __name__ == '__main__':\n    parser = argparse.ArgumentParser()\n\
    \    parser.add_argument(dest='input', type=argparse.FileType('r'),\n        \
    \                help='input text')\n    parser.add_argument('-m', dest='model',\
    \ type=str, help='model ref')\n    args = parser.parse_args()\n\n    main(content,\
    \ args.model)\n```\n\nThe final part of the script file deals with the parsing\
    \ of arguments, which was described in detail in *Chapter 2, Automating Tasks\
    \ Made Easy*. It accepts a file and the details for the model.\n\nThe main function\
    \ reads the input text and calls the Google API for AutoML. The data needs to\
    \ be sent in a standard structure including the `mime_type`. The result of `prediction_client.predict`\
    \ is printed. Note it's sorted so the most relevant label is located at the start:\n\
    \n```\nfor result in request.payload:\n    label = result.display_name\n    match\
    \ = result.classification.score\n    print(f'Label: {label} : {match:.5f}')\n\
    ```\n\nThe score match is displayed up to 5 decimal places with `{match:.5f}`.\n\
    \nYou can create your own messages and test to see if they are properly labeled.\n\
    \n## There's more...\n\nThe classification of text into different categories can\
    \ help to direct emails towards the correct department, to assign them with different\
    \ priorities, to generate statistics against a database of messages, or to divide\
    \ them into different groups."
  mdcn: "现在我们需要用我们的示例添加一个新的数据集：\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_420_0.png)\n\
    \n选择我们的数据集用于**单标签分类**（每个文本将有一个单一标签）：\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_420_1.png)\n\
    \n要上传文件，请选择一个ZIP文件。你需要创建一个新的存储桶来存储数据。请记住，存储桶名称需要是全局唯一的，因此你需要指定自己的名称。\n\n## 用于自动化的机器学习\n\
    \n按照说明创建一个存储桶。添加ZIP文件：\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_421_0.png)\n\
    \n图 11.21：导入训练集\n\n导入数据将需要几分钟时间。一旦导入完成，你将看到所有可用数据作为不同的项目：\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_421_1.png)\n\
    \n图 11.22：导入的数据\n\n有了这些数据，我们现在可以训练模型了。点击**训练**选项卡，然后点击**开始训练**，这可能需要*几个小时*，所以请耐心等待。完成后你会收到一封电子邮件：\n\
    \n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_422_0.png)\n\n图 11.23：开始训练\n\n> 正如你所看到的，为了正确标注数据，每个标签应有100个或更多的示例。我们的数据没有那么充足。示例越多，模型效果越好，尽管训练时间会更长。请记住，训练模型所需的计算能力将计入你的账户。使用免费账户，额度应该足够进行一些测试，但使用平台时请注意潜在的费用。\n\
    \n训练完成后，你可以查看模型的评估结果。系统会保留一些训练数据作为测试，以评估你的模型效果如何：\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_422_1.png)\n\
    \n图 11.24：评估模型的仪表板\n\n这里最重要的两个参数是`精确率`和`召回率`。\n\n> 精确率是模型预测正确标签的能力，而召回率是不分配错误标签的能力。精确率低的模型会有更多的假阳性——即附加了不正确标签的结果。例如，它会在没有微笑时检测到微笑。召回率低的模型会产生假阴性——即本应附加标签的结果没有被附加。例如，它在有微笑时检测不到微笑。\n\
    \n混淆矩阵显示了基于训练数据的检测模式。一个完美的矩阵将显示100%的对角线，这意味着数据被正确分类，没有错误元素。你可以看到这里并非如此。\n\n> 我们66.67%的精确率和召回率参数并不理想。这部分是由于生成的样本数量较少。在实际应用中，目标应达到90%或更高。\n\
    \n下一个选项卡**测试与使用**包含了我们使用所需的所有信息，但要能够调用API，我们需要为我们的服务账户添加适当的权限。\n\n> 复制**测试与使用**选项卡末尾的Python模型引用。它看起来类似于`projects/<PROJECT_ID>/locations/us-central1/models/<ID>`。我们稍后将用它作为`REFERENCE`。\n\
    \n请记住，服务账户与凭据相关联。要添加它们，请访问 https://console.cloud.google.com/iam-admin/：\n\n##\
    \ 第11章\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_424_0.png)\n\n图 11.25：定义了用户的仪表板\n\
    \n我们需要将服务账户添加为用户，并授予其**AutoML编辑器**角色。转到**服务账户**页面以获取我们创建的服务账户的名称：\n\n> 查看本章的第一个食谱*使用Google\
    \ Cloud Vision AI分析图像*，了解创建服务账户的过程。\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_424_1.png)\n\
    \n图 11.26：服务账户列表\n\n复制服务账户的名称，返回**IAM**选项卡，使用该名称创建一个新用户。使用顶部的**添加**按钮。输入服务账户名称并添加额外的**AutoML编辑器**角色：\n\
    \n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_425_0.png)\n\n图 11.27：为成员添加角色\n\n保存后，模型就可以使用`credentials.json`文件进行身份验证了。记得标注模型的`REFERENCE`，因为稍后会用到。\n\
    \n我们将使用`google-cloud-automl`模块。我们应该安装该模块，将其添加到我们的`requirements.txt`文件中，如下所示：\n\
    \n```\n$ echo \"google-cloud-automl==0.10.0\" >> requirements.txt\n$ pip install\
    \ -r requirements.txt\n```\n\n代码可以在GitHub仓库中找到：https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter11。有一些名为`example_shopX.txt`的文本示例。我们将使用的脚本是`text_predict.py`。请记住，训练数据位于`shop_training`子目录中，并压缩为`shop.zip`。\n\
    \n`精确率`和`召回率`相互对立，并且可以在一定程度上进行调整。\n\n## 如何操作...\n\n1.  检查来自`example_shop1.txt`的消息，并使用`text_predict.py`、`credentials.json`和模型的`REFERENCE`对其进行分类：\n\
    \n```\n$ cat example_shop1.txt\nHello:\n\nAre there any offers in fridges? I'm\
    \ searching to replace mine.\nI live in a fifth floor and the lift is broken,\
    \ would that be a\nproblem? I'll be fine with paying an extra.\n\nThanks a lot,\n\
    Carrie\n$ GOOGLE_APPLICATION_CREDENTIALS=credentials.json python text_\npredict.py\
    \ -m projects/<project_id>/locations/us-central1/\nmodels/<id> example_shop1.txt\n\
    Label: appliances : 0.99986\nLabel: furniture : 0.00014\nLabel: others : 0.00000\n\
    ```\n\n检查结果是否正确标记为`appliances`。\n\n2.  查看来自`example_shop2.txt`的消息，并使用`text_predict.py`、`credentials.json`和模型的`REFERENCE`对其进行分类：\n\
    \n```\n$ cat example_shop2.txt\nHello:\n\nAre there any offers in fridges? I'm\
    \ looking to replace mine\nthat is old. I live in a fifth floor and the lift is\
    \ broken, would\nthat be a problem? I'll be fine with paying an extra.\nI think\
    \ you also have a furniture department, right? What are\nthe prices for mattresses?\n\
    \nThanks a lot,\nCarrie\n$ GOOGLE_APPLICATION_CREDENTIALS=credentials.json python\
    \ text_\npredict.py -m projects/<project_id>/locations/us-central1/\nmodels/<id>\
    \ example_shop2.txt\nLabel: furniture : 0.99995\nLabel: appliances : 0.00005\n\
    Label: others : 0.00000\n```\n\n检查结果是否正确标记为`furniture`。\n\n3.  查看来自`example_shop3.txt`的消息，并使用`text_predict.py`、`credentials.json`和模型的`REFERENCE`对其进行分类：\n\
    \n```\n$ cat example_shop3.txt\nHello:\n\n    I need your full details including\
    \ your address and phone for an invoice. Can you please send them to me?\n\n \
    \   Thanks a lot,\n        Carrie\n$ GOOGLE_APPLICATION_CREDENTIALS=credentials.json\
    \ python text_predict.py -m projects/<project_id>/locations/us-central1/models/<id>\
    \ example_shop3.txt\nLabel: others : 1.00000\nLabel: furniture : 0.00000\nLabel:\
    \ appliances : 0.00000\n```\n\n检查结果是否正确标记为`others`。\n\n## 工作原理...\n\n让我们看一下在所有步骤中使用的`text_predict.py`脚本：\n\
    \n```\nimport argparse\n\nfrom google.api_core.client_options import ClientOptions\n\
    from google.cloud import automl_v1\n\ndef main(content, model_name):\n    content\
    \ = args.input.read()\n    options = ClientOptions(api_endpoint='automl.googleapis.com')\n\
    \    prediction_client = automl_v1.PredictionServiceClient(\n        client_options=options\n\
    \    )\n    payload = {'text_snippet': {\n        'content': content,\n      \
    \  'mime_type': 'text/plain'}\n    }\n    params = {}\n    request = prediction_client.predict(model_name,\
    \ payload, params)\n    for result in request.payload:\n        label = result.display_name\n\
    \        match = result.classification.score\n        print(f'Label: {label} :\
    \ {match:.5f}')\n\nif __name__ == '__main__':\n    parser = argparse.ArgumentParser()\n\
    \    parser.add_argument(dest='input', type=argparse.FileType('r'),\n        \
    \                help='input text')\n    parser.add_argument('-m', dest='model',\
    \ type=str, help='model ref')\n    args = parser.parse_args()\n\n    main(content,\
    \ args.model)\n```\n\n脚本文件的最后一部分处理参数解析，这在*第2章，让任务自动化变得简单*中有详细描述。它接受一个文件和模型的详细信息。\n\
    \n主函数读取输入文本并调用Google AutoML API。数据需要以包含`mime_type`的标准结构发送。`prediction_client.predict`的结果被打印出来。请注意，它是排序的，因此最相关的标签位于开头：\n\
    \n```\nfor result in request.payload:\n    label = result.display_name\n    match\
    \ = result.classification.score\n    print(f'Label: {label} : {match:.5f}')\n\
    ```\n\n分数匹配显示到小数点后5位，使用`{match:.5f}`。\n\n你可以创建自己的消息并测试它们是否被正确标记。\n\n## 更多内容...\n\
    \n将文本分类到不同类别有助于将电子邮件引导到正确的部门，为它们分配不同的优先级，根据消息数据库生成统计信息，或将它们分成不同的组。"
