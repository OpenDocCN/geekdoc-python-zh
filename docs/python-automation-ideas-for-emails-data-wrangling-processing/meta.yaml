  - "[PAGE 487]\n\nDebugging Techniques\n\nAfter checking the general execution in\
    \ *step 1*, in *step 2*, we introduced a `breakpoint` in the code.\n\nWhen you\
    \ execute the code in *step 3*, it will stop at the `breakpoint` position, entering\
    \ an interactive mode.\n\nIn the interactive mode, we can inspect the values of\
    \ any variable, as well as perform any kind of operation. As demonstrated in *step\
    \ 4*, sometimes, a line of code can be better analyzed by reproducing its parts.\n\
    \nThe code can be inspected and regular operations can be executed in the command\
    \ line. The next line of code can be executed by calling `n` (`next`), as implemented\
    \ in *step 5* several times, to see the flow of the code.\n\n*Step 6* shows how\
    \ to resume the execution with the `c` (`continue`) command, in order to stop\
    \ in the next breakpoint. All these operations can be iterated to see the flow\
    \ and values, and to understand what the code is doing at any point.\n\nThe execution\
    \ can be stopped with `q` (`quit`), as demonstrated in *step 7*.\n\n# There's\
    \ more...\n\nTo see all the available operations, you can call `h` (`help`) at\
    \ any point.\n\nYou can check the surrounding code at any point using the `l`\
    \ (`list`) command. For example, in *step 4*:\n\n```\n(Pdb) l\n  3     return\
    \ False\n  4\n  5     lower = candidate - 1\n  6     while lower > 1:\n  7   \
    \      breakpoint()\n  8  ->     if candidate / lower == candidate // lower:\n\
    \  9             return False\n 10         lower -= 1\n 11\n 12     return True\n\
    ```\n\nThe other two main debugger commands are `s` (`step`), which will execute\
    \ the next step, including entering a new call (as in *stepping into*), and `r`\
    \ (`return`), which will continue the execution of the current function until\
    \ it executes a `return` statement, and then stops. Note that at the end of any\
    \ Python function, there's an implicit `return None`."
- md: "You can set up (and disable) more breakpoints using the `pdb` command (`break`).\
    \ You need to specify the file and line for the breakpoint, but it's actually\
    \ more straightforward and less error-prone to just change the code and run it\
    \ again.\n\nYou can overwrite variables as well as read them. Or create new variables.\
    \ Or make extra calls. Or anything else you can imagine. The full power of the\
    \ Python interpreter is at your service! Use it to check how something works or\
    \ verify whether something is happening.\n\n> Avoid creating variables with names\
    \ that are reserved for the debugger, such as calling a list `l`. It will make\
    \ things confusing and interfere with `pdb` commands, sometimes in non-obvious\
    \ ways.\n\nThe `breakpoint()` function was introduced in Python 3.7 and is highly\
    \ recommended if you're using a compatible version. In previous versions, you\
    \ need to replace it with the following:\n\n```\nimport pdb;\npdb.set_trace()\n\
    ```\n\nThey work in exactly the same way. Note the two statements in the same\
    \ line, which is not recommended in Python in general, but it's a great way of\
    \ keeping the breakpoint in a single line.\n\n> Remember to remove any `breakpoints`\
    \ once debugging is done! Especially when committing to a version control system\
    \ such as Git.\n\nYou can read more about the new `breakpoint` call in the official\
    \ PEP at https://www.python.org/dev/peps/pep-0553/.\n\nThe full `pdb` documentation\
    \ can be found here: https://docs.python.org/3.7/library/pdb.html#module-pdb.\
    \ It includes all the debug commands.\n\n## See also\n\n- The *Learning Python\
    \ interpreter basics* recipe, earlier in this chapter, to learn the basics of\
    \ Python introspection tools.\n- The *Improving your debugging skills* recipe,\
    \ next in this chapter, to see an example of debugging covering different problems.\n\
    \n## Improving your debugging skills\n\nIn this recipe, we will analyze and fix\
    \ some bugs using a small script that replicates a call to an external service.\
    \ We will show different techniques to improve your debugging skills.\n\nThe script\
    \ will send some personal names to an internet server (httpbin.org, a test site)\
    \ to get them back, simulating its retrieval from an external server. It will\
    \ then split them into first and last names and prepare them to be sorted by surname.\
    \ Finally, it will sort them.\n\n> We used this test site previously in the Interacting\
    \ with forms recipe, Chapter 3, Building Your First Web Scraping Application.\
    \ Note that the URL https://httpbin.org/forms/post renders the form, but internally\
    \ calls the URL https://httpbin.org/post to send the information. We only need\
    \ to use the second URL for this recipe.\n\nThe script contains several bugs that\
    \ we will detect and fix.\n\n## Getting ready\n\nFor this recipe, we will use\
    \ the requests and parse modules and include them in our virtual environment:\n\
    \n```\n$ echo \"requests==2.18.3\" >> requirements.txt\n$ echo \"parse==1.8.2\"\
    \ >> requirements.txt\n$ pip install -r requirements.txt\n```\n\nThe debug_skills.py\
    \ script is available from GitHub: https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter13/debug_skills.py.\
    \ Note that it contains bugs that we will fix as part of this recipe.\n\n## How\
    \ to do it...\n\n1. Run the script, which will generate an error:\n\n```\n$ python\
    \ debug_skills.py\nTraceback (most recent call last):\n  File \"debug_skills.py\"\
    , line 26, in <module>\n    raise Exception(f'Error accessing server: {result}')\n\
    Exception: Error accessing server: <Response [405]>\n```\n\n2. Analyze the status\
    \ code. We get 405, which means that the method we sent is not allowed. We inspect\
    \ the code and realize that for the request on line 24, we used GET when we should\
    \ have used POST (as described in the URL). Replace the code with the following:\n\
    \n```\n# ERROR Step 2. Using .get when it should be .post\n# (old) result = requests.get('http://httpbin.org/post',\n\
    json=data)\nresult = requests.post('http://httpbin.org/post', json=data)\n```\n\
    \nWe keep the old buggy code commented with (old) for clarity of changes that\
    \ we made.\n\n3. Run the code again, which will produce a different error:\n\n\
    ```\n$ python debug_skills.py\nTraceback (most recent call last):\n  File \"debug_skills_solved.py\"\
    , line 34, in <module>\n    first_name, last_name = full_name.split()\nValueError:\
    \ too many values to unpack (expected 2)\n```\n\n4. Insert a breakpoint in line\
    \ 33, one preceding the error. Run it again and enter debugging mode:\n\n```\n\
    $ python debug_skills_solved.py\n..debug_skills.py(35)<module>()\n-> first_name,\
    \ last_name = full_name.split()\n(Pdb) n\n> ...debug_skills.py(36)<module>()\n\
    -> ready_name = f'{last_name}, {first_name}'\n(Pdb) c\n> ...debug_skills.py(34)<module>()\n\
    -> breakpoint()\n```\n\nRunning n does not produce an error, meaning that it's\
    \ not the first value. After a few runs on c, we realize that this is not the\
    \ correct approach, as we don't know what input is the one generating the error.\n\
    \n5. Instead, wrap the line with a try...except block and produce a breakpoint\
    \ at that point:\n\n```\ntry:\n    first_name, last_name = full_name.split()\n\
    except:\n    breakpoint()\n```\n\n6. We run the code again. This time, the code\
    \ stops at the moment the data produced an error:\n\n```\n$ python debug_skills.py\n\
    > ...debug_skills.py(38)<module>()\n-> ready_name = f'{last_name}, {first_name}'\n\
    (Pdb) full_name\n'John Paul Smith'\n```\n\n7. The cause is now clear; line 35\
    \ only allows us to split two words, but raises an error if a middle name is added.\
    \ After some testing, we settle into this line to fix it:\n\n```\n# ERROR Step\
    \ 6 split only two words. Some names has middle names\n# (old) first_name, last_name\
    \ = full_name.split()\nfirst_name, last_name = full_name.rsplit(maxsplit=1)\n\
    ```\n\n8. We run the script again. Be sure to remove `breakpoint` and the `try..except`\
    \ block. This time, it generates a list of names! And they are sorted alphabetically\
    \ by surname. However, a few of the names look incorrect:\n\n```\n$ python debug_skills_solved.py\n\
    ['Berg, Keagan', 'Cordova, Mai', 'Craig, Michael', 'García, Rocío', 'Mccabe, Fathima',\
    \ \"O'Carroll, Séamus\", 'Pate, Poppy-Mae', 'Rennie, Vivienne', 'Smith, John Paul',\
    \ 'Smyth, John', 'Sullivan, Roman']\n```\n\nWho's called O'Carroll, Séamus?\n\n\
    9. To analyze this particular case but skip the rest, we must create an `if` condition\
    \ to break only for that name in line 33. Notice the `in` to avoid having to be\
    \ totally correct:\n\n```\nfull_name = parse.search('\"custname\": \"{name}\"\
    ', raw_result)['name']\nif \"O'Carroll\" in full_name:\n    breakpoint()\n```\n\
    \n10. Run the script once more. The breakpoint stops at the proper moment:\n\n\
    ```\n$ python debug_skills.py\n> debug_skills.py(38)<module>()\n-> first_name,\
    \ last_name = full_name.rsplit(maxsplit=1)\n(Pdb) full_name\n\"Séamus O'Carroll\"\
    \n```\n\n11. Move upward in the code and check the different variables:\n\n```\n\
    (Pdb) full_name\n\"Séamus O'Carroll\"\n(Pdb) raw_result\n'{\"custname\": \"Séamus\
    \ O\\'Carroll\"}'\n(Pdb) result.json()\n{'args': {}, 'data': '{\"custname\": \"\
    Séamus O\\'Carroll\"}', 'files': {}, 'form': {}, 'headers': {'Accept': '*/*',\
    \ 'Accept-Encoding': 'gzip, deflate', 'Connection': 'close', 'Content-Length':\
    \ '37', 'Content-Type': 'application/json', 'Host': 'httpbin.org', 'User-Agent':\
    \ 'python-requests/2.18.3'}, 'json': {'custname': 'Séamus O'Carroll'}, 'origin':\
    \ '89.100.17.159', 'url': 'http://httpbin.org/post'}\n```\n\n12. In the `result.json()`\
    \ dictionary, there's actually a different field that seems to be rendering the\
    \ name properly, which is called 'json'. Let's look at it in detail; we can see\
    \ that it's a dictionary:\n\n```\n(Pdb) result.json()['json']\n{'custname': \"\
    Séamus O'Carroll\"}\n(Pdb) type(result.json()['json'])\n<class 'dict'>\n```\n\n\
    13. Now, we need to change the code. Instead of parsing the raw value in 'data',\
    \ use the 'json' field directly from the result. This simplifies the code, which\
    \ is great!\n\n```\n# ERROR Step 11. Obtain the value from a raw value. Use\n\
    # the decoded JSON instead\n# raw_result = result.json()['data']\n# Extract the\
    \ name from the result\n# full_name = parse.search('\"custname\": \"{name}\"',\
    \ raw_result)['name']\nraw_result = result.json()['json']\nfull_name = raw_result['custname']\n\
    ```\n\n14. Run the code again. Remember to remove the `breakpoint`:\n\n```\n$\
    \ python debug_skills.py\n['Berg, Keagan', 'Cordova, Mai', 'Craig, Michael', 'García,\
    \ Rocío', 'Mccabe, Fathima', \"O'Carroll, Séamus\", 'Pate, Poppy-Mae', 'Rennie,\
    \ Vivienne', 'Smith, John Paul', 'Smyth, John', 'Sullivan, Roman']\n```\n\nThis\
    \ time, it's all correct! You have successfully debugged the program!\n\n## How\
    \ it works...\n\nThe structure of this recipe is divided into three different\
    \ problems. Let's analyze it in small blocks:\n\n1. First error—Wrong call to\
    \ the external service:\n   After showing the first error in `step 1`, we read\
    \ the resulting error with care, saying that the server is returning a `405` status\
    \ code."
  mdcn: "你可以使用 `pdb` 命令（`break`）来设置（或禁用）更多断点。你需要指定断点所在的文件和行号，但实际上，直接修改代码并重新运行会更直接且不易出错。\n\
    \n你不仅可以读取变量，还可以覆盖它们。或者创建新变量。或者进行额外的调用。或者任何你能想到的操作。Python 解释器的全部功能都为你所用！用它来检查某事物如何工作，或验证某事是否正在发生。\n\
    \n> 避免使用调试器保留的名称来创建变量，例如将列表命名为 `l`。这会造成混淆，并干扰 `pdb` 命令，有时是以不明显的方式。\n\n`breakpoint()`\
    \ 函数在 Python 3.7 中引入，如果你使用兼容版本，强烈推荐使用。在之前的版本中，你需要用以下代码替换它：\n\n```\nimport pdb;\n\
    pdb.set_trace()\n```\n\n它们的工作方式完全相同。注意同一行中的两条语句，这在 Python 中通常不推荐，但这是将断点保持在单行的好方法。\n\
    \n> 记得在调试完成后移除任何 `breakpoints`！尤其是在提交到版本控制系统（如 Git）时。\n\n你可以在官方 PEP 中阅读更多关于新的\
    \ `breakpoint` 调用的信息：https://www.python.org/dev/peps/pep-0553/。\n\n完整的 `pdb` 文档可以在这里找到：https://docs.python.org/3.7/library/pdb.html#module-pdb。它包含了所有调试命令。\n\
    \n## 另请参阅\n\n- 本章前面的 *学习 Python 解释器基础* 配方，以了解 Python 自省工具的基础知识。\n- 本章接下来的 *提高你的调试技能*\
    \ 配方，以查看一个涵盖不同问题的调试示例。\n\n## 提高你的调试技能\n\n在这个配方中，我们将使用一个模拟调用外部服务的小脚本来分析和修复一些错误。我们将展示不同的技术来提高你的调试技能。\n\
    \n该脚本将向一个互联网服务器（httpbin.org，一个测试站点）发送一些个人姓名，然后将它们取回，模拟从外部服务器检索。然后，它将它们拆分为名字和姓氏，并准备按姓氏排序。最后，它将对它们进行排序。\n\
    \n> 我们之前在第 3 章《构建你的第一个网页抓取应用程序》的《与表单交互》配方中使用过这个测试站点。请注意，URL https://httpbin.org/forms/post\
    \ 渲染表单，但内部调用 URL https://httpbin.org/post 来发送信息。对于这个配方，我们只需要使用第二个 URL。\n\n该脚本包含几个错误，我们将检测并修复它们。\n\
    \n## 准备工作\n\n对于这个配方，我们将使用 `requests` 和 `parse` 模块，并将它们包含在我们的虚拟环境中：\n\n```\n$ echo\
    \ \"requests==2.18.3\" >> requirements.txt\n$ echo \"parse==1.8.2\" >> requirements.txt\n\
    $ pip install -r requirements.txt\n```\n\n`debug_skills.py` 脚本可从 GitHub 获取：https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter13/debug_skills.py。请注意，它包含错误，我们将作为本配方的一部分进行修复。\n\
    \n## 操作步骤...\n\n1. 运行脚本，它将生成一个错误：\n\n```\n$ python debug_skills.py\nTraceback\
    \ (most recent call last):\n  File \"debug_skills.py\", line 26, in <module>\n\
    \    raise Exception(f'Error accessing server: {result}')\nException: Error accessing\
    \ server: <Response [405]>\n```\n\n2. 分析状态码。我们得到 405，这意味着我们发送的方法不被允许。我们检查代码并意识到，对于第\
    \ 24 行的请求，我们使用了 GET，而应该使用 POST（如 URL 中所述）。将代码替换为以下内容：\n\n```\n# ERROR Step 2.\
    \ Using .get when it should be .post\n# (old) result = requests.get('http://httpbin.org/post',\n\
    json=data)\nresult = requests.post('http://httpbin.org/post', json=data)\n```\n\
    \n为了清晰起见，我们将旧的有错误的代码用 (old) 注释掉。\n\n3. 再次运行代码，它将产生一个不同的错误：\n\n```\n$ python debug_skills.py\n\
    Traceback (most recent call last):\n  File \"debug_skills_solved.py\", line 34,\
    \ in <module>\n    first_name, last_name = full_name.split()\nValueError: too\
    \ many values to unpack (expected 2)\n```\n\n4. 在第 33 行插入一个断点，即错误之前的一行。再次运行并进入调试模式：\n\
    \n```\n$ python debug_skills_solved.py\n..debug_skills.py(35)<module>()\n-> first_name,\
    \ last_name = full_name.split()\n(Pdb) n\n> ...debug_skills.py(36)<module>()\n\
    -> ready_name = f'{last_name}, {first_name}'\n(Pdb) c\n> ...debug_skills.py(34)<module>()\n\
    -> breakpoint()\n```\n\n运行 `n` 没有产生错误，这意味着它不是第一个值。在 `c` 上运行几次后，我们意识到这不是正确的方法，因为我们不知道哪个输入是产生错误的那个。\n\
    \n5. 相反，用 `try...except` 块包装该行，并在该点产生一个断点：\n\n```\ntry:\n    first_name, last_name\
    \ = full_name.split()\nexcept:\n    breakpoint()\n```\n\n6. 我们再次运行代码。这一次，代码在数据产生错误的那一刻停止：\n\
    \n```\n$ python debug_skills.py\n> ...debug_skills.py(38)<module>()\n-> ready_name\
    \ = f'{last_name}, {first_name}'\n(Pdb) full_name\n'John Paul Smith'\n```\n\n\
    7. 原因现在很清楚了；第 35 行只允许我们拆分两个单词，但如果添加了中间名，则会引发错误。经过一些测试，我们确定用这一行来修复它：\n\n```\n#\
    \ ERROR Step 6 split only two words. Some names has middle names\n# (old) first_name,\
    \ last_name = full_name.split()\nfirst_name, last_name = full_name.rsplit(maxsplit=1)\n\
    ```\n\n8. 我们再次运行脚本。确保移除 `breakpoint` 和 `try..except` 块。这一次，它生成了一个姓名列表！并且它们按姓氏的字母顺序排序。然而，有几个姓名看起来不正确：\n\
    \n```\n$ python debug_skills_solved.py\n['Berg, Keagan', 'Cordova, Mai', 'Craig,\
    \ Michael', 'García, Rocío', 'Mccabe, Fathima', \"O'Carroll, Séamus\", 'Pate,\
    \ Poppy-Mae', 'Rennie, Vivienne', 'Smith, John Paul', 'Smyth, John', 'Sullivan,\
    \ Roman']\n```\n\n谁叫 O'Carroll, Séamus？\n\n9. 为了分析这个特定情况但跳过其余部分，我们必须创建一个 `if`\
    \ 条件，仅在第 33 行为该姓名中断。注意使用 `in` 以避免必须完全正确：\n\n```\nfull_name = parse.search('\"\
    custname\": \"{name}\"', raw_result)['name']\nif \"O'Carroll\" in full_name:\n\
    \    breakpoint()\n```\n\n10. 再次运行脚本。断点在适当的时刻停止：\n\n```\n$ python debug_skills.py\n\
    > debug_skills.py(38)<module>()\n-> first_name, last_name = full_name.rsplit(maxsplit=1)\n\
    (Pdb) full_name\n\"Séamus O'Carroll\"\n```\n\n11. 在代码中向上移动并检查不同的变量：\n\n```\n(Pdb)\
    \ full_name\n\"Séamus O'Carroll\"\n(Pdb) raw_result\n'{\"custname\": \"Séamus\
    \ O\\'Carroll\"}'\n(Pdb) result.json()\n{'args': {}, 'data': '{\"custname\": \"\
    Séamus O\\'Carroll\"}', 'files': {}, 'form': {}, 'headers': {'Accept': '*/*',\
    \ 'Accept-Encoding': 'gzip, deflate', 'Connection': 'close', 'Content-Length':\
    \ '37', 'Content-Type': 'application/json', 'Host': 'httpbin.org', 'User-Agent':\
    \ 'python-requests/2.18.3'}, 'json': {'custname': 'Séamus O'Carroll'}, 'origin':\
    \ '89.100.17.159', 'url': 'http://httpbin.org/post'}\n```\n\n12. 在 `result.json()`\
    \ 字典中，实际上有一个不同的字段似乎正确地渲染了名称，它叫做 'json'。让我们详细看看；我们可以看到它是一个字典：\n\n```\n(Pdb) result.json()['json']\n\
    {'custname': \"Séamus O'Carroll\"}\n(Pdb) type(result.json()['json'])\n<class\
    \ 'dict'>\n```\n\n13. 现在，我们需要更改代码。不再解析 'data' 中的原始值，而是直接使用结果中的 'json' 字段。这简化了代码，这很棒！\n\
    \n```\n# ERROR Step 11. Obtain the value from a raw value. Use\n# the decoded\
    \ JSON instead\n# raw_result = result.json()['data']\n# Extract the name from\
    \ the result\n# full_name = parse.search('\"custname\": \"{name}\"', raw_result)['name']\n\
    raw_result = result.json()['json']\nfull_name = raw_result['custname']\n```\n\n\
    14. 再次运行代码。记得移除 `breakpoint`：\n\n```\n$ python debug_skills.py\n['Berg, Keagan',\
    \ 'Cordova, Mai', 'Craig, Michael', 'García, Rocío', 'Mccabe, Fathima', \"O'Carroll,\
    \ Séamus\", 'Pate, Poppy-Mae', 'Rennie, Vivienne', 'Smith, John Paul', 'Smyth,\
    \ John', 'Sullivan, Roman']\n```\n\n这一次，一切都正确了！你已经成功调试了程序！\n\n## 工作原理...\n\n这个配方的结构分为三个不同的问题。让我们分小块分析它：\n\
    \n1. 第一个错误——对外部服务的错误调用：\n   在 `步骤 1` 中显示第一个错误后，我们仔细阅读了结果错误，说明服务器返回了 `405` 状态码。"
