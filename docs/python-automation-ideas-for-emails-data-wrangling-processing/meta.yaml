- md: '## Building Your First Web Scraping Application


    The following is an example form to order a pizza:


    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_93_0.png)


    You can fill the form in manually and see it return the information in JSON format,
    including extra information such as the browser being used.


    The following is the frontend of the web form that is generated:


    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_94_0.png)


    Figure 3.3: Filled-in form


    The following screenshot shows the backend of the web form that is generated:


    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_95_0.png)


    Figure 3.4: Returned JSON content


    We need to analyze the HTML to see the accepted data for the form. The source
    code is as follows:


    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_95_1.png)


    Figure 3.5: Source code


    Check the names of the inputs, `custname`, `custtel`, `custemail`, `size` (a radio
    option), `topping` (a multiselection checkbox), `delivery` (time), and `comments`.


    ## How to do it...


    1. Import the `requests`, `BeautifulSoup`, and `re` modules:

    ```python

    >>> import requests

    >>> from bs4 import BeautifulSoup

    >>> import re

    ```


    2. Retrieve the form page, parse it, and print the input fields. Check that the
    posting URL is `/post` (not `/forms/post`):

    ```python

    >>> response = requests.get(''https://httpbin.org/forms/post'')

    >>> page = BeautifulSoup(response.text)

    >>> form = page.find(''form'')

    >>> {field.get(''name'') for field in form.find_all(re.compile(''input|textarea''))}

    {''delivery'', ''topping'', ''size'', ''custemail'', ''comments'', ''custtel'',
    ''custname''}

    ```

    Note that `textarea` is a valid input and is defined in the HTML format.


    3. Prepare the data to be posted as a dictionary. Check that the values are as
    defined in the form:

    ```python

    >>> data = {''custname'': "Sean O''Connell", ''custtel'': ''123-456-789'', ''custemail'':
    ''sean@oconnell.ie'', ''size'': ''small'', ''topping'': [''bacon'', ''onion''],
    ''delivery'': ''20:30'', ''comments'': ''''}

    ```


    4. Post the values and check that the response is the same as returned in the
    browser:

    ```python

    >>> response = requests.post(''https://httpbin.org/post'', data)

    >>> response

    <Response [200]>

    >>> response.json()

    {''args'': {}, ''data'': '''', ''files'': {}, ''form'': {''comments'': '''', ''custemail'':
    ''sean@oconnell.ie'', ''custname'': "Sean O''Connell", ''custtel'': ''123-456-789'',
    ''delivery'': ''20:30'', ''size'': ''small'', ''topping'': [''bacon'', ''onion'']},
    ''headers'': {''Accept'': ''*/*'', ''Accept-Encoding'': ''gzip, deflate'', ''Connection'':
    ''close'', ''Content-Length'': ''140'', ''Content-Type'': ''application/x-www-form-urlencoded'',
    ''Host'': ''httpbin.org'', ''User-Agent'': ''python-requests/2.22.0''}, ''json'':
    None, ''origin'': ''89.100.17.159'', ''url'': ''https://httpbin.org/post''}

    ```


    ## How it works...


    Requests directly encodes and sends data in the configured format. By default,
    it sends POST data in the application/x-www-form-urlencoded format.


    > Compare the action of requests with the Accessing web APIs recipe, where the
    data is explicitly sent in JSON format using the argument json. This means that
    the Content-Type is application/json instead of application/x-www-form-urlencoded.


    The key aspect here is to respect the format of the form and the possible values
    that can return an error if incorrect, typically a 400 error, indicating a problem
    with the client.


    ## There''s more...


    Other than following the format of forms and inputting valid values, the main
    problem when working with forms is the multiple ways of preventing spam and abusive
    behavior.


    You will often have to ensure that you have downloaded a form before submitting
    it, to avoid submitting multiple forms or **Cross-Site Request Forgery (CSRF)**.


    > CSRF, which means producing a malicious call from a page to a different one
    taking advantage of the fact that your browser is authenticated, is a serious
    problem – for example, you might think you were entering a site about adorable
    puppies, that in fact takes advantage of you being logged into your bank page
    to perform financial operations on your behalf: such as transferring your savings
    to a distant account. Here is a good description of CSRF: https://stackoverflow.com/a/33829607.
    New techniques in browsers help with these CSRF issues by default.


    To obtain the specific token, you need to first download the form, as shown in
    the recipe, obtain the value of the CSRF token, and resubmit it. Note that the
    token can have different names; this is just an example:

    ```python

    >>> form.find(attrs={''name'': ''token''}).get(''value'')

    ''ABCEDF12345''

    ```


    ## See also


    - The *Downloading web pages* recipe, earlier in this chapter, to learn the basics
    of requesting web pages.

    - The *Parsing HTML* recipe, earlier in this chapter, to follow up on structuring
    the returned information from the server.


    ## Using Selenium for advanced interaction


    Sometimes, nothing short of the real thing will work. Selenium is a project to
    use to achieve automation in web browsers. It''s conceived as a way of automatic
    testing, but it also can be used to automate interactions with a site.


    Selenium can control Safari, Chrome, Firefox, Internet Explorer, or Microsoft
    Edge, though it requires installing a specific driver for each case. We''ll use
    Chrome.


    ## Getting ready


    We need to install the right driver for Chrome, called `chromedriver`. It is available
    here: https://sites.google.com/a/chromium.org/chromedriver/. It is available for
    most platforms. It also requires that you have Chrome installed: https://www.google.com/chrome/.


    Add the `selenium` module to `requirements.txt` and install it:

    ```

    $ echo "selenium==3.141.0" >> requirements.txt

    $ pip install -r requirements.txt

    ```


    ## How to do it...


    1. Import Selenium, start a browser and load the form page. A page will open reflecting
    the operations:

    ```python

    >>> from selenium import webdriver

    >>> browser = webdriver.Chrome()

    >>> browser.get(''https://httpbin.org/forms/post'')

    ```

    > Note the banner in Chrome showing it is being controlled by automated test software.


    2. Add a value in the **Customer name** field. Remember that it is called custname:

    ```python

    >>> custname = browser.find_element_by_name("custname")

    >>> custname.clear()

    >>> custname.send_keys("Sean O''Connell")

    ```

    The form will update:


    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_99_0.png)


    3. Set the pizza size to medium:

    ```python

    >>> for size_element in browser.find_elements_by_name("size"):

    ...     if size_element.get_attribute(''value'') == ''medium'':

    ...         size_element.click()

    ...

    >>>

    ```

    This will set the **Pizza Size** radio button.


    4. Add bacon and cheese:

    ```python

    >>> for topping in browser.find_elements_by_name(''topping''):

    ...     if topping.get_attribute(''value'') in [''bacon'', ''cheese'']:

    ...         topping.click()

    ...

    >>>

    ```

    Finally, the checkboxes will appear as marked:


    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_100_0.png)


    5. Submit the form. The page will submit and the result will be displayed:

    ```python

    >>> browser.find_element_by_tag_name(''form'').submit()

    ```

    The form will be submitted and the result from the server will be displayed:


    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_100_1.png)


    6. Close the browser:

    ```python

    >>> browser.quit()

    ```


    ## How it works...


    Step 1 in the *How to do it...* section shows how to create a Selenium page and
    go to a particular URL.


    Selenium works in a similar way to Beautiful Soup: you select an element and then
    manipulate it. The selectors in Selenium work in a similar way to those in Beautiful
    Soup, with the most common ones being `find_element_by_id`, `find_element_by_class_name`,
    `find_element_by_name`, `find_element_by_tag_name`, and `find_element_by_css_selector`.


    There are equivalent `find_elements_by_x` actions that return lists by other attributes
    other than the first found element (such as `find_elements_by_tag_name`, `find_elements_by_name`,
    and more). This is also useful when checking whether an element is there or not.
    If there are no elements, `find_element` will raise an error while `find_elements`
    will return an empty list.


    Data on the elements can be obtained through `.get_attribute()` for HTML attributes
    (such as the values on the form elements) or `.text`.


    Elements can be manipulated by simulating sending keystrokes to input text with
    the method `.send_keys()`, sending clicks with `.click()`, or submitting the form
    with `.submit()`. Note that `.click()` will select/deselect in the same way that
    a click of the mouse will.


    Finally, step 6 closes the browser.


    ## There''s more...


    Here is the Python Selenium documentation: http://selenium-python.readthedocs.io/.


    For each of the elements, there''s extra information that can be extracted, such
    as `.is_displayed()` or `.is_selected()`. Text can be searched using `.find_element_by_link_text()`
    and `.find_element_by_partial_link_text()`.


    Sometimes, opening a browser can be inconvenient. An alternative is to start the
    browser in headless mode and manipulate it from there, like this:

    ```python

    >>> from selenium.webdriver.chrome.options import Options

    >>> chrome_options = Options()

    ```'
