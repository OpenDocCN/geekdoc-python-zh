  md: 'Generating Fantastic Reports


    `create_watermark` generates an image with the watermark. It uses the Pillow Image
    class to create a gray image (mode L) and draw the text. Then, this image gets
    applied as an alpha channel to a new image, making the image semi-transparent
    so that it will show the text to watermark.


    > The alpha channel makes fully transparent anything in white (color 0) and fully
    opaque anything in black (color 255). In this case, the background is white (fully
    transparent) and the color of the text is 55, making it semi-transparent.


    The image is then rotated 45 degrees and cropped to reduce the transparent background
    that may have appeared. This centers the image and allows for better positioning.


    In the next step, `apply_watermark` transforms the PDF into a sequence of PIL
    Images using the `pdf2image` module. It calculates the position to apply the watermark,
    and then pastes the watermark.


    > The image needs to be located by its top-left corner. This is located in the
    half of the document, minus half of the watermark, in both height and width. Note
    that the script assumes that all the pages of the document have the same size.


    Finally, the result is saved to a PDF. Notice the `save_all` parameter, which
    allows us to save a multipage PDF.


    If a password is passed, the `encrypt` function is called. It opens the output
    PDF using `PdfFileReader` and creates a new intermediate PDF with `PdfFileWriter`.
    All the pages of the output PDF are added to the new PDF, the PDF is encrypted,
    and then the intermediate PDF is renamed as the output PDF using `os.rename`.


    # There''s more...


    As part of the watermarking process, notice that the pages are transformed, from
    text into image. This adds extra protection as the text won''t be extractable
    directly as text. When protecting a file, this is a good idea, as it will stop
    copying/pasting directly.


    > This is not a huge security measure, though, as the text may be extracted through
    OCR tools. But it protects against casual extraction of the text. The output file
    size is also much bigger, about 30 MB. This also makes it slower to encrypt and
    decrypt.'
