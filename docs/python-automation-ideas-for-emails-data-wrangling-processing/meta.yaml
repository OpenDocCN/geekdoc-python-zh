- md: "Generating Fantastic Reports\n\nThe `.font` property of a run is shown in *step\
    \ 5*. This allows you to manually set up a specific font and size. Note that the\
    \ size needs to be specified using the proper `Pt` (points) object.\n\n> Points\
    \ are common on regular Word documents, but sometimes it can be difficult to know\
    \ the exact size. Don't be afraid to perform some tests and experiment with them.\n\
    \nThe alignment of the paragraph is set up in the `paragraph` object, and uses\
    \ a constant to define whether it is left, right, center, or justified. All alignment\
    \ options can be found here: https://python-docx.readthedocs.io/en/latest/api/enum/WdAlignParagraph.html.\n\
    \nFinally, *step 7* saves the file to the filesystem.\n\n## There's more...\n\n\
    The `font` attribute can also be used to set up more properties of the text, such\
    \ as small caps, shadow, emboss, or strikethrough. The whole range of possibilities\
    \ is shown in the following documentation: https://python-docx.readthedocs.io/en/latest/api/text.html#docx.text.run.Font.\n\
    \nAnother available option is to change the color of the text:\n\n```\n>>> from\
    \ docx.shared import RGBColor\n>>> DARK_BLUE = RGBColor.from_string('1b3866')\n\
    >>> run.font.color.rgb = DARK_BLUE\n```\n\nThe color can be described in the usual\
    \ hex format from a string. Try to define all the colors as named constants to\
    \ ensure they are all consistent, and limit yourself to a maximum of three colors\
    \ in a report so as not to distract from the content.\n\n> You can use an online\
    \ color picker, such as this one: https://www.w3schools.com/colors/colors_picker.asp.\
    \ Remember to not use the # at the beginning. If you need to generate a palette,\
    \ it's a good idea to use tools such as https://coolors.co/ to generate good combinations.\n\
    \nThe whole python-docx documentation is available here: https://python-docx.readthedocs.io/en/latest/.\n\
    \n## See also\n\n- The *Writing a basic Word document* recipe, earlier in this\
    \ chapter, to learn the basics of how to create a Word document.\n- The *Generating\
    \ structure in Word documents* recipe, next, to learn how to create sections and\
    \ other separators in Word documents.\n\n# Generating structure in Word documents\n\
    \nTo create proper professional reports, they need to be properly structured.\
    \ An MS Word document doesn't have the concept of a page, as it works in paragraphs.\
    \ But we can introduce breaks and sections to properly divide a document.\n\n\
    We'll see in this recipe how to create a structured Word document, introducing\
    \ breaks to create sections.\n\n## Getting ready\n\nWe'll use the python-docx\
    \ module to process Word documents:\n\n```\n$ echo \"python-docx==0.8.10\" >>\
    \ requirements.txt\n$ pip install -r requirements.txt\n```\n\n## How to do it...\n\
    \n1. Import the python-docx module:\n    ```\n    >>> import docx\n    ```\n2.\
    \ Create a new document:\n    ```\n    >>> document = docx.Document()\n    ```\n\
    3. Create a paragraph that has a line break:\n    ```\n    >>> p = document.add_paragraph('This\
    \ is the start of the paragraph')\n    >>> run = p.add_run()\n    >>> run.add_break(docx.text.run.WD_BREAK.LINE)\n\
    \    >>> p.add_run('And now this in a different line')\n    >>> p.add_run('. Even\
    \ if it's on the same paragraph.')\n    ```\n4. Create a page break and write\
    \ a paragraph:\n    ```\n    >>> document.add_page_break()\n    >>> document.add_paragraph('This\
    \ appears in a new page')\n    ```\n5. Create a new section, which will be on\
    \ landscape pages:\n    ```\n    >>> section = document.add_section(docx.enum.section.WD_SECTION.NEW_PAGE)\n\
    \    >>> section.orientation = docx.enum.section.WD_ORIENT.LANDSCAPE\n    >>>\
    \ section.page_height, section.page_width = section.page_width, section.page_height\n\
    \    >>> document.add_paragraph('This is part of a new landscape section')\n \
    \   ```\n6. Create another section, reverting to portrait orientation:\n    ```\n\
    \    >>> section = document.add_section(docx.enum.section.WD_SECTION.NEW_PAGE)\n\
    \    >>> section.orientation = docx.enum.section.WD_ORIENT.PORTRAIT\n    >>> section.page_height,\
    \ section.page_width = section.page_width, section.page_height\n    >>> document.add_paragraph('In\
    \ this section, recover the portrait orientation')\n    ```\n7. Save the document:\n\
    \    ```\n    >>> document.save('word-report-structure.docx')\n    ```\n8. Check\
    \ the result by opening the document and checking the resulting sections:\n\n\
    \    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_170_0.png)\n    Figure 5.5: The\
    \ rendered first page\n\n    Check the new page:\n\n    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_170_1.png)\n\
    \    Figure 5.6: The rendered new file\n\n    Check for a landscape section:\n\
    \n    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_171_0.png)\n    Figure 5.7: The\
    \ rendered landscape section\n\n    Then, go back to portrait orientation:\n\n\
    \    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_172_0.png)\n    Figure 5.8: The\
    \ new page, after going back to portrait orientation\n\n## How it works...\n\n\
    After creating the document in *step 2* in the *How to do it...* section, we add\
    \ a paragraph for the first section. Notice that the document starts with a section.\
    \ The paragraph introduces a line break in the middle of the paragraph.\n\n> \U0001F4A1\
    \ There is a small difference between a line break in a paragraph and a new paragraph,\
    \ though for most uses, it is quite similar. Try to experiment with them.\n\n\
    A page break is introduced in *step 3*, without changing the section.\n\n*Step\
    \ 4* creates a new section on a new page. *Step 5* also changes the orientation\
    \ of the page to landscape in the section. In *step 6*, a new section is introduced,\
    \ and the orientation reverts to portrait.\n\n> Note that when changing the orientation,\
    \ we also need to swap the width and height. Each new section inherits the properties\
    \ from the previous one, so this swapping needs to happen in *step 6* as well.\n\
    \nFinally, the document is saved in *step 7*.\n\n## There's more...\n\nA section\
    \ mandates page composition, including the orientation and size of the page. The\
    \ size of the page can be changed using the length options, such as `Inches` or\
    \ `Cm`:\n\n```\n>>> from docx.shared import Inches, Cm\n>>> section.page_height\
    \ = Inches(10)\n>>> section.page_width = Cm(20)\n```\n\nThe page margins can also\
    \ be defined in the same way:\n\n```\n>>> section.left_margin = Inches(1.5)\n\
    >>> section.right_margin = Cm(2.81)\n>>> section.top_margin = Inches(1)\n>>> section.bottom_margin\
    \ = Cm(2.54)\n```\n\nSections can also be forced to start not only on the next\
    \ page, but on the next odd page, which will look better when printing on two\
    \ sides:\n\n```\n>>> document.add_section(docx.enum.section.WD_SECTION.ODD_PAGE)\n\
    ```\n\nThe whole `python-docx` documentation is available here: https://python-docx.readthedocs.io/en/latest/.\n\
    \n## See also\n\n- The *Writing a basic Word document* recipe, earlier in this\
    \ chapter, to learn the basics of how to create a Word document.\n- The *Styling\
    \ a Word document* recipe, earlier in this chapter, to learn how to add format\
    \ to the document.\n\n# Adding pictures to Word documents\n\nWord documents can\
    \ include images to show graphs or any other kind of extra information. Adding\
    \ an image is a great way of creating rich reports.\n\n> Any experienced Word\
    \ user will know how frustrating it can be to properly position an image, as the\
    \ surrounding environment can make it change. Keep in mind that, while positioning\
    \ the image programmatically can help, as it will be included in a specific place,\
    \ changing the surrounding paragraphs can change how it gets rendered.\n\nIn this\
    \ recipe, we'll learn how to attach an existing image file to a Word document.\n\
    \n## Getting ready\n\nWe'll use the `python-docx` module to process Word documents:\n\
    \n```\n$ echo \"python-docx==0.8.10\" >> requirements.txt\n$ pip install -r requirements.txt\n\
    ```\n\nWe need to prepare an image to include in the document. We'll use the file\
    \ in GitHub at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter04/images/photo-dublin-a1.jpg,\
    \ which shows a view of Dublin. You can download it on the command line, like\
    \ this:\n\n```\n$ wget https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter04/images/photo-dublin-a1.jpg\n\
    ```"
