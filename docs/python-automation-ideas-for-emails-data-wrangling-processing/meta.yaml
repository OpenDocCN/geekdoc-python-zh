    The `code` module content is defined in *step 1*.\n\nAs described in *step 2*,\
    \ the file `code_fixtures.py` contains two functions to store and save information\
    \ in a zip file. This uses the standard Python `zipfile` module to deal with zip\
    \ files:\n\n`write_zipfile` creates a zip file with an internal compressed file,\
    \ `internal.txt`, which contains the data passed as an argument. This is written\
    \ using the method `.writestr()`: \n\n```\ndef write_zipfile(filename, content):\n\
    \    with ZipFile(filename, 'w') as zipfile:\n        zipfile.writestr(INTERNAL_FILE,\
    \ content)\n```\n\n`read_zipfile` reads the file and extracts the content from\
    \ the internal file:\n\n```\ndef read_zipfile(filename):\n    with ZipFile(filename,\
    \ 'r') as zipfile:\n        with zipfile.open(INTERNAL_FILE) as intfile:\n   \
    \         content = intfile.read()\n    return content.decode('utf8')\n```\n\n\
    `read_zipfile` follows the same pattern as the write. It searches for the defined\
    \ internal file inside the zip file and reads its content. The content needs to\
    \ be decoded as it's encoded in UTF-8.\n\nZip files are a collection of files\
    \ that are compressed. We need to define at least one file to store information\
    \ inside a zip file. You can learn more about the `zipfile` module here: https://docs.python.org/3/library/zipfile.html."
