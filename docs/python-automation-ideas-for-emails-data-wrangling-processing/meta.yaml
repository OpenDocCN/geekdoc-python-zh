    ...


    20£


    4. Open the utf8 file and save its content in an iso-8859-1 file:


    ```python

    >>> with open(''example_utf8.txt'') as file:

    ...     content = file.read()

    >>> with open(''example_output_iso.txt'', ''w'',

    encoding=''iso-8859-1'') as file:

    ...     file.write(content)

    ...

    4

    ```


    5. Finally, read from the new file in the proper format to ensure it is correctly
    saved:


    ```python

    >>> with open(''example_output_iso.txt'', encoding=''iso-8859-1'') as file:

    ...     print(file.read())

    ...

    20£

    ```


    ## How it works...


    Step 1 and step 2 in the How to do it... section are very straightforward. In
    step 3, we add an extra parameter, encoding, to specify that the file needs to
    be opened in something different to UTF-8.


    > Python accepts a lot of standard encodings right out of the box. Check here
    for all of them and their aliases: https://docs.python.org/3/library/codecs.html#standard-encodings.


    In step 4, we create a new file in ISO-8859-1 and write to it as usual. Notice
    the "w" parameter, which specifies to open it for writing and in text mode.


    Step 5 is a confirmation that the file is properly saved.


    ## There''s more...


    This recipe assumes that we know the encoding a file is in. But sometimes, we''re
    not sure about that. `Beautiful Soup`, a module used to parse HTML, can try to
    detect what encoding a particular file has.


    > Automatically detecting what encoding a file has may be, well, impossible. There
    are potentially an infinite number of encodings! But a subset of usual encodings
    should cover 90% of real-world cases. Just remember that the easiest way of knowing
    for sure is to ask whomever created the file in the first place.


    To do so, we''ll need to open the file to read in binary format with the `''rb''`
    parameter. And then, we''ll pass the binary content to the `UnicodeDammit` module
    of `Beautiful Soup`, like this:


    ```python

    >>> from bs4 import UnicodeDammit

    >>> with open(''example_output_iso.txt'', ''rb'') as file:

    ...     content = file.read()

    ...

    >>> suggestion = UnicodeDammit(content)

    >>> suggestion.original_encoding

    ''iso-8859-1''

    >>> suggestion.unicode_markup

    ''20£\n''

    ```


    The encoding can then be inferred. Though `.unicode_markup` returns the decoded
    string, it''s better to use this suggestion only to obtain the encoding, and then
    reopen the file in text mode with the proper encoding.


    ## See also


    - The *Manipulating strings* recipe in *Chapter 1, Let''s Begin Our Automation
    Journey*, to learn more about how to edit strings.

    - The *Parsing HTML* recipe in *Chapter 3, Building Your First Web Scraping Application*,
    to learn more about Beautiful Soup.


    ## Searching and Reading Local Files


    ## Reading CSV files


    Some text files contain tabular data separated by commas. This is a convenient
    way of creating structured data, instead of using proprietary, more complex binary
    formats such as Excel or others. These files are called **Comma Separated Values**
    or CSV files, and most spreadsheet packages allow us to work directly with them.


    ## Getting ready


    We''ve prepared a CSV file using the data for the top 10 movies by theatre attendance,
    as described by this page: http://www.mrob.com/pub/film-video/topadj.html.


    We copied the first 10 elements of the table into a spreadsheet program (Numbers)
    and exported the file as a CSV. The file is available in the GitHub repository
    in the Chapter04/documents directory as `top_films.csv`.


    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_123_0.png)


    ## How to do it...


    1. Import the csv module:


    ```python

    >>> import csv

    ```


    2. Open the file, create a reader, and iterate through it to show the tabular
    data of all rows (only three rows are shown):


    ```python

    >>> with open(''top_films.csv'') as file:

    ...     data = csv.reader(file)

    ...     for row in data:

    ...         print(row)

    ...

    [''Rank'', ''Admissions\n(millions)'', ''Title (year) (studio)'', ''Director(s)'']

    [''1'', ''225.7'', ''Gone With the Wind (1939)\xa0(MGM)'', ''Victor Fleming, George
    Cukor, Sam Wood'']

    [''2'', ''194.4'', ''Star Wars (Ep. IV: A New Hope) (1977)\xa0(Fox)'', ''George
    Lucas'']

    ...

    [''10'', ''118.9'', ''The Lion King (1994)\xa0(BV)'', ''Roger Allers, Rob Minkoff'']

    ```


    3. Open the file and use `DictReader` to structure the data, including the header:


    ```python

    >>> with open(''top_films.csv'') as file:

    ...     data = csv.DictReader(file)

    ...     structured_data = [row for row in data]

    ...

    >>> structured_data[0]

    {''Rank'': ''1'', ''Admissions\n(millions)'': ''225.7'', ''Title (year) (studio)'':
    ''Gone With the Wind (1939)\xa0(MGM)'', ''Director(s)'': ''Victor Fleming, George
    Cukor, Sam Wood''}

    ```


    4. Each of the items in `structured_data` is a full dictionary that contains each
    of the values:


    ```python

    >>> structured_data[0].keys()

    dict_keys([''Rank'', ''Admissions\n(millions)'', ''Title (year) (studio)'', ''Director(s)''])

    >>> structured_data[0][''Rank'']

    ''1''

    >>> structured_data[0][''Director(s)'']

    ''Victor Fleming, George Cukor, Sam Wood''

    ```


    ## How it works...


    Notice that the file needs to be read and that we use a `with` context block.
    This ensures that the file is closed at the end of the block.


    As shown in step 2 in the How to do it... section, the csv.reader class allows
    us to structure the returning lines of code by subdividing them as lists, following
    the format of the table data. Notice how all the values are described as strings.
    csv.reader does not understand whether the first line is a header or not.


    For a more structured read of the file, in step 3, we used csv.DictReader. By
    default, it reads the first row as a header defining the applicable fields, and
    then converts each of the rows into dictionaries with those fields.


    > Sometimes, like in this case, the names of the fields as described in the file
    can be a little verbose. Don''t be afraid to translate the dictionary as an extra
    step into more manageable field names.


    ## There''s more...


    A CSV has a very loosely defined file structure interpretation. There are several
    ways that the data can be stored. This is represented in the csv module as dialects.
    For example, the values can be delimited by commas, semicolons, or tabs. The list
    of default accepted dialects can be displayed by calling csv.list_dialect().


    > By default, the dialect will be Excel, which is the most common one. Even other
    spreadsheets will commonly use it.


    Dialects can also be inferred from the file itself through the Sniffer class.
    The Sniffer class analyzes a sample of the file (or the whole file) and returns
    a dialect object to allow reading in the proper way.


    Notice that the file is open with no new lines, to not make any assumptions about
    it:


    ```python

    >>> with open(''top_films.csv'', newline='''') as file:

    ...     dialect = csv.Sniffer().sniff(file.read())

    ```


    The dialect can then be used when opening the reader. Note the newline again,
    as the dialect will split the lines correctly:


    ```python

    >>> with open(''top_films.csv'', newline='''') as file:

    ...     reader = csv.reader(file, dialect)

    ...     for row in reader:

    ...         print(row)

    ```


    The full csv module documentation can be found here: https://docs.python.org/3/library/csv.html.


    ## See also


    - The *Dealing with encodings* recipe, earlier in this chapter, to learn how to
    deal with encodings.

    - The *Reading text files* recipe, earlier in this chapter, to learn more about
    opening and reading files.


    ## Reading log files


    Another common structured text file format is **log files**. Log files consist
    of rows of logs, which are a line of text with a particular format, describing
    an event.


    > Logs are structured only in the same file or type of file. Formats can be very
    different and there''s no common structure or syntax for them. Each application
    can and will use a different format.


    Typically, each one will have a time when the event occurred, so the file is an
    ordered collection of them.


    ## Getting ready


    The example_log.log file containing five sales logs can be obtained from the GitHub
    repository here: https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter04/documents/example_logs.log.


    The format is:


    ```

    [<Timestamp in iso format>] - SALE - PRODUCT: <product id> - PRICE: $<price of
    the sale>

    ```


    We''ll use the Chapter01/price_log.py file to process each log into an object.
    There''s a copy in the Chapter04/documents directory to simplify the import process.'
