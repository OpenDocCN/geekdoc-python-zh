    print('Labels for the image and score:')\n\nfor label in labels:\n    print(label.description,\
    \ label.score)\n```\n\nIt first extracts the content from the file. Note this\
    \ is binary content as extracted by the configuration of `argparse` with `rb`.\n\
    \nThe content is then sent to `ImageAnnotatorClient` to perform `label_detection`.\
    \ The image first needs to be properly converted into `vision.types.Image`.\n\n\
    The response label description and score are then printed. Note how they are sorted\
    \ by score. A high score means that the API considers the label a good match.\n\
    \n# There's more...\n\nOther than the `score` of a particular label, the interface\
    \ will return the `topicality` of it. While the `score` reflects the confidence\
    \ that the label is applicable to the image, the `topicality` reflects how representative\
    \ the label is for the image as a whole. Typically, they are the same or very\
    \ similar, but an image with a landscape can show a small house far away that\
    \ has a high `score` but low `topicality` compared with the `landscape` label.\n\
