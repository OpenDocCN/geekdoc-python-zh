- md: "## Machine Learning for Automation\n\nIn our example, we used a simple single-label\
    \ detection model, but the API allows more complex processes, such as recognizing\
    \ multiple labels instead of a single one per text or recognizing custom sentiments\
    \ or entities. Be sure to check out the full documentation at https://cloud.google.com/natural-language/automl/docs.\n\
    \n> Try to use the simplest model possible. As with every tool, there's a return\
    \ on investment in terms of configuration and tweaking. In our example, the simple\
    \ division of an email by department could be better than trying to set up multiple\
    \ labels. Use a sensible approach, and start small before generating complex models.\
    \ A complex model will also take longer to tweak.\n\nThe most important step of\
    \ the process is selecting an adequate set of data to train the model. It's recommended\
    \ that a minimum of 100 samples should be used for each label. The selection of\
    \ the set is also important as it has to be representative of the things you want\
    \ to detect; both to check things that should be labeled, and things that should\
    \ not.\n\n> A machine learning model is so dependent on the training set, so it\
    \ is easy to fall into the trap of reinforcing biases in the training set. Machine\
    \ learning is, at its core, something that uses bias to get results. Creating\
    \ a set of diverse data is very important. This is easy to explain with pictures.\
    \ If you only use pictures of cats sitting to train a model to recognize cats,\
    \ it will probably not recognize a jumping or running cat as a cat.\n\nMinimizing\
    \ hidden bias can be difficult. Include ample examples in your training data of\
    \ rare cases of your match, so the common case won't overload them completely.\n\
    \nWe talked about precision and recall earlier. Though they are not completely\
    \ dependent on one another, they are definitely related and can be adjusted dependently.\
    \ The model allows a bit of tweaking in the form of the **confidence threshold**.\
    \ You can change it on the **EVALUATE** tab of the model:\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_430_0.png)\n\
    \nFigure 11.28: The confidence threshold can be tweaked from the EVALUATE panel\n\
    \nYou can also use this page to see the different tags and how they relate.\n\n\
    > \U0001F4A1 Tweaking the training set and adjusting the model is an essential\
    \ part of the process if you want to get good results. Spend enough time testing\
    \ and adjusting the model that you want to use in a real operation.\n\nFollowing\
    \ the same parameters, you can also use the AutoML Vision product, which works\
    \ in the same way but with images. You train the model to identify and categorize\
    \ different labels with a set of pictures and then analyze new pictures with that.\n\
    \nYou can use it to train the detection of custom elements in pictures. For example,\
    \ it could be trained to count different subspecies of bears in a national park\
    \ or specific car models. You can use AutoML Vision to identify specific expressions,\
    \ such as smiles, or more complex ones such as winking the left eye or raising\
    \ eyebrows. This, combined with a camera capturing multiple photos per second,\
    \ can enable fast interfaces to communicate actions in environments where the\
    \ hands cannot be used and sound is not an option, such as industrial environments.\
    \ The possibilities are only being discovered now.\n\nYou can learn more in the\
    \ full documentation for AutoML Vision at https://cloud.google.com/vision/overview/docs#automl-vision.\n\
    \n## See also\n\n- The *Analyzing images with Google Cloud Vision AI* recipe,\
    \ earlier in this chapter, to learn how to create an account to use the Google\
    \ Cloud interfaces.\n- The *Analyzing text with Google Cloud Natural Language*\
    \ recipe, from the previous section, to learn about other possibilities of text\
    \ analysis using pre-trained models.\n\n# 12 Automatic Testing Routines\n\nIn\
    \ this chapter, we will cover the following recipes:\n\n- Writing and executing\
    \ test cases\n- Testing external code\n- Testing using dependency mocking\n- Testing\
    \ using HTTP call mocking\n- Preparing testing scenarios\n- Running tests selectively\n\
    \n## Introduction\n\nWhen the code and the complexity of your software grows,\
    \ generating tests to ensure your program does what it is supposed to do is the\
    \ best tool to provide you with a firm footing over rocky terrain.\n\nTests are,\
    \ in essence, double-checking the code is valid and doing what it is supposed\
    \ to do. This is a deceptively simple statement, but in practice, it can be very\
    \ difficult.\n\n> Mastering the ability to test is a difficult task and is worth\
    \ a book or two. The tasks introduced in this chapter move from business-oriented\
    \ tasks to software engineering tasks, which is a different approach. The objective\
    \ of this chapter is to present some practical aspects of testing to introduce\
    \ the subject.\n\n## Automatic Testing Routines\n\nThe most important thing about\
    \ a test is that it tries to check the code that is being tested independently.\
    \ This involves a mindset of looking at the code and the inputs and outputs and\
    \ approaching the task with a fresh look, and to not be influenced by the internal\
    \ implementation. In some cases, the people testing the software may be different\
    \ from the people writing the code in the first place, to ensure that there's\
    \ a good understanding of what the code should and should not do. Try to design\
    \ your tests with this approach and create well-defined interfaces to work with.\n\
    \n> In summary, testing checks the code does what it is supposed to do, and doesn't\
    \ do what it is not supposed to do.\n\nThe first part of the sentence is easier,\
    \ but the second part is very difficult or even impossible. Writing tests has\
    \ a cost, both in time and in maintenance. Only in highly critical software is\
    \ code tested extensively to ensure that nothing unexpected happens. Try to find\
    \ your balance in how many tests are adequate for your needs.\n\nTests are typically\
    \ classified depending on how many different parts of the software they test.\
    \ A test that only covers a small part of the code, like a function, is normally\
    \ called a unit test, while a test that covers the whole system is called a system\
    \ test. A test that covers the integration of different software elements is called\
    \ an integration test. This is a very fluid definition, as not everyone agrees\
    \ on what the system is, or how big a unit test can be before it becomes an integration\
    \ test, or whether there's a significant difference between integration and system\
    \ tests. But it helps to understand that different tests cover different areas\
    \ of software - some are bigger, some are smaller - and have different requirements.\n\
    \n> To have a team of developers working on the same software, ensuring it is\
    \ of high quality, and the discipline of adding and running tests continuously\
    \ is crucial. That's why there are lots of types of tests to help with that task.\
    \ Continuous integration, or CI, includes the practice of running tests for each\
    \ change to the software and before merging them with changes by other developers.\
    \ CI tools allow you to run tests in the background automatically and notify developers\
    \ of any problem, ensuring that there are no unexpected failures.\n\nIn this chapter,\
    \ we will cover the usage of `pytest` as a tool to run various tests. This is\
    \ one of the most complete Python test frameworks. `pytest` enables the easy setup\
    \ of tests and provides a lot of useful options to run subsets of tests, run tests\
    \ quickly, and detect problems when tests fail.\n\nIt has also an extensive ecosystem\
    \ of plugins that allows you to integrate with other systems, like databases and\
    \ web services, and to extend pytest with additional features, such as code coverage,\
    \ running tests in parallel, and performance benchmarking. Let's start writing\
    \ and running some simple tests.\n\n## Writing and executing test cases\n\nIn\
    \ this recipe, we will learn how to define and run tests using the pytest library.\n\
    \n### Getting ready\n\nWe will use the pytest module. We should install the module,\
    \ adding it to our requirements.txt file as follows:\n\n```\n$ echo \"pytest==5.4.1\"\
    \ >> requirements.txt\n$ pip install -r requirements.txt\n```\n\nWe will use the\
    \ file test_case.py. You can download it from the GitHub repository at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter12/tests.\n\
    \n### How to do it...\n\n1. Check the file tests/test_case.py, which contains\
    \ the definition of four tests:\n\n```\nLIST = [1, 2, 3]\n\ndef test_one():\n\
    \    # Nothing happens\n    pass\n\ndef test_two():\n    assert 2 == 1 + 1\n\n\
    def test_three():\n    assert 3 in LIST\n```"
  mdcn: "## 用于自动化的机器学习\n\n在我们的示例中，我们使用了一个简单的单标签检测模型，但该 API 允许更复杂的过程，例如识别多个标签（而非每个文本一个标签），或识别自定义情感或实体。请务必查阅完整文档：https://cloud.google.com/natural-language/automl/docs。\n\
    \n> 尽可能使用最简单的模型。与所有工具一样，在配置和调整方面存在投资回报。在我们的示例中，简单地按部门划分电子邮件可能比尝试设置多个标签更好。采用合理的方法，在生成复杂模型之前先从小处着手。复杂模型也需要更长时间来调整。\n\
    \n该过程中最重要的步骤是选择一组合适的数据来训练模型。建议每个标签至少使用 100 个样本。数据集的选择也很重要，因为它必须能代表你想要检测的事物；既要包括应该被标记的事物，也要包括不应该被标记的事物。\n\
    \n> 机器学习模型非常依赖于训练集，因此很容易陷入强化训练集中偏见的陷阱。机器学习的核心是利用偏见来获得结果。创建多样化的数据集非常重要。用图片来解释这一点很容易。如果你只使用猫坐着的图片来训练识别猫的模型，它可能无法识别跳跃或奔跑的猫。\n\
    \n最小化隐藏偏见可能很困难。在你的训练数据中包含足够多的罕见匹配案例示例，这样常见案例就不会完全压倒它们。\n\n我们之前讨论过精确率和召回率。虽然它们并非完全相互依赖，但它们确实相关，并且可以相互调整。模型允许通过**置信度阈值**进行一些调整。你可以在模型的\
    \ **EVALUATE** 选项卡上更改它：\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_430_0.png)\n\
    \n图 11.28：可以从 EVALUATE 面板调整置信度阈值\n\n你也可以使用此页面查看不同的标签及其相互关系。\n\n> \U0001F4A1 如果你想获得良好的结果，调整训练集和调整模型是该过程的重要组成部分。花足够的时间测试和调整你想要在实际操作中使用的模型。\n\
    \n遵循相同的参数，你也可以使用 AutoML Vision 产品，它的工作方式相同，但处理的是图像。你使用一组图片训练模型来识别和分类不同的标签，然后用它来分析新图片。\n\
    \n你可以用它来训练检测图片中的自定义元素。例如，它可以被训练来统计国家公园中不同亚种熊的数量或特定汽车型号。你可以使用 AutoML Vision 来识别特定的表情，如微笑，或更复杂的表情，如左眼眨眼或挑眉。这结合每秒拍摄多张照片的相机，可以在无法使用双手且声音不可行的环境（如工业环境）中实现快速交互界面。其可能性才刚刚被发掘。\n\
    \n你可以在 AutoML Vision 的完整文档中了解更多：https://cloud.google.com/vision/overview/docs#automl-vision。\n\
    \n## 另请参阅\n\n- 本章前面的 *使用 Google Cloud Vision AI 分析图像* 配方，了解如何创建账户以使用 Google Cloud\
    \ 界面。\n- 上一节的 *使用 Google Cloud Natural Language 分析文本* 配方，了解使用预训练模型进行文本分析的其他可能性。\n\
    \n# 12 自动化测试例程\n\n在本章中，我们将涵盖以下配方：\n\n- 编写和执行测试用例\n- 测试外部代码\n- 使用依赖模拟进行测试\n- 使用\
    \ HTTP 调用模拟进行测试\n- 准备测试场景\n- 有选择地运行测试\n\n## 简介\n\n当你的代码和软件复杂度增长时，生成测试以确保你的程序按预期运行，是在崎岖地形上为你提供坚实立足点的最佳工具。\n\
    \n测试本质上是再次检查代码是否有效并按预期执行。这是一个看似简单的陈述，但在实践中可能非常困难。\n\n> 掌握测试能力是一项艰巨的任务，值得用一两本书来阐述。本章介绍的任务从业务导向任务转向软件工程任务，这是一种不同的方法。本章的目标是介绍测试的一些实际方面，以引入这个主题。\n\
    \n## 自动化测试例程\n\n测试最重要的事情是它尝试独立地检查被测试的代码。这涉及到一种心态，即看待代码、输入和输出，并以全新的视角处理任务，不受内部实现的影响。在某些情况下，测试软件的人员可能与最初编写代码的人员不同，以确保对代码应该和不应该做什么有良好的理解。尝试用这种方法设计你的测试，并创建定义良好的接口来使用。\n\
    \n> 总之，测试检查代码是否做了它应该做的事，以及是否没有做它不应该做的事。\n\n句子的第一部分比较容易，但第二部分非常困难甚至不可能。编写测试有成本，包括时间和维护。只有在高度关键的软件中，代码才会被广泛测试以确保没有意外发生。尝试在多少测试适合你的需求方面找到平衡。\n\
    \n测试通常根据它们测试软件的不同部分的数量进行分类。只覆盖代码一小部分（如一个函数）的测试通常称为单元测试，而覆盖整个系统的测试称为系统测试。覆盖不同软件元素集成的测试称为集成测试。这是一个非常流动的定义，因为并非所有人都同意什么是系统，或者单元测试在变成集成测试之前可以有多大，或者集成测试和系统测试之间是否有显著差异。但理解不同的测试覆盖软件的不同区域——有些更大，有些更小——并且有不同的要求是有帮助的。\n\
    \n> 要让一个开发团队在同一个软件上工作，确保其高质量，并持续添加和运行测试的纪律至关重要。这就是为什么有很多类型的测试来帮助完成这项任务。持续集成（CI）包括对软件的每次更改运行测试，并在将其与其他开发者的更改合并之前运行测试的实践。CI\
    \ 工具允许你在后台自动运行测试，并将任何问题通知开发者，确保没有意外的失败。\n\n在本章中，我们将介绍使用 `pytest` 作为运行各种测试的工具。这是最完整的\
    \ Python 测试框架之一。`pytest` 能够轻松设置测试，并提供许多有用的选项来运行测试子集、快速运行测试以及在测试失败时检测问题。\n\n它还有一个广泛的插件生态系统，允许你与其他系统（如数据库和\
    \ Web 服务）集成，并通过额外功能扩展 pytest，例如代码覆盖率、并行运行测试和性能基准测试。让我们开始编写和运行一些简单的测试。\n\n## 编写和执行测试用例\n\
    \n在这个配方中，我们将学习如何使用 pytest 库定义和运行测试。\n\n### 准备工作\n\n我们将使用 pytest 模块。我们应该安装该模块，将其添加到我们的\
    \ requirements.txt 文件中，如下所示：\n\n```\n$ echo \"pytest==5.4.1\" >> requirements.txt\n\
    $ pip install -r requirements.txt\n```\n\n我们将使用文件 test_case.py。你可以从 GitHub 仓库下载它：https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter12/tests。\n\
    \n### 如何操作...\n\n1. 查看文件 tests/test_case.py，其中包含四个测试的定义：\n\n```\nLIST = [1, 2,\
    \ 3]\n\ndef test_one():\n    # Nothing happens\n    pass\n\ndef test_two():\n\
    \    assert 2 == 1 + 1\n\ndef test_three():\n    assert 3 in LIST\n```"
