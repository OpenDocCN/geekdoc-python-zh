    \      A number\n\noptional arguments:\n  -h, --help  show this help message and\
    \ exit\n```\n\n3.  带额外参数调用脚本，其行为符合预期：\n\n```bash\n$ python3 recipe_cli_step1.py\
    \ 4\n####\n\n$ python3 recipe_cli_step1.py not_a_number\nusage: recipe_cli_step1.py\
    \ [-h] number\nrecipe_cli_step1.py: error: argument number: invalid int value:\
    \ 'not_a_number'\n```\n\n4.  修改脚本以接受一个可选参数，用于指定要打印的字符。默认值将是 `\"#\"`。`recipe_cli_step2.py`\
    \ 脚本将如下所示：\n\n```python\nimport argparse\n\ndef main(character, number):\n   \
    \ print(character * number)\n\nif __name__ == '__main__':\n    parser = argparse.ArgumentParser()\n\
    \    parser.add_argument('number', type=int, help='A number')\n    parser.add_argument('-c',\
    \ type=str, help='Character to print',\n                        default='#')\n\
    \n    args = parser.parse_args()\n    main(args.c, args.number)\n```\n\n5.  帮助信息已更新，并且使用\
    \ `-c` 标志允许我们打印不同的字符：\n\n```bash\n$ python3 recipe_cli_step2.py -h\nusage: recipe_cli_step2.py\
    \ [-h] [-c C] number\n\npositional arguments:\n  number    A number\n\noptional\
    \ arguments:\n  -h, --help show this help message and exit\n  -c C Character to\
    \ print\n\n$ python3 recipe_cli_step2.py 4\n####\n\n$ python3 recipe_cli_step2.py\
    \ 5 -c m\nmmmmm\n```\n\n6.  添加一个标志，当其存在时改变行为。`recipe_cli_step3.py` 脚本如下：\n\n```python\n\
    import argparse\n\ndef main(character, number):\n    print(character * number)\n\
    \nif __name__ == '__main__':\n    parser = argparse.ArgumentParser()\n    parser.add_argument('number',\
    \ type=int, help='A number')\n    parser.add_argument('-c', type=str, help='Character\
    \ to print',\n                        default='#')\n    parser.add_argument('-U',\
    \ action='store_true', default=False,\n                        dest='uppercase',\n\
    \                        help='Uppercase the character')\n    args = parser.parse_args()\n\
    \n    if args.uppercase:\n        args.c = args.c.upper()\n    main(args.c, args.number)\n\
    ```\n\n7.  调用它时，如果添加了 `-U` 标志，字符将被大写：\n\n```bash\n$ python3 recipe_cli_step3.py\
    \ 4 -c f\nffff\n$ python3 recipe_cli_step3.py 4 -c f -U\nFFFF\n```\n\n## 工作原理...\n\
    \n如“如何做”部分的步骤1所述，参数通过 `.add_arguments` 添加到解析器中。一旦所有参数定义完毕，调用 `parse_args()` 将返回一个包含结果的对象（如果出错则退出）。\n\
    \n每个参数都应添加帮助描述，但它们的行为可能有很大不同：\n\n-   如果一个参数以 `-` 开头，它被视为可选参数，如步骤4中的 `-c` 参数。否则，它是一个位置参数，如步骤1中的\
    \ `number` 参数。\n-   为了清晰起见，始终为可选参数定义默认值。如果你不定义，它将是 `None`，但这可能会引起混淆。\n-   记住始终添加一个带有参数描述的\
    \ `help` 参数；帮助信息是自动生成的，如步骤2所示。\n-   如果存在类型，它将被验证，例如步骤3中的 `number`。默认情况下，类型将是字符串。\n\
    -   `store_true` 和 `store_false` 操作可用于生成标志，即不需要任何额外参数的参数。将相应的默认值设置为相反的布尔值。这在步骤6和7中的\
    \ `U` 参数中得到了演示。\n-   `args` 对象中属性的名称默认是参数的名称（如果存在破折号，则去掉）。你可以使用 `dest` 来更改它。例如，在步骤6中，命令行参数\
    \ `-U` 被描述为 `uppercase`。\n\n在使用短参数（如单个字母）时，为内部使用更改参数名称非常有用。一个好的命令行界面会使用 `-c`，但在内部，使用更详细的标签（如\
    \ `configuration_file`）可能是个好主意。记住，显式优于隐式！\n\n-   一些参数可以与其他参数协同工作，如 *步骤3* 所示。执行所有必要的操作，将\
    \ `main` 函数作为清晰简洁的参数传递。例如，在 *步骤3* 中，只传递了两个参数，但其中一个可能已被修改。\n\n## 更多内容...\n\n你也可以使用双破折号创建长参数，例如：\n\
    \n```python\nparser.add_argument('-v', '--verbose', action='store_true',\n   \
    \                 default=False,\n                    help='Enable verbose output')\n\
    ```\n\n这将同时接受 `-v` 和 `--verbose`，并将存储名称 `verbose`。\n\n添加长名称是使界面更直观、更易于记忆的好方法。用过几次后，很容易记住有一个\
    \ `verbose` 选项，并且它以 `v` 开头。\n\n处理命令行参数时的主要不便可能是参数过多。这会造成混淆。尝试使你的参数尽可能独立，不要在它们之间建立太多依赖关系；否则，处理组合可能会很棘手。\n\
    \n特别是，尽量不要创建超过两个的位置参数，因为它们没有助记符。位置参数也接受默认值，但在大多数情况下，这不会是预期的行为。\n\n有关高级详细信息，请参阅\
    \ `argparse` 的 Python 文档 (https://docs.python.org/3/library/argparse.html)。\n\n\
    ## 另请参阅\n\n-   本章前面介绍的 *创建虚拟环境* 配方，了解如何创建一个安装第三方模块的环境。\n-   本章前面介绍的 *安装第三方包* 配方，了解如何在虚拟环境中安装和使用外部模块。\n\
    \n# 2\n## 让任务自动化变得简单\n\n为了正确地自动化任务，我们需要一种方法让它们在适当的时间自动执行。需要手动启动的任务并不是真正完全自动化的。\n\
    \n然而，为了能够在处理更紧迫问题的同时让它们在后台运行，任务需要能够以 *即发即忘* 模式运行。我们应该能够监控它是否正确执行，确保我们捕获相关信息（例如，如果出现有趣的事情则接收通知），并知道运行期间是否发生了任何错误。\n\
    \n确保软件以高可靠性持续运行实际上是一件非常重要的事情。这是一个需要专业知识和人员的领域，他们通常被称为系统管理员、运维人员或 **SRE（站点可靠性工程）**。像亚马逊和谷歌这样的大型运营需要在确保一切\
    \ 24/7 正常运行方面进行巨额投资。\n\n本书的目标比这要小得多，因为大多数软件不需要这种高可用性。设计每年停机时间少于几秒的系统具有挑战性，但以合理的可靠性执行任务则容易得多。但是，请注意需要进行维护，并相应地进行规划。\n\
    \n在本章中，我们将介绍以下配方：\n\n-   准备任务\n-   设置 cron 作业\n-   捕获错误和问题\n-   发送电子邮件通知\n\n我们将从回顾在自动化任务之前应该如何准备任务开始。\n\
    \n## 准备任务\n\n一切都始于精确定义需要执行的工作，并以不需要人工干预即可运行的方式进行设计。\n\n一些理想的特征点如下：\n\n1.  **单一、清晰的入口点**：对于如何启动任务没有困惑。\n\
    2.  **清晰的参数**：如果有任何参数，它们应该尽可能明确。\n3.  **无交互性**：不能停止执行以向用户请求信息。\n4.  **结果应被存储**：以便在运行时间之外进行检查。\n\
    5.  **清晰的结果**：当我们自己监督程序执行时，我们可以接受更详细的结果，例如未标记的数据或额外的调试信息。然而，对于自动化任务，最终结果应尽可能简洁明了。\n\
    6.  **错误应被记录**：以分析出了什么问题。\n\n命令行程序已经具备了许多这些特征。它总是有一个清晰的入口点，带有定义的参数，并且结果可以被存储，即使只是文本格式。并且可以通过确保有一个澄清参数的配置文件和一个输出文件来改进。\n\
    \n请注意，第6点是 *捕获错误和问题* 配方的目标，将在那里介绍。\n\n为了避免交互性，请不要使用任何等待用户输入的函数，例如 `input`。记住要删除调试器断点！\n\
    \n## 准备工作\n\n我们将从遵循一个结构开始，其中主函数将作为入口点，所有参数都提供给它。\n\n这与 *第1章，让我们开始自动化之旅* 中的 *添加命令行参数*\
    \ 配方中介绍的基本结构相同。"
