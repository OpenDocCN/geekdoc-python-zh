    \ | 12346 | 3.99 | 加拿大 | CAD | 3 | 2018-08-28 15:05:55+00:00 |\n\n图 7.3：标准化时间戳一致性的截图\n\
    \n请注意，**STD_TIMESTAMP** 列中的时间格式统一，而 **TIMESTAMP** 列中的时间格式则不统一。\n\n## 工作原理...\n\
    \n让我们来看一下在*步骤 3*中使用的 `standard_date.py` 脚本。\n\n脚本文件的末尾处理参数解析，这在*第 2 章，让任务自动化变得简单*中有详细描述。\n\
    \n主函数读取输入的 CSV 文件，并为每一行调用 `add_std_timestamp` 函数。然后将结果写入输出文件：\n\n```\ndef main(input_file,\
    \ output_file):\n    reader = csv.DictReader(input_file)\n    result = [add_price_by_location(row)\
    \ for row in reader]\n\n    # Save into csv format\n    header = result[0].keys()\n\
    \    writer = csv.DictWriter(output_file, fieldnames=header)\n    writer.writeheader()\n\
    \    writer.writerows(result)\n```\n\n它使用 CSV 的 `DictReader` 类将每一行转换为字典，然后传递进行处理。输出的\
    \ CSV 文件使用 `DictWriter` 存储结果行。输出文件的字段标题从第一个输出行的字典键中获取。\n\n`DictReader` 和 `DictWriter`\
    \ 的用法在*第 6 章，电子表格的乐趣*中已有描述。\n\n每一行都在 `add_std_timestamp` 函数中被修改，具体取决于日志写入的国家。让我们来看一下：\n\
    \n```\ndef add_std_timestamp(row):\n    country = row['COUNTRY']\n    if country\
    \ == 'USA':\n        # No change\n        row['STD_TIMESTAMP'] = american_format(row['TIMESTAMP'])\n\
    \    elif country == 'CANADA':\n        # No change\n        row['STD_TIMESTAMP']\
    \ = row['TIMESTAMP']\n    else:\n        raise Exception('Country not found')\n\
    \n    return row\n```\n\n根据来源国家，此函数转换日期并创建新的标准化时间戳。\n\n> 请注意，国家信息已在上一个配方中插入到数据中，它是从位置代码推导出来的。在处理的早期阶段显式存储国家信息，可以简化日期处理脚本，因为数据已经计算好了。这在本例中看起来很直接，但在处理数据时，在不同阶段重复操作是很常见的，因为开发时通常只关注代码的一小部分，而不是整个代码。\n\
    \n该函数向字典添加一个新键，其值为 ISO 8601 格式的标准时间戳。在加拿大生成的日志已经具有此格式，但在美国生成的日志需要进行转换。转换在 `american_format`\
    \ 函数中完成：\n\n```\ndef american_format(timestamp):\n    ...\n    '''\n    Transform\
    \ from MM-DD-YYYY HH:MM:SS to iso 8601\n    '''\n    FORMAT = '%m-%d-%Y %H:%M:%S'\n\
    \n    parsed_tmp = datetime.strptime(timestamp, FORMAT)\n    time_with_tz = parsed_tmp.astimezone(timezone.utc)\n\
    \    isotimestamp = time_with_tz.isoformat()\n\n    return isotimestamp\n```\n\
    \n时间戳使用标准 Python 库的 `datetime.strptime` 进行解析，格式为 \"%m-%d-%Y %H:%M:%S\"，对应于 MM-DD-YYYY\
    \ HH:MM:SS。生成的 `datetime` 对象随后被添加到 UTC 时区，转换为 ISO 8601 有效的字符串，然后返回。\n\n> 请记住，从\
    \ Python 3.7 开始，字典会保持插入顺序。\n\n生成的文件允许我们以相同的格式比较时间。\n\n## 更多内容...\n\n在某些情况下，时间戳格式的检测可能不依赖于国家等其他参数，需要你尝试多种格式以查看哪种合适。当处理多个来源时，这实际上可能成为一个问题，因为单行可能不包含足够的信息。例如，日期\
    \ 05-06-2019 在国际格式中可能是 6 月 5 日，在美国格式中可能是 5 月 6 日。可能需要分析整个文件，甚至进行猜测，然后再进行验证。\n\n\
    本配方中所有日志文件的时间都以 UTC 时间存储，但并非总是如此。它可能以不同的时区存储。\n\n在我们的例子中，俄亥俄州和安大略省的时区相同，但时区可能因地点而异。根据日志，这可能需要进行调整。\n\
    \n> ISO 8601 格式可能包含时区。例如，以 +00:00 结尾表示时区是 UTC。不要假设时间格式总是包含时区信息。如果不存在，可能会导致数据中的时间不一致。始终包含时区，或在组合不同来源时使用\
    \ UTC 时间，以避免混淆。\n\n如果使用不同的时区，*第 1 章，开始我们的自动化之旅*中介绍的 `delorean` 模块有助于以简单的方式定义时间和匹配等效时间：\n\
    \n```\n>>> import delorean\n>>> timestamp = delorean.parse('2018-08-28 20:05:55+00:00')\n\
    >>> timestamp_EST = timestamp.shift('US/Eastern')\n>>> timestamp_EST.datetime.isoformat()\n\
    '2018-08-28T16:05:55-04:00'\n```\n\n完整的 Delorean 文档可以在 https://delorean.readthedocs.io/\
    \ 在线找到。\n\n请注意，旧的时间戳仍然保留在 CSV 文件中，而不是被新的时间戳列覆盖。除非有明确的节省空间需求，否则最好保留它以供参考，并在以后检测可能的问题。它还让我们能够轻松地知道何时将此阶段应用于给定的\
    \ CSV 文件。\n\n## 另请参阅\n\n- 上一节中的*根据位置追加货币*配方。\n- *第 4 章，搜索和读取本地文件*中的*读取 CSV 文件*配方。\n\
    - *第 2 章，让任务自动化变得简单*中的*准备任务*配方。\n\n## 聚合结果\n\n数据清理后，我们就可以处理结果了。对于我们的示例，我们将计算按位置和日期划分的平均销售价格，以及数据范围内按位置和日期划分的总销售额。由于我们的数据是按位置存储的，这将分两步完成。首先，我们将按位置创建文件，然后使用位置结果中的日期按日期创建文件。"
