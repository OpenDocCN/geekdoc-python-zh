    # There''s more...


    A section mandates page composition, including the orientation and size of the
    page. The size of the page can be changed using the length options, such as `Inches`
    or `Cm`:


    ```

    >>> from docx.shared import Inches, Cm

    >>> section.page_height = Inches(10)

    >>> section.page_width = Cm(20)

    ```


    The page margins can also be defined in the same way:


    ```

    >>> section.left_margin = Inches(1.5)

    >>> section.right_margin = Cm(2.81)

    >>> section.top_margin = Inches(1)

    >>> section.bottom_margin = Cm(2.54)

    ```


    Sections can also be forced to start not only on the next page, but on the next
    odd page, which will look better when printing on two sides:


    ```

    >>> document.add_section(docx.enum.section.WD_SECTION.ODD_PAGE)

    ```


