    \n## 如何操作...\n\n1. 导入 matplotlib：\n    ```python\n    >>> import matplotlib.pyplot\
    \ as plt\n    ```\n\n2. 准备数据。这代表两个产品的销售额；一个成熟产品和一个新产品：\n    ```python\n    >>>\
    \ DATA = (\n    ...     ('Q1 2017', 100, 0),\n    ...     ('Q2 2017', 105, 15),\n\
    \    ...     ('Q3 2017', 125, 40),\n    ...     ('Q4 2017', 115, 80),\n    ...\
    \ )\n    ```\n\n3. 处理数据以准备预期格式：\n    ```python\n    >>> POS = list(range(len(DATA)))\n\
    \    >>> VALUESA = [valueA for label, valueA, valueB in DATA]\n    >>> VALUESB\
