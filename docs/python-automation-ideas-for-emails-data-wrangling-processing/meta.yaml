- img_proc: true
  md: "Why Not Automate Your Marketing Campaign?\n\n+   2. Check it has created three\
    \ CSV files, `codes_batch_1.csv`, `codes_batch_2.csv`, and `codes_batch_3.csv`,\
    \ each with the proper number of codes:\n    $ wc -l codes_batch_*.csv\n    500000\
    \ codes_batch_1.csv\n    300000 codes_batch_2.csv\n    200000 codes_batch_3.csv\n\
    \    1000000 total\n3. Check that each of the batch files contains unique codes.\
    \ Your codes will be unique and different from the ones displayed here:\n    $\
    \ head codes_batch_2.csv\n    9J9F-M33YH-YR\n    7WLP-LTJUP-PV\n    WHFU-THW7R-T9\n\
    \    ...\n\n# How it works...\n\nStep 1 calls the script that generates all the\
    \ codes, and step 2 checks that the results are correct. Step 3 shows the format\
    \ in which the codes are stored. Let's analyze the `create_personalised_coupons.py`\
    \ script.\n\nIn summary, it has the following structure:\n\n```\n# IMPORTS\n...\n\
    # FUNCTIONS\ndef random_code(digits)\n    ...\ndef checksum(code1, code2)\n  \
    \  ...\ndef check_code(code)\n    ...\ndef generate_code()\n    ...\n# SET UP\
    \ TASK\n...\n# GENERATE CODES\n...\n```"
  merge: -1
