    - 它将日志发送到多个地方，例如标准输出和文件，甚至远程日志记录器。\n- 它自动轮换日志，在一定时间或大小后创建新的日志文件。这对于按天或周组织日志非常方便。它还允许压缩或删除旧日志。日志积累时会占用空间。\n\
    - 它从文件中读取标准日志配置。\n\n与其创建复杂的日志记录规则，不如尝试使用适当的级别广泛记录日志，然后按级别进行过滤。\n\n有关详细信息，请参阅 Python\
