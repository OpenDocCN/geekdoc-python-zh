- md: "Building Your First Web Scraping Application\n\n## How it works...\n\nThe parsed\
    \ `feed` object contains the information of the entries, as well as general information\
    \ about the `feed` itself, such as when it was updated. The `feed` information\
    \ can be found in the `feed` attribute:\n\n```\n>>> rss.feed.title\n'NYT > Top\
    \ Stories'\n```\n\nEach of the entries works as a dictionary, so the fields are\
    \ easy to retrieve. They can also be accessed as attributes, but treating them\
    \ as keys allows us to get all the available fields:\n\n```\n>>> entries[5].keys()\n\
    dict_keys(['title', 'title_detail', 'links', 'link', 'id', 'guidislink', 'media_content',\
    \ 'summary', 'summary_detail', 'media_credit', 'credit', 'content', 'authors',\
    \ 'author', 'author_detail', 'published', 'published_parsed', 'tags'])\n```\n\n\
    The basic strategy when dealing with feeds is to parse them and go through the\
    \ entries, performing a quick check on whether they are interesting or not, for\
    \ example, by checking the `description` or `summary`. If the entry seems worth\
    \ it, they can be fully downloaded through the `link` field. Then, to avoid rechecking\
    \ entries, store the latest publication date and next time, only check newer entries.\n\
    \n## There's more...\n\nThe full `feedparser` documentation can be found here:\
    \ `https://pythonhosted.org/feedparser/`.\n\nThe information available can differ\
    \ from feed to feed. In the New York Times example, there's a `tag` field with\
    \ tag information, but this is not standard. As a minimum, entries will have a\
    \ title, a description, and a link.\n\n> RSS feeds are also a great way of curating\
    \ your own selection of news sources. There are great feed readers for that.\n\
    \n## See also\n\n- The *Installing third-party packages* recipe in *Chapter 1,\
    \ Let's Begin Our Automation Journey*, to learn the basics of installing external\
    \ modules.\n- The *Downloading web pages* recipe, earlier in this chapter, to\
    \ learn more about making requests and obtaining remote pages.\n\n## Accessing\
    \ web APIs\n\nRich interfaces can be created through the web, allowing powerful\
    \ interactions through HTTP. The most common interface is through RESTful APIs\
    \ using JSON. These text-based interfaces are easy to understand and to program,\
    \ and use common technologies that are **language agnostic**, meaning they can\
    \ be accessed in any programming language that has an HTTP client module, including,\
    \ of course, Python.\n\n> Formats other than JSON are used, such as XML. But JSON\
    \ is a very simple and readable format that translates very well into Python dictionaries\
    \ (and other language equivalents). JSON is, by far, the most common format in\
    \ RESTful APIs at the moment. Learn more about JSON here: https://www.json.org/.\n\
    \nThe strict definition of RESTful requires some specific characteristics, but\
    \ an informal definition of RESTful is a system that describes resources through\
    \ HTTP URLs. This means each URL represents a particular resource, such as an\
    \ article in a newspaper or a property on a real estate site. Resources can then\
    \ be manipulated through HTTP methods (`GET` to view, `POST` to create, `PUT`/`PATCH`\
    \ to edit, and `DELETE` to delete).\n\n> Proper RESTful interfaces need to have\
    \ certain characteristics. They are a way of creating interfaces that is not strictly\
    \ restricted to HTTP interfaces. You can read more about it here: https://codewords.recurse.com/issues/five/what-restful-actually-means.\n\
    \nUsing `requests` is very easy with RESTful interfaces, as they include native\
    \ JSON support.\n\n## Getting ready\n\nTo demonstrate how to operate RESTful APIs,\
    \ we'll use the example site https://jsonplaceholder.typicode.com/. It simulates\
    \ a common case with posts, comments, and other common resources. We will use\
    \ posts and comments. The URLs to use will be as follows:\n\n```\n# The collection\
    \ of all posts\n/posts\n# A single post. X is the ID of the post\n/posts/X\n#\
    \ The comments of post X\n/posts/X/comments\n```\n\nThe site returns the correct\
    \ result for each of them. Pretty handy!\n\n> Because it is a test site, data\
    \ won't be created, but the site will return all the correct responses.\n\n##\
    \ How to do it...\n\n1. Import requests:\n   ```\n   >>> import requests\n   ```\n\
    2. Get a list of all posts and display the latest post:\n   ```\n   >>> result\
    \ = requests.get('https://jsonplaceholder.typicode.com/posts')\n   >>> result\n\
    \   <Response [200]>\n   >>> result.json()\n   # List of 100 posts NOT DISPLAYED\
    \ HERE\n   >>> result.json()[-1]\n   {'userId': 10, 'id': 100, 'title': 'at nam\
    \ consequatur ea labore ea harum', 'body': 'cupiditate quo est a modi nesciunt\
    \ soluta\\nipsa voluptas error itaque dicta in\\nautem qui minus magnam et distinctio\
    \ eum\\naccusamus ratione error aut'}\n   ```\n3. Create a new post. See the URL\
    \ of the newly created resource. The call also returns the resource:\n   ```\n\
    \   >>> new_post = {'userId': 10, 'title': 'a title', 'body':\n   'something something'}\n\
    \   >>> result = requests.post('https://jsonplaceholder.typicode.com/posts',\n\
    \   json=new_post)\n   >>> result\n   <Response [201]>\n   >>> result.json()\n\
    \   {'userId': 10, 'title': 'a title', 'body': 'something something',\n   'id':\
    \ 101}\n   >>> result.headers['Location']\n   'http://jsonplaceholder.typicode.com/posts/101'\n\
    \   ```\n   Notice that the POST request to create the resource returns 201, which\
    \ is the proper status for created.\n4. Fetch an existing post with GET:\n   ```\n\
    \   >>> result = requests.get('https://jsonplaceholder.typicode.com/posts/2')\n\
    \   >>> result\n   <Response [200]>\n   >>> result.json()\n   {'userId': 1, 'id':\
    \ 2, 'title': 'qui est esse', 'body': 'est rerum tempore vitae\\nsequi sint nihil\
    \ reprehenderit dolor beatae ea dolores neque\\nfugiat blanditiis voluptate porro\
    \ vel nihil molestiae ut reiciendis\\nqui aperiam non debitis possimus qui neque\
    \ nisi nulla'}\n   ```\n5. Use PATCH to update its values. Check the returned\
    \ resource:\n   ```\n   >>> update = {'body': 'new body'}\n   >>> result = requests.patch('https://jsonplaceholder.typicode.com/posts/2',\
    \ json=update)\n   >>> result\n   <Response [200]>\n   >>> result.json()\n   {'userId':\
    \ 1, 'id': 2, 'title': 'qui est esse', 'body': 'new body'}\n   ```\n\n## How it\
    \ works...\n\nTwo kinds of resources are typically accessed – single resources\
    \ (https://jsonplaceholder.typicode.com/posts/X) and collections (https://jsonplaceholder.typicode.com/posts)\n\
    \n- Collections accept GET to retrieve all the members of the collection and POST\
    \ to create a new resource\n- Single elements accept GET to get the element, PUT\
    \ and PATCH to edit, and DELETE to remove elements\n\nAll the available HTTP methods\
    \ can be called in `requests`. In the previous recipes, we used `.get()`, but\
    \ `.post()`, `.patch()`, `.put()`, and `.delete()` are available.\n\nThe returned\
    \ response object has a `.json()` method that decodes the result from JSON.\n\n\
    Equally, to send information, a `json` argument is available. This encodes a dictionary\
    \ into JSON and sends it to the server. The data needs to follow the format of\
    \ the resource or an error may be raised.\n\n> GET and DELETE don't require data,\
    \ while PATCH, PUT, and POST do require data to be sent through the body payload.\n\
    \nThe referred-to resource will be returned, and its URL is available in the header.\
    \ This is useful when creating a new resource, as its URL is not known beforehand.\n\
    \n> The difference between PATCH and PUT is that the latter replaces the whole\
    \ resource, while the former does a partial update.\n\n## There's more...\n\n\
    RESTful APIs are very powerful but also have huge variability. Please check the\
    \ documentation of the specific API to learn about its details.\n\n## See also\n\
    \n- The *Downloading web pages* recipe, earlier in this chapter, to learn the\
    \ basics of requesting web pages\n- The *Installing third-party packages* recipe\
    \ in *Chapter 1, Let's Begin Our Automation Journey*, to learn the basics of installing\
    \ external modules\n\n## Interacting with forms\n\nA common element present in\
    \ web pages is forms. Forms are a way of sending values to a web page, for example,\
    \ to create a new comment on a blog post, or to submit a purchase.\n\nBrowsers\
    \ present forms so you can input values and send them in a single action after\
    \ pressing the submit or equivalent button. We'll see how to create this action\
    \ programmatically in this recipe.\n\n> Be aware that sending data to a site is\
    \ normally a more delicate matter than receiving data from it. For example, sending\
    \ automatic comments to a website is very much the definition of **spam**. This\
    \ means that it can be more difficult to automate as it involves considering security\
    \ measures. Double-check that what you're trying to achieve is a valid, ethical\
    \ use case.\n\n## Getting ready\n\nWe'll work against the test server https://httpbin.org/forms/post,\
    \ which allows us to send a test form and sends back the submitted information.\n\
    \n> Note that the URL https://httpbin.org/forms/post renders the form, but internally\
    \ calls the URL https://httpbin.org/post to send the information. We'll use both\
    \ URLs during this recipe."
  mdcn: "构建你的第一个网络爬虫应用\n\n## 工作原理...\n\n解析后的 `feed` 对象包含了条目的信息，以及关于 `feed` 本身的通用信息，例如其更新时间。`feed`\
    \ 信息可以在 `feed` 属性中找到：\n\n```\n>>> rss.feed.title\n'NYT > Top Stories'\n```\n\n\
    每个条目都像一个字典一样工作，因此字段很容易获取。它们也可以作为属性访问，但将它们视为键可以让我们获取所有可用字段：\n\n```\n>>> entries[5].keys()\n\
    dict_keys(['title', 'title_detail', 'links', 'link', 'id', 'guidislink', 'media_content',\
    \ 'summary', 'summary_detail', 'media_credit', 'credit', 'content', 'authors',\
    \ 'author', 'author_detail', 'published', 'published_parsed', 'tags'])\n```\n\n\
    处理 feed 的基本策略是解析它们并遍历条目，对它们是否有趣进行快速检查，例如，通过检查 `description` 或 `summary`。如果条目看起来值得，可以通过\
    \ `link` 字段完全下载它们。然后，为了避免重新检查条目，存储最新的发布日期，下次只检查更新的条目。\n\n## 更多内容...\n\n完整的 `feedparser`\
    \ 文档可以在这里找到：`https://pythonhosted.org/feedparser/`。\n\n可用的信息可能因 feed 而异。在《纽约时报》的例子中，有一个包含标签信息的\
    \ `tag` 字段，但这不是标准的。至少，条目会有标题、描述和链接。\n\n> RSS feed 也是策划你自己的新闻来源选择的好方法。有很多优秀的 feed\
    \ 阅读器可以做到这一点。\n\n## 另请参阅\n\n- *第 1 章，让我们开始自动化之旅* 中的 *安装第三方包* 配方，以了解安装外部模块的基础知识。\n\
    - 本章前面的 *下载网页* 配方，以了解更多关于发出请求和获取远程页面的信息。\n\n## 访问 Web API\n\n丰富的接口可以通过 Web 创建，允许通过\
    \ HTTP 进行强大的交互。最常见的接口是通过使用 JSON 的 RESTful API。这些基于文本的接口易于理解和编程，并使用通用的 **语言无关**\
    \ 技术，这意味着它们可以在任何具有 HTTP 客户端模块的编程语言中访问，当然也包括 Python。\n\n> 也使用 JSON 以外的格式，例如 XML。但\
    \ JSON 是一种非常简单且可读的格式，可以很好地转换为 Python 字典（以及其他语言的等效物）。目前，JSON 是 RESTful API 中最常见的格式。在此处了解更多关于\
    \ JSON 的信息：https://www.json.org/。\n\nRESTful 的严格定义需要一些特定的特征，但非正式的 RESTful 定义是通过\
    \ HTTP URL 描述资源的系统。这意味着每个 URL 代表一个特定的资源，例如报纸上的一篇文章或房地产网站上的一个属性。然后可以通过 HTTP 方法（`GET`\
    \ 查看，`POST` 创建，`PUT`/`PATCH` 编辑，`DELETE` 删除）来操作资源。\n\n> 适当的 RESTful 接口需要具有某些特征。它们是一种创建接口的方式，不仅限于\
    \ HTTP 接口。你可以在此处阅读更多相关信息：https://codewords.recurse.com/issues/five/what-restful-actually-means。\n\
    \n使用 `requests` 与 RESTful 接口非常容易，因为它们包含原生的 JSON 支持。\n\n## 准备工作\n\n为了演示如何操作 RESTful\
    \ API，我们将使用示例站点 https://jsonplaceholder.typicode.com/。它模拟了一个包含帖子、评论和其他常见资源的常见情况。我们将使用帖子和评论。要使用的\
    \ URL 如下：\n\n```\n# 所有帖子的集合\n/posts\n# 单个帖子。X 是帖子的 ID\n/posts/X\n# 帖子 X 的评论\n\
    /posts/X/comments\n```\n\n该站点为每个 URL 返回正确的结果。非常方便！\n\n> 因为它是一个测试站点，数据不会被创建，但站点会返回所有正确的响应。\n\
    \n## 如何做...\n\n1. 导入 requests：\n   ```\n   >>> import requests\n   ```\n2. 获取所有帖子的列表并显示最新的帖子：\n\
    \   ```\n   >>> result = requests.get('https://jsonplaceholder.typicode.com/posts')\n\
    \   >>> result\n   <Response [200]>\n   >>> result.json()\n   # 100 个帖子的列表未在此显示\n\
    \   >>> result.json()[-1]\n   {'userId': 10, 'id': 100, 'title': 'at nam consequatur\
    \ ea labore ea harum', 'body': 'cupiditate quo est a modi nesciunt soluta\\nipsa\
    \ voluptas error itaque dicta in\\nautem qui minus magnam et distinctio eum\\\
    naccusamus ratione error aut'}\n   ```\n3. 创建一个新帖子。查看新创建资源的 URL。调用也返回该资源：\n  \
    \ ```\n   >>> new_post = {'userId': 10, 'title': 'a title', 'body':\n   'something\
    \ something'}\n   >>> result = requests.post('https://jsonplaceholder.typicode.com/posts',\n\
    \   json=new_post)\n   >>> result\n   <Response [201]>\n   >>> result.json()\n\
    \   {'userId': 10, 'title': 'a title', 'body': 'something something',\n   'id':\
    \ 101}\n   >>> result.headers['Location']\n   'http://jsonplaceholder.typicode.com/posts/101'\n\
    \   ```\n   注意，用于创建资源的 POST 请求返回 201，这是已创建的正确状态码。\n4. 使用 GET 获取现有帖子：\n   ```\n\
    \   >>> result = requests.get('https://jsonplaceholder.typicode.com/posts/2')\n\
    \   >>> result\n   <Response [200]>\n   >>> result.json()\n   {'userId': 1, 'id':\
    \ 2, 'title': 'qui est esse', 'body': 'est rerum tempore vitae\\nsequi sint nihil\
    \ reprehenderit dolor beatae ea dolores neque\\nfugiat blanditiis voluptate porro\
    \ vel nihil molestiae ut reiciendis\\nqui aperiam non debitis possimus qui neque\
    \ nisi nulla'}\n   ```\n5. 使用 PATCH 更新其值。检查返回的资源：\n   ```\n   >>> update = {'body':\
    \ 'new body'}\n   >>> result = requests.patch('https://jsonplaceholder.typicode.com/posts/2',\
    \ json=update)\n   >>> result\n   <Response [200]>\n   >>> result.json()\n   {'userId':\
    \ 1, 'id': 2, 'title': 'qui est esse', 'body': 'new body'}\n   ```\n\n## 工作原理...\n\
    \n通常访问两种资源——单个资源（https://jsonplaceholder.typicode.com/posts/X）和集合（https://jsonplaceholder.typicode.com/posts）\n\
    \n- 集合接受 GET 来检索集合的所有成员，接受 POST 来创建新资源\n- 单个元素接受 GET 来获取元素，接受 PUT 和 PATCH 来编辑，接受\
    \ DELETE 来删除元素\n\n所有可用的 HTTP 方法都可以在 `requests` 中调用。在前面的配方中，我们使用了 `.get()`，但 `.post()`、`.patch()`、`.put()`\
    \ 和 `.delete()` 也是可用的。\n\n返回的响应对象有一个 `.json()` 方法，用于从 JSON 解码结果。\n\n同样，要发送信息，有一个\
    \ `json` 参数可用。这会将字典编码为 JSON 并将其发送到服务器。数据需要遵循资源的格式，否则可能会引发错误。\n\n> GET 和 DELETE\
    \ 不需要数据，而 PATCH、PUT 和 POST 需要通过请求体发送数据。\n\n引用的资源将被返回，其 URL 在头部中可用。这在创建新资源时很有用，因为其\
    \ URL 事先未知。\n\n> PATCH 和 PUT 之间的区别在于，后者替换整个资源，而前者执行部分更新。\n\n## 更多内容...\n\nRESTful\
    \ API 非常强大，但也具有巨大的可变性。请查看特定 API 的文档以了解其详细信息。\n\n## 另请参阅\n\n- 本章前面的 *下载网页* 配方，以了解请求网页的基础知识\n\
    - *第 1 章，让我们开始自动化之旅* 中的 *安装第三方包* 配方，以了解安装外部模块的基础知识\n\n## 与表单交互\n\n网页中常见的元素是表单。表单是向网页发送值的一种方式，例如，在博客文章上创建新评论或提交购买。\n\
    \n浏览器呈现表单，以便你可以输入值并在按下提交或等效按钮后以单一操作发送它们。我们将在本配方中了解如何以编程方式创建此操作。\n\n> 请注意，向网站发送数据通常比从其接收数据更微妙。例如，向网站发送自动评论非常符合\
    \ **垃圾邮件** 的定义。这意味着自动化可能更困难，因为它涉及考虑安全措施。请仔细检查你试图实现的是一个有效、合乎道德的用例。\n\n## 准备工作\n\
    \n我们将针对测试服务器 https://httpbin.org/forms/post 进行操作，该服务器允许我们发送测试表单并返回提交的信息。\n\n>\
    \ 请注意，URL https://httpbin.org/forms/post 渲染表单，但内部调用 URL https://httpbin.org/post\
    \ 来发送信息。我们将在本配方中使用这两个 URL。"
