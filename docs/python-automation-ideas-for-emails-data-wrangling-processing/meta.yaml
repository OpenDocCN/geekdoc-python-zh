  md: 'Let''s Begin Our Automation Journey


    +   - Using a third-party tool – parse

    - Introducing regular expressions

    - Going deeper into regular expressions

    - Adding command-line arguments


    We will start by creating our own self-contained environment to work in.


    # Activating a virtual environment


    As a first step when working with Python, it is a good practice to explicitly
    define the working environment.


    This helps you to detach from the operating system interpreter and environment
    and properly define the dependencies that will be used. Not doing so tends to
    generate chaotic scenarios. Remember, *explicit is better than implicit!*


    > ![icon](icon.png) *Explicit is better than implicit* is one of the most quoted
    parts of the Zen of Python. The Zen of Python is a list of general guidelines
    for Python, to provide clarity on what is considered Pythonic. The full Zen of
    Python can be invoked from the Python interpreter by calling `import this`.


    This is especially important in two scenarios:


    +   - When dealing with multiple projects on the same computer, as they can have
    different dependencies that clash at some point. For example, two versions of
    the same module cannot be installed in the same environment.

    - When working on a project that will be used on a different computer, for example,
    developing some code on a personal laptop that will ultimately run in a remote
    server.


    A common joke among developers is responding to a bug with "it runs on my machine,"
    meaning that it appears to work on their laptop, but not on the production servers.
    Although a huge number of factors can produce this error, a good practice is to
    produce an automatically replicable environment, reducing uncertainty over what
    dependencies are really being used.


    This is easy to achieve using the `venv` module, which sets up a local virtual
    environment. None of the installed dependencies will be shared with the Python
    interpreter installed on the machine, creating an isolated environment.'
