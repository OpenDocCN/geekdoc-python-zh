    # 10

    ## Why Not Automate Your Marketing Campaign?


    In this chapter, we will cover the following recipes, which are related to a marketing
    campaign:


    - Detecting opportunities

    - Creating personalized coupon codes

    - Sending a notification to a customer on their preferred channel

    - Preparing sales information

    - Generating a sales report


    ## Introduction


    In this chapter, we will create a marketing campaign and go through each of the
    automatic steps we''ll take. We will use concepts and recipes throughout this
    book in a single project that will require different steps.


    Let''s look at an example. For our project, our company wishes to set up a marketing
    campaign to improve engagement and sales. A very laudable effort. To do so, we
    can divide this into several tasks:


    1. We want to detect the best moment to launch the campaign, so we will be notified
    from different sources about keywords that will help us make an informed decision.

    2. The campaign will include the generation of individual codes to be sent to
    potential customers.

    3. We will send these codes directly to users over their preferred channel, text
    message or email.

    4. To monitor the result of the campaign, we will compile the sales information.

    5. And finally, a sales report will be generated.


    This chapter will go through each of these tasks and present a combined solution
    based on modules and techniques that have been introduced in this book.


    > While these examples have been created with real-life requirements in mind,
    take into account that your specific environment will always surprise you. Don''t
    be afraid to experiment, tweak, and improve your system as you learn more about
    it. Iterating is the way to create great systems.


    Let''s get to it!


    ## Detecting opportunities


    In this chapter, we are presenting a marketing campaign divided into several tasks:


    1. Detect the best moment to launch a campaign.

    2. Generate individual codes to be sent to potential customers.

    3. Send the codes directly to users over their preferred channel, text message
    or email.

    4. Collect the results of the campaign.

    5. Generate a sales report with an analysis of the results.


    This recipe covers task 1.


    Our first task is to detect the best time to launch a campaign. To do so, we will
    monitor a list of news sites, searching for news containing one of our defined
    keywords. We add any article that matches these keywords to a report and send
    it in an email.


    ## Getting ready


    In this recipe, we will use several external modules previously presented in this
    book, `delorean`, `requests`, and `BeautifulSoup`. We need to add them to our
    virtual environment if they''re not already there:


    ```

    $ echo "delorean==1.0.0" >> requirements.txt

    $ echo "requests==2.23.0" >> requirements.txt

    $ echo "beautifulsoup4==4.8.2" >> requirements.txt

    $ echo "feedparser==5.2.1" >> requirements.txt

    $ echo "jinja2==2.11.1" >> requirements.txt

    $ echo "mistune==0.8.4" >> requirements.txt

    $ pip install -r requirements.txt

    ```


    You need to make a list of RSS feeds, from which we will retrieve our data.


    > In our example, we''re using the following feeds, which are all technology feeds
    of well-known news sites:

    > * http://feeds.reuters.com/reuters/technologyNews

    > * https://rss.nytimes.com/services/xml/rss/nyt/Technology.xml

    > * https://feeds.bbci.co.uk/news/science_and_environment/rss.xml


    Download the `search_keywords.py` script, which will perform the actions, from
    GitHub at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter10/search_keywords.py.
    You also need to download the email templates, which can be found at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter10/email_styling.html
    and https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter10/email_template.md.
    There is a config template at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter10/config-opportunity.ini.


    You need a valid username and password for an email service. Check the *Sending
    an individual email* recipe in *Chapter 9, Dealing with Communication Channels*.


    ## How to do it...


    1. Create a `config-opportunity.ini` file, which should be in the following format.
    Remember to fill it with your details:


    ```

    [SEARCH]

    keywords = keyword, keyword

    feeds = feed, feed


    [EMAIL]

    user = <YOUR EMAIL USERNAME>

    password = <YOUR EMAIL PASSWORD>

    from = <EMAIL ADDRESS FROM>

    to = <EMAIL ADDRESS TO>

    ```


    You can use the template from GitHub at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter10/config-opportunity.ini
    to search for the keyword cpu and some test feeds. Remember to fill in the EMAIL
    fields with your own account details.


    2. Call the script to produce the email and report:


    ```

    $ python search_keywords.py config-opportunity.ini

    ```


    3. Check the `to` email; you should receive a report with the articles found.
    Keep in mind that it will be different depending on the daily news, but it should
    be something similar to this:


    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_357_0.png)


    ## How it works...


    After creating the proper configuration for the script in step 1, web scraping
    and sending an email with the results is done in step 2 by calling `search_keywords.py`.


    Let''s take a look at the `search_keywords.py` script. The code is structured
    into the following parts:


    - The IMPORTS section makes available all the Python modules to be used later.
    It also defines EmailConfig namedtuple to help with handling the email parameters.

    - READ TEMPLATES retrieves the email templates and stores them for later use in
    the EMAIL_TEMPLATE and EMAIL_STYLING constants.

    - The `__main__` block starts the process by getting the configuration parameters,
    parsing the config file, and then calling the main function.

    - The main function combines the other functions. First, it retrieves the articles,
    and then it obtains the body and sends the email.

    - `get_articles` walks through all the feeds and discards any article that is
    over 1 week old. For the remaining articles, it searches for a match on the keywords.
    All the matched articles are returned, including information about the link and
    a summary.

    - `compose_email_body` uses the email templates to compile the email body. Notice
    that the template is in Markdown and it gets parsed into HTML, to give the same
    information in plain-text and in HTML.

    - `send_email` gets the body information, as well as required information such
    as the username/password, and sends the email.


    ## There''s more...


    One of the main challenges in retrieving information from different sources is
    to parse the text in all cases. Some feeds may return information in different
    formats.


    For instance, in our example, you can see that the Reuters feed summary includes
    HTML information that gets rendered in the resulting email. If you have that kind
    of problem, you may need to process the returned data further, until it becomes
    consistent. This may be highly dependent on the expected quality of the resulting
    report.


    > When developing automatic tasks, especially when dealing with multiple input
    sources, expect to spend a lot of time cleaning the input to make it consistent.
    However, find a balance and keep in mind the final recipient. If the email is
    to be received, for example, by yourself or a friend, you can be a little more
    permissive than with an important client.'
