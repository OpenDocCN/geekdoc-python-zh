  md: 'Searching and Reading Local Files


    As shown in step 2 in the How to do it... section, the csv.reader class allows
    us to structure the returning lines of code by subdividing them as lists, following
    the format of the table data. Notice how all the values are described as strings.
    csv.reader does not understand whether the first line is a header or not.


    For a more structured read of the file, in step 3, we used csv.DictReader. By
    default, it reads the first row as a header defining the applicable fields, and
    then converts each of the rows into dictionaries with those fields.


    > Sometimes, like in this case, the names of the fields as described in the file
    can be a little verbose. Don''t be afraid to translate the dictionary as an extra
    step into more manageable field names.


    # There''s more...


    A CSV has a very loosely defined file structure interpretation. There are several
    ways that the data can be stored. This is represented in the csv module as dialects.
    For example, the values can be delimited by commas, semicolons, or tabs. The list
    of default accepted dialects can be displayed by calling csv.list_dialect().


    > By default, the dialect will be Excel, which is the most common one. Even other
    spreadsheets will commonly use it.


    Dialects can also be inferred from the file itself through the Sniffer class.
    The Sniffer class analyzes a sample of the file (or the whole file) and returns
    a dialect object to allow reading in the proper way.


    Notice that the file is open with no new lines, to not make any assumptions about
    it:


    ```

    >>> with open(''top_films.csv'', newline='''') as file:

    ...     dialect = csv.Sniffer().sniff(file.read())

    ```


    The dialect can then be used when opening the reader. Note the newline again,
    as the dialect will split the lines correctly:


    ```

    >>> with open(''top_films.csv'', newline='''') as file:

    ...     reader = csv.reader(file, dialect)

    ...     for row in reader:

    ...         print(row)

    ```'
