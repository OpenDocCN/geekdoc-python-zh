    # Searching and Reading Local Files


    > Note that calling all of these three functions will be slower than making a
    single call to `os.stats` and processing the results. Also, returned `stats` can
    be inspected to detect the available metadata.


    The values described in this recipe are available for all filesystems, but there
    are more values that can be used, depending on the particular platform.


    For example, to obtain the creation date of a file, you can use the `st_birthtime`
    parameter for macOS or `st_mtime` in Windows.


    > `st_mtime` is always available, but its meaning changes between systems. In
    Unix systems, it will change when the content is modified, so it''s not a reliable
    time of creation.


    `os.stat` will follow symbolic links. If you want to get the stats of a symbolic
    link, use `os.lstat()`.


    You can check the full documentation about all available stats here: https://docs.python.org/3/library/os.html
    - os.stat_result.


    # See also


    +   - The *Reading text files* recipe, earlier in this chapter, to learn the basics
    of opening and reading files.

    - The *Reading images* recipe, later in this chapter, to learn how to read and
    treat image files.


    # Reading images


    Probably the most common data that is not text is image data. Images have their
    own set of specific metadata that can be read to filter values or perform other
    operations.


    The main challenge is dealing with multiple formats and different metadata definitions.
    We''ll show in this recipe how to get information from both a JPEG and a PNG,
    and how the same information can be encoded differently.'
  - '[PAGE 132]


    # Getting ready


    The best general toolkit for dealing with images in Python is, arguably, Pillow.
    This library allows you to easily read files in the most common formats, as well
    as perform operations on them. Pillow started as a fork of PIL (Python Imaging
    Library), a previous module that became stagnant some years ago.


    We will also use the xmltodict module to transform some data from XML into a more
    convenient dictionary. We will add both modules to requirements.txt and reinstall
    them in the virtual environment:


    ```

    $ echo "Pillow==7.0.0" >> requirements.txt

    $ echo "xmltodict==0.12.0" >> requirements.txt

    $ pip install -r requirements.txt

    ```


    The metadata information in photo files is defined in the EXIF (Exchangeable Image
    File) format. EXIF is a standard for storing information about pictures, including
    things like what camera took the picture, when it was taken, GPS describing the
    location, exposure, focal length, color info, and so on.


    > You can get a good summary here: https://www.slrphotographyguide.com/what-is-exif-metadata/.
    All the information is optional, but virtually all digital cameras and processing
    software will store some data. Because of the privacy concerns, parts of it, like
    the exact location, can be disabled.


    The following images will be used for this recipe, and are available to download
    in the GitHub repository (https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter04/images):


    +   - photo-dublin-a1.jpg

    - photo-dublin-a2.png

    - photo-dublin-b.png


    Two of them, photo-dublin-a1.jpg and photo-dublin-a2.png, are the same scene,
    but while the first is the untouched picture, the second one has been retouched
    to slightly change the colors, and has also been scaled. Notice one is in JPEG
    format and the other in PNG. The other one, photo-dublin-b.png, is a different
    picture. Both pictures were taken in Dublin, with the same phone camera, on two
    different days.'
- md: "## Searching and Reading Local Files\n\nWhile Pillow understands how JPG files\
    \ store the EXIF info directly, PNG files store XMP info, a more generic standard\
    \ that can contain EXIF data inside.\n\n> More info about XMP can be obtained\
    \ here: https://www.adobe.com/devnet/xmp.html. For the most part, it defines an\
    \ XML tree structure that's relatively readable in raw.\n\nTo further complicate\
    \ matters, XMP is encoded using RDF, which is a standard describing how to encode\
    \ an XML tree.\n\n> If EXIF, XMP, and RDF sound confusing, well, it's because\
    \ they are. XMP stores the EXIF information using RDF. Ultimately, the differences\
    \ between them are not very relevant, and the best approach is to find out the\
    \ interesting bits and pieces. We can inspect the specifics of the names using\
    \ Python introspection tools and check exactly how the data is structured, and\
    \ what the name of the parameter we are looking for is.\n\nAs the GPS information\
    \ is stored in different formats, we've included in the GitHub repository a file\
    \ called gps_conversion.py: https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter04/gps_conversion.py.\
    \ This includes the functions exif_to_decimal and rdf_to_decimal, which will transform\
    \ both formats into decimals to compare them.\n\n## How to do it...\n\n1. Import\
    \ the modules and functions to use in this recipe:\n    ```python\n    >>> from\
    \ PIL import Image\n    >>> from PIL.ExifTags import TAGS, GPSTAGS\n    >>> import\
    \ xmltodict\n    >>> from gps_conversion import exif_to_decimal, rdf_to_decimal\n\
    \    ```\n2. Open the first photo:\n    ```python\n    >>> image1 = Image.open('images/photo-dublin-a1.jpg')\n\
    \    ```\n3. Get the width, height, and format of the file:\n    ```python\n \
    \   >>> image1.height\n    3024\n    >>> image1.width\n    4032\n    >>> image1.format\n\
    \    'JPEG'\n    ```\n4. Retrieve the EXIF information of the image and transform\
    \ it into a convenient dictionary. Show the camera, the lens used, and when it\
    \ was taken:\n    ```python\n    >>> exif_info_1 = {TAGS.get(tag, tag): value\n\
    \            for tag, value in image1._getexif().items()}\n    >>> exif_info_1['Model']\n\
    \    'iPhone X'\n    >>> exif_info_1['LensModel']\n    'iPhone X back dual camera\
    \ 4mm f/1.8'\n    >>> exif_info_1['DateTimeOriginal']\n    '2018:04:21 12:07:55'\n\
    \    ```\n5. Open the second image and obtain the XMP info:\n    ```python\n \
    \   >>> image2 = Image.open('images/photo-dublin-a2.png')\n    >>> image2.height\n\
    \    1512\n    >>> image2.width\n    2016\n    >>> image2.format\n    'PNG'\n\
    \    >>> xmp_info = xmltodict.parse(image2.info['XML:com.adobe.xmp'])\n    ```\n\
    6. Obtain the RDF description field, which contains all the values we are looking\
    \ for. Retrieve the model (a TIFF value), the lens model (an EXIF value), and\
    \ the creation date (an XMP value). Check the values are the same as in step 4,\
    \ even if the file is different:\n    ```python\n    >>> rdf_info_2 = xmp_info['x:xmpmeta']['rdf:RDF']\n\
    \    ['rdf:Description']\n    >>> rdf_info_2['tiff:Model']\n    'iPhone X'\n \
    \   >>> rdf_info_2['exifEX:LensModel']\n    'iPhone X back dual camera 4mm f/1.8'\n\
    \    >>> rdf_info_2['xmp:CreateDate']\n    '2018-04-21T12:07:55'\n    ```\n7.\
    \ Obtain the GPS information in both pictures, transform them into an equivalent\
    \ format, and check that they are the same. Notice that the resolution is not\
    \ the same, but they match up to the fourth decimal point:\n    ```python\n  \
    \  >>> gps_info_1 = {GPSTAGS.get(tag, tag): value\n            for tag, value\
    \ in exif_info_1['GPSInfo'].items()}\n    >>> exif_to_decimal(gps_info_1)\n  \
    \  ('N53.34690555555556', 'W6.247797222222222')\n    >>> rdf_to_decimal(rdf_info_2)\n\
    \    ('N53.346905', 'W6.247796666666667')\n    ```\n8. Open the third image and\
    \ obtain the creation date and GPS info, and check it doesn't match the other\
    \ photo, although it is close (the second and third decimals are not the same):\n\
    \    ```python\n    >>> image3 = Image.open('photo-dublin-b.png')\n    >>> xmp_info\
    \ = xmltodict.parse(image3.info['XML:com.adobe.xmp'])\n    >>> rdf_info_3 = xmp_info['x:xmpmeta']['rdf:RDF']\n\
    \    ['rdf:Description']\n    >>> rdf_info_3['xmp:CreateDate']\n    '2018-03-08T18:16:57'\n\
    \    >>> rdf_to_decimal(rdf_info_3)\n    ('N53.34984166666667', 'W6.260388333333333')\n\
    \    ```\n\n## How it works...\n\nPillow is able to interpret files in most common\
    \ image formats, as shown in step 2 in the How to do it... section.\n\nThe Image\
    \ object contains the basic information about the size and format of the file,\
    \ and is displayed in step 3. The info property contains information that is dependent\
    \ on the format.\n\nThe EXIF metadata for JPG files can be parsed with the _getexif()\
    \ method, but then it needs to be translated properly, as it uses the raw binary\
    \ definition. For example, the number 42,036 corresponds to the LensModel property.\
    \ Fortunately, there's a definition of all tags in the PIL.ExifTags module. We\
    \ translate the dictionary into readable tags in step 4 to obtain a more readable\
    \ dictionary.\n\nStep 5 opens a PNG format, which has the same properties related\
    \ to size, but the metadata is stored in XML/RDF format and needs to be parsed\
    \ with the help of xmltodict. Step 6 shows how to navigate this metadata to extract\
    \ the same information that's in JPG format. The data is the same, as both files\
    \ come from the same original picture, even if the images are different.\n\n>\
    \ Xmltodict has some issues when trying to parse data that's not in XML format.\
    \ Check that the input is valid XML.\n\nStep 7 extracts the GPS information for\
    \ both images, which is stored in different ways, and shows they are the same\
    \ (although the precision is different because of the way it is encoded).\n\n\
    > Not every image will necessarily have location information or other metadata.\
    \ This information can be changed or removed, or stored differently, depending\
    \ on the format and the camera generating the file.\n\nStep 8 shows the information\
    \ on a different photo.\n\n## There's more...\n\nPillow also has a lot of functionality\
    \ around modifying pictures. It is very easy to resize or make simple modifications\
    \ to a file, such as rotating it. You can find the complete Pillow documentation\
    \ here: https://pillow.readthedocs.io.\n\n> Pillow allows a lot of operations\
    \ with images. Not only simple operations such as resizing or transforming one\
    \ format into another, but also things like cropping the image, applying color\
    \ filters, or generating animated GIFs. If you're interested in image processing\
    \ using Python, it is definitely the module to master.\n\nThe GPS coordinates\
    \ in the recipe are stated in **DMS (Degrees, Minutes, Seconds)** and **DDM (Degrees,\
    \ Decimal, Minutes)**, and transformed into **DD (Decimal, Degrees)**. You can\
    \ find out more about the different GPS formats here: http://www.ubergizmo.com/how-to/read-gps-coordinates/.\
    \ You'll also find out how to search the exact locations of the pictures there,\
    \ in case you're curious.\n\nA more advanced use of reading image files is to\
    \ try to process them for **OCR (Optical Character Recognition)**. This means\
    \ automatically detecting text in an image and extracting and processing it. The\
    \ open source module `tesseract` allows you to do this, and it can be used with\
    \ Python and Pillow.\n\nYou need to install `tesseract` on your system (https://github.com/tesseract-ocr/tesseract/wiki),\
    \ and the `pytesseract` Python module (using `pip install pytesseract`).\n\nYou\
    \ can download a file with clear text, called photo-text.jpg, from the GitHub\
    \ repository at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter04/images/photo-text.jpg:\n\
    \n```python\n>>> from PIL import Image\n>>> import pytesseract\n>>> pytesseract.image_to_string(Image.open('photo-text.jpg'))\n\
    'Automate!'\n```\n\nOCR can be difficult if the text is not very clear in the\
    \ image, or it is mixed with images, or it uses a distinctive font. There's an\
    \ example of that in the photo-dublin-a-text.jpg file, (available in the GitHub\
    \ repository at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter04/images/photo-dublin-a-text.jpg),\
    \ which includes text over the picture:\n\n```python\n>>> pytesseract.image_to_string(Image.open('photo-dublin-a-text.jpg'))\n\
    'fl\\n\\nAutomat'\n```\n\nMore information about Tesseract is available at the\
    \ following links:\n\nhttps://github.com/tesseract-ocr/tesseract\n\nhttps://github.com/madmaze/pytesseract\n\
    \n> Properly importing files to OCR may require initial image processing for better\
    \ results. Image processing is out of scope for the objectives of this book, but\
    \ you may use OpenCV, which is more powerful than Pillow. You can process a file\
    \ and then open it with Pillow: http://opencv-python-tutroals.readthedocs.io/en/latest/py_tutorials/py_tutorials.html.\n\
    \n## See also\n\n- The Reading text files recipe, earlier in this chapter, to\
    \ learn the basics of opening and reading files.\n- The Reading file metadata\
    \ recipe, earlier in this chapter, to learn how to get extra information from\
    \ files.\n- The Crawling and searching directories recipe, earlier in this chapter,\
    \ to learn how to search and find files in directories."
  mdcn: "## 搜索和读取本地文件\n\n虽然 Pillow 能直接理解 JPG 文件如何存储 EXIF 信息，但 PNG 文件存储的是 XMP 信息——这是一种更通用的标准，可以在其中包含\
    \ EXIF 数据。\n\n> 关于 XMP 的更多信息可以在此处获取：https://www.adobe.com/devnet/xmp.html。在大多数情况下，它定义了一个\
    \ XML 树结构，其原始形式相对可读。\n\n更复杂的是，XMP 使用 RDF 进行编码，而 RDF 是一个描述如何编码 XML 树的标准。\n\n> 如果\
    \ EXIF、XMP 和 RDF 听起来令人困惑，嗯，那是因为它们确实如此。XMP 使用 RDF 存储 EXIF 信息。最终，它们之间的差异并不十分相关，最好的方法是找出有趣的部分。我们可以使用\
    \ Python 自省工具检查名称的具体细节，并准确检查数据的结构以及我们正在寻找的参数名称。\n\n由于 GPS 信息以不同的格式存储，我们在 GitHub\
    \ 仓库中包含了一个名为 `gps_conversion.py` 的文件：https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter04/gps_conversion.py。该文件包含\
    \ `exif_to_decimal` 和 `rdf_to_decimal` 函数，它们会将两种格式都转换为十进制数以便进行比较。\n\n## 如何操作...\n\
    \n1.  导入本食谱中要使用的模块和函数：\n    ```python\n    >>> from PIL import Image\n    >>>\
    \ from PIL.ExifTags import TAGS, GPSTAGS\n    >>> import xmltodict\n    >>> from\
    \ gps_conversion import exif_to_decimal, rdf_to_decimal\n    ```\n2.  打开第一张照片：\n\
    \    ```python\n    >>> image1 = Image.open('images/photo-dublin-a1.jpg')\n  \
    \  ```\n3.  获取文件的宽度、高度和格式：\n    ```python\n    >>> image1.height\n    3024\n \
    \   >>> image1.width\n    4032\n    >>> image1.format\n    'JPEG'\n    ```\n4.\
    \  检索图像的 EXIF 信息并将其转换为方便的字典。显示相机、使用的镜头以及拍摄时间：\n    ```python\n    >>> exif_info_1\
    \ = {TAGS.get(tag, tag): value\n            for tag, value in image1._getexif().items()}\n\
    \    >>> exif_info_1['Model']\n    'iPhone X'\n    >>> exif_info_1['LensModel']\n\
    \    'iPhone X back dual camera 4mm f/1.8'\n    >>> exif_info_1['DateTimeOriginal']\n\
    \    '2018:04:21 12:07:55'\n    ```\n5.  打开第二张图像并获取 XMP 信息：\n    ```python\n \
    \   >>> image2 = Image.open('images/photo-dublin-a2.png')\n    >>> image2.height\n\
    \    1512\n    >>> image2.width\n    2016\n    >>> image2.format\n    'PNG'\n\
    \    >>> xmp_info = xmltodict.parse(image2.info['XML:com.adobe.xmp'])\n    ```\n\
    6.  获取 RDF 描述字段，其中包含我们正在寻找的所有值。检索型号（一个 TIFF 值）、镜头型号（一个 EXIF 值）和创建日期（一个 XMP 值）。检查这些值是否与步骤\
    \ 4 中的相同，即使文件不同：\n    ```python\n    >>> rdf_info_2 = xmp_info['x:xmpmeta']['rdf:RDF']\n\
    \    ['rdf:Description']\n    >>> rdf_info_2['tiff:Model']\n    'iPhone X'\n \
    \   >>> rdf_info_2['exifEX:LensModel']\n    'iPhone X back dual camera 4mm f/1.8'\n\
    \    >>> rdf_info_2['xmp:CreateDate']\n    '2018-04-21T12:07:55'\n    ```\n7.\
    \  获取两张图片中的 GPS 信息，将它们转换为等效格式，并检查它们是否相同。注意分辨率不同，但它们在小数点后第四位是匹配的：\n    ```python\n\
    \    >>> gps_info_1 = {GPSTAGS.get(tag, tag): value\n            for tag, value\
    \ in exif_info_1['GPSInfo'].items()}\n    >>> exif_to_decimal(gps_info_1)\n  \
    \  ('N53.34690555555556', 'W6.247797222222222')\n    >>> rdf_to_decimal(rdf_info_2)\n\
    \    ('N53.346905', 'W6.247796666666667')\n    ```\n8.  打开第三张图像并获取创建日期和 GPS 信息，检查它是否与其他照片不匹配，尽管很接近（第二位和第三位小数不同）：\n\
    \    ```python\n    >>> image3 = Image.open('photo-dublin-b.png')\n    >>> xmp_info\
    \ = xmltodict.parse(image3.info['XML:com.adobe.xmp'])\n    >>> rdf_info_3 = xmp_info['x:xmpmeta']['rdf:RDF']\n\
    \    ['rdf:Description']\n    >>> rdf_info_3['xmp:CreateDate']\n    '2018-03-08T18:16:57'\n\
    \    >>> rdf_to_decimal(rdf_info_3)\n    ('N53.34984166666667', 'W6.260388333333333')\n\
    \    ```\n\n## 工作原理...\n\nPillow 能够解释大多数常见图像格式的文件，如“如何操作...”部分的步骤 2 所示。\n\nImage\
    \ 对象包含有关文件大小和格式的基本信息，如步骤 3 所示。`info` 属性包含依赖于格式的信息。\n\nJPG 文件的 EXIF 元数据可以使用 `_getexif()`\
    \ 方法解析，但随后需要正确翻译，因为它使用原始二进制定义。例如，数字 42,036 对应于 `LensModel` 属性。幸运的是，`PIL.ExifTags`\
    \ 模块中定义了所有标签。我们在步骤 4 中将字典转换为可读的标签，以获得更易读的字典。\n\n步骤 5 打开一个 PNG 格式，它具有与大小相关的相同属性，但元数据以\
    \ XML/RDF 格式存储，需要借助 `xmltodict` 进行解析。步骤 6 展示了如何导航此元数据以提取与 JPG 格式中相同的信息。数据是相同的，因为两个文件都来自同一张原始图片，即使图像不同。\n\
    \n> Xmltodict 在尝试解析非 XML 格式的数据时存在一些问题。请检查输入是否为有效的 XML。\n\n步骤 7 提取了两张图像的 GPS 信息，它们以不同的方式存储，并显示它们是相同的（尽管由于编码方式不同，精度不同）。\n\
    \n> 并非每张图像都必然包含位置信息或其他元数据。根据格式和生成文件的相机，此信息可能会被更改、删除或以不同方式存储。\n\n步骤 8 显示了另一张照片的信息。\n\
    \n## 更多内容...\n\nPillow 还具有许多围绕修改图片的功能。调整文件大小或进行简单修改（如旋转）非常容易。您可以在此处找到完整的 Pillow\
    \ 文档：https://pillow.readthedocs.io。\n\n> Pillow 允许对图像进行大量操作。不仅是简单的操作，如调整大小或转换格式，还包括裁剪图像、应用颜色滤镜或生成动画\
    \ GIF 等。如果您对使用 Python 进行图像处理感兴趣，它绝对是需要掌握的模块。\n\n食谱中的 GPS 坐标以 **DMS（度、分、秒）** 和\
    \ **DDM（度、十进制分）** 表示，并转换为 **DD（十进制度）**。您可以在此处了解更多关于不同 GPS 格式的信息：http://www.ubergizmo.com/how-to/read-gps-coordinates/。如果您好奇，您还可以在那里找到如何搜索图片的确切位置。\n\
    \n读取图像文件的一个更高级用途是尝试对其进行 **OCR（光学字符识别）** 处理。这意味着自动检测图像中的文本并提取和处理它。开源模块 `tesseract`\
    \ 允许您执行此操作，并且可以与 Python 和 Pillow 一起使用。\n\n您需要在系统上安装 `tesseract`（https://github.com/tesseract-ocr/tesseract/wiki）和\
    \ `pytesseract` Python 模块（使用 `pip install pytesseract`）。\n\n您可以从 GitHub 仓库下载一个包含清晰文本的文件，名为\
    \ `photo-text.jpg`，地址为 https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter04/images/photo-text.jpg：\n\
    \n```python\n>>> from PIL import Image\n>>> import pytesseract\n>>> pytesseract.image_to_string(Image.open('photo-text.jpg'))\n\
    'Automate!'\n```\n\n如果图像中的文本不是很清晰，或者与图像混合，或者使用特殊字体，OCR 可能会很困难。在 `photo-dublin-a-text.jpg`\
    \ 文件中有一个这样的例子（可在 GitHub 仓库 https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter04/images/photo-dublin-a-text.jpg\
    \ 中找到），其中包含图片上的文本：\n\n```python\n>>> pytesseract.image_to_string(Image.open('photo-dublin-a-text.jpg'))\n\
    'fl\\n\\nAutomat'\n```\n\n有关 Tesseract 的更多信息，请访问以下链接：\n\nhttps://github.com/tesseract-ocr/tesseract\n\
    \nhttps://github.com/madmaze/pytesseract\n\n> 正确导入文件进行 OCR 可能需要初始图像处理以获得更好的结果。图像处理超出了本书的目标范围，但您可以使用\
    \ OpenCV，它比 Pillow 更强大。您可以处理文件，然后使用 Pillow 打开它：http://opencv-python-tutroals.readthedocs.io/en/latest/py_tutorials/py_tutorials.html。\n\
    \n## 另请参阅\n\n-   本章前面的“读取文本文件”食谱，了解打开和读取文件的基础知识。\n-   本章前面的“读取文件元数据”食谱，了解如何从文件中获取额外信息。\n\
    -   本章前面的“爬取和搜索目录”食谱，了解如何在目录中搜索和查找文件。"
