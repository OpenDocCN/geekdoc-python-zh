  - '[PAGE 473]


    Automatic Testing Routines


    When developing, it''s common to iterate through a test or a small number of tests
    to fix them. In these situations, --1f can greatly help to run the whole test
    suite at once, and then repeat with only the failing tests. As the code is fixed,
    tests that pass will be removed from the execution group, until finally the last
    test passes. Then, --1f will run all the tests again.


    > With small numbers of tests in a test suite, most of this advice won''t be necessary,
    as tests will be very quick. As the number of tests increases, using these parameters
    becomes more important so as to not waste time executing tests that are not directly
    related to the specific part of the code being developed. Just remember to run
    the whole suite once at the end to ensure that your changes didn''t have a disruptive
    effect on an unexpected part of the code. This is actually something that happens
    more times than developers would like!


    # See also


    +   - The *Writing and executing test cases*, earlier in this chapter, to learn
    the basics of how to define tests.

    - The *Testing external code*, earlier in this chapter, to learn how to test code
    in other modules.'
  - '[PAGE 474]


    # # 13

    ## Debugging Techniques


    In this chapter, we will cover the following recipes:


    +   - Learning Python interpreter basics

    - Debugging through logging

    - Debugging with breakpoints

    - Improving your debugging skills


    # ## Introduction


    Writing code is not easy. Actually, it is very hard. Even the best programmer
    in the world can''t foresee every possible alternative and flow of the code.


    This means that executing our code will always produce surprises and unexpected
    behaviors. Some will be very evident, while others will be very subtle, but the
    ability to identify and remove these defects in the code is critical to building
    solid software.


    These defects in software are known as **bugs**, and therefore removing them is
    called **debugging**.


    Inspecting the code just by reading it and reasoning about its execution image
    will never be enough to cover all the possible outcomes on non-trivial code. There
    are always surprises, and complex code is difficult to follow. That''s why the
    ability to debug by stopping execution and taking a look at the current state
    of things is important.'
  - '[PAGE 475]


    # Debugging Techniques


    > Everyone, and I mean EVERYONE, introduces bugs in the code, only to be surprised
    by them later. Some people have described debugging as being the detective in
    a crime movie where you are also the murderer.


    Any debugging process roughly follows this path:


    +   1. You realize there''s a problem.

    2. You understand what the correct behavior should be.

    3. You discover why the current code produces the bug.

    4. You change the code to produce the proper result.


    95% of the time, everything but *step 3* is straightforward. *Step 3* is the bulk
    of the debugging process.


    Realizing the *why* of a bug, at its core, follows a scientific methodology:


    +   1. Measure and observe what the code is doing.

    2. Produce a hypothesis on why that is.

    3. Validate or disprove the hypothesis, through either a specifically designed
    experiment (for example, a test) or the examination of the execution of a test
    (which can be considered a natural experiment).

    4. Use the resulting information to fix the bug or to iterate the process.


    Debugging is a skill, and as such, it will improve over time. Practice plays an
    important role in developing intuition on what paths look promising to identify
    an error, but there are some general ideas that may help you:


    +   - **Divide and conquer:** Isolate small parts of the code so that it is possible
    to understand the code. Simplify the problem as much as possible.


    > There''s a format of this method called the **Wolf fence algorithm**, described
    by Eduard Gauss:


    > "There''s one wolf in Alaska; how do you find it? First, build a fence down
    the middle of the state, wait for the wolf to howl, and determine which side of
    the fence it is on. Repeat this process on that side only, until you get to the
    point where you can see the wolf."


    +   - **Move backward from the error:** If there''s a clear error at a specific
    point, the bug is likely located in the surroundings. Move progressively backward
    from the error, following the track until the source of the error is found.'
  - '[PAGE 476]


    +   - **You can assume anything you want, as long as you prove your assumption
    is true:** Code is very complex to keep in your head all at once. You need to
    validate small assumptions that, when combined, will provide solid ground to move
    forward with detecting and fixing the problem. Make small experiments that allow
    you to rule out parts of the code that work and focus on untested ones.


    > Or, in the words of Sherlock Holmes:

    *"Once you eliminate the impossible, whatever remains, no matter how improbable,
    must be the truth."*


    Remember to prove any assumption you make. Avoid unproven assumptions, as they''ll
    distract you from the location of the bug. It''s very easy to think that the error
    happens in one part of the code and look at another.


    > This may sound a bit scary, but most bugs are pretty evident. Maybe a typo,
    or a piece of code not ready for a particular value. Try to keep things simple.
    Simple code is easier to analyze and debug.


    Check out *Chapter 12, Automatic Testing Routines*, to learn how to work with
    tests. Tests are excellent tools to help you debug, find problems, and add validation
    points. Debugging the code in a defined test allows you to create a small environment
    where you can focus on the expected inputs and outputs and search for bugs.


    In this chapter, we will look at several tools and techniques for debugging and
    apply them specifically to Python scripts. The scripts will contain some bugs
    that we will fix as part of the recipe.


    # Learning Python interpreter basics


    In this recipe, we''ll cover some of Python''s built-in capabilities to examine
    code, investigate what''s going on, and detect when things are not behaving properly.


    > We can also verify when things are working as expected. Remember that being
    able to rule out part of the code as the source of a bug is incredibly important.'
- md: "## Debugging Techniques\n\nWhile debugging, we typically need to analyze unknown\
    \ elements and objects that come from an external module or service. Code in Python\
    \ is highly discoverable at any point in its execution. This ability to examine\
    \ the types and properties of the code while it is being executed is called *introspection*.\n\
    \nEverything in this recipe is included by default in Python's interpreter.\n\n\
    ## How to do it...\n\n1.  Import pprint:\n    ```python\n    >>> from pprint import\
    \ pprint\n    ```\n\n2.  Create a new dictionary called dictionary:\n    ```python\n\
    \    >>> dictionary = {'example': 1}\n    ```\n\n3.  Display globals in this environment:\n\
    \    ```python\n    >>> globals()\n    {...'pprint': <function pprint at 0x100995048>,\n\
    \    ...'dictionary': {'example': 1}}\n    ```\n\n4.  Print the globals dictionary\
    \ in a readable format with pprint:\n    ```python\n    >>> pprint(globals())\n\
    \    {'__annotations__': {},\n    ...\n    'dictionary': {'example': 1},\n   \
    \ 'pprint': <function pprint at 0x100995048>}\n    ```\n\n5.  Display all of the\
    \ attributes of dictionary:\n    ```python\n    >>> dir(dictionary)\n    ['__class__',\
    \ '__contains__', '__delattr__', '__delitem__',\n    '__dir__', '__doc__', '__eq__',\
    \ '__format__', '__ge__',\n    '__getattribute__', '__getitem__', '__gt__', '__hash__',\
    \ '__init__',\n    '__init_subclass__', '__iter__', '__le__', '__len__', '__lt__',\n\
    \    '__ne__', '__new__', '__reduce__', '__reduce_ex__', '__repr__',\n    '__reversed__',\
    \ '__setattr__', '__setitem__', '__sizeof__',\n    '__str__', '__subclasshook__',\
    \ 'clear', 'copy', 'fromkeys', 'get',\n    'items', 'keys', 'pop', 'popitem',\
    \ 'setdefault', 'update',\n    'values']\n    ```\n\n6.  Show the help for the\
    \ dictionary object:\n    ```python\n    >>> help(dictionary)\n    Help on dict\
    \ object:\n\n    class dict(object)\n     |  dict() -> new empty dictionary\n\
    \     |  dict(mapping) -> new dictionary initialized from a mapping\n     |  \
    \                   object's\n     |                     (key, value) pairs\n\
    \     |  ...\n    ```\n\n## How it works...\n\nAfter importing pprint (pretty\
    \ print) in step 1, we create a new dictionary to work in, as shown in step 2.\n\
    \nStep 3 shows how the global namespace contains, among other things, the defined\
    \ dictionary and the module. globals() displays all imported modules and other\
    \ global variables.\n\n> There's an equivalent locals() for local namespaces.\n\
    \npprint helps display the globals in a more readable format in step 4, adding\
    \ more space and separating the elements by line.\n\nStep 5 shows how to use dir()\
    \ to obtain all the names of the attributes of a Python object. Note that this\
    \ includes all the double underscore values, such as __len__.\n\nThe use of the\
    \ built-in help() function will display relevant information for objects.\n\n\
    ## There's more...\n\ndir(), in particular, is extremely useful for inspecting\
    \ unknown objects, modules, or classes. If you need to filter out the default\
    \ attributes and clarify the output, you can filter the output using a list comprehension:\n\
    \n```python\n>>> [att for att in dir(dictionary) if not att.startswith('__')]\n\
    ['clear', 'copy', 'fromkeys', 'get', 'items', 'keys', 'pop', 'popitem',\n'setdefault',\
    \ 'update', 'values']\n```\n\nIn the same way, you can do this if you're searching\
    \ for a particular method (such as something that starts with set).\n\nhelp()\
    \ will display the docstring of a function or class. docstring is the string defined\
    \ just after the definition to document the function or class:\n\n```python\n\
    >>> def something():\n...     '''\n...     This is help for something\n...   \
    \  '''\n...     pass\n...\n>>> help(something)\nHelp on function something in\
    \ module __main__:\n\nsomething()\n    This is help for something\n```\n\nNotice\
    \ how the \"This is help for something\" string is displayed just after the definition\
    \ of the function.\n\n> docstring is normally enclosed in triple quotes to allow\
    \ writing string with multiple lines. Python will treat everything inside triple\
    \ quotes as a big string, even if there are newlines. You can use either \" or\
    \ ' characters, as long as you use three of them. You can find more information\
    \ about docstrings at https://www.python.org/dev/peps/pep-0257/.\n\nThe documentation\
    \ for the built-in functions can be found at https://docs.python.org/3/library/functions.html#built-in-functions,\
    \ while the full documentation for pprint can be found at https://docs.python.org/3/library/pprint.html.\n\
    \n## See also\n\n- The Improving your debugging skills recipe, later in this chapter,\
    \ to pick up more debugging tools.\n- The Debugging through logging recipe, next\
    \ in this chapter, to learn how to debug elements by setting traces.\n\n## Debugging\
    \ through logging\n\nDebugging is, after all, detecting what's going on inside\
    \ our program and finding out what unexpected or incorrect effects may be happening.\
    \ A simple, yet very effective, approach is to output variables and other information\
    \ at strategic parts of your code to allow the programmer to follow the flow of\
    \ the program.\n\nThe simplest form of this approach is called **print debugging**.\
    \ This technique consists of inserting print statements at certain points to print\
    \ the value of variables or points while debugging.\n\nBut taking this technique\
    \ a little further and combining it with the logging techniques presented in *Chapter\
    \ 2, Automating Tasks Made Easy*, allows us to create a trace of the execution\
    \ of the program. This tracing information can be really useful when detecting\
    \ issues in a running program. Logs are also typically displayed when running\
    \ tests using a test framework.\n\n> pytest, introduced in *Chapter 12, Automatic\
    \ Testing Routines*, automatically shows logs of failed tests. Other test frameworks\
    \ may need to be configured. Logging is presented in this book in *Chapter 2,\
    \ Automating Tasks Made Easy*.\n\n## Getting ready\n\nDownload the `debug_logging.py`\
    \ file from GitHub: https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter13/debug_logging.py.\n\
    \nThis contains an implementation of the bubble sort algorithm (https://www.studytonight.com/data-structures/bubble-sort),\
    \ which is one of the simplest ways to sort a list of elements. It iterates several\
    \ times over the list, and within each iteration, two adjacent values are checked\
    \ and interchanged, so the bigger one comes after the smaller. This makes the\
    \ bigger values ascend like bubbles in the list.\n\n> Bubble sort is a simple\
    \ but naive way of implementing a sort, and there are better alternatives. Unless\
    \ you have an extremely good reason not to, rely on the standard `.sort` method\
    \ in lists.\n\nWhen run, it checks the following list to verify that it is correct:\n\
    \n```python\nassert [1, 2, 3, 4, 7, 10] == bubble_sort([3, 7, 10, 2, 4, 1])\n\
    ```\n\nWe have a bug in this implementation, so we can fix it as part of the recipe!\n\
    \n## How to do it...\n\n1.  Run the `debug_logging.py` script and check whether\
    \ it fails:\n    ```\n    $ python debug_logging.py\n    INFO:Sorting the list:\
    \ [3, 7, 10, 2, 4, 1]\n    INFO:Sorted list:      [2, 3, 4, 7, 10, 1]\n    Traceback\
    \ (most recent call last):\n      File \"debug_logging.py\", line 17, in <module>\n\
    \        assert [1, 2, 3, 4, 7, 10] == bubble_sort([3, 7, 10, 2, 4, 1])\n    AssertionError\n\
    \    ```\n\n2.  Enable debug logging by changing the second line of the `debug_logging.py`\
    \ script:\n    ```python\n    logging.basicConfig(format='%(levelname)s:%(message)s',\n\
    \                        level=logging.INFO)\n    ```\n    Change the preceding\
    \ line to the following one:\n    ```python\n    logging.basicConfig(format='%(levelname)s:%(message)s',\n\
    \                        level=logging.DEBUG)\n    ```\n    Note the different\
    \ level.\n\n3.  Run the script again, with more information inside:\n    ```\n\
    \    $ python debug_logging.py\n    INFO:Sorting the list: [3, 7, 10, 2, 4, 1]\n\
    \    DEBUG:alist: [3, 7, 10, 2, 4, 1]\n    DEBUG:alist: [3, 7, 10, 2, 4, 1]\n\
    \    DEBUG:alist: [3, 7, 2, 10, 4, 1]\n    DEBUG:alist: [3, 7, 2, 4, 10, 1]\n\
    \    DEBUG:alist: [3, 7, 2, 4, 10, 1]\n    DEBUG:alist: [3, 2, 7, 4, 10, 1]\n\
    \    DEBUG:alist: [3, 2, 4, 7, 10, 1]\n    DEBUG:alist: [2, 3, 4, 7, 10, 1]\n\
    \    DEBUG:alist: [2, 3, 4, 7, 10, 1]\n    DEBUG:alist: [2, 3, 4, 7, 10, 1]\n\
    \    INFO:Sorted list : [2, 3, 4, 7, 10, 1]\n    Traceback (most recent call last):\n\
    \    ```"
  mdcn: "## 调试技术\n\n在调试过程中，我们通常需要分析来自外部模块或服务的未知元素和对象。Python 中的代码在执行过程中的任何时刻都具有高度的可发现性。这种在代码执行时检查其类型和属性的能力被称为*内省*。\n\
    \n本节中的所有内容都默认包含在 Python 解释器中。\n\n## 如何操作...\n\n1.  导入 pprint：\n    ```python\n\
    \    >>> from pprint import pprint\n    ```\n\n2.  创建一个名为 dictionary 的新字典：\n \
    \   ```python\n    >>> dictionary = {'example': 1}\n    ```\n\n3.  显示此环境中的全局变量：\n\
    \    ```python\n    >>> globals()\n    {...'pprint': <function pprint at 0x100995048>,\n\
    \    ...'dictionary': {'example': 1}}\n    ```\n\n4.  使用 pprint 以可读格式打印全局变量字典：\n\
    \    ```python\n    >>> pprint(globals())\n    {'__annotations__': {},\n    ...\n\
    \    'dictionary': {'example': 1},\n    'pprint': <function pprint at 0x100995048>}\n\
    \    ```\n\n5.  显示 dictionary 的所有属性：\n    ```python\n    >>> dir(dictionary)\n\
    \    ['__class__', '__contains__', '__delattr__', '__delitem__',\n    '__dir__',\
    \ '__doc__', '__eq__', '__format__', '__ge__',\n    '__getattribute__', '__getitem__',\
    \ '__gt__', '__hash__', '__init__',\n    '__init_subclass__', '__iter__', '__le__',\
    \ '__len__', '__lt__',\n    '__ne__', '__new__', '__reduce__', '__reduce_ex__',\
    \ '__repr__',\n    '__reversed__', '__setattr__', '__setitem__', '__sizeof__',\n\
    \    '__str__', '__subclasshook__', 'clear', 'copy', 'fromkeys', 'get',\n    'items',\
    \ 'keys', 'pop', 'popitem', 'setdefault', 'update',\n    'values']\n    ```\n\n\
    6.  显示 dictionary 对象的帮助信息：\n    ```python\n    >>> help(dictionary)\n    Help\
    \ on dict object:\n\n    class dict(object)\n     |  dict() -> new empty dictionary\n\
    \     |  dict(mapping) -> new dictionary initialized from a mapping\n     |  \
    \                   object's\n     |                     (key, value) pairs\n\
    \     |  ...\n    ```\n\n## 工作原理...\n\n在步骤 1 中导入 pprint（漂亮打印）后，我们在步骤 2 中创建了一个新的字典进行操作。\n\
    \n步骤 3 展示了全局命名空间包含的内容，其中包括定义的字典和模块。globals() 显示所有导入的模块和其他全局变量。\n\n> 对于局部命名空间，有一个等效的\
    \ locals()。\n\npprint 在步骤 4 中帮助以更可读的格式显示全局变量，增加了更多空格并按行分隔元素。\n\n步骤 5 展示了如何使用 dir()\
    \ 获取 Python 对象的所有属性名称。请注意，这包括所有双下划线值，例如 __len__。\n\n使用内置的 help() 函数将显示对象的相关信息。\n\
    \n## 更多内容...\n\n特别是，dir() 对于检查未知对象、模块或类非常有用。如果你需要过滤掉默认属性并澄清输出，可以使用列表推导式过滤输出：\n\
    \n```python\n>>> [att for att in dir(dictionary) if not att.startswith('__')]\n\
    ['clear', 'copy', 'fromkeys', 'get', 'items', 'keys', 'pop', 'popitem',\n'setdefault',\
    \ 'update', 'values']\n```\n\n同样，如果你正在搜索特定方法（例如以 set 开头的方法），也可以这样做。\n\nhelp()\
    \ 将显示函数或类的文档字符串。文档字符串是定义后紧跟的字符串，用于记录函数或类：\n\n```python\n>>> def something():\n\
    ...     '''\n...     This is help for something\n...     '''\n...     pass\n...\n\
    >>> help(something)\nHelp on function something in module __main__:\n\nsomething()\n\
    \    This is help for something\n```\n\n注意 \"This is help for something\" 字符串是如何在函数定义后显示的。\n\
    \n> 文档字符串通常用三引号括起来，以允许编写多行字符串。Python 会将三引号内的所有内容视为一个大字符串，即使有换行符。你可以使用 \" 或 ' 字符，只要使用三个即可。你可以在\
    \ https://www.python.org/dev/peps/pep-0257/ 找到更多关于文档字符串的信息。\n\n内置函数的文档可以在 https://docs.python.org/3/library/functions.html#built-in-functions\
    \ 找到，而 pprint 的完整文档可以在 https://docs.python.org/3/library/pprint.html 找到。\n\n##\
    \ 另请参阅\n\n-   本章后面的“提升你的调试技能”部分，以获取更多调试工具。\n-   本章接下来的“通过日志记录进行调试”部分，学习如何通过设置跟踪来调试元素。\n\
    \n## 通过日志记录进行调试\n\n调试，归根结底，是检测程序内部发生了什么，并找出可能发生的意外或不正确的效果。一种简单但非常有效的方法是在代码的战略部分输出变量和其他信息，以便程序员跟踪程序的流程。\n\
    \n这种方法最简单的形式被称为**打印调试**。这种技术包括在某些点插入打印语句，以在调试时打印变量的值或点。\n\n但将这种技术更进一步，并结合*第 2\
    \ 章，轻松自动化任务*中介绍的日志技术，允许我们创建程序执行的跟踪。这种跟踪信息在检测运行程序中的问题时非常有用。日志通常也在使用测试框架运行测试时显示。\n\
    \n> *第 12 章，自动测试例程*中介绍的 pytest 会自动显示失败测试的日志。其他测试框架可能需要配置。日志记录在本书的*第 2 章，轻松自动化任务*中介绍。\n\
    \n## 准备工作\n\n从 GitHub 下载 `debug_logging.py` 文件：https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter13/debug_logging.py。\n\
    \n这包含一个冒泡排序算法（https://www.studytonight.com/data-structures/bubble-sort）的实现，这是对元素列表进行排序的最简单方法之一。它多次遍历列表，在每次迭代中，检查两个相邻的值并交换它们，使较大的值在较小的值之后。这使得较大的值像气泡一样在列表中上升。\n\
    \n> 冒泡排序是一种简单但朴素的排序实现方式，有更好的替代方案。除非你有极好的理由不这样做，否则请依赖列表中的标准 `.sort` 方法。\n\n运行时，它检查以下列表以验证其正确性：\n\
    \n```python\nassert [1, 2, 3, 4, 7, 10] == bubble_sort([3, 7, 10, 2, 4, 1])\n\
    ```\n\n这个实现中有一个错误，所以我们可以在本节中修复它！\n\n## 如何操作...\n\n1.  运行 `debug_logging.py` 脚本并检查是否失败：\n\
    \    ```\n    $ python debug_logging.py\n    INFO:Sorting the list: [3, 7, 10,\
    \ 2, 4, 1]\n    INFO:Sorted list:      [2, 3, 4, 7, 10, 1]\n    Traceback (most\
    \ recent call last):\n      File \"debug_logging.py\", line 17, in <module>\n\
    \        assert [1, 2, 3, 4, 7, 10] == bubble_sort([3, 7, 10, 2, 4, 1])\n    AssertionError\n\
    \    ```\n\n2.  通过更改 `debug_logging.py` 脚本的第二行来启用调试日志：\n    ```python\n    logging.basicConfig(format='%(levelname)s:%(message)s',\n\
    \                        level=logging.INFO)\n    ```\n    将前面的行更改为以下行：\n    ```python\n\
    \    logging.basicConfig(format='%(levelname)s:%(message)s',\n               \
    \         level=logging.DEBUG)\n    ```\n    注意不同的级别。\n\n3.  再次运行脚本，包含更多信息：\n\
    \    ```\n    $ python debug_logging.py\n    INFO:Sorting the list: [3, 7, 10,\
    \ 2, 4, 1]\n    DEBUG:alist: [3, 7, 10, 2, 4, 1]\n    DEBUG:alist: [3, 7, 10,\
    \ 2, 4, 1]\n    DEBUG:alist: [3, 7, 2, 10, 4, 1]\n    DEBUG:alist: [3, 7, 2, 4,\
    \ 10, 1]\n    DEBUG:alist: [3, 7, 2, 4, 10, 1]\n    DEBUG:alist: [3, 2, 7, 4,\
    \ 10, 1]\n    DEBUG:alist: [3, 2, 4, 7, 10, 1]\n    DEBUG:alist: [2, 3, 4, 7,\
    \ 10, 1]\n    DEBUG:alist: [2, 3, 4, 7, 10, 1]\n    DEBUG:alist: [2, 3, 4, 7,\
    \ 10, 1]\n    INFO:Sorted list : [2, 3, 4, 7, 10, 1]\n    Traceback (most recent\
    \ call last):\n    ```"
