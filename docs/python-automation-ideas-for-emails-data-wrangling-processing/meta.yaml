    # # 7 Cleaning and Processing Data


    Some automated tasks will require dealing with large amounts of data. As data
    grows, two new and distinct problems appear. Processing the task takes too long
    and input data quality issues cause more problems.


    Both problems are well known in the realm of data science dealing with big quantities
    of data, but the problems can appear even at a smaller scale.


    The quality of input data is highly related to the number of sources of the data.
    In general, data from a single source will be more consistent, but using a single
    source is limiting. Even if the data comes from the same source, it could still
    contain inconsistencies or errors.


    > > Some examples of differences could be regional, such as date formats or currencies,
    extra information, different names for the same concept (including spelling differences),
    typos, general bad quality of data with errors... The list is huge!


    To compare apples with apples, the input data will probably need to be cleaned.
    This can be a difficult task and require multiple iterations until the process
    is refined, particularly if the data changes over time. We will look at some techniques
    to approach this task.'
  - '[PAGE 229]


    Cleaning and Processing Data


    Regarding time, for some automated cases, this is not a problem. It makes no difference
    if an automated background emailer, composing and sending a daily update email
    during the night hours to be read as people come into the office, takes two hours
    or two minutes. But if someone is waiting for timely results, this can be highly
    inefficient.


    In particular, the waiting time during actual code development and testing is
    critical as it will not only use up time that could be spent on developing features
    but also destroys your focus and concentration, which are key to the development
    process.


    There are several tips and techniques to speed up code execution. The main two
    are: avoid performing the same operation multiple times; and parallelize the task
    by dividing it into smaller chunks.


    > The best general advice on to reduce time for your computer tasks is to learn
    computer science, in particular, algorithms and data structures. This is out of
    scope for this book, and it can be a long journey. But don''t be afraid to ask
    a fellow programmer for help! Even online!


    Chapter 3, Building Your First Web Scraping Application, introduced parallelization
    of code as part of the Speeding up web scraping recipe. We will continue with
    the concept during this chapter.


    In this chapter, we will cover the following recipes:


    +   - Preparing a CSV spreadsheet

    - Appending currency based on location

    - Standardizing the date format

    - Aggregating results

    - Processing data in parallel

    - Processing data with Pandas


    Let''s start by getting the base information ready in a tabular file.


    # Preparing a CSV spreadsheet


    As we saw in the previous chapter, CSV files are files containing tabular data
    defined as a collection of rows with defined columns, separated by commas. They
    are a very common format for all kinds of data. We will see in this recipe how
    to extract data from log files and store the information in a CSV file.'
- md: "# Getting ready\n\nWe will use a similar log format as the one introduced in\
    \ the *Extracting data from structured strings* recipe in *Chapter 1, Let's Begin\
    \ Our Automation Journey*:\n\n```\n[<Timestamp>] - SALE - PRODUCT: <product id>\
    \ - PRICE: <price>\n```\n\nEach line will represent a sale log.\n\nWe will use\
    \ the `parse` module. We should install the module, adding it to our `requirements.txt`\
    \ file as follows:\n\n```\n$ echo \"parse==1.14.0\" >> requirements.txt\n$ pip\
    \ install -r requirements.txt\n```\n\nIn the GitHub repository, there are some\
    \ log files to process with the following structure:\n\n```\nsale_logs/\n  OH\n\
    \    logs.txt\n  ON\n    logs.txt\n```\n\nThe code can be found in the GitHub\
    \ repository at `https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter07`.\n\
    \n# How to do it...\n\n1. Check the contents of the `sale_logs/OH/logs.txt` file:\n\
    \n```\n$ head sale_logs/OH/logs.txt\n[08-27-2019 18:39:41] - SALE - PRODUCT: 12346\
    \ - PRICE: 02.99\n[08-27-2019 19:39:41] - SALE - PRODUCT: 12346 - PRICE: 02.99\n\
    [08-27-2019 20:39:41] - SALE - PRODUCT: 12346 - PRICE: 02.99\n[08-27-2019 21:39:41]\
    \ - SALE - PRODUCT: 12346 - PRICE: 02.99\n[08-27-2019 22:39:41] - SALE - PRODUCT:\
    \ 12345 - PRICE: 09.99\n[08-27-2019 23:39:41] - SALE - PRODUCT: 12345 - PRICE:\
    \ 07.99\n[08-28-2019 00:39:41] - SALE - PRODUCT: 12346 - PRICE: 02.99\n[08-28-2019\
    \ 01:39:41] - SALE - PRODUCT: 12346 - PRICE: 02.99\n[08-28-2019 02:39:41] - SALE\
    \ - PRODUCT: 12346 - PRICE: 02.99\n[08-28-2019 03:39:41] - SALE - PRODUCT: 12346\
    \ - PRICE: 02.99\n```\n\n2. Import the data and transform it into a CSV file using\
    \ the `logs_to_csv.py` script. The script adds the location as input:\n\n```\n\
    $ python logs_to_csv.py sale_logs/OH/logs.txt output_1_OH.csv -l OH\n```\n\n3.\
    \ Check the resulting CSV file in a spreadsheet. In the following screenshot,\
    \ the file is displayed using the LibreOffice software:\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_231_0.png)\n\
    \nFigure 7.1: Screenshot of product data\n\nNotice how the CSV includes the location,\
    \ which is stated as OH. Notice also the format of the timestamp.\n\n# How it\
    \ works...\n\nLet's take a look at the `logs_to_csv.py` script, used in *step\
    \ 2*.\n\nIt imports from the `price_log.py` file, which contains the parsing of\
    \ the logs. This is similar to the code in the *Extracting data from structured\
    \ strings* recipe in Chapter 1, *Let's Begin Our Automation Journey*. The code\
    \ adds a header with all the rows and adds a location column. Let's take a look:\n\
    \n```\nclass PriceLog(object):\n\n    def __init__(self, location, timestamp,\
    \ product_id, price):\n        self.timestamp = timestamp\n        self.product_id\
    \ = product_id\n        self.price = price\n        self.location = location\n\
    \n    @classmethod\n    def parse(cls, location, text_log):\n        '''\n   \
    \     Parse from a text log with the format\n        [<Timestamp>] - SALE - PRODUCT:\
    \ <product id> - PRICE: <price>\n        to a PriceLog object\n\n        It requires\
    \ a location\n        '''\n        def price(string):\n            return Decimal(string)\n\
    \n        FORMAT = ('[{timestamp}] - SALE - PRODUCT: {product:d} - '\n       \
    \           'PRICE: {price:price}')\n\n        formats = {'price': price}\n  \
    \      result = parse.parse(FORMAT, text_log, formats)\n\n        return cls(location=location,\
    \ timestamp=result['timestamp'],\n                   product_id=result['product'],\n\
    \                   price=result['price'])\n\n    @classmethod\n    def header(cls):\n\
    \        return ['LOCATION', 'TIMESTAMP', 'PRODUCT', 'PRICE']\n\n    def row(self):\n\
    \        return [self.location, self.timestamp, self.product_id,\n           \
    \     self.price]\n```\n\nThe file is converted into CSV format by the `log_to_csv`\
    \ function in the `logs_to_csv.py` file:\n\n```\ndef log_to_csv(input_file, output_file,\
    \ location):\n    logs = [PriceLog.parse(location, line) for line in input_file]\n\
    \n    # Save into csv format\n    writer = csv.writer(output_file)\n    writer.writerow(PriceLog.header())\n\
    \    writer.writerows(l.row() for l in logs)\n```\n\nThe rest of the `logs_to_csv.py`\
    \ file deals with the parsing of arguments, which was described in detail in *Chapter\
    \ 2, Automating Tasks Made Easy*.\n\nThe resulting file contains the same information,\
    \ but CSV is an easier format to understand, process, and add extra information\
    \ to, as we will see in the following recipes.\n\n# There's more...\n\nThe main\
    \ objective in this recipe is to import data from a text file into a CSV without\
    \ imposing any formatting restrictions on the raw data. For example, the date\
    \ is in a particular format. The timestamp format will change from file to file,\
    \ as we will see in the following recipes.\n\nThe description of the location\
    \ is also left deliberately open, as we will use it to set different kinds of\
    \ locations in the following recipes.\n\nIf the log files are very big, reading\
    \ the whole file and then saving it could be memory-inefficient. In that case,\
    \ you can process one line at a time, in the following way:\n\n```\ndef log_to_csv(input_file,\
    \ output_file, location):\n    writer = csv.writer(output_file)\n    writer.writerow(PriceLog.header())\n\
    \n    # Read and save line by line\n    for line in input_file:\n        log =\
    \ PriceLog.parse(location, line)\n        writer.writerow(log.row())\n```\n\n\
    This approach can also be done in batches, reading and writing several lines at\
    \ a time. This can increase the throughput, though a bit of experimentation could\
    \ be required to find the optimal solution.\n\n# See also\n\n- The *Reading CSV\
    \ files* recipe in *Chapter 4, Searching and Reading Local Files*.\n- The *Extracting\
    \ data from structured strings* recipe from *Chapter 1, Let's Begin Our Automation\
    \ Journey*.\n- The *Preparing a task* recipe in *Chapter 2, Automating Tasks Made\
    \ Easy*.\n\n# Appending currency based on location\n\nThe resulting CSV file from\
    \ the previous recipe doesn't contain currency information, even though the location\
    \ can indicate different places with different currencies. In this recipe, we\
    \ will process a CSV file to add extra information: the currency the prices are\
    \ in, and a conversion into US dollars.\n\n# Getting ready\n\nWe will use the\
    \ resulting CSV file from the previous recipe that receives and transforms logs\
    \ to the following format:\n\n```\n[<Timestamp>] - SALE - PRODUCT: <product id>\
    \ - PRICE: <price>\n```\n\nEach line will represent a sale log.\n\nWe will use\
    \ the `parse` module. We should install the module, adding it to our `requirements.txt`\
    \ file as follows:\n\n```\n$ echo \"parse==1.14.0\" >> requirements.txt\n$ pip\
    \ install -r requirements.txt\n```\n\nIn the GitHub repository, there are some\
    \ log files to process with the following structure:\n\n```\nsale_logs/\n  OH\n\
    \    logs.txt\n  ON\n    logs.txt\n```\n\nThe code can be found in the GitHub\
    \ repository, at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter07.\n\
    \n# How to do it...\n\n1. Import the data and transform it into a CSV file using\
    \ the `logs_to_csv.py` script. The script adds the location as input. Create the\
    \ files for both the OH and ON logs:\n\n```\n$ python logs_to_csv.py sale_logs/OH/logs.txt\
    \ output_1_OH.csv -l OH\n$ python logs_to_csv.py sale_logs/ON/logs.txt output_1_ON.csv\
    \ -l ON\n```\n\n2. Process both resulting files using the `location_price.py`\
    \ script:\n\n```\n$ python location_price.py output_1_OH.csv output_2_OH.csv\n\
    $ python location_price.py output_1_ON.csv output_2_ON.csv\n```\n\n3. Check the\
    \ resulting CSV files in a spreadsheet. In the following screenshots, the files\
    \ are displayed using the LibreOffice software:\n\n| LOCATION | TIMESTAMP | PRODUCT\
    \ | PRICE | COUNTRY | CURRENCY | USD |\n|---|---|---|---|---|---|---|\n| ON |\
    \ 2018-08-27 19:05:55+00:00 | 12346 | 3.99 | CANADA | CAD | 3 |\n| ON | 2018-08-27\
