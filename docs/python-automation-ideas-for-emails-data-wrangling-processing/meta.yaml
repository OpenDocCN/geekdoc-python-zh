    # How it works...


    After creating the document in *step 1*, *step 2* from the *How to do it*... section
    adds a paragraph with several runs. In Word, a paragraph can contain multiple
    runs, which are smaller parts that may have different styles. In general, any
    format change related to individual words will be applied to a run, while a change
    that affects the whole paragraph will be applied to the `paragraph` object.


    Each of the runs are created, by default, with the `Normal` style. Any attribute
    of `.bold`, `.italic`, or `.underline` can be changed to `True` to set up whether
    the run should be in a proper style or a combination of these. A value of `False`
    will deactivate it, while a `None` value will apply the configured default.


    > Note that the proper word in this protocol is *italic*, and not *italics*. Setting
    the property to italics won''t have any effect, but won''t display an error either.


