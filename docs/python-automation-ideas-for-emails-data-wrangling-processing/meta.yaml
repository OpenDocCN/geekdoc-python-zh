  md: "Note that the specific shop is stored in the last subdirectory, so it is extracted\
    \ with `os.path.basename`.\n\nOnce the list of logs has been completed, a new\
    \ Excel sheet is created using the `openpyxl` module. The `SaleLog` module has\
    \ a `.row_header` method to add the first row, and then all the logs are converted\
    \ into row format using `.row`. Finally, the file is saved.\n\nTo parse the logs,\
    \ we make a module called `sale_log.py`, which abstracts parsing and dealing with\
    \ rows. Most of it is straightforward and structures each of the different parameters\
    \ properly, but the `parse` method requires a bit of attention:\n\n```\npython\n\
    @classmethod\ndef parse(cls, shop, text_log):\n    '''\n    Parse from a text\
    \ log with the format\n    ...\n    to a SaleLog object\n    '''\n    def price(string):\n\
    \        return Decimal(string)\n\n    def isodate(string):\n        return delorean.parse(string)\n\
    \n    FORMAT = ('[{timestamp:isodate}] - SALE - PRODUCT: '\n              '{product:d}\
    \ '\n              '- PRICE: ${price:price} - NAME: {name:D} '\n             \
    \ '- DISCOUNT: {discount:d}%')\n\n    formats = {'price': price, 'isodate': isodate}\n\
    \    result = parse.parse(FORMAT, text_log, formats)\n\n    return cls(timestamp=result['timestamp'],\n\
    \               product_id=result['product'],\n               price=result['price'],\n\
    \               name=result['name'],\n               discount=result['discount'],\n\
    \               shop=shop)\n```\n\n`sale_log.py` is a `classmethod`, meaning that\
    \ it can be used by calling `SaleLog.parse`. It returns a new element of the class."
