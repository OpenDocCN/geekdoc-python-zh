  md: "```\nresult = number / other_number\nZeroDivisionError: division by zero\n\
    ```\n\n# How it works...\n\nTo properly capture any unexpected exceptions, the\
    \ main function should be wrapped in a `try-except` block, as implemented in step\
    \ 4 of the *How to do it...* section. Compare this to how step 1 does not wrap\
    \ the code:\n\n```\ntry:\n    main(...)\nexcept Exception as exc:\n    # Something\
    \ went wrong\n    logging.exception(\"Error running task\")\n    exit(1)\n```\n\
    \nNote that logging the exception is important for getting information on what\
    \ went wrong.\n\nThis kind of exception is nicknamed Pokémon Exception because\
    \ it can catch 'em all. It will capture any unexpected error at the highest level.\
    \ Do not use it in other areas of the code, as capturing everything can hide unexpected\
    \ errors. At the very least, any unexpected exception should be logged to allow\
    \ for further analysis.\n\nThe extra step, to exit with status 1 by using the\
    \ `exit(1)` call, informs the operating system that something went wrong with\
    \ our script.\n\nThe `logging` module allows us to log. Note the basic configuration,\
    \ which includes an optional file to store the logs, the format, and the level\
    \ of the logs to display.\n\nThe available levels for logs are—from less critical\
    \ to more critical—DEBUG, INFO, WARNING, ERROR, and CRITICAL. The logging level\
    \ will set the minimum severity required to log the message. For example, an INFO\
    \ log won't be stored if the severity is set to WARNING.\n\nCreating logs is easy.\
    \ You can do this by making a call to the `logging.<logging level>` method (where\
    \ the logging level is DEBUG, INFO, and so on). For example:\n\n```\n>>> import\
    \ logging\n>>> logging.basicConfig(level=logging.INFO)\n>>> logging.warning('a\
    \ warning message')\nWARNING:root:a warning message\n>>> logging.info('an info\
    \ message')\nINFO:root:an info message\n```"
