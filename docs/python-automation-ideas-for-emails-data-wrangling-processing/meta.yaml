    \ type. That can help if you want to combine this recipe with others in this book,\
    \ such as crawling the web and translating interesting articles to your native\
    \ language, or categorizing blog posts from an RSS feed to filter only the relevant\
    \ ones.\n\nGo to https://cloud.google.com/natural-language/ to see the full Natural\
    \ Language API documentation. The documentation for the Python clients is available\
    \ at https://googleapis.dev/python/translation/latest/index.html and https://googleapis.dev/python/language/latest/index.html.\n\
    \n## See also\n\n- The *Analyzing images with Google Cloud Vision AI* recipe,\
    \ earlier in this chapter, to learn how to create an account to use the Google\
    \ Cloud interfaces.\n- The *Creating your own custom machine learning model to\
    \ classify text* recipe, later this chapter, to learn how to train a model to\
    \ recognize custom elements.\n\n## Creating your own custom machine learning model\
    \ to classify text\n\nUsing the default interface to classify text based on sentiment\
    \ or general categories is very powerful but doesn't allow us to classify different\
    \ texts based on our own rules. Being able to create our own model is where the\
    \ full power of machine learning lies.\n\nFortunately, Google offers the power\
    \ to create and train our own models based on our own set of training data. This\
    \ allows us to generate a collection of texts and classify them using our own\
    \ labels. With this data, we will prepare our own model that can be matched against\
    \ new texts.\n\nWe will see in this recipe an example of classifying emails sent\
    \ to a shop that has two sections, \"appliances\" and \"furniture.\" We will create\
    \ a third category of \"others\" that should capture emails that don't fit neatly\
    \ into either category.\n\nThe process is highly dependent on the quality of the\
    \ data that is provided to the model. The examples presented in this recipe are\
    \ simple to keep it small, but they show the potential of this technique.\n\n\
    Let's see how we can create and operate our own machine learning model.\n\n##\
    \ Getting ready\n\nWe need to enable the Google Cloud Natural Language API and\
    \ create credentials to work with it. Most of the process is similar to the process\
    \ described earlier in the chapter to enable the Vision API in a Google Cloud\
    \ project, so we can start with the project used in the earlier *Analyzing images\
    \ with Google Cloud Vision AI* recipe.\n\n## Machine Learning for Automation\n\
    \nLog into your account to go to the API dashboard at `https://console.cloud.google.com/apis`.\
    \ Be sure to use the same project as before, or the `credentials.json` file won't\
    \ work.\n\nWe have some text prepared for training the model. It is available\
    \ on GitHub: `https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter11`.\n\
    \nIn the `shop_training` subdirectory, there are three subdirectories (`appliances`,\
    \ `furniture`, and `others`), each containing ten text files with email content.\
    \ Each of the subdirectories corresponds to a label, so all the emails in each\
    \ subdirectory should be qualified on that label.\n\nThe data is zipped in a file\
    \ called `shop.zip`. This contains the same information, but Google requires it\
    \ to be uploaded in zip format.\n\n> Each email text is simulating a request to\
    \ the shop for either two departments or other stuff. You can take a look at them.\n\
    \nWe need to create a new model. Go to `https://console.cloud.google.com/natural-language`\
    \ and select **AutoML text and document classification**:\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_419_0.png)"
