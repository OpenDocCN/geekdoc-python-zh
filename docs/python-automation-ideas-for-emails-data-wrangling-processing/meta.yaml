    Building Your First Web Scraping Application


    # How it works...


    The operation of `requests` is very simple; perform the request, using the `GET`
    method in this case, over the URL. This returns a `result` object that can be
    analyzed. The main elements are the `status_code` and the body content, which
    can be presented as `text`.


    The full request can be inspected in the `request` attribute:


    ```

    >>> response.request

    <PreparedRequest [GET]>

    >>> response.request.url

    ''http://www.columbia.edu/~fdc/sample.html''

    ```


    The full `requests` module documentation can be found here: `https://requests.readthedocs.io/en/master/`.


    Over the course of the chapter, we''ll be showing more features of the `requests`
    library.


    # There''s more...


    All HTTP status codes can be seen at this web page: `https://httpstatuses.com/`.
    They are also described in the `http.HTTPStatus` enum with convenient constant
    names, such as `OK`, `NOT_FOUND`, or `FORBIDDEN`.


    > The most famous error status code is arguably 404, which is returned when the
    resource described by a URL is not found. Try it out by doing `requests.get(''http://www.columbia.edu/invalid'')`.


    The general structure of the status code is:


    +   1XX - Information on specifics about the protocol.

    2XX - Success.

    3XX - Redirection. For example: The URL is no longer valid and is available somewhere
    else. The new URL should be included.

    4XX - Client error. There''s some error in the information sent to the server
    (like a bad format) or in the client (for example, authentication is required
    to be able to access the URL).'
  - '[PAGE 74]


    5XX – Server error. There''s an error on the server side; for example, the server
    might be unavailable or there might be a bug processing the request.


    A request can use the **HTTPS (secure HTTP)** protocol. It is the same as HTTP
    but ensures that the contents of the request and response are private. `requests`
    handles it transparently.


    > Any website that handles any private information should use HTTPS to ensure
    that the information has not leaked out. HTTP is vulnerable to someone eavesdropping.
    Use HTTPS where available.


    # See also


    +   - The *Installing third-party packages* recipe in *Chapter 1, Let''s Begin
    Our Automation Journey*, to learn the basics of installing external modules.

    - The *Parsing HTML* recipe, later in this chapter, to find out how to treat the
    information returned from the server.


    # Parsing HTML


    Downloading raw text or a binary file is a good starting point, but the main language
    of the web is HTML.


    HTML is a structured language, defining different parts of a document such as
    headings and paragraphs. HTML is also hierarchical, defining sub-elements. The
    ability to parse raw text into a structured document is basically the ability
    to extract information automatically from a web page. For example, some text can
    be relevant if enclosed in certain HTML elements, such as a `class div` or after
    a heading `h3` tag.


    # Getting ready


    We''ll use the excellent `Beautiful Soup` module to parse HTML text into a memory
    object that can be analyzed. We need to use the latest version of the `beautifulsoup4`
    package to be compatible with Python 3. Add the package to your `requirements.txt`
    and install the dependencies in the virtual environment:


    ```

    $ echo "beautifulsoup4==4.8.2" >> requirements.txt

    $ pip install -r requirements.txt

    ```'
