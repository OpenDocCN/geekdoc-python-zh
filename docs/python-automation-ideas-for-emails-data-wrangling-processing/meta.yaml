  md: "Generating Fantastic Reports\n\n> Note that you can add a lot of processing\
    \ and logic to the template using filters. While a little bit is fine, try to\
    \ limit the amount of logic in the template. Most of the calculations for data\
    \ to be displayed should be done beforehand, leaving the template to just display\
    \ values. This makes the context very straightforward and simplifies the template,\
    \ allowing for changes.\n\nWhen dealing with HTML files, it is good to auto-escape\
    \ the variables. This means that special characters could be interpreted as part\
    \ as the HTML syntax instead of verbatim text; for example, the < character will\
    \ be replaced by the equivalent HTML code to be properly displayed on an HTML\
    \ page. To do so, create the template with the `autoescape` parameter. Check the\
    \ difference here:\n\n```\n>>> Template('{{variable}}', autoescape=False).render({'variable':\
    \ '<'})\n'<' \n>>> Template('{{variable}}', autoescape=True).render({'variable':\
    \ '<'})\n'&lt;'\n```\n\nEscaping can be applied to each variable with the `e`\
    \ filter (meaning *escape*) and unapplied with the `safe` filter (meaning it is\
    \ safe to render as it is).\n\nJinja2 templates are extensible, meaning that you\
    \ can create a `base_template.html` file and then extend it, changing some of\
    \ the elements. You can include other files as well, partitioning and separating\
    \ different sections. Refer to the full documentation for further details.\n\n\
    > Jinja2 is very powerful and allows us to create complex HTML templates, and\
    \ also in other formats such as LaTeX or JavaScript, though this requires configuring.\
    \ I encourage you to read the whole documentation and have a look at all its capabilities!\n\
    \nThe whole Jinja2 documentation can be found here: http://jinja.pocoo.org/docs/2.11/.\n\
