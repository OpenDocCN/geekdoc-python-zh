    # There''s more...


    In this recipe, we have strategically located the debug logs beforehand, but that
    may not be the case in a real-life debugging exercise. You may need to add more
    or change the location as part of the bug investigation.


    The biggest advantage of this technique is that we''re able to see the flow of
    the program, being able to inspect the output of one block of the code execution
    to the next and make sense of the flow. The disadvantage is that we can end up
    with a wall of text that doesn''t provide specific information about our problem.
    You need to find a balance between too much and too little information.


    Be verbose if you have to, but to reduce clutter, try to avoid long and confusing
    logs. Keep the text as short and as descriptive as possible. Keep each log concise,
    as you can always create more logs if you have to.


    Remember to turn down the logging level after fixing the bug. You may need to
    delete some logs afterward as they won''t be useful in the long term.


    > The quick and dirty version of this technique is to add print statements instead
    of debug logs. While some people are resistant to this, it is a valuable technique
    to use for debugging purposes. But remember to clean them up when you''re done.


    All the introspection tools are available while generating logs, so you can create
    logs that display, for example, all the results of a call to a `dir(object)` object:


    ```

    logging.debug(f''object {dir(object)}'')

    ```


    Anything that can be displayed as a string can be presented in a log.


