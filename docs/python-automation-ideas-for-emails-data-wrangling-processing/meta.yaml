    \nThe main engine to create the concurrent requests is the main function. Notice\
    \ that the rest of the code is basically untouched (other than returning the source\
    \ link in the process_link function).\n\n> This change is actually quite common\
    \ when adapting for concurrency. Concurrent tasks need to return all the relevant\
    \ data, as they cannot rely on an ordered context.\n\nThis is the relevant part\
    \ of the code that handles the concurrent engine:\n\n```\nwith concurrent.futures.ThreadPoolExecutor(max_workers=workers)\
    \ as executor:\n    while to_check:\n        futures = [executor.submit(process_link,\
    \ url, to_search)\n                  for url in to_check]\n        to_check =\
    \ []\n        for data in concurrent.futures.as_completed(futures):\n        \
    \    link, new_links = data.result()\n            checked_links.add(link)\n  \
    \          for link in new_links:\n                if link not in checked_links\
    \ and link not in to_check:\n                    to_check.append(link)\n     \
    \   max_checks -= 1\n```"
  - "[PAGE 109]\n\nBuilding Your First Web Scraping Application\n\n```\nif not max_checks:\n\
    \    return\n```\n\nThe `with` context creates a pool of workers, specifying how\
    \ many. Inside, a list of futures containing all the URLs to retrieve is created.\
    \ The `.as_completed()` function returns the futures that are finished, and then\
    \ there's some work to do to obtain newly found links and check whether they need\
    \ to be added to be retrieved or not. This process is similar to the one presented\
    \ in the *Crawling the web* recipe.\n\nThe process starts again until enough links\
    \ have been retrieved or there are no links to retrieve. Note that the links are\
    \ retrieved in batches; the first time, the base link is processed and all links\
    \ are retrieved. In the second iteration, all those links will be requested. Once\
    \ they are all downloaded, a new batch will be processed.\n\n> When dealing with\
    \ concurrent requests, keep in mind that they can change order between two executions.\
    \ If a request takes a little more or a little less time, that can affect the\
    \ ordering of the retrieved information. Because we stop after downloading 10\
    \ pages, that also means that the 10 pages could be different.\n\n# There's more...\n\
    \nThe full `futures` documentation in Python can be found here: `https://docs.python.org/3/library/concurrent.futures.html`.\n\
    \n> As you can see in *steps 4* and *5* in the *How to do it...* section, properly\
    \ determining the number of workers can require some tests. Some numbers can make\
    \ the process slower, due to the increase in management. Do not be afraid to experiment!\n\
    \nIn the Python world, there are other ways to make concurrent HTTP requests.\
    \ There's a native request module that allows us to work with `futures`, called\
    \ `requests-futures`. It can be found here: `https://github.com/ross/requests-futures`.\n\
    \nAnother alternative is to use asynchronous programming. This way of working\
    \ has recently gotten a lot of attention, as it can be very efficient in situations\
    \ that involve dealing with many concurrent calls, but the resulting way of coding\
    \ is different from the traditional way and requires some time to get used to.\
    \ Python includes the `asyncio` module to work that way, and there's a good module\
    \ called `aiohttp` to work with HTTP requests. You can find more information about\
    \ `aiohttp` here: `https://aiohttp.readthedocs.io/en/stable/client_quickstart.html`."
