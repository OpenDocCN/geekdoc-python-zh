  md: '# Preface


    We are all probably spending time doing small manual tasks that don''t add much
    value. It may be scanning through information sources in search of the small bits
    of relevant information, working with spreadsheets to generate the same graph
    over and over, or searching files one by one until we find the data we''re looking
    for. Some—probably most—of those tasks are, in fact, automatable. There''s an
    investment upfront, but for the tasks that get repeated over and over, we can
    use computers to do these kinds of menial tasks and focus our own efforts instead
    on what humans are good for—high-level analysis and decision making based on the
    result. This book will explain how to use the Python language to automate common
    business tasks that can be greatly sped up if a computer is doing them.


    Given the expressiveness and ease of use of Python, it''s surprisingly simple
    to start making small programs to perform these actions and combine them into
    more integrated systems. Throughout the book, we will show small, easy-to-follow
    recipes that can be adapted to your specific needs, and we will combine them to
    perform more complex actions. We will perform common actions, such as detecting
    opportunities by scraping the web, analyzing information to generate automatic
    spreadsheet reports with graphs, communicating with automatically generated emails,
    getting notifications via text messages, and learning how to run tasks while your
    mind is focused on other more important stuff.


    Though some Python knowledge is required, the book is written with non-programmers
    in mind, giving clear and instructive recipes that will further the reader''s
    proficiency while being oriented to specific day-to-day goals.'
  merge: -1
  pgno: 507
- img_proc: true
  md: 'Preface


    # Who this book is for


    This book is for Python beginners, not necessarily developers, that want to use
    and expand their knowledge to automate tasks. Most of the examples in the book
    are aimed at marketing, sales, and other non-tech areas. The reader needs to know
    a little of the Python language, including its basic concepts.


    # What this book covers


    Chapter 1, *Let''s Begin Our Automation Journey*, presents some basic content
    that will be used all through the book. It describes how to install and manage
    third-party tools through virtual environments, how to do effective string manipulation,
    how to use command-line arguments, and introduces you to regular expressions and
    other methods of text processing.


    Chapter 2, *Automating Tasks Made Easy*, shows how to prepare and automatically
    run tasks. It covers how to program tasks to be executed when they should, instead
    of running them manually; how to be notified of the result of a task that''s run
    automatically; and how to be notified if there has been an error in an automated
    process.


    Chapter 3, *Building Your First Web Scraping Application*, explores sending web
    requests to communicate with external websites in different formats, such as raw
    HTML content; structured feeds; RESTful APIs; and even automating a browser to
    execute steps without manual intervention. It also covers how to process results
    to extract relevant information.


    Chapter 4, *Searching and Reading Local Files*, explains how to search through
    local files and directories and analyze the information stored there. You will
    learn how to filter through relevant files in different encodings and read files
    in several common formats, such as CSVs, PDFs, Word documents, and even images.


    Chapter 5, *Generating Fantastic Reports*, looks at how to display information
    given in text format in multiple formats. This includes creating templates to
    produce text files, as well as creating richly formatted and properly styled Word
    and PDF documents.


    Chapter 6, *Fun with Spreadsheets*, explores how to read and write spreadsheets
    in the CSV format; in rich Microsoft Excel, including with formatting and charts;
    and in LibreOffice, a free alternative to Microsoft Excel.


    Chapter 7, *Cleaning and Processing Data*, presents techniques to deal with multiple
    sources of information and cleanup of data before processing it. You will learn
    how to batch process to speed up working with big amounts of data, including using
    specific data analysis libraries like Pandas.


    [ vi ]'
  merge: -1
  pgno: 508
- img_proc: true
  md: 'Chapter 8, *Developing Stunning Graphs*, explains how to produce beautiful
    charts, including common examples such as pie, line, and bar charts, as well as
    other advanced cases, such as stacked bars and even maps. It also explains how
    multiple graphs can be combined and styled to generate rich graphics and show
    relevant information in an understandable format.


    Chapter 9, *Dealing with Communication Channels*, explains how to send messages
    in multiple channels, using external tools to do the most of the heavy lifting.
    This chapter goes into sending and receiving emails individually as well as *en
    masse*, communicating through SMS messages, and creating a bot in Telegram.


    Chapter 10, *Why Not Automate Your Marketing Campaign?*, combines the different
    recipes included in the book to generate a full marketing campaign, including
    steps such as detection of opportunity, generation of promotion, communication
    to potential customers, and analyzing and reporting sales produced by promotion.
    This chapter shows how to combine different elements to create powerful systems.


    Chapter 11, *Machine Learning for Automation*, explains how to use the Machine
    Learning APIs from Google for text analysis, detecting a location of an image
    landmark, and extracting text from images. The chapter includes the creation and
    training of a model for detecting, based on text, which department an email should
    be assigned.


    Chapter 12, *Automatic Testing Routines*, explores the write and execute tests
    to verify that code is behaving as expected. To do so, the test framework `pytest`
    is presented with common situations to effectively work with tests.


    Chapter 13, *Debugging Techniques*, features different methods and tips to help
    in the debugging process and ensure the quality of your software. It leverages
    the great introspection capabilities of Python and its out-of-the-box debugging
    tools for fixing problems and producing solid automated software.'
  merge: -1
  pgno: 509
