    # How it works...


    Step 2 and step 3 in the *How to do it...* section set up a simple template and
    add a dictionary with all the data. Then, in *step 4*, those two are combined
    into the specific report.


    > In *step 4*, the dictionary is combined with a template. Notice that the keys
    on the dictionary correspond to the parameters on the template. The trick here
    is to use the double star in the `format` call to unpack the dictionary, passing
    each of the keys as a parameter to `format()`.


    In *step 5*, the resulting report, a string, is stored in a newly created file.
    We use the `with` context manager paired with `open()`, as introduced in previous
    chapters. In this case, we generate a new file to write the data. After closing
    the `with` block, the file is properly closed and the data is stored on the disk.


    > The open modes determine how to open a file, whether it is to read or write,
    and whether the file is in text or binary. The `w` mode opens the file to write
    it, overwriting it if it already exists. Be careful not to delete an existing
    file by mistake!'
