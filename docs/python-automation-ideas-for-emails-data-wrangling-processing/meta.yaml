- md: "## Analyzing text with Google Cloud Natural Language\n\nIn this recipe, we\
    \ will use the Google Cloud interface to evaluate text. This is similar to the\
    \ earlier *Analyzing images with Google Cloud Vision AI* recipe but applied to\
    \ text instead. We will be able to detect the language of a piece of text, as\
    \ well as its general sentiment (how positive or negative it is). We will also\
    \ translate all non-English text into English.\n\n### Getting ready\n\nWe need\
    \ to enable the Google Cloud Natural Language API and create credentials to work\
    \ with it. Most of the process is similar to the process described earlier in\
    \ the chapter to enable the Vision API in a Google Cloud project, so we'll use\
    \ the same project described in the earlier *Analyzing images with Google Cloud\
    \ Vision AI* recipe.\n\nLog into your account to go to the API dashboard at https://console.cloud.google.com/apis.\
    \ Make sure you're using the same project as before, or the `credentials.json`\
    \ file won't work:\n\nClick on **ENABLE APIS AND SERVICES** and search for **Natural\
    \ Language** to enable it:\n\nSearch and enable the **Cloud Translation API**\
    \ as well:\n\nWe need to use the generated service account key in JSON format.\
    \ We will call it `credentials.json` throughout the chapter.\n\nWe will use the\
    \ `google-cloud-language` module. We should install the module, adding it to our\
    \ `requirements.txt` file as follows:\n\n```\n$ echo \"google-cloud-language==1.3.0\"\
    \ >> requirements.txt\n$ echo \"google-cloud-translate==2.0.1\" >> requirements.txt\n\
    $ pip install -r requirements.txt\n```\n\nThe code can be found in the GitHub\
    \ repository, https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter11.\
    \ There are some text examples in the `/texts/` subdirectory, mostly containing\
    \ text from the beginning of classic novels from the 19th century in different\
    \ languages.\n\n### How to do it...\n\n1.  Call the `text_analysis.py` script\
    \ with the start of the novel *Pride and Prejudice* and pass the credentials:\n\
    \n    ```\n    $ GOOGLE_APPLICATION_CREDENTIALS=credentials.json python text_analysis.py\
    \ texts/pride_and_prejudice.txt\n    ```\n\n    Text: It is a truth universally\
    \ acknowledged, that a single man in possession of a good fortune, must be in\
    \ want of a wife. However little known the feelings or views of such a man may\
    \ be on his first entering a neighbourhood, this truth is so well fixed in the\
    \ minds of the surrounding families, that he is considered the rightful property\
    \ of some one or other of their daughters.\n\n    Language: en\n    Sentiment\
    \ Score (how positive the sentiment is): 0.699999988079071\n    Sentiment Magnitude\
    \ (how strong it is): 1.5\n\n2.  Call the `text_analysis.py` script with the start\
    \ of the novel *La Regenta*, in Spanish, and pass the credentials:\n\n    ```\n\
    \    $ GOOGLE_APPLICATION_CREDENTIALS=credentials.json python text_analysis.py\
    \ texts/regenta.txt\n    ```\n\n    Text: La heroica ciudad dormía la siesta.\
    \ El viento Sur, caliente y perezoso, empujaba las nubes blanquecinas que se rasgaban\
    \ al correr hacia el Norte. En las calles no había más ruido que el rumor estridente\
    \ de los remolinos de polvo, trapos, pajas y papeles que iban de arroyo en arroyo,\
    \ de acera en acera, de esquina en esquina revolando y persiguiéndose, como mariposas\
    \ que se buscan y huyen y que el aire envuelve en sus pliegues invisibles. Cual\
    \ turbas de pilluelos, aquellas migajas de la basura, aquellas sobras de todo\
    \ se juntaban en un montón, parábanse como dormidas un momento y brincaban de\
    \ nuevo sobresaltadas, dispersándose, trepando unas por las paredes hasta los\
    \ cristales temblorosos de los faroles, otras hasta los carteles de papel mal\
    \ pegado a las esquinas, y había pluma que llegaba a un tercer piso, y arenilla\
    \ que se incrustaba para días, o para años, en la vidriera de un escaparate, agarrada\
    \ a un plomo.\n\n    Language: es\n    Sentiment Score (how positive the sentiment\
    \ is): 0.0\n    Sentiment Magnitude (how strong it is): 0.8999999761581421\n \
    \   IN ENGLISH\n    The heroic city napped. The south wind, hot and lazy, pushed\
    \ the whitish clouds that ripped as they ran north. In the streets there was no\
    \ more noise than the shrill noise of the swirls of dust, rags, straws and papers\
    \ that went from stream to stream, from sidewalk to sidewalk, from corner to corner\
    \ revoking and chasing each other, like butterflies that seek and flee and that\
    \ the air envelops in its invisible folds. Like mobs of urchins, those crumbs\
    \ from the garbage, those leftovers from everything gathered in a heap, they stood\
    \ as if for a moment asleep and they jumped again with a start, dispersing, some\
    \ climbing the walls to the trembling glass of the lanterns, others to the paper\
    \ posters badly glued to the corners, and there was a pen that reached a third\
    \ floor, and sand that was embedded for days, or for years, in the window of a\
    \ shop window, clinging to a lead.\n\n### How it works...\n\nLet's take a look\
    \ at the `text_analysis.py` script, used in *steps 1 and 2*:\n\n```python\nimport\
    \ argparse\nfrom google.cloud import language\nfrom google.cloud import translate_v2\
    \ as translate\nfrom google.cloud.language import enums\nfrom google.cloud.language\
    \ import types\n\ndef main(image_file):\n    content = image_file.read()\n   \
    \ print(f'Text: {content}')\n    document = types.Document(content=content,\n\
    \                              type=enums.Document.Type.PLAIN_TEXT)\n\n    client\
    \ = language.LanguageServiceClient()\n\n    response = client.analyze_sentiment(document=document)\n\
    \    lang = response.language\n    print(f'Language: {lang}')\n    sentiment =\
    \ response.document_sentiment\n    score = sentiment.score\n    magnitude = sentiment.magnitude\n\
    \    print(f'Sentiment Score (how positive the sentiment is): {score}')\n    print(f'Sentiment\
    \ Magnitude (how strong it is): {magnitude}')\n    if lang != 'en':\n        #\
    \ Translate into English\n        translate_client = translate.Client()\n```\n\
    \n### See also\n\n-   The *Analyzing images with Google Cloud Vision AI* recipe,\
    \ earlier in this chapter, to learn how to create an account for Google Cloud\
    \ interfaces."
  mdcn: "## 使用 Google Cloud Natural Language 分析文本\n\n在本教程中，我们将使用 Google Cloud 界面来评估文本。这与之前*使用\
    \ Google Cloud Vision AI 分析图像*的教程类似，但应用于文本。我们将能够检测一段文本的语言及其整体情感倾向（即其积极或消极的程度）。我们还将把所有非英文文本翻译成英文。\n\
    \n### 准备工作\n\n我们需要启用 Google Cloud Natural Language API 并创建用于访问它的凭据。大部分过程与本章前面描述的在\
    \ Google Cloud 项目中启用 Vision API 的过程相似，因此我们将使用之前*使用 Google Cloud Vision AI 分析图像*教程中描述的同一个项目。\n\
    \n登录您的账户，前往 API 控制台 https://console.cloud.google.com/apis。确保您使用的是与之前相同的项目，否则 `credentials.json`\
    \ 文件将无法工作：\n\n点击 **ENABLE APIS AND SERVICES** 并搜索 **Natural Language** 以启用它：\n\
    \n同样，搜索并启用 **Cloud Translation API**：\n\n我们需要使用生成的 JSON 格式的服务账户密钥。在本章中，我们将其称为\
    \ `credentials.json`。\n\n我们将使用 `google-cloud-language` 模块。我们应该安装该模块，将其添加到我们的 `requirements.txt`\
    \ 文件中，如下所示：\n\n```\n$ echo \"google-cloud-language==1.3.0\" >> requirements.txt\n\
    $ echo \"google-cloud-translate==2.0.1\" >> requirements.txt\n$ pip install -r\
    \ requirements.txt\n```\n\n代码可以在 GitHub 仓库中找到，https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter11。在\
    \ `/texts/` 子目录中有一些文本示例，主要包含19世纪经典小说开头的不同语言文本。\n\n### 操作步骤...\n\n1.  使用小说《傲慢与偏见》的开头调用\
    \ `text_analysis.py` 脚本，并传递凭据：\n\n    ```\n    $ GOOGLE_APPLICATION_CREDENTIALS=credentials.json\
    \ python text_analysis.py texts/pride_and_prejudice.txt\n    ```\n\n    文本：It\
    \ is a truth universally acknowledged, that a single man in possession of a good\
    \ fortune, must be in want of a wife. However little known the feelings or views\
    \ of such a man may be on his first entering a neighbourhood, this truth is so\
    \ well fixed in the minds of the surrounding families, that he is considered the\
    \ rightful property of some one or other of their daughters.\n\n    语言：en\n  \
    \  情感得分（情感的积极程度）：0.699999988079071\n    情感强度（情感的强烈程度）：1.5\n\n2.  使用西班牙语小说《女执政官》的开头调用\
    \ `text_analysis.py` 脚本，并传递凭据：\n\n    ```\n    $ GOOGLE_APPLICATION_CREDENTIALS=credentials.json\
    \ python text_analysis.py texts/regenta.txt\n    ```\n\n    文本：La heroica ciudad\
    \ dormía la siesta. El viento Sur, caliente y perezoso, empujaba las nubes blanquecinas\
    \ que se rasgaban al correr hacia el Norte. En las calles no había más ruido que\
    \ el rumor estridente de los remolinos de polvo, trapos, pajas y papeles que iban\
    \ de arroyo en arroyo, de acera en acera, de esquina en esquina revolando y persiguiéndose,\
    \ como mariposas que se buscan y huyen y que el aire envuelve en sus pliegues\
    \ invisibles. Cual turbas de pilluelos, aquellas migajas de la basura, aquellas\
    \ sobras de todo se juntaban en un montón, parábanse como dormidas un momento\
    \ y brincaban de nuevo sobresaltadas, dispersándose, trepando unas por las paredes\
    \ hasta los cristales temblorosos de los faroles, otras hasta los carteles de\
    \ papel mal pegado a las esquinas, y había pluma que llegaba a un tercer piso,\
    \ y arenilla que se incrustaba para días, o para años, en la vidriera de un escaparate,\
    \ agarrada a un plomo.\n\n    语言：es\n    情感得分（情感的积极程度）：0.0\n    情感强度（情感的强烈程度）：0.8999999761581421\n\
    \    英文翻译\n    The heroic city napped. The south wind, hot and lazy, pushed the\
    \ whitish clouds that ripped as they ran north. In the streets there was no more\
    \ noise than the shrill noise of the swirls of dust, rags, straws and papers that\
    \ went from stream to stream, from sidewalk to sidewalk, from corner to corner\
    \ revoking and chasing each other, like butterflies that seek and flee and that\
    \ the air envelops in its invisible folds. Like mobs of urchins, those crumbs\
    \ from the garbage, those leftovers from everything gathered in a heap, they stood\
    \ as if for a moment asleep and they jumped again with a start, dispersing, some\
    \ climbing the walls to the trembling glass of the lanterns, others to the paper\
    \ posters badly glued to the corners, and there was a pen that reached a third\
    \ floor, and sand that was embedded for days, or for years, in the window of a\
    \ shop window, clinging to a lead.\n\n### 工作原理...\n\n让我们看一下在*步骤 1 和 2*中使用的 `text_analysis.py`\
    \ 脚本：\n\n```python\nimport argparse\nfrom google.cloud import language\nfrom google.cloud\
    \ import translate_v2 as translate\nfrom google.cloud.language import enums\n\
    from google.cloud.language import types\n\ndef main(image_file):\n    content\
    \ = image_file.read()\n    print(f'Text: {content}')\n    document = types.Document(content=content,\n\
    \                              type=enums.Document.Type.PLAIN_TEXT)\n\n    client\
    \ = language.LanguageServiceClient()\n\n    response = client.analyze_sentiment(document=document)\n\
    \    lang = response.language\n    print(f'Language: {lang}')\n    sentiment =\
    \ response.document_sentiment\n    score = sentiment.score\n    magnitude = sentiment.magnitude\n\
    \    print(f'Sentiment Score (how positive the sentiment is): {score}')\n    print(f'Sentiment\
    \ Magnitude (how strong it is): {magnitude}')\n    if lang != 'en':\n        #\
    \ Translate into English\n        translate_client = translate.Client()\n```\n\
    \n### 另请参阅\n\n-   本章前面的*使用 Google Cloud Vision AI 分析图像*教程，了解如何为 Google Cloud 界面创建账户。"
