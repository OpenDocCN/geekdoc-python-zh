  md: "Cleaning and Processing Data\n\nThe next step is to create a `future` for each\
    \ filename. The `future` is an object that references the call that will be executed\
    \ in the background by the executor. When it's done, the `future` object will\
    \ store the result.\n\n> You can think of a `future` object as a ticket for a\
    \ valet car cleaning. You submit the task, get a ticket, and can go do other things.\
    \ When you're done, you hand back the ticket and may need to wait until it's finished,\
    \ if there's still some work pending.\n\nThe last step is to wait until all futures\
    \ are completed by calling `concurrent.futures.wait`. Note that there's no result\
    \ to check for the futures in this specific example.\n\nWe introduced futures\
    \ and executors in the *Speeding up web scraping* recipe in *Chapter 3, Building\
    \ Your First Web Scraping Application*. In that recipe, we used a thread-based\
