- md: "## Why Not Automate Your Marketing Campaign?\n\nAnother possibility is to increase\
    \ the complexity of the match. In this recipe, the check is done with a simple\
    \ `in` operator. Remember that all the techniques in *Chapter 1, Let's Begin Our\
    \ Automation Journey*, are available for you to use, including all the regular\
    \ expression's capabilities.\n\n> This script is automatable through a cron job,\
    \ as described in *Chapter 2, Automating Tasks Made Easy*. Try to run it every\
    \ week!\n\n## See also\n\n- The *Adding command-line arguments* recipe in *Chapter\
    \ 1, Let's Begin Our Automation Journey*, to learn the details about the command-line\
    \ arguments.\n- The *Introducing regular expressions* recipe in *Chapter 1, Let's\
    \ Begin Our Automation Journey*, to learn about how to use regular expressions.\n\
    - The *Preparing a task* recipe in *Chapter 2, Automating Tasks Made Easy*, to\
    \ check the structure for a good automated task.\n- The *Setting up a cron job*\
    \ recipe in *Chapter 2, Automating Tasks Made Easy*, to learn how to repeat a\
    \ job automatically.\n- The *Parsing HTML* recipe in *Chapter 3, Building Your\
    \ First Web Scraping Application*, to learn how to parse returned HTML.\n- The\
    \ *Crawling the web* recipe in *Chapter 3, Building Your First Web Scraping Application*,\
    \ to learn how to follow up links when retrieving information on the web.\n- The\
    \ *Subscribing to feeds* recipe in *Chapter 3, Building Your First Web Scraping\
    \ Application*, to learn the basics about dealing with RSS feeds.\n- The *Sending\
    \ an individual email* recipe in *Chapter 9, Dealing with Communication Channels*,\
    \ to learn how to send emails using Python.\n\n## Creating personalized coupon\
    \ codes\n\nIn this chapter, we are presenting a marketing campaign divided into\
    \ several tasks:\n\n1. Detect the best moment to launch the campaign\n2. **Generate\
    \ individual codes to be sent to potential customers**\n3. Send the codes directly\
    \ to users over their preferred channel, text message or email\n4. Collect the\
    \ results of the campaign\n5. Generate a sales report with an analysis of the\
    \ results\n\nThis recipe shows *task 2* of the campaign.\n\nAfter an opportunity\
    \ has been detected, we decide to generate a campaign for all customers. To direct\
    \ promotions and avoid duplication, we will generate 1 million unique coupons,\
    \ divided into three batches:\n\n- Half of the codes will be printed and distributed\
    \ in a marketing action.\n- 300,000 codes will be reserved to be used later if\
    \ the campaign hits some goals.\n- The remaining 200,000 will be directed to customers\
    \ through SMS and emails.\n\nThese coupons can be redeemed in the online system.\
    \ Our task will be to generate the proper codes, which should meet the following\
    \ requirements:\n\n- The codes need to be unique.\n- The codes need to be printable\
    \ and easy to read, as some customers will be dictating them over the phone.\n\
    - There should be a quick way to discard fake codes. This will avoid attacks with\
    \ random codes that could overload the system.\n- The codes should be presented\
    \ in CSV format for printing.\n\n## Getting ready\n\nDownload the `create_personalised_coupons.py`\
    \ script, which will generate the coupons in CSV files, from GitHub at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter10/create_personalised_coupons.py.\n\
    \n## How to do it...\n\n1. Call the `create_personalised_coupons.py` script. It\
    \ will take a minute or two to run, depending on your processor speed. It will\
    \ display the generated codes onscreen:\n\n```\n$ python create_personalised_coupons.py\n\
    Code: HWLF-P9J9E-U3\nCode: EAUE-FRCWR-WM\nCode: PMW7-P39MP-KT\n...\n```\n\n2.\
    \ Check it has created three CSV files, `codes_batch_1.csv`, `codes_batch_2.csv`,\
    \ and `codes_batch_3.csv`, each with the proper number of codes:\n\n```\n$ wc\
    \ -l codes_batch_*.csv\n500000 codes_batch_1.csv\n300000 codes_batch_2.csv\n200000\
    \ codes_batch_3.csv\n1000000 total\n```\n\n3. Check that each of the batch files\
    \ contains unique codes. Your codes will be unique and different from the ones\
    \ displayed here:\n\n```\n$ head codes_batch_2.csv\n9J9F-M33YH-YR\n7WLP-LTJUP-PV\n\
    WHFU-THW7R-T9\n...\n```\n\n## How it works...\n\nStep 1 calls the script that\
    \ generates all the codes, and step 2 checks that the results are correct. Step\
    \ 3 shows the format in which the codes are stored. Let's analyze the `create_personalised_coupons.py`\
    \ script.\n\nIn summary, it has the following structure:\n\n```\n# IMPORTS\n...\n\
    # FUNCTIONS\ndef random_code(digits)\n    ...\ndef checksum(code1, code2)\n  \
    \  ...\ndef check_code(code)\n    ...\ndef generate_code()\n    ...\n# SET UP\
    \ TASK\n...\n# GENERATE CODES\n...\n# CREATE AND SAVE BATCHES\n...\n```\n\nThe\
    \ different functions work together to create a code. `random_code` generates\
    \ a combination of random letters and numbers, taken from `CHARACTERS`. This string\
    \ contains all the valid characters to choose from.\n\n> The selection of characters\
    \ is defined as symbols that are easy to print and cannot be mistaken for each\
    \ other. For example, it will be difficult to distinguish between a letter O and\
    \ the number 0, or the number 1 and the letter I, depending on the font. This\
    \ may depend on the specifics of the typeface and the printing process, so check\
    \ printing tests if necessary to adjust the characters. But avoid using all letters\
    \ and numbers in printing form, as it may cause confusion. Increase the length\
    \ of the codes if necessary; for example, if many more codes are required or if\
    \ the number of easily recognizable symbols is smaller.\n\nThe `checksum` function\
    \ generates, based on two codes, an extra digit that is derived from the two codes.\
    \ This process is called **hashing**, and it's a well-known process in computing,\
    \ especially for cryptography.\n\n> The basic functionality of hashing is to produce\
    \ an output from an input that is smaller and is not reversible, meaning it's\
    \ very difficult to guess unless the input is known. Hashing has a lot of common\
    \ applications in computing, normally under the hood. For example, Python dictionaries\
    \ make extensive use of hashing.\n\nIn our recipe, we'll use SHA256, a well-known\
    \ fast hashing algorithm included in the Python `hashlib` module:\n\n```\ndef\
    \ checksum(code1, code2):\n    m = hashlib.sha256()\n    m.update(code1.encode())\n\
    \    m.update(code2.encode())\n    checksum = int(m.hexdigest()[:2], base=16)\n\
    \    digit = CHARACTERS[checksum % len(CHARACTERS)]\n    return digit\n```\n\n\
    Both codes are concatenated as input, and the resulting two hex digits of the\
    \ resulting hash string are used to pick the corresponding character from `CHARACTERS`.\n\
    \nThe hash digits get transformed into a base 10 number (as they are in base 16)\
    \ and we apply the `modulo` operator to obtain one of the available characters.\n\
    \nThe objective of this checksum is to be able to quickly check whether a code\
    \ looks like it is correct and discard possible spam. We can produce the operation\
    \ again over a code to see whether the checksum is the same. Note that this is\
    \ not a cryptographic hash, as no secret is required at any point of the operation.\
    \ Given this specific use case, this (low) level of security is probably fine\
    \ for our purposes.\n\n> Cryptography is a much bigger theme and ensuring that\
    \ security is strong can be difficult. The main strategy in cryptography involving\
    \ hashing is probably to store just the hash to avoid storing passwords in a readable\
    \ format. You can read a quick introduction to that technique here: https://crackstation.net/hashing-security.htm.\n\
    \nThe `generate_code` function then produces a random code, composed of four digits,\
    \ then five digits, and then two digits of the checksum, divided by dashes. The\
    \ first checksum digit is generated with the first nine digits in right-to-left\
    \ order (using the four-character block as `code1` and the five-character block\
    \ as `code2`). The second checksum digit is generated by reversing them (the five-character\
    \ block as `code1` and the four-character block as `code2`).\n\nThe `check_code`\
    \ function reverses the process and returns `True` if the code is correct, and\
    \ `False` otherwise.\n\nWith the basic elements in place, the script starts by\
    \ defining the required batches: 500,000, 300,000, and 200,000.\n\nAll the codes\
    \ are generated in the same pool, called `codes`. This is to avoid duplicates\
    \ between batches. Note that, due to the randomness of the process, we can't rule\
    \ out the possibility of generating duplicated code, though such a possibility\
    \ is small. We are allowed to retry up to three times to avoid generating duplicated\
    \ code. The codes are stored in a set accumulator to guarantee their uniqueness\
    \ and to speed up the process of checking whether a code is already there.\n\n\
    > Sets is another of the places where Python uses hashing under the hood, so it\
    \ hashes the element to be added and compares it with the hashes of the elements\
    \ already there. This makes checking in sets a very quick operation."
  mdcn: "## 为何不自动化你的营销活动？\n\n另一种可能性是增加匹配的复杂性。在本配方中，检查是通过简单的 `in` 运算符完成的。请记住，*第1章，开启自动化之旅*\
    \ 中的所有技术都可以供你使用，包括所有正则表达式的功能。\n\n> 此脚本可以通过 cron 作业实现自动化，如 *第2章，轻松实现任务自动化* 中所述。尝试每周运行一次！\n\
    \n## 另请参阅\n\n- *第1章，开启自动化之旅* 中的 *添加命令行参数* 配方，了解命令行参数的详细信息。\n- *第1章，开启自动化之旅* 中的\
    \ *介绍正则表达式* 配方，了解如何使用正则表达式。\n- *第2章，轻松实现任务自动化* 中的 *准备任务* 配方，检查良好自动化任务的结构。\n- *第2章，轻松实现任务自动化*\
    \ 中的 *设置 cron 作业* 配方，了解如何自动重复执行任务。\n- *第3章，构建你的第一个网页抓取应用* 中的 *解析 HTML* 配方，了解如何解析返回的\
    \ HTML。\n- *第3章，构建你的第一个网页抓取应用* 中的 *网络爬取* 配方，了解在检索网络信息时如何跟踪链接。\n- *第3章，构建你的第一个网页抓取应用*\
    \ 中的 *订阅源* 配方，了解处理 RSS 源的基础知识。\n- *第9章，处理通信渠道* 中的 *发送个人电子邮件* 配方，了解如何使用 Python\
    \ 发送电子邮件。\n\n## 创建个性化优惠券代码\n\n在本章中，我们将介绍一个分为多个任务的营销活动：\n\n1. 检测启动活动的最佳时机\n2. **生成将发送给潜在客户的个人代码**\n\
    3. 通过用户偏好的渠道（短信或电子邮件）直接将代码发送给用户\n4. 收集活动结果\n5. 生成包含结果分析的销售报告\n\n本配方展示了活动的 *任务2*。\n\
    \n在检测到机会后，我们决定为所有客户生成一个活动。为了定向推广并避免重复，我们将生成100万个唯一优惠券，分为三批：\n\n- 一半的代码将被打印并在营销活动中分发。\n\
    - 300,000个代码将被保留，以便在活动达到某些目标后使用。\n- 剩余的200,000个将通过短信和电子邮件定向发送给客户。\n\n这些优惠券可以在在线系统中兑换。我们的任务是生成合适的代码，这些代码应满足以下要求：\n\
    \n- 代码需要是唯一的。\n- 代码需要可打印且易于阅读，因为有些客户可能会通过电话口述它们。\n- 应有一种快速的方法来丢弃伪造的代码。这将避免使用随机代码进行攻击，从而可能导致系统过载。\n\
    - 代码应以 CSV 格式呈现以便打印。\n\n## 准备工作\n\n从 GitHub 下载 `create_personalised_coupons.py`\
    \ 脚本，该脚本将在 CSV 文件中生成优惠券，地址为 https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter10/create_personalised_coupons.py。\n\
    \n## 如何操作...\n\n1. 调用 `create_personalised_coupons.py` 脚本。根据你的处理器速度，运行需要一两分钟。它将在屏幕上显示生成的代码：\n\
    \n```\n$ python create_personalised_coupons.py\nCode: HWLF-P9J9E-U3\nCode: EAUE-FRCWR-WM\n\
    Code: PMW7-P39MP-KT\n...\n```\n\n2. 检查它是否创建了三个 CSV 文件：`codes_batch_1.csv`、`codes_batch_2.csv`\
    \ 和 `codes_batch_3.csv`，每个文件包含适当数量的代码：\n\n```\n$ wc -l codes_batch_*.csv\n500000\
    \ codes_batch_1.csv\n300000 codes_batch_2.csv\n200000 codes_batch_3.csv\n1000000\
    \ total\n```\n\n3. 检查每个批次文件是否包含唯一的代码。你的代码将是唯一的，并且与这里显示的代码不同：\n\n```\n$ head codes_batch_2.csv\n\
    9J9F-M33YH-YR\n7WLP-LTJUP-PV\nWHFU-THW7R-T9\n...\n```\n\n## 工作原理...\n\n步骤1调用生成所有代码的脚本，步骤2检查结果是否正确。步骤3显示了代码的存储格式。让我们分析一下\
    \ `create_personalised_coupons.py` 脚本。\n\n总结来说，它具有以下结构：\n\n```\n# IMPORTS\n...\n\
    # FUNCTIONS\ndef random_code(digits)\n    ...\ndef checksum(code1, code2)\n  \
    \  ...\ndef check_code(code)\n    ...\ndef generate_code()\n    ...\n# SET UP\
    \ TASK\n...\n# GENERATE CODES\n...\n# CREATE AND SAVE BATCHES\n...\n```\n\n不同的函数协同工作以创建一个代码。`random_code`\
    \ 从 `CHARACTERS` 中生成随机字母和数字的组合。该字符串包含所有可供选择的有效字符。\n\n> 字符的选择被定义为易于打印且彼此不易混淆的符号。例如，根据字体的不同，字母\
    \ O 和数字 0，或者数字 1 和字母 I 可能难以区分。这可能取决于字体和印刷工艺的具体情况，因此如有必要，请检查印刷测试以调整字符。但避免在印刷形式中使用所有字母和数字，因为这可能会引起混淆。如有必要，请增加代码的长度；例如，如果需要更多代码，或者可识别符号的数量较少。\n\
    \n`checksum` 函数基于两个代码生成一个额外的数字，该数字是从两个代码派生出来的。这个过程被称为 **哈希**，它是计算中一个众所周知的过程，尤其是在密码学中。\n\
    \n> 哈希的基本功能是从一个输入产生一个更小且不可逆的输出，这意味着除非知道输入，否则很难猜测。哈希在计算中有很多常见的应用，通常在底层。例如，Python\
    \ 字典广泛使用哈希。\n\n在我们的配方中，我们将使用 SHA256，这是 Python `hashlib` 模块中包含的一个著名的快速哈希算法：\n\n\
    ```\ndef checksum(code1, code2):\n    m = hashlib.sha256()\n    m.update(code1.encode())\n\
    \    m.update(code2.encode())\n    checksum = int(m.hexdigest()[:2], base=16)\n\
    \    digit = CHARACTERS[checksum % len(CHARACTERS)]\n    return digit\n```\n\n\
    两个代码被连接作为输入，生成的哈希字符串的两个十六进制数字用于从 `CHARACTERS` 中选择相应的字符。\n\n哈希数字被转换为基数为 10 的数字（因为它们是基数为\
    \ 16 的），我们应用 `modulo` 运算符来获取一个可用的字符。\n\n这个校验和的目标是能够快速检查一个代码是否看起来正确，并丢弃可能的垃圾信息。我们可以对一个代码再次执行该操作，以查看校验和是否相同。请注意，这不是一个加密哈希，因为在操作的任何阶段都不需要密钥。鉴于这个特定的用例，这种（低）安全级别可能对我们的目的来说已经足够了。\n\
    \n> 密码学是一个更大的主题，确保安全性很强可能很困难。密码学中涉及哈希的主要策略可能是只存储哈希值，以避免以可读格式存储密码。你可以在这里阅读关于该技术的快速介绍：https://crackstation.net/hashing-security.htm。\n\
    \n`generate_code` 函数然后生成一个随机代码，由四位数字、五位数字和两位校验和数字组成，用破折号分隔。第一个校验和数字是按从右到左的顺序使用前九位数字生成的（使用四位字符块作为\
    \ `code1`，五位字符块作为 `code2`）。第二个校验和数字是通过反转它们生成的（五位字符块作为 `code1`，四位字符块作为 `code2`）。\n\
    \n`check_code` 函数反转该过程，如果代码正确则返回 `True`，否则返回 `False`。\n\n有了基本元素，脚本首先定义所需的批次：500,000、300,000\
    \ 和 200,000。\n\n所有代码都在同一个池中生成，称为 `codes`。这是为了避免批次之间的重复。请注意，由于过程的随机性，我们不能排除生成重复代码的可能性，尽管这种可能性很小。我们被允许最多重试三次以避免生成重复代码。代码存储在一个集合累加器中，以保证其唯一性并加快检查代码是否已存在的过程。\n\
    \n> 集合是 Python 在底层使用哈希的另一个地方，因此它对要添加的元素进行哈希，并将其与已存在元素的哈希进行比较。这使得在集合中的检查成为一个非常快速的操作。"
