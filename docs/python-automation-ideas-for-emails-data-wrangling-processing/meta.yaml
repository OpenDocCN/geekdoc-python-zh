    - The *Reading text files* recipe, earlier in this chapter, to learn more about
    opening and reading files.


    # Reading log files


    Another common structured text file format is **log files**. Log files consist
    of rows of logs, which are a line of text with a particular format, describing
    an event.


    > Logs are structured only in the same file or type of file. Formats can be very
    different and there''s no common structure or syntax for them. Each application
    can and will use a different format.


    Typically, each one will have a time when the event occurred, so the file is an
    ordered collection of them.


    # Getting ready


    The example_log.log file containing five sales logs can be obtained from the GitHub
    repository here: https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter04/documents/example_logs.log.


    The format is:


    ```

    [<Timestamp in iso format>] - SALE - PRODUCT: <product id> - PRICE: $<price of
    the sale>

    ```


    We''ll use the Chapter01/price_log.py file to process each log into an object.
    There''s a copy in the Chapter04/documents directory to simplify the import process.'
- md: "## Searching and Reading Local Files\n\n## How to do it...\n\n1. Import PriceLog:\n\
    \    ```python\n    >>> from price_log import PriceLog\n    ```\n2. Open the log\
    \ file and parse all logs:\n    ```python\n    >>> with open('example_logs.log')\
    \ as file:\n    ...     logs = [PriceLog.parse(log) for log in file]\n    ...\n\
    \    >>> len(logs)\n    5\n    >>> logs[0]\n    <PriceLog (Delorean(datetime=datetime.datetime(2018,\
    \ 6, 17, 22, 11, 50, 268396), timezone='UTC'), 1489, 9.99)>\n    ```\n3. Determine\
    \ the total income by all sales:\n    ```python\n    >>> total = sum(log.price\
    \ for log in logs)\n    >>> total\n    Decimal('47.82')\n    ```\n4. Determine\
    \ how many units have been sold of each product_id:\n    ```python\n    >>> from\
    \ collections import Counter\n    >>> counter = Counter(log.product_id for log\
    \ in logs)\n    >>> counter\n    Counter({1489: 2, 4508: 1, 8597: 1, 3086: 1})\n\
    \    ```\n5. Filter the logs to find all occurrences of selling product ID 1489:\n\
    \    ```python\n    >>> logs = [log for log in logs if log.product_id == 1489]\n\
    \    >>> len(logs)\n    2\n    >>> logs[0].product_id, logs[0].timestamp\n   \
    \ (1489, Delorean(datetime=datetime.datetime(2018, 6, 17, 22, 11, 50, 268396),\
    \ timezone='UTC'))\n    >>> logs[1].product_id, logs[1].timestamp\n    (1489,\
    \ Delorean(datetime=datetime.datetime(2018, 6, 17, 22, 11, 50, 268468), timezone='UTC'))\n\
    \    ```\n\n## How it works...\n\nAs each entry is a single line, we open the\
    \ file and go one by one, parsing each of them. The parsing code is available\
    \ in `price_log.py`. Check it for more details on the parsing process.\n\nIn *step\
    \ 2* in the *How to do it...* section, we open the file and process each of the\
    \ lines to create a log list with all our processed logs. Then, we can produce\
    \ aggregation operations, as in the next steps.\n\n*Step 3* shows how to aggregate\
    \ all values. In this case, summing the price of all items sold over the log file\
    \ to get the total revenue.\n\n*Step 4* uses `Counter` to determine the amount\
    \ of each item in the file log. This returns a dictionary-like object with the\
    \ values to count and the number of times they appear.\n\nFiltering can also be\
    \ done in a line-by-line approach, as shown in *step 5*. This is similar to the\
    \ other filtering we've done in the recipes of this chapter.\n\n## There's more...\n\
    \nRemember that you can stop processing a file as soon as you have all the data\
    \ you need. This may be a good strategy if the file is very big, as is usually\
    \ the case with log files.\n\n`Counter` is a great tool to quickly count a list.\
    \ See the Python documentation here for more details: `https://docs.python.org/3/library/collections.html#counter-objects`.\
    \ You can get the ordered items by calling the following:\n\n```python\n>>> counter.most_common()\n\
    [(1489, 2), (4508, 1), (8597, 1), (3086, 1)]\n```\n\n## See also\n\n- The *Using\
    \ a third-party tool—parse* recipe in *Chapter 1, Let's Begin Our Automation Journey*.\n\
    - The *Reading text files* recipe, earlier in this chapter, to learn more about\
    \ opening and reading files.\n\n## Searching and Reading Local Files\n\n## Reading\
    \ file metadata\n\nFile metadata is everything associated with a particular file\
    \ that is not the data content itself. The most obvious is the file name, but\
    \ there are more parameters available such as the size of the file, the creation\
    \ date, or its permissions.\n\nBrowsing through that data is important, for example,\
    \ to filter files older than a date, or to find all files bigger than a value\
    \ in KBs. In this recipe, we'll see how to access the file metadata in Python.\n\
    \n## Getting ready\n\nWe'll use the `zen_of_python.txt` file, available in the\
    \ GitHub repository (https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter04/documents/zen_of_python.txt).\
    \ As you can see, by using the `ls` command, the file is 856 bytes, and, in this\
    \ example, it was created on June 14:\n\n```\n$ ls -lrt zen_of_python.txt\n-rw-r--r--@\
    \ 1 jaime staff 856 14 Jun 21:22 zen_of_python.txt\n```\n\nOn your computer, the\
    \ dates may vary, based on when you downloaded the code.\n\n## How to do it...\n\
    \n1. Import `os` and `datetime`:\n    ```python\n    >>> import os\n    >>> from\
    \ datetime import datetime\n    ```\n2. Retrieve the stats of the `zen_of_python.txt`\
    \ file:\n    ```python\n    >>> stats = os.stat(('zen_of_python.txt'))\n    >>>\
    \ stats\n    os.stat_result(st_mode=33188, st_ino=15822537, st_dev=16777224, st_nlink=1,\
    \ st_uid=501, st_gid=20, st_size=856, st_atime=1529461935, st_mtime=1529007749,\
    \ st_ctime=1529007757)\n    ```\n3. Get the size of the file, in bytes:\n    ```python\n\
    \    >>> stats.st_size\n    856\n    ```\n4. Obtain when the file was last modified:\n\
    \    ```python\n    >>> datetime.fromtimestamp(stats.st_mtime)\n    datetime.datetime(2018,\
    \ 6, 14, 21, 22, 29)\n    ```\n5. Obtain when the file was last accessed:\n  \
    \  ```python\n    >>> datetime.fromtimestamp(stats.st_atime)\n    datetime.datetime(2018,\
    \ 6, 20, 3, 32, 15)\n    ```\n\n## How it works...\n\n`os.stats` returns a stats\
    \ object that represents the metadata stored in the filesystem. The metadata includes:\n\
    \n- The size of the file, in bytes, as shown in step 3 in the *How to do it...*\
    \ section, using `st_size`.\n- When the file content was last modified, as shown\
    \ in step 4, using `st_mtime`.\n- When the file was last read (accessed), as shown\
    \ in step 5, using `st_atime`.\n\nThe times are returned as timestamps, so in\
    \ step 4 and step 5, we create a datetime object from the timestamps to better\
    \ access the data.\n\nAll these values can be used to filter the files and access\
    \ the meaningful ones.\n\n> Notice you don't need to open the file with `open()`\
    \ to read its metadata. Detecting whether a file has been changed after a known\
    \ time by reading the modification time will be quicker than comparing its content,\
    \ so you can take advantage of that for comparison.\n\n## There's more...\n\n\
    To obtain the stats one by one, there are also convenience functions available\
    \ in `os.path`, which follow the pattern `get<value>`:\n\n```python\n>>> os.path.getsize('zen_of_python.txt')\n\
    856\n>>> os.path.getmtime('zen_of_python.txt')\n1529531584.0\n>>> os.path.getatime('zen_of_python.txt')\n\
    1529531669.0\n```\n\nThe value is specified in the UNIX timestamp format (seconds\
    \ since January 1, 1970).\n\n## Searching and Reading Local Files\n\n> Note that\
    \ calling all of these three functions will be slower than making a single call\
    \ to `os.stats` and processing the results. Also, returned `stats` can be inspected\
    \ to detect the available metadata.\n\nThe values described in this recipe are\
    \ available for all filesystems, but there are more values that can be used, depending\
    \ on the particular platform.\n\nFor example, to obtain the creation date of a\
    \ file, you can use the `st_birthtime` parameter for macOS or `st_mtime` in Windows.\n\
    \n> `st_mtime` is always available, but its meaning changes between systems. In\
    \ Unix systems, it will change when the content is modified, so it's not a reliable\
    \ time of creation.\n\n`os.stat` will follow symbolic links. If you want to get\
    \ the stats of a symbolic link, use `os.lstat()`.\n\nYou can check the full documentation\
    \ about all available stats here: https://docs.python.org/3/library/os.html -\
    \ os.stat_result.\n\n## See also\n\n- The *Reading text files* recipe, earlier\
    \ in this chapter, to learn the basics of opening and reading files.\n- The *Reading\
    \ images* recipe, later in this chapter, to learn how to read and treat image\
    \ files.\n\n## Reading images\n\nProbably the most common data that is not text\
    \ is image data. Images have their own set of specific metadata that can be read\
    \ to filter values or perform other operations.\n\nThe main challenge is dealing\
    \ with multiple formats and different metadata definitions. We'll show in this\
    \ recipe how to get information from both a JPEG and a PNG, and how the same information\
    \ can be encoded differently.\n\n## Getting ready\n\nThe best general toolkit\
    \ for dealing with images in Python is, arguably, Pillow. This library allows\
    \ you to easily read files in the most common formats, as well as perform operations\
    \ on them. Pillow started as a fork of PIL (Python Imaging Library), a previous\
    \ module that became stagnant some years ago.\n\nWe will also use the `xmltodict`\
    \ module to transform some data from XML into a more convenient dictionary. We\
    \ will add both modules to `requirements.txt` and reinstall them in the virtual\
    \ environment:\n\n```\n$ echo \"Pillow==7.0.0\" >> requirements.txt\n$ echo \"\
    xmltodict==0.12.0\" >> requirements.txt\n$ pip install -r requirements.txt\n```\n\
    \nThe metadata information in photo files is defined in the EXIF (Exchangeable\
    \ Image File) format. EXIF is a standard for storing information about pictures,\
    \ including things like what camera took the picture, when it was taken, GPS describing\
    \ the location, exposure, focal length, color info, and so on.\n\n> You can get\
    \ a good summary here: https://www.slrphotographyguide.com/what-is-exif-metadata/.\
    \ All the information is optional, but virtually all digital cameras and processing\
    \ software will store some data. Because of the privacy concerns, parts of it,\
    \ like the exact location, can be disabled.\n\nThe following images will be used\
    \ for this recipe, and are available to download in the GitHub repository (https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter04/images):\n\
    \n- photo-dublin-a1.jpg\n- photo-dublin-a2.png\n- photo-dublin-b.png\n\nTwo of\
    \ them, `photo-dublin-a1.jpg` and `photo-dublin-a2.png`, are the same scene, but\
    \ while the first is the untouched picture, the second one has been retouched\
    \ to slightly change the colors, and has also been scaled. Notice one is in JPEG\
    \ format and the other in PNG. The other one, `photo-dublin-b.png`, is a different\
    \ picture. Both pictures were taken in Dublin, with the same phone camera, on\
    \ two different days."
