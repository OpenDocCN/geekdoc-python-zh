  md: "The `os.path` module has other interesting functions. We talked about `.join()`,\
    \ but other included utilities are:\n\n+   - `os.path.abspath()`, which returns\
    \ the absolute path of a file.\n- `os.path.split()`, which splits the path between\
    \ directory and file:\n  python\n  >>> os.path.split('/a/very/long/path/file.txt')\n\
    \  ('/a/very/long/path', 'file.txt')\n  \n- `os.path.exists()`, to return whether\
    \ a file exists or not on the filesystem.\n\nThe full documentation about `os.path`\
    \ can be found here: https://docs.python.org/3/library/os.path.html. Another module,\
    \ `pathlib`, can be used for higher-level access, in an object-oriented way: https://docs.python.org/3/library/pathlib.html.\n\
    \nAs demonstrated in *step 4*, multiple ways of filtering can be used. All of\
    \ the string manipulations and tips shown in *Chapter 1, Let's Begin Our Automation\
    \ Journey*, are available.\n\n# See also\n\n+   - The *Introducing regular expressions*\
    \ recipe in *Chapter 1, Let's Begin Our Automation Journey*, to learn how to filter\
    \ using regular expressions.\n- The *Reading text files* recipe, later in this\
    \ chapter, to open the found files and read their context.\n\n# Reading text files\n\
    \nAfter searching for a particular file, the next typical action is to open it\
    \ and read its content. Text files are very simple yet very powerful files. They\
    \ store data in plain text, without complicated binary formats.\n\nText file support\
