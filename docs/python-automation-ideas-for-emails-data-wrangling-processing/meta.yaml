    \nThe source of the information can be found at [http://www.mrob.com/pub/film-video/topadj.html](http://www.mrob.com/pub/film-video/topadj.html).\n\
    \n## How to do it...\n\n1. Import the openpyxl module:\n   ```python\n   >>> import\
    \ openpyxl\n   ```\n\n2. Load the file into memory:\n   ```python\n   >>> xlsfile\
    \ = openpyxl.load_workbook('movies.xlsx')\n   ```\n\n3. List all sheets and get\
