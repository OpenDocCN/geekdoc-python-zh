    \ (Delorean(datetime=datetime.datetime(2018, 6, 17, 22, 11, 50, 268396), timezone='UTC'),\
    \ 1489, 9.99)>\n    ```\n3. 计算所有销售的总收入：\n    ```python\n    >>> total = sum(log.price\
    \ for log in logs)\n    >>> total\n    Decimal('47.82')\n    ```\n4. 确定每个 product_id\
    \ 的销售数量：\n    ```python\n    >>> from collections import Counter\n    >>> counter\
    \ = Counter(log.product_id for log in logs)\n    >>> counter\n    Counter({1489:\
    \ 2, 4508: 1, 8597: 1, 3086: 1})\n    ```\n5. 过滤日志以查找所有销售产品 ID 为 1489 的记录：\n \
    \   ```python\n    >>> logs = [log for log in logs if log.product_id == 1489]\n\
    \    >>> len(logs)\n    2\n    >>> logs[0].product_id, logs[0].timestamp\n   \
    \ (1489, Delorean(datetime=datetime.datetime(2018, 6, 17, 22, 11, 50, 268396),\
    \ timezone='UTC'))\n    >>> logs[1].product_id, logs[1].timestamp\n    (1489,\
    \ Delorean(datetime=datetime.datetime(2018, 6, 17, 22, 11, 50, 268468), timezone='UTC'))\n\
    \    ```\n\n## 工作原理...\n\n由于每个条目都是单行，我们打开文件并逐行处理，解析每一行。解析代码位于 `price_log.py` 中。有关解析过程的更多细节，请查看该文件。\n\
    \n在 *如何操作...* 部分的 *步骤 2* 中，我们打开文件并处理每一行，创建一个包含所有已处理日志的日志列表。然后，我们可以进行聚合操作，如后续步骤所示。\n\
    \n*步骤 3* 展示了如何聚合所有值。在这个例子中，是将日志文件中所有售出物品的价格相加，以获得总收入。\n\n*步骤 4* 使用 `Counter` 来确定文件日志中每个项目的数量。这返回一个类似字典的对象，其中包含要计数的值及其出现的次数。\n\
    \n过滤也可以采用逐行处理的方式，如 *步骤 5* 所示。这与本章其他食谱中进行的过滤类似。\n\n## 更多内容...\n\n请记住，一旦获得了所需的所有数据，就可以停止处理文件。如果文件非常大（日志文件通常如此），这可能是一个好策略。\n\
    \n`Counter` 是一个快速统计列表的绝佳工具。更多详情请参阅 Python 文档：`https://docs.python.org/3/library/collections.html#counter-objects`。你可以通过调用以下方法获取排序后的项目：\n\
    \n```python\n>>> counter.most_common()\n[(1489, 2), (4508, 1), (8597, 1), (3086,\
    \ 1)]\n```\n\n## 另请参阅\n\n- *第 1 章，开始我们的自动化之旅* 中的 *使用第三方工具——parse* 食谱。\n- 本章前面的\
    \ *读取文本文件* 食谱，以了解更多关于打开和读取文件的信息。\n\n## 搜索和读取本地文件\n\n## 读取文件元数据\n\n文件元数据是与特定文件相关的所有信息，但不包括数据内容本身。最明显的是文件名，但还有更多可用参数，例如文件大小、创建日期或其权限。\n\
    \n浏览这些数据很重要，例如，用于过滤早于某个日期的文件，或查找所有大于某个 KB 值的文件。在本食谱中，我们将了解如何在 Python 中访问文件元数据。\n\
    \n## 准备工作\n\n我们将使用 `zen_of_python.txt` 文件，该文件可在 GitHub 仓库中找到 (https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter04/documents/zen_of_python.txt)。如你所见，通过使用\
    \ `ls` 命令，该文件大小为 856 字节，在本例中，它创建于 6 月 14 日：\n\n```\n$ ls -lrt zen_of_python.txt\n\
    -rw-r--r--@ 1 jaime staff 856 14 Jun 21:22 zen_of_python.txt\n```\n\n在你的计算机上，日期可能会有所不同，具体取决于你下载代码的时间。\n\
    \n## 如何操作...\n\n1. 导入 `os` 和 `datetime`：\n    ```python\n    >>> import os\n \
    \   >>> from datetime import datetime\n    ```\n2. 获取 `zen_of_python.txt` 文件的统计信息：\n\
    \    ```python\n    >>> stats = os.stat(('zen_of_python.txt'))\n    >>> stats\n\
    \    os.stat_result(st_mode=33188, st_ino=15822537, st_dev=16777224, st_nlink=1,\
    \ st_uid=501, st_gid=20, st_size=856, st_atime=1529461935, st_mtime=1529007749,\
    \ st_ctime=1529007757)\n    ```\n3. 获取文件大小（以字节为单位）：\n    ```python\n    >>> stats.st_size\n\
    \    856\n    ```\n4. 获取文件最后修改的时间：\n    ```python\n    >>> datetime.fromtimestamp(stats.st_mtime)\n\
    \    datetime.datetime(2018, 6, 14, 21, 22, 29)\n    ```\n5. 获取文件最后访问的时间：\n  \
    \  ```python\n    >>> datetime.fromtimestamp(stats.st_atime)\n    datetime.datetime(2018,\
    \ 6, 20, 3, 32, 15)\n    ```\n\n## 工作原理...\n\n`os.stats` 返回一个 stats 对象，该对象表示存储在文件系统中的元数据。元数据包括：\n\
    \n- 文件大小（以字节为单位），如 *如何操作...* 部分的步骤 3 所示，使用 `st_size`。\n- 文件内容最后修改的时间，如步骤 4 所示，使用\
    \ `st_mtime`。\n- 文件最后读取（访问）的时间，如步骤 5 所示，使用 `st_atime`。\n\n时间以时间戳形式返回，因此在步骤 4 和步骤\
    \ 5 中，我们从时间戳创建一个 datetime 对象，以便更好地访问数据。\n\n所有这些值都可用于过滤文件并访问有意义的文件。\n\n> 注意，你不需要使用\
    \ `open()` 打开文件来读取其元数据。通过读取修改时间来检测文件是否在已知时间后被更改，将比比较其内容更快，因此你可以利用这一点进行比较。\n\n\
    ## 更多内容...\n\n为了逐个获取统计信息，`os.path` 中也提供了便捷函数，遵循 `get<value>` 模式：\n\n```python\n\
    >>> os.path.getsize('zen_of_python.txt')\n856\n>>> os.path.getmtime('zen_of_python.txt')\n\
    1529531584.0\n>>> os.path.getatime('zen_of_python.txt')\n1529531669.0\n```\n\n\
    该值以 UNIX 时间戳格式（自 1970 年 1 月 1 日以来的秒数）指定。\n\n## 搜索和读取本地文件\n\n> 请注意，调用所有这三个函数将比单次调用\
    \ `os.stats` 并处理结果更慢。此外，返回的 `stats` 可以被检查以检测可用的元数据。\n\n本食谱中描述的值适用于所有文件系统，但根据特定平台，还有更多可用的值。\n\
    \n例如，要获取文件的创建日期，你可以使用 macOS 的 `st_birthtime` 参数或 Windows 的 `st_mtime`。\n\n> `st_mtime`\
    \ 始终可用，但其含义在不同系统之间有所不同。在 Unix 系统中，当内容被修改时它会更改，因此它不是可靠的创建时间。\n\n`os.stat` 将跟随符号链接。如果你想获取符号链接的统计信息，请使用\
    \ `os.lstat()`。\n\n你可以在此处查看所有可用统计信息的完整文档：https://docs.python.org/3/library/os.html\
    \ - os.stat_result。\n\n## 另请参阅\n\n- 本章前面的 *读取文本文件* 食谱，以了解打开和读取文件的基础知识。\n- 本章后面的\
    \ *读取图像* 食谱，以了解如何读取和处理图像文件。\n\n## 读取图像\n\n可能最常见的非文本数据是图像数据。图像有其自己的一组特定元数据，可以读取这些元数据来过滤值或执行其他操作。\n\
    \n主要挑战在于处理多种格式和不同的元数据定义。我们将在本食谱中展示如何从 JPEG 和 PNG 获取信息，以及相同的信息如何以不同的方式编码。\n\n##\
    \ 准备工作\n\n可以说，处理图像的最佳通用工具包是 Pillow。这个库允许你轻松读取最常见格式的文件，并对其进行操作。Pillow 最初是 PIL（Python\
    \ Imaging Library）的一个分支，PIL 是一个几年前就已停滞的先前模块。\n\n我们还将使用 `xmltodict` 模块将一些 XML 数据转换为更方便的字典。我们将把这两个模块添加到\
    \ `requirements.txt` 并在虚拟环境中重新安装它们：\n\n```\n$ echo \"Pillow==7.0.0\" >> requirements.txt\n\
    $ echo \"xmltodict==0.12.0\" >> requirements.txt\n$ pip install -r requirements.txt\n\
    ```\n\n照片文件中的元数据信息在 EXIF（可交换图像文件）格式中定义。EXIF 是一个用于存储图片信息的标准，包括拍摄照片的相机、拍摄时间、描述位置的\
    \ GPS、曝光、焦距、颜色信息等。\n\n> 你可以在此处获得一个很好的概述：https://www.slrphotographyguide.com/what-is-exif-metadata/。所有信息都是可选的，但几乎所有数码相机和处理软件都会存储一些数据。由于隐私问题，其中一部分（如确切位置）可以被禁用。\n\
    \n本食谱将使用以下图像，可在 GitHub 仓库中下载 (https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter04/images)：\n\
    \n- photo-dublin-a1.jpg\n- photo-dublin-a2.png\n- photo-dublin-b.png\n\n其中两个，`photo-dublin-a1.jpg`\
    \ 和 `photo-dublin-a2.png`，是同一场景，但第一个是未经处理的照片，第二个经过修饰以轻微改变颜色，并且也被缩放了。注意一个是 JPEG\
    \ 格式，另一个是 PNG 格式。另一个，`photo-dublin-b.png`，是一张不同的照片。两张照片都是在都柏林用同一部手机相机在两个不同的日子拍摄的。"
