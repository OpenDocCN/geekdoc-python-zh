  - "[PAGE 477]\n\n# Debugging Techniques\n\nWhile debugging, we typically need to\
    \ analyze unknown elements and objects that come from an external module or service.\
    \ Code in Python is highly discoverable at any point in its execution. This ability\
    \ to examine the types and properties of the code while it is being executed is\
    \ called *introspection*.\n\nEverything in this recipe is included by default\
    \ in Python's interpreter.\n\n# How to do it...\n\n+   1. Import pprint:\n   python\n\
    \   >>> from pprint import pprint\n   \n2. Create a new dictionary called dictionary:\n\
    \   python\n   >>> dictionary = {'example': 1}\n   \n3. Display globals in this\
    \ environment:\n   python\n   >>> globals()\n   {...'pprint': <function pprint\
    \ at 0x100995048>,\n   ...'dictionary': {'example': 1}}\n   \n4. Print the globals\
    \ dictionary in a readable format with pprint:\n   python\n   >>> pprint(globals())\n\
    \   {'__annotations__': {},\n   ...\n   'dictionary': {'example': 1},\n   'pprint':\
    \ <function pprint at 0x100995048>}\n   \n5. Display all of the attributes of\
    \ dictionary:\n   python\n   >>> dir(dictionary)\n   ['__class__', '__contains__',\
    \ '__delattr__', '__delitem__',\n   '__dir__', '__doc__', '__eq__', '__format__',\
    \ '__ge__',\n   '__getattribute__', '__getitem__', '__gt__', '__hash__', '__init__',\n\
    \   '__init_subclass__', '__iter__', '__le__', '__len__', '__lt__',\n   '__ne__',\
    \ '__new__', '__reduce__', '__reduce_ex__', '__repr__',\n   '__reversed__', '__setattr__',\
    \ '__setitem__', '__sizeof__',\n   '__str__', '__subclasshook__', 'clear', 'copy',\
    \ 'fromkeys', 'get',\n   'items', 'keys', 'pop', 'popitem', 'setdefault', 'update',\n\
    \   'values']\n   \n6. Show the help for the dictionary object:\n   python\n \
    \  >>> help(dictionary)"
