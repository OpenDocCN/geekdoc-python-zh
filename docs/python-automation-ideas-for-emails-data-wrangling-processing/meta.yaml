    \ Note that it is in GeoJSON, which is an easy standard to work with.\n\n## How\
    \ to do it...\n\n1.  Import the modules:\n\n    ```python\n    >>> import matplotlib.pyplot\
    \ as plt\n    >>> import matplotlib.cm as cm\n    >>> import fiona\n    ```\n\n\
    2.  Load the population of the countries to display:\n\n    ```python\n    >>>\
    \ COUNTRIES_POPULATION = {\n    ...     'Spain': 47.2,\n    ...     'Portugal':\
    \ 10.6,\n    ...     'United Kingdom': 63.8,\n    ...     'Ireland': 4.7,\n  \
    \  ...     'France': 64.9,\n    ...     'Italy': 61.1,\n    ...     'Germany':\
    \ 82.6,\n    ...     'Netherlands': 16.8,\n    ...     'Belgium': 11.1,\n    ...\
    \     'Denmark': 5.6,\n    ...     'Slovenia': 2,\n    ...     'Austria': 8.5,\n\
    \    ...     'Luxembourg': 0.5,\n    ...     'Andorra': 0.077,\n    ...     'Switzerland':\
    \ 8.2,\n    ...     'Liechtenstein': 0.038,\n    ... }\n    >>> MAX_POPULATION\
    \ = max(COUNTRIES_POPULATION.values())\n    >>> MIN_POPULATION = min(COUNTRIES_POPULATION.values())\n\
    \    ```\n\n3.  Prepare the colormap, which will determine the color each country\
    \ will be displayed in (differing shades of green). Calculate which color corresponds\
    \ to each country:\n\n    ```python\n    >>> colormap = cm.get_cmap('Greens')\n\
    \    >>> COUNTRY_COLOUR = {\n    ...     country_name: colormap(\n    ...    \
    \     (population - MIN_POPULATION) / (MAX_POPULATION - MIN_POPULATION)\n    ...\
    \     )\n    ...     for country_name, population in COUNTRIES_POPULATION.items()\n\
    \    ... }\n    ```\n\n4.  Open the file and read the data, filtering by the countries\
    \ we defined the population in step 1:\n\n    ```python\n    >>> with fiona.open('europe.geojson')\
    \ as fd:\n    ...     full_data = [data for data in fd\n    ...              \
    \   if data['properties']['NAME'] in COUNTRIES_POPULATION]\n    ```\n\n5.  Plot\
    \ each of the countries in the proper color:\n\n    ```python\n    >>> for data\
    \ in full_data:\n    ...     country_name = data['properties']['NAME']\n    ...\
    \     color = COUNTRY_COLOUR[country_name]\n    ...     geo_type = data['geometry']['type']\n\
    \    ...     if geo_type == 'Polygon':\n    ...         data_x = [x for x, y in\
    \ data['geometry']['coordinates'][0]]\n    ...         data_y = [y for x, y in\
    \ data['geometry']['coordinates'][0]]\n    ...         plt.fill(data_x, data_y,\
    \ c=color)\n    ...     elif geo_type == 'MultiPolygon':\n    ...         for\
    \ coordinates in data['geometry']['coordinates']:\n    ...             data_x\
    \ = [x for x, y in coordinates[0]]\n    ...             data_y = [y for x, y in\
    \ coordinates[0]]\n    ...             plt.fill(data_x, data_y, c=color)\n   \
    \ ```\n\n6.  Display the result:\n\n    ```python\n    >>> plt.show()\n    ```\n\
    \n7.  The result will be displayed in a new window, as follows:\n\n    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_292_0.png)\n\
    \n## How it works...\n\nAfter importing the modules in *step 1* from the *How\
    \ to do it...* section, the data to be displayed is defined in *step 2*. Note\
    \ that the names need to be in the same format as they'll be in the GEO file.\
    \ The minimum and maximum populations are calculated to properly balance the range\
    \ later.\n\n> The population has been rounded to a significant number, and it's\
    \ defined in millions. Only a few countries have been defined for this recipe,\
    \ but there are more available in the GIS file.\n\nStep 3 describes a `colormap`\
    \ defining the color range in shades of green (Greens). This is one standard `colormap`\
    \ in matplotlib, but we can use others, such as oranges, reds, or plasma for a\
    \ more cold-to-hot approach. More details are available in the documentation:\
    \ https://matplotlib.org/examples/color/colormaps_reference.html.\n\nThe `COUNTRY_COLOUR`\
    \ dictionary stores the color defined by `colormap` for each country. The population\
    \ is normalized to a number from 0.0 (least population) to 1.0 (most), and passed\
    \ to `colormap` to retrieve the color at the scale it corresponds to.\n\nThe GIS\
    \ information is then retrieved in step 4. `fiona` reads the `europe.geojson`\
    \ file and the data is copied so we can use it in the next steps. It also filters\
    \ to only deal with the countries we defined the population of, which means no\
    \ extra countries are plotted.\n\nThe loop in step 5 goes over the country information\
    \ list in `data_list`, and then each country's geometry is plotted using `.fill`,\
    \ which plots a polygon. The geometry of each country is either a single polygon\
    \ (`Polygon`) or more than one (`MultiPolygon`). In each case, the proper polygons\
    \ are drawn, all in the same color. This means `MultiPolygon` is drawn several\
    \ times.\n\n> GIS information is stored as points for coordinates describing the\
    \ latitude and longitude of the point. Areas, such as countries, have a list of\
    \ coordinates that describe an area within them. Some maps are more precise and\
    \ have more points defining areas. Multiple polygons may be required to define\
    \ a country, as some parts may be separated from each other, with islands being\
    \ the most obvious case, but there are also exclaves. Exclaves are regions of\
    \ countries detached from the main body, like Alaska.\n\nFinally, the data is\
    \ displayed by calling `.show`.\n\n## There's more...\n\nTaking advantage of the\
    \ information contained in the GIS file, we can add extra information to the map.\
    \ The `properties` object contains information about the name of the country,\
    \ but also its ISO name, FID code, and central location as `LON` and `LAT`. We\
    \ can use this information to display the name of the country using `.text`:\n\
    \n```python\nlong, lat = data['properties']['LON'], data['properties']['LAT']\n\
    iso3 = data['properties']['ISO3']\nplt.text(long, lat, iso3, horizontalalignment='center')\n\
    ```\n\nThis code will live inside the loop in *step 6* in the *How to do it...*\
    \ section.\n\n> If you analyze the file, you'll see that the `properties` object\
    \ contains information about the population, stored as `POP2005`, so you can draw\
    \ the population information directly from the map. That is left as an exercise.\
    \ Different map files contain different information, so be sure to play around\
    \ to unleash all the possibilities.\n\nAlso, you may notice that the map may be\
    \ distorted in some cases. `matplotlib` will try to present it in a square box,\
    \ and if the map is not roughly square, this will be evident. For example, try\
    \ to display only Spain, Portugal, Ireland, and the UK. We can force the graph\
    \ to present 1 point of latitude with the same space as 1 point of longitude,\
    \ which is a good approach if we are not drawing something near the poles. This\
    \ is achieved by calling `.set_aspect` in the axes. Current axes can be obtained\
    \ through `.gca` (**get current axes**):\n\n```python\n>>> axes = plt.gca()\n\
    >>> axes.set_aspect('equal', adjustable='box')\n```\n\nAlso, to improve the look\
    \ of the map, we can set up a background color that helps to differentiate between\
    \ the background and the foreground, and remove the labels in the axes, as printing\
    \ the latitude and longitude is probably distracting. Removing the labels on the\
    \ axes is achieved by setting empty labels with `.xticks` and `.yticks`. The background\
    \ color is mandated by the foreground color of the axes:\n\n```python\n>>> plt.xticks([])\n\
    ([], <a list of 0 Text major ticklabel objects>)\n>>> plt.yticks([])\n([], <a\
    \ list of 0 Text major ticklabel objects>)\n>>> axes = plt.gca()\n>>> axes.set_facecolor('xkcd:light\
    \ blue')\n```\n\nFinally, to better differentiate between the different regions,\
    \ a line surrounding each area can be added. This can be done by drawing a thin\
    \ line with the same data as `.fill`, right after. Notice that this code is repeated\
    \ twice in *step 2*:\n\n```python\n>>> plt.fill(data_x, data_y, c=color)\n[<matplotlib.patches.Polygon\
    \ object at 0x1161a49d0>]\n>>> plt.plot(data_x, data_y, c='black', linewidth=0.2)\n\
    [<matplotlib.lines.Line2D object at 0x1161a4b80>]\n```"
  mdcn: "如果你使用的是 macOS，可能会遇到这样的错误：**RuntimeError: Python is not installed as a framework**。请参阅\
    \ matplotlib 文档了解如何修复此问题：https://matplotlib.org/faq/osx_framework.html。\n\n地图数据需要下载。幸运的是，地理信息有大量免费可用的数据。在\
    \ Google 上搜索应该能快速找到几乎所有你需要的信息，包括关于地区、县、河流或任何其他类型数据的详细信息。\n\n> GIS 信息以不同格式由许多公共组织提供。Fiona\
    \ 能够理解大多数常见格式并以等效方式处理它们，但存在细微差别。请阅读 Fiona 文档了解更多详情。\n\n本食谱中我们将使用的数据覆盖所有欧洲国家，可在以下\
    \ GitHub URL 获取：https://github.com/leakyMirror/map-of-europe/blob/master/GeoJSON/europe.geojson。请注意，它是\
    \ GeoJSON 格式，这是一种易于使用的标准。\n\n## 如何操作...\n\n1.  导入模块：\n\n    ```python\n    >>>\
    \ import matplotlib.pyplot as plt\n    >>> import matplotlib.cm as cm\n    >>>\
    \ import fiona\n    ```\n\n2.  加载要显示的国家人口数据：\n\n    ```python\n    >>> COUNTRIES_POPULATION\
    \ = {\n    ...     'Spain': 47.2,\n    ...     'Portugal': 10.6,\n    ...    \
    \ 'United Kingdom': 63.8,\n    ...     'Ireland': 4.7,\n    ...     'France':\
    \ 64.9,\n    ...     'Italy': 61.1,\n    ...     'Germany': 82.6,\n    ...   \
    \  'Netherlands': 16.8,\n    ...     'Belgium': 11.1,\n    ...     'Denmark':\
    \ 5.6,\n    ...     'Slovenia': 2,\n    ...     'Austria': 8.5,\n    ...     'Luxembourg':\
    \ 0.5,\n    ...     'Andorra': 0.077,\n    ...     'Switzerland': 8.2,\n    ...\
    \     'Liechtenstein': 0.038,\n    ... }\n    >>> MAX_POPULATION = max(COUNTRIES_POPULATION.values())\n\
    \    >>> MIN_POPULATION = min(COUNTRIES_POPULATION.values())\n    ```\n\n3.  准备颜色映射表，它将决定每个国家显示的颜色（不同深浅的绿色）。计算每个国家对应的颜色：\n\
    \n    ```python\n    >>> colormap = cm.get_cmap('Greens')\n    >>> COUNTRY_COLOUR\
    \ = {\n    ...     country_name: colormap(\n    ...         (population - MIN_POPULATION)\
    \ / (MAX_POPULATION - MIN_POPULATION)\n    ...     )\n    ...     for country_name,\
    \ population in COUNTRIES_POPULATION.items()\n    ... }\n    ```\n\n4.  打开文件并读取数据，筛选出我们在步骤\
    \ 1 中定义了人口的国家：\n\n    ```python\n    >>> with fiona.open('europe.geojson') as\
    \ fd:\n    ...     full_data = [data for data in fd\n    ...                 if\
    \ data['properties']['NAME'] in COUNTRIES_POPULATION]\n    ```\n\n5.  以正确的颜色绘制每个国家：\n\
    \n    ```python\n    >>> for data in full_data:\n    ...     country_name = data['properties']['NAME']\n\
    \    ...     color = COUNTRY_COLOUR[country_name]\n    ...     geo_type = data['geometry']['type']\n\
    \    ...     if geo_type == 'Polygon':\n    ...         data_x = [x for x, y in\
    \ data['geometry']['coordinates'][0]]\n    ...         data_y = [y for x, y in\
    \ data['geometry']['coordinates'][0]]\n    ...         plt.fill(data_x, data_y,\
    \ c=color)\n    ...     elif geo_type == 'MultiPolygon':\n    ...         for\
    \ coordinates in data['geometry']['coordinates']:\n    ...             data_x\
    \ = [x for x, y in coordinates[0]]\n    ...             data_y = [y for x, y in\
    \ coordinates[0]]\n    ...             plt.fill(data_x, data_y, c=color)\n   \
    \ ```\n\n6.  显示结果：\n\n    ```python\n    >>> plt.show()\n    ```\n\n7.  结果将显示在一个新窗口中，如下所示：\n\
    \n    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_292_0.png)\n\n## 工作原理...\n\n在 *如何操作...*\
    \ 部分的 *步骤 1* 中导入模块后，*步骤 2* 定义了要显示的数据。请注意，名称需要与 GEO 文件中的格式相同。计算最小和最大人口值，以便稍后正确平衡范围。\n\
    \n> 人口数据已四舍五入到一个有效数字，并以百万为单位定义。本食谱仅定义了少数几个国家，但 GIS 文件中还有更多可用数据。\n\n步骤 3 描述了一个\
    \ `colormap`，它定义了绿色（Greens）深浅的颜色范围。这是 matplotlib 中的一个标准 `colormap`，但我们可以使用其他颜色，如橙色、红色或\
    \ plasma 以实现更冷到热的渐变效果。更多详情请参阅文档：https://matplotlib.org/examples/color/colormaps_reference.html。\n\
    \n`COUNTRY_COLOUR` 字典存储了 `colormap` 为每个国家定义的颜色。人口值被归一化到 0.0（最少人口）到 1.0（最多人口）之间的数字，并传递给\
    \ `colormap` 以检索其对应比例尺上的颜色。\n\n然后在步骤 4 中检索 GIS 信息。`fiona` 读取 `europe.geojson`\
    \ 文件，数据被复制以便在后续步骤中使用。它还进行了筛选，只处理我们定义了人口的国家，这意味着不会绘制额外的国家。\n\n步骤 5 中的循环遍历 `data_list`\
    \ 中的国家信息列表，然后使用 `.fill` 绘制每个国家的几何图形，该函数绘制一个多边形。每个国家的几何图形要么是单个多边形（`Polygon`），要么是多个（`MultiPolygon`）。在每种情况下，都会绘制相应的多边形，所有多边形颜色相同。这意味着\
    \ `MultiPolygon` 会被绘制多次。\n\n> GIS 信息以点的形式存储，坐标描述了点的经纬度。区域（如国家）有一个坐标列表，描述其内部的一个区域。一些地图更精确，有更多的点来定义区域。可能需要多个多边形来定义一个国家，因为某些部分可能彼此分离，岛屿是最明显的例子，但也有飞地。飞地是与主体分离的国家区域，例如阿拉斯加。\n\
    \n最后，通过调用 `.show` 显示数据。\n\n## 更多内容...\n\n利用 GIS 文件中包含的信息，我们可以在地图上添加额外信息。`properties`\
    \ 对象包含国家名称的信息，但也包含其 ISO 名称、FID 代码以及作为 `LON` 和 `LAT` 的中心位置。我们可以使用此信息通过 `.text`\
    \ 显示国家名称：\n\n```python\nlong, lat = data['properties']['LON'], data['properties']['LAT']\n\
    iso3 = data['properties']['ISO3']\nplt.text(long, lat, iso3, horizontalalignment='center')\n\
    ```\n\n此代码将位于 *如何操作...* 部分 *步骤 6* 的循环内。\n\n> 如果你分析该文件，你会看到 `properties` 对象包含人口信息，存储为\
    \ `POP2005`，因此你可以直接从地图中绘制人口信息。这留作练习。不同的地图文件包含不同的信息，因此请务必尝试以释放所有可能性。\n\n此外，你可能会注意到地图在某些情况下可能会失真。`matplotlib`\
    \ 会尝试将其呈现在一个方形框中，如果地图不是大致方形的，这将很明显。例如，尝试只显示西班牙、葡萄牙、爱尔兰和英国。我们可以强制图表以相同的间距呈现 1 度纬度和\
    \ 1 度经度，如果我们绘制的不是靠近极地的东西，这是一个好方法。这可以通过在坐标轴上调用 `.set_aspect` 来实现。当前坐标轴可以通过 `.gca`（**获取当前坐标轴**）获得：\n\
    \n```python\n>>> axes = plt.gca()\n>>> axes.set_aspect('equal', adjustable='box')\n\
    ```\n\n此外，为了改善地图的外观，我们可以设置背景颜色以帮助区分背景和前景，并移除坐标轴上的标签，因为打印经纬度可能会分散注意力。移除坐标轴上的标签可以通过使用\
    \ `.xticks` 和 `.yticks` 设置空标签来实现。背景颜色由坐标轴的前景颜色决定：\n\n```python\n>>> plt.xticks([])\n\
    ([], <a list of 0 Text major ticklabel objects>)\n>>> plt.yticks([])\n([], <a\
    \ list of 0 Text major ticklabel objects>)\n>>> axes = plt.gca()\n>>> axes.set_facecolor('xkcd:light\
    \ blue')\n```\n\n最后，为了更好地区分不同区域，可以添加围绕每个区域的线条。这可以通过在 `.fill` 之后立即使用相同的数据绘制一条细线来实现。请注意，此代码在\
    \ *步骤 2* 中重复了两次：\n\n```python\n>>> plt.fill(data_x, data_y, c=color)\n[<matplotlib.patches.Polygon\
    \ object at 0x1161a49d0>]\n>>> plt.plot(data_x, data_y, c='black', linewidth=0.2)\n\
    [<matplotlib.lines.Line2D object at 0x1161a4b80>]\n```"
