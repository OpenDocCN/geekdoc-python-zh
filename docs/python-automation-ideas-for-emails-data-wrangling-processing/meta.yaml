    parse==1.14.0\" >> requirements.txt\n$ pip install -r requirements.txt\n```\n\n\
    在 GitHub 仓库中，有一些待处理的日志文件，其结构如下：\n\n```\nsale_logs/\n  OH\n    logs.txt\n  ON\n\
    \    logs.txt\n```\n\n代码可在 GitHub 仓库中找到，地址为 `https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter07`。\n\
    \n# 如何操作...\n\n1.  检查 `sale_logs/OH/logs.txt` 文件的内容：\n\n```\n$ head sale_logs/OH/logs.txt\n\
    [08-27-2019 18:39:41] - SALE - PRODUCT: 12346 - PRICE: 02.99\n[08-27-2019 19:39:41]\
    \ - SALE - PRODUCT: 12346 - PRICE: 02.99\n[08-27-2019 20:39:41] - SALE - PRODUCT:\
    \ 12346 - PRICE: 02.99\n[08-27-2019 21:39:41] - SALE - PRODUCT: 12346 - PRICE:\
    \ 02.99\n[08-27-2019 22:39:41] - SALE - PRODUCT: 12345 - PRICE: 09.99\n[08-27-2019\
    \ 23:39:41] - SALE - PRODUCT: 12345 - PRICE: 07.99\n[08-28-2019 00:39:41] - SALE\
    \ - PRODUCT: 12346 - PRICE: 02.99\n[08-28-2019 01:39:41] - SALE - PRODUCT: 12346\
    \ - PRICE: 02.99\n[08-28-2019 02:39:41] - SALE - PRODUCT: 12346 - PRICE: 02.99\n\
    [08-28-2019 03:39:41] - SALE - PRODUCT: 12346 - PRICE: 02.99\n```\n\n2.  使用 `logs_to_csv.py`\
    \ 脚本导入数据并将其转换为 CSV 文件。该脚本将位置作为输入添加：\n\n```\n$ python logs_to_csv.py sale_logs/OH/logs.txt\
    \ output_1_OH.csv -l OH\n```\n\n3.  在电子表格中检查生成的 CSV 文件。在以下截图中，该文件使用 LibreOffice\
    \ 软件显示：\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_231_0.png)\n\n图 7.1：产品数据截图\n\
    \n请注意 CSV 如何包含位置信息，此处标记为 OH。同时请注意时间戳的格式。\n\n# 工作原理...\n\n让我们看一下在*步骤 2*中使用的 `logs_to_csv.py`\
    \ 脚本。\n\n它从 `price_log.py` 文件导入，该文件包含日志的解析逻辑。这与*第1章，开启自动化之旅*中*从结构化字符串中提取数据*食谱中的代码类似。该代码添加了一个包含所有行的表头，并添加了一个位置列。让我们来看一下：\n\
    \n```\nclass PriceLog(object):\n\n    def __init__(self, location, timestamp,\
    \ product_id, price):\n        self.timestamp = timestamp\n        self.product_id\
    \ = product_id\n        self.price = price\n        self.location = location\n\
    \n    @classmethod\n    def parse(cls, location, text_log):\n        '''\n   \
    \     Parse from a text log with the format\n        [<Timestamp>] - SALE - PRODUCT:\
    \ <product id> - PRICE: <price>\n        to a PriceLog object\n\n        It requires\
    \ a location\n        '''\n        def price(string):\n            return Decimal(string)\n\
    \n        FORMAT = ('[{timestamp}] - SALE - PRODUCT: {product:d} - '\n       \
    \           'PRICE: {price:price}')\n\n        formats = {'price': price}\n  \
    \      result = parse.parse(FORMAT, text_log, formats)\n\n        return cls(location=location,\
    \ timestamp=result['timestamp'],\n                   product_id=result['product'],\n\
    \                   price=result['price'])\n\n    @classmethod\n    def header(cls):\n\
    \        return ['LOCATION', 'TIMESTAMP', 'PRODUCT', 'PRICE']\n\n    def row(self):\n\
    \        return [self.location, self.timestamp, self.product_id,\n           \
    \     self.price]\n```\n\n该文件通过 `logs_to_csv.py` 文件中的 `log_to_csv` 函数转换为 CSV 格式：\n\
    \n```\ndef log_to_csv(input_file, output_file, location):\n    logs = [PriceLog.parse(location,\
    \ line) for line in input_file]\n\n    # Save into csv format\n    writer = csv.writer(output_file)\n\
    \    writer.writerow(PriceLog.header())\n    writer.writerows(l.row() for l in\
    \ logs)\n```\n\n`logs_to_csv.py` 文件的其余部分处理参数解析，这在*第2章，轻松实现任务自动化*中有详细描述。\n\n生成的文件包含相同的信息，但\
    \ CSV 是一种更易于理解、处理和添加额外信息的格式，正如我们将在后续食谱中看到的。\n\n# 更多内容...\n\n本食谱的主要目标是将数据从文本文件导入\
    \ CSV，而不对原始数据施加任何格式限制。例如，日期采用特定格式。时间戳格式会因文件而异，正如我们将在后续食谱中看到的。\n\n位置的描述也特意保持开放，因为我们将在后续食谱中使用它来设置不同类型的位置。\n\
    \n如果日志文件非常大，读取整个文件然后保存可能会导致内存效率低下。在这种情况下，你可以一次处理一行，如下所示：\n\n```\ndef log_to_csv(input_file,\
    \ output_file, location):\n    writer = csv.writer(output_file)\n    writer.writerow(PriceLog.header())\n\
    \n    # Read and save line by line\n    for line in input_file:\n        log =\
    \ PriceLog.parse(location, line)\n        writer.writerow(log.row())\n```\n\n\
    这种方法也可以分批进行，一次读取和写入多行。这可以提高吞吐量，尽管可能需要一些实验来找到最佳解决方案。\n\n# 另请参阅\n\n- *第4章，搜索和读取本地文件*中的*读取\
    \ CSV 文件*食谱。\n- *第1章，开启自动化之旅*中的*从结构化字符串中提取数据*食谱。\n- *第2章，轻松实现任务自动化*中的*准备任务*食谱。\n\
    \n# 根据位置追加货币\n\n上一个食谱生成的 CSV 文件不包含货币信息，即使位置可能指示使用不同货币的不同地点。在本食谱中，我们将处理一个 CSV 文件以添加额外信息：价格所使用的货币，以及转换为美元。\n\
    \n# 准备工作\n\n我们将使用上一个食谱生成的 CSV 文件，该文件接收并转换日志为以下格式：\n\n```\n[<Timestamp>] - SALE\
    \ - PRODUCT: <product id> - PRICE: <price>\n```\n\n每一行将代表一条销售日志。\n\n我们将使用 `parse`\
    \ 模块。我们需要安装该模块，将其添加到我们的 `requirements.txt` 文件中，如下所示：\n\n```\n$ echo \"parse==1.14.0\"\
    \ >> requirements.txt\n$ pip install -r requirements.txt\n```\n\n在 GitHub 仓库中，有一些待处理的日志文件，其结构如下：\n\
    \n```\nsale_logs/\n  OH\n    logs.txt\n  ON\n    logs.txt\n```\n\n代码可在 GitHub\
    \ 仓库中找到，地址为 https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter07。\n\
    \n# 如何操作...\n\n1.  使用 `logs_to_csv.py` 脚本导入数据并将其转换为 CSV 文件。该脚本将位置作为输入添加。为 OH 和\
