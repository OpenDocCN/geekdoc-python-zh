- md: 'Fun with Spreadsheets


    Defining charts in Excel correctly can be difficult sometimes. The way Excel extracts
    the data from a particular range can be baffling. Remember to allow time for trial
    and error, and to deal with differences. For example, in step 4, we defined three
    series with one data point, while in the preceding code, we defined a single series
    with three data points. Most of those differences are subtle. Finally, the most
    important point is how the end chart looks. Try different chart types and learn
    the differences.


    The full openpyxl documentation can be found here: https://openpyxl.readthedocs.io/en/stable/index.html.


    ## See also


    - The Reading an Excel spreadsheet recipe earlier in the chapter.

    - The Updating an Excel spreadsheet recipe earlier in the chapter.

    - The Creating new sheets in an Excel spreadsheet recipe in the previous section.

    - The Working with cell formats in Excel recipe in the following section.


    ## Working with cell formats in Excel


    Presenting information in spreadsheets is not just a matter of organizing it into
    cells or displaying it graphically in charts. It also involves changing the format
    to highlight the important details. In this recipe, we''ll see how to manipulate
    the format of cells to enhance the results and present the data in the best way.


    ## Getting ready


    We will use the openpyxl module. We should install the module, adding it to our
    requirements.txt file as follows:


    ```

    $ echo "openpyxl==3.0.3" >> requirements.txt

    $ pip install -r requirements.txt

    ```


    We''ll store it in the new file information about the movies with the most attendance.
    The data is extracted from here: http://www.mrob.com/pub/film-video/topadj.html.


    ## How to do it...


    1. Import the openpyxl module and create a new Excel file:


    ```

    >>> import openpyxl

    >>> from openpyxl.styles import Font, PatternFill, Border, Side

    >>> xlsfile = openpyxl.Workbook()

    ```


    2. Add data about the number of attendees in this sheet from the source. Only
    the first four are added, for simplicity:


    ```

    >>> data = [

    ...     (''Name'', ''Admissions''),

    ...     (''Gone With the Wind'', 225.7),

    ...     (''Star Wars'', 194.4),

    ...     (''ET: The Extraterrestrial'', 161.0),

    ...     (''The Sound of Music'', 156.4),

    ... ]

    >>> sheet = xlsfile[''Sheet'']

    >>> for row in data:

    ...     sheet.append(row)

    ```


    3. Define the colors to use for styling the spreadsheet:


    ```

    >>> BLUE = ''0033CC''

    >>> LIGHT_BLUE = ''E6ECFF''

    >>> WHITE = ''FFFFFF''

    ```


    4. Define the header in a blue background and a white font:


    ```

    >>> header_font = Font(name=''Tahoma'', size=14, color=WHITE)

    >>> header_fill = PatternFill("solid", fgColor=BLUE)

    >>> for row in sheet[''A1:B1'']:

    ...     for cell in row:

    ...         cell.font = header_font

    ...         cell.fill = header_fill

    ```


    5. Define an alternate pattern for the columns and a border on each row after
    the header:


    ```

    >>> white_side = Side(border_style=''thin'', color=WHITE)

    >>> blue_side = Side(border_style=''thin'', color=BLUE)

    >>> alternate_fill = PatternFill("solid", fgColor=LIGHT_BLUE)

    >>> border = Border(bottom=blue_side, left=white_side,

    ...                  right=white_side)

    >>> for row_index, row in enumerate(sheet[''A2:B5'']):

    ...     for cell in row:

    ...         cell.border = border

    ...         if row_index % 2:

    ...             cell.fill = alternate_fill

    ```


    6. Save the file as movies_format.xlsx:


    ```

    >>> xlsfile.save(''movies_format.xlsx'')

    ```


    7. Check the resulting file:


    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_217_0.png)


    ## How it works...


    In the *How to do it...* section, in *step 1*, we import the openpyxl module and
    create a new Excel file. In *step 2*, we add the data to the first sheet. *Step
    3* is also a preparation step to define the colors to be used. The colors are
    defined in hex format, which is common in the web design world.


    To find the definition of colors, there are plenty of color pickers online or
    even embedded in the OS. A tool like https://coolors.co/ can be useful to define
    a palette to work with.


    In *step 4*, we prepare the format to define the header. The header will have
    a different font (Tahoma), a bigger size (14pt), and it will be white on a blue
    background. To do this, we prepare a `Font` object with the font, size, and foreground
    color, and a `PatternFill` with the background color.


    The loop after creating `header_font` and `header_fill` applies the font and fill
    to the proper cells.


    Note that iterating over a range always returns the row, and then cells, even
    if only one row is involved.


    In *step 5*, a border to the rows and an alternate background is applied. The
    border is defined with blue top and bottom and white left and right. The fill
    is created in a similar way to *step 4*, but in a light blue. The background is
    only applied to even rows.


    Note that the top border of a cell is the bottom of the one above, and vice versa.
    This means that it''s possible to overwrite the border in a loop.


    The file is finally saved in *step 6*.


    ## There''s more...


    There are multiple options available to style the text, such as bold, italic,
    strikeout, or underline. Define the font and reassign it if you need to change
    any of its elements. And remember to check that the font is available in the system.


    There are also various ways of creating a fill. `PatternFill` accepts several
    patterns, but the most useful one is `solid`. `GradientFill` can also be used
    to apply a two-color gradient.


    It''s best to limit yourself to solid fills using `PatternFill`. You can tweak
    the color to best represent what you want. Remember to include `style=''solid''`,
    or the color may not appear.


    It''s also possible to define conditional formatting, but for an automatically
    generated spreadsheet, it''s less complicated to try to define the logic in Python
    and then apply the proper static formatting based on the result.


    Number formatting can be set up properly, for example:


    ```

    cell.style = ''Percent''

    ```


    This will display the value 0.37 as 37%.


    The full `openpyxl` documentation can be found here: https://openpyxl.readthedocs.io/en/stable/index.html.


    ## See also


    - The *Reading an Excel spreadsheet* recipe earlier in the chapter.

    - The *Updating an Excel spreadsheet* recipe earlier in the chapter.

    - The *Creating new sheets in an Excel spreadsheet* recipe earlier in the chapter.

    - The *Creating charts in Excel* recipe in the previous section.


    ## Creating a macro in LibreOffice


    LibreOffice is a free productivity suite that''s an alternative to MS Office and
    other office packages. It includes, among others, a text editor called `writer`
    and a spreadsheet program called `Calc`. `Calc` understands the regular Excel
    formats, and it''s also totally scriptable internally through its UNO API. The
    UNO interface allows programmatic access to the suite, and it''s accessible in
    different languages, such as Java.


    One of these available languages is Python, making it very easy to generate very
    complex applications in a suite format, as this enables the use of the full Python
    standard library.


    Using the full Python standard library provides access to elements such as cryptography,
    opening external files (including zip files), and connecting to remote databases.
    Also, you can take advantage of the Python syntax and avoid dealing with LibreOffice
    BASIC.


    We''ll see in this recipe how to add an external Python file as a macro that will
    change the contents of a spreadsheet.


    ## Getting ready


    LibreOffice needs to be installed. It is available at https://www.libreoffice.org/.


    Once downloaded and installed, it needs to be configured to allow the execution
    of macros:


    1. Go to **Settings** | **Security** to find the **Macro Security** details:


    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_220_0.png)


    2. Open **Macro Security** and select **Medium** to allow the execution of our
    macros. This will display a warning before allowing us to run a macro:


    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_221_0.png)


    Figure 6.8: Setting macro security level to Medium


    To insert the macro into the file, we''ll use a script called `include_macro.py`,
    which is available at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter06/include_macro.py.


    The script with the macro is also available as `libreoffice_script.py` here: https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter06/libreoffice_script.py.


    The file to put the script into, called `movies.ods`, is also available here:
    https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter06/movies.ods.


    It contains, in .ods format (LibreOffice format), a table with the 10 movies with
    the highest admissions. The data was extracted from here: http://www.mrob.com/pub/film-video/topadj.html.'
  mdcn: '电子表格的乐趣


    在 Excel 中正确地定义图表有时可能很困难。Excel 从特定范围提取数据的方式可能令人费解。请记住留出时间进行试错，并处理各种差异。例如，在步骤 4
    中，我们定义了三个各含一个数据点的系列，而在前面的代码中，我们定义了一个包含三个数据点的系列。其中大多数差异都很细微。最后，最重要的一点是最终图表的呈现效果。尝试不同的图表类型并了解它们的区别。


    完整的 openpyxl 文档可以在这里找到：https://openpyxl.readthedocs.io/en/stable/index.html。


    ## 另请参阅


    - 本章前面的“读取 Excel 电子表格”配方。

    - 本章前面的“更新 Excel 电子表格”配方。

    - 上一节中的“在 Excel 电子表格中创建新工作表”配方。

    - 下一节中的“处理 Excel 中的单元格格式”配方。


    ## 处理 Excel 中的单元格格式


    在电子表格中呈现信息不仅仅是将其组织到单元格中或以图表形式进行图形化显示。它还涉及更改格式以突出显示重要细节。在本配方中，我们将了解如何操作单元格格式以增强结果并以最佳方式呈现数据。


    ## 准备工作


    我们将使用 openpyxl 模块。我们应该安装该模块，将其添加到我们的 requirements.txt 文件中，如下所示：


    ```

    $ echo "openpyxl==3.0.3" >> requirements.txt

    $ pip install -r requirements.txt

    ```


    我们将把关于观影人数最多的电影的信息存储在一个新文件中。数据提取自这里：http://www.mrob.com/pub/film-video/topadj.html。


    ## 如何做...


    1. 导入 openpyxl 模块并创建一个新的 Excel 文件：


    ```

    >>> import openpyxl

    >>> from openpyxl.styles import Font, PatternFill, Border, Side

    >>> xlsfile = openpyxl.Workbook()

    ```


    2. 从数据源将关于观影人数的数据添加到此工作表中。为简单起见，只添加前四个：


    ```

    >>> data = [

    ...     (''Name'', ''Admissions''),

    ...     (''Gone With the Wind'', 225.7),

    ...     (''Star Wars'', 194.4),

    ...     (''ET: The Extraterrestrial'', 161.0),

    ...     (''The Sound of Music'', 156.4),

    ... ]

    >>> sheet = xlsfile[''Sheet'']

    >>> for row in data:

    ...     sheet.append(row)

    ```


    3. 定义用于设置电子表格样式的颜色：


    ```

    >>> BLUE = ''0033CC''

    >>> LIGHT_BLUE = ''E6ECFF''

    >>> WHITE = ''FFFFFF''

    ```


    4. 定义蓝色背景和白色字体的标题：


    ```

    >>> header_font = Font(name=''Tahoma'', size=14, color=WHITE)

    >>> header_fill = PatternFill("solid", fgColor=BLUE)

    >>> for row in sheet[''A1:B1'']:

    ...     for cell in row:

    ...         cell.font = header_font

    ...         cell.fill = header_fill

    ```


    5. 定义列的交替模式，并在标题后的每一行添加边框：


    ```

    >>> white_side = Side(border_style=''thin'', color=WHITE)

    >>> blue_side = Side(border_style=''thin'', color=BLUE)

    >>> alternate_fill = PatternFill("solid", fgColor=LIGHT_BLUE)

    >>> border = Border(bottom=blue_side, left=white_side,

    ...                  right=white_side)

    >>> for row_index, row in enumerate(sheet[''A2:B5'']):

    ...     for cell in row:

    ...         cell.border = border

    ...         if row_index % 2:

    ...             cell.fill = alternate_fill

    ```


    6. 将文件保存为 movies_format.xlsx：


    ```

    >>> xlsfile.save(''movies_format.xlsx'')

    ```


    7. 检查生成的文件：


    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_217_0.png)


    ## 工作原理...


    在*如何做...*部分的*步骤 1*中，我们导入了 openpyxl 模块并创建了一个新的 Excel 文件。在*步骤 2*中，我们将数据添加到第一个工作表。*步骤
    3*也是一个准备步骤，用于定义要使用的颜色。颜色以十六进制格式定义，这在网页设计领域很常见。


    要查找颜色的定义，网上有很多颜色选择器，甚至操作系统中也内置了。像 https://coolors.co/ 这样的工具对于定义要使用的调色板很有用。


    在*步骤 4*中，我们准备格式来定义标题。标题将使用不同的字体（Tahoma）、更大的字号（14pt），并且是蓝色背景上的白色文字。为此，我们准备了一个包含字体、字号和前景色的
    `Font` 对象，以及一个包含背景色的 `PatternFill` 对象。


    在创建 `header_font` 和 `header_fill` 之后的循环将字体和填充应用到相应的单元格。


    请注意，即使只涉及一行，迭代一个范围也总是先返回行，然后返回单元格。


    在*步骤 5*中，为行添加了边框并应用了交替背景。边框定义为蓝色顶部和底部，白色左侧和右侧。填充的创建方式与*步骤 4*类似，但使用的是浅蓝色。背景仅应用于偶数行。


    请注意，单元格的上边框是其上方单元格的下边框，反之亦然。这意味着在循环中可能会覆盖边框。


    文件最终在*步骤 6*中保存。


    ## 更多内容...


    有多种选项可用于设置文本样式，例如粗体、斜体、删除线或下划线。定义字体，如果需要更改其任何元素，请重新分配它。并请记住检查该字体在系统中是否可用。


    创建填充也有多种方式。`PatternFill` 接受多种图案，但最有用的是 `solid`。`GradientFill` 也可用于应用双色渐变。


    最好将自己限制在使用 `PatternFill` 的纯色填充。你可以调整颜色以最好地代表你想要的效果。请记住包含 `style=''solid''`，否则颜色可能不会显示。


    也可以定义条件格式，但对于自动生成的电子表格，在 Python 中尝试定义逻辑，然后根据结果应用适当的静态格式会更简单。


    数字格式可以正确设置，例如：


    ```

    cell.style = ''Percent''

    ```


    这将把值 0.37 显示为 37%。


    完整的 `openpyxl` 文档可以在这里找到：https://openpyxl.readthedocs.io/en/stable/index.html。


    ## 另请参阅


    - 本章前面的*读取 Excel 电子表格*配方。

    - 本章前面的*更新 Excel 电子表格*配方。

    - 本章前面的*在 Excel 电子表格中创建新工作表*配方。

    - 上一节中的*在 Excel 中创建图表*配方。


    ## 在 LibreOffice 中创建宏


    LibreOffice 是一个免费的生产力套件，是 MS Office 和其他办公软件包的替代品。它包括一个名为 `writer` 的文本编辑器和一个名为
    `Calc` 的电子表格程序等。`Calc` 理解常规的 Excel 格式，并且它也可以通过其 UNO API 在内部完全进行脚本化。UNO 接口允许以编程方式访问该套件，并且可以通过不同的语言（如
    Java）进行访问。


    其中一种可用的语言是 Python，这使得在套件格式中生成非常复杂的应用程序变得非常容易，因为它可以使用完整的 Python 标准库。


    使用完整的 Python 标准库可以访问诸如加密、打开外部文件（包括 zip 文件）以及连接远程数据库等元素。此外，你可以利用 Python 语法，避免处理
    LibreOffice BASIC。


    在本配方中，我们将了解如何将一个外部 Python 文件作为宏添加到电子表格中，该宏将更改电子表格的内容。


    ## 准备工作


    需要安装 LibreOffice。它可以从 https://www.libreoffice.org/ 获取。


    下载并安装后，需要配置它以允许执行宏：


    1. 转到 **设置** | **安全** 以查找 **宏安全** 详细信息：


    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_220_0.png)


    2. 打开 **宏安全** 并选择 **中** 以允许执行我们的宏。这将在允许我们运行宏之前显示一个警告：


