    # Debugging Techniques


    This corresponds to a `method not allowed` error, indicating that our calling
    method is not correct.


    Inspect the following line:

    python

    result = requests.get(''http://httpbin.org/post'', json=data)


    This gives us the indication that we are sending a `GET` request to one URL that
    accepts only `POST` requests, so we make the change in *step 2*.


    > Notice that no specific debug steps have been required to detect this error,
    only a careful reading of the error message and the code. Remember to pay attention
    to error messages and logs. Often, this is enough to discover the issue or at
    least a very important piece of the puzzle.


    We run the code in *step 3* to find the next problem.


    # 2. Second error – Wrong handling of middle names:


    In *step 3*, we get an error of too many values to unpack. We can create a `breakpoint`
    to analyze the data in *step 4* at this point but discover that not all the data
    produces this error. The analysis done in *step 4* shows that it may be very confusing
    to stop the execution when an error is not produced, thus having to continue until
    it does. We know that the error is produced at this point, but only for specific
    data.


    As we know that the error is being produced at some point, we capture it in a
    `try..except` block in *step 5*. When the exception is produced, we trigger the
    `breakpoint`.


    This causes the *step 6* execution of the script to stop when `full_name` is `''John
    Paul Smith''`. This produces an error as the `split` expects two elements, not
    three.


    This is fixed in *step 7*, allowing everything except the last word to be part
    of the first name, grouping any middle name(s) into the first element. This fits
    our purpose for this program, to sort by last name.


    > Names are actually quite complex to handle. Check out this article if you want
    to be delighted by the vast numbers of incorrect assumptions one can make regarding
    names: https://www.kalzumeus.com/2010/06/17/falsehoods-programmers-believe-about-names/.


    The following line does that with `rsplit`:

    python

    first_name, last_name = full_name.rsplit(maxsplit=1)'
  - '[PAGE 494]


    It divides the text by words, starting from the right and making a maximum of
    one split, guaranteeing that only two elements, at most, will be returned.


    > This may produce an error if a name with no surname is defined, for example.
    We may need to amend the code if the input data changes.


    When the code is changed, *step 8* runs the code again to discover the next error.


    3. **Third error – Using an incorrect returned value by the external service:**


    Running the code in *step 8* displays the list and does not produce any errors.
    But, by examining the results, we can see that some names are incorrectly processed.


    We pick one example in *step 9* and create a conditional breakpoint. We only activate
    the `breakpoint` if the data fulfils the `if` condition.


    > The `if` condition, in this case, stops at any time the "O''Carroll" string
    appears, not having to make it stricter with an equal statement. Be pragmatic
    about this code, as you''ll need to remove it after the bug is fixed anyway.


    The code is run again in *step 10*. Once we''ve validated the data is as expected,
    we work backward to find the root of the problem. *Step 11* analyzes previous
    values and the code up to that point, trying to find out what led to the incorrect
    value.


    We then discover that we used the wrong field of the server response. The value
    in the `json` field is better for this task and it''s already parsed for us. *Step
    12* checks the value and sees how it should be used.


    In *step 13*, we change the code to properly decode the JSON content using the
    existing `.json()` method. Notice that the `parse` module is no longer needed
    and that the code is cleaner using the `json` method.


    > This outcome, using already existing tools, is more common than it looks, especially
    when dealing with external interfaces. We may use it in a way that works, but
    maybe it''s not the best. Take a little bit of time to read the documentation
    to keep an eye on improvements and learn how to better use the tools.


    Once this is fixed, the code is run again in *step 14*. Finally, the code is doing
    what''s expected, sorting the names alphabetically by surname. Notice that the
    other name that contained strange characters is fixed as well.'
