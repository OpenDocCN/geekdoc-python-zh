    # Getting ready


    In this recipe, we will use the `movies.csv` file that is available on GitHub
    at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter06/movies.csv.
    It contains the following data:


    | Admissions | Name | Year |

    |---|---|---|

    | 225.7 | Gone With the Wind | 1939 |

    | 194.4 | Star Wars | 1968 |

    | 161.0 | ET: The Extra-Terrestrial | 1982 |


    Figure 6.2: Movie data


    Notice that the `Year` of `Star Wars` is incorrect (the movie was released in
    1977). We''ll change it in this recipe.


    # How to do it...


    +   1. Import the `csv` module and define the filename:

    python

    >>> import csv

    >>> FILENAME = ''movies.csv''


    2. Read the content of the file using `DictReader` and transform this content
    into a list of ordered rows:

    python

    >>> with open(FILENAME, newline='''') as file:

    ...     data = [row for row in csv.DictReader(file)]


    3. Check the obtained data. Change the proper value from 1968 to 1977:

    python

    >>> data

    [{''Admissions'': ''225.7'', ''Name'': ''Gone With the Wind'', ''Year'': ''1939''},
    {''Admissions'': ''194.4'', ''Name'': ''Star Wars'', ''Year'': ''1968''}, {''Admissions'':
    ''161.0'', ''Name'': ''ET: The Extra-Terrestrial'', ''Year'': ''1982''}]

    >>> data[1][''Year'']

    ''1968''

    >>> data[1][''Year''] = ''1977''


    4. Open the file again and store the values:

    python

    >>> HEADER = data[0].keys()

    >>> with open(FILENAME, ''w'', newline='''') as file:

    ...     writer = csv.DictWriter(file, fieldnames=HEADER)

    ...     writer.writeheader()

    ...     writer.writerows(data)'
