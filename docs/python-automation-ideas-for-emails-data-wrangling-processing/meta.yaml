    \ symbols is smaller.\n\nThe `checksum` function generates, based on two codes,\
    \ an extra digit that is derived from the two codes. This process is called **hashing**,\
    \ and it's a well-known process in computing, especially for cryptography.\n\n\
    > The basic functionality of hashing is to produce an output from an input that\
    \ is smaller and is not reversible, meaning it's very difficult to guess unless\
    \ the input is known. Hashing has a lot of common applications in computing, normally\
    \ under the hood. For example, Python dictionaries make extensive use of hashing.\n\
    \nIn our recipe, we'll use SHA256, a well-known fast hashing algorithm included\
    \ in the Python `hashlib` module:\n\n```\ndef checksum(code1, code2):\n    m =\
    \ hashlib.sha256()\n    m.update(code1.encode())\n    m.update(code2.encode())\n\
    \    checksum = int(m.hexdigest()[:2], base=16)\n    digit = CHARACTERS[checksum\
    \ % len(CHARACTERS)]\n    return digit\n```\n\nBoth codes are concatenated as\
    \ input, and the resulting two hex digits of the resulting hash string are used\
    \ to pick the corresponding character from `CHARACTERS`."
  - '[PAGE 363]


    # Why Not Automate Your Marketing Campaign?


    The hash digits get transformed into a base 10 number (as they are in base 16)
    and we apply the `modulo` operator to obtain one of the available characters.


    The objective of this checksum is to be able to quickly check whether a code looks
    like it is correct and discard possible spam. We can produce the operation again
    over a code to see whether the checksum is the same. Note that this is not a cryptographic
    hash, as no secret is required at any point of the operation. Given this specific
    use case, this (low) level of security is probably fine for our purposes.


    > Cryptography is a much bigger theme and ensuring that security is strong can
    be difficult. The main strategy in cryptography involving hashing is probably
    to store just the hash to avoid storing passwords in a readable format. You can
    read a quick introduction to that technique here: https://crackstation.net/hashing-security.htm.


    The `generate_code` function then produces a random code, composed of four digits,
    then five digits, and then two digits of the checksum, divided by dashes. The
    first checksum digit is generated with the first nine digits in right-to-left
    order (using the four-character block as `code1` and the five-character block
    as `code2`). The second checksum digit is generated by reversing them (the five-character
    block as `code1` and the four-character block as `code2`).


    The `check_code` function reverses the process and returns `True` if the code
    is correct, and `False` otherwise.


    With the basic elements in place, the script starts by defining the required batches:
    500,000, 300,000, and 200,000.


    All the codes are generated in the same pool, called `codes`. This is to avoid
    duplicates between batches. Note that, due to the randomness of the process, we
    can''t rule out the possibility of generating duplicated code, though such a possibility
    is small. We are allowed to retry up to three times to avoid generating duplicated
    code. The codes are stored in a set accumulator to guarantee their uniqueness
    and to speed up the process of checking whether a code is already there.


    > Sets is another of the places where Python uses hashing under the hood, so it
    hashes the element to be added and compares it with the hashes of the elements
    already there. This makes checking in sets a very quick operation.'
- md: "To be sure that the process is correct, each code is verified and printed to\
    \ display progress while generating the code. This also allows us to inspect that\
    \ everything is working as expected.\n\nFinally, the codes are divided into the\
    \ proper number of batches and each one is saved in an individual `.csv` file.\
    \ The codes are removed one by one from `codes` using `.pop()` until `batch` is\
    \ the proper size:\n\n```\nbatch = [(codes.pop(),) for _ in range(batch_size)]\n\
    ```\n\nNote how the previous line creates a batch of the proper size of rows with\
    \ a single element. Each row is still a list, as it should be for a CSV file.\n\
    \nThen, a file is created and, using `csv.writer`, the codes are stored as rows.\n\
    \nAs a final test, the remaining codes are verified to make sure they're empty.\n\
    \n## There's more...\n\nIn this recipe, a direct approach was used in the flow.\
    \ This is in opposition to the principles presented in the *Preparing a task to\
    \ run* recipe in *Chapter 2, Automating Tasks Made Easy*. Notice that, compared\
    \ with the tasks presented there, this script is aimed to be run a single time\
    \ to produce the codes, and that's it. It also uses defined constants, such as\
    \ `BATCHES`, for configuration, instead of command-line parameters or config files.\n\
    \nGiven that it is a unique task, designed to be run once, spending time structuring\
    \ it into a reusable component is probably not the best use of our time.\n\n>\
    \ Over-engineering is definitely possible and choosing between a pragmatic design\
    \ and a more future-facing approach may not be easy. Be realistic about maintenance\
    \ costs and try to find your own balance.\n\nIn the same way, the design in this\
    \ recipe on the checksum is aimed to give a minimal way to check whether a code\
    \ is totally made up or looks legit. Given that codes will be checked against\
    \ a system, this seems like a sensible approach, but be aware of your particular\
    \ use case.\n\nOur code space is made up of `22 characters ** 9 digits = 1,207,269,217,792\
    \ possible codes`, meaning the probability of guessing one of the million generated\
    \ is very small. It's also not very likely to produce the same code twice, but\
    \ nevertheless, we protected our code against that with up to three retries.\n\
    \nWhy Not Automate Your Marketing Campaign?\n\nThese kinds of checks, as well\
    \ as checking that each code has been verified and that we end up with no remaining\
    \ codes, are very useful when developing this kind of script. It ensures that\
    \ we are going in the right direction and things are going according to plan.\
    \ Just be aware that `asserts` may not be executed in some conditions.\n\n> As\
    \ described in the Python documentation, `assert` commands are ignored if the\
    \ Python code is optimized (run with the `-O` command). See the documentation\
    \ here: https://docs.python.org/3/reference/simple_stmts.html#the-assert-statement.\
    \ The usage of the `-O` argument is rare, but can be confusing if that's the case.\
    \ Avoid depending heavily on `asserts`.\n\nLearning the basics of cryptography\
    \ is not as difficult as you may think. There are a small number of basic schemes\
    \ that are well-known and can be easily learned. A good introduction article is\
    \ https://thebestvpn.com/cryptography/. Python also has a good number of cryptographic\
    \ functions; see the documentation at https://docs.python.org/3/library/crypto.html.\
    \ The best approach is to find a good book and know that, while it's a difficult\
    \ subject to truly master, it is definitely approachable.\n\n## See also\n\n-\
    \ The *Introducing regular expressions* recipe in *Chapter 1, Let's Begin Our\
    \ Automation Journey*, to learn how to use regular expressions.\n- The *Reading\
    \ CSV files* recipe in *Chapter 4, Searching and Reading Local Files*, to learn\
    \ how to work with CSV files.\n\n## Sending a notification to a customer on their\
    \ preferred channel\n\nIn this chapter, we are presenting a marketing campaign\
    \ divided into several tasks:\n\n1. Detect the best moment to launch the campaign\n\
    2. Generate individual codes to be sent to potential customers\n3. **Send the\
    \ codes directly to users over their preferred channel, text message or email**\n\
    4. Collect the results of the campaign\n5. Generate a sales report with an analysis\
    \ of the results\n\nThis recipe shows *task 3* of the campaign.\n\nOnce our codes\
    \ have been created for direct marketing, we need to distribute them to our customers.\n\
    \nFor this recipe, from an input from a CSV file with the information of all customers\
    \ and their preferred contact methods, we will fill the file with the codes generated\
    \ previously, and then send a notification through the proper method. This will\
    \ include the promotional code.\n\n## Getting ready\n\nIn this recipe, we will\
    \ use several modules already presented: `delorean`, `requests`, and `twilio`.\
    \ We need to add them to our virtual environment, if they're not already there:\n\
    \n```\n$ echo \"delorean==1.0.0\" >> requirements.txt\n$ echo \"requests==2.23.0\"\
    \ >> requirements.txt\n$ echo \"twilio==6.37.0\" >> requirements.txt\n$ pip install\
    \ -r requirements.txt\n```\n\nWe need to define a `config-channel.ini` file with\
    \ our credentials for the services to use, Mailgun and Twilio. A template of this\
    \ file can be found on GitHub here: https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter10/config-channel.ini.\n\
    \n> For information on how to obtain the credentials, refer to the *Sending notifications\
    \ via emails* and *Producing SMS* recipes in *Chapter 9, Dealing with Communication\
    \ Channels*.\n\nThe file has the following format:\n\n```\n[MAILGUN]\nKEY = <YOUR\
    \ KEY>\nDOMAIN = <YOUR DOMAIN>\nFROM = <YOUR FROM EMAIL>\n[TWILIO]\nACCOUNT_SID\
    \ = <YOUR SID>\nAUTH_TOKEN = <YOUR TOKEN>\nFROM = <FROM TWILIO PHONE NUMBER>\n\
    ```\n\nWhy Not Automate Your Marketing Campaign?\n\nFor a description of all the\
    \ contacts to target, we need to generate a CSV file, `notifications.csv`, in\
    \ the following format:\n\n| Name | Contact Method | Target | Status | Code |\
    \ Timestamp |\n|---|---|---|---|---|---|\n| John Smith | PHONE | +1-555-12345678\
    \ | NOT-SENT | | |\n| Paul Smith | EMAIL | paul.smith@test.com | NOT-SENT | |\
    \ |\n\nFigure 10.2: Format of `notifications.csv`\n\nNote that the `Code` column\
    \ is empty and that all the statuses should be `NOT-SENT` or empty.\n\n> If you\
    \ are using a test account in Twilio and Mailgun, be aware of its limitations.\
    \ For example, Twilio only allows you to send messages to authenticated phone\
    \ numbers. You can create a small CSV file with only two or three contacts to\
    \ test the script.\n\nThe coupon codes to be used should be ready in a CSV file.\
    \ You can generate several batches with the `create_personalised_coupons.py` script,\
    \ available on GitHub at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter10/create_personalised_coupons.py.\n\
    \nDownload the script to be used, `send_notifications.py`, from GitHub at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter10/send_notifications.py.\n\
    \n## How to do it...\n\n1. Run `send_notifications.py` to see its options and\
    \ usage:\n\n```\n$ python send_notifications.py --help\nusage: send_notifications.py\
    \ [-h] [-c CODES] [--config CONFIG_FILE] notif_file\n\npositional arguments:\n\
    \  notif_file            notifications file\n\noptional arguments:\n-h, --help\
    \ show this help message and exit\n-c CODES, --codes CODES\nOptional file with\
    \ codes. If present, the file will be populated with codes. No codes will be sent\n\
    --config CONFIG_FILE config file (default config.ini)\n```\n\n2. Add the codes\
    \ to the notifications.csv file:\n\n```\n$ python send_notifications.py --config\
    \ config-channel.ini notifications.csv -c codes_batch_3.csv\n$ head notifications.csv\n\
    Name,Contact Method,Target,Status,Code,Timestamp\nJohn Smith,PHONE,+1-555-12345678,NOT-SENT,CFXK-U37JN-TM,\n\
    Paul Smith,EMAIL,paul.smith@test.com,NOT-SENT,HJGX-M97WE-9Y,\n...\n```\n\n3. Finally,\
    \ send the notifications:\n\n```\n$ python send_notifications.py --config config-channel.ini\
    \ notifications.csv\n$ head notifications.csv\nName,Contact Method,Target,Status,Code,Timestamp\n\
    John Smith,PHONE,+1-555-12345678,SENT,CFXK-U37JN-TM,2018-08-25T13:08:15.908986+00:00\n\
    Paul Smith,EMAIL,paul.smith@test.com,SENT,HJGX-M97WE-9Y,2018-08-25T13:08:16.980951+00:00\n\
    ...\n```\n\n4. Check the emails and phones to verify the messages were received.\n\
    \n## How it works...\n\nStep 1 shows the use of the script. The general idea is\
    \ to call it several times; the first time to fill it with codes, and the second\
    \ time to send the messages. If there's an error, the script can be executed again,\
    \ and only messages not previously sent will be retried."
  mdcn: "为确保流程正确，每个代码都会被验证，并在生成代码时打印以显示进度。这也能让我们检查一切是否按预期工作。\n\n最后，代码被分成适当数量的批次，每个批次保存在一个单独的`.csv`文件中。代码使用`.pop()`从`codes`中逐个移除，直到`batch`达到合适的大小：\n\
    \n```\nbatch = [(codes.pop(),) for _ in range(batch_size)]\n```\n\n注意上一行如何创建一个包含适当行数的批次，每行只有一个元素。每行仍然是一个列表，这对于CSV文件来说是正确的。\n\
    \n然后，创建一个文件，并使用`csv.writer`将代码作为行存储。\n\n作为最后的测试，验证剩余的代码以确保它们为空。\n\n## 还有更多...\n\
    \n在这个食谱中，流程中使用了一种直接的方法。这与*第2章，轻松自动化任务*中的*准备任务运行*食谱中提出的原则相反。请注意，与那里提出的任务相比，此脚本旨在运行一次以生成代码，仅此而已。它还使用定义的常量（如`BATCHES`）进行配置，而不是命令行参数或配置文件。\n\
    \n鉴于这是一个独特的任务，设计为运行一次，花时间将其构建为可重用组件可能不是我们时间的最佳利用方式。\n\n> 过度工程化绝对是可能的，在务实设计和更具前瞻性的方法之间做出选择可能并不容易。要现实地考虑维护成本，并尝试找到自己的平衡点。\n\
    \n同样，这个食谱中关于校验和的设计旨在提供一种最小化的方式来检查代码是完全捏造的还是看起来合法的。鉴于代码将针对系统进行检查，这似乎是一种合理的方法，但请留意您的特定用例。\n\
    \n我们的代码空间由`22个字符 ** 9位数字 = 1,207,269,217,792个可能的代码`组成，这意味着猜测生成的百万个代码之一的概率非常小。产生相同代码两次的可能性也不大，但尽管如此，我们通过最多三次重试来保护我们的代码免受这种情况的影响。\n\
    \n为什么不自动化您的营销活动？\n\n这类检查，以及检查每个代码是否已验证以及我们最终没有剩余代码，在开发此类脚本时非常有用。它确保我们朝着正确的方向前进，并且事情按计划进行。只需注意，在某些条件下`assert`可能不会被执行。\n\
    \n> 如Python文档所述，如果Python代码被优化（使用`-O`命令运行），则`assert`命令将被忽略。请参阅此处的文档：https://docs.python.org/3/reference/simple_stmts.html#the-assert-statement。使用`-O`参数的情况很少见，但如果确实如此，可能会令人困惑。避免严重依赖`assert`。\n\
    \n学习密码学的基础知识并不像您想象的那么困难。有少数基本方案是众所周知的，并且可以轻松学习。一篇很好的介绍文章是https://thebestvpn.com/cryptography/。Python也有大量的加密函数；请参阅https://docs.python.org/3/library/crypto.html处的文档。最好的方法是找到一本好书，并知道虽然这是一个真正掌握起来很困难的主题，但它绝对是可接近的。\n\
    \n## 另请参阅\n\n- *第1章，开始我们的自动化之旅*中的*介绍正则表达式*食谱，以学习如何使用正则表达式。\n- *第4章，搜索和读取本地文件*中的*读取CSV文件*食谱，以学习如何处理CSV文件。\n\
    \n## 通过客户首选渠道向其发送通知\n\n在本章中，我们介绍了一个分为几个任务的营销活动：\n\n1. 检测启动活动的最佳时机\n2. 生成要发送给潜在客户的个人代码\n\
    3. **通过用户首选的渠道（短信或电子邮件）直接将代码发送给用户**\n4. 收集活动结果\n5. 生成包含结果分析的销售报告\n\n此食谱展示了活动的*任务3*。\n\
    \n一旦我们的代码已创建用于直接营销，我们需要将它们分发给我们的客户。\n\n对于这个食谱，从包含所有客户信息及其首选联系方式的CSV文件输入开始，我们将用之前生成的代码填充文件，然后通过适当的方法发送通知。这将包括促销代码。\n\
    \n## 准备工作\n\n在这个食谱中，我们将使用几个已经介绍过的模块：`delorean`、`requests`和`twilio`。如果它们尚未存在于我们的虚拟环境中，我们需要将它们添加进去：\n\
    \n```\n$ echo \"delorean==1.0.0\" >> requirements.txt\n$ echo \"requests==2.23.0\"\
    \ >> requirements.txt\n$ echo \"twilio==6.37.0\" >> requirements.txt\n$ pip install\
    \ -r requirements.txt\n```\n\n我们需要定义一个`config-channel.ini`文件，其中包含我们用于服务的凭据，Mailgun和Twilio。此文件的模板可以在GitHub上找到：https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter10/config-channel.ini。\n\
    \n> 有关如何获取凭据的信息，请参阅*第9章，处理通信渠道*中的*通过电子邮件发送通知*和*生成短信*食谱。\n\n该文件具有以下格式：\n\n```\n\
    [MAILGUN]\nKEY = <YOUR KEY>\nDOMAIN = <YOUR DOMAIN>\nFROM = <YOUR FROM EMAIL>\n\
    [TWILIO]\nACCOUNT_SID = <YOUR SID>\nAUTH_TOKEN = <YOUR TOKEN>\nFROM = <FROM TWILIO\
    \ PHONE NUMBER>\n```\n\n为什么不自动化您的营销活动？\n\n为了描述所有要定位的联系人，我们需要生成一个CSV文件`notifications.csv`，格式如下：\n\
    \n| 姓名 | 联系方式 | 目标 | 状态 | 代码 | 时间戳 |\n|---|---|---|---|---|---|\n| John Smith\
    \ | PHONE | +1-555-12345678 | NOT-SENT | | |\n| Paul Smith | EMAIL | paul.smith@test.com\
    \ | NOT-SENT | | |\n\n图10.2：`notifications.csv`的格式\n\n请注意，`Code`列为空，并且所有状态应为`NOT-SENT`或为空。\n\
    \n> 如果您在Twilio和Mailgun中使用测试账户，请注意其限制。例如，Twilio只允许您向已验证的电话号码发送消息。您可以创建一个仅包含两个或三个联系人的小型CSV文件来测试脚本。\n\
    \n要使用的优惠券代码应准备好在CSV文件中。您可以使用`create_personalised_coupons.py`脚本生成多个批次，该脚本可在GitHub上找到：https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter10/create_personalised_coupons.py。\n\
    \n从GitHub下载要使用的脚本`send_notifications.py`：https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter10/send_notifications.py。\n\
    \n## 如何做...\n\n1. 运行`send_notifications.py`以查看其选项和用法：\n\n```\n$ python send_notifications.py\
    \ --help\nusage: send_notifications.py [-h] [-c CODES] [--config CONFIG_FILE]\
    \ notif_file\n\npositional arguments:\n  notif_file            notifications file\n\
    \noptional arguments:\n-h, --help show this help message and exit\n-c CODES, --codes\
    \ CODES\nOptional file with codes. If present, the file will be populated with\
    \ codes. No codes will be sent\n--config CONFIG_FILE config file (default config.ini)\n\
    ```\n\n2. 将代码添加到notifications.csv文件：\n\n```\n$ python send_notifications.py --config\
    \ config-channel.ini notifications.csv -c codes_batch_3.csv\n$ head notifications.csv\n\
    Name,Contact Method,Target,Status,Code,Timestamp\nJohn Smith,PHONE,+1-555-12345678,NOT-SENT,CFXK-U37JN-TM,\n\
    Paul Smith,EMAIL,paul.smith@test.com,NOT-SENT,HJGX-M97WE-9Y,\n...\n```\n\n3. 最后，发送通知：\n\
    \n```\n$ python send_notifications.py --config config-channel.ini notifications.csv\n\
    $ head notifications.csv\nName,Contact Method,Target,Status,Code,Timestamp\nJohn\
    \ Smith,PHONE,+1-555-12345678,SENT,CFXK-U37JN-TM,2018-08-25T13:08:15.908986+00:00\n\
    Paul Smith,EMAIL,paul.smith@test.com,SENT,HJGX-M97WE-9Y,2018-08-25T13:08:16.980951+00:00\n\
    ...\n```\n\n4. 检查电子邮件和手机以验证消息是否已收到。\n\n## 工作原理...\n\n步骤1展示了脚本的使用。总体思路是多次调用它；第一次用代码填充它，第二次发送消息。如果出现错误，可以再次执行脚本，并且只会重试之前未发送的消息。"
