    \    datetime.datetime(2018, 6, 20, 3, 32, 15)\n\n# How it works...\n\nos.stats\
    \ returns a stats object that represents the metadata stored in the filesystem.\
    \ The metadata includes:\n\n+   - The size of the file, in bytes, as shown in\
