    Follow the instructions to create one. Add the ZIP file:\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_421_0.png)\n\
    \nFigure 11.21: Import the training set\n\nImporting the data will take a few\
    \ minutes. Once it is imported, you'll see all the data available as different\
    \ items:\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_421_1.png)\n\nFigure 11.22:\
    \ The imported data\n\nWith this data, we can now train the model. Click on the\
    \ **TRAIN** tab and then **START TRAINING**, which can take *several hours*, so\
    \ be patient. You'll get an email when it's done:\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_422_0.png)\n\
    \nFigure 11.23: Start the training\n\n> As you can see, to properly label data,\
    \ each label should have 100 examples or more. Our data is not that ambitious.\
    \ The more examples, the better the model will work, though it will take longer\
    \ to train. Keep in mind that training the model requires computing power that\
    \ will be charged to your account. With the free account, the credit should be\
    \ enough to make some tests, but keep in mind potential charges when using the\
    \ platform.\n\nAfter the training is done, you can see the evaluation of the model.\
    \ The system will leave some elements of your training data as tests to evaluate\
    \ how good your model is:\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_422_1.png)\n\
    \nFigure 11.24: Dashboard for evaluating the model\n\nThe two most important parameters\
    \ here are `precision` and `recall`.\n\n> precision is the ability of the model\
    \ to predict the correct label, while recall is the ability to not assign an incorrect\
    \ label. A model with low precision will have more false positives – results with\
    \ labels attached that are not correct. For example, it will detect a smile when\
    \ there isn't one. A model with low recall will produce false negatives – results\
    \ that should have a label attached will not have one. For example, it won't detect\
    \ a smile when there is one.\n\nThe confusion matrix displays the detection patterns\
    \ based on the training data. A perfect matrix will show a 100% diagonal, which\
    \ will mean that the data is properly categorized and there are no mistaken elements.\
    \ You can see that's not the case here.\n\n> Our precision and recall parameters\
    \ of 66.67% are not fantastic. This is in part due to the small number of samples\
    \ generated. In real life, aim to have around 90% or higher.\n\nThe next tab,\
    \ **TEST & USE**, has all the information that we require to use it, but to be\
    \ able to call the API, we need to add the proper permissions to our service account.\n\
    \n> Copy the model reference at the end of the **TEST & USE** tab for Python.\
    \ This will look similar to `projects/<PROJECT_ID>/locations/us-central1/models/<ID>`.\
    \ We will use it later as REFERENCE.\n\nRemember that the service account is linked\
    \ to the credentials. To add them, go to https://console.cloud.google.com/iam-admin/:\n\
    \n## Chapter 11\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_424_0.png)\n\nFigure\
    \ 11.25: Dashboard with the defined users\n\nWe need to add the service account\
    \ as a user and grant it the **AutoML Editor** role. Go to the **Service accounts**\
    \ page to get the name of our created service account:\n\n> Check out the first\
