    # There''s more...


    The full MailChimp API is quite powerful and can perform a large number of tasks.
    Go to the full MailChimp documentation to discover all the possibilities: https://developer.mailchimp.com/.


    > As a brief note, and a little out of scope of this book, please be aware of
    the legal implications of adding subscribers to an automated list. Spam is a serious
    concern and there are new regulations in place to protect the rights of customers,
    such as GDPR. Ensure that you have the permission of users to email them. The
    good thing is that MailChimp automatically implements tools to help with this,
    such as automatic unsubscribe buttons.


    The general MailChimp documentation is also quite interesting and shows a lot
    of possibilities. MailChimp is capable of managing newsletter and general distribution
    lists, but it can also be tailored to generate flows, schedule the sending of
    emails, and automatically send messages to your audience based on parameters such
    as their birthday.


    # See also


    +   - The *Sending an individual email* recipe, earlier in this chapter, to see
    the differences between sending an email directly without this kind of tool

    - The *Sending notification emails* recipe, next, to learn how to send emails
    tailored to a specific user for an action


    # Sending notifications via email


    In this recipe, we will cover how to send emails to customers. Transactional emails
    are sent in response to an action by a user, such as confirmation or alert emails.
    Due to spam protection and other limitations, it is better to implement this kind
    of email with the help of external tools.


    In this recipe, we will use **Mailgun** (https://www.mailgun.com), which is able
    to send these kinds of emails, as well as communicate responses.


    # Getting ready


    We''ll need to create an account with Mailgun. Go to https://signup.mailgun.com
    to create one. Notice that the credit card information is optional.'
- md: "## Dealing with Communication Channels\n\nOnce registered, go to **Domains**\
    \ to see there's a sandbox environment. We can use it to test Mailgun's functionality,\
    \ although it will only send emails to registered test email accounts. The API\
    \ credentials will be displayed there:\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_329_0.png)\n\
    \nFigure 9.5: Domain information in Mailgun\n\nWe need to register the account\
    \ so we'll receive the email as an *authorized recipient*. You can add it here:\n\
    \n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_329_1.png)\n\nFigure 9.6: Verifying\
    \ an account using Mailgun\n\nTo verify the account, check the email of the authorized\
    \ recipient and confirm it. The email address is now ready to receive test emails:\n\
    \n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_330_0.png)\n\nFigure 9.7: The account\
    \ is ready to receive test emails\n\nWe will use the `requests` module to connect\
    \ to the Mailgun API. Install it in the virtual environment:\n\n```\n$ echo \"\
    requests==2.23\" >> requirements.txt\n$ pip install -r requirements.txt\n```\n\
    \nEverything is ready to send emails, but notice that you can only send emails\
    \ to authorized recipients. Being able to send emails everywhere requires us to\
    \ set up a domain. Follow the Mailgun documentation for that: `https://documentation.mailgun.com/en/latest/quickstart-sending.html#verify-your-domain`.\n\
    \n## How to do it...\n\n1. Import the `requests` module:\n   ```python\n   >>>\
    \ import requests\n   ```\n\n2. Prepare the credentials, as well as the to and\
    \ from emails. Note we're using a mock from:\n   ```python\n   >>> KEY = 'YOUR-SECRET-KEY'\n\
    \   >>> DOMAIN = 'YOUR-DOMAIN.mailgun.org'\n   >>> TO = 'YOUR-AUTHORISED-RECEIVER'\n\
    \   >>> FROM = f'sender@{DOMAIN}'\n   >>> auth = ('api', KEY)\n   ```\n\n3. Prepare\
    \ the email to be sent. Here, there is an HTML version and an alternative plain\
    \ text one:\n   ```python\n   >>> text = \"Hi!\\nThis is the text version linking\
    \ to https://www.packtpub.com/\\nCheers!\"\n   >>> html = '''<html><head></head><body>\n\
    \   ...     <p>Hi!<br>\n   ...         This is the HTML version linking to <a\
    \ href=\"https://www.packtpub.com/\">Packt</a><br>\n   ...     </p>\n   ... </body></html>'''\n\
    \   ```\n\n4. Set up the data to send to Mailgun:\n   ```python\n   >>> data =\
    \ {\n   ...     'from': f'Sender <{FROM}>',\n   ...     'to': f'Jaime Buelta <{TO}>',\n\
    \   ...     'subject': 'An interesting email!',\n   ...     'text': text,\n  \
    \ ...     'html': html,\n   ... }\n   ```\n\n5. Make the call to the API:\n  \
    \ ```python\n   >>> response = requests.post(f\"https://api.mailgun.net/v3/{DOMAIN}/messages\"\
    , auth=auth, data=data)\n   >>> response.json()\n   {'id': '<YOUR-ID.mailgun.org>',\
    \ 'message': 'Queued. Thank you.'}\n   ```\n\n6. Retrieve the events and check\
    \ the email has been delivered:\n   ```python\n   >>> response_events = requests.get(f'https://api.mailgun.net/v3/{DOMAIN}/events',\
    \ auth=auth)\n   >>> response_events.json()['items'][0]['recipient'] == TO\n \
    \  True\n   >>> response_events.json()['items'][0]['event']\n   'delivered'\n\
    \   ```\n\n7. The email should appear in your inbox. As it was sent through the\
    \ sandbox environment, be sure to check your spam folder if it doesn't show up\
    \ directly.\n\n## How it works...\n\nStep 1 imports the requests module to be\
    \ used later. The credentials and the basic information in the message are defined\
    \ in step 2, and should be extracted from the Mailgun web interface, as shown\
    \ previously.\n\nStep 3 defines the email that will be sent. Step 4 structures\
    \ the information in the way Mailgun expects. Notice the html and text fields.\
    \ By default, it will set HTML as the preferred option and the plain text option\
    \ as an alternative. The format for TO and FROM should be in the Name <address>\
    \ format. You can use commas to separate multiple recipients in TO.\n\nThe call\
    \ to the API is made in step 5. It is a POST call to the messages endpoint. The\
    \ data is transferred in the standard way, and basic authentication is used with\
    \ the auth parameter. Notice the definition in step 2. All calls to Mailgun should\
    \ include this auth parameter. It returns a message, notifying you that it was\
    \ successful, and then the message is queued.\n\nIn step 6, a call to retrieve\
    \ the events through a GET request is made. This will show the latest actions\
    \ performed, the last of which will be the recent send. Information about delivery\
    \ status can also be found here.\n\n## There's more...\n\nTo send emails, you'll\
    \ need to set up the domain with which to send it, instead of using the sandbox\
    \ environment. You can find the instructions on how to do this here: https://documentation.mailgun.com/en/latest/quickstart-sending.html#verify-your-domain.\
    \ This requires you to change your DNS records to verify that you are the legitimate\
    \ owner of the domain. This also increases the deliverability of emails.\n\nThe\
    \ emails can include attachments in the following way:\n\n```python\nattachments\
    \ = [\n    (\"attachment\",\n        (\"attachment1.jpg\", open(\"image.jpg\"\
    ,\"rb\").read())\n    ),\n    (\"attachment\",\n        (\"attachment2.txt\",\
    \ open(\"text.txt\",\"rb\").read())\n    )]\nresponse = requests.post(f\"https://api.mailgun.net/v3/{DOMAIN}/messages\"\
    ,\n                        auth=auth, files=attachments, data=data)\n```\n\nNotice\
    \ the structure of (`\"attachment\"`, (`<filename>`, `<binary data>`)).\n\nThe\
    \ data can include the usual information such as `cc` or `bcc`, but you can also\
    \ delay the delivery for up to three days with the `o:deliverytime` parameter:\n\
    \n```python\nimport datetime\nimport email.utils\ndelivery_time = datetime.datetime.now()\
    \ + datetime.timedelta(days=1)\ndata = {\n    ...\n    'o:deliverytime': email.utils.format_datetime(delivery_time),\n\
    }\n```\n\nMailgun can also be used to receive emails and to trigger processes\
    \ when they arrive; for example, forwarding them based on rules. Check the Mailgun\
    \ documentation to find out more.\n\nThe full Mailgun documentation can be found\
    \ here: `https://documentation.mailgun.com/en/latest/quickstart.html`. Be sure\
    \ to check their *Best Practices* section at (`https://documentation.mailgun.com/en/latest/best_practices.html#email-best-practices`)\
    \ to understand the world of sending emails and how to avoid them being labeled\
    \ as spam.\n\n## See also\n\n- The *Working with email templates* recipe, earlier\
    \ in this chapter, to learn how to style emails using templates\n- The *Sending\
    \ an individual email* recipe, earlier in this chapter, to learn how to send emails\
    \ directly from Python, instead of using an external service\n\n## Producing SMS\
    \ messages\n\nOne of the most widely available communication channels is text\
    \ messages. Text messages are very convenient to use to distribute information.\n\
    \n> SMS messages can be used for marketing purposes, but also as a way of alerting\
    \ or sending notifications, or, very common recently, as a way of implementing\
    \ two-factor authentication systems.\n\nWe will use **Twilio**, a service that\
    \ exposes APIs to send SMS easily.\n\n## Getting ready\n\nWe need to create an\
    \ account for Twilio at https://www.twilio.com/. Go to the page and register a\
    \ new account.\n\nYou'll need to follow the instructions and set up a phone number\
    \ to receive messages. You will need to input a code sent to this phone or receive\
    \ a call to verify the phone line is correct.\n\nCreate a new project and check\
    \ the dashboard. From there, you'll be able to create your first phone number\
    \ so that you can receive and send SMS:\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_334_0.png)\n\
    \nOnce the number has been configured, it will appear in the **Active Numbers**\
    \ section in **All Products and Services -> Phone Numbers**.\n\nOn the main dashboard,\
    \ check `ACCOUNT SID` and `AUTH TOKEN`. They'll be used later. Notice you'll need\
    \ to display the auth token.\n\nWe'll also need to install the twilio module.\
    \ Add it to your virtual environment:\n\n```\n$ echo \"twilio==6.37.0\" >> requirements.txt\n\
    $ pip install -r requirements.txt\n```\n\nNotice that the receiver phone number\
    \ can only be a verified number with a trial account. You can verify more than\
    \ one number; follow the documentation at https://support.twilio.com/hc/en-us/articles/223180048-Adding-a-Verified-Phone-Number-or-Caller-ID-with-Twilio.\n\
    \n## How to do it...\n\n1. Import Client from the twilio module:\n   ```python\n\
    \   >>> from twilio.rest import Client\n   ```\n\n2. Set up the authentication\
    \ credentials obtained from the dashboard previously. Also, set your Twilio phone\
    \ number; as an example, here, we set +353 12 345 6789, a fake Irish number. It\
    \ will be local to your country:\n   ```python\n   >>> ACCOUNT_SID = 'Your account\
    \ SID'\n   >>> AUTH_TOKEN = 'Your secret token'\n   >>> FROM = '+353 12 345 6789'\n\
    \   ```\n\n3. Start the client to access the API:\n   ```python\n   >>> client\
    \ = Client(ACCOUNT_SID, AUTH_TOKEN)\n   ```\n\n4. Send a message to your authorized\
    \ phone number. Notice the underscore at the end of from_:\n   ```python\n   >>>\
    \ message = client.messages.create(body='This is a test message from Python!',\n\
    \                                      from_=FROM,\n                         \
    \             to='+your authorised number')\n   ```\n\n5. You'll receive an SMS\
    \ on your phone:"
  mdcn: "## 处理通信渠道\n\n注册完成后，前往**域名**页面，你会看到一个沙盒环境。我们可以用它来测试 Mailgun 的功能，不过它只能向已注册的测试邮箱账户发送邮件。API\
    \ 凭据会显示在那里：\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_329_0.png)\n\n图 9.5：Mailgun\
    \ 中的域名信息\n\n我们需要注册账户，这样我们才能作为*授权收件人*接收邮件。你可以在这里添加：\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_329_1.png)\n\
    \n图 9.6：使用 Mailgun 验证账户\n\n要验证账户，请检查授权收件人的邮箱并确认。该邮箱地址现在就可以接收测试邮件了：\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_330_0.png)\n\
    \n图 9.7：账户已准备好接收测试邮件\n\n我们将使用 `requests` 模块连接到 Mailgun API。在虚拟环境中安装它：\n\n```\n\
    $ echo \"requests==2.23\" >> requirements.txt\n$ pip install -r requirements.txt\n\
    ```\n\n一切准备就绪，可以发送邮件了，但请注意，你只能向授权收件人发送邮件。要能够向任何地方发送邮件，我们需要设置一个域名。请按照 Mailgun 的文档操作：`https://documentation.mailgun.com/en/latest/quickstart-sending.html#verify-your-domain`。\n\
    \n## 操作步骤...\n\n1. 导入 `requests` 模块：\n   ```python\n   >>> import requests\n \
    \  ```\n\n2. 准备凭据，以及收件人和发件人邮箱。注意我们使用了一个模拟的发件人：\n   ```python\n   >>> KEY = 'YOUR-SECRET-KEY'\n\
    \   >>> DOMAIN = 'YOUR-DOMAIN.mailgun.org'\n   >>> TO = 'YOUR-AUTHORISED-RECEIVER'\n\
    \   >>> FROM = f'sender@{DOMAIN}'\n   >>> auth = ('api', KEY)\n   ```\n\n3. 准备要发送的邮件。这里有一个\
    \ HTML 版本和一个备选的纯文本版本：\n   ```python\n   >>> text = \"Hi!\\nThis is the text version\
    \ linking to https://www.packtpub.com/\\nCheers!\"\n   >>> html = '''<html><head></head><body>\n\
    \   ...     <p>Hi!<br>\n   ...         This is the HTML version linking to <a\
    \ href=\"https://www.packtpub.com/\">Packt</a><br>\n   ...     </p>\n   ... </body></html>'''\n\
    \   ```\n\n4. 设置要发送给 Mailgun 的数据：\n   ```python\n   >>> data = {\n   ...     'from':\
    \ f'Sender <{FROM}>',\n   ...     'to': f'Jaime Buelta <{TO}>',\n   ...     'subject':\
    \ 'An interesting email!',\n   ...     'text': text,\n   ...     'html': html,\n\
    \   ... }\n   ```\n\n5. 调用 API：\n   ```python\n   >>> response = requests.post(f\"\
    https://api.mailgun.net/v3/{DOMAIN}/messages\", auth=auth, data=data)\n   >>>\
    \ response.json()\n   {'id': '<YOUR-ID.mailgun.org>', 'message': 'Queued. Thank\
    \ you.'}\n   ```\n\n6. 检索事件并确认邮件已送达：\n   ```python\n   >>> response_events = requests.get(f'https://api.mailgun.net/v3/{DOMAIN}/events',\
    \ auth=auth)\n   >>> response_events.json()['items'][0]['recipient'] == TO\n \
    \  True\n   >>> response_events.json()['items'][0]['event']\n   'delivered'\n\
    \   ```\n\n7. 邮件应该会出现在你的收件箱中。由于它是通过沙盒环境发送的，如果它没有直接显示，请务必检查你的垃圾邮件文件夹。\n\n## 工作原理...\n\
    \n步骤 1 导入了 requests 模块以供后续使用。步骤 2 定义了凭据和邮件的基本信息，这些信息应该从 Mailgun 的 Web 界面中提取，如前所示。\n\
    \n步骤 3 定义了将要发送的邮件。步骤 4 按照 Mailgun 期望的方式组织信息。注意 html 和 text 字段。默认情况下，它会将 HTML 设置为首选选项，纯文本选项作为备选。TO\
    \ 和 FROM 的格式应为 `Name <address>` 格式。你可以在 TO 中使用逗号分隔多个收件人。\n\n步骤 5 进行了 API 调用。这是一个向\
    \ messages 端点发起的 POST 调用。数据以标准方式传输，并使用 auth 参数进行基本身份验证。注意步骤 2 中的定义。所有对 Mailgun\
    \ 的调用都应包含此 auth 参数。它返回一条消息，通知你操作成功，然后消息被加入队列。\n\n在步骤 6 中，通过 GET 请求调用以检索事件。这将显示最近执行的操作，其中最后一个将是最近的发送操作。有关投递状态的信息也可以在这里找到。\n\
    \n## 更多内容...\n\n要发送邮件，你需要设置用于发送的域名，而不是使用沙盒环境。你可以在这里找到如何操作的说明：https://documentation.mailgun.com/en/latest/quickstart-sending.html#verify-your-domain。这需要你更改\
    \ DNS 记录以验证你是该域名的合法所有者。这也能提高邮件的送达率。\n\n邮件可以通过以下方式包含附件：\n\n```python\nattachments\
    \ = [\n    (\"attachment\",\n        (\"attachment1.jpg\", open(\"image.jpg\"\
    ,\"rb\").read())\n    ),\n    (\"attachment\",\n        (\"attachment2.txt\",\
    \ open(\"text.txt\",\"rb\").read())\n    )]\nresponse = requests.post(f\"https://api.mailgun.net/v3/{DOMAIN}/messages\"\
    ,\n                        auth=auth, files=attachments, data=data)\n```\n\n注意\
    \ (`\"attachment\"`, (`<filename>`, `<binary data>`) 的结构。\n\n数据可以包含通常的信息，如 `cc`\
    \ 或 `bcc`，但你也可以使用 `o:deliverytime` 参数将投递延迟最多三天：\n\n```python\nimport datetime\n\
    import email.utils\ndelivery_time = datetime.datetime.now() + datetime.timedelta(days=1)\n\
    data = {\n    ...\n    'o:deliverytime': email.utils.format_datetime(delivery_time),\n\
    }\n```\n\nMailgun 也可用于接收邮件，并在邮件到达时触发流程；例如，根据规则转发邮件。请查阅 Mailgun 文档以了解更多信息。\n\n\
    完整的 Mailgun 文档可以在这里找到：`https://documentation.mailgun.com/en/latest/quickstart.html`。请务必查看他们的*最佳实践*部分（`https://documentation.mailgun.com/en/latest/best_practices.html#email-best-practices`），以了解发送邮件的世界以及如何避免邮件被标记为垃圾邮件。\n\
    \n## 另请参阅\n\n- 本章前面的*使用电子邮件模板*食谱，学习如何使用模板为邮件设置样式\n- 本章前面的*发送单个电子邮件*食谱，学习如何直接从\
    \ Python 发送邮件，而不是使用外部服务\n\n## 生成短信\n\n最广泛可用的通信渠道之一是短信。短信在分发信息方面非常方便。\n\n> 短信可用于营销目的，也可用作警报或发送通知的方式，或者最近非常常见的是，作为实现双因素认证系统的一种方式。\n\
    \n我们将使用 **Twilio**，一个提供 API 以轻松发送短信的服务。\n\n## 准备工作\n\n我们需要在 https://www.twilio.com/\
    \ 为 Twilio 创建一个账户。访问该页面并注册一个新账户。\n\n你需要按照说明设置一个电话号码来接收消息。你需要输入发送到此电话的代码或接听电话以验证电话线路是否正确。\n\
    \n创建一个新项目并查看仪表板。从那里，你将能够创建你的第一个电话号码，以便接收和发送短信：\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_334_0.png)\n\
    \n号码配置完成后，它将出现在**所有产品和服务 -> 电话号码**的**活跃号码**部分。\n\n在主仪表板上，查看 `ACCOUNT SID` 和 `AUTH\
    \ TOKEN`。它们将在后面使用。注意你需要显示 auth token。\n\n我们还需要安装 twilio 模块。将其添加到你的虚拟环境中：\n\n```\n\
    $ echo \"twilio==6.37.0\" >> requirements.txt\n$ pip install -r requirements.txt\n\
    ```\n\n请注意，对于试用账户，接收方电话号码只能是已验证的号码。你可以验证多个号码；请按照 https://support.twilio.com/hc/en-us/articles/223180048-Adding-a-Verified-Phone-Number-or-Caller-ID-with-Twilio\
    \ 中的文档操作。\n\n## 操作步骤...\n\n1. 从 twilio 模块导入 Client：\n   ```python\n   >>> from\
    \ twilio.rest import Client\n   ```\n\n2. 设置之前从仪表板获取的身份验证凭据。同时，设置你的 Twilio 电话号码；例如，这里我们设置\
    \ +353 12 345 6789，一个虚构的爱尔兰号码。它应该是你所在国家的本地号码：\n   ```python\n   >>> ACCOUNT_SID\
    \ = 'Your account SID'\n   >>> AUTH_TOKEN = 'Your secret token'\n   >>> FROM =\
    \ '+353 12 345 6789'\n   ```\n\n3. 启动客户端以访问 API：\n   ```python\n   >>> client\
    \ = Client(ACCOUNT_SID, AUTH_TOKEN)\n   ```\n\n4. 向你的授权电话号码发送消息。注意 from_ 末尾的下划线：\n\
    \   ```python\n   >>> message = client.messages.create(body='This is a test message\
    \ from Python!',\n                                      from_=FROM,\n        \
    \                              to='+your authorised number')\n   ```\n\n5. 你将在手机上收到一条短信："
