    has a good number of cryptographic functions; see the documentation at https://docs.python.org/3/library/crypto.html.
    The best approach is to find a good book and know that, while it''s a difficult
    subject to truly master, it is definitely approachable.


    # See also


    +   - The *Introducing regular expressions* recipe in *Chapter 1, Let''s Begin
    Our Automation Journey*, to learn how to use regular expressions.

    - The *Reading CSV files* recipe in *Chapter 4, Searching and Reading Local Files*,
    to learn how to work with CSV files.


    # Sending a notification to a customer on their preferred channel


    In this chapter, we are presenting a marketing campaign divided into several tasks:


    +   1. Detect the best moment to launch the campaign

    2. Generate individual codes to be sent to potential customers

    3. **Send the codes directly to users over their preferred channel, text message
    or email**

    4. Collect the results of the campaign

    5. Generate a sales report with an analysis of the results'
  - '[PAGE 366]


    This recipe shows *task 3* of the campaign.


    Once our codes have been created for direct marketing, we need to distribute them
    to our customers.


    For this recipe, from an input from a CSV file with the information of all customers
    and their preferred contact methods, we will fill the file with the codes generated
    previously, and then send a notification through the proper method. This will
    include the promotional code.


    # Getting ready


    In this recipe, we will use several modules already presented: `delorean`, `requests`,
    and `twilio`. We need to add them to our virtual environment, if they''re not
    already there:


    ```

    $ echo "delorean==1.0.0" >> requirements.txt

    $ echo "requests==2.23.0" >> requirements.txt

    $ echo "twilio==6.37.0" >> requirements.txt

    $ pip install -r requirements.txt

    ```


    We need to define a `config-channel.ini` file with our credentials for the services
    to use, Mailgun and Twilio. A template of this file can be found on GitHub here:
    https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter10/config-channel.ini.


    > For information on how to obtain the credentials, refer to the *Sending notifications
    via emails* and *Producing SMS* recipes in *Chapter 9, Dealing with Communication
    Channels*.


    The file has the following format:


    ```

    [MAILGUN]

    KEY = <YOUR KEY>

    DOMAIN = <YOUR DOMAIN>

    FROM = <YOUR FROM EMAIL>

    [TWILIO]

    ACCOUNT_SID = <YOUR SID>

    AUTH_TOKEN = <YOUR TOKEN>

    FROM = <FROM TWILIO PHONE NUMBER>

    ```'
