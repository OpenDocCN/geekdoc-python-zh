    \ page, text)\n\n    return get_links(parsed_source, page)\n```\n\nThe code here\
    \ downloads the file and checks that the status is correct to skip errors such\
    \ as broken links. This code also checks that the type (as described in `Content-Type`)\
    \ is an HTML page to skip PDFs and other formats. Finally, it parses the raw HTML\
