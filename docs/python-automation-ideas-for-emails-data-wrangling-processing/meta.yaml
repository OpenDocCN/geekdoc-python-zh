    Generating Fantastic Reports


    Check the table of contents at the end:


    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_185_0.png)


    # How it works...


    Let''s take a look at each of the elements of the script.


    `structuredPDF` defines a class that inherits from `FPDF`. This is useful to overwrite
    the `footer` method, which creates a footer for each of the pages at generation
    time. It also helps simplify the code in `main`.


    The `main` function creates the document. It starts the document and adds each
    of the chapters, collecting their link information. Finally, it calls the `toc`
    method to generate a table of contents using the link information.


    > The text to be stored is generated by multiplying the `LOREM_IPSUM` text, which
    is a placeholder.'
  - '[PAGE 186]


    The `chapter` method first prints a title section, and then adds each of the paragraphs.
    It collects the page number the chapter starts on and the link returned by the
    `title_text` method to return them.


    The `title_text` method writes the text in bigger and bolder text. Then, it adds
    a line to separate the title from the body of the chapter. It generates and sets
    a `link` object pointing to the current page in the following lines:


    ```

    link = self.add_link()

    self.set_link(link)

    ```


    This link will be used in the table of contents to add a clickable element that
    points to this chapter.


    The `footer` method automatically adds a footer to each page. It sets a smaller
    font, and it adds text with the current page (obtained through `page_no`) and
    uses `{nb}`, which will be replaced with the total number of pages.


    > The call to `.alias_nb_pages()` in main ensures `{nb}` is replaced when the
    document is generated.


    Finally, the table of contents is generated in the `toc` method. It writes the
    title and adds all the referenced links that have been collected as the link,
    page, and chapter name, which is all the info required.


    # There''s more...


    Notice the use of `randint` to add a bit of randomness to the document. This call,
    available in Python''s standard library, returns a random number between the defined
    maximum and minimum. Both are included.


    The `get_full_line` method generates a properly sized line for the table of contents.
    It takes a start (the name of the chapter) and end (the page number), and adds
    the number of fill characters (dots) until the line has the proper width (120
    mm).


    To calculate the size of the text, the script calls `get_string_width`, which
    takes into account the font and the size.


    Link objects can be used to point to a specific page, instead of the current one,
    and also not to the start of the page. To tweak the call, use `set_link(link,
    y=place, page=num_page)`. Check the documentation at http://pyfpdf.readthedocs.io/en/latest/reference/set_link/index.html.'
