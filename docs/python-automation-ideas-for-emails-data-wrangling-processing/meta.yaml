  md: '4. Collect the results of the campaign

    5. Generate a sales report with an analysis of the results


    This recipe shows *task 2* of the campaign.


    After an opportunity has been detected, we decide to generate a campaign for all
    customers. To direct promotions and avoid duplication, we will generate 1 million
    unique coupons, divided into three batches:


    +   - Half of the codes will be printed and distributed in a marketing action.

    - 300,000 codes will be reserved to be used later if the campaign hits some goals.

    - The remaining 200,000 will be directed to customers through SMS and emails.


    These coupons can be redeemed in the online system. Our task will be to generate
    the proper codes, which should meet the following requirements:


    +   - The codes need to be unique.

    - The codes need to be printable and easy to read, as some customers will be dictating
    them over the phone.

    - There should be a quick way to discard fake codes. This will avoid attacks with
    random codes that could overload the system.

    - The codes should be presented in CSV format for printing.


    # Getting ready


    Download the `create_personalised_coupons.py` script, which will generate the
    coupons in CSV files, from GitHub at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter10/create_personalised_coupons.py.


    # How to do it...


    1. Call the `create_personalised_coupons.py` script. It will take a minute or
    two to run, depending on your processor speed. It will display the generated codes
    onscreen:


    ```

    $ python create_personalised_coupons.py

    Code: HWLF-P9J9E-U3

    Code: EAUE-FRCWR-WM

    Code: PMW7-P39MP-KT

    ...

    ```'
