    ...

    ```


    4. Check the emails and phones to verify the messages were received.


    # How it works...


    Step 1 shows the use of the script. The general idea is to call it several times;
    the first time to fill it with codes, and the second time to send the messages.
    If there''s an error, the script can be executed again, and only messages not
    previously sent will be retried.'
- md: "## Why Not Automate Your Marketing Campaign?\n\nThe `notifications.csv` file\
    \ gets the codes that will be injected in *step 2*. The codes are finally sent\
    \ in *step 3*.\n\nLet's analyze the code of `send_notifications.py`. Only the\
    \ most relevant bits are shown here:\n\n```python\n# IMPORTS\n\ndef send_phone_notification(...):\n\
    def send_email_notification(...):\ndef send_notification(...):\n\ndef save_file(...):\n\
    def main(...):\n\nif __name__ == '__main__':\n    # Parse arguments and prepare\
    \ configuration\n    ...\n```\n\nThe main function goes through the file line\
    \ by line and analyzes what to do in each case. If the entry is SENT, it skips\
    \ it. If it has no code, it tries to fill it. If it tries to send it, it will\
    \ attach the timestamp to record when it was sent or tried to be sent.\n\nFor\
    \ each entry, the whole file is saved again in a file called `save_file`. Notice\
    \ how the file cursor is positioned at the start of the file. The file is written\
    \ and then flushed to disk:\n\n```python\ndef save_file(notif_file, data):\n \
    \   \"\"\"\n    Overwrite the file with the new information\n    \"\"\"\n\n  \
    \  # Start at the start of the file\n    notif_file.seek(0)\n\n    header = data[0].keys()\n\
    \    writer = csv.DictWriter(notif_file, fieldnames=header)\n    writer.writeheader()\n\
    \    writer.writerows(data)\n\n    # Be sure to write to disk\n    notif_file.flush()\n\
    ```\n\nThis overwrites the file on each entry operation, without us having to\
    \ close and open the file again.\n\n> Why write the whole file for each entry?\
    \ This is an easy way to store each of the operations and allows you to retry\
    \ the sending process. For example, if an entry produces an unexpected error or\
    \ a timeout, or even if there's a general failure, all the progress and previous\
    \ codes will be marked as SENT already and won't be sent a second time. This means\
    \ the operation can be retried as needed. For a big number of entries, this is\
    \ a good way of ensuring that a problem in the middle of the process doesn't make\
    \ us resend messages to our customers.\n\nFor a huge number of rows, we may risk\
    \ having a problem with saving the file. This can cause the file to get corrupted\
    \ by an unexpected error while writing or taking too long to save. If that's the\
    \ case, split the file into independent batches that can be treated independently.\
    \ For very big processes, a system that guarantees the data won't get corrupted,\
    \ like using a database, may be required.\n\nFor each code to be sent, the `send_notification`\
    \ function decides to call either `send_phone_notification` or `send_email_notification`.\
    \ It appends the current time in both cases.\n\nBoth `send` functions return an\
    \ error if they can't send the message. This allows you to mark it in the resulting\
    \ `notifications.csv` file and retry it later.\n\n> The `notifications.csv` file\
    \ can also be changed manually. For example, imagine there's a typo in an email\
    \ and that's the reason for the error. It can be changed and retried.\n\n`send_email_notification`\
    \ sends the message based on the Mailgun interface. For more information, refer\
    \ to the *Sending notifications via emails* recipe in *Chapter 9, Dealing with\
    \ Communication Channels*. Note that the email sent here is text only.\n\n`send_phone_notification`\
    \ sends the message based on the Twilio interface. For more information, refer\
    \ to the *Producing SMS* recipe in *Chapter 9, Dealing with Communication Channels*.\n\
    \n## There's more...\n\nTimestamps have been deliberately written in ISO format,\
    \ as it is a parsable format. This means that we can get back a proper object\
    \ in an easy way, like this:\n\n```python\n>>> import datetime\n>>> timestamp\
    \ = datetime.datetime.now(datetime.timezone.utc).isoformat()\n>>> timestamp\n\
    '2018-08-25T14:13:53.772815+00:00'\n>>> datetime.datetime.fromisoformat(timestamp)\n\
    datetime.datetime(2018, 9, 11, 21, 5, 41, 979567, tzinfo=datetime.timezone.utc)\n\
    ```\n\nThis allows you to easily parse the timestamp back and forth.\n\n> ISO\
    \ 8601 time format is well supported in most programming languages and precisely\
    \ defines the time as it includes the time zone. It is an excellent choice for\
    \ recording times, if you can use it.\n\nThe strategy used in `send_notification`\
    \ to route the notifications is an interesting one:\n\n```python\n# Route each\
    \ of the notifications\nMETHOD = {\n    'PHONE': send_phone_notification,\n  \
    \  'EMAIL': send_email_notification,\n}\ntry:\n    method = METHOD[entry['Contact\
    \ Method']]\n    result = method(entry, config)\nexcept KeyError:\n    result\
    \ = 'INVALID_METHOD'\n```\n\nThe `METHOD` dictionary assigns each of the possible\
    \ `Contact Methods` to a function that has the same definition, accepting both\
    \ an entry and a config.\n\nThen, based on the specific method, the function is\
    \ retrieved from the dictionary and called. Note that the `method` variable contains\
    \ the correct function to call.\n\n> This acts in a similar way to the `switch`\
    \ operation that is available in other programming languages. It is also possible\
    \ to achieve this through `if...else` blocks. For simple cases like this code,\
    \ the dictionary method makes the code very readable.\n\nThe `invalid_method`\
    \ function is used as a default. If `Contact Method` is not one of the available\
    \ ones (`PHONE` or `EMAIL`), a `KeyError` will be raised and captured, and the\
    \ result will be defined as `INVALID_METHOD`.\n\n## See also\n\n- The *Sending\
    \ notifications via emails* recipe in *Chapter 9, Dealing with Communication Channels*,\
    \ to learn how to send emails through Mailgun.\n- The *Producing SMS* recipe in\
    \ *Chapter 9, Dealing with Communication Channels*, to learn how to send text\
    \ messages using Twilio.\n\n## Preparing sales information\n\nIn this chapter,\
    \ we are presenting a marketing campaign divided into several tasks:\n\n- Detect\
    \ the best moment to launch the campaign\n- Generate individual codes to be sent\
    \ to potential customers\n- Send the codes directly to users over their preferred\
    \ channel, text message or email\n- **Collect the results of the campaign**\n\
    - Generate a sales report with an analysis of the results\n\nThis recipe shows\
    \ *task 4* of the campaign.\n\nAfter sending the information to users, we need\
    \ to collect the sales logs from the shops to monitor how it is going and how\
    \ big the campaign's impact is.\n\nThe sales logs are reported as individual files\
    \ from each of the associated shops, so in this recipe, we'll see how to aggregate\
    \ all the info into a spreadsheet to be able to treat the information as a whole.\n\
    \n## Getting ready\n\nFor this recipe, we need to install the following modules:\n\
    \n```bash\n$ echo \"openpyxl==3.0.3\" >> requirements.txt\n$ echo \"parse==1.15.0\"\
    \ >> requirements.txt\n$ echo \"delorean==1.0.0\" >> requirements.txt\n$ pip install\
    \ -r requirements.txt\n```\n\nWe can obtain a test structure and test logs for\
    \ this recipe from GitHub at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter10/sales.\
    \ Please download the full sales directory, which contains a lot of test logs.\
    \ To display the structure, we'll use the tree command (http://mama.indstate.edu/users/ice/tree/),\
    \ which is installed by default in Linux and can be installed using brew in macOS\
    \ (https://brew.sh/). You can use a graphical tool to inspect the directory as\
    \ well.\n\nWe'll also need the sale_log.py module and the parse_sales_log.py script,\
    \ available on GitHub at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter10/parse_sales_log.py.\n\
    \n## How to do it...\n\n1. Check the structure of the sales directory. Each subdirectory\
    \ represents a shop that has submitted its sales logs for the specified period:\n\
    \n```bash\n$ tree sales\nsales\n├── 345\n│   └── logs.txt\n├── 438\n│   ├── logs_1.txt\n\
    │   ├── logs_2.txt\n│   ├── logs_3.txt\n│   └── logs_4.txt\n└── 656\n    └── logs.txt\n\
    ```\n\n2. Check the log files:\n\n```bash\n$ head sales/438/logs_1.txt\n[2018-08-27\
    \ 21:05:55+00:00] - SALE - PRODUCT: 12346 - PRICE: $02.99 - NAME: Single item\
    \ - DISCOUNT: 0%\n[2018-08-27 22:05:55+00:00] - SALE - PRODUCT: 12345 - PRICE:\
    \ $07.99 - NAME: Family pack - DISCOUNT: 20%\n...\n```\n\n3. Call the `parse_sales_log.py`\
    \ script to generate the repository:\n\n```bash\n$ python parse_sales_log.py sales\
    \ -o report.xlsx\n```\n\n4. Check the generated Excel result, `report.xlsx`:\n\
    \n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_374_0.png)\n\nFigure 10.3: Screenshot\
    \ of report.xlsx"
  mdcn: "## 为何不将你的营销活动自动化？\n\n`notifications.csv` 文件包含了将在*步骤 2*中注入的代码。这些代码最终在*步骤 3*中发送。\n\
    \n让我们分析 `send_notifications.py` 的代码。这里只展示最相关的部分：\n\n```python\n# IMPORTS\n\ndef\
    \ send_phone_notification(...):\ndef send_email_notification(...):\ndef send_notification(...):\n\
    \ndef save_file(...):\ndef main(...):\n\nif __name__ == '__main__':\n    # Parse\
    \ arguments and prepare configuration\n    ...\n```\n\n主函数逐行遍历文件，并分析每种情况下的操作。如果条目状态为\
    \ SENT，则跳过它。如果条目没有代码，则尝试填充它。如果尝试发送，它会附加时间戳以记录发送或尝试发送的时间。\n\n对于每个条目，整个文件会再次保存到名为\
    \ `save_file` 的文件中。注意文件光标是如何定位在文件开头的。文件被写入然后刷新到磁盘：\n\n```python\ndef save_file(notif_file,\
    \ data):\n    \"\"\"\n    Overwrite the file with the new information\n    \"\"\
    \"\n\n    # Start at the start of the file\n    notif_file.seek(0)\n\n    header\
    \ = data[0].keys()\n    writer = csv.DictWriter(notif_file, fieldnames=header)\n\
    \    writer.writeheader()\n    writer.writerows(data)\n\n    # Be sure to write\
    \ to disk\n    notif_file.flush()\n```\n\n这会在每次条目操作时覆盖文件，而我们无需关闭并重新打开文件。\n\n>\
    \ 为何要为每个条目写入整个文件？这是一种存储每个操作的简单方法，并允许你重试发送过程。例如，如果某个条目产生意外错误或超时，甚至发生普遍故障，所有进度和之前的代码都将被标记为\
    \ SENT，不会再次发送。这意味着可以根据需要重试操作。对于大量条目，这是确保过程中途出现问题不会导致我们向客户重复发送消息的好方法。\n\n对于海量行数，我们可能面临保存文件时出现问题的风险。这可能导致文件在写入过程中因意外错误而损坏，或保存时间过长。如果是这种情况，请将文件拆分为可以独立处理的独立批次。对于非常大的处理过程，可能需要一个保证数据不会损坏的系统，例如使用数据库。\n\
    \n对于每个要发送的代码，`send_notification` 函数决定调用 `send_phone_notification` 或 `send_email_notification`。在两种情况下，它都会附加当前时间。\n\
    \n两个 `send` 函数在无法发送消息时都会返回错误。这允许你在生成的 `notifications.csv` 文件中标记它，并稍后重试。\n\n> `notifications.csv`\
    \ 文件也可以手动更改。例如，想象一下电子邮件中有一个拼写错误，这就是错误的原因。可以更改它并重试。\n\n`send_email_notification`\
    \ 基于 Mailgun 接口发送消息。更多信息，请参阅*第 9 章，处理通信渠道*中的*通过电子邮件发送通知*食谱。请注意，此处发送的电子邮件仅包含文本。\n\
    \n`send_phone_notification` 基于 Twilio 接口发送消息。更多信息，请参阅*第 9 章，处理通信渠道*中的*生成短信*食谱。\n\
    \n## 还有更多...\n\n时间戳特意以 ISO 格式写入，因为它是一种可解析的格式。这意味着我们可以轻松地获取回一个合适的对象，如下所示：\n\n```python\n\
    >>> import datetime\n>>> timestamp = datetime.datetime.now(datetime.timezone.utc).isoformat()\n\
    >>> timestamp\n'2018-08-25T14:13:53.772815+00:00'\n>>> datetime.datetime.fromisoformat(timestamp)\n\
    datetime.datetime(2018, 9, 11, 21, 5, 41, 979567, tzinfo=datetime.timezone.utc)\n\
    ```\n\n这使你可以轻松地来回解析时间戳。\n\n> ISO 8601 时间格式在大多数编程语言中得到良好支持，并精确定义了时间，因为它包含了时区。如果你可以使用它，它是记录时间的绝佳选择。\n\
    \n`send_notification` 中用于路由通知的策略很有趣：\n\n```python\n# Route each of the notifications\n\
    METHOD = {\n    'PHONE': send_phone_notification,\n    'EMAIL': send_email_notification,\n\
    }\ntry:\n    method = METHOD[entry['Contact Method']]\n    result = method(entry,\
    \ config)\nexcept KeyError:\n    result = 'INVALID_METHOD'\n```\n\n`METHOD` 字典将每个可能的\
    \ `Contact Method` 分配给一个具有相同定义的函数，该函数同时接受一个条目和一个配置。\n\n然后，根据具体方法，从字典中检索并调用该函数。注意\
    \ `method` 变量包含要调用的正确函数。\n\n> 这与其他编程语言中可用的 `switch` 操作类似。也可以通过 `if...else` 块实现这一点。对于像这段代码这样的简单情况，字典方法使代码非常易读。\n\
    \n`invalid_method` 函数用作默认值。如果 `Contact Method` 不是可用的方法之一（`PHONE` 或 `EMAIL`），将引发并捕获\
    \ `KeyError`，结果将被定义为 `INVALID_METHOD`。\n\n## 另请参阅\n\n- *第 9 章，处理通信渠道*中的*通过电子邮件发送通知*食谱，了解如何通过\
    \ Mailgun 发送电子邮件。\n- *第 9 章，处理通信渠道*中的*生成短信*食谱，了解如何使用 Twilio 发送短信。\n\n## 准备销售信息\n\
    \n在本章中，我们介绍了一个分为几个任务的营销活动：\n\n- 检测启动活动的最佳时机\n- 生成要发送给潜在客户的单独代码\n- 通过用户首选的渠道（短信或电子邮件）直接将代码发送给用户\n\
    - **收集活动结果**\n- 生成包含结果分析的销售报告\n\n本食谱展示了活动的*任务 4*。\n\n在向用户发送信息后，我们需要从商店收集销售日志，以监控活动进展和影响程度。\n\
    \n销售日志以每个关联商店的单独文件形式报告，因此在本食谱中，我们将看到如何将所有信息聚合到电子表格中，以便将信息作为一个整体进行处理。\n\n## 准备工作\n\
    \n对于本食谱，我们需要安装以下模块：\n\n```bash\n$ echo \"openpyxl==3.0.3\" >> requirements.txt\n\
    $ echo \"parse==1.15.0\" >> requirements.txt\n$ echo \"delorean==1.0.0\" >> requirements.txt\n\
    $ pip install -r requirements.txt\n```\n\n我们可以从 GitHub 获取本食谱的测试结构和测试日志，地址为 https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter10/sales。请下载完整的\
    \ sales 目录，其中包含大量测试日志。为了显示结构，我们将使用 tree 命令（http://mama.indstate.edu/users/ice/tree/），该命令在\
    \ Linux 中默认安装，在 macOS 中可以使用 brew 安装（https://brew.sh/）。你也可以使用图形工具检查目录。\n\n我们还需要\
    \ sale_log.py 模块和 parse_sales_log.py 脚本，可在 GitHub 上获取，地址为 https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter10/parse_sales_log.py。\n\
    \n## 操作步骤...\n\n1. 检查 sales 目录的结构。每个子目录代表一个已提交其指定期间销售日志的商店：\n\n```bash\n$ tree\
    \ sales\nsales\n├── 345\n│   └── logs.txt\n├── 438\n│   ├── logs_1.txt\n│   ├──\
    \ logs_2.txt\n│   ├── logs_3.txt\n│   └── logs_4.txt\n└── 656\n    └── logs.txt\n\
    ```\n\n2. 检查日志文件：\n\n```bash\n$ head sales/438/logs_1.txt\n[2018-08-27 21:05:55+00:00]\
    \ - SALE - PRODUCT: 12346 - PRICE: $02.99 - NAME: Single item - DISCOUNT: 0%\n\
    [2018-08-27 22:05:55+00:00] - SALE - PRODUCT: 12345 - PRICE: $07.99 - NAME: Family\
    \ pack - DISCOUNT: 20%\n...\n```\n\n3. 调用 `parse_sales_log.py` 脚本生成报告：\n\n```bash\n\
    $ python parse_sales_log.py sales -o report.xlsx\n```\n\n4. 检查生成的 Excel 结果 `report.xlsx`：\n\
    \n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_374_0.png)\n\n图 10.3：report.xlsx 截图"
