    \ in *step 3*.\n\nLet's analyze the code of `send_notifications.py`. Only the\
    \ most relevant bits are shown here:\n\n```\n# IMPORTS\n\ndef send_phone_notification(...):\n\
    def send_email_notification(...):\ndef send_notification(...):\n\ndef save_file(...):\n\
    def main(...):\n\nif __name__ == '__main__':\n    # Parse arguments and prepare\
