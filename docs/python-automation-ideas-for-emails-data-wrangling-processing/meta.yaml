    \ |\n\n图 7.4：聚合结果截图\n\n### 工作原理...\n\n让我们看看在 *步骤 6* 中使用的 `aggregate_by_location.py`\
    \ 脚本。\n\n脚本文件的最后一部分处理参数解析，这在 *第 2 章，轻松实现任务自动化* 中有详细描述。\n\n`main` 函数读取输入 CSV 并调用\
