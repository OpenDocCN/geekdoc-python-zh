    \ take a look:\n\n```\nUS_LOCATIONS = ['AL', 'AK', ..., 'WY', 'DC']\nCAD_LOCATIONS\
    \ = ['AB', 'BC', ..., 'NU', 'YT']\nCAD_TO_USD = Decimal(0.76)\n\ndef add_price_by_location(row):\n\
    \    location = row['LOCATION']\n    if location in US_LOCATIONS:\n        row['COUNTRY']\
    \ = 'USA'\n        row['CURRENCY'] = 'USD'\n        row['USD'] = Decimal(row['PRICE'])\n\
    \    elif location in CAD_LOCATIONS:\n        row['COUNTRY'] = 'CANADA'\n    \
    \    row['CURRENCY'] = 'CAD'\n        row['USD'] = Decimal(row['PRICE']) * CAD_TO_USD\n\
    \    else:\n        raise Exception('Location not found')\n\n    return row\n\
    ```\n\nBased on the location, it derives the currency. Note that the two-letter\
    \ codes for Canadian provinces and territories and for US states are described\
    \ in two lists. The full description of each is in the `CAD_LOCATIONS` and `US_LOCATIONS`\
    \ arrays. If the detected location is a US state, the currency is set to US dollars,\
    \ and it's set to Canadian dollars for all the provinces and territories in Canada.\n\
    \n> It's very convenient that US states and Canadian provinces have different\
    \ unique codes, making them easy to distinguish. In other systems, this may be\
    \ more complicated."
  - '[PAGE 238]


    It adds a new key to the dictionary for the country, the currency, and the US-dollar
    equivalent of the price. These three keys are then added as columns to the output
    CSV.


    > Since Python 3.7, the dictionaries keep the insertion order. This means that
    the last added key to the dictionary will be retrieved last when keys are presented.
    This wasn''t the case in previous versions, where we had to rely on OrderedDict,
    a specific kind of dictionary that preserves key order. We take advantage of this
    behavior regarding the generation of the header, as any new element introduced
    will be stored as a new column at the end, keeping the order of the old ones.


    The resulting file provides information on each sale log in a common currency,
    making comparisons easier.


    # There''s more...


    As we commented before, processing and distinguishing location and currency may
    not be as straightforward as presented here. Different countries may have different
    ways of presenting places, and in some cases, codes used to represent locations
    from different countries may overlap.


    The country is added as a column to have available later on.


    The currency exchange rate is defined as a constant, but that''s only an approximation.
    It may be necessary to obtain it from an external source. For example, www.exchangerate-api.com
    offers a free API to integrate exchange rate conversions, as follows:


    ```

    >>> import requests

    >>> result = requests.get(''https://api.exchangerate-api.com/v4/latest/CAD'')

    >>> result.json()[''rates''][''USD'']

    0.755081

    ```


    More complicated setups may require access to specific exchange rate sources or
    to be able to retrieve the historic information on rates.


    > Most exchange rate sources have a limit on the number of calls, or charge per
    access. Be sure to avoid constant polling for data and store the rates for local
    usage.'
  - "[PAGE 239]\n\n# See also\n\n+   - The *Preparing a CSV spreadsheet* recipe from\
    \ the previous section.\n- The *Reading CSV files* recipe in *Chapter 4, Searching\
    \ and Reading Local Files*.\n- The *Preparing a task* recipe in *Chapter 2, Automating\
    \ Tasks Made Easy*.\n\n# Standardizing the date format\n\nThe date time format\
    \ in the logs is different depending on the location. In the Canadian logs, the\
    \ format is the standard ISO 8601 in the format YYYY-MM-DD. The logs coming from\
    \ the USA use the format MM-DD-YYYY. In this recipe, we will append a new column\
    \ with a standard format to unify both dates.\n\n# Getting ready\n\nWe will use\
    \ the resulting CSV file from the previous recipe that receives and transforms\
    \ logs in the following format:\n\n```\n[<Timestamp>] - SALE - PRODUCT: <product\
    \ id> - PRICE: <price>\n```\n\nEach line will represent a sale log.\n\nWe will\
