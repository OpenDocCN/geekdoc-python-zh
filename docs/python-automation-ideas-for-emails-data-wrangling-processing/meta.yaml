    \ request is done, this speeds up the generation of a `Timeout` exception, which\
    \ normally would require seconds or minutes to be generated.\n\nStep 4 runs the\
    \ tests to check that the code works as expected.\n\n## There's more...\n\nThe\
    \ `responses` library is very useful for generating error conditions and preparing\
    \ your code for them. The `STATUS` argument can be used to generate error codes\
    \ in external systems, such as \"403 Forbidden,\" \"404 Not Found,\" \"500 Internal\
    \ Server error,\" and \"503 Service Unavailable.\" Properly handling the different\
    \ situations that can be produced and reacting to them will improve the reliability\
    \ of your code.\n\n> Notice that some of these errors can happen without any changes\
