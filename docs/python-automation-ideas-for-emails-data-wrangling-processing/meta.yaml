  - '[PAGE 87]


    Building Your First Web Scraping Application


    # How it works...


    The parsed `feed` object contains the information of the entries, as well as general
    information about the `feed` itself, such as when it was updated. The `feed` information
    can be found in the `feed` attribute:


    ```

    >>> rss.feed.title

    ''NYT > Top Stories''

    ```


    Each of the entries works as a dictionary, so the fields are easy to retrieve.
    They can also be accessed as attributes, but treating them as keys allows us to
    get all the available fields:


    ```

    >>> entries[5].keys()

    dict_keys([''title'', ''title_detail'', ''links'', ''link'', ''id'', ''guidislink'',
    ''media_content'', ''summary'', ''summary_detail'', ''media_credit'', ''credit'',
    ''content'', ''authors'', ''author'', ''author_detail'', ''published'', ''published_parsed'',
    ''tags''])

    ```


    The basic strategy when dealing with feeds is to parse them and go through the
    entries, performing a quick check on whether they are interesting or not, for
    example, by checking the `description` or `summary`. If the entry seems worth
    it, they can be fully downloaded through the `link` field. Then, to avoid rechecking
    entries, store the latest publication date and next time, only check newer entries.


    # There''s more...


    The full `feedparser` documentation can be found here: `https://pythonhosted.org/feedparser/`.


    The information available can differ from feed to feed. In the New York Times
    example, there''s a `tag` field with tag information, but this is not standard.
    As a minimum, entries will have a title, a description, and a link.


    > RSS feeds are also a great way of curating your own selection of news sources.
    There are great feed readers for that.'
  - '[PAGE 88]


    # See also


    +   - The *Installing third-party packages* recipe in *Chapter 1, Let''s Begin
    Our Automation Journey*, to learn the basics of installing external modules.

    - The *Downloading web pages* recipe, earlier in this chapter, to learn more about
    making requests and obtaining remote pages.


    # Accessing web APIs


    Rich interfaces can be created through the web, allowing powerful interactions
    through HTTP. The most common interface is through RESTful APIs using JSON. These
    text-based interfaces are easy to understand and to program, and use common technologies
    that are **language agnostic**, meaning they can be accessed in any programming
    language that has an HTTP client module, including, of course, Python.


    > Formats other than JSON are used, such as XML. But JSON is a very simple and
    readable format that translates very well into Python dictionaries (and other
    language equivalents). JSON is, by far, the most common format in RESTful APIs
    at the moment. Learn more about JSON here: https://www.json.org/.


    The strict definition of RESTful requires some specific characteristics, but an
    informal definition of RESTful is a system that describes resources through HTTP
    URLs. This means each URL represents a particular resource, such as an article
    in a newspaper or a property on a real estate site. Resources can then be manipulated
    through HTTP methods (`GET` to view, `POST` to create, `PUT`/`PATCH` to edit,
    and `DELETE` to delete).


    > Proper RESTful interfaces need to have certain characteristics. They are a way
    of creating interfaces that is not strictly restricted to HTTP interfaces. You
    can read more about it here: https://codewords.recurse.com/issues/five/what-restful-actually-means.


    Using `requests` is very easy with RESTful interfaces, as they include native
    JSON support.'
