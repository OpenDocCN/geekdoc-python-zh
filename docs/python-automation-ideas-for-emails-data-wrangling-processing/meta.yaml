    same color. This means `MultiPolygon` is drawn several times.


    > GIS information is stored as points for coordinates describing the latitude
    and longitude of the point. Areas, such as countries, have a list of coordinates
    that describe an area within them. Some maps are more precise and have more points
    defining areas. Multiple polygons may be required to define a country, as some
    parts may be separated from each other, with islands being the most obvious case,
    but there are also exclaves. Exclaves are regions of countries detached from the
    main body, like Alaska.


    Finally, the data is displayed by calling `.show`.


    # There''s more...


    Taking advantage of the information contained in the GIS file, we can add extra
    information to the map. The `properties` object contains information about the
    name of the country, but also its ISO name, FID code, and central location as
    `LON` and `LAT`. We can use this information to display the name of the country
    using `.text`:


    ```

    long, lat = data[''properties''][''LON''], data[''properties''][''LAT'']

    iso3 = data[''properties''][''ISO3'']

    plt.text(long, lat, iso3, horizontalalignment=''center'')

    ```'
  - '[PAGE 294]


    This code will live inside the loop in *step 6* in the *How to do it...* section.


    > If you analyze the file, you''ll see that the `properties` object contains information
    about the population, stored as `POP2005`, so you can draw the population information
    directly from the map. That is left as an exercise. Different map files contain
    different information, so be sure to play around to unleash all the possibilities.


    Also, you may notice that the map may be distorted in some cases. `matplotlib`
    will try to present it in a square box, and if the map is not roughly square,
    this will be evident. For example, try to display only Spain, Portugal, Ireland,
    and the UK. We can force the graph to present 1 point of latitude with the same
    space as 1 point of longitude, which is a good approach if we are not drawing
    something near the poles. This is achieved by calling `.set_aspect` in the axes.
    Current axes can be obtained through `.gca` (**get current axes**):


    ```

    >>> axes = plt.gca()

    >>> axes.set_aspect(''equal'', adjustable=''box'')

    ```


    Also, to improve the look of the map, we can set up a background color that helps
    to differentiate between the background and the foreground, and remove the labels
    in the axes, as printing the latitude and longitude is probably distracting. Removing
    the labels on the axes is achieved by setting empty labels with `.xticks` and
    `.yticks`. The background color is mandated by the foreground color of the axes:


    ```

    >>> plt.xticks([])

    ([], <a list of 0 Text major ticklabel objects>)

    >>> plt.yticks([])

    ([], <a list of 0 Text major ticklabel objects>)

    >>> axes = plt.gca()

    >>> axes.set_facecolor(''xkcd:light blue'')

    ```


    Finally, to better differentiate between the different regions, a line surrounding
    each area can be added. This can be done by drawing a thin line with the same
    data as `.fill`, right after. Notice that this code is repeated twice in *step
    2*:


    ```

    >>> plt.fill(data_x, data_y, c=color)

    [<matplotlib.patches.Polygon object at 0x1161a49d0>]

    >>> plt.plot(data_x, data_y, c=''black'', linewidth=0.2)

    [<matplotlib.lines.Line2D object at 0x1161a4b80>]

    ```'
- md: "## Developing Stunning Graphs\n\nAfter applying all these elements to the map,\
    \ it now looks like this:\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_295_0.png)\n\
    \nThe resulting code is available on GitHub here: https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter08/visualising_maps.py.\n\
    \n> As we've seen, maps are drawn as general polygons. Don't be afraid to include\
    \ other geometrical forms. You can define your own polygons and print them with\
    \ .fill or some extra labels. For example, far away regions may need to be transported\
    \ to avoid having too large a map. Or, rectangles can be used to print extra information\
    \ on top of parts of the map.\n\nThe full Fiona documentation can be found here:\
    \ https://fiona.readthedocs.io/. The full matplotlib documentation can be found\
    \ here: https://matplotlib.org/.\n\n## See also\n\n- The *Adding legends and annotations*\
    \ recipe, next in this chapter, to learn how to add context information to a graph.\n\
    - The *Combining graphs* recipe, later in this chapter, to learn how to add multiple\
    \ plots to a single graph.\n\n## Adding legends and annotations\n\nWhen drawing\
    \ graphs with dense information, a legend may be required to display relevant\
    \ information to improve the understanding of the data presented, like what color\
    \ is assigned to what concept. In matplotlib, legends can be pretty rich and there\
    \ are multiple ways of presenting them. Annotations to draw attention to specific\
    \ points are also useful to help the reader understand the information displayed\
    \ on the graph.\n\nIn this recipe, we'll create a graph with three different components\
    \ and display a legend with information to better understand it, as well as annotating\
    \ the most interesting points on our graph.\n\n## Getting ready\n\nWe need to\
    \ install matplotlib in our virtual environment:\n\n```\n$ echo \"matplotlib==3.2.1\"\
    \ >> requirements.txt\n$ pip install -r requirements.txt\n```\n\nIf you are using\
    \ macOS, you may get an error like this: **RuntimeError: Python is not installed\
    \ as a framework**. See the matplotlib documentation on how to fix it: https://matplotlib.org/faq/osx_framework.html.\n\
    \n## How to do it...\n\n1. Import matplotlib:\n   ```python\n   >>> import matplotlib.pyplot\
    \ as plt\n   ```\n\n2. Prepare the data to be displayed on the graph and the legends\
    \ that should be displayed. Each of the lines is composed of the time label, sales\
    \ of ProductA, sales of ProductB, and sales of ProductC:\n   ```python\n   >>>\
    \ LEGEND = ('ProductA', 'ProductB', 'ProductC')\n   >>> DATA = (\n   ...     ('Q1\
    \ 2017', 100, 30, 3),\n   ...     ('Q2 2017', 105, 32, 15),\n   ...     ('Q3 2017',\
    \ 125, 29, 40),\n   ...     ('Q4 2017', 115, 31, 80),\n   ... )\n   ```\n\n3.\
    \ Split the data into usable formats for the graph. This is a preparation step:\n\
    \   ```python\n   >>> POS = list(range(len(DATA)))\n   >>> VALUESA = [valueA for\
    \ label, valueA, valueB, valueC in DATA]\n   >>> VALUESB = [valueB for label,\
    \ valueA, valueB, valueC in DATA]\n   >>> VALUESC = [valueC for label, valueA,\
    \ valueB, valueC in DATA]\n   >>> LABELS = [label for label, valueA, valueB, valueC\
    \ in DATA]\n   ```\n\n4. Create a bar graph with the data:\n   ```python\n   >>>\
    \ WIDTH = 0.2\n   >>> plt.bar([p - WIDTH for p in POS], VALUESA, width=WIDTH)\n\
    \   <BarContainer object of 4 artists>\n   >>> plt.bar([p for p in POS], VALUESB,\
    \ width=WIDTH)\n   <BarContainer object of 4 artists>\n   >>> plt.bar([p + WIDTH\
    \ for p in POS], VALUESC, width=WIDTH)\n   <BarContainer object of 4 artists>\n\
    \   >>> plt.ylabel('Sales')\n   Text(0, 0.5, 'Sales')\n   >>> plt.xticks(POS,\
    \ LABELS)\n   <REDACTED>\n   ```\n\n5. Add an annotation displaying the maximum\
    \ growth in the chart:\n   ```python\n   >>> plt.annotate('400% growth', xy=(1.2,\
    \ 18), xytext=(1.3, 40),\n   ...              horizontalalignment='center',\n\
    \   ...              arrowprops=dict(facecolor='black', shrink=0.05))\n   Text(1.3,\
    \ 40, '400% growth')\n   ```\n\n6. Add the legend:\n   ```python\n   >>> plt.legend(LEGEND)\n\
    \   <matplotlib.legend.Legend object at 0x1153d1e80>\n   ```\n\n7. Display the\
    \ graph:\n   ```python\n   >>> plt.show()\n   ```\n\n8. The result will be displayed\
    \ in a new window:\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_298_0.png)\n\n\
    ## How it works...\n\nSteps 1 and 2 of the *How to do it...* section prepare the\
    \ imports and the data that will be displayed by the bar chart. In *step 3*, the\
    \ data is split into different arrays to prepare the input for `matplotlib`. Basically,\
    \ each data sequence is stored in a different array.\n\n*Step 4* draws the data.\
    \ Each data sequence gets a call to `.bar`, specifying its position and values.\
    \ Labels do the same as `.xticks`. To separate each of the bars around the labels,\
    \ the first one is displaced to the left and the third to the right.\n\nAn annotation\
    \ is added above the bar for `ProductC` in the second quarter. Note that the annotation\
    \ includes the point in `xy` and the text location in `xytext`.\n\nIn *step 6*,\
    \ the legend is added. Notice that the labels need to be added to the data in\
    \ the same order as the data was inputted. The legend is located automatically\
    \ in an area that doesn't cover any data. `Arrowprops` tells the arrow to point\
    \ to the data.\n\nFinally, the graph is drawn in step 7 by calling .show.\n\n\
    > Calling .show blocks the execution of the program. The program will resume when\
    \ the window is closed.\n\n## There's more...\n\nLegends will be displayed automatically\
    \ in most cases with just a call to .legend. If you need to customize the order\
    \ in which they appear, you may refer each label to a specific element. For example,\
    \ this way (note it calls ProductA the valueC series):\n```python\n>>> valueA\
    \ = plt.bar([p - WIDTH for p in POS], VALUESA, width=WIDTH)\n>>> valueB = plt.bar([p\
    \ for p in POS], VALUESB, width=WIDTH)\n>>> valueC = plt.bar([p + WIDTH for p\
    \ in POS], VALUESC, width=WIDTH)\n>>> plt.legend((valueC, valueB, valueA), LEGEND)\n\
    <matplotlib.legend.Legend object at 0x112273fa0>\n```\n\nThe location of the legend\
    \ can also be changed manually, through the loc parameter. By default, it is best\
    \ and it will draw the legend over an area where there's the least overlap of\
    \ data (ideally none). But values such as right, upper, left, and so on can be\
    \ used, or a specific (X, Y) tuple.\n\nAnother option is to plot the legend outside\
    \ of the graph using the bbox_to_anchor option. In this case, the legend is attached\
    \ to the (X, Y) of the bounding box, where 0 is the bottom-left corner of the\
    \ graph and 1 is the upper-right corner. This may cause the legend to be clipped\
    \ by the external border, so you may need to adjust where the graph starts and\
    \ ends with .subplots_adjust:\n```python\n>>> plt.legend(LEGEND, title='Products',\
    \ bbox_to_anchor=(1, 0.8))\n<matplotlib.legend.Legend object at 0x11963b910>\n\
    >>> plt.subplots_adjust(right=0.80)\n```\n\nAdjusting the bbox_to_anchor and .subplots_adjust\
    \ parameters requires a little bit of trial and error in producing the expected\
    \ result.\n\n.subplots_adjust references the positions as the position of the\
    \ axis where it will be displayed. This means that right=0.80 will leave 20% of\
    \ the screen on the right of the plot, while the default for left is 0.125, meaning\
    \ it leaves 12.5% of the space on the left of the plot. See the documentation\
    \ for further details: https://matplotlib.org/api/_as_gen/matplotlib.pyplot.subplots_adjust.html.\n\
    \nThe annotations can be done in different styles and can be tweaked with different\
    \ options regarding the way to connect and so on. For example, this code will\
    \ create an arrow with the fancy style connecting with a curve. The result is\
    \ displayed here:\n```python\nplt.annotate('400% growth', xy=(1.2, 18), xytext=(1.3,\
    \ 40),\n             horizontalalignment='center',\n             arrowprops={'facecolor':\
    \ 'black',\n                         'arrowstyle': \"fancy\",\n              \
    \           'connectionstyle': \"angle3\",\n                         })\n```\n\
    \nIn our recipe, we did not annotate to the end of the bar (point (1.2, 15)),\
    \ but slightly above it, to give a little bit of breathing space.\n\nAdjusting\
    \ the exact point to annotate and where to locate the text will require a bit\
    \ of testing. The text was also positioned by looking for the best place to not\
    \ overlap the text with the bars. The font size and color can be changed using\
    \ the fontsize and color parameters in both the .legend and .annotate calls.\n\
    \nApplying all these elements, the graph may look similar to the following graph.\
    \ This graph can be replicated by calling the adding_legend_and_annotation.py\
    \ script, available in GitHub here: https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter08/adding_legend_and_annotations.py:"
  mdcn: "## 绘制精美的图表\n\n将所有这些元素应用到地图后，现在看起来是这样的：\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_295_0.png)\n\
    \n生成的代码可在此处的 GitHub 上找到：https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter08/visualising_maps.py。\n\
    \n> 正如我们所看到的，地图是作为通用多边形绘制的。不要害怕包含其他几何图形。你可以定义自己的多边形，并使用 `.fill` 或一些额外的标签来打印它们。例如，偏远地区可能需要被移走，以避免地图过大。或者，可以使用矩形在地图的部分区域上打印额外信息。\n\
    \n完整的 Fiona 文档可在此处找到：https://fiona.readthedocs.io/。完整的 matplotlib 文档可在此处找到：https://matplotlib.org/。\n\
    \n## 另请参阅\n\n- 本章接下来的 *添加图例和注释* 配方，了解如何向图表添加上下文信息。\n- 本章稍后的 *组合图表* 配方，了解如何向单个图表添加多个绘图。\n\
    \n## 添加图例和注释\n\n在绘制信息密集的图表时，可能需要一个图例来显示相关信息，以提高对所呈现数据的理解，例如什么颜色对应什么概念。在 matplotlib\
    \ 中，图例可以非常丰富，并且有多种呈现方式。用于吸引对特定点注意力的注释也有助于读者理解图表上显示的信息。\n\n在这个配方中，我们将创建一个包含三个不同组件的图表，并显示一个带有信息的图例以便更好地理解它，同时对我们图表上最有趣的点进行注释。\n\
    \n## 准备工作\n\n我们需要在虚拟环境中安装 matplotlib：\n\n```\n$ echo \"matplotlib==3.2.1\" >>\
    \ requirements.txt\n$ pip install -r requirements.txt\n```\n\n如果你使用的是 macOS，你可能会遇到这样的错误：**RuntimeError:\
    \ Python is not installed as a framework**。请参阅 matplotlib 文档了解如何修复它：https://matplotlib.org/faq/osx_framework.html。\n\
    \n## 操作步骤...\n\n1. 导入 matplotlib：\n   ```python\n   >>> import matplotlib.pyplot\
    \ as plt\n   ```\n\n2. 准备要在图表上显示的数据以及应显示的图例。每一行由时间标签、产品A的销售额、产品B的销售额和产品C的销售额组成：\n\
    \   ```python\n   >>> LEGEND = ('ProductA', 'ProductB', 'ProductC')\n   >>> DATA\
    \ = (\n   ...     ('Q1 2017', 100, 30, 3),\n   ...     ('Q2 2017', 105, 32, 15),\n\
    \   ...     ('Q3 2017', 125, 29, 40),\n   ...     ('Q4 2017', 115, 31, 80),\n\
    \   ... )\n   ```\n\n3. 将数据拆分为图表可用的格式。这是一个准备步骤：\n   ```python\n   >>> POS = list(range(len(DATA)))\n\
    \   >>> VALUESA = [valueA for label, valueA, valueB, valueC in DATA]\n   >>> VALUESB\
    \ = [valueB for label, valueA, valueB, valueC in DATA]\n   >>> VALUESC = [valueC\
    \ for label, valueA, valueB, valueC in DATA]\n   >>> LABELS = [label for label,\
    \ valueA, valueB, valueC in DATA]\n   ```\n\n4. 使用数据创建一个柱状图：\n   ```python\n \
    \  >>> WIDTH = 0.2\n   >>> plt.bar([p - WIDTH for p in POS], VALUESA, width=WIDTH)\n\
    \   <BarContainer object of 4 artists>\n   >>> plt.bar([p for p in POS], VALUESB,\
    \ width=WIDTH)\n   <BarContainer object of 4 artists>\n   >>> plt.bar([p + WIDTH\
    \ for p in POS], VALUESC, width=WIDTH)\n   <BarContainer object of 4 artists>\n\
    \   >>> plt.ylabel('Sales')\n   Text(0, 0.5, 'Sales')\n   >>> plt.xticks(POS,\
    \ LABELS)\n   <REDACTED>\n   ```\n\n5. 添加一个注释，显示图表中的最大增长：\n   ```python\n   >>>\
    \ plt.annotate('400% growth', xy=(1.2, 18), xytext=(1.3, 40),\n   ...        \
    \      horizontalalignment='center',\n   ...              arrowprops=dict(facecolor='black',\
    \ shrink=0.05))\n   Text(1.3, 40, '400% growth')\n   ```\n\n6. 添加图例：\n   ```python\n\
    \   >>> plt.legend(LEGEND)\n   <matplotlib.legend.Legend object at 0x1153d1e80>\n\
    \   ```\n\n7. 显示图表：\n   ```python\n   >>> plt.show()\n   ```\n\n8. 结果将显示在一个新窗口中：\n\
    \n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_298_0.png)\n\n## 工作原理...\n\n*操作步骤...*\
    \ 部分的步骤 1 和 2 准备了导入和柱状图将显示的数据。在 *步骤 3* 中，数据被拆分为不同的数组，为 `matplotlib` 准备输入。基本上，每个数据序列都存储在不同的数组中。\n\
    \n*步骤 4* 绘制数据。每个数据序列都调用 `.bar`，指定其位置和值。标签与 `.xticks` 的作用相同。为了将每个柱子围绕标签分开，第一个柱子向左偏移，第三个柱子向右偏移。\n\
    \n在第二季度 `ProductC` 的柱子上方添加了一个注释。请注意，注释包括 `xy` 中的点和 `xytext` 中的文本位置。\n\n在 *步骤 6*\
    \ 中，添加了图例。请注意，标签需要按照数据输入的相同顺序添加到数据中。图例会自动定位在不覆盖任何数据的区域。`Arrowprops` 告诉箭头指向数据。\n\
    \n最后，在步骤 7 中通过调用 `.show` 绘制图表。\n\n> 调用 `.show` 会阻塞程序的执行。当窗口关闭时，程序将恢复。\n\n## 更多内容...\n\
    \n在大多数情况下，只需调用 `.legend` 即可自动显示图例。如果你需要自定义它们出现的顺序，可以将每个标签引用到特定的元素。例如，这种方式（注意它将\
    \ `ProductA` 称为 `valueC` 系列）：\n```python\n>>> valueA = plt.bar([p - WIDTH for\
    \ p in POS], VALUESA, width=WIDTH)\n>>> valueB = plt.bar([p for p in POS], VALUESB,\
    \ width=WIDTH)\n>>> valueC = plt.bar([p + WIDTH for p in POS], VALUESC, width=WIDTH)\n\
    >>> plt.legend((valueC, valueB, valueA), LEGEND)\n<matplotlib.legend.Legend object\
    \ at 0x112273fa0>\n```\n\n图例的位置也可以通过 `loc` 参数手动更改。默认情况下，它是 `best`，它会将图例绘制在数据重叠最少的区域（理想情况下没有重叠）。但可以使用\
    \ `right`、`upper`、`left` 等值，或者一个特定的 `(X, Y)` 元组。\n\n另一个选项是使用 `bbox_to_anchor`\
    \ 选项将图例绘制在图表外部。在这种情况下，图例附加到边界框的 `(X, Y)`，其中 0 是图表的左下角，1 是右上角。这可能会导致图例被外部边框裁剪，因此你可能需要使用\
    \ `.subplots_adjust` 调整图表的起始和结束位置：\n```python\n>>> plt.legend(LEGEND, title='Products',\
    \ bbox_to_anchor=(1, 0.8))\n<matplotlib.legend.Legend object at 0x11963b910>\n\
    >>> plt.subplots_adjust(right=0.80)\n```\n\n调整 `bbox_to_anchor` 和 `.subplots_adjust`\
    \ 参数需要一些试错才能产生预期的结果。\n\n`.subplots_adjust` 将位置引用为将要显示的轴的位置。这意味着 `right=0.80` 将在绘图右侧留出\
    \ 20% 的屏幕，而 `left` 的默认值为 0.125，意味着在绘图左侧留出 12.5% 的空间。有关更多详细信息，请参阅文档：https://matplotlib.org/api/_as_gen/matplotlib.pyplot.subplots_adjust.html。\n\
    \n注释可以采用不同的样式，并且可以通过不同的选项进行调整，例如连接方式等。例如，此代码将创建一个带有 `fancy` 样式的箭头，以曲线方式连接。结果显示在此处：\n\
    ```python\nplt.annotate('400% growth', xy=(1.2, 18), xytext=(1.3, 40),\n     \
    \        horizontalalignment='center',\n             arrowprops={'facecolor':\
    \ 'black',\n                         'arrowstyle': \"fancy\",\n              \
    \           'connectionstyle': \"angle3\",\n                         })\n```\n\
    \n在我们的配方中，我们没有注释到柱子的末端（点 (1.2, 15)），而是稍微靠上一点，以留出一点呼吸空间。\n\n调整要注释的确切点以及文本的位置需要一些测试。文本的位置也是通过寻找最佳位置以避免与柱子重叠来确定的。字体大小和颜色可以在\
    \ `.legend` 和 `.annotate` 调用中使用 `fontsize` 和 `color` 参数进行更改。\n\n应用所有这些元素后，图表可能看起来类似于下面的图表。可以通过调用\
    \ `adding_legend_and_annotation.py` 脚本来复制此图表，该脚本可在 GitHub 上找到：https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter08/adding_legend_and_annotations.py："
