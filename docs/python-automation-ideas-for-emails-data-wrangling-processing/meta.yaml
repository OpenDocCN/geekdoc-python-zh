    # Sending an individual email


    The most basic way of sending an email is by using the standard **Simple Mail
    Transfer Protocol (SMTP)**. SMTP is one of the oldest protocols on the Internet.
    Although newer proprietary protocols exist, SMTP is the standard used by all email
    providers to communicate with each other and is one of the pillars of electronic
    communications.'
  - '[PAGE 316]


    SMTP allows you to send rich emails with multiple sections containing different
    kinds of data. These sections can be used to add attachments, or to generate alternative
    sections, such as a plain text and HTML version of the same message, to display
    on compatible email clients.


    Given SMTP is such a strong standard, it is easy to use, and virtually all languages
    and operating systems support it. This ease of usage is also a weakness as the
    amount of spam email is huge, and big players in the email domain have strong
    incentives to disallow emails coming from non-verified sources, like a Python
    script.


    This is why SMTP is only recommended for very sporadic use and simple purposes
    such as sending a few emails a day to controlled addresses.


    > Do not use this method to send emails in bulk to distribution lists or to customers
    from random email addresses. You risk being banned from your service provider
    due to anti-spam rules.


    # Getting ready


    For this recipe, we''ll need an email account with a service provider. There are
    small differences based on the provider you''ll use, but we''ll be using a Gmail
    account as they are very common and free to access.


    Due to Gmail''s security, we''ll need to create a specific app password that can
    be used to send an email. Follow the instructions here: https://support.google.com/accounts/answer/185833.
    This will help you generate a password for the purpose of this recipe. Remember
    to create it for mail access. You can delete the password afterward to remove
    it.


    We''ll use the `smtplib` module, which is part of Python''s standard library.'
- md: "## Dealing with Communication Channels\n\n## How to do it...\n\n1.  Import\
    \ the `smtplib` and `email` modules:\n    ```python\n    >>> import smtplib\n\
    \    >>> from email.mime.multipart import MIMEMultipart\n    >>> from email.mime.text\
    \ import MIMEText\n    ```\n\n2.  Set up the credentials, replacing these with\
    \ your own ones. For testing purposes, we'll send to the same email, but feel\
    \ free to use a different address:\n    ```python\n    >>> USER = 'your.account@gmail.com'\n\
    \    >>> PASSWORD = 'YourPassword'\n    >>> sent_from = USER\n    >>> send_to\
    \ = [USER]\n    ```\n\n3.  Define the data to be sent. Notice the two alternatives,\
    \ a plain text one and an HTML one:\n    ```python\n    >>> text = \"Hi!\\nThis\
    \ is the text version linking to https://www.packtpub.com/\\nCheers!\"\n    >>>\
    \ html = \"\"\"<html><head></head><body>\n    ... <p>Hi!<br>\n    ... This is\
    \ the HTML version linking to <a href=\"https://www.packtpub.com/\">Packt</a><br>\n\
    \    ... </p>\n    ... </body></html>\n    \"\"\"\n    ```\n\n4.  Compose the\
    \ message as a MIME multipart, including `subject`, `to`, and `from`:\n    ```python\n\
    \    >>> msg = MIMEMultipart('alternative')\n    >>> msg['Subject'] = 'An interesting\
    \ email'\n    >>> msg['From'] = sent_from\n    >>> msg['To'] = ', '.join(send_to)\n\
    \    ```\n\n5.  Fill in the data content parts of the email:\n    ```python\n\
    \    >>> part_plain = MIMEText(text, 'plain')\n    >>> part_html = MIMEText(html,\
    \ 'html')\n    >>> msg.attach(part_plain)\n    >>> msg.attach(part_html)\n   \
    \ ```\n\n6.  Send the email using the SMTP SSL protocol:\n    ```python\n    >>>\
    \ with smtplib.SMTP_SSL('smtp.gmail.com', 465) as server:\n    ...     server.login(USER,\
    \ PASSWORD)\n    ...     server.sendmail(sent_from, send_to, msg.as_string())\n\
    \    ```\n\n7.  The email should have been sent. Check your email account for\
    \ the message. Checking the *original email*, you will see the full raw email,\
    \ with elements in both HTML and plain text. The email has been redacted in the\
    \ following screenshot:\n\n    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_318_0.png)\n\
    \n    Figure 9.2: Email in both plain text and HTML format\n\n## How it works...\n\
    \nAfter *step 1*, making the pertinent imports from `smtplib` and `email`, *step\
    \ 2* defines the credentials obtained from Gmail.\n\n*Step 3* shows the HTML and\
    \ text that is going to be sent. They are alternatives, so they should present\
    \ the same information, but in different formats.\n\nThe basic message information\
    \ is set up in *step 4*. It specifies the subject of the email, as well as the\
    \ *from* and *to*. *Step 5* adds multiple parts, each with the proper `MIMEText`\
    \ type.\n\n> The last part that's added is the preferred alternative, according\
    \ to the MIME format, so we add the HTML part last.\n\n*Step 6* sets up the connection\
    \ with the server, logs in using the credentials, and sends the message. It uses\
    \ a `with` context to get the connection. Note the address `smtp.gmail.com` and\
    \ port `465` are specific for Gmail.\n\nIf there's an error with the credentials,\
    \ it will raise an exception with the username and password not accepted.\n\n\
    ## There's more...\n\nNote that `send_to` is a list of addresses. You can send\
    \ an email to more than one address. The only caveat is in *step 4*, where it\
    \ needs to be specified as a list of comma-separated values for all addresses.\n\
    \n> Although it is possible to label `sent_from` as a different address than the\
    \ address used to send the email, it is not recommended. This can be interpreted\
    \ as an indication of trying to fake the origin of the email and provokes labeling\
    \ the email as spam.\n\nThe server used here, `smtp.gmail.com`, is the one specified\
    \ by Gmail, and the defined port for SMTPS (secure SMTP) is `465`. Gmail also\
    \ accepts port `587`, which is the standard, but requires you to specify the kind\
    \ of session by calling `.starttls`, as shown in the following code:\n```python\n\
    with smtplib.SMTP('smtp.gmail.com', 587) as server:\n    server.starttls()\n \
    \   server.login(USER, PASSWORD)\n    server.sendmail(sent_from, send_to, msg.as_string())\n\
    ```\n\nIf you are interested in more details about these differences and both\
    \ protocols, you can find more information in this article: https://www.fastmail.com/help/technical/ssltlsstarttls.html.\n\
    \nThe full `smtplib` documentation can be found at https://docs.python.org/3/library/smtplib.html,\
    \ and the `email` module, with information on the different formats for emails,\
    \ including examples on MIME types, can be found here: https://docs.python.org/3/library/email.html.\
    \ MIME types can be used to add binary attachments to emails.\n\n## See also\n\
    \n- The *Working with email templates* recipe, earlier in this chapter, to see\
    \ how to compose the body of the email\n- The *Sending notifications via email*\
    \ recipe, later in this chapter, to learn how to send bulk emails\n\n## Reading\
    \ an email\n\nIn this recipe, we'll see how to read emails from an account. We'll\
    \ use the IMAP4 standard, which is the most commonly used standard for reading\
    \ emails.\n\nOnce read, the email can be processed and analyzed automatically\
    \ to generate actions such as smart automated responses, forwarding the email\
    \ to a different target, aggregating the results for monitoring, and so on. The\
    \ options are unlimited!\n\n## Getting ready\n\nFor this recipe, we'll need an\
    \ email account with a service provider. There are small differences based on\
    \ the provider you use, but we'll use a Gmail account, as it is very common and\
    \ free to access.\n\nDue to Gmail's security, we'll need to create a specific\
    \ app password to use to send an email. Follow the instructions here: https://support.google.com/accounts/answer/185833.\
    \ This will generate a password for the purpose of this recipe. Remember to create\
    \ it for mail. You can delete the password afterward to remove it.\n\nWe'll use\
    \ the `imaplib` module, which is part of Python's standard library.\n\nThis recipe\
    \ will read the last received email, so you can use it for better control over\
    \ what's going to be read. We'll send a short email that looks like it was sent\
    \ to the support team.\n\n## How to do it...\n\n1.  Import the `imaplib` and `email`\
    \ modules:\n    ```python\n    >>> import imaplib\n    >>> import email\n    >>>\
    \ from email.parser import BytesParser, Parser\n    >>> from email.policy import\
    \ default\n    ```\n\n2.  Set up the credentials, replacing the following with\
    \ your own ones:\n    ```python\n    >>> USER = 'your.account@gmail.com'\n   \
    \ >>> PASSWORD = 'YourPassword'\n    ```\n\n3.  Connect to the email server:\n\
    \    ```python\n    >>> mail = imaplib.IMAP4_SSL('imap.gmail.com')\n    >>> mail.login(USER,\
    \ PASSWORD)\n    ```\n\n4.  Select the inbox folder:\n    ```python\n    >>> mail.select('inbox')\n\
    \    ```\n\n5.  Read all email UIDs and retrieve the latest received email:\n\
    \    ```python\n    >>> result, data = mail.uid('search', None, 'ALL')\n    >>>\
    \ latest_email_uid = data[0].split()[-1]\n    >>> result, data = mail.uid('fetch',\
    \ latest_email_uid, '(RFC822)')\n    >>> raw_email = data[0][1]\n    ```\n\n6.\
    \  Parse the email into a Python object:\n    ```python\n    >>> email_message\
    \ = BytesParser(policy=default).parsebytes(raw_email)\n    ```\n\n7.  Display\
    \ the subject and sender of the email:\n    ```python\n    >>> email_message['subject']\n\
    \    '[Ref ABCDEF] Subject: Product A'\n    >>> email.utils.parseaddr(email_message['From'])\n\
    \    ('Sender name', 'sender@gmail.com')\n    ```\n\n8.  Retrieve the payload\
    \ of the text:\n    ```python\n    >>> email_type = email_message.get_content_maintype()\n\
    \    >>> if email_type == 'multipart':\n    ...     for part in email_message.get_payload():\n\
    \    ...         if part.get_content_type() == 'text/plain':\n    ...        \
    \     payload = part.get_payload()\n    ... elif email_type == 'text':\n    ...\
    \     payload = email_message.get_payload()\n    >>> print(payload)\n    Hi:\n\
    \n    I'm having difficulties getting into my account. What was the URL, again?\n\
    \n    Thanks!\n        A confused customer\n    ```\n\n## How it works...\n\n\
    After importing the modules that will be used and defining the credentials, we\
    \ connect to the server in *step 3*.\n\n*Step 4* connects to `inbox`. This is\
    \ a default folder in Gmail that contains the received email.\n\n> Of course,\
    \ you may need to read a different folder. You can get a list of all folders by\
    \ calling `mail.list()`.\n\nIn *step 5*, first, a list of UIDs is retrieved for\
    \ all the emails in the inbox by calling `.uid('search', None, \"ALL\")`. The\
    \ last email received is then retrieved again from the server through a `fetch`\
    \ action with `.uid('fetch', latest_email_uid, '(RFC822)')`. This retrieves the\
    \ email in RFC822 format, which is the standard. Note that retrieving the email\
    \ marks it as read.\n\n> The `.uid` command allows us to call IMAP4 commands,\
    \ returning a tuple with the result (OK or NO) and the data. If there's an error,\
    \ it will raise the proper exception.\n\nThe `BytesParser` module is used to transform\
    \ the raw RFC822 email into a Python object. This is done in *step 6*."
