  md: 'Searching and Reading Local Files


    # There''s more...


    The `with` context manager is the preferred way of dealing with files, but it''s
    not the only one. You may also open and close them manually, like this:


    ```

    >>> file = open(''zen_of_python.txt'')

    >>> content = file.read()

    >>> file.close()

    ```


    Note the `.close()` method, to ensure that the file is closed and to free resources
    related to opening a file. The `.read()` method reads the whole file in one go,
    instead of line by line.


    > The `.read()` method also accepts a size parameter in bytes that limits the
    size of the data read. For example, `file.read(1024)` will return up to 1KB of
    information. The next call to `.read()` will continue from that point.


    Files are opened in a particular mode. Modes define a combination of read/write,
    as well as whether to treat the data as text or binary data. By default, files
    are opened in read-only and text mode, which are described as "r" (step 2) or
    "rt" (step 3).


    More modes will be explored in other recipes.


