    and will raise an error if the file path leads to an invalid location.


    Remember to open the file in the correct mode. In *step 5*, the config file is
    opened in read mode (`r`) and the output file in write mode (`w`), which will
    overwrite the file if it exists. You may find the append mode (`a`) useful, which
    will add the next piece of data at the end of an existing file.


    `configparser` module allows us to use config files with ease. As demonstrated
    in *step 2*, the parsing of the file is simple, as follows:


    ```

    config = configparser.ConfigParser()

    config.read_file(file)

    ```


    The `config` will then be accessible as a dictionary. This will have the sections
    of the config file as the keys, and inside another dictionary with each of the
    config values. So, the value `n2` in the `ARGUMENTS` section is accessed as `config[''ARGUMENTS''][''n2'']`.


    Note that the values are always stored as strings, which are required to be transformed
    into other types, such as integers.


    If you need to obtain Boolean values, do not perform `value = bool(config[raw_value])`,
    as any string will be transformed into `True` no matter what; for instance, the
    string `False` is a true string, as it''s not empty. Using an empty string is
    a bad option as well, as they are very confusing. Use the `.getboolean` method
    instead, for example, `value = config.getboolean(raw_value)`. There are similar
    `getint()` and `getfloat()` for integers and float values.'
