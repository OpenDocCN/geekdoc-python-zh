  md: 'Debugging Techniques


    # There''s more...


    The fixed script is available from GitHub: https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter13/debug_skills_fixed.py.
    You can download it and see the differences.


    There are other ways of creating conditional breakpoints. There''s actually support
    from the debugger to create breakpoints that stop, but only if some conditions
    are met. When possible, I find it easier to work directly with code, as it is
    persistent between runs and easier to remember and operate. You can check how
    to create it in the Python pdb documentation: https://docs.python.org/3/library/pdb.html#pdbcommand-break.


    The kind of breakpoint that catches an exception, as shown in the first error,
    is a demonstration of how making conditions in code is straightforward. Just be
    careful to remove them afterward!


    There are other debuggers available that have an increased set of features; for
    example:


    +   - ipdb (https://github.com/gotcha/ipdb): Adds tab completion and syntax highlights.

    - pudb (https://documen.tician.de/pudb/): Displays an old-style, semi-graphical,
    text-based interface, in the style of early 90s tools that displays the local
    scope variables automatically.

    - web-pdb (https://pypi.org/project/web-pdb/): Opens a web server to access a
    graphic interface with the debugger.


    Read the preceding debuggers'' documentation to learn how to install and run them.


    > There are more debuggers available. A search on the Internet will give you more
    options, including Python IDEs. In any case, be aware of adding dependencies.
    It is always good to be able to use the default debugger.


    The new breakpoint commands allow us to change easily between debuggers using
    the PYTHONBREAKPOINT environment variable; for example:


    ```

    $ PYTHONBREAKPOINT=ipdb.set_trace python my_script.py

    ```


    This starts ipdb on any breakpoint in the code. You can learn more about this
    in the breakpoint() documentation, which can be found here: https://www.python.org/dev/peps/pep-0553/#environment-variable.'
