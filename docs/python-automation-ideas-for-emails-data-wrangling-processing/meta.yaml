    \ 食谱，学习如何存储执行过程中发生的事件。\n\n## 捕获错误和问题\n\n自动化任务的主要特点是其 *即发即忘* 的特性。我们不会主动查看结果，而是让它在后台运行。\n\
    \n本书中的大多数食谱都涉及外部信息，例如网页或其他报告，因此在运行时发现意外问题的可能性很高。本食谱将介绍一个自动化任务，该任务会将意外行为安全地存储到日志文件中，以便事后检查。\n\
