    # How it works...


    After importing the module, the data is presented in *step 2* in a useable structure.


    In *step 3*, the data is prepared in three sequences, `VALUESA`, `VALUESB`, and
    `LABELS`. A `POS` increasing sequence is added so that the bars are positioned
    over the *x-axis*, one after the other.


    *Step 4* creates the bar graph with the sequences *X* (`POS`) and *Y* (`VALUESB`).
    The second bar sequence, `VALUESA`, is added on top of the previous one using
