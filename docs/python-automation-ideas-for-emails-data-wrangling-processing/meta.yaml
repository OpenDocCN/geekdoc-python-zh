    \ xlsfile.sheetnames\n   ['Sheet1']\n   >>> sheet = xlsfile['Sheet1']\n   ```\n\
    \n4. Obtain the value of cells B4 and D4 (admissions and director of E.T.):\n\
    \   ```python\n   >>> sheet['B4'].value\n   161\n   >>> sheet['D4'].value\n  \
