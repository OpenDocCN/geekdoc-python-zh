  md: '# Why Not Automate Your Marketing Campaign?


    Then, it generates each of the pages as intermediate PDF files:


    +   - A brief, generated by `create_summary_brief`, provides a general summary
    of all the data.

    - The logs are `aggregate_by_day`. A summary is created, and a graph is produced.

    - The logs are `aggregate_by_shop`. A summary is created, and a graph is produced.


    All the intermediate PDF pages are joined, using `PyPDF2`, into a single file.
    Finally, the intermediate pages are deleted.


    Both `aggregate_by_day` and `aggregate_by_shop` return a list with a summary of
    each of the elements. In `aggregate_by_day`, we detect when a day ends by using
    `.end_of_day` to differentiate one day from another.


    The `graph` function does the following:


    +   1. Prepares all the data that is going to be displayed. That includes the
    number of units per tag (day or shop) and the total income per tag.

    2. Creates a top graph with the total income, split by product into stacked bars.
    To be able to do this, at the same time the total income is calculated, the baseline
    (the position where the next stack is located) is calculated.

    3. It divides the bottom part of the graph into as many graphs as there are products,
    and displays the number of units sold on each one, per tag (day or shop).


    > For a better display, the graph is defined to be the size of an A4 sheet. It
    also allows us, using `skip_labels`, to print one of each X label on the second
    graph on the X axis to avoid overlapping. This is useful when displaying the days,
    and it''s set to show only one label per week.


    The resulting graph is saved to a file.


    `create_summary_brief` uses the `fpdf` module to save a text PDF page containing
    the total summary information.


    > The template and information in `create_summary_brief` has been left deliberately
    simple to avoid complicating this recipe, but it can be complicated with better
    descriptive text and formatting. Refer to *Chapter 5, Generating Fantastic Reports*,
    for more details on how to use `fpdf`.'
