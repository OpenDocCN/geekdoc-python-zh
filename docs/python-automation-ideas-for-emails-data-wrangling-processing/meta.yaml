  - '[PAGE 388]


    We will start our journey into machine learning by detecting already existing
    labels in images. To be able to do so, we will need to set up an account in Google
    Cloud.


    # Analyzing images with Google Cloud Vision AI


    We will acquire basic access to Google Cloud Vision AI to detect what broad categories
    can be inferred from pictures automatically. These categories are called labels
    by the API. These labels identify objects (such as a box), locations (such as
    a landscape), animal species (such as a cat), and other things. We will use images
    already presented in Chapter 4, Searching and Reading Local Files.


    In this recipe, we will set up a Google Cloud account to use its APIs. This process
    will work as the basis for other recipes in this chapter.


    # Getting ready


    We first need to set up our account with Google, so go to the Google Cloud site
    at https://cloud.google.com/vision:


    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_388_0.png)'
