- md: "## 9 Dealing with Communication Channels\n\nDealing with communication channels\
    \ is where automating things can produce big gains. In this chapter, we'll see\
    \ how to work with two of the most common communication channels—emails, including\
    \ newsletters, and sending and receiving text messages by phone.\n\nDuring the\
    \ years, there has been a fair amount of abuse in both channels, like spam or\
    \ unsolicited marketing messages, making it necessary for senders to use external\
    \ tools to avoid messages being rejected by automated filters. We will present\
    \ the proper caveats where applicable. The presented tools have a lot of features\
    \ that will help you with your specific task. They also have excellent documentation,\
    \ so do not be afraid to read it.\n\nIn this chapter, we will cover the following\
    \ recipes:\n\n- Working with email templates\n- Sending an individual email\n\
    - Reading an email\n- Adding subscribers to an email newsletter\n- Sending notifications\
    \ via email\n- Producing SMS\n- Receiving SMS\n- Creating a Telegram bot\n\nWe\
    \ will start by understanding how to use templates to generate good emails.\n\n\
    ## Working with email templates\n\nTo send an email, we first need to generate\
    \ its content. In this recipe, we'll see how to generate a proper template, in\
    \ both text-only style and HTML.\n\n### Getting ready\n\nWe should start by installing\
    \ the mistune module, which will compile Markdown documents into HTML. We will\
    \ also use the jinja2 module to combine HTML with our text:\n\n```\n$ echo \"\
    mistune==0.8.4\" >> requirements.txt\n$ echo \"jinja2==2.11.1\" >> requirements.txt\n\
    $ pip install -r requirements.txt\n```\n\nIn this book's GitHub repository, there\
    \ are a couple of templates we will use—email_template.md at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter09/email_template.md\
    \ and a template for styling, email_styling.html, at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter09/email_styling.html.\n\
    \n### How to do it...\n\n1. Import the modules:\n    ```python\n    >>> import\
    \ mistune\n    >>> import jinja2\n    ```\n2. Read both templates from disk:\n\
    \    ```python\n    >>> with open('email_template.md') as md_file:\n    ...  \
    \   markdown = md_file.read()\n\n    >>> with open('email_styling.html') as styling_file:\n\
    \    ...     styling = styling_file.read()\n    ```\n3. Define the data to include\
    \ in the template. The template is quite simple and accepts only a single name\
    \ parameter:\n    ```python\n    >>> data = {'name': 'Seamus'}\n    ```\n4. Render\
    \ the Markdown template. This produces the text-only version of the data:\n  \
    \  ```python\n    >>> text = markdown.format(**data)\n    ```\n5. Render the Markdown\
    \ and add the styling:\n    ```python\n    >>> html_content = mistune.markdown(text)\n\
    \    >>> html = jinja2.Template(styling).render(content=html_content)\n    ```\n\
    6. Save the text and the HTML version to disk to check them:\n    ```python\n\
    \    >>> with open('text_version.txt', 'w') as fp:\n    ...     fp.write(text)\n\
    \    >>> with open('html_version.html', 'w') as fp:\n    ...     fp.write(html)\n\
    \    ```\n7. Exit the interpreter and check the text version:\n    ```\n    $\
    \ cat text_version.txt\n    Hi Seamus:\n\n    This is an email talking about **things**\n\
    \n    ### Very important info\n\n    1. One thing\n    2. Other thing\n    3.\
    \ Some extra detail\n\n    Best regards,\n\n    *The email team*\n    ```\n8.\
    \ Check the HTML version in a browser:\n\n    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_313_0.png)\n\
    \n    Figure 9.1: Rendered image of the HTML file\n\n### How it works...\n\nStep\
    \ 1 imports the modules that will be used later, and step 2 reads the two templates\
    \ that will be rendered. email_template.md is the basis of the content, and it's\
    \ a Markdown template. email_styling.html is an HTML template that contains the\
    \ basic HTML surrounding and CSS styling information.\n\n> The basic strategy\
    \ is to create the content in Markdown format. This is a readable plain text file,\
    \ which can be sent as part of the email. That content can then be converted into\
    \ HTML and surrounded with some styling to assemble the complete, styled HTML\
    \ file. The styling file email_styling.html has a content area where we can put\
    \ the rendered HTML from Markdown.\n\nStep 3 defines the data that will render\
    \ in `email_template.md`. It is a very simple template that only requires a parameter\
    \ called `name`.\n\nIn step 4, the Markdown template gets rendered with the `data`.\
    \ This produces the plain text version of the email.\n\nThe HTML version is rendered\
    \ in step 5. The plain text version is rendered to HTML using `mistune`, and then\
    \ wrapped in `email_styling.html` using a `jinja2` template. The final version\
    \ is a self-contained HTML document.\n\nFinally, we save both versions, plain\
    \ text (as `text`) and HTML (as `html`), to a file in step 6. Steps 7 and 8 check\
    \ the stored values. The information is the same, but in the HTML version, it\
    \ is better styled.\n\n### There's more...\n\nUsing Markdown makes emails that\
    \ contain a version in both plain text and HTML easy to generate. Markdown is\
    \ quite readable in text format, and renders very naturally into HTML. That said,\
    \ it is possible to generate a totally different HTML version, which will allow\
    \ for more customization and taking advantage of HTML's features.\n\nThe full\
    \ Markdown syntax can be found at `https://daringfireball.net/projects/markdown/syntax`,\
    \ and a good cheat sheet with the most commonly used elements can be found at\
    \ `https://www.markdownguide.org/cheat-sheet`.\n\n> While making a plain text\
    \ version of an email is not strictly necessary, it is a good practice and shows\
    \ you care about who reads the email. Most email clients accept HTML, but it's\
    \ not totally universal.\n\nFor an HTML email, note that the whole stylesheet\
    \ information should be contained in the email. This means that the CSS needs\
    \ to be embedded into the HTML. Avoid making external references to resources\
    \ that could lead the email to not render properly in some email clients, or even\
    \ be qualified as spam.\n\nThe styling in `email_styling.html` is based on the\
    \ modest stylesheet, which can be found here: `http://markdowncss.github.io/`.\
    \ There are more CSS stylesheets that can be used, and a search using Google should\
    \ find more. Remember to remove any external references, as discussed previously.\n\
    \nImages can be included in HTML by encoding the image in base64 format so it\
    \ can be embedded directly in the HTML img tag, instead of adding a reference:\n\
    \n```python\n>>> import base64\n>>> with open(\"image.png\", 'rb') as file:\n\
    ...     encoded_data = base64.b64encode(file)\n>>> print(\"<img src='data:image/png;base64,{data}'/>\"\
    .format(data=encoded_data))\n```\n\nYou can find more information about this technique\
    \ in this article: https://css-tricks.com/data-uris/.\n\nThe mistune full documents\
    \ are available at http://mistune.readthedocs.io/en/latest/, and the jinja2 documentation\
    \ can be found at https://jinja.palletsprojects.com/en/2.11.x/.\n\n### See also\n\
    \n- The Formatting text in Markdown recipe in Chapter 5, Generating Fantastic\
    \ Reports, to learn more about Markdown\n- The Using templates for reports recipe\
    \ in Chapter 5, Generating Fantastic Reports, to learn more about Jinja2 templates\n\
    - The Sending an individual email recipe, later in this chapter, to follow up\
    \ on how to send the composed email\n\n## Sending an individual email\n\nThe most\
    \ basic way of sending an email is by using the standard **Simple Mail Transfer\
    \ Protocol (SMTP)**. SMTP is one of the oldest protocols on the Internet. Although\
    \ newer proprietary protocols exist, SMTP is the standard used by all email providers\
    \ to communicate with each other and is one of the pillars of electronic communications.\n\
    \nSMTP allows you to send rich emails with multiple sections containing different\
    \ kinds of data. These sections can be used to add attachments, or to generate\
    \ alternative sections, such as a plain text and HTML version of the same message,\
    \ to display on compatible email clients.\n\nGiven SMTP is such a strong standard,\
    \ it is easy to use, and virtually all languages and operating systems support\
    \ it. This ease of usage is also a weakness as the amount of spam email is huge,\
    \ and big players in the email domain have strong incentives to disallow emails\
    \ coming from non-verified sources, like a Python script.\n\nThis is why SMTP\
    \ is only recommended for very sporadic use and simple purposes such as sending\
    \ a few emails a day to controlled addresses.\n\n> Do not use this method to send\
    \ emails in bulk to distribution lists or to customers from random email addresses.\
    \ You risk being banned from your service provider due to anti-spam rules.\n\n\
    ### Getting ready\n\nFor this recipe, we'll need an email account with a service\
    \ provider. There are small differences based on the provider you'll use, but\
    \ we'll be using a Gmail account as they are very common and free to access.\n\
    \nDue to Gmail's security, we'll need to create a specific app password that can\
    \ be used to send an email. Follow the instructions here: https://support.google.com/accounts/answer/185833.\
    \ This will help you generate a password for the purpose of this recipe. Remember\
    \ to create it for mail access. You can delete the password afterward to remove\
    \ it.\n\nWe'll use the `smtplib` module, which is part of Python's standard library."
  mdcn: "## 9 处理通信渠道\n\n处理通信渠道是自动化能带来巨大收益的领域。在本章中，我们将了解如何使用两种最常见的通信渠道——包括新闻通讯在内的电子邮件，以及通过手机发送和接收短信。\n\
