  mdcn: "## 工作原理...\n\n让我们来看一下 `location_price.py` 脚本，它在*步骤 2*中使用。\n\n脚本文件的末尾处理参数解析，这在*第\
    \ 2 章，轻松实现任务自动化*中有详细描述。\n\n`main` 函数读取输入的 CSV 文件，并对每一行调用 `add_price_by_location`\
    \ 函数。然后保存文件：\n\n```python\ndef main(input_file, output_file):\n    reader = csv.DictReader(input_file)\n\
    \    result = [add_price_by_location(row) for row in reader]\n\n    # Save into\
    \ csv format\n    header = result[0].keys()\n    writer = csv.DictWriter(output_file,\
    \ fieldnames=header)\n    writer.writeheader()\n    writer.writerows(result)\n\
    ```\n\n## 清理和处理数据\n\n它使用 CSV 的 `DictReader` 类将每一行转换为一个字典。然后将该字典传递进行处理。处理后的行使用\
    \ `DictWriter` 类存储到输出 CSV 文件中。输出文件的字段标题从第一个输出行的字典键中获取。\n\n`DictReader` 和 `DictWriter`\
    \ 的用法已在*第 6 章，电子表格的乐趣*中描述过。\n\n最有趣的代码在 `add_price_by_location` 中。这段代码将根据位置代码检测国家（美国或加拿大）。让我们来看一下：\n\
    \n```python\nUS_LOCATIONS = ['AL', 'AK', ..., 'WY', 'DC']\nCAD_LOCATIONS = ['AB',\
    \ 'BC', ..., 'NU', 'YT']\nCAD_TO_USD = Decimal(0.76)\n\ndef add_price_by_location(row):\n\
    \    location = row['LOCATION']\n    if location in US_LOCATIONS:\n        row['COUNTRY']\
    \ = 'USA'\n        row['CURRENCY'] = 'USD'\n        row['USD'] = Decimal(row['PRICE'])\n\
    \    elif location in CAD_LOCATIONS:\n        row['COUNTRY'] = 'CANADA'\n    \
    \    row['CURRENCY'] = 'CAD'\n        row['USD'] = Decimal(row['PRICE']) * CAD_TO_USD\n\
    \    else:\n        raise Exception('Location not found')\n\n    return row\n\
    ```\n\n根据位置，它推导出货币。请注意，加拿大省份和地区以及美国州的两个字母代码在两个列表中描述。每个的完整描述在 `CAD_LOCATIONS` 和\
    \ `US_LOCATIONS` 数组中。如果检测到的位置是美国州，则货币设置为美元；对于加拿大的所有省份和地区，则设置为加元。\n\n> 美国州和加拿大省份拥有不同的唯一代码，使其易于区分，这非常方便。在其他系统中，这可能更复杂。\n\
    \n它向字典中添加了新的键，用于国家、货币和价格的美元等值。然后这三个键作为列添加到输出 CSV 中。\n\n> 自 Python 3.7 起，字典保持插入顺序。这意味着当键被呈现时，最后添加到字典的键将最后被检索。在之前的版本中并非如此，我们必须依赖\
    \ OrderedDict，这是一种保留键顺序的特殊字典。我们利用了这种行为来生成标题，因为任何新引入的元素都将作为新列存储在末尾，保持旧列的顺序。\n\n\
    生成的文件以通用货币提供每条销售日志的信息，使比较更容易。\n\n## 还有更多...\n\n正如我们之前评论的，处理和区分位置和货币可能不像这里展示的那样直接。不同的国家可能有不同的表示地点的方式，在某些情况下，用于表示不同国家位置的代码可能会重叠。\n\
    \n国家作为一列添加，以便以后使用。\n\n货币汇率被定义为常量，但这只是一个近似值。可能需要从外部来源获取它。例如，www.exchangerate-api.com\
    \ 提供了一个免费的 API 来集成汇率转换，如下所示：\n\n```python\n>>> import requests\n>>> result = requests.get('https://api.exchangerate-api.com/v4/latest/CAD')\n\
    >>> result.json()['rates']['USD']\n0.755081\n```\n\n更复杂的设置可能需要访问特定的汇率来源或能够检索历史汇率信息。\n\
    \n> 大多数汇率来源对调用次数有限制，或按访问收费。请务必避免持续轮询数据，并将汇率存储以供本地使用。\n\n## 另请参阅\n\n- 上一节的*准备 CSV\
    \ 电子表格*配方。\n- *第 4 章，搜索和读取本地文件*中的*读取 CSV 文件*配方。\n- *第 2 章，轻松实现任务自动化*中的*准备任务*配方。\n\
    \n## 标准化日期格式\n\n日志中的日期时间格式因位置而异。在加拿大日志中，格式是标准的 ISO 8601，格式为 YYYY-MM-DD。来自美国的日志使用\
    \ MM-DD-YYYY 格式。在这个配方中，我们将添加一个新列，使用标准格式来统一两个日期。\n\n## 准备工作\n\n我们将使用上一个配方生成的 CSV\
    \ 文件，该文件接收并转换以下格式的日志：\n\n```\n[<Timestamp>] - SALE - PRODUCT: <product id> - PRICE:\
    \ <price>\n```\n\n每一行将代表一条销售日志。\n\n我们将使用 `parse` 模块。我们应该安装该模块，将其添加到我们的 `requirements.txt`\
    \ 文件中，如下所示：\n\n```\n$ echo \"parse==1.14.0\" >> requirements.txt\n$ pip install\
    \ -r requirements.txt\n```\n\n在 GitHub 仓库中，有一些要处理的日志文件，结构如下：\n\n```\nsale_logs/\n\
    \  OH\n    logs.txt\n  ON\n    logs.txt\n```\n\n代码可以在 GitHub 仓库中找到：https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter07。\n\
    \n## 如何操作...\n\n1. 使用 `logs_to_csv.py` 脚本导入数据并将其转换为 CSV 文件。该脚本将位置作为输入添加。为 OH 和\
    \ OT 日志创建文件：\n\n```\n$ python logs_to_csv.py sale_logs/OH/logs.txt output_1_OH.csv\
    \ -l OH\n$ python logs_to_csv.py sale_logs/ON/logs.txt output_1_ON.csv -l ON\n\
    ```\n\n2. 使用 `location_price.py` 脚本处理两个生成的文件：\n\n```\n$ python location_price.py\
    \ output_1_OH.csv output_2_OH.csv\n$ python location_price.py output_1_ON.csv\
    \ output_2_ON.csv\n```\n\n3. 使用 `standard_date.py` 脚本处理两个文件：\n\n```\n$ python\
    \ standard_date.py output_2_OH.csv output_3_OH.csv\n$ python standard_date.py\
    \ output_2_ON.csv output_3_ON.csv\n```\n\n4. 在电子表格中检查生成的 CSV 文件。在以下截图中，文件使用 LibreOffice\
