    (.venv) $ pip --version

    pip 20.0.2 from /root_dir/.venv/lib/python3.8/site-packages/pip (python 3.8)

    ```


    > An alternative is to run python -m ensurepip -U, which will ensure that pip
    is installed.


    4. Get out of the environment and run pip to check the version, which will return
    the previous environment. Check the pip version and the Python interpreter to
    show the existing directories before activating the virtual environment directories,
    as shown in step 3 of the Getting ready section. Note that they are different
    pip versions:


    ```

    (.venv) $ deactivate

    $ which python3

    /usr/local/bin/python3

    $ pip --version

    pip 10.0.1 from /usr/local/lib/python3.8/site-packages/pip (python 3.8)

    ```'
  - "[PAGE 4]\n\n# How it works...\n\nNotice that inside the virtual environment you\
    \ can use `python` instead of `python3`, although `python3` is available as well.\
    \ This will use the Python interpreter defined in the environment.\n\nIn some\
    \ systems, like Linux, it's possible that you'll need to use `python3.8` instead\
    \ of `python3`. Verify that the Python interpreter you're using is 3.8 or higher.\n\
    \nInside the virtual environment, *step 3* of the *How to do it* section installs\
    \ the most recent version of `pip`, without affecting the external installation.\n\
    \nThe virtual environment contains all the Python data in the `.venv` directory,\
    \ and the `activate` script points all the environment variables there. The best\
    \ thing about it is that it can be deleted and recreated very easily, removing\
    \ the fear of experimenting in a self-contained sandbox.\n\nRemember that the\
    \ directory name is displayed in the prompt. If you need to differentiate the\
    \ environment, use a descriptive directory name, such as `.my_automate_recipe`,\
    \ or use the `-prompt` option.\n\n# There's more...\n\nTo remove a virtual environment,\
    \ deactivate it and remove the directory:\n\n```\n(.venv) $ deactivate\n$ rm -rf\
    \ .venv\n```\n\nThe `venv` module has more options, which can be shown with the\
    \ `-h` flag:\n\n```\n$ python3 -m venv -h\nusage: venv [-h] [--system-site-packages]\n\
    \            [--symlinks | --copies] [--clear]\n            [--upgrade] [--without-pip]\n\
    \            [--prompt PROMPT]\n            ENV_DIR [ENV_DIR ...]\n\nCreates virtual\
    \ Python environments in one or more target directories.\n\npositional arguments:\n\
    \  ENV_DIR               A directory to create the\n                        environment\
    \ in.\n```"
  - '[PAGE 5]


    Let''s Begin Our Automation Journey


    optional arguments:


    | 参数 | 描述 |

    | --- | --- |

    | -h, --help | show this help message and exit |

    | --system-site-packages | Give the virtual environment access to the system site-packages
    dir. |

    | --symlinks | Try to use symlinks rather than copies, when symlinks are not the
    default for the platform. |

    | --copies | Try to use copies rather than symlinks, even when symlinks are the
    default for the platform. |

    | --clear | Delete the contents of the environment directory if it already exists,
    before environment creation. |

    | --upgrade | Upgrade the environment directory to use this version of Python,
    assuming Python has been upgraded in-place. |

    | --without-pip | Skips installing or upgrading pip in the virtual environment
    (pip is bootstrapped by default) |

    | --prompt PROMPT | Provides an alternative prompt prefix for this environment.
    |


    Once an environment has been created, you may wish to activate it, e.g. by sourcing
    an activate script in its bin directory.'
  - "[PAGE 6]\n\nA convenient way of dealing with virtual environments, especially\
    \ if you often have to swap between them, is to use the `virtualenvwrapper` module:\n\
    \n+   1. To install it, run this:\n   bash\n   $ pip install virtualenvwrapper\n\
    \   \n2. Then, add the following variables to your shell startup script, these\
    \ are normally `.bashrc` or `.bash_profile`. The virtual environments will be\
    \ installed under the `WORKON_HOME` directory instead of the same directory as\
    \ the project, as shown previously:\n   bash\n   export WORKON_HOME=~/.virtualenvs\n\
    \   source /usr/local/bin/virtualenvwrapper.sh\n   \n\nSourcing the startup script\
    \ or opening a new terminal will allow you to create new virtual environments:\n\
    \n```\n$ mkvirtualenv automation_cookbook\n...\nInstalling setuptools, pip, wheel...done.\n\
    (automation_cookbook) $ deactivate\n$ workon automation_cookbook\n(automation_cookbook)\
    \ $\n```\n\nFor more information, view the documentation of `virtualenvwrapper`\
    \ at https://virtualenvwrapper.readthedocs.io/en/latest/index.html.\n\n> An alternative\
    \ tool for defining environments is Poetry (https://python-poetry.org/). This\
    \ tool is designed for creating consistent environments with clear dependencies,\
    \ and provides commands for upgrades and managing dependency packages. Check it\
    \ out to see whether it's useful in your use case.\n\nHitting the `Tab` key after\
    \ `workon` autocompletes the command with the available environments.\n\n# See\
    \ also\n\n+   - The *Installing third-party packages* recipe, covered later in\
    \ the chapter.\n- The *Using a third-party tool – parse* recipe, covered later\
    \ in the chapter."
- md: "## Installing third-party packages\n\nOne of the strongest capabilities of\
    \ Python is the ability to use an impressive catalog of third-party packages that\
    \ cover an amazing amount of ground in different areas, from modules specialized\
    \ in performing numerical operations, machine learning, and network communications,\
    \ to command-line convenience tools, database access, image processing, and much\
    \ more!\n\nMost of them are available on the official Python Package Index (https://pypi.org/),\
    \ which has more than 200,000 packages ready to use. In this book, we'll install\
    \ some of them. In general, it's worth spending a little time researching external\
    \ tools when trying to solve a problem. It's very likely that someone else has\
    \ already created a tool that solves all, or at least part, of the problem.\n\n\
    More important than finding and installing a package is keeping track of which\
    \ packages are being used. This greatly helps with **replicability**, meaning\
    \ the ability to start the whole environment from scratch in any situation.\n\n\
    ## Getting ready\n\nThe starting point is to find a package that will be of use\
    \ in our project.\n\nA great one is `requests`, a module that deals with HTTP\
    \ requests and is known for its easy and intuitive interface, as well as its great\
    \ documentation. Take a look at the documentation, which can be found here: https://requests.readthedocs.io/en/master/.\n\
    \nWe'll use `requests` throughout this book when dealing with HTTP connections.\n\
    \nThe next step will be to choose the version to use. In this case, the latest\
    \ (2.22.0, at the time of writing) will be perfect. If the version of the module\
    \ is not specified, by default it will install the latest version, which can lead\
    \ to inconsistencies in different environments as newer versions are released.\n\
    \nWe'll also use the great `delorean` module for time handling (version 1.0.0:\
    \ http://delorean.readthedocs.io/en/latest/).\n\n## How to do it...\n\n1. Create\
    \ a `requirements.txt` file in our `main` directory, which will specify all the\
    \ requirements for our project. Let's start with `delorean` and `requests`:\n\n\
    \    ```\n    delorean==1.0.0\n    requests==2.22.0\n    ```\n\n2. Install all\
    \ the requirements with the `pip` command:\n\n    ```\n    $ pip install -r requirements.txt\n\
    \    ...\n    Successfully installed babel-2.8.0 certifi-2019.11.28\n    chardet-3.0.4\
    \ delorean-1.0.0 humanize-0.5.1 idna-2.8 python-\n    dateutil-2.8.1 pytz-2019.3\
    \ requests-2.22.0 six-1.14.0\n    tzlocal-2.0.0 urllib3-1.25.7\n    ```\n\n  \
    \  Show the available modules installed using `pip list`:\n\n    ```\n    $ pip\
    \ list\n    Package            Version\n    ------------------ ----------\n  \
    \  Babel              2.8.0\n    certifi            2019.11.28\n    chardet  \
    \          3.0.4\n    Delorean           1.0.0\n    humanize           2.0.0\n\
    \    idna               2.8\n    pip                19.2.3\n    python-dateutil\
    \    2.8.1\n    pytz               2019.3\n    requests           2.22.0\n   \
    \ setuptools         41.2.0\n    six                1.14.0\n    tzlocal      \
    \      2.0.0\n    urllib3            1.25.8\n    ```\n\n3. You can now use both\
    \ modules when using the virtual environment:\n\n    ```\n    $ python\n    Python\
    \ 3.8.1 (default, Dec 27 2019, 18:05:45)\n    [Clang 11.0.0 (clang-1100.0.33.16)]\
    \ on darwin\n    Type \"help\", \"copyright\", \"credits\" or \"license\" for\
    \ more\n    information.\n    >>> import delorean\n    >>> import requests\n \
    \   ```\n\n## How it works...\n\nThe `requirements.txt` file specifies the module\
    \ and version, and pip performs a search on `pypi.org`.\n\nNote that creating\
    \ a new virtual environment from scratch and running the following will completely\
    \ recreate your environment, which makes replicability very straightforward:\n\
    \n```\n$ pip install -r requirements.txt\n```\n\nNote that step 2 of the *How\
    \ to do it* section automatically installs other modules that are dependencies,\
    \ such as `urllib3`.\n\n## There's more...\n\nIf any of the modules need to be\
    \ changed to a different version because a new version is available, change them\
    \ using `requirements` and run the `install` command again:\n\n```\n$ pip install\
    \ -r requirements.txt\n```\n\nThis is also applicable when a new module needs\
    \ to be included.\n\nAt any point, the `freeze` command can be used to display\
    \ all of the installed modules. `freeze` returns the modules in a format compatible\
    \ with `requirements.txt`, making it possible to generate a file with our current\
    \ environment:\n\n```\n$ pip freeze > requirements.txt\n```\n\nThis will include\
    \ dependencies, so expect a lot more modules in the file.\n\nFinding great third-party\
    \ modules is sometimes not easy. Searching for specific functionality can work\
    \ well, but, sometimes, there are great modules that are a surprise because they\
    \ do things you never thought of. A great curated list is Awesome Python (https://awesome-python.com/),\
    \ which covers a lot of great tools for common Python use cases, such as cryptography,\
    \ database access, date and time handling, and more.\n\nIn some cases, installing\
    \ packages may require additional tools, such as compilers or a specific library\
    \ that supports some functionality (for example, a particular database driver).\
    \ If that's the case, the documentation will explain the dependencies.\n\n## See\
    \ also\n\n- The *Activating a virtual environment* recipe, covered earlier in\
    \ this chapter.\n- The *Using a third-party tool – parse* recipe, covered later\
    \ in this chapter, to learn how to use one installed third-party module.\n\n##\
    \ Creating strings with formatted values\n\nOne of the basic abilities when dealing\
    \ with creating text and documents is to be able to properly format values into\
    \ structured strings. Python is smart at presenting good defaults, such as properly\
    \ rendering a number, but there are a lot of options and possibilities.\n\nWe'll\
    \ discuss some of the common options when creating formatted text using the example\
    \ of a table.\n\n## Getting ready\n\nThe main tool to format strings in Python\
    \ is the `format` method. It works with a defined mini-language to render variables\
    \ this way:\n\n```\nresult = template.format(*parameters)\n```\n\nThe `template`\
    \ is a string that is interpreted based on the mini-language. At its simplest,\
    \ templating replaces the values between the curly brackets with the parameters.\
    \ Here are a couple of examples:\n\n```\n>>> 'Put the value of the string here:\
    \ {}'.format('STRING')\n\"Put the value of the string here: STRING\"\n>>> 'It\
    \ can be any type ({}) and more than one ({})'.format(1.23, 'STRING')\n\"It can\
    \ be any type (1.23) and more than one (STRING)\"\n>>> 'Specify the order: {1},\
    \ {0}'.format('first', 'second')\n'Specify the order: second, first'\n>>> 'Or\
    \ name parameters: {first}, {second}'.format(second='SECOND', first='FIRST')\n\
    'Or name parameters: FIRST, SECOND'\n```\n\nIn 95% of cases, this formatting will\
    \ be all that's required; keeping things simple is great! But for complicated\
    \ times, such as when aligning strings automatically and creating good looking\
    \ text tables, the mini-language `format` has more options.\n\n## How to do it...\n\
    \n1. Write the following script, `recipe_format_strings_step1.py`, to print an\
    \ aligned table:\n\n    ```\n    # INPUT DATA\n    data = [\n        (1000, 10),\n\
    \        (2000, 17),\n        (2500, 170),\n        (2500, -170),\n    ]\n\n \
    \   # Print the header for reference\n    print('REVENUE | PROFIT | PERCENT')\n\
    \n    # This template aligns and displays the data in the proper format\n    TEMPLATE\
    \ = '{revenue:>7,} | {profit:>+6} | {percent:>7.2%}'\n\n    # Print the data rows\n\
    \    for revenue, profit in data:\n        row = TEMPLATE.format(revenue=revenue,\
    \ profit=profit,\n                              percent=profit / revenue)\n  \
    \      print(row)\n    ```\n\n2. Run it to display the following aligned table.\
    \ Note that `PERCENT` is correctly displayed as a percentage:\n\n    ```\n   \
    \ REVENUE | PROFIT | PERCENT\n      1,000 |    +10 |   1.00%\n      2,000 |  \
    \  +17 |   0.85%\n      2,500 |   +170 |   6.80%\n      2,500 |   -170 |  -6.80%\n\
    \    ```\n\n## How it works...\n\nThe `TEMPLATE` constant defines three columns,\
    \ each one defined by a parameter named `revenue`, `profit`, and `percent`. This\
    \ makes it explicit and straightforward to apply the template to the `format`\
    \ call.\n\nAfter the name of the parameter, there's a colon that separates the\
    \ format definition. Note that everything is inside the curly brackets. In all\
    \ columns, the format specification sets the width to seven characters, to make\
    \ sure all the columns have the same width, and aligns the values to the right\
    \ with the > symbol:\n\n- `revenue` adds a thousands separator with the `,` symbol\
    \ — `[{revenue:>7,}]`.\n- `profit` adds a `+` sign for positive values. A `-`\
    \ sign for negatives is added automatically — `[{profit:>+7}]`.\n- `percent` displays\
    \ a percent value with a precision of two decimal places — `[{percent:>7.2%}]`.\
    \ This is done through `.2` (precision) and adding a `%` symbol for the percentage.\n\
    \n## There's more...\n\nYou may have also seen the available Python formatting\
    \ with the `%` operator. While it works for simple formatting, it is less flexible\
    \ than the formatted mini-language, and it is not recommended for use.\n\nA great\
    \ new feature since Python 3.6 is to use f-strings, which perform a format action\
    \ using defined variables:\n\n```\n>>> param1 = 'first'\n>>> param2 = 'second'\n\
    >>> f'Parameters {param1}:{param2}'\n'Parameters first:second'\n```\n\nThis simplifies\
    \ a lot of the code and allows us to create very descriptive and readable code.\n\
    \nBe careful when using f-strings to ensure that the string is replaced at the\
    \ proper time. A common problem is that the variable defined to be rendered is\
    \ not yet defined. For example, `TEMPLATE`, defined previously, won't be defined\
    \ as an f-string, as `revenue` and the rest of the parameters are not available\
    \ at that point. All variables defined at the scope of the string definition will\
    \ be available, both local and global.\n\nIf you need to write a curly bracket,\
    \ you'll need to repeat it twice. Note that each duplication will be displayed\
    \ as a single curly bracket, plus a curly bracket for the value replacement, making\
    \ a total of three brackets:\n\n```\n>>> value = 'VALUE'\n>>> f'This is the value,\
    \ in curly brackets {{{value}}}'\n'This is the value, in curly brackets {VALUE}'\n\
    ```"
  mdcn: "## 安装第三方包\n\nPython 最强大的能力之一，就是能够使用令人印象深刻的第三方包目录，这些包覆盖了不同领域的大量功能，从专门执行数值运算、机器学习和网络通信的模块，到命令行便捷工具、数据库访问、图像处理等等！\n\
    \n其中大部分包都可在官方的 Python 包索引（https://pypi.org/）上找到，该索引拥有超过 20 万个现成可用的包。在本书中，我们将安装其中一些。通常，在尝试解决问题时，花一点时间研究外部工具是值得的。很可能已经有人创建了一个能解决全部或至少部分问题的工具。\n\
    \n比查找和安装包更重要的是，要跟踪正在使用哪些包。这极大地有助于**可复现性**，即在任何情况下都能从头开始重建整个环境的能力。\n\n## 准备工作\n\
    \n起点是找到一个对我们的项目有用的包。\n\n一个很棒的包是 `requests`，这是一个处理 HTTP 请求的模块，以其简单直观的接口和出色的文档而闻名。可以在这里查看文档：https://requests.readthedocs.io/en/master/。\n\
    \n在本书中，我们将使用 `requests` 来处理 HTTP 连接。\n\n下一步是选择要使用的版本。在这种情况下，最新版本（撰写本文时为 2.22.0）将是完美的。如果未指定模块的版本，默认情况下将安装最新版本，这可能导致不同环境之间出现不一致，因为新版本会不断发布。\n\
    \n我们还将使用出色的 `delorean` 模块进行时间处理（版本 1.0.0：http://delorean.readthedocs.io/en/latest/）。\n\
    \n## 操作步骤...\n\n1. 在我们的 `main` 目录中创建一个 `requirements.txt` 文件，该文件将指定我们项目的所有依赖项。让我们从\
    \ `delorean` 和 `requests` 开始：\n\n    ```\n    delorean==1.0.0\n    requests==2.22.0\n\
    \    ```\n\n2. 使用 `pip` 命令安装所有依赖项：\n\n    ```\n    $ pip install -r requirements.txt\n\
    \    ...\n    Successfully installed babel-2.8.0 certifi-2019.11.28\n    chardet-3.0.4\
    \ delorean-1.0.0 humanize-0.5.1 idna-2.8 python-\n    dateutil-2.8.1 pytz-2019.3\
    \ requests-2.22.0 six-1.14.0\n    tzlocal-2.0.0 urllib3-1.25.7\n    ```\n\n  \
    \  使用 `pip list` 显示已安装的可用模块：\n\n    ```\n    $ pip list\n    Package         \
    \   Version\n    ------------------ ----------\n    Babel              2.8.0\n\
    \    certifi            2019.11.28\n    chardet            3.0.4\n    Delorean\
    \           1.0.0\n    humanize           2.0.0\n    idna               2.8\n\
    \    pip                19.2.3\n    python-dateutil    2.8.1\n    pytz       \
    \        2019.3\n    requests           2.22.0\n    setuptools         41.2.0\n\
    \    six                1.14.0\n    tzlocal            2.0.0\n    urllib3    \
    \        1.25.8\n    ```\n\n3. 现在，您可以在使用虚拟环境时使用这两个模块：\n\n    ```\n    $ python\n\
    \    Python 3.8.1 (default, Dec 27 2019, 18:05:45)\n    [Clang 11.0.0 (clang-1100.0.33.16)]\
    \ on darwin\n    Type \"help\", \"copyright\", \"credits\" or \"license\" for\
    \ more\n    information.\n    >>> import delorean\n    >>> import requests\n \
    \   ```\n\n## 工作原理...\n\n`requirements.txt` 文件指定了模块和版本，pip 会在 `pypi.org` 上进行搜索。\n\
    \n请注意，从头开始创建一个新的虚拟环境并运行以下命令将完全重建您的环境，这使得可复现性变得非常直接：\n\n```\n$ pip install -r requirements.txt\n\
    ```\n\n请注意，*操作步骤*部分的第 2 步会自动安装作为依赖项的其他模块，例如 `urllib3`。\n\n## 更多内容...\n\n如果任何模块需要更改为不同的版本（因为有新版本可用），请使用\
    \ `requirements` 进行更改，然后再次运行 `install` 命令：\n\n```\n$ pip install -r requirements.txt\n\
    ```\n\n当需要包含新模块时，这也适用。\n\n在任何时候，都可以使用 `freeze` 命令来显示所有已安装的模块。`freeze` 以与 `requirements.txt`\
    \ 兼容的格式返回模块，从而可以生成包含我们当前环境的文件：\n\n```\n$ pip freeze > requirements.txt\n```\n\n\
    这将包括依赖项，因此预计文件中会有更多模块。\n\n找到优秀的第三方模块有时并不容易。搜索特定功能可能效果很好，但有时，一些很棒的模块会带来惊喜，因为它们能完成您从未想过的事情。一个很棒的精选列表是\
    \ Awesome Python（https://awesome-python.com/），它涵盖了针对常见 Python 用例的许多优秀工具，例如加密、数据库访问、日期和时间处理等。\n\
    \n在某些情况下，安装包可能需要额外的工具，例如编译器或支持某些功能的特定库（例如，特定的数据库驱动程序）。如果是这种情况，文档将解释依赖项。\n\n##\
    \ 另请参阅\n\n- 本章前面介绍的*激活虚拟环境*方法。\n- 本章后面介绍的*使用第三方工具 – parse*方法，以了解如何使用已安装的第三方模块。\n\
    \n## 使用格式化值创建字符串\n\n处理创建文本和文档时的基本能力之一是能够将值正确格式化为结构化字符串。Python 擅长提供良好的默认值，例如正确渲染数字，但有很多选项和可能性。\n\
    \n我们将以表格为例，讨论创建格式化文本时的一些常见选项。\n\n## 准备工作\n\nPython 中格式化字符串的主要工具是 `format` 方法。它使用一种定义的迷你语言来渲染变量，如下所示：\n\
    \n```\nresult = template.format(*parameters)\n```\n\n`template` 是一个基于迷你语言进行解释的字符串。最简单的情况下，模板将花括号之间的值替换为参数。这里有几个例子：\n\
    \n```\n>>> 'Put the value of the string here: {}'.format('STRING')\n\"Put the\
    \ value of the string here: STRING\"\n>>> 'It can be any type ({}) and more than\
    \ one ({})'.format(1.23, 'STRING')\n\"It can be any type (1.23) and more than\
    \ one (STRING)\"\n>>> 'Specify the order: {1}, {0}'.format('first', 'second')\n\
    'Specify the order: second, first'\n>>> 'Or name parameters: {first}, {second}'.format(second='SECOND',\
    \ first='FIRST')\n'Or name parameters: FIRST, SECOND'\n```\n\n在 95% 的情况下，这种格式化就足够了；保持简单是件好事！但在复杂的情况下，例如自动对齐字符串和创建美观的文本表格时，`format`\
    \ 迷你语言有更多选项。\n\n## 操作步骤...\n\n1. 编写以下脚本 `recipe_format_strings_step1.py` 以打印对齐的表格：\n\
    \n    ```\n    # INPUT DATA\n    data = [\n        (1000, 10),\n        (2000,\
    \ 17),\n        (2500, 170),\n        (2500, -170),\n    ]\n\n    # Print the\
    \ header for reference\n    print('REVENUE | PROFIT | PERCENT')\n\n    # This\
    \ template aligns and displays the data in the proper format\n    TEMPLATE = '{revenue:>7,}\
    \ | {profit:>+6} | {percent:>7.2%}'\n\n    # Print the data rows\n    for revenue,\
    \ profit in data:\n        row = TEMPLATE.format(revenue=revenue, profit=profit,\n\
    \                              percent=profit / revenue)\n        print(row)\n\
    \    ```\n\n2. 运行它以显示以下对齐的表格。请注意，`PERCENT` 被正确显示为百分比：\n\n    ```\n    REVENUE\
    \ | PROFIT | PERCENT\n      1,000 |    +10 |   1.00%\n      2,000 |    +17 | \
    \  0.85%\n      2,500 |   +170 |   6.80%\n      2,500 |   -170 |  -6.80%\n   \
    \ ```\n\n## 工作原理...\n\n`TEMPLATE` 常量定义了三列，每列由名为 `revenue`、`profit` 和 `percent`\
    \ 的参数定义。这使得将模板应用于 `format` 调用变得明确而直接。\n\n在参数名称之后，有一个冒号分隔格式定义。请注意，所有内容都在花括号内。在所有列中，格式规范将宽度设置为七个字符，以确保所有列具有相同的宽度，并使用\
    \ > 符号将值右对齐：\n\n- `revenue` 使用 `,` 符号添加千位分隔符 —— `[{revenue:>7,}]`。\n- `profit`\
    \ 为正值添加 `+` 号。负值会自动添加 `-` 号 —— `[{profit:>+7}]`。\n- `percent` 显示精度为两位小数的百分比值 ——\
    \ `[{percent:>7.2%}]`。这是通过 `.2`（精度）和添加 `%` 符号来实现百分比的。\n\n## 更多内容...\n\n您可能也见过使用\
    \ `%` 运算符的 Python 格式化。虽然它适用于简单的格式化，但不如格式化迷你语言灵活，因此不建议使用。\n\nPython 3.6 以来的一个很棒的新特性是使用\
    \ f-string，它使用定义的变量执行格式化操作：\n\n```\n>>> param1 = 'first'\n>>> param2 = 'second'\n\
    >>> f'Parameters {param1}:{param2}'\n'Parameters first:second'\n```\n\n这简化了大量代码，并允许我们创建非常具有描述性和可读性的代码。\n\
    \n使用 f-string 时要小心，确保字符串在适当的时间被替换。一个常见问题是，定义为要渲染的变量尚未定义。例如，前面定义的 `TEMPLATE` 不会被定义为\
    \ f-string，因为 `revenue` 和其他参数在那时不可用。在字符串定义作用域内定义的所有变量（包括局部和全局变量）都将可用。\n\n如果需要写入花括号，则需要重复两次。请注意，每次重复将显示为一个花括号，加上一个用于值替换的花括号，总共三个花括号：\n\
    \n```\n>>> value = 'VALUE'\n>>> f'This is the value, in curly brackets {{{value}}}'\n\
    'This is the value, in curly brackets {VALUE}'\n```"
