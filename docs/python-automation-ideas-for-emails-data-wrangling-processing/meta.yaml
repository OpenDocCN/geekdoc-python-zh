  - "[PAGE 442]\n\nOthers can be external, like `Beautiful Soup` to parse HTML or\
    \ `matplotlib` to generate graphs. We can also create our own libraries or structure\
    \ our code in different files and encapsulate the functionality in a way that's\
    \ reusable and improves readability.\n\nWhen creating tests, sometimes using external\
