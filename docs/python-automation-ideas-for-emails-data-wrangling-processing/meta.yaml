    >>> s = requests.Session()

    >>> s.auth = (''user'', ''psswd'')

    >>> s.get(''https://httpbin.org/basic-auth/user/psswd'')

    <Response [200]>

    ```


    # See also


    +   - The *Downloading web pages* recipe, earlier in this chapter, to learn the
    basics of requesting web pages.

    - The *Accessing web APIs* recipe, earlier in this chapter, to learn how to access
    APIs that are behind an authentication wall.'
  - '[PAGE 105]


    Building Your First Web Scraping Application


    # Speeding up web scraping


    Most of the time spent downloading information from web pages is usually spent
    waiting. A request goes from our computer to the remote server to process it,
    and until the response is composed and comes back to our computer, we cannot do
    much about it.


    During the execution of the recipes in the book, you''ll notice there''s a wait
    involved in `requests` calls, normally of around one or two seconds. But computers
    can do other stuff while waiting, including making more requests at the same time.
    In this recipe, we will see how to download a list of pages in parallel and wait
    until they are all ready. We will use an intentionally slow server to show why
    it''s worth getting this right.


    # Getting ready


    We''ll get code to crawl and search for keywords, making use of the `futures`
    capabilities of Python 3 to download multiple pages at the same time.


    A `future` is an object that represents the promise of a value. This means that
    you immediately receive an object while the code is being executed in the background
    - only, when specifically requesting its `.result()`, the code waits until the
    result is available.


    > If the result is already available at that point, that makes it faster. Think
    of the operation as putting something in the washing machine while doing other
    tasks. There''s a chance that the laundry will be done by the time we finish the
    rest of our chores.


    To generate a `future`, you need a background engine, called an **executor**.
    Once created, `submit` a function and parameters to it to retrieve a `future`.
    The retrieval of the result can be delayed as long as necessary, allowing the
    generation of several `futures` in a row; then we can wait until all are finished
    and execute them in parallel. This is an alternative to creating one, waiting
    until it finishes, creating another, and so on.


    There are several ways to create an executor; in this recipe, we''ll use `ThreadPoolExecutor`,
    which uses threads.


    We''ll use a prepared example, available at the following GitHub repo: https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter03/test_site.
    Download the whole site and run the included script:


    ```

    $ python simple_delay_server.py -d 2

    ```'
  - "[PAGE 106]\n\nThis serves the site at the URL http://localhost:8000. You can\
    \ see it in a browser. It's a simple blog with three entries. Most of it is uninteresting,\
    \ but we added a couple of paragraphs that contain the keyword python. The parameter\
    \ -d 2 makes the server intentionally slow, simulating a bad connection.\n\n#\
    \ How to do it...\n\n+   1. Write the following script, speed_up_step1.py. The\
    \ full code is available on GitHub at the Chapter03 directory (https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter03/speed_up_step1.py).\
    \ Here are only the most relevant parts. It is based on crawling_web_step1.py:\n\
    \n```\n...\ndef process_link(source_link, text):\n    ...\n    return source_link,\
    \ get_links(parsed_source, page)\n...\n\ndef main(base_url, to_search, workers):\n\
    \    checked_links = set()\n    to_check = [base_url]\n    max_checks = 10\n\n\
    \    with concurrent.futures.ThreadPoolExecutor(max_workers=workers) as executor:\n\
    \        while to_check:\n            futures = [executor.submit(process_link,\
    \ url, to_search)\n                      for url in to_check]\n            to_check\
    \ = []\n            for data in concurrent.futures.as_completed(futures):\n  \
    \              link, new_links = data.result()\n\n                checked_links.add(link)\n\
    \                for link in new_links:\n                    if link not in checked_links\
    \ and link not in to_check:\n                        to_check.append(link)\n```"
