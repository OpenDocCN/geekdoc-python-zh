    Developing Stunning Graphs


    To do that, we need to move the position of the second bar sequence. We''ll also
    need to set thinner bars to allow spaces:


    ```

    >>> WIDTH = 0.3

    >>> plt.bar([p - WIDTH / 2 for p in POS], VALUESA, width=WIDTH)

    >>> plt.bar([p + WIDTH / 2 for p in POS], VALUESB, width=WIDTH)

    ```


    Note how the width of the bar is set to a third of the space since our reference
    space is 1 between the bars. The first bar is moved to the left, while the second
    bar is moved to the right to center them. The `bottom` argument has been deleted
    so that the bars aren''t stacked:


    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_275_0.png)


    The full `matplotlib` documentation can be found here: https://matplotlib.org/.


