  - "[PAGE 251]\n\nCleaning and Processing Data\n\n# Process data in parallel\n\n\
    The processing presented in the previous recipe works well. But it needs to process\
    \ each file one by one. When we have a small number of files, this may be fine,\
    \ but with huge numbers of files to handle, this will not be efficient. Each time\
    \ we will be using a single CPU core, which is not the best for this type of number\
    \ crunching task.\n\nIn this recipe, we will see how to process the files in parallel,\
    \ making use of all the cores of the computer to speed up the process and greatly\
    \ increase the throughput.\n\n# Getting ready\n\nWe will use the resulting CSV\
    \ file from the previous recipe that receives and transforms logs in the following\
    \ format:\n\n`[<Timestamp>] - SALE - PRODUCT: <product id> - PRICE: <price>`\n\
    \nEach line will represent a sale log.\n\nWe will use the `parse` module and the\
    \ `delorean` module. We should install the modules, adding them to our `requirements.txt`\
    \ file as follows:\n\n```\n$ echo \"parse==1.14.0\" >> requirements.txt\n$ echo\
    \ \"delorean==1.0.0\" >> requirements.txt\n$ pip install -r requirements.txt\n\
    ```\n\nIn the GitHub repository, there are some log files to process with the\
    \ following structure:\n\n```\nsale_logs/\n  OH\n    logs.txt\n  ON\n    logs.txt\n\
    ```\n\nThe code can be found in the GitHub repository at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter07."
