    # # 12 Automatic Testing Routines


    In this chapter, we will cover the following recipes:


    +   - Writing and executing test cases

    - Testing external code

    - Testing using dependency mocking

    - Testing using HTTP call mocking

    - Preparing testing scenarios

    - Running tests selectively


    # ## Introduction


    When the code and the complexity of your software grows, generating tests to ensure
    your program does what it is supposed to do is the best tool to provide you with
    a firm footing over rocky terrain.


    Tests are, in essence, double-checking the code is valid and doing what it is
    supposed to do. This is a deceptively simple statement, but in practice, it can
    be very difficult.


    > > Mastering the ability to test is a difficult task and is worth a book or two.
    The tasks introduced in this chapter move from business-oriented tasks to software
    engineering tasks, which is a different approach. The objective of this chapter
    is to present some practical aspects of testing to introduce the subject.'
  - '[PAGE 433]


    # Automatic Testing Routines


    The most important thing about a test is that it tries to check the code that
    is being tested independently. This involves a mindset of looking at the code
    and the inputs and outputs and approaching the task with a fresh look, and to
    not be influenced by the internal implementation. In some cases, the people testing
    the software may be different from the people writing the code in the first place,
    to ensure that there''s a good understanding of what the code should and should
    not do. Try to design your tests with this approach and create well-defined interfaces
    to work with.


    > In summary, testing checks the code does what it is supposed to do, and doesn''t
    do what it is not supposed to do.


    The first part of the sentence is easier, but the second part is very difficult
    or even impossible. Writing tests has a cost, both in time and in maintenance.
    Only in highly critical software is code tested extensively to ensure that nothing
    unexpected happens. Try to find your balance in how many tests are adequate for
    your needs.


    Tests are typically classified depending on how many different parts of the software
    they test. A test that only covers a small part of the code, like a function,
    is normally called a unit test, while a test that covers the whole system is called
    a system test. A test that covers the integration of different software elements
    is called an integration test. This is a very fluid definition, as not everyone
    agrees on what the system is, or how big a unit test can be before it becomes
    an integration test, or whether there''s a significant difference between integration
    and system tests. But it helps to understand that different tests cover different
    areas of software - some are bigger, some are smaller - and have different requirements.


    > To have a team of developers working on the same software, ensuring it is of
    high quality, and the discipline of adding and running tests continuously is crucial.
    That''s why there are lots of types of tests to help with that task. Continuous
    integration, or CI, includes the practice of running tests for each change to
    the software and before merging them with changes by other developers. CI tools
    allow you to run tests in the background automatically and notify developers of
    any problem, ensuring that there are no unexpected failures.


    In this chapter, we will cover the usage of `pytest` as a tool to run various
    tests. This is one of the most complete Python test frameworks. `pytest` enables
    the easy setup of tests and provides a lot of useful options to run subsets of
    tests, run tests quickly, and detect problems when tests fail.'
