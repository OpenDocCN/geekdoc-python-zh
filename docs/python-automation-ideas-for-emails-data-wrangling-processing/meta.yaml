    # How it works...


    Step 1 of the *How to do it...* section imports the modules we''ll use later.


    Step 2 reads the data from the CSV file. The data is transformed into a list to
    allow us to iterate through it several times, as that''s necessary for *step 3*.


    Step 3 prepares the data in two arrays and then uses `.scatter` to plot them.
    The parameters for `.scatter`, as with other methods of `matplotlib`, require
    an array of X and Y values. They both need to be the same size. The data is converted
    into a `float` from the file format to ensure the number format.


    Step 4 refines the way the data is presented on each axis. For each axis, a function
    is created that defines how the values on that axis should be displayed (in dollars
    or in minutes). The function accepts the value to display and the position as
    inputs. Typically, the position will be ignored. The axis formatter will be overwritten
    with `.set_major_formatter`. Notice that both axes are returned with `.gca` (get
    current axes).


    A label is added to the axes with `.xlabel` and `.ylabel`.


    Finally, *step 5* displays the graph in a new window. Analyzing the result, we
    can say that there seems to be two kinds of users, ones who spend less than 10
    minutes and never spend more than $10, and users who spend more time and also
    have a higher chance of spending up to $100.


    > Note that the data presented is synthetic, and it has been generated with the
    result in mind. Real-life data will probably look more spread out. Statistical
    analysis can be used to determine trends and patterns with a higher degree of
    sophistication.


