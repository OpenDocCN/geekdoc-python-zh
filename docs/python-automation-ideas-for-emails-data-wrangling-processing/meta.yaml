    \n    # 最终结果\n    result.append(line(date, total_usd, number))\n    return result\n\
    ```\n\n代码记录最新的日期，并持续聚合直到日期发生变化。每次日期变化时，该行数据就被追加到 `result` 数组中。\n\n> 请注意，这利用了数据已按时间戳排序的事实。在此示例中，日志中的时间戳按来源排序，但在某些场景下可能需要执行一些排序和/或过滤。使用我们在本章中描述的相同技术，如果需要，可以创建一个额外的排序处理步骤。\n\
    \n为了获取日期，使用 `delorean` 模块解析输入的 ISO 格式：\n\n```python\ndef parse_iso(timestamp):\n\
    \    # 解析 ISO 格式\n    total = delorean.parse(timestamp, dayfirst=False)\n    #\
    \ 仅保留日期\n    return total.date\n```\n\n`dayfirst=False` 参数确保时间戳被正确解释。\n\n> `delorean`\
    \ 的新（尚未发布）版本将包含一个特定的 `isofirst` 参数来显式解析 ISO 8601。在撰写本文时，此版本尚未发布，但文档中已显示。\n\n每一行新数据在\
    \ `line` 函数中以字典格式配置，如下所示：\n\n```python\ndef line(date, total_usd, number):\n \
    \   data = {\n        'DATE': date,\n        'TOTAL USD': total_usd,\n       \
    \ 'NUMBER': number,\n        # 四舍五入到两位小数\n        'AVERAGE': round(total_usd /\
    \ number, 2),\n    }\n    return data\n```\n\n每一行包含日期、销售总额（美元）、销售数量和每件商品的平均价格。\n\
    \n> 存储聚合总额和构成该总额的事件数量，使我们能够进一步聚合值并计算平均值。仅平均值本身无法进一步聚合，但聚合总额和事件数量可以，并且可以轻松地从中计算出平均值。\n\
    \n聚合文件以 CSV 格式存储，在 `calculate_results` 将值返回给 `main` 之后。\n\n### 更多内容...\n\n仔细检查输入日期会发现它们并不完全相同。虽然\
    \ `output_3_OH.csv` 文件中的格式是 `YYYY-MM-DDTHH:MM:SS+00:00`，但 `output_3_ON.csv` 文件中的格式是\
    \ `YYYY-MM-DD HH:MM:SS+00:00`。注意 T 所在位置是空格。ISO 8601 格式使用 T 字符分隔日期和时间，但使用空格分隔也很常见，如\
    \ RFC3339 (https://tools.ietf.org/html/rfc3339) 所述，因此大多数软件工具都能解析它，包括 `delorean`。\n\
    \n> 在后期阶段发现数据未完全标准化实际上是一个常见问题。对输入数据要宽容，对数据输出要尽可能严格。\n\n完整的 `delorean` 文档可在线查阅：https://delorean.readthedocs.io/。\n\
    \n每次销售的平均价格四舍五入到两位小数，这使其精确到分，在此特定情况下是合理的。这是通过内置的 `round` 函数完成的，该函数接受一个额外的参数，指定要四舍五入到的小数位数：\n\
    \n```python\n>>> round(3.14159)\n3\n>>> round(3.14159, 4)\n3.1416\n```\n\n如果你需要更精确地控制向上或向下舍入到下一个整数，可以使用\
    \ `math.ceil` 和 `math.floor` 函数：\n\n```python\n>>> import math\n>>> math.ceil(3.14159)\n\
    4\n>>> math.floor(3.14159)\n3\n```\n\n对于除平均值之外更通用的统计运算符，`statistics` 标准库中的 Python\
    \ 模块提供了诸如 `median()` 和 `quantiles()` 等函数。请查阅文档：https://docs.python.org/3/library/statistics.html。\n\
    \n虽然计算平均值不需要，但其中一些度量（如众数或中位数）可能需要在内存中处理完整数据集。这限制了可以处理的数据量，特别是对于非常大的数据集。\n\n> 关于什么是\
    \ *大数据* 的争论很困难，因为没有一个明确的点标志着普通数据变成了大数据。虽然关于大数据的深入讨论超出了本书的范围，但其主要特征是它无法容纳在单台计算机中，需要在不同计算机上进行分布式处理。这大大增加了操作的复杂性，以至于需要专门的技能来处理。在转向该领域之前，请考虑数据是否可以放入具有尽可能多内存的特定服务器中，以及这是否有帮助。这种“用硬件解决问题”的方法可以走得很远，并且通常比重新架构代码所涉及的工作更便宜。\n\
    \n请注意，计算统计量可能是一个困难的挑战，需要特定的知识来避免诸如异常值修改平均值之类的问题，或者更微妙的问题，例如数据的非代表性抽样。在计算复杂内容时，请仔细检查您的假设，并验证结果是否正确表示了所需的度量。这看起来似乎是一项简单的任务，但可能比预期的更棘手。\n\
    \n### 另请参阅\n\n- 上一节中的 *标准化日期格式* 食谱。\n- *第 4 章，搜索和读取本地文件* 中的 *读取 CSV 文件* 食谱。\n\
    - *第 2 章，轻松实现任务自动化* 中的 *准备任务* 食谱。"
