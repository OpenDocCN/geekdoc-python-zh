    \ PASSED                     [ 50%]\ntests/test_requests_time.py::test_order_time\
    \ PASSED                         [100%]\n\n========================= 2 passed,\
    \ 16 deselected in 0.22s ==========================\n```\n\n4. Run pytest -v -k\
    \ time tests/test_requests.py:\n\n```\n$ pytest -v -k time tests/test_requests.py\n\
    ============================= test session starts ==============================\n\
    platform darwin -- Python 3.8.2, pytest-5.4.1, py-1.8.1,\npluggy-0.13.1 -- /usr/local/opt/python@3.8/bin/python3.8\n\
    cachedir: .pytest_cache\nrootdir: /Python-Automation-Cookbook-Second-Edition/Chapter12\n\
    collected 2 items / 1 deselected / 1 selected\n\ntests/test_requests.py::test_order_pizza_timeout\
    \ PASSED\n[100%]\n\n================= 1 passed, 1 deselected in 0.10s =================\n\
    ```\n\n5. Run pytest -v tests/test_requests_time.py::test_order_time:\n\n```\n\
    $ pytest -v tests/test_requests_time.py::test_order_time\n=============================\
    \ test session starts =============================\nplatform darwin -- Python\
    \ 3.8.2, pytest-5.4.1, py-1.8.1,\npluggy-0.13.1 -- /usr/local/opt/python@3.8/bin/python3.8\n\
    cachedir: .pytest_cache\nrootdir: /Python-Automation-Cookbook-Second-Edition/Chapter12\n\
    collected 1 item\n\ntests/test_requests_time.py::test_order_time PASSED\n[100%]\n\
    \n========================== 1 passed in 0.38s ===========================\n```\n\
    \n6. Run pytest -v --lf:\n\n```\n$ pytest -v --lf\n=============================\
    \ test session starts =============================\nplatform darwin -- Python\
    \ 3.8.2, pytest-5.4.1, py-1.8.1,\npluggy-0.13.1 -- /usr/local/opt/python@3.8/bin/python3.8\n\
    cachedir: .pytest_cache\nrootdir: /Python-Automation-Cookbook-Second-Edition/Chapter12\n\
    collected 11 items / 10 deselected / 1 selected\nrun-last-failure: rerun previous\
    \ 1 failure (skipped 3 files)\n\ntests/test_case.py::test_fail FAILED\n[100%]\n\
    \n=============================== FAILURES ===============================\n_______________________________\
    \ test_fail ________________________________\n\ndef test_fail():\n    >      \
    \ assert 4 in LIST\n    E       assert 4 in [1, 2, 3]\n\ntests/test_case.py:18:\
    \ AssertionError\n========================= short test summary info ==========================\n\
    FAILED tests/test_case.py::test_fail - assert 4 in [1, 2, 3]\n=========================\
    \ 1 failed, 10 deselected in 0.30s =================\n```\n\n## How it works...\n\
    \nIn step 1, the call to pytest is done with no arguments. This runs all the tests\
    \ defined under the subdirectory.\n\nNote that it displays how many tests it collects:\n\
    \n```\ncollected 18 items\n```\n\nStep 2 shows how to get the list of tests collected,\
    \ but without running them. This is done through the --collect-only parameter.\
    \ It presents them all but doesn't run them.\n\nTo run only certain tests, step\
    \ 3 shows how to generate a matching string that will limit the tests to run.\
    \ Using -k allows matching by string, so all the tests that match the string time\
    \ will be executed.\n\n> The option -v makes the output verbose and displays a\
    \ line per test, instead of a line per test file.\n\nNote how the total number\
    \ of tests is still present. pytest collects them all, but then only runs the\
    \ ones that match the -k parameter:\n\n```\ncollected 18 items / 16 deselected\
    \ / 2 selected\n```\n\nTo limit the number of collected tests, a file path can\
    \ be specified, as done in step 4, where the path of a specific file is added\
    \ to the command. In this case, the number of collected tests is only the ones\
    \ located in the file path:\n\n```\n$ pytest -v -k time tests/test_requests.py\n\
    ...\ncollected 2 items / 1 deselected / 1 selected\n```"
