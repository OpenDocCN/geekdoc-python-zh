    For example, a specific log may look like this:


    ```

    [2018-05-05T10:58:41.504054] - SALE - PRODUCT: 1345 - PRICE: $09.99

    ```


    Note that the price has a leading zero. All prices will have two digits for the
    dollars and two for the cents.


    > The standard ISO 8601 defines standard ways of representing the time and date.
    It is widely used in the computing world and can be parsed and generated by virtually
    any computer language.


    We need to activate our virtual environment before we start:


    ```

    $ source .venv/bin/activate

    ```


    # How to do it...


    +   1. In the Python interpreter, make the following imports. Remember to activate
    your virtualenv, as described in the Creating a virtual environment recipe:

    >>> import delorean

    >>> from decimal import Decimal


    2. Enter the log to parse:

    >>> log = ''[2018-05-05T11:07:12.267897] - SALE - PRODUCT: 1345 - PRICE: $09.99''


    3. Split the log into its parts, which are divided by - (note the space before
    and after the dash). We ignore the SALE part as it doesn''t add any relevant information:

    >>> divide_it = log.split('' - '')

    >>> timestamp_string, _, product_string, price_string = divide_it


    4. Parse the timestamp into a datetime object:

    >>> timestamp = delorean.parse(timestamp_string.strip(''[]''))


    5. Parse the product_id into an integer:

    >>> product_id = int(product_string.split('':'')[-1])


    6. Parse the price into a Decimal type:

    >>> price = Decimal(price_string.split(''$'')[-1])'
