    > By default, the plot will display a solid line, with no marker on each point.
    If only the marker is used (that is, ''o''), there''ll be no line.


    Each of the periods is labeled on the x-axis with .xticks. To clarify the meaning,
    we add a label with .ylabel.


    To display the resulting graph, step 5 calls .show, which opens a new window with
    the result.


    > Calling .show blocks the execution of the program. The program will resume when
    the window is closed.


    # There''s more...


    Graphs with lines are deceptively simple and able to create a lot of interesting
    representations. It is probably the most convenient when showing mathematical
    graphs. For example, we can display a graph showing Moore''s Law in a few lines
    of code.


    > Moore''s Law is an observation by Gordon Moore that the number of components
    in an integrated circuit doubles every 2 years. It was first described in 1965
    and then corrected in 1975. It seems to be quite close to the historic rate of
    technological advancement over the last 40 years.


    We first create a line describing the theoretical line, with data points from
    1970 to 2013. Starting with 1,000 transistors, we double it every 2 years, up
    to 2013:


    ```

    >>> POS = [year for year in range(1970, 2013)]

    >>> MOORES = [1000 * (2 ** (i * 0.5)) for i in range(len(POS))]

    >>> plt.plot(POS, MOORES)

    [<matplotlib.lines.Line2D object at 0x12b7c27c0>]

    ```


    Following some documentation, we extract a few examples of commercial CPUs, their
    year of release, and their number of integrated components from here: http://mercury.pr.erau.edu/~siewerts/cec320/documents/Papers/AHistoryofMicroprocessorTransistorCount.pdf.'
