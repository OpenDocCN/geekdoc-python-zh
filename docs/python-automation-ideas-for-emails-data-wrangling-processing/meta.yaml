    \ can be obtained in the Google documentation, at https://cloud.google.com/natural-language/docs/categories.\n\
    \n> As with the sentiment, check in the documentation if the API is compatible\
    \ with the specific language, since the API may not be capable of categorization\
    \ certain languages. You can try to translate first into English and then perform\
    \ the categorization, but the quality of the result may vary.\n\nIn all these\
    \ cases, the document can also accept HTML text using the `enums.Document.Type.PLAIN_TEXT`\
    \ type. That can help if you want to combine this recipe with others in this book,\
