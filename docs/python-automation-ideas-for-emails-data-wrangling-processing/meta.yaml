    \ HTML 文件。样式文件 `email_styling.html` 有一个内容区域，我们可以将从 Markdown 渲染的 HTML 放入其中。\n\n\
    步骤 3 定义了将在 `email_template.md` 中渲染的数据。它是一个非常简单的模板，只需要一个名为 `name` 的参数。\n\n在步骤 4\
    \ 中，Markdown 模板使用 `data` 进行渲染。这将生成电子邮件的纯文本版本。\n\nHTML 版本在步骤 5 中渲染。纯文本版本使用 `mistune`\
    \ 渲染为 HTML，然后使用 `jinja2` 模板包装在 `email_styling.html` 中。最终版本是一个自包含的 HTML 文档。\n\n\
    最后，我们在步骤 6 中将两个版本，纯文本（作为 `text`）和 HTML（作为 `html`），保存到文件中。步骤 7 和 8 检查存储的值。信息是相同的，但在\
    \ HTML 版本中，样式更好。\n\n### 更多内容...\n\n使用 Markdown 使得生成同时包含纯文本和 HTML 版本的电子邮件变得容易。Markdown\
    \ 在文本格式下相当可读，并且非常自然地渲染成 HTML。也就是说，也可以生成完全不同的 HTML 版本，这将允许更多的自定义并利用 HTML 的特性。\n\
    \n完整的 Markdown 语法可以在 `https://daringfireball.net/projects/markdown/syntax` 找到，一个包含最常用元素的优秀备忘单可以在\
    \ `https://www.markdownguide.org/cheat-sheet` 找到。\n\n> 虽然制作电子邮件的纯文本版本并非严格必要，但这是一个好习惯，表明你关心阅读电子邮件的人。大多数电子邮件客户端接受\
    \ HTML，但这并非完全通用。\n\n对于 HTML 电子邮件，请注意整个样式表信息应包含在电子邮件中。这意味着 CSS 需要嵌入到 HTML 中。避免对外部资源进行引用，这可能导致电子邮件在某些电子邮件客户端中无法正确渲染，甚至被判定为垃圾邮件。\n\
    \n`email_styling.html` 中的样式基于 modest 样式表，可以在这里找到：`http://markdowncss.github.io/`。还有更多可用的\
    \ CSS 样式表，使用 Google 搜索应该能找到更多。请记住删除任何外部引用，如前所述。\n\n可以通过将图像编码为 base64 格式将其包含在 HTML\
    \ 中，以便直接嵌入到 HTML img 标签中，而不是添加引用：\n\n```python\n>>> import base64\n>>> with open(\"\
    image.png\", 'rb') as file:\n...     encoded_data = base64.b64encode(file)\n>>>\
    \ print(\"<img src='data:image/png;base64,{data}'/>\".format(data=encoded_data))\n\
    ```\n\n你可以在本文中找到有关此技术的更多信息：https://css-tricks.com/data-uris/。\n\nmistune 完整文档可在\
    \ http://mistune.readthedocs.io/en/latest/ 获取，jinja2 文档可在 https://jinja.palletsprojects.com/en/2.11.x/\
    \ 找到。\n\n### 另请参阅\n\n- 第 5 章“生成精彩报告”中的“在 Markdown 中格式化文本”食谱，以了解更多关于 Markdown 的信息\n\
    - 第 5 章“生成精彩报告”中的“使用模板生成报告”食谱，以了解更多关于 Jinja2 模板的信息\n- 本章后面的“发送单个电子邮件”食谱，以跟进如何发送编写的电子邮件\n\
    \n## 发送单个电子邮件\n\n发送电子邮件最基本的方式是使用标准的**简单邮件传输协议 (SMTP)**。SMTP 是互联网上最古老的协议之一。尽管存在更新的专有协议，但\
    \ SMTP 是所有电子邮件提供商相互通信的标准，也是电子通信的支柱之一。\n\nSMTP 允许你发送包含多个部分的富电子邮件，这些部分包含不同类型的数据。这些部分可用于添加附件，或生成替代部分，例如同一消息的纯文本和\
    \ HTML 版本，以便在兼容的电子邮件客户端上显示。\n\n鉴于 SMTP 是如此强大的标准，它易于使用，并且几乎所有语言和操作系统都支持它。这种易用性也是一个弱点，因为垃圾邮件的数量巨大，电子邮件领域的大公司有强烈的动机禁止来自未经验证来源（如\
    \ Python 脚本）的电子邮件。\n\n这就是为什么 SMTP 仅推荐用于非常零星的使用和简单的目的，例如每天向受控地址发送少量电子邮件。\n\n> 不要使用此方法向分发列表或来自随机电子邮件地址的客户群发电子邮件。你可能会因反垃圾邮件规则而被服务提供商封禁。\n\
    \n### 准备工作\n\n对于这个食谱，我们需要一个服务提供商的电子邮件账户。根据你使用的服务提供商，会有一些小的差异，但我们将使用 Gmail 账户，因为它们非常常见且可以免费访问。\n\
    \n由于 Gmail 的安全性，我们需要创建一个特定的应用密码，用于发送电子邮件。请按照此处的说明操作：https://support.google.com/accounts/answer/185833。这将帮助你生成用于此食谱目的的密码。请记住为邮件访问创建它。之后你可以删除密码以将其移除。\n\
    \n我们将使用 `smtplib` 模块，它是 Python 标准库的一部分。"
