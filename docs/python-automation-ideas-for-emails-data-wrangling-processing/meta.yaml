    - The Creating charts in Excel recipe later on in the chapter.\n- The Working\
    \ with cell formats in Excel recipe later on in the chapter.\n\n## Updating an\
    \ Excel spreadsheet\n\nIn this recipe, we'll see how to update an existing Excel\
    \ spreadsheet. This will include changing raw values in cells and setting up formulas\
    \ that will be evaluated when the spreadsheet is open. We'll also see how to add\
    \ comments to cells.\n\n## Getting ready\n\nWe will use the openpyxl module. We\
    \ should install the module, adding it to our requirements.txt file as follows:\n\
    \n```\n$ echo \"openpyxl==3.0.3\" >> requirements.txt\n$ pip install -r requirements.txt\n\
    ```\n\nIn the GitHub repository, there's an Excel spreadsheet named movies.xlsx\
    \ that contains information on the top 10 movies by attendance.\n\nThe file can\
    \ be found here: https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter06/movies.xlsx.\n\
    \n## How to do it...\n\n1. Import the openpyxl module and the Comment class:\n\
    \   ```python\n   >>> import openpyxl\n   >>> from openpyxl.comments import Comment\n\
    \   ```\n\n2. Load the file into memory and get the sheet:\n   ```python\n   >>>\
    \ xlsfile = openpyxl.load_workbook('movies.xlsx')\n   >>> sheet = xlsfile['Sheet1']\n\
    \   ```\n\n3. Obtain the value of cell D4 (director of E.T):\n   ```python\n \
    \  >>> sheet['D4'].value\n   'Steven Spielberg'\n   ```\n\n4. Change the value\
    \ to just Spielberg:\n   ```python\n   >>> sheet['D4'].value = 'Spielberg'\n \
    \  ```\n\n5. Add a comment to that cell:\n   ```python\n   >>> sheet['D4'].comment\
    \ = Comment('Changed text automatically',\n       'User')\n   ```\n\n6. Add a\
    \ new element that obtains the total of all values in the Admission column:\n\
    \   ```python\n   >>> sheet['B12'] = '=SUM(B2:B11)'\n   ```\n\n7. Save the spreadsheet\
    \ to the movies_comment.xlsx file:\n   ```python\n   >>> xlsfile.save('movies_comment.xlsx')\n\
    \   ```\n\n8. Check the resulting file, which includes the comment and the calculation\
    \ of the total of column B in A12:\n\n   ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_206_0.png)\n\
    \n   Figure 6.3: The cell now shows a comment\n\n## How it works...\n\nIn the\
    \ *How to do it...* section, after making the imports in *step 1* and reading\
    \ the spreadsheet in *step 2*, we select the cell to be changed in *step 3*.\n\
    \nUpdating the value is done in *step 4* with an assignment. A comment in the\
    \ cell is added, overwriting the `.comment` attribute with a new `Comment` class\
    \ instance. Note that the name of the user making the comment is required.\n\n\
    Values can also include descriptions of formulas. In *step 6*, we add a new formula\
    \ to cell *B12*. The value is calculated and displayed when the file is opened\
    \ in *step 8*.\n\n> The value of a formula is not calculated in Python, but in\
    \ Excel. This means that the formula could contain errors or display unexpected\
    \ results through bugs in the resulting spreadsheet. Be sure to double-check that\
    \ the formulas are correct.\n\nFinally, in *step 7*, the spreadsheet is saved\
    \ to disk by calling the `.save` method of the XLSX file object. The name of the\
    \ resulting file can be the same one as the input file to overwrite it.\n\nThe\
    \ comment and values can be viewed by externally accessing the file.\n\n## There's\
    \ more...\n\nYou can store data as multiple data types, and it will be translated\
    \ into the proper types for Excel. For example, storing `datetime` will store\
    \ it in the proper date format. The same is true with `float` or other numeric\
    \ formats.\n\nIf you don't need to change any value in the spreadsheet, you can\
    \ open it in read-only mode:\n\n```python\n>>> xlsfile = openpyxl.load_workbook('movies.xlsx',\
    \ read_only=True)\n>>> xlsfile['Sheet1']['A1'].value = '37%'\n...\nAttributeError:\
    \ Cell is read only\n```\n\nAdding comments to automatically generated cells can\
    \ help review the resulting file, making it clear how each specific value was\
    \ generated.\n\nWhile it is possible to add formulas to automatically generate\
    \ Excel files, debugging the results can be tricky. When generating a result,\
    \ generally, it's better to make the calculations in Python and store the result\
    \ in a raw format."
