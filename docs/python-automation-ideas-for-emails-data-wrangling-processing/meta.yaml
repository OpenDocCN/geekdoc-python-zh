    \ with `LanguageServiceClient` and the `analyze_sentiment` method gets called\
    \ to get the results from Google servers.\n\nThis call returns both the automatically\
    \ detected language, stored in `lang`, and the sentiment of the text, stored in\
    \ `score` and `magnitude`.\n\n> The sentiment is composed of both `score` and\
    \ `magnitude`. `score` describes how positive the aggregated sentiment is in a\
    \ text. A score of -1.0 describes an extremely negative emotion, and 1.0 describes\
    \ an extremely positive emotion. The magnitude is how clear this sentiment is\
    \ in the text, with a positive number. Short sentences will be difficult to qualify\
