    # There''s more...


    Another way of presenting stacked bars is by adding them as percentages so that
    the total doesn''t change, only the relative sizes compared to each other.


    To do that, VALUESA and VALUEB need to be calculated relative to the percentages
    in this way:


    ```

    >>> VALUESA = [100 * valueA / (valueA + valueB) for label, valueA, valueB in DATA]

    >>> VALUESB = [100 * valueB / (valueA + valueB) for label, valueA, valueB in DATA]

    ```


    This makes each value equal to the percentage of the total, and the total always
    adds up to 100. This produces the following graphic:


    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_274_0.png)


    The bars don''t necessarily need to be stacked. Sometimes, it may be interesting
    to present the bars one against the other for comparison.'
