- md: "## Creating new sheets in an Excel spreadsheet\n\nIn this recipe, we'll demonstrate\
    \ how to create a new Excel spreadsheet from scratch and deal with multiple sheets\
    \ within that spreadsheet, including creating them.\n\n### Getting ready\n\nWe\
    \ will use the openpyxl module. We should install the module, adding it to our\
    \ requirements.txt file as follows:\n\n```\n$ echo \"openpyxl==3.0.3\" >> requirements.txt\n\
    $ pip install -r requirements.txt\n```\n\nWe'll store it in the new file information\
    \ about the movies with the most attendance. The data is extracted from here:\
    \ http://www.mrob.com/pub/film-video/topadj.html.\n\n### How to do it...\n\n1.\
    \ Import the openpyxl module:\n   ```python\n   >>> import openpyxl\n   ```\n\n\
    2. Create a new Excel file. This creates a default sheet, called Sheet:\n   ```python\n\
    \   >>> xlsfile = openpyxl.Workbook()\n   >>> xlsfile.sheetnames\n   ```\n   ```\n\
    \   >>> sheet = xlsfile['Sheet']\n   ```\n\n3. Add data about the number of attendees\
    \ to this sheet from the source. Only the first three are added for simplicity:\n\
    \   ```python\n   >>> data = [\n   ...     (225.7, 'Gone With the Wind', 'Victor\
    \ Fleming'),\n   ...     (194.4, 'Star Wars', 'George Lucas'),\n   ...     (161.0,\
    \ 'ET: The Extraterrestrial', 'Steven Spielberg'),\n   ... ]\n   >>> for row,\
    \ (admissions, name, director) in enumerate(data, 1):\n   ...     sheet['A{}'.format(row)].value\
    \ = admissions\n   ...     sheet['B{}'.format(row)].value = name\n   ```\n\n4.\
    \ Create a new sheet:\n   ```python\n   >>> sheet = xlsfile.create_sheet(\"Directors\"\
    )\n   >>> sheet\n   <Worksheet \"Directors\">\n   >>> xlsfile.sheetnames\n   ['Sheet',\
    \ 'Directors']\n   ```\n\n5. Add the name of the director for each movie:\n  \
    \ ```python\n   >>> for row, (admissions, name, director) in enumerate(data, 1):\n\
    \   ...     sheet['A{}'.format(row)].value = director\n   ...     sheet['B{}'.format(row)].value\
    \ = name\n   ```\n\n6. Save the file as movie_sheets.xlsx:\n   ```python\n   >>>\
    \ xlsfile.save('movie_sheets.xlsx')\n   ```\n\n7. Open the movie_sheets.xlsx file\
    \ to check that it has two sheets with the proper information, as shown in the\
    \ following screenshot:\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_210_0.png)\n\
    \nFigure 6.4: Content of movie_sheets.xlsx\n\n### How it works...\n\nIn the *How\
    \ to do it...* section, after importing the module in *step 1*, we create a new\
    \ spreadsheet in *step 2*. This is a new spreadsheet that contains just the default\
    \ sheet.\n\nThe data to be stored is defined in *step 3*. Note that it contains\
    \ information that will go on both sheets (name in both; the admissions in the\
    \ first sheet and the director's name in the second). In this step, the first\
    \ sheet is filled.\n\n> Note how the value is stored. The proper cell is defined\
    \ as column A or B and the proper row (rows start at 1). The `enumerate` function\
    \ returns a tuple with the first element as the index and the second as the enumerated\
    \ parameter (in this case, a tuple with three values).\n\nAfter that, the new\
    \ sheet is created in *step 4*, using the name `Directors`. `.create_sheet` returns\
    \ the new sheet.\n\nThe information in the `Directors` sheet is stored in *step\
    \ 5* and the file is saved in *step 6*.\n\n### There's more...\n\nThe name of\
    \ an existing sheet can be changed through the `.title` property:\n\n```python\n\
    >>> sheet = xlsfile['Sheet']\n>>> sheet.title = 'Admissions'\n>>> xlsfile.sheetnames\n\
    ['Admissions', 'Directors']\n```\n\nBe careful, as it won't be possible to access\
    \ the sheet with `xlsfile['Sheet']`. That name doesn't exist anymore!\n\nThe active\
    \ sheet, the sheet that will be displayed when the file is opened, can be obtained\
    \ through the `.active` property and changed with `._active_sheet_index`. The\
    \ index starts at 0 for the first sheet:\n\n```python\n>>> xlsfile.active\n<Worksheet\
    \ \"Admissions\">\n>>> xlsfile._active_sheet_index\n0\n>>> xlsfile._active_sheet_index\
    \ = 1\n>>> xlsfile.active\n<Worksheet \"Directors\">\n```\n\nThe sheet can also\
    \ be copied using `.copy_worksheet`. Be aware that some data, for example, charts,\
    \ won't be carried over. All the cell data will be duplicated:\n\n```python\n\
    new_copied_sheet = xlsfile.copy_worksheet(source_sheet)\n```\n\nIf you need to\
    \ copy charts, keep in mind that you can replicate them by code multiple times,\
    \ if necessary.\n\nThe full openpyxl documentation can be found here: https://openpyxl.readthedocs.io/en/stable/index.html.\n\
    \n### See also\n\n- The *Reading an Excel spreadsheet* recipe earlier in the chapter.\n\
    - The *Updating an Excel spreadsheet* recipe earlier in the chapter.\n- The *Creating\
    \ charts in Excel* recipe in the following section.\n- The *Working with cell\
    \ formats in Excel* recipe later in the chapter.\n\n## Creating charts in Excel\n\
    \nSpreadsheets include a lot of tools to deal with data, including presenting\
    \ the data in colorful charts. Let's see how to append a chart programmatically\
    \ to an Excel spreadsheet.\n\n### Getting ready\n\nWe will use the `openpyxl`\
    \ module. We should install the module, adding it to our `requirements.txt` file\
    \ as follows:\n\n```\n$ echo \"openpyxl==3.0.3\" >> requirements.txt\n$ pip install\
    \ -r requirements.txt\n```\n\nWe'll store it in the new file information about\
    \ the movies with the most attendance. The data is extracted from here: http://www.mrob.com/pub/film-video/topadj.html.\n\
    \n### How to do it...\n\n1. Import the `openpyxl` module and create a new Excel\
    \ file:\n   ```python\n   >>> import openpyxl\n   >>> from openpyxl.chart import\
    \ BarChart, Reference\n   >>> xlsfile = openpyxl.Workbook()\n   ```\n\n2. Add\
    \ data about the number of attendees in this sheet from the source. Only the first\
    \ three are added for simplicity:\n   ```python\n   >>> data = [\n   ...     ('Name',\
    \ 'Admissions'),\n   ...     ('Gone With the Wind', 225.7),\n   ...     ('Star\
    \ Wars', 194.4),\n   ...     ('ET: The Extraterrestrial', 161.0),\n   ... ]\n\
    \   >>> sheet = xlsfile['Sheet']\n   >>> for row in data:\n   ...     sheet.append(row)\n\
    \   ```\n\n3. Create a `BarChart` object and fill it with basic information:\n\
    \   ```python\n   >>> chart = BarChart()\n   >>> chart.title = \"Admissions per\
    \ movie\"\n   >>> chart.y_axis.title = 'Millions'\n   ```\n\n4. Create a reference\
    \ to the data and append the data to the chart:\n   ```python\n   >>> data = Reference(sheet,\
    \ min_row=2, max_row=4, min_col=1, max_col=2)\n   >>> chart.add_data(data, from_rows=True,\
    \ titles_from_data=True)\n   ```\n\n5. Add the chart to the sheet and save the\
    \ file:\n   ```python\n   >>> sheet.add_chart(chart, \"A6\")\n   >>> xlsfile.save('movie_chart.xlsx')\n\
    \   ```\n\n6. Check the resulting chart in the spreadsheet, as shown in the following\
    \ screenshot:\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_213_0.png)\n\n### How\
    \ it works...\n\nIn the *How to do it...* section, after preparing the data in\
    \ *steps 1* and *2*, the data is ready in the range A1:B4. Note that A1 and B1\
    \ both contain a header that should not be used in the chart.\n\nIn *step 3*,\
    \ we set up the new chart and include the basic data, such as a title and the\
    \ units of the *y-axis*.\n\nStep 4 creates a reference box through a `Reference`\
    \ object, from row 2 column 1 to row 4 column 2, which is the area where our data\
    \ lives, excluding the header. The data is added to the chart with the `.add_data()`\
    \ method. The `from_rows` argument makes each row a different data series. Another\
    \ argument, `titles_from_data`, uses the first column to name the series.\n\n\
    The chart is added to cell A6 in step 5 and saved to disk.\n\n### There's more...\n\
    \nNumerous charts can be created, including bar charts, line charts, area charts\
    \ (line charts that fill the area between the line and the axis), pie charts,\
    \ or scatter charts (XY charts where one value is plotted against the other).\
    \ Each kind of chart has an equivalent class, for example, `PieChart` or `LineChart`.\n\
    \nEach one, at the same time, can have different types. For example, the default\
    \ type for `BarChart` is `column`, printing the bars vertically, but they can\
    \ also be printed vertically by selecting a different type:\n\n```python\n>>>\
    \ chart.type = 'bar'\n```\n\nCheck the `openpyxl` documentation to see all available\
    \ combinations.\n\n- Instead of extracting the x-axis labels from the data, they\
    \ can be set explicitly with `set_categories`. For example, compare step 4 with\
    \ the following code:\n  ```python\n  data = Reference(sheet, min_row=2, max_row=4,\
    \ min_col=2, max_col=2)\n  labels = Reference(sheet, min_row=2, max_row=4, min_col=1,\
    \ max_col=1)\n  chart.add_data(data, from_rows=False, titles_from_data=False)\n\
    \  chart.set_categories(labels)\n  ```\n\nThe range, instead of using a `Reference`\
    \ object, can also be input with text labels describing the region:\n\n```python\n\
    chart.add_data('Sheet!B2:B4', from_rows=False, titles_from_data=False)\nchart.set_categories('Sheet!A2:A4')\n\
    ```\n\nThis way of describing it may be more difficult to deal with if the range\
    \ of data needs to be created programmatically."
  mdcn: "## 在 Excel 电子表格中创建新工作表\n\n在本教程中，我们将演示如何从头开始创建一个新的 Excel 电子表格，并处理该电子表格中的多个工作表，包括创建它们。\n\
    \n### 准备工作\n\n我们将使用 `openpyxl` 模块。我们需要安装该模块，将其添加到我们的 `requirements.txt` 文件中，如下所示：\n\
    \n```\n$ echo \"openpyxl==3.0.3\" >> requirements.txt\n$ pip install -r requirements.txt\n\
    ```\n\n我们将在新文件中存储关于观影人数最多的电影的信息。数据提取自此处：http://www.mrob.com/pub/film-video/topadj.html。\n\
    \n### 如何操作...\n\n1. 导入 `openpyxl` 模块：\n   ```python\n   >>> import openpyxl\n\
    \   ```\n\n2. 创建一个新的 Excel 文件。这会创建一个默认的工作表，名为 Sheet：\n   ```python\n   >>> xlsfile\
    \ = openpyxl.Workbook()\n   >>> xlsfile.sheetnames\n   ```\n   ```\n   >>> sheet\
    \ = xlsfile['Sheet']\n   ```\n\n3. 从数据源向此工作表添加关于观影人数的数据。为简单起见，只添加前三条：\n   ```python\n\
    \   >>> data = [\n   ...     (225.7, 'Gone With the Wind', 'Victor Fleming'),\n\
    \   ...     (194.4, 'Star Wars', 'George Lucas'),\n   ...     (161.0, 'ET: The\
    \ Extraterrestrial', 'Steven Spielberg'),\n   ... ]\n   >>> for row, (admissions,\
    \ name, director) in enumerate(data, 1):\n   ...     sheet['A{}'.format(row)].value\
    \ = admissions\n   ...     sheet['B{}'.format(row)].value = name\n   ```\n\n4.\
    \ 创建一个新工作表：\n   ```python\n   >>> sheet = xlsfile.create_sheet(\"Directors\")\n\
    \   >>> sheet\n   <Worksheet \"Directors\">\n   >>> xlsfile.sheetnames\n   ['Sheet',\
    \ 'Directors']\n   ```\n\n5. 为每部电影添加导演姓名：\n   ```python\n   >>> for row, (admissions,\
    \ name, director) in enumerate(data, 1):\n   ...     sheet['A{}'.format(row)].value\
    \ = director\n   ...     sheet['B{}'.format(row)].value = name\n   ```\n\n6. 将文件保存为\
    \ `movie_sheets.xlsx`：\n   ```python\n   >>> xlsfile.save('movie_sheets.xlsx')\n\
    \   ```\n\n7. 打开 `movie_sheets.xlsx` 文件，检查它是否包含两个工作表，并且信息正确，如下图所示：\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_210_0.png)\n\
    \n图 6.4：movie_sheets.xlsx 的内容\n\n### 工作原理...\n\n在 *如何操作...* 部分，在 *步骤 1* 中导入模块后，我们在\
    \ *步骤 2* 中创建了一个新的电子表格。这是一个仅包含默认工作表的新电子表格。\n\n要存储的数据在 *步骤 3* 中定义。请注意，它包含将放入两个工作表的信息（两个表中都有电影名称；第一个表中有观影人数，第二个表中有导演姓名）。在此步骤中，第一个工作表被填充。\n\
    \n> 注意值的存储方式。正确的单元格被定义为 A 列或 B 列以及正确的行（行从 1 开始）。`enumerate` 函数返回一个元组，第一个元素是索引，第二个是枚举的参数（在本例中，是一个包含三个值的元组）。\n\
    \n之后，在 *步骤 4* 中，使用名称 `Directors` 创建了新工作表。`.create_sheet` 返回新工作表。\n\n`Directors`\
    \ 工作表中的信息在 *步骤 5* 中存储，文件在 *步骤 6* 中保存。\n\n### 更多内容...\n\n现有工作表的名称可以通过 `.title`\
    \ 属性进行更改：\n\n```python\n>>> sheet = xlsfile['Sheet']\n>>> sheet.title = 'Admissions'\n\
    >>> xlsfile.sheetnames\n['Admissions', 'Directors']\n```\n\n请注意，更改后将无法通过 `xlsfile['Sheet']`\
    \ 访问该工作表。该名称已不存在！\n\n活动工作表（即打开文件时将显示的工作表）可以通过 `.active` 属性获取，并通过 `._active_sheet_index`\
    \ 进行更改。索引从 0 开始，对应第一个工作表：\n\n```python\n>>> xlsfile.active\n<Worksheet \"Admissions\"\
    >\n>>> xlsfile._active_sheet_index\n0\n>>> xlsfile._active_sheet_index = 1\n>>>\
    \ xlsfile.active\n<Worksheet \"Directors\">\n```\n\n工作表也可以使用 `.copy_worksheet`\
    \ 进行复制。请注意，某些数据（例如图表）不会被复制。所有单元格数据都将被复制：\n\n```python\nnew_copied_sheet = xlsfile.copy_worksheet(source_sheet)\n\
    ```\n\n如果需要复制图表，请记住，如果需要，可以通过代码多次复制它们。\n\n完整的 openpyxl 文档可以在此处找到：https://openpyxl.readthedocs.io/en/stable/index.html。\n\
    \n### 另请参阅\n\n- 本章前面的 *读取 Excel 电子表格* 教程。\n- 本章前面的 *更新 Excel 电子表格* 教程。\n- 下一节中的\
    \ *在 Excel 中创建图表* 教程。\n- 本章后面的 *在 Excel 中处理单元格格式* 教程。\n\n## 在 Excel 中创建图表\n\n\
    电子表格包含许多处理数据的工具，包括以彩色图表呈现数据。让我们看看如何以编程方式向 Excel 电子表格添加图表。\n\n### 准备工作\n\n我们将使用\
    \ `openpyxl` 模块。我们需要安装该模块，将其添加到我们的 `requirements.txt` 文件中，如下所示：\n\n```\n$ echo\
    \ \"openpyxl==3.0.3\" >> requirements.txt\n$ pip install -r requirements.txt\n\
    ```\n\n我们将在新文件中存储关于观影人数最多的电影的信息。数据提取自此处：http://www.mrob.com/pub/film-video/topadj.html。\n\
    \n### 如何操作...\n\n1. 导入 `openpyxl` 模块并创建一个新的 Excel 文件：\n   ```python\n   >>> import\
    \ openpyxl\n   >>> from openpyxl.chart import BarChart, Reference\n   >>> xlsfile\
    \ = openpyxl.Workbook()\n   ```\n\n2. 从数据源向此工作表添加关于观影人数的数据。为简单起见，只添加前三条：\n   ```python\n\
    \   >>> data = [\n   ...     ('Name', 'Admissions'),\n   ...     ('Gone With the\
    \ Wind', 225.7),\n   ...     ('Star Wars', 194.4),\n   ...     ('ET: The Extraterrestrial',\
    \ 161.0),\n   ... ]\n   >>> sheet = xlsfile['Sheet']\n   >>> for row in data:\n\
    \   ...     sheet.append(row)\n   ```\n\n3. 创建一个 `BarChart` 对象并填充基本信息：\n   ```python\n\
    \   >>> chart = BarChart()\n   >>> chart.title = \"Admissions per movie\"\n  \
    \ >>> chart.y_axis.title = 'Millions'\n   ```\n\n4. 创建对数据的引用并将数据添加到图表：\n   ```python\n\
    \   >>> data = Reference(sheet, min_row=2, max_row=4, min_col=1, max_col=2)\n\
    \   >>> chart.add_data(data, from_rows=True, titles_from_data=True)\n   ```\n\n\
    5. 将图表添加到工作表并保存文件：\n   ```python\n   >>> sheet.add_chart(chart, \"A6\")\n   >>>\
    \ xlsfile.save('movie_chart.xlsx')\n   ```\n\n6. 在电子表格中检查生成的图表，如下图所示：\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_213_0.png)\n\
    \n### 工作原理...\n\n在 *如何操作...* 部分，在 *步骤 1* 和 *步骤 2* 中准备好数据后，数据已准备好在 A1:B4 范围内。请注意，A1\
    \ 和 B1 都包含一个标题，该标题不应在图表中使用。\n\n在 *步骤 3* 中，我们设置新图表并包含基本数据，例如标题和 *y 轴* 的单位。\n\n\
    步骤 4 通过 `Reference` 对象创建一个引用框，从第 2 行第 1 列到第 4 行第 2 列，这是我们的数据所在的区域，不包括标题。数据通过 `.add_data()`\
    \ 方法添加到图表中。`from_rows` 参数使每一行成为一个不同的数据系列。另一个参数 `titles_from_data` 使用第一列来命名系列。\n\
    \n图表在步骤 5 中被添加到单元格 A6，并保存到磁盘。\n\n### 更多内容...\n\n可以创建多种图表，包括条形图、折线图、面积图（填充线与轴之间区域的折线图）、饼图或散点图（XY\
    \ 图，其中一个值对另一个值进行绘图）。每种图表都有一个等效的类，例如 `PieChart` 或 `LineChart`。\n\n同时，每种图表都可以有不同的类型。例如，`BarChart`\
    \ 的默认类型是 `column`，垂直打印条形，但也可以通过选择不同的类型来垂直打印：\n\n```python\n>>> chart.type = 'bar'\n\
    ```\n\n查看 `openpyxl` 文档以了解所有可用的组合。\n\n- 除了从数据中提取 x 轴标签外，还可以使用 `set_categories`\
    \ 显式设置它们。例如，将步骤 4 与以下代码进行比较：\n  ```python\n  data = Reference(sheet, min_row=2,\
    \ max_row=4, min_col=2, max_col=2)\n  labels = Reference(sheet, min_row=2, max_row=4,\
    \ min_col=1, max_col=1)\n  chart.add_data(data, from_rows=False, titles_from_data=False)\n\
    \  chart.set_categories(labels)\n  ```\n\n范围也可以使用描述区域的文本标签输入，而不是使用 `Reference`\
    \ 对象：\n\n```python\nchart.add_data('Sheet!B2:B4', from_rows=False, titles_from_data=False)\n\
    chart.set_categories('Sheet!A2:A4')\n```\n\n如果数据范围需要以编程方式创建，这种描述方式可能更难处理。"
