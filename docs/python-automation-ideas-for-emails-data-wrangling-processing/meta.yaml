- md: "The `sms_reply` function obtains the phone number that sends the SMS, as well\
    \ as the body of the message, from the `request.form` dictionary. Then, compose\
    \ a response in `msg`, attach it to a new `MessagingResponse`, and return it.\n\
    \n> We are using the message from the user as a whole, but remember all the techniques\
    \ to parse text mentioned in *Chapter 1, Let's Begin Our Automation Journey*.\
    \ They are all applicable here for detecting predefined actions or any other text\
    \ processing.\n\nThe returned value will be sent back by Twilio to the sender,\
    \ producing the result seen in *step 2*.\n\n## There's more...\n\nTo be able to\
    \ generate automated conversations, the state of the conversation should be stored.\
    \ For an advanced state, it should probably be stored in a database, generating\
    \ a flow, but for simple cases, storing information in `session` may be enough.\
    \ The session is able to store information in cookies that are persistent between\
    \ the same combination of to and from phone numbers, allowing you to retrieve\
    \ it between messages.\n\nFor example, this modification will return not only\
    \ the send body, but the previous one as well. Only the relevant parts have been\
    \ included:\n\n```python\napp = Flask(__name__)\napp.secret_key = b'somethingreallysecret!!!!'\n\
    ...\n\n@app.route(\"/sms\", methods=['GET', 'POST'])\ndef sms_reply():\n    from_number\
    \ = request.form['From']\n    last_message = session.get('MESSAGE', None)\n  \
    \  body = request.form['Body']\n    resp = MessagingResponse()\n    msg = (f'Awwwww!\
    \ Thanks so much for your message {from_number}, '\n           f'\"{body}\" to\
    \ you too. ')\n    if last_message:\n        msg += f'Not so long ago you said\
    \ \"{last_message}\" to me..'\n    session['MESSAGE'] = body\n    resp.message(msg)\n\
    \    return str(resp)\n```\n\nThe previous `body` is stored in the `MESSAGE` key\
    \ of the session, which is carried over. Notice the requirement to define a secret\
    \ key to be able to use the session data. Read this for information about it:\
    \ https://flask.palletsprojects.com/en/1.1.x/quickstart/#sessions. More information\
    \ about the handling of cookies in Twilio can be found here: https://support.twilio.com/hc/en-us/articles/223136287-How-do-Twilio-cookies-work-.\n\
    \n> To deploy the new version in Heroku, commit the new `app.py` file to Git,\
    \ and then use `git push heroku master`. The new version will be deployed automatically!\n\
    \nBecause the main objective of this recipe is to demonstrate how to reply, Heroku\
    \ and Flask are not described in detail, but they both have excellent documentation.\
    \ The full documentation for Heroku can be found at https://devcenter.heroku.com/categories/reference,\
    \ and the documentation for Flask is here: http://flask.pocoo.org/docs/.\n\n>\
    \ Remember, the use of Heroku and Flask is just a convenience for this recipe.\
    \ They're great and easy tools to use, but there are multiple alternatives to\
    \ them, as long as you are able to expose a URL so that Twilio can call it. Also,\
    \ check the security measures to ensure that requests to this endpoint come from\
    \ Twilio: https://www.twilio.com/docs/usage/security#validating-requests.\n\n\
    The full documentation for Twilio can be found here: https://www.twilio.com/docs/.\n\
    \n## See also\n\n- The *Producing SMS* recipe, earlier in this chapter, to get\
    \ to grips with the fundamentals of Twilio and how to receive messages.\n- The\
    \ *Creating a Telegram bot* recipe, next, to further your knowledge and apply\
    \ it to similar elements.\n\n## Creating a Telegram bot\n\nTelegram Messenger\
    \ is an instant messaging app that has good support for creating bots. Bots are\
    \ small applications that aim to produce automatic conversations. The big promise\
    \ of bots is that, as machines, they can create any kind of conversation, totally\
    \ indistinguishable from a conversation with a human being, and pass the Turing\
    \ Test, but that objective is quite ambitious and not realistic for the most part.\n\
    \n> The Turing Test was proposed by Alan Turing in 1951. Two participants, a human\
    \ and an Artificial Intelligence (AI) machine/software program, communicate via\
    \ text (like in an instant messaging app) with a human judge that decides which\
    \ one is human and which one is not. If the judge can only guess correctly 50%\
    \ of the time, it can't be easily differentiated and therefore the AI passes the\
    \ test. This was one of the first attempts to measure AI.\n\nBut bots can be very\
    \ useful for a more limited approach, similar to phone systems where you need\
    \ to press 2 to check your account and press 3 to report a missing card. In this\
    \ recipe, we'll see how to generate a simple bot that will display offers and\
    \ events for a company.\n\n## Getting ready\n\nWe need to create a new bot for\
    \ Telegram. This is done through an interface called the BotFather, which is a\
    \ Telegram special channel that allows us to create a new bot. You can access\
    \ the channel here: https://telegram.me/botfather. Access it through your Telegram\
    \ account.\n\nRun /start to start the interface and then create a new bot with\
    \ /newbot. The interface will ask you for the name of the bot and a username,\
    \ which should be unique.\n\nOnce it's set up, it will give you the following:\n\
    \n- The Telegram channel of your bot: https://t.me/<yourusername>.\n- A token\
    \ to allow access to the bot. Copy it as it will be used later.\n\n> You can generate\
    \ a new token if you lose an existing token. Read the BotFather's documentation\
    \ for more information.\n\nWe also need to install the Python module telepot,\
    \ which wraps the RESTful interface from Telegram:\n\n```bash\n$ echo \"telepot==12.7\"\
    \ >> requirements.txt\n$ pip install -r requirements.txt\n```\n\nDownload the\
    \ telegram_bot.py script from GitHub at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter09/telegram_bot.py.\n\
    \n## How to do it...\n\n1. Set up your generated token in the telegram_bot.py\
    \ script on the TOKEN constant in line 6:\n   ```python\n   TOKEN = '<YOUR TOKEN>'\n\
    \   ```\n2. Start the bot:\n   ```bash\n   $ python telegram_bot.py\n   ```\n\
    3. Open the Telegram channel on your phone using the URL and start it. You can\
    \ use the help, offers, and events commands:\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_348_0.png)\n\
    \nFigure 9.12: Marketing offers sent by SMS\n\n## How it works...\n\nStep 1 sets\
    \ the token to use for your specific channel. In step 2, we start the bot locally.\n\
    \nLet's see how the code in `telegram_bot.py` is structured:\n\n```python\n# IMPORTS\n\
    \n# TOKEN\n\n# Define the information to return per command\ndef get_help():\n\
    def get_offers():\ndef get_events():\nCOMMANDS = {\n    'help': get_help,\n  \
    \  'offers': get_offers,\n    'events': get_events,\n}\n\nclass MarketingBot(telepot.helper.ChatHandler):\n\
    \    ...\n\n# Create and start the bot\n```\n\nThe `MarketingBot` class creates\
    \ an interface to handle the communication with Telegram:\n\n- When the channel\
    \ is started, the `open` method will be called\n- When a message is received,\
    \ the `on_chat_message` method will be called\n- If there's no answer in a while,\
    \ `on_idle` will be called\n\nIn each case, the `self.sender.sendMessage` method\
