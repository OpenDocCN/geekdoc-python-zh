  md: '# Developing Stunning Graphs


    Step 3 describes a `colormap` defining the color range in shades of green (Greens).
    This is one standard `colormap` in matplotlib, but we can use others, such as
    oranges, reds, or plasma for a more cold-to-hot approach. More details are available
    in the documentation: https://matplotlib.org/examples/color/colormaps_reference.html.


    The `COUNTRY_COLOUR` dictionary stores the color defined by `colormap` for each
    country. The population is normalized to a number from 0.0 (least population)
    to 1.0 (most), and passed to `colormap` to retrieve the color at the scale it
    corresponds to.


    The GIS information is then retrieved in step 4. `fiona` reads the `europe.geojson`
    file and the data is copied so we can use it in the next steps. It also filters
    to only deal with the countries we defined the population of, which means no extra
    countries are plotted.


    The loop in step 5 goes over the country information list in `data_list`, and
    then each country''s geometry is plotted using `.fill`, which plots a polygon.
    The geometry of each country is either a single polygon (`Polygon`) or more than
    one (`MultiPolygon`). In each case, the proper polygons are drawn, all in the
    same color. This means `MultiPolygon` is drawn several times.


    > GIS information is stored as points for coordinates describing the latitude
    and longitude of the point. Areas, such as countries, have a list of coordinates
    that describe an area within them. Some maps are more precise and have more points
    defining areas. Multiple polygons may be required to define a country, as some
    parts may be separated from each other, with islands being the most obvious case,
    but there are also exclaves. Exclaves are regions of countries detached from the
    main body, like Alaska.


    Finally, the data is displayed by calling `.show`.


