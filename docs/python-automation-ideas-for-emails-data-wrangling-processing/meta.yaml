  md: "# Getting ready\n\nThe python module to deal with regexes is called `re`. The\
    \ main function we'll cover is `re.search()`, which returns a `match` object with\
    \ information about what matched the pattern.\n\n> As regex patterns are also\
    \ defined as strings, we'll differentiate them by prefixing them with an `r`,\
    \ such as `r'pattern'`. This is the Python way of labeling a text as raw string\
    \ literals, meaning that the string within is taken literally, without any escaping.\
    \ This means that a `\\` is used as a backslash instead of an escaping sequence.\
    \ For example, without the `r` prefix, `\\n` means a newline character.\n\nSome\
    \ characters are special and refer to concepts such as *the end of the string*,\
    \ *any digit*, *any character*, *any whitespace character*, and so on.\n\nThe\
    \ simplest form is just a literal string. For example, the regex pattern `r'LOG'`\
    \ matches the string `'LOGS'`, but not the string `'NOT A MATCH'`. If there's\
    \ no match, `re.search` returns `None`. If there is, it returns a special `Match`\
    \ object:\n\n```\n>>> import re\n>>> re.search(r'LOG', 'LOGS')\n<_sre.SRE_Match\
    \ object; span=(0, 3), match='LOG'>\n>>> re.search(r'LOG', 'NOT A MATCH')\n>>>\n\
    ```\n\n# How to do it...\n\n+   1. Import the `re` module:\n   python\n   >>>\
    \ import re\n   \n2. Then, match a pattern that is not at the start of the string:\n\
    \   python\n   >>> re.search(r'LOG', 'SOME LOGS')\n   <_sre.SRE_Match object;\
    \ span=(5, 8), match='LOG'>\n   \n3. Match a pattern that is only at the start\
    \ of the string. Note the `^` character:\n   python\n   >>> re.search(r'^LOG',\
    \ 'LOGS')\n   <_sre.SRE_Match object; span=(0, 3), match='LOG'>\n   >>> re.search(r'^LOG',\
    \ 'SOME LOGS')\n   >>>"
  merge: -1
  pgno: 28
- img_proc: true
  md: 'Let''s Begin Our Automation Journey


    4. Match a pattern only at the end of the string. Note the $ character:


    ```

    >>> re.search(r''LOG$'', ''SOME LOG'')

    <_sre.SRE_Match object; span=(5, 8), match=''LOG''>

    >>> re.search(r''LOG$'', ''SOME LOGS'')

    >>>

    ```


    5. Match the word ''thing'' (not excluding things), but not something or anything.
    Note the \b at the start of the second pattern:


    ```

    >>> STRING = ''something in the things she shows me''

    >>> match = re.search(r''thing'', STRING)

    >>> STRING[:match.start()], STRING[match.start():match.end()], STRING[match.end():]

    (''some'', ''thing'', '' in the things she shows me'')

    >>> match = re.search(r''\bthing'', STRING)

    >>> STRING[:match.start()], STRING[match.start():match.end()], STRING[match.end():]

    (''something in the '', ''thing'', ''s she shows me'')

    ```


    6. Match a pattern that''s only numbers and dashes (for example, a phone number).
    Retrieve the matched string:


    ```

    >>> re.search(r''[0123456789-]+'', ''the phone number is 1234-567-890'') <_sre.SRE_Match
    object; span=(20, 32), match=''1234-567-890''>

    >>> re.search(r''[0123456789-]+'', ''the phone number is 1234-567-890'').group()

    ''1234-567-890''

    ```


    7. Match an email address naively:


    ```

    >>> re.search(r''\S+@\S+'', ''my email is email.123@test.com'').group() ''email.123@test.com''

    ```


    # How it works...


    The re.search function matches a pattern, no matter its position in the string.
    As explained previously, this will return None if the pattern is not found, or
    a Match object.


    The following special characters are used:


    +   - ^: Marks the start of the string

    - $: Marks the end of the string'
