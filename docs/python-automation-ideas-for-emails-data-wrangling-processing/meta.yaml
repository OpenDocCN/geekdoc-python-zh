    \ | Timestamp |\n|---|---|---|---|---|---|\n| John Smith | PHONE | +1-555-12345678\
    \ | NOT-SENT | | |\n| Paul Smith | EMAIL | paul.smith@test.com | NOT-SENT | |\
    \ |\n\nFigure 10.2: Format of `notifications.csv`\n\nNote that the `Code` column\
    \ is empty and that all the statuses should be `NOT-SENT` or empty.\n\n> If you\
