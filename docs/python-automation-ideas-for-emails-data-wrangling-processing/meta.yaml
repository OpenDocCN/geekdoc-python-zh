    \ by line and analyzes what to do in each case. If the entry is SENT, it skips\
    \ it. If it has no code, it tries to fill it. If it tries to send it, it will\
    \ attach the timestamp to record when it was sent or tried to be sent.\n\nFor\
    \ each entry, the whole file is saved again in a file called `save_file`. Notice\
