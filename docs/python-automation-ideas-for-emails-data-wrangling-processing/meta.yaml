    # 8 Developing Stunning Graphs


    Graphs and images are fantastic ways of presenting complex data in an easy and
    understandable way. In this chapter, we will make use of the powerful matplotlib
    library to learn how to create all kinds of graphs. matplotlib is a library that''s
    aimed at displaying data in multiple ways, and it can create stunning plots that
    help transmit and display information in the best way possible.


    > matplotlib is well known and interacts well with other tools in the Python ecosystem.
    For example, matplotlib graphs can also be automatically displayed by Jupyter
    Notebooks as introduced in Chapter 7, Cleaning and Processing Data.


    The graphs we''ll cover will go from simple bar graphs to line or pie charts,
    and combine multiple plots in the same graph, annotate them, or even draw geographical
    maps.


    The following recipes will be covered in this chapter:


    +   - Plotting a simple sales graph

    - Drawing stacked bars

    - Plotting pie charts

    - Displaying multiple lines

    - Drawing a scatter plot

    - Visualizing maps

    - Adding legends and annotations'
  - "[PAGE 267]\n\nDeveloping Stunning Graphs\n\n+   - Combining graphs\n- Saving\
