    \ script:\n\n    ```\n    $ python location_price.py output_1_OH.csv output_2_OH.csv\n\
    \    $ python location_price.py output_1_ON.csv output_2_ON.csv\n    ```\n\n3.\
    \  Process both files using the `standard_date.py` script:\n\n    ```\n    $ python\
    \ standard_date.py output_2_OH.csv output_3_OH.csv\n    $ python standard_date.py\
    \ output_2_ON.csv output_3_ON.csv\n    ```\n\n4.  Process all the files in a single\
    \ call to `aggregate_by_location_parallel.py` specifying the files to process:\n\
    \n    ```\n    $ python aggregate_by_location_parallel.py \"output_3_*.csv\"\n\
    \    Processing output_3_ON.csv\n    Processing output_3_OH.csv\n    Done with\
    \ output_3_ON.csv => aggregate_ON.csv\n    Done with output_3_OH.csv => aggregate_OH.csv\n\
    \    ```\n\n5.  Check the resulting CSV files in a spreadsheet. In the following\
    \ screenshots, the files are displayed using the LibreOffice software:\n\n| |\
    \ A | B | C | D |\n|---|---|---|---|---|\n| 1 | DATE | TOTAL USD | NUMBER | AVERAGE\
    \ |\n| 2 | 2019-08-28 | 32.93 | 7 | 4.7 |\n| 3 | 2019-08-29 | 114.76 | 24 | 4.78\
    \ |\n| 4 | 2019-08-30 | 111.76 | 24 | 4.66 |\n| 5 | 2019-08-31 | 113.76 | 24 |\
    \ 4.74 |\n| 6 | 2019-09-01 | 135.76 | 24 | 5.66 |\n| 7 | 2019-09-02 | 112.76 |\
    \ 24 | 4.7 |\n| 8 | 2019-09-03 | 126.76 | 24 | 5.28 |\n| 9 | 2019-09-04 | 114.76\
    \ | 24 | 4.78 |\n| 10 | 2019-09-05 | 115.76 | 24 | 4.82 |\n| 11 | 2019-09-06 |\
    \ 100.76 | 24 | 4.2 |\n| 12 | 2019-09-07 | 119.76 | 24 | 4.99 |\n\n| | A | B |\
    \ C | D |\n|---|---|---|---|---|\n| 1 | DATE | TOTAL USD | NUMBER | AVERAGE |\n\
    | 2 | 2018-08-28 | 20 | 5 | 4 |\n| 3 | 2018-08-29 | 113 | 24 | 4.71 |\n| 4 | 2018-08-30\
    \ | 120 | 24 | 5 |\n| 5 | 2018-08-31 | 120 | 24 | 5 |\n| 6 | 2018-09-01 | 115\
    \ | 24 | 4.79 |\n| 7 | 2018-09-02 | 106 | 24 | 4.42 |\n| 8 | 2018-09-03 | 126\
    \ | 24 | 5.25 |\n| 9 | 2018-09-04 | 159 | 24 | 6.62 |\n| 10 | 2018-09-05 | 114\
    \ | 24 | 4.75 |\n| 11 | 2018-09-06 | 134 | 24 | 5.58 |\n| 12 | 2018-09-07 | 94\
    \ | 24 | 3.92 |\n\nFigure 7.5: The results of the recipe\n\n## How it works...\n\
    \nLet's take a look at the `aggregate_by_location_parallel.py` script, used in\
    \ *step 6*.\n\nThe final part of the script file deals with the parsing of arguments,\
    \ which was described in detail in *Chapter 2, Automating Tasks Made Easy*.\n\n\
    The `main` function detects the input files to aggregate and then processes them\
    \ in parallel:\n\n```\ndef main(input_glob):\n    input_files = [filename for\
    \ filename in glob.glob(input_glob)]\n\n    with concurrent.futures.ProcessPoolExecutor(max_workers=4)\
    \ as executor:\n        futures = [executor.submit(aggregate_filename, filename)\n\
    \                   for filename in input_files]\n        concurrent.futures.wait(futures)\n\
    ```\n\nThe function first uses the input glob to filter the related files and\
    \ stores them in the `input_files` variable. This is done through the `glob.glob`\
    \ function, which returns the filenames that match the glob.\n\nGlobs are patterns\
    \ commonly encountered to match groups of filenames with wildcard characters,\
    \ normally *. For example, glob *.txt will match any filename that has the extension\
    \ txt.\n\nPython includes a glob module as part of its standard library. You can\
    \ check the full documentation at https://docs.python.org/3/library/glob.html.\n\
    \nThe glob pattern searches by default in the current directory. Keep this in\
    \ mind in case it requires tweaking.\n\nThe next step is to make a call using\
    \ a parallel executor for each of the files to the aggregate_filename function.\
    \ We will describe this function shortly, but let's take a look at the executor\
    \ first:\n\n```\nwith concurrent.futures.ProcessPoolExecutor(max_workers=4) as\
    \ executor:\n    futures = [executor.submit(aggregate_filename, filename)\n  \
    \             for filename in input_files]\n    concurrent.futures.wait(futures)\n\
    ```\n\nFirst, we define the executor using a with statement and a call to ProcessPoolExecutor.\
    \ ProcessPoolExecutor creates a number of process workers that will run the submitted\
    \ calls to the executor in the background.\n\nProcessPoolExecutor uses independent\
    \ processes created in the background, instead of threads. You can use ThreadPoolExecutor\
    \ as well.\n\nDue to some limitations arising from how Python is structured internally,\
    \ using threads is not optimal for workloads that are CPU intensive, such as numerical\
    \ operations. Threads are adequate for I/O operations including calling external\
    \ APIs and reading from disk.\n\nFor this particular workload that relies on crunching\
    \ numbers, the number of processes (and therefore workers) should be the same\
    \ as the number of cores in the CPU used. We assumed four for this example, which\
    \ is a common number in desktop computers.\n\nThe next step is to create a `future`\
    \ for each filename. The `future` is an object that references the call that will\
    \ be executed in the background by the executor. When it's done, the `future`\
    \ object will store the result.\n\n> You can think of a `future` object as a ticket\
    \ for a valet car cleaning. You submit the task, get a ticket, and can go do other\
    \ things. When you're done, you hand back the ticket and may need to wait until\
    \ it's finished, if there's still some work pending.\n\nThe last step is to wait\
    \ until all futures are completed by calling `concurrent.futures.wait`. Note that\
    \ there's no result to check for the futures in this specific example.\n\nWe introduced\
    \ futures and executors in the *Speeding up web scraping* recipe in *Chapter 3,\
    \ Building Your First Web Scraping Application*. In that recipe, we used a thread-based\
    \ future.\n\nThe task to be executed wraps the aggregation of the file. Let's\
    \ take a look:\n\n```\nfrom aggregate_by_location import main as main_by_file\n\
    \ndef aggregate_filename(filename):\n    try:\n        print(f'Processing {filename}')\n\
    \        # Obtain the location\n        match = re.match(r'output_3_(.*).csv',\
    \ filename)\n        location = match.group(1)\n        output_file = f'aggregate_{location}.csv'\n\
    \n        with open(filename) as in_file, open(output_file, 'w') as out_file:\n\
    \            main_by_file(in_file, out_file)\n\n        print(f'Done with {filename}\
    \ => {output_file}', flush=True)\n    except Exception as exc:\n        print(f'Unexpected\
    \ exception {exc}')\n```\n\nAt the core of it, there's a call to `main_by_file`.\
    \ This method is imported directly from the *Aggregating results* recipe from\
    \ the previous section. It receives an input file and produces an output file.\
    \ These files are opened with read and write access using the `with` statement."
  mdcn: "清洗与处理数据\n\n## 并行处理数据\n\n上一个食谱中介绍的处理方法效果良好。但它需要逐个处理每个文件。当我们处理的文件数量较少时，这或许没问题，但面对海量文件时，这种方法效率不高。每次我们只使用单个CPU核心，对于这类数值计算任务来说并非最佳选择。\n\
    \n在本食谱中，我们将学习如何并行处理文件，利用计算机的所有核心来加速处理过程，从而大幅提升吞吐量。\n\n## 准备工作\n\n我们将使用上一个食谱生成的CSV文件，该文件接收并转换以下格式的日志：\n\
    \n`[<Timestamp>] - SALE - PRODUCT: <product id> - PRICE: <price>`\n\n每一行代表一条销售日志。\n\
    \n我们将使用 `parse` 模块和 `delorean` 模块。我们需要安装这些模块，将它们添加到 `requirements.txt` 文件中，如下所示：\n\
    \n```\n$ echo \"parse==1.14.0\" >> requirements.txt\n$ echo \"delorean==1.0.0\"\
    \ >> requirements.txt\n$ pip install -r requirements.txt\n```\n\n在GitHub仓库中，有一些待处理的日志文件，其结构如下：\n\
    \n```\nsale_logs/\n  OH\n    logs.txt\n  ON\n    logs.txt\n```\n\n代码可在GitHub仓库中找到：https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter07。\n\
    \n## 操作步骤...\n\n1.  使用 `logs_to_csv.py` 脚本导入数据并将其转换为CSV文件。该脚本将位置作为输入参数。分别为OH和ON日志创建文件：\n\
    \n    ```\n    $ python logs_to_csv.py sale_logs/OH/logs.txt output_1_OH.csv -l\
    \ OH\n    $ python logs_to_csv.py sale_logs/ON/logs.txt output_1_ON.csv -l ON\n\
    \    ```\n\n2.  使用 `location_price.py` 脚本处理两个生成的文件：\n\n    ```\n    $ python location_price.py\
    \ output_1_OH.csv output_2_OH.csv\n    $ python location_price.py output_1_ON.csv\
    \ output_2_ON.csv\n    ```\n\n3.  使用 `standard_date.py` 脚本处理两个文件：\n\n    ```\n\
    \    $ python standard_date.py output_2_OH.csv output_3_OH.csv\n    $ python standard_date.py\
    \ output_2_ON.csv output_3_ON.csv\n    ```\n\n4.  通过一次调用 `aggregate_by_location_parallel.py`\
    \ 处理所有文件，并指定要处理的文件：\n\n    ```\n    $ python aggregate_by_location_parallel.py\
    \ \"output_3_*.csv\"\n    Processing output_3_ON.csv\n    Processing output_3_OH.csv\n\
    \    Done with output_3_ON.csv => aggregate_ON.csv\n    Done with output_3_OH.csv\
    \ => aggregate_OH.csv\n    ```\n\n5.  在电子表格中检查生成的CSV文件。以下截图使用LibreOffice软件显示文件：\n\
    \n| | A | B | C | D |\n|---|---|---|---|---|\n| 1 | DATE | TOTAL USD | NUMBER\
    \ | AVERAGE |\n| 2 | 2019-08-28 | 32.93 | 7 | 4.7 |\n| 3 | 2019-08-29 | 114.76\
    \ | 24 | 4.78 |\n| 4 | 2019-08-30 | 111.76 | 24 | 4.66 |\n| 5 | 2019-08-31 | 113.76\
    \ | 24 | 4.74 |\n| 6 | 2019-09-01 | 135.76 | 24 | 5.66 |\n| 7 | 2019-09-02 | 112.76\
    \ | 24 | 4.7 |\n| 8 | 2019-09-03 | 126.76 | 24 | 5.28 |\n| 9 | 2019-09-04 | 114.76\
    \ | 24 | 4.78 |\n| 10 | 2019-09-05 | 115.76 | 24 | 4.82 |\n| 11 | 2019-09-06 |\
    \ 100.76 | 24 | 4.2 |\n| 12 | 2019-09-07 | 119.76 | 24 | 4.99 |\n\n| | A | B |\
    \ C | D |\n|---|---|---|---|---|\n| 1 | DATE | TOTAL USD | NUMBER | AVERAGE |\n\
    | 2 | 2018-08-28 | 20 | 5 | 4 |\n| 3 | 2018-08-29 | 113 | 24 | 4.71 |\n| 4 | 2018-08-30\
    \ | 120 | 24 | 5 |\n| 5 | 2018-08-31 | 120 | 24 | 5 |\n| 6 | 2018-09-01 | 115\
    \ | 24 | 4.79 |\n| 7 | 2018-09-02 | 106 | 24 | 4.42 |\n| 8 | 2018-09-03 | 126\
    \ | 24 | 5.25 |\n| 9 | 2018-09-04 | 159 | 24 | 6.62 |\n| 10 | 2018-09-05 | 114\
    \ | 24 | 4.75 |\n| 11 | 2018-09-06 | 134 | 24 | 5.58 |\n| 12 | 2018-09-07 | 94\
    \ | 24 | 3.92 |\n\n图7.5：本食谱的结果\n\n## 工作原理...\n\n让我们看看在*步骤6*中使用的 `aggregate_by_location_parallel.py`\
    \ 脚本。\n\n脚本文件的最后一部分处理参数解析，这在*第2章，轻松实现任务自动化*中有详细描述。\n\n`main` 函数检测要聚合的输入文件，然后并行处理它们：\n\
    \n```\ndef main(input_glob):\n    input_files = [filename for filename in glob.glob(input_glob)]\n\
    \n    with concurrent.futures.ProcessPoolExecutor(max_workers=4) as executor:\n\
    \        futures = [executor.submit(aggregate_filename, filename)\n          \
    \         for filename in input_files]\n        concurrent.futures.wait(futures)\n\
    ```\n\n该函数首先使用输入glob模式过滤相关文件，并将它们存储在 `input_files` 变量中。这是通过 `glob.glob` 函数完成的，该函数返回与glob模式匹配的文件名。\n\
    \nGlob是常用的模式，用于通过通配符字符（通常是*）匹配一组文件名。例如，glob `*.txt` 将匹配任何扩展名为txt的文件名。\n\nPython在其标准库中包含了一个glob模块。你可以在\
    \ https://docs.python.org/3/library/glob.html 查看完整文档。\n\nGlob模式默认在当前目录中搜索。如果需要调整，请记住这一点。\n\
    \n下一步是使用并行执行器为每个文件调用 `aggregate_filename` 函数。我们稍后将描述这个函数，但先看看执行器：\n\n```\nwith\
    \ concurrent.futures.ProcessPoolExecutor(max_workers=4) as executor:\n    futures\
    \ = [executor.submit(aggregate_filename, filename)\n               for filename\
    \ in input_files]\n    concurrent.futures.wait(futures)\n```\n\n首先，我们使用with语句和对\
    \ `ProcessPoolExecutor` 的调用来定义执行器。`ProcessPoolExecutor` 创建多个进程工作器，这些工作器将在后台运行提交给执行器的调用。\n\
    \n`ProcessPoolExecutor` 使用在后台创建的独立进程，而不是线程。你也可以使用 `ThreadPoolExecutor`。\n\n由于Python内部结构的一些限制，使用线程对于CPU密集型工作负载（如数值运算）来说不是最优的。线程适用于I/O操作，包括调用外部API和从磁盘读取。\n\
    \n对于这个依赖于数值计算的特定工作负载，进程数（因此工作器数）应与所用CPU的核心数相同。我们在这个例子中假设为四个，这是台式机中的常见数量。\n\n下一步是为每个文件名创建一个\
    \ `future`。`future` 是一个对象，它引用将在后台由执行器执行的调用。当它完成时，`future` 对象将存储结果。\n\n> 你可以将 `future`\
    \ 对象想象成一张代客洗车的票。你提交任务，拿到一张票，然后可以去做其他事情。当你回来时，交回票，如果还有工作未完成，可能需要等待。\n\n最后一步是调用\
    \ `concurrent.futures.wait` 等待所有future完成。请注意，在这个特定示例中，future没有需要检查的结果。\n\n我们在*第3章，构建你的第一个网络爬虫应用*的*加速网络爬虫*食谱中介绍了future和执行器。在那个食谱中，我们使用了基于线程的future。\n\
    \n要执行的任务封装了文件的聚合。让我们看看：\n\n```\nfrom aggregate_by_location import main as main_by_file\n\
    \ndef aggregate_filename(filename):\n    try:\n        print(f'Processing {filename}')\n\
    \        # Obtain the location\n        match = re.match(r'output_3_(.*).csv',\
    \ filename)\n        location = match.group(1)\n        output_file = f'aggregate_{location}.csv'\n\
    \n        with open(filename) as in_file, open(output_file, 'w') as out_file:\n\
    \            main_by_file(in_file, out_file)\n\n        print(f'Done with {filename}\
    \ => {output_file}', flush=True)\n    except Exception as exc:\n        print(f'Unexpected\
    \ exception {exc}')\n```\n\n其核心是调用 `main_by_file`。这个方法直接从上一节的*聚合结果*食谱中导入。它接收一个输入文件并生成一个输出文件。这些文件使用\
    \ `with` 语句以读写访问方式打开。"
