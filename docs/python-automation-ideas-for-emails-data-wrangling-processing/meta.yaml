    # How it works...


    To open a file, use the `open()` function. This returns a `file` object that then
    can be iterated over to return it line by line, as shown in *step 1* of the *How
    to do it...* section. Note it opens the file in text mode.


    The `with` context manager is a very convenient way of dealing with files. It
    will close the file after finishing its use (leaving the block). It will do so
    even if an exception has been raised.


    *Step 2* shows how to iterate and filter the lines based on what lines are applicable
    for our tasks. The lines are returned as strings that can be filtered in multiple
    ways, as described in the recipes in *Chapter 1, Let''s Begin Our Automation Journey*
    and *Chapter 3, Building Your First Web Scraping Application*.


    Reading the whole file may not be required, as shown in *step 3*. Because iterating
    through the file line by line will be reading the file as you go, you can stop
    at any time, avoiding reading the rest of the file. For a small file such as our
    example, that''s not very relevant, but for long files, this can reduce memory
    use and time.'
