    \ at the start of the file\n    notif_file.seek(0)\n\n    header = data[0].keys()\n\
    \    writer = csv.DictWriter(notif_file, fieldnames=header)\n    writer.writeheader()\n\
    \    writer.writerows(data)\n\n    # Be sure to write to disk\n    notif_file.flush()\n\
    ```"
  - '[PAGE 370]


    This overwrites the file on each entry operation, without us having to close and
    open the file again.


    > Why write the whole file for each entry? This is an easy way to store each of
    the operations and allows you to retry the sending process. For example, if an
    entry produces an unexpected error or a timeout, or even if there''s a general
    failure, all the progress and previous codes will be marked as SENT already and
    won''t be sent a second time. This means the operation can be retried as needed.
    For a big number of entries, this is a good way of ensuring that a problem in
    the middle of the process doesn''t make us resend messages to our customers.


    For a huge number of rows, we may risk having a problem with saving the file.
    This can cause the file to get corrupted by an unexpected error while writing
    or taking too long to save. If that''s the case, split the file into independent
    batches that can be treated independently. For very big processes, a system that
    guarantees the data won''t get corrupted, like using a database, may be required.


    For each code to be sent, the `send_notification` function decides to call either
    `send_phone_notification` or `send_email_notification`. It appends the current
    time in both cases.


    Both `send` functions return an error if they can''t send the message. This allows
    you to mark it in the resulting `notifications.csv` file and retry it later.


    > The `notifications.csv` file can also be changed manually. For example, imagine
    there''s a typo in an email and that''s the reason for the error. It can be changed
    and retried.


    `send_email_notification` sends the message based on the Mailgun interface. For
    more information, refer to the *Sending notifications via emails* recipe in *Chapter
    9, Dealing with Communication Channels*. Note that the email sent here is text
    only.


    `send_phone_notification` sends the message based on the Twilio interface. For
    more information, refer to the *Producing SMS* recipe in *Chapter 9, Dealing with
    Communication Channels*.'
  - "[PAGE 371]\n\nWhy Not Automate Your Marketing Campaign?\n\n# There's more...\n\
    \nTimestamps have been deliberately written in ISO format, as it is a parsable\
    \ format. This means that we can get back a proper object in an easy way, like\
    \ this:\n\n```\n>>> import datetime\n>>> timestamp = datetime.datetime.now(datetime.timezone.utc).isoformat()\n\
    >>> timestamp\n'2018-08-25T14:13:53.772815+00:00'\n>>> datetime.datetime.fromisoformat(timestamp)\n\
    datetime.datetime(2018, 9, 11, 21, 5, 41, 979567, tzinfo=datetime.timezone.utc)\n\
    ```\n\nThis allows you to easily parse the timestamp back and forth.\n\n> ISO\
    \ 8601 time format is well supported in most programming languages and precisely\
    \ defines the time as it includes the time zone. It is an excellent choice for\
    \ recording times, if you can use it.\n\nThe strategy used in `send_notification`\
    \ to route the notifications is an interesting one:\n\n```\n# Route each of the\
    \ notifications\nMETHOD = {\n    'PHONE': send_phone_notification,\n    'EMAIL':\
    \ send_email_notification,\n}\ntry:\n    method = METHOD[entry['Contact Method']]\n\
    \    result = method(entry, config)\nexcept KeyError:\n    result = 'INVALID_METHOD'\n\
    ```\n\nThe `METHOD` dictionary assigns each of the possible `Contact Methods`\
    \ to a function that has the same definition, accepting both an entry and a config.\n\
    \nThen, based on the specific method, the function is retrieved from the dictionary\
    \ and called. Note that the `method` variable contains the correct function to\
    \ call."
