  md: "# How it works...\n\nThe main work in step 1 is done in the `include_macro.py`\
    \ script. It copies the file into the `macro_file` subdirectory to avoid modifying\
    \ the input.\n\nInternally, an .ods file is a zip file with a certain structure.\
    \ The script takes advantage of the zip file Python module to add the script to\
    \ the proper subdirectory internally. It also modifies the `manifest.xml` file\
    \ to allow LibreOffice to know there's a script inside the file.\n\nThe macro\
    \ that is executed in step 3 is defined in `libreoffice_script.py` and contains\
    \ a single function:\n\n```\ndef ObtainAggregated(*args):\n    # get the doc from\
    \ the scripting context\n    # which is made available to all scripts\n    desktop\
    \ = XSCRIPTCONTEXT.getDesktop()\n    model = desktop.getCurrentComponent()\n \
    \   # get the first sheet\n    sheet = model.Sheets.getByIndex(0)\n\n    # Find\
    \ the admissions column\n    MAX_ELEMENT = 20\n    for column in range(0, MAX_ELEMENT):\n\
    \        cell = sheet.getCellByPosition(column, 0)\n        if 'Admissions' in\
    \ cell.String:\n            break\n    else:\n        raise Exception('Admissions\
    \ not found')\n\n    accumulator = 0.0\n    for row in range(1, MAX_ELEMENT):\n\
    \        cell = sheet.getCellByPosition(column, row)\n        value = cell.getValue()\n\
    \        if value:\n            accumulator += cell.getValue()\n        else:\n\
    \            break\n\n    cell = sheet.getCellByPosition(column, row)\n    cell.setValue(accumulator)\n\
    ```"
