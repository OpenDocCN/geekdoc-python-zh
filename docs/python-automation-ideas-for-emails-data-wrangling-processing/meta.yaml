- img_proc: true
  md: "The `sms_reply` function obtains the phone number that sends the SMS, as well\
    \ as the body of the message, from the `request.form` dictionary. Then, compose\
    \ a response in `msg`, attach it to a new `MessagingResponse`, and return it.\n\
    \n> We are using the message from the user as a whole, but remember all the techniques\
    \ to parse text mentioned in *Chapter 1, Let's Begin Our Automation Journey*.\
    \ They are all applicable here for detecting predefined actions or any other text\
    \ processing.\n\nThe returned value will be sent back by Twilio to the sender,\
    \ producing the result seen in *step 2*.\n\n# There's more...\n\nTo be able to\
    \ generate automated conversations, the state of the conversation should be stored.\
    \ For an advanced state, it should probably be stored in a database, generating\
    \ a flow, but for simple cases, storing information in `session` may be enough.\
    \ The session is able to store information in cookies that are persistent between\
    \ the same combination of to and from phone numbers, allowing you to retrieve\
    \ it between messages.\n\nFor example, this modification will return not only\
    \ the send body, but the previous one as well. Only the relevant parts have been\
    \ included:\n\n```\napp = Flask(__name__)\napp.secret_key = b'somethingreallysecret!!!!'\n\
    ...\n\n@app.route(\"/sms\", methods=['GET', 'POST'])\ndef sms_reply():\n    from_number\
    \ = request.form['From']\n    last_message = session.get('MESSAGE', None)\n  \
    \  body = request.form['Body']\n    resp = MessagingResponse()\n    msg = (f'Awwwww!\
    \ Thanks so much for your message {from_number}, '\n           f'\"{body}\" to\
    \ you too. ')\n    if last_message:\n        msg += f'Not so long ago you said\
    \ \"{last_message}\" to me..'\n    session['MESSAGE'] = body\n    resp.message(msg)\n\
    \    return str(resp)\n```"
