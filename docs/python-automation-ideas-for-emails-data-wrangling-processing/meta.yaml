  md: '# Creating a Telegram bot


    Telegram Messenger is an instant messaging app that has good support for creating
    bots. Bots are small applications that aim to produce automatic conversations.
    The big promise of bots is that, as machines, they can create any kind of conversation,
    totally indistinguishable from a conversation with a human being, and pass the
    Turing Test, but that objective is quite ambitious and not realistic for the most
    part.


    > The Turing Test was proposed by Alan Turing in 1951. Two participants, a human
    and an Artificial Intelligence (AI) machine/software program, communicate via
    text (like in an instant messaging app) with a human judge that decides which
    one is human and which one is not. If the judge can only guess correctly 50% of
    the time, it can''t be easily differentiated and therefore the AI passes the test.
    This was one of the first attempts to measure AI.


    But bots can be very useful for a more limited approach, similar to phone systems
    where you need to press 2 to check your account and press 3 to report a missing
    card. In this recipe, we''ll see how to generate a simple bot that will display
    offers and events for a company.


    # Getting ready


    We need to create a new bot for Telegram. This is done through an interface called
    the BotFather, which is a Telegram special channel that allows us to create a
    new bot. You can access the channel here: https://telegram.me/botfather. Access
    it through your Telegram account.


    Run /start to start the interface and then create a new bot with /newbot. The
    interface will ask you for the name of the bot and a username, which should be
    unique.'
