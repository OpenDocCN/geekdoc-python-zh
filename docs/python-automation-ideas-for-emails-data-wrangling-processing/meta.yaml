- md: "## How it works...\n\nThe main engine to create the concurrent requests is\
    \ the main function. Notice that the rest of the code is basically untouched (other\
    \ than returning the source link in the process_link function).\n\n> This change\
    \ is actually quite common when adapting for concurrency. Concurrent tasks need\
    \ to return all the relevant data, as they cannot rely on an ordered context.\n\
    \nThis is the relevant part of the code that handles the concurrent engine:\n\n\
    ```python\nwith concurrent.futures.ThreadPoolExecutor(max_workers=workers) as\
    \ executor:\n    while to_check:\n        futures = [executor.submit(process_link,\
    \ url, to_search)\n                  for url in to_check]\n        to_check =\
    \ []\n        for data in concurrent.futures.as_completed(futures):\n        \
    \    link, new_links = data.result()\n            checked_links.add(link)\n  \
    \          for link in new_links:\n                if link not in checked_links\
    \ and link not in to_check:\n                    to_check.append(link)\n     \
    \   max_checks -= 1\n```\n\nBuilding Your First Web Scraping Application\n\n```python\n\
    if not max_checks:\n    return\n```\n\nThe `with` context creates a pool of workers,\
    \ specifying how many. Inside, a list of futures containing all the URLs to retrieve\
    \ is created. The `.as_completed()` function returns the futures that are finished,\
    \ and then there's some work to do to obtain newly found links and check whether\
    \ they need to be added to be retrieved or not. This process is similar to the\
    \ one presented in the *Crawling the web* recipe.\n\nThe process starts again\
    \ until enough links have been retrieved or there are no links to retrieve. Note\
    \ that the links are retrieved in batches; the first time, the base link is processed\
    \ and all links are retrieved. In the second iteration, all those links will be\
    \ requested. Once they are all downloaded, a new batch will be processed.\n\n\
    > When dealing with concurrent requests, keep in mind that they can change order\
    \ between two executions. If a request takes a little more or a little less time,\
    \ that can affect the ordering of the retrieved information. Because we stop after\
    \ downloading 10 pages, that also means that the 10 pages could be different.\n\
    \n## There's more...\n\nThe full `futures` documentation in Python can be found\
    \ here: `https://docs.python.org/3/library/concurrent.futures.html`.\n\n> As you\
    \ can see in *steps 4* and *5* in the *How to do it...* section, properly determining\
    \ the number of workers can require some tests. Some numbers can make the process\
    \ slower, due to the increase in management. Do not be afraid to experiment!\n\
    \nIn the Python world, there are other ways to make concurrent HTTP requests.\
    \ There's a native request module that allows us to work with `futures`, called\
    \ `requests-futures`. It can be found here: `https://github.com/ross/requests-futures`.\n\
    \nAnother alternative is to use asynchronous programming. This way of working\
    \ has recently gotten a lot of attention, as it can be very efficient in situations\
    \ that involve dealing with many concurrent calls, but the resulting way of coding\
    \ is different from the traditional way and requires some time to get used to.\
    \ Python includes the `asyncio` module to work that way, and there's a good module\
    \ called `aiohttp` to work with HTTP requests. You can find more information about\
    \ `aiohttp` here: `https://aiohttp.readthedocs.io/en/stable/client_quickstart.html`.\n\
    \nA good introduction to asynchronous programming can be found in this article:\
    \ https://djangostars.com/blog/asynchronous-programming-in-python-asyncio/.\n\n\
    ## See also\n\n- The *Crawling the web* recipe, earlier in this chapter, for the\
    \ less efficient alternative to this recipe.\n- The *Downloading web pages* recipe,\
    \ earlier in this chapter, to learn the basics of requesting web pages.\n\n# 4\
    \ Searching and Reading Local Files\n\nIn this chapter, we will introduce the\
    \ basic operations to read information from files, starting with searching and\
    \ opening files stored in different directories and subdirectories. Then, we'll\
    \ describe some of the most common file types and how to read them, including\
    \ formats such as raw text files, PDFs, and Word documents.\n\nThe last recipe\
    \ will search for a word inside different kinds of files, recursively in a directory\
    \ tree.\n\nIn this chapter, we'll cover the following recipes:\n\n- Crawling and\
    \ searching directories\n- Reading text files\n- Dealing with encodings\n- Reading\
    \ CSV files\n- Reading log files\n- Reading file metadata\n- Reading images\n\
    - Reading PDF files\n- Reading Word documents\n- Scanning documents for a keyword\n\
    \nWe will start by accessing all the files in a directory tree.\n\n## Crawling\
    \ and searching directories\n\nIn this recipe, we'll learn how to scan a directory\
    \ recursively to get all the files contained there. That will include all the\
    \ files in subdirectories. The matched files can be of a particular kind, like\
    \ text files, or every single one of them.\n\nThis is normally a starting operation\
    \ when dealing with files, to detect all the existing ones.\n\n## Getting ready\n\
    \nLet's start by creating a test directory with some file information:\n\n```bash\n\
    $ mkdir dir\n$ touch dir/file1.txt\n$ touch dir/file2.txt\n$ mkdir dir/subdir\n\
    $ touch dir/subdir/file3.txt\n$ touch dir/subdir/file4.txt\n$ touch dir/subdir/file5.pdf\n\
    $ touch dir/file6.pdf\n```\n\nAll the files will be empty; we will use them in\
    \ this recipe only to discover them. Notice there are four files that have a `.txt`\
    \ extension, and two that have a `.pdf` extension.\n\n> The files are also available\
    \ in the GitHub repository here:\nhttps://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter04/documents/dir.\n\
    \nEnter the created `dir` directory\n\n```bash\n$ cd dir\n```\n\n## How to do\
    \ it...\n\n1. Print all the filenames in the `dir` directory and subdirectories:\n\
    \n```python\n>>> import os\n>>> for root, dirs, files in os.walk('.'):\n...  \
    \   for file in files:\n...         print(file)\n...\nfile1.txt\nfile2.txt\nfile6.pdf\n\
    file3.txt\nfile4.txt\nfile5.pdf\n```\n\n2. Print the full path of the files, joining\
    \ with the root:\n\n```python\n>>> for root, dirs, files in os.walk('.'):\n...\
    \     for file in files:\n...         full_file_path = os.path.join(root, file)\n\
    ...         print(full_file_path)\n...\n./dir/file1.txt\n./dir/file2.txt\n./dir/file6.pdf\n\
    ./dir/subdir/file3.txt\n./dir/subdir/file4.txt\n./dir/subdir/file5.pdf\n```\n\n\
    3. Print only the .pdf files:\n\n```python\n>>> for root, dirs, files in os.walk('.'):\n\
    ...     for file in files:\n...         if file.endswith('.pdf'):\n...       \
    \      full_file_path = os.path.join(root, file)\n...             print(full_file_path)\n\
    ...\n./dir/file6.pdf\n./dir/subdir/file5.pdf\n```\n\n4. Print only files that\
    \ contain an even number:\n\n```python\n>>> import re\n>>> for root, dirs, files\
    \ in os.walk('.'):\n...     for file in files:\n...         if re.search(r'[13579]',\
    \ file):\n...             full_file_path = os.path.join(root, file)\n...     \
    \        print(full_file_path)\n...\n./dir/file1.txt\n./dir/subdir/file3.txt\n\
    ./dir/subdir/file5.pdf\n```\n\n## How it works...\n\n`os.walk()` goes through\
    \ a whole directory and all subdirectories under it, returning all the files.\
    \ For each directory, it returns a tuple with the directory, any subdirectories\
    \ under it, and all the files:\n\n```python\n>>> for root, dirs, files in os.walk('.'):\n\
    ...     print(root, dirs, files)\n...\n. ['dir'] []\n./dir ['subdir'] ['file1.txt',\
    \ 'file2.txt', 'file6.pdf']\n./dir/subdir [] ['file3.txt', 'file4.txt', 'file5.pdf']\n\
    ```\n\nThe `os.path.join()` function allows us to join two paths, such as the\
    \ base path and the file.\n\nAs paths are returned as pure strings, any kind of\
    \ filtering can be done, as in step 3. In step 4, the full power of regular expressions\
    \ can be used to filter.\n\nIn the next recipe, we'll deal with the content of\
    \ the files, and not just the filename.\n\n## There's more...\n\nIn this recipe,\
    \ the returned files are not opened or modified in any way. This operation is\
    \ read-only. Files can be opened as described in the following recipes.\n\n> Be\
    \ aware that changing the structure of the directory while walking over it may\
    \ affect the results. If you need to carry out some file maintenance while walking\
    \ through the tree, like copying or moving a file, it's a good idea to store it\
    \ in a different directory."
  mdcn: "## 工作原理...\n\n创建并发请求的主引擎是主函数。请注意，其余代码基本保持不变（除了在 `process_link` 函数中返回源链接）。\n\
    \n> 这种改动在适配并发时其实很常见。并发任务需要返回所有相关数据，因为它们无法依赖有序的上下文。\n\n以下是处理并发引擎的相关代码部分：\n\n```python\n\
    with concurrent.futures.ThreadPoolExecutor(max_workers=workers) as executor:\n\
    \    while to_check:\n        futures = [executor.submit(process_link, url, to_search)\n\
    \                  for url in to_check]\n        to_check = []\n        for data\
    \ in concurrent.futures.as_completed(futures):\n            link, new_links =\
    \ data.result()\n            checked_links.add(link)\n            for link in\
    \ new_links:\n                if link not in checked_links and link not in to_check:\n\
    \                    to_check.append(link)\n        max_checks -= 1\n```\n\n构建你的第一个网页抓取应用\n\
    \n```python\nif not max_checks:\n    return\n```\n\n`with` 上下文管理器创建了一个工作线程池，并指定了线程数量。在其中，创建了一个包含所有待检索\
    \ URL 的 futures 列表。`.as_completed()` 函数返回已完成的 futures，然后需要进行一些处理来获取新发现的链接，并检查它们是否需要被添加到待检索列表中。这个过程类似于\
    \ *抓取网页* 食谱中介绍的方法。\n\n这个过程会重复进行，直到检索到足够的链接或没有链接可检索。请注意，链接是分批检索的；第一次处理基础链接并检索所有链接。在第二次迭代中，将请求所有这些链接。一旦它们全部下载完成，就会处理新的一批。\n\
    \n> 处理并发请求时，请记住它们在两次执行之间可能会改变顺序。如果一个请求花费的时间稍多或稍少，可能会影响检索信息的顺序。由于我们在下载 10 页后停止，这也意味着这\
    \ 10 页可能是不同的。\n\n## 更多内容...\n\nPython 中完整的 `futures` 文档可以在这里找到：`https://docs.python.org/3/library/concurrent.futures.html`。\n\
    \n> 正如你在 *如何做...* 部分的 *步骤 4* 和 *步骤 5* 中看到的，正确确定工作线程的数量可能需要一些测试。某些数字可能会因为管理开销的增加而使过程变慢。不要害怕尝试！\n\
    \n在 Python 世界中，还有其他方法可以进行并发 HTTP 请求。有一个原生的请求模块允许我们使用 `futures`，叫做 `requests-futures`。可以在这里找到：`https://github.com/ross/requests-futures`。\n\
    \n另一种选择是使用异步编程。这种工作方式最近受到了很多关注，因为它在处理许多并发调用的情况下可以非常高效，但生成的编码方式与传统方式不同，需要一些时间来适应。Python\
    \ 包含了 `asyncio` 模块来以这种方式工作，并且有一个很好的模块叫做 `aiohttp` 用于处理 HTTP 请求。你可以在以下位置找到更多关于\
    \ `aiohttp` 的信息：`https://aiohttp.readthedocs.io/en/stable/client_quickstart.html`。\n\
    \n关于异步编程的优秀介绍可以在这篇文章中找到：https://djangostars.com/blog/asynchronous-programming-in-python-asyncio/。\n\
    \n## 另请参阅\n\n- 本章前面的 *抓取网页* 食谱，了解此食谱的效率较低的替代方案。\n- 本章前面的 *下载网页* 食谱，学习请求网页的基础知识。\n\
    \n# 4 搜索和读取本地文件\n\n在本章中，我们将介绍从文件中读取信息的基本操作，从搜索和存储在不同目录和子目录中的文件开始。然后，我们将描述一些最常见的文件类型以及如何读取它们，包括原始文本文件、PDF\
    \ 和 Word 文档等格式。\n\n最后一个食谱将在目录树中递归地搜索不同种类文件中的一个单词。\n\n在本章中，我们将涵盖以下食谱：\n\n- 爬取和搜索目录\n\
    - 读取文本文件\n- 处理编码\n- 读取 CSV 文件\n- 读取日志文件\n- 读取文件元数据\n- 读取图像\n- 读取 PDF 文件\n- 读取\
    \ Word 文档\n- 扫描文档中的关键字\n\n我们将从访问目录树中的所有文件开始。\n\n## 爬取和搜索目录\n\n在这个食谱中，我们将学习如何递归扫描目录以获取其中包含的所有文件。这将包括子目录中的所有文件。匹配的文件可以是特定类型的，比如文本文件，或者每一个文件。\n\
    \n这通常是处理文件时的起始操作，用于检测所有现有的文件。\n\n## 准备工作\n\n让我们从创建一个包含一些文件信息的测试目录开始：\n\n```bash\n\
    $ mkdir dir\n$ touch dir/file1.txt\n$ touch dir/file2.txt\n$ mkdir dir/subdir\n\
    $ touch dir/subdir/file3.txt\n$ touch dir/subdir/file4.txt\n$ touch dir/subdir/file5.pdf\n\
    $ touch dir/file6.pdf\n```\n\n所有文件都将是空的；我们在这个食谱中仅使用它们来发现它们。请注意，有四个文件具有 `.txt`\
    \ 扩展名，两个文件具有 `.pdf` 扩展名。\n\n> 这些文件也可以在 GitHub 仓库中找到：\nhttps://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter04/documents/dir。\n\
    \n进入创建的 `dir` 目录\n\n```bash\n$ cd dir\n```\n\n## 如何做...\n\n1. 打印 `dir` 目录和子目录中的所有文件名：\n\
    \n```python\n>>> import os\n>>> for root, dirs, files in os.walk('.'):\n...  \
    \   for file in files:\n...         print(file)\n...\nfile1.txt\nfile2.txt\nfile6.pdf\n\
    file3.txt\nfile4.txt\nfile5.pdf\n```\n\n2. 打印文件的完整路径，与根目录连接：\n\n```python\n>>>\
    \ for root, dirs, files in os.walk('.'):\n...     for file in files:\n...    \
    \     full_file_path = os.path.join(root, file)\n...         print(full_file_path)\n\
    ...\n./dir/file1.txt\n./dir/file2.txt\n./dir/file6.pdf\n./dir/subdir/file3.txt\n\
    ./dir/subdir/file4.txt\n./dir/subdir/file5.pdf\n```\n\n3. 只打印 .pdf 文件：\n\n```python\n\
    >>> for root, dirs, files in os.walk('.'):\n...     for file in files:\n...  \
    \       if file.endswith('.pdf'):\n...             full_file_path = os.path.join(root,\
    \ file)\n...             print(full_file_path)\n...\n./dir/file6.pdf\n./dir/subdir/file5.pdf\n\
    ```\n\n4. 只打印包含偶数的文件：\n\n```python\n>>> import re\n>>> for root, dirs, files in\
    \ os.walk('.'):\n...     for file in files:\n...         if re.search(r'[13579]',\
    \ file):\n...             full_file_path = os.path.join(root, file)\n...     \
    \        print(full_file_path)\n...\n./dir/file1.txt\n./dir/subdir/file3.txt\n\
    ./dir/subdir/file5.pdf\n```\n\n## 工作原理...\n\n`os.walk()` 遍历整个目录及其下的所有子目录，返回所有文件。对于每个目录，它返回一个包含该目录、其下的任何子目录以及所有文件的元组：\n\
    \n```python\n>>> for root, dirs, files in os.walk('.'):\n...     print(root, dirs,\
    \ files)\n...\n. ['dir'] []\n./dir ['subdir'] ['file1.txt', 'file2.txt', 'file6.pdf']\n\
    ./dir/subdir [] ['file3.txt', 'file4.txt', 'file5.pdf']\n```\n\n`os.path.join()`\
    \ 函数允许我们连接两个路径，例如基础路径和文件。\n\n由于路径作为纯字符串返回，因此可以进行任何类型的过滤，如步骤 3 所示。在步骤 4 中，可以使用正则表达式的全部功能进行过滤。\n\
    \n在下一个食谱中，我们将处理文件的内容，而不仅仅是文件名。\n\n## 更多内容...\n\n在这个食谱中，返回的文件没有以任何方式打开或修改。此操作是只读的。文件可以按照以下食谱中的描述打开。\n\
    \n> 请注意，在遍历目录时更改其结构可能会影响结果。如果需要在遍历目录树时进行一些文件维护，比如复制或移动文件，最好将其存储在不同的目录中。"
