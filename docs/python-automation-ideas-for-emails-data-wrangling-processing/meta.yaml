    \ there's no result to check for the futures in this specific example.\n\nWe introduced\
    \ futures and executors in the *Speeding up web scraping* recipe in *Chapter 3,\
    \ Building Your First Web Scraping Application*. In that recipe, we used a thread-based\
    \ future.\n\nThe task to be executed wraps the aggregation of the file. Let's\
    \ take a look:\n\n```\nfrom aggregate_by_location import main as main_by_file\n\
    \ndef aggregate_filename(filename):\n    try:\n        print(f'Processing {filename}')\n\
    \        # Obtain the location\n        match = re.match(r'output_3_(.*).csv',\
    \ filename)\n        location = match.group(1)\n        output_file = f'aggregate_{location}.csv'\n\
    \n        with open(filename) as in_file, open(output_file, 'w') as out_file:\n\
    \            main_by_file(in_file, out_file)\n\n        print(f'Done with {filename}\
    \ => {output_file}', flush=True)\n    except Exception as exc:\n        print(f'Unexpected\
    \ exception {exc}')\n```\n\nAt the core of it, there's a call to `main_by_file`.\
    \ This method is imported directly from the *Aggregating results* recipe from\
    \ the previous section. It receives an input file and produces an output file.\
    \ These files are opened with read and write access using the `with` statement."
- md: "The names of the files are determined beforehand. The input file is a parameter\
    \ of the function, but the output file is obtained from it. It uses the regex\
    \ `output_3_(.*).csv` file to extract the location from the filename in a match\
    \ group:\n\n```\nmatch = re.match(r'output_3_(.*).csv', filename)\nlocation =\
    \ match.group(1)\noutput_file = f'aggregate_{location}.csv'\n```\n\nThe input\
    \ filename and the resulting output file are printed to provide feedback while\
    \ they are executing.\n\nWorking with regexes was described in more detail in\
    \ the *Introducing regular expressions* and *Going deeper with regular expressions*\
    \ recipes in *Chapter 1, Let's Begin Our Automation Journey*.\n\nThe resulting\
    \ file is the same as the one produced in the previous *Aggregating results* recipe,\
    \ but in this case, we process the files in parallel, up to four at the same time.\
    \ This speeds up the process significantly.\n\n## There's more...\n\nWorking with\
    \ parallel tasks has multiple advantages, but there are also some caveats that\
    \ need to be taken into account.\n\nExecuting multiple tasks may make exceptions\
    \ for stopping the execution of the whole script, as would happen with single-task\
    \ runs. In our example, the `aggregate_filename` function contains a `try/except`\
    \ block that will capture any possible issues and log the error. The rest of the\
    \ files will continue, but at least the error can be noticed and won't be silently\
    \ ignored.\n\n> This is actually part of the Zen of Python, available by calling\
    \ `import this`.\n\n*Errors should never pass silently.*\n\n*Unless explicitly\
    \ silenced.*\n\nThe script could also include an extra check to see whether a\
    \ particular file has already been created, after determining the output filename.\
    \ This can be checked with the `os.path.isfile` function:\n\n```\nimport os.path\n\
    ...\noutput_file = f'aggregate_{location}.csv'\nif os.path.isfile(output_file):\n\
    \    # File already exists, do not overwrite\n    return\n\nwith open(filename)\
    \ as in_file ...\n```\n\nWhen dealing with large numbers of files, to repeat the\
    \ execution of the script without starting from the beginning is a great advantage.\
    \ A common problem is to process a gigantic amount of data, to have an error when\
    \ processing is 80% complete, and then to restart the script from the beginning,\
    \ having to redo all the work.\n\nIf possible, invest a bit of time in saving\
    \ partial results to disk or other storage places, so they can be skipped over,\
    \ thereby speeding up the processing.\n\n> Keep the working dataset small for\
    \ the purpose of development. It will allow you to iterate quickly and limits\
    \ distractions. Also, store already processed data on disk.\n\nOne of the `print`\
    \ statements to produce feedback adds the `flush` parameter:\n\n```\nprint(f'Done\
    \ with {filename} => {output_file}', flush=True)\n```\n\nThe `flush` parameter\
    \ will use the `print` statement to display the message immediately. If `flush`\
    \ is not set, or if it's set to `False`, the message won't be printed instantly\
    \ on screen, but goes to an intermediate buffer. The buffer will be printed when\
    \ the operating system decides to do it, usually after a newline.\n\nThis may\
    \ cause a small delay. That delay can be noticeable in certain cases, such as\
    \ in the last task executed. In that case, the print buffer might hold information,\
    \ but the program exits before the information is printed. In a single-task program,\
    \ before exiting, the buffer is printed, but that's not guaranteed in multitask\
    \ applications.\n\nThe parallel nature of the multitask application may also mean\
    \ that the order of the files being processed is not consistent from one run to\
    \ the next. To avoid problems, each of the tasks should be independent of each\
    \ other to avoid introducing dependencies.\n\nTo learn more about `futures` and\
    \ `executors`, check the Python documentation at https://docs.python.org/3/library/concurrent.futures.html.\n\
    \n## See also\n\n- The *Aggregating Results* recipe from the previous section.\n\
