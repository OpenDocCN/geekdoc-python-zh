    2. Open the file and print any line containing the string `should`:


    ```

    >>> with open(''zen_of_python.txt'', ''r'') as file:

    ...     for line in file:

    ...         if ''should'' in line.lower():

    ...             print(line)

    ...

    Errors should never pass silently.


    There should be one-- and preferably only one --obvious way to do it.

    ```


    3. Open the file and print the first line containing the word `better`:


    ```

    >>> with open(''zen_of_python.txt'', ''rt'') as file:

    ...     for line in file:

    ...         if ''better'' in line.lower():

    ...             print(line)

    ...             break

    ...

    Beautiful is better than ugly.

    ```


    # How it works...


    To open a file, use the `open()` function. This returns a `file` object that then
    can be iterated over to return it line by line, as shown in *step 1* of the *How
    to do it...* section. Note it opens the file in text mode.


    The `with` context manager is a very convenient way of dealing with files. It
    will close the file after finishing its use (leaving the block). It will do so
    even if an exception has been raised.


    *Step 2* shows how to iterate and filter the lines based on what lines are applicable
    for our tasks. The lines are returned as strings that can be filtered in multiple
    ways, as described in the recipes in *Chapter 1, Let''s Begin Our Automation Journey*
    and *Chapter 3, Building Your First Web Scraping Application*.


    Reading the whole file may not be required, as shown in *step 3*. Because iterating
    through the file line by line will be reading the file as you go, you can stop
    at any time, avoiding reading the rest of the file. For a small file such as our
    example, that''s not very relevant, but for long files, this can reduce memory
    use and time.'
  - '[PAGE 119]


    Searching and Reading Local Files


    # There''s more...


    The `with` context manager is the preferred way of dealing with files, but it''s
    not the only one. You may also open and close them manually, like this:


    ```

    >>> file = open(''zen_of_python.txt'')

    >>> content = file.read()

    >>> file.close()

    ```


    Note the `.close()` method, to ensure that the file is closed and to free resources
    related to opening a file. The `.read()` method reads the whole file in one go,
    instead of line by line.


    > The `.read()` method also accepts a size parameter in bytes that limits the
    size of the data read. For example, `file.read(1024)` will return up to 1KB of
    information. The next call to `.read()` will continue from that point.


    Files are opened in a particular mode. Modes define a combination of read/write,
    as well as whether to treat the data as text or binary data. By default, files
    are opened in read-only and text mode, which are described as "r" (step 2) or
    "rt" (step 3).


    More modes will be explored in other recipes.


    # See also


    +   - The *Crawling and searching directories* recipe, earlier in this chapter,
    to find files that will be read later.

    - The *Dealing with encodings* recipe, later in this chapter, to learn how to
    deal with files encoded in a non-standard way.


    # Dealing with encodings


    Text files can be present in different encodings. In recent years, the situation
    has greatly improved, as there are a few encodings that are pretty standard, but
    there are still compatibility problems when working with different systems.'
