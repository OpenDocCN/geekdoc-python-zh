    # Structuring a PDF


    Some elements can be automatically generated when creating a PDF to add a better
    look and structure to your elements. In this recipe, we''ll see how to add a header
    and footer, and how to create links to other parts of the document.'
- md: "## Getting ready\n\nWe'll use the fpdf module to create PDF documents:\n\n\
    ```\n$ echo \"fpdf==1.7.2\" >> requirements.txt\n$ pip install -r requirements.txt\n\
    ```\n\n## How to do it...\n\nThe `structuring_pdf.py` script is available in GitHub\
    \ here: https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter05/structuring_pdf.py.\
    \ The most relevant bits are displayed here:\n\n```python\nimport fpdf\nfrom random\
    \ import randint\n\nclass StructuredPDF(fpdf.FPDF):\n    LINE_HEIGHT = 5\n\n \
    \   def footer(self):\n        self.set_y(-15)\n        self.set_font('Times',\
    \ 'I', 8)\n        page_number = 'Page {number}/{nb}'.format(number=self.page_no())\n\
    \        self.cell(0, self.LINE_HEIGHT, page_number, 0, 0, 'R')\n\n    def chapter(self,\
    \ title, paragraphs):\n        self.add_page()\n        link = self.title_text(title)\n\
    \        page = self.page_no()\n        for paragraph in paragraphs:\n       \
    \     self.multi_cell(0, self.LINE_HEIGHT, paragraph)\n            self.ln()\n\
    \n        return link, page\n\n    def title_text(self, title):\n        self.set_font('Times',\
    \ 'B', 15)\n        self.cell(0, self.LINE_HEIGHT, title)\n        self.set_font('Times',\
    \ '', 12)\n        self.line(10, 17, 110, 17)\n        link = self.add_link()\n\
    \        self.set_link(link)\n        self.ln()\n        self.ln()\n\n       \
    \ return link\n\n    def get_full_line(self, head, tail, fill):\n        ...\n\
    \n    def toc(self, links):\n        self.add_page()\n        self.title_text('Table\
    \ of contents')\n        self.set_font('Times', 'I', 12)\n\n        for title,\
    \ page, link in links:\n            line = self.get_full_line(title, page, '.')\n\
    \            self.cell(0, self.LINE_HEIGHT, line, link=link)\n            self.ln()\n\
    \nLOREM_IPSUM = ...\n\ndef main():\n    document = StructuredPDF()\n    document.alias_nb_pages()\n\
    \    links = []\n    num_chapters = randint(5, 40)\n    for index in range(1,\
    \ num_chapters):\n        chapter_title = 'Chapter {}'.format(index)\n       \
    \ num_paragraphs = randint(10, 15)\n        link, page = document.chapter(chapter_title,\n\
    \                                      [LOREM_IPSUM] * num_paragraphs)\n     \
    \   links.append((chapter_title, page, link))\n\n    document.toc(links)\n   \
    \ document.output('report.pdf')\n```\n\n1. Run the script. It will generate the\
    \ `report.pdf` file, which contains some chapters and a table of contents. Note\
    \ that the specific content it generates is somehow random, so the specific numbers\
    \ will vary each time you run it:\n\n```\n$ python3 structuring_pdf.py\n```\n\n\
    Check the result. Here is a sample:\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_184_0.png)\n\
    \nCheck the table of contents at the end:\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_185_0.png)\n\
    \n## How it works...\n\nLet's take a look at each of the elements of the script.\n\
    \n`StructuredPDF` defines a class that inherits from `FPDF`. This is useful to\
    \ overwrite the `footer` method, which creates a footer for each of the pages\
    \ at generation time. It also helps simplify the code in `main`.\n\nThe `main`\
    \ function creates the document. It starts the document and adds each of the chapters,\
    \ collecting their link information. Finally, it calls the `toc` method to generate\
    \ a table of contents using the link information.\n\n> The text to be stored is\
    \ generated by multiplying the `LOREM_IPSUM` text, which is a placeholder.\n\n\
    The `chapter` method first prints a title section, and then adds each of the paragraphs.\
    \ It collects the page number the chapter starts on and the link returned by the\
    \ `title_text` method to return them.\n\nThe `title_text` method writes the text\
    \ in bigger and bolder text. Then, it adds a line to separate the title from the\
    \ body of the chapter. It generates and sets a `link` object pointing to the current\
    \ page in the following lines:\n\n```python\nlink = self.add_link()\nself.set_link(link)\n\
    ```\n\nThis link will be used in the table of contents to add a clickable element\
    \ that points to this chapter.\n\nThe `footer` method automatically adds a footer\
    \ to each page. It sets a smaller font, and it adds text with the current page\
    \ (obtained through `page_no`) and uses `{nb}`, which will be replaced with the\
    \ total number of pages.\n\n> The call to `.alias_nb_pages()` in main ensures\
    \ `{nb}` is replaced when the document is generated.\n\nFinally, the table of\
    \ contents is generated in the `toc` method. It writes the title and adds all\
    \ the referenced links that have been collected as the link, page, and chapter\
    \ name, which is all the info required.\n\n## There's more...\n\nNotice the use\
    \ of `randint` to add a bit of randomness to the document. This call, available\
    \ in Python's standard library, returns a random number between the defined maximum\
    \ and minimum. Both are included.\n\nThe `get_full_line` method generates a properly\
    \ sized line for the table of contents. It takes a start (the name of the chapter)\
    \ and end (the page number), and adds the number of fill characters (dots) until\
    \ the line has the proper width (120 mm).\n\nTo calculate the size of the text,\
    \ the script calls `get_string_width`, which takes into account the font and the\
    \ size.\n\nLink objects can be used to point to a specific page, instead of the\
    \ current one, and also not to the start of the page. To tweak the call, use `set_link(link,\
    \ y=place, page=num_page)`. Check the documentation at http://pyfpdf.readthedocs.io/en/latest/reference/set_link/index.html.\n\
    \n> Adjusting some of the elements can take a certain degree of trial and error;\
    \ for example, to position the line. A slightly longer or shorter line can be\
    \ a matter of taste. Don't be afraid to experiment and check until it produces\
    \ the desired effect.\n\nThe full FPDF documentation can be found here: http://pyfpdf.readthedocs.io/en/latest/index.html.\n\
    \n## See also\n\n- The *Writing a simple PDF document* recipe, earlier in this\
    \ chapter, to learn the basics of how to work with PDF documents.\n- The *Aggregating\
    \ PDF reports* recipe, later in this chapter, to learn how to merge multiple documents\
    \ into a single one.\n- The *Watermarking and encrypting a PDF* recipe, later\
    \ in this chapter, to learn how to add security measures to the document.\n\n\
    ## Aggregating PDF reports\n\nIn this recipe, we'll see how to combine two PDFs\
    \ into one. We will add the pages of one report at the end of the other.\n\n##\
    \ Getting ready\n\nWe'll use the PyPDF2 module. Pillow and pdf2image are also\
    \ dependencies used by the scripts:\n\n```\n$ echo \"PyPDF2==1.26.0\" >> requirements.txt\n\
    $ echo \"pdf2image==1.11.0\" >> requirements.txt\n$ echo \"Pillow==7.0.0\" >>\
    \ requirements.txt\n$ pip install -r requirements.txt\n```\n\nFor pdf2image to\
    \ properly work, it needs to install pdftoppm, so check here for instructions\
    \ on how to install it for different platforms: https://github.com/Belval/pdf2image#first-you-need-pdftoppm.\n\
    \nWe need two PDFs to combine them. For this recipe, we'll use two PDFs: a `report.pdf`\
    \ file generated by the `structuring_pdf.py` script, available on GitHub: https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter05/structuring_pdf.py,\
    \ and another (`report2.pdf`) after watermarking it through the following command:\n\
    \n```\n$ python watermarking_pdf.py report.pdf -u automate_user -o report2.pdf\n\
    ```\n\nThis uses the watermarking script, `watermarking_pdf.py`, described in\
    \ the *Watermarking and encrypting a PDF* recipe, which is available on GitHub:\
    \ https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter05/watermarking_pdf.py.\n\
    \n## How to do it...\n\n1. Import PyPDF2 and create the output PDF:\n    ```python\n\
    \    import PyPDF2\n    output_pdf = PyPDF2.PdfFileWriter()\n    ```\n2. Read\
    \ the first file and create a reader:\n    ```python\n    file1 = open('report.pdf',\
    \ 'rb')\n    pdf1 = PyPDF2.PdfFileReader(file1)\n    ```\n3. Append all pages\
    \ to the output PDF:\n    ```python\n    output_pdf.appendPagesFromReader(pdf1)\n\
    \    ```\n4. Open the second file, create a reader, and append the pages to the\
    \ output PDF:\n    ```python\n    file2 = open('report2.pdf', 'rb')\n    pdf2\
    \ = PyPDF2.PdfFileReader(file2)\n    output_pdf.appendPagesFromReader(pdf2)\n\
    \    ```\n5. Create the output file and save it:\n    ```python\n    with open('result.pdf',\
    \ 'wb') as out_file:\n        output_pdf.write(out_file)\n    ```\n6. Close both\
    \ source files:\n    ```python\n    file1.close()\n    file2.close()\n    ```\n\
    7. Check the output file and confirm that it contains both PDF pages.\n\n## How\
    \ it works...\n\nPyPDF2 allows us to create a reader for each source file and\
    \ add all its pages to a newly created PDF writer. Note that the files are opened\
    \ in binary mode (`rb`)."
