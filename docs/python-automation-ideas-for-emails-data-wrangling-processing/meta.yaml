    \    target_language='en')\nprint('IN ENGLISH')\nprint(response['translatedText'])\n\
    ```\n\nThe resulting translated text gets printed.\n\n> Google Translate sometimes\
    \ gets a bit of bad press in terms of getting strange translations sometimes,\
    \ but it's still capable of getting pretty good results most of the time, with\
