- md: "## Fun with Spreadsheets\n\nSpreadsheets are one of the most versatile and\
    \ omnipresent tools in the world of computing. Their intuitive approach of sheets\
    \ and cells is used by virtually everyone that uses a computer as part of their\
    \ day-to-day operations. But they allow you to apply complex operations, including\
    \ the use of macro languages. There's even a running joke that whole complex businesses\
    \ are managed and described within a single spreadsheet, somewhere. They are incredibly\
    \ powerful tools.\n\nThis makes the ability to automate reading from and writing\
    \ to spreadsheets so interesting. We'll see in this chapter how to process spreadsheets,\
    \ mainly in the most common format, Excel. The final recipe will cover a free\
    \ alternative, LibreOffice, and in particular, how to use Python as a scripting\
    \ language inside it.\n\n> Python presents advantages over using specific tools\
    \ included in spreadsheet suites. First, it is more versatile than custom tools\
    \ like VBA, which only work on a single suite of applications. You can also take\
    \ advantage of its vast available library to perform operations, both in terms\
    \ of capacity (for example, using a statistical library or a specialized mathematical\
    \ library) and in terms of performance. Also, in Python, the code is readable\
    \ and easy to understand compared to other alternatives. In *Chapter 7, Cleaning\
    \ and Processing Data*, we'll go through some techniques that can help you increase\
    \ the productivity of dealing with spreadsheet files and processes.\n\nIn this\
    \ chapter, we will cover the following recipes:\n\n- Writing a CSV spreadsheet\n\
    - Updating CSV files\n- Reading an Excel spreadsheet\n- Updating an Excel spreadsheet\n\
    - Creating new sheets in an Excel spreadsheet\n- Creating charts in Excel\n- Working\
    \ with cell formats in Excel\n- Creating a macro in LibreOffice\n\nLet's start\
    \ by taking a look at CSV files.\n\n## Writing a CSV spreadsheet\n\nCSV files\
    \ are simple spreadsheets in a highly compatible format. They are text files with\
    \ tabular data, separated by commas (hence the name Comma-Separated Values), in\
    \ a simple table format. CSV files can be created using Python's standard library\
    \ and can be read by all kinds of spreadsheet software.\n\n### Getting ready\n\
    \nFor this recipe, only the standard library of Python is required. Everything\
    \ is ready out of the box!\n\n### How to do it...\n\n1. Import the csv module:\n\
    \   ```python\n   >>> import csv\n   ```\n\n2. Define the header with how the\
    \ data will be ordered and the data to store:\n   ```python\n   >>> HEADER = ('Admissions',\
    \ 'Name', 'Year')\n   >>> DATA = [\n   ... (225.7, 'Gone With the Wind', 1939),\n\
    \   ... (194.4, 'Star Wars', 1977),\n   ... (161.0, 'ET: The Extra-Terrestrial',\
    \ 1982)\n   ... ]\n   ```\n\n3. Write the data into a CSV file:\n   ```python\n\
    \   >>> with open('movies.csv', 'w', newline='') as csvfile:\n   ...     movies\
    \ = csv.writer(csvfile)\n   ...     movies.writerow(HEADER)\n   ...     for row\
    \ in DATA:\n   ...         movies.writerow(row)\n   ```\n\n4. Check the resulting\
    \ CSV file in a spreadsheet. In the following screenshot, the file is displayed\
    \ using the LibreOffice software:\n\n   ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_198_0.png)\n\
    \n### How it works...\n\nAfter the preparation work in *steps 1* and *2* in the\
    \ *How to do it...* section, *step 3* is the part that saves the `movies.csv`\
    \ file.\n\nIt opens a new file, `movies.csv`, in write (`w`) mode. The file handle\
    \ object in `csvfile` references the file, which the `csv.writer()` function uses\
    \ to create the CSV file. All this happens in a `with` block, so it closes the\
    \ file when the block is complete.\n\n> Note the `newline=''` parameter. This\
    \ is done to make the `writer` be in control of the `newline` format and avoid\
    \ incompatibility issues, such as adding a newline twice. This won't normally\
    \ be a problem, but sometimes the CSV format may require the newline to be a specific\
    \ character, different from the default one. This can happen, for example, if\
    \ working with a file to be used on a different operating system. It's better\
    \ to handle it explicitly in the CSV configuration.\n\nThe writer writes the elements\
    \ row by row using the `.writerow()` method. The first row is the HEADER, and\
    \ the remaining rows are the lines of data.\n\n### There's more...\n\nThe code\
    \ presented stores the data in the default CSV dialect. The CSV dialect defines\
    \ what character divides the data on each row (commas or other characters), how\
    \ to escape characters, newline characters (also known as line terminators) defining\
    \ a new entry, and so on.\n\n> Escape is the process of storing characters that\
    \ could be interpreted as part of the syntax; for example, storing a column with\
    \ a text that includes a comma or a quote. The dialect will determine how to store\
    \ it in that case, normally by adding a special character, for example, `\\,`\
    \ for a verbatim comma.\n\nIn case the dialect needs to be tweaked, each of these\
    \ parameters can be defined in the writer call. Refer to the following link for\
    \ a list of all the parameters that can be defined: https://docs.python.org/3/library/csv.html#dialects-and-formatting-parameters.\n\
    \n> CSV files are better when simple. If the data to be stored is complicated,\
    \ maybe the best alternative is not a CSV file. But CSV files are extremely useful\
    \ when dealing with tabular data. They can be understood by virtually all programs,\
    \ and even dealing with them at a low level is easy.\n\nThe full csv module documentation\
    \ can be found here: https://docs.python.org/3/library/csv.html.\n\n### See also\n\
    \n- The Reading CSV files recipe in Chapter 4, Searching and Reading Local Files.\n\
    - The Updating CSV files recipe in the following section.\n\n## Updating CSV files\n\
    \nGiven that CSV files are simple text files, the best solution to update their\
    \ content is to read them, process them into internal Python objects, make the\
    \ changes, and then overwrite the result back in the same format. In this recipe,\
    \ we will see how to do this.\n\n### Getting ready\n\nIn this recipe, we will\
    \ use the `movies.csv` file that is available on GitHub at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter06/movies.csv.\
    \ It contains the following data:\n\n| Admissions | Name | Year |\n|---|---|---|\n\
    | 225.7 | Gone With the Wind | 1939 |\n| 194.4 | Star Wars | 1968 |\n| 161.0 |\
    \ ET: The Extra-Terrestrial | 1982 |\n\nFigure 6.2: Movie data\n\nNotice that\
    \ the `Year` of `Star Wars` is incorrect (the movie was released in 1977). We'll\
    \ change it in this recipe.\n\n### How to do it...\n\n1. Import the `csv` module\
    \ and define the filename:\n   ```python\n   >>> import csv\n   >>> FILENAME =\
    \ 'movies.csv'\n   ```\n\n2. Read the content of the file using `DictReader` and\
    \ transform this content into a list of ordered rows:\n   ```python\n   >>> with\
    \ open(FILENAME, newline='') as file:\n   ...     data = [row for row in csv.DictReader(file)]\n\
    \   ```\n\n3. Check the obtained data. Change the proper value from 1968 to 1977:\n\
    \   ```python\n   >>> data\n   [{'Admissions': '225.7', 'Name': 'Gone With the\
    \ Wind', 'Year': '1939'}, {'Admissions': '194.4', 'Name': 'Star Wars', 'Year':\
    \ '1968'}, {'Admissions': '161.0', 'Name': 'ET: The Extra-Terrestrial', 'Year':\
    \ '1982'}]\n   >>> data[1]['Year']\n   '1968'\n   >>> data[1]['Year'] = '1977'\n\
    \   ```\n\n4. Open the file again and store the values:\n   ```python\n   >>>\
    \ HEADER = data[0].keys()\n   >>> with open(FILENAME, 'w', newline='') as file:\n\
    \   ...     writer = csv.DictWriter(file, fieldnames=HEADER)\n   ...     writer.writeheader()\n\
    \   ...     writer.writerows(data)\n   ```\n\n5. Check the result in spreadsheet\
    \ software. The result is similar to that displayed in *step 4* of the *Writing\
    \ a CSV spreadsheet* recipe.\n\n### How it works...\n\nAfter importing the `csv`\
    \ module in *step 2* of the *How to do it...* section, we extract all the data\
    \ from the file. The file is opened in a `with` block. `DictReader` conveniently\
    \ transforms it into a list of dictionaries, with the headers as keys and the\
    \ content of the cell as the values.\n\nThe conveniently formatted data can then\
    \ be manipulated and modified. We changed the data to fix the `Year` problem in\
    \ *step 3*.\n\n> In this recipe, we change the value by directly accessing a row\
    \ number, but searching the specific row or rows to change may be required in\
    \ a more general case.\n\n*Step 4* overwrites the file and, using `DictWriter`,\
    \ stores the data. `DictWriter` requires us to define the fields on the columns\
    \ by requiring the `fieldnames`. To obtain them, we retrieve the keys of one of\
    \ the rows and store them in `HEADER`.\n\nThe file is opened again in `w` mode\
    \ to overwrite it. `DictWriter` first stores the header with `.writeheader` and\
    \ then stores all the rows with a single call to `.writerows()`.\n\n> The rows\
    \ can also be added one by one by calling the `.writerow()` method.\n\nAfter closing\
    \ the `with` block, the file is stored and can be checked to verify it is correct.\n\
    \n### There's more...\n\nFor familiar data sources, the dialect of the CSV file\
    \ is typically known, but this may not always be the case, especially if the file\
    \ comes from an unknown source. In that case, the `Sniffer` class can help. It\
    \ analyzes a sample of the file (or the whole file) and returns a guessed `dialect`\
    \ object:\n\n```python\n>>> with open(FILENAME, newline='') as file:\n...    \
    \ dialect = csv.Sniffer().sniff(file.read())\n```"
  mdcn: "## 电子表格的乐趣\n\n电子表格是计算领域中最通用且无处不在的工具之一。其直观的表格和单元格方式，被几乎所有使用计算机进行日常操作的人所采用。但它们允许你应用复杂操作，包括使用宏语言。甚至有个流传的笑话说，某个地方的整个复杂业务都由单个电子表格管理和描述。它们是功能极其强大的工具。\n\
    \n这使得自动化读取和写入电子表格的能力变得如此有趣。我们将在本章中了解如何处理电子表格，主要是最常见的格式——Excel。最后一个食谱将涵盖一个免费替代方案——LibreOffice，特别是如何在其中使用Python作为脚本语言。\n\
    \n> Python相比使用电子表格套件中包含的特定工具具有优势。首先，它比像VBA这样的自定义工具更通用，后者仅适用于单个应用程序套件。你还可以利用其庞大的可用库来执行操作，无论是在能力方面（例如，使用统计库或专门的数学库）还是在性能方面。此外，在Python中，代码可读且易于理解，与其他替代方案相比。在*第7章，清理和处理数据*中，我们将介绍一些可以帮助你提高处理电子表格文件和流程生产力的技术。\n\
    \n在本章中，我们将涵盖以下食谱：\n\n- 编写CSV电子表格\n- 更新CSV文件\n- 读取Excel电子表格\n- 更新Excel电子表格\n- 在Excel电子表格中创建新工作表\n\
    - 在Excel中创建图表\n- 处理Excel中的单元格格式\n- 在LibreOffice中创建宏\n\n让我们首先看看CSV文件。\n\n## 编写CSV电子表格\n\
    \nCSV文件是高度兼容格式的简单电子表格。它们是包含表格数据的文本文件，以逗号分隔（因此得名逗号分隔值），采用简单的表格格式。CSV文件可以使用Python的标准库创建，并且可以被各种电子表格软件读取。\n\
    \n### 准备工作\n\n对于这个食谱，只需要Python的标准库。一切开箱即用！\n\n### 如何操作...\n\n1. 导入csv模块：\n   ```python\n\
    \   >>> import csv\n   ```\n\n2. 定义数据将如何排序以及要存储的数据的表头：\n   ```python\n   >>> HEADER\
    \ = ('Admissions', 'Name', 'Year')\n   >>> DATA = [\n   ... (225.7, 'Gone With\
    \ the Wind', 1939),\n   ... (194.4, 'Star Wars', 1977),\n   ... (161.0, 'ET: The\
    \ Extra-Terrestrial', 1982)\n   ... ]\n   ```\n\n3. 将数据写入CSV文件：\n   ```python\n\
    \   >>> with open('movies.csv', 'w', newline='') as csvfile:\n   ...     movies\
    \ = csv.writer(csvfile)\n   ...     movies.writerow(HEADER)\n   ...     for row\
    \ in DATA:\n   ...         movies.writerow(row)\n   ```\n\n4. 在电子表格软件中检查生成的CSV文件。在下面的截图中，该文件使用LibreOffice软件显示：\n\
    \n   ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_198_0.png)\n\n### 工作原理...\n\n在*如何操作...*部分的*步骤1*和*2*准备工作之后，*步骤3*是保存`movies.csv`文件的部分。\n\
    \n它以写入（`w`）模式打开一个新文件`movies.csv`。`csvfile`中的文件句柄对象引用该文件，`csv.writer()`函数使用它来创建CSV文件。所有这些都发生在`with`块中，因此当块完成时，它会关闭文件。\n\
    \n> 注意`newline=''`参数。这样做是为了让`writer`控制`newline`格式，避免不兼容问题，例如添加两次换行符。这通常不是问题，但有时CSV格式可能要求换行符是特定字符，与默认字符不同。例如，如果处理要在不同操作系统上使用的文件，就可能发生这种情况。最好在CSV配置中显式处理它。\n\
    \n写入器使用`.writerow()`方法逐行写入元素。第一行是表头，其余行是数据行。\n\n### 更多内容...\n\n提供的代码以默认CSV方言存储数据。CSV方言定义了每行数据的分隔符（逗号或其他字符）、如何转义字符、定义新条目的换行符（也称为行终止符）等。\n\
    \n> 转义是存储可能被解释为语法一部分的字符的过程；例如，存储包含逗号或引号的文本列。在这种情况下，方言将决定如何存储它，通常是通过添加特殊字符，例如，`\\\
    ,`表示字面逗号。\n\n如果需要调整方言，可以在写入器调用中定义每个参数。有关所有可定义参数的列表，请参考以下链接：https://docs.python.org/3/library/csv.html#dialects-and-formatting-parameters。\n\
    \n> CSV文件越简单越好。如果要存储的数据很复杂，也许最好的替代方案不是CSV文件。但CSV文件在处理表格数据时非常有用。它们几乎可以被所有程序理解，即使在底层处理它们也很容易。\n\
    \n完整的csv模块文档可以在这里找到：https://docs.python.org/3/library/csv.html。\n\n### 另请参阅\n\n\
    - 第4章，搜索和读取本地文件中的读取CSV文件食谱。\n- 下一节中的更新CSV文件食谱。\n\n## 更新CSV文件\n\n鉴于CSV文件是简单的文本文件，更新其内容的最佳解决方案是读取它们，将它们处理成内部Python对象，进行更改，然后以相同格式将结果覆盖回去。在这个食谱中，我们将看到如何做到这一点。\n\
    \n### 准备工作\n\n在这个食谱中，我们将使用GitHub上提供的`movies.csv`文件，地址为https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter06/movies.csv。它包含以下数据：\n\
    \n| Admissions | Name | Year |\n|---|---|---|\n| 225.7 | Gone With the Wind |\
    \ 1939 |\n| 194.4 | Star Wars | 1968 |\n| 161.0 | ET: The Extra-Terrestrial |\
    \ 1982 |\n\n图6.2：电影数据\n\n注意`Star Wars`的`Year`不正确（该电影于1977年上映）。我们将在本食谱中更改它。\n\n\
    ### 如何操作...\n\n1. 导入`csv`模块并定义文件名：\n   ```python\n   >>> import csv\n   >>> FILENAME\
    \ = 'movies.csv'\n   ```\n\n2. 使用`DictReader`读取文件内容，并将此内容转换为有序行列表：\n   ```python\n\
    \   >>> with open(FILENAME, newline='') as file:\n   ...     data = [row for row\
    \ in csv.DictReader(file)]\n   ```\n\n3. 检查获得的数据。将适当的值从1968更改为1977：\n   ```python\n\
    \   >>> data\n   [{'Admissions': '225.7', 'Name': 'Gone With the Wind', 'Year':\
    \ '1939'}, {'Admissions': '194.4', 'Name': 'Star Wars', 'Year': '1968'}, {'Admissions':\
    \ '161.0', 'Name': 'ET: The Extra-Terrestrial', 'Year': '1982'}]\n   >>> data[1]['Year']\n\
    \   '1968'\n   >>> data[1]['Year'] = '1977'\n   ```\n\n4. 再次打开文件并存储值：\n   ```python\n\
    \   >>> HEADER = data[0].keys()\n   >>> with open(FILENAME, 'w', newline='') as\
    \ file:\n   ...     writer = csv.DictWriter(file, fieldnames=HEADER)\n   ... \
    \    writer.writeheader()\n   ...     writer.writerows(data)\n   ```\n\n5. 在电子表格软件中检查结果。结果类似于*编写CSV电子表格*食谱的*步骤4*中显示的结果。\n\
    \n### 工作原理...\n\n在*如何操作...*部分的*步骤2*中导入`csv`模块后，我们从文件中提取所有数据。文件在`with`块中打开。`DictReader`方便地将其转换为字典列表，表头作为键，单元格内容作为值。\n\
    \n然后可以操作和修改格式方便的数据。我们在*步骤3*中更改了数据以修复`Year`问题。\n\n> 在这个食谱中，我们通过直接访问行号来更改值，但在更一般的情况下，可能需要搜索要更改的特定行或多行。\n\
    \n*步骤4*覆盖文件，并使用`DictWriter`存储数据。`DictWriter`要求我们通过要求`fieldnames`来定义列上的字段。为了获取它们，我们检索其中一行的键并将其存储在`HEADER`中。\n\
    \n文件再次以`w`模式打开以覆盖它。`DictWriter`首先使用`.writeheader`存储表头，然后使用单个调用`.writerows()`存储所有行。\n\
    \n> 行也可以通过调用`.writerow()`方法逐个添加。\n\n关闭`with`块后，文件已存储，可以检查以验证其正确性。\n\n### 更多内容...\n\
    \n对于熟悉的数据源，CSV文件的方言通常是已知的，但情况并非总是如此，特别是当文件来自未知来源时。在这种情况下，`Sniffer`类可以提供帮助。它分析文件的样本（或整个文件）并返回一个猜测的`dialect`对象：\n\
    \n```python\n>>> with open(FILENAME, newline='') as file:\n...     dialect = csv.Sniffer().sniff(file.read())\n\
    ```"
