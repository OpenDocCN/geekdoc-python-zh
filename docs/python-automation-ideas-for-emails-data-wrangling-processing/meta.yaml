    # Developing Stunning Graphs


    Bar graphs don''t need to display information in a temporal way. As we''ve seen,
    `matplotlib` requires us to specify the X parameter of each bar. It''s a powerful
    tool used to generate all kinds of graphs.


    > For example, the bars can be arranged to display a histogram, such as for displaying
    people of a certain height. The bars will start at a low height, increase to the
    average size, and then drop back. Don''t limit yourself to just spreadsheet charts!


    The full `matplotlib` documentation can be found here: https://matplotlib.org/.


    # See also


    +   - The *Drawing stacked bars* recipe, next in this chapter, to learn how to
    plot more accumulated information on each bar.

    - The *Adding legends and annotations* recipe, later in this chapter, to learn
    how to add context information to a graph.

    - The *Combining graphs* recipe, later in this chapter, to learn how to combine
    multiple plots into a single graph.


    # Drawing stacked bars


    A powerful way of displaying different categories is to present them as stacked
    bars so that each of the categories and the total are displayed. We''ll see how
    to do that in this recipe.


    # Getting ready


    We need to install `matplotlib` in our virtual environment:


    ```

    $ echo "matplotlib==3.2.1" >> requirements.txt

    $ pip install -r requirements.txt

    ```


    If you are using macOS, you may get an error like this: **RuntimeError: Python
    is not installed as a framework**. See the `matplotlib` documentation on how to
    fix it: https://matplotlib.org/faq/osx_framework.html.'
