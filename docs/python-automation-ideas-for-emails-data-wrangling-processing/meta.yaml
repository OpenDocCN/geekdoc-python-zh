    \   11\n   >>> sheet.max_column\n   4\n   >>> sheet['A12'].value\n   >>> sheet['E1'].value\n\
    \   ```\n\n## How it works...\n\nAfter importing the module in step 1, step 2\
    \ in the *How to do it...* section loads the file into memory in a Workbook object.\
    \ Each workbook can contain one or more sheets, each of them containing cells.\n\
    \nTo determine the available sheets, in step 3, we obtain all the sheet names\
