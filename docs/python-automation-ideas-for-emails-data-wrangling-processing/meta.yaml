    \n## 8 开发令人惊叹的图表\n\n图表和图像是以简单易懂的方式呈现复杂数据的绝佳方式。在本章中，我们将利用强大的 matplotlib 库来学习如何创建各种图表。matplotlib\
    \ 是一个旨在以多种方式显示数据的库，它可以创建令人惊叹的图表，帮助以最佳方式传输和显示信息。\n\n> matplotlib 众所周知，并且与 Python\
    \ 生态系统中的其他工具配合良好。例如，matplotlib 图表也可以由 Jupyter Notebooks 自动显示，如第 7 章，清理与处理数据中所介绍。\n\
