- md: "## Cleaning and Processing Data\n\n## How it works...\n\nLet's take a look\
    \ at the `aggregate_by_location_pandas.py` script, used in *step 6*.\n\n> This\
    \ recipe is equivalent to the *Aggregating results* recipe in this same chapter.\n\
    \nThe final part of the script file deals with the parsing of arguments, which\
    \ was described in detail in *Chapter 2, Automating Tasks Made Easy*.\n\nIn Pandas,\
    \ the basic data model is called a `DataFrame`, which, in essence, is a representation\
    \ of a table with rows and columns. Most of the operations are related to mutating\
    \ the `DataFrame`.\n\nThe main function reads the input CSV and calls the `calculate_results`\
    \ function to generate the aggregated reports. The usage of `DictReader` was already\
    \ described in the *Updating CSV spreadsheets* recipe in *Chapter 6, Fun with\
    \ Spreadsheets*. `Calculate_results` returns a `DataFrame`:\n\n```python\ndef\
    \ main(input_file, output_file):\n    reader = csv.DictReader(input_file)\n  \
    \  result = calculate_results(reader)\n\n    # Save into csv format\n    output_file.write(result.to_csv())\n\
    ```\n\nThe write operation to the output file uses the `.to_csv()` function that's\
    \ available in Pandas for a `DataFrame`. This generates a text result that's equivalent\
    \ to the CSV format. The data is written using the low-level `output.write()`\
    \ call.\n\nIn the `calculate_results` function, the aggregation takes place. The\
    \ aggregation takes places in three phases. First, the data is imported into a\
    \ `DataFrame`, then the values are aggregated. Finally, the data is rounded to\
    \ two decimal positions for compatibility. Let's take a look at the code:\n\n\
    ```python\ndef pandas_format(row):\n    row['DATE'] = pd.to_datetime(row['STD_TIMESTAMP'])\n\
    \    row['USD'] = pd.to_numeric(row['USD'])\n\n    return row\n```\n\n```python\n\
    def calculate_results(reader):\n    # Load the data, formatting\n    data = pd.DataFrame(pandas_format(r)\
    \ for r in reader)\n\n    by_usd = data.groupby(data['DATE'].dt.date)['USD']\n\
    \    result = by_usd.agg(['sum', 'count', 'mean'])\n\n    # Round to 2 digital\
    \ places\n    result = result.round(2)\n\n    # Rename columns\n    result = result.rename(columns={\n\
    \        'sum': 'TOTAL USD',\n        'count': 'NUMBER',\n        'mean': 'AVERAGE',\n\
    \    })\n\n    return result\n```\n\nThe first line imports the data into a Pandas\
    \ DataFrame. The `pandas_format` function adds the `DATE` column, transforming\
    \ the standard timestamp into a `datetime` object, and transforms the `USD` column\
    \ into a numeric format. This is all laying the groundwork to allow Pandas to\
    \ work with these columns.\n\nThe core of the aggregation happens in these two\
    \ lines:\n\n```python\nby_usd = data.groupby(data['DATE'].dt.date)['USD']\nresult\
    \ = by_usd.agg(['sum', 'count', 'mean'])\n```\n\nThe first line transforms the\
    \ DataFrame to group the results by the `DATE` column (which is a full `datetime`\
    \ object) but only by its date, without hour information. This aggregates the\
    \ results by whole days. The grouped values are only presented for the `USD` column.\n\
    \nThe second line aggregates the results, in three different ways: `Sum` is used\
    \ to get the total results, `count` to get the number of events, and `mean` for\
    \ the average value. They all refer to the `USD` column, selected previously.\n\
    \nThe rest of the `calculate_results` function is more straightforward. It first\
    \ rounds the results to two digital positions with `.round(2)`. It then changes\
    \ the names of the columns to be consistent with the previous recipes. The `.rename`\
    \ function uses a dictionary to define the input and output results.\n\nThe resulting\
    \ CSV file is equivalent to the one presented in the *Aggregating results* recipe,\
    \ except for minimal format differences.\n\n## There's more...\n\nThe pattern\
    \ shown in `calculate_results` when applying changes and overwriting the results\
    \ is very common in Pandas:\n\n```python\nresult = by_usd.agg(['sum', 'count',\
    \ 'mean'])\nresult = result.round(2)\nresult = result.rename(...)\n```\n\nThis\
    \ process can also be concatenated easily into the following:\n\n```python\nresult\
    \ = by_usd.agg(['sum', 'count', 'mean']).round(2).rename(...)\n```\n\nThis way\
    \ of working means that for each operation, a copy of the data is generated. For\
    \ very big collections of data, this may not be efficient. You can perform most\
    \ operations without making a copy by using the `inplace` argument. This will\
    \ mutate them without using extra memory space or copying data around.\n\nConsider\
    \ the following, for example:\n\n```python\nresult.rename(columns={\n    'sum':\
    \ 'TOTAL USD',\n    'count': 'NUMBER',\n    'mean': 'AVERAGE',\n}, inplace=True)\n\
    ```\n\nThe preceding code will replace the columns without making a copy. It will\
    \ return `None` instead. This doesn't allow us to use chained operations and it's\
    \ generally considered bad practice. Use this only when having problems with memory.\n\
    \nPandas is a big, complex package that has a lot of usages, from statistical\
    \ analysis to plotting to complex mathematical applications. It is widely used\
    \ in the data science community. Pandas uses the approach of describing the desired\
    \ result, instead of the operations to perform.\n\n> This approach is known as\
    \ *declarative*, as opposed to imperative. *Declarative* languages aim at describing\
    \ the result, the *WHAT*, while imperative languages describe the *HOW*. The most\
    \ common example of a declarative language is the SQL language, used to interact\
    \ with databases. Python is mainly an imperative language, but as we see in Pandas,\
    \ the declarative approach can be used as well.\n\nPandas is very commonly used\
    \ with Jupyter Notebook. This application allows users to create rich Python sessions\
    \ that mix code execution, documentation, and graphs for a rich environment in\
    \ the form of notebooks that can be accessed via a web browser. It's capable of\
    \ automatically presenting data from modules such as Pandas or Matplotlib.\n\n\
    The aim of this project is to allow the exploration of data, instead of following\
    \ a more repetitive process as when using an automated tool, but it's a fantastic\
    \ tool to know how to use.\n\nThe notebook can be tested online at `https://jupyter.org/try`.\
    \ Go to the main web page at `https://jupyter.org/` to check how to install it\
    \ locally and read the whole documentation.\n\n## Cleaning and Processing Data\n\
    \nHere is an example session displaying some data:\n\n![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_265_0.png)\n\
    \nYou can find the complete Pandas documentation at https://pandas.pydata.org/docs/user_guide/index.html.\n\
    \n## See also\n\n- The *Aggregating results* recipe from earlier in the chapter.\n\
    - The *Reading CSV files* recipe in *Chapter 4, Searching and Reading Local Files*.\n\
    - The *Preparing a task* recipe in *Chapter 2, Automating Tasks Made Easy*.\n\n\
    ## 8 Developing Stunning Graphs\n\nGraphs and images are fantastic ways of presenting\
    \ complex data in an easy and understandable way. In this chapter, we will make\
    \ use of the powerful matplotlib library to learn how to create all kinds of graphs.\
    \ matplotlib is a library that's aimed at displaying data in multiple ways, and\
    \ it can create stunning plots that help transmit and display information in the\
    \ best way possible.\n\n> matplotlib is well known and interacts well with other\
    \ tools in the Python ecosystem. For example, matplotlib graphs can also be automatically\
    \ displayed by Jupyter Notebooks as introduced in Chapter 7, Cleaning and Processing\
    \ Data.\n\nThe graphs we'll cover will go from simple bar graphs to line or pie\
    \ charts, and combine multiple plots in the same graph, annotate them, or even\
    \ draw geographical maps.\n\nThe following recipes will be covered in this chapter:\n\
    \n- Plotting a simple sales graph\n- Drawing stacked bars\n- Plotting pie charts\n\
    - Displaying multiple lines\n- Drawing a scatter plot\n- Visualizing maps\n- Adding\
    \ legends and annotations\n- Combining graphs\n- Saving charts\n\nLet's start\
    \ by creating our first graph.\n\n## Plotting a simple sales graph\n\nIn this\
    \ recipe, we'll see how to draw a sales graph by drawing bars proportional to\
    \ sales in different periods.\n\n## Getting ready\n\nWe can install `matplotlib`\
    \ in our virtual environment using the following commands:\n\n```bash\n$ echo\
    \ \"matplotlib==3.2.1\" >> requirements.txt\n$ pip install -r requirements.txt\n\
    ```\n\nIn some OSes, this may require us to install additional packages; for example,\
    \ in Ubuntu, it may require us to run `apt-get install python3-tk`. Check the\
    \ `matplotlib` documentation for details.\n\nIf you are using macOS, it's possible\
    \ that you'll get an error like this: **RuntimeError: Python is not installed\
    \ as a framework**. Refer to the `matplotlib` documentation on how to fix it:\
    \ https://matplotlib.org/faq/osx_framework.html.\n\n## How to do it...\n\n1. Import\
    \ `matplotlib`:\n\n```python\n>>> import matplotlib.pyplot as plt\n```\n\n2. Prepare\
    \ the data to be displayed on the graph:\n\n```python\n>>> DATA = (\n...     ('Q1\
    \ 2017', 100),\n...     ('Q2 2017', 150),\n...     ('Q3 2017', 125),\n...    \
    \ ('Q4 2017', 175),\n... )\n```\n\n3. Split the data into usable formats for the\
    \ graph. This is a preparation step:\n\n```python\n>>> POS = list(range(len(DATA)))\n\
    ```"
