    ```\n\nThe content of the image is read and sent to the Vision API through the\
    \ `document_text_detection` interface. This returns a response that's structured\
    \ in blocks, then in paragraphs, words, and finally symbols.\n\nBlocks with a\
    \ low confidence are skipped. This prevents elements being printed that the API\
    \ is not sure are correct.\n\n> The confidence level has been set arbitrarily\
