    \n## See also\n\n- The *Writing and executing test cases* recipe, earlier in this\
    \ chapter, to learn the basics of how to define tests.\n- The *Testing external\
    \ code* recipe, earlier in this chapter, to learn how to test code in other modules.\n\
    \n## Running tests selectively\n\nDetecting and running all the defined tests\
    \ in a project is good to verify that everything is working. But most of the development\
    \ work done while dealing with tests benefits from executing only a subset of\
    \ all tests.\n\nWhen adding new code or new tests, it is crucial to iterate quickly\
    \ through a specific part of the tests and code to narrow your focus.\n\nIn this\
    \ recipe, we will see how to run a subset of available tests with `pytest` and\
    \ what parameters to use in different scenarios.\n\n## Getting ready\n\nWe will\
    \ use the `pytest` module among others. We should install the modules by adding\
    \ them to our `requirements.txt` file as follows:\n\n```\n$ echo \"pytest==5.4.1\"\
    \ >> requirements.txt\n$ echo \"requests==2.23.0\" >> requirements.txt\n$ echo\
    \ \"responses==0.10.12\" >> requirements.txt\n$ echo \"freezegun==0.3.15\" >>\
    \ requirements.txt\n$ pip install -r requirements.txt\n```\n\nWe will use the\
    \ test files introduced in the previous recipes of the chapter. You can download\
    \ them from the GitHub repository at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/tree/master/Chapter12,\
    \ under the subdirectories tests and code:\n\n```\n├── code\n│   ├── __init__.py\n\
    │   ├── code_fixtures.py\n│   ├── code_requests.py\n│   ├── dependencies.py\n\
    │   └── external.py\n├── conftest.py\n└── tests\n    ├── test_case.py\n    ├──\
    \ test_dependencies.py\n    ├── test_external.py\n    ├── test_fixtures.py\n \
    \   ├── test_requests.py\n    └── test_requests_time.py\n```\n\n## How to do it...\n\
    \n1. Run all the tests with pytest:\n\n```\n$ pytest\n=============================\
    \ test session starts ==============================\nplatform darwin -- Python\
    \ 3.8.2, pytest-5.4.1, py-1.8.1, pluggy-0.13.1\nrootdir: /Python-Automation-Cookbook-second-Edition/Chapter12\n\
    collected 18 items\n\ntests/test_case.py ...F\n[ 22%]\ntests/test_dependencies.py\
    \ .....\n[ 50%]\ntests/test_external.py ...\n[ 66%]\ntests/test_fixtures.py ...\n\
