    # How it works...


    The crontab line consists of a line describing how often to run the task (the
    first six elements), plus the task. Each of the initial six elements means a different
    unit of time to execute. Most of them are stars, meaning *any*:


    ```

    * * * * * *

    | | | | | |

    | | | | | +-- Year                (range: 1900-3000)

    | | | | +---- Day of the Week     (range: 1-7, 1 standing for Monday)

    | | | +------ Month of the Year   (range: 1-12)

    | | +-------- Day of the Month    (range: 1-31)

    | +---------- Hour                (range: 0-23)

    +------------ Minute              (range: 0-59)

    ```


    Therefore, our line, */5 * * * * *, means every time the minute is divisible by
    5, in all hours, all days... all years.


    Here are some examples:


    ```

    30 15 * * * * means "every day at 15:30"

    30 * * * * * means "every hour, at 30 minutes"

    0,30 * * * * * means "every hour, at 0 minutes and 30 minutes"

    */30 * * * * * means "every half hour"

    0 0 * * 1 * means "every Monday at 00:00"

    ```'
- md: "## Automating Tasks Made Easy\n\nDo not try to guess too much. Use a cheat\
    \ sheet such as https://crontab.guru/ for examples and tweaks. Most of the common\
    \ usages will be described there directly. You can also edit a formula and get\
    \ a descriptive piece of text of how it's going to run.\n\nAfter the description\
    \ of how to run the cron job, include the line to execute the task, as prepared\
    \ in step 2 of the How to do it... section.\n\n> Note that the task is described\
    \ with all of the full paths for every related file—the interpreter, the script,\
    \ and the output file. This removes all ambiguity related to the paths and reduces\
    \ the chances of possible errors. A very common error is for cron to not be able\
    \ to determine one or more of these three elements.\n\n## There's more...\n\n\
    The description of the default output (standard output) can be a bit verbose.\
    \ When calling `python3 cron.py -h`, it gets displayed as:\n\n```\n-o OUTPUT \
    \  output file (default: <_io.TextIOWrapper name='<stdout>' mode='w' encoding='utf-8'>)\n\
    ```\n\nThis is the description of the standard output (stdout). The format of\
    \ the parameter can be changed using the `formatter_class` argument in the `ArgumentParser`.\
    \ This means that you can use a custom formatter inheriting from the available\
    \ default ones to tweak the display of the value. Refer to the documentation at\
    \ https://docs.python.org/2/library/argparse.html#formatter-class\n\nIf there's\
    \ any problem in the execution of the crontab, you should receive a system mail.\
    \ This will show up as a message in the terminal like this:\n\n```\nYou have mail.\n\
    $\nThis can be read with mail:\n$ mail\nMail version 8.1 6/6/93. Type ? for help.\n\
    \"/var/mail/jaime\": 1 message 1 new\n>N 1 jaime@Jaimes-iMac-5K Fri Jun 17 21:15\
    \ 20/914 \"Cron <jaime@Jaimes-iM\"\n? 1\nMessage 1:\n...\n```\n\n```\n/usr/local/Cellar/python/3.8.1/Frameworks/Python.framework/Versions/3.8/Resources/Python.app/Contents/MacOS/Python:\
    \ can't open file 'cron.py':\n[Errno 2] No such file or directory\n```\n\nIn the\
    \ next recipe, we will explore methods to capture the errors independently so\
    \ that the task can run smoothly.\n\n## See also\n\n- The *Adding command-line\
    \ options* recipe in *Chapter 1, Let's Begin Our Automation Journey*, to understand\
    \ the basic concepts of command-line options.\n- The *Capturing errors and problems*\
    \ recipe, next in this chapter, to learn how to store events happening during\
    \ the execution.\n\n## Capturing errors and problems\n\nAn automated task's main\
    \ characteristic is its *fire-and-forget* quality. We are not actively looking\
    \ at the result, but making it run in the background.\n\nMost of the recipes in\
    \ this book deal with external information, such as web pages or other reports,\
    \ so the likelihood of finding an unexpected problem when running it is high.\
    \ This recipe will present an automated task that will safely store unexpected\
    \ behaviors in a log file that can be checked afterward.\n\n## Getting ready\n\
    \nAs a starting point, we'll use a task that will divide two numbers, as described\
    \ in the command line.\n\nThis task is very similar to the one presented in *step\
    \ 5 of How it works* for the *Preparing a task* recipe, earlier this chapter.\
    \ However, instead of multiplying two numbers, we'll divide them.\n\n## How to\
    \ do it...\n\n1. Create the `task_with_error_handling_step1.py` file, as follows:\n\
    \n```python\nimport argparse\nimport sys\n\ndef main(number, other_number, output):\n\
    \    result = number / other_number\n    print(f'The result is {result}', file=output)\n\
    \nif __name__ == '__main__':\n    parser = argparse.ArgumentParser()\n    parser.add_argument('-n1',\
    \ type=int, help='A number', default=1)\n    parser.add_argument('-n2', type=int,\
    \ help='Another number', default=1)\n    parser.add_argument('-o', dest='output',\
    \ type=argparse.FileType('w'),\n                        help='output file', default=sys.stdout)\n\
    \n    args = parser.parse_args()\n\n    main(args.n1, args.n2, args.output)\n\
    ```\n\n2. Execute it a couple of times to see that it divides two numbers:\n\n\
    ```\n$ python3 task_with_error_handling_step1.py -n1 3 -n2 2\nThe result is 1.5\n\
    $ python3 task_with_error_handling_step1.py -n1 25 -n2 5\nThe result is 5.0\n\
    ```\n\n3. Check that dividing by 0 produces an error, and that the error is not\
    \ logged on the result file:\n\n```\n$ python task_with_error_handling_step1.py\
    \ -n1 5 -n2 1 -o result.txt\n$ cat result.txt\nThe result is 5.0\n$ python task_with_error_handling_step1.py\
    \ -n1 5 -n2 0 -o result.txt\nTraceback (most recent call last):\n  File \"task_with_error_handling_step1.py\"\
    , line 20, in <module>\n    main(args.n1, args.n2, args.output)\n  File \"task_with_error_handling_step1.py\"\
    , line 6, in main\n    result = number / other_number\nZeroDivisionError: division\
    \ by zero\n$ cat result.txt\n```\n\n4. Create the `task_with_error_handling_step4.py`\
    \ file:\n\n```python\nimport argparse\nimport sys\nimport logging\n\nLOG_FORMAT\
    \ = '%(asctime)s %(name)s %(levelname)s %(message)s'\nLOG_LEVEL = logging.DEBUG\n\
    \n\ndef main(number, other_number, output):\n    logging.info(f'Dividing {number}\
    \ between {other_number}')\n    result = number / other_number\n    print(f'The\
    \ result is {result}', file=output)\n\n\nif __name__ == '__main__':\n    parser\
    \ = argparse.ArgumentParser()\n    parser.add_argument('-n1', type=int, help='A\
    \ number',\n                        default=1)\n    parser.add_argument('-n2',\
    \ type=int, help='Another number', default=1)\n\n    parser.add_argument('-o',\
    \ dest='output', type=argparse.FileType('w'),\n                        help='output\
    \ file', default=sys.stdout)\n    parser.add_argument('-l', dest='log', type=str,\
    \ help='log file',\n                        default=None)\n\n    args = parser.parse_args()\n\
    \    if args.log:\n        logging.basicConfig(format=LOG_FORMAT, filename=args.log,\n\
    \                            level=LOG_LEVEL)\n    else:\n        logging.basicConfig(format=LOG_FORMAT,\
    \ level=LOG_LEVEL)\n\n    try:\n        main(args.n1, args.n2, args.output)\n\
    \    except Exception as exc:\n        logging.exception(\"Error running task\"\
    )\n        exit(1)\n```\n\n5. Run it to check that it displays the proper INFO\
    \ and ERROR logs, and that it stores it on the log file:\n\n```\n$ python3 task_with_error_handling_step4.py\
    \ -n1 5 -n2 0\n2020-01-19 14:25:28,849 root INFO Dividing 5 between 0\n2020-01-19\
    \ 14:25:28,849 root ERROR division by zero\nTraceback (most recent call last):\n\
