    \ and reads its content. The content needs to be decoded as it's encoded in UTF-8.\n\
    \nZip files are a collection of files that are compressed. We need to define at\
    \ least one file to store information inside a zip file. You can learn more about\
    \ the `zipfile` module here: https://docs.python.org/3/library/zipfile.html.\n\
    \nThe tests are defined in step 3. The test `test_writeread_zipfile` first generates\
