    +   - The *Writing a simple PDF document* recipe, earlier in this chapter, to
    learn the basics of how to work with PDF documents.

    - The *Structuring a PDF* recipe, earlier in this chapter, to learn how to add
    separators to a PDF document.

    - The *Watermarking and encrypting a PDF* recipe, later in this chapter, to learn
    how to add security measures to the document.


    # Watermarking and encrypting a PDF


    PDF files have some interesting security measures to limit the distribution of
    a document. We can encrypt the content, requiring users to input a password in
    order to be able to read it. We''ll also see how to add a watermark to label the
    document clearly as not for public distribution and, if leaked, to know its origin.


    # Getting ready


    We''ll use the pdf2image module to transform PDF documents to PIL images. Pillow
    is a prerequisite. We''ll also use PyPDF2:'
