    \    >>> rss.channel.updated\n    'Friday, 24 Jan 2020 19:42:27 +0000'\n    ```\n\
    \n3. 获取小于或等于6小时的条目：\n\n    ```python\n    >>> time_limit = delorean.parse(rss.channel.updated)\
    \ - datetime.timedelta(hours=6)\n    >>> entries = [entry for entry in rss.entries\
    \ if delorean.parse(entry.published) > time_limit]\n    ```\n\n4. 一些返回的条目将比6小时更旧：\n\
    \n    ```python\n    >>> len(entries)\n    28\n    >>> len(rss.entries)\n    54\n\
    \    ```\n\n5. 检索有关条目的信息，例如 `title`。完整的条目URL可作为 `link` 获取。探索此特定源中的可用信息：\n\n  \
    \  ```python\n    >>> entries[18]['title']\n    'These People Really Care About\
    \ Fonts'\n    >>> entries[18]['link']\n    'https://www.nytimes.com/2020/01/24/style/typography-font-design.html?emc=rss&partner=rss'\n\
    \    >>> requests.get(entries[18].link)\n    <Response [200]>\n    ```"
