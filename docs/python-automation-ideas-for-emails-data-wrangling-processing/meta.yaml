  md: '# # 7 Cleaning and Processing Data


    Some automated tasks will require dealing with large amounts of data. As data
    grows, two new and distinct problems appear. Processing the task takes too long
    and input data quality issues cause more problems.


    Both problems are well known in the realm of data science dealing with big quantities
    of data, but the problems can appear even at a smaller scale.


    The quality of input data is highly related to the number of sources of the data.
    In general, data from a single source will be more consistent, but using a single
    source is limiting. Even if the data comes from the same source, it could still
    contain inconsistencies or errors.


    > > Some examples of differences could be regional, such as date formats or currencies,
    extra information, different names for the same concept (including spelling differences),
    typos, general bad quality of data with errors... The list is huge!


    To compare apples with apples, the input data will probably need to be cleaned.
    This can be a difficult task and require multiple iterations until the process
    is refined, particularly if the data changes over time. We will look at some techniques
    to approach this task.'
  merge: -1
  pgno: 228
- img_proc: true
  md: 'Cleaning and Processing Data


    Regarding time, for some automated cases, this is not a problem. It makes no difference
    if an automated background emailer, composing and sending a daily update email
    during the night hours to be read as people come into the office, takes two hours
    or two minutes. But if someone is waiting for timely results, this can be highly
    inefficient.


    In particular, the waiting time during actual code development and testing is
    critical as it will not only use up time that could be spent on developing features
    but also destroys your focus and concentration, which are key to the development
    process.


    There are several tips and techniques to speed up code execution. The main two
    are: avoid performing the same operation multiple times; and parallelize the task
    by dividing it into smaller chunks.


    > The best general advice on to reduce time for your computer tasks is to learn
    computer science, in particular, algorithms and data structures. This is out of
    scope for this book, and it can be a long journey. But don''t be afraid to ask
    a fellow programmer for help! Even online!


    Chapter 3, Building Your First Web Scraping Application, introduced parallelization
    of code as part of the Speeding up web scraping recipe. We will continue with
    the concept during this chapter.


    In this chapter, we will cover the following recipes:


    +   - Preparing a CSV spreadsheet

    - Appending currency based on location

    - Standardizing the date format

    - Aggregating results

    - Processing data in parallel

    - Processing data with Pandas


