    \ 与 ERROR 的确切含义达成一致，以避免误解。\n\n`logging.exception()` 是一个特殊情况，它将创建一个 ERROR 日志，但也会包含有关异常的信息，例如堆栈跟踪。\n\
    \n记得检查日志以发现错误。一个有用的提醒是在结果文件中添加注释，如下所示：\n\n```python\ntry:\n    main(args.n1, args.n2,\
