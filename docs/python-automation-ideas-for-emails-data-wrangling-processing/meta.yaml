  md: 'Dealing with Communication Channels


    The metadata, including details such as the subject, the sender, and the timestamp,
    can be accessed like a dictionary, as shown in *step 7*. The addresses can be
    parsed from raw text format to separate the part with `email.utils.parseaddr`.


    Finally, the content can be unfolded and extracted. If the type of the email is
    multipart, each of the parts can be extracted by iterating through `.get_payload()`.
    The one that''s easier to deal with is `plain/text`, so assuming it is present,
    the code in *step 8* will extract it.


    The email''s body is stored in the `payload` variable.


    # There''s more...


    In *step 5*, we retrieved all the emails from the inbox, but that''s not necessary.
    The search command can be parameterized with filter criteria, for example, by
    retrieving only the last day''s emails:


    ```

    import datetime

    since = (datetime.date.today() - datetime.timedelta(days=1)).strftime("%d-%b-%Y")

    result, data = mail.uid(''search'', None, f''(SENTSINCE {since})'')

    ```


    This will search according to the date of the email. Notice that the resolution
    is in days.


    There are more actions that can be done through `IMAP4`. Check RFC 3501 at https://tools.ietf.org/html/rfc3501
    and RFC 6851 at https://tools.ietf.org/html/rfc6851 for further details.


    > The preceding RFCs describe the IMAP4 protocol and can be a little arid. Checking
    the available commands in the RFCs'' indexes will give you an idea of the capabilities
    of the protocol, and then you can search for examples on how to implement the
    specific command.


    The subject and body of the email, as well as other metadata such as date, to,
    from, and so on, can be parsed and processed. For example, the subject retrieved
    in this recipe can be processed in the following way:


    ```

    >>> import re

    >>> re.search(r''\[Ref (\w+)\] Subject: (\w+)'', ''[Ref ABCDEF] Subject: Product
    A'').groups()

    (''ABCDEF'', ''Product'')

    ```'
