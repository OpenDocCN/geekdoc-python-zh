    # How it works...


    After importing the `csv` module in *step 2* of the *How to do it...* section,
    we extract all the data from the file. The file is opened in a `with` block. `DictReader`
    conveniently transforms it into a list of dictionaries, with the headers as keys
    and the content of the cell as the values.


    The conveniently formatted data can then be manipulated and modified. We changed
    the data to fix the `Year` problem in *step 3*.


    > In this recipe, we change the value by directly accessing a row number, but
    searching the specific row or rows to change may be required in a more general
    case.


    *Step 4* overwrites the file and, using `DictWriter`, stores the data. `DictWriter`
    requires us to define the fields on the columns by requiring the `fieldnames`.
    To obtain them, we retrieve the keys of one of the rows and store them in `HEADER`.


    The file is opened again in `w` mode to overwrite it. `DictWriter` first stores
    the header with `.writeheader` and then stores all the rows with a single call
    to `.writerows()`.


    > The rows can also be added one by one by calling the `.writerow()` method.


    After closing the `with` block, the file is stored and can be checked to verify
    it is correct.


    # There''s more...


    For familiar data sources, the dialect of the CSV file is typically known, but
    this may not always be the case, especially if the file comes from an unknown
    source. In that case, the `Sniffer` class can help. It analyzes a sample of the
    file (or the whole file) and returns a guessed `dialect` object:


    ```

    >>> with open(FILENAME, newline='''') as file:

    ...     dialect = csv.Sniffer().sniff(file.read())

    ```'
