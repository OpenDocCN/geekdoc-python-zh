  md: '# # 9 Dealing with Communication Channels


    Dealing with communication channels is where automating things can produce big
    gains. In this chapter, we''ll see how to work with two of the most common communication
    channels—emails, including newsletters, and sending and receiving text messages
    by phone.


    During the years, there has been a fair amount of abuse in both channels, like
    spam or unsolicited marketing messages, making it necessary for senders to use
    external tools to avoid messages being rejected by automated filters. We will
    present the proper caveats where applicable. The presented tools have a lot of
    features that will help you with your specific task. They also have excellent
    documentation, so do not be afraid to read it.


    In this chapter, we will cover the following recipes:


    +   - Working with email templates

    - Sending an individual email

    - Reading an email

    - Adding subscribers to an email newsletter

    - Sending notifications via email

    - Producing SMS

    - Receiving SMS

    - Creating a Telegram bot'
