  md: "> Notice that some of these errors can happen without any changes at your end,\
    \ like 503. In some cases, a wait-and-retry strategy can be adequate, and in others,\
    \ the proper notification of \"external service unavailable\" can be better. Don't\
    \ assume that external services will always behave perfectly, as they can (and\
    \ will) have problems.\n\nOnce you enable `responses.activate` to capture all\
    \ the HTTP requests, any request to an unexpected URL will raise an error:\n\n\
    ```\nE       requests.exceptions.ConnectionError: Connection refused by Responses\
    \ - the call doesn't match any registered mock.\nE\nE       Request:\nE      \
    \   - POST https://httpbin.org/otherurl\nE\nE       Available matches:\nE    \
    \     - POST https://httpbin.org/post\n```\n\nThis makes every test that uses\
    \ `responses` self-contained and means they won't leak any external calls due\
    \ to mistakes or changes.\n\nThe `pytest` plugin `pytest-responses` allows the\
    \ activation of responses for all tests automatically. You can read its documentation\
    \ here: https://github.com/getsentry/pytest-responses.\n\nThe full documentation\
    \ of the `responses` library can be found here: https://github.com/getsentry/responses.\n\
    \n`responses` is not the only example of a library created to mock some specific\
    \ aspects when testing. Another example is `freezegun`, which allows you to set\
    \ the time. Take this test, for example:\n\n```\nimport responses\nimport urllib.parse\n\
    from freezegun import freeze_time\nfrom code.code_requests import order_pizza\n\
    \n\n@responses.activate\n@freeze_time(\"2020-03-17T19:34\")\ndef test_order_time():\n\
    \    body = {\n```"
