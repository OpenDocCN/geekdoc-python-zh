    # 11 Machine Learning for Automation


    In this chapter, we will cover the following recipes:


    - Analyzing images with Google Cloud Vision AI

    - Extracting text from images with Google Cloud Vision AI

    - Analyzing text with Google Cloud Natural Language

    - Creating your own custom machine learning model to classify text


    ## Introduction


    Machine learning is a technique that allows systems to be trained to recognize
    patterns without explicitly describing these patterns. The basis of machine learning
    is the creation and training of a model, a system that is prepared with training
    data and then can automatically process new data that is similar to the training
    data. The model learns from the training data.


    For example, a traditional method to detect spam in emails is to check words or
    sentences that are suspicious. With machine learning techniques, instead, a list
    of spam and non-spam messages are provided to the model, and the system adjusts
    itself. It learns from the data. New emails then can be given to the model to
    detect whether they are spam or not.


    This approach can also be used with images, so instead of trying to create a complicated
    shape detection algorithm to recognize a dog, a significant number of dog images
    can be used to train the model to detect whether there''s a dog or not in an image.
    The same approach can be used for other areas, such as sound (speech-to-text and
    text-to-speech) and video.


    This kind of training is called "supervised" because the training data needs to
    be properly labeled beforehand. This is the most mature and useful type of machine
    learning at the moment. There are other kinds of machine learning that work in
    an unsupervised way (where training data needs no labels), for example, determining
    from a group of pictures which ones are related to each other.


    Machine learning is becoming increasingly popular. As time passes, machine learning
    models are becoming more capable and producing better results. This used to be
    a complicated field to enter, but thanks to new cloud providers, ready-to-use
    APIs are available to leverage the power of machine learning quickly.


    Machine learning can be used in a lot of different fields. In this chapter, we
    will cover the following examples:


    - Detecting the location in a picture

    - Finding and extracting text in an image, including handwritten text

    - Detecting whether the sentiment of text is positive or negative

    - Translating text to other languages

    - Determining what department within a store a message is addressed to, based
    on previous examples


    In this chapter, we will use the publicly available Google resources, specifically
    their out-of-the-box models to detect general characteristics in images and text.
    Their public trained models are very powerful and allow you to detect a variety
    of elements. We will also cover how to create and train a custom text model that
    can apply our own labels to new text.


    > There are three levels of machine learning application, based on their complexity.
    The first one is to apply an already existing ready-to-use trained model. The
    second is to train an existing model with your own data. The third is to create
    your own model from scratch. To get to the third level you need significant expertise
    in machine learning, so it''s out of scope for this book, but the first two levels
    are accessible. Most of this chapter deals with the first level, but the last
    recipe covers the second using supervised training.'
