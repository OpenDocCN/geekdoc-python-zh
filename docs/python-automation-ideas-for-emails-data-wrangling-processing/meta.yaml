    > In the rest of the recipes in this chapter, we will see more attributes of Cell
    objects. Keep reading!


    Obtaining the area where the data is stored is possible with `max_columns` and
    `max_rows`. This allows us to search within the limits of the data.


    > Excel defines the columns as letters (A, B, C, and so on) and rows as numbers
    (1, 2, 3, and so on). Remember to always set the column, and then the row (D1,
    and not 1D), or an error will be raised.


    Cells outside the area are accessible but won''t return data. They are available
    to write new data.


    # There''s more...


    Cells can also be retrieved with `sheet.cell(column, row)`. Both elements start
    their index at 1.


    All the cells within the data area iterate from the sheet, for example:


    ```

    >>> for row in sheet:

    ...     for cell in row:

    ...         # Do stuff with cell

    ```


    This will return a list of lists with all cells, row by row: A1, A2, A3 ... B1,
    B2, B3, and so on.


    > You can retrieve the cell''s column with columns iterating through `sheet.columns`:
    A1, B1, C1, and so on, A2, B2, C2, and so on.


    When retrieving a cell, you can find its position with `.coordinate`, `.row`,
    and `.column`:


    ```

    >>> cell.coordinate

    ''D4''

    >>> cell.column

    ```'
