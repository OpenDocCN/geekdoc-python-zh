    >>> section.page_height = Inches(10)

    >>> section.page_width = Cm(20)

    ```


    The page margins can also be defined in the same way:


    ```

    >>> section.left_margin = Inches(1.5)

    >>> section.right_margin = Cm(2.81)

    >>> section.top_margin = Inches(1)

    >>> section.bottom_margin = Cm(2.54)

    ```


    Sections can also be forced to start not only on the next page, but on the next
    odd page, which will look better when printing on two sides:


    ```

    >>> document.add_section(docx.enum.section.WD_SECTION.ODD_PAGE)

    ```


    The whole `python-docx` documentation is available here: https://python-docx.readthedocs.io/en/latest/.'
  - '[PAGE 174]


    # See also


    +   - The *Writing a basic Word document* recipe, earlier in this chapter, to
    learn the basics of how to create a Word document.

    - The *Styling a Word document* recipe, earlier in this chapter, to learn how
    to add format to the document.


    # Adding pictures to Word documents


    Word documents can include images to show graphs or any other kind of extra information.
    Adding an image is a great way of creating rich reports.


    > Any experienced Word user will know how frustrating it can be to properly position
    an image, as the surrounding environment can make it change. Keep in mind that,
    while positioning the image programmatically can help, as it will be included
    in a specific place, changing the surrounding paragraphs can change how it gets
    rendered.


    In this recipe, we''ll learn how to attach an existing image file to a Word document.


    # Getting ready


    We''ll use the `python-docx` module to process Word documents:


    ```

    $ echo "python-docx==0.8.10" >> requirements.txt

    $ pip install -r requirements.txt

    ```


    We need to prepare an image to include in the document. We''ll use the file in
    GitHub at https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter04/images/photo-dublin-a1.jpg,
    which shows a view of Dublin. You can download it on the command line, like this:


    ```

    $ wget https://github.com/PacktPublishing/Python-Automation-Cookbook-Second-Edition/blob/master/Chapter04/images/photo-dublin-a1.jpg

    ```'
- md: '## How to do it...


    1. Import the `python-docx` module:

    ```python

    >>> import docx

    ```


    2. Create a new document:

    ```python

    >>> document = docx.Document()

    ```


    3. Create a paragraph with some text:

    ```python

    >>> document.add_paragraph(''This is a document that includes a picture taken
    in Dublin'')

    ```


    4. Add the image:

    ```python

    >>> image = document.add_picture(''photo-dublin-a1.jpg'')

    ```


    5. Scale the image properly to fit on the page (14 x 10 cm):

    ```python

    >>> from docx.shared import Cm

    >>> image.width = Cm(14)

    >>> image.height = Cm(10)

    ```


    6. The image has been added to a new paragraph. Align it to the center and add
    descriptive text:

    ```python

    >>> paragraph = document.paragraphs[-1]

    >>> from docx.enum.text import WD_ALIGN_PARAGRAPH

    >>> paragraph.alignment = WD_ALIGN_PARAGRAPH.CENTER

    >>> paragraph.add_run().add_break()

    >>> paragraph.add_run(''A picture of Dublin'')

    ```


    7. Add a new paragraph with extra text, and save the document:

    ```python

    >>> document.add_paragraph(''Keep adding text after the image'')

    <docx.text.paragraph.Paragraph object at XXX>

    >>> document.save(''report.docx'')

    ```


    8. Check the result:


    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_176_0.png)


    Figure 5.9: The report.docx document with a picture


    ## How it works...


    The first few steps (*steps 1 to 3* in the *How to do it...* section) create the
    document and add some text.


    *Step 4* adds the image from the file, while *step 5* resizes it into a manageable
    size. By default, the image is too big.


    Generating Fantastic Reports


    > Keep in mind the proportion of the image when resizing. Note that you can also
    use other measures such as *Inch*, which is defined in *shared* as well.


    Inserting the image creates a new paragraph as well, so the paragraph can be styled
    to align the image or to add more text, such as a reference or description. The
    paragraph is obtained in *step 6* through the `document.paragraph` property. The
    last paragraph is obtained and styled properly, aligning it to the center. A new
    line and a `run` with descriptive text are added.


    *Step 7* adds extra text after the image and saves the document.


    ## There''s more...


    The size of the image can be changed, but as we saw previously, the proportion
    of the image needs to be calculated if it changes. The resizing may end up not
    being perfect if done by approximation, as in *step 5* from the *How to do it...*
    section.


    > Notice that the image does not have a perfect ratio of 10:14. Instead, it is
    10:13.33. For a photograph, that may be good enough, but for images sensitive
    to proportion changes, such as a chart, it may require extra care.


    To obtain the proper ratio, divide the height by the width and then scale properly:


    ```python

    >>> image = document.add_picture(''photo-dublin-a1.jpg'')

    >>> image.height / image.width

    0.75

    >>> RELATION = image.height / image.width

    >>> image.width = Cm(12)

    >>> image.height = Cm(12 * RELATION)

    ```


    If you need to transform the values to a particular size, you can use the `cm`,
    `inches`, `mm`, or `pt` attributes:


    ```python

    >>> image.width.cm

    12.0

    >>> image.width.mm

    120.0

    >>> image.width.inches

    4.724409448818897

    >>> image.width.pt

    340.15748031496065

    ```


    The whole python-docx documentation is available here: https://python-docx.readthedocs.io/en/latest/.


    ## See also


    - The *Writing a basic Word document* recipe, earlier in this chapter, to learn
    the basics of working with Word documents.

    - The *Styling a Word document* recipe, earlier in this chapter, to learn how
    to add rich format to the document.

    - The *Generating structure in Word documents* recipe, earlier in this chapter,
    to learn how to add sections and other separators to the documents.


    ## Writing a simple PDF document


    PDF files are a common format for shared reports. The main characteristic of PDF
    documents is that they define exactly how the document is going to look and be
    printed, and they are read-only after being produced. This makes them very straightforward
    to use to transmit information.


    In this recipe, we''ll see how to write a simple PDF report using Python.


    ## Getting ready


    We''ll use the fpdf module to create PDF documents:


    ```bash

    $ echo "fpdf==1.7.2" >> requirements.txt

    $ pip install -r requirements.txt

    ```


    ## How to do it...


    1. Import the fpdf module:

    ```python

    >>> import fpdf

    ```


    2. Create a document:

    ```python

    >>> document = fpdf.FPDF()

    ```


    3. Define the font and color for a title, and add the first page:

    ```python

    >>> document.set_font(''Times'', ''B'', 14)

    >>> document.set_text_color(19, 83, 173)

    >>> document.add_page()

    ```


    4. Write the title of the document:

    ```python

    >>> document.cell(0, 5, ''PDF test document'')

    >>> document.ln()

    ```


    5. Write a long paragraph:

    ```python

    >>> document.set_font(''Times'', '''', 12)

    >>> document.set_text_color(0)

    >>> document.multi_cell(0, 5, ''This is an example of a long paragraph. '' * 10)

    []

    >>> document.ln()

    ```


    6. Write another long paragraph:

    ```python

    >>> document.multi_cell(0, 5, ''Another long paragraph. Lorem ipsum dolor sit
    amet, consectetur adipiscing elit.'' * 20)

    []

    ```


    7. Save the document:

    ```python

    >>> document.output(''report.pdf'')

    ''''

    ```


    8. Check the report.pdf document:


    ![](img/f6b6daf89c6a40b2f1ee7cdf5c5dea1b_179_0.png)


    ## How it works...


    The `fpdf` module creates a PDF document and allows us to write in it.


    > Due to the peculiarities of a PDF, the best way to think about it is to imagine
    a cursor writing in the document and moving to the next position, similar to a
    typewriter.


    The first operations are to specify the font and size to use, and then add the
    first page. This is done in *step 3*. The first font is in bold (second argument,
    ''B'') and in a bigger font than the rest of the document. This makes it a title.
    The color is also set up with `.set_text_color`, in RGB components.


    > The text can also be styled in italics with *I* and underlined with <u>U</u>.
    You can combine them, so **BI** will produce text in both bold and italic.


    The `.cell` call creates a box of text with the specified text. The first couple
    of parameters are the width and height. Width 0 uses the whole space up to the
    right margin. Height 5 (mm) is adequate for a size 12 font. The call to `.ln`
    introduces a new line.


    To write a multiline paragraph, we use the `.multi_cell` method. Its parameters
    are the same as `.cell`. Two paragraphs are written in *steps 5* and *6*. Notice
    the change in font previously, to distinguish the title from the body of the report.
    `.set_text_color` is called with a single argument to set up the color in grayscale.
    In this case, it is in black using 0.


    > Using `cell` for long text will make it go over the margin and off the page.
    Use it only for text that will fit in a single line. You can find the size of
    a string with `.get_string_width`.


    The document is saved to disk in *step 7*.


    ## There''s more...


    Pages are added automatically if a `multi_cell` operation occupies all space available
    in a page. Calling `.add_page` will move to a new page.


    Generating Fantastic Reports


    You can use any of the default fonts (Courier, Helvetica, and Times), or add an
    extra font using `.add_font`. Check the documentation for more details: http://pyfpdf.readthedocs.io/en/latest/reference/add_font/index.html.


    > The Symbol and ZapfDingbats fonts are also available, but represent symbols.
    This could be useful if you need to display special characters, but be sure to
    test the result before using them. The rest of the default fonts should include
    your necessities for serif, sans serif, and fixed-width cases. In PDFs, the fonts
    used will be embedded in the document, so they''ll always be displayed correctly.


    Keep the height consistent throughout the document, at least between text of the
    same size. Define a constant you''re comfortable with, and use it for the whole
    content:


    ```python

    >>> BODY_TEXT_HEIGHT = 5

    >>> document.multi_cell(0, BODY_TEXT_HEIGHT, text)

    ```


    By default, the text will be justified, but that can be changed. Use the align
    argument with J (justified), C (center), R (right), or L (left). For example,
    this produces text aligned to the left:


    ```python

    >>> document.multi_cell(0, BODY_TEXT_HEIGHT, text, align=''L'')

    ```


    The full FPDF documentation can be found here: http://pyfpdf.readthedocs.io/en/latest/index.html.


    ## See also


    - Structuring a PDF, next, to learn how to add separators to a PDF document.

    - Aggregating PDF reports, later in this chapter, to learn how to merge different
    PDF documents into one.

    - Watermarking and encrypting a PDF, later in this chapter, to learn how to add
    security measures to the document.


    ## Structuring a PDF


    Some elements can be automatically generated when creating a PDF to add a better
    look and structure to your elements. In this recipe, we''ll see how to add a header
    and footer, and how to create links to other parts of the document.'
