  md: "• To Review: When you type `my_age = 10`, you're like saying to Python, “Hey,\
    \ my age is 10 years old!” Think of `my_age` as a box where you keep your age.\n\
    \n# 2. Next, We Do Some Math and Print at the Same Time:\n\n+   • Now, the fun\
    \ part! When you type `print(\"In five years, I will be\", my_age + 5)`, you're\
    \ asking Python to do two things:\n    – **Add to Your Age**: Python takes the\
    \ number in your `my_age` box (which is 10) and adds 5 to it. It's like saying,\
    \ “What's 10 plus 5?”\n    – **Print a Message**: The `print` part tells Python\
    \ to write out a message. The message starts with the words \"In five years, I\
    \ will be\". Then, Python adds the answer to “10 plus 5” right after those words.\n\
    \n# What Happens When You Run the Code:\n\n+   • Python will think, “Okay, 10\
    \ plus 5 is 15,” and then it will show on the screen: `In five years, I will be\
    \ 15`.\n\n```\n>>> my_age = 10\n>>> print(\"In five years, I will be\", my_age\
    \ + 5)\nIn five years, I will be 15\n```\n\n•\n\nFigure 21. Alt text\n\n# Why\
    \ It's Cool:\n\n+   • You just told Python to remember your age and do math with\
    \ it! And Python did all of that and even wrote a sentence for you. That's pretty\
    \ awesome, right?"
