- md: '3. **Number**: Numbers in Python are just like numbers you use in math class.
    They can be whole numbers (like 1, 2, 3) or numbers with decimals (like 1.5 or
    2.75).


    4. **Function**: A block of code that performs a specific task and can be reused.


    5. **Loop**: A sequence of instructions that repeats until a certain condition
    is met.


    6. **Conditional Statement**: A command that performs different actions depending
    on whether a condition is true or false.


    7. **Algorithm**: Like a recipe for solving a problem. It gives step-by-step instructions
    on what to do.


    8. **List**: A line of boxes in your computer, where each box holds something
    like a number or a word.


    9. **Bug**: A mistake in a computer program that makes it act weird or wrong.


    10. **Class**: A blueprint for making objects in computer programming. It tells
    the computer what information and actions an object should have.


    11. **Comment**: In a computer program, comments are like little notes that help
    explain what the code is doing. They are just for people to read and don''t affect
    how the program runs. In Python, if you want to write a comment, you start it
    with the # symbol. Anything after the # on that line is a comment.


    12. **Data Type**: A kind of information that a program can use or change. It
    can be numbers, decimal numbers, or words.


    13. **Exception**: A kind of mistake that happens while the computer is running
    a program, like trying to divide a number by zero.


    14. **IDE (Integrated Development Environment)**: This is like a big box of tools
    that helps you write and fix your computer code. Think of it as a special kind
    of computer program where you can write code, test it, and make sure it works
    right. A good example of an IDE is IDLE, which you get when you install Python.
    It''s like having a helpful assistant for coding!


    15. **Library**: A collection of ready-made code that makes it easier to do common
    things in programming without starting from scratch. For instance, in Python,
    the `random` library is used to generate random numbers.


    16. **Object**: Something created in programming that can store information and
    do actions. It''s made using a class as a blueprint.


    17. **Operator**: A symbol that tells the computer to do math or make decisions.
    Like + for adding.


    18. **Syntax**: The rules for writing code that the computer understands. It''s
    like grammar for programming.


    19. **Variable Scope**: Where in a program a piece of information (a variable)
    can be used. Some information can be used everywhere (global) and some only in
    specific places (local).


    20. **While Loop**: A part of a program that keeps doing the same thing over and
    over as long as a certain condition is true.


    ## 2. Extra Python Challenges


    Below are several engaging project ideas to help enhance your Python programming
    skills:


    - **Basic Calculator**: Create a simple calculator that can add, subtract, multiply,
    and divide.

    - **Story Generator**: Write a program that randomly generates funny stories by
    mixing up user input.

    - **Weather Forecaster**: Create a program that asks for the user''s city and
    then uses an API to display the current weather in that city.

    - **Mad Libs Game**: Similar to the Story Generator, but this time, the program
    asks the user for specific types of words (like a noun, verb, adjective) and fills
    them into a pre-written story template.

    - **Rock, Paper, Scissors Game**: A program where the user can play the classic
    rock, paper, scissors game against the computer.

    - **Simple Quiz Game**: Write a program that asks the user a set of multiple-choice
    questions and then scores them at the end.

    - **Turtle Race**: Using the Turtle graphics library, create a simple animation
    where multiple turtle objects race across the screen.

    - **Times Table Tester**: A program that quizzes the user on multiplication tables.

    - **Word Counter**: A tool that takes a block of text (like a paragraph) and counts
    how many times each word appears.

    - **Alarm Clock**: A simple alarm clock where the user can set a time, and the
    program alerts them when it''s reached.

    - **Currency Converter**: A program that converts amounts from one currency to
    another using real-time exchange rates from an API.


    ## Resources


    ### Websites:


    1. **CodeCombat**: This is an interactive gaming website where kids learn Python
