    # ## Understanding How We Count Students in Our Program


    In our Attendance Tracker, we keep track of how many students are present and
    how many are absent. To do this, we use a special trick in Python. You might have
    seen `present_count += 1` in our code. Let''s break that down to understand what
    it does.


    # ## What Does `present_count += 1` Mean?


    +   - Think of `present_count` as a jar where we keep marbles. Each marble represents
    one student who is present.

    - The `+= 1` part is like adding one more marble to the jar.

    - So, every time we say `present_count += 1`, we''re adding a marble to the “present”
    jar because another student is here.


    # ### Example:


    +   - Imagine the jar is empty in the beginning (`present_count = 0`).

    - When Alice is present, we add a marble. Now, there''s 1 marble (`present_count
    = 1`).

    - If Bob is also present, we add another marble. Now, there are 2 marbles in the
    jar (`present_count = 2`).

    - This keeps going for each student who is present.'
  - '[PAGE 81]


    # What About absent_count += 1?


    +   - We do the same thing for absent_count. This is another jar, but for students
    who are absent.

    - Each time a student is absent, we add a marble to this “absent” jar.


    So, present_count += 1 and absent_count += 1 are our ways of keeping count of
    how many students are present and how many are absent. It’s like adding marbles
    to two different jars to keep track of who’s here and who’s not. This makes our
    Attendance Tracker smart and helpful!


