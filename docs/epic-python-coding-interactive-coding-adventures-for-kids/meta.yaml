  md: '15. **Library**: A collection of ready-made code that makes it easier to do
    common things in programming without starting from scratch. For instance, in Python,
    the `random` library is used to generate random numbers.


    16. **Object**: Something created in programming that can store information and
    do actions. It''s made using a class as a blueprint.


    17. **Operator**: A symbol that tells the computer to do math or make decisions.
    Like + for adding.


    18. **Syntax**: The rules for writing code that the computer understands. It''s
    like grammar for programming.


    19. **Variable Scope**: Where in a program a piece of information (a variable)
    can be used. Some information can be used everywhere (global) and some only in
    specific places (local).


    20. **While Loop**: A part of a program that keeps doing the same thing over and
    over as long as a certain condition is true.


