    \n## 用文字创造故事\n\n现在让我们玩玩文字，或者正如程序员所称的，“字符串”。\n\n### 1. 字符串基础：\n\n字符串在Python中只是一组字母。但是，你必须通过使用引号告诉Python它是一个字符串。\n\
