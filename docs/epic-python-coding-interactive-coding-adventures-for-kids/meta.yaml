    \ Python 在你想要的时候遵循这些指令。\n\n## 为什么函数很有用？\n\n- 函数非常有用，因为它们可以帮助你避免一遍又一遍地编写相同的代码。如果你发现自己多次做同样的事情，你可以把那部分代码放进一个函数里，然后只需调用该函数即可！\n\
