    Get ready for a new adventure in Python – learning about functions! Functions
    are like magic spells in coding. You create them once, and then you can use them
    over and over again to do cool things. Let’s find out what functions are and how
    you can create your own!


    # What are Functions?


    +   - Think of a function like a recipe in a cookbook. Each recipe tells you how
    to make a certain dish. In Python, a function is a set of instructions that tells
    the computer how to do something. Once you write a function, you can tell Python
    to follow those instructions whenever you want.


    # Why are Functions Useful?


    +   - Functions are super useful because they help you avoid writing the same
    code again and again. If you find yourself doing the same thing multiple times,
    you can put that into a function and just call the function instead!


