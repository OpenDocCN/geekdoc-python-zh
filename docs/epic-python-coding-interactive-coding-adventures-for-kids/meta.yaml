    # Beware of the Sneaky Indentation Errors in Python!


    Hey awesome coder! Now that you’re saving your Python adventures in a file, there’s
    something tricky called **indentation errors** you should know about. Don’t worry,
    they’re easy to handle once you know what to look for!


    # What is an Indentation Error?


    +   * In Python, the spaces at the beginning of a line of code are super important.
    They’re like the secret code that tells Python which instructions belong together.
    This is called “indentation.” If Python gets confused about the spaces, it will
    give you an “Indentation Error.”


    # Example of an Indentation Error:


    Let’s look at your `if` statement code again about deciding if a number is big
    or small:


    ```

    1    number = 5

    2    if number > 10:

    3        print("That''s a big number!")

    4    else:

    5        print("That''s a small number!")

    ```


    This code works perfectly because the spaces at the beginning of the lines under
    `if` and `else` are lined up just right. But what if they weren’t? Let’s make
    a sneaky indentation error and see what happens:'
  - '[PAGE 38]


    ```

    1 number = 5

    2 if number > 10:

    3 print("That''s a big number!")

    4 else:

    5     print("That''s a small number!")

    ```


    # Can You Spot the Mistake?


    +   - The line print("That''s a big number!") should have spaces at the start,
    just like the print line under else. But it doesn''t!


    # What Does Python Say?


    Python will see this and get confused. It will give you an error message like
    this:


    ```

    1     IndentationError: expected an indented block

    ```


    # How to Fix It:


    +   - Just add spaces (or press Tab) at the beginning of the print("That''s a
    big number!") line so it lines up with the print under else:


    ```

    1 number = 5

    2 if number > 10:

    3     print("That''s a big number!")

    4 else:

    5     print("That''s a small number!")

    ```


    # Now It’s Perfect!


    +   - With the spaces all lined up, Python understands your code and can decide
    if the number is big or small without any trouble!'
