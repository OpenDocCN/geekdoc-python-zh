    ![](img/36a6f7d410b19ba8659391e3099f4891_52_0.png)


    **Figure 38. Count to three with a function**


    Let’s talk about the count_to_three function we just created. It’s a cool little
    piece of code that tells Python to count from 1 to 3. Let’s break it down to see
    how it works!


    # **The Recipe for Counting:**


    +   - Think of count_to_three as a recipe that tells Python how to count to three.
    Here’s the code again:'
