    # **1. Glossary of Terms**


    +   1. Variable: A storage space in programming where data (like numbers or text)
    is kept.

    2. String: A string is like a word or a sentence. It''s just a bunch of letters,
    numbers, or other symbols stuck together. In Python, you show you''re using a
    string by putting it in quotes.'
