  md: 'You can stick a name into that blank spot to ask about different students.
    In Python, we do something similar with our code!


    # What is String Interpolation?


    +   - **String**: This is just a fancy word for text in Python.

    - **Interpolation**: This means putting something in the middle of something else.


    So, string interpolation is like putting a piece of information (like a name)
    into the middle of a string (a sentence or text) in Python.


    # How We Use It in Our Program:


    Here is the code for string interpolation used on each student name `f"Is {student}
    present? (yes/no): "`, we are telling Python to make a special kind of string
    (that''s what the `f` before the quotes is for). The `{student}` part is like
    a blank space where Python can put each student''s name.


    For each student in our list, Python replaces `{student}` with the actual name,
    just like we might use stickers to fill in the blank space on our paper.


    # Example:


    +   - When Python sees `f"Is {student} present? (yes/no): "` and student is "Alice",
    it turns into: "Is Alice present? (yes/no): "

    - Then when the `student` is "Bob", it turns into: "Is Bob present? (yes/no):
    "

    - And so on for each student!


