    # Understanding String Interpolation with a Fun Example


    We need a way for our Attendance Tracker asks questions like, “Is Alice present?
    (yes/no): ”? It needs to know how to change the name for each student, right?
    That’s where string interpolation comes in. It sounds like a big term, but it’s
