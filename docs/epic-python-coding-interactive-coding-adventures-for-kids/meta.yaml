- md: "## Chapter 4: Making Decisions with Python\n\n![](img/36a6f7d410b19ba8659391e3099f4891_30_0.png)\n\
    \n## Starting Your Python Adventure with IDLE Files\n\nBefore getting started\
    \ on decisions in Python, let’s talk about a cool tool called the IDLE Python\
    \ file. It’s like your magic notebook for writing and saving your Python adventures!\n\
    \n### Saving and Running Your Code in Python IDLE\n\nSo far, you been typing your\
    \ Python adventures directly in IDLE’s command line. That’s a great start! But\
    \ did you know you can also write your code in a Python file and save it to run\
    \ later? It’s like writing a story in a notebook and then reading it whenever\
    \ you want!\n\nHere’s How You Do It:\n\n1.  Open a New File:\n    *   In Python’s\
    \ IDLE, go to File in the top menu and choose New File. This opens a new window\
    \ where you can write your code, just like typing in a big, blank page.\n\nChapter\
    \ 4: Making Decisions with Python\n\n29\n\n![](img/36a6f7d410b19ba8659391e3099f4891_32_0.png)\n\
    \nFigure 29. Opening a Python File\n\n2.  Write Your Python Story:\n    *   Type\
    \ your code into this new window. You can write all sorts of things, like your\
    \ variables, if-statements, loops, and lists.\n\n3.  Save Your Adventure:\n  \
    \  *   To save your code, go to `File` and then `Save` or `Save As`. Choose a\
    \ place on your computer to save it, like a special folder for your Python adventures.\
    \ Give it a name ending in `.py`, like `my_adventure.py`.\n\n4.  Run Your Code:\n\
    \    *   After saving, you can run your code to see it in action. Just click Run\
    \ and then Run Module, or simply press F5 on your keyboard. Watch as Python brings\
    \ your written code to life in the IDLE shell window!\n\nBy saving your code in\
    \ a file, you can come back to it anytime and make changes or try new things.\
    \ It's like having a diary of all your coding adventures that you can read and\
    \ add to whenever you want!\n\n## If This, Then That\n\nGet ready for some fun\
    \ because we're going to learn how to make decisions in Python! Just like you\
    \ decide every day what to wear or what to eat, we can teach Python to make decisions\
    \ using something called 'if-statements.'\n\n### Understanding If-Statements:\n\
    \n*   An 'if-statement' is Python's way of choosing between different options.\
    \ It's like saying, 'If this is true, then do that; otherwise, do something else.'\n\
    \n1.  Your First If-Statement:\n    *   Let's start with something simple. What\
    \ if we want Python to say 'Good morning' if it's morning and 'Good night' if\
    \ it's night? We can do that with an if-statement!\n    *   First, we'll decide\
    \ it's morning. Type the following into your IDLE file and save the file in a\
    \ folder. :\n\n```\n1     is_morning = True\n2     if is_morning:\n3         print(\"\
    Good morning!\")\n```\n\nHere, is_morning = True is like telling Python, “It’s\
    \ morning time.” And the if-statement says, “If it’s morning (if is_morning),\
    \ then say ‘Good morning!’”\n\n2.  Run Your Code:\n    *   Run the code by either\
    \ hitting the F5 key on your keyboard or by choosing Run —> Run Module from the\
    \ menu. When you run this code, Python sees that is_morning is True, so it follows\
    \ the instruction and says Good morning!\n\n![](img/36a6f7d410b19ba8659391e3099f4891_34_0.png)\n\
    \n3.  Adding More Choices:\n    *   But what if it’s not morning? We can add another\
    \ part, called an “else” part, to tell Python what to do if it’s not morning.\n\
    \n*   Let’s add to our code:\n\n```\n1    is_morning = False\n2    if is_morning:\n\
    3        print(\"Good morning!\")\n4    else:\n5        print(\"Good night!\"\
    )\n```\n\n*   Now, because is_morning is False, Python will skip the “Good morning”\
    \ part and go straight to the else part, saying Good night!\n\n![](img/36a6f7d410b19ba8659391e3099f4891_35_0.png)\n\
    \n### Simple Choice-Based Program:\n\n1.  Creating a Small Game:\n    *   Let’s\
    \ make a mini-game! We’ll ask Python to decide if a number is big or small.\n\
    \    *   Type this game code:\n\n```\n1       number = 5\n2       if number >\
    \ 10:\n3           print(\"That's a big number!\")\n4       else:\n5         \
    \  print(\"That's a small number!\")\n```\n\n*   Here, Python checks if the number\
    \ is greater than 10. If it is, it says it's big. If not, it says it's small.\n\
    \n![](img/36a6f7d410b19ba8659391e3099f4891_36_0.png)\n\nFigure 32. Checking if\
    \ a number is big or small\n\n2.  Try Changing the Number:\n    *   Change number\
    \ = 5 to different numbers like 12, 8, or 20 in your IDLE file, and see what Python\
    \ says each time.\n\nYou just learned how to make decisions with Python! Isn't\
    \ it cool how you can tell Python to choose between different things? Remember,\
    \ programming is all about giving instructions and making\n\n## Beware of the\
    \ Sneaky Indentation Errors in Python!\n\nHey awesome coder! Now that you’re saving\
    \ your Python adventures in a file, there’s something tricky called **indentation\
    \ errors** you should know about. Don’t worry, they’re easy to handle once you\
    \ know what to look for!\n\n### What is an Indentation Error?\n\n*   In Python,\
    \ the spaces at the beginning of a line of code are super important. They’re like\
    \ the secret code that tells Python which instructions belong together. This is\
    \ called “indentation.” If Python gets confused about the spaces, it will give\
    \ you an “Indentation Error.”\n\n### Example of an Indentation Error:\n\nLet’s\
    \ look at your `if` statement code again about deciding if a number is big or\
    \ small:\n\n```\n1    number = 5\n2    if number > 10:\n3        print(\"That's\
    \ a big number!\")\n4    else:\n5        print(\"That's a small number!\")\n```\n\
    \nThis code works perfectly because the spaces at the beginning of the lines under\
    \ `if` and `else` are lined up just right. But what if they weren’t? Let’s make\
    \ a sneaky indentation error and see what happens:\n\n```\n1 number = 5\n2 if\
    \ number > 10:\n3 print(\"That's a big number!\")\n4 else:\n5     print(\"That's\
    \ a small number!\")\n```\n\n### Can You Spot the Mistake?\n\n*   The line print(\"\
    That's a big number!\") should have spaces at the start, just like the print line\
    \ under else. But it doesn't!\n\n### What Does Python Say?\n\nPython will see\
    \ this and get confused. It will give you an error message like this:\n\n```\n\
    1     IndentationError: expected an indented block\n```\n\n### How to Fix It:\n\
    \n*   Just add spaces (or press Tab) at the beginning of the print(\"That's a\
    \ big number!\") line so it lines up with the print under else:\n\n```\n1 number\
    \ = 5\n2 if number > 10:\n3     print(\"That's a big number!\")\n4 else:\n5  \
    \   print(\"That's a small number!\")\n```\n\n### Now It’s Perfect!\n\n*   With\
    \ the spaces all lined up, Python understands your code and can decide if the\
    \ number is big or small without any trouble!\n\nRemember, keeping your lines\
    \ neat and in line is key to keeping Python happy!\n\n### How to Avoid Indentation\
    \ Errors:\n\n1.  **Keep Your Spaces Consistent:**\n    *   When you write code\
    \ under things like `if` statements or `for` loops, make sure to start each line\
    \ in the same place. It’s like lining up your toys neatly in a row.\n2.  **Use\
    \ the Tab Key:**\n    *   A handy trick is to press the Tab key on your keyboard\
    \ to create spaces. This keeps your indentation nice and tidy.\n3.  **Check Your\
    \ Code:**\n    *   If Python tells you there’s an indentation error, don’t fret!\
    \ Just check your code to see if some lines start in different places and straighten\
    \ them up.\n4.  **Ask for Help if You’re Stuck:**\n    *   Sometimes finding these\
    \ little errors can be like looking for hidden treasure. If you’re stuck, ask\
    \ someone to help you spot the misplaced spaces.\n\n**Remember:** Keeping your\
    \ code neat is like keeping your room tidy - it helps you find and fix problems\
    \ faster, and it’s a super important part of being a great programmer!\n\nHappy\
    \ coding and watch out for those sneaky indentation errors!\n\n## Chapter 5: Creative\
    \ Colors and Shapes\n\n![](img/36a6f7d410b19ba8659391e3099f4891_40_0.png)\n\n\
    Drawing with Python\nGet ready for some colorful fun! Did you know that Python\
    \ can be used to create art? Yes, with Python, you can draw shapes and color them\
    \ in. We'll use something called Turtle graphics. It's like having a little turtle\
    \ that draws on your screen as it moves around!\n\n### Using Turtle Graphics to\
    \ Draw Shapes:\n\n*   Turtle graphics is a cool way in Python to make drawings.\
    \ The 'turtle' is like a little artist that follows your commands to move and\
    \ draw.\n\n1.  Setting Up Your Turtle:\n    *   First, let's get your turtle ready.\
    \ Open a new file in Python's IDLE, and type this at the top:\n\n```\n1 import\
    \ turtle\n2 my_turtle = turtle.Turtle()\n```\n\n*   This tells Python, \"I want\
    \ to use the turtle, and let's call it my_turtle.\"\n\n2.  Moving Your Turtle\
    \ to Draw:\n    *   Now, let's make your turtle draw a square. Add these lines\
    \ to your code:\n\n```\n1 for _ in range(4):\n2     my_turtle.forward(100)\n3\
    \     my_turtle.right(90)\n```\n\n*   This tells your turtle to move forward and\
    \ then turn right, making each side of the square.\n*   Save your file with a\
    \ .py at the end, like my_square.py. Run the code by hitting F5 and you'll see\
    \ the square being drawn by the turtle!"
  mdcn: "## 第四章：使用 Python 做出决策\n\n![](img/36a6f7d410b19ba8659391e3099f4891_30_0.png)\n\
    \n## 从 IDLE 文件开启你的 Python 冒险之旅\n\n在开始学习 Python 中的决策之前，让我们先来聊聊一个很酷的工具，叫做 IDLE Python\
    \ 文件。它就像是你用来编写和保存 Python 冒险的魔法笔记本！\n\n### 在 Python IDLE 中保存并运行代码\n\n到目前为止，你一直是在\
    \ IDLE 的命令行中直接输入你的 Python 冒险。这是个很棒的开始！但你知道吗，你也可以在 Python 文件中编写代码并将其保存下来稍后运行？这就像在笔记本上写一个故事，然后随时可以阅读它！\n\
    \n具体操作如下：\n\n1.  打开新文件：\n    *   在 Python 的 IDLE 中，转到顶部菜单的“文件”并选择“新建文件”。这会打开一个新窗口，你可以在这里编写代码，就像在一张很大的空白页面上打字一样。\n\
    \n第四章：使用 Python 做出决策\n\n29\n\n![](img/36a6f7d410b19ba8659391e3099f4891_32_0.png)\n\
    \n图 29. 打开一个 Python 文件\n\n2.  编写你的 Python 故事：\n    *   在这个新窗口中输入你的代码。你可以写各种各样的东西，比如你的变量、if\
    \ 语句、循环和列表。\n\n3.  保存你的冒险：\n    *   要保存代码，请转到 `File`（文件），然后选择 `Save`（保存）或 `Save\
    \ As`（另存为）。选择你电脑上的一个位置来保存它，比如一个专门为你的 Python 冒险准备的特殊文件夹。给它一个以 `.py` 结尾的名字，比如 `my_adventure.py`。\n\
    \n4.  运行你的代码：\n    *   保存后，你就可以运行代码来看看它的效果。只需点击“运行”，然后选择“运行模块”，或者简单地按键盘上的 F5 键。看着\
    \ Python 在 IDLE Shell 窗口中让你编写的代码活起来！\n\n通过将代码保存在文件中，你可以随时回来，进行修改或尝试新事物。这就像拥有一本记录你所有编程冒险的日记，你可以随时阅读和添加内容！\n\
    \n## 如果这样，那么那样\n\n准备好迎接一些乐趣吧，因为我们将学习如何在 Python 中做出决策！就像你每天决定穿什么或吃什么一样，我们可以教 Python\
    \ 使用一种叫做“if 语句”的东西来做出决策。\n\n### 理解 if 语句：\n\n*   “if 语句”是 Python 在不同选项之间进行选择的方式。这就像说：“如果这个条件成立，那么就执行那个操作；否则，执行其他操作。”\n\
    \n1.  你的第一个 if 语句：\n    *   让我们从一些简单的东西开始。如果我想让 Python 在早上说“早上好”，在晚上说“晚上好”，该怎么办？我们可以用\
    \ if 语句来实现！\n    *   首先，我们假定现在是早上。在你的 IDLE 文件中输入以下内容，并将文件保存在一个文件夹中。:\n\n```\n\
    1     is_morning = True\n2     if is_morning:\n3         print(\"Good morning!\"\
    )\n```\n\n在这里，`is_morning = True` 就像是在告诉 Python：“现在是早上时间。” 而 if 语句则表示：“如果现在是早上（`if\
    \ is_morning`），就说‘早上好！’”\n\n2.  运行你的代码：\n    *   通过按键盘上的 F5 键或从菜单中选择“运行”——>“运行模块”来运行代码。当你运行这段代码时，Python\
    \ 看到 `is_morning` 的值为 `True`，因此它会遵循指令，输出 `Good morning!`！\n\n![](img/36a6f7d410b19ba8659391e3099f4891_34_0.png)\n\
    \n3.  添加更多选择：\n    *   但如果不是早上怎么办？我们可以添加另一个部分，称为“else”部分，来告诉 Python 如果不是早上该怎么做。\n\
    \n*   让我们来完善代码：\n\n```\n1    is_morning = False\n2    if is_morning:\n3      \
    \  print(\"Good morning!\")\n4    else:\n5        print(\"Good night!\")\n```\n\
    \n*   现在，因为 `is_morning` 的值为 `False`，Python 会跳过“Good morning”部分，直接执行 else 部分，输出\
    \ `Good night!`！\n\n![](img/36a6f7d410b19ba8659391e3099f4891_35_0.png)\n\n###\
    \ 基于简单选择的程序：\n\n1.  创建一个小游戏：\n    *   让我们来做一个小游戏！我们将让 Python 判断一个数字是大还是小。\n  \
    \  *   输入这个游戏代码：\n\n```\n1       number = 5\n2       if number > 10:\n3      \
    \     print(\"That's a big number!\")\n4       else:\n5           print(\"That's\
    \ a small number!\")\n```\n\n*   在这里，Python 检查数字是否大于 10。如果是，就说它很大。如果不是，就说它很小。\n\
    \n![](img/36a6f7d410b19ba8659391e3099f4891_36_0.png)\n\n图 32. 检查一个数字是大还是小\n\n\
    2.  尝试修改数字：\n    *   在你的 IDLE 文件中，将 `number = 5` 改成不同的数字，比如 12、8 或 20，看看每次 Python\
    \ 会说什么。\n\n你刚刚学会了如何用 Python 做出决策！能够告诉 Python 在不同选项之间进行选择是不是很酷？记住，编程就是给予指令和做出决定。\n\
    \n## 警惕 Python 中狡猾的缩进错误！\n\n嘿，优秀的程序员！既然你已经将你的 Python 冒险保存在文件中了，有一个棘手的东西你需要了解，叫做**缩进错误**。别担心，一旦你知道了要注意什么，处理起来就很容易了！\n\
    \n### 什么是缩进错误？\n\n*   在 Python 中，一行代码开头的空格至关重要。它们就像一种秘密代码，告诉 Python 哪些指令应该组合在一起。这被称为“缩进”。如果\
    \ Python 对这些空格感到困惑，它会给你一个“缩进错误”。\n\n### 缩进错误的例子：\n\n让我们再看看你关于判断数字大小的 `if` 语句代码：\n\
    \n```\n1    number = 5\n2    if number > 10:\n3        print(\"That's a big number!\"\
    )\n4    else:\n5        print(\"That's a small number!\")\n```\n\n这段代码运行得非常完美，因为\
    \ `if` 和 `else` 下面行首的空格对齐得刚刚好。但如果它们没有对齐呢？让我们制造一个狡猾的缩进错误，看看会发生什么：\n\n```\n1 number\
    \ = 5\n2 if number > 10:\n3 print(\"That's a big number!\")\n4 else:\n5     print(\"\
    That's a small number!\")\n```\n\n### 你能找出错误吗？\n\n*   这行 `print(\"That's a big\
    \ number!\")` 在开头应该有空格，就像 `else` 下面的 `print` 行一样。但它没有！\n\n### Python 会怎么说？\n\n\
    Python 看到这个会感到困惑。它会给你一个这样的错误信息：\n\n```\n1     IndentationError: expected an indented\
    \ block\n```\n\n### 如何修复它：\n\n*   只需在 `print(\"That's a big number!\")` 行的开头添加空格（或按\
    \ Tab 键），使其与 `else` 下的 `print` 对齐：\n\n```\n1 number = 5\n2 if number > 10:\n3\
    \     print(\"That's a big number!\")\n4 else:\n5     print(\"That's a small number!\"\
    )\n```\n\n### 现在完美了！\n\n*   所有空格都对齐后，Python 就能理解你的代码，并能毫无障碍地判断数字是大还是小！\n\n记住，保持代码行整齐划一是让\
    \ Python 保持愉快的关键！\n\n### 如何避免缩进错误：\n\n1.  **保持空格一致：**\n    *   当你在 `if` 语句或 `for`\
    \ 循环等结构下编写代码时，确保每行都从相同的位置开始。这就像把你的玩具整齐地排成一排。\n2.  **使用 Tab 键：**\n    *   一个方便的技巧是按键盘上的\
    \ Tab 键来创建空格。这能让你的缩进保持整洁。\n3.  **检查你的代码：**\n    *   如果 Python 告诉你有缩进错误，不要慌！只需检查你的代码，看看是否有些行从不同的位置开始，然后将它们调整对齐。\n\
    4.  **如果遇到困难，请寻求帮助：**\n    *   有时，发现这些小错误就像寻找隐藏的宝藏。如果你卡住了，可以请人帮你找出那些放错位置的空格。\n\
    \n**记住：** 保持代码整洁就像保持房间整洁一样——它能帮助你更快地发现和解决问题，而且是成为优秀程序员的一个超级重要的部分！\n\n快乐编程，小心那些狡猾的缩进错误！\n\
    \n## 第五章：创意颜色与形状\n\n![](img/36a6f7d410b19ba8659391e3099f4891_40_0.png)\n\n用 Python\
    \ 绘画\n准备好迎接一些色彩斑斓的乐趣吧！你知道吗，Python 可以用来创作艺术？是的，使用 Python，你可以绘制形状并为它们上色。我们将使用一种叫做\
    \ Turtle 图形的工具。这就像有一只小海龟，在屏幕上移动时为你绘画！\n\n### 使用 Turtle 图形绘制形状：\n\n*   Turtle 图形是\
    \ Python 中一种很酷的绘画方式。这只“海龟”就像一个遵循你的指令进行移动和绘制的小艺术家。\n\n1.  设置你的海龟：\n    *   首先，让我们准备好你的海龟。在\
    \ Python 的 IDLE 中打开一个新文件，在顶部输入以下内容：\n\n```\n1 import turtle\n2 my_turtle = turtle.Turtle()\n\
    ```\n\n*   这告诉 Python：“我想使用海龟，我们叫它 my_turtle 吧。”\n\n2.  移动海龟来绘画：\n    *   现在，让我们让你的海龟画一个正方形。在你的代码中添加这些行：\n\
    \n```\n1 for _ in range(4):\n2     my_turtle.forward(100)\n3     my_turtle.right(90)\n\
    ```\n\n*   这告诉你的海龟向前移动，然后向右转，完成正方形的每一边。\n*   以 .py 结尾保存你的文件，比如 `my_square.py`。通过按\
    \ F5 来运行代码，你将看到海龟正在绘制正方形！"
