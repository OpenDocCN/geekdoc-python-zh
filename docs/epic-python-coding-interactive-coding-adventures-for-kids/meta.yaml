    ```

    1    def count_to_three():

    2        for number in range(1, 4):

    3            print(number)

    ```


    # What Each Part Does:


    1. Starting the Recipe (def count_to_three()):


    +   - def count_to_three(): is like the title of the recipe. It tells Python,
    “Here’s how you count to three.”

    - def means you’re defining a new function, and count_to_three is the name you’re
    giving it.


    2. The Counting Instructions (for number in range(1, 4)):


    +   - Inside the function, we have a loop: for number in range(1, 4).

    - This is like saying, “For each number in the list of 1, 2, 3, do the following...”

    - Why 1 to 4, not 1 to 3? In Python, the range starts at the first number but
    stops just before the last number. So range(1, 4) includes 1, 2, and 3.


    3. Telling Python What to Do (print(number)):


    +   - print(number) is the action part of our recipe. It tells Python to show
    each number on the screen.

    - So, Python will print 1, then 2, then 3, each on its own line.


    # Using the Function:


    +   - Just writing the function isn’t enough. We have to tell Python to use it.
    That’s why we write count_to_three() after the function. It’s like saying, “Okay,
    Python, now follow the recipe to count to three.”'
