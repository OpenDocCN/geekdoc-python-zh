    \ exploring outer space to creating movie magic and video game adventures, Python\
    \ is everywhere. And scientists rely on it to make important discoveries about\
    \ our world. Every time you code in Python, you're learning skills that can help\
    \ you do incredible things too!\n\n## Your Project: Create Your Weather Program:\n\
    \nNow, let's use Python to make your very own weather program!\n\n1. Getting Ready:\n\
    \   - Open a new Python file. This time, you'll ask someone to tell you the weather,\
    \ and then your program will respond!\n\n2. Writing the Weather Program:\n   -\
    \ Start by typing this code:\n\n```python\nweather = input(\"What is the weather\
    \ like today? \\n(sunny, rainy, snowy) \")\nif weather == \"sunny\":\n    print(\"\
    It's a sunny day! Don't forget your sunglasses.\")\nelif weather == \"rainy\"\
    :\n    print(\"It's raining. You'll need an umbrella!\")\nelif weather == \"snowy\"\
    :\n    print(\"Wow, it's snowing! Bundle up in your warmest clothes.\")\nelse:\n\
    \    print(\"Hmm, I don't know that weather. Sounds like an adventure!\")\n```\n\
    \n- This program asks for the weather and gives a response based on what you type.\n\
    \n3. Trying Out Your Weather Station:\n   - Run your program and type in different\
    \ weather conditions like “sunny,” “rainy,” or “snowy” and see what your program\
    \ says.\n\n## Roll Call with Python - Building an Attendance Tracker Step by Step\n\
    \n### Introduction to Our Python Project\n\nHey there, young coders! Have you\
    \ ever thought about how teachers keep track of who's in class? Today, we're going\
    \ to create our own Attendance Tracker using Python! We'll build it step by step,\
    \ learning about lists, loops, and counting. In the end, we'll put all our pieces\
    \ together to make a cool program. Let's get started!\n\n1. Creating a List of\
    \ Students:\n   - First, we need a list of students for our roll call. In Python,\
    \ we make a list using square brackets [], and we put names inside it, separated\
    \ by commas.\n\nImagine we have five friends: Alice, Bob, Charlie, David, and\
    \ Eva. Our list will look like this:\n\n```python\nstudents = [\"Alice\", \"Bob\"\
    , \"Charlie\", \"David\", \"Eva\"]\n```\n\n2. Setting Up Counters for Attendance:\n\
    \   - Next, we need two counters: one for students who are present and one for\
    \ those who are absent. We'll start them both at 0 because we haven't counted\
    \ anyone yet.\n\n```python\npresent_count = 0\nabsent_count = 0\n```\n\n3. Asking\
    \ About Each Student:\n   - Now we're going to ask if each student is here. We\
    \ use a loop for this. As we talked about, a loop is like going around in a circle,\
    \ doing the same thing for each item in our list. We're going to use a for loop,\
    \ which lets us do something for each student in our students list.\n\n```python\n\
    students = [\"Alice\", \"Bob\", \"Charlie\", \"David\", \"Eva\"]\n\n# Variables\
    \ to keep track of attendance\npresent_count = 0\nabsent_count = 0\n\n# Loop through\
    \ each student in the list\nfor student in students:\n    # ask each student if\
    \ they are present\n```\n\n4. Checking if a Student is Present:\n   - Inside our\
    \ loop, we'll ask if each student is present. We wait for an answer, and if the\
    \ answer is 'yes', we add 1 to our present_count variable. If the answer is 'no',\
    \ we add 1 to our absent_count variable.\n\nWe use an if statement to choose whether\
    \ or not to mark a student absent or present in the total. An if statement lets\
    \ us choose what to do based on the answer.\n\n```python\n# determine if a student\
    \ is present\nresponse = input(f\"Is {student} present? (yes/no): \").lower()\n\
    \n# Check if the student is present\nif response == \"yes\":\n    print(f\"{student}\
    \ is present.\")\n    present_count += 1\nelse:\n    print(f\"{student} is absent.\"\
    )\n    absent_count += 1\n```\n\nWe want an easy way to ask the user if each student\
    \ is present. That is where we use a fancy Python trick called *String Interpolation*.\n\
    \n### Understanding String Interpolation with a Fun Example\n\nWe need a way for\
    \ our Attendance Tracker asks questions like, “Is Alice present? (yes/no): ”?\
    \ It needs to know how to change the name for each student, right? That’s where\
    \ string interpolation comes in. It sounds like a big term, but it’s actually\
    \ pretty simple and cool!\n\nImagine you have a sentence written on a piece of\
    \ paper: “Is ___-___ present?” Now, imagine you have stickers with names on them.\
    \ You can stick a name into that blank spot to ask about different students. In\
    \ Python, we do something similar with our code!\n\n### What is String Interpolation?\n\
    \n- **String**: This is just a fancy word for text in Python.\n- **Interpolation**:\
    \ This means putting something in the middle of something else.\n\nSo, string\
    \ interpolation is like putting a piece of information (like a name) into the\
    \ middle of a string (a sentence or text) in Python.\n\n### How We Use It in Our\
    \ Program:\n\nHere is the code for string interpolation used on each student name\
    \ `f\"Is {student} present? (yes/no): \"`, we are telling Python to make a special\
    \ kind of string (that's what the `f` before the quotes is for). The `{student}`\
    \ part is like a blank space where Python can put each student's name.\n\nFor\
    \ each student in our list, Python replaces `{student}` with the actual name,\
    \ just like we might use stickers to fill in the blank space on our paper.\n\n\
    ### Example:\n\n- When Python sees `f\"Is {student} present? (yes/no): \"` and\
    \ student is \"Alice\", it turns into: \"Is Alice present? (yes/no): \"\n- Then\
    \ when the `student` is \"Bob\", it turns into: \"Is Bob present? (yes/no): \"\
    \n- And so on for each student!\n\n### Summing Things Up\n\nOnce we've finished\
    \ taking attendance, we get to share what we found. We'll use what we learned\
    \ earlier to write a message that tells everyone how many students are here and\
    \ how many are not. It's like putting the final pieces of our puzzle together\
    \ to see the whole picture! Did you catch that we are using string interpolation\
    \ again to help display the results?\n\n```python\n# Print the total number of\
    \ students present and absent\n# Again we are using string interpolation\nprint(f\"\
    \\nTotal Present: {present_count}\")\nprint(f\"Total Absent: {absent_count}\"\
    )\n```\n\n5. Putting It All Together:\n   - Let's put all these pieces together\
    \ to make our complete Attendance Tracker. Here's what our whole program will\
    \ look like:\n\n```python\n# List of students in the class\nstudents = [\"Alice\"\
    , \"Bob\", \"Charlie\", \"David\", \"Eva\"]\n\n# Variables to keep track of attendance\n\
    present_count = 0\nabsent_count = 0\n\n# Loop through each student in the list\n\
    for student in students:\n    # use string interpolation to prompt\n    # a particular\
    \ student\n    response = input(f\"Is {student} present? (yes/no): \").lower()\n\
    \n    # Check if the student is present\n    if response == \"yes\":\n       \
    \ print(f\"{student} is present.\")\n        present_count += 1\n    else:\n```"
