    1. Starting the Recipe (def count_to_three()):


    +   - def count_to_three(): is like the title of the recipe. It tells Python,
    “Here’s how you count to three.”

    - def means you’re defining a new function, and count_to_three is the name you’re
    giving it.


    2. The Counting Instructions (for number in range(1, 4)):


