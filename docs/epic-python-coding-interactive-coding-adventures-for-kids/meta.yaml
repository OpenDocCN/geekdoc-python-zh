  md: '# What About absent_count += 1?


    +   - We do the same thing for absent_count. This is another jar, but for students
    who are absent.

    - Each time a student is absent, we add a marble to this “absent” jar.


    So, present_count += 1 and absent_count += 1 are our ways of keeping count of
    how many students are present and how many are absent. It’s like adding marbles
    to two different jars to keep track of who’s here and who’s not. This makes our
    Attendance Tracker smart and helpful!


