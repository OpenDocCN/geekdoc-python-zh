    \n创建你自己的函数\n\n准备在 Python 中开始新的冒险——学习函数！函数就像是编码中的魔法咒语。你创建一次，然后就可以一遍又一遍地使用它们来做很酷的事情。让我们看看函数是什么，以及如何创建你自己的函数！\n\
