  md: "# # What if You Get an Error?\n\n# ## Common Mistake: Forgetting to Define\
    \ a variable\n\n+   * Suppose you accidentally typed `print(\"In five years, I\
    \ will be\", age + 5)` instead of using `my_age`.\n\n# ### Python’s Response:\n\
    \n+   * Python will say something like: `NameError: name 'age' is not defined`\n\
    \n```\n\n>>> future_age = age + 3\nTraceback (most recent call last):\n  File\
    \ \"<pyshell#13>\", line 1, in <module>\n    future_age = age + 3\nNameError:\
    \ name 'age' is not defined\n```\n\nFigure 22. Error in code\n\n# ## Why Did This\
    \ Happen?\n\n+   * This error means Python is confused because it doesn't know\
    \ what `age` is. You told Python about `my_age`, but not `age`.\n\n# ## How to\
    \ Fix It:\n\n+   1. **Read the Error Message:**\n    * It tells you that `age`\
    \ is not defined.\n\n+   2. **Check Your Code:**\n    * Look at your code and\
    \ compare it to the instructions. Do you see the difference?"
