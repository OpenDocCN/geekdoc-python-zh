- md: "## Alixing\n\nWhen we assign one variable to another, all of those variables\
    \ will refer to the same object since variables are themselves objects. Additionally,\
    \ the process of using two different IDs to refer to the same variable is known\
    \ as aliasing. To better grasp this idea, let's look at a concrete illustration.\n\
    \n### Example:\n\n```python\n1. var1 = [555, 666, 777]\n2. var2 = var1  # Aliasing\n\
    3. print (var1 is var2)\n4. print (var1)\n5. print (var2)\n```\n\n### Output:\n\
    \n```\nTrue\n[555, 666, 777]\n[555, 666, 777]\n```\n\nThe same list has two different\
    \ names in the above example, var1, and var2; however, after executing the assignment\
    \ statement var2 = var1, you can see that var1 and var2 relate to the same list.\n\
    \n### Example:\n\n```python\n1. var1 = [555, 666, 777]\n2. var2 = [555, 666, 777]\n\
    3. print (var1)\n4. print (var2)\n5. print (var1 == var2)\n6. print (var1 is var2)\n\
    7.\n8. var2 = var1\n9. print (var1 == var2)\n10. print (var1 is var2)\n11.\n12.\
    \ var2[0] = 999\n13. print (var1)\n14. print (var2)\n```\n\n### Output:\n\n```\n\
    [555, 666, 777]\n[555, 666, 777]\nTrue\nFalse\nTrue\nTrue\n[999, 666, 777]\n[999,\
    \ 666, 777]\n```\n\n## Cloning Lists\n\nIf we want to change a list while keeping\
    \ a copy of the original, we must copy the entire list, not just the reference.\
    \ This method is often referred to as cloning to prevent the ambiguity of the\
    \ word clone. The quickest and most straightforward way to clone a list is to\
    \ use the slicing process.\n\n### Example:\n\n```python\n1. list1 = [777, 888,\
    \ 999]\n2. list2 = list1[:]    # make a clone using slice\n3. print (list1 ==\
    \ list2)\n4. print (list1 is list2)\n5. list2[0] = 555\n6. print (list1)\n7. print\
    \ (list2)\n```\n\n### Output:\n\n```\nTrue\nFalse\n[777, 888, 999]\n[555, 888,\
    \ 999]\n```\n\nThere are various types of ways to clone a list.\n\n### Cloning\
    \ List using Slicing\n\nIt is the most straightforward method of cloning a list.\
    \ We use this form when we want to change a list while keeping a copy of the original.\
    \ Let us take an example to understand this concept.\n\n### Example:\n\n```python\n\
    1. def cloning_List(li1):\n2.     lst1 = li1[:]  # Slice Operator\n3.     return\
    \ lst1\n4.\n5.\n6. lvar1 = [55,66,77,88,99]\n7. lvar2 = cloning_List(lvar1)\n\
    8. print (\"Original List:\", lvar1)\n9. print (\"After Cloning:\", lvar2)\n```\n\
    \n### Output:\n\n```\nOriginal List: [55, 66, 77, 88, 99]\nAfter Cloning: [55,\
    \ 66, 77, 88, 99]\n```\n\n### Cloning List using Extend()\n\nThe extend() function\
    \ can be used to copy the lists into a new list. Let us take an example to understand\
    \ this concept.\n\n### Example:\n\n```python\n1. def cloning_List(li1):\n2.  \
    \   lst1 = []\n3.     lst1.extend(li1)\n4.     return lst1\n5.\n6. lvar1 = [55,66,77,88,99]\n\
    7. lvar2 = cloning_List(lvar1)\n8. print (\"Original List:\", lvar1)\n9. print\
    \ (\"After Cloning:\", lvar2)\n```\n\n### Output:\n\n```\nOriginal List: [55,\
    \ 66, 77, 88, 99]\nAfter Cloning: [55, 66, 77, 88, 99]\n```\n\n### Cloning List\
    \ using List()\n\nA list can be cloned using a list() function. Let us take an\
    \ example to understand this concept.\n\n### Example:\n\n```python\n1. def cloning_List(li1):\n\
    2.     lst1 = list(li1)\n3.     return lst1\n4. \n5. lvar1 = [55,66,77,88,99]\n\
    6. lvar2 = cloning_List(lvar1)\n7. print (\"Original List:\", lvar1)\n8. print\
    \ (\"After Cloning:\", lvar2)\n```\n\n### Output:\n\n```\nOriginal List: [55,\
    \ 66, 77, 88, 99]\nAfter Cloning: [55, 66, 77, 88, 99]\n```\n\n### Cloning List\
    \ using List Comprehension\n\nA list comprehension method is used to copy all\
    \ the elements from one list to another. Let us take an example to understand\
    \ this concept.\n\n### Example:\n\n```python\n1. def cloning_List(li1):\n2.  \
    \   lst1 = [i for i in li1]\n3.     return lst1\n4. \n5. \n6. lvar1 = [55,66,77,88,99]\n\
    7. lvar2 = cloning_List(lvar1)\n8. print (\"Original List:\", lvar1)\n9. print\
    \ (\"After Cloning:\", lvar2)\n```\n\n### Output:\n\n```\nOriginal List: [55,\
    \ 66, 77, 88, 99]\nAfter Cloning: [55, 66, 77, 88, 99]\n```\n\n### Cloning List\
    \ using Append()\n\nThe **append()** function can be used to append or add elements\
    \ to the list or copy them to a new list. It's used to add elements to the list's\
    \ last location. Let us take an example to understand this concept.\n\n### Example:\n\
    \n```python\n1. def cloning_List(li1):\n2.     lst1 = []\n3.     for i in li1:\
    \ lst1.append(i)\n4.     return lst1\n5. \n6. \n7. lvar1 = [55,66,77,88,99]\n\
    8. lvar2 = cloning_List(lvar1)\n9. print (\"Original List:\", lvar1)\n10. print\
    \ (\"After Cloning:\", lvar2)\n```\n\n### Output:\n\n```\nOriginal List: [55,\
    \ 66, 77, 88, 99]\nAfter Cloning: [55, 66, 77, 88, 99]\n```\n\n### Cloning List\
    \ using Copy()\n\nUse this method to copy all the elements from one list to another.\
