- md: '## Memory Management


    Memory allocation and reclamation are no longer the programmer''s headache. It
    adopts automatic memory management allocation and garbage collection so that memory
    growth and shrink are as per demand. Python considers memory as the private heap.
    There are two types of allocators for memory management: raw memory allocator
    and object-specific allocator:


    - **Large system development**: Python, with its vast repository of tools, allows
    faster and easier development of extensive systems. Python tools can be classified
    into two categories: general-purpose and functional tools. The generic tools include
    modules, classes, and exceptions that help to disintegrate large applications
    into small modules, reuse customized codes, and handle errors and exceptions.

    - **Dynamic typing**: The programmer can easily write code without worrying about
    the program''s syntax and structure. There is no need for the type and variable
    declaration beforehand.

    - **Vast Library and Tools**: Python has full-fledged support for various built-in
    objects types like lists, dictionaries, *etc*. Python''s standard operations,
    like concatenation, slicing, sorting, *etc*., allow sequential processing of these
    object types. Further, Python has some precoded library tools to support application-level
    specific tasks like networking, regular expressions, *etc*. It also has an extensive
    library to handle threading, GUI, *etc*. The easy integration of Python allows
    customization and communication with other frameworks. For example, integration
    of Java and .NET components allows easy communication with frameworks like COM
    and Silverlight.


    ## Ease of Use


    Python has become the developer''s first choice due to its interactive user interface
    and rapid turnaround time. Python is quite easy to learn with its simple and flexible
    programming paradigm. Python majorly emphasizes on quality and comprehensibility
    of code rather than its structure. The absence of lengthy compilation time and
    immediate execution boosts the developing time.


    ## Installing Python


    Visit the official website www.python.org and get the latest version of Python.
    Fig. (2) shows the webpage. If the operating system is Mac or Linux, Python is
    already installed, although it might be an older version.


    ![](img/a3dd2fbdd34f88affbf364777f25c839_19_0.png)


    Fig. (2). Selection of Python for the operating system.


    ## Windows Installer


    1. Once you visit the Python official website, it will prompt you to download
    the latest version of Python for the respective operating system. You can select
    the respective operating system and it will take you to the available versions
    of Python for that operating system.

    2. Select a Python version depending on your configuration (32-bit or 64-bit)
    from the list of options and it will start the automatic download of the executable
    file.

    3. Once the download is complete, go to the downloading site and run the executable
    file.

    4. A window will pop up that shows the default installation destination and also
    provides the option to customize the installation destination by browsing the
    same. Further, it prompts two checkboxes to *Add a Python Version to PATH* and
    to use the administrator privileges. This will confirm that the interpreter is
    added to the execution path.

    5. Click **Install** Now. You will be prompted to *Optional Features*. Select
    the features as required.

    6. Click *Next*. You will be prompted to the ***Advanced options*** features.
    Select the features as required. Also, here you will be required to choose the
    installation location.

    7. Click **Install**. Your setup progress bar will show the progress of the installation.
    After the installation is complete a window will prompt the successful installation.

    8. Once the installation is complete, you can open it by searching in the taskbar.


    ## Ubuntu


    With different versions of the Ubuntu distribution, Python is preinstalled. You
    might require updating the version of Python. The steps for Python installation
    on Ubuntu are as follows:


    1. Check the version of Python installed on your Ubuntu system.


    ```

    python -version

    ```


    2. Update and refresh the list of the repository.


    ```

    sudo apt update

    ```


    3. Installation of Supporting Software.


    ```

    sudo apt install software-properties-common

    ```


    4. Add Deadsnakes PPA (Personal Package Archive).


    ```

    sudo add-apt-repository ppa:deadsnakes/ppa

    ```


    5. You will be prompted to press enter for installation continuation. Press Enter.
    Refresh the package lists again.


    ```

    sudo apt update

    ```


    6. Install Python 3 using the following command.


    ```

    sudo apt install python3.9

    ```


    7. Verify the Python version after successful installation.


    ## Linux Mint


    Installation of Mint is like Ubuntu, and installation instructions for Ubuntu
    can also be used in Mint. A Deadsnakes/PPA working well with Mint.


    ## Python IDLE


    IDLE is the acronym for Interactive Development and Learning Environment. This
    IDLE helps to run your programs. Python has an IDLE for Windows that provides
    an interactive platform for program development. IDLE for Python comes in two
    modes: interactive mode and script mode. IDLE starts in the shell; you can type
    your code and see the output on the same window. Fig. (3). depicts the Python
    shell. You can search the Python shell in the Windows search bar.


    ![](img/a3dd2fbdd34f88affbf364777f25c839_21_0.png)


    Fig. (3). Python Shell.


    ## Anaconda Open-source Distribution


    Anaconda, a Python package manager, provides applications suitable for large data
    processing, scientific computing, *etc*. It works for both Python and R programming
    languages. It provides various development platforms like JupyterLab, Jupyter,
    Notebook, Spyder, Glue, Orange, RStudio, and Visual Studio Code.


    ## Installing Anaconda on Windows


    1. Visit the official website of Anaconda: https://www.anaconda.com/distribution/#download.
    Fig. (4) depicts the site page. This link will prompt you to select the operating
    system on which you require Anaconda to be installed. Selecting the operating
    system would lead to the automatic downloading of the executable file.

    2. Download the executable file. Run the installer on your computer.


    ![](img/a3dd2fbdd34f88affbf364777f25c839_22_0.png)


    Fig. (4). Anaconda site page for Windows.


    3. Once you select to download Anaconda, you will be prompted to agree to the
    license. Select the *I Agree* button to proceed.

    4. You will be prompted to select *Add path* to the environment. Further, it will
    also prompt you to select where you want to install the Anaconda. Browse the installation
    destination and click *Next*.

    5. In the next step select the installation type. In this, you get to select the
    user type for which the installation is to be done. It prompts two options, *Just
    me* or *All Users*. The former is used for the current user account and the latter
    is used for all users in the system, but it requires the users to consider administrator
    privileges. After selecting the type of installation, click on *Next*.

    6. Installation begins with the progress bar displaying the package being installed.
    In this window, there is a *Show Details* button from where you can check the
    progress of the installation along with the packages installed so far. After the
    installation is complete the window will display the "*Completed*" message.

    7. Once the installation is complete, Anaconda provides two checkboxes one for
    starting the distribution tutorial and another to start with the Anaconda. Click
    on the *Finish* button to start the Anaconda shell.

    8. You can open the Anaconda Navigator after the successful installation. In that
    Navigator, there will be several platforms available to start the coding. Over
    here we will focus on **Jupyter** and **Spyder** platforms.


    ## Installing Anaconda on Linux


    1. You can also download the file from the *curl* and *wget* retrieval commands.

    2. Run the shell script using the bash command.

    3. You will be prompted to select the destination folder and other settings during
    the installation. For Linux systems, keep the standard settings.

    4. After installation, create an environment to install packages. You can also
    build an individual environment for each project.


    ## First Python Program


    In this section, we will write the first program using **Spyder**. Open Anaconda
    Navigator and select Spyder. Click on the “Launch” button present below the Spyder
    logo. Spyder IDE will open. Spyder IDE consists of three sections. The left pane
    is the workspace where you write code. The right pane is divided into two sections.
    The upper section is used for variables and object analysis. The lower pane is
    the console where the output occurs after successfully compiling the code. In
    IDE, you can write the following code in the left pane and execute it to see the
    result on the console.


    Another very common application used for Python programming is **Jupyter**. Click
    on the launch button below the icon of Jupyter. It will prompt to the list of
    folders as depicted in Fig. (5). You can click on the “New” button to start the
    new Jupyter Notebook. The Jupyter Notebook is depicted in Fig. (6). You can type
    your code in the workspace and run each cell to get the output.


    ![](img/a3dd2fbdd34f88affbf364777f25c839_23_0.png)


    Fig. (5). Jupyter Home.'
