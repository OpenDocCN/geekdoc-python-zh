    possible to edit it after it has been created, it may be repeated, and it has
    components that are not found anywhere else. The order in which the items are
    presented in a set is indeterminate, hence the return sequence may be in an alternative
    order. The built-in method `set()` is used to specify the set data type; alternatively,
    a series of items may be given between the curly braces and delimited by commas
    to build the set. It is capable of holding a wide variety of values.


