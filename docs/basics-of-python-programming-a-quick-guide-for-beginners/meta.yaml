    # CHAPTER 3


    # Control Flow


    **Abstract:** It''s now the time for the readers to acquaint themselves with the
    control flow in the programming. So far the users have seen the linear path of
    execution, where the execution commences from the top and moves sequentially to
    the bottom. Further, our world is filled with tasks required to run in loops,
    for example in banking applications, unless the user enters the correct password
    the system prompts the dialogue “Please enter the correct password”. In this chapter,
    we introduce the concept of control flow through which the users can decide the
    execution path for the program and the looping constructs to iterate through the
    tasks. Our key takeaways from this chapter are listed below:


    +   1. Understanding the decision control statements.

    2. Programming with *if-else* ladder and its variants.

    3. A hand on *for*, and *while* loop statements.

    4. Understanding the control flow alterations the *jump* statements like *break*,
    *continue* and *pass*.


    **Keywords:** Control flow, Conditional processing, Looping constructs.


    # INTRODUCTION


    The control flow of a program is illustrated by a statement known as a control
    flow statement. In addition, it determines the sequence in which the code of the
    program is executed. Conditional statements, loops, and function calls are the
    primary mechanisms that direct how a Python program executes its instructions.
    Python programming utilizes three distinct types of control structures in its
    many applications.


    +   1. Sequential statements

    2. Decision control statements

    3. Looping statements


    # SEQUENTIAL STATEMENTS


    It uses a default mode because the control will move line by line in a program.
    Moreover, it is a series of statements that are executed in a sequence.'
