    # Accessing Dictionary Values


    Accessing any value in a dictionary is accomplished by using *key* names but accessing
    values in other forms of data is accomplished by indexing. To retrieve the values
    associated with a key, you can use the name of the key enclosed in square brackets
    []. The detailed syntax below may be utilized to obtain any value connected with
    the key in the dictionary.


    # Syntax:


    ```

    Dictionaryname[keyname]

    ```


    # Example:


    ```

    1.  # Creating a dictionary

    2.  D1= {

    3.      101 : "James",

    4.      102 : "William",

    5.      103 : "John",

    6.      104 : "Sam",

    7.      }

    8.  # Retrieving values associated with keys

    9.  print (''101:'',D1[101])

    10. print (''103:'',D1[103])

    11. print (''104:'',D1[104])

    ```


    # Output:


    ```

    101: James


    103: John


    104: Sam

    ```


