- md: "## User-defined Exceptions\n\nYou may create your own exceptions by creating\
    \ classes from the built-in exceptions in Python. Programmers can invoke their\
    \ exceptions by developing a new exception class. Inheritance from the Exception\
    \ class is required for exceptions, either directly or indirectly. An illustration\
    \ of a user-defined exception may be seen in the code below:\n\n### Example:\n\
    \n```python\n# define Python user-defined exceptions\nclass SeniorCitizenException(Exception):\n\
    \    \"Raised when age is less than 60\"\n    pass\nage = 60\ntry:\n    yr_age\
    \ = int(input(\"Enter your age: \"))\n    if yr_age >= age:\n        print(\"\
    Senior citizen\")\n        print(\"Eligible\")\n    else:\n        raise SeniorCitizenException\n\
    except SeniorCitizenException:\n    print(\"Exception occurred: Not eligible\"\
    )\n```\n\n### Output:\n\n```\n--------------------------------Running the program\
    \ with following inputs--------------------------------\n\nEnter your age: 45\n\
    \nException occurred: Not eligible\n\nEnter your age: 65\n\nSenior citizen\n\n\
    Eligible\n```\n\nIn the example above, we create a custom exception **SeniorCitizenException**\
    \ defined in a class derived from the built-in Exception class. When the user's\
    \ age is less than 60, an exception is generated, and the rest of the statements\
    \ in the try block are skipped. The user-defined exception *SeniorCitizenException*\
    \ activates the except block, and the statement inside this block is executed.\n\
    \n## CONCLUDING REMARK\n\nIn this chapter, we discussed Exception handling in\
    \ Python. We also discussed the uses of try, except, else, and finally blocks\
    \ for managing exceptions. In the next chapter, we will discuss the concepts of\
    \ Modules and packages.\n\n## CHAPTER 9\n\n## Modules and Packages\n\n**Abstract:**\
    \ Useful codes are often stored as separate files to increase modularity and reusability.\
    \ Modules refer to a single file of code while a package is a collection of modules.\
    \ A good programmer utilises both these aspects to enhance the program view and\
    \ manage the hierarchy. In this chapter, we introduce the basics of working with\
    \ the modules and packages.\n\n**Keywords:** Scoping, Modular programming, Standalone\
    \ script.\n\n## INTRODUCTION\n\n## MODULES\n\nA complicated and unmanageable program\
    \ can be broken down into several manageable subprograms, each referred to as\
    \ a **module** through modular programming. One activity can be carried out by\
    \ utilizing each component individually. The creation of modules in Python may\
    \ be accomplished by utilizing Python files, which can include a variety of *and*\
    \ statements. It is possible to define variables, classes, and functions in a\
    \ module. A module can also make use of code that is executable. When the code\
    \ is divided into modules, it is much simpler to comprehend and more convenient\
    \ to utilize. Additionally, it logically arranges the code.\n\nTo put it another\
    \ way, the file containing our Python source code with the extension (.py) is\
    \ considered the module. Python modules can store code that can be executed. When\
    \ we want to use the features of one module in another, we must import the specific\
    \ module first. Let's say you've generated a file on your computer named **module1.py**,\
    \ and inside it, you have the following code:\n\nFilename: module1.py\n\n```python\n\
    #(module1.py)\ndef add_value (x, y):\n    return (x+y)\ndef sub_value (x, y):\n\
    \    return (x-y)\n```\n\nTo call the functions *add_value()* and *sub_value()*\
    \ specified in the module named file (**module1.py**), we must include this module\
    \ in our main module. To use the module's functionality, we must first load it\
    \ into our Python code. Python has ***import*** and ***from..import*** statement\
    \ to include a module.\n\n### Import Statement\n\nOur Python program can connect\
    \ to a module by utilizing an import statement. The import of many modules may\
    \ be accomplished with a single import line; however, despite the number of times\
    \ a module has been imported into our register, it is only loaded once each time.\
    \ The syntax of the import statement is as follows:\n\n### Syntax:\n\n```python\n\
    import module1, module2, module3, ....... module n\n```\n\nWhen an import statement\
    \ is found the interpreter imports the module specified within the search path.\
    \ The interpreter explores every directory in the search path when importing a\
    \ module. For instance, add the following line to the program's top to import\
    \ the module **module1.py**.\n\n### Example:\n\n```python\n# importing module\
    \ module1.py\nimport module1\nprint (add_value (2, 4))\nprint (sub_value (10,\
    \ 50))\n```\n\n### Output:\n\n```\n6\n60\n```\n\n### From...Import Statement\n\
    \nPython enables users to import only a module's specified properties into the\
    \ namespace rather than the entire module. For this, the from...import statement\
    \ may be utilized. The following syntax makes use of the *from...import* expression.\n\
    \n### Syntax:\n\n```python\nfrom <module_name> import <name_1>, <name_2>...<name_n>\n\
    ```\n\nConsider the following module, **module 1**, which includes the functions\
    \ *add_value()* and *sub_add()*.\n\n### Example:\n\nFilename: module1.py\n\n```python\n\
    # module1.py\ndef add_value(x, y):\n    return (x+y)\ndef sub_value(x, y):\n \
    \   return (x-y)\n```\n\nIf we want to import only *add_value()* function from\
    \ this module, then the following code will be used.\n\nFilename: main.py\n\n\
    ```python\n# importing add_value()from module1.py\nfrom module1 import add_value()\n\
    print (add_value(100, 200))\n```\n\n### Output:\n\n```\n300\n```\n\nWe can also\
    \ import any built-in module in our program. The below example imports the **pi**\
    \ function from the *math* module.\n\n### Example:\n\n```python\n#importing pi\
    \ from the math module\nfrom math import pi\nprint (\"pi value=\", pi)\n```\n\n\
    ### Output:\n\n```\npi value= 3.141592653589793\n```\n\nThe **from...import**\
    \ statement may be used if we know the properties that need to be imported from\
    \ the module in advance. * may also be used to import all of a module's attributes,\
    \ which won't make our code any larger. Look at the example below, where all *module1*'s\
    \ functions are imported.\n\n### Example:\n\nFilename: main.py\n\n```python\n\
    # importing all attributes from module1.py\nfrom module1 import *\nprint (add_value(10,\
    \ 20))\nprint (sub_value(100, 50))\n```\n\n### Output:\n\n```\n30\n50\n```\n\n\
    ### Renaming A Module\n\nPython allows us to import modules with specific names\
    \ and then use those names to refer to those modules in our source code. To rename\
    \ a module in Python code **as** keyword is used. The syntax for renaming a module\
    \ is as follows:\n\n### Syntax:\n\n```python\nimport <module-name> as <new-name>\n\
    ```\n\n### Example:\n\n```python\n# importing module1.py\nimport module1 as mm\
    \ # rename module1 to mm\nprint (mm.sub_value(20, 10))\nprint (mm.add_value(100,\
    \ 20))\n```\n\n### Output:\n\n```\n>>> dir(module1)\n['__builtins__',\n'__cached__',\n\
    '__doc__',\n'__file__',\n'__initializing__',\n'__loader__',\n'__name__',\n'__package__',\n\
    'add_value',\n'sub_value']\n```\n\n### Dir() Built-In Function\n\nThe *dir()*\
    \ function can be used to find names specified within a module. In module *module\
    \ 1*, for example, we've specified two functions: *add_value()* and *sub_value()*.\
    \ In the *module1* module, we can use *dir()* as follows:\n\n```python\n>>> dir(module1)\n\
    ['__builtins__',\n'__cached__',\n'__doc__',\n'__file__',\n'__initializing__',\n\
    '__loader__',\n'__name__',\n'__package__',\n'add_value',\n'sub_value']\n```\n\n\
    Here, we can see a list of names that have been sorted (along with *add_value*\
    \ and *sub_value*). The module's default Python characteristics may be identified\
    \ by their names, beginning with an **underscore (_)** character. Finding all\
    \ of the names that are specified in our current namespace may be accomplished\
    \ by using the *dir()* function without passing any parameters to it.\n\n### Example:\n\
    \n```python\n> import math\n\n> dir()\n\n['__annotations__', '__builtins__', '__doc__',\
    \ '__loader__', '__name__', '__package__', '__spec__', 'math']\n```\n\n### Reload\
    \ () Function\n\nAs stated earlier, a module is only loaded once, regardless of\
    \ how often it is imported into the Python source file. However, Python gives\
    \ us the *reload()* function to reload a module that has already been imported\
    \ and rerun the top-level code. The following syntax takes advantage of the *reload()*\
    \ method.\n\n### Syntax:\n\n```python\nreload(<module-name>)\n```\n\n### Example:\n\
    \n```python\nreload(module1)\n```\n\n### Built-In Modules\n\nIn addition to built-in\
    \ functions, libraries included with Python releases also offer many pre-defined\
    \ functions. Built-in modules describe the tasks that are specified in modules.\
    \ Built-in modules developed in C are incorporated into the Python shell. Resources\
    \ for system-specific tasks like OS administration, disc I/O, and other similar\
    \ tasks are included in each built-in module. The standard library also contains\
    \ many Python scripts with the *.py* extension that provide practical utility.\
    \ To view a complete listing of all available modules, the following command is\
    \ used:\n\n```python\nhelp('modules')\n```\n\nSome commonly used built-in modules\
    \ include:"
  mdcn: "## 用户自定义异常\n\n你可以通过从Python内置异常创建类来创建自己的异常。程序员可以通过开发新的异常类来调用它们的异常。异常必须直接或间接地继承自Exception类。下面的代码展示了一个用户自定义异常的示例：\n\
    \n### 示例：\n\n```python\n# 定义Python用户自定义异常\nclass SeniorCitizenException(Exception):\n\
    \    \"当年龄小于60岁时引发\"\n    pass\nage = 60\ntry:\n    yr_age = int(input(\"请输入您的年龄：\"\
    ))\n    if yr_age >= age:\n        print(\"老年人\")\n        print(\"符合条件\")\n \
    \   else:\n        raise SeniorCitizenException\nexcept SeniorCitizenException:\n\
    \    print(\"发生异常：不符合条件\")\n```\n\n### 输出：\n\n```\n--------------------------------使用以下输入运行程序--------------------------------\n\
    \n请输入您的年龄：45\n\n发生异常：不符合条件\n\n请输入您的年龄：65\n\n老年人\n\n符合条件\n```\n\n在上面的示例中，我们创建了一个自定义异常**SeniorCitizenException**，它定义在一个派生自内置Exception类的类中。当用户年龄小于60岁时，会生成一个异常，并跳过try块中其余的语句。用户自定义异常*SeniorCitizenException*激活了except块，并执行该块内的语句。\n\
    \n## 总结\n\n在本章中，我们讨论了Python中的异常处理。我们还讨论了try、except、else和finally块在管理异常方面的用途。在下一章中，我们将讨论模块和包的概念。\n\
    \n## 第9章\n\n## 模块和包\n\n**摘要：** 有用的代码通常被存储为单独的文件，以提高模块化和可重用性。模块指的是单个代码文件，而包是模块的集合。优秀的程序员会利用这两个方面来增强程序的结构并管理层次结构。在本章中，我们将介绍使用模块和包的基础知识。\n\
    \n**关键词：** 作用域，模块化编程，独立脚本。\n\n## 引言\n\n## 模块\n\n通过模块化编程，一个复杂且难以管理的程序可以被分解成几个易于管理的子程序，每个子程序被称为一个**模块**。每个组件可以单独使用来执行一项活动。在Python中创建模块可以通过使用Python文件来实现，这些文件可以包含各种*和*语句。可以在模块中定义变量、类和函数。模块也可以使用可执行的代码。当代码被划分成模块时，它更容易理解，也更方便使用。此外，它还能逻辑地组织代码。\n\
    \n换句话说，包含我们Python源代码且扩展名为(.py)的文件被视为模块。Python模块可以存储可执行的代码。当我们想在另一个模块中使用某个模块的功能时，必须先导入该特定模块。假设你在计算机上生成了一个名为**module1.py**的文件，其中包含以下代码：\n\
    \n文件名：module1.py\n\n```python\n#(module1.py)\ndef add_value (x, y):\n    return\
    \ (x+y)\ndef sub_value (x, y):\n    return (x-y)\n```\n\n要调用名为文件（**module1.py**）的模块中指定的函数*add_value()*和*sub_value()*，我们必须将此模块包含在我们的主模块中。要使用模块的功能，我们必须首先将其加载到我们的Python代码中。Python有***import***和***from..import***语句来包含模块。\n\
    \n### Import语句\n\n我们的Python程序可以通过使用import语句来连接到模块。可以使用一行import语句导入多个模块；然而，无论一个模块被导入到我们的寄存器中多少次，它每次只加载一次。import语句的语法如下：\n\
    \n### 语法：\n\n```python\nimport module1, module2, module3, ....... module n\n```\n\
    \n当找到import语句时，解释器会导入在搜索路径中指定的模块。解释器在导入模块时会探索搜索路径中的每个目录。例如，在程序顶部添加以下行以导入模块**module1.py**。\n\
    \n### 示例：\n\n```python\n# 导入模块 module1.py\nimport module1\nprint (add_value (2,\
    \ 4))\nprint (sub_value (10, 50))\n```\n\n### 输出：\n\n```\n6\n60\n```\n\n### From...Import语句\n\
    \nPython允许用户仅将模块的指定属性导入到命名空间中，而不是整个模块。为此，可以使用from...import语句。以下语法使用了*from...import*表达式。\n\
    \n### 语法：\n\n```python\nfrom <module_name> import <name_1>, <name_2>...<name_n>\n\
    ```\n\n考虑以下模块**module 1**，它包含函数*add_value()*和*sub_add()*。\n\n### 示例：\n\n文件名：module1.py\n\
    \n```python\n# module1.py\ndef add_value(x, y):\n    return (x+y)\ndef sub_value(x,\
    \ y):\n    return (x-y)\n```\n\n如果我们只想从此模块导入*add_value()*函数，那么将使用以下代码。\n\n文件名：main.py\n\
    \n```python\n# 从 module1.py 导入 add_value()\nfrom module1 import add_value()\n\
    print (add_value(100, 200))\n```\n\n### 输出：\n\n```\n300\n```\n\n我们也可以在程序中导入任何内置模块。下面的示例从*math*模块导入**pi**函数。\n\
