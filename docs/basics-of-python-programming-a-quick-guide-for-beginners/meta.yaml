  md: '# Subtraction (-) Operator


    The symbol – (minus) is used while using this operator. It uses two operands,
    and this operator subtracts the value and returns the result. For example, a=4,
    b=2, then a - b returns 2.


    # Multiplication (*) Operator


    The symbol * is used while using this operator. It operates between two operands,
    and this operator multiplies these values and returns the result. For example,
    a=4, b=2, then a*b returns 8.


    # Division (/) Operator


    The symbol (/) uses while using this operator. It uses two operands; this operator
    divides the value and returns the result. For example, a=4, b=2, then a / b returns
    2.


    # Modulus (%) Operator


    The symbol % is used while using this operator. It uses two operands, and this
    operator returns the remainder. For example, a=4, b=2, then a % b returns 0.


    # Exponent (**) Operator


