  md: "# Syntax:\n\n```\ndef func_name(): <-\n    |\n    | (recursive call)\n    |\n\
    \    func_name() ----\n```\n\nThe followings are the advantages and disadvantages\
    \ of a recursive function:\n\n# Advantages\n\n+   - Using recursion, a function\
    \ can be broken down into smaller sub-problems.\n- Often creating a sequence is\
    \ more straightforward than nested iteration.\n- The use of recursive functions\
    \ makes the code appear simple and efficient.\n\n# Disadvantages\n\n+   - Recursive\
    \ calls use a lot of memory and time, which is why they are costly.\n- Debugging\
    \ recursive functions is difficult.\n- The logic behind recursion can be challenging\
    \ to understand at times.\n\n# Example:\n\n```\n1.  # Program for Fibonacci series\
    \ up to k terms\n2.  def fib(k):    # Recursive function\n3.      if k <= 1:\n\
    4.          return k\n5.      else:\n6.          return(fib(k-1) + fib(k-2))\n\
    7.  \n8.  term=8\n9.  if term <= 0:\n10.     print (\"Invalid input ! Please input\
    \ a positive value\")\n11. else:\n12.     print (\"Fibonacci series:\")\n13. \
    \    for i in range(term):\n14.         print (fib(i))\n```"
