    \n## BASIC PYTHON PROGRAM\n\n### Program to Solve a Quadratic Equation\n\n####\
    \ Example:\n\n```\n1. # Import complex math module\n2. import cmath\n3. a = input('Enter\
    \ your choice: ')\n4. b =input('Enter your choice: ')\n5. c = input('Enter your\
    \ choice: ')\n\n6. # Calculate the discriminant\n7. d = (b**2) - (4*a*c)\n\n8.\
    \ # Find two solutions\n9. sol1 = (-b-cmath.sqrt(d))/(2*a)\n10. sol2 = (-b+cmath.sqrt(d))/(2*a)\n\
    11. print('The solution are {0} and {1}'.format(sol1,sol2))\n```\n\n#### Output:\n\
    \n```\nEnter a: 1\nEnter b: 2\nEnter c: -15\nThe solution are (-5+0j) and (3+0j)\n\
    ```\n\n### Program to Swap Two Numbers\n\n#### Example:\n\n```\n1. P = int( input(\"\
    Please enter value for P: \"))\n2. Q = int( input(\"Please enter value for Q:\
    \ \"))\n3. # To swap the value of two variables\n4. # We will user third variable\
    \ which is a temporary variable\n5. temp_1 = P\n6. P = Q\n7. Q = temp_1\n8. print\
    \ (\"The Value of P after swapping: \", P)\n9. print (\"The Value of Q after swapping:\
    \ \", Q)\n```\n\n#### Output:\n\n```\nPlease enter value for P: 21\nPlease enter\
    \ value for Q: 81\nThe Value of P after swapping: 81\nThe Value of Q after swapping:\
    \ 21\n```\n\n### Program to Find the Factorial of Two Numbers\n\n#### Example:\n\
    \n```\n1. num = int(input(\"Enter a number: \"))\n2. factorial = 1\n3. if num\
    \ < 0:\n4.     print(\" Factorial does not exist for negative numbers\")\n5. elif\
    \ num == 0:\n6.     print(\"The factorial of 0 is 1\")\n7. else:\n8.     for i\
    \ in range(1,num + 1):\n9.         factorial = factorial*i\n10.     print(\"The\
    \ factorial of\",num,\"is\",factorial)\n```\n\n#### Output:\n\n```\nEnter a number:\
    \ 9\nThe factorial of 9 is 362880\n```\n\n### Program for Fibonacci Series Using\
    \ Recursion\n\n#### Example:\n\n```\n1. def recur_fibo(n):\n2.     if n <= 1:\n\
    3.         return n\n4.     else:\n5.         return(recur_fibo(n-1) + recur_fibo(n-2))\n\
    6. \n7. nterms = int(input(\"How many terms? \"))\n8. # Check if the number of\
    \ terms is valid\n9. if nterms <= 0:\n10.     print(\"Plese enter a positive integer\"\
    )\n11. else:\n12.     print(\"Fibonacci sequence:\")\n13.     for i in range(nterms):\n\
    14.         print(recur_fibo(i))\n```\n\n#### Output:\n\n```\nHow many terms?\
    \ 5\nFibonacci sequence:\n0\n1\n1\n2\n3\n```\n\n### Sorting Elements of Array\
    \ in Ascending Order\n\n#### Example:\n\n```\n1. arr = [2,8,6,41,35,7];\n2. temp\
    \ = 0;\n3. print(\"Elements of original array: \");\n4. for i in range(0, len(arr)):\n\
    5.     print(arr[i], end=\" \");\n6. #Sort the array in ascending order\n7. for\
    \ i in range(0, len(arr)):\n8.     for j in range(i+1, len(arr)):\n9.        \
    \ if(arr[i] > arr[j]):\n10.            temp = arr[i];\n11.            arr[i] =\
    \ arr[j];\n12.            arr[j] = temp;\n13. print();\n14. print(\"Elements of\
    \ array sorted in ascending order: \");\n15. for i in range(0, len(arr)):\n16.\
