    ,f10.name)\n```\n\n## Output:\n\n```\nStatus: False\nEncoding style: UTF-8\nMode:\
    \ a+\nName: demo2.txt\n```\n\n## File Positions\n\nWhen we use Python to open\
    \ a file for reading, we are provided with a file handle that includes a reference\
    \ to the beginning of the file. When we read from the file, the pointer will always\
    \ point to the end of the reading, and the beginning of the following read will\
    \ be at that location. The following methods are used, respectively, to acquire\
    \ the current file position and alter the current file position:\n\n- The **tell()**\
    \ method returns the current file position; in other words, the next read or write\
    \ will occur at that many bytes from the file's beginning.\n- The **seek(offset[,\
    \ from])** method is used to adjust the file's current location. The number of\
    \ bytes to be moved is defined by the offset statement. The from statement determines\
    \ the starting point for the bytes to be transferred from.\n\nIf from is set to\
    \ **0** in the **seek()** function, the file's beginning will be used as the reference\
    \ position, **1** the current position will be used as the reference position,\
    \ and **2** the file's end will be used as a reference position.\n\n## Example:\n\
    \n```\n1. # Open the file in write mode\n2. f_1 = open(\"demo3.txt\", \"w\")\n\
    3. f_1.write(\"Python tools can be classified into two categories, general-purpose\
    \ tools, and functional tools. \\n\")\n4. f_1.writelines(\"Python has full-fledged\
    \ support for a vast variety of built-in objects - types. \\n\")\n5. f_1.writelines(\"\
    Python considers memory as the private heap. \\n\")\n6. f_1.writelines(\"Python\
    \ community support is quite active and responsive \\n\")\n7. f_1.close() #to\
    \ change file access modes\n8. f_1= open(\"demo3.txt\", \"rb\")\n9. print(\"Position\
