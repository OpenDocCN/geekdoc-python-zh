    2. new_list = list(map(lambda x: x + 2, my_list))

    3. print(new_list)

    ```


    # Output:


    [4, 5, 8, 9, 10, 12]


    # Imperative


    This style is used explicitly for various operations on data structures. It requires
    a pre-definition of the order of operations.


    # Example:


    ```

    1. my_list = [2,3,6,7,8,10]

    2. sum = 0

    3. for x in my_list:

    4. sum += 2*x

    5. print(sum)

    ```


    # Output:


    72'
