  md: '# CHAPTER 10


    # Object-Oriented Programming


    **Abstract:** In this chapter, we explore the OOP concepts in programming that
    offer an effective way of making coding more easy and comprehensive. It facilitates
    redundancy and allows customizing the existing code.


    **Keywords:** Namespace, Superclass and Subclass.


    # INTRODUCTION


    Object-Oriented Programming, sometimes called OOP, organizes a computer program''s
    components into distinct objects with similar characteristics and functions. Classes
    and objects are the fundamental building blocks of object-oriented programming.
    The class serves as the blueprint, while the objects themselves are living, breathing
    entities capable of carrying out various operations. An object is composed of
    its data elements, characteristics, and behaviour, which may include actions or
    functions.


    In procedural programming, a program is structured similar to a recipe by providing
    several stages, including functions and code blocks, that flow sequentially to
    achieve a goal. This programming paradigm is one of the most common programming
    paradigms. Python has always been object-oriented, much like other languages designed
    for general-purpose programming. It makes it possible for us to construct programs
    using an object-oriented methodology. Python makes it very simple to create and
    work with objects and classes. An object-oriented paradigm refers to building
    software by utilizing classes and objects. The item is connected to things in
    the real world, such as a computer, a house, a mobile phone, and so on. The definition
    of OOPS emphasizes the creation of code that may be reused. Putting together new
    things to use as solutions is a frequently utilized strategy. An object-oriented
    programming paradigm can be broken down into its core ideas, which are as follows.'
