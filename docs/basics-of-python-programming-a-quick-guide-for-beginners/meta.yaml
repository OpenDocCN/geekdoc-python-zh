    # Procedural


    It is the most adopted style by nonprogrammers. It primarily focuses on the code.
    The entire code is divided into a list of instructions, like breaking a problem
    into simpler tasks. It uses sequencing, selection, modularization, and iteration
    to reduce code redundancy.


    # Example:


    ```

    1. my_list = [2,3,6,9,18,20]

