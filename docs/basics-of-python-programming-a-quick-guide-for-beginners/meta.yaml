    When we construct a function and then call that function within the definition
    of the function, we have created a recursive code. Recursion is the name given
    to the process in which a function calls itself. Programming using recursion is
    a very effective method; nevertheless, it is important to keep in mind that the
    recursion must be stopped at some point. It is a sign that the code functions
    accurately if the ending condition can be found within the recursion. If the termination
    condition is absent, it indicates that the recursive code will execute an unlimited
    number of times.'
