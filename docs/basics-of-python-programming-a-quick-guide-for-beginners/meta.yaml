- md: "## CONSTRUCTORS\n\nA constructor is a particular type of function that is used\
    \ to initialize the class's instance members. The constructor in C++ or Java has\
    \ the same name as the class, but Python handles constructors differently. When\
    \ we create an object of a class, the constructor function executes. In Python,\
    \ the constructor is defined using the `__init__()` method. It takes the `self`\
    \ keyword as a first argument, allowing access to the class's attributes and methods.\
    \ Depending on the `__init__()` definition, we can pass any number of arguments\
    \ when constructing the class object. It's mainly used to set up the class attributes.\
    \ Every class must have a default constructor if we have not defined any other\
    \ constructor.\n\n## Example:\n\n```python\n# Creating a class book\nclass Course:\n\
    \    #defining constructor\n    def __init__(self,l,e,s):\n        print('Constructor\
    \ example')\n        self.lec = l\n        self.enroll = e\n        self.sub=\
    \ s\n\n    # creating function\n    def fun(self):\n        print('No.of scheduled\
    \ lectures:', self.lec)\n        print('Enrolled students:', self.enroll)\n  \
    \      print('Year:', self.sub)\n\n# Object creation and passing arguments to\
    \ constructor\nd_1 = Course(30, 200, \"Python\")\nd_2= Course(45, 150, \"C++\"\
    )\n# Accessing class attribute and method through objects\nprint ('-----Values-------')\n\
    d_1.fun()\nd_2.fun()\n```\n\n## Output:\n\n```\nConstructor example\n\nConstructor\
    \ example\n\n-----Values-----\n\nNo.of scheduled lectures: 30\n\nEnrolled students:\
    \ 200\n\nYear: Python\n\nNo.of scheduled lectures: 45\n\nEnrolled students: 150\n\
    \nYear: C++\n```\n\nWhen we do not want to update the value or have self as an\
    \ argument, we use the non-parameterized constructor. The below code shows an\
    \ example of the non-parameterized constructor.\n\n## Example:\n\n```python\n\
    class demo:\n    def __init__(self):  # default constructor\n        self.stat\
    \ = \"Joe sat on the chair.\"\n    # function for print\n    def show(self):\n\
    \        print(self.stat)\n\n# Object for the class\nd1 = demo()\n\n# calling\
    \ instance\nd1.show()\n```\n\n## Output:\n\n```\nJoe sat on the chair.\n```\n\n\
    ## Parameterized Constructor\n\nThe parameterized constructor contains many parameters\
    \ in addition to the self. The parameterized constructor is demonstrated in the\
    \ Python code below:\n\n## Example:\n\n```python\nclass demo:\n    # Parameterised\
    \ constructor\n    def __init__(self, arg1):\n        print(\"This is parametrized\
    \ constructor\")\n        self.arg1= arg1\n    def show(self, adv):\n        print(\"\
    Joe went\", self.arg1, adv)\n\nd1 = demo(\"school\")\nd1.show(\"today\")\n```\n\
    \n## Output:\n\n```\nThis is parametrized constructor\nJoe went school today\n\
    ```\n\n## Default Constructor\n\nThe default constructor is used when no constructor\
    \ is included in the class or is not declared. It defines the objects' initial\
    \ values. The below example demonstrates the concept of a default constructor.\n\
    \n## Example:\n\n```python\nclass test:\n    chk= \"undone\"\n\n    def assign(self):\n\
    \        print(self.chk)\n# object of class\nv1 = test()\n# calling the instance\
    \ method\nv1.assign()\n```\n\n## Output:\n\n```\nundone\n```\n\n## INHERITANCE\
    \ IN PYTHON\n\nInheritance is an essential part of the object-oriented framework\
    \ that we will be using. Inheritance enables us to recycle the program's code\
    \ since we do not have to start from zero when creating new classes; instead,\
    \ we can utilize an existing class as a foundation. The child class acquires access\
    \ to all of the data members and functions described in the parent class, and\
    \ it also inherits the attributes present in the parent class. A child class can\
    \ have its take on how the parent class's functions should be implemented. Python\
    \ may allow a derived class to inherit a base class by simply specifying the base\
    \ class after the name of the derived class and surrounding it with brackets.\
    \ Use the syntax indicated below in order to inherit properties and behaviours\
    \ from a base class into a derived class.\n\nSyntax:\n\n```\nclass <derived-class_Name>\
    \ (base-class_Name):\n    # derived class body\n```\n\nA derived class can inherit\
    \ properties from more than one base class. It is possible to do this form of\
    \ inheritance by naming all base classes within the brackets. Inheriting properties\
    \ from numerous classes may be accomplished using the syntax below:\n\nSyntax:\n\
    \n```\nclass <derive-class_name> (<base-class 1>, <base-class 2>, ..... <base-class\
    \ n>):\n    # derived class body\n```\n\n## Example:\n\n```python\n#creating base\
    \ class\nclass student():\n    # Function inside base class\n    def course(self,arg1):\n\
    \        print ('-----Base class function-------')\n        self.arg1=arg1\n \
    \       print ('Course name:', self.arg1)\n\n# Inherited class\nclass enroll(student):\n\
    \    # Function inside derived class\n    def is_enroll(self,arg2):\n        print('--------Derived\
    \ class function----------')\n        self.arg2=arg2\n        print(\"enrollment:\"\
    , self.arg2)\nenr = enroll()                    # An Object for derived class\n\
    print(enr.is_enroll(\"Lui\"))\nprint(enr.course(\"python\"))\n```\n\n## Output:\n\
    \n```\n--------Derived class function----------\n\nenrollment: Lui\n\n-----Base\
    \ class function-------\n\nCourse name: python\n```\n\n## TYPES OF INHERITANCE\n\
    \nThere are four types of inheritance in Python, depending on the number of child\
    \ and parent groups involved. It includes single, multiple, multi-level, and hierarchical\
    \ inheritances.\n\n## Single Inheritance\n\nA derived class can inherit properties\
    \ from a single base class. This paves the way for code reutilization and the\
    \ addition of new capabilities to pre-existing code. The principle of single inheritance\
    \ is depicted here in Fig. (1).\n\n![Single Inheritance](img/a3dd2fbdd34f88affbf364777f25c839_235_0.png)\n\
    \nFig. (1). Single Inheritance.\n\n## Example:\n\n```python\n#creating base class\n\
    class student():\n    # Function inside base class\n    def grade(self,arg1):\n\
    \        print ('-----Base class function-------')\n        self.arg1=arg1\n \
    \       print ('grade:', self.arg1)\n\n# Inherited class\nclass enroll(student):\n\
    \    # Function inside derived class\n    def is_pass(self,arg2):\n        print('--------Derived\
