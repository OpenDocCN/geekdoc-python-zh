    > In a landscape where programming resources can be overwhelming, Basics of Python
    Programming: A Quick Guide for Beginners is an accessible, user-friendly, and
    effective learning companion. It''s an indispensable resource for anyone stepping
    into the vast realm of coding. It is highly recommended for beginners eager to
    begin their Python programming journey.


    **Dharmendra Singh Rajput**

    Vellore Institute of Technology

    India


    ![](img/a3dd2fbdd34f88affbf364777f25c839_280_0.png)


    # Krishna Kumar Mohbey


    Dr. Krishna Kumar Mohbey is an assistant professor of Computer Science at the
    Central University of Rajasthan, India. He received his Bachelor’s in computer
    application from the MCRPV Bhopal in 2006, Master’s in computer application from
    the Rajiv Gandhi Technological University Bhopal in 2009, and Ph.D. from the Department
    of Mathematics and Computer Applications from the National Institute of Technology
    Bhopal, India, in 2015. His areas of interest are data mining, mobile web services,
    big data analysis, and user behaviour analysis. He has published more than 50
    research articles in various journals and conferences of international repute.


    ![](img/a3dd2fbdd34f88affbf364777f25c839_280_1.png)


    # Malika Acharya


    Ms. Malika Acharya is a research scholar at the Central University of Rajasthan,
    India. She holds a bachelor’s degree in Technology (B.Tech) from Amity University
    Noida (2019) and a master’s degree in Technology (M.Tech) from Rajasthan Technical
    University (2021). She is currently a research scholar at Central University of
    Rajasthan, Department of Computer Science. Her research areas include big data
    analysis, data mining, machine learning, social networking, and recommendation
    systems. She has published research articles in various journals and conferences
    of international repute.'
