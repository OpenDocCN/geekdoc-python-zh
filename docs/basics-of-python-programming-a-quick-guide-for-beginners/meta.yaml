    ## OPERATORS


    In Python, the idea of carrying out anything from a computational perspective
    is called an operator. In this context, we use two different terminology forms:
    operators and operands. An operand is a value being operated on by an operator,
    and an operator is a symbol being executed with the assistance of the operands.
    It is a special kind of symbol that carries out an operation on its operands and
    returns the outcome of that action. Take statements **10 + 20** as an example
    to help you better comprehend the concept. The numbers 10 and 20 make up the operands,
    while the plus (+) sign is the operator. Therefore, the evaluation of this example
    will consist of a straightforward arithmetic expression, and the outcome will
    be the addition of two numbers. The various operators available in Python are
    enlisted below:


    - 1. Arithmetic Operators

    - 2. Relational Operators

    - 3. Assignment Operator

    - 4. Unary Operators

    - 5. Bitwise Operators

    - 6. Logical Operators

    - 7. Membership Operators

    - 8. Identity Operators


    ## Arithmetic Operators


    It performs the basic mathematical operation on the numeric operands. The arithmetic
    operators return the result, and the outcome depends on the type of operands you
    use in programming. Arithmetic operators are listed below:


    ### Addition (+) Operator


    The symbol + is used while using this operator. It uses two operands and adds
    the two values. For example, a=1, b=2, then a + b returns 3.


    ### Subtraction (-) Operator


    The symbol – (minus) is used while using this operator. It uses two operands,
    and this operator subtracts the value and returns the result. For example, a=4,
    b=2, then a - b returns 2.


    ### Multiplication (*) Operator


    The symbol * is used while using this operator. It operates between two operands,
    and this operator multiplies these values and returns the result. For example,
    a=4, b=2, then a*b returns 8.


    ### Division (/) Operator


    The symbol (/) uses while using this operator. It uses two operands; this operator
    divides the value and returns the result. For example, a=4, b=2, then a / b returns
    2.


    ### Modulus (%) Operator


    The symbol % is used while using this operator. It uses two operands, and this
    operator returns the remainder. For example, a=4, b=2, then a % b returns 0.


    ### Exponent (**) Operator


    The symbol ** is used while using this operator. It operates between two operands.
    It performs exponential (power) calculations on operators.


    For example, a=4, b=2, then a ** b means (4)². The result will be 8.


    ### Floor Division (//) Operator


    Floor division is like regular division but returns the highest possible integer.
    This integer is less than or equal to the outcome of normal division.


    For example, 7//2 = 3 and 7.0//2.0 = 3.0, -11//3 = -4, -11.0//3 = -4.0


    ### Example:


    ```

    1. a=4

    2. b=2

    3. f=a/b    #Division (/)

    4. print (f)

    5. g=a%b    # Modulus (%)

    6. print (g)

    7. h=a**b   #Exponent (**)

    8. print (h)

    9. i=a//b   #Floor Division (//)

    10. print (i)

    ```


    ### Output:


    ```

    2.0

    0

    16

    2

    ```


    ## Relational Operators


    They are used to compare the variables and output the relation. It is also called
    a comparison operator. This type of operator returns a Boolean value (True/False).
    There are various types of relational operators.


    ### Greater than (>) Operator


    It returns true if the left operand is greater than the right. Example, (a>b).


    ### Greater than or equal to (>=) Operator


    It returns true if the left operand is greater than or equal to the right. Example,
    (a>=b).


    ### Less than (<) Operator


    It returns true if the left operand is less than the right. Example, (a<b).


    ### Less than or equal to (<=) Operator


    It returns true if the left operand is less than or equal to the right. Example,
    (a<=b).


    ### Equal to (==) Operator


    It returns true if both operands are equal. Example, (a==b).


    ### Not equal to (!=) Operator


