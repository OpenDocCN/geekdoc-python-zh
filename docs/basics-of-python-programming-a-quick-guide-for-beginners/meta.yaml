    Fig. (2). Machine Learning Programming Paradigm.


    Self-learning is the crux of Machine Learning. The performance based on data extraction,
    preprocessing, and analysis without being explicitly programmed defines the objective
    of Machine Learning. It aims to facilitate the machine to work directly without
    being programmed. Decision-making is an important task that relies on pattern
    extraction and information modeling based on trial and error and probabilistic
    reasoning. Thus, one can say that decisions are not based on the pre-set rules
    but on the input data. To minimize the errors, the programmers can tweak model
    settings called hyperparameter tuning. For learning, the programmer splits the
    data into training and testing data. The training set helps to learn the patterns
    in the data and validate the results. Finally, the developed model can be evaluated
    over test data. The model can be deployed for other applications if the performance
    is satisfactory.


    Machine Learning has been divided into two categories based on the training procedure.
    If the machine is trained with the labeled training data, *i.e.*, the data that
    has been classified under different classes, then that type is called supervised
    learning. And, if the learning over training data is without human interference,
    *i.e.*, no defined classes, then that is called unsupervised learning. The difference'
