    # EXPRESSIONS


    Expression is a representation of value. Moreover, it combines values, variables,
    operators, and calls to functions. Expressions need to be evaluated. If you ask
    Python to print an expression, the interpreter evaluates it and displays the desired
    result. It is very different from the statements. A simple statement in Python
    is used for value assignment but it is not evaluated, whereas expressions are
    more logical content that is used in the evaluation. Python expressions only contain
    three things, Identifiers, Literals, and Operators.


    # Identifiers


    It can be any name that is used to define a class, function, variable module,
    or object.


    # Literals


    It can be string literals, byte literals, integer literals, floating-point literals,
    and imaginary literals.


    # Operators


    Based on the token or symbol, it can evaluate an operation. There are various
    operators, as discussed above, and their corresponding tokens can be used to implement
    any expression.'
