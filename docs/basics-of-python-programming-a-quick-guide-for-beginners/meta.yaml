  md: '# Procedural


    It is the most adopted style by nonprogrammers. It primarily focuses on the code.
    The entire code is divided into a list of instructions, like breaking a problem
    into simpler tasks. It uses sequencing, selection, modularization, and iteration
    to reduce code redundancy.


    # Example:


    ```

    1. my_list = [2,3,6,9,18,20]

    2. def add(list):

    3. sum = 0

    4. for x in the list:

    5. sum += x

    6. return sum

    7. print(add(my_list))

    ```


    # Output:


    ```

    36

    ```


    # Object-oriented


    In the procedural style, the focus was on the given code, but in this style, the
    focus is on the data. The merit of this style is the formation of a class paradigm
    and adherence to object-oriented principles like abstraction, inheritance, polymorphism,
    and encapsulation.


    # Example:


    ```

    1. class A:

    2. def test(self,a,b):

    3. return(a+b)

    4. b=A()

    5. print("res=", b.test(45,77))

    ```


    # Output:


    ```

    res=122

    ```'
