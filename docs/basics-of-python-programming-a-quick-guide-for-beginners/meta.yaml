    A dictionary is a collection of “key-value pairs”. Each key-value pair connects
    the key to the value that corresponds to it. In this chapter, you will learn about
    various operations and attributes that can be used with dictionaries and tuples.
    In addition, the many features and actions of dictionaries and tuples are broken
    down and illustrated using examples and codes.


    # TUPLE


    A tuple is a group of ordered, immutable items arranged in a specific way. Tuples
    are structured similarly to lists and strings. In this context, the definition
    of immutable is that the components of the tuple are not subject to change. Once
    a tuple has been generated, it is not possible to add or remove items from the
    tuple. Even we cannot change the order in which the tuple members are presented.
    In addition, the length of the tuple cannot be altered. It is necessary to generate
    a new tuple if we wish to modify an existing one by adding or taking something
    away from it. Unlike lists, tuples are denoted by parentheses and cannot be edited.
    Tuples are a sort of sequence equivalent to strings in terms of structure. Tuples'
  - '[PAGE 136]


    can hold any components, in contrast to strings, which can only store characters.
    It indicates that the tuple contains either a list of students'' names or employee
    IDs, depending on which one is selected. Tuples may also be used to store varied
    elements, implying that a single tuple can contain components of several data
    formats, such as decimal formats, integers, and characters. A sequence of music
    files, picture files, and other data types can also be stored in tuples.


    To create a tuple in Python, all the elements are enclosed in () parenthesis,
    separated by a comma. A tuple can store heterogeneous data elements. Below are
    examples of creating tuples.


    # Example:


    ```

    1.  # Create an empty tuple

    2.  Tuple1 = ()

    3.  # tuple with 5 elements

    4.  Tuple2 = (10,20,30,40,50)

    5.  print (Tuple2)

    6.  # tuple of character elements

    7.  Tuple3 = (''x'', ''y'', ''z'')

    8.  print (Tuple3)

    9.  # tuple of strings

    10. Tuple4 = ("Python", "Programming", "Book")

