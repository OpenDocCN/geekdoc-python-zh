  md: "# Global Statement\n\nThe block in which the local variable is stated is the\
    \ only place in which its scope may be evaluated. In addition, a variable is considered\
    \ local when constructed inside a function by the programmer. However, using the\
    \ global keyword within a function, we can create a variable accessible across\
    \ the program. This is the only place where it may be used. To better understand\
    \ the concept, let's look at an example of a global statement that uses the global\
    \ keyword.\n\n# Example:\n\n```\n1. def my_fun():\n2.     global x\n3.     x =\
    \ 10  # x is global\n4. \n5. my_fun()\n6. \n7. print (x)  # print x\n```\n\n#\
    \ Output:\n\n```\n10\n```\n\nSuppose we have a variable with the same name as\
    \ a global variable in the program. In such a case, a new local variable of that\
    \ name is created, different from the global variable.\n\n# Example:\n\n```\n\
    1. x=10\n2. def show():\n3.     x=5\n4.     print (\"In Function x is=\",x)\n\
    5. show()\n6. print (\"Outside function is=\",x)\n```\n\n# Output:\n\n```\nIn\
