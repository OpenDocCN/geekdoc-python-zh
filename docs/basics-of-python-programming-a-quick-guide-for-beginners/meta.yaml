    \ is re-created from scratch within the child class. The process of re-implementing\
    \ a method in a parent class within a child class is referred to as method overriding\
    \ or polymorphism in inheritance.\n\n# Example:\n\n```\n# Example of method overriding\n\
    class Subjects:\n    def func1(self):\n        print ('It is Base Class')\n  \
    \  def func2(self):\n        print (' Subjects Class')\n\nclass Core(Subjects):\n\
    \    def func2(self):\n        print ('Core subject class')\n\nclass Elec(Subjects):\n\
    \    def func2(self):\n        print ('Elec subject class')\n\na1 = Subjects()\n\
    a1.func1()\na1.func2()\n\nprint('-------------')\nb1 = Core()\nb1.func1()\nb1.func2()\n\
    \nprint ('-------------')\ne1 = Elec()\ne1.func1()\ne1.func2()\n```"
