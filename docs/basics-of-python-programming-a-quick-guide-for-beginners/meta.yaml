    \n```\n-----Base constructor-----\n\n-----Base class-----\n\nElectronic : Portable\n\
    \n-----Intermediate class-----\n\nTelevision : LCD\n\n-----Derived class-----\n\
    \nmodel : Samsung\n```"
  mdcn: "## 构造函数\n\n构造函数是一种特殊类型的函数，用于初始化类的实例成员。C++ 或 Java 中的构造函数与类同名，但 Python 对构造函数的处理方式不同。当我们创建一个类的对象时，构造函数就会执行。在\
    \ Python 中，构造函数通过 `__init__()` 方法定义。它以 `self` 关键字作为第一个参数，允许访问类的属性和方法。根据 `__init__()`\
    \ 的定义，我们可以在构造类对象时传递任意数量的参数。它主要用于设置类的属性。如果我们没有定义任何其他构造函数，每个类都必须有一个默认构造函数。\n\n##\
    \ 示例：\n\n```python\n# 创建一个名为 book 的类\nclass Course:\n    # 定义构造函数\n    def __init__(self,l,e,s):\n\
    \        print('Constructor example')\n        self.lec = l\n        self.enroll\
    \ = e\n        self.sub= s\n\n    # 创建函数\n    def fun(self):\n        print('No.of\
    \ scheduled lectures:', self.lec)\n        print('Enrolled students:', self.enroll)\n\
    \        print('Year:', self.sub)\n\n# 创建对象并将参数传递给构造函数\nd_1 = Course(30, 200,\
    \ \"Python\")\nd_2= Course(45, 150, \"C++\")\n# 通过对象访问类属性和方法\nprint ('-----Values-------')\n\
    d_1.fun()\nd_2.fun()\n```\n\n## 输出：\n\n```\nConstructor example\n\nConstructor\
    \ example\n\n-----Values-----\n\nNo.of scheduled lectures: 30\n\nEnrolled students:\
    \ 200\n\nYear: Python\n\nNo.of scheduled lectures: 45\n\nEnrolled students: 150\n\
    \nYear: C++\n```\n\n当我们不想更新值或不希望 `self` 作为参数时，我们使用无参构造函数。下面的代码展示了无参构造函数的示例。\n\n\
    ## 示例：\n\n```python\nclass demo:\n    def __init__(self):  # 默认构造函数\n        self.stat\
    \ = \"Joe sat on the chair.\"\n    # 用于打印的函数\n    def show(self):\n        print(self.stat)\n\
    \n# 类的对象\nd1 = demo()\n\n# 调用实例\nd1.show()\n```\n\n## 输出：\n\n```\nJoe sat on the\
    \ chair.\n```\n\n## 带参构造函数\n\n带参构造函数除了 `self` 之外还包含多个参数。下面的 Python 代码演示了带参构造函数：\n\
    \n## 示例：\n\n```python\nclass demo:\n    # 带参构造函数\n    def __init__(self, arg1):\n\
    \        print(\"This is parametrized constructor\")\n        self.arg1= arg1\n\
    \    def show(self, adv):\n        print(\"Joe went\", self.arg1, adv)\n\nd1 =\
    \ demo(\"school\")\nd1.show(\"today\")\n```\n\n## 输出：\n\n```\nThis is parametrized\
    \ constructor\nJoe went school today\n```\n\n## 默认构造函数\n\n当类中没有包含或声明任何构造函数时，就会使用默认构造函数。它定义了对象的初始值。下面的示例演示了默认构造函数的概念。\n\
    \n## 示例：\n\n```python\nclass test:\n    chk= \"undone\"\n\n    def assign(self):\n\
    \        print(self.chk)\n# 类的对象\nv1 = test()\n# 调用实例方法\nv1.assign()\n```\n\n\
    ## 输出：\n\n```\nundone\n```\n\n## Python 中的继承\n\n继承是我们将要使用的面向对象框架的重要组成部分。继承使我们能够重用程序的代码，因为在创建新类时我们不必从零开始；相反，我们可以利用现有的类作为基础。子类获得对父类中定义的所有数据成员和函数的访问权限，并且它还继承了父类中存在的属性。子类可以有自己的方式来实现父类的函数。Python\
    \ 允许派生类通过简单地在派生类名称后指定基类并用括号括起来来继承基类。使用下面指定的语法将属性和行为从基类继承到派生类。\n\n语法：\n\n```\n\
    class <derived-class_Name> (base-class_Name):\n    # 派生类主体\n```\n\n派生类可以从多个基类继承属性。可以通过在括号内命名所有基类来实现这种形式的继承。使用以下语法可以从多个类继承属性：\n\
    \n语法：\n\n```\nclass <derive-class_name> (<base-class 1>, <base-class 2>, .....\
    \ <base-class n>):\n    # 派生类主体\n```\n\n## 示例：\n\n```python\n# 创建基类\nclass student():\n\
    \    # 基类内的函数\n    def course(self,arg1):\n        print ('-----Base class function-------')\n\
    \        self.arg1=arg1\n        print ('Course name:', self.arg1)\n\n# 继承的类\n\
    class enroll(student):\n    # 派生类内的函数\n    def is_enroll(self,arg2):\n       \
    \ print('--------Derived class function----------')\n        self.arg2=arg2\n\
    \        print(\"enrollment:\", self.arg2)\nenr = enroll()                   \
    \ # 派生类的一个对象\nprint(enr.is_enroll(\"Lui\"))\nprint(enr.course(\"python\"))\n```\n\
    \n## 输出：\n\n```\n--------Derived class function----------\n\nenrollment: Lui\n\
    \n-----Base class function-------\n\nCourse name: python\n```\n\n## 继承的类型\n\n\
    Python 中有四种类型的继承，具体取决于涉及的子类和父类组的数量。它包括单继承、多继承、多级继承和层次继承。\n\n## 单继承\n\n派生类可以从单个基类继承属性。这为代码重用和向现有代码添加新功能铺平了道路。单继承的原理如图\
    \ (1) 所示。\n\n![单继承](img/a3dd2fbdd34f88affbf364777f25c839_235_0.png)\n\n图 (1).\
    \ 单继承。\n\n## 示例：\n\n```python\n# 创建基类\nclass student():\n    # 基类内的函数\n    def\
    \ grade(self,arg1):\n        print ('-----Base class function-------')\n     \
    \   self.arg1=arg1\n        print ('grade:', self.arg1)\n\n# 继承的类\nclass enroll(student):\n\
    \    # 派生类内的函数\n    def is_pass(self,arg2):\n        print('--------Derived class\
    \ function---------')\n        self.arg2=arg2\n        print(\"name:\", self.arg2)\n\
    \nenr = enroll() # 派生类的一个对象\nprint(enr.grade(8))\nprint(enr.is_pass(\"Lui\"))\n\
    ```\n\n## 输出：\n\n```\n-----Base class function-------\ngrade: 8\n--------Derived\
    \ class function---------\nname: Lui\n```\n\n## 多级继承\n\n在多级继承中，基类和派生类的特征被传递给新创建的派生类。在\
    \ Python 中，通过多级继承可以达到的级别数没有上限；此功能是无限的。多级继承概念的可视化表示可以在图 (2) 中找到。\n\n![多级继承](img/a3dd2fbdd34f88affbf364777f25c839_236_0.png)\n\
    \n图 (2). 多级继承。\n\n## 示例：\n\n```python\n# 基类\nclass Electronics:\n\n    def __init__(self):\n\
    \        print(\"-----Base constructor-----\")\n\n    def cat1(self, category):\n\
    \        print(\"-----Base class-----\")\n        self.category = category\n \
    \       print('Electronic :', self.category)\n\n# 中间类\nclass Televisons(Electronics):\n\
    \    def style_1(self, style):\n        self.style = style\n        print(\"-----Intermediate\
    \ class-----\")\n        print(\"Television :\", self.style)\n\n# 派生类\nclass model(Televisons):\n\
    \    def model_name(self, name):\n        print(\"-----Derived class-----\")\n\
    \        self.name = name\n        print(\"model :\", self.name)\n\ns1 = model()\n\
    s1.cat1('Portable')\ns1.style_1('LCD')\ns1.model_name('Samsung')\n```\n\n## 输出：\n\
    \n```\n-----Base constructor-----\n\n-----Base class-----\n\nElectronic : Portable\n\
    \n-----Intermediate class-----\n\nTelevision : LCD\n\n-----Derived class-----\n\
    \nmodel : Samsung\n```"
