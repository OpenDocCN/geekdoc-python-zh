    \ self.arg2)\n\nenr = enroll() # An Object for derived class\nprint(enr.grade(8))\n\
    print(enr.is_pass(\"Lui\"))\n```\n\n## Output:\n\n```\n-----Base class function-------\n\
    grade: 8\n--------Derived class function---------\nname: Lui\n```\n\n## Multi-level\
    \ Inheritance\n\nIn multi-level inheritance, characteristics of the base class\
    \ and the derived classes are transmitted to the newly created derived class.\
    \ There is no upper bound on the number of levels that may be archived *via* multi-level\
    \ inheritance in Python; this capability is unlimited. A visual representation\
