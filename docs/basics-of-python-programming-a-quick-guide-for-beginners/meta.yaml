    # INTRODUCTION


    We assume the readers now have enough preliminary knowledge to dive deep into
    programming with Python. Python has been the developer''s choice, and Machine
    Learning is one of the major application areas of Python. Machine Learning is
    the field of computer science that allows computer programs to attain the capability
    much like a human brain, *i.e.*, learn from past experiences and perform future
    tasks. In this chapter, you will learn to program Machine Learning algorithms
    with Python.


    Anomalous to traditional programming, Machine Learning requires no pre-defined
    rules but the design of a mathematical model for decision-making rather than human
    interference. Figs. (1 and 2) show the disparity between the two paradigms of
    programming. In traditional programming, rules, and data are fed to the computer,
    and the results are evaluated. In case of an error, the problem is studied and
    analyzed, and changes are made to the rules. But in the Machine Learning paradigm,
    the learning is leveraged on the training data, and results are evaluated. The
    defined model is then tested over test data, and output is produced.


