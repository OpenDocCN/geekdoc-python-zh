  md: "# CONSTRUCTORS\n\nA constructor is a particular type of function that is used\
    \ to initialize the class's instance members. The constructor in C++ or Java has\
    \ the same name as the class, but Python handles constructors differently. When\
    \ we create an object of a class, the constructor function executes. In Python,\
    \ the constructor is defined using the `__init__()` method. It takes the `self`\
    \ keyword as a first argument, allowing access to the class's attributes and methods.\
    \ Depending on the `__init__()` definition, we can pass any number of arguments\
    \ when constructing the class object. It's mainly used to set up the class attributes.\
    \ Every class must have a default constructor if we have not defined any other\
    \ constructor.\n\n# Example:\n\n```\n1.  # Creating a class book\n2.  class Course:\n\
    3.      #defining constructor\n4.      def __init__(self,l,e,s):\n5.         \
    \ print('Constructor example')\n6.          self.lec = l\n7.          self.enroll\
    \ = e\n8.          self.sub= s\n9.  \n10.     # creating function\n11.     def\
    \ fun(self):\n12.         print('No.of scheduled lectures:', self.lec)\n13.  \
    \       print('Enrolled students:', self.enroll)\n14.         print('Year:', self.sub)\n\
    15. \n16. # Object creation and passing arguments to constructor\n17. d_1 = Course(30,\
    \ 200, \"Python\")\n18. d_2= Course(45, 150, \"C++\")\n19. # Accessing class attribute\
    \ and method through objects\n20. print ('-----Values-------')\n21. d_1.fun()\n\
    22. d_2.fun()\n```"
