    # TUPLE


    A tuple is a group of ordered, immutable items arranged in a specific way. Tuples
    are structured similarly to lists and strings. In this context, the definition
    of immutable is that the components of the tuple are not subject to change. Once
    a tuple has been generated, it is not possible to add or remove items from the
    tuple. Even we cannot change the order in which the tuple members are presented.
    In addition, the length of the tuple cannot be altered. It is necessary to generate
    a new tuple if we wish to modify an existing one by adding or taking something
    away from it. Unlike lists, tuples are denoted by parentheses and cannot be edited.
    Tuples are a sort of sequence equivalent to strings in terms of structure. Tuples'
