    # File Positions


    When we use Python to open a file for reading, we are provided with a file handle
    that includes a reference to the beginning of the file. When we read from the
    file, the pointer will always point to the end of the reading, and the beginning
    of the following read will be at that location. The following methods are used,
    respectively, to acquire the current file position and alter the current file
    position:


    +   - The **tell()** method returns the current file position; in other words,
    the next read or write will occur at that many bytes from the file''s beginning.

    - The **seek(offset[, from])** method is used to adjust the file''s current location.
    The number of bytes to be moved is defined by the offset statement. The from statement
    determines the starting point for the bytes to be transferred from.


    If from is set to **0** in the **seek()** function, the file''s beginning will
    be used as the reference position, **1** the current position will be used as
    the reference position, and **2** the file''s end will be used as a reference
    position.'
