    ```'
- md: '## CONCLUDING REMARKS


    This chapter introduced tuples and dictionaries and covered their fundamental
    ideas and characteristics. We also spoke about the many procedures that may be
    carried out on these sequences. The principles are explained logically with the
    help of several examples and Python code. You can learn to code by emulating these
    examples. Python''s file-handling concepts will be discussed in the next chapter.


    ## CHAPTER 7


    ## File Handling


    **Abstract:** From the previous chapters, we anticipate that the readers have
    garnered enough working knowledge of Python and its elementary concepts. In this
    chapter, we introduce to the user the concept of files. These are one of the major
    built-in object types in Python. We can create, call, work, and close the files
    using several functions as enunciated below. One of the primary tasks of files
    is method exporting and common file-processing tasks such as input and output
    display to external files, flush buffers, *etc.*


    **Keywords:** Buffering, Directory path in OS, Storage in OS.


    ## INTRODUCTION


    When information must be stored in a file in an unalterable manner, file management
    is essential. A file is a designated location on the disc where data is kept that
    is important to the purpose of the file. Once the program has been closed, we
    will be able to retrieve the information that was previously stored. The concept
    of file management has been adapted and implemented in various other languages.
    However, doing so can be difficult or time-consuming, depending on the language.


    However, unlike other Python ideas, this one is not complicated and can be understood
    easily. You will learn various theories and procedures about the management of
    files in this chapter. In addition, we have illustrated a variety of file actions
    by using examples and programs to illustrate our points.


    ## FILE


    A collection of bytes that may be used to store information is called a file.
    This data is structured in a specific format, which might be anything from a straightforward
    text file to an intricate program executable, depending on its complexity. In
    the end, these byte files are changed into binary, consisting of 1s and 0s so
    that the computer can process them more quickly. Much like many other programming
    languages, Python can handle files, allowing users to read, write, and execute
    many other file-related operations. This functionality is known as file handling.
    It is essential to understand that Python processes files differently based on
    whether they contain text or binary data. Each line of code is made up of a string
    of individual characters that, when combined, make up a text file. A special character
    terminates each line in a file referred to as the EOL (End of Line) character.
    Examples of EOL characters include the comma and the newline character. It signals
    to the interpreter that the line being read has finished and that a new line has
    begun. On most of today''s file systems, files are broken up into three distinct
    parts:


    - *Header*: details about the file''s contents (file name, size, type, and so
    on).

    - *Data*: the file''s contents as written by the author or writer.

    - *End of file*: a unique character that denotes the file''s termination.


    In programming, it is possible that a specific piece of input data must be created
    more than once. Occasionally, it is insufficient only to display data on the console.
    Large amounts of data may be presented. The console can only display a certain
    amount of data; as memory is volatile, it is difficult to restore programmatically
    created data frequently. The local file system, which is volatile and always available,
    is where we can store things if we need to. The file-handling capabilities of
    Python must be used for this. We can use our Python application to create, modify,
    read, and destroy files on the local file system, thanks to file management in
    Python. When accessing a file on an operating system, a file path is necessary.
    A string indicates the location of a file called a file path. There are three
    main sections in it:


    - **Directory Path**: the location of a file or folder on a file system, separated
    by a forward slash (/) in Linux or Unix or a backslash (\) in Windows.

    - **File Name**: the file''s real name.

    - **Extension**: it defines the file type.


    Let''s say you needed to open the T1.txt file, and the position you were in now
    was the same as the **location**. You must first travel to the **Location** folder,
    then to the **Folder1** directory, and then to the **T1.txt** file to access the
    file. The path of this file is “*Location/Folder1/T1.txt*.”


    ## Open() Function


    It must be open first to perform reading and writing operations on a file. To
    open a file in Python, the user must first create a file object associated with
    a physical file. In addition, the *open()* function is used to open a file in
    Python. Python''s open() function takes two arguments: the file name and the access
    mode. The function returns a file object, which can be used for reading, writing,
    and other operations. The below syntax is used to open a file in Python.


    Opening a file is a prerequisite for performing any action on it, including reading
    and writing. To access the contents of a file using Python, the user must first
    build a file object corresponding to the file''s actual location. In Python, opening
    a file is also accomplished with the help of the *open()* function. Python''s
    *open()* function requires two pieces of information before it can be called:
    the *file name* and the *access mode*. The method will return a file object that
    may be utilized for various tasks like reading, writing, and others. In Python,
    opening a file is accomplished with the syntax that is presented below:


    **Syntax:**


    ```

    File_object_Name = open(<file_name>, <access_mode>, <buffering>)

    ```


    Various modes, such as read, write, and append, are available for accessing the
    files. The access mode to open a file is defined in Table 1.


    **Table 1. File Access Modes.**


    | Mode | Description |

    | :--- | :--- |

    | **R** | The file is opened in read-only mode. The file pointer is present at
    the start. If no access mode is defined, the file is opened in this mode by default.
    |

    | **rb** | It converts the binary file into a read-only mode. The file pointer
    is present at the start of the file. |

    | **r+** | It opens the file for both reading and writing. The file pointer is
    present at the start of the file. |

    | **rb+** | It opens the file in binary format for reading and writing. The file
    pointer is present at the start of the file. |

    | **W** | It only allows you to write to the file. If a file with the same name
    already exists, it is overwritten; otherwise, it is created. The file pointer
    is present at the start of the file. |

    | **wb** | It opens the file so it can only be written in binary format. If the
    file already exists, it is overwritten; otherwise, it generates a new one. The
    file pointer is present at the start of the file. |

    | **w+** | It opens the file for both writing and reading. It differs from r+
    in that it overwrites the previous file if one exists, while r+ leaves the previously
    written file alone. If no such file exists, it creates one. The file pointer is
    present at the start of the file. |

    | **wb+** | It opens the file in binary format for both writing and reading. The
    file pointer is present at the start of the file. |

    | **A** | The file is opened in append mode. If there is one, the file pointer
    is at the end of the previously written file. If no file with the same name exists,
    it creates a new one. |

    | **ab** | It opens the file in binary format in append mode. The pointer is at
    the end of the file that was previously written. If no file of the same name remains,
    it produces a new binary file. |

    | **a+** | It opens a file for both appending and reading. If a file exists, the
    file pointer stays at the end of it. If no file with the same name exists, it
    produces a new one. |

    | **ab+** | It opens a binary file for appending and reading. The file pointer
    is already at the file''s end. |'
