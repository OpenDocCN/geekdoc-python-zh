- md: "## Sorting Dictionary in Reverse Order\n\nAnother input called reverse is taken\
    \ into consideration by the *sorted()* method. The sequence in which the sorting\
    \ should be carried out may be determined using this information, which can be\
    \ used as a guide. If *True* is passed, the sorting will be done in the other\
    \ direction, which is called descending order. In addition, if the default value\
    \ of *False* is used, the sorting will be carried out ascendingly.\n\nExample:\n\
    \n```\n# Initializing a dictionary\nD1= {\"James\" : 50, \"William\" : 30, \"\
    John\" : 25, \"David\" : 60, \"Sam\" :20}\n# Printing dictionary before sorting\n\
    print (\"The original dictionary is: \" , D1)\n# Sorting by key in reverse order\n\
    D2= dict(sorted(D1.items(),reverse=True, key=lambda x: x[0]))\nprint (\"After\
    \ Reverse order Sorting by key: \", D2)\n# Sorting by value in reverse order\n\
    D3= dict(sorted(D1.items(),reverse=True, key=lambda x: x[1]))\nprint (\"After\
    \ Reverse order Sorting by value: \", D3)\n```\n\nOutput:\n\n```\nThe original\
    \ dictionary is:  {'James': 50, 'William': 30, 'John': 25, 'David': 60, 'Sam':\
    \ 20}\n\nAfter Reverse order Sorting by key:  {'William': 30, 'Sam': 20, 'John':\
    \ 25, 'James': 50, 'David': 60}\n\nAfter Reverse order Sorting by value:  {'David':\
    \ 60, 'James': 50, 'William': 30, 'John': 25, 'Sam': 20}\n```\n\n## Iterating\
    \ Over a Dictionary\n\nAlthough the dictionary itself is not an iterable object,\
    \ the methods *items()*, *keys()*, and values produce iterable view objects that\
    \ may be used for iterating through the dictionary's entries. We can use a for\
    \ loop to go through all the data's key-value pairs. Using the items() function\
    \ will return a list of tuples, with each tuple consisting of a key and value\
    \ pair.\n\nExample:\n\n```\n# Creating a dictionary\nDict1= {0 : 'Zero', 1 : 'One',\
    \ 2 : 'Two', 3 : 'Three', 4 :'Four', 5: 'Five'}\n# Printing dictionary\nprint\
    \ (\"The original dictionary is: \" , Dict1)\n# Iterating with for loop\nprint\
    \ ('Iterating with for loop:')\nfor t in Dict1.items():\n    print (t)\n```\n\n\
    Output:\n\n```\nThe original dictionary is:  {0: 'Zero', 1: 'One', 2: 'Two', 3:\
    \ 'Three', 4: 'Four', 5: 'Five'}\n\nIterating with for loop:\n\n(0, 'Zero')\n\n\
    (1, 'One')\n\n(2, 'Two')\n\n(3, 'Three')\n\n(4, 'Four')\n\n(5, 'Five')\n```\n\n\
    We can also iterate the dictionary by storing the key and value out of each pair\
    \ in two separate variables such as.\n\nExample:\n\n```\n# Creating a dictionary\n\
    Dict1= {0 : 'Zero', 1 : 'One', 2 : 'Two', 3 : 'Three', 4 :'Four', 5: 'Five'}\n\
    # Printing original dictionary\nprint (\"The original dictionary is: \" , Dict1)\n\
    # Iterating with for loop and storing key and value separately\nprint ('Iterating\
    \ with storing separate values:')\nfor key,value in Dict1.items():\n    print\
    \ (key,value)\n```\n\nOutput:\n\n```\nThe original dictionary is: {0: 'Zero',\
    \ 1: 'One', 2: 'Two', 3: 'Three', 4: 'Four', 5: 'Five'}\n\nIterating with storing\
    \ separate values:\n\n0 Zero\n\n1 One\n\n2 Two\n\n3 Three\n\n4 Four\n\n5 Five\n\
    ```\n\nAnother way of dictionary iteration is to use the *keys()* function. Using\
    \ *keys()* function, the associated value can be obtained as follows.\n\nExample:\n\
    \n```\n# Creating a dictionary\nDict1= {0 : 'Zero', 1 : 'One', 2 : 'Two', 3 :\
    \ 'Three', 4 :'Four', 5: 'Five'}\n# Printing original dictionary\nprint (\"The\
    \ original dictionary is: \" , Dict1)\n# Iterating with keys() function\nprint\
    \ ('Iterating using keys() function:')\nfor k1 in Dict1.keys():\n    print (k1,\
    \ Dict1.get(k1))    #or print(k1, Dict1[k1])\n```\n\nOutput:\n\n```\nThe original\
    \ dictionary is: {0: 'Zero', 1: 'One', 2: 'Two', 3: 'Three', 4: 'Four', 5: 'Five'}\n\
    \nIterating using keys() function:\n\n0 Zero\n\n1 One\n\n2 Two\n\n3 Three\n\n\
    4 Four\n\n5 Five\n```\n\n## Nested Dictionaries\n\nA dictionary is a collection\
    \ of components that are not arranged in any particular sequence, as we have seen\
    \ previously in this lesson. It has a variety of components in the form of *key-value*\
    \ pairs that are enclosed in curly brackets. The term “nested dictionary” refers\
    \ to a situation in which one dictionary is kept inside another dictionary. It\
    \ works much the same way that nested records and nested structures do in other\
    \ programming languages. To put it another way, we may argue that it is a compilation\
    \ of several dictionaries into a single, unified dictionary.\n\nSyntax:\n\n```\n\
    Nested_Dict1 = {\n    'Dict1': {'key1': 'value1'},\n    'Dict2': {'key1': 'value1'},\n\
    \    'Dict3': {'key1': 'value1'}\n}\n```\n\nExample:\n\n```\n# Nested dictionary\n\
    Emp = {'e1' : {'name': 'James', 'age': '50', 'Post': 'Manager'},\n    'e2' : {'name':\
    \ 'william', 'age': '45', 'Post': 'Clerk'},\n    'e3' : {'name': 'David', 'age':\
    \ '35', 'Post': 'HR'}\n    }\n# Printing complete nested dictionary\nprint (Emp)\n\
    \nprint ('-----Details of e1 dictionary-------')\nprint (Emp['e1']['name'])\n\
    print (Emp['e1']['age'])\nprint (Emp['e1']['Post'])\n\nprint ('-----Details of\
    \ e2 dictionary-------')\nprint (Emp['e2']['name'])\nprint (Emp['e2']['age'])\n\
    print (Emp['e2']['Post'])\n\nprint ('-----Details of e3 dictionary-------')\n\
    print (Emp['e3']['name'])\nprint (Emp['e3']['age'])\nprint (Emp['e3']['Post'])\n\
    ```\n\nOutput:\n\n```\n{'e1': {'name': 'James', 'age': '50', 'Post': 'Manager'},\
    \ 'e2': {'name': 'william', 'age': '45', 'Post': 'Clerk'}, 'e3': {'name': 'David',\
    \ 'age': '35', 'Post': 'HR'}}\n\n-----Details of e1 dictionary--------\n\nJames\n\
    \n50\n\nManager\n\n-----Details of e2 dictionary--------\n\nwilliam\n\n45\n\n\
    Clerk\n\n-----Details of e3 dictionary--------\n\nDavid\n\n35\n\nHR\n```\n\nThe\
    \ following code snippet demonstrates how to extend a nested dictionary with a\
    \ new sub-dictionary. If we want to create a new dictionary, we need to access\
    \ the element by its key and provide it with a corresponding value.\n\nExample:\n\
    \n```\nEmp = {'e1' : {'name': 'James', 'age': '50', 'Post': 'Manager'},\n    'e2'\
    \ : {'name': 'william', 'age': '45', 'Post': 'Clerk'},\n    'e3' : {'name': 'David',\
    \ 'age': '35', 'Post': 'HR'}\n    }\n# Printing dictionary elements before adding\
    \ a sub dictionary\nprint ('Nested Dictionary before adding a sub dictionary:',\
    \ Emp)\n# Adding a sub dictionary\nEmp['e4'] = {'name': 'Bob', 'age': '32', 'Post':\
    \ 'Manager'}\n# Printing dictionary elements after adding a sub dictionary\nprint\
    \ ('Nested Dictionary after adding a sub dictionary:', Emp)\n```\n\nOutput:\n\n\
    ```\nNested dictionary before adding a sub dictionary: {'e1': {'name': 'James',\
    \ 'age': '50', 'Post': 'Manager'}, 'e2': {'name': 'william', 'age': '45', 'Post':\
    \ 'Clerk'}, 'e3': {'name': 'David', 'age': '35', 'Post': 'HR'}}\n\nNested dictionary\
    \ after adding a sub dictionary: {'e1': {'name': 'James', 'age': '50', 'Post':\
    \ 'Manager'}, 'e2': {'name': 'william', 'age': '45', 'Post': 'Clerk'}, 'e3': {'name':\
    \ 'David', 'age': '35', 'Post': 'HR'}, 'e4': {'name': 'Bob', 'age': '32', 'Post':\
    \ 'Manager'}}\n```\n\n## Updating Nested Dictionary\n\nIt is simple to alter the\
    \ dictionaries' nested parts. Changing the value of an object is as easy as referring\
    \ to it by its key. The existing key's value is overwritten with the new one if\
    \ it is found in the dictionary. The following code snippet shows how to modify\
    \ the e1 dictionary values within the Emp dictionary.\n\nExample:\n\n```\n# Nested\
    \ dictionary\nEmp = {'e1' : {'name': 'James', 'age': '50', 'Post': 'Manager'},\n\
    \    'e2' : {'name': 'william', 'age': '45', 'Post': 'Clerk'},\n    'e3' : {'name':\
    \ 'David', 'age': '35', 'Post': 'HR'}\n    }\n# Printing dictionary elements before\
    \ update\nprint ('Nested Dictionary before update:', Emp)\n# Updating values of\
    \ D1\nEmp['e1'] = {'name': 'Bob', 'age': '32', 'Post':'Director'}\n\n# Printing\
    \ dictionary elements after update\nprint ('Nested Dictionary after updating values:',\
    \ Emp)\n```\n\nOutput:\n\n```\nNested dictionary before update: {'e1': {'name':\
    \ 'James', 'age': '50', 'Post': 'Manager'}, 'e2': {'name': 'william', 'age': '45',\
    \ 'Post': 'Clerk'}, 'e3': {'name': 'David', 'age': '35', 'Post': 'HR'}}\n\nNested\
    \ dictionary after updating values: {'e1': {'name': 'Bob', 'age': '32', 'Post':\
    \ 'Director'}, 'e2': {'name': 'william', 'age': '45', 'Post': 'Clerk'}, 'e3':\
    \ {'name': 'David', 'age': '35', 'Post': 'HR'}}\n```\n\n## Deleting Elements from\
    \ a Nested Dictionary\n\nWe can use *del* operator to delete elements from the\
    \ nested dictionary."
  mdcn: "## 反向排序字典\n\n*sorted()* 方法还会考虑一个名为 `reverse` 的输入参数。此信息可用作指南，以确定排序应进行的顺序。如果传入\
    \ *True*，排序将以相反的方向进行，即降序排列。此外，如果使用默认值 *False*，则排序将以升序进行。\n\n示例：\n\n```\n# 初始化一个字典\n\
    D1= {\"James\" : 50, \"William\" : 30, \"John\" : 25, \"David\" : 60, \"Sam\"\
    \ :20}\n# 打印排序前的字典\nprint (\"The original dictionary is: \" , D1)\n# 按键反向排序\n\
    D2= dict(sorted(D1.items(),reverse=True, key=lambda x: x[0]))\nprint (\"After\
    \ Reverse order Sorting by key: \", D2)\n# 按值反向排序\nD3= dict(sorted(D1.items(),reverse=True,\
    \ key=lambda x: x[1]))\nprint (\"After Reverse order Sorting by value: \", D3)\n\
    ```\n\n输出：\n\n```\nThe original dictionary is:  {'James': 50, 'William': 30, 'John':\
    \ 25, 'David': 60, 'Sam': 20}\n\nAfter Reverse order Sorting by key:  {'William':\
    \ 30, 'Sam': 20, 'John': 25, 'James': 50, 'David': 60}\n\nAfter Reverse order\
    \ Sorting by value:  {'David': 60, 'James': 50, 'William': 30, 'John': 25, 'Sam':\
    \ 20}\n```\n\n## 遍历字典\n\n虽然字典本身不是可迭代对象，但 *items()*、*keys()* 和 *values()* 方法会产生可迭代的视图对象，可用于遍历字典的条目。我们可以使用\
    \ `for` 循环来遍历所有数据的键值对。使用 `items()` 函数将返回一个元组列表，每个元组由一个键和一个值对组成。\n\n示例：\n\n```\n\
    # 创建一个字典\nDict1= {0 : 'Zero', 1 : 'One', 2 : 'Two', 3 : 'Three', 4 :'Four', 5:\
    \ 'Five'}\n# 打印字典\nprint (\"The original dictionary is: \" , Dict1)\n# 使用 for\
    \ 循环遍历\nprint ('Iterating with for loop:')\nfor t in Dict1.items():\n    print\
    \ (t)\n```\n\n输出：\n\n```\nThe original dictionary is:  {0: 'Zero', 1: 'One', 2:\
    \ 'Two', 3: 'Three', 4: 'Four', 5: 'Five'}\n\nIterating with for loop:\n\n(0,\
    \ 'Zero')\n\n(1, 'One')\n\n(2, 'Two')\n\n(3, 'Three')\n\n(4, 'Four')\n\n(5, 'Five')\n\
    ```\n\n我们也可以通过将每对中的键和值存储在两个单独的变量中来遍历字典。\n\n示例：\n\n```\n# 创建一个字典\nDict1= {0 : 'Zero',\
    \ 1 : 'One', 2 : 'Two', 3 : 'Three', 4 :'Four', 5: 'Five'}\n# 打印原始字典\nprint (\"\
    The original dictionary is: \" , Dict1)\n# 使用 for 循环遍历并分别存储键和值\nprint ('Iterating\
    \ with storing separate values:')\nfor key,value in Dict1.items():\n    print\
    \ (key,value)\n```\n\n输出：\n\n```\nThe original dictionary is: {0: 'Zero', 1: 'One',\
    \ 2: 'Two', 3: 'Three', 4: 'Four', 5: 'Five'}\n\nIterating with storing separate\
    \ values:\n\n0 Zero\n\n1 One\n\n2 Two\n\n3 Three\n\n4 Four\n\n5 Five\n```\n\n\
    另一种遍历字典的方法是使用 *keys()* 函数。使用 *keys()* 函数，可以按如下方式获取关联的值。\n\n示例：\n\n```\n# 创建一个字典\n\
    Dict1= {0 : 'Zero', 1 : 'One', 2 : 'Two', 3 : 'Three', 4 :'Four', 5: 'Five'}\n\
    # 打印原始字典\nprint (\"The original dictionary is: \" , Dict1)\n# 使用 keys() 函数遍历\n\
    print ('Iterating using keys() function:')\nfor k1 in Dict1.keys():\n    print\
    \ (k1, Dict1.get(k1))    # 或者 print(k1, Dict1[k1])\n```\n\n输出：\n\n```\nThe original\
    \ dictionary is: {0: 'Zero', 1: 'One', 2: 'Two', 3: 'Three', 4: 'Four', 5: 'Five'}\n\
    \nIterating using keys() function:\n\n0 Zero\n\n1 One\n\n2 Two\n\n3 Three\n\n\
    4 Four\n\n5 Five\n```\n\n## 嵌套字典\n\n正如我们在本课前面所见，字典是未按任何特定顺序排列的组件集合。它包含各种形式的 *键值*\
    \ 对组件，这些组件被括在花括号中。“嵌套字典”一词指的是一个字典被保存在另一个字典内部的情况。它的工作方式与其他编程语言中的嵌套记录和嵌套结构非常相似。换句话说，我们可以认为它是将多个字典组合成一个统一的字典。\n\
    \n语法：\n\n```\nNested_Dict1 = {\n    'Dict1': {'key1': 'value1'},\n    'Dict2':\
    \ {'key1': 'value1'},\n    'Dict3': {'key1': 'value1'}\n}\n```\n\n示例：\n\n```\n\
    # 嵌套字典\nEmp = {'e1' : {'name': 'James', 'age': '50', 'Post': 'Manager'},\n   \
    \ 'e2' : {'name': 'william', 'age': '45', 'Post': 'Clerk'},\n    'e3' : {'name':\
    \ 'David', 'age': '35', 'Post': 'HR'}\n    }\n# 打印完整的嵌套字典\nprint (Emp)\n\nprint\
    \ ('-----Details of e1 dictionary-------')\nprint (Emp['e1']['name'])\nprint (Emp['e1']['age'])\n\
    print (Emp['e1']['Post'])\n\nprint ('-----Details of e2 dictionary-------')\n\
    print (Emp['e2']['name'])\nprint (Emp['e2']['age'])\nprint (Emp['e2']['Post'])\n\
    \nprint ('-----Details of e3 dictionary-------')\nprint (Emp['e3']['name'])\n\
    print (Emp['e3']['age'])\nprint (Emp['e3']['Post'])\n```\n\n输出：\n\n```\n{'e1':\
    \ {'name': 'James', 'age': '50', 'Post': 'Manager'}, 'e2': {'name': 'william',\
    \ 'age': '45', 'Post': 'Clerk'}, 'e3': {'name': 'David', 'age': '35', 'Post':\
