    **Abstract:** Useful codes are often stored as separate files to increase modularity
    and reusability. Modules refer to a single file of code while a package is a collection
    of modules. A good programmer utilises both these aspects to enhance the program
    view and manage the hierarchy. In this chapter, we introduce the basics of working
    with the modules and packages.


    **Keywords:** Scoping, Modular programming, Standalone script.


    # INTRODUCTION


    # MODULES


    A complicated and unmanageable program can be broken down into several manageable
    subprograms, each referred to as a **module** through modular programming. One
    activity can be carried out by utilizing each component individually. The creation
    of modules in Python may be accomplished by utilizing Python files, which can
    include a variety of *and* statements. It is possible to define variables, classes,
    and functions in a module. A module can also make use of code that is executable.
    When the code is divided into modules, it is much simpler to comprehend and more
    convenient to utilize. Additionally, it logically arranges the code.


    To put it another way, the file containing our Python source code with the extension
    (.py) is considered the module. Python modules can store code that can be executed.
    When we want to use the features of one module in another, we must import the
    specific module first. Let''s say you''ve generated a file on your computer named
    **module1.py**, and inside it, you have the following code:'
