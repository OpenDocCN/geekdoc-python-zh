  md: '# CHAPTER 12


    # Programming with Python


    **Abstract:** After the successful comprehension of the different aspects of Python
    and its applications in ML, it''s now the time to look at how they can be combined
    and put to work using common examples. This will surely increase the reader''s
    comprehension of the intricacies of Python and demonstrate the efficiency of the
