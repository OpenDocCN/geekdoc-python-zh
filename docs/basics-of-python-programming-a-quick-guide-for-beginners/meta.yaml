    # Operators'' Precedence and Associativity


    Operator precedence means which operator should be executed first. It is based
    on the priority of an operator. If two or more operators have the same precedence,
    it will check an operator''s associativity. Associativity means operating the
    value from left to right and right to left. Suppose an expression is 2*4+6; first,
    2*4 will be executed because * has higher precedence between the * and + operators.


    Suppose an expression is 5/2*3, then the operator''s priority is the same, then
    it will check the associativity of an operator. Here associativity of / and *
    is left to right, thus 5/2 is evaluated first. Table 1 enumerates the various
    operators precedence-wise along with their associativity.


    Table 1. Operators description and its associativity.


    | Operator | Description | Associativity |

    | :--- | :--- | :--- |

    | () | Parentheses | left-to-right |

    | ** | Exponent | right-to-left |

    | * / % | Multiplication/division/modulus | left-to-right |

    | + - | Addition/subtraction | left-to-right |

    | << >> | Bitwise shift left, Bitwise shift right | left-to-right |

    | < <= > >= | Relational | left-to-right |

    | == != | Relational is equal to/is not equal to | left-to-right |'
