    # Formatting Dictionaries


    dictionary lookups allow us to perform an operation known as “interpolation.”
    Because of the syntax they use, we need to enclose the key in parentheses and
    place it between the % operator and the character that represents the conversion.
    For example, if we want to format an int that is stored in a ''salary'' key to
    look like ''xxxx.xx'', we may use % (salary).2f in the spot where we want it to
    be presented. This will give us the desired result.


    # Example:


    ```

    1. # Creating a dictionary

    2. D1= {''name'': ''Sam'', ''salary'': 30000, ''Post'': ''Manager''}

    3. # Printing dictionary

    4. print (D1)

    5. print (''-------------'')

    6. print (''----------Formated dictionary----------'')

    7. # Formatted printing

    8. print ("My Name is: %(name)s" %D1)

    9. print ("My Salary is: %(salary).2f and POST is: %(Post)s " %D1)

    ```


    # Output:


    ```

    {''name'': ''Sam'', ''salary'': 30000, ''Post'': ''Manager''}

    -------------

    ----------Formated dictionary----------

    My Name is: Sam

    My Salary is: 30000.00 and POST is: Manager

    ```'
