    # Sorting Dictionary in Reverse Order


    Another input called reverse is taken into consideration by the *sorted()* method.
    The sequence in which the sorting should be carried out may be determined using
    this information, which can be used as a guide. If *True* is passed, the sorting
    will be done in the other direction, which is called descending order. In addition,
    if the default value of *False* is used, the sorting will be carried out ascendingly.


    Example:


    ```

    1.  # Initializing a dictionary

    2.  D1= {"James" : 50, "William" : 30, "John" : 25, "David" : 60, "Sam" :20}

    3.  # Printing dictionary before sorting

    4.  print ("The original dictionary is: " , D1)

    5.  # Sorting by key in reverse order

    6.  D2= dict(sorted(D1.items(),reverse=True, key=lambda x: x[0]))

    7.  print ("After Reverse order Sorting by key: ", D2)

    8.  # Sorting by value in reverse order

    9.  D3= dict(sorted(D1.items(),reverse=True, key=lambda x: x[1]))

    10. print ("After Reverse order Sorting by value: ", D3)

    ```


    Output:


    ```

    The original dictionary is:  {''James'': 50, ''William'': 30, ''John'': 25, ''David'':
    60, ''Sam'': 20}


    After Reverse order Sorting by key:  {''William'': 30, ''Sam'': 20, ''John'':
    25, ''James'': 50, ''David'': 60}


    After Reverse order Sorting by value:  {''David'': 60, ''James'': 50, ''William'':
    30, ''John'': 25, ''Sam'': 20}

    ```


