- md: '## Basics of Python Programming: A Quick Guide for Beginners Mohbey and Acharya


    > This is a long string example and that is made up of several lines and non-printable
    characters such as TAB ( ) and they will show up that way when displayed. NEWLINEs
    within the string, whether explicitly given like this within the brackets [ ],
    or just a NEWLINE within the variable assignment will also show up.


    Various types of built-in functions manipulate strings:


    - *capitalize()*- It is used to put the first letter of the string in upper case.

    - *center(width, fill char)*- It is used to pad the original string centered to
    the total column width.

    - *count(str, beg=0, end=len(string))*- To count the number of times a specific
    word/sequence of words occurs within a string we use this function. It requires
    us to specify the beginning and the ending index of the string we need to search
    in.

    - *decode(encoding=''UTF-8'', errors=''strict'')*- To return the decoded string
    we use this function.

    - *encode(encoding=''UTF-8'', errors=''strict'')*- It returns the encoded string.
    By default, it raises a Value Error, but we can specify ‘ignore’ or ‘replace’.

    - *endswith(suffix, beg=0, end=len(string))*- It is used to check whether the
    given string/substring ends with the specified suffix. It returns True if the
    condition is satisfied otherwise False.

    - *expandtabs(tabsize=8)*: It is used to expand the scope of tabs to the specified
    tab size. By default, the tab size is 8.

    - *find(str, beg=0, end=len(string))*- It is used to check if the string/substring
    is present in the given string within the specified beginning and ending indices.

    - *isalnum()* - It is used to check whether the string is composed of all alphanumeric
    characters or not. It outputs True if the string has one character and other alphanumeric
    characters, otherwise it returns False.

    - *isalpha()*- It is used to determine whether the string is composed of characters
    and alphabets.

    - *isdigit()* – It returns True if the string contains only digits and False otherwise.

    - *istitle()*- It returns True if the string is properly “title case” and False
    otherwise.

    - *maketrans()*- It returns a translation table for the use in translate function.

    - *max(str)*- It returns the max alphabetical character from the string.

    - *min(str)*- It returns the min alphabetical character from the string str.

    - *replace(old, new [, max])*- It is used to replace old string contents with
    the new or at most max occurrences specified within max.

    - *rfind(str, beg=0, end=len(string))* – To search the string from backward we
    use this function.

    - *rstrip()*- It strips off the trailing whitespaces.

    - *split(str=",", num=string.count(str))*- It is used to split the string based
    on the delimiter and return the substring that is split into at most *num* substrings.

    - *splitlines(num=string.count(''\n''))*- It splits a string at all (or num) NEWLINEs
    and returns a list of each line with NEWLINEs removed.

    - *startswith(str, beg=0, end=len(string))*- It determines if a string or a substring
    of string (if starting index beg and ending index end are given) starts with substring
    str, returns true if so and false otherwise.

    - *strip([chars])*- It is used to perform both lstrip() and rstrip() on string.

    - *swapcase()*- It converts the case of all letters.

    - *string.title()*- It returns the “titlecased” version of the string, that is,
    all words begin with uppercase, and the rest are lowercase.

    - *upper()*- It is used to convert lowercase letters to uppercase.

    - Let us take an example to understand all the above built-in functions.


    ## Example:


    ```python

    #!/usr/bin/python

    text = "This is a long string example and that is made up of several lines and
    characters"

    print ("text.capitalize() : ", text.capitalize())

    print ("text.center(40, ''a'') : ", text.center(40, ''a''))

    sub = "i";

    print ("text.count(sub, 4, 40) : ", text.count(sub, 4, 40))

    sub = "wow";

    print ("text.count(sub) : ", text.count(sub))

    text1 = "An operator, is a concept in Python ";

    text2 = "Python";

    print (text1.find(text2))

    print (text1.find(text2, 10))

    print (text1.find(text2, 40))

    print (text1.index(text2))

    text = "this2009"; # No space in this texting

    print (text.isalnum())

    text = "An operator, is a concept in Python";

    print (text.isalnum())

    text = "this"; # No space & digit in this texting

    print (text.isalpha())

    text = "An operator, is a concept in Python";

    print (text.isalpha())

    text = "123456"; # Only digit in this texting

    print (text.isdigit())

    text = "An operator, is a concept in Python";

    print (text.isdigit())

    text = "An operator, is a concept in Python";

    print (text.islower())

    text = "An operator, is a concept in Python";

    print (text.islower())

    text = u"this2009";

    print (text.isnumeric())

    text = u"23443434";

    print (text.isnumeric())

    text = " ";

    print (text.isspace())

    text = "An operator, is a concept in Python";

    print (text.isspace())

    text = "Hello, welcome to the world of Python";

    print (text.istitle())

    print (text.isupper())

    print (text.isupper())

    s = "-";

    seq = ("a", "b", "c"); # This is sequence of textings.

    print (s.join( seq ))

    ```


    ## Output:


    ```

    text.capitalize() :  This is a long string example and that is made up of several
    lines and characters


    text.center(40, ''a'') :  This is a long string example and that is made up of
    several lines and characters


    text.count(sub, 4, 40) : 3


    text.count(sub) : 0


    29


    29


    -1


    29


    True


    False


    True


    False


    True


    False


    False


    False


    False


    True


    True


    False


    False


    False


    False


    a-b-c

    ```


    ## CONCLUDING REMARKS


    In this chapter, we covered a variety of different data types as well as operations.
    In addition, we spoke about the precedence of operators and their associativity
    when evaluating expressions—an explanation of the many principles involved in
    producing string operations, lists, and dictionaries. The next topic that will
    be covered is control flow statements, which are utilized in Python. This will
    be covered in the following chapter.


    ## CHAPTER 3


    ## Control Flow


    **Abstract:** It''s now the time for the readers to acquaint themselves with the
    control flow in the programming. So far the users have seen the linear path of
    execution, where the execution commences from the top and moves sequentially to
    the bottom. Further, our world is filled with tasks required to run in loops,
    for example in banking applications, unless the user enters the correct password
    the system prompts the dialogue “Please enter the correct password”. In this chapter,
    we introduce the concept of control flow through which the users can decide the
    execution path for the program and the looping constructs to iterate through the
    tasks. Our key takeaways from this chapter are listed below:


    1. Understanding the decision control statements.

    2. Programming with *if-else* ladder and its variants.

    3. A hand on *for*, and *while* loop statements.

    4. Understanding the control flow alterations the *jump* statements like *break*,
    *continue* and *pass*.


    **Keywords:** Control flow, Conditional processing, Looping constructs.


    ## INTRODUCTION


    The control flow of a program is illustrated by a statement known as a control
    flow statement. In addition, it determines the sequence in which the code of the
    program is executed. Conditional statements, loops, and function calls are the
    primary mechanisms that direct how a Python program executes its instructions.
    Python programming utilizes three distinct types of control structures in its
    many applications.


    1. Sequential statements

    2. Decision control statements

    3. Looping statements


    ## SEQUENTIAL STATEMENTS


    It uses a default mode because the control will move line by line in a program.
    Moreover, it is a series of statements that are executed in a sequence.'
