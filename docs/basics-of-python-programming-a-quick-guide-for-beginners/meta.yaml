    ```

    36

    ```


    # Object-oriented


    In the procedural style, the focus was on the given code, but in this style, the
    focus is on the data. The merit of this style is the formation of a class paradigm
    and adherence to object-oriented principles like abstraction, inheritance, polymorphism,
    and encapsulation.


