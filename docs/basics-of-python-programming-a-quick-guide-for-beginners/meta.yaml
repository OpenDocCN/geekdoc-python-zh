    # Exception Handling


    **Abstract:** In this chapter, we introduce the concept of exception handling
    in Python. They are used to specify the alternate sequence of actions the program
    needs to jump to at the occurrence of the event. For example, if we want to print
    several pages from the printer and somewhere in the middle of the job the paper
    gets stuck in the printer. In such as situation we would want to jump to the function
    that aborts the printing and handles this situation by instant shut down of the
    printer. In such events comes the exception handling. When the program jumps to
    the exception handler part the current sequence of commands is abandoned and the
    commands given to the exception handler are executed. After the exception is tackled
    the programming returns to the point where the marker left.


    **Keywords:** Error handling, Event notification.


    # INTRODUCTION


    Error handling makes your code more robust by shielding it from the kinds of mistakes
    that may result in an abrupt shutdown of your application. On the other hand,
    Python exceptions can be handled in contrast to errors. Errors can be syntax errors,
    and although various exceptions might happen during execution, they aren''t always
    unusable. An error could be a syntax mistake. An application that is reasonable
    and well-designed should avoid the critical issues indicated by an Error.


    In contrast, an application that is suitable and well-designed should try to capture
    the conditions that are indicated by an Exception. Programmers should avoid handling
    errors wherever possible since they are a form of uncontrolled exception that
    cannot be recovered from. An example of this type of error is the **ZeroDivisionError**.
    Think about what would happen if you produced code that was later used in production
    but still ended because of an error. Because the customer would be dissatisfied,
    handling the exception in advance and eliminating uncertainty is preferable. There
    are two different kinds of mistakes, the first being syntax errors and the second
    being exceptions. A syntax error will occur when the parser identifies a grammatical
    problem in your code. Syntax errors are also commonly referred to as parsing errors.
