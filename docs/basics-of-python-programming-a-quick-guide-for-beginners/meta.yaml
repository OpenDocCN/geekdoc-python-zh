    # Sorting Dictionaries


    An element in a dictionary is made up of a key and the value that corresponds
    to it. The process of sorting entries in a dictionary may be carried out as a
    parameter using either the key or the value components. dictionary components
    can be sorted either by their keys or their values with the help of the *sorted
    ()* method.


    # Example:


    ```

    1. # Initializing a dictionary

    2. D1= {"James" : 50, "William" : 30, "John" : 25, "David" : 60, "Bob" :20}

    3. print (type(D1))

    4. # Printing dictionary before sorting

    5. print ("The original dictionary is: " , D1)

    6. # Sorting by key

    7. D2= dict(sorted(D1.items(), key=lambda x: x[0]))

    8. print ("After sorting by key: ", D2)

    9. print (type(D2))

    ```'
