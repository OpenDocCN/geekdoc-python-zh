    ## CHAPTER 1


    ## Introduction to Python


    **Abstract:** Python is an object-oriented programming language that can support
    a wide range of applications like web development, desktop applications, *etc.*
    Its general-purpose programming features make coding easy, comprehensive and readable
    even for beginners.


    **Keywords:** Development environments, Object-oriented programming, Operating
    system, Shuffle exchange network, Virtual machine.


    ## INTRODUCTION


    Python has grown to be a mainstream language. Its simple syntax and comprehensible
    code make it a popular general-purpose programming language among developers,
    engineers, and amateurs with limited programming skills. Its open-source features
    with a wide variety of libraries facilitate efficient programming. The first chapter
    of this book provides a brief introduction to Python along with a stepwise guide
    to installation on Windows and Linux. It will familiarize you with the Python
    IDE and editors, thus paving your journey to Python programming.


    Guido van Rossum, Python''s Benevolent Dictator for Life, developed Python in
    the 1990s. After that, several versions of Python were released. With the end
    of life of version 2.7, currently, versions 3.6 and 3.9 are widely used. Python
    is an open-source project maintained by the Python Software Foundation. We can
    take a tour of the Python universe at www.python.org.


    Python is an object-oriented language that, due to its interoperability with existing
    codes in C and Fortran, gears up to the developer''s demands and enhances the
    programmer''s productivity while cutting down the time consumed. Python has become
    the developer''s choice in various fields. For example, some of the prominent
    areas where Python is used are NASA''s Jet Propulsion Laboratory, the Lawrence
    Livermore National Laboratory, Shell Research Boeing, Industrial Light and Magic,
    Sony Entertainment, and Procter & Gamble. Python is a high-level language; thus,
    the programs coded in it are easy and comprehensible. Python codes execute on
    a virtual machine; hence, a layer of abstraction exists between the code and the
    executing platform. Thus, Python is an interpreted language and produces portable
    codes that are cross-platform executable. Fig. (1) depicts the execution of a
    simple Python program. Unlike Fortran, Python is a dynamically typed language
    that uses an interpreter to interpret the representative types at the run time.
    The layer of abstraction abstracts the underlying optimization from the code.
    Python binds Fortran and C libraries using an interpreter to perform intensive
    computation.


    ![](img/a3dd2fbdd34f88affbf364777f25c839_16_0.png)


    Fig. (1). Execution schematic of Python code.


    You must have previously understood various languages like C++, Java, Perl, Scheme,
    or BASIC. All these languages are high-level languages. Nevertheless, computer
    hardware understands only low-level language called machine language. So, high-level
    language needs to be converted into machine language. For this, we have two translators:
    a *compiler* and an *interpreter*. A compiler is a program that translates the
    entire program into machine language. The high-level program is known as the source
    code, and the output is machine code. An interpreter is also a program that takes
    high-level language and converts it into machine code instruction by instruction.
    Compiled code can be run any number of times without repeated compiling or the
    source code. In contrast, interpreted code requires an interpreter and source
    code every time. Thus, interpreted code makes the programming environment more
    user-friendly and enhances portability. Every CPU has its machine code, but we
    can run a high-level language program with the interpreter.


    ## TECHNICAL STRENGTHS OF PYTHON


    ### Portability


    As already discussed, Python is a portable language that requires Byte Code for
    execution on any platform. An executable byte code converts the source code to
    platform-independent code. Python consists of a Tkinter toolkit to support the
    Tk GUI interface so the graphical user interface can run on all GUI''s supported
    platforms without program changes. Python''s original, standard implementation
    was given in ANSI C, making it executable on all major platforms ranging from
    PDAs to supercomputers.


    ### Object-Oriented


    Python is an object-oriented programming language. The language is extensible,
    *i.e.*, the programs can be extended to C, C++, and Java. It uses a class model
    to support polymorphism, operator overloading, and other notions. It is a powerful
    scripting tool for other object-oriented system languages, like C++, Java, and
    C#. The recent versions of Python also support functional programming. This includes
    generators, comprehensions, closures, maps, *etc*.


    ### Community Support


    Python community support is quite active and responsive to the user''s queries.
    The community consists of Python creator Guido van Rossum, the Benevolent Dictator
    for Life (BDFL), and a crew of thousands of workers. Python is more conservative
    than other languages in terms of changes, *i.e.*, the changes need to be approved
    by the community, especially BDFL.


    ### Advanced Features


    Python provides full support for features of scripting languages like PERL. The
    scheme facilitates the use of software development tools that are easily found
    in compiled languages. It is a product of the FLOSS community, *i.e.*, Python
    is a Free, Libre, and Open-Source Software that assists in knowledge sharing.
