    # List as Arrays


    The list is a collection of elements of various data kinds, such as logical character
    values, numeric values, and so on. Because an array is used in many computer languages,
    including C, C++, Java, etc., it is also well recognized. A group of items of
    homogenous make up an array. An exception with the message “Incompatible data
    types” is raised if the array''s items have different data types. Let''s use an
    illustration to help you grasp this idea.


    # Example:


    ```

    1. # Simple list

    2. list1 = [''John'',''James'', 10, 20, -5, ''David'']

    3. print (list)

    4. # Using array in Python

    5. import array

    6. A = array.array(''i'', [30, 50, 80])

    7. # accessing elements of array

