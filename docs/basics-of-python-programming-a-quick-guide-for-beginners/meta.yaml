    # DICTIONARY


    Another essential built-in data type in Python is referred to as the dictionary.
    Data can be saved there in the form of collections. dictionary usage is not as
    widespread as other data structures, such as arrays and lists. In Python, a dictionary
    is a collection that stores the data or value that is associated with a certain
    set of keys. The relationship between values and keys is known as a mapping relation.
    Hence dictionary entries in Python take into account mapping relations between
    items. Compared to lists and arrays, the operation of dictionaries is rather distinct.
    The collection items are saved in the list and may be retrieved using index positions.
    When we wish to retrieve a particular element in a list or array, it implies that
    we must do a lookup using that element''s index number. Programmers are not interested
    in working with indexing structures, yet many applications call for a more versatile
    method in terms of how information is retrieved from the collection. As a result,
    dictionaries can offer a superior option. Some concrete examples might help illustrate
    the meaning behind the notion of dictionaries. If we want to find out the employee''s
    phone number based on their name, or if we want to know the city''s name based
    on the supplied pin code, we may use this. The result is an effective data structure
    referred to as a dictionary and followed mapping between different values and
    keys. This particular combination is referred to as a *key-value* pair in the
    realm of computer'
