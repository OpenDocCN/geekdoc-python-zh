    # STRING OPERATIONS


    A string is an essential concept in Python because it can be used in coding in
    many places. The string can be created with either single or double quotation
    marks. Let us take an example of string creation.


    ```

    S1= ‘Python Programming.’

    S2= “Python Programming.”

    ```


    Both are the way to create a string.


    # Accessing Values in Strings


    An assignment is much easier than another programming language because character
    types are NOT supported in Python. Characters are considered strings of length
    one. If we want to take a subpart of a string, then we have to take a substring.
    The substring is determined by specifying the slice required using index/indices
    within the square brackets. A string can also update and reassign the value to
    another string. Let us take an example.


    # Example:


    ```

    1. wr1= ‘Book for Beginners

    2. wr2= ‘Requires”

    3. print (“wr1[0]: “, wr1[0])

    4. print (“wr2[0:6]: “, wr2[0:6])

