    # Ubuntu


    With different versions of the Ubuntu distribution, Python is preinstalled. You
    might require updating the version of Python. The steps for Python installation
    on Ubuntu are as follows:


    +   1. Check the version of Python installed on your Ubuntu system.


    ```

    python -version

    ```


    +   2. Update and refresh the list of the repository.


    ```

    sudo apt update

    ```


    +   3. Installation of Supporting Software.


    ```

    sudo apt install software-properties-common

    ```


    +   4. Add Deadsnakes PPA ((Personal Package Archive)).


    ```

    sudo add-apt-repository ppa:deadsnakes/ppa

    ```


    +   5. You will be prompted to press enter for installation continuation. Press
    Enter. Refresh the package lists again.


    ```

    sudo apt update

    ```


    +   6. Install Python 3 using the following command.


    ```

    sudo apt install python3.9

    ```


    +   7. Verify the Python version after successful installation.


    # Linux Mint


    Installation of Mint is like Ubuntu, and installation instructions for Ubuntu
    can also be used in Mint. A Deadsnakes/PPA working well with Mint.'
