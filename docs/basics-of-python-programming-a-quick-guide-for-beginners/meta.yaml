    **Keywords:** Binary search, Factorial, Time series.


    # INTRODUCTION


    After going through the previous chapters, we are sure you have a better understanding
    of the basics of Python. Now let''s gear up to some programming exercises with
    Python. In the beginning, we provide some simple and basic Python programs using
    functions, lists, dictionaries, arrays, *etc*. Then we discuss some basic machine
    learning applications with Python programming.


    # BASIC PYTHON PROGRAM


    # Program to Solve a Quadratic Equation


    # Example:


    ```

    1. # Import complex math module

    2. import cmath

    3. a = input(''Enter your choice: '')

    4. b =input(''Enter your choice: '')

    5. c = input(''Enter your choice: '')


    6. # Calculate the discriminant

    7. d = (b**2) - (4*a*c)


    8. # Find two solutions

    9. sol1 = (-b-cmath.sqrt(d))/(2*a)

    10. sol2 = (-b+cmath.sqrt(d))/(2*a)

    11. print(''The solution are {0} and {1}''.format(sol1,sol2))

    ```'
