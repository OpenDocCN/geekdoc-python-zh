    # CLASS AND OBJECT


    A **class** is a name that can be given to a collection of objects. It is a logical
    entity with specific methods and unique properties. For example, a student''s
    class should contain an attribute and a method, such as their name, age, address,
    and the classes they are enrolled in. The **object** functions as its independent
    entity, complete with a state and a set of behaviors. It may be a notebook, computer,
    pencil, or other things. In Python, everything is an object, and nearly anything
    may have both attributes and methods applied to it. When a class is defined, the
    class must first create an object before it may assign memory.


    # DATA ABSTRACTION


    The practice of abstraction is a method that hides information on the system''s
    internal workings and shows only its functionalities. Data encapsulation and data
    abstraction are two terms that are frequently used interchangeably. Because data
    encapsulation is the means through which data abstraction is achieved, it is possible
    to use either word interchangeably.


    # ENCAPSULATION


    Encapsulation is a key notion in object-oriented programming, one of today''s
    most prevalent programming paradigms. It explains the concept of enclosing the
    data and the methods that operate on the data within a single unit. This limits
    direct accessing methods and variables, which helps avoid unintentional data change.
    Only the object''s method can change the object''s variables; this is done to
    prevent unintentional changes. These particular variables fall under the category
    of “private variables.” Encapsulation can be illustrated by how a class stores
    all information about its member functions, variables, and so on. The objective
    of information hiding is to ensure that the state of an object is always valid
    by regulating access to its attributes while keeping those properties hidden from
    the view of the outside world.


    # INHERITANCE


    Inheritance is the most fundamental component of object-oriented programming,
    miming the inheritance process that occurs in real life. Inheritance is an essential
    component. It states that all of the characteristics and behaviors of the parent
    object are passed down to the child object through inheritance. Through inheritance,
    we can build a class capable of taking on all of the characteristics and actions
    of another class. The new class is considered to be a derived class or a child
    class, whereas the base class or the parent class is regarded as the class'
