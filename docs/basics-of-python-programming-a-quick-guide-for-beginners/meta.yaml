  md: "# Nested Dictionaries\n\nA dictionary is a collection of components that are\
    \ not arranged in any particular sequence, as we have seen previously in this\
    \ lesson. It has a variety of components in the form of *key-value* pairs that\
    \ are enclosed in curly brackets. The term “nested dictionary” refers to a situation\
    \ in which one dictionary is kept inside another dictionary. It works much the\
    \ same way that nested records and nested structures do in other programming languages.\
    \ To put it another way, we may argue that it is a compilation of several dictionaries\
    \ into a single, unified dictionary.\n\n# Syntax:\n\n```\nNested_Dict1 = {\n \
    \   'Dict1': {'key1': 'value1'},\n    'Dict2': {'key1': 'value1'},\n    'Dict3':\
    \ {'key1': 'value1'}\n}\n```\n\n# Example:\n\n```\n1.  # Nested dictionary\n2.\
    \  Emp = {'e1' : {'name': 'James', 'age': '50', 'Post': 'Manager'},\n3.      'e2'\
    \ : {'name': 'william', 'age': '45', 'Post': 'Clerk'},\n4.      'e3' : {'name':\
    \ 'David', 'age': '35', 'Post': 'HR'}\n5.      }\n6.  # Printing complete nested\
    \ dictionary\n7.  print (Emp)\n8.  \n9.  print ('-----Details of e1 dictionary-------')\n\
    10. print (Emp['e1']['name'])\n11. print (Emp['e1']['age'])\n12. print (Emp['e1']['Post'])\n\
    13. \n14. print ('-----Details of e2 dictionary-------')\n15. print (Emp['e2']['name'])\n\
    16. print (Emp['e2']['age'])\n17. print (Emp['e2']['Post'])\n18. \n19. print ('-----Details\
    \ of e3 dictionary-------')\n20. print (Emp['e3']['name'])\n21. print (Emp['e3']['age'])\n\
    22. print (Emp['e3']['Post'])\n```"
