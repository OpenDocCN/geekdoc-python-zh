    effective and may be expressed as a list of values delimited by commas and enclosed
    in square brackets. A list is frequently utilized to store the sequence of various
    kinds of data. The list is changeable, which indicates that its elements can be
    altered after the list has been constructed. This chapter discusses a variety
    of operations that may be carried out on a list''s elements.


