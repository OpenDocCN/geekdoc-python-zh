  mdcn: "Python 中列表和数组之间存在差异：\n\n- 列表可以包含属于不同数据类型的元素，但数组只能包含属于相同数据类型的元素。\n- 列表不需要显式导入模块进行声明，但数组需要显式导入模块进行表示。\n\
