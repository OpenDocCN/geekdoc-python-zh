- md: "## Multiple Inheritance\n\nA class can derive from numerous base classes in\
    \ a multiple inheritance scenario. The derived class inherits all of the base\
    \ classes' properties when there are multiple inheritances. Fig. (3) illustrates\
    \ multiple inheritances, where a derived class inherits the traits of two base\
    \ classes.\n\n![](img/a3dd2fbdd34f88affbf364777f25c839_238_0.png)\n\nFig. (3).\
    \ Multiple Inheritance.\n\n## Example:\n\n```python\n# First Base class\nclass\
    \ Sneakers:\n    def cat1(self, category):\n        print(\"-----Base class 1-----\"\
    )\n        self.category = category\n        print('Sneakers :', self.category)\n\
    \n# Second base class\nclass Sports_shoes:\n    def style_1(self, style):\n  \
    \      self.style = style\n        print(\"-----Base class 2-----\")\n       \
    \ print(\"Sports_shoes :\", self.style)\n\n# Derived class\nclass shoes(Sneakers,\
    \ Sports_shoes):\n    def model_name(self, name):\n        print(\"-----Derived\
    \ class-----\")\n        self.name = name\n        print(\"model :\", self.name)\n\
    \ns1 = shoes()\ns1.cat1('Spark')\ns1.style_1('Bata')\ns1.model_name('casuals')\n\
    ```\n\n## Output:\n\n```\n-----Base class 1-----\n\nSneakers : Spark\n\n-----Base\
    \ class 2-----\n\nSports_shoes : Bata\n\n-----Derived class-----\n\nmodel : casuals\n\
    ```\n\n## Hierarchical Inheritance\n\nMultiple derived classes can be inherited\
    \ from a single base class through a process known as hierarchy inheritance. In\
    \ the example of hierarchical inheritance shown in Fig. (4), three derived classes\
    \ are descended from a single base class.\n\n![](img/a3dd2fbdd34f88affbf364777f25c839_240_0.png)\n\
    \nFig. (4). Hierarchical Inheritance.\n\n## Example:\n\n```python\n# Base class\n\
    class Televisions:\n    def cat1(self, category):\n        print(\"-----Base class-----\"\
    )\n        self.category = category\n        print('Electronic :', self.category)\n\
    \n# Derived class 1\nclass plasma(Televisions):\n    def style_1(self, style):\n\
    \        self.style = style\n        print(\"-----Derived class 1-----\")\n  \
    \      print(\"Tube :\", self.style)\n\n# Derived class 2\nclass LCD(Televisions):\n\
    \    def model_name(self, name):\n        print(\"-----Derived class 2-----\"\
    )\n        self.name = name\n        print(\"model :\", self.name)\n\ns1 = plasma()\n\
    s1.cat1('42 inches')\ns1.style_1('LG')\n\ns2 = LCD()\ns2.cat1('32 inches')\ns2.model_name('Samsung')\n\
    ```\n\n## Output:\n\n```\n-----Base class-----\nElectronic : 42 inches\n\n-----Derived\
    \ class 1-----\nTube : LG\n\n-----Base class-----\nElectronic : 32 inches\n\n\
    -----Derived class 2-----\nmodel : Samsung\n```\n\n## The issubclass(sub, sup)\
    \ method()\n\nUse the issubclass(sub, sup) method to determine how the defined\
    \ classes relate. It returns true if the first class is a subclass of the second;\
