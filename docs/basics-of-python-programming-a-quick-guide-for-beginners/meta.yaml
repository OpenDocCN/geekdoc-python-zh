    | IndexError | At the out-of-bound index |

    | IndentationError | Raised at an erroneous indentation |

    | KeyError | When the key is not present in the dictionary |

    | KeyboardInterrupt | Raised at the interruption of the execution by the user
    |

    | MemoryError | Raised when the action is out of memory |

    | NameError | Raised when the named variable is not present in the local or global
    scope |

    | NotImplementedError | Raised by abstract methods |

    | OSError | Raised when there occur OS-related failures |

    | OverflowError | Raised when the result of the operation is too large to be expressed
    |

    | ReferenceError | At the use of a weak reference proxy to access a garbage collection,
