- md: "There are differences between a list and an array in Python:\n\n- A list can\
    \ consist of elements belonging to different data types, but an array only consists\
    \ of elements belonging to the same data type.\n- A list does not need to import\
    \ a module for declaration explicitly, but an array needs to import a module for\
    \ representation explicitly.\n- A list cannot directly handle arithmetic operations,\
    \ but an array can directly manage arithmetic operations.\n- A list can be nested\
    \ to contain different elements, but an array must contain all nested elements\
    \ of the same size.\n- A list is preferred for a shorter sequence of data items,\
    \ but an array is preferred for a longer sequence of data items.\n- A modification\
    \ is easier in the list compared to an array.\n- The entire list can be printed\
    \ without explicit looping but array using a loop to print or access the components.\n\
    \n## Loops in Lists\n\nWhen working with lists, “looping” involves displaying\
    \ each item in the list in succession. In addition, the Python operation is an\
    \ iteration through a list. Python provides a wide variety of options for iterating\
    \ through a list in a program.\n\n## For Loop in the List\n\nDisplaying each item\
    \ on a list may be accomplished with the help of a for loop. To better grasp this\
    \ idea, let's look at a concrete illustration.\n\n### Example:\n\n```python\n\
    list = [11, 22, 33, 44, 55]\n\nfor var in list:\n    print (var)\n```\n\n### Output:\n\
    \n```\n11\n22\n33\n44\n55\n```\n\nLet's say we wish to utilize the standard for\
    \ loop, which iterates through the element until the range we provide. To better\
