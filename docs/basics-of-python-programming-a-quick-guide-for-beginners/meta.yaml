    Gandhi Technological University Bhopal的计算机应用硕士学位，并于2015年获得印度国家理工学院Bhopal数学与计算机应用系的博士学位。他的研究兴趣包括数据挖掘、移动Web服务、大数据分析和用户行为分析。他在各种国际知名期刊和会议上发表了50多篇研究论文。


    ![](img/a3dd2fbdd34f88affbf364777f25c839_280_1.png)


    ## Malika Acharya


    Malika Acharya女士是印度拉贾斯坦邦中央大学的研究学者。她于2019年获得Amity University Noida的技术学士学位（B.Tech），并于2021年获得Rajasthan
    Technical University的技术硕士学位（M.Tech）。她目前是拉贾斯坦邦中央大学计算机科学系的研究学者。她的研究领域包括大数据分析、数据挖掘、机器学习、社交网络和推荐系统。她在各种国际知名期刊和会议上发表了研究论文。'
