    \ | 从右到左 |\n\n## 表达式\n\n表达式是值的表示。此外，它组合了值、变量、运算符和函数调用。表达式需要被求值。如果你要求 Python 打印一个表达式，解释器会对其进行求值并显示所需的结果。它与语句非常不同。Python\
