    # String Comparison


    Comparing strings means identifying whether the two strings are equivalent to
    each other or not. There are three ways to compare the strings:


    +   1. Using Relational Operators

    2. Using is and is not

    3. Using user-defined function


    # Using Relational Operators


    The relational operators compare the Unicode values of the characters of the strings.
    It returns a Boolean value according to the operator used. There are the following
    relational operators available in Python (Table 3).


    Table 3. String comparison using relational operators.


    | == | It checks whether two strings are equal. |

    | != | It checks if two strings are not equal. |

    | < | It checks if the string on its left is smaller than on its right. |

    | <= | It checks if the string on its left is smaller than or equal to that on
    its right. |

    | > | It checks if the string on its left is greater than that on its right. |

    | >= | It checks if the string on its left is greater than or equal to that on
    its right. |


    # Example:


    ```

    1. print ("Python" == "Python")

    2. print ("Python" < "python")

    3. print ("Python" > "python")

    4. print ("Python" <= "python")

    5. print ("Python" >= "python")

    6. print ("Python" != "Python")

    ```'
