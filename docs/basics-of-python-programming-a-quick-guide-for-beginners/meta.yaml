    # Tuple Assignment


    Tuple assignment is a very helpful function that Python provides. It is named
    so because it allows values to be assigned to a tuple of variables on the left-hand
    side of an assignment from a tuple on the right-hand side of the assignment. **Unpacking**
    a tuple of values into a variable is another name for this operation. When we
    **pack**, the data is placed inside a new tuple, but when we unpack, we remove
    those values and place them inside a single variable. With the assistance of this
    feature, it is possible to assign more than one variable at once while a sequence
    is displayed on the left. The following illustration shows how one tuple, T1,
    may be used to assign values to five distinct variables. In this task, the number
    of variables listed on the left-hand side of the equation must match the number
    of tuple elements listed on the right-hand side of the equation. If this requirement
    is not met, an error will be generated.'
