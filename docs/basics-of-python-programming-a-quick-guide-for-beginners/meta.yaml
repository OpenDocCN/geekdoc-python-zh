    \n### 示例：\n\n```python\nlist = [11, 22, 33, 44, 55]\n\n[print (i) for i in list]\
    \  # 使用列表推导式\n```\n\n### 输出：\n\n```\n11\n22\n33\n44\n55\n```\n\n## Enumerate()\
