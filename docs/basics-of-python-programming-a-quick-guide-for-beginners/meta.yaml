    # User-defined Exceptions


    You may create your own exceptions by creating classes from the built-in exceptions
    in Python. Programmers can invoke their exceptions by developing a new exception
    class. Inheritance from the Exception class is required for exceptions, either
    directly or indirectly. An illustration of a user-defined exception may be seen
    in the code below:


    # Example:


    ```

    1.  # define Python user-defined exceptions

    2.  class SeniorCitizenException(Exception):

    3.      "Raised when age is less than 60"

    4.      pass

    5.  age = 60

    6.  try:

    7.      yr_age= int(input("Enter your age: "))

    8.      if yr_age >= age:

    9.          print("Senior citizen")

    10.         print("Eligible")

    11.     else:

    12.         raise SeniorCitizenException

    13. except SeniorCitizenException:

    14.     print("Exception occurred: Not eligible")

    ```


    # Output:


    ```

    --------------------------------Running the program with following inputs--------------------------------


    Enter your age: 45


    Exception occurred: Not eligible


    Enter your age: 65


    Senior citizen


    Eligible

    ```


    In the example above, we create a custom exception **SeniorCitizenException**
    defined in a class derived from the built-in Exception class. When the user''s
    age is less than 60, an exception is generated, and the rest of the statements
    in the try block are skipped. The user-defined exception *SeniorCitizenException*
    activates the except block, and the statement inside this block is executed.'
