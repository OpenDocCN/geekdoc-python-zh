    \ test(x):\n2.     try:\n3.         x1 = int(x)\n4.         if x1 > 60:\n5.  \
    \           print(\"Valid age\")\n6.     except TypeError:\n7.         print(\"\
    x is invalid..\")\n8.     except ValueError:\n9.         print(\"x can only be\
    \ integer\")\n10.     except:\n11.         print(\"Unexpected error\")\n12. \n\
    13. ----Run the program with following set of outputs----------\n14. x = [3.5,4]\n\
    15. test(x)\n16. \n17. -----Run the program with following set of outputs----------\n\
    18. x= 85\n19. test(x)\n```"
  - "[PAGE 202]\n\n# Output:\n\n```\nx is invalid...\n\nValid age\n```\n\n# ELSE AND\
    \ FINALLY, KEYWORD\n\nPython's try and except blocks, together with the keywords\
    \ else and finally, can be used in conjunction with one another. If an error occurs\
    \ in the try block while the program is being performed, the except block will\
    \ be carried out instead. However, if the try block does not produce any exceptions,\
    \ the code in the else block will be carried out. In the end, another statement\
    \ is utilized in the exception-handling process. Regardless of whether an exception\
    \ is thrown, the final block's contents are always carried out in their entirety.\
    \ As a consequence, the error-free try block advances directly to the finally\
    \ block without running the except clause. It then continues to execute the remaining\
    \ code.\n\n# Syntax:\n\n```\ntry:\n    #Statements\nexcept:\n    # Statements,\
    \ if an exception occurs\nelse:\n    #Statements, if no exception occurs\nfinally:\n\
    \    #This code will always run\n```"
