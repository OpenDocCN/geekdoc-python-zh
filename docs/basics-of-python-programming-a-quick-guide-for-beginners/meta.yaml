    \ 77, 88, 99]\n```\n\n### 使用 Extend() 克隆列表\n\n`extend()` 函数可用于将列表复制到新列表中。让我们举一个例子来理解这个概念。\n\
    \n### 示例：\n\n```python\n1. def cloning_List(li1):\n2.     lst1 = []\n3.     lst1.extend(li1)\n\
