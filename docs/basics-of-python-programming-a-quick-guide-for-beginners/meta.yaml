    # • PYTORCH


    PyTorch is an open-source framework developed by Team Facebook that focuses on
    deep learning. It has viable support for Python and C++. There are three levels
    of abstraction present in PyTorch: **Tensor, variable, and Module**. The salient
    features of PyTorch are:


    +   1. **Interface:** The simple and easy execution of PyTorch makes it quite
    popular.

    2. **Python Usage:** It uses a Python-based library and hence can leverage the
    functionalities provided by the Python environment.

