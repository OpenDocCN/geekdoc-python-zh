    ## zip() 函数


    Python 的 zip() 函数主要用于组合两个容器元素的数据。此函数接受可迭代对象，并根据它们在可迭代对象中的顺序聚合其元素。它接受任意数量的可迭代对象作为输入，并返回一个元组迭代器。可迭代对象可以是列表、字符串、*等等*。下面是根据相同索引对两个不同列表的项目进行分组的示例。


    ## 示例：


    ```

    1. # 创建两个列表

    2. List1 = [''A'', ''B'', ''C'', ''D'']

    3. List2 = [10, 20, 30, 40]

    4. # 使用 zip 组合

    5. Result = tuple(zip(List1, List2))

    6. print (Result)

    7. print (type(Result))

    ```


    ## 输出：


    ```

    ((''A'', 10), (''B'', 20), (''C'', 30), (''D'', 40))

    <class ''tuple''>

    ```


    如果传递的可迭代对象长度不同，返回的迭代器将采用传递给函数的最短迭代器的长度。在下面的例子中，我们有两个大小分别为四和二的列表。结果元组的长度为二，基于最短的列表
    **list2**。


    ## 示例：


    ```

    1. # 创建两个列表

    2. List1 = [''A'', ''B'', ''C'', ''D'']

    3. List2 = [100, 200]

    4. # 使用 zip 组合

    5. Result = tuple(zip(List1, List2))

    6. print (Result)

    7. print (type(Result))

    ```


    ## 输出：


    ```

    ((''A'', 100), (''B'', 200))

    <class ''tuple''>

    ```


