    # Slice Operation


    The slice() function returns a slice object that can be used to slice strings,
    lists, tuples, *etc*. There is the following syntax with parameters description
    of slice() function.


    # Syntax:


    ```

    slice(stop)

    slice(start, stop, step)

    ```


    A **start** parameter provides the index at which an object''s slicing begins.
    The index at which the slicing of an object is stopped can be determined by using
    a **stop** argument. The **step** parameter is an optional statement that determines
    the increment between each index throughout the slicing process. There are the
    following important points about the *slice()* function:


    +   - It returns a sliced object that only contains elements from the defined
    set.

    - If only one parameter is passed, then the start and step are considered to be
    none.'
