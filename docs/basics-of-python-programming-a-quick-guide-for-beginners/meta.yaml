  md: '# Dictionary Creation


    Python allows the creation of dictionaries by enclosing a sequence of elements
    in curly braces { } and separated by commas (,). The dictionary has several values,
    each corresponding to a certain key. Values can be of any data type and replicated
    in a dictionary, whereas keys cannot be copied and are immutable. Because of this,
