    # Regular Expression


    A regular expression is a unique string of characters that employs a particular
    syntax to assist you in fitting or locating other strings or sets of strings.
    This may be accomplished *via* the usage of a regular expression. Additionally,
    it establishes a pattern consisting of a group of strings that correlate to it.
    The functions at your disposal can make use of the **metacharacters** listed below
    in Table 4.


    Table 4. Metacharacters description.


    | Symbol | Description |

    | :--- | :--- |

    | \ | It is used to drop the special meaning of a character. |

    | [] | It represents a character class. |

    | ^ | It matches the beginning. |

    | $ | It matches the end. |

    | . | It matches any character except newline. |

    | ? | It matches zero or one occurrence. |

    | | | It matches with any of the characters separated by it. |

    | * | It shows any number of occurrences (including 0 occurrences) |

    | + | It is for one or more occurrences. |'
