    # Modifying Dictionary


    As a mutable data type, dictionaries allow the element values to be altered whenever
    necessary. By combining an assignment operator with keys, we can either add new
    items or change the value of existing ones. If the key is already in use, then
    the value will be modified to reflect the addition of the new key. If the key
    does not already exist in the dictionary, it will be replaced with a new *key-value*
    pair. When adding a new entry to a dictionary, the syntax that is shown above
    should be used.


    # Syntax:


    ```

    Dictionaryname[key]=value

