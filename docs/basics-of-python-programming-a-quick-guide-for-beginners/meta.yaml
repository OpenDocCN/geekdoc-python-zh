    元组赋值是 Python 提供的一个非常有用的功能。它之所以得名，是因为它允许将赋值右侧元组中的值赋给左侧的变量元组。将值元组**解包**到变量中是此操作的另一个名称。当我们**打包**时，数据被放入一个新的元组中，而当我们解包时，我们取出这些值并将它们放入单个变量中。借助此功能，可以在左侧显示序列的同时一次赋值多个变量。下图展示了如何使用一个元组
    T1 为五个不同的变量赋值。在此任务中，方程左侧列出的变量数量必须与方程右侧列出的元组元素数量匹配。如果此要求未满足，将生成错误。


    ## 示例：


    ```

    1. # 包含五个元素的元组/打包

    2. T1= (''David'', ''India'', 1990, 1001)

    3. print ("元组元素为：", T1)

    4. # 将元组赋值给不同的变量/解包

    5. (EmpName, Country, BirthYear, EmpId)=T1

    6. # 打印各个变量

    7. print ("-----------------------")

    8. print ("EmpName:",EmpName)

    9. print ("Country:", Country)

    10. print ("BirthYear:", BirthYear)

    11. print ("EmpId:",EmpId)

    ```


    ## 输出：


    ```

    元组元素为：(''David'', ''India'', 1990, 1001)

    -----------------------

    EmpName: David

    Country: India

    BirthYear: 1990

    EmpId: 1001

    ```


    在上面的例子中，我们有一个包含五个元素的元组 T1，并在单个语句中为变量 EmpName、Country、BirthYear 和 EmpId 赋予了不同的值。我们也可以将单个元素值赋给变量，例如：


    ## 示例：


    ```

    1. # 包含五个元素的元组

    2. T1= (''David'', ''India'', 1990, 1001)

    3. print ("元组元素为：", T1)

    4. # 一次赋值一个值

    5. EmpName=T1[0]

    6. Country=T1[1]

    7. BirthYear=T1[2]

    8. EmpId=T1[3]

    9. # 打印各个值

    10. print (''-----------------------'')

    11. print (EmpName)

    12. print (Country)

    13. print (BirthYear)

    14. print (EmpId)

    ```


    ## 输出：


    ```

    元组元素为：(''David'', ''India'', 1990, 1001)

    -------------------

    David

    India

    1990

    1001

    ```


    ## 元组与函数


    当使用前缀 * 调用函数时，可以使用一种独特的方法以元组形式获取参数。当函数的参数数量被视为函数时，这是有用的信息。由于在 args 变量上放置了 * 前缀；任何发送给函数的额外参数都将作为元组保存在该变量中。


    ## 示例：


    ```

    1.  # 此函数接收一个元组作为参数

    2.  def fun1(*args):

    3.      print (type(args))  # 打印 args 的类型

    4.      print (args)

    5.  # 创建一个元组

    6.  T1=("Python", "Programming book", 2022)

    7.  # 将元组传递给函数

    8.  fun1(T1)

    ```


    ## 输出：


    ```

    <class ''tuple''>

    ((''Python'', ''Programming book'', 2022),)

    ```


    在 C 或其他编程语言中，从函数返回多个值是不可行的，但在 Python 中，这样做不仅可行，而且相当简单。我们可以通过使用以逗号分隔的简单返回语句在 Python
    中返回多个值。以下代码片段演示了如何定义一个名为 *fun_ret_mul()* 的函数，该函数将返回一个字符串和一个数字。


    ## 示例：


    ```

    1. # 以元组形式返回多个值

    2. # 此函数返回一个元组

    3. def fun_ret_mul():

    4.     s1 = "Python book"

    5.     x = 2022

    6.     return (s1, x)

    7. # 调用函数

    8. T1= fun_ret_mul() # T1 是一个元组

    9. print (type(T1))

    10. print (T1)

    ```


    ## 输出：


    ```

    <class ''tuple''>

    (''Python book'', 2022)

    ```


    ## 元组的嵌套


    Python 允许我们在另一个元组内声明一个元组；这种类型的元组被称为嵌套元组。当需要将数据组织成层次结构时，就会使用嵌套元组。如果元组中只包含一个元素，那么我们不能将其称为元组。它应该在其后包含一个逗号作为尾随标记，以向解释器表明它是一个元组。在下面的例子中，我们声明了一个包含在另一个元组内的元组。


    ## 示例：


    ```

    1. # 嵌套元组

    2. Tuple1 = ("Python", [1,2,3], (5, 6.6, "Programming", "Book"))

    3. # 打印元组的所有元素

    4. print ("元组值为：", Tuple1)

    5. # 打印第一个元素

    6. print ("第一个元素：", Tuple1[0])

    7. # 打印第二个元素或子元组

    8. print ("子元组：", Tuple1[1])

    9. # 打印第三个元素或子元组

    10. print ("子元组：", Tuple1[2])

    ```


    ## 输出：


    ```

    元组值为：(''Python'', [1, 2, 3], (5, 6.6, ''Programming'', ''Book''))


