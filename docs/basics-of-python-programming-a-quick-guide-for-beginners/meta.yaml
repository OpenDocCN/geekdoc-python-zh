    \ | if | Try | assert | except | nonlocal |\n| Class | True | raise | In | else\
    \ | lambda | yield |\n| from | Pass | and | Elif | is | with | break |\n| Or |\
    \ global | del | As | while | await | for |\n| None | continue | import | Return\
    \ | async | finally | not |\n\n## Identifiers\n\nAn identifier is a name that\
    \ identifies a variable, function, class, object, *etc*. Some rules for identifier\
    \ conventions are:\n\n1. Do not use special characters like @, !, &, *, *etc*,\
    \ and punctations in the identifier names.\n2. An identifier should not start\
    \ with a digit.\n3. Identifiers are highly case-sensitive. Hence, **atoms** and\
    \ **Atoms** are different identifiers in Python.\n4. An identifier can start with\
    \ alphabets *A to Z* and *a to z* or an underscore (_) that may or may not be\
    \ followed by letters, underscores, or digits (0-9).\n5. Do not use the keywords\
    \ as the identifiers.\n6. A class name must always begin with an uppercase alphabet.\n\
    7. A private identifier begins with a single underscore. A strongly private identifier\
    \ begins with two underscores. Moreover, a special name ends with two trailing\
    \ underscores.\n\n| y, dept, course_in_cs, course1, course_2, _grade, grade_2\
    \ | valid identifiers |\n| 4, dep in college, cs-course, 1 st, 1_exam | Invalid\
    \ identifiers |\n\n## Statements\n\nIn Python, a statement can be defined as an\
    \ instruction or a command that the interpreter can execute. There are several\
    \ kinds of statements in Python that offer a variety of purposes. We can compose\
    \ a single line of multiple statements separated by semicolons. The various types\
    \ of statements are:\n\n1. Expression statement: They are used to compute, write\
    \ a value or call a procedure.\n2. Assignment statements: They assign the values\
    \ and modify the items.\n3. Assert statements: They provide debugging assertions.\n\
    4. Pass statements: They are much like null operations; no operation takes place\
    \ when they are executed.\n5. Del statements: As the name suggests, they specify\
    \ the deletion targets.\n6. Return statements: They are specified after the function\
    \ block and defined when the program leaves the current function block.\n7. Yield\
    \ statements: They are used in the *generator* function only.\n8. Raise statements:\
    \ They raise the exceptions. If there exist no new exceptions, then they re-raise\
    \ the exception that is currently being handled.\n9. Break statements: They are\
    \ usually used with loops (*for*, *while*) and with try statements. They end the\
    \ execution sequence and move the program out of the current block in the loop.\n\
    10. Continue statements: They stop the current iteration in the loop and begin\
    \ with the next iteration.\n11. Import statements: They are used to import the\
    \ modules that are required for easy pre-processing.\n12. Global statements: They\
    \ are used to define the identifier that remains valid for the entire code block.\n\
    13. Nonlocal statements: They bind the identifier to the nearest block so that\
    \ searching for the identifier in the local namespace is very easy.\n\n## Indentation\n\
    \nIn Python, indentation plays a very important role. Indentation can be defined\
    \ as the blank spaces before a few statements. Besides enhancing the code readability,\
    \ indentation also defines the scope of the function, much like the curly braces\
    \ ({ }) in C and C++. Fig. (7) depicts the indentation for the loop. The indentation\
    \ rules are as follows:\n\n![](img/a3dd2fbdd34f88affbf364777f25c839_26_0.png)\n\
    \nFig. (7). Indentation in Python.\n\n1. \"Four spaces\" are the default indentation\
    \ spaces.\n2. There cannot be an indentation in the first line of the code.\n\
    3. Maintain the uniformity of code, *i.e.*, the number of spaces must be uniform.\n\
    4. Prefer the use of whitespaces rather than tabs for indentation.\n\n## Comments\n\
    \nComments in Python are statements added in the code by the programmers that\
    \ indicate the purpose of the code block. They increase the readability of the\
    \ code. They are not executed at the run time. The various purposes of comments\
    \ are:\n\n1. Enhanced readability.\n2. Inclusion of resources.\n3. Reuse of the\
    \ existing codes.\n4. Easy comprehension of the code and handy explanation.\n\n\
    Comments start with a # symbol and can be placed at the end of a line. There are\
    \ two types of comments in Python. These are:\n\n*Single-line comments* and *Multiline\
    \ comments*.\n\n### Single line comments\n\nIt starts with a # symbol which means\
    \ you have to write the # symbol in every line.\n\n### Multiline comments\n\n\
    A multiline comment in Python is a block of text enclosed by a delimiter (\"\"\
    \") at the beginning and end of the comment. There should be no white space in\
    \ delimiters (\"\"\").\n\nLet us take an example for understanding comments.\n\
    \n## Example:\n\n```\nprint(\"Python Programming\") # Single line comment\n\"\"\
    \"\nThis is a comment\nwritten in\nmore lines\n\"\"\"\nprint(\"Book for Computer\
    \ Science.\")\n```\n\n## Output:\n\n```\nPython Programming\nBook for Computer\
    \ Science.\n```\n\n## Coding Styles\n\nPython offers four different coding styles,\
    \ as discussed below.\n\n### Functional\n\nIn this style, the problem is divided\
    \ into different functions, and each statement is considered a Mathematical equation.\
    \ It is widely used in parallel processing tasks and lambda calculus. It is the\
    \ first choice for large data processing jobs.\n\n## Example:\n\n```\nmy_list\
    \ = [2,3,6,7,8,10]\nnew_list = list(map(lambda x: x + 2, my_list))\nprint(new_list)\n\
    ```\n\n## Output:\n\n```\n[4, 5, 8, 9, 10, 12]\n```\n\n### Imperative\n\nThis\
    \ style is used explicitly for various operations on data structures. It requires\
    \ a pre-definition of the order of operations.\n\n## Example:\n\n```\nmy_list\
    \ = [2,3,6,7,8,10]\nsum = 0\nfor x in my_list:\n    sum += 2*x\nprint(sum)\n```\n\
    \n## Output:\n\n```\n72\n```\n\n### Procedural\n\nIt is the most adopted style\
    \ by nonprogrammers. It primarily focuses on the code. The entire code is divided\
    \ into a list of instructions, like breaking a problem into simpler tasks. It\
    \ uses sequencing, selection, modularization, and iteration to reduce code redundancy.\n\
    \n## Example:\n\n```\nmy_list = [2,3,6,9,18,20]\ndef add(list):\n    sum = 0\n\
    \    for x in the list:\n        sum += x\n    return sum\nprint(add(my_list))\n\
    ```\n\n## Output:\n\n```\n36\n```\n\n### Object-oriented\n\nIn the procedural\
    \ style, the focus was on the given code, but in this style, the focus is on the\
    \ data. The merit of this style is the formation of a class paradigm and adherence\
    \ to object-oriented principles like abstraction, inheritance, polymorphism, and\
    \ encapsulation.\n\n## Example:\n\n```\nclass A:\n    def test(self,a,b):\n  \
    \      return(a+b)\nb=A()\nprint(\"res=\", b.test(45,77))\n```\n\n## Output:\n\
    \n```\nres=122\n```\n\n## CONCLUDING REMARKS\n\nIn this chapter, we furnished\
    \ a general introduction to Python. This chapter also guided the readers through\
    \ the installation of Python and Anaconda over different operating systems and\
    \ for different configurations. We also familiarised the readers with some basic\
    \ concepts of Python programming. In the next chapter, we will look deeply into\
    \ Python data types and operators.\n\n# CHAPTER 2\n\n## Data Types, Operators,\
    \ and Expressions\n\n**Abstract:** Now that you have been familiarised with the\
    \ installation and basics of Python programming, it's time to dig in a little\
    \ more and understand the different data types that are available along with the\
    \ operators and expressions that make the programming more user-friendly. In this\
    \ chapter, we will learn about data type categorization and the operators present.\
    \ Here you will learn the following nuances:\n\n1. Data types supported by the\
    \ Python.\n2. Use of variables to store and access the data.\n3. Operators do\
    \ mathematical works and logical functions.\n4. Variety of expressions to serve\
    \ the range of applications.\n\n**Keywords:** Associativity, Literals, Operators,\
    \ Precedence.\n\n## INTRODUCTION\n\nIn computer programming, a data type is a\
    \ classification of the many kinds of information that may be saved in a variable.\
    \ Since Python is a dynamically typed language, we do not need to specify the\
    \ variable type when we declare it.\n\nThe value is bound to its type in a way\
    \ that the interpreter does not explicitly specify—for example, **X=100**. We\
    \ did not declare the type of the variable **X**, yet it now holds the integer\
    \ value 100. In Python, the integers are by default treated to be of integer data\
    \ type. To check the type of the variable, we use **type()** function available\
    \ to us in Python, and it returns the type of the variable that was handed in.\
    \ The following example illustrates how to specify the values for a variable and\
    \ to check their types.\n\n## Example:\n\n```\nx=100\ny=\"Python Programming\"\
    \nz= 12.59\nprint(type(x))\nprint(type(y))\nprint(type(z))\n```"
  mdcn: "## 示例：\n\n```\n# 显示一个名称\nprint(\"Hello World\")\n# 显示名称的函数\n```\n\n## 输出：\n\
    \n```\nHello World\n```\n\n## Python 关键字\n\nPython 关键字是保留用于特定目的的词，不能用于其他任何用途。Python\
    \ 总共有 35 个关键字。关键字列表已经过多次修订。在 Python 2.7 中，*print* 和 *exec* 是关键字，但在 Python 3+ 中它们被移除了，而在\
    \ Python 3.7 中，*await* 和 *async* 作为新关键字被添加。以下是 Python 3.9 的关键字列表。你可以使用 help 命令来获取\
    \ Python 中的关键字。\n\n| False | Def | if | Try | assert | except | nonlocal |\n|\
    \ Class | True | raise | In | else | lambda | yield |\n| from | Pass | and | Elif\
    \ | is | with | break |\n| Or | global | del | As | while | await | for |\n| None\
    \ | continue | import | Return | async | finally | not |\n\n## 标识符\n\n标识符是用于标识变量、函数、类、对象等的名称。一些标识符命名约定的规则是：\n\
    \n1.  不要在标识符名称中使用特殊字符，如 @、!、&、* 等，以及标点符号。\n2.  标识符不应以数字开头。\n3.  标识符区分大小写。因此，**atoms**\
    \ 和 **Atoms** 在 Python 中是不同的标识符。\n4.  标识符可以以字母 *A 到 Z* 和 *a 到 z* 或下划线 (_) 开头，后面可以跟字母、下划线或数字\
    \ (0-9)，也可以不跟。\n5.  不要使用关键字作为标识符。\n6.  类名必须始终以大写字母开头。\n7.  私有标识符以单个下划线开头。强私有标识符以两个下划线开头。此外，特殊名称以两个尾随下划线结尾。\n\
    \n| y, dept, course_in_cs, course1, course_2, _grade, grade_2 | 有效的标识符 |\n| 4,\
    \ dep in college, cs-course, 1 st, 1_exam | 无效的标识符 |\n\n## 语句\n\n在 Python 中，语句可以定义为解释器可以执行的指令或命令。Python\
    \ 中有几种类型的语句，提供各种目的。我们可以用分号分隔多个语句来组成单行。各种类型的语句是：\n\n1.  表达式语句：它们用于计算、写入值或调用过程。\n\
    2.  赋值语句：它们赋值并修改项。\n3.  断言语句：它们提供调试断言。\n4.  空语句：它们非常类似于空操作；执行时不发生任何操作。\n5.  删除语句：顾名思义，它们指定删除目标。\n\
    6.  返回语句：它们在函数块之后指定，并在程序离开当前函数块时定义。\n7.  生成器语句：它们仅在 *生成器* 函数中使用。\n8.  引发语句：它们引发异常。如果不存在新异常，则它们重新引发当前正在处理的异常。\n\
    9.  中断语句：它们通常与循环（*for*、*while*）和 try 语句一起使用。它们结束执行序列并将程序移出循环中的当前块。\n10. 继续语句：它们停止循环中的当前迭代并开始下一次迭代。\n\
    11. 导入语句：它们用于导入易于预处理所需的模块。\n12. 全局语句：它们用于定义在整个代码块中有效的标识符。\n13. 非局部语句：它们将标识符绑定到最近的块，以便在本地命名空间中搜索标识符非常容易。\n\
