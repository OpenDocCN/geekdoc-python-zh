    ```


    ## 从字符串和列表创建元组


    在 Python 中，元组不仅可以从文本构建，也可以从列表构建。当存在多种类型的数据并且需要创建新类型时，就需要这种转换。你可以使用 **tuple()**
    函数将字符串或列表转换为元组。下图进一步阐明了这个概念。


    ## 示例：


    ```

    1.  # 创建列表和字符串

