  mdcn: "**Python 系列**\n\n## 面向绝对初学者的 BiteSize Python\n\n包含实践实验室、真实案例和生成式 AI 辅助\n\n\
    ![](img/e4806f3bc91279996f2dfb01e3181060_0_0.png)\n\n吴迪\n\nChapman & Hall 图书\n\
    \nCRC Press Taylor & Francis Group\n\n## 面向绝对初学者的 BiteSize Python\n\n作为 Python\
    \ 入门读物，本书引导读者循序渐进地理解 Python 代码，阐释核心概念，将编程与现实生活实例相结合，编写 Python 程序，并完成案例研究。\n\n\
    尽管市面上已有大量关于此主题的书籍、网站和在线课程，但我们遵循 **BiteSize** 理念，将 Python 编程分解为一系列不超过 5 分钟的易消化课程。每节课都以清晰简短的主题介绍开篇，为你打下坚实基础，为深入学习做好准备。随后，你将看到演示所讨论概念的编码示例。这些示例简单实用，助你真正理解概念。接着，你将进行不同难度级别的练习任务，以检验知识掌握程度并增强信心。你还将通过案例研究解决现实世界的问题。书中包含提示，教你如何将生成式\
    \ AI 融入学习工具箱，用于获取反馈、进行练习、代码审查以及探索高级主题。推荐的 AI 提示词可帮助你识别改进领域、复习关键概念并跟踪学习进度。\n\n\
    本书专为没有任何编程经验的绝对初学者设计。非常适合日程繁忙或学习时间有限的个人。\n\n## Chapman & Hall/CRC\n\n## Python\
    \ 系列\n\n### 关于本系列\n\nPython 已被公认为最受欢迎的编程语言，并在教育和工业界得到广泛应用。本系列丛书将为学生和专业人士提供广泛的\
    \ Python 相关书籍。系列中的书目将帮助用户在入门和高级水平上学习该语言，并探索其在数据科学、人工智能和机器学习等众多领域的应用。系列书目还可配合 Jupyter\
    \ 笔记本使用。\n\n### 使用 Python 进行统计与数据可视化\n\nJesús Rogel-Salazar\n\n### 人文学者 Python\
    \ 入门\n\nWilliam J.B. Mattingly\n\n### Python 在科学计算与人工智能中的应用\n\nStephen Lynch\n\
    \n### 学习专业 Python 第一卷：基础篇\n\nUsharani Bhimavarapu 和 Jude D. Hemanth\n\n### 学习专业\
    \ Python 第二卷：进阶篇\n\nUsharani Bhimavarapu 和 Jude D. Hemanth\n\n### 从开源项目学习高级 Python\n\
    \nRongpeng Li\n\n### Python 数据科学基础\n\nJohn Mark Shea\n\n### Python 数据挖掘：理论、应用与案例研究\n\
    \n吴迪\n\n### Python 简明入门\n\nStephen Lynch\n\n### Python 入门：涵盖优化、图像与视频处理及机器学习应用\n\
    \nDavid Baez-Lopez 和 David Alfredo Báez Villegas\n\n### 使用 Python 进行整洁金融\n\nChristoph\
