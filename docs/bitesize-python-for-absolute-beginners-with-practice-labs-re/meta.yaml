  md: "# # Repetition\n\nREPETITION flow control lets us repeat a piece of code multiple\
    \ times. This is done using loops, like `for` loops and `while` loops. Repetition\
    \ is important because it saves our time and effort. Instead of writing the same\
    \ code again and again, we can use loops to automate tasks. In real life, repetition\
    \ is useful for things like processing all rows in a dataset, sending automated\
    \ emails, or simulating events like rolling a dice many times. It makes coding\
    \ more efficient and helps solve problems faster.\n\nLet's get started!\n\n# ##\
    \ 8.1 CONDITION-BASED REPETITION\n\n# ### 8.1.1 Explanation\n\nIn Python, condition-based\
    \ repetition flow control is managed using the `while` loop. The `while` loop\
    \ repeatedly executes a block of code as long as a specified condition remains\
    \ true. This type of loop is ideal when you don't know beforehand how many times\
    \ the loop should run, but you want the iteration to continue until a certain\
    \ condition is no longer met.\n\nHere's a basic structure of a `while` loop:\n\
    \n```\npython\nwhile condition:\n    statements\n```\n\nHere, the loop checks\
    \ this `condition` before each iteration. If the `condition` is `True`, the code\
    \ block inside the loop will execute. If the `condition` is `False`, the loop\
    \ stops and the program continues with the next lines of code outside the loop.\
    \ The `statements` with indentation is the section of code that runs on each iteration\
    \ while the `condition` is `True` (Figure 8.1)."
  merge: -1
  pgno: 98
- img_proc: true
  md: "![](img/e4806f3bc91279996f2dfb01e3181060_99_0.png)\n\nFigure 8.1 A flow chart\
    \ for condition-based repetition.\n\n# 8.1.2 Demonstration\n\n```\n# Initialize\
    \ a counter variable i to 0\ni = 0\n\n# Start a while loop that continues as long\
    \ as i is less than 5\nwhile i < 5:  # loop will run at most 5 times\n    # Print\
    \ the current value of i and a message\n    print(f'i is {i}, the condition {i}<5\
    \ is satisfied. Keep going!')\n\n    # Increment i by 1 at the end of each loop\
    \ iteration\n    i += 1\n\n# Print a message indicating the loop has finished\
    \ executing\nprint('The loop has terminated.')\n```\n\ni is 0, the condition 0<5\
    \ is satisfied. Keep going!\ni is 1, the condition 1<5 is satisfied. Keep going!\n\
    i is 2, the condition 2<5 is satisfied. Keep going!\ni is 3, the condition 3<5\
    \ is satisfied. Keep going!\ni is 4, the condition 4<5 is satisfied. Keep going!\n\
    The loop has terminated.\n\n```\n# Initialize a flag variable to True, which will\
    \ control the loop\nflag = True\n\n# Start a while loop that continues as long\
    \ as the flag is True\nwhile flag:\n    # Print a message indicating the current\
    \ state of the flag\n    print(f'The condition is {flag}. Keep going!')\n\n  \
    \  # Ask the user to enter a number and convert it to float\n    # Check if the\
    \ entered number is greater than 10\n    # If yes, flag becomes False, otherwise\
    \ it stays True\n    num = float(input('Enter a number larger than 10: '))\n \
    \   flag = num > 10\n```"
