  md: '# CHAPTER 1


    # Introduction to Python


    WELCOME to the world of Python! You might have heard of this magical language
    before, maybe in a school assignment, a software manual, or a code snippet your
    colleague sent you. You know it’s important for the ever-changing tech world.
    Yes, you are absolutely right! Even if you don’t need to use it every day, learning
    Python will be a unique experience and a smart investment of your time. It’ll
    teach you how computers think and work, how programs and classes are designed,
    and how sophisticated neutrons are built and connected to form the foundation
    of artificial intelligence. This chapter will answer some basic questions about
    Python, like what it is, why it’s so popular, what it looks like, where to develop
    and run it, what the Jupyter Notebook is, where to write the code, etc. Let’s
    get started!


    # 1.1 WHAT IS PYTHON?


    Python is a high-level, interpreted programming language that’s known for being
    easy to learn and use, making it a popular choice for beginners. It was created
    by Guido van Rossum, a Dutch programmer, and first released in 1991. The language
    is named after the British comedy group Monty Python’s Flying Circus, not after
    the snake, despite the reptilian logo! Guido just thought the snake design would
    make for a cool logo.


    Over the years, Python has seen many updates and improvements. Python 2.0 came
    out in 2000, introducing a garbage collector and a new memory management system.
    For a long time, Python 2.x was widely used, but it had some drawbacks, like limited
    support for Unicode. As of now, Python 2.x is no longer supported or maintained,
    so we’ll focus on Python 3.x in this book. Python 3.0, released in 2008, tackled
    the limitations of Python 2.x and added many new features.


    The latest version, Python 3.13, was released on October 7, 2024. Python 3.x is
    fully Unicode-compatible, offers better support for parallel processing, and includes
    a host of new modules and libraries for tasks like data analysis, web development,
    and more.'
  merge: -1
  pgno: 31
- img_proc: true
  md: 'It’s also the preferred version for many popular frameworks and libraries,
    including Django, Flask, NumPy, and pandas.


    # 1.2 WHY PYTHON?


    Python’s popularity comes from its ease of use, versatility, and strong community
    support.


    Python is known for being simple and easy to read. It has a small set of keywords
    and a clean structure, making it easy for beginners to learn and understand. The
    syntax is designed to be straightforward, so developers can focus on the logic
    of their code rather than getting caught up in complex syntax. Python also has
    many libraries and frameworks that simplify tasks like data analysis and web development.


    Python is a general-purpose language, meaning it can be used for a wide variety
    of tasks, including web development, data analysis, artificial intelligence (AI),
    machine learning, and automation. Its versatility makes it a popular choice for
    different types of projects, and its large developer community offers many libraries
    and frameworks to help with almost any task.


    Python has a big, active community of developers who create libraries, frameworks,
    and tools for various tasks. This strong community support provides plenty of
    resources for learning and troubleshooting, making it easy to find help. Python’s
    community-driven development also ensures that the language keeps evolving to
    meet users’ needs.


    Python works on multiple operating systems, like Windows, macOS, and Linux. It
    is also open-source, meaning it is free to use, share, and modify. This open-source
    nature has led to a large community of developers who contribute to Python’s development,
    ensuring it remains a high-quality and continually improving language.


    # 1.3 SCRIPT VERSUS INTERACTIVE PYTHON


    When working with Python, you have two main options for your environment: script
    Python and interactive Python. Script Python involves writing code in a text editor
    or integrated development environment (IDE) and running it as a script, while
    interactive Python allows you to execute code line by line and see the results
    immediately.


    Script Python is ideal for tasks that require automation, such as data processing,
    web scraping, or system administration. You write a script, save it, and run it
    as needed. Script Python is great for tasks that require repetition or need to
    be run in the background (Figure 1.1).


    ```

    print(''Hello, world!'') # Display a message

    ```


    Figure 1.1 A script Python example.'
