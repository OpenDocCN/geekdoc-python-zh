    \ and allow for multiple students to be processed in a loop.\n\n```python\n# Define\
    \ a function to calculate the average of three grades\ndef calculate_average(grade1,\
    \ grade2, grade3):\n    total = grade1 + grade2 + grade3\n    return total / 3\n\
    \n# Define a function to assign a letter grade based on the average\ndef assign_letter_grade(average):\n\
    \    if average >= 90:\n        return 'A'\n    elif average >= 80:\n        return\
    \ 'B'\n    elif average >= 70:\n        return 'C'\n    elif average >= 60:\n\
    \        return 'D'\n    else:\n        return 'F'\n\n# Define a function to print\
