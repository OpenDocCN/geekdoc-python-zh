    \n### 9.11.2 Practice\n\nTask: Define a function `even(n)` that returns the Boolean\
    \ value for given `n` is even or not.\n\n```python\ndef even(n):\n    if n % 2\
    \ == 0:\n        return True\n    else:\n        return False\n\nprint(even(1))\n\
    print(even(2))\n```\n\nFalse\nTrue\n\nTask: Define a function `prime(n)` that\
    \ returns the Boolean value for given `n` is prime number or not.\n\n```python\n\
    def prime(n):\n    for i in range(2, n):\n        if n % i == 0:\n           \
    \ return False\n    return True\n\nprint(prime(3))\nprint(prime(4))\n```\n\nTrue\n\
    False\n\nTask: Define a function `positive(n)` that returns the Boolean value\
    \ for given `n` is positive (>0) or not.\n\n```python\ndef positive(n):\n    return\
    \ n > 0\n\nprint(positive(1))\nprint(positive(-1))\n```\n\nTrue\nFalse\n\nTask:\
    \ Define a function `divisible_6(n)` that returns the Boolean value for whether\
    \ or not given `n` is divisible by 6.\n\n```python\ndef divisible_6(n):\n    if\
    \ n % 6 == 0:\n        return True\n    return False\n```\n\n## 9.12 RETURN MULTIPLE\
    \ VALUES\n\nReturn values can be multiple ones with various data types.\n\n###\
    \ 9.12.1 Demonstration\n\n```python\ndef get_profile():\n    first = input('Enter\
    \ your first name: ')\n    last = input('Enter your last name: ')\n    age = int(input('Enter\
    \ your age: '))\n    zip = input('Enter your zip code: ')\n    return first, last,\
    \ age, zip\n\nprint(get_profile())\n```\n\nEnter your first name: Thomas\nEnter\
    \ your last name: Anderson\nEnter your age: 18\nEnter your zip code: 09090\n('Thomas',\
    \ 'Anderson', 18, '09090')\n\n### 9.12.2 Practice\n\nTask: Define a function stats(x,\
    \ y, z) that returns the min, max, avg, and total of given three numbers x, y,\
    \ and z.\n\n```python\ndef stats(x, y, z):\n    min = x\n    max = x\n    total\
    \ = 0\n    if y < min:\n        min = y\n    if y > max:\n        max = y\n  \
    \  if z < min:\n        min = z\n    if z > max:\n        max = z\n    total =\
    \ x + y + z\n    return min, max, total/3, total\n\nprint(stats(1, 2, 3))\n```\n\
    \n(1, 3, 2.0, 6)\n\nChallenge: Define a function stats() that:\n\n1. Ask the user\
    \ how many numbers to be entered.\n2. Let the user enter the numbers."
  mdcn: "## 9.8 返回值\n\n带有返回值的函数是编程的重要组成部分，理解其工作原理对于编写高效代码至关重要。\n\n### 9.8.1 解释\n\n\
    什么是返回值？在 Python 中，当一个函数完成执行后，它可以将一个值返回给调用程序。这个返回的值被称为函数的返回值，简称返回。可以将返回值想象成你的函数在处理一些输入后给出的答案。调用者（调用函数的代码）接收这个值，并可以根据需要使用它。\n\
    \n带有返回值的函数是可重用的，因为它们封装了逻辑，使其易于集成到程序的其他部分。返回值通过允许函数执行特定任务，然后与程序的其他部分共享结果，帮助你更有效地组织代码。使用返回值可以让你编写更简洁的代码，因为函数调用的结果可以存储在变量中，从而减少重复。\n\
    \n在执行复杂计算时，返回值使你能够存储结果并在程序中进一步使用。返回值可用于操作数据结构，例如列表或字典。带有返回值的函数在处理条件语句（if-else\
    \ 语句）时特别有用。\n\n### 9.8.2 演示\n\n要定义一个返回值的函数，你只需在函数中包含 `return` 语句并指定期望的输出。以下是一个示例：\n\
    \n```python\ndef greet(name):\n    return f'Hello, {name}!'\n```\n\n在这个例子中，`greet()`\
    \ 函数接受一个参数（`name`）并返回一条问候消息。\n\n```python\ngreet('Neo')\n```\n\n```python\nprint(greet('Neo'))\n\
