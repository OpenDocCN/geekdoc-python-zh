- md: '## 1.2 WHY PYTHON?


    Python’s popularity comes from its ease of use, versatility, and strong community
    support.


    Python is known for being simple and easy to read. It has a small set of keywords
    and a clean structure, making it easy for beginners to learn and understand. The
    syntax is designed to be straightforward, so developers can focus on the logic
    of their code rather than getting caught up in complex syntax. Python also has
    many libraries and frameworks that simplify tasks like data analysis and web development.


    Python is a general-purpose language, meaning it can be used for a wide variety
    of tasks, including web development, data analysis, artificial intelligence (AI),
    machine learning, and automation. Its versatility makes it a popular choice for
    different types of projects, and its large developer community offers many libraries
    and frameworks to help with almost any task.


    Python has a big, active community of developers who create libraries, frameworks,
    and tools for various tasks. This strong community support provides plenty of
    resources for learning and troubleshooting, making it easy to find help. Python’s
    community-driven development also ensures that the language keeps evolving to
    meet users’ needs.


    Python works on multiple operating systems, like Windows, macOS, and Linux. It
    is also open-source, meaning it is free to use, share, and modify. This open-source
    nature has led to a large community of developers who contribute to Python’s development,
    ensuring it remains a high-quality and continually improving language.


    ## 1.3 SCRIPT VERSUS INTERACTIVE PYTHON


    When working with Python, you have two main options for your environment: script
    Python and interactive Python. Script Python involves writing code in a text editor
    or integrated development environment (IDE) and running it as a script, while
    interactive Python allows you to execute code line by line and see the results
    immediately.


    Script Python is ideal for tasks that require automation, such as data processing,
    web scraping, or system administration. You write a script, save it, and run it
    as needed. Script Python is great for tasks that require repetition or need to
    be run in the background (Figure 1.1).


    ```

    print(''Hello, world!'') # Display a message

    ```


    Figure 1.1 A script Python example.


    Interactive Python, on the other hand, is perfect for data science, scientific
    computing, and exploratory data analysis. With interactive Python, you can execute
    code line by line, see the results, and adjust your code accordingly. This iterative
    process allows you to explore data, test hypotheses, and visualize results in
    real time ([Figure 1.2](https://example.com)).


    ```

    Demonstration


    [ ] print(''Hello, world!'') # display a message


    Hello, world!

    ```


    Figure 1.2 An interactive Python example.


    ## 1.4 WHY INTERACTIVE PYTHON?


    Interactive Python is particularly well-suited for data science for the following
    reasons:


    - It enables you to load data, manipulate it, and visualize it in real time. This
    allows you to quickly understand the structure and patterns in your data, identify
    missing or incorrect values, and perform exploratory data analysis.

    - It allows you to write and test machine learning models iteratively. You can
    try out different algorithms, fine-tune hyperparameters, and evaluate model performance
    in real time, enabling you to quickly refine your models and achieve better results.

    - It provides access to a wide range of statistical libraries and tools, such
    as Pandas, NumPy, and Scikit-learn. You can perform statistical analysis, data
    transformation, and feature engineering in an interactive environment, making
    it easier to understand and prepare your data for modeling.

    - It enables you to create interactive visualizations and dashboards using libraries
    like Matplotlib, Seaborn, and Plotly. This allows you to present your findings
    in a clear and compelling way, enabling stakeholders to explore and understand
    the insights you''ve uncovered.

    - Its interactive nature allows you to write and test code quickly, enabling you
    to debug your code in a fast and iterative manner. This reduces the time and effort
    required to develop and refine your data science projects.

    - Its environments like Jupyter Notebook enable collaboration and sharing of code,
    data, and results. This facilitates teamwork and knowledge sharing among data
    scientists, engineers, and other stakeholders.


    ## 1.5 JUPYTER


    For our book, we''ll be using JupyterLab and Jupyter Notebooks as our interactive
    Python environment. Jupyter Notebooks blend explanations, images and rich media,
    codes, and outputs in one document. It''s an ideal platform for data science,
    scientific computing, and education and is widely used in industry, academia,
    and research. JupyterLab is a web-based user interface to create and play with
    Jupyter Notebooks.


    Jupyter Notebook''s interactive cells allow you to execute code line by line,
    seeing the results of each cell in real time. This enables you to explore data,
    test hypotheses, and visualize results in an iterative and dynamic manner. You
    can write code in Python, R, Julia, or other languages and execute it in the browser
    or on a remote server.


    Jupyter Notebooks support a wide range of media, including images, videos, interactive
    visualizations, and equations. You can embed these media elements directly into
    your notebooks, making it easy to create engaging and interactive documents. This
    is particularly useful for data visualization, where you can create interactive
    plots and charts that allow users to explore data in real time.


    Jupyter Notebooks enable real-time collaboration and sharing of documents. You
    can share notebooks with others and work together on a single document in real
    time. This facilitates teamwork and knowledge sharing among data scientists, engineers,
    and other stakeholders. You can also use Jupyter Notebook''s built-in commenting
    and discussion features to communicate with collaborators and stakeholders.


    Jupyter Notebooks have access to a wide range of libraries and tools, including
    popular data science libraries like Pandas, NumPy, and Scikit-learn. You can also
    install additional libraries and tools, such as Matplotlib, Seaborn, and Plotly,
    to extend the functionality of your notebooks. This enables you to perform a wide
    range of data science tasks, from data cleaning and visualization to machine learning
    and deep learning.


    Jupyter Notebooks provide robust security and scalability features, making them
    suitable for use in production environments. You can secure your notebooks with
    passwords, tokens, or other authentication methods and scale your notebooks to
    handle large datasets and high traffic. This enables you to deploy your notebooks
    in a variety of environments, from local machines to cloud-based servers.


    Jupyter Notebook files have a `.ipynb` extension and contain a JavaScript Object
    Notation structure that represents the notebook''s contents. These files can be
    opened and edited in Jupyter Notebook and can also be shared and collaborated
    on with others. The `.ipynb` file format allows for a flexible and dynamic document
    that can contain a mix of text, code, equations, images, and interactive visualizations.


    One of the key features of Jupyter Notebooks is the ability to combine markdown
    text, code cells, and output cells in a single document. This allows you to create
    a narrative document that explains your code, shows the output of your code, and
    provides a clear and concise explanation of your results.


    1. Markdown cells allow you to write text in a simple and readable format, using
    markdown syntax to format headings, bold text, italics, and links. You can use
    markdown cells to provide explanations, introductions, and summaries, as well
    as to add context to your code and output.

    2. Code cells allow you to write and execute code in a variety of programming
    languages, including Python, R, Julia, and MATLAB. You can use code cells to perform
    data analysis, machine learning, and visualization, as well as to create interactive
    plots and charts.

    3. Output cells display the results of your code, including text, images, and
    interactive visualizations. You can use output cells to show the output of your
    code and to create reports and dashboards that summarize your findings.


    By combining markdown, code, and output cells, you can create a clear and concise
    narrative document that explains your code, shows the output of your code, and
    provides a summary of your results. This is particularly useful for data science
    and scientific computing, where you need to document your methods, results, and
    conclusions in a clear and transparent way (Figure 1.3).


    ![](img/e4806f3bc91279996f2dfb01e3181060_35_0.png)


    Figure 1.3 Jupyter notebook example.


    ## 1.6 LOCAL OR CLOUD


    When it comes to using Jupyter Notebooks for Python development, you have two
    main options: local installation or cloud services. Local installation involves
    downloading and installing Jupyter Notebooks on your own computer, giving you
    full control'
