    # Set


    Now we have learned list and tuple in Python. Both of them are array-like data
    structures. In this chapter, we are going to learn a mapping-based data structure,
    set. Sets are unordered and only hold distinct elements, automatically eliminating
    duplicates. Unlike lists and tuples, sets don''t support indexing or slicing but
    do well in operations like union, intersection, and difference. This makes sets
    an ideal choice when managing collections where uniqueness and membership tests
    are priorities, such as removing duplicates or checking for common elements. Are
    you excited? Let''s get started!


    ## 13.1 WHAT IS A SET


    ### 13.1.1 Explanation


    A set in Python is an unordered collection of unique elements. It is defined by
    enclosing its elements within curly braces {} (which is the same as the dictionary
    we are going to learn later). Sets are mutable, meaning you can add or remove
    elements from them, but they do not support indexing or slicing like lists or
    tuples.


    Sets offer several advantages and use cases in Python programming. Sets ensure
    that each element appears only once, making them ideal for removing duplicates
    from a collection. Sets provide an efficient way to check for membership, that
    is, whether an element exists in the set or not. Sets support mathematical set
    operations such as union, intersection, difference, and symmetric difference,
    making them useful for tasks involving comparisons between collections.


    ### 13.1.2 Practice


    *Task:* Can you list 3 applications in your real-life that utilize the concept
    of sets?


    ## 13.2 CREATE A SET


    ### 13.2.1 Demonstration


    You can create a set using various ways like we did for list and tuple. The first
    approach is using the `set()` constructor and passing an iterable containing the
    elements of the set. Note that if there are duplicate values in the iterable,
    duplicates will be removed.


    ```python

    # Creating an empty set using the set() constructor

    my_set = set()

    print(''Set created using set() constructor'', my_set)

    ```


    Set created using set() constructor set()


    ```python

    # Creating a set using the set() constructor and a list

    my_list = [1, 2, 2, 3, 3]

    my_set = set(my_list)

    print(''Set created using set() constructor and a list:'', my_set)

    ```


    Set created using set() constructor and a list: {1, 2, 3}


    ```python

    # Creating a set using the set() constructor and a tuple

    my_tuple = (1, 2, 2, 3, 3)

    my_set = set(my_tuple)

    print(''Set created using set() constructor and a tuple:'', my_set)

    ```


    Set created using set() constructor and a tuple: {1, 2, 3}


    Another approach to creating sets in Python is by direct assignment, using curly
    braces {} and elements. Note that since set and dictionary both use {}, if you
    are going to create an empty set, you must use `set()`. Using {} without elements
    will create a dictionary not a set.


    ```python

    # {} with no elements is a dictionary

    example = {}

    type(example)

    ```


    dict


    ```python

    # Creating a set using curly braces and unique elements

    my_set = {1, 2, 3}

    print(''Set created using curly braces:'', my_set)

    ```


    Set created using curly braces: {1, 2, 3}


    ```python

    # Creating a set using curly braces and duplicate elements

    my_set = {1, 2, 2, 3, 3}

    print(''Set created using curly braces:'', my_set)

    ```


    Set created using curly braces: {1, 2, 3}


    In Python, the `len()` function is used to determine the number of elements in
    a collection (such as list, tuple, etc.). When applied to a set, it returns the
    count of unique elements present in the set. The len() function provides a convenient
    way to obtain the size of a set, allowing you to perform various operations and
    checks based on the number of elements present in the set.


    ```python

    # Creating a set

    my_set = {1, 2, 3, 4, 5}


    # Using the len() function to get the number of elements in the set

    set_length = len(my_set)


    print(''Number of elements in the set:'', set_length)

    ```


    Number of elements in the set: 5


