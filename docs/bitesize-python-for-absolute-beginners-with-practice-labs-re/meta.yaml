  md: '# CHAPTER 10


    # Advanced Functions


    WE have learned the fundamental knowledge of functions in Python. However, a single
    function, as a tiny piece of puzzle, cannot make a comprehensive masterpiece.
    We need many functions, organized in a professional manner, to perform sophisticated
    tasks. In this chapter, we are going to learn how to organize functions in various
    ways, including nested, hierarchical, and recursive structures, to fully explore
    the creative potential functions hold.


    Are you ready? Let’s get started!


    # 10.1 NESTED FUNCTIONS


    # 10.1.1 Explanation


    Nested function calls occur when the output of one function is immediately used
    as the input to another function. This allows for streamlined and compact code,
    especially when performing a sequence of operations. Nested function calls reduce
    the need for intermediate variables by directly passing outputs to other functions.
    It also helps in writing more concise and readable code, especially for operations
    that are logically sequential. At last, it simplifies operations by chaining them
    together in a single line, making the code easier to follow.


    # 10.1.2 Demonstration


    ```

    print(input(''Enter your name: ''))

    ```


    Enter your name: Neo

    Neo


    Here, the `input` function prompts the user for their name and returns it. The
    returned name is immediately passed to the `print` function, which displays it
    on the screen. This is a simple example of how nested function calls can reduce
    the need for extra variables.'
