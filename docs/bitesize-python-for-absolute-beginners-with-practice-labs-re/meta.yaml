- md: "## 9.8 RETURN VALUES\n\nFunctions with return values are an essential part\
    \ of coding and understanding how they work is crucial for writing effective code.\n\
    \n### 9.8.1 Explanation\n\nWhat are return values? In Python, when a function\
    \ completes its execution, it can return a value back to the calling program.\
    \ This returned value is called the function's return value or simply the return.\
    \ Think of a return value as the answer your function gives you after processing\
    \ some input. The caller (the code that calls the function) receives this value\
    \ and can use it as needed.\n\nFunctions with return values are reusable because\
    \ they encapsulate logic, making it easy to integrate them into other parts of\
    \ your program. Return values help you structure your code more effectively by\
    \ allowing functions to perform a specific task and then share the results with\
    \ other parts of your program. Using return values enables you to write more concise\
    \ code because the result of a function call can be stored in a variable, reducing\
    \ repetition.\n\nWhen performing complex calculations, return values enable you\
    \ to store the result and use it further in your program. Return values can be\
    \ used to manipulate data structures, such as lists or dictionaries. Functions\
    \ with return values are particularly useful when working with conditionals (if-else\
    \ statements).\n\n### 9.8.2 Demonstration\n\nTo define a function that returns\
    \ a value, you simply include the return statement with the desired output. Here's\
    \ an example:\n\n```python\ndef greet(name):\n    return f'Hello, {name}!'\n```\n\
    \nIn this case, the greet() function takes a single argument (name) and returns\
    \ a greeting message.\n\n```python\ngreet('Neo')\n```\n\n```python\nprint(greet('Neo'))\n\
    ```\n\nHello, Neo!\n\n## 9.9 RETURN NUMERIC VALUES\n\nReturn values can be `int`\
    \ and `float`.\n\n### 9.9.1 Demonstration\n\n```python\nint(5.5)\n```\n\n5\n\n\
    ```python\nfloat(5)\n```\n\n5.0\n\n```python\ndef give_me_5():\n    return 5\n\
    \ngive_me_5()\n```\n\n5\n\n```python\ndef give_me_float():\n    return 5.0\n\n\
    give_me_float()\n```\n\n5.0\n\n### 9.9.2 Practice\n\nTask: Define a function `abs(n)`\
    \ that returns the absolute value of `n`.\n\n```python\ndef abs(n):\n    if n\
    \ < 0:\n        n = -n\n    return n\n\nprint(abs(-1))\nprint(abs(1))\n```\n\n\
    1\n1\n\nTask: Define a function `product(n, m)` that returns the product value\
    \ of `n` and `m`.\n\n```python\ndef product(n, m):\n    return n * m\n\nprint(product(2,\
    \ 5))\nprint(product(3, 2))\n```\n\n10\n6\n\nTask: Define a function `power(n,\
    \ m)` that returns the result of raising `n` to the power of `m`.\n\n```python\n\
    def power(n, m):\n    return n ** m\n\nprint(power(2, 3))\nprint(power(3, 2))\n\
    ```\n\n8\n9\n\nTask: Define a function `average(x, y, z)` that returns the average\
    \ of three numbers, `x`, `y`, and `z`.\n\n```python\ndef average(x, y, z):\n \
    \   return (x + y + z) / 3\n\nprint(average(1, 2, 3))\nprint(average(6, 5, 4))\n\
    ```\n\n2.0\n5.0\n\nTask: Define a function `min(x, y, z)` that returns the minimal\
    \ of three numbers `x`, `y`, and `z`.\n\n```python\ndef min(x, y, z):\n    min\
    \ = x\n    if y < min:\n        min = y\n    if z < min:\n        min = z\n  \
    \  return min\n\nprint(min(1, 2, 3))\nprint(min(6, 5, 4))\n```\n\n1\n4\n\nTask:\
    \ Define a function `sum_n(n)` that returns the sum of integers 1 to `n` (hint:\
    \ you can use a for loop).\n\n```python\ndef sum_n(n):\n    sum = 0\n    for i\
    \ in range(1, n+1):\n        sum += i\n    return sum\n\nprint(sum_n(10))\nprint(sum_n(100))\n\
    ```\n\n55\n5050\n\n## 9.10 RETURN STR VALUES\n\nReturn values can be `str`.\n\n\
    ### 9.10.1 Demonstration\n\n```python\nstr(5)\n```\n\n```python\ndef give_me_FIVE():\n\
    \    return 'FIVE'\n\ngive_me_FIVE()\n```\n\n### 9.10.2 Practice\n\nTask: Define\
    \ a function `welcome(name)` that returns `'Welcome, {name}!'`.\n\n```python\n\
    def welcome(name):\n    return f'Welcome, {name}!'\n\nprint(welcome('Neo'))\n\
    print(welcome('Alice'))\n```\n\nWelcome, Neo!\nWelcome, Alice!\n\nTask: Define\
    \ a function `concatenate(msg1, msg2)` that concatenates `msg1` and `msg2` together\
    \ and returns it.\n\n```python\ndef concatenate(msg1, msg2):\n    return msg1\
    \ + msg2\n\nprint(concatenate('hello, ', 'world!'))\n```\n\nhello, world!\n\n\
    ## 9.11 RETURN BOOLEAN VALUES\n\nReturn values can be `bool`.\n\n### 9.11.1 Demonstration\n\
