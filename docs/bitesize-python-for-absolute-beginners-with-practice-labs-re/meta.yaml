  md: 'Here are the basic arithmetic operations supported by Python:


    +   - Addition: a + b, adds two numbers a and b together.

    - Subtraction: a - b, subtracts the number b from another number a.

    - Multiplication: a * b, multiplies two numbers a and b together.

    - Division: a / b, divides the number a by another number b and returns a float
