    \ time):\n    print(distance / time)\n\nprint(average_speed(10, 3))\n```\n\n##\
    \ 9.6 如何传递参数\n\n在 Python 中，当定义一个具有多个参数的函数时，有两种传递这些参数的方式：按位置传递和按关键字传递。让我们探讨一下每种方法的优缺点。\n\
    \n### 9.6.1 演示\n\n```python\ndef greet(name, age):\n    print(f'Hello, {name}!\
    \ You are {age} years old.')\n\ngreet('Neo', 18)  # Output: Hello, Neo! You are\
    \ 18 years old.\n```\n\nHello, Neo! You are 18 years old.\n\n```python\ngreet(18,\
    \ 'Neo') # It will print a meaningless message.\n```\n\nHello, 18! You are Neo\
    \ years old.\n\n在上述示例中，我们按位置传递了参数，因此 'Neo' 被赋值给 name，18 被赋值给 age。这种方式易于使用。你不需要记住参数名称，只需按正确的顺序提供值即可。但是，如果你不小心交换了参数的位置，就会导致错误的行为。如果参数很多，这种方式可能会变得混乱，尤其是在调用函数时。那么，让我们尝试按关键字传递。\n\
    \n```python\ngreet(age=18, name='Neo')  # Output: Hello, Neo! You are 18 years\
    \ old\n```\n\nHello, Neo! You are 18 years old.\n\n```python\ngreet(name='Neo',\
    \ age=18)  # Output: Hello, Neo! You are 18 years old\n```\n\nHello, Neo! You\
    \ are 18 years old.\n\n在上述两个示例中，我们按关键字传递了参数，因此 'Neo' 被明确地赋值给 `name`，18 被明确地赋值给\
    \ `age`。这样就不会再有混淆了。关键字参数通过清晰地指明正在设置哪个参数，使代码更具可读性。你可以按任何顺序传递关键字参数，因为它们是明确命名的。但是，在传递值时，你需要使用参数的确切名称。这种方式需要更多的精力来理解代码，尤其是对于具有许多参数的复杂函数。\n\
    \n总之，如果你处理的是少量且众所周知的函数参数，并且不介意使用基于位置的参数，那么就使用位置参数。对于更大或更复杂的函数签名，其中包含多个可选参数，则使用关键字参数。这种方法有助于减少错误并提高可读性。当我们使用\
    \ Python 进行数据科学时，这是更常见的情况。\n\n### 9.6.2 练习\n\n任务：调用你在之前的练习中定义的函数，通过关键字传递参数，并体验其中的差异。\n\
    \n## 9.7 默认值\n\n在 Python 中，你可以在定义函数参数时为其分配一个默认值。这使得在调用函数时更加灵活和方便。\n\n### 9.7.1\
    \ 演示\n\n```python\ndef greet(name, msg='Hi'):\n    print(f'{msg}, {name}!')\n\n\
    greet('Neo')  # Output: Hi, Neo!\n```\n\nHi, Neo!\n\n在 `greet()` 函数定义中，我们为 `msg`\
    \ 参数提供了默认值 'Hi'。这意味着，如果我们在调用函数时没有为 `msg` 传递任何值，它将采用默认值。请注意，具有默认值的参数必须放在没有默认值的参数之后；在这个例子中，`msg`\
    \ 必须放在 `name` 之后，因为 `name` 没有默认值。\n\n通过为某些参数分配默认值，你使它们成为可选的，这对于具有大量参数的函数尤其有用。在调用函数时，如果默认值适用，你可以跳过为可选参数传递值。使用默认值可以阐明这些参数的预期用途或使用方式。但是，重要的是要确保你没有通过创建多个可能的输入场景来产生重叠的功能。此外，请确保很好地记录可选参数的目的和预期行为，以便其他人（或你自己）理解它们在不同上下文中的作用。\n\
    \n```python\ngreet('Neo', 'Hello')  # Hello, Neo!\n```\n\nHello, Neo!\n\n```python\n\
    def print_numbers(end, start=0, step=1):\n    while start < end:\n        print(start)\n\
    \        start += step\n```\n\n```python\nprint_numbers(5)\n```\n\n0\n1\n2\n3\n\
    4\n\n```python\nprint_numbers(start = 2, end = 5)\n```\n\n2\n3\n4\n\n```python\n\
    print_numbers(start = 2, end = 5, step = 2)\n```\n\n2\n4\n\n现在我们可以更好地理解 `print()`\
    \ 和 `range()` 了，因为它们定义了默认参数，在需要时提供了可选的自定义功能。\n\n### 9.7.2 练习\n\n任务：定义一个名为 `sum_of_squares`\
    \ 的函数，该函数接受两个数字 a 和 b 作为输入，并打印它们的平方和。如果未提供任一参数的值，则 a 应默认为 1，b 应默认为 2。\n\n```python\n\
    # Define a function to calculate the sum of squares of two numbers\ndef sum_of_squares(a=1,\
    \ b=2):\n    # Print the sum of squares of a and b\n    print(a ** 2 + b ** 2)\n\
    \n# Call the function with default arguments (a=1, b=2)\nsum_of_squares()    \
    \        # output: 5\n```"
