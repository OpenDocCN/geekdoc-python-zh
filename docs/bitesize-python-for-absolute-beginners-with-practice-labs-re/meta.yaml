  md: '# # Set


    Now we have learned list and tuple in Python. Both of them are array-like data
    structures. In this chapter, we are going to learn a mapping-based data structure,
    set. sets are unordered and only hold distinct elements, automatically eliminating
    duplicates. Unlike lists and tuples, sets don''t support indexing or slicing but
    do well in operations like union, intersection, and difference. This makes sets
    an ideal choice when managing collections where uniqueness and membership tests
    are priorities, such as removing duplicates or checking for common elements. Are
    you excited? Let''s get started!


    # ## 13.1 WHAT IS A SET


    # ### 13.1.1 Explanation


    A set in Python is an unordered collection of unique elements. It is defined by
    enclosing its elements within curly braces {} (which is the same as the dictionary
    we are going to learn later). Sets are mutable, meaning you can add or remove
    elements from them, but they do not support indexing or slicing like lists or
    tuples.


    Sets offer several advantages and use cases in Python programming. Sets ensure
    that each element appears only once, making them ideal for removing duplicates
    from a collection. Sets provide an efficient way to check for membership, that
    is, whether an element exists in the set or not. Sets support mathematical set
    operations such as union, intersection, difference, and symmetric difference,
    making them useful for tasks involving comparisons between collections.


    # ### 13.1.2 Practice


    *Task:* Can you list 3 applications in your real-life that utilize the concept
    of sets?'
