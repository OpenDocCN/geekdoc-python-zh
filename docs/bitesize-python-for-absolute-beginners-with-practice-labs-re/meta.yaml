    使用花括号创建的集合: {1, 2, 3}


    在Python中，`len()` 函数用于确定集合（如列表、元组等）中的元素数量。当应用于集合时，它返回集合中存在的唯一元素的数量。len() 函数提供了一种获取集合大小的便捷方式，允许你根据集合中存在的元素数量执行各种操作和检查。


