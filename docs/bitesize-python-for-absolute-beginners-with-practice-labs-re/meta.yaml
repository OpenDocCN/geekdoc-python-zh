    \n```python\n# Creating a dictionary\nmy_dict = {'name': 'John', 'age': 30, 'city':\
    \ 'New York'}\n\n# Add a new pair 'ID': '0001'\nmy_dict['ID'] = '0001'\n\nmy_dict\n\
    ```\n\n{'name': 'John', 'age': 30, 'city': 'New York', 'ID': '0001'}\n\nBe careful\
    \ if there is an existing key in the dictionary. Doing a `dict[key] = value` assignment\
    \ will use the new value to replace the old value associated with the key.\n\n\
    ```python\nmy_dict['name'] = 'Neo'\n\nmy_dict\n```\n\n{'name': 'Neo', 'age': 30,\
    \ 'city': 'New York', 'ID': '0001'}\n\nWe can also use `update()` to add key-value\
    \ pairs from another dictionary or iterable to the current dictionary.\n\n```python\n\
    # Creating another dictionary\nanother_dict = {'email':'John@example.com', 'major':\
    \ 'English'}\n\nmy_dict.update(another_dict)\n\nmy_dict\n```\n\n{'name': 'Neo',\n\
    \ 'age': 30,\n 'city': 'New York',\n 'ID': '0001',\n 'email': 'John@example.com',\n\
    \ 'major': 'English'}\n\n```python\n# Creating a list of tuples\nanother_collection\
