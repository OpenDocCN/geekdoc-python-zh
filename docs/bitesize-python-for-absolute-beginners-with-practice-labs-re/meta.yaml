- md: "## 8.3.2 Practice\n\nTask: Check each integer in range(1, 20), if the number\
    \ is divisible by 5, skip the iteration and turn to next one; otherwise, print\
    \ it out.\n\n```python\nfor i in range(1, 20):\n    if i % 5 == 0:\n        continue\n\
    \    print(i)\n```\n\n1\n2\n3\n4\n6\n7\n8\n9\n11\n12\n13\n14\n16\n17\n18\n19\n\
    \nTask: Check each integer in range(1, 20), if the number is divisible by 5, stop\
    \ the iteration immediately; otherwise, print it out.\n\n```python\nfor i in range(1,\
    \ 20):\n    if i % 5 == 0:\n        break\n    print(i)\n```\n\n1\n2\n3\n\n##\
    \ 8.4 CASE STUDIES OF REPETITION\n\nThese case studies are designed to test your\
    \ understanding of flow control: repetition. We are going to create some simple\
    \ programs using these tools. Are you ready? Let’s get started!\n\nYou will find\
    \ some real-life tasks in the sections below. You should use `input()` to get\
    \ the user to enter the information and use `print()` to print the information\
    \ on the screen. At this moment, we can assume users will follow instructions\
    \ carefully – they will enter the valid inputs as required.\n\n### 8.4.1 Prime\
    \ numbers\n\n1. Ask the user to enter an integer.\n2. Find and print all prime\
    \ numbers up to the integer.\n\n```python\n# Ask the user to enter an integer\n\
    n = int(input('Enter an integer: '))\n\n# Start a loop that iterates from 2 to\
    \ n (inclusive)\nfor i in range(2, n+1):\n    # Assume i is prime\n    prime =\
    \ True\n\n    # Check if i has any divisors other than 1 and itself\n    for j\
    \ in range(2, i):\n        # If the i is divisible by any other number, it's not\
    \ prime\n        if i % j == 0:\n            prime = False\n            # Break\
    \ out of the inner loop since i is not prime\n            break\n\n    # If the\
    \ current number is prime, print it\n    if prime:\n        print(i)\n```\n\n\
    Enter an integer: 20\n2\n3\n5\n7\n11\n13\n17\n19\n\n### 8.4.2 A simple grade book\n\
    \n1. Ask the user to enter the number of students in a class.\n2. Ask the user\
    \ to enter the grade (on a 0–100 scale) of each student.\n3. Calculate and print\
    \ the average, min, and max grades of the class.\n\n```python\n# Ask the user\
    \ to enter the number of students\nn = int(input('Enter the number of students:\
    \ '))\n\n# Initialize variables\ntotal = 0  # Initialize total as 0\nmin = 100\
    \  # Initialize min with a high value\nmax = 0  # Initialize max with a low value\n\
    \n# Start a loop to iterate over each student\nfor i in range(n):\n    # Ask the\
    \ user to enter the grade of the current student\n    grade = int(input('Enter\
    \ the grade of the student: '))\n\n    # Add the current grade to the total\n\
    \    total += grade\n\n    # Update the minimum grade if the current grade is\
    \ lower\n    if grade < min:\n        min = grade\n\n    # Update the maximum\
    \ grade if the current grade is higher\n    if grade > max:\n        max = grade\n\
    \n# Calculate the average grade and print the results\nprint(f'Average: {total/n:.2f}.\
    \ Min: {min}. Max: {max}')\n```\n\nEnter the number of students: 3\nEnter the\
    \ grade of the student: 100\nEnter the grade of the student: 99\nEnter the grade\
    \ of the student: 90\nAverage: 96.33. Min: 90. Max: 100\n\n### 8.4.3 Fahrenheit\
    \ to Celsius converter\n\n1. Ask the user to enter the number in Fahrenheit (enter\
    \ stop to quit the program)\n2. Calculate the Celsius based on the formula c =\
    \ (f - 32) * 5 / 9\n3. Print the Celsius\n\n```python\n# Ask the user to enter\
    \ a temperature in Fahrenheit or quit\nf = input('Enter the Fahrenheit (enter\
    \ \"stop\" to quit): ')\n\n# Start a loop that continues until the user types\
    \ \"stop\"\nwhile f != 'stop':\n    # Convert the user's input to a floating-point\
    \ number\n    f = float(f)\n\n    # Convert the Fahrenheit temperature to Celsius\n\
    \    c = (f - 32) * 5 / 9\n\n    # Print the result, rounding to the nearest whole\
    \ number\n    print(f'Celsius is {c:.0f}')\n\n    # Ask the user to enter another\
    \ temperature or quit\n    f = input('Enter the Fahrenheit (enter \"stop\" to\
    \ quit): ')\n```\n\nEnter the Fahrenheit (enter \"stop\" to quit): 32\nCelsius\
    \ is 0\nEnter the Fahrenheit (enter \"stop\" to quit): 98\nCelsius is 37\nEnter\
    \ the Fahrenheit (enter \"stop\" to quit): 24\nCelsius is -4\nEnter the Fahrenheit\
    \ (enter \"stop\" to quit): stop\n\n### 8.4.4 How many E and e are in a sentence?\n\
    \n1. Ask the user to enter a sentence\n2. Count the number of 'E' and the number\
    \ of 'e' in the sentence\n3. Print the result\n\n```python\n# Ask the user to\
    \ enter a sentence\nsentence = input('Enter a sentence: ')\n\n# Initialize counters\
    \ for lowercase 'e' and uppercase 'E'\nnumber_e = 0\nnumber_E = 0\n\n# Iterate\
    \ over each character in the sentence\nfor c in sentence:\n    # If the character\
    \ is lowercase 'e', increment the counter\n    if c == 'e':\n        number_e\
    \ += 1\n    # If the character is uppercase 'E', increment the counter\n    elif\
    \ c == 'E':\n        number_E += 1\n\n# Print the total counts of 'e' and 'E'\n\
    print(f'Number of e: {number_e}. Number of E: {number_E}.')\n```\n\nEnter a sentence:\
    \ Example Sentence with EeeeEEEEE\nNumber of e: 7. Number of E: 7.\n\n## 8.5 INTERACT\
    \ WITH GENAI\n\nHere are some questions and prompts you can interact with generative\
    \ AI tools, including ChatGPT.\n\n- How does a **for** loop work? What types of\
    \ sequences can it iterate over?\n- What is the purpose of the **break** statement\
    \ in loops? Provide an example.\n- Describe the use of the **continue** statement\
    \ in loops.\n- What are infinite loops, and how can you prevent them when using\
    \ **while** loops?\n- Can a **for** loop iterate over a string? If so, what will\
    \ it do?\n- How does the loop counter in a **for** loop behave when the **range()**\
    \ is used?\n- How do you implement a nested loop to process multi-dimensional\
    \ data (e.g., a list of lists)?\n- What should you do if a loop is running indefinitely\
    \ and you need to debug it?\n- Why might the `break` statement not exit a loop\
    \ as expected? How can you resolve this?\n- What are common causes of skipping\
    \ iterations unintentionally in loops? How can you fix them?\n- How do you avoid\
    \ nested loops becoming too complex or slow in execution?\n\n# CHAPTER 9\n\n##\
    \ Functions\n\nLET us learn something even more powerful than branching and repetition.\
    \ Imagine you want to jump to a different place, do something, then return to\
    \ the place you started? It feels like traversing multiple universes, as depicted\
    \ in the movie *Everything Everywhere All at Once!* You can do it, with functions!\
    \ In this chapter, we are going to learn how to call functions and then how to\
    \ define various functions, from the basic to complex ones. You’ll unlock more\
    \ power of Python.\n\nAre you ready? Let’s get started!\n\n## 9.1 WHAT ARE FUNCTIONS?\n\
    \n### 9.1.1 Explanation\n\nFunctions are the building blocks of reusable code\
    \ in Python. They allow us to group related code into logical units, making our\
    \ programs more organized, readable, and maintainable. Think of functions as self-contained\
    \ recipes that can be executed multiple times with different inputs, resulting\
    \ in consistent and efficient code (Figure 9.1).\n\nFunctions serve several purposes:\
    \ 1) Write the code once, and use it many times throughout your program, 2) Divide\
    \ your code into smaller, manageable chunks, making it easier to maintain and\
    \ debug, and 3) Organize your code into logical sections, making it easier for\
    \ others (or yourself) to understand.\n\nFunctions may hide the implementation\
    \ details of a task from the rest of your program, allowing you to focus on the\
    \ interface (inputs/outputs) rather than the internal workings. Functions reduce\
    \ duplicated code and make your program more maintainable and minimize the amount\
