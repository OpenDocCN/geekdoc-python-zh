  md: 'SECTION I: PYTHON FUNDAMENTALS introduces the essential concepts of Python,
    a versatile and widely used programming language known for its simplicity and
    readability. You will learn about Python''s strengths, including why it has become
    the language of choice for many developers. This section will explain the difference
    between script-based and interactive Python environments, highlighting the benefits
    of using local and cloud-based Jupyter notebooks for coding. Key foundational
    elements such as the `print()` and `input()` functions will be covered, along
    with variables, operations, and string manipulation using built-in methods.


    By the end of this section, you will be able to:


    +   - Understand Python''s core principles and advantages as a programming language.

    - Differentiate between script-based and interactive Python environments, and
    effectively use Jupyter Notebooks.

    - Use `print()` and `input()` to interact with users and display the output.

    - Understand Python''s variable and dynamic typing.

