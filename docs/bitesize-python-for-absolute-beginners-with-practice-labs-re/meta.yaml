- img_proc: true
  md: '# 5.2.1 Demonstration


    You can create a string by enclosing a sequence of characters in quotations (either
    single, double, or triple quotations).


    ```

    # Three strings below are equivalent

    s1 = ''Hello, world!''

    s2 = "Hello, world!"

    s3 = ''''''Hello, world!''''''

    s1, s2, s3

    ```


    (''Hello, world!'', ''Hello, world!'', ''Hello, world!'')


    You can create a string from other data types, such as integers or floats, using
    the `str()` function.


    ```

    # str() is a constructor, or initializer of strings

    s4 = str(5)

    s5 = str(6.0)

    s6 = str(True)

    s7 = str(False)

    s4, s5, s6, s7

    ```


    (''5'', ''6.0'', ''True'', ''False'')


    You can use the `len()` function to obtain the length of a string, which is the
    number of characters in it.


    ```

    print(s1, len(s1))

    print(s7, len(s7))

    ```


    Hello, world! 13

    False 5


    # 5.3 STRING ACCESS


    You can access individual characters in a string using their index. In Python,
    the index always starts from 0. For a string variable `text`, the first character
    is then `text[0]` and the last character is then `text[len(text)-1]`. If you use
    an index larger than `len(text)-1`, you will get an error.


    # 5.3.1 Demonstraton


    For example (Figure 5.1):


    ```

    text = ''Python''

    first_char = text[0]  # Access the first character ''P''

    print(''First character:'', first_char)

    ```


    First character: P


    ```

    last_char = text[len(text)-1]  # Access the last character ''n''

    print(''Last character:'', last_char)

    ```'
