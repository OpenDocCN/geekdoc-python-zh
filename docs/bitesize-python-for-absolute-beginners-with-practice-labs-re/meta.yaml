    ### 11.6.1 Demonstration


    Python lists offer a variety of built-in functions for efficient manipulation
    and management of list elements. One of the most commonly used functions is **append()**,
    which adds a new element to the end of the list, expanding its size by one. This
    function is useful for dynamically growing lists as new elements are generated
    or retrieved during program execution. Conversely, the **remove()** function allows
    for the removal of a specific element from the list based on its value, effectively
    reducing the size of the list by one. Additionally, the **insert()** function
    enables the insertion of a new element at a specified position within the list,
    allowing for targeted modification of list contents.


    These functions provide essential tools for adding, removing, and inserting elements
    into Python lists, facilitating dynamic data management in various programming
    scenarios.


    ```python

    # Create a list of numbers

    my_list = [1, 2, 3, 4, 5]

    ```


    ```python

    # Append a new element to the list

    my_list.append(6)

    print(my_list)  # Output: [1, 2, 3, 4, 5, 6]

    ```


    [1, 2, 3, 4, 5, 6]


    ```python

    # Remove the element with value 3 from the list

    my_list.remove(3)

    print(my_list)  # Output: [1, 2, 4, 5, 6]

    ```


    [1, 2, 4, 5, 6]


    ```python

    # Insert the value 10 at index 2

    my_list.insert(2, 10)

    print(my_list)  # Output: [1, 2, 10, 4, 5, 6]

    ```


    [1, 2, 10, 4, 5, 6]


