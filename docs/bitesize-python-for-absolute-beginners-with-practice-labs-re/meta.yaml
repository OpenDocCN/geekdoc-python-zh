    \ 0.05\nThe total amount after these years is: $162889.46\n\n## II\n\n## Flow\
    \ Control and Functions\n\n## SECTION II: FLOW CONTROL AND FUNCTIONS\n\nThis section\
    \ covers how Python handles flow control, enabling you to create dynamic and responsive\
    \ programs. You'll explore the fundamentals of branching and repetition, the core\
    \ mechanisms that allow your code to make decisions and execute tasks repeatedly.\
    \ Building on these basics, we introduce functions, an advanced yet essential\
