    \n# 第14章\n\n## 字典\n\n虽然集合存储唯一、无序的元素，但Python字典允许你将每个元素与一个唯一的键关联起来，创建键值对。与集合不同，字典提供了一种使用键高效访问值的方法，这使得它们非常适合需要快速查找或数据关联的场景。这使得字典成为存储配置、计数出现次数或表示数据之间关系等任务的强大工具。你准备好了吗？让我们开始吧！\n\
