  md: '# 12.6 SLICE A TUPLE


    # 12.6.1 Demonstration


    Similar to list, slicing tuples in Python allows for the extraction of a subset
    of elements from a tuple using a specified range of indices. When using non-negative
    indices, slicing involves specifying the starting index, ending index (exclusive),
    and an optional step size. The syntax for slicing is `tuple[start:end:step]`,
    where `start` indicates the index of the first element to include, `end` indicates
    the index after the last element to include, and `step` determines the increment
