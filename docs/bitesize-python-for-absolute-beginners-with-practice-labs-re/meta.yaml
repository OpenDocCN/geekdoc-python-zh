    # 2.2 SINGLE OR DOUBLE


    # 2.2.1 Explanation


    In Python, you can use either single quotation mark ('') or double quotation mark
    (") to define a string. This means that ''Hello, world!'' and "Hello, world!"
    are equivalent and will produce the same output.


    Python allows both single and double quotations to make it easier to define strings
    that contain quotations. For example, if you want to define a string that contains
    a single quotation, you can use double quotation: "It''s a beautiful day!". Similarly,
    if you want to define a string that contains a double quotation, you can use single
    quotation: ''He said, "Hello, world!"''.


    While Python allows both single and double quotations, it''s generally recommended
    to use single quotes for defining strings. This is because single quotes are more
    commonly used in Python and make the code more readable. Additionally, single
    quotes are less prone to errors, as they don''t require escaping when defining
    strings that contain double quotes.


    Escaping allows you to include special characters in your strings by prefixing
    them with a backslash (\). This tells Python to treat the next character as a
    literal character, rather than its special meaning.'
