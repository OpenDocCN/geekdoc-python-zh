    - Not Equal (!=): a != b returns True if a is not equal to b, and False otherwise.
    For example: 5 != 3 returns True, while 5 != 5 returns False.

    - Greater Than (>): a > b returns True if a is greater than b, and False otherwise.
    For example: 5 > 3 returns True, while 3 > 5 returns False.

    - Less Than (<): a < b returns True if a is less than b, and False otherwise.
    For example: 3 < 5 returns True, while 5 < 3 returns False.

    - Greater Than or Equal To (>=): a >= b returns True if a is greater than or equal
    to b, and False otherwise. For example: 5 >= 5 returns True, while 3 >= 5 returns
    False.

    - Less Than or Equal To (<=): a <= b returns True if a is less than or equal to
    b, and False otherwise. Example: 3 <= 5 returns True, while 5 <= 3 returns False.


