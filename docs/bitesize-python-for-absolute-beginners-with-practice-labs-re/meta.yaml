    使用 set() 构造函数和元组创建的集合: {1, 2, 3}


    在Python中创建集合的另一种方法是直接赋值，使用花括号 `{}` 和元素。注意，由于集合和字典都使用 `{}`，如果你要创建一个空集合，必须使用 `set()`。不带元素的
