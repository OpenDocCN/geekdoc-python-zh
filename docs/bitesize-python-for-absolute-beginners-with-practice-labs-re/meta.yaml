    ```

    student = [''David Wood'', 18, 3.9, True]

    print(student)

    ```


    [''David Wood'', 18, 3.9, True]


    Note that len() counts the number of elements in a list. If the element is another
    list, it is still counted as one. The list [1.5, 1.6, 1.8, 2.0] in my_list_6 counts
    one, and the list [''Hello'', ''world''] in my_list_6 counts one, too.


    ```

    print(my_list_6)

    print(len(my_list_6)) # output 5

    ```


    [1, ''Hello'', 1.5, [1.5, 1.6, 1.8, 2.0], [''Hello'', ''world'']]

    5


    ```

    print(student)

    print(len(student)) # output 4

    ```


