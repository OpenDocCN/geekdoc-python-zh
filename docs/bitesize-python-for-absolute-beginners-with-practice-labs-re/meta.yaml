    # 5.4 STRING SLICING


    If you want to obtain a portion of a string, you can use string slicing. It''s
    done using the [start:stop:step] notation in place of the indices, where the start
    represents the index to start slicing, the stop represents the index to stop slicing
    (thus, the character of this index will be excluded from the substring), and the
    step represents the step value (which is 1 by default) in the slicing (Figure
    5.3, 5.4).


