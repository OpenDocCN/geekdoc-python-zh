    的社区驱动开发也确保了该语言不断演进以满足用户需求。


    Python 可在多种操作系统上运行，如 Windows、macOS 和 Linux。它还是开源的，这意味着可以免费使用、分享和修改。这种开源特性吸引了大量开发者为
    Python 的发展做出贡献，确保它始终保持高质量并持续改进。


    ## 1.3 脚本式与交互式 Python


    使用 Python 时，你有两种主要的环境选择：脚本式 Python 和交互式 Python。脚本式 Python 涉及在文本编辑器或集成开发环境（IDE）中编写代码并将其作为脚本运行，而交互式
    Python 允许你逐行执行代码并立即查看结果。


    脚本式 Python 非常适合需要自动化的任务，例如数据处理、网络爬虫或系统管理。你编写一个脚本，保存它，然后根据需要运行它。脚本式 Python 非常适合需要重复执行或需要在后台运行的任务（图
    1.1）。


    ```

    print(''Hello, world!'') # 显示一条消息

    ```


    图 1.1 一个脚本式 Python 示例。


    另一方面，交互式 Python 非常适合数据科学、科学计算和探索性数据分析。使用交互式 Python，你可以逐行执行代码，查看结果，并相应地调整代码。这种迭代过程允许你实时探索数据、测试假设和可视化结果（[图
    1.2](https://example.com)）。


    ```

    演示


    [ ] print(''Hello, world!'') # 显示一条消息


    Hello, world!

    ```


    图 1.2 一个交互式 Python 示例。


    ## 1.4 为什么选择交互式 Python？


    交互式 Python 特别适合数据科学，原因如下：


    - 它使你能够实时加载、操作和可视化数据。这让你能快速理解数据的结构和模式，识别缺失或错误的值，并进行探索性数据分析。

    - 它允许你迭代地编写和测试机器学习模型。你可以尝试不同的算法，微调超参数，并实时评估模型性能，从而能够快速优化模型并获得更好的结果。

    - 它提供了对各种统计库和工具的访问，如 Pandas、NumPy 和 Scikit-learn。你可以在交互式环境中执行统计分析、数据转换和特征工程，使理解和准备建模数据变得更容易。

    - 它使你能够使用 Matplotlib、Seaborn 和 Plotly 等库创建交互式可视化和仪表板。这让你能够以清晰且引人注目的方式呈现你的发现，使利益相关者能够探索和理解你揭示的见解。

    - 其交互性使你能够快速编写和测试代码，从而能够以快速迭代的方式调试代码。这减少了开发和完善数据科学项目所需的时间和精力。

    - 其环境（如 Jupyter Notebook）支持代码、数据和结果的协作与共享。这促进了数据科学家、工程师和其他利益相关者之间的团队合作和知识共享。


    ## 1.5 Jupyter


    在本书中，我们将使用 JupyterLab 和 Jupyter Notebooks 作为我们的交互式 Python 环境。Jupyter Notebooks
    将解释、图像和富媒体、代码以及输出融合在一个文档中。它是数据科学、科学计算和教育的理想平台，被工业界、学术界和研究领域广泛使用。JupyterLab 是一个基于
    Web 的用户界面，用于创建和操作 Jupyter Notebooks。


    Jupyter Notebook 的交互式单元格允许你逐行执行代码，实时查看每个单元格的结果。这使你能够以迭代和动态的方式探索数据、测试假设和可视化结果。你可以用
    Python、R、Julia 或其他语言编写代码，并在浏览器或远程服务器上执行。


    Jupyter Notebooks 支持多种媒体，包括图像、视频、交互式可视化和方程式。你可以将这些媒体元素直接嵌入到你的笔记本中，轻松创建引人入胜的交互式文档。这对于数据可视化特别有用，你可以创建交互式图表，允许用户实时探索数据。


    Jupyter Notebooks 支持实时协作和文档共享。你可以与他人共享笔记本，并实时在单个文档上共同工作。这促进了数据科学家、工程师和其他利益相关者之间的团队合作和知识共享。你还可以使用
    Jupyter Notebook 内置的评论和讨论功能与协作者和利益相关者进行沟通。


    Jupyter Notebooks 可以访问各种库和工具，包括流行的数据科学库，如 Pandas、NumPy 和 Scikit-learn。你还可以安装额外的库和工具，如
    Matplotlib、Seaborn 和 Plotly，以扩展笔记本的功能。这使你能够执行广泛的数据科学任务，从数据清洗和可视化到机器学习和深度学习。


    Jupyter Notebooks 提供了强大的安全性和可扩展性功能，使其适合在生产环境中使用。你可以使用密码、令牌或其他身份验证方法来保护你的笔记本，并扩展你的笔记本以处理大型数据集和高流量。这使你能够在各种环境中部署你的笔记本，从本地机器到基于云的服务器。


    Jupyter Notebook 文件具有 `.ipynb` 扩展名，并包含一个表示笔记本内容的 JavaScript 对象表示法结构。这些文件可以在 Jupyter
    Notebook 中打开和编辑，也可以与他人共享和协作。`.ipynb` 文件格式允许创建灵活且动态的文档，可以包含文本、代码、方程式、图像和交互式可视化的混合。


    Jupyter Notebooks 的一个关键特性是能够将 Markdown 文本、代码单元格和输出单元格组合在一个文档中。这使你能够创建一个叙述性文档，解释你的代码，展示代码的输出，并提供清晰简洁的结果说明。


    1. Markdown 单元格允许你以简单易读的格式编写文本，使用 Markdown 语法来格式化标题、粗体文本、斜体和链接。你可以使用 Markdown
    单元格提供解释、介绍和总结，以及为你的代码和输出添加上下文。

    2. 代码单元格允许你用多种编程语言编写和执行代码，包括 Python、R、Julia 和 MATLAB。你可以使用代码单元格执行数据分析、机器学习和可视化，以及创建交互式图表。

    3. 输出单元格显示代码的结果，包括文本、图像和交互式可视化。你可以使用输出单元格展示代码的输出，并创建总结你发现的报告和仪表板。


    通过组合 Markdown、代码和输出单元格，你可以创建一个清晰简洁的叙述性文档，解释你的代码，展示代码的输出，并提供结果的总结。这对于数据科学和科学计算特别有用，你需要以清晰透明的方式记录你的方法、结果和结论（图
    1.3）。


    ![](img/e4806f3bc91279996f2dfb01e3181060_35_0.png)


    图 1.3 Jupyter notebook 示例。


    ## 1.6 本地或云端


    在使用 Jupyter Notebooks 进行 Python 开发时，你有两种主要选择：本地安装或云服务。本地安装涉及在你自己的计算机上下载和安装 Jupyter
    Notebooks，让你拥有完全的控制权'
