    # CHAPTER 12


    # Tuple


    How do you like list in Python? Is it powerful and convenient? In this chapter,
    we are going to learn a similar data structure, tuple. Lists and tuples are both
    used to store ordered collections of items, offering similar functionality like
    indexing and iteration. However, the key difference is that lists are mutable,
    allowing changes to their content, while tuples are immutable, making them safer
    for storing fixed data or as keys in dictionaries. Tuples are especially useful
    when you need lightweight, read-only containers that prioritize data integrity
    and performance.


    Are you excited? Let’s get started!


    # 12.1 WHAT IS A TUPLE


    # 12.1.1 Explanation


    Why do we need tuples? Tuples are useful when you need to store a collection of
    objects that should not be modified, such as a database record or a geometric
    coordinate. Tuples are also useful when you need to return multiple values from
    a function.


    Real-life examples:


    +   - Coordinates: A tuple can represent a geographic coordinate, like (43.6532,
    -79.3832), which is the latitude and longitude of Toronto, Canada.

    - Database Record: A tuple can represent a single record in a database, like (John,
    Smith, 25, New York), which could be a person’s name, last name, age, and city.

    - Product Information: A tuple can represent information about a product, like
    (Apple, iPhone, 128GB, $799), which could be the brand, model, storage size, and
    price of a phone.

    - Time and Date: A tuple can represent a time and date, like (2024, 3, 15, 14,
    30, 0), which could be the year, month, day, hour, minute, and second of a specific
    moment.


    Remember, tuples are immutable, meaning they cannot be changed once created, so
    they are perfect for storing data that should not be modified.'
