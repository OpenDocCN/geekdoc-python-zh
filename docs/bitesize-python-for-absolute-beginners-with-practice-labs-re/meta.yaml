  - "[PAGE 98]\n\n# # Repetition\n\nREPETITION flow control lets us repeat a piece\
    \ of code multiple times. This is done using loops, like `for` loops and `while`\
    \ loops. Repetition is important because it saves our time and effort. Instead\
    \ of writing the same code again and again, we can use loops to automate tasks.\
    \ In real life, repetition is useful for things like processing all rows in a\
    \ dataset, sending automated emails, or simulating events like rolling a dice\
    \ many times. It makes coding more efficient and helps solve problems faster.\n\
    \nLet's get started!\n\n# ## 8.1 CONDITION-BASED REPETITION\n\n# ### 8.1.1 Explanation\n\
    \nIn Python, condition-based repetition flow control is managed using the `while`\
    \ loop. The `while` loop repeatedly executes a block of code as long as a specified\
    \ condition remains true. This type of loop is ideal when you don't know beforehand\
    \ how many times the loop should run, but you want the iteration to continue until\
    \ a certain condition is no longer met.\n\nHere's a basic structure of a `while`\
    \ loop:\n\n```\npython\nwhile condition:\n    statements\n```\n\nHere, the loop\
    \ checks this `condition` before each iteration. If the `condition` is `True`,\
    \ the code block inside the loop will execute. If the `condition` is `False`,\
    \ the loop stops and the program continues with the next lines of code outside\
    \ the loop. The `statements` with indentation is the section of code that runs\
    \ on each iteration while the `condition` is `True` (Figure 8.1)."
