  md: '# What is Next?


    Congratulations! You have mastered basic Python with a full understanding of the
    fundamental syntax, flow control, functions, and built-in data structures. You
    are not a beginner anymore, and you can create your own Python programs to solve
    some real-life problems! Is that cool?


    After the celebration, you may want to learn how the built-in data types and data
    structures are defined following the object-oriented programming logic. You may
    want to explore advanced data structures to store data differently for specific
    scenarios. You may also be interested in widely used Python packages for data
    manipulation, including Random, Math, NumPy, and Pandas. At last, for a better
    understanding of the data and communication of the statistics, you may want to
    learn data visualization packages, such as Matplotlib, Seaborn, and Plotly. You
    can find these topics covered in the second book of the series, *BiteSize Python
    for Intermediate Learners: With Practice Labs, Real World Examples, and ChatGPT*.


    I look forward to meeting you there and continuing our journey once again.'
