    这里，`item`代表循环正在遍历的序列中的当前元素。`sequence`可以是任何可迭代对象，如列表、元组、字符串或`range`。循环将为序列中的每个元素迭代一次。带缩进的`statements`是在每次迭代时运行的代码部分（图8.2）。\n\
