    print((2 + 3) * (4 - 1)) # (2 + 3) * (4 - 1) = 5 * 3 = 15

    print(10 / (2 + 3)) # 10 / (2 + 3) = 10 / 5 = 2.0

    print(10 - (2 + 3)) # 10 - (2 + 3) = 10 - 5 = 5

