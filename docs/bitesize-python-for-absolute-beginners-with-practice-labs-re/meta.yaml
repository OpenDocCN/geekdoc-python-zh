  md: "# 8.4 CASE STUDIES OF REPETITION\n\nThese case studies are designed to test\
    \ your understanding of flow control: repetition. We are going to create some\
    \ simple programs using these tools. Are you ready? Let’s get started!\n\nYou\
    \ will find some real-life tasks in the sections below. You should use `input()`\
    \ to get the user to enter the information and use `print()` to print the information\
    \ on the screen. At this moment, we can assume users will follow instructions\
    \ carefully – they will enter the valid inputs as required.\n\n# 8.4.1 Prime numbers\n\
    \n+   1. Ask the user to enter an integer.\n2. Find and print all prime numbers\
    \ up to the integer.\n\n```\n# Ask the user to enter an integer\nn = int(input('Enter\
    \ an integer: '))\n\n# Start a loop that iterates from 2 to n (inclusive)\nfor\
    \ i in range(2, n+1):\n    # Assume i is prime\n    prime = True\n\n    # Check\
    \ if i has any divisors other than 1 and itself\n    for j in range(2, i):\n \
    \       # If the i is divisible by any other number, it's not prime\n        if\
    \ i % j == 0:\n            prime = False\n            # Break out of the inner\
    \ loop since i is not prime\n            break\n\n    # If the current number\
    \ is prime, print it\n    if prime:\n        print(i)\n```\n\nEnter an integer:\
