    ## 11.7 列表的更多操作


    ### 11.7.1 演示


    除了基本的列表操作函数外，Python 列表还提供了其他几个有用的函数，用于更高级的操作。**extend()** 函数用于将另一个可迭代对象（如另一个列表）的元素追加到当前列表的末尾，从而有效地扩展其长度。当需要将多个列表合并为一个时，此函数特别方便。**reverse()**
    函数反转列表中元素的顺序，提供了一种重新排列列表内容的便捷方式。最后，**sort()** 函数默认按升序对列表元素进行排序，便于轻松排序列表元素。这些函数为使用
    Python 列表提供了额外的灵活性和功能，能够实现更复杂的列表操作。


    ```python

    # 定义一个整数列表

    my_list = [1, 2, 3, 4, 5]

    ```


    ```python

    # 用另一个列表扩展当前列表

    additional_list = [5, 6]

    my_list.extend(additional_list)

    print(my_list)

    ```


    [1, 2, 3, 4, 5, 5, 6]


    ```python

    # 反转列表中元素的顺序

    my_list.reverse()

    print(my_list)

    ```


    [6, 5, 5, 4, 3, 2, 1]


    ```python

    # 按升序对列表元素进行排序

    my_list.sort()

    print(my_list)

    ```


    [1, 2, 3, 4, 5, 5, 6]


    ```python

    # 按降序对列表元素进行排序

    my_list.sort(reverse = True)

    print(my_list)

    ```


    [6, 5, 5, 4, 3, 2, 1]


    此外，Python 列表还提供了诸如 **clear()** 之类的函数，用于从列表中移除所有元素，有效地将其重置为空状态。**del** 语句虽然不是函数，但具有类似的目的，允许根据索引删除列表元素或切片。这些函数和语句在列表操作中提供了灵活性，允许开发者在程序执行期间根据特定需求调整列表内容。


    ```python

    # 删除索引 2 处的元素

    my_list = [1, 2, 3, 4, 5]

    del my_list[2]

    print(my_list)  # 输出: [1, 2, 4, 5]

    ```


    [1, 2, 4, 5]


    ```python

    # 清空列表中的所有元素

    my_list.clear()

    print(my_list)  # 输出: []

    ```


    []


    除了 Python 提供的列表操作函数外，还有其他技术可用于组合和排序列表。连接两个列表涉及将它们的元素组合成一个单一的列表。这可以使用 + 运算符来实现，该运算符将一个列表的元素与另一个列表的元素连接起来。当需要保持元素顺序时，这种方法简单有效。


    此外，**sorted()** 函数提供了一种灵活的方式来对列表元素进行排序。与就地排序列表的 **sort()** 方法不同，**sorted()** 函数返回一个包含已排序元素的新列表，而原始列表保持不变。这提供了一种非破坏性的方式来获取列表的排序版本，使其在需要保留原始列表的场景中非常有用。


    ```python

    # 连接两个列表

    list1 = [1, 2, 3]

    list2 = [4, 5, 6]

    concatenated_list = list1 + list2

    print(concatenated_list)  # 输出: [1, 2, 3, 4, 5, 6]

    ```


    [1, 2, 3, 4, 5, 6]


    ```python

    # sorted 函数

    unsorted_list = [3, 1, 4, 2, 5]

    sorted_list = sorted(unsorted_list)

    print(sorted_list)  # 输出: [1, 2, 3, 4, 5]

    print(unsorted_list)  # 输出: [3, 1, 4, 2, 5]

    ```


    [1, 2, 3, 4, 5]

    [3, 1, 4, 2, 5]


