  md: 'Table 5.1 Summary of Python string methods.


    | Method | Description | Example |

    |---|---|---|

    | str.upper() | Converts all characters to uppercase. | "hello".upper() → "HELLO"
    |

    | str.lower() | Converts all characters to lowercase. | "HELLO".lower() → "hello"
    |

    | str.capitalize() | Capitalizes the first character of the string. | "hello world".capitalize()
    → "Hello world" |

    | str.title() | Capitalizes the first letter of each word. | "hello world".title()
    → "Hello World" |

    | str.strip() | Removes leading and trailing whitespaces. | " hello ".strip()
    → "hello" |

    | str.replace(old, new) | Replaces occurrences of a substring with another substring.
    | "hello world".replace("world", "Python") → "hello Python" |

    | str.split(sep) | Splits the string into a list based on a delimiter. | "a,b,c".split(",")
    → ["a", "b", "c"] |

    | str.join(iterable) | Joins elements of an iterable with the string as the delimiter.
    | ",".join(["a", "b", "c"]) → "a,b,c" |

    | str.find(sub) | Returns the lowest index of the substring or -1 if not found.
    | "hello".find("e") → 1 |

    | str.startswith(prefix) | Checks if the string starts with the specified prefix.
    | "hello".startswith("he") → True |

    | str.endswith(suffix) | Checks if the string ends with the specified suffix.
    | "hello".endswith("lo") → True |

    | str.isdigit() | Checks if all characters are digits. | "123".isdigit() → True
    |

    | str.isalpha() | Checks if all characters are alphabetic. | "abc".isalpha() →
    True |

    | str.count(sub) | Counts occurrences of a substring in the string. | "banana".count("a")
    → 3 |'
