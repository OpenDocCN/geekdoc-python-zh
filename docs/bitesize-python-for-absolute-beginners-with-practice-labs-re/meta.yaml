    ```


    x: 5.0 <class ''str''>

    str2_x: 5.0 <class ''str''>


    Task: Use print() and type() to check all the variables you created so far, x,
    int_x, float_x, str1_x, str2_x for their values and data types.


    ```

    print(''x:'', x, type(x))

    print(''int_x:'', int_x, type(int_x))

    print(''float_x:'', float_x, type(float_x))

    print(''str1_x:'', str1_x, type(str1_x))

    print(''str2_x:'', str2_x, type(str2_x))

    ```


    x: 5.0 <class ''str''>

    int_x: 5 <class ''int''>

    float_x: 5.0 <class ''float''>

    str1_x: 5 <class ''str''>

    str2_x: 5.0 <class ''str''>


    ## 3.4 DATA TYPES CONVERT


    ### 3.4.1 Explanation


    In Python, you can convert a value from one data type to another using various
    conversion functions. This is useful when you need to work with values of different
    types or when you need to ensure a value is in a specific format.


    ### 3.4.2 Demonstration


    ```

    x = 5 # x is an int

    print(str(x), type(str(x)))

    ```


    5 <class ''str''>


    ```

    x = 5 # x is an int

    print(float(x), type(float(x)))

    ```


    5.0 <class ''float''>


    ```

    x = 5.0 # x is a float

    print(int(x), type(int(x)))

    ```


    5 <class ''int''>


    ```

    x = 5.5 # x is a float

    print(int(x), type(int(x)))

    ```


    5 <class ''int''>


    ```

    x = ''5'' # x is a str

    print(int(x), type(int(x)))

    ```


    5 <class ''int''>


    ```

    x = ''5.5'' # x is a str

    print(float(x), type(float(x)))

    ```


    5.5 <class ''float''>


    Be careful if you convert values between different data types. Sometimes you may
    encounter errors, for example, try to convert a string literal (''a'') to a float
    or (''5.5'') to an integer. Sometimes you may have data loss, for example, try
    to convert ''5.5'' to an int, which returns the floor value (5) instead of the
    actual value (6).


    Let''s summarize the data types and compare them in Table 3.1.


    Table 3.1 Comparison of basic Python data types.


    | | int | float | str | bool |

    |---|---|---|---|---|

    | Definition | Integers | Floating-point numbers | Sequence of characters | Boolean
    values |

    | Example | 42 | 3.14 | "hello" | True, False |

    | Constructor | int() | float() | str() | bool() |

    | Mutability | Immutable | Immutable | Immutable | Immutable |

    | Applications | Counting, indexing | Measurements, calculations, scientific data
    | Text, data representation | Condition, logic control |

    | Pros | Precise for discrete values, efficient | Handles large ranges and decimals
    | Rich library of string methods, flexible | Simple and intuitive for logic-based
    code |

    | Cons | Cannot handle decimals, may overflow | Precision for very large or small
    numbers | Memory-intensive for large strings | Limited values |


