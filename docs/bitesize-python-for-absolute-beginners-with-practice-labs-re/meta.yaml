    \n## 10.4 递归函数\n\n### 10.4.1 解释\n\n递归是一种编程技术，其中函数调用自身来解决问题。该函数将问题分解成更小、更易于管理的子问题，每个子问题都由函数自身解决。递归可以简化那些天然适合递归模式的问题的代码，例如树遍历、排序算法或数学序列。一个递归函数应该包含两种情况：基本情况是递归停止的条件，用于防止无限递归；递归情况是函数中发生递归的部分，通常涉及函数使用更小或更简单的输入调用自身。\n\
