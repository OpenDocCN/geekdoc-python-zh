    \ - 1)\n\nprint(factorial(5))  # 输出：120\n```\n\n120\n\n间接递归是指一个函数通过另一个函数被间接调用，形成一个函数调用循环。\n\
    \n```python\ndef function_a(n):\n    if n > 0:\n        return function_b(n -\
    \ 1)\n\ndef function_b(n):\n    if n > 0:\n        return function_a(n - 2)\n\n\
    print(function_a(5))  # 输出：None\n```\n\nNone\n\n### 10.4.3 练习\n\n任务：定义一个递归函数 `fib(n)`\
