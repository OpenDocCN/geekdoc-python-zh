    -   理解Python的变量和动态类型。

    -   操作基本数据类型，包括`int`、`float`、`str`和`bool`。

    -   使用变量执行操作，并使用Python的内置方法操作字符串。


    # 第1章


    ## Python简介


    欢迎来到Python的世界！您可能之前就听说过这门神奇的语言，也许是在学校作业、软件手册或同事发给您的代码片段中。您知道它对于不断变化的科技世界很重要。是的，您完全正确！即使您不需要每天都使用它，学习Python也将是一次独特的体验，也是对您时间的明智投资。它将教会您计算机如何思考和工作，程序和类是如何设计的，以及复杂的神经元是如何构建并连接以形成人工智能基础的。本章将回答一些关于Python的基本问题，比如它是什么、为什么如此流行、它是什么样子、在哪里开发和运行它、什么是Jupyter
    Notebook、在哪里编写代码等等。让我们开始吧！


    ### 1.1 什么是Python？


    Python是一种高级、解释型的编程语言，以其易于学习和使用而闻名，因此成为初学者的热门选择。它由荷兰程序员Guido van Rossum创建，并于1991年首次发布。该语言以英国喜剧团体Monty
    Python''s Flying Circus命名，而不是以蛇命名，尽管其标志是爬行动物！Guido只是觉得蛇的设计会成为一个很酷的标志。


    多年来，Python经历了许多更新和改进。Python 2.0于2000年发布，引入了垃圾回收器和新的内存管理系统。长期以来，Python 2.x被广泛使用，但它有一些缺点，比如对Unicode的支持有限。目前，Python
    2.x已不再受支持或维护，因此本书将重点介绍Python 3.x。Python 3.0于2008年发布，解决了Python 2.x的局限性并添加了许多新功能。


    最新版本Python 3.13于2024年10月7日发布。Python 3.x完全兼容Unicode，提供更好的并行处理支持，并包含一系列用于数据分析、Web开发等任务的新模块和库。'
