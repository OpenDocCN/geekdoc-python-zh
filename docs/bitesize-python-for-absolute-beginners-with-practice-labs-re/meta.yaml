    Task: Why Python’s list can contain multiple data types? Explain it to yourself
    (ideally, someone else).


    Answer: Python’s dynamic typing system facilitates the creation of heterogeneous
    lists by associating variables with references to objects rather than directly
    with the objects themselves. In a Python list, elements are actually references
    (or addresses) pointing to the memory locations where the objects are stored.
    While the references stored in the list can be of different data types, they ultimately
    point to objects that can vary in data type as well. This mechanism allows Python
    lists to seamlessly accommodate a mix of integers, floats, strings, Booleans,
    and other data types within the same list. Thus, the heterogeneity of Python lists
    arises from the flexibility of Python’s dynamic typing system, which enables references
    in the list to point to objects of different data types while maintaining consistency
    in how these references are stored and accessed.'
