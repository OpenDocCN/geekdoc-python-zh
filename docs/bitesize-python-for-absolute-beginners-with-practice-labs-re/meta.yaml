    ## Variables


    How do you feel about Python so far? You can obtain information from users and
    display them on the screen! Python is not that hard, right? Let’s add some flavors
    to make it more useful now. In this chapter, we are going to learn the concept
    of variables, including how to define them and use them, and the dynamic typing
    in Python. We will also learn data types, so we can represent data in terms of
    built-in `int`, `float`, `str`, and `bool` values. Are you ready? Let’s get started!


    ## 3.1 WHAT ARE VARIABLES


    ### 3.1.1 Explanation


    Variables are used to store and reference values in a program. Without variables,
    we would have to repeat code or hardcode values, making our programs inflexible
    and difficult to maintain. Variables allow us to store a value once and use it
    multiple times, making our code more efficient and easier to read.


    In Python, variables work as references, meaning they point to the location in
    memory where the actual value is stored. This means that when we assign a new
    value to a variable, we are updating the reference to point to the new value,
    rather than changing the original value. This concept of references is key to
    understanding how variables work in Python, and it allows for powerful and flexible
    programming. With variables, we can write more dynamic and interactive programs
    that can adapt to changing conditions and user input. For example:


    ```

    x = 5

    ```


    Now, we can use `x` in any and many places, and the value of `x` is 5. If we need
    to update the value, just assign a new value to x, and all places `x` was used,
    will be updated (Figure 3.1).


    ![](img/e4806f3bc91279996f2dfb01e3181060_48_0.png)


    Figure 3.1 Variable x refers to 5.


    ### 3.1.2 Practice


    Task: Think about in your real life, what kind of references we may use. For example:


    ```

    python

    input(''Where do you live?'')

    ```


    Yes. When we mention a place in a conversation, we are referencing the physical
    location! Do you have some other examples?


    ## 3.2 NAMING RULES


    ### 3.2.1 Explanation


    There are two levels of naming rules. The minimal level has hard rules following
    the syntax. You must satisfy the syntax rules of naming variables; otherwise,
    you''ll get errors. The other level has soft rules following the convention. It
    is recommended to satisfy the convention rules so you can write professional programs.


    Syntax rules are:


    - Variable names must start with a letter (a-z or A-Z) or an underscore (_).

    - Variable names can only contain letters (a-z or A-Z), digits (0-9), and underscores
    (_).

    - Variable names are case-sensitive (e.g., name and Name are treated as different
    variables).

    - Variable names cannot be reserved keywords (e.g., if, else, while, etc.).


    Convention rules are:


    - Variable names should be descriptive and indicate the purpose of the variable.

    - Variable names should be concise, but not so short that they are unclear.

    - Variable names should use lowercase letters and underscores to separate words
    (e.g., first_name instead of FirstName).

    - Variable names should avoid using abbreviations or acronyms unless they are
    widely recognized (e.g., id for identifier).

    - Variable names should not start with an underscore (_) (even if it''s allowed
    by the syntax rules) unless you understand the special usage of this form.


    By following these syntax rules and convention rules, you can write clear, readable,
    and maintainable code that makes it easy for others (and yourself) to understand
    what your variables represent.


    ### 3.2.2 Practice


    Task: In following variable names, mark them with


    1. Error (break syntax rules)

    2. Not good (break convention rules)

    3. Good (following all rules)


    ```

    # application_id: GOOD

    # b: NOT GOOD

    # Cat: NOT GOOD

    # 4square: ERROR

    # five!: ERROR

    # six_dice: GOOD

    # _seven_day: NOT GOOD

    # eight_9: NOT ERROR -- NOT GOOD

    # Ten_points: NOT GOOD

    # llama3: NOT GOOD

    # bubble_00o: NOT GOOD

    # gj: NOT GOOD

    ```


    ## 3.3 DATA TYPES


    ### 3.3.1 Explanation


    In Python, a variable can refer to any type of value. The built-in data types
    include:


    - Integers int: e.g., 1, 2, 3, -3

    - Floats float: e.g., 3.14, -0.5

    - Strings str: e.g., "hello", ''hello''

    - Booleans bool: e.g., True, False


    In Python, the data type of a variable is determined by the data type of the value
    it refers to. This means that the data type of a variable is not fixed or declared
    beforehand, but rather is inferred from the value that the variable is referring
    to in real time. For example, if you assign an integer value to a variable, the
    variable will be considered an integer type; if you then assign a string value
    to that variable, the variable will be considered a string type, and so on. This
    is known as dynamic typing, and it allows for flexibility in programming, as a
    variable can change its data type during runtime if a different type of value
    is assigned to it. This is different from statically typed languages, where the
    data type of a variable is fixed.


    ### 3.3.2 Practice


    For all tasks below, use `print()` and `type()` to check the value is correctly
    assigned and the data type is correct. For example: `print(''x:'', x, type(x))`.
    Note that the `type()` will return the data type of values or variables.


    Task: assign x with an int 5.


    ```

    # Assign the value 5 to the variable x

    x = 5


    # Print the value of x, followed by its data type

    print(''x:'', x, type(x))

    ```


    x: 5 <class ''int''>


