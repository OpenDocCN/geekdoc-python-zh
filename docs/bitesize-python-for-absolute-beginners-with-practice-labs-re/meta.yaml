  md: "# CHAPTER 18\nCounters\n\nDICTIONARIES store key-value pairs efficiently, but\
    \ managing missing keys can be cumbersome. Default dictionaries improve this by\
    \ assigning default values to missing keys automatically. Taking this further,\
    \ the Counter is a specialized type of dictionary designed specifically for counting\
    \ tasks. While default dictionaries simplify handling missing keys, Counters streamline\
    \ tasks like counting elements, making them perfect for frequency analysis and\
    \ similar operations. In this chapter, we will explore the Counter from Python's\
    \ collections module. We will start by comparing it with a normal dictionary and\
    \ defaultdict, then introduce the Counter in detail, followed by real-life demonstrations\
    \ and practice problems with solutions.\n\nAre you ready? Let's get started!\n\
    \n# 18.1 WHAT IS A COUNTER\n\nLet's do a fruit count exercise first using normal\
    \ dictionary.\n\n```\n# Using a normal dictionary to count occurrences\nfruit_count\
    \ = {}\nbasket = ['apple', 'banana', 'apple', 'orange', 'banana', 'banana']\n\n\
    for fruit in basket:\n    if fruit in fruit_count:\n        fruit_count[fruit]\
    \ += 1\n    else:\n        fruit_count[fruit] = 1\n\nprint(fruit_count)\n```\n\
    \n{'apple': 2, 'banana': 3, 'orange': 1}\n\nWe definitely can use `defaultdict(int)`\
    \ to save some effort.\n\n```\nfrom collections import defaultdict\n\n# Using\
    \ defaultdict to count occurrences\n```"
