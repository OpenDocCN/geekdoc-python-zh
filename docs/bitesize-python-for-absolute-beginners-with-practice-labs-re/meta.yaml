    \n# 14.5.1 Demonstration\n\nDictionary comprehension, similar to list and set\
    \ comprehensions, allows for the creation of dictionaries using a concise and\
    \ efficient syntax in Python. Dictionary comprehension generates dictionaries\
    \ by applying an expression to each item in an iterable, resulting in key-value\
    \ pairs enclosed within curly braces {}.\n\nThe general syntax is:\n\n```\ndict_variable\
    \ = {key expression: value expression for item in iterable condition}\n```\n\n\
    ```\n# Using dictionary comprehension to generate a dictionary of squares\nsquares_dict\
    \ = {x: x ** 2 for x in range(1, 6)}\nprint('Dictionary of squares:', squares_dict)\n\
    ```\n\nDictionary of squares: {1: 1, 2: 4, 3: 9, 4: 16, 5: 25}\n\n```\n# Using\
    \ dictionary comprehension to create a dictionary of word lengths\nwords = ['apple',\
    \ 'banana', 'cherry']\nword_lengths_dict = {word: len(word) for word in words}\n\
    print('Dictionary of word lengths:', word_lengths_dict)\n```\n\nDictionary of\
    \ word lengths: {'apple': 5, 'banana': 6, 'cherry': 6}\n\n```\n# Using dictionary\
    \ comprehension to convert two lists into a dictionary\nkeys = ['a', 'b', 'c']\n\
    values = [1, 2, 3]\ncombined_dict = {keys[i]: values[i] for i in range(len(keys))}\n\
    print('Combined dictionary:', combined_dict)\n```"
