    ## Operations


    We have learned variables and data types, and now we can learn how to play with
    them! In Python, operations allow us to manipulate and combine values to perform
    various tasks. There are four main categories of operations: 1) Assignment operations,
    which establish the references we have experienced in the previous chapter; 2)
    Arithmetic operations, which enable us to perform mathematical calculations with
    numbers; 3) Relational operations, which enable us to make comparison and return
    bool values; and lastly 4) Logical operations, which enable us to play with bool
    values and get a compound condition. Let’s get started!


    ### 4.1 ASSIGNMENT OPERATIONS


    #### 4.1.1 Explanation


    In Python, the assignment operation is a fundamental concept that allows us to
    assign a value to a variable.


    The assignment operation in Python is denoted by the equals sign (=). It is used
    to assign the value of an expression to a variable. When we assign a value to
    a variable, we are not copying the value itself, but rather the address of the
    value. This means that the variable now refers to the location in memory where
    the value is stored.


    ```

    x = 5 # x refers to the address of 5

    print(x) # output 5

    ```


    5


    In this example, the value 5 is stored in memory, and the address of that value
    is assigned to the variable x. So, x now refers to the location in memory where
    the value 5 is stored.


    When we assign the value of one variable to another variable, we are assigning
    the address that the first variable refers to, to the second variable.


    ```

    y = x # y refers to the address that x refers to

    print(y) # output 5

    ```


    5


    In this example, the address that x refers to (which is the location in memory
    where the value 5 is stored) is assigned to y. So, y now refers to the same location
    in memory as x, which is where the value 5 is stored. This means that both x and
    y now refer to the same value, which is 5.


    If we change the value of x by assigning a different value to it, y will not change.
    This is because x and y are two separate variables that happen to point to the
    same location in memory initially. When we assign a new value to x, it will point
    to a new location in memory, but y will still point to the original location in
    memory.


    ```

    x = 6 # x refers to the address of 6

    print(y) # still output 5 since y still refers to 5

    ```


    5


    Multiple assignments in Python allow us to assign values to multiple variables
    in a single statement. This is a concise and readable way to assign values to
    multiple variables at once. For example:


    ```

    x, y = 5, 6

    ```


    This is equivalent to:


    ```

    x = 5

    y = 6

    ```


    Here''s how it works: The expressions on the right-hand side (5 and 6) are evaluated
    first. The values are then assigned to the variables on the left-hand side (x
    and y) in the order they are listed.


    #### 4.1.2 Practice


    Task: Use two input() functions to get the name and age from the user, assign
    the name to name, convert age to int and assign it to age. Print a string as {name}
    is {age} years old.


    ```

    name, age = input(''What is your name: ''), int(input(''What is your age?''))

    print(name, ''is'', age, ''years old.'')

    ```


    What is your name: Neo

    What is your age?18

    Neo is 18 years old.


    ### 4.2 ARITHMETIC OPERATIONS


    #### 4.2.1 Explanation


    Arithmetic operations in Python are used to perform mathematical calculations.


    Here are the basic arithmetic operations supported by Python:


    - Addition: a + b, adds two numbers a and b together.

    - Subtraction: a - b, subtracts the number b from another number a.

    - Multiplication: a * b, multiplies two numbers a and b together.

    - Division: a / b, divides the number a by another number b and returns a float
    as the result.

    - Floor Division: a // b, divides the number a by another number b and returns
    the largest whole number result as int.

    - Modulus (remainder): a % b, returns the remainder of dividing the number a by
    another number b.

    - Exponentiation: a ** b, raises the number a to the power of another number b.


    #### 4.2.2 Demonstration


    ```

    a = 5

    b = 2


    print(a + b)  # Output: 7

    print(a - b)  # Output: 3

    print(a * b)  # Output: 10

    print(a / b)  # Output: 2.5

    print(a // b) # Output: 2

    print(a % b)  # Output: 1

    print(a ** b) # Output: 25

    ```


    7

    3

    10

    2.5

    2

    1

    25


    The precedence of arithmetic operations in Python determines the order in which
    operations are evaluated when there are multiple operations in an expression.
    Below is the precedence of arithmetic operations in Python, listed from highest
    to lowest:


    - Parentheses (()): Evaluated first.

    - Exponentiation (**): Evaluated next.

    - Multiplication, Division, and Modulus (*, /, //, %): Evaluated next, from left
    to right.

    - Addition and Subtraction (+, -): Evaluated next, from left to right.


    ```

    result = 2 + 3 * (4 - 1)

    print(result)  # Output: 11


    result = (2 + 3) * 4

    print(result)  # Output: 20


    result = 2 ** 3 * 4

    print(result)  # Output: 32


    result = 10 / (2 ** 2)

    print(result)  # Output: 2.5


    result = 10 / 2 * 3

    print(result)  # Output: 15


    result = 10 * 2 + 3 % 4

    print(result)  # Output: 23


    result = 2 + 3 - 4

    print(result)  # Output: 1


    result = 10 - 2 + 3

    print(result)  # Output: 11

    ```


    11

    20

    32

    2.5

    15.0

    23

    1

    11


