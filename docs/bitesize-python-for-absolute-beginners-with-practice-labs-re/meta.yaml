    ## 4.4 LOGICAL OPERATIONS


    ### 4.4.1 Explanation


    The results we get from relational operations, True and False, are the only two
    values of a data type, bool. Logical operations in Python are used to play with
    Boolean values, combine conditional statements, and evaluate the truthiness of
    expressions. There are three logical operations in Python:


    - and (logical conjunction): a and b.

    - or (logical disjunction): a or b.

    - not (logical negation): not a.


    We can learn and get familiar with the results of logical operations by examining
    the truth table shown in Table 4.1.


    Table 4.1 Truth table for logical operations and, or, and not.


    | a | b | a and b | a or b | not a | not b |

    |---|---|---|---|---|---|

    | True | True | True | True | False | False |

    | True | False | False | True | False | True |

    | False | True | False | True | True | False |

    | False | False | False | False | True | True |


