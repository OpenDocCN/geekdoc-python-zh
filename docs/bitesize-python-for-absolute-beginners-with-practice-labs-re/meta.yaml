  md: "# CHAPTER 17\nDefault Dictionary\n\nDICTIONARIES are excellent for storing\
    \ key-value pairs, but accessing a key that doesn't exist raises a `KeyError`.\
    \ Default dictionaries build on this functionality by automatically assigning\
    \ a default value to missing keys, eliminating the need for manual checks or initialization.\
    \ This makes default dictionaries especially useful when working with dynamic\
    \ or unpredictable data where keys might not always exist in advance. In this\
    \ chapter, we will explore `defaultdict` from the `collections` module in Python.\
    \ We first demonstrate the difference between a regular dictionary `dict` and\
    \ a default dictionary `defaultdict`, then explore different types of `defaultdict`,\
    \ including `int`, `list`, and `set`.\n\nAre you ready? Let's get started!\n\n\
    # 17.1 WHAT IS A DEFAULT DICTIONARY\n\nWhen we use a key to retrieve the value,\
