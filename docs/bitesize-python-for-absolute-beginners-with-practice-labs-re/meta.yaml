  md: '# Named Tuple


    WE have learned **tuple** in previous section and we know **tuple** is useful
    for grouping related data, but its elements are accessed only by position, which
    can make the code less readable and harder to maintain. In this chapter, we are
    going to learn the extended data structure, **namedtuple**, which addresses this
    limitation by allowing you to assign meaningful names to each element while retaining
    the immutability and lightweight nature of regular tuples. This makes **namedtuple**
    especially helpful for improving code clarity and reducing the risk of errors
    in larger projects where readability is critical. Are you ready? Let''s get started!


    # 16.1 WHAT IS A NAMED TUPLE


    # 16.1.1 Explanation


    Named Tuples are an extension of Python''s built-in **tuple** data type. They
    allow for creating tuple-like objects where fields can be accessed using names,
    instead of only by index. This can make code more readable and easier to maintain,
    especially when dealing with collections of data that have multiple attributes.


    Named Tuples are part of the **collections** module in Python, and they''re typically
    used to represent simple data structures without the overhead of a full class.
    They''re a great tool when you want the simplicity of tuples but with named fields
    to provide clarity.


    # 16.1.2 Demonstration


    Let''s create a tuple to represent the position of a data point in a 2D space
    with x and y coordinates.


    ```

    # Regular tuple example

    position1_tuple = (10, 20)

    position2_tuple = (-5, 30)


    # Accessing data using index

    ```'
  merge: -1
  pgno: 219
- img_proc: true
  md: '192 ■ BiteSize Python for Absolute Beginners


    ```

    print(f''Position 1: x={position1_tuple[0]}, y={position1_tuple[1]}'')

    print(f''Position 2: x={position2_tuple[0]}, y={position2_tuple[1]}'')

    ```


    Position 1: x=10, y=20

    Position 2: x=-5, y=30


    In the regular tuple, you need to use the index 0 for x and 1 for y, which isn''t
    as intuitive and may lead to confusion in larger programs.


    Let''s create a named tuple to represent the data point.


    ```

    from collections import namedtuple


    # Define the named tuple ''Position''

    Position = namedtuple(''Position'', [''x'', ''y''])


    # Creating instances of the named tuple

    position1 = Position(x=10, y=20)

    position2 = Position(x=-5, y=30)


    # Accessing data using named fields

    print(f"Position 1: x={position1.x}, y={position1.y}")

    print(f"Position 2: x={position2.x}, y={position2.y}")

    ```


    Position 1: x=10, y=20

    Position 2: x=-5, y=30


    With the named tuple Position, you can access x and y using descriptive names
    (position1.x, position1.y), making the code more readable and self-explanatory.


    # 16.2 PACKAGE MANAGEMENT


    Let''s imagine a scenario where you work in a logistics company, and you manage
    packages being delivered. Each package has attributes like sender, receiver, and
    status. Using Named Tuples, we can clearly label each attribute, making it easy
    to access information about any package.


    ```

    from collections import namedtuple


    # Defining the named tuple ''Package''

    Package = namedtuple(''Package'', [''sender'', ''receiver'', ''status''])


    # Creating instances of the named tuple

    package1 = Package(sender="Alice", receiver="Bob", status="Delivered")

    package2 = Package(sender="Eve", receiver="Chris", status="In Transit")


    # Accessing data by field names

    print(f''Package1 sender: {package1.sender}, status: {package1.status}'')

    print(f''Package2 receiver: {package2.receiver}, status: {package2.status}'')


    # Accessing data by index (just like a normal tuple)

    print(f''Package1: {package1[0]} to {package1[1]}, status: {package1[2]}'')

    print(f''Package2: {package2[0]} to {package2[1]}, status: {package2[2]}'')

    ```'
