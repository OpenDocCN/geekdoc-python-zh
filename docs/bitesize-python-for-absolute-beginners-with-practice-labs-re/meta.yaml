    # Original list of lists (matrix)

    matrix = [[1, 2, 3], [4, 5, 6], [7, 8, 9]]


    # Flattening the matrix using nested iteration

    flattened_matrix = [num for sublist in matrix for num in sublist]


    print(flattened_matrix)  # Output: [1, 2, 3, 4, 5, 6, 7, 8, 9]

    ```


    [1, 2, 3, 4, 5, 6, 7, 8, 9]


    Nested iteration can also be extended to find all combinations of elements from
    multiple lists. This advanced technique involves using multiple nested for loops
    within the list comprehension syntax, each corresponding to an iterable representing
    a list. By iterating over each element from each list simultaneously, we can generate
    all possible combinations of elements across multiple lists. This approach is
    particularly useful when dealing with scenarios where we need to explore all possible
    combinations of elements from different sources, such as when generating permutations
    or combinations of items for various tasks or analyses. Nested iteration allows
    for a systematic and efficient exploration of all possible combinations, making
    it a powerful tool for solving a wide range of combinatorial problems in Python
    programming.


    ```

    # Two lists of numbers

    list1 = [1, 2, 3]

    list2 = [3, 4, 5]


    # Nested iteration to get all combinations of elements from the two lists

    combinations = [(i, j) for i in list1 for j in list2 if i != j]


    print(combinations)

    ```


    [(1, 3), (1, 4), (1, 5), (2, 3), (2, 4), (2, 5), (3, 4), (3, 5)]


    ```

    # A list of fruits

    fruits = [''apple'', ''banana'', ''orange'']


    # Nested iteration to get all combinations of fruits from the same list

    combinations = [(f1, f2) for f1 in fruits for f2 in fruits if f1 != f2]


    print(combinations)

    ```'
