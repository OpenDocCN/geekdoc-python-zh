    # CHAPTER 7


    # Branching


    FLOW CONTROL is a fundamental concept in programming that allows you to control
    the order in which your code is executed. In Python, the flow control statements
    are used to deviate from the sequential flow of a program. In sequential flow,
    the code is executed line by line, from top to bottom, in the order it is written.
    Each statement is executed in sequence, and the program follows a straightforward,
    linear path. On the other hand, flow control statements allow you to alter the
    sequential flow of a program. They enable you to branch to different parts of
    the program based on conditions (branching), repeat certain statements or blocks
    of code (looping), and even skip certain statements or blocks of code (skipping).


    In Python, the main flow control statements are:


    +   - **if-elif-else** statements (branching).

    - **for** loops (repetition).

    - **while** loops (repetition).

    - **break** and **continue** statements (skipping).

    - **try-except** statements (error handling).


    We will learn branching in this chapter. Are you excited? Let’s get started!


    # 7.1 OPTIONAL BRANCHING


    Optional branching (if) allows you to execute a block of code only if a certain
    condition is true (Figure 7.1).'
