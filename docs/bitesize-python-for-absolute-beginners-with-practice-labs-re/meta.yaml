    ```\n\n```\n{'Name': ['United States', 'China', 'Germany', 'Japan', 'India'],\n\
    \ 'GDP': [25462700, 17963171, 4072192, 4231141, 3385090],\n 'Population': [335893238,\
    \ 1409670000, 84607016, 124000000, 1400744000]}\n```\n\n## 14.5 DICTIONARY COMPREHENSION\n\
    \n### 14.5.1 Demonstration\n\nDictionary comprehension, similar to list and set\
    \ comprehensions, allows for the creation of dictionaries using a concise and\
    \ efficient syntax in Python. Dictionary comprehension generates dictionaries\
    \ by applying an expression to each item in an iterable, resulting in key-value\
    \ pairs enclosed within curly braces {}.\n\nThe general syntax is:\n\n```python\n\
    dict_variable = {key expression: value expression for item in iterable condition}\n\
    ```\n\n```python\n# Using dictionary comprehension to generate a dictionary of\
    \ squares\nsquares_dict = {x: x ** 2 for x in range(1, 6)}\nprint('Dictionary\
    \ of squares:', squares_dict)\n```\n\nDictionary of squares: {1: 1, 2: 4, 3: 9,\
