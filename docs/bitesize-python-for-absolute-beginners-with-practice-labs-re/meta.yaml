    \n## 11.9 LIST COMPREHENSION\n\n### 11.9.1 Demonstration\n\nList comprehension\
    \ in Python is a concise and elegant way to create lists based on existing lists\
    \ or other iterables. It allows for the creation of lists in a single line of\
    \ code, eliminating the need for explicit loop constructs like **for** loops.\
    \ List comprehension follows a simple syntax that resembles mathematical notation,\
    \ making it easy to read and understand. The basic structure of list comprehension\
    \ consists of an expression followed by a **for** clause, which specifies the\
    \ iteration over elements, optionally followed by additional **for** or **if**\
    \ clauses for nested iterations or filtering.\n\nThe general syntax is:\n\n```\n\
    list_variable = [expression for item in iterable condition]\n```\n\n```\n# Using\
    \ a for loop to generate a list of squared numbers\nsquared_numbers = []\nfor\
    \ num in range(6):\n    squared_numbers.append(num)\nprint(squared_numbers)  \
