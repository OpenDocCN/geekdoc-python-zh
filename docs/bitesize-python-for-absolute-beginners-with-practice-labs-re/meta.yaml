  - "[PAGE 204]\n\n# 14.4 DICTIONARY METHODS\n\n# 14.4.1 Demonstration\n\nIn Python,\
    \ dictionaries offer various methods for manipulating key-value pairs, enabling\
    \ efficient data management and modification. These methods facilitate the addition,\
    \ deletion, and update of elements within dictionaries, ensuring flexibility and\
    \ adaptability to changing data requirements.\n\nTo add a new key:value pair to\
    \ a dictionary, we just need to use a `dict[key] = value` assignment.\n\n```\n\
    # Creating a dictionary\nmy_dict = {'name': 'John', 'age': 30, 'city': 'New York'}\n\
    \n# Add a new pair 'ID': '0001'\nmy_dict['ID'] = '0001'\n\nmy_dict\n```\n\n{'name':\
    \ 'John', 'age': 30, 'city': 'New York', 'ID': '0001'}\n\nBe careful if there\
    \ is an existing key in the dictionary. Doing a `dict[key] = value` assignment\
    \ will use the new value to replace the old value associated with the key.\n\n\
    ```\nmy_dict['name'] = 'Neo'\n\nmy_dict\n```\n\n{'name': 'Neo', 'age': 30, 'city':\
    \ 'New York', 'ID': '0001'}\n\nWe can also use `update()` to add key-value pairs\
    \ from another dictionary or iterable to the current dictionary.\n\n```\n# Creating\
    \ another dictionary\nanother_dict = {'email':'John@example.com', 'major': 'English'}\n\
    \nmy_dict.update(another_dict)\n\nmy_dict\n```\n\n{'name': 'Neo',\n 'age': 30,\n\
    \ 'city': 'New York',\n 'ID': '0001',\n 'email': 'John@example.com',\n 'major':\
    \ 'English'}\n\n```\n# Creating a list of tuples\nanother_collection = [('phone',\
    \ '123-456-7890'), ('fax', '098-765-4321')]\n\nmy_dict.update(another_collection)\n\
    \nmy_dict\n```"
