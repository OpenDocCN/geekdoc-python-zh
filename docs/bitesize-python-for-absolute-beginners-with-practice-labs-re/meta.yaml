    how to create each of these structures, access their elements, and perform various
    manipulations using Python’s built-in methods. Understanding these data structures
    will enable you to handle and process data more effectively in your programs.


    The learning objectives for this section are as follows:


    - Understand the role and significance of data structures in programming.

    - Create and work with lists to store and manipulate ordered collections of items.

    - Use tuples to handle immutable sequences of data.

    - Implement sets to manage unordered collections of unique elements.

    - Utilize dictionaries for storing key-value pairs and accessing data efficiently.


    # CHAPTER 11


    # List


    DATA STRUCTURES are essential for organizing and managing data effectively in
    programming, and Python''s list is one of the most widely used structures. A list
    allows you to store an ordered collection of items, which can be of any type,
    and provides powerful tools for accessing, modifying, and iterating through data.
    In this chapter, we are going to learn what a list is, how to create, access,
    slice, and manipulate a list, and the Pythonic way of creating a list using list
    comprehension. Are you excited? Let''s get started!


    # 11.1 WHAT IS A LIST


    In Python, a list is a versatile and dynamic data structure that allows for the
    storage and manipulation of collections of elements. Unlike arrays in some other
    programming languages, Python lists can hold elements of different data types
    and can be easily modified and resized. Lists are ordered collections, meaning
    that the order in which elements are added is preserved, and elements can be accessed
    and manipulated based on their position within the list.


    One of the primary advantages of Python lists is their convenience and flexibility.
    Lists provide a straightforward and intuitive way to organize and work with data,
    making them suitable for a wide range of applications. Additionally, Python lists
    offer efficient random access to elements, allowing for quick retrieval and modification
    of individual items based on their index. This efficiency makes lists well-suited
    for tasks that involve accessing and modifying elements at arbitrary positions
    within the collection.


    Common use cases for Python lists include storing and processing sequential data,
    such as lists of numbers, strings, or objects. Lists are often used in algorithms
    that require dynamic resizing or rearranging of data, such as sorting, searching,
    or filtering operations. They are also frequently employed in data processing
    tasks, where the ability to iterate over and manipulate collections of data is
    essential. Overall, Python lists serve as versatile and indispensable tools for
    managing and manipulating data in a wide variety of programming scenarios.


    # 11.2 CREATE A LIST


    # 11.2.1 Demonstration


    In Python, there are several methods for creating lists, providing flexibility
    and convenience for different programming scenarios. One common method is to use
    the list constructor, which initializes an empty list or converts another iterable
    object, such as a tuple or string, into a list.


    ```

    my_list_1 = list() # Create an empty list

    print(my_list_1)

    ```


    []


    ```

    my_list_2 = list(''Hello, world'') # Create a list from a string

    print(my_list_2)

    ```


    [''H'', ''e'', ''l'', ''l'', ''o'', '','', '' '', ''w'', ''o'', ''r'', ''l'',
    ''d'']


    Another approach to creating lists in Python is by direct assignment, where we
    manually specify the elements of the list within square brackets.


    ```

    my_list_3 = [1, 3, 2, 4, 6] # Create a list of integers

    print(my_list_3)

    ```


    [1, 3, 2, 4, 6]


    ```

    my_list_4 = [''Hello'', ''world''] # Create a list of Strings

    print(my_list_4)

    ```


    [''Hello'', ''world'']


    ```

    my_list_5 = [1.5, 1.6, 1.8, 2.0] # Create a list of floats

    print(my_list_5)

    ```


    [1.5, 1.6, 1.8, 2.0]


    In Python, the built-in function len() is used to determine the length or the
    number of elements in a list. When applied to a list, len() returns an integer
    representing the total count of elements contained within the list. This count
    includes all individual elements, regardless of their data type or complexity,
    providing a convenient way to quickly assess the length of the list.


    ```

    print(my_list_1)

    print(len(my_list_1)) # output 0

    ```


    []

