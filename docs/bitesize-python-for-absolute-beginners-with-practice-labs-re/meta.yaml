    # 第一部分


    ## Python基础


    第一部分：Python基础介绍了Python的核心概念，这是一种以其简洁性和可读性而闻名的通用且广泛使用的编程语言。您将了解Python的优势，包括它为何成为许多开发者的首选语言。本节将解释基于脚本和交互式Python环境的区别，强调使用本地和基于云的Jupyter
    notebooks进行编码的好处。将涵盖关键的基础元素，如`print()`和`input()`函数，以及变量、操作和使用内置方法进行字符串操作。


    学完本节后，您将能够：


    -   理解Python作为编程语言的核心原则和优势。

    -   区分基于脚本和交互式的Python环境，并有效使用Jupyter Notebooks。

