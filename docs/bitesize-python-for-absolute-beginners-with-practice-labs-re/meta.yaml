    \ | O(1) | O(1) |\n| Concatenate | O(n) | O(n) | Not applicable | O(n) |\n| Copy\
    \ | O(n) (shallow) | O(n) (shallow) | O(n) (shallow) | O(n) (shallow) |\n| Equality\
    \ | O(n) | O(n) | O(n) | O(n) |\n\n# IV\n\nData Collections\n\nSECTION IV: DATA\
    \ COLLECTIONS introduces Python's `collections` module, which offers advanced\
    \ data structures that extend beyond basic types, making data manipulation easier\
    \ and more efficient. In this section, we'll explore three essential tools from\
    \ the `collections` module: `namedtuple`, which gives tuples meaningful names;\
    \ `defaultdict`, which simplifies handling missing keys; and `Counter`, which\
    \ makes counting tasks effortless. These structures enhance code readability and\
    \ functionality, helping you solve problems more effectively.\n\nBy the end of\
    \ this chapter, you will be able to:\n\n- Understand the purpose and benefits\
    \ of the `collections` module in Python.\n- Create and use named tuples to add\
    \ clarity and structure to your data.\n- Implement default dictionaries to handle\
    \ missing keys without errors.\n- Use counters to efficiently count and analyze\
    \ data elements.\n- Apply these data structures in practical scenarios to simplify\
    \ and optimize your code.\n\n# Named Tuple\n\nWE have learned **tuple** in previous\
    \ section and we know **tuple** is useful for grouping related data, but its elements\
    \ are accessed only by position, which can make the code less readable and harder\
    \ to maintain. In this chapter, we are going to learn the extended data structure,\
    \ **namedtuple**, which addresses this limitation by allowing you to assign meaningful\
    \ names to each element while retaining the immutability and lightweight nature\
    \ of regular tuples. This makes **namedtuple** especially helpful for improving\
    \ code clarity and reducing the risk of errors in larger projects where readability\
    \ is critical. Are you ready? Let's get started!\n\n## 16.1 WHAT IS A NAMED TUPLE\n\
    \n### 16.1.1 Explanation\n\nNamed Tuples are an extension of Python's built-in\
    \ **tuple** data type. They allow for creating tuple-like objects where fields\
    \ can be accessed using names, instead of only by index. This can make code more\
    \ readable and easier to maintain, especially when dealing with collections of\
    \ data that have multiple attributes.\n\nNamed Tuples are part of the **collections**\
    \ module in Python, and they're typically used to represent simple data structures\
    \ without the overhead of a full class. They're a great tool when you want the\
    \ simplicity of tuples but with named fields to provide clarity.\n\n### 16.1.2\
    \ Demonstration\n\nLet's create a tuple to represent the position of a data point\
    \ in a 2D space with x and y coordinates.\n\n```python\n# Regular tuple example\n\
    position1_tuple = (10, 20)\nposition2_tuple = (-5, 30)\n\n# Accessing data using\
    \ index\nprint(f'Position 1: x={position1_tuple[0]}, y={position1_tuple[1]}')\n\
