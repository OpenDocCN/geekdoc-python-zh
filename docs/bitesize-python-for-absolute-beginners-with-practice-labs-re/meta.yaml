- md: "## 9.5 TWO PARAMETERS\n\nFunctions with two parameters are just as straightforward\
    \ as their single-parameter counterparts. Each parameter has its own role to play\
    \ within the function, allowing you to perform more complex operations or calculations.\n\
    \nA function with two parameters takes in not one, but two arguments when called.\n\
    \n### 9.5.1 Demonstration\n\n```python\ndef rectangle_area(length, width):\n \
    \   return length * width\nprint(rectangle_area(4.5, 6))  # Output: 27.0\n```\n\
    \n27.0\n\n```python\ndef sum(a, b):\n    return a + b\n\nprint(sum(5, 10))  #\
    \ Output: 15\n```\n\n15\n\n```python\ndef average(a, b):\n    return (a + b) /\
    \ 2\n\nprint(average(20, 30))  # Output: 25.0\n```\n\n25.0\n\n### 9.5.2 Practice\n\
    \nTask: Define a function `print_message_n(message, n)` that prints message n\
    \ times, where message and n are parameters.\n\n```python\ndef print_message_n(message,\
    \ n):\n    for i in range(n):\n        print(message)\n\nprint_message_n('Hello,\
    \ world!', 3)\n```\n\nHello, world!\nHello, world!\nHello, world!\n\nTask: Define\
    \ a function `print_n_to_m(n, m)` that prints integers n to m (hint: you can use\
    \ a for loop), where n and m are parameters and n < m.\n\nChallenge: Can you write\
    \ a program `print_n_to_m_challenge(n, m)` that doesn't require n < m?\n\n```python\n\
    def print_n_to_m(n, m):\n    for i in range(n, m+1):\n        print(i)\n\nprint_n_to_m(2,\
    \ 5)\n```\n\n2\n3\n4\n5\n\n```python\ndef print_n_to_m_challenge(n, m):\n    if\
    \ n <= m:\n        for i in range(n, m+1):\n            print(i)\n    else:\n\
    \        for i in range(n, m-1, -1):\n            print(i)\n\nprint_n_to_m_challenge(2,\
    \ 5)\nprint_n_to_m_challenge(5, 2)\n```\n\n2\n3\n4\n5\n5\n4\n3\n2\n\nTask: Define\
    \ a function `sum_n_to_m(n, m)` that prints the total of integers n to m, where\
    \ n and m are parameters, and n < m.\n\n```python\ndef sum_n_to_m(n, m):\n   \
    \ sum = 0\n    for i in range(n, m+1):\n        sum += i\n    print(sum)\n\nsum_n_to_m(2,\
    \ 5)\n```\n\n14\n\nTask: Define a function `and_operation(condition1, condition2)`\
    \ that prints the and logical operation of condition1 and condition2, where condition1,\
    \ condition2 are parameters.\n\n```python\ndef and_operation(condition1, condition2):\n\
    \    print(condition1 and condition2)\n\nand_operation(True, True)\nand_operation(True,\
    \ False)\n```\n\nTrue\nFalse\n\nTask: Define a function `n_divisible_m(n, m)`\
    \ that prints if integer n is divisible by integer m, where n and m are parameters.\n\
    \n```python\ndef n_divisible_m(n, m):\n    if n % m == 0:\n        print(n, 'is\
    \ divisible by', m)\n    else:\n        print(n, 'is not divisible by', m)\n\n\
    n_divisible_m(3, 2)\n\nn_divisible_m(4, 2)\n```\n\n3 is not divisible by 2\n4\
    \ is divisible by 2\n\nTask: Define a function `min(x, y, z)` that prints the\
    \ minimal number among integers x, y, and z, where x, y, and z are parameters.\n\
    \n```python\ndef min(x, y, z):\n    min = x\n    if y < min:\n        min = y\n\
    \    if z < min:\n        min = z\n    print(min)\n\nmin(1, 2, 3)\nmin(6, 5, 4)\n\
    ```\n\n1\n4\n\nTask: Define a function `speed(distance, time)` that takes the\
    \ distance and time as inputs and prints the speed as distance/time.\n\n```python\n\
    def average_speed(distance, time):\n    print(distance / time)\n\nprint(average_speed(10,\
    \ 3))\n```\n\n## 9.6 HOW TO PASS ARGUMENTS\n\nIn Python, when defining a function\
    \ with multiple parameters, there are two ways to pass these parameters: by position\
    \ and by keyword. Let's explore the advantages and disadvantages of each method.\n\
    \n### 9.6.1 Demonstration\n\n```python\ndef greet(name, age):\n    print(f'Hello,\
    \ {name}! You are {age} years old.')\n\ngreet('Neo', 18)  # Output: Hello, Neo!\
    \ You are 18 years old.\n```\n\nHello, Neo! You are 18 years old.\n\n```python\n\
    greet(18, 'Neo') # It will print a meaningless message.\n```\n\nHello, 18! You\
    \ are Neo years old.\n\nIn above-mentioned example, we passed arguments by position,\
    \ so that 'Neo' was assigned to name and 18 was assigned to age. It is easy to\
    \ use. You don't need to remember the parameter names and you only need to provide\
    \ values in the correct order. However, if you accidentally swap the argument\
    \ positions, it will result in incorrect behavior. If there are many parameters,\
    \ this approach can become confusing, especially when calling the function. Let's\
    \ try passing by keywords then.\n\n```python\ngreet(age=18, name='Neo')  # Output:\
    \ Hello, Neo! You are 18 years old\n```\n\nHello, Neo! You are 18 years old.\n\
    \n```python\ngreet(name='Neo', age=18)  # Output: Hello, Neo! You are 18 years\
    \ old\n```\n\nHello, Neo! You are 18 years old.\n\nIn above-mentioned two examples,\
    \ we passed arguments by keywords, so that 'Neo' was explicitly assigned to `name`,\
    \ and 18 was explicitly assigned to `age`. There is no confusion anymore. Keyword\
    \ arguments make the code more readable by clearly indicating which parameter\
    \ is being set. You can pass keyword arguments in any order because they are explicitly\
    \ named. However, you need to use the exact name of the parameter when passing\
    \ a value. This approach requires more effort to understand the code, especially\
    \ for complex functions with many parameters.\n\nIn conclusion, if you're working\
    \ with a small number of well-known function arguments and don't mind using position-based\
    \ arguments, go with positional arguments. For larger or more complex function\
    \ signatures with multiple optional arguments, use keyword arguments. This approach\
    \ can help reduce errors and improve readability. This is the more common scenario\
    \ when we use Python for data science.\n\n### 9.6.2 Practice\n\nTask: Call functions\
    \ you defined in previous practice, passing arguments by keywords, and experience\
    \ the difference.\n\n## 9.7 DEFAULT VALUE\n\nIn Python, you can assign a default\
    \ value to a function parameter when defining it. This allows for more flexibility\
    \ and convenience when calling the function.\n\n### 9.7.1 Demonstration\n\n```python\n\
    def greet(name, msg='Hi'):\n    print(f'{msg}, {name}!')\n\ngreet('Neo')  # Output:\
    \ Hi, Neo!\n```\n\nHi, Neo!\n\nIn the `greet()` function definition, we provided\
    \ the default values for `msg` parameter as 'Hi'. This means that if we don't\
    \ pass any value for `msg` when calling the function, it will take on the default\
    \ values. Please note that the parameters with default values must be after the\
    \ parameters without default values; in this example, `msg` must be after `name`\
    \ since `name` has no default value.\n\nBy assigning default values to some parameters,\
    \ you make them optional, which is especially useful for functions with a large\
    \ number of arguments. When calling a function, you can skip passing values for\
    \ optional parameters if the defaults work. The use of default values can clarify\
    \ what these arguments are supposed to do or how they might be used. However,\
    \ it's important to ensure that you're not creating overlapping functionality\
    \ by having multiple possible input scenarios. Also, make sure to document the\
    \ purpose and expected behavior of optional parameters well, so others (or yourself)\
    \ understand what they do in different contexts.\n\n```python\ngreet('Neo', 'Hello')\
    \  # Hello, Neo!\n```\n\nHello, Neo!\n\n```python\ndef print_numbers(end, start=0,\
    \ step=1):\n    while start < end:\n        print(start)\n        start += step\n\
    ```\n\n```python\nprint_numbers(5)\n```\n\n0\n1\n2\n3\n4\n\n```python\nprint_numbers(start\
    \ = 2, end = 5)\n```\n\n2\n3\n4\n\n```python\nprint_numbers(start = 2, end = 5,\
    \ step = 2)\n```\n\n2\n4\n\nNow we can understand the `print()` and `range()`\
    \ better, since they have defined default parameters that provide optional customizations\
    \ when needed.\n\n### 9.7.2 Practice\n\nTask: Define a function called `sum_of_squares`\
    \ that takes two numbers, a and b, as inputs and prints the sum of their squares.\
    \ If no value is provided for either argument, then a should default to 1, and\
    \ b should default to 2.\n\n```python\n# Define a function to calculate the sum\
    \ of squares of two numbers\ndef sum_of_squares(a=1, b=2):\n    # Print the sum\
    \ of squares of a and b\n    print(a ** 2 + b ** 2)\n\n# Call the function with\
    \ default arguments (a=1, b=2)\nsum_of_squares()            # output: 5\n```"
