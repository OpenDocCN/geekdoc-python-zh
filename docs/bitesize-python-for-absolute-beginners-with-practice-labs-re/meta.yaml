    \ 'fax': '098-765-4321'}\n```\n\n```python\n# Removing a key\ndel my_dict['fax']\n\
    my_dict\n```\n\n```\n{'name': 'Neo',\n 'age': 30,\n 'city': 'New York',\n 'ID':\
