    This is equivalent to:


    ```

    x = 5

    y = 6

    ```


    Here''s how it works: The expressions on the right-hand side (5 and 6) are evaluated
    first. The values are then assigned to the variables on the left-hand side (x
    and y) in the order they are listed.


