    \n## 10.1 NESTED FUNCTIONS\n\n### 10.1.1 Explanation\n\nNested function calls\
    \ occur when the output of one function is immediately used as the input to another\
    \ function. This allows for streamlined and compact code, especially when performing\
    \ a sequence of operations. Nested function calls reduce the need for intermediate\
    \ variables by directly passing outputs to other functions. It also helps in writing\
    \ more concise and readable code, especially for operations that are logically\
    \ sequential. At last, it simplifies operations by chaining them together in a\
    \ single line, making the code easier to follow.\n\n### 10.1.2 Demonstration\n\
    \n```python\nprint(input('Enter your name: '))\n```\n\nEnter your name: Neo\n\
    Neo\n\nHere, the `input` function prompts the user for their name and returns\
    \ it. The returned name is immediately passed to the `print` function, which displays\
    \ it on the screen. This is a simple example of how nested function calls can\
    \ reduce the need for extra variables.\n\n```python\nresult = abs(round(-4.567))\n\
    print(result)  # Output: 5\n```\n\n5\n\nHere, the **round** function rounds the\
    \ number -4.567 to -5. The **abs** function then takes the output of **round**\
    \ and returns its absolute value. The nested call simplifies the process into\
    \ a single line, making the code cleaner.\n\n```python\nmsg = '   hello, World!\
    \   '\ncleaned_msg = msg.strip().capitalize().replace('world', 'there')\nprint(cleaned_msg)\
    \  # Output: 'Hello, there!'\n```\n\nHello, there!\n\nHere, the **strip()** function\
    \ removes leading and trailing whitespace, **capitalize** then capitalizes the\
    \ first letter of the cleaned string, and **replace** substitutes “world” with\
    \ “there”. Each method operates on the output of the previous one, demonstrating\
    \ how nested function calls can simplify string manipulation.\n\n```python\nprint(len(str(12345)))\
    \  # Output: 5\n```\n\n5\n\nHere, **str** converts the number 12345 to a string,\
    \ **len** then calculates the length of the string. This is a basic yet powerful\
    \ example of how built-in functions can be nested to perform multiple operations\
    \ in one go.\n\n### 10.1.3 Practice\n\nTask: Calculator.\n\n1. Define a function\
    \ **get_number()** that asks the user to input a number.\n2. Define a function\
    \ **sum(x, y)** that computes the sum of two numbers x and y.\n3. Define a function\
    \ **subtraction(x, y)** that computes the subtraction of two numbers x and y.\n\
    4. Define a function **product(x, y)** that computes the product of two numbers\
    \ x and y.\n5. Define a function **divide(x, y)** that computes the division of\
    \ two numbers x and y.\n6. Define a function **arithmetic()** that prints the\
    \ arithmetic operation result of two numbers by calling functions defined above.\n\
    \n```python\ndef get_number():\n    n = float(input('Please enter a number: '))\n\
    \    return n\n\ndef sum(x, y):\n    return x + y\n\ndef subtract(x, y):\n   \
    \ return x - y\n\ndef product(x, y):\n    return x * y\n\ndef divide(x, y):\n\
    \    return x / y\n\ndef arithmetic():\n    x = get_number()\n    y = get_number()\n\
    \    print(f'x + y = {sum(x, y)}')\n    print(f'x - y = {subtract(x, y)}')\n \
    \   print(f'x * y = {product(x, y)}')\n    print(f'x / y = {divide(x, y)}')\n\n\
    arithmetic()\n```\n\nPlease enter a number: 2\nPlease enter a number: 3\n2.0 +\
    \ 3.0 = 5.0\n2.0 - 3.0 = -1.0\n2.0 * 3.0 = 6.0\n2.0 / 3.0 = 0.6666666666666666\n\
    \nTask: Statistics.\n\n1. Define a function `get_number()` that asks the user\
    \ to input a number.\n2. Define a function `min(x, y, z)` that computes the min\
    \ of three numbers x, y, and z.\n3. Define a function `max(x, y, z)` that computes\
    \ the max of three numbers x, y, and z.\n4. Define a function `total(x, y, z)`\
    \ that computes the total of three numbers x, y, and z.\n5. Define a function\
    \ `avg(x, y, z)` that computes the average of three numbers x, y, and z.\n6. Define\
    \ a function `stats(x, y, z)` that prints the statistics of the three numbers\
    \ by calling functions defined above.\n\n```python\ndef get_number():\n    n =\
    \ float(input('Please enter a number: '))\n    return n\n\ndef min(x, y, z):\n\
    \    min_val = x\n    if y < min_val:\n        min_val = y\n    if z < min_val:\n\
    \        min_val = z\n    return min_val\n\ndef max(x, y, z):\n    max_val = x\n\
    \    if y > max_val:\n        max_val = y\n    if z > max_val:\n        max_val\
    \ = z\n    return max_val\n\ndef total(x, y, z):\n    return x + y + z\n\ndef\
    \ avg(x, y, z):\n    return total(x, y, z) / 3\n\ndef stats(x, y, z):\n    print(f'The\
    \ min is {min(x, y, z):.2f}.')\n    print(f'The max is {max(x, y, z):.2f}.')\n\
    \    print(f'The mean is {avg(x, y, z):.2f}.')\n    print(f'The total is {total(x,\
    \ y, z):.2f}.')\n\nx = get_number()\ny = get_number()\nz = get_number()\nstats(x,\
    \ y, z)\n```\n\nPlease enter a number: 2\nPlease enter a number: 3\nPlease enter\
    \ a number: 4\nThe min is 2.00.\nThe max is 4.00.\nThe mean is 3.00.\nThe total\
    \ is 9.00.\n\n3. Print the statistics of the numbers entered.\n4. Return the min,\
    \ max, mean, and total.\n\nA test run is as follows:\n\n```\nHow many numbers\
    \ you are going to enter? 3\nPlease enter the numbers you have 3 left: 2\nPlease\
    \ enter the numbers you have 2 left: 3\nPlease enter the numbers you have 1 left:\
    \ 4\nYour entered three numbers 2.0 3.0 4.0\nThe min is 2.0.\nThe max is 4.0.\n\
    The mean is 3.0.\nThe total is 9.0.\n```\n\n```python\ndef stats():\n    n = int(input('How\
    \ many numbers you are going to enter? '))\n    numbers = ''\n    total = 0\n\
    \    for i in range(n):\n        number = float(input(f'Please enter the numbers,\
    \ you have {n-i} left: '))\n        if i == 0:\n            min_val, max_val =\
    \ number, number\n        if number < min_val:\n            min_val = number\n\
    \        if number > max_val:\n            max_val = number\n        numbers +=\
    \ f'{number} '\n        total += number\n    print(f'''Your entered {n} numbers:\
    \ {numbers}\nThe min is {min_val:.2f}.\nThe max is {max_val:.2f}.\nThe mean is\
    \ {total/n:.2f}.\nThe total is {total:.2f}.\n''')\n    return min_val, max_val,\
    \ total/n, total\n\nprint(stats())\n```\n\n```\nHow many numbers you are going\
    \ to enter? 5\nPlease enter the numbers you have 5 left: 1.1\nPlease enter the\
    \ numbers you have 4 left: 2.2\nPlease enter the numbers you have 3 left: 3.3\n\
    Please enter the numbers you have 2 left: -9\nPlease enter the numbers you have\
    \ 1 left: 4.4\nYour entered 5 numbers: 1.1 2.2 3.3 -9.0 4.4\nThe min is -9.00.\n\
    The max is 4.40.\nThe mean is 0.40.\nThe total is 2.00.\n(-9.0, 4.4, 0.4, 2.0)\n\
