    \ keys, values, or key-value pairs in a dictionary in Python.\nYou can access\
    \ keys in a dictionary using the keys() method or directly iterate over the dictionary.\
    \ The keys() method returns a view object containing the keys of the dictionary.\n\
    \n```python\n# Creating a dictionary\nmy_dict = {'name': 'John', 'age': 30, 'city':\
    \ 'New York'}\n\n# Accessing keys using keys() method\nkeys = my_dict.keys()\n\
    print('Keys:', keys)\n\n# Accessing keys by iterating over the dictionary\nfor\
    \ key in my_dict:\n    print('Key:', key)\n```\n\nKeys: dict_keys(['name', 'age',\
    \ 'city'])\nKey: name\nKey: age\nKey: city\n\nYou can access values in a dictionary\
    \ using the values() method or by directly accessing values using keys. The values()\
    \ method returns a view object containing the values of the dictionary.\n\n```python\n\
    # Accessing values using values() method\nvalues = my_dict.values()\nprint('Values:',\
    \ values)\n\n# Accessing values using keys\nfor key in my_dict:\n    print(f'Value\
    \ for key {key}: {my_dict[key]}')\n```\n\nValues: dict_values(['John', 30, 'New\
    \ York'])\nValue for key name: John\nValue for key age: 30\nValue for key city:\
    \ New York\n\nYou can access items (key-value pairs) in a dictionary using the\
    \ items() method or by directly iterating over the dictionary. The items() method\
    \ returns a view object containing the key-value pairs of the dictionary as tuples.\n\
    \n```python\n# Accessing items using items() method\nitems = my_dict.items()\n\
    print('Items:', items)\n\n# Accessing items by iterating over the dictionary\n\
    for key, value in my_dict.items():\n    print(f'({key}: {value})')\n```\n\nItems:\
