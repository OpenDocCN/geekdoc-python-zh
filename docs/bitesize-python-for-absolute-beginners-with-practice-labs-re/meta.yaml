    ```python\ndef fib(n):\n    if n == 0 or n == 1:\n        return n\n    else:\n\
    \        return fib(n - 1) + fib(n - 2)\n\nfib(4)\n```\n\n3\n\n任务：定义一个递归函数 `digits(n)`\
    \ 来计算正整数 n 的位数。\n\n```python\ndef digits(n):\n    if n < 10:\n        return 1\n\
    \    else:\n        return 1 + digits(n//10)\n\ndigits(2022)\n```\n\n4\n\n任务：编写一个递归函数\
    \ is_palindrome(s)，检查给定的字符串 s 是否是回文（正向和反向读取相同）。\n\n例如：\n\n- '', 'a', 'ada', 'adda'\
    \ 是回文；\n- 'ab', 'abs' 不是回文。\n\n我们可以假设输入字符串只包含 A 到 Z 和 a 到 z，没有其他特殊字符，它可能是空的，并且空字符串是回文。\n\
    \n```python\ndef palindrome(s):\n    # 基本情况：如果字符串为空或只有一个字符\n    # 它就是回文\n    if\
    \ len(s) <= 1:\n        return True\n    # 递归情况：检查第一个和最后一个字符是否相同\n    # 并在子字符串上递归\n\
    \    else:\n        if s[0] == s[-1]:\n            return palindrome(s[1:-1])\n\
    \        else:\n            return False\n\nprint(palindrome('ada'))\nprint(palindrome('adba'))\n\
    print(palindrome('adccda'))\n```\n\nTrue\nFalse\nTrue\n\n任务：编写一个递归函数 count_ways(n)，返回爬上有\
    \ n 阶台阶的楼梯的方法数，每次可以爬 1 阶或 2 阶。\n\n```python\ndef count_ways(n):\n    # 基本情况：0\
