  mdcn: '## 工作区开发


    进一步创建的软件具有更多功能，例如 Firefox 和 Chrome 的特性，能帮助你获取额外能力。要实现 Firefox 和 Chrome 的特性，你需要熟悉
    JavaScript、XML 和 JSON——这些标记语言在功能上与 HTML 类似，但具有更严格的规范要求。


    许多开源网络程序还提供了开发框架，例如 WordPress 和 Drupal。这两者都使用 PHP 编写，使得这门语言成为开发的必备技能。


    学习网络开发起初可能是一个艰难的过渡，但能帮助你掌握从一个领域应用到另一个领域（如工作区软件开发）的基本能力。工作区开发编程将涉及操作系统（OS）、提供的软件开发工具包（SDK）的使用，以及跨平台开发的规划。运用已有的网络开发技能，还可以通过网络分发你的工作区软件，从而连接到更广泛的用户群体。


    ## 手机应用开发


    移动应用程序，特别是那些在手机和平板电脑上常见的应用，正变得越来越受欢迎。让你的应用出现在 iTunes App Store、Google Play Store（以前称为
    Android Market Place）、Windows Marketplace、BlackBerry World 等平台上，是许多开发者的目标。


    然而，对于大多数年轻的程序员来说，深入移动开发可能是一个不稳定的尝试，因为这需要对 Java 和 Objective C 等现代编程语言有极高的熟练度和知识储备，才能制作出超越基础“Hello
    World”应用的程序。


    ## 漫漫长路


    优秀的程序员是技术娴熟的问题解决者，他们专注于自己的工作，并通过实验克服困难，从微小的胜利中获得动力。


    ## Python 编程基础书


    如果你希望掌握编程，并想通过学习基础知识和培养全面理解来成为专家，那么你需要这本 Python 编程语言书籍。这本书非常适合那些希望自学、无需参加课程就能了解如何编写计算机程序的人。


    这本书内容灵活，使读者更容易理解各个部分。初学者可以毫无准备地开始学习，并在本书的帮助下逐渐成为高手。想要精通编程语言的人应该获取 Python 编程书籍。即使是新手也能通过这本书很好地掌握编程基础，因为它全面涵盖了语言的各个方面。所有对初学者重要的领域都已详细解释。熟悉编程的人也能从这本书中受益，因为他们可以提升技能并重新思考思路。新手需要阅读所有内容，但如果你是经验丰富的程序员，也可以跳过你已经非常了解的部分。


    除了“如何做”的方法外，本书还包含技巧和宝贵的编码策略，对开发者非常有用。有了这本书作为参考，你无需阅读多本书就能深入理解各种概念。这本书本身就很全面。书中不仅有文字，还包含图表、插图和图像参考，以帮助读者形成对概念的独特理解。本书为读者提供了重要的指导。理论和实践的编程观点不仅是涵盖的主题，本书还包含了对这些观点的补充和调整。它还包括探索的思路，并在每个模块结束时附有笔记。


    阅读这本书非常有趣，因为它包含了所有可能需要的参考资料。虽然市面上有许多编程书籍，但有一件事不会改变，那就是阅读 Python 编程书籍的实例。这本书确实是那些在编程时需要参考的程序员的必备之选。它不仅适合儿童，也适合最有经验的程序员作为观点材料的来源。无论你需要什么，都不难找到，它将成为你非常得力的助手。在网上搜索这本书并立即获取，让它在编程方面为你提供一些帮助。


    本文由 Tara Malik（“网站增强女王”）为 itbooksworld.com 撰写。IT Books World 致力于为各类 IT 书籍提供简洁、快速和直接的书评。


    ## 自制 Python 电脑游戏


    如今，很少有书籍既能教授编程，又能提供乐趣，尤其是对孩子们来说。Al 的书两者兼备。


    基本上，这本书是关于用 Python 制作视频游戏的，但它也为那些认为编写计算机程序只适合“电脑极客”的人提供了一个“放松”的平台。正如 Al 所说：“编写计算机程序并不难。但是，很难找到能帮助你用编程做有趣事情的学习材料。其他电脑书籍涵盖了大多数初学者程序员不需要的许多主题。这本书将教你如何编写自己的电脑游戏。你将学到宝贵的技能，并有一些真正的游戏实例可以展示！”


    它允许读者使用 Python 创建一个合理的游戏，然后通过使用 Pygame 添加动作和声音来提升技能，这是制作游戏的重要组成部分。这本书适合谁？


    编写计算机程序并不难。但是，很难找到能激励你用编程做有趣事情的学习材料。其他电脑书籍涵盖了大多数初学者程序员不需要的许多主题。这本书将教你如何编写自己的电脑游戏。你将掌握一项宝贵的技能，并有一些很棒的游戏可以展示！这本书适合：


    -   完全想自学计算机编程的初学者，即使他们没有任何编程经验。

    -   想通过制作游戏来学习计算机编程的儿童和青少年。九岁或十岁的孩子应该能够跟上。

    -   希望向他人教授编程的成年人和教师。

    -   任何年龄的人，无论老少，都希望通过学习专业编程语言来了解如何编程。


    本书共有 20 个章节。


    这本书的一个非常出色的部分是，与通常先介绍基础知识再讲应用的编程书不同，Al 的书将游戏的源代码放在前面和中心位置，并从示例中解释编程基础。


    这本书不是为了制作具有现代设计的游戏，而是为了制作足以吸引网络游戏玩家或作为手机游戏的游戏，正如 Al 所说：“我们在这本书中将一起制作的前几个游戏，与你在
    Xbox、Playstation 或 Wii 上玩过的游戏相比，可能看起来很简单。它们没有华丽的图形或音乐，但这是因为它们旨在教你基础知识。它们故意设计得简单，这样我们就可以专注于学习如何编程。游戏不需要复杂才能有趣。井字棋、井字游戏和制作密码都很简单，但也很有趣。它解释了
    Python 的每个部分，从安装到使用 Pygame 制作声音和动作。总的来说，这是一本优秀、可靠且实用的编程指南。推荐给所有年龄和编程水平的人。”'
