    (respectively for *ModuleNotFoundError* and *ImportError*) obtained from real-world
    notebooks. Due to the fast-evolving nature of software systems such as Python
    libraries, certain APIs might be deprecated and subsequently removed. If the wrong
    library versions are used, client applications, if not changed, will likely be
    subject to compatibility issues and hence result in runtime errors. Therefore,
    we argue that when specifying the environmental dependencies for Jupyter notebooks,
    it is essential to also *clearly specify the required versions of required libraries*.


    > **RQ3:** Does the provided environment information help notebook users to execute
    and reproduce the notebooks?


    For 72.6% of notebooks, the provided dependencies are not sufficient for re-executing
    them without errors.


    # IV. SnifferDog


    In this section, we present our approach to automatically inferring environmental
    dependencies for Python Jupyter notebooks, implemented in our *SnifferDog* prototype.
    Figure 5 summarizes the working process of *SnifferDog*, including mainly three
    modules: (1) Library API Mapping, (2) Library Identification and API Standardization,
    and (3) API Usage Analysis. We now detail these three modules, respectively.


    ![](img/69adc9bec69591e7c440d8f3ba58afcd_4_0.png)


    # A. Problem Statement


    Before providing the details of our approach, we formally define the problem that
    we plan to address in this work. At first, we need to pre-build an API bank $\mathcal{L}
    = \{L_1^v, L_2^v, L_3^v, \dots\}$ that records a large number of popular Python
    libraries'' API sets, in which $L_j^v$ stands for the set of APIs defined in library
    $L_j$ at version $v$. Then, given a Python Jupyter notebook $N$ as an input, we
    need to precisely parse its accessed API set $P = \{A_1, A_2, A_3, \dots\}$, where
    $A_i$ is an API used in $P$. After that, based on the pre-built API bank $\mathcal{L}$,
    the goal of this approach is hence to identify a set of libraries $L$ that fulfill
    the following constraints: (1) $L \subset \mathcal{L}$, and (2) $\forall A_i \in
    P, \exists L_j^v \in L$ that $A_i \in L_j^v$.


    # B. Library API Mapping


    The first module, *library API mapping*, is not directly related to the working
    process of analyzing concrete Jupyter notebooks but plays an independent step
    in building the core infrastructure of our approach. The output of this module
    will be an API bank that provides an extensible (and on-growing) database recording
    mappings from popular Python libraries to their APIs.


    Given a Python library planned to be included in the API bank, this module first
    builds a directory tree following the file and directory composition of the library,
    aiming at providing a clear way to referring library APIs (e.g. from top-level
    package to the leaf module). In this directory tree, Python packages (or sub-packages)
    are represented by non-leaf nodes and Python source code files are represented
    by leaf nodes. Figure 1 presents such an example, representing a partial code
    structure tree of the popular Python library *pandas*. This module then builds
    Abstract Syntax Tree (AST) trees for each leaf node (or Python file) and traverses
    the trees to locate public functions, including their positional and keyword parameters.
    The output of this step can already build a mapping from the library (in a certain
    version) to its defined APIs.


    Unfortunately, this approach may overlook certain API usages. Applying it to *pandas*
    (Figure 1), the API *read_excel()* (defined in the *base.py* module) can be referenced
    via its full qualified name *pandas.io.excel._base.read_excel()*, or *_base.read_excel()*
    (or *read_excel()*) if module *pandas.io.excel._base* (or the API itself *pandas.io.excel._base.read_excel*)
    is imported, as respectively shown in the second and third code cells in Figure
    2. However, as demonstrated in the first, fourth, and fifth code cells Figure
    2, API *read_excel()* could be invoked via another forms such as *pandas.read_excel()*,
    i.e., it can be directly imported from the *pandas* module despite it being defined
    in the *pandas.io.excel._base* module.


    This ambiguity is part of the complicated Python import mechanism, which has been
    implemented in a transitive manner. Let $X \xrightarrow{f} Y$ be importing API
    $f$ from module $X$ to module $Y$ via statement "from $X$ import $f$" in the source
    of $Y$. Transitivity enables $X \xrightarrow{f} Y$, if $Y \xrightarrow{f} Z$ and
    $X \xrightarrow{f} Z$. This feature, offered by Python runtime, has been frequently
    leveraged by many Python libraries to provide simplified means for users to access
    their APIs since it can transparently shorten the full qualified API names.


    To resolve this feature, while parsing Python source code, we further conduct
    an *import-flow* analysis to find all the possible alternatives (or aliases) of
    directly defined APIs. Take the API *read_excel* again as an example, regarding
    the simplified source code shown in Figure 6(a), the *import-flow* analysis would
    lead to the following two flows.


    ```

    pandas.io.excel._base \xrightarrow{read\_excel} pandas.io.api

    pandas.io.api \xrightarrow{read\_excel} pandas

    ```'
