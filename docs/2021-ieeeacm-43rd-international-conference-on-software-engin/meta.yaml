  - '[PAGE 10]


    provides notebook users with essential information that makes notebooks usable
    again. Given the popularity of notebooks, *SnifferDog* thus shows how Software
    Engineering can make an important contribution towards reproducible and extensible
    science.


    There is still lots to do, though. Our future work will focus on the following
    topics:


    **Larger API Bank.** Our API bank is only built based on 488 libraries. While
    these make up the most popular libraries, having a larger API Bank will further
    extend the capability of our approach.


    **Python and C code.** A small number of “Cython” libraries combine both C and
    Python syntax to achieve C-like performances, letting a small set of library APIs
    be overlooked.


    **Advanced features.** As already stated in Section V, some advanced Jupyter notebook
    and Python features are not yet supported by *SnifferDog*, notably magic functions
    and indirect dependencies.


    **Beyond Python.** The *SnifferDog* principles are not limited to Python. We plan
    to extend *SnifferDog* to other popular Jupyter notebook languages such as R and
    Julia.


    **Beyond notebooks.** The *SnifferDog* principles also extend beyond notebooks.
    *SnifferDog* could be equally applied to C source code to determine which library
    versions would be required for construction and execution. A version of *SnifferDog*
    for LaTeX that automatically determines required packages and versions may be
    especially welcome in scientific communities.


    *SnifferDog* is available as open source (with explicit dependencies, of course).
    A complete *replication package* including all experimental data is available
    at


    https://github.com/SMAT-Lab/SnifferDog.git


