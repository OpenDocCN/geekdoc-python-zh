    ### B. 库API映射


    第一个模块*库API映射*与分析具体Jupyter笔记本电脑的工作流程没有直接关系，但在构建我们方法的核心基础设施中扮演着独立的步骤。该模块的输出将是一个API库，提供一个可扩展（且不断增长）的数据库，记录从流行Python库到其API的映射。


