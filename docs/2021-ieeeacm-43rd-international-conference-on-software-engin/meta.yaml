- md: '# Restoring Execution Environments of Jupyter Notebooks


    Jiawei Wang

    Faculty of Information Technology

    Monash University

    Melbourne, Australia

    jiawei.wang1@monash.edu


    Li Li$^{\alpha}$

    Faculty of Information Technology

    Monash University

    Melbourne, Australia

    li.li@monash.edu


    Andreas Zeller

    CISPA Helmholtz Center for Information Security

    Saarbrücken, Germany

    zeller@cispa.saarland


    **Abstract**—More than ninety percent of published Jupyter notebooks do not state
    dependencies on external packages. This makes them non-executable and thus hinders
    reproducibility of scientific results. We present *SnifferDog*, an approach that
    1) collects the APIs of Python packages and versions, creating a database of APIs;
    2) analyzes notebooks to determine candidates for required packages and versions;
    and 3) checks which packages are required to make the notebook executable (and
    ideally, reproduce its stored results). In its evaluation, we show that *SnifferDog*
    precisely restores execution environments for the largest majority of notebooks,
    making them immediately executable for end users.


    **Index Terms**—Jupyter Notebook, Environment, Python, API


    ## I. INTRODUCTION


    Jupyter notebooks—interactive documents that combine code, text, mathematics,
    plots, and rich media—have become a prime medium for scientists to document, replicate,
    and illustrate their findings. In contrast to a regular scientific paper, a notebook
    allows its writers to directly interact with data and code, updating tables and
    diagrams on the spot. This also extends to users, who can re-execute the notebook
    code, say with their own data or changes to the algorithms, and see how this affects
    the final results. This makes Jupyter notebooks one of the most promising tools
    to allow for widespread replication and reuse of research results.


    What sounds good in theory need not be true in practice, though, and Jupyter notebooks
    are no exception. Recent studies [1] have shown that the vast majority of published
    Jupyter notebooks can only be read by users, but not re-executed. One reason is
    *incompleteness*, such as the raw data not being supplied; and there is not much
    users can do about this. However, there are also reasons for notebooks being non-executable
    that can be easily avoided. One reason is that notebook code cells can be executed
    interactively *in any order* (and data scientists happily do so); recent approaches
    [2] thus focus on restoring the actual order based on internal dependencies. Another
    important reason, however, is that Jupyter notebooks *depend on specific environments*
    in which they were created, such as specific libraries in specific versions.


    In principle, Python code in notebooks provides *import* statements, which state
    the (external) modules are to be used.


    However, Python users install *packages*, not modules; and the names of imported
    modules may be different from the name of the package that provides them. Different
    versions of packages may provide different APIs; hence one has to determine compatible
    versions. Also, packages may depend on other tools or packages to be installed.


    This is why Python (like other languages), in good Software Engineering tradition,
    has long introduced *explicit means to specify dependencies* between libraries
    and packages. Python package managers (e.g., pip and conda), for instance, expect
    Python packages to provide an explicit *list of dependencies*, stating which other
    packages need to be installed in which versions. Writers of Jupyter notebooks,
    however, are first and foremost data scientists and not software engineers [3];
    hence, they neither know about principles of reusable software, nor would this
    be in their focus. Indeed, as we show in this paper, *around 94% of notebooks
    do not formally state or document dependencies*; among those who do, nearly 30%
    are not reliable. In consequence, users who want to execute published and complete
    Jupyter notebooks will very likely face errors of missing packages or incompatible
    versions.


    In this paper, we introduce a novel approach to *automatically restore the experimental
    dependencies of Jupyter notebooks*. Our *SnifferDog* tool takes a Python Jupyter
    notebook and automatically detects which packages are required to reproduce notebook
    results. To this end, *SnifferDog* creates an *API bank*, a database which holds
    API information for each Python library (and each version). By analyzing the Python
    code embedded in the notebook, *SnifferDog* then determines library candidates
    that would be API compatible. *SnifferDog* then can automatically install the
    recommended dependencies and check if they allow the notebook to 1) be executed
    and 2) reproduce the original results stored in the notebook. When users thus
    apply *SnifferDog* on a notebook, they at least obtain a list of detected required
    libraries and their versions. If these are complete, the notebook can become executable;
    and in the ideal case, the notebook is shown to fully reproduce the original results.
    Striving for executability, reproduction, and considering library versions is
    also what sets *SnifferDog* apart from earlier, Python-specific approaches [4].


    *SnifferDog* is efficient and effective: It finishes the analysis of 5,000 notebooks
    in 18,141.29 seconds (3.63 seconds per notebook). In an experiment with 315 notebooks
    known to be executable, *SnifferDog* was able to automatically determine dependencies
    for over 90% of them.


    The remainder of this paper is organized as follows. After providing background
    about Python packages and Jupyter notebooks (Section II), we make the following
    contributions:


    - **A study on the prevalence of dependency issues in Jupyter notebooks** (Section
    III). In a preliminary study, we investigated causes that make Jupyter notebooks
    non-executable, with and without environmental dependencies.

    - **A novel approach to restore dependencies of Jupyter notebooks** (Section IV).
    We present the design of our approach and its implementation in the *SnifferDog*
    prototype.

    - **An evaluation of our approach** (Section V). We evaluate the effectiveness
    of *SnifferDog* on a variety of notebooks, showing that it precisely restores
    execution environments for the largest majority of notebooks.


    After discussing related work (Section VI), we close with conclusion and future
    work (Section VII).


    ## II. BACKGROUND


    We start with discussing background knowledge, including Python libraries and
    Jupyter notebooks.


    ### A. Python Libraries


    Python is well-known for its immense ecosystem, providing more than 200,000 third-party
    packages (also known as libraries) to developers. Such Python libraries need to
    be locally installed onto developers'' implementation environment before being
    accessed. The Python Packaging Authority team officially maintains a standard
    package management tool called *pip*, which allows users to install these libraries
    from different sources (PyPI) [5]. In addition to package management systems,
    Python developers can also install a library from its source code project.


    Figure 1 illustrates a typical code structure example of a Python library. A Python
    file named *setup.py* installs the library locally. However, this file will not
    install the library''s environmental dependencies and, hence, requires its users
    to fulfill them beforehand. A *top-level package* giving the library its name
    (i.e., pandas) is stored in the same level of *setup.py*. Such a *package* in
    Python is a directory that contains a specific file named *\_\_init\_\_.py* responsible
    for initializing the package. Python packages provide a way to structure Python''s
    module namespace, offering an easy means for library users to access its APIs.
    A *module* in Python is a specific term used in Python to specify Python''s source
    code (i.e., files containing Python definitions and statements). Each Python file
    represents a Python module; for instance, *setup.py* defines a Python module named
    setup. Directories under the top-level package are the library''s *sub-packages*.
    Similarly, the Python files under sub-packages are deemed as *sub-modules*. For
    example, as shown in Figure 1, the Python file *base.py* is defined as a sub-module
    named *base* in sub-package *pandas.io.excel*.


    ![](img/69adc9bec69591e7c440d8f3ba58afcd_1_0.png)


    In each Python module (or Python file), a set of methods can be declared and implemented.
    These methods can be accessed by other modules (or module users) and hence are
    referred to as *APIs*. For example, the *pandas.io.excel.base* module contains
    an API called *read\_excel()* with the *fully qualified name* being *pandas.io.excel.\_base.read\_excel()*).
    When Python libraries evolve, their declared API sets will likely be updated.
    In this work, we will leverage this information to implement *SnifferDog* so as
    to infer environmental dependencies for Python Jupyter notebooks.


    ### B. Jupyter notebooks


    Jupyter notebooks are sequences of *cells*, which either contain *text* (in Markdown
    format) or *executable code* (and its results). In *text cells*, authors describe
    (using Markdown and HTML for rich formatting) the objective of the notebook and
    the rationale behind the code presented in the following cells. In *code cells*,
    authors write actual programming code, most frequently Python code. Figure 2 presents
    a typical example of a Jupyter notebook, containing three text cells and six Python
    code cells.


    Each code cell can be directly executed by the underline Jupyter engine, which
    provides the necessary computational environment such as library dependencies.
    The code cells in Jupyter notebooks can be executed in any order (producing errors
    if its prerequisites are not satisfied). After one cell is executed, Jupyter will
    assign an execution order aligning with its execution order. For example, the
    first executed cell will be marked as “In [1]”, while the fourth executed cell
    will be marked as “In [4]”. Cells can be repeatedly executed. In such a case,
    the latest execution counter will overwrite the previous one.


    Looking closely at Figure 2, we see that the last code cell is executed before
    the fourth and fifth code cells. Astute readers may have also observed that there
    is no information (i.e., “In [5]”) indicating the fifth executed code cell. This
    is because when code cells are repeatedly executed, the original execution counter
    will be overwritten by the last execution counter—called a *skip* of execution
    counter. Skips make it'
  mdcn: '# 恢复 Jupyter Notebook 的执行环境


    王嘉伟

    信息技术学院

    莫纳什大学

    墨尔本，澳大利亚

    jiawei.wang1@monash.edu


    李力$^{\alpha}$

    信息技术学院

    莫纳什大学

    墨尔本，澳大利亚

    li.li@monash.edu


    安德烈亚斯·泽勒

    CISPA 亥姆霍兹信息安全中心

    萨尔布吕肯，德国

    zeller@cispa.saarland


    **摘要**—超过百分之九十的已发布 Jupyter Notebook 未声明对外部包的依赖。这使得它们无法执行，从而阻碍了科学结果的可复现性。我们提出了
    *SnifferDog*，一种方法，它 1) 收集 Python 包及其版本的 API，创建一个 API 数据库；2) 分析 Notebook 以确定所需包及其版本的候选者；3)
    检查哪些包是使 Notebook 可执行（并理想情况下，复现其存储的结果）所必需的。在其评估中，我们表明 *SnifferDog* 能够为绝大多数 Notebook
    精确恢复执行环境，使其立即可供最终用户执行。


    **索引术语**—Jupyter Notebook，环境，Python，API


    ## I. 引言


    Jupyter Notebook——结合了代码、文本、数学、绘图和富媒体的交互式文档——已成为科学家记录、复制和阐释其发现的主要媒介。与常规科学论文不同，Notebook
    允许其作者直接与数据和代码交互，即时更新表格和图表。这也延伸到用户，他们可以重新执行 Notebook 代码，例如使用自己的数据或对算法进行更改，并查看这如何影响最终结果。这使得
    Jupyter Notebook 成为实现研究结果广泛复制和重用的最有前途的工具之一。


    然而，理论上听起来不错的东西在实践中未必如此，Jupyter Notebook 也不例外。最近的研究 [1] 表明，绝大多数已发布的 Jupyter Notebook
    只能被用户阅读，而不能被重新执行。一个原因是*不完整性*，例如未提供原始数据；对此用户无能为力。然而，也存在一些可以轻松避免的导致 Notebook 无法执行的原因。一个原因是
    Notebook 代码单元可以*以任何顺序*交互式执行（数据科学家们乐于这样做）；因此，最近的方法 [2] 侧重于基于内部依赖关系恢复实际执行顺序。然而，另一个重要原因是
    Jupyter Notebook *依赖于其创建时的特定环境*，例如特定版本的特定库。


    原则上，Notebook 中的 Python 代码提供了 *import* 语句，声明了要使用的（外部）模块。


    然而，Python 用户安装的是*包*，而不是模块；并且导入的模块名称可能与提供它们的包的名称不同。不同版本的包可能提供不同的 API；因此必须确定兼容的版本。此外，包可能依赖于其他工具或包的安装。


    这就是为什么 Python（像其他语言一样），在良好的软件工程传统中，早已引入了*显式指定库和包之间依赖关系*的方法。例如，Python 包管理器（如 pip
    和 conda）期望 Python 包提供一个显式的*依赖列表*，说明需要安装哪些其他包及其版本。然而，Jupyter Notebook 的作者首先是数据科学家，而不是软件工程师
    [3]；因此，他们既不了解可重用软件的原则，也不会将其作为重点。事实上，正如我们在本文中所示，*大约 94% 的 Notebook 没有正式声明或记录依赖关系*；在那些声明了的
    Notebook 中，近 30% 并不可靠。因此，想要执行已发布且完整的 Jupyter Notebook 的用户很可能会遇到缺少包或版本不兼容的错误。


    在本文中，我们介绍了一种*自动恢复 Jupyter Notebook 实验依赖关系*的新方法。我们的 *SnifferDog* 工具接受一个 Python
    Jupyter Notebook，并自动检测复现 Notebook 结果所需的包。为此，*SnifferDog* 创建了一个 *API 库*，这是一个保存每个
    Python 库（及每个版本）API 信息的数据库。通过分析嵌入在 Notebook 中的 Python 代码，*SnifferDog* 然后确定 API
    兼容的库候选者。*SnifferDog* 随后可以自动安装推荐的依赖项，并检查它们是否允许 Notebook 1) 被执行，以及 2) 复现存储在 Notebook
    中的原始结果。因此，当用户在 Notebook 上应用 *SnifferDog* 时，他们至少可以获得检测到的所需库及其版本的列表。如果这些是完整的，Notebook
    就可以变得可执行；在理想情况下，Notebook 被证明可以完全复现原始结果。追求可执行性、可复现性并考虑库版本，也是 *SnifferDog* 区别于早期特定于
    Python 的方法 [4] 的地方。


    *SnifferDog* 高效且有效：它在 18,141.29 秒（每个 Notebook 3.63 秒）内完成了 5,000 个 Notebook 的分析。在一个包含
    315 个已知可执行 Notebook 的实验中，*SnifferDog* 能够为其中超过 90% 的 Notebook 自动确定依赖关系。


    本文的其余部分组织如下。在提供关于 Python 包和 Jupyter Notebook 的背景知识（第 II 节）之后，我们做出以下贡献：


    - **关于 Jupyter Notebook 中依赖问题普遍性的研究**（第 III 节）。在一项初步研究中，我们调查了导致 Jupyter Notebook
    无法执行的原因，包括有和没有环境依赖的情况。

    - **恢复 Jupyter Notebook 依赖关系的新方法**（第 IV 节）。我们介绍了我们方法的设计及其在 *SnifferDog* 原型中的实现。

    - **我们方法的评估**（第 V 节）。我们在各种 Notebook 上评估了 *SnifferDog* 的有效性，表明它能够为绝大多数 Notebook
    精确恢复执行环境。


    在讨论了相关工作（第 VI 节）之后，我们以结论和未来工作（第 VII 节）结束。


    ## II. 背景


    我们首先讨论背景知识，包括 Python 库和 Jupyter Notebook。


    ### A. Python 库


    Python 以其庞大的生态系统而闻名，为开发者提供了超过 200,000 个第三方包（也称为库）。此类 Python 库需要在访问之前本地安装到开发者的实现环境中。Python
    打包权威团队官方维护一个名为 *pip* 的标准包管理工具，允许用户从不同来源（PyPI）[5] 安装这些库。除了包管理系统，Python 开发者也可以从其源代码项目安装库。


    图 1 展示了一个典型的 Python 库代码结构示例。一个名为 *setup.py* 的 Python 文件将库本地安装。但是，此文件不会安装库的环境依赖项，因此需要用户事先满足这些依赖。一个*顶层包*赋予库名称（即
    pandas），存储在与 *setup.py* 相同的层级。Python 中的这样一个*包*是一个包含特定文件 *\_\_init\_\_.py* 的目录，该文件负责初始化包。Python
    包提供了一种构建 Python 模块命名空间的方式，为库用户提供了访问其 API 的简便方法。Python 中的*模块*是 Python 中用于指定 Python
    源代码（即包含 Python 定义和语句的文件）的特定术语。每个 Python 文件代表一个 Python 模块；例如，*setup.py* 定义了一个名为
    setup 的 Python 模块。顶层包下的目录是库的*子包*。类似地，子包下的 Python 文件被视为*子模块*。例如，如图 1 所示，Python
    文件 *base.py* 被定义为子包 *pandas.io.excel* 中名为 *base* 的子模块。


    ![](img/69adc9bec69591e7c440d8f3ba58afcd_1_0.png)


    在每个 Python 模块（或 Python 文件）中，可以声明和实现一组方法。这些方法可以被其他模块（或模块用户）访问，因此被称为 *API*。例如，*pandas.io.excel.base*
    模块包含一个名为 *read\_excel()* 的 API，其*完全限定名*为 *pandas.io.excel.\_base.read\_excel()*）。当
    Python 库演进时，其声明的 API 集合可能会更新。在这项工作中，我们将利用此信息来实现 *SnifferDog*，以便为 Python Jupyter
    Notebook 推断环境依赖。


    ### B. Jupyter Notebook


    Jupyter Notebook 是*单元格*的序列，这些单元格包含*文本*（Markdown 格式）或*可执行代码*（及其结果）。在*文本单元格*中，作者（使用
    Markdown 和 HTML 进行富格式化）描述 Notebook 的目标以及后续单元格中代码背后的原理。在*代码单元格*中，作者编写实际的编程代码，最常见的是
    Python 代码。图 2 展示了一个典型的 Jupyter Notebook 示例，包含三个文本单元格和六个 Python 代码单元格。


    每个代码单元格都可以由底层的 Jupyter 引擎直接执行，该引擎提供必要的计算环境，例如库依赖。Jupyter Notebook 中的代码单元格可以以任何顺序执行（如果其先决条件未满足，则会产生错误）。在一个单元格执行后，Jupyter
    将分配一个与其执行顺序一致的执行顺序号。例如，第一个执行的单元格将被标记为“In [1]”，而第四个执行的单元格将被标记为“In [4]”。单元格可以重复执行。在这种情况下，最新的执行计数器将覆盖之前的计数器。


    仔细观察图 2，我们看到最后一个代码单元格在第四个和第五个代码单元格之前执行。敏锐的读者可能还观察到，没有信息（即“In [5]”）指示第五个执行的代码单元格。这是因为当代码单元格被重复执行时，原始执行计数器将被最后的执行计数器覆盖——称为执行计数器的*跳过*。跳过使得'
