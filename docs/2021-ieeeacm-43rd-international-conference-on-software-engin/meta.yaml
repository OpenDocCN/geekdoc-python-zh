    # D. Library Usage Analysis


    The last module of *SnifferDog*, *library usage analysis* is straightforward.
    Based on the second module''s outputs (i.e., a set of APIs), this module queries
    these APIs against the API bank to find possible library candidates who have provided
    these APIs. Normally, because each API has been provided with a full-qualified
    name, the API bank can often precisely locate its belonging library. The query
    output will hence be multiple releases (or versions) of the same library. By integrating
    the query results of all the identified APIs, the objective of this module is
    hence to find a (minimal) list of libraries and their (maximum) version ranges
    that cover all the identified APIs leveraged by the input notebook. *SnifferDog*
    will then produce its output in common formats that describe Python environmental
    dependencies, such *Pipfile* or *requirements.txt*.


    Following the same approach implemented in the *library API mapping* module, we
    first build AST trees for the notebook''s Python code and then traverse the trees
    to identify library APIs. After that, this step goes one step deeper to expand
    the identified APIs to their fully-qualified names, based on the information extracted
    from the *import* and *from-import* statements. For example, for the API call
    statement *base.read_excel()* in the second code cell in Figure 2, the standardized
    API will be *pandas.io.excel._base.read_excel()*. If the identified API is an
