    # E. Threats to Validity


    The experimental findings may suffer from various threats to validity. The notebooks
    selected in this work may not be representative. We attempt to mitigate this threat
    by starting from 100,000 real-world Jupyter notebooks. We also resort to manual
    analysis to summarize the execution errors as well as confirm some of our experimental
    results. Such manual processes are known to be error-prone. We have cross-validated
    the results to mitigate potential errors.


    # VI. RELATED WORK


    We now discuss the closely related works from three aspects: Restoring Execution
    Environments, Studies on Jupyter Notebooks, and Python dependency analysis.


    # A. Restoring Execution Environments


    The most related work to ours is *DockerizeMe* [4], inferring environment dependency
    configurations for Python code snippets collected from GitHub Gist. *DockerizeMe*
    is implemented based on a pre-acquired knowledge base of known Python packages
    using static analysis, which is similar to the approach of ours. However, in addition
    to static analysis, it further leverages dynamic analysis to achieve its purpose,
    being able to achieve 30% improvement in reducing *ImportError*


