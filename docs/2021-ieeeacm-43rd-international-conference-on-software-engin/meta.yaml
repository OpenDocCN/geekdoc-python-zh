    # Example (2): ImportError

    # From GitHub project stargaser@astrodata2016

    # requirements.txt

    astroquery

    ...


    # scale_image API was removed from module

    # ''astropy.visualization'' since astroquery

    # version XXX

    Error: cannot import name ''scale_image'' from

    ''astropy.visualization''

    ```


