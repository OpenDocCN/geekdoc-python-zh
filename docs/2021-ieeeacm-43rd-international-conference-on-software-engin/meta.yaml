    **Dataset of Jupyter notebooks.** Recall that the goal of this work is to automatically
    infer environmental dependencies for Jupyter notebooks so as to help users execute
    and reproduce notebook outputs. To evaluate if our approach can achieve this objective,
    we resort to the approach introduced by Pimentel et al. [1] to collect 100,000
