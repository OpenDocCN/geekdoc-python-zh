    ## IV. SnifferDog


    In this section, we present our approach to automatically inferring environmental
    dependencies for Python Jupyter notebooks, implemented in our *SnifferDog* prototype.
    Figure 5 summarizes the working process of *SnifferDog*, including mainly three
    modules: (1) Library API Mapping, (2) Library Identification and API Standardization,
    and (3) API Usage Analysis. We now detail these three modules, respectively.


    ![](img/69adc9bec69591e7c440d8f3ba58afcd_4_0.png)


    ### A. Problem Statement


    Before providing the details of our approach, we formally define the problem that
    we plan to address in this work. At first, we need to pre-build an API bank $\mathcal{L}
    = \{L_1^v, L_2^v, L_3^v, \dots\}$ that records a large number of popular Python
    libraries'' API sets, in which $L_j^v$ stands for the set of APIs defined in library
    $L_j$ at version $v$. Then, given a Python Jupyter notebook $N$ as an input, we
    need to precisely parse its accessed API set $P = \{A_1, A_2, A_3, \dots\}$, where
    $A_i$ is an API used in $P$. After that, based on the pre-built API bank $\mathcal{L}$,
    the goal of this approach is hence to identify a set of libraries $L$ that fulfill
    the following constraints: (1) $L \subset \mathcal{L}$, and (2) $\forall A_i \in
    P, \exists L_j^v \in L$ that $A_i \in L_j^v$.


    ### B. Library API Mapping


    The first module, *library API mapping*, is not directly related to the working
    process of analyzing concrete Jupyter notebooks but plays an independent step
    in building the core infrastructure of our approach. The output of this module
    will be an API bank that provides an extensible (and on-growing) database recording
    mappings from popular Python libraries to their APIs.


    Given a Python library planned to be included in the API bank, this module first
    builds a directory tree following the file and directory composition of the library,
    aiming at providing a clear way of referring to library APIs (e.g. from top-level
    package to the leaf module). In this directory tree, Python packages (or sub-packages)
    are represented by non-leaf nodes and Python source code files are represented
    by leaf nodes. Figure 1 presents such an example, representing a partial code
    structure tree of the popular Python library *pandas*. This module then builds
    Abstract Syntax Tree (AST) trees for each leaf node (or Python file) and traverses
    the trees to locate public functions, including their positional and keyword parameters.
    The output of this step can already build a mapping from the library (in a certain
    version) to its defined APIs.


    Unfortunately, this approach may overlook certain API usages. Applying it to *pandas*
    (Figure 1), the API *read_excel()* (defined in the *base.py* module) can be referenced
    via its full qualified name *pandas.io.excel._base.read_excel()*, or *_base.read_excel()*
    (or *read_excel()*) if module *pandas.io.excel._base* (or the API itself *pandas.io.excel._base.read_excel*)
    is imported, as respectively shown in the second and third code cells in Figure
    2. However, as demonstrated in the first, fourth, and fifth code cells in Figure
    2, API *read_excel()* could be invoked via another form such as *pandas.read_excel()*,
    i.e., it can be directly imported from the *pandas* module despite it being defined
    in the *pandas.io.excel._base* module.


    This ambiguity is part of the complicated Python import mechanism, which has been
    implemented in a transitive manner. Let $X \xrightarrow{f} Y$ be importing API
    $f$ from module $X$ to module $Y$ via statement "from $X$ import $f$" in the source
    of $Y$. Transitivity enables $X \xrightarrow{f} Y$, if $Y \xrightarrow{f} Z$ and
    $X \xrightarrow{f} Z$. This feature, offered by Python runtime, has been frequently
    leveraged by many Python libraries to provide simplified means for users to access
    their APIs since it can transparently shorten the full qualified API names.


    To resolve this feature, while parsing Python source code, we further conduct
    an *import-flow* analysis to find all the possible alternatives (or aliases) of
    directly defined APIs. Take the API *read_excel* again as an example, regarding
    the simplified source code shown in Figure 6(a), the *import-flow* analysis would
    lead to the following two flows.


    ```

    pandas.io.excel._base \xrightarrow{read\_excel} pandas.io.api

    pandas.io.api \xrightarrow{read\_excel} pandas

    ```


    ![](img/69adc9bec69591e7c440d8f3ba58afcd_5_0.png)


    may have observed that our approach will lead to two full-qualified names for
    the same API *read_excel()*. Indeed, at this stage, it is non-trivial for our
    approach to be aware of that by simply analyzing the notebook code. We hence consider
    them as two independent APIs. Nevertheless, as discussed in the previous subsection,
    both of these two full-qualified API names will be recorded in the API bank thanks
    to the *import-flow* analysis. Hence, any imprecision in the analysis will not
    impact the overall precision of our approach.


    By taking transitivity into consideration, we could further deduce the following
    flow.


    $pandas.io.excel._base \xrightarrow{read\_excel} pandas$


    Subsequently, at the end of this module, we further leverage these inferred and
    deduced import flows to enhance the directory tree initially constructed for the
    library (cf. Figure 6(b)), before recording them into the API bank. The enhanced
    directory tree allows us to generate a complete list of APIs for each library
    integrated into the API bank.


    Moreover, Python code may involve instances of library classes that are initialized
    by calling constructor methods. The APIs invoked by those instances should also
    be appropriately identified and expanded. However, in Python, there is generally
    no syntax level difference between initializing constructor methods and accessing
    standard methods. Therefore, additional efforts are needed to distinguish them
    and thereby to allow the identification of classes'' instances and their accessed
    APIs. As an example, consider the code snippet in Listing 2:


    ### C. API Identification and Standardization


    ```python

    1 from x import y

    2 m = y()

    3 m.fun()

    ```


    As shown in Figure 5, the second module *API identification* focuses on analyzing
    *Jupyter notebook* projects (rather than Python libraries as that being targeted
    by the first module) to identify and standardize library API usage. Python code
    in notebooks can access (1) methods available in *local modules* that are often
    developed by the notebooks'' contributors, (2) *Python standard methods* (i.e.,
    often known as system APIs) that are provided by the core Python modules, and
    (3) *library methods* (i.e., often known as library APIs) that are developed by
    third parties and should be imported from external resources. In this module,
    we are only interested in the third type of methods, namely library APIs. To distinguish
    library methods from local modules and system APIs, we consider all the methods
    that are not defined locally and are not from Python''s system APIs as library
    APIs [8]–[13], [13]–[16].


    Listing 2: An example of qualifying object member function calls.


    In Listing 2, our approach will first identify that *m.fun* is a member function
    call and then trace back to its construction call *m = y()*; hence method *fun()*
    is an API in module *x*. Subsequently, the fully qualified name of this API will
    be *x.y.fun*.


    ### D. Library Usage Analysis


    The last module of *SnifferDog*, *library usage analysis* is straightforward.
    Based on the second module''s outputs (i.e., a set of APIs), this module queries
    these APIs against the API bank to find possible library candidates who have provided
    these APIs. Normally, because each API has been provided with a full-qualified
    name, the API bank can often precisely locate its belonging library. The query
    output will hence be multiple releases (or versions) of the same library. By integrating
    the query results of all the identified APIs, the objective of this module is
    hence to find a (minimal) list of libraries and their (maximum) version ranges
    that cover all the identified APIs leveraged by the input notebook. *SnifferDog*
    will then produce its output in common formats that describe Python environmental
    dependencies, such as *Pipfile* or *requirements.txt*.


    Following the same approach implemented in the *library API mapping* module, we
    first build AST trees for the notebook''s Python code and then traverse the trees
    to identify library APIs. After that, this step goes one step deeper to expand
    the identified APIs to their fully-qualified names, based on the information extracted
    from the *import* and *from-import* statements. For example, for the API call
    statement *base.read_excel()* in the second code cell in Figure 2, the standardized
    API will be *pandas.io.excel._base.read_excel()*. If the identified API is an
    alias, i.e., *re()* in the fifth code cell in Figure 2 defined by statement *from
    pandas import read_excel as re*, we will further replace it with its actual name
    while conducting the API standardization step. The standardized version will hence
    be *pandas.read_excel()*. Observant readers


