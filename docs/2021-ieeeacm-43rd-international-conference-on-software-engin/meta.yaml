    messages. While, in principle, *DockerizeMe* could also be applied to fully analyzed
    Jupyter notebooks, there are important conceptual differences compared to ours.
    First, *DockerizeMe* only considers the latest version of packages. It hence cannot
    deal with programs containing deprecated, removed, renamed APIs in the latest
    version of packages. Indeed, as empirically reported by Horton et al. [20] by
    an empirical study about the executability of Python code snippets on GitHub.
    Their experimental results show that most gists are not executable in a default
    Python environment, and while a naive approach can infer dependencies for some
    gists, it fails to do so in the majority of cases. Second, *DockerizeMe* does
    not *execute* code to validate its findings, let alone compare results against
    published results—whereas *SnifferDog* automatically determines the configuration
    that makes the notebook executable, ideally even reproducing the results. The
    authors further proposed the tool V2 that takes the program crashes information
    to guide the search for correct environment dependencies [21]. However this approach
    relies on repeated execution of code snippets and does not handle the case when
    no crash happen and dependencies are incorrect. On the contrary, *SnifferDog*
    is a static approach that analyzes dependencies using pre-built knowledge.


    ### B. Studies on Jupyter Notebooks


    Despite their popularity, research on Jupyter notebooks is still limited. In 2019,
    Pimentel et al. conducted a large scale study on the executability and reproducibility
    issues of over one million selected notebooks [1]. Their experimental results
    show that around 25% of the notebooks can be executed without any runtime errors,
    and among which only 4.03% of them can eventually produce the original results.
    Loenzen et al. [22] empirically investigate the code duplication and reuse in
    Jupyter notebooks and find that notebook repositories have a mean self-duplication
    rate of 7.6%. More recently, Wang et al [23] conduct a large scale study on the
    code quality and empirically find that even notable Jupyter notebooks are frequently
    suffered from technical debts (e.g., deprecated API uses).


    Following the discovery of low-reproducibility issues among Jupyter notebooks,
    Wang et al. [2] went further to propose to address the root causes leading to
    non-reproducible notebooks by offering the community a tool called Osiris. This
    tool attempts to reproduce Jupyter notebooks by leveraging code instrumentation
    to find out and address the uncertainties when executing Jupyter notebooks. However,
    due to a lack of appropriate execution environments, around 80% selected notebooks
    failed to be fully executed. Following this research line, Fangohr et al. [24]
    have further proposed another tool called *nbval* (implemented as a plugin for
    pytest) aiming at supporting automated testing and validation of Jupyter notebooks.
    As argued by the authors, nbval could be leveraged to promote reproducible science
    such as checking that deployed software behaves as its documentation suggests.


    In addition to researches from the Software Engineering community, Jupyter notebooks
    have been selected frequently as subjects by our fellow researchers in other domains
    [25]–[33]. For example, Perkel et al. [3] have studied why Jupyter notebooks are
    popular among data scientists. Kery et al. [26] have introduced a tool named *Verdant*
    to support users with efficient retrieval and sensemaking of messy version data.
    It allows users to compare, replay, and trace the relationships amongst different
    versions of artifacts of both non-code and code in the editors. Furthermore, Rule
    et al. [34] look into the notebooks from the aspects of human factors, and empirically
    observed that computational notebooks may lack the explanatory textual information.


    ### C. Dependency Analysis


    One of the most representative ones targeting Python dependencies would be the
    work recently proposed by Ying et al., who attempt to resolve dependency conflicts
    in the Python library Ecosystem [35]. They designed and implemented a tool named
    *Watchman* to detect dependency conflicts among libraries indexed by the PyPI
    repository. They also reported 117 potential dependency issues to the developers
    of the corresponding projects. Despite Python has become one of the most popular
    programming languages nowadays, studies on Python projects focus on library API
    issues and their evolution patterns [36], [37], there has not been much relevant
    research aiming at resolving Python dependencies. Nevertheless, dependency analysis
    has been a hot research topic for many other programming languages [38]–[44].
    The concepts of these approaches, such as resolving compatibility issues caused
    by the evolution of libraries [45], [46], automated replacing outdated libraries
    [47], or updating deprecated library APIs [48], we believe, should also be applicable
    to Python software applications.


    ## VII. CONCLUSION AND FUTURE WORK


    Jupyter notebooks may be touted as a prime means to obtain reproducible and replicable
    research results. In practice, however, they suffer from problems that Software
    Engineering has solved long ago: bad code quality, insufficient documentation,
    and—as shown in this paper—little to nonexistent management of dependencies. It
    will take time until the community of Jupyter notebook authors will learn to see
    their notebooks not only as entities to be published, but also as living code
    that should be designed to be readable, reusable, and maintainable. Until then,
    it will be up to the Software Engineering community to reverse engineer notebooks
    such that they can be executed and tested.


    In this paper, we have taken a major step towards this goal, namely restoring
    the execution environments of Jupyter notebooks. We found that dependencies are
    hardly ever stated explicitly, and that this problem seriously impedes re-execution
    of Jupyter notebooks. By analyzing imports and API usages in notebooks and matching
    them against Python libraries in various versions, our tool *SnifferDog* can identify
    library candidates that were used for notebook creation. By searching for candidate
    configurations that make the notebook executable again (and hence fully reproducible),
