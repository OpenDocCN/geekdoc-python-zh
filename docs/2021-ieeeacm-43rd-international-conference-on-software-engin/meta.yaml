    - **A novel approach to restore dependencies of Jupyter notebooks** (Section IV).
    We present the design of our approach and its implementation in the *SnifferDog*
    prototype.

    - **An evaluation of our approach** (Section V). We evaluate the effectiveness
    of *SnifferDog* on a variety of notebooks, showing that it precisely restores
    execution environments for the largest majority of notebooks.


    After discussing related work (Section VI), we close with conclusion and future
    work (Section VII).


    # II. BACKGROUND


    We start with discussing background knowledge, including Python libraries and
    Jupyter notebooks.


    # A. Python Libraries


    Python is well-known for its immense ecosystem, providing more than 200,000 third-party
    packages (also known as libraries) to developers. Such Python libraries need to
    be locally installed onto developers'' implementation environment before being
    accessed. The Python Packaging Authority team officially maintains a standard
    package management tool called *pip*, which allows users to install these libraries
    from different sources (PyPI) [5]. In addition to package management systems,
    Python developers can also install a library from its source code project.


    Figure 1 illustrates a typical code structure example of a Python library. A Python
    file named *setup.py* installs the library locally. However, this file will not
    install the library''s environmental dependencies and, hence, requires its users
    to fulfill them beforehand. A *top-level package* giving the library its name
    (i.e., pandas) is stored in the same level of *setup.py*. Such a *package* in
    Python is a directory that contains a specific file named *\_\_init\_\_.py* responsible
    for initializing the package. Python packages provide a way to structure Python''s
    module namespace, offering an easy means for library users to access its APIs.
    A *module* in Python is a specific term used in Python to specify Python''s source
    code (i.e., files containing Python definitions and statements). Each Python file
    represents a Python module; for instance, *setup.py* defines a Python module named
    setup. Directories under the top-level package are the library''s *sub-packages*.
    Similarly, the Python files under sub-packages are deemed as *sub-modules*. For
    example, as shown in Figure 1, the Python file *base.py* is defined as a sub-module
    named *base* in sub-package *pandas.io.excel*.


    ![](img/69adc9bec69591e7c440d8f3ba58afcd_1_0.png)


    In each Python module (or Python file), a set of methods can be declared and implemented.
    These methods can be accessed by other modules (or module users) and hence are
    referred to as *APIs*. For example, the *pandas.io.excel.base* module contains
    an API called *read\_excel()* with the *fully qualified name* being *pandas.io.excel.\_base.read\_excel()*).
    When Python libraries evolve, their declared API sets will likely be updated.
    In this work, we will leverage this information to implement *SnifferDog* so as
    to infer environmental dependencies for Python Jupyter notebooks.


    # B. Jupyter notebooks


    Jupyter notebooks are sequences of *cells*, which either contain *text* (in Markdown
    format) or *executable code* (and its results). In *text cells*, authors describe
    (using Markdown and HTML for rich formatting) the objective of the notebook and
    the rationale behind the code presented in the following cells. In *code cells*,
    authors write actual programming code, most frequently Python code. Figure 2 presents
    a typical example of a Jupyter notebook, containing three text cells and six Python
    code cells.


    Each code cell can be directly executed by the underline Jupyter engine, which
    provides the necessary computational environment such as library dependencies.
    The code cells in Jupyter notebooks can be executed in any order (producing errors
    if its prerequisites are not satisfied). After one cell is executed, Jupyter will
    assign an execution order aligning with its execution order. For example, the
    first executed cell will be marked as “In [1]”, while the fourth executed cell
    will be marked as “In [4]”. Cells can be repeatedly executed. In such a case,
    the latest execution counter will overwrite the previous one..


    Looking closely at Figure 2, we see that the last code cell is executed before
    the fourth and fifth code cells. Astute readers may have also observed that there
    is no information (i.e., “In [5]”) indicating the fifth executed code cell. This
    is because when code cells are repeatedly executed, the original execution counter
    will be overwritten by the last execution counter—called a *skip* of execution
    counter. Skips make it'
- md: 'hard to reproduce the original outputs of a notebook because the skipped execution
    counters are not recorded at all [2].


    If the execution of a code cell generates an output (text or pictures such as
    diagrams), the output will also be recorded and displayed in the notebook. In
    Figure 2, a histogram at the end is the output of the last code cell.


    ![](img/69adc9bec69591e7c440d8f3ba58afcd_2_0.png)


    ## III. PRELIMINARY STUDY AND MOTIVATION


    In 2019, Pimentel et al. presented a large-scale empirical study [1] on the quality
    and reproducibility of Jupyter notebooks. In this study, the authors looked into
    1,159,166 notebooks collected from GitHub, among which only 149,259 (roughly **12.9%**)
    of them were provided with module dependency information describing how the notebooks''
    environmental dependencies should be set up. In other words, the vast majority
    of existing notebooks in the community do not provide sufficient information such
    that notebook users could execute and replicate them. Since easy replication is
    one of the promises of Jupyter Notebooks, there is a need for dependable automated
    approaches to infer environmental dependencies for Jupyter notebooks.


    How serious is this problem? We have conducted a lightweight replication study
    of Pimentel et al.''s work on recent Jupyter notebooks. We limit our replication
    study to replicating the executability of notebooks when supplying dependencies
    provided by the notebook authors to identify the main causes for non-reproducibility
    and thus specifically address execution environments. To fulfill this purpose,
    we propose to answer the following research questions:


    - RQ1: To what extent do (public) Jupyter notebooks provide environment setup
    information?

    - RQ2: How useful is dependency information in helping notebook users configure
    the execution environment?

    - RQ3: Does the provided environment information help notebook users to execute
    and reproduce the notebooks? If not, what are the root causes making them non-executable?


    To answer these research questions, we have collected a dataset consisting of
    notebooks with and without experimental setup information. Our source for notebooks
    is *GitHub*, one of the world''s leading software repository hosting platforms.
    We randomly downloaded 100,000 notebooks from GitHub.


    Table I summarizes our study results. Among 100,000 notebooks, less than 6% of
    them (or 4.74%, 1.15%, and 0.12% respectively for the three selected criteria)
    have been provided with environmental dependency information¹. This rate is even
    lower than the rate (calculated similarly) reported by Pimentel et al. two years
    ago.


    Note that prior work by Pimentel et al. has investigated three sources for notebook
    environment setup information: (1) requirements.txt, (2) Pipfile, and (3) setup.py.
    As discussed previously, *setup.py* is usually used to locally install a Python
    library from the source. It is not responsible for installing library dependencies.
    After manually investigating notebooks that use *setup.py*, we confirm that *setup.py*
    is indeed not relevant to the environment setup of Jupyter notebooks. Therefore,
    we exclude the third criteria *setup.py* for this study. Furthermore, when conducting
    the previous manual analysis, we additionally find that notebook contributors
    may provide environmental setup information through Anaconda (e.g., via *environments.yml*).
    As a result, in our study, we replace the third criteria *setup.py* with Anaconda
    environments.


    TABLE I: Distribution of notebooks being provided with environmental dependency
    information w.r.t. the selected three criteria.


    | | requirements.txt | environments.yml (Anaconda) | Pipfile | Total |

    |---|---|---|---|---|

    | Notebooks | 4741 | 1146 | 117 | 5826 |

    | Notebooks (≥3.5) | 2923 | 868 | 77 | 3740 |

    | Installable | 2064 | 563 | 77 | 2646 |

    | Executable | 518 | 207 | 14 | 725 |


    > RQ1: To what extent do (public) Jupyter notebooks provide environment setup
    information?


    Among 100,000 notebooks, only less than 6% provide environmental dependency information
    for helping users execute their notebooks.


    For the 5,826 notebooks that *have* been provided with environmental dependencies,
    we further check how *reliable* these are. To this end, we implemented scripts
    to automatically install such dependencies, using Anaconda [6] to create individual
    environments for each of the aforementioned Jupyter notebooks. After that, we
    leveraged a tool named nbconvert² to evaluate the execution of notebooks. Since
    nbconvert in Python 3.5 or its lower versions are no longer supported by the official
    Jupyter team, we had to exclude 2,086 notebooks that cannot be analyzed by our
    scripts.


    After automatically installing the remaining 3,740 notebooks, we resort to their
    logs to check whether the installations are successful or not. Based on our observation,
    when an installation fails, it will contain one of the following three messages:
    (a) “InstallationError” occur as the runtime exception, (b) “ERROR:”, and (c)
    “cannot find a version for”. Of the 3,740 notebooks, 1094 notebooks failed to
    have their dependency information installed, giving a failure rate of 29.25%.


    > RQ2: How useful is dependency information in helping notebook users configure
    the execution environment?


    In our evaluation, 29.25% of the environmental dependency information provided
    by notebook contributors was found to be unreliable and/or insufficient.


    For the notebooks that we can successfully install their environmental dependencies,
    we go one step deeper to check if the installed dependencies are adequate to support
    the execution of the notebooks. Recall that notebook code cells can be executed
    in any order and can be repeatedly executed (resulting in skipped execution counters).
    Hence, it is practically impossible to infer the actual execution order initially
    conducted by the notebook contributor. In this preliminary study, we simply execute
    the code cells top-down. We believe this order reflects the natural flow indicating
    how its contributor has attempted to implement the notebook. The execution time
    is set 10 minutes for every notebook.


    ²https://github.com/jupyter/nbconvert


    ![](img/69adc9bec69591e7c440d8f3ba58afcd_3_1.png)


    The last row of Table I presents the number of notebooks (i.e., Installable ones)
    that can be executed without errors. In other words, among 2,646 notebooks that
    have been provided with installable dependency information, 72.6% of them cannot
    be successfully executed following the straightforward top-down execution strategy.


    There are various reasons causing execution of these notebooks to fail. Indeed,
    on the one hand, the provided dependency information may not be perfectly reliable,
    resulting in dependency-related errors. On the other hand, even if the environmental
    dependencies are correctly set up, notebooks themselves may contain implementation
    errors that can also lead to runtime exceptions.


    Figure 4 enumerates the top-10 errors summarized from the unsuccessful notebooks.
    The fact that the top-ranked errors are related to environmental dependencies
    shows that environmental dependency seems to be the primary reason causing execution
    errors of the aforementioned notebooks. The top-2 ranked errors (i.e., module
    not found and import error) are indeed caused by the inadequate runtime environment,
    where the imported modules cannot be located [7]. In fact, notebooks linked to
    these two errors have accounted nearly half (24.15% and 22.90%, respectively)
    of the aforementioned unsuccessful notebooks.


