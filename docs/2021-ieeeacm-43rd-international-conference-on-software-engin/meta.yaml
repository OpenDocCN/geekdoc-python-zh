    **Dataset of Jupyter notebooks.** Recall that the goal of this work is to automatically
    infer environmental dependencies for Jupyter notebooks so as to help users execute
    and reproduce notebook outputs. To evaluate if our approach can achieve this objective,
    we resort to the approach introduced by Pimentel et al. [1] to collect 100,000
    Jupyter notebooks from GitHub to fulfill our experiments. GitHub is the world’s
    leading software development platform hosting millions of software repositories.
    The 100,000 notebooks are retrieved from GitHub projects containing files with
    Jupyter notebook .ipynb formats and declaring Python as their programming language.


    **Dataset of Selected Python Libraries.** Recall that the API bank of our approach
    is built based on existing libraries, and it can be easily extended to include
    more libraries. Generally, the more libraries considered, the more comprehensive
    the API bank will be, and subsequently, the more precise and sound results *SnifferDog*
    can achieve. Since we aim at generating dependencies for as many notebooks as
    possible, we start by selecting the most popular 1,000 modules imported by the
    aforementioned 100,000 Jupyter notebooks. We then leverage PyPI, the official
    Python package index, to query the installation wheel files which contain the
    source code of library implementation these selected modules. Because several
    modules may belong to the same library, or some modules have not yet been indexed
    by PyPI, we can only locate 488 Python libraries (with 17,947 different releases)
    for the selected top-1000 modules. Therefore, in this work, we leverage 488 distinct
    Python libraries with 17,947 releases to construct the API bank.


    ## B. RQ4: Effectiveness of API Bank


    In this research question, we are interested in evaluating the usefulness of the
    API bank. From the selected 488 Python libraries, the library API mapping module
    extracts 1,013,718 APIs to fill the API bank. Figure 7 illustrates the distribution
    of the number of APIs in each selected library, giving median and mean values
    at 321 and 2,281, respectively, after excluding outliers.


    ![](img/69adc9bec69591e7c440d8f3ba58afcd_6_0.png)


    Towards evaluating the correctness of the constructed API bank, we resort to a
    manual process to check if these APIs are correctly recorded in the API bank.
    To this end, we randomly selected 166 APIs from the API bank to be manually validated.
    The number of selected APIs is decided by an online Sample Size Calculator [17]
    with a confidence level at 99% and a confidence interval at 10. For each of the
    selected APIs, we manually check it against its source code and find that 164
    of them are correct results, giving a precision of 98.8% for our API bank construction
    approach.


    In addition to the aforementioned manual investigation, we further resort to a
    *dynamic testing approach* to evaluate the correctness of the constructed API
    bank. Giving a mapping from a library version to its APIs, when the library (with
    the given version) is installed, all its APIs should be able to be imported. To
    this end, we implement a prototype tool to fulfill this process automatically.
    Specifically, we first randomly select 20 libraries, accounting for in total 3,982
    APIs, from the API bank, and install them, respectively. For each of the installed
    libraries, we then extract all of its recorded APIs from the API bank and conduct
    runtime import testings to check whether these APIs can be imported at runtime.
    Among the 3,982 considered APIs, only 252 of them fail to be imported in our experiment,
    leading to a success rate of 93.6%. After analyzing the traceback information
    of import errors, we find that most of such failures are related to missing dependencies
    that are further required by the libraries under evaluation.


    > RQ4: (Effectiveness of library mapping) Is *SnifferDog* effective in mapping
    Python libraries to their APIs?


    The API bank constructed by the Library API mapping module is precise: 98.8% of
    APIs are correctly extracted; 93.6% can be successfully imported.


    Among the 1,013,718 APIs inferred from the 488 libraries, 686,915 of them could
    further introduce compatibility issues to their client applications (if incorrect
    library versions are installed), resulting in, for example, module not found errors
    and import errors. The incompatible APIs include 543,387 (53.60%) newly added
    APIs after the first libraries’ releases, 345,234 (34.06%) removed APIs compared
    to the libraries’ latest versions, and 58,594 (5.78%) APIs have their parameters
    changed over the libraries’ evolution. Figure 8 further presents the distribution
    of newly added, removed, and updated APIs in each of the considered libraries,
    respectively.


    Given the fact that 67.76% of the APIs (including added, removed, and updated
    ones without duplication) may introduce compatibility issues, there is a strong
    need to also infer the correct versions of the dependent libraries when inferring
    the environmental dependencies for Jupyter notebooks. Our API bank records the
    detailed evolution changes of considered libraries and is designed to infer not
    only the dependent libraries, but also their correct versions.


    > RQ4 (Usefulness of API bank) Is *SnifferDog* effective in mapping Python libraries
    to their APIs?


    In our evaluation, more than half of the library APIs were added, removed, or
    updated at some point in the libraries’ life cycles. This underlines the need
    to check for compatible library versions, as *SnifferDog* does.


    ![](img/69adc9bec69591e7c440d8f3ba58afcd_7_0.png)


    Fig. 8: The median values for the number of added and removed and updated APIs
    are 45, 25 and 5 respectively after excluding outliers.


    ## C. RQ5: Effectiveness of SnifferDog


    Let us now evaluate the effectiveness of *SnifferDog* in inferring environmental
    dependencies for Jupyter notebooks. We evaluate the effectiveness through one
    *in-the-lab* and one *in-the-field* experiment.


    1) *In-the-lab experiment*: Recall that our preliminary study has identified 725
    notebooks that are (1) provided with installable required dependencies, and (2)
    demonstrated to be executable after the provided dependencies are installed. We
    hence take these 725 notebooks as the ground truth to fulfill our in-the-lab experiment
    (because these notebooks are known executable). Unfortunately, 385 (out of the
    725) notebooks have accessed libraries that are not yet considered by the current
    API bank (constructed based on around 488 libraries). Therefore, we have to exclude
    them from the ground truth. Our final ground truth is hence made up of 340 Jupyter
    notebooks and their required libraries.


    For the 340 notebooks, we then apply *SnifferDog* to automatically generate experimental
    dependencies for them. After that, we follow the same approach (as discussed in
    Section III) to automatically install the generated libraries and execute the
    corresponding notebooks. Experimental results show that *SnifferDog* can successfully
    generate installation requirements for 315 (92.65%) notebooks, among which 284
    are successfully executed, giving a recall rate at 83.52%.


    The installation failures are mainly related to library compatibility issues brought
    by the selected Python version (which is usually not provided by notebook contributors)
    and the underline Python setuptools [18]. For the 31 non-executable cases, our
    manual investigation reveals that the failures (8 ImportError, 7 ModuleNotFoundError
    and 16 other type of runtime errors) are caused by inaccurate version constraints
    yielded by *SnifferDog*.


    > **RQ5: (in-the-lab) How accurate is *SnifferDog* in inferring environment dependencies
    for Python Jupyter notebooks?**


    In a lab setting, *SnifferDog* is effective in automatically inferring execution
    environments for Jupyter notebooks, successfully generating installation requirements
    for 315/340 (92.6%) of notebooks. 284/315 (90.2%) of notebooks could be executed
    automatically.


    2) *In-the-field experiment*: In this setting, we randomly select 5,000 notebooks
    and launch *SnifferDog* to generate execution environments for them. *SnifferDog*
    completes its analysis in 18,141.29 seconds, or 3.63 seconds per notebook on average.


    We now check to which extent the generated environments support the execution
    of notebooks. To reduce human influence to a minimum, we restrict ourselves to
    a subset of notebooks to fulfill this purpose as it is time-consuming to evaluate
    a notebook, which involves installing all the dependencies and executing all of
    its code cells. To this end, we apply the following inclusion criteria to retain
    notebooks that (1) have been provided with pre-defined dependencies, which, however,
    cannot support their executions, and (2) are within the capacity of our API bank.
    This gives us 722 notebooks for the in-the-wide experiment.


    Among the 722 notebooks, *SnifferDog* can successfully generate installable dependencies
    for 667 of them, among which 223 of them can further lead to successful executions
    of the corresponding notebooks.


    Note that over half of the notebooks remain non-executable. Why is that so? Our
