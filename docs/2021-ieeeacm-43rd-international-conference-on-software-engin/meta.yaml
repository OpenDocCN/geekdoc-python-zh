    在本节中，我们介绍了我们自动推断Python Jupyter笔记本电脑环境依赖的方法，该方法在我们的*SnifferDog*原型中实现。图5总结了*SnifferDog*的工作流程，主要包括三个模块：（1）库API映射，（2）库识别和API标准化，以及（3）API使用分析。我们现在分别详细介绍这三个模块。


