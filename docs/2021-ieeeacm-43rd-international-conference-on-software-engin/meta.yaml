    **Abstract**—More than ninety percent of published Jupyter notebooks do not state
    dependencies on external packages. This makes them non-executable and thus hinders
    reproducibility of scientific results. We present *SnifferDog*, an approach that
    1) collects the APIs of Python packages and versions, creating a database of APIs;
    2) analyzes notebooks to determine candidates for required packages and versions;
    and 3) checks which packages are required to make the notebook executable (and
    ideally, reproduce its stored results). In its evaluation, we show that *SnifferDog*
    precisely restores execution environments for the largest majority of notebooks,
    making them immediately executable for end users.


    **Index Terms**—Jupyter Notebook, Environment, Python, API


    # I. INTRODUCTION


    Jupyter notebooks—interactive documents that combine code, text, mathematics,
    plots, and rich media—have become a prime medium for scientists to document, replicate,
    and illustrate their findings. In contrast to a regular scientific paper, a notebook
    allows its writers to directly interact with data and code, updating tables and
    diagrams on the spot. This also extends to users, who can re-execute the notebook
    code, say with their own data or changes to the algorithms, and see how this affects
    the final results. This makes Jupyter notebooks one of the most promising tools
    to allow for widespread replication and reuse of research results.


    What sounds good in theory need not be true in practice, though, and Jupyter notebooks
    are no exception. Recent studies [1] have shown that the vast majority of published
    Jupyter notebooks can only be read by users, but not re-executed. One reason is
    *incompleteness*, such as the raw data not being supplied; and there is not much
    users can do about this. However, there are also reasons for notebooks being non-executable
    that can be easily avoided. One reason is that notebook code cells can be executed
    interactively *in any order* (and data scientists happily do so); recent approaches
    [2] thus focus on restoring the actual order based on internal dependencies. Another
    important reason, however, is that Jupyter notebooks *depend on specific environments*
    in which they were created, such as specific libraries in specific versions.


    In principle, Python code in notebooks provides *import* statements, which state
    the (external) modules are to be used.


    However, Python users install *packages*, not modules; and the names of imported
    modules may be different from the name of the package that provides them. Different
    versions of packages may provide different APIs; hence one has to determine compatible
    versions. Also, packages may depend on other tools or packages to be installed.


    This is why Python (like other languages), in good Software Engineering tradition,
    has long introduced *explicit means to specify dependencies* between libraries
    and packages. Python package managers (e.g., pip and conda), for instance, expect
    Python packages to provide an explicit *list of dependencies*, stating which other
    packages need to be installed in which versions. Writers of Jupyter notebooks,
    however, are first and foremost data scientists and not software engineers [3];
    hence, they neither know about principles of reusable software, nor would this
    be in their focus. Indeed, as we show in this paper, *around 94% of notebooks
    do not formally state or document dependencies*; among those who do, nearly 30%
    are not reliable. In consequence, users who want to execute published and complete
    Jupyter notebooks will very likely face errors of missing packages or incompatible
    versions.


    In this paper, we introduce a novel approach to *automatically restore the experimental
    dependencies of Jupyter notebooks*. Our *SnifferDog* tool takes a Python Jupyter
    notebook and automatically detects which packages are required to reproduce notebook
    results. To this end, *SnifferDog* creates an *API bank*, a database which holds
    API information for each Python library (and each version). By analyzing the Python
    code embedded in the notebook, *SnifferDog* then determines library candidates
    that would be API compatible. *SnifferDog* then can automatically install the
    recommended dependencies and check if they allow the notebook to 1) be executed
    and 2) reproduce the original results stored in the notebook. When users thus
    apply *SnifferDog* on a notebook, they at least obtain a list of detected required
    libraries and their versions. If these are complete, the notebook can become executable;
    and in the ideal case, the notebook is shown to fully reproduce the original results.
    Striving for executability, reproduction, and considering library versions is
    also what sets *SnifferDog* apart from earlier, Python-specific approaches [4].


