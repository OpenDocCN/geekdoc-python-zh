    # C. RQ5: Effectiveness of SnifferDog


    Let us now evaluate the effectiveness of *SnifferDog* in inferring environmental
    dependencies for Jupyter notebooks. We evaluate the effectiveness through one
    *in-the-lab* and one *in-the-field* experiment.


    1) *In-the-lab experiment*: Recall that our preliminary study has identified 725
    notebooks that are (1) provided with installable required dependencies, and (2)
    demonstrated to be executable after the provided dependencies are installed. We
    hence take these 725 notebooks as the ground truth to fulfill our in-the-lab experiment
    (because these notebooks are known executable). Unfortunately, 385 (out of the
    725) notebooks have accessed libraries that are not yet considered by the current
    API bank (constructed based on around 488 libraries). Therefore, we have to exclude
    them from the ground truth. Our final ground truth is hence made up of 340 Jupyter
    notebooks and their required libraries.


    For the 340 notebooks, we then apply *SnifferDog* to automatically generate experimental
    dependencies for them. After that, we follow the same approach (as discussed in
    Section III) to automatically install the generated libraries and execute the
    corresponding notebooks. Experimental results show that *SnifferDog* can successfully
    generate installation requirements for 315 (92.65%) notebooks, among which 284
    are successfully executed, giving a recall rate at 83.52%.


    The installation failures are mainly related to library compatibility issues brought
    by the selected Python version (which is usually not provided by notebook contributors)
    and the underline Python setuptools [18]. For the 31 non-executable cases, our
    manual investigation reveals that the failures (8 ImportError, 7 ModuleNotFoundError
    and 16 other type of runtime errors) are caused by inaccurate version constraints
    yielded by *SnifferDog*.


    > **RQ5: (in-the-lab) How accurate is *SnifferDog* in inferring environment dependencies
    for Python Jupyter notebooks?**


    In a lab setting, *SnifferDog* is effective in automatically inferring execution
    environments for Jupyter notebooks, successfully generating installation requirements
    for 315/340 (92.6%) of notebooks. 284/315 (90.2%) of notebooks could be executed
    automatically.


