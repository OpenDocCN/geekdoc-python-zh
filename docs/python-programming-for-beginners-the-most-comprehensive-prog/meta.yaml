- md: '## Chapter 6: What are Python Data Types?


    Python programmers use many data types to create universal applications on different
    platforms. A python programmer needs to understand the importance of data types
    in software development.


    ## What Are Data Types?


    To be precise, data types are a set of an already predefined range of values that
    programmers use while creating variables. It is also vital to recollect that as
    Python is not a statically typed language, it is not required to define data types
    of variables explicitly. All statically typed languages such as C and C++ will
    usually ask programmers to define the data types of variables.


    While Python programmers are not forced to define them to create programs, it
    is still an essential prerequisite for programmers to learn about different available
    data types to develop complex programs that can interact with users efficiently.


    Here is an example of a statically typed language and how they define variables.


    **Program Code:**

    **int age = 12;**


    Here, int is the data type that is defined. Age is the name of the variable created,
    and 12 is the value provided to be stored in the age variable.


    On the other hand, Python defines a variable without explicitly defining the variable
    type, as shown below.


    **Program Code:**


    ```

    age = 12

    ```


    Here, age and the value are provided. Still, the data type is not defined because
    the Python interpreter is already capable enough to understand that the value
    provided is an integer.


    ## Understanding Data Types


    Popular data types that Python programmers use in their applications.


    ## Python Strings


    Strings are data types usually used to represent a bunch of text. Programmers
    can use String data types to represent text in a program by linking them with
    single quotes. Whenever a string data type is created, an ‘str’ object is designed
    with a sequence of characters.


    Humans usually communicate with each other in the text; hence, strings are the
    most critical data types developers need to be aware of to create meaningful software.
    It is also essential to represent data in strings because computers always understand
    data in binary; hence, using ASCII and Unicode encoding mechanisms is vital.


    Python 3 has introduced an advanced encoding mechanism to understand foreign languages
    such as Chinese, Japanese and Korean, making the usage of Strings essential for
    software development.


    How are strings represented?


    ```

    x = ‘This is an example’

    print(x)

    ```


    **Output:**


    This is an example


    Everything in between the single quotes belongs to a string data type. This string
    data is defined using a variable ‘x.’ The memory location and size of the variable
    with a string data type are usually determined by the number of bits a variable
    occupies. The number of characters in a string data type is directly proportional
    to the number of bits.


    For example, in the above example, ‘This is an example’ has 18 characters, along
    with the whitespaces.


    There are several other ways to define strings for you as a Python programmer.
    For consistency, always use a single type according to your convenience while
    working on real-world projects.


    **Program Code:**


    ```

    a = "This is an example"

    #Using double quotes to define strings

    print(a)

    b = """This is an example"""

    # Using three single quotes to define strings

    print(b)

    c = ''''''This is an example

    but with more than one line''''''

    print(c)

    ```


    **Output:**


    This is an example

    This is an example

    This is an example but with more than one line


    In the above example program, we have defined three ways to define strings. You
    can also use special characters, symbols, and new tab lines between quotes. Python
    supports escape sequences that are used by all other programming languages. For
    example, \n is an escape sequence popular with programmers to create new lines.


    ## How to Access Characters in Strings?


    As strings are the most used data types in Python, the core library provides several
    inbuilt functions that can be used to relate with the string data effectively.


    You need to know the index numbers to access characters in a string. Index numbers
    usually start with 0 instead of 1. You can also use negative indexing and slicing
    operations to access a part of a string.


    ## Example:


    ```

    first = ‘Programming’

    # We can now access characters from the string

    print(‘Example used =’, first)

    # Will print the whole string

    print(‘first character =’, first[0])

    # Will print the first character

    print(‘last character =’, first[-1])

    #Will print the last character using negative indexing

    print(‘last character =’, first[10])

    #Will print the last character using positive indexing

    print(‘Sliced character =’, first[0:2])

    # Will print the sliced character from zero to the third index.

    ```


    **Output:**


    Example used = Programming

    first character = P

    last character = g

    Last character = g

    Sliced character = Pro


    As all the string data types are immutable, replacing characters in a literal
    string is impossible. If you try to replace string characters, it will give a
    Type error as an output.


    **Program Code:**


    ```

    first = ‘programming’

    first[1] = ‘c’

    print(first)

    ```


    **Output:**


    **TypeError – You can’t replace string characters**


    ## Python String Formatters


    You might want to print variables alongside a string at times. You can use commas
    or string formatters to achieve the same result.


    ```

    >>> city=‘Ahmedabad’

    >>> print("Age", 21, "City", city)

    ```


    **Output:**


    Age 21 City Ahmedabad


    ### 1. f-strings


    The letter ‘f’ precedes the string, and the variables are mentioned in curly braces
    in their respective positions.


    ```

    >>> name=''Ayushi''

    >>> print(f"It isn''t {name}''s birthday")

    ```


    **Output:**


    It is not Ayushi’s birthday


    Because we wanted two single marks in the string, we used double quotes to delimit
    the entire series.


    ### 2. format() technique


    You may perform the same thing with the format() technique. It comes after the
    string and has the variables separated by commas as arguments.


    To position the variables in the string, use curly brackets. You can put 0,1,...
    or the variables inside the curly brackets.


    When implementing the latter, you must use the formatting technique to assign
    values to them.


    ```

    >>> print("I love {0}".format(a))

    ```


    **Output:**


    I love dogs


    ```

    >>> print("I love {a}".format(a=''cats''))

    ```


    **Output:**


    I love cats


    The variables do not have to be defined before the print statement.


    ```

    >>> print("I love {b}".format(b=''ferrets''))

    ```


    **Output:**


    I love ferrets


    ### 3. % operator


    In a string, the percent operator goes where the variables go. The letter s stands
    for a string in percents.


    The variables and operator follow the string in parentheses/in a tuple.


    ```

    >>> b=''ferrets''

    >>> print("I love %s and %s" %(a,b))

    ```


    **Output:**


    I love dogs and cats


    Other options include:


    - %f – for floating-point numbers

    - %d – for integers


    ## String Manipulation Techniques


    Strings are the most used data types, and hence Python core library offers several
    manipulation techniques that programmers can take advantage of. Understanding
    string manipulation techniques can help you quickly extract data from a large
    pool of information. Data scientists should be more aware of these techniques.


    ### 1. Concatenate


    Concatenate refers to joining two separate entities. With this procedure, two
    strings can be joined together using the arithmetic operator ‘+.’ If you want
    better readability with strings, you can just use whitespaces in between the two
    strings.


    **Program Code:**


    ```

    example = ''This is'' + ''a great example''

    print(example)

    ```


    **Output:**


    This is a great example


    Remember that when you concatenate, whitespaces are not given. You need to add
    whitespaces on your own while connecting, as shown below.


    **Program Code:**


    ```

    example = ''This is'' + '' '' + ''a great example''

    print(example)

    ```


    **Output:**


    This is a great example


    ### 2. Multiply


    When you use the String multiply technique, your string value will be repeated
    continuously. To multiply string content, we can use the * operator.


    **Program Code:**


    ```

    example = '' Great'' * 4

    print(example)

    ```


    **Output:**


    Great Great Great Great


    ### 3. Appending


    With the help of this operation, you can add any string to the end of one string
    by using the arithmetic operator +=.'
  mdcn: '## 第六章：什么是 Python 数据类型？


    Python 程序员使用多种数据类型在不同平台上创建通用应用程序。Python 程序员需要理解数据类型在软件开发中的重要性。


    ## 什么是数据类型？


    准确地说，数据类型是程序员在创建变量时使用的一组预定义值范围。同样重要的是要记住，由于 Python 不是静态类型语言，因此不需要显式定义变量的数据类型。所有静态类型语言（如
    C 和 C++）通常会要求程序员定义变量的数据类型。


    虽然 Python 程序员在创建程序时并不强制定义它们，但程序员学习不同的可用数据类型仍然是开发能够与用户高效交互的复杂程序的重要前提。


    这是一个静态类型语言如何定义变量的示例。


    **程序代码：**

    **int age = 12;**


    这里，`int` 是定义的数据类型。`age` 是创建的变量名，`12` 是提供给 `age` 变量存储的值。


    另一方面，Python 在不显式定义变量类型的情况下定义变量，如下所示。


    **程序代码：**


    ```

    age = 12

    ```


    这里，提供了 `age` 和值。但是，数据类型没有定义，因为 Python 解释器已经能够理解提供的值是一个整数。


    ## 理解数据类型


    Python 程序员在其应用程序中常用的数据类型。


    ## Python 字符串


    字符串是通常用于表示一串文本的数据类型。程序员可以使用字符串数据类型通过将它们与单引号链接来表示程序中的文本。每当创建字符串数据类型时，都会设计一个由字符序列组成的
    `str` 对象。


    人类通常通过文本相互交流；因此，字符串是开发人员需要了解的最关键的数据类型，以便创建有意义的软件。用字符串表示数据也很重要，因为计算机总是以二进制形式理解数据；因此，使用
    ASCII 和 Unicode 编码机制至关重要。


    Python 3 引入了一种高级编码机制来理解外语，如中文、日文和韩文，这使得字符串的使用对于软件开发至关重要。


    字符串如何表示？


    ```

    x = ‘This is an example’

    print(x)

    ```


    **输出：**


    This is an example


    单引号之间的所有内容都属于字符串数据类型。此字符串数据使用变量 `x` 定义。具有字符串数据类型的变量的内存位置和大小通常由变量占用的位数决定。字符串数据类型中的字符数与位数成正比。


    例如，在上面的示例中，`''This is an example''` 有 18 个字符，包括空格。


    作为 Python 程序员，还有其他几种定义字符串的方法。为了保持一致性，在实际项目中工作时，请始终根据您的方便使用单一类型。


    **程序代码：**


    ```

    a = "This is an example"

    #使用双引号定义字符串

    print(a)

    b = """This is an example"""

    # 使用三个单引号定义字符串

    print(b)

    c = ''''''This is an example

    but with more than one line''''''

    print(c)

    ```


    **输出：**


    This is an example

    This is an example

    This is an example but with more than one line


    在上面的示例程序中，我们定义了三种定义字符串的方法。您还可以在引号之间使用特殊字符、符号和新的制表符行。Python 支持所有其他编程语言使用的转义序列。例如，`\n`
    是程序员用于创建新行的常用转义序列。


    ## 如何访问字符串中的字符？


    由于字符串是 Python 中最常用的数据类型，核心库提供了几个内置函数，可用于有效地处理字符串数据。


    您需要知道索引号才能访问字符串中的字符。索引号通常从 0 开始，而不是 1。您还可以使用负索引和切片操作来访问字符串的一部分。


    ## 示例：


    ```

    first = ‘Programming’

    # 我们现在可以从字符串中访问字符

    print(‘Example used =’, first)

    # 将打印整个字符串

    print(‘first character =’, first[0])

    # 将打印第一个字符

    print(‘last character =’, first[-1])

    #将使用负索引打印最后一个字符

    print(‘last character =’, first[10])

    #将使用正索引打印最后一个字符

    print(‘Sliced character =’, first[0:2])

    # 将打印从零到第三个索引的切片字符。

    ```


    **输出：**


    Example used = Programming

    first character = P

    last character = g

    Last character = g

    Sliced character = Pro


    由于所有字符串数据类型都是不可变的，因此无法替换字面字符串中的字符。如果您尝试替换字符串字符，它将输出类型错误。


    **程序代码：**


    ```

    first = ‘programming’

    first[1] = ‘c’

    print(first)

    ```


    **输出：**


    **TypeError – You can’t replace string characters**


    ## Python 字符串格式化器


    有时您可能想要在字符串旁边打印变量。您可以使用逗号或字符串格式化器来实现相同的结果。


    ```

    >>> city=‘Ahmedabad’

    >>> print("Age", 21, "City", city)

    ```


    **输出：**


    Age 21 City Ahmedabad


    ### 1. f-strings


    字母 `f` 位于字符串之前，变量在各自的位置用大括号括起来。


    ```

    >>> name=''Ayushi''

    >>> print(f"It isn''t {name}''s birthday")

    ```


    **输出：**


    It is not Ayushi’s birthday


    因为我们想要字符串中的两个单引号，所以我们使用双引号来分隔整个序列。


    ### 2. format() 技术


    您可以使用 `format()` 技术执行相同的操作。它位于字符串之后，变量以逗号分隔作为参数。


    要在字符串中定位变量，请使用大括号。您可以在大括号中放入 `0`、`1`、... 或变量。


    在实现后者时，您必须使用格式化技术为它们分配值。


    ```

    >>> print("I love {0}".format(a))

    ```


    **输出：**


    I love dogs


    ```

    >>> print("I love {a}".format(a=''cats''))

    ```


    **输出：**


    I love cats


    变量不必在 print 语句之前定义。


    ```

    >>> print("I love {b}".format(b=''ferrets''))

    ```


    **输出：**


    I love ferrets


    ### 3. % 运算符


    在字符串中，百分号运算符位于变量所在的位置。字母 `s` 代表百分号中的字符串。


    变量和运算符位于字符串后面的括号中/元组中。


    ```

    >>> b=''ferrets''

    >>> print("I love %s and %s" %(a,b))

    ```


    **输出：**


    I love dogs and cats


    其他选项包括：


    - `%f` – 用于浮点数

    - `%d` – 用于整数


    ## 字符串操作技术


    字符串是最常用的数据类型，因此 Python 核心库提供了几种程序员可以利用的操作技术。理解字符串操作技术可以帮助您从大量信息中快速提取数据。数据科学家应该更了解这些技术。


    ### 1. 连接


    连接是指连接两个独立的实体。通过此过程，可以使用算术运算符 `+` 将两个字符串连接在一起。如果您想要更好的字符串可读性，可以在两个字符串之间使用空格。


    **程序代码：**


    ```

    example = ''This is'' + ''a great example''

    print(example)

    ```


    **输出：**


    This is a great example


    请记住，当您连接时，不会提供空格。您需要在连接时自己添加空格，如下所示。


    **程序代码：**


    ```

    example = ''This is'' + '' '' + ''a great example''

    print(example)

    ```


    **输出：**


    This is a great example


    ### 2. 乘法


    当您使用字符串乘法技术时，您的字符串值将连续重复。要乘以字符串内容，我们可以使用 `*` 运算符。


    **程序代码：**


    ```

    example = '' Great'' * 4

    print(example)

    ```


    **输出：**


    Great Great Great Great


    ### 3. 追加


    借助此操作，您可以使用算术运算符 `+=` 将任何字符串添加到另一个字符串的末尾。'
