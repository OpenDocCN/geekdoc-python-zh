    ## 第7章：Python中的数据结构


    Python程序员经常需要处理大量数据，因此一直使用变量并不是一个推荐的选项。特别是数据科学家，他们经常需要处理海量数据，可能会被他们正在处理的动态数据量所淹没。为了帮助从事复杂且数据密集型项目的程序员，利用Python核心库提供的列表选项至关重要。这些列表类似于C和C++等核心编程语言中可用的数组等数据结构。


    理解Python提供的几种数据结构，并学习使用这些数据结构添加或修改数据的技术，是Python程序员的基本前提。


    ## 列表


    列表是一种Python数据类型，支持按顺序添加不同的数据类型。列表具有变量拥有的所有属性。借助Python核心库的多种方法，它们可以轻松地被替换、传递或操作。


    列表在Python中通常表示如下：


    ```

    [32, 33, 34]

    ```


    这里32、33和34是列表元素。同样重要的是要理解，所有列表元素都是整数数据类型，并且没有被显式定义，因为Python解释器可以检测它们的数据类型。


    如果你观察，列表以上述格式以方括号开始和结束。列表中的所有元素也将使用逗号分隔。同样重要的是要注意，如果列表中的元素是字符串数据类型，那么它们通常用引号括起来。特定列表中的所有元素也可以称为项目。


    示例：


    ```

    [Nevada, Ohio, Colorado]

    ```


    这里Nevada、Ohio和Colorado被称为列表的元素。


    所有列表都可以赋值给一个变量，如下所示，并附有示例。


    ```

    sample = [ ''Nevada'', ''Ohio'', ''Colorado'']

    ```


    当你打印变量时，列表将像任何其他数据类型一样被打印。


    **程序代码：**


    ```

    sample

    ```


    输出：


    ```

    [ Nevada, Ohio, Colorado ]

    ```


    ### 空列表


    如果Python列表中没有元素，它可以被称为空列表。空列表通常也被称为null列表。


    它通常表示为[]。


    **程序代码：**


    ```

    >>> example = []

    ```


    这是一个空的Python列表。


    ## 列表中的索引


    Python提供了一种简单的方法来操作或替换列表中的元素，特别是借助索引的使用。索引通常从0开始，并为Python程序员提供许多功能，例如切片和搜索，以确保程序正常运行。


    假设有一个我们之前使用过的列表


    [''Ohio'', ''Nevada'', ''Colorado'']


    我们将在计算机屏幕上打印每个索引。


    **程序代码：**


    ```

    >>> example = [''Ohio'', ''Nevada'', ''Colorado'']

    >>> example[0]

    >>> example[1]

    >>> example[2]

    ```


    **输出：**


    Ohio

    Nevada

    Colorado


    当Python解释器在上面的示例中检测到0作为索引时，它将打印第一个元素。随着索引的增加，列表中的位置也会增加。


    我们也可以如下所示调用列表中的项目，并附带一个字符串字面量。


    **程序代码：**


    ```

    example = [''Ohio'', ''Nevada'', ''Colorado'']

    print( example[2] + '' is a great city'' )

    ```


    调用列表时，如果提供的索引值高于列表中存在的元素，将输出索引错误。


    **程序代码：**


    ```

    example = [''Ohio'', ''Nevada'', ''Colorado'']

    print(example[3])

    ```


    **输出：**


    **索引错误：列表索引超出范围**


    注意：同样重要的是要记住，你不能使用浮点数作为索引值。


    **程序代码：**


    ```

    example = [''Ohio'', ''Nevada'', ''Colorado'']

    print(example[3.2])

    ```


    **输出：**


    **类型错误：不能使用浮点索引作为索引值**


    所有列表都可以有其他列表作为其元素，如下所示。列表内的所有列表被称为子列表。


    **程序代码：**


    ```

    x = [1,223,2,45,63,22]

    print(x)

    ```


    **输出：**


    **[1, 223, 2, 45, 63, 22]**


    你可以使用‘list [ ][ ]’格式调用子列表中的元素。


    **程序代码：**


    ```

    x = [1,223,2,45,63,22]

    print(x[0:3][2])

    ```


    **输出：**


    2


    如上面的示例所示，第二个列表中的第三个元素是22，并显示为输出。


    你也可以使用负索引调用列表中的元素。通常，-1指的是最后一个索引，而-2指的是最后一个元素之前的元素。


    **程序代码：**


    ```

    example = [''Ohio'', ''Nevada'', ''Colorado'']

    print(example[-1])

    ```


    **输出：**


    **Colorado**


    ## 元组


    尽管列表是Python程序员经常在应用程序中使用的著名数据结构，但在实现它们时仍然存在一些问题。由于使用Python创建的所有列表都是可变对象，因此很容易替换、删除或操作它们。


    作为软件开发人员，你可能需要维护不可变的列表，这些列表不能以任何方式被操作。这就是元组进入讨论的原因。在元组中，不可能以任何方式更改已初始化的元素。每当尝试更改元组中的内容时，都会显示“类型错误”作为输出。


    **程序代码：**


    ```

    example = ( ''Earth'' , ''Venus'' , ''Mars'')

    print(example)

    ```


    ### 使用Python创建元组


    **输出：**


    (''Earth'', ''Venus'', ''Mars'')


    在上面的示例中，我们只是初始化了一个元组，并使用print函数将其输出到屏幕上。


    注意：

    记住，与列表不同，元组不是使用方括号表示的，而是使用圆括号表示的，以便轻松地与列表区分开来。

    要理解元组的工作原理，尝试更改上面示例中的一个元素并打印元组以观察发生了什么。


    **程序代码：**


    ```

    example = ( ''Earth'' , ''Venus'' , ''Mars'')

    print(example)

    # 使用Python创建元组

    example[2] = ''Jupiter''

    print(example)

    ```


    **替换元素后打印元组详情**


    **输出：**


    (''Earth'', ''Venus'', ''Mars'')

    **类型错误：‘tuple’对象不支持项赋值**


    在上面的示例中，一旦元组的元素被更改，解释器就会向开发人员抛出一个错误。这证明了元组中的所有元素都是不可变的，不能被替换、删除或添加。


    ### 连接元组


    就像我们执行的许多列表操作一样，我们可以使用元组来处理特定的操作。


    例如，就像列表一样，你可以使用Python添加或乘以元组中的元素。


    **程序代码：**


    ```

    sample1 = ( 45,34,23)

    sample2 = ( 32,12,11)

    print( sample1 + sample2)

    # 我们现在正在添加两个元组

    ```


    **输出：**


    ```

    (45,34,23,32,12,11)

    ```


    在上面的示例中，两个元组使用加法运算符连接。同样，你可以使用乘法运算符快速增加元组中的元素。


    我们还可以将其他元组放在元组内。这个过程通常被称为嵌套元组。


    **程序代码：**


    ```

    A = ( 23, 32,12)

    B = ( ''Tokyo'', ''Paris'', ''Washington'')

    C = ( A,B)

    print(C)

    ```


    **输出：**


    ```

    ((23,32,12), (''Tokyo'', ''Paris'', ''Washington''))

    ```


    在上面的示例中，两个元组嵌套在另一个元组中。


