    # ## GitHub for Programmers


    GitHub is important for programmers as it makes it easy to work remotely with
    teams. GitHub depends on a GIT repository that is peer-to-peer based, and hence
    your code changes will be reflected in your teammates’ computers as soon as they
    connect to the internet.


    GitHub offers two versions - free and professional versions. When you use the
    free version of GitHub, all your code will be available to everyone who can access
    Github. However, with a professional version, your code will be private, and only
    your team members can access the code. All private repositories use high encryption
    algorithms to protect your data.


