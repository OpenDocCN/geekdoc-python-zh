    ## Copying files and folders


    Usually, you can easily copy, paste or cut files and folders using the default
    file manager functionalities such as Windows Explorer and Mac finder. However,
    developers creating Python software need to use a built-in library known as shutil
    to create programming components that can be used to copy, move, or delete files
    quickly.


    To use the default functions present in the shutil library, you must first import
    them.


    ### Syntax:


    ```

    import shutil

    ```


    ### Copying Files or Folders


    To copy files or folders from one location to another, you can simply use shutil.copy()
    function. This function usually has two parameters: the source of the file and
    the second parameter being the destination of the file.


    ### Example:


    ```

    shutil.copy ( '' C: \ user1 \ python \ sample.txt'' , ''C: \ user2\ python'')

    ```


    In the above example, a file named sample.txt present in the Python folder of
    the user1 directory is copied to the python folder in the user2 directory.


    If you want to copy the file to a new file according to your choice, then you
    may need to define the file name in the second parameter, as shown below.


    ### Example:


    ```

    shutil.copy ( '' C: \ user1 \ python \ sample.txt'' , ''C: \ user2\ python\ sample1.txt'')

    ```


    All the file contents in the sample.txt file will be copied and added to the sample1.txt
    file.


    ## Moving and Renaming Files and Folders


    Moving a file or folder takes less time but is considered a bit risky compared
    to copying files as you will not have a backup copy. When you move your files,
    they will be deleted entirely from the current directory and transferred to the
    new directory you provided.


    Python programmers can use shutil.move() function to quickly move files from one
    location to another.


    **Program Code:**

    ```

    shutil.move ( '' C: \ user1 \ python \ sample.txt'' , ''C: \ user2\ python'')

    ```


    The above example will move the file ‘sample1.text’ to another directory.


    If you are worried about having a file with the same name in the directory you
    are trying to save, you can use the syntax below.


    **Program Code:**

    ```

    shutil.move ( '' C: \ user1 \ python \ sample.txt'' , ''C: \ user2\ python.txt'')

    ```


    The above example can also be called a simple renaming of the moved file.


