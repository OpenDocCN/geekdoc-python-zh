    \ number=2)\n```\n\n### Output:\n\nArgentina has won FIFA 4 times\nEngland has\
    \ won FIFA 2 times\n\nHere, parameter = argument is the format by which keyword\
    \ arguments have been defined. For example, in country = 'Argentina', country\
    \ is the parameter, whereas 'Argentina' is the given argument.\n\n## Understanding\
    \ Modules\n\nA group of meaningful functions usually form modules in a programming\
    \ language. Whenever you want to use these groups of functions in any software\
