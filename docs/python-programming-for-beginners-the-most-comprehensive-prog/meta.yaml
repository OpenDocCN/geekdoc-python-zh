    ## 复制文件和文件夹


    通常，你可以使用默认的文件管理器功能（如Windows资源管理器和Mac Finder）轻松地复制、粘贴或剪切文件和文件夹。但是，创建Python软件的开发人员需要使用名为shutil的内置库来创建可用于快速复制、移动或删除文件的编程组件。


    要使用shutil库中存在的默认函数，你必须首先导入它们。


    ### 语法：


    ```

    import shutil

    ```


    ### 复制文件或文件夹


    要将文件或文件夹从一个位置复制到另一个位置，你可以简单地使用shutil.copy()函数。此函数通常有两个参数：文件的源和第二个参数是文件的目标。


    ### 示例：


    ```

    shutil.copy ( '' C: \ user1 \ python \ sample.txt'' , ''C: \ user2\ python'')

    ```


    在上面的示例中，名为sample.txt的文件（位于user1目录的Python文件夹中）被复制到user2目录的python文件夹中。


    如果你想根据自己的选择将文件复制到新文件，那么你可能需要在第二个参数中定义文件名，如下所示。


    ### 示例：


    ```

    shutil.copy ( '' C: \ user1 \ python \ sample.txt'' , ''C: \ user2\ python\ sample1.txt'')

    ```


    sample.txt文件中的所有文件内容将被复制并添加到sample1.txt文件中。


    ## 移动和重命名文件和文件夹


    移动文件或文件夹比复制文件花费的时间少，但被认为有点风险，因为你将没有备份副本。当你移动文件时，它们将从当前目录中完全删除，并传输到你提供的新目录。


    Python程序员可以使用shutil.move()函数快速将文件从一个位置移动到另一个位置。


    **程序代码：**

    ```

    shutil.move ( '' C: \ user1 \ python \ sample.txt'' , ''C: \ user2\ python'')

    ```


    上面的示例将把文件‘sample1.text’移动到另一个目录。


    如果你担心在要保存的目录中存在同名文件，可以使用下面的语法。


    **程序代码：**

    ```

    shutil.move ( '' C: \ user1 \ python \ sample.txt'' , ''C: \ user2\ python.txt'')

    ```


    上面的示例也可以称为对移动文件的简单重命名。


    ## 删除文件和文件夹


    Python还为开发人员提供了三种不同的函数，以便根据他们的方便删除文件。


    - os.unlink(path) – 此函数将仅删除路径中提供的文件


    **示例：**

    ```

    os.unlink('' C: \ user1\ python1\ arithmetic.txt'')

    ```


    名为arithmetic.txt的文件将被永久删除。


    - os.rmdir(path)'
