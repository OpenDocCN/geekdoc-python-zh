    \ in the module and add additional capabilities on top of it.\n\n### Syntax:\n\
    \n```\nimport { Name of the module }\n```\n\n### Example:\n\n```\nimport clock\n\
    ```\n\nThe above syntax will import all the inbuilt functions present in the clock\
    \ module to your program; hence, you can now provide your own arguments to these\
    \ methods.\n\n## What Does Import Do?\n\nImport is an inbuilt Python library function\
    \ that copies all the functions in a specific file and links it to your current\
    \ file. It gives you permission to use methods that don't belong to the present\
    \ file. Creating modules will help you stop writing the same code repeatedly.\n\
    \n## How to Create Modules?\n\nWhile importing modules from third-party libraries\
    \ and frameworks saves you time, you must be aware of creating modules on your\
    \ own as a developer.\n\nLet us suppose you are making a web application for a\
    \ torrent service. You now need to write a lot of functions to make the application\
    \ work. For better organization, you can create a networking module and enter\
