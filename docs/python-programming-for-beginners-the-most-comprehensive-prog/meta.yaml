    a tuple are immutable and cannot be replaced, deleted, or added.


    ### Concatenating Tuples


    Like the many list operations we have performed, we can use Tuples to work on
    specific operations.


    For example, just like lists, you can add or multiply the elements in a tuple
    using Python.


