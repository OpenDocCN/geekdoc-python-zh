  mdcn: "## 位置参数\n\n使用位置参数时，程序员通常直接为函数参数提供值。这可能看起来令人困惑，但许多程序员经常使用它，因为它更容易实现。使用位置参数时，有必要记住传递它们的顺序。\n\
    \n### 程序代码：\n\n```python\ndef football(country, number):\n    # This describes\
    \ how many times a country has won a FIFA world cup\n    print(country + \" has\
    \ won FIFA \" + number + \" times\")\n\nfootball('Argentina', 4)\nfootball('England',\
    \ 2)\n```\n\n### 输出：\n\nArgentina has won FIFA 4 times\nEngland has won FIFA 2\
    \ times\n\n在上面的例子中，第一个例子的参数是 'Argentina' 和 4。由于没有提供数据类型，Python 解释器将自动确定值类型并将其传递给函数。\n\
    \n由于程序员没有明确的方法来理解他们想要使用的数据类型，因此参数名称起着重要作用。只需一眼，你就可以理解一个国家使用的是字面字符串，而一个数字使用的是整数数据类型。通常用逗号分隔所有参数。\n\
    \n如下所示，使用位置参数时很容易出错。\n\n### 程序代码：\n\n```python\ndef football(country, number):\n\
    \    # This describes how many times a country has won a FIFA world cup\n    print(country\
    \ + \" has won FIFA \" + number + \" times\")\n\nfootball(4, 'Argentina')\nfootball(2,\
    \ 'England')\n```\n\n### 输出：\n\n4 has won FIFA Argentina times\n2 has won FIFA\
    \ England times\n\n虽然函数提供了输出，但上述输出没有意义，因为参数被提供给了相反的参数。\n为了解决位置参数的这些小问题，开发人员可以使用关键字参数来定义函数参数。\n\
    \n## 关键字参数\n\n使用关键字参数，你可以直接将参数传递给函数参数。关键字参数使用 `参数 = 值` 的格式为任何函数提供参数。\n关键字参数引起的混淆较少，但实现起来需要更多时间，因此在涉及大量代码的复杂项目中工作的开发人员并不经常使用它们。\n\
    \n### 程序代码：\n\n```python\ndef football(country, number):\n    # This describes\
    \ how many times a country has won a FIFA world cup\n    print(country + \" has\
    \ won FIFA \" + number + \" times\")\n\nfootball(country='Argentina', number=4)\n\
    football(country='England', number=2)\n```\n\n### 输出：\n\nArgentina has won FIFA\
    \ 4 times\nEngland has won FIFA 2 times\n\n这里，`参数 = 参数值` 是定义关键字参数的格式。例如，在 `country\
    \ = 'Argentina'` 中，`country` 是参数，而 `'Argentina'` 是给定的参数值。\n\n## 理解模块\n\n一组有意义的函数通常在编程语言中形成模块。每当你想在任何软件组件中使用这些函数组时，你只需导入模块并使用你的参数调用函数即可。\n\
    \n在 Python 中导入模块比传统的 C 和 C++ 等语言要好得多。许多程序员导入模块以使用模块中的方法，并在其基础上添加额外的功能。\n\n###\
    \ 语法：\n\n```\nimport { 模块名称 }\n```\n\n### 示例：\n\n```\nimport clock\n```\n\n上述语法将把\
    \ `clock` 模块中存在的所有内置函数导入到你的程序中；因此，你现在可以为这些方法提供你自己的参数。\n\n## 导入的作用是什么？\n\n`import`\
    \ 是一个内置的 Python 库函数，它复制特定文件中的所有函数并将其链接到你当前的文件。它允许你使用不属于当前文件的方法。创建模块将帮助你避免重复编写相同的代码。\n\
    \n## 如何创建模块？\n\n虽然从第三方库和框架导入模块可以节省你的时间，但作为开发人员，你必须了解如何自己创建模块。\n\n假设你正在为一个种子服务制作一个\
    \ Web 应用程序。你现在需要编写大量函数才能使应用程序工作。为了更好地组织，你可以创建一个网络模块，并将所有与网络相关的函数输入到此模块中。接下来，你可以创建一个与\
    \ GUI 相关的模块和多个函数，以帮助你创建一个外观良好的应用程序。\n\n## 如何创建？\n\n要创建一个 Python 模块，你首先需要创建一个扩展名为\
    \ `.py` 的文本文件。\n\n创建 `.py` 文件后，你现在可以在此文件中输入所有函数。\n\n例如，你可以将下面用于两个数字相乘的函数添加到我们刚刚创建的\
    \ `.py` 模块中。\n\n### 文件 – samplemodule.py\n\n```python\ndef product(x, y):\n  \
    \  # This can be used to create a product between two numbers\n    z = x * y\n\
    \    return z\n```\n\n模块创建后，我们将展示一个导入上述函数的示例程序。\n\n### 程序代码：\n\n```python\nimport\
    \ samplemodule\n```\n\n点击回车按钮，现在该特定模块中的所有函数都可以供从事其他项目的 Python 程序员访问。\n\n### 程序代码：\n\
    \n```python\nsamplemodule.product(3, 6)\n```\n\n### 输出：\n\n18\n\n程序将自动检测 `product`\
    \ 函数，并根据提供的参数，乘积将显示在计算机屏幕上。\n\n## 内置函数和模块\n\n开发人员在创建复杂和复杂的软件应用程序时可以利用多个内置函数和模块。虽然用户构建的函数非常强大，并提供了解决复杂问题的自由，但它们仍然难以实现，有时甚至是不必要的，因为内置函数可以为你完成工作。\n\
    \n1.  **print()**\n\n    这可能是 Python 库中最受欢迎的内置函数。从初学者到经验丰富的程序员，每个人都使用 `print()`\
    \ 语句将输出发送到计算机屏幕。通常，你想在屏幕上显示的内容应放在引号之间。\n\n    ### 程序代码：\n\n    ```python\n   \
    \ print(\"This is an example\")\n    ```\n\n    ### 输出：\n\n    This is an example\n\
    \n2.  **abs()**\n\n    此内置函数为任何整数数据类型提供绝对值。大多数情况下，如果提供负整数，此函数将使其变为正数。\n\n    ###\
    \ 程序代码：\n\n    ```python\n    x = -24\n    print(abs(x))\n    ```\n\n    ### 输出：\n\
    \n    24\n\n3.  **round()**\n\n    `round()` 是一个内置的数学函数，它为任何提供的浮点数提供最接近的整数。\n\n\
    \    ### 程序代码：\n\n    ```python\n    x = 2.46\n    y = 3.12\n    print(round(x))\n\
    \    print(round(y))\n    ```\n\n    ### 输出：\n\n    2\n    3\n\n4.  **max()**\n\
    \n    `max()` 是一个内置的 Python 函数，可用于输出一组数字中的最大数字。你可以将此函数用于任何数据类型，例如列表或变量。\n\n  \
    \  ### 程序代码：\n\n    ```python\n    A = 45\n    B = 43\n    C = 23\n    Solution\
    \ = max(A, B, C)\n    print(Solution)\n    ```\n\n    ### 输出：\n\n    45\n\n5.\
    \  **min()**\n\n    `min()` 是一个 Python 内置函数，可用于输出一组数字中的最小数字。\n\n    ### 程序代码：\n\
    \n    ```python\n    A = 45\n    B = 43\n    C = 23\n    Solution = min(A, B,\
    \ C)\n    print(Solution)\n    ```\n\n    ### 输出：\n\n    23\n\n6.  **sorted()**\n\
    \n    `sorted()` 是一个内置的 Python 函数，可以根据你的选择使用升序或降序对列表中的所有元素进行排序。\n\n    ### 程序代码：\n\
    \n    ```python\n    x = (2, 323, 21, 5, 242, 11)\n    y = sorted(x)\n    print(y)\n\
    \    ```\n\n    ### 输出：\n\n    [2, 5, 11, 21, 242, 323]\n\n7.  **sum()**\n\n \
    \   `sum()` 是一个特殊的内置函数，它将添加元组中存在的所有元素。确保在使用此内置函数之前，元组中的所有元素都是相同的数据类型。如果不是，程序将以类型错误结束，因为无法将两个不同数据类型的值相加。\n\
    \n    ### 程序代码：\n\n    ```python\n    x = (32, 43, 11, 12, 19)\n    y = sum(x)\n\
    \    print(y)\n    ```\n\n    ### 输出：\n\n    117\n\n8.  **len()**\n\n    `len()`\
    \ 是一个内置函数，提供有关列表或元组中元素数量的信息。\n\n    ### 程序代码：\n\n    ```python\n    x = (1, 23,\
    \ 32, 11, 12)\n    y = len(x)\n    print(y)\n    ```\n\n    ### 输出：\n\n    5\n\
    \n9.  **type()**\n\n    `type()` 内置函数将使用数据类型提供有关变量列表的信息。如果它是一个函数，那么还将显示有关参数和参数值的详细信息。\n\
    \n    ### 程序代码：\n\n    ```python\n    x = 23.2121\n    print(type(x))\n    ```\n\
    \n    ### 输出：\n\n    <class 'float'>\n\n## 字符串方法\n\n字符串是流行的数据类型，因此需要程序员比其他数据类型给予更多关注。Python\
    \ 核心库提供了数十种不同的内置函数，以帮助程序员充分利用使用字符串数据类型存储的数据。\n\n1.  **strip()**\n\n    `strip()`\
    \ 是一个内置的字符串函数，它删除作为函数参数提供的参数。所有存在参数的实例都将被剥离。\n\n    ### 程序代码：\n\n    ```python\n\
    \    x = \"Welcome\"\n    print(x.strip('me'))\n    ```\n\n    ### 输出：\n\n   \
    \ Welco"
