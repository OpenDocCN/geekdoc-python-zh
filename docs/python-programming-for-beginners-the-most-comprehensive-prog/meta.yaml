    \   ```python\n    x = -24\n    print(abs(x))\n    ```\n\n    ### Output:\n\n\
    \    24\n\n3.  **round()**\n\n    round() is an inbuilt mathematical function\
    \ that provides the closest integer number for any provided floating-point numbers.\n\
    \n    ### Program Code:\n\n    ```python\n    x = 2.46\n    y = 3.12\n    print(round(x))\n\
