    # ## What Is Object-Oriented Programming?


    OOP is a popular programming paradigm where classes and objects are used to group
    functions defined in a program into logical templates.


    A class consists of a group of data members or methods that can easily be accessed
    using a dot notation. Due to object behavior, classes are accessible to variables
    and methods outside the class.


