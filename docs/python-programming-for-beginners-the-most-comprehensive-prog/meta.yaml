- md: '## Chapter 4: What are Python Variables?


    Python programs need basic building blocks such as variables and operators to
    make them function as they are intended to. Both variables and operators are easy
    for beginners to understand the programming logic that can help them create algorithms
    essential for the functioning of complex software.


    ### Python Variables


    For creating any program, data needs to be handled effectively. Both users and
    the software interact with the help of data. Without data, software applications
    will not make sense and will not provide any purpose for the end-user. For the
    software applications to upload or download data, variables are used.


    The concept of variables was first used in a mathematical field called algebra
    to define values. Variables are not a new addition to the Python programming language.
    From the inception of high-level programming languages, variables are used to
    store data in a specific computer memory location. Initial adopters of computer
    programming faced difficulties extracting data based on computer memory information.
    Hence, they used the concept of variables from algebra to place values in computer
    memory and use them whenever they wanted.


    **For Example:**


    2x + 3y is a mathematical equation.


    1. If x = 3 and y = 4, then the result of the above statement will be 18.

    2. If x = 2 and y = 6, then the result of the above statement will be 22.


    In the same way, by using variables, you can change the program output by the
    literal values you give to them. All the variable values can be easily replaced.
    According to programming terminology, if you don’t want to replace the value of
    a variable, it should usually be called a constant.


    To understand how variables work, you first need to know how Python program execution
    works. We will make it straightforward for you with the help of using a print
    statement.


    **Program Code:**

    **print("This is a sample analysis.")**

    **Output:**

    **This is a sample analysis.**


    In the above example, the output will be immediately displayed when the print
    statement is entered on the computer screen and executed. But a lot happens backwards
    to reflect this output.


    What Happens?


    When the program is executed, it will read each line and match according to the
    libraries it was given access to.


    An interpreter often does this matching process with high parsing skills. It can
    not only determine what each character in the program represents but will also
    be able to match the variable details and pull the information that is present
    in this memory location to verify the program logic.


    Even after complex parsing, the program will throw errors or exceptions if the
    interpreter cannot find the methods or variables defined.


    In the above example, when the interpreter parses the print statement, it immediately
    recognizes that it is a core library method defined in the Python library and
    will output any string literals between parentheses.


    If you are entirely aware of the above explanation, it is now time to learn how
    variables work in Python.


    **Program Code:**


    ```

    program = "This is a simple analysis."

    print(program)

    ```


    **Output:**

    **This is a simple analysis.**


    What Happened?


    Once the program execution starts, the interpreter will usually parse all the
    lines of code that the programmer gives.


    Instead of just seeing a print statement followed by a text block, the interpreter
    now observes a particular identifier known as a variable with the name ‘program’.
    It searches the code before and finds that the variable is already defined with
    a text and stored at a particular memory location.


    Now the interpreter will print the variable on the screen as provided by the programmer
    by pulling the data defined in the variable.


    This is the primary mechanism with which variables work, even if they are used
    in complex code logic.


    The variable value will be changed instantly when they are replaced. This is important
    for a Python programmer because all dynamic programs change variables according
    to the user inputs and return them even when the program runs in real time.


    **Program Code:**


    ```

    sample = "This is an example"

    print(sample)

    sample = "This is a second example"

    print(sample)

    ```


    **Output:**

    This is an example

    **This is a second example**


    In the above example, as we know that the Python interpreter parses the code line
    by line sequentially, the first statement is printed with the first variable value
    provided, and the second print statement is published with the second variable
    value provided.


    ### Naming Variables


    All Python programmers must follow the default guidelines provided by the Python
    community while creating variables. Not following these conditions will throw
    your programs into errors that are hard to ignore or can sometimes make your application
    crash. Using a specific guideline while creating programs can also improve readability.


    Rules for Writing Variables:


    - According to Python guidelines, you can only use numbers, alphabetical characters,
    and an underscore to create variable names. For example, ‘sample1’ can be used
    as a variable name, whereas ‘$sample1’ cannot be used as a variable name because
    it starts with an unsupported symbol $.

    - Python programmers cannot start a variable name with a number. For example,
    ‘sample1’ is a supported variable naming format, whereas ‘1sample’ is not supported.

    - Python programmers cannot use reserved words allotted for various programming
    routines used for Python development. Currently, 33 reserved keywords are inaccessible
    for developers to use as identifiers while creating real-world applications with
    Python. For example, ‘for’ is a reserved keyword.

    - While this is not a rigid rule, it is always good to follow a simple variable
    naming method for better readability. Creating complex or confusing variable names
    can make your code look unpolished. While this practice suits high-level languages
    such as C, C++ and Perl, Python doesn’t endorse this philosophy.


    ### How to Define Variables?


    All the variables defined in Python programming language use the assignment operator
    (=) to initiate a value to the variable first.


    **Syntax Format:**

    Nameofthevariable = valueofthevariable


    **For Example:**


    ```

    example = 343

    # This is a variable with an integer data type

    example1 = "Russia"

    # This is a variable with a string data type

    ```


    An example is the name of the variable we have created, and 343 is the variable
    value we have given during its initiation.


    Look at the variable-defining method above, where we did not explicitly mention
    any variable data type because Python is intelligent enough to understand the
    varying data types automatically.


    ### How to Find the Memory Address of Variables?


    All variables are stored in a specific memory location. Whenever you call the
    variable name, the Python interpreter will pull the information present in this
    memory location. If you ask the Python interpreter to replace the variable, it
    will just remove the already placed variable value and replace it with the new
    variable value. The old variable value will be deleted or stored using a garbage
    mechanism for future use cases.


    Usually, programming languages such as C use pointers to quickly determine and
    pull the information about the variable’s memory location. However, Python doesn’t
    support pointers as it is often challenging to implement and needs a lot of compilation
    skills that the interpreter is usually unaware of.


    Instead, Python developers can use the built-in id() function to get the memory
    address of the variable easily.


    **Program Code:**


    ```

    sample = 64

    # First, create a variable of your favorable data type

    id(sample)

    # Now call using this built-in function called id()

    ```


    **Output:**

    **1x37372829x**

    Here, 1x37372829x is the memory location of the variable in hexadecimal format.


    Using the method below, you can now replace the variable and check whether the
    id() has been changed or not.


    **Program Code:**


    ```

    sample = 64

    id(sample)

    sample = 78

    # Now, we have replaced the variable value with a new one

    id(sample)

    # This will again print the output of the memory location address

    ```


    **Output:**

    **1x37372829x**

    If you have observed, the memory location did not change, but with a small print
    verification, you can see that the variable value is changed.


    **Program Code:**


    ```

    sample = 64

    id(sample)

    sample = 78

    print(sample)

    ```'
  mdcn: '## 第四章：什么是 Python 变量？


    Python 程序需要变量和运算符等基本构建块才能按预期运行。变量和运算符都易于初学者理解编程逻辑，这有助于他们创建对复杂软件运行至关重要的算法。


    ### Python 变量


    要创建任何程序，都需要有效地处理数据。用户和软件都通过数据进行交互。没有数据，软件应用程序将毫无意义，也无法为最终用户提供任何用途。为了使软件应用程序能够上传或下载数据，需要使用变量。


    变量的概念最初用于代数这一数学领域来定义值。变量并不是 Python 编程语言的新成员。从高级编程语言诞生之初，变量就被用于将数据存储在特定的计算机内存位置。早期的计算机编程采用者在根据计算机内存信息提取数据时遇到了困难。因此，他们借鉴了代数中的变量概念，将值放入计算机内存，并在需要时使用它们。


    **例如：**


    2x + 3y 是一个数学方程式。


    1.  如果 x = 3 且 y = 4，那么上述表达式的结果将是 18。

    2.  如果 x = 2 且 y = 6，那么上述表达式的结果将是 22。


    同样，通过使用变量，你可以通过赋予它们的字面值来改变程序输出。所有变量值都可以轻松替换。根据编程术语，如果你不想替换变量的值，它通常应该被称为常量。


    要理解变量的工作原理，你首先需要了解 Python 程序的执行过程。我们将借助 print 语句为你简化说明。


    **程序代码：**

    **print("This is a sample analysis.")**

    **输出：**

    **This is a sample analysis.**


    在上面的例子中，当 print 语句在计算机屏幕上输入并执行时，输出将立即显示。但为了呈现这个输出，后台发生了许多事情。


    发生了什么？


    当程序执行时，它将逐行读取，并根据其被赋予访问权限的库进行匹配。


    解释器通常使用高超的解析能力来完成这个匹配过程。它不仅能确定程序中每个字符的含义，还能匹配变量详情，并从该内存位置提取信息以验证程序逻辑。


    即使经过复杂的解析，如果解释器找不到定义的方法或变量，程序也会抛出错误或异常。


    在上面的例子中，当解释器解析 print 语句时，它立即识别出这是 Python 库中定义的一个核心库方法，并将输出括号之间的任何字符串字面量。


    如果你完全理解了上述解释，现在是时候学习变量在 Python 中是如何工作的了。


    **程序代码：**


    ```

    program = "This is a simple analysis."

    print(program)

    ```


    **输出：**

    **This is a simple analysis.**


    发生了什么？


    一旦程序开始执行，解释器通常会解析程序员提供的所有代码行。


    解释器现在观察到的不再是一个后跟文本块的 print 语句，而是一个名为 ''program'' 的特定标识符，即变量。它会在代码中搜索，并发现该变量已经用一段文本定义并存储在特定的内存位置。


    现在，解释器将通过提取变量中定义的数据，按照程序员的指示在屏幕上打印该变量。


    这就是变量工作的基本机制，即使它们被用于复杂的代码逻辑中也是如此。


    当变量被替换时，其值会立即更改。这对 Python 程序员来说很重要，因为所有动态程序都会根据用户输入更改变量，并在程序实时运行时返回它们。


    **程序代码：**


    ```

    sample = "This is an example"

    print(sample)

    sample = "This is a second example"

    print(sample)

    ```


    **输出：**

    This is an example

    **This is a second example**


    在上面的例子中，正如我们所知，Python 解释器按顺序逐行解析代码，第一条语句使用提供的第一个变量值进行打印，第二条 print 语句则使用提供的第二个变量值进行打印。


    ### 变量命名


    所有 Python 程序员在创建变量时都必须遵循 Python 社区提供的默认指南。不遵守这些条件将导致你的程序出现难以忽视的错误，有时甚至会使你的应用程序崩溃。在创建程序时使用特定的指南也可以提高可读性。


    编写变量的规则：


    -   根据 Python 指南，你只能使用数字、字母字符和下划线来创建变量名。例如，''sample1'' 可以用作变量名，而 ''$sample1''
    不能用作变量名，因为它以不支持的符号 $ 开头。

    -   Python 程序员不能以数字开头命名变量。例如，''sample1'' 是支持的变量命名格式，而 ''1sample'' 则不支持。

    -   Python 程序员不能使用为 Python 开发中使用的各种编程例程保留的保留字。目前，有 33 个保留关键字，开发者在使用 Python 创建实际应用程序时无法将其用作标识符。例如，''for''
    是一个保留关键字。

    -   虽然这不是一个严格的规则，但遵循简单的变量命名方法总是有益的，可以提高可读性。创建复杂或令人困惑的变量名会使你的代码看起来不专业。虽然这种做法适用于
    C、C++ 和 Perl 等高级语言，但 Python 并不推崇这种理念。


    ### 如何定义变量？


    Python 编程语言中定义的所有变量都使用赋值运算符 (=) 首先为变量赋值。


    **语法格式：**

    变量名 = 变量值


    **例如：**


    ```

    example = 343

    # 这是一个整数数据类型的变量

    example1 = "Russia"

    # 这是一个字符串数据类型的变量

    ```


    example 是我们创建的变量名，343 是我们在初始化时赋予的变量值。


    看看上面的变量定义方法，我们没有明确提及任何变量数据类型，因为 Python 足够智能，可以自动理解不同的数据类型。


    ### 如何查找变量的内存地址？


    所有变量都存储在特定的内存位置。每当你调用变量名时，Python 解释器就会提取该内存位置中存在的信息。如果你要求 Python 解释器替换变量，它只会移除已放置的变量值，并用新的变量值替换它。旧的变量值将被删除或使用垃圾回收机制存储以供将来使用。


    通常，像 C 这样的编程语言使用指针来快速确定和提取变量内存位置的信息。然而，Python 不支持指针，因为它通常难以实现，并且需要解释器通常不具备的大量编译技能。


    相反，Python 开发者可以使用内置的 `id()` 函数轻松获取变量的内存地址。


    **程序代码：**


    ```

    sample = 64

    # 首先，创建一个你喜欢的数据类型的变量

    id(sample)

    # 现在使用这个名为 id() 的内置函数进行调用

    ```


    **输出：**

    **1x37372829x**

    这里，1x37372829x 是变量的内存位置，以十六进制格式表示。


    使用下面的方法，你现在可以替换变量并检查 `id()` 是否已更改。


    **程序代码：**


    ```

    sample = 64

    id(sample)

    sample = 78

    # 现在，我们已经用新值替换了变量值

    id(sample)

    # 这将再次打印内存位置地址的输出

    ```


    **输出：**

    **1x37372829x**

    如果你观察到，内存位置没有改变，但通过一个小的打印验证，你可以看到变量值已经改变。


    **程序代码：**


    ```

    sample = 64

    id(sample)

    sample = 78

    print(sample)

    ```'
