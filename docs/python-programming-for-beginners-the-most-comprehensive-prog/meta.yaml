    ## Tuples


    Even though lists are famous data structures that Python programmers often use
    in their applications, they still have several problems while implementing them.
    As all the lists that can be created using Python are mutable objects, it becomes
    easy to replace, delete or manipulate them.


    As a Software developer, you may need to maintain immutable lists that cannot
    be manipulated in any way. This is where tuples come into the discussion. It is
    not possible to change initiated elements in any way within Tuples. A ” Type Error”
    will be shown as the output whenever you try to change the content within a tuple.


    **Program Code:**


    ```

    example = ( ''Earth'' , ''Venus'' , ''Mars'')

    print(example)

    ```


    ### Creating a tuple using Python


    **Output:**


    (''Earth'', ''Venus'', ''Mars'')


    In the above example, we just initiated a tuple and used a print function to output
    it onto the screen.


    Note:

    Remember that, unlike lists, tuples are not represented using square brackets
    but instead using parenthesis to differentiate them from lists easily.

    To understand how tuples work, try to change an element from the above example
    and print the tuple to observe what happens.


    **Program Code:**


    ```

    example = ( ''Earth'' , ''Venus'' , ''Mars'')

