    \    x = (2, 323, 21, 5, 242, 11)\n    y = sorted(x)\n    print(y)\n    ```\n\n\
    \    ### Output:\n\n    [2, 5, 11, 21, 242, 323]\n\n7.  **sum()**\n\n    sum()\
    \ is a particular built-in function that will add all the elements present in\
    \ a tuple. Make sure that before using this in-built function, all the elements\
