- md: '## Applications of Python


    Python marked its impact in different domains of modern science & technology.


    -   1. Web Domain


    Python as a programming language has made most of its initial impact on web technology.
    While Java was ruling the webspace, Python was not so popular. With time, several
    third-party frameworks such as Django and Tornado have helped Python to become
    popular with web developers.


    Fast forward two decades, Python is now one of the most popular scripting languages
    for websites, standing only next to Javascript. Several multinational companies
    such as Google, Facebook, and Netflix use Python in their software implementations.
    Django, a famous web framework, can help programmers to write backend code for
    several APIs.


    Python is also popular with automation, so bots such as Pinflux are often developed
    using it.


    -   2. Scientific Computing Domain


    Python is popular with the scientific community due to its open-source nature.
    Software such as Numpy and Scipy helps computer scientists to conduct computational
    experiments with less code. As Python also works better with mathematical calculations
    and software, there is no other alternative for Scientists other than Python these
    days.


    -   3. Machine Learning and Artificial Intelligence


    Both machine learning and Artificial intelligence are right now two combined technologies
    that offer more jobs to developers. Python has a lot of third-party libraries,
    such as Tensorflow, that is entirely focused on Machine learning algorithms implementation.


    Python also has excellent adaptability to Deep learning and Natural language processing
    technologies, making it one of the core contenders for becoming a better language
    for developing Artificial intelligence-related technology.


    -   4. Linux and Database Management


    With growing companies worldwide, there is a lot of demand for Develop engineers
    who can effectively manage databases and internal systems. While Develop engineers
    need to have enough knowledge about different operating systems such as Linux,
    they also need to have enough knowledge about Python to automate other procedures
    that are essential for checking the performance of methods on an internal network.


    ## Different Versions of Python


    Python is a general-purpose, high-level programming language. Guido Van Rossum
    developed it in the late 1980s and early 1990s. Python is a dynamic, interpreted
    programming language that allows code to be executed without being compiled into
    machine-readable instructions.


    The most popular versions of Python are 2.x and 3.x, but many professionals still
    use Python 2 because it’s less buggy than its successor (as well as has more libraries).
    However, Python 2.x is no longer being maintained so it won’t be updated with
    new features. Python 3.x is the best version to learn and use because it has the
    most developers’ support and many new features (it’s also backwards-compatible
    with Python 2.x).


    Python version summary:


    Python 2.x: This version is still widely used but will not be updated with new
    features because its creator (Guido Van Rossum) has abandoned it in favor of Python
    3.x.


    Python 3.x: This is the best version because it has many new features and is less
    buggy than Python 2.x.


    Python 2.7: This version is more popular than Python 3, but it’s still highly
    recommended to learn and use Python 3 instead. It’s also the default version for
    Windows, Linux, OS X, and UNIX systems; however, this rule has some exceptions
    (Microsoft Windows has not officially supported any version since Windows 10).


    Python 3.6: This version is most prevalent in academia but seems to have a smaller
    userbase than Python 2.x, especially in enterprise environments (it also has less
    support for Python 2).


    Python 3.5: A newer version of Python with many new features and bug fixes; it’s
    the most popular version nowadays. You can get more information about the various
    versions of Python here.


    Python 3.4: This version is still the alternative to Python 3.5 because Python
    2.x is no longer supported.


    Python 3.3: This was the last feature-complete version before Python 3 started
    to make significant changes; most were backwards incompatible with previous versions,
    and some have been removed (such as the set module).


    Python 2.7: This is the last version of Python that’s still compatible with Python
    3.x; however, it’s not as popular as Python 3.x and has less support in enterprise
    environments. This version targets new developers because it’s the default version
    in Cydia Impactor, an app that helps you install jailbroken iOS applications on
    your iPhone or iPad (and currently only supports Windows and Linux).


    ## What Are the Benefits?


    The benefits of Python include easy and interactive learning, readability, rapid
    development, and prototyping. This language supports modular programming, information
    hiding, object-oriented programming, dynamic typing, and automatic memory management.
    There are no limits on the expressiveness or complexity of your code. Python can
    serve as a scripting language for web applications; it has also been used for
    commercial products, web services, and to create desktop applications.


    ## Installing Python


    Since we have learned a little more about Python, it’s time to look at some of
    the steps involved in installing Python on your computer. You want to ensure that
    you can adequately navigate and install this program and that the correct version
    is installed on your computer at the appropriate time. This will make writing
    some of the necessary code easier without encountering too many roadblocks.


    ## Install the interpreter


    Before we can begin writing our first Python program, we must first download the
    Python interpreter appropriate for our computers. Python 3 will be used in this
    book because, as the official Python website stated, “Python 2.x is legacy; Python
    3.x is the language’s present and future.” Additionally, “Python 3 eliminates
    numerous quirks that can unnecessarily confuse inexperienced programmers.”


    However, it is worth noting that Python 2 is still quite popular. Python 2 and
    3 are approximately 90% identical. Thus, if you learn Python 3, you will almost
    certainly have no difficulty understanding Python 2 code. To download the Python
    3 interpreter, navigate to https://www.python.org/downloads/. At the top of the
    webpage, the correct version should be indicated. See the figure below:


    Figure 1:


    ![](img/dca8341b5fa71480a5d5c9fe04b9066e_16_0.png)


    Before any programmer can proceed through the remainder of this book and begin
    writing their Python code, it is necessary to go through various steps for running
    Python, which completes the installation. Python installation will vary according
    to the operating system installed on your computer and the installation source
    you choose.


    There are limited places where you can obtain information about this programming
    language, but we’re going to focus on www.python.org to make things easier. In
    this chapter, we’ll spend some time going over the various steps required to install
    the Python interpreter and more on all the major operating systems.


    First, locate the one compatible with your computer’s operating system. Then,
    follow these steps to obtain the desired results and install the Python programming
    language and all its associated software on your computer.


    ## Python Installation for MacOS


    MacOS is a working framework created by Apple Inc. It is the same as the Windows
    Operating System and another operational framework. The more significant part
    of the more current adaptations of MacOS has pre-installed Python. You can check
    whether the Python is installed or not by the accompanying directions.


    Download Python 3 or 2 new types. Python 3.6 or Python 2.7 was the fresher form
    at the hour of writing this. Download the Mac OS X 64-piece/32-piece installer.
    Run the bundle and follow the installation steps to install the Python bundles.


    -   Click on the “Downloads” icon from the official Python website and select
    Mac.

    -   Click on the “Download Python 3.8.0” button to view all the downloadable files.

    -   Different screen will come up, select the Python version you would like to
    download.'
  mdcn: '## Python 的应用领域


    Python 在现代科学技术的多个领域都留下了深刻的印记。


    -   1. Web 领域


    Python 作为一种编程语言，其最初的影响主要体现在 Web 技术领域。在 Java 统治网络空间的时代，Python 并不那么流行。随着时间的推移，Django
    和 Tornado 等多个第三方框架帮助 Python 在 Web 开发者中流行起来。


    快进二十年，Python 现已成为网站最受欢迎的脚本语言之一，仅次于 Javascript。谷歌、Facebook 和 Netflix 等多家跨国公司都在其软件实现中使用
    Python。著名的 Web 框架 Django 可以帮助程序员为多个 API 编写后端代码。


    Python 在自动化领域也很受欢迎，因此像 Pinflux 这样的机器人通常使用它来开发。


    -   2. 科学计算领域


    Python 因其开源特性而受到科学界的欢迎。Numpy 和 Scipy 等软件帮助计算机科学家用更少的代码进行计算实验。由于 Python 在数学计算和软件方面也表现得更好，如今科学家们除了
    Python 之外别无选择。


    -   3. 机器学习与人工智能


    机器学习和人工智能目前是两项结合的技术，为开发者提供了更多的工作机会。Python 拥有许多第三方库，例如完全专注于机器学习算法实现的 Tensorflow。


    Python 对深度学习和自然语言处理技术也具有出色的适应性，使其成为开发人工智能相关技术的更优语言的核心竞争者之一。


    -   4. Linux 与数据库管理


    随着全球公司的发展，对能够有效管理数据库和内部系统的开发工程师的需求很大。虽然开发工程师需要对 Linux 等不同操作系统有足够的了解，但他们也需要对 Python
    有足够的了解，以自动化检查内部网络上方法性能所必需的其他流程。


    ## Python 的不同版本


    Python 是一种通用、高级的编程语言。Guido Van Rossum 在 20 世纪 80 年代末和 90 年代初开发了它。Python 是一种动态、解释型的编程语言，允许代码在不编译成机器可读指令的情况下执行。


    Python 最流行的版本是 2.x 和 3.x，但许多专业人士仍然使用 Python 2，因为它比其后继版本错误更少（并且拥有更多库）。然而，Python
    2.x 不再维护，因此不会更新新功能。Python 3.x 是学习和使用的最佳版本，因为它拥有最多的开发者支持和许多新功能（它也向后兼容 Python 2.x）。


    Python 版本摘要：


    Python 2.x：此版本仍被广泛使用，但不会更新新功能，因为其创建者（Guido Van Rossum）已放弃它，转而支持 Python 3.x。


    Python 3.x：这是最佳版本，因为它具有许多新功能，并且比 Python 2.x 错误更少。


    Python 2.7：此版本比 Python 3 更受欢迎，但仍然强烈建议学习和使用 Python 3。它也是 Windows、Linux、OS X 和 UNIX
    系统的默认版本；然而，此规则有一些例外（Microsoft Windows 自 Windows 10 以来未正式支持任何版本）。


    Python 3.6：此版本在学术界最为普遍，但用户群似乎比 Python 2.x 小，尤其是在企业环境中（它对 Python 2 的支持也较少）。


    Python 3.5：一个较新的 Python 版本，具有许多新功能和错误修复；它是目前最受欢迎的版本。你可以在这里获取有关 Python 各个版本的更多信息。


    Python 3.4：此版本仍然是 Python 3.5 的替代方案，因为 Python 2.x 不再受支持。


    Python 3.3：这是 Python 3 开始进行重大更改之前的最后一个功能完整的版本；大多数与以前的版本向后不兼容，有些已被删除（例如 set 模块）。


    Python 2.7：这是最后一个仍与 Python 3.x 兼容的 Python 版本；然而，它不如 Python 3.x 流行，在企业环境中支持较少。此版本针对新开发者，因为它是
    Cydia Impactor 的默认版本，Cyd ia Impactor 是一个帮助你在 iPhone 或 iPad 上安装越狱 iOS 应用程序的应用程序（目前仅支持
    Windows 和 Linux）。


    ## 有什么好处？


    Python 的好处包括易于交互式学习、可读性、快速开发和原型设计。这种语言支持模块化编程、信息隐藏、面向对象编程、动态类型和自动内存管理。对代码的表达能力或复杂性没有限制。Python
    可以作为 Web 应用程序的脚本语言；它也已用于商业产品、Web 服务和创建桌面应用程序。


    ## 安装 Python


    既然我们已经对 Python 有了一些了解，现在是时候看看在计算机上安装 Python 所涉及的一些步骤了。你需要确保能够充分导航和安装此程序，并在适当的时间在计算机上安装正确的版本。这将使编写一些必要的代码更容易，而不会遇到太多障碍。


    ## 安装解释器


    在我们开始编写第一个 Python 程序之前，我们必须首先下载适合我们计算机的 Python 解释器。本书将使用 Python 3，因为正如 Python
    官方网站所述，“Python 2.x 是遗留版本；Python 3.x 是该语言的现在和未来。”此外，“Python 3 消除了许多可能不必要地混淆经验不足的程序员的怪癖。”


    然而，值得注意的是，Python 2 仍然相当流行。Python 2 和 3 大约有 90% 是相同的。因此，如果你学习 Python 3，你几乎肯定不会理解
    Python 2 代码有困难。要下载 Python 3 解释器，请导航到 https://www.python.org/downloads/。在网页顶部，应标明正确的版本。参见下图：


    图 1：


    ![](img/dca8341b5fa71480a5d5c9fe04b9066e_16_0.png)


    在任何程序员能够继续阅读本书的其余部分并开始编写他们的 Python 代码之前，必须经过运行 Python 的各种步骤，这完成了安装。Python 安装将根据计算机上安装的操作系统和选择的安装源而有所不同。


    你可以获取有关此编程语言信息的地方有限，但我们将专注于 www.python.org 以使事情变得更容易。在本章中，我们将花一些时间介绍安装 Python
    解释器所需的各种步骤，以及所有主要操作系统上的更多内容。


    首先，找到与计算机操作系统兼容的版本。然后，按照以下步骤获取所需结果并在计算机上安装 Python 编程语言及其所有相关软件。


    ## MacOS 的 Python 安装


    MacOS 是由 Apple Inc. 创建的工作框架。它与 Windows 操作系统和其他操作框架相同。大多数较新版本的 MacOS 都预装了 Python。你可以通过以下说明检查
    Python 是否已安装。


    下载 Python 3 或 2 的新版本。在撰写本文时，Python 3.6 或 Python 2.7 是较新的版本。下载 Mac OS X 64 位/32
    位安装程序。运行包并按照安装步骤安装 Python 包。


    -   从 Python 官方网站单击“Downloads”图标并选择 Mac。

    -   单击“Download Python 3.8.0”按钮以查看所有可下载文件。

    -   将出现不同的屏幕，选择你要下载的 Python 版本。'
