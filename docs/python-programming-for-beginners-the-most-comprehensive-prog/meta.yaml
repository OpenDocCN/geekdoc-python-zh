    To help programmers find their required software easily, Python provides package
    managers that developers can use to download package files into their operating
    system and immediately execute with the help of these managers. While there are
    many third-party package managers for Python, the default pip is the most popular
    one that every Python programmer needs to know.


    # What Can You Do With Pip?


    You can install new packages and dependencies.

    You can find an index to list all the Python package repositories available in
    pip servers.

    Use it to review the requirements before installing the software.

    Use it to uninstall any packages and dependencies that you no longer need.


    First, check whether or not pip is installed in your system. Typically, pip is
    included along with the Python package.


    # Terminal Code:


    ```

    $ pip —version

    ```


    The package manager is installed on your system if it prints out the pip version
    information details. If not, you may need to download it from the official website
    and install it manually.


    # How to Install Packages?


    You must always use the same syntax format shown below to install packages.


    ```

    $ pip install software name

    ```


    For example, if you want to install a package called “Tensorflow” into your system.
    Then you may need to use the below syntax.'
