    \n### Program Code:\n\n```python\ndef football(country, number):\n    # This describes\
    \ how many times a country has won a FIFA world cup\n    print(country + \" has\
    \ won FIFA \" + number + \" times\")\n\nfootball('Argentina', 4)\nfootball('England',\
    \ 2)\n```\n\n### Output:\n\nArgentina has won FIFA 4 times\nEngland has won FIFA\
    \ 2 times\n\nIn the above example, the arguments for the first example are 'Argentina'\
    \ and 4. As data types are not provided, the Python interpreter will automatically\
