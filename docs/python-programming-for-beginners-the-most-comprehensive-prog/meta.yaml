    ## Chapter 7: Data Structures in Python


    Python programmers often need to deal with a lot of data, and hence using variables
    all the time is not a recommended option. Especially Data Scientists who often
    need to deal with a ton of data may become overwhelmed with the amount of dynamic
    data they are dealing with. To help programmers who work on complex and data-demanding
    projects, it is essential to utilize the lists option Python provides in its core
    library. These are similar to data structures like Arrays available in core programming
    languages like C and C++.


    Understanding several data structures that Python provides and learning techniques
    to add or modify data using these data structures is an essential prerequisite
    for a Python programmer.


    ## Lists


    The list is a Python data type that supports adding different data types in sequential
    order. Lists have all the properties that variables possess. They can be easily
    replaced, passed, or manipulated with the Python core library’s help with several
    methods.


    Lists are usually represented in Python, as shown below:


    ```

    [32, 33, 34]

    ```


    Here 32, 33, and 34 are the list elements. It is also essential to understand
    that all the list elements are of integer data type and are not defined explicitly
    because the Python interpreter can detect their data types.


    If you observe, lists start and end with a square bracket in the above format.
    All the elements in the list will also be separated using a comma. It is also
    important to note that if the elements in a list are of string data type, then
    they are usually enclosed within quotes. All the elements within a particular
    list can also be called items.


    Example:


    ```

    [Nevada, Ohio, Colorado]

    ```


    Here Nevada, Ohio, and Colorado are called elements of the list.


    All the lists can be assigned to a variable, as shown below, with an example.


    ```

    sample = [ ''Nevada'', ''Ohio'', ''Colorado'']

    ```


    The list will be printed like any other data type whenever you print the variable.


    **Program Code:**


    ```

    sample

    ```


    Output:


    ```

    [ Nevada, Ohio, Colorado ]

    ```


    ### Empty List


    If no elements exist in a Python list, it can be called an empty list. An empty
    list is also usually called a null list.


    It is usually represented as [].


    **Program Code:**


    ```

    >>> example = []

    ```


    This is an empty Python list.


    ## Index in Lists


    Python provides an easy way to manipulate or replace the elements in a list, specifically
    with the help of the usage of indexes. Indexes usually start with 0 and provide
    Python programmers with many functions, such as slicing and searching, to ensure
    that the programs work well.


    Let us suppose that there is a list that we have used before


    [''Ohio'', ''Nevada'', ''Colorado'']


    We will print each of the indexes on the computer screen.


    **Program Code:**


    ```

    >>> example = [''Ohio'', ''Nevada'', ''Colorado'']

    >>> example[0]

    >>> example[1]

    >>> example[2]

    ```


    **Output:**


    Ohio

    Nevada

    Colorado


    When the Python interpreter detects 0 as an index in the above example, it will
    print the first element. As the index increases, the position on the list also
    increases.


    We can also call the items in the list as shown below, along with a string literal.


    **Program Code:**


    ```

    example = [''Ohio'', ''Nevada'', ''Colorado'']

    print( example[2] + '' is a great city'' )

    ```


    While calling lists, an index error will be given as output if you provide an
    index value higher than the list elements present.


    **Program Code:**


    ```

    example = [''Ohio'', ''Nevada'', ''Colorado'']

    print(example[3])

    ```


    **Output:**


    **Index error: list index out of range**


    Note: It is also vital to remember that you cannot use the floating-point number
    as an index value.


    **Program Code:**


    ```

    example = [''Ohio'', ''Nevada'', ''Colorado'']

    print(example[3.2])

    ```


    **Output:**


    **TypeError: You cannot use a floating-point index as an index value**


    All lists can have other lists as their elements, as shown below. All the lists
    inside a list are known as child lists.


    **Program Code:**


    ```

    x = [1,223,2,45,63,22]

    print(x)

    ```


    **Output:**


    **[1, 223, 2, 45, 63, 22]**


    You can call the elements in the child list using the ‘list [ ][ ]’ format.


    **Program Code:**


    ```

    x = [1,223,2,45,63,22]

    print(x[0:3][2])

    ```


    **Output:**


    2


    As in the above example, the third element in the second list is 22, and it is
    shown as output.


    You can call the elements in a list also using the negative index. Usually, -1
    refers to the last index, whereas -2 refers to the element before the last element.


    **Program Code:**


