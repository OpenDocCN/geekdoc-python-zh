    ```

    $ pip show tensorflow

    ```


    The output of this terminal code will be about a lot of metadata information such
    as the Author, Package name, and location of the package.


    To uninstall any packages installed on your system using the pip package manager,
    use the below code syntax format.


    Syntax:


    ```

    $ pip uninstall nameofthepackage

    ```


    For example, if you want to uninstall the tensor flow package you have installed
    before, use the below command.


    ```

    $ pip uninstall tensorflow

    ```


    You can also search packages using the below code format.


    ```

    $ pip search packagename

    ```


    This will display all the packages from the package index for you to analyze and
    choose from.


