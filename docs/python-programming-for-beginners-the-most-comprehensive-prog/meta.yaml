    \ arguments provided as a parameter for the function. All the instances where\
    \ the arguments are present will be stripped.\n\n    ### Program Code:\n\n   \
    \ ```python\n    x = \"Welcome\"\n    print(x.strip('me'))\n    ```\n\n    ###\
