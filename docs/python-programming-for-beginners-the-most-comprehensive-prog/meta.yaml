    vehicle and then again for each model. It may seem easy if there are only a few
    vehicle models, but code reuse becomes hectic for developers with the increase
    in vehicle models.


    On the other hand, with Object-oriented programming, the programmer will first
    create a ‘vehicle’ class and define various properties and values. Next, the developer
    will take a separate category for each vehicle type. Instead of creating functions
    for each property again, the application developer can access and call all those
    properties with just a simple dot notation due to the Object-oriented programming
    paradigm.'
