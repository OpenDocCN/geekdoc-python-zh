    # See Also


    For more information on addressable (NeoPixel) LEDs, see Recipe 15.5.


    # 15.7 Using an ePaper Display


    # Problem


    You want to use your Raspberry Pi to control an ePaper display.


    # Solution


    Attach an Inky pHAT or Inky wHAT module to your Raspberry Pi (Figure 15-9). Download
    the Pimoroni software for this using the command:


    ```

    $ curl https://get.pimoroni.com/inkyphat | bash

    ```


    If (when prompted) you accept the option to fetch examples and documentation,
    this will take quite some time to install.


    As an example program (ch_15_phate.py), let''s have the Inky pHAT display the
    Raspberry Pi''s IP address:


    ```

    from inky import InkyPHAT

    from PIL import Image, ImageFont, ImageDraw

    from font_fredoka_one import FredokaOne

    import subprocess


    inky_display = InkyPHAT("red")

    inky_display.set_border(inky_display.WHITE)


    img = Image.new("P", (inky_display.WIDTH, ink_display.HEIGHT))

    draw = ImageDraw.Draw(img)

    font = ImageFont.truetype(FredokaOne, 22)


    message = str(subprocess.check_output([''hostname'', ''-I''])).split()[0][2:]

    print(message)


    w, h = font.getsize(message)

    x = (inky_display.WIDTH / 2) - (w / 2)

    y = (inky_display.HEIGHT / 2) - (h / 2)

    ```'
