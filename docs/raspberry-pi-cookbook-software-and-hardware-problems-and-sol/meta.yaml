    \ 7-5 中，该工具正确地高亮显示了单词 *for*。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_242_0.png)\n\
    \n图 7-5. pythex 在线正则表达式测试器\n\n## 另请参阅\n\n要替换已匹配的文本，请参阅 [配方 7.24](Recipe 7.24)。\n\
    \n有关 Python 中正则表达式的更多详细信息，请参阅此 [W3Schools.com 页面](W3Schools.com page)。\n\n## 7.24\
    \ 使用正则表达式验证数据输入\n\n### 问题\n\n你有一些需要验证的文本；例如，你想确保文本看起来像电子邮件地址。\n\n### 解决方案\n\n\
    使用正则表达式（配方 7.23）。\n\n正则表达式主要用于验证用户输入的信息。例如，如果你曾经填写过包含电子邮件地址的在线表单，并且输入了看起来不像电子邮件地址的内容，你收到的提示地址格式无效的消息很可能来自正则表达式验证。\n\
    \n尝试文件 *ch_07_regex_email.py* 中的代码（本书所有程序示例均可下载；参见配方 3.22）：\n\n```\nimport re\n\
    \nregex = '^[\\w\\_.+-]+@[\\w\\.-]+\\.[\\w_-]+$'\nwhile True:\n    text = input(\"\
    Enter an email address: \")\n    if re.search(regex, text):\n        print(\"\
    valid\")\n    else:\n        print(\"invalid\")\n```\n\n此程序将反复提示你输入电子邮件地址，然后报告其是否有效。在线搜索会发现用于电子邮件以及几乎所有其他类型验证的替代正则表达式。\n\
    \n这个正则表达式查找一个或多个字母数字字符（加上 _ . + 或 -），后跟 @ 符号，然后是该序列的重复，接着是再次出现的序列但字符串中没有句点，这确保了电子邮件不以句点结尾。\n\
    \n### 讨论\n\n如果你有特定的验证需求（例如，电话号码或网站），几乎肯定有人已经为它制作了正则表达式。因此，在编写自己的正则表达式之前，请先进行互联网搜索。没有必要重新发明轮子。\n\
    \n### 另请参阅\n\n有关正则表达式的基础知识，请参阅配方 7.23。\n\n## 7.25 使用正则表达式进行网页抓取\n\n### 问题\n\n\
    你想编写一个 Python 程序，自动从网页获取（抓取）信息。\n\n### 解决方案\n\n使用正则表达式匹配页面内容中的文本，这些内容是 HTML 格式的。\n\
    \n正则表达式对于 *网页抓取* 非常有用。网页抓取意味着自动读取网页 HTML 中的内容。例如，如果我希望一个 Python 程序自动给我这本书当前的亚马逊排名，我需要能够从亚马逊销售排名中抓取数字（在图\
    \ 7-6 中圈出）。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_244_0.png)\n\n图 7-6. 从亚马逊进行网页抓取\n\
    \n如果我在浏览器中点击查看源代码，然后搜索“Sellers Rank”，我可以找到相关的 HTML 片段，如下所示：\n\n```\n<li id=\"\
    SalesRank\">\n<b>Amazon Best Sellers Rank:</b>\n#746,779 in Books (<a href=\"\
    https://www.amazon.com/best-sellers-books-Amazon/zgbs/books/ref=pd_dp_ts_books_1\"\
    >See Top 100 in Books</a>)\n```\n\n我可以将其用作在线正则表达式测试器中的测试文本，并研究一个能提取亚马逊排名的表达式。我们可以假设这将是\
    \ # 和 *in Books* 之间的所有内容。\n\n以下是此功能的代码，你也可以在本书的下载文件（配方 3.22）中的 *ch_07_regex_scraping.py*\
    \ 文件中找到：\n\n```\nimport re\nimport urllib.request\n\nregex = '#([\\d,]+) in Books'\n\
    url = 'https://www.amazon.com/Raspberry-Pi-Cookbook-Software-Solutions/dp/1492043222/'\n\
    \nprint(\"The Amazon rank is.....\")\ntext = urllib.request.urlopen(url).read().decode('utf-8')\n\
    print(re.search(regex, text).group())\n```\n\n该文件的输出将类似于：\n\n```\n$ python3 test.py\n\
    The Amazon rank is.....\n#746,779 in Books\n```\n\n代码首先读取网页内容。然后必须将文本转换为 UTF-8\
    \ 格式（仅限拉丁字母），然后才能与 re 正则表达式模块一起使用。\n\n### 讨论\n\n许多网站提供 API（参见配方 7.20）。如果你试图抓取的信息可以通过\
    \ API 获取，那么这是一种好得多的方式——尤其是因为网页抓取非常依赖于页面的外观和措辞，这意味着如果网站改版，你可能需要编写新的正则表达式。\n\n###\
    \ 另请参阅\n\n要读取网页内容，请参阅配方 7.13。\n\n有关正则表达式的基础知识，请参阅配方 7.23。\n\n# 第 8 章\n计算机视觉\n\n\
    ## 8.0 简介\n\n计算机视觉 (CV) 让你的树莓派能够“看见”事物。实际上，这意味着你的树莓派可以分析图像，寻找感兴趣的项目，甚至识别人脸和文本。\n\
    \n如果你将树莓派连接到摄像头以提供图像，各种可能性就会打开。这个主题在第 9 章中继续，我们将进一步深入机器学习领域。\n\n## 8.1 安装 OpenCV\n\
    \n### 问题\n\n你想在树莓派上安装 OpenCV 计算机视觉软件。\n\n### 解决方案\n\n要安装 OpenCV，首先使用以下命令安装先决条件包并更新\
