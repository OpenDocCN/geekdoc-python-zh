    # Discussion


    The output from the Audio DAC SHIM may be the same connector as a headphone jack,
    but you should not connect headphones directly. This connector is just for connecting
    to your HiFi and is not powerful enough to drive headphones directly.


    A more conventional way to add a new audio interface to your Raspberry Pi is to
    attach a USB sound card. Most of these that claim to work with Linux will work
    fine on a Raspberry Pi.


    # See Also


    As well as configuring the Pi for the Audio DAC, the installation script in this
    recipe also installs Mopidy, a version of MPD (Music Player Daemon).


    # 16.4 Playing Sound from the Command Line


    # Problem


    You want to be able to play a sound file from the Raspberry Pi''s command line.


    # Solution


    Use the built-in VLC software from the command line. To try this out, locate the
    file called school_bell.mp3 in this book''s downloads in the python directory.
    You can play this license-free sound using the following command. Note that on
    the command line, the command cvlc, not vlc, is used:


    This will play the sound file through the current audio output device.


    ```

    $ cvlc ~/raspberrypi_cookbook_ed4/python/school_bell.mp3

    ```


    # Discussion


    VLC will play most types of sound files, including MP3, WAV, AIFF, AAC, and OGG.
    However, if you want to play only uncompressed WAV files, you can also use the
    lighter-weight aplay command:


    ```

    $ aplay ~/raspberrypi_cookbook_ed4/python/school_bell.mp3

    ```


    # See Also


    VLC is also used in Recipe 4.9.


    Documentation for aplay is available at https://oreil.ly/Fbs94.'
- md: "## 16.5 Playing Sound from Python\n\n### Problem\n\nYou want to play a sound\
    \ file from your Python program.\n\n### Solution\n\nIf you need to play the sound\
    \ from a Python program, you can use the Python subprocess module (*ch_16_play_sound.py*),\
    \ as shown here:\n\n```python\nimport subprocess\n\nsound_file = 'school_bell.mp3'\n\
    \nsubprocess.run(['cvlc', sound_file])\n```\n\nAs with all the program examples\
    \ in this book, you can also download this program (see Recipe 3.22).\n\n### Discussion\n\
    \nYou can also play sounds using the pygame library (*ch_16_play_sound_pygame.py*),\
    \ as illustrated here:\n\n```python\nimport pygame\n\nsound_file = '/home/pi/raspberrypi_cookbook_ed4/python/school_bell.wav'\n\
    \npygame.mixer.init()\npygame.mixer.music.load(sound_file)\npygame.mixer.music.play()\n\
    \nwhile pygame.mixer.music.get_busy() == True:\n    continue\n```\n\nThe sound\
    \ file must be either an OGG file or an uncompressed WAV file. I found that the\
    \ sound would play only through the HDMI channel.\n\n### See Also\n\nTo play sounds\
    \ directly from the command line, see Recipe 16.4.\n\nYou also can use pygame\
    \ for intercepting keypresses (Recipe 13.11) and mouse movements (Recipe 13.12).\n\
    \n## 16.6 Using a USB Microphone\n\n### Problem\n\nYou want to connect a microphone\
    \ to your Raspberry Pi to capture sound.\n\n### Solution\n\nUse a USB microphone\
    \ like the one shown in Figure 16-7, or the microphone of a USB webcam, or something\
    \ a bit more substantial and of better quality.\n\nThese devices come in various\
    \ shapes and sizes. Some fit directly into the USB socket, others have a USB lead\
    \ attached to them, and some are part of a headset.\n\nHaving plugged in your\
    \ USB microphone, check that Raspberry Pi OS is aware of it by running this command,\
    \ which lists available devices from which you can record:\n\n```\n$ arecord -l\n\
    **** List of CAPTURE Hardware Devices ****\ncard 1: H340 [Logitech USB Headset\
    \ H340], device 0: USB Audio [USB Audio]\n  Subdevices: 1/1\n  Subdevice #0: subdevice\
    \ #0\n```\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_478_0.png)\n\nFigure 16-7.\
    \ Attaching a USB microphone to a Raspberry Pi\n\nIn this case, I'm using a microphone\
    \ that's part of a Logitech USB headset with microphone. As the previously described\
    \ output shows, this is card 1, subdevice 0. We'll need this information when\
    \ we come to recording sounds.\n\nTo make the microphone active, you need to right-click\
    \ on the speaker icon in the top right of the screen. Then select your USB mic\
    \ device from the Audio Inputs list, as shown in Figure 16-8. Here we are selecting\
    \ the microphone of a USB webcam.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_479_0.png)\n\
    \nFigure 16-8. Selecting the microphone as an audio device\n\nYou can now try\
    \ to make a recording from the command line and then play it back. To record,\
    \ use the following command:\n\n```\n$ arecord -d 3 test.wav\n```\n\nThe -d parameter\
    \ specifies the duration of the recording in seconds. To play back the sound you\
    \ have just recorded, use the following:\n\n```\n$ aplay test.wav\nPlaying WAVE\
    \ 'test.wav' : Unsigned 8 bit, Rate 8000 Hz, Mono\n```\n\nYou can interrupt the\
    \ sound playing by pressing Ctrl-C.\n\n### Discussion\n\nI have had mixed results\
    \ with the tiny push-in microphones like the one shown in Figure 16-7. Some work\
    \ and some don't. So, if you have followed the instructions here and you still\
    \ can't get your microphone to record anything, try a different one.\n\nThe arecord\
    \ command has optional parameters that enable you to control the sample rate and\
    \ format of the audio you record. So, for example, if you want to record at 16,000\
    \ samples a second rather than the default of 8,000, use the following command:\n\
    \n```\n$ arecord -r 16000 -d 3 test.wav\n```\n\nWhen you play back the sound,\
    \ aplay will automatically detect the sample rate, so you can just do this:\n\n\
    ```\n$ aplay test.wav\nPlaying WAVE 'test.wav' : Unsigned 8 bit, Rate 16000 Hz,\
    \ Mono\n```\n\n### See Also\n\nFor ways of attaching a speaker to your Raspberry\
    \ Pi, see Recipe 16.1. For other methods of playing a sound file, see Recipes\
    \ 16.4 and 16.5.\n\n## 16.7 Making a Buzzing Sound\n\n### Problem\n\nYou want\
    \ to make a buzzing sound with the Raspberry Pi.\n\n### Solution\n\nUse a piezoelectric\
    \ buzzer connected to a GPIO pin.\n\nMost small piezo buzzers work just fine using\
    \ the arrangement shown in Figure 16-9. The one I used is an Adafruit-supplied\
    \ component (see “Miscellaneous” on page 567). You can connect the buzzer pins\
    \ directly to the Raspberry Pi using female-to-female headers (see “Prototyping\
    \ Equipment and Kits” on page 564).\n\nThese buzzers use very little current.\
    \ However, if you have a large buzzer or just want to play it safe, put a 470Ω\
    \ resistor between the GPIO pin and the buzzer lead.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_480_0.png)\n\
    \nPaste the following code into an editor (ch_16_buzzer.py):\n\n```python\nfrom\
    \ gpiozero import Buzzer\n\nbuzzer = Buzzer(18)\n\ndef buzz(pitch, duration):\n\
    \    period = 1.0 / pitch\n    delay = period / 2\n    cycles = int(duration *\
    \ pitch)\n    buzzer.beep(on_time=period, off_time=period, n=int(cycles/2))\n\n\
    while True:\n    pitch_s = input(\"Enter Pitch (200 to 2000): \")\n    pitch =\
    \ float(pitch_s)\n    duration_s = input(\"Enter Duration (seconds): \")\n   \
    \ duration = float(duration_s)\n    buzz(pitch, duration)\n```\n\nAs with all\
    \ the program examples in this book, you can also download this program (see Recipe\
    \ 3.22).\n\nWhen you run the program, it first prompts you for the pitch in Hz\
    \ and then for the duration of the buzz in seconds:\n\n```\n$ python3 ch_16_buzzer.py\n\
    Enter Pitch (200 to 10000): 2000\nEnter Duration (seconds): 20\n```\n\n### Discussion\n\
    \nPiezo buzzers don't have a wide range of frequencies, nor is the sound quality\
    \ remotely good. However, you can vary the pitch a little. The frequency generated\
    \ by the code is not very accurate, and you might hear a bit of warbling.\n\n\
    The program works by using the gpiozero Buzzer class to toggle GPIO pin 18 on\
    \ and off, with a short delay in between. The delay is calculated from the pitch.\
    \ The higher the pitch (frequency), the shorter the delay needs to be.\n\n###\
    \ See Also\n\nTake a look at the datasheet for the piezo buzzer.\n\nFor better\
    \ audio output options, see Recipe 16.1.\n\n# CHAPTER 17\nThe Internet of Things\n\
    \n## 17.0 Introduction\n\nThe *Internet of Things* (IoT) is the rapidly growing\
    \ network of devices (things) connected to the internet. That doesn't just mean\
    \ more and more computers using browsers, but actual appliances and wearable and\
    \ portable technology. This includes all sorts of home automation, from smart\
    \ appliances and lighting to security systems and even internet-operated pet feeders,\
    \ as well as lots of less practical but fun projects.\n\nIn this chapter, you\
    \ learn how your Raspberry Pi can participate in the IoT in various ways.\n\n\
    ## 17.1 Controlling GPIO Outputs Using a Web Interface\n\n### Problem\n\nYou want\
    \ to control general-purpose input/output (GPIO) outputs using a web interface\
    \ to your Raspberry Pi.\n\n### Solution\n\nUse the bottle Python web server library\
    \ (Recipe 7.17) to create an HTML web interface to control the GPIO port.\n\n\
    To make this recipe, you will need the following:\n\n- Breadboard and jumper wires\
    \ (see “Prototyping Equipment and Kits” on page 564)\n- Three 1kΩ resistors (see\
    \ “Resistors and Capacitors” on page 565)\n- Three LEDs (see “OptoElectronics”\
    \ on page 566)\n- Tactile push switch (see “Miscellaneous” on page 567)\n\nFigure\
    \ 17-1 shows the breadboard layout for this.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_483_0.png)\n\
    \nFigure 17-1. The breadboard layout controlling GPIO outputs from a web page\n\
    \nAn alternative to using a breadboard is to attach a Raspberry Squid and Squid\
    \ Button (see Recipes 10.10 and 10.11). You can plug these directly into the GPIO\
    \ pins of the Raspberry Pi, as shown in Figure 17-2.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_484_0.png)\n\
    \nFigure 17-2. Raspberry Squid and Squid Button\n\nTo install the bottle library,\
    \ see Recipe 7.17.\n\nOpen an editor and paste in the following code (ch_17_web_control.py):\n\
    \n```python\nfrom bottle import route, run\nfrom gpiozero import LED, Button\n\
    \nleds = [LED(18), LED(23), LED(24)]\nswitch = Button(25)\n\ndef switch_status():\n\
    \    if switch.is_pressed:\n        return 'Down'\n    else:\n        return 'Up'\n\
    \ndef html_for_led(led_number):\n    i = str(led_number)\n    result = \" <input\
    \ type='button' onClick='changed(\" + i + \")' value='LED \" + i\n           \
    \  + \"'/>\"\n    return result\n```"
