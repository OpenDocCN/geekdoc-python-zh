    \ find that turn steps are missed.\n\n### See Also\n\nYou can also measure the\
    \ rotated position of a knob by using a variable resistor with the step response\
    \ method (Recipe 14.1) or by using an analog-to-digital converter (Recipe 14.7).\n\
    \n## 13.8 Using a Keypad\n\n### Problem\n\nYou want to interface a keypad with\
    \ your Raspberry Pi.\n\n### Solution\n\nKeypads are arranged in rows and columns,\
    \ with a push switch on the intersection of each row or column. To find out which\
    \ key is pressed, you first connect all the row and column connections to Raspberry\
    \ Pi GPIO pins. So, for a 4×3 keypad, you will need four pins for the rows and\
    \ three pins for the columns (a total of seven). By scanning each column in turn\
    \ (setting it to output high) and reading the value of each of the row inputs,\
    \ you can determine which (if any) key is pressed. You can also tell if more than\
    \ one key is pressed at the same time; as for a particular column, if more than\
    \ one key is pressed, the corresponding rows will all be high.\n\nNote that keypads\
    \ show considerable variation in their pinouts.\n\nTo make this recipe, you will\
    \ need the following:\n\n- Breadboard and jumper wires (see “Prototyping Equipment\
    \ and Kits” on page 564)\n- 4×3 keypad (see “Miscellaneous” on page 567)\n- Seven\
    \ male header pins (see “Miscellaneous” on page 567)\n\nFigure 13-12 shows the\
    \ wiring diagram for the project using the SparkFun keypad listed in “Miscellaneous”\
    \ on page 567. The keypad is supplied without header pins, which you must solder\
    \ onto the keypad.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_381_0.png)\n\n\
    Figure 13-12. Keypad wiring diagram\n\nOpen an editor and paste in the following\
    \ code (ch_13_keypad.py).\n\n> Before you run the program, make sure that the\
    \ row and column pins are correct for the keypad that you are using. If necessary,\
    \ change the values in the variables rows and cols. If you do not do this, it\
    \ is possible that pressing a key could short one GPIO output to another, where\
    \ one is high and the other is low. This would likely damage your Raspberry Pi.\n\
    \n```python\nfrom gpiozero import Button, DigitalOutputDevice\nimport time\n\n\
    rows = [Button(17), Button(25), Button(24), Button(23)]\ncols = [DigitalOutputDevice(27),\
    \ DigitalOutputDevice(18),\n        DigitalOutputDevice(22)]\nkeys = [\n    ['1',\
    \ '2', '3'],\n    ['4', '5', '6'],\n    ['7', '8', '9'],\n    ['*', '0', '#']]\n\
    \ndef get_key():\n    key = 0\n    for col_num, col_pin in enumerate(cols):\n\
    \        col_pin.off()\n        for row_num, row_pin in enumerate(rows):\n   \
    \         if row_pin.is_pressed:\n                key = keys[row_num][col_num]\n\
    \        col_pin.on()\n    return key\n\nwhile True:\n    key = get_key()\n  \
    \  if key :\n        print(key)\n    time.sleep(0.3)\n```\n\nWhen you run the\
    \ program, you can see each keypress being printed:\n\n```\n$ sudo python3 ch_13_keypad.py\n\
    1\n2\n3\n4\n5\n6\n7\n8\n9\n*\n0\n#\n```\n\nAs with all the program examples in\
    \ this book, you can also download this program (see Recipe 3.22).\n\nThere is\
    \ a push switch at the intersection of every row and column, so that when the\
    \ switch is pressed, the particular row and column will become connected.\n\n\
    The rows and columns defined here are correct for the SparkFun keypad listed in\
    \ “Miscellaneous” on page 567 in Appendix A. The first row is connected to GPIO\
    \ pin 17, the second to pin 25, and so on. The wiring of the row and column to\
    \ the keypad connector is illustrated in Figure 13-13."
