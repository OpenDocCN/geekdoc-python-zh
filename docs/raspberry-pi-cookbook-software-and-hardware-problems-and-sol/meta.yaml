    ## 另请参阅\n\n有关使用 bottle 的更多信息，请参阅 [bottle 文档](https://bottlepy.org/docs/dev/)。\n\
    \n## 17.2 在网页上显示传感器读数\n\n### 问题\n\n你想在网页上显示来自树莓派的传感器读数，并且该页面能自动更新。\n\n### 解决方案\n\
