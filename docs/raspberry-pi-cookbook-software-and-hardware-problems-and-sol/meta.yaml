  md: "# 16.7 Making a Buzzing Sound\n\n# Problem\n\nYou want to make a buzzing sound\
    \ with the Raspberry Pi.\n\n# Solution\n\nUse a piezoelectric buzzer connected\
    \ to a GPIO pin.\n\nMost small piezo buzzers work just fine using the arrangement\
    \ shown in Figure 16-9. The one I used is an Adafruit-supplied component (see\
    \ “Miscellaneous” on page 567). You can connect the buzzer pins directly to the\
    \ Raspberry Pi using female-to-female headers (see “Prototyping Equipment and\
    \ Kits” on page 564).\n\nThese buzzers use very little current. However, if you\
    \ have a large buzzer or just want to play it safe, put a 470Ω resistor between\
    \ the GPIO pin and the buzzer lead.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_480_0.png)\n\
    \nPaste the following code into an editor (ch_16_buzzer.py):\n\n```\nfrom gpiozero\
    \ import Buzzer\n\nbuzzer = Buzzer(18)\n\ndef buzz(pitch, duration):\n    period\
    \ = 1.0 / pitch\n    delay = period / 2\n    cycles = int(duration * pitch)\n\
    \    buzzer.beep(on_time=period, off_time=period, n=int(cycles/2))\n```"
  merge: -1
  pgno: 480
