    \ Web 界面是如何工作的。所有 Web 界面都依赖于某处的服务器（在本例中，是树莓派上的一个程序）来响应来自 Web 浏览器的请求。\n\n当服务器收到请求时，它会查看随请求一起传来的信息，并生成一些超文本标记语言（HTML）作为响应。\n\
