    \ -- -- -- \n50: -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- -- \n60: -- -- --\
    \ -- -- -- -- -- -- -- -- -- -- -- -- -- \n70: -- -- -- -- -- -- -- --\n```\n\n\
    As you can see, in this case, the module that I used has an I2C address of 1d.\
    \ Thus, that is what the variable i2c_address is set to in the program.\n\nReferring\
    \ to the preceding Python code, the device has a control register to which a command\
    \ 1 must be written to start the device running. A second configuration command\
    \ of 0 is then written to register 0x0E, to set the acceleration range of the\
    \ device to a maximum of 2g. These parameters are specified in the [datasheet\
    \ for the MMA8452Q](datasheet for the MMA8452Q).\n\nWhen a reading is required,\
    \ the I2C bus is read and the data bytes split into the three X, Y, and Z acceleration\
    \ readings.\n\nThe most common use for an accelerometer is to detect tilt. This\
    \ works because the Z-axis force is dominated by the pull of gravity (Figure 14-22).\n\
    \nWhen the accelerometer is tilted in one direction, some of that vertical force\
