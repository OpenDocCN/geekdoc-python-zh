  - '[PAGE 269]


    The code is a simplified version of the TensorFlow example, and like that example,
    a lot of the work is hidden away in the AudioClassifier class, which we can make
    use of in our programs.


    The audio classifier is configured with parameters. Most of these options, such
    as `max_results` and `score_threshold`, are obvious. The `num_threads` option
    specifies the number of threads of execution (see Recipe 7.19) devoted to running
    the example code, and `enable_edge_tpu` is used only if you have machine learning
    accelerator hardware attached to your Raspberry Pi.


    The program will periodically take audio samples, then try to infer the presence
    of whistling on them. It does this using overlapping time windows, so as to make
    it more likely that no whistles will be missed.


    The main while loop checks to see if it''s time to look for whistles again. If
    it is, it classifies the audio, and if there is a result, checks to see if it
    is a whistle.


    The final `time.sleep` allows your Pi''s processor to get on with other things
    for a while before it''s needed for classifying again.


    # See Also


    To hook your own code into video classification, see Recipe 9.2.


    # 9.5 Installing Edge Impulse


    # Problem


    You want to use the Edge Impulse platform to train your own ML model for use on
    your Raspberry Pi.


    # Solution


    Much of the work of Edge Impulse takes place on the company''s servers and is
    accessed through its website. To use these servers, Edge Impulse, not unreasonably,
    asks you to create an account. For noncommercial “developer” use, this is free.


    In addition to the EdgeImpulse website, we also need to install a local part of
    the software on our Raspberry Pi. Before you start, it''s a good idea to make
    sure that your Raspberry Pi OS is up to date (Recipe 3.40).


    Start by running the following commands in a Terminal window:


    ```

    $ curl -sL https://deb.nodesource.com/setup_12.x | sudo bash -

    $ sudo apt install -y gcc g++ make build-essential nodejs sox gstreamer1.0-tools
    gstreamer1.0-plugins-good gstreamer1.0-plugins-base gstreamer1.0-plugins-base-apps

    ```'
- md: "## 9.5 Installing Edge Impulse\n\n```\n$ npm config set user root && sudo npm\
    \ install edge-impulse-linux -g --unsafe-perm\n```\n\nBecause copying such long\
    \ commands is error prone and tedious, these commands are also in the file *long_commands.txt*\
    \ in the code for the book (Recipe 3.22).\n\nWe are also going to need the Python\
    \ interface for Edge Impulse. Edge Impulse relies on a Python library called NumPy.\
    \ This needs to be updated to its latest version:\n\n```\n$ pip3 install numpy\
    \ --upgrade\n```\n\n### Discussion\n\nEdge Impulse is based on the TensorFlow\
    \ machine learning library that we used in our earlier recipes. However, it adds\
    \ a slick and helpful web-based user interface and cloud-based servers to make\
    \ it a lot easier to get started with training our own ML models.\n\nAlthough\
    \ Edge Impulse is now installed onto your Raspberry Pi, we need an example to\
    \ run. We'll explore this in Recipe 9.6.\n\n### See Also\n\nThe [Edge Impulse\
    \ website](https://www.edgeimpulse.com/) has a wealth of material.\n\nLearn about\
    \ [TensorFlow](https://www.tensorflow.org/), on which Edge Impulse is based.\n\
    \n## 9.6 Recognizing a Spoken Command (in the Cloud)\n\n### Problem\n\nYou want\
    \ your Raspberry Pi to be able to recognize a spoken command using a cloud service.\n\
    \n### Solution\n\nAfter registering on the Edge Impulse website and installing\
    \ the software on your Raspberry Pi, use the *wizard* to train a neural network.\
    \ You can then test how well the trained model works in your browser, before running\
    \ it locally on your Raspberry Pi.\n\nGo to [https://studio.edgeimpulse.com](https://studio.edgeimpulse.com)\
    \ and log in using the account you created in Recipe 9.5.\n\nYou now need to create\
    \ a new project and give it a name. If you have just registered with Edge Impulse,\
    \ the website will probably take you to the New Project Wizard. Cancel this wizard\
    \ if it has started, and instead click on the “+ Create new project” button. This\
    \ will open a dialog (Figure 9-3) where you should enter a name for your project;\
    \ use the name “hey pi.”\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_271_0.png)\n\
    \nFigure 9-3. Creating a new Edge Impulse project\n\nSelect the Developer option.\
    \ This is the free option and imposes a few constraints on the use of Edge Impulse,\
    \ which we will not be likely to exceed.\n\nClicking on the “Create new project”\
    \ button takes us to a dialog for choosing what type of data we are going to be\
    \ dealing with. However, we’re going to use the getting started wizard, so close\
    \ this popup; you’ll return to the project page for the “hey pi” project. Scroll\
    \ to the bottom of the page and select the option “Launch getting started wizard.”\
    \ This will warn you that your project will be cleared out, but that’s fine, so\
    \ select Yes and then confirm the action. The Welcome wizard will launch and offer\
    \ to make your model in five minutes. Click on the button to accept this option\
    \ and, for your phrase to be recognized, use “hey pi” (Figure 9-4) and then click\
    \ Next.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_272_0.png)\n\nFigure 9-4.\
    \ Selecting a phrase to recognize\n\nNow comes the fun part. For our Raspberry\
    \ Pi to recognize the phrase “hey pi,” we need to give it lots of examples of\
    \ us saying that. The wizard will now ask us to record ourselves saying “hey pi”\
    \ repeatedly for an oddly specific 38 seconds (Figure 9-5). You’ll also be asked\
    \ for access to your microphone, which you should grant.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_272_1.png)\n\
    \nFigure 9-5. Collecting sound data\n\nIf Edge Impulse needs more data, it may\
    \ ask you to say the phrase some more. Eventually, it will have enough samples,\
    \ and you can move onto the next step of adding other data.\n\nThis other data\
    \ takes the form of random words and background noise from Edge Impulse’s collections\
    \ of such data and will help the neural network to distinguish “hey pi” from any\
    \ other sounds that the microphone may be picking up.\n\nThe next step of the\
    \ wizard is to “Design your Impulse.” An *impulse* is Edge Impulse’s way of describing\
    \ the neural network (or other type of ML model) as well as the associated preprocessing\
    \ of data. In designing the impulse, we also get the opportunity to look inside\
    \ the model and gain some reassurance about how this is all working.\n\nIf you\
    \ want to take a look at what’s going on behind the wizard, you can just close\
    \ the wizard overlay and then continue with it later. For example, Figure 9-6\
    \ shows what’s called a *feature explorer view* of the sound samples, where samples\
    \ of “hey pi,” noise, and other random phrases are all plotted in a 3D space.\
    \ The instances of “hey pi” are all clustered together, indicating a good recognition\
    \ by the impulse.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_273_0.png)\n\nFigure\
    \ 9-6. Exploring features\n\nWhen the wizard resumes, its next step is to train\
    \ the neural network. This takes a few minutes as the weights of the neural network\
    \ are adjusted until it can accurately identify the phrase: “hey pi.” We can now\
    \ check out the impulse and see how well it performs, all within our browser (Figure\
    \ 9-7). Note that before letting us play with the impulse, it is built into a\
    \ deployable package that we will later be able to deploy onto our Raspberry Pi.\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_274_0.png)\n\nIn Figure 9-7 whenever\
    \ we say something, or a noise is heard, the impulse categorizes it as either\
    \ HEY_PI, NOISE, or UNKNOWN, and against each of these, it offers a probability.\
    \ So if you look at the row that starts 488 (the sample number), you can see that\
    \ there is an 87% probability that “hey pi” was detected and very low probability\
    \ that noise or an unknown sound was detected.\n\n### Discussion\n\nTo see how\
    \ well this speech recognition is working, try getting other people to say “hey\
    \ pi” or try saying similar phrases yourself.\n\nThis makes a very impressive\
    \ demonstration. But, at the moment, everything is happening on the Edge Impulse\
    \ servers. The only thing happening on our Raspberry Pi is the passing of sound\
    \ data from our microphone to Edge Impulse. In Recipe 9.7 we will look at how\
    \ we can bring some of the action back to our Raspberry Pi.\n\n### See Also\n\n\
    Edge Impulse has a lot of [useful documentation](https://docs.edgeimpulse.com/).\n\
    \n## 9.7 Recognizing a Spoken Command (Locally)\n\n### Problem\n\nYou want your\
    \ Raspberry Pi to be able to recognize a spoken command locally, without relying\
    \ on the internet.\n\n### Solution\n\nIf you haven't already done so, you'll need\
    \ to follow Recipes 9.5 and 9.6.\n\nTo run our phrase recognition impulse locally\
    \ on the Raspberry Pi, we can download it and then run it using the Edge Impulse\
    \ Linux runner. This will already be installed as part of Recipe 9.5.\n\nRun the\
    \ following command (note that if this is the first time that you are doing this,\
    \ then you don't need the --clean option):\n\n```\n$ edge-impulse-linux-runner\
    \ --clean\nEdge Impulse Linux runner v1.3.5\n? What is your user name or e-mail\
    \ address (edgeimpulse.com)?\n  anonymised@email.com\n? What is your password?\
    \ [hidden]\n\n[RUN] Downloading model...\n[BLD] Created build job with ID 2540059\n\
    [BLD] Writing templates...\n.... lots of build messages\n[BLD] Building binary\
    \ OK\n[RUN] Downloading model OK\n[RUN] Stored model version in /home/pi/.ei-linux-runner/models/93963/v2/model.eim\n\
    [RUN] Starting the audio classifier for Simon / hey pi (v2)\n[RUN] Parameters\
    \ freq 16000Hz window length 1000ms. classes\n    [ 'hey_pi', 'noise', 'unknown'\
    \ ]\n? Select a microphone USB-Audio - HD Pro Webcam C920\n[RUN] Using microphone\
    \ hw:2,0\nclassifyRes 11ms. { hey_pi: '0.0049', noise: '0.9479', unknown: '0.0472'\
    \ }\nclassifyRes 5ms. { hey_pi: '0.9590', noise: '0.0001', unknown: '0.0409' }\n\
    classifyRes 5ms. { hey_pi: '0.9899', noise: '0.0000', unknown: '0.0101' }\nq\n\
    ```\n\nThis is actually quite a lengthy process, with a lot of build messages\
    \ appearing in the Terminal, that I have omitted from the preceding transcript.\n\
    \nWhen you run the command, you will be asked for your Edge Impulse login details\
    \ (email and password). This will start the process of building and downloading\
    \ the impulse into a compact form that you can run on your Raspberry Pi. Building\
    \ takes a while, but it only needs to be done once.\n\nOnce the build process\
    \ is complete, you will be prompted to select the microphone that you want to\
    \ use and finally your Raspberry Pi will start listening to you, and reporting\
    \ the results of each sample it hears and providing a probability of each sample\
    \ being “hey pi.”\n\n### Discussion\n\nThe really neat thing about this process\
    \ is that our advanced machine learning model has been built and compressed into\
    \ a form that we can run on a relatively modestly powerful Raspberry Pi. You can\
    \ see information about this from the Edge Impulse Dashboard.\n\nTake a little\
    \ time to explore the information there. In particular, try clicking on Transfer\
    \ Learning from the Impulse Design option on the sidebar (Figure 9-8)."
  mdcn: "## 9.5 安装 Edge Impulse\n\n```\n$ npm config set user root && sudo npm install\
    \ edge-impulse-linux -g --unsafe-perm\n```\n\n由于复制如此长的命令既容易出错又很繁琐，这些命令也包含在本书代码的\
    \ *long_commands.txt* 文件中（参见配方 3.22）。\n\n我们还需要 Edge Impulse 的 Python 接口。Edge Impulse\
    \ 依赖一个名为 NumPy 的 Python 库。这需要更新到其最新版本：\n\n```\n$ pip3 install numpy --upgrade\n\
    ```\n\n### 讨论\n\nEdge Impulse 基于我们在前面配方中使用的 TensorFlow 机器学习库。然而，它增加了一个流畅且实用的基于\
    \ Web 的用户界面和基于云的服务器，使得开始训练我们自己的 ML 模型变得容易得多。\n\n尽管 Edge Impulse 现在已安装到你的 Raspberry\
    \ Pi 上，但我们仍需要一个示例来运行。我们将在配方 9.6 中探讨这一点。\n\n### 另请参阅\n\n[Edge Impulse 网站](https://www.edgeimpulse.com/)\
    \ 提供了丰富的资料。\n\n了解 Edge Impulse 所基于的 [TensorFlow](https://www.tensorflow.org/)。\n\
    \n## 9.6 识别语音命令（在云端）\n\n### 问题\n\n你希望你的 Raspberry Pi 能够使用云服务识别语音命令。\n\n### 解决方案\n\
    \n在 Edge Impulse 网站上注册并在你的 Raspberry Pi 上安装软件后，使用 *向导* 训练一个神经网络。然后，你可以在浏览器中测试训练好的模型效果如何，之后再在你的\
    \ Raspberry Pi 上本地运行它。\n\n前往 [https://studio.edgeimpulse.com](https://studio.edgeimpulse.com)\
    \ 并使用你在配方 9.5 中创建的账户登录。\n\n你现在需要创建一个新项目并为其命名。如果你刚刚注册了 Edge Impulse，网站可能会将你带到新建项目向导。如果向导已启动，请取消它，而是点击“+\
    \ 创建新项目”按钮。这将打开一个对话框（图 9-3），你应该在其中输入项目名称；使用名称“hey pi”。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_271_0.png)\n\
    \n图 9-3. 创建新的 Edge Impulse 项目\n\n选择 Developer 选项。这是免费选项，对 Edge Impulse 的使用施加了一些限制，我们不太可能超出这些限制。\n\
    \n点击“创建新项目”按钮会带我们到一个选择要处理的数据类型的对话框。然而，我们将使用入门向导，因此关闭此弹出窗口；你将返回到“hey pi”项目的项目页面。滚动到页面底部，选择“启动入门向导”选项。这会警告你项目将被清空，但这没关系，所以选择“是”然后确认操作。欢迎向导将启动，并提出在五分钟内制作你的模型。点击按钮接受此选项，对于要识别的短语，使用“hey\
    \ pi”（图 9-4），然后点击“下一步”。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_272_0.png)\n\
    \n图 9-4. 选择要识别的短语\n\n现在是有趣的部分了。为了让我们的 Raspberry Pi 识别短语“hey pi”，我们需要给它大量我们说这个短语的示例。向导现在会要求我们录制自己反复说“hey\
    \ pi”，持续一个奇怪的特定时间 38 秒（图 9-5）。你还会被要求授予麦克风访问权限，你应该允许。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_272_1.png)\n\
    \n图 9-5. 收集声音数据\n\n如果 Edge Impulse 需要更多数据，它可能会要求你再说几次这个短语。最终，它将有足够的样本，你可以进入下一步，添加其他数据。\n\
    \n这些其他数据采用随机单词和背景噪音的形式，来自 Edge Impulse 的此类数据集合，将帮助神经网络区分“hey pi”和麦克风可能接收到的任何其他声音。\n\
    \n向导的下一步是“设计你的 Impulse”。*Impulse* 是 Edge Impulse 描述神经网络（或其他类型的 ML 模型）以及相关数据预处理的方式。在设计\
    \ impulse 的过程中，我们也有机会查看模型内部，并对这一切如何运作获得一些信心。\n\n如果你想看看向导背后发生了什么，你可以直接关闭向导覆盖层，稍后再继续。例如，图\
    \ 9-6 显示了声音样本的所谓 *特征探索器视图*，其中“hey pi”、噪音和其他随机短语的样本都绘制在一个三维空间中。“hey pi”的实例都聚集在一起，表明\
    \ impulse 具有良好的识别能力。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_273_0.png)\n\n\
    图 9-6. 探索特征\n\n当向导恢复时，其下一步是训练神经网络。这需要几分钟时间，因为神经网络的权重会被调整，直到它能准确识别短语：“hey pi”。我们现在可以在浏览器中查看\
    \ impulse 并查看其性能如何（图 9-7）。请注意，在让我们使用 impulse 之前，它会被构建到一个可部署的包中，我们稍后可以将其部署到我们的\
    \ Raspberry Pi 上。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_274_0.png)\n\n在图\
    \ 9-7 中，每当我们说些什么或听到噪音时，impulse 会将其分类为 HEY_PI、NOISE 或 UNKNOWN，并针对每种分类提供一个概率。因此，如果你查看以\
    \ 488 开头的行（样本编号），你可以看到检测到“hey pi”的概率为 87%，而检测到噪音或未知声音的概率非常低。\n\n### 讨论\n\n要查看此语音识别效果如何，可以尝试让其他人说“hey\
    \ pi”或自己尝试说类似的短语。\n\n这构成了一个非常令人印象深刻的演示。但是，目前一切都在 Edge Impulse 服务器上进行。在我们的 Raspberry\
    \ Pi 上发生的唯一事情是将声音数据从麦克风传递到 Edge Impulse。在配方 9.7 中，我们将探讨如何将一些操作带回我们的 Raspberry\
    \ Pi。\n\n### 另请参阅\n\nEdge Impulse 有很多 [有用的文档](https://docs.edgeimpulse.com/)。\n\
    \n## 9.7 识别语音命令（本地）\n\n### 问题\n\n你希望你的 Raspberry Pi 能够在本地识别语音命令，而不依赖互联网。\n\n###\
    \ 解决方案\n\n如果你还没有这样做，你需要遵循配方 9.5 和 9.6。\n\n要在 Raspberry Pi 上本地运行我们的短语识别 impulse，我们可以下载它，然后使用\
    \ Edge Impulse Linux runner 运行它。这将作为配方 9.5 的一部分已经安装。\n\n运行以下命令（注意，如果这是你第一次这样做，则不需要\
    \ --clean 选项）：\n\n```\n$ edge-impulse-linux-runner --clean\nEdge Impulse Linux\
    \ runner v1.3.5\n? What is your user name or e-mail address (edgeimpulse.com)?\n\
    \  anonymised@email.com\n? What is your password? [hidden]\n\n[RUN] Downloading\
    \ model...\n[BLD] Created build job with ID 2540059\n[BLD] Writing templates...\n\
    .... lots of build messages\n[BLD] Building binary OK\n[RUN] Downloading model\
    \ OK\n[RUN] Stored model version in /home/pi/.ei-linux-runner/models/93963/v2/model.eim\n\
    [RUN] Starting the audio classifier for Simon / hey pi (v2)\n[RUN] Parameters\
    \ freq 16000Hz window length 1000ms. classes\n    [ 'hey_pi', 'noise', 'unknown'\
    \ ]\n? Select a microphone USB-Audio - HD Pro Webcam C920\n[RUN] Using microphone\
    \ hw:2,0\nclassifyRes 11ms. { hey_pi: '0.0049', noise: '0.9479', unknown: '0.0472'\
    \ }\nclassifyRes 5ms. { hey_pi: '0.9590', noise: '0.0001', unknown: '0.0409' }\n\
    classifyRes 5ms. { hey_pi: '0.9899', noise: '0.0000', unknown: '0.0101' }\nq\n\
    ```\n\n这实际上是一个相当漫长的过程，终端中会出现大量构建消息，我在前面的转录中省略了它们。\n\n当你运行该命令时，系统会要求你提供 Edge Impulse\
    \ 登录详细信息（电子邮件和密码）。这将启动构建和下载 impulse 的过程，将其转换为可在你的 Raspberry Pi 上运行的紧凑形式。构建需要一段时间，但只需执行一次。\n\
    \n构建过程完成后，系统会提示你选择要使用的麦克风，最后你的 Raspberry Pi 将开始监听你，并报告它听到的每个样本的结果，并提供每个样本为“hey\
    \ pi”的概率。\n\n### 讨论\n\n这个过程真正巧妙的地方在于，我们先进的机器学习模型已被构建并压缩成一种可以在相对性能适中的 Raspberry\
    \ Pi 上运行的形式。你可以从 Edge Impulse 仪表板中查看有关此的信息。\n\n花点时间探索那里的信息。特别地，尝试点击侧边栏中 Impulse\
    \ Design 选项下的 Transfer Learning（图 9-8）。"
