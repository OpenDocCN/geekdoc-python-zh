  md: '# Solution


    Use regular expressions to match text in the page''s contents, which are in HTML
    format.


    Regular expressions are very useful for *web scraping*. Web scraping means automatically
    reading things from a web page''s HTML. For example, if I want a Python program
    to automatically give me the current Amazon ranking of this book, I need to be
    able to grab the number from the Amazon sales rank (circled in Figure 7-6).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_244_0.png)


    Figure 7-6. Web scraping from Amazon


    If I click View Source in my browser and then search for “Sellers Rank,” I can
    find the relevant piece of HTML, which looks like this:


    ```

    <li id="SalesRank">

    <b>Amazon Best Sellers Rank:</b>

    #746,779 in Books (<a href="https://www.amazon.com/best-sellers-books-Amazon/zgbs/books/ref=pd_dp_ts_books_1">See
    Top 100 in Books</a>)

    ```


    I can use this as my test text in an online regular expression tester and work
    on an expression that will extract the Amazon rank. We can assume that this will
    be everything between # and *in Books*.


    Here is the code for this, which you can also find in the downloads for the book
    (Recipe 3.22) in the file *ch_07_regex_scraping.py*:


    ```

    import re

    import urllib.request


    regex = ''#([\d,]+) in Books''

    ```'
  merge: -1
  pgno: 244
- img_proc: true
  md: '```

    url = ''https://www.amazon.com/Raspberry-Pi-Cookbook-Software-Solutions/dp/1492043222/''


    print("The Amazon rank is.....")

    text = urllib.request.urlopen(url).read().decode(''utf-8'')

    print(re.search(regex, text).group())

    ```


    The output of the file will look something like this:


    ```

    $ python3 test.py

    The Amazon rank is.....

    #746,779 in Books

    ```


    The code first reads the web page contents. The text must then be converted to
    UTF-8 format (Latin alphabet only) before it can be used with the re regular expression
    module.


    # Discussion


    Many websites offer APIs (see Recipe 7.20). If the information you’re trying to
    scrape is available through an API, then that is a much better way of getting
    it—not least because web scraping is very dependent on the appearance and wording
    of the page, which means that if the site is revamped, you’ll probably need to
    come up with a new regular expression.


    # See Also


    To read the contents of a web page, see Recipe 7.13.


    For the basics on regular expressions, see Recipe 7.23.'
