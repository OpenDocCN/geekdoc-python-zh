  md: '# Solution


    If you have one of the popular and low-cost Chinese laser cutters of the K40 variety
    (Figure 4-15), you can use the K40 Whisperer software to control it. Thus, instead
    of having to use a relatively expensive Windows computer to control your laser
    cutter, you can use a much lower cost Raspberry Pi.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_155_0.png)


    Figure 4-15. A K40 laser cutter


    This software is written in Python, but also relies on the Inkscape vector drawing
    package. So if you have not already done so, install Inkscape by following Recipe
    4.7.


    Next, download the source code for the K40 Whisperer software. Select the latest
    download from the K40 Whisperer Source column. Double-click the downloaded ZIP
    file and extract it into your home directory (/home/pi). Inside the unzipped directory,
    you will find a file called README_Linux.txt. The instructions here are based
    on that file. The README is for Linux in general rather than being Raspberry Pi-specific.


    First, run the following two commands to create a user group for the software.
    The first adds a new user group specifically for the laser cutter, and the second
    adds the user pi to that group. If you created a different username when setting
    up your Raspberry Pi, use that in place of pi:


    ```

    $ sudo groupadd lasercutter

    $ sudo usermod -a -G lasercutter pi

    ```'
