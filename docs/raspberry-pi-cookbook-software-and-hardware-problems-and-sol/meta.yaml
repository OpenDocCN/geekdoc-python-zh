  md: '![](img/e36e77524aeaae366529d1cf02f9a39c_419_0.png)


    Figure 14-16. Using a photoresistor with an ADC


    These readings can be quite a bit different, depending on your photoresistor,
    but the important thing is that the figure changes as the light level changes.


    # Discussion


    The choice of fixed-value resistor is not very critical. If the value is too high
    or too low, you will find that the range of readings is rather narrow. Select
    a resistor value somewhere between the minimum and maximum resistance of the sensor.
    You might need to experiment with a few resistors before deciding on one that
    suits your sensor over the range of readings you’re interested in. If in doubt,
    start with 10kΩ and see how that works.


    You can swap out the photoresistor for pretty much any resistive sensor. So, for
    instance, you could use the gas sensor from [Recipe 14.4](Recipe 14.4).


    # See Also


    To measure light intensity without the complication of an ADC, see [Recipe 14.2](Recipe
    14.2).


    For an example of using more than one channel of the ADC at a time, see [Recipe
    14.14](Recipe 14.14).'
