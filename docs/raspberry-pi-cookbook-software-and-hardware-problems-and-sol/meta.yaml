  md: '# CHAPTER 18


    # Home Automation


    # 18.0 Introduction


    As a low-cost and low-power device, a Raspberry Pi makes a great home automation
    hub that you can leave running without fear of huge electricity bills. For the
    recipes described in this chapter, you don''t need the power of a Raspberry Pi
    4 or 400. In fact, a Raspberry Pi 2 or 3 will be plenty fast enough and will run
    cooler and use less electricity than a Raspberry Pi 4.


    We start with Message Queuing Telemetry Transport (MQTT), the basic communication
    mechanism for most home automation systems, and then move on to look at using
    Node-RED (which you first met in Chapter 17) as a basis for home automation.


    Strictly speaking, home automation is all about making your home smarter and more
    able to do things for itself—for example, to turn on a light for a set amount
    of time when movement is detected, or to automatically turn everything off at
    bedtime. But most people who are interested in home automation are also interested
    in remote control of the parts of their home that have been automated. We also
    look at remote control by smartphone in this chapter.


    # 18.1 Making a Raspberry Pi into a Message Broker with Mosquitto


    # Problem


    You want to make your Raspberry Pi a hub for your home automation system capable
    of using the Mosquitto MQTT software.'
  merge: -1
  pgno: 510
- img_proc: true
  md: '# Solution


    Install the Mosquitto software so that your Raspberry Pi can act as an MQTT broker.

    Run the following commands to install Mosquitto and start it as a service so that
    it automatically starts when your Raspberry Pi reboots:


    ```

    $ sudo apt update

    $ sudo apt install -y mosquitto mosquitto-clients

    $ sudo systemctl enable mosquitto.service

    ```


    You can check to see whether everything is working by running the following command:


    ```

    $ mosquitto -v

    1656413574: mosquitto version 2.0.11 starting

    1656413574: Using default config.

    1656413574: Starting in local only mode. Connections will only be possible from
    clients running on this machine.

    1656413574: Create a configuration file which defines a listener to allow remote
    access.

    1656413574: For more details see https://mosquitto.org/documentation/authentication-methods/

    1656413574: Opening ipv4 listen socket on port 1883.

    1656413574: Error: Address already in use

    1656413574: Opening ipv6 listen socket on port 1883.

    1656413574: Error: Address already in use

    $

    ```


    The error message is not really an error; it just means that Mosquitto is already
    running because we started it as a service.


    # Discussion


    MQTT is a way of passing messages between one program and another. It has two
    parts:


    *Server*

    The central place where the passing of messages is controlled and messages are
    routed to the right recipient.


    *Client*

    A program that sends and receives messages to and from the server. Normally more
    than one client will be in a system.


    Messages are passed using what is called a *publish and subscribe* model. That
    is, a client that has something interesting to say (e.g., a sensor reading) tells
    the server by publishing the reading. Every few seconds, the client might take
    another reading and publish that, too.'
  merge: -1
  pgno: 511
- img_proc: true
  md: 'Messages have a *topic* and a *payload*. In a system for automating lights,
    the topic might be *bedroom_light* and the payload *on* or *off*.


    You can try this out by opening two Terminals at the same time. One Terminal will
    act as the publisher and the other as a subscriber. You can see this in action
    in Figure 18-1.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_512_0.png)


    Figure 18-1. Two clients communicating using MQTT


    Let’s break this down. The Terminal on the left is the subscriber, and here we
    issue the command:


    ```


    $ mosquitto_sub -d -t pi_mqtt

    Client mosqsub/2007-raspberryp sending CONNECT

    Client mosqsub/2007-raspberryp received CONNACK

    Client mosqsub/2007-raspberryp sending SUBSCRIBE (Mid: 1, Topic: pi_mqtt, QoS:
    0)

    Client mosqsub/2007-raspberryp received SUBACK

    Subscribed (mid: 1): 0

    ```


    The `mosquitto_sub` command subscribes the client. The `-d` option specifies debug
    mode, which just means you will see a lot more output about what the client and
    server are doing; this is useful while you are making sure everything is working.
    The `-t pi_mqtt` option specifies the topic that the client is interested in as
    `pi_mqtt`.


    The debug trace shows that the client is connecting to the server without problems
    and that the client has requested to subscribe and the server has acknowledged
    the subscription.'
  merge: -1
  pgno: 512
- img_proc: true
  md: 'Leave this Terminal session running and open a second Terminal session to act
    as a client that''s going to publish something on the topic pi_mqtt. Enter the
    following command in this new Terminal window:


    ```

    $ mosquitto_pub -d -t pi_mqtt -m "publishing hello"

    Client mosqpub/2199-raspberryp sending CONNECT

    Client mosqpub/2199-raspberryp received CONNACK

    Client mosqpub/2199-raspberryp sending PUBLISH (d0, q0, r0, m1, ''pi_mqtt'',

    ... (16 bytes))

    Client mosqpub/2199-raspberryp sending DISCONNECT

    ```


    Again, the -d and -t options specify debug mode and the topic, but this time there
    is an extra option of -m, which specifies a message to include in the publication.
    If the publisher were a sensor, the message might be the sensor reading.


    As soon as the mosquitto_pub command is sent, text like the following will appear
    in the first Terminal window (the subscriber):


    ```

    Client mosqsub/5170-raspberryp received PUBLISH (d0, q0, r0, m0, ''pi_mqtt'',

    ... (16 bytes))

    publishing hello

    ```


    # See Also


    For information on Mosquitto, see https://mosquitto.org.


    For other MQTT recipes in this chapter, see Recipes 18.2 and 18.5.


    # 18.2 Using Node-RED with an MQTT Server


    # Problem


    You want to combine Node-RED with an MQTT server to be able, for instance, to
    control a general-purpose input/output (GPIO) pin in response to MQTT message
    publications.


    # Solution


    Use a Node-RED “mqtt” node and an “rpi gpio” node in a Node-RED flow like the
    one shown in Figure 18-2.


    If you have not installed Node-RED, you can find instructions in Recipe 17.3.


    After you deploy this, you will be able to turn GPIO 18 on and off by sending
    mosquitto_pub commands. For testing purposes, attach an LED or Raspberry Squid
    LED to pin 18 (Recipe 11.1).


    The flow refers to kitchen lights, as this example pretends that GPIO 18 is being
    used with something like a PowerSwitch Tail (Recipe 11.7) to switch lighting on
    and off.'
  merge: -1
  pgno: 513
- img_proc: true
  md: 'Let''s build the example up one node at a time.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_514_0.png)


    Start by adding an “mqtt” node from the “input” category of Node-RED. Double-click
    the node to edit it (Figure 18-3).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_514_1.png)'
  merge: -1
  pgno: 514
- img_proc: true
  md: 'Notice that the Server field just has the option to “Add new mqtt-broker.”
    We will return to this in a moment. For now, specify a topic (kitchen_lights)
    and give the node a meaningful name. The QoS field allows you to set the quality
    of service and determines how persistent the MQTT server is at getting messages
    to their intended destination. Level 2 means guaranteed delivery.


    We now need to define an MQTT server for Node-RED, so click the edit (pencil)
    button next to the Server field. This opens the window shown in Figure 18-4.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_515_0.png)


    Figure 18-4. Adding an MQTT server to Node-RED


    Give the server a name and enter localhost in the Server field. We can do this
    because Node-RED and the MQTT server are running on the same Raspberry Pi.


    Now we can add the “rpi-gpio out” node. You will find this in the Raspberry Pi
    section. After you have added it to the flow, open it (Figure 18-5).'
  merge: -1
  pgno: 515
- img_proc: true
  md: '![](img/e36e77524aeaae366529d1cf02f9a39c_516_0.png)


    Figure 18-5. Editing the GPIO output node


    Select “12 - GPIO 18” and give the node a name before clicking Done. Drag the
    connector from the “mqtt in” node to the Raspberry Pi GPIO node so that the flow
    looks like Figure 18-2.


    Click the Deploy button and then open a Terminal session on the Raspberry Pi to
    test the flow.


    Type the following command in the Terminal window to publish a request to turn
    on the light:


    ```

    $ mosquitto_pub -d -t kitchen_lights -m 1

    ```


    The LED on pin 18 should light. Then, to turn off the LED, send:


    ```

    $ mosquitto_pub -d -t kitchen_lights -m 0

    ```'
