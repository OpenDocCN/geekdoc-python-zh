- img_proc: true
  md: "Note that the tactile push switch shown in Figure 19-11 is a two-pin version.\
    \ If your switch has four pins, then it can go on the same row, but will need\
    \ to span the two halves of the breadboard.\n\nThe program `ch_19_digital_input.py`\
    \ repeatedly reads the digital input of pin 16, displaying either 1 or 0, depending\
    \ on whether the switch is pressed or not. Open it in Thonny and try running it:\n\
    \n```\nfrom machine import Pin\nfrom utime import sleep\n\nswitch = Pin(16, Pin.IN,\
    \ Pin.PULL_UP)\n\nwhile True:\n    print(switch.value())\n    sleep(0.1)\n```\n\
    \nAs with all the program examples in this book, you can also download this code\
    \ (see Recipe 3.22).\n\n# Discussion\n\nIn the preceding example, when the variable\
    \ switch is assigned an instance of Pin, the call to create a new instance of\
    \ Pin has three parameters:\n\n+   - the pin number\n- the direction\n- Pin.PULL_UP\n\
    \nThe last parameter does something clever inside the circuitry of the Pico's\
    \ GPIO pin. It turns on a transistor that connects an internal pull-up resistor\
    \ (Figure 19-12). This resistor, which has a value of about 20kΩ, pulls the GPIO\
    \ pin up to about 3.3V. Without this resistor, the GPIO pin would be said to be\
    \ *floating*. This means that the pin will act like an antenna picking up electrical\
    \ noise, and will flip between on and off more or less at random, which is not\
    \ behavior you want in a switch. There is nothing special about GP16—all of the\
    \ Pico's GPIO pins have this feature.\n\nWhen the switch is pressed, GP16 is connected\
    \ to GND (0V). This massively overrides the week pull-up resistor, taking GP16\
    \ from high to low. That is why program `ch_19_digital_input.py`, rather counterintuitively,\
    \ displays a 0 when the switch button is pressed and a 1 when it is released."
  merge: -1
  pgno: 564
- img_proc: true
  md: "![](img/e36e77524aeaae366529d1cf02f9a39c_565_0.png)\n\nFigure 19-12. Internal\
    \ pull-up resistors\n\n# See Also\n\nTo connect a switch to the GPIO pin of a\
    \ regular Raspberry Pi, see Recipe 13.1.\n\n# 19.6 Using Analog (PWM) Outputs\
    \ on a Pico\n\n# Problem\n\nYou want to vary the brightness of an LED from a Python\
    \ program on your Pico or Pico W.\n\n# Solution\n\nUse the PWM (pulse-width modulation)\
    \ capability of the Pico to control the average power supplied to the LED.\n\n\
    To try this out, you can connect an external LED to the Pico as described in Recipe\
    \ 19.4 or, if you prefer, use the Pico's built-in LED. If you decide to use the\
    \ built-in LED, remember to change the pin from 16 to 25 in the following example\
    \ program, which you will find in the file ch_19_pwm.py:\n\n```\nfrom machine\
    \ import Pin, PWM\nfrom utime import sleep\n\nled = PWM(Pin(16))\n\nwhile True:\n\
    \    brightness_str = input(\"brightness (0-65534):\")\n    brightness = int(brightness_str)\n\
    \    led.duty_u16(brightness)\n```\n\nAs with all the program examples in this\
    \ book, you can also download this code (see Recipe 3.22)."
  merge: -1
  pgno: 565
- img_proc: true
  md: 'Run the program in Thonny. In the Python console, you will be prompted to enter
    a value of brightness between 0 (off) and 65534 (maximum brightness).


    # Discussion


    PWM provides pulses of varying duration to the LED to control its apparent brightness.
    You will find a proper explanation of this in Recipe 11.3.


    To make an output pin into a PWM output pin, you just wrap it in the PWM class
    with PWM(Pin(16)). You can then change the duty cycle of the output by calling
    the rather unfriendly sounding duty_u16 method. The u16 part means an unsigned
    16-bit number. The maximum value of an unsigned 16-bit number is 65535, not 65534,
    but the Pico’s official documentation states that the maximum duty value should
    be the latter, so that’s what we use here.


    If you have used PWM on a regular Raspberry Pi, you may have noticed that the
    LED brightness might change a little. This unreliability is because PWM on a regular
    Raspberry Pi is implemented in software and, every so often, Raspberry Pi OS will
    stop generating pulses for PWM and go off and do other operating system things.
    The great advantage of PWM on a Pico is that the Pico implements PWM in hardware
    dedicated just to generating the pulses and is therefore rock-solid.


    # See Also


    PWM on a regular Raspberry Pi is described in Recipe 11.3.


    # 19.7 Using Analog Inputs on a Pico


    # Problem


    You want to read an analog voltage using MicroPython on your Pico or Pico W.


    # Solution


    Connect a voltage source of between 0 and the 3.3V supply to one of the analog-capable
    GPIO pins (26, 27, and 28) and use the Pico’s ADC (analog-to-digital converter)
    to measure the voltage.


    To illustrate this recipe, we’ll use a trimpot (a potentiometer or variable resistor)
    to provide a voltage between 0 and 3.3V to pin 26, depending on the position of
    its knob. Figure 19-13 shows how this can be wired-up on a breadboard. Any value
    of pot between 1kΩ and 100kΩ will work just fine. A small trimpot, such as the
    one supplied in the MonkMakes Electronics Kit 1 for Pico, will fit nicely on the
    breadboard.'
