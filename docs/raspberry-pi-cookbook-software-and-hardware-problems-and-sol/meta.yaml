    # See Also


    You can also use cat to concatenate (join together) a number of files (Recipe
    3.32).


    Another popular command related to more is less. less is like more except that
    it allows you to move backward in the file as well as forward.


    # 3.9 Creating a File Without Using an Editor


    # Problem


    You want to create a one-line file without having to use an editor.


    # Solution


    Use the > and echo commands to redirect what you type on the command line to a
    file.


    For example:


    ```

    $ echo "file contents here" > test.txt

    $ more test.txt

    file contents here

    ```


    ![](img/e36e77524aeaae366529d1cf02f9a39c_102_0.png)


    The > command overwrites any existing file with the same name, so use it with
    caution.


    # Discussion


    If you just want to create an empty file and edit it later, you can use the touch
    command followed by a filename, like this:'
  - '[PAGE 103]


    ```

    $ touch test.txt

    ```


    If you use the touch command on a file that already exists, it will change the
    modified timestamp on the file as if you had just edited it.


    # See Also


    To use the more command to view files without using an editor, see Recipe 3.8.


    To use > to capture other kinds of system output, see Recipe 3.31.


    # 3.10 Creating a Directory


    # Problem


    You want to create a new directory using the Terminal.


    # Solution


    The mkdir command creates a new directory.


    # Discussion


    To create a directory, use the mkdir command. Try out the following example (note
    that only the commands are shown, not the responses):


    ```

    $ cd ~

    $ mkdir my_directory

    $ cd my_directory

    $ ls

    ```


    You need to have write permissions in the directory within which you are trying
    to create the new directory.


    # See Also


    For general information on using the Terminal to navigate the filesystem, see
    Recipe 3.4.


    # 3.11 Deleting a File or Directory


    # Problem


    You want to delete a file or directory using the Terminal.'
  - '[PAGE 104]


    # Solution


    The rm (remove) command will delete a file or directory and its contents. You
    should use this with extreme caution.


    # Discussion


    Deleting a single file is simple and safe. The following example will delete the
    file *my_file.txt* from the home directory; you can use the ls command to make
    sure it''s gone:


    ```

    $ cd ~

    $ rm my_file.txt

    $ ls

    ```


    You need to have write permissions in the directory within which you are trying
    to carry out the deletion.


    You can also use the * wildcard when deleting files. This example deletes all
    the files that begin with *my_file.* in the current directory:


    ```

    $ rm my_file.*

    ```


    You could also delete all the files in the directory by typing:


    ```

    $ rm *

    ```


    If you want to recursively delete a directory (that is, not just the directory
    itself, but all the files and directories that it contains), you can use the -r
    option:


    ```

    $ rm -r mydir

    ```


    > When deleting files from a Terminal window, remember that you do not have the
    safety net of a recycle bin from which deleted files can be retrieved. Also, generally
    speaking, you won''t be given the option to confirm; the files will just immediately
    be deleted. This can be totally devastating if you combine it with the sudo command
    (Recipe 3.12).


    # See Also


    For more information on navigating the file system using the Terminal, see Recipe
    3.4.


    If you are concerned about accidentally deleting files or folders, you can force
    the rm command to confirm deletions by setting up a command alias (Recipe 3.36).'
