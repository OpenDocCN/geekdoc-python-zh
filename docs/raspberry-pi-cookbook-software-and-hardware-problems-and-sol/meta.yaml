- img_proc: true
  md: '# CHAPTER 19

    Raspberry Pi Pico and Pico W


    # 19.0 Introduction


    Although a regular Raspberry Pi is ideal for projects that need a network connection
    or a graphical user interface (GUI), its power consumption and lack of any analog
    inputs puts it at a disadvantage to a simpler microcontroller board such as the
    Arduino or Raspberry Pi Pico.


    The Raspberry Pi Pico is very different from any other Raspberry Pi in several
    ways:


    +   - It doesn''t have any interface to keyboard, mouse, or screen.

    - It has a relatively small 2M of flash memory for storing programs (no microSD
    slot) and 264k of RAM.

    - Its processor runs at just 133 MHz, compared with the Raspberry Pi 4''s 1.2
    GHz.

    - It doesn''t have an operating system. In effect, MicroPython is its operating
    system, and you just get what you see when you''re on the Python command line.


    This might lead you to wonder why you would use such an apparently feeble board
    rather than, say, a Raspberry Pi Zero.


    The answer is that the Pico (Figure 19-1) is even lower cost than a Pi Zero and
    better than a Raspberry Pi 4 at interfacing with external electronics in several
    ways. For example:


    +   - Three analog inputs makes connecting analog sensors much easier than with
    a regular Raspberry Pi.

    - Six pulse-width modulation (PWM) outputs. These outputs are hardware-timed and
    produce a much more accurate PWM signal than can be achieved with the Raspberry
    Pi, making them a lot better for controlling servomotors.'
  merge: -1
  pgno: 548
- img_proc: true
  md: '+   - Built-in power supply that allows the Pico to be powered from 1.8 to
    5.5V, and low power consumption so you can run it from a pair of AA batteries
    for hours.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_549_0.png)


    Figure 19-1. A Raspberry Pi Pico board


    The Raspberry Pi Pico W (Figure 19-2) shares the same pinout as the Pico, but
    the metal rectangle that you see on the right of the board is a WiFi and Bluetooth
    module. This makes the Pico W suitable for connected projects. The Pico W is still
    a good value, but considerably more expensive than the Pico.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_549_1.png)


    Figure 19-2. A Raspberry Pi Pico W'
  merge: -1
  pgno: 549
- img_proc: true
  md: 'In the remainder of this chapter, I will refer to the Raspberry Pi Pico and
    Pico W as just “Pico” (except when the difference matters) and refer to a regular
    Raspberry Pi 4 or 400, etc. as just a “Raspberry Pi.”


    # 19.1 Connecting a Pico or Pico W to a Computer


    # Problem


    You want to connect your Pico or Pico W to your Raspberry Pi or a Mac or Windows
    PC so that you can program it.


    # Solution


    The Thonny Python editor has support for the Pico and Pico W and is pre-installed
    with Raspberry Pi OS. If you have not used Thonny, open it from the Programming
    section of the Raspberry Menu.


    To configure Thonny for Pico use, you need to set it into Normal mode (Recipe
    5.3), so that you have access to the menu, and then select Options from the Tools
    menu and go to the Interpreter tab (Figure 19-3).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_550_0.png)


    On the drop-down list, select MicroPython (Raspberry Pi Pico) as the interpreter
    to use, and then click OK. This will take you to a screen offering to install
    MicroPython'
  merge: -1
  pgno: 550
- img_proc: true
  md: 'onto your Pico (Figure 19-4). To do this, you need to use a micro-USB lead
    to connect the Pico to one of your Raspberry Pi''s USB ports. Hold down the BOOTSEL
    button on the top of the Pico while you plug it in. This will put the Pico into
    a boot mode that will allow Thonny to install MicroPython onto it.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_551_0.png)


    *Figure 19-4. Installing MicroPython onto a Pico*


    Click on Install and MicroPython will be flashed onto the Pico. You shouldn''t
    need to perform this step again for that Pico.


    > ## Installing Firmware by Download


    Occasionally, you might find that your Pico gets itself in a zombie state and
    appears to be broken. Often this can be fixed by manually replacing the firmware.
    Think of this as a factory reset.


    If you have a Pico W, you''ll need to download a specific version of the firmware
    for it.


    To manually install new firmware onto your Pico or Pico W, start by unplugging
    it from your Raspberry Pi or other computer.


    If you have a Pico W, go to [https://rpf.io/pico-w-firmware](https://rpf.io/pico-w-firmware).
    This will immediately start the download of a .uf2 firmware file for the Pico
    W.'
  merge: -1
  pgno: 551
- img_proc: true
  md: 'If, on the other hand, you have a regular Pico, download the file.

    Next, hold down the BOOTSEL button (Figure 19-5), and with the button held down,
    connect the Pico with your USB lead.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_552_0.png)


    Release the BOOTSEL button and your Pico or Pico W will mount itself as USB flash
    storage on your Raspberry Pi (Figure 19-6, right).

    Drag or copy the .uf2 file that you downloaded earlier onto the Pico or Pico W''s
    filesystem.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_552_1.png)'
  merge: -1
  pgno: 552
- img_proc: true
  md: '> Once the file is copied, the Pico or Pico W will unmount itself and be ready
    to receive your MicroPython programs via Thonny.


    If you find that installing the firmware here doesn''t work on a Raspberry Pi,
    you can also install Thonny on a Mac or Windows PC and then install the firmware
    onto the Pico.


    # Discussion


    When you choose to install MicroPython onto your Pico or Pico W, what happens
    is that a cut-down version of Python 3 called *MicroPython* is installed onto
    the Pico''s flash memory. As you will see in Recipe 19.2 this allows you to interact
    with a Python Shell on the Pico and also copy Python programs to be run onto the
    Pico''s flash memory.


    Although MicroPython is a cut-down version of Python 3, you will find that most
    of the material covered in Chapters 5, 6, and 7 will also work in MicroPython.
    In addition, other hardware-specific libraries are available to use the Pico''s
    GPIO pins (among other things).


    # See Also


    For more information on Thonny, see Recipe 5.3.


    # 19.2 Using the Python Shell on a Pico


    # Problem


    Having set up Thonny for the Pico and installed MicroPython onto your Pico or
    Pico W, you want to interact with it using the Python Shell.


    # Solution


    As soon as Thonny has uploaded MicroPython onto your Pico, you should see the
    shell area appear on the bottom half of the Thonny window (Figure 19-7).


    As the >>> prompt implies, this is a Python command line, where you can type any
    Python you like and it will run. The important point is that it will run on the
    Pico, not on your regular Raspberry Pi.'
  merge: -1
  pgno: 553
- img_proc: true
  md: '![](img/e36e77524aeaae366529d1cf02f9a39c_554_0.png)


    Figure 19-7. Using the Python Shell on a Pico


    The Pico has a built-in LED connected to GPIO pin 25. We can turn this on and
    off using the Python commands shown in Figure 19-7. First we must import the Pin
    class from the machine module. We can then create a new instance of Pin assigned
    to pin 25 and specify that it''s an output (Pin.OUT). Finally, we can use the
    methods on and off to control the LED.


    # Discussion


    The machine module is a MicroPython module that contains the interface to the
    actual hardware of the Pico. This looks a little different from gpiozero, the
    module use to control the pins of a regular Raspberry Pi. For comparison, Table
    19-1 shows the code we have just written for the Pico, next to the equivalent
    in gpiozero taken from Recipe 11.1.'
  merge: -1
  pgno: 554
- img_proc: true
  md: 'Table 19-1. MicroPython on Pico vs. gpiozero on Raspberry Pi


    | MicroPython | GPIOZero |

    | :--- | :--- |

    | from machine import Pin | from gpiozero import LED |

    | led = Pin(25, Pin.OUT) | led = LED(18) |

    | led.on() | led.on() |

    | led.off() | led.off() |


    As you can see, the approach is very similar. The main difference is that gpiozero
    uses LED to represent the pin and the direction of the pin (output) is inferred
    rather than having to be explicitly stated when the pin is declared, which you
    have to do for the MicroPython code for the Pico.


    Since the code for this chapter is MicroPython rather than the normal Python that
    we have used everywhere else in this book, you will find it in a separate directory
    called *pico* in the book’s code download (see Recipe 3.22). This is where you’ll
    find MicroPython programs to open in Thonny and run.


    # See Also


    More information is available in the MicroPython documentation.


