    # Discussion


    gpiozero provides a class for the PIR sensor, MotionSensor, so we might as well
    use it. However, this class doesn''t really do anything except monitor the pin
    in question as a digital input.


    When triggered, the output of the PIR sensor will stay high for a little while.
    You can adjust this using one of the trimpots (variable resistors) on its circuit
    board. The second trimpot (if present) will set the threshold of light level that
    will disable the sensor. This is useful when the sensor is being used to control
    a light—turning the light on when detecting movement, but only when it''s dark.


    # See Also


    More information is available in the full documentation for MotionSensor.


    You could combine this recipe with Recipe 7.16 to send an email when an intruder
    is detected, or you could integrate it with If This Then That (IFTTT) to provide
    a bevy of possible ways of being notified (see Recipe 17.4).


    To detect movement using computer vision and a webcam, see Recipe 8.6.


    # 13.10 Adding GPS to the Raspberry Pi


    # Problem


    You want to connect a serial GPS module to a mobile Raspberry Pi and access the
    data using Python.


    # Solution


    A serial GPS module, with 3.3V output, can be connected directly to Raspberry
    Pi''s RXD connection. This means that for it to work, you must follow Recipe 2.6.
    Note that, although you need to enable the serial port hardware, you should not
    enable the serial console option.


    Figure 13-15 shows how the module is wired. The RXD of the Raspberry Pi connects
    to TX of the GPS module. The only other connections are for GND and power, so
    we can use three female-to-female headers.'
