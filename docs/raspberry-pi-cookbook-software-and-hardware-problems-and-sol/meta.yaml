- img_proc: true
  md: '# Setting the network name using the Raspberry Pi Configuration tool


    Unless you are running your Raspberry Pi headless (without monitor and keyboard
    attached), the simplest way to set the network name of your Raspberry Pi is to
    use the Raspberry Pi Configuration tool. To open this, go to the Raspberry Menu,
    select Preferences, and then click Raspberry Pi Configuration. Then click the
    System tab (Figure 2-5).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_69_0.png)


    Change the name in the Hostname field to your preferred name and click OK. You
    are prompted to reboot for the changes to take effect (Recipe 1.15).


    # Setting the network name using the command line (the easy way)


    You can also change your Raspberry Pi''s network name from the command line using
    the raspi-config utility. Run the following command in a Terminal session:


    ```

    $ sudo raspi-config

    ```


    This opens the raspi-config utility. Use the up/down arrow keys to select Network
    Options and then press Enter. This opens a form in which you can enter the new
    network name (Figure 2-6). Note that this interface uses only the command line,
    so you can use it from an SSH session (Recipe 2.7).'
  merge: -1
  pgno: 69
- img_proc: true
  md: '![](img/e36e77524aeaae366529d1cf02f9a39c_70_0.png)


    Figure 2-6. Setting the hostname of a Raspberry Pi using raspi-config


    # Setting the network name using the command line (the hard way)


    If you really want to do it the hard way, you can directly edit the files that
    control the Raspberry Pi''s network name. There are two files that you need to
    change.


    First, edit the file `/etc/hostname`. You can do this by opening a Terminal window
    and typing the command:


    ```

    $ sudo nano /etc/hostname

    ```


    Replace `raspberry` with a name of your choice.


    Second, open the file `/etc/hosts` in an editor using the command:


    ```

    $ sudo nano /etc/hosts

    ```


    The file will look something like this:


    ```

    127.0.0.1       localhost

    ::1             localhost ip6-localhost ip6-loopback

    fe00::0         ip6-localnet

    ff00::0         ip6-mcastprefix

    ff02::1         ip6-allnodes

    ff02::2         ip6-allrouters


    127.0.1.1       raspberry

    ```


    Change the name at the end of the file (`raspberry`) to your preferred new name.'
  merge: -1
