- md: "## Discussion\n\nThe Unicorn HAT makes a very convenient way to attach a matrix\
    \ of addressable LEDs. You will also find other chains of addressable LEDs laid\
    \ out in various configurations, including matrices with even more LEDs on them.\
    \ Generally, such matrices of addressable LEDs are actually arranged electrically\
    \ as a long chain of LEDs.\n\n## See Also\n\nFor more information on addressable\
    \ (NeoPixel) LEDs, see Recipe 15.5.\n\n## 15.7 Using an ePaper Display\n\n###\
    \ Problem\n\nYou want to use your Raspberry Pi to control an ePaper display.\n\
    \n### Solution\n\nAttach an Inky pHAT or Inky wHAT module to your Raspberry Pi\
    \ (Figure 15-9). Download the Pimoroni software for this using the command:\n\n\
    ```\n$ curl https://get.pimoroni.com/inkyphat | bash\n```\n\nIf (when prompted)\
    \ you accept the option to fetch examples and documentation, this will take quite\
    \ some time to install.\n\nAs an example program (ch_15_phate.py), let's have\
    \ the Inky pHAT display the Raspberry Pi's IP address:\n\n```\nfrom inky import\
    \ InkyPHAT\nfrom PIL import Image, ImageFont, ImageDraw\nfrom font_fredoka_one\
    \ import FredokaOne\nimport subprocess\n\ninky_display = InkyPHAT(\"red\")\ninky_display.set_border(inky_display.WHITE)\n\
    \nimg = Image.new(\"P\", (inky_display.WIDTH, ink_display.HEIGHT))\ndraw = ImageDraw.Draw(img)\n\
    font = ImageFont.truetype(FredokaOne, 22)\n\nmessage = str(subprocess.check_output(['hostname',\
    \ '-I'])).split()[0][2:]\nprint(message)\n\nw, h = font.getsize(message)\nx =\
    \ (inky_display.WIDTH / 2) - (w / 2)\ny = (inky_display.HEIGHT / 2) - (h / 2)\n\
    draw.text((x, y), message, inky_display.RED, font)\ninky_display.set_image(img)\n\
    inky_display.show()\n```\n\nAs with all the program examples in this book, you\
    \ can also download this program (see Recipe 3.22).\n\nThe example program uses\
    \ the subprocess library (Recipe 7.15) to obtain the IP address assigned to the\
    \ Raspberry Pi.\n\n![Figure 15-9. The Pimoroni Inky pHAT attached to a Raspberry\
    \ Pi 3](img/e36e77524aeaae366529d1cf02f9a39c_468_0.png)\n\n### Discussion\n\n\
    You won't be playing any video games on these displays because they take a few\
    \ seconds to update but, after they update, the ePaper keeps whatever you have\
    \ drawn on it even when the power is removed. Pimoroni sells small displays like\
    \ the Inky pHAT used here, and also a display twice the size that is pretty much\
    \ as big as the Raspberry Pi (Inky wHAT).\n\n### See Also\n\nMore information\
    \ is available in the full documentation of Inky pHAT.\n\n# CHAPTER 16\nSound\n\
    \n## 16.0 Introduction\n\nIn this chapter, you learn how to use sound with your\
    \ Raspberry Pi. There are recipes both for playing sounds in various ways—using\
    \ loudspeakers or a buzzer—and for using a microphone to record sounds.\n\n##\
    \ 16.1 Connecting a Loudspeaker\n\n### Problem\n\nYou want to play sounds from\
    \ your Raspberry Pi.\n\n### Solution\n\nAttach a powered speaker such as the one\
    \ shown in Figure 16-1.\nHaving attached the speaker to the audiovisual socket,\
    \ you will also need to configure the Raspberry Pi to play through the audiovisual\
    \ jack, not HDMI, using Recipe 16.2.\n\n![Figure 16-1. Attaching a rechargeable\
    \ amplified speaker to a Raspberry Pi](img/e36e77524aeaae366529d1cf02f9a39c_471_0.png)\n\
    \nAn alternative to using a general-purpose speaker like the one shown in Figure\
    \ 16-1 is to use a speaker kit designed specifically for the Raspberry Pi, such\
    \ as the Monk-Makes Speaker Kit for Raspberry Pi, shown in Figure 16-2.\n\n![Figure\
    \ 16-2. The MonkMakes amplified speaker and a Raspberry Pi](img/e36e77524aeaae366529d1cf02f9a39c_471_1.png)\n\
    \nThis speaker is connected using the audio lead supplied with the kit, and the\
    \ speaker uses the Raspberry Pi’s 5V power supply, connected using female-to-female\
    \ leads.\n\nRaspberry Pi OS comes with a handy program to test that your speaker\
    \ is working. Type the following command in the Terminal:\n\n```\n$ speaker-test\
    \ -t wav -c 2\n\nspeaker-test 1.1.3\n\nPlayback device is default\nStream parameters\
    \ are 48000Hz, S16_LE, 2 channels\nWAV file(s)\nRate set to 48000Hz (requested\
    \ 48000Hz)\nBuffer size range from 256 to 32768\nPeriod size range from 256 to\
    \ 32768\nUsing max buffer size 32768\nPeriods = 4\nwas set period_size = 8192\n\
    was set buffer_size = 32768\n 0 - Front Left\n 1 - Front Right\nTime per period\
    \ = 2.411811\n 0 - Front Left\n 1 - Front Right\n```\n\nWhen you run this command,\
    \ you will hear a voice saying “front left,” “front right,” and so on. This is\
    \ designed to test a stereo audio setup.\n\n### Discussion\n\nAs well as connecting\
    \ amplified loudspeakers of various types, you can also directly connect a pair\
    \ of headphones to a Raspberry Pi’s audio socket.\n\nBy default, a Raspberry Pi’s\
    \ output is via the HDMI cable. So if your Pi is connected to a TV or a monitor\
    \ with built-in speakers, all you need to do to hear sounds from your Raspberry\
    \ Pi is to turn up the volume on your TV or monitor. However, if you are using\
    \ the Raspberry Pi without a monitor, or your monitor doesn’t have speakers, you\
    \ can follow this recipe.\n\n### See Also\n\n- To pair your Raspberry Pi with\
    \ a Bluetooth speaker, see [Recipe 1.17](https://example.com/recipe-1.17).\n-\
    \ To specify where sound is output, see [Recipe 16.2](https://example.com/recipe-16.2).\n\
    - To play a test sound, see [Recipe 16.5](https://example.com/recipe-16.5).\n\
    - For more information on the Speaker Kit for Raspberry Pi, see [https://oreil.ly/Q73vu](https://oreil.ly/Q73vu).\n\
    \n## 16.2 Controlling Where Sound Is Output\n\n### Problem\n\nYou want to control\
    \ which of several output options the Raspberry Pi will use when making sounds.\n\
    \n### Solution\n\nThe simplest way to set the audio output is to use the selector\
    \ available when you right-click the Speaker icon in the upper-right corner of\
    \ your desktop (Figure 16-3).\n\n![Figure 16-3.](img/e36e77524aeaae366529d1cf02f9a39c_473_0.png)\n\
    \nNote that the entry Comiso M20 in Figure 16-3 is for a Bluetooth speaker that\
    \ has already been paired with the Raspberry Pi (see Recipe 1.17).\n\n### Discussion\n\
    \nIf you are running your Raspberry Pi headless (without a monitor), you can still\
    \ control where the sound is output using the raspi-config command-line utility.\n\
    \nOpen a Terminal session and enter the following command:\n\n```\n$ sudo raspi-config\n\
    ```\n\nThen select the option System, followed by Audio. You can then select the\
    \ option you want, as shown in Figure 16-4.\n\n![Figure 16-4. Using raspi-config\
    \ to change the audio output device](img/e36e77524aeaae366529d1cf02f9a39c_474_0.png)\n\
    \n### See Also\n\n- To learn about connecting a speaker to your Raspberry Pi,\
    \ see Recipe 16.1.\n- For more sound input and output options, you can use the\
    \ Audio Device Settings tool; see Recipe 16.6.\n\n## 16.3 Playing Audio on a Raspberry\
    \ Pi Without an Audio Socket\n\n### Problem\n\nYou want high-quality audio output\
    \ on a Raspberry Pi without an audio jack, like a Pi Zero or Pi 400.\n\n### Solution\n\
    \nAttach a Pimoroni Audio DAC Shim as shown in Figure 16-5 to the GPIO connector\
    \ and connect the line out to an audio amplifier. If you are using a Raspberry\
    \ Pi 400, you’ll need a GPIO adapter to gain access to the GPIO pins.\n\n![Figure\
    \ 16-5. Attaching an Audio DAC SHIM to a Raspberry Pi 400](img/e36e77524aeaae366529d1cf02f9a39c_475_0.png)\n\
    \nPimoroni’s SHIM concept is a clever one, which allows small add-on boards to\
    \ be attached to the GPIO connector without the use of soldering or a connector\
    \ socket. It just slides over the GPIO connector as a tight fit, slightly sprung\
    \ to make good contact with the pins.\n\nFor the Audio DAC card to be recognized,\
    \ you need to install some software from Pimoroni, by running the following commands:\n\
    \n```\n$ cd ~\n$ git clone https://github.com/pimoroni/pirate-audio\n$ cd pirate-audio/mopidy\n\
    $ sudo ./install.sh\n```\n\nOnce the install has finished, restart your Raspberry\
    \ Pi, and you should find that when you right-click on the Audio icon on the top\
    \ right of the desktop, the new sound interface will be available to select (Figure\
    \ 16-6).\n\n![Figure 16-6. Selecting the Audio DAC SHIM for output](img/e36e77524aeaae366529d1cf02f9a39c_475_1.png)\n\
    \n### Discussion\n\nThe output from the Audio DAC SHIM may be the same connector\
    \ as a headphone jack, but you should not connect headphones directly. This connector\
    \ is just for connecting to your HiFi and is not powerful enough to drive headphones\
    \ directly.\n\nA more conventional way to add a new audio interface to your Raspberry\
    \ Pi is to attach a USB sound card. Most of these that claim to work with Linux\
    \ will work fine on a Raspberry Pi.\n\n### See Also\n\nAs well as configuring\
    \ the Pi for the Audio DAC, the installation script in this recipe also installs\
    \ Mopidy, a version of MPD (Music Player Daemon).\n\n## 16.4 Playing Sound from\
    \ the Command Line\n\n### Problem\n\nYou want to be able to play a sound file\
    \ from the Raspberry Pi's command line.\n\n### Solution\n\nUse the built-in VLC\
    \ software from the command line. To try this out, locate the file called school_bell.mp3\
    \ in this book's downloads in the python directory. You can play this license-free\
    \ sound using the following command. Note that on the command line, the command\
    \ cvlc, not vlc, is used:\n\nThis will play the sound file through the current\
    \ audio output device.\n\n```\n$ cvlc ~/raspberrypi_cookbook_ed4/python/school_bell.mp3\n\
    ```\n\n### Discussion\n\nVLC will play most types of sound files, including MP3,\
    \ WAV, AIFF, AAC, and OGG. However, if you want to play only uncompressed WAV\
    \ files, you can also use the lighter-weight aplay command:\n\n```\n$ aplay ~/raspberrypi_cookbook_ed4/python/school_bell.mp3\n\
    ```\n\n### See Also\n\n- VLC is also used in Recipe 4.9.\n- Documentation for\
    \ aplay is available at https://oreil.ly/Fbs94."
  mdcn: "## 讨论\n\nUnicorn HAT 提供了一种非常便捷的方式来连接可寻址 LED 矩阵。你还会发现其他以各种配置排列的可寻址 LED 灯链，包括拥有更多\
    \ LED 的矩阵。通常，这类可寻址 LED 矩阵在电气上实际上是排列成一条长长的 LED 链。\n\n## 另请参阅\n\n有关可寻址（NeoPixel）LED\
    \ 的更多信息，请参阅配方 15.5。\n\n## 15.7 使用电子纸显示屏\n\n### 问题\n\n你想使用你的树莓派来控制一个电子纸显示屏。\n\n\
    ### 解决方案\n\n将 Inky pHAT 或 Inky wHAT 模块连接到你的树莓派（图 15-9）。使用以下命令下载 Pimoroni 的相关软件：\n\
    \n```\n$ curl https://get.pimoroni.com/inkyphat | bash\n```\n\n如果（在提示时）你选择获取示例和文档，安装过程将花费相当长的时间。\n\
    \n作为一个示例程序（ch_15_phate.py），我们让 Inky pHAT 显示树莓派的 IP 地址：\n\n```\nfrom inky import\
    \ InkyPHAT\nfrom PIL import Image, ImageFont, ImageDraw\nfrom font_fredoka_one\
    \ import FredokaOne\nimport subprocess\n\ninky_display = InkyPHAT(\"red\")\ninky_display.set_border(inky_display.WHITE)\n\
    \nimg = Image.new(\"P\", (inky_display.WIDTH, ink_display.HEIGHT))\ndraw = ImageDraw.Draw(img)\n\
    font = ImageFont.truetype(FredokaOne, 22)\n\nmessage = str(subprocess.check_output(['hostname',\
    \ '-I'])).split()[0][2:]\nprint(message)\n\nw, h = font.getsize(message)\nx =\
    \ (inky_display.WIDTH / 2) - (w / 2)\ny = (inky_display.HEIGHT / 2) - (h / 2)\n\
    draw.text((x, y), message, inky_display.RED, font)\ninky_display.set_image(img)\n\
    inky_display.show()\n```\n\n与本书中所有的程序示例一样，你也可以下载这个程序（参见配方 3.22）。\n\n该示例程序使用 subprocess\
    \ 库（配方 7.15）来获取分配给树莓派的 IP 地址。\n\n![图 15-9. 连接到树莓派 3 的 Pimoroni Inky pHAT](img/e36e77524aeaae366529d1cf02f9a39c_468_0.png)\n\
    \n### 讨论\n\n你无法在这些显示屏上玩任何视频游戏，因为它们需要几秒钟来刷新，但刷新之后，即使断电，电子纸也会保持你绘制的内容。Pimoroni 销售像这里使用的\
    \ Inky pHAT 这样的小显示屏，也销售尺寸大一倍、几乎和树莓派一样大的显示屏（Inky wHAT）。\n\n### 另请参阅\n\n更多信息可在 Inky\
    \ pHAT 的完整文档中找到。\n\n# 第 16 章\n声音\n\n## 16.0 简介\n\n在本章中，你将学习如何在树莓派上使用声音。这里既有以各种方式播放声音的配方——使用扬声器或蜂鸣器——也有使用麦克风录制声音的配方。\n\
    \n## 16.1 连接扬声器\n\n### 问题\n\n你想从树莓派播放声音。\n\n### 解决方案\n\n连接一个有源扬声器，如图 16-1 所示。\n\
    将扬声器连接到音视频插孔后，你还需要按照配方 16.2 配置树莓派通过音视频插孔而不是 HDMI 播放声音。\n\n![图 16-1. 将可充电放大扬声器连接到树莓派](img/e36e77524aeaae366529d1cf02f9a39c_471_0.png)\n\
    \n除了使用图 16-1 所示的通用扬声器外，另一种选择是使用专为树莓派设计的扬声器套件，例如图 16-2 所示的 Monk-Makes Speaker Kit\
    \ for Raspberry Pi。\n\n![图 16-2. MonkMakes 放大扬声器和树莓派](img/e36e77524aeaae366529d1cf02f9a39c_471_1.png)\n\
    \n该扬声器使用套件中提供的音频线连接，并使用树莓派的 5V 电源供电，通过公对公跳线连接。\n\n树莓派操作系统附带一个方便的程序来测试你的扬声器是否工作。在终端中输入以下命令：\n\
    \n```\n$ speaker-test -t wav -c 2\n\nspeaker-test 1.1.3\n\nPlayback device is\
    \ default\nStream parameters are 48000Hz, S16_LE, 2 channels\nWAV file(s)\nRate\
    \ set to 48000Hz (requested 48000Hz)\nBuffer size range from 256 to 32768\nPeriod\
    \ size range from 256 to 32768\nUsing max buffer size 32768\nPeriods = 4\nwas\
    \ set period_size = 8192\nwas set buffer_size = 32768\n 0 - Front Left\n 1 - Front\
    \ Right\nTime per period = 2.411811\n 0 - Front Left\n 1 - Front Right\n```\n\n\
    运行此命令时，你会听到一个声音说“front left”、“front right”等。这是为了测试立体声音频设置。\n\n### 讨论\n\n除了连接各种类型的放大扬声器外，你还可以直接将一对耳机连接到树莓派的音频插孔。\n\
    \n默认情况下，树莓派的输出是通过 HDMI 线。因此，如果你的树莓派连接到电视或带内置扬声器的显示器，要听到树莓派的声音，你只需调高电视或显示器的音量即可。但是，如果你在没有显示器的情况下使用树莓派，或者你的显示器没有扬声器，你可以按照这个配方操作。\n\
    \n### 另请参阅\n\n- 要将你的树莓派与蓝牙扬声器配对，请参阅[配方 1.17](https://example.com/recipe-1.17)。\n\
    - 要指定声音输出位置，请参阅[配方 16.2](https://example.com/recipe-16.2)。\n- 要播放测试声音，请参阅[配方 16.5](https://example.com/recipe-16.5)。\n\
    - 有关树莓派扬声器套件的更多信息，请参阅 [https://oreil.ly/Q73vu](https://oreil.ly/Q73vu)。\n\n##\
    \ 16.2 控制声音输出位置\n\n### 问题\n\n你想控制树莓派在发出声音时使用多个输出选项中的哪一个。\n\n### 解决方案\n\n设置音频输出最简单的方法是使用右键单击桌面右上角扬声器图标时出现的选项（图\
    \ 16-3）。\n\n![图 16-3.](img/e36e77524aeaae366529d1cf02f9a39c_473_0.png)\n\n请注意，图\
    \ 16-3 中的条目 Comiso M20 是一个已经与树莓派配对的蓝牙扬声器（参见配方 1.17）。\n\n### 讨论\n\n如果你在无头模式（没有显示器）下运行树莓派，你仍然可以使用\
    \ raspi-config 命令行工具来控制声音输出位置。\n\n打开一个终端会话并输入以下命令：\n\n```\n$ sudo raspi-config\n\
    ```\n\n然后选择 System 选项，接着选择 Audio。然后你可以选择你想要的选项，如图 16-4 所示。\n\n![图 16-4. 使用 raspi-config\
    \ 更改音频输出设备](img/e36e77524aeaae366529d1cf02f9a39c_474_0.png)\n\n### 另请参阅\n\n- 要了解如何将扬声器连接到你的树莓派，请参阅配方\
    \ 16.1。\n- 要获得更多声音输入和输出选项，你可以使用音频设备设置工具；请参阅配方 16.6。\n\n## 16.3 在没有音频插孔的树莓派上播放音频\n\
    \n### 问题\n\n你想在没有音频插孔的树莓派（如 Pi Zero 或 Pi 400）上获得高质量的音频输出。\n\n### 解决方案\n\n如图 16-5\
    \ 所示，将 Pimoroni Audio DAC Shim 连接到 GPIO 连接器，并将线路输出连接到音频放大器。如果你使用的是树莓派 400，你需要一个\
    \ GPIO 适配器来访问 GPIO 引脚。\n\n![图 16-5. 将音频 DAC SHIM 连接到树莓派 400](img/e36e77524aeaae366529d1cf02f9a39c_475_0.png)\n\
    \nPimoroni 的 SHIM 概念很巧妙，它允许小型附加板无需焊接或连接器插座即可连接到 GPIO 连接器。它只是紧密地滑过 GPIO 连接器，略微带有弹簧以与引脚良好接触。\n\
    \n为了让音频 DAC 卡被识别，你需要从 Pimoroni 安装一些软件，运行以下命令：\n\n```\n$ cd ~\n$ git clone https://github.com/pimoroni/pirate-audio\n\
    $ cd pirate-audio/mopidy\n$ sudo ./install.sh\n```\n\n安装完成后，重启你的树莓派，你应该会发现，当你右键单击桌面右上角的音频图标时，新的声音接口将可供选择（图\
    \ 16-6）。\n\n![图 16-6. 选择音频 DAC SHIM 作为输出](img/e36e77524aeaae366529d1cf02f9a39c_475_1.png)\n\
    \n### 讨论\n\n音频 DAC SHIM 的输出可能与耳机插孔是相同的连接器，但你不应该直接连接耳机。此连接器仅用于连接到你的高保真音响，其功率不足以直接驱动耳机。\n\
    \n为你的树莓派添加新音频接口的一种更传统的方法是连接一个 USB 声卡。大多数声称支持 Linux 的声卡在树莓派上都能正常工作。\n\n### 另请参阅\n\
    \n除了为音频 DAC 配置树莓派外，本配方中的安装脚本还安装了 Mopidy，这是 MPD（音乐播放器守护进程）的一个版本。\n\n## 16.4 从命令行播放声音\n\
    \n### 问题\n\n你想能够从树莓派的命令行播放声音文件。\n\n### 解决方案\n\n从命令行使用内置的 VLC 软件。要试用此功能，请在本书下载文件的\
    \ python 目录中找到名为 school_bell.mp3 的文件。你可以使用以下命令播放这个免许可的声音文件。请注意，在命令行上使用的是命令 cvlc，而不是\
    \ vlc：\n\n这将通过当前音频输出设备播放声音文件。\n\n```\n$ cvlc ~/raspberrypi_cookbook_ed4/python/school_bell.mp3\n\
    ```\n\n### 讨论\n\nVLC 可以播放大多数类型的声音文件，包括 MP3、WAV、AIFF、AAC 和 OGG。但是，如果你只想播放未压缩的 WAV\
    \ 文件，你也可以使用更轻量级的 aplay 命令：\n\n```\n$ aplay ~/raspberrypi_cookbook_ed4/python/school_bell.mp3\n\
    ```\n\n### 另请参阅\n\n- VLC 也在配方 4.9 中使用。\n- aplay 的文档可在 https://oreil.ly/Fbs94 获取。"
