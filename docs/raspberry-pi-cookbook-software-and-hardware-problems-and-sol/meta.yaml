  md: '![](img/e36e77524aeaae366529d1cf02f9a39c_68_0.png)


    Figure 2-4. Allocating a DHCP reservation


    # Discussion


    Networking has changed a lot with different versions of Raspberry Pi OS. These
    instructions apply to the latest (as of this writing) version. If you don''t have
    the latest version of Raspberry Pi OS, you should get it, because Raspberry Pi
    OS is always evolving and improving. You can learn how to do this in Recipe 3.40.
    To find out what version of the OS you have, see Recipe 3.39.


    # See Also


    Wikipedia has everything you want to know about IP addresses.


    # 2.4 Setting the Network Name of a Raspberry Pi


    # Problem


    You want to change the name of your Raspberry Pi as it appears on your network
    so that it''s not just called “raspberrypi.”


    # Solution


    There are several ways of doing this. Whichever method you use, make sure that
    the network name you choose does not contain spaces and contains only letters,
    numeric digits, and the hyphen (-) character.


    In all three methods, you also need to restart your Raspberry Pi for the changes
    to take effect.'
  merge: -1
