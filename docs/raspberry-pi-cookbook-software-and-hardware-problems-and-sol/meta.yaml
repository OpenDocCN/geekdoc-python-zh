    # 14.20 Measuring Distance Using a Time-of-Flight Sensor


    # Problem


    You want to measure distance without using ultrasound (perhaps you have animals
    who would be frightened by ultrasound, or you want to measure distance more accurately).


    # Solution


    Use a VL53L1X I2C time-of-flight (ToF) sensor. These sensors are more expensive
    than their ultrasound equivalents. However, because they use light rather than
    sound, they are more accurate.


    The most common of these devices is the VL53L1X, and it’s available as a low-cost
    module from eBay as well as from other suppliers. The Pimoroni device we are using
    here has the advantage that it is compatible with the Pimoroni Breakout Garden
    system and can therefore be plugged in without any soldering. Figure 14-28 shows
    the ToF sensor and Breakout Garden.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_440_0.png)


    Figure 14-28. A VL53L1X ToF sensor and Pimoroni Breakout Garden


    To make this project, you will need either:


    +   - Pimoroni Breakout Garden (see “Prototyping Equipment and Kits” on page 564)

    - Pimoroni VL53L1X distance sensor (see “Modules” on page 566)


    or:'
