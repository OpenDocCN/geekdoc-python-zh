- img_proc: true
  md: '![](img/e36e77524aeaae366529d1cf02f9a39c_343_0.png)


    Figure 12-6. Connecting servomotors with the Servo Six board


    # See Also


    If you have a lot of servos to control or require greater stability and precision,
    you can use a dedicated servo controller module, as described in [Recipe 12.3](Recipe
    12.3).


    See more information in the [full documentation of the Servo Six board](full documentation
    of the Servo Six board).


    Adafruit has developed [another method of servo control](another method of servo
    control).


    For an alternative solution that produces much more stable pulse timing using
    the ServoBlaster device driver software, see [Recipe 12.2](Recipe 12.2).


    # 12.2 Controlling Servomotors Precisely


    # Problem


    The pulse generation function of the gpiozero library is not precise or jitter-free
    enough for your servo application.


    # Solution


    Install the ServoBlaster device driver.'
