    ![](img/e36e77524aeaae366529d1cf02f9a39c_527_0.png)


    图 18-16. Sonoff 的网页


    点击 Toggle 按钮可以打开和关闭 Sonoff 的 LED。如果 Sonoff 实际上已接入你家中的电路，而不是由树莓派供电，它将打开和关闭它所连接的任何设备。


    ### 另请参阅


    要了解如何配置这些开关以与 MQTT 和 Node-RED 配合使用，请参阅 [步骤 18.5](#)。


    ## 18.5 将 Sonoff Web 开关与 MQTT 一起使用


    ### 问题


    你希望能够使用 MQTT 控制新刷写的 Sonoff Web 开关。


    ### 解决方案


    首先确保你已按照步骤 18.3 和 18.4 将新固件刷写到你的 Sonoff 设备上，并将其配置为连接到你的 WiFi 网络。


    要使用 MQTT 控制 Sonoff 开关，你需要使用其 Web 界面配置 Sonoff。在浏览器中输入你的 Sonoff 的 IP 地址（参见步骤 18.4），然后点击
    Configuration 按钮。这将打开如图 18-17 所示的菜单。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_528_0.png)


    图 18-17. Sonoff Tasmota 配置菜单


    点击 Configure MQTT 选项以打开 MQTT 配置页面，如图 18-18 所示。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_529_0.png)


    图 18-18. Sonoff Tasmota MQTT 配置菜单


    这是我们配置 Sonoff 作为 MQTT 服务器（参见步骤 18.1）客户端并指定其订阅方式的地方，以便当我们发布命令（例如，打开）时，它能理解该命令。


    为此，你需要更改配置表单中的一些字段：


    - 将 Host 字段更改为运行 MQTT 服务器的树莓派的 IP 地址。

    - 将 Client 字段更改为 “sonoff_1”。我们添加了 “_1” 是以防我们最终有多个需要区分的 Sonoff 设备。如果你愿意，也可以在这里使用更有意义的名称——例如，如果
    Sonoff 将安装在卧室，可以使用 “bedroom_1_sonoff”。

    - User 和 Password 字段未使用，因为我们的 MQTT 服务器没有配置任何安全性。这并不像听起来那么鲁莽，因为除非他们已经在你的网络内，否则任何人都无法做任何事情。所以这些字段填什么并不重要。

    - 将 Topic 更改为 “sonoff_1”，因为你最终可能有多个 Sonoff 开关。

    - 保持 Full Topic 字段不变。


    点击 Save，Sonoff 将会重启自身以使更改生效。


    ### 讨论


    你可以从终端测试此 MQTT 接口。输入以下命令，Sonoff 的 LED 应该会亮起：


    ```

    $ mosquitto_pub -t cmnd/sonoff_1/power -m 1

    ```


    输入此命令再次关闭开关：


    ```

    $ mosquitto_pub -t cmnd/sonoff_1/power -m 0

    ```


    如果这不起作用，请在命令中添加 -d 选项以检查 Mosquitto 客户端命令是否连接到 MQTT 服务器。


    ### 另请参阅


    我们在步骤 18.6 中基于此步骤的工作，使用 Node-RED 控制开关。


    ## 18.6 将刷写的 Sonoff 开关与 Node-RED 一起使用


    ### 问题


    你想将刷写的 Sonoff Web 开关与 Node-RED 一起使用。


    ### 解决方案


    按照步骤 18.5 让你的 Sonoff 与 MQTT 配合工作，然后在如图 18-19 所示的流程中使用 Node-RED MQTT 节点。


    如果你愿意，可以导入流程而不是从头构建。请按照步骤 18.2 讨论部分的说明导入流程。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_531_0.png)


    图 18-19. 用于延迟定时器的 Node-RED 流程


    此流程假设一个按钮连接到树莓派的 GPIO 25，并且当按下时，Sonoff 将开启 10 秒，然后再次关闭。


    按钮的设置方式与我们在步骤 17.3 中使用的按钮相同，需要一个连接到 GPIO 25 的硬件开关（参见步骤 13.1）。


    你会在 Node-RED 的 Function 部分找到 Trigger 节点。我们需要两个这样的节点，所以将它们拖到流程中。图 18-20 显示了 “On
    trigger” 节点的设置。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_532_0.png)


    图 18-20. 配置 “On trigger” 节点


    此 Trigger 节点配置为在触发时发送 1，等待四分之一秒（用于去抖），然后不再执行任何操作。它被命名为 “On trigger”。


    “Off trigger” 与 “On trigger” 不同，因为我们需要它延迟 10 秒，然后再向 Sonoff 发送 0。图 18-21 显示了此节点的设置。'
