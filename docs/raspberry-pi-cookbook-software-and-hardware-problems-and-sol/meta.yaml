- md: '## 18.6 Configuring the “Off trigger” node


    Finally, add an “mqtt” node from the Output section. Open this to configure it
    (Figure 18-22).


    When clicked on, the Server field will prompt you to add a new MQTT server and
    enter its details, including its name (I used MyHomeAutomation), IP address (localhost),
    and port (1880).


    Change the Topic and Name fields, as shown in Figure 18-22. You can now connect
    everything as shown in Figure 18-19 and deploy the flow.


    When you press the button, the Sonoff should turn on and then turn itself off
    again after 10 seconds.


    ## Discussion


    This recipe shows just how far you can go with Node-RED without having to write
    any actual code. By thinking of the automation as a flow of messages, Node-RED
    provides a really nice way of programming.


    To use a motion sensor to switch the lights on for a predetermined period of time,
    you could replace the switch with a passive infrared (PIR) motion sensor (see
    [Recipe 13.9](Recipe 13.9)).


    ## See Also


    More information is available in the full [Node-RED documentation](Node-RED documentation).


    ## 18.7 Turning Things On and Off Using the Node-RED Dashboard


    ### Problem


    You want to be able to turn lighting and other appliances on and off from your
    smartphone.


    ### Solution


    Install the Node-RED Dashboard extension, add some user interface (UI) controls
    to a flow, and then visit the Dashboard from your phone''s browser.


    To install the Node-RED Dashboard, run the following commands:


    ```

    $ sudo systemctl stop nodered.service

    $ apt update

    $ cd ~/.node-red

    $ sudo apt install npm

    $ npm install node-red-dashboard

    $ sudo systemctl start nodered.service

    ```


    When you''ve finished installing the Dashboard, you will end up with a new section
    of control nodes in Node-RED (Figure 18-23).


    We can use the button node to replace the physical button that we used in Recipe
    18.6 with a button on a web page. The flow for this is shown in Figure 18-24.
    If you want, you can import the flow rather than build it up from scratch. Follow
    the instructions in the Discussion section of Recipe 18.2 to import the flow.


    The trigger button is the same as the “Off trigger” in Recipe 18.6, and the “Sonoff_1”
    node is the same as the same node in Recipe 18.6. However, the Raspberry Pi GPIO
    node is replaced by a Dashboard button node.


    Because you might need quite a few controls to remotely control your home automation
    system, Dashboard controls are collected into a group, and groups are themselves
    collected into tabs. You can define your own groups and tabs when you add a new
    node from the Dashboard category. This happens when you edit the node (Figure
    18-25).


    In Figure 18-25 you can see that the Group is set to Lights in the tab [Home].
    To get to this point, I had to click on “Add new UI group.” This in turn asked
    me to “Add a new tab.” Once you have created a tab and group, these will become
    defaults. You don’t have to create them every time.


    Note that in Figure 18-25 the Payload is set to 1 to turn the light on, and it’s
    connected directly to the “mqtt” node.


    You can now deploy the workflow.


    To try out the new flow, open a browser on your phone (or any computer on your
    network) and enter your Raspberry Pi''s IP address with :1880/ui on the end. For
    my Raspberry Pi, the full URL is http://192.168.1.77:1880/ui. The screen should
    look something like Figure 18-26.


    When you click the button on your phone, the Sonoff should turn on for 10 seconds.


    ### Discussion


    Even though it’s quite useful to be able to turn the light on for a preset timed
    period, it would also be useful to have an override on/off switch. In Figure 18-27,
    a switch has been added. This flow is also available on GitHub.


    You also can connect this to the “Sonoff_1” MQTT node so that it, as well as the
    push button, can be used to turn the light on and off. Figure 18-28 shows the
    settings for the Lights On/Off switch.


    When the flow is deployed, the UI will display the extra switch (Figure 18-29)
    automatically when you go back to the *ui* web page on your phone (something like
    *http://192.168.1.77:1880/ui*, but with your Node-RED server’s IP address).


    ### See Also


    More information is available in the full [Node-RED documentation](https://nodered.org/docs/).


    ## 18.8 Scheduling Events with Node-RED


    ### Problem


    You want to use Node-RED to do something at a certain time—for example, to turn
    out all the lights at 1 a.m. every night.


    ### Solution


    Use the Node-RED *inject* node.


    The flow shown in [Figure 18-30](https://example.com/figure18-30) is based on
    the flows of [Recipe 18.6](https://example.com/recipe18.6). If you want, you can
    [import the flow](https://example.com/import) rather than build it up from scratch.
    Follow the instructions in the Discussion section of [Recipe 18.2](https://example.com/recipe18.2)
    to import the flow.


    A dashboard *switch* is used to turn the Sonoff (assumed to be switching a light)
    on and off but, in addition, there is an inject node (Auto Off) that is configured
    to inject a message of 0 to the “Sonoff_1” MQTT node. Figure 18-31 shows the configuration
    for the inject node.


    ### Discussion


    If you had a number of Sonoff switches connected to appliances all around your
    house, one inject node could turn them all off by fanning out the message, as
    shown in Figure 18-32.


    ### See Also


    More information is available in the full Node-RED documentation.


    ## 18.9 Publishing MQTT Messages from a Wemos D1


    ### Problem


    You want to be able to publish MQTT messages using a low-cost programmable WiFi
    board, perhaps in response to a button being pressed.


    ### Solution


    Use a low-cost ESP8266-based board like the Wemos D1 with customized software.
    Figure 18-33 shows a Wemos D1 with a Squid Button attached to one of its GPIO
    pins, powered by a USB power bank.


    When the button is pressed, a message will be published to an MQTT server.


    To make this recipe, you will need the following:


    - A Wemos D1 mini (see “Modules” on page 566)

    - A Raspberry Squid Button (see “Modules” on page 566)

    - A USB power bank or other means of powering the Wemos D1


    To be able to program the Wemos D1 from your Raspberry Pi, you need to first install
    the Arduino integrated development environment (IDE). Then you’ll need to add
    support for the ESP8266.


    Connect the Squid Button or other switch between the Wemos pin named D6 and GND.


    Before you can use the *sketch* (the name for Arduino programs), you need to install
    an MQTT library into the Arduino IDE, so download the library as a ZIP file using
    the following commands:


    ```

    $ cd ~

    $ wget https://github.com/knolleary/pubsubclient/archive/master.zip

    ```


    Next, open the Arduino IDE. From the Sketch menu, select Include Library, and
    then select Add ZIP Library. Navigate to the file *master.zip* that you just downloaded,
    and the library will be installed.'
  mdcn: '## 18.6 配置“关闭触发器”节点


    最后，从输出部分添加一个“mqtt”节点。打开它进行配置（图18-22）。


    点击后，服务器字段会提示你添加一个新的MQTT服务器并输入其详细信息，包括名称（我使用了MyHomeAutomation）、IP地址（localhost）和端口（1880）。


    如图18-22所示，更改主题和名称字段。现在你可以按照图18-19所示连接所有内容并部署流程。


    当你按下按钮时，Sonoff应该会打开，然后在10秒后自动关闭。


    ## 讨论


    这个示例展示了在不编写任何实际代码的情况下，使用Node-RED能走多远。通过将自动化视为消息流，Node-RED提供了一种非常好的编程方式。


    要使用运动传感器在预定时间内打开灯光，你可以将开关替换为被动红外（PIR）运动传感器（参见[配方13.9](Recipe 13.9)）。


    ## 另请参阅


    更多信息可在完整的[Node-RED文档](Node-RED documentation)中找到。


    ## 18.7 使用Node-RED仪表板开关设备


    ### 问题


    你希望能够通过智能手机开关灯光和其他电器。


    ### 解决方案


    安装Node-RED仪表板扩展，向流程添加一些用户界面（UI）控件，然后从手机浏览器访问仪表板。


    要安装Node-RED仪表板，请运行以下命令：


    ```

    $ sudo systemctl stop nodered.service

    $ apt update

    $ cd ~/.node-red

    $ sudo apt install npm

    $ npm install node-red-dashboard

    $ sudo systemctl start nodered.service

    ```


    安装完仪表板后，你将在Node-RED中获得一组新的控制节点（图18-23）。


    我们可以使用按钮节点，用网页上的按钮替换我们在配方18.6中使用的物理按钮。此流程如图18-24所示。如果需要，你可以导入流程，而不是从头开始构建。请按照配方18.2讨论部分的说明导入流程。


    触发按钮与配方18.6中的“关闭触发器”相同，“Sonoff_1”节点也与配方18.6中的相同节点相同。但是，树莓派GPIO节点被仪表板按钮节点取代。


    由于你可能需要相当多的控件来远程控制你的家庭自动化系统，仪表板控件被收集到一个组中，而组本身又被收集到选项卡中。当你从仪表板类别添加新节点时，可以定义自己的组和选项卡。这在你编辑节点时发生（图18-25）。


    在图18-25中，你可以看到组被设置为选项卡[Home]中的Lights。要达到这一点，我必须点击“添加新的UI组”。这又要求我“添加一个新选项卡”。一旦你创建了选项卡和组，它们将成为默认值。你不必每次都创建它们。


    请注意，在图18-25中，有效载荷被设置为1以打开灯光，并且它直接连接到“mqtt”节点。


    现在你可以部署工作流。


    要试用新流程，请在手机（或网络上的任何计算机）上打开浏览器，并输入你的树莓派IP地址，后跟:1880/ui。对于我的树莓派，完整URL是http://192.168.1.77:1880/ui。屏幕应如图18-26所示。


    当你点击手机上的按钮时，Sonoff应该会打开10秒。


    ### 讨论


    虽然能够在预设时间内打开灯光非常有用，但有一个覆盖开关也很有用。在图18-27中，添加了一个开关。此流程也可在GitHub上找到。


    你也可以将其连接到“Sonoff_1” MQTT节点，以便它以及按钮都可以用来开关灯光。图18-28显示了Lights On/Off开关的设置。


    当流程部署后，当你返回手机上的*ui*网页（类似*http://192.168.1.77:1880/ui*，但使用你的Node-RED服务器的IP地址）时，UI将自动显示额外的开关（图18-29）。


    ### 另请参阅


    更多信息可在完整的[Node-RED文档](https://nodered.org/docs/)中找到。


    ## 18.8 使用Node-RED调度事件


    ### 问题


    你想使用Node-RED在特定时间执行某些操作——例如，每晚凌晨1点关闭所有灯光。


    ### 解决方案


    使用Node-RED的*inject*节点。


    [图18-30](https://example.com/figure18-30)中显示的流程基于[配方18.6](https://example.com/recipe18.6)的流程。如果需要，你可以[导入流程](https://example.com/import)，而不是从头开始构建。请按照[配方18.2](https://example.com/recipe18.2)讨论部分的说明导入流程。


    仪表板*开关*用于开关Sonoff（假设是控制灯光），但此外，还有一个注入节点（自动关闭），配置为向“Sonoff_1” MQTT节点注入一条值为0的消息。图18-31显示了注入节点的配置。


