  md: '# See Also


    For more information on connecting to your Raspberry Pi with SSH, see Recipe 2.7.


    # 1.9 Booting from a Real Hard Disk or USB Flash Drive


    # Problem


    Your microSD card is too small and/or you are concerned about your entire operating
    system running on an SD card.


    # Solution


    Before the Raspberry Pi 4 and 400 came along, booting from a hard disk or flash
    drive was possible, but not very easy, involving some complex commands and the
    possibility of “bricking” your Raspberry Pi if you got it wrong. If you have a
    Raspberry Pi 4 or 400, then it is now really straightforward and starts with the
    Raspberry Pi Imager.


    The process is similar to setting up a microSD card using the Raspberry Pi Imager.
    To follow this recipe, you’ll need a Windows, Mac, or Linux computer; a USB SSD
    (solid state drive); and a microSD card. Even though the whole point of this recipe
    is to replace the microSD card as the boot device, you still need two microSD
    cards: one being your existing microSD boot device for your Raspberry Pi and a
    second blank microSD card.


    +   1. Insert the blank microSD card into your card reader.

    2. Start the Raspberry Pi Imager, and then from the Operating System drop-down,
    select Misc Utility Images and then Bootloader and then USB Boot (Figure 1-17).
    Note that if these options aren’t present in your Raspberry Pi Imager, then you
    probably need to download the latest version.

    3. Select your microSD card from the Storage drop-down and then click Write.

    4. Put the newly written microSD card into your Raspberry Pi and power it up.
    The only purpose of this microSD card image is to reconfigure your Raspberry Pi
    for USB booting. Once it’s done its work, the screen will turn green.

    5. Power down your Raspberry Pi and swap the microSD cards, so that you now have
    your original microSD system card in the Raspberry Pi.

    6. Boot your Raspberry Pi and from the Raspberry Menu, select Accessories and
    then SD Card Copier (Figure 1-18). Select your system microSD card as the source
    and the external USB drive as the destination, then click Start.'
  merge: -1
