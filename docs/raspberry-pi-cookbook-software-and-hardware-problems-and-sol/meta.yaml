    # 1.17 Using Bluetooth


    # Problem


    You want to use Bluetooth with your Raspberry Pi.


    # Solution


    If you have a Raspberry Pi 3, 4, or 400, the good news is that along with WiFi,
    you also get Bluetooth hardware. If you have an older Raspberry Pi, you can attach
    a USB Bluetooth adapter to it. In both cases, the software that you need for Bluetooth
    is now included in Raspberry Pi OS.


    If you have an older Raspberry Pi, be aware that not all Bluetooth adapters are
    compatible with the Raspberry Pi. Most are, but to be sure, buy one that is advertised
    as working with the Raspberry Pi. Figure 1-28 shows a Raspberry Pi 2 equipped
    with both a USB Bluetooth adapter (nearest to the camera) and a USB WiFi adapter.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_58_0.png)


    Figure 1-28. Raspberry Pi 2 with USB Bluetooth and WiFi adapters


    Bluetooth features are integrated into the Raspberry Pi OS desktop in much the
    same way as on a Mac. In the upper-right corner of the screen, you will see the
    Bluetooth icon (Figure 1-29). Click this to open a menu of Bluetooth options.'
