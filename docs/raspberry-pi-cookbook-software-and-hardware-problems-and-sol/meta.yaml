    a few minutes as the weights of the neural network are adjusted until it can accurately
    identify the phrase: “hey pi.” We can now check out the impulse and see how well
    it performs, all within our browser (Figure 9-7). Note that before letting us
    play with the impulse, it is built into a deployable package that we will later
    be able to deploy onto our Raspberry Pi.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_274_0.png)'
