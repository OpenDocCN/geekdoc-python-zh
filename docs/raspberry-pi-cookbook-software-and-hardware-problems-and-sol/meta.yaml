    \n要制作此配方，你需要以下物品：\n\n- 面包板和跳线（见第564页“原型设备和套件”）\n- 旋转编码器（正交型；见第567页“杂项”）\n\n这种类型的旋转编码器称为*正交编码器*，它的行为类似于一对开关。当旋转编码器的轴转动时，它们开启和关闭的顺序决定了旋转方向。\n\
    \n图13-10所示的旋转编码器将中心引线作为*公共*引线，两侧的两个引线作为A和B。并非所有旋转编码器都使用这种布局，因此请检查你所使用的旋转编码器数据手册上的引脚排列。这个问题常常因为许多旋转编码器包含一个按钮开关而变得更加复杂，该开关将有一对单独的触点。\n\
    \n打开编辑器并粘贴以下代码（ch_13_rotary_encoder.py）：\n\n```\nfrom gpiozero import Button\n\
    import time\n\ninput_A = Button(18)\ninput_B = Button(23)\n\nold_a = True\nold_b\
    \ = True\n\ndef get_encoder_turn():\n    # return -1 (cce), 0 (no movement), or\
    \ +1 (cw)\n    global old_a, old_b\n    result = 0\n    new_a = input_A.is_pressed\n\
    \    new_b = input_B.is_pressed\n    if new_a != old_a or new_b != old_b :\n \
