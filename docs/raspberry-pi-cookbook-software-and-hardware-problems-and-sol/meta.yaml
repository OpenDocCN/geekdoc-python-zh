- md: '## 2.3 Setting a Static IP Address


    ### Problem


    You want to set the IP address of your Raspberry Pi so that it does not change.


    ### Solution


    Although it is possible to set the static IP address of a Raspberry Pi on the
    Pi itself, it is better practice to configure this on your network, as it may
    lead to problems if you move the Raspberry Pi to a different network.


    All the computers, TVs, phones, and other internet-enabled devices in your home
    are generally connected to the internet via the router that links your phone line,
    4G, or a fiber-optic cable to your house. All of these devices, whether they connect
    to the router by WiFi or via a direct cable connection, are said to be part of
    your *local area network* (LAN).


    By default, when you connect a new device to your LAN (such as a Raspberry Pi),
    either by plugging it in with an Ethernet cable or by using WiFi, the LAN controller
    (your router) will use a system called DHCP to allocate an IP address for the
    device. This address will be allocated from a pool of IP addresses that might
    range from, for example, 192.168.1.2 to 192.168.1.199 (or maybe 10.0.0.2 to 10.0.0.199).
    In other words, just the last part of the four-part IP address changes for each
    device connected to the LAN.


    When DHCP allocates an IP address to a device, it does so with a lease time, which
    is how long that device will be guaranteed to keep the IP address without risk
    of it being allocated to some other device. Generally speaking, the default for
    this lease time is fairly short; on my router, it''s a week. This means that the
    IP address of my Raspberry Pi can change without warning after a week of inactivity,
    and if the Pi is being used in a project without keyboard, mouse, and monitor,
    it can be difficult to find its IP address to allow me to connect to it. This
    is why you might want to set a *static IP address* for your Raspberry Pi.


    One way to ensure that your Raspberry Pi''s IP address doesn''t change is to simply
    go to your router control interface and change the DHCP lease time to a much higher
    value. To access this interface, you will need to use a computer (it could be
    your Raspberry Pi, but it doesn''t have to be) and go to a specific address that
    is often written on the router, described as *router address* or *admin console
    address*. For my router this is `http://192.168.1.1`. A username and password
    will also need to be entered. These are not the same as the WiFi access point
    name and password. They''re often also written somewhere on the router and often
    have default values of *admin* and *password*, respectively.


    After you are connected, you will need to hunt around your admin console’s various
    pages for any mention of DHCP settings, which should look something like Figure
    2-3.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_67_0.png)


    Change the “Lease duration” (or whatever it’s specifically labeled for your router)
    to the maximum allowed.


    One downside of extending the lease duration like this is that it applies to all
    the devices on your LAN. So if you have a lot of devices, it’s possible that you
    might run out of IP addresses because DHCP is unable to reallocate old IP addresses
    until the lease period has expired.


    A better approach is to use something called DHCP reservation. This instructs
    DHCP to permanently allocate a particular IP address to a particular device. In
    Figure 2-4, you can see that I have allocated the IP address of 192.168.1.3 to
    the device raspberrypi-Ethernet (a Raspberry Pi connected by Ethernet cable to
    the router).


    From now on, whenever that Raspberry Pi is connected to the LAN, it will be assigned
    the IP address 192.168.1.3, and DHCP will not allocate that IP address to any
    other device.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_68_0.png)


    Figure 2-4. Allocating a DHCP reservation


    ### Discussion


    Networking has changed a lot with different versions of Raspberry Pi OS. These
    instructions apply to the latest (as of this writing) version. If you don''t have
    the latest version of Raspberry Pi OS, you should get it, because Raspberry Pi
    OS is always evolving and improving. You can learn how to do this in Recipe 3.40.
    To find out what version of the OS you have, see Recipe 3.39.


    ### See Also


    Wikipedia has everything you want to know about IP addresses.


    ## 2.4 Setting the Network Name of a Raspberry Pi


    ### Problem


    You want to change the name of your Raspberry Pi as it appears on your network
    so that it''s not just called “raspberrypi.”


    ### Solution


    There are several ways of doing this. Whichever method you use, make sure that
    the network name you choose does not contain spaces and contains only letters,
    numeric digits, and the hyphen (-) character.


    In all three methods, you also need to restart your Raspberry Pi for the changes
    to take effect.


    ### Setting the network name using the Raspberry Pi Configuration tool


    Unless you are running your Raspberry Pi headless (without monitor and keyboard
    attached), the simplest way to set the network name of your Raspberry Pi is to
    use the Raspberry Pi Configuration tool. To open this, go to the Raspberry Menu,
    select Preferences, and then click Raspberry Pi Configuration. Then click the
    System tab (Figure 2-5).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_69_0.png)


    Change the name in the Hostname field to your preferred name and click OK. You
    are prompted to reboot for the changes to take effect (Recipe 1.15).


    ### Setting the network name using the command line (the easy way)


    You can also change your Raspberry Pi''s network name from the command line using
    the raspi-config utility. Run the following command in a Terminal session:


    ```

    $ sudo raspi-config

    ```


    This opens the raspi-config utility. Use the up/down arrow keys to select Network
    Options and then press Enter. This opens a form in which you can enter the new
    network name (Figure 2-6). Note that this interface uses only the command line,
    so you can use it from an SSH session (Recipe 2.7).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_70_0.png)


    Figure 2-6. Setting the hostname of a Raspberry Pi using raspi-config


    ### Setting the network name using the command line (the hard way)


    If you really want to do it the hard way, you can directly edit the files that
    control the Raspberry Pi''s network name. There are two files that you need to
    change.


    First, edit the file `/etc/hostname`. You can do this by opening a Terminal window
    and typing the command:


    ```

    $ sudo nano /etc/hostname

    ```


    Replace `raspberry` with a name of your choice.


    Second, open the file `/etc/hosts` in an editor using the command:


    ```

    $ sudo nano /etc/hosts

    ```


    The file will look something like this:


    ```

    127.0.0.1       localhost

    ::1             localhost ip6-localhost ip6-loopback

    fe00::0         ip6-localnet

    ff00::0         ip6-mcastprefix

    ff02::1         ip6-allnodes

    ff02::2         ip6-allrouters


    127.0.1.1       raspberry

    ```


    Change the name at the end of the file (`raspberry`) to your preferred new name.


    ### Discussion


    Changing the name of your Pi can be very useful, especially if you have more than
    one Pi connected to your network.


    ### See Also


    See [Recipe 2.3](Recipe 2.3) to change the IP address of your Raspberry Pi.


    ## 2.5 Setting Up a Wireless Connection


    ### Problem


    You want to connect your Raspberry Pi to the internet using WiFi.


    ### Solution


    There are various methods of setting up a WiFi connection with your Raspberry
    Pi.


    ### Setting up WiFi from the desktop


    Setting up WiFi in the latest Raspberry Pi OS is really easy. In the upper-right
    corner of your screen, click the network icon (the two computers). You are then
    presented with a list of WiFi networks. Select your network; a prompt appears
    in which you can enter your pre-shared key (password). Enter your password. After
    a while, the network icon will switch to the standard WiFi symbol, and you’ll
    be connected ([Figure 2-7](Figure 2-7)).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_71_0.png)


    Figure 2-7. Connecting to a WiFi network


    ### Setting up WiFi using the command line


    This method of setting up WiFi is great if you are setting up your Raspberry Pi
    so that, after you configure it, you can use it without keyboard and monitor attached.
    However, you’ll need to temporarily have network access to the Raspberry Pi by
    connecting it to your router using an Ethernet cable ([Recipe 2.1](Recipe 2.1)).'
  mdcn: '## 2.3 设置静态IP地址


    ### 问题


    你希望设置树莓派的IP地址，使其不会改变。


    ### 解决方案


    虽然可以在树莓派本身上设置静态IP地址，但更好的做法是在你的网络上进行配置，因为如果将树莓派移动到不同的网络，可能会导致问题。


    你家中的所有电脑、电视、手机和其他支持互联网的设备通常都通过路由器连接到互联网，该路由器将你的电话线、4G或光纤电缆连接到你的房子。所有这些设备，无论是通过WiFi还是通过直接电缆连接到路由器，都被称为属于你的*局域网*（LAN）。


    默认情况下，当你将新设备连接到局域网（例如树莓派）时，无论是通过以太网电缆插入还是使用WiFi，局域网控制器（你的路由器）将使用名为DHCP的系统为设备分配IP地址。该地址将从IP地址池中分配，该池的范围可能从例如192.168.1.2到192.168.1.199（或可能是10.0.0.2到10.0.0.199）。换句话说，对于连接到局域网的每个设备，只有四部分IP地址的最后一部分会改变。


    当DHCP为设备分配IP地址时，它会设置一个租用时间，即该设备保证保留该IP地址而不会被分配给其他设备的时间。一般来说，此租用时间的默认值相当短；在我的路由器上，它是一周。这意味着我的树莓派的IP地址在一周不活动后可能会毫无警告地改变，如果树莓派在没有键盘、鼠标和显示器的项目中使用，可能很难找到其IP地址以允许我连接。这就是为什么你可能想为你的树莓派设置一个*静态IP地址*。


    确保你的树莓派IP地址不变的一种方法是简单地转到你的路由器控制界面并将DHCP租用时间更改为更高的值。要访问此界面，你需要使用一台计算机（可以是你的树莓派，但不必是）并转到一个特定地址，该地址通常写在路由器上，描述为*路由器地址*或*管理控制台地址*。对于我的路由器，这是`http://192.168.1.1`。还需要输入用户名和密码。这些与WiFi接入点名称和密码不同。它们通常也写在路由器的某个地方，并且通常具有默认值*admin*和*password*。


    连接后，你需要在管理控制台的各个页面中查找任何提及的DHCP设置，这些设置应类似于图2-3。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_67_0.png)


    将“租用时间”（或路由器上具体标记的任何内容）更改为允许的最大值。


    像这样延长租用时间的一个缺点是它适用于局域网上的所有设备。因此，如果你有很多设备，可能会耗尽IP地址，因为DHCP在租用期到期之前无法重新分配旧的IP地址。


    更好的方法是使用称为DHCP保留的东西。这指示DHCP将特定IP地址永久分配给特定设备。在图2-4中，你可以看到我已将IP地址192.168.1.3分配给设备raspberrypi-Ethernet（通过以太网电缆连接到路由器的树莓派）。


    从现在起，每当该树莓派连接到局域网时，它将被分配IP地址192.168.1.3，并且DHCP不会将该IP地址分配给任何其他设备。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_68_0.png)


    图2-4. 分配DHCP保留


    ### 讨论


    随着不同版本的树莓派操作系统，网络发生了很大变化。这些说明适用于最新版本（截至撰写本文时）。如果你没有最新版本的树莓派操作系统，你应该获取它，因为树莓派操作系统总是在发展和改进。你可以在配方3.40中了解如何执行此操作。要了解你拥有的操作系统版本，请参阅配方3.39。


    ### 另请参阅


    维基百科包含了你想知道的关于IP地址的一切。


    ## 2.4 设置树莓派的网络名称


    ### 问题


    你想更改树莓派在网络上的显示名称，使其不再只是“raspberrypi”。


    ### 解决方案


    有几种方法可以做到这一点。无论你使用哪种方法，请确保你选择的网络名称不包含空格，并且只包含字母、数字和连字符（-）字符。


    在所有三种方法中，你还需要重新启动树莓派才能使更改生效。


    ### 使用树莓派配置工具设置网络名称


    除非你以无头模式运行树莓派（未连接显示器和键盘），否则设置树莓派网络名称的最简单方法是使用树莓派配置工具。要打开此工具，请转到树莓派菜单，选择“首选项”，然后单击“树莓派配置”。然后单击“系统”选项卡（图2-5）。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_69_0.png)


    将“主机名”字段中的名称更改为你首选的名称，然后单击“确定”。系统会提示你重新启动以使更改生效（配方1.15）。


    ### 使用命令行设置网络名称（简单方法）


    你也可以使用raspi-config实用程序从命令行更改树莓派的网络名称。在终端会话中运行以下命令：


    ```

    $ sudo raspi-config

    ```


    这将打开raspi-config实用程序。使用上/下箭头键选择“网络选项”，然后按Enter。这将打开一个表单，你可以在其中输入新的网络名称（图2-6）。请注意，此界面仅使用命令行，因此你可以从SSH会话（配方2.7）中使用它。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_70_0.png)


    图2-6. 使用raspi-config设置树莓派的主机名


    ### 使用命令行设置网络名称（困难方法）


    如果你真的想用困难的方法，你可以直接编辑控制树莓派网络名称的文件。你需要更改两个文件。


    首先，编辑文件`/etc/hostname`。你可以通过打开终端窗口并输入以下命令来执行此操作：


    ```

    $ sudo nano /etc/hostname

    ```


    将`raspberry`替换为你选择的名称。


    其次，使用以下命令在编辑器中打开文件`/etc/hosts`：


    ```

    $ sudo nano /etc/hosts

    ```


    该文件将如下所示：


    ```

    127.0.0.1       localhost

    ::1             localhost ip6-localhost ip6-loopback

    fe00::0         ip6-localnet

    ff00::0         ip6-mcastprefix

    ff02::1         ip6-allnodes

    ff02::2         ip6-allrouters


    127.0.1.1       raspberry

    ```


    将文件末尾的名称（`raspberry`）更改为你首选的新名称。


    ### 讨论


    更改树莓派的名称可能非常有用，特别是如果你有多个树莓派连接到你的网络。


    ### 另请参阅


    请参阅[配方2.3](Recipe 2.3)以更改树莓派的IP地址。


    ## 2.5 设置无线连接


    ### 问题


    你想使用WiFi将树莓派连接到互联网。


    ### 解决方案


    有各种方法可以使用WiFi设置树莓派的连接。


    ### 从桌面设置WiFi


    在最新的树莓派操作系统中设置WiFi非常容易。在屏幕的右上角，单击网络图标（两台计算机）。然后你会看到一个WiFi网络列表。选择你的网络；会出现一个提示，你可以在其中输入预共享密钥（密码）。输入你的密码。过一会儿，网络图标将切换到标准的WiFi符号，你将连接成功（[图2-7](Figure
    2-7)）。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_71_0.png)


    图2-7. 连接到WiFi网络


    ### 使用命令行设置WiFi


    如果你正在设置树莓派，以便在配置后可以不使用键盘和显示器使用它，那么这种设置WiFi的方法非常有用。但是，你需要通过使用以太网电缆将树莓派连接到路由器（[配方2.1](Recipe
    2.1)）来临时获得网络访问权限。'
