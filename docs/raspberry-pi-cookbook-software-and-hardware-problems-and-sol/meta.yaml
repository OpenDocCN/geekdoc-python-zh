  md: '# I2C Buses


    If you followed [Recipe 10.17](Recipe 10.17) to make your own HAT and enabled
    the I2C bus 0 as described there, you will need to reverse the change to `/boot/config.txt`
    because the Adafruit autodetects the I2C bus to use and will detect the wrong
    one if bus 0 is enabled.


    In `/boot/config.txt`, delete or comment out this line (by putting a # at the
    beginning of it):


    ```

    dtparam=i2c_vc=on

    ```


    After you do this, reboot your Raspberry Pi.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_361_0.png)


    This HAT uses I2C, so make sure that you have I2C enabled ([Recipe 10.4](Recipe
    10.4)).


    This board is supported by an [excellent Adafruit tutorial](excellent Adafruit
    tutorial).


