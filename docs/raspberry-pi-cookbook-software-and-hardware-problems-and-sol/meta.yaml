    \n# 第5章\nPython基础\n\n## 5.0 简介\n\n虽然许多语言都可以用来为树莓派编程，但Python是最受欢迎的。事实上，树莓派中的“Pi”就是受“python”一词的启发。\n\
    \n在本章中，你将找到一系列配方，帮助你开始使用树莓派进行编程。\n\n## 5.1 在Python 2和Python 3之间做选择\n\n### 问题\n\
