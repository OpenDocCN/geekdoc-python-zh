    Most soil moisture sensors need analog inputs and so are not readily connected
    to a Raspberry Pi. The MonkMakes Plant Monitor uses a serial interface, making
    it very suitable for connecting to a Raspberry Pi. It reports the temperature
    and humidity at the plant and has an RGB LED that indicates the soil moisture.'
