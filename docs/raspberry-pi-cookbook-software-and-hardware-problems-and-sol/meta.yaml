    # 1.12 Adjusting the Picture Size on Your Monitor


    # Problem


    When you first connect a Raspberry Pi to a monitor, you might find that you can’t
    read some of the text because it extends off the screen, or that the picture isn’t
    using all the space available on the screen.


    # Solution


    If your problem is that a large black border is around the picture, you can make
    the screen fill the whole area of the monitor using the Raspberry Pi’s desktop
    Configuration tool (see Figure 1-19). To open this, go to the Raspberry Menu,
    select Preferences, click Raspberry Pi Configuration, and select the Display tab.


    Click the toggle switch next to Underscan. Note that the change will not take
    effect until you have clicked OK and then rebooted your Raspberry Pi.


    If you have the opposite problem and your text extends off the edges of the screen,
    the solution is the same: click the toggle switch for Underscan.'
