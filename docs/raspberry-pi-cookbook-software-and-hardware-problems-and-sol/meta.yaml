    # CHAPTER 3

    Operating System


    # 3.0 Introduction


    This chapter explores many aspects of the Linux operating system used by the Raspberry
    Pi. A lot of this involves the use of the command line. If you are used to Windows
    or macOS, this can come as a bit of a shock. However, when you get used to it,
    doing things with the command line can be surprisingly effective.


    You can accomplish many simple file operations like moving files around, renaming,
    copying, and deleting files graphically using a more Windows or macOS approach,
    and this is the subject of our first recipe.


    # 3.1 Browsing Files Graphically


    # Problem


    You want to move files around using a graphical interface like you can on a macOS-based
    machine or Windows PC.


    # Solution


    Use the File Manager.


    You can find this program on the Raspberry Menu, in the Accessories group (Figure
    3-1).'
  - '[PAGE 89]


    Using the File Manager, you can drag a file or directory from one directory to
    another or use the Edit menu to copy a file from one location and paste it to
    a second. This operates in much the same way as the Windows File Explorer or macOS
    Finder.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_89_0.png)


    *Figure 3-1. The File Manager*


    # Discussion


    The lefthand side of the File Manager shows the folder structure.


    The central area displays the files in the current folder, which you can navigate
    using the buttons in the toolbar or by typing a location in the filepath area
    at the top.


    You can right-click a file to open a menu with options you can use on that file
    (Figure 3-2).


    You can also select more than one file at a time for copying or dragging by holding
    down the Ctrl key while you select files, or you can select a range of files by
    selecting one file and then holding down the Shift key while you select the last
    file in the range.'
  - '[PAGE 90]


    ![](img/e36e77524aeaae366529d1cf02f9a39c_90_0.png)


    Figure 3-2. Right-clicking a file opens a menu with more options


    # See Also


    To rename a file or folder, see [Recipe 3.6](Recipe 3.6).


    # 3.2 Copying Files onto a USB Flash Drive


    # Problem


    You want to copy a file from your Raspberry Pi onto a USB flash drive.


    # Solution


    Insert the USB flash drive into a USB port, and the dialog shown in [Figure 3-3](Figure
    3-3) should appear. Select OK to open it in the File Manager.'
  - '[PAGE 91]


    ![](img/e36e77524aeaae366529d1cf02f9a39c_91_0.png)


    Figure 3-3. The removable-media dialog box


    The drive will be mounted in /media/pi followed by the name of the flash drive
    (in my case, UNTITLED). To copy a file from your home folder, drag it onto the
    folder representing your flash drive, as shown in Figure 3-4.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_91_1.png)


    Figure 3-4. Copying a file by dragging it onto a USB flash drive'
  - '[PAGE 92]


    Windows, macOS, and Linux all have their own disk formats. The USB flash drive
    should be formatted as FAT32 or exFAT for maximum compatibility with macOS and
    Windows computers. exFAT supports larger disk sizes than FAT32.


    # Discussion


    After your USB flash drive is mounted on the Raspberry Pi''s filesystem, you can
    also copy files using the command line. The following example copies the file
    *test.txt* to the flash drive:


    ```

    $ cd /home/pi

    $ cp test.txt /media/pi/UNTITLED/

    ```


    In this example, cd is the command to change your current directory, and cp is
    the copy command. These commands are explained more fully in Recipes 3.4 and 3.5.


    # See Also


    For general information on using the File Manager, see Recipe 3.1.

    To copy files from the command line, see Recipe 3.4.


    # 3.3 Starting a Terminal Session


    # Problem


    When using a Raspberry Pi, you need to issue text commands in a Terminal.


    # Solution


    At the top of the Raspberry Pi desktop, select the Terminal icon (it looks like
    a black computer monitor), or, on the Raspberry Menu, in the Accessories group,
    select the Terminal option (Figure 3-5).'
  - '[PAGE 93]


    ![](img/e36e77524aeaae366529d1cf02f9a39c_93_0.png)


    Figure 3-5. Opening the Terminal


    # Discussion


    When the Terminal starts, it is set to your home directory (/home/pi).


    You can open as many Terminal sessions as you want. It is often useful to have
    a couple of sessions open in different directories so that you don''t need to
    constantly switch directories using cd (Recipe 3.4).


    When using the Terminal, everything is case sensitive. That is, if you are using
    a command, you must use the correct case when you''re typing. For example, the
    ls command that you will meet in the next recipe must be typed as ls and not LS
    or Ls or lS. Similarly, all filenames are case sensitive, so files named picture.jpg
    and Picture.jpg are two different files.'
  - '[PAGE 94]


    # See Also


    In the next section (Recipe 3.4), you will look at navigating the directory structure
    using the Terminal.


    # 3.4 Navigating the Filesystem Using a Terminal


    # Problem


    You need to know how to change directories and move about the filesystem using
    the Terminal.


    # Solution


    The main command used for navigating the filesystem is cd (change directory).
    After cd, you need to specify the directory that you want to change to. This can
    be either a *relative* path to a directory within your current directory or an
    *absolute* path to somewhere else on the filesystem.


    To see what the current directory is, use the command pwd (print working directory).


    # Discussion


    Try out a few examples. Open a Terminal session, and you should see a prompt like
    this:


    ```

    pi@raspberrypi: ~ $

    ```


    The prompt that you see after each command (pi@raspberrypi: ~ $) is a reminder
    of your username (pi) and your computer name (raspberrypi). The ~ character is
    shorthand for your home directory (/home/pi or whatever username you chose when
    setting up your Raspberry Pi). So at any point you can change your current directory
    to your home directory as follows:


    ```

    $ cd ~

    ```


    ![](img/e36e77524aeaae366529d1cf02f9a39c_94_0.png)


    Throughout the book, I use a $ at the beginning of each line where you are expected
    to type a command. This is called the *prompt*. The response from the command
    line is not prefixed by anything; it appears just as it does on the Raspberry
    Pi’s screen.


    You can confirm that the command did indeed set the directory to *home* by using
    the pwd command:


    ```

    $ pwd

    /home/pi

    ```'
  - '[PAGE 95]


    If you want to move up one level in the directory structure, you can use the special
    value .. (two dots) after the cd command, as shown here:


    ```

    $ cd ..

    $ pwd

    /home

    ```


    As you might have deduced by now, the path to a particular file or directory is
    made up of words separated by a /. So the very root of the entire filesystem is
    /, and to access the home directory within /, you would refer to /home/. Then,
    to find the *pi* directory within that, you would use /home/pi/. You can omit
    the final / from a path.


    Paths can be absolute (starting with a / and specifying the full path from the
    root), or they can be *relative* to the current working directory, in which case
    they must not start with a / and they assume that the current directory is the
    starting point. For instance, starting at the root directory (/) you could use
    relative paths to navigate to your home directory (assuming your username is “pi”)
    like this:


    ```

    $ cd /

    $ pwd

    /

    $ cd home/pi

    $ pwd

    /home/pi

    ```


    You will have full read and write access to the files in your home directory,
    but when you move into the places where system files and applications are kept,
    your access to some files will be restricted to read-only. You can override this
    (Recipe 3.12), but some care is required.


    Check out the *root* of the directory structure by entering the commands cd /
    and ls, as shown in Figure 3-6.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_95_0.png)


    Figure 3-6. Listing the contents of a directory


    The ls command (list) shows us all of the files and directories below (/) the
    root directory. You will see a *home* directory listed, which is the directory
    you have just come from.


    Now change into one of those directories using the commands shown in Figure 3-7.'
- md: "## 3.4 Changing Directory and Listing Contents\n\nYou will see that the files\
    \ and folders have some color coding. Files are displayed in various colors, whereas\
    \ folders are dark blue.\n\nUnless you particularly like typing, the Tab key offers\
    \ a convenient shortcut. If you start typing the name of a file, pressing the\
    \ Tab key allows the autocomplete feature to attempt to complete the filename.\
    \ For example, if you're going to change directory to *network*, type the command\
    \ `cd netw` and then press the Tab key. Because *netw* is enough to uniquely identify\
    \ the file or directory, pressing the Tab key will autocomplete it.\n\nIf what\
    \ you have typed is not enough to uniquely identify the file or directory, pressing\
    \ the Tab key another time will display a list of possible options that match\
    \ what you have typed so far. So if you had stopped at *ne* and pressed the Tab\
    \ key, you would see something like Figure 3-8.\n\nYou can provide an extra argument\
    \ after `ls` to narrow down the things that you want to list. Change directory\
    \ to `/etc` and then run the following:\n\n```\n$ ls f*\nfake-hwclock.data  fb.modes\
    \  fstab  fuse.conf\n\nfonts:\nconf.avail  conf.d  fonts.conf  fonts.dtd\n\nfoomatic:\n\
    defaultspooler  direct  filter.conf\n\nfstab.d:\npi@raspberrypi /etc $\n```\n\n\
    The * character is called a *wildcard*. In specifying `f*` after `ls`, we are\
    \ saying that we want to list everything that begins with an `f`.\n\nHelpfully,\
    \ the results first list all the files within `/etc` that begin with `f`, and\
    \ then the contents of all the directories in that folder beginning with `f`.\n\
    \nA common use of wildcards is to list all files with a certain extension (e.g.,\
    \ `ls *.docx`).\n\nA convention in Linux (and many other operating systems) is\
    \ to prefix with a period any files that should be hidden from the user. Any so-named\
    \ files or folders will not appear when you type `ls` unless you supply `ls` with\
    \ the option `-a` (all).\n\nFor example:\n\n```\n$ cd ~\n$ ls -a\n.          \
    \                Desktop                    .pulse\n..                       \
    \  .dillo                     .pulse-cookie\nAdafruit-Raspberry-Pi-Python-Code\
    \ .dmrc              python_games\n.advance                   .emulationstation\
    \          sales_log\n.AppleDB                   .fltk                      servo.py\n\
    .AppleDesktop              .fontconfig                .stella\n.AppleDouble  \
    \             .gstreamer-0.10            stepper.py.save\nAsteroids.zip      \
    \        .gvfs                      switches.txt.save\natari_roms            \
    \     indicity                   Temporary Items\n.bash_history              .local\
    \                     thermometer.py\n.bash_logout               motor.py    \
    \               .thumbnails\n.bashrc                    .mozilla             \
    \      .vnc\n.cache                     mydocument.doc             .Xauthority\n\
    .config                    Network Trash Folder       .xsession-errors\n.dbus\
    \                      .profile                   .xsession-errors.old\n```\n\n\
    As you can see, the majority of the files and folders in your home directory are\
    \ hidden.\n\n### See Also\n\nTo change file permissions, see [Recipe 3.14](Recipe\
    \ 3.14).\n\n## 3.5 Copying a File or Folder\n\n### Problem\n\nYou want to copy\
    \ a file using a Terminal session.\n\n### Solution\n\nUse the `cp` command to\
    \ copy files and directories.\n\n### Discussion\n\nYou can, of course, copy files\
    \ using the File Manager and its copy and paste menu options (Recipe 3.1) or keyboard\
    \ shortcuts.\n\nThe simplest example of copying in a Terminal session is to make\
    \ a copy of a file within your working directory. The cp command is followed first\
    \ by the file to copy and then by the name to be given to the new file.\n\nFor\
    \ example, the following code creates a file called *myfile.txt* and then makes\
    \ a copy of it with the name *myfile2.txt*; you can find out more about the trick\
    \ of creating a file using the > command in Recipe 3.9:\n\n```\n$ echo \"hello\"\
    \ > myfile.txt\n$ ls\nmyfile.txt\n$ cp myfile.txt myfile2.txt\n$ ls\nmyfile.txt\
    \    myfile2.txt\n```\n\nAlthough in this example both filepaths are local to\
    \ the current working directory, the filepaths can be to anywhere in the filesystem\
    \ where you have write access. The following example copies the original file\
    \ to an area named /tmp, which is a location for temporary files (do not put anything\
    \ important in that folder):\n\n```\n$ cp myfile.txt /tmp\n```\n\nNote that in\
    \ this case, the name to be given to the new file is not specified, just the directory\
    \ where it is to go. This will create a copy of *myfile.txt* in /tmp with the\
    \ same name of *myfile.txt*.\n\nSometimes, rather than copying just one file,\
    \ you might want to copy an entire directory full of files and possibly other\
    \ directories. To copy a directory and all its contents, you need to use the -r\
    \ option (for recursive):\n\n```\n$ cp -r mydirectory mydirectory2\n```\n\nWhenever\
    \ you are copying files or folders, the result of the command will tell you if\
    \ you do not have permission. If that's the case, you will need to either change\
    \ the permissions of the folder into which you are copying (Recipe 3.14) or copy\
    \ the files with superuser privileges (Recipe 3.12).\n\n### See Also\n\nYou can\
    \ also rename files rather than copy them; see Recipe 3.6.\n\nFor a useful description\
    \ of the many optional parameters to the cp command, see https://oreil.ly/Cq2SJ.\n\
    \n## 3.6 Renaming a File or Folder\n\n### Problem\n\nYou need to rename a file\
    \ using a Terminal session.\n\n### Solution\n\nUse the `mv` command to rename\
    \ files and directories.\n\n### Discussion\n\nThe `mv` (move) command is used\
    \ in a similar way to the `cp` command, except that the file or folder being moved\
    \ is simply renamed rather than a duplicate being made.\n\nFor example, to rename\
    \ a file from `my_file.txt` to `my_file.rtf`, you use the following command:\n\
    \n```\n$ mv my_file.txt my_file.rtf\n```\n\nChanging a directory name is just\
    \ as straightforward, and you don't need the recursive `-r` option you used when\
    \ copying, because changing a directory's name implicitly means that everything\
    \ within it is contained in a renamed directory.\n\n### See Also\n\nTo copy a\
    \ file or folder, see [Recipe 3.5](Recipe 3.5).\n\n## 3.7 Editing a File\n\n###\
    \ Problem\n\nYou want to run an editor from the command line to change a configuration\
    \ file.\n\n### Solution\n\nUse the nano editor included with most Raspberry Pi\
    \ distributions.\n\n### Discussion\n\nTo use nano, simply type the command `nano`\
    \ followed by the filename or path to the file that you want to edit. If the file\
    \ doesn't exist, it will be created when you save it. However, this will happen\
    \ only if you have write permissions in the directory to which you are trying\
    \ to write the file.\n\nFrom your home directory, type the command `nano my_file.txt`\
    \ to edit or create the file `my_file.txt`. Figure 3-9 shows nano in action.\n\
    \nYou cannot use the mouse to position the cursor; you must use the arrow keys\
    \ instead.\n\nThe area at the bottom of the screen lists a number of commands\
    \ that you can access by holding down the Ctrl key and pressing the letter indicated.\
    \ Most of these are not that useful. The ones that you are most likely to use\
    \ are as follows:\n\n- **Ctrl-X**\n  Exit. You will be prompted to save the file\
    \ before nano exits.\n\n- **Ctrl-V**\n  Next page. Think of it as an arrow pointing\
    \ downward. This allows you to move through a large file one screen at a time.\n\
    \n- **Ctrl-Y**\n  Previous page.\n\n- **Ctrl-W**\n  Where is. This allows you\
    \ to search for a piece of text.\n\n- **Ctrl-O**\n  Output. This will write (save)\
    \ the file without exiting the editor.\n\nSome fairly crude copy-and-paste options\
    \ are also there, but in practice, it’s easier to use the normal clipboard from\
    \ the menu that you access with a right-click, as demonstrated in Figure 3-10.\n\
    \nUsing this clipboard also enables you to copy and paste text between other windows,\
    \ such as your browser.\n\nWhen you're ready to save your changes to the file\
    \ and exit nano, use the command Ctrl-X. Type Y to confirm that you want to save\
    \ the file. nano then displays the filename as the default name to save the file\
    \ under; press Enter to save and exit.\n\nIf you want to abandon the changes you\
    \ have made, enter N in place of Y.\n\n### See Also\n\nEditors are very much a\
    \ matter of personal taste. Many other editors that are available for Linux will\
    \ work just fine on Raspberry Pi. The Vim (Vi IMproved) editor has many fans in\
    \ the Linux world. This is also included in the popular Raspberry Pi distributions.\
    \ It is not, however, an easy editor for the beginner. You can run it in the same\
    \ way as nano, but you use the command vi instead of nano.\n\n## 3.8 Viewing the\
    \ Contents of a File\n\n### Problem\n\nYou want to view the contents of a small\
    \ file without editing it.\n\n### Solution\n\nUse the `cat` command or the `more`\
    \ command to view the file."
