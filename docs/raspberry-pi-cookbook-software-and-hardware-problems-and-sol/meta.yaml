    Our additions to the code are shown in bold.


    The variable `last_detection_time` keeps track of when a person was last detected
    so that it can wait for a while after detecting someone before writing another
    file. Otherwise, a lot of files would be created.


    The line `detection_result = detector.detect(input_tensor)` creates a list of
    detection events, each of which might look like this:


    ```

    Detection(bounding_box=BoundingBox(origin_x=418, origin_y=285, width=16, height=40),

    categories=[Category(index=83, score=0.3515625, display_name='''', category_name=''book'')])

    ```


    This is a list of tuples, with the first part of the tuple being the bounding
    box of the thing detected and the second part a list of categories that the object
    could fit, with the most likely first. That means that to get the name of the
    category, which will tell us the type of the object, we need to get the first
    category in that list [0] and use its `category_name`.


    Iterating over this list of `detection_result`, we check the time and then see
    if the `object_type` is “person.” If it is, and sufficient time has elapsed since
    an object was last detected (10 seconds), the file is saved using `cv2.imwrite`
    using the current date and time as the filename.


    You could do all sorts of things with a program like this. For example, you could
    detect your pet and make an automated pet feeder that controls a motor and deposits
    some food for the animal.


