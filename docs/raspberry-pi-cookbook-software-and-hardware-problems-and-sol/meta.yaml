- img_proc: true
  md: '# See Also


    In the next section (Recipe 3.4), you will look at navigating the directory structure
    using the Terminal.


    # 3.4 Navigating the Filesystem Using a Terminal


    # Problem


    You need to know how to change directories and move about the filesystem using
    the Terminal.


    # Solution


    The main command used for navigating the filesystem is cd (change directory).
    After cd, you need to specify the directory that you want to change to. This can
    be either a *relative* path to a directory within your current directory or an
    *absolute* path to somewhere else on the filesystem.


    To see what the current directory is, use the command pwd (print working directory).


    # Discussion


    Try out a few examples. Open a Terminal session, and you should see a prompt like
    this:


    ```

    pi@raspberrypi: ~ $

    ```


    The prompt that you see after each command (pi@raspberrypi: ~ $) is a reminder
    of your username (pi) and your computer name (raspberrypi). The ~ character is
    shorthand for your home directory (/home/pi or whatever username you chose when
    setting up your Raspberry Pi). So at any point you can change your current directory
    to your home directory as follows:


    ```

    $ cd ~

    ```


    ![](img/e36e77524aeaae366529d1cf02f9a39c_94_0.png)


    Throughout the book, I use a $ at the beginning of each line where you are expected
    to type a command. This is called the *prompt*. The response from the command
