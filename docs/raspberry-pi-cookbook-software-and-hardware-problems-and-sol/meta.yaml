    remove the microSD card. The next time you switch on your Raspberry Pi, it should
    boot from the USB drive.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_44_0.png)


    Figure 1-17. Using the Raspberry Pi Imager to configure USB booting


    ![](img/e36e77524aeaae366529d1cf02f9a39c_44_1.png)


    Figure 1-18. Copying your microSD card to an external flash drive


    ## Discussion


    If you are starting with a fresh image, rather than wanting to copy over the current
    contents of your microSD card, then you can get away with using just one microSD
    card. Between steps 4 and 5, set up the microSD card with a fresh Raspberry Pi
    OS image by following Recipe 1.6.


    ## See Also


    Check out the documentation for the Raspberry Pi Imager.


    ## 1.10 Connecting a DVI or VGA Monitor


    ### Problem


    Your monitor does not have an HDMI connector, but you want to use it with your
    Raspberry Pi.


    ### Solution


    Many people have been caught out by this problem. Fortunately, it is possible
    to buy adapters for monitors with a DVI or VGA input, but no HDMI connectors.


    DVI adapters are the simplest and cheapest. They are available for less than $5
    if you search for “HDMI male to DVI female converter.”


    ### Discussion


    Using VGA adapters is more complex because they require some electronics to convert
    the signal from digital to analog, so beware of leads that do not contain these.
    The official converter is called Pi-View and is available wherever the Raspberry
    Pi is sold. Pi-View has the advantage of having been tested and found to work
    with Raspberry Pi. You can find cheaper alternatives on the internet, but often
    these won’t work.


    However, given that new monitors all have HDMI connectors, you are probably better
    off spending your money on a new monitor rather than an adapter.


    ### See Also


    eLinux has [tips on what to look for in a converter](http://elinux.org/).


    ## 1.11 Using a Composite Video Monitor/TV


    ### Problem


    The text on your low-resolution composite monitor is illegible.


    ### Solution


    You need to adjust the resolution of the Raspberry Pi for a small screen.


    The Raspberry Pi has two types of video output: (1) HDMI, and (2) composite video
    from the audio jack, for which you need a special lead. Of these, the HDMI is
    by far the better-quality option. If you’re intending to use a composite video
    as your main screen, you might want to think again.


    If you are using a composite video screen—say, because you need a really small
    screen—you need to make a few adjustments to fit the video output to the screen.
    You need to make some changes to the file /boot/config.txt.


    You can edit this file on your Mac or PC by inserting the SD card back into an
    SD card reader, or you can edit it on the Raspberry Pi without having to remove
    the card. Editing files on the Raspberry Pi itself is normally done using the
    nano editor. This is a little tricky, and I suggest you read Recipe 3.7 thoroughly
    before you try editing your first file. If you are happy to go ahead and edit
    the file using nano, enter the following command in a Terminal session:


    ```

    $ sudo nano /boot/config.txt

    ```


    Note that to save and exit nano, press Ctrl-X, then press Y (to confirm), and
    then press Enter.


    > **The Terminal**

    >

    > If you are a Mac or Windows user, you may not be familiar with the idea of a
    Terminal or command line. Raspberry Pi OS is based on Linux, and although most
    things can be done in Linux by point and click, sometimes a need still exists
    to run commands when installing software or configuring the operating system in
    some way. To get an overview of using the Terminal, skip ahead to Recipe 3.3.


    If the text is too small to read, it''s best to remove the SD card from the Raspberry
    Pi and insert it into your computer. The file will then be in the top-level directory
    on the SD card, and you can use a text editor on your PC (such as Notepad++) to
    modify it.


    You need to know the resolution of your screen. For a lot of small screens, this
    will be 320 x 240 pixels. Find the two lines in the file that read as follows:


    ```

    #framebuffer_width=1280

    #framebuffer_height=720

    ```


    Remove the # from the beginning of each line and change the two numbers to the
    width and height of your screen. Removing the # enables the line. In the following
    example, the screen size has been modified to be 320 by 240:


    ```

    framebuffer_width=320

    framebuffer_height=240

    ```


    Save the file and restart your Raspberry Pi. You should find that everything has
    become a lot easier to read. You''ll probably also find that there is a big, thick
    border around the screen. To adjust this, see Recipe 1.12.


    ### Discussion


    Many low-cost CCTV monitors that can make a great companion for the Raspberry
    Pi are available when you’re making something like a retro game console (Recipe
    4.4). However, these monitors are often very low resolution.


    ### See Also


    For another tutorial on using composite monitors, see [this Adafruit tutorial](https://www.adafruit.com/).


    Also, see Recipes 1.10 and 1.12 to adjust your picture when you’re using the HDMI
    video output.


    ## 1.12 Adjusting the Picture Size on Your Monitor


    ### Problem


    When you first connect a Raspberry Pi to a monitor, you might find that you can’t
    read some of the text because it extends off the screen, or that the picture isn’t
    using all the space available on the screen.


    ### Solution


    If your problem is that a large black border is around the picture, you can make
    the screen fill the whole area of the monitor using the Raspberry Pi’s desktop
    Configuration tool (see Figure 1-19). To open this, go to the Raspberry Menu,
    select Preferences, click Raspberry Pi Configuration, and select the Display tab.


    Click the toggle switch next to Underscan. Note that the change will not take
    effect until you have clicked OK and then rebooted your Raspberry Pi.


    If you have the opposite problem and your text extends off the edges of the screen,
    the solution is the same: click the toggle switch for Underscan.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_48_0.png)


    Figure 1-19. Using the Raspberry Pi Configuration tool to control underscan


    The second step is to edit the file /boot/config.txt. You can do this either by
    removing the SD card and mounting it on your PC or Mac or by editing the SD card
    on the Raspberry Pi. Editing files on the Raspberry Pi itself is normally done
    using the nano editor. This is a little tricky; I suggest you read Recipe 3.7
    thoroughly before you try editing your first file. If you are happy to go ahead
    and edit the file using nano, enter the following command in a Terminal session:


    ```

    $ sudo nano /boot/config.txt

    ```


    Look for the section dealing with overscan. The four lines you need to change
    are shown in the middle of Figure 1-20, each beginning with #overscan.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_49_0.png)


    Figure 1-20. Adjusting overscan


    For the lines to take effect, you need to enable them by removing the # character
    from the start of each line.


    Then, using trial and error, change the settings until the screen fills as much
    of the monitor as possible. Note that the four numbers should be negative. Try
    setting them all to -20 to start with. This will decrease the area of the screen
    that is used.


    To save and exit nano, press Ctrl-X, then press Y (to confirm), and then press
    Enter.


    ### Discussion


    Having to repeatedly restart the Raspberry Pi to see the effects of the changes
    in resolution is a little tedious. Fortunately, you need to do this procedure
    only once. Most monitors and TVs work just fine without any need for underscanning.


    ### See Also


    You can also configure underscanning using the `raspi-config` utility.


    ## 1.13 Maximizing Performance


    ### Problem


    Your Raspberry Pi seems to be very slow, so you want to overclock it to make it
    run faster.


    ### Solution


    If you have a Raspberry Pi 3, 4, or 400 with a quad-core processor, you are unlikely
    to find it to be too slow. However, older Raspberry Pis 1 and 2 can be pretty
    sluggish.


    You can increase the clock frequency of a Raspberry Pi 1 or 2 to make it run a
    little faster. This will make it consume a bit more power and run a little hotter
    (see the Discussion section that follows).


    The method of overclocking described here is called *dynamic overclocking* because
    it automatically monitors the temperature of the Raspberry Pi and drops the clock
    speed back down if things begin to get too hot. This is called *throttling*.


    Run the `raspi-config` utility by issuing the following command in an SSH Terminal:


    ```

    $ sudo raspi-config

    ```


    Select the Overclock option. You are then presented with the options shown in
    Figure 1-21.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_50_0.png)


    Figure 1-21. Configuring overclocking with the raspi-config utility from the command
    line


    Select an option. If you find that your Raspberry Pi starts to become unstable
    and hangs unexpectedly, you might need to choose a more conservative option or
    turn overclocking off by setting it back to None.'
  mdcn: '7. 当复制完成后，你可以再次关闭你的树莓派并取出 microSD 卡。下次启动树莓派时，它应该会从 USB 驱动器启动。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_44_0.png)


    图 1-17. 使用树莓派镜像烧录工具配置 USB 启动


    ![](img/e336e77524aeaae366529d1cf02f9a39c_44_1.png)


    图 1-18. 将你的 microSD 卡复制到外部闪存驱动器


    ## 讨论


    如果你是从一个全新的镜像开始，而不是想复制当前 microSD 卡的内容，那么你只需要使用一张 microSD 卡即可。在步骤 4 和 5 之间，按照配方
    1.6 的方法，用全新的树莓派操作系统镜像设置 microSD 卡。


    ## 另请参阅


    查看树莓派镜像烧录工具的文档。


    ## 1.10 连接 DVI 或 VGA 显示器


    ### 问题


    你的显示器没有 HDMI 接口，但你想将它与树莓派一起使用。


    ### 解决方案


    很多人都遇到过这个问题。幸运的是，可以为带有 DVI 或 VGA 输入但没有 HDMI 接口的显示器购买适配器。


    DVI 适配器是最简单和最便宜的。如果你搜索“HDMI 公头转 DVI 母头转换器”，价格可以低于 5 美元。


    ### 讨论


    使用 VGA 适配器更复杂，因为它们需要一些电子元件将信号从数字转换为模拟，所以要小心那些不包含这些元件的线缆。官方转换器名为 Pi-View，在任何销售树莓派的地方都可以买到。Pi-View
    的优势在于经过测试，已知可与树莓派配合使用。你可以在网上找到更便宜的替代品，但通常这些都无法工作。


    然而，鉴于新显示器都有 HDMI 接口，你最好把钱花在新显示器上，而不是适配器上。


    ### 另请参阅


    eLinux 上有[关于在转换器中寻找什么的提示](http://elinux.org/)。


    ## 1.11 使用复合视频显示器/电视


    ### 问题


    你的低分辨率复合显示器上的文字难以辨认。


    ### 解决方案


    你需要为小屏幕调整树莓派的分辨率。


    树莓派有两种类型的视频输出：(1) HDMI，和 (2) 来自音频插孔的复合视频，你需要一根特殊的线缆。其中，HDMI 是质量好得多的选择。如果你打算将复合视频作为主屏幕，你可能需要重新考虑。


    如果你使用的是复合视频屏幕——比如说，因为你需要一个非常小的屏幕——你需要进行一些调整以使视频输出适应屏幕。你需要对文件 /boot/config.txt
    进行一些更改。


    你可以通过将 SD 卡重新插入读卡器，在 Mac 或 PC 上编辑此文件，也可以在树莓派上编辑而无需取出卡。在树莓派本身上编辑文件通常使用 nano 编辑器。这有点棘手，我建议你在尝试编辑第一个文件之前彻底阅读配方
    3.7。如果你愿意继续使用 nano 编辑文件，请在终端会话中输入以下命令：


    ```

    $ sudo nano /boot/config.txt

    ```


    请注意，要保存并退出 nano，请按 Ctrl-X，然后按 Y（确认），然后按 Enter。


    > **终端**

    >

    > 如果你是 Mac 或 Windows 用户，你可能不熟悉终端或命令行的概念。树莓派操作系统基于 Linux，尽管在 Linux 中大多数事情都可以通过点击完成，但在安装软件或以某种方式配置操作系统时，有时仍然需要运行命令。要了解使用终端的概述，请跳转到配方
    3.3。


    如果文字太小无法阅读，最好将 SD 卡从树莓派中取出并插入你的计算机。然后该文件将位于 SD 卡的顶层目录中，你可以使用 PC 上的文本编辑器（如 Notepad++）进行修改。


    你需要知道屏幕的分辨率。对于许多小屏幕，这将是 320 x 240 像素。在文件中找到以下两行：


    ```

    #framebuffer_width=1280

    #framebuffer_height=720

    ```


    删除每行开头的 # 并将两个数字更改为屏幕的宽度和高度。删除 # 会启用该行。在下面的示例中，屏幕尺寸已修改为 320 乘 240：


    ```

    framebuffer_width=320

    framebuffer_height=240

    ```


    保存文件并重启你的树莓派。你应该会发现一切都变得更容易阅读了。你可能还会发现屏幕周围有一个又大又粗的边框。要调整这一点，请参阅配方 1.12。


    ### 讨论


    许多低成本的闭路电视显示器可以成为树莓派的好伴侣，当你制作像复古游戏机（配方 4.4）这样的东西时。然而，这些显示器通常分辨率非常低。


    ### 另请参阅


    有关使用复合显示器的另一个教程，请参阅 [Adafruit 教程](https://www.adafruit.com/)。


    另外，当你使用 HDMI 视频输出时，请参阅配方 1.10 和 1.12 来调整你的画面。


    ## 1.12 调整显示器上的画面大小


    ### 问题


    当你第一次将树莓派连接到显示器时，你可能会发现无法阅读某些文字，因为它超出了屏幕范围，或者画面没有使用屏幕上所有可用的空间。


    ### 解决方案


    如果你的问题是画面周围有一个大的黑色边框，你可以使用树莓派的桌面配置工具（见图 1-19）使屏幕填满显示器的整个区域。要打开此工具，请转到树莓派菜单，选择首选项，单击树莓派配置，然后选择显示选项卡。


    单击欠扫描旁边的开关。请注意，在单击确定并重启树莓派之前，更改不会生效。


    如果你遇到相反的问题，即文字超出了屏幕边缘，解决方案是相同的：单击欠扫描的开关。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_48_0.png)


    图 1-19. 使用树莓派配置工具控制欠扫描


    第二步是编辑文件 /boot/config.txt。你可以通过取出 SD 卡并将其挂载到 PC 或 Mac 上，或者在树莓派上编辑 SD 卡来完成此操作。在树莓派本身上编辑文件通常使用
    nano 编辑器。这有点棘手；我建议你在尝试编辑第一个文件之前彻底阅读配方 3.7。如果你愿意继续使用 nano 编辑文件，请在终端会话中输入以下命令：


    ```

    $ sudo nano /boot/config.txt

    ```


    查找处理过扫描的部分。你需要更改的四行显示在图 1-20 的中间，每行都以 #overscan 开头。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_49_0.png)


    图 1-20. 调整过扫描


    要使这些行生效，你需要通过删除每行开头的 # 字符来启用它们。


    然后，通过反复试验，更改设置，直到屏幕尽可能多地填满显示器。请注意，这四个数字应该是负数。尝试先将它们全部设置为 -20。这将减少屏幕使用的区域。


    要保存并退出 nano，请按 Ctrl-X，然后按 Y（确认），然后按 Enter。


    ### 议论


    不得不反复重启树莓派以查看分辨率更改的效果有点乏味。幸运的是，你只需要执行一次此过程。大多数显示器和电视无需任何欠扫描即可正常工作。


    ### 另请参阅


    你也可以使用 `raspi-config` 实用程序配置欠扫描。


    ## 1.13 最大化性能


    ### 问题


    你的树莓派似乎非常慢，所以你想超频以使其运行更快。


    ### 解决方案


    如果你有配备四核处理器的树莓派 3、4 或 400，你不太可能觉得它太慢。然而，较旧的树莓派 1 和 2 可能相当迟钝。


    你可以增加树莓派 1 或 2 的时钟频率，使其运行得稍快一些。这将使其消耗更多功率并运行得更热一些（参见后面的讨论部分）。


    这里描述的超频方法称为*动态超频*，因为它会自动监控树莓派的温度，并在温度开始过高时降低时钟速度。这称为*节流*。


    通过在 SSH 终端中发出以下命令运行 `raspi-config` 实用程序：


    ```

    $ sudo raspi-config

    ```


    选择超频选项。然后你将看到图 1-21 中所示的选项。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_50_0.png)


    图 1-21. 使用命令行中的 raspi-config 实用程序配置超频


    选择一个选项。如果你发现树莓派开始变得不稳定并意外挂起，你可能需要选择一个更保守的选项，或者通过将其设置回“无”来关闭超频。'
