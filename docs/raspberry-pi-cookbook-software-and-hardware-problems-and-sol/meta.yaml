- img_proc: true
  md: 'To connect from a Windows computer, you will need to use PuTTY (Recipe 2.6)
    to start an SSH session.


    # Discussion


    SSH is a very common way of connecting to remote computers; any commands that
    you could issue on the Pi itself, you can use from SSH. It is also, as its name
    suggests, secure because the communication is encrypted.


    Unlike the console lead solution of Recipe 2.6, SSH will only work if your Raspberry
    Pi is connected to the same network as the computer trying to connect to it.


    Perhaps the only drawback to SSH is that it is a command-line rather than graphical
    environment. If you need remote access to the full Raspberry Pi desktop environment,
    you need to use VNC (Recipe 2.8).


    # See Also


    Check out this Adafruit tutorial.


    # 2.8 Controlling the Pi Remotely with VNC


    # Problem


    You want access to the full Raspberry Pi OS graphical desktop from a PC (Windows
    or Linux) or macOS using virtual network computing (VNC).


    # Solution


    Use the pre-installed VNC software on Raspberry Pi OS. However, to do so, you
    first need to configure your Raspberry Pi to turn it on. You can do this using
    the Raspberry Pi Configuration tool, which you can find in the Preferences section
    of the Raspberry Menu on the Raspberry Pi desktop. Click the Interfaces tab, scroll
    down to the VNC option, select the enabled radio button, and click OK (Figure
    2-15).'
