  - '[PAGE 417]


    The program is very similar to that of Recipe 14.7. The main difference is the
    scaling, using the values of the two resistors, which are held in the variables
    R1 and R2.


    When you run the program, the battery voltage is displayed:


    ```

    $ python3 ch_14_adc_scaled.py

    Battery Voltage=8.62421875

    ```


    > Read the discussion carefully before attaching anything higher than 9V, or you
    might destroy the MCP3008.


    # Discussion


    This arrangement of resistors is called a *voltage divider* or sometimes a *potential
    divider* (Figure 14-15). The formula for calculating the output voltage, given
    the input voltage and the values of the two resistors, is as follows:


    ```

    Vout = Vin * R2 / (R1 + R2)

    ```


    ![](img/e36e77524aeaae366529d1cf02f9a39c_417_0.png)


    This means that if R1 and R2 were both the same value (say, 1kΩ), Vout would be
    half of Vin.


    When choosing R1 and R2, you also need to consider the current flowing through
    them. This will be Vin/(R1 + R2). In the preceding example, R1 is 10kΩ and R2
    is 3.3kΩ, so the current flowing will be 9V/13.3kΩ = 0.68mA. This is low, but
    still enough to eventually drain the battery, so do not leave it connected all
    the time.'
  - '[PAGE 418]


    # See Also


    To avoid the math, you can use an [online resistor calculator](https://www.google.com/search?q=online+resistor+calculator).


    The voltage divider is also used to convert resistance to voltage when using a
    resistive sensor with an ADC ([Recipe 14.9](#recipe-14-9)).


    # 14.9 Using Resistive Sensors with an ADC


    # Problem


    You have a resistive sensor that you wish to use with an MCP3008 ADC chip.


    # Solution


    Use a potential divider with one fixed resistor and the resistive sensor to convert
    the resistance of the sensor into a voltage that can be measured with the ADC.
    As an example, you can remake the light sensor project of [Recipe 14.2](#recipe-14-2)
    to use the MCP3008 instead of the step response technique.


    To try this recipe, you''ll need the following:


    +   - Breadboard and jumper wires (see "Prototyping Equipment and Kits" on page
    564)

    - MCP3008 eight-channel ADC IC (see "Integrated Circuits" on page 565)

    - 10kΩ resistor (see "Resistors and Capacitors" on page 565)

    - Photoresistor (see "Resistors and Capacitors" on page 565)


    Figure 14-16 shows the arrangement for this, using a breadboard.


    You can use the exact same program as [Recipe 14.7](#recipe-14-7) (`ch_14_adc_test.py`).
    Covering up the light sensor with your hand changes the readings. You also need
    to set up SPI on your Raspberry Pi so, if you haven''t already done so, follow
    [Recipe 10.6](#recipe-10-6) first.


    ```

    $ python3 ch_14_adc_test.py

    Reading=0.60 Voltage=2.00

    Reading=0.54 Voltage=1.80

    ```'
  - '[PAGE 419]


    ![](img/e36e77524aeaae366529d1cf02f9a39c_419_0.png)


    Figure 14-16. Using a photoresistor with an ADC


    These readings can be quite a bit different, depending on your photoresistor,
    but the important thing is that the figure changes as the light level changes.


    # Discussion


    The choice of fixed-value resistor is not very critical. If the value is too high
    or too low, you will find that the range of readings is rather narrow. Select
    a resistor value somewhere between the minimum and maximum resistance of the sensor.
    You might need to experiment with a few resistors before deciding on one that
    suits your sensor over the range of readings you’re interested in. If in doubt,
    start with 10kΩ and see how that works.


    You can swap out the photoresistor for pretty much any resistive sensor. So, for
    instance, you could use the gas sensor from [Recipe 14.4](Recipe 14.4).


    # See Also


    To measure light intensity without the complication of an ADC, see [Recipe 14.2](Recipe
    14.2).


    For an example of using more than one channel of the ADC at a time, see [Recipe
    14.14](Recipe 14.14).'
- md: "## 14.10 Measuring Temperature with an ADC\n\n### Problem\n\nYou want to measure\
    \ temperature using a TMP36 and an analog-to-digital converter.\n\n### Solution\n\
    \nUse an MCP3008 ADC chip with the TMP36.\n\nTo try this recipe, you will need\
    \ the following:\n\n- Breadboard and jumper wires (see “Prototyping Equipment\
    \ and Kits” on page 564)\n- MCP3008 eight-channel ADC IC (see “Integrated Circuits”\
    \ on page 565)\n- TMP36 temperature sensor (see “Integrated Circuits” on page\
    \ 565)\n\nFigure 14-17 shows the arrangement for this, using a breadboard.\n\n\
    ![](img/e36e77524aeaae366529d1cf02f9a39c_420_0.png)\n\nMake sure that you have\
    \ the TMP36 facing the proper direction. One side of the package is flat, whereas\
    \ the other is curved.\n\nYou will need to set up SPI on your Raspberry Pi, so\
    \ if you haven't already done so, follow Recipe 10.6.\n\nOpen an editor and paste\
    \ in the following code (ch_14_adc_tmp36.py):\n\n```\nfrom gpiozero import MCP3008\n\
    import time\n\nanalog_input = MCP3008(channel=0)\n\nwhile True:\n    reading =\
    \ analog_input.value\n    voltage = reading * 3.3\n    temp_c = voltage * 100\
    \ - 50\n    temp_f = temp_c * 9.0 / 5.0 + 32\n    print(\"Temp C={:.2f}\\tTemp\
    \ F={:.2f}\".format(temp_c, temp_f))\n    time.sleep(1)\n```\n\nAs with all the\
    \ program examples in this book, you can also download this program (see Recipe\
    \ 3.22).\n\nThe program is based on that of Recipe 14.7. A little bit of additional\
    \ math calculates the temperature in degrees Celsius and Fahrenheit:\n\n```\n\
    $ python3 ch_14_adc_tmp36.py\nTemp C=18.64        Temp F=65.55\nTemp C=20.25 \
    \       Temp F=68.45\nTemp C=23.47        Temp F=74.25\nTemp C=25.08        Temp\
    \ F=77.15\n```\n\n### Discussion\n\nThe TMP36 outputs a voltage that is proportional\
    \ to the temperature. According to the datasheet for the TMP36, the temperature\
    \ in degrees Celsius is calculated as the voltage (in volts) × 100 – 50.\n\nThe\
    \ TMP36 is fine for measuring the approximate temperature but is specified as\
    \ having an accuracy of only 2°C. This will only get worse if you attach long\
    \ leads to it. To some extent, you can calibrate an individual device, but, for\
    \ better accuracy, use a DS18B20 (Recipe 14.13), which has a stated accuracy of\
    \ 0.5% over a temperature range of –10 to +85 degrees Celsius. Being a digital\
    \ device, it should not suffer any loss of accuracy when attached to long leads.\n\
    \n### See Also\n\nTake a look at the TMP36 datasheet.\n\nTo measure temperature\
    \ using a thermistor, see Recipe 14.3.\n\nTo measure temperature using a Sense\
    \ HAT, see Recipe 14.12.\n\nTo measure temperature using a digital temperature\
    \ sensor (DS18B20), see Recipe 14.13.\n\n## 14.11 Measuring the Raspberry Pi CPU\
    \ Temperature\n\n### Problem\n\nYou want to know just how hot your Raspberry Pi’s\
    \ CPU is getting.\n\n### Solution\n\nUse the gpiozero library to access the temperature\
    \ sensor built into the Broadcom chip. Your Raspberry Pi should already have the\
    \ gpiozero library installed. But if it doesn’t, you can install it using:\n\n\
    ```\n$ sudo pip3 install gpiozero\n```\n\nThe example program *ch_14_cpu_temp.py*\
    \ will repeatedly print the CPU temperature:\n\n```\nimport time\nfrom gpiozero\
    \ import CPUTemperature\n\nwhile True:\n    cpu_temp = CPUTemperature()\n    print(cpu_temp.temperature)\n\
    \    time.sleep(1)\n```\n\nAs with all the program examples in this book, you\
    \ can also download this program (see Recipe 3.22).\n\nWhen you run this program,\
    \ it reports the temperature in degrees C once a second:\n\n```\n$ python3 ch_14_cpu_temp.py\n\
    37.485\n38.459\n36.511\n36.998\n```\n\n### Discussion\n\nBecause the Raspberry\
    \ Pi’s CPU is busy running code, the temperature reported will not have much to\
    \ do with the ambient temperature, but will be more an indication as to how hard\
    \ the Pi is working and how well ventilated it is.\n\n### See Also\n\nTo measure\
    \ temperature using a thermistor, see Recipe 14.3.\n\nTo measure temperature using\
    \ a TMP36, see Recipe 14.10.\n\nTo measure temperature using a Sense HAT, see\
    \ Recipe 14.12.\n\nTo measure temperature using a digital temperature sensor (DS18B20),\
    \ see Recipe 14.13.\n\n## 14.12 Measuring Temperature, Humidity, and Pressure\
    \ with a Sense HAT\n\n### Problem\n\nYou want to measure temperature, humidity,\
    \ and pressure, but you don't really want to have to attach three separate sensors.\n\
    \n### Solution\n\nUse a Raspberry Pi Sense HAT (Figure 14-18). That way, you get\
    \ all of those sensors plus some extras, like a display.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_423_0.png)\n\
    \nFigure 14-18. A Sense HAT\n\nThe Sense Hat software comes pre-installed on Raspberry\
    \ Pi OS.\n\nOpen an editor and paste in the following code (ch_14_sense_hat_thp.py):\n\
    \n```\nfrom sense_hat import SenseHat\nimport time\n\nhat = SenseHat()\n\nwhile\
    \ True:\n    t = hat.get_temperature()\n    h = hat.get_humidity()\n    p = hat.get_pressure()\n\
    \    print('Temp C:{:.2f} Hum:{:.0f} Pres:{:.0f}'.format(t, h, p))\n    time.sleep(1)\n\
    ```\n\nAs with all the program examples in this book, you can also download this\
    \ program (see Recipe 3.22).\n\nWhen you run the program, the Terminal displays\
    \ something like this:\n\n```\n$ python3 ch_14_sense_hat_thp.py\nTemp C:27.71\
    \ Hum:56 Pres:1005\nTemp C:27.60 Hum:55 Pres:1005\n```\n\nThe temperature is in\
    \ degrees C, the humidity is the relative humidity as a percentage, and the atmospheric\
    \ pressure is in millibars.\n\n### Discussion\n\nYou will find that the temperature\
    \ readings from the Sense HAT are on the high side. This is because the temperature\
    \ sensor is built into the humidity sensor and is on the Sense HAT PCB. The Sense\
    \ HAT generates very little heat (unless you use the display), but the Raspberry\
    \ Pi under the Sense HAT does get warm and will increase the temperature of the\
    \ HAT. The best way to avoid this problem is to use a 40-way ribbon cable to move\
    \ the Sense HAT away from the Raspberry Pi. There are also attempts to adjust\
    \ the readings by using the temperature reading of the Raspberry Pi. Personally,\
    \ I feel that these compensation attempts are probably very specific to the user's\
    \ posting and are unlikely to produce reliable results.\n\nAs well as reading\
    \ the temperature from the humidity sensor, the pressure sensor also has a temperature\
    \ sensor built in that you can read like this:\n\n```\nt = hat.get_temperature_from_pressure()\n\
    ```\n\nIt is unclear from the documentation as to whether this reading is any\
    \ more accurate than using the humidity sensor, but for my setup, it reported\
    \ temperatures about 1 degree Celsius lower than the humidity sensor.\n\n### See\
    \ Also\n\nTo get started with the Sense HAT, see Recipe 10.15.\n\nCheck out the\
    \ programming reference for the Sense HAT.\n\nThe Sense HAT also has an accelerometer,\
    \ a magnetometer (Recipe 14.15), and a gyroscope (Recipe 14.16) for navigation-type\
    \ projects. It also has a full-color 8×8 LED matrix display (Recipe 15.3).\n\n\
    ## 14.13 Measuring Temperature Using a Digital Sensor\n\n### Problem\n\nYou want\
    \ to measure temperature using an accurate digital sensor.\n\n### Solution\n\n\
    Use the DS18B20 digital temperature sensor. This device is more accurate than\
    \ the TMP36 used in Recipe 14.10, and it uses a digital interface, so it doesn't\
    \ require an ADC chip.\n\nAlthough the interface to this chip is called *one-wire*,\
    \ this just refers to the data pin. You do need at least one other wire to connect\
    \ to a one-wire device.\n\nTo make this recipe, you will need the following:\n\
    \n- Breadboard and jumper wires (see “Prototyping Equipment and Kits” on page\
    \ 564)\n- DS18B20 temperature sensor (see “Integrated Circuits” on page 565)\n\
    - 4.7kΩ resistor (see “Resistors and Capacitors” on page 565)\n\nFit the components\
    \ onto the breadboard as shown in Figure 14-19. Make sure that you get the DS18B20\
    \ facing the proper direction.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_425_0.png)\n\
    \nFigure 14-19. Connecting a DS18B20 to a Raspberry Pi\n\nThe latest version of\
    \ Raspberry Pi OS has support for the one-wire interface used by the DS18B20,\
    \ but you do need to enable it using the Raspberry Pi Configuration tool (Figure\
    \ 14-20).\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_426_0.png)\n\nFigure 14-20.\
    \ Enabling the one-wire interface\n\nYou will find the example code for this recipe\
    \ in *ch_14_temp_DS18B20.py*:\n\n```\nimport glob, time\n\nbase_dir = '/sys/bus/w1/devices/'\n\
    device_folder = glob.glob(base_dir + '28*')[0]\ndevice_file = device_folder +\
    \ '/w1_slave'\n\ndef read_temp_raw():\n    f = open(device_file, 'r')\n    lines\
    \ = f.readlines()\n    f.close()\n    return lines\n\ndef read_temp():\n    lines\
