- img_proc: true
  md: '```

    $ uname -a

    Linux raspberrypi 5.15.32-v7l+ #1538 SMP Thu Mar 31 19:39:41 BST 2022

    armv7l GNU/Linux

    ```


    Here you can see that the author''s Raspberry Pi uses v5.15 of the kernel.


    # See Also


    To see how much room you have left on your SD card or other boot disk, see [Recipe
    3.38](Recipe 3.38).


    # 3.40 Updating Raspberry Pi OS


    # Problem


    You want to update your Raspberry Pi to the latest version of Raspberry Pi OS.


    # Solution


    If you have a fairly new version of Raspberry Pi OS (Bullseye onwards), then an
    icon should be in the top right of the screen that looks like an arrow pointing
    down toward a tray (Figure 3-17). When you click on this, you are given the option
    to see available updates and install them.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_136_0.png)


    Figure 3-17. Installing updates from the desktop'
  merge: -1
  pgno: 136
- img_proc: true
  md: 'If you prefer, you can install from the command line. Open a command line using
    the Terminal (Recipe 3.3) and enter the following command to update your system
    to the latest version:


    ```

    $ sudo apt update

    $ sudo apt full-upgrade

    ```


    This will take some time, especially if there is a lot to upgrade. Most important,
    if you have any precious files on your system, I recommend copying them onto a
    USB flash drive (Recipe 3.2) before upgrading.


    # Discussion


    The first of these commands doesn''t actually update Raspberry Pi OS; it just
    updates the apt package manager to make it aware of the latest versions of the
    packages that comprise your operating system and related software.


    The command full-upgrade upgrades the operating system itself. During the process,
    you will be warned how much disk space will be required, so you should use Recipe
    3.38 to check that you have enough room before pressing Y to go ahead with the
    upgrade.


    Keeping your distribution up to date is important for a number of reasons. First,
    one of the main reasons that the operating system is changed is to fix bugs. So
    problems during the installation of software often vanish after a system update.
    Second, if you expose your Raspberry Pi to the internet, new versions of Raspberry
    Pi OS often patch security vulnerabilities.


    # See Also


    To start again with a completely fresh installation of Raspberry Pi OS, see Recipe
    1.6.'
  merge: -1
