    ![](img/e36e77524aeaae366529d1cf02f9a39c_474_0.png)


    Figure 16-4. Using raspi-config to change the audio output device


    # See Also


    To learn about connecting a speaker to your Raspberry Pi, see Recipe 16.1.


    For more sound input and output options, you can use the Audio Device Settings
    tool; see Recipe 16.6.


    # 16.3 Playing Audio on a Raspberry Pi Without an Audio Socket


    # Problem


    You want high-quality audio output on a Raspberry Pi without an audio jack, like
    a Pi Zero or Pi 400.


    # Solution


    Attach a Pimoroni Audio DAC Shim as shown in Figure 16-5 to the GPIO connector
    and connect the line out to an audio amplifier. If you are using a Raspberry Pi
    400, you’ll need a GPIO adapter to gain access to the GPIO pins.'
  - '[PAGE 475]


    ![](img/e36e77524aeaae366529d1cf02f9a39c_475_0.png)


    Figure 16-5. Attaching an Audio DAC SHIM to a Raspberry Pi 400


    Pimoroni’s SHIM concept is a clever one, which allows small add-on boards to be
    attached to the GPIO connector without the use of soldering or a connector socket.
    It just slides over the GPIO connector as a tight fit, slightly sprung to make
    good contact with the pins.


    For the Audio DAC card to be recognized, you need to install some software from
    Pimoroni, by running the following commands:


    ```

    $ cd ~

    $ git clone https://github.com/pimoroni/pirate-audio

    $ cd pirate-audio/mopidy

    $ sudo ./install.sh

    ```


    Once the install has finished, restart your Raspberry Pi, and you should find
    that when you right-click on the Audio icon on the top right of the desktop, the
    new sound interface will be available to select (Figure 16-6).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_475_1.png)


    Figure 16-6. Selecting the Audio DAC SHIM for output'
