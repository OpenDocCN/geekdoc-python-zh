    # 12.0 Introduction


    In this chapter, you will investigate the use of different types of motors with
    the Raspberry Pi. This includes DC motors, servomotors, and stepper motors.


    Motors come in all shapes and sizes (Figure 12-1). The most common is the simple
    brushed DC motor that you might find in a toy car. In this chapter, we will also
    look at servomotors, where the position of the motor’s shaft is set using pulses
    generated by the Raspberry Pi, and at stepper motors, which don’t rotate smoothly,
    but, as the name suggests, in tiny steps, as their coils are energized in sequence.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_338_0.png)


