    # CHAPTER 11


    # Controlling Hardware


    # 11.0 Introduction


    In this chapter, you come to grips with the control of electronics through the
    Raspberry Pi’s general-purpose input/output (GPIO) connector.


    Most of the recipes require the use of a solderless breadboard and male-to-female
    and male-to-male jumper wires (see Recipe 10.9). To maintain compatibility with
    older 26-pin Raspberry Pi models, all the breadboard examples here use only the
    top 26 pins common to both GPIO layouts (see Recipe 10.1).


    For a kit of parts, and breadboard, that are suitable for many of the recipes
    in this chapter, take a look at the Project Box 1 kit for Raspberry Pi.


    # 11.1 Connecting an LED


    # Problem


    You want to know how to connect an LED to the Raspberry Pi.


    # Solution


    Connect an LED to one of the GPIO pins using a 470Ω or 1kΩ series resistor to
    limit the current. To make this recipe, you will need the following:


    +   - Breadboard and jumper wires (see “Prototyping Equipment and Kits” on page
    564)

    - 470Ω resistor (see “Resistors and Capacitors” on page 565)

    - LED (see “OptoElectronics” on page 566)'
- md: "## 11.1 Connecting an LED to a Raspberry Pi\n\nFigure 11-1 shows how you can\
    \ wire this LED using a solderless breadboard and male-to-female jumper leads.\
    \ The LED has positive and negative leads. The positive lead is the longer and\
    \ will be the one on the same row as the resistor in Figure 11-1.\nThe resistor\
    \ shown is a 470Ω resistor, which will make the LED shine brightly without drawing\
    \ so much current that the Raspberry Pi could be damaged.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_313_0.png)\n\
    \nFigure 11-1. Connecting an LED to a Raspberry Pi\n\nHaving connected the LED,\
    \ we need to be able to turn it on and off using commands from Python.\nStart\
    \ a Python console from the Terminal and enter these commands:\n\n```\n$ sudo\
    \ python3\n>>> from gpiozero import LED\n>>> led = LED(18)\n>>> led.on()\n>>>\
    \ led.off()\n>>>\n```\n\nThis will turn your LED on after the `led.on()` command,\
    \ and off again after the `led.off()` command.\n\n### Discussion\n\nLEDs are a\
    \ very useful, cheap, and efficient way of producing light, but you do have to\
    \ be careful how you use them. If they are connected directly to a voltage source\
    \ (such as a GPIO output) that is greater than about 1.7 volts, they will draw\
    \ a very large current. This can often be enough to destroy the LED or whatever\
    \ is providing the current—which is not good if your Raspberry Pi is providing\
    \ the current.\nYou should always use a current-limiting resistor with an LED.\
    \ The series resistor is placed *between* the LED and the voltage source, which\
    \ limits the amount of current flowing through the LED to a level that is safe\
    \ for both the LED and the GPIO pin driving it.\n\nRaspberry Pi GPIO pins are\
    \ guaranteed to provide only about 3mA or 16mA of current (depending on the board\
    \ and number of pins in use)—see Recipe 10.3. LEDs will generally illuminate with\
    \ any current greater than 1mA, but they will be brighter with more current. Use\
    \ Table 11-1 as a guide to selecting a series resistor based on the type of LED;\
    \ the table also indicates the approximate current that will be drawn from the\
    \ GPIO pin.\n\nTable 11-1. Selecting series resistors for LEDs and a 3.3V GPIO\
    \ pin\n\n| LED type | Resistor | Current (mA) |\n| :--- | :--- | :--- |\n| Red\
    \ | 470Ω | 3.5 |\n| Red | 1kΩ | 1.5 |\n| Orange, yellow, green | 470Ω | 2 |\n\
    | Orange, yellow, green | 1kΩ | 1 |\n| Blue, white | 100Ω | 3 |\n| Blue, white\
    \ | 270Ω | 1 |\n\nAs you can see, in all cases it is safe to use a 470Ω resistor.\
    \ If you are using a blue or white LED, you can reduce the value of the series\
    \ resistor considerably without risk of damaging your Raspberry Pi.\n\nIf you\
    \ want to extend the experiments that you made in the Python console into a program\
    \ that makes the LED blink on and off repeatedly, you could paste the code that\
    \ you’ll find in ch_11_led_blink.py into an editor (as with all the program examples\
    \ in this book, you can download this program [see Recipe 3.22]):\n\n```\nfrom\
    \ gpiozero import LED\nfrom time import sleep\n\nled = LED(18)\n\nwhile True:\n\
    \    led.on()\n    sleep(0.5)\n    led.off()\n    sleep(0.5)\n```\n\nTo run the\
    \ command, enter the following:\n\n```\n$ python3 ch_11_led_blink.py\n```\n\n\
    The sleep period of 0.5 seconds between turning the LED on and turning it off\
    \ again makes the LED blink once a second.\n\nThe LED class also has a built-in\
    \ method for blinking, as illustrated by this example:\n\n```\nfrom gpiozero import\
    \ LED\nled = LED(18)\nled.blink(0.5, 0.5, background=False)\n```\n\nThe first\
    \ two parameters to blink are the on time and off time, respectively. The optional\
    \ background parameter is interesting because if you set this to True, your program\
    \ will be able to continue running other commands in the background while the\
    \ LED is blinking.\n\nWhen you are ready to stop the LED blinking in the background,\
    \ you can just use led.off(). This technique can greatly simplify your programs.\
    \ The example in ch_11_led_blink_2.py shows this in action:\n\n```\nfrom gpiozero\
    \ import LED\n\nled = LED(18)\nled.blink(0.5, 0.5, background=True)\nprint(\"\
    Notice that control has moved away - hit Enter to continue\")\ninput()\nprint(\"\
    Control is now back\")\nled.off()\ninput()\n```\n\nWhen the program starts, the\
    \ LED will be set blinking in the background and the program is free to move onto\
    \ the next command and print “Notice that control has moved away - hit Enter to\
    \ continue.” The input() command will cause the program to halt and wait for input\
    \ (you can just press the Enter key). But notice that before you press Enter,\
    \ the LED is still blinking even though the program has moved on to wait for input.\n\
    \nWhen you do press Enter again, the led.off() command stops the LED’s background\
    \ blinking.\n\n### See Also\n\nCheck out this series resistor calculator.\n\n\
    For more information on using a breadboard and jumper wires with the Raspberry\
    \ Pi, see Recipe 10.9.\n\nSee the gpiozero documentation on LEDs.\n\n## 11.2 Leaving\
    \ the GPIO Pins in a Safe State\n\n### Problem\n\nYou want all the GPIO pins to\
    \ be set to inputs whenever your program exits to reduce the chance of an accidental\
    \ short on the GPIO header, which could damage your Raspberry Pi.\n\n### Solution\n\
    \nWhenever you exit a program that uses gpiozero, it will automatically set all\
    \ the GPIO pins into a safe *input* state.\n\n### Discussion\n\nEarlier methods\
    \ of accessing the GPIO pins, such as the RPi.GPIO library, did not automatically\
    \ set the GPIO pins to be in a safe input state. Instead, they required you to\
    \ call a cleanup function before exiting the program.\n\nIf cleanup was not called\
    \ or the Pi was not rebooted, pins set to be outputs would remain as outputs after\
    \ the program has finished. If you were to start wiring up a new project, unaware\
    \ of this problem, your new circuit might accidentally short a GPIO output to\
    \ one of the supply voltages or another GPIO pin in the opposite state. A typical\
    \ scenario in which this might happen would be if you were to connect a push switch,\
    \ connecting a GPIO pin that you had configured as an output and HIGH to GND.\n\
    \nFortunately for us, the gpiozero library now takes care of this.\n\n### See\
    \ Also\n\nFor more information on exception handling in Python, see [Recipe 7.10](Recipe\
    \ 7.10).\n\n## 11.3 Controlling the Brightness of an LED\n\n### Problem\n\nYou\
    \ want to vary the brightness of an LED from a Python program.\n\n### Solution\n\
    \nThe gpiozero library has a pulse-width modulation (PWM) feature that enables\
    \ you to control the power to an LED and its brightness. To try it out, connect\
    \ an LED as described in [Recipe 11.1](Recipe 11.1) and run this test program\
    \ (*ch_11_led_brightness.py*):\n\n```\nfrom gpiozero import PWMLED\n\nled = PWMLED(18)\n\
    \nwhile True:\n    brightness_s = input(\"Enter Brightness (0.0 to 1.0):\")\n\
    \    brightness = float(brightness_s)\n    led.value = brightness\n```\n\nThe\
    \ program is included in the code download (see [Recipe 3.22](Recipe 3.22)).\n\
    \nRun the Python program, and you will be able to change the brightness by entering\
    \ a number between 0.0 (off) and 1.0 (full brightness):\n\n```\n$ python ch_11_led_brightness.py\n\
    Enter Brightness (0.0 to 1.0):0.5\nEnter Brightness (0.0 to 1.0):1\nEnter Brightness\
    \ (0.0 to 1.0):0\n```\n\nExit the program by pressing Ctrl-C. Ctrl-C is command\
    \ line for *stop what you are doing*; in many situations, it will stop a program\
    \ entirely.\n\nNote that when controlling an LED's brightness like this, you must\
    \ define the LED as being PWMLED and not just LED.\n\n### Discussion\n\nPWM is\
    \ a clever technique by which you vary the length of pulses while keeping the\
    \ overall number of pulses per second (the frequency in Hz) constant. Figure 11-2\
    \ illustrates the basic principle of PWM.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_317_0.png)\n\
    \nIf the pulses are only high for a short amount of time, the LED will appear\
    \ dim, whereas if the pulse is high a much higher proportion of the time, the\
    \ LED will appear brighter.\n\nBy default, the PWM frequency is 100Hz; that is,\
    \ the LED flashes 100 times per second. You can change this where you define PWMLED\
    \ by supplying the optional frequency parameter:\n\n```\nled = PWMLED(18, frequency=1000)\n\
    ```\n\nThe value is in Hz, so in this case, the frequency is set to 1,000 Hz (1\
    \ kHz).\n\nTable 11-2 compares frequencies specified in the parameter to the actual\
    \ frequencies on the pin measured with an oscilloscope.\n\nTable 11-2. Requested\
    \ frequency against measured frequency\n\n| Requested frequency | Measured frequency\
    \ |\n|---|---|\n| 50 Hz | 50 Hz |\n| 100 Hz | 98.7 Hz |\n| 200 Hz | 195 Hz |\n\
    | 500 Hz | 470 Hz |\n| 1 kHz | 880 Hz |\n| 10 kHz | 4.2 kHz |\n\nYou can see that\
    \ the frequency becomes less accurate as it increases. This means that this PWM\
    \ feature is no good for audio (20 Hz to 20 kHz), but plenty fast enough for controlling\
    \ the brightness of LEDs or the speed of motors. If you want to experiment with\
    \ this yourself, the program is in the code download and called ch_11_pwm_f_test.py.\n\
    \n### See Also\n\nFor more information on PWM, see Wikipedia.\n\nRecipe 11.11\
    \ uses PWM to change the color of an RGB LED, and Recipe 12.4 uses PWM to control\
    \ the speed of a DC motor.\n\nFor more information on using a breadboard and jumper\
    \ wires with the Raspberry Pi, see Recipe 10.9. You can also control the brightness\
    \ of the LED with a slider control—see Recipe 11.10."
  mdcn: "## 11.1 将LED连接到树莓派\n\n图11-1展示了如何使用无焊面包板和公对母跳线来连接这个LED。LED有正负极引脚。正极引脚较长，在图11-1中，它将与电阻位于同一行。\n\
    图中所示的电阻是470Ω电阻，它将使LED发出明亮的光，同时不会消耗过多电流而损坏树莓派。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_313_0.png)\n\
    \n图11-1. 将LED连接到树莓派\n\n连接好LED后，我们需要能够使用Python命令来控制它的开关。\n从终端启动Python控制台，并输入以下命令：\n\
    \n```\n$ sudo python3\n>>> from gpiozero import LED\n>>> led = LED(18)\n>>> led.on()\n\
    >>> led.off()\n>>>\n```\n\n这将在执行`led.on()`命令后点亮你的LED，并在执行`led.off()`命令后再次熄灭。\n\
    \n### 讨论\n\nLED是一种非常有用、廉价且高效的发光方式，但使用时必须小心。如果将它们直接连接到电压源（例如GPIO输出），且电压高于约1.7伏，它们会消耗非常大的电流。这通常足以烧毁LED或提供电流的设备——如果电流由树莓派提供，这可不是好事。\n\
    你应该始终为LED使用限流电阻。串联电阻放置在*LED和电压源之间*，它将流过LED的电流限制在对LED和驱动它的GPIO引脚都安全的水平。\n\n树莓派GPIO引脚保证只能提供约3mA或16mA的电流（取决于板子型号和使用的引脚数量）——参见配方10.3。LED通常在电流大于1mA时就会发光，但电流越大，亮度越高。使用表11-1作为根据LED类型选择串联电阻的指南；该表还指出了从GPIO引脚消耗的大致电流。\n\
    \n表11-1. 为LED和3.3V GPIO引脚选择串联电阻\n\n| LED类型 | 电阻 | 电流 (mA) |\n| :--- | :--- | :---\
    \ |\n| 红色 | 470Ω | 3.5 |\n| 红色 | 1kΩ | 1.5 |\n| 橙色、黄色、绿色 | 470Ω | 2 |\n| 橙色、黄色、绿色\
    \ | 1kΩ | 1 |\n| 蓝色、白色 | 100Ω | 3 |\n| 蓝色、白色 | 270Ω | 1 |\n\n如你所见，在所有情况下，使用470Ω电阻都是安全的。如果你使用的是蓝色或白色LED，可以显著降低串联电阻的值，而不会损坏树莓派。\n\
    \n如果你想将在Python控制台中进行的实验扩展成一个让LED反复闪烁的程序，可以将你在`ch_11_led_blink.py`中找到的代码粘贴到编辑器中（与本书所有程序示例一样，你可以下载此程序[参见配方3.22]）：\n\
    \n```\nfrom gpiozero import LED\nfrom time import sleep\n\nled = LED(18)\n\nwhile\
    \ True:\n    led.on()\n    sleep(0.5)\n    led.off()\n    sleep(0.5)\n```\n\n\
    要运行该命令，请输入以下内容：\n\n```\n$ python3 ch_11_led_blink.py\n```\n\n在LED点亮和熄灭之间0.5秒的休眠时间使得LED每秒闪烁一次。\n\
    \nLED类还有一个内置的闪烁方法，如下例所示：\n\n```\nfrom gpiozero import LED\nled = LED(18)\nled.blink(0.5,\
    \ 0.5, background=False)\n```\n\n`blink`的前两个参数分别是点亮时间和熄灭时间。可选的`background`参数很有趣，因为如果你将其设置为True，你的程序将能够在LED闪烁的同时在后台继续运行其他命令。\n\
    \n当你准备好停止后台闪烁的LED时，只需使用`led.off()`。这种技术可以大大简化你的程序。`ch_11_led_blink_2.py`中的示例展示了这一点：\n\
    \n```\nfrom gpiozero import LED\n\nled = LED(18)\nled.blink(0.5, 0.5, background=True)\n\
    print(\"Notice that control has moved away - hit Enter to continue\")\ninput()\n\
    print(\"Control is now back\")\nled.off()\ninput()\n```\n\n当程序启动时，LED将在后台开始闪烁，程序可以自由地继续执行下一条命令并打印“Notice\
    \ that control has moved away - hit Enter to continue”。`input()`命令将使程序暂停并等待输入（你只需按回车键）。但请注意，在你按回车键之前，即使程序已经继续执行并等待输入，LED仍在闪烁。\n\
    \n当你再次按下回车键时，`led.off()`命令将停止LED的后台闪烁。\n\n### 另请参阅\n\n查看这个串联电阻计算器。\n\n有关在树莓派上使用面包板和跳线的更多信息，请参见配方10.9。\n\
    \n参阅gpiozero关于LED的文档。\n\n## 11.2 使GPIO引脚保持安全状态\n\n### 问题\n\n你希望在程序退出时，将所有GPIO引脚设置为输入状态，以减少GPIO排针意外短路的可能性，从而避免损坏树莓派。\n\
    \n### 解决方案\n\n每当退出使用gpiozero的程序时，它会自动将所有GPIO引脚设置为安全的*输入*状态。\n\n### 讨论\n\n早期的GPIO引脚访问方法，如RPi.GPIO库，不会自动将GPIO引脚设置为安全的输入状态。相反，它们要求你在退出程序前调用清理函数。\n\
    \n如果没有调用清理函数或树莓派没有重启，设置为输出的引脚在程序结束后将保持为输出状态。如果你开始连接一个新项目，没有意识到这个问题，你的新电路可能会意外地将GPIO输出短接到某个电源电压或另一个处于相反状态的GPIO引脚。一个典型的情况是，如果你连接一个按钮开关，将一个配置为输出且为高电平的GPIO引脚连接到GND（地）。\n\
    \n幸运的是，gpiozero库现在会处理这个问题。\n\n### 另请参阅\n\n有关Python中异常处理的更多信息，请参见[配方7.10](Recipe\
    \ 7.10)。\n\n## 11.3 控制LED的亮度\n\n### 问题\n\n你想通过Python程序改变LED的亮度。\n\n### 解决方案\n\n\
    gpiozero库具有脉宽调制（PWM）功能，使你能够控制LED的功率和亮度。要尝试它，请按照[配方11.1](Recipe 11.1)中的描述连接一个LED，并运行这个测试程序（*ch_11_led_brightness.py*）：\n\
    \n```\nfrom gpiozero import PWMLED\n\nled = PWMLED(18)\n\nwhile True:\n    brightness_s\
    \ = input(\"Enter Brightness (0.0 to 1.0):\")\n    brightness = float(brightness_s)\n\
    \    led.value = brightness\n```\n\n该程序包含在代码下载中（参见[配方3.22](Recipe 3.22)）。\n\n\
    运行Python程序，你将能够通过输入0.0（关闭）到1.0（全亮）之间的数字来改变亮度：\n\n```\n$ python ch_11_led_brightness.py\n\
    Enter Brightness (0.0 to 1.0):0.5\nEnter Brightness (0.0 to 1.0):1\nEnter Brightness\
    \ (0.0 to 1.0):0\n```\n\n按Ctrl-C退出程序。Ctrl-C是命令行中*停止你正在做的事情*的命令；在许多情况下，它会完全停止一个程序。\n\
    \n请注意，像这样控制LED亮度时，必须将LED定义为`PWMLED`，而不仅仅是`LED`。\n\n### 讨论\n\nPWM是一种巧妙的技术，通过改变脉冲的长度，同时保持每秒脉冲总数（以Hz为单位的频率）恒定。图11-2说明了PWM的基本原理。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_317_0.png)\n\n如果脉冲只在很短的时间内为高电平，LED看起来会很暗；而如果脉冲在大部分时间内为高电平，LED看起来会更亮。\n\
    \n默认情况下，PWM频率为100Hz；即LED每秒闪烁100次。你可以在定义`PWMLED`时通过提供可选的`frequency`参数来更改此值：\n\n\
    ```\nled = PWMLED(18, frequency=1000)\n```\n\n该值以Hz为单位，因此在本例中，频率被设置为1,000 Hz（1\
    \ kHz）。\n\n表11-2比较了参数中指定的频率与用示波器测量的引脚实际频率。\n\n表11-2. 请求频率与测量频率对比\n\n| 请求频率 | 测量频率\
    \ |\n|---|---|\n| 50 Hz | 50 Hz |\n| 100 Hz | 98.7 Hz |\n| 200 Hz | 195 Hz |\n\
    | 500 Hz | 470 Hz |\n| 1 kHz | 880 Hz |\n| 10 kHz | 4.2 kHz |\n\n你可以看到，随着频率增加，其准确性会降低。这意味着此PWM功能不适用于音频（20\
    \ Hz到20 kHz），但对于控制LED亮度或电机速度来说，速度已经足够快了。如果你想自己尝试，程序在代码下载中，名为`ch_11_pwm_f_test.py`。\n\
    \n### 另请参阅\n\n有关PWM的更多信息，请参见维基百科。\n\n配方11.11使用PWM来改变RGB LED的颜色，配方12.4使用PWM来控制直流电机的速度。\n\
    \n有关在树莓派上使用面包板和跳线的更多信息，请参见配方10.9。你也可以使用滑块控件来控制LED的亮度——参见配方11.10。"
