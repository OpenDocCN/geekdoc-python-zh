    \ 使用键盘\n\n### 问题\n\n你想将键盘与你的树莓派连接。\n\n### 解决方案\n\n键盘按行和列排列，每行或每列的交点处有一个按钮开关。要找出哪个键被按下，你首先将所有行和列连接到树莓派GPIO引脚。因此，对于一个4×3键盘，你需要四个引脚用于行，三个引脚用于列（总共七个）。通过依次扫描每一列（将其设置为输出高电平）并读取每个行输入的值，你可以确定哪个（如果有）键被按下。你还可以判断是否有多个键同时被按下；因为对于特定列，如果有多个键被按下，相应的行都将为高电平。\n\
    \n请注意，键盘的引脚排列差异很大。\n\n要制作此配方，你需要以下物品：\n\n- 面包板和跳线（见第564页“原型设备和套件”）\n- 4×3键盘（见第567页“杂项”）\n\
    - 七个公头引脚（见第567页“杂项”）\n\n图13-12显示了使用第567页“杂项”中列出的SparkFun键盘的项目接线图。键盘在没有排针的情况下提供，你必须将排针焊接到键盘上。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_381_0.png)\n\n图13-12. 键盘接线图\n\n打开编辑器并粘贴以下代码（ch_13_keypad.py）。\n\
    \n> 在运行程序之前，请确保行和列引脚对于你使用的键盘是正确的。如有必要，更改变量`rows`和`cols`中的值。如果你不这样做，按下某个键可能会将一个GPIO输出短接到另一个输出，其中一个为高电平，另一个为低电平。这可能会损坏你的树莓派。\n\
    \n```python\nfrom gpiozero import Button, DigitalOutputDevice\nimport time\n\n\
    rows = [Button(17), Button(25), Button(24), Button(23)]\ncols = [DigitalOutputDevice(27),\
    \ DigitalOutputDevice(18),\n        DigitalOutputDevice(22)]\nkeys = [\n    ['1',\
    \ '2', '3'],\n    ['4', '5', '6'],\n    ['7', '8', '9'],\n    ['*', '0', '#']]\n\
    \ndef get_key():\n    key = 0\n    for col_num, col_pin in enumerate(cols):\n\
    \        col_pin.off()\n        for row_num, row_pin in enumerate(rows):\n   \
    \         if row_pin.is_pressed:\n                key = keys[row_num][col_num]\n\
    \        col_pin.on()\n    return key\n\nwhile True:\n    key = get_key()\n  \
    \  if key :\n        print(key)\n    time.sleep(0.3)\n```\n\n当你运行程序时，你可以看到每次按键都被打印出来：\n\
    \n```\n$ sudo python3 ch_13_keypad.py\n1\n2\n3\n4\n5\n6\n7\n8\n9\n*\n0\n#\n```\n\
    \n与本书中的所有程序示例一样，你也可以下载此程序（见配方3.22）。\n\n每个行和列的交点处都有一个按钮开关，因此当开关被按下时，特定的行和列将连接起来。\n\
    \n这里定义的行和列对于附录A中第567页“杂项”中列出的SparkFun键盘是正确的。第一行连接到GPIO引脚17，第二行连接到引脚25，依此类推。行和列到键盘连接器的接线如图13-13所示。"
