  mdcn: '## 讨论


    Pico 由于其内置的降压/升压电压调节器，使用电池供电非常方便。该调节器接受输入电压至 Vsys 引脚（在 MonkMakes Pico 面包板上标记为
    Vs），输入电压范围可从 1.8V 到 5.5V，并将其转换为 RP2040 所需的 3.3V。


    树莓派 4 可能需要数安培的电流，这使其不太适合低功耗电池应用。相比之下，Pico 仅使用约 25mA 的电流。一节 AA 电池通常至少能容纳 2000mAh
    的电量，这意味着一对 AA 电池可以持续供电 80 小时或更长时间。


    一些兼容 Pico 的开发板，例如 Adafruit 的 Feather RP2040 和 Pimoroni 的 PicoLiPo，允许连接 3.7V 可充电锂聚合物电池。当开发板连接到
    USB 时，电池会充电，然后在你拔掉 USB 后为 Pico 供电。


    ## 另请参阅


    了解更多关于 [Feather RP2040](https://www.adafruit.com/product/5423) 和 [PicoLiPo](https://shop.pimoroni.com/products/pico-lipo)
    的信息。


