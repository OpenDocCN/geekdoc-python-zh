    # Discussion


    Notice that pop returns the value removed from the list.


    To remove an item in a position other than the last element, use pop with a parameter
    indicating the position from which the item should be removed:


    ```

    >>> a = [34, ''Fred'', 12, False, 72.3]

    >>> a.pop(0)

    34

    ```


    If you use an index position that is beyond the end of the list, you will get
    an “Index out of range” error.


    If you want to remove something from a list by its value rather than its position
    in the list, you can use remove, as the following example illustrates:


    ```

    >>> a = [34, ''Fred'', 12, False, 72.3]

    >>> a.remove(12)

    a

    [34, ''Fred'', False, 72.3]

    >>>

    ```


    # 6.6 Creating a List by Parsing a String


    # Problem


    You need to convert a string of words separated by some character into an array
    of strings, with each string in the array being one of the words.


    # Solution


    Use the split Python string function.


    The command split with no parameters separates out the words of a string into
    individual elements of an array:


    ```

    >>> "abc def ghi".split()

    [''abc'', ''def'', ''ghi'']

    ```


    If you supply split with a parameter, it will split the string using the parameter
    as a separator.


    For example:


    ```

    >>> "abc--de--ghi".split(''--'')

    [''abc'', ''de'', ''ghi'']

    ```'
- md: "## Discussion\n\nThis command can be very useful when you are, for example,\
    \ importing data from a file. The split command can optionally take an argument\
    \ that is the string to use as a delimiter when you are splitting the string.\
    \ So if you were to use commas as a separator, you could split the string as follows:\n\
    \n```\n>>> \"abc,def,ghi\".split(',')\n['abc', 'def', 'ghi']\n```\n\nIf you want\
    \ to go the other way and convert your list of strings into a single string, you\
    \ can use the join command as shown:\n\n```\n>>> a = ['abc', 'def', 'ghi']\n>>>\
    \ \"\".join(a)\n'abcdefghi'\n```\n\n## See Also\n\nAnother and more powerful way\
    \ to manipulate strings is described in Recipe 7.23.\n\n## 6.7 Iterating Over\
    \ a List\n\n### Problem\n\nYou need to apply some lines of code to each item of\
    \ a list in turn.\n\n### Solution\n\nUse the for Python command:\n\n```\n>>> a\
    \ = [34, 'Fred', 12, False, 72.3]\n>>> for x in a:\n...     print(x)\n...\n34\n\
    Fred\n12\nFalse\n72.3\n>>>\n```\n\n### Discussion\n\nThe for keyword is immediately\
    \ followed by a variable name (in this case, x). This is called the loop variable;\
    \ it will be set to each element of the list specified after in. The indented\
    \ lines that follow will be executed one time for each element in the list. Each\
    \ time through the loop, x will be given the value of the element in the list\
    \ at that position. You can then use x to print out the value, as shown in the\
    \ example.\n\n### See Also\n\nComprehensions are another way to manipulate lists\
    \ (see Recipe 6.12).\n\n## 6.8 Enumerating a List\n\n### Problem\n\nYou need to\
    \ run some lines of code for each item in a list in turn, but you also need to\
    \ know the index position of each item.\n\n### Solution\n\nUse the for Python\
    \ language along with the enumerate command:\n\n```\n>>> a = [34, 'Fred', 12,\
    \ False, 72.3]\n>>> for (i, x) in enumerate(a):\n...     print(i, x)\n...\n(0,\
    \ 34)\n(1, 'Fred')\n(2, 12)\n(3, False)\n(4, 72.3)\n>>>\n```\n\n### Discussion\n\
    \nIt's quite common to need to know the position of something in a list while\
    \ enumerating each of the values. An alternative method is to simply count with\
    \ an index variable and then access the value using the [] syntax:\n\n```\n>>>\
    \ a = [34, 'Fred', 12, False, 72.3]\n>>> for i in range(len(a)):\n...     print(i,\
    \ a[i])\n...\n(0, 34)\n(1, 'Fred')\n(2, 12)\n(3, False)\n(4, 72.3)\n>>>\n```\n\
    \n### See Also\n\nComprehensions are another way to manipulate lists (see Recipe\
    \ 6.12).\n\nSee Recipe 6.7 to iterate over a list without needing to know each\
    \ item’s index position.\n\n## 6.9 Testing if Something Is in a List\n\n### Problem\n\
    \nYou want to know if a list contains a certain element.\n\n### Solution\n\nUse\
    \ the `in` keyword as the following example illustrates:\n\n```\n>>> x = [12,\
    \ 66, 32, 6, 99]\n>>> 66 in x\nTrue\n>>> 77 in x\nFalse\n>>>\n```\n\n### Discussion\n\
    \nAlthough you could iterate over the list looking for the element, using the\
    \ `in` command will make your code simpler and easier to read.\n\nThe `in` command\
    \ also works on strings.\n\n### See Also\n\nFor iterating over the elements of\
    \ a list, see Recipe 6.7.\n\n## 6.10 Sorting a List\n\n### Problem\n\nYou need\
    \ to sort the elements of a list.\n\n### Solution\n\nUse the `sort` Python command:\n\
    \n```\n>>> a = [\"it\", \"was\", \"the\", \"best\", \"of\", \"times\"]\n>>> a.sort()\n\
    >>> a\n['best', 'it', 'of', 'the', 'times', 'was']\n```\n\nThe sort command uses\
    \ the standard Python comparison operators. This means that for strings, list\
    \ elements will be sorted alphabetically in ascending order.\n\n### Discussion\n\
    \nWhen you sort a list, you're actually modifying it rather than returning a sorted\
    \ copy of the original list. This means that if you also need the original list,\
    \ you need to use the copy command in the standard library to make a copy of the\
    \ original list before sorting it:\n\n```\n>>> from copy import copy\n>>> a =\
    \ [\"it\", \"was\", \"the\", \"best\", \"of\", \"times\"]\n>>> b = copy(a)\n>>>\
    \ b.sort()\n>>> a\n['it', 'was', 'the', 'best', 'of', 'times']\n>>> b\n['best',\
    \ 'it', 'of', 'the', 'times', 'was']\n>>>\n```\n\nThe copy module is required\
    \ to be able to copy objects. You can find out more about modules in Recipe 7.11.\n\
    \n## 6.11 Cutting Up a List\n\n### Problem\n\nYou need to make a sublist of a\
    \ list, using a range of the original list's elements.\n\n### Solution\n\nUse\
    \ the [:] Python construction. The following example returns a list containing\
    \ the elements of the original list from index position 1 to index position 2\
    \ (the number after the : is exclusive—that is, elements up to but not including\
    \ element 2):\n\n```\n>>> l = [\"a\", \"b\", \"c\", \"d\"]\n>>> l[1:3]\n['b',\
    \ 'c']\n```\n\nNote that the character positions start at 0 (not at 1), so a position\
    \ of 1 means the second character in the string, and 3 means the fourth; however,\
    \ the character range is exclusive at the high end, so the letter d is not included\
    \ in this example.\n\n### Discussion\n\nThe [:] notation is quite powerful. You\
    \ can omit either argument, in which case the start or end of the list is assumed,\
    \ as appropriate.\n\nFor example:\n\n```\n>>> l = [\"a\", \"b\", \"c\", \"d\"\
    ]\n>>> l[:3]\n['a', 'b', 'c']\n>>> l[3:]\n['d']\n>>>\n```\n\nYou can also use\
    \ negative indices to count back from the end of the list. The following example\
    \ returns the last two elements in the list:\n\n```\n>>> l[-2:]\n['c', 'd']\n\
    ```\n\nIncidentally, l[:-2] returns ['a', 'b'] in the preceding example.\n\n###\
    \ See Also\n\nSee Recipe 5.17, in which the same syntax is used for strings.\n\
    \n## 6.12 Using Comprehensions\n\n### Problem\n\nYou want a neater way of building\
    \ one list from another, while filtering or transforming the original list.\n\n\
    ### Solution\n\nUse a *comprehension*.\n\nComprehensions don't do anything that\
    \ you can't do with a regular loop, but they do simplify activities involving\
    \ lists and, when well used, make your code more readable.\n\nA comprehension\
    \ will take an existing list and create a new list from the elements of the original\
    \ list, either filtering the list so that only qualifying elements are included\
    \ in the new list, or creating a new list containing the same number of elements\
    \ of the original list but with each element manipulated in some way.\n\nAs a\
    \ reminder, without using a comprehension, the following code will take a list\
    \ and filter it into a new list that just contains the elements that begin with\
    \ the letter *a*:\n\n```\nnew_list = []\npeople = ['agnes', 'andrew', 'jane',\
    \ 'peter']\nfor person in people:\n    if person[0] == 'a':\n        new_list.append(person)\n\
    print(new_list)\n```\n\nWhen you run this program (ch_06_filter.py) you will see\
    \ that new_list just contains the names starting with a:\n\n```\n$ python3 ch_06_filter.py\n\
    ['agnes', 'andrew']\n```\n\nWe can shorten this example considerably by using\
    \ a comprehension (ch_06_filter_comp.py):\n\n```\npeople = ['agnes', 'andrew','jane','peter']\n\
    new_list = [person for person in people if person[0] == 'a']\nprint(new_list)\n\
    ```\n\nThis will produce exactly the same output as ch_06_filter.py, using fewer\
    \ lines of code. The comprehension is contained in square brackets, and the first\
    \ word in the comprehension is person. This indicates that person (yet to be specified)\
    \ is what will be added to the list copy. We then have for person in people, which\
    \ is the normal way of iterating over a list, with the list being called people\
    \ and each element in the list being called person. The final part of the comprehension\
    \ is the condition if person[0] == 'a'. This is the part that rejects all the\
    \ elements of the list that don't start with a.\n\nThe condition of a comprehension\
    \ is optional and you may just want to use the comprehension to modify each element\
    \ of the list. The example of ch_06_change_comp.py capitalizes the names and returns\
    \ a new list, with the initial letter of each name in uppercase:\n\n```\npeople\
    \ = ['agnes', 'andrew','jane','peter']\nnew_list = [person.capitalize() for person\
    \ in people]\nprint(new_list)\n```\n\n```\n$ python3 ch_06_change_comp.py\n['Agnes',\
    \ 'Andrew', 'Jane', 'Peter']\n```\n\n### Discussion\n\nComprehensions are a really\
    \ powerful and useful technique for manipulating lists. At first the syntax might\
    \ look a little strange for being enclosed in square brackets. But it is a great\
    \ way of keeping your code concise without making it any harder to understand\
    \ how it works.\n\n### See Also\n\nFor iterating over a list without using a comprehension,\
    \ see Recipe 6.7."
  mdcn: "## 讨论\n\n例如，当你从文件导入数据时，这个命令会非常有用。`split` 命令可以选择性地接受一个参数，该参数是分割字符串时用作分隔符的字符串。因此，如果你想使用逗号作为分隔符，可以按如下方式分割字符串：\n\
    \n```\n>>> \"abc,def,ghi\".split(',')\n['abc', 'def', 'ghi']\n```\n\n如果你想反向操作，将字符串列表转换为单个字符串，可以使用\
    \ `join` 命令，如下所示：\n\n```\n>>> a = ['abc', 'def', 'ghi']\n>>> \"\".join(a)\n'abcdefghi'\n\
    ```\n\n## 另请参阅\n\n另一种更强大的字符串处理方法在配方 7.23 中描述。\n\n## 6.7 遍历列表\n\n### 问题\n\n你需要依次对列表中的每个项目应用一些代码行。\n\
    \n### 解决方案\n\n使用 Python 的 `for` 命令：\n\n```\n>>> a = [34, 'Fred', 12, False, 72.3]\n\
    >>> for x in a:\n...     print(x)\n...\n34\nFred\n12\nFalse\n72.3\n>>>\n```\n\n\
    ### 讨论\n\n`for` 关键字后面紧跟一个变量名（本例中为 `x`）。这被称为循环变量；它将被设置为 `in` 后指定的列表的每个元素。随后的缩进行将为列表中的每个元素执行一次。每次循环时，`x`\
    \ 将被赋予列表中该位置元素的值。然后你可以使用 `x` 来打印该值，如示例所示。\n\n### 另请参阅\n\n推导式是处理列表的另一种方式（参见配方 6.12）。\n\
    \n## 6.8 枚举列表\n\n### 问题\n\n你需要依次对列表中的每个项目运行一些代码行，但你也需要知道每个项目的索引位置。\n\n### 解决方案\n\
    \n使用 Python 的 `for` 语言以及 `enumerate` 命令：\n\n```\n>>> a = [34, 'Fred', 12, False,\
    \ 72.3]\n>>> for (i, x) in enumerate(a):\n...     print(i, x)\n...\n(0, 34)\n\
    (1, 'Fred')\n(2, 12)\n(3, False)\n(4, 72.3)\n>>>\n```\n\n### 讨论\n\n在枚举每个值的同时，需要知道列表中某项的位置是很常见的。另一种方法是简单地使用一个索引变量进行计数，然后使用\
    \ `[]` 语法访问值：\n\n```\n>>> a = [34, 'Fred', 12, False, 72.3]\n>>> for i in range(len(a)):\n\
    ...     print(i, a[i])\n...\n(0, 34)\n(1, 'Fred')\n(2, 12)\n(3, False)\n(4, 72.3)\n\
    >>>\n```\n\n### 另请参阅\n\n推导式是处理列表的另一种方式（参见配方 6.12）。\n\n参见配方 6.7，了解如何在不需要知道每个项目索引位置的情况下遍历列表。\n\
    \n## 6.9 测试某物是否在列表中\n\n### 问题\n\n你想知道一个列表是否包含某个元素。\n\n### 解决方案\n\n使用 `in` 关键字，如下例所示：\n\
    \n```\n>>> x = [12, 66, 32, 6, 99]\n>>> 66 in x\nTrue\n>>> 77 in x\nFalse\n>>>\n\
    ```\n\n### 讨论\n\n虽然你可以遍历列表来查找该元素，但使用 `in` 命令会使你的代码更简单、更易读。\n\n`in` 命令也适用于字符串。\n\
    \n### 另请参阅\n\n关于遍历列表的元素，请参见配方 6.7。\n\n## 6.10 对列表排序\n\n### 问题\n\n你需要对列表的元素进行排序。\n\
    \n### 解决方案\n\n使用 Python 的 `sort` 命令：\n\n```\n>>> a = [\"it\", \"was\", \"the\"\
    , \"best\", \"of\", \"times\"]\n>>> a.sort()\n>>> a\n['best', 'it', 'of', 'the',\
    \ 'times', 'was']\n```\n\n`sort` 命令使用标准的 Python 比较运算符。这意味着对于字符串，列表元素将按字母顺序升序排序。\n\
    \n### 讨论\n\n当你对列表排序时，你实际上是在修改它，而不是返回原始列表的排序副本。这意味着如果你还需要原始列表，你需要在排序前使用标准库中的 `copy`\
    \ 命令来制作原始列表的副本：\n\n```\n>>> from copy import copy\n>>> a = [\"it\", \"was\", \"\
    the\", \"best\", \"of\", \"times\"]\n>>> b = copy(a)\n>>> b.sort()\n>>> a\n['it',\
    \ 'was', 'the', 'best', 'of', 'times']\n>>> b\n['best', 'it', 'of', 'the', 'times',\
    \ 'was']\n>>>\n```\n\n`copy` 模块是复制对象所必需的。你可以在配方 7.11 中了解更多关于模块的信息。\n\n## 6.11\
    \ 切割列表\n\n### 问题\n\n你需要使用原始列表元素的一个范围来制作一个子列表。\n\n### 解决方案\n\n使用 `[:]` Python 构造。以下示例返回一个列表，其中包含原始列表中从索引位置\
    \ 1 到索引位置 2 的元素（`:` 后的数字是排他的——即，包含到但不包括元素 2）：\n\n```\n>>> l = [\"a\", \"b\", \"\
    c\", \"d\"]\n>>> l[1:3]\n['b', 'c']\n```\n\n请注意，字符位置从 0 开始（而不是从 1 开始），因此位置 1 表示字符串中的第二个字符，3\
    \ 表示第四个；但是，字符范围在高端是排他的，因此在此示例中不包含字母 d。\n\n### 讨论\n\n`[:]` 表示法非常强大。你可以省略任一参数，此时将根据情况假定列表的开头或结尾。\n\
    \n例如：\n\n```\n>>> l = [\"a\", \"b\", \"c\", \"d\"]\n>>> l[:3]\n['a', 'b', 'c']\n\
    >>> l[3:]\n['d']\n>>>\n```\n\n你也可以使用负索引从列表末尾开始计数。以下示例返回列表中的最后两个元素：\n\n```\n>>>\
    \ l[-2:]\n['c', 'd']\n```\n\n顺便说一下，在前面的示例中，`l[:-2]` 返回 `['a', 'b']`。\n\n### 另请参阅\n\
    \n参见配方 5.17，其中相同的语法用于字符串。\n\n## 6.12 使用推导式\n\n### 问题\n\n你想要一种更简洁的方式来从另一个列表构建一个列表，同时过滤或转换原始列表。\n\
    \n### 解决方案\n\n使用 *推导式*。\n\n推导式并不能做任何你用常规循环做不到的事情，但它们确实简化了涉及列表的活动，并且在使用得当时，使你的代码更具可读性。\n\
    \n推导式将接受一个现有列表，并从原始列表的元素创建一个新列表，要么过滤列表，使只有符合条件的元素包含在新列表中，要么创建一个包含与原始列表相同数量元素的新列表，但每个元素都以某种方式被操作。\n\
    \n提醒一下，如果不使用推导式，以下代码将获取一个列表并将其过滤到一个新列表中，该新列表仅包含以字母 *a* 开头的元素：\n\n```\nnew_list\
    \ = []\npeople = ['agnes', 'andrew', 'jane', 'peter']\nfor person in people:\n\
    \    if person[0] == 'a':\n        new_list.append(person)\nprint(new_list)\n\
    ```\n\n当你运行此程序（`ch_06_filter.py`）时，你会看到 `new_list` 只包含以 a 开头的名称：\n\n```\n$ python3\
    \ ch_06_filter.py\n['agnes', 'andrew']\n```\n\n我们可以通过使用推导式（`ch_06_filter_comp.py`）来大大缩短这个示例：\n\
    \n```\npeople = ['agnes', 'andrew','jane','peter']\nnew_list = [person for person\
    \ in people if person[0] == 'a']\nprint(new_list]\n```\n\n这将产生与 `ch_06_filter.py`\
    \ 完全相同的输出，但使用更少的代码行。推导式包含在方括号中，推导式中的第一个单词是 `person`。这表明 `person`（尚未指定）将被添加到列表副本中。然后我们有\
    \ `for person in people`，这是遍历列表的常规方式，列表名为 `people`，列表中的每个元素名为 `person`。推导式的最后一部分是条件\
    \ `if person[0] == 'a'`。这是拒绝所有不以 a 开头的列表元素的部分。\n\n推导式的条件是可选的，你可能只想使用推导式来修改列表的每个元素。`ch_06_change_comp.py`\
    \ 的示例将名称大写并返回一个新列表，其中每个名称的首字母大写：\n\n```\npeople = ['agnes', 'andrew','jane','peter']\n\
    new_list = [person.capitalize() for person in people]\nprint(new_list)\n```\n\n\
    ```\n$ python3 ch_06_change_comp.py\n['Agnes', 'Andrew', 'Jane', 'Peter']\n```\n\
    \n### 讨论\n\n推导式是处理列表的一种非常强大且有用的技术。起初，语法可能看起来有点奇怪，因为它被封闭在方括号中。但这是保持代码简洁而不增加理解其工作原理难度的好方法。\n\
    \n### 另请参阅\n\n关于不使用推导式遍历列表，请参见配方 6.7。"
