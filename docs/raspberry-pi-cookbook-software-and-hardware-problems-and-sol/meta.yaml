  md: '# # 7.11 Using Modules


    # ## Problem


    You want to use a Python module in your program.


    # ## Solution


    Use the `import` command:


    ```

    python

    import random

    ```


    # ## Discussion


    A large number of modules (sometimes called *libraries*) are available for Python.
    Many are included with Python as part of the standard library, and others can
    be downloaded and installed into Python. Standard Python libraries include modules
    for random numbers, database access, various internet protocols, object serialization,
    and many other functions.


    One consequence of having so many modules is the potential for conflict—for example,
    if two modules have a function of the same name. To avoid such conflicts, specify
    how much of the module is accessible when importing a module.


    So if you just use a command like this:


    ```

    python

    import random

    ```


    there is no possibility of a conflict because you will only be able to access
    functions or variables in the module by prefixing them with `random` (e.g., `random.randint`).
    Incidentally, you''ll be meeting the `random` package in the next recipe.


    If, on the other hand, you use the command in the following example, every function
    or variable in the module will be accessible without your having to add anything
    in front of it; unless you know what all the functions are in all the modules
    you are using, there is a much greater chance of conflict:


    ```

    python

    from random import *

    ```


    In between these two extremes, you can explicitly specify the components of a
    module that you need within a program so that they can be conveniently used without
    any prefix.


    For example:


    ```

    python

    >>> from random import randint

    >>> print(randint(1,6))

    2

    >>>

    ```'
