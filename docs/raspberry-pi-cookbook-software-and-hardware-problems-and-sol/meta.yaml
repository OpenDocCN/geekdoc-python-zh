    - Two 1kΩ resistors (see “Resistors and Capacitors” on page 565)

    - 330 nF capacitor (see “Resistors and Capacitors” on page 565)


    All of these parts are included in the Project Box 1 kit for Raspberry Pi from
    MonkMakes (see “Prototyping Equipment and Kits” on page 564).


    Figure 14-4 shows the arrangement of components on the breadboard. If you are
    using a phototransistor rather than a photoresistor, then the longer lead is the
    negative lead and should go to row 4 of the breadboard.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_401_0.png)


    Using the same program as Recipe 14.1 (ch_14_resistance_meter.py), you will see
    the output vary as you move your hand over the photoresistor/phototransistor to
    cut out some of the light.


    Note that this program needs the PiAnalog library to be installed (see Recipe
    14.1).


    This solution provides relatively reliable readings of light levels. As an adaptation
    of the general solution for using resistive sensors (Recipe 14.1), it also copes
    with measuring a resistance of 0Ω without any risk of damaging the GPIO pins of
    the Raspberry Pi.'
  - '[PAGE 402]


    # Discussion


    A photoresistor is a resistor whose resistance varies depending on the amount
    of light coming through its transparent window. The brighter the light, the lower
    the resistance. Typically, the resistance varies from about 1kΩ in bright light
    up to perhaps 100kΩ in complete darkness.


    A phototransistor works in a similar way, conducting more as more light falls
    on it. But unlike the photoresistor, the phototransistor has a positive and negative
    and won''t work if connected the wrong way around.


    # See Also


    You could also use an ADC with the photoresistor or phototransistor (Recipe 14.7).


    # 14.3 Measuring Temperature with a Thermistor


    # Problem


    You want to measure temperature using a thermistor.


    # Solution


    A thermistor is a resistor whose resistance varies with temperature. Use the step
    response method (Recipe 14.1) to measure the resistance of the thermistor and
    then calculate the temperature.


    To make this recipe, you will need the following:


    +   - Breadboard and jumper wires (see “Prototyping Equipment and Kits” on page
    564)

    - 1k thermistor (see “Resistors and Capacitors” on page 565)

    - Two 1kΩ resistors (see “Resistors and Capacitors” on page 565)

    - 330 nF capacitor (see “Resistors and Capacitors” on page 565)


    All of these parts are included in the Project Box 1 kit for Raspberry Pi from
    MonkMakes (see “Prototyping Equipment and Kits” on page 564). When you get your
    thermistor, make sure that you know its values of Beta and R0 (resistance at 25°C)
    and that it is a negative temperature coefficient (NTC) device.


    Figure 14-5 shows the breadboard layout for this recipe.'
  - "[PAGE 403]\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_403_0.png)\n\nFigure 14-5.\
    \ Breadboard layout for using a thermistor\n\nNote that this program needs the\
    \ PiAnalog library to be installed (see Recipe 14.1).\n\nThe following code (ch_14_thermistor.py)\
    \ illustrates the use of the PiAnalog module:\n\n```\nfrom PiAnalog import *\n\
    import time\n\np = PiAnalog()\n\nwhile True:\n    print(p.read_temp_c())\n   \
    \ time.sleep(1)\n```\n\nAs with all the program examples in this book, you can\
    \ also download this program (see Recipe 3.22).\n\nWhen you run the program, you\
    \ will see a series of temperature measurements in degrees Celsius. To convert\
    \ to degrees Fahrenheit, change the code p.read_temp_c() to p.read_temp_f():\n\
    \n```\n$ python3 ch_14_thermistor.py\n18.735789861164392\n19.32060395712483\n\
    20.2694035007122\n21.03181169007422\n21.26640936199749\n```\n\n# Discussion\n\n\
    Calculating the temperature from the resistance of the thermistor requires some\
    \ fairly hairy math using logarithms called the Steinhart-Hart equation. This\
    \ equation needs to know two things about the thermistor: its resistance at 25°C\
    \ (called R0) and a constant for the thermistor called Beta, or sometimes just\
    \ B. If you use a"
  - '[PAGE 404]


    different thermistor, you will need to plug these values into the code when you
    call read_temp_c. For example:


    ```

    read_temp_c(self, B=3800.0, R0=1000.0)

    ```


    Note that a capacitor typically has an accuracy of only 10%, and thermistors are
    similarly inaccurate in their value of R0, so do not expect massively accurate
    results.


    # See Also


    To measure temperature using a TMP36, see Recipe 14.10.


    To measure temperature using a digital temperature sensor (DS18B20), see Recipe
    14.13.


    To measure temperature using a Sense HAT, see Recipe 14.12.


    # 14.4 Detecting Methane


    # Problem


    You want to measure gas levels using a methane sensor.


    # Solution


    Low-cost resistive gas sensors are available that can easily be wired to a Raspberry
    Pi to detect gases such as methane. You can use the step response method that
    you first used in Recipe 14.1.


    To make this recipe, you’ll need the following:


    +   - Breadboard and jumper wires (see “Prototyping Equipment and Kits” on page
    564)

    - Methane sensor (see “Modules” on page 566)

    - Two 1kΩ resistors (see “Resistors and Capacitors” on page 565)

    - 330 nF capacitor (see “Resistors and Capacitors” on page 565)


    The sensor contains a heating element that requires 5V at up to 150mA. The Raspberry
    Pi is capable of providing this as long as its power supply can provide the extra
    150mA.


    The sensor module has rather thick legs—too thick to fit into breadboard holes.
    One way around this is to solder short lengths of solid core wire to each lead
    (Figure 14-6). Another is to buy SparkFun’s gas sensor breakout board, which will
    allow you to plug the sensor in directly.'
- md: "## 14.4 Measuring Methane Gas\n\nWire the breadboard as shown in Figure 14-7\
    \ if you’re using the SparkFun breakout board, or as shown in Figure 14-8 if you\
    \ soldered longer leads to the gas sensor.\n\nNote that the direct connection\
    \ shown in Figure 14-8 uses the same symbol for the breakout board rather than\
    \ the sensor on its own, but if you look carefully, the connections are to the\
    \ six sensor pins, not the four pins of the breakout.\n\nYou can use the exact\
    \ same program as Recipe 14.1, and you can test the methane sensor by breathing\
    \ on it. You should see the readings from the sensor drop when you breathe on\
    \ it.\n\n### Discussion\n\nThe obvious use of a methane gas sensor is for novelty\
    \ *fart-detecting* projects. A more serious use would be for detecting leaks of\
    \ natural gas. You could, for instance, imagine a Raspberry Pi home-watch project\
    \ that monitored the home with various sensors. It could then send you an email\
    \ while you were on vacation informing you that your house was about to explode.\
    \ Or maybe not.\n\nThese types of sensors (Figure 14-9) use a heating element\
    \ that warms a resistive surface impregnated with a catalyst sensitive to a particular\
    \ gas. When the gas is present, the resistance of the catalyst layer changes.\n\
    \nBoth the heater and the sensing surface are electrically just resistors. So\
    \ both can be connected either way around.\n\nThis particular gas sensor is most\
    \ sensitive to methane, but it will also detect other gases to a lesser extent.\
    \ That is why breathing on the sensor alters the reading, as healthy individuals\
    \ will not normally breathe out methane. The cooling effect of blowing on the\
    \ element can also have an effect.\n\n### See Also\n\nYou can find the datasheet\
    \ for this sensor. This will give you all sorts of useful information about the\
    \ sensor's sensitivity to various gases.\n\nA range of these low-cost sensors\
    \ are available for sensing different gases. See a list of sensors offered by\
    \ SparkFun.\n\n## 14.5 Measuring Air Quality (CO₂)\n\n### Problem\n\nCarbon dioxide\
    \ (CO₂) concentration is an indicator of air quality. You want to use your Raspberry\
    \ Pi to measure this quality using a special sensor.\n\n### Solution\n\nUse a\
    \ low-cost (well, relatively low-cost) MH-Z14A CO₂ sensor module, shown connected\
    \ to a Raspberry Pi in Figure 14-10.\n\nTo make this recipe, you'll need the following:\n\
    \n- An MH-Z14A CO₂ sensor module (see “Modules” on page 566)\n- Female-to-female\
    \ jumper wires (see “Prototyping Equipment and Kits” on page 564)\n\nMake the\
    \ following connections between the Z14A sensor and your Raspberry Pi:\n\n- Pin\
    \ 16 of the MH-Z14A to GND on the Raspberry Pi\n- Pin 17 of the MH-Z14A to 5V\
    \ on the Raspberry Pi\n- Pin 18 of the MH-Z14A to GPIO 14 (TXD) on the Raspberry\
    \ Pi\n- Pin 19 of the MH-Z14A to GPIO 15 (RXD) on the Raspberry Pi\n\nThis sensor\
    \ uses the serial port. This means that for it to work, you must follow Recipe\
    \ 2.6. Note that even though you need to enable the serial port hardware, you\
    \ should *not* enable the serial console option.\n\nThe following test program\
    \ reads the level of CO₂ from the sensor and reports it once per second (ch_14_co2.py):\n\
    \n```python\nimport serial, time\n\nrequest_reading = bytes([0xFF, 0x01, 0x86,\
    \ 0x00, 0x00, 0x00,\n                        0x00, 0x00, 0x79])\n\ndef read_co2():\n\
    \    sensor.write(request_reading)\n    time.sleep(0.1)\n    raw_data = sensor.read(9)\n\
    \    high = raw_data[2]\n    low = raw_data[3]\n    return high * 256 + low;\n\
    \nsensor = serial.Serial('/dev/serial0')\nprint(sensor.name)\nif sensor.is_open:\n\
    \    print(\"Open\")\n\nwhile True:\n    print(\"CO2 (ppm):\" + str(read_co2()))\n\
    \    time.sleep(1)\n```\n\nAs with all the program examples in this book, you\
    \ can also download this program (see Recipe 3.22).\n\nWhen the program is run,\
    \ the CO₂ level should (unless you are in a small, unventilated room) be about\
    \ 400 ppm. If you breathe on the sensor for a few seconds, the readings will slowly\
    \ begin to rise and then fall back to a normal reading over the next few minutes:\n\
    \n```\n$ python3 ch_14_co2.py\n/dev/ttyS0\nOpen\nCO2 (ppm):489\nCO2 (ppm):483\n\
    CO2 (ppm):483\nCO2 (ppm):481\nCO2 (ppm):491\nCO2 (ppm):517\nCO2 (ppm):619\nCO2\
    \ (ppm):734\nCO2 (ppm):896\nCO2 (ppm):1367\n```\n\nThe sensor uses a request/response\
    \ communication protocol. So when you want to receive a reading from the sensor,\
    \ you first need to send the 9-byte message contained in request_reading. The\
    \ sensor will immediately respond with a 9-byte message. We are interested only\
    \ in bytes 2 and 3, which contain the high and low bytes of the CO₂ reading in\
    \ ppm.\n\n### Discussion\n\nNormal levels of CO₂ are around 400 to 1,000 ppm.\
    \ Above that, the air can begin to feel stale, and you might feel drowsy. Studies\
    \ have shown that high levels of CO₂ because of poor ventilation can result in\
    \ decreased mental performance. As a result of running the program overnight,\
    \ I now leave the window and/or door ajar in my bedroom.\n\n### See Also\n\nLearn\
    \ more about the [Z14A protocol](https://example.com).\n\nFind more information\
    \ about [safe levels of CO₂](https://example.com).\n\n## 14.6 Measuring Soil Moisture\n\
    \n### Problem\n\nYou want to measure the moisture of the soil around your plants.\n\
    \n### Solution\n\nUse a MonkMakes Plant Monitor board. Unlike most other soil\
    \ moisture boards, this board has a serial interface, and so you must first follow\
    \ [Recipe 2.6](https://example.com) to enable the serial interface. Connect up\
    \ the board as shown in [Figure 14-11](https://example.com).\n\nThe connections\
    \ are:\n\n- GND to GND\n- 3.3V on the Raspberry Pi to 3V on the Plant Monitor\n\
    - 14 TXD on the Raspberry Pi to RX_IN on the Plant Monitor\n- 15 RXD on the Raspberry\
    \ Pi to TX_OUT on the Plant Monitor\n\nThen download the Python software for the\
    \ board using the command:\n\n```\n$ git clone https://github.com/monkmakes/pmon.git\n\
    ```\n\nThis is another program that uses guizero, so if you have not already installed\
    \ guizero, do so, using the command:\n\n```\n$ pip3 install guizero\n```\n\nThen\
    \ change to the examples directory and run the example program, using the commands:\n\
    \n```\n$ cd pmon/raspberry_pi\n$ python3 01_meter.py\n```\n\nThis will open the\
    \ window shown in Figure 14-12.\n\n### Discussion\n\nMost soil moisture sensors\
    \ need analog inputs and so are not readily connected to a Raspberry Pi. The MonkMakes\
    \ Plant Monitor uses a serial interface, making it very suitable for connecting\
    \ to a Raspberry Pi. It reports the temperature and humidity at the plant and\
    \ has an RGB LED that indicates the soil moisture.\n\nThe code for the preceding\
    \ example program is:\n\n```python\nimport threading\nimport time\nfrom guizero\
    \ import App, Text\nfrom plant_monitor import PlantMonitor\n\npm = PlantMonitor()\n\
    \napp = App(title=\"Plant Monitor\", width=550, height=300, layout=\"grid\")\n\
    \ndef update_readings(): # update fields with new temp and eCO2 readings\n   \
    \ while True:\n        wetness_field.value = str(pm.get_wetness())\n        temp_c_field.value\
    \ = str(pm.get_temp())\n        humidity_field.value = str(pm.get_humidity())\n\
    \        time.sleep(2)\n\nt1 = threading.Thread(target=update_readings)\n\n# define\
    \ the user interface\nText(app, text=\"Wetness (%)\", grid=[0,0], size=20)\nwetness_field\
    \ = Text(app, text=\"-\", grid=[1,0], size=100)\nText(app, text=\"Temp (C)\",\
    \ grid=[0,1], size=20)\ntemp_c_field = Text(app, text=\"-\", grid=[1,1], size=50)\n\
    Text(app, text=\"Humidity (%)\", grid=[0,2], size=20)\nhumidity_field = Text(app,\
    \ text=\"-\", grid=[1,2], size=50)\nt1.start() # start the thread that updates\
    \ the readings\napp.display()\n```\n\nMost of the code is to provide the user\
    \ interface using guizero (Recipe 7.22). The key steps for the plant monitor are\
    \ to first create an instance of the PlantMonitor class using pm = PlantMonitor(),\
    \ and then access wetness, temperature, and humidity readings using pm.get_wetness(),\
    \ pm.get_temp(), and pm.get_humidity(), respectively.\n\n### See Also\n\nFor full\
    \ information on the MonkMakes Plant Monitor, see https://oreil.ly/zOQWq.\n\n\
    For measuring temperature and humidity using a Sense HAT, see Recipe 14.12.\n\n\
    For an example of a Raspberry Pi Pico using a Plant Monitor, see Recipe 19.11.\n\
    \n## 14.7 Measuring a Voltage\n\n### Problem\n\nYou want to measure an analog\
    \ voltage."
  mdcn: "## 14.4 测量甲烷气体\n\n如果你使用的是 SparkFun 分线板，请按照图 14-7 所示连接面包板；如果你给气体传感器焊接了更长的引线，则请按照图\
    \ 14-8 所示连接。\n\n请注意，图 14-8 所示的直接连接使用了分线板的符号，而不是传感器本身的符号，但如果你仔细观察，连接的是传感器的六个引脚，而不是分线板的四个引脚。\n\
    \n你可以使用与配方 14.1 完全相同的程序，并通过向传感器呼气来测试甲烷传感器。当你向传感器呼气时，你应该会看到传感器的读数下降。\n\n### 讨论\n\
    \n甲烷气体传感器最明显的用途是用于新奇的*放屁检测*项目。一个更严肃的用途是检测天然气泄漏。例如，你可以想象一个树莓派家庭监控项目，它使用各种传感器监控家庭。然后，当你在度假时，它可以给你发送一封电子邮件，通知你你的房子即将爆炸。或者也许不会。\n\
    \n这类传感器（图 14-9）使用一个加热元件，该元件加热一个浸渍了对特定气体敏感的催化剂的电阻表面。当气体存在时，催化剂层的电阻会发生变化。\n\n加热器和传感表面在电气上都只是电阻器。因此，两者都可以以任何方式连接。\n\
    \n这种特定的气体传感器对甲烷最敏感，但它也会在较小程度上检测其他气体。这就是为什么向传感器呼气会改变读数，因为健康的人通常不会呼出甲烷。吹气对元件的冷却效应也可能产生影响。\n\
    \n### 另请参阅\n\n你可以找到该传感器的数据手册。这将为你提供有关传感器对各种气体敏感性的各种有用信息。\n\n一系列此类低成本传感器可用于检测不同的气体。请参阅\
    \ SparkFun 提供的传感器列表。\n\n## 14.5 测量空气质量（CO₂）\n\n### 问题\n\n二氧化碳（CO₂）浓度是空气质量的一个指标。你想使用你的树莓派通过一个特殊传感器来测量这种质量。\n\
    \n### 解决方案\n\n使用一个低成本（嗯，相对低成本）的 MH-Z14A CO₂ 传感器模块，如图 14-10 所示连接到树莓派。\n\n要制作这个配方，你需要以下物品：\n\
    \n- 一个 MH-Z14A CO₂ 传感器模块（参见第 566 页的“模块”）\n- 公对公跳线（参见第 564 页的“原型设备和套件”）\n\n在 Z14A\
    \ 传感器和你的树莓派之间进行以下连接：\n\n- MH-Z14A 的引脚 16 连接到树莓派的 GND\n- MH-Z14A 的引脚 17 连接到树莓派的\
    \ 5V\n- MH-Z14A 的引脚 18 连接到树莓派的 GPIO 14 (TXD)\n- MH-Z14A 的引脚 19 连接到树莓派的 GPIO 15\
    \ (RXD)\n\n该传感器使用串行端口。这意味着为了使其工作，你必须遵循配方 2.6。请注意，即使你需要启用串行端口硬件，你也*不应该*启用串行控制台选项。\n\
    \n以下测试程序从传感器读取 CO₂ 水平，并每秒报告一次（ch_14_co2.py）：\n\n```python\nimport serial, time\n\
    \nrequest_reading = bytes([0xFF, 0x01, 0x86, 0x00, 0x00, 0x00,\n             \
    \           0x00, 0x00, 0x79])\n\ndef read_co2():\n    sensor.write(request_reading)\n\
    \    time.sleep(0.1)\n    raw_data = sensor.read(9)\n    high = raw_data[2]\n\
    \    low = raw_data[3]\n    return high * 256 + low;\n\nsensor = serial.Serial('/dev/serial0')\n\
    print(sensor.name)\nif sensor.is_open:\n    print(\"Open\")\n\nwhile True:\n \
    \   print(\"CO2 (ppm):\" + str(read_co2()))\n    time.sleep(1)\n```\n\n与本书中的所有程序示例一样，你也可以下载此程序（参见配方\
    \ 3.22）。\n\n当程序运行时，CO₂ 水平应该（除非你在一个小而通风不良的房间里）大约为 400 ppm。如果你对着传感器呼气几秒钟，读数将开始缓慢上升，然后在接下来的几分钟内回落到正常读数：\n\
    \n```\n$ python3 ch_14_co2.py\n/dev/ttyS0\nOpen\nCO2 (ppm):489\nCO2 (ppm):483\n\
    CO2 (ppm):483\nCO2 (ppm):481\nCO2 (ppm):491\nCO2 (ppm):517\nCO2 (ppm):619\nCO2\
    \ (ppm):734\nCO2 (ppm):896\nCO2 (ppm):1367\n```\n\n该传感器使用请求/响应通信协议。因此，当你想从传感器接收读数时，你首先需要发送包含在\
    \ `request_reading` 中的 9 字节消息。传感器将立即响应一个 9 字节的消息。我们只对字节 2 和 3 感兴趣，它们包含以 ppm 为单位的\
    \ CO₂ 读数的高位和低位字节。\n\n### 讨论\n\n正常的 CO₂ 水平约为 400 至 1,000 ppm。高于此值，空气可能开始感觉沉闷，你可能会感到昏昏欲睡。研究表明，由于通风不良导致的高\
    \ CO₂ 水平会导致精神表现下降。由于整夜运行该程序，我现在睡觉时会让窗户和/或门留一条缝。\n\n### 另请参阅\n\n了解更多关于 [Z14A 协议](https://example.com)\
    \ 的信息。\n\n查找有关 [CO₂ 安全水平](https://example.com) 的更多信息。\n\n## 14.6 测量土壤湿度\n\n###\
    \ 问题\n\n你想测量植物周围土壤的湿度。\n\n### 解决方案\n\n使用 MonkMakes Plant Monitor 板。与大多数其他土壤湿度板不同，该板具有串行接口，因此你必须首先遵循\
    \ [配方 2.6](https://example.com) 来启用串行接口。按照 [图 14-11](https://example.com) 所示连接板子。\n\
    \n连接如下：\n\n- GND 连接到 GND\n- 树莓派上的 3.3V 连接到 Plant Monitor 上的 3V\n- 树莓派上的 14 TXD\
    \ 连接到 Plant Monitor 上的 RX_IN\n- 树莓派上的 15 RXD 连接到 Plant Monitor 上的 TX_OUT\n\n然后使用以下命令下载该板的\
    \ Python 软件：\n\n```\n$ git clone https://github.com/monkmakes/pmon.git\n```\n\n\
    这是另一个使用 guizero 的程序，因此如果你尚未安装 guizero，请使用以下命令进行安装：\n\n```\n$ pip3 install guizero\n\
    ```\n\n然后切换到示例目录并运行示例程序，使用以下命令：\n\n```\n$ cd pmon/raspberry_pi\n$ python3 01_meter.py\n\
    ```\n\n这将打开如图 14-12 所示的窗口。\n\n### 讨论\n\n大多数土壤湿度传感器需要模拟输入，因此不容易连接到树莓派。MonkMakes\
    \ Plant Monitor 使用串行接口，使其非常适合连接到树莓派。它报告植物的温度和湿度，并有一个 RGB LED 指示土壤湿度。\n\n前面示例程序的代码是：\n\
    \n```python\nimport threading\nimport time\nfrom guizero import App, Text\nfrom\
    \ plant_monitor import PlantMonitor\n\npm = PlantMonitor()\n\napp = App(title=\"\
    Plant Monitor\", width=550, height=300, layout=\"grid\")\n\ndef update_readings():\
    \ # update fields with new temp and eCO2 readings\n    while True:\n        wetness_field.value\
    \ = str(pm.get_wetness())\n        temp_c_field.value = str(pm.get_temp())\n \
    \       humidity_field.value = str(pm.get_humidity())\n        time.sleep(2)\n\
    \nt1 = threading.Thread(target=update_readings)\n\n# define the user interface\n\
    Text(app, text=\"Wetness (%)\", grid=[0,0], size=20)\nwetness_field = Text(app,\
    \ text=\"-\", grid=[1,0], size=100)\nText(app, text=\"Temp (C)\", grid=[0,1],\
    \ size=20)\ntemp_c_field = Text(app, text=\"-\", grid=[1,1], size=50)\nText(app,\
    \ text=\"Humidity (%)\", grid=[0,2], size=20)\nhumidity_field = Text(app, text=\"\
    -\", grid=[1,2], size=50)\nt1.start() # start the thread that updates the readings\n\
    app.display()\n```\n\n大部分代码是使用 guizero（配方 7.22）提供用户界面。Plant Monitor 的关键步骤是首先使用\
    \ `pm = PlantMonitor()` 创建 PlantMonitor 类的实例，然后分别使用 `pm.get_wetness()`、`pm.get_temp()`\
    \ 和 `pm.get_humidity()` 访问湿度、温度和湿度读数。\n\n### 另请参阅\n\n有关 MonkMakes Plant Monitor\
