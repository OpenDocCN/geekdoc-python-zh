  - '[PAGE 141]


    ![](img/e36e77524aeaae366529d1cf02f9a39c_141_0.png)


    Figure 4-3. The Recommended Software tool


    This tool includes many pieces of software that in the past were pre-installed
    on Raspberry Pi OS. So, it has many of the most common and useful pieces of Raspberry
    Pi software in it. Use it to browse to the software that you want to install,
    select the checkbox for the desired programs, and click Apply.


    The software will then be downloaded and installed. When the installer has finished,
    the new software will appear on your Raspberry Menu.


    # Discussion


    If you can''t find the software that you want using the Recommended Software tool,
    you can widen the net and use the similar Add/Remove Software tool, also in the
    Preferences section of the Raspberry Menu (Figure 4-4).


    This tool has thousands of software packages and programs for you to install;
    sometimes it is easier to type something in the search area, rather than browse
    through all the packages.'
  - '[PAGE 142]


    ![](img/e36e77524aeaae366529d1cf02f9a39c_142_0.png)


    Figure 4-4. The Add/Remove Software tool


    # See Also


    To install software using the apt command line tool, see [Recipe 3.17](Recipe
    3.17).


    # 4.3 Using Office Software


    # Problem


    You need to open word processor, presentation, and spreadsheet documents on a
    Raspberry Pi.


    # Solution


    Install LibreOffice using the Recommended Software tool ([Recipe 4.2](Recipe 4.2)).


    # Discussion


    The LibreOffice suite of programs ([Figure 4-5](Figure 4-5)) makes a good (and
    free) alternative to Microsoft Office. It includes a word processor, spreadsheet,
    presentation, and drawing software. In fact, the LibreOffice Writer word processor
    will open and save Microsoft Word documents, and the spreadsheet and presentation
    programs are pretty compatible with their Microsoft counterparts.'
  - '[PAGE 143]


    ![](img/e36e77524aeaae366529d1cf02f9a39c_143_0.png)


    Figure 4-5. LibreOffice Writer


    A Raspberry Pi 4 or 400 will run office applications much better than an older
    Raspberry Pi.


    These days it''s often more convenient to keep your documents in the cloud and
    edit them in a browser. The most common examples of these services are Microsoft
    365 and Google Docs. Both require you to sign up for an account, but the Chromium
    browser is perfectly capable of using these services (Figure 4-6).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_143_1.png)


    Figure 4-6. Using a Google Docs spreadsheet in the Chromium browser'
  - '[PAGE 144]


    # See Also


    Visit https://www.libreoffice.org for more information on the LibreOffice suite
    of software.


    If you just want to edit an unformatted text file, you can use the nano editor
    (Recipe 3.7) or VisualStudio Code (Recipe 4.10).


    # 4.4 Running a Vintage Game Console Emulator


    # Problem


    You want to turn your Raspberry Pi into a vintage game console.


    # Solution


    If you fancy rediscovering your misspent youth and playing Asteroids on an emulator
    for the Atari 2600 (Figure 4-7), the RetroPie project will appeal to you.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_144_0.png)


    Figure 4-7. Asteroids on the Stella Atari 2600 emulator


    Many wonderful projects have been built that create custom consoles and game tables
    complete with retro game controllers.


    Although you can install RetroPie on top of Raspberry Pi OS, the easiest way to
    use it is to write it onto a microSD card using the Raspberry Pi Imager (Recipe
    1.6).'
  - '[PAGE 145]


    It is worth noting that even though these games are ancient, they are still owned
    by someone. The ROM image files that you need to play the games on an emulator,
    although easy to find on the internet, are not necessarily yours to take. So please
    stick to the law.


    # Discussion


    The emulator uses a surprisingly large amount of the Raspberry Pi’s meager resources,
    so you might find that you need to use a Raspberry Pi 4, 3, or 2. In an internet
    search, you can find many people who have taken this basic setup and added a retro
    USB controller, like the widely available and quite low-cost controllers, and
    built the Pi and a monitor into a big arcade-style housing. You can also buy a
    kit called the Picade from Pimoroni to make a lovely arcade machine (Figure 4-8).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_145_0.png)'
  - '[PAGE 146]


    # See Also


    Full RetroPie documentation is available on [the RetroPie site](http://retropie.org.uk/).


    # 4.5 Turning Your Raspberry Pi into a Radio Transmitter


    # Problem


    You want to convert your Raspberry Pi into a low-powered FM transmitter that will
    send a radio signal to a normal FM radio receiver (Figure 4-9).


    # Solution


    Back in the early days of the Raspberry Pi, some clever folks at Imperial College,
    London, created some C code that allows you to do just this. The download even
    plays the *Star Wars* theme as a sample. This project will still work if you have
    an [original Raspberry Pi 1](http://www.raspberrypi.org/).


    The project lives on for newer Raspberry Pis as an altogether more advanced project
    called *rpitx*.


    All you need is a short length of wire attached to general-purpose input/output
    (GPIO) pin 4. A 10 cm female-to-male header lead will work just fine for this.
    In fact, it should work with a radio sitting right next to your Pi without any
    kind of antenna—such is the strength of the transmission.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_146_0.png)


    Figure 4-9. Raspberry Pi as an FM transmitter'
  - '[PAGE 147]


    The first step is to install the rpitx software using the following commands.
    Note that this installation will change some things about how your Raspberry Pi
    is configured, including the frequency at which the GPU (graphics process) works.
    So if this is your main Raspberry Pi, make sure you first back up anything precious.
    Here''s the code you need:


    ```

    $ git clone https://github.com/F5OEO/rpitx

    $ cd rpitx

    $ ./install.sh

    ```


    You will now need to do something else for a good 15 minutes or so while the software
    installs. You might see what look like error messages and warnings, but these
    are normal. At the end of the installation, the installer script will ask:


    > In order to run properly, rpitx need to modify /boot/config.txt. Are you sure
    (y/n)


    Press Y, and the script will then confirm the changes it has made with the following
    message:


    > Set GPU to 250Mhz in order to be stable


    If you need to reverse this change, edit /boot/config.txt by removing the last
    line that says gpu_freq=250, then reboot.


    Next, find yourself an FM radio receiver and tune it to 103.0 MHz. If this frequency
    is already occupied by some other transmission, pick another frequency and make
    note of it.


    Now run the following command (changing the frequency parameter from 103.0 if
    you had to change frequency):


    ```

    sudo ./pifmrds -freq "103.0" -audio src/pifmrds/stereo_44100.wav

    ```


    If all is well, you should hear the voice of the developer talking about left
    and right channels.


    # Discussion


    You need to know that this project may not be legal in your country. The power
    output is higher than that of FM transmitters used with MP3 players.


    Were you to put a Raspberry Pi in your vehicle, this would be a great way to output
    sound through the vehicle''s audio system.


    # See Also


    To learn more about the rpitx project, see https://oreil.ly/TrlO1.'
  - '[PAGE 148]


    # 4.6 Editing Bitmap Images


    # Problem


    You want to manipulate a photograph or other image.


    # Solution


    Install and run the GNU Image Manipulation Program (GIMP; see Figure 4-10).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_148_0.png)


    GIMP is available to install from the Add/Remove Software tool (see Recipe 4.2).
    When you search for GIMP, a lot of results will come back for various GIMP utilities,
    so look for the package called “GNU Image Manipulation Program.”


    If you prefer to install GIMP from the command line, open a Terminal session and
    type the following command:


    ```

    $ sudo apt install gimp

    ```


    Once GIMP is installed, you’ll find an entry for GNU Image Manipulation Program
    in your Raspberry Menu under the Graphics heading.'
  - '[PAGE 149]


    # Discussion


    Despite being hungry for memory and processor power, GIMP is usable even on a
    Raspberry Pi 2 B, but there will be much less waiting around if you use a Raspberry
    Pi 4 or 400.


    # See Also


    Find out more from the [GIMP website](https://www.gimp.org/).


    GIMP has a lot of features and is a very sophisticated image-editing program,
    so it does take a little learning. You''ll find an online manual for the software
    at the GIMP website.


    For more information on installing with apt, see [Recipe 3.17](https://www.raspberrypi.org/forums/viewtopic.php?t=123456).


    For editing vector images, see [Recipe 4.7](https://www.raspberrypi.org/forums/viewtopic.php?t=123457).


    # 4.7 Editing Vector Images


    # Problem


    You want to create or edit high-quality vector drawings such as Scalable Vector
    Graphics (SVG).


    # Solution


    Inkscape is one of the packages available from the Add/Remove Software tool (see
    [Recipe 4.2](https://www.raspberrypi.org/forums/viewtopic.php?t=123458)). Open
    the tool up and search for “Inkscape.”


    If you prefer to install Inkscape from the command line, you can do so with the
    following commands:


    ```

    $ sudo apt update

    $ sudo apt install inkscape

    ```


    Once Inkscape is installed, its icon will appear in the Graphics section of your
    Raspberry Menu.


    # Discussion


    Inkscape ([Figure 4-11](https://www.raspberrypi.org/forums/viewtopic.php?t=123459))
    is the most-used open source vector image editor. Vector drawing packages differ
    from bitmap image editors like GIMP ([Recipe 4.6](https://www.raspberrypi.org/forums/viewtopic.php?t=123460))
    in that the image is made up of shapes, lines, text, etc. that are stored as such,
    rather than being converted into pixels. This means that you can come back and
    edit those things (perhaps the position of a line), which is not possible in a
    bitmap editor.'
- md: "## 4.8 Using Bookshelf\n\n### Problem\n\nYou want to read Raspberry Pi books\
    \ and magazines for free.\n\n### Solution\n\nUse the pre-installed Bookshelf application.\
    \ You will find this application in the Help section of the Raspberry Menu. Open\
    \ it and you will see (Figure 4-12) past issues of *The MagPi*, *Wireframe*, and\
    \ *HackSpace* magazines, as well as books from the Raspberry Pi Press.\n\n![Figure\
    \ 4-12. The Bookshelf application](img/e36e77524aeaae366529d1cf02f9a39c_151_0.png)\n\
    \n### Discussion\n\nThis is a really great resource. You will find lots of articles\
    \ in *The MagPi* magazine to get started with various aspects of the Raspberry\
    \ Pi. It is also a great source of inspiration for projects.\n\n### See Also\n\
    \nLots of interesting Raspberry Pi resources are available at the [Raspberry Pi\
    \ Foundation](https://www.raspberrypi.org/).\n\nYou can also download back issues\
    \ of *The MagPi magazine in PDF* or subscribe to the paper edition.\n\n## 4.9\
    \ Playing Internet Radio\n\n### Problem\n\nYou want to be able to play internet\
    \ radio on your Raspberry Pi.\n\n### Solution\n\nThe VLC media player should be\
    \ pre-installed with Raspberry Pi OS. You will find it under Sound & Video in\
    \ the Raspberry Menu. If it's not there, you can install it using the Preferred\
    \ Software tool (Recipe 4.2).\n\nIf you prefer to install the VLC media player\
    \ from the command line, you can do so by running the following command:\n\n```\n\
    sudo apt install vlc\n```\n\nRun the program and then, on the Media menu, select\
    \ the Open Network Stream option. This opens a dialog box (see Figure 4-13) in\
    \ which you can enter the URL of the internet radio station that you want to play.\
    \ You will need to plug headphones or amplified speakers into the audio socket\
    \ on the Raspberry Pi.\n\n![Figure 4-13. VLC network stream dialog](img/e36e77524aeaae366529d1cf02f9a39c_152_0.png)\n\
    \n### Discussion\n\nYou also can run VLC from the command line as follows:\n\n\
    ```\n$ vlc http://www.a-1radio.com/listen.pls -I dummy\n```\n\nVLC will probably\
    \ produce a series of error messages but then play the audio just fine. The -I\
    \ dummy option prevents a VLC window opening.\n\n### See Also\n\nThis recipe borrows\
    \ heavily from this [tutorial](https://example.com), in which Jan Holst Jensen\
    \ takes things a step further and adds radio-style controls to the project.\n\n\
    For UK readers, you can find a list of the [BBC radio stream URLs](https://example.com)\
    \ online.\n\n## 4.10 Using Visual Studio Code\n\n### Problem\n\nYou want to use\
    \ a light-weight programming editor.\n\n### Solution\n\nInstall Microsoft's Visual\
    \ Studio Code, or VS Code, as we shall refer to it from now on.\n\nYou will find\
    \ VS Code in the Programming section of the Recommended Software tool ([Recipe\
    \ 4.2](https://example.com)).\n\nIf you prefer to install it from the command\
    \ line, you can use the following command:\n\n```\n$ sudo apt install code\n```\n\
    \n### Discussion\n\nVS Code is much loved by programmers. It sits in a happy place,\
    \ halfway between a simple text editor and a fully featured integrated development\
    \ environment (IDE). It's very easy to use and offers helpful suggestions as you\
    \ write your code, without you having to learn the ins and outs of a more complex\
    \ IDE. It offers support for many programming languages and does nice things like\
    \ color-code your programs to make them easier to read.\n\nIf you are a seasoned\
    \ programmer, you may prefer to edit your Raspberry Pi Python code using Visual\
    \ Studio Code rather than a beginner's Python IDE like Thonny or Mu (Recipes [5.3](https://example.com)\
    \ and [5.4](https://example.com)). This is particularly true if your project consists\
    \ of multiple files. [Figure 4-14](https://example.com) shows the file explorer\
    \ area on the left, where you can see all the files in your project. Clicking\
    \ on one makes it available in the editor area, and open files each have their\
    \ own tab.\n\n![Figure 4-14. VS Code on a Raspberry Pi](img/e36e77524aeaae366529d1cf02f9a39c_154_0.png)\n\
    \nAs you can see, the editor highlights the language syntax, color-coding it to\
    \ make it easier to read and spot mistakes.\n\nVisual Studio Code is a useful\
    \ tool to have around, whether programming in Python (see Chapter 5) or some other\
    \ language.\n\n### See Also\n\nThe simple text editor nano is an easy way to edit\
    \ code (see Recipe 3.7).\n\nThonny is a Python editor aimed at beginners (see\
    \ Recipe 5.3).\n\n## 4.11 Controlling a Laser Cutter\n\n### Problem\n\nYou want\
    \ to control your low-cost K40 laser cutter from your Raspberry Pi.\n\n### Solution\n\
    \nIf you have one of the popular and low-cost Chinese laser cutters of the K40\
    \ variety (Figure 4-15), you can use the K40 Whisperer software to control it.\
    \ Thus, instead of having to use a relatively expensive Windows computer to control\
    \ your laser cutter, you can use a much lower cost Raspberry Pi.\n\n![Figure 4-15.\
    \ A K40 laser cutter](img/e36e77524aeaae366529d1cf02f9a39c_155_0.png)\n\nThis\
    \ software is written in Python, but also relies on the Inkscape vector drawing\
    \ package. So if you have not already done so, install Inkscape by following Recipe\
    \ 4.7.\n\nNext, download the source code for the K40 Whisperer software. Select\
    \ the latest download from the K40 Whisperer Source column. Double-click the downloaded\
    \ ZIP file and extract it into your home directory (/home/pi). Inside the unzipped\
    \ directory, you will find a file called README_Linux.txt. The instructions here\
    \ are based on that file. The README is for Linux in general rather than being\
    \ Raspberry Pi-specific.\n\nFirst, run the following two commands to create a\
    \ user group for the software. The first adds a new user group specifically for\
    \ the laser cutter, and the second adds the user pi to that group. If you created\
    \ a different username when setting up your Raspberry Pi, use that in place of\
    \ pi:\n\n```\n$ sudo groupadd lasercutter\n$ sudo usermod -a -G lasercutter pi\n\
    ```\n\nMake sure that your laser cutter is connected to your Raspberry Pi with\
    \ its USB lead and the laser cutter is switched on. You now need to run the following\
    \ commands to find out the USB vendor and product ID for the laser cutter. These\
    \ will probably be 1a86 and 5512, respectively, but it's worth checking in case\
    \ the laser cutter's manufacturer changed them. To do this, run the lsusb command:\n\
    \n```\n$ lsusb\nBus 001 Device 004: ID 1a86:5512 QinHeng Electronics CH341 in\
    \ EPP/MEM/I2C mode,\n    EPP/I2C adapter\nBus 001 Device 005: ID 0424:7800 Microchip\
    \ Technology, Inc. (formerly SMSC)\nBus 001 Device 003: ID 0424:2514 Microchip\
    \ Technology, Inc. (formerly SMSC)\n    USB 2.0 Hub\nBus 001 Device 002: ID 0424:2514\
    \ Microchip Technology, Inc. (formerly SMSC)\n    USB 2.0 Hub\nBus 001 Device\
    \ 001: ID 1d6b:0002 Linux Foundation 2.0 root hub\n```\n\nThis will list all the\
    \ USB devices connected to your Raspberry Pi; look for the entry that corresponds\
    \ to your laser cutter. In this case, it's the only Chinese name there (QinHeng).\
    \ But you can confirm this if you need to by unplugging the laser cutter and running\
    \ the lsusb command again and seeing which entry disappears.\n\nOn the line for\
    \ this entry you can see the text 1a86:5512. The part before the : is the vendor\
    \ ID and 5512 is the product ID. You need to know these because you are going\
    \ to use them in a configuration file.\n\nCreate and edit a new file in nano using\
    \ the command:\n\n```\n$ sudo nano /etc/udev/rules.d/97-ctc-lasercutter.rules\n\
    ```\n\nYou can find information on editing files in Recipe 3.7. Paste the following\
    \ text into the file. If your vendor and product IDs are different from mine,\
    \ change the appropriate parts of the text to match your IDs:\n\n```\nSUBSYSTEM==\"\
    usb\", ATTRS{idVendor}==\"[1a86]\", ATTRS{idProduct}==\"[5512]\",\n    ENV{DEVTYPE}==\"\
    usb_device\", MODE=\"0664\", GROUP=\"lasercutter\"\n```\n\nReboot your Raspberry\
    \ Pi and then continue the installation by running the following command to install\
    \ some more modules that K40 Whisperer needs:\n\n```\n$ sudo apt install libxml2-dev\
    \ libxslt-dev\n$ sudo apt install libusb-1.0-0\n$ sudo apt install libusb-1.0-0-dev\n\
    ```\n\nMake sure that you are in the directory where you downloaded the K40 Whisperer\
    \ and run the following command:\n\n```\n$ pip3 install -r requirements.txt\n\
    ```"
  mdcn: "## 4.8 使用书架应用\n\n### 问题\n\n你想免费阅读树莓派相关的书籍和杂志。\n\n### 解决方案\n\n使用预装的书架应用。你可以在树莓派菜单的“帮助”部分找到这个应用。打开它，你会看到（图4-12）*The\
    \ MagPi*、*Wireframe*和*HackSpace*杂志的往期内容，以及树莓派出版社的书籍。\n\n![图4-12. 书架应用](img/e36e77524aeaae366529d1cf02f9a39c_151_0.png)\n\
    \n### 讨论\n\n这是一个非常棒的资源。你会在*The MagPi*杂志中找到大量文章，帮助你入门树莓派的各个方面。它也是获取项目灵感的绝佳来源。\n\
    \n### 另请参阅\n\n在[树莓派基金会](https://www.raspberrypi.org/)网站上可以找到许多有趣的树莓派资源。\n\n你也可以下载*The\
    \ MagPi*杂志的PDF往期版本，或订阅纸质版。\n\n## 4.9 播放网络电台\n\n### 问题\n\n你想在树莓派上播放网络电台。\n\n###\
    \ 解决方案\n\nVLC媒体播放器应该已随树莓派操作系统预装。你可以在树莓派菜单的“声音与视频”下找到它。如果找不到，可以使用首选软件工具（参见配方4.2）安装。\n\
    \n如果你更喜欢从命令行安装VLC媒体播放器，可以运行以下命令：\n\n```\nsudo apt install vlc\n```\n\n运行程序，然后在“媒体”菜单中选择“打开网络串流”选项。这将打开一个对话框（见图4-13），你可以在其中输入想要播放的网络电台的URL。你需要将耳机或有源音箱插入树莓派的音频插孔。\n\
    \n![图4-13. VLC网络串流对话框](img/e36e77524aeaae366529d1cf02f9a39c_152_0.png)\n\n###\
    \ 讨论\n\n你也可以从命令行运行VLC，如下所示：\n\n```\n$ vlc http://www.a-1radio.com/listen.pls -I\
    \ dummy\n```\n\nVLC可能会产生一系列错误信息，但随后能正常播放音频。`-I dummy`选项可以防止VLC窗口打开。\n\n### 另请参阅\n\
    \n本配方大量借鉴了这个[教程](https://example.com)，其中Jan Holst Jensen更进一步，为项目添加了电台风格的控制功能。\n\
    \n对于英国读者，可以在网上找到[BBC电台串流URL列表](https://example.com)。\n\n## 4.10 使用Visual Studio\
    \ Code\n\n### 问题\n\n你想使用一个轻量级的编程编辑器。\n\n### 解决方案\n\n安装微软的Visual Studio Code，或简称VS\
    \ Code。\n\n你可以在推荐软件工具的“编程”部分找到VS Code（参见[配方4.2](https://example.com)）。\n\n如果你更喜欢从命令行安装，可以使用以下命令：\n\
    \n```\n$ sudo apt install code\n```\n\n### 讨论\n\nVS Code深受程序员喜爱。它恰到好处地介于简单的文本编辑器和功能齐全的集成开发环境（IDE）之间。它非常易于使用，并在你编写代码时提供有用的建议，而无需学习更复杂IDE的方方面面。它支持多种编程语言，并能出色地完成诸如为代码着色以使其更易阅读等任务。\n\
    \n如果你是一位经验丰富的程序员，你可能更喜欢使用Visual Studio Code而不是像Thonny或Mu（参见配方[5.3](https://example.com)和[5.4](https://example.com)）这样的初学者Python\
    \ IDE来编辑你的树莓派Python代码。如果你的项目包含多个文件，这一点尤其正确。[图4-14](https://example.com)显示了左侧的文件资源管理器区域，你可以在其中看到项目中的所有文件。点击一个文件即可在编辑器区域中打开它，每个打开的文件都有自己的标签页。\n\
    \n![图4-14. 树莓派上的VS Code](img/e36e77524aeaae366529d1cf02f9a39c_154_0.png)\n\n如你所见，编辑器会高亮显示语言语法，通过着色使其更易阅读和发现错误。\n\
    \n无论你是用Python（参见第5章）还是其他语言编程，Visual Studio Code都是一个有用的工具。\n\n### 另请参阅\n\n简单的文本编辑器nano是编辑代码的一种简便方式（参见配方3.7）。\n\
    \nThonny是一个面向初学者的Python编辑器（参见配方5.3）。\n\n## 4.11 控制激光切割机\n\n### 问题\n\n你想从树莓派控制你的低成本K40激光切割机。\n\
    \n### 解决方案\n\n如果你拥有流行的低成本中国K40系列激光切割机（图4-15），你可以使用K40 Whisperer软件来控制它。这样，你就不必使用相对昂贵的Windows电脑来控制激光切割机，而是可以使用成本低得多的树莓派。\n\
    \n![图4-15. K40激光切割机](img/e36e77524aeaae366529d1cf02f9a39c_155_0.png)\n\n该软件用Python编写，但也依赖于Inkscape矢量绘图包。因此，如果你还没有安装Inkscape，请按照配方4.7进行安装。\n\
    \n接下来，下载K40 Whisperer软件的源代码。从“K40 Whisperer Source”列中选择最新的下载。双击下载的ZIP文件并将其解压到你的主目录（/home/pi）。在解压后的目录中，你会找到一个名为README_Linux.txt的文件。这里的说明基于该文件。该README适用于一般的Linux系统，而非特定于树莓派。\n\
    \n首先，运行以下两个命令为软件创建一个用户组。第一个命令添加一个专门用于激光切割机的新用户组，第二个命令将用户pi添加到该组中。如果你在设置树莓派时创建了不同的用户名，请用该用户名替换pi：\n\
    \n```\n$ sudo groupadd lasercutter\n$ sudo usermod -a -G lasercutter pi\n```\n\
    \n确保你的激光切割机已通过USB线连接到树莓派，并且激光切割机已开机。现在你需要运行以下命令来查找激光切割机的USB供应商ID和产品ID。这些ID可能分别是1a86和5512，但值得检查一下以防激光切割机制造商更改了它们。为此，运行lsusb命令：\n\
    \n```\n$ lsusb\nBus 001 Device 004: ID 1a86:5512 QinHeng Electronics CH341 in\
    \ EPP/MEM/I2C mode,\n    EPP/I2C adapter\nBus 001 Device 005: ID 0424:7800 Microchip\
    \ Technology, Inc. (formerly SMSC)\nBus 001 Device 003: ID 0424:2514 Microchip\
    \ Technology, Inc. (formerly SMSC)\n    USB 2.0 Hub\nBus 001 Device 002: ID 0424:2514\
    \ Microchip Technology, Inc. (formerly SMSC)\n    USB 2.0 Hub\nBus 001 Device\
    \ 001: ID 1d6b:0002 Linux Foundation 2.0 root hub\n```\n\n这将列出连接到树莓派的所有USB设备；找到与你的激光切割机对应的条目。在这个例子中，它是唯一一个中文名称（QinHeng）。但如果你需要确认，可以拔掉激光切割机，再次运行lsusb命令，看看哪个条目消失了。\n\
    \n在该条目的行上，你可以看到文本`1a86:5512`。冒号前的部分是供应商ID，5512是产品ID。你需要知道这些，因为你将在配置文件中使用它们。\n\n\
    使用以下命令在nano中创建并编辑一个新文件：\n\n```\n$ sudo nano /etc/udev/rules.d/97-ctc-lasercutter.rules\n\
    ```\n\n你可以在配方3.7中找到有关编辑文件的信息。将以下文本粘贴到文件中。如果你的供应商ID和产品ID与我的不同，请更改文本的相应部分以匹配你的ID：\n\
    \n```\nSUBSYSTEM==\"usb\", ATTRS{idVendor}==\"[1a86]\", ATTRS{idProduct}==\"[5512]\"\
    ,\n    ENV{DEVTYPE}==\"usb_device\", MODE=\"0664\", GROUP=\"lasercutter\"\n```\n\
    \n重启你的树莓派，然后通过运行以下命令安装K40 Whisperer需要的更多模块来继续安装：\n\n```\n$ sudo apt install libxml2-dev\
    \ libxslt-dev\n$ sudo apt install libusb-1.0-0\n$ sudo apt install libusb-1.0-0-dev\n\
    ```\n\n确保你位于下载K40 Whisperer的目录中，然后运行以下命令：\n\n```\n$ pip3 install -r requirements.txt\n\
    ```"
