    \    z = (data[5] * 256 + data[6]) / 16\n    if z > 2047 :\n        z -= 4096\n\
    \    return (x, y, z)\n\nwhile True:\n    print(\"x={:.6f}\\ty={:.6f}\\tz={:.6f}\"\
    .format(x, y, z))\n    time.sleep(0.5)\n```\n\nAs with all the program examples\
    \ in this book, you can also download this program (see Recipe 3.22).\n\nThe program\
    \ reads the three forces corresponding to the accelerations and prints them out:\n\
    \n```\n$ python3 ch_14_i2c_acc.py\nx=-122.000000 y=56.000000 z=-1023.000000\n\
    x=-933.000000 y=251.000000 z=-350.000000\nx=-937.000000 y=257.000000 z=-347.000000\n\
    x=-933.000000 y=262.000000 z=-350.000000\nx=-931.000000 y=259.000000 z=-355.000000\n\
    x=-1027.000000 y=-809.000000 z=94.000000\n```\n\nTilt the accelerometer in various\
    \ directions to see how the readings change. A reading of 0 indicates no net force.\
