    s)for($|\\s)\"\n```\n\nRight in the middle of the regular expression is the word\
    \ *for*. That's to be expected, because that's the word we're looking for. To\
    \ either side of *for* are expressions in parentheses. Before it we have this:\n\
    \n```\n(^|\\s)\n```\n\nThe three magic symbols are ^, which means the start of\
