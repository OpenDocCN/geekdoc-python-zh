    \nFigure 17-7. Sending tweets from Node-RED\n\n## Discussion\n\nNode-RED is an\
    \ extremely powerful system, and consequently, becoming familiar with all its\
    \ features and its odd quirks will take some time. As well as creating direct\
    \ flows like the one we made here, you can also introduce switching code (like\
    \ an *if* statement) and functions that transform the messages being passed between\
    \ the nodes.\n\nWe have only just touched on Node-RED here; if you want to learn\
    \ more, I suggest working through the documentation mentioned in the See Also\
    \ section and much of Chapter 18.\n\nHaving played with Node-RED and decided that\
    \ you like it, you may well want to ensure that it starts automatically whenever\
    \ your Raspberry Pi reboots by issuing the following commands:\n\n```\n$ sudo\
    \ systemctl enable nodered.service\n$ sudo systemctl start nodered.service\n```\n\
    \n## See Also\n\nMore information is available in the [full documentation on using\
    \ Node-RED on the Raspberry Pi](https://www.raspberrypi.org/documentation/usage/gpio/python/rpi-gpio.md).\n\
    \nFind some good video introductions to Node-RED at [https://oreil.ly/uxGHZ](https://oreil.ly/uxGHZ)\
    \ and [https://oreil.ly/ZSDNi](https://oreil.ly/ZSDNi).\n\n## 17.4 Sending Email\
    \ and Other Notifications with IFTTT\n\n### Problem\n\nYou want a flexible way\
    \ for your Raspberry Pi to send notifications through email, Facebook, Twitter,\
    \ or Slack.\n\n### Solution\n\nHave your Raspberry Pi send requests to the If\
    \ This Then That (IFTTT) *Maker* channel to trigger configurable notifications.\n\
    \nThis recipe is illustrated with an example that sends you an email when the\
    \ CPU temperature of your Raspberry Pi exceeds a threshold.\n\nYou need to create\
    \ an account with IFTTT before you can begin using it, so visit [www.ifttt.com](https://www.ifttt.com),\
    \ sign up for a free account, and log in.\n\nThe next step is to create a new\
    \ IFTTT *applet* on the IFTTT website. An applet is like a rule, such as *When\
    \ I get a web request from a Raspberry Pi, send an email*. Click the CREATE button\
    \ on the web page. This will prompt you to first enter the IF THIS part of the\
    \ recipe and later the THEN THAT part.\n\nIn this case, the IF THIS part (the\
    \ trigger) is going to be the receipt of a web request from your Raspberry Pi,\
    \ so click THIS and then enter **Webhooks** into the search field to find the\
    \ Webhooks channel. Select the Webhooks channel and, when prompted, select the\
    \ option “Receive a web request.” Clicking Create should bring up something like\
    \ Figure 17-8.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_495_0.png)\n\nFigure\
    \ 17-8. The \"Receive a web request\" trigger form\n\nIn the Event Name field,\
    \ enter the text **cpu_too_hot** and then click \"Create trigger.\"\n\nThis will\
    \ now move you to the THEN THAT portion of the recipe, the *action*, and you will\
    \ need to select an action channel. There are many options, but for this example,\
    \ you will use the Email channel, so in the search field, type **Email** and then\
    \ select the Email channel.\n\nHaving selected the Email channel, select the action\
    \ \"Send me an email,\" which displays the form shown in Figure 17-9.\n\nChange\
    \ the text so that it appears as shown in Figure 17-9. Note that the special values\
    \ OccurredAt and Value1 will both be surrounded by {{ and }}. These values are\
    \ called ingredients and are variable values that will be taken from the web request\
    \ and substituted into the email subject and body.\n\nClick \"Create action\"\
    \ and then Finish to complete the recipe creation.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_496_0.png)\n\
    \nFigure 17-9. Completing the action fields in IFTTT\n\nOne final piece of information\
    \ that we need is the API key for the Webhooks channel. This is so that other\
    \ people can’t bombard you with emails about their Raspberry Pi’s CPU temperature.\n\
    \nTo find this key on the IFTTT website, click the My Services option on the menu\
    \ that appears when you click next to your user icon, and then find Webhooks.\
    \ On the Webhooks page, click Documentation, and a page like Figure 17-10 displays;\
    \ here you can see your key (which is intentionally obscured in this figure).\
    \ You will need to paste this key into the code that follows in the line KEY =\
    \ 'your_key_here'.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_497_0.png)\n\n\
    Figure 17-10. Finding your API key\n\nThe Python program to send the web request\
    \ is called `ch_17_ifttt_cpu_temp.py`:\n\n```python\nimport time\nfrom gpiozero\
    \ import CPUTemperature\nimport requests\n\nMAX_TEMP = 33.0\nMIN_T_BETWEEN_WARNINGS\
    \ = 60 # Minutes\n\nEVENT = 'cpu_too_hot'\nBASE_URL = 'https://maker.ifttt.com/trigger/'\n\
    KEY = 'your_key_here'\n\ndef send_notification(temp):\n    data = {'value1' :\
    \ temp}\n    url = BASE_URL + EVENT + '/with/key/' + KEY\n    response = requests.post(url,\
    \ json=data)\n    print(response.status_code)\n\ndef cpu_temp():\n    cpu_temp\
    \ = CPUTemperature().temperature\n    return cpu_temp\n\nwhile True:\n    temp\
    \ = cpu_temp()\n    print(\"CPU Temp (C): \" + str(temp))\n    if temp > MAX_TEMP:\n\
    \        print(\"CPU TOO HOT!\")\n        send_notification(temp)\n        print(\"\
    No more notifications for: \" + str(MIN_T_BETWEEN_WARNINGS)\n              + \"\
    \ mins\")\n        time.sleep(MIN_T_BETWEEN_WARNINGS * 60)\n    time.sleep(1)\n\
    ```\n\nAs with all the program examples in this book, you can also download this\
    \ program (see Recipe 3.22).\n\nI have left the MAX_TEMP deliberately low for\
    \ testing purposes. If you live somewhere hot, you’ll want to bump this number\
    \ up to 60 or 70.\n\nPaste the key into ch_17_ifttt_cpu_temp.py on the line that\
    \ starts KEY= and then run the program using:\n\n```\n$ python3 ch_17_ifttt_cpu_temp.py\n\
    ```\n\nYou can increase your CPU temperature by playing a video or temporarily\
    \ wrapping your Raspberry Pi in bubble wrap. When the event is triggered, you\
    \ should receive an email that looks like Figure 17-11. Notice how the values\
    \ have been substituted into the email (again, the obscuring is intentional).\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_498_0.png)\n\n## Discussion\n\nMost\
    \ of the action for this program takes place in the send_notification function.\
    \ This function first constructs a URL that includes the key and request parameter\
    \ value1 (containing the temperature) and then uses the Python requests library\
    \ to send the web request to IFTTT."
