  - "[PAGE 478]\n\n# # 16.6 Using a USB Microphone\n\n# ## Problem\n\nYou want to\
    \ connect a microphone to your Raspberry Pi to capture sound.\n\n# ## Solution\n\
    \nUse a USB microphone like the one shown in Figure 16-7, or the microphone of\
    \ a USB webcam, or something a bit more substantial and of better quality.\n\n\
    These devices come in various shapes and sizes. Some fit directly into the USB\
    \ socket, others have a USB lead attached to them, and some are part of a headset.\n\
    \nHaving plugged in your USB microphone, check that Raspberry Pi OS is aware of\
    \ it by running this command, which lists available devices from which you can\
    \ record:\n\n```\n$ arecord -l\n**** List of CAPTURE Hardware Devices ****\ncard\
    \ 1: H340 [Logitech USB Headset H340], device 0: USB Audio [USB Audio]\n  Subdevices:\
    \ 1/1\n  Subdevice #0: subdevice #0\n```\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_478_0.png)\n\
    \nFigure 16-7. Attaching a USB microphone to a Raspberry Pi\n\nIn this case, I'm\
    \ using a microphone that's part of a Logitech USB headset with microphone. As\
    \ the previously described output shows, this is card 1, subdevice 0. We'll need\
    \ this information when we come to recording sounds."
  - '[PAGE 479]


    To make the microphone active, you need to right-click on the speaker icon in
    the top right of the screen. Then select your USB mic device from the Audio Inputs
    list, as shown in Figure 16-8. Here we are selecting the microphone of a USB webcam.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_479_0.png)


    Figure 16-8. Selecting the microphone as an audio device


    You can now try to make a recording from the command line and then play it back.
    To record, use the following command:


    ```

    $ arecord -d 3 test.wav

    ```


    The -d parameter specifies the duration of the recording in seconds. To play back
    the sound you have just recorded, use the following:


    ```

    $ aplay test.wav

    Playing WAVE ''test.wav'' : Unsigned 8 bit, Rate 8000 Hz, Mono

    ```


    You can interrupt the sound playing by pressing Ctrl-C.


    # Discussion


    I have had mixed results with the tiny push-in microphones like the one shown
    in Figure 16-7. Some work and some don''t. So, if you have followed the instructions
    here and you still can''t get your microphone to record anything, try a different
    one.


    The arecord command has optional parameters that enable you to control the sample
    rate and format of the audio you record. So, for example, if you want to record
    at 16,000 samples a second rather than the default of 8,000, use the following
    command:


    ```

    $ arecord -r 16000 -d 3 test.wav

    ```


    When you play back the sound, aplay will automatically detect the sample rate,
    so you can just do this:


    ```

    $ aplay test.wav

    Playing WAVE ''test.wav'' : Unsigned 8 bit, Rate 16000 Hz, Mono

    ```


    # See Also


    For ways of attaching a speaker to your Raspberry Pi, see Recipe 16.1. For other
    methods of playing a sound file, see Recipes 16.4 and 16.5.'
