    ## 18.4 配置 Sonoff WiFi 智能开关


    ### 问题


    你需要将你的 Sonoff WiFi 开关加入你的家庭 WiFi 网络。


    ### 解决方案


    首先，使用步骤 18.4 将 Tasmota 固件刷写到你的 Sonoff 上。如果你的 Sonoff 上已有 Tasmota 固件并且已通电（无论是使用树莓派（Pi
    2 或更新型号）的 3.3V 电源，还是在原位使用交流电源），你现在可以通过连接到它将运行的无线接入点来配置 Sonoff。在撰写本文时，你无法使用树莓派完成此操作，因为当你加入后，无线接入点不会像使用
    Mac 或 Windows PC 连接时那样触发欢迎页面打开。相反，你需要在你的 PC 或 Mac 上，甚至在你的智能手机上，连接到名为类似 Sonoff-2500
    的 WiFi 接入点（图 18-14）。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_525_0.png)


    图 18-14. 将 Sonoff 加入 WiFi 网络


    你可以选择输入两个无线接入点的凭据。但假设你只有一个接入点，你可以使用页面顶部的“扫描 WiFi 网络”链接，或者直接在 AP1 SSID 字段中输入你的接入点名称，在
    AP1 Password 字段中输入你的密码，然后点击保存。


    Sonoff 将会重启，如果你输入的接入点凭据正确，它将重启并连接到你的网络。


    现在你需要找到 Sonoff 的 IP 地址。像 Android 手机上的 Fing 或 iOS 上的 Discovery 这样的工具可以做到这一点。如图
    18-15 所示，在我的情况下，Sonoff 被分配了 IP 地址 192.168.1.84。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_526_0.png)


    图 18-15. 查找 Sonoff 的 IP 地址


    ### 讨论


    现在 Sonoff 已连接到你的网络，它将改变模式，不再运行整个接入点，而是在你的网络上运行一个 Web 服务器，你可以通过它来管理设备。要连接到此网页，请在任何连接到网络的机器上的浏览器中输入
