    \n接下来，从Apps菜单中选择ThingTweet操作。系统会提示您登录Twitter，然后您的操作将被激活（图17-12）。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_500_0.png)\n\
    \n图17-12. ThingTweet操作\n\n用于发送触发推文的Web请求的Python程序名为ch_17_send_tweet.py：\n\n```python\n\
    import time\nfrom gpiozero import CPUTemperature\nimport requests\n\nMAX_TEMP\
    \ = 35.0\nMIN_T_BETWEEN_WARNINGS = 60 # Minutes\n\nBASE_URL = 'https://api.thingspeak.com/apps/thingtweet/1/statuses/update/'\n\
    KEY = 'your_key_here'\n\ndef send_notification(temp):\n    status = 'Thingtweet:\
    \ Raspberry Pi getting hot. CPU temp=' + str(temp)\n    data = {'api_key' : KEY,\
    \ 'status' : status}\n    response = requests.post(BASE_URL, json=data)\n    print(response.status_code)\n\
    \ndef cpu_temp():\n    cpu_temp = CPUTemperature().temperature\n    return cpu_temp\n\
    \nwhile True:\n    temp = cpu_temp()\n    print(\"CPU Temp (C): \" + str(temp))\n\
    \    if temp > MAX_TEMP:\n        print(\"CPU TOO HOT!\")\n        send_notification(temp)\n\
    \        print(\"No more notifications for: \" + str(MIN_T_BETWEEN_WARNINGS)\n\
    \              + \" mins\")\n        time.sleep(MIN_T_BETWEEN_WARNINGS * 60)\n\
    \    time.sleep(1)\n```\n\n与本书中所有程序示例一样，您也可以下载此程序（参见配方3.22）。\n\n与配方17.4一样，您需要在运行程序之前将图17-12中的密钥粘贴到代码中。以与配方17.4相同的方式运行和测试程序。\n\
    \n### 讨论\n\n代码与配方17.4非常相似。主要区别在于`send_notification`函数，该函数构造推文，然后将消息作为参数`status`发送Web请求。\n\
    \n### 另请参阅\n\n更多信息可在ThingSpeak服务的完整文档中找到。\n\n在配方17.6中，您将使用在ThingSpeak中实现的流行的CheerLights；在配方17.7中，您将学习如何使用ThingSpeak收集传感器数据。\n\
    \n## 17.6 使用CheerLights更改LED颜色\n\n### 问题\n\n您希望将树莓派连接到RGB LED，并参与流行的CheerLights项目。\n\
    \nCheerLights是一项网络服务，当任何人向@cheerlights发送包含颜色名称的推文时，它会将该颜色记录为CheerLights颜色。在世界各地，许多人拥有CheerLights项目，这些项目使用网络服务请求最后一种颜色，并将其灯光设置为该颜色。因此，当有人发推文时，每个人的灯光都会改变颜色。\n\
    \n### 解决方案\n\n使用连接到树莓派的Raspberry Squid RGB LED（图17-13），并运行名为ch_17_cheerlights.py的测试程序（在图17-13之后显示）：\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_502_0.png)\n\n图17-13. CheerLights显示\n\
    \n```python\nfrom gpiozero import RGBLED\nfrom colorzero import Color\nimport\
    \ time, requests\n\nled = RGBLED(18, 23, 24)\ncheerlights_url = \"http://api.thingspeak.com/channels/1417/field/2/last.txt\"\
    \n\nwhile True:\n    try:\n        cheerlights = requests.get(cheerlights_url)\n\
    \        c = cheerlights.content\n        print(c)\n        led.color = Color(c)\n\
    \    except Exception as e:\n        print(e)\n    time.sleep(2)\n```\n\n与本书中所有程序示例一样，您也可以下载此程序（参见配方3.22）。\n\
    \n当您运行程序时，您的LED应立即设置为一种颜色。当有人发推文时，它可能会在一段时间后改变颜色；如果没有，请尝试发送诸如“@cheerlights red”之类的推文，您的LED和世界上其他LED的颜色应该会改变。CheerLights的有效颜色名称包括red、green、blue、cyan、white、oldlace、purple、magenta、yellow、orange和pink。\n\
    \n### 讨论\n\n代码只是向ThingSpeak发送一个Web请求，ThingSpeak返回一个六位十六进制数字的颜色字符串。然后，这被用来设置LED颜色。\n\
    \ntry/except代码用于确保在发生临时网络中断时程序不会崩溃。\n\n### 另请参阅\n\nCheerLights使用ThingSpeak在通道中存储最后一种颜色。在配方17.7中，使用通道来记录传感器数据。\n\
    \n如果您没有Squid，可以使用面包板上的RGB LED（参见配方11.11），或者甚至可以改编配方15.5来控制整个LED灯带。\n\n## 17.7\
    \ 将传感器数据发送到ThingSpeak\n\n### 问题\n\n您希望将传感器数据记录到ThingSpeak，然后查看随时间变化的数据图表。\n\n\
    ### 解决方案\n\n登录ThingSpeak，从Channels下拉菜单中选择My Channels。接下来，通过填写表单顶部来创建一个新通道，如图17-14所示。\n\
    \n您可以将表单的其余部分留空。编辑完成后，点击页面底部的Save Channel。点击API Keys选项卡，查找您可以使用的Web请求摘要，以及您刚创建的通道的密钥（图17-15）。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_504_0.png)\n\n图17-14. 在ThingSpeak中创建通道\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_504_1.png)\n\n图17-15. 指定ThingSpeak通道\n\
    \n您需要将您的API密钥（如图17-15所示的Update Channel Feed - POST中的*api_key*）复制为后续程序中KEY的值。\n\
    \n要将数据发送到通道，必须发送Web请求。发送Web请求的Python程序名为`ch_17_thingspeak_data.py`：\n\n```python\n\
    import time\nfrom gpiozero import CPUTemperature\nimport requests\n\nPERIOD =\
    \ 60 # seconds\nBASE_URL = 'https://api.thingspeak.com/update.json'\nKEY = 'your\
    \ key goes here'\n\ndef send_data(temp):\n    data = {'api_key' : KEY, 'field1'\
    \ : temp}\n    response = requests.post(BASE_URL, json=data)\n\ndef cpu_temp():\n\
    \    cpu_temp = CPUTemperature().temperature\n    return cpu_temp\n\nwhile True:\n\
    \    temp = cpu_temp()\n    print(\"CPU Temp (C): \" + str(temp))\n    send_data(temp)\n\
    \    time.sleep(PERIOD)\n```\n\n与本书中所有程序示例一样，您也可以下载此程序（参见配方3.22）。\n\n运行程序。在ThingSpeak通道页面的Private\
    \ View选项卡上，您应该会看到如图17-16所示的图表。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_505_0.png)\n\
    \n图17-16. 在ThingSpeak中绘制传感器数据图表\n\n随着每个新读数的到来，这将每分钟更新一次。\n\n### 讨论\n\n变量`PERIOD`用于确定每次发送温度后的时间间隔（以秒为单位）。\n\
    \n`send_data`函数构造Web请求，在名为`field1`的参数中提供温度。\n\n如果您的数据可能具有公共利益——例如，准确的环境读数——您可能希望将通道设为公共，以便任何人都可以使用它。对于您的Pi的CPU温度，可能并非如此。\n\
    \n### 另请参阅\n\n有关读取CPU温度的代码说明，请参阅[配方14.11](Recipe 14.11)。\n\n有关将传感器数据导出到电子表格的示例，请参阅[配方14.24](Recipe\
    \ 14.24)。\n\n## 17.8 使用Dweet和IFTTT响应推文\n\n### 问题\n\n您希望您的树莓派在响应推文中的特定标签或提及时执行某些操作。\n\
    \n[配方17.6](Recipe 17.6)实现了这一点，但效率非常低，因为它依赖于您持续使用Web请求进行轮询以查看颜色是否已更改。\n\n### 解决方案\n\
    \n一种不依赖于轮询的有效监控推文机制是使用IFTTT（参见[配方17.4](Recipe 17.4))来识别感兴趣的推文，然后向名为Dweet的服务发送Web请求，该服务可以将通知推送到在您的树莓派上运行的Python程序（[图17-17](Figure\
    \ 17-17)）。\n\n例如，您可以使用Raspberry Squid或连接到面包板的LED，在每次您的用户名在Twitter上被提及时闪烁LED 10秒。\n\
    \n就硬件而言，此配方只需要一些在GPIO 18变高时能产生明显效果的电子设备。这可以是Raspberry Squid的一个通道（参见[配方10.10](Recipe\
    \ 10.10)），也可以是连接到面包板的单个LED（参见[配方11.1](Recipe 11.1)），或者为了最大的灵活性，使用继电器（参见[配方11.5](Recipe\
    \ 11.5)）。使用继电器可以让您创建像[Bubblino](Bubblino)这样的项目，这是一个吹泡泡的Arduino机器人。"
