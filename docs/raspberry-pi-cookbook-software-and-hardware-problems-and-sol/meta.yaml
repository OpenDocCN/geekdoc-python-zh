  md: '# Solution


    The Raspberry Pi GPIO connector has only digital inputs. If you want to measure
    a voltage, you need to use a separate analog-to-digital converter (ADC).


    Use the MCP3008 eight-channel ADC chip. This chip has eight analog inputs, so
    you can connect up to eight sensors to one of these and interface to the chip
    using the Raspberry Pi SPI.


    To make this recipe, you will need the following:


    +   - Breadboard and jumper wires (see “Prototyping Equipment and Kits” on page
    564)

    - MCP3008 eight-channel ADC integrated circuit (IC) (see “Integrated Circuits”
    on page 565)

    - 10kΩ trimpot (see “Resistors and Capacitors” on page 565)


    Figure 14-13 shows the breadboard layout for using this chip. Make sure that you
    get the chip facing the proper direction. The little notch in the package should
    be toward the top of the breadboard.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_413_0.png)'
