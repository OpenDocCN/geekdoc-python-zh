    \nTo use an L293D to control a stepper motor, see [Recipe 12.7](https://www.oreilly.com/library/view/raspberry-pi-cookbook/9781492043218/).\n\
    \n# CHAPTER 13\nDigital Inputs\n\n## 13.0 Introduction\n\nIn this chapter, we\
    \ look at recipes for using digital components such as switches and keypads. This\
    \ chapter also covers modules that have a digital output that can be connected\
    \ to a Raspberry Pi general-purpose input/output (GPIO) acting as an input.\n\
    Many of the recipes require the use of a solderless breadboard and jumper wires\
    \ (see Recipe 10.9).\n\n## 13.1 Connecting a Push Switch\n\n### Problem\n\nYou\
    \ want to connect a switch to your Raspberry Pi so that when you press it, some\
    \ Python code is run.\n\n### Solution\n\nConnect a switch to a GPIO pin and use\
    \ the gpiozero library in your Python program to detect the button press.\n\n\
    To make this recipe, you’ll need the following:\n\n- Breadboard and jumper wires\
    \ (see “Prototyping Equipment and Kits” on page 564)\n- Tactile push switch (see\
    \ “Miscellaneous” on page 567)\n\nFigure 13-1 shows how to connect a tactile push\
    \ switch using a breadboard and jumper wires.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_365_0.png)\n\
    \nFigure 13-1. Connecting a push switch to a Raspberry Pi\n\nAn alternative to\
    \ using a breadboard and tactile switch is to use a Squid Button (Figure 13-2).\
    \ This is a push switch with female header leads soldered to the end, which you\
    \ can directly connect to the GPIO connector (Recipe 10.11).\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_365_1.png)\n\
    \nFigure 13-2. A Squid Button\n\nOpen an editor and paste in the following code\
    \ (ch_13_switch.py):\n\n```\nfrom gpiozero import Button\n\nbutton = Button(18)\n\
    \nwhile True:\n    if button.is_pressed:\n        print(\"Button Pressed\")\n\
    ```\n\nAs with all the program examples in this book, you can also download this\
    \ code (see Recipe 3.22).\n\nThis is what you will see when you run the program\
    \ and as you press the button:\n\n```\npi@raspberrypi ~ $ python3 ch_13_switch.py\n\
    Button Pressed\nButton Pressed\nButton Pressed\nButton Pressed\n```\n\nIn fact,\
    \ the “Button Pressed” messages will probably go shooting off the bottom of the\
    \ screen. This is because the program checks very frequently for button presses.\
    \ Another problem with this code is that while it is watching for button presses,\
    \ it can’t be getting on with other things.\n\nWe can improve on this code, both\
    \ to do something only once when pressed and to allow other things to be going\
    \ on until a button is pressed. You will find these changes in the following code\
    \ (ch_13_switch_2.py):\n\n```\nfrom gpiozero import Button\nfrom time import sleep\n\
    \ndef do_stuff():\n    print(\"Button Pressed\")\n\nbutton = Button(18)\nbutton.when_pressed\
    \ = do_stuff\n\nwhile True:\n    print(\"Busy doing other stuff\")\n    sleep(2)\n\
    ```\n\nWhen you run this program, you will see output like this:\n\n```\n$ python3\
    \ ch_13_switch_2.py\nBusy doing other stuff\nBusy doing other stuff\nButton Pressed\n\
    Busy doing other stuff\nBusy doing other stuff\n```\n\nWhen you press the button,\
    \ the function do_stuff is run, irrespective of what the program is otherwise\
    \ doing. This approach is called using interrupts and is often used in programs\
    \ that need to trigger actions when a button is pressed, but also need to be doing\
    \ other things.\n\nNote that this line:\n\n```\nbutton.when_pressed = do_stuff\n\
    ```\n\nincludes do_stuff without () on the end. This is because we are referring\
    \ to the function, not actually calling it, until the interrupt occurs. In other\
    \ words, we are telling the interrupt handler which function to call when there\
    \ is an interrupt, not asking it to call the function immediately.\n\n### Discussion\n\
    \nNotice that the switch is wired so that when it is pressed, it connects pin\
    \ 18, which is configured as an input to GND.\n\nYou might expect the push switch\
    \ to have just two connections, which are either open or closed. Although some\
    \ of these tactile push switches do have just two connections, most have four\
    \ to provide mechanical strength. Figure 13-3 shows how these connections are\
    \ arranged.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_367_0.png)\n\nActually,\
    \ there are really only two electrical connections, because inside the switch\
    \ package, pins B and C are connected together, as are A and D.\n\n### See Also\n\
    \nFor more information on using a breadboard and jumper wires with the Raspberry\
    \ Pi, see Recipe 10.9.\n\nTo debounce a switch, see Recipe 13.5.\n\nTo use external\
    \ pull-up or pull-down resistors, see Recipe 13.6.\n\n## 13.2 Toggling with a\
    \ Push Switch\n\n### Problem\n\nYou want to create a push switch that toggles\
    \ something between on and off each time you press it.\n\n### Solution\n\nRead\
    \ the last *state* of the button (that is, whether the button is on or off) and\
    \ invert that value each time the button is pressed.\n\nThe following example\
    \ toggles an LED on and off as you press the switch.\n\nTo make this recipe, you\
    \ will need the following:\n\n- Breadboard and jumper wires (see “Prototyping\
    \ Equipment and Kits” on page 564)\n- Tactile push switch (see “Miscellaneous”\
    \ on page 567)\n- LED (see “OptoElectronics” on page 566)\n- 470Ω resistor (see\
    \ “Resistors and Capacitors” on page 565)\n\nFigure 13-4 shows how to connect\
    \ a tactile push switch and LED, using a breadboard and jumper wires.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_368_0.png)\n\
    \nIn addition to the male-to-female jumper wires connecting the Raspberry Pi to\
    \ the breadboard, you also need one male-to-male jumper wire or solid core wire."
  mdcn: "## 讨论\n\n双极步进电机与图12-13所示的单极版本类似，只是线圈上没有红色的中心抽头连接。相同的通电模式对两种变体都同样有效，但对于双极电机，整个线圈中的电流方向必须是可逆的；因此，需要两个H桥。\n\
    \n你可以使用相同的*ch_12_stepper.py*程序来控制这个步进电机（参见配方12.6）。该设计使用了L293D的两个H桥，因此你需要为每个要控制的电机配备一个这样的芯片。\n\
    \n## 另请参阅\n\n如果你拥有的步进电机类型是五线单极步进电机，请参阅配方12.6。\n\n有关步进电机的更多信息——不同类型及其工作原理——请参阅维基百科，那里你还可以找到一个很好的动画解释，说明驱动电机的激活模式。\n\
    \n有关使用伺服电机的信息，请参阅配方12.1；有关控制直流电机的信息，请参阅配方12.4和12.5。\n\n有关在树莓派上使用面包板和跳线的更多信息，请参阅配方10.9。\n\
    \n## 12.8 使用步进电机HAT驱动双极步进电机\n\n### 问题\n\n你想使用单个接口板控制多个双极步进电机。\n\n### 解决方案\n\n\
    使用Adafruit步进电机HAT。\n\n该板能够驱动两个双极步进电机。图12-15显示了该板连接一个双极步进电机的情况，一个线圈连接到M1端子，另一个线圈连接到M2端子。电机的电源在右侧的螺丝端子上单独提供。\n\
    \n### I2C总线\n\n如果你按照[配方10.17](Recipe 10.17)制作了自己的HAT，并按照描述启用了I2C总线0，你需要撤销对`/boot/config.txt`的更改，因为Adafruit会自动检测要使用的I2C总线，如果启用了总线0，它会检测到错误的总线。\n\
    \n在`/boot/config.txt`中，删除或注释掉这一行（在行首加上#）：\n\n```\ndtparam=i2c_vc=on\n```\n\n完成此操作后，重启你的树莓派。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_361_0.png)\n\n该HAT使用I2C，因此请确保你已启用I2C（[配方10.4](Recipe\
    \ 10.4)）。\n\n该板由[优秀的Adafruit教程](excellent Adafruit tutorial)支持。\n\n### 讨论\n\n\
    当你运行Adafruit教程中提供的程序时，电机会开始转动，程序会循环四种不同的步进模式。\n\n### 另请参阅\n\n有关HAT标准以及如何制作自己的HAT的讨论，请参阅[配方10.17](https://www.oreilly.com/library/view/raspberry-pi-cookbook/9781492043218/)。\n\
    \n有关使用此HAT及其附带库的更多信息，请参阅[https://oreil.ly/3a4Jm](https://oreil.ly/3a4Jm)。\n\n\
    要使用L293D控制步进电机，请参阅[配方12.7](https://www.oreilly.com/library/view/raspberry-pi-cookbook/9781492043218/)。\n\
    \n# 第13章\n数字输入\n\n## 13.0 简介\n\n在本章中，我们探讨使用数字组件（如开关和键盘）的配方。本章还涵盖了具有数字输出的模块，这些模块可以连接到作为输入的树莓派通用输入/输出（GPIO）。\n\
    许多配方需要使用无焊面包板和跳线（参见配方10.9）。\n\n## 13.1 连接按钮开关\n\n### 问题\n\n你想将一个开关连接到你的树莓派，以便当你按下它时，运行一些Python代码。\n\
    \n### 解决方案\n\n将开关连接到GPIO引脚，并在你的Python程序中使用gpiozero库来检测按钮按下。\n\n要制作此配方，你需要以下物品：\n\
    \n- 面包板和跳线（参见第564页的“原型设备和套件”）\n- 触觉按钮开关（参见第567页的“杂项”）\n\n图13-1展示了如何使用面包板和跳线连接一个触觉按钮开关。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_365_0.png)\n\n图13-1. 将按钮开关连接到树莓派\n\n\
    使用面包板和触觉开关的替代方案是使用Squid Button（图13-2）。这是一个按钮开关，末端焊接有母头引线，你可以直接将其连接到GPIO连接器（配方10.11）。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_365_1.png)\n\n图13-2. Squid Button\n\
    \n打开一个编辑器并粘贴以下代码（ch_13_switch.py）：\n\n```\nfrom gpiozero import Button\n\nbutton\
    \ = Button(18)\n\nwhile True:\n    if button.is_pressed:\n        print(\"Button\
    \ Pressed\")\n```\n\n与本书中的所有程序示例一样，你也可以下载此代码（参见配方3.22）。\n\n当你运行程序并按下按钮时，你会看到：\n\
    \n```\npi@raspberrypi ~ $ python3 ch_13_switch.py\nButton Pressed\nButton Pressed\n\
    Button Pressed\nButton Pressed\n```\n\n实际上，“Button Pressed”消息可能会很快从屏幕底部消失。这是因为程序非常频繁地检查按钮按下。这段代码的另一个问题是，当它监视按钮按下时，它无法处理其他事情。\n\
    \n我们可以改进这段代码，使其在按下时只执行一次操作，并允许在按钮按下之前处理其他事情。你将在以下代码（ch_13_switch_2.py）中找到这些更改：\n\
    \n```\nfrom gpiozero import Button\nfrom time import sleep\n\ndef do_stuff():\n\
    \    print(\"Button Pressed\")\n\nbutton = Button(18)\nbutton.when_pressed = do_stuff\n\
    \nwhile True:\n    print(\"Busy doing other stuff\")\n    sleep(2)\n```\n\n当你运行此程序时，你会看到如下输出：\n\
    \n```\n$ python3 ch_13_switch_2.py\nBusy doing other stuff\nBusy doing other stuff\n\
    Button Pressed\nBusy doing other stuff\nBusy doing other stuff\n```\n\n当你按下按钮时，函数do_stuff会被运行，无论程序当时正在做什么。这种方法称为使用中断，常用于需要在按钮按下时触发操作，但也需要处理其他事情的程序中。\n\
    \n注意这一行：\n\n```\nbutton.when_pressed = do_stuff\n```\n\n包含do_stuff但没有末尾的()。这是因为我们引用的是函数，而不是在中断发生之前实际调用它。换句话说，我们是在告诉中断处理程序在发生中断时调用哪个函数，而不是要求它立即调用该函数。\n\
    \n### 讨论\n\n注意开关的接线方式，当它被按下时，它将引脚18（配置为输入）连接到GND。\n\n你可能期望按钮开关只有两个连接，它们要么是断开的，要么是闭合的。虽然一些触觉按钮开关确实只有两个连接，但大多数有四个以提供机械强度。图13-3展示了这些连接的排列方式。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_367_0.png)\n\n实际上，只有两个电气连接，因为在开关封装内部，引脚B和C连接在一起，A和D也连接在一起。\n\
    \n### 另请参阅\n\n有关在树莓派上使用面包板和跳线的更多信息，请参阅配方10.9。\n\n要消除开关抖动，请参阅配方13.5。\n\n要使用外部上拉或下拉电阻，请参阅配方13.6。\n\
    \n## 13.2 使用按钮开关进行切换\n\n### 问题\n\n你想创建一个按钮开关，每次按下时都在开和关之间切换某个东西。\n\n### 解决方案\n\
    \n读取按钮的最后*状态*（即按钮是开还是关），并在每次按下按钮时反转该值。\n\n以下示例在按下开关时切换LED的开和关。\n\n要制作此配方，你需要以下物品：\n\
    \n- 面包板和跳线（参见第564页的“原型设备和套件”）\n- 触觉按钮开关（参见第567页的“杂项”）\n- LED（参见第566页的“光电子”）\n\
    - 470Ω电阻（参见第565页的“电阻和电容”）\n\n图13-4展示了如何使用面包板和跳线连接一个触觉按钮开关和LED。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_368_0.png)\n\
    \n除了将树莓派连接到面包板的公对母跳线外，你还需要一根公对公跳线或实芯线。"
