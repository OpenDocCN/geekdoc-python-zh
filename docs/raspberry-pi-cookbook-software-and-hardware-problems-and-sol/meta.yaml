    # 10.9 Using a Breadboard with Jumper Leads


    # Problem


    You want to do some electronic prototyping using your Raspberry Pi and a solderless
    breadboard.


    # Solution


    Use male-to-female jumper wires and a GPIO pin label template like the Raspberry
    Leaf (Figure 10-12).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_294_0.png)


    Figure 10-12. Connecting Raspberry Pi to a breadboard using male-to-female jumper
    wires


    # Discussion


    It’s not always easy to identify the pins that you want on a bare Raspberry Pi
    board. You can greatly simplify this by printing out a template, like the Raspberry
    Leaf, to fit over the pins.'
  - '[PAGE 295]


    It''s also useful to have a selection of male-to-male jumper wires for making
    connections from one part of the breadboard to another.


    Female-to-female jumper wires are useful for connecting modules with male header
    pins directly to the Raspberry Pi, when no other components might warrant the
    use of a breadboard.


    A good way of getting a breadboard, Raspberry Leaf, and set of jumper wires is
    to buy a starter kit based around a breadboard, like the [Project Box 1 kit for
    Raspberry Pi from MonkMakes](https://monkmakes.com).


    # See Also


    We fully discuss an example of connecting an LED in [Recipe 11.1](#recipe-11-1).


    # 10.10 Using a Raspberry Squid


    # Problem


    You want to connect an RGB LED to your Raspberry Pi without having to build something
    on a breadboard.


    # Solution


    Use a Raspberry Squid RGB LED ([Figure 10-13](#figure-10-13)).


    The Raspberry Squid is an RGB LED with built-in series resistors and female header
    leads; thus, it can be plugged directly onto the GPIO pins of a Raspberry Pi.
    The Squid has color-coded leads. The black lead goes to one of the GPIO GND pins,
    and the red, green, and blue leads go to GPIO pins used for the red, green, and
    blue channels. The red, green, and blue outputs can be simple digital outputs
    or pulse-width modulation (PWM) outputs ([Recipe 11.3](#recipe-11-3)) that allow
    you to mix different colors.


    You can find [instructions for making your own Squid](#instructions), but you
    can also buy a [ready-made Squid](#ready-made).


    The `gpiozero` Python library comes pre-installed on Raspberry Pi OS and has support
    for RGB LEDs like the Squid.'
  - '[PAGE 296]


    ![](img/e36e77524aeaae366529d1cf02f9a39c_296_0.png)


    Figure 10-13. The Raspberry Squid


    As with all the program examples in this book, you can download this program (see
    Recipe 3.22). The file is called ch_10_squid_test.py. This program tells you pretty
    much all you need to know about using the Raspberry Squid:


    ```

    from gpiozero import RGBLED

    from time import sleep

    from colorzero import Color


    led = RGBLED(18, 23, 24)

    led.color = Color(''red'')

    sleep(2)

    led.color = Color(''green'')

    sleep(2)

    led.color = Color(''blue'')

    sleep(2)

    led.color = Color(''white'')

    sleep(2)

    ```'
  - '[PAGE 297]


    Having imported the various modules you need, you can create a new RGBLED object,
    supplying the three pins to be used for its red, green, and blue channels (in
    this case, 18, 23, and 24). You can then set the color by using the `led.color
    =` command, which expects a color.


    The color is supplied using the `Color` class from the `colorzero` module. This
    enables you to specify a color by name, as we did here (most work), or by specifying
    the separate red, green, and blue color values. For example, the following would
    set the LED to red:


    ```

    led.color = Color(255, 0, 0)

    ```


    After the color is set, `time.sleep(2)` is used to create a two-second delay before
    the next color change.


    # Discussion


    You do not need to use all three color channels of a Squid, and it can be quite
    handy to just check that a GPIO pin is turning on and off as you expect before
    attaching some other electronics to it.


    # See Also


    For information on the Squid Button, see [Recipe 10.11](Recipe 10.11).


    [Recipe 11.11](Recipe 11.11) is an example project that controls an RGB LED (Squid-
    or breadboard-based).


    # 10.11 Using a Raspberry Squid Button


    # Problem


    You want to connect a push switch to your Raspberry Pi without having to build
    something on a breadboard.


    # Solution


    Use a Squid Button.


    The Squid Button ([Figure 10-14](Figure 10-14)) is a push button with female header
    leads connected to the contacts so that you can plug it directly into the GPIO
    connector of a Raspberry Pi. The Squid Button also includes a low-value resistor
    that limits the current that would flow if the Squid Button were to be accidentally
    connected to a digital output rather than a digital input.'
- md: "## 10.11 Using the Squid Button\n\nYou can use the Squid Button directly with\
    \ the gpiozero library, as the following example shows. As with all the program\
    \ examples in this book, you can download it (see Recipe 3.22). The file is called\
    \ ch_10_button_test.py:\n\n```python\nfrom gpiozero import Button\nimport time\n\
    \nbutton = Button(7)\n\nwhile True:\n    if button.is_pressed:\n        print(time.time())\n\
    ```\n\nThe number (in this case, 7) indicates the GPIO pin that the button is\
    \ connected to. The other pin is connected to GND.\n\nWhen the button is pressed,\
    \ the timestamp in seconds is printed.\n\n### Discussion\n\nThe Squid Button is\
    \ useful for testing projects that use a digital input, but because the button\
    \ is suitable for panel mounting, you can also build it into more permanent projects.\n\
    \n### See Also\n\nFor more information on using switches, see Recipes 13.1 through\
    \ 13.6.\n\nFor information on the Squid RGB LED, see Recipe 10.10.\n\n## 10.12\
    \ Converting 5V Signals to 3.3V with Two Resistors\n\n### Problem\n\nThe Raspberry\
    \ Pi operates at 3.3V, but you want to connect the 5V output of an external module\
    \ to a GPIO pin on the Pi without damaging it.\n\n### Solution\n\nUse a pair of\
    \ resistors as a potential divider to reduce the output voltage. Figure 10-15\
    \ shows how you might use the 5V serial connection of an Arduino Uno to a Raspberry\
    \ Pi.\n\nOn the Raspberry Pi, GPIO14 is also the TXD pin and GPIO15 is the RXD\
    \ pin.\nTo make this recipe, you will need:\n\n- 270Ω resistor (see “Resistors\
    \ and Capacitors” on page 565 in Appendix A)\n- 470Ω resistor (see “Resistors\
    \ and Capacitors” on page 565 in Appendix A)\n\nThe TXD signal from the Pi is\
    \ a 3.3V output. This can be connected directly to a 5V input on the Arduino without\
    \ any problem. The Arduino module will recognize anything over about 2.5V as being\
    \ high.\n\nThe problem arises when you need to connect the 5V output of the Arduino\
    \ module to the RXD pin of the Pi. You *must not* connect this directly to the\
    \ RXD input—the 5V signal could damage the Pi. Instead, the two resistors shown\
    \ in Figure 10-15 are used.\n\n### Discussion\n\nThe resistors used here will\
    \ draw a current of 6mA. Given that the Pi uses a fairly hefty 500mA, this will\
    \ not noticeably affect the current consumption of the Pi.\n\nIf you want to minimize\
    \ the current used by the potential divider, use larger value resistors, scaled\
    \ proportionally—for example, 27kΩ and 47kΩ, which will draw a miserly 60μA.\n\
    \n### See Also\n\nIf you have multiple signals to convert between 3.3V and 5V,\
    \ it’s probably best to use a multichannel level converter module—see Recipe 10.13.\n\
    \n## 10.13 Converting 5V Signals to 3.3V with a Level Converter Module\n\n###\
    \ Problem\n\nThe Raspberry Pi operates at 3.3V. You want to connect a number of\
    \ 5V digital pins to GPIO pins on the Pi without damaging it.\n\n### Solution\n\
    \nUse a bidirectional level converter module, such as the ones shown in Figure\
    \ 10-16.\n\nThese modules are very easy to use. One side has the power supply\
    \ at one voltage and a number of channels that can be either inputs or outputs\
    \ at that voltage. The pins on the other side of the module have a power pin at\
    \ the second voltage, and all the inputs and outputs on that side are automatically\
    \ converted to the voltage level for that side.\n\n### Discussion\n\nThese level\
    \ converters are available with differing numbers of channels. The two shown in\
    \ Figure 10-16 have four and eight channels.\nYou can find sources for such level\
    \ converters in Appendix A.\n\n### See Also\n\nSee Recipe 10.12, especially if\
    \ you have only one or two levels to convert.\nNormally 5V logic inputs will accept\
    \ 3.3V outputs without a problem; however, in some instances, such as when using\
    \ LED strips (Recipe 15.5), this might not be the case, and thus you could use\
    \ one of the just-described modules to raise the logic level.\n\n## 10.14 Powering\
    \ a Raspberry Pi with a LiPo Battery\n\n### Problem\n\nYou want to power your\
    \ Raspberry Pi from a 3.7V lithium-ion polymer (LiPo) battery.\n\n### Solution\n\
    \nUse a boost regulator module (Figure 10-17). The module shown is from SparkFun,\
    \ but similar, less-expensive designs are available on eBay.\n\nAs always with\
    \ such low-cost purchases from eBay, you should test the module thoroughly before\
    \ using it. They do not always work exactly as advertised, and quality can be\
    \ quite variable.\n\nThe advantage of this kind of module is that it acts as a\
    \ voltage regulator to supply 5V to the Pi and also has a USB socket of its own\
    \ to supply power to its charging circuit. If you plug the Pi's power adapter\
    \ into the socket on the charger, the Pi will be powered and the battery charged,\
    \ allowing you to unplug the USB power and use the Pi on the battery for as long\
    \ as it has enough power.\n\nWith a 1300mA LiPo battery, you can expect the Pi\
    \ to be powered for two or three hours.\n\n### Discussion\n\nIf you plan to handle\
    \ the charging of the battery elsewhere, you can just go for a boost converter\
    \ module, without the charger, at a lower cost.\n\nBattery power is far more practical\
    \ for earlier versions of Raspberry Pi such as models 2 and 3, but the 4 uses\
    \ a lot more current (a 3A power supply is recommended).\n\nAlternatively there\
    \ are LiPo battery-based portable 5V USB battery packs that can be used to power\
    \ your Raspberry Pi and effectively replicate the previously described approach,\
    \ but as a cased consumer product. But make sure you get one that can supply enough\
    \ current for your model of Raspberry Pi (see Recipe 1.4).\n\n### See Also\n\n\
    Find out more about SparkFun's charger booster module at https://oreil.ly/UoXQm.\n\
    \n## 10.15 Getting Started with the Sense HAT\n\n### Problem\n\nYou want to know\
    \ how to use a Raspberry Pi Sense HAT.\n\n### Solution\n\nThe Raspberry Pi Sense\
    \ HAT (Figure 10-18) is a useful and somewhat confusingly named interface board\
    \ for the Raspberry Pi. Yes, it includes sensors—in fact, it can measure temperature,\
    \ relative humidity, and atmospheric pressure (Recipe 14.12). It also has an accelerometer,\
    \ a gyroscope (Recipe 14.16), and a magnetometer (Recipe 14.15) for navigation-type\
    \ projects. It also has a full-color 8×8 LED matrix display (Recipe 15.3).\n\n\
    Put the Sense HAT onto your Raspberry Pi before powering it up.\nRaspberry Pi\
    \ OS already includes all the software that you need for the Sense HAT.\nThe Sense\
    \ HAT uses I2C, so you need to follow the usual I2C setup (Recipe 10.4).\n\n###\
    \ Discussion\n\nMore recipes that use the Sense HAT are in this book, but for\
    \ now, you can just check that everything is working by using the following to\
    \ open a Python console:\n\n```\n$ sudo python3\n```\n\nThen enter the following\
    \ commands into the console:\n\n```\n>>> from sense_hat import SenseHat\n>>> hat\
    \ = SenseHat()\n>>> hat.show_message('Raspberry Pi Cookbook')\n```\n\nThe message\
    \ “Raspberry Pi Cookbook” should then scroll across the screen of the LED matrix.\n\
    \n### See Also\n\nSee the programming reference for the Sense HAT.\nTo measure\
    \ temperature, humidity, and atmospheric pressure, see Recipe 14.12.\nTo use the\
    \ Sense HAT’s accelerometer and gyroscope, see Recipe 14.16.\nTo use the magnetometer\
    \ to detect north and detect the presence of a magnet, see Recipes 14.15 and 14.18,\
    \ respectively.\n\n## 10.16 Getting Started with the Explorer HAT Pro\n\n### Problem\n\
    \nYou want to know how to get started with the Pimoroni Explorer HAT Pro.\n\n\
    ### Solution\n\nPlug the HAT into your Raspberry Pi and install the explorerhat\
    \ Pro Python library.\nFigure 10-19 shows a Pimoroni Explorer HAT Pro on a Raspberry\
    \ Pi B+.\n\nThe Explorer HAT Pro has some useful input/output options as well\
    \ as an area where a small solderless breadboard can be attached. Some of its\
    \ features are:\n\n- 4 LEDs\n- 4 buffered inputs\n- 4 buffered outputs (up to\
    \ 500mA)\n- 4 analog inputs\n- 2 low-power motor drivers (max 200mA)\n- 4 capacitive\
    \ touch pads\n- 4 capacitive crocodile clip pads"
  mdcn: "## 10.11 使用 Squid 按钮\n\n你可以直接使用 gpiozero 库来操作 Squid 按钮，如下例所示。与本书中所有程序示例一样，你可以下载它（参见配方\
    \ 3.22）。该文件名为 ch_10_button_test.py：\n\n```python\nfrom gpiozero import Button\n\
    import time\n\nbutton = Button(7)\n\nwhile True:\n    if button.is_pressed:\n\
    \        print(time.time())\n```\n\n数字（本例中为 7）表示按钮连接的 GPIO 引脚。另一个引脚连接到 GND。\n\n\
    当按钮被按下时，会打印以秒为单位的时间戳。\n\n### 讨论\n\nSquid 按钮对于测试使用数字输入的项目很有用，但由于该按钮适用于面板安装，你也可以将其集成到更永久性的项目中。\n\
    \n### 另请参阅\n\n有关使用开关的更多信息，请参阅配方 13.1 至 13.6。\n\n有关 Squid RGB LED 的信息，请参阅配方 10.10。\n\
    \n## 10.12 使用两个电阻将 5V 信号转换为 3.3V\n\n### 问题\n\n树莓派以 3.3V 运行，但你想将外部模块的 5V 输出连接到树莓派的\
    \ GPIO 引脚，而不损坏它。\n\n### 解决方案\n\n使用一对电阻作为分压器来降低输出电压。图 10-15 展示了如何将 Arduino Uno\
    \ 的 5V 串行连接用于树莓派。\n\n在树莓派上，GPIO14 也是 TXD 引脚，GPIO15 是 RXD 引脚。\n要制作此配方，你需要：\n\n\
    - 270Ω 电阻（参见附录 A 第 565 页的“电阻和电容”）\n- 470Ω 电阻（参见附录 A 第 565 页的“电阻和电容”）\n\n来自树莓派的\
    \ TXD 信号是 3.3V 输出。这可以直接连接到 Arduino 的 5V 输入，不会有任何问题。Arduino 模块会将大约 2.5V 以上的任何电压识别为高电平。\n\
    \n当你需要将 Arduino 模块的 5V 输出连接到树莓派的 RXD 引脚时，问题就出现了。你*绝不能*将其直接连接到 RXD 输入——5V 信号可能会损坏树莓派。相反，应使用图\
    \ 10-15 所示的两个电阻。\n\n### 讨论\n\n这里使用的电阻将消耗 6mA 的电流。考虑到树莓派本身消耗相当可观的 500mA，这不会明显影响树莓派的电流消耗。\n\
    \n如果你想最小化分压器消耗的电流，请使用阻值更大的电阻，按比例缩放——例如，27kΩ 和 47kΩ，它们将仅消耗微不足道的 60μA。\n\n### 另请参阅\n\
    \n如果你有多个信号需要在 3.3V 和 5V 之间转换，最好使用多通道电平转换器模块——参见配方 10.13。\n\n## 10.13 使用电平转换器模块将\
    \ 5V 信号转换为 3.3V\n\n### 问题\n\n树莓派以 3.3V 运行。你想将多个 5V 数字引脚连接到树莓派的 GPIO 引脚，而不损坏它。\n\
    \n### 解决方案\n\n使用双向电平转换器模块，例如图 10-16 所示的模块。\n\n这些模块非常易于使用。一侧具有特定电压的电源和多个通道，这些通道可以是该电压下的输入或输出。模块另一侧的引脚具有第二个电压的电源引脚，该侧的所有输入和输出都会自动转换为该侧的电压电平。\n\
    \n### 讨论\n\n这些电平转换器有不同的通道数。图 10-16 中显示的两个模块分别有四个和八个通道。\n你可以在附录 A 中找到此类电平转换器的来源。\n\
    \n### 另请参阅\n\n参见配方 10.12，特别是如果你只有一两个电平需要转换。\n通常，5V 逻辑输入可以毫无问题地接受 3.3V 输出；然而，在某些情况下，例如使用\
    \ LED 灯带（配方 15.5）时，情况可能并非如此，因此你可以使用刚才描述的模块之一来提升逻辑电平。\n\n## 10.14 使用 LiPo 电池为树莓派供电\n\
    \n### 问题\n\n你想用一块 3.7V 锂离子聚合物（LiPo）电池为你的树莓派供电。\n\n### 解决方案\n\n使用升压稳压器模块（图 10-17）。图中所示的模块来自\
    \ SparkFun，但 eBay 上也有类似且更便宜的设计。\n\n与从 eBay 购买此类低成本商品一样，在使用前应彻底测试该模块。它们并不总是完全如广告所言那样工作，质量可能参差不齐。\n\
    \n这类模块的优点在于，它既可以作为稳压器为树莓派提供 5V 电压，又自带一个 USB 插座为其充电电路供电。如果你将树莓派的电源适配器插入充电器的插座，树莓派将被供电，同时电池也会充电，这样你就可以拔掉\
    \ USB 电源，只要电池电量充足，就可以使用电池为树莓派供电。\n\n使用 1300mA 的 LiPo 电池，你可以预期树莓派能运行两到三个小时。\n\n\
    ### 讨论\n\n如果你打算在其他地方处理电池充电，你可以只选择一个升压转换器模块，不带充电器，成本更低。\n\n电池供电对于早期版本的树莓派（如型号 2\
    \ 和 3）来说要实用得多，但型号 4 消耗的电流要大得多（建议使用 3A 电源）。\n\n或者，也有基于 LiPo 电池的便携式 5V USB 电池组，可用于为你的树莓派供电，实际上复制了前面描述的方法，但作为带外壳的消费产品。但请确保你购买的电池组能为你的树莓派型号提供足够的电流（参见配方\
    \ 1.4）。\n\n### 另请参阅\n\n在 https://oreil.ly/UoXQm 了解更多关于 SparkFun 充电器升压模块的信息。\n\n\
    ## 10.15 Sense HAT 入门\n\n### 问题\n\n你想知道如何使用树莓派 Sense HAT。\n\n### 解决方案\n\n树莓派 Sense\
    \ HAT（图 10-18）是一个有用且名称有些令人困惑的树莓派接口板。是的，它包含传感器——事实上，它可以测量温度、相对湿度和大气压（配方 14.12）。它还有一个加速度计、一个陀螺仪（配方\
    \ 14.16）和一个磁力计（配方 14.15），用于导航类项目。它还有一个全彩 8×8 LED 矩阵显示屏（配方 15.3）。\n\n在通电之前，将 Sense\
    \ HAT 安装到你的树莓派上。\n树莓派操作系统已经包含了 Sense HAT 所需的所有软件。\nSense HAT 使用 I2C，因此你需要遵循通常的\
    \ I2C 设置（配方 10.4）。\n\n### 讨论\n\n本书中还有更多使用 Sense HAT 的配方，但现在，你可以通过以下方式打开一个 Python\
    \ 控制台来检查一切是否正常工作：\n\n```\n$ sudo python3\n```\n\n然后在控制台中输入以下命令：\n\n```\n>>> from\
    \ sense_hat import SenseHat\n>>> hat = SenseHat()\n>>> hat.show_message('Raspberry\
    \ Pi Cookbook')\n```\n\n然后，“Raspberry Pi Cookbook”消息应该会在 LED 矩阵的屏幕上滚动显示。\n\n###\
    \ 另请参阅\n\n参见 Sense HAT 的编程参考。\n要测量温度、湿度和大气压，请参阅配方 14.12。\n要使用 Sense HAT 的加速度计和陀螺仪，请参阅配方\
    \ 14.16。\n要使用磁力计检测北方和检测磁铁的存在，请分别参阅配方 14.15 和 14.18。\n\n## 10.16 Explorer HAT Pro\
    \ 入门\n\n### 问题\n\n你想知道如何开始使用 Pimoroni Explorer HAT Pro。\n\n### 解决方案\n\n将 HAT 插入你的树莓派并安装\
    \ explorerhat Pro Python 库。\n图 10-19 展示了安装在树莓派 B+ 上的 Pimoroni Explorer HAT Pro。\n\
