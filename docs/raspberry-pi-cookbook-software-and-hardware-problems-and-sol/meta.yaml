  md: '# CHAPTER 3

    Operating System


    # 3.0 Introduction


    This chapter explores many aspects of the Linux operating system used by the Raspberry
    Pi. A lot of this involves the use of the command line. If you are used to Windows
    or macOS, this can come as a bit of a shock. However, when you get used to it,
    doing things with the command line can be surprisingly effective.


    You can accomplish many simple file operations like moving files around, renaming,
    copying, and deleting files graphically using a more Windows or macOS approach,
    and this is the subject of our first recipe.


    # 3.1 Browsing Files Graphically


    # Problem


    You want to move files around using a graphical interface like you can on a macOS-based
    machine or Windows PC.


    # Solution


    Use the File Manager.


    You can find this program on the Raspberry Menu, in the Accessories group (Figure
    3-1).'
  merge: -1
  pgno: 88
- img_proc: true
  md: 'Using the File Manager, you can drag a file or directory from one directory
    to another or use the Edit menu to copy a file from one location and paste it
    to a second. This operates in much the same way as the Windows File Explorer or
    macOS Finder.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_89_0.png)


    *Figure 3-1. The File Manager*


    # Discussion


    The lefthand side of the File Manager shows the folder structure.


    The central area displays the files in the current folder, which you can navigate
    using the buttons in the toolbar or by typing a location in the filepath area
    at the top.


    You can right-click a file to open a menu with options you can use on that file
    (Figure 3-2).


    You can also select more than one file at a time for copying or dragging by holding
    down the Ctrl key while you select files, or you can select a range of files by
    selecting one file and then holding down the Shift key while you select the last
    file in the range.'
  merge: -1
  pgno: 89
- img_proc: true
  md: '![](img/e36e77524aeaae366529d1cf02f9a39c_90_0.png)


    Figure 3-2. Right-clicking a file opens a menu with more options


    # See Also


    To rename a file or folder, see [Recipe 3.6](Recipe 3.6).


    # 3.2 Copying Files onto a USB Flash Drive


    # Problem


    You want to copy a file from your Raspberry Pi onto a USB flash drive.


    # Solution


    Insert the USB flash drive into a USB port, and the dialog shown in [Figure 3-3](Figure
    3-3) should appear. Select OK to open it in the File Manager.'
  merge: -1
  pgno: 90
- img_proc: true
  md: '![](img/e36e77524aeaae366529d1cf02f9a39c_91_0.png)


    Figure 3-3. The removable-media dialog box


    The drive will be mounted in /media/pi followed by the name of the flash drive
    (in my case, UNTITLED). To copy a file from your home folder, drag it onto the
    folder representing your flash drive, as shown in Figure 3-4.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_91_1.png)


    Figure 3-4. Copying a file by dragging it onto a USB flash drive'
  merge: -1
  pgno: 91
- img_proc: true
  md: 'Windows, macOS, and Linux all have their own disk formats. The USB flash drive
    should be formatted as FAT32 or exFAT for maximum compatibility with macOS and
    Windows computers. exFAT supports larger disk sizes than FAT32.


    # Discussion


    After your USB flash drive is mounted on the Raspberry Pi''s filesystem, you can
    also copy files using the command line. The following example copies the file
    *test.txt* to the flash drive:


    ```

    $ cd /home/pi

    $ cp test.txt /media/pi/UNTITLED/

    ```


    In this example, cd is the command to change your current directory, and cp is
    the copy command. These commands are explained more fully in Recipes 3.4 and 3.5.


    # See Also


    For general information on using the File Manager, see Recipe 3.1.

    To copy files from the command line, see Recipe 3.4.


    # 3.3 Starting a Terminal Session


    # Problem


    When using a Raspberry Pi, you need to issue text commands in a Terminal.


    # Solution


    At the top of the Raspberry Pi desktop, select the Terminal icon (it looks like
    a black computer monitor), or, on the Raspberry Menu, in the Accessories group,
    select the Terminal option (Figure 3-5).'
  merge: -1
  pgno: 92
- img_proc: true
  md: '![](img/e36e77524aeaae366529d1cf02f9a39c_93_0.png)


    Figure 3-5. Opening the Terminal


    # Discussion


    When the Terminal starts, it is set to your home directory (/home/pi).


    You can open as many Terminal sessions as you want. It is often useful to have
    a couple of sessions open in different directories so that you don''t need to
    constantly switch directories using cd (Recipe 3.4).


    When using the Terminal, everything is case sensitive. That is, if you are using
    a command, you must use the correct case when you''re typing. For example, the
    ls command that you will meet in the next recipe must be typed as ls and not LS
    or Ls or lS. Similarly, all filenames are case sensitive, so files named picture.jpg
    and Picture.jpg are two different files.'
