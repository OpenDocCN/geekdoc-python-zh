    \ 11.4. However, you should place a diode across the motor to prevent voltage\
    \ spikes from damaging the transistor or even the Raspberry Pi. The 1N4001 is\
    \ a suitable diode for this. The diode has a stripe at one end, so make sure that\
    \ this is facing the proper direction (Figure 12-8).\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_349_0.png)\n\
    \nFigure 12-8. Controlling a high-power motor\n\nYou'll need the following:\n\n\
    - 3V to 12V DC motor\n- Breadboard and jumper wires (see “Prototyping Equipment\
    \ and Kits” on page 564)\n- 1kΩ resistor (see “Resistors and Capacitors” on page\
    \ 565)\n- MOSFET transistor FQP30N06L (see “Transistors and Diodes” on page 565)\n\
    - Diode 1N4001 (see “Transistors and Diodes” on page 565)\n- Power supply with\
    \ voltage to match the motor\n\nAs with all the program examples in this book,\
    \ you can download this program (see Recipe 3.22). The file is called ch_12_gui_slider.py.\n\
    \nNote that this program uses a GUI, so you can’t run it from SSH. You must run\
    \ it from the windowing environment on the Pi itself or via remote control using\
    \ VNC (Recipe 2.8).\n\n### Discussion\n\nIf you are using only a low-power DC\
    \ motor (less than 200mA), you can use a smaller (and cheaper) transistor such\
    \ as the 2N3904 (see “Transistors and Diodes” on page 565). Figure 12-9 shows\
    \ the breadboard layout to use a 2N3904.\n\nYou can probably get away with powering\
    \ a small motor from the 5V supply line on the GPIO connector. If you find that\
    \ the Raspberry Pi crashes, use an external power supply, as shown in Figure 12-8.\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_350_0.png)\n\n### See Also\n\nFor more\
    \ information on using a breadboard and jumper wires with the Raspberry Pi, see\
    \ Recipe 10.9.\n\nThis design controls only the motor’s speed. It can’t control\
    \ its direction. For that, you need to see Recipe 12.5.\n\n## 12.5 Controlling\
    \ the Direction of a DC Motor\n\n### Problem\n\nYou want to control both the speed\
    \ and direction of a small DC motor.\n\n### Solution\n\nUse an H-bridge chip or\
    \ module, the most common chip being the L293D. These are low cost and easy to\
    \ use. Other H-bridge chips or modules usually use the same pair of control pins\
    \ for the direction of each motor (see the discussion).\n\nThe L293D chip is actually\
    \ capable of driving two motors without any extra hardware. The Discussion also\
    \ mentions a few other options for controlling DC motors. To try out the L293D\
    \ to control a motor, you’ll need the following:\n\n- 3V to 12V DC motor\n- Breadboard\
    \ and jumper wires (male-to-female; see “Prototyping Equipment and Kits” on page\
    \ 564)\n- L293D chip (see “Integrated Circuits” on page 565)\n- Power supply with\
    \ voltage to match the motor\n\nFigure 12-10 shows the breadboard layout.\n\n\
    ![](img/e36e77524aeaae366529d1cf02f9a39c_351_0.png)\n\nMake sure the chip is facing\
    \ the proper direction: it has a notch at the top, which is the end that should\
    \ be at the top of the breadboard.\n\nThe test program for this recipe (*ch_12_motor_control.py*)\
    \ allows you to enter the letter *f* or *r* and then a single digit between 0\
    \ and 9. The motor will then go either forward or backward at a speed specified\
    \ by the digit—0 for stopped, 9 for full speed:\n\n```\n$ python3 ch_12_motor_control.py\n\
    Command, f/r 0..9, E.g. f5 :f5\nCommand, f/r 0..9, E.g. f5 :f1\nCommand, f/r 0..9,\
    \ E.g. f5 :f2\nCommand, f/r 0..9, E.g. f5 :r2\n```\n\nOpen an editor and paste\
    \ in the following code. As with all the program examples in this book, you can\
    \ also download it (see Recipe 3.22).\n\nThis program uses the command line, so\
    \ you can run it from SSH or the Terminal:\n\n```\nfrom gpiozero import Motor\n\
    \nmotor = Motor(forward=23, backward=24)\n\nwhile True:\n    cmd = input(\"Command,\
    \ f/r 0..9, E.g. f5 :\")\n    direction = cmd[0]\n    speed = float(cmd[1]) /\
    \ 10.0\n    if direction == \"f\":\n        motor.forward(speed=speed)\n    else:\n\
    \        motor.backward(speed=speed)\n```\n\ngpiozero conveniently has a class\
    \ called Motor that we can use to control both the speed and direction of a single\
    \ DC motor. When you create an instance of the class, you need to specify the\
    \ forward and backward control pins.\n\nThe forward and backward methods of Motor\
    \ take an optional parameter of speed between 0 and 1, where 1 is full speed.\n\
    \n### Discussion\n\nThe Motor class of gpiozero hides the complexity of the H-bridge's\
    \ hardware.\n\nFigure 12-11 shows how an H-bridge works, using switches rather\
    \ than transistors or a chip. By reversing the polarity across the motor, an H-bridge\
    \ also reverses the direction in which the motor turns.\n\nIn Figure 12-11, S1\
    \ and S4 are closed and S2 and S3 are open. This allows current to flow through\
    \ the motor, with terminal A being positive and terminal B being negative. If\
    \ we were to reverse the switches, so that S2 and S3 are closed and S1 and S4\
    \ are open, B would be positive and A would be negative, and the motor would turn\
    \ in the opposite direction.\n\nHowever, you might have spotted a danger with\
    \ this circuit. If by some chance S1 and S2 are both closed, the positive supply\
    \ will be directly connected to the negative supply, and you will have a short\
    \ circuit. The same is true if S3 and S4 are both closed at the same time.\n\n\
    ![](img/e36e77524aeaae366529d1cf02f9a39c_353_0.png)\n\nFigure 12-11. An H-bridge\n\
    \nAlthough you can use individual transistors to make an H-bridge, it is simpler\
    \ to use an H-bridge integrated circuit (IC) such as the L293D. This chip actually\
    \ has two H-bridges in it, so you can use it to control two motors. It also has\
    \ logic to ensure that the equivalent of closing both S1 and S2 cannot happen.\n\
    \nThe L293D uses two control pins for each of the two motor control channels:\
    \ a *forward* pin and a *backward* pin. If the forward pin (23) is high and the\
    \ backward pin (24) is low, the motor will turn in one direction. If those two\
    \ pins are reversed, the motor will turn in the opposite direction.\n\nAs an alternative\
    \ to using an L293D on a breadboard, very low-cost modules are available from\
    \ eBay that include a L293D on a printed circuit board (PCB) with screw terminals\
    \ to attach motors and header pins to link directly to the Raspberry Pi GPIO connector.\
    \ You can find high-power motor controller modules that operate on the same principles\
    \ but at much higher currents, even up to 20A or more. [Pololu](https://www.pololu.com/)\
    \ has an impressive range of such motor controller boards."
