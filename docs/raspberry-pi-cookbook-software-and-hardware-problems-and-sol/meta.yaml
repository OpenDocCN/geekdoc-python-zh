    # Discussion


    The variable `PERIOD` is used to determine the time interval in seconds after
    each sending of the temperature.


    The `send_data` function constructs the web request, supplying the temperature
    in a parameter called `field1`.


    If your data might be something of public interest—say, accurate environmental
    readings—you might want to make the channel public so that anyone can make use
    of it. This probably isn''t the case for your Pi''s CPU temperature.


    # See Also


    For an explanation of the code that reads the CPU temperature, see [Recipe 14.11](Recipe
    14.11).


    For an example of exporting sensor data into a spreadsheet, see [Recipe 14.24](Recipe
    14.24).


    # 17.8 Responding to Tweets Using Dweet and IFTTT


    # Problem


    You want your Raspberry Pi to perform some action in response to a certain hashtag
    or mention in a tweet.


    [Recipe 17.6](Recipe 17.6) does this, but it does it very inefficiently because
    it relies on you continually polling with web requests to see whether the color
    has changed.


    # Solution


    An efficient mechanism for monitoring tweets that does not rely on polling is
    to use IFTTT (see [Recipe 17.4](Recipe 17.4)) to spot tweets of interest and then
    send a web request to a service called Dweet that can push notifications to a
    Python program running on your Raspberry Pi ([Figure 17-17](Figure 17-17)).


    For example, you could flash an LED for 10 seconds every time your username is
    mentioned on Twitter by using a Raspberry Squid or an LED attached to a breadboard.


    As far as the hardware goes, this recipe just requires some electronics that do
    something noticeable when GPIO 18 goes high. This could be one channel of a Raspberry
    Squid (see [Recipe 10.10](Recipe 10.10)) or a single LED attached to breadboard
    (see [Recipe 11.1](Recipe 11.1)) or, for ultimate flexibility, a relay (see [Recipe
    11.5](Recipe 11.5)). Using a relay would allow you to create a project like [Bubblino](Bubblino),
    the bubble-blowing Arduino bot.'
- md: "## 17.17 IFTTT、Dweet 与 Python 协同工作\n\n第一步是登录 IFTTT（参见配方 17.4），然后创建一个新的 Applet。选择一个操作通道为“New\
    \ Mention of You”，然后点击“Create trigger”。对于配方的操作通道，选择 Webhooks，然后选择操作“Make a web\
    \ request”并填写字段，如图 17-18 所示。\n\nURL 包含一个带有“text”成分的请求参数。这将包含推文的正文。虽然除了在控制台打印外不会用到它，但在更复杂的项目中，你可能会将消息显示在\
    \ LCD 屏幕上，因此了解如何将数据从推文传递到 Python 程序是有用的。\n\n最后，点击“Create recipe”使 IFTTT 配方生效。\n\
    \ndweet.io 网络服务的工作方式有点像物联网设备的 Twitter。它有一个网络界面，允许你发布和监听 dweet。Dweet 不需要账户或任何登录信息；你可以让一个东西（在这种情况下是\
    \ IFTTT）向 Dweet 发送消息，并让另一个东西（你的树莓派 Python 程序）等待服务通知你感兴趣的事情已经发生。在这种情况下，连接两者的令牌是\
    \ `tweet_about_me`。这并不十分独特，如果同时有多人尝试本书中的这个示例，你们都会收到彼此的消息。为避免这种情况，请使用更独特的令牌（例如，在消息中添加随机字母和数字字符串）。\n\
    \n图 17-18. 在 IFTTT 中完成“Make a web request”操作通道\n\n要从你的 Python 程序访问 Dweet，你需要使用以下命令安装\
    \ `dweepy` 库：\n\n```\n$ sudo pip3 install dweepy\n```\n\n这个配方的程序名为 `ch_17_twitter_trigger.py`：\n\
    \n```python\nimport time\nimport dweepy\nfrom gpiozero import LED\n\nKEY = 'tweet_about_me'\n\
    led = LED(18)\n\nwhile True:\n    try:\n        for dweet in dweepy.listen_for_dweets_from(KEY):\n\
    \            print('Tweet: ' + dweet['content']['text'])\n            led.on()\n\
    \            time.sleep(10)\n            led.off()\n    except Exception:\n  \
    \      pass\n```\n\n与本书中所有程序示例一样，你也可以下载此程序（参见配方 3.22）。\n\n程序运行后，尝试在推文中提及你自己，LED\
    \ 应该会亮起 10 秒。\n\n## 讨论\n\n该程序使用 `listen_for_dweets_from` 方法与 dweet.io 服务器保持一个开放的连接，监听由于\
    \ IFTTT 响应推文而产生的 dweet 所带来的任何推送消息。try/except 块确保如果发生任何通信中断，程序将重新开始监听过程。\n\n##\
    \ 另请参阅\n\n有关使用不同方法的类似项目，请参见配方 17.6。\n\n# 第 18 章 家庭自动化\n\n## 18.0 简介\n\n作为一种低成本、低功耗的设备，树莓派是一个很棒的家庭自动化中心，你可以让它一直运行而不用担心巨额电费。对于本章描述的配方，你不需要树莓派\
    \ 4 或 400 的强大性能。事实上，树莓派 2 或 3 就足够快了，而且比树莓派 4 运行更凉爽，耗电更少。\n\n我们从消息队列遥测传输（MQTT）开始，这是大多数家庭自动化系统的基本通信机制，然后继续研究使用\
    \ Node-RED（你在第 17 章首次遇到）作为家庭自动化的基础。\n\n严格来说，家庭自动化是关于让你的家更智能，更能为自己做事——例如，在检测到移动时打开灯一段时间，或者在就寝时间自动关闭所有东西。但大多数对家庭自动化感兴趣的人也对远程控制家中已自动化的部分感兴趣。我们本章也研究通过智能手机进行远程控制。\n\
    \n## 18.1 使用 Mosquitto 将树莓派变成消息代理\n\n### 问题\n\n你想将你的树莓派变成一个家庭自动化系统的中心，能够使用 Mosquitto\
    \ MQTT 软件。\n\n### 解决方案\n\n安装 Mosquitto 软件，以便你的树莓派可以充当 MQTT 代理。\n运行以下命令安装 Mosquitto\
    \ 并将其作为服务启动，以便在树莓派重启时自动启动：\n\n```\n$ sudo apt update\n$ sudo apt install -y mosquitto\
    \ mosquitto-clients\n$ sudo systemctl enable mosquitto.service\n```\n\n你可以通过运行以下命令检查一切是否正常工作：\n\
    \n```\n$ mosquitto -v\n1656413574: mosquitto version 2.0.11 starting\n1656413574:\
    \ Using default config.\n1656413574: Starting in local only mode. Connections\
    \ will only be possible from clients running on this machine.\n1656413574: Create\
    \ a configuration file which defines a listener to allow remote access.\n1656413574:\
    \ For more details see https://mosquitto.org/documentation/authentication-methods/\n\
    1656413574: Opening ipv4 listen socket on port 1883.\n1656413574: Error: Address\
    \ already in use\n1656413574: Opening ipv6 listen socket on port 1883.\n1656413574:\
    \ Error: Address already in use\n$\n```\n\n错误消息并不是真正的错误；它只是意味着 Mosquitto 已经在运行，因为我们已将其作为服务启动。\n\
    \n### 讨论\n\nMQTT 是一种在程序之间传递消息的方式。它有两个部分：\n\n*服务器*\n控制消息传递并将消息路由到正确接收者的中心位置。\n\n\
    *客户端*\n向服务器发送和接收消息的程序。通常系统中会有多个客户端。\n\n消息使用所谓的*发布和订阅*模型传递。也就是说，一个有有趣内容要说的客户端（例如，传感器读数）通过发布读数来告诉服务器。每隔几秒，客户端可能会进行另一次读数并再次发布。\n\
    \n消息有一个*主题*和一个*负载*。在一个自动化灯光的系统中，主题可能是 `bedroom_light`，负载是 `on` 或 `off`。\n\n你可以通过同时打开两个终端来尝试这个。一个终端将充当发布者，另一个充当订阅者。你可以在图\
    \ 18-1 中看到这个操作。\n\n图 18-1. 两个客户端使用 MQTT 进行通信\n\n让我们分解一下。左边的终端是订阅者，我们在这里发出命令：\n\
    \n```\n$ mosquitto_sub -d -t pi_mqtt\nClient mosqsub/2007-raspberryp sending CONNECT\n\
    Client mosqsub/2007-raspberryp received CONNACK\nClient mosqsub/2007-raspberryp\
    \ sending SUBSCRIBE (Mid: 1, Topic: pi_mqtt, QoS: 0)\nClient mosqsub/2007-raspberryp\
    \ received SUBACK\nSubscribed (mid: 1): 0\n```\n\n`mosquitto_sub` 命令订阅客户端。`-d`\
    \ 选项指定调试模式，这意味着你将看到更多关于客户端和服务器正在做什么的输出；这在确保一切正常工作时很有用。`-t pi_mqtt` 选项指定客户端感兴趣的主题为\
    \ `pi_mqtt`。\n\n调试跟踪显示客户端正在无问题地连接到服务器，并且客户端已请求订阅，服务器已确认订阅。\n\n保持此终端会话运行，并打开第二个终端会话作为客户端，该客户端将在主题\
    \ `pi_mqtt` 上发布一些内容。在此新终端窗口中输入以下命令：\n\n```\n$ mosquitto_pub -d -t pi_mqtt -m \"\
    publishing hello\"\nClient mosqpub/2199-raspberryp sending CONNECT\nClient mosqpub/2199-raspberryp\
    \ received CONNACK\nClient mosqpub/2199-raspberryp sending PUBLISH (d0, q0, r0,\
    \ m1, 'pi_mqtt',\n... (16 bytes))\nClient mosqpub/2199-raspberryp sending DISCONNECT\n\
    ```\n\n同样，`-d` 和 `-t` 选项指定调试模式和主题，但这次有一个额外的选项 `-m`，它指定要包含在发布中的消息。如果发布者是传感器，消息可能是传感器读数。\n\
    \n一旦 `mosquitto_pub` 命令被发送，类似以下的文本将出现在第一个终端窗口（订阅者）中：\n\n```\nClient mosqsub/5170-raspberryp\
    \ received PUBLISH (d0, q0, r0, m0, 'pi_mqtt',\n... (16 bytes))\npublishing hello\n\
    ```\n\n## 另请参阅\n\n有关 Mosquitto 的信息，请参见 https://mosquitto.org。\n\n有关本章中其他 MQTT\
    \ 配方，请参见配方 18.2 和 18.5。\n\n## 18.2 将 Node-RED 与 MQTT 服务器结合使用\n\n### 问题\n\n你想将\
    \ Node-RED 与 MQTT 服务器结合使用，以便能够，例如，根据 MQTT 消息发布来控制通用输入/输出（GPIO）引脚。\n\n### 解决方案\n\
    \n在 Node-RED 流中使用 Node-RED “mqtt” 节点和 “rpi gpio” 节点，如图 18-2 所示。\n\n如果你尚未安装 Node-RED，可以在配方\
    \ 17.3 中找到说明。\n\n部署后，你将能够通过发送 `mosquitto_pub` 命令来打开和关闭 GPIO 18。出于测试目的，将 LED 或\
    \ Raspberry Squid LED 连接到引脚 18（配方 11.1）。\n\n该流程指的是厨房灯，因为此示例假设 GPIO 18 正在与类似 PowerSwitch\
    \ Tail（配方 11.7）的东西一起使用，以开关灯光。"
