    \ 文档：\n\n```\n$ man crontab\n```\n\n## 3.26 查找文件\n\n### 问题\n\n你想找到一个你知道在系统某处的文件。\n\
    \n### 解决方案\n\n使用 Linux find 命令。\n\n### 讨论\n\n从命令中指定的目录开始，find 命令将搜索你指定的文件，如果找到该文件，则显示其位置。\n\
    \n例如：\n\n```\n$ find /home/pi -name gemgem.py\n/home/pi/python_games/gemgem.py\n\
