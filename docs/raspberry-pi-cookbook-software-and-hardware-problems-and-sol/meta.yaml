    such as SparkFun, also have I2C devices. From left to right in the figure, there
    are LED matrix displays; a four-digit, seven-segment LED display; a 16-channel
    PWM/servo controller; and a real-time clock module.'
  - '[PAGE 288]


    ![](img/e36e77524aeaae366529d1cf02f9a39c_288_0.png)


    Figure 10-8. I2C modules


    Other I2C modules include FM radio transmitters, ultrasonic range finders, OLED
    (organic light-emitting diode) displays, and various types of sensors.


    # See Also


    See some of the I2C recipes in this book, including Recipes 12.3, 15.1, and 15.2.


    # 10.5 Using I2C Tools


    # Problem


    You have an I2C device attached to your Raspberry Pi, and you want to check that
    it is attached properly and find the correct I2C address to use with the device.


    # Solution


    Install and use i2c-tools.


    > On newer distributions, you might find that i2c-tools is already installed.


    From a Terminal window on your Pi, type the following commands to fetch and install
    the i2c-tools:


    ```

    $ sudo apt install i2c-tools

    ```'
  - '[PAGE 289]


    Attach your I2C device to the Pi and run the command:


    ```

    $ sudo i2cdetect -y 1

    ```


    Note that if you are using a very old Raspberry Pi revision 1 board, you need
    to change 1 to 0 in the preceding line of code.


    If I2C is available, you will see some output like that shown in Figure 10-9,
    which indicates that two I2C addresses are in use—0x68 and 0x70.


    > ## Hexadecimal


    Hexadecimal (or just *hex*) is a way of representing numbers using the number
    base 16 rather than the number base 10 that we use in everyday life.


    In hexadecimal, each digit can have one of sixteen possible values. In addition
    to the familiar digit values of 0 to 9, hex uses the letters A to F; the letter
    A represents decimal 10, and F decimal 15.


    There is no particular reason to use hex over decimal, except that in the unlikely
    event that you want to convert a number into binary, it''s much easier to do from
    hex than decimal.


    To avoid confusion as to whether a number is being represented in decimal or hex,
    it is common to prefix hex numbers with 0x. In the preceding example, the hex
    number 0x68 is (in decimal) 6 x 16 + 8 = 104, and 0x70 is 7 x 16 = 112.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_289_0.png)


    *Figure 10-9. i2c-tools*


    # Discussion


    i2cdetect is a useful diagnostic tool and worth running the first time you use
    a new I2C device.'
  - '[PAGE 290]


    You need to ensure that the I2C address used by the device is the same as that
    required by the software. You''ll sometimes find little switches or solder bridges
    that can be used to change the I2C address of the device. This is especially useful
    if you have more than one device with the same address connected to the same Raspberry
    Pi.


    # See Also


    See some of the I2C recipes in this book, including Recipes 12.3, 15.1, and 15.2.


    For more information on installing with apt, see Recipe 3.17.


    # 10.6 Setting Up SPI


    # Problem


    You have a device that uses the Serial Peripheral Interface (SPI) bus, and you
    want to use the device with your Raspberry Pi.


    # Solution


    By default, SPI is disabled in Raspberry Pi OS. To enable it, the procedure is
    almost the same as Recipe 10.4. On the Raspberry Menu, under Preferences, open
    the Raspberry Pi Configuration tool (Figure 10-10). Go to the Interfaces tab,
    click the toggle switch for SPI, and click OK.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_290_0.png)'
- md: "## 10.6 Enabling SPI\n\nOn older versions of Raspberry Pi OS, or if you prefer\
    \ the command line, use the `raspi-config` utility:\n\n```\n$ sudo raspi-config\n\
    ```\n\nSelect Interfacing Options, followed by SPI, and then respond **Yes** before\
    \ rebooting your Raspberry Pi. After the reboot, SPI will be available.\n\n###\
    \ Discussion\n\nSPI allows serial transfer of data between the Raspberry Pi and\
    \ peripheral devices, such as ADCs and port expander chips (for extra GPIO pins),\
    \ among other devices.\n\nYou can check that SPI is working with the following\
    \ command:\n\n```\n$ ls /dev/*spi*\n/dev/spidev0.0 /dev/spidev0.1\n```\n\nIf,\
    \ instead of `spidev0.0` and `spidev0.1` being reported, nothing appears, it means\
    \ that SPI is not enabled.\n\n### See Also\n\nWe use an SPI analog-to-digital\
    \ converter chip in [Recipe 14.7](Recipe 14.7).\n\n## 10.7 Installing pySerial\
    \ for Access to the Serial Port from Python\n\n### Problem\n\nYou want to use\
    \ the serial port receive and transmit (RXD and TXD pins) on the Raspberry Pi\
    \ using Python.\n\n### Solution\n\nFirst, enable the serial port using [Recipe\
    \ 2.6](Recipe 2.6).\n\nThen, install the pyserial library:\n\n```\n$ sudo pip3\
    \ install pyserial\n```\n\n### Discussion\n\nThe library is pretty easy to use.\
    \ Create a connection by using the following syntax:\n\n```\nser = serial.Serial(DEVICE,\
    \ BAUD)\n```\n\n`DEVICE` is the device for the serial port (`/dev/serial0`) and\
    \ `BAUD` is the baud rate as a number, not a string. The RXD and TXD pins on the\
    \ GPIO connector are mapped to the Linux device `/dev/serial0`, and 9600 is the\
    \ closest there is to a standard baud rate and is used by many devices:\n\n```\n\
    ser = serial.Serial('/dev/serial0', 9600)\n```\n\nAfter a connection is established,\
    \ you can send data over serial like this:\n\n```\nser.write('some text')\n```\n\
    \nListening for a response normally involves a loop that reads and prints, as\
    \ illustrated in this example:\n\n```\nwhile True:\n    print(ser.read())\n```\n\
    \n### See Also\n\nYou will need to use this technique in recipes that connect\
    \ hardware to the serial port, such as Recipe 13.10.\n\n## 10.8 Installing Minicom\
    \ to Test the Serial Port\n\n### Problem\n\nYou want to send and receive serial\
    \ commands from a Terminal session.\n\n### Solution\n\nInstall Minicom:\n\n```\n\
    $ sudo apt install minicom\n```\n\nAfter Minicom is installed, you can start a\
    \ serial communication session with a serial device connected to the RXD and TXD\
    \ pins of the GPIO connector using this command:\n\n```\n$ minicom -b 9600 -o\
    \ -D /dev/serial0\n```\n\nThe parameter after `-b` is the baud rate, and the parameter\
    \ after `-D` is the serial port. Be sure to use the same baud rate as the one\
    \ on the device you are communicating with.\n\nThis will start a Minicom session.\
    \ A peculiarity of the (very old) Minicom standard is that nothing appears on\
    \ the screen when you type. So, one of the first things you want to do is turn\
    \ on local Echo so that you can see the commands as you type. To do this, press\
    \ Ctrl-A and then Z; you'll see the command list shown in Figure 10-11. Press\
    \ E to turn on local Echo.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_293_0.png)\n\
    \nFigure 10-11. Minicom commands\n\nNow, anything you type will be sent to the\
    \ serial device, and all messages coming from the device will also be displayed.\n\
    \n### Discussion\n\nMinicom is a great tool for checking out the messages coming\
    \ from a serial device or for making sure that it's working.\n\n### See Also\n\
    \nCheck out the [Minicom documentation](http://www.minicom.com/).\n\nIf you want\
    \ to write a Python program to handle the serial communications, you will need\
    \ the Python pyserial library (Recipe 10.7).\n\n## 10.9 Using a Breadboard with\
    \ Jumper Leads\n\n### Problem\n\nYou want to do some electronic prototyping using\
    \ your Raspberry Pi and a solderless breadboard.\n\n### Solution\n\nUse male-to-female\
    \ jumper wires and a GPIO pin label template like the Raspberry Leaf (Figure 10-12).\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_294_0.png)\n\nFigure 10-12. Connecting\
    \ Raspberry Pi to a breadboard using male-to-female jumper wires\n\n### Discussion\n\
    \nIt’s not always easy to identify the pins that you want on a bare Raspberry\
    \ Pi board. You can greatly simplify this by printing out a template, like the\
    \ Raspberry Leaf, to fit over the pins.\n\nIt's also useful to have a selection\
    \ of male-to-male jumper wires for making connections from one part of the breadboard\
    \ to another.\n\nFemale-to-female jumper wires are useful for connecting modules\
    \ with male header pins directly to the Raspberry Pi, when no other components\
    \ might warrant the use of a breadboard.\n\nA good way of getting a breadboard,\
    \ Raspberry Leaf, and set of jumper wires is to buy a starter kit based around\
    \ a breadboard, like the [Project Box 1 kit for Raspberry Pi from MonkMakes](https://monkmakes.com).\n\
    \n### See Also\n\nWe fully discuss an example of connecting an LED in [Recipe\
    \ 11.1](#recipe-11-1).\n\n## 10.10 Using a Raspberry Squid\n\n### Problem\n\n\
    You want to connect an RGB LED to your Raspberry Pi without having to build something\
    \ on a breadboard.\n\n### Solution\n\nUse a Raspberry Squid RGB LED ([Figure 10-13](#figure-10-13)).\n\
    \nThe Raspberry Squid is an RGB LED with built-in series resistors and female\
    \ header leads; thus, it can be plugged directly onto the GPIO pins of a Raspberry\
    \ Pi. The Squid has color-coded leads. The black lead goes to one of the GPIO\
    \ GND pins, and the red, green, and blue leads go to GPIO pins used for the red,\
    \ green, and blue channels. The red, green, and blue outputs can be simple digital\
    \ outputs or pulse-width modulation (PWM) outputs ([Recipe 11.3](#recipe-11-3))\
    \ that allow you to mix different colors.\n\nYou can find [instructions for making\
    \ your own Squid](#instructions), but you can also buy a [ready-made Squid](#ready-made).\n\
    \nThe `gpiozero` Python library comes pre-installed on Raspberry Pi OS and has\
    \ support for RGB LEDs like the Squid.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_296_0.png)\n\
    \nFigure 10-13. The Raspberry Squid\n\nAs with all the program examples in this\
    \ book, you can download this program (see Recipe 3.22). The file is called `ch_10_squid_test.py`.\
    \ This program tells you pretty much all you need to know about using the Raspberry\
    \ Squid:\n\n```\nfrom gpiozero import RGBLED\nfrom time import sleep\nfrom colorzero\
    \ import Color\n\nled = RGBLED(18, 23, 24)\nled.color = Color('red')\nsleep(2)\n\
    led.color = Color('green')\nsleep(2)\nled.color = Color('blue')\nsleep(2)\nled.color\
    \ = Color('white')\nsleep(2)\n```\n\nHaving imported the various modules you need,\
    \ you can create a new `RGBLED` object, supplying the three pins to be used for\
    \ its red, green, and blue channels (in this case, 18, 23, and 24). You can then\
    \ set the color by using the `led.color =` command, which expects a color.\n\n\
    The color is supplied using the `Color` class from the `colorzero` module. This\
    \ enables you to specify a color by name, as we did here (most work), or by specifying\
    \ the separate red, green, and blue color values. For example, the following would\
    \ set the LED to red:\n\n```\nled.color = Color(255, 0, 0)\n```\n\nAfter the color\
    \ is set, `time.sleep(2)` is used to create a two-second delay before the next\
    \ color change.\n\n### Discussion\n\nYou do not need to use all three color channels\
    \ of a Squid, and it can be quite handy to just check that a GPIO pin is turning\
    \ on and off as you expect before attaching some other electronics to it.\n\n\
    ### See Also\n\nFor information on the Squid Button, see [Recipe 10.11](Recipe\
    \ 10.11).\n\n[Recipe 11.11](Recipe 11.11) is an example project that controls\
    \ an RGB LED (Squid- or breadboard-based).\n\n## 10.11 Using a Raspberry Squid\
    \ Button\n\n### Problem\n\nYou want to connect a push switch to your Raspberry\
    \ Pi without having to build something on a breadboard.\n\n### Solution\n\nUse\
    \ a Squid Button.\n\nThe Squid Button ([Figure 10-14](Figure 10-14)) is a push\
    \ button with female header leads connected to the contacts so that you can plug\
    \ it directly into the GPIO connector of a Raspberry Pi. The Squid Button also\
    \ includes a low-value resistor that limits the current that would flow if the\
    \ Squid Button were to be accidentally connected to a digital output rather than\
    \ a digital input."
  mdcn: "## 10.6 启用 SPI\n\n在旧版本的 Raspberry Pi OS 上，或者如果你更喜欢使用命令行，可以使用 `raspi-config`\
    \ 工具：\n\n```\n$ sudo raspi-config\n```\n\n选择“Interfacing Options”，然后选择“SPI”，在重启你的\
    \ Raspberry Pi 之前回答 **Yes**。重启后，SPI 就可用了。\n\n### 讨论\n\nSPI 允许在 Raspberry Pi 和外围设备（如\
    \ ADC 和端口扩展芯片，用于额外的 GPIO 引脚）之间进行串行数据传输。\n\n你可以使用以下命令检查 SPI 是否正常工作：\n\n```\n$ ls\
    \ /dev/*spi*\n/dev/spidev0.0 /dev/spidev0.1\n```\n\n如果显示的不是 `spidev0.0` 和 `spidev0.1`，而是没有任何内容，则表示\
    \ SPI 未启用。\n\n### 另请参阅\n\n我们在 [配方 14.7](Recipe 10.11) 中使用了一个 SPI 模数转换器芯片。\n\n\
    ## 10.7 安装 pySerial 以从 Python 访问串行端口\n\n### 问题\n\n你想使用 Python 在 Raspberry Pi 上使用串行端口的接收和发送（RXD\
    \ 和 TXD 引脚）。\n\n### 解决方案\n\n首先，使用 [配方 2.6](Recipe 2.6) 启用串行端口。\n\n然后，安装 pyserial\
    \ 库：\n\n```\n$ sudo pip3 install pyserial\n```\n\n### 讨论\n\n这个库非常易于使用。使用以下语法创建连接：\n\
    \n```\nser = serial.Serial(DEVICE, BAUD)\n```\n\n`DEVICE` 是串行端口的设备（`/dev/serial0`），`BAUD`\
    \ 是波特率，是一个数字，而不是字符串。GPIO 连接器上的 RXD 和 TXD 引脚映射到 Linux 设备 `/dev/serial0`，而 9600\
    \ 是最接近标准波特率的值，被许多设备使用：\n\n```\nser = serial.Serial('/dev/serial0', 9600)\n```\n\
    \n建立连接后，你可以通过串行发送数据，如下所示：\n\n```\nser.write('some text')\n```\n\n监听响应通常涉及一个读取和打印的循环，如本例所示：\n\
    \n```\nwhile True:\n    print(ser.read())\n```\n\n### 另请参阅\n\n在将硬件连接到串行端口的配方中，例如配方\
    \ 13.10，你将需要使用此技术。\n\n## 10.8 安装 Minicom 以测试串行端口\n\n### 问题\n\n你想从终端会话发送和接收串行命令。\n\
    \n### 解决方案\n\n安装 Minicom：\n\n```\n$ sudo apt install minicom\n```\n\n安装 Minicom\
    \ 后，你可以使用以下命令启动与连接到 GPIO 连接器 RXD 和 TXD 引脚的串行设备的串行通信会话：\n\n```\n$ minicom -b 9600\
    \ -o -D /dev/serial0\n```\n\n`-b` 后的参数是波特率，`-D` 后的参数是串行端口。请确保使用与你正在通信的设备相同的波特率。\n\
    \n这将启动一个 Minicom 会话。（非常古老的）Minicom 标准的一个特点是，当你输入时，屏幕上不会显示任何内容。因此，你首先要做的事情之一是打开本地回显，以便在输入时可以看到命令。为此，请按\
    \ Ctrl-A，然后按 Z；你将看到如图 10-11 所示的命令列表。按 E 打开本地回显。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_293_0.png)\n\
    \n图 10-11. Minicom 命令\n\n现在，你输入的任何内容都将被发送到串行设备，并且来自设备的所有消息也将被显示。\n\n### 讨论\n\n\
    Minicom 是一个很棒的工具，用于检查来自串行设备的消息或确保其正常工作。\n\n### 另请参阅\n\n查看 [Minicom 文档](http://www.minicom.com/)。\n\
    \n如果你想编写一个 Python 程序来处理串行通信，你将需要 Python pyserial 库（配方 10.7）。\n\n## 10.9 使用面包板和跳线\n\
    \n### 问题\n\n你想使用你的 Raspberry Pi 和无焊面包板进行一些电子原型设计。\n\n### 解决方案\n\n使用公对母跳线和 GPIO\
    \ 引脚标签模板，如 Raspberry Leaf（图 10-12）。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_294_0.png)\n\
    \n图 10-12. 使用公对母跳线将 Raspberry Pi 连接到面包板\n\n### 讨论\n\n在裸露的 Raspberry Pi 板上识别你想要的引脚并不总是那么容易。你可以通过打印一个模板（如\
    \ Raspberry Leaf）来覆盖引脚，从而大大简化这一过程。\n\n拥有一系列公对公跳线也很有用，用于从面包板的一部分连接到另一部分。\n\n母对母跳线在将带有公头引脚的模块直接连接到\
    \ Raspberry Pi 时很有用，当没有其他组件需要使用面包板时。\n\n获得面包板、Raspberry Leaf 和一套跳线的一个好方法是购买基于面包板的入门套件，例如\
    \ [MonkMakes 的 Raspberry Pi Project Box 1 套件](https://monkmakes.com)。\n\n### 另请参阅\n\
    \n我们在 [配方 11.1](#recipe-11-1) 中详细讨论了一个连接 LED 的示例。\n\n## 10.10 使用 Raspberry Squid\n\
    \n### 问题\n\n你想将 RGB LED 连接到你的 Raspberry Pi，而无需在面包板上构建任何东西。\n\n### 解决方案\n\n使用 Raspberry\
    \ Squid RGB LED（[图 10-13](#figure-10-13)）。\n\nRaspberry Squid 是一个内置串联电阻和母头引线的\
    \ RGB LED；因此，它可以直接插入 Raspberry Pi 的 GPIO 引脚。Squid 有颜色编码的引线。黑色引线连接到一个 GPIO GND\
    \ 引脚，红色、绿色和蓝色引线连接到用于红色、绿色和蓝色通道的 GPIO 引脚。红色、绿色和蓝色输出可以是简单的数字输出或脉宽调制（PWM）输出（[配方 11.3](#recipe-11-3)），允许你混合不同的颜色。\n\
    \n你可以找到[制作自己的 Squid 的说明](#instructions)，但你也可以购买[现成的 Squid](#ready-made)。\n\n`gpiozero`\
    \ Python 库预装在 Raspberry Pi OS 上，并支持像 Squid 这样的 RGB LED。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_296_0.png)\n\
    \n图 10-13. Raspberry Squid\n\n与本书中的所有程序示例一样，你可以下载此程序（参见配方 3.22）。该文件名为 `ch_10_squid_test.py`。这个程序几乎告诉你所有关于使用\
    \ Raspberry Squid 需要知道的信息：\n\n```\nfrom gpiozero import RGBLED\nfrom time import\
    \ sleep\nfrom colorzero import Color\n\nled = RGBLED(18, 23, 24)\nled.color =\
    \ Color('red')\nsleep(2)\nled.color = Color('green')\nsleep(2)\nled.color = Color('blue')\n\
    sleep(2)\nled.color = Color('white')\nsleep(2)\n```\n\n导入所需的各个模块后，你可以创建一个新的 `RGBLED`\
    \ 对象，提供用于其红色、绿色和蓝色通道的三个引脚（在本例中为 18、23 和 24）。然后，你可以使用 `led.color =` 命令设置颜色，该命令需要一个颜色值。\n\
    \n颜色使用 `colorzero` 模块中的 `Color` 类提供。这使你可以按名称指定颜色，就像我们在这里所做的那样（大多数情况下有效），或者通过指定单独的红色、绿色和蓝色颜色值。例如，以下代码将\
    \ LED 设置为红色：\n\n```\nled.color = Color(255, 0, 0)\n```\n\n设置颜色后，使用 `time.sleep(2)`\
    \ 在下一次颜色更改之前创建两秒钟的延迟。\n\n### 讨论\n\n你不需要使用 Squid 的所有三个颜色通道，在将其他电子设备连接到 GPIO 引脚之前，仅检查引脚是否按预期开启和关闭可能非常方便。\n\
    \n### 另请参阅\n\n有关 Squid Button 的信息，请参见 [配方 10.11](Recipe 10.11)。\n\n[配方 11.11](Recipe\
    \ 11.11) 是一个控制 RGB LED（基于 Squid 或面包板）的示例项目。\n\n## 10.11 使用 Raspberry Squid Button\n\
    \n### 问题\n\n你想将按钮开关连接到你的 Raspberry Pi，而无需在面包板上构建任何东西。\n\n### 解决方案\n\n使用 Squid\
    \ Button。\n\nSquid Button（[图 10-14](Figure 10-14)）是一个带有连接到触点的母头引线的按钮，因此你可以将其直接插入\
    \ Raspberry Pi 的 GPIO 连接器。Squid Button 还包括一个低值电阻，用于限制如果 Squid Button 意外连接到数字输出而不是数字输入时可能流过的电流。"
