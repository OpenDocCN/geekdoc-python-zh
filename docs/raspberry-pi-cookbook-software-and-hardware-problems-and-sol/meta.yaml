    > ## Installing Firmware by Download


    Occasionally, you might find that your Pico gets itself in a zombie state and
    appears to be broken. Often this can be fixed by manually replacing the firmware.
    Think of this as a factory reset.


    If you have a Pico W, you''ll need to download a specific version of the firmware
    for it.


    To manually install new firmware onto your Pico or Pico W, start by unplugging
    it from your Raspberry Pi or other computer.


    If you have a Pico W, go to [https://rpf.io/pico-w-firmware](https://rpf.io/pico-w-firmware).
    This will immediately start the download of a .uf2 firmware file for the Pico
    W.'
  - '[PAGE 552]


    If, on the other hand, you have a regular Pico, download the file.

    Next, hold down the BOOTSEL button (Figure 19-5), and with the button held down,
    connect the Pico with your USB lead.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_552_0.png)


    Release the BOOTSEL button and your Pico or Pico W will mount itself as USB flash
    storage on your Raspberry Pi (Figure 19-6, right).

    Drag or copy the .uf2 file that you downloaded earlier onto the Pico or Pico W''s
    filesystem.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_552_1.png)'
  - '[PAGE 553]


    > Once the file is copied, the Pico or Pico W will unmount itself and be ready
    to receive your MicroPython programs via Thonny.


    If you find that installing the firmware here doesn''t work on a Raspberry Pi,
    you can also install Thonny on a Mac or Windows PC and then install the firmware
    onto the Pico.


    # Discussion


    When you choose to install MicroPython onto your Pico or Pico W, what happens
    is that a cut-down version of Python 3 called *MicroPython* is installed onto
    the Pico''s flash memory. As you will see in Recipe 19.2 this allows you to interact
    with a Python Shell on the Pico and also copy Python programs to be run onto the
    Pico''s flash memory.


    Although MicroPython is a cut-down version of Python 3, you will find that most
    of the material covered in Chapters 5, 6, and 7 will also work in MicroPython.
    In addition, other hardware-specific libraries are available to use the Pico''s
    GPIO pins (among other things).


    # See Also


    For more information on Thonny, see Recipe 5.3.


    # 19.2 Using the Python Shell on a Pico


    # Problem


    Having set up Thonny for the Pico and installed MicroPython onto your Pico or
    Pico W, you want to interact with it using the Python Shell.


    # Solution


    As soon as Thonny has uploaded MicroPython onto your Pico, you should see the
    shell area appear on the bottom half of the Thonny window (Figure 19-7).


    As the >>> prompt implies, this is a Python command line, where you can type any
    Python you like and it will run. The important point is that it will run on the
    Pico, not on your regular Raspberry Pi.'
  - '[PAGE 554]


    ![](img/e36e77524aeaae366529d1cf02f9a39c_554_0.png)


    Figure 19-7. Using the Python Shell on a Pico


    The Pico has a built-in LED connected to GPIO pin 25. We can turn this on and
    off using the Python commands shown in Figure 19-7. First we must import the Pin
    class from the machine module. We can then create a new instance of Pin assigned
    to pin 25 and specify that it''s an output (Pin.OUT). Finally, we can use the
    methods on and off to control the LED.


    # Discussion


    The machine module is a MicroPython module that contains the interface to the
    actual hardware of the Pico. This looks a little different from gpiozero, the
    module use to control the pins of a regular Raspberry Pi. For comparison, Table
    19-1 shows the code we have just written for the Pico, next to the equivalent
    in gpiozero taken from Recipe 11.1.'
  - '[PAGE 555]


    Table 19-1. MicroPython on Pico vs. gpiozero on Raspberry Pi


    | MicroPython | GPIOZero |

    | :--- | :--- |

    | from machine import Pin | from gpiozero import LED |

    | led = Pin(25, Pin.OUT) | led = LED(18) |

    | led.on() | led.on() |

    | led.off() | led.off() |


    As you can see, the approach is very similar. The main difference is that gpiozero
    uses LED to represent the pin and the direction of the pin (output) is inferred
    rather than having to be explicitly stated when the pin is declared, which you
    have to do for the MicroPython code for the Pico.


    Since the code for this chapter is MicroPython rather than the normal Python that
    we have used everywhere else in this book, you will find it in a separate directory
    called *pico* in the book’s code download (see Recipe 3.22). This is where you’ll
    find MicroPython programs to open in Thonny and run.


    # See Also


    More information is available in the MicroPython documentation.


    # 19.3 Using a Pico with a Breadboard


    # Problem


    You want to use your Pico with a solderless breadboard.


    # Solution


    Buy a breadboard kit such as the MonkMakes Electronics Kit 1 for Pico or the Kitronik
    Discovery Kit. These kits both include a solderless breadboard, jumper wires,
    and some components to get you started. The breadboard included in the MonkMakes
    kit is labeled with the Pico’s pin names (see Figure 19-8), making it easier to
    connect things.'
