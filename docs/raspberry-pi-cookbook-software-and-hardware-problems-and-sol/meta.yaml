    # Discussion


    In Chapter 8 we went as far as counting coins. But this relied on classical image
    processing techniques, looking for edges in images, looking for differences between
    images, etc. This approach relied on controlled lighting and no machine learning
    was involved.


    Just take a moment to think about what is going on here. This is pretty amazing:
    your Raspberry Pi is actually seeing and identifying things. It is able to do
    this because the model has been trained on thousands of images of objects and
    has learned to distinguish them, or at least hazard a good guess. And it can do
    this whatever the angle they are viewed at, whatever the lighting and background.


    One interesting feature of Figure 9-1 is that the small coffee mug in the author''s
    hand has been misidentified as a "remote," perhaps because of the way it is being
    held. Even the mistakes are the sort of mistake that a human might make, because
    the "seeing" is taking place in a similar way.


