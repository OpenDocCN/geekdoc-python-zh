    # 10.18 Using the Raspberry Pi Zero 2 and Pi Zero 2 W


    # Problem


    You want to learn more about the Pi Zero 2 and Pi Zero 2 W and how to make use
    of them in electronics projects.


    # Solution


    The small size and low cost of the Pi Zero 2 make it the ideal choice for embedding
    in electronics projects. The Pi Zero 2 W adds WiFi and Bluetooth capabilities
    to the Pi Zero 2, making it great for small Internet of Things (IoT) projects.


    [Figure 10-21](https://www.raspberrypi.org/recipes/pi-zero-2-w/) shows a Raspberry
    Pi Zero 2 W.'
  - '[PAGE 310]


    ![](img/e36e77524aeaae366529d1cf02f9a39c_310_0.png)


    Figure 10-21. The Raspberry Pi Zero 2 W


    The Pi Zero 2 and Pi Zero 2 W are supplied without header pins attached, so your
    first job is likely to be to solder pins onto it. Suitable header pins are available
    in Pi Zero starter kits, such as the one supplied by Pi Hut.


    It is also possible to buy the Pi Zero 2 W with header pins presoldered, but that
    is more expensive than the DIY version.


    You can also find so-called *hammer* pins that are tight fitting and do not require
    soldering.


    # Discussion


    With only one USB connector—and a micro-USB OTG (on-the-go) connector at that—you’ll
    need a USB adapter and USB hub to be able to plug in a USB WiFi dongle, keyboard,
    and mouse in order to set up the Pi Zero 2.


    Alternatively, you can use a console cable as described in Recipe 2.6 to set up
    WiFi by editing /etc/network/interfaces, as described in Recipe 2.5. After that
    is set up, you can connect to the Pi Zero wirelessly using SSH (Recipe 2.7).


    # See Also


    For a comparison of the Raspberry Pi models available, see Recipe 1.1.'
