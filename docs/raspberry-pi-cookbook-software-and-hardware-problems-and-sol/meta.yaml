- img_proc: true
  md: "Load the program `ch_19_voltmeter.py` into Thonny and run it. You should see\
    \ a series of voltage readings. Try rotating the knob of the pot and you should\
    \ see the voltage change:\n\n```\nfrom machine import ADC, Pin\nfrom utime import\
    \ sleep\n\nanalog = ADC(26)\n\ndef volts_from_reading(reading):\n    min_reading\
    \ = 336\n    max_reading = 65534\n    reading_span = max_reading - min_reading\n\
    \    volts_per_reading = 3.3 / reading_span\n    volts = (reading - min_reading)\
    \ * volts_per_reading\n    return volts\n\nwhile True:\n    reading = analog.read_u16()\n\
    \    print(volts_from_reading(reading))\n    sleep(0.5)\n```\n\nAs with all the\
    \ program examples in this book, you can also download this code (see Recipe 3.22).\n\
    \n# Discussion\n\nTo read analog inputs rather than the digital inputs of Recipe\
    \ 19.5, you have to wrap the pin in the ADC class. You can then use `read_u16`\
    \ to get an analog value between 0 and 65534 for the pin in question.\n\nEven\
    \ though the value returned is an unsigned 16-bit number, the resolution of the\
    \ ADC is only 12 bits, providing 4096 different possible values. The function\
    \ `volts_from_reading` converts the raw analog reading into a voltage. The ADC\
    \ does not quite measure from 0 all the way to 3.3V. There are dead zones. So,\
    \ even if the analog input is connected to GND (0V), the ADC will read a value\
    \ of roughly 336. In the function `volts_from_reading`, this is taken to be the\
    \ `min_reading`, and the `max_reading` is taken to be 65534 (as discussed earlier).\
    \ The span of readings is therefore `max_reading - min_reading`, and so the number\
    \ of `volts_per_reading` can be calculated. From this, the voltage at the input\
    \ can be calculated.\n\nYou can't use all of the GPIO pins for analog inputs;\
    \ this feature is available only on pins 26, 27, and 28. However, analog channel\
    \ 4 is connected internally on the RP2040 chip to an analog temperature sensor,\
    \ which will tell you the temperature of the chip after applying a bit of math\
    \ to the analog reading. You can try this out with the program `ch_19_thermometer.py`:.\n\
    \n```\nfrom machine import Pin, ADC\nfrom utime import sleep\n```"
  merge: -1
