  md: "# # 13.11 Intercepting Keypresses\n\n# ## Problem\n\nYou want to intercept\
    \ individual keypresses on a USB keyboard or numeric keypad.\n\n# ## Solution\n\
    \nThere are at least two ways to solve this problem. The more straightforward\
    \ approach is to use the `sys.stdin.read` function. This has the advantage over\
    \ the other method of not requiring a GUI to be running, so a program using it\
    \ can be run from an SSH session.\n\nOpen an editor, paste in the following code\
    \ (`ch_13_keys_sys.py`), run the program, and start pressing some keys:\n\n```\n\
    python\nimport sys, tty, termios\n\ndef read_ch():\n    fd = sys.stdin.fileno()\n\
    \    old_settings = termios.tcgetattr(fd)\n    try:\n        tty.setraw(sys.stdin.fileno())\n\
    \        ch = sys.stdin.read(1)\n    finally:\n        termios.tcsetattr(fd, termios.TCSADRAIN,\
    \ old_settings)\n    return ch\n\nwhile True:\n    ch = read_ch()\n    if ch ==\
    \ 'x':\n        break\n    print(\"key is: \" + ch)\n```\n\nAs with all the program\
    \ examples in this book, you can also download this program (see Recipe 3.22).\
    \ To stop the program, press the `x` key.\n\nThe alternative to this is to use\
    \ `pygame`, a Python library intended for writing games, which can also be used\
    \ to detect keypresses. You could then use this to perform some action.\n\nThe\
    \ following example program (`ch_13_keys_pygame.py`) illustrates the use of `pygame`\
    \ to print out a message each time a key is pressed. However, it works only if\
    \ the program has access to the windowing system, so you will need to run it using\
    \ VNC (Recipe 2.8) or run it directly on the Raspberry Pi:"
