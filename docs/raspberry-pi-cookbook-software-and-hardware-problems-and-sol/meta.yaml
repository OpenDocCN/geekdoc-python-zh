  md: "![](img/e36e77524aeaae366529d1cf02f9a39c_344_0.png)\n\n# ServoBlaster and Sound\n\
    \nThe ServoBlaster software uses Raspberry Pi hardware that is also involved in\
    \ generating sound. Thus, you won't be able to play audio through your Raspberry\
    \ Pi's audio jack or HDMI while using ServoBlaster.\n\nThe ServoBlaster software\
    \ created by Richard Hirst uses Raspberry Pi CPU hardware to generate pulses with\
    \ much more accurate timings than are possible using gpiozero. Install ServoBlaster\
    \ using the following commands and then reboot your Raspberry Pi:\n\n```\n$ git\
    \ clone https://github.com/srcshelton/servoblaster.git\n$ cd servoblaster\n$ sudo\
    \ make\n$ sudo make install\n```\n\nYou can modify the program from Recipe 12.1\
    \ to use the ServoBlaster code. You can find the modified program in the file\
    \ ch_12_servo_blaster.py. As with all the program examples in this book, you can\
    \ download it (see Recipe 3.22). This program assumes that the servo control pin\
    \ is connected to GPIO 18:\n\n```\nimport os\nfrom guizero import App, Slider\n\
    \nservo_min = 500  # uS\nservo_max = 2500 # uS\nservo = 2        # GPIO 18\n\n\
    def map(value, from_low, from_high, to_low, to_high):\n    from_range = from_high\
    \ - from_low\n    to_range = to_high - to_low\n    scale_factor = float(from_range)\
    \ / float(to_range)\n    return to_low + (value / scale_factor)\n\ndef set_angle(angle):\n\
    \    pulse = int(map(angle+90, 0, 180, servo_min, servo_max))\n    command = \"\
    echo {}={}us > /dev/servoblaster\".format(servo, pulse)\n    os.system(command)\n\
    \ndef slider_changed(angle):\n    set_angle(int(angle))\n\napp = App(title='Servo\
    \ Angle', width=500, height=150)\nslider = Slider(app, start=-90, end=90, command=slider_changed,\
    \ width='fill',\n               height=50)\nslider.text_size = 30\napp.display()\n\
    ```"
