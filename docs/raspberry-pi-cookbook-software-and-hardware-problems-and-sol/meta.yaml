  - '[PAGE 462]


    This is fixed at 3C (hex) for many of the low-cost I2C modules, but may vary,
    so you should check any documentation that comes with the device or use I2C tools
    (Recipe 10.5) to list all the I2C devices attached to the bus so that you can
    see the address of your display.


    The preceding code example uses a technique called *double buffering*. This involves
    preparing what is to be displayed and then switching it onto the image in one
    go. This prevents the display from flickering.


    You can see the code for this in the `display_message` function. First it draws
    onto the image a blank rectangle the entire size of the display. It then draws
    the text onto the image, and then sets the display content to be image using `disp.image(image)`.
    The display isn''t actually updated until the function `disp.show()` is called.


    Small OLED displays are cheap, don''t use much current, and have high resolution
    despite their diminutive size. They are replacing LCD displays in many consumer
    products.


    # See Also


    The instructions here are for four-pin I2C interfaces. If you really want to use
    the SPI interface, take a look at [Adafruit''s tutorial](https://learn.adafruit.com/adafruit-oled-displays-for-raspberry-pi).


    # 15.5 Using Addressable RGB LED Strips


    # Problem


    You want to connect an RGB LED strip (NeoPixels) to your Raspberry Pi.


    # Solution


    Use an LED strip based on the WS2812 RGB LED chips on your Raspberry Pi.


    Using these LED strips (Figure 15-5) can be really easy, with a direct connection
    to the Raspberry Pi and power for the LEDs supplied by the Raspberry Pi''s 5V
    supply. This is the “Happy Day” scenario that should work just fine, but do see
    the Discussion for providing external power so that your LED strip use is trouble-free.


    > **Don''t Power the LEDs from the Pi''s 3.3V Supply**


    Although it might be tempting to power the LEDs from the 3.3V supply pin on the
    GPIO connector, do not do this—it can supply only low currents (see Recipe 10.3).
    Using this pin could easily damage your Raspberry Pi.'
  - '[PAGE 463]


    ![](img/e36e77524aeaae366529d1cf02f9a39c_463_0.png)


    Figure 15-5. An LED strip of 10 LEDs


    The LED strip used in Figure 15-5 is cut from a reel. In this case, there are
    10 LEDs. Because each LED can use up to 60mA, 10 is probably a sensible limit
    for the number of LEDs that can be used without arranging for a separate power
    supply for the LED strip (see the Discussion section).


    To connect the strip to the Raspberry Pi, jumper wires with female connectors
    on one end were cut and the wire ends soldered to the three connections on the
    LED strip (see Recipe 10.3): GND, DI (data in), and 5V. These can then be attached
    to GPIO pins GND, GPIO 18, and 5V, respectively.


    Notice that the LED strip has right-facing arrows printed on it (Figure 15-6).
    Make sure that when you solder leads to the LED strip, you start from the cut
    end to the *left* of the arrows.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_463_1.png)


    Figure 15-6. An LED strip close-up'
  - "[PAGE 464]\n\nWe are going to use the Adafruit software to control our addressable\
    \ LEDs. To install it, run the following commands:\n\n```\n$ pip3 install adafruit-blinka\n\
    $ sudo pip3 install rpi_ws281x adafruit-circuitpython-neopixel\n```\n\nThe following\
    \ example program (ch_15_neopixel.py) will set the LED red in successive positions\
    \ along the strip:\n\n```\nimport time\nimport board\nfrom neopixel import NeoPixel\n\
    \nled_count = 5\nred = (100, 0, 0)\nno_color = (0, 0, 0)\n\nstrip = NeoPixel(board.D18,\
    \ led_count, auto_write=False)\n\ndef clear():\n    for i in range(0, led_count):\n\
    \        strip[i] = no_color\n    strip.show()\n\ni = 0\nwhile True:\n    clear()\n\
    \    strip[i] = red\n    strip.show()\n    time.sleep(1)\n    i += 1\n    if i\
    \ >= led_count:\n        i = 0\n```\n\nAs with all the program examples in this\
    \ book, you can also download this program (see Recipe 3.22).\n\nRun the program\
    \ with Python 3 and use the sudo command like this:\n\n```\n$ sudo python3 ch_15_neopixel.py\n\
    ```\n\nIf you have a different number of LEDs in your strip, modify led_count.\
    \ The rest of the constants do not need to be changed.\n\nYou can use only GPIOs\
    \ 10, 12, 18, and 21 with NeoPixels. If you want to use a different GPIO pin,\
    \ change board.D18 to whichever pin you are using.\n\nYou can set the color of\
    \ each of the LEDs independently. The colors are set as a tuple of red, green,\
    \ and blue intensities. To change the color of an LED at a particular position,\
    \ use the strip variable as if it were an array and set that element to the color\
    \ you want. For example (strip[i] = red)."
