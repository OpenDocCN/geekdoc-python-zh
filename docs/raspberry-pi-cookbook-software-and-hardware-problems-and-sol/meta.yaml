    \ import Matrix8x8x2\nfrom time import sleep\nfrom random import randint\n\ni2c\
    \ = board.I2C()\ndisplay = Matrix8x8x2(i2c)\ndisplay.brightness = 0.5\n\nwhile\
    \ True:\n    x = randint(0, 8)\n    y = randint(0, 8)\n    color = randint(0,\
    \ 4)\n    display[x, y] = color\n    sleep(0.1)\n```\n\nAs with all the program\
    \ examples in this book, you can also download this code (see Recipe 3.22).\n\n\
    # Discussion\n\nThe program imports the Matrix8x8x2 class, which is then initialized\
    \ with the I2C port. x and y coordinates are selected at random, each from a value\
    \ of 0 to 7. The color is a randomly selected number between 0 and 3: 0 is off,\
    \ 1 is red, 2 is green, and 3 is orange (both red and green). These are the only\
    \ colors available on this display, but it still looks pretty!"
  - "[PAGE 457]\n\n# See Also\n\nYou can find out more about the I2C LED module at\
