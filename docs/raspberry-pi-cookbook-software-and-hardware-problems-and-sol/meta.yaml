    \    print('Temp C:{:.2f} Hum:{:.0f} Pres:{:.0f}'.format(t, h, p))\n    time.sleep(1)\n\
    ```\n\n与本书中所有程序示例一样，你也可以下载此程序（参见配方3.22）。\n\n运行程序时，终端会显示类似以下内容：\n\n```\n$ python3\
    \ ch_14_sense_hat_thp.py\nTemp C:27.71 Hum:56 Pres:1005\nTemp C:27.60 Hum:55 Pres:1005\n\
    ```\n\n温度单位为摄氏度，湿度为相对湿度百分比，大气压单位为毫巴。\n\n### 讨论\n\n你会发现Sense HAT的温度读数偏高。这是因为温度传感器内置在湿度传感器中，位于Sense\
    \ HAT的PCB上。Sense HAT本身产生的热量很少（除非使用显示屏），但其下方的树莓派确实会发热，从而提高HAT的温度。避免此问题的最佳方法是使用40针排线将Sense\
    \ HAT与树莓派分开。也有人尝试通过使用树莓派的温度读数来调整读数。个人认为，这些补偿尝试可能非常特定于用户的设置，不太可能产生可靠的结果。\n\n除了从湿度传感器读取温度外，压力传感器也内置了温度传感器，你可以这样读取：\n\
