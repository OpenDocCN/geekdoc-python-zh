  md: "Note that, although the RC-522 pin has some pins marked SDA and SCL, as if\
    \ the device were using I2C, in this recipe the device uses the Raspberry Pi's\
    \ SPI interface.\n\nTo use the module, first fetch the Clever Card Kit software\
    \ using the commands that follow. This will install all of the prerequisite software\
    \ for the RC-522. You will need to reboot when it's finished installing:\n\n```\n\
    $ wget http://monkmakes.com/downloads/mmcck.sh\n$ chmod +x mmcck.sh\n$ ./mmcck.sh\n\
    ```\n\nTo test the reader, run the program in the *clever_card_kit* directory\
    \ called *01_read.py*:\n\n```\n$ cd ~/clever_card_kit\n$ python3 01_read.py\n\
    Hold a tag near the reader\n894922433952\n\n894922433952\n\n894922433952\n```\n\
    \nWhen you hold a card next to the RC-522, the RFID tag inside the card's unique\
    \ number will be printed out. When you've had enough of reading cards, hit Ctrl-C.\
    \ Here's the code:\n\n```\nimport RPi.GPIO as GPIO\nimport SimpleMFRC522\n\nreader\
    \ = SimpleMFRC522.SimpleMFRC522()\n\nprint(\"Hold a tag near the reader\")\n\n\
    try:\n    while True:\n        id, text = reader.read()\n        print(id)\n \
    \       print(text)\n\nfinally:\n    print(\"cleaning up\")\n    GPIO.cleanup()\n\
    ```\n\nThe RPi.GPIO is imported merely so that it can be used to cleanup the GPIO\
    \ pins when the program exits. The function call reader.read() will wait for an\
    \ RFID tag to come near the reader/writer and return the card's unique number\
    \ (id) and any text message stored on the card (text).\n\nYou can't change the\
    \ unique number assigned to each tag during manufacture, but you can store small\
    \ amounts of data on a card. To do this, use the program *02_write.py*:"
