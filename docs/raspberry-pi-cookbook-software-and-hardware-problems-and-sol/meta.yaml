    \n要启动程序，你需要以超级用户权限运行它：\n\n```\n$ sudo python3 ch_07_bottle_test.py\n```\n\n图7-3显示了如果你从网络上的任何浏览器连接到树莓派时看到的页面。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_232_0.png)\n\n图7-3. 浏览到Python bottle\
    \ Web服务器\n\n这个例子需要一点解释。\n\n在导入命令之后，`@route`命令将URL路径`/`与其后面的处理函数链接起来。\n\n该处理函数格式化日期和时间，然后返回一个HTML字符串，由浏览器渲染。在这种情况下，它使用了一个模板，可以将值替换到其中。\n\
    \n最后的`run`行实际上启动了Web服务进程。端口80是Web服务的默认端口；如果你想使用不同的端口，请在服务器地址后添加`:`，后跟端口号。\n\n\
    ### 讨论\n\n你可以在程序中定义任意数量的路由和处理程序。\n\nbottle非常适合小型、简单的Web服务器项目，而且由于它是用Python编写的，因此编写一个处理函数来控制硬件以响应用户在浏览器中与页面的交互非常容易。你将在第17章中找到其他使用bottle的示例。\n\
    \n树莓派（尤其是树莓派4）完全能够运行完整的Web服务器堆栈（Web服务器、Web框架和数据库），一个流行的例子是Apache、PHP和MySQL。这永远不会像专业服务器硬件那样表现出色，但它可以成为学习这些工作原理的绝佳平台。\n\
    \n### 另请参阅\n\n- 要将树莓派设置为LAMP（Linux、Apache、MySQL和PHP），请参阅https://oreil.ly/MIE00。\n\
    - 要获取更多信息，请参阅bottle文档。\n- 要了解更多关于在Python中格式化日期和时间的信息，请参阅配方7.2。\n- 要查看大量与互联网相关的配方，请参阅第17章。\n\
    \n## 7.18 在Python中什么都不做\n\n### 问题\n\n你想让Python消磨一段时间。例如，你可能想这样做，以便在向终端发送消息之间创建延迟。\n\
    \n### 解决方案\n\n使用`time`库中的`sleep`函数，如以下代码示例`ch_07_sleep_test.py`所示：\n\n```python\n\
    import time\n\nx = 0\nwhile True:\n    print(x)\n    time.sleep(1)\n    x += 1\n\
    ```\n\n你可以在本书的代码下载中找到此示例以及其他代码示例的代码（参见配方3.22）。\n\n程序的主循环将在打印下一个数字之前延迟一秒。\n\n###\
    \ 讨论\n\n函数`time.sleep`接受一个表示秒数的值作为其参数。但是，如果你想要比一秒更短的延迟，可以指定小数。例如，要延迟一毫秒，你会使用`time.sleep(0.001)`。\n\
    \n在任何无限期运行的循环中，或者即使只是运行超过几分之一秒的循环中，放入一个短延迟是一个好主意，因为在调用sleep时，处理器被释放出来，允许其他进程做一些工作。\n\
    \n当你在配方11.1和许多其他配方中使用GPIO引脚时，延迟被用来控制LED闪烁的定时等事情。\n\n### 另请参阅\n\n- 要了解关于`time.sleep`如何降低Python程序CPU负载的有趣讨论，请参阅https://oreil.ly/FgpUQ。\n\
    \n## 7.19 同时做不止一件事\n\n### 问题\n\n你的Python程序正忙于做一件事，而你想让它同时做其他事情。\n\n### 解决方案\n\n\
    使用Python的`threading`库。\n\n以下示例（`ch_07_thread_test.py`）设置了一个线程运行，该线程将中断主线程的计数。与本书中所有程序示例一样，你也可以下载它（参见配方3.22）：\n\
    \n```python\nimport threading, time, random\n\ndef annoy(message):\n    while\
    \ True:\n        time.sleep(random.randint(1, 3))\n        print(message)\n\n\
    t = threading.Thread(target=annoy, args=('BOO !!',))\nt.start()\n\nx = 0\nwhile\
    \ True:\n    print(x)\n    x += 1\n    time.sleep(1)\n```\n\n控制台上的输出将如下所示：\n\n\
    ```\n$ python3 ch_07_thread_test.py\n0\n1\nBOO !!\n2\nBOO !!\n3\n4\n5\nBOO !!\n\
    6\n7\n8\n```\n\n当你使用Python的`threading`库启动一个新的*执行线程*时，你必须指定一个（目标）函数作为该线程运行。在这个例子中，名为`annoy`的函数包含一个循环，该循环将无限期地在1到3秒的随机间隔后打印出一条消息。注意，`args`参数用于将字符串传递给`annoy`。\n\
    \n要启动线程实际运行，需要调用`Thread`类上的`start`方法。此方法有两个参数：第一个是要运行的函数的名称（在本例中为`annoy`），第二个是一个元组，包含要传递给函数的任何参数（在本例中为`'BOO\
    \ !!'`）。\n\n你可以看到，主线程只是愉快地计数，但每隔几秒就会被运行在`annoy`函数中的线程中断。\n\n### 讨论\n\n像这样的线程有时也被称为*轻量级进程*，因为它们在效果上类似于同时运行多个程序或进程。然而，它们有一个优势，即在同一程序中运行的线程可以访问相同的变量，并且当程序的主线程退出时，在其中启动的任何线程也会退出。\n\
    \n### 另请参阅\n\n- 要了解Python中线程的良好介绍，请参阅[https://pymotw.com/3/threading](https://pymotw.com/3/threading)。\n\
    \n## 7.20 解析JSON数据\n\n### 问题\n\n你想解析流行的JSON（JavaScript对象表示法）数据结构语言中的数据。\n\n这可能是因为你正在从网络服务下载数据，或者数据保存在JSON文件中。\n\
    \n### 解决方案\n\n使用`json`包，如以下示例所示："
