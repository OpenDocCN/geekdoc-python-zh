    \ 17-5.\n\nAssuming that you have a push switch and LED connected to your Raspberry\
    \ Pi, you can now run this flow by clicking the Deploy button. The LED should\
    \ light, and when you press the button on the switch connected to your Raspberry\
    \ Pi, the LED should turn off. The logic of this is inverted, but let's leave\
    \ that for now. We revisit this in the next chapter, where you learn a lot more\
    \ about Node-RED.\n\nThis is all very neat, but as yet it does not have much to\
    \ do with the IoT. This is where some of the other node types of Node-RED come\
    \ into play. If you browse the list, you'll find all sorts of nodes, including\
    \ the Tweet node. You can connect this node as a second output to the PIN 22 node,\
