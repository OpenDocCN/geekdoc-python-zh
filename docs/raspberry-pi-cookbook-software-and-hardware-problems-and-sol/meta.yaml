  md: '# 10.3 Keeping Your Raspberry Pi Safe When Using the GPIO Connector


    # Problem


    You want to connect external electronics to your Raspberry Pi and don’t want to
    accidentally damage or break it.


    # Solution


    Obey these simple rules to reduce the risk of damaging your Raspberry Pi when
    using the GPIO connector:


    +   - Do not poke at the GPIO connector with a screwdriver or any metal object
    when the Pi is powered up.

    - Do not connect electronic components to the GPIO pins or a breadboard with the
    Raspberry Pi powered on.

    - Do not power the Pi with more than 5V.

    - Always connect the Raspberry Pi GND pin to the GND connection of whatever device
    you are attaching.

    - Do not put more than 3.3V on any GPIO pin being used as an input.

    - Do not draw more than 16mA per output; keep the total for all outputs below
    100mA on a 40-pin Raspberry Pi and below 50mA for an old 26-pin Raspberry Pi.

    - When using LEDs, 3mA is enough to light a red LED reasonably brightly with a
    470Ω series resistor.

    - Do not draw more than a total of 250mA from the 5V supply pins for Raspberry
    Pi models 1 to 3. For the Pi 4, 5V power comes directly from USB, so the maximum
    depends on your power supply. 1A is a reasonable maximum with a 3A power supply.


    # Discussion


    There is no doubt about it: the Raspberry Pi is a little fragile when it comes
    to adding external electronics. The newer Raspberry Pi models are a bit more robust
    but still quite easy to break. Exercise caution and check what you have done *before*
    you power up the Raspberry Pi, or you run the risk of having to replace it.


    # See Also


    Read this very good discussion of the [Raspberry Pi''s GPIO output capabilities](https://www.raspberrypi.org/documentation/configuration/gpio.md).'
  merge: -1
  pgno: 285
