    \ 13-19.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_393_1.png)\n\nFigure 13-19.\
    \ A Raspberry Pi 3 complete with reset button\n\n## Discussion\n\nTo test out\
    \ your modification, power up your Raspberry Pi and then shut it down by selecting\
    \ Shutdown from the Raspberry Menu (Figure 13-20).\n\nAfter a while the screen\
    \ will close down and the Pi will go into a *halt* mode, where it uses minimal\
    \ power and is basically on standby.\n\nNow, to start your Pi, all you need to\
    \ do is press the button, and it will boot up!\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_394_0.png)\n\
    \nFigure 13-20. Shutting down the Raspberry Pi\n\n## See Also\n\nFor more information\
    \ on shutting down and starting your Raspberry Pi, see Recipe 1.15.\n\n# CHAPTER\
    \ 14\nSensors\n\n# 14.0 Introduction\n\nIn this chapter, we look at recipes for\
    \ using sensors of various types that will enable the Raspberry Pi to measure\
    \ temperature, light, and more.\n\nUnlike boards such as the Arduino and the Raspberry\
    \ Pi Pico, a regular Raspberry Pi lacks analog inputs. This means that for many\
    \ sensors, it is necessary to use additional analog-to-digital converter (ADC)\
    \ hardware. Fortunately, this is relatively easy to do. It is also possible to\
    \ use resistive sensors with a capacitor and a couple of resistors.\n\nMany of\
    \ the recipes will require the use of a solderless breadboard and male-to-female\
    \ jumper wires (see Recipe 10.9).\n\n# 14.1 Using Resistive Sensors\n\n## Problem\n\
    \nYou want to connect a variable resistor to a Raspberry Pi and measure its resistance\
    \ to determine the position of the variable resistor’s knob in your Python program.\n\
    \n## Solution\n\nYou can measure resistance on a Raspberry Pi using nothing more\
    \ than a capacitor, a couple of resistors, and two general-purpose input/output\
    \ (GPIO) pins. In this case, you will be able to estimate the position of the\
    \ knob on a small variable resistor (trimpot) by measuring its resistance from\
    \ its slider contact to one end of the pot.\n\nTo make this recipe, you’ll need\
    \ the following:\n\n- Breadboard and jumper wires (see “Prototyping Equipment\
    \ and Kits” on page 564)\n- 10kΩ trimpot (see “Resistors and Capacitors” on page\
    \ 565)\n- Two 1kΩ resistors (see “Resistors and Capacitors” on page 565)\n- 330\
    \ nF capacitor (see “Resistors and Capacitors” on page 565)\n\nFigure 14-1 shows\
    \ the arrangement of components on the breadboard.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_397_0.png)\n\
    \nThis recipe makes use of a Python library that the author developed to make\
