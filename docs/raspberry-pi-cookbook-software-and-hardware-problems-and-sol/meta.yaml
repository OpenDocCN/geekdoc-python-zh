    ## 讨论


    这是一本关于Raspberry Pi的书，而不是Arduino，因此我们不会详细讲解Arduino C代码。


    该代码基于PubSub Client库中名为mqtt_basic的示例草图。除了文件顶部用于WiFi凭证的常量外，这些行：


