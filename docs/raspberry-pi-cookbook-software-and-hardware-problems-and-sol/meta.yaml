    # 8.7 Extracting Text from an Image


    # Problem


    You want to be able to convert an image containing text to actual text.


    # Solution


    Use the Tesseract optical character recognition (OCR) software to extract text
    from the image. To install Tesseract, run the following commands (you will probably
    want to copy and paste this from the file *long_commands.txt* in the book downloads
    [Recipe 3.22](Recipe 3.22)):


    ```

    $ sudo apt install tesseract-ocr

    $ sudo apt install libtesseract-dev

    ```


    To try out Tesseract, you will need an image file that contains some text. You
    will find one called *ocr_test.tiff* with the downloads for the book (see [Recipe
    3.22](Recipe 3.22)). To convert the image to text, run the following command:


    ```

    $ cd ~/raspberrypi_cookbook_ed4

    $ tesseract ocr_test.tiff stdout

    Page 1

    This is an image


    of some text.

    ```


    If you take a look at the image file *ocr_test.tiff*, you will see that it is
    indeed an image containing those words.


    # Discussion


    Although I used a TIFF image, the tesseract library will work with most image
    types, including PDF, PNG, and JPEG files.


    # See Also


    For more information on the tesseract library, see [https://oreil.ly/Evdxw](https://oreil.ly/Evdxw).'
