- md: '## CHAPTER 1

    Setup and Management


    ## 1.0 Introduction


    When you buy a Raspberry Pi, you are essentially buying an assembled printed circuit
    board, or in the case of a Raspberry Pi 400, a circuit board in a keyboard case.
    For a fully functioning system, you are going to need at least a suitable power
    supply, operating system on microSD card, and mouse.


    The recipes in this chapter are concerned with getting your Raspberry Pi set up
    and ready for use.


    Because the Raspberry Pi uses standard USB and Bluetooth keyboards and mice, most
    of the setup is pretty straightforward, so you’ll concentrate only on those tasks
    that are specific to the Raspberry Pi.


    ## 1.1 Selecting a Model of Raspberry Pi


    ### Problem


    Many models of Raspberry Pi are available, and you are not sure which one to use.


    ### Solution


    The decision as to which Raspberry Pi model to use depends very much on what you
    plan to do with it. Table 1-1 lists some uses and my model recommendations.


    Table 1-1. Selecting a model of Raspberry Pi


    | Usage | Suggested model | Notes |

    |---|---|---|

    | Desktop computer replacement | Raspberry Pi 400 or Raspberry Pi 4 model B (4
    GB) | You will need the 4 GB of memory if you are web browsing. The Pi 400 offers
    the convenience being built into a keyboard case. |

    | Electronics experimentation | Raspberry Pi 2 or 3 model B | Reasonably up-to-date
    hardware will minimize software problems. No need for more performance. |

    | Computer vision | Raspberry Pi 4 model B (4 GB) | Maximum performance required.
    |

    | Home automation | Raspberry Pi 2 or 3 model B | Low-power consumption and more
    than enough power. |

    | Media center | Raspberry Pi 3 or 4 | For video performance. |

    | Electronic display board | Any model | A model with WiFi, advantageous for remote
    access. |

    | Embedded wireless electronics project | Raspberry Pi Zero 2 W or Pico W | Low
    cost and WiFi enabled for IoT (Internet of Things) and other wireless projects.
    |

    | Embedded electronics project | Pico | Very low cost and little in common with
    most Raspberry Pis other than the name. See Chapter 19 for more information. |


    If you want a good general-purpose Raspberry Pi, I recommend a Raspberry Pi 4
    model B. With four times as much memory as the original Raspberry Pi and a quad-core
    processor, it will cope with most tasks much better than the Pi Zero, but it doesn''t
    get as hot or use as much power as the Raspberry Pi 4. The Raspberry Pi 3 model
    B+ also has the great advantage of having WiFi and Bluetooth built in, so there''s
    no need for an extra USB WiFi adapter or Bluetooth hardware.


    ### The Raspberry Pi 4 model B


    As of this writing, the Raspberry Pi 4 model B (Figure 1-1) is the latest *standard*
    Raspberry Pi.


    The new model has also, for the first time, allowed users a choice of memory sizes
    (1 GB, 2 GB, 4 GB, or 8 GB), with the price reflecting your memory choice.


    One of the most significant changes is that the micro-USB socket that supplied
    power to earlier versions has been dropped in favor of the USB-C connector. Also,
    the single full-size HDMI connector of the earlier versions has been replaced
    by a pair of micro-HDMI connectors—so you''ll need a special HDMI lead or an adapter.
    And yes, you can connect two monitors at the same time.


    Under the hood, this Raspberry Pi is much faster than its predecessors (especially
    if you go for the 4 GB or 8 GB memory versions). In fact, some benchmarks suggest
    it is three to four times faster than any previous Raspberry Pi. This comes at
    the cost of the main chip on the board operating much hotter than in earlier versions—hot
    enough, in fact, to hurt.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_24_0.png)


    Figure 1-1. The Raspberry Pi 4 model B


    If, on the other hand, you are embedding a Raspberry Pi in a project for a single
    purpose, using a compact Pi Zero W and saving a few dollars might well be an option.


    ### The Raspberry Pi 400


    The Raspberry Pi makes a pretty good desktop computer replacement, and no Raspberry
    Pi is better suited to this than the Raspberry Pi 400 (Figure 1-2).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_24_1.png)


    Figure 1-2. The Raspberry Pi 400


    The Raspberry Pi 400 is essentially the same hardware as the Raspberry Pi 4, but
    built into a keyboard case, reminiscent of the home computers of the 1990s. The
    HDMI and USB ports are all accessible at the back of the Pi 400. The GPIO pins
    are accessible at the back of the computer, but are not as easy to access as a
    regular Raspberry Pi, so if you are buying a Raspberry Pi to learn about electronics,
    a regular Pi is probably a better choice. However, if you just want a desktop
    replacement, then a Pi 400 is a really good choice.


    ### Discussion


    Figure 1-3 shows the Pi Zero W, the Raspberry Pi 3 B, and the Raspberry Pi 4.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_25_0.png)


    Figure 1-3. From left to right, the Raspberry Pi Zero W, the Raspberry Pi 3 B,
    and the Raspberry Pi 4 B


    As you can see from Figure 1-3, the Pi Zero W is roughly half the size of the
    Pi 3 B or Pi 4 B, and it has a single micro-USB socket for communication and a
    second one for power. The Pi Zero W also saves space by using a mini-HDMI socket
    and micro-USB on-the-go socket. If you want to connect a keyboard, monitor, and
    mouse to a Pi Zero, you''ll need adapters for both the USB and the HDMI ports
    before you can connect standard peripherals. The Raspberry Pi A+ is larger than
    the Pi Zero and has full-size USB and HDMI ports.


    Table 1-2 summarizes the differences between all the Raspberry Pi models to date,
    with the most recently released models toward the top.


    Table 1-2. Raspberry Pi models


    | Model | RAM | Processor (cores * clock) | USB sockets | Ethernet port | Notes
    |

    |---|---|---|---|---|---|

    | 400 | 4 GB | 4 * 1.8 GHz | 4 (2 x USB3) | yes | Built into a keyboard |

    | 4 B | 1/2/4/8 GB | 4 * 1.5 GHz | 4 (2 x USB3) | yes | 2 x micro-HDMI video |

    | Compute 4 | 1/2/4/8 GB | 4 * 1.5 GHz | no | no | For embedding in products (see
    sidebar) |

    | 3 A+ | 512 MB | 4 * 1.4 GHz | 1 | no | WiFi and Bluetooth |

    | 3 B+ | 1 GB | 4 * 1.4 GHz | 4 | yes | WiFi and Bluetooth |

    | 3 B | 1 GB | 4 * 1.2 GHz | 4 | yes | WiFi and Bluetooth |

    | Zero 2 W | 512 MB | 4 * 1 GHz | 1 (micro) | no | WiFi and Bluetooth |

    | Zero W | 512 MB | 1 * 1 GHz | 1 (micro) | no | WiFi and Bluetooth |

    | Zero | 512 MB | 1 * 1 GHz | 1 (micro) | no | Low cost |

    | 2 B | 1 GB | 4 * 900 MHz | 4 | yes | |

    | A+ | 256 MB | 1 * 700 MHz | 1 | no | |

    | B+ | 512 MB | 1 * 700 MHz | 4 | yes | Discontinued |

    | A | 256 MB | 1 * 700 MHz | 1 | no | Discontinued |

    | B rev2 | 512 MB | 1 * 700 MHz | 2 | yes | Discontinued |

    | B rev1 | 256 MB | 1 * 700 MHz | 2 | yes | Discontinued |


    If you have one of the older or discontinued Raspberry Pi models, it is still
    useful. Those models do not have quite the performance of the latest Raspberry
    Pi 4, but for many situations, that does not matter.


    If you are buying a new Raspberry Pi, I consider the best choice for use as a
    general-purpose computer to be the Raspberry Pi 4 or 400. If you don''t need WiFi
    or want a smaller device, also consider the 3 B, 2 B, or Zero W.


    > ## The Raspberry Pi Compute 4


    The Raspberry Pi is such a useful device that it has found its way into many commercial
    products. Sometimes this is a little wasteful, as the product may not have need
    of all the connectors and other features of, say, a Raspberry Pi 4.


    The Raspberry Pi Compute 4 (and its predecessors) provides a neat module (Figure
    1-4) that has connectors on the underside designed to mate to a carrier board,
    as a really easy way for a product to incorporate a Linux computer. Because the
    module and its associated WiFi and Bluetooth are already certified as CE and FCC
    compliant, making your product comply with relevant standards is a lot easier.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_27_0.png)


    Figure 1-4. The Raspberry Pi Compute Module 4


    ### See Also


    For more information on the Raspberry Pi models, see [https://oreil.ly/oY-A_](https://oreil.ly/oY-A_).


    Take a look at the [Raspberry Pi Compute Modules](https://oreil.ly/oY-A_).


    The low cost of the Pi Zero and Pi Zero W models makes them ideal for embedding
    in electronics projects without worrying about the expense. See [Recipe 10.18](https://oreil.ly/oY-A_).


    ## 1.2 Connecting the System


    ### Problem


    You have everything that you need for your Raspberry Pi, and you want to connect
    it all.


    ### Solution


    Unless you are embedding your Raspberry Pi in a project or using it as a media
    center, you need to attach a keyboard (unless you are using a Pi 400), a mouse,
    and a monitor.


    [Figure 1-5](https://oreil.ly/oY-A_) shows a typical Raspberry Pi system. If you
    have a Raspberry Pi 4, you could (if you really wanted) connect a second monitor.
    However, if you have just one monitor, connect it to the micro-HDMI connector
    closest to the USB-C power connector.'
  mdcn: '## 第一章

    设置与管理


    ## 1.0 简介


    当你购买树莓派时，你本质上是购买了一块组装好的印刷电路板，或者对于树莓派400而言，是购买了一块装在键盘外壳中的电路板。要构建一个功能完整的系统，你至少需要一个合适的电源、一张装有操作系统的microSD卡和一个鼠标。


    本章的指南将帮助你设置树莓派并使其准备好使用。


    由于树莓派使用标准的USB和蓝牙键盘鼠标，大部分设置过程相当简单，因此你将只专注于那些树莓派特有的任务。


    ## 1.1 选择树莓派型号


    ### 问题


    市面上有多种型号的树莓派，你不确定该使用哪一种。


    ### 解决方案


    选择哪种树莓派型号在很大程度上取决于你计划用它来做什么。表1-1列出了一些用途及我的型号推荐。


    表1-1. 选择树莓派型号


    | 用途 | 推荐型号 | 备注 |

    |---|---|---|

    | 替代台式电脑 | 树莓派400 或 树莓派4型号B (4 GB) | 如果进行网页浏览，你需要4 GB内存。Pi 400提供了集成在键盘外壳中的便利性。
    |

    | 电子实验 | 树莓派2 或 3型号B | 相对较新的硬件将最大限度地减少软件问题。无需更高性能。 |

    | 计算机视觉 | 树莓派4型号B (4 GB) | 需要最高性能。 |

    | 家庭自动化 | 树莓派2 或 3型号B | 低功耗且性能绰绰有余。 |

    | 媒体中心 | 树莓派3 或 4 | 为了视频性能。 |

    | 电子显示板 | 任何型号 | 带WiFi的型号，便于远程访问。 |

    | 嵌入式无线电子项目 | 树莓派Zero 2 W 或 Pico W | 低成本且支持WiFi，适用于物联网（IoT）和其他无线项目。 |

    | 嵌入式电子项目 | Pico | 成本极低，除了名称外，与大多数树莓派几乎没有共同之处。更多信息请参见第19章。 |


    如果你想要一款通用的树莓派，我推荐树莓派4型号B。它的内存是初代树莓派的四倍，并且拥有四核处理器，它在处理大多数任务时会比Pi Zero好得多，但它不会像树莓派4那样发热严重或耗电过多。树莓派3型号B+还有一个巨大优势，即内置了WiFi和蓝牙，因此无需额外的USB
    WiFi适配器或蓝牙硬件。


    ### 树莓派4型号B


    截至本文撰写时，树莓派4型号B（图1-1）是最新款的*标准*树莓派。


    这款新型号也首次允许用户选择内存大小（1 GB、2 GB、4 GB或8 GB），价格会根据你的内存选择而变化。


    最显著的变化之一是，为早期版本供电的micro-USB接口已被USB-C接口取代。此外，早期版本的单个全尺寸HDMI接口已被一对micro-HDMI接口取代——因此你需要一根特殊的HDMI线或一个适配器。是的，你可以同时连接两个显示器。


    在内部，这款树莓派比其前代产品快得多（尤其是如果你选择4 GB或8 GB内存版本）。事实上，一些基准测试表明，它的速度是任何以前树莓派的三到四倍。这是以主板上的主芯片比早期版本运行温度高得多为代价的——事实上，热到足以烫伤人。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_24_0.png)


    图1-1. 树莓派4型号B


    另一方面，如果你将树莓派嵌入到一个单一用途的项目中，使用紧凑的Pi Zero W并节省几美元可能是一个不错的选择。


    ### 树莓派400


    树莓派是一款相当不错的台式电脑替代品，而没有哪款树莓派比树莓派400（图1-2）更适合这个角色。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_24_1.png)


    图1-2. 树莓派400


    树莓派400本质上与树莓派4的硬件相同，但被集成在一个键盘外壳中，让人想起1990年代的家用电脑。HDMI和USB端口都位于Pi 400的背面。GPIO引脚位于电脑背面，但不像常规树莓派那样容易接触，因此如果你购买树莓派是为了学习电子学，常规的Pi可能是更好的选择。然而，如果你只是想要一台台式电脑替代品，那么Pi
    400确实是一个非常好的选择。


    ### 讨论


    图1-3展示了Pi Zero W、树莓派3 B和树莓派4。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_25_0.png)


    图1-3. 从左到右，树莓派Zero W、树莓派3 B和树莓派4 B


    如图1-3所示，Pi Zero W的尺寸大约是Pi 3 B或Pi 4 B的一半，它有一个用于通信的micro-USB接口和一个用于供电的第二个接口。Pi Zero
    W还通过使用mini-HDMI接口和micro-USB OTG接口来节省空间。如果你想将键盘、显示器和鼠标连接到Pi Zero，你需要为USB和HDMI端口都准备适配器，然后才能连接标准外设。树莓派A+比Pi
    Zero大，拥有全尺寸的USB和HDMI端口。


    表1-2总结了迄今为止所有树莓派型号之间的差异，最新发布的型号位于顶部。


    表1-2. 树莓派型号


    | 型号 | 内存 | 处理器（核心数 * 主频） | USB接口 | 以太网端口 | 备注 |

    |---|---|---|---|---|---|

    | 400 | 4 GB | 4 * 1.8 GHz | 4 (2 x USB3) | 有 | 集成在键盘中 |

    | 4 B | 1/2/4/8 GB | 4 * 1.5 GHz | 4 (2 x USB3) | 有 | 2 x micro-HDMI视频输出 |

    | Compute 4 | 1/2/4/8 GB | 4 * 1.5 GHz | 无 | 无 | 用于嵌入产品中（见侧边栏） |

    | 3 A+ | 512 MB | 4 * 1.4 GHz | 1 | 无 | WiFi和蓝牙 |

    | 3 B+ | 1 GB | 4 * 1.4 GHz | 4 | 有 | WiFi和蓝牙 |

    | 3 B | 1 GB | 4 * 1.2 GHz | 4 | 有 | WiFi和蓝牙 |

    | Zero 2 W | 512 MB | 4 * 1 GHz | 1 (micro) | 无 | WiFi和蓝牙 |

    | Zero W | 512 MB | 1 * 1 GHz | 1 (micro) | 无 | WiFi和蓝牙 |

    | Zero | 512 MB | 1 * 1 GHz | 1 (micro) | 无 | 低成本 |

    | 2 B | 1 GB | 4 * 900 MHz | 4 | 有 | |

    | A+ | 256 MB | 1 * 700 MHz | 1 | 无 | |

    | B+ | 512 MB | 1 * 700 MHz | 4 | 有 | 已停产 |

    | A | 256 MB | 1 * 700 MHz | 1 | 无 | 已停产 |

    | B rev2 | 512 MB | 1 * 700 MHz | 2 | 有 | 已停产 |

    | B rev1 | 256 MB | 1 * 700 MHz | 2 | 有 | 已停产 |


    如果你拥有较旧或已停产的树莓派型号，它仍然有用。这些型号的性能不如最新的树莓派4，但在许多情况下，这并不重要。


    如果你要购买新的树莓派，我认为作为通用计算机的最佳选择是树莓派4或400。如果你不需要WiFi或想要更小的设备，也可以考虑3 B、2 B或Zero W。


    > ## 树莓派 Compute 4


    树莓派是一个非常有用的设备，它已经进入了许多商业产品。有时这有点浪费，因为产品可能不需要树莓派4的所有接口和其他功能。


    树莓派Compute 4（及其前代产品）提供了一个简洁的模块（图1-4），其底部的连接器设计用于与载板配合，这是产品集成Linux计算机的一种非常简便的方式。由于该模块及其相关的WiFi和蓝牙已经通过了CE和FCC认证，使你的产品符合相关标准要容易得多。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_27_0.png)


    图1-4. 树莓派Compute Module 4


    ### 另请参阅


    有关树莓派型号的更多信息，请参见 [https://oreil.ly/oY-A_](https://oreil.ly/oY-A_)。


    查看 [树莓派Compute Modules](https://oreil.ly/oY-A_)。


    Pi Zero和Pi Zero W型号的低成本使其非常适合嵌入电子项目，而无需担心费用。参见 [指南10.18](https://oreil.ly/oY-A_)。


    ## 1.2 连接系统


    ### 问题


    你已经拥有了树莓派所需的一切，并且想要将它们全部连接起来。


    ### 解决方案


    除非你将树莓派嵌入项目中或用作媒体中心，否则你需要连接一个键盘（除非你使用的是Pi 400）、一个鼠标和一个显示器。


    [图1-5](https://oreil.ly/oY-A_)展示了一个典型的树莓派系统。如果你有树莓派4，你可以（如果你真的想）连接第二个显示器。但是，如果你只有一个显示器，请将其连接到最靠近USB-C电源接口的micro-HDMI接口。'
