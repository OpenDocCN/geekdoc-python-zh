    # 10.6 Setting Up SPI


    # Problem


    You have a device that uses the Serial Peripheral Interface (SPI) bus, and you
    want to use the device with your Raspberry Pi.


    # Solution


    By default, SPI is disabled in Raspberry Pi OS. To enable it, the procedure is
    almost the same as Recipe 10.4. On the Raspberry Menu, under Preferences, open
    the Raspberry Pi Configuration tool (Figure 10-10). Go to the Interfaces tab,
    click the toggle switch for SPI, and click OK.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_290_0.png)'
  merge: -1
