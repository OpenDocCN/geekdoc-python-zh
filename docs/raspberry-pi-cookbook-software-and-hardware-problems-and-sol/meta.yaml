- md: "## 9.8 Responding to a Spoken Command in Python\n\n### Problem\n\nSeeing the\
    \ Edge Impulse system recognize a spoken phrase is pretty amazing, but you want\
    \ to take this a step further and have it trigger an action in your own Python\
    \ program.\n\n### Solution\n\nFirst of all, set up Edge Impulse by following Recipe\
    \ 9.5, and then create a trained impulse by following Recipe 9.6.\n\nNext, you\
    \ need to install the Python SDK (software development kit):\n\n```\n$ sudo apt\
    \ install libatlas-base-dev libportaudio0 libportaudio2 libportaudiocpp0 portaudio19-dev\n\
    $ pip3 install edge_impulse_linux -i https://oreil.ly/uainS\n```\n\nI found that\
    \ I had to update my version of the Python NumPy library and install the PyAudio\
    \ module by running:\n\n```\n$ pip3 install numpy --upgrade\n$ pip3 install pyaudio\n\
    ```\n\nNext, let's download the trained model from the Edge Impulse server using\
    \ the following command:\n\n```\n$ edge-impulse-linux-runner --download modelfile.eim\n\
    ```\n\nThe program `09_hey_pi.py` listed as follows will respond by printing “Hello\
    \ you!” every time it hears the phrase “hey pi.” Before running it, you may need\
    \ to change the line `audio_device_id` from 2 to the ID for your microphone:\n\
    \n```\nimport sys\nimport signal\nfrom edge_impulse_linux.audio import AudioImpulseRunner\n\
    \nmodelfile = '/home/pi/modelfile.eim'\naudio_device_id = 2\n\nrunner = None\n\
    \ndef signal_handler(sig, frame):\n    print('Interrupted')\n    if (runner):\n\
    \        runner.stop()\n    sys.exit(0)\n\nsignal.signal(signal.SIGINT, signal_handler)\n\
    \nwith AudioImpulseRunner(modelfile) as runner:\n    try:\n        model_info\
    \ = runner.init()\n        labels = model_info['model_parameters']['labels']\n\
    \        print('Loaded runner for \"' + model_info['project']['owner'] + ' / '\
    \ +\n              model_info['project']['name'] + '\"')\n\n        for res, audio\
    \ in runner.classifier(device_id=audio_device_id):\n            score = res['result']['classification']['hey_pi']\n\
    \            if (score > 0.7):\n                print('Hello you!')\n\n    finally:\n\
    \        if (runner):\n            runner.stop()\n```\n\nRun the program and try\
    \ experimenting with different phrases to see how accurate the detection of “hey\
    \ pi” is:\n\n```\n$ python3 07_hey_pi.py\nLoaded runner for \"Simon / Hey Pi\"\
    \nselected Audio device: 2\nHello you!\nHello you!\nHello you!\n```\n\n### Discussion\n\
    \nThe program is based around the AudioImpulseRunner from the Edge Impulse Python\
    \ library. This runner repeatedly listens to audio samples and then attempts to\
    \ classify the sounds it hears. In this case, it’s determining if the phrase “hey\
    \ pi” has been heard. This runner holds the microphone as a resource, so it is\
    \ important that if Ctrl-C is pressed to stop the program, the code ends neatly,\
    \ releasing the audio device. That is where the signal_handler function comes\
    \ in, linked to signal.SIGINT (Ctrl-C).\n\nInside the runner’s with/as block,\
    \ the runner is first initialized using runner.init() and then details of the\
    \ model being used are displayed.\n\nThe for loop effectively iterates over an\
    \ endless stream of results supplied by runner.classifier. Each result has a score,\
    \ and if the score is greater than 0.7, the message “Hello you!” is printed. The\
    \ threshold of 0.7 is quite low, so you’ll find that you can fool your Pi into\
    \ responding using similar phrases. Try increasing it to 0.95.\n\n### See Also\n\
    \nAlthough all we are doing here is printing a message when the phrase is detected,\
    \ there is no reason why we couldn’t use this to control hardware using the GPIO\
    \ pins (Recipe 10.1) or with some of the recipes in Chapter 18.\n\n## CHAPTER\
    \ 10 Hardware Basics\n\n### 10.0 Introduction\n\nThis chapter contains some basic\
    \ recipes for setting up and using the Raspberry Pi’s general-purpose input/output\
    \ (GPIO) connector. This connector enables you to connect all sorts of interesting\
    \ electronics to your Raspberry Pi.\n\n### 10.1 Finding Your Way Around the GPIO\
    \ Connector\n\n#### Problem\n\nYou need to connect electronics to the GPIO connector,\
    \ but first you need to know more about what all the pins do.\n\n#### Solution\n\
    \nThere have been three versions of the Raspberry Pi GPIO connector: two 26-pin\
    \ layouts for the original Raspberry Pi, and one 40-pin layout that was introduced\
    \ with the Raspberry Pi “+” models and has been in use ever since.\n\nA 26-pin\
    \ Raspberry Pi is more of a vintage collectible than a practical computer, and\
    \ you’ll likely find it slow and incompatible with a whole slew of software. So,\
    \ for practical terms, you’ll probably need to get a Raspberry Pi 4 or 400, or\
    \ at least a Pi 3.\n\nFigure 10-1 shows the current 40-pin layout, which is the\
    \ same for all 40-pin GPIO Raspberry Pi models right up to the Raspberry Pi 4\
    \ and 400.\n\nThe top 26 pins are the same as the 26 pins of the original Raspberry\
    \ Pi model B revision 2. This allows the 40-pin Raspberry Pi models to use hardware\
    \ and software designed for the earlier 26-pin Raspberry Pi designs. The extra\
    \ pins of the 40-pin connector are made up of three useful extra GND connections\
    \ and nine GPIO pins. The ID_SD and ID_SC pins are intended for use in communicating\
    \ with a special serial memory chip, which can be included on interface boards\
    \ that conform to the hardware attached on top (HAT) standard and allows the Raspberry\
    \ Pi to identify the board (see the Discussion section).\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_281_0.png)\n\
    \nFigure 10-1. The GPIO pinout (40-pin models)\n\nAt the top of the connector,\
    \ there are 3.3V and 5V power supplies. The GPIO uses 3.3V for all inputs and\
    \ outputs. Any pin with a number next to it can act as a GPIO pin. Those that\
    \ have another name after the number also have some other special purpose: 14\
    \ TXD and 15 RXD are the transmit and receive pins of the serial interface; 2\
    \ SDA and 3 SCL form the I2C interface; and 10 MOSI, 9 MISO, and 11 SCKL form\
    \ the SPI interface.\n\n> **3V Only**\n> The GPIO connector has both 3V (actually\
    \ 3.3V) and 5V power pins. This gives the false impression that the Raspberry\
    \ Pi is OK with you connecting 5V electronics to it. Although it can supply 5V\
    \ power to a device, all connections to GPIO pins on the Pi must be 3V, or they\
    \ will damage your Raspberry Pi. Typically, connecting a 5V connection to a GPIO\
    \ pin will burn out that pin and possibly the whole of the Raspberry Pi's processor.\n\
    \n#### Discussion\n\nWorking out which pin is which on a Raspberry Pi is quite\
    \ error prone if you rely on counting down the pin connector to find the pin you\
    \ need. A better way of finding the correct pin is to use a GPIO template like\
    \ the Raspberry Leaf shown in Figure 10-2.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_282_0.png)\n\
    \nFigure 10-2. The Raspberry Leaf GPIO template\n\nThis template fits over the\
    \ GPIO pins, indicating which pin is which. Other GPIO templates include the Pi\
    \ GPIO reference board.\n\nThe HAT standard is an interface standard that you\
    \ can use with the Raspberry Pi 4, 3, 2, B+, A+, and Zero. This standard does\
    \ not in any way stop you from just using GPIO pins directly; however, interface\
    \ boards that conform to the HAT standard can call themselves HATs. HATs differ\
    \ from regular Raspberry Pi interface boards in that they must contain a little\
    \ electrically erasable programmable read-only memory (EEPROM) chip that is used\
    \ to identify the HAT so that ultimately the Raspberry Pi can autoinstall necessary\
    \ software. As of this writing, HATs have not quite met that level of sophistication,\
    \ but the idea is a good one. The pins ID_SD and ID_SC are used to communicate\
    \ with a HAT EEPROM.\n\n#### See Also\n\nThe Raspberry Pi GPIO connector has only\
    \ digital inputs and outputs; it doesn't have the analog inputs found on some\
    \ similar boards. You can get around this shortcoming by using a separate analog-to-digital\
    \ converter (ADC) chip (Recipe 14.7) or by using resistive sensors (Recipe 14.1).\n\
    \nFor an example of a HAT, see the Sense HAT described in Recipe 10.15."
  mdcn: "## 9.8 在Python中响应语音指令\n\n### 问题\n\n看到Edge Impulse系统识别出语音短语相当令人惊叹，但你希望更进一步，让它在你自己的Python程序中触发一个动作。\n\
    \n### 解决方案\n\n首先，按照配方9.5设置Edge Impulse，然后按照配方9.6创建一个训练好的脉冲。\n\n接下来，你需要安装Python\
    \ SDK（软件开发工具包）：\n\n```\n$ sudo apt install libatlas-base-dev libportaudio0 libportaudio2\
    \ libportaudiocpp0 portaudio19-dev\n$ pip3 install edge_impulse_linux -i https://oreil.ly/uainS\n\
    ```\n\n我发现我必须通过运行以下命令来更新我的Python NumPy库版本并安装PyAudio模块：\n\n```\n$ pip3 install\
    \ numpy --upgrade\n$ pip3 install pyaudio\n```\n\n接下来，让我们使用以下命令从Edge Impulse服务器下载训练好的模型：\n\
    \n```\n$ edge-impulse-linux-runner --download modelfile.eim\n```\n\n下面列出的程序`09_hey_pi.py`会在每次听到“hey\
    \ pi”短语时通过打印“Hello you!”来响应。在运行它之前，你可能需要将`audio_device_id`行从2更改为你的麦克风的ID：\n\n\
    ```\nimport sys\nimport signal\nfrom edge_impulse_linux.audio import AudioImpulseRunner\n\
    \nmodelfile = '/home/pi/modelfile.eim'\naudio_device_id = 2\n\nrunner = None\n\
    \ndef signal_handler(sig, frame):\n    print('Interrupted')\n    if (runner):\n\
    \        runner.stop()\n    sys.exit(0)\n\nsignal.signal(signal.SIGINT, signal_handler)\n\
    \nwith AudioImpulseRunner(modelfile) as runner:\n    try:\n        model_info\
    \ = runner.init()\n        labels = model_info['model_parameters']['labels']\n\
    \        print('Loaded runner for \"' + model_info['project']['owner'] + ' / '\
    \ +\n              model_info['project']['name'] + '\"')\n\n        for res, audio\
    \ in runner.classifier(device_id=audio_device_id):\n            score = res['result']['classification']['hey_pi']\n\
    \            if (score > 0.7):\n                print('Hello you!')\n\n    finally:\n\
    \        if (runner):\n            runner.stop()\n```\n\n运行该程序，并尝试使用不同的短语进行实验，看看“hey\
    \ pi”的检测有多准确：\n\n```\n$ python3 07_hey_pi.py\nLoaded runner for \"Simon / Hey\
    \ Pi\"\nselected Audio device: 2\nHello you!\nHello you!\nHello you!\n```\n\n\
    ### 讨论\n\n该程序基于Edge Impulse Python库中的AudioImpulseRunner。这个运行器反复监听音频样本，然后尝试对其听到的声音进行分类。在这种情况下，它正在确定是否听到了短语“hey\
    \ pi”。这个运行器将麦克风作为资源持有，因此，如果按下Ctrl-C停止程序，代码能够干净地结束并释放音频设备就非常重要。这就是signal_handler函数的作用，它与signal.SIGINT（Ctrl-C）相关联。\n\
    \n在运行器的with/as块内，首先使用runner.init()初始化运行器，然后显示所使用模型的详细信息。\n\nfor循环有效地遍历了由runner.classifier提供的无限结果流。每个结果都有一个分数，如果分数大于0.7，则打印消息“Hello\
    \ you!”。0.7的阈值相当低，所以你会发现你可以用类似的短语来愚弄你的树莓派使其响应。尝试将其增加到0.95。\n\n### 另请参阅\n\n虽然我们在这里所做的只是在检测到短语时打印一条消息，但没有理由我们不能使用它通过GPIO引脚（配方10.1）或第18章中的一些配方来控制硬件。\n\
    \n## 第10章 硬件基础\n\n### 10.0 简介\n\n本章包含一些关于设置和使用树莓派通用输入/输出（GPIO）连接器的基本配方。这个连接器使你能够将各种有趣的电子设备连接到你的树莓派。\n\
    \n### 10.1 熟悉GPIO连接器\n\n#### 问题\n\n你需要将电子设备连接到GPIO连接器，但首先你需要更多地了解所有引脚的功能。\n\n\
    #### 解决方案\n\n树莓派GPIO连接器有三个版本：原始树莓派的两个26引脚布局，以及从树莓派“+”型号引入并一直使用至今的一个40引脚布局。\n\n\
    26引脚的树莓派更像是一个复古收藏品，而不是一台实用的计算机，你可能会发现它速度慢，并且与一大堆软件不兼容。因此，从实际角度出发，你可能需要一个树莓派4或400，或者至少一个Pi\
    \ 3。\n\n图10-1显示了当前的40引脚布局，它适用于所有40引脚GPIO树莓派型号，直至树莓派4和400。\n\n顶部的26个引脚与原始树莓派型号B修订版2的26个引脚相同。这使得40引脚的树莓派型号可以使用为早期26引脚树莓派设计设计的硬件和软件。40引脚连接器的额外引脚由三个有用的额外GND连接和九个GPIO引脚组成。ID_SD和ID_SC引脚旨在用于与特殊的串行存储芯片通信，该芯片可以包含在符合硬件附加在顶部（HAT）标准的接口板上，并允许树莓派识别该板（参见讨论部分）。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_281_0.png)\n\n图10-1. GPIO引脚排列（40引脚型号）\n\
    \n在连接器的顶部，有3.3V和5V电源。GPIO对所有输入和输出使用3.3V。任何旁边有数字的引脚都可以用作GPIO引脚。那些在数字之后还有其他名称的引脚也具有其他特殊用途：14\
    \ TXD和15 RXD是串行接口的发送和接收引脚；2 SDA和3 SCL构成I2C接口；10 MOSI、9 MISO和11 SCKL构成SPI接口。\n\n\
    > **仅限3V**\n> GPIO连接器有3V（实际上是3.3V）和5V电源引脚。这给人一种错误的印象，即树莓派可以连接5V电子设备。虽然它可以向设备提供5V电源，但所有连接到树莓派GPIO引脚的连接必须是3V，否则它们会损坏你的树莓派。通常，将5V连接连接到GPIO引脚会烧毁该引脚，并可能烧毁整个树莓派处理器。\n\
    \n#### 讨论\n\n如果你依靠向下数连接器引脚来找到所需的引脚，那么在树莓派上找出哪个引脚是哪个是相当容易出错的。找到正确引脚的一个更好的方法是使用像图10-2所示的Raspberry\
    \ Leaf这样的GPIO模板。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_282_0.png)\n\n图10-2.\
    \ Raspberry Leaf GPIO模板\n\n这个模板套在GPIO引脚上，指示哪个引脚是哪个。其他GPIO模板包括Pi GPIO参考板。\n\nHAT标准是一个你可以与树莓派4、3、2、B+、A+和Zero一起使用的接口标准。这个标准绝不阻止你直接使用GPIO引脚；然而，符合HAT标准的接口板可以自称HAT。HAT与常规树莓派接口板的不同之处在于，它们必须包含一个小的电可擦除可编程只读存储器（EEPROM）芯片，该芯片用于识别HAT，以便最终树莓派可以自动安装必要的软件。截至撰写本文时，HAT尚未完全达到那种复杂程度，但这个想法很好。引脚ID_SD和ID_SC用于与HAT\
    \ EEPROM通信。\n\n#### 另请参阅\n\n树莓派GPIO连接器只有数字输入和输出；它没有一些类似板上存在的模拟输入。你可以通过使用单独的模数转换器（ADC）芯片（配方14.7）或使用电阻式传感器（配方14.1）来克服这个缺点。\n\
    \n有关HAT的示例，请参见配方10.15中描述的Sense HAT。"
