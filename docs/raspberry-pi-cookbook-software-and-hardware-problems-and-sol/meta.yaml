    \        self.name = name\n        self.tel = tel\n```\n\n类定义内的第一行使用三个单引号表示一个*文档字符串*，它应该解释类的目的。虽然完全是可选的，但为类添加文档字符串允许其他人了解该类的功能。如果该类可供其他人使用，这将特别有用。\n\
