  - '[PAGE 367]


    When you press the button, the function do_stuff is run, irrespective of what
    the program is otherwise doing. This approach is called using interrupts and is
    often used in programs that need to trigger actions when a button is pressed,
    but also need to be doing other things.


    Note that this line:


    ```

    button.when_pressed = do_stuff

    ```


    includes do_stuff without () on the end. This is because we are referring to the
    function, not actually calling it, until the interrupt occurs. In other words,
    we are telling the interrupt handler which function to call when there is an interrupt,
    not asking it to call the function immediately.


    # Discussion


    Notice that the switch is wired so that when it is pressed, it connects pin 18,
    which is configured as an input to GND.


    You might expect the push switch to have just two connections, which are either
    open or closed. Although some of these tactile push switches do have just two
    connections, most have four to provide mechanical strength. Figure 13-3 shows
    how these connections are arranged.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_367_0.png)


    Actually, there are really only two electrical connections, because inside the
    switch package, pins B and C are connected together, as are A and D.


    # See Also


    For more information on using a breadboard and jumper wires with the Raspberry
    Pi, see Recipe 10.9.


    To debounce a switch, see Recipe 13.5.


    To use external pull-up or pull-down resistors, see Recipe 13.6.'
  - '[PAGE 368]


    # 13.2 Toggling with a Push Switch


    # Problem


    You want to create a push switch that toggles something between on and off each
    time you press it.


    # Solution


    Read the last *state* of the button (that is, whether the button is on or off)
    and invert that value each time the button is pressed.


    The following example toggles an LED on and off as you press the switch.


    To make this recipe, you will need the following:


    +   - Breadboard and jumper wires (see “Prototyping Equipment and Kits” on page
    564)

    - Tactile push switch (see “Miscellaneous” on page 567)

    - LED (see “OptoElectronics” on page 566)

    - 470Ω resistor (see “Resistors and Capacitors” on page 565)


    Figure 13-4 shows how to connect a tactile push switch and LED, using a breadboard
    and jumper wires.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_368_0.png)


    In addition to the male-to-female jumper wires connecting the Raspberry Pi to
    the breadboard, you also need one male-to-male jumper wire or solid core wire.'
- md: "## 13.2 Using a Button to Control an LED\n\nAs an alternative to a breadboard\
    \ and separate components, you could use a Raspberry Squid (Recipe 10.10) and\
    \ a Squid Button (Recipe 13.1).\n\nOpen an editor and paste in the following code\
    \ (ch_13_switch_on_off.py):\n\n```python\nfrom gpiozero import Button, LED\nfrom\
    \ time import sleep\n\nled = LED(23)\n\ndef toggle_led():\n    print(\"toggling\"\
    )\n    led.toggle()\n\nbutton = Button(18)\nbutton.when_pressed = toggle_led\n\
    \nwhile True:\n    print(\"Busy doing other stuff\")\n    sleep(2)\n```\n\nAs\
    \ with all the program examples in this book, you can also download this code\
    \ (see Recipe 3.22).\n\nThe program is based on ch_13_switch_2.py and again uses\
    \ interrupts so that the program can be getting on with other things until a button\
    \ press happens.\n\nWhen the button is pressed, the function toggle_led is called.\
    \ This toggles the LED; that is, if it's on, it turns it off, and if it's off,\
    \ it turns it on.\n\n### Discussion\n\nDepending on the quality of your switch,\
    \ you may have noticed that sometimes the LED doesn't toggle, but that two or\
    \ more “toggling” messages appear in the Terminal. This is due to something called\
    \ switch bounce, which we will discuss further in Recipe 13.5.\n\n### See Also\n\
    \nFor the documentation on the gpiozero Button class, see https://oreil.ly/SXIZ9.\n\
    \n## 13.3 Using a Two-Position Toggle or Slide Switch\n\n### Problem\n\nYou want\
    \ to connect a two-position toggle or slide switch to your Raspberry Pi and be\
    \ able to find the position of the switch in your Python program.\n\n### Solution\n\
    \nUse the switch as you would a tactile push switch (Recipe 13.1): just connect\
    \ the center and one end contact (Figure 13-5).\n\nTo make this recipe, you will\
    \ need the following:\n\n- Breadboard and jumper wires (see “Prototyping Equipment\
    \ and Kits” on page 564)\n- Miniature toggle or slide switch (see “Miscellaneous”\
    \ on page 567)\n\nThe same code you used in Recipe 13.1 works with this arrangement.\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_370_0.png)\n\n### Discussion\n\nThese\
    \ types of slide switches are useful because you can see the position they are\
    \ set to without the need for some additional indicator like an LED. However,\
    \ they are more fragile and a little more expensive than the tactile push switches\
    \ that are used more and more in consumer electronics because they can sit behind\
    \ a nicer-looking plastic button.\n\n### See Also\n\nTo use a three-position switch\
    \ with a center-off position, see Recipe 13.4.\n\n## 13.4 Using a Center-Off Toggle\
    \ or Slide Switch\n\n### Problem\n\nYou want to connect a three-position (center-off)\
    \ toggle switch to your Raspberry Pi and be able to find the position of the switch\
    \ in your Python program.\n\n### Solution\n\nConnect the switch to two GPIO pins,\
    \ as shown in Figure 13-6, and use the gpiozero library in your Python program\
    \ to detect the position of the switch.\n\nTo make this recipe, you will need\
    \ the following:\n\n- Breadboard and jumper wires (see “Prototyping Equipment\
    \ and Kits” on page 564)\n- Miniature center-off three-position toggle switch\
    \ (see “Miscellaneous” on page 567)\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_371_0.png)\n\
    \nThe common (center) connection of the switch is connected to GND, and each of\
    \ the two ends of the switch are connected to a GPIO pin.\n\nOpen an editor and\
    \ paste in the following code (ch_13_switch_3_pos.py):\n\n```python\nfrom gpiozero\
    \ import Button\n\nswitch_top = Button(18)\nswitch_bottom = Button(23)\n\nswitch_position\
    \ = \"unknown\"\n\nwhile True:\n    new_switch_position = \"unknown\"\n    if\
    \ switch_top.is_pressed:\n        new_switch_position = \"top\"\n    elif switch_bottom.is_pressed:\n\
    \        new_switch_position = \"bottom\"\n    else:\n        new_switch_position\
    \ = \"center\"\n\n    if new_switch_position != switch_position:\n        switch_position\
    \ = new_switch_position\n        print(switch_position)\n```\n\nAs with all the\
    \ program examples in this book, you can also download this code (see Recipe 3.22).\n\
    \nRun the program, and as you move the switch from top to center to bottom, the\
    \ position of the switch is reported every time it changes:\n\n```\n$ python3\
    \ ch_13_switch_3_pos.py\ncenter\ntop\ncenter\nbottom\n```\n\n### Discussion\n\n\
    The program sets up two inputs as separate buttons. Inside the loop, both button\
    \ states are read, and the three conditions of the if, elif, and else structure\
    \ determine the position of the switch, assigning the value to a variable called\
    \ new_switch_position. If this differs from the previous value, the switch position\
    \ is printed.\n\nYou will find a wide range of types of toggle switches. Some\
    \ will be described as DPDT, SPDT, SPST, or SPST-momentary-on, and so on. The\
    \ meaning of these letters is as follows:\n\n- D: Double\n- S: Single\n- P: Pole\n\
    - T: Throw\n\nThus, a DPDT switch is double pole, double throw. The word *pole*\
    \ refers to the number of separate switch contacts that are controlled from the\
    \ one mechanical lever. Thus, a double pole switch can switch two things on and\
    \ off. A single throw switch can only open or close a single contact (or two contacts\
    \ if it is double pole). However, a double throw switch can connect the common\
    \ contact to one of two other contacts.\n\nFigure 13-7 shows the most common types\
    \ of switches.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_373_0.png)\n\n*Figure\
    \ 13-7. Types of toggle switches*\n\n### See Also\n\nFor more information on how\
    \ *if* statements work, see [Recipe 5.20](Recipe 5.20).\n\nFor more information\
    \ on toggle switches, see [https://oreil.ly/uDigs](https://oreil.ly/uDigs).\n\n\
    For the most basic switch recipe, see [Recipe 13.1](Recipe 13.1).\n\n## 13.5 Debouncing\
    \ a Button Press\n\n### Problem\n\nSometimes when you press the button on a switch,\
    \ the expected action happens more than once because the switch contacts *bounce*\
    \ (Figure 13-8). In that case, you want to write code that *debounces* the switch.\n\
    \n### Solution\n\nThe gpiozero Button class includes code that deals with bouncing\
    \ of switch contacts. However, by default this is turned off. You can change it\
    \ when you create a button instance using the optional bounce_time parameter.\n\
    \nSee the Discussion for more information on what is going on with switch bouncing.\
    \ But the basic idea is that when a switch is pressed, the contacts can *bounce*,\
    \ producing false readings of the switch position. The bounce_time parameter determines\
    \ how long false changes of the switch state should be ignored for.\n\nIn Recipe\
    \ 13.2, for example, you might have noticed that pressing the button often doesn't\
    \ seem to toggle the LED. This will happen if you get an even number of bounces\
    \ when you press the button, so that one bounce turns the LED on and a second\
    \ bounce immediately turns it off again (within a fraction of a second), with\
    \ the result that it looks like nothing happened.\n\nYou can modify the program\
    \ ch_13_switch_on_off.py to set the debouncing time by adding the bounce_time\
    \ optional parameter where you define the button:\n\n```python\nfrom gpiozero\
    \ import Button, LED\nfrom time import sleep\n\nled = LED(23)\n\ndef toggle_led():\n\
    \    print(\"toggling\")\n    led.toggle()\n\nbutton = Button(18, bounce_time=0.1)\n\
    button.when_pressed = toggle_led\n\nwhile True:\n    print(\"Busy doing other\
    \ stuff\")\n    sleep(2)\n```\n\nAs with all the program examples in this book,\
    \ you can also download this code (see Recipe 3.22).\n\nIn this example, the bounce\
    \ time is set to 0.1 seconds, which should be more than enough time for the switch\
    \ contacts to settle.\n\n### Discussion\n\nSwitch bouncing occurs on most switches\
    \ and can be quite severe on some switches, as the oscilloscope trace in Figure\
    \ 13-8 shows.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_375_0.png)\n\nFigure\
    \ 13-8. Contact bounce with a poor switch\n\nYou can see that there is contact\
    \ bounce both as the switch closes and when it is released. Most switches are\
    \ not as bad as this one.\n\n### See Also\n\nFor the basics of connecting a button,\
    \ see Recipe 13.1.\n\n## 13.6 Using an External Pull-Up Resistor\n\n### Problem\n\
    \nYou want to run a long wire from the Raspberry Pi to the switch, but you are\
    \ getting some false readings on the input pin.\n\n### Solution\n\nThe Raspberry\
    \ Pi GPIO pins include pull-up resistors. When a GPIO pin is being used as a digital\
    \ input, its pull-up resistor will keep the input high (3.3V) until the input\
    \ is pulled down to GND, perhaps by a switch. In addition, the pull-up resistor\
    \ can be turned on and off within your Python program."
  mdcn: "## 13.2 使用按钮控制LED\n\n作为面包板和独立元件的替代方案，你可以使用Raspberry Squid（配方10.10）和Squid\
    \ Button（配方13.1）。\n\n打开一个编辑器并粘贴以下代码（ch_13_switch_on_off.py）：\n\n```python\nfrom\
    \ gpiozero import Button, LED\nfrom time import sleep\n\nled = LED(23)\n\ndef\
    \ toggle_led():\n    print(\"toggling\")\n    led.toggle()\n\nbutton = Button(18)\n\
    button.when_pressed = toggle_led\n\nwhile True:\n    print(\"Busy doing other\
    \ stuff\")\n    sleep(2)\n```\n\n与本书中所有的程序示例一样，你也可以下载此代码（参见配方3.22）。\n\n该程序基于ch_13_switch_2.py，并再次使用了中断，以便程序可以在按钮被按下之前继续处理其他事情。\n\
    \n当按钮被按下时，函数`toggle_led`被调用。这会切换LED的状态；也就是说，如果它是亮的，就把它关掉；如果它是关的，就把它打开。\n\n###\
    \ 讨论\n\n根据你开关的质量，你可能已经注意到有时LED没有切换，但终端中出现了两条或多条“toggling”消息。这是由于一种叫做开关抖动的现象，我们将在配方13.5中进一步讨论。\n\
    \n### 另请参阅\n\n关于gpiozero Button类的文档，请参见 https://oreil.ly/SXIZ9。\n\n## 13.3 使用双位拨动或滑动开关\n\
    \n### 问题\n\n你想将一个双位拨动或滑动开关连接到你的树莓派，并能够在你的Python程序中找到开关的位置。\n\n### 解决方案\n\n像使用轻触按钮开关（配方13.1）一样使用该开关：只需连接中心触点和一个端点触点（图13-5）。\n\
    \n要制作此配方，你需要以下物品：\n\n- 面包板和跳线（参见第564页的“原型设备和套件”）\n- 微型拨动或滑动开关（参见第567页的“杂项”）\n\n\
    你在配方13.1中使用的相同代码也适用于这种配置。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_370_0.png)\n\
    \n### 讨论\n\n这类滑动开关很有用，因为你可以看到它们设置的位置，而无需像LED这样的额外指示器。然而，它们比在消费电子产品中越来越常见的轻触按钮开关更脆弱，也更贵一些，因为后者可以隐藏在外观更好的塑料按钮后面。\n\
    \n### 另请参阅\n\n要使用带有中心关闭位置的三位置开关，请参见配方13.4。\n\n## 13.4 使用中心关闭的拨动或滑动开关\n\n### 问题\n\
    \n你想将一个三位置（中心关闭）拨动开关连接到你的树莓派，并能够在你的Python程序中找到开关的位置。\n\n### 解决方案\n\n如图13-6所示，将开关连接到两个GPIO引脚，并在你的Python程序中使用gpiozero库来检测开关的位置。\n\
    \n要制作此配方，你需要以下物品：\n\n- 面包板和跳线（参见第564页的“原型设备和套件”）\n- 微型中心关闭三位置拨动开关（参见第567页的“杂项”）\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_371_0.png)\n\n开关的公共（中心）连接到GND，开关的两个端点分别连接到一个GPIO引脚。\n\
    \n打开一个编辑器并粘贴以下代码（ch_13_switch_3_pos.py）：\n\n```python\nfrom gpiozero import Button\n\
    \nswitch_top = Button(18)\nswitch_bottom = Button(23)\n\nswitch_position = \"\
    unknown\"\n\nwhile True:\n    new_switch_position = \"unknown\"\n    if switch_top.is_pressed:\n\
    \        new_switch_position = \"top\"\n    elif switch_bottom.is_pressed:\n \
    \       new_switch_position = \"bottom\"\n    else:\n        new_switch_position\
    \ = \"center\"\n\n    if new_switch_position != switch_position:\n        switch_position\
    \ = new_switch_position\n        print(switch_position)\n```\n\n与本书中所有的程序示例一样，你也可以下载此代码（参见配方3.22）。\n\
    \n运行程序，当你将开关从顶部移动到中心再到底部时，每次位置变化都会报告开关的位置：\n\n```\n$ python3 ch_13_switch_3_pos.py\n\
    center\ntop\ncenter\nbottom\n```\n\n### 讨论\n\n该程序将两个输入设置为独立的按钮。在循环内部，读取两个按钮的状态，`if`、`elif`和`else`结构的三个条件确定开关的位置，并将值赋给名为`new_switch_position`的变量。如果这与之前的值不同，则打印开关位置。\n\
    \n你会发现各种类型的拨动开关。有些会被描述为DPDT、SPDT、SPST或SPST-瞬时接通等。这些字母的含义如下：\n\n- D：双（Double）\n\
    - S：单（Single）\n- P：极（Pole）\n- T：掷（Throw）\n\n因此，DPDT开关是双刀双掷。*极*这个词指的是由一个机械杠杆控制的独立开关触点的数量。因此，双刀开关可以开关两个东西。单掷开关只能打开或关闭一个触点（如果是双刀，则是两个触点）。然而，双掷开关可以将公共触点连接到另外两个触点中的一个。\n\
    \n图13-7显示了最常见的开关类型。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_373_0.png)\n\n\
    *图13-7. 拨动开关的类型*\n\n### 另请参阅\n\n关于*if*语句如何工作的更多信息，请参见[配方5.20](Recipe 5.20)。\n\n\
    关于拨动开关的更多信息，请参见[https://oreil.ly/uDigs](https://oreil.ly/uDigs)。\n\n关于最基本的开关配方，请参见[配方13.1](Recipe\
    \ 13.1)。\n\n## 13.5 按钮按压的去抖动\n\n### 问题\n\n有时当你按下开关上的按钮时，预期的动作会发生不止一次，因为开关触点会*抖动*（图13-8）。在这种情况下，你想编写代码来*去抖动*开关。\n\
    \n### 解决方案\n\ngpiozero Button类包含了处理开关触点抖动的代码。然而，默认情况下这是关闭的。你可以在创建按钮实例时使用可选的`bounce_time`参数来更改它。\n\
    \n关于开关抖动的更多信息，请参见讨论部分。但基本思想是，当开关被按下时，触点可能会*抖动*，产生开关位置的错误读数。`bounce_time`参数决定了应该忽略开关状态的错误变化多长时间。\n\
    \n例如，在配方13.2中，你可能已经注意到按下按钮似乎经常没有切换LED。如果你在按下按钮时得到偶数次抖动，就会发生这种情况，这样一次抖动打开LED，第二次抖动立即又把它关掉（在几分之一秒内），结果看起来什么都没发生。\n\
    \n你可以通过在定义按钮时添加`bounce_time`可选参数来修改程序ch_13_switch_on_off.py以设置去抖动时间：\n\n```python\n\
    from gpiozero import Button, LED\nfrom time import sleep\n\nled = LED(23)\n\n\
    def toggle_led():\n    print(\"toggling\")\n    led.toggle()\n\nbutton = Button(18,\
    \ bounce_time=0.1)\nbutton.when_pressed = toggle_led\n\nwhile True:\n    print(\"\
    Busy doing other stuff\")\n    sleep(2)\n```\n\n与本书中所有的程序示例一样，你也可以下载此代码（参见配方3.22）。\n\
    \n在这个例子中，抖动时间设置为0.1秒，这应该足够让开关触点稳定下来。\n\n### 讨论\n\n开关抖动发生在大多数开关上，在某些开关上可能相当严重，如图13-8中的示波器轨迹所示。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_375_0.png)\n\n图13-8. 劣质开关的触点抖动\n\n\
    你可以看到，在开关接通和释放时都存在触点抖动。大多数开关没有这个那么糟糕。\n\n### 另请参阅\n\n关于连接按钮的基础知识，请参见配方13.1。\n\n\
    ## 13.6 使用外部上拉电阻\n\n### 问题\n\n你想从树莓派到开关运行一根长线，但你在输入引脚上得到了一些错误的读数。\n\n### 解决方案\n\
    \n树莓派GPIO引脚包含上拉电阻。当GPIO引脚用作数字输入时，其上拉电阻将保持输入为高电平（3.3V），直到输入被拉低到GND，可能是通过开关。此外，上拉电阻可以在你的Python程序中打开和关闭。"
