  - '[PAGE 413]


    # Solution


    The Raspberry Pi GPIO connector has only digital inputs. If you want to measure
    a voltage, you need to use a separate analog-to-digital converter (ADC).


    Use the MCP3008 eight-channel ADC chip. This chip has eight analog inputs, so
    you can connect up to eight sensors to one of these and interface to the chip
    using the Raspberry Pi SPI.


    To make this recipe, you will need the following:


    +   - Breadboard and jumper wires (see “Prototyping Equipment and Kits” on page
    564)

    - MCP3008 eight-channel ADC integrated circuit (IC) (see “Integrated Circuits”
    on page 565)

    - 10kΩ trimpot (see “Resistors and Capacitors” on page 565)


    Figure 14-13 shows the breadboard layout for using this chip. Make sure that you
    get the chip facing the proper direction. The little notch in the package should
    be toward the top of the breadboard.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_413_0.png)'
  - "[PAGE 414]\n\nThe variable resistor has one end connected to 3.3V and the other\
    \ to GND, which allows the middle connection to be set to any voltage between\
    \ 0 and 3.3V.\n\nBefore trying the program, make sure you have SPI enabled (Recipe\
    \ 10.6). This recipe also explains a bit more about SPI.\n\nOpen an editor and\
    \ paste in the following code (ch_14_adc_test.py):\n\n```\nfrom gpiozero import\
    \ MCP3008\nimport time\n\nanalog_input = MCP3008(channel=0)\n\nwhile True:\n \
    \   reading = analog_input.value\n    voltage = reading * 3.3\n    print(\"Reading={:.2f}\\\
    tVoltage={:.2f}\".format(reading, voltage))\n    time.sleep(1)\n```\n\nAs with\
    \ all the program examples in this book, you can also download this program (see\
    \ Recipe 3.22).\n\nWhen you run the program, you should see output like this as\
    \ you turn the variable resistor to alter the voltage:\n\n```\n$ python3 ch_14_adc_test.py\n\
    Reading=0.60 Voltage=2.00\nReading=0.54 Voltage=1.80\nReading=0.00 Voltage=0.00\n\
    Reading=0.00 Voltage=0.00\nReading=0.46 Voltage=1.53\nReading=0.99 Voltage=3.28\n\
    ```\n\nThe readings from the MCP3008 channel are between 0 and 1. You can convert\
    \ these into a voltage by multiplying by 3.3 (the supply voltage).\n\n# Discussion\n\
    \nThe MCP3008 has 10-bit ADCs, so when you take a reading, it gives you a number\
    \ between 0 and 1023. The MCP3008 class converts this into a voltage value by\
    \ multiplying the reading by the voltage range (3.3V) and then dividing it by\
    \ 1,024.\n\nIf you don't need all the features of a *proper* Raspberry Pi, you\
    \ can use a Raspberry Pi Pico, which has analog inputs available so that you don't\
    \ need an ADC chip. You can find out about this in Recipe 19.7.\n\nYou can combine\
    \ any of the following recipes that use the MCP3008 to allow readings to be taken\
    \ from up to eight sensors."
  - '[PAGE 415]


    You can also use resistive sensors with the MCP3008 by combining them with a fixed-value
    resistor and arranging them as a voltage divider (see Recipes 14.8 and 14.9).


    # See Also


    If you''re just interested in detecting the turning of a knob, you can use a rotary
    encoder instead of a pot (Recipe 13.7).


    You can also detect the position of a pot without the use of an ADC chip by using
    the step response method (Recipe 14.1).


    Check out the datasheet for the MCP3008.


    The Explorer HAT Pro from Pimoroni also has an ADC (Recipe 10.16).


    # 14.8 Reducing Voltages for Measurement


    # Problem


    You want to measure a voltage, but it is higher than the 3.3V possible using an
    MCP3008 (Recipe 14.7).


    # Solution


    Use a pair of resistors to act as a voltage divider to reduce the voltage to a
    suitable range.


    To try this recipe, you''ll need the following:


    +   - Breadboard and jumper wires (see “Prototyping Equipment and Kits” on page
    564)

    - MCP3008 eight-channel ADC IC (see “Integrated Circuits” on page 565)

    - 10kΩ resistor (see “Resistors and Capacitors” on page 565)

    - 3.3kΩ resistor (see “Resistors and Capacitors” on page 565)

    - 9V battery and clip lead


    Figure 14-14 shows the arrangement for this, using a breadboard. The setup will
    measure the voltage of the battery.'
  - "[PAGE 416]\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_416_0.png)\n\nFigure 14-14.\
    \ Reducing the voltage of analog inputs\n\n> Never use this recipe to measure\
    \ high-voltage AC, or any type of AC for that matter. It is for low-voltage DC\
    \ only.\n\nOpen an editor and paste in the following code (ch_14_adc_scaled.py):\n\
    \n```\nfrom gpiozero import MCP3008\nimport time\n\nR1 = 10000.0\nR2 = 3300.0\n\
    analog_input = MCP3008(channel=0)\n\nwhile True:\n    reading = analog_input.value\n\
    \    voltage_adc = reading * 3.3\n    voltage_actual = voltage_adc / (R2 / (R1\
    \ + R2))\n    print(\"Battery Voltage=\" + str(voltage_actual))\n    time.sleep(1)\n\
    ```\n\nAs with all the program examples in this book, you can also download this\
