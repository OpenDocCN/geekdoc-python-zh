- img_proc: true
  md: '![](img/e36e77524aeaae366529d1cf02f9a39c_54_0.png)


    Figure 1-23. Shutting down your Raspberry Pi


    You can also reboot using the Terminal by issuing the following command:


    ```

    $ sudo reboot

    ```


    You might need to do this after installing some software. When you do reboot,
    you’ll see the message shown in Figure 1-24, which illustrates the multiuser nature
    of Linux and warns all users connected to the Pi.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_54_1.png)


    Figure 1-24. Shutting down your Raspberry Pi from the Terminal


    # Discussion


    It is better to shut down your Raspberry Pi as described than to simply pull out
    the power plug because your Raspberry Pi might be in the middle of writing to
    the microSD card as you power it down. This could lead to file corruption.


    Shutting down a Raspberry Pi does not actually turn off the power. It goes into
    a low-power mode—and it is a pretty low-power device anyway (but the Raspberry
    Pi hardware has no control over its power supply).


    When a Raspberry Pi 400 (with its built-in keyboard) has been shut down, you can
    turn it on by pressing the F10 key, which also has an on/off icon on the key.'
