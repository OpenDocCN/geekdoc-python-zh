  - "[PAGE 437]\n\n# 14.19 Measuring Distance Using Ultrasound\n\n# Problem\n\nYou\
    \ want to measure distance using an ultrasonic range finder.\n\n# Solution\n\n\
    Use a low-cost HC-SR04 range finder. This device needs two GPIO pins: one to trigger\
    \ the pulse of ultrasound and the other to monitor how long it takes for the echo\
    \ to return.\n\nTo make this recipe, you will need the following:\n\n+   - Breadboard\
    \ and jumper wires (see “Prototyping Equipment and Kits” on page 564)\n- HC-SR04\
    \ range finder (eBay)\n- 470Ω resistor (see “Resistors and Capacitors” on page\
    \ 565)\n- 270Ω resistor (see “Resistors and Capacitors” on page 565)\n\nFit the\
    \ components onto the breadboard as shown in Figure 14-26. The resistors are necessary\
    \ to reduce the echo output of the range finder from 5V to 3.3V (see Recipe 10.12).\n\
    \nOpen an editor and paste in the following code (ch_14_ranger.py):\n\n```\nfrom\
    \ gpiozero import DistanceSensor\nfrom time import sleep\n\nsensor = DistanceSensor(echo=18,\
    \ trigger=17)\nwhile True:\n    cm = sensor.distance * 100\n    inch = cm / 2.5\n\
    \    print(\"cm={:.0f}\\tinches={:.0f}\".format(cm, inch))\n    sleep(0.5)\n```\n\
    \nAs with all the program examples in this book, you can also download this program\
    \ (see Recipe 3.22)."
  - '[PAGE 438]


    ![](img/e36e77524aeaae366529d1cf02f9a39c_438_0.png)


    Figure 14-26. Connecting an SR04 rangefinder to a Raspberry Pi


    The operation of the program is described in the Discussion. When the program
    is run, it reports the distance in both centimeters and inches once per second.
    Use your hand or some other obstacle to change the reading:


    ```

    $ python3 ch_14_ranger.py

    cm=154.7    inches=61.8

    cm=12.9     inches=5.1

    cm=14.0     inches=5.6

    cm=20.2     inches=8.0

    ```


    # Discussion


    Although several ultrasonic range finders are available, the type used here is
    easy to use and low cost. It works by sending a pulse of ultrasound and then measuring
    the amount of time taken for the echo to be received. One of the round ultrasonic
    transducers on the front of the device is the transmitter, and the other is the
    receiver.


    This process is controlled from the Raspberry Pi. The difference between this
    type of device and more expensive models is that the more expensive versions include
    their own microcontroller, which carries out all the necessary timing and provides
    an I2C or serial interface to return a final reading.'
  - '[PAGE 439]


    When you are using one of these sensors with a Raspberry Pi, the *trig* (trigger)
    input of the range finder is connected to a GPIO output, and the *echo* output
    of the range finder is connected to a GPIO input on the Raspberry Pi after having
    its voltage range lowered from 5V to a safe 3.3V.


    Figure 14-27 shows an oscilloscope trace of the sensor in action. The top trace
    is connected to trig, and the bottom trace is connected to echo. You can see that
    first the trig pin is taken high for a short pulse. There is then a short delay
    before the echo pin goes high. This stays high for a period that is proportional
    to the distance from the sensor.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_439_0.png)


    Figure 14-27. The oscilloscope trace for trigger and echo


    This program makes use of the DistanceSensor class of the gpiozero library, which
    takes care of the pulse generation and measurement for us.


    This method of measuring distance is not terribly accurate because temperature,
    pressure, and relative humidity all alter the speed of sound (about 30 cm per
    millisecond) and hence the distance readings.


    # See Also


    Take a look at the [datasheet for the ultrasonic range finder](datasheet).


    The documentation for the DistanceSensor class is available at [https://oreil.ly/XYk3m](https://oreil.ly/XYk3m).'
- md: "## 14.20 Measuring Distance Using a Time-of-Flight Sensor\n\n### Problem\n\n\
    You want to measure distance without using ultrasound (perhaps you have animals\
    \ who would be frightened by ultrasound, or you want to measure distance more\
    \ accurately).\n\n### Solution\n\nUse a VL53L1X I2C time-of-flight (ToF) sensor.\
    \ These sensors are more expensive than their ultrasound equivalents. However,\
    \ because they use light rather than sound, they are more accurate.\n\nThe most\
    \ common of these devices is the VL53L1X, and it’s available as a low-cost module\
    \ from eBay as well as from other suppliers. The Pimoroni device we are using\
    \ here has the advantage that it is compatible with the Pimoroni Breakout Garden\
    \ system and can therefore be plugged in without any soldering. Figure 14-28 shows\
    \ the ToF sensor and Breakout Garden.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_440_0.png)\n\
    \nFigure 14-28. A VL53L1X ToF sensor and Pimoroni Breakout Garden\n\nTo make this\
    \ project, you will need either:\n\n- Pimoroni Breakout Garden (see “Prototyping\
    \ Equipment and Kits” on page 564)\n- Pimoroni VL53L1X distance sensor (see “Modules”\
    \ on page 566)\n\nor:\n\n- Generic VL53L1X distance sensor module (see “Modules”\
    \ on page 566)\n- Four male-to-female jumper wires (see “Prototyping Equipment\
    \ and Kits” on page 564)\n\nConnecting this I2C device to a Raspberry Pi is just\
    \ like connecting any other. The device will work at 3V so, in addition to connecting\
    \ 3V and GND, you should connect the SDA pin of the sensor to the SDA pin of the\
    \ Raspberry Pi (also called GPIO 2) and the SCL pin of the sensor to the SCL pin\
    \ of the Raspberry Pi (GPIO 3).\n\nIf you chose to use the Breakout Garden, just\
    \ make sure you place the sensor in the appropriate orientation (see Figure 14-28).\
    \ If you are using jumper wires, connect the devices as follows:\n\n- The VCC\
    \ pin of the VL53L1X to 3V on the Raspberry Pi\n- The GND pin of the VL53L1X to\
    \ GND on the Raspberry Pi\n- The SDA pin of the VL53L1X to GPIO 2 (SDA) on the\
    \ Raspberry Pi\n- The SCL pin of the VL53L1X to GPIO 3 (SCL) on the Raspberry\
    \ Pi\n\nThe VL53L1X uses I2C, so you need to enable this by following Recipe 10.4.\
    \ After you’ve enabled it, run the following commands to install the software\
    \ for the VL53L1X:\n\n```\n$ sudo pip3 install smbus2\n$ sudo pip3 install vl53l1x\n\
    ```\n\nThe test program for this recipe (ch_14_tof.py) prints the distance measurement\
    \ in millimeters once per second:\n\n```\nimport VL53L1X, time\n\ntof = VL53L1X.VL53L1X(i2c_bus=1,\
    \ i2c_address=0x29)\ntof.open()\ntof.start_ranging(1) # Start range1=Short 2=Medium\
    \ 3=Long\n\nwhile True:\n    mm = tof.get_distance() # Grab the range in mm\n\
    \    print(\"mm=\" + str(mm))\n    time.sleep(1)\n```\n\nAs with all the program\
    \ examples in this book, you can also download this program (see Recipe 3.22).\n\
    \nNote that if your device has a different I2C address, you might need to change\
    \ 0x29 to the address of your device.\n\n### Discussion\n\nThe VL53L1X ToF sensor\
    \ is an amazing little device that contains a low-power infrared laser and receiver\
    \ as well as all the electronics needed to communicate over I2C.\n\nThe module\
    \ works on a similar principle to that of the ultrasonic range finder of Recipe\
    \ 14.19, except that instead of gauging distance by measuring the time it takes\
    \ for sound to travel to a target and back as a reflection, the ToF sensor measures\
    \ the time it takes for a pulse of laser light to bounce back from a target.\n\
    \n### See Also\n\nTo measure distance using ultrasonics, see Recipe 14.19.\n\n\
    See the datasheet for the VL53L1X.\n\n## 14.21 Adding Touch Sensing to Your Raspberry\
    \ Pi\n\n### Problem\n\nYou want to provide a touch interface to your Raspberry\
    \ Pi.\n\n### Solution\n\nUse an Adafruit Capacitive Touch HAT (Figure 14-29).\n\
    \nTouch sensors are a lot of fun and are great for educational use. You can attach\
    \ anything that conducts even just a little bit of electricity—including fruit.\
    \ A popular project is to construct a fruit keyboard using alligator clips to\
    \ attach a variety of fruits and vegetables to the sense terminals on the board.\
    \ Then, as you touch the different pieces of fruit, different sounds are made.\n\
    \nThe Adafruit Capacitive Touch HAT uses the Raspberry Pi’s I2C interface. You\
    \ also need SPI tools installed so, if you have not already done so, follow Recipes\
    \ 10.4 and 10.6.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_443_0.png)\n\nFigure\
    \ 14-29. An Adafruit Capacitive Touch HAT attached to an apple\n\nTo install the\
    \ Python library for the HAT, run the following commands:\n\n```\n$ pip3 install\
    \ adafruit-blinka\n$ pip3 install adafruit-circuitpython-mpr121\n```\n\nTo test\
    \ out the Capacitive Touch HAT, run the following program (*ch_14_touch.py*):\n\
    \n```\nimport time\nimport board\nimport busio\nimport adafruit_mpr121\ni2c =\
    \ busio.I2C(board.SCL, board.SDA)\nmpr121 = adafruit_mpr121.MPR121(i2c)\n\nwhile\
    \ True:\n    if mpr121[0].value:\n        print(\"Pin 0 touched!\")\n```\n\nAs\
    \ with all the program examples in this book, you can also download this program\
    \ (see Recipe 3.22).\n\nWhen you touch the pad labeled 0 with your finger, you\
    \ should see output like this:\n\n```\n$ python3 ch_14_touch.py\nPin 0 touched!\n\
    Pin 0 touched!\n```\n\nYou can either just touch the connection pads or connect\
    \ the pads to a piece of fruit using an alligator clip, as shown in Figure 14-29.\n\
    \n### Discussion\n\nThe Adafruit Capacitive Touch HAT has 12 touch contacts. If\
    \ you need only a few touch contacts, you can use the Pimoroni Explorer HAT Pro,\
    \ which has four alligator-clip-compatible contacts (Figure 14-30).\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_444_0.png)\n\
    \nFigure 14-30. The Explorer HAT Pro with fruit\n\nTo use the Explorer HAT Pro’s\
    \ touch contacts, first follow Recipe 10.16 to install the library for the HAT.\n\
    \nIn addition to the four terminals on the side that are designed for alligator\
    \ clips, four touch switches labeled 1 to 4 also use the touch interface.\n\n\
    ### See Also\n\nMore information is available in the Adafruit Touch HAT documentation\
    \ and the Explorer HAT Pro documentation.\n\n## 14.22 Reading Smart Cards with\
    \ an RFID Reader/Writer\n\n### Problem\n\nYou want to read from and write to radio-frequency\
    \ identification (RFID) smart cards.\n\n### Solution\n\nGet a low-cost RC-522\
    \ RFID card reader/writer and use the SimpleMFRC522 Python library.\n\nFor this\
    \ recipe, you will need the following:\n\n- RC-522 card reader; this is often\
    \ sold with a selection of RFID tags to use (see “Modules” on page 566)\n- Seven\
    \ female-to-female jumper wires (see “Prototyping Equipment and Kits” on page\
    \ 564)\n\nFigure 14-31 shows the RC-522 wired up to a Raspberry Pi. The RC-522\
    \ uses the Raspberry Pi’s SPI interface, so you will need to follow Recipe 10.6.\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_445_0.png)\n\nFigure 14-31. Connecting\
    \ a Raspberry Pi and RC-522\n\nTable 14-1 shows the connections you need to make\
    \ using the jumper wires, with suggested colors for the leads to make it easy\
    \ to identify which lead is which.\n\nTable 14-1. Connecting a Raspberry Pi and\
    \ an RFID reader/writer\n\n| Lead color | RC-522 pin | Raspberry Pi pin |\n| :---\
    \ | :--- | :--- |\n| Orange | SDA | GPIO8 |\n| Yellow | SCK | SCLK / GPIO11 |\n\
    | White | MOSI | MOSI / GPIO10 |\n| Green | MISO | MISO/GPIO09 |\n| Blue | GND\
    \ | GND |\n| Gray | RST | GPIO25 |\n| Red | 3.3V | 3.3V |\n\nNote that, although\
    \ the RC-522 pin has some pins marked SDA and SCL, as if the device were using\
    \ I2C, in this recipe the device uses the Raspberry Pi's SPI interface.\n\nTo\
    \ use the module, first fetch the Clever Card Kit software using the commands\
    \ that follow. This will install all of the prerequisite software for the RC-522.\
    \ You will need to reboot when it's finished installing:\n\n```\n$ wget http://monkmakes.com/downloads/mmcck.sh\n\
    $ chmod +x mmcck.sh\n$ ./mmcck.sh\n```\n\nTo test the reader, run the program\
    \ in the *clever_card_kit* directory called *01_read.py*:\n\n```\n$ cd ~/clever_card_kit\n\
    $ python3 01_read.py\nHold a tag near the reader\n894922433952\n\n894922433952\n\
    \n894922433952\n```\n\nWhen you hold a card next to the RC-522, the RFID tag inside\
    \ the card's unique number will be printed out. When you've had enough of reading\
    \ cards, hit Ctrl-C. Here's the code:\n\n```\nimport RPi.GPIO as GPIO\nimport\
    \ SimpleMFRC522\n\nreader = SimpleMFRC522.SimpleMFRC522()\n\nprint(\"Hold a tag\
    \ near the reader\")\n\ntry:\n    while True:\n        id, text = reader.read()\n\
    \        print(id)\n        print(text)\n\nfinally:\n    print(\"cleaning up\"\
    )\n    GPIO.cleanup()\n```\n\nThe RPi.GPIO is imported merely so that it can be\
    \ used to cleanup the GPIO pins when the program exits. The function call reader.read()\
    \ will wait for an RFID tag to come near the reader/writer and return the card's\
    \ unique number (id) and any text message stored on the card (text).\n\nYou can't\
    \ change the unique number assigned to each tag during manufacture, but you can\
    \ store small amounts of data on a card. To do this, use the program *02_write.py*:"
  mdcn: "## 14.20 使用飞行时间传感器测量距离\n\n### 问题\n\n你想在不使用超声波的情况下测量距离（可能你养的动物会被超声波惊吓，或者你想更精确地测量距离）。\n\
    \n### 解决方案\n\n使用VL53L1X I2C飞行时间（ToF）传感器。这类传感器比超声波传感器更昂贵。然而，由于它们使用光而非声波，因此精度更高。\n\
    \n这类设备中最常见的是VL53L1X，它可以从eBay以及其他供应商处作为低成本模块购买。我们在此使用的Pimoroni设备的优势在于它兼容Pimoroni\
    \ Breakout Garden系统，因此无需焊接即可插入。图14-28展示了ToF传感器和Breakout Garden。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_440_0.png)\n\
    \n图14-28. VL53L1X ToF传感器和Pimoroni Breakout Garden\n\n要完成此项目，你需要以下任一组件：\n\n- Pimoroni\
    \ Breakout Garden（参见第564页“原型设备与套件”）\n- Pimoroni VL53L1X距离传感器（参见第566页“模块”）\n\n\
    或者：\n\n- 通用VL53L1X距离传感器模块（参见第566页“模块”）\n- 四根公对母跳线（参见第564页“原型设备与套件”）\n\n将此I2C设备连接到树莓派与连接任何其他设备一样简单。该设备将在3V下工作，因此除了连接3V和GND外，你应将传感器的SDA引脚连接到树莓派的SDA引脚（也称为GPIO\
    \ 2），并将传感器的SCL引脚连接到树莓派的SCL引脚（GPIO 3）。\n\n如果你选择使用Breakout Garden，只需确保将传感器以正确的方向放置（参见图14-28）。如果你使用跳线，请按以下方式连接设备：\n\
    \n- VL53L1X的VCC引脚连接到树莓派的3V\n- VL53L1X的GND引脚连接到树莓派的GND\n- VL53L1X的SDA引脚连接到树莓派的GPIO\
    \ 2（SDA）\n- VL53L1X的SCL引脚连接到树莓派的GPIO 3（SCL）\n\nVL53L1X使用I2C，因此你需要按照配方10.4启用它。启用后，运行以下命令安装VL53L1X的软件：\n\
    \n```\n$ sudo pip3 install smbus2\n$ sudo pip3 install vl53l1x\n```\n\n本配方的测试程序（ch_14_tof.py）每秒打印一次以毫米为单位的距离测量值：\n\
    \n```\nimport VL53L1X, time\n\ntof = VL53L1X.VL53L1X(i2c_bus=1, i2c_address=0x29)\n\
    tof.open()\ntof.start_ranging(1) # Start range1=Short 2=Medium 3=Long\n\nwhile\
    \ True:\n    mm = tof.get_distance() # Grab the range in mm\n    print(\"mm=\"\
    \ + str(mm))\n    time.sleep(1)\n```\n\n与本书中所有程序示例一样，你也可以下载此程序（参见配方3.22）。\n\n\
    请注意，如果你的设备具有不同的I2C地址，你可能需要将0x29更改为你的设备地址。\n\n### 讨论\n\nVL53L1X ToF传感器是一个令人惊叹的小设备，它包含一个低功耗红外激光器和接收器，以及通过I2C进行通信所需的所有电子元件。\n\
    \n该模块的工作原理与配方14.19中的超声波测距仪类似，不同之处在于，ToF传感器不是通过测量声音传播到目标并作为反射返回所需的时间来测量距离，而是测量激光脉冲从目标反弹回来所需的时间。\n\
    \n### 另请参阅\n\n要使用超声波测量距离，请参见配方14.19。\n\n参见VL53L1X的数据手册。\n\n## 14.21 为你的树莓派添加触摸感应\n\
    \n### 问题\n\n你想为你的树莓派提供一个触摸界面。\n\n### 解决方案\n\n使用Adafruit电容式触摸HAT（图14-29）。\n\n触摸传感器非常有趣，非常适合教育用途。你可以连接任何能导电的东西——包括水果。一个流行的项目是使用鳄鱼夹将各种水果和蔬菜连接到板上的感应端子，构建一个水果键盘。然后，当你触摸不同的水果时，会发出不同的声音。\n\
    \nAdafruit电容式触摸HAT使用树莓派的I2C接口。你还需要安装SPI工具，因此，如果你尚未安装，请按照配方10.4和10.6操作。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_443_0.png)\n\
    \n图14-29. 连接到苹果上的Adafruit电容式触摸HAT\n\n要安装HAT的Python库，请运行以下命令：\n\n```\n$ pip3 install\
    \ adafruit-blinka\n$ pip3 install adafruit-circuitpython-mpr121\n```\n\n要测试电容式触摸HAT，请运行以下程序（*ch_14_touch.py*）：\n\
    \n```\nimport time\nimport board\nimport busio\nimport adafruit_mpr121\ni2c =\
    \ busio.I2C(board.SCL, board.SDA)\nmpr121 = adafruit_mpr121.MPR121(i2c)\n\nwhile\
    \ True:\n    if mpr121[0].value:\n        print(\"Pin 0 touched!\")\n```\n\n与本书中所有程序示例一样，你也可以下载此程序（参见配方3.22）。\n\
    \n当你用手指触摸标有0的焊盘时，你应该会看到如下输出：\n\n```\n$ python3 ch_14_touch.py\nPin 0 touched!\n\
