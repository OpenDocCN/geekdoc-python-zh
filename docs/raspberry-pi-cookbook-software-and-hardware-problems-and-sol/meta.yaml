  md: "```\ntemp_c = read_temp_c()\nlog_data(temp_c)\nsleep(10)\nexcept:\n    print('Logging\
    \ Ended')\n    file.close()\n```\n\nAs with all the program examples in this book,\
    \ you can also download this code (see Recipe 3.22). This example is built around\
    \ the code used in the Discussion of Recipe 19.7, with added code to write the\
    \ temperature readings to a file.\n\nYou don't have to import any modules to use\
    \ the filesystem; it's part of MicroPython and is essentially a cut-down version\
    \ of the Python 3 filesystem described in Chapter 7. The file is opened for writing\
    \ using the command open, which takes the filename as its first parameter and\
    \ the mode (w for write) as its second. This will replace any existing file with\
    \ the same name.\n\nThe log_data function prints out the supplied reading and\
    \ then appends it to the file after converting it to a string and adding the newline\
    \ (\\n) character to the end.\n\nThe main while loop is surrounded by a try/ except\
    \ so that when you do Ctrl-C in the Shell, this will be caught and the file closed.\n\
    \nWhen it comes to reading a file, you need to open the file in read (r) mode,\
    \ and then you can read the contents of the file as a string using the read function.\
    \ You can find an example of this in the program ch_19_file_read.py. This program\
    \ will just print out the contents of a file in the Shell:\n\n```\nf = open(\"\
    temp_readings.txt\", \"r\")\nprint(f.read())\nf.close()\n```\n\nThe capacity of\
    \ the filesystem of the Pico is limited to just 1.6 MB, so you are not going to\
    \ be storing video on it, or even any large sound samples. The other aspect of\
    \ the filesystem to be aware of is that if you have to reinstall your Pico's firmware\
    \ as you did in Recipe 19.1, you will lose the contents of the filesystem.\n\n\
    # See Also\n\nFor writing to a file with a regular Raspberry Pi, see Recipe 7.7,\
