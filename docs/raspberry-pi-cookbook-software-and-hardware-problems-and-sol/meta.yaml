    to start an SSH session.


    ## Discussion


    SSH is a very common way of connecting to remote computers; any commands that
    you could issue on the Pi itself, you can use from SSH. It is also, as its name
    suggests, secure because the communication is encrypted.


    Unlike the console lead solution of Recipe 2.6, SSH will only work if your Raspberry
    Pi is connected to the same network as the computer trying to connect to it.


    Perhaps the only drawback to SSH is that it is a command-line rather than graphical
    environment. If you need remote access to the full Raspberry Pi desktop environment,
    you need to use VNC (Recipe 2.8).


    ## See Also


    Check out this Adafruit tutorial.


    ## 2.8 Controlling the Pi Remotely with VNC


    ### Problem


    You want access to the full Raspberry Pi OS graphical desktop from a PC (Windows
    or Linux) or macOS using virtual network computing (VNC).


    ### Solution


    Use the pre-installed VNC software on Raspberry Pi OS. However, to do so, you
    first need to configure your Raspberry Pi to turn it on. You can do this using
    the Raspberry Pi Configuration tool, which you can find in the Preferences section
    of the Raspberry Menu on the Raspberry Pi desktop. Click the Interfaces tab, scroll
    down to the VNC option, select the enabled radio button, and click OK (Figure
    2-15).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_80_0.png)


    Figure 2-15. Turning on the VNC interface


    If the Raspberry Pi doesn''t have a monitor attached, you need to specify the
    resolution of the virtual monitor that you''ll see when you connect to the Raspberry
    Pi from another computer using VNC. You can do this from the Display section of
    the Raspberry Pi Configuration tool (Figure 2-16). To avoid scrolling, select
    a resolution that''s a bit lower than that of the monitor from which you will
    be viewing the virtual screen.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_80_1.png)


    Figure 2-16. Setting the virtual screen resolution using the Raspberry Pi Configuration
    tool


    To connect to the Pi from a remote computer, you need to install VNC client software.
    RealVNC VNC Viewer is a popular choice and is available for Windows, Linux, and
    macOS.


    When you run the client program on macOS or a PC, you''ll be asked to enter the
    IP address of the VNC server to which you want to connect (the IP address of your
    Pi).

    You are then prompted for your password (Figure 2-17).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_81_0.png)


    The catchphrase and signature are security devices designed to alert you if someone
    is hacking your Raspberry Pi. If either changes when you authenticate another
    time, your Raspberry Pi might be compromised.


    ### Discussion


    VNC will only work if the Raspberry Pi and the remote computer are on the same
    network. Some VNC clients allow you to transfer files between your computer and
    the Raspberry Pi and to copy and paste text between them.

    Although you can do most things with SSH using the command line, sometimes it
    is useful to have access to the graphical environment of your Raspberry Pi.

    The Raspberry Pi''s VNC server automatically starts when you reboot, as long as
    the VNC option is enabled.


    ### See Also


    Check out this [Adafruit tutorial](https://www.adafruit.com/).

    You can also enable VNC while setting up a new Raspberry Pi (see [Recipe 1.6](#recipe-1-6)).


    ## 2.9 Using a Raspberry Pi for Network-Attached Storage


    ### Problem


    You want to use your Raspberry Pi as network-attached storage (NAS) by accessing
    a large USB drive attached to your Raspberry Pi from computers on your network.


    ### Solution


    The solution to this problem is to install and configure Samba. To do this, issue
    the following commands:


    ```

    $ sudo apt update

    $ sudo apt install samba

    $ sudo apt install samba-common-bin

    ```


    Now, attach the USB hard drive to the Raspberry Pi. It will automatically mount
    in your /media/pi folder. To check that it’s there, run this command:


    ```

    $ cd /media/pi

    $ ls

    ```


    The drive should be listed with whatever name you gave it when you formatted it.
    It will automatically mount itself whenever the Raspberry Pi reboots. Make a note
    of this name, as you will need it in a moment.


    Next, you need to configure Samba so that the drive can be shared on the network.
    To do this, you first need to add a Samba user (pi). Enter the following command
    and type in a password:


    ```

    $ sudo smbpasswd -a pi

    New SMB password:

    Retype new SMB password:

    Added user pi.

    ```


    You now need to make some changes to the file /etc/samba/smb.conf, so enter this
    command:


    ```

    $ sudo nano /etc/samba/smb.conf

    ```


    The first line you’re looking for is near the top of the file:


    ```

    workgroup = WORKGROUP

    ```


    You only need to change this if you plan to connect from a Windows machine. This
    should be the name of your Windows workgroup. For recent versions of Windows,
    this will be WORKGROUP. Note that generally connecting to NAS in a mixed network
    of Macs and Windows PCs (and, for that matter, Linux machines) works just fine.


    Finally, scroll to the end of the file and add the following lines, changing NAS
    to the name of your USB drive that you noted earlier:


    ```

    [USB]

    path = /media/pi/NAS

    comment = NAS Drive

    valid users = pi

    writeable = yes

    browseable = yes

    create mask = 0777

    public = yes

    ```


    Save the file and then restart Samba by entering the following:


    ```

    $ sudo systemctl restart smbd

    ```


    If all is well, your USB drive should now be shared on your network.


    ### Discussion


    To connect to the drive on macOS, select Go, and then, from the Finder menu, click
    Connect to Server. Next, in the Server Address field, enter **smb://raspberrypi/USB**.
    A login dialog box opens, in which you need to change the username to **pi** (Figure
    2-18).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_83_0.png)


    If you are connecting to NAS from a Windows machine, the exact procedure will
    vary depending on your version of Windows. However, the basic principle is that
    at some point you will need to enter the network address, which should be **\raspberrypi\USB**
    (Figure 2-19).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_84_0.png)


    Figure 2-19. Connecting to NAS from Windows


    You are then prompted for the username and password before you can use the NAS
    disk (Figure 2-20). You should only have to do this the first time. After the
    network place is added, you should be able to navigate directly to it in File
    Explorer.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_84_1.png)


    Figure 2-20. Browsing NAS on Windows


    If you are a Linux user, the following command should mount the NAS drive for
    you:


    ```

    $ sudo mkdir /pishare

    $ sudo smbmount -o username=pi,password=raspberry //192.168.1.16/USB /pishare

    ```


    You should be able to connect to the Raspberry Pi using the hostname (raspberrypi),
    but if this does not work, try using the IP address of your Raspberry Pi, something
    like `smb://192.168.1.16/USB`.


    ### See Also


    You might want to change your Raspberry Pi''s network name to something inappropriate
    like "piNAS" (see Recipe 2.4).


    ## 2.10 Setting Up a Network Printer


    ### Problem


    You want to print to a network printer from your Raspberry Pi.


    ### Solution


    Use Common Unix Printing System (CUPS) software.


    Start by entering the following commands into a Terminal to install CUPS (this
    can take some time):


    ```

    $ sudo apt update

    $ sudo apt install cups

    ```


    Give yourself admin privileges for CUPS by entering the following command:


    ```

    $ sudo usermod -a -G lpadmin pi

    ```


    This last command adds the `lpadmin` group used by CUPS to the user pi so that
    you have permission to print.


    CUPS is configured via a web interface, so start your Chromium web browser from
    the Raspberry Pi Menu and then enter the address `http://localhost:631` into the
    address bar.


    On the Administration tab, choose the Add Printer option. This displays a list
    of printers that are on the network or are connected directly to the Raspberry
    Pi''s USB port (Figure 2-21).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_86_0.png)


    Figure 2-21. Discovering printers with CUPS


    Follow the series of dialog boxes to set up the printer.


    ### Discussion


    When you’re finished, you can test out the printer by firing up LibreOffice (Recipe
    4.2). Type some text, and when you go to print it, you should see your newly added
    printer available for printing (Figure 2-22).'
  mdcn: '要从Windows电脑连接，你需要使用PuTTY（配方2.6）来启动一个SSH会话。


    ## 讨论


    SSH是连接远程计算机的一种非常常见的方式；任何你可以在树莓派本身执行的命令，都可以通过SSH使用。正如其名，它也是安全的，因为通信是加密的。


    与配方2.6的控制台线解决方案不同，SSH只有在你的树莓派与尝试连接的计算机处于同一网络时才能工作。


    也许SSH唯一的缺点是它是一个命令行环境，而不是图形环境。如果你需要远程访问完整的树莓派桌面环境，你需要使用VNC（配方2.8）。


    ## 另请参阅


    查看这个Adafruit教程。


    ## 2.8 使用VNC远程控制树莓派


    ### 问题


    你想通过虚拟网络计算（VNC）从PC（Windows或Linux）或macOS访问完整的树莓派操作系统图形桌面。


    ### 解决方案


    使用树莓派操作系统上预装的VNC软件。然而，要这样做，你首先需要配置你的树莓派以启用它。你可以使用树莓派配置工具来完成此操作，该工具可以在树莓派桌面的树莓派菜单的首选项部分找到。点击“接口”选项卡，向下滚动到VNC选项，选择“启用”单选按钮，然后点击“确定”（图2-15）。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_80_0.png)


    图2-15. 启用VNC接口


    如果树莓派没有连接显示器，你需要指定当你从另一台计算机使用VNC连接到树莓派时将看到的虚拟显示器的分辨率。你可以从树莓派配置工具的“显示”部分进行设置（图2-16）。为避免滚动，请选择一个比你将用于查看虚拟屏幕的显示器分辨率稍低的分辨率。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_80_1.png)


    图2-16. 使用树莓派配置工具设置虚拟屏幕分辨率


    要从远程计算机连接到树莓派，你需要安装VNC客户端软件。RealVNC VNC Viewer是一个流行的选择，适用于Windows、Linux和macOS。


    当你在macOS或PC上运行客户端程序时，系统会要求你输入要连接的VNC服务器的IP地址（即你的树莓派的IP地址）。

    然后系统会提示你输入密码（图2-17）。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_81_0.png)


    安全短语和签名是安全装置，旨在提醒你是否有人正在入侵你的树莓派。如果在你下次认证时其中任何一个发生变化，你的树莓派可能已被入侵。


    ### 讨论


    只有当树莓派和远程计算机处于同一网络时，VNC才能工作。一些VNC客户端允许你在计算机和树莓派之间传输文件，以及在它们之间复制和粘贴文本。

    虽然你可以使用SSH命令行完成大多数操作，但有时能够访问树莓派的图形环境会很有用。

    只要启用了VNC选项，树莓派的VNC服务器在重启时会自动启动。


    ### 另请参阅


    查看这个[Adafruit教程](https://www.adafruit.com/)。

    你也可以在设置新的树莓派时启用VNC（参见[配方1.6](#recipe-1-6)）。


    ## 2.9 使用树莓派作为网络附加存储


    ### 问题


    你想通过从网络上的计算机访问连接到树莓派的大容量USB驱动器，将你的树莓派用作网络附加存储（NAS）。


    ### 解决方案


    这个问题的解决方案是安装和配置Samba。为此，请执行以下命令：


    ```

    $ sudo apt update

    $ sudo apt install samba

    $ sudo apt install samba-common-bin

    ```


    现在，将USB硬盘连接到树莓派。它将自动挂载到你的 /media/pi 文件夹中。要检查它是否在那里，请运行此命令：


    ```

    $ cd /media/pi

    $ ls

    ```


    驱动器应该以其格式化时你赋予的名称列出。每次树莓派重启时，它都会自动挂载。记下这个名称，因为你稍后会用到它。


    接下来，你需要配置Samba，以便在网络上共享驱动器。为此，你首先需要添加一个Samba用户（pi）。输入以下命令并输入密码：


    ```

    $ sudo smbpasswd -a pi

    New SMB password:

    Retype new SMB password:

    Added user pi.

    ```


    现在你需要对文件 /etc/samba/smb.conf 进行一些更改，因此请输入此命令：


    ```

    $ sudo nano /etc/samba/smb.conf

    ```


    你要找的第一行在文件顶部附近：


    ```

    workgroup = WORKGROUP

    ```


    只有当你计划从Windows机器连接时才需要更改此项。这应该是你的Windows工作组的名称。对于较新版本的Windows，这将是WORKGROUP。请注意，通常在Mac和Windows
    PC（以及Linux机器）的混合网络中连接到NAS工作得很好。


    最后，滚动到文件末尾并添加以下行，将NAS更改为你之前记下的USB驱动器的名称：


    ```

    [USB]

    path = /media/pi/NAS

    comment = NAS Drive

    valid users = pi

    writeable = yes

    browseable = yes

    create mask = 0777

    public = yes

    ```


    保存文件，然后通过输入以下内容重启Samba：


    ```

    $ sudo systemctl restart smbd

    ```


    如果一切正常，你的USB驱动器现在应该在网络上共享了。


    ### 讨论


    要在macOS上连接到驱动器，请选择“前往”，然后从Finder菜单中点击“连接服务器”。接下来，在“服务器地址”字段中，输入 **smb://raspberrypi/USB**。会打开一个登录对话框，你需要在其中将用户名更改为
    **pi**（图2-18）。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_83_0.png)


    如果你从Windows机器连接到NAS，具体过程将因Windows版本而异。然而，基本原理是，在某个时刻你需要输入网络地址，该地址应为 **\raspberrypi\USB**（图2-19）。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_84_0.png)


    图2-19. 从Windows连接到NAS


    然后系统会提示你输入用户名和密码，然后才能使用NAS磁盘（图2-20）。你通常只需要在第一次这样做。添加网络位置后，你应该能够在文件资源管理器中直接导航到它。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_84_1.png)


    图2-20. 在Windows上浏览NAS


    如果你是Linux用户，以下命令应该可以为你挂载NAS驱动器：


    ```

    $ sudo mkdir /pishare

    $ sudo smbmount -o username=pi,password=raspberry //192.168.1.16/USB /pishare

    ```


    你应该能够使用主机名（raspberrypi）连接到树莓派，但如果这不起作用，请尝试使用你的树莓派的IP地址，类似于 `smb://192.168.1.16/USB`。


    ### 另请参阅


    你可能想将树莓派的网络名称更改为像“piNAS”这样不合适的名字（参见配方2.4）。


    ## 2.10 设置网络打印机


    ### 问题


    你想从树莓派打印到网络打印机。


    ### 解决方案


    使用通用Unix打印系统（CUPS）软件。


    首先，在终端中输入以下命令安装CUPS（这可能需要一些时间）：


    ```

    $ sudo apt update

    $ sudo apt install cups

    ```


    通过输入以下命令为自己授予CUPS的管理员权限：


    ```

    $ sudo usermod -a -G lpadmin pi

    ```


    最后一条命令将CUPS使用的 `lpadmin` 组添加到用户pi，以便你拥有打印权限。


    CUPS通过Web界面进行配置，因此从树莓派菜单启动Chromium网页浏览器，然后在地址栏中输入地址 `http://localhost:631`。


    在“管理”选项卡上，选择“添加打印机”选项。这将显示网络上或直接连接到树莓派USB端口的打印机列表（图2-21）。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_86_0.png)


    图2-21. 使用CUPS发现打印机


    按照一系列对话框设置打印机。


    ### 讨论


    完成后，你可以通过启动LibreOffice（配方4.2）来测试打印机。输入一些文本，当你去打印时，你应该能看到新添加的打印机可用于打印（图2-22）。'
