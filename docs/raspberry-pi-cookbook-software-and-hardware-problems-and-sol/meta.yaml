    \ a regular expression so that it works just right. An [online regular expression\
    \ tool](Figure 7-5) can be a big help in learning how to properly structure and\
    \ test a regular expression.\n\nThe online tester has an area where you can write\
    \ your regular expression, and a test string area, where you can put the text\
    \ that you want to use with your regular expression. The tool then highlights\
    \ what has matched. In Figure 7-5, the tool has correctly highlighted the word\
    \ *for*.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_242_0.png)\n\nFigure 7-5.\
    \ The pythex online regular expression tester\n\n## See Also\n\nTo replace the\
    \ text you have matched, see [Recipe 7.24](Recipe 7.24).\n\nFor more details about\
    \ regular expressions in Python, see this [W3Schools.com page](W3Schools.com page).\n\
    \n## 7.24 Using Regular Expressions to Validate Data Entry\n\n### Problem\n\n\
    You have some text that you want to validate; for example, you want to make sure\
    \ that the text looks like an email address.\n\n### Solution\n\nUse a regular\
    \ expression (Recipe 7.23).\n\nRegular expressions are mainly used to validate\
    \ information entered by a user. For example, if you have ever completed an online\
    \ form that includes your email address, and you typed in something that didn't\
    \ look like an email address, the message you received saying that the address\
    \ wasn't a valid format probably came from a regular expression validation.\n\n\
    Try out the code in the file *ch_07_regex_email.py* (all program examples in this\
    \ book are available for download; see Recipe 3.22):\n\n```\nimport re\n\nregex\
    \ = '^[\\w\\_.+-]+@[\\w\\.-]+\\.[\\w_-]+$'\nwhile True:\n    text = input(\"Enter\
    \ an email address: \")\n    if re.search(regex, text):\n        print(\"valid\"\
    )\n    else:\n        print(\"invalid\")\n```\n\nThis program will repeatedly\
    \ prompt you to enter an email address and then report whether it is valid. An\
    \ online search will uncover alternative regular expressions for email and for\
    \ pretty much any other type of validation.\n\nThis one looks for one or more\
    \ alphanumerics (plus _ . + or -), followed by an @ symbol, followed by a repeat\
    \ of that sequence, followed by the sequence again but without a period in the\
    \ string, which makes sure that the email doesn't end in a period.\n\n### Discussion\n\
    \nIf you have a particular validation in mind (for example, a phone number or\
    \ website), someone will almost certainly have made a regular expression for it.\
    \ So before writing your own, do an internet search. There is no point in reinventing\
    \ the wheel.\n\n### See Also\n\nFor the basics on regular expressions, see Recipe\
    \ 7.23.\n\n## 7.25 Using Regular Expressions for Web Scraping\n\n### Problem\n\
    \nYou want to write a Python program that automatically fetches (scrapes) information\
    \ from a web page.\n\n### Solution\n\nUse regular expressions to match text in\
    \ the page's contents, which are in HTML format.\n\nRegular expressions are very\
    \ useful for *web scraping*. Web scraping means automatically reading things from\
    \ a web page's HTML. For example, if I want a Python program to automatically\
    \ give me the current Amazon ranking of this book, I need to be able to grab the\
    \ number from the Amazon sales rank (circled in Figure 7-6).\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_244_0.png)\n\
    \nFigure 7-6. Web scraping from Amazon\n\nIf I click View Source in my browser\
    \ and then search for “Sellers Rank,” I can find the relevant piece of HTML, which\
    \ looks like this:\n\n```\n<li id=\"SalesRank\">\n<b>Amazon Best Sellers Rank:</b>\n\
    #746,779 in Books (<a href=\"https://www.amazon.com/best-sellers-books-Amazon/zgbs/books/ref=pd_dp_ts_books_1\"\
    >See Top 100 in Books</a>)\n```\n\nI can use this as my test text in an online\
    \ regular expression tester and work on an expression that will extract the Amazon\
    \ rank. We can assume that this will be everything between # and *in Books*.\n\
    \nHere is the code for this, which you can also find in the downloads for the\
    \ book (Recipe 3.22) in the file *ch_07_regex_scraping.py*:\n\n```\nimport re\n\
    import urllib.request\n\nregex = '#([\\d,]+) in Books'\nurl = 'https://www.amazon.com/Raspberry-Pi-Cookbook-Software-Solutions/dp/1492043222/'\n\
    \nprint(\"The Amazon rank is.....\")\ntext = urllib.request.urlopen(url).read().decode('utf-8')\n\
    print(re.search(regex, text).group())\n```\n\nThe output of the file will look\
    \ something like this:\n\n```\n$ python3 test.py\nThe Amazon rank is.....\n#746,779\
    \ in Books\n```\n\nThe code first reads the web page contents. The text must then\
    \ be converted to UTF-8 format (Latin alphabet only) before it can be used with\
    \ the re regular expression module.\n\n### Discussion\n\nMany websites offer APIs\
    \ (see Recipe 7.20). If the information you’re trying to scrape is available through\
    \ an API, then that is a much better way of getting it—not least because web scraping\
    \ is very dependent on the appearance and wording of the page, which means that\
    \ if the site is revamped, you’ll probably need to come up with a new regular\
    \ expression.\n\n### See Also\n\nTo read the contents of a web page, see Recipe\
    \ 7.13.\n\nFor the basics on regular expressions, see Recipe 7.23.\n\n# CHAPTER\
    \ 8\nComputer Vision\n\n## 8.0 Introduction\n\nComputer vision (CV) allows your\
    \ Raspberry Pi to “see” things. In practical terms, this means that your Raspberry\
    \ Pi can analyze an image, look for items of interest, and even recognize faces\
    \ and text.\n\nIf you connect a Raspberry Pi to a camera to supply the images,\
    \ all sorts of possibilities open up. This theme is continued in Chapter 9 where\
    \ we take this a stage further into the realm of machine learning.\n\n## 8.1 Installing\
    \ OpenCV\n\n### Problem\n\nYou want to install OpenCV computer vision software\
    \ on your Raspberry Pi.\n\n### Solution\n\nTo install OpenCV, first install the\
    \ prerequisite packages and update the NumPy Python library using these commands:\n\
    \n```\n$ sudo apt install libatlas-base-dev\n$ pip3 install --upgrade pip\n$ pip3\
    \ install imutils\n$ pip3 install numpy --upgrade\n```\n\nThen install OpenCV\
    \ itself using:\n\n```\n$ pip3 install opencv-python\n```"
