  md: "# Solution\n\nUse a regular expression (Recipe 7.23).\n\nRegular expressions\
    \ are mainly used to validate information entered by a user. For example, if you\
    \ have ever completed an online form that includes your email address, and you\
    \ typed in something that didn't look like an email address, the message you received\
    \ saying that the address wasn't a valid format probably came from a regular expression\
    \ validation.\n\nTry out the code in the file *ch_07_regex_email.py* (all program\
    \ examples in this book are available for download; see Recipe 3.22):\n\n```\n\
    import re\n\nregex = '^[\\w\\_.+-]+@[\\w\\.-]+\\.[\\w_-]+$'\nwhile True:\n   \
    \ text = input(\"Enter an email address: \")\n    if re.search(regex, text):\n\
    \        print(\"valid\")\n    else:\n        print(\"invalid\")\n```\n\nThis\
    \ program will repeatedly prompt you to enter an email address and then report\
    \ whether it is valid. An online search will uncover alternative regular expressions\
    \ for email and for pretty much any other type of validation.\n\nThis one looks\
    \ for one or more alphanumerics (plus _ . + or -), followed by an @ symbol, followed\
    \ by a repeat of that sequence, followed by the sequence again but without a period\
    \ in the string, which makes sure that the email doesn't end in a period.\n\n\
    # Discussion\n\nIf you have a particular validation in mind (for example, a phone\
    \ number or website), someone will almost certainly have made a regular expression\
    \ for it. So before writing your own, do an internet search. There is no point\
    \ in reinventing the wheel.\n\n# See Also\n\nFor the basics on regular expressions,\
    \ see Recipe 7.23.\n\n# 7.25 Using Regular Expressions for Web Scraping\n\n# Problem\n\
    \nYou want to write a Python program that automatically fetches (scrapes) information\
