    \n`arecord`命令有可选参数，可以让你控制录制音频的采样率和格式。因此，例如，如果你想以每秒16,000个样本而不是默认的8,000个进行录制，请使用以下命令：\n\
    \n```\n$ arecord -r 16000 -d 3 test.wav\n```\n\n当你播放声音时，`aplay`会自动检测采样率，所以你可以这样做：\n\
    \n```\n$ aplay test.wav\nPlaying WAVE 'test.wav' : Unsigned 8 bit, Rate 16000\
    \ Hz, Mono\n```\n\n### 另请参阅\n\n有关将扬声器连接到树莓派的方法，请参见配方16.1。有关播放声音文件的其他方法，请参见配方16.4和16.5。\n\
    \n## 16.7 制作蜂鸣声\n\n### 问题\n\n你想用树莓派制作蜂鸣声。\n\n### 解决方案\n\n使用连接到GPIO引脚的压电蜂鸣器。\n\n\
    大多数小型压电蜂鸣器使用图16-9所示的布置都可以正常工作。我使用的是Adafruit提供的组件（参见第567页的“杂项”）。你可以使用母对母排针将蜂鸣器引脚直接连接到树莓派（参见第564页的“原型设备和套件”）。\n\
    \n这些蜂鸣器消耗的电流非常小。但是，如果你有一个大型蜂鸣器或者只是想稳妥起见，请在GPIO引脚和蜂鸣器引线之间放置一个470Ω电阻。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_480_0.png)\n\
    \n将以下代码粘贴到编辑器中（ch_16_buzzer.py）：\n\n```python\nfrom gpiozero import Buzzer\n\n\
    buzzer = Buzzer(18)\n\ndef buzz(pitch, duration):\n    period = 1.0 / pitch\n\
    \    delay = period / 2\n    cycles = int(duration * pitch)\n    buzzer.beep(on_time=period,\
    \ off_time=period, n=int(cycles/2))\n\nwhile True:\n    pitch_s = input(\"Enter\
    \ Pitch (200 to 2000): \")\n    pitch = float(pitch_s)\n    duration_s = input(\"\
    Enter Duration (seconds): \")\n    duration = float(duration_s)\n    buzz(pitch,\
    \ duration)\n```\n\n与本书中所有程序示例一样，你也可以下载此程序（参见配方3.22）。\n\n运行程序时，它首先会提示你输入音高（以Hz为单位），然后输入蜂鸣声的持续时间（以秒为单位）：\n\
    \n```\n$ python3 ch_16_buzzer.py\nEnter Pitch (200 to 10000): 2000\nEnter Duration\
    \ (seconds): 20\n```\n\n### 讨论\n\n压电蜂鸣器的频率范围不宽，音质也远非良好。然而，你可以稍微改变音高。代码生成的频率不是很准确，你可能会听到一点颤音。\n\
    \n该程序通过使用gpiozero的Buzzer类来切换GPIO引脚18的开和关，中间有短暂的延迟。延迟是根据音高计算的。音高（频率）越高，所需的延迟就越短。\n\
    \n### 另请参阅\n\n查看压电蜂鸣器的数据手册。\n\n有关更好的音频输出选项，请参见配方16.1。\n\n# 第17章\n物联网\n\n## 17.0\
    \ 简介\n\n*物联网*（IoT）是连接到互联网的设备（物品）快速增长的网络。这不仅仅意味着越来越多的计算机使用浏览器，还包括实际的电器、可穿戴和便携式技术。这包括各种家庭自动化，从智能电器和照明到安全系统，甚至互联网操作的宠物喂食器，以及许多不太实用但有趣的项目。\n\
    \n在本章中，你将学习如何让你的树莓派以各种方式参与物联网。\n\n## 17.1 使用Web界面控制GPIO输出\n\n### 问题\n\n你想使用树莓派的Web界面来控制通用输入/输出（GPIO）输出。\n\
    \n### 解决方案\n\n使用bottle Python Web服务器库（配方7.17）创建一个HTML Web界面来控制GPIO端口。\n\n要制作此配方，你需要以下物品：\n\
    \n- 面包板和跳线（参见第564页的“原型设备和套件”）\n- 三个1kΩ电阻（参见第565页的“电阻和电容”）\n- 三个LED（参见第566页的“光电子器件”）\n\
    - 触觉按钮开关（参见第567页的“杂项”）\n\n图17-1显示了此项目的面包板布局。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_483_0.png)\n\
    \n图17-1. 从网页控制GPIO输出的面包板布局\n\n使用面包板的替代方法是连接Raspberry Squid和Squid Button（参见配方10.10和10.11）。你可以将它们直接插入树莓派的GPIO引脚，如图17-2所示。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_484_0.png)\n\n图17-2. Raspberry Squid和Squid\
    \ Button\n\n要安装bottle库，请参见配方7.17。\n\n打开编辑器并粘贴以下代码（ch_17_web_control.py）：\n\n```python\n\
    from bottle import route, run\nfrom gpiozero import LED, Button\n\nleds = [LED(18),\
    \ LED(23), LED(24)]\nswitch = Button(25)\n\ndef switch_status():\n    if switch.is_pressed:\n\
    \        return 'Down'\n    else:\n        return 'Up'\n\ndef html_for_led(led_number):\n\
    \    i = str(led_number)\n    result = \" <input type='button' onClick='changed(\"\
    \ + i + \")' value='LED \" + i\n             + \"'/>\"\n    return result\n```"
