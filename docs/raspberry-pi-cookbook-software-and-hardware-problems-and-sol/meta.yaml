  md: 'Most of the time, using the desktop interface to add Bluetooth devices to your
    Raspberry Pi system is convenient; however, you can also pair Bluetooth devices
    using the command-line interface.


    To run Bluetooth commands from the command line, use the `bluetoothctl` command:


    ```

    $ bluetoothctl

    [NEW] Controller B8:27:EB:50:37:8E raspberrypi [default]

    [NEW] Device 51:6D:A4:B8:D1:AA 51-6D-A4-B8-D1-AA

    [NEW] Device E8:06:88:58:B2:B5 si''s keyboard #1

    [bluetooth]#

    ```


    This scans for Bluetooth devices and also provides a `pair` command that will
    allow you to pair with the device using its ID—for example:


    ```

    [bluetooth]# pair E8:06:88:58:B2:B5

    ```


    # See Also


    Take a look at a [list of Bluetooth adapters that are compatible with the Raspberry
    Pi](https://www.raspberrypi.com/documentation/accessories/bluetooth.html#compatible-bluetooth-adapters).


    The Blue Dot software for Android phones enables you to control hardware attached
    to your Raspberry Pi using Bluetooth and your mobile phone. You will find an example
    of this in [Recipe 11.8](https://www.raspberrypi.com/documentation/accessories/bluetooth.html#recipe-11-8).


    If you pair your Raspberry Pi with a Bluetooth speaker, you also need to set the
    speaker to be the output for sound ([Recipe 16.2](https://www.raspberrypi.com/documentation/accessories/bluetooth.html#recipe-16-2)).'
