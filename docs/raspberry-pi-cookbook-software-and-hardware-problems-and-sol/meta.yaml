    也可能引起你的兴趣。它们确定了要使用的MQTT主题以及伴随发布事件的消息。你可以为一系列Wemos按钮编程，使用不同的主题和消息。


    ## 另请参阅


    要将你新配置的Wemos与Node-RED一起使用，请参阅配方18.10。


    你将在第19章中了解更多关于Wemos等设备的信息。


    ## 18.10 将Wemos D1与Node-RED一起使用


    ### 问题


    你希望将一个连接了按钮的Wemos D1包含在Node-RED流中。


    ### 解决方案


    例如，我们可以在Node-RED流中使用配方18.9中的Wemos WiFi按钮来切换Sonoff网络开关（配方18.4）的开和关。


    图18-35显示了此功能的Node-RED流。如果你愿意，可以导入该流，而不是从头开始构建。请按照配方18.2讨论部分的说明导入该流。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_546_0.png)


    图18-35. 用于WiFi灯开关的Node-RED流


    要制作此配方，你将受益于已经尝试过本章中所有先前的配方。


    Button 1 MQTT节点订阅来自Wemos D1的消息。图18-36显示了该节点的设置。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_546_1.png)


    图18-36. 配置Button 1节点


    这里重要的是将主题设置为“button_1”。触发器节点的工作方式与配方18.6中的相同。触发器节点更有趣，因为该节点记住一个值（可以是1或0），并在每次消息通过时翻转此值。这必须作为一个通用功能来完成，需要一点JavaScript代码来记住状态并切换它。图18-37显示了该节点的配置，包括代码。这是一个有用的功能，你可能会发现自己在其他项目中会重用它。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_547_0.png)


    图18-37. 切换功能


    ### 讨论


    Node-RED是一种快速构建家庭自动化系统的强大方式。如果你习惯于传统的编程语言，这种方式需要一点时间来适应；然而，一旦你掌握了它，你就不会再想回去编写大量的代码了。


    Node-RED的调色板中还有许多其他有趣的节点，因此花些时间探索它们。将鼠标悬停在节点上会显示其功能的详细信息，你可以通过将节点拖到流上来尝试它。


    ### 另请参阅


    更多信息可在完整的[Node-RED文档](https://nodered.org/docs/)中找到。


    # 第19章

    Raspberry Pi Pico 和 Pico W


    ## 19.0 简介


    虽然普通的Raspberry Pi非常适合需要网络连接或图形用户界面（GUI）的项目，但其功耗和缺乏任何模拟输入使其在与更简单的微控制器板（如Arduino或Raspberry
    Pi Pico）相比处于劣势。


    Raspberry Pi Pico在几个方面与任何其他Raspberry Pi非常不同：


    - 它没有任何键盘、鼠标或屏幕的接口。

    - 它具有相对较小的2M闪存用于存储程序（没有microSD卡槽）和264k的RAM。

    - 其处理器仅以133 MHz运行，而Raspberry Pi 4的运行频率为1.2 GHz。

    - 它没有操作系统。实际上，MicroPython就是它的操作系统，你在Python命令行上看到的就是你得到的。


    这可能会让你想知道，为什么你会使用这样一个明显功能较弱的板子，而不是，比如说，Raspberry Pi Zero。


    答案是，Pico（图19-1）甚至比Pi Zero成本更低，并且在与外部电子设备接口方面在几个方面优于Raspberry Pi 4。例如：


    - 三个模拟输入使得连接模拟传感器比使用普通Raspberry Pi容易得多。

    - 六个脉宽调制（PWM）输出。这些输出是硬件定时的，产生的PWM信号比Raspberry Pi所能实现的要准确得多，因此它们更适合控制伺服电机。

    - 内置电源允许Pico从1.8V到5.5V供电，并且功耗低，因此你可以用一对AA电池运行它数小时。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_549_0.png)


    图19-1. Raspberry Pi Pico板


    Raspberry Pi Pico W（图19-2）与Pico具有相同的引脚排列，但你在板子右侧看到的金属矩形是一个WiFi和蓝牙模块。这使得Pico W适用于连接项目。Pico
    W仍然物有所值，但比Pico贵得多。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_549_1.png)


    图19-2. Raspberry Pi Pico W


    在本章的剩余部分中，我将把Raspberry Pi Pico和Pico W简称为“Pico”（除非差异很重要），并将普通的Raspberry Pi 4或400等简称为“Raspberry
    Pi”。


    ## 19.1 将Pico或Pico W连接到计算机


    ### 问题


    你想将你的Pico或Pico W连接到你的Raspberry Pi或Mac或Windows PC，以便对其进行编程。


    ### 解决方案


    Thonny Python编辑器支持Pico和Pico W，并且预装在Raspberry Pi OS中。如果你没有使用过Thonny，请从Raspberry菜单的编程部分打开它。


    要将Thonny配置为Pico使用，你需要将其设置为正常模式（配方5.3），以便访问菜单，然后从工具菜单中选择选项，并转到解释器选项卡（图19-3）。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_550_0.png)


    在下拉列表中，选择MicroPython (Raspberry Pi Pico)作为要使用的解释器，然后单击确定。这将带你到一个提供安装MicroPython的屏幕'
