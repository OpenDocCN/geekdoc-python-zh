  - '[PAGE 115]


    The wget command takes the URL to download as its argument and downloads it into
    the current directory. It''s typically used to download an archive file of some
    type but will also download any web page. So, you could, for example, fetch the
    Google homepage into a file called *index.html* using the command:


    ```

    $ wget google.com

    ```


    # See Also


    For information on installing with apt, see [Recipe 3.17](Recipe 3.17).


    # 3.21 Fetching Source Code with Git


    # Problem


    Sometimes Python libraries and another software are hosted on the GitHub website
    or other online Git repository. You need to be able to fetch them onto your Raspberry
    Pi.


    # Solution


    To use code in Git repositories, you need to use the `git clone` command to make
    your own copy of the files.


    For example, the following command will download all of the source code examples
    from this book into a new folder:


    ```

    $ git clone https://github.com/simonmonk/raspberrypi_cookbook_ed4.git

    ```


    Along with the URL for the code to clone, there is a web page that you can visit
    with a browser. If you go to the [GitHub web page for this book](GitHub web page
    for this book), you will find a web page similar to the one shown in *Figure 3-12*.


    Clicking the Code button allows you to copy the repository''s URL and then paste
    it after the command `git` in your Terminal session.


    # Discussion


    There is a difference between Git and GitHub. *Git* is software used to manage
    code, and *GitHub* is one of many websites hosting code, which was pushed there
    using Git. In fact, you can actually host your own Git repository on a Raspberry
    Pi if you want to. However, there are benefits to using a Git-based website such
    as GitHub or GitLab:


    +   - Your code is stored in the cloud, so if your disk (or SD card) breaks, you
    won''t lose the code.'
  - '[PAGE 116]


    +   - The code is publicly visible, so other people can look at it and use it,
    and if they find things wrong with it they might even offer up fixes for you.

    - You can include documentation about your project for all to see in the README
    file.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_116_0.png)


    Figure 3-12. The GitHub repository page for this book


    If you are working on a Raspberry Pi project that you think others might be interested
    in, I would recommend using GitHub or GitLab to host your code. There is a little
    bit to learn, but it''s worth the effort.


    Another advantage to using Git (whether locally or with a service like GitHub)
    is that every time you do a chunk of work on a project, you will push that work
    up to the master copy of your code. This doesn''t replace the code that was already
    there, but is instead stored as a new edition. You can at any time recover earlier
    versions of the code should you make a mistake.


    > > The terms “master” and “slave” used in the 1-wire and SPI interfaces were
    written into standards and code many years ago. The origins of these words are
    clearly problematic. There are moves to replace this terminology with something
    more modern (and more technically accurate). But for now, unfortunately, we will
    continue seeing these names until code libraries and the standards they reflect
    are brought up-to-date.'
  - '[PAGE 117]


    I host all of the code from my books and other projects on GitHub. These are the
    steps I take when I make a new repository:


    +   1. Go to your home page on GitHub (you''ll need to create an account) and
    click the + button and select the New Repository option.

    2. Give the repository a name and short description.

    3. Check the option “Initialize this repository with a README.”

    4. Select a license—I select MIT for no better reason than my great respect for
    that august center of learning, reasoning that if it has a license for sharing
    my work, it''s probably a good one.

    5. Click “Create repository.”

    6. Back on your computer (Raspberry Pi or other), open a Terminal (Recipe 3.3).

    7. Run the command git followed by the URL of the repository. This will create
    a folder for the project. Any files that you write in this folder will eventually
    be saved to GitHub when you type the following commands:


    ```

    $ git add .

    $ git commit -m "message about what you changed or added"

    $ git push

    ```


    The first of these commands adds all of the changed or new files to the list of
    files to be committed. The commit command gives you an option to explain what''s
    new in the changes being committed. Finally, the push command pushes the changes
    up to GitHub. At this point, you are prompted for your GitHub username and password.
    The password will actually be a token that you generate from your GitHub account.


    You will find GitHub to be a rich source of Python and other code for use with
    the Raspberry Pi. This is especially true when it comes to software interfaces
    to different types of hardware, such as displays and sensors.


    # See Also


    Learn more about Git and the Git hosting services GitHub and GitLab.


    For information on downloading this book''s program code and other files relating
    to this book, see Recipe 3.22.


    # 3.22 Fetching This Book’s Accompanying Code


    # Problem


    You want to download all the source code and other files relating to this book.'
  - '[PAGE 118]


    # Solution


    You can either *clone* the files from GitHub as described in Recipe 3.21 or, as
    we will describe here, get the downloads as a single ZIP archive file from GitHub.


    A good starting point for getting the book''s downloads is to go to the book''s
    web page using the browser on your Raspberry Pi. Here, in addition to a link to
    the book''s code hosted on GitHub, you will find errata and other information
    about the book.


    So whether you begin at the website or directly at the GitHub page, when you click
    the Code button, you will see the Download ZIP option (Figure 3-13).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_118_0.png)


    Click the Download ZIP option. Chromium saves this to your Downloads folder. Click
    the down arrow next to the downloaded ZIP file and then select the option “Show
    in folder.”


    This opens a File Manager window in the Downloads folder. Find the ZIP file that
    has just been downloaded.


    Double-click the ZIP file to open the Xarchiver tool and then click the “Extract
    files” icon.


    In the dialog that appears, change the path to which the extracted folder is to
    be saved to /home/pi and then click Extract.'
  - '[PAGE 119]


    After the files have been extracted, there will be a new folder in your home directory
    containing all the downloads for the book.


    # Discussion


    If you now use the File Manager to see what''s in your home directory, you will
    find a folder called `raspberry_pi_cookbook_ed4-master`.


    # See Also


    For more information on using Git and GitHub, see [Recipe 3.21](Recipe 3.21).


    # 3.23 Running a Program Automatically on Startup


    # Problem


    You want a program or script to start automatically as your Raspberry Pi boots.


    # Solution


    Modify your `rc.local` file to run the program you want.


    Edit the file `/etc/rc.local` using the following command:


    ```

    $ sudo nano /etc/rc.local

    ```


    Add the following line after the first block of comment lines that begin with
    `#`:


    ```

    $ /usr/bin/python /home/pi/my_program.py &

    ```


    It is important to include the `&` on the end of the command line so that it is
    run in the background; otherwise your Raspberry Pi will not finish booting.


    # Discussion


    This way of autorunning a program needs a very careful edit of `rc.local`, or
    you can stop your Raspberry Pi from booting.


    # See Also


    A safer way of autorunning a program is detailed in [Recipe 3.24](Recipe 3.24).'
- md: "## 3.24 Running a Program Automatically as a Service\n\n### Problem\n\nYou\
    \ want to arrange for a script or program to start automatically every time the\
    \ Raspberry Pi reboots.\n\n### Solution\n\nDebian Linux, on which most Raspberry\
    \ Pi distributions are based, uses a dependency-based mechanism for automating\
    \ the running of commands at startup. This is a little tricky to use and involves\
    \ creating a configuration file for the script or program that you want to run,\
    \ which will reside in a folder called *init.d*.\n\n### Discussion\n\nThe following\
    \ example shows you how to run a Python script in your home directory. The script\
    \ could do anything, but in this case, the script runs a simple Python web server,\
    \ which is described further in Recipe 7.17.\n\nThe steps involved are:\n\n- 1.\
    \ Create an *init* script.\n- 2. Make the *init* script executable.\n- 3. Tell\
    \ the system about the new *init* script.\n\nFirst, create the *init* script.\
    \ You need to create this in the folder `/etc/init.d/`. The script can be called\
    \ anything, but in this example, we call it `my_server`.\n\nCreate the new file\
    \ by using nano with the following command:\n\n```\n$ sudo nano /etc/init.d/my_server\n\
    ```\n\nPaste the following code into the editor window and save the file. This\
    \ is a lot to type, so if you are reading a paper copy of this book, you can copy\
    \ and paste the code from this web page; just scroll down until you find this\
    \ chapter and recipe:\n\n```\n### BEGIN INIT INFO\n# Provides:          my_server\n\
    # Required-Start:    $remote_fs $syslog $network\n# Required-Stop:     $remote_fs\
    \ $syslog $network\n# Default-Start:     2 3 4 5\n# Default-Stop:      0 1 6\n\
    # Short-Description: Simple Web Server\n# Description:       Simple Web Server\n\
    ### END INIT INFO\n\n#!/bin/sh\n# /etc/init.d/my_server\n\nexport HOME\ncase \"\
    $1\" in\n  start)\n    echo \"Starting My Server\"\n    sudo /usr/bin/python /home/pi/myserver.py\
    \  2>&1 &\n    ;;\n  stop)\n    echo \"Stopping My Server\"\n    PID=`ps auxwww\
    \ | grep myserver.py | head -1 | awk '{print $2}'`\n    kill -9 $PID\n    ;;\n\
    \  *)\n    echo \"Usage: /etc/init.d/my_server {start|stop}\"\n    exit 1\n  \
    \  ;;\nesac\nexit 0\n```\n\nThis is quite a lot of work to automate the running\
    \ of a script, but most of it is boilerplate code that is the same for every service.\
    \ To run a different script, just work your way through the script, changing the\
    \ descriptions and the name of the Python file that you want to run.\n\nThe next\
    \ step is to make this file executable for the owner, which you do using this\
    \ command:\n\n```\n$ sudo chmod o+x /etc/init.d/my_server\n```\n\nNow that the\
    \ program is set up as a service, you can use the following command to test that\
    \ everything is OK before you set it to autostart as part of the boot sequence:\n\
    \n```\n$ /etc/init.d/my_server start\nStarting My Server\nBottle v0.11.4 server\
    \ starting up (using WSGIRefServer())…\nListening on http://192.168.1.16:80/\n\
    Hit Ctrl-C to quit.\n```\n\nFinally, if that runs OK, use the following command\
    \ to make the system aware of the new service that you have defined:\n\n```\n\
    $ sudo update-rc.d my_server defaults\n```\n\n### See Also\n\nFor a simpler approach\
    \ to making a program run automatically, see Recipe 3.23.\nFor more information\
    \ on changing file and folder permissions, see Recipe 3.13.\n\n## 3.25 Running\
    \ a Program Automatically at Regular Intervals\n\n### Problem\n\nYou want to run\
    \ a script once each day or at regular intervals.\n\n### Solution\n\nUse the Linux\
    \ crontab (chronological table) command.\nTo do this, the Raspberry Pi needs to\
    \ know the time and date and therefore needs a network connection.\n\n### Discussion\n\
    \nThe command crontab allows you to schedule events to take place at regular intervals.\
    \ This can be daily or hourly, and you can even define complicated patterns so\
    \ different things happen on different days of the week. This is useful for backup\
    \ tasks that you might want to run in the middle of the night.\nYou can edit the\
    \ scheduled events using the following command:\n$ crontab -e\nIf the script or\
    \ program that you want to run needs to be run as superuser, prefix all the crontab\
    \ commands with sudo (Recipe 3.12).\nThe comment line (starting with a #) indicates\
    \ the format of a crontab line. The digits are, in order, minute, hour, day of\
    \ month, month, and day of week and are followed by the command that you want\
    \ to run.\nIf there is a * in the relevant position, that means every; if there\
    \ is a number instead, the script runs only at that minute/hour/day of the month.\n\
    For example, to run myscript.sh every day at 1 a.m., you would add the line shown\
    \ in Figure 3-14.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_122_0.png)\n\nFigure\
    \ 3-14. Editing crontab\n\nBy specifying a range of day numbers, say 1–5 (Monday\
    \ to Friday), in the day of week column, the script will run only at 1 a.m. on\
    \ those days, as demonstrated here:\n\n```\n0 1 * * 1-5 /home/pi/myscript.sh\n\
    ```\n\nIf your script needs to be run from a particular directory, you can use\
    \ a semicolon (;) to separate multiple commands, as shown here:\n\n```\n0 1 *\
    \ * * cd /home/pi; python mypythoncode.py\n```\n\n### See Also\n\nYou can see\
    \ the full manpage documentation for crontab by entering this command:\n\n```\n\
    $ man crontab\n```\n\n## 3.26 Finding a File\n\n### Problem\n\nYou want to find\
    \ a file that you know is on the system somewhere.\n\n### Solution\n\nUse the\
    \ Linux find command.\n\n### Discussion\n\nStarting with a directory specified\
    \ in the command, the find command will search for a file that you specify and,\
    \ if it finds the file, display its location.\n\nFor example:\n\n```\n$ find /home/pi\
    \ -name gemgem.py\n/home/pi/python_games/gemgem.py\n```\n\nYou can start the search\
    \ at various points on the tree, even at the root of the entire filesystem (/).\
    \ A search of the entire filesystem will take a lot longer and will also produce\
    \ error messages. You can redirect these error messages by adding 2>/dev/null\
    \ to the end of the line.\n\nTo search for the file throughout the entire filesystem,\
    \ use the following command:\n\n```\n$ find / -name gemgem.py 2>/dev/null\n/home/pi/python_games/gemgem.py\n\
    ```\n\nNote that 2>/dev/null redirects output that would make it difficult to\
    \ see the file when it was eventually found. You can find out more about redirection\
    \ in Recipe 3.31.\n\nYou can also use wildcards with find as follows:\n\n```\n\
    $ find /home/pi -name match*\n/home/pi/python_games/match4.wav\n/home/pi/python_games/match2.wav\n\
    /home/pi/python_games/match1.wav\n/home/pi/python_games/match3.wav\n/home/pi/python_games/match0.wav\n\
    /home/pi/python_games/match5.wav\n```\n\n### See Also\n\nThe find command has\
    \ a number of other advanced features for searching. To see the full manpage documentation\
    \ for find, use this command:\n\n```\n$ man find\n```\n\n## 3.27 Using the Command-Line\
    \ History\n\n### Problem\n\nYou want to be able to repeat commands on the command\
    \ line without having to type them again.\n\n### Solution\n\nUse the up arrow\
    \ and down arrow keys to select previous commands from the command history, and\
    \ use the history command with grep to find older commands.\n\n### Discussion\n\
    \nYou can access the previous command you ran by pressing the up arrow key. Pressing\
    \ it again will take you to the command before that, and so on. If you overshoot\
    \ the command you wanted, the down arrow key will take you back in the other direction.\n\
    If you want to cancel without running the selected command, use Ctrl-C. Ctrl-C\
    \ is command line for *stop what you are doing*; in many situations, it will stop\
    \ a program entirely.\nOver time, your command history will grow too large for\
    \ you to use the arrow keys to find a command that you used ages ago. To find\
    \ a command from way back, you can use the history command:\n\n```\n$ history\n\
    \    1  sudo nano /etc/init.d/my_server\n    2  sudo chmod +x /etc/init.d/my_server\n\
    \    3  /etc/init.d/my_server start\n    4  cp /media/4954-5EF7/sales_log/server.py\
    \ myserver.py\n    5  /etc/init.d/my_server start\n    6  sudo apt update\n  \
    \  7  sudo apt install bottle\n    8  sudo apt install python-bottle\n```\n\n\
    This lists all of your command history and is likely to have far too many entries\
    \ for you to find the command you want. To remedy this, you can use the | character\
    \ to *pipe* (see Recipe 3.33) the history command into the grep command, which\
    \ will display only results matching a search string. So, for example, to find\
    \ all the apt (Recipe 3.17) commands that you’ve issued, you can use the line:\n\
    \n```\n$ history | grep apt\n    6  sudo apt update\n    7  sudo apt install bottle\n\
    \    8  sudo apt install python-bottle\n   55  history | grep apt\n```\n\nEach\
    \ history item has a number next to it, so if you find the line you were looking\
    \ for, you can run it using ! followed by the history number, as shown here:\n\
    \n```\n$ !6\nsudo apt update\n......\n```\n\n### See Also\n\nTo find files rather\
    \ than commands, see Recipe 3.26.\n\n## 3.28 Monitoring Processor Activity\n\n\
    ### Problem\n\nThe Raspberry Pi can run a bit slow sometimes, so you want to see\
    \ what’s hogging the processor.\n\n### Solution\n\nUse the Task Manager utility,\
    \ which you’ll find on the Raspberry Menu, in the Accessories group (Figure 3-15)."
  mdcn: "## 3.24 将程序作为服务自动运行\n\n### 问题\n\n你希望安排一个脚本或程序在每次树莓派重启时自动启动。\n\n### 解决方案\n\
    \n大多数树莓派发行版所基于的 Debian Linux，使用一种基于依赖的机制来自动化启动时运行命令。这有点棘手，需要为你要运行的脚本或程序创建一个配置文件，该文件将位于名为\
    \ *init.d* 的文件夹中。\n\n### 讨论\n\n以下示例向你展示如何在你的主目录中运行一个 Python 脚本。该脚本可以做任何事情，但在本例中，该脚本运行一个简单的\
    \ Python Web 服务器，这在配方 7.17 中有进一步描述。\n\n涉及的步骤如下：\n\n- 1. 创建一个 *init* 脚本。\n- 2.\
    \ 使 *init* 脚本可执行。\n- 3. 告知系统新的 *init* 脚本。\n\n首先，创建 *init* 脚本。你需要在 `/etc/init.d/`\
    \ 文件夹中创建它。脚本可以任意命名，但在本例中，我们将其命名为 `my_server`。\n\n使用以下命令通过 nano 创建新文件：\n\n```\n\
    $ sudo nano /etc/init.d/my_server\n```\n\n将以下代码粘贴到编辑器窗口并保存文件。这需要输入很多内容，所以如果你正在阅读本书的纸质版，你可以从这个网页复制并粘贴代码；只需向下滚动直到找到本章和配方：\n\
    \n```\n### BEGIN INIT INFO\n# Provides:          my_server\n# Required-Start:\
    \    $remote_fs $syslog $network\n# Required-Stop:     $remote_fs $syslog $network\n\
    # Default-Start:     2 3 4 5\n# Default-Stop:      0 1 6\n# Short-Description:\
    \ Simple Web Server\n# Description:       Simple Web Server\n### END INIT INFO\n\
    \n#!/bin/sh\n# /etc/init.d/my_server\n\nexport HOME\ncase \"$1\" in\n  start)\n\
    \    echo \"Starting My Server\"\n    sudo /usr/bin/python /home/pi/myserver.py\
    \  2>&1 &\n    ;;\n  stop)\n    echo \"Stopping My Server\"\n    PID=`ps auxwww\
    \ | grep myserver.py | head -1 | awk '{print $2}'`\n    kill -9 $PID\n    ;;\n\
    \  *)\n    echo \"Usage: /etc/init.d/my_server {start|stop}\"\n    exit 1\n  \
    \  ;;\nesac\nexit 0\n```\n\n要自动化运行一个脚本，这工作量相当大，但其中大部分是每个服务都相同的样板代码。要运行不同的脚本，只需通读脚本，更改描述和你想要运行的\
    \ Python 文件的名称。\n\n下一步是使此文件对所有者可执行，你可以使用此命令完成：\n\n```\n$ sudo chmod o+x /etc/init.d/my_server\n\
    ```\n\n现在程序已设置为服务，你可以使用以下命令在将其设置为启动序列的一部分自动启动之前测试一切是否正常：\n\n```\n$ /etc/init.d/my_server\
    \ start\nStarting My Server\nBottle v0.11.4 server starting up (using WSGIRefServer())…\n\
    Listening on http://192.168.1.16:80/\nHit Ctrl-C to quit.\n```\n\n最后，如果运行正常，使用以下命令让系统知道你定义的新服务：\n\
