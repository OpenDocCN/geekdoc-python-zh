    ## Raspberry Pi Cookbook


    If you’ve started to work with Raspberry Pi, you know that its capabilities are
    continually expanding. The fourth edition of this popular cookbook provides more
    than 200 hands-on recipes (complete with code) that show you how to run this tiny
    low-cost computer with Linux, program it with Python, hook it up to sensors and
    motors, and use it with the internet of things (IoT). This new edition includes
    new chapters on the Raspberry Pi Pico and machine learning with Raspberry Pi.


    Author and prolific hacker Simon Monk also teaches basic principles to help you
    use new technologies with the Raspberry Pi. These easy-to-use recipes show you,
    step-by-step, how to:


    - Set up your Raspberry Pi and connect to a network

    - Work with its Linux-based operating system

    - Program your Raspberry Pi with Python

    - Give your Pi “eyes” with computer vision

    - Recognize objects from video and sounds using machine learning

    - Control hardware through the GPIO connector

    - Use your Raspberry Pi to control different types of motors and displays

    - Work with switches, keypads, and other digital inputs

    - Use sensors to measure temperature, light, and distance

    - Connect to IoT devices in various ways and automate your home

    - Work with the Raspberry Pi Pico microcontroller board


    > “Simon Monk’s encyclopedic knowledge of all things Raspberry Pi makes the 4th
    edition of this cookbook a perfect companion for anyone venturing into the world
    of Digital Making. The breadth and depth of detail in this book will suit beginners
    and experienced makers alike.”


    —Pete Lomas

    Cocreator of Raspberry Pi


    Simon Monk is the author of more than 20 books about electronics and open source
    hardware, including *Electronics Cookbook* (O’Reilly) and the best-selling *Programming
    Arduino* (McGraw-Hill). He also designs products for MonkMakes, a business he
    runs with his wife, Linda. Previously, he cofounded mobile software company Momote
    Ltd. He holds a PhD in software engineering and a degree in cybernetics and computer
    science.


