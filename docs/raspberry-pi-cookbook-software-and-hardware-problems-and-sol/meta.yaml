    # 7.16 Sending Email from Python


    # Problem


    You want to send an email message from a Python program.


    # Solution


    Python has a library for the Simple Mail Transfer Protocol (SMTP) that you can
    use to send emails:


    > **Passwords in Code**


    Be very careful putting usernames and passwords into your code, especially if
    the code is part of a project that you are uploading to the internet. It is all
    too easy to forget and upload your password to somewhere like GitHub.


    The example that follows is for Google’s Gmail. Google has a concept of application-specific
    passwords, which makes this kind of access more secure by insisting on a long,
    random password that is different from your normal password. To get this password,
    you have to first log in to Google normally from a browser, go to [https://myaccount.google.com/](https://myaccount.google.com/),
    and then click on Security in the lefthand navigation. In the “Signing in to Google”
    section, select the option called App Passwords (Figure 7-1). Note that your Google
    account must have two factor authentication enabled to access this option.'
