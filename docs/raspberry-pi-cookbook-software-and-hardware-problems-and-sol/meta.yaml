    stored on the Pico and can be copied over to your Raspberry Pi.


    As an example, the code in ch_19_temp_logger.py will read the RP2040''s temperature
    in degrees C and log it to a file every 10 seconds.


    When you run the program, a new temperature reading appears in the Shell. When
    you have recorded enough, press the Stop button or press Ctrl-C to finish the
    logging, close the file, and exit the program.


    To see the file that has been written (temp_reading.txt), you need to go to the
    View menu of Thonny and select Files (Figure 19-16). This will open a column on
    the left of the Thonny window listing any files on the Pico. You can double-click
    on temp_readings.txt to open it in the Thonny editor, where you could, if you
    wanted, edit the file and then save it back to the Pico. You can also transfer
    the file to your Raspberry Pi by right-clicking on the filename on the left and
    selecting the pop-up menu option “Download to /home/pi.”'
