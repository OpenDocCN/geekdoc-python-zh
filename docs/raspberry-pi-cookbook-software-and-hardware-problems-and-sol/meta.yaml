- img_proc: true
  md: "![](img/e36e77524aeaae366529d1cf02f9a39c_355_0.png)\n\nFigure 12-12. Using\
    \ a ULN2803 to control a unipolar stepper motor\n\nThe 5V supply from the GPIO\
    \ connector can work acceptably with a small stepper motor. If you experience\
    \ problems with the Raspberry Pi crashing or need to use a bigger stepper motor,\
    \ use a separate supply for the power to the motor (pin 10 of the ULN2803).\n\n\
    Open an editor and paste in the following code (*ch_12_stepper.py*). This program\
