  md: '# Solution


    Get a low-cost RC-522 RFID card reader/writer and use the SimpleMFRC522 Python
    library.


    For this recipe, you will need the following:


    +   - RC-522 card reader; this is often sold with a selection of RFID tags to
    use (see “Modules” on page 566)

    - Seven female-to-female jumper wires (see “Prototyping Equipment and Kits” on
    page 564)


    Figure 14-31 shows the RC-522 wired up to a Raspberry Pi. The RC-522 uses the
    Raspberry Pi’s SPI interface, so you will need to follow Recipe 10.6.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_445_0.png)


    Figure 14-31. Connecting a Raspberry Pi and RC-522


    Table 14-1 shows the connections you need to make using the jumper wires, with
    suggested colors for the leads to make it easy to identify which lead is which.


    Table 14-1. Connecting a Raspberry Pi and an RFID reader/writer


    | Lead color | RC-522 pin | Raspberry Pi pin |

    | :--- | :--- | :--- |

    | Orange | SDA | GPIO8 |

    | Yellow | SCK | SCLK / GPIO11 |

    | White | MOSI | MOSI / GPIO10 |

    | Green | MISO | MISO/GPIO09 |

    | Blue | GND | GND |

    | Gray | RST | GPIO25 |

    | Red | 3.3V | 3.3V |'
