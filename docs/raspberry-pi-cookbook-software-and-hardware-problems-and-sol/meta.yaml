  md: "# Discussion\n\nLet's take a look at the code for this:\n\n```\nimport time\n\
    from tflite_support.task import audio\nfrom tflite_support.task import core\n\
    from tflite_support.task import processor\n\nmodel = 'yamnet.tflite'\nnum_threads\
    \ = 4\nscore_threshold = 0.6\noverlapping_factor = 0.5\n\n# Initialize the audio\
    \ classification model.\nbase_options = core.BaseOptions(\n    file_name=model,\
    \ use_coral=False, num_threads=num_threads)\nclassification_options = processor.ClassificationOptions(\n\
    \    max_results=1, score_threshold=score_threshold)\noptions = audio.AudioClassifierOptions(\n\
    \    base_options=base_options, classification_options=classification_options)\n\
    classifier = audio.AudioClassifier.create_from_options(options)\n\n# Initialize\
    \ the audio recorder and a tensor to store the audio input.\naudio_record = classifier.create_audio_record()\n\
    tensor_audio = classifier.create_input_tensor_audio()\n\n# We'll try to run inference\
    \ every interval_between_inference seconds.\n# This is usually half of the model's\
    \ input length to create an overlapping\n# between incoming audio segments to\
    \ improve classification accuracy.\ninput_length_in_second = float(len(\n    tensor_audio.buffer))\
    \ / tensor_audio.format.sample_rate\ninterval_between_inference = input_length_in_second\
    \ * (1 - overlapping_factor)\npause_time = interval_between_inference * 0.1\n\
    last_inference_time = time.time()\n\n# Start audio recording in the background.\n\
    audio_record.start_recording()\n\nprint('Listening for Whistles...')\n\nwhile\
    \ True:\n    tensor_audio.load_from_audio_record(audio_record)\n    results =\
    \ classifier.classify(tensor_audio)\n    if len(results.classifications) > 0:\n\
    \        classification = results.classifications[0]\n        if len(classification.categories)\
    \ > 0:\n            top_category = classification.categories[0]\n            if\
    \ top_category.category_name == 'Whistling':\n                print('Whistling\
    \ Detected')\n    time.sleep(pause_time)\n```"
