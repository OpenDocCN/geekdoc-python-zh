    # # 1.5 Selecting an Operating System


    # ## Problem


    There are several Raspberry Pi operating systems, and you are not sure which one
    to use.


    # ## Solution


    The answer to this question depends on what you intend to do with your Raspberry
    Pi.


    For general use as a computer or for using in electronic projects, you should
    use Raspberry Pi OS, the standard and official distribution for the Raspberry
    Pi.


    If you plan to use your Raspberry Pi as a media center, a number of distributions
    (versions of Linux) are available specifically for that purpose (see Recipe 4.1).


    In this book, we use Raspberry Pi OS almost exclusively, although most of the
    recipes will work with any Debian-based Linux distribution.


    # ## Discussion


    If you are interested in trying out some different distributions, you can purchase
    some microSD cards, which are not expensive, and copy the various distributions
    onto them. If you do this, it is a good idea to keep your files that you don''t
    want to lose on a USB flash drive plugged into your Raspberry Pi.


    Note that if you are using one of the upcoming recipes to write your own SD card,
    you need to have a computer that has an SD card slot (and an SD-to-microSD adapter),
    or you can buy an inexpensive USB SD card reader.


    # ## See Also


    Check out the [official list of Raspberry Pi distributions](https://www.raspberrypi.com/software/operating-systems/).


    # # 1.6 Installing an Operating System Using Raspberry Pi Imager


    # ## Problem


    You want to put the operating system for your Raspberry Pi directly onto a microSD
    card ready for use by your Pi.'
- md: '## Solution


    Before you can use your Raspberry Pi, you must prepare a microSD card with the
    Raspberry Pi OS operating system by writing a disk image onto the microSD card.

    The process of writing the disk image onto the microSD card is as follows:


    1.  Using a Mac, Windows, or Linux computer (not your Raspberry Pi), download
    the [Raspberry Pi Imager](https://www.raspberrypi.com/software/).

    2.  Insert the microSD card into your computer. It''s also a good idea to disconnect
    any other removable media so that you don''t accidentally overwrite the wrong
    device.

    3.  Start the Raspberry Pi Imager (Figure 1-11).

    4.  Select the Operating System as Raspberry Pi OS (32-bit) and the SD card.

    5.  Click Write and wait while the image file is copied onto the removable media.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_36_0.png)


    After the SD card or other removable media is prepared, you can plug it in to
    your Raspberry Pi, and when the Raspberry Pi is powered up, it will boot into
    whatever operating system distribution you installed.


    ## Discussion


    Vendors of hardware sometimes offer their own disk image that has support for
    their hardware built into it. It’s best to avoid using such images because doing
    so means that you will not get all the benefits of using a standard Raspberry
    Pi OS distribution and all the pre-installed software. It also means that if you
    have a problem with a piece of software, it will be a lot more difficult to find
    support because you are using a nonstandard distribution.


    The Raspberry Pi 4 and 400 hardware does have a 64-bit processor and a 64-bit
    version of the operating system is available, but at the time of writing using
    the default Raspberry Pi OS 32-bit option is much more stable.


    ## microSD Cards


    Not all microSD cards are created equal, and the performance of your Raspberry
    Pi will be better with a better card. So look for a card specified as being “class
    10.” Raspberry Pi OS includes a utility (Figure 1-12) to test your microSD card.
    You can find it by selecting Accessories, then Raspberry Pi Diagnostics from the
    Raspberry Pi Menu.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_37_0.png)


    Figure 1-12. Using the Raspberry Pi Diagnostics tool to test your SD card


    > When it comes to capacity, you should look for cards of at least 16 GB, and,
    really, given the small difference in price, a 32 GB card is the better choice,
    as it will give you plenty of room for expansion.


    ## See Also


    The Raspberry Pi guide to installing Raspberry Pi OS can be found at [https://www.raspberrypi.com/software](https://www.raspberrypi.com/software).


    ## 1.7 Booting Up Your Raspberry Pi for the First Time


    ### Problem


    You''ve set up a microSD card, and you want to know how to set up your Raspberry
    Pi.


    ### Solution


    The first time that you boot up your Raspberry Pi (as shown in Figure 1-13), you
    will be taken through some setup questions.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_38_0.png)


    Clicking Next prompts you to create a new user account (Figure 1-14).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_39_0.png)


    Figure 1-14. Creating a user account


    Prior to April 2022 this step was not part of the setup procedure, as the username
    of “pi” was automatically created for you. As a result many tutorials and books
    assume that your home directory is /home/pi. Unless you have strong feelings about
    your username, I would recommend sticking to the username “pi” but create a strong
    password (not the default of “raspberry”).


    After you are up and running, the first thing you should do is connect your Raspberry
    Pi to the internet (Recipes 2.1 and 2.5), because next you’ll be asked to connect
    to a WiFi network to check for updates. Updating requires an internet connection,
    so it won’t work unless you have connected to your network. If you are connected
    (either by WiFi or Ethernet), it’s a good idea to check for updates now. If not,
    you can always check later using Recipe 3.40.


    ### Discussion


    It is a good idea to set the right time zone. If you don’t, the Raspberry Pi will
    show the incorrect time because it gets its time from an internet time server.


    ### See Also


    The Raspberry Pi guide to installing Raspberry Pi OS can be found at https://www.raspberrypi.com/software.


    ## 1.8 Setting Up a Headless Raspberry Pi


    ### Problem


    You want to use a Raspberry Pi without having to connect a keyboard, mouse, and
    monitor to it.


    ### Solution


    Use the settings option on the Raspberry Pi Imager to start your Raspberry Pi
    with network credentials and enable SSH (Recipe 2.7) so that you can connect to
    the Raspberry Pi from another computer.


    After you have selected the operating system in the Raspberry Pi Imager, a cog
    settings icon will appear. When you click on this, you’ll be presented with a
    list of settings (Figure 1-15) that you can use to preconfigure your Raspberry
    Pi so that other computers on your network can connect to it.


    To be able to access the Raspberry Pi remotely, as a minimum you must:


    - Enable SSH (Secure Shell)

    - Set the username and password

    - Configure the wireless LAN with the name of your network (SSID, or service set
    identifier) and password


    It’s also not a bad idea to set the hostname, especially if you are going to have
    more than one Raspberry Pi on your network and you want to tell which is which.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_41_0.png)


    Figure 1-15. Preconfiguring a Raspberry Pi with the Pi Imager


    ### Discussion


    Once you put the microSD card into your Raspberry Pi and boot up, you can connect
    to your Raspberry Pi from another computer using SSH. The only obstacle to doing
    this is that you need to know the IP address that your home hub assigned to your
    Raspberry Pi when it connected to it. You can find this by temporarily connecting
    keyboard, mouse, and monitor and following Recipe 2.2, after which you should
    follow Recipe 2.3 so that the IP address will be fixed.


    Sometimes it isn’t convenient to attach all those things to your Raspberry Pi.
    In this case, you can use the various tools available on Android and iOS to scan
    your network from your mobile phone and report a list of connected computers along
    with their IP addresses (Figure 1-16).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_42_0.png)


    ### See Also


    For more information on connecting to your Raspberry Pi with SSH, see Recipe 2.7.


    ## 1.9 Booting from a Real Hard Disk or USB Flash Drive


    ### Problem


    Your microSD card is too small and/or you are concerned about your entire operating
    system running on an SD card.


    ### Solution


    Before the Raspberry Pi 4 and 400 came along, booting from a hard disk or flash
    drive was possible, but not very easy, involving some complex commands and the
    possibility of “bricking” your Raspberry Pi if you got it wrong. If you have a
    Raspberry Pi 4 or 400, then it is now really straightforward and starts with the
    Raspberry Pi Imager.


    The process is similar to setting up a microSD card using the Raspberry Pi Imager.
    To follow this recipe, you’ll need a Windows, Mac, or Linux computer; a USB SSD
    (solid state drive); and a microSD card. Even though the whole point of this recipe
    is to replace the microSD card as the boot device, you still need two microSD
    cards: one being your existing microSD boot device for your Raspberry Pi and a
    second blank microSD card.


    1.  Insert the blank microSD card into your card reader.

    2.  Start the Raspberry Pi Imager, and then from the Operating System drop-down,
    select Misc Utility Images and then Bootloader and then USB Boot (Figure 1-17).
    Note that if these options aren’t present in your Raspberry Pi Imager, then you
    probably need to download the latest version.

    3.  Select your microSD card from the Storage drop-down and then click Write.

    4.  Put the newly written microSD card into your Raspberry Pi and power it up.
    The only purpose of this microSD card image is to reconfigure your Raspberry Pi
    for USB booting. Once it’s done its work, the screen will turn green.

    5.  Power down your Raspberry Pi and swap the microSD cards, so that you now have
    your original microSD system card in the Raspberry Pi.

    6.  Boot your Raspberry Pi and from the Raspberry Menu, select Accessories and
    then SD Card Copier (Figure 1-18). Select your system microSD card as the source
    and the external USB drive as the destination, then click Start.'
  mdcn: '## 解决方案


    在使用树莓派之前，你必须通过将磁盘镜像写入 microSD 卡，来准备一张装有树莓派操作系统（Raspberry Pi OS）的 microSD 卡。

    将磁盘镜像写入 microSD 卡的过程如下：


    1.  使用 Mac、Windows 或 Linux 电脑（不是你的树莓派），下载 [Raspberry Pi Imager](https://www.raspberrypi.com/software/)。

    2.  将 microSD 卡插入你的电脑。同时，最好断开任何其他可移动介质的连接，以免意外覆盖错误的设备。

    3.  启动 Raspberry Pi Imager（图 1-11）。

    4.  将操作系统选择为 Raspberry Pi OS (32-bit)，并选择 SD 卡。

    5.  点击“写入”，并等待镜像文件复制到可移动介质上。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_36_0.png)


    准备好 SD 卡或其他可移动介质后，你可以将其插入树莓派。当树莓派通电时，它将启动进入你安装的任何操作系统发行版。


    ## 讨论


    硬件供应商有时会提供自己的磁盘镜像，其中内置了对其硬件的支持。最好避免使用此类镜像，因为这样做意味着你将无法获得使用标准树莓派操作系统发行版和所有预装软件的全部好处。这也意味着，如果你在某个软件上遇到问题，寻找支持会困难得多，因为你使用的是非标准发行版。


    树莓派 4 和 400 硬件确实拥有 64 位处理器，并且也有 64 位版本的操作系统可用，但在撰写本文时，使用默认的树莓派操作系统 32 位选项要稳定得多。


    ## microSD 卡


    并非所有的 microSD 卡都生而平等，使用更好的卡会让你的树莓派性能更佳。因此，请寻找标明为“class 10”的卡。树莓派操作系统包含一个实用程序（图
    1-12）来测试你的 microSD 卡。你可以通过从树莓派菜单中选择“附件”，然后选择“Raspberry Pi Diagnostics”来找到它。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_37_0.png)


    图 1-12. 使用 Raspberry Pi Diagnostics 工具测试你的 SD 卡


    > 至于容量，你应该寻找至少 16 GB 的卡，而且，考虑到价格差异很小，32 GB 的卡是更好的选择，因为它将为你提供充足的扩展空间。


    ## 另请参阅


    树莓派操作系统安装指南可在 [https://www.raspberrypi.com/software](https://www.raspberrypi.com/software)
    找到。


    ## 1.7 首次启动你的树莓派


    ### 问题


    你已经设置好了 microSD 卡，并且想知道如何设置你的树莓派。


    ### 解决方案


    首次启动树莓派时（如图 1-13 所示），你将被引导完成一些设置问题。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_38_0.png)


    点击“下一步”会提示你创建一个新的用户账户（图 1-14）。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_39_0.png)


    图 1-14. 创建用户账户


    在 2022 年 4 月之前，此步骤并非设置过程的一部分，因为系统会自动为你创建用户名“pi”。因此，许多教程和书籍都假设你的主目录是 /home/pi。除非你对用户名有特别的要求，否则我建议坚持使用用户名“pi”，但创建一个强密码（而不是默认的“raspberry”）。


    启动并运行后，你应该做的第一件事是将你的树莓派连接到互联网（参见食谱 2.1 和 2.5），因为接下来你会被要求连接到 WiFi 网络以检查更新。更新需要互联网连接，因此除非你已连接到网络，否则它将无法工作。如果你已连接（通过
    WiFi 或以太网），现在检查更新是个好主意。如果没有，你总可以稍后使用食谱 3.40 进行检查。


    ### 讨论


    设置正确的时区是个好主意。如果不设置，树莓派将显示不正确的时间，因为它从互联网时间服务器获取时间。


    ### 另请参阅


    树莓派操作系统安装指南可在 https://www.raspberrypi.com/software 找到。


    ## 1.8 设置无头树莓派


    ### 问题


    你想在不连接键盘、鼠标和显示器的情况下使用树莓派。


    ### 解决方案


    使用 Raspberry Pi Imager 上的设置选项，用网络凭据启动你的树莓派并启用 SSH（食谱 2.7），以便你可以从另一台计算机连接到树莓派。


    在 Raspberry Pi Imager 中选择操作系统后，会出现一个齿轮设置图标。点击此图标，你将看到一系列设置（图 1-15），你可以使用这些设置来预配置你的树莓派，以便你网络上的其他计算机可以连接到它。


    要能够远程访问树莓派，你至少必须：


    - 启用 SSH（安全外壳）

    - 设置用户名和密码

    - 使用你的网络名称（SSID，或服务集标识符）和密码配置无线局域网


    设置主机名也是个不错的主意，特别是如果你的网络上将有多个树莓派，并且你想区分它们。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_41_0.png)


    图 1-15. 使用 Pi Imager 预配置树莓派


    ### 讨论


    一旦你将 microSD 卡放入树莓派并启动，你就可以使用 SSH 从另一台计算机连接到你的树莓派。这样做的唯一障碍是你需要知道你的家庭集线器在树莓派连接时分配给它的
    IP 地址。你可以通过临时连接键盘、鼠标和显示器并按照食谱 2.2 操作来找到它，之后你应该按照食谱 2.3 操作，以便 IP 地址将被固定。


    有时将所有这些设备连接到你的树莓派并不方便。在这种情况下，你可以使用 Android 和 iOS 上提供的各种工具，从手机扫描你的网络，并报告已连接计算机的列表及其
    IP 地址（图 1-16）。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_42_0.png)


    ### 另请参阅


    有关使用 SSH 连接到树莓派的更多信息，请参阅食谱 2.7。


    ## 1.9 从真正的硬盘或 USB 闪存驱动器启动


    ### 问题


    你的 microSD 卡太小，和/或你担心整个操作系统都在 SD 卡上运行。


    ### 解决方案


    在树莓派 4 和 400 出现之前，从硬盘或闪存驱动器启动是可能的，但并不容易，涉及一些复杂的命令，并且如果操作不当，有可能“变砖”你的树莓派。如果你有树莓派
    4 或 400，那么现在这变得非常简单，并且从 Raspberry Pi Imager 开始。


    该过程类似于使用 Raspberry Pi Imager 设置 microSD 卡。要按照此食谱操作，你需要一台 Windows、Mac 或 Linux 电脑；一个
    USB SSD（固态硬盘）；以及一张 microSD 卡。尽管此食谱的全部目的是用 microSD 卡替换启动设备，但你仍然需要两张 microSD 卡：一张是你现有的用于树莓派的
    microSD 启动设备，另一张是空白的 microSD 卡。


    1.  将空白的 microSD 卡插入你的读卡器。

    2.  启动 Raspberry Pi Imager，然后从“操作系统”下拉菜单中，选择“杂项实用工具镜像”，然后选择“引导加载程序”，然后选择“USB 启动”（图
    1-17）。请注意，如果这些选项在你的 Raspberry Pi Imager 中不存在，那么你可能需要下载最新版本。

    3.  从“存储”下拉菜单中选择你的 microSD 卡，然后点击“写入”。

    4.  将新写入的 microSD 卡放入你的树莓派并启动它。此 microSD 卡镜像的唯一目的是重新配置你的树莓派以进行 USB 启动。一旦它完成工作，屏幕将变为绿色。

    5.  关闭树莓派电源并更换 microSD 卡，以便你现在将原始的 microSD 系统卡放入树莓派。

    6.  启动你的树莓派，并从树莓派菜单中，选择“附件”，然后选择“SD 卡复制器”（图 1-18）。选择你的系统 microSD 卡作为源，外部 USB 驱动器作为目标，然后点击“开始”。'
