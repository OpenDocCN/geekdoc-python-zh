- md: "## See Also\n\nFind out more about the Raspberry Pi Camera Module at https://oreil.ly/diUuB.\n\
    \n## 1.17 Using Bluetooth\n\n### Problem\n\nYou want to use Bluetooth with your\
    \ Raspberry Pi.\n\n### Solution\n\nIf you have a Raspberry Pi 3, 4, or 400, the\
    \ good news is that along with WiFi, you also get Bluetooth hardware. If you have\
    \ an older Raspberry Pi, you can attach a USB Bluetooth adapter to it. In both\
    \ cases, the software that you need for Bluetooth is now included in Raspberry\
    \ Pi OS.\n\nIf you have an older Raspberry Pi, be aware that not all Bluetooth\
    \ adapters are compatible with the Raspberry Pi. Most are, but to be sure, buy\
    \ one that is advertised as working with the Raspberry Pi. Figure 1-28 shows a\
    \ Raspberry Pi 2 equipped with both a USB Bluetooth adapter (nearest to the camera)\
    \ and a USB WiFi adapter.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_58_0.png)\n\
    \nFigure 1-28. Raspberry Pi 2 with USB Bluetooth and WiFi adapters\n\nBluetooth\
    \ features are integrated into the Raspberry Pi OS desktop in much the same way\
    \ as on a Mac. In the upper-right corner of the screen, you will see the Bluetooth\
    \ icon (Figure 1-29). Click this to open a menu of Bluetooth options.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_59_0.png)\n\
    \nFigure 1-29. The Raspberry Pi OS Bluetooth menu\n\nIf you want to connect a\
    \ Bluetooth peripheral such as a keyboard, click Add Device. The Add New Device\
    \ dialog box opens, showing a list of available devices with which you can connect,\
    \ or *pair* (Figure 1-30).\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_59_1.png)\n\
    \nFigure 1-30. Pairing a Bluetooth device\n\nYou can then select the device that\
    \ you want to pair with, and then follow the instructions that appear on your\
    \ Raspberry Pi and the device you are pairing with.\n\n### Discussion\n\nYou can\
    \ pair phones, Bluetooth speakers, keyboards, and mice to your Raspberry Pi. I\
    \ find that connecting a new Bluetooth device doesn't always work the first time.\
    \ So if you initially have a problem pairing with a device, try a few more times\
    \ before you give up.\n\nMost of the time, using the desktop interface to add\
    \ Bluetooth devices to your Raspberry Pi system is convenient; however, you can\
    \ also pair Bluetooth devices using the command-line interface.\n\nTo run Bluetooth\
    \ commands from the command line, use the `bluetoothctl` command:\n\n```\n$ bluetoothctl\n\
    [NEW] Controller B8:27:EB:50:37:8E raspberrypi [default]\n[NEW] Device 51:6D:A4:B8:D1:AA\
    \ 51-6D-A4-B8-D1-AA\n[NEW] Device E8:06:88:58:B2:B5 si's keyboard #1\n[bluetooth]#\n\
    ```\n\nThis scans for Bluetooth devices and also provides a `pair` command that\
    \ will allow you to pair with the device using its ID—for example:\n\n```\n[bluetooth]#\
    \ pair E8:06:88:58:B2:B5\n```\n\n### See Also\n\nTake a look at a [list of Bluetooth\
    \ adapters that are compatible with the Raspberry Pi](https://www.raspberrypi.com/documentation/accessories/bluetooth.html#compatible-bluetooth-adapters).\n\
    \nThe Blue Dot software for Android phones enables you to control hardware attached\
    \ to your Raspberry Pi using Bluetooth and your mobile phone. You will find an\
    \ example of this in [Recipe 11.8](https://www.raspberrypi.com/documentation/accessories/bluetooth.html#recipe-11-8).\n\
    \nIf you pair your Raspberry Pi with a Bluetooth speaker, you also need to set\
    \ the speaker to be the output for sound ([Recipe 16.2](https://www.raspberrypi.com/documentation/accessories/bluetooth.html#recipe-16-2)).\n\
    \n## CHAPTER 2\nNetworking\n\n## 2.0 Introduction\n\nThe Raspberry Pi is designed\
    \ to be connected to the internet. Its ability to communicate on the internet\
    \ is one of its key features and opens up all sorts of possible uses, including\
    \ home automation, web serving, network monitoring, and so on.\n\nThe connection\
    \ can be wired through an Ethernet cable (in the case of most models), and newer\
    \ models have built-in WiFi.\n\nHaving a connected Raspberry Pi also means that\
    \ you can connect to it remotely from another computer. This is very useful for\
    \ situations in which the Raspberry Pi itself is used as a *headless* server and\
    \ doesn't have a keyboard, mouse, and monitor attached to it.\n\nThis chapter\
    \ gives you recipes for connecting your Raspberry Pi to the internet and controlling\
    \ it remotely over a network.\n\n## 2.1 Connecting to a Wired Network\n\n### Problem\n\
    \nYou want to connect your Raspberry Pi to the internet using a wired network\
    \ connection.\n\n### Solution\n\nFirst, if you have an old model A Raspberry Pi\
    \ or a Pi Zero, there is no RJ45 connector for Ethernet. In this case, your best\
    \ option for internet access is to use a wireless USB adapter (see Recipe 2.5).\n\
    \nIf you have a model B or B+ Raspberry Pi (1, 2, 3, 4, or 400) then you are in\
    \ luck; just plug an Ethernet patch cable into its RJ45 socket and then connect\
    \ the other end to a spare socket on the back of your home router (Figure 2-1).\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_63_0.png)\n\nFigure 2-1. Connecting\
    \ Raspberry Pi to a home router\n\nThe network LEDs on your Raspberry Pi should\
    \ immediately begin to flicker as the Raspberry Pi connects to your network.\n\
    \n### Discussion\n\nRaspberry Pi OS is preconfigured to connect to any network\
    \ using Dynamic Host Configuration Protocol (DHCP). It will automatically be assigned\
    \ an IP address as long as DHCP is enabled on your network.\n\nIf the LEDs blink,\
    \ but you cannot connect to the internet on your Raspberry Pi using a browser,\
    \ check that DHCP is enabled on your network management console. Go to the admin\
    \ page of your home router, sign in with the admin password, and look for an option\
    \ like that shown in Figure 2-2.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_64_0.png)\n\
    \nFigure 2-2. Enabling DHCP on your home router\n\n### See Also\n\nTo connect\
    \ to a wireless network, see [Recipe 2.5](Recipe 2.5).\n\n## 2.2 Finding Your\
    \ IP Address\n\n### Problem\n\nYou want to know the IP address of your Raspberry\
    \ Pi so that you can communicate with it, whether connecting to it as a web server,\
    \ exchanging files, or controlling it remotely with SSH ([Recipe 2.7](Recipe 2.7))\
    \ or VNC ([Recipe 2.8](Recipe 2.8)).\n\n### Solution\n\nAn IPv4 address (as used\
    \ for local addresses) is a four-part number uniquely identifying a computer's\
    \ network interface within a network. Each part is separated from the next part\
    \ by a dot.\n\nTo find the IP address of your Raspberry Pi, you need to issue\
    \ this command in a Terminal window:\n\n```\n$ hostname -I\n192.168.1.16 fd84:be52:5bf4:ca00:618:fd51:1c\
    \ .....\n```\n\nThe first part of the response is the local IP address of your\
    \ Raspberry Pi on your home network.\n\n### Discussion\n\nA Raspberry Pi can have\
    \ more than one IP address (i.e., one for each network connection). So if you\
    \ have both a wired connection and a wireless connection to your Pi, it would\
    \ have two IP addresses. Normally, however, you would connect it by only one method\
    \ or the other, not both. To see all the network connections, use the ifconfig\
    \ command:\n\n```\n$ ifconfig\n\neth0      Link encap:Ethernet  HWaddr b8:27:eb:d5:f4:8f\n\
    \          inet addr:192.168.1.16  Bcast:192.168.255.255  Mask:255.255.0.0\n \
    \         UP BROADCAST RUNNING MULTICAST  MTU:1500  Metric:1\n          RX packets:1114\
    \ errors:0 dropped:1 overruns:0 frame:0\n          TX packets:1173 errors:0 dropped:0\
    \ overruns:0 carrier:0\n          collisions:0 txqueuelen:1000\n          RX bytes:76957\
    \ (75.1 KiB)  TX bytes:479753 (468.5 KiB)\n\nlo        Link encap:Local Loopback\n\
    \          inet addr:127.0.0.1  Mask:255.0.0.0\n          UP LOOPBACK RUNNING\
    \  MTU:16436  Metric:1\n          RX packets:0 errors:0 dropped:0 overruns:0 frame:0\n\
    \          TX packets:0 errors:0 dropped:0 overruns:0 carrier:0\n          collisions:0\
    \ txqueuelen:0\n          RX bytes:0 (0.0 B)  TX bytes:0 (0.0 B)\n\nwlan0    \
    \ Link encap:Ethernet  HWaddr 00:0f:53:a0:04:57\n          inet addr:192.168.1.13\
    \  Bcast:192.168.255.255  Mask:255.255.0.0\n          UP BROADCAST RUNNING MULTICAST\
    \  MTU:1500  Metric:1\n          RX packets:38 errors:0 dropped:0 overruns:0 frame:0\n\
    \          TX packets:28 errors:0 dropped:0 overruns:0 carrier:0\n          collisions:0\
    \ txqueuelen:1000\n          RX bytes:6661 (6.5 KiB)  TX bytes:6377 (6.2 KiB)\n\
    ```\n\nLooking at the results of running the ifconfig command, you can see that\
    \ the Pi in question is connected by both a wired connection (eth0) with an IP\
    \ address of 192.168.1.16 and a wireless connection (wlan0) with an IP address\
    \ of 192.168.1.13. The lo network interface is a virtual interface that allows\
    \ the computer to communicate with itself.\n\n### See Also\n\nWikipedia has everything\
    \ you want to know about IP addresses."
  mdcn: "## 另请参阅\n\n在 https://oreil.ly/diUuB 了解更多关于树莓派摄像头模块的信息。\n\n## 1.17 使用蓝牙\n\n\
    ### 问题\n\n你想在树莓派上使用蓝牙。\n\n### 解决方案\n\n如果你使用的是树莓派 3、4 或 400，好消息是除了 WiFi，你还可以获得蓝牙硬件。如果你使用的是较旧的树莓派，可以为其连接一个\
    \ USB 蓝牙适配器。在这两种情况下，蓝牙所需的软件现在都已包含在树莓派操作系统中。\n\n如果你使用的是较旧的树莓派，请注意并非所有蓝牙适配器都与树莓派兼容。大多数是兼容的，但为了确保，请购买标有适用于树莓派的适配器。图\
    \ 1-28 展示了一个同时配备了 USB 蓝牙适配器（靠近摄像头）和 USB WiFi 适配器的树莓派 2。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_58_0.png)\n\
    \n图 1-28. 配备 USB 蓝牙和 WiFi 适配器的树莓派 2\n\n蓝牙功能集成在树莓派操作系统桌面中的方式与 Mac 非常相似。在屏幕的右上角，你会看到蓝牙图标（图\
    \ 1-29）。点击此图标可打开蓝牙选项菜单。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_59_0.png)\n\
    \n图 1-29. 树莓派操作系统蓝牙菜单\n\n如果你想连接蓝牙外围设备（如键盘），请点击“添加设备”。将打开“添加新设备”对话框，显示你可以连接或*配对*的可用设备列表（图\
    \ 1-30）。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_59_1.png)\n\n图 1-30. 配对蓝牙设备\n\
    \n然后你可以选择要配对的设备，并按照树莓派和你要配对的设备上显示的说明进行操作。\n\n### 讨论\n\n你可以将手机、蓝牙音箱、键盘和鼠标与树莓派配对。我发现连接新的蓝牙设备并不总是第一次就能成功。因此，如果最初配对设备时遇到问题，请在放弃之前再尝试几次。\n\
    \n大多数情况下，使用桌面界面将蓝牙设备添加到树莓派系统很方便；但是，你也可以使用命令行界面配对蓝牙设备。\n\n要从命令行运行蓝牙命令，请使用 `bluetoothctl`\
    \ 命令：\n\n```\n$ bluetoothctl\n[NEW] Controller B8:27:EB:50:37:8E raspberrypi [default]\n\
    [NEW] Device 51:6D:A4:B8:D1:AA 51-6D-A4-B8-D1-AA\n[NEW] Device E8:06:88:58:B2:B5\
    \ si's keyboard #1\n[bluetooth]#\n```\n\n这会扫描蓝牙设备，并提供一个 `pair` 命令，允许你使用设备的 ID\
    \ 进行配对——例如：\n\n```\n[bluetooth]# pair E8:06:88:58:B2:B5\n```\n\n### 另请参阅\n\n查看[与树莓派兼容的蓝牙适配器列表](https://www.raspberrypi.com/documentation/accessories/bluetooth.html#compatible-bluetooth-adapters)。\n\
    \n适用于 Android 手机的 Blue Dot 软件使你能够使用蓝牙和手机控制连接到树莓派的硬件。你可以在[配方 11.8](https://www.raspberrypi.com/documentation/accessories/bluetooth.html#recipe-11-8)中找到一个示例。\n\
    \n如果你将树莓派与蓝牙音箱配对，还需要将音箱设置为声音输出设备（[配方 16.2](https://www.raspberrypi.com/documentation/accessories/bluetooth.html#recipe-16-2)）。\n\
    \n## 第 2 章\n网络\n\n## 2.0 简介\n\n树莓派旨在连接到互联网。其在互联网上通信的能力是其关键特性之一，并开启了各种可能的用途，包括家庭自动化、网络服务、网络监控等。\n\
    \n连接可以通过以太网线进行（对于大多数型号），较新的型号内置 WiFi。\n\n拥有联网的树莓派还意味着你可以从另一台计算机远程连接到它。这对于树莓派本身用作*无头*服务器且未连接键盘、鼠标和显示器的情况非常有用。\n\
    \n本章为你提供将树莓派连接到互联网并通过网络远程控制它的方法。\n\n## 2.1 连接到有线网络\n\n### 问题\n\n你想使用有线网络连接将树莓派连接到互联网。\n\
    \n### 解决方案\n\n首先，如果你使用的是旧型号 A 树莓派或 Pi Zero，则没有用于以太网的 RJ45 接口。在这种情况下，访问互联网的最佳选择是使用无线\
    \ USB 适配器（参见配方 2.5）。\n\n如果你使用的是型号 B 或 B+ 树莓派（1、2、3、4 或 400），那么你很幸运；只需将以太网跳线插入其\
    \ RJ45 插座，然后将另一端连接到家庭路由器背面的空闲插座（图 2-1）。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_63_0.png)\n\
    \n图 2-1. 将树莓派连接到家庭路由器\n\n树莓派上的网络 LED 应立即开始闪烁，因为树莓派正在连接到你的网络。\n\n### 讨论\n\n树莓派操作系统预配置为使用动态主机配置协议连接到任何网络。只要你的网络启用了\
    \ DHCP，它就会自动分配一个 IP 地址。\n\n如果 LED 闪烁，但你无法在树莓派上使用浏览器连接到互联网，请检查你的网络管理控制台是否启用了 DHCP。转到家庭路由器的管理页面，使用管理员密码登录，并查找如图\
    \ 2-2 所示的选项。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_64_0.png)\n\n图 2-2. 在家庭路由器上启用\
    \ DHCP\n\n### 另请参阅\n\n要连接到无线网络，请参阅[配方 2.5](Recipe 2.5)。\n\n## 2.2 查找你的 IP 地址\n\
    \n### 问题\n\n你想知道树莓派的 IP 地址，以便与之通信，无论是将其作为 Web 服务器连接、交换文件，还是通过 SSH（[配方 2.7](Recipe\
    \ 2.7)）或 VNC（[配方 2.8](Recipe 2.8)）远程控制它。\n\n### 解决方案\n\nIPv4 地址（用于本地地址）是一个四部分数字，唯一标识网络中计算机的网络接口。每个部分之间用点分隔。\n\
    \n要查找树莓派的 IP 地址，你需要在终端窗口中发出此命令：\n\n```\n$ hostname -I\n192.168.1.16 fd84:be52:5bf4:ca00:618:fd51:1c\
    \ .....\n```\n\n响应的第一部分是树莓派在家庭网络上的本地 IP 地址。\n\n### 讨论\n\n树莓派可以有多个 IP 地址（即每个网络连接一个）。因此，如果你同时通过有线和无线连接到你的\
    \ Pi，它将有两个 IP 地址。但是，通常你只会通过其中一种方式连接，而不是同时使用两种。要查看所有网络连接，请使用 ifconfig 命令：\n\n```\n\
    $ ifconfig\n\neth0      Link encap:Ethernet  HWaddr b8:27:eb:d5:f4:8f\n      \
    \    inet addr:192.168.1.16  Bcast:192.168.255.255  Mask:255.255.0.0\n       \
    \   UP BROADCAST RUNNING MULTICAST  MTU:1500  Metric:1\n          RX packets:1114\
    \ errors:0 dropped:1 overruns:0 frame:0\n          TX packets:1173 errors:0 dropped:0\
    \ overruns:0 carrier:0\n          collisions:0 txqueuelen:1000\n          RX bytes:76957\
    \ (75.1 KiB)  TX bytes:479753 (468.5 KiB)\n\nlo        Link encap:Local Loopback\n\
    \          inet addr:127.0.0.1  Mask:255.0.0.0\n          UP LOOPBACK RUNNING\
    \  MTU:16436  Metric:1\n          RX packets:0 errors:0 dropped:0 overruns:0 frame:0\n\
    \          TX packets:0 errors:0 dropped:0 overruns:0 carrier:0\n          collisions:0\
    \ txqueuelen:0\n          RX bytes:0 (0.0 B)  TX bytes:0 (0.0 B)\n\nwlan0    \
    \ Link encap:Ethernet  HWaddr 00:0f:53:a0:04:57\n          inet addr:192.168.1.13\
    \  Bcast:192.168.255.255  Mask:255.255.0.0\n          UP BROADCAST RUNNING MULTICAST\
    \  MTU:1500  Metric:1\n          RX packets:38 errors:0 dropped:0 overruns:0 frame:0\n\
    \          TX packets:28 errors:0 dropped:0 overruns:0 carrier:0\n          collisions:0\
    \ txqueuelen:1000\n          RX bytes:6661 (6.5 KiB)  TX bytes:6377 (6.2 KiB)\n\
    ```\n\n查看运行 ifconfig 命令的结果，你可以看到所述 Pi 通过有线连接（eth0）连接，IP 地址为 192.168.1.16，并通过无线连接（wlan0）连接，IP\
    \ 地址为 192.168.1.13。lo 网络接口是一个虚拟接口，允许计算机与自身通信。\n\n### 另请参阅\n\n维基百科包含了你想知道的关于 IP\
    \ 地址的一切。"
