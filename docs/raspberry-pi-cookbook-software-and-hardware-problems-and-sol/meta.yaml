- md: "When defining the servo, the first parameter (18 in this case) specifies the\
    \ control pin for the servomotor. The optional parameters of `min_pulse_width`\
    \ and `max_pulse_width` set the minimum and maximum pulse lengths in seconds.\
    \ For a typical servo, these values should be 0.5 milliseconds and 2.5 milliseconds.\
    \ For some reason, the default values in gpiozero are 1 and 2 milliseconds; thus\
    \ the servomotor has a very restricted range unless you set these values as we\
    \ have here.\n\n## Discussion\n\nServomotors are used in remote control vehicles\
    \ and robotics. Most servomotors are not *continuous*; that is, they cannot rotate\
    \ all the way around but rather can rotate only over an angle range of about 180\
    \ degrees.\n\nThe position of the servomotor is set by the length of a pulse.\
    \ The servo expects to receive a pulse at least every 20 milliseconds. If that\
    \ pulse is high for 0.5 milliseconds, the servo angle will be -90 degrees; if\
    \ it's high for 1.5 milliseconds, the motor will be at its center position (0\
    \ degrees); and if the pulse is high for 2.5 milliseconds, the servo angle will\
    \ be 90 degrees (Figure 12-5).\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_342_0.png)\n\
    \nIf you have a few servomotors to connect, the MonkMakes Servo Six board (Figure\
    \ 12-6) makes the wiring easier.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_343_0.png)\n\
    \nFigure 12-6. Connecting servomotors with the Servo Six board\n\n## See Also\n\
    \nIf you have a lot of servos to control or require greater stability and precision,\
    \ you can use a dedicated servo controller module, as described in [Recipe 12.3](Recipe\
    \ 12.3).\n\nSee more information in the [full documentation of the Servo Six board](full\
    \ documentation of the Servo Six board).\n\nAdafruit has developed [another method\
    \ of servo control](another method of servo control).\n\nFor an alternative solution\
    \ that produces much more stable pulse timing using the ServoBlaster device driver\
    \ software, see [Recipe 12.2](Recipe 12.2).\n\n## 12.2 Controlling Servomotors\
    \ Precisely\n\n### Problem\n\nThe pulse generation function of the gpiozero library\
    \ is not precise or jitter-free enough for your servo application.\n\n### Solution\n\
    \nInstall the ServoBlaster device driver.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_344_0.png)\n\
    \n### ServoBlaster and Sound\n\nThe ServoBlaster software uses Raspberry Pi hardware\
    \ that is also involved in generating sound. Thus, you won't be able to play audio\
    \ through your Raspberry Pi's audio jack or HDMI while using ServoBlaster.\n\n\
    The ServoBlaster software created by Richard Hirst uses Raspberry Pi CPU hardware\
    \ to generate pulses with much more accurate timings than are possible using gpiozero.\
    \ Install ServoBlaster using the following commands and then reboot your Raspberry\
    \ Pi:\n\n```\n$ git clone https://github.com/srcshelton/servoblaster.git\n$ cd\
    \ servoblaster\n$ sudo make\n$ sudo make install\n```\n\nYou can modify the program\
    \ from Recipe 12.1 to use the ServoBlaster code. You can find the modified program\
    \ in the file ch_12_servo_blaster.py. As with all the program examples in this\
    \ book, you can download it (see Recipe 3.22). This program assumes that the servo\
    \ control pin is connected to GPIO 18:\n\n```\nimport os\nfrom guizero import\
    \ App, Slider\n\nservo_min = 500  # uS\nservo_max = 2500 # uS\nservo = 2     \
    \   # GPIO 18\n\ndef map(value, from_low, from_high, to_low, to_high):\n    from_range\
    \ = from_high - from_low\n    to_range = to_high - to_low\n    scale_factor =\
    \ float(from_range) / float(to_range)\n    return to_low + (value / scale_factor)\n\
    \ndef set_angle(angle):\n    pulse = int(map(angle+90, 0, 180, servo_min, servo_max))\n\
    \    command = \"echo {}={}us > /dev/servoblaster\".format(servo, pulse)\n   \
    \ os.system(command)\n\ndef slider_changed(angle):\n    set_angle(int(angle))\n\
    \napp = App(title='Servo Angle', width=500, height=150)\nslider = Slider(app,\
    \ start=-90, end=90, command=slider_changed, width='fill',\n               height=50)\n\
    slider.text_size = 30\napp.display()\n```\n\nThe user interface code is almost\
    \ the same as Recipe 12.1. The differences are in the set_angle function. This\
    \ function first uses a utility function called map that converts the angle into\
    \ a pulse duration using the constants servo_min and servo_max. Then it constructs\
    \ a command that will be run as if from the command line. The format of this line\
    \ starts with the echo command, followed by the servo number to be controlled,\
    \ an equal sign, and then a pulse duration in microseconds. This string part of\
    \ the command will be directed to the device /dev/servoblaster. The servo will\
    \ then adjust its angle.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_345_0.png)\n\
    \n### Killing ServoBlaster\n\nWhen ServoBlaster, or more specifically, the service\
    \ servo.d, is running, you will not be able to use the servo pins for anything,\
    \ and audio on the Raspberry Pi will not work. So when you need to use the pins\
    \ for something else, use the following commands to disable ServoBlaster and then\
    \ reboot your Pi:\n\n```\n$ sudo update-rc.d servoblaster disable\n$ sudo reboot\n\
    ```\n\nWhen your Raspberry Pi restarts, ServoBlaster will no longer have control\
    \ of your pins, and you'll be able to use sound again on your Pi. You can always\
    \ turn ServoBlaster back on again using:\n\n```\n$ sudo update-rc.d servoblaster\
    \ enable\n$ sudo reboot\n```\n\n### Discussion\n\nThe ServoBlaster driver is very\
    \ powerful, and you can configure it to allow you to use pretty much all the GPIO\
    \ pins to control servos. Its default setup defines eight GPIO pins to act as\
    \ servo control pins. These are each given a channel number, as shown in Table\
    \ 12-1.\n\nTable 12-1. Servo channel default pin allocation for ServoBlaster\n\
    \n| Servo channel | GPIO pin |\n| :--- | :--- |\n| 0 | 4 |\n| 1 | 17 |\n| 2 |\
    \ 18 |\n| 3 | 27 |\n| 4 | 22 |\n| 5 | 23 |\n| 6 | 24 |\n| 7 | 25 |\n\nConnecting\
    \ so many servos can result in jumper-lead spaghetti. A board like the MonkMakes\
    \ Servo Six (Figure 12-6) greatly simplifies the wiring of the servos to your\
    \ Raspberry Pi.\n\n### See Also\n\nMore information is available in the [full\
    \ documentation for ServoBlaster](https://github.com/richardghirst/PiBits/tree/master/ServoBlaster).\n\
    \nIf you don't need the precise timing of ServoBlaster, the gpiozero library can\
    \ also generate pulses for your servo, as described in Recipe 12.1.\n\n## 12.3\
    \ Controlling Multiple Servomotors Precisely\n\n### Problem\n\nYou need to control\
    \ lots of servos with high precision and without the loss of sound that comes\
    \ with using ServoBlaster.\n\n### Solution\n\nAlthough the ServoBlaster code (see\
    \ Recipe 12.2) allows you to control up to eight servos accurately, it does rather\
    \ take over your Raspberry Pi's hardware and disables sound generation.\n\nThe\
    \ alternative to ServoBlaster is to use a servomotor HAT like the one shown in\
    \ Figure 12-7 that has its own servo controlling hardware, relieving the Raspberry\
    \ Pi's hardware.\n\nThis Adafruit HAT allows you to control up to 16 servos or\
    \ PWM channels using the I2C interface of the Raspberry Pi. The servos just plug\
    \ straight into the HAT.\n\nPower is supplied to the logic circuits of the module\
    \ from the 3.3V connection of the Raspberry Pi. This is entirely separate from\
    \ the power supply for the servomotors, which comes from an external 5V power\
    \ adapter.\n\nYou can, if you prefer, power the servos from a battery pack rather\
    \ than a power supply. Using a four-cell AA battery holder with rechargeable batteries\
    \ provides around 4.8V and works well with most servos. Using four alkali AA cells\
    \ to provide 6V will be fine for many servos, but check the datasheet of your\
    \ servo to make sure it is OK with 6V.\n\nThe pin headers for connecting servos\
    \ are conveniently arranged so that the servo lead fits directly onto the pins.\
    \ Be careful to get them facing the correct way.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_347_0.png)\n\
    \nFigure 12-7. Adafruit servomotor HAT\n\nTo use the Adafruit software for this\
    \ module, you will need to set up I2C on the Raspberry Pi (Recipe 10.4).\n\nThe\
    \ software for this board uses some helpful software from Adafruit that allows\
    \ you to use an entire range of their accessory add-on boards.\n\nTo install the\
    \ Adafruit *blinka* code needed for this board, run the following commands:\n\n\
    ```\n$ pip3 install adafruit-blinka\n$ sudo pip3 install adafruit-circuitpython-servokit\n\
    ```\n\nOpen an editor and paste in the following code (the name of the file is\
    \ *ch_12_servo_adafruit.py*):\n\n```\nfrom adafruit_servokit import ServoKit\n\
    from guizero import App, Slider\n\nservo_kit = ServoKit(channels=16)\n\ndef slider_changed(angle):\n\
    \    servo_kit.servo[0].angle = int(angle) + 90\n\napp = App(title='Servo Angle',\
    \ width=500, height=150)\nslider = Slider(app, start=-90, end=90, command=slider_changed,\
    \ width='fill',\n               height=50)\nslider.text_size = 30\napp.display()\n\
    ```"
  mdcn: "定义伺服电机时，第一个参数（本例中为18）指定了伺服电机的控制引脚。可选参数 `min_pulse_width` 和 `max_pulse_width`\
    \ 以秒为单位设置最小和最大脉冲长度。对于典型的伺服电机，这些值应为0.5毫秒和2.5毫秒。由于某种原因，gpiozero中的默认值是1毫秒和2毫秒；因此，除非像我们这里这样设置这些值，否则伺服电机的活动范围会非常受限。\n\
    \n## 讨论\n\n伺服电机用于遥控车辆和机器人。大多数伺服电机不是*连续*的；也就是说，它们不能360度旋转，而只能在大约180度的角度范围内旋转。\n\
    \n伺服电机的位置由脉冲长度设定。伺服电机期望至少每20毫秒接收一次脉冲。如果脉冲高电平持续0.5毫秒，伺服角度将为-90度；如果高电平持续1.5毫秒，电机将处于其中心位置（0度）；如果脉冲高电平持续2.5毫秒，伺服角度将为90度（图12-5）。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_342_0.png)\n\n如果你需要连接几个伺服电机，MonkMakes\
    \ Servo Six板（图12-6）会使接线变得更容易。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_343_0.png)\n\
    \n图12-6. 使用Servo Six板连接伺服电机\n\n## 另请参阅\n\n如果你需要控制大量伺服电机或需要更高的稳定性和精度，可以使用专用的伺服控制器模块，如[配方12.3](Recipe\
    \ 12.3)中所述。\n\n更多信息请参阅[Servo Six板的完整文档](full documentation of the Servo Six board)。\n\
    \nAdafruit开发了[另一种伺服控制方法](another method of servo control)。\n\n如需使用ServoBlaster设备驱动程序软件产生更稳定脉冲时序的替代方案，请参阅[配方12.2](Recipe\
    \ 12.2)。\n\n## 12.2 精确控制伺服电机\n\n### 问题\n\ngpiozero库的脉冲生成功能对于你的伺服应用来说不够精确或存在抖动。\n\
    \n### 解决方案\n\n安装ServoBlaster设备驱动程序。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_344_0.png)\n\
    \n### ServoBlaster与声音\n\nServoBlaster软件使用了树莓派上也用于生成声音的硬件。因此，在使用ServoBlaster时，你将无法通过树莓派的音频插孔或HDMI播放音频。\n\
    \nRichard Hirst创建的ServoBlaster软件使用树莓派CPU硬件来生成脉冲，其时序精度远高于gpiozero所能达到的水平。使用以下命令安装ServoBlaster，然后重启你的树莓派：\n\
    \n```\n$ git clone https://github.com/srcshelton/servoblaster.git\n$ cd servoblaster\n\
    $ sudo make\n$ sudo make install\n```\n\n你可以修改配方12.1中的程序以使用ServoBlaster代码。修改后的程序可以在文件ch_12_servo_blaster.py中找到。与本书中所有程序示例一样，你可以下载它（参见配方3.22）。此程序假设伺服控制引脚连接到GPIO\
    \ 18：\n\n```\nimport os\nfrom guizero import App, Slider\n\nservo_min = 500  #\
    \ uS\nservo_max = 2500 # uS\nservo = 2        # GPIO 18\n\ndef map(value, from_low,\
    \ from_high, to_low, to_high):\n    from_range = from_high - from_low\n    to_range\
    \ = to_high - to_low\n    scale_factor = float(from_range) / float(to_range)\n\
    \    return to_low + (value / scale_factor)\n\ndef set_angle(angle):\n    pulse\
    \ = int(map(angle+90, 0, 180, servo_min, servo_max))\n    command = \"echo {}={}us\
    \ > /dev/servoblaster\".format(servo, pulse)\n    os.system(command)\n\ndef slider_changed(angle):\n\
    \    set_angle(int(angle))\n\napp = App(title='Servo Angle', width=500, height=150)\n\
    slider = Slider(app, start=-90, end=90, command=slider_changed, width='fill',\n\
    \               height=50)\nslider.text_size = 30\napp.display()\n```\n\n用户界面代码与配方12.1几乎相同。区别在于\
    \ `set_angle` 函数。此函数首先使用一个名为 `map` 的实用函数，该函数使用常量 `servo_min` 和 `servo_max` 将角度转换为脉冲持续时间。然后，它构造一个命令，该命令将像从命令行运行一样执行。此行的格式以\
    \ `echo` 命令开头，后跟要控制的伺服编号、一个等号，然后是以微秒为单位的脉冲持续时间。此命令的字符串部分将被定向到设备 `/dev/servoblaster`。然后伺服将调整其角度。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_345_0.png)\n\n### 终止ServoBlaster\n\n\
    当ServoBlaster，或者更具体地说，服务 `servo.d` 运行时，你将无法将伺服引脚用于其他任何用途，并且树莓派上的音频将无法工作。因此，当你需要将引脚用于其他用途时，请使用以下命令禁用ServoBlaster，然后重启你的树莓派：\n\
    \n```\n$ sudo update-rc.d servoblaster disable\n$ sudo reboot\n```\n\n当你的树莓派重启时，ServoBlaster将不再控制你的引脚，你将能够再次在树莓派上使用声音。你可以随时使用以下命令重新启用ServoBlaster：\n\
    \n```\n$ sudo update-rc.d servoblaster enable\n$ sudo reboot\n```\n\n### 讨论\n\n\
    ServoBlaster驱动程序功能非常强大，你可以配置它以允许你使用几乎所有GPIO引脚来控制伺服电机。其默认设置定义了八个GPIO引脚作为伺服控制引脚。每个引脚都被分配了一个通道号，如表12-1所示。\n\
    \n表12-1. ServoBlaster的伺服通道默认引脚分配\n\n| 伺服通道 | GPIO引脚 |\n| :--- | :--- |\n| 0 |\
    \ 4 |\n| 1 | 17 |\n| 2 | 18 |\n| 3 | 27 |\n| 4 | 22 |\n| 5 | 23 |\n| 6 | 24 |\n\
    | 7 | 25 |\n\n连接如此多的伺服电机会导致跳线像意大利面一样杂乱。像MonkMakes Servo Six（图12-6）这样的板子极大地简化了将伺服电机连接到树莓派的布线工作。\n\
    \n### 另请参阅\n\n更多信息请参阅[ServoBlaster的完整文档](https://github.com/richardghirst/PiBits/tree/master/ServoBlaster)。\n\
    \n如果你不需要ServoBlaster的精确时序，gpiozero库也可以为你的伺服电机生成脉冲，如配方12.1中所述。\n\n## 12.3 精确控制多个伺服电机\n\
    \n### 问题\n\n你需要高精度地控制大量伺服电机，并且不希望因使用ServoBlaster而导致声音丢失。\n\n### 解决方案\n\n尽管ServoBlaster代码（参见配方12.2）允许你精确控制多达八个伺服电机，但它确实接管了树莓派的硬件并禁用了声音生成。\n\
    \nServoBlaster的替代方案是使用伺服电机HAT，如图12-7所示，它拥有自己的伺服控制硬件，从而减轻了树莓派硬件的负担。\n\n这款Adafruit\
    \ HAT允许你使用树莓派的I2C接口控制多达16个伺服电机或PWM通道。伺服电机只需直接插入HAT即可。\n\n模块的逻辑电路由树莓派的3.3V连接供电。这与伺服电机的电源完全分开，后者来自外部5V电源适配器。\n\
    \n如果你愿意，也可以使用电池组而不是电源为伺服电机供电。使用带有可充电电池的四节AA电池盒可提供约4.8V电压，与大多数伺服电机配合良好。使用四节碱性AA电池提供6V电压对许多伺服电机来说也可以，但请检查你的伺服电机数据手册以确保其适用于6V。\n\
    \n连接伺服电机的排针布置得非常方便，使得伺服线可以直接插在引脚上。请注意确保它们朝向正确的方向。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_347_0.png)\n\
    \n图12-7. Adafruit伺服电机HAT\n\n要使用此模块的Adafruit软件，你需要在树莓派上设置I2C（配方10.4）。\n\n此板的软件使用了Adafruit提供的一些有用的软件，这些软件允许你使用他们整个系列的配件扩展板。\n\
    \n要安装此板所需的Adafruit *blinka* 代码，请运行以下命令：\n\n```\n$ pip3 install adafruit-blinka\n\
    $ sudo pip3 install adafruit-circuitpython-servokit\n```\n\n打开一个编辑器并粘贴以下代码（文件名为\
    \ *ch_12_servo_adafruit.py*）：\n\n```\nfrom adafruit_servokit import ServoKit\n\
    from guizero import App, Slider\n\nservo_kit = ServoKit(channels=16)\n\ndef slider_changed(angle):\n\
    \    servo_kit.servo[0].angle = int(angle) + 90\n\napp = App(title='Servo Angle',\
    \ width=500, height=150)\nslider = Slider(app, start=-90, end=90, command=slider_changed,\
    \ width='fill',\n               height=50)\nslider.text_size = 30\napp.display()\n\
    ```"
