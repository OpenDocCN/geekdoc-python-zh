    # Solution


    Use an L293D H-bridge driver chip. An H-bridge is required to drive a bipolar
    stepper motor because, as the word *bipolar* suggests, the direction of current
    across the windings needs to be reversed, rather like driving a DC motor in both
    directions (see Recipe 12.5).


    To make this recipe, you’ll need the following:


    +   - 12V, four-pin bipolar stepper motor (see “Miscellaneous” on page 567)

    - L293D H-bridge IC (see “Integrated Circuits” on page 565)

    - Breadboard and jumper wires (see “Prototyping Equipment and Kits” on page 564)


    The motor used here, a 12V one, is somewhat larger than the unipolar stepper motor
    example in Recipe 12.6. The power for the motor itself is therefore supplied from
    an external power supply rather than from the Raspberry Pi. See the wiring diagram
    in Figure 12-14.


