    # Discussion


    Laser cutters often come with their own proprietary software to control the cutter
    that is generally run on a Microsoft Windows computer. It may even have a hardware
    USB dongle designed to tie that piece of software to your computer.


    The K40 Whisperer software cuts and engraves directly from SVG drawings. You just
    draw outlines in different colors with a line width of 0.1mm. Red lines mean cut,
    blue lines mean vector engrave (lightly burn an outline), and black lines mean
    raster engrave (scan back and forth to burn out an area of the surface).


    # See Also


    For full information on K40 Whisperer, see [https://oreil.ly/5RJth](https://oreil.ly/5RJth).


    To create the SVG drawings for your laser cutting and etching, you can use InkScape
    ([Recipe 4.7](Recipe 4.7)).


    A Raspberry Pi also makes a great controller for a 3D printer using [OctoPrint](OctoPrint).'
