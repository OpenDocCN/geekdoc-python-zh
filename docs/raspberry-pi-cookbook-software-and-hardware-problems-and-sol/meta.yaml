    | Model | RAM | Processor (cores * clock) | USB sockets | Ethernet port | Notes
    |

    |---|---|---|---|---|---|

    | 400 | 4 GB | 4 * 1.8 GHz | 4 (2 x USB3) | yes | Built into a keyboard |

    | 4 B | 1/2/4/8 GB | 4 * 1.5 GHz | 4 (2 x USB3) | yes | 2 x micro-HDMI video |

    | Compute 4 | 1/2/4/8 GB | 4 * 1.5 GHz | no | no | For embedding in products (see
    sidebar) |

    | 3 A+ | 512 MB | 4 * 1.4 GHz | 1 | no | WiFi and Bluetooth |

    | 3 B+ | 1 GB | 4 * 1.4 GHz | 4 | yes | WiFi and Bluetooth |

    | 3 B | 1 GB | 4 * 1.2 GHz | 4 | yes | WiFi and Bluetooth |

    | Zero 2 W | 512 MB | 4 * 1 GHz | 1 (micro) | no | WiFi and Bluetooth |

    | Zero W | 512 MB | 1 * 1 GHz | 1 (micro) | no | WiFi and Bluetooth |

    | Zero | 512 MB | 1 * 1 GHz | 1 (micro) | no | Low cost |

    | 2 B | 1 GB | 4 * 900 MHz | 4 | yes | |

    | A+ | 256 MB | 1 * 700 MHz | 1 | no | |

    | B+ | 512 MB | 1 * 700 MHz | 4 | yes | Discontinued |

    | A | 256 MB | 1 * 700 MHz | 1 | no | Discontinued |

    | B rev2 | 512 MB | 1 * 700 MHz | 2 | yes | Discontinued |

    | B rev1 | 256 MB | 1 * 700 MHz | 2 | yes | Discontinued |


    If you have one of the older or discontinued Raspberry Pi models, it is still
    useful. Those models do not have quite the performance of the latest Raspberry
    Pi 4, but for many situations, that does not matter.


    If you are buying a new Raspberry Pi, I consider the best choice for use as a
    general-purpose computer to be the Raspberry Pi 4 or 400. If you don''t need WiFi
    or want a smaller device, also consider the 3 B, 2 B, or Zero W.


    > ## The Raspberry Pi Compute 4


    The Raspberry Pi is such a useful device that it has found its way into many commercial
    products. Sometimes this is a little wasteful, as the product may not have need
    of all the connectors and other features of, say, a Raspberry Pi 4.


    The Raspberry Pi Compute 4 (and its predecessors) provides a neat module (Figure
    1-4) that has connectors on the underside designed to mate to a carrier board,
    as a really easy way for a product to incorporate a Linux computer. Because the
    module and its associated WiFi and Bluetooth are already certified as CE and FCC
    compliant, making your product comply with relevant standards is a lot easier.'
  - '[PAGE 27]


    ![](img/e36e77524aeaae366529d1cf02f9a39c_27_0.png)


    Figure 1-4. The Raspberry Pi Compute Module 4


    # See Also


    For more information on the Raspberry Pi models, see [https://oreil.ly/oY-A_](https://oreil.ly/oY-A_).


    Take a look at the [Raspberry Pi Compute Modules](https://oreil.ly/oY-A_).


    The low cost of the Pi Zero and Pi Zero W models makes them ideal for embedding
    in electronics projects without worrying about the expense. See [Recipe 10.18](https://oreil.ly/oY-A_).


    # 1.2 Connecting the System


    # Problem


    You have everything that you need for your Raspberry Pi, and you want to connect
    it all.


    # Solution


    Unless you are embedding your Raspberry Pi in a project or using it as a media
    center, you need to attach a keyboard (unless you are using a Pi 400), a mouse,
    and a monitor.


    [Figure 1-5](https://oreil.ly/oY-A_) shows a typical Raspberry Pi system. If you
    have a Raspberry Pi 4, you could (if you really wanted) connect a second monitor.
    However, if you have just one monitor, connect it to the micro-HDMI connector
    closest to the USB-C power connector.'
- md: '## 1.3 Enclosing a Raspberry Pi


    ### Problem


    You need an enclosure for your Raspberry Pi.


    ### Solution


    Apart from the Raspberry Pi 400, Raspberry Pis do not come with an enclosure unless
    you buy one as part of a kit. This makes it a little vulnerable, given that bare
    connections are on the underside of the circuit board that could easily be short-circuited
    if the Raspberry Pi is placed on something metal.


    It is a good idea to buy some protection for your Raspberry Pi in the form of
    a case. If you intend to use the Raspberry Pi’s general-purpose input/output (GPIO)
    pins (the pins that allow you to connect to external electronics), the Pibow Coupé
    shown in Figure 1-7 is a beautiful and practical design that is available for
    both the Raspberry Pi 4 and earlier versions.


    ### Discussion


    A vast array of case styles are available to choose from, including the following:


    - Simple, two-part, click-together plastic boxes

    - VESA mountable boxes (for attaching to the back of a monitor or TV)

    - LEGO-compatible boxes

    - 3D-printed box designs

    - Laser-cut acrylic designs

    - Designs that act as a large heat sink for cooling

    - Designs with a built-in fan

    - DIN-rail designs for labs and workshops


    The case you buy is very much a matter of personal taste. However, consider the
    following:


    - Do you need to have access to the GPIO connector? This is important if you plan
    to attach external electronics to your Raspberry Pi.

    - Is the case well ventilated? This is important if you plan to overclock your
    Raspberry Pi (Recipe 1.13) or run it hard playing videos or games, because these
    will all generate more heat.

    - Finally, make sure you get one that fits your model of Raspberry Pi.


    If you have access to a 3D printer, you can also print your own case. Search for
    Raspberry Pi on Thingiverse or MyMiniFactory, and you’ll find lots of designs.


    You will also find kits that have tiny self-adhesive heat sinks to attach to the
    chips on the Raspberry Pi. These can be of some use if you are demanding a lot
    of your Raspberry Pi, say, by playing a lot of videos, but generally they are
    the equivalent of “go-faster” stripes on a car.


    If you have a Raspberry Pi 4, you can reduce the temperature by fitting a small
    fan such as the Pimoroni Fan SHIM, as shown in Figure 1-8.


    Figure 1-8. The Pimoroni Fan SHIM


    ### See Also


    You will also find many styles of cases at other Raspberry Pi suppliers and on
    eBay.


    ## 1.4 Selecting a Power Supply


    ### Problem


    You need to select a power supply for your Raspberry Pi.


    ### Solution


    The basic electrical specification for a power supply suitable for a Raspberry
    Pi is that it provides a regulated 5V DC (direct current).


    The amount of current that the power supply must be capable of providing depends
    both on the model of Raspberry Pi and on the peripherals attached to it. It is
    worth getting a power supply that can easily cope with the Raspberry Pi, and you
    should consider 1A to be a minimum for any model of Raspberry Pi.


    If you buy your power supply from the same place that you buy the Raspberry Pi,
    the seller should be able to tell you whether it will work with the Raspberry
    Pi.


    The Raspberry Pi 4 should be used with a 3A power supply. This is in part because
    its greater processing power than earlier models requires more electrical power,
    but also because its two USB3 ports are able to supply up to 1.2A to high-power
    USB peripherals such as external USB drives.


    If you are going to be using WiFi or USB peripherals that require significant
    amounts of power with pre-Raspberry Pi 4 models, you should get a power supply
    capable of 1.5A or even 2A. Also beware of very low-cost power supplies that might
    not provide an accurate or reliable 5V.


    ### Discussion


    The Raspberry Pi 4 is the first Raspberry Pi to use the more modern USB-C connector.
    Unlike the micro-USB connector used on earlier boards, this connector is reversible
    (Figure 1-9).


    Figure 1-9. Power and video connections for the Raspberry Pi 3 (top) and 4 (bottom)


    In Figure 1-9, you can see the USB-C power connector of a Raspberry Pi 4 below
    the micro-USB connector of a Raspberry Pi 3. As an aside, you can also see the
    pair of micro-HDMI video ports that replace the single full-size HDMI connector.


    Whether your Raspberry Pi uses a USB-C connector or a micro-USB connector, the
    power supply and connectors are actually the same as those found in many smart-phone
    chargers. If they terminate in a micro-USB plug, they are almost certainly 5V
    (but check). The only question, then, is whether they can supply enough current.


    If they can’t, a few bad things can happen:


    - They might become hot and be a potential fire risk.

    - They might simply fail.

    - At times of high load (say, when the Pi is using WiFi or playing video), the
    voltage might dip and the Raspberry Pi might reset itself.


    If you are using a Raspberry Pi 3 or earlier, look for a power supply that says
    it can supply 1A or more. If it specifies a number of watts (W) rather than amps
    (A), divide the number of watts by 5 to get the number of amps. So a 5V 10W power
    supply can supply 2A (2,000mA).


    Using a power supply with, say, a maximum current of 2A will not use any more
    electricity than a 700mA power supply. The Raspberry Pi takes only as much current
    as it needs.


    In Figure 1-10, I measure the current taken by a Raspberry Pi model B and compare
    it with a Raspberry Pi 2 model B and a Raspberry Pi 4.


    The newer Raspberry Pis (starting with the A+ and all the way through to the Pi
    4) are far more power-efficient than the original Raspberry Pi 1 models, but when
    the processor is fully occupied and has a lot of peripherals attached, they can
    still reach similar current requirements, and, in the case of the Raspberry Pi
    4, quite a lot more.


    As you can see in Figure 1-10, if your Raspberry Pi is going to be on all the
    time, a Raspberry Pi 2 will run cooler and use a lot less power than the newest
    Raspberry Pi 4.


    In Figure 1-10, you can see that the current rarely exceeds 700mA. However, the
    processor isn''t really doing very much here. Were you to start playing HD video,
    the current would increase considerably. When it comes to power supplies, it''s
    always better to have something in reserve.


    ### See Also


    You can buy an uninterruptible power supply (UPS) for the Raspberry Pi. This ensures
    that the Pi can keep running for 10–30 minutes in the event of a power failure.


    The Raspberry Pi has no on/off switch, but you can buy a module that will turn
    off the power when the Raspberry Pi shuts down.


    ## 1.5 Selecting an Operating System


    ### Problem


    There are several Raspberry Pi operating systems, and you are not sure which one
    to use.


    ### Solution


    The answer to this question depends on what you intend to do with your Raspberry
    Pi.


    For general use as a computer or for using in electronic projects, you should
    use Raspberry Pi OS, the standard and official distribution for the Raspberry
    Pi.


    If you plan to use your Raspberry Pi as a media center, a number of distributions
    (versions of Linux) are available specifically for that purpose (see Recipe 4.1).


    In this book, we use Raspberry Pi OS almost exclusively, although most of the
    recipes will work with any Debian-based Linux distribution.


    ### Discussion


    If you are interested in trying out some different distributions, you can purchase
    some microSD cards, which are not expensive, and copy the various distributions
    onto them. If you do this, it is a good idea to keep your files that you don''t
    want to lose on a USB flash drive plugged into your Raspberry Pi.


    Note that if you are using one of the upcoming recipes to write your own SD card,
    you need to have a computer that has an SD card slot (and an SD-to-microSD adapter),
    or you can buy an inexpensive USB SD card reader.


    ### See Also


    Check out the [official list of Raspberry Pi distributions](https://www.raspberrypi.com/software/operating-systems/).


    ## 1.6 Installing an Operating System Using Raspberry Pi Imager


    ### Problem


    You want to put the operating system for your Raspberry Pi directly onto a microSD
    card ready for use by your Pi.'
  mdcn: '## 1.3 为树莓派配备外壳


    ### 问题


    你需要为你的树莓派准备一个外壳。


    ### 解决方案


    除了树莓派400，树莓派本身并不附带外壳，除非你购买的是套件。这使得它有些脆弱，因为裸露的连接点位于电路板的底面，如果将树莓派放置在金属物体上，很容易造成短路。


    为你的树莓派购买一个外壳作为保护是个好主意。如果你打算使用树莓派的通用输入/输出（GPIO）引脚（允许你连接外部电子设备的引脚），图1-7所示的Pibow
    Coupé是一个美观且实用的设计，适用于树莓派4和早期版本。


    ### 讨论


    有大量外壳样式可供选择，包括以下几种：


    - 简单的两件式卡扣塑料盒

    - 可VESA安装的盒子（用于安装在显示器或电视背面）

    - 兼容乐高的盒子

    - 3D打印的盒子设计

    - 激光切割的亚克力设计

    - 充当大型散热器用于冷却的设计

    - 内置风扇的设计

    - 用于实验室和车间的DIN导轨设计


    你购买的外壳很大程度上取决于个人品味。但是，请考虑以下几点：


    - 你是否需要访问GPIO连接器？如果你计划将外部电子设备连接到树莓派，这一点很重要。

    - 外壳通风是否良好？如果你计划超频你的树莓派（配方1.13）或高强度运行以播放视频或游戏，这一点很重要，因为这些都会产生更多热量。

    - 最后，确保你购买的外壳适合你的树莓派型号。


    如果你有3D打印机，你也可以打印自己的外壳。在Thingiverse或MyMiniFactory上搜索Raspberry Pi，你会发现很多设计。


    你还会发现一些套件，其中包含可以粘贴在树莓派芯片上的小型自粘散热片。如果你对树莓派要求很高，例如播放大量视频，这些散热片可能会有些用处，但通常它们相当于汽车上的“加速”条纹。


    如果你有树莓派4，你可以通过安装一个小风扇（如图1-8所示的Pimoroni Fan SHIM）来降低温度。


    图1-8. Pimoroni Fan SHIM


    ### 另请参阅


    你还可以在其他树莓派供应商和eBay上找到许多样式的外壳。


    ## 1.4 选择电源


    ### 问题


    你需要为你的树莓派选择一个电源。


    ### 解决方案


    适用于树莓派的电源的基本电气规格是提供稳定的5V直流电（DC）。


    电源必须能够提供的电流大小取决于树莓派的型号以及连接到它的外围设备。值得购买一个能够轻松应对树莓派的电源，你应该考虑任何型号的树莓派至少需要1A。


    如果你从购买树莓派的同一家店购买电源，卖家应该能告诉你它是否适用于树莓派。


    树莓派4应该使用3A电源。这部分是因为它比早期型号具有更强的处理能力，需要更多电力，但也因为它的两个USB3端口能够向高功率USB外围设备（如外部USB驱动器）提供高达1.2A的电流。


    如果你打算在树莓派4之前的型号上使用WiFi或需要大量电力的USB外围设备，你应该购买能够提供1.5A甚至2A的电源。同时要警惕非常廉价的电源，它们可能无法提供准确或可靠的5V。


    ### 讨论


    树莓派4是第一个使用更现代的USB-C连接器的树莓派。与早期主板上使用的micro-USB连接器不同，这种连接器是可逆的（图1-9）。


    图1-9. 树莓派3（上）和4（下）的电源和视频连接


    在图1-9中，你可以看到树莓派4的USB-C电源连接器位于树莓派3的micro-USB连接器下方。顺便说一下，你还可以看到一对micro-HDMI视频端口，它们取代了单个全尺寸HDMI连接器。


    无论你的树莓派使用USB-C连接器还是micro-USB连接器，电源和连接器实际上与许多智能手机充电器中使用的相同。如果它们以micro-USB插头结束，它们几乎肯定是5V（但请检查）。那么，唯一的问题是它们是否能提供足够的电流。


    如果它们不能，可能会发生一些不好的事情：


    - 它们可能会变热并带来潜在的火灾风险。

    - 它们可能会直接失效。

    - 在高负载时（例如，当树莓派使用WiFi或播放视频时），电压可能会下降，树莓派可能会自行重置。


    如果你使用的是树莓派3或更早的型号，请寻找标称可以提供1A或更多电流的电源。如果它指定的是瓦特数（W）而不是安培数（A），将瓦特数除以5即可得到安培数。因此，一个5V
    10W的电源可以提供2A（2,000mA）。


    使用一个最大电流为2A的电源并不会比使用一个700mA的电源消耗更多电力。树莓派只取用它所需的电流。


    在图1-10中，我测量了树莓派型号B的耗电量，并将其与树莓派2型号B和树莓派4进行了比较。


    较新的树莓派（从A+开始一直到Pi 4）比最初的树莓派1型号节能得多，但当处理器完全占用并连接了大量外围设备时，它们仍然可以达到相似的电流需求，而且在树莓派4的情况下，电流需求要大得多。


    正如你在图1-10中看到的，如果你的树莓派将一直运行，树莓派2将比最新的树莓派4运行温度更低，功耗也低得多。


    在图1-10中，你可以看到电流很少超过700mA。然而，处理器在这里并没有真正做太多事情。如果你开始播放高清视频，电流会显著增加。在电源方面，留有余量总是更好的。


    ### 参考


    你可以为树莓派购买不间断电源（UPS）。这确保了在断电情况下，树莓派可以继续运行10-30分钟。


    树莓派没有开/关开关，但你可以购买一个模块，当树莓派关闭时，该模块会切断电源。


    ## 1.5 选择操作系统


    ### 问题


    有几种树莓派操作系统，你不确定该使用哪一种。


    ### 解决方案


    这个问题的答案取决于你打算用树莓派做什么。


    如果作为通用计算机使用或用于电子项目，你应该使用Raspberry Pi OS，这是树莓派的标准官方发行版。


    如果你计划将树莓派用作媒体中心，有许多专门为该目的设计的发行版（Linux版本）可供选择（参见配方4.1）。


    在本书中，我们几乎只使用Raspberry Pi OS，尽管大多数配方适用于任何基于Debian的Linux发行版。


    ### 讨论


    如果你有兴趣尝试一些不同的发行版，你可以购买一些microSD卡（它们并不贵），并将各种发行版复制到它们上面。如果你这样做，最好将不想丢失的文件保存在插入树莓派的USB闪存驱动器上。


    请注意，如果你使用接下来的某个配方来写入自己的SD卡，你需要一台带有SD卡插槽（以及SD到microSD适配器）的计算机，或者你可以购买一个便宜的USB SD卡读卡器。


    ### 参考


    查看[官方树莓派发行版列表](https://www.raspberrypi.com/software/operating-systems/)。


    ## 1.6 使用Raspberry Pi Imager安装操作系统


    ### 问题


    你想将树莓派的操作系统直接放到microSD卡上，以便你的树莓派使用。'
