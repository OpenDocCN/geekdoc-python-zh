    # CHAPTER 9

    Machine Learning


    # 9.0 Introduction


    You may be surprised to hear that your humble Raspberry Pi is a great platform
    for experimenting with machine learning. In this chapter you will experiment with
    recognizing objects in real-time video, recognizing sounds, and linking all this
    to your own Python programs.


    Programming a computer involves giving the computer a list of instructions to
    follow. A procedure is created to accomplish the thing we want the computer to
    do. This is expressed in a programming language such as Python and works really
    well for things like storing data or making calculations. However, it''s quite
    hard to think of how you would write a program to respond to a spoken command,
    or to identify objects in a photograph. The way humans and other animals learn
    such things is through practice. Our brains gradually learn to recognize things
    through experience. No program is running in our heads to do these things; we
    learn to do them.


    Machine learning (ML) involves a normal computer running special machine learning
    programs (that bit is normal programming) that process large amounts of data and
    learn from that data in much the same way as a brain does. We can, for example,
    train the computer to recognize spoken commands by providing it with lots of samples
    of the commands, along with other examples and background noise that we want the
    computer to learn to ignore.


    Most ML is concerned with *classification*. That is, taking some input and putting
    it into a category. For example, this could be taking data about a sound sample
    and assigning probabilities as to which of a set of predefined words or phrases
    that sample contains. Or, it might be classifying objects in an image to decide
    which animal a picture represents or whether that animal is present in a video
    stream containing lots of things.'
  - '[PAGE 261]


    There are various mechanisms for this learning, some of which rely on conventional
    statistics and others that use neural network simulations. The neural network
    approach uses a conventional program to simulate a network of neurons like those
    in a brain. Each neuron has an output that “fires” when the weighted values of
    all its input exceed some threshold. These weights are adjusted during the training
    process, improving the accuracy of the neural network, until the neural network
    is operating acceptably well. Training is actually often a lot harder than this,
    and it often requires changes to the configuration of the neural network rather
    than just changes to weights. However, good software can help to automate much
    of this process.


    In this chapter we will start using pretrained models that have been made from
    huge sets of data by machine learning experts and are available for us to use
    for free, courtesy of TensorFlow. We will look at how we can use these models
    to classify objects in video and sounds in real time, and also how we can hook
    our own Python code into this process. These standard, pretrained models do require
    us to do some conditioning of our video source.


    We will then take a look at the Edge Impulse platform to illustrate creating and
    training our own machine learning model. Edge Impulse greatly simplifies the process
    of using machine learning by providing a cloud service that does all the work
    that needs high-performance computing—the data preparation and training. Doing
    all the heavy lifting in the cloud allows you to download the trained model onto
    a much lower-power device like the Raspberry Pi.


    TensorFlow and Edge Impulse require the use of a Raspberry Pi 4 or 400. In addition,
    you will need a webcam (or Raspberry Pi Camera Module) connected to your Raspberry
    Pi and a microphone. The microphone on a USB webcam will work just fine (just
    plug it in), or you can use a USB microphone as described in Recipe 16.6 for the
    sound projects.


    Machine learning is a huge topic about which many books have been written, so
    by necessity this chapter is intended only to get you started with some ML projects.


    # 9.1 Identifying Objects in Video with TensorFlow Lite


    # Problem


    You want your Raspberry Pi to dynamically identify objects from video.


    # Solution


    Follow Recipe 8.1 to install OpenCV, which will be needed for most of the recipes
    in this chapter.'
