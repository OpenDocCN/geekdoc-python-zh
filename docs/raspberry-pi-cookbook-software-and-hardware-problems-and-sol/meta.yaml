  - '[PAGE 270]


    ```

    $ npm config set user root && sudo npm install edge-impulse-linux -g --unsafe-perm

    ```


    Because copying such long commands is error prone and tedious, these commands
    are also in the file *long_commands.txt* in the code for the book (Recipe 3.22).


    We are also going to need the Python interface for Edge Impulse. Edge Impulse
    relies on a Python library called NumPy. This needs to be updated to its latest
    version:


    ```

    $ pip3 install numpy --upgrade

    ```


    # Discussion


    Edge Impulse is based on the TensorFlow machine learning library that we used
    in our earlier recipes. However, it adds a slick and helpful web-based user interface
    and cloud-based servers to make it a lot easier to get started with training our
    own ML models.


    Although Edge Impulse is now installed onto your Raspberry Pi, we need an example
    to run. We''ll explore this in Recipe 9.6.


    # See Also


    The [Edge Impulse website](https://www.edgeimpulse.com/) has a wealth of material.


    Learn about [TensorFlow](https://www.tensorflow.org/), on which Edge Impulse is
    based.


    # 9.6 Recognizing a Spoken Command (in the Cloud)


    # Problem


    You want your Raspberry Pi to be able to recognize a spoken command using a cloud
    service.


    # Solution


    After registering on the Edge Impulse website and installing the software on your
    Raspberry Pi, use the *wizard* to train a neural network. You can then test how
    well the trained model works in your browser, before running it locally on your
    Raspberry Pi.


    Go to [https://studio.edgeimpulse.com](https://studio.edgeimpulse.com) and log
    in using the account you created in Recipe 9.5.


    You now need to create a new project and give it a name. If you have just registered
    with Edge Impulse, the website will probably take you to the New Project Wizard.
    Cancel this wizard if it has started, and instead click on the “+ Create new project”
    button. This will open a dialog (Figure 9-3) where you should enter a name for
    your project; use the name “hey pi.”'
  - '[PAGE 271]


    ![](img/e36e77524aeaae366529d1cf02f9a39c_271_0.png)


    Figure 9-3. Creating a new Edge Impulse project


    Select the Developer option. This is the free option and imposes a few constraints
    on the use of Edge Impulse, which we will not be likely to exceed.


    Clicking on the “Create new project” button takes us to a dialog for choosing
    what type of data we are going to be dealing with. However, we’re going to use
    the getting started wizard, so close this popup; you’ll return to the project
    page for the “hey pizza” project. Scroll to the bottom of the page and select
    the option “Launch getting started wizard.” This will warn you that your project
    will be cleared out, but that’s fine, so select Yes and then confirm the action.
    The Welcome wizard will launch and offer to make your model in five minutes. Click
    on the button to accept this option and, for your phrase to be recognized, use
    “hey pi” (Figure 9-4) and then click Next.'
  - '[PAGE 272]


    ![](img/e36e77524aeaae366529d1cf02f9a39c_272_0.png)


    Figure 9-4. Selecting a phrase to recognize


    Now comes the fun part. For our Raspberry Pi to recognize the phrase “hey pi,”
    we need to give it lots of examples of us saying that. The wizard will now ask
    us to record ourselves saying “hey pi” repeatedly for an oddly specific 38 seconds
    (Figure 9-5). You’ll also be asked for access to your microphone, which you should
    grant.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_272_1.png)


    Figure 9-5. Collecting sound data'
  - '[PAGE 273]


    If Edge Impulse needs more data, it may ask you to say the phrase some more. Eventually,
    it will have enough samples, and you can move onto the next step of adding other
    data.


    This other data takes the form of random words and background noise from Edge
    Impulse’s collections of such data and will help the neural network to distinguish
    “hey pi” from any other sounds that the microphone may be picking up.


    The next step of the wizard is to “Design your Impulse.” An *impulse* is Edge
    Impulse’s way of describing the neural network (or other type of ML model) as
    well as the associated preprocessing of data. In designing the impulse, we also
    get the opportunity to look inside the model and gain some reassurance about how
    this is all working.


    If you want to take a look at what’s going on behind the wizard, you can just
    close the wizard overlay and then continue with it later. For example, Figure
    9-6 shows what’s called a *feature explorer view* of the sound samples, where
    samples of “hey pi,” noise, and other random phrases are all plotted in a 3D space.
    The instances of “hey pi” are all clustered together, indicating a good recognition
    by the impulse.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_273_0.png)


    Figure 9-6. Exploring features'
  - '[PAGE 274]


