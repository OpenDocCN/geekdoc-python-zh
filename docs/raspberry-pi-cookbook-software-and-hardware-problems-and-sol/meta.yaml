    When you run the program, you should see some output like this:


    ```

    $ python3 ch_14_resistance_meter.py

    5588.419502667787

    5670.842306126099

    8581.313103654076

    10167.614271851775

    8724.539614581638

    4179.124682880563

    267.41950235897957

    ```


    The reading will vary as you rotate the knob of the trimpot. Ideally, the resistance
    reading will vary between 0 and 10,000Ω, but in practice, there will be some error.


    # Discussion


    To explain how the PiAnalog class works, I first need to explain how the *step
    response* technique for measuring the resistance of the variable resistor works.


    Figure 14-2 shows the schematic diagram for the recipe.


    This way of doing things is called step response because it works by seeing how
    the circuit responds from the *step* change when an output is switched from low
    to high.


