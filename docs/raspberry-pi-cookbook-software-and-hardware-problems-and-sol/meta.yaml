    As with all the program examples in this book, you can also download this code
    (see Recipe 3.22).


    The program is based on ch_19_temp_logger.py, with the addition of code to display
    the temperature. The module badger2040 contains the interface to the E Ink display.
    Having created an instance of the Badger2040 class, the default font is set to
    bitmap8, which is quite a blocky font, but looks good as a thermometer.


    The main while loop reads the temperature, and if it has changed, then it redisplays
    the new temperature. Unlike other displays, E Ink displays refresh slowly and
    with a fair amount of blinking. So the display would look quite distracting if
    it refreshed every time through the while loop.


    Writing to the display is similar to using an OLED display (see Recipe 15.4).
    The things to be displayed are written to a buffer before the display is told
    to update using the update method. In this case, the display is first cleared
    by setting the ink color to white (255) and then calling clear(). The pen color
    is then set to 0 (black), the temperature is converted to text, and then it is
    drawn at coordinates x = 20, y = 10. Some smaller text is then displayed for the
    units of degrees. Finally, there is a sleep of five seconds to stop the display
    from constantly refreshing when the measured temperature is at the threshold between
    two values.


    # See Also


    For more information on using the Pimoroni Badger, see https://oreil.ly/EyxoP.


