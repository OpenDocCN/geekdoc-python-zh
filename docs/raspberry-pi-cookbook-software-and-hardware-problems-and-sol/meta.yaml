- md: "## CHAPTER 9\nMachine Learning\n\n## 9.0 Introduction\n\nYou may be surprised\
    \ to hear that your humble Raspberry Pi is a great platform for experimenting\
    \ with machine learning. In this chapter you will experiment with recognizing\
    \ objects in real-time video, recognizing sounds, and linking all this to your\
    \ own Python programs.\n\nProgramming a computer involves giving the computer\
    \ a list of instructions to follow. A procedure is created to accomplish the thing\
    \ we want the computer to do. This is expressed in a programming language such\
    \ as Python and works really well for things like storing data or making calculations.\
    \ However, it's quite hard to think of how you would write a program to respond\
    \ to a spoken command, or to identify objects in a photograph. The way humans\
    \ and other animals learn such things is through practice. Our brains gradually\
    \ learn to recognize things through experience. No program is running in our heads\
    \ to do these things; we learn to do them.\n\nMachine learning (ML) involves a\
    \ normal computer running special machine learning programs (that bit is normal\
    \ programming) that process large amounts of data and learn from that data in\
    \ much the same way as a brain does. We can, for example, train the computer to\
    \ recognize spoken commands by providing it with lots of samples of the commands,\
    \ along with other examples and background noise that we want the computer to\
    \ learn to ignore.\n\nMost ML is concerned with *classification*. That is, taking\
    \ some input and putting it into a category. For example, this could be taking\
    \ data about a sound sample and assigning probabilities as to which of a set of\
    \ predefined words or phrases that sample contains. Or, it might be classifying\
    \ objects in an image to decide which animal a picture represents or whether that\
    \ animal is present in a video stream containing lots of things.\n\nThere are\
    \ various mechanisms for this learning, some of which rely on conventional statistics\
    \ and others that use neural network simulations. The neural network approach\
    \ uses a conventional program to simulate a network of neurons like those in a\
    \ brain. Each neuron has an output that “fires” when the weighted values of all\
    \ its input exceed some threshold. These weights are adjusted during the training\
    \ process, improving the accuracy of the neural network, until the neural network\
    \ is operating acceptably well. Training is actually often a lot harder than this,\
    \ and it often requires changes to the configuration of the neural network rather\
    \ than just changes to weights. However, good software can help to automate much\
    \ of this process.\n\nIn this chapter we will start using pretrained models that\
    \ have been made from huge sets of data by machine learning experts and are available\
    \ for us to use for free, courtesy of TensorFlow. We will look at how we can use\
    \ these models to classify objects in video and sounds in real time, and also\
    \ how we can hook our own Python code into this process. These standard, pretrained\
    \ models do require us to do some conditioning of our video source.\n\nWe will\
    \ then take a look at the Edge Impulse platform to illustrate creating and training\
    \ our own machine learning model. Edge Impulse greatly simplifies the process\
    \ of using machine learning by providing a cloud service that does all the work\
    \ that needs high-performance computing—the data preparation and training. Doing\
    \ all the heavy lifting in the cloud allows you to download the trained model\
    \ onto a much lower-power device like the Raspberry Pi.\n\nTensorFlow and Edge\
    \ Impulse require the use of a Raspberry Pi 4 or 400. In addition, you will need\
    \ a webcam (or Raspberry Pi Camera Module) connected to your Raspberry Pi and\
    \ a microphone. The microphone on a USB webcam will work just fine (just plug\
    \ it in), or you can use a USB microphone as described in Recipe 16.6 for the\
    \ sound projects.\n\nMachine learning is a huge topic about which many books have\
    \ been written, so by necessity this chapter is intended only to get you started\
    \ with some ML projects.\n\n## 9.1 Identifying Objects in Video with TensorFlow\
    \ Lite\n\n### Problem\n\nYou want your Raspberry Pi to dynamically identify objects\
    \ from video.\n\n### Solution\n\nFollow Recipe 8.1 to install OpenCV, which will\
    \ be needed for most of the recipes in this chapter.\n\nUse a TensorFlow pretrained\
    \ model with a USB webcam or Raspberry Pi Camera Module. This will dynamically\
    \ annotate your video stream as objects are identified (Figure 9-1).\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_262_0.png)\n\
    \n*Figure 9-1. Object identification in a video stream*\n\nTo run this example,\
    \ change to your home directory and download the TensorFlow examples using the\
    \ command:\n\n```\n$ git clone https://github.com/tensorflow/examples --depth\
    \ 1\n```\n\nChange directory to the following example project folder, build the\
    \ project by running the *setup.sh* script, and finally run the Python program.\
    \ This will annotate the video at about 6 frames per second, identifying all sorts\
    \ of things from your webcam or Raspberry Pi Camera Module. Try holding up various\
    \ objects for it to identity:\n\n```\n$ sudo apt install libportaudio2\n$ cd ~/examples/lite/examples/object_detection/raspberry_pi\n\
    $ sh setup.sh\n$ python3 detect.py --model efficientdet_lite0.tflite\n```\n\n\
    ### Discussion\n\nIn Chapter 8 we went as far as counting coins. But this relied\
    \ on classical image processing techniques, looking for edges in images, looking\
    \ for differences between images, etc. This approach relied on controlled lighting\
    \ and no machine learning was involved.\n\nJust take a moment to think about what\
    \ is going on here. This is pretty amazing: your Raspberry Pi is actually seeing\
    \ and identifying things. It is able to do this because the model has been trained\
    \ on thousands of images of objects and has learned to distinguish them, or at\
    \ least hazard a good guess. And it can do this whatever the angle they are viewed\
    \ at, whatever the lighting and background.\n\nOne interesting feature of Figure\
    \ 9-1 is that the small coffee mug in the author's hand has been misidentified\
    \ as a \"remote,\" perhaps because of the way it is being held. Even the mistakes\
    \ are the sort of mistake that a human might make, because the \"seeing\" is taking\
    \ place in a similar way.\n\n### See Also\n\nIn Recipe 9.2 we will modify this\
    \ example program to run some of our own code when an object of interest is detected.\n\
    \nYou can use other ready-trained TensorFlow Lite models. Learn more about TensorFlow\
    \ at https://www.tensorflow.org.\n\n## 9.2 Reacting to Objects in Video with TensorFlow\
    \ Lite\n\n### Problem\n\nYou want to use a Python program to carry out an action\
    \ when a certain type of object is identified from a video stream.\n\n### Solution\n\
    \nModify the TensorFlow object identification example from Recipe 9.1 so that\
    \ when a particular type of object is detected, some of your own code is run.\n\
    \nFollow Recipe 9.1 to install the pretrained TensorFlow model for object detection.\n\
    \nCopy the file ch_09_person_detector.py to the working folder for the object\
    \ detection example. Then change to that directory and run the program using the\
    \ following commands:\n\n```\n$ cd ~/examples/lite/examples/object_detection/raspberry_pi/\n\
    $ cp ~/raspberrypi_cookbook_ed4/python/ch_09_person_detector.py .\n$ python3 ch_09_person_detector.py\n\
    ```\n\nAs with all the program examples in this book, you can download this code\
    \ (see Recipe 3.22).\n\nWhen you run the program, whenever a person is in front\
    \ of your webcam, a message will appear in the Terminal saying “Something Detected!”.\
    \ When this happens, a date-stamped PNG image file will be created, containing\
    \ the image that the Raspberry Pi saw:\n\n```\n$ ls *.png\n2022-04-21-05-57-27.png\n\
    2022-04-21-05-57-37.png\n2022-04-21-06-19-17.png\n```\n\nIf you view these files\
    \ using the File Explorer, then you can double-click one to open it and view it.\n\
    \n### Discussion\n\nThe program *ch_09_person_detector.py* started life as a copy\
    \ of TensorFlow’s example program *detect.py*. The program for this recipe is\
    \ too long to list in full here, so you might like to open it in an editor. Here’s\
    \ the key part, all contained in the run function:\n\n```\nlast_detection_time\
    \ = 0\n\n# Continuously capture images from the camera and run inference\nwhile\
    \ cap.isOpened():\n    success, image = cap.read()\n    if not success:\n    \
    \    sys.exit(\n            'ERROR: Unable to read from webcam. Please verify\
    \ your webcam settings.'\n        )\n    image = cv2.flip(image, 1)\n\n    # Convert\
    \ the image from BGR to RGB as required by the TFLite model.\n    rgb_image =\
    \ cv2.cvtColor(image, cv2.COLOR_BGR2RGB)\n\n    # Create a TensorImage object\
    \ from the RGB image.\n    input_tensor = vision.TensorImage.create_from_array(rgb_image)\n\
    \n    # Run object detection estimation using the model.\n    detection_result\
    \ = detector.detect(input_tensor)\n\n    # Draw keypoints and edges on input image\n\
    \    image = utils.visualize(image, detection_result)\n\n    for detection in\
    \ detection_result.detections:\n        object_type = detection.categories[0].category_name\n\
    \        time_now = time.time()\n        if object_type == 'person' and time_now\
    \ > last_detection_time + 10:\n```"
  mdcn: "## 第9章\n机器学习\n\n## 9.0 引言\n\n你可能会惊讶地发现，你那不起眼的树莓派是进行机器学习实验的绝佳平台。在本章中，你将尝试实时识别视频中的物体、识别声音，并将所有这些与你自己的Python程序连接起来。\n\
    \n为计算机编程涉及给计算机一系列要遵循的指令。我们创建一个过程来完成我们希望计算机做的事情。这通过Python等编程语言来表达，对于存储数据或进行计算等任务效果非常好。然而，要编写一个程序来响应语音命令或识别照片中的物体，却相当困难。人类和其他动物学习这类事物的方式是通过实践。我们的大脑通过经验逐渐学会识别事物。我们的大脑中并没有运行任何程序来做这些事情；我们是学会做这些事的。\n\
    \n机器学习（ML）涉及一台普通计算机运行特殊的机器学习程序（这部分是常规编程），这些程序处理大量数据，并以与大脑非常相似的方式从数据中学习。例如，我们可以通过向计算机提供大量命令样本，以及其他我们希望计算机学会忽略的示例和背景噪音，来训练计算机识别语音命令。\n\
    \n大多数ML关注的是*分类*。即，获取一些输入并将其放入一个类别中。例如，这可以是获取关于声音样本的数据，并为该样本包含的一组预定义单词或短语分配概率。或者，它可能是对图像中的物体进行分类，以确定图片代表哪种动物，或者该动物是否出现在包含许多事物的视频流中。\n\
    \n这种学习有各种机制，其中一些依赖于传统统计学，另一些则使用神经网络模拟。神经网络方法使用传统程序来模拟大脑中的神经元网络。每个神经元都有一个输出，当其所有输入的加权值超过某个阈值时，该输出就会“触发”。这些权重在训练过程中进行调整，以提高神经网络的准确性，直到神经网络运行得足够好。训练实际上通常比这困难得多，它通常需要改变神经网络的配置，而不仅仅是改变权重。然而，好的软件可以帮助自动化这个过程的大部分工作。\n\
    \n在本章中，我们将开始使用由机器学习专家从海量数据集中制作的预训练模型，这些模型由TensorFlow免费提供给我们使用。我们将研究如何使用这些模型实时分类视频中的物体和声音，以及如何将我们自己的Python代码接入这个过程。这些标准的预训练模型确实需要我们对视频源进行一些预处理。\n\
