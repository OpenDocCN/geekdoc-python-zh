    \n要在IFTTT网站上找到此密钥，请点击用户图标旁边的菜单中出现的My Services选项，然后找到Webhooks。在Webhooks页面上，点击Documentation，将显示类似图17-10的页面；在这里你可以看到你的密钥（此图中故意做了模糊处理）。你需要将此密钥粘贴到后续代码中的KEY\
    \ = 'your_key_here'这一行。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_497_0.png)\n\
    \n图17-10. 查找你的API密钥\n\n发送网络请求的Python程序名为`ch_17_ifttt_cpu_temp.py`：\n\n```python\n\
    import time\nfrom gpiozero import CPUTemperature\nimport requests\n\nMAX_TEMP\
    \ = 33.0\nMIN_T_BETWEEN_WARNINGS = 60 # Minutes\n\nEVENT = 'cpu_too_hot'\nBASE_URL\
    \ = 'https://maker.ifttt.com/trigger/'\nKEY = 'your_key_here'\n\ndef send_notification(temp):\n\
    \    data = {'value1' : temp}\n    url = BASE_URL + EVENT + '/with/key/' + KEY\n\
    \    response = requests.post(url, json=data)\n    print(response.status_code)\n\
    \ndef cpu_temp():\n    cpu_temp = CPUTemperature().temperature\n    return cpu_temp\n\
    \nwhile True:\n    temp = cpu_temp()\n    print(\"CPU Temp (C): \" + str(temp))\n\
    \    if temp > MAX_TEMP:\n        print(\"CPU TOO HOT!\")\n        send_notification(temp)\n\
    \        print(\"No more notifications for: \" + str(MIN_T_BETWEEN_WARNINGS)\n\
    \              + \" mins\")\n        time.sleep(MIN_T_BETWEEN_WARNINGS * 60)\n\
    \    time.sleep(1)\n```\n\n与本书中所有程序示例一样，你也可以下载此程序（参见食谱3.22）。\n\n我故意将MAX_TEMP设置得很低以供测试。如果你住在炎热的地方，你可能需要将这个数字提高到60或70。\n\
    \n将密钥粘贴到ch_17_ifttt_cpu_temp.py中以KEY=开头的那一行，然后使用以下命令运行程序：\n\n```\n$ python3 ch_17_ifttt_cpu_temp.py\n\
    ```\n\n你可以通过播放视频或暂时用气泡膜包裹树莓派来提高CPU温度。当事件触发时，你应该会收到一封看起来像图17-11的电子邮件。注意值是如何被替换到电子邮件中的（同样，模糊处理是故意的）。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_498_0.png)\n\n## 讨论\n\n这个程序的大部分操作发生在send_notification函数中。该函数首先构造一个包含密钥和请求参数value1（包含温度）的URL，然后使用Python\
    \ requests库向IFTTT发送网络请求。"
