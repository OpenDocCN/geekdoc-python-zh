- md: "The main loop continually checks the CPU temperature against the MAX_TEMP;\
    \ if the temperature exceeds MAX_TEMP, the web request is sent, and a long sleep\
    \ is started as specified by MIN_T_BETWEEN_WARNINGS. The sleep prevents your inbox\
    \ from being flooded with notifications.\n\nAs an alternative to using IFTTT,\
    \ you could, of course, just send an email directly using Recipe 7.16. However,\
    \ by using IFTTT to send the messages, you are not restricted to email notifications—you\
    \ could use any of the action channels available in IFTTT without having to write\
    \ any code.\n\n## See Also\n\nTo send an email directly from Python, see Recipe\
    \ 7.16.\n\nThe code to measure the CPU temperature is described in Recipe 14.11.\n\
    \n## 17.5 Sending Tweets Using ThingSpeak\n\n### Problem\n\nYou want to automatically\
    \ send tweets from your Raspberry Pi—for example, to irritate people by telling\
    \ them the temperature of your CPU.\n\n### Solution\n\nYou could just use Recipe\
    \ 17.4 and change the action channel to Twitter. However, the ThingSpeak service\
    \ is an alternative way of doing this.\n\nThingSpeak is similar to IFTTT but is\
    \ aimed squarely at IoT projects. It allows you to create channels that can store\
    \ and retrieve data using web requests, and it also has a number of actions, including\
    \ ThingTweet, which provides a web services wrapper around Twitter. This is easier\
    \ to use than the Twitter API, which requires you to register your application\
    \ with Twitter.\n\nStart by visiting https://thingspeak.com and signing up. Note\
    \ that this also involves creating a MATLAB account for no particularly good reason.\n\
    \nNext, select the ThingTweet action from the Apps menu. You are prompted to log\
    \ in to Twitter, and then your action will become activated (Figure 17-12).\n\n\
    ![](img/e36e77524aeaae366529d1cf02f9a39c_500_0.png)\n\nFigure 17-12. The ThingTweet\
    \ action\n\nThe Python program to send the web request that triggers the tweet\
    \ is called ch_17_send_tweet.py:\n\n```python\nimport time\nfrom gpiozero import\
    \ CPUTemperature\nimport requests\n\nMAX_TEMP = 35.0\nMIN_T_BETWEEN_WARNINGS =\
    \ 60 # Minutes\n\nBASE_URL = 'https://api.thingspeak.com/apps/thingtweet/1/statuses/update/'\n\
    KEY = 'your_key_here'\n\ndef send_notification(temp):\n    status = 'Thingtweet:\
    \ Raspberry Pi getting hot. CPU temp=' + str(temp)\n    data = {'api_key' : KEY,\
    \ 'status' : status}\n    response = requests.post(BASE_URL, json=data)\n    print(response.status_code)\n\
    \ndef cpu_temp():\n    cpu_temp = CPUTemperature().temperature\n    return cpu_temp\n\
    \nwhile True:\n    temp = cpu_temp()\n    print(\"CPU Temp (C): \" + str(temp))\n\
    \    if temp > MAX_TEMP:\n        print(\"CPU TOO HOT!\")\n        send_notification(temp)\n\
    \        print(\"No more notifications for: \" + str(MIN_T_BETWEEN_WARNINGS)\n\
    \              + \" mins\")\n        time.sleep(MIN_T_BETWEEN_WARNINGS * 60)\n\
    \    time.sleep(1)\n```\n\nAs with all the program examples in this book, you\
    \ can also download this program (see Recipe 3.22).\n\nAs with Recipe 17.4, you\
    \ need to paste your key from Figure 17-12 into the code before you run the program.\
    \ Run and test the program in the same way you did in Recipe 17.4.\n\n### Discussion\n\
    \nThe code is very similar to Recipe 17.4. The main difference is in the function\
    \ send_notification, which constructs the tweet and then sends the web request\
    \ with the message as the parameter status.\n\n### See Also\n\nMore information\
    \ is available in the full documentation of the ThingSpeak service.\n\nIn Recipe\
    \ 17.6, you use the popular CheerLights, implemented in ThingSpeak; in Recipe\
    \ 17.7, you learn how to use ThingSpeak to collect sensor data.\n\n## 17.6 Changing\
    \ LED Color Using CheerLights\n\n### Problem\n\nYou want to hook your Raspberry\
    \ Pi up to an RGB LED and participate in the popular CheerLights project.\n\n\
    CheerLights is a web service that, when anyone sends a tweet to @cheerlights containing\
    \ the name of a color, will record that color as being the CheerLights color.\
    \ Around the world, many people have CheerLights projects that use a web service\
    \ to request the last color and set their lighting to that color. So when anyone\
    \ tweets, everyone's lights change color.\n\n### Solution\n\nUse a Raspberry Squid\
    \ RGB LED connected to your Raspberry Pi (Figure 17-13) and run the test program\
    \ called ch_17_cheerlights.py (shown after Figure 17-13):\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_502_0.png)\n\
    \nFigure 17-13. A CheerLights display\n\n```python\nfrom gpiozero import RGBLED\n\
    from colorzero import Color\nimport time, requests\n\nled = RGBLED(18, 23, 24)\n\
    cheerlights_url = \"http://api.thingspeak.com/channels/1417/field/2/last.txt\"\
    \n\nwhile True:\n    try:\n        cheerlights = requests.get(cheerlights_url)\n\
    \        c = cheerlights.content\n        print(c)\n        led.color = Color(c)\n\
    \    except Exception as e:\n        print(e)\n    time.sleep(2)\n```\n\nAs with\
    \ all the program examples in this book, you can also download this program (see\
    \ Recipe 3.22).\n\nWhen you run the program, your LED should immediately set itself\
    \ to a color. It will probably change color after a while when someone tweets;\
    \ if it doesn't, try tweeting a message such as “@cheerlights red,” and the color\
    \ of your LED and the rest of the world's LEDs should change. Valid color names\
    \ for CheerLights are red, green, blue, cyan, white, oldlace, purple, magenta,\
    \ yellow, orange, and pink.\n\n### Discussion\n\nThe code just sends a web request\
    \ to ThingSpeak, which returns a string of colors as a six-digit hexadecimal number.\
    \ This is then used to set the LED color.\n\nThe try/except code is used to ensure\
    \ that the program doesn't crash if a temporary network outage occurs.\n\n###\
    \ See Also\n\nCheerLights uses ThingSpeak to store the last color in a channel.\
    \ In Recipe 17.7, a channel is used to record sensor data.\n\nIf you don't have\
    \ a Squid, you can use an RGB on a breadboard (see Recipe 11.11), or you can even\
    \ adapt Recipe 15.5 to control an entire LED strip.\n\n## 17.7 Sending Sensor\
    \ Data to ThingSpeak\n\n### Problem\n\nYou want to log sensor data to ThingSpeak\
    \ and then see charts of the data over time.\n\n### Solution\n\nLog in to ThingSpeak\
    \ and, from the Channels drop-down, select My Channels. Next, create a new channel\
    \ by completing the top of the form, as shown in Figure 17-14.\n\nYou can leave\
    \ the rest of the form blank. When you have finished editing, click Save Channel\
    \ at the bottom of the page. Click the API Keys tab to find a summary of the web\
    \ requests that you can use, along with keys for the channel you just created\
    \ (Figure 17-15).\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_504_0.png)\n\nFigure\
    \ 17-14. Creating a channel in ThingSpeak\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_504_1.png)\n\
    \nFigure 17-15. Specifying a ThingSpeak channel\n\nYou will need to copy your\
    \ API key (*api_key* in Update Channel Feed - POST as shown in Figure 17-15) as\
    \ the value for KEY in the program that follows.\n\nTo send data to the channel,\
    \ you must send a web request. The Python program to send the web request is called\
    \ `ch_17_thingspeak_data.py`:\n\n```python\nimport time\nfrom gpiozero import\
    \ CPUTemperature\nimport requests\n\nPERIOD = 60 # seconds\nBASE_URL = 'https://api.thingspeak.com/update.json'\n\
    KEY = 'your key goes here'\n\ndef send_data(temp):\n    data = {'api_key' : KEY,\
    \ 'field1' : temp}\n    response = requests.post(BASE_URL, json=data)\n\ndef cpu_temp():\n\
    \    cpu_temp = CPUTemperature().temperature\n    return cpu_temp\n\nwhile True:\n\
    \    temp = cpu_temp()\n    print(\"CPU Temp (C): \" + str(temp))\n    send_data(temp)\n\
    \    time.sleep(PERIOD)\n```\n\nAs with all the program examples in this book,\
    \ you can also download this program (see Recipe 3.22).\n\nRun the program. On\
    \ the ThingSpeak channel page, on the Private View tab, you should see a graph\
    \ like the one shown in Figure 17-16.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_505_0.png)\n\
    \nFigure 17-16. Charting the sensor data in ThingSpeak\n\nThis will update every\
    \ minute as each new reading arrives.\n\n### Discussion\n\nThe variable `PERIOD`\
    \ is used to determine the time interval in seconds after each sending of the\
    \ temperature.\n\nThe `send_data` function constructs the web request, supplying\
    \ the temperature in a parameter called `field1`.\n\nIf your data might be something\
    \ of public interest—say, accurate environmental readings—you might want to make\
    \ the channel public so that anyone can make use of it. This probably isn't the\
    \ case for your Pi's CPU temperature.\n\n### See Also\n\nFor an explanation of\
    \ the code that reads the CPU temperature, see [Recipe 14.11](Recipe 14.11).\n\
    \nFor an example of exporting sensor data into a spreadsheet, see [Recipe 14.24](Recipe\
    \ 14.24).\n\n## 17.8 Responding to Tweets Using Dweet and IFTTT\n\n### Problem\n\
    \nYou want your Raspberry Pi to perform some action in response to a certain hashtag\
    \ or mention in a tweet.\n\n[Recipe 17.6](Recipe 17.6) does this, but it does\
    \ it very inefficiently because it relies on you continually polling with web\
    \ requests to see whether the color has changed.\n\n### Solution\n\nAn efficient\
    \ mechanism for monitoring tweets that does not rely on polling is to use IFTTT\
    \ (see [Recipe 17.4](Recipe 17.4)) to spot tweets of interest and then send a\
    \ web request to a service called Dweet that can push notifications to a Python\
    \ program running on your Raspberry Pi ([Figure 17-17](Figure 17-17)).\n\nFor\
    \ example, you could flash an LED for 10 seconds every time your username is mentioned\
    \ on Twitter by using a Raspberry Squid or an LED attached to a breadboard.\n\n\
    As far as the hardware goes, this recipe just requires some electronics that do\
    \ something noticeable when GPIO 18 goes high. This could be one channel of a\
    \ Raspberry Squid (see [Recipe 10.10](Recipe 10.10)) or a single LED attached\
    \ to breadboard (see [Recipe 11.1](Recipe 11.1)) or, for ultimate flexibility,\
    \ a relay (see [Recipe 11.5](Recipe 11.5)). Using a relay would allow you to create\
    \ a project like [Bubblino](Bubblino), the bubble-blowing Arduino bot."
