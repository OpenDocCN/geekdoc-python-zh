- md: "## Discussion\n\nWhereas electromechanical relays as described in Recipe 11.5\
    \ electrically isolate their input and output using an electromagnet and switch,\
    \ SSRs use optoelectronics to isolate the input from the output. Figure 11-7 shows\
    \ the schematic diagram for the MonkMakes SSR. The part labeled IC1 is effectively\
    \ an LED and series of photocells in a sealed and light-proof integrated circuit\
    \ package. When the LED lights, it generates a voltage that is used to control\
    \ the two MOSFET transistors labeled Q1 and Q2. Two are required so that both\
    \ DC and AC (where the voltage reverses) can be switched.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_325_0.png)\n\
    \n## See Also\n\nTo use an electromechanical relay, see Recipe 11.5.\n\n## 11.7\
    \ Controlling High-Voltage AC Devices\n\n### Problem\n\nYou want to switch 110\
    \ or 220V alternating current (AC) on and off, using a Raspberry Pi.\n\n### Solution\n\
    \nUse a PowerSwitch Tail II (see Figure 11-8) or Four Output Power Relay. These\
    \ handy devices make it really safe and easy to switch AC equipment on and off\
    \ from a Raspberry Pi. They have an AC socket on one end and a plug (or plugs)\
    \ on the other, like an extension cable; the only difference is that the control\
    \ box in the middle of the lead has three screw terminals. By attaching terminal\
    \ 2 to GND and terminal 1 to a GPIO pin, the device acts like a switch to turn\
    \ the appliance on and off.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_326_0.png)\n\
    \nFigure 11-8. Using a PowerSwitch Tail with Raspberry Pi\n\nYou can use the same\
    \ Python code that you did in Recipe 11.1 to use the PowerSwitch Tail, as shown\
    \ in Figure 11-8.\n\n### Discussion\n\nThe PowerSwitch Tail uses a relay, but\
    \ to switch the relay, it uses a component called an *opto-isolator*, which has\
    \ an LED shining onto a photo-TRIAC (a high-voltage, light-sensitive switch);\
    \ when the LED is illuminated, the photo-TRIAC conducts, supplying current to\
    \ the relay coil.\n\nThe LED inside the opto-isolator has its current limited\
    \ by a resistor so that only 3mA flows through it when you supply it with 3.3V\
    \ from a GPIO pin.\n\nYou will also find devices similar to, but less expensive\
    \ than, the PowerSwitch Tail for sale on eBay and Amazon.\n\n### See Also\n\n\
    For switching DC using a power MOSFET, see Recipe 11.4; for switching using a\
    \ relay on a breadboard, see Recipe 11.5.\n\n## 11.8 Controlling Hardware with\
    \ Android and Bluetooth\n\n### Problem\n\nYou want to use your Android mobile\
    \ phone and Bluetooth to interact with your Raspberry Pi.\n\n### Solution\n\n\
    Use the free Blue Dot Android app and Python library:\n\n```\n$ sudo pip3 install\
    \ bluedot\n```\n\nNext, you need to make sure that your Raspberry Pi is *discoverable*.\
    \ In the upper-right corner of the Raspberry Pi’s screen, click the Bluetooth\
    \ icon, and then click Make Discoverable (Figure 11-9).\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_327_0.png)\n\
    \nNext, you need to pair your Raspberry Pi and phone. Make sure that your phone\
    \ has Bluetooth turned on, and then click Add New Device on your Raspberry Pi’s\
    \ Bluetooth menu (Figure 11-10).\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_327_1.png)\n\
    \nFind your phone in the list and then click Pair. You then are prompted on your\
    \ phone to confirm a code to complete the pairing.\n\nWhen the pairing is complete,\
    \ go to the Play Store app on your phone. Search for and install the Blue Dot\
    \ app. The app won't be able to work with your phone until you run a Python program\
    \ that uses the Python Blue Dot code to listen for commands, so run the following\
    \ program (*ch_11_bluedot.py*) on your Raspberry Pi:\n\n```\nfrom bluedot import\
    \ BlueDot\nbd = BlueDot()\nwhile True:\n    bd.wait_for_press()\n    print(\"\
    You pressed the blue dot!\")\n```\n\nAs with all the program examples in this\
    \ book, you can download this program (see [Recipe 3.22](Recipe 3.22)).\n\nNow\
    \ it's time to open the Blue Dot app on your phone. When you do this, it provides\
    \ a list of Blue Dot devices (Figure 11-11).\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_328_0.png)\n\
    \nAfter you're connected, the eponymous blue dot will appear, as shown in [Figure\
    \ 11-12](Figure 11-12).\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_329_0.png)\n\
    \nFigure 11-12. The blue dot\n\nWhen you tap on the Blue Dot, your Python program\
    \ will print out the message: “You pressed the blue dot!”:\n\n```\n$ python3 ch_11_bluedot.py\n\
    Server started B8:27:EB:D5:6C:E9\nWaiting for connection\nClient connected C0:EE:FB:F0:94:8F\n\
    You pressed the blue dot!\nYou pressed the blue dot!\nYou pressed the blue dot!\n\
    ```\n\n### Discussion\n\nThe big blue dot isn't just a button; you can also use\
    \ it as a joystick. You can slide, swipe, and rotate the dot. The Blue Dot library\
    \ allows you to link handler functions to events such as swiping and rotating.\
    \ For more information on this, take a look at [the documentation](https://bluedot.readthedocs.io/).\n\
    \n### See Also\n\nFor full information on Blue Dot, see [the Blue Dot website](https://bluedot.readthedocs.io/).\n\
    \nThere is also a [Blue Dot Python module](https://github.com/martinohanlon/BlueDot)\
    \ that lets you use a second Raspberry Pi as the Blue Dot remote.\n\nSee [Recipe\
    \ 1.17](https://www.raspberrypi.org/magpi-issues/MagPi17.pdf) for more information\
    \ on using Bluetooth with a Raspberry Pi.\n\n## 11.9 Making a User Interface to\
    \ Turn Things On and Off\n\n### Problem\n\nYou want to make an application to\
    \ run on the Raspberry Pi that has a button for turning things on and off.\n\n\
    ### Solution\n\nUse guizero to provide the user interface for gpiozero to turn\
    \ the pin on and off (Figure 11-13).\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_330_0.png)\n\
    \nFigure 11-13. An on/off switch in guizero\n\nIf you haven't already done so,\
    \ install guizero using the following command:\n\n```\n$ sudo pip3 install guizero\n\
    ```\n\nYou'll need to connect an LED or some other kind of output device to GPIO\
    \ pin 18. Using an LED (Recipe 11.1) is the easiest option for getting started.\n\
    \nAs with all the program examples in this book, you can download the code for\
    \ this recipe (see Recipe 3.22). The file is called ch_11_gui_switch.py and creates\
    \ the switch shown in Figure 11-13:\n\n```\nfrom gpiozero import DigitalOutputDevice\n\
    from guizero import App, PushButton\n\npin = DigitalOutputDevice(18)\n\ndef start():\n\
    \    start_button.disable()\n    stop_button.enable()\n    pin.on()\n\ndef stop():\n\
    \    start_button.enable()\n    stop_button.disable()\n    pin.off()\n\napp =\
    \ App(width=100, height=150)\nstart_button = PushButton(app, command=start, text=\"\
    On\")\nstart_button.text_size = 30\nstop_button = PushButton(app, command=stop,\
    \ text=\"Off\", enabled=False)\nstop_button.text_size = 30\napp.display()\n```\n\
    \n### Discussion\n\nThe example uses a pair of buttons, and when you press one,\
    \ it disables itself and enables its counterpart. It also uses gpiozero to change\
    \ the state of the output pin using the on() and off() methods. This example would\
    \ work just the same if we used the line pin = LED(18) rather than pin = DigitalOutputDevice(18),\
    \ but using DigitalOutputDevice keeps things more generic. After all, you could\
    \ be controlling anything from pin 18, not just an LED.\n\n### See Also\n\nYou\
    \ can also use this program to control a high-power DC device (Recipe 11.4), a\
    \ relay (Recipe 11.5), or a high-voltage AC device (Recipe 11.7).\n\nFor more\
    \ information on guizero, see Recipe 7.22.\n\n## 11.10 Making a User Interface\
    \ to Control PWM Power for LEDs and Motors\n\n### Problem\n\nYou want to make\
    \ an application to run on the Raspberry Pi that has a slider to control power\
    \ to a device using pulse-width modulation (PWM).\n\n### Solution\n\nUsing the\
    \ gpiozero and guizero user interface framework, write a Python program that uses\
    \ a slider to change the PWM duty cycle between 0 and 100% (Figure 11-14).\n\n\
    ![](img/e36e77524aeaae366529d1cf02f9a39c_331_0.png)\n\nYou'll need to connect\
    \ an LED or some other kind of output device to GPIO pin 18 that is capable of\
    \ responding to a PWM signal. Using an LED (Recipe 11.1) is the easiest option\
    \ to start with.\n\nOpen an editor and paste in the following code (the name of\
    \ the file is *ch_11_gui_slider.py*):\n\n```\nfrom gpiozero import PWMOutputDevice\n\
    from guizero import App, Slider\n\npin = PWMOutputDevice(18)\n\ndef slider_changed(percent):\n\
    \    pin.value = int(percent) / 100\n\napp = App(title='PWM', width=500, height=150)\n\
    slider = Slider(app, command=slider_changed, width='fill', height=50)\nslider.text_size\
    \ = 30\napp.display()\n```\n\nAs with all the program examples in this book, you\
    \ can download the code for this recipe (see Recipe 3.22).\n\nRun the program\
    \ using the following command:\n\n```\n$ python3 gui_slider.py\n```\n\n### Discussion\n\
    \nThe example program uses the Slider class. The command option runs the slider_changed\
    \ command every time the value of the slider is changed. This updates the value\
    \ of the output pin. The parameter to the slider_changed function is a string,\
    \ even though it contains a number between 0 and 100, so int is used to convert\
    \ it into a number, and then the percent value has to be divided by 100 to give\
    \ a value between 0 and 1 for the PWM output.\n\n### See Also\n\nYou can use this\
    \ program to control an LED (Recipe 11.1), a DC motor (Recipe 12.4), or a high-power\
    \ DC device (Recipe 11.4).\n\n## 11.11 Making a User Interface to Change the Color\
    \ of an RGB LED\n\n### Problem\n\nYou want to control the color of an RGB LED."
  mdcn: "## 讨论\n\n如配方11.5所述，机电继电器使用电磁铁和开关来实现输入和输出的电气隔离，而固态继电器则使用光电器件来隔离输入和输出。图11-7展示了MonkMakes固态继电器的原理图。标记为IC1的部分实际上是一个LED和一系列光电池，它们被封装在一个密封且不透光的集成电路封装中。当LED点亮时，它会产生一个电压，用于控制标记为Q1和Q2的两个MOSFET晶体管。需要两个晶体管，以便能够切换直流电和交流电（交流电的电压会反向）。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_325_0.png)\n\n## 另请参阅\n\n要使用机电继电器，请参阅配方11.5。\n\
    \n## 11.7 控制高压交流设备\n\n### 问题\n\n你想使用树莓派来开关110或220伏交流电（AC）。\n\n### 解决方案\n\n使用PowerSwitch\
    \ Tail II（见图11-8）或四路输出电源继电器。这些便捷的设备使得从树莓派安全、轻松地开关交流设备变得非常简单。它们一端有一个交流插座，另一端有一个插头（或多个插头），就像延长线一样；唯一的区别是中间的控制盒有三个螺丝端子。通过将端子2连接到GND，端子1连接到GPIO引脚，该设备就像一个开关，可以打开和关闭电器。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_326_0.png)\n\n图11-8. 将PowerSwitch Tail与树莓派配合使用\n\
    \n你可以使用与配方11.1中相同的Python代码来使用PowerSwitch Tail，如图11-8所示。\n\n### 讨论\n\nPowerSwitch\
    \ Tail使用继电器，但为了切换继电器，它使用了一种称为*光隔离器*的组件，该组件有一个LED照射到一个光敏双向可控硅（一种高压、光敏开关）上；当LED点亮时，光敏双向可控硅导通，为继电器线圈提供电流。\n\
    \n光隔离器内部的LED通过一个电阻限制电流，因此当您从GPIO引脚提供3.3V电压时，只有3mA的电流流过它。\n\n您还可以在eBay和亚马逊上找到与PowerSwitch\
    \ Tail类似但价格更便宜的设备。\n\n### 另请参阅\n\n关于使用功率MOSFET切换直流电，请参阅配方11.4；关于在面包板上使用继电器进行切换，请参阅配方11.5。\n\
    \n## 11.8 使用Android和蓝牙控制硬件\n\n### 问题\n\n你想使用你的Android手机和蓝牙与树莓派进行交互。\n\n### 解决方案\n\
    \n使用免费的Blue Dot Android应用程序和Python库：\n\n```\n$ sudo pip3 install bluedot\n```\n\
    \n接下来，你需要确保你的树莓派是*可发现的*。在树莓派屏幕的右上角，点击蓝牙图标，然后点击“使可发现”（图11-9）。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_327_0.png)\n\
    \n接下来，你需要配对你的树莓派和手机。确保你的手机已开启蓝牙，然后在树莓派的蓝牙菜单上点击“添加新设备”（图11-10）。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_327_1.png)\n\
    \n在列表中找到你的手机，然后点击“配对”。然后你的手机会提示你确认一个代码以完成配对。\n\n配对完成后，转到手机上的Play Store应用。搜索并安装Blue\
    \ Dot应用。在你运行一个使用Python Blue Dot代码来监听命令的Python程序之前，该应用将无法与你的手机配合工作，因此请在你的树莓派上运行以下程序（*ch_11_bluedot.py*）：\n\
    \n```\nfrom bluedot import BlueDot\nbd = BlueDot()\nwhile True:\n    bd.wait_for_press()\n\
    \    print(\"You pressed the blue dot!\")\n```\n\n与本书中的所有程序示例一样，你可以下载此程序（参见[配方3.22](Recipe\
    \ 3.22)）。\n\n现在是时候在你的手机上打开Blue Dot应用了。当你这样做时，它会提供一个Blue Dot设备列表（图11-11）。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_328_0.png)\n\
    \n连接后，同名的蓝点将会出现，如[图11-12](Figure 11-12)所示。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_329_0.png)\n\
    \n图11-12. 蓝点\n\n当你点击蓝点时，你的Python程序将打印出消息：“You pressed the blue dot!”：\n\n```\n\
    $ python3 ch_11_bluedot.py\nServer started B8:27:EB:D5:6C:E9\nWaiting for connection\n\
    Client connected C0:EE:FB:F0:94:8F\nYou pressed the blue dot!\nYou pressed the\
    \ blue dot!\nYou pressed the blue dot!\n```\n\n### 讨论\n\n这个大蓝点不仅仅是一个按钮；你也可以将其用作操纵杆。你可以滑动、轻扫和旋转这个点。Blue\
    \ Dot库允许你将处理函数链接到诸如轻扫和旋转等事件。有关更多信息，请查看[文档](https://bluedot.readthedocs.io/)。\n\
    \n### 另请参阅\n\n有关Blue Dot的完整信息，请参阅[Blue Dot网站](https://bluedot.readthedocs.io/)。\n\
    \n还有一个[Blue Dot Python模块](https://github.com/martinohanlon/BlueDot)，它允许你使用第二个树莓派作为Blue\
    \ Dot遥控器。\n\n有关在树莓派上使用蓝牙的更多信息，请参阅[配方1.17](https://www.raspberrypi.org/magpi-issues/MagPi17.pdf)。\n\
    \n## 11.9 制作一个用于开关设备的用户界面\n\n### 问题\n\n你想制作一个在树莓派上运行的应用程序，该程序有一个用于开关设备的按钮。\n\n\
    ### 解决方案\n\n使用guizero为gpiozero提供用户界面，以打开和关闭引脚（图11-13）。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_330_0.png)\n\
    \n图11-13. guizero中的开关\n\n如果你还没有这样做，请使用以下命令安装guizero：\n\n```\n$ sudo pip3 install\
    \ guizero\n```\n\n你需要将一个LED或其他类型的输出设备连接到GPIO引脚18。使用LED（配方11.1）是入门最简单的选择。\n\n与本书中的所有程序示例一样，你可以下载此配方的代码（参见配方3.22）。该文件名为ch_11_gui_switch.py，并创建了图11-13所示的开关：\n\
    \n```\nfrom gpiozero import DigitalOutputDevice\nfrom guizero import App, PushButton\n\
    \npin = DigitalOutputDevice(18)\n\ndef start():\n    start_button.disable()\n\
    \    stop_button.enable()\n    pin.on()\n\ndef stop():\n    start_button.enable()\n\
    \    stop_button.disable()\n    pin.off()\n\napp = App(width=100, height=150)\n\
    start_button = PushButton(app, command=start, text=\"On\")\nstart_button.text_size\
    \ = 30\nstop_button = PushButton(app, command=stop, text=\"Off\", enabled=False)\n\
    stop_button.text_size = 30\napp.display()\n```\n\n### 讨论\n\n该示例使用了一对按钮，当你按下其中一个时，它会禁用自身并启用其对应的按钮。它还使用gpiozero通过on()和off()方法来改变输出引脚的状态。如果我们使用`pin\
    \ = LED(18)`而不是`pin = DigitalOutputDevice(18)`，这个示例同样可以工作，但使用DigitalOutputDevice使事情更加通用。毕竟，你可能控制的是引脚18上的任何东西，而不仅仅是LED。\n\
    \n### 另请参阅\n\n你也可以使用此程序来控制大功率直流设备（配方11.4）、继电器（配方11.5）或高压交流设备（配方11.7）。\n\n有关guizero的更多信息，请参阅配方7.22。\n\
    \n## 11.10 制作一个用于控制LED和电机PWM功率的用户界面\n\n### 问题\n\n你想制作一个在树莓派上运行的应用程序，该程序有一个滑块，用于使用脉宽调制（PWM）控制设备的功率。\n\
    \n### 解决方案\n\n使用gpiozero和guizero用户界面框架，编写一个Python程序，该程序使用一个滑块在0到100%之间改变PWM占空比（图11-14）。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_331_0.png)\n\n你需要将一个LED或其他类型的输出设备连接到GPIO引脚18，该设备需要能够响应PWM信号。使用LED（配方11.1）是入门最简单的选择。\n\
    \n打开一个编辑器并粘贴以下代码（文件名为*ch_11_gui_slider.py*）：\n\n```\nfrom gpiozero import PWMOutputDevice\n\
    from guizero import App, Slider\n\npin = PWMOutputDevice(18)\n\ndef slider_changed(percent):\n\
    \    pin.value = int(percent) / 100\n\napp = App(title='PWM', width=500, height=150)\n\
    slider = Slider(app, command=slider_changed, width='fill', height=50)\nslider.text_size\
    \ = 30\napp.display()\n```\n\n与本书中的所有程序示例一样，你可以下载此配方的代码（参见配方3.22）。\n\n使用以下命令运行程序：\n\
    \n```\n$ python3 gui_slider.py\n```\n\n### 讨论\n\n示例程序使用了Slider类。command选项在滑块的值每次改变时运行slider_changed命令。这会更新输出引脚的值。slider_changed函数的参数是一个字符串，即使它包含一个0到100之间的数字，因此使用int将其转换为数字，然后百分比值必须除以100，以给出0到1之间的值用于PWM输出。\n\
    \n### 另请参阅\n\n你可以使用此程序来控制LED（配方11.1）、直流电机（配方12.4）或大功率直流设备（配方11.4）。\n\n## 11.11\
    \ 制作一个用于改变RGB LED颜色的用户界面\n\n### 问题\n\n你想控制RGB LED的颜色。"
