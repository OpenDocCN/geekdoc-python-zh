    \n### 解决方案\n\n使用 Linux crontab（时间表）命令。\n为此，树莓派需要知道时间和日期，因此需要网络连接。\n\n### 讨论\n\n\
    crontab 命令允许你安排事件定期发生。这可以是每天或每小时，你甚至可以定义复杂的模式，以便在一周的不同日子发生不同的事情。这对于你可能想在半夜运行的备份任务很有用。\n\
