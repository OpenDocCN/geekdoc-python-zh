  md: '# 17.3 Getting Started with Node-RED


    # Problem


    You want to create simple IoT workflows, such as sending a tweet when a button
    is pressed on your Raspberry Pi.


    # Solution


    Use the Node-RED system that can be found in the Programming section of the Recommended
    Software tool (Recipe 4.2). Use the following example to start a Node-RED server:


    ```

    $ node-red-pi --max-old-space-size=256

    ```


    Then connect to the server using a browser. This can be on the Raspberry Pi itself,
    in which case you can connect to the URL http://127.0.0.1:1880/—or if you are
    connecting from another computer on your network, change 127.0.0.1 to the local
    IP address of your Raspberry Pi (Recipe 2.2). Figure 17-5 shows the sort of thing
    you can expect to see in your browser when you connect to the Node-RED server.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_491_0.png)


    The idea behind Node-RED is that you draw your program (called a flow) rather
    than write code. To do this, you drag nodes onto the editor area and then connect
    them together. For example, Figure 17-5 shows a minimal flow with two Raspberry
    Pi pins linked together. One pin acts as an input and might be connected to a
    switch (let’s'
  merge: -1
  pgno: 491
- img_proc: true
  md: 'pick GPIO 25 as an example), and the other is connected to an LED (let’s assume
    GPIO 18). You can accomplish this using a Squid LED and button as in Recipe 17.1.


    The node on the left, labeled PIN 22, is the input (connected to the switch on
    GPIO 25), and PIN 12 is the output (connected to the LED on GPIO 18). Node-RED
    uses the pin positions (where the top left pin is pin 1, its neighbor to the right
    is pin 2, and so on) rather than the GPIO names.


    To create this flow in your editor, scroll down the list of nodes on the left
    until you get to the Raspberry Pi section. Drag the “rpi gpio” node that has a
    Raspberry Pi icon on the left side to the editor area. This will be the input.
    Double-click it to open the window shown in Figure 17-6. Select “22 - GPIO25”
    and click Done.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_492_0.png)


    Figure 17-6. Selecting GPIO25 in Node-RED


    Next, select the other “rpi gpio” node type (with the Raspberry Pi icon on the
    right) and drag it to the editor area, and then double-click it to open the window
    shown in Figure 17-6; this time select “12 - GPIO18,” and click Done.


    Link the two nodes together by dragging out from the round connector on the right
    of the input node, so that the flow looks like Figure 17-5.'
  merge: -1
  pgno: 492
- img_proc: true
  md: 'Assuming that you have a push switch and LED connected to your Raspberry Pi,
    you can now run this flow by clicking the Deploy button. The LED should light,
    and when you press the button on the switch connected to your Raspberry Pi, the
    LED should turn off. The logic of this is inverted, but let''s leave that for
    now. We revisit this in the next chapter, where you learn a lot more about Node-RED.


    This is all very neat, but as yet it does not have much to do with the IoT. This
    is where some of the other node types of Node-RED come into play. If you browse
    the list, you''ll find all sorts of nodes, including the Tweet node. You can connect
    this node as a second output to the PIN 22 node, so that the flow now looks like
    Figure 17-7. Double-click the Tweet node to configure it with your Twitter credentials.
    Now when you press the button, a tweet will be sent.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_493_0.png)


    Figure 17-7. Sending tweets from Node-RED


    # Discussion


    Node-RED is an extremely powerful system, and consequently, becoming familiar
    with all its features and its odd quirks will take some time. As well as creating
    direct flows like the one we made here, you can also introduce switching code
    (like an *if* statement) and functions that transform the messages being passed
    between the nodes.'
