    \n在 MicroPython 中，sleep 函数位于 utime 模块中，而不是普通 Python 中使用的 time 模块。然而，它在这里的作用相同，即暂停半秒钟。\n\
    \n# 讨论\n\n所有 GPIO 引脚的总电流预算为 50mA。也就是说，当你将连接到 GPIO 引脚的所有设备的电流相加时，不应超过 50mA。LED\
