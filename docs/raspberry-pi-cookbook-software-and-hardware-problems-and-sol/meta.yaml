    # Discussion


    The VL53L1X ToF sensor is an amazing little device that contains a low-power infrared
    laser and receiver as well as all the electronics needed to communicate over I2C.


    The module works on a similar principle to that of the ultrasonic range finder
    of Recipe 14.19, except that instead of gauging distance by measuring the time
    it takes for sound to travel to a target and back as a reflection, the ToF sensor
    measures the time it takes for a pulse of laser light to bounce back from a target.


    # See Also


    To measure distance using ultrasonics, see Recipe 14.19.


    See the datasheet for the VL53L1X.


    # 14.21 Adding Touch Sensing to Your Raspberry Pi


    # Problem


    You want to provide a touch interface to your Raspberry Pi.


    # Solution


    Use an Adafruit Capacitive Touch HAT (Figure 14-29).


    Touch sensors are a lot of fun and are great for educational use. You can attach
    anything that conducts even just a little bit of electricity—including fruit.
    A popular project is to construct a fruit keyboard using alligator clips to attach
    a variety of fruits and vegetables to the sense terminals on the board. Then,
    as you touch the different pieces of fruit, different sounds are made.


    The Adafruit Capacitive Touch HAT uses the Raspberry Pi’s I2C interface. You also
    need SPI tools installed so, if you have not already done so, follow Recipes 10.4
    and 10.6.'
