    For more information on how *if* statements work, see [Recipe 5.20](Recipe 5.20).


    For more information on toggle switches, see [https://oreil.ly/uDigs](https://oreil.ly/uDigs).


    For the most basic switch recipe, see [Recipe 13.1](Recipe 13.1).'
