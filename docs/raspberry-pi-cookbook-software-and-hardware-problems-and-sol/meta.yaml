- img_proc: true
  md: 'When you run the client program on macOS or a PC, you''ll be asked to enter
    the IP address of the VNC server to which you want to connect (the IP address
    of your Pi).

    You are then prompted for your password (Figure 2-17).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_81_0.png)


