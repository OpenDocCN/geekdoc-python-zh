    # 12.1 Controlling Servomotors


    # Problem


    You want to use a Raspberry Pi to control the position of a servomotor.


    # Solution


    Use pulse-width modulation (PWM) to control the width of pulses to a servomotor
    to change its angle. Although this will work, the PWM generated is not completely
    stable, so there will be a little bit of jitter with the servo. For alternative
    solutions that produce much more stable pulse timing, see Recipes 12.2 and 12.3.


    If you have a Raspberry Pi 1, you should power the servo from a separate 5V power
    supply because peaks in the load current are very likely to crash or overload
    the Raspberry Pi. If you have a Raspberry Pi B+ or newer, improvements in the
    onboard voltage regulation mean that you might get away with powering small servos
    directly from the 5V pin on the general-purpose input/output (GPIO) port.


    Figure 12-2 shows a small 9g servo (see “Miscellaneous” on page 567) working quite
    happily with a Raspberry Pi B+.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_339_0.png)


    The leads of the servo are usually colored so that the 5V wire is red, the ground
    is brown, and the control lead is orange. The 5V and ground leads are connected
    to the'
