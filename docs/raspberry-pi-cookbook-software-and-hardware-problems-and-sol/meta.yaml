    \nTensorFlow和Edge Impulse需要使用树莓派4或400。此外，你还需要一个连接到树莓派的网络摄像头（或树莓派摄像头模块）和一个麦克风。USB网络摄像头上的麦克风就可以正常工作（只需插入即可），或者你可以使用USB麦克风，如声音项目中的配方16.6所述。\n\
