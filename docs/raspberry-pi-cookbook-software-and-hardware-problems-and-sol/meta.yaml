    ```

    >>> a

    [''best'', ''it'', ''of'', ''the'', ''times'', ''was'']

    ```


    The sort command uses the standard Python comparison operators. This means that
    for strings, list elements will be sorted alphabetically in ascending order.


    # Discussion


    When you sort a list, you''re actually modifying it rather than returning a sorted
    copy of the original list. This means that if you also need the original list,
    you need to use the copy command in the standard library to make a copy of the
    original list before sorting it:


    ```

    >>> from copy import copy

    >>> a = ["it", "was", "the", "best", "of", "times"]

    >>> b = copy(a)

    >>> b.sort()

    >>> a

    [''it'', ''was'', ''the'', ''best'', ''of'', ''times'']

    >>> b

    [''best'', ''it'', ''of'', ''the'', ''times'', ''was'']

    >>>

    ```


    The copy module is required to be able to copy objects. You can find out more
    about modules in Recipe 7.11.


    # 6.11 Cutting Up a List


    # Problem


    You need to make a sublist of a list, using a range of the original list''s elements.


    # Solution


    Use the [:] Python construction. The following example returns a list containing
    the elements of the original list from index position 1 to index position 2 (the
    number after the : is exclusive—that is, elements up to but not including element
    2:


    ```

    >>> l = ["a", "b", "c", "d"]

    >>> l[1:3]

    [''b'', ''c'']

    ```


    Note that the character positions start at 0 (not at 1), so a position of 1 means
    the second character in the string, and 3 means the fourth; however, the character
    range is exclusive at the high end, so the letter d is not included in this example.'
