    \n### 另请参阅\n\n要直接从命令行播放声音，请参见配方16.4。\n\n你还可以使用pygame来拦截按键（配方13.11）和鼠标移动（配方13.12）。\n\
    \n## 16.6 使用USB麦克风\n\n### 问题\n\n你想将麦克风连接到树莓派以捕获声音。\n\n### 解决方案\n\n使用如图16-7所示的USB麦克风，或USB网络摄像头的麦克风，或一些更坚固、质量更好的设备。\n\
    \n这些设备有各种形状和尺寸。有些可以直接插入USB插座，有些带有USB连接线，有些是耳机的一部分。\n\n插入USB麦克风后，通过运行以下命令检查树莓派操作系统是否识别它，该命令列出可用于录音的设备：\n\
    \n```\n$ arecord -l\n**** List of CAPTURE Hardware Devices ****\ncard 1: H340\
    \ [Logitech USB Headset H340], device 0: USB Audio [USB Audio]\n  Subdevices:\
    \ 1/1\n  Subdevice #0: subdevice #0\n```\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_478_0.png)\n\
    \n图16-7. 将USB麦克风连接到树莓派\n\n在这种情况下，我使用的是Logitech USB耳机的一部分麦克风。如前面的输出所示，这是卡1，子设备0。在录制声音时，我们需要这些信息。\n\
    \n要使麦克风处于活动状态，你需要右键单击屏幕右上角的扬声器图标。然后从音频输入列表中选择你的USB麦克风设备，如图16-8所示。这里我们选择的是USB网络摄像头的麦克风。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_479_0.png)\n\n图16-8. 选择麦克风作为音频设备\n\n\
    现在你可以尝试从命令行进行录音，然后播放。要录音，请使用以下命令：\n\n```\n$ arecord -d 3 test.wav\n```\n\n`-d`参数指定录音的持续时间（以秒为单位）。要播放刚刚录制的声音，请使用以下命令：\n\
