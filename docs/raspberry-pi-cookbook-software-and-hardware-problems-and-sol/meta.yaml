  md: "```\nresponse = \"<script>\"\nresponse += \"function changed(led)\"\nresponse\
    \ += \"{}\"\nresponse += \"  window.location.href='/' + led\"\nresponse += \"\
    }\"\nresponse += \"</script>\"\n```\n\nWe need to also generate the HTML that\
    \ will eventually call this script when a button is clicked. Rather than repeat\
    \ the HTML for each of the web page buttons, this is generated by the function\
    \ html_for_led:\n\n```\ndef html_for_led(led):\n    i = str(led)\n    result =\
    \ \" <input type='button' onClick='changed(\" + i + \")'\"\n    value ='LED \"\
    \ + i + \"'/>\n    return result\n```\n\nThis code is used three times, once for\
    \ each button, and links a button click with the changed function. The function\
    \ is also supplied with the LED number as its parameter.\n\nThe process of reporting\
    \ the state of the button tests to see whether the button is clicked and reports\
    \ the appropriate HTML.\n\n# See Also\n\nFor more information on using bottle,\
    \ see the [bottle documentation](https://bottlepy.org/docs/dev/).\n\n# 17.2 Displaying\
    \ Sensor Readings on a Web Page\n\n# Problem\n\nYou want to display sensor readings\
