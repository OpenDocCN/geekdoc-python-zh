  md: '# CHAPTER 8

    Computer Vision


    # 8.0 Introduction


    Computer vision (CV) allows your Raspberry Pi to “see” things. In practical terms,
    this means that your Raspberry Pi can analyze an image, look for items of interest,
    and even recognize faces and text.


    If you connect a Raspberry Pi to a camera to supply the images, all sorts of possibilities
    open up. This theme is continued in Chapter 9 where we take this a stage further
    into the realm of machine learning.


    # 8.1 Installing OpenCV


    # Problem


    You want to install OpenCV computer vision software on your Raspberry Pi.


    # Solution


    To install OpenCV, first install the prerequisite packages and update the NumPy
    Python library using these commands:


    ```

    $ sudo apt install libatlas-base-dev

    $ pip3 install --upgrade pip

    $ pip3 install imutils

    $ pip3 install numpy --upgrade

    ```


    Then install OpenCV itself using:


    ```

    $ pip3 install opencv-python

    ```'
  merge: -1
  pgno: 246
- img_proc: true
  md: 'After installation is complete, you can check that everything is working by
    starting Python 3, importing cv2, and checking the version:


    ```

    $ python3

    Python 3.9.2 (default, Mar 12 2021, 04:06:34)

    [GCC 10.2.1 20210110] on linux

    Type "help", "copyright", "credits" or "license" for more information.

    >>> import cv2

    >>> cv2.__version__

    ''4.6.0''

    >>> exit()

    ```


    Note that __version__ is the word “version” with two underscore characters on
    each side.


    # Discussion


    Computer vision is both processor and memory intensive, so although OpenCV will
    just about work on an older Raspberry Pi, it can be slow on anything earlier than
    a Raspberry Pi 2. And if you plan to try out the recipes in Chapter 9, you will
    need at least a Pi 4 or 400.


    # See Also


    The first recipe in this chapter to use OpenCV is Recipe 8.4. It contains useful
    details for getting started with OpenCV.


    # 8.2 Setting Up a USB Camera for Computer Vision


    # Problem


    You want to set up a USB webcam for use in computer vision (CV) projects.


    # Solution


    Use a USB webcam that is compatible with the Raspberry Pi. Choose a good-quality
    camera. If you are working on a project for which you need the camera close to
    the subject, select one that has a manual focus option. For getting really close
    to the subject, a low-cost USB endoscope can be useful.


    Depending on your CV project, you might want to set up a well-lighted area. Figure
    8-1 shows a simple light box made from a translucent plastic storage box that
    is illuminated from the sides and top to give even lighting. The webcam is attached
    to a hole in the top of the box. This arrangement is used in Recipe 8.4.'
