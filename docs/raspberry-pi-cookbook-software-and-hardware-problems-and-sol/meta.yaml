    # Discussion


    The example uses a pair of buttons, and when you press one, it disables itself
    and enables its counterpart. It also uses gpiozero to change the state of the
    output pin using the on() and off() methods. This example would work just the
    same if we used the line pin = LED(18) rather than pin = DigitalOutputDevice(18),
    but using DigitalOutputDevice keeps things more generic. After all, you could
    be controlling anything from pin 18, not just an LED.


    # See Also


    You can also use this program to control a high-power DC device (Recipe 11.4),
    a relay (Recipe 11.5), or a high-voltage AC device (Recipe 11.7).


    For more information on guizero, see Recipe 7.22.


    # 11.10 Making a User Interface to Control PWM Power for LEDs and Motors


    # Problem


    You want to make an application to run on the Raspberry Pi that has a slider to
    control power to a device using pulse-width modulation (PWM).


    # Solution


    Using the gpiozero and guizero user interface framework, write a Python program
    that uses a slider to change the PWM duty cycle between 0 and 100% (Figure 11-14).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_331_0.png)'
  - "[PAGE 332]\n\nYou'll need to connect an LED or some other kind of output device\
    \ to GPIO pin 18 that is capable of responding to a PWM signal. Using an LED (Recipe\
    \ 11.1) is the easiest option to start with.\n\nOpen an editor and paste in the\
    \ following code (the name of the file is *ch_11_gui_slider.py*):\n\n```\nfrom\
    \ gpiozero import PWMOutputDevice\nfrom guizero import App, Slider\n\npin = PWMOutputDevice(18)\n\
    \ndef slider_changed(percent):\n    pin.value = int(percent) / 100\n\napp = App(title='PWM',\
    \ width=500, height=150)\nslider = Slider(app, command=slider_changed, width='fill',\
    \ height=50)\nslider.text_size = 30\napp.display()\n```\n\nAs with all the program\
    \ examples in this book, you can download the code for this recipe (see Recipe\
    \ 3.22).\n\nRun the program using the following command:\n\n```\n$ python3 gui_slider.py\n\
    ```\n\n# Discussion\n\nThe example program uses the Slider class. The command\
    \ option runs the slider_changed command every time the value of the slider is\
    \ changed. This updates the value of the output pin. The parameter to the slider_changed\
    \ function is a string, even though it contains a number between 0 and 100, so\
    \ int is used to convert it into a number, and then the percent value has to be\
    \ divided by 100 to give a value between 0 and 1 for the PWM output.\n\n# See\
    \ Also\n\nYou can use this program to control an LED (Recipe 11.1), a DC motor\
    \ (Recipe 12.4), or a high-power DC device (Recipe 11.4).\n\n# 11.11 Making a\
    \ User Interface to Change the Color of an RGB LED\n\n# Problem\n\nYou want to\
    \ control the color of an RGB LED."
- md: "## Solution\n\nUse PWM to control the power to each of the red, green, and\
    \ blue channels of an RGB LED.\n\nTo make this recipe, you will need the following:\n\
    \n- Breadboard and jumper wires (see “Prototyping Equipment and Kits” on page\
    \ 564)\n- Three 470Ω resistors (see “Resistors and Capacitors” on page 565)\n\
    - RGB common cathode LED (see “OptoElectronics” on page 566)\n\nFigure 11-15 shows\
    \ how you can connect your RGB LED on a breadboard. Make sure that the LED is\
    \ the correct way around; the longest lead should be the second lead from the\
    \ top of the breadboard. This connection is called the *common cathode* because\
    \ the negative connections (cathodes) of the red, green, and blue LEDs within\
    \ the LED case have all their negative sides connected together to reduce the\
    \ number of pins needed in the package.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_333_0.png)\n\
    \n*Figure 11-15. Using an RGB LED with a Raspberry Pi*\n\nAn alternative to using\
    \ a breadboard (avoiding fiddly resistors) is to use a Raspberry Squid (see Recipe\
    \ 10.10).\n\nThe upcoming program has three sliders to control the red, green,\
    \ and blue channels of the LED (Figure 11-16).\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_334_0.png)\n\
    \nFigure 11-16. User interface for controlling an RGB LED\n\nOpen an editor and\
    \ paste in the following code from the file ch_11_gui_slider_RGB.py:\n\n```python\n\
    from gpiozero import RGBLED\nfrom guizero import App, Slider\nfrom colorzero import\
    \ Color\n\nrgb_led = RGBLED(18, 23, 24)\n\nred = 0\ngreen = 0\nblue = 0\n\ndef\
    \ red_changed(value):\n    global red\n    red = int(value)\n    rgb_led.color\
    \ = Color(red, green, blue)\n\ndef green_changed(value):\n    global green\n \
    \   green = int(value)\n    rgb_led.color = Color(red, green, blue)\n\ndef blue_changed(value):\n\
    \    global blue\n    blue = int(value)\n    rgb_led.color = Color(red, green,\
    \ blue)\n\napp = App(title='RGB LED', width=500, height=400)\n\nSlider(app, command=red_changed,\
    \ end=255, width='fill', height=50).text_size = 30\nSlider(app, command=green_changed,\
    \ end=255,\n    width='fill', height=50).text_size = 30\nSlider(app, command=blue_changed,\
    \ end=255,\n    width='fill', height=50).text_size = 30\n\napp.display()\n```\n\
    \nAs with all the program examples in this book, you can download the code for\
    \ this recipe (see Recipe 3.22).\n\n## Discussion\n\nThe code is similar in operation\
    \ to the control for a single PWM channel, described in Recipe 11.10. However,\
    \ in this case, you need three PWM channels and three sliders, one for each color.\n\
    \nThe type of RGB LED used here is a common cathode. If you have the common anode\
    \ type, you can still use it, but connect the common anode to the 3.3V pin on\
    \ the GPIO connector. You will find that the slider is reversed, so a setting\
    \ of 255 becomes *off* and 0 becomes full *on*.\n\nWhen you are selecting an LED\
    \ for this project, LEDs labeled “diffused” are best because they allow the colors\
    \ to be mixed better.\n\n## See Also\n\nIf you want to control just one PWM channel,\
    \ see Recipe 11.10.\n\n## 11.12 Using an Analog Meter as a Display\n\n### Problem\n\
    \nYou want to connect an analog panel voltmeter to a Raspberry Pi.\n\n### Solution\n\
    \nAssuming you have a 5V voltmeter, you can use a PWM output to drive the meter\
    \ directly, connecting the negative side of the meter to GND and the positive\
    \ side to a GPIO pin (Figure 11-17). If the meter is the common 5V kind, you’ll\
    \ only be able to display voltages up to 3.3V.\n\nIf you want to use almost the\
    \ full range of a 5V voltmeter, you’ll need a transistor to act as a switch for\
    \ the PWM signal and a 1kΩ resistor to limit the current to the base of the transistor.\n\
    \nTo make this recipe, you’ll need the following:\n\n- 5V panel meter (see “Miscellaneous”\
    \ on page 567)\n- Breadboard and jumper wires (see “Prototyping Equipment and\
    \ Kits” on page 564)\n- Two 1kΩ resistors (see “Resistors and Capacitors” on page\
    \ 565)\n- Transistor 2N3904 (see “Transistors and Diodes” on page 565)\n\nFigure\
    \ 11-18 shows the breadboard layout for this.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_336_0.png)\n\
    \nFigure 11-17. Connecting a voltmeter directly to a GPIO pin\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_337_0.png)\n\
    \nFigure 11-18. Using a 5V panel meter with 3.3V GPIO\n\n### Discussion\n\nTo\
    \ test the voltmeter, use the same program as you did for controlling the brightness\
    \ of the LED in Recipe 11.10.\n\nYou will probably notice that the needle gives\
    \ a steady reading at either end of the scale, but everywhere else it jitters\
    \ a bit. This is a side effect of the way the PWM signals are generated. For a\
    \ steadier result, you can use external PWM hardware like the 16-channel module\
    \ used in Recipe 12.3.\n\n### See Also\n\nFor more information about how old-fashioned\
    \ voltmeters work, see Wikipedia.\n\nFor more information on using a breadboard\
    \ and jumper wires with the Raspberry Pi, see Recipe 10.9.\n\n## CHAPTER 12\n\
    Motors\n\n## 12.0 Introduction\n\nIn this chapter, you will investigate the use\
    \ of different types of motors with the Raspberry Pi. This includes DC motors,\
    \ servomotors, and stepper motors.\n\nMotors come in all shapes and sizes (Figure\
    \ 12-1). The most common is the simple brushed DC motor that you might find in\
    \ a toy car. In this chapter, we will also look at servomotors, where the position\
    \ of the motor’s shaft is set using pulses generated by the Raspberry Pi, and\
    \ at stepper motors, which don’t rotate smoothly, but, as the name suggests, in\
    \ tiny steps, as their coils are energized in sequence.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_338_0.png)\n\
    \nFigure 12-1. A selection of motors\n\n## 12.1 Controlling Servomotors\n\n###\
    \ Problem\n\nYou want to use a Raspberry Pi to control the position of a servomotor.\n\
    \n### Solution\n\nUse pulse-width modulation (PWM) to control the width of pulses\
    \ to a servomotor to change its angle. Although this will work, the PWM generated\
    \ is not completely stable, so there will be a little bit of jitter with the servo.\
    \ For alternative solutions that produce much more stable pulse timing, see Recipes\
    \ 12.2 and 12.3.\n\nIf you have a Raspberry Pi 1, you should power the servo from\
    \ a separate 5V power supply because peaks in the load current are very likely\
    \ to crash or overload the Raspberry Pi. If you have a Raspberry Pi B+ or newer,\
    \ improvements in the onboard voltage regulation mean that you might get away\
    \ with powering small servos directly from the 5V pin on the general-purpose input/output\
    \ (GPIO) port.\n\nFigure 12-2 shows a small 9g servo (see “Miscellaneous” on page\
    \ 567) working quite happily with a Raspberry Pi B+.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_339_0.png)\n\
    \nThe leads of the servo are usually colored so that the 5V wire is red, the ground\
    \ is brown, and the control lead is orange. The 5V and ground leads are connected\
    \ to the GPIO header 5V and GND pins, and the control lead is connected to pin\
    \ 18. The connections are made with female-to-male header leads.\n\nIf you are\
    \ using a separate power supply, a breadboard is a good way of keeping all the\
    \ leads together.\n\nIn this case, you will need the following:\n\n- 5V servomotor\
    \ (see “Miscellaneous” on page 567)\n- Breadboard and jumper wires (see “Prototyping\
    \ Equipment and Kits” on page 564)\n- 1kΩ resistor (see “Resistors and Capacitors”\
    \ on page 565)\n- 5V 1A power supply or 4.8V battery pack (see “Miscellaneous”\
    \ on page 567)\n\nFigure 12-3 shows the breadboard layout for this.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_340_0.png)\n\
    \nThe 1kΩ resistor is not essential, but it does protect the GPIO pin from unexpectedly\
    \ high currents in the control signal, which could occur if a fault developed\
    \ on the servo.\n\nYou can, if you prefer, power the servo from a battery pack\
    \ rather than a power supply. Using a four-cell AA battery holder with rechargeable\
    \ batteries will provide around 4.8V and work well with a servo. Using four alkali\
    \ AA cells to provide 6V will be fine for many servos, but check the datasheet\
    \ of your servo to make sure it is OK with 6V.\n\nThe user interface for setting\
    \ the angle of the servo is based on the *ch_11_gui_slider.py* program, which\
    \ is intended for controlling the brightness of an LED (Recipe 11.10). However,\
    \ you can modify it so that the slider sets the angle to be between –90 and 90\
    \ degrees (Figure 12-4).\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_341_0.png)\n\
    \nOpen an editor and paste in the following code (the file is called *ch_12_servo.py*):\n\
    \n```python\nfrom gpiozero import AngularServo\nfrom guizero import App, Slider\n\
    \nservo = AngularServo(18, min_pulse_width=0.5/1000, max_pulse_width=2.5/1000)\n\
    \ndef slider_changed(angle):\n    servo.angle = int(angle)\n\napp = App(title='Servo\
    \ Angle', width=500, height=150)\nslider = Slider(app, start=-90, end=90, command=slider_changed,\
    \ width='fill',\n               height=50)\nslider.text_size = 30\napp.display()\n\
    ```\n\nAs with all the program examples in this book, you can download this code\
    \ (see Recipe 3.22).\n\nNote that this program uses a graphical user interface,\
    \ so you can't run it from SSH or the Terminal. You must run it from the windowing\
    \ environment on the Pi itself or via remote control using virtual network computing\
    \ (VNC) (Recipe 2.8).\n\nThe gpiozero class AngularServo takes care of all the\
    \ pulse generation. It just leaves us to specify the angle to which we want the\
    \ servo arm to position itself. Pretty much all other software that works with\
    \ servomotors specifies angles of between 0 and 180 degrees, where 0 is as far\
    \ as the servo arm can go to one side, 90 is in the middle, and 180 is as far\
    \ as it can go to the other side. The gpiozero library does things differently,\
    \ and probably more logically, by referring to the center position as 0 and to\
    \ the angles on one side as negative and on the other side as positive."
  mdcn: "## 解决方案\n\n使用脉宽调制（PWM）来控制RGB LED的红、绿、蓝三个通道的功率。\n\n要制作此配方，你需要以下物品：\n\n- 面包板和跳线（参见第564页的“原型设备与套件”）\n\
    - 三个470Ω电阻（参见第565页的“电阻与电容”）\n- RGB共阴极LED（参见第566页的“光电器件”）\n\n图11-15展示了如何在面包板上连接你的RGB\
    \ LED。请确保LED的方向正确；最长的引脚应位于面包板顶部的第二个引脚位置。这种连接方式被称为*共阴极*，因为LED封装内红、绿、蓝LED的负极（阴极）都连接在一起，以减少封装所需的引脚数量。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_333_0.png)\n\n*图11-15. 将RGB LED与树莓派配合使用*\n\
    \n使用面包板的替代方案（避免繁琐的电阻）是使用Raspberry Squid（参见配方10.10）。\n\n接下来的程序有三个滑块，用于控制LED的红、绿、蓝通道（图11-16）。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_334_0.png)\n\n图11-16. 控制RGB LED的用户界面\n\
    \n打开一个编辑器，并从文件`ch_11_gui_slider_RGB.py`中粘贴以下代码：\n\n```python\nfrom gpiozero import\
    \ RGBLED\nfrom guizero import App, Slider\nfrom colorzero import Color\n\nrgb_led\
    \ = RGBLED(18, 23, 24)\n\nred = 0\ngreen = 0\nblue = 0\n\ndef red_changed(value):\n\
    \    global red\n    red = int(value)\n    rgb_led.color = Color(red, green, blue)\n\
    \ndef green_changed(value):\n    global green\n    green = int(value)\n    rgb_led.color\
    \ = Color(red, green, blue)\n\ndef blue_changed(value):\n    global blue\n   \
    \ blue = int(value)\n    rgb_led.color = Color(red, green, blue)\n\napp = App(title='RGB\
    \ LED', width=500, height=400)\n\nSlider(app, command=red_changed, end=255, width='fill',\
    \ height=50).text_size = 30\nSlider(app, command=green_changed, end=255,\n   \
    \ width='fill', height=50).text_size = 30\nSlider(app, command=blue_changed, end=255,\n\
    \    width='fill', height=50).text_size = 30\n\napp.display()\n```\n\n与本书中所有的程序示例一样，你可以下载此配方的代码（参见配方3.22）。\n\
    \n## 讨论\n\n该代码的操作方式与配方11.10中描述的单个PWM通道控制类似。然而，在这种情况下，你需要三个PWM通道和三个滑块，每个颜色一个。\n\
    \n这里使用的RGB LED类型是共阴极。如果你有共阳极类型，你仍然可以使用它，但需要将共阳极连接到GPIO连接器的3.3V引脚。你会发现滑块是反向的，因此设置为255时变为*关闭*，0时变为完全*开启*。\n\
    \n在为这个项目选择LED时，标记为“漫射”的LED是最好的，因为它们能更好地混合颜色。\n\n## 另请参阅\n\n如果你想只控制一个PWM通道，请参见配方11.10。\n\
    \n## 11.12 使用模拟表作为显示器\n\n### 问题\n\n你想将一个模拟面板电压表连接到树莓派。\n\n### 解决方案\n\n假设你有一个5V电压表，你可以使用PWM输出直接驱动该表，将电压表的负极连接到GND，正极连接到GPIO引脚（图11-17）。如果电压表是常见的5V类型，你将只能显示最高3.3V的电压。\n\
    \n如果你想使用5V电压表的几乎全部量程，你需要一个晶体管作为PWM信号的开关，以及一个1kΩ电阻来限制流向晶体管基极的电流。\n\n要制作此配方，你需要以下物品：\n\
    \n- 5V面板表（参见第567页的“杂项”）\n- 面包板和跳线（参见第564页的“原型设备与套件”）\n- 两个1kΩ电阻（参见第565页的“电阻与电容”）\n\
    - 晶体管2N3904（参见第565页的“晶体管与二极管”）\n\n图11-18展示了此项目的面包板布局。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_336_0.png)\n\
    \n图11-17. 将电压表直接连接到GPIO引脚\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_337_0.png)\n\
    \n图11-18. 将5V面板表与3.3V GPIO配合使用\n\n### 讨论\n\n要测试电压表，请使用与配方11.10中控制LED亮度相同的程序。\n\
    \n你可能会注意到，指针在刻度的两端给出稳定的读数，但在其他地方会有些抖动。这是PWM信号生成方式的一个副作用。为了获得更稳定的结果，你可以使用外部PWM硬件，例如配方12.3中使用的16通道模块。\n\
    \n### 另请参阅\n\n有关老式电压表工作原理的更多信息，请参见维基百科。\n\n有关将面包板和跳线与树莓派配合使用的更多信息，请参见配方10.9。\n\
    \n## 第12章\n电机\n\n## 12.0 简介\n\n在本章中，你将研究将不同类型的电机与树莓派配合使用。这包括直流电机、伺服电机和步进电机。\n\n\
    电机有各种形状和尺寸（图12-1）。最常见的是你可能在玩具车中找到的简单有刷直流电机。在本章中，我们还将研究伺服电机，其电机轴的位置使用树莓派生成的脉冲来设置；以及步进电机，它们不像名字暗示的那样平滑旋转，而是随着线圈依次通电而以微小的步进旋转。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_338_0.png)\n\n图12-1. 各种电机\n\n## 12.1\
    \ 控制伺服电机\n\n### 问题\n\n你想使用树莓派来控制伺服电机的位置。\n\n### 解决方案\n\n使用脉宽调制（PWM）来控制发送到伺服电机的脉冲宽度，以改变其角度。虽然这可行，但生成的PWM并不完全稳定，因此伺服电机会有轻微的抖动。有关产生更稳定脉冲时序的替代解决方案，请参见配方12.2和12.3。\n\
    \n如果你使用的是树莓派1，你应该使用单独的5V电源为伺服电机供电，因为负载电流的峰值很可能会导致树莓派崩溃或过载。如果你使用的是树莓派B+或更新型号，板载电压调节的改进意味着你可能可以直接从通用输入输出（GPIO）端口的5V引脚为小型伺服电机供电。\n\
    \n图12-2展示了一个小型9g伺服电机（参见第567页的“杂项”）与树莓派B+配合使用，工作得相当愉快。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_339_0.png)\n\
    \n伺服电机的引线通常有颜色区分，5V线为红色，地线为棕色，控制线为橙色。5V和地线连接到GPIO排针的5V和GND引脚，控制线连接到引脚18。连接使用的是母对公排针线。\n\
    \n如果你使用单独的电源，面包板是将所有引线固定在一起的好方法。\n\n在这种情况下，你需要以下物品：\n\n- 5V伺服电机（参见第567页的“杂项”）\n\
    - 面包板和跳线（参见第564页的“原型设备与套件”）\n- 1kΩ电阻（参见第565页的“电阻与电容”）\n- 5V 1A电源或4.8V电池组（参见第567页的“杂项”）\n\
    \n图12-3展示了此项目的面包板布局。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_340_0.png)\n\n\
    1kΩ电阻不是必需的，但它确实可以保护GPIO引脚免受控制信号中意外高电流的影响，如果伺服电机发生故障，可能会出现这种情况。\n\n如果你愿意，你可以使用电池组而不是电源为伺服电机供电。使用带有可充电电池的四节AA电池盒将提供约4.8V，并且与伺服电机配合良好。使用四节碱性AA电池提供6V对许多伺服电机来说是可以的，但请检查你的伺服电机数据表以确保它适用于6V。\n\
    \n设置伺服电机角度的用户界面基于*ch_11_gui_slider.py*程序，该程序旨在控制LED的亮度（配方11.10）。然而，你可以修改它，使滑块设置的角度在-90到90度之间（图12-4）。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_341_0.png)\n\n打开一个编辑器并粘贴以下代码（文件名为*ch_12_servo.py*）：\n\
    \n```python\nfrom gpiozero import AngularServo\nfrom guizero import App, Slider\n\
    \nservo = AngularServo(18, min_pulse_width=0.5/1000, max_pulse_width=2.5/1000)\n\
    \ndef slider_changed(angle):\n    servo.angle = int(angle)\n\napp = App(title='Servo\
    \ Angle', width=500, height=150)\nslider = Slider(app, start=-90, end=90, command=slider_changed,\
    \ width='fill',\n               height=50)\nslider.text_size = 30\napp.display()\n\
    ```\n\n与本书中所有的程序示例一样，你可以下载此代码（参见配方3.22）。\n\n请注意，此程序使用图形用户界面，因此你无法从SSH或终端运行它。你必须从树莓派本身的窗口环境运行它，或通过虚拟网络计算（VNC）进行远程控制（配方2.8）。\n\
    \ngpiozero类`AngularServo`负责所有的脉冲生成。它只需要我们指定希望伺服臂定位到的角度。几乎所有其他与伺服电机配合使用的软件都指定0到180度之间的角度，其中0是伺服臂能到达的一侧最远位置，90是中间位置，180是能到达的另一侧最远位置。gpiozero库的做法不同，可能更合乎逻辑，它将中心位置称为0，一侧的角度为负，另一侧的角度为正。"
