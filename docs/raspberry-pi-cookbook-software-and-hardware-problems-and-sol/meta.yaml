    \ starting Python 3, importing cv2, and checking the version:\n\n```\n$ python3\n\
    Python 3.9.2 (default, Mar 12 2021, 04:06:34)\n[GCC 10.2.1 20210110] on linux\n\
    Type \"help\", \"copyright\", \"credits\" or \"license\" for more information.\n\
    >>> import cv2\n>>> cv2.__version__\n'4.6.0'\n>>> exit()\n```\n\nNote that `__version__`\
    \ is the word “version” with two underscore characters on each side.\n\n## Discussion\n\
    \nComputer vision is both processor and memory intensive, so although OpenCV will\
    \ just about work on an older Raspberry Pi, it can be slow on anything earlier\
    \ than a Raspberry Pi 2. And if you plan to try out the recipes in Chapter 9,\
    \ you will need at least a Pi 4 or 400.\n\n## See Also\n\nThe first recipe in\
    \ this chapter to use OpenCV is Recipe 8.4. It contains useful details for getting\
    \ started with OpenCV.\n\n## 8.2 Setting Up a USB Camera for Computer Vision\n\
    \n### Problem\n\nYou want to set up a USB webcam for use in computer vision (CV)\
    \ projects.\n\n### Solution\n\nUse a USB webcam that is compatible with the Raspberry\
    \ Pi. Choose a good-quality camera. If you are working on a project for which\
    \ you need the camera close to the subject, select one that has a manual focus\
    \ option. For getting really close to the subject, a low-cost USB endoscope can\
    \ be useful.\n\nDepending on your CV project, you might want to set up a well-lighted\
    \ area. Figure 8-1 shows a simple light box made from a translucent plastic storage\
    \ box that is illuminated from the sides and top to give even lighting. The webcam\
    \ is attached to a hole in the top of the box. This arrangement is used in Recipe\
    \ 8.4.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_248_0.png)\n\nFigure 8-1. Using\
    \ a homemade light box for even illumination\n\nYou can also buy commercial *light\
    \ tents*, designed for photography, that work well. You might need a little trial\
    \ and error to get your system brightly and evenly illuminated. Shadows can be\
    \ particularly problematic.\n\n### Discussion\n\nYou can test out your USB camera\
    \ from the OpenCV console. Start Python 3 and then enter the following commands:\n\
    \n```\n$ python3\nPython 3.9.2 (default, Mar 12 2021, 04:06:34)\n[GCC 10.2.1 20210110]\
    \ on linux\nType \"help\", \"copyright\", \"credits\" or \"license\" for more\
    \ information.\n>>> import cv2\n>>> from imutils.video import VideoStream\n>>>\
    \ vs = VideoStream(src=0).start()\n>>> img = vs.read()\n>>> cv2.imshow('image',img)\n\
    >>> cv2.waitKey(0)\n```\n\nA window should open showing an image from your camera\
    \ after the last line of code is entered. You may have to close the entire Terminal\
    \ window to get the image window to close.\n\nIn OpenCV, even single images are\
    \ just taken as frames from a video stream. Notice that on the third line you\
    \ previously entered, we have `src=0`. This means the first camera that OpenCV\
    \ can find. So, if you have multiple cameras, you can use a different number here.\n\
    \nOnce the image has been read using `vs.read()`, you can use OpenCV's `imshow`\
    \ utility method to display the image. You will find that you use this a lot to\
    \ debug your computer vision projects.\n\nThe final `cv2.waitKey(0)` is required\
    \ to allow OpenCV to actually render the image in the background until a key is\
    \ pressed.\n\n### See Also\n\nTo use a Raspberry Pi Camera Module with OpenCV,\
    \ see Recipe 8.3.\n\n## 8.3 Using a Raspberry Pi Camera Module for Computer Vision\n\
    \n### Problem\n\nYou want to use a Raspberry Pi Camera Module that connects directly\
    \ to your Raspberry Pi with OpenCV.\n\n### Solution\n\nThe Raspberry Pi Camera\
    \ Module should automatically show up as a camera device once you have followed\
    \ Recipe 1.16 to install it.\n\nHaving installed the camera, you can now try the\
    \ following commands to make sure that it's working:\n\n```\n$ python3\nPython\
    \ 3.9.2 (default, Mar 12 2021, 04:06:34)\n[GCC 10.2.1 20210110] on linux\nType\
    \ \"help\", \"copyright\", \"credits\" or \"license\" for more information.\n\
    >>> import cv2\n>>> from imutils.video import VideoStream\n>>> vs = VideoStream(src=0).start()\n\
    >>> img = vs.read()\n>>> cv2.imshow('image',img)\n>>> cv2.waitKey(0)\n```\n\n\
    ### Discussion\n\nNote that in early versions of Raspberry Pi OS, you had to install\
    \ a *driver* to make the camera module available to OpenCV; if OpenCV doesn't\
    \ detect the camera module, try updating your Raspberry Pi OS to the latest version\
    \ (Recipe 3.40).\n\n### See Also\n\n- See Recipe 1.16 for information on installing\
    \ the Raspberry Pi Camera Module.\n- See http://picamera.readthedocs.org for information\
    \ on the picamera Python module.\n- To use a USB camera with OpenCV, see Recipe\
    \ 8.2.\n\n## 8.4 Counting Coins\n\n### Problem\n\nYou want to use computer vision\
    \ to count the number of coins in your webcam's view.\n\n### Solution\n\nUse OpenCV's\
    \ *Hough Circles* detector to provide a real-time count of the number of coins\
    \ placed within view of the webcam. Hough Circles will detect any type of circles,\
    \ and works well detecting most coins.\n\nThis is one use of CV for which you\
    \ really need good lighting and a camera fixed in position. I used the setup shown\
    \ in Figure 8-1.\n\nThe critical part of many computer vision projects is getting\
    \ the parameters right and this recipe is no exception. For this reason, before\
    \ using the final program that just gives a count of coins, we will use a test\
    \ program that draws outlines around the coins, so that we can see what's going\
    \ on.\n\nYou can find the code for this example, as well as the other examples\
    \ in this recipe, with the downloads for the book (see Recipe 3.22). The program\
    \ is called `ch_08_coin_count_test.py`.\n\nPut some coins under your camera and\
    \ run the program. A window like that in Figure 8-2 should appear.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_251_0.png)\n\
    \nFigure 8-2. Counting coins\n\nIf you are lucky, your coins will all have circles\
    \ around them, and you should see output in the console like this:\n\n```\n$ python3\
    \ ch_08_coin_count_test.py\n[[[380.5 338.5 37.9]\n  [553.5 249.5 34.9]\n  [538.5\
    \ 357.5 31.4]\n  [546.5 442.5 30.7]\n  [418.5 244.5 33.1]]]\n```\n\nTo refresh\
    \ the image, press any key; when you want to exit the program, press the X key.\n\
    \nIf your coins are not all circled, you'll need to adjust some parameters (`param1`,\
    \ `param2`, `minRadius`, and `maxRadius`) in the program `ch_08_coin_count_test.py`:\n\
    \n```python\nimport cv2\nfrom imutils.video import VideoStream\nfrom imutils import\
    \ resize\n\nvs = VideoStream(src=0).start()\n\nwhile True:\n    img = vs.read()\n\
    \    img = resize(img, width=800)\n    img = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\n\
    \    img = cv2.blur(img, (3, 3))\n\n    detected_circles = cv2.HoughCircles(img,\n\
    \        cv2.HOUGH_GRADIENT, 1, 20, param1 = 50,\n        param2 = 30, minRadius\
    \ = 15, maxRadius = 100)\n\n    print(detected_circles)\n\n    for pt in detected_circles[0]:\n\
    \        a, b, r = pt[0], pt[1], pt[2]\n        cv2.circle(img, (int(a), int(b)),\
    \ int(r), (0, 255, 0), 2)\n\n    cv2.imshow('image', img)\n    key = cv2.waitKey(0)\n\
    \    cv2.destroyAllWindows()\n    if key == ord('x'):\n        break\n\nvs.stop()\n\
    ```\n\nYou should not need to change the parameter `param1`. If you are interested\
    \ in what it and the other parameters do, you can read about them at https://oreil.ly/3AmKn.\n\
    \nIf you are getting a lot of false circles, try increasing the value of `param2`.\
    \ But the most likely parameters in need of change are `minRadius` and `maxRadius`,\
    \ as these will be sensitive to the resolution of your camera, its lens focal\
    \ length, and the distance to the coins. So if no coins are circled, increase\
    \ the value of `maxRadius`.\n\nTweak the parameters until your coins are being\
    \ correctly identified.\n\n### Discussion\n\nHere’s a quick run-through of how\
    \ the test program works.\n\nMost of the code lives in a `try` block within the\
    \ `while True:` block. This ensures that when you press Ctrl-C to quit the program,\
    \ the video stream is stopped.\n\nAfter reading the image, there are a couple\
    \ of processing stages. First, the image is resized to a width of 800 pixels,\
    \ then converted to grayscale, and finally a blur filter is applied. The blur\
    \ filter helps improve the circle matching.\n\nThe call to `cv.HoughCircles` returns\
    \ an array of the circles that OpenCV has found. The three values are the x and\
    \ y coordinates of the center of the circle and the circle’s radius.\n\nTo render\
    \ these circles on top of the image of the coins, a `for` loop is used to iterate\
    \ over each of the detected circles and then the `cv2.circle` method is used to\
    \ draw a black (0, 0, 0) circle 2 pixels wide around each coin."
