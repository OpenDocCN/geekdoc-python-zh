    \ 0x01) # Start\nbus.write_byte_data(i2c_address, 0x0E, 0x00) # 2g range\n\ntime.sleep(0.5)\n\
    \ndef read_acc():\n    data = bus.read_i2c_block_data(i2c_address, 0x00, 7)\n\
    \    x = (data[1] * 256 + data[2]) / 16\n    if x > 2047 :\n        x -= 4096\n\
