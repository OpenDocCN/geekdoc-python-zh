    \ 数组中查找该行和列对应的按键名称。如果没有检测到按键，则返回 `key` 的默认值（0）。\n\n主 `while` 循环仅获取按键值并打印出来。`sleep`\
    \ 命令用于减缓输出速度。\n\n## 另请参阅\n\n添加键盘的另一种替代方案是直接使用 USB 键盘；这样你只需捕获按键即可，具体方法如配方 13.11\
    \ 所述。\n\n## 13.9 检测移动\n\n### 问题\n\n你希望在检测到移动时，在 Python 中触发某些操作。\n\n### 解决方案\n\n\
    使用被动红外（PIR）运动检测器模块。\n\n制作此配方，你需要以下物品：\n\n-   公对公跳线（参见第 564 页“原型设备与套件”）\n-   PIR\
    \ 运动检测器模块（参见第 566 页“模块”）\n\n图 13-14 展示了传感器模块的接线方式。该模块需要 5V 电源供电，输出为 3.3V，非常适合与树莓派配合使用。\n\
    \n> 确保你使用的 PIR 模块输出为 3.3V。如果其输出为 5V，则需要使用一对电阻将其降至 3.3V（参见配方 14.8）。\n\n打开编辑器，粘贴以下代码（`ch_13_pir.py`）：\n\
    \n```\nfrom gpiozero import MotionSensor\n\npir = MotionSensor(18)\n\nwhile True:\n\
    \    pir.wait_for_motion()\n    print(\"Motion detected!\")\n```\n\n与本书所有程序示例一样，你也可以下载此程序（参见配方\
    \ 3.22）。\n\n该程序仅打印 GPIO 输入 18 的状态：\n\n```\n$ python3 ch_13_pir.py\nMotion Detected\n\
    Motion Detected\n```\n\n### 讨论\n\n`gpiozero` 为 PIR 传感器提供了一个类 `MotionSensor`，因此我们不妨直接使用它。然而，这个类实际上除了将相关引脚作为数字输入进行监控外，并没有做其他任何事情。\n\
    \n当被触发时，PIR 传感器的输出会保持高电平一小段时间。你可以使用其电路板上的一个微调电位器（可变电阻）来调整这个时间。第二个微调电位器（如果存在）将设置禁用传感器的光照阈值。这在传感器用于控制灯光时非常有用——在检测到移动时打开灯，但仅在黑暗时才如此。\n\
    \n### 另请参阅\n\n更多详细信息请参阅 `MotionSensor` 的完整文档。\n\n你可以将此配方与配方 7.16 结合使用，在检测到入侵者时发送电子邮件，或者将其与\
    \ If This Then That (IFTTT) 集成，以提供多种可能的通知方式（参见配方 17.4）。\n\n要使用计算机视觉和网络摄像头检测移动，请参见配方\
    \ 8.6。\n\n## 13.10 为树莓派添加 GPS\n\n### 问题\n\n你想将一个串行 GPS 模块连接到移动的树莓派上，并使用 Python\
    \ 访问数据。\n\n### 解决方案\n\n一个输出为 3.3V 的串行 GPS 模块可以直接连接到树莓派的 RXD 接口。这意味着要使其工作，你必须遵循配方\
    \ 2.6。请注意，虽然你需要启用串行端口硬件，但不应启用串行控制台选项。\n\n图 13-15 展示了模块的接线方式。树莓派的 RXD 连接到 GPS 模块的\
    \ TX。唯一需要的其他连接是 GND 和电源，因此我们可以使用三个公对公排针。\n\n### 检查你的电压\n\n有些 GPS 模块需要 3.3V 的供电电压，而不是下图所示的\
    \ 5V。因此在连接前请务必检查。\n\n你可以使用 Minicom 查看原始 GPS 数据（参见配方 10.8）。使用以下 minicom 命令，可以在\
    \ `/dev/serial0` 设备上看到每秒出现一次的消息：\n\n```\n$ minicom -b 9600 -o -D /dev/serial0\n\
    Welcome to minicom 2.8\nOPTIONS: I18n\nPort /dev/serial0, 12:55:56\nPress CTRL-A\
    \ Z for help on special keys\n$GPGGA,120346.694,5342.6175,N,00239.7791,W,1,04,5.6,84.4,M,51.3,M,,0000*7A\n\
    $GPGSA,A,3,01,03,31,04,,,,,,,,,,6.9,5.6,4.0*3E\n$GPGSV,3,1,12,04,63,150,23,03,56,078,41,19,46,263,23,17,39,226,18*79\n\
    $GPGSV,3,2,12,09,37,197,20,06,36,302,20,01,26,134,13,31,20,048,31*74\n$GPGSV,3,3,12,12,08,327,14,21,06,136,,11,04,304,,25,04,001,*72\n\
    $GPRMC,120346.694,A,5432.6175,N,00139.7791,W,002.8,084.6,060922,,*A*7F\n```\n\n\
    如果你没有看到任何数据，请检查你的连接并确保串行端口硬件已启用。请注意，在没有 GPS 信号的室内测试 GPS 模块是否基本工作是可以的。但如果你想获得实际的\
    \ GPS 定位，你可能需要将树莓派带到室外，或者至少将 GPS 模块放在紧挨着窗户的地方。\n\n从前面的示例中可以看出，GPS 消息需要一些解码。好消息是，在\
    \ GPS 模块发出的各种消息中，相当容易找到实际的经纬度数字。在前面的示例中，你可以看到以 `$GPRMC` 开头的消息包含以逗号分隔的字段，其中第三个字段是一个数字（5432.6175）后跟一个字母（N\
    \ 或 S）。这是以百分之一度为单位的纬度。接下来的两个字段以类似方式显示经度。\n\n你可以在 *ch_13_gps_serial.py* 中找到一个从\
    \ Python 程序访问 GPS 数据的示例：\n\n```\nimport serial\n\nser = serial.Serial('/dev/serial0')\n\
    \nwhile True:\n    line = ser.readline().decode(\"utf-8\")\n    message = line.split(',')\n\
    \    if message[0] == '$GPRMC':\n        if message[2] == 'A':\n            lat\
    \ = message[3] + message[4]\n            lon = message[5] + message[6]\n     \
    \       print(F\"lat={lat} \\tlon={lon}\")\n        else:\n            print(\"\
    No fix\")\n```\n\n与本书所有程序示例一样，你也可以下载此程序（参见配方 3.22）。\n\n运行该程序，你应该会看到类似以下的输出。请记住，GPS\
    \ 模块可能需要一段时间才能获得定位：\n\n```\n$ python3 -i ch_13_gps_serial.py\nNo fix\nNo fix\n\
    lat=5432.6028N    lon=00139.0515W\nlat=5432.6028N    lon=00139.0514W\n```\n\n\
    ### 讨论\n\n该程序读取每条传入的消息，查找 `$GPRMC` 消息，然后将消息拆分为其组成部分。如果位置已知，结果列表的第二个元素将是 `A`。\n\
    \n如果位置已知，则纬度和经度是。\n\n### 另请参阅\n\n在 [GPS 消息](https://www.oreilly.com/library/view/raspberry-pi-cookbook/9781492048817/ch13.html#_gps_messages)\
    \ 中了解有关各字段含义的更多信息。\n\n有关使用 Python 进行 GPS 跟踪的有趣教程，请参见 [https://oreil.ly/tSVi6](https://oreil.ly/tSVi6)。\n\
    \n## 13.11 拦截按键\n\n### 问题\n\n你想拦截 USB 键盘或数字键盘上的单个按键。\n\n### 解决方案\n\n至少有两种方法可以解决这个问题。更直接的方法是使用\
    \ `sys.stdin.read` 函数。与另一种方法相比，它的优点是不需要运行 GUI，因此使用它的程序可以从 SSH 会话中运行。\n\n打开编辑器，粘贴以下代码（`ch_13_keys_sys.py`），运行程序，然后开始按一些键：\n\
    \n```\npython\nimport sys, tty, termios\n\ndef read_ch():\n    fd = sys.stdin.fileno()\n\
    \    old_settings = termios.tcgetattr(fd)\n    try:\n        tty.setraw(sys.stdin.fileno())\n\
    \        ch = sys.stdin.read(1)\n    finally:\n        termios.tcsetattr(fd, termios.TCSADRAIN,\
    \ old_settings)\n    return ch\n\nwhile True:\n    ch = read_ch()\n    if ch ==\
    \ 'x':\n        break\n    print(\"key is: \" + ch)\n```\n\n与本书所有程序示例一样，你也可以下载此程序（参见配方\
    \ 3.22）。要停止程序，请按 `x` 键。\n\n另一种替代方法是使用 `pygame`，这是一个用于编写游戏的 Python 库，也可用于检测按键。然后你可以使用它来执行某些操作。\n\
    \n以下示例程序（`ch_13_keys_pygame.py`）演示了如何使用 `pygame` 在每次按键时打印一条消息。但是，它仅在程序可以访问窗口系统时才有效，因此你需要使用\
    \ VNC（配方 2.8）运行它，或者直接在树莓派上运行："
