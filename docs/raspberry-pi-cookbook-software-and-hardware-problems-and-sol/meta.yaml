  md: "![](img/e36e77524aeaae366529d1cf02f9a39c_497_0.png)\n\nFigure 17-10. Finding\
    \ your API key\n\nThe Python program to send the web request is called `ch_17_ifttt_cpu_temp.py`:\n\
    \n```\npython\nimport time\nfrom gpiozero import CPUTemperature\nimport requests\n\
    \nMAX_TEMP = 33.0\nMIN_T_BETWEEN_WARNINGS = 60 # Minutes\n\nEVENT = 'cpu_too_hot'\n\
    BASE_URL = 'https://maker.ifttt.com/trigger/'\nKEY = 'your_key_here'\n\ndef send_notification(temp):\n\
    \    data = {'value1' : temp}\n    url = BASE_URL + EVENT + '/with/key/' + KEY\n\
    \    response = requests.post(url, json=data)\n    print(response.status_code)\n\
    \ndef cpu_temp():\n    cpu_temp = CPUTemperature().temperature\n    return cpu_temp\n\
    \nwhile True:\n```"
