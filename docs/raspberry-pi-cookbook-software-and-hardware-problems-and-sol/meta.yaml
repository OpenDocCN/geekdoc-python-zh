  md: '# CHAPTER 13

    Digital Inputs


    # 13.0 Introduction


    In this chapter, we look at recipes for using digital components such as switches
    and keypads. This chapter also covers modules that have a digital output that
    can be connected to a Raspberry Pi general-purpose input/output (GPIO) acting
    as an input.

    Many of the recipes require the use of a solderless breadboard and jumper wires
    (see Recipe 10.9).


    # 13.1 Connecting a Push Switch


    # Problem


    You want to connect a switch to your Raspberry Pi so that when you press it, some
    Python code is run.


    # Solution


    Connect a switch to a GPIO pin and use the gpiozero library in your Python program
    to detect the button press.'
