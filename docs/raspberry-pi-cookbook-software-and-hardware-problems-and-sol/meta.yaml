- img_proc: true
  md: 'On older versions of Raspberry Pi OS, or if you prefer the command line, use
    the raspi-config utility:


    ```

    $ sudo raspi-config

    ```


    Select Interfacing Options, followed by SPI, and then respond **Yes** before rebooting
    your Raspberry Pi. After the reboot, SPI will be available.


    # Discussion


    SPI allows serial transfer of data between the Raspberry Pi and peripheral devices,
    such as ADCs and port expander chips (for extra GPIO pins), among other devices.


    You can check that SPI is working with the following command:


    ```

    $ ls /dev/*spi*

    /dev/spidev0.0 /dev/spidev0.1

    ```


    If, instead of spidev0.0 and spidev0.1 being reported, nothing appears, it means
    that SPI is not enabled.


    # See Also


    We use an SPI analog-to-digital converter chip in [Recipe 14.7](Recipe 14.7).


    # 10.7 Installing pySerial for Access to the Serial Port from Python


    # Problem


    You want to use the serial port receive and transmit (RXD and TXD pins) on the
    Raspberry Pi using Python.


    # Solution


    First, enable the serial port using [Recipe 2.6](Recipe 2.6).


    Then, install the pyserial library:


    ```

    $ sudo pip3 install pyserial

    ```


    # Discussion


    The library is pretty easy to use. Create a connection by using the following
    syntax:


    ```

    ser = serial.Serial(DEVICE, BAUD)

    ```'
