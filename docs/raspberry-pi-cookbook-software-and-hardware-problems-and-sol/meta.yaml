    \ RP2040 板。\n\n表 19-3. RP2040 板\n\n| 名称 | 制造商 | 备注 |\n|---|---|---|\n| QTPy RP2040\
    \ | Adafruit | 一块微小的板，减少了 I/O 引脚数量，并配有 USB-C 连接器。 |\n| Feather RP2040 | Adafruit\
