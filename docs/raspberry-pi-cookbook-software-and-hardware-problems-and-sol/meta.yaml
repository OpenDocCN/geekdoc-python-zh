- img_proc: true
  md: "![](img/e36e77524aeaae366529d1cf02f9a39c_416_0.png)\n\nFigure 14-14. Reducing\
    \ the voltage of analog inputs\n\n> Never use this recipe to measure high-voltage\
    \ AC, or any type of AC for that matter. It is for low-voltage DC only.\n\nOpen\
    \ an editor and paste in the following code (ch_14_adc_scaled.py):\n\n```\nfrom\
    \ gpiozero import MCP3008\nimport time\n\nR1 = 10000.0\nR2 = 3300.0\nanalog_input\
    \ = MCP3008(channel=0)\n\nwhile True:\n    reading = analog_input.value\n    voltage_adc\
    \ = reading * 3.3\n    voltage_actual = voltage_adc / (R2 / (R1 + R2))\n    print(\"\
    Battery Voltage=\" + str(voltage_actual))\n    time.sleep(1)\n```\n\nAs with all\
    \ the program examples in this book, you can also download this program (see Recipe\
    \ 3.22)."
  merge: -1
  pgno: 416
- img_proc: true
  md: 'The program is very similar to that of Recipe 14.7. The main difference is
    the scaling, using the values of the two resistors, which are held in the variables
    R1 and R2.


    When you run the program, the battery voltage is displayed:


    ```

    $ python3 ch_14_adc_scaled.py

    Battery Voltage=8.62421875

    ```


    > Read the discussion carefully before attaching anything higher than 9V, or you
    might destroy the MCP3008.


    # Discussion


    This arrangement of resistors is called a *voltage divider* or sometimes a *potential
    divider* (Figure 14-15). The formula for calculating the output voltage, given
    the input voltage and the values of the two resistors, is as follows:


    ```

    Vout = Vin * R2 / (R1 + R2)

    ```


    ![](img/e36e77524aeaae366529d1cf02f9a39c_417_0.png)


    This means that if R1 and R2 were both the same value (say, 1kΩ), Vout would be
    half of Vin.


    When choosing R1 and R2, you also need to consider the current flowing through
    them. This will be Vin/(R1 + R2). In the preceding example, R1 is 10kΩ and R2
    is 3.3kΩ, so the current flowing will be 9V/13.3kΩ = 0.68mA. This is low, but
    still enough to eventually drain the battery, so do not leave it connected all
    the time.'
  merge: -1
