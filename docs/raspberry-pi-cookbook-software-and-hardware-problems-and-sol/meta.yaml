  md: '# CHAPTER 16

    Sound


    # 16.0 Introduction


    In this chapter, you learn how to use sound with your Raspberry Pi. There are
    recipes both for playing sounds in various ways—using loudspeakers or a buzzer—and
    for using a microphone to record sounds.


    # 16.1 Connecting a Loudspeaker


    # Problem


    You want to play sounds from your Raspberry Pi.


    # Solution


    Attach a powered speaker such as the one shown in Figure 16-1.

    Having attached the speaker to the audiovisual socket, you will also need to configure
    the Raspberry Pi to play through the audiovisual jack, not HDMI, using Recipe
    16.2.'
