  md: "```\n$ python3 02_write.py\nNew Text: Raspberry Pi\nNow scan a tag to write\n\
    written\n894922433952\nRaspberry Pi\nNew Text:\n```\n\nHaving written some text\
    \ onto the card, you can check whether it's there by using *01_read.py*. The code\
    \ for *02_write.py* is:\n\n```\nimport RPi.GPIO as GPIO\nimport SimpleMFRC522\n\
    \nreader = SimpleMFRC522.SimpleMFRC522()\n\ntry:\n    while True:\n        text\
    \ = input('New Text: ')\n        print(\"Now scan a tag to write\")\n        id,\
    \ text = reader.write(text)\n        print(\"written\")\n\n        print(id)\n\
    \        print(text)\nfinally:\n    print(\"cleaning up\")\n    GPIO.cleanup()\n\
    ```\n\nUsing the full features of an RFID card reader is pretty complex. The SimpleMFRC522\
    \ class greatly simplifies this process into basic reading and writing of text\
    \ to the card. After instantiating the SimpleMFRC522 class, you can just call\
    \ read to read from a card that is being scanned. This returns both the ID and\
    \ any text written on the card. The write method returns the same values, but\
    \ also allows you to specify the text to be written to the card.\n\n# Discussion\n\
    \nRFID tags are available in all sorts of shapes and sizes. But a number of different\
    \ standards are used that operate at different frequencies and use different communication\
    \ protocols, so when looking for cards to work with the RC-522, look for cards\
    \ described as 13.56 MHz. The SimpleMFRC522 code is also a bit fussy about the\
    \ cards it will work with, so if you plan to use it, also look for tags described\
    \ as being Mifare 1k compatible.\n\nBecause of the differences between what cards\
    \ can store in their memory and how they store it, it's often better not to rely\
    \ on storing data on the tag but rather to use the card's unique ID. You can then\
    \ store data against that unique key. The programs"
