- md: "You can think of a capacitor as a tank of electricity and, as it fills with\
    \ charge, the voltage across it increases. You can’t measure that voltage directly\
    \ because the Raspberry Pi doesn’t have an analog-to-digital converter (ADC).\
    \ However, you can time how long it takes for the capacitor to fill with charge\
    \ to the extent that it rises above the 1.65V or so that constitute a high digital\
    \ input. The speed at which the capacitor fills with charge depends on the value\
    \ of the variable resistor (Rt). The lower the resistance, the faster the capacitor\
    \ fills with charge and the voltage rises.\n\nTo be able to get a good reading,\
    \ you must also be able to empty the capacitor each time before you take a reading.\
    \ In Figure 14-2, connection A is used to charge the capacitor through Rc and\
    \ Rt, and connection B is used to discharge (empty) the capacitor through Rd.\
    \ The resistors Rc and Rd are used to prevent too much current from flowing through\
    \ the Raspberry Pi’s relatively fragile GPIO pins as the capacitor is charged\
    \ and discharged.\n\nThe steps involved in taking a reading are first to discharge\
    \ the capacitor through Rd and then to let it charge through Rc and Rt. To discharge\
    \ it, connection A (GPIO 18) is set to be an input, effectively disconnecting\
    \ Rc and Rt from the circuit. Connection B (GPIO 23) is then set to be a low output.\
    \ This is held there for 100 milliseconds to empty the capacitor.\n\nNow that\
    \ the capacitor is empty, you can start to allow charge to flow into it by setting\
    \ connection B to be an input (effectively disconnecting it) and then enabling\
    \ connection A to be a high output at 3.3V. Capacitor C will now begin to charge\
    \ through Rc and Rt.\n\nFigure 14-3 shows how a resistor and capacitor in this\
    \ kind of arrangement charge and discharge as the voltage is toggled between high\
    \ and low.\n\nYou can see that the voltage at the capacitor increases rapidly\
    \ at first but then trails off as the capacitor becomes full. Fortunately, you\
    \ are interested in the portion of the curve up until the capacitor reaches about\
    \ 1.65V, which is a fairly straight line, meaning that the time taken for the\
    \ voltage across the capacitor to rise to this point is roughly proportional to\
    \ the resistance of Rt and hence the position of the knob.\n\nThis approach is\
    \ not hugely accurate, but it is very low cost and easy to use. The inaccuracy\
    \ is largely because capacitors of a suitable value are accurate to only 10%.\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_400_0.png)\n\nFigure 14-3. Charging\
    \ and discharging a capacitor\n\n## See Also\n\nUsing a step response works well\
    \ with all kinds of resistive sensors for light (Recipe 14.2), temperature (Recipe\
    \ 14.3), and even gas detection (Recipe 14.4).\n\nFor more accurate measurements\
    \ of the trimpot position, see Recipe 14.7, in which the pot is used with an ADC.\n\
    \n## 14.2 Measuring Light\n\n### Problem\n\nYou want to measure light intensity\
    \ with a Raspberry Pi and a photoresistor.\n\n### Solution\n\nUse the same basic\
    \ recipe and code as Recipe 14.1, but replace the trimpot with a photoresistor.\n\
    \nTo make this recipe, you’ll need the following:\n\n- Breadboard and jumper wires\
    \ (see “Prototyping Equipment and Kits” on page 564)\n- Photoresistor or Phototransistor\
    \ (see “Resistors and Capacitors” on page 565)\n- Two 1kΩ resistors (see “Resistors\
    \ and Capacitors” on page 565)\n- 330 nF capacitor (see “Resistors and Capacitors”\
    \ on page 565)\n\nAll of these parts are included in the Project Box 1 kit for\
    \ Raspberry Pi from MonkMakes (see “Prototyping Equipment and Kits” on page 564).\n\
    \nFigure 14-4 shows the arrangement of components on the breadboard. If you are\
    \ using a phototransistor rather than a photoresistor, then the longer lead is\
    \ the negative lead and should go to row 4 of the breadboard.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_401_0.png)\n\
    \nUsing the same program as Recipe 14.1 (ch_14_resistance_meter.py), you will\
    \ see the output vary as you move your hand over the photoresistor/phototransistor\
    \ to cut out some of the light.\n\nNote that this program needs the PiAnalog library\
    \ to be installed (see Recipe 14.1).\n\nThis solution provides relatively reliable\
    \ readings of light levels. As an adaptation of the general solution for using\
    \ resistive sensors (Recipe 14.1), it also copes with measuring a resistance of\
    \ 0Ω without any risk of damaging the GPIO pins of the Raspberry Pi.\n\n### Discussion\n\
    \nA photoresistor is a resistor whose resistance varies depending on the amount\
    \ of light coming through its transparent window. The brighter the light, the\
    \ lower the resistance. Typically, the resistance varies from about 1kΩ in bright\
    \ light up to perhaps 100kΩ in complete darkness.\n\nA phototransistor works in\
    \ a similar way, conducting more as more light falls on it. But unlike the photoresistor,\
    \ the phototransistor has a positive and negative and won't work if connected\
    \ the wrong way around.\n\n### See Also\n\nYou could also use an ADC with the\
    \ photoresistor or phototransistor (Recipe 14.7).\n\n## 14.3 Measuring Temperature\
    \ with a Thermistor\n\n### Problem\n\nYou want to measure temperature using a\
    \ thermistor.\n\n### Solution\n\nA thermistor is a resistor whose resistance varies\
    \ with temperature. Use the step response method (Recipe 14.1) to measure the\
    \ resistance of the thermistor and then calculate the temperature.\n\nTo make\
    \ this recipe, you will need the following:\n\n- Breadboard and jumper wires (see\
    \ “Prototyping Equipment and Kits” on page 564)\n- 1k thermistor (see “Resistors\
    \ and Capacitors” on page 565)\n- Two 1kΩ resistors (see “Resistors and Capacitors”\
    \ on page 565)\n- 330 nF capacitor (see “Resistors and Capacitors” on page 565)\n\
    \nAll of these parts are included in the Project Box 1 kit for Raspberry Pi from\
    \ MonkMakes (see “Prototyping Equipment and Kits” on page 564). When you get your\
    \ thermistor, make sure that you know its values of Beta and R0 (resistance at\
    \ 25°C) and that it is a negative temperature coefficient (NTC) device.\n\nFigure\
    \ 14-5 shows the breadboard layout for this recipe.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_403_0.png)\n\
    \nFigure 14-5. Breadboard layout for using a thermistor\n\nNote that this program\
    \ needs the PiAnalog library to be installed (see Recipe 14.1).\n\nThe following\
    \ code (ch_14_thermistor.py) illustrates the use of the PiAnalog module:\n\n```\n\
    from PiAnalog import *\nimport time\n\np = PiAnalog()\n\nwhile True:\n    print(p.read_temp_c())\n\
    \    time.sleep(1)\n```\n\nAs with all the program examples in this book, you\
    \ can also download this program (see Recipe 3.22).\n\nWhen you run the program,\
    \ you will see a series of temperature measurements in degrees Celsius. To convert\
    \ to degrees Fahrenheit, change the code p.read_temp_c() to p.read_temp_f():\n\
    \n```\n$ python3 ch_14_thermistor.py\n18.735789861164392\n19.32060395712483\n\
    20.2694035007122\n21.03181169007422\n21.26640936199749\n```\n\n### Discussion\n\
    \nCalculating the temperature from the resistance of the thermistor requires some\
    \ fairly hairy math using logarithms called the Steinhart-Hart equation. This\
    \ equation needs to know two things about the thermistor: its resistance at 25°C\
    \ (called R0) and a constant for the thermistor called Beta, or sometimes just\
    \ B. If you use a different thermistor, you will need to plug these values into\
    \ the code when you call read_temp_c. For example:\n\n```\nread_temp_c(self, B=3800.0,\
    \ R0=1000.0)\n```\n\nNote that a capacitor typically has an accuracy of only 10%,\
    \ and thermistors are similarly inaccurate in their value of R0, so do not expect\
    \ massively accurate results.\n\n### See Also\n\nTo measure temperature using\
    \ a TMP36, see Recipe 14.10.\n\nTo measure temperature using a digital temperature\
    \ sensor (DS18B20), see Recipe 14.13.\n\nTo measure temperature using a Sense\
    \ HAT, see Recipe 14.12.\n\n## 14.4 Detecting Methane\n\n### Problem\n\nYou want\
    \ to measure gas levels using a methane sensor.\n\n### Solution\n\nLow-cost resistive\
    \ gas sensors are available that can easily be wired to a Raspberry Pi to detect\
    \ gases such as methane. You can use the step response method that you first used\
    \ in Recipe 14.1.\n\nTo make this recipe, you’ll need the following:\n\n- Breadboard\
    \ and jumper wires (see “Prototyping Equipment and Kits” on page 564)\n- Methane\
    \ sensor (see “Modules” on page 566)\n- Two 1kΩ resistors (see “Resistors and\
    \ Capacitors” on page 565)\n- 330 nF capacitor (see “Resistors and Capacitors”\
    \ on page 565)\n\nThe sensor contains a heating element that requires 5V at up\
    \ to 150mA. The Raspberry Pi is capable of providing this as long as its power\
    \ supply can provide the extra 150mA.\n\nThe sensor module has rather thick legs—too\
    \ thick to fit into breadboard holes. One way around this is to solder short lengths\
    \ of solid core wire to each lead (Figure 14-6). Another is to buy SparkFun’s\
    \ gas sensor breakout board, which will allow you to plug the sensor in directly."
  mdcn: "你可以将电容器想象成一个电荷罐，随着它被电荷填满，其两端的电压会升高。你无法直接测量该电压，因为树莓派没有模数转换器（ADC）。然而，你可以计时电容器充电到足以超过约1.65V（构成高电平数字输入）所需的时间。电容器充电的速度取决于可变电阻（Rt）的值。电阻越低，电容器充电越快，电压上升也越快。\n\
    \n为了获得良好的读数，你还必须能够在每次读数前将电容器放电。在图14-2中，连接A用于通过Rc和Rt为电容器充电，连接B用于通过Rd放电（清空）电容器。电阻Rc和Rd用于防止在电容器充放电过程中，过大的电流流过树莓派相对脆弱的GPIO引脚。\n\
    \n读取读数的步骤是：首先通过Rd使电容器放电，然后让它通过Rc和Rt充电。要放电，将连接A（GPIO 18）设置为输入，这实际上断开了Rc和Rt与电路的连接。然后将连接B（GPIO\
    \ 23）设置为低电平输出。保持此状态100毫秒以清空电容器。\n\n现在电容器已清空，你可以开始允许电荷流入它：将连接B设置为输入（实际上断开它），然后使连接A成为3.3V的高电平输出。电容器C现在将开始通过Rc和Rt充电。\n\
    \n图14-3显示了在这种配置下的电阻和电容器，当电压在高电平和低电平之间切换时，它们是如何充电和放电的。\n\n你可以看到，电容器两端的电压最初迅速增加，但随着电容器充满，电压上升速度会减慢。幸运的是，你感兴趣的是电容器达到约1.65V之前的曲线部分，这部分相当接近直线，这意味着电容器两端电压上升到该点所需的时间大致与Rt的电阻成正比，因此也与旋钮的位置成正比。\n\
    \n这种方法精度不是非常高，但它成本极低且易于使用。不准确主要是因为合适值的电容器精度仅为10%。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_400_0.png)\n\
    \n图14-3. 电容器的充电和放电\n\n## 另请参阅\n\n使用阶跃响应方法适用于各种电阻式传感器，用于测量光线（配方14.2）、温度（配方14.3），甚至气体检测（配方14.4）。\n\
    \n要更精确地测量微调电位器的位置，请参阅配方14.7，其中电位器与ADC一起使用。\n\n## 14.2 测量光线\n\n### 问题\n\n你想使用树莓派和光敏电阻测量光强度。\n\
    \n### 解决方案\n\n使用与配方14.1相同的基本配方和代码，但将微调电位器替换为光敏电阻。\n\n要制作此配方，你需要以下物品：\n\n- 面包板和跳线（参见第564页“原型设备和套件”）\n\
    - 光敏电阻或光电晶体管（参见第565页“电阻和电容器”）\n- 两个1kΩ电阻（参见第565页“电阻和电容器”）\n- 330 nF电容器（参见第565页“电阻和电容器”）\n\
    \n所有这些部件都包含在MonkMakes的树莓派项目盒1套件中（参见第564页“原型设备和套件”）。\n\n图14-4显示了面包板上组件的布局。如果你使用的是光电晶体管而不是光敏电阻，那么较长的引脚是负极引脚，应连接到面包板的第4行。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_401_0.png)\n\n使用与配方14.1相同的程序（ch_14_resistance_meter.py），当你将手在光敏电阻/光电晶体管上方移动以遮挡部分光线时，你会看到输出发生变化。\n\
    \n请注意，此程序需要安装PiAnalog库（参见配方14.1）。\n\n此解决方案提供了相对可靠的光强度读数。作为使用电阻式传感器通用解决方案（配方14.1）的改编，它也能处理测量0Ω电阻的情况，而不会损坏树莓派的GPIO引脚。\n\
    \n### 讨论\n\n光敏电阻是一种电阻，其电阻值会根据通过其透明窗口的光量而变化。光线越强，电阻越低。通常，电阻在强光下约为1kΩ，在完全黑暗时可能高达100kΩ。\n\
    \n光电晶体管的工作方式类似，照射在其上的光线越多，导电性越强。但与光敏电阻不同，光电晶体管有正负极之分，如果接反则无法工作。\n\n### 另请参阅\n\n\
    你也可以将光敏电阻或光电晶体管与ADC一起使用（配方14.7）。\n\n## 14.3 使用热敏电阻测量温度\n\n### 问题\n\n你想使用热敏电阻测量温度。\n\
    \n### 解决方案\n\n热敏电阻是一种电阻值随温度变化的电阻器。使用阶跃响应方法（配方14.1）测量热敏电阻的电阻，然后计算温度。\n\n要制作此配方，你需要以下物品：\n\
    \n- 面包板和跳线（参见第564页“原型设备和套件”）\n- 1k热敏电阻（参见第565页“电阻和电容器”）\n- 两个1kΩ电阻（参见第565页“电阻和电容器”）\n\
    - 330 nF电容器（参见第565页“电阻和电容器”）\n\n所有这些部件都包含在MonkMakes的树莓派项目盒1套件中（参见第564页“原型设备和套件”）。当你拿到热敏电阻时，确保你知道它的Beta值和R0值（25°C时的电阻），并且它是一个负温度系数（NTC）器件。\n\
    \n图14-5显示了此配方的面包板布局。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_403_0.png)\n\n\
    图14-5. 使用热敏电阻的面包板布局\n\n请注意，此程序需要安装PiAnalog库（参见配方14.1）。\n\n以下代码（ch_14_thermistor.py）演示了PiAnalog模块的使用：\n\
    \n```\nfrom PiAnalog import *\nimport time\n\np = PiAnalog()\n\nwhile True:\n\
    \    print(p.read_temp_c())\n    time.sleep(1)\n```\n\n与本书中所有程序示例一样，你也可以下载此程序（参见配方3.22）。\n\
    \n运行程序时，你会看到一系列以摄氏度为单位的温度测量值。要转换为华氏度，请将代码`p.read_temp_c()`更改为`p.read_temp_f()`：\n\
    \n```\n$ python3 ch_14_thermistor.py\n18.735789861164392\n19.32060395712483\n\
    20.2694035007122\n21.03181169007422\n21.26640936199749\n```\n\n### 讨论\n\n根据热敏电阻的电阻计算温度需要使用一些相当复杂的数学运算，即称为Steinhart-Hart方程的对数运算。该方程需要知道热敏电阻的两个参数：其在25°C时的电阻（称为R0）和一个称为Beta（有时简称为B）的常数。如果你使用不同的热敏电阻，需要在调用`read_temp_c`时将这些值插入代码中。例如：\n\
    \n```\nread_temp_c(self, B=3800.0, R0=1000.0)\n```\n\n请注意，电容器的精度通常只有10%，热敏电阻的R0值同样不精确，因此不要期望获得极其精确的结果。\n\
    \n### 另请参阅\n\n要使用TMP36测量温度，请参阅配方14.10。\n\n要使用数字温度传感器（DS18B20）测量温度，请参阅配方14.13。\n\
    \n要使用Sense HAT测量温度，请参阅配方14.12。\n\n## 14.4 检测甲烷\n\n### 问题\n\n你想使用甲烷传感器测量气体浓度。\n\
    \n### 解决方案\n\n有现成的低成本电阻式气体传感器，可以轻松连接到树莓派以检测甲烷等气体。你可以使用在配方14.1中首次使用的阶跃响应方法。\n\n\
    要制作此配方，你需要以下物品：\n\n- 面包板和跳线（参见第564页“原型设备和套件”）\n- 甲烷传感器（参见第566页“模块”）\n- 两个1kΩ电阻（参见第565页“电阻和电容器”）\n\
    - 330 nF电容器（参见第565页“电阻和电容器”）\n\n该传感器包含一个加热元件，需要5V电压，电流可达150mA。只要树莓派的电源能够提供额外的150mA电流，它就能提供此电力。\n\
    \n传感器模块的引脚相当粗——太粗而无法插入面包板孔中。一种解决方法是将短段的实芯线焊接到每个引脚上（图14-6）。另一种方法是购买SparkFun的气体传感器分线板，它将允许你直接插入传感器。"
