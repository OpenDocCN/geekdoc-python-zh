    # Discussion


    Each LED in the strip can use a maximum of about 60mA. They will do this only
    if all three color channels (red, green, and blue) are at maximum brightness (255).
    If you plan to use a lot of LEDs, you’ll need to use a separate 5V power supply
    sufficient to supply all the LEDs in your strip. Figure 15-7 shows how you would
    wire up a separate power supply. A female direct current (DC) jack-to-screw terminal
    adapter (see “Prototyping Equipment and Kits” on page 564) makes it easy to connect
    an external power supply to a breadboard.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_465_0.png)


    # See Also


    NeoPixels are also available in [ring format](https://www.adafruit.com/category/35).


    You can read more about the Adafruit approach to NeoPixels at [https://oreil.ly/-oA90](https://oreil.ly/-oA90).


