    # 19.4 Using Digital Outputs on a Pico


    # Problem


    You want to use a digital output, perhaps to drive an LED, on the Raspberry Pi
    Pico or Pico W.


    # Solution


    Use the `Pin` class in the `machine` module of MicroPython and don''t draw more
    current than the total budget of 50mA for all pins. 1mA (milliamp) is one-thousandth
    of an ampere, the unit of current.


    Referring back to Figure 19-9, all of the GPIO pins can be used as digital outputs,
    although pins 12, 13, 14, 15, and 16 have the advantage of being near the end
    of the breadboard with more free rows nearby if the Pico is positioned at the
    top of the breadboard.


    We are going to attach an LED to pin 16 of the Pico (see Figure 19-10). The G
    (ground or GND) pin of the Pico is connected to the negative supply rail of the
    breadboard, which is also connected to the negative shorter lead of the LED. The
    positive end of the LED is connected to a 470Ω resistor that limits the current
    back to pin 16.'
