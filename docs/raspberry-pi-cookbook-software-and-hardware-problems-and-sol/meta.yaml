    \ of an existing class and add new member variables and methods.\n\nBy default,\
    \ all new classes that you create are subclasses of object. You can change this\
    \ by specifying the class you want to use as a superclass in parentheses after\
    \ the class name in a class definition. The following example defines a class\
    \ (Employee) as a subclass of Person and adds a new member variable (salary) and\
    \ an extra method (give_raise):\n\n```\nclass Employee(Person):\n\n    def __init__(self,\
    \ first_name, surname, tel, salary):\n        super().__init__(first_name, surname,\
    \ tel)\n        self.salary = salary\n\n    def give_raise(self, amount):\n  \
    \      self.salary = self.salary + amount\n```\n\nNote that the preceding example\
    \ is for Python 3. For Python 2, you can't use super the same way. Instead, you\
    \ must write the following:\n\n```\nclass Employee(Person):\n\n    def __init__(self,\
    \ first_name, surname, tel, salary):\n        Person.__init__(self, first_name,\
    \ surname, tel)\n        self.salary = salary\n\n    def give_raise(self, amount):\n\
    \        self.salary = self.salary + amount\n```\n\n# ## Discussion\n\nIn both\
    \ of these examples, the initializer method for the subclass first uses the initializer\
    \ method of the parent class (superclass) and then adds the member variable. This\
    \ has the advantage of not requiring you to repeat the initialization code in\
    \ the new subclass."
  - '[PAGE 218]


    # See Also


    See Recipe 7.4 for information on defining a class.


    The Python inheritance mechanism is very powerful and supports *multiple inheritance*,
    in which a subclass inherits from more than one superclass. For more on multiple
    inheritance, see the official documentation for Python.


    # 7.7 Writing to a File


    # Problem


    You need to write something to a file.


    # Solution


    Use the open, write, and close functions to open a file, write some data, and
    then close the file:


    ```

    >>> f = open(''test.txt'', ''w'')

    >>> f.write(''This file is not empty'')

    >>> f.close()

    ```


    # Discussion


    In the preceding example, the file has an extension of *txt*, implying a text
    file, but any file extension can be used here.


    Once you have opened the file, you can make as many writes to it as you like before
    closing it. Note that it is important to use close because although each write
    should update the file immediately, it might be buffered in memory and data could
    be lost. It could also leave the file locked so that other programs can''t open
    it.


    The open function takes two parameters. The first is the path to the file to be
    written. This can be relative to the current working directory or, if it starts
    with a /, an absolute path.


    The second (optional) parameter is the mode in which the file should be opened.
    If this is omitted, then read-only (r) mode is assumed. To overwrite an existing
    file or create the file with the name specified if it doesn''t already exist,
    use w. Table 7-1 shows the full list of file mode characters. You can combine
    these using +. For example, to open a file in read and binary mode, you would
    use this:


    ```

    >>> f = open(''test.txt'', ''r+b'')

    ```'
  - '[PAGE 219]


    Table 7-1. File modes


    | Mode | Description |

    | :--- | :--- |

    | r | Read |

    | w | Write |

    | a | Append to the end of an existing file rather than overwrite it |

    | b | Binary mode |

    | t | Text mode (default) |

    | + | A shortcut for r+w |


    Binary mode allows you to read or write binary streams of data, such as images,
    rather than text.


    # See Also


    To read the contents of a file, see Recipe 7.8.


    For more information on handling exceptions, see Recipe 7.10.


    # 7.8 Reading from a File


    # Problem


    You need to read the contents of a file into a string variable.


    # Solution


    To read a file''s contents, you need to use the file methods open, read, and close.
    The following example reads the entire contents of the file and assigns them to
    the variable s:


    ```

    f = open(''test.txt'')

    s = f.read()

    f.close()

    ```


    # Discussion


    You can also read text files one line at a time using the method readline.


    The preceding example will throw an exception if the file doesn''t exist or is
    not readable for some other reason. You can handle this by enclosing the code
    in a try/except construction, like so:'
  - "[PAGE 220]\n\n```\ntry:\n    f = open('test.txt')\n    s = f.read()\n    f.close()\n\
    except IOError:\n    print(\"Cannot open the file\")\n```\n\n# See Also\n\nTo\
    \ write things to a file, and for a list of file open modes, see Recipe 7.7.\n\
    \nFor more information on handling exceptions, see Recipe 7.10.\n\nTo parse JSON\
    \ data, see Recipe 7.20.\n\n# 7.9 Using Pickling to Save and Load Data in a File\n\
    \n# Problem\n\nYou want to save the entire contents of a data structure to a file\
    \ so that it can be read the next time the program is run.\n\n# Solution\n\nUse\
    \ the Python *pickling* feature to dump the data structure to file in a format\
    \ that can be automatically read back into memory as an equivalent data structure\
    \ later on.\n\nThe following example saves a complex list structure to a file\
    \ called *mylist.pickle*:\n\n```\n>>> import pickle\n>>> mylist = ['some text',\
    \ 123, [4, 5, True]]\n>>> f = open('mylist.pickle', 'wb')\n>>> pickle.dump(mylist,\
    \ f)\n>>> f.close()\n```\n\nTo *unpickle* the contents of the file into a new\
    \ list, use the following:\n\n```\n>>> f = open('mylist.pickle', 'rb')\n>>> other_array\
    \ = pickle.load(f)\n>>> f.close()\n>>> other_array\n['some text', 123, [4, 5,\
    \ True]]\n```\n\n# Discussion\n\nPickling will work on pretty much any data structure\
    \ you can throw at it. It doesn't need to be a list. The extension of the file\
    \ you pickle to doesn't matter either. Using *.pickle* makes sense, but you could\
    \ equally use *.txt* or *.pic*."
  - "[PAGE 221]\n\nThe file is saved in a binary format that is not human-readable;\
    \ you must open the file using the wb (write binary) option when writing the file\
    \ and the rb (read binary) option when reading the file.\n\n# See Also\n\nTo write\
    \ things to a file and for a list of file open modes, see Recipe 7.7.\n\nAn alternative\
    \ to pickling is to save your objects as JSON files as described in Recipe 7.21.\n\
    \n# 7.10 Handling Exceptions\n\n# Problem\n\nIf something goes wrong while a program\
    \ is running, you want to catch the error or exception and display a user-friendly\
    \ error message.\n\n# Solution\n\nUse Python's try/except construct.\n\nThe following\
    \ example, from Recipe 7.8, catches any problems when opening a file:\n\n```\n\
    try:\n    f = open('test.txt')\n    s = f.read()\n    f.close()\nexcept IOError:\n\
    \    print(\"Cannot open the file\")\n```\n\nSince you wrapped the potentially\
    \ error-prone commands to open the file in a try/except construction, any error\
    \ that occurs will be captured before it displays an error message, allowing you\
    \ to handle it in your own way. Here, this means displaying the friendly message\
    \ “Cannot open the file.”\n\n# Discussion\n\nA common situation in which runtime\
    \ exceptions can occur, in addition to during file access, is when you are accessing\
    \ a list and the index you are using is outside the bounds of the list. For example,\
    \ this happens if you try to access the fifth (index 4) element of a three-element\
    \ list:\n\n```\n>>> list = [1, 2, 3]\n>>> list[4]\nTraceback (most recent call\
    \ last):\n  File \"<stdin>\", line 1, in <module>\nIndexError: list index out\
    \ of range\n```"
  - "[PAGE 222]\n\nErrors and exceptions are arranged in a hierarchy, and you can\
    \ be as specific or general as you like when catching the exceptions.\n\nThe class\
    \ Exception is pretty near the top of that tree (most general) and will catch\
    \ almost any exception. You can also have separate except sections for catching\
    \ different types of exceptions and handling each in a different way. If you do\
    \ not specify any exception class, all exceptions will be caught by the except\
    \ command.\n\nPython also allows you to have else and finally clauses in your\
    \ error handling:\n\n```\nlist = [1, 2, 3]\ntry:\n    list[8]\nexcept:\n    print(\"\
    out of range\")\nelse:\n    print(\"in range\")\nfinally:\n    print(\"always\
    \ do this\")\n```\n\nThe else clause will be run if there is no exception, and\
    \ the finally clause will be run whether there is an exception or not.\n\nWhenever\
    \ an exception occurs, you can get more information about it by using the Exception\
    \ object, which is available only if you use the as keyword to put it in a variable,\
    \ as shown in the following example:\n\n```\n>>> list = [1, 2, 3]\n>>> try:\n\
    ...     list[8]\n... except Exception as e:\n...     print(\"out of range\")\n\
    ...     print(e)\n...\nout of range\nlist index out of range\n>>>\n```\n\nThis\
    \ enables you to handle the error in your own way, while keeping hold of the original\
    \ error message.\n\n# See Also\n\nSee the [official Python documentation](https://docs.python.org/3/library/exceptions.html)\
    \ for Python exception class hierarchy."
- md: "## 7.11 Using Modules\n\n### Problem\n\nYou want to use a Python module in\
    \ your program.\n\n### Solution\n\nUse the `import` command:\n\n```python\nimport\
    \ random\n```\n\n### Discussion\n\nA large number of modules (sometimes called\
    \ *libraries*) are available for Python. Many are included with Python as part\
    \ of the standard library, and others can be downloaded and installed into Python.\
    \ Standard Python libraries include modules for random numbers, database access,\
    \ various internet protocols, object serialization, and many other functions.\n\
    \nOne consequence of having so many modules is the potential for conflict—for\
    \ example, if two modules have a function of the same name. To avoid such conflicts,\
    \ specify how much of the module is accessible when importing a module.\n\nSo\
    \ if you just use a command like this:\n\n```python\nimport random\n```\n\nthere\
    \ is no possibility of a conflict because you will only be able to access functions\
    \ or variables in the module by prefixing them with `random` (e.g., `random.randint`).\
    \ Incidentally, you'll be meeting the `random` package in the next recipe.\n\n\
    If, on the other hand, you use the command in the following example, every function\
    \ or variable in the module will be accessible without your having to add anything\
    \ in front of it; unless you know what all the functions are in all the modules\
    \ you are using, there is a much greater chance of conflict:\n\n```python\nfrom\
    \ random import *\n```\n\nIn between these two extremes, you can explicitly specify\
    \ the components of a module that you need within a program so that they can be\
    \ conveniently used without any prefix.\n\nFor example:\n\n```python\n>>> from\
    \ random import randint\n>>> print(randint(1,6))\n2\n>>>\n```\n\nAnother option\
    \ is to use the `as` keyword to provide a more convenient or meaningful name for\
    \ the module when referencing it:\n\n```python\n>>> import random as R\n>>> R.randint(1,\
    \ 6)\n```\n\n### See Also\n\nThe Python Standard Library includes a definitive\
    \ list of all the [Python modules](https://docs.python.org/3/library/).\n\n##\
    \ 7.12 Generating Random Numbers\n\n### Problem\n\nYou need to generate a random\
    \ number within a range of numbers.\n\n### Solution\n\nUse the `random` library:\n\
    \n```python\n>>> import random\n>>> random.randint(1, 6)\n2\n>>> random.randint(1,\
    \ 6)\n6\n>>> random.randint(1, 6)\n5\n```\n\nThe number generated will be between\
    \ the two arguments (inclusive)—in this case, simulating a gaming die.\n\n###\
    \ Discussion\n\nThe numbers generated are not truly random but are what is known\
    \ as a *pseudo-random number sequence*; that is, they are a long sequence of numbers\
    \ that, when taken in a large enough quantity, show what statisticians call a\
    \ *random distribution*. For games, this is perfectly good enough, but if you\
    \ were generating lottery numbers, you would need to look at special randomizing\
    \ hardware. Computers are just plain bad at being random; it’s not really in their\
    \ nature.\n\nA common use of random numbers is to select something at random from\
    \ a list. You can do this by generating an index position and using that, but\
    \ there is also a command in the `random` module specifically for this. Try the\
    \ following example:\n\n```python\n>>> import random\n>>> random.choice(['a',\
    \ 'b', 'c'])\n'a'\n>>> random.choice(['a', 'b', 'c'])\n'b'\n>>> random.choice(['a',\
    \ 'b', 'c'])\n'a'\n```\n\nWhen making random selections like this, it's not uncommon\
    \ to prevent choices from repeating. For example, if you have already chosen 'a'\
    \ at random, it shouldn't be chosen again.\n\nOne way to do this is to take a\
    \ copy of your list and then, whenever you have selected an item from it, remove\
    \ that item so that it can't be chosen again. Here's how you could do that in\
    \ a small program that you can find with the book downloads (see Recipe 3.22);\
    \ this program is *ch_07_random.py*:\n\n```python\nimport random\nfrom copy import\
    \ copy\n\nlist = ['a', 'b', 'c']\n\nworking_list = copy(list)\nwhile len(working_list)\
    \ > 0 :\n    x = random.choice(working_list)\n    print(x)\n    working_list.remove(x)\n\
    ```\n\nRun the program, and it will display the list items, selected at random,\
    \ just once:\n\n```\n$ python3 ch_07_random.py\nb\nc\na\n```\n\nThe order is likely\
    \ to be different each time you run the program.\n\n### See Also\n\nSee [the official\
    \ reference for the random package](https://docs.python.org/3/library/random.html)\
    \ for more information on this.\n\n## 7.13 Making Web Requests from Python\n\n\
    ### Problem\n\nYou need to read the contents of a web page into a string using\
    \ Python.\n\n### Solution\n\nPython has an extensive library for making HTTP requests\
    \ called urllib (URL Library).\n\nThe following Python 3 example reads the contents\
    \ of the Google home page into the string contents:\n\n```python\nimport urllib.request\n\
    contents = urllib.request.urlopen(\"https://www.google.com/\").read()\nprint(contents)\n\
    ```\n\n### Discussion\n\nHaving read the HTML, you are then likely to want to\
    \ search it and extract the parts of the text that you really want. For this,\
    \ you will need to use the string manipulation functions (see Recipes 5.16 and\
    \ 5.17).\n\n### See Also\n\nFor more internet-related examples using Python, see\
    \ Chapter 17.\n\nWhen the web request returns JSON data, you can parse it using\
    \ Recipe 7.20.\n\n## 7.14 Specifying Command-Line Arguments in Python\n\n### Problem\n\
    \nYou want to run a Python program from the command line and pass it parameters.\n\
    \nRather than just run a Python program, you want to supply some extra parameters\
    \ to the program that the program can then use. For example:\n\n```\n$ python3\
    \ ch_07_cmdline.py a b c\n```\n\n### Solution\n\nImport `sys` and use its `argv`\
    \ variable, as shown in the following example. This returns a list, the first\
    \ element of which is the name of the program. The other elements are any parameters\
    \ (separated by spaces) that were typed on the command line after the program\
    \ name.\n\nThe code for this example and for the other examples in this book can\
    \ be downloaded (see Recipe 3.22); the program is called *ch_07_cmdline.py*:\n\
    \n```python\nimport sys\n\nfor (i, value) in enumerate(sys.argv):\n    print(F\"\
    arg: {i} {value}\")\n```\n\nRunning the program from the command line, with some\
    \ parameters after it, results in the following output:\n\n```\n$ python3 ch_07_cmdline.py\
    \ a b c\narg: 0 cmd_line.py\narg: 1 a\narg: 2 b\narg: 3 c\n```\n\n### Discussion\n\
    \nBeing able to specify command-line arguments can be useful for automating the\
    \ running of Python programs, either at startup (Recipe 3.23) or on a timed basis\
    \ (Recipe 3.25).\n\n### See Also\n\nFor basic information on running Python from\
    \ the command line, see Recipe 5.6.\nTo print out `argv`, we used list enumerations\
    \ (Recipe 6.8).\nVisit the Python documentation for an alternative and more advanced\
    \ way to use command-line arguments.\n\n## 7.15 Running Linux Commands from Python\n\
    \n### Problem\n\nYou want to run a Linux command or program from your Python program.\n\
    \n### Solution\n\nUse the `system` command.\nFor example, to delete a file called\
    \ *myfile.txt* in the directory from which you started Python, you could do the\
    \ following:\n\n```python\nimport os\nos.system(\"rm myfile.txt\")\n```\n\n###\
    \ Discussion\n\nSometimes rather than just execute a command blindly, as in the\
    \ preceding example, you need to capture the response of the command. Let's say\
    \ you wanted to use the `hostname` command to find the IP address (see Recipe\
    \ 2.2) of the Raspberry Pi. In this case, you can use the `check_output` function\
    \ in the `subprocess` library:\n\n```python\nimport subprocess\nip = subprocess.check_output(['hostname',\
    \ '-I'])\n```\n\nThe variable `ip` will contain the IP address of the Raspberry\
    \ Pi. Unlike `system`, `check_output` requires the command itself and any parameters\
    \ to be supplied as separate elements of a list.\n\n### See Also\n\nFor documentation\
    \ on the OS library, see [https://oreil.ly/1LL8G](https://oreil.ly/1LL8G).\n\n\
    For more information on the subprocess library, see [https://oreil.ly/HVBq](https://oreil.ly/HVBq).\n\
    \nIn Recipe 15.7, you’ll find an example that uses subprocess to display the IP\
    \ address, hostname, and time of your Raspberry Pi on an ePaper display.\n\n##\
    \ 7.16 Sending Email from Python\n\n### Problem\n\nYou want to send an email message\
    \ from a Python program.\n\n### Solution\n\nPython has a library for the Simple\
    \ Mail Transfer Protocol (SMTP) that you can use to send emails:\n\n> **Passwords\
    \ in Code**\n>\n> Be very careful putting usernames and passwords into your code,\
    \ especially if the code is part of a project that you are uploading to the internet.\
    \ It is all too easy to forget and upload your password to somewhere like GitHub.\n\
    \nThe example that follows is for Google’s Gmail. Google has a concept of application-specific\
    \ passwords, which makes this kind of access more secure by insisting on a long,\
    \ random password that is different from your normal password. To get this password,\
    \ you have to first log in to Google normally from a browser, go to [https://myaccount.google.com/](https://myaccount.google.com/),\
    \ and then click on Security in the lefthand navigation. In the “Signing in to\
    \ Google” section, select the option called App Passwords (Figure 7-1). Note that\
    \ your Google account must have two factor authentication enabled to access this\
    \ option."
  mdcn: "## 7.11 使用模块\n\n### 问题\n\n你想在程序中使用一个 Python 模块。\n\n### 解决方案\n\n使用 `import`\
    \ 命令：\n\n```python\nimport random\n```\n\n### 讨论\n\nPython 有大量可用的模块（有时称为*库*）。许多模块作为标准库的一部分随\
    \ Python 一起提供，其他模块则可以下载并安装到 Python 中。标准 Python 库包括用于随机数、数据库访问、各种互联网协议、对象序列化以及许多其他功能的模块。\n\
    \n拥有如此多模块的一个潜在后果是冲突的可能性——例如，如果两个模块具有同名的函数。为了避免此类冲突，在导入模块时需要指定模块的可访问范围。\n\n因此，如果你只使用这样的命令：\n\
    \n```python\nimport random\n```\n\n就不会有冲突的可能性，因为你只能通过在函数或变量前加上 `random` 前缀来访问它们（例如\
    \ `random.randint`）。顺便说一下，你将在下一个食谱中遇到 `random` 包。\n\n另一方面，如果你使用以下示例中的命令，模块中的每个函数或变量都可以直接访问，无需添加任何前缀；除非你知道所有使用模块中的所有函数，否则冲突的可能性会大大增加：\n\
    \n```python\nfrom random import *\n```\n\n介于这两种极端情况之间，你可以显式指定程序中需要的模块组件，以便在不添加任何前缀的情况下方便地使用它们。\n\
    \n例如：\n\n```python\n>>> from random import randint\n>>> print(randint(1,6))\n\
    2\n>>>\n```\n\n另一个选项是使用 `as` 关键字为模块提供一个更方便或更有意义的名称，以便在引用时使用：\n\n```python\n>>>\
    \ import random as R\n>>> R.randint(1, 6)\n```\n\n### 另请参阅\n\nPython 标准库包含所有 [Python\
    \ 模块](https://docs.python.org/3/library/) 的权威列表。\n\n## 7.12 生成随机数\n\n### 问题\n\n\
    你需要在一个数字范围内生成一个随机数。\n\n### 解决方案\n\n使用 `random` 库：\n\n```python\n>>> import random\n\
    >>> random.randint(1, 6)\n2\n>>> random.randint(1, 6)\n6\n>>> random.randint(1,\
    \ 6)\n5\n```\n\n生成的数字将介于两个参数之间（包含端点）——在这个例子中，模拟一个游戏骰子。\n\n### 讨论\n\n生成的数字并非真正的随机，而是所谓的*伪随机数序列*；也就是说，它们是一长串数字，当数量足够大时，会显示出统计学家所说的*随机分布*。对于游戏来说，这完全足够好，但如果你要生成彩票号码，你就需要查看特殊的随机化硬件。计算机天生就不擅长随机性；这并非它们的本质。\n\
    \n随机数的一个常见用途是从列表中随机选择某项。你可以通过生成一个索引位置并使用它来实现这一点，但 `random` 模块中也有一个专门用于此目的的命令。尝试以下示例：\n\
    \n```python\n>>> import random\n>>> random.choice(['a', 'b', 'c'])\n'a'\n>>> random.choice(['a',\
    \ 'b', 'c'])\n'b'\n>>> random.choice(['a', 'b', 'c'])\n'a'\n```\n\n在进行此类随机选择时，通常需要防止选择重复。例如，如果你已经随机选择了\
    \ 'a'，那么它就不应该再次被选中。\n\n一种方法是复制你的列表，然后每当你从中选择一个项目时，就移除该项目，使其无法再次被选中。以下是在一个小程序中实现此功能的方法，你可以在书籍下载中找到（参见食谱\
    \ 3.22）；该程序名为 *ch_07_random.py*：\n\n```python\nimport random\nfrom copy import\
    \ copy\n\nlist = ['a', 'b', 'c']\n\nworking_list = copy(list)\nwhile len(working_list)\
    \ > 0 :\n    x = random.choice(working_list)\n    print(x)\n    working_list.remove(x)\n\
    ```\n\n运行该程序，它将只显示一次随机选择的列表项：\n\n```\n$ python3 ch_07_random.py\nb\nc\na\n```\n\
    \n每次运行程序时，顺序可能不同。\n\n### 另请参阅\n\n有关更多信息，请参阅 [random 包的官方参考文档](https://docs.python.org/3/library/random.html)。\n\
    \n## 7.13 从 Python 发起 Web 请求\n\n### 问题\n\n你需要使用 Python 将网页内容读取到一个字符串中。\n\n###\
    \ 解决方案\n\nPython 有一个用于发起 HTTP 请求的广泛库，称为 urllib（URL 库）。\n\n以下 Python 3 示例将 Google\
    \ 主页的内容读取到字符串 contents 中：\n\n```python\nimport urllib.request\ncontents = urllib.request.urlopen(\"\
    https://www.google.com/\").read()\nprint(contents)\n```\n\n### 讨论\n\n读取 HTML 后，你可能想要搜索它并提取你真正需要的文本部分。为此，你需要使用字符串操作函数（参见食谱\
    \ 5.16 和 5.17）。\n\n### 另请参阅\n\n有关使用 Python 的更多互联网相关示例，请参阅第 17 章。\n\n当 Web 请求返回\
