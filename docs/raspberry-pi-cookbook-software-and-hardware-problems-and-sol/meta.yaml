    \n图17-8. “Receive a web request”触发器表单\n\n在Event Name字段中，输入文本**cpu_too_hot**，然后点击“Create\
    \ trigger”。\n\n这将把你带到食谱的THEN THAT部分，即*操作*，你需要选择一个操作频道。有很多选项，但对于这个示例，你将使用Email频道，因此在搜索字段中输入**Email**，然后选择Email频道。\n\
    \n选择Email频道后，选择操作“Send me an email”，这将显示如图17-9所示的表单。\n\n修改文本使其如图17-9所示。注意特殊值OccurredAt和Value1都将被{{和}}包围。这些值称为ingredients，是从网络请求中获取并替换到电子邮件主题和正文中的变量值。\n\
