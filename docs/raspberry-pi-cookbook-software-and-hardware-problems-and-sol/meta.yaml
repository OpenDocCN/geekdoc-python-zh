    # 1.8 Setting Up a Headless Raspberry Pi


    # Problem


    You want to use a Raspberry Pi without having to connect a keyboard, mouse, and
    monitor to it.


    # Solution


    Use the settings option on the Raspberry Pi Imager to start your Raspberry Pi
    with network credentials and enable SSH (Recipe 2.7) so that you can connect to
    the Raspberry Pi from another computer.


    After you have selected the operating system in the Raspberry Pi Imager, a cog
    settings icon will appear. When you click on this, you’ll be presented with a
    list of settings (Figure 1-15) that you can use to preconfigure your Raspberry
    Pi so that other computers on your network can connect to it.


    To be able to access the Raspberry Pi remotely, as a minimum you must:


    +   - Enable SSH (Secure Shell)

    - Set the username and password

    - Configure the wireless LAN with the name of your network (SSID, or service set
    identifier) and password


    It’s also not a bad idea to set the hostname, especially if you are going to have
    more than one Raspberry Pi on your network and you want to tell which is which.'
