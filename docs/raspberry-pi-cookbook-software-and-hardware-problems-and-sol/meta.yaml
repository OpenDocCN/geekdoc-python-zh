    \nYou will need to enable I2C on your Raspberry Pi so, if you have not already\
    \ done so, follow Recipe 10.4.\n\nThe example code for this can be found in the\
    \ file *ch_14_i2c_acc.py*:\n\n```python\nimport smbus\nimport time\n\nbus = smbus.SMBus(1)\n\
