    # ## 18.3 Flashing a Sonoff WiFi Smart Switch for MQTT Use


    # ### Problem


    You want to use a WiFi smart switch with MQTT so that you can control domestic
    accessories directly from your Raspberry Pi.


    # ### Solution


    Flash (install) new firmware (Tasmota) onto a low-cost Sonoff WiFi switch, configure
    the switch through a web interface, and then control it using MQTT.


    The Sonoff web switches (shown in [Figure 18-10](Figure 18-10)) offer an extremely
    low-cost way of turning lighting and other appliances on and off wirelessly.'
  merge: -1
  pgno: 519
- img_proc: true
  md: '![](img/e36e77524aeaae366529d1cf02f9a39c_520_0.png)


    Figure 18-10. The Sonoff WiFi switch


    However, the firmware pre-installed on the Sonoff switches is proprietary and
    relies on servers in China for communication to the internet. If you would prefer
    to have local control of your device and actually improve over the original firmware,
    you should follow this recipe to flash new open source firmware onto your Sonoff.


    You can do all of this from your Raspberry Pi, but you’ll need a few things:


    +   - A Sonoff Basic web switch (see “Modules” on page 566)

    - A row of four header pins (see “Miscellaneous” on page 567)

    - Four female-to-female jumper wires (see “Prototyping Equipment and Kits” on
    page 564)

    - Soldering equipment and solder (see “Prototyping Equipment and Kits” on page
    564)


    You will also need a Raspberry Pi 2 or later because earlier Raspberry Pis are
    not able to provide enough current at 3.3V to power the Sonoff.


    > **Danger: High Voltage**


    Switching alternating current (AC) using a Sonoff requires the connection of live
    wires to the Sonoff’s screw terminals. This is electrician’s work and should be
    done only by someone qualified to do so.


    Flash the Sonoff fresh out of its box, *before* it is wired into your household
    electricity. You can configure it without connecting it to an AC supply. The Raspberry
    Pi will power it.


    Before you connect your Sonoff to AC, take it apart, because you are going to
    need to solder a strip of four header pins into the holes supplied on the Sonoff’s
    circuit board.'
