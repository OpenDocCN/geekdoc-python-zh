  md: "# # 16.6 Using a USB Microphone\n\n# ## Problem\n\nYou want to connect a microphone\
    \ to your Raspberry Pi to capture sound.\n\n# ## Solution\n\nUse a USB microphone\
    \ like the one shown in Figure 16-7, or the microphone of a USB webcam, or something\
    \ a bit more substantial and of better quality.\n\nThese devices come in various\
    \ shapes and sizes. Some fit directly into the USB socket, others have a USB lead\
    \ attached to them, and some are part of a headset.\n\nHaving plugged in your\
    \ USB microphone, check that Raspberry Pi OS is aware of it by running this command,\
    \ which lists available devices from which you can record:\n\n```\n$ arecord -l\n\
    **** List of CAPTURE Hardware Devices ****\ncard 1: H340 [Logitech USB Headset\
    \ H340], device 0: USB Audio [USB Audio]\n  Subdevices: 1/1\n  Subdevice #0: subdevice\
    \ #0\n```\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_478_0.png)\n\nFigure 16-7.\
    \ Attaching a USB microphone to a Raspberry Pi\n\nIn this case, I'm using a microphone\
    \ that's part of a Logitech USB headset with microphone. As the previously described\
    \ output shows, this is card 1, subdevice 0. We'll need this information when\
    \ we come to recording sounds."
