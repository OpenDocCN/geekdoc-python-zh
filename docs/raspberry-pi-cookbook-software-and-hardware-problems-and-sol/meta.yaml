  md: '# CHAPTER 2

    Networking


    # 2.0 Introduction


    The Raspberry Pi is designed to be connected to the internet. Its ability to communicate
    on the internet is one of its key features and opens up all sorts of possible
    uses, including home automation, web serving, network monitoring, and so on.


    The connection can be wired through an Ethernet cable (in the case of most models),
    and newer models have built-in WiFi.


    Having a connected Raspberry Pi also means that you can connect to it remotely
    from another computer. This is very useful for situations in which the Raspberry
    Pi itself is used as a *headless* server and doesn''t have a keyboard, mouse,
    and monitor attached to it.


    This chapter gives you recipes for connecting your Raspberry Pi to the internet
    and controlling it remotely over a network.


    # 2.1 Connecting to a Wired Network


    # Problem


    You want to connect your Raspberry Pi to the internet using a wired network connection.


    # Solution


    First, if you have an old model A Raspberry Pi or a Pi Zero, there is no RJ45
    connector for Ethernet. In this case, your best option for internet access is
    to use a wireless USB adapter (see Recipe 2.5).'
  merge: -1
  pgno: 62
- img_proc: true
  md: 'If you have a model B or B+ Raspberry Pi (1, 2, 3, 4, or 400) then you are
    in luck; just plug an Ethernet patch cable into its RJ45 socket and then connect
    the other end to a spare socket on the back of your home router (Figure 2-1).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_63_0.png)


    Figure 2-1. Connecting Raspberry Pi to a home router


    The network LEDs on your Raspberry Pi should immediately begin to flicker as the
    Raspberry Pi connects to your network.


    # Discussion


    Raspberry Pi OS is preconfigured to connect to any network using Dynamic Host
    Configuration Protocol (DHCP). It will automatically be assigned an IP address
    as long as DHCP is enabled on your network.


    If the LEDs blink, but you cannot connect to the internet on your Raspberry Pi
    using a browser, check that DHCP is enabled on your network management console.
    Go to the admin page of your home router, sign in with the admin password, and
    look for an option like that shown in Figure 2-2.'
  merge: -1
  pgno: 63
- img_proc: true
  md: '![](img/e36e77524aeaae366529d1cf02f9a39c_64_0.png)


    Figure 2-2. Enabling DHCP on your home router


    # See Also


    To connect to a wireless network, see [Recipe 2.5](Recipe 2.5).


    # 2.2 Finding Your IP Address


    # Problem


    You want to know the IP address of your Raspberry Pi so that you can communicate
    with it, whether connecting to it as a web server, exchanging files, or controlling
    it remotely with SSH ([Recipe 2.7](Recipe 2.7)) or VNC ([Recipe 2.8](Recipe 2.8)).


    # Solution


    An IPv4 address (as used for local addresses) is a four-part number uniquely identifying
    a computer''s network interface within a network. Each part is separated from
    the next part by a dot.


    To find the IP address of your Raspberry Pi, you need to issue this command in
    a Terminal window:


    ```

    $ hostname -I

    192.168.1.16 fd84:be52:5bf4:ca00:618:fd51:1c .....

    ```'
  merge: -1
