    \ I2C bus to use and will detect the wrong one if bus 0 is enabled.\n\nIn `/boot/config.txt`,\
    \ delete or comment out this line (by putting a # at the beginning of it):\n\n\
    ```\ndtparam=i2c_vc=on\n```\n\nAfter you do this, reboot your Raspberry Pi.\n\n\
    ![](img/e36e77524aeaae366529d1cf02f9a39c_361_0.png)\n\nThis HAT uses I2C, so make\
    \ sure that you have I2C enabled ([Recipe 10.4](Recipe 10.4)).\n\nThis board is\
    \ supported by an [excellent Adafruit tutorial](excellent Adafruit tutorial).\n\
    \n### Discussion\n\nWhen you run the program supplied in the Adafruit tutorial,\
