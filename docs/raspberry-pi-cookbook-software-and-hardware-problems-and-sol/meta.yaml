    \ Tab 键提供了一个便捷的快捷方式。如果你开始输入文件名，按下 Tab 键可以让自动补全功能尝试补全文件名。例如，如果你想切换到 *network* 目录，输入命令\
    \ `cd netw` 然后按下 Tab 键。因为 *netw* 足以唯一标识该文件或目录，按下 Tab 键就会自动补全它。\n\n如果你输入的内容不足以唯一标识文件或目录，再次按下\
    \ Tab 键会显示与你当前输入匹配的可能选项列表。所以，如果你输入到 *ne* 就按下 Tab 键，你会看到类似图 3-8 的内容。\n\n你可以在 `ls`\
    \ 后提供额外的参数来缩小要列出的内容范围。切换到 `/etc` 目录，然后运行以下命令：\n\n```\n$ ls f*\nfake-hwclock.data\
    \  fb.modes  fstab  fuse.conf\n\nfonts:\nconf.avail  conf.d  fonts.conf  fonts.dtd\n\
    \nfoomatic:\ndefaultspooler  direct  filter.conf\n\nfstab.d:\npi@raspberrypi /etc\
    \ $\n```\n\n* 字符被称为 *通配符*。在 `ls` 后指定 `f*`，表示我们想要列出所有以 `f` 开头的内容。\n\n有帮助的是，结果首先列出了\
    \ `/etc` 中所有以 `f` 开头的文件，然后是该文件夹中所有以 `f` 开头的目录的内容。\n\n通配符的一个常见用途是列出所有具有特定扩展名的文件（例如，`ls\
    \ *.docx`）。\n\nLinux（以及许多其他操作系统）的一个惯例是，将任何应向用户隐藏的文件以句点作为前缀。任何这样命名的文件或文件夹在你输入 `ls`\
    \ 时都不会出现，除非你为 `ls` 提供 `-a`（全部）选项。\n\n例如：\n\n```\n$ cd ~\n$ ls -a\n.          \
    \                Desktop                    .pulse\n..                       \
    \  .dillo                     .pulse-cookie\nAdafruit-Raspberry-Pi-Python-Code\
    \ .dmrc              python_games\n.advance                   .emulationstation\
    \          sales_log\n.AppleDB                   .fltk                      servo.py\n\
    .AppleDesktop              .fontconfig                .stella\n.AppleDouble  \
    \             .gstreamer-0.10            stepper.py.save\nAsteroids.zip      \
    \        .gvfs                      switches.txt.save\natari_roms            \
    \     indicity                   Temporary Items\n.bash_history              .local\
    \                     thermometer.py\n.bash_logout               motor.py    \
    \               .thumbnails\n.bashrc                    .mozilla             \
    \      .vnc\n.cache                     mydocument.doc             .Xauthority\n\
    .config                    Network Trash Folder       .xsession-errors\n.dbus\
    \                      .profile                   .xsession-errors.old\n```\n\n\
    如你所见，你的主目录中的大多数文件和文件夹都是隐藏的。\n\n### 另请参阅\n\n要更改文件权限，请参阅 [配方 3.14](Recipe 3.14)。\n\
    \n## 3.5 复制文件或文件夹\n\n### 问题\n\n你想使用终端会话复制一个文件。\n\n### 解决方案\n\n使用 `cp` 命令复制文件和目录。\n\
    \n### 讨论\n\n当然，你可以使用文件管理器及其复制粘贴菜单选项（配方 3.1）或键盘快捷键来复制文件。\n\n在终端会话中复制的最简单示例是在你的工作目录中制作一个文件的副本。cp\
    \ 命令后面首先是要复制的文件，然后是新文件的名称。\n\n例如，以下代码创建一个名为 *myfile.txt* 的文件，然后制作一个名为 *myfile2.txt*\
    \ 的副本；你可以在配方 3.9 中了解更多关于使用 > 命令创建文件的技巧：\n\n```\n$ echo \"hello\" > myfile.txt\n\
    $ ls\nmyfile.txt\n$ cp myfile.txt myfile2.txt\n$ ls\nmyfile.txt    myfile2.txt\n\
    ```\n\n虽然在这个例子中两个文件路径都是相对于当前工作目录的，但文件路径可以是文件系统中你有写入权限的任何位置。以下示例将原始文件复制到名为 /tmp\
    \ 的区域，这是临时文件的位置（不要在该文件夹中放置任何重要内容）：\n\n```\n$ cp myfile.txt /tmp\n```\n\n请注意，在这种情况下，没有指定新文件的名称，只指定了它要去的目录。这将在\
    \ /tmp 中创建一个名为 *myfile.txt* 的副本。\n\n有时，你可能不想只复制一个文件，而是想复制一个包含许多文件甚至其他目录的整个目录。要复制一个目录及其所有内容，你需要使用\
    \ -r 选项（表示递归）：\n\n```\n$ cp -r mydirectory mydirectory2\n```\n\n无论何时复制文件或文件夹，命令的结果都会告诉你是否没有权限。如果是这种情况，你需要更改你要复制到的文件夹的权限（配方\
    \ 3.14），或者使用超级用户权限复制文件（配方 3.12）。\n\n### 另请参阅\n\n你也可以重命名文件而不是复制它们；请参阅配方 3.6。\n\n\
    有关 cp 命令众多可选参数的有用描述，请参阅 https://oreil.ly/Cq2SJ。\n\n## 3.6 重命名文件或文件夹\n\n### 问题\n\
    \n你需要使用终端会话重命名一个文件。\n\n### 解决方案\n\n使用 `mv` 命令重命名文件和目录。\n\n### 讨论\n\n`mv`（移动）命令的使用方式与\
    \ `cp` 命令类似，不同之处在于被移动的文件或文件夹只是被重命名，而不是制作副本。\n\n例如，要将文件从 `my_file.txt` 重命名为 `my_file.rtf`，你使用以下命令：\n\
    \n```\n$ mv my_file.txt my_file.rtf\n```\n\n更改目录名称同样简单直接，你不需要在复制时使用的递归 `-r` 选项，因为更改目录名称隐含地意味着其中的所有内容都包含在重命名后的目录中。\n\
    \n### 另请参阅\n\n要复制文件或文件夹，请参阅 [配方 3.5](Recipe 3.5)。\n\n## 3.7 编辑文件\n\n### 问题\n\n\
    你想从命令行运行编辑器来更改配置文件。\n\n### 解决方案\n\n使用大多数 Raspberry Pi 发行版中包含的 nano 编辑器。\n\n###\
    \ 讨论\n\n要使用 nano，只需输入命令 `nano`，后跟你要编辑的文件名或文件路径。如果文件不存在，它将在你保存时创建。但是，这只有在你对要写入文件的目录具有写入权限时才会发生。\n\
    \n从你的主目录，输入命令 `nano my_file.txt` 来编辑或创建文件 `my_file.txt`。图 3-9 显示了 nano 的运行情况。\n\
    \n你不能使用鼠标来定位光标；你必须使用方向键。\n\n屏幕底部的区域列出了许多命令，你可以通过按住 Ctrl 键并按下指示的字母来访问。其中大多数并不那么有用。你最可能使用的是以下命令：\n\
