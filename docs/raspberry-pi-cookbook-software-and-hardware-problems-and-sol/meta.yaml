    \n## 另请参阅\n\n关于连接按钮的基础知识，请参见配方13.1。\n\n## 13.7 使用旋转（正交）编码器\n\n### 问题\n\n你想使用旋转编码器（一种像音量旋钮一样旋转的控件）来检测旋转。\n\
