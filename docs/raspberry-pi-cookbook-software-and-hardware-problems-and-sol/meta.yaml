    As with all the program examples in this book, you can also download this code
    (see Recipe 3.22).


    The program is based on ch_19_temp_logger.py, with the addition of code to display
    the temperature. The module badger2040 contains the interface to the E Ink display.
    Having created an instance of the Badger2040 class, the default font is set to
    bitmap8, which is quite a blocky font, but looks good as a thermometer.


    The main while loop reads the temperature, and if it has changed, then it redisplays
    the new temperature. Unlike other displays, E Ink displays refresh slowly and
    with a fair amount of blinking. So the display would look quite distracting if
    it refreshed every time through the while loop.


    Writing to the display is similar to using an OLED display (see Recipe 15.4).
    The things to be displayed are written to a buffer before the display is told
    to update using the update method. In this case, the display is first cleared
    by setting the ink color to white (255) and then calling clear(). The pen color
    is then set to 0 (black), the temperature is converted to text, and then it is
    drawn at coordinates x = 20, y = 10. Some smaller text is then displayed for the
    units of degrees. Finally, there is a sleep of five seconds to stop the display
    from constantly refreshing when the measured temperature is at the threshold between
    two values.


    # See Also


    For more information on using the Pimoroni Badger, see https://oreil.ly/EyxoP.


    Check out a reference on the badger2040 module.


    # 19.13 Using the Pico on Batteries


    # Problem


    You want to run your Pico or Pico W from batteries.


    # Solution


    A really good balance of long battery life and low cost can be achieved by using
    a battery pack containing two AA batteries.


    This can easily be connected using a Pico on a breadboard as shown in Figure 19-23.'
  merge: -1
  pgno: 582
- img_proc: true
  md: '![](img/e36e77524aeaae366529d1cf02f9a39c_583_0.png)


    Figure 19-23. Powering a Pico with a pair of AA batteries


    # Discussion


    The Pico is pretty easy to power from batteries by virtue of its buck/boost voltage
    regulator. This takes an input voltage to pin Vsys (marked Vs on the MonkMakes
    Breadboard for Pico) that can be anything from 1.8V to 5.5V and converts that
    voltage to the 3.3V that the RP2040 needs.


    A Raspberry Pi 4 can use several amps of current, making it poorly suited for
    low-power battery applications. In contrast, the Pico uses only about 25mA. An
    AA battery can typically hold at least 2,000mAh, which means that a pair of AA
    batteries could last for 80 hours or more.


    Some of the Pico-compatible boards, such as Adafruit’s Feather RP2040 and Pimoroni’s
    PicoLiPo, allow a 3.7V rechargeable LiPo battery to be attached. This will charge
    while the board is connected to USB, and then provide power to the Pico when you
    unplug it.


    # See Also


    Find out more about the [Feather RP2040](https://www.adafruit.com/product/5423)
    and the [PicoLiPo](https://shop.pimoroni.com/products/pico-lipo).'
