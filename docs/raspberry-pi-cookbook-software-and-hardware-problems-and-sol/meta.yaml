    page 564)

    - MMA8452Q triple-axis accelerometer (see “Modules” on page 566)


    Figure 14-21 shows the arrangement for this, using a breadboard. It uses three
    channels of the ADC to measure the X, Y, and Z acceleration forces.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_428_0.png)


