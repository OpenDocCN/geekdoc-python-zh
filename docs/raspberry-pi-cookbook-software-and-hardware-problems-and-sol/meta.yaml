    # 13.13 Giving the Raspberry Pi a Reset Button


    # Problem


    You want a reset button to start up your Raspberry Pi 4 or earlier like a typical
    desktop computer.


    # Solution


    If you have a Raspberry Pi 400, there is nothing to do; this version of the Raspberry
    Pi already has a power on switch.


    When you are finished using your Raspberry Pi, you should really shut it down;
    otherwise, it''s possible to corrupt the SD card image, which would mean you''d
    have to reinstall Raspberry Pi OS. Having shut down your Raspberry Pi, you can
    get it to boot up again by unplugging the USB lead and then plugging it back in.
    But a neater solution is to add a reset button to your Raspberry Pi.


    For this recipe, you will need the following:


    +   - Two-way 1/10-inch header pins (see “Miscellaneous” on page 567)

    - A recycled PC start button or MonkMakes Squid Button (see “Modules” on page
    566)

    - Soldering equipment (see “Prototyping Equipment and Kits” on page 564)


    Most models of Raspberry Pi have a connector just for this purpose. Its location
    on the board varies, but it''s always labeled RUN. Figure 13-16 shows its position
    on a Raspberry Pi 4, and Figure 13-17 on a Raspberry Pi 3.'
  merge: -1
  pgno: 391
- img_proc: true
  md: '![](img/e36e77524aeaae366529d1cf02f9a39c_392_0.png)


