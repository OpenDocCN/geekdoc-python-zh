    # See Also


    For information on managing processes, see [Recipe 3.28](Recipe 3.28).


    # 3.36 Creating Command Aliases


    # Problem


    You want to create aliases (shortcuts) to commands that you use frequently.


    # Solution


    Edit the file `~/.bashrc` using nano ([Recipe 3.7](Recipe 3.7)), and then move
    to the end of the file and add as many lines as you want, like this:


    ```

    alias L=''ls -a''

    ```


    This creates an alias called `L` that, when entered, will be interpreted as the
    command `ls -a`.


    Save and exit the file using Ctrl-X and Y, and then type the following command
    to update the Terminal with the new alias:


    ```

    $ source .bashrc

    ```


    # Discussion


    Many Linux users set up an alias for `rm`, like the following, so that it confirms
    deletions:


    ```

    $ alias rm=''rm -i''

    ```


    This is not a bad idea, as long as you do not forget when you use someone else''s
    system who doesn''t have this alias set up!


    # See Also


    For more information about `rm`, see [Recipe 3.11](Recipe 3.11).


    # 3.37 Setting the Date and Time


    # Problem


    You want to manually set the date and time on your Raspberry Pi because it does
    not have an internet connection.'
  - '[PAGE 134]


    # Solution


    Use the Linux date command.


    The date and time format is MMDDhhmmYYYY, in which MM is the month number; DD
    is the day of the month; hh and mm are the hours and minutes, respectively; and
    YYYY is the year.


    For example:


    ```

    $ sudo date 010203042019

    Wed  2 Jan 03:04:00 GMT 2019

    ```


    # Discussion


    If the Raspberry Pi is connected to the internet, as it boots up it will automatically
    set its own time using an internet time server.


    You can also use date to display the local time by entering date on its own:


    ```

    $ date

    Fri 19 Jul 10:59:08 BST 2019

    ```


    # 3.38 Finding Out How Much Room You Have on the SD Card


    # Problem


    You want to know how much free space there is on the SD card.


    # Solution


    Use the Linux df (disk filesystem) command:


    ```

    $ df -h

    Filesystem      Size  Used Avail Use% Mounted on

    rootfs          3.6G  1.7G  1.9G  48% /

    /dev/root       3.6G  1.7G  1.9G  48% /

    devtmpfs        180M     0  180M   0% /dev

    tmpfs            38M  236K   38M   1% /run

    tmpfs           5.0M     0  5.0M   0% /run/lock

    tmpfs            75M     0   75M   0% /run/shm

    /dev/mmcblk0p1   56M   19M   38M  34% /boot

    ```


    The -h option shows the sizes using the KB, MB, and GB symbols (shortened to K,
    M, and G) rather than the number of bytes.'
  - '[PAGE 135]


    # Discussion


    Looking at the first line of the results, you can see that 3.6 GB of storage is
    on the SD card, of which 1.7 GB is used.


    When you run out of disk space, you are likely to get unexpected bad behavior,
    such as error messages saying that a file could not be written.


    # See Also


    You can find the manpage for df with the command `man df`.


    # 3.39 Finding Out What Operating System Version You Are Running


    # Problem


    You want to know exactly what version of Raspberry Pi OS you are running.


    # Solution


    Enter the following command into a Terminal or Secure Shell (SSH) session:


    ```

    $ cat /etc/os-release

    PRETTY_NAME="Raspbian GNU/Linux 11 (bullseye)"

    NAME="Raspbian GNU/Linux"

    VERSION_ID="11"

    VERSION="11 (bullseye)"

    VERSION_CODENAME=bullseye

    ID=raspbian

    ID_LIKE=debian

    HOME_URL="http://www.raspbian.org/"

    SUPPORT_URL="http://www.raspbian.org/RaspbianForums"

    BUG_REPORT_URL="http://www.raspbian.org/RaspbianBugs"

    ```


    # Discussion


    As you can see from the result in the previous example, the first line tells us
    all we need to know. In this case, my Raspberry Pi is running Raspbian (Raspberry
    Pi OS) version 11, which also goes under the nickname *bullseye*.


    It can be useful to know what version of Raspberry Pi OS you are running if you
    are having problems with a certain piece of software. Often the first question
    that you will be asked by support is *What version of Raspberry Pi OS are you
    running?*


    You might need to know what version of the Linux kernel you have on your Raspberry
    Pi. You can find this using the following command:'
  - '[PAGE 136]


    ```

    $ uname -a

    Linux raspberrypi 5.15.32-v7l+ #1538 SMP Thu Mar 31 19:39:41 BST 2022

    armv7l GNU/Linux

    ```


    Here you can see that the author''s Raspberry Pi uses v5.15 of the kernel.


    # See Also


    To see how much room you have left on your SD card or other boot disk, see [Recipe
    3.38](Recipe 3.38).


    # 3.40 Updating Raspberry Pi OS


    # Problem


    You want to update your Raspberry Pi to the latest version of Raspberry Pi OS.


    # Solution


    If you have a fairly new version of Raspberry Pi OS (Bullseye onwards), then an
    icon should be in the top right of the screen that looks like an arrow pointing
    down toward a tray (Figure 3-17). When you click on this, you are given the option
    to see available updates and install them.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_136_0.png)


    Figure 3-17. Installing updates from the desktop'
  - '[PAGE 137]


    If you prefer, you can install from the command line. Open a command line using
    the Terminal (Recipe 3.3) and enter the following command to update your system
    to the latest version:


    ```

    $ sudo apt update

    $ sudo apt full-upgrade

    ```


    This will take some time, especially if there is a lot to upgrade. Most important,
    if you have any precious files on your system, I recommend copying them onto a
    USB flash drive (Recipe 3.2) before upgrading.


    # Discussion


    The first of these commands doesn''t actually update Raspberry Pi OS; it just
    updates the apt package manager to make it aware of the latest versions of the
    packages that comprise your operating system and related software.


    The command full-upgrade upgrades the operating system itself. During the process,
    you will be warned how much disk space will be required, so you should use Recipe
    3.38 to check that you have enough room before pressing Y to go ahead with the
    upgrade.


    Keeping your distribution up to date is important for a number of reasons. First,
    one of the main reasons that the operating system is changed is to fix bugs. So
    problems during the installation of software often vanish after a system update.
    Second, if you expose your Raspberry Pi to the internet, new versions of Raspberry
    Pi OS often patch security vulnerabilities.


    # See Also


    To start again with a completely fresh installation of Raspberry Pi OS, see Recipe
    1.6.'
  - '[PAGE 138]


    # CHAPTER 4

    Using Ready-Made Software


    # 4.0 Introduction


    This chapter contains a number of recipes for using ready-made software on the
    Raspberry Pi.


    Some of the recipes in this chapter are concerned with converting the Raspberry
    Pi into a single-use appliance, while others use specific pieces of software on
    a Raspberry Pi.


    # 4.1 Making a Media Center


    # Problem


    You want to convert your Raspberry Pi into a super-duper media center.


    # Solution


    To use your Raspberry Pi as a media center, you should go for the superior performance
    of the Raspberry Pi 4 B, as video playing is very processor intensive.


    You can set up your Raspberry Pi as a media center while using the Raspberry Pi
    Imager (Recipe 1.6) to write to a microSD card. Instead of selecting Raspberry
    Pi OS as the distribution to install, select LibreELEC from the Media Player OS
    section of the Operating System button (Figure 4-1).'
  - '[PAGE 139]


    ![](img/e36e77524aeaae366529d1cf02f9a39c_139_0.png)


    Figure 4-1. Using the Raspberry Pi Imager to write LibreELEC onto a microSD card


    LibreELEC is a distribution that optimizes your Raspberry Pi as a media center.
    It incudes the Kodi media center software, which is based on the XBMC open source
    project that was originally developed to convert Xbox game consoles into media
    centers. The code has since been ported to many platforms, including the Raspberry
    Pi (Figure 4-2).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_139_1.png)


    Figure 4-2. Raspberry Pi as a media center'
  - '[PAGE 140]


    Raspberry Pi is perfectly capable of playing full HD video as well as streamed
    music, MP3 files, and internet radio.


    # Discussion


    Kodi is a powerful piece of software with many features and is very intuitive
    to set up. Perhaps the simplest way to check whether it is working is to put some
    music and/or video files onto a USB flash drive or external USB hard disk and
    connect it to the Raspberry Pi. You should be able to play them from Kodi.


    Since the Raspberry Pi is likely to be sitting near your TV, you might find that
    your TV has a USB port that can provide enough current to run the Raspberry Pi.
    If this is the case, you won''t need a separate power supply.


    A wireless keyboard and mouse are a good idea because, if you buy them as a pair,
    they will use a single USB port for the dongle, which avoids the need for wires
    trailing all over the place. You can also buy mini keyboards with built-in trackpads
    that are useful in this situation.


    A wired network connection is generally higher performance and better than a WiFi
    connection, but it is not always convenient to have the Pi near an Ethernet socket.
    If this is the case, you can set up XBMC to use WiFi.


    Setting up Kodi is very intuitive, and you can find full instructions on using
    the software at http://kodi.wiki.


    # See Also


    A popular alternative to LibreELEC, which can also be installed from the Raspberry
    Pi Imager, is OSMC.


    You can add an infrared (IR) remote to Raspberry Pi to control Kodi.


    # 4.2 Installing Recommended Software


    # Problem


    You want to install some commonly used software on your Raspberry Pi.


    # Solution


    Use the Recommended Software tool (Figure 4-3), which you will find in the Preferences
    section of the Raspberry Menu.'
- md: '## 4.3 Using Office Software


    ### Problem


    You need to open word processor, presentation, and spreadsheet documents on a
    Raspberry Pi.


    ### Solution


    Install LibreOffice using the Recommended Software tool ([Recipe 4.2](Recipe 4.2)).


    ### Discussion


    The LibreOffice suite of programs (Figure 4-5) makes a good (and free) alternative
    to Microsoft Office. It includes a word processor, spreadsheet, presentation,
    and drawing software. In fact, the LibreOffice Writer word processor will open
    and save Microsoft Word documents, and the spreadsheet and presentation programs
    are pretty compatible with their Microsoft counterparts.


    A Raspberry Pi 4 or 400 will run office applications much better than an older
    Raspberry Pi.


    These days it''s often more convenient to keep your documents in the cloud and
    edit them in a browser. The most common examples of these services are Microsoft
    365 and Google Docs. Both require you to sign up for an account, but the Chromium
    browser is perfectly capable of using these services (Figure 4-6).


    ### See Also


    Visit https://www.libreoffice.org for more information on the LibreOffice suite
    of software.


    If you just want to edit an unformatted text file, you can use the nano editor
    (Recipe 3.7) or VisualStudio Code (Recipe 4.10).


    ## 4.4 Running a Vintage Game Console Emulator


    ### Problem


    You want to turn your Raspberry Pi into a vintage game console.


    ### Solution


    If you fancy rediscovering your misspent youth and playing Asteroids on an emulator
    for the Atari 2600 (Figure 4-7), the RetroPie project will appeal to you.


    Many wonderful projects have been built that create custom consoles and game tables
    complete with retro game controllers.


    Although you can install RetroPie on top of Raspberry Pi OS, the easiest way to
    use it is to write it onto a microSD card using the Raspberry Pi Imager (Recipe
    1.6).


    It is worth noting that even though these games are ancient, they are still owned
    by someone. The ROM image files that you need to play the games on an emulator,
    although easy to find on the internet, are not necessarily yours to take. So please
    stick to the law.


    ### Discussion


    The emulator uses a surprisingly large amount of the Raspberry Pi’s meager resources,
    so you might find that you need to use a Raspberry Pi 4, 3, or 2. In an internet
    search, you can find many people who have taken this basic setup and added a retro
    USB controller, like the widely available and quite low-cost controllers, and
    built the Pi and a monitor into a big arcade-style housing. You can also buy a
    kit called the Picade from Pimoroni to make a lovely arcade machine (Figure 4-8).


    ### See Also


    Full RetroPie documentation is available on [the RetroPie site](http://retropie.org.uk/).


    ## 4.5 Turning Your Raspberry Pi into a Radio Transmitter


    ### Problem


    You want to convert your Raspberry Pi into a low-powered FM transmitter that will
    send a radio signal to a normal FM radio receiver (Figure 4-9).


    ### Solution


    Back in the early days of the Raspberry Pi, some clever folks at Imperial College,
    London, created some C code that allows you to do just this. The download even
    plays the *Star Wars* theme as a sample. This project will still work if you have
    an [original Raspberry Pi 1](http://www.raspberrypi.org/).


    The project lives on for newer Raspberry Pis as an altogether more advanced project
    called *rpitx*.


    All you need is a short length of wire attached to general-purpose input/output
    (GPIO) pin 4. A 10 cm female-to-male header lead will work just fine for this.
    In fact, it should work with a radio sitting right next to your Pi without any
    kind of antenna—such is the strength of the transmission.


    The first step is to install the rpitx software using the following commands.
    Note that this installation will change some things about how your Raspberry Pi
    is configured, including the frequency at which the GPU (graphics process) works.
    So if this is your main Raspberry Pi, make sure you first back up anything precious.
    Here''s the code you need:


    ```

    $ git clone https://github.com/F5OEO/rpitx

    $ cd rpitx

    $ ./install.sh

    ```


    You will now need to do something else for a good 15 minutes or so while the software
    installs. You might see what look like error messages and warnings, but these
    are normal. At the end of the installation, the installer script will ask:


    > In order to run properly, rpitx need to modify /boot/config.txt. Are you sure
    (y/n)


    Press Y, and the script will then confirm the changes it has made with the following
    message:


    > Set GPU to 250Mhz in order to be stable


    If you need to reverse this change, edit /boot/config.txt by removing the last
    line that says gpu_freq=250, then reboot.


    Next, find yourself an FM radio receiver and tune it to 103.0 MHz. If this frequency
    is already occupied by some other transmission, pick another frequency and make
    note of it.


    Now run the following command (changing the frequency parameter from 103.0 if
    you had to change frequency):


    ```

    sudo ./pifmrds -freq "103.0" -audio src/pifmrds/stereo_44100.wav

    ```


    If all is well, you should hear the voice of the developer talking about left
    and right channels.


    ### Discussion


    You need to know that this project may not be legal in your country. The power
    output is higher than that of FM transmitters used with MP3 players.


    Were you to put a Raspberry Pi in your vehicle, this would be a great way to output
    sound through the vehicle''s audio system.


    ### See Also


    To learn more about the rpitx project, see https://oreil.ly/TrlO1.


    ## 4.6 Editing Bitmap Images


    ### Problem


    You want to manipulate a photograph or other image.


    ### Solution


    Install and run the GNU Image Manipulation Program (GIMP; see Figure 4-10).


    GIMP is available to install from the Add/Remove Software tool (see Recipe 4.2).
    When you search for GIMP, a lot of results will come back for various GIMP utilities,
    so look for the package called “GNU Image Manipulation Program.”


    If you prefer to install GIMP from the command line, open a Terminal session and
    type the following command:


    ```

    $ sudo apt install gimp

    ```


    Once GIMP is installed, you’ll find an entry for GNU Image Manipulation Program
    in your Raspberry Menu under the Graphics heading.


    ### Discussion


    Despite being hungry for memory and processor power, GIMP is usable even on a
    Raspberry Pi 2 B, but there will be much less waiting around if you use a Raspberry
    Pi 4 or 400.


    ### See Also


    Find out more from the [GIMP website](https://www.gimp.org/).


    GIMP has a lot of features and is a very sophisticated image-editing program,
    so it does take a little learning. You''ll find an online manual for the software
    at the GIMP website.


    For more information on installing with apt, see [Recipe 3.17](https://www.raspberrypi.org/forums/viewtopic.php?t=123456).


    For editing vector images, see [Recipe 4.7](https://www.raspberrypi.org/forums/viewtopic.php?t=123457).


    ## 4.7 Editing Vector Images


    ### Problem


    You want to create or edit high-quality vector drawings such as Scalable Vector
    Graphics (SVG).


    ### Solution


    Inkscape is one of the packages available from the Add/Remove Software tool (see
    [Recipe 4.2](https://www.raspberrypi.org/forums/viewtopic.php?t=123458)). Open
    the tool up and search for “Inkscape.”


    If you prefer to install Inkscape from the command line, you can do so with the
    following commands:


    ```

    $ sudo apt update

    $ sudo apt install inkscape

    ```


    Once Inkscape is installed, its icon will appear in the Graphics section of your
    Raspberry Menu.


    ### Discussion


    Inkscape ([Figure 4-11](https://www.raspberrypi.org/forums/viewtopic.php?t=123459))
    is the most-used open source vector image editor. Vector drawing packages differ
    from bitmap image editors like GIMP ([Recipe 4.6](https://www.raspberrypi.org/forums/viewtopic.php?t=123460))
    in that the image is made up of shapes, lines, text, etc. that are stored as such,
    rather than being converted into pixels. This means that you can come back and
    edit those things (perhaps the position of a line), which is not possible in a
    bitmap editor.'
  mdcn: '## 4.3 使用办公软件


    ### 问题


    你需要在树莓派上打开文字处理、演示文稿和电子表格文档。


    ### 解决方案


    使用推荐软件工具（[配方 4.2](Recipe 4.2)）安装 LibreOffice。


    ### 讨论


    LibreOffice 程序套件（图 4-5）是 Microsoft Office 的一个良好（且免费的）替代品。它包含文字处理、电子表格、演示文稿和绘图软件。事实上，LibreOffice
    Writer 文字处理器可以打开和保存 Microsoft Word 文档，而电子表格和演示文稿程序也与它们的 Microsoft 对应产品相当兼容。


    树莓派 4 或 400 运行办公应用程序会比旧款树莓派好得多。


    如今，将文档保存在云端并在浏览器中编辑通常更方便。这些服务最常见的例子是 Microsoft 365 和 Google Docs。两者都需要你注册一个账户，但
    Chromium 浏览器完全能够使用这些服务（图 4-6）。


    ### 另请参阅


    访问 https://www.libreoffice.org 了解更多关于 LibreOffice 软件套件的信息。


    如果你只想编辑一个无格式的文本文件，可以使用 nano 编辑器（配方 3.7）或 VisualStudio Code（配方 4.10）。


    ## 4.4 运行复古游戏机模拟器


    ### 问题


    你想把你的树莓派变成一台复古游戏机。


    ### 解决方案


    如果你喜欢重温虚度的青春，在 Atari 2600 模拟器（图 4-7）上玩《小行星》，那么 RetroPie 项目会吸引你。


    已经构建了许多精彩的项目，创建了带有复古游戏控制器的定制游戏机和游戏桌。


    虽然你可以在 Raspberry Pi OS 之上安装 RetroPie，但使用它的最简单方法是使用 Raspberry Pi Imager（配方 1.6）将其写入
    microSD 卡。


    值得注意的是，即使这些游戏年代久远，它们仍然归某人所有。你需要用来在模拟器上玩游戏的 ROM 映像文件，虽然在网上很容易找到，但不一定归你所有。所以请遵守法律。


    ### 讨论


    模拟器使用了树莓派有限资源中惊人的一大块，所以你可能会发现你需要使用树莓派 4、3 或 2。通过互联网搜索，你可以找到许多人在这个基本设置的基础上添加了复古
    USB 控制器（比如广泛可用且价格相当低廉的控制器），并将树莓派和显示器组装成一个大型街机风格的外壳。你也可以从 Pimoroni 购买一个名为 Picade
    的套件来制作一台漂亮的街机（图 4-8）。


    ### 参阅


    完整的 RetroPie 文档可在 [RetroPie 网站](http://retropie.org.uk/) 上找到。


    ## 4.5 将你的树莓派变成无线电发射器


    ### 问题


    你想将你的树莓派转换成一个低功率 FM 发射器，向普通的 FM 收音机接收器发送无线电信号（图 4-9）。


    ### 解决方案


    在树莓派早期，伦敦帝国理工学院的一些聪明人编写了一些 C 代码，让你可以做到这一点。下载内容甚至播放 *星球大战* 主题曲作为示例。如果你拥有 [初代树莓派
    1](http://www.raspberrypi.org/)，这个项目仍然有效。


    该项目在更新的树莓派上以一个名为 *rpitx* 的更高级项目继续存在。


    你只需要一根短导线连接到通用输入/输出（GPIO）引脚 4。一根 10 厘米的母对公排线就能很好地完成这项工作。事实上，即使没有天线，它也应该能在收音机紧挨着你的树莓派时工作——这就是传输的强度。


    第一步是使用以下命令安装 rpitx 软件。请注意，此安装将更改树莓派配置的一些内容，包括 GPU（图形处理器）的工作频率。因此，如果这是你的主要树莓派，请确保首先备份任何珍贵的东西。你需要的代码如下：


    ```

    $ git clone https://github.com/F5OEO/rpitx

    $ cd rpitx

    $ ./install.sh

    ```


    现在你需要做其他事情大约 15 分钟左右，等待软件安装。你可能会看到看起来像错误消息和警告的内容，但这些都是正常的。在安装结束时，安装程序脚本会询问：


    > In order to run properly, rpitx need to modify /boot/config.txt. Are you sure
    (y/n)


    按 Y，然后脚本将通过以下消息确认它所做的更改：


    > Set GPU to 250Mhz in order to be stable


    如果你需要撤销此更改，请编辑 /boot/config.txt，删除最后一行 gpu_freq=250，然后重新启动。


    接下来，找一个 FM 收音机接收器并将其调谐到 103.0 MHz。如果这个频率已被其他传输占用，请选择另一个频率并记下来。


    现在运行以下命令（如果你不得不更改频率，请将频率参数从 103.0 更改）：


    ```

    sudo ./pifmrds -freq "103.0" -audio src/pifmrds/stereo_44100.wav

    ```


    如果一切顺利，你应该能听到开发者谈论左右声道的声音。


    ### 讨论


    你需要知道这个项目在你的国家可能不合法。其功率输出高于用于 MP3 播放器的 FM 发射器。


    如果你把树莓派放在你的车里，这将是通过车辆音频系统输出声音的好方法。


    ### 参阅


    要了解更多关于 rpitx 项目的信息，请参阅 https://oreil.ly/TrlO1。


    ## 4.6 编辑位图图像


    ### 问题


    你想处理照片或其他图像。


    ### 解决方案


    安装并运行 GNU 图像处理程序（GIMP；参见图 4-10）。


    GIMP 可以从添加/删除软件工具（参见配方 4.2）安装。当你搜索 GIMP 时，会返回许多各种 GIMP 实用程序的结果，所以请寻找名为“GNU Image
    Manipulation Program”的软件包。


    如果你更喜欢从命令行安装 GIMP，请打开终端会话并输入以下命令：


    ```

    $ sudo apt install gimp

    ```


    安装 GIMP 后，你会在树莓派菜单的图形标题下找到 GNU Image Manipulation Program 的条目。


    ### 讨论


    尽管 GIMP 对内存和处理器能力要求很高，但即使在树莓派 2 B 上也可以使用，但如果你使用树莓派 4 或 400，等待时间会少得多。


    ### 参阅


    从 [GIMP 网站](https://www.gimp.org/) 了解更多信息。


    GIMP 有很多功能，是一个非常复杂的图像编辑程序，所以确实需要一点学习。你可以在 GIMP 网站上找到该软件的在线手册。


    有关使用 apt 安装的更多信息，请参阅 [配方 3.17](https://www.raspberrypi.org/forums/viewtopic.php?t=123456)。


    有关编辑矢量图像的信息，请参阅 [配方 4.7](https://www.raspberrypi.org/forums/viewtopic.php?t=123457)。


    ## 4.7 编辑矢量图像


    ### 问题


    你想创建或编辑高质量的矢量图形，例如可缩放矢量图形（SVG）。


    ### 解决方案


    Inkscape 是从添加/删除软件工具（参见 [配方 4.2](https://www.raspberrypi.org/forums/viewtopic.php?t=123458)）可用的软件包之一。打开该工具并搜索“Inkscape”。


    如果你更喜欢从命令行安装 Inkscape，可以使用以下命令：


    ```

    $ sudo apt update

    $ sudo apt install inkscape

    ```


    安装 Inkscape 后，其图标将出现在树莓派菜单的图形部分。


    ### 讨论


    Inkscape（[图 4-11](https://www.raspberrypi.org/forums/viewtopic.php?t=123459)）是最常用的开源矢量图像编辑器。矢量绘图包与像
    GIMP（[配方 4.6](https://www.raspberrypi.org/forums/viewtopic.php?t=123460)）这样的位图图像编辑器不同，因为图像由形状、线条、文本等组成，这些元素以自身形式存储，而不是转换为像素。这意味着你可以回来编辑这些东西（也许是一条线的位置），这在位图编辑器中是不可能的。'
