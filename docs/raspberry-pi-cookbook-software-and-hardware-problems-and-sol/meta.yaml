    book (see Recipe 3.22). You will find it in the folder called *ch_17_web_switch*,
    inside a folder at the same level as the Python folder called *arduino*.


    Open the sketch in the Arduino IDE by clicking *ch_17_web_switch.ino*. Set the
    board type to Wemos D1 and the serial port to /dev/ttyUSB0.


    Before uploading the sketch to the Arduino, you need to make a few changes to
    the code. Look for these lines near the top of the sketch:


    ```

    const char* ssid = "your wifi access point name";

    const char* password = "your wifi password";

    const char* mqtt_server = "your MQTT IP address";

    ```


    Replace the placeholder text for ssid, password, and mqtt_server with the appropriate
    values for your setup.


    Then click the upload button in the Arduino IDE.


    After you''ve programmed it, the Wemos doesn''t need to be connected to your Raspberry
    Pi so, if you want, you can power it by some other means, such as a USB power
    bank. However, the sketch prints out useful debug information, so it''s worth
    staying tethered to your Raspberry Pi until you know everything is working. To
    see this information, open the Arduino IDE''s serial monitor, which should look
    something like Figure 18-34.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_544_0.png)


    *Figure 18-34. Using the Arduino serial monitor to view the Wemos output*


    To test the recipe, start a Terminal session on your Raspberry Pi and run the
    following command to subscribe to button presses:


    ```

    $ mosquitto_sub -d -t button_1

    Client mosqsub/5007-raspberryp sending CONNECT

    Client mosqsub/5007-raspberryp received CONNACK

    Client mosqsub/5007-raspberryp sending SUBSCRIBE (Mid: 1, Topic: button_1, QoS:
    0)

    Client mosqsub/5007-raspberryp received SUBACK

    Subscribed (mid: 1): 0

    Client mosqsub/5007-raspberryp received PUBLISH (d0, q0, r0, m0, ''button_1'',
    ... (16 bytes))

    Button 1 pressed

    ```


    Now every time you press the button, the message “Button 1 pressed” should appear
    in the Terminal.


    ## Discussion


    This is a book about Raspberry Pi, not Arduino, so we won''t go through the Arduino
    C code in any detail.


    The code is based on the example sketch called mqtt_basic in the library PubSub
    Client. As well as the constants at the top of the file for your WiFi credentials,
    these lines:


    ```

    const char* topic = "button_1";

    const char* message = "Button 1 pressed";

    ```


    might also be of interest. They determine the MQTT topic to be used and the message
    to accompany published events. You could program an entire series of Wemos buttons
    with different topics and messages.


    ## See Also


    To use your newly configured Wemos with Node-RED, see Recipe 18.10.


    You will learn much more about devices like the Wemos in Chapter 19.


    ## 18.10 Using a Wemos D1 with Node-RED


    ### Problem


    You want to include a Wemos D1, with a button attached, in a Node-RED flow.


    ### Solution


    As an example, we can use the Wemos WiFi button from Recipe 18.9 in a Node-RED
    flow to toggle a Sonoff web switch (Recipe 18.4) on and off.


    Figure 18-35 shows the Node-RED flow for this. If you want, you can import the
    flow rather than build it up from scratch. Follow the instructions in the Discussion
    section of Recipe 18.2 to import the flow.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_546_0.png)


    Figure 18-35. A Node-RED flow for a WiFi light switch


    To make this recipe, you will benefit from having already tried all the previous
    recipes in this chapter.


    The Button 1 MQTT node subscribes to messages from the Wemos D1. Figure 18-36
    shows the settings for this node.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_546_1.png)


    Figure 18-36. Configuring the Button 1 node


    The important thing here is that the Topic is set to “button_1.” The Trigger node
    works in the same way as in Recipe 18.6. The Trigger node is more interesting
    because this node remembers a value, which can be a 1 or a 0, and flips this value
    each time a message passes through it. This has to be done as a general function
    with a little bit of JavaScript code that remembers the state and toggles it.
    Figure 18-37 shows the node''s configuration including the code. This is a useful
    function that you will probably find yourself reusing in other projects.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_547_0.png)


    Figure 18-37. The Toggle function


    ### Discussion


    Node-RED is a powerful way to quickly put together a home automation system. If
    you are used to a conventional programming language, this way of doing things
    takes a little getting used to; however, when you''ve mastered it, you won''t
    want to go back to writing reams of code.


    Node-RED''s palette has lots of other interesting nodes, so take some time to
    explore them. Hovering over a node will display details about what it does, and
    you can follow this up by dragging the node onto a flow and trying it out.


    ### See Also


    More information is available in the full [Node-RED documentation](https://nodered.org/docs/).


    # CHAPTER 19

    Raspberry Pi Pico and Pico W


    ## 19.0 Introduction


    Although a regular Raspberry Pi is ideal for projects that need a network connection
    or a graphical user interface (GUI), its power consumption and lack of any analog
    inputs puts it at a disadvantage to a simpler microcontroller board such as the
    Arduino or Raspberry Pi Pico.


    The Raspberry Pi Pico is very different from any other Raspberry Pi in several
    ways:


    - It doesn''t have any interface to keyboard, mouse, or screen.

    - It has a relatively small 2M of flash memory for storing programs (no microSD
    slot) and 264k of RAM.

    - Its processor runs at just 133 MHz, compared with the Raspberry Pi 4''s 1.2
    GHz.

    - It doesn''t have an operating system. In effect, MicroPython is its operating
    system, and you just get what you see when you''re on the Python command line.


    This might lead you to wonder why you would use such an apparently feeble board
    rather than, say, a Raspberry Pi Zero.


    The answer is that the Pico (Figure 19-1) is even lower cost than a Pi Zero and
    better than a Raspberry Pi 4 at interfacing with external electronics in several
    ways. For example:


    - Three analog inputs makes connecting analog sensors much easier than with a
    regular Raspberry Pi.

    - Six pulse-width modulation (PWM) outputs. These outputs are hardware-timed and
    produce a much more accurate PWM signal than can be achieved with the Raspberry
    Pi, making them a lot better for controlling servomotors.

    - Built-in power supply that allows the Pico to be powered from 1.8 to 5.5V, and
    low power consumption so you can run it from a pair of AA batteries for hours.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_549_0.png)


    Figure 19-1. A Raspberry Pi Pico board


    The Raspberry Pi Pico W (Figure 19-2) shares the same pinout as the Pico, but
    the metal rectangle that you see on the right of the board is a WiFi and Bluetooth
    module. This makes the Pico W suitable for connected projects. The Pico W is still
    a good value, but considerably more expensive than the Pico.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_549_1.png)


    Figure 19-2. A Raspberry Pi Pico W


    In the remainder of this chapter, I will refer to the Raspberry Pi Pico and Pico
    W as just “Pico” (except when the difference matters) and refer to a regular Raspberry
    Pi 4 or 400, etc. as just a “Raspberry Pi.”


    ## 19.1 Connecting a Pico or Pico W to a Computer


    ### Problem


    You want to connect your Pico or Pico W to your Raspberry Pi or a Mac or Windows
    PC so that you can program it.


    ### Solution


    The Thonny Python editor has support for the Pico and Pico W and is pre-installed
    with Raspberry Pi OS. If you have not used Thonny, open it from the Programming
    section of the Raspberry Menu.


    To configure Thonny for Pico use, you need to set it into Normal mode (Recipe
    5.3), so that you have access to the menu, and then select Options from the Tools
    menu and go to the Interpreter tab (Figure 19-3).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_550_0.png)


    On the drop-down list, select MicroPython (Raspberry Pi Pico) as the interpreter
    to use, and then click OK. This will take you to a screen offering to install
    MicroPython'
