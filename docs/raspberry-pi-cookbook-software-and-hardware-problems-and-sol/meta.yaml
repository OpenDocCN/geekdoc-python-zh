- img_proc: true
  md: "```\ntemp_sensor = ADC(4)\npoints_per_volt = 3.3 / 65535\n\ndef read_temp_c():\n\
    \    reading = temp_sensor.read_u16() * points_per_volt\n    temp_c = 27 - (reading\
    \ - 0.706)/0.001721\n    return temp_c\n\nwhile True:\n    temp_c = read_temp_c()\n\
    \    print(temp_c)\n    sleep(0.5)\n```\n\nNote that this is analog channel 4—not\
    \ pin 4—so you can still use pin 4 as normal.\n\nThe function `read_temp_c` takes\
    \ an analog reading using `read_u16` from the temperature sensor and then applies\
    \ a bit of math to it, resulting in the temperature in degrees C. The numeric\
    \ constants are taken from the datasheet for the Pico’s RP2040 processor.\n\n\
    This sensor reports the temperature of the processor rather than the environment,\
    \ but, even so, if you place your finger on the processor chip it will warm it,\
    \ and the readings should rise.\n\nThe presence of analog inputs opens up the\
    \ possibility of attaching all sorts of analog sensors to your Pico, including\
    \ sensors for light, temperature, mechanical stress, and even gas sensors. Many\
    \ of the recipes in Chapter 14 can be easily adapted to work with the Pico.\n\n\
    # See Also\n\nTo add analog inputs to a Raspberry Pi, see Recipe 14.7.\n\nTake\
    \ a look at the datasheet for the RP2040.\n\n# 19.8 Controlling a Servomotor from\
    \ a Pico\n\n# Problem\n\nYou want to control servomotors using your Pico or Pico\
    \ W.\n\n# Solution\n\nConnect power to the servomotor from the Pico’s 5V supply\
    \ and connect one of the GPIO pins to the servomotor’s control pin. Then use the\
    \ PWM class to generate pulses to set the servomotor’s angle.\n\nConnect the servomotor\
    \ using male-to-male jumper wires as shown in Figure 19-14. Servomotors have different\
    \ color schemes used to identify the leads."
