- md: "## Solution\n\nUse the MicroPython *thread* mechanism to run code in parallel\
    \ with the main thread of execution. You will find an example of this in the program\
    \ *ch_19_multicore.py*:\n\n```python\nfrom utime import sleep\nimport _thread\n\
    from random import randint\n\ndef core0():\n    while True:\n        print(\"\
    core 0 says hello\")\n        sleep(randint(1, 3))\n\ndef core1():\n    while\
    \ True:\n        print(\"core 1 says hello\")\n        sleep(randint(1, 3))\n\n\
    _thread.start_new_thread(core1, ( ))\ncore0()\n```\n\nAs with all the program\
    \ examples in this book, you can also download this code (see Recipe 3.22).\n\n\
    When you run this program, you'll see output something like this in the Shell:\n\
    \n```\ncore 1 says hello\ncore 1 says hello\ncore 0 says hello\ncore 1 says hello\n\
    core 0 says hello\ncore 1 says hello\ncore 0 says hello\n```\n\nEach of the two\
    \ threads displays a message and then waits for a random period between one and\
    \ three seconds. Every so often, you might see the messages appear on the same\
    \ line. This happens when both are competing for access to the USB port.\n\n##\
    \ Discussion\n\nA good way to structure your code to handle two threads is to\
    \ put the code for each thread in a function of its own. In the preceding example,\
    \ I have called these functions core0 and core1. Both functions contain a while\
    \ True loop: core1 is allocated to one physical processor core by calling start_new_thread,\
    \ and then core0 is started on the other processor core just by calling the core0\
    \ function.\n\nIn regular Python 3 on a Raspberry Pi, you can create as many threads\
    \ of execution as you like but, on the Pico, you are limited to just two threads.\n\
    \n## See Also\n\nFor information on running multiple threads in regular Python\
    \ 3, see Recipe 7.19.\n\n## 19.11 Running a WiFi Web Server on the Pico W\n\n\
    ### Problem\n\nYou want to make use of the Pico’s WiFi capabilities, and what\
    \ better way to demonstrate that than by running a web server on the Pico W?\n\
    \n### Solution\n\nUse the `microdot` web server module and the `mm_wlan` WiFi\
    \ connection modules.\n\nFor convenience, these modules are included with the\
    \ test programs in the Pico section of the downloads for the book in a folder\
    \ called `ch_19_webserver`.\n\nCopy the files `pmon.py`, `microdot.py`, and `mm_wlan.py`\
    \ onto your Pico, by using the SaveAs menu option in Thonny and then selecting\
    \ Raspberry Pi Pico for the destination. Give each file the same filename as the\
    \ original file. You can see the files listed as on the filesystem in Figure 19-17.\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_576_0.png)\n\nOpen the file *hello.py*\
    \ and change ssid and password to match the name of your WiFi network and the\
    \ password, then run *hello.py* from Thonny (see Figure 19-18).\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_577_0.png)\n\
    \nFigure 19-18. Thonny showing the program *hello.py*\n\nIn the Shell area of\
    \ Figure 19-18 you can see that the Pico W has successfully connected to WiFi\
    \ and has the IP address of 192.168.1.132. If you now navigate to this address\
    \ in a browser window, either on your Raspberry Pi or any other machine connected\
    \ to the network, you will see something like Figure 19-19.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_578_0.png)\n\
    \nFigure 19-19. A web page served by a Pico W\n\n### Discussion\n\nThe entire\
    \ program for *hello.py* is shown in Figure 19-18, and, as you can see, there\
    \ is not much to it.\n\nThe @app.route('/') specifies the handler for the root\
    \ page that the Pico W is serving, and all this function does is to return the\
    \ text “Hello, from Pico” to be shown on the web page.\n\nThe command app.run(port=80)\
    \ starts the web server running on port 80, the standard web serving port.\n\n\
    We could expand this example to report readings from a remote sensor attached\
    \ to a Pico W. As an example of this, we can use the Plant Monitor from Recipe\
    \ 14.6, but attach it to a Pico W rather than a regular Raspberry Pi.\n\nConnect\
    \ the Pico to the Plant Monitor as follows:\n\n- GND to GND\n- 3V to 3V\n- TX\
    \ on the Plant Monitor to RX on the Pico W\n- RX on the Plant Monitor to TX on\
    \ the Pico W\n\nYou can either connect the two devices directly using female-to-female\
    \ headers, or, as shown in Figure 19-20 using a breadboard and male-to-female\
    \ jumper wires.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_579_0.png)\n\nFigure\
    \ 19-20. Connecting a Plant Monitor to a Pico W\n\nRun the example `pico_w_server.py`\
    \ and then refresh the browser window. You should see something that looks like\
    \ Figure 19-21.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_579_1.png)\n\nFigure\
    \ 19-21. Sensor readings from a web page served by Thonny\n\n### See Also\n\n\
    More information is available on the [microdot module](https://microdot.readthedocs.io/),\
    \ and on [mm_wlan](https://micropython.readthedocs.io/en/latest/library/network.WLAN.html).\n\
    \nIf the syntax of the microdot module looks familiar, then that might be because\
    \ it is much the same as for the Bottle library used in Recipe 7.17.\nFind out\
    \ about the Plant Monitor at https://oreil.ly/2OBHW.\n\n## 19.12 Using Pico-Compatible\
    \ Boards\n\n### Problem\n\nYou'd like to make use of one of the many Pico-compatible\
    \ boards.\n\n### Solution\n\nOne purpose of the Raspberry Pi Pico is to show off\
    \ the features of the RP2040 processor that it uses. Many other boards use the\
    \ RP2040 and can be programmed in MicroPython using Thonny in just the same way.\n\
    Table 19-3 lists a selection of interesting RP2040 boards available at the time\
    \ of writing. An internet search will, I'm sure, reveal other RP2040 boards.\n\
    \nTable 19-3. RP2040 boards\n\n| Name | Manufacturer | Notes |\n|---|---|---|\n\
    | QTPy RP2040 | Adafruit | A tiny board, with reduced number of I/O pins and a\
    \ USB-C connector. |\n| Feather RP2040 | Adafruit | In Adafruit's Feather format,\
    \ a Pico with added LiPo battery charger and USB-C connector. Also available in\
    \ pink. |\n| PicoLiPo | Pimoroni | Very similar spec to the Feather RP2040. |\n\
    | Badger | Pimoroni | Minimal pins, but 5 push buttons and a large E Ink display.\
    \ |\n\n### Discussion\n\nThe Pimoroni Badger is one of the most interesting RP2040\
    \ boards. It can be used as an ID badge, displaying graphics and text on its E\
    \ Ink display, which will still display even when the power goes off. But it also\
    \ has the full processing power of the Pico available for you to use in MicroPython.\n\
    The Badger comes with a MicroPython image installed and running an example program.\
    \ To interact with it or put your own programs on it, connect it to your Raspberry\
    \ Pi using a USB-C lead (not the micro USB of the Pico), and you can then interact\
    \ with it as if it were a Pico.\nTo make it easy to access the E Ink display,\
    \ Pimoroni has included a Python module to draw graphics and text on the E Ink\
    \ display.\nThe example program in ch_19_badger.py, and shown in Figure 19-22,\
    \ uses the RP2040's temperature sensor to display a rudimentary thermometer.\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_581_0.png)\n\nFigure 19-22. The Pimoroni\
    \ Badger RP2040 board\n\nIf you prefer your temperatures in degrees Fahrenheit,\
    \ use the program *ch_19_badger_f.py*. The temperature is likely to always be\
    \ shown a few degrees higher than the room temperature, as this is the temperature\
    \ of the chip, not the environment:\n\n```python\nimport badger2040\nfrom machine\
    \ import ADC\nfrom utime import sleep\n\nbadger = badger2040.Badger2040()\ntemp_sensor\
    \ = ADC(4)\npoints_per_volt = 3.3 / 65535\n\ndef read_temp_c():\n    reading =\
    \ temp_sensor.read_u16() * points_per_volt\n    temp_c = 27 - (reading - 0.706)/0.001721\n\
    \    return temp_c\n\nbadger.font(\"bitmap8\")\n\nold_t = 0\n\nwhile True:\n \
    \   t = round(read_temp_c())\n    if t != old_t:\n        old_t = t\n        badger.pen(255)\n\
    \        badger.clear()\n        badger.pen(0)\n        badger.text(str(t), 20,\
    \ 10, scale=16)\n        badger.text(\"o\", 220, 5, scale=8)\n        badger.text(\"\
    C\", 255, 20, scale=8)\n        badger.update()\n    sleep(5)\n```\n\nAs with\
    \ all the program examples in this book, you can also download this code (see\
    \ Recipe 3.22).\n\nThe program is based on ch_19_temp_logger.py, with the addition\
    \ of code to display the temperature. The module badger2040 contains the interface\
    \ to the E Ink display. Having created an instance of the Badger2040 class, the\
    \ default font is set to bitmap8, which is quite a blocky font, but looks good\
    \ as a thermometer.\n\nThe main while loop reads the temperature, and if it has\
    \ changed, then it redisplays the new temperature. Unlike other displays, E Ink\
    \ displays refresh slowly and with a fair amount of blinking. So the display would\
    \ look quite distracting if it refreshed every time through the while loop.\n\n\
    Writing to the display is similar to using an OLED display (see Recipe 15.4).\
    \ The things to be displayed are written to a buffer before the display is told\
    \ to update using the update method. In this case, the display is first cleared\
    \ by setting the ink color to white (255) and then calling clear(). The pen color\
    \ is then set to 0 (black), the temperature is converted to text, and then it\
    \ is drawn at coordinates x = 20, y = 10. Some smaller text is then displayed\
    \ for the units of degrees. Finally, there is a sleep of five seconds to stop\
    \ the display from constantly refreshing when the measured temperature is at the\
    \ threshold between two values.\n\n### See Also\n\nFor more information on using\
    \ the Pimoroni Badger, see https://oreil.ly/EyxoP.\n\nCheck out a reference on\
    \ the badger2040 module.\n\n## 19.13 Using the Pico on Batteries\n\n### Problem\n\
    \nYou want to run your Pico or Pico W from batteries.\n\n### Solution\n\nA really\
    \ good balance of long battery life and low cost can be achieved by using a battery\
    \ pack containing two AA batteries.\n\nThis can easily be connected using a Pico\
    \ on a breadboard as shown in Figure 19-23."
  mdcn: "## 解决方案\n\n使用 MicroPython 的 *线程* 机制，让代码与主线程并行运行。你可以在程序 *ch_19_multicore.py*\
