    and [https://oreil.ly/ZSDNi](https://oreil.ly/ZSDNi).


    # 17.4 Sending Email and Other Notifications with IFTTT


    # Problem


    You want a flexible way for your Raspberry Pi to send notifications through email,
    Facebook, Twitter, or Slack.


    # Solution


    Have your Raspberry Pi send requests to the If This Then That (IFTTT) *Maker*
    channel to trigger configurable notifications.


    This recipe is illustrated with an example that sends you an email when the CPU
    temperature of your Raspberry Pi exceeds a threshold.


    You need to create an account with IFTTT before you can begin using it, so visit
    [www.ifttt.com](https://www.ifttt.com), sign up for a free account, and log in.


    The next step is to create a new IFTTT *applet* on the IFTTT website. An applet
    is like a rule, such as *When I get a web request from a Raspberry Pi, send an
    email*. Click the CREATE button on the web page. This will prompt you to first
    enter the IF THIS part of the recipe and later the THEN THAT part.


    In this case, the IF THIS part (the trigger) is going to be the receipt of a web
    request from your Raspberry Pi, so click THIS and then enter **Webhooks** into
    the search field to find the Webhooks channel. Select the Webhooks channel and,
    when prompted, select the option “Receive a web request.” Clicking Create should
    bring up something like Figure 17-8.'
  merge: -1
  pgno: 494
- img_proc: true
  md: '![](img/e36e77524aeaae366529d1cf02f9a39c_495_0.png)


    Figure 17-8. The "Receive a web request" trigger form


    In the Event Name field, enter the text **cpu_too_hot** and then click "Create
    trigger."


    This will now move you to the THEN THAT portion of the recipe, the *action*, and
    you will need to select an action channel. There are many options, but for this
    example, you will use the Email channel, so in the search field, type **Email**
    and then select the Email channel.


    Having selected the Email channel, select the action "Send me an email," which
    displays the form shown in Figure 17-9.


    Change the text so that it appears as shown in Figure 17-9. Note that the special
    values OccurredAt and Value1 will both be surrounded by {{ and }}. These values
    are called ingredients and are variable values that will be taken from the web
    request and substituted into the email subject and body.


    Click "Create action" and then Finish to complete the recipe creation.'
