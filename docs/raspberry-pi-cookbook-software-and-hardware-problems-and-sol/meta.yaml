    # Discussion


    Vendors of hardware sometimes offer their own disk image that has support for
    their hardware built into it. It’s best to avoid using such images because doing
    so means that you will not get all the benefits of using a standard Raspberry
    Pi OS distribution and all the pre-installed software. It also means that if you
    have a problem with a piece of software, it will be a lot more difficult to find
    support because you are using a nonstandard distribution.


    The Raspberry Pi 4 and 400 hardware does have a 64-bit processor and a 64-bit
    version of the operating system is available, but at the time of writing using
    the default Raspberry Pi OS 32-bit option is much more stable.


    # microSD Cards


    Not all microSD cards are created equal, and the performance of your Raspberry
    Pi will be better with a better card. So look for a card specified as being “class
    10.” Raspberry Pi OS includes a utility (Figure 1-12) to test your microSD card.
    You can find it by selecting Accessories, then Raspberry Pi Diagnostics from the
    Raspberry Pi Menu.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_37_0.png)


    Figure 1-12. Using the Raspberry Pi Diagnostics tool to test your SD card'
