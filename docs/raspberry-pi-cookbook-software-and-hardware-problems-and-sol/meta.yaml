  md: '# 14.20 Measuring Distance Using a Time-of-Flight Sensor


    # Problem


    You want to measure distance without using ultrasound (perhaps you have animals
    who would be frightened by ultrasound, or you want to measure distance more accurately).


    # Solution


    Use a VL53L1X I2C time-of-flight (ToF) sensor. These sensors are more expensive
    than their ultrasound equivalents. However, because they use light rather than
    sound, they are more accurate.


    The most common of these devices is the VL53L1X, and it’s available as a low-cost
    module from eBay as well as from other suppliers. The Pimoroni device we are using
    here has the advantage that it is compatible with the Pimoroni Breakout Garden
    system and can therefore be plugged in without any soldering. Figure 14-28 shows
    the ToF sensor and Breakout Garden.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_440_0.png)


    Figure 14-28. A VL53L1X ToF sensor and Pimoroni Breakout Garden


    To make this project, you will need either:


    +   - Pimoroni Breakout Garden (see “Prototyping Equipment and Kits” on page 564)

    - Pimoroni VL53L1X distance sensor (see “Modules” on page 566)


    or:'
  merge: -1
  pgno: 440
- img_proc: true
  md: "+   - Generic VL53L1X distance sensor module (see “Modules” on page 566)\n\
    - Four male-to-female jumper wires (see “Prototyping Equipment and Kits” on page\
    \ 564)\n\nConnecting this I2C device to a Raspberry Pi is just like connecting\
    \ any other. The device will work at 3V so, in addition to connecting 3V and GND,\
    \ you should connect the SDA pin of the sensor to the SDA pin of the Raspberry\
    \ Pi (also called GPIO 2) and the SCL pin of the sensor to the SCL pin of the\
    \ Raspberry Pi (GPIO 3).\n\nIf you chose to use the Breakout Garden, just make\
    \ sure you place the sensor in the appropriate orientation (see Figure 14-28).\
    \ If you are using jumper wires, connect the devices as follows:\n\n+   - The\
    \ VCC pin of the VL53L1X to 3V on the Raspberry Pi\n- The GND pin of the VL53L1X\
    \ to GND on the Raspberry Pi\n- The SDA pin of the VL53L1X to GPIO 2 (SDA) on\
    \ the Raspberry Pi\n- The SCL pin of the VL53L1X to GPIO 3 (SCL) on the Raspberry\
    \ Pi\n\nThe VL53L1X uses I2C, so you need to enable this by following Recipe 10.4.\
    \ After you’ve enabled it, run the following commands to install the software\
    \ for the VL53L1X:\n\n```\n$ sudo pip3 install smbus2\n$ sudo pip3 install vl53l1x\n\
    ```\n\nThe test program for this recipe (ch_14_tof.py) prints the distance measurement\
    \ in millimeters once per second:\n\n```\nimport VL53L1X, time\n\ntof = VL53L1X.VL53L1X(i2c_bus=1,\
    \ i2c_address=0x29)\ntof.open()\ntof.start_ranging(1) # Start range1=Short 2=Medium\
    \ 3=Long\n\nwhile True:\n    mm = tof.get_distance() # Grab the range in mm\n\
    \    print(\"mm=\" + str(mm))\n    time.sleep(1)\n```\n\nAs with all the program\
    \ examples in this book, you can also download this program (see Recipe 3.22).\n\
    \nNote that if your device has a different I2C address, you might need to change\
    \ 0x29 to the address of your device."
