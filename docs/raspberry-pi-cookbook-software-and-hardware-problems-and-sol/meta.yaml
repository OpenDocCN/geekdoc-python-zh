  md: '# Solution


    Use an L293D H-bridge driver chip. An H-bridge is required to drive a bipolar
    stepper motor because, as the word *bipolar* suggests, the direction of current
    across the windings needs to be reversed, rather like driving a DC motor in both
    directions (see Recipe 12.5).


    To make this recipe, you’ll need the following:


    +   - 12V, four-pin bipolar stepper motor (see “Miscellaneous” on page 567)

    - L293D H-bridge IC (see “Integrated Circuits” on page 565)

    - Breadboard and jumper wires (see “Prototyping Equipment and Kits” on page 564)


    The motor used here, a 12V one, is somewhat larger than the unipolar stepper motor
    example in Recipe 12.6. The power for the motor itself is therefore supplied from
    an external power supply rather than from the Raspberry Pi. See the wiring diagram
    in Figure 12-14.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_359_0.png)'
  merge: -1
  pgno: 359
- img_proc: true
  md: '# Discussion


    A bipolar stepper motor is just like the unipolar version shown in Figure 12-13,
    except that the red central tapping connections to the coils are not present.
    The same energization pattern will work just as well on both variants, but for
    a bipolar motor, the direction of the current in the whole of the coil must be
    reversible; hence, two H-bridges are necessary.


    You can use the same *ch_12_stepper.py* program to control this stepper (see Recipe
    12.6). The design uses both H-bridges of the L293D, so you need one of these chips
    for each motor that you want to control.


    # See Also


    If the type of stepper motor you have is a five-wire unipolar stepper motor, see
    Recipe 12.6.


    For more information on stepper motors—the different types and how they work—see
    Wikipedia, where you will also find a nice animated explanation of the activation
    pattern for driving the motor.


    For information on using servomotors, see Recipe 12.1; for information on controlling
    DC motors, see Recipes 12.4 and 12.5.


    For more information on using a breadboard and jumper wires with the Raspberry
    Pi, see Recipe 10.9.


    # 12.8 Using a Stepper Motor HAT to Drive a Bipolar Stepper Motor


    # Problem


    You want to control multiple bipolar stepper motors using a single interface board.


    # Solution


    Use an Adafruit Stepper Motor HAT.


    This board is capable of driving two bipolar stepper motors. Figure 12-15 shows
    the board with one bipolar stepper motor, with one coil connected to the M1 terminals
    and the other coil to the M2 terminals. The power for the motors is supplied separately
    at the screw terminals on the right.'
