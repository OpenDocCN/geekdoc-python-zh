    \ tel):\n    self.name = name\n    self.tel = tel\n```\n\n构造函数方法必须如所示命名，单词 init\
    \ 两侧有双下划线。\n\n### 讨论\n\nPython 与大多数面向对象语言的一个不同之处在于，你需要将特殊变量 self 作为参数包含在类中定义的所有方法中。这是一个引用，在这种情况下，是新创建的实例。变量\
    \ self 与 Java 和其他一些语言中的特殊变量 this 概念相同。\n\n此方法中的代码将传递给它的参数转换为*成员变量*。成员变量不需要预先声明，但它们需要以\
    \ self 为前缀。\n\n因此，这一行：\n\n```python\nself.name = name\n```\n\n创建一个名为 name 的变量，该变量可被\
    \ Person 类的所有成员访问，并使用传递给创建实例的调用的值初始化它，如下所示：\n\n```python\np = Person(\"Simon\"\
    , \"1234567\")\n```\n\n然后，我们可以通过输入以下内容来检查我们的新 Person 对象 p 的名字是否为 \"Simon\"：\n\n\
    ```python\n>>> p.name\nSimon\n```\n\n在复杂的程序中，良好的做法是将每个类放在自己的文件中，文件名与类名匹配。这也使得将类转换为模块变得容易（参见配方\
    \ 7.11）。\n\n### 另请参阅\n\n有关定义方法的信息，请参阅配方 7.5。\n\n## 7.5 定义一个方法\n\n### 问题\n\n你需要向类中添加一些代码。\n\
    \n### 解决方案\n\n与特定类关联的函数称为*方法*。\n以下示例展示了如何在类定义中包含一个方法：\n\n```python\nclass Person:\n\
    \    '''This class represents a person object'''\n\n    def __init__(self, first_name,\
    \ surname, tel):\n        self.first_name = first_name\n        self.surname =\
    \ surname\n        self.tel = tel\n\n    def full_name(self):\n        return\
    \ self.first_name + \" \" + self.surname\n```\n\n`full_name` 方法连接人的名字和姓氏属性，在它们之间放置一个空格，可能产生类似这样的输出：\n\
    \nSimon Monk\n\n### 讨论\n\n你可以将方法视为绑定到特定类的函数，它们在处理过程中可能使用也可能不使用该类的成员变量。因此，与函数一样，你可以在方法中编写任何你喜欢的代码，也可以让一个方法调用另一个方法。\n\
    \n### 另请参阅\n\n有关定义类的信息，请参阅配方 7.4。"
