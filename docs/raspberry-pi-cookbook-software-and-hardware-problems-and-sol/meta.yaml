- md: '## Discussion


    Python is unusual for a programming language in that indentation is a fundamental
    part of the language. Whereas many C-based languages use { and } to delimit a
    block of code, Python uses the indentation level. So in the preceding example,
    Python knows that print is to be invoked repeatedly as part of the for loop because
    it is indented four spaces from the left.


    When you''re starting out in Python, it''s not uncommon to see an error such as
    “IndentationError: unexpected indent,” which means that something is not indented
    correctly somewhere. If everything appears to line up, double-check that none
    of the indents contain tab characters because Python treats tabs differently.


    You can use either spaces or tabs but you can''t mix them in the same block, and
    it is very bad practice to mix them in the same program (even if Python allows
    you to do so).


    In selecting Python 3 for our editing mode (Figure 5-4), we ignored the other
    mode options. The Adafruit CircuitPython mode allows you to use your Raspberry
    Pi to program Adafruit''s range of CircuitPython boards, and the BBC micro:bit
    mode allows you to write MicroPython programs for a BBC micro:bit board. Both
    of these activities are about using other boards that are not covered in this
    book; however, it''s good to know that options are available for using the Raspberry
    Pi with these microcontroller boards.


    ## See Also


    The other popular Python editor for beginners is Thonny (Recipe 5.3).


    As well as using Mu to edit and run Python files, you can also edit files in nano
    (Recipe 3.7) and then run them from a Terminal session (Recipe 5.6).


    ## 5.5 Using the Python Console


    ### Problem


    You want to enter Python commands without writing an entire program. It can be
    useful to do this to experiment with some features of Python.


    ### Solution


    Use the Python console, either within Thonny or in a Terminal session. The Python
    console provides a command line a little like that of Raspberry Pi OS (Recipe
    3.3), but instead of entering operating system commands, you can enter Python
    commands. If you are using Mu (Recipe 5.4), you can access the Python console
    by clicking the REPL (Read Eval Print Loop) button at the top of the Mu window
    (Figure 5-9).


    Ignoring everything except the bottom of Figure 5-9, you can see a command prompt
    where you can type Python commands. In this case, I have typed the following after
    the In [1]: prompt:


    ```

    2 + 2

    ```


    and reassuringly received the answer:


    ```

    4

    ```


    ### Discussion


    An alternative to using Mu to run individual Python commands is to start a Python
    3 console in a Terminal window by typing the command **python3**.


    The >>> prompt indicates that you can type Python commands. If you need to type
    multiline commands, then the console will automatically provide a continuation
    line indicated by three dots. You still need to indent such lines by four spaces,
    as shown in the following session:


    ```

    >>> from time import sleep

    >>> while True:

    ...     print("hello")

    ...     sleep(1)

    ...

    hello

    hello

    ```


    You need to press Enter twice after your last command for the console to recognize
    the end of the indented block and run the code.


    The Python console also provides a command history so that you can move back and
    forth through your previous commands using the up and down arrow keys.

    When you are finished with the Python console and want to return to the command
    line, type `exit()`.


    > ## Help Is at Hand

    > The console can be a useful place to test out lines of code while you are developing
    a program, without having to run the whole program. You can get help on many Python
    features by typing `help(thing)` into the console, where *thing* is the thing
    you want help on.


    For example, try typing `help(print)` into the Python console.


    ### See Also


    If you have more than a couple of lines that you want to type in, chances are
    you would be better off using Thonny or Mu (Recipe 5.3 or 5.4) to edit and run
    a file.


    ## 5.6 Running Python Programs from the Terminal


    ### Problem


    Running programs from within Thonny (Recipe 5.3) or Mu (Recipe 5.4) is fine, but
    sometimes you want to run a Python program from a Terminal window.


    ### Solution


    Use the `python` or `python3` command in a Terminal, followed by the filename
    containing the program you want to run. (Raspberry Pi OS comes only with Python
    3, so both the `python` or `python3` commands will run a Python 3 program. Which
    command you use is up to you.)


    ### Discussion


    To run a Python 3 program from the command line, use a command like this:


    ```

    $ python3 myprogram.py

    ```


    If you want to run the program using Python 2, change the command `python3` to
    `python2` after installing Python 2 as described in Recipe 5.1. In both cases
    the Python program that you want to run should be in a file with the extension
    `.py`.


    You can run most Python programs as a normal user; however, some you''ll need
    to run as superuser. If this is the case for your program, prefix the command
    with sudo: but be aware that if someone malicious wrote that program, giving it
    such privileges could allow it to get up to all sorts of mischief:


    ```

    $ sudo python3 myprogram.py

    ```


    In the earlier examples, you need to include python3 in the command to run the
    program, but you can optionally add a line to the start of a Python program so
    that Linux knows it is a Python program. This special line is called a shebang
    (a contraction of the names of two symbols, “hash” and exclamation mark, or “bang”).
    The following single-line example program illustrates this:


    ```

    #!/usr/bin/python3

    print("I''m a program, I can run all by myself")

    ```


    Before you can run this directly from the command line, you must give the file
    write permissions by using the following command (see Recipe 3.14); this example
    assumes the file is called test.py:


    ```

    $ chmod +x test.py

    ```


    The parameter +x means to add execute permissions to the file.


    Now you can run the Python program test.py using the single command:


    ```

    $ ./test.py

    I''m a program, I can run all by myself

    $

    ```


    The ./ at the start of the line is needed for the command line to find the file.


    If you run a Python program with the -i option, the program will run and a console
    will open. This can be useful for debugging because you will have access to the
    program''s variables within the console, as if you had just typed the program
    directly into the console.


    ### See Also


    Recipe 3.25 shows you how to run a Python program as a timed event.


    To automatically run a program at startup, see Recipe 3.23.


    ## 5.7 Assigning Names to Values (Variables)


    ### Problem


    You want to give a value a name.


    ### Solution


    You assign a value to a name using =.


    ### Discussion


    In Python, you don''t have to declare the type of a variable; you can just assign
    it a value using the assignment operator (=), as shown in the following examples:


    ```

    a = 123

    b = 12.34

    c = "Hello"

    d = ''Hello''

    e = True

    ```


    You can define character-string constants using either single or double quotes.
    The logical constants in Python are True and False, and they are case sensitive.


    By convention, variable names begin with a lowercase letter, and if the variable
    name consists of more than one word, the words are joined together with an underscore
    character. A variable name cannot start with a digit, but may include digits after
    the first character.


    It is always a good idea to give your variables descriptive names so that when
    you come back to your program after a break, you can work out how it works.


    Some examples of valid variable names are x, total, and number_of_chars.


    ### See Also


    You also can assign a variable a value that is a list (Recipe 6.1) or a dictionary
    (Recipe 6.13).


    For more information on arithmetic with variables, see Recipe 5.10.


    ## 5.8 Displaying Output


    ### Problem


    You want to see the value of a variable.


    ### Solution


    Use the print command. You can try the following example in the Python console
    (Recipe 5.5):'
  mdcn: '## 讨论


    Python 作为一种编程语言，其独特之处在于缩进是语言的基本组成部分。许多基于 C 的语言使用 `{` 和 `}` 来界定代码块，而 Python 则使用缩进级别。因此，在前面的例子中，Python
    知道 `print` 是作为 `for` 循环的一部分被重复调用的，因为它从左边缩进了四个空格。


    当你刚开始使用 Python 时，看到类似 “IndentationError: unexpected indent” 的错误并不罕见，这意味着某处缩进不正确。如果一切看起来都对齐了，请仔细检查缩进中是否包含制表符，因为
    Python 对制表符的处理方式不同。


    你可以使用空格或制表符，但不能在同一个代码块中混合使用它们，并且在同一个程序中混合使用是非常糟糕的做法（即使 Python 允许你这样做）。


    在为我们的编辑模式选择 Python 3（图 5-4）时，我们忽略了其他模式选项。Adafruit CircuitPython 模式允许你使用树莓派来编程
    Adafruit 的一系列 CircuitPython 开发板，而 BBC micro:bit 模式允许你为 BBC micro:bit 开发板编写 MicroPython
    程序。这两项活动都是关于使用本书未涵盖的其他开发板；然而，了解有选项可以将树莓派与这些微控制器开发板一起使用是很好的。


    ## 另请参阅


    另一个适合初学者的流行 Python 编辑器是 Thonny（配方 5.3）。


    除了使用 Mu 编辑和运行 Python 文件外，你还可以在 nano（配方 3.7）中编辑文件，然后从终端会话（配方 5.6）中运行它们。


    ## 5.5 使用 Python 控制台


    ### 问题


    你想输入 Python 命令而无需编写整个程序。这样做对于试验 Python 的某些功能可能很有用。


    ### 解决方案


    使用 Python 控制台，可以在 Thonny 中或在终端会话中使用。Python 控制台提供了一个类似于树莓派操作系统（配方 3.3）的命令行，但你可以输入
    Python 命令而不是操作系统命令。如果你使用 Mu（配方 5.4），你可以通过点击 Mu 窗口顶部的 REPL（读取-求值-打印-循环）按钮（图 5-9）来访问
    Python 控制台。


    忽略图 5-9 中除底部以外的所有内容，你可以看到一个命令提示符，你可以在其中输入 Python 命令。在这种情况下，我在 `In [1]:` 提示符后输入了以下内容：


    ```

    2 + 2

    ```


    并放心地得到了答案：


    ```

    4

    ```


    ### 讨论


    使用 Mu 运行单个 Python 命令的替代方法是在终端窗口中通过输入命令 **python3** 来启动 Python 3 控制台。


    `>>>` 提示符表示你可以输入 Python 命令。如果你需要输入多行命令，控制台将自动提供一个由三个点表示的续行。你仍然需要将这些行缩进四个空格，如以下会话所示：


    ```

    >>> from time import sleep

    >>> while True:

    ...     print("hello")

    ...     sleep(1)

    ...

    hello

    hello

    ```


    你需要在最后一个命令后按两次回车键，控制台才能识别缩进块的结束并运行代码。


    Python 控制台还提供命令历史记录，因此你可以使用向上和向下箭头键在之前的命令中来回移动。

    当你完成 Python 控制台的使用并想返回命令行时，输入 `exit()`。


    > ## 帮助触手可及

    > 控制台在开发程序时可以是一个测试代码行的有用场所，而无需运行整个程序。你可以通过在控制台中输入 `help(thing)` 来获取关于许多 Python
    功能的帮助，其中 *thing* 是你想要获取帮助的对象。


    例如，尝试在 Python 控制台中输入 `help(print)`。


    ### 另请参阅


    如果你需要输入的代码行超过几行，你最好使用 Thonny 或 Mu（配方 5.3 或 5.4）来编辑和运行文件。


    ## 5.6 从终端运行 Python 程序


    ### 问题


    从 Thonny（配方 5.3）或 Mu（配方 5.4）中运行程序很好，但有时你想从终端窗口运行 Python 程序。


    ### 解决方案


    在终端中使用 `python` 或 `python3` 命令，后跟包含你要运行的程序的文件名。（树莓派操作系统仅附带 Python 3，因此 `python`
    或 `python3` 命令都将运行 Python 3 程序。使用哪个命令取决于你。）


    ### 讨论


    要从命令行运行 Python 3 程序，请使用如下命令：


    ```

    $ python3 myprogram.py

    ```


    如果你想使用 Python 2 运行程序，请在按照配方 5.1 安装 Python 2 后，将命令 `python3` 更改为 `python2`。在这两种情况下，你要运行的
    Python 程序都应该在一个扩展名为 `.py` 的文件中。


    你可以以普通用户身份运行大多数 Python 程序；但是，有些你需要以超级用户身份运行。如果你的程序属于这种情况，请在命令前加上 `sudo`：但要注意，如果有人恶意编写了该程序，赋予它这样的权限可能会让它进行各种恶作剧：


    ```

    $ sudo python3 myprogram.py

    ```


    在前面的示例中，你需要在命令中包含 `python3` 来运行程序，但你可以选择在 Python 程序的开头添加一行，以便 Linux 知道它是一个 Python
    程序。这个特殊的行称为 shebang（是两个符号名称的缩写，“hash”和感叹号，或“bang”）。以下单行示例程序说明了这一点：


    ```

    #!/usr/bin/python3

    print("I''m a program, I can run all by myself")

    ```


    在你可以直接从命令行运行此程序之前，你必须使用以下命令（参见配方 3.14）赋予文件写权限；此示例假设文件名为 test.py：


    ```

    $ chmod +x test.py

    ```


    参数 `+x` 表示向文件添加执行权限。


    现在你可以使用单个命令运行 Python 程序 test.py：


    ```

    $ ./test.py

    I''m a program, I can run all by myself

    $

    ```


    命令行需要行首的 `./` 来找到文件。


    如果你使用 `-i` 选项运行 Python 程序，程序将运行并打开一个控制台。这对于调试很有用，因为你可以在控制台中访问程序的变量，就好像你刚刚直接将程序输入到控制台中一样。


    ### 另请参阅


    配方 3.25 向你展示如何将 Python 程序作为定时事件运行。


    要自动在启动时运行程序，请参阅配方 3.23。


    ## 5.7 将名称赋值给值（变量）


    ### 问题


    你想给一个值一个名称。


    ### 解决方案


    你使用 `=` 将值赋给名称。


    ### 讨论


    在 Python 中，你不必声明变量的类型；你可以使用赋值运算符 (`=`) 直接为其赋值，如以下示例所示：


    ```

    a = 123

    b = 12.34

    c = "Hello"

    d = ''Hello''

    e = True

    ```


    你可以使用单引号或双引号定义字符串常量。Python 中的逻辑常量是 `True` 和 `False`，它们区分大小写。


    按照惯例，变量名以小写字母开头，如果变量名由多个单词组成，则单词之间用下划线字符连接。变量名不能以数字开头，但可以在第一个字符后包含数字。


    给你的变量起描述性名称总是一个好主意，这样当你休息一段时间后回到程序时，你可以弄清楚它是如何工作的。


    一些有效变量名的例子是 `x`、`total` 和 `number_of_chars`。


    ### 另请参阅


    你也可以将变量赋值为一个列表（配方 6.1）或一个字典（配方 6.13）。


    有关变量算术运算的更多信息，请参阅配方 5.10。


