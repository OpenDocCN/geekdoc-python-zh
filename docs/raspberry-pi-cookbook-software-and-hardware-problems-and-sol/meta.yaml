    You can also detect the position of a pot without the use of an ADC chip by using
    the step response method (Recipe 14.1).


    Check out the datasheet for the MCP3008.


    The Explorer HAT Pro from Pimoroni also has an ADC (Recipe 10.16).


    # 14.8 Reducing Voltages for Measurement


    # Problem


    You want to measure a voltage, but it is higher than the 3.3V possible using an
    MCP3008 (Recipe 14.7).


    # Solution


    Use a pair of resistors to act as a voltage divider to reduce the voltage to a
    suitable range.


    To try this recipe, you''ll need the following:


    +   - Breadboard and jumper wires (see “Prototyping Equipment and Kits” on page
    564)

    - MCP3008 eight-channel ADC IC (see “Integrated Circuits” on page 565)

    - 10kΩ resistor (see “Resistors and Capacitors” on page 565)

    - 3.3kΩ resistor (see “Resistors and Capacitors” on page 565)

    - 9V battery and clip lead


    Figure 14-14 shows the arrangement for this, using a breadboard. The setup will
    measure the voltage of the battery.'
