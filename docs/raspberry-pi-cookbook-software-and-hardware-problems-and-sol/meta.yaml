- img_proc: true
  md: 'The OpenCV system contains a whole load of classifiers for detecting faces
    and other features. These are all contained in the directory found using the pkg_resources
    utility package. The actual face detector that we are going to use in this program
    is contained in an XML descriptor file called haarcascade_frontalface_default.xml.


    The image is read into a file as grayscale. The parameters scale_factor and min_neighbors
    may need tweaking if you use an image of your own rather than the test image.


    scale_factor

    This determines the step size that the face detector will use in trying to find
    faces by automatically changing the image scale. In this case, a value of 1.4
    means the scale will change by 40% each time. Setting this to a higher number
    will speed up face matching but may result in some faces being missed.


    min_neighbors

    If this parameter is too low, the algorithm essentially becomes less fussy about
    what it considers to be a face.


    Once the faces are detected, the print command shows the coordinates of the rectangles
    found, and then the for loop superimposes them on the image before displaying
    it.


    There are many built-in HAAR features. You can list them all using the following
    command:


    ```

    $ cd /.local/lib/python3.9/site-packages/cv2/data/

    $ ls

    haarcascade_eye.xml

    haarcascade_frontalcatface_extended.xml

    haarcascade_frontalcatface.xml

    haarcascade_frontalface_alt2.xml

    haarcascade_frontalface_alt_tree.xml

    haarcascade_frontalface_alt.xml

    haarcascade_frontalface_default.xml

    haarcascade_fullbody.xml

    haarcascade_lefteye_2splits.xml

    haarcascade_lowerbody.xml

    haarcascade_profileface.xml

    haarcascade_righteye_2splits.xml

    haarcascade_russian_plate_number.xml

    haarcascade_smile.xml

    haarcascade_upperbody.xml

    __init__.py

    __pycache__

    ```


    As you can see, they are all associated with parts of the body. You can even look
    for smiles!


    # See Also


    In Chapter 9 we will return to object recognition, but by using machine learning
    techniques we will be able to detect all sorts of objects.


    For information on installing OpenCV, see Recipe 8.1.'
