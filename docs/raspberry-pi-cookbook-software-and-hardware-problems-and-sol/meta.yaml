  md: "# 13.5 Debouncing a Button Press\n\n# Problem\n\nSometimes when you press the\
    \ button on a switch, the expected action happens more than once because the switch\
    \ contacts *bounce* (Figure 13-8). In that case, you want to write code that *debounces*\
    \ the switch.\n\n# Solution\n\nThe gpiozero Button class includes code that deals\
    \ with bouncing of switch contacts. However, by default this is turned off. You\
    \ can change it when you create a button instance using the optional bounce_time\
    \ parameter.\n\nSee the Discussion for more information on what is going on with\
    \ switch bouncing. But the basic idea is that when a switch is pressed, the contacts\
    \ can *bounce*, producing false readings of the switch position. The bounce_time\
    \ parameter determines how long false changes of the switch state should be ignored\
    \ for.\n\nIn Recipe 13.2, for example, you might have noticed that pressing the\
    \ button often doesn't seem to toggle the LED. This will happen if you get an\
    \ even number of bounces when you press the button, so that one bounce turns the\
    \ LED on and a second bounce immediately turns it off again (within a fraction\
    \ of a second), with the result that it looks like nothing happened.\n\nYou can\
    \ modify the program ch_13_switch_on_off.py to set the debouncing time by adding\
    \ the bounce_time optional parameter where you define the button:\n\n```\nfrom\
    \ gpiozero import Button, LED\nfrom time import sleep\n\nled = LED(23)\n\ndef\
    \ toggle_led():\n    print(\"toggling\")\n    led.toggle()\n\nbutton = Button(18,\
    \ bounce_time=0.1)\nbutton.when_pressed = toggle_led\n\nwhile True:\n    print(\"\
    Busy doing other stuff\")\n    sleep(2)\n```\n\nAs with all the program examples\
    \ in this book, you can also download this code (see Recipe 3.22)."
  merge: -1
  pgno: 374
- img_proc: true
  md: 'In this example, the bounce time is set to 0.1 seconds, which should be more
    than enough time for the switch contacts to settle.


    # Discussion


    Switch bouncing occurs on most switches and can be quite severe on some switches,
    as the oscilloscope trace in Figure 13-8 shows.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_375_0.png)


    Figure 13-8. Contact bounce with a poor switch


    You can see that there is contact bounce both as the switch closes and when it
    is released. Most switches are not as bad as this one.


    # See Also


    For the basics of connecting a button, see Recipe 13.1.


    # 13.6 Using an External Pull-Up Resistor


    # Problem


    You want to run a long wire from the Raspberry Pi to the switch, but you are getting
    some false readings on the input pin.


    # Solution


    The Raspberry Pi GPIO pins include pull-up resistors. When a GPIO pin is being
    used as a digital input, its pull-up resistor will keep the input high (3.3V)
    until the input is pulled down to GND, perhaps by a switch. In addition, the pull-up
    resistor can be turned on and off within your Python program.'
  merge: -1
  pgno: 375
- img_proc: true
  md: 'These internal pull-up resistors are quite weak (about 40kΩ), which means that
    if you run a long lead to the switch, or operate in an electrically noisy environment,
    you might get false triggerings on the digital input. You can overcome this by
    turning off the internal pull-up and pull-down resistors and using an external
    pull-up resistor.


    Figure 13-9 shows the use of an external pull-up resistor.


    To test out this hardware, you can use the program `ch_13_switch.py`; see Recipe
    13.1.


    # Discussion


    The lower the resistance of the resistor, the longer the range of your switch.
    However, when you press the button, a current flows from 3.3V through the resistor
    to ground. A 100Ω resistor draws a current of 3.3V/100Ω = 33mA. This is within
    the safe limit for the 3.3V supply of 50mA for a Raspberry Pi 1, so don''t use
    a lower value than this if you have an older Raspberry Pi. If you are using a
    newer 40-pin GPIO Raspberry Pi, you could drop this value even further, perhaps
    to 47Ω.


    In almost all cases, a 1kΩ resistor will provide a long range with no problems.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_376_0.png)


    # See Also


    For the basics of connecting a button, see Recipe 13.1.'
