    # 7.23 Using Regular Expressions to Search for Patterns in Text


    # Problem


    You want to do a complex search, looking for something in a piece of text.


    # Solution


    Use Python''s regular expression (regex) feature. Regular expressions have been
    around since the early days of computer science, when computer science was a branch
    of mathematics and benefited from the rigor of the mathematician''s mind.


    A regular expression is a way of describing a pattern that occurs in some text.
    This is similar to Recipe 5.16. However, with regular expressions you can find
    more flexible wildcard matches, as shown here:


    ```

    import re


    text = "looking forward to finding the word for"

    x = re.search("(^|\s)for($|\s)", text)


    print(x.span())

    ```


    As with all the program examples in this book, you can also download this program,
    called ch_07_regex_find.py (see Recipe 3.22).


    If you run this program, you will get the following output:


    ```

    $ python3 ch_07_regex_find.py

    (35, 39)

    ```


    This indicates that the word *for* has been found at character position 35 (actually
    the space before *for*) in the string. The second value is the end position index.
    Notice that the program has ignored the word *forward*. Let''s take a look at
    how this code works.


    First, we need to import the re (regular expression) module. Next, we add the
    variable text that contains the test string that we are going to search within.'
  merge: -1
  pgno: 240
- img_proc: true
  md: 'We then use the search function to find what we want in the string. The first
    parameter is the regular expression, and the second is the string to search. In
    this case, the regular expression is the following string:


    ```

    "(^|\s)for($|\s)"

    ```


    Right in the middle of the regular expression is the word *for*. That''s to be
    expected, because that''s the word we''re looking for. To either side of *for*
    are expressions in parentheses. Before it we have this:


    ```

    (^|\s)

    ```


    The three magic symbols are ^, which means the start of the string; |, which means
    *or*; and \s, which means any whitespace character (space or tab). So you can
    read this section as matching either the start of the string or some whitespace,
    before trying to match *for*. That is, *for* must either come at the start of
    the string or be preceded by a space or some other whitespace character. This
    ensures that the regular expression does not match words that end in *for*.


    There is a similar expression after *for* that must also match:


    ```

    ($|\s)

    ```


    Here, the new special symbol is $, which indicates the end of the string. In other
    words, after the letters *for*, a match will occur only if we are at the end of
    the string or there is a space or other whitespace character.


    Table 7-2 shows some of the most common regular expression symbols. You can find
    a complete list on this [W3Schools.com page](https://www.w3schools.com).


    *Table 7-2. Common regular expression symbols*


    | Special symbol | Meaning |

    |---|---|

    | . | Matches any single character. |

    | ^ | Matches the beginning of the string. |

    | $ | Matches the end of the string. |

    | \d | Any digit. |

    | \s | Whitespace. |

    | \w | Alphanumeric (digits and uppercase and lowercase letters). |

    | * | Zero or more occurrences of whatever follows it. For example, *\d will match
    a string of zero or more digits. |

    | + | One or more occurrences of whatever follows it. |

    | [ ] | Will match any of the characters contained between the brackets. You can
    also do ranges, such as [a–d], which will match any of the characters a to d.
    |


    The best way to become familiar with regular expressions is to play with an online
    regular expression tester.'
