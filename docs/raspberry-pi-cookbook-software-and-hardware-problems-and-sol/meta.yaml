    Figure 13-13. Keypad pin connections


    # Discussion


    The keys variable contains a map of the key name for each row and column position.
    You can customize this for your keypad.


    All the real action takes place in the get_key function. This enables each column
    in turn by setting it to low. An inner loop then tests each of the rows in turn.
    If one of the rows is low, the key name corresponding to that row and column is
    looked up in the keys array. If no keypress is detected, the default value of
    key (0) is returned.


    The main while loop just gets the key value and prints it. The sleep command slows
    down the output.


    # See Also


    An alternative to adding a keypad is simply to use a USB keyboard; that way you
    can just catch keystrokes, as described in Recipe 13.11.


