    \ (digits and uppercase and lowercase letters). |\n| * | Zero or more occurrences\
    \ of whatever follows it. For example, *\\d will match a string of zero or more\
    \ digits. |\n| + | One or more occurrences of whatever follows it. |\n| [ ] |\
    \ Will match any of the characters contained between the brackets. You can also\
