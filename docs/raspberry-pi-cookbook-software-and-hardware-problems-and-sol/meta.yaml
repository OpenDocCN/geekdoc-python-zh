  md: '# 2.3 Setting a Static IP Address


    # Problem


    You want to set the IP address of your Raspberry Pi so that it does not change.


    # Solution


    Although it is possible to set the static IP address of a Raspberry Pi on the
    Pi itself, it is better practice to configure this on your network, as it may
    lead to problems if you move the Raspberry Pi to a different network.


    All the computers, TVs, phones, and other internet-enabled devices in your home
    are generally connected to the internet via the router that links your phone line,
    4G, or a fiber-optic cable to your house. All of these devices, whether they connect
    to the router by WiFi or via a direct cable connection, are said to be part of
    your *local area network* (LAN).


    By default, when you connect a new device to your LAN (such as a Raspberry Pi),
    either by plugging it in with an Ethernet cable or by using WiFi, the LAN controller
    (your router) will use a system called DHCP to allocate an IP address for the
    device. This address will be allocated from a pool of IP addresses that might
    range from, for example, 192.168.1.2 to 192.168.1.199 (or maybe 10.0.0.2 to 10.0.0.199).
    In other words, just the last part of the four-part IP address changes for each
    device connected to the LAN.


    When DHCP allocates an IP address to a device, it does so with a lease time, which
    is how long that device will be guaranteed to keep the IP address without risk
    of it being allocated to some other device. Generally speaking, the default for
    this lease time is fairly short; on my router, it''s a week. This means that the
    IP address of my Raspberry Pi can change without warning after a week of inactivity,
    and if the Pi is being used in a project without keyboard, mouse, and monitor,
    it can be difficult to find its IP address to allow me to connect to it. This
    is why you might want to set a *static IP address* for your Raspberry Pi.


    One way to ensure that your Raspberry Pi''s IP address doesn''t change is to simply
    go to your router control interface and change the DHCP lease time to a much higher
    value. To access this interface, you will need to use a computer (it could be
    your Raspberry Pi, but it doesn''t have to be) and go to a specific address that
    is often written on the router, described as *router address* or *admin console
    address*. For my router this is `http://192.168.1.1`. A username and password
    will also need to be entered. These are not the same as the WiFi access point
    name and password. They''re often also written somewhere on the router and often
    have default values of *admin* and *password*, respectively.'
  merge: -1
  pgno: 66
- img_proc: true
  md: 'After you are connected, you will need to hunt around your admin console’s
    various pages for any mention of DHCP settings, which should look something like
    Figure 2-3.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_67_0.png)


    Change the “Lease duration” (or whatever it’s specifically labeled for your router)
    to the maximum allowed.


    One downside of extending the lease duration like this is that it applies to all
    the devices on your LAN. So if you have a lot of devices, it’s possible that you
    might run out of IP addresses because DHCP is unable to reallocate old IP addresses
    until the lease period has expired.


    A better approach is to use something called DHCP reservation. This instructs
    DHCP to permanently allocate a particular IP address to a particular device. In
    Figure 2-4, you can see that I have allocated the IP address of 192.168.1.3 to
    the device raspberrypi-Ethernet (a Raspberry Pi connected by Ethernet cable to
    the router).


    From now on, whenever that Raspberry Pi is connected to the LAN, it will be assigned
    the IP address 192.168.1.3, and DHCP will not allocate that IP address to any
    other device.'
  merge: -1
