    \n要使用数字温度传感器（DS18B20）测量温度，请参见配方14.13。\n\n## 14.11 测量树莓派CPU温度\n\n### 问题\n\n你想知道树莓派CPU的温度有多高。\n\
    \n### 解决方案\n\n使用gpiozero库访问博通芯片内置的温度传感器。你的树莓派应该已经安装了gpiozero库。如果没有，可以使用以下命令安装：\n\
