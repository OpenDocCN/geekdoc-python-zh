    Adafruit电容式触摸HAT有12个触摸触点。如果你只需要几个触摸触点，可以使用Pimoroni Explorer HAT Pro，它有四个兼容鳄鱼夹的触点（图14-30）。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_444_0.png)\n\n图14-30. 带有水果的Explorer\
    \ HAT Pro\n\n要使用Explorer HAT Pro的触摸触点，首先按照配方10.16安装HAT的库。\n\n除了侧面设计用于鳄鱼夹的四个端子外，标有1到4的四个触摸开关也使用触摸接口。\n\
    \n### 另请参阅\n\n更多信息可在Adafruit Touch HAT文档和Explorer HAT Pro文档中找到。\n\n## 14.22 使用RFID读写器读取智能卡\n\
    \n### 问题\n\n你想从射频识别（RFID）智能卡读取数据并写入数据。\n\n### 解决方案\n\n获取一个低成本的RC-522 RFID读卡器/写卡器，并使用SimpleMFRC522\
    \ Python库。\n\n本配方需要以下组件：\n\n- RC-522读卡器；通常与一些RFID标签一起出售（参见第566页“模块”）\n- 七根母对母跳线（参见第564页“原型设备与套件”）\n\
    \n图14-31展示了连接到树莓派的RC-522。RC-522使用树莓派的SPI接口，因此你需要按照配方10.6操作。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_445_0.png)\n\
    \n图14-31. 连接树莓派和RC-522\n\n表14-1展示了你需要使用跳线进行的连接，并建议了导线的颜色以便于识别。\n\n表14-1. 连接树莓派和RFID读写器\n\
    \n| 导线颜色 | RC-522引脚 | 树莓派引脚 |\n| :--- | :--- | :--- |\n| 橙色 | SDA | GPIO8 |\n\
    | 黄色 | SCK | SCLK / GPIO11 |\n| 白色 | MOSI | MOSI / GPIO10 |\n| 绿色 | MISO | MISO/GPIO09\
    \ |\n| 蓝色 | GND | GND |\n| 灰色 | RST | GPIO25 |\n| 红色 | 3.3V | 3.3V |\n\n请注意，尽管RC-522引脚上有一些引脚标记为SDA和SCL，仿佛该设备使用I2C，但在本配方中，该设备使用树莓派的SPI接口。\n\
    \n要使用该模块，首先使用以下命令获取Clever Card Kit软件。这将安装RC-522的所有先决软件。安装完成后，你需要重新启动：\n\n```\n\
    $ wget http://monkmakes.com/downloads/mmcck.sh\n$ chmod +x mmcck.sh\n$ ./mmcck.sh\n\
    ```\n\n要测试读卡器，请运行*clever_card_kit*目录中名为*01_read.py*的程序：\n\n```\n$ cd ~/clever_card_kit\n\
    $ python3 01_read.py\nHold a tag near the reader\n894922433952\n\n894922433952\n\
    \n894922433952\n```\n\n当你将卡片靠近RC-522时，卡片内RFID标签的唯一编号将被打印出来。当你读卡读够了，按Ctrl-C。以下是代码：\n\
    \n```\nimport RPi.GPIO as GPIO\nimport SimpleMFRC522\n\nreader = SimpleMFRC522.SimpleMFRC522()\n\
    \nprint(\"Hold a tag near the reader\")\n\ntry:\n    while True:\n        id,\
    \ text = reader.read()\n        print(id)\n        print(text)\n\nfinally:\n \
    \   print(\"cleaning up\")\n    GPIO.cleanup()\n```\n\n导入RPi.GPIO仅仅是为了在程序退出时清理GPIO引脚。函数调用reader.read()将等待RFID标签靠近读写器，并返回卡片的唯一编号（id）和存储在卡片上的任何文本消息（text）。\n\
