- md: "The actual coin counting program is just a simplification of the test program,\
    \ so when you are ready, run the program *ch_08_coin_count.py*. Try moving coins\
    \ in and out of the field of view and notice how the count changes. You could\
    \ also add some different shaped objects among the coins and verify that they\
    \ are not identified as coins.\n\nAn interesting project would be to use the radius\
    \ of the coins to identify their monetary value and add up the value of the coins\
    \ on the table.\n\n## See Also\n\nFor information on installing OpenCV, see Recipe\
    \ 8.1.\n\nFor information on setting up a camera, see Recipe 8.2.\n\n## 8.5 Face\
    \ Detection\n\n### Problem\n\nYou want to find the coordinates of faces in a photograph\
    \ or webcam image.\n\n### Solution\n\nUse the HAAR-like feature detection in OpenCV\
    \ to analyze an image and pick out the faces. HAAR stands for High Altitude Aerial\
    \ Reconnaissance, and we are using some of the features developed for that application\
    \ here.\n\nIf you have not already done so, install OpenCV (see Recipe 8.1).\n\
    \nYou can find the code for this example, as well as the other examples in this\
    \ recipe, with the downloads for the book (see Recipe 3.22). The program is called\
    \ *ch_08_faces.py*.\n\nYou will find a suitable image file for testing called\
    \ *faces.jpg* in the same folder as the Python program. Run the program, and you\
    \ should see output like this and an image like Figure 8-3:\n\n```\n$ python3\
    \ ch_08_faces.py\n[[173 139  66  66]\n [367  60  66  66]\n [564  73  66  66]]\n\
    ```\n\nNote that the *faces.jpg* file (or whatever image file you use) must be\
    \ in the same directory as the Python program.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_254_0.png)\n\
    \nFigure 8-3. Detecting faces\n\n### Discussion\n\nHere's the listing for the\
    \ program (ch_08_faces.py):\n\n```python\nimport cv2, pkg_resources\n\nhaar_file\
    \ = pkg_resources.resource_filename('cv2',\n    'data/haarcascade_frontalface_default.xml')\n\
    face_cascade = cv2.CascadeClassifier(haar_file)\n\nimg = cv2.imread('faces.jpg',\
    \ cv2.IMREAD_GRAYSCALE)\n\nscale_factor = 1.4\nmin_neighbors = 5\n\nfaces = face_cascade.detectMultiScale(img,\
    \ scale_factor, min_neighbors)\nprint(faces)\n\nfor (x,y,w,h) in faces:\n    img\
    \ = cv2.rectangle(img, (x,y), (x+w,y+h), (255, 255, 255), 2)\n\ncv2.imshow('image',img)\n\
    cv2.waitKey(0)\ncv2.destroyAllWindows()\n```\n\nThe OpenCV system contains a whole\
    \ load of classifiers for detecting faces and other features. These are all contained\
    \ in the directory found using the pkg_resources utility package. The actual face\
    \ detector that we are going to use in this program is contained in an XML descriptor\
    \ file called haarcascade_frontalface_default.xml.\n\nThe image is read into a\
    \ file as grayscale. The parameters scale_factor and min_neighbors may need tweaking\
    \ if you use an image of your own rather than the test image.\n\nscale_factor\n\
    This determines the step size that the face detector will use in trying to find\
    \ faces by automatically changing the image scale. In this case, a value of 1.4\
    \ means the scale will change by 40% each time. Setting this to a higher number\
    \ will speed up face matching but may result in some faces being missed.\n\nmin_neighbors\n\
    If this parameter is too low, the algorithm essentially becomes less fussy about\
    \ what it considers to be a face.\n\nOnce the faces are detected, the print command\
    \ shows the coordinates of the rectangles found, and then the for loop superimposes\
    \ them on the image before displaying it.\n\nThere are many built-in HAAR features.\
    \ You can list them all using the following command:\n\n```\n$ cd /.local/lib/python3.9/site-packages/cv2/data/\n\
    $ ls\nhaarcascade_eye.xml\nhaarcascade_frontalcatface_extended.xml\nhaarcascade_frontalcatface.xml\n\
    haarcascade_frontalface_alt2.xml\nhaarcascade_frontalface_alt_tree.xml\nhaarcascade_frontalface_alt.xml\n\
    haarcascade_frontalface_default.xml\nhaarcascade_fullbody.xml\nhaarcascade_lefteye_2splits.xml\n\
    haarcascade_lowerbody.xml\nhaarcascade_profileface.xml\nhaarcascade_righteye_2splits.xml\n\
    haarcascade_russian_plate_number.xml\nhaarcascade_smile.xml\nhaarcascade_upperbody.xml\n\
    __init__.py\n__pycache__\n```\n\nAs you can see, they are all associated with\
    \ parts of the body. You can even look for smiles!\n\n### See Also\n\nIn Chapter\
    \ 9 we will return to object recognition, but by using machine learning techniques\
    \ we will be able to detect all sorts of objects.\n\nFor information on installing\
    \ OpenCV, see Recipe 8.1.\n\nFor information on setting up a camera, see Recipe\
    \ 8.2.\n\nFor more information on face detection, see https://oreil.ly/iNJu8.\n\
    \n## 8.6 Motion Detection\n\n### Problem\n\nYou want to use a camera connected\
    \ to your Raspberry Pi to detect something moving in its field of view.\n\n###\
    \ Solution\n\nUse OpenCV and NumPy to detect changes between successive frames\
    \ from the camera.\n\nThe program that follows compares each captured image with\
    \ the previous image. It then uses NumPy (a numeric library for Python) to calculate\
    \ how different the two images are. If this measure of difference exceeds a threshold,\
    \ it prints out a message saying that movement was detected.\n\nYou can find the\
    \ code for this example, as well as for the other examples in this recipe, with\
    \ the downloads for the book (see Recipe 3.22). The program is called ch_08_detect_motion.py.\n\
    \nAttach your USB webcam or Raspberry Pi camera and then run the program. Try\
    \ moving your hand in front of the field of view, and you should see a message\
    \ that says “Movement detected”:\n\n```python\nimport cv2\nimport numpy as np\n\
    from imutils.video import VideoStream\nfrom imutils import resize\n\ndiff_threshold\
    \ = 1000000\n\nvs = VideoStream(src=0).start()\n\ndef getImage():\n    im = vs.read()\n\
    \    im = cv2.cvtColor(im, cv2.COLOR_BGR2GRAY)\n    im = cv2.blur(im, (20, 20))\n\
    \    return im\n\nold_image = getImage()\n\nwhile True:\n    new_image = getImage()\n\
    \    diff = cv2.absdiff(old_image, new_image)\n    diff_score = np.sum(diff)\n\
    \    # print(diff_score)\n    if diff_score > diff_threshold:\n        print(\"\
    Movement detected\")\n    old_image = new_image\n```\n\nIf you get too many false\
    \ alarms, then increase the value of diff_threshold. You might also want to uncomment\
    \ the line print(diff_score), as this will show you what sort of difference values\
    \ are being detected.\n\nThe results are improved by setting the image to grayscale\
    \ and applying a blur filter.\n\n### Discussion\n\nSuccessive frames of the image\
    \ might look like Figures 8-4 and 8-5. When the first image is subtracted from\
    \ the second, the resulting image will look like Figure 8-6.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_257_0.png)\n\
    \nFigure 8-4. Movement detection, frame 1\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_258_0.png)\n\
    \nFigure 8-5. Movement detection, frame 2\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_258_1.png)\n\
    \nFigure 8-6. Movement detection, the difference image\n\nAlthough the code for\
    \ this recipe just displays a message, there is no reason why your code shouldn't\
    \ turn on a light, or perform some other action using the GPIO pins.\n\n### See\
    \ Also\n\nFor information on installing OpenCV, see Recipe 8.1.\n\nFor information\
    \ on setting up a camera, see Recipe 8.2.\n\nAn alternative way to detect movement\
    \ is to use a passive infrared (PIR) sensor; see Recipe 13.9.\n\n## 8.7 Extracting\
    \ Text from an Image\n\n### Problem\n\nYou want to be able to convert an image\
    \ containing text to actual text.\n\n### Solution\n\nUse the Tesseract optical\
    \ character recognition (OCR) software to extract text from the image. To install\
    \ Tesseract, run the following commands (you will probably want to copy and paste\
    \ this from the file *long_commands.txt* in the book downloads Recipe 3.22):\n\
    \n```\n$ sudo apt install tesseract-ocr\n$ sudo apt install libtesseract-dev\n\
    ```\n\nTo try out Tesseract, you will need an image file that contains some text.\
    \ You will find one called *ocr_test.tiff* with the downloads for the book (see\
    \ Recipe 3.22). To convert the image to text, run the following command:\n\n```\n\
    $ cd ~/raspberrypi_cookbook_ed4\n$ tesseract ocr_test.tiff stdout\nPage 1\nThis\
    \ is an image\n\nof some text.\n```\n\nIf you take a look at the image file *ocr_test.tiff*,\
    \ you will see that it is indeed an image containing those words.\n\n### Discussion\n\
    \nAlthough I used a TIFF image, the tesseract library will work with most image\
    \ types, including PDF, PNG, and JPEG files.\n\n### See Also\n\nFor more information\
    \ on the tesseract library, see https://oreil.ly/Evdxw."
  mdcn: "实际的硬币计数程序只是测试程序的简化版，因此当你准备好后，可以运行程序 *ch_08_coin_count.py*。尝试将硬币移入和移出视野，并观察计数如何变化。你也可以在硬币中添加一些不同形状的物体，并验证它们不会被识别为硬币。\n\
    \n一个有趣的项目是利用硬币的半径来识别其面值，并计算桌面上硬币的总价值。\n\n## 另请参阅\n\n有关安装 OpenCV 的信息，请参阅配方 8.1。\n\
    \n有关设置摄像头的信息，请参阅配方 8.2。\n\n## 8.5 人脸检测\n\n### 问题\n\n你想要在照片或网络摄像头图像中找到人脸的坐标。\n\n\
    ### 解决方案\n\n使用 OpenCV 中的 HAAR-like 特征检测来分析图像并找出人脸。HAAR 代表高空侦察，我们在此使用的是为该应用开发的一些特征。\n\
    \n如果你尚未安装 OpenCV，请先安装（参见配方 8.1）。\n\n你可以在本书的下载包中找到此示例以及其他示例的代码（参见配方 3.22）。该程序名为\
    \ *ch_08_faces.py*。\n\n你会在与 Python 程序相同的文件夹中找到一个名为 *faces.jpg* 的合适测试图像文件。运行程序，你应该会看到如下输出和如图\
    \ 8-3 所示的图像：\n\n```\n$ python3 ch_08_faces.py\n[[173 139  66  66]\n [367  60 \
    \ 66  66]\n [564  73  66  66]]\n```\n\n请注意，*faces.jpg* 文件（或你使用的任何图像文件）必须与 Python\
    \ 程序位于同一目录中。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_254_0.png)\n\n图 8-3.\
    \ 检测人脸\n\n### 讨论\n\n以下是程序（ch_08_faces.py）的代码清单：\n\n```python\nimport cv2, pkg_resources\n\
    \nhaar_file = pkg_resources.resource_filename('cv2',\n    'data/haarcascade_frontalface_default.xml')\n\
    face_cascade = cv2.CascadeClassifier(haar_file)\n\nimg = cv2.imread('faces.jpg',\
    \ cv2.IMREAD_GRAYSCALE)\n\nscale_factor = 1.4\nmin_neighbors = 5\n\nfaces = face_cascade.detectMultiScale(img,\
    \ scale_factor, min_neighbors)\nprint(faces)\n\nfor (x,y,w,h) in faces:\n    img\
    \ = cv2.rectangle(img, (x,y), (x+w,y+h), (255, 255, 255), 2)\n\ncv2.imshow('image',img)\n\
    cv2.waitKey(0)\ncv2.destroyAllWindows()\n```\n\nOpenCV 系统包含大量用于检测人脸和其他特征的分类器。这些都包含在使用\
    \ pkg_resources 实用程序包找到的目录中。我们在此程序中将要使用的实际人脸检测器包含在一个名为 haarcascade_frontalface_default.xml\
    \ 的 XML 描述符文件中。\n\n图像以灰度模式读入文件。如果你使用自己的图像而不是测试图像，可能需要调整参数 scale_factor 和 min_neighbors。\n\
    \nscale_factor\n这决定了人脸检测器在尝试查找人脸时通过自动改变图像比例所使用的步长。在此情况下，值 1.4 意味着比例每次将改变 40%。将此值设置得更高会加快人脸匹配速度，但可能会导致一些人脸被遗漏。\n\
    \nmin_neighbors\n如果此参数设置得太低，算法基本上会变得不那么挑剔它认为什么是人脸。\n\n一旦检测到人脸，print 命令会显示找到的矩形的坐标，然后\
    \ for 循环将它们叠加到图像上，最后显示图像。\n\n有许多内置的 HAAR 特征。你可以使用以下命令列出所有特征：\n\n```\n$ cd /.local/lib/python3.9/site-packages/cv2/data/\n\
    $ ls\nhaarcascade_eye.xml\nhaarcascade_frontalcatface_extended.xml\nhaarcascade_frontalcatface.xml\n\
    haarcascade_frontalface_alt2.xml\nhaarcascade_frontalface_alt_tree.xml\nhaarcascade_frontalface_alt.xml\n\
    haarcascade_frontalface_default.xml\nhaarcascade_fullbody.xml\nhaarcascade_lefteye_2splits.xml\n\
    haarcascade_lowerbody.xml\nhaarcascade_profileface.xml\nhaarcascade_righteye_2splits.xml\n\
    haarcascade_russian_plate_number.xml\nhaarcascade_smile.xml\nhaarcascade_upperbody.xml\n\
    __init__.py\n__pycache__\n```\n\n如你所见，它们都与身体的各个部位相关。你甚至可以寻找微笑！\n\n### 另请参阅\n\n\
    在第 9 章中，我们将回到对象识别，但通过使用机器学习技术，我们将能够检测各种对象。\n\n有关安装 OpenCV 的信息，请参阅配方 8.1。\n\n有关设置摄像头的信息，请参阅配方\
    \ 8.2。\n\n有关人脸检测的更多信息，请参阅 https://oreil.ly/iNJu8。\n\n## 8.6 运动检测\n\n### 问题\n\n\
    你想使用连接到树莓派的摄像头来检测其视野中的移动物体。\n\n### 解决方案\n\n使用 OpenCV 和 NumPy 来检测摄像头连续帧之间的变化。\n\
    \n下面的程序将每个捕获的图像与前一个图像进行比较。然后使用 NumPy（一个 Python 数值库）来计算两个图像的差异程度。如果这个差异度量超过阈值，它会打印出一条消息，说明检测到移动。\n\
    \n你可以在本书的下载包中找到此示例以及其他示例的代码（参见配方 3.22）。该程序名为 ch_08_detect_motion.py。\n\n连接你的 USB\
    \ 网络摄像头或树莓派摄像头，然后运行程序。尝试在视野前移动你的手，你应该会看到一条消息说“检测到移动”：\n\n```python\nimport cv2\n\
    import numpy as np\nfrom imutils.video import VideoStream\nfrom imutils import\
    \ resize\n\ndiff_threshold = 1000000\n\nvs = VideoStream(src=0).start()\n\ndef\
    \ getImage():\n    im = vs.read()\n    im = cv2.cvtColor(im, cv2.COLOR_BGR2GRAY)\n\
    \    im = cv2.blur(im, (20, 20))\n    return im\n\nold_image = getImage()\n\n\
    while True:\n    new_image = getImage()\n    diff = cv2.absdiff(old_image, new_image)\n\
    \    diff_score = np.sum(diff)\n    # print(diff_score)\n    if diff_score > diff_threshold:\n\
    \        print(\"Movement detected\")\n    old_image = new_image\n```\n\n如果你得到太多误报，那么增加\
    \ diff_threshold 的值。你可能还想取消注释行 print(diff_score)，因为这将向你显示正在检测到的差异值类型。\n\n通过将图像设置为灰度并应用模糊滤波器，结果得到了改善。\n\
    \n### 讨论\n\n图像的连续帧可能看起来像图 8-4 和图 8-5。当从第二张图像中减去第一张图像时，得到的图像将看起来像图 8-6。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_257_0.png)\n\
    \n图 8-4. 运动检测，帧 1\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_258_0.png)\n\n图\
    \ 8-5. 运动检测，帧 2\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_258_1.png)\n\n图 8-6.\
    \ 运动检测，差异图像\n\n尽管此配方的代码只是显示一条消息，但没有理由让你的代码不能打开一盏灯，或者使用 GPIO 引脚执行其他操作。\n\n### 另请参阅\n\
    \n有关安装 OpenCV 的信息，请参阅配方 8.1。\n\n有关设置摄像头的信息，请参阅配方 8.2。\n\n检测运动的另一种方法是使用被动红外（PIR）传感器；参见配方\
    \ 13.9。\n\n## 8.7 从图像中提取文本\n\n### 问题\n\n你希望能够将包含文本的图像转换为实际文本。\n\n### 解决方案\n\n\
    使用 Tesseract 光学字符识别（OCR）软件从图像中提取文本。要安装 Tesseract，请运行以下命令（你可能需要从本书下载包配方 3.22 中的文件\
    \ *long_commands.txt* 复制并粘贴）：\n\n```\n$ sudo apt install tesseract-ocr\n$ sudo\
    \ apt install libtesseract-dev\n```\n\n要试用 Tesseract，你需要一个包含一些文本的图像文件。你会在本书的下载包中找到一个名为\
    \ *ocr_test.tiff* 的文件（参见配方 3.22）。要将图像转换为文本，请运行以下命令：\n\n```\n$ cd ~/raspberrypi_cookbook_ed4\n\
    $ tesseract ocr_test.tiff stdout\nPage 1\nThis is an image\n\nof some text.\n\
    ```\n\n如果你查看图像文件 *ocr_test.tiff*，你会看到它确实是一个包含这些单词的图像。\n\n### 讨论\n\n虽然我使用了 TIFF\
    \ 图像，但 tesseract 库可以处理大多数图像类型，包括 PDF、PNG 和 JPEG 文件。\n\n### 另请参阅\n\n有关 tesseract\
    \ 库的更多信息，请参阅 https://oreil.ly/Evdxw。"
