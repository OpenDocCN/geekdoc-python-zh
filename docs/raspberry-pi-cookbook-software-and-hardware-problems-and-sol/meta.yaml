    \ random selections like this, it's not uncommon to prevent choices from repeating.\
    \ For example, if you have already chosen 'a' at random, it shouldn't be chosen\
    \ again.\n\nOne way to do this is to take a copy of your list and then, whenever\
    \ you have selected an item from it, remove that item so that it can't be chosen\
    \ again. Here's how you could do that in a small program that you can find with\
    \ the book downloads (see Recipe 3.22); this program is *ch_07_random.py*:\n\n\
    ```\nimport random\nfrom copy import copy\n\nlist = ['a', 'b', 'c']\n\nworking_list\
    \ = copy(list)\nwhile len(working_list) > 0 :\n    x = random.choice(working_list)\n\
    \    print(x)\n    working_list.remove(x)\n```\n\nRun the program, and it will\
    \ display the list items, selected at random, just once:\n\n```\n$ python3 ch_07_random.py\n\
    b\nc\na\n```\n\nThe order is likely to be different each time you run the program.\n\
