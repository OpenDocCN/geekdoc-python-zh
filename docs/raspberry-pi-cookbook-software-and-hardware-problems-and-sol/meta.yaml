    # 2.6 Connecting with a Console Lead


    # Problem


    No network connection is available, but you still want to be able to remotely
    control your Raspberry Pi from another computer.


    # Solution


    Use a *console cable* (a special lead that you need to buy separately—see “Miscellaneous”
    on page 567) to connect to a Raspberry Pi.


    > **Power Consumption**

    The console lead will typically only be able to supply 500mA, which is fine for
    early Raspberry Pis, but not enough for a Raspberry Pi 4 or 400. If you are using
    a 4 or 400, then you will need to use a power adapter with it ([Recipe 1.4](https://www.oreilly.com/library/view/raspberry-pi-cookbook/9781492048817/ch01.html#recipe-1-4))
    and leave the red power lead of the console lead (described after [Figure 2-11](https://www.oreilly.com/library/view/raspberry-pi-cookbook/9781492048817/ch02.html#figure-2-11))
    unconnected to the 5V Raspberry Pi pin.


    To use this method, you’ll need to enable the serial interface. This means that,
    at least while you are setting up your Raspberry Pi, you need to have a keyboard,
    monitor, and mouse attached.


    To enable the serial interface, go to the Raspberry Menu, select Preferences,
    and then click Raspberry Pi Configuration. Select the Interfaces tab and then
    click the toggle switch for Serial Port, as shown in [Figure 2-9](https://www.oreilly.com/library/view/raspberry-pi-cookbook/9781492048817/ch02.html#figure-2-9).'
