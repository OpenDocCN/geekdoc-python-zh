  - '[PAGE 50]


    # # 1.13 Maximizing Performance


    # ## Problem


    Your Raspberry Pi seems to be very slow, so you want to overclock it to make it
    run faster.


    # ## Solution


    If you have a Raspberry Pi 3, 4, or 400 with a quad-core processor, you are unlikely
    to find it to be too slow. However, older Raspberry Pis 1 and 2 can be pretty
    sluggish.


    You can increase the clock frequency of a Raspberry Pi 1 or 2 to make it run a
    little faster. This will make it consume a bit more power and run a little hotter
    (see the Discussion section that follows).


    The method of overclocking described here is called *dynamic overclocking* because
    it automatically monitors the temperature of the Raspberry Pi and drops the clock
    speed back down if things begin to get too hot. This is called *throttling*.


    Run the `raspi-config` utility by issuing the following command in an SSH Terminal:


    ```

    $ sudo raspi-config

    ```


    Select the Overclock option. You are then presented with the options shown in
    Figure 1-21.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_50_0.png)


    Figure 1-21. Configuring overclocking with the raspi-config utility from the command
    line


    Select an option. If you find that your Raspberry Pi starts to become unstable
    and hangs unexpectedly, you might need to choose a more conservative option or
    turn overclocking off by setting it back to None.'
- md: "## Discussion\n\nThe performance improvements from overclocking can be quite\
    \ dramatic. To measure these, I used a Raspberry Pi B, without a case, at an ambient\
    \ room temperature of 60 degrees (15 degrees C).\n\nThe test program was the following\
    \ Python script. This just hammers the processor (that is, makes it work really\
    \ hard) and is not really representative of the other things that go on in a computer,\
    \ such as writing to the SD card, graphics, and so on. However, it does give a\
    \ good indication of raw CPU performance if you want to test the effect of overclocking\
    \ on your Raspberry Pi:\n\n```python\nimport time\n\ndef factorial(n):\n    if\
    \ n == 0:\n        return 1\n    else:\n        return n * factorial(n-1)\n\n\
    before_time = time.process_time()\nfor i in range(1, 10000):\n    factorial(200)\n\
    after_time = time.process_time()\n\nprint(after_time - before_time)\n```\n\nNote\
    \ that we are jumping ahead a lot here, so if you are not familiar with Python,\
    \ come back to this when you have read through Chapter 5.\n\nCheck out the results\
    \ of the test in Table 1-3. The current and temperature were measured using test\
    \ equipment.\n\nTable 1-3. Overclocking\n\n| Speed test | Time | Current | Temperature\
    \ (degrees C) |\n|---|---|---|---|\n| 700 MHz | 15.8 seconds | 360mA | 27 |\n\
    | 1 GHz | 10.5 seconds | 420mA | 30 |\n\nAs you can see, the performance has increased\
    \ by 33% but at a cost of drawing more current and a slightly higher temperature.\n\
    \nA well-ventilated enclosure will help to keep your Raspberry Pi running at full\
    \ speed. Some efforts to add water cooling to the Raspberry Pi have also been\
    \ made. Frankly, this is just silly.\n\n## See Also\n\nMuch more information about\
    \ the raspi-config utility is available at https://oreil.ly/1lwy6.\n\n## 1.14\
    \ Changing Your Password\n\n### Problem\n\nYou want to change your password.\n\
    \n### Solution\n\nAfter you install Raspberry Pi OS onto your SD card, you are\
    \ prompted to create a user account and associated password. You can change the\
    \ password any time using the Raspberry Pi Configuration tool. To open this, go\
    \ to the Raspberry Menu, select Preferences, and then click Raspberry Pi Configuration.\
    \ Click the System tab. There, you'll find the Change Password option (Figure\
    \ 1-22).\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_52_0.png)\n\nChanging your\
    \ password is one setting for which you do not need to restart your Raspberry\
    \ Pi for the change to take effect.\n\n### Discussion\n\nYou can also change the\
    \ password from a Terminal session simply by using the passwd command, as follows:\n\
    \n```\n$ passwd\nChanging password for pi.\n(current) UNIX password:\nEnter new\
    \ UNIX password:\nRetype new UNIX password:\npasswd: password updated successfully\n\
    ```\n\n### See Also\n\nYou can also change your password using the `raspi-config`\
    \ utility.\n\n## 1.15 Shutting Down Your Raspberry Pi\n\n### Problem\n\nYou want\
    \ to shut down your Raspberry Pi.\n\n### Solution\n\nIn the upper lefthand corner\
    \ of the desktop, click the Raspberry Menu. A dialog box opens, offering three\
    \ shutdown options (Figure 1-23):\n\n- *Shutdown*\n  Shuts down the Raspberry\
    \ Pi. You will need to unplug the power and then plug it back in to get the Raspberry\
    \ Pi to boot up again. Or, if you have a Pi 400, press the Power button on the\
    \ keyboard.\n- *Reboot*\n  Reboots the Raspberry Pi.\n- *Logout*\n  Logs you out\
    \ and displays a prompt to enter your login credentials so that you can log back\
    \ in.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_54_0.png)\n\nFigure 1-23. Shutting\
    \ down your Raspberry Pi\n\nYou can also reboot using the Terminal by issuing\
    \ the following command:\n\n```\n$ sudo reboot\n```\n\nYou might need to do this\
    \ after installing some software. When you do reboot, you’ll see the message shown\
    \ in Figure 1-24, which illustrates the multiuser nature of Linux and warns all\
    \ users connected to the Pi.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_54_1.png)\n\
    \nFigure 1-24. Shutting down your Raspberry Pi from the Terminal\n\n### Discussion\n\
    \nIt is better to shut down your Raspberry Pi as described than to simply pull\
    \ out the power plug because your Raspberry Pi might be in the middle of writing\
    \ to the microSD card as you power it down. This could lead to file corruption.\n\
    \nShutting down a Raspberry Pi does not actually turn off the power. It goes into\
    \ a low-power mode—and it is a pretty low-power device anyway (but the Raspberry\
    \ Pi hardware has no control over its power supply).\n\nWhen a Raspberry Pi 400\
    \ (with its built-in keyboard) has been shut down, you can turn it on by pressing\
    \ the F10 key, which also has an on/off icon on the key.\n\n### See Also\n\nYou\
    \ can buy a [module that will turn off the power](module that will turn off the\
    \ power) when the Raspberry Pi shuts down.\nFor information on adding a Start\
    \ button to your Raspberry Pi, see [Recipe 13.13](Recipe 13.13).\n\n## 1.16 Installing\
    \ the Raspberry Pi Camera Module\n\n### Problem\n\nYou want to use the Raspberry\
    \ Pi Camera Module.\n\n### Solution\n\nThe Raspberry Pi Camera Module ([Figure\
    \ 1-25](Figure 1-25)) is attached to a Raspberry Pi by a ribbon cable.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_55_0.png)\n\
    \nThere are three versions of the Pi Camera: the original version 1 (as shown\
    \ in [Figure 1-25](Figure 1-25)); the newer, higher-resolution version 2; and\
    \ the HQ (High Quality) camera, which takes interchangeable lenses and boasts\
    \ a resolution of 12 megapixels.\nThe ribbon cable attaches to a special connector\
    \ between the audio and HDMI sockets on a Raspberry Pi 2, 3, or 4. To fit the\
    \ cable onto your Pi, gently pull up the levers on either side of the connector\
    \ so that they unlock, and then press the cable into the slot with the shiny metal\
    \ connector pads of the cable facing away from the Ethernet socket. Press the\
    \ two levers of the connector back down to lock the cable in place ([Figure 1-26](Figure\
    \ 1-26)).\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_56_0.png)\n\nFigure 1-26.\
    \ Attaching a Raspberry Pi Camera Module to a Raspberry Pi 4 model B\n\n> The\
    \ Camera Module packaging states that it is sensitive to static. Before handling\
    \ it, ground yourself by touching something grounded, like the metal case of a\
    \ PC.\n\nNote that the Raspberry Pi Zero requires a special cable or adapter because\
    \ its Camera connector is smaller than that of a full-size Raspberry Pi (see “Modules”\
    \ on page 566).\n\nThe Camera Module requires some software configuration. At\
    \ the time of writing, the camera interface is moving from Raspberry Pi–specific\
    \ software to the libcamera library. So, before following the instructions, you\
    \ may want to check to see the current status of the Camera Module’s software.\n\
    \nThese instructions describe the “legacy” Raspberry Pi camera software that works\
    \ on even quite ancient models of Raspberry Pi.\n\nThe graphical Raspberry Pi\
    \ Configuration tool doesn’t include an option to enable the camera, so you must\
    \ start the raspi-config utility from a Terminal session.\n\n```\n$ sudo raspi-config\n\
    ```\n\nThis will display options for configuring your Raspberry Pi.\n\nSelect\
    \ Interfacing Options, and you’ll see the Camera option (Figure 1-27). Select\
    \ the first option to enable legacy support, and then reboot your Raspberry Pi.\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_57_0.png)\n\nFigure 1-27. Enabling\
    \ the camera using raspi-config from the command line\n\nTwo commands are available\
    \ for capturing still images and videos: `raspistill` and `raspivid`.\n\nTo capture\
    \ a single still image, use the `raspistill` command:\n\n```\n$ raspistill -o\
    \ image1.jpg\n```\n\nA preview screen displays for about five seconds and then\
    \ takes a photograph and stores it in the file *image1.jpg* in the current directory.\n\
    \nTo capture video, use the command `raspivid`:\n\n```\n$ raspivid -o video.h264\
    \ -t 10000\n```\n\nThe number at the end of the line is the recording duration\
    \ in milliseconds—in this case, 10 seconds.\n\n### Discussion\n\nBoth `raspistill`\
    \ and `raspivid` have a large number of options. If you type either command without\
    \ any parameters, help text displays the available options.\n\nYou can also buy\
    \ a NoIR (no infrared) version of the camera that has the infrared filter removed\
    \ from the Camera Module to allow it to work at night under infrared illumination.\n\
    \nAn alternative to the Camera Module is to use a USB webcam (see Recipe 8.2)."
  mdcn: "## 讨论\n\n超频带来的性能提升可能相当显著。为了测量这些提升，我使用了一台没有外壳的树莓派B型，在室温60华氏度（15摄氏度）的环境下进行测试。\n\
    \n测试程序是以下Python脚本。这个脚本只是让处理器满负荷工作（即让它非常努力地工作），并不能真正代表计算机上进行的其他操作，例如写入SD卡、图形处理等。然而，如果你想测试超频对你的树莓派的影响，它确实能很好地反映CPU的原始性能：\n\
    \n```python\nimport time\n\ndef factorial(n):\n    if n == 0:\n        return\
    \ 1\n    else:\n        return n * factorial(n-1)\n\nbefore_time = time.process_time()\n\
    for i in range(1, 10000):\n    factorial(200)\nafter_time = time.process_time()\n\
    \nprint(after_time - before_time)\n```\n\n请注意，我们在这里跳过了很多内容，所以如果你不熟悉Python，可以在通读第5章后再回来阅读这部分。\n\
    \n查看表1-3中的测试结果。电流和温度是使用测试设备测量的。\n\n表1-3. 超频\n\n| 速度测试 | 时间 | 电流 | 温度（摄氏度） |\n\
    |---|---|---|---|\n| 700 MHz | 15.8秒 | 360mA | 27 |\n| 1 GHz | 10.5秒 | 420mA |\
    \ 30 |\n\n如你所见，性能提升了33%，但代价是消耗更多电流和温度略有升高。\n\n一个通风良好的外壳将有助于让你的树莓派保持全速运行。也有人尝试为树莓派添加水冷。坦率地说，这有点傻。\n\
    \n## 另请参阅\n\n关于 `raspi-config` 工具的更多信息，请访问 https://oreil.ly/1lwy6。\n\n## 1.14\
    \ 更改你的密码\n\n### 问题\n\n你想更改你的密码。\n\n### 解决方案\n\n在你将树莓派操作系统安装到SD卡后，系统会提示你创建一个用户账户和关联的密码。你可以随时使用树莓派配置工具更改密码。要打开此工具，请转到树莓派菜单，选择“首选项”，然后单击“树莓派配置”。单击“系统”选项卡。在那里，你会找到“更改密码”选项（图1-22）。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_52_0.png)\n\n更改密码是其中一项设置，你无需重启树莓派即可使更改生效。\n\
    \n### 讨论\n\n你也可以在终端会话中简单地使用 `passwd` 命令来更改密码，如下所示：\n\n```\n$ passwd\nChanging\
    \ password for pi.\n(current) UNIX password:\nEnter new UNIX password:\nRetype\
    \ new UNIX password:\npasswd: password updated successfully\n```\n\n### 另请参阅\n\
    \n你也可以使用 `raspi-config` 工具来更改密码。\n\n## 1.15 关闭你的树莓派\n\n### 问题\n\n你想关闭你的树莓派。\n\n\
    ### 解决方案\n\n在桌面的左上角，单击树莓派菜单。会打开一个对话框，提供三个关机选项（图1-23）：\n\n- *关机*\n  关闭树莓派。你需要拔掉电源，然后重新插上才能让树莓派再次启动。或者，如果你使用的是Pi\
    \ 400，请按键盘上的电源按钮。\n- *重启*\n  重启树莓派。\n- *注销*\n  注销你并显示一个提示，要求你输入登录凭据以便重新登录。\n\n\
    ![](img/e36e77524aeaae366529d1cf02f9a39c_54_0.png)\n\n图1-23. 关闭你的树莓派\n\n你也可以通过终端使用以下命令重启：\n\
    \n```\n$ sudo reboot\n```\n\n安装某些软件后，你可能需要这样做。当你重启时，你会看到图1-24所示的消息，它说明了Linux的多用户特性，并警告所有连接到树莓派的用户。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_54_1.png)\n\n图1-24. 从终端关闭你的树莓派\n\n\
    ### 讨论\n\n最好按照上述方法关闭树莓派，而不是简单地拔掉电源插头，因为在你断电时，树莓派可能正在写入microSD卡。这可能导致文件损坏。\n\n\
    关闭树莓派实际上并不会切断电源。它会进入低功耗模式——而且它本身就是一个功耗相当低的设备（但树莓派硬件无法控制其电源）。\n\n当树莓派400（带有内置键盘）关闭后，你可以通过按F10键（该键上也有开/关图标）来将其打开。\n\
    \n### 另请参阅\n\n你可以购买一个[在树莓派关机时切断电源的模块](module that will turn off the power)。\n\
    有关为树莓派添加开始按钮的信息，请参阅[配方13.13](Recipe 13.13)。\n\n## 1.16 安装树莓派摄像头模块\n\n### 问题\n\n\
    你想使用树莓派摄像头模块。\n\n### 解决方案\n\n树莓派摄像头模块（[图1-25](Figure 1-25)）通过排线连接到树莓派。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_55_0.png)\n\
    \nPi摄像头有三个版本：原始版本1（如[图1-25](Figure 1-25)所示）；更新、更高分辨率的版本2；以及HQ（高质量）摄像头，它可更换镜头并拥有1200万像素的分辨率。\n\
    排线连接到树莓派2、3或4上音频和HDMI接口之间的特殊连接器。要将排线安装到你的树莓派上，请轻轻拉起连接器两侧的杠杆使其解锁，然后将排线压入插槽，确保排线上闪亮的金属触点背向以太网接口。将连接器的两个杠杆按回原位以锁定排线（[图1-26](Figure\
    \ 1-26)）。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_56_0.png)\n\n图1-26. 将树莓派摄像头模块连接到树莓派4型号B\n\
    \n> 摄像头模块包装上标明其对静电敏感。在操作前，请通过触摸接地物体（如PC的金属机箱）来释放静电。\n\n请注意，树莓派Zero需要特殊的排线或适配器，因为它的摄像头连接器比全尺寸树莓派的小（参见第566页的“模块”）。\n\
    \n摄像头模块需要一些软件配置。在撰写本文时，摄像头接口正从树莓派专用软件转向libcamera库。因此，在按照说明操作之前，你可能需要检查摄像头模块软件的当前状态。\n\
    \n这些说明描述的是“传统”树莓派摄像头软件，它甚至可以在相当古老的树莓派型号上工作。\n\n图形化的树莓派配置工具不包含启用摄像头的选项，因此你必须从终端会话启动\
    \ `raspi-config` 工具。\n\n```\n$ sudo raspi-config\n```\n\n这将显示配置树莓派的选项。\n\n选择“接口选项”，你会看到“摄像头”选项（图1-27）。选择第一个选项以启用传统支持，然后重启你的树莓派。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_57_0.png)\n\n图1-27. 使用命令行中的raspi-config启用摄像头\n\
    \n有两个命令可用于捕获静态图像和视频：`raspistill` 和 `raspivid`。\n\n要捕获单张静态图像，请使用 `raspistill` 命令：\n\
    \n```\n$ raspistill -o image1.jpg\n```\n\n预览屏幕会显示大约五秒钟，然后拍摄一张照片并将其存储在当前目录中的文件\
    \ *image1.jpg* 中。\n\n要捕获视频，请使用 `raspivid` 命令：\n\n```\n$ raspivid -o video.h264\
    \ -t 10000\n```\n\n行末的数字是以毫秒为单位的录制时长——在本例中为10秒。\n\n### 讨论\n\n`raspistill` 和 `raspivid`\
    \ 都有大量选项。如果你在不带任何参数的情况下输入任一命令，帮助文本会显示可用选项。\n\n你也可以购买NoIR（无红外）版本的摄像头，该版本移除了摄像头模块中的红外滤光片，使其能够在夜间红外照明下工作。\n\
    \n摄像头模块的替代方案是使用USB网络摄像头（参见配方8.2）。"
