    # 1.14 Changing Your Password


    # Problem


    You want to change your password.


    # Solution


    After you install Raspberry Pi OS onto your SD card, you are prompted to create
    a user account and associated password. You can change the password any time using
    the Raspberry Pi Configuration tool. To open this, go to the Raspberry Menu, select
    Preferences, and then click Raspberry Pi Configuration. Click the System tab.
    There, you''ll find the Change Password option (Figure 1-22).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_52_0.png)


    Changing your password is one setting for which you do not need to restart your
    Raspberry Pi for the change to take effect.'
