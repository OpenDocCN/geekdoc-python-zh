- img_proc: true
  md: 'You can run most Python programs as a normal user; however, some you''ll need
    to run as superuser. If this is the case for your program, prefix the command
    with sudo: but be aware that if someone malicious wrote that program, giving it
    such privileges could allow it to get up to all sorts of mischief:


    ```

    $ sudo python3 myprogram.py

    ```


    In the earlier examples, you need to include python3 in the command to run the
    program, but you can optionally add a line to the start of a Python program so
    that Linux knows it is a Python program. This special line is called a shebang
    (a contraction of the names of two symbols, “hash” and exclamation mark, or “bang”).
    The following single-line example program illustrates this:


    ```

    #!/usr/bin/python3

    print("I''m a program, I can run all by myself")

    ```


    Before you can run this directly from the command line, you must give the file
    write permissions by using the following command (see Recipe 3.14); this example
    assumes the file is called test.py:


    ```

    $ chmod +x test.py

    ```


    The parameter +x means to add execute permissions to the file.


    Now you can run the Python program test.py using the single command:


    ```

    $ ./test.py

    I''m a program, I can run all by myself

    $

    ```


    The ./ at the start of the line is needed for the command line to find the file.


    If you run a Python program with the -i option, the program will run and a console
    will open. This can be useful for debugging because you will have access to the
    program''s variables within the console, as if you had just typed the program
    directly into the console.


    # See Also


    Recipe 3.25 shows you how to run a Python program as a timed event.


    To automatically run a program at startup, see Recipe 3.23.


    # 5.7 Assigning Names to Values (Variables)


    # Problem


    You want to give a value a name.'
