  md: "# Solution\n\nUse the MicroPython *thread* mechanism to run code in parallel\
    \ with the main thread of execution. You will find an example of this in the program\
    \ *ch_19_multicore.py*:\n\n```\nfrom utime import sleep\nimport _thread\nfrom\
    \ random import randint\n\ndef core0():\n    while True:\n        print(\"core\
    \ 0 says hello\")\n        sleep(randint(1, 3))\n\ndef core1():\n    while True:\n\
    \        print(\"core 1 says hello\")\n        sleep(randint(1, 3))\n\n_thread.start_new_thread(core1,\
    \ ( ))\ncore0()\n```\n\nAs with all the program examples in this book, you can\
    \ also download this code (see Recipe 3.22).\n\nWhen you run this program, you'll\
    \ see output something like this in the Shell:\n\n```\ncore 1 says hello\ncore\
    \ 1 says hello\ncore 0 says hello\ncore 1 says hello\ncore 0 says hello\ncore\
    \ 1 says hello\ncore 0 says hello\n```\n\nEach of the two threads displays a message\
    \ and then waits for a random period between one and three seconds. Every so often,\
    \ you might see the messages appear on the same line. This happens when both are\
    \ competing for access to the USB port.\n\n# Discussion\n\nA good way to structure\
    \ your code to handle two threads is to put the code for each thread in a function\
    \ of its own. In the preceding example, I have called these functions core0 and\
    \ core1. Both functions contain a while True loop: core1 is allocated to one physical\
    \ processor core by calling start_new_thread, and then core0 is started on the\
    \ other processor core just by calling the core0 function.\n\nIn regular Python\
    \ 3 on a Raspberry Pi, you can create as many threads of execution as you like\
    \ but, on the Pico, you are limited to just two threads."
  merge: -1
