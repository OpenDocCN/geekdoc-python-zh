  md: '# # 1.13 Maximizing Performance


    # ## Problem


    Your Raspberry Pi seems to be very slow, so you want to overclock it to make it
    run faster.


    # ## Solution


    If you have a Raspberry Pi 3, 4, or 400 with a quad-core processor, you are unlikely
    to find it to be too slow. However, older Raspberry Pis 1 and 2 can be pretty
    sluggish.


    You can increase the clock frequency of a Raspberry Pi 1 or 2 to make it run a
    little faster. This will make it consume a bit more power and run a little hotter
    (see the Discussion section that follows).


    The method of overclocking described here is called *dynamic overclocking* because
    it automatically monitors the temperature of the Raspberry Pi and drops the clock
    speed back down if things begin to get too hot. This is called *throttling*.


    Run the `raspi-config` utility by issuing the following command in an SSH Terminal:


    ```

    $ sudo raspi-config

    ```


    Select the Overclock option. You are then presented with the options shown in
    Figure 1-21.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_50_0.png)


    Figure 1-21. Configuring overclocking with the raspi-config utility from the command
    line


    Select an option. If you find that your Raspberry Pi starts to become unstable
    and hangs unexpectedly, you might need to choose a more conservative option or
    turn overclocking off by setting it back to None.'
  merge: -1
  pgno: 50
- img_proc: true
  md: "# Discussion\n\nThe performance improvements from overclocking can be quite\
    \ dramatic. To measure these, I used a Raspberry Pi B, without a case, at an ambient\
    \ room temperature of 60 degrees (15 degrees C).\n\nThe test program was the following\
    \ Python script. This just hammers the processor (that is, makes it work really\
    \ hard) and is not really representative of the other things that go on in a computer,\
    \ such as writing to the SD card, graphics, and so on. However, it does give a\
    \ good indication of raw CPU performance if you want to test the effect of overclocking\
    \ on your Raspberry Pi:\n\n```\nimport time\n\ndef factorial(n):\n    if n ==\
    \ 0:\n        return 1\n    else:\n        return n * factorial(n-1)\n\nbefore_time\
    \ = time.process_time()\nfor i in range(1, 10000):\n    factorial(200)\nafter_time\
    \ = time.process_time()\n\nprint(after_time - before_time)\n```\n\nNote that we\
    \ are jumping ahead a lot here, so if you are not familiar with Python, come back\
    \ to this when you have read through Chapter 5.\n\nCheck out the results of the\
    \ test in Table 1-3. The current and temperature were measured using test equipment.\n\
    \nTable 1-3. Overclocking\n\n| Speed test | Current | Temperature (degrees C)\
    \ |\n|---|---|---|\n| 700 MHz | 15.8 seconds | 360mA | 27 |\n| 1 GHz | 10.5 seconds\
    \ | 420mA | 30 |\n\nAs you can see, the performance has increased by 33% but at\
    \ a cost of drawing more current and a slightly higher temperature.\n\nA well-ventilated\
    \ enclosure will help to keep your Raspberry Pi running at full speed. Some efforts\
    \ to add water cooling to the Raspberry Pi have also been made. Frankly, this\
    \ is just silly."
