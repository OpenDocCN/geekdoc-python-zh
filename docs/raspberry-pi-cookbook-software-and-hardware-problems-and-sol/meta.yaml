    \ ‘Pifm.tar.gz’\n\n100%[==================================================>] 5,521,400\
    \    601K/s   in 8.9s    \n\n2018-06-07 07:35:11 (601 KB/s) - ‘Pifm.tar.gz’ saved\
    \ [5521400/5521400]\n```\n\nIf your URL contains any special characters, it's\
    \ a good idea to enclose them in double quotes.\n\n# Discussion\n\nYou'll find\
    \ that some instructions for installing software rely on using wget to fetch files.\
    \ It's often more convenient to do this from the command line rather than use\
