  md: '# 11.8 Controlling Hardware with Android and Bluetooth


    # Problem


    You want to use your Android mobile phone and Bluetooth to interact with your
    Raspberry Pi.


    # Solution


    Use the free Blue Dot Android app and Python library:


    ```

    $ sudo pip3 install bluedot

    ```


    Next, you need to make sure that your Raspberry Pi is *discoverable*. In the upper-right
    corner of the Raspberry Pi’s screen, click the Bluetooth icon, and then click
    Make Discoverable (Figure 11-9).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_327_0.png)


    Next, you need to pair your Raspberry Pi and phone. Make sure that your phone
    has Bluetooth turned on, and then click Add New Device on your Raspberry Pi’s
    Bluetooth menu (Figure 11-10).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_327_1.png)'
