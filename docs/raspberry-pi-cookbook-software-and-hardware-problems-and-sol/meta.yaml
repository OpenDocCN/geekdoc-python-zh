  md: '# # 10.4 Setting Up I2C


    # ## Problem


    You want to set up the I2C bus (Inter-Integrated Circuit) so that you can use
    some add-ons that require it with your Raspberry Pi.


    # ## Solution


    In the latest versions of Raspberry Pi OS, enabling I2C is simply a matter of
    using the Raspberry Pi Configuration tool that you will find on the Raspberry
    Menu, under Preferences (Figure 10-6). On the Interfaces tab, click the toggle
    switch for I2C to turn it on and then click OK.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_286_0.png)


    *Figure 10-6. Enabling I2C using the Pi Configuration tool*


    On older versions of Raspberry Pi OS, or if you prefer the command line, the raspi-config
    utility does the same job.


    Start raspi-config using the following command:


    ```

    $ sudo raspi-config

    ```


    Then, from the menu that appears, select Interfacing Options and scroll down to
    I2C (Figure 10-7).'
  merge: -1
  pgno: 286
- img_proc: true
  md: '![](img/e36e77524aeaae366529d1cf02f9a39c_287_0.png)


    Figure 10-7. Enabling I2C using raspi-config


    You are then asked, “Would you like the ARM I2C interface to be enabled?” to which
    you should respond **Yes**. You will also be asked if you want the I2C module
    loading at startup, to which you should also respond **Yes**.


    At this point, you’ll probably also want to install the Python I2C library using
    this command:


    ```

    $ sudo apt install python-smbus

    ```


    You will then need to reboot the Raspberry Pi for the changes to take effect.


    # Discussion


    Using I2C modules is a really good way of interfacing with the Pi. It reduces
    the number of wires that you need to connect everything (to just four), and some
    really neat I2C modules are available.


    However, don’t forget to calculate the total of the current used by the I2C modules
    and make sure that it doesn’t exceed the limits specified in Recipe 10.3.


    Figure 10-8 shows a selection of I2C modules available from Adafruit. Other suppliers,
    such as SparkFun, also have I2C devices. From left to right in the figure, there
    are LED matrix displays; a four-digit, seven-segment LED display; a 16-channel
    PWM/servo controller; and a real-time clock module.'
