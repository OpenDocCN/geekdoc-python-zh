    \ 摄像头\n\n### 问题\n\n你想设置一个 USB 网络摄像头，用于计算机视觉（CV）项目。\n\n### 解决方案\n\n使用与树莓派兼容的 USB\
    \ 网络摄像头。选择一个质量好的摄像头。如果你正在做一个需要摄像头靠近拍摄对象的项目，选择一个具有手动对焦选项的摄像头。为了真正靠近拍摄对象，低成本的 USB\
    \ 内窥镜会很有用。\n\n根据你的 CV 项目，你可能需要设置一个光线充足的区域。图 8-1 展示了一个简单的灯箱，它由一个半透明的塑料储物箱制成，从侧面和顶部进行照明以提供均匀的光线。网络摄像头安装在箱子顶部的一个孔上。这种布置在食谱\
    \ 8.4 中使用。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_248_0.png)\n\n图 8-1. 使用自制灯箱实现均匀照明\n\
    \n你也可以购买专为摄影设计的商用*光帐*，它们效果很好。你可能需要一些试错来使你的系统获得明亮且均匀的照明。阴影可能尤其成问题。\n\n### 讨论\n\n\
    你可以从 OpenCV 控制台测试你的 USB 摄像头。启动 Python 3，然后输入以下命令：\n\n```\n$ python3\nPython 3.9.2\
    \ (default, Mar 12 2021, 04:06:34)\n[GCC 10.2.1 20210110] on linux\nType \"help\"\
    , \"copyright\", \"credits\" or \"license\" for more information.\n>>> import\
    \ cv2\n>>> from imutils.video import VideoStream\n>>> vs = VideoStream(src=0).start()\n\
    >>> img = vs.read()\n>>> cv2.imshow('image',img)\n>>> cv2.waitKey(0)\n```\n\n\
    在输入最后一行代码后，应该会打开一个窗口，显示来自你摄像头的图像。你可能需要关闭整个终端窗口才能关闭图像窗口。\n\n在 OpenCV 中，即使是单张图像也被视为来自视频流的帧。注意你之前输入的第三行代码，我们有\
    \ `src=0`。这意味着 OpenCV 能找到的第一个摄像头。所以，如果你有多个摄像头，你可以在这里使用不同的数字。\n\n一旦使用 `vs.read()`\
    \ 读取了图像，你就可以使用 OpenCV 的 `imshow` 实用方法来显示图像。你会发现你经常使用它来调试你的计算机视觉项目。\n\n最后的 `cv2.waitKey(0)`\
    \ 是必需的，它允许 OpenCV 在后台实际渲染图像，直到按下某个键。\n\n### 另请参阅\n\n要将树莓派摄像头模块与 OpenCV 一起使用，请参阅食谱\
    \ 8.3。\n\n## 8.3 使用树莓派摄像头模块进行计算机视觉\n\n### 问题\n\n你想将直接连接到树莓派的摄像头模块与 OpenCV 一起使用。\n\
    \n### 解决方案\n\n一旦你按照食谱 1.16 安装了树莓派摄像头模块，它应该会自动显示为摄像头设备。\n\n安装摄像头后，你现在可以尝试以下命令来确保它正常工作：\n\
    \n```\n$ python3\nPython 3.9.2 (default, Mar 12 2021, 04:06:34)\n[GCC 10.2.1 20210110]\
    \ on linux\nType \"help\", \"copyright\", \"credits\" or \"license\" for more\
    \ information.\n>>> import cv2\n>>> from imutils.video import VideoStream\n>>>\
    \ vs = VideoStream(src=0).start()\n>>> img = vs.read()\n>>> cv2.imshow('image',img)\n\
    >>> cv2.waitKey(0)\n```\n\n### 讨论\n\n请注意，在早期版本的树莓派操作系统中，你必须安装一个*驱动程序*才能使摄像头模块对\
    \ OpenCV 可用；如果 OpenCV 没有检测到摄像头模块，请尝试将你的树莓派操作系统更新到最新版本（食谱 3.40）。\n\n### 另请参阅\n\n\
    - 有关安装树莓派摄像头模块的信息，请参阅食谱 1.16。\n- 有关 picamera Python 模块的信息，请参阅 http://picamera.readthedocs.org。\n\
    - 要将 USB 摄像头与 OpenCV 一起使用，请参阅食谱 8.2。\n\n## 8.4 硬币计数\n\n### 问题\n\n你想使用计算机视觉来统计网络摄像头视野中的硬币数量。\n\
    \n### 解决方案\n\n使用 OpenCV 的 *Hough Circles* 检测器来实时统计放置在网络摄像头视野内的硬币数量。Hough Circles\
    \ 可以检测任何类型的圆形，并且能很好地检测大多数硬币。\n\n这是 CV 的一个应用，你确实需要良好的照明和固定位置的摄像头。我使用了图 8-1 所示的设置。\n\
    \n许多计算机视觉项目的关键部分是正确设置参数，这个食谱也不例外。因此，在使用最终只给出硬币计数的程序之前，我们将使用一个测试程序，它在硬币周围绘制轮廓，以便我们可以看到发生了什么。\n\
    \n你可以在本书的下载资料中找到此示例以及本食谱中其他示例的代码（参见食谱 3.22）。该程序名为 `ch_08_coin_count_test.py`。\n\
    \n在你的摄像头下放一些硬币并运行该程序。应该会出现一个类似图 8-2 的窗口。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_251_0.png)\n\
    \n图 8-2. 硬币计数\n\n如果你运气好，你的硬币都会被圈起来，并且你应该在控制台看到如下输出：\n\n```\n$ python3 ch_08_coin_count_test.py\n\
    [[[380.5 338.5 37.9]\n  [553.5 249.5 34.9]\n  [538.5 357.5 31.4]\n  [546.5 442.5\
    \ 30.7]\n  [418.5 244.5 33.1]]]\n```\n\n要刷新图像，按任意键；当你想退出程序时，按 X 键。\n\n如果你的硬币没有全部被圈起来，你需要调整程序\
    \ `ch_08_coin_count_test.py` 中的一些参数（`param1`、`param2`、`minRadius` 和 `maxRadius`）：\n\
    \n```python\nimport cv2\nfrom imutils.video import VideoStream\nfrom imutils import\
    \ resize\n\nvs = VideoStream(src=0).start()\n\nwhile True:\n    img = vs.read()\n\
    \    img = resize(img, width=800)\n    img = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)\n\
    \    img = cv2.blur(img, (3, 3))\n\n    detected_circles = cv2.HoughCircles(img,\n\
    \        cv2.HOUGH_GRADIENT, 1, 20, param1 = 50,\n        param2 = 30, minRadius\
    \ = 15, maxRadius = 100)\n\n    print(detected_circles)\n\n    for pt in detected_circles[0]:\n\
    \        a, b, r = pt[0], pt[1], pt[2]\n        cv2.circle(img, (int(a), int(b)),\
    \ int(r), (0, 255, 0), 2)\n\n    cv2.imshow('image', img)\n    key = cv2.waitKey(0)\n\
    \    cv2.destroyAllWindows()\n    if key == ord('x'):\n        break\n\nvs.stop()\n\
    ```\n\n你可能不需要更改参数 `param1`。如果你对它和其他参数的作用感兴趣，可以在 https://oreil.ly/3AmKn 阅读相关信息。\n\
    \n如果你得到很多错误的圆形，尝试增加 `param2` 的值。但最可能需要更改的参数是 `minRadius` 和 `maxRadius`，因为它们对摄像头的分辨率、镜头焦距以及到硬币的距离很敏感。所以如果没有硬币被圈起来，就增加\
    \ `maxRadius` 的值。\n\n调整参数，直到你的硬币被正确识别。\n\n### 讨论\n\n以下是测试程序工作原理的快速概述。\n\n大部分代码位于\
    \ `while True:` 块内的一个 `try` 块中。这确保了当你按 Ctrl-C 退出程序时，视频流会被停止。\n\n读取图像后，有几个处理阶段。首先，图像被调整为\
    \ 800 像素宽，然后转换为灰度图，最后应用模糊滤镜。模糊滤镜有助于改善圆形匹配。\n\n对 `cv.HoughCircles` 的调用返回一个 OpenCV\
    \ 找到的圆形数组。这三个值分别是圆心的 x 和 y 坐标以及圆的半径。\n\n为了在硬币图像上渲染这些圆形，使用一个 `for` 循环遍历每个检测到的圆形，然后使用\
    \ `cv2.circle` 方法在每个硬币周围绘制一个 2 像素宽的黑色（0, 0, 0）圆形。"
