    \ | Pimoroni | 规格与 Feather RP2040 非常相似。 |\n| Badger | Pimoroni | 引脚最少，但有 5 个按钮和一个大型电子墨水显示屏。\
    \ |\n\n### 讨论\n\nPimoroni Badger 是最有趣的 RP2040 板之一。它可以用作 ID 徽章，在其电子墨水显示屏上显示图形和文本，即使在断电后仍会显示。但它也具有\
