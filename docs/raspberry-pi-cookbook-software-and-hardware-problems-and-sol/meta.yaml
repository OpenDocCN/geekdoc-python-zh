    \ in the following code (ch_14_resistance_meter.py):\n\n```\nfrom PiAnalog import\
    \ *\nimport time\n\np = PiAnalog()\n\nwhile True:\n    print(p.read_resistance())\n\
    \    time.sleep(1)\n```\n\nAs with all the program examples in this book, you\
    \ can also download this program (see Recipe 3.22).\n\nWhen you run the program,\
    \ you should see some output like this:\n\n```\n$ python3 ch_14_resistance_meter.py\n\
