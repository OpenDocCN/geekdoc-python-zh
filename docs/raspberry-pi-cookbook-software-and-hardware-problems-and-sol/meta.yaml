- md: '## 10.2 Using the GPIO Connector on a Raspberry Pi 400


    ### Problem


    The GPIO connector on the Raspberry Pi 400 is a little hard to reach because it’s
    on the back and recessed. How do I access it easily?


    ### Solution


    The pinout of the GPIO connector on a Raspberry Pi 400 is the same as all the
    40-pin GPIO Raspberry Pis. To make it easier to attach jumper wires to the connector,
    use a GPIO adapter like the [MonkMakes GPIO Adapter](https://monkmakes.com) for
    Pi 400 shown in Figure 10-3.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_283_0.png)


    Other types of GPIO adapters are available from SparkFun, Pi Hut, and others.


    ### Discussion


    You are unlikely to want to embed a bulky and relatively expensive Pi 400 into
    your electronics project. However, if your goal is to learn about electronics
    with your Pi 400, then an adapter is a lot easier than trying to attach jumper
    wires to the back of the Pi 400.


    HATs don''t fit onto the Pi 400 without an adapter either, so a GPIO adapter also
    allows add-on HATs to be used with the Pi 400, such as the Sense HAT shown in
    Figure 10-4.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_284_0.png)


    Figure 10-4. A Raspberry Pi 400 with Sense HAT


    There are a few add-on boards (Adafruit calls them *bonnets*) designed to work
    well with the Pi 400, such as the Air Quality board shown in Figure 10-5, the
    Pimoroni Breakout Garden for Pi 400, and the Adafruit Cyberdeck Bonnet.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_284_1.png)


    Figure 10-5. The Air Quality board for Raspberry Pi 400


    ### See Also


    For more information on the Sense HAT pictured in Figure 10-4, see Recipe 10.15.


    ## 10.3 Keeping Your Raspberry Pi Safe When Using the GPIO Connector


    ### Problem


    You want to connect external electronics to your Raspberry Pi and don’t want to
    accidentally damage or break it.


    ### Solution


    Obey these simple rules to reduce the risk of damaging your Raspberry Pi when
    using the GPIO connector:


    - Do not poke at the GPIO connector with a screwdriver or any metal object when
    the Pi is powered up.

    - Do not connect electronic components to the GPIO pins or a breadboard with the
    Raspberry Pi powered on.

    - Do not power the Pi with more than 5V.

    - Always connect the Raspberry Pi GND pin to the GND connection of whatever device
    you are attaching.

    - Do not put more than 3.3V on any GPIO pin being used as an input.

    - Do not draw more than 16mA per output; keep the total for all outputs below
    100mA on a 40-pin Raspberry Pi and below 50mA for an old 26-pin Raspberry Pi.

    - When using LEDs, 3mA is enough to light a red LED reasonably brightly with a
    470Ω series resistor.

    - Do not draw more than a total of 250mA from the 5V supply pins for Raspberry
    Pi models 1 to 3. For the Pi 4, 5V power comes directly from USB, so the maximum
    depends on your power supply. 1A is a reasonable maximum with a 3A power supply.


    ### Discussion


    There is no doubt about it: the Raspberry Pi is a little fragile when it comes
    to adding external electronics. The newer Raspberry Pi models are a bit more robust
    but still quite easy to break. Exercise caution and check what you have done *before*
    you power up the Raspberry Pi, or you run the risk of having to replace it.


    ### See Also


    Read this very good discussion of the [Raspberry Pi''s GPIO output capabilities](https://www.raspberrypi.org/documentation/configuration/gpio.md).


    ## 10.4 Setting Up I2C


    ### Problem


    You want to set up the I2C bus (Inter-Integrated Circuit) so that you can use
    some add-ons that require it with your Raspberry Pi.


    ### Solution


    In the latest versions of Raspberry Pi OS, enabling I2C is simply a matter of
    using the Raspberry Pi Configuration tool that you will find on the Raspberry
    Menu, under Preferences (Figure 10-6). On the Interfaces tab, click the toggle
    switch for I2C to turn it on and then click OK.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_286_0.png)


    *Figure 10-6. Enabling I2C using the Pi Configuration tool*


    On older versions of Raspberry Pi OS, or if you prefer the command line, the raspi-config
    utility does the same job.


    Start raspi-config using the following command:


    ```

    $ sudo raspi-config

    ```


    Then, from the menu that appears, select Interfacing Options and scroll down to
    I2C (Figure 10-7).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_287_0.png)


    Figure 10-7. Enabling I2C using raspi-config


    You are then asked, “Would you like the ARM I2C interface to be enabled?” to which
    you should respond **Yes**. You will also be asked if you want the I2C module
    loading at startup, to which you should also respond **Yes**.


    At this point, you’ll probably also want to install the Python I2C library using
    this command:


    ```

    $ sudo apt install python-smbus

    ```


    You will then need to reboot the Raspberry Pi for the changes to take effect.


    ### Discussion


    Using I2C modules is a really good way of interfacing with the Pi. It reduces
    the number of wires that you need to connect everything (to just four), and some
    really neat I2C modules are available.


    However, don’t forget to calculate the total of the current used by the I2C modules
    and make sure that it doesn’t exceed the limits specified in Recipe 10.3.


    Figure 10-8 shows a selection of I2C modules available from Adafruit. Other suppliers,
    such as SparkFun, also have I2C devices. From left to right in the figure, there
    are LED matrix displays; a four-digit, seven-segment LED display; a 16-channel
    PWM/servo controller; and a real-time clock module.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_288_0.png)


    Figure 10-8. I2C modules


    Other I2C modules include FM radio transmitters, ultrasonic range finders, OLED
    (organic light-emitting diode) displays, and various types of sensors.


    ### See Also


    See some of the I2C recipes in this book, including Recipes 12.3, 15.1, and 15.2.


    ## 10.5 Using I2C Tools


    ### Problem


    You have an I2C device attached to your Raspberry Pi, and you want to check that
    it is attached properly and find the correct I2C address to use with the device.


    ### Solution


    Install and use i2c-tools.


    > On newer distributions, you might find that i2c-tools is already installed.


    From a Terminal window on your Pi, type the following commands to fetch and install
    the i2c-tools:


    ```

    $ sudo apt install i2c-tools

    ```


    Attach your I2C device to the Pi and run the command:


    ```

    $ sudo i2cdetect -y 1

    ```


    Note that if you are using a very old Raspberry Pi revision 1 board, you need
    to change 1 to 0 in the preceding line of code.


    If I2C is available, you will see some output like that shown in Figure 10-9,
    which indicates that two I2C addresses are in use—0x68 and 0x70.


    > ### Hexadecimal

    >

    > Hexadecimal (or just *hex*) is a way of representing numbers using the number
    base 16 rather than the number base 10 that we use in everyday life.

    >

    > In hexadecimal, each digit can have one of sixteen possible values. In addition
    to the familiar digit values of 0 to 9, hex uses the letters A to F; the letter
    A represents decimal 10, and F decimal 15.

    >

    > There is no particular reason to use hex over decimal, except that in the unlikely
    event that you want to convert a number into binary, it''s much easier to do from
    hex than decimal.

    >

    > To avoid confusion as to whether a number is being represented in decimal or
    hex, it is common to prefix hex numbers with 0x. In the preceding example, the
    hex number 0x68 is (in decimal) 6 x 16 + 8 = 104, and 0x70 is 7 x 16 = 112.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_289_0.png)


    *Figure 10-9. i2c-tools*


    ### Discussion


    i2cdetect is a useful diagnostic tool and worth running the first time you use
    a new I2C device.


    You need to ensure that the I2C address used by the device is the same as that
    required by the software. You''ll sometimes find little switches or solder bridges
    that can be used to change the I2C address of the device. This is especially useful
    if you have more than one device with the same address connected to the same Raspberry
    Pi.


    ### See Also


    See some of the I2C recipes in this book, including Recipes 12.3, 15.1, and 15.2.


    For more information on installing with apt, see Recipe 3.17.


    ## 10.6 Setting Up SPI


    ### Problem


    You have a device that uses the Serial Peripheral Interface (SPI) bus, and you
    want to use the device with your Raspberry Pi.


    ### Solution


    By default, SPI is disabled in Raspberry Pi OS. To enable it, the procedure is
    almost the same as Recipe 10.4. On the Raspberry Menu, under Preferences, open
    the Raspberry Pi Configuration tool (Figure 10-10). Go to the Interfaces tab,
    click the toggle switch for SPI, and click OK.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_290_0.png)'
  mdcn: '## 10.2 在树莓派 400 上使用 GPIO 连接器


    ### 问题


    树莓派 400 上的 GPIO 连接器有点难以触及，因为它位于背面且是凹陷的。如何轻松地访问它？


    ### 解决方案


    树莓派 400 上的 GPIO 连接器引脚排列与所有 40 引脚 GPIO 树莓派相同。为了更容易地将跳线连接到连接器上，可以使用一个 GPIO 适配器，例如图
    10-3 所示的适用于 Pi 400 的 [MonkMakes GPIO 适配器](https://monkmakes.com)。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_283_0.png)


    SparkFun、Pi Hut 等公司也提供其他类型的 GPIO 适配器。


    ### 讨论


    你不太可能想将一个笨重且相对昂贵的 Pi 400 嵌入到你的电子项目中。然而，如果你的目标是使用 Pi 400 学习电子学，那么使用适配器比试图将跳线连接到
    Pi 400 的背面要容易得多。


    没有适配器，HAT 也无法安装到 Pi 400 上，因此 GPIO 适配器也允许将附加 HAT 与 Pi 400 一起使用，例如图 10-4 所示的 Sense
    HAT。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_284_0.png)


    图 10-4. 装有 Sense HAT 的树莓派 400


    有一些附加板（Adafruit 称之为 *bonnets*）是专门为与 Pi 400 配合良好而设计的，例如图 10-5 所示的空气质量板、Pimoroni
    Breakout Garden for Pi 400 以及 Adafruit Cyberdeck Bonnet。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_284_1.png)


    图 10-5. 适用于树莓派 400 的空气质量板


    ### 另请参阅


    有关图 10-4 中所示 Sense HAT 的更多信息，请参阅配方 10.15。


    ## 10.3 使用 GPIO 连接器时保护树莓派的安全


    ### 问题


    你想将外部电子设备连接到你的树莓派，并且不想意外损坏或弄坏它。


    ### 解决方案


    遵守这些简单的规则，以降低在使用 GPIO 连接器时损坏树莓派的风险：


    -   当 Pi 通电时，不要用螺丝刀或任何金属物体戳 GPIO 连接器。

    -   不要在树莓派通电的情况下将电子元件连接到 GPIO 引脚或面包板上。

    -   不要使用超过 5V 的电压为 Pi 供电。

    -   始终将树莓派的 GND 引脚连接到你所连接设备的 GND 连接点。

    -   不要在任何用作输入的 GPIO 引脚上施加超过 3.3V 的电压。

    -   每个输出不要抽取超过 16mA 的电流；对于 40 引脚树莓派，所有输出的总电流应保持在 100mA 以下，对于旧的 26 引脚树莓派则应保持在 50mA
    以下。

    -   使用 LED 时，配合 470Ω 串联电阻，3mA 的电流足以使红色 LED 发出相当明亮的光。

    -   对于树莓派型号 1 到 3，不要从 5V 电源引脚抽取超过 250mA 的总电流。对于 Pi 4，5V 电源直接来自 USB，因此最大值取决于你的电源。使用
    3A 电源时，1A 是一个合理的最大值。


    ### 讨论


    毫无疑问：在添加外部电子设备方面，树莓派有点脆弱。较新的树莓派型号稍微坚固一些，但仍然很容易损坏。请谨慎行事，并在通电*之前*检查你所做的操作，否则你将面临需要更换它的风险。


    ### 另请参阅


    阅读这篇关于[树莓派 GPIO 输出能力](https://www.raspberrypi.org/documentation/configuration/gpio.md)的非常好的讨论。


    ## 10.4 设置 I2C


    ### 问题


    你想设置 I2C 总线（Inter-Integrated Circuit），以便可以将一些需要它的附加设备与你的树莓派一起使用。


    ### 解决方案


    在最新版本的 Raspberry Pi OS 中，启用 I2C 只需使用你可以在 Raspberry 菜单下的 Preferences（首选项）中找到的树莓派配置工具（图
    10-6）。在 Interfaces（接口）选项卡上，单击 I2C 的切换开关将其打开，然后单击 OK。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_286_0.png)


    *图 10-6. 使用 Pi 配置工具启用 I2C*


    在旧版本的 Raspberry Pi OS 上，或者如果你更喜欢命令行，raspi-config 实用程序可以完成同样的工作。


    使用以下命令启动 raspi-config：


    ```

    $ sudo raspi-config

    ```


    然后，从出现的菜单中，选择 Interfacing Options（接口选项）并向下滚动到 I2C（图 10-7）。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_287_0.png)


    图 10-7. 使用 raspi-config 启用 I2C


    然后你会被问到：“Would you like the ARM I2C interface to be enabled?”（你希望启用 ARM I2C 接口吗？），你应该回答
    **Yes**（是）。你还会被问到是否希望在启动时加载 I2C 模块，你也应该回答 **Yes**（是）。


    此时，你可能还想使用以下命令安装 Python I2C 库：


    ```

    $ sudo apt install python-smbus

    ```


    然后你需要重启树莓派以使更改生效。


    ### 讨论


    使用 I2C 模块是与 Pi 接口的一种非常好的方式。它减少了连接所有设备所需的导线数量（只需四根），并且有一些非常棒的 I2C 模块可用。


    但是，不要忘记计算 I2C 模块使用的总电流，并确保它不超过配方 10.3 中指定的限制。


    图 10-8 展示了 Adafruit 提供的一些 I2C 模块。其他供应商，如 SparkFun，也有 I2C 设备。图中从左到右依次是：LED 矩阵显示器；四位七段
    LED 显示器；16 通道 PWM/伺服控制器；以及实时时钟模块。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_288_0.png)


    图 10-8. I2C 模块


    其他 I2C 模块包括 FM 无线电发射器、超声波测距仪、OLED（有机发光二极管）显示器和各种类型的传感器。


    ### 另请参阅


    参阅本书中的一些 I2C 配方，包括配方 12.3、15.1 和 15.2。


    ## 10.5 使用 I2C 工具


    ### 问题


    你有一个 I2C 设备连接到你的树莓派，你想检查它是否连接正确，并找到与该设备一起使用的正确 I2C 地址。


    ### 解决方案


    安装并使用 i2c-tools。


    > 在较新的发行版中，你可能会发现 i2c-tools 已经安装好了。


    在你的 Pi 上打开终端窗口，键入以下命令来获取并安装 i2c-tools：


    ```

    $ sudo apt install i2c-tools

    ```


    将你的 I2C 设备连接到 Pi 并运行命令：


    ```

    $ sudo i2cdetect -y 1

    ```


    请注意，如果你使用的是非常旧的树莓派修订版 1 板，你需要将上面代码行中的 1 改为 0。


    如果 I2C 可用，你将看到一些类似于图 10-9 所示的输出，这表明有两个 I2C 地址正在使用中——0x68 和 0x70。


    > ### 十六进制

    >

    > 十六进制（或简称 *hex*）是一种使用 16 进制而不是我们日常生活中使用的 10 进制来表示数字的方式。

    >

    > 在十六进制中，每个数字可以有十六个可能的值。除了熟悉的 0 到 9 的数字值外，十六进制还使用字母 A 到 F；字母 A 代表十进制 10，F 代表十进制
    15。

    >

    > 使用十六进制而不是十进制没有特别的原因，除非在极少数情况下你想将数字转换为二进制，从十六进制转换比从十进制转换要容易得多。

    >

    > 为了避免混淆一个数字是以十进制还是十六进制表示，通常在十六进制数字前加上 0x 前缀。在前面的例子中，十六进制数字 0x68 是（十进制）6 x 16
    + 8 = 104，而 0x70 是 7 x 16 = 112。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_289_0.png)


    *图 10-9. i2c-tools*


    ### 讨论


    i2cdetect 是一个有用的诊断工具，值得在第一次使用新的 I2C 设备时运行。


    你需要确保设备使用的 I2C 地址与软件所需的地址相同。你有时会发现一些小开关或焊接桥可用于更改设备的 I2C 地址。如果你有多个具有相同地址的设备连接到同一个树莓派，这尤其有用。


    ### 另请参阅


    参阅本书中的一些 I2C 配方，包括配方 12.3、15.1 和 15.2。


    有关使用 apt 安装的更多信息，请参阅配方 3.17。


    ## 10.6 设置 SPI


    ### 问题


    你有一个使用串行外设接口（SPI）总线的设备，你想将该设备与你的树莓派一起使用。


    ### 解决方案


    默认情况下，Raspberry Pi OS 中禁用了 SPI。要启用它，过程与配方 10.4 几乎相同。在 Raspberry 菜单下的 Preferences（首选项）中，打开树莓派配置工具（图
    10-10）。转到 Interfaces（接口）选项卡，单击 SPI 的切换开关，然后单击 OK。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_290_0.png)'
