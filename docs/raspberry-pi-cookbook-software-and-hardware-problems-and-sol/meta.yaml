    \ this structure insisting that classes are created in a certain way, and that\
    \ all methods and variables relating to the class are bundled up into that class.\
    \ Classes can also be arranged in a hierarchy, in which more specific classes\
    \ can inherit methods from more generic classes, making it easier to write code\
    \ that isn’t repeated in multiple places in your program.\n\nDefine a class and\
    \ provide it with the member variables you need.\n\nThe following example defines\
    \ a class to represent an address book entry:\n\n```\nclass Person:\n    '''This\
    \ class represents a person object'''\n\n    def __init__(self, name, tel):\n\
    \        self.name = name\n        self.tel = tel\n```"
  - "[PAGE 215]\n\nThe first line inside the class definition uses triple single quotes\
    \ to denote a *documentation string*, which should explain the purpose of the\
    \ class. Although entirely optional, adding a documentation string to a class\
    \ allows others to see what the class does. This is particularly useful if the\
    \ class is made available for others to use.\n\nDocumentation strings (or doc\
    \ strings) are not like normal comments because, although they are not active\
    \ lines of code, they do become associated with the class; thus, at any time,\
    \ you can read the doc string for a class using the following command (with double\
    \ underscores on either side of the word doc):\n\n```\nPerson.__doc__\n```\n\n\
    Inside the class definition is the *constructor method*, which will be called\
    \ automatically whenever you create a new instance of the class. A class is like\
    \ a template, so in defining a class called Person, we do not create any actual\
    \ Person objects until later:\n\n```\ndef __init__(self, name, tel):\n    self.name\
    \ = name\n    self.tel = tel\n```\n\nThe constructor method must be named as shown,\
    \ with double underscores on either side of the word init.\n\n# Discussion\n\n\
    One way in which Python differs from most object-oriented languages is that you\
    \ need to include the special variable self as a parameter to all the methods\
    \ that you define within the class. This is a reference to, in this case, the\
    \ newly created instance. The variable self is the same concept as the special\
    \ variable this that you find in Java and some other languages.\n\nThe code in\
    \ this method transfers parameters that were supplied to it into *member variables*.\
    \ The member variables do not need to be declared in advance, but they do need\
    \ to be prefixed by self.\n\nSo this line:\n\n```\nself.name = name\n```\n\ncreates\
    \ a variable called name that's accessible to every member of the class Person\
    \ and initializes it with the value passed into the call to create an instance,\
    \ which looks like this:\n\n```\np = Person(\"Simon\", \"1234567\")\n```\n\nWe\
    \ can then check that our new Person object, p, has a name of \"Simon\" by typing\
    \ the following:\n\n```\n>>> p.name\nSimon\n```"
  - "[PAGE 216]\n\nIn a complex program, it is good practice to put each class in\
    \ its own file with a filename that matches the class name. This also makes it\
    \ easy to convert the class into a module (see Recipe 7.11).\n\n# See Also\n\n\
    See Recipe 7.5 for information on defining methods.\n\n# 7.5 Defining a Method\n\
    \n# Problem\n\nYou need to add some code to a class.\n\n# Solution\n\nFunctions\
    \ that are associated with a particular class are called *methods*.\nThe following\
    \ example shows how you can include a method within a class definition:\n\n```\n\
    class Person:\n    '''This class represents a person object'''\n\n    def __init__(self,\
    \ first_name, surname, tel):\n        self.first_name = first_name\n        self.surname\
    \ = surname\n        self.tel = tel\n\n    def full_name(self):\n        return\
    \ self.first_name + \" \" + self.surname\n```\n\nThe `full_name` method concatenates\
    \ the first name and surname attributes of the person, placing a space between\
    \ them, and might product an output something like this:\n\nSimon Monk\n\n# Discussion\n\
    \nYou can think of methods as functions that are tied to a specific class and\
    \ may or may not use member variables of that class in their processing. So, as\
    \ with a function, you can write whatever code you like in a method and also have\
    \ one method call another.\n\n# See Also\n\nSee Recipe 7.4 for information on\
    \ defining a class."
- md: "## 7.6 Inheritance\n\n### Problem\n\nYou need a specialized version of an existing\
    \ class.\n\n### Solution\n\nUse *inheritance* to create a subclass of an existing\
    \ class and add new member variables and methods.\n\nBy default, all new classes\
    \ that you create are subclasses of object. You can change this by specifying\
    \ the class you want to use as a superclass in parentheses after the class name\
    \ in a class definition. The following example defines a class (Employee) as a\
    \ subclass of Person and adds a new member variable (salary) and an extra method\
    \ (give_raise):\n\n```python\nclass Employee(Person):\n\n    def __init__(self,\
    \ first_name, surname, tel, salary):\n        super().__init__(first_name, surname,\
    \ tel)\n        self.salary = salary\n\n    def give_raise(self, amount):\n  \
    \      self.salary = self.salary + amount\n```\n\nNote that the preceding example\
    \ is for Python 3. For Python 2, you can't use super the same way. Instead, you\
    \ must write the following:\n\n```python\nclass Employee(Person):\n\n    def __init__(self,\
    \ first_name, surname, tel, salary):\n        Person.__init__(self, first_name,\
    \ surname, tel)\n        self.salary = salary\n\n    def give_raise(self, amount):\n\
    \        self.salary = self.salary + amount\n```\n\n### Discussion\n\nIn both\
    \ of these examples, the initializer method for the subclass first uses the initializer\
    \ method of the parent class (superclass) and then adds the member variable. This\
    \ has the advantage of not requiring you to repeat the initialization code in\
    \ the new subclass.\n\nSee Also\n\nSee Recipe 7.4 for information on defining\
    \ a class.\n\nThe Python inheritance mechanism is very powerful and supports *multiple\
    \ inheritance*, in which a subclass inherits from more than one superclass. For\
    \ more on multiple inheritance, see the official documentation for Python.\n\n\
    ## 7.7 Writing to a File\n\n### Problem\n\nYou need to write something to a file.\n\
    \n### Solution\n\nUse the open, write, and close functions to open a file, write\
    \ some data, and then close the file:\n\n```python\n>>> f = open('test.txt', 'w')\n\
    >>> f.write('This file is not empty')\n>>> f.close()\n```\n\n### Discussion\n\n\
    In the preceding example, the file has an extension of *txt*, implying a text\
    \ file, but any file extension can be used here.\n\nOnce you have opened the file,\
    \ you can make as many writes to it as you like before closing it. Note that it\
    \ is important to use close because although each write should update the file\
    \ immediately, it might be buffered in memory and data could be lost. It could\
    \ also leave the file locked so that other programs can't open it.\n\nThe open\
    \ function takes two parameters. The first is the path to the file to be written.\
    \ This can be relative to the current working directory or, if it starts with\
    \ a /, an absolute path.\n\nThe second (optional) parameter is the mode in which\
    \ the file should be opened. If this is omitted, then read-only (r) mode is assumed.\
    \ To overwrite an existing file or create the file with the name specified if\
    \ it doesn't already exist, use w. Table 7-1 shows the full list of file mode\
    \ characters. You can combine these using +. For example, to open a file in read\
    \ and binary mode, you would use this:\n\n```python\n>>> f = open('test.txt',\
    \ 'r+b')\n```\n\nTable 7-1. File modes\n\n| Mode | Description |\n| :--- | :---\
    \ |\n| r | Read |\n| w | Write |\n| a | Append to the end of an existing file\
    \ rather than overwrite it |\n| b | Binary mode |\n| t | Text mode (default) |\n\
    | + | A shortcut for r+w |\n\nBinary mode allows you to read or write binary streams\
    \ of data, such as images, rather than text.\n\nSee Also\n\nTo read the contents\
    \ of a file, see Recipe 7.8.\n\nFor more information on handling exceptions, see\
    \ Recipe 7.10.\n\n## 7.8 Reading from a File\n\n### Problem\n\nYou need to read\
    \ the contents of a file into a string variable.\n\n### Solution\n\nTo read a\
    \ file's contents, you need to use the file methods open, read, and close. The\
    \ following example reads the entire contents of the file and assigns them to\
    \ the variable s:\n\n```python\nf = open('test.txt')\ns = f.read()\nf.close()\n\
    ```\n\n### Discussion\n\nYou can also read text files one line at a time using\
    \ the method readline.\n\nThe preceding example will throw an exception if the\
    \ file doesn't exist or is not readable for some other reason. You can handle\
    \ this by enclosing the code in a try/except construction, like so:\n\n```python\n\
    try:\n    f = open('test.txt')\n    s = f.read()\n    f.close()\nexcept IOError:\n\
    \    print(\"Cannot open the file\")\n```\n\nSee Also\n\nTo write things to a\
    \ file, and for a list of file open modes, see Recipe 7.7.\n\nFor more information\
    \ on handling exceptions, see Recipe 7.10.\n\nTo parse JSON data, see Recipe 7.20.\n\
    \n## 7.9 Using Pickling to Save and Load Data in a File\n\n### Problem\n\nYou\
    \ want to save the entire contents of a data structure to a file so that it can\
    \ be read the next time the program is run.\n\n### Solution\n\nUse the Python\
    \ *pickling* feature to dump the data structure to file in a format that can be\
    \ automatically read back into memory as an equivalent data structure later on.\n\
    \nThe following example saves a complex list structure to a file called *mylist.pickle*:\n\
    \n```python\n>>> import pickle\n>>> mylist = ['some text', 123, [4, 5, True]]\n\
    >>> f = open('mylist.pickle', 'wb')\n>>> pickle.dump(mylist, f)\n>>> f.close()\n\
    ```\n\nTo *unpickle* the contents of the file into a new list, use the following:\n\
    \n```python\n>>> f = open('mylist.pickle', 'rb')\n>>> other_array = pickle.load(f)\n\
    >>> f.close()\n>>> other_array\n['some text', 123, [4, 5, True]]\n```\n\n### Discussion\n\
    \nPickling will work on pretty much any data structure you can throw at it. It\
    \ doesn't need to be a list. The extension of the file you pickle to doesn't matter\
    \ either. Using *.pickle* makes sense, but you could equally use *.txt* or *.pic*.\n\
    \nThe file is saved in a binary format that is not human-readable; you must open\
    \ the file using the wb (write binary) option when writing the file and the rb\
    \ (read binary) option when reading the file.\n\nSee Also\n\nTo write things to\
    \ a file and for a list of file open modes, see Recipe 7.7.\n\nAn alternative\
    \ to pickling is to save your objects as JSON files as described in Recipe 7.21.\n\
    \n## 7.10 Handling Exceptions\n\n### Problem\n\nIf something goes wrong while\
    \ a program is running, you want to catch the error or exception and display a\
    \ user-friendly error message.\n\n### Solution\n\nUse Python's try/except construct.\n\
    \nThe following example, from Recipe 7.8, catches any problems when opening a\
    \ file:\n\n```python\ntry:\n    f = open('test.txt')\n    s = f.read()\n    f.close()\n\
    except IOError:\n    print(\"Cannot open the file\")\n```\n\nSince you wrapped\
    \ the potentially error-prone commands to open the file in a try/except construction,\
    \ any error that occurs will be captured before it displays an error message,\
    \ allowing you to handle it in your own way. Here, this means displaying the friendly\
    \ message “Cannot open the file.”\n\n### Discussion\n\nA common situation in which\
    \ runtime exceptions can occur, in addition to during file access, is when you\
    \ are accessing a list and the index you are using is outside the bounds of the\
    \ list. For example, this happens if you try to access the fifth (index 4) element\
    \ of a three-element list:\n\n```python\n>>> list = [1, 2, 3]\n>>> list[4]\nTraceback\
    \ (most recent call last):\n  File \"<stdin>\", line 1, in <module>\nIndexError:\
    \ list index out of range\n```\n\nErrors and exceptions are arranged in a hierarchy,\
    \ and you can be as specific or general as you like when catching the exceptions.\n\
    \nThe class Exception is pretty near the top of that tree (most general) and will\
    \ catch almost any exception. You can also have separate except sections for catching\
    \ different types of exceptions and handling each in a different way. If you do\
    \ not specify any exception class, all exceptions will be caught by the except\
    \ command.\n\nPython also allows you to have else and finally clauses in your\
    \ error handling:\n\n```python\nlist = [1, 2, 3]\ntry:\n    list[8]\nexcept:\n\
    \    print(\"out of range\")\nelse:\n    print(\"in range\")\nfinally:\n    print(\"\
    always do this\")\n```\n\nThe else clause will be run if there is no exception,\
    \ and the finally clause will be run whether there is an exception or not.\n\n\
    Whenever an exception occurs, you can get more information about it by using the\
    \ Exception object, which is available only if you use the as keyword to put it\
    \ in a variable, as shown in the following example:\n\n```python\n>>> list = [1,\
    \ 2, 3]\n>>> try:\n...     list[8]\n... except Exception as e:\n...     print(\"\
    out of range\")\n...     print(e)\n...\nout of range\nlist index out of range\n\
    >>>\n```\n\nThis enables you to handle the error in your own way, while keeping\
    \ hold of the original error message.\n\nSee Also\n\nSee the [official Python\
    \ documentation](https://docs.python.org/3/library/exceptions.html) for Python\
    \ exception class hierarchy."
  mdcn: "## 7.6 继承\n\n### 问题\n\n你需要一个现有类的特化版本。\n\n### 解决方案\n\n使用*继承*来创建现有类的子类，并添加新的成员变量和方法。\n\
    \n默认情况下，你创建的所有新类都是 `object` 的子类。你可以通过在类定义中类名后的括号内指定要作为超类的类来改变这一点。以下示例定义了一个类（`Employee`）作为\
    \ `Person` 的子类，并添加了一个新的成员变量（`salary`）和一个额外的方法（`give_raise`）：\n\n```python\nclass\
    \ Employee(Person):\n\n    def __init__(self, first_name, surname, tel, salary):\n\
    \        super().__init__(first_name, surname, tel)\n        self.salary = salary\n\
    \n    def give_raise(self, amount):\n        self.salary = self.salary + amount\n\
    ```\n\n请注意，前面的示例适用于 Python 3。对于 Python 2，你不能以同样的方式使用 `super`。相反，你必须编写以下代码：\n\n\
    ```python\nclass Employee(Person):\n\n    def __init__(self, first_name, surname,\
    \ tel, salary):\n        Person.__init__(self, first_name, surname, tel)\n   \
    \     self.salary = salary\n\n    def give_raise(self, amount):\n        self.salary\
    \ = self.salary + amount\n```\n\n### 讨论\n\n在这两个示例中，子类的初始化方法首先使用父类（超类）的初始化方法，然后添加成员变量。这样做的好处是，你不需要在新子类中重复初始化代码。\n\
    \n另请参阅\n\n有关定义类的信息，请参阅配方 7.4。\n\nPython 的继承机制非常强大，并支持*多重继承*，即一个子类从多个超类继承。有关多重继承的更多信息，请参阅\
    \ Python 的官方文档。\n\n## 7.7 写入文件\n\n### 问题\n\n你需要将某些内容写入文件。\n\n### 解决方案\n\n使用 `open`、`write`\
    \ 和 `close` 函数来打开文件、写入一些数据，然后关闭文件：\n\n```python\n>>> f = open('test.txt', 'w')\n\
    >>> f.write('This file is not empty')\n>>> f.close()\n```\n\n### 讨论\n\n在前面的示例中，文件扩展名为\
    \ *txt*，表示这是一个文本文件，但这里可以使用任何文件扩展名。\n\n一旦你打开了文件，你可以在关闭它之前随意进行多次写入。请注意，使用 `close`\
    \ 很重要，因为尽管每次写入都应该立即更新文件，但它可能会在内存中缓冲，数据可能会丢失。它也可能使文件被锁定，导致其他程序无法打开它。\n\n`open`\
    \ 函数接受两个参数。第一个是要写入的文件的路径。这可以是相对于当前工作目录的路径，或者如果以 `/` 开头，则是绝对路径。\n\n第二个（可选）参数是文件应以何种模式打开。如果省略此参数，则假定为只读（`r`）模式。要覆盖现有文件或在文件不存在时创建指定名称的文件，请使用\
    \ `w`。表 7-1 显示了文件模式字符的完整列表。你可以使用 `+` 组合它们。例如，要以读取和二进制模式打开文件，你可以使用以下代码：\n\n```python\n\
    >>> f = open('test.txt', 'r+b')\n```\n\n表 7-1. 文件模式\n\n| 模式 | 描述 |\n| :--- | :---\
    \ |\n| r | 读取 |\n| w | 写入 |\n| a | 追加到现有文件的末尾，而不是覆盖它 |\n| b | 二进制模式 |\n| t | 文本模式（默认）\
    \ |\n| + | `r+w` 的快捷方式 |\n\n二进制模式允许你读取或写入二进制数据流，例如图像，而不是文本。\n\n另请参阅\n\n要读取文件内容，请参阅配方\
    \ 7.8。\n\n有关处理异常的更多信息，请参阅配方 7.10。\n\n## 7.8 从文件读取\n\n### 问题\n\n你需要将文件内容读取到字符串变量中。\n\
    \n### 解决方案\n\n要读取文件内容，你需要使用文件方法 `open`、`read` 和 `close`。以下示例读取文件的全部内容并将其赋值给变量\
    \ `s`：\n\n```python\nf = open('test.txt')\ns = f.read()\nf.close()\n```\n\n###\
    \ 讨论\n\n你也可以使用 `readline` 方法逐行读取文本文件。\n\n如果文件不存在或由于其他原因无法读取，前面的示例将抛出异常。你可以通过将代码包装在\
    \ `try/except` 结构中来处理此问题，如下所示：\n\n```python\ntry:\n    f = open('test.txt')\n\
    \    s = f.read()\n    f.close()\nexcept IOError:\n    print(\"Cannot open the\
    \ file\")\n```\n\n另请参阅\n\n要将内容写入文件以及文件打开模式列表，请参阅配方 7.7。\n\n有关处理异常的更多信息，请参阅配方 7.10。\n\
    \n要解析 JSON 数据，请参阅配方 7.20。\n\n## 7.9 使用 Pickling 在文件中保存和加载数据\n\n### 问题\n\n你想将数据结构的全部内容保存到文件中，以便在下次运行程序时可以读取。\n\
    \n### 解决方案\n\n使用 Python 的 *pickling* 功能将数据结构转储到文件中，格式可以稍后自动读回内存并作为等效的数据结构。\n\n\
    以下示例将一个复杂的列表结构保存到名为 *mylist.pickle* 的文件中：\n\n```python\n>>> import pickle\n>>>\
    \ mylist = ['some text', 123, [4, 5, True]]\n>>> f = open('mylist.pickle', 'wb')\n\
    >>> pickle.dump(mylist, f)\n>>> f.close()\n```\n\n要将文件内容*反序列化*到新列表中，请使用以下代码：\n\
    \n```python\n>>> f = open('mylist.pickle', 'rb')\n>>> other_array = pickle.load(f)\n\
    >>> f.close()\n>>> other_array\n['some text', 123, [4, 5, True]]\n```\n\n### 讨论\n\
    \nPickling 几乎适用于你可以抛给它的任何数据结构。它不需要是一个列表。你 pickle 到的文件扩展名也不重要。使用 *.pickle* 是有意义的，但你同样可以使用\
    \ *.txt* 或 *.pic*。\n\n文件以二进制格式保存，人类不可读；写入文件时必须使用 `wb`（写入二进制）选项打开文件，读取文件时必须使用 `rb`（读取二进制）选项打开文件。\n\
    \n另请参阅\n\n要将内容写入文件以及文件打开模式列表，请参阅配方 7.7。\n\nPickling 的一个替代方案是将你的对象保存为 JSON 文件，如配方\
    \ 7.21 中所述。\n\n## 7.10 处理异常\n\n### 问题\n\n如果程序运行时出现问题，你想捕获错误或异常并显示用户友好的错误消息。\n\n\
    ### 解决方案\n\n使用 Python 的 `try/except` 结构。\n\n以下示例（来自配方 7.8）捕获打开文件时的任何问题：\n\n```python\n\
    try:\n    f = open('test.txt')\n    s = f.read()\n    f.close()\nexcept IOError:\n\
    \    print(\"Cannot open the file\")\n```\n\n由于你将可能出错的打开文件命令包装在 `try/except` 结构中，因此发生的任何错误都会在显示错误消息之前被捕获，允许你以自己的方式处理它。在这里，这意味着显示友好消息“Cannot\
    \ open the file”。\n\n### 讨论\n\n除了文件访问期间，运行时异常可能发生的另一个常见情况是，当你访问列表时，使用的索引超出了列表的范围。例如，如果你尝试访问一个三元素列表的第五个（索引\
    \ 4）元素，就会发生这种情况：\n\n```python\n>>> list = [1, 2, 3]\n>>> list[4]\nTraceback (most\
    \ recent call last):\n  File \"<stdin>\", line 1, in <module>\nIndexError: list\
    \ index out of range\n```\n\n错误和异常是分层排列的，你在捕获异常时可以尽可能具体或通用。\n\n`Exception` 类位于该树的顶部附近（最通用），几乎可以捕获任何异常。你也可以为捕获不同类型的异常并以不同方式处理它们设置单独的\
    \ `except` 部分。如果你没有指定任何异常类，所有异常都将被 `except` 命令捕获。\n\nPython 还允许你在错误处理中使用 `else`\
    \ 和 `finally` 子句：\n\n```python\nlist = [1, 2, 3]\ntry:\n    list[8]\nexcept:\n\
    \    print(\"out of range\")\nelse:\n    print(\"in range\")\nfinally:\n    print(\"\
    always do this\")\n```\n\n如果没有异常，`else` 子句将运行，而 `finally` 子句无论是否有异常都会运行。\n\n每当发生异常时，你可以通过使用\
    \ `Exception` 对象获取有关它的更多信息，该对象仅在你使用 `as` 关键字将其放入变量时才可用，如以下示例所示：\n\n```python\n\
    >>> list = [1, 2, 3]\n>>> try:\n...     list[8]\n... except Exception as e:\n\
    ...     print(\"out of range\")\n...     print(e)\n...\nout of range\nlist index\
    \ out of range\n>>>\n```\n\n这使你能够以自己的方式处理错误，同时保留原始错误消息。\n\n另请参阅\n\n有关 Python 异常类层次结构，请参阅\
    \ [Python 官方文档](https://docs.python.org/3/library/exceptions.html)。"
