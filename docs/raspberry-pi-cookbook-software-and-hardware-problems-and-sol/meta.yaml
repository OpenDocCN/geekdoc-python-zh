  md: '# 16.2 Controlling Where Sound Is Output


    # Problem


    You want to control which of several output options the Raspberry Pi will use
    when making sounds.


    # Solution


    The simplest way to set the audio output is to use the selector available when
    you right-click the Speaker icon in the upper-right corner of your desktop (Figure
    16-3).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_473_0.png)


    Note that the entry Comiso M20 in Figure 16-3 is for a Bluetooth speaker that
    has already been paired with the Raspberry Pi (see Recipe 1.17).


    # Discussion


    If you are running your Raspberry Pi headless (without a monitor), you can still
    control where the sound is output using the raspi-config command-line utility.


    Open a Terminal session and enter the following command:


    ```

    $ sudo raspi-config

    ```


    Then select the option System, followed by Audio. You can then select the option
    you want, as shown in Figure 16-4.'
  merge: -1
  pgno: 473
- img_proc: true
  md: '![](img/e36e77524aeaae366529d1cf02f9a39c_474_0.png)


    Figure 16-4. Using raspi-config to change the audio output device


    # See Also


    To learn about connecting a speaker to your Raspberry Pi, see Recipe 16.1.


    For more sound input and output options, you can use the Audio Device Settings
    tool; see Recipe 16.6.


    # 16.3 Playing Audio on a Raspberry Pi Without an Audio Socket


    # Problem


    You want high-quality audio output on a Raspberry Pi without an audio jack, like
    a Pi Zero or Pi 400.


    # Solution


    Attach a Pimoroni Audio DAC Shim as shown in Figure 16-5 to the GPIO connector
    and connect the line out to an audio amplifier. If you are using a Raspberry Pi
    400, you’ll need a GPIO adapter to gain access to the GPIO pins.'
