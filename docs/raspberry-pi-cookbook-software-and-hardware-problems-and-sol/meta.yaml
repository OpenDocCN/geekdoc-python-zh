  - "[PAGE 561]\n\nAs you saw in Recipe 19.2, the Pin class contains the methods that\
    \ you need both to set a pin to be a digital output and to switch it on and off.\
    \ So the following code that you will find as ch_19_blink.py in the pico folder\
    \ should be familiar:\n\n```\nfrom machine import Pin\nfrom utime import sleep\n\
    led = Pin(16, Pin.OUT)\nwhile True:\n    led.on()\n    sleep(0.5) # pause\n  \
    \  led.off()\n    sleep(0.5)\n```\n\nAs with all the program examples in this\
    \ book, you can also download this code (see Recipe 3.22).\n\nIn MicroPython,\
    \ the sleep function is in the utime module rather than the time module used in\
    \ regular Python. However, it does the same job here of pausing for half a second.\n\
    \n# Discussion\n\nThe total current budget for all GPIO pins is 50mA. That is,\
    \ when you add up all the currents used by things connected to the GPIO pins,\
    \ it should not exceed 50mA. LEDs should not be connected to a GPIO pin without\
    \ a series resistor that sets the current that the LEDs will draw. Without such\
    \ a resistor, an LED might draw too much current and destroy the Pico, or at least\
    \ that GPIO pin. Most indicator LEDs are designed to shine at close to their maximum\
    \ brightness at around 15mA. So you could connect three LEDs drawing 15mA (for\
    \ a total of 45mA) and still have a little current budget to spare. However, modern\
    \ high-brightness LEDs work just fine at 5mA and even passably well at 1mA.\n\n\
    The current I, drawn by an LED connected with a series resistor as shown in Figure\
    \ 19-10, is determined by the formula:\n\n$$I = \\frac{3.3 - V_f}{R}$$\n\nWhere\
    \ $V_f$ is the forward voltage of the LED. This depends mostly on the color of\
    \ the LED, with a red LED typically having a $V_f$ of about 2V. $R$ is the value\
    \ of the resistor in $\\Omega$ (ohms).\n\nFor example, if you use a red LED with\
    \ a $V_f$ of 2V and a resistor of 470$\\Omega$, the current will be:\n\n(3.3 -\
    \ 2) / 470 = 0.00276 A = 2.76mA\n\nResistors come in standard values, with common\
    \ ones being 100$\\Omega$, 270$\\Omega$, 470$\\Omega$, and 1k$\\Omega$ (1,000$\\\
    Omega$). To complicate things further, $V_f$ is usually the $V_f$ at 20mA and\
    \ this"
- md: "actually decreases a little at lower currents. Table 19-2 will provide you\
    \ with a useful reference for choosing series resistors without having to do the\
    \ math.\n\nTable 19-2. LED series resistor selector\n\n| LED color | Series resistor\
    \ value | Approximate current |\n| :--- | :--- | :--- |\n| Red (V<sub>f</sub>\
    \ = 1.8) | 100Ω | 15mA |\n| Red (V<sub>f</sub> = 1.8) | 270Ω | 6mA |\n| | 470Ω\
    \ | 3mA |\n| Red, Orange (V<sub>f</sub> = 2.0) | 100Ω | 13mA |\n| | 270Ω | 5mA\
    \ |\n| | 470Ω | 3mA |\n| Yellow, Green (V<sub>f</sub> = 2.2) | 100Ω | 11mA |\n\
    | | 270Ω | 4mA |\n| Blue, White (V<sub>f</sub> = 3.5)<sup>a</sup> | 100Ω | 4mA<sup>a</sup>\
    \ |\n\n<sup>a</sup> Although theoretically a lower supply voltage than forward\
    \ voltage means that you could use the LED without a resistor, this could still\
    \ draw too much current, so say a 100Ω resistor is a good idea even with blue\
    \ and white LEDs.\n\n## See Also\n\nFor more information on connecting an LED\
    \ to GPIO pins, see Recipe 11.1.\nMany online calculators are available for working\
    \ our values of series resistor. This is a good one.\nResistors like the ones\
    \ used here with the breadboard have colored stripes that indicate their resistance\
    \ value.\n\n## 19.5 Using Digital Inputs on a Pico\n\n### Problem\n\nYou want\
    \ to be able to connect a switch, or other digital input, to a Raspberry Pi Pico\
    \ or Pico W.\n\n### Solution\n\nConnect your switch (or other source as a digital\
    \ input) to your Pico and use the Pin class to set the pin to act as an input\
    \ and to read its value.\nLet's start by connecting a switch between one of the\
    \ Pico's GND pins and pin 16. We can do this on a breadboard, as shown in Figure\
    \ 19-11.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_563_0.png)\n\nFigure 19-11.\
    \ Connecting a switch to a Pico\n\nNote that the tactile push switch shown in\
    \ Figure 19-11 is a two-pin version. If your switch has four pins, then it can\
    \ go on the same row, but will need to span the two halves of the breadboard.\n\
    \nThe program `ch_19_digital_input.py` repeatedly reads the digital input of pin\
    \ 16, displaying either 1 or 0, depending on whether the switch is pressed or\
    \ not. Open it in Thonny and try running it:\n\n```\nfrom machine import Pin\n\
    from utime import sleep\n\nswitch = Pin(16, Pin.IN, Pin.PULL_UP)\n\nwhile True:\n\
    \    print(switch.value())\n    sleep(0.1)\n```\n\nAs with all the program examples\
    \ in this book, you can also download this code (see Recipe 3.22).\n\n### Discussion\n\
    \nIn the preceding example, when the variable switch is assigned an instance of\
    \ Pin, the call to create a new instance of Pin has three parameters:\n\n- the\
    \ pin number\n- the direction\n- Pin.PULL_UP\n\nThe last parameter does something\
    \ clever inside the circuitry of the Pico's GPIO pin. It turns on a transistor\
    \ that connects an internal pull-up resistor (Figure 19-12). This resistor, which\
    \ has a value of about 20kΩ, pulls the GPIO pin up to about 3.3V. Without this\
    \ resistor, the GPIO pin would be said to be *floating*. This means that the pin\
    \ will act like an antenna picking up electrical noise, and will flip between\
    \ on and off more or less at random, which is not behavior you want in a switch.\
    \ There is nothing special about GP16—all of the Pico's GPIO pins have this feature.\n\
    \nWhen the switch is pressed, GP16 is connected to GND (0V). This massively overrides\
    \ the week pull-up resistor, taking GP16 from high to low. That is why program\
    \ `ch_19_digital_input.py`, rather counterintuitively, displays a 0 when the switch\
    \ button is pressed and a 1 when it is released.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_565_0.png)\n\
    \nFigure 19-12. Internal pull-up resistors\n\n### See Also\n\nTo connect a switch\
    \ to the GPIO pin of a regular Raspberry Pi, see Recipe 13.1.\n\n## 19.6 Using\
    \ Analog (PWM) Outputs on a Pico\n\n### Problem\n\nYou want to vary the brightness\
    \ of an LED from a Python program on your Pico or Pico W.\n\n### Solution\n\n\
    Use the PWM (pulse-width modulation) capability of the Pico to control the average\
    \ power supplied to the LED.\n\nTo try this out, you can connect an external LED\
    \ to the Pico as described in Recipe 19.4 or, if you prefer, use the Pico's built-in\
    \ LED. If you decide to use the built-in LED, remember to change the pin from\
    \ 16 to 25 in the following example program, which you will find in the file ch_19_pwm.py:\n\
    \n```\nfrom machine import Pin, PWM\nfrom utime import sleep\n\nled = PWM(Pin(16))\n\
    \nwhile True:\n    brightness_str = input(\"brightness (0-65534):\")\n    brightness\
    \ = int(brightness_str)\n    led.duty_u16(brightness)\n```\n\nAs with all the\
    \ program examples in this book, you can also download this code (see Recipe 3.22).\n\
    \nRun the program in Thonny. In the Python console, you will be prompted to enter\
    \ a value of brightness between 0 (off) and 65534 (maximum brightness).\n\n###\
    \ Discussion\n\nPWM provides pulses of varying duration to the LED to control\
    \ its apparent brightness. You will find a proper explanation of this in Recipe\
    \ 11.3.\n\nTo make an output pin into a PWM output pin, you just wrap it in the\
    \ PWM class with PWM(Pin(16)). You can then change the duty cycle of the output\
    \ by calling the rather unfriendly sounding duty_u16 method. The u16 part means\
    \ an unsigned 16-bit number. The maximum value of an unsigned 16-bit number is\
    \ 65535, not 65534, but the Pico’s official documentation states that the maximum\
    \ duty value should be the latter, so that’s what we use here.\n\nIf you have\
    \ used PWM on a regular Raspberry Pi, you may have noticed that the LED brightness\
    \ might change a little. This unreliability is because PWM on a regular Raspberry\
    \ Pi is implemented in software and, every so often, Raspberry Pi OS will stop\
    \ generating pulses for PWM and go off and do other operating system things. The\
    \ great advantage of PWM on a Pico is that the Pico implements PWM in hardware\
    \ dedicated just to generating the pulses and is therefore rock-solid.\n\n###\
    \ See Also\n\nPWM on a regular Raspberry Pi is described in Recipe 11.3.\n\n##\
    \ 19.7 Using Analog Inputs on a Pico\n\n### Problem\n\nYou want to read an analog\
    \ voltage using MicroPython on your Pico or Pico W.\n\n### Solution\n\nConnect\
    \ a voltage source of between 0 and the 3.3V supply to one of the analog-capable\
    \ GPIO pins (26, 27, and 28) and use the Pico’s ADC (analog-to-digital converter)\
    \ to measure the voltage.\n\nTo illustrate this recipe, we’ll use a trimpot (a\
    \ potentiometer or variable resistor) to provide a voltage between 0 and 3.3V\
    \ to pin 26, depending on the position of its knob. Figure 19-13 shows how this\
    \ can be wired-up on a breadboard. Any value of pot between 1kΩ and 100kΩ will\
