    on page 564)

    - Adafruit bicolor LED square-pixel matrix with I2C backpack (see “Modules” on
    page 566)

    - If you are using a Pi 400 as shown in Figure 15-2, you will also need a GPIO
    adapter to be able to access the pins easily.'
