    10\n```\n\n```python\ncount(5)\n```\n\n```\n1\n2\n3\n4\n5\n```\n\n```python\n\
    count(5, 10)\n```\n\n```\n5\n6\n7\n8\n9\n10\n```\n\n如果你想让一些参数有默认值，而另一些没有，那么有默认值的参数必须放在没有默认值的参数之后。也就是说，`count(from_num,\
    \ to_num=10)` 是允许的，但 `count(from_num=1, to_num)` 是不允许的。\n\n所有这些示例都是不返回任何值的函数；它们只是执行某些操作。如果你需要一个函数返回一个值，你需要使用\
    \ `return` 命令。\n\n以下函数接受一个字符串作为参数，并在字符串末尾添加单词 *please*：\n\n```python\ndef make_polite(sentence):\n\
    \    return sentence + \" please\"\n\nprint(make_polite(\"Pass the cheese\"))\n\
    ```\n\n当函数返回一个值时，你可以将结果赋值给一个变量，或者，如本例所示，你可以打印出结果。\n\n## 另请参阅\n\n要从函数返回多个值，请参阅\
    \ [配方 7.3](Recipe 7.3)。\n\n# 第 6 章\nPython 列表和字典\n\n## 6.0 简介\n\n在第 5 章中，我们介绍了\
    \ Python 语言的基础知识。在本章中，我们将介绍两个关键的 Python 数据结构：*列表*和*字典*。\n\n## 6.1 创建列表\n\n###\
    \ 问题\n\n你想使用一个变量来保存一系列值，而不仅仅是一个值。\n\n### 解决方案\n\n使用列表。在 Python 中，列表是按特定顺序存储的值的集合，因此你可以通过位置访问它们。\n\
    \n你通过使用 `[` 和 `]` 字符来包含其初始内容来创建列表：\n\n```python\n>>> a = [34, 'Fred', 12, False,\
    \ 72.3]\n>>>\n```\n\n与 C 等语言中更严格的数组不同，在 Python 中声明列表时不需要指定其大小。你也可以随时更改列表中的元素数量。\n\
    \n### 讨论\n\n如本例所示，列表中的项不需要是相同的类型，尽管它们通常是。事实上，列表的元素本身是列表的情况相当常见。\n\n要创建一个空列表以便稍后添加项目，你可以使用：\n\
    \n```python\n>>> a = []\n>>>\n```\n\n## 6.2 访问列表元素\n\n### 问题\n\n你想查找列表中的单个元素或更改它们。\n\
    \n### 解决方案\n\n使用 `[]` 表示法通过元素在列表中的位置来访问列表元素。例如，要访问列表中位置 1 的元素：\n\n```python\n\
    >>> a = [34, 'Fred', 12, False, 72.3]\n>>> a[1]\n'Fred'\n```\n\n### 讨论\n\n列表位置（索引）从第一个元素开始为\
    \ 0（而不是 1）。\n\n除了使用 `[]` 表示法从列表中读取值外，你还可以使用它来更改特定位置的值，如下所示：\n\n```python\n>>>\
    \ a = [34, 'Fred', 12, False, 72.3]\n>>> a[1] = 777\n>>> a\n[34, 777, 12, False,\
    \ 72.3]\n```\n\n如果你尝试使用过大的索引来更改（或读取）列表的元素，你将得到一个“索引超出范围”错误：\n\n```python\n>>>\
    \ a[50] = 777\nTraceback (most recent call last):\n  File \"<stdin>\", line 1,\
    \ in <module>\nIndexError: list assignment index out of range\n>>>\n```\n\nPython\
    \ 列表的一个方便特性是，你也可以使用负索引从列表的末尾（右侧）开始访问元素。索引位置 -1 是列表的最后一个元素，-2 是倒数第二个，依此类推。例如：\n\
    \n```python\n>>> a = [34, 'Fred', 12, False, 72.3]\n>>> a[-1]\n72.3\n>>> a[-2]\n\
    False\n>>>\n```\n\n## 6.3 查找列表长度\n\n### 问题\n\n你需要知道列表中有多少个元素。\n\n### 解决方案\n\n\
    使用 Python 函数 `len`。\n\n例如：\n\n```python\n>>> a = [34, 'Fred', 12, False, 72.3]\n\
    >>> len(a)\n5\n```\n\n函数 `len` 从 Python 版本 1 就存在了，这与更面向对象、基于类的 Python 版本 2 和 3\
    \ 相当矛盾。对于这些版本，你能写类似这样的东西会更有意义：\n\n```python\n>>> a = [34, 'Fred', 12, False, 72.3]\n\
    >>> a.length() # 此示例将不起作用\n```\n\n但你不能——Python 就是这样。\n\n### 讨论\n\n`len` 命令也适用于字符串（配方\
    \ 5.15）。\n\n## 6.4 向列表添加元素\n\n### 问题\n\n你需要向列表添加一个项目。\n\n### 解决方案\n\n使用 Python\
    \ 函数 `append`、`insert` 或 `extend`。\n\n要向列表末尾添加单个项目，请使用 `append`，如下所示：\n\n```python\n\
    >>> a = [34, 'Fred', 12, False, 72.3]\n>>> a.append(\"new\")\n>>> a\n[34, 'Fred',\
    \ 12, False, 72.3, 'new']\n```\n\n### 讨论\n\n有时你不想将新元素添加到列表末尾，而是想将它们插入到列表中的某个位置。为此，请使用\
    \ `insert` 命令。第一个参数是应插入项目的索引，第二个参数是要插入的项目：\n\n```python\n>>> a.insert(2, \"new2\"\
    )\n>>> a\n[34, 'Fred', 'new2', 12, False, 72.3]\n```\n\n请注意，新插入元素之后的所有元素都向上移动了一个位置。\n\
    \n`append` 和 `insert` 都只向列表添加一个元素。`extend` 函数将一个列表的所有元素添加到另一个列表的末尾：\n\n```python\n\
    >>> a = [34, 'Fred', 12, False, 72.3]\n>>> b = [74, 75]\n>>> a.extend(b)\n>>>\
    \ a\n[34, 'Fred', 12, False, 72.3, 74, 75]\n```\n\n使用 `append` 的替代方法是使用 `+=`，如下例所示：\n\
    \n```python\n>>> a = [34, 'Fred', 12, False, 72.3]\n>>> b = [74, 75]\n>>> a +=\
    \ b\n>>> a\n[34, 'Fred', 12, False, 72.3, 74, 75]\n```\n\n## 6.5 从列表中移除元素\n\n\
    ### 问题\n\n你需要从列表中移除一个项目。\n\n### 解决方案\n\n使用 Python 函数 `pop`。\n\n不带参数的 `pop` 命令移除列表的最后一个元素：\n\
    \n```python\n>>> a = [34, 'Fred', 12, False, 72.3]\n>>> a.pop()\n72.3\n>>> a\n\
    [34, 'Fred', 12, False]\n```\n\n### 讨论\n\n请注意，`pop` 返回从列表中移除的值。\n\n要移除最后一个元素以外位置的项目，请使用带参数的\
    \ `pop`，该参数指示应从中移除项目的位置：\n\n```python\n>>> a = [34, 'Fred', 12, False, 72.3]\n\
    >>> a.pop(0)\n34\n```\n\n如果你使用的索引位置超出了列表的末尾，你将得到一个“索引超出范围”错误。\n\n如果你想通过值而不是列表中的位置来移除列表中的某些内容，你可以使用\
    \ `remove`，如下例所示：\n\n```python\n>>> a = [34, 'Fred', 12, False, 72.3]\n>>> a.remove(12)\n\
    >>> a\n[34, 'Fred', False, 72.3]\n>>>\n```\n\n## 6.6 通过解析字符串创建列表\n\n### 问题\n\n\
    你需要将由某个字符分隔的单词字符串转换为字符串数组，其中数组中的每个字符串都是其中一个单词。\n\n### 解决方案\n\n使用 Python 字符串函数\
    \ `split`。\n\n不带参数的 `split` 命令将字符串的单词分隔为数组的各个元素：\n\n```python\n>>> \"abc def ghi\"\
    .split()\n['abc', 'def', 'ghi']\n```\n\n如果你为 `split` 提供一个参数，它将使用该参数作为分隔符来分割字符串。\n\
    \n例如：\n\n```python\n>>> \"abc--de--ghi\".split('--')\n['abc', 'de', 'ghi']\n```"
