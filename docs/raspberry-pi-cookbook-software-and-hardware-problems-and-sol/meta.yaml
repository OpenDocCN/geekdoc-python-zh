    \ Detection\n\n# Problem\n\nYou want to use a camera connected to your Raspberry\
    \ Pi to detect something moving in its field of view.\n\n# Solution\n\nUse OpenCV\
    \ and NumPy to detect changes between successive frames from the camera.\n\nThe\
    \ program that follows compares each captured image with the previous image. It\
    \ then uses NumPy (a numeric library for Python) to calculate how different the\
    \ two images are. If this measure of difference exceeds a threshold, it prints\
    \ out a message saying that movement was detected.\n\nYou can find the code for\
    \ this example, as well as for the other examples in this recipe, with the downloads\
    \ for the book (see Recipe 3.22). The program is called ch_08_detect_motion.py.\n\
    \nAttach your USB webcam or Raspberry Pi camera and then run the program. Try\
    \ moving your hand in front of the field of view, and you should see a message\
    \ that says “Movement detected”:\n\n```\nimport cv2\nimport numpy as np\nfrom\
    \ imutils.video import VideoStream\nfrom imutils import resize\n\ndiff_threshold\
    \ = 1000000\n\nvs = VideoStream(src=0).start()\n\ndef getImage():\n    im = vs.read()\n\
    \    im = cv2.cvtColor(im, cv2.COLOR_BGR2GRAY)\n    im = cv2.blur(im, (20, 20))\n\
    \    return im\n\nold_image = getImage()\n\nwhile True:\n    new_image = getImage()\n\
    \    diff = cv2.absdiff(old_image, new_image)\n```"
