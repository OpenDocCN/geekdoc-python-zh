    \ from a Pico\n\n### Problem\n\nYou want to control servomotors using your Pico\
    \ or Pico W.\n\n### Solution\n\nConnect power to the servomotor from the Pico’s\
    \ 5V supply and connect one of the GPIO pins to the servomotor’s control pin.\
    \ Then use the PWM class to generate pulses to set the servomotor’s angle.\n\n\
    Connect the servomotor using male-to-male jumper wires as shown in Figure 19-14.\
    \ Servomotors have different color schemes used to identify the leads.\n\nIn Figure\
    \ 19-14, black is ground, red is 5V, and yellow is the control pin. Another typical\
    \ color scheme is brown for ground, red for 5V, and orange for the control wire.\
    \ Check the datasheet for your servomotor to find the right pins.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_570_0.png)\n\
    \nOpen ch_19_servo.py in Thonny and run it. The shell will prompt you to enter\
    \ an angle between 0 and 180 (Figure 19-15). When you press Enter, the servomotor’s\
    \ arm should move to the new position.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_570_1.png)\n\
    \n### Discussion\n\nThe code listing for *ch_19_servo.py* is:\n\n```\nfrom machine\
    \ import Pin, PWM\nfrom utime import sleep\n\nservo = PWM(Pin(16))\nservo.freq(50)\
    \ # pulse every 20ms\n\ndef set_angle(angle, min_pulse_us=500, max_pulse_us=2500):\n\
    \    us_per_degree = (max_pulse_us - min_pulse_us) / 180\n    pulse_us = us_per_degree\
    \ * angle + min_pulse_us\n    # duty 0 to 1023. At 50Hz, each duty_point is 20000/65535\
    \ = 0.305\n    # us/duty_point\n    duty = int(pulse_us / 0.305)\n    # print(\"\
    angle=\" + str(angle) + \" pulse_us=\" + str(pulse_us) + \" duty=\"\n    #   \
    \  + str(duty))\n    # print(angle)\n    servo.duty_u16(duty)\n\nangle = 90\n\
    set_angle(90)\nmin_angle = 10\nmax_angle = 160\n\nwhile True:\n    angle_str =\
    \ input(\"Enter angle 0 to 180:\")\n    angle = int(angle_str)\n    if (angle\
    \ >= 0 and angle <=180):\n        set_angle(angle)\n```\n\nAs with all the program\
    \ examples in this book, you can also download this code (see [Recipe 3.22](Recipe\
    \ 3.22)).\n\nServomotors are controlled by changing the duration of pulses on\
    \ a control connection of the servo. You might need to read through the Discussion\
    \ of [Recipe 12.1](Recipe 12.1), which explains how servomotors work.\n\nThe default\
    \ PWM frequency is too high for servomotors, which expect a new pulse every 20\
    \ milliseconds (50 times a second), so after specifying PWM on pin 16, the PWM\
    \ frequency is then set to 50 Hz using `servo.freq(50)`.\n\nAll the code for calculating\
    \ the PWM duty is contained in the function `set_angle`. As you would expect,\
    \ this takes a parameter of the angle itself, but also two optional parameters,\
    \ `min_pulse_us` and `max_pulse_us`, that set the minimum and maximum pulse lengths\
    \ in microseconds (hence `_us`). These can be tweaked to match your servomotor\
    \ to either give it maximum angular range or to prevent judder at either end of\
    \ its travel. This kind of juddering can occur if the pulses are too short or\
    \ too long.\n\nThe set_angle function first finds the number of microseconds per\
    \ degree from the range of pulse lengths. It then calculates the length of the\
    \ pulse needed in microseconds and finally converts this into a value of duty.\n\
    \nUsing a Pico to control a servo works a lot better than using a regular Raspberry\
    \ Pi. The precise timing of the Pico's PWM output means that you shouldn't see\
    \ any twitchiness.\n\n### See Also\n\nFor controlling servomotors on a regular\
    \ Raspberry Pi, and more about servomotors in general, see Recipe 12.1.\n\n##\
    \ 19.9 Using the Pico and Pico W's Filesystem\n\n### Problem\n\nYou want to store\
    \ and retrieve data from the Pico's filesystem.\n\n### Solution\n\nUse the MicroPython's\
    \ file commands to read, write, and create files that are stored on the Pico and\
    \ can be copied over to your Raspberry Pi.\n\nAs an example, the code in ch_19_temp_logger.py\
    \ will read the RP2040's temperature in degrees C and log it to a file every 10\
    \ seconds.\n\nWhen you run the program, a new temperature reading appears in the\
    \ Shell. When you have recorded enough, press the Stop button or press Ctrl-C\
    \ to finish the logging, close the file, and exit the program.\n\nTo see the file\
    \ that has been written (temp_reading.txt), you need to go to the View menu of\
    \ Thonny and select Files (Figure 19-16). This will open a column on the left\
    \ of the Thonny window listing any files on the Pico. You can double-click on\
    \ temp_readings.txt to open it in the Thonny editor, where you could, if you wanted,\
    \ edit the file and then save it back to the Pico. You can also transfer the file\
    \ to your Raspberry Pi by right-clicking on the filename on the left and selecting\
    \ the pop-up menu option “Download to /home/pi.”\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_573_0.png)\n\
    \nFigure 19-16. Browsing the Pico's filesystem\n\n### Discussion\n\nThe code for\
    \ the data logger program (*ch_19_temp_logger.py*) is:\n\n```\nfrom machine import\
    \ Pin, ADC\nfrom utime import sleep\n\nlog_file = 'temp_readings.txt'\ntemp_sensor\
    \ = ADC(4)\npoints_per_volt = 3.3 / 65535\n\ndef read_temp_c():\n    reading =\
    \ temp_sensor.read_u16() * points_per_volt\n    temp_c = 27 - (reading - 0.706)/0.001721\n\
    \    return temp_c\n\ndef log_data(reading):\n    print(temp_c)\n    file.write(str(reading)+'\\\
    n')\n\nfile = open(log_file, \"w\")\ntry:\n    while True:\n        temp_c = read_temp_c()\n\
    \        log_data(temp_c)\n        sleep(10)\nexcept:\n    print('Logging Ended')\n\
    \    file.close()\n```\n\nAs with all the program examples in this book, you can\
    \ also download this code (see Recipe 3.22). This example is built around the\
    \ code used in the Discussion of Recipe 19.7, with added code to write the temperature\
    \ readings to a file.\n\nYou don't have to import any modules to use the filesystem;\
    \ it's part of MicroPython and is essentially a cut-down version of the Python\
    \ 3 filesystem described in Chapter 7. The file is opened for writing using the\
    \ command open, which takes the filename as its first parameter and the mode (w\
    \ for write) as its second. This will replace any existing file with the same\
    \ name.\n\nThe log_data function prints out the supplied reading and then appends\
    \ it to the file after converting it to a string and adding the newline (\\n)\
    \ character to the end.\n\nThe main while loop is surrounded by a try/ except\
    \ so that when you do Ctrl-C in the Shell, this will be caught and the file closed.\n\
    \nWhen it comes to reading a file, you need to open the file in read (r) mode,\
    \ and then you can read the contents of the file as a string using the read function.\
    \ You can find an example of this in the program ch_19_file_read.py. This program\
    \ will just print out the contents of a file in the Shell:\n\n```\nf = open(\"\
    temp_readings.txt\", \"r\")\nprint(f.read())\nf.close()\n```\n\nThe capacity of\
    \ the filesystem of the Pico is limited to just 1.6 MB, so you are not going to\
    \ be storing video on it, or even any large sound samples. The other aspect of\
    \ the filesystem to be aware of is that if you have to reinstall your Pico's firmware\
    \ as you did in Recipe 19.1, you will lose the contents of the filesystem.\n\n\
    ### See Also\n\nFor writing to a file with a regular Raspberry Pi, see Recipe\
    \ 7.7, and for reading from a file, see Recipe 7.8.\n\n## 19.10 Making Use of\
    \ the Second Core\n\n### Problem\n\nYou want to use the Pico or Pico W's second\
    \ core (processor) to do more than one thing at a time."
