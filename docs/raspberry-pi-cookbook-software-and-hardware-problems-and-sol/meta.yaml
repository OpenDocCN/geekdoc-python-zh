    如果你有多个Sonoff开关连接到家中各处的电器，一个注入节点可以通过扇出消息来关闭所有开关，如图18-32所示。


    ### 参阅


    更多信息可在完整的Node-RED文档中找到。


    ## 18.9 从Wemos D1发布MQTT消息


    ### 问题


    你希望能够使用低成本的可编程WiFi板发布MQTT消息，也许是响应按钮按下。


    ### 解决方案


    使用基于ESP8266的低成本板，如Wemos D1，并配备定制软件。图18-33显示了一个Wemos D1，其一个GPIO引脚上连接了一个Squid Button，由USB移动电源供电。


    当按钮被按下时，一条消息将发布到MQTT服务器。


    要制作此配方，你需要以下物品：


    - 一个Wemos D1 mini（参见第566页“模块”）

    - 一个Raspberry Squid Button（参见第566页“模块”）

    - 一个USB移动电源或其他为Wemos D1供电的方式


    要能够从你的树莓派对Wemos D1进行编程，你需要首先安装Arduino集成开发环境（IDE）。然后你需要添加对ESP8266的支持。


    将Squid Button或其他开关连接在名为D6的Wemos引脚和GND之间。


    在使用*sketch*（Arduino程序的名称）之前，你需要将MQTT库安装到Arduino IDE中，因此使用以下命令将库作为ZIP文件下载：


    ```

    $ cd ~

    $ wget https://github.com/knolleary/pubsubclient/archive/master.zip

    ```


    接下来，打开Arduino IDE。从Sketch菜单中，选择Include Library，然后选择Add ZIP Library。导航到你刚刚下载的文件*master.zip*，库将被安装。'
