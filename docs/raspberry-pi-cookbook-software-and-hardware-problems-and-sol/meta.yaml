  md: '# CHAPTER 5

    Python Basics


    # 5.0 Introduction


    Although many languages can be used to program the Raspberry Pi, Python is the
    most popular. In fact, the “Pi” in Raspberry Pi is inspired by the word “python.”


    In this chapter, you’ll find a host of recipes to help you start programming with
    Raspberry Pi.


    # 5.1 Deciding Between Python 2 and Python 3


    # Problem


    You need to use Python but are unsure which version to use.


    # Solution


    Use Python 3 until you face a problem that is best solved by reverting to version
    2.


    To install Python 2 on Raspberry Pi OS, run the following commands:


    ```

    $ sudo apt update

    $ sudo apt install python2

    ```


    You can then run Python 2 using the command python2.


    # Discussion


    Although Python’s most recent version, Python 3, has been around for years, you’ll
    find that a lot of people still use Python 2. Python 3 (the default for Raspberry
    Pi OS) is run by using either of the commands python or python3. The examples
    in this'
  merge: -1
  pgno: 160
- img_proc: true
  md: 'book are written for Python 3 unless otherwise stated. Most will run on both
    Python 2 and Python 3 without modification.


    This reluctance on the part of the Python community to ditch the older version
    is largely because Python 3 introduced some changes that broke compatibility with
    version 2. As a result, some of the huge body of third-party libraries developed
    for Python 2 won''t work under Python 3.


    My strategy is to write in Python 3 whenever possible, reverting Python 2 only
    when I need to because of compatibility problems.


    # See Also


    For a good summary of the Python 2 versus Python 3 debate, see the [Python wiki](https://wiki.python.org/moin/Python2orPython3).


    # 5.2 Choosing a Python Editor


    # Problem


    Many options are available when it comes to Python editors, and you want to know
    which one you should start with.


    # Solution


    Most people will start with either Thonny (Recipe 5.3) or Mu (Recipe 5.4). Both
    are good editors and both are easy to use.


    Thonny is pre-installed with Raspberry Pi OS, whereas Mu has to be installed.
    You will find lots of resources for both editors, and Thonny is recommended over
    Mu in most material from the Raspberry Pi Foundation.


    # Discussion


    It doesn''t matter too much which editor you start with. You might like to try
    out both Thonny and Mu and see which you like best.


    As you get more advanced in your programming experience, you should try VS Code
    (Recipe 4.10) as a more professional tool.


    # See Also


    VS Code is described in Recipe 4.10 and Thonny in Recipe 5.3.'
  merge: -1
