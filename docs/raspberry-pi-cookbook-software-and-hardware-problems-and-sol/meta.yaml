  - '[PAGE 45]


    # # 1.10 Connecting a DVI or VGA Monitor


    # ## Problem


    Your monitor does not have an HDMI connector, but you want to use it with your
    Raspberry Pi.


    # ## Solution


    Many people have been caught out by this problem. Fortunately, it is possible
    to buy adapters for monitors with a DVI or VGA input, but no HDMI connectors.


    DVI adapters are the simplest and cheapest. They are available for less than $5
    if you search for “HDMI male to DVI female converter.”


    # ## Discussion


    Using VGA adapters is more complex because they require some electronics to convert
    the signal from digital to analog, so beware of leads that do not contain these.
    The official converter is called Pi-View and is available wherever the Raspberry
    Pi is sold. Pi-View has the advantage of having been tested and found to work
    with Raspberry Pi. You can find cheaper alternatives on the internet, but often
    these won’t work.


    However, given that new monitors all have HDMI connectors, you are probably better
    off spending your money on a new monitor rather than an adapter.


    # ## See Also


    eLinux has [tips on what to look for in a converter](http://elinux.org/).


    # # 1.11 Using a Composite Video Monitor/TV


    # ## Problem


    The text on your low-resolution composite monitor is illegible.


    # ## Solution


    You need to adjust the resolution of the Raspberry Pi for a small screen.


    The Raspberry Pi has two types of video output: (1) HDMI, and (2) composite video
    from the audio jack, for which you need a special lead. Of these, the HDMI is
    by far the better-quality option. If you’re intending to use a composite video
    as your main screen, you might want to think again.'
  - '[PAGE 46]


    If you are using a composite video screen—say, because you need a really small
    screen—you need to make a few adjustments to fit the video output to the screen.
    You need to make some changes to the file /boot/config.txt.


    You can edit this file on your Mac or PC by inserting the SD card back into an
    SD card reader, or you can edit it on the Raspberry Pi without having to remove
    the card. Editing files on the Raspberry Pi itself is normally done using the
    nano editor. This is a little tricky, and I suggest you read Recipe 3.7 thoroughly
    before you try editing your first file. If you are happy to go ahead and edit
    the file using nano, enter the following command in a Terminal session:


    ```

    $ sudo nano /boot/config.txt

    ```


    Note that to save and exit nano, press Ctrl-X, then press Y (to confirm), and
    then press Enter.


    > ## The Terminal


    If you are a Mac or Windows user, you may not be familiar with the idea of a Terminal
    or command line. Raspberry Pi OS is based on Linux, and although most things can
    be done in Linux by point and click, sometimes a need still exists to run commands
    when installing software or configuring the operating system in some way. To get
    an overview of using the Terminal, skip ahead to Recipe 3.3.


    If the text is too small to read, it''s best to remove the SD card from the Raspberry
    Pi and insert it into your computer. The file will then be in the top-level directory
    on the SD card, and you can use a text editor on your PC (such as Notepad++) to
    modify it.


    You need to know the resolution of your screen. For a lot of small screens, this
    will be 320 x 240 pixels. Find the two lines in the file that read as follows:


    ```

    #framebuffer_width=1280

    #framebuffer_height=720

    ```


    Remove the # from the beginning of each line and change the two numbers to the
    width and height of your screen. Removing the # enables the line. In the following
    example, the screen size has been modified to be 320 by 240:


    ```

    framebuffer_width=320

    framebuffer_height=240

    ```


    Save the file and restart your Raspberry Pi. You should find that everything has
    become a lot easier to read. You''ll probably also find that there is a big, thick
    border around the screen. To adjust this, see Recipe 1.12.'
  - '[PAGE 47]


    # Discussion


    Many low-cost CCTV monitors that can make a great companion for the Raspberry
    Pi are available when you’re making something like a retro game console (Recipe
    4.4). However, these monitors are often very low resolution.


    # See Also


    For another tutorial on using composite monitors, see [this Adafruit tutorial](https://www.adafruit.com/).


    Also, see Recipes 1.10 and 1.12 to adjust your picture when you’re using the HDMI
    video output.


    # 1.12 Adjusting the Picture Size on Your Monitor


    # Problem


    When you first connect a Raspberry Pi to a monitor, you might find that you can’t
    read some of the text because it extends off the screen, or that the picture isn’t
    using all the space available on the screen.


    # Solution


    If your problem is that a large black border is around the picture, you can make
    the screen fill the whole area of the monitor using the Raspberry Pi’s desktop
    Configuration tool (see Figure 1-19). To open this, go to the Raspberry Menu,
    select Preferences, click Raspberry Pi Configuration, and select the Display tab.


    Click the toggle switch next to Underscan. Note that the change will not take
    effect until you have clicked OK and then rebooted your Raspberry Pi.


    If you have the opposite problem and your text extends off the edges of the screen,
    the solution is the same: click the toggle switch for Underscan.'
