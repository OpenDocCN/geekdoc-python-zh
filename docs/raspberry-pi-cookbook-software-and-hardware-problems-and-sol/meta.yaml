  - '[PAGE 583]


    ![](img/e36e77524aeaae366529d1cf02f9a39c_583_0.png)


    Figure 19-23. Powering a Pico with a pair of AA batteries


    # Discussion


    The Pico is pretty easy to power from batteries by virtue of its buck/boost voltage
    regulator. This takes an input voltage to pin Vsys (marked Vs on the MonkMakes
    Breadboard for Pico) that can be anything from 1.8V to 5.5V and converts that
    voltage to the 3.3V that the RP2040 needs.


    A Raspberry Pi 4 can use several amps of current, making it poorly suited for
    low-power battery applications. In contrast, the Pico uses only about 25mA. An
    AA battery can typically hold at least 2,000mAh, which means that a pair of AA
    batteries could last for 80 hours or more.


    Some of the Pico-compatible boards, such as Adafruit’s Feather RP2040 and Pimoroni’s
    PicoLiPo, allow a 3.7V rechargeable LiPo battery to be attached. This will charge
    while the board is connected to USB, and then provide power to the Pico when you
    unplug it.


    # See Also


    Find out more about the [Feather RP2040](https://www.adafruit.com/product/5423)
    and the [PicoLiPo](https://shop.pimoroni.com/products/pico-lipo).'
