    | 1 | 0 | 0 |\n\n前面列出的Python程序在函数`get_encoder_turn`中实现了确定旋转方向的算法。如果没有移动，该函数将返回0；顺时针旋转返回1；逆时针旋转返回-1。它使用两个全局变量`old_a`和`old_b`来存储开关A和B的先前状态。通过将它们与新读取的值进行比较，它可以确定（使用一些巧妙的逻辑）编码器正在向哪个方向转动。\n\
    \n一毫秒的睡眠时间是为了确保下一个新采样不会在上一个采样后太快发生；否则，转换可能会给出错误的读数。\n\n无论你旋转旋转编码器旋钮的速度有多快，测试程序都应该可靠地工作；但是，尽量避免在循环中执行任何耗时的操作，否则你可能会发现旋转步骤被遗漏。\n\
