    \ Python 模块（事实上，许多 Python 模块包含类），因为它收集了一组函数。然而，类形式化了这种结构，坚持类必须以某种方式创建，并且所有与类相关的方法和变量都捆绑到该类中。类也可以安排成层次结构，其中更具体的类可以从更通用的类继承方法，从而更容易编写不会在程序中多个地方重复的代码。\n\
