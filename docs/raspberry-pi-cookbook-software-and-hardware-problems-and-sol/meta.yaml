    \ ULN2803. Note that you can use the chip to drive two such motors. To drive a\
    \ second stepper motor, you need to connect four more control pins from the GPIO\
    \ connector to pins 5 to 8 of the ULN2803, and then you connect the second motor’s\
    \ four pins to pins 11 to 14 of the ULN2803.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_355_0.png)\n\
    \nFigure 12-12. Using a ULN2803 to control a unipolar stepper motor\n\nThe 5V\
    \ supply from the GPIO connector can work acceptably with a small stepper motor.\
    \ If you experience problems with the Raspberry Pi crashing or need to use a bigger\
    \ stepper motor, use a separate supply for the power to the motor (pin 10 of the\
    \ ULN2803).\n\nOpen an editor and paste in the following code (*ch_12_stepper.py*).\
    \ This program uses the command line, so you can run it from SSH:\n\n```python\n\
    from gpiozero import Motor\nimport time\n\ncoil1 = Motor(forward=18, backward=23,\
    \ pwm=False)\ncoil2 = Motor(forward=24, backward=17, pwm=False)\n\nforward_seq\
    \ = ['FF', 'BF', 'BB', 'FB']\nreverse_seq = list(forward_seq) # to copy the list\n\
    reverse_seq.reverse()\n\ndef forward(delay, steps):\n    for i in range(steps):\n\
    \        for step in forward_seq:\n            set_step(step)\n            time.sleep(delay)\n\
    \ndef backwards(delay, steps):\n    for i in range(steps):\n        for step in\
    \ reverse_seq:\n            set_step(step)\n            time.sleep(delay)\n\n\
    def set_step(step):\n    if step == 'S':\n        coil1.stop()\n        coil2.stop()\n\
    \    else:\n        if step[0] == 'F':\n            coil1.forward()\n        else:\n\
    \            coil1.backward()\n        if step[1] == 'F':\n            coil2.forward()\n\
    \        else:\n            coil2.backward()\n\nwhile True:\n    set_step('S')\n\
    \    delay = input(\"Delay between steps (milliseconds)?\")\n    steps = input(\"\
    How many steps forward? \")\n    forward(int(delay) / 1000.0, int(steps))\n  \
    \  set_step('S')\n    steps = input(\"How many steps backwards? \")\n    backwards(int(delay)\
    \ / 1000.0, int(steps))\n```\n\nAs with all the program examples in this book,\
    \ you can also download this code (see Recipe 3.22).\n\nWhen you run the program,\
    \ you are prompted for a delay between steps. This should be 2 or more. You are\
    \ then prompted for the number of steps in each direction:\n\n```\n$ python3 ch_12_stepper.py\n\
    Delay between steps (milliseconds)?2\nHow many steps forward? 100\nHow many steps\
    \ backwards? 100\nDelay between steps (milliseconds)?10\nHow many steps forward?\
    \ 50\nHow many steps backwards? 50\nDelay between steps (milliseconds)?\n```\n\
    \nThis code is explained in the Discussion section that follows, because it helps\
    \ to know a bit more about how stepper motors work to follow the code.\n\n###\
    \ Discussion\n\nStepper motors use a cogged rotor with alternating north and south\
    \ poles and electromagnets to nudge the wheel around a *step* at a time (Figure\
    \ 12-13). Note that the colors of the leads will vary.\n\nEnergizing the coils\
    \ in a certain order drives the motor around. The number of steps that the stepper\
    \ motor has in a 360-degree rotation is actually the number of teeth on the rotor.\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_357_0.png)\n\nFigure 12-13. A stepper\
    \ motor\n\nThe two coils are each controlled by an instance of the gpiozero class\
    \ Motor and are called coil1 and coil2.\n\nThe program uses a list of strings\
    \ to represent each of the four energization stages that make up a single step:\n\
    \n```python\nforward_seq = ['FF', 'BF', 'BB', 'FB']\n```\n\nEach pair of letters\
    \ indicates the current direction for coil1 and coil2: either forward or backward.\
    \ So, looking for a moment at Figure 12-13 and assuming that the common Red connection\
    \ is to GND, the letter F for the Pink-Orange coil might make Pink high and Orange\
    \ low, whereas B would reverse this.\n\nThe sequence for rotating the motor in\
    \ the opposite direction is just the reverse of the sequence for moving forward.\n\
    \nYou can use the forward and backward functions in your programs to step the\
    \ motor back and forth. The first argument to either function is the delay in\
    \ milliseconds between each part of the step sequence. The minimum value for this\
    \ depends on the motor you use. If it's too small, the motor will not turn. Typically,\
    \ two milliseconds or more will be fine. The second parameter is the number of\
    \ steps to take:\n\n```python\ndef forward(delay, steps):\n    for i in range(steps):\n\
    \        for step in forward_seq:\n            set_step(step)\n            time.sleep(delay)\n\
    ```\n\nThe forward function has two nested for loops. The outer loop repeats for\
    \ the number of steps, and the inner one iterates over the sequence of motor activations,\
    \ calling set_step for each in sequence:\n\n```python\ndef set_step(step):\n \
    \   if step == 'S':\n        coil1.stop()\n        coil2.stop()\n    else:\n \
    \       if step[0] == 'F':\n            coil1.forward()\n        else:\n     \
    \       coil1.backward()\n        if step[1] == 'F':\n            coil2.forward()\n\
    \        else:\n            coil2.backward()\n```\n\nThe set_step function sets\
    \ each coil's polarity, depending on the message supplied as its step argument.\
    \ The command S stops the power to both coils so that we can avoid using current\
    \ when the motor isn't moving. If the first letter is an F, then coil1 is set\
    \ to forward; otherwise it is set to backward. coil2 is set in the same way but\
    \ using the second letter of step.\n\nThe main loop sets the step to S between\
    \ moving forward and backward, to deactivate both coils when the motor is not\
    \ actually turning. Otherwise, one of the coils might be left on, causing the\
    \ motor to unnecessarily draw current.\n\n## See Also\n\nIf you have a four-wire\
    \ bipolar stepper motor, see Recipe 12.7.\n\nFor more information, see the Wikipedia\
    \ article on stepper motors, where you will also see the different types and how\
    \ they work, as well as find a nice, animated explanation of the activation pattern\
    \ for driving the motor.\n\nFor information on using servomotors, see Recipe 12.1;\
    \ for information on controlling DC motors, see Recipes 12.4 and 12.5.\n\nFor\
    \ more information on using a breadboard and jumper wires with the Raspberry Pi,\
    \ see Recipe 10.9.\n\n## 12.7 Using a Bipolar Stepper Motor\n\n### Problem\n\n\
    You want to drive a four-lead bipolar stepper motor using a Raspberry Pi.\n\n\
    ### Solution\n\nUse an L293D H-bridge driver chip. An H-bridge is required to\
    \ drive a bipolar stepper motor because, as the word *bipolar* suggests, the direction\
    \ of current across the windings needs to be reversed, rather like driving a DC\
    \ motor in both directions (see Recipe 12.5).\n\nTo make this recipe, you’ll need\
    \ the following:\n\n- 12V, four-pin bipolar stepper motor (see “Miscellaneous”\
    \ on page 567)\n- L293D H-bridge IC (see “Integrated Circuits” on page 565)\n\
    - Breadboard and jumper wires (see “Prototyping Equipment and Kits” on page 564)\n\
    \nThe motor used here, a 12V one, is somewhat larger than the unipolar stepper\
    \ motor example in Recipe 12.6. The power for the motor itself is therefore supplied\
    \ from an external power supply rather than from the Raspberry Pi. See the wiring\
    \ diagram in Figure 12-14.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_359_0.png)"
  mdcn: "## 另请参阅\n\n你也可以使用 Adafruit 步进电机 HAT（配方 12.8）来控制直流电机的速度和方向。\n\n请查阅 L293D 数据手册和\
    \ SparkFun 电机驱动模块产品页面。\n\n有关在 Raspberry Pi 上使用面包板和跳线的更多信息，请参阅配方 10.9。\n\n## 12.6\
    \ 使用单极步进电机\n\n### 问题\n\n你想使用 Raspberry Pi 驱动一个五线单极步进电机。\n\n### 解决方案\n\n在面包板上使用\
    \ ULN2803 达林顿驱动芯片。\n\n步进电机在电机技术领域介于直流电机和伺服电机之间。像普通的直流电机一样，它们可以连续旋转，但你也可以通过一次一步地向任一方向移动来非常精确地定位它们。\n\
