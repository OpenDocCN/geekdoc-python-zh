  md: '# Discussion


    Changing the name of your Pi can be very useful, especially if you have more than
    one Pi connected to your network.


    # See Also


    See [Recipe 2.3](Recipe 2.3) to change the IP address of your Raspberry Pi.


    # 2.5 Setting Up a Wireless Connection


    # Problem


    You want to connect your Raspberry Pi to the internet using WiFi.


    # Solution


    There are various methods of setting up a WiFi connection with your Raspberry
    Pi.


    # Setting up WiFi from the desktop


    Setting up WiFi in the latest Raspberry Pi OS is really easy. In the upper-right
    corner of your screen, click the network icon (the two computers). You are then
    presented with a list of WiFi networks. Select your network; a prompt appears
    in which you can enter your pre-shared key (password). Enter your password. After
    a while, the network icon will switch to the standard WiFi symbol, and you’ll
    be connected ([Figure 2-7](Figure 2-7)).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_71_0.png)


    Figure 2-7. Connecting to a WiFi network


    # Setting up WiFi using the command line


    This method of setting up WiFi is great if you are setting up your Raspberry Pi
    so that, after you configure it, you can use it without keyboard and monitor attached.
    However, you’ll need to temporarily have network access to the Raspberry Pi by
    connecting it to your router using an Ethernet cable ([Recipe 2.1](Recipe 2.1)).'
  merge: -1
  pgno: 71
- img_proc: true
  md: 'Run the following command to start the raspi-config utility:


    ```

    $ sudo raspi-config

    ```


    Then, from the menu that opens, select System Options (use the arrow keys and
    press Enter) and then select Wireless LAN (Figure 2-8).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_72_0.png)


    Figure 2-8. Setting up WiFi using raspi-config


    A prompt appears, asking for the SSID (WiFi name) and password.


    # Discussion


    WiFi uses quite a lot of power, so if you find your Pi rebooting unexpectedly
    or not booting properly, you might need to use a larger power supply for it. Look
