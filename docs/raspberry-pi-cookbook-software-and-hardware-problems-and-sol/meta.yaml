  - '[PAGE 342]


    When defining the servo, the first parameter (18 in this case) specifies the control
    pin for the servomotor. The optional parameters of `min_pulse_width` and `max_pulse_width`
    set the minimum and maximum pulse lengths in seconds. For a typical servo, these
    values should be 0.5 milliseconds and 2.5 milliseconds. For some reason, the default
    values in gpiozero are 1 and 2 milliseconds; thus the servomotor has a very restricted
    range unless you set these values as we have here.


    # Discussion


    Servomotors are used in remote control vehicles and robotics. Most servomotors
    are not *continuous*; that is, they cannot rotate all the way around but rather
    can rotate only over an angle range of about 180 degrees.


    The position of the servomotor is set by the length of a pulse. The servo expects
    to receive a pulse at least every 20 milliseconds. If that pulse is high for 0.5
    milliseconds, the servo angle will be -90 degrees; if it''s high for 1.5 milliseconds,
    the motor will be at its center position (0 degrees); and if the pulse is high
    for 2.5 milliseconds, the servo angle will be 90 degrees (Figure 12-5).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_342_0.png)


    If you have a few servomotors to connect, the MonkMakes Servo Six board (Figure
    12-6) makes the wiring easier.'
