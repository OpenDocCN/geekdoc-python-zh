- img_proc: true
  md: '```

    app = App(width=100, height=150)

    start_button = PushButton(app, command=start, text="On")

    start_button.text_size = 30

    stop_button = PushButton(app, command=stop, text="Off", enabled=False)

    stop_button.text_size = 30

