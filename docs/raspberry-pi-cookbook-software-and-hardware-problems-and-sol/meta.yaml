    \ LED矩阵显示屏（配方15.3）。\n\n## 14.13 使用数字传感器测量温度\n\n### 问题\n\n你想使用精确的数字传感器来测量温度。\n\n\
    ### 解决方案\n\n使用DS18B20数字温度传感器。该设备比配方14.10中使用的TMP36更精确，并且使用数字接口，因此不需要ADC芯片。\n\n\
