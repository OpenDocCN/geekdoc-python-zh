    \n```\n$ git clone https://github.com/simonmonk/pi_analog.git\n$ cd pi_analog\n\
    $ sudo python3 setup.py install\n```\n\nOpen an editor and paste in the following\
    \ code (ch_14_resistance_meter.py):\n\n```\nfrom PiAnalog import *\nimport time\n\
    \np = PiAnalog()\n\nwhile True:\n    print(p.read_resistance())\n    time.sleep(1)\n\
    ```\n\nAs with all the program examples in this book, you can also download this\
    \ program (see Recipe 3.22)."
