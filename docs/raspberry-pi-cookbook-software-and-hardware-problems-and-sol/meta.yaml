    # 19.12 Using Pico-Compatible Boards


    # Problem


    You''d like to make use of one of the many Pico-compatible boards.


    # Solution


    One purpose of the Raspberry Pi Pico is to show off the features of the RP2040
    processor that it uses. Many other boards use the RP2040 and can be programmed
    in MicroPython using Thonny in just the same way.

    Table 19-3 lists a selection of interesting RP2040 boards available at the time
    of writing. An internet search will, I''m sure, reveal other RP2040 boards.


    Table 19-3. RP2040 boards


    | Name | Manufacturer | Notes |

    |---|---|---|

    | QTPy RP2040 | Adafruit | A tiny board, with reduced number of I/O pins and a
    USB-C connector. |

    | Feather RP2040 | Adafruit | In Adafruit''s Feather format, a Pico with added
    LiPo battery charger and USB-C connector. Also available in pink. |

    | PicoLiPo | Pimoroni | Very similar spec to the Feather RP2040. |

    | Badger | Pimoroni | Minimal pins, but 5 push buttons and a large E Ink display.
    |


    # Discussion


    The Pimoroni Badger is one of the most interesting RP2040 boards. It can be used
    as an ID badge, displaying graphics and text on its E Ink display, which will
    still display even when the power goes off. But it also has the full processing
    power of the Pico available for you to use in MicroPython.

    The Badger comes with a MicroPython image installed and running an example program.
    To interact with it or put your own programs on it, connect it to your Raspberry
    Pi using a USB-C lead (not the micro USB of the Pico), and you can then interact
    with it as if it were a Pico.

    To make it easy to access the E Ink display, Pimoroni has included a Python module
    to draw graphics and text on the E Ink display.

    The example program in ch_19_badger.py, and shown in Figure 19-22, uses the RP2040''s
    temperature sensor to display a rudimentary thermometer.'
