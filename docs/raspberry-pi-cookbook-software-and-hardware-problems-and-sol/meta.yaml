- img_proc: true
  md: "Open an editor and paste in the following code. As with all the program examples\
    \ in this book, you can also download it (see Recipe 3.22).\n\nThis program uses\
    \ the command line, so you can run it from SSH or the Terminal:\n\n```\nfrom gpiozero\
    \ import Motor\n\nmotor = Motor(forward=23, backward=24)\n\nwhile True:\n    cmd\
    \ = input(\"Command, f/r 0..9, E.g. f5 :\")\n    direction = cmd[0]\n    speed\
    \ = float(cmd[1]) / 10.0\n    if direction == \"f\":\n        motor.forward(speed=speed)\n\
    \    else:\n        motor.backward(speed=speed)\n```\n\ngpiozero conveniently\
    \ has a class called Motor that we can use to control both the speed and direction\
    \ of a single DC motor. When you create an instance of the class, you need to\
    \ specify the forward and backward control pins.\n\nThe forward and backward methods\
    \ of Motor take an optional parameter of speed between 0 and 1, where 1 is full\
    \ speed.\n\n# Discussion\n\nThe Motor class of gpiozero hides the complexity of\
    \ the H-bridge's hardware.\n\nFigure 12-11 shows how an H-bridge works, using\
    \ switches rather than transistors or a chip. By reversing the polarity across\
    \ the motor, an H-bridge also reverses the direction in which the motor turns.\n\
    \nIn Figure 12-11, S1 and S4 are closed and S2 and S3 are open. This allows current\
    \ to flow through the motor, with terminal A being positive and terminal B being\
    \ negative. If we were to reverse the switches, so that S2 and S3 are closed and\
    \ S1 and S4 are open, B would be positive and A would be negative, and the motor\
    \ would turn in the opposite direction.\n\nHowever, you might have spotted a danger\
    \ with this circuit. If by some chance S1 and S2 are both closed, the positive\
    \ supply will be directly connected to the negative supply, and you will have\
    \ a short circuit. The same is true if S3 and S4 are both closed at the same time."
  merge: -1
  pgno: 352
- img_proc: true
  md: '![](img/e36e77524aeaae366529d1cf02f9a39c_353_0.png)


    Figure 12-11. An H-bridge


    Although you can use individual transistors to make an H-bridge, it is simpler
    to use an H-bridge integrated circuit (IC) such as the L293D. This chip actually
    has two H-bridges in it, so you can use it to control two motors. It also has
    logic to ensure that the equivalent of closing both S1 and S2 cannot happen.


    The L293D uses two control pins for each of the two motor control channels: a
    *forward* pin and a *backward* pin. If the forward pin (23) is high and the backward
    pin (24) is low, the motor will turn in one direction. If those two pins are reversed,
    the motor will turn in the opposite direction.


    As an alternative to using an L293D on a breadboard, very low-cost modules are
    available from eBay that include a L293D on a printed circuit board (PCB) with
    screw terminals to attach motors and header pins to link directly to the Raspberry
    Pi GPIO connector. You can find high-power motor controller modules that operate
    on the same principles but at much higher currents, even up to 20A or more. [Pololu](https://www.pololu.com/)
    has an impressive range of such motor controller boards.'
