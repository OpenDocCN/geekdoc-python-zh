    \ used has an I2C address of 1d. Thus, that is what the variable i2c_address is\
    \ set to in the program.\n\nReferring to the preceding Python code, the device\
    \ has a control register to which a command 1 must be written to start the device\
    \ running. A second configuration command of 0 is then written to register 0x0E,\
    \ to set the acceleration range of the device to a maximum of 2g. These parameters\
    \ are specified in the [datasheet for the MMA8452Q](datasheet for the MMA8452Q).\n\
    \nWhen a reading is required, the I2C bus is read and the data bytes split into\
    \ the three X, Y, and Z acceleration readings.\n\nThe most common use for an accelerometer\
    \ is to detect tilt. This works because the Z-axis force is dominated by the pull\
    \ of gravity (Figure 14-22).\n\nWhen the accelerometer is tilted in one direction,\
    \ some of that vertical force of gravity becomes active on another axis of the\
    \ accelerometer.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_430_0.png)\n\nWe\
    \ can use this principle to detect when the tilt is past a certain threshold.\
    \ The following program (ch_14_i2c_acc_tilt.py) illustrates this point:"
  - "[PAGE 431]\n\n```\npython\nimport smbus\nimport time\n\nbus = smbus.SMBus(1)\n\
    \ni2c_address = 0x1D\ncontrol_reg = 0x2A\n\nbus.write_byte_data(i2c_address, control_reg,\
    \ 0x01) # Start\nbus.write_byte_data(i2c_address, 0x0E, 0x00) # 2g range\n\ntime.sleep(0.5)\n\
    \ndef read_acc():\n    data = bus.read_i2c_block_data(i2c_address, 0x00, 7)\n\
    \    x = (data[1] * 256 + data[2]) / 16\n    if x > 2047 :\n        x -= 4096\n\
    \    y = (data[3] * 256 + data[4]) / 16\n    if y > 2047 :\n        y -= 4096\n\
    \    z = (data[5] * 256 + data[6]) / 16\n    if z > 2047 :\n        z -= 4096\n\
    \    return (x, y, z)\n\nwhile True:\n    x, y, z = read_acc()\n    if x > 400:\n\
    \        print(\"Left\")\n    elif x < -400:\n        print(\"Right\")\n    elif\
    \ y > 400:\n        print(\"Back\")\n    elif y < -400:\n        print(\"Forward\"\
    )\n    time.sleep(0.2)\n```\n\nWhen you run the program, you will begin to see\
    \ direction messages:\n\n```\n\n$ python3 ch_14_i2c_acc_tilt.py\nLeft\nLeft\n\
    Right\nForward\nForward\nBack\nBack\n```\n\nYou could use this to control a roving\
    \ robot or a motorized pan-tilt head with a webcam attached."
  - "[PAGE 432]\n\n# See Also\n\nTake a look at the datasheet for the MMA8452Q.\n\n\
    The Sense HAT includes an accelerometer (Recipe 14.16).\n\n# 14.15 Finding Magnetic\
    \ North with the Sense HAT\n\n# Problem\n\nYou want to use a Sense HAT to detect\
    \ magnetic north.\n\n# Solution\n\nUse the Python library for the built-in three-axis\
    \ magnetometer in the Sense HAT.\n\nFirst follow Recipe 10.15 to install the Sense\
    \ HAT library.\n\nOpen an editor and paste in the following code (ch_14_sense_hat_compass.py):\n\
    \n```\nfrom sense_hat import SenseHat\nimport time\n\nsense = SenseHat()\n\nwhile\
    \ True:\n    bearing = sense.get_compass()\n    print('Bearing: {:.0f} to North'.format(bearing))\n\
    \    time.sleep(0.5)\n```\n\nAs with all the program examples in this book, you\
    \ can also download this program (see Recipe 3.22).\n\nWhen you run this program,\
    \ you'll see a series of bearing readings:\n\n```\n$ python3 ch_14_sense_hat_compass.py\n\
    Bearing: 138 to North\nBearing: 138 to North\n```\n\n# Discussion\n\nThe compass\
    \ will be sensitive to other nearby sources of magnetic field, so you might find\
    \ it difficult to get accurate bearings. It can, however, make quite a good magnet\
    \ detector."
- md: "## See Also\n\nYou can find documentation for Sense HAT at [https://oreil.ly/dhevo](https://oreil.ly/dhevo)\
    \ and [https://oreil.ly/xdFCf](https://oreil.ly/xdFCf).\n\nTo use the Sense HAT\
    \ to detect a magnet, see Recipe 14.18.\n\n## 14.16 Using the Inertial Measurement\
    \ Unit of the Sense HAT\n\n### Problem\n\nYou want more accurate orientation information\
    \ from your Raspberry Pi than provided by the accelerometer from Recipe 14.14.\n\
    \n### Solution\n\nUse the Inertial Measurement Unit (IMU) of the Sense HAT. This\
    \ unit includes a three-axis accelerometer like the one in Recipe 14.14, but it\
    \ also has a three-axis gyroscope and a magnetometer. The readings from these\
    \ different sensors are combined to let you get a more accurate orientation for\
    \ the Sense HAT, expressed as pitch, roll, and yaw (as shown in Figure 14-23).\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_433_0.png)\n\nPitch, roll, and yaw\
    \ are three terms that come from aviation. They are relative to the axis of the\
    \ plane's flight. The pitch is the angle to the horizontal. The roll is the degree\
    \ of rotation around the plane's axis of flight (imagine one wing going up and\
    \ the other down), and yaw is the rotation on the horizontal axis (think changing\
    \ bearing).\n\nOpen an editor and paste in the following code (*ch_14_sense_hat_orientation.py*):\n\
    \n```\nfrom sense_hat import SenseHat\n\nsense = SenseHat()\n\nsense.set_imu_config(True,\
    \ True, True)\n\nwhile True:\n    o = sense.get_orientation()\n    print(\"p:\
    \ {:.0f}, r: {:.0f}, y: {:.0f}\".format(o['pitch'], o['roll'],\n    o['yaw']))\n\
    ```\n\nAs with all the program examples in this book, you can also download this\
    \ program (see [Recipe 3.22](https://example.com/recipe3.22)).\n\nThe function\
    \ `set_imu_config` specifies which of the compass, gyroscope, and accelerometer\
    \ (in that order) should be used to measure the orientation. Setting all three\
    \ to True means that all are used to make the measurement.\n\nWhen you run the\
    \ program, you’ll see output similar to this:\n\n```\n$ python3 ch_14_sense_hat_orientation.py\n\
    p: 1, r: 317, y: 168\np: 1, r: 318, y: 169\n```\n\nTry tilting the Sense HAT and\
    \ Raspberry Pi forward toward the USB ports, and you should see the value of pitch\
    \ increase.\n\n### Discussion\n\nAn accelerometer measures forces on a stationary\
    \ mass and can therefore measure the degree of tilt by calculating how much of\
    \ the force supplied by gravity (Z-axis) influences the force measured on the\
    \ X- and Y-axes.\n\nA gyroscope is different. It measures the force on moving\
    \ masses (vibrating back and forth) as those masses turn relative to the path\
    \ of the movement, using a force called the Coriolis effect.\n\n### See Also\n\
    \nFor more information on the Sense HAT’s IMU, see [https://oreil.ly/Tr8YV](https://oreil.ly/Tr8YV).\n\
    \nTo measure temperature, humidity, and atmospheric pressure, see [Recipe 14.12](https://example.com/recipe14.12).\n\
    \nThe IMU of the Sense HAT can also be used to make a compass and detect the presence\
    \ of a magnet ([Recipe 14.18](https://example.com/recipe14.18)).\n\nTo find out\
    \ more about gyroscopes and the Coriolis effect, see [https://oreil.ly/TXHz](https://oreil.ly/TXHz).\n\
    \n## 14.17 Sensing a Magnet with a Reed Switch\n\n### Problem\n\nYou want to detect\
    \ the presence of a magnet.\n\n### Solution\n\nUse a reed switch (Figure 14-24).\
    \ It works just like a regular switch except it activates only when a magnet is\
    \ near. Figure 14-25 shows how a reed switch works.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_435_0.png)\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_435_1.png)\n\nThe two reed contacts\
    \ are encased in a glass tube. When a magnet is placed near the reed switch, the\
    \ reeds are pulled together and make contact.\n\nYou can use any of the regular\
    \ switch recipes in Chapter 13 with a reed switch, starting with Recipe 13.1.\n\
    \n### Discussion\n\nReed switches are a low-tech way of detecting a magnet. They\
    \ have been around since the 1930s and are extremely reliable. They are commonly\
    \ used in security systems in which a plastic-encased reed switch is placed on\
    \ a door frame, with a fixed magnet in another plastic enclosure on the door itself.\
    \ When the door opens, the reed switch contacts open, triggering the alarm.\n\n\
    ### See Also\n\nTo detect a magnet using the magnetometer of the Sense HAT, see\
    \ Recipe 14.18.\n\n## 14.18 Sensing a Magnet with the Sense HAT\n\n### Problem\n\
    \nYou want to detect the presence of a magnet using a Sense HAT with built-in\
    \ magnetometer and a Python program.\n\n### Solution\n\nUse the Sense HAT's Python\
    \ library to interface with its magnetometer.\nOpen an editor and paste in the\
    \ following code (ch_14_sense_hat_magnet.py):\n\n```\nfrom sense_hat import SenseHat\n\
    import time\n\nhat = SenseHat()\nfill = (255, 0, 0)\n\nwhile True:\n    reading\
    \ = int(hat.get_compass_raw()['z'])\n    if reading > 200:\n        hat.clear(fill)\n\
    \        time.sleep(0.2)\n    else:\n        hat.clear()\n```\n\nAs with all the\
    \ program examples in this book, you can also download this program (see Recipe\
    \ 3.22).\nWhen the magnet draws close to the Sense HAT, the LEDs will all turn\
    \ red for one-fifth of a second.\n\n### Discussion\n\nIt doesn't matter which\
    \ axis of the compass data you use; all three will be greatly disrupted by the\
    \ presence of a fixed magnet.\n\n### See Also\n\nTo detect a magnet using a reed\
    \ switch, see Recipe 14.17.\nFor other ways to use the Sense HAT display, see\
    \ Recipe 15.3.\n\n## 14.19 Measuring Distance Using Ultrasound\n\n### Problem\n\
    \nYou want to measure distance using an ultrasonic range finder.\n\n### Solution\n\
    \nUse a low-cost HC-SR04 range finder. This device needs two GPIO pins: one to\
    \ trigger the pulse of ultrasound and the other to monitor how long it takes for\
    \ the echo to return.\n\nTo make this recipe, you will need the following:\n\n\
    - Breadboard and jumper wires (see “Prototyping Equipment and Kits” on page 564)\n\
    - HC-SR04 range finder (eBay)\n- 470Ω resistor (see “Resistors and Capacitors”\
    \ on page 565)\n- 270Ω resistor (see “Resistors and Capacitors” on page 565)\n\
    \nFit the components onto the breadboard as shown in Figure 14-26. The resistors\
    \ are necessary to reduce the echo output of the range finder from 5V to 3.3V\
    \ (see Recipe 10.12).\n\nOpen an editor and paste in the following code (ch_14_ranger.py):\n\
    \n```\nfrom gpiozero import DistanceSensor\nfrom time import sleep\n\nsensor =\
    \ DistanceSensor(echo=18, trigger=17)\nwhile True:\n    cm = sensor.distance *\
    \ 100\n    inch = cm / 2.5\n    print(\"cm={:.0f}\\tinches={:.0f}\".format(cm,\
    \ inch))\n    sleep(0.5)\n```\n\nAs with all the program examples in this book,\
    \ you can also download this program (see Recipe 3.22).\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_438_0.png)\n\
    \nFigure 14-26. Connecting an SR04 rangefinder to a Raspberry Pi\n\nThe operation\
    \ of the program is described in the Discussion. When the program is run, it reports\
    \ the distance in both centimeters and inches once per second. Use your hand or\
    \ some other obstacle to change the reading:\n\n```\n$ python3 ch_14_ranger.py\n\
    cm=154.7    inches=61.8\ncm=12.9     inches=5.1\ncm=14.0     inches=5.6\ncm=20.2\
    \     inches=8.0\n```\n\n### Discussion\n\nAlthough several ultrasonic range finders\
    \ are available, the type used here is easy to use and low cost. It works by sending\
    \ a pulse of ultrasound and then measuring the amount of time taken for the echo\
    \ to be received. One of the round ultrasonic transducers on the front of the\
    \ device is the transmitter, and the other is the receiver.\n\nThis process is\
    \ controlled from the Raspberry Pi. The difference between this type of device\
    \ and more expensive models is that the more expensive versions include their\
    \ own microcontroller, which carries out all the necessary timing and provides\
    \ an I2C or serial interface to return a final reading.\n\nWhen you are using\
    \ one of these sensors with a Raspberry Pi, the *trig* (trigger) input of the\
    \ range finder is connected to a GPIO output, and the *echo* output of the range\
    \ finder is connected to a GPIO input on the Raspberry Pi after having its voltage\
    \ range lowered from 5V to a safe 3.3V.\n\nFigure 14-27 shows an oscilloscope\
    \ trace of the sensor in action. The top trace is connected to trig, and the bottom\
    \ trace is connected to echo. You can see that first the trig pin is taken high\
    \ for a short pulse. There is then a short delay before the echo pin goes high.\
    \ This stays high for a period that is proportional to the distance from the sensor.\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_439_0.png)\n\nFigure 14-27. The oscilloscope\
    \ trace for trigger and echo\n\nThis program makes use of the DistanceSensor class\
    \ of the gpiozero library, which takes care of the pulse generation and measurement\
    \ for us.\n\nThis method of measuring distance is not terribly accurate because\
    \ temperature, pressure, and relative humidity all alter the speed of sound (about\
    \ 30 cm per millisecond) and hence the distance readings.\n\n### See Also\n\n\
    Take a look at the [datasheet for the ultrasonic range finder](datasheet).\n\n\
    The documentation for the DistanceSensor class is available at [https://oreil.ly/XYk3m](https://oreil.ly/XYk3m)."
  mdcn: "## 另请参阅\n\n你可以在 [https://oreil.ly/dhevo](https://oreil.ly/dhevo) 和 [https://oreil.ly/xdFCf](https://oreil.ly/xdFCf)\
    \ 找到 Sense HAT 的文档。\n\n要使用 Sense HAT 检测磁铁，请参阅配方 14.18。\n\n## 14.16 使用 Sense HAT\
    \ 的惯性测量单元\n\n### 问题\n\n你希望从树莓派获得比配方 14.14 中加速度计提供的更精确的方向信息。\n\n### 解决方案\n\n使用\
    \ Sense HAT 的惯性测量单元。该单元包含一个与配方 14.14 中类似的三轴加速度计，但它还有一个三轴陀螺仪和一个磁力计。这些不同传感器的读数被组合起来，让你能够获得\
    \ Sense HAT 更精确的方向，以俯仰角、横滚角和偏航角表示（如图 14-23 所示）。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_433_0.png)\n\
    \n俯仰角、横滚角和偏航角是源自航空领域的三个术语。它们相对于飞机的飞行轴。俯仰角是相对于水平面的角度。横滚角是绕飞机飞行轴旋转的程度（想象一个机翼向上，另一个向下），偏航角是在水平轴上的旋转（想象改变航向）。\n\
    \n打开编辑器并粘贴以下代码（*ch_14_sense_hat_orientation.py*）：\n\n```\nfrom sense_hat import\
    \ SenseHat\n\nsense = SenseHat()\n\nsense.set_imu_config(True, True, True)\n\n\
    while True:\n    o = sense.get_orientation()\n    print(\"p: {:.0f}, r: {:.0f},\
    \ y: {:.0f}\".format(o['pitch'], o['roll'],\n    o['yaw']))\n```\n\n与本书中所有程序示例一样，你也可以下载此程序（参见[配方\
    \ 3.22](https://example.com/recipe3.22)）。\n\n函数 `set_imu_config` 指定了指南针、陀螺仪和加速度计（按此顺序）中哪些应被用于测量方向。将所有三个设置为\
    \ True 意味着所有传感器都用于进行测量。\n\n当你运行程序时，你会看到类似这样的输出：\n\n```\n$ python3 ch_14_sense_hat_orientation.py\n\
    p: 1, r: 317, y: 168\np: 1, r: 318, y: 169\n```\n\n尝试将 Sense HAT 和树莓派向前倾斜朝向 USB\
    \ 端口，你应该会看到俯仰角的值增加。\n\n### 讨论\n\n加速度计测量作用在静止质量上的力，因此可以通过计算重力（Z 轴）提供的力在多大程度上影响在\
    \ X 轴和 Y 轴上测量的力来测量倾斜度。\n\n陀螺仪则不同。它测量作用在运动质量（来回振动）上的力，当这些质量相对于运动路径转动时，利用一种称为科里奥利效应的力进行测量。\n\
    \n### 另请参阅\n\n有关 Sense HAT 的惯性测量单元的更多信息，请参阅 [https://oreil.ly/Tr8YV](https://oreil.ly/Tr8YV)。\n\
    \n要测量温度、湿度和大气压，请参阅[配方 14.12](https://example.com/recipe14.12)。\n\nSense HAT 的惯性测量单元也可用于制作指南针和检测磁铁的存在（[配方\
    \ 14.18](https://example.com/recipe14.18)）。\n\n要了解更多关于陀螺仪和科里奥利效应的信息，请参阅 [https://oreil.ly/TXHz](https://oreil.ly/TXHz)。\n\
    \n## 14.17 使用干簧管检测磁铁\n\n### 问题\n\n你想检测磁铁的存在。\n\n### 解决方案\n\n使用干簧管（图 14-24）。它的工作原理与普通开关类似，只是只有在磁铁靠近时才会激活。图\
    \ 14-25 展示了干簧管的工作原理。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_435_0.png)\n\n\
    ![](img/e36e77524aeaae366529d1cf02f9a39c_435_1.png)\n\n两个簧片触点被封装在玻璃管内。当磁铁靠近干簧管时，簧片被吸合在一起并接通。\n\
    \n你可以将第 13 章中的任何普通开关配方与干簧管一起使用，从配方 13.1 开始。\n\n### 讨论\n\n干簧管是一种检测磁铁的低技术方法。它们自\
    \ 20 世纪 30 年代就已存在，并且极其可靠。它们通常用于安全系统中，其中一个塑料封装的干簧管安装在门框上，另一个塑料外壳中的固定磁铁安装在门本身上。当门打开时，干簧管触点断开，触发警报。\n\
    \n### 另请参阅\n\n要使用 Sense HAT 的磁力计检测磁铁，请参阅配方 14.18。\n\n## 14.18 使用 Sense HAT 检测磁铁\n\
    \n### 问题\n\n你想使用带有内置磁力计的 Sense HAT 和 Python 程序来检测磁铁的存在。\n\n### 解决方案\n\n使用 Sense\
    \ HAT 的 Python 库与其磁力计进行接口。\n打开编辑器并粘贴以下代码（ch_14_sense_hat_magnet.py）：\n\n```\n\
    from sense_hat import SenseHat\nimport time\n\nhat = SenseHat()\nfill = (255,\
    \ 0, 0)\n\nwhile True:\n    reading = int(hat.get_compass_raw()['z'])\n    if\
    \ reading > 200:\n        hat.clear(fill)\n        time.sleep(0.2)\n    else:\n\
    \        hat.clear()\n```\n\n与本书中所有程序示例一样，你也可以下载此程序（参见配方 3.22）。\n当磁铁靠近 Sense HAT\
    \ 时，所有 LED 将变红五分之一秒。\n\n### 讨论\n\n使用指南针数据的哪个轴并不重要；所有三个轴都会因固定磁铁的存在而受到极大干扰。\n\n\
    ### 另请参阅\n\n要使用干簧管检测磁铁，请参阅配方 14.17。\n有关使用 Sense HAT 显示屏的其他方法，请参阅配方 15.3。\n\n##\
    \ 14.19 使用超声波测量距离\n\n### 问题\n\n你想使用超声波测距仪测量距离。\n\n### 解决方案\n\n使用低成本的 HC-SR04 测距仪。该设备需要两个\
    \ GPIO 引脚：一个用于触发超声波脉冲，另一个用于监测回波返回所需的时间。\n\n要制作此配方，你需要以下物品：\n\n- 面包板和跳线（参见第 564\
    \ 页的“原型设备和套件”）\n- HC-SR04 测距仪（eBay）\n- 470Ω 电阻（参见第 565 页的“电阻和电容”）\n- 270Ω 电阻（参见第\
    \ 565 页的“电阻和电容”）\n\n按照图 14-26 所示将组件安装到面包板上。电阻是必要的，用于将测距仪的回波输出从 5V 降低到 3.3V（参见配方\
    \ 10.12）。\n\n打开编辑器并粘贴以下代码（ch_14_ranger.py）：\n\n```\nfrom gpiozero import DistanceSensor\n\
    from time import sleep\n\nsensor = DistanceSensor(echo=18, trigger=17)\nwhile\
    \ True:\n    cm = sensor.distance * 100\n    inch = cm / 2.5\n    print(\"cm={:.0f}\\\
    tinches={:.0f}\".format(cm, inch))\n    sleep(0.5)\n```\n\n与本书中所有程序示例一样，你也可以下载此程序（参见配方\
    \ 3.22）。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_438_0.png)\n\n图 14-26. 将\
    \ SR04 测距仪连接到树莓派\n\n程序的操作在讨论中描述。当程序运行时，它每秒报告一次以厘米和英寸为单位的距离。使用你的手或其他障碍物来改变读数：\n\
    \n```\n$ python3 ch_14_ranger.py\ncm=154.7    inches=61.8\ncm=12.9     inches=5.1\n\
    cm=14.0     inches=5.6\ncm=20.2     inches=8.0\n```\n\n### 讨论\n\n尽管有几种超声波测距仪可用，但这里使用的类型易于使用且成本低。它通过发送超声波脉冲，然后测量回波被接收所需的时间来工作。设备前面的两个圆形超声波换能器中，一个是发射器，另一个是接收器。\n\
    \n这个过程由树莓派控制。这种设备与更昂贵型号之间的区别在于，更昂贵的版本包含自己的微控制器，该微控制器执行所有必要的计时并提供 I2C 或串行接口以返回最终读数。\n\
    \n当你将其中一个传感器与树莓派一起使用时，测距仪的 *trig*（触发）输入连接到 GPIO 输出，测距仪的 *echo* 输出在将其电压范围从 5V 降低到安全的\
    \ 3.3V 后，连接到树莓派上的 GPIO 输入。\n\n图 14-27 显示了传感器工作时的示波器轨迹。顶部轨迹连接到 trig，底部轨迹连接到 echo。你可以看到，首先\
    \ trig 引脚被拉高一个短脉冲。然后有一个短暂的延迟，之后 echo 引脚变高。它保持高电平的时间与到传感器的距离成正比。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_439_0.png)\n\
    \n图 14-27. 触发和回波的示波器轨迹\n\n此程序利用了 gpiozero 库的 DistanceSensor 类，该类为我们处理了脉冲生成和测量。\n\
    \n这种测量距离的方法不是特别精确，因为温度、压力和相对湿度都会改变声速（约每毫秒 30 厘米），从而影响距离读数。\n\n### 参阅\n\n查看[超声波测距仪的数据手册](datasheet)。\n\
    \nDistanceSensor 类的文档可在 [https://oreil.ly/XYk3m](https://oreil.ly/XYk3m) 获取。"
