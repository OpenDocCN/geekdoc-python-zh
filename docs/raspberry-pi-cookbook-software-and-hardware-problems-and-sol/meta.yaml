    ## 2.6 Connecting with a Console Lead


    ### Problem


    No network connection is available, but you still want to be able to remotely
    control your Raspberry Pi from another computer.


    ### Solution


    Use a *console cable* (a special lead that you need to buy separately—see “Miscellaneous”
    on page 567) to connect to a Raspberry Pi.


    > **Power Consumption**

    The console lead will typically only be able to supply 500mA, which is fine for
    early Raspberry Pis, but not enough for a Raspberry Pi 4 or 400. If you are using
    a 4 or 400, then you will need to use a power adapter with it ([Recipe 1.4](https://www.oreilly.com/library/view/raspberry-pi-cookbook/9781492048817/ch01.html#recipe-1-4))
    and leave the red power lead of the console lead (described after [Figure 2-11](https://www.oreilly.com/library/view/raspberry-pi-cookbook/9781492048817/ch02.html#figure-2-11))
    unconnected to the 5V Raspberry Pi pin.


    To use this method, you’ll need to enable the serial interface. This means that,
    at least while you are setting up your Raspberry Pi, you need to have a keyboard,
    monitor, and mouse attached.


    To enable the serial interface, go to the Raspberry Menu, select Preferences,
    and then click Raspberry Pi Configuration. Select the Interfaces tab and then
    click the toggle switch for Serial Port, as shown in [Figure 2-9](https://www.oreilly.com/library/view/raspberry-pi-cookbook/9781492048817/ch02.html#figure-2-9).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_74_0.png)


    Figure 2-9. Enabling the serial interface using the Raspberry Pi Configuration
    tool


    As with most Raspberry Pi configurations, you can also use the command-line raspi-config
    utility by running this command in a Terminal session:


    ```

    $ sudo raspi-config

    ```


    Select Interfacing Options and then Serial, as shown in Figure 2-10.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_74_1.png)


    Figure 2-10. Enabling the serial interface using the raspi-config utility


    Console cables are great for a Pi that is going to be used headless—that is, without
    keyboard, mouse, or monitor.


    The console cable shown in Figure 2-11 is available from Adafruit.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_75_0.png)


    Figure 2-11. A console cable


    Connect the lead as follows and by referring to Figure 2-11:


    1. Connect the red (5V) lead to the 5V pin, one pin to the left of the edge of
    the GPIO header. Note that if your console lead is a 3V lead, or you have a Raspberry
    Pi 4 or 400 that takes too much current for the serial lead, then leave this wire
    unconnected and power the Raspberry Pi as usual using its USB power connector.

    2. Connect the black (GND) lead to GND on the next pin to the left on the Raspberry
    Pi.

    3. Connect the white lead (Rx) to Raspberry Pi GPIO 14 (TXD), to the left of the
    black lead.

    4. Connect the green lead (Tx) to GPIO 15 (RXD), to the left of the white lead.


    If you use a different lead, the wire colors might well be different, so always
    check the documentation for the lead or else you risk damaging your Raspberry
    Pi.


    Note that the USB lead also provides 5V on the red wire, with enough power for
    the Pi on its own but not with a lot of devices attached.


    If you are a Windows or macOS user, you will need to install drivers for the USB
    lead; the driver that you will need to install depends on the chip used by the
    console lead manufacturer. Please refer to the manufacturer''s website. For a
    Mac, you can find out more information on that at this [Adafruit tutorial](https://www.adafruit.com/).


    To connect to the Pi from macOS, you will need to run the Terminal and enter the
    following command:


    ```

    $ sudo cu -l /dev/cu.usbserial -s 115200

    ```


    After connecting, press Enter, and the Raspberry Pi login prompt should appear
    (Figure 2-12). The default username and password are *pi* and *raspberry*, respectively.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_76_0.png)


    Figure 2-12. Logging in with a console cable


    If you are trying to connect to your Raspberry Pi from a Windows computer, you
    need to download the Terminal software called [PuTTY](https://www.putty.org/).


    When you run PuTTY, change the “Connection type” to Serial and set the speed to
    115200. You also need to set the “Serial line” to be the COM port in use by the
    cable. This might be COM7, but if that doesn''t work, check it using Ports in
    the Windows Device Manager.


    When you click Open and press Enter, the Terminal session should start with a
    login prompt.


    ### Discussion


    The console cable can be a very convenient way of using your Pi if you are traveling
    light because it provides both power and a way to control the Pi remotely.


    The console lead has a chip in the USB end that provides a USB-to-serial interface.
    This sometimes (depending on your operating system) requires the installation
    of drivers on your PC. You should be able to use any USB-to-serial converter as
    long as it has the necessary drivers for your PC.


    Plugging the sockets of the lead into the right places is made easier if you carefully
    glue (or tape) the four sockets together in the right order so that they fit over
    the GPIO header in a block.


    Finding the right position on the GPIO header is made easier if you use a GPIO
    template like the Raspberry Leaf (see Recipe 10.1). The Raspberry Pi pinouts are
    shown in Appendix B.


    ### See Also


    You can find out more about using the serial console at this Adafruit tutorial.
    Adafruit also sells console cables. The lead used here is one supplied by Adafruit
    (product code 954).


    ## 2.7 Controlling the Pi Remotely with SSH


    ### Problem


    You want to connect to a remote Pi from another computer using Secure Shell (SSH).


    ### Solution


    Before you can connect to your Raspberry Pi using SSH, you must turn on SSH. On
    newer versions of Raspberry Pi OS, you can use the Raspberry Pi Configuration
    tool (Figure 2-13), which you can find on the Raspberry Menu under Preferences.
    Just select the enabled radio button for SSH and click OK. You are then prompted
    to restart.


    You can also enable SSH from the Raspberry Pi Imager in its Advanced options dialog
    (Recipe 1.8).


    If you prefer to use the command line, use the raspi-config utility. You can start
    this at any time by entering the following command in a Terminal:


    ```

    $ sudo raspi-config

    ```


    Select the Interfaces tab, scroll down to the SSH option, and then click the Enabled
    button.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_78_0.png)


    Figure 2-13. Turning on SSH using the Raspberry Pi Configuration tool


    If you are using macOS or have Linux installed on the computer from which you
    want to connect your Pi, all you need to do to connect is open a Terminal window
    and enter the following command:


    ```

    $ ssh 192.168.1.16 -l pi

    ```


    Here, the IP address (192.168.1.16) is the IP address of your Pi (see Recipe 2.2).
    You are then prompted for your password and logged in to the Pi (Figure 2-14).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_78_1.png)


    Figure 2-14. Logging in with SSH'
